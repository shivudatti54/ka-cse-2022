<svg width="420" height="400" data-topic-id="data-types-in-mongodb">
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="20" fill="url(#pastelGradient)" data-narration="Data Types in MongoDB Introduction"/>
  <text x="15" y="35" font-size="18" font-family="Arial" fill="#3498DB">Data Types</text>

  <section x="10" y="60" width="400" height="150" data-narration="Built-in Data Types in MongoDB">
    <rect x="10" y="10" width="350" height="120" fill="#F7F7F7"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#333">Built-in Data Types</text>
    <text x="15" y="50" font-size="14" font-family="Arial" fill="#666">String, Number, Object, Array, and Binary Data</text>
  </section>

  <section x="10" y="220" width="400" height="150" data-narration="String Data Type">
    <rect x="10" y="10" width="350" height="120" fill="#F7F7F7"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#333">String</text>
    <text x="15" y="50" font-size="14" font-family="Arial" fill="#666">A sequence of characters.</text>
    <text x="15" y="100" font-size="14" font-family="Arial" fill="#666">Example: "John Doe"</text>
  </section>

  <section x="10" y="380" width="400" height="150" data-narration="Number Data Type">
    <rect x="10" y="10" width="350" height="120" fill="#F7F7F7"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#333">Number</text>
    <text x="15" y="50" font-size="14" font-family="Arial" fill="#666">An integer or floating-point number.</text>
    <text x="15" y="100" font-size="14" font-family="Arial" fill="#666">Example: 25 or 3.14</text>
  </section>

  <section x="10" y="240" width="400" height="150" data-narration="Object Data Type">
    <rect x="10" y="10" width="350" height="120" fill="#F7F7F7"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#333">Object</text>
    <text x="15" y="50" font-size="14" font-family="Arial" fill="#666">A collection of key-value pairs.</text>
    <text x="15" y="100" font-size="14" font-family="Arial" fill="#666">Example:</text>
    <text x="10" y="120" font-size="14" font-family="Arial" fill="#666">{
      "name": "John Doe",
      "age": 25,
      "address": {
        "street": "123 Main St",
        "city": "Anytown",
        "state": "CA",
        "zip": "12345"
      }
    }</text>
  </section>

  <section x="10" y="100" width="400" height="150" data-narration="Array Data Type">
    <rect x="10" y="10" width="350" height="120" fill="#F7F7F7"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#333">Array</text>
    <text x="15" y="50" font-size="14" font-family="Arial" fill="#666">A collection of values of the same type.</text>
    <text x="15" y="100" font-size="14" font-family="Arial" fill="#666">Example:</text>
    <text x="10" y="120" font-size="14" font-family="Arial" fill="#666">[
      "John Doe",
      "Jane Doe",
      25,
      true
    ]</text>
  </section>

  <rect x="10" y="230" width="400" height="20" fill="url(#pastelGradient)" data-narration="Conclusion"/>
  <text x="15" y="250" font-size="18" font-family="Arial" fill="#3498DB">Data Types in MongoDB</text>

  <footer x="10" y="370" width="400" height="30" fill="#F7F7F7" data-narration="By [Your Name]">
    <text x="15" y="20" font-size="14" font-family="Arial" fill="#666">Data Types in MongoDB</text>
  </footer>
</svg>