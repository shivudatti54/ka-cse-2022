<svg width="420" height="400" data-topic-id="tb1-ch6-61-65" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .section {
      padding: 20px;
      background-color: #f7f7f7;
      border-bottom: 1px solid #ccc;
      margin-bottom: 20px;
    }
    .section:last-child {
      border-bottom: none;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #2f4f7f;
    }
    .annotation {
      font-size: 16px;
      color: #666;
    }
  </style>
  <rect x="50" y="50" width="320" height="300" fill="#87ceeb" rx="10" />
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1" />
      <stop offset="50%" stop-color="#a1c9f2" stop-opacity="1" />
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="1" />
    </linearGradient>
  </defs>
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="320" height="300" fill="url(#pastel-gradient)" rx="10" />
    <text x="50%" y="10%" class="title" transform="rotate(0 50% 50%)">MongoDB</text>
    <section class="section" data-narration="What is MongoDB?">
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="80%" class="annotation">Definition</text>
      </g>
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="120%" class="annotation">Schema-less: No fixed schema is required</text>
      </g>
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="160%" class="annotation">Scalability: Horizontal scaling makes it easy to add more nodes to the cluster as the data grows</text>
      </g>
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="190%" class="annotation">High performance: Optimized for high-throughput and low-latency queries</text>
      </g>
    </section>
    <section class="section" data-narration="Why MongoDB?">
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="80%" class="annotation">Advantages</text>
      </g>
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="120%" class="annotation">Scalability: MongoDB can handle large amounts of data and scale horizontally</text>
      </g>
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="160%" class="annotation">Flexibility: No fixed schema allows for flexibility in data modeling</text>
      </g>
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="190%" class="annotation">High performance: Optimized for high-throughput and low-latency queries</text>
      </g>
    </section>
    <section class="section" data-narration="Disadvantages">
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="80%" class="annotation">Complexity: MongoDB requires a different mindset and skillset than traditional relational databases</text>
      </g>
      <g transform="rotate(0)">
        <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
        <text x="50%" y="120%" class="annotation">Data consistency: MongoDB does not guarantee data consistency, which can be a concern for certain applications</text>
      </g>
    </section>
    <g transform="translate(50, 350)">
      <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
      <text x="50%" y="10%" class="annotation">Requirements</text>
    </g>
    <g transform="translate(50, 370)">
      <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
      <text x="50%" y="10%" class="title">SVG Diagram</text>
    </g>
  </g>
  <g transform="translate(50, 400)">
    <path d="M 55,0 L 200,150 L 55,300 Z" stroke="#6699cc" stroke-width="2" fill="none" />
    <text x="50%" y="10%" class="annotation">Arrow markers for connections</text>
  </g>
</svg>