<svg width="420" height="400" data-topic-id="mongodb-query-language" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-image: linear-gradient(to bottom, #C5E1F5, #C7E5F8);">
    <!-- Header Section -->
    <rect x="10" y="10" width="400" height="40" style="fill: #E0E0E0;">
        <text x="15" y="25" font-size="18" font-family="Arial" text-anchor="start" fill="#333" data-narration="Title: MongoDB Query Language">
            MongoDB Query Language
        </text>
    </rect>

    <!-- Gradient Background -->
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s"dur="5s"fill="freeze" attributeName="fill">
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7E5F8" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5E1F5" stop-opacity="1"/>
        </linearGradient>
    </animate>

    <!-- Section 1: Syntax -->
    <rect x="10" y="60" width="400" height="120" style="fill: #F7F7F7;">
        <animate xmlns="http://www.w3.org/2000/svg" begin="0s"dur="1s"fill="freeze" attributeName="fill">
            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#F7F7F7" stop-opacity="1"/>
                <stop offset="100%" stop-color="#E5E5E5" stop-opacity="1"/>
            </linearGradient>
        </animate>
        <g transform="translate(20, 20)">
            <rect width="30" height="20" style="fill: #2196F3; stroke: #2196F3; stroke-width: 2" rx="2"/>
            <text x="5" y="15" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Query Operators: ==, $eq, $ne, $gt, $lt, $gte, $lte, $in, $nin, $regex, $regex">
                Query Operators
            </text>
            <rect x="50" y="20" width="30" height="20" style="fill: #FF9800; stroke: #FF9800; stroke-width: 2" rx="2"/>
            <text x="55" y="25" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Aggregation Operators: '$unwind', '$group', '$sort', '$limit', '$skip'">
                Aggregation Operators
            </text>
            <rect x="100" y="20" width="30" height="20" style="fill: #3F51B5; stroke: #3F51B5; stroke-width: 2" rx="2"/>
            <text x="105" y="25" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Projection Operators: '$project', '$addFields'">
                Projection Operators
            </text>
        </g>
    </rect>

    <!-- Section 2: Data Types -->
    <rect x="10" y="190" width="400" height="120" style="fill: #F7F7F7;">
        <animate xmlns="http://www.w3.org/2000/svg" begin="0s"dur="1s"fill="freeze" attributeName="fill">
            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#F7F7F7" stop-opacity="1"/>
                <stop offset="100%" stop-color="#E5E5E5" stop-opacity="1"/>
            </linearGradient>
        </animate>
        <g transform="translate(20, 20)">
            <rect width="30" height="20" style="fill: #2196F3; stroke: #2196F3; stroke-width: 2" rx="2"/>
            <text x="5" y="15" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Integers: whole numbers">
                Integers
            </text>
            <rect x="50" y="20" width="30" height="20" style="fill: #FF9800; stroke: #FF9800; stroke-width: 2" rx="2"/>
            <text x="55" y="25" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Floats: decimal numbers">
                Floats
            </text>
            <rect x="100" y="20" width="30" height="20" style="fill: #3F51B5; stroke: #3F51B5; stroke-width: 2" rx="2"/>
            <text x="105" y="25" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Strings: text data">
                Strings
            </text>
            <rect x="150" y="20" width="30" height="20" style="fill: #8BC34A; stroke: #8BC34A; stroke-width: 2" rx="2"/>
            <text x="155" y="25" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Dates: dates and timestamps">
                Dates
            </text>
            <rect x="200" y="20" width="30" height="20" style="fill: #03A9F4; stroke: #03A9F4; stroke-width: 2" rx="2"/>
            <text x="205" y="25" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Booleans: true or false values">
                Booleans
            </text>
        </g>
    </rect>

    <!-- Section 3: Examples -->
    <rect x="10" y="320" width="400" height="120" style="fill: #F7F7F7;">
        <animate xmlns="http://www.w3.org/2000/svg" begin="0s"dur="1s"fill="freeze" attributeName="fill">
            <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#F7F7F7" stop-opacity="1"/>
                <stop offset="100%" stop-color="#E5E5E5" stop-opacity="1"/>
            </linearGradient>
        </animate>
        <g transform="translate(20, 20)">
            <rect width="30" height="20" style="fill: #2196F3; stroke: #2196F3; stroke-width: 2" rx="2"/>
            <text x="5" y="15" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Retrieving Documents: db.collection.find();">
                Retrieving Documents
            </text>
            <rect x="50" y="20" width="30" height="20" style="fill: #FF9800; stroke: #FF9800; stroke-width: 2" rx="2"/>
            <text x="55" y="25" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Filtering Documents: db.collection.find({ name: { $regex: '^A' } });">
                Filtering Documents
            </text>
            <rect x="100" y="20" width="30" height="20" style="fill: #3F51B5; stroke: #3F51B5; stroke-width: 2" rx="2"/>
            <text x="105" y="25" font-size="14" font-family="Arial" text-anchor="start" fill="#333" data-narration="Sorting Documents: db.collection.find().sort({ age: -1 });">
                Sorting Documents
            </text>
        </g>
    </rect>

    <!-- Footer Section -->
    <rect x="10" y="370" width="400" height="30" style="fill: #E0E0E0;">
        <text x="15" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#333" data-narration="Reference: MongoDB Query Language Documentation">
            Reference
        </text>
    </rect>

</svg>