<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve">
  <title>Developing a MapReduce Program to Find Tags Associated with Each Movie</title>
  <!-- Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="20" width="400" height="30" fill="#4567b7" rx="5" />
    <text x="20" y="35" font-size="18" font-family="Arial" fill="#ffffff">MapReduce Program</text>
    <text x="20" y="55" font-size="18" font-family="Arial" fill="#ffffff">to Find Tags Associated with Each Movie</text>
  </section>
  <!-- What is MapReduce? -->
  <section data-narration="What is MapReduce?">
    <rect x="10" y="90" width="400" height="30" fill="#4567b7" rx="5" />
    <text x="20" y="105" font-size="18" font-family="Arial" fill="#ffffff">MapReduce</text>
    <text x="20" y="125" font-size="18" font-family="Arial" fill="#ffffff">is a programming model used for processing large data sets in parallel across a cluster of nodes.</text>
    <animate begin="100ms" dur="2000ms" attributeName="opacity" from="1" to="0" fill="freeze" />
  </section>
  <!-- Requirements -->
  <section data-narration="Requirements">
    <rect x="10" y="145" width="400" height="30" fill="#4567b7" rx="5" />
    <text x="20" y="160" font-size="18" font-family="Arial" fill="#ffffff">1. SVG dimensions: width="420" height="400"</text>
    <text x="20" y="180" font-size="18" font-family="Arial" fill="#ffffff">2. Include data-topic-id attribute with slugified topic name</text>
    <text x="20" y="200" font-size="18" font-family="Arial" fill="#ffffff">3. Use gradient background with pastel colors</text>
  </section>
  <!-- Step 1: Load the MovieLens Dataset -->
  <section data-narration="Step 1: Load the MovieLens Dataset">
    <rect x="10" y="240" width="400" height="30" fill="#4567b7" rx="5" />
    <text x="20" y="255" font-size="18" font-family="Arial" fill="#ffffff">hadoop fs -put movieLens.csv /user/hadoop/data/movielens.csv</text>
  </section>
  <!-- Step 2: Preprocess the Data -->
  <section data-narration="Step 2: Preprocess the Data">
    <rect x="10" y="295" width="400" height="30" fill="#4567b7" rx="5" />
    <text x="20" y="310" font-size="18" font-family="Arial" fill="#ffffff">Tokenize movie titles and tags</text>
  </section>
  <!-- Step 3: Write a map function to extract tags associated with each movie -->
  <section data-narration="Step 3: Write a map function to extract tags associated with each movie">
    <rect x="10" y="345" width="400" height="30" fill="#4567b7" rx="5" />
    <text x="20" y="360" font-size="18" font-family="Arial" fill="#ffffff">Map function: extract tags associated with each movie</text>
  </section>
  <!-- Step 4: Write a reduce function to aggregate tags associated with each movie -->
  <section data-narration="Step 4: Write a reduce function to aggregate tags associated with each movie">
    <rect x="10" y="395" width="400" height="30" fill="#4567b7" rx="5" />
    <text x="20" y="410" font-size="18" font-family="Arial" fill="#ffffff">Reduce function: aggregate tags associated with each movie</text>
  </section>
  <!-- Run the MapReduce program using a Spark cluster -->
  <section data-narration="Run the MapReduce program using a Spark cluster">
    <rect x="10" y="445" width="400" height="30" fill="#4567b7" rx="5" />
    <text x="20" y="460" font-size="18" font-family="Arial" fill="#ffffff">Run the MapReduce program using a Spark cluster</text>
  </section>
