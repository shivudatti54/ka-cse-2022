<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <rect fill="rgb(75, 102, 142)" x="0" y="0" width="420" height="400"/>
  <rect fill="rgb(255, 224, 255)" x="0" y="0" width="420" height="50" rx="10"/>
  <text transform="rotate(45 10 10)" font-size="24" font-family="Arial" fill="white">Data Topic: Count-Sort-Limit-Skip-Aggregate</text>
  <rect fill="rgb(75, 102, 142)" x="0" y="60" width="420" height="100"/>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze" xlink:href="#gradient"/>
  <rect id="gradient" fill="url(#gradient-linear)"/>
  <defs>
    <linearGradient id="gradient-linear" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(255, 228, 196)"/>
      <stop offset="50%" stop-color="rgb(231, 171, 170)"/>
      <stop offset="100%" stop-color="rgb(238, 130, 172)"/>
    </linearGradient>
  </defs>
  <g transform="translate(0, 120)">
    <rect fill="white" width="420" height="200"/>
    <rect fill="rgb(75, 102, 142)" x="0" y="0" width="100" height="50"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="black" data-narration="Count Function">Count Function</text>
    <text x="10" y="60" font-size="18" font-family="Arial" fill="black" data-narration="Definition: db.collection.count()[Syntax: db.collection.count([filter])][Examples: Count all documents in a collection: db.collection.count(), Count documents with a specific filter: db.collection.count({field: &quot;value&quot;})"></text>
    <rect fill="white" x="110" y="0" width="100" height="50"/>
    <text x="110" y="10" font-size="18" font-family="Arial" fill="black" data-narration="Sort Function">Sort Function</text>
    <text x="110" y="60" font-size="18" font-family="Arial" fill="black" data-narration="Definition: db.collection.sort([field1, field2, ...])[Syntax: db.collection.sort({ field1: 1, field2: -1 })][Examples: Sort documents in ascending order: db.collection.sort({ field: 1 }), Sort documents in descending order: db.collection.sort({ field: -1 })"></text>
    <rect fill="white" x="220" y="0" width="100" height="50"/>
    <text x="220" y="10" font-size="18" font-family="Arial" fill="black" data-narration="Limit Function">Limit Function</text>
    <text x="220" y="60" font-size="18" font-family="Arial" fill="black" data-narration="Definition: db.collection.find().limit(n)[Syntax: db.collection.find().limit(10)][Examples: Return the first 10 documents: db.collection.find().limit(10), Return the last 10 documents: db.collection.find().sort({ field: -1 }).limit(10)]"></text>
    <rect fill="white" x="330" y="0" width="100" height="50"/>
    <text x="330" y="10" font-size="18" font-family="Arial" fill="black" data-narration="Skip Function">Skip Function</text>
    <text x="330" y="60" font-size="18" font-family="Arial" fill="black" data-narration="Definition: db.collection.find().skip(n)[Syntax: db.collection.find().skip(10)][Examples: Skip the first 10 documents: db.collection.find().skip(10), Skip the last 10 documents: db.collection.find().sort({ field: -1 }).skip(10)]"></text>
    <rect fill="white" x="0" y="250" width="420" height="50"/>
    <text x="0" y="260" font-size="18" font-family="Arial" fill="black" data-narration="Aggregate Function">Aggregate Function</text>
    <rect fill="rgb(75, 102, 142)" x="0" y="310" width="420" height="50"/>
    <text x="10" y="320" font-size="18" font-family="Arial" fill="black" data-narration="Definition: db.collection.aggregate()[Syntax: db.collection.aggregate()][Examples: Perform complex data processing operations on a collection: db.collection.aggregate()]"></text>
    <animate xlink:href="#arrow" begin="2s" dur="2s" fill="freeze"/>
    <path id="arrow" fill="white" d="M 10, 340 L 360, 340 M 10, 340 L 10, 10" transform="translate(0, 10)"/>
  </g>
  <rect fill="rgb(75, 102, 142)" x="0" y="370" width="420" height="30"/>
  <text x="10" y="380" font-size="18" font-family="Arial" fill="black">Data Topic: Count-Sort-Limit-Skip-Aggregate</text>
  <rect fill="rgb(75, 102, 142)" x="0" y="400" width="420" height="10"/>
  <text x="10" y="410" font-size="18" font-family="Arial" fill="black" transform="rotate(45 410 410)" data-topic-id="Count-Sort-Limit-Skip-Aggregate">Count-Sort-Limit-Skip-Aggregate</text>
</svg>