<svg width="420" height="400" data-topic-id="9-Use-CDH-Cloudera-Distribution-For-Hadoop-And-HUE"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Introduction Section -->
  <rect x="10" y="10" width="400" height="50" fill="url(#gradient)" rx="10"/>
  <text x="20" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#4F69C3">
    Introduction
  </text>
  <animate transform="rotate(360 200 100)" dur="4000" begin="0s"/>
  
  <!-- What is CDH and HUE Section -->
  <rect x="10" y="70" width="400" height="50" fill="url(#gradient)" rx="10"/>
  <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#4F69C3">
    What is CDH and HUE
  </text>
  <text x="20" y="120" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#969696">
    CDH is a popular open-source Big Data platform that supports Hadoop, Pig, Hive, and other related technologies.
    HUE is a web-based interface for Hadoop that allows users to interact with their data and perform various operations like data exploration, data processing, and data visualization.
  </text>
  <animate transform="rotate(720 200 100)" dur="4000" begin="0s"/>
  
  <!-- Setting up CDH and HUE Section -->
  <rect x="10" y="170" width="400" height="50" fill="url(#gradient)" rx="10"/>
  <text x="20" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#4F69C3">
    Setting up CDH and HUE
  </text>
  <text x="20" y="220" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#969696">
    To set up CDH and HUE, follow these steps:
    Download and install CDH from the official website.
    Install HUE on top of CDH.
    Configure HUE to connect to the CDH cluster.
    Create a sample dataset in HUE.
  </text>
  <animate transform="rotate(1080 200 100)" dur="4000" begin="0s"/>
  
  <!-- Analyzing Data with CDH and HUE Section -->
  <rect x="10" y="310" width="400" height="50" fill="url(#gradient)" rx="10"/>
  <text x="20" y="330" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#4F69C3">
    Analyzing Data with CDH and HUE
  </text>
  <text x="20" y="360" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#969696">
    CDH and HUE provide various tools for data analysis, including:
    MapReduce: A programming model for processing large datasets in parallel.
    Pig: A high-level data processing language for data transformation and analysis.
  </text>
  <animate transform="rotate(1440 200 100)" dur="4000" begin="0s"/>
  
  <!-- Generating Reports with CDH and HUE Section -->
  <rect x="10" y="400" width="400" height="50" fill="url(#gradient)" rx="10"/>
  <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#4F69C3">
    Generating Reports with CDH and HUE
  </text>
  <text x="20" y="450" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#969696">
    CDH and HUE provide various tools for data reporting, including:
    Data visualization: Create interactive and dynamic visualizations to represent data insights.
    Data summarization: Generate reports and summaries to summarize data trends and patterns.
  </text>
  <animate transform="rotate(1800 200 100)" dur="4000" begin="0s"/>
</svg>