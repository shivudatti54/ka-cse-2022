<svg width="420" height="400" data-topic-id="And-Filter-The-Data">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient-background)"/>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#333333" text-anchor="middle">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,100" dur="2s" begin="0s"/>
  </g>
  
  <!-- Section 2: What is Data Filtering -->
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#333333" text-anchor="middle">What is Data Filtering?</text>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#666666" text-anchor="middle">Data filtering is the process of selecting specific data from a larger dataset based on predefined criteria.</text>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,200" dur="2s" begin="0s"/>
  </g>
  
  <!-- Section 3: Types of Data Filtering -->
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#333333" text-anchor="middle">Types of Data Filtering</text>
    <rect x="20" y="60" width="100" height="20" fill="#66CCCC" rx="5"/>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#666666" text-anchor="middle">Simple Filtering</text>
    <rect x="140" y="60" width="100" height="20" fill="#FFA07A" rx="5"/>
    <text x="140" y="80" font-size="18" font-family="Arial" fill="#666666" text-anchor="middle">Complex Filtering</text>
    <animateTransform attributeName="transform" type="translate" from="0,250" to="0,300" dur="2s" begin="0s"/>
  </g>
  
  <!-- Section 4: Filtering Data in Spark -->
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#333333" text-anchor="middle">Filtering Data in Spark</text>
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#666666" text-anchor="middle">The `filter()` method is used to apply a predicate function to each element in the dataset.</text>
    <animateTransform attributeName="transform" type="translate" from="0,350" to="0,400" dur="2s" begin="0s"/>
  </g>
  
  <!-- Section 5: Example - Simple Filtering -->
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#333333" text-anchor="middle">Example - Simple Filtering</text>
    <rect x="20" y="60" width="100" height="20" fill="#66CCCC" rx="5"/>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#666666" text-anchor="middle">SELECT * FROM orders WHERE totalCost > 150</text>
    <rect x="140" y="60" width="100" height="20" fill="#FFA07A" rx="5"/>
    <text x="140" y="80" font-size="18" font-family="Arial" fill="#666666" text-anchor="middle">Total Cost > 150</text>
    <animateTransform attributeName="transform" type="translate" from="0,200" to="0,250" dur="2s" begin="0s"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 400)">
    <rect x="0" y="0" width="400" height="50" fill="#FFFFFF" rx="10"/>
    <text x="20" y="25" font-size="18" font-family="Arial" fill="#333333" text-anchor="middle"> learn.spark</text>
  </g>
</svg>