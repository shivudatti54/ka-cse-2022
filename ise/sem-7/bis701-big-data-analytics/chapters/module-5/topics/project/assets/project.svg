<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="big-data-analytics">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5c8bee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6baed6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <title>Project</title>
  <text x="20" y="40" font-size="24" font-family="Arial" text-anchor="middle">Project Overview</text>
  <rect x="10" y="60" width="400" height="50" fill="#f0f0f0"/>
  <text x="20" y="70" font-size="18" font-family="Arial" text-anchor="middle" data-narration>Project Overview</text>
  <animate transform="rotate(360 210 150)" begin="0s" dur="2s" repeatCount="indefinite"/>
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="100" height="50" fill="#fff"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="middle">Step 1: Data Preparation</text>
    <animate transform="rotate(360 50 75)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="110" y="0" width="100" height="50" fill="#fff"/>
    <text x="120" y="15" font-size="18" font-family="Arial" text-anchor="middle">Step 2: Data Analysis</text>
    <animate transform="rotate(360 220 75)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="230" y="0" width="100" height="50" fill="#fff"/>
    <text x="240" y="15" font-size="18" font-family="Arial" text-anchor="middle">Project Ideas</text>
    <animate transform="rotate(360 310 75)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="110" width="100" height="50" fill="#fff"/>
    <text x="10" y="125" font-size="18" font-family="Arial" text-anchor="middle">Example Code</text>
    <animate transform="rotate(360 50 150)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="110" y="110" width="100" height="50" fill="#fff"/>
    <text x="120" y="125" font-size="18" font-family="Arial" text-anchor="middle">Data Topic</text>
    <animate transform="rotate(360 210 150)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="230" y="110" width="100" height="50" fill="#fff"/>
    <text x="240" y="125" font-size="18" font-family="Arial" text-anchor="middle">Requirements</text>
    <animate transform="rotate(360 310 150)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="210" width="100" height="50" fill="#fff"/>
    <text x="10" y="225" font-size="18" font-family="Arial" text-anchor="middle">Title</text>
    <animate transform="rotate(360 50 250)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="320" width="400" height="50" fill="#f0f0f0"/>
    <text x="20" y="330" font-size="18" font-family="Arial" text-anchor="middle" data-narration>Project Big Data Analytics</text>
  </g>
  <rect x="10" y="360" width="400" height="50" fill="#f0f0f0"/>
  <text x="20" y="370" font-size="18" font-family="Arial" text-anchor="middle" data-narration> "</text>
  <animate transform="rotate(360 210 300)" begin="0s" dur="2s" repeatCount="indefinite"/>
</svg>