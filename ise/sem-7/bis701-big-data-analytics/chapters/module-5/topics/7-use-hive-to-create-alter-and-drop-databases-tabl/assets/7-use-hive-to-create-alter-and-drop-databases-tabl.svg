<svg width="420" height="400" data-topic-id="7-use-hive-to-create-alter-and-drop-databases-tables-views-functions-and-indexes">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ACC5FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#A7C4E5" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <title>7 Use Hive to Create, Alter, and Drop Databases, Tables, Views, Functions, and Indexes</title>
  <rect x="15" y="15" width="370" height="350" fill="#F5F5F5" rx="10" />
  <text x="20" y="50" font-size="18" font-family="Arial" font-weight="bold" fill="#2F4F7F">Creating Databases</text>
  <section data-narration="Creating a database in Hive is a straightforward process.">
    <rect x="20" y="80" width="330" height="50" fill="#F5F5F5" rx="10" />
    <text x="25" y="90" font-size="14" font-family="Arial" fill="#333">CREATE DATABASE mydatabase;</text>
    <animate transform="rotate(360 20 80)" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="A table is a collection of data that is stored in a Hive database.">
    <rect x="20" y="140" width="330" height="50" fill="#F5F5F5" rx="10" />
    <text x="25" y="150" font-size="14" font-family="Arial" fill="#333">CREATE TABLE mytable (id INT, name STRING, age INT);</text>
    <animate transform="rotate(720 20 140)" begin="2s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="You can alter a table by adding, modifying, or removing columns.">
    <rect x="20" y="200" width="330" height="50" fill="#F5F5F5" rx="10" />
    <text x="25" y="210" font-size="14" font-family="Arial" fill="#333">ALTER TABLE mytable ADD COLUMN city STRING; ALTER TABLE mytable MODIFY name STRING(255);</text>
    <animate transform="rotate(1080 20 200)" begin="4s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="You can drop a table by using the DROP TABLE statement.">
    <rect x="20" y="260" width="330" height="50" fill="#F5F5F5" rx="10" />
    <text x="25" y="270" font-size="14" font-family="Arial" fill="#333">DROP TABLE mytable;</text>
    <animate transform="rotate(1440 20 260)" begin="6s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="A view is a virtual table that is based on the result of a SQL query.">
    <rect x="20" y="320" width="330" height="50" fill="#F5F5F5" rx="10" />
    <text x="25" y="330" font-size="14" font-family="Arial" fill="#333">CREATE VIEW myview AS SELECT id, name, age FROM mytable;</text>
    <animate transform="rotate(1800 20 320)" begin="8s" dur="2s" repeatCount="indefinite" />
  </section>
  <footertext>Learn more about Hive at <a href="https://hive.apache.org/">https://hive.apache.org/</a>.</footertext>
</svg>