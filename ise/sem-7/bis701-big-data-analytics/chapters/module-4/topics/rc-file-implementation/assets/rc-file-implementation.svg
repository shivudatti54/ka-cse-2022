<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="rc-file-implementation">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>
    <linearGradient id="allowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#1B5E20"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C62828"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#546E7A"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- GROUP 1: Title and Web Server (0.3s) -->
  <g data-narration="Content Security Policy is an HTTP response header that instructs the browser which resource sources are trusted. The web server sends the CSP header along with the HTML response.">
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#283593" opacity="0">
      Content Security Policy (CSP) Implementation
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
    </text>
    <!-- Web Server box -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
      <rect x="20" y="45" width="110" height="55" fill="url(#serverGrad)" rx="8"/>
      <text x="75" y="67" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Web Server</text>
      <text x="75" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">Sends CSP</text>
      <text x="75" y="92" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">Header</text>
    </g>
  </g>

  <!-- GROUP 2: HTTP Response with CSP Header (1.5s) -->
  <g data-narration="The HTTP response includes the CSP header. For example: Content-Security-Policy: default-src self; script-src self https://trusted.cdn.com. This defines which origins are allowed for each resource type.">
    <!-- Arrow Server -> Header -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
      <line x1="132" y1="72" x2="148" y2="72" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    </g>
    <!-- CSP Header box -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
      <rect x="150" y="40" width="150" height="65" fill="url(#headerGrad)" rx="8"/>
      <text x="225" y="57" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">HTTP Response</text>
      <text x="225" y="70" text-anchor="middle" font-family="monospace" font-size="7" fill="#B2DFDB">Content-Security-Policy:</text>
      <text x="225" y="81" text-anchor="middle" font-family="monospace" font-size="7" fill="#80CBC4">default-src 'self';</text>
      <text x="225" y="92" text-anchor="middle" font-family="monospace" font-size="7" fill="#80CBC4">script-src 'self' cdn.com</text>
    </g>
    <!-- Arrow Header -> Browser -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.8s" fill="freeze"/>
      <line x1="302" y1="72" x2="318" y2="72" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    </g>
    <!-- Browser box -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
      <rect x="320" y="45" width="85" height="55" fill="url(#browserGrad)" rx="8"/>
      <text x="362" y="67" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Browser</text>
      <text x="362" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFE0B2">Enforces</text>
      <text x="362" y="92" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFE0B2">Policy</text>
    </g>
  </g>

  <!-- GROUP 3: CSP Directives Table (3.0s) -->
  <g data-narration="CSP uses directives to control different resource types. default-src is the fallback, script-src controls JavaScript, style-src controls CSS, img-src controls images, connect-src controls AJAX and WebSocket connections, and frame-src controls iframes.">
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
      <rect x="20" y="115" width="185" height="130" fill="white" fill-opacity="0.85" rx="8" stroke="#3949AB" stroke-width="1"/>
      <text x="112" y="133" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Core Directives</text>
      <line x1="30" y1="138" x2="195" y2="138" stroke="#C5CAE9" stroke-width="0.5"/>
      <!-- Directive entries -->
      <text x="35" y="153" font-family="monospace" font-size="8" font-weight="bold" fill="#3949AB">default-src</text>
      <text x="115" y="153" font-family="Arial" font-size="8" fill="#37474F">Fallback for all types</text>
      <text x="35" y="167" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">script-src</text>
      <text x="115" y="167" font-family="Arial" font-size="8" fill="#37474F">JavaScript execution</text>
      <text x="35" y="181" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">style-src</text>
      <text x="115" y="181" font-family="Arial" font-size="8" fill="#37474F">CSS stylesheets</text>
      <text x="35" y="195" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">img-src</text>
      <text x="115" y="195" font-family="Arial" font-size="8" fill="#37474F">Image loading</text>
      <text x="35" y="209" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">connect-src</text>
      <text x="115" y="209" font-family="Arial" font-size="8" fill="#37474F">XHR, WebSocket</text>
      <text x="35" y="223" font-family="monospace" font-size="8" font-weight="bold" fill="#C62828">frame-src</text>
      <text x="115" y="223" font-family="Arial" font-size="8" fill="#37474F">iframe embedding</text>
      <text x="35" y="237" font-family="monospace" font-size="8" font-weight="bold" fill="#C62828">form-action</text>
      <text x="115" y="237" font-family="Arial" font-size="8" fill="#37474F">Form submissions</text>
    </g>
  </g>

  <!-- GROUP 4: Source Values (4.5s) -->
  <g data-narration="Directives accept various source values: 'none' blocks all resources, 'self' allows same-origin resources, 'unsafe-inline' allows inline scripts and styles, 'unsafe-eval' allows eval functions, and specific domains can be whitelisted.">
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
      <rect x="215" y="115" width="190" height="130" fill="white" fill-opacity="0.85" rx="8" stroke="#E65100" stroke-width="1"/>
      <text x="310" y="133" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Source Values</text>
      <line x1="225" y1="138" x2="395" y2="138" stroke="#FFE0B2" stroke-width="0.5"/>
      <!-- Source value entries -->
      <rect x="225" y="144" width="55" height="16" fill="#C62828" rx="3"/>
      <text x="252" y="155" text-anchor="middle" font-family="monospace" font-size="7" fill="white">'none'</text>
      <text x="290" y="155" font-family="Arial" font-size="8" fill="#37474F">Block all resources</text>
      <rect x="225" y="165" width="55" height="16" fill="#2E7D32" rx="3"/>
      <text x="252" y="176" text-anchor="middle" font-family="monospace" font-size="7" fill="white">'self'</text>
      <text x="290" y="176" font-family="Arial" font-size="8" fill="#37474F">Same origin only</text>
      <rect x="225" y="186" width="75" height="16" fill="#E65100" rx="3"/>
      <text x="262" y="197" text-anchor="middle" font-family="monospace" font-size="7" fill="white">'unsafe-inline'</text>
      <text x="308" y="197" font-family="Arial" font-size="8" fill="#37474F">Inline code</text>
      <rect x="225" y="207" width="75" height="16" fill="#E65100" rx="3"/>
      <text x="262" y="218" text-anchor="middle" font-family="monospace" font-size="7" fill="white">'unsafe-eval'</text>
      <text x="308" y="218" font-family="Arial" font-size="8" fill="#37474F">eval() funcs</text>
      <rect x="225" y="228" width="55" height="16" fill="#3949AB" rx="3"/>
      <text x="252" y="239" text-anchor="middle" font-family="monospace" font-size="7" fill="white">domain</text>
      <text x="290" y="239" font-family="Arial" font-size="8" fill="#37474F">Specific domain</text>
    </g>
  </g>

  <!-- GROUP 5: Enforcement Decision Flow (6.0s) -->
  <g data-narration="When the page attempts to load a resource, the browser checks it against the CSP whitelist. If the source is whitelisted, the resource is allowed to load. If not, the resource is blocked and a violation report can be generated.">
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
      <!-- Central decision diamond -->
      <polygon points="210,265 260,290 210,315 160,290" fill="#3949AB" stroke="#283593" stroke-width="1"/>
      <text x="210" y="287" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Source in</text>
      <text x="210" y="297" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">whitelist?</text>
      <!-- Arrow from browser down to decision -->
      <path d="M362,100 L362,260 L262,282" stroke="#546E7A" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowGray)"/>
      <text x="370" y="180" font-family="Arial" font-size="7" fill="#37474F" writing-mode="tb">Resource Request</text>
      <!-- YES path - Allowed -->
      <line x1="158" y1="290" x2="85" y2="290" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>
      <text x="120" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2E7D32">YES</text>
      <rect x="15" y="272" width="68" height="36" fill="url(#allowGrad)" rx="6"/>
      <text x="49" y="288" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Allowed</text>
      <text x="49" y="300" text-anchor="middle" font-family="monospace" font-size="7" fill="#C8E6C9">load OK</text>
      <!-- NO path - Blocked -->
      <line x1="262" y1="290" x2="328" y2="290" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)"/>
      <text x="295" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">NO</text>
      <rect x="330" y="272" width="75" height="36" fill="url(#blockGrad)" rx="6"/>
      <text x="367" y="288" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Blocked</text>
      <text x="367" y="300" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFCDD2">+ violation</text>
    </g>
  </g>

  <!-- GROUP 6: Deployment Strategy (7.5s) -->
  <g data-narration="CSP deployment follows a phased approach: first use Report-Only mode to monitor, then gradually tighten restrictions, analyze violation reports, and finally switch to full enforcement. Modern apps can use nonce-based or hash-based CSP for inline scripts.">
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
      <rect x="20" y="325" width="380" height="65" fill="white" fill-opacity="0.7" rx="8" stroke="#00695C" stroke-width="1"/>
      <text x="210" y="340" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Phased Deployment Strategy</text>
      <!-- Phase boxes -->
      <rect x="30" y="348" width="80" height="32" fill="#3949AB" rx="5"/>
      <text x="70" y="362" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">1. Report-Only</text>
      <text x="70" y="373" text-anchor="middle" font-family="monospace" font-size="6" fill="#C5CAE9">Monitor issues</text>
      <line x1="112" y1="364" x2="122" y2="364" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowGray)"/>
      <rect x="125" y="348" width="80" height="32" fill="#00695C" rx="5"/>
      <text x="165" y="362" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">2. Gradual</text>
      <text x="165" y="373" text-anchor="middle" font-family="monospace" font-size="6" fill="#B2DFDB">Tighten rules</text>
      <line x1="207" y1="364" x2="217" y2="364" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowGray)"/>
      <rect x="220" y="348" width="80" height="32" fill="#E65100" rx="5"/>
      <text x="260" y="362" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">3. Analyze</text>
      <text x="260" y="373" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFE0B2">Check reports</text>
      <line x1="302" y1="364" x2="312" y2="364" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowGray)"/>
      <rect x="315" y="348" width="75" height="32" fill="#2E7D32" rx="5"/>
      <text x="352" y="362" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">4. Enforce</text>
      <text x="352" y="373" text-anchor="middle" font-family="monospace" font-size="6" fill="#C8E6C9">Full CSP</text>
    </g>
  </g>
</svg>