<svg width="420" height="400" data-topic-id="big-data-analytics-hive-introduction-101-1015">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A88D8"/>
      <stop offset="100%" stop-color="#66CCCC"/>
    </linearGradient>
    <style>
      .section {
        background: url(#gradient) no-repeat;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .section[data-narration="Hive"] {
        background-color: #3B5998;
      }
      .section[data-narration="Hive Query Language"] {
        background-color: #34A85A;
      }
      .section[data-narration="Hive Schema"] {
        background-color: #FFC107;
      }
      .section[data-narration="Partitioning"] {
        background-color: #FF9800;
      }
      .section[data-narration="Hive Architecture"] {
        background-color: #2196F3;
      }
      .section[data-narration="Data Flow"] {
        background-color: #8BC34A;
      }
    </style>
  </defs>

  <title>Big Data Analytics: Introduction to Hive</title>

  <text x="50%" y="5%" font-size="24" font-family="Arial" text-anchor="middle">Big Data Analytics: Introduction to Hive</text>

  <section data-narration="Hive" data-label="Hive" data-topic-id="big-data-analytics-hive-introduction-101-1015">
    <text x="10%" y="5%" font-size="18" font-family="Arial">What is Hive?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="50%,100%" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="30%" font-size="18" font-family="Arial">Hive is an open-source data warehousing and SQL-like query language for Hadoop.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150%" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10%" y="100%" width="80%" height="20%" fill="#66CCCC" rx="10"/>
    <text x="10%" y="120%" font-size="16" font-family="Arial" text-anchor="middle">Hive provides a way to analyze and process large datasets stored in Hadoop Distributed File System (HDFS).</text>
  </section>

  <section data-narration="Hive Query Language" data-label="Hive Query Language" data-topic-id="big-data-analytics-hive-introduction-101-1015">
    <text x="10%" y="5%" font-size="18" font-family="Arial">What is Hive Query Language?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="50%,100%" begin="2s" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="30%" font-size="18" font-family="Arial">Hive Query Language (HQL) is a SQL-like language used for querying and manipulating data in Hive.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150%" begin="2s" dur="2s" repeatCount="indefinite"/>
    <rect x="10%" y="100%" width="80%" height="20%" fill="#34A85A" rx="10"/>
    <text x="10%" y="120%" font-size="16" font-family="Arial" text-anchor="middle">HQL is used to create views, execute queries, and manipulate data in Hive.</text>
  </section>

  <section data-narration="Hive Schema" data-label="Hive Schema" data-topic-id="big-data-analytics-hive-introduction-101-1015">
    <text x="10%" y="5%" font-size="18" font-family="Arial">What is Hive Schema?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="50%,100%" begin="4s" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="30%" font-size="18" font-family="Arial">Hive Schema is a schema that defines the structure of a Hive table or view.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150%" begin="4s" dur="2s" repeatCount="indefinite"/>
    <rect x="10%" y="100%" width="80%" height="20%" fill="#FFC107" rx="10"/>
    <text x="10%" y="120%" font-size="16" font-family="Arial" text-anchor="middle">Hive Schema defines the columns, data types, and relationships between tables.</text>
  </section>

  <section data-narration="Partitioning" data-label="Partitioning" data-topic-id="big-data-analytics-hive-introduction-101-1015">
    <text x="10%" y="5%" font-size="18" font-family="Arial">What is Partitioning?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="50%,100%" begin="6s" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="30%" font-size="18" font-family="Arial">Partitioning is a technique used to store data in separate files based on a key or attribute.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150%" begin="6s" dur="2s" repeatCount="indefinite"/>
    <rect x="10%" y="100%" width="80%" height="20%" fill="#FF9800" rx="10"/>
    <text x="10%" y="120%" font-size="16" font-family="Arial" text-anchor="middle">Partitioning improves query performance, reduces storage needs, and simplifies data maintenance.</text>
  </section>

  <section data-narration="Hive Architecture" data-label="Hive Architecture" data-topic-id="big-data-analytics-hive-introduction-101-1015">
    <text x="10%" y="5%" font-size="18" font-family="Arial">What is Hive Architecture?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="50%,100%" begin="8s" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="30%" font-size="18" font-family="Arial">Hive Architecture is the overall structure of the Hive system, consisting of the Metastore, Hive Query Engine, and Hive UI.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150%" begin="8s" dur="2s" repeatCount="indefinite"/>
    <rect x="10%" y="100%" width="80%" height="20%" fill="#2196F3" rx="10"/>
    <text x="10%" y="120%" font-size="16" font-family="Arial" text-anchor="middle">The Metastore stores metadata about the Hive schema, the Hive Query Engine executes HQL queries, and the Hive UI provides a web-based interface for managing the schema and executing queries.</text>
  </section>

  <section data-narration="Data Flow" data-label="Data Flow" data-topic-id="big-data-analytics-hive-introduction-101-1015">
    <text x="10%" y="5%" font-size="18" font-family="Arial">What is Data Flow?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="50%,100%" begin="10s" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="30%" font-size="18" font-family="Arial">Data Flow describes the process of ingesting data into HDFS, creating a Hive schema, storing data, executing queries, and analyzing results.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150%" begin="10s" dur="2s" repeatCount="indefinite"/>
    <rect x="10%" y="100%" width="80%" height="20%" fill="#8BC34A" rx="10"/>
    <text x="10%" y="120%" font-size="16" font-family="Arial" text-anchor="middle">Data Flow is essential for understanding the life cycle of data in Hive, from ingestion to analysis.</text>
  </section>

  <footer><text x="50%" y="95%" font-size="18" font-family="Arial">Big Data Analytics: Introduction to Hive</text></footer>
</svg>