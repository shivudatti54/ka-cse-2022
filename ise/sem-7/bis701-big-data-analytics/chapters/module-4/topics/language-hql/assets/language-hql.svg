<svg width="420" height="400" data-topic-id="language-hql" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65A0E7" stop-opacity="1" />
      <stop offset="100%" stop-color="#45A0E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%" rx="20" />
  <title>Language HQL</title>
  <g transform="translate(20, 20)">
    <!-- Introduction Section -->
    <rect fill="#FFFFFF" width="300" height="50" rx="10" />
    <text x="10" y="15" fill="#333333" font-size="16">Introduction</text>
    <text x="10" y="30" fill="#666666" font-size="14">Hive Query Language (HQL) is a SQL-like language used to manage and analyze data in Hive, a data warehousing and SQL-like query language for Hadoop.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
    <rect fill="#FFFFFF" width="100%" height="10" rx="5" fill-opacity="0" opacity="1" />
  </g>
  <g transform="translate(20, 80)">
    <!-- Syntax and Structure Section -->
    <rect fill="#FFFFFF" width="300" height="50" rx="10" />
    <text x="10" y="15" fill="#333333" font-size="16">Syntax and Structure</text>
    <text x="10" y="30" fill="#666666" font-size="14">HQL syntax is similar to SQL syntax, with a few differences. Here are some key features of HQL syntax:</text>
    <rect fill="#FFFFFF" width="100%" height="10" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
    <rect fill="#FFFFFF" width="100%" height="20" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
  </g>
  <g transform="translate(20, 130)">
    <!-- Basic Syntax Section -->
    <rect fill="#FFFFFF" width="300" height="50" rx="10" />
    <text x="10" y="15" fill="#333333" font-size="16">Basic Syntax</text>
    <text x="10" y="30" fill="#666666" font-size="14">Here are some basic HQL syntax elements:</text>
    <rect fill="#FFFFFF" width="100%" height="10" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
    <rect fill="#FFFFFF" width="100%" height="20" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,170" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
  </g>
  <g transform="translate(20, 200)">
    <!-- Data Types Section -->
    <rect fill="#FFFFFF" width="300" height="50" rx="10" />
    <text x="10" y="15" fill="#333333" font-size="16">Data Types</text>
    <text x="10" y="30" fill="#666666" font-size="14">Hive supports various data types, including:</text>
    <rect fill="#FFFFFF" width="100%" height="10" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,220" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
    <rect fill="#FFFFFF" width="100%" height="20" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,240" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
  </g>
  <g transform="translate(20, 250)">
    <!-- Example Queries Section -->
    <rect fill="#FFFFFF" width="300" height="50" rx="10" />
    <text x="10" y="15" fill="#333333" font-size="16">Example Queries</text>
    <text x="10" y="30" fill="#666666" font-size="14">Here are some examples of HQL queries:</text>
    <rect fill="#FFFFFF" width="100%" height="10" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,270" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
    <rect fill="#FFFFFF" width="100%" height="20" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,290" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
  </g>
  <g transform="translate(20, 290)">
    <rect fill="#FFFFFF" width="300" height="50" rx="10" />
    <text x="10" y="15" fill="#333333" font-size="16">Footer</text>
    <rect fill="#FFFFFF" width="100%" height="10" rx="5" fill-opacity="0" opacity="1" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,310" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate fill="freeze" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
  </g>
</svg>