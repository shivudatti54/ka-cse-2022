<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="introduction-to-map-reduce-programming-introductio" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Add some basic styling */
    body {
      background-color: #f7f7f7;
      font-family: Arial, sans-serif;
    }
    /* Gradient background */
    .gradient {
      background-image: linear-gradient(to bottom, #87ceeb, #4682b4);
      background-size: 100% 100%;
      height: 100%;
    }
    /* Pastel colors */
    .pastel {
      color: #c9e4ca;
    }
    /* Professional color scheme */
    .indigo {
      color: #3b3f54;
    }
    .teal {
      color: #0097a7;
    }
    .orange {
      color: #ffc107;
    }
  </style>
  <!-- Title -->
  <rect x="10" y="10" width="400" height="50" fill="#87ceeb" rx="10" data-narration="Introduction to Map Reduce Programming" class="title"></rect>
  <!-- Gradient background -->
  <rect x="0" y="60" width="420" height="280" fill="url(#gradient)" class="gradient"></rect>
  <!-- Pastel colored text -->
  <g transform="translate(10, 60)">
    <text x="10" y="100" fill="#c9e4ca" class="pastel" data-narration="What is Map Reduce?">Map Reduce is a programming model used for processing large data sets in parallel across a cluster of computers.</text>
    <text x="10" y="120" fill="#c9e4ca" class="pastel" data-narration="Why Map Reduce?">Map Reduce can handle large data sets by distributing the data across a cluster of computers, making it suitable for big data analytics.</text>
    <text x="10" y="140" fill="#c9e4ca" class="pastel" data-narration="Why Not RDBMS?">Map Reduce can process large data sets in parallel, resulting in faster processing times, unlike RDBMS which becomes slow and inefficient as the data volume increases.</text>
    <text x="10" y="160" fill="#c9e4ca" class="pastel" data-narration="RDBMS vs Hadoop">Map Reduce is highly scalable and flexible, unlike RDBMS which has limitations on the maximum size of a single row and column, making it unsuitable for big data.</text>
    <text x="10" y="180" fill="#c9e4ca" class="pastel" data-narration="History of Map Reduce">The concept of Map Reduce was first introduced by Google's research team in 2004, and the Apache Hadoop project was established in 2006 to implement the Map Reduce model.</text>
  </g>
  <!-- Arrow markers for connections -->
  <g transform="translate(10, 300)">
    <line x1="20" y1="320" x2="100" y2="320" stroke="#4682b4" stroke-width="2" data-narration="Scalability"></line>
    <line x1="20" y1="320" x2="100" y2="320" stroke="#4682b4" stroke-width="2" data-narration="Flexibility"></line>
    <line x1="20" y1="320" x2="100" y2="320" stroke="#4682b4" stroke-width="2" data-narration="Performance"></line>
    <line x1="20" y1="320" x2="100" y2="320" stroke="#4682b4" stroke-width="2" data-narration="Why Not RDBMS?"></line>
  </g>
  <!-- Footer -->
  <rect x="10" y="370" width="400" height="30" fill="#87ceeb" rx="10" class="footer"></rect>
  <text x="10" y="390" fill="#3b3f54" class="indigo" data-narration="Learn more about Map Reduce programming model and its applications in big data analytics"></text>
</svg>