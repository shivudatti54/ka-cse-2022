<svg width="420" height="400" data-topic-id="tb1-ch-5-51" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#CCFFCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10" opacity="0.8"/>
  
  <!-- title -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
    <tspan>Big Data Analytics</tspan>
  </text>
  
  <!-- section 1 -->
  <rect x="50" y="60" width="320" height="100" rx="10" fill="#C9E4CA" opacity="0.8"/>
  <text x="50%" y="70" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Hadoop is an open-source, distributed computing framework that enables the processing and storage of large amounts of data in a scalable and fault-tolerant manner.">
    <tspan>What is Hadoop?</tspan>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0,50,60" to="360,50,60" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- section 2 -->
  <rect x="50" y="170" width="320" height="100" rx="10" fill="#C9E4CA" opacity="0.8"/>
  <text x="50%" y="180" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Hadoop was created by Doug Cutting and Mike Cafarella in 2005.">
    <tspan>History of Hadoop</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,180" to="0,220" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- section 3 -->
  <rect x="50" y="280" width="320" height="100" rx="10" fill="#C9E4CA" opacity="0.8"/>
  <text x="50%" y="290" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Hadoop can handle large amounts of data by distributing it across a cluster of nodes, making it suitable for big data analytics.">
    <tspan>Scalability of Hadoop</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,290" to="0,320" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- section 4 -->
  <rect x="50" y="380" width="320" height="100" rx="10" fill="#C9E4CA" opacity="0.8"/>
  <text x="50%" y="390" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Hadoop supports various data formats and can be used with different programming languages.">
    <tspan>Flexibility of Hadoop</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,390" to="0,420" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- section 5 -->
  <rect x="50" y="480" width="320" height="100" rx="10" fill="#C9E4CA" opacity="0.8"/>
  <text x="50%" y="490" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Hadoop is open-source and can be run on commodity hardware, making it a cost-effective solution.">
    <tspan>Cost-effectiveness of Hadoop</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,490" to="0,520" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- section 6 -->
  <rect x="50" y="570" width="320" height="100" rx="10" fill="#C9E4CA" opacity="0.8"/>
  <text x="50%" y="580" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Hadoop is not suitable for structured data due to its scalability limitations and data schema limitations.">
    <tspan>Limitations of RDBMS</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,580" to="0,610" dur="2000" begin="0s" repeatCount="indefinite"/>
  
  <!-- footer -->
  <text x="50%" y="600" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#2E4053">
    <tspan>footer</tspan>
  </text>
</svg>