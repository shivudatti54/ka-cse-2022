<svg width="420" height="400" data-topic-id="big-data-analytics-what-is-big-data-analytics-class">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CCFFCC" stop-opacity="1" />
      <stop offset="80%" stop-color="#B2FFFC" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(50, 50)">
    <text text-anchor="middle" x="180" y="20" font-size="24" font-family="Arial" fill="#3498db">Big Data Analytics</text>
    <rect x="20" y="100" width="280" height="150" fill="#f9f9f9" rx="10" />
    <g transform="rotate(45 180 100)">
      <text text-anchor="middle" x="180" y="100" font-size="18" font-family="Arial" fill="#3498db">Descriptive Analytics</text>
      <animateTransform attributeName="transform" type="rotate" from="0 180 100" to="360 180 100" dur="5s" begin="0s" />
    </g>
    <g transform="rotate(45 20 100)">
      <text text-anchor="middle" x="20" y="100" font-size="18" font-family="Arial" fill="#3498db">Diagnostic Analytics</text>
      <animateTransform attributeName="transform" type="rotate" from="0 20 100" to="360 20 100" dur="5s" begin="1s" />
    </g>
    <g transform="rotate(45 20 150)">
      <text text-anchor="middle" x="20" y="150" font-size="18" font-family="Arial" fill="#3498db">Predictive Analytics</text>
      <animateTransform attributeName="transform" type="rotate" from="0 20 150" to="360 20 150" dur="5s" begin="2s" />
    </g>
    <text text-anchor="middle" x="180" y="250" font-size="18" font-family="Arial" fill="#3498db">Classification</text>
    <rect x="20" y="200" width="280" height="100" fill="#f9f9f9" rx="10" />
    <g transform="rotate(45 180 200)">
      <text text-anchor="middle" x="180" y="200" font-size="18" font-family="Arial" fill="#3498db">Business Insights</text>
      <animateTransform attributeName="transform" type="rotate" from="0 180 200" to="360 180 200" dur="5s" begin="3s" />
    </g>
    <g transform="rotate(45 20 200)">
      <text text-anchor="middle" x="20" y="200" font-size="18" font-family="Arial" fill="#3498db">Key Characteristics</text>
      <animateTransform attributeName="transform" type="rotate" from="0 20 200" to="360 20 200" dur="5s" begin="4s" />
    </g>
  </g>
  <g transform="translate(50, 400)">
    <rect x="-20" y="-100" width="360" height="200" fill="#f9f9f9" rx="10" />
    <text text-anchor="middle" x="0" y="-80" font-size="18" font-family="Arial" fill="#3498db">What is Big Data Analytics?</text>
    <animateTransform attributeName="transform" type="rotate" from="0 0 -100" to="360 0 -100" dur="5s" begin="5s" />
  </g>
