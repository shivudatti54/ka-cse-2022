<svg width="420" height="400" data-topic-id="traditional-business-intelligence-vs-big-data">
  <rect x="0" y="0" width="420" height="400" fill="#C9E4CA" />
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="0s" dur="5s" values="0;1" />
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#2F4F7F" text-anchor="start">Traditional Business Intelligence</text>
  <text x="20" y="80" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">vs Big Data</text>
  <rect x="50" y="100" width="300" height="100" fill="#C9E4CA" rx="10" />
  <animate xlink:href="#rect1" begin="0s" dur="2s" attributeName="opacity" values="0;1" />
  <path id="rect1" d="M 50,100 L 350,100" fill="#C9E4CA" rx="10" />
  <text x="100" y="140" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="Traditional Business Intelligence refers to the use of data analysis and reporting to support business decision-making.">Traditional Business Intelligence</text>
  <rect x="50" y="220" width="300" height="100" fill="#C9E4CA" rx="10" />
  <animate xlink:href="#rect2" begin="2s" dur="2s" attributeName="opacity" values="0;1" />
  <path id="rect2" d="M 50,220 L 350,220" fill="#C9E4CA" rx="10" />
  <text x="100" y="260" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="It focuses on historical data and past trends and uses relational databases and data warehouses to analyze data.">Traditional Business Intelligence</text>
  <rect x="50" y="340" width="300" height="100" fill="#C9E4CA" rx="10" />
  <animate xlink:href="#rect3" begin="4s" dur="2s" attributeName="opacity" values="0;1" />
  <path id="rect3" d="M 50,340 L 350,340" fill="#C9E4CA" rx="10" />
  <text x="100" y="380" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="It uses predefined business rules and models to analyze data and is typically used for financial reporting, sales analysis, and customer segmentation.">Traditional Business Intelligence</text>
  <rect x="50" y="100" width="300" height="100" fill="#0087CE" rx="10" />
  <animate xlink:href="#rect4" begin="0s" dur="2s" attributeName="opacity" values="0;1" />
  <path id="rect4" d="M 50,100 L 350,100" fill="#0087CE" rx="10" />
  <text x="100" y="140" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="Big Data is characterized by large, complex, and diverse sets of data that are difficult to process using traditional Business Intelligence tools.">Big Data</text>
  <rect x="50" y="220" width="300" height="100" fill="#0087CE" rx="10" />
  <animate xlink:href="#rect5" begin="2s" dur="2s" attributeName="opacity" values="0;1" />
  <path id="rect5" d="M 50,220 L 350,220" fill="#0087CE" rx="10" />
  <text x="100" y="260" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="It has the ability to analyze large, complex data sets and identify new patterns and insights that can inform business decisions.">Big Data</text>
  <rect x="50" y="340" width="300" height="100" fill="#FFA07A" rx="10" />
  <animate xlink:href="#rect6" begin="4s" dur="2s" attributeName="opacity" values="0;1" />
  <path id="rect6" d="M 50,340 L 350,340" fill="#FFA07A" rx="10" />
  <text x="100" y="380" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start" data-narration="While Big Data has its advantages, it also requires specialized tools and technologies to analyze and process the data effectively.">Big Data</text>
  <rect x="0" y="0" width="420" height="40" fill="#2F4F7F" />
  <animate xlink:href="#rect7" begin="0s" dur="5s" attributeName="opacity" values="0;1" />
  <text x="20" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Business Intelligence vs Big Data</text>
  <rect x="0" y="390" width="420" height="40" fill="#2F4F7F" />
  <animate xlink:href="#rect8" begin="0s" dur="5s" attributeName="opacity" values="0;1" />
  <text x="20" y="400" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Learn More</text>
</svg>