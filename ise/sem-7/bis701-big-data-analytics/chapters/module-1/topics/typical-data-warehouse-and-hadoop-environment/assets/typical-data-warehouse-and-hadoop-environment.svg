<svg width="420" height="400" data-topic-id="data-warehouse-and-hadoop-environment">
  <defs>
    <style>
      .pastel {
        background-color: linear-gradient(to bottom, #C9E4CA, #B2FFFC);
      }
      .indigo {
        color: #3B5998;
      }
      .teal {
        color: #0097A7;
      }
      .orange {
        color: #FFC107;
      }
    </style>
  </defs>

  <title>Data Warehouse and Hadoop Environment</title>

  <rect class="pastel" x="0" y="0" width="100%" height="100%"></rect>

  <g transform="translate(10, 50)">
    <text class="indigo" x="0" y="15" font-size="24" font-family="Arial, sans-serif">Data Warehouse</text>
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="A centralized repository that stores data from various sources in a single location">
      Centralized Repository
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="It is designed to support business intelligence (BI) activities, such as data analysis, reporting, and decision-making">BI Activities
    </text>
  </g>

  <g transform="translate(150, 50)">
    <text class="indigo" x="0" y="15" font-size="24" font-family="Arial, sans-serif">Hadoop Environment</text>
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="An open-source, distributed computing framework that enables the processing of large datasets">Distributed Computing Framework
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="It enables the processing of large datasets">Large Datasets
    </text>
  </g>

  <g transform="translate(290, 50)">
    <text class="indigo" x="0" y="15" font-size="24" font-family="Arial, sans-serif">Evolution of Data Warehouses</text>
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="Data warehouses have evolved from relational databases to multidimensional databases and column-store databases">Evolution
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="They now support advanced analytics and data science applications">Advanced Analytics
    </text>
  </g>

  <g transform="translate(430, 50)">
    <text class="indigo" x="0" y="15" font-size="24" font-family="Arial, sans-serif">Examples of Data Warehouses</text>
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="Oracle Exadata is a high-performance data warehouse solution">Oracle Exadata
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="Amazon Redshift is a cloud-based data warehouse solution">Amazon Redshift
    </text>
    <text class="orange" x="40" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="Microsoft SQL Server Analysis Services is a column-store database solution">Microsoft SQL Server Analysis Services
    </text>
  </g>

  <g transform="translate(150, 200)">
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="Hadoop Environment is composed of several components">Hadoop Components
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="HDFS, MapReduce, YARN, and HBase are some of the key components">Key Components
    </text>
  </g>

  <g transform="translate(290, 200)">
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="Data Warehouses and Hadoop Environments are designed to support business intelligence activities">BI Activities
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="They enable the analysis, reporting, and decision-making processes">Analysis, Reporting, and Decision-Making
    </text>
  </g>

  <g transform="translate(430, 200)">
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="Data Warehouses and Hadoop Environments are designed to support advanced analytics">Advanced Analytics
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="They enable the analysis and pattern discovery">Analysis and Pattern Discovery
    </text>
  </g>

  <g transform="translate(150, 350)">
    <text class="indigo" x="0" y="15" font-size="24" font-family="Arial, sans-serif">Benefits of Data Warehouses and Hadoop Environments</text>
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="Data Warehouses and Hadoop Environments enable the analysis and reporting of large datasets">Data Analysis
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="They enable the identification of trends and patterns">Trend and Pattern Identification
    </text>
  </g>

  <g transform="translate(290, 350)">
    <text class="indigo" x="0" y="15" font-size="24" font-family="Arial, sans-serif">Challenges of Data Warehouses and Hadoop Environments</text>
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="Data Warehouses and Hadoop Environments require significant computational resources">Computational Resources
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="They require significant storage capacity">Storage Capacity
    </text>
  </g>

  <g transform="translate(430, 350)">
    <text class="indigo" x="0" y="15" font-size="24" font-family="Arial, sans-serif">Best Practices for Data Warehouses and Hadoop Environments</text>
    <rect class="pastel" x="-10" y="30" width="40" height="20" rx="5"></rect>
    <g fill="none" stroke="#000" stroke-width="2">
      <path d="M 0,20 L 20,40 L 40,20 Z"></path>
    </g>
    <text class="teal" x="10" y="45" font-size="18" font-family="Arial, sans-serif" data-narration="Regularly back up data to prevent loss">Data Backup
    </text>
    <text class="orange" x="20" y="60" font-size="18" font-family="Arial, sans-serif" data-narration="Monitor system performance to optimize resource utilization">System Monitoring
    </text>
  </g>

  <text class="indigo" x="10" y="380" font-size="18" font-family="Arial, sans-serif">References</text>
</svg>