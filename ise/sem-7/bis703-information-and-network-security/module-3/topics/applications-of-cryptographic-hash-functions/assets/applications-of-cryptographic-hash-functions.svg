<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Applications of Cryptographic Hash Functions</text>

  <!-- Step 0: Hash Function Basics -->
  <g id="step0" class="step" data-narration="A cryptographic hash function takes an input of any length and produces a fixed-size digest. It must be deterministic, one-way, collision-resistant, and exhibit the avalanche effect.">
    <rect x="60" y="55" width="680" height="55" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Hash Function: Input (any length) -> Fixed-size Digest</text>
    <text x="400" y="98" text-anchor="middle" font-size="11" fill="#555">Properties: One-way | Collision-resistant | Deterministic | Avalanche Effect</text>
  </g>

  <!-- Step 1: Three Key Properties -->
  <g id="step1" class="step" data-narration="The three critical security properties are pre-image resistance (cannot reverse), second pre-image resistance (cannot find alternate input), and collision resistance (cannot find any two colliding inputs).">
    <rect x="40" y="125" width="230" height="65" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="155" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Pre-image Resistance</text>
    <text x="155" y="162" text-anchor="middle" font-size="9" fill="#555">Given h, infeasible to find m</text>
    <text x="155" y="178" text-anchor="middle" font-size="9" fill="#555">where hash(m) = h</text>
    <rect x="285" y="125" width="230" height="65" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="400" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">2nd Pre-image Resistance</text>
    <text x="400" y="162" text-anchor="middle" font-size="9" fill="#555">Given m1, infeasible to find m2</text>
    <text x="400" y="178" text-anchor="middle" font-size="9" fill="#555">where hash(m1) = hash(m2)</text>
    <rect x="530" y="125" width="230" height="65" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="645" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Collision Resistance</text>
    <text x="645" y="162" text-anchor="middle" font-size="9" fill="#555">Infeasible to find any m1, m2</text>
    <text x="645" y="178" text-anchor="middle" font-size="9" fill="#555">where hash(m1) = hash(m2)</text>
  </g>

  <!-- Step 2: Application 1 - Data Integrity -->
  <g id="step2" class="step" data-narration="Data integrity verification is the most straightforward application. Compute the hash of a file, store it, and later recompute to check if the file has been altered.">
    <rect x="40" y="205" width="350" height="75" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">App 1: Data Integrity Verification</text>
    <rect x="60" y="240" width="60" height="24" rx="4" fill="#1976d2"/>
    <text x="90" y="256" text-anchor="middle" font-size="9" fill="#fff">File</text>
    <line x1="120" y1="252" x2="150" y2="252" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="153" y="240" width="55" height="24" rx="4" fill="#1565c0"/>
    <text x="180" y="256" text-anchor="middle" font-size="9" fill="#fff">Hash</text>
    <line x1="208" y1="252" x2="238" y2="252" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="241" y="240" width="65" height="24" rx="4" fill="#388e3c"/>
    <text x="273" y="256" text-anchor="middle" font-size="9" fill="#fff">Compare</text>
    <text x="350" y="256" font-size="9" fill="#388e3c">Match = OK</text>
  </g>

  <!-- Step 3: Application 2 - Password Storage -->
  <g id="step3" class="step" data-narration="Systems store password hashes instead of plaintext passwords. A random salt is added before hashing to defeat rainbow table attacks and ensure identical passwords produce different hashes.">
    <rect x="410" y="205" width="350" height="75" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="585" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">App 2: Password Storage (with Salt)</text>
    <rect x="430" y="240" width="55" height="24" rx="4" fill="#ff9800"/>
    <text x="457" y="256" text-anchor="middle" font-size="9" fill="#fff">Pass</text>
    <text x="497" y="256" text-anchor="middle" font-size="12" fill="#ff9800">+</text>
    <rect x="508" y="240" width="45" height="24" rx="4" fill="#e65100"/>
    <text x="530" y="256" text-anchor="middle" font-size="9" fill="#fff">Salt</text>
    <line x1="553" y1="252" x2="583" y2="252" stroke="#ff9800" stroke-width="2"/>
    <rect x="586" y="240" width="55" height="24" rx="4" fill="#ff9800"/>
    <text x="613" y="256" text-anchor="middle" font-size="9" fill="#fff">Hash</text>
    <line x1="641" y1="252" x2="671" y2="252" stroke="#ff9800" stroke-width="2"/>
    <rect x="674" y="240" width="65" height="24" rx="4" fill="#388e3c"/>
    <text x="706" y="256" text-anchor="middle" font-size="8" fill="#fff">Store h+salt</text>
  </g>

  <!-- Step 4: Application 3 - Digital Signatures -->
  <g id="step4" class="step" data-narration="Digital signatures sign the hash of a message rather than the full message for efficiency. The sender hashes the message and signs the small digest with their private key.">
    <rect x="40" y="295" width="350" height="80" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="215" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">App 3: Digital Signatures</text>
    <rect x="60" y="332" width="60" height="24" rx="4" fill="#388e3c"/>
    <text x="90" y="348" text-anchor="middle" font-size="9" fill="#fff">Message</text>
    <line x1="120" y1="344" x2="145" y2="344" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="148" y="332" width="55" height="24" rx="4" fill="#1565c0"/>
    <text x="175" y="348" text-anchor="middle" font-size="9" fill="#fff">Hash</text>
    <line x1="203" y1="344" x2="228" y2="344" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="231" y="332" width="55" height="24" rx="4" fill="#388e3c"/>
    <text x="258" y="348" text-anchor="middle" font-size="9" fill="#fff">Digest</text>
    <line x1="286" y1="344" x2="311" y2="344" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="314" y="328" width="55" height="32" rx="4" fill="#2e7d32"/>
    <text x="341" y="342" text-anchor="middle" font-size="8" fill="#fff">Sign with</text>
    <text x="341" y="354" text-anchor="middle" font-size="8" fill="#fff">Private Key</text>
  </g>

  <!-- Step 5: Application 4 - Blockchain -->
  <g id="step5" class="step" data-narration="In blockchain technology, hash functions link blocks together. Each block contains the hash of the previous block, creating a tamper-evident chain used in cryptocurrencies like Bitcoin.">
    <rect x="410" y="295" width="350" height="80" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="585" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">App 4: Blockchain</text>
    <rect x="430" y="335" width="70" height="28" rx="5" fill="#9c27b0"/>
    <text x="465" y="348" text-anchor="middle" font-size="9" fill="#fff">Block 1</text>
    <text x="465" y="358" text-anchor="middle" font-size="7" fill="#ddd">Hash: 0x3a...</text>
    <line x1="500" y1="349" x2="530" y2="349" stroke="#9c27b0" stroke-width="2"/>
    <rect x="533" y="335" width="70" height="28" rx="5" fill="#9c27b0"/>
    <text x="568" y="348" text-anchor="middle" font-size="9" fill="#fff">Block 2</text>
    <text x="568" y="358" text-anchor="middle" font-size="7" fill="#ddd">Prev: 0x3a...</text>
    <line x1="603" y1="349" x2="633" y2="349" stroke="#9c27b0" stroke-width="2"/>
    <rect x="636" y="335" width="70" height="28" rx="5" fill="#9c27b0"/>
    <text x="671" y="348" text-anchor="middle" font-size="9" fill="#fff">Block 3</text>
    <text x="671" y="358" text-anchor="middle" font-size="7" fill="#ddd">Prev: 0x7f...</text>
  </g>

  <!-- Step 6: Common Algorithms Table -->
  <g id="step6" class="step" data-narration="Common hash algorithms include MD5 (128-bit, broken), SHA-1 (160-bit, broken), SHA-256 (256-bit, secure and widely used), and SHA-3 (variable, secure, uses sponge construction).">
    <rect x="40" y="395" width="720" height="100" rx="10" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Common Hash Algorithms</text>
    <line x1="60" y1="426" x2="740" y2="426" stroke="#ccc" stroke-width="1"/>
    <text x="130" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Algorithm</text>
    <text x="300" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Output (bits)</text>
    <text x="460" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Status</text>
    <text x="640" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Construction</text>
    <line x1="60" y1="446" x2="740" y2="446" stroke="#eee" stroke-width="1"/>
    <text x="130" y="460" text-anchor="middle" font-size="10" fill="#555">MD5</text>
    <text x="300" y="460" text-anchor="middle" font-size="10" fill="#555">128</text>
    <text x="460" y="460" text-anchor="middle" font-size="10" fill="#f44336" font-weight="bold">Broken</text>
    <text x="640" y="460" text-anchor="middle" font-size="10" fill="#555">Merkle-Damgard</text>
    <text x="130" y="475" text-anchor="middle" font-size="10" fill="#555">SHA-1</text>
    <text x="300" y="475" text-anchor="middle" font-size="10" fill="#555">160</text>
    <text x="460" y="475" text-anchor="middle" font-size="10" fill="#f44336" font-weight="bold">Broken</text>
    <text x="640" y="475" text-anchor="middle" font-size="10" fill="#555">Merkle-Damgard</text>
    <text x="130" y="490" text-anchor="middle" font-size="10" fill="#555">SHA-256</text>
    <text x="300" y="490" text-anchor="middle" font-size="10" fill="#555">256</text>
    <text x="460" y="490" text-anchor="middle" font-size="10" fill="#388e3c" font-weight="bold">Secure</text>
    <text x="640" y="490" text-anchor="middle" font-size="10" fill="#555">Merkle-Damgard</text>
  </g>

  <!-- Step 7: Key Takeaway -->
  <g id="step7" class="step" data-narration="Hash functions are essential building blocks used in integrity checks, password storage with salting, digital signatures for efficiency, and blockchain technology. Always use SHA-256 or SHA-3 for security.">
    <rect x="80" y="515" width="640" height="60" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="400" y="540" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Key Takeaway</text>
    <text x="400" y="558" text-anchor="middle" font-size="11" fill="#555">Hash functions underpin integrity, authentication, and blockchain. Use SHA-256/SHA-3; avoid MD5/SHA-1.</text>
  </g>
</svg>
