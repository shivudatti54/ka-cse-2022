<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Symmetric Key Distribution Using Asymmetric Encryption</text>

  <!-- Step 0: The Problem -->
  <g id="step0" class="step" data-narration="Symmetric ciphers are fast but require a shared secret key. The problem is securely exchanging that key over an insecure network.">
    <rect x="80" y="60" width="640" height="70" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#f44336">The Key Distribution Problem</text>
    <text x="400" y="108" text-anchor="middle" font-size="13" fill="#555">Alice and Bob need a shared secret key K, but the channel is insecure. Eve is listening.</text>
  </g>

  <!-- Step 1: Alice generates session key -->
  <g id="step1" class="step" data-narration="Alice generates a random symmetric session key K that will be used for this single communication session.">
    <rect x="50" y="155" width="180" height="100" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="140" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Step 1: Key Generation</text>
    <circle cx="140" cy="210" r="18" fill="#1976d2"/>
    <text x="140" y="215" text-anchor="middle" font-size="10" fill="#fff">Alice</text>
    <rect x="80" y="232" width="120" height="18" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="140" y="245" text-anchor="middle" font-size="10" fill="#1976d2">Generates random K</text>
  </g>

  <!-- Step 2: Get Bob's public key -->
  <g id="step2" class="step" data-narration="Alice retrieves Bob's authenticated public key via a PKI certificate ensuring the key truly belongs to Bob.">
    <rect x="270" y="155" width="260" height="100" rx="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Step 2: Get Bob's Public Key</text>
    <rect x="310" y="195" width="80" height="30" rx="6" fill="#9c27b0"/>
    <text x="350" y="215" text-anchor="middle" font-size="11" fill="#fff">PKI / CA</text>
    <line x1="390" y1="210" x2="425" y2="210" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="428" y="195" width="80" height="30" rx="6" fill="#fff" stroke="#9c27b0"/>
    <text x="468" y="215" text-anchor="middle" font-size="11" fill="#9c27b0">PU_bob</text>
    <text x="400" y="245" text-anchor="middle" font-size="10" fill="#777">Verified via digital certificate</text>
  </g>

  <!-- Step 3: Encrypt K -->
  <g id="step3" class="step" data-narration="Alice encrypts the session key K using Bob's public key. Only Bob's private key can decrypt this ciphertext.">
    <rect x="570" y="155" width="190" height="100" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="665" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Step 3: Encrypt</text>
    <rect x="590" y="200" width="45" height="25" rx="5" fill="#fff" stroke="#1976d2"/>
    <text x="612" y="217" text-anchor="middle" font-size="10" fill="#333">K</text>
    <text x="647" y="217" text-anchor="middle" font-size="14" fill="#1976d2" font-weight="bold">+</text>
    <rect x="658" y="200" width="55" height="25" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="685" y="217" text-anchor="middle" font-size="10" fill="#9c27b0">PU_b</text>
    <text x="665" y="245" text-anchor="middle" font-size="12" fill="#1976d2" font-weight="bold">C = E(PU_b, K)</text>
  </g>

  <!-- Step 4: Transmission -->
  <g id="step4" class="step" data-narration="The encrypted key C is sent over the insecure channel. Eve intercepts C but cannot recover K without Bob's private key.">
    <rect x="80" y="280" width="640" height="95" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Step 4: Transmission Over Insecure Channel</text>
    <circle cx="150" cy="340" r="18" fill="#1976d2"/>
    <text x="150" y="345" text-anchor="middle" font-size="10" fill="#fff">Alice</text>
    <line x1="170" y1="340" x2="350" y2="340" stroke="#ff9800" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="350" y="326" width="100" height="28" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="400" y="344" text-anchor="middle" font-size="12" fill="#ff9800" font-weight="bold">C = E(PU_b, K)</text>
    <line x1="450" y1="340" x2="620" y2="340" stroke="#ff9800" stroke-width="2.5" marker-end="url(#arrow)"/>
    <circle cx="650" cy="340" r="18" fill="#388e3c"/>
    <text x="650" y="345" text-anchor="middle" font-size="10" fill="#fff">Bob</text>
    <text x="400" y="365" text-anchor="middle" font-size="10" fill="#f44336" font-style="italic">Eve sees C but cannot recover K without PR_bob</text>
  </g>

  <!-- Step 5: Bob decrypts -->
  <g id="step5" class="step" data-narration="Bob decrypts the ciphertext using his private key to recover the original symmetric session key K.">
    <rect x="80" y="400" width="320" height="80" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="240" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Step 5: Bob Decrypts</text>
    <rect x="100" y="438" width="70" height="26" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="135" y="455" text-anchor="middle" font-size="10" fill="#ff9800">C</text>
    <text x="183" y="455" text-anchor="middle" font-size="14" fill="#388e3c" font-weight="bold">+</text>
    <rect x="195" y="438" width="70" height="26" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="230" y="455" text-anchor="middle" font-size="10" fill="#388e3c">PR_bob</text>
    <line x1="270" y1="451" x2="305" y2="451" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="310" y="438" width="65" height="26" rx="5" fill="#388e3c"/>
    <text x="342" y="455" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">K</text>
  </g>

  <!-- Step 6: Secure communication -->
  <g id="step6" class="step" data-narration="Now both Alice and Bob share key K. They use fast symmetric encryption like AES for all subsequent data.">
    <rect x="440" y="400" width="320" height="80" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="600" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Step 6: Secure Communication</text>
    <circle cx="490" cy="452" r="14" fill="#1976d2"/>
    <text x="490" y="457" text-anchor="middle" font-size="8" fill="#fff">Alice</text>
    <line x1="506" y1="452" x2="556" y2="452" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="558" y="440" width="80" height="24" rx="5" fill="#1976d2"/>
    <text x="598" y="456" text-anchor="middle" font-size="10" fill="#fff">AES(K, data)</text>
    <line x1="638" y1="452" x2="688" y2="452" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="706" cy="452" r="14" fill="#388e3c"/>
    <text x="706" y="457" text-anchor="middle" font-size="8" fill="#fff">Bob</text>
  </g>

  <!-- Step 7: Summary -->
  <g id="step7" class="step" data-narration="This hybrid approach combines asymmetric encryption for key exchange with fast symmetric encryption for bulk data transfer.">
    <rect x="80" y="505" width="640" height="70" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="530" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Hybrid Cryptosystem Summary</text>
    <text x="400" y="555" text-anchor="middle" font-size="12" fill="#555">Asymmetric (RSA) for key exchange + Symmetric (AES) for bulk data = Secure &amp; Efficient</text>
  </g>
</svg>
