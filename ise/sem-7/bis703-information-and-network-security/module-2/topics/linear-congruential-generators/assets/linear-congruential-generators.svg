<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <g id="step1" class="step" data-narration="Linear Congruential Generators are one of the oldest and most widely used pseudorandom number generation algorithms.">
    <text x="400" y="38" font-size="21" font-weight="bold" fill="#1565c0" text-anchor="middle">Linear Congruential Generators</text>
    <rect x="180" y="55" width="440" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <text x="400" y="72" font-size="10" fill="#1565c0" text-anchor="middle">Most widely used class of pseudorandom number generators</text>
    <text x="400" y="86" font-size="9" fill="#455a64" text-anchor="middle">Introduced by D. H. Lehmer in 1951</text>
  </g>

  <!-- LCG Formula -->
  <g id="step2" class="step" data-narration="The LCG formula is X_{n+1} equals a times X_n plus c, all modulo m. Four parameters define the generator completely.">
    <rect x="140" y="108" width="520" height="65" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="400" y="126" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">Core Formula</text>
    <text x="400" y="146" font-size="14" font-weight="bold" fill="#bf360c" text-anchor="middle" font-family="serif">X(n+1) = (a * X(n) + c) mod m</text>
    <text x="400" y="164" font-size="8" fill="#795548" text-anchor="middle">where a = multiplier, c = increment, m = modulus, X(0) = seed</text>
  </g>

  <!-- Four Parameters -->
  <g id="step3" class="step" data-narration="The four parameters are: modulus m which must be greater than zero, multiplier a, increment c, and the seed value X-zero.">
    <text x="400" y="195" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Four Parameters</text>

    <rect x="40" y="205" width="165" height="55" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="122" y="222" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">Modulus (m)</text>
    <text x="122" y="236" font-size="8" fill="#455a64" text-anchor="middle">m > 0</text>
    <text x="122" y="250" font-size="8" fill="#455a64" text-anchor="middle">Determines range of output</text>

    <rect x="220" y="205" width="165" height="55" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="302" y="222" font-size="10" font-weight="bold" fill="#1565c0" text-anchor="middle">Multiplier (a)</text>
    <text x="302" y="236" font-size="8" fill="#455a64" text-anchor="middle">0 &lt; a &lt; m</text>
    <text x="302" y="250" font-size="8" fill="#455a64" text-anchor="middle">Controls sequence spread</text>

    <rect x="400" y="205" width="165" height="55" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.2"/>
    <text x="482" y="222" font-size="10" font-weight="bold" fill="#c62828" text-anchor="middle">Increment (c)</text>
    <text x="482" y="236" font-size="8" fill="#455a64" text-anchor="middle">0 &lt;= c &lt; m</text>
    <text x="482" y="250" font-size="8" fill="#455a64" text-anchor="middle">Additive constant</text>

    <rect x="580" y="205" width="175" height="55" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.2"/>
    <text x="667" y="222" font-size="10" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Seed (X0)</text>
    <text x="667" y="236" font-size="8" fill="#455a64" text-anchor="middle">0 &lt;= X0 &lt; m</text>
    <text x="667" y="250" font-size="8" fill="#455a64" text-anchor="middle">Starting value of sequence</text>
  </g>

  <!-- Period and Hull-Dobell Theorem -->
  <g id="step4" class="step" data-narration="The period of an LCG is at most m. The Hull-Dobell theorem gives conditions for achieving full period: c and m are coprime, a minus 1 is divisible by all prime factors of m, and if m is divisible by 4 then a minus 1 must also be divisible by 4.">
    <text x="400" y="282" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Hull-Dobell Theorem: Conditions for Full Period (m)</text>

    <rect x="40" y="292" width="230" height="50" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1.2"/>
    <text x="155" y="310" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Condition 1</text>
    <text x="155" y="325" font-size="8" fill="#455a64" text-anchor="middle">c and m are coprime: gcd(c, m) = 1</text>

    <rect x="285" y="292" width="230" height="50" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1.2"/>
    <text x="400" y="310" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Condition 2</text>
    <text x="400" y="325" font-size="8" fill="#455a64" text-anchor="middle">(a - 1) divisible by all prime factors of m</text>

    <rect x="530" y="292" width="230" height="50" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1.2"/>
    <text x="645" y="310" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Condition 3</text>
    <text x="645" y="325" font-size="8" fill="#455a64" text-anchor="middle">If 4 | m, then 4 | (a - 1)</text>
  </g>

  <!-- Worked Example -->
  <g id="step5" class="step" data-narration="Let us trace a worked example with m equals 16, a equals 5, c equals 3, and seed equals 7. The first few values are 7, then 6, then 1, then 8, and so on.">
    <text x="400" y="365" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Worked Example: m=16, a=5, c=3, X0=7</text>

    <rect x="55" y="378" width="90" height="36" rx="5" fill="#1565c0"/>
    <text x="100" y="393" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X0 = 7</text>
    <text x="100" y="407" font-size="8" fill="#bbdefb" text-anchor="middle">Seed</text>

    <line x1="148" y1="396" x2="168" y2="396" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="170" y="378" width="90" height="36" rx="5" fill="#2e7d32"/>
    <text x="215" y="393" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X1 = 6</text>
    <text x="215" y="407" font-size="8" fill="#c8e6c9" text-anchor="middle">(5*7+3)%16</text>

    <line x1="263" y1="396" x2="283" y2="396" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="285" y="378" width="90" height="36" rx="5" fill="#e65100"/>
    <text x="330" y="393" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X2 = 1</text>
    <text x="330" y="407" font-size="8" fill="#ffe0b2" text-anchor="middle">(5*6+3)%16</text>

    <line x1="378" y1="396" x2="398" y2="396" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="400" y="378" width="90" height="36" rx="5" fill="#6a1b9a"/>
    <text x="445" y="393" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X3 = 8</text>
    <text x="445" y="407" font-size="8" fill="#e1bee7" text-anchor="middle">(5*1+3)%16</text>

    <line x1="493" y1="396" x2="513" y2="396" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="515" y="378" width="90" height="36" rx="5" fill="#00695c"/>
    <text x="560" y="393" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X4 = 11</text>
    <text x="560" y="407" font-size="8" fill="#b2dfdb" text-anchor="middle">(5*8+3)%16</text>

    <line x1="608" y1="396" x2="628" y2="396" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="630" y="378" width="50" height="36" rx="5" fill="#37474f"/>
    <text x="655" y="400" font-size="10" fill="#ffffff" text-anchor="middle">...</text>
  </g>

  <!-- Multiplicative vs Mixed -->
  <g id="step6" class="step" data-narration="When c equals zero, it is called a multiplicative LCG or Lehmer RNG. When c is non-zero it is a mixed congruential generator. Multiplicative generators cannot have full period m.">
    <text x="400" y="438" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Types of LCG</text>

    <rect x="80" y="448" width="290" height="48" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="225" y="465" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">Mixed LCG (c != 0)</text>
    <text x="225" y="480" font-size="8" fill="#455a64" text-anchor="middle">X(n+1) = (aX(n) + c) mod m -- Can have full period m</text>

    <rect x="430" y="448" width="290" height="48" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
    <text x="575" y="465" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Multiplicative LCG (c = 0)</text>
    <text x="575" y="480" font-size="8" fill="#455a64" text-anchor="middle">X(n+1) = (aX(n)) mod m -- Max period m-1</text>
  </g>

  <!-- Cryptographic weakness -->
  <g id="step7" class="step" data-narration="LCGs are NOT cryptographically secure. Given a few consecutive outputs, an attacker can recover all parameters using lattice reduction. They should only be used for simulations, not security.">
    <rect x="80" y="506" width="640" height="38" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
    <text x="400" y="522" font-size="10" font-weight="bold" fill="#c62828" text-anchor="middle">WARNING: LCGs are NOT Cryptographically Secure</text>
    <text x="400" y="536" font-size="8" fill="#455a64" text-anchor="middle">Parameters recoverable from few outputs via lattice reduction -- Use only for simulations, never for key generation</text>
  </g>

  <!-- Famous examples -->
  <g id="step8" class="step" data-narration="Well-known LCG implementations include the ANSI C standard with parameters a equals 1103515245, c equals 12345, m equals 2 to the 31st power, and the Numerical Recipes generator.">
    <text x="400" y="564" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Well-Known LCG Implementations</text>

    <rect x="80" y="572" width="300" height="22" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
    <text x="230" y="587" font-size="8" fill="#1565c0" text-anchor="middle">ANSI C: a=1103515245, c=12345, m=2^31</text>

    <rect x="420" y="572" width="300" height="22" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
    <text x="570" y="587" font-size="8" fill="#1565c0" text-anchor="middle">Numerical Recipes: a=1664525, c=1013904223, m=2^32</text>
  </g>
</svg>
