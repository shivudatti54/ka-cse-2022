<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <g id="step1" class="step" data-narration="The security of RSA relies on the computational difficulty of factoring large numbers. We examine the main attack types and countermeasures.">
    <text x="400" y="38" font-size="21" font-weight="bold" fill="#1565c0" text-anchor="middle">The Security of RSA</text>
    <rect x="180" y="52" width="440" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="400" y="71" font-size="9" fill="#1565c0" text-anchor="middle">RSA security depends on the Integer Factorization Problem: factoring n = p * q is hard for large n</text>
  </g>

  <!-- Four Attack Categories -->
  <g id="step2" class="step" data-narration="There are four main categories of attacks on RSA: brute force key search, mathematical attacks that try to factor n, timing attacks that exploit computation time, and chosen ciphertext attacks.">
    <text x="400" y="100" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Four Categories of RSA Attacks</text>

    <rect x="40" y="110" width="165" height="52" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2"/>
    <text x="122" y="130" font-size="10" font-weight="bold" fill="#c62828" text-anchor="middle">Brute Force</text>
    <text x="122" y="144" font-size="8" fill="#455a64" text-anchor="middle">Try all possible private</text>
    <text x="122" y="156" font-size="8" fill="#455a64" text-anchor="middle">keys d exhaustively</text>

    <rect x="220" y="110" width="165" height="52" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
    <text x="302" y="130" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Mathematical</text>
    <text x="302" y="144" font-size="8" fill="#455a64" text-anchor="middle">Factor n to recover</text>
    <text x="302" y="156" font-size="8" fill="#455a64" text-anchor="middle">p, q and derive d</text>

    <rect x="400" y="110" width="165" height="52" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1.2"/>
    <text x="482" y="130" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Timing Attack</text>
    <text x="482" y="144" font-size="8" fill="#455a64" text-anchor="middle">Measure decryption time</text>
    <text x="482" y="156" font-size="8" fill="#455a64" text-anchor="middle">to infer key bits</text>

    <rect x="580" y="110" width="180" height="52" rx="6" fill="#fce4ec" stroke="#880e4f" stroke-width="1.2"/>
    <text x="670" y="130" font-size="10" font-weight="bold" fill="#880e4f" text-anchor="middle">Chosen Ciphertext</text>
    <text x="670" y="144" font-size="8" fill="#455a64" text-anchor="middle">Exploit homomorphic</text>
    <text x="670" y="156" font-size="8" fill="#455a64" text-anchor="middle">property of RSA</text>
  </g>

  <!-- Factoring Attacks Detail -->
  <g id="step3" class="step" data-narration="Mathematical attacks include trial division, Pollard rho method, the quadratic sieve, and the general number field sieve which is the fastest known classical factoring algorithm.">
    <text x="400" y="186" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Factoring Algorithms (Mathematical Attacks)</text>

    <rect x="40" y="196" width="165" height="42" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
    <text x="122" y="212" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">Trial Division</text>
    <text x="122" y="228" font-size="8" fill="#455a64" text-anchor="middle">O(sqrt(n)) -- very slow</text>

    <rect x="220" y="196" width="165" height="42" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
    <text x="302" y="212" font-size="9" font-weight="bold" fill="#1565c0" text-anchor="middle">Pollard's rho</text>
    <text x="302" y="228" font-size="8" fill="#455a64" text-anchor="middle">O(n^1/4) -- moderate</text>

    <rect x="400" y="196" width="165" height="42" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
    <text x="482" y="212" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">Quadratic Sieve</text>
    <text x="482" y="228" font-size="8" fill="#455a64" text-anchor="middle">Sub-exponential</text>

    <rect x="580" y="196" width="180" height="42" rx="5" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
    <text x="670" y="212" font-size="9" font-weight="bold" fill="#c62828" text-anchor="middle">GNFS (Fastest)</text>
    <text x="670" y="228" font-size="8" fill="#455a64" text-anchor="middle">exp(c * (ln n)^1/3)</text>
  </g>

  <!-- Key Size and Security Level -->
  <g id="step4" class="step" data-narration="RSA key size directly determines security level. 1024 bits is now considered insecure. 2048 bits is the minimum recommendation. 3072 bits provides 128-bit equivalent security.">
    <text x="400" y="260" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">RSA Key Size vs Security Level</text>

    <!-- Table -->
    <rect x="130" y="270" width="130" height="20" rx="2" fill="#1565c0"/>
    <text x="195" y="284" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">RSA Key Size</text>
    <rect x="260" y="270" width="150" height="20" rx="2" fill="#1565c0"/>
    <text x="335" y="284" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Symmetric Equiv.</text>
    <rect x="410" y="270" width="130" height="20" rx="2" fill="#1565c0"/>
    <text x="475" y="284" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Status</text>

    <rect x="130" y="290" width="130" height="18" fill="#ffebee" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="195" y="303" font-size="8" fill="#c62828" text-anchor="middle">1024 bits</text>
    <rect x="260" y="290" width="150" height="18" fill="#ffebee" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="335" y="303" font-size="8" fill="#c62828" text-anchor="middle">~80-bit</text>
    <rect x="410" y="290" width="130" height="18" fill="#ffebee" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="475" y="303" font-size="8" fill="#c62828" text-anchor="middle" font-weight="bold">INSECURE</text>

    <rect x="130" y="308" width="130" height="18" fill="#fff3e0" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="195" y="321" font-size="8" fill="#e65100" text-anchor="middle">2048 bits</text>
    <rect x="260" y="308" width="150" height="18" fill="#fff3e0" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="335" y="321" font-size="8" fill="#e65100" text-anchor="middle">~112-bit</text>
    <rect x="410" y="308" width="130" height="18" fill="#fff3e0" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="475" y="321" font-size="8" fill="#e65100" text-anchor="middle">Minimum recommended</text>

    <rect x="130" y="326" width="130" height="18" fill="#e8f5e9" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="195" y="339" font-size="8" fill="#2e7d32" text-anchor="middle">3072 bits</text>
    <rect x="260" y="326" width="150" height="18" fill="#e8f5e9" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="335" y="339" font-size="8" fill="#2e7d32" text-anchor="middle">~128-bit</text>
    <rect x="410" y="326" width="130" height="18" fill="#e8f5e9" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="475" y="339" font-size="8" fill="#2e7d32" text-anchor="middle" font-weight="bold">Recommended</text>
  </g>

  <!-- Chosen Ciphertext Attack -->
  <g id="step5" class="step" data-narration="The chosen ciphertext attack exploits RSA's multiplicative homomorphic property. If attacker has ciphertext C, they can craft C-prime equals C times r-to-the-e mod n and use the decryption oracle to recover the original message.">
    <text x="400" y="368" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Chosen Ciphertext Attack (CCA)</text>

    <rect x="40" y="378" width="340" height="52" rx="6" fill="#fce4ec" stroke="#880e4f" stroke-width="1.2"/>
    <text x="210" y="396" font-size="9" font-weight="bold" fill="#880e4f" text-anchor="middle">Attack: Exploit Homomorphic Property</text>
    <text x="210" y="410" font-size="8" fill="#455a64" text-anchor="middle">E(m1) * E(m2) = E(m1 * m2)</text>
    <text x="210" y="424" font-size="8" fill="#455a64" text-anchor="middle">Craft C' = C * r^e mod n, submit to oracle</text>

    <rect x="420" y="378" width="340" height="52" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="590" y="396" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">Defense: OAEP Padding</text>
    <text x="590" y="410" font-size="8" fill="#455a64" text-anchor="middle">Optimal Asymmetric Encryption Padding</text>
    <text x="590" y="424" font-size="8" fill="#455a64" text-anchor="middle">Adds randomness, makes CCA infeasible</text>
  </g>

  <!-- Timing Attack -->
  <g id="step6" class="step" data-narration="Timing attacks measure the time taken for modular exponentiation during decryption. Different key bits cause different computation paths, leaking information about the private key.">
    <text x="400" y="452" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Timing Attack (Kocher, 1996)</text>

    <rect x="40" y="462" width="340" height="42" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1.2"/>
    <text x="210" y="478" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Attack Mechanism</text>
    <text x="210" y="494" font-size="8" fill="#455a64" text-anchor="middle">Measure decryption time to infer private key bits</text>

    <rect x="420" y="462" width="340" height="42" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="590" y="478" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">Countermeasures</text>
    <text x="590" y="494" font-size="8" fill="#455a64" text-anchor="middle">Constant-time code, RSA blinding (r^e * C mod n)</text>
  </g>

  <!-- Quantum Threat -->
  <g id="step7" class="step" data-narration="Shor's algorithm on a quantum computer can factor n in polynomial time, which would break RSA completely. Post-quantum alternatives are being standardized by NIST.">
    <rect x="60" y="518" width="680" height="36" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="400" y="534" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Quantum Computing Threat</text>
    <text x="400" y="548" font-size="8" fill="#455a64" text-anchor="middle">Shor's algorithm factors n in polynomial time on a quantum computer -- NIST post-quantum standards address this threat</text>
  </g>

  <!-- Summary -->
  <g id="step8" class="step" data-narration="In summary, RSA remains secure with proper implementation: use at least 2048-bit keys, apply OAEP padding, use constant-time code, and generate strong random primes.">
    <rect x="60" y="562" width="680" height="32" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="400" y="582" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">Best Practices: 2048+ bit keys | OAEP padding | Constant-time code | Strong random primes | RSA blinding</text>
  </g>
</svg>
