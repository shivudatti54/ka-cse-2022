<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <g id="step1" class="step" data-narration="Public key cryptosystems use two mathematically related keys: a public key known to everyone and a private key known only to the owner.">
    <text x="400" y="38" font-size="21" font-weight="bold" fill="#1565c0" text-anchor="middle">Principles of Public Key Cryptosystems</text>
    <rect x="180" y="50" width="440" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="400" y="69" font-size="9" fill="#1565c0" text-anchor="middle">Two-key system: public key for encryption, private key for decryption (Diffie-Hellman, 1976)</text>
  </g>

  <!-- Two Key Principle -->
  <g id="step2" class="step" data-narration="The two-key principle means each user generates a key pair. The public key is published openly while the private key is kept secret. Knowing the public key does not reveal the private key.">
    <text x="400" y="100" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">The Two-Key Principle</text>

    <rect x="120" y="110" width="240" height="52" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="240" y="130" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">Public Key (PU)</text>
    <text x="240" y="144" font-size="8" fill="#455a64" text-anchor="middle">Published openly, used for encryption</text>
    <text x="240" y="156" font-size="8" fill="#455a64" text-anchor="middle">or signature verification</text>

    <rect x="440" y="110" width="240" height="52" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
    <text x="560" y="130" font-size="10" font-weight="bold" fill="#c62828" text-anchor="middle">Private Key (PR)</text>
    <text x="560" y="144" font-size="8" fill="#455a64" text-anchor="middle">Kept secret, used for decryption</text>
    <text x="560" y="156" font-size="8" fill="#455a64" text-anchor="middle">or signature creation</text>

    <text x="400" y="140" font-size="10" fill="#6a1b9a" text-anchor="middle">Pair</text>
  </g>

  <!-- Encryption Flow -->
  <g id="step3" class="step" data-narration="For confidentiality, the sender encrypts using the receiver's public key. Only the receiver can decrypt with their private key. This ensures only the intended recipient reads the message.">
    <text x="400" y="182" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Encryption for Confidentiality</text>

    <rect x="40" y="192" width="110" height="36" rx="5" fill="#1565c0"/>
    <text x="95" y="214" font-size="9" fill="#ffffff" text-anchor="middle">Plaintext M</text>
    <line x1="153" y1="210" x2="190" y2="210" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="193" y="190" width="150" height="40" rx="5" fill="#2e7d32"/>
    <text x="268" y="208" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Encrypt with</text>
    <text x="268" y="222" font-size="9" fill="#ffffff" text-anchor="middle">Receiver's PU</text>
    <line x1="346" y1="210" x2="383" y2="210" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="386" y="192" width="110" height="36" rx="5" fill="#e65100"/>
    <text x="441" y="214" font-size="9" fill="#ffffff" text-anchor="middle">Ciphertext C</text>
    <line x1="499" y1="210" x2="536" y2="210" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="539" y="190" width="150" height="40" rx="5" fill="#c62828"/>
    <text x="614" y="208" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Decrypt with</text>
    <text x="614" y="222" font-size="9" fill="#ffffff" text-anchor="middle">Receiver's PR</text>
    <line x1="692" y1="210" x2="713" y2="210" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="716" y="192" width="70" height="36" rx="5" fill="#1565c0"/>
    <text x="751" y="214" font-size="9" fill="#ffffff" text-anchor="middle">M</text>
  </g>

  <!-- Digital Signature Flow -->
  <g id="step4" class="step" data-narration="For authentication, the sender signs using their own private key. Anyone can verify using the sender's public key. This proves the sender's identity.">
    <text x="400" y="252" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Digital Signatures for Authentication</text>

    <rect x="40" y="262" width="110" height="36" rx="5" fill="#1565c0"/>
    <text x="95" y="284" font-size="9" fill="#ffffff" text-anchor="middle">Message M</text>
    <line x1="153" y1="280" x2="190" y2="280" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

    <rect x="193" y="260" width="150" height="40" rx="5" fill="#c62828"/>
    <text x="268" y="278" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Sign with</text>
    <text x="268" y="292" font-size="9" fill="#ffffff" text-anchor="middle">Sender's PR</text>
    <line x1="346" y1="280" x2="383" y2="280" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

    <rect x="386" y="262" width="110" height="36" rx="5" fill="#6a1b9a"/>
    <text x="441" y="284" font-size="9" fill="#ffffff" text-anchor="middle">Signature S</text>
    <line x1="499" y1="280" x2="536" y2="280" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="539" y="260" width="150" height="40" rx="5" fill="#2e7d32"/>
    <text x="614" y="278" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Verify with</text>
    <text x="614" y="292" font-size="9" fill="#ffffff" text-anchor="middle">Sender's PU</text>
    <line x1="692" y1="280" x2="713" y2="280" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="716" y="262" width="70" height="36" rx="5" fill="#1565c0"/>
    <text x="751" y="284" font-size="9" fill="#ffffff" text-anchor="middle">Valid?</text>
  </g>

  <!-- Symmetric vs Asymmetric Comparison -->
  <g id="step5" class="step" data-narration="Compared to symmetric key systems, public key systems solve the key distribution problem but are 100 to 1000 times slower. In practice, hybrid systems combine both approaches.">
    <text x="400" y="322" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Symmetric vs Asymmetric Comparison</text>

    <!-- Table header -->
    <rect x="80" y="332" width="200" height="22" rx="3" fill="#1565c0"/>
    <text x="180" y="347" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Property</text>
    <rect x="280" y="332" width="220" height="22" rx="3" fill="#2e7d32"/>
    <text x="390" y="347" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Symmetric</text>
    <rect x="500" y="332" width="220" height="22" rx="3" fill="#e65100"/>
    <text x="610" y="347" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Asymmetric</text>

    <!-- Row 1 -->
    <rect x="80" y="354" width="200" height="18" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="180" y="367" font-size="8" fill="#455a64" text-anchor="middle">Keys needed (n users)</text>
    <rect x="280" y="354" width="220" height="18" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="390" y="367" font-size="8" fill="#455a64" text-anchor="middle">n(n-1)/2 shared keys</text>
    <rect x="500" y="354" width="220" height="18" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="610" y="367" font-size="8" fill="#455a64" text-anchor="middle">n key pairs</text>

    <!-- Row 2 -->
    <rect x="80" y="372" width="200" height="18" fill="#ffffff" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="180" y="385" font-size="8" fill="#455a64" text-anchor="middle">Key distribution</text>
    <rect x="280" y="372" width="220" height="18" fill="#ffffff" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="390" y="385" font-size="8" fill="#455a64" text-anchor="middle">Requires secure channel</text>
    <rect x="500" y="372" width="220" height="18" fill="#ffffff" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="610" y="385" font-size="8" fill="#455a64" text-anchor="middle">Public key can be shared openly</text>

    <!-- Row 3 -->
    <rect x="80" y="390" width="200" height="18" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="180" y="403" font-size="8" fill="#455a64" text-anchor="middle">Speed</text>
    <rect x="280" y="390" width="220" height="18" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="390" y="403" font-size="8" fill="#2e7d32" text-anchor="middle">Fast (AES: ~1 Gbps)</text>
    <rect x="500" y="390" width="220" height="18" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="610" y="403" font-size="8" fill="#c62828" text-anchor="middle">100-1000x slower (RSA)</text>
  </g>

  <!-- Trapdoor One-Way Functions -->
  <g id="step6" class="step" data-narration="Public key systems are based on trapdoor one-way functions. Computing in one direction is easy, but inverting is computationally infeasible without the trapdoor, which is the private key.">
    <text x="400" y="432" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Trapdoor One-Way Functions</text>

    <rect x="60" y="442" width="160" height="42" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="140" y="460" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">Easy Direction</text>
    <text x="140" y="474" font-size="8" fill="#455a64" text-anchor="middle">Y = f(X) -- polynomial time</text>

    <rect x="280" y="442" width="240" height="42" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2"/>
    <text x="400" y="460" font-size="9" font-weight="bold" fill="#c62828" text-anchor="middle">Hard Direction (without trapdoor)</text>
    <text x="400" y="474" font-size="8" fill="#455a64" text-anchor="middle">X = f-inv(Y) -- exponential time</text>

    <rect x="580" y="442" width="175" height="42" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="667" y="460" font-size="9" font-weight="bold" fill="#1565c0" text-anchor="middle">With Trapdoor (PR key)</text>
    <text x="667" y="474" font-size="8" fill="#455a64" text-anchor="middle">X = f-inv(Y, PR) -- easy</text>
  </g>

  <!-- Hard Problems -->
  <g id="step7" class="step" data-narration="The security of PKC relies on computationally hard problems: integer factorization for RSA, discrete logarithm for Diffie-Hellman, and elliptic curve discrete logarithm for ECC.">
    <text x="400" y="508" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Underlying Hard Mathematical Problems</text>

    <rect x="40" y="518" width="230" height="38" rx="5" fill="#1565c0"/>
    <text x="155" y="534" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Integer Factorization (IFP)</text>
    <text x="155" y="548" font-size="8" fill="#bbdefb" text-anchor="middle">RSA -- Factor n = p * q</text>

    <rect x="285" y="518" width="230" height="38" rx="5" fill="#2e7d32"/>
    <text x="400" y="534" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Discrete Logarithm (DLP)</text>
    <text x="400" y="548" font-size="8" fill="#c8e6c9" text-anchor="middle">DH, ElGamal -- Find x: g^x = y mod p</text>

    <rect x="530" y="518" width="230" height="38" rx="5" fill="#6a1b9a"/>
    <text x="645" y="534" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">Elliptic Curve DLP</text>
    <text x="645" y="548" font-size="8" fill="#e1bee7" text-anchor="middle">ECC -- Find k: Q = kP on curve</text>
  </g>

  <!-- Hybrid Systems -->
  <g id="step8" class="step" data-narration="In practice, hybrid systems use public key cryptography to exchange a symmetric session key, then use the faster symmetric cipher for bulk data encryption.">
    <rect x="100" y="566" width="600" height="28" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="400" y="584" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">Hybrid approach: PKC exchanges symmetric key, then symmetric cipher encrypts bulk data (TLS, PGP)</text>
  </g>
</svg>
