<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <g id="step1" class="step" data-narration="The Blum Blum Shub generator is a cryptographically secure pseudorandom number generator based on the difficulty of factoring large integers.">
    <text x="400" y="38" font-size="21" font-weight="bold" fill="#1565c0" text-anchor="middle">Blum Blum Shub (BBS) Generator</text>
    <rect x="160" y="52" width="480" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="400" y="71" font-size="9" fill="#1565c0" text-anchor="middle">Cryptographically secure PRNG based on the Quadratic Residuosity Problem (Blum et al., 1986)</text>
  </g>

  <!-- Core Formula -->
  <g id="step2" class="step" data-narration="The BBS formula is X_{n+1} equals X_n squared modulo n, where n is the product of two large Blum primes p and q.">
    <rect x="140" y="90" width="520" height="60" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="400" y="110" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">Core Formula</text>
    <text x="400" y="130" font-size="14" font-weight="bold" fill="#bf360c" text-anchor="middle" font-family="serif">X(n+1) = X(n)^2 mod n</text>
    <text x="400" y="145" font-size="8" fill="#795548" text-anchor="middle">Output bit: least significant bit of each X(n)</text>
  </g>

  <!-- Setup Parameters -->
  <g id="step3" class="step" data-narration="Setup requires choosing two large Blum primes p and q, each congruent to 3 mod 4. The modulus n equals p times q. The seed s must be coprime to n.">
    <text x="400" y="172" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Setup Parameters</text>

    <rect x="40" y="182" width="225" height="55" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="152" y="200" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">Blum Primes p, q</text>
    <text x="152" y="214" font-size="8" fill="#455a64" text-anchor="middle">p and q are large primes</text>
    <text x="152" y="228" font-size="8" fill="#2e7d32" text-anchor="middle">p = 3 mod 4, q = 3 mod 4</text>

    <rect x="288" y="182" width="225" height="55" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="400" y="200" font-size="10" font-weight="bold" fill="#1565c0" text-anchor="middle">Modulus n</text>
    <text x="400" y="214" font-size="8" fill="#455a64" text-anchor="middle">n = p * q (Blum integer)</text>
    <text x="400" y="228" font-size="8" fill="#455a64" text-anchor="middle">n = 3 mod 4 (automatically)</text>

    <rect x="536" y="182" width="225" height="55" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.2"/>
    <text x="648" y="200" font-size="10" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Seed s</text>
    <text x="648" y="214" font-size="8" fill="#455a64" text-anchor="middle">Random, 1 &lt; s &lt; n</text>
    <text x="648" y="228" font-size="8" fill="#455a64" text-anchor="middle">gcd(s, n) = 1, X0 = s^2 mod n</text>
  </g>

  <!-- Step-by-Step Generation -->
  <g id="step4" class="step" data-narration="To generate bits: start with X0 equals s squared mod n. Then iterate X(n+1) equals X(n) squared mod n. Extract the least significant bit of each state as the output bit.">
    <text x="400" y="258" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Bit Generation Process</text>

    <rect x="40" y="268" width="120" height="36" rx="5" fill="#6a1b9a"/>
    <text x="100" y="290" font-size="9" fill="#ffffff" text-anchor="middle">X0 = s^2 mod n</text>
    <line x1="163" y1="286" x2="190" y2="286" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="193" y="268" width="120" height="36" rx="5" fill="#1565c0"/>
    <text x="253" y="284" font-size="9" fill="#ffffff" text-anchor="middle">X1 = X0^2 mod n</text>
    <text x="253" y="298" font-size="8" fill="#bbdefb" text-anchor="middle">bit = X1 mod 2</text>
    <line x1="316" y1="286" x2="343" y2="286" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="346" y="268" width="120" height="36" rx="5" fill="#2e7d32"/>
    <text x="406" y="284" font-size="9" fill="#ffffff" text-anchor="middle">X2 = X1^2 mod n</text>
    <text x="406" y="298" font-size="8" fill="#c8e6c9" text-anchor="middle">bit = X2 mod 2</text>
    <line x1="469" y1="286" x2="496" y2="286" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="499" y="268" width="120" height="36" rx="5" fill="#e65100"/>
    <text x="559" y="284" font-size="9" fill="#ffffff" text-anchor="middle">X3 = X2^2 mod n</text>
    <text x="559" y="298" font-size="8" fill="#ffe0b2" text-anchor="middle">bit = X3 mod 2</text>
    <line x1="622" y1="286" x2="649" y2="286" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="652" y="268" width="60" height="36" rx="5" fill="#37474f"/>
    <text x="682" y="290" font-size="10" fill="#ffffff" text-anchor="middle">...</text>
  </g>

  <!-- Security Basis -->
  <g id="step5" class="step" data-narration="The security of BBS rests on the Quadratic Residuosity Problem. Given n and x squared mod n, it is computationally hard to determine x or whether x is a quadratic residue without knowing p and q.">
    <text x="400" y="328" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Security Foundation: Quadratic Residuosity Problem</text>

    <rect x="50" y="338" width="340" height="48" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1.2"/>
    <text x="220" y="356" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Hard Problem (without factoring n)</text>
    <text x="220" y="370" font-size="8" fill="#455a64" text-anchor="middle">Given n and y = x^2 mod n, find x</text>
    <text x="220" y="382" font-size="8" fill="#c62828" text-anchor="middle">Equivalent to factoring n = p * q</text>

    <rect x="420" y="338" width="340" height="48" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="590" y="356" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">Easy (knowing p and q)</text>
    <text x="590" y="370" font-size="8" fill="#455a64" text-anchor="middle">With trapdoor (factorization of n),</text>
    <text x="590" y="382" font-size="8" fill="#455a64" text-anchor="middle">can compute square roots mod n efficiently</text>
  </g>

  <!-- Worked Example -->
  <g id="step6" class="step" data-narration="Example: Let p equals 11, q equals 23, so n equals 253. With seed s equals 3, X0 equals 9, X1 equals 81, X2 equals 236. The output bits are 1, 1, 0.">
    <text x="400" y="408" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Worked Example: p=11, q=23, n=253, s=3</text>

    <rect x="55" y="418" width="105" height="42" rx="5" fill="#1565c0"/>
    <text x="107" y="434" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X0 = 9</text>
    <text x="107" y="450" font-size="8" fill="#bbdefb" text-anchor="middle">3^2 mod 253</text>

    <line x1="163" y1="439" x2="185" y2="439" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="188" y="418" width="105" height="42" rx="5" fill="#2e7d32"/>
    <text x="240" y="434" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X1 = 81</text>
    <text x="240" y="450" font-size="8" fill="#c8e6c9" text-anchor="middle">bit = 1 (odd)</text>

    <line x1="296" y1="439" x2="318" y2="439" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="321" y="418" width="105" height="42" rx="5" fill="#e65100"/>
    <text x="373" y="434" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X2 = 236</text>
    <text x="373" y="450" font-size="8" fill="#ffe0b2" text-anchor="middle">bit = 0 (even)</text>

    <line x1="429" y1="439" x2="451" y2="439" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="454" y="418" width="105" height="42" rx="5" fill="#6a1b9a"/>
    <text x="506" y="434" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">X3 = 36</text>
    <text x="506" y="450" font-size="8" fill="#e1bee7" text-anchor="middle">bit = 0 (even)</text>

    <line x1="562" y1="439" x2="584" y2="439" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="587" y="422" width="100" height="32" rx="5" fill="#37474f"/>
    <text x="637" y="442" font-size="9" fill="#ffffff" text-anchor="middle">Output: 1,0,0...</text>
  </g>

  <!-- BBS vs LCG Comparison -->
  <g id="step7" class="step" data-narration="Compared to LCGs, BBS is cryptographically secure but much slower because it requires modular squaring of large numbers. It produces only 1 bit per iteration.">
    <text x="400" y="484" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">BBS vs LCG Comparison</text>

    <rect x="80" y="494" width="290" height="48" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.2"/>
    <text x="225" y="511" font-size="10" font-weight="bold" fill="#c62828" text-anchor="middle">LCG</text>
    <text x="225" y="525" font-size="8" fill="#455a64" text-anchor="middle">Fast, full word per iteration, NOT secure</text>
    <text x="225" y="537" font-size="8" fill="#455a64" text-anchor="middle">Parameters recoverable from outputs</text>

    <rect x="430" y="494" width="290" height="48" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="575" y="511" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">BBS</text>
    <text x="575" y="525" font-size="8" fill="#455a64" text-anchor="middle">Slow, 1 bit per iteration, SECURE</text>
    <text x="575" y="537" font-size="8" fill="#455a64" text-anchor="middle">Security proven equivalent to factoring</text>
  </g>

  <!-- Applications -->
  <g id="step8" class="step" data-narration="BBS is used in cryptographic key generation, one-time pad generation, and as a building block in protocols requiring provable security guarantees.">
    <text x="400" y="562" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Applications</text>

    <rect x="60" y="572" width="200" height="22" rx="4" fill="#1565c0"/>
    <text x="160" y="587" font-size="8" fill="#ffffff" text-anchor="middle">Cryptographic Key Generation</text>

    <rect x="280" y="572" width="200" height="22" rx="4" fill="#2e7d32"/>
    <text x="380" y="587" font-size="8" fill="#ffffff" text-anchor="middle">One-Time Pad Generation</text>

    <rect x="500" y="572" width="240" height="22" rx="4" fill="#6a1b9a"/>
    <text x="620" y="587" font-size="8" fill="#ffffff" text-anchor="middle">Provably Secure Protocol Building Block</text>
  </g>
</svg>
