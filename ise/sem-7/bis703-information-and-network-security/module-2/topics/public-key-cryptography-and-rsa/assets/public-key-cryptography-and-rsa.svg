<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Public Key Cryptography and RSA</text>

  <g id="step0" class="step" data-narration="Public key cryptography uses two mathematically linked keys: a public key for encryption and a private key for decryption. This solves the key distribution problem of symmetric cryptography.">
    <rect x="100" y="55" width="280" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="240" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Symmetric (Single Key)</text>
    <text x="240" y="92" text-anchor="middle" font-size="10" fill="#333">Key distribution problem</text>
    <line x1="385" y1="77" x2="415" y2="77" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="420" y="55" width="280" height="45" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="560" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Asymmetric (Key Pair)</text>
    <text x="560" y="92" text-anchor="middle" font-size="10" fill="#333">Public key freely shared</text>
  </g>

  <g id="step1" class="step" data-narration="The two-key principle: the public key encrypts data or verifies signatures. The private key decrypts data or creates signatures. It must be infeasible to derive the private key from the public key.">
    <text x="400" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">The Two-Key Principle</text>
    <rect x="50" y="135" width="330" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Public Key (e, n)</text>
    <text x="215" y="175" text-anchor="middle" font-size="10" fill="#333">Encrypt | Verify Signatures</text>
    <rect x="420" y="135" width="330" height="50" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="585" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Private Key (d, n)</text>
    <text x="585" y="175" text-anchor="middle" font-size="10" fill="#333">Decrypt | Create Signatures</text>
  </g>

  <g id="step2" class="step" data-narration="RSA key generation: choose two large primes p and q, compute n equals p times q, compute phi of n, choose public exponent e coprime to phi n, then find private exponent d as the modular inverse of e.">
    <text x="400" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">RSA Key Generation</text>
    <rect x="50" y="225" width="140" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="120" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">1. p, q primes</text>
    <text x="120" y="260" text-anchor="middle" font-size="9" fill="#333">Large, random</text>
    <line x1="195" y1="247" x2="215" y2="247" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="220" y="225" width="120" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="280" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">2. n = p*q</text>
    <text x="280" y="260" text-anchor="middle" font-size="9" fill="#333">Modulus</text>
    <line x1="345" y1="247" x2="365" y2="247" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="370" y="225" width="120" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="430" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">3. phi(n)</text>
    <text x="430" y="260" text-anchor="middle" font-size="9" fill="#333">(p-1)(q-1)</text>
    <line x1="495" y1="247" x2="515" y2="247" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="520" y="225" width="230" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="635" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">4. e, d: e*d mod phi=1</text>
    <text x="635" y="260" text-anchor="middle" font-size="9" fill="#333">Public &amp; Private exponents</text>
  </g>

  <g id="step3" class="step" data-narration="RSA encryption: ciphertext C equals message M raised to the power e modulo n. Only the holder of private key d can reverse this operation.">
    <rect x="50" y="290" width="340" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Encryption: C = M^e mod n</text>
    <text x="220" y="335" text-anchor="middle" font-size="11" fill="#333">Anyone with public key (e, n) can encrypt</text>
  </g>

  <g id="step4" class="step" data-narration="RSA decryption: plaintext M equals ciphertext C raised to the power d modulo n. This works because of Euler's theorem: M to the ed mod n equals M.">
    <rect x="410" y="290" width="340" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="580" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Decryption: M = C^d mod n</text>
    <text x="580" y="335" text-anchor="middle" font-size="11" fill="#333">Only private key holder can decrypt</text>
  </g>

  <g id="step5" class="step" data-narration="The one-way trapdoor function: multiplying p times q is easy, but factoring n back into p and q is computationally hard. The private key is the trapdoor that makes reversal possible.">
    <rect x="100" y="365" width="600" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">One-Way Trapdoor Function</text>
    <text x="400" y="405" text-anchor="middle" font-size="11" fill="#333">Easy: p * q = n | Hard: factor n into p, q | Trapdoor: knowing p or q</text>
  </g>

  <g id="step6" class="step" data-narration="RSA applications include encryption for confidentiality, digital signatures for authentication and non-repudiation, and key exchange to establish symmetric session keys.">
    <text x="400" y="440" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Applications of RSA</text>
    <rect x="50" y="450" width="220" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="160" y="475" text-anchor="middle" font-size="11" fill="#1976d2">Encryption (Confidentiality)</text>
    <rect x="290" y="450" width="220" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="475" text-anchor="middle" font-size="11" fill="#e65100">Digital Signatures</text>
    <rect x="530" y="450" width="220" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="640" y="475" text-anchor="middle" font-size="11" fill="#388e3c">Key Exchange</text>
  </g>

  <g id="step7" class="step" data-narration="Example: p=61, q=53, n=3233, phi=3120, e=17, d=2753. Encrypt M=65: C = 65 to the 17 mod 3233 equals 2790. Decrypt: 2790 to the 2753 mod 3233 equals 65.">
    <rect x="50" y="510" width="700" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="527" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Example: p=61, q=53, n=3233, e=17, d=2753</text>
    <text x="400" y="543" text-anchor="middle" font-size="11" fill="#333">Encrypt M=65: C=65^17 mod 3233=2790 | Decrypt: 2790^2753 mod 3233=65</text>
  </g>

  <g id="step8" class="step" data-narration="In practice, hybrid systems use RSA to securely exchange a symmetric session key, then use fast symmetric encryption like AES for bulk data, combining the best of both approaches.">
    <rect x="100" y="560" width="600" height="35" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="582" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Hybrid: RSA exchanges AES key, AES encrypts bulk data</text>
  </g>
</svg>
