<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Computational Aspects of Cryptography</text>

  <g id="step0" class="step" data-narration="Cryptographic security relies on computationally hard mathematical problems that are easy one way but hard to reverse.">
    <rect x="150" y="55" width="500" height="40" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="80" text-anchor="middle" font-size="14" fill="#9c27b0">Security based on one-way functions: easy forward, hard to reverse</text>
  </g>

  <g id="step1" class="step" data-narration="Integer Factorization Problem: multiplying two large primes is fast, but factoring their product is infeasible.">
    <text x="400" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Hard Problem 1: Integer Factorization</text>
    <rect x="50" y="133" width="300" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="200" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Easy: p * q = n</text>
    <text x="200" y="178" text-anchor="middle" font-size="12" fill="#333">61 * 53 = 3233 (fast)</text>
    <rect x="450" y="133" width="300" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="600" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Hard: n = ? * ?</text>
    <text x="600" y="178" text-anchor="middle" font-size="12" fill="#333">3233 = ?? (infeasible for large n)</text>
    <text x="400" y="205" text-anchor="middle" font-size="12" fill="#1976d2">Basis for RSA</text>
  </g>

  <g id="step2" class="step" data-narration="Discrete Logarithm Problem: computing g to the x mod p is easy, but finding x from the result is infeasible.">
    <text x="400" y="235" text-anchor="middle" font-size="15" font-weight="bold" fill="#388e3c">Hard Problem 2: Discrete Logarithm</text>
    <rect x="50" y="248" width="300" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="200" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Easy: y = g^x mod p</text>
    <text x="200" y="293" text-anchor="middle" font-size="12" fill="#333">Modular exponentiation (fast)</text>
    <rect x="450" y="248" width="300" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="600" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Hard: find x from y</text>
    <text x="600" y="293" text-anchor="middle" font-size="12" fill="#333">Discrete log (infeasible)</text>
    <text x="400" y="318" text-anchor="middle" font-size="12" fill="#388e3c">Basis for Diffie-Hellman and DSA</text>
  </g>

  <g id="step3" class="step" data-narration="Elliptic Curve Discrete Logarithm is even harder, allowing smaller keys. 256-bit ECC equals 3072-bit RSA security.">
    <text x="400" y="348" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff9800">Hard Problem 3: ECDLP</text>
    <rect x="150" y="358" width="500" height="45" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="378" text-anchor="middle" font-size="12" fill="#333">Elliptic Curve variant: 256-bit ECC = 3072-bit RSA security</text>
    <text x="400" y="396" text-anchor="middle" font-size="12" fill="#e65100">Smaller keys, faster computation | Basis for ECC</text>
  </g>

  <g id="step4" class="step" data-narration="Square-and-multiply algorithm makes modular exponentiation efficient by breaking it into squarings and multiplications.">
    <text x="400" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Efficient Algorithm: Square-and-Multiply</text>
    <rect x="100" y="440" width="600" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="460" text-anchor="middle" font-size="12" fill="#333">M^e mod n: Break exponent into binary, square and multiply iteratively</text>
    <text x="400" y="480" text-anchor="middle" font-size="12" fill="#9c27b0">Makes RSA encryption/decryption practical even with 2048-bit keys</text>
  </g>

  <g id="step5" class="step" data-narration="Symmetric ciphers like AES are fast for bulk data. Asymmetric is slower but solves key distribution.">
    <rect x="50" y="505" width="330" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Symmetric (AES): Very fast</text>
    <text x="215" y="543" text-anchor="middle" font-size="11" fill="#333">Bulk data encryption</text>
    <rect x="420" y="505" width="330" height="45" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="585" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Asymmetric (RSA): Slower</text>
    <text x="585" y="543" text-anchor="middle" font-size="11" fill="#333">Key exchange, signatures</text>
  </g>

  <g id="step6" class="step" data-narration="Problems in class P are easy, NP are verifiable. Crypto relies on problems believed to be outside P.">
    <rect x="100" y="560" width="600" height="30" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="580" text-anchor="middle" font-size="12" fill="#388e3c">Complexity: P (easy to solve) vs NP (easy to verify) | Crypto uses problems believed outside P</text>
  </g>
</svg>
