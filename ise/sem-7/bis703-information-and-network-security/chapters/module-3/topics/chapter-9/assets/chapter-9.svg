<svg width="420" height="400" data-topic-id="virtual-private-networks-vpns"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="fill: #a2c9f5; stroke: #333; stroke-width: 2;">

    <title>Chapter 9: Virtual Private Networks (VPNs)</title>

    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a2c9f5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#a2c9f5" stop-opacity="0.5"/>
        </linearGradient>
    </defs>

    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    <text x="50%" y="20%" font-size="24" text-anchor="middle" fill="#333">Virtual Private Networks (VPNs)</text>

    <text x="50%" y="100%" font-size="18" text-anchor="middle" fill="#333" data-narration="Overview">
        A VPN is a secure, encrypted connection between two endpoints over the internet.
    </text>

    <rect x="50" y="150" width="300" height="50" fill="#fff" rx="10"/>

    <g transform="translate(50, 170)">
        <circle cx="50" cy="20" r="15" fill="#3498db"/>
        <text x="40" y="20" font-size="16" text-anchor="middle" fill="#333">Servers</text>
        <text x="80" y="20" font-size="16" text-anchor="middle" fill="#333">Clients</text>
        <line x1="60" y1="40" x2="80" y2="40" stroke="#333" stroke-width="2"/>
        <line x1="60" y1="40" x2="40" y2="40" stroke="#333" stroke-width="2"/>
    </g>

    <g transform="translate(50, 220)">
        <animateTransform attributeName="transform" type="translate" from="0 220" to="0 280" dur="2s" begin="0s"/>
        <rect x="0" y="0" width="300" height="50" fill="#fff" rx="10"/>
        <text x="50%" y="20%" font-size="18" text-anchor="middle" fill="#333" data-narration="How VPNs Work">
            1. User Request: A user requests access to a network or initiate a VPN connection.
            2. Encryption: The user's device encrypts the data, using a pre-shared secret key or a username and password.
            3. Server Connection: The encrypted data is sent to a VPN server, which decrypts and forwards it to the destination network.
            4. Decryption: The VPN server encrypts the data again and sends it to the destination network.
            5. Return Journey: The return journey follows the same process in reverse.
        </text>
    </g>

    <g transform="translate(50, 280)">
        <animateTransform attributeName="transform" type="translate" from="0 280" to="0 340" dur="2s" begin="0s"/>
        <rect x="0" y="0" width="300" height="50" fill="#fff" rx="10"/>
        <text x="50%" y="20%" font-size="18" text-anchor="middle" fill="#333" data-narration="Types of VPNs">
            Site-to-Site VPN: Connects multiple sites within an organization to a central network.
            Remote Access VPN: Allows remote users to access a network from outside the organization.
            Infrastructure VPN: Connects multiple VPN servers to form a network.
        </text>
    </g>

    <g transform="translate(50, 340)">
        <animateTransform attributeName="transform" type="translate" from="0 340" to="0 400" dur="2s" begin="0s"/>
        <rect x="0" y="0" width="300" height="50" fill="#fff" rx="10"/>
        <text x="50%" y="20%" font-size="18" text-anchor="middle" fill="#333" data-narration="Advantages and Disadvantages of VPNs">
            Advantages: Security, Anonymity, Access Control, Cost-Effectiveness.
            Disadvantages: Performance, Complexity.
        </text>
    </g>

    <footer>
        <text x="50%" y="370%" font-size="18" text-anchor="middle" fill="#333">Chapter 9: Virtual Private Networks (VPNs)</text>
    </footer>

</svg>