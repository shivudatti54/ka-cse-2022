<svg width="420" height="400" data-topic-id="cryptographic-protocols-protocol-basics-from-objectives" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5498db" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4682b4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682b4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#color-gradient)"/>
  <text x="10" y="20" fill="#fff" font-size="24" font-family="Arial" text-anchor="start">Cryptographic Protocols: Protocol Basics</text>
  <section id="confidentiality" data-narration="Protecting confidentiality is the first step in designing a cryptographic protocol. It involves ensuring that the data being transmitted remains secret and is not accessible to unauthorized parties.">
    <rect x="0" y="50" width="420" height="200" fill="#fff" rx="10"/>
    <text x="10" y="60" fill="#444" font-size="18" font-family="Arial" text-anchor="start">Confidentiality</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="5s" begin="0s"/>
    <path d="M 210 200 L 170 170" stroke="#4b4b4b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </section>
  <section id="integrity" data-narration="Ensuring data integrity is crucial in cryptographic protocols. It involves verifying that the data being transmitted has not been modified during transmission.">
    <rect x="0" y="260" width="420" height="200" fill="#fff" rx="10"/>
    <text x="10" y="270" fill="#444" font-size="18" font-family="Arial" text-anchor="start">Integrity</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="5s" begin="1s"/>
    <path d="M 210 200 L 230 220" stroke="#4b4b4b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </section>
  <section id="authenticity" data-narration="Verifying the authenticity of the sender is essential in cryptographic protocols. It involves ensuring that the data being transmitted comes from a trusted source.">
    <rect x="0" y="370" width="420" height="200" fill="#fff" rx="10"/>
    <text x="10" y="380" fill="#444" font-size="18" font-family="Arial" text-anchor="start">Authenticity</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="5s" begin="2s"/>
    <path d="M 210 200 L 250 190" stroke="#4b4b4b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </section>
  <section id="key-exchange" data-narration="Key exchange is the process of establishing a shared secret key between communicating parties. It is a critical component of cryptographic protocols.">
    <rect x="0" y="50" width="420" height="200" fill="#fff" rx="10"/>
    <text x="10" y="60" fill="#444" font-size="18" font-family="Arial" text-anchor="start">Key Exchange</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="5s" begin="0s"/>
    <path d="M 210 200 L 170 170" stroke="#4b4b4b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </section>
  <section id="encryption" data-narration="Encryption involves using a shared secret key to protect the data being transmitted. It ensures that the data remains confidential and is not accessible to unauthorized parties.">
    <rect x="0" y="260" width="420" height="200" fill="#fff" rx="10"/>
    <text x="10" y="270" fill="#444" font-size="18" font-family="Arial" text-anchor="start">Encryption</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="5s" begin="1s"/>
    <path d="M 210 200 L 230 220" stroke="#4b4b4b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </section>
  <section id="decryption" data-narration="Decryption involves using a shared secret key to recover the original data being transmitted. It is the reverse process of encryption.">
    <rect x="0" y="370" width="420" height="200" fill="#fff" rx="10"/>
    <text x="10" y="380" fill="#444" font-size="18" font-family="Arial" text-anchor="start">Decryption</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="5s" begin="2s"/>
    <path d="M 210 200 L 250 190" stroke="#4b4b4b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </section>
  <section id="authentication" data-narration="Authentication involves verifying the identity of the sender and ensuring that the data comes from a trusted source. It is a critical component of cryptographic protocols.">
    <rect x="0" y="50" width="420" height="200" fill="#fff" rx="10"/>
    <text x="10" y="60" fill="#444" font-size="18" font-family="Arial" text-anchor="start">Authentication</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="5s" begin="0s"/>
    <path d="M 210 200 L 170 170" stroke="#4b4b4b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </section>
  <footer>
    <text x="10" y="380" fill="#fff" font-size="18" font-family="Arial" text-anchor="start">Cryptographic Protocols: Protocol Basics</text>
  </footer>
</svg>