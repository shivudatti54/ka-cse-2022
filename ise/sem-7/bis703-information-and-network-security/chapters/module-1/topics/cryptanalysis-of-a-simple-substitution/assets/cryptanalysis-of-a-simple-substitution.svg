<svg width="420" height="400" data-topic-id="cryptanalysis-of-simple-substitution" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title section -->
  <section data-narration="introduction">
    <g transform="translate(10, 20)">
      <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">Cryptanalysis of Simple Substitution</text>
    </g>
  </section>
  
  <!-- What is Cryptanalysis? section -->
  <section data-narration="what-is-cryptanalysis">
    <g transform="translate(10, 70)">
      <circle cx="100" cy="50" r="30" fill="#3498db" stroke="#2ecc71" stroke-width="2"/>
      <text x="120" y="50" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">Cryptanalysis</text>
      <text x="100" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">is the process of breaking or cracking the encryption of a ciphertext to obtain the original plaintext.</text>
    </g>
  </section>
  
  <!-- What is a Simple Substitution? section -->
  <section data-narration="what-is-simple-substitution">
    <g transform="translate(10, 130)">
      <rect x="0" y="0" width="200" height="50" fill="#3498db" stroke="#2ecc71" stroke-width="2"/>
      <text x="5" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">A simple substitution is a type of encryption technique where each plaintext character is replaced by a different plaintext character.</text>
    </g>
  </section>
  
  <!-- Types of Substitution Ciphers section -->
  <section data-narration="types-of-substitution-ciphers">
    <g transform="translate(10, 180)">
      <rect x="0" y="0" width="200" height="50" fill="#3498db" stroke="#2ecc71" stroke-width="2"/>
      <text x="5" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">There are two types of substitution ciphers:</text>
      <text x="120" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">Single Substitution Cipher and Double Substitution Cipher.</text>
    </g>
  </section>
  
  <!-- How Simple Substitution Ciphers Work section -->
  <section data-narration="how-simple-substitution-ciphers-work">
    <g transform="translate(10, 230)">
      <rect x="0" y="0" width="200" height="50" fill="#3498db" stroke="#2ecc71" stroke-width="2"/>
      <text x="5" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">Here's an example of a simple substitution cipher:</text>
      <text x="120" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">| Plaintext | Substitution | Ciphertext |</text>
      <text x="120" y="40" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">| A         | D            | B          |</text>
      <text x="120" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">| B         | E            | C          |</text>
      <text x="120" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">| C         | F            | D          |</text>
    </g>
  </section>
  
  <!-- Types of Attacks on Simple Substitution Ciphers section -->
  <section data-narration="types-of-attacks-on-simple-substitution-ciphers">
    <g transform="translate(10, 280)">
      <rect x="0" y="0" width="200" height="50" fill="#3498db" stroke="#2ecc71" stroke-width="2"/>
      <text x="5" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">There are three types of attacks on simple substitution ciphers:</text>
      <text x="120" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">Frequency Analysis, Pattern Analysis and Brute Force Attack.</text>
    </g>
  </section>
  
  <!-- Example of Frequency Analysis Attack section -->
  <section data-narration="example-of-frequency-analysis-attack">
    <g transform="translate(10, 320)">
      <rect x="0" y="0" width="200" height="50" fill="#3498db" stroke="#2ecc71" stroke-width="2"/>
      <text x="5" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">Suppose the ciphertext is:</text>
      <text x="120" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">ABCD</text>
      <text x="120" y="30" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="middle">By analyzing the frequency of letters in the ciphertext, we can deduce the most likely plaintext character.</text>
    </g>
  </section>
  
  <!-- Footer section -->
  <footer>
    <g transform="translate(10, 360)">
      <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" fill="#3498db" text-anchor="middle">Cryptanalysis of Simple Substitution</text>
    </g>
  </footer>
  
  <!-- Arrow markers for connections -->
  <path d="M 10 20 L 30 50"/>
  <path d="M 10 50 L 30 70"/>
  <path d="M 10 70 L 30 90"/>
  <path d="M 10 90 L 30 110"/>
  
  <!-- Smooth animations using <animate> elements with sequential begin times -->
  <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#gradient" begin="0s" dur="5s" repeatCount="indefinite"/>
  <animate xlink:href="#gradient" begin="2s" dur="5s" repeatCount="indefinite"/>
  <animate xlink:href="#gradient" begin="4s" dur="5s" repeatCount="indefinite"/>
</svg>