<svg width="420" height="400" data-topic-id="double-transposition-cipher">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Double Transposition Cipher</title>
  <metadata>
    <title>Double Transposition Cipher</title>
    <description>Animated educational diagram for Double Transposition Cipher.</description>
  </metadata>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
  <g id="transposition-sections" transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="100" fill="#87CEEB" rx="10"/>
    <rect x="110" y="0" width="100" height="100" fill="#A1C9F2" rx="10"/>
    <rect x="220" y="0" width="100" height="100" fill="#C7B8EA" rx="10"/>
    <rect x="330" y="0" width="100" height="100" fill="#4CAF50" rx="10"/>
    <g id="first-transposition" transform="translate(40, 50)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="3s" begin="0s"/>
      <text x="50" y="150" font-size="24" fill="#000" text-anchor="middle">First Transposition</text>
    </g>
    <g id="second-transposition" transform="translate(40, 150)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="3s" begin="3s"/>
      <text x="50" y="200" font-size="24" fill="#000" text-anchor="middle">Second Transposition</text>
    </g>
    <g id="substitution" transform="translate(40, 250)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 150" dur="3s" begin="6s"/>
      <text x="50" y="300" font-size="24" fill="#000" text-anchor="middle">Substitution</text>
    </g>
    <g id="key-section" transform="translate(40, 350)">
      <rect x="0" y="0" width="100" height="100" fill="#4CAF50" rx="10"/>
      <rect x="110" y="0" width="100" height="100" fill="#C7B8EA" rx="10"/>
      <g id="key-notation" transform="translate(20, 50)">
        <text x="50" y="100" font-size="18" fill="#000" text-anchor="middle">Key</text>
      </g>
    </g>
    <g id="plaintext-section" transform="translate(40, 150)">
      <rect x="0" y="0" width="100" height="100" fill="#87CEEB" rx="10"/>
      <rect x="110" y="0" width="100" height="100" fill="#A1C9F2" rx="10"/>
      <g id="plaintext-notation" transform="translate(20, 50)">
        <text x="50" y="100" font-size="18" fill="#000" text-anchor="middle">Plaintext</text>
      </g>
      <g id="ciphertext-section" transform="translate(40, 200)">
        <rect x="0" y="0" width="100" height="100" fill="#4CAF50" rx="10"/>
        <rect x="110" y="0" width="100" height="100" fill="#C7B8EA" rx="10"/>
        <g id="ciphertext-notation" transform="translate(20, 50)">
          <text x="50" y="100" font-size="18" fill="#000" text-anchor="middle">Ciphertext</text>
        </g>
      </g>
    </g>
  </g>
  <g id="arrow-markers">
    <arrow marker-end="line" marker-start="line" marker-width="2" fill="#000" stroke="#000"/>
    <line x1="20" y1="10" x2="40" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="110" y1="10" x2="130" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="220" y1="10" x2="240" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="330" y1="10" x2="350" y2="30" stroke="#000" stroke-width="2"/>
  </g>
  <g id="footer">
    <text x="10" y="380" font-size="18" fill="#000" text-anchor="left">Double Transposition Cipher</text>
  </g>
</svg>