    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="26000s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(360 200 200)">
    <text x="50" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">Quantum Cryptography</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="28000s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(0 200 200)">
    <text x="50" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">The Future of Cryptography</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="30000s" repeatCount="indefinite"/>
