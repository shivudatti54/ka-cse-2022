    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(90 200 200)">
    <text x="50" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">The Internet and the Rise of Public-Key Cryptography (1990s)</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="2000s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(180 200 200)">
    <text x="50" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">The 21st Century (2000s-Present)</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="4000s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(270 200 200)">
    <text x="50" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">Early Years (1960s-1980s)</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="6000s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(360 200 200)">
    <text x="50" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">The Internet and the Rise of Public-Key Cryptography (1990s)</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="8000s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(0 200 200)">
