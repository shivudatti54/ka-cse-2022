<svg width="420" height="400" data-topic-id="modern-crypto-history">
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA" rx="10"/>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#B2E6CE"/>
    </linearGradient>
  </defs>
  <title>Modern Crypto History</title>
  <rect x="10" y="10" width="400" height="60" fill="#2F4F7F" rx="10"/>
  <rect x="10" y="80" width="400" height="60" fill="#3E8E41" rx="10"/>
  <rect x="10" y="150" width="400" height="60" fill="#F7DC6F" rx="10"/>
  <rect x="10" y="220" width="400" height="60" fill="#3498DB" rx="10"/>
  <rect x="10" y="290" width="400" height="60" fill="#F1C40F" rx="10"/>
  <rect x="10" y="360" width="400" height="40" fill="#2F4F7F" rx="10"/>
  <path d="M 50 20 L 100 20 L 100 40 L 50 40 L 50 20 Z" fill="#2F4F7F" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M 100 20 L 150 20 L 150 40 L 100 40 L 100 20 Z" fill="#3E8E41" stroke="#FFFFFF" stroke-width="2"/>
