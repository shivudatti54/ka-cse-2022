    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="10000s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(90 200 200)">
    <text x="50" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">Key Exchange Protocols</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="12000s" repeatCount="indefinite"/>
  </g>
  <g transform="rotate(180 200 200)">
