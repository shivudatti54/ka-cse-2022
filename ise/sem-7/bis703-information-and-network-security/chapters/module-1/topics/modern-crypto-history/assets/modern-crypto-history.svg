  <path d="M 200 20 L 250 20 L 250 40 L 200 40 L 200 20 Z" fill="#3498DB" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M 250 20 L 300 20 L 300 40 L 250 40 L 250 20 Z" fill="#F1C40F" stroke="#FFFFFF" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
  <g transform="rotate(0 200 200)">
