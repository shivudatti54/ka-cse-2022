<svg width="420" height="400" data-topic-id="one-time-pad" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title Section -->
  <g transform="translate(20, 20)">
    <text data-narration="Title" x="0" y="20" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3498db">
      One-Time Pad
    </text>
  </g>
  
  <!-- Key Generation Section -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="200" height="100" fill="#f9f9f9" rx="10"/>
    <text data-narration="Key Generation" x="10" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71">
      Key Generation:
      Generate a random and unguessable key.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="0s"/>
  </g>
  
  <!-- Key Distribution Section -->
  <g transform="translate(20, 160)">
    <rect x="0" y="0" width="200" height="100" fill="#f9f9f9" rx="10"/>
    <text data-narration="Key Distribution" x="10" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71">
      Key Distribution:
      Securely distribute the key to the parties involved.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 200" dur="2s" begin="0.5s"/>
  </g>
  
  <!-- Key Usage Section -->
  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="200" height="100" fill="#f9f9f9" rx="10"/>
    <text data-narration="Key Usage" x="10" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71">
      Key Usage:
      Use the key only once for encryption and decryption.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 300" dur="2s" begin="1s"/>
  </g>
  
  <!-- Encryption Process Section -->
  <g transform="translate(20, 320)">
    <rect x="0" y="0" width="200" height="100" fill="#f9f9f9" rx="10"/>
    <text data-narration="Encryption Process" x="10" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71">
      Encryption Process:
      Convert plaintext message to binary, XOR with encryption key, and get ciphertext.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" dur="2s" begin="2s"/>
  </g>
  
  <!-- Decryption Process Section -->
  <g transform="translate(20, 400)">
    <rect x="0" y="0" width="200" height="100" fill="#f9f9f9" rx="10"/>
    <text data-narration="Decryption Process" x="10" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71">
      Decryption Process:
      Convert ciphertext to binary, XOR with decryption key, and get plaintext.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 500" dur="2s" begin="3s"/>
  </g>
  
  <!-- Disadvantages Section -->
  <g transform="translate(20, 480)">
    <rect x="0" y="0" width="200" height="100" fill="#f9f9f9" rx="10"/>
    <text data-narration="Disadvantages" x="10" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#e74c3c">
      Disadvantages:
      Key size must be equal to data size, secure key exchange and storage required.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 600" dur="2s" begin="4s"/>
  </g>
  
  <!-- Security Considerations Section -->
  <g transform="translate(20, 640)">
    <rect x="0" y="0" width="200" height="100" fill="#f9f9f9" rx="10"/>
    <text data-narration="Security Considerations" x="10" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#e74c3c">
      Security Considerations:
      Key generation must be cryptographically secure, secure distribution and storage required.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 700" dur="2s" begin="5s"/>
  </g>
  
  <!-- Arrow Markers -->
  <line x1="50" y1="100" x2="150" y2="300" stroke="#3498db" stroke-width="2" fill="none"/>
  <line x1="50" y1="300" x2="150" y2="400" stroke="#3498db" stroke-width="2" fill="none"/>
  <line x1="50" y1="400" x2="150" y2="500" stroke="#3498db" stroke-width="2" fill="none"/>
  <line x1="50" y1="500" x2="150" y2="600" stroke="#3498db" stroke-width="2" fill="none"/>
  
  <!-- Footer Section -->
  <g transform="translate(20, 680)">
    <text data-narration="Footer" x="10" y="670" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#3498db">
      Learn more about secure encryption techniques at <a href="https://www.example.com" xlink:href="#">https://www.example.com</a>.
    </text>
  </g>
</svg>