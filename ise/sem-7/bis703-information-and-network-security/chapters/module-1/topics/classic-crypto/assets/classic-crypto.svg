<svg width="420" height="400"
     data-topic-id="classic-crypto"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xml:space="preserve">

    <!-- Gradient background with pastel colors -->
    <defs>
        <linearGradient id="pastel" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C9E4CA"/>
            <stop offset="100%" stop-color="#E6F2FF"/>
        </linearGradient>
    </defs>

    <!-- Title at top -->
    <rect x="50" y="20" width="320" height="20" fill="#4567b7"
          rx="5" data-narration="Classic Crypto: Introduction to Synchronization Problems">
        <animateTransform attributeName="transform" type="rotate" from="0 200 20" to="360 200 20" dur="10s" begin="0s" repeatCount="indefinite"/>
    </rect>

    <!-- Section 1: Producer-Consumer Problem -->
    <section x="20" y="50" width="320" height="150" fill-opacity="0.7">
        <rect x="50" y="50" width="220" height="100" fill="#C9E4CA" rx="5"
              data-narration="Producer-Consumer Problem: Problem Statement">
            <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <rect x="150" y="50" width="70" height="70" fill="#4567b7" rx="5"
              data-narration="Producer-Consumer Problem: Solution with Semaphores">
            <animateTransform attributeName="transform" type="rotate" from="0 150 70" to="360 150 70" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <rect x="50" y="120" width="220" height="30" fill="#E6F2FF" rx="5"
              data-narration="Producer-Consumer Problem: Solution with Semaphores (Code)">
            <animateTransform attributeName="transform" type="rotate" from="0 200 120" to="360 200 120" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
    </section>

    <!-- Section 2: Readers-Writers Problem -->
    <section x="20" y="220" width="320" height="150" fill-opacity="0.7">
        <rect x="50" y="220" width="220" height="100" fill="#C9E4CA" rx="5"
              data-narration="Readers-Writers Problem: Problem Statement">
            <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <rect x="150" y="220" width="70" height="70" fill="#4567b7" rx="5"
              data-narration="Readers-Writers Problem: First Readers-Writers Solution (Readers Preference)">
            <animateTransform attributeName="transform" type="rotate" from="0 150 70" to="360 150 70" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <rect x="50" y="120" width="220" height="30" fill="#E6F2FF" rx="5"
              data-narration="Readers-Writers Problem: First Readers-Writers Solution (Readers Preference) (Code)">
            <animateTransform attributeName="transform" type="rotate" from="0 200 120" to="360 200 120" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
    </section>

    <!-- Section 3: Starvation Problem -->
    <section x="20" y="330" width="320" height="150" fill-opacity="0.7">
        <rect x="50" y="330" width="220" height="100" fill="#C9E4CA" rx="5"
              data-narration="Starvation Problem: Solution">
            <animateTransform attributeName="transform" type="rotate" from="0 200 330" to="360 200 330" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <rect x="150" y="330" width="70" height="70" fill="#4567b7" rx="5"
              data-narration="Starvation Problem: Solution (Code)">
            <animateTransform attributeName="transform" type="rotate" from="0 150 70" to="360 150 70" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
    </section>

    <!-- Section 4: Optimizations -->
    <section x="20" y="430" width="320" height="150" fill-opacity="0.7">
        <rect x="50" y="430" width="220" height="100" fill="#C9E4CA" rx="5"
              data-narration="Optimizations: Solution">
            <animateTransform attributeName="transform" type="rotate" from="0 200 430" to="360 200 430" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <rect x="150" y="430" width="70" height="70" fill="#4567b7" rx="5"
              data-narration="Optimizations: Solution (Code)">
            <animateTransform attributeName="transform" type="rotate" from="0 150 70" to="360 150 70" dur="10s" begin="0s" repeatCount="indefinite"/>
        </rect>
    </section>

    <!-- Footer -->
    <rect x="50" y="480" width="320" height="20" fill="#4567b7" rx="5" data-narration="Classic Crypto: Conclusion">
        <animateTransform attributeName="transform" type="rotate" from="0 200 490" to="360 200 490" dur="10s" begin="0s" repeatCount="indefinite"/>
    </rect>

</svg>