<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="introduction">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- ============================================================ -->
  <!-- GROUP 1: Title & Distributed System Overview (begin=0.3s)    -->
  <!-- ============================================================ -->
  <g data-narration="A distributed system is a collection of independent computers connected via a network, coordinating by passing messages to appear as a single coherent system." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
    <!-- Title -->
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#3949AB">Distributed Systems &amp; Remote Invocation</text>
    <!-- Subtitle -->
    <text x="210" y="40" text-anchor="middle" font-family="Arial" font-size="9" fill="#5C6BC0">Nodes communicate by passing messages over a network</text>
    <!-- Divider line -->
    <line x1="30" y1="47" x2="390" y2="47" stroke="#3949AB" stroke-width="1" opacity="0.4"/>
    <!-- Network cloud shape -->
    <ellipse cx="210" cy="78" rx="70" ry="18" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="210" y="82" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">NETWORK</text>
    <!-- Three distributed nodes -->
    <rect x="55" y="62" width="48" height="28" rx="5" fill="#3949AB" opacity="0.85"/>
    <text x="79" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="white">Node A</text>
    <rect x="186" y="100" width="48" height="28" rx="5" fill="#3949AB" opacity="0.85"/>
    <text x="210" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="white">Node B</text>
    <rect x="317" y="62" width="48" height="28" rx="5" fill="#3949AB" opacity="0.85"/>
    <text x="341" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="white">Node C</text>
    <!-- Connection lines to cloud -->
    <line x1="103" y1="76" x2="140" y2="76" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="280" y1="76" x2="317" y2="76" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="210" y1="96" x2="210" y2="100" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================ -->
  <!-- GROUP 2: Client-Server Model (begin=1.5s)                    -->
  <!-- ============================================================ -->
  <g data-narration="The client-server model is the primary architecture for resource sharing. A client sends a request to the server, which processes it and returns a response." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>
    <!-- Section label -->
    <text x="30" y="150" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Client-Server Model</text>
    <!-- Client box -->
    <rect x="30" y="158" width="90" height="42" rx="6" fill="url(#clientGrad)"/>
    <text x="75" y="175" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Client</text>
    <text x="75" y="190" text-anchor="middle" font-family="monospace" font-size="7" fill="#C5CAE9">sends request</text>
    <!-- Server box -->
    <rect x="170" y="158" width="90" height="42" rx="6" fill="url(#serverGrad)"/>
    <text x="215" y="175" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Server</text>
    <text x="215" y="190" text-anchor="middle" font-family="monospace" font-size="7" fill="#A5D6A7">sends response</text>
    <!-- Request arrow -->
    <line x1="120" y1="172" x2="168" y2="172" stroke="#E65100" stroke-width="1.8"/>
    <polygon points="168,169 174,172 168,175" fill="#E65100"/>
    <text x="146" y="167" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Request</text>
    <!-- Response arrow -->
    <line x1="170" y1="188" x2="122" y2="188" stroke="#00695C" stroke-width="1.8"/>
    <polygon points="122,185 116,188 122,191" fill="#00695C"/>
    <text x="146" y="197" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Response</text>
    <!-- Animated message dot going client to server -->
    <circle r="3" fill="#E65100" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="2.0s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="120;168;168;120" dur="2s" begin="2.0s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="172;172;188;188" dur="2s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============================================================ -->
  <!-- GROUP 3: Challenges of Distributed Systems (begin=3.0s)      -->
  <!-- ============================================================ -->
  <g data-narration="Distributed systems face key challenges: heterogeneity across different hardware and OS, concurrency when multiple clients access resources, scalability for growing users, security against unauthorized access, and failure handling to keep operating despite faults." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>
    <!-- Section label -->
    <text x="280" y="150" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Key Challenges</text>
    <!-- Challenge badges -->
    <rect x="275" y="156" width="64" height="18" rx="9" fill="#C62828"/>
    <text x="307" y="169" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Heterogeneity</text>
    <rect x="344" y="156" width="64" height="18" rx="9" fill="#E65100"/>
    <text x="376" y="169" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Concurrency</text>
    <rect x="275" y="178" width="64" height="18" rx="9" fill="#3949AB"/>
    <text x="307" y="191" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Scalability</text>
    <rect x="344" y="178" width="64" height="18" rx="9" fill="#00695C"/>
    <text x="376" y="191" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Security</text>
    <rect x="305" y="200" width="74" height="18" rx="9" fill="#6A1B9A"/>
    <text x="342" y="213" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Failure Handling</text>
  </g>

  <!-- ============================================================ -->
  <!-- GROUP 4: RPC Mechanism (begin=4.5s)                          -->
  <!-- ============================================================ -->
  <g data-narration="Remote Procedure Call (RPC) lets a client call a procedure on a remote server as if it were local. The client stub marshals parameters, sends them over the network, and the server stub unmarshals and executes the actual procedure." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>
    <!-- Section label -->
    <text x="210" y="238" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Remote Procedure Call (RPC)</text>
    <!-- Client machine -->
    <rect x="22" y="248" width="170" height="60" rx="6" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <text x="107" y="261" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Client Machine</text>
    <rect x="32" y="266" width="68" height="24" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
    <text x="66" y="281" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">Client Proc</text>
    <rect x="110" y="266" width="68" height="24" rx="4" fill="#3949AB"/>
    <text x="144" y="281" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Client Stub</text>
    <!-- Server machine -->
    <rect x="228" y="248" width="170" height="60" rx="6" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <text x="313" y="261" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Server Machine</text>
    <rect x="240" y="266" width="68" height="24" rx="4" fill="#00695C"/>
    <text x="274" y="281" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Server Stub</text>
    <rect x="318" y="266" width="68" height="24" rx="4" fill="#E0F2F1" stroke="#00695C" stroke-width="1"/>
    <text x="352" y="281" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">Server Proc</text>
    <!-- Network arrow forward -->
    <line x1="178" y1="276" x2="238" y2="276" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="236,273 242,276 236,279" fill="#E65100"/>
    <!-- Network arrow return -->
    <line x1="240" y1="282" x2="180" y2="282" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="182,279 176,282 182,285" fill="#00695C"/>
    <!-- Network label -->
    <text x="210" y="270" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Network</text>
    <!-- Animated data packet forward -->
    <rect width="10" height="6" rx="2" fill="#E65100" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="5.0s" repeatCount="indefinite"/>
      <animate attributeName="x" values="178;228;228;178" dur="2.5s" begin="5.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="273;273;280;280" dur="2.5s" begin="5.0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ============================================================ -->
  <!-- GROUP 5: Marshalling & Unmarshalling (begin=6.0s)            -->
  <!-- ============================================================ -->
  <g data-narration="Marshalling is the process of packaging parameters into a message for transmission. Unmarshalling extracts parameters from the received message. These steps ensure data integrity across heterogeneous systems." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>
    <!-- Section label -->
    <text x="210" y="325" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Marshal / Unmarshal Pipeline</text>
    <!-- Pipeline boxes -->
    <rect x="22" y="333" width="72" height="24" rx="4" fill="#3949AB"/>
    <text x="58" y="348" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Parameters</text>
    <!-- Arrow -->
    <line x1="94" y1="345" x2="110" y2="345" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="108,342 114,345 108,348" fill="#E65100"/>
    <rect x="114" y="333" width="68" height="24" rx="4" fill="#E65100"/>
    <text x="148" y="348" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Marshal</text>
    <!-- Arrow -->
    <line x1="182" y1="345" x2="198" y2="345" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="196,342 202,345 196,348" fill="#C62828"/>
    <rect x="200" y="333" width="56" height="24" rx="4" fill="#C62828"/>
    <text x="228" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Message</text>
    <text x="228" y="353" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFCDD2">[bytes]</text>
    <!-- Arrow -->
    <line x1="256" y1="345" x2="272" y2="345" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="270,342 276,345 270,348" fill="#00695C"/>
    <rect x="274" y="333" width="68" height="24" rx="4" fill="#00695C"/>
    <text x="308" y="348" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Unmarshal</text>
    <!-- Arrow -->
    <line x1="342" y1="345" x2="358" y2="345" stroke="#3949AB" stroke-width="1.5"/>
    <polygon points="356,342 362,345 356,348" fill="#3949AB"/>
    <rect x="360" y="333" width="46" height="24" rx="4" fill="#3949AB"/>
    <text x="383" y="348" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Result</text>
    <!-- Animated highlight bar sliding across pipeline -->
    <rect y="332" width="18" height="26" rx="3" fill="#E65100" opacity="0">
      <animate attributeName="opacity" values="0;0.25;0.25;0" dur="3s" begin="6.5s" repeatCount="indefinite"/>
      <animate attributeName="x" values="22;360;360;22" dur="3s" begin="6.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ============================================================ -->
  <!-- GROUP 6: RPC vs RMI Comparison (begin=7.5s)                  -->
  <!-- ============================================================ -->
  <g data-narration="RMI extends RPC to object-oriented systems. RPC uses procedural calls with simple data types, while RMI invokes methods on remote objects, supports object serialization, and uses object references for binding." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>
    <!-- Comparison boxes -->
    <rect x="22" y="365" width="180" height="28" rx="5" fill="#3949AB" opacity="0.9"/>
    <text x="112" y="377" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">RPC: Procedural</text>
    <text x="112" y="388" text-anchor="middle" font-family="monospace" font-size="6" fill="#C5CAE9">call(func, params) -> result</text>
    <rect x="218" y="365" width="180" height="28" rx="5" fill="#00695C" opacity="0.9"/>
    <text x="308" y="377" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">RMI: Object-Oriented</text>
    <text x="308" y="388" text-anchor="middle" font-family="monospace" font-size="6" fill="#A5D6A7">obj.method(args) -> result</text>
    <!-- VS label -->
    <text x="210" y="382" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">vs</text>
  </g>
</svg>