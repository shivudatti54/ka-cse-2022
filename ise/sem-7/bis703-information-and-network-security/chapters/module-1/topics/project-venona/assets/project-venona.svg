<svg width="420" height="400" data-topic-id="project-venona">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8c98c8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5a7080" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#background-gradient)" opacity="0.5"/>
  
  <!-- Title Section -->
  <section data-narration="Project Evaluation and Risk">
    <rect x="10" y="10" width="400" height="50" fill="#3e8e61" rx="10"/>
    <text x="15" y="25" font-size="24" font-family="Arial" fill="#fff" text-anchor="middle">Project Evaluation and Risk</text>
    <animateTransform attributeName="transform" type="rotate" from="0 375 25" to="360 375 25" dur="10s" repeatCount="indefinite"/>
  </section>
  
  <!-- Evaluation Criteria Section -->
  <section data-narration="Evaluation Criteria">
    <rect x="10" y="80" width="400" height="100" fill="#3e8e61" rx="10"/>
    <rect x="15" y="90" width="320" height="60" fill="#5a7080" rx="10"/>
    <rect x="15" y="120" width="320" height="60" fill="#3e8e61" rx="10"/>
    <rect x="15" y="150" width="320" height="60" fill="#3a7080" rx="10"/>
    <rect x="15" y="180" width="320" height="60" fill="#3e8e61" rx="10"/>
    <rect x="15" y="210" width="320" height="60" fill="#3a7080" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 375 125" to="360 375 125" dur="10s" repeatCount="indefinite"/>
    <text x="15" y="130" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Evaluation Criteria</text>
    <text x="15" y="180" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Strategic Alignment</text>
    <text x="15" y="220" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Financial Viability</text>
    <text x="15" y="250" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Technical Feasibility</text>
    <text x="15" y="280" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Risk Level</text>
    <text x="15" y="310" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Dependencies</text>
  </section>
  
  <!-- Cost-Benefit Evaluation Techniques Section -->
  <section data-narration="Cost-Benefit Evaluation Techniques">
    <rect x="10" y="280" width="400" height="200" fill="#3e8e61" rx="10"/>
    <rect x="15" y="290" width="320" height="60" fill="#3a7080" rx="10"/>
    <rect x="15" y="320" width="320" height="60" fill="#3e8e61" rx="10"/>
    <rect x="15" y="350" width="320" height="60" fill="#5a7080" rx="10"/>
    <rect x="15" y="380" width="320" height="60" fill="#3e8e61" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 375 375" to="360 375 375" dur="10s" repeatCount="indefinite"/>
    <text x="15" y="300" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Cost-Benefit Evaluation Techniques</text>
    <text x="15" y="330" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Net Present Value (NPV)</text>
    <text x="15" y="360" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Return on Investment (ROI)</text>
    <text x="15" y="390" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Payback Period</text>
    <text x="15" y="420" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Internal Rate of Return (IRR)</text>
  </section>
  
  <!-- ROI Example Section -->
  <section data-narration="ROI Example">
    <rect x="10" y="430" width="400" height="100" fill="#3e8e61" rx="10"/>
    <rect x="15" y="440" width="320" height="60" fill="#3a7080" rx="10"/>
    <rect x="15" y="470" width="320" height="60" fill="#3e8e61" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 375 515" to="360 375 515" dur="10s" repeatCount="indefinite"/>
    <text x="15" y="450" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">ROI Example</text>
    <text x="15" y="480" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Cost: $100,000</text>
    <text x="15" y="510" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">Benefit: $150,000</text>
    <text x="15" y="540" font-size="14" font-family="Arial" fill="#fff" text-anchor="middle">ROI: 50%</text>
  </section>
  
  <!-- Footer Section -->
  <footer>
    <rect x="10" y="550" width="400" height="50" fill="#3e8e61" rx="10"/>
    <text x="15" y="565" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Project Venona</text>
  </footer>
</svg>