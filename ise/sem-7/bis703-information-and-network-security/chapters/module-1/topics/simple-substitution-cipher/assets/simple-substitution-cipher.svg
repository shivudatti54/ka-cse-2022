<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="simple-substitution-cipher">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0s" fill="freeze"/>
  </rect>

  <!-- GROUP 1: Title and Concept Overview (begin=0.3s) -->
  <g data-narration="Substitution ciphers replace each plaintext letter with another letter using a fixed rule or key to produce ciphertext." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>

    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Simple Substitution Ciphers</text>
    <text x="210" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">Caesar Cipher &amp; Monoalphabetic Cipher</text>

    <!-- Plaintext box -->
    <rect x="20" y="52" width="100" height="32" fill="#3949AB" rx="6"/>
    <text x="70" y="72" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Plaintext</text>

    <!-- Arrow with Key label -->
    <line x1="125" y1="68" x2="178" y2="68" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="135" y="54" width="35" height="14" fill="#E65100" rx="3"/>
    <text x="152" y="64" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">KEY</text>

    <!-- Substitution Rule box -->
    <rect x="183" y="52" width="100" height="32" fill="#00695C" rx="6"/>
    <text x="233" y="66" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Substitution</text>
    <text x="233" y="78" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Rule</text>

    <!-- Arrow to Ciphertext -->
    <line x1="288" y1="68" x2="295" y2="68" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Ciphertext box -->
    <rect x="300" y="52" width="100" height="32" fill="#3949AB" rx="6"/>
    <text x="350" y="72" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Ciphertext</text>
  </g>

  <!-- GROUP 2: Caesar Cipher - Shift Alphabet (begin=1.5s) -->
  <g data-narration="The Caesar Cipher shifts each letter by a fixed number K. With K equals 3, A becomes D, B becomes E, and so on. The formula is C equals open-paren P plus K close-paren mod 26." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <rect x="15" y="94" width="190" height="20" fill="#3949AB" rx="4"/>
    <text x="110" y="108" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Caesar Cipher (K=3)</text>

    <!-- Formula -->
    <text x="110" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB" font-weight="bold">C = (P + K) mod 26</text>

    <!-- Plaintext row label -->
    <text x="22" y="152" font-family="Arial" font-size="8" fill="#00695C" font-weight="bold">Plain:</text>
    <!-- Plaintext letters -->
    <text x="55" y="152" font-family="monospace" font-size="9" fill="#3949AB" font-weight="bold">A B C D E F G H I</text>

    <!-- Arrow indicators -->
    <text x="55" y="163" font-family="monospace" font-size="8" fill="#E65100">| | | | | | | | |</text>

    <!-- Ciphertext row label -->
    <text x="22" y="174" font-family="Arial" font-size="8" fill="#C62828" font-weight="bold">Cipher:</text>
    <!-- Ciphertext letters (shifted +3) -->
    <text x="55" y="174" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">D E F G H I J K L</text>

    <!-- Shift indicator -->
    <text x="175" y="163" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">+3</text>
  </g>

  <!-- GROUP 3: Caesar Cipher - Worked Example (begin=3.0s) -->
  <g data-narration="Example: encrypting SECRET with key 3. S shifts to V, E to H, C to F, R to U, E to H, T to W. The ciphertext is VHFUHW." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Example box -->
    <rect x="15" y="184" width="190" height="72" fill="white" rx="6" stroke="#3949AB" stroke-width="1" opacity="0.85"/>

    <text x="110" y="198" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Example: Encrypt "SECRET"</text>

    <!-- Plaintext letters in circles -->
    <text x="30" y="218" font-family="monospace" font-size="12" font-weight="bold" fill="#3949AB">S</text>
    <text x="57" y="218" font-family="monospace" font-size="12" font-weight="bold" fill="#3949AB">E</text>
    <text x="84" y="218" font-family="monospace" font-size="12" font-weight="bold" fill="#3949AB">C</text>
    <text x="111" y="218" font-family="monospace" font-size="12" font-weight="bold" fill="#3949AB">R</text>
    <text x="138" y="218" font-family="monospace" font-size="12" font-weight="bold" fill="#3949AB">E</text>
    <text x="165" y="218" font-family="monospace" font-size="12" font-weight="bold" fill="#3949AB">T</text>

    <!-- Down arrows -->
    <text x="30" y="231" font-family="Arial" font-size="10" fill="#E65100"  text-anchor="middle">&#8595;</text>
    <text x="57" y="231" font-family="Arial" font-size="10" fill="#E65100"  text-anchor="middle">&#8595;</text>
    <text x="84" y="231" font-family="Arial" font-size="10" fill="#E65100"  text-anchor="middle">&#8595;</text>
    <text x="111" y="231" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">&#8595;</text>
    <text x="138" y="231" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">&#8595;</text>
    <text x="165" y="231" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">&#8595;</text>

    <!-- Ciphertext letters -->
    <text x="30" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#C62828">V</text>
    <text x="57" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#C62828">H</text>
    <text x="84" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#C62828">F</text>
    <text x="111" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#C62828">U</text>
    <text x="138" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#C62828">H</text>
    <text x="165" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#C62828">W</text>
  </g>

  <!-- GROUP 4: Monoalphabetic Cipher (begin=4.5s) -->
  <g data-narration="The Monoalphabetic Cipher uses an arbitrary permutation of the alphabet as the key. Each letter maps to a unique random letter. The keyspace is 26 factorial, approximately 4 times 10 to the power 26." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Section label -->
    <rect x="215" y="94" width="190" height="20" fill="#00695C" rx="4"/>
    <text x="310" y="108" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Monoalphabetic Cipher</text>

    <!-- Keyspace -->
    <text x="310" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C" font-weight="bold">Keyspace: 26! ~ 4x10^26</text>

    <!-- Plaintext row -->
    <text x="222" y="152" font-family="Arial" font-size="8" fill="#00695C" font-weight="bold">Plain:</text>
    <text x="258" y="152" font-family="monospace" font-size="9" fill="#3949AB" font-weight="bold">A B C D E F G H</text>

    <!-- Arrow indicators (scrambled mapping) -->
    <text x="258" y="163" font-family="monospace" font-size="8" fill="#E65100">| | | | | | | |</text>

    <!-- Ciphertext row (random mapping) -->
    <text x="222" y="174" font-family="Arial" font-size="8" fill="#C62828" font-weight="bold">Cipher:</text>
    <text x="258" y="174" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">Q W E R T Y U I</text>

    <!-- Random shuffle indicator -->
    <text x="370" y="163" font-family="Arial" font-size="8" fill="#E65100" font-weight="bold">random</text>
  </g>

  <!-- GROUP 5: Frequency Analysis Vulnerability (begin=6.0s) -->
  <g data-narration="Both ciphers are vulnerable to frequency analysis. In English, E is the most frequent letter at 12 percent. By matching ciphertext frequencies to known language patterns, the substitution key can be deduced." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Monoalphabetic example box -->
    <rect x="215" y="184" width="190" height="72" fill="white" rx="6" stroke="#00695C" stroke-width="1" opacity="0.85"/>

    <text x="310" y="198" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Weakness: Frequency Analysis</text>

    <!-- Mini bar chart for letter frequencies -->
    <!-- E bar (tallest) -->
    <rect x="230" y="212" width="12" height="36" fill="#C62828" rx="2"/>
    <text x="236" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">E</text>
    <text x="236" y="210" text-anchor="middle" font-family="Arial" font-size="6" fill="#C62828">12%</text>

    <!-- T bar -->
    <rect x="250" y="220" width="12" height="28" fill="#E65100" rx="2"/>
    <text x="256" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">T</text>

    <!-- A bar -->
    <rect x="270" y="224" width="12" height="24" fill="#E65100" rx="2"/>
    <text x="276" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">A</text>

    <!-- O bar -->
    <rect x="290" y="226" width="12" height="22" fill="#E65100" rx="2"/>
    <text x="296" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">O</text>

    <!-- I bar -->
    <rect x="310" y="228" width="12" height="20" fill="#E65100" rx="2"/>
    <text x="316" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">I</text>

    <!-- N bar -->
    <rect x="330" y="230" width="12" height="18" fill="#00695C" rx="2"/>
    <text x="336" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">N</text>

    <!-- S bar -->
    <rect x="350" y="233" width="12" height="15" fill="#00695C" rx="2"/>
    <text x="356" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">S</text>

    <!-- Z bar (tiny) -->
    <rect x="370" y="245" width="12" height="3" fill="#C5CAE9" rx="1"/>
    <text x="376" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">Z</text>
  </g>

  <!-- GROUP 6: Comparison Table (begin=7.5s) -->
  <g data-narration="Comparing the two: Caesar Cipher has only 25 possible keys and is broken by brute force. Monoalphabetic Cipher has 26 factorial keys but is still broken by frequency analysis. Both are monoalphabetic and historically important but insecure." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Comparison table background -->
    <rect x="15" y="270" width="390" height="120" fill="white" rx="6" stroke="#3949AB" stroke-width="1" opacity="0.9"/>

    <!-- Table header -->
    <rect x="15" y="270" width="390" height="22" fill="#3949AB" rx="6"/>
    <rect x="15" y="282" width="390" height="10" fill="#3949AB"/>
    <text x="80" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Feature</text>
    <text x="210" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Caesar</text>
    <text x="340" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Monoalphabetic</text>

    <!-- Divider lines -->
    <line x1="145" y1="270" x2="145" y2="390" stroke="#C5CAE9" stroke-width="1"/>
    <line x1="275" y1="270" x2="275" y2="390" stroke="#C5CAE9" stroke-width="1"/>

    <!-- Row 1: Key -->
    <line x1="15" y1="305" x2="405" y2="305" stroke="#C5CAE9" stroke-width="1"/>
    <text x="80" y="318" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB" font-weight="bold">Key</text>
    <text x="210" y="318" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">Integer (1-25)</text>
    <text x="340" y="318" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">Alphabet permutation</text>

    <!-- Row 2: Keyspace -->
    <line x1="15" y1="327" x2="405" y2="327" stroke="#C5CAE9" stroke-width="1"/>
    <text x="80" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB" font-weight="bold">Keyspace</text>
    <text x="210" y="340" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">25</text>
    <text x="340" y="340" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">26! ~ 4x10^26</text>

    <!-- Row 3: Attack -->
    <line x1="15" y1="349" x2="405" y2="349" stroke="#C5CAE9" stroke-width="1"/>
    <text x="80" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB" font-weight="bold">Attack</text>
    <text x="210" y="362" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">Brute force</text>
    <text x="340" y="362" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">Frequency analysis</text>

    <!-- Row 4: Security -->
    <line x1="15" y1="371" x2="405" y2="371" stroke="#C5CAE9" stroke-width="1"/>
    <text x="80" y="384" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB" font-weight="bold">Security</text>
    <text x="210" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828" font-weight="bold">Very Weak</text>
    <text x="340" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100" font-weight="bold">Weak (large key, but patterned)</text>
  </g>
</svg>