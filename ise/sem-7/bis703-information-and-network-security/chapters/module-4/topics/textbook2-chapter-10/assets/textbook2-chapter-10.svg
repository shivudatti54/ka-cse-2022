    <text x="10" y="10" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="start">Symmetric Key Cryptography.</text>
    <text x="10" y="30" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="start">Asymmetric Key Cryptography.</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="start">Hash Functions.</text>
  </section>
