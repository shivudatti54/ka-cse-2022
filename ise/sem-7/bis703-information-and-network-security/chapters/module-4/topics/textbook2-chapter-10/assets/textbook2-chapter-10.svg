  <text x="10" y="80" font-size="24" font-family="Arial" fill="#2ecc71" text-anchor="start">Introduction to Cryptography</text>
  <section data-narration="Introduction to Cryptography">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="0" y="0" width="100" height="40" style="fill: #3498db;"/>
    <rect x="110" y="0" width="100" height="40" style="fill: #2ecc71;"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="start">Secure communication is essential in today's digital world.</text>
    <text x="10" y="30" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="start">Cryptography is the practice and study of techniques for secure communication.</text>
  </section>
