<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="uses-of-hash-functions">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="hashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- ============ GROUP 1: Title and Central Hash Function (0.3s) ============ -->
  <g data-narration="A hash function takes any input and produces a fixed-size digest. This one-way process is the foundation of many security applications." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>

    <!-- Title -->
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Uses of Cryptographic Hash Functions</text>

    <!-- Central hash function box -->
    <rect x="145" y="38" width="130" height="36" fill="url(#hashGrad)" rx="6"/>
    <text x="210" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">H(m) = digest</text>
    <text x="210" y="67" text-anchor="middle" font-family="Arial" font-size="8" fill="#C5CAE9">One-way, fixed output</text>

    <!-- Subtitle -->
    <text x="210" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB" font-style="italic">Four key applications shown below</text>
  </g>

  <!-- ============ GROUP 2: Data Integrity Verification (1.5s) ============ -->
  <g data-narration="Data integrity verification: the sender computes a hash of the file and sends both. The receiver recomputes the hash and compares it to detect any tampering." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <rect x="12" y="100" width="192" height="16" fill="#3949AB" rx="3"/>
    <text x="108" y="112" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">1. Data Integrity Verification</text>

    <!-- Sender side -->
    <rect x="12" y="122" width="56" height="28" fill="#3949AB" rx="4" opacity="0.9"/>
    <text x="40" y="140" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">File</text>

    <!-- Arrow to hash -->
    <line x1="68" y1="136" x2="88" y2="136" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

    <!-- Hash box -->
    <rect x="90" y="126" width="38" height="20" fill="#5C6BC0" rx="3"/>
    <text x="109" y="139" text-anchor="middle" font-family="monospace" font-size="7" fill="white">H( )</text>

    <!-- Arrow to digest -->
    <line x1="128" y1="136" x2="140" y2="136" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

    <!-- Digest -->
    <rect x="142" y="126" width="60" height="20" fill="#00695C" rx="3"/>
    <text x="172" y="139" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Digest</text>

    <!-- Send arrow -->
    <line x1="108" y1="152" x2="108" y2="164" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowIndigo)"/>
    <text x="125" y="161" font-family="Arial" font-size="7" fill="#3949AB">Send both</text>

    <!-- Receiver compare -->
    <rect x="50" y="168" width="115" height="22" fill="#E8EAF6" rx="3" stroke="#3949AB" stroke-width="1"/>
    <text x="108" y="180" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB" font-weight="bold">Receiver: Recompute &amp; Compare</text>

    <!-- Check mark -->
    <circle cx="175" cy="179" r="8" fill="#00695C" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
    </circle>
    <text x="175" y="183" text-anchor="middle" font-family="Arial" font-size="10" fill="white" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
    </text>
    <path d="M170,179 L173,183 L181,174" stroke="white" stroke-width="1.5" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
    </path>
  </g>

  <!-- ============ GROUP 3: Password Storage (3.0s) ============ -->
  <g data-narration="Password storage: instead of storing plaintext passwords, systems store the salted hash. During login, the entered password is hashed with the same salt and compared." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Section label -->
    <rect x="216" y="100" width="192" height="16" fill="#00695C" rx="3"/>
    <text x="312" y="112" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">2. Password Storage</text>

    <!-- Password input -->
    <rect x="216" y="122" width="60" height="24" fill="#00695C" rx="4" opacity="0.9"/>
    <text x="246" y="137" text-anchor="middle" font-family="monospace" font-size="7" fill="white">p@ss123</text>

    <!-- Plus sign -->
    <text x="283" y="137" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695C" font-weight="bold">+</text>

    <!-- Salt -->
    <rect x="290" y="122" width="44" height="24" fill="#E65100" rx="4"/>
    <text x="312" y="132" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Salt</text>
    <text x="312" y="141" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFE0B2">a1b2c3</text>

    <!-- Arrow down -->
    <line x1="280" y1="146" x2="280" y2="158" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Hash box -->
    <rect x="250" y="160" width="60" height="20" fill="#00695C" rx="3"/>
    <text x="280" y="173" text-anchor="middle" font-family="monospace" font-size="7" fill="white">SHA-256</text>

    <!-- Arrow to stored hash -->
    <line x1="310" y1="170" x2="326" y2="170" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Stored hash -->
    <rect x="328" y="158" width="76" height="24" fill="#E8EAF6" rx="3" stroke="#00695C" stroke-width="1"/>
    <text x="366" y="168" text-anchor="middle" font-family="monospace" font-size="6" fill="#00695C">4f8a2b...</text>
    <text x="366" y="178" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C" font-weight="bold">Stored in DB</text>

    <!-- Lock icon indicator -->
    <rect x="340" y="122" width="22" height="24" fill="#C5CAE9" rx="4" opacity="0.7"/>
    <rect x="345" y="130" width="12" height="10" fill="#00695C" rx="2"/>
    <path d="M348,130 L348,126 A3,3 0 0,1 354,126 L354,130" stroke="#00695C" stroke-width="1.5" fill="none"/>
  </g>

  <!-- ============ GROUP 4: Digital Signatures (4.5s) ============ -->
  <g data-narration="Digital signatures: instead of signing the entire large message, only its hash is signed with the private key. The receiver verifies by hashing the message and checking the signature with the public key." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Section label -->
    <rect x="12" y="200" width="192" height="16" fill="#E65100" rx="3"/>
    <text x="108" y="212" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">3. Digital Signatures</text>

    <!-- Large message -->
    <rect x="12" y="222" width="50" height="28" fill="#E65100" rx="4" opacity="0.9"/>
    <text x="37" y="234" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Large</text>
    <text x="37" y="244" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Msg (M)</text>

    <!-- Arrow to hash -->
    <line x1="62" y1="236" x2="74" y2="236" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Hash box -->
    <rect x="76" y="226" width="36" height="20" fill="#E65100" rx="3" opacity="0.8"/>
    <text x="94" y="239" text-anchor="middle" font-family="monospace" font-size="7" fill="white">H( )</text>

    <!-- Arrow to digest -->
    <line x1="112" y1="236" x2="122" y2="236" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Small digest -->
    <rect x="124" y="228" width="30" height="16" fill="#E65100" rx="3"/>
    <text x="139" y="239" text-anchor="middle" font-family="monospace" font-size="6" fill="white">h</text>

    <!-- Arrow to sign -->
    <line x1="154" y1="236" x2="162" y2="236" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Sign with private key -->
    <rect x="164" y="222" width="38" height="28" fill="#C62828" rx="4"/>
    <text x="183" y="234" text-anchor="middle" font-family="Arial" font-size="6" fill="white" font-weight="bold">Sign</text>
    <text x="183" y="244" text-anchor="middle" font-family="Arial" font-size="6" fill="#FFCDD2">Priv Key</text>

    <!-- Verification flow -->
    <line x1="108" y1="252" x2="108" y2="265" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowOrange)"/>

    <rect x="40" y="268" width="136" height="22" fill="#FFF3E0" rx="3" stroke="#E65100" stroke-width="1"/>
    <text x="108" y="276" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" font-weight="bold">Verify: H(M) + Pub Key</text>
    <text x="108" y="285" text-anchor="middle" font-family="Arial" font-size="6" fill="#E65100">Check signature authenticity</text>
  </g>

  <!-- ============ GROUP 5: Blockchain (6.0s) ============ -->
  <g data-narration="Blockchain technology: each block contains data, a nonce, and the hash of the previous block. This chain of hashes makes tampering with any block detectable, as it would break the entire chain." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Section label -->
    <rect x="216" y="200" width="192" height="16" fill="#C62828" rx="3"/>
    <text x="312" y="212" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">4. Blockchain</text>

    <!-- Block 1 -->
    <rect x="216" y="224" width="54" height="50" fill="#C62828" rx="4" opacity="0.9"/>
    <text x="243" y="236" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Block 1</text>
    <text x="243" y="246" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">Data</text>
    <text x="243" y="254" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">Nonce</text>
    <text x="243" y="262" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">PrevH: 000</text>
    <rect x="222" y="265" width="42" height="6" fill="#E65100" rx="1"/>
    <text x="243" y="270" text-anchor="middle" font-family="monospace" font-size="4" fill="white">Hash1</text>

    <!-- Chain arrow 1-2 -->
    <line x1="270" y1="249" x2="283" y2="249" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)">
      <animate attributeName="stroke-dasharray" values="0,20;20,0" dur="0.5s" begin="6.5s" fill="freeze"/>
    </line>

    <!-- Block 2 -->
    <rect x="285" y="224" width="54" height="50" fill="#C62828" rx="4" opacity="0.85"/>
    <text x="312" y="236" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Block 2</text>
    <text x="312" y="246" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">Data</text>
    <text x="312" y="254" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">Nonce</text>
    <text x="312" y="262" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">PrevH: Hash1</text>
    <rect x="291" y="265" width="42" height="6" fill="#E65100" rx="1"/>
    <text x="312" y="270" text-anchor="middle" font-family="monospace" font-size="4" fill="white">Hash2</text>

    <!-- Chain arrow 2-3 -->
    <line x1="339" y1="249" x2="352" y2="249" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)">
      <animate attributeName="stroke-dasharray" values="0,20;20,0" dur="0.5s" begin="6.8s" fill="freeze"/>
    </line>

    <!-- Block 3 -->
    <rect x="354" y="224" width="54" height="50" fill="#C62828" rx="4" opacity="0.8"/>
    <text x="381" y="236" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Block 3</text>
    <text x="381" y="246" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">Data</text>
    <text x="381" y="254" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">Nonce</text>
    <text x="381" y="262" text-anchor="middle" font-family="monospace" font-size="5" fill="#FFCDD2">PrevH: Hash2</text>
    <rect x="360" y="265" width="42" height="6" fill="#E65100" rx="1"/>
    <text x="381" y="270" text-anchor="middle" font-family="monospace" font-size="4" fill="white">Hash3</text>

    <!-- Tamper warning -->
    <rect x="232" y="280" width="160" height="16" fill="#FFEBEE" rx="3" stroke="#C62828" stroke-width="0.8"/>
    <text x="312" y="291" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828" font-weight="bold">Tamper any block = chain breaks!</text>
  </g>

  <!-- ============ GROUP 6: Properties Summary (7.5s) ============ -->
  <g data-narration="Key properties that make hash functions secure: pre-image resistance means the hash cannot be reversed, collision resistance means no two inputs produce the same hash, and the avalanche effect means a tiny input change completely changes the output." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Section background -->
    <rect x="12" y="302" width="396" height="88" fill="white" rx="6" opacity="0.5"/>

    <!-- Section title -->
    <text x="210" y="318" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Essential Security Properties</text>

    <!-- Property 1: Pre-image Resistance -->
    <rect x="20" y="326" width="120" height="56" fill="#E8EAF6" rx="4" stroke="#3949AB" stroke-width="0.8"/>
    <text x="80" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Pre-image Resistance</text>
    <text x="80" y="352" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">digest --> m ?</text>
    <text x="80" y="364" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828" font-weight="bold">Infeasible!</text>
    <!-- X mark animation -->
    <line x1="68" y1="370" x2="92" y2="378" stroke="#C62828" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="8.0s" fill="freeze"/>
    </line>
    <line x1="92" y1="370" x2="68" y2="378" stroke="#C62828" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="8.0s" fill="freeze"/>
    </line>

    <!-- Property 2: Collision Resistance -->
    <rect x="150" y="326" width="120" height="56" fill="#E0F2F1" rx="4" stroke="#00695C" stroke-width="0.8"/>
    <text x="210" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Collision Resistance</text>
    <text x="210" y="352" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">H(m1) != H(m2)</text>
    <text x="210" y="364" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">for m1 != m2</text>
    <!-- Shield icon -->
    <path d="M205,369 L210,366 L215,369 L215,376 L210,379 L205,376 Z" fill="#00695C" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="8.2s" fill="freeze"/>
    </path>

    <!-- Property 3: Avalanche Effect -->
    <rect x="280" y="326" width="120" height="56" fill="#FFF3E0" rx="4" stroke="#E65100" stroke-width="0.8"/>
    <text x="340" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">Avalanche Effect</text>
    <text x="340" y="352" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">"Hi" -> a3f2...</text>
    <text x="340" y="362" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">"Hi!" -> 9bc1...</text>
    <text x="340" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" font-weight="bold">1 bit change =</text>
    <text x="340" y="382" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" font-weight="bold">totally different!</text>
  </g>
</svg>