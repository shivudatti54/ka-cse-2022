<svg width="420" height="400" data-topic-id="online-bids">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4698E1" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <title>Online Bids</title>
  <rect x="10" y="40" width="400" height="20" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="50" font-size="24" font-family="Arial" fill="#333">Introduction</text>
  <rect x="10" y="80" width="400" height="100" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="90" font-size="18" font-family="Arial" fill="#333" data-narration="Definition of Online Bids">
    <tspan x="20" y="110">Online bids refer to the process of submitting a proposal or quote for a project or service through an online platform, usually through a digital bidding system.</tspan>
  </text>
  <rect x="10" y="220" width="400" height="100" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="230" font-size="18" font-family="Arial" fill="#333" data-narration="Importance of Online Bidding">
    <tspan x="20" y="250">Online bidding has revolutionized the way businesses and organizations conduct procurements, increasing efficiency, transparency, and cost-effectiveness.</tspan>
  </text>
  <rect x="10" y="350" width="400" height="100" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="360" font-size="18" font-family="Arial" fill="#333" data-narration="Types of Online Bidding Systems">
    <tspan x="20" y="380">
      <tspan x="20" y="410">Traditional Online Bidding Systems</tspan>
      <tspan x="100" y="410">Collaborative Online Bidding Systems</tspan>
      <tspan x="200" y="410">Hybrid Online Bidding Systems</tspan>
    </tspan>
  </text>
  <rect x="10" y="470" width="400" height="50" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="480" font-size="18" font-family="Arial" fill="#333">Bidding Process</text>
  <rect x="10" y="510" width="400" height="100" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="520" font-size="18" font-family="Arial" fill="#333" data-narration="Pre-Bid Process">
    <tspan x="20" y="540">Registration and qualification</tspan>
    <tspan x="20" y="560">Proposal submission</tspan>
    <tspan x="20" y="580">Document review</tspan>
    <tspan x="20" y="600">Bidder response and clarification</tspan>
  </text>
  <rect x="10" y="620" width="400" height="100" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="630" font-size="18" font-family="Arial" fill="#333" data-narration="Bid Evaluation Process">
    <tspan x="20" y="650">Assessing proposals against predetermined criteria</tspan>
  </text>
  <rect x="10" y="740" width="400" height="50" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="750" font-size="18" font-family="Arial" fill="#333">Conclusion</text>
  <rect x="10" y="780" width="400" height="40" fill="#E0E0E0" stroke="#666" stroke-width="2"/>
  <text x="20" y="790" font-size="18" font-family="Arial" fill="#333">Online Bidding</text>
