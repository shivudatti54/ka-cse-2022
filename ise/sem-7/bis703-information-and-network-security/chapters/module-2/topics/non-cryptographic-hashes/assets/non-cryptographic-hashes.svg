<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="non-cryptographic-hashes">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="symGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <linearGradient id="asymGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- ========== GROUP 1: Title and CIA Triad Header (0.3s) ========== -->
  <g data-narration="Cryptographic Principles are built on the CIA Triad: Confidentiality, Integrity, and Availability. These three pillars form the foundation of all information security." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>

    <!-- Title -->
    <text x="210" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Cryptographic Principles &amp; Goals</text>

    <!-- CIA Triad - Three pillars -->
    <rect x="20" y="38" width="116" height="52" fill="#3949AB" rx="6" opacity="0.95"/>
    <text x="78" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Confidentiality</text>
    <text x="78" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">AES, RSA encrypt</text>

    <rect x="152" y="38" width="116" height="52" fill="#00695C" rx="6" opacity="0.95"/>
    <text x="210" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Integrity</text>
    <text x="210" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#B2DFDB">SHA-256, HMAC</text>

    <rect x="284" y="38" width="116" height="52" fill="#E65100" rx="6" opacity="0.95"/>
    <text x="342" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Availability</text>
    <text x="342" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFE0B2">Key mgmt, ACL</text>

    <!-- CIA label -->
    <text x="210" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3949AB" font-weight="bold">The CIA Triad</text>
  </g>

  <!-- ========== GROUP 2: Symmetric Encryption Flow (1.5s) ========== -->
  <g data-narration="Symmetric cryptography uses a single shared key for both encryption and decryption. It is fast and suitable for bulk data encryption, but key distribution is a challenge." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Symmetric Encryption</text>

    <!-- Plaintext box -->
    <rect x="15" y="140" width="70" height="32" fill="url(#symGrad)" rx="4"/>
    <text x="50" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Plaintext</text>

    <!-- Arrow to Encrypt -->
    <line x1="85" y1="156" x2="114" y2="156" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

    <!-- Encrypt box -->
    <rect x="115" y="140" width="70" height="32" fill="#3949AB" rx="4"/>
    <text x="150" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Encrypt</text>

    <!-- Arrow to Ciphertext -->
    <line x1="185" y1="156" x2="214" y2="156" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

    <!-- Ciphertext box -->
    <rect x="215" y="140" width="72" height="32" fill="#C62828" rx="4"/>
    <text x="251" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Ciphertext</text>

    <!-- Arrow to Decrypt -->
    <line x1="287" y1="156" x2="314" y2="156" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

    <!-- Decrypt box -->
    <rect x="315" y="140" width="70" height="32" fill="#3949AB" rx="4"/>
    <text x="350" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Decrypt</text>

    <!-- Shared Key icon - centered, connected to both Encrypt and Decrypt -->
    <rect x="178" y="180" width="64" height="24" fill="#E65100" rx="12"/>
    <text x="210" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Shared Key</text>

    <!-- Key arrow to Encrypt -->
    <line x1="195" y1="180" x2="155" y2="172" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowOrange)"/>

    <!-- Key arrow to Decrypt -->
    <line x1="225" y1="180" x2="345" y2="172" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowOrange)"/>

    <!-- Plaintext result -->
    <text x="385" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">
      <tspan x="395" dy="0">Plain</tspan>
      <tspan x="395" dy="10">text</tspan>
    </text>
  </g>

  <!-- ========== GROUP 3: Asymmetric Encryption Flow (3.0s) ========== -->
  <g data-narration="Asymmetric cryptography uses a key pair: a public key for encryption and a private key for decryption. This solves the key distribution problem and enables digital signatures." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Asymmetric Encryption</text>

    <!-- Plaintext box -->
    <rect x="15" y="232" width="70" height="32" fill="url(#asymGrad)" rx="4"/>
    <text x="50" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Plaintext</text>

    <!-- Arrow to Encrypt -->
    <line x1="85" y1="248" x2="114" y2="248" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Encrypt box -->
    <rect x="115" y="232" width="70" height="32" fill="#00695C" rx="4"/>
    <text x="150" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Encrypt</text>

    <!-- Arrow to Ciphertext -->
    <line x1="185" y1="248" x2="214" y2="248" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Ciphertext box -->
    <rect x="215" y="232" width="72" height="32" fill="#C62828" rx="4"/>
    <text x="251" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Ciphertext</text>

    <!-- Arrow to Decrypt -->
    <line x1="287" y1="248" x2="314" y2="248" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Decrypt box -->
    <rect x="315" y="232" width="70" height="32" fill="#00695C" rx="4"/>
    <text x="350" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Decrypt</text>

    <!-- Public Key - linked to Encrypt -->
    <rect x="108" y="272" width="84" height="22" fill="#3949AB" rx="11"/>
    <text x="150" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Public Key</text>
    <line x1="150" y1="272" x2="150" y2="264" stroke="#3949AB" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Private Key - linked to Decrypt -->
    <rect x="308" y="272" width="84" height="22" fill="#C62828" rx="11"/>
    <text x="350" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Private Key</text>
    <line x1="350" y1="272" x2="350" y2="264" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Plaintext result -->
    <text x="395" y="252" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">
      <tspan x="395" dy="0">Plain</tspan>
      <tspan x="395" dy="10">text</tspan>
    </text>
  </g>

  <!-- ========== GROUP 4: Comparison Table (4.5s) ========== -->
  <g data-narration="Comparing the two: symmetric encryption is fast but has key distribution challenges, while asymmetric encryption is slower but solves key distribution and enables digital signatures." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Table header -->
    <rect x="20" y="302" width="185" height="18" fill="#3949AB" rx="3"/>
    <text x="112" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Symmetric</text>

    <rect x="215" y="302" width="185" height="18" fill="#00695C" rx="3"/>
    <text x="307" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Asymmetric</text>

    <!-- Row 1 -->
    <rect x="20" y="322" width="185" height="16" fill="#E8EAF6" rx="2" opacity="0.6"/>
    <text x="112" y="334" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">1 shared key | Fast</text>

    <rect x="215" y="322" width="185" height="16" fill="#E0F2F1" rx="2" opacity="0.6"/>
    <text x="307" y="334" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">Key pair | Slow (10-1000x)</text>

    <!-- Row 2 -->
    <rect x="20" y="340" width="185" height="16" fill="#E8EAF6" rx="2" opacity="0.4"/>
    <text x="112" y="352" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">AES, DES, ChaCha20</text>

    <rect x="215" y="340" width="185" height="16" fill="#E0F2F1" rx="2" opacity="0.4"/>
    <text x="307" y="352" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">RSA, ECC, Diffie-Hellman</text>
  </g>

  <!-- ========== GROUP 5: Authentication & Non-Repudiation (6.0s) ========== -->
  <g data-narration="Authentication verifies the identity of communicating parties, while Non-repudiation prevents denial of involvement. Digital signatures provide both properties using private keys." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Auth badge -->
    <circle cx="55" y="302" r="0" fill="none"/>
    <rect x="20" y="358" width="185" height="18" fill="#E65100" rx="3"/>
    <text x="112" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Authentication + Non-Repudiation</text>

    <!-- Digital Signature flow -->
    <text x="36" y="389" font-family="monospace" font-size="7.5" fill="#E65100">Msg + PrivKey</text>
    <line x1="104" y1="385" x2="124" y2="385" stroke="#E65100" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <text x="130" y="389" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#C62828">Sign</text>
    <line x1="153" y1="385" x2="173" y2="385" stroke="#E65100" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <text x="178" y="389" font-family="monospace" font-size="7.5" fill="#E65100">Signature</text>
  </g>

  <!-- ========== GROUP 6: Real-World Applications (7.5s) ========== -->
  <g data-narration="Real-world applications include TLS/SSL for secure web traffic, digital signatures for legal validity, password hashing with salt for storage, and blockchain for transaction security." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Applications row -->
    <rect x="215" y="358" width="185" height="18" fill="#C62828" rx="3"/>
    <text x="307" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Real-World Applications</text>

    <!-- App items -->
    <text x="224" y="389" font-family="monospace" font-size="7.5" fill="#C62828">TLS/SSL</text>
    <text x="273" y="389" font-family="monospace" font-size="7.5" fill="#3949AB">Passwords</text>
    <text x="335" y="389" font-family="monospace" font-size="7.5" fill="#00695C">Blockchain</text>
  </g>
</svg>