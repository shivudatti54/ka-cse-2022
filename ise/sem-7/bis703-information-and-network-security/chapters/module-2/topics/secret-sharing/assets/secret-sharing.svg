<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="secret-sharing">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="boxIndigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#3949AB"/>
    </linearGradient>
    <linearGradient id="boxTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="boxOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4511E"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and header (0.3s) -->
  <g opacity="0" data-narration="Threat Intelligence Sharing is the collaborative exchange of cyber threat data between organizations to strengthen collective defense.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3949AB">Threat Intelligence Sharing Lifecycle</text>
    <line x1="80" y1="36" x2="340" y2="36" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="210" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" fill="#455A64">From Malware Analysis to Community Defense</text>
  </g>

  <!-- Group 2: Steps 1-2 Analyze and Extract (1.5s) -->
  <g opacity="0" data-narration="Step 1: Analyze malware using static, dynamic, and reverse engineering techniques. Step 2: Extract Indicators of Compromise such as hashes, IPs, domains, and map Tactics, Techniques and Procedures to the MITRE ATT&CK framework.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Step 1: Analyze Malware -->
    <rect x="20" y="68" width="130" height="52" fill="url(#boxIndigo)" rx="6"/>
    <text x="85" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">1. Analyze Malware</text>
    <text x="85" y="101" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">Static / Dynamic / RE</text>
    <text x="85" y="113" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">Uncover artifacts</text>

    <!-- Arrow 1->2 -->
    <line x1="152" y1="94" x2="168" y2="94" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 2: Extract IOCs & TTPs -->
    <rect x="172" y="68" width="130" height="52" fill="url(#boxIndigo)" rx="6"/>
    <text x="237" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">2. Extract IOCs/TTPs</text>
    <text x="237" y="101" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">Hashes, IPs, Domains</text>
    <text x="237" y="113" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">Map to MITRE ATT&CK</text>

    <!-- Arrow 2->3 -->
    <line x1="304" y1="94" x2="320" y2="94" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Group 3: Step 3 Structure with STIX, and STIX detail box (3.0s) -->
  <g opacity="0" data-narration="Step 3: Structure the extracted intelligence into STIX format. STIX, the Structured Threat Information eXpression, represents indicators, campaigns, TTPs, and courses of action in a standardized way machines can process.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Step 3: Structure (STIX) -->
    <rect x="324" y="68" width="80" height="52" fill="url(#boxTeal)" rx="6"/>
    <text x="364" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">3. Structure</text>
    <text x="364" y="101" text-anchor="middle" font-family="monospace" font-size="8.5" font-weight="bold" fill="#B2DFDB">STIX 2.1</text>
    <text x="364" y="113" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#B2DFDB">JSON format</text>

    <!-- STIX Detail Box -->
    <rect x="18" y="134" width="194" height="78" fill="white" fill-opacity="0.85" rx="6" stroke="#00695C" stroke-width="1"/>
    <text x="115" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#00695C">STIX Represents:</text>
    <text x="28" y="164" font-family="monospace" font-size="8" fill="#37474F">Indicators  - IOCs (hash, IP, domain)</text>
    <text x="28" y="176" font-family="monospace" font-size="8" fill="#37474F">TTPs        - Adversary behaviors</text>
    <text x="28" y="188" font-family="monospace" font-size="8" fill="#37474F">Campaigns   - Grouped attack sets</text>
    <text x="28" y="200" font-family="monospace" font-size="8" fill="#37474F">CoA         - Mitigations/responses</text>

    <!-- Arrow from step 3 down to step 4 area -->
    <line x1="364" y1="122" x2="364" y2="138" stroke="#00695C" stroke-width="2" marker-end="url(#arrowTeal)"/>
  </g>

  <!-- Group 4: Step 4 Share via TAXII, and TLP box (4.5s) -->
  <g opacity="0" data-narration="Step 4: Share the STIX packages through TAXII, the Trusted Automated eXchange of Intelligence Information protocol, or via ISACs. Apply Traffic Light Protocol labels: TLP RED for no disclosure, AMBER for limited, GREEN for community, and CLEAR for public.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Step 4: Share (TAXII/ISAC) -->
    <rect x="280" y="142" width="126" height="52" fill="url(#boxOrange)" rx="6"/>
    <text x="343" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">4. Share via TAXII</text>
    <text x="343" y="175" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFCCBC">Transport protocol</text>
    <text x="343" y="187" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFCCBC">ISACs / Feeds</text>

    <!-- TLP Classification Box -->
    <rect x="222" y="206" width="184" height="72" fill="white" fill-opacity="0.85" rx="6" stroke="#E65100" stroke-width="1"/>
    <text x="314" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#E65100">Traffic Light Protocol (TLP)</text>
    <!-- TLP RED -->
    <circle cx="237" cy="238" r="6" fill="#C62828"/>
    <text x="252" y="241" font-family="monospace" font-size="8" font-weight="bold" fill="#C62828">RED</text>
    <text x="278" y="241" font-family="Arial, sans-serif" font-size="7.5" fill="#37474F">No disclosure</text>
    <!-- TLP AMBER -->
    <circle cx="237" cy="254" r="6" fill="#FF8F00"/>
    <text x="252" y="257" font-family="monospace" font-size="8" font-weight="bold" fill="#FF8F00">AMBER</text>
    <text x="290" y="257" font-family="Arial, sans-serif" font-size="7.5" fill="#37474F">Limited org</text>
    <!-- TLP GREEN -->
    <circle cx="340" cy="238" r="6" fill="#2E7D32"/>
    <text x="355" y="241" font-family="monospace" font-size="8" font-weight="bold" fill="#2E7D32">GREEN</text>
    <text x="388" y="241" font-family="Arial, sans-serif" font-size="7.5" fill="#37474F">Community</text>
    <!-- TLP CLEAR -->
    <circle cx="340" cy="254" r="6" fill="#90A4AE" stroke="#546E7A" stroke-width="1"/>
    <text x="355" y="257" font-family="monospace" font-size="8" font-weight="bold" fill="#546E7A">CLEAR</text>
    <text x="390" y="257" font-family="Arial, sans-serif" font-size="7.5" fill="#37474F">Public</text>

    <!-- Arrow from step 4 down -->
    <line x1="343" y1="196" x2="343" y2="204" stroke="#E65100" stroke-width="2"/>
  </g>

  <!-- Group 5: Steps 5-6 Consume, Apply, Feedback loop (6.0s) -->
  <g opacity="0" data-narration="Step 5: Consumer organizations ingest the shared intelligence into their security tools like SIEMs, firewalls, and EDR for automated blocking and threat hunting. Step 6: Consumers provide feedback and enrichments, completing the virtuous cycle back to analysis.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Step 5: Consume & Apply -->
    <rect x="20" y="224" width="190" height="52" fill="url(#boxIndigo)" rx="6"/>
    <text x="115" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">5. Consume &amp; Apply Intelligence</text>
    <text x="115" y="257" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">SIEM / Firewall / EDR ingest IOCs</text>
    <text x="115" y="269" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">Threat hunters use TTPs</text>

    <!-- Step 6: Feedback -->
    <rect x="20" y="288" width="190" height="40" fill="url(#boxTeal)" rx="6"/>
    <text x="115" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">6. Feedback &amp; Enrich</text>
    <text x="115" y="318" text-anchor="middle" font-family="monospace" font-size="8" fill="#B2DFDB">Improve original intelligence</text>

    <!-- Arrow 5->6 -->
    <line x1="115" y1="278" x2="115" y2="286" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Feedback loop arrow back to step 1 -->
    <path d="M 20,308 L 10,308 L 10,94 L 18,94" fill="none" stroke="#00695C" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowTeal)"/>
    <text x="12" y="200" font-family="Arial, sans-serif" font-size="7.5" fill="#00695C" writing-mode="tb" text-anchor="middle">Feedback Loop</text>
  </g>

  <!-- Group 6: Best Practices and Key Takeaway (7.5s) -->
  <g opacity="0" data-narration="Best practices for effective sharing: automate with STIX and TAXII where possible; share durable TTPs not just short-lived IOCs; always label intelligence with the correct TLP; and contribute anonymized findings to the community. Remember: STIX is the language, TAXII is the postal service.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Best Practices box -->
    <rect x="18" y="340" width="384" height="50" fill="white" fill-opacity="0.9" rx="6" stroke="#3949AB" stroke-width="1.2"/>
    <text x="210" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#3949AB">Key Takeaways</text>
    <text x="28" y="370" font-family="Arial, sans-serif" font-size="8" fill="#37474F">Share TTPs (durable) over IOCs (short-lived)  |  STIX = Language, TAXII = Transport</text>
    <text x="28" y="382" font-family="Arial, sans-serif" font-size="8" fill="#37474F">Apply TLP labels correctly  |  Automate ingestion  |  Start small, scale with trust</text>

    <!-- Sharing Models mini-labels along bottom of step area -->
    <rect x="222" y="288" width="184" height="40" fill="white" fill-opacity="0.85" rx="6" stroke="#3949AB" stroke-width="0.8"/>
    <text x="314" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#3949AB">Sharing Models</text>
    <text x="232" y="314" font-family="monospace" font-size="7" fill="#37474F">Peer-to-Peer</text>
    <text x="290" y="314" font-family="monospace" font-size="7" fill="#37474F">Group/ISAC</text>
    <text x="350" y="314" font-family="monospace" font-size="7" fill="#37474F">Public</text>
    <text x="392" y="314" font-family="monospace" font-size="7" fill="#37474F">M2M</text>
  </g>
</svg>