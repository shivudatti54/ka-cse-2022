<svg width="420" height="400" data-topic-id="texas-hold-em-poker">
  <defs>
    <style>
      .pastel-gradient {
        fill: url(#pastel-gradient);
      }
    </style>
  </defs>
  <defs mark="legend">
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A9CCE3"/>
      <stop offset="50%" stop-color="#B2FFFC"/>
      <stop offset="100%" stop-color="#E2F3FF"/>
    </linearGradient>
  </defs>

  <title>Texas Hold'em Poker</title>

  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)"/>
  <rect x="50" y="50" width="320" height="50" fill="#3498DB"/>
  <rect x="50" y="110" width="320" height="50" fill="#2ECC71"/>
  <rect x="50" y="170" width="320" height="50" fill="#F1C40F"/>
  <rect x="50" y="230" width="320" height="50" fill="#E74C3C"/>
  <rect x="50" y="290" width="320" height="50" fill="#2C3E50"/>

  <g transform="translate(50, 50)">
    <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#2C3E50">Texas Hold'em Poker</text>
  </g>

  <g transform="translate(50, 100)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Game Overview</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>Blind Bets: Two forced bets, the Small Blind (SB) and Big Blind (BB), are placed before the cards are dealt.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 150)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Pre-Flop</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>The first round of betting, where players can choose to call, raise, or fold.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 200)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Flop Betting</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>The second round of betting, where players can choose to check, bet, raise, or fold.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 250)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Showdown</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>Players reveal their hole cards, and the player with the best hand wins the pot.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 300)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Security Considerations</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>The game involves risk management, bluffing, and psychological manipulation.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 350)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Strategies and Tactics</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>The game is known for its strategic gameplay, social interaction, and thrilling outcomes.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 400)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Key Concepts</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>Hand rankings, betting structures, and player psychology.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 450)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Game Variants</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>Texas Hold'em, Omaha, and Seven-Card Stud.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 500)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Tournaments and Leagues</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>From cash games to mixed games and online tournaments.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 550)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Conclusion</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>Texas Hold'em Poker is a complex game that combines strategy, psychology, and luck.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(50, 600)">
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Further Reading</text>
    <text x="20" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#2C3E50" data-narration>For more information on Texas Hold'em Poker, visit our website or consult a poker book.</text>
    <animate transform="rotate(360 20 20)" attributeName="transform" begin="indefinite"dur="2s" repeatCount="indefinite"/>
  </g>

</svg>