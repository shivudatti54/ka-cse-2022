<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="tiger-hash" xmlns:xlink="http://www.w3.org/1999/xlink">
    <style>
        /* Styles */
        .section {
            position: relative;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .section::before {
            content: attr(data-narration);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }
        
        .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 40px;
            background-color: #fff;
            transform-origin: bottom center;
        }
        
        .arrow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
        }
        
        .gradient {
            background: linear-gradient(to bottom, #66CCCC, #33CCCC);
        }
    </style>

    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
            <stop offset="100%" stop-color="#33CCCC" stop-opacity="1" />
        </linearGradient>
    </defs>

    <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" />
    <rect x="10" y="10" width="400" height="380" fill="#fff" opacity="0.9" />
