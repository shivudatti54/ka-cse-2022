<svg width="420" height="400" data-topic-id="Key-Escrow">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="30" fill="#3498db" stroke="#3498db" stroke-width="2" rx="5"/>
  <text x="15" y="25" font-size="18" font-family="Arial" fill="#ffffff">Key Escrow</text>
  <animateTransform attributeName="transform" type="translate" from="0 30" to="0 50" begin="0s" dur="2s" repeatCount="1" />
  
  <!-- Introduction Section -->
  <rect x="10" y="60" width="400" height="30" fill="#2ecc71" stroke="#2ecc71" stroke-width="2" rx="5"/>
  <text x="15" y="75" font-size="16" font-family="Arial" fill="#ffffff">What is Key Escrow?</text>
  <text x="15" y="85" font-size="14" font-family="Arial" fill="#666666">Key escrow is a cryptographic technique used to provide an additional layer of security and reliability in key management systems.</text>
  <animateTransform attributeName="transform" type="translate" from="0 75" to="0 85" begin="0s" dur="0.5s" repeatCount="1" />
  
  <!-- How Key Escrow Works Section -->
  <rect x="10" y="120" width="400" height="30" fill="#e74c3c" stroke="#e74c3c" stroke-width="2" rx="5"/>
  <text x="15" y="135" font-size="16" font-family="Arial" fill="#ffffff">How Key Escrow Works</text>
  <text x="15" y="145" font-size="14" font-family="Arial" fill="#666666">Key escrow involves the following steps: Key Generation, Key Distribution, Escrow Establishment, and Dispute Resolution.</text>
  <text x="15" y="155" font-size="14" font-family="Arial" fill="#666666">There are two main key escrow models: Centralized and Decentralized.</text>
  <text x="15" y="165" font-size="14" font-family="Arial" fill="#666666">The escrow agent is responsible for storing the private key, providing access, and resolving disputes.</text>
  <animateTransform attributeName="transform" type="translate" from="0 135" to="0 145" begin="0s" dur="0.5s" repeatCount="1" />
  <animateTransform attributeName="transform" type="translate" from="0 145" to="0 155" begin="0.5s" dur="0.5s" repeatCount="1" />
  <animateTransform attributeName="transform" type="translate" from="0 155" to="0 165" begin="1s" dur="0.5s" repeatCount="1" />
  
  <!-- Benefits of Key Escrow Section -->
  <rect x="10" y="210" width="400" height="30" fill="#1abc9c" stroke="#1abc9c" stroke-width="2" rx="5"/>
  <text x="15" y="225" font-size="16" font-family="Arial" fill="#ffffff">Benefits of Key Escrow</text>
  <text x="15" y="235" font-size="14" font-family="Arial" fill="#666666">Key escrow provides an additional layer of security, reliability, and dispute resolution.</text>
  <text x="15" y="245" font-size="14" font-family="Arial" fill="#666666">It allows the escrow agent to provide access to the private key in case of a dispute.</text>
  <text x="15" y="255" font-size="14" font-family="Arial" fill="#666666">This enables the escrow agent to verify the recipient's identity or resolve the dispute.</text>
  <animateTransform attributeName="transform" type="translate" from="0 225" to="0 235" begin="0s" dur="0.5s" repeatCount="1" />
  <animateTransform attributeName="transform" type="translate" from="0 235" to="0 245" begin="0.5s" dur="0.5s" repeatCount="1" />
  <animateTransform attributeName="transform" type="translate" from="0 245" to="0 255" begin="1s" dur="0.5s" repeatCount="1" />
  
  <!-- Arrow Markers -->
  <path d="M 20 300 L 400 300" stroke="#3498db" stroke-width="2" fill="none" />
  <path d="M 20 310 L 400 310" stroke="#3498db" stroke-width="2" fill="none" />
  <path d="M 20 320 L 400 320" stroke="#3498db" stroke-width="2" fill="none" />
  <path d="M 20 330 L 400 330" stroke="#3498db" stroke-width="2" fill="none" />
  
  <!-- Footer Section -->
  <rect x="10" y="350" width="400" height="30" fill="#e74c3c" stroke="#e74c3c" stroke-width="2" rx="5"/>
  <text x="15" y="365" font-size="16" font-family="Arial" fill="#ffffff">Footer</text>
  <animateTransform attributeName="transform" type="translate" from="0 365" to="0 375" begin="0s" dur="0.5s" repeatCount="1" />
</svg>