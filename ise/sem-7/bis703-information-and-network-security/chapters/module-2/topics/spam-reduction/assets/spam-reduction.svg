<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="spam-reduction">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and header (0.3s) -->
  <g opacity="0" data-narration="Content Security Policy is an HTTP header that acts as a whitelist, telling the browser which content sources are allowed.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Content Security Policy (CSP) for XSS</text>
    <rect x="30" y="40" width="360" height="32" rx="6" fill="#3949AB" opacity="0.1"/>
    <text x="210" y="61" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">Content-Security-Policy: script-src 'self' 'nonce-...'</text>
  </g>

  <!-- Group 2: Server sending CSP header (1.5s) -->
  <g opacity="0" data-narration="The web server sends the CSP header along with the HTML response. The browser parses the policy before loading any resources.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Server box -->
    <rect x="30" y="85" width="130" height="55" rx="6" fill="#3949AB"/>
    <text x="95" y="105" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Web Server</text>
    <text x="95" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">HTTP 200 + CSP</text>
    <text x="95" y="132" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">+ HTML body</text>
    <!-- Arrow from server to browser -->
    <line x1="160" y1="112" x2="250" y2="112" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowIndigo)" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <text x="205" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">sends</text>
    <!-- Browser box -->
    <rect x="258" y="85" width="132" height="55" rx="6" fill="#00695C"/>
    <text x="324" y="105" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Browser</text>
    <text x="324" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="#A5D6A7">Parses CSP</text>
    <text x="324" y="132" text-anchor="middle" font-family="monospace" font-size="8" fill="#A5D6A7">Enforces policy</text>
  </g>

  <!-- Group 3: Resource check decision (3.0s) -->
  <g opacity="0" data-narration="For every script or resource, the browser checks if it matches the CSP policy. Allowed sources pass, while unauthorized ones are blocked.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Decision diamond -->
    <polygon points="210,155 280,185 210,215 140,185" fill="white" stroke="#3949AB" stroke-width="2"/>
    <text x="210" y="182" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Resource</text>
    <text x="210" y="193" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">allowed?</text>
    <!-- Yes arrow (left) -->
    <line x1="140" y1="185" x2="58" y2="185" stroke="#00695C" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <text x="100" y="178" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">YES</text>
    <!-- No arrow (right) -->
    <line x1="280" y1="185" x2="362" y2="185" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)"/>
    <text x="320" y="178" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">NO</text>
  </g>

  <!-- Group 4: Allowed scripts (4.5s) -->
  <g opacity="0" data-narration="Scripts from the same origin or with a matching nonce are allowed to load and execute. For example, script-src self allows own-origin scripts.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <!-- Allowed box -->
    <rect x="15" y="225" width="175" height="80" rx="6" fill="#00695C"/>
    <text x="102" y="243" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Allowed (Whitelisted)</text>
    <line x1="30" y1="250" x2="175" y2="250" stroke="#A5D6A7" stroke-width="0.5"/>
    <text x="35" y="264" font-family="monospace" font-size="8" fill="#A5D6A7">src="https://self/app.js"</text>
    <text x="35" y="278" font-family="monospace" font-size="8" fill="#A5D6A7">nonce="r4nd0mV4lu3"</text>
    <text x="35" y="292" font-family="monospace" font-size="8" fill="#A5D6A7">sha256-5LiybI8a...=</text>
    <!-- Checkmark -->
    <circle cx="170" cy="240" r="8" fill="#A5D6A7"/>
    <path d="M165,240 L168,244 L176,236" stroke="#00695C" stroke-width="2" fill="none"/>
  </g>

  <!-- Group 5: Blocked scripts (6.0s) -->
  <g opacity="0" data-narration="Inline scripts without nonces, eval calls, and scripts from untrusted origins are blocked. The browser refuses to execute them, neutralizing XSS payloads.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <!-- Blocked box -->
    <rect x="228" y="225" width="175" height="80" rx="6" fill="#C62828"/>
    <text x="315" y="243" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Blocked (Violation)</text>
    <line x1="243" y1="250" x2="388" y2="250" stroke="#EF9A9A" stroke-width="0.5"/>
    <text x="248" y="264" font-family="monospace" font-size="8" fill="#EF9A9A">&lt;script&gt;alert(1)&lt;/script&gt;</text>
    <text x="248" y="278" font-family="monospace" font-size="8" fill="#EF9A9A">src="http://evil.com/xss.js"</text>
    <text x="248" y="292" font-family="monospace" font-size="8" fill="#EF9A9A">eval("malicious code")</text>
    <!-- X mark -->
    <circle cx="383" cy="240" r="8" fill="#EF9A9A"/>
    <line x1="379" y1="236" x2="387" y2="244" stroke="#C62828" stroke-width="2"/>
    <line x1="387" y1="236" x2="379" y2="244" stroke="#C62828" stroke-width="2"/>
  </g>

  <!-- Group 6: Implementation phases and reporting (7.5s) -->
  <g opacity="0" data-narration="CSP is deployed in three phases: first Report-Only mode to test, then eliminate unsafe-inline using nonces or hashes, and finally enforce the policy while monitoring violation reports.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Phase boxes -->
    <rect x="15" y="320" width="120" height="65" rx="6" fill="#E65100"/>
    <text x="75" y="338" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Phase 1</text>
    <text x="75" y="352" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCC80">Report-Only</text>
    <text x="75" y="364" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFCC80">CSP-Report-Only</text>
    <text x="75" y="376" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFCC80">Test without blocking</text>

    <rect x="150" y="320" width="120" height="65" rx="6" fill="#E65100"/>
    <text x="210" y="338" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Phase 2</text>
    <text x="210" y="352" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCC80">Use Nonces/Hashes</text>
    <text x="210" y="364" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFCC80">nonce="r4nd0m"</text>
    <text x="210" y="376" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFCC80">Remove unsafe-inline</text>

    <rect x="285" y="320" width="120" height="65" rx="6" fill="#E65100"/>
    <text x="345" y="338" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Phase 3</text>
    <text x="345" y="352" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCC80">Enforce + Monitor</text>
    <text x="345" y="364" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFCC80">report-uri /csp</text>
    <text x="345" y="376" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFCC80">Block + report viols</text>

    <!-- Arrows between phases -->
    <line x1="135" y1="352" x2="148" y2="352" stroke="#E65100" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <line x1="270" y1="352" x2="283" y2="352" stroke="#E65100" stroke-width="2" marker-end="url(#arrowIndigo)"/>
  </g>
</svg>
