<svg width="420" height="400" data-topic-id="21102024-1-annexure-ii-2-what-is-a-hash-function">
  <defs>
    <linearGradient id="background-gradients" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect fill="url(#background-gradients)" width="100%" height="100%"/>
  <text x="10%" y="20%" font-size="24px" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#4B005A">Hash Functions and the Birthday Problem</text>

  <section data-narration="What is a Hash Function?" style="margin-top: 50px;">
    <rect x="10%" y="50%" width="80%" height="150px" fill="#C9E4CA" rx="10px" />
    <animate transform="rotate(360 50% 50%)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="70%" font-size="18px" font-family="Arial" text-anchor="middle" fill="#4B005A">A hash function is a one-way mathematical function that takes an input, known as a message, and produces a fixed-size output, known as a hash value or digest.</text>
    <path d="M 50 100 L 70 120 L 30 120 Z" stroke="#4B005A" stroke-width="2" fill="#C9E4CA" opacity="0.5" />
  </section>

  <section data-narration="Deterministic Property" style="margin-top: 50px;">
    <rect x="10%" y="50%" width="80%" height="150px" fill="#FFC107" rx="10px" />
    <animate transform="rotate(360 50% 50%)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="70%" font-size="18px" font-family="Arial" text-anchor="middle" fill="#4B005A">The hash function is deterministic, meaning that the same input will always produce the same output.</text>
    <path d="M 50 100 L 70 120 L 30 120 Z" stroke="#4B005A" stroke-width="2" fill="#FFC107" opacity="0.5" />
  </section>

  <section data-narration="Non-Invertible Property" style="margin-top: 50px;">
    <rect x="10%" y="50%" width="80%" height="150px" fill="#34A85A" rx="10px" />
    <animate transform="rotate(360 50% 50%)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="70%" font-size="18px" font-family="Arial" text-anchor="middle" fill="#4B005A">The hash function is non-invertible, meaning that it is computationally infeasible to determine the original input from the output.</text>
    <path d="M 50 100 L 70 120 L 30 120 Z" stroke="#4B005A" stroke-width="2" fill="#34A85A" opacity="0.5" />
  </section>

  <section data-narration="Fixed Size Output" style="margin-top: 50px;">
    <rect x="10%" y="50%" width="80%" height="150px" fill="#FF69B4" rx="10px" />
    <animate transform="rotate(360 50% 50%)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="70%" font-size="18px" font-family="Arial" text-anchor="middle" fill="#4B005A">The hash function always produces a fixed-size output, regardless of the size of the input.</text>
    <path d="M 50 100 L 70 120 L 30 120 Z" stroke="#4B005A" stroke-width="2" fill="#FF69B4" opacity="0.5" />
  </section>

  <section data-narration="Collision-Resistant Property" style="margin-top: 50px;">
    <rect x="10%" y="50%" width="80%" height="150px" fill="#FF9900" rx="10px" />
    <animate transform="rotate(360 50% 50%)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="70%" font-size="18px" font-family="Arial" text-anchor="middle" fill="#4B005A">The hash function is collision-resistant, meaning that it is computationally infeasible to find two different inputs that produce the same output.</text>
    <path d="M 50 100 L 70 120 L 30 120 Z" stroke="#4B005A" stroke-width="2" fill="#FF9900" opacity="0.5" />
  </section>

  <section data-narration="The Birthday Problem" style="margin-top: 50px;">
    <rect x="10%" y="50%" width="80%" height="150px" fill="#C5CAE9" rx="10px" />
    <animate transform="rotate(360 50% 50%)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="70%" font-size="18px" font-family="Arial" text-anchor="middle" fill="#4B005A">The Birthday Problem is a probability problem that asks how many people must be in a room before there is a greater than 50% chance that at least two people share the same birthday.</text>
    <path d="M 50 100 L 70 120 L 30 120 Z" stroke="#4B005A" stroke-width="2" fill="#C5CAE9" opacity="0.5" />
  </section>

  <text x="50%" y="10%" font-size="24px" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#4B005A">Hash Functions and the Birthday Problem</text>

  <footer>
    <text x="50%" y="90%" font-size="18px" font-family="Arial" text-anchor="middle" fill="#4B005A">Learn more about hash functions and the birthday problem at your favorite online resource.</text>
  </footer>
</svg>