<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="generating-random-bits">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#3949AB"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF6C00"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#3949AB" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- ==================== GROUP 1: Title & Definition (0.3s) ==================== -->
  <g opacity="0" data-narration="A Generating Function encodes a sequence of numbers as coefficients of a formal power series. For the sequence a-zero, a-one, a-two and so on, the ordinary generating function G of x equals the sum of a-sub-n times x to the n, from n equals zero to infinity.">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>

    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Generating Functions for Solving Recurrences</text>

    <!-- Definition box -->
    <rect x="20" y="38" width="380" height="52" rx="6" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
    <text x="30" y="55" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Definition: Ordinary Generating Function (OGF)</text>
    <text x="210" y="72" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100" font-weight="bold">G(x) = a0 + a1*x + a2*x^2 + ... = Sum(an * x^n)</text>
    <text x="210" y="84" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Coefficients encode the sequence; x is a formal placeholder</text>
  </g>

  <!-- ==================== GROUP 2: Common Generating Functions (1.5s) ==================== -->
  <g opacity="0" data-narration="The building blocks are common generating functions you should memorize. The constant sequence 1, 1, 1 has generating function 1 over 1 minus x. The geometric sequence 1, c, c-squared has generating function 1 over 1 minus c x. Binomial coefficients use (1 plus x) to the m.">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>

    <text x="30" y="110" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Common GF Building Blocks</text>

    <!-- Constant sequence -->
    <rect x="20" y="117" width="120" height="48" rx="5" fill="url(#nodeGrad)" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
    </rect>
    <text x="80" y="133" text-anchor="middle" font-family="Arial" font-size="8" fill="white" opacity="0">
      1, 1, 1, 1, ...
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
    </text>
    <text x="80" y="157" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white" opacity="0">
      1/(1-x)
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.9s" fill="freeze"/>
    </text>

    <!-- Geometric sequence -->
    <rect x="150" y="117" width="120" height="48" rx="5" fill="url(#tealGrad)" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
    </rect>
    <text x="210" y="133" text-anchor="middle" font-family="Arial" font-size="8" fill="white" opacity="0">
      1, c, c^2, c^3, ...
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.1s" fill="freeze"/>
    </text>
    <text x="210" y="157" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white" opacity="0">
      1/(1-cx)
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
    </text>

    <!-- Binomial -->
    <rect x="280" y="117" width="120" height="48" rx="5" fill="url(#orangeGrad)" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.3s" fill="freeze"/>
    </rect>
    <text x="340" y="133" text-anchor="middle" font-family="Arial" font-size="8" fill="white" opacity="0">
      C(m,0), C(m,1), ...
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
    </text>
    <text x="340" y="157" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white" opacity="0">
      (1+x)^m
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.5s" fill="freeze"/>
    </text>
  </g>

  <!-- ==================== GROUP 3: 4-Step Process Flowchart (3.0s) ==================== -->
  <g opacity="0" data-narration="The four-step process to solve a recurrence: First, define G of x for your sequence. Second, multiply the recurrence by x to the n and sum over all valid n. Third, solve the resulting algebraic equation for G of x. Fourth, expand G of x as a power series to extract the closed-form coefficient a-sub-n.">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>

    <text x="210" y="182" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">4-Step Solving Process</text>

    <!-- Step 1 -->
    <rect x="20" y="190" width="86" height="34" rx="5" fill="url(#nodeGrad)" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.2s" fill="freeze"/>
    </rect>
    <text x="63" y="204" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white" opacity="0">
      Step 1
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.3s" fill="freeze"/>
    </text>
    <text x="63" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="white" opacity="0">
      Define G(x)
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.3s" fill="freeze"/>
    </text>

    <!-- Arrow 1-2 -->
    <line x1="108" y1="207" x2="124" y2="207" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.4s" fill="freeze"/>
    </line>

    <!-- Step 2 -->
    <rect x="126" y="190" width="86" height="34" rx="5" fill="url(#tealGrad)" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.5s" fill="freeze"/>
    </rect>
    <text x="169" y="204" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white" opacity="0">
      Step 2
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.6s" fill="freeze"/>
    </text>
    <text x="169" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="white" opacity="0">
      Multiply &amp; Sum
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.6s" fill="freeze"/>
    </text>

    <!-- Arrow 2-3 -->
    <line x1="214" y1="207" x2="230" y2="207" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.7s" fill="freeze"/>
    </line>

    <!-- Step 3 -->
    <rect x="232" y="190" width="86" height="34" rx="5" fill="url(#orangeGrad)" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.8s" fill="freeze"/>
    </rect>
    <text x="275" y="204" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white" opacity="0">
      Step 3
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.9s" fill="freeze"/>
    </text>
    <text x="275" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="white" opacity="0">
      Solve for G(x)
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.9s" fill="freeze"/>
    </text>

    <!-- Arrow 3-4 -->
    <line x1="320" y1="207" x2="336" y2="207" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="4.0s" fill="freeze"/>
    </line>

    <!-- Step 4 -->
    <rect x="338" y="190" width="66" height="34" rx="5" fill="#C62828" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.1s" fill="freeze"/>
    </rect>
    <text x="371" y="204" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white" opacity="0">
      Step 4
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="4.2s" fill="freeze"/>
    </text>
    <text x="371" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="white" opacity="0">
      Extract a_n
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="4.2s" fill="freeze"/>
    </text>
  </g>

  <!-- ==================== GROUP 4: Worked Example (4.5s) ==================== -->
  <g opacity="0" data-narration="Example: Solve a_n equals 3 times a_(n-1) plus 2, with a_0 equals 1. After defining G of x, multiplying by x-to-the-n and summing, we get G of x minus 1 equals 3x times G of x plus 2x over 1 minus x. Solving gives G of x equals 1 plus x, over the product of 1 minus x and 1 minus 3x.">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>

    <!-- Example box -->
    <rect x="20" y="232" width="185" height="95" rx="6" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
    <text x="112" y="247" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Worked Example</text>

    <!-- Recurrence -->
    <text x="30" y="262" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">a_n = 3*a_(n-1) + 2</text>
    <text x="30" y="274" font-family="monospace" font-size="8" fill="#333">a_0 = 1</text>

    <!-- Arrow showing transformation -->
    <line x1="60" y1="280" x2="60" y2="293" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.9s" fill="freeze"/>
    </line>
    <text x="73" y="289" font-family="Arial" font-size="7" fill="#3949AB" opacity="0">
      solve
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.9s" fill="freeze"/>
    </text>

    <!-- G(x) result -->
    <text x="30" y="306" font-family="monospace" font-size="9" fill="#00695C" font-weight="bold" opacity="0">
      G(x) = (1+x)/((1-x)(1-3x))
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.0s" fill="freeze"/>
    </text>

    <!-- Final answer -->
    <line x1="60" y1="310" x2="60" y2="320" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.1s" fill="freeze"/>
    </line>
    <rect x="30" y="320" width="160" height="16" rx="3" fill="#C62828" opacity="0">
      <animate attributeName="opacity" from="0" to="0.9" dur="0.3s" begin="5.2s" fill="freeze"/>
    </rect>
    <text x="110" y="332" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white" opacity="0">
      a_n = -1 + 2*3^n
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.3s" fill="freeze"/>
    </text>
  </g>

  <!-- ==================== GROUP 5: Fibonacci Example via Partial Fractions (6.0s) ==================== -->
  <g opacity="0" data-narration="The Fibonacci sequence F_n equals F_(n-1) plus F_(n-2) yields G of x equals x over 1 minus x minus x-squared. Partial fraction decomposition produces Binet's formula: F_n equals phi-to-the-n minus phi-hat-to-the-n, all divided by the square root of 5, where phi is the golden ratio.">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>

    <!-- Fibonacci box -->
    <rect x="215" y="232" width="185" height="95" rx="6" fill="white" fill-opacity="0.85" filter="url(#shadow)"/>
    <text x="307" y="247" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Fibonacci via GF</text>

    <!-- Recurrence -->
    <text x="225" y="262" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">F_n = F_(n-1) + F_(n-2)</text>
    <text x="225" y="274" font-family="monospace" font-size="8" fill="#333">F_0=0, F_1=1</text>

    <!-- G(x) -->
    <line x1="260" y1="280" x2="260" y2="293" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.3s" fill="freeze"/>
    </line>
    <text x="225" y="305" font-family="monospace" font-size="9" fill="#00695C" font-weight="bold" opacity="0">
      G(x) = x/(1-x-x^2)
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.4s" fill="freeze"/>
    </text>

    <!-- Binet's formula -->
    <line x1="260" y1="310" x2="260" y2="320" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.5s" fill="freeze"/>
    </line>
    <rect x="222" y="320" width="170" height="16" rx="3" fill="#C62828" opacity="0">
      <animate attributeName="opacity" from="0" to="0.9" dur="0.3s" begin="6.6s" fill="freeze"/>
    </rect>
    <text x="307" y="332" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white" opacity="0">
      F_n = (phi^n - phi'^n)/sqrt(5)
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.7s" fill="freeze"/>
    </text>
  </g>

  <!-- ==================== GROUP 6: Key Operations & Exam Tips (7.5s) ==================== -->
  <g opacity="0" data-narration="Key operations on generating functions: scaling by c multiplies each coefficient, addition adds term by term, multiplying by x-to-the-k shifts the sequence right, and convolution multiplies two generating functions. For exams, memorize common GFs, practice index shifting carefully, master partial fractions, and always verify your answer against initial conditions.">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>

    <!-- Properties summary box -->
    <rect x="20" y="345" width="380" height="48" rx="6" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
    <text x="210" y="358" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Key Operations &amp; Exam Tips</text>

    <!-- Operation 1: Scaling -->
    <rect x="30" y="363" width="82" height="24" rx="4" fill="#E8EAF6"/>
    <text x="71" y="373" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">Scaling</text>
    <text x="71" y="383" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">c*G(x)</text>

    <!-- Operation 2: Addition -->
    <rect x="120" y="363" width="82" height="24" rx="4" fill="#E8EAF6"/>
    <text x="161" y="373" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">Addition</text>
    <text x="161" y="383" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">G(x)+H(x)</text>

    <!-- Operation 3: Right Shift -->
    <rect x="210" y="363" width="82" height="24" rx="4" fill="#E8EAF6"/>
    <text x="251" y="373" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">Right Shift</text>
    <text x="251" y="383" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">x^k*G(x)</text>

    <!-- Operation 4: Convolution -->
    <rect x="300" y="363" width="90" height="24" rx="4" fill="#E8EAF6"/>
    <text x="345" y="373" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">Convolution</text>
    <text x="345" y="383" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">G(x)*H(x)</text>
  </g>
</svg>