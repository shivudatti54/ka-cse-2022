<svg width="420" height="400" data-topic-id="other-crypto-related-topics">
  <defs>
    <linearGradient id="pastelGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C3E2F7" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastelGradient)" rx="10" />
  <g transform="translate(20, 50)">
    <rect width="100" height="50" fill="#3B5998" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Digital Signatures</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">What is a Digital Signature?</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#3B5998" rx="5" data-narration="A digital signature is a cryptographic mechanism that verifies the authenticity and integrity of a message, document, or file. The sender creates a digital signature by encrypting their private key with the message or document, and the recipient decrypts the digital signature with the sender's public key and verifies the message or document using a hash function." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(200, 50)">
    <rect width="100" height="50" fill="#0097A7" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Hashing</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">What is Hashing?</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#0097A7" rx="5" data-narration="Hashing is a one-way process that transforms data into a fixed-size string of characters, known as a hash value. The hash value is unique to the input data." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(380, 50)">
    <rect width="100" height="50" fill="#FFC107" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Symmetric and Asymmetric Encryption</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">What is Symmetric and Asymmetric Encryption?</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#FFC107" rx="5" data-narration="Symmetric encryption uses the same key for encrypting and decrypting the data, while asymmetric encryption uses a pair of keys, one for encryption and another for decryption." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(220, 120)">
    <rect width="100" height="50" fill="#3B5998" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Cryptographic Protocols</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">What are Cryptographic Protocols?</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#3B5998" rx="5" data-narration="Cryptographic protocols are sets of rules and procedures used to ensure secure communication between two or more parties over an insecure channel." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(120, 180)">
    <rect width="100" height="50" fill="#0097A7" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Vulnerabilities</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">What are Vulnerabilities?</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#0097A7" rx="5" data-narration="Vulnerabilities refer to weaknesses or gaps in the security of a system, network, or application that can be exploited by attackers." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(300, 50)">
    <rect width="100" height="50" fill="#3B5998" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Conclusion</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">In conclusion, understanding digital signatures, hashing, symmetric and asymmetric encryption, cryptographic protocols, and vulnerabilities is essential for secure coding practices and protecting against cyber threats.</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#3B5998" rx="5" data-narration="By understanding these concepts, developers can create secure and reliable software systems that protect against cyber threats and maintain the integrity of sensitive data." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(220, 250)">
    <rect width="100" height="50" fill="#0097A7" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Additional Resources</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">For more information on digital signatures, hashing, symmetric and asymmetric encryption, cryptographic protocols, and vulnerabilities, visit our website or consult the provided resources.</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#0097A7" rx="5" data-narration="Our website provides detailed explanations, tutorials, and examples of digital signatures, hashing, symmetric and asymmetric encryption, cryptographic protocols, and vulnerabilities, as well as tools and resources for secure coding practices." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(100, 300)">
    <rect width="100" height="50" fill="#3B5998" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Contact Us</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">If you have any questions or need further assistance with secure coding practices or protecting against cyber threats, please contact us.</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#3B5998" rx="5" data-narration="Our team of experts is available to provide guidance and support for secure coding practices and protecting against cyber threats. Contact us today to learn more." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(280, 350)">
    <rect width="100" height="50" fill="#0097A7" rx="5" />
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Footer</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="start">Copyright 2023 Crypto Education</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translateX" from="0" to="200" begin="0s" dur="2s" repeatCount="indefinite" />
    <animatedRect x="10" y="40" width="80" height="20" fill="#0097A7" rx="5" data-narration="This website is for educational purposes only and is not intended to be used for commercial purposes. All rights reserved." />
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
</svg>