<svg width="420" height="400" data-topic-id="textbook2-chapter-12-121-to-126" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
<linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
<stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
</linearGradient>
</defs>

<rect x="10" y="10" width="400" height="380" fill="url(#gradient-background)"/>
<text x="20" y="30" text-anchor="start" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Textbook2 Chapter 12: Cryptography and Key Management</text>

<section data-narration="Introduction to Cryptography" transform="translate(10,80)">
<rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="5"/>
<text x="15" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Cryptography is the practice and study of techniques for secure communication in the presence of third parties called adversaries.</text>
<animateTransform attributeName="transform" type="translate" from="10,80" to="10,90" begin="0s" dur="2s" repeatCount="indefinite"/>
</section>

<section data-narration="Definition" transform="translate(10,130)">
<rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="5"/>
<text x="15" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Cryptography is the science of secure communication by transforming plaintext into unreadable ciphertext.</text>
<animateTransform attributeName="transform" type="translate" from="10,130" to="10,140" begin="2s" dur="2s" repeatCount="indefinite"/>
</section>

<section data-narration="Example" transform="translate(10,170)">
<rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="5"/>
<text x="15" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Secure online transactions, such as online banking and e-commerce, rely heavily on cryptography to protect sensitive information.</text>
<animateTransform attributeName="transform" type="translate" from="10,170" to="10,180" begin="4s" dur="2s" repeatCount="indefinite"/>
</section>

<section data-narration="Types of Cryptography" transform="translate(10,220)">
<rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="5"/>
<text x="15" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">There are several types of cryptography, including symmetric key cryptography, asymmetric key cryptography, and hash functions.</text>
<animateTransform attributeName="transform" type="translate" from="10,220" to="10,230" begin="6s" dur="2s" repeatCount="indefinite"/>
</section>

<section data-narration="Symmetric Key Cryptography" transform="translate(10,270)">
<rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="5"/>
<text x="15" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Symmetric key cryptography is the most commonly used type of cryptography. It uses the same key for encryption and decryption.</text>
<animateTransform attributeName="transform" type="translate" from="10,270" to="10,280" begin="8s" dur="2s" repeatCount="indefinite"/>
</section>

<section data-narration="Asymmetric Key Cryptography" transform="translate(10,320)">
<rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="5"/>
<text x="15" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Asymmetric key cryptography uses a pair of keys, one for encryption and another for decryption.</text>
<animateTransform attributeName="transform" type="translate" from="10,320" to="10,330" begin="10s" dur="2s" repeatCount="indefinite"/>
</section>

<section data-narration="Hash Function" transform="translate(10,370)">
<rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="5"/>
<text x="15" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Hash functions are one-way functions that take input data of any size and produce a fixed-size output.</text>
<animateTransform attributeName="transform" type="translate" from="10,370" to="10,380" begin="12s" dur="2s" repeatCount="indefinite"/>
</section>

<rect x="10" y="400" width="400" height="20" fill="#F7F7F7" rx="5"/>
<text x="20" y="410" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Footer</text>
</svg>