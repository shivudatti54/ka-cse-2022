<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Classical Encryption Techniques</text>

  <g id="step0" class="step" data-narration="Classical ciphers fall into two main families: substitution and transposition.">
    <rect x="250" y="60" width="300" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Classical Ciphers</text>
    <line x1="320" y1="105" x2="220" y2="145" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="480" y1="105" x2="580" y2="145" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="100" y="148" width="240" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="220" y="173" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">Substitution Ciphers</text>
    <rect x="460" y="148" width="240" height="40" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="580" y="173" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">Transposition Ciphers</text>
  </g>

  <g id="step1" class="step" data-narration="Substitution replaces letters. Caesar cipher shifts by a fixed key value of three.">
    <rect x="40" y="210" width="170" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="125" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Caesar Cipher</text>
    <text x="125" y="255" text-anchor="middle" font-size="11" fill="#333">C = (P + K) mod 26</text>
    <text x="125" y="275" text-anchor="middle" font-size="11" fill="#666">Key: shift value (3)</text>
    <text x="125" y="205" text-anchor="middle" font-size="10" fill="#f44336">Only 25 keys!</text>
  </g>

  <g id="step2" class="step" data-narration="Monoalphabetic cipher uses a random permutation. Large keyspace but vulnerable to frequency analysis.">
    <rect x="225" y="210" width="170" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="310" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Monoalphabetic</text>
    <text x="310" y="255" text-anchor="middle" font-size="11" fill="#333">Random mapping</text>
    <text x="310" y="275" text-anchor="middle" font-size="11" fill="#666">Key space: 26!</text>
    <text x="310" y="205" text-anchor="middle" font-size="10" fill="#f44336">Frequency analysis</text>
  </g>

  <g id="step3" class="step" data-narration="Playfair encrypts letter pairs using a five-by-five matrix, hiding single-letter frequencies.">
    <rect x="40" y="310" width="170" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="125" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Playfair Cipher</text>
    <text x="125" y="355" text-anchor="middle" font-size="11" fill="#333">Digraph encryption</text>
    <text x="125" y="375" text-anchor="middle" font-size="11" fill="#666">5x5 keyword matrix</text>
  </g>

  <g id="step4" class="step" data-narration="Vigenere cipher uses a repeating keyword for multiple Caesar shifts, defeating simple frequency analysis.">
    <rect x="225" y="310" width="170" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="310" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Vigenere Cipher</text>
    <text x="310" y="355" text-anchor="middle" font-size="11" fill="#333">Polyalphabetic shifts</text>
    <text x="310" y="375" text-anchor="middle" font-size="11" fill="#666">Keyword-based key</text>
  </g>

  <g id="step5" class="step" data-narration="Transposition ciphers rearrange letter positions without changing them. The Rail Fence cipher writes text in zigzag.">
    <rect x="460" y="210" width="280" height="100" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="600" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Rail Fence Example</text>
    <text x="600" y="260" text-anchor="middle" font-size="12" fill="#333" font-family="monospace">E . G . E . R . N</text>
    <text x="600" y="280" text-anchor="middle" font-size="12" fill="#333" font-family="monospace">. N . I . E . I . G</text>
    <text x="600" y="300" text-anchor="middle" font-size="11" fill="#666">Letters rearranged, not replaced</text>
  </g>

  <g id="step6" class="step" data-narration="Confusion hides the key-ciphertext relationship via substitution. Diffusion spreads statistics via transposition.">
    <rect x="460" y="330" width="130" height="60" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="525" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Confusion</text>
    <text x="525" y="375" text-anchor="middle" font-size="10" fill="#666">Substitution</text>
    <rect x="610" y="330" width="130" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="675" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Diffusion</text>
    <text x="675" y="375" text-anchor="middle" font-size="10" fill="#666">Transposition</text>
  </g>

  <g id="step7" class="step" data-narration="Kerckhoffs Principle: security depends only on key secrecy, not algorithm secrecy. Modern ciphers combine both.">
    <rect x="100" y="430" width="600" height="60" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="455" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Kerckhoffs Principle</text>
    <text x="400" y="478" text-anchor="middle" font-size="13" fill="#333">Security depends ONLY on key secrecy, not algorithm secrecy</text>
    <rect x="100" y="510" width="600" height="55" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="533" text-anchor="middle" font-size="12" fill="#388e3c">Modern ciphers (AES) combine both confusion + diffusion</text>
    <text x="400" y="553" text-anchor="middle" font-size="12" fill="#388e3c">with strong keys for maximum security</text>
  </g>
</svg>
