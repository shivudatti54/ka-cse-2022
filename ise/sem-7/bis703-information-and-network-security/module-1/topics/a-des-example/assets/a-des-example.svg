<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2">DES Encryption Example</text>

  <g class="step" id="step0" data-narration="DES is a symmetric block cipher that encrypts data in 64-bit blocks using a 56-bit key. It was developed by IBM in the 1970s.">
    <rect x="20" y="45" width="760" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">What is DES?</text>
    <text x="400" y="90" text-anchor="middle" font-size="11" fill="#333">Data Encryption Standard - symmetric block cipher operating on 64-bit blocks</text>
    <text x="400" y="103" text-anchor="middle" font-size="11" fill="#333">Uses a 56-bit key and involves 16 rounds of substitution and permutation</text>
  </g>

  <g class="step" id="step1" data-narration="We start with the plaintext input value and apply the Initial Permutation table to rearrange its bits, then split the permuted result into two equal left and right halves for processing.">
    <rect x="20" y="115" width="760" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Step 1: Initial Permutation (IP)</text>
    <rect x="40" y="155" width="180" height="22" rx="4" fill="#c8e6c9"/>
    <text x="130" y="170" text-anchor="middle" font-size="10" font-family="monospace" fill="#2e7d32">Plaintext: 0x1234567890abcdef</text>
    <path d="M240 166 L280 166" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    <rect x="290" y="155" width="200" height="22" rx="4" fill="#c8e6c9"/>
    <text x="390" y="170" text-anchor="middle" font-size="10" font-family="monospace" fill="#2e7d32">IP: 0x67452301efcdab89</text>
    <rect x="510" y="155" width="110" height="22" rx="4" fill="#a5d6a7"/>
    <text x="565" y="167" text-anchor="middle" font-size="9" fill="#1b5e20">L0: 0x67452301</text>
    <rect x="630" y="155" width="130" height="22" rx="4" fill="#a5d6a7"/>
    <text x="695" y="167" text-anchor="middle" font-size="9" fill="#1b5e20">R0: 0xefcdab89</text>
  </g>

  <g class="step" id="step2" data-narration="Each round expands the 32-bit right half to 48 bits using Expansion Permutation, then XORs with the round key from the 56-bit key schedule.">
    <rect x="20" y="195" width="760" height="65" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Step 2: Expansion Permutation (EP)</text>
    <rect x="40" y="235" width="160" height="18" rx="4" fill="#ffe0b2"/>
    <text x="120" y="248" text-anchor="middle" font-size="10" font-family="monospace" fill="#e65100">R0: 0xefcdab89</text>
    <path d="M210 244 L250 244" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <rect x="260" y="235" width="200" height="18" rx="4" fill="#ffe0b2"/>
    <text x="360" y="248" text-anchor="middle" font-size="10" font-family="monospace" fill="#e65100">EP: 0x1122334455667788</text>
    <text x="480" y="248" text-anchor="middle" font-size="10" fill="#333">(32 bits → 48 bits)</text>
    <rect x="560" y="235" width="90" height="18" rx="4" fill="#ffcc80"/>
    <text x="605" y="248" text-anchor="middle" font-size="9" fill="#e65100">+ Key: 0x11...</text>
    <path d="M660 244 L700 244" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="720" y="248" text-anchor="middle" font-size="9" fill="#333">XOR</text>
  </g>

  <g class="step" id="step3" data-narration="The 48-bit result is split into eight 6-bit blocks. Each block goes through an S-Box substitution, reducing it from 48 bits back to 32 bits.">
    <rect x="20" y="270" width="760" height="65" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Step 3: S-Box Substitution</text>
    <rect x="40" y="310" width="180" height="18" rx="4" fill="#e1bee7"/>
    <text x="130" y="323" text-anchor="middle" font-size="10" font-family="monospace" fill="#6a1b9a">EP: 0x1122334455667788</text>
    <text x="250" y="323" text-anchor="middle" font-size="10" fill="#333">(48 bits)</text>
    <path d="M280 319 L310 319" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="320" y="310" width="55" height="18" rx="4" fill="#ce93d8"/>
    <text x="347" y="323" text-anchor="middle" font-size="9" fill="#6a1b9a">S1</text>
    <rect x="385" y="310" width="55" height="18" rx="4" fill="#ce93d8"/>
    <text x="412" y="323" text-anchor="middle" font-size="9" fill="#6a1b9a">S2</text>
    <rect x="450" y="310" width="55" height="18" rx="4" fill="#ce93d8"/>
    <text x="477" y="323" text-anchor="middle" font-size="9" fill="#6a1b9a">S3</text>
    <rect x="515" y="310" width="55" height="18" rx="4" fill="#ce93d8"/>
    <text x="542" y="323" text-anchor="middle" font-size="9" fill="#6a1b9a">S4</text>
    <rect x="580" y="310" width="55" height="18" rx="4" fill="#ce93d8"/>
    <text x="607" y="323" text-anchor="middle" font-size="9" fill="#6a1b9a">S5</text>
    <rect x="645" y="310" width="55" height="18" rx="4" fill="#ce93d8"/>
    <text x="672" y="323" text-anchor="middle" font-size="9" fill="#6a1b9a">S6</text>
    <text x="700" y="323" text-anchor="middle" font-size="10" fill="#333">→</text>
    <rect x="730" y="310" width="40" height="18" rx="4" fill="#ab47bc"/>
    <text x="750" y="323" text-anchor="middle" font-size="9" fill="white">32b</text>
  </g>

  <g class="step" id="step4" data-narration="After S-Box substitution, the Permutation P rearranges the 32 bits. Then XOR with the previous left half produces the new right half for the round.">
    <rect x="20" y="345" width="760" height="65" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Step 4: Permutation (P) and XOR</text>
    <rect x="40" y="385" width="200" height="18" rx="4" fill="#ffcdd2"/>
    <text x="140" y="398" text-anchor="middle" font-size="10" font-family="monospace" fill="#c62828">S-Boxes: 0x3a09451101010101</text>
    <path d="M250 394 L290 394" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <rect x="300" y="385" width="180" height="18" rx="4" fill="#ffcdd2"/>
    <text x="390" y="398" text-anchor="middle" font-size="10" font-family="monospace" fill="#c62828">P: 0x1a2704932401d15a</text>
    <path d="M490 394 L530 394" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <rect x="540" y="385" width="100" height="18" rx="4" fill="#ef9a9a"/>
    <text x="590" y="398" text-anchor="middle" font-size="9" font-family="monospace" fill="#c62828">XOR L0</text>
    <path d="M650 394 L690 394" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <rect x="700" y="385" width="70" height="18" rx="4" fill="#e57373"/>
    <text x="735" y="398" text-anchor="middle" font-size="9" fill="#b71c1c">R1</text>
  </g>

  <g class="step" id="step5" data-narration="This process repeats for 16 rounds. Each round uses a different 48-bit key subset from the key schedule. After round 16, halves swap and Final Permutation is applied.">
    <rect x="20" y="420" width="760" height="65" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Steps 5-16: Repeat 16 Rounds</text>
    <rect x="40" y="460" width="220" height="18" rx="4" fill="#bbdefb"/>
    <text x="150" y="473" text-anchor="middle" font-size="10" fill="#1565c0">Each round uses a different</text>
    <text x="150" y="485" text-anchor="middle" font-size="10" fill="#1565c0">48-bit key from key schedule</text>
    <rect x="280" y="460" width="80" height="18" rx="4" fill="#90caf9"/>
    <text x="320" y="473" text-anchor="middle" font-size="10" font-family="monospace" fill="#0d47a1">Round 1</text>
    <rect x="370" y="460" width="80" height="18" rx="4" fill="#90caf9"/>
    <text x="410" y="473" text-anchor="middle" font-size="10" font-family="monospace" fill="#0d47a1">Round 2</text>
    <rect x="460" y="460" width="80" height="18" rx="4" fill="#90caf9"/>
    <text x="500" y="473" text-anchor="middle" font-size="10" font-family="monospace" fill="#0d47a1">...</text>
    <rect x="550" y="460" width="80" height="18" rx="4" fill="#64b5f6"/>
    <text x="590" y="473" text-anchor="middle" font-size="10" font-family="monospace" fill="#0d47a1">Round 16</text>
    <path d="M650 469 L690 469" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="700" y="460" width="70" height="18" rx="4" fill="#42a5f5"/>
    <text x="735" y="473" text-anchor="middle" font-size="9" fill="#0d47a1">Swap + FP</text>
  </g>

  <g class="step" id="step6" data-narration="The Final Permutation is the inverse of Initial Permutation. After swapping halves and applying FP, we get the 64-bit ciphertext from the 64-bit plaintext.">
    <rect x="20" y="495" width="760" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="518" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Final Permutation (FP) - Output</text>
    <rect x="40" y="532" width="280" height="12" rx="4" fill="#c8e6c9"/>
    <text x="180" y="541" text-anchor="middle" font-size="10" font-family="monospace" fill="#2e7d32">After Round 16 + Swap</text>
    <path d="M340 538 L380 538" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    <rect x="400" y="532" width="180" height="12" rx="4" fill="#a5d6a7"/>
    <text x="490" y="541" text-anchor="middle" font-size="10" font-family="monospace" fill="#1b5e20">FP (Inverse of IP)</text>
    <path d="M600 538 L640 538" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    <rect x="660" y="532" width="120" height="12" rx="4" fill="#81c784"/>
    <text x="720" y="541" text-anchor="middle" font-size="10" font-family="monospace" fill="#1b5e20">Ciphertext</text>
  </g>
</svg>
