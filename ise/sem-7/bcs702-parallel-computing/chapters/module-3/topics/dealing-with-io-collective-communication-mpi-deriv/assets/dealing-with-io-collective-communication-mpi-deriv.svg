<svg width="420" height="400" data-topic-id="dealing-with-io-collective-communication-mpi-derivatives">
  <title>Dealing with I/O, Collective Communication, MPI-Derived Datatypes, Performance Evaluation of MPI Programs, and A Parallel Sorting Algorithm</title>
  <footer>Learn about parallel computing with MPI</footer>

  <defs>
    <linearGradient id="pastel-gradient" colors="#C7B8EA #C5CAE9 #B2E6CE" />
    <style>
      .section {
        background: linear-gradient(to bottom, #C7B8EA, #C5CAE9, #B2E6CE);
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }
      .data-narration {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .label {
        font-weight: bold;
        margin-bottom: 5px;
      }
      .arrow {
        fill: #333;
        stroke: #333;
        stroke-width: 2;
        shape-rendering: crispEdges;
      }
    </style>
  </defs>

  <g>
    <rect x="10" y="10" width="400" height="20" style="fill: #FFF; font-weight: bold; font-size: 24px" />
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" />
    <text x="20" y="40" style="font-size: 18px;" text-anchor="middle">Dealing with I/O</text>
  </g>

  <g class="section" data-narration="I/O Operations in Parallel Computing">
    <rect x="10" y="70" width="400" height="200" style="fill: #FFF;" />
    <animateTransform attributeName="transform" type="translate" begin="0.2s" dur="2s" />
    <rect x="20" y="100" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="40" y="120" class="label" style="font-size: 16px;">Sequential I/O</text>
    <rect x="80" y="100" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="120" y="120" class="label" style="font-size: 16px;">Parallel I/O</text>
    <text x="20" y="170" class="data-narration" style="font-size: 18px;">In parallel computing, I/O operations can be a major bottleneck, as they can be slow and unpredictable. There are two main types of I/O operations: sequential I/O and parallel I/O.</text>
  </g>

  <g class="section" data-narration="MPI I/O Functions">
    <rect x="10" y="280" width="400" height="200" style="fill: #FFF;" />
    <animateTransform attributeName="transform" type="translate" begin="0.4s" dur="2s" />
    <rect x="20" y="310" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="40" y="330" class="label" style="font-size: 16px;">MPI_File_open</text>
    <rect x="80" y="310" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="120" y="330" class="label" style="font-size: 16px;">MPI_File_close</text>
    <rect x="160" y="310" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="200" y="330" class="label" style="font-size: 16px;">MPI_File_read</text>
    <rect x="240" y="310" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="280" y="330" class="label" style="font-size: 16px;">MPI_File_write</text>
    <text x="20" y="370" class="data-narration" style="font-size: 18px;">MPI provides several I/O functions for parallel computing, including MPI_File_open, MPI_File_close, MPI_File_read, and MPI_File_write.</text>
  </g>

  <g class="section" data-narration="Best Practices for I/O in Parallel Computing">
    <rect x="10" y="380" width="400" height="200" style="fill: #FFF;" />
    <animateTransform attributeName="transform" type="translate" begin="0.6s" dur="2s" />
    <rect x="20" y="410" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="40" y="430" class="label" style="font-size: 16px;">Use parallel I/O</text>
    <rect x="80" y="410" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="120" y="430" class="label" style="font-size: 16px;">Minimize I/O overhead</text>
    <text x="20" y="470" class="data-narration" style="font-size: 18px;">Whenever possible, use parallel I/O operations to reduce the overall processing time. Minimize the amount of data transferred between processes and avoid unnecessary I/O operations.</text>
  </g>

  <g class="section" data-narration="Parallel Sorting Algorithm">
    <rect x="10" y="480" width="400" height="200" style="fill: #FFF;" />
    <animateTransform attributeName="transform" type="translate" begin="0.8s" dur="2s" />
    <rect x="20" y="510" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="40" y="530" class="label" style="font-size: 16px;">Parallel Sorting Algorithm</text>
    <rect x="80" y="510" width="20" height="20" style="fill: #333; stroke: #333; stroke-width: 2;" />
    <text x="120" y="530" class="label" style="font-size: 16px;">Divide and Conquer Algorithm</text>
    <text x="20" y="570" class="data-narration" style="font-size: 18px;">A parallel sorting algorithm uses a divide-and-conquer approach to sort data in parallel. This approach can take advantage of multiple processors and reduce the overall processing time.</text>
  </g>

  <g class="footer">
    <rect x="10" y="590" width="400" height="20" style="fill: #FFF; font-weight: bold; font-size: 24px" />
    <animateTransform attributeName="transform" type="translate" begin="1s" dur="2s" />
  </g>
</svg>