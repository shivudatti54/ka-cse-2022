<svg width="420" height="400" data-topic-id="if-there-are-two-threads-and-four-iterations">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#gradient)"/>
  <g transform="translate(10, 10)">
    <g data-narration="Introduction">
      <rect x="0" y="0" width="60" height="20" rx="2" style="fill: #3498db; fill-opacity: 0.8"/>
      <text x="15" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Parallel Computing</text>
    </g>
    <g data-narration="Threads">
      <rect x="120" y="20" width="60" height="20" rx="2" style="fill: #3498db; fill-opacity: 0.8"/>
      <text x="125" y="25" font-size="16" font-family="Arial, sans-serif" fill="#fff">Threads</text>
    </g>
    <g data-narration="Iterations">
      <rect x="220" y="20" width="60" height="20" rx="2" style="fill: #3498db; fill-opacity: 0.8"/>
      <text x="225" y="25" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iterations</text>
    </g>
    <g data-narration="Problem Statement">
      <rect x="320" y="20" width="60" height="20" rx="2" style="fill: #3498db; fill-opacity: 0.8"/>
      <text x="325" y="25" font-size="16" font-family="Arial, sans-serif" fill="#fff">Example</text>
    </g>
    <g data-narration="Solution">
      <rect x="10" y="100" width="400" height="200" rx="2" style="fill: #f1c40f; fill-opacity: 0.8"/>
      <g transform="translate(10, 120)">
        <rect x="0" y="0" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="5" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Thread T1</text>
        <rect x="110" y="0" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="115" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Thread T2</text>
        <rect x="0" y="30" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="5" y="35" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iteration 1</text>
        <rect x="110" y="30" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="115" y="35" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iteration 2</text>
        <rect x="0" y="60" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="5" y="65" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iteration 3</text>
        <rect x="110" y="60" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="115" y="65" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iteration 4</text>
      </g>
      <g transform="translate(10, 240)">
        <rect x="0" y="0" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="5" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Sum</text>
        <rect x="110" y="0" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="115" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">of corresponding elements</text>
      </g>
      <g transform="translate(10, 280)">
        <rect x="0" y="0" width="100" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="5" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">in A and B</text>
      </g>
    </g>
    <g data-narration="Example">
      <rect x="10" y="230" width="400" height="70" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
      <g transform="translate(10, 240)">
        <rect x="0" y="0" width="80" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="5" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Element in A</text>
        <rect x="90" y="0" width="80" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="95" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Element in B</text>
        <rect x="0" y="30" width="80" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="5" y="35" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iteration 1</text>
        <rect x="90" y="30" width="80" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="95" y="35" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iteration 2</text>
        <rect x="0" y="60" width="80" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="5" y="65" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iteration 3</text>
        <rect x="90" y="60" width="80" height="20" rx="2" style="fill: #87CEEB; fill-opacity: 0.8"/>
        <text x="95" y="65" font-size="16" font-family="Arial, sans-serif" fill="#fff">Iteration 4</text>
      </g>
    </g>
  </g>
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="30" rx="2" style="fill: #e74c3c; fill-opacity: 0.8"/>
    <text x="15" y="15" font-size="16" font-family="Arial, sans-serif" fill="#fff">Sum of corresponding elements in A and B is 25</text>
  </g>
</svg>