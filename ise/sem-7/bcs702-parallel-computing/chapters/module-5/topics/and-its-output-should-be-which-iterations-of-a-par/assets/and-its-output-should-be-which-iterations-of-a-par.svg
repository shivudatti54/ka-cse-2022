<svg width="420" height="400" data-topic-id="parallel-computing-and-its-output-should-be-which-iterations-of-a-par" xmlns="http://www.w3.org/2000/svg">
  <desc>Parallel Computing: Understanding Parallelized For Loops and Thread Execution</desc>
  <style>
    /* Add a gradient background with pastel colors */
    body {
      background-image: linear-gradient(to bottom, #C5C3C8, #B2D2D9);
    }
    text {
      font-family: Arial, sans-serif;
    }
  </style>
  <title>And Its Output Should Be Which Iterations Of A Par</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5C3C8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2D2D9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <text x="10" y="10" font-size="24" text-anchor="middle">Parallel Computing</text>
  <section data-narration="Introduction">
    <rect x="10" y="50" width="400" height="20" fill="#C5C3C8"/>
    <text x="15" y="55" font-size="18" text-anchor="start">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" dur="2s" begin="0s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Definitions">
    <rect x="10" y="100" width="400" height="20" fill="#B2D2D9"/>
    <text x="15" y="105" font-size="18" text-anchor="start">Definitions</text>
    <animateTransform attributeName="transform" type="translate" from="0 110" to="0 130" dur="1s" begin="0s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Basic Concepts">
    <rect x="10" y="150" width="400" height="20" fill="#C5C3C8"/>
    <text x="15" y="155" font-size="18" text-anchor="start">Basic Concepts</text>
    <animateTransform attributeName="transform" type="translate" from="0 165" to="0 185" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="180" width="10" height="10" fill="#00BFFF" stroke="#000" rx="2" stroke-width="2"/>
    <text x="20" y="185" font-size="12" text-anchor="start">Thread 1: Iterations 1 &amp; 4</text>
    <rect x="30" y="180" width="10" height="10" fill="#00BFFF" stroke="#000" rx="2" stroke-width="2"/>
    <text x="40" y="185" font-size="12" text-anchor="start">Thread 2: Iterations 2 &amp; 3</text>
    <rect x="50" y="180" width="10" height="10" fill="#00BFFF" stroke="#000" rx="2" stroke-width="2"/>
    <text x="60" y="185" font-size="12" text-anchor="start">Thread 3: Iterations 5 &amp; 6</text>
  </section>
  <section data-narration="Thread Execution">
    <rect x="10" y="220" width="400" height="20" fill="#B2D2D9"/>
    <text x="15" y="225" font-size="18" text-anchor="start">Thread Execution</text>
    <animateTransform attributeName="transform" type="translate" from="0 235" to="0 265" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="260" width="10" height="10" fill="#FFA07A" stroke="#000" rx="2" stroke-width="2"/>
    <text x="20" y="265" font-size="12" text-anchor="start">Thread 1: Iterations 1 &amp; 4</text>
    <rect x="30" y="260" width="10" height="10" fill="#FFA07A" stroke="#000" rx="2" stroke-width="2"/>
    <text x="40" y="265" font-size="12" text-anchor="start">Thread 2: Iterations 2 &amp; 3</text>
    <rect x="50" y="260" width="10" height="10" fill="#FFA07A" stroke="#000" rx="2" stroke-width="2"/>
    <text x="60" y="265" font-size="12" text-anchor="start">Thread 3: Iterations 5 &amp; 6</text>
  </section>
  <section data-narration="Example Code">
    <rect x="10" y="300" width="400" height="20" fill="#C5C3C8"/>
    <text x="15" y="305" font-size="18" text-anchor="start">Example Code</text>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 350" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="350" width="10" height="10" fill="#00BFFF" stroke="#000" rx="2" stroke-width="2"/>
    <text x="20" y="355" font-size="12" text-anchor="start">#include <omp.h></text>
    <rect x="30" y="350" width="10" height="10" fill="#00BFFF" stroke="#000" rx="2" stroke-width="2"/>
    <text x="40" y="355" font-size="12" text-anchor="start">#pragma omp parallel num_threads(num_threads)</text>
    <rect x="50" y="350" width="10" height="10" fill="#00BFFF" stroke="#000" rx="2" stroke-width="2"/>
    <text x="60" y="355" font-size="12" text-anchor="start">#int main() { ... }</text>
    <rect x="10" y="380" width="10" height="10" fill="#FFA07A" stroke="#000" rx="2" stroke-width="2"/>
    <text x="20" y="385" font-size="12" text-anchor="start">#omp_get_thread_num()</text>
    <rect x="30" y="380" width="10" height="10" fill="#FFA07A" stroke="#000" rx="2" stroke-width="2"/>
    <text x="40" y="385" font-size="12" text-anchor="start">#start &amp; end</text>
    <rect x="50" y="380" width="10" height="10" fill="#FFA07A" stroke="#000" rx="2" stroke-width="2"/>
    <text x="60" y="385" font-size="12" text-anchor="start">#end</text>
  </section>
  <footer>
    <text x="10" y="400" font-size="18" text-anchor="start">And Its Output Should Be Which Iterations Of A Par</text>
  </footer>
</svg>