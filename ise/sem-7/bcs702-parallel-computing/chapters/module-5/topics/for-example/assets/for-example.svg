<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="for-example">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>
  <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">The fork() and exec() Process Lifecycle</text>

  <!-- Group 1 (0.3s): Parent Process Box -->
  <g data-narration="The parent process is the original running program, identified by its unique PID." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <rect x="135" y="38" width="150" height="44" rx="6" fill="#3949AB"/>
    <text x="210" y="56" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Parent Process</text>
    <text x="210" y="72" text-anchor="middle" font-family="monospace" font-size="10" fill="#C5CAE9">PID: 1234</text>
  </g>

  <!-- Group 2 (1.5s): fork() call and split into Parent + Child -->
  <g data-narration="Calling fork() duplicates the parent. It returns the child PID to the parent and 0 to the child. Both processes now run concurrently." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- fork() label on arrow -->
    <line x1="210" y1="82" x2="210" y2="108" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow-indigo)"/>
    <rect x="168" y="90" width="84" height="18" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="103" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#3949AB">fork()</text>

    <!-- Branching lines -->
    <line x1="210" y1="108" x2="105" y2="138" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow-indigo)"/>
    <line x1="210" y1="108" x2="315" y2="138" stroke="#00695C" stroke-width="2" marker-end="url(#arrow-teal)"/>

    <!-- Return value labels -->
    <text x="135" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">returns 1235</text>
    <text x="285" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">returns 0</text>

    <!-- Parent continues box -->
    <rect x="30" y="140" width="150" height="44" rx="6" fill="#3949AB"/>
    <text x="105" y="158" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Parent (PID: 1234)</text>
    <text x="105" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">pid == 1235 (child)</text>

    <!-- Child process box -->
    <rect x="240" y="140" width="150" height="44" rx="6" fill="#00695C"/>
    <text x="315" y="158" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Child (PID: 1235)</text>
    <text x="315" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#A5D6A7">pid == 0</text>
  </g>

  <!-- Group 3 (3.0s): exec() replaces child process image -->
  <g data-narration="The child calls exec() which replaces its entire memory image with a new program. The PID stays the same but the code running changes completely." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- exec() arrow from child -->
    <line x1="315" y1="184" x2="315" y2="212" stroke="#E65100" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <rect x="273" y="192" width="84" height="18" rx="4" fill="#E8EAF6" stroke="#E65100" stroke-width="1"/>
    <text x="315" y="205" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">exec()</text>

    <!-- New program box -->
    <rect x="240" y="218" width="150" height="44" rx="6" fill="#E65100"/>
    <text x="315" y="236" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">New Program: ls</text>
    <text x="315" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFE0B2">PID still 1235</text>

    <!-- Cross-out on old child to show replacement -->
    <line x1="242" y1="142" x2="388" y2="182" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
    <line x1="388" y1="142" x2="242" y2="182" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Group 4 (4.5s): Parent calls wait() -->
  <g data-narration="The parent calls wait() to block itself until the child terminates. This prevents zombie processes and collects the child exit status." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- wait() arrow from parent -->
    <line x1="105" y1="184" x2="105" y2="228" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow-indigo)"/>
    <rect x="63" y="198" width="84" height="18" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
    <text x="105" y="211" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#3949AB">wait()</text>

    <!-- Blocked parent box -->
    <rect x="30" y="232" width="150" height="36" rx="6" fill="#3949AB" opacity="0.6" stroke="#3949AB" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="105" y="254" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Parent blocked...</text>
  </g>

  <!-- Group 5 (6.0s): Child terminates, parent gets status -->
  <g data-narration="The child process terminates and sends its exit status back to the parent via wait. The parent resumes execution with the child exit code." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Child terminates -->
    <line x1="315" y1="262" x2="315" y2="288" stroke="#C62828" stroke-width="2" marker-end="url(#arrow-red)"/>
    <rect x="255" y="292" width="120" height="28" rx="6" fill="#C62828"/>
    <text x="315" y="311" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Child Exits (0)</text>

    <!-- Status signal arrow from child to parent -->
    <path d="M255,306 C200,306 160,290 140,270" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-red)"/>
    <text x="190" y="300" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">exit status</text>

    <!-- Parent resumes box -->
    <rect x="30" y="278" width="150" height="36" rx="6" fill="#3949AB"/>
    <text x="105" y="300" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Parent Resumes</text>
  </g>

  <!-- Group 6 (7.5s): Summary / Key takeaways -->
  <g data-narration="fork creates a copy, exec replaces the program, and wait synchronizes parent and child. This fork-exec-wait pattern is the foundation of Unix process control." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <rect x="20" y="326" width="380" height="64" rx="8" fill="white" opacity="0.85" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="344" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Key Pattern Summary</text>
    <text x="34" y="360" font-family="monospace" font-size="9" fill="#00695C">fork()</text>
    <text x="80" y="360" font-family="Arial" font-size="9" fill="#333">- duplicate process</text>
    <text x="220" y="360" font-family="monospace" font-size="9" fill="#E65100">exec()</text>
    <text x="268" y="360" font-family="Arial" font-size="9" fill="#333">- replace program</text>
    <text x="34" y="378" font-family="monospace" font-size="9" fill="#C62828">wait()</text>
    <text x="80" y="378" font-family="Arial" font-size="9" fill="#333">- synchronize &amp; collect exit status</text>
  </g>
</svg>