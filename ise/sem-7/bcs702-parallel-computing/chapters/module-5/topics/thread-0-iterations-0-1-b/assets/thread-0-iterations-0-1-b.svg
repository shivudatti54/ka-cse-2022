<svg width="420" height="400" data-topic-id="thread-0-iterations-0-1-b" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.5" rx="10" />
  <rect x="10" y="10" width="400" height="380" fill="#E0E0E0" rx="10" />
  <rect x="10" y="120" width="400" height="50" fill="#C7B8EA" rx="10" />
  <rect x="10" y="170" width="400" height="80" fill="#ADD8E6" rx="10" />

  <g transform="translate(20, 120)">
    <text x="0" y="0" text-anchor="start" font-size="24" font-family="Arial, sans-serif" font-weight="bold" fill="#2F4F7F">
      Thread 0: Iterations 0−1b
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite" begin="0s" />
    <g opacity="1" fill-opacity="0.5">
      <rect x="0" y="0" width="50" height="50" fill="#4C5154" rx="10" />
      <rect x="55" y="0" width="50" height="50" fill="#4C5154" rx="10" />
      <rect x="110" y="0" width="50" height="50" fill="#4C5154" rx="10" />
      <rect x="165" y="0" width="50" height="50" fill="#4C5154" rx="10" />
      <rect x="220" y="0" width="50" height="50" fill="#4C5154" rx="10" />
      <rect x="275" y="0" width="50" height="50" fill="#4C5154" rx="10" />
      <text x="20" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Thread
      </text>
      <text x="90" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        0
      </text>
      <text x="160" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Iterations
      </text>
      <text x="230" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
      0−1b
      </text>
      <text x="160" y="50" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Definition
      </text>
      <text x="20" y="70" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Thread: A single stream of execution that runs concurrently with other threads.
      </text>
      <text x="20" y="90" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Iteration: The process of executing a loop or a set of loops in a program.
      </text>
      <text x="20" y="110" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Thread 0: A special thread that is used to manage the iteration process in parallel programs.
      </text>
    </g>
    <g transform="translate(10, 150)">
      <rect x="0" y="0" width="50" height="50" fill="#C7B8EA" rx="10" />
      <rect x="55" y="0" width="50" height="50" fill="#C7B8EA" rx="10" />
      <rect x="110" y="0" width="50" height="50" fill="#C7B8EA" rx="10" />
      <rect x="165" y="0" width="50" height="50" fill="#C7B8EA" rx="10" />
      <rect x="220" y="0" width="50" height="50" fill="#C7B8EA" rx="10" />
      <rect x="275" y="0" width="50" height="50" fill="#C7B8EA" rx="10" />
      <text x="20" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Key Concepts
      </text>
      <text x="90" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Iteration Variables: Variables that are used to keep track of the current iteration, the number of iterations, and the loop variables.
      </text>
      <text x="230" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Thread Synchronization: Techniques used to coordinate the execution of threads to ensure that the iteration process is executed correctly.
      </text>
      <text x="160" y="50" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Communication: Methods used by threads to exchange data and coordinate their execution.
      </text>
      <text x="20" y="70" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Example
      </text>
      <text x="20" y="90" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Suppose we have a parallel program that consists of 4 threads, each executing a loop 10 times. The loop variables are shared among the threads through a global array.
      </text>
    </g>
    <g transform="translate(10, 250)">
      <rect x="0" y="0" width="50" height="50" fill="#ADD8E6" rx="10" />
      <rect x="55" y="0" width="50" height="50" fill="#ADD8E6" rx="10" />
      <rect x="110" y="0" width="50" height="50" fill="#ADD8E6" rx="10" />
      <rect x="165" y="0" width="50" height="50" fill="#ADD8E6" rx="10" />
      <rect x="220" y="0" width="50" height="50" fill="#ADD8E6" rx="10" />
      <rect x="275" y="0" width="50" height="50" fill="#ADD8E6" rx="10" />
      <text x="20" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Conclusion
      </text>
      <text x="200" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        Thread 0 is a special thread that is used to manage the iteration process in parallel programs. It is responsible for keeping track of the current iteration, the number of iterations, and the loop variables.
      </text>
    </g>

    <g transform="translate(330, 10)">
      <text x="0" y="0" text-anchor="start" font-size="24" font-family="Arial, sans-serif" font-weight="bold" fill="#2F4F7F">
        <animate xlink:href="#title" begin="0s" dur="0.5s" />
      </text>
      <text x="0" y="60" text-anchor="start" font-size="18" font-family="Arial, sans-serif" font-weight="normal" fill="#2F4F7F">
        <animate xlink:href="#footer" begin="0s" dur="0.5s" />
      </text>
    </g>
  </svg>