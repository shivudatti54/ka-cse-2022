<svg width="420" height="400" data-topic-id="respectively-omp-schedule-static" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 20)">
    <text x="10" y="10" font-size="24" fill="#2F4F7F">Respectively OMP Schedule Static</text>
    <rect x="0" y="50" width="100%" height="200" fill="#F7F7F7"/>
    <section data-narration="Introduction">
      <rect x="0" y="0" width="100%" height="50" fill="#F7F7F7"/>
      <text x="10" y="10" font-size="18" fill="#2F4F7F">Introduction</text>
      <animate transform="rotate(0deg)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Definition and Explanation">
      <rect x="0" y="50" width="20%" height="50" fill="#2F4F7F"/>
      <rect x="20%" y="0" width="30%" height="50" fill="#2F4F7F"/>
      <rect x="50%" y="0" width="20%" height="50" fill="#2F4F7F"/>
      <rect x="80%" y="0" width="30%" height="50" fill="#2F4F7F"/>
      <text x="10" y="10" font-size="18" fill="#F7F7F7">Definition</text>
      <text x="40" y="10" font-size="18" fill="#F7F7F7">Explanation</text>
      <animate transform="rotate(360deg)" begin="2s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="OMP SCHEDULE=static">
      <rect x="0" y="50" width="20%" height="50" fill="#2F4F7F"/>
      <rect x="20%" y="0" width="30%" height="50" fill="#2F4F7F"/>
      <rect x="50%" y="0" width="20%" height="50" fill="#2F4F7F"/>
      <rect x="80%" y="0" width="30%" height="50" fill="#2F4F7F"/>
      <text x="10" y="10" font-size="18" fill="#F7F7F7">Advantages</text>
      <text x="40" y="10" font-size="18" fill="#F7F7F7">Disadvantages</text>
      <text x="90" y="10" font-size="18" fill="#F7F7F7">Example</text>
      <animate transform="rotate(720deg)" begin="4s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Example Code">
      <rect x="0" y="50" width="20%" height="50" fill="#2F4F7F"/>
      <rect x="20%" y="0" width="30%" height="50" fill="#2F4F7F"/>
      <rect x="50%" y="0" width="20%" height="50" fill="#2F4F7F"/>
      <rect x="80%" y="0" width="30%" height="50" fill="#2F4F7F"/>
      <text x="10" y="10" font-size="18" fill="#F7F7F7">Code</text>
      <text x="40" y="10" font-size="18" fill="#F7F7F7">Output</text>
      <animate transform="rotate(1080deg)" begin="6s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Key Concepts">
      <rect x="0" y="50" width="20%" height="50" fill="#2F4F7F"/>
      <rect x="20%" y="0" width="30%" height="50" fill="#2F4F7F"/>
      <rect x="50%" y="0" width="20%" height="50" fill="#2F4F7F"/>
      <rect x="80%" y="0" width="30%" height="50" fill="#2F4F7F"/>
      <text x="10" y="10" font-size="18" fill="#F7F7F7">Key Concepts</text>
      <text x="40" y="10" font-size="18" fill="#F7F7F7">Explanation</text>
      <animate transform="rotate(1512deg)" begin="8s" dur="2s" repeatCount="indefinite"/>
    </section>
    <g transform="translate(10, 300)">
      <text x="10" y="10" font-size="24" fill="#2F4F7F">Footer</text>
      <rect x="0" y="0" width="100%" height="50" fill="#F7F7F7"/>
    </g>
