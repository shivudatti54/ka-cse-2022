<svg width="420" height="400" data-topic-id="classifications-of-parallel-computers-simd-systems-mimd-systems-interconnection-networks-cache-coherence-shared-memory-vs">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A4FF0"/>
      <stop offset="50%" stop-color="#FFB6C1"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <rect x="10" y="10" width="400" height="50" fill="url(#pastel-gradient)" rx="10"/>
  <text x="20" y="30" font-size="24" font-weight="bold" fill="#4B0082">Classifications of Parallel Computers</text>

  <!-- Section 1: SIMD Systems -->
  <section id="simd-systems" data-narration="SIMD Systems are used for data-intensive applications, providing high instruction-level parallelism.">
    <rect x="10" y="80" width="400" height="50" fill="url(#pastel-gradient)" rx="10"/>
    <text x="20" y="100" font-size="18" fill="#2E4053">SIMD Systems</text>
    <rect x="10" y="120" width="400" height="20" fill="#FFC107" rx="10"/>
    <animate transform="rotate(90 20 120)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="140" font-size="16" fill="#FFC107">Graphics Processing Units (GPUs) and Central Processing Units (CPUs)</text>
  </section>

  <!-- Section 2: MIMD Systems -->
  <section id="mimd-systems" data-narration="MIMD Systems are used for general-purpose computing, providing high control over data processing.">
    <rect x="10" y="180" width="400" height="50" fill="url(#pastel-gradient)" rx="10"/>
    <text x="20" y="200" font-size="18" fill="#2E4053">MIMD Systems</text>
    <rect x="10" y="220" width="400" height="20" fill="#FF69B4" rx="10"/>
    <animate transform="rotate(90 20 220)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="240" font-size="16" fill="#FF69B4">Multi-core processors and distributed memory parallel computers</text>
  </section>

  <!-- Section 3: Distributed Memory Parallel Computers -->
  <section id="distributed-memory" data-narration="Distributed Memory Parallel Computers are used for general-purpose computing, providing high control over data processing.">
    <rect x="10" y="300" width="400" height="50" fill="url(#pastel-gradient)" rx="10"/>
    <text x="20" y="320" font-size="18" fill="#2E4053">Distributed Memory Parallel Computers</text>
    <rect x="10" y="350" width="400" height="20" fill="#8BC34A" rx="10"/>
    <animate transform="rotate(90 20 350)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="370" font-size="16" fill="#8BC34A">General-purpose computing</text>
  </section>

  <!-- Section 4: Cache Coherence -->
  <section id="cache-coherence" data-narration="Cache coherence is used to ensure that data remains consistent across multiple processors.">
    <rect x="10" y="420" width="400" height="50" fill="url(#pastel-gradient)" rx="10"/>
    <text x="20" y="440" font-size="18" fill="#2E4053">Cache Coherence</text>
    <rect x="10" y="470" width="400" height="20" fill="#4CAF50" rx="10"/>
    <animate transform="rotate(90 20 470)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="490" font-size="16" fill="#4CAF50">Ensure data consistency</text>
  </section>

  <!-- Section 5: Shared-Memory vs Non-Shared-Memory -->
  <section id="shared-memory-vs-non-shared-memory" data-narration="Shared-memory architectures provide a single memory space, while non-shared-memory architectures provide multiple memory spaces.">
    <rect x="10" y="540" width="400" height="50" fill="url(#pastel-gradient)" rx="10"/>
    <text x="20" y="560" font-size="18" fill="#2E4053">Shared-Memory vs Non-Shared-Memory</text>
    <rect x="10" y="600" width="400" height="20" fill="#FF9800" rx="10"/>
    <animate transform="rotate(90 20 600)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="620" font-size="16" fill="#FF9800">Single memory space</text>
  </section>

  <!-- Footer -->
  <rect x="10" y="700" width="400" height="50" fill="#4B0082" rx="10"/>
  <text x="20" y="720" font-size="18" fill="#FFFFFF">Classifications of Parallel Computers</text>
</svg>