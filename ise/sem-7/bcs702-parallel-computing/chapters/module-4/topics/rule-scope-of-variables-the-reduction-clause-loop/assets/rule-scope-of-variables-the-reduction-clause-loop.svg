<svg width="420" height="400" data-topic-id="rule-scope-of-variables-the-reduction-clause-loop" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-colors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A7D9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
    <style>
      .annotated-text {
        font-size: 12px;
        font-weight: bold;
        color: #337ab7;
      }
      .arrow {
        fill: #337ab7;
        stroke: #337ab7;
        stroke-width: 2px;
      }
    </style>
  </defs>
  <rect fill="url(#pastel-colors)" width="100%" height="100%"/>
  <g transform="translate(20, 50)">
    <rect x="50" y="50" width="200" height="50" rx="10" fill="#fff"/>
    <text x="75" y="70" font-size="18" font-weight="bold" fill="#337ab7">Rule, Scope of Variables, Reduction Clause</text>
  </g>
  <g transform="translate(20, 120)">
    <rect x="50" y="50" width="200" height="50" rx="10" fill="#fff"/>
    <text x="75" y="70" font-size="18" font-weight="bold" fill="#337ab7">Rules</text>
    <rect x="50" y="110" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="130" font-size="12" font-weight="normal" data-narration="Rules are constraints and guidelines that govern the execution of parallel loops." fill="#337ab7" class="annotated-text"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" dur="4000" begin="0s" repeatCount="indefinite"/>
    <animate x="100" y="50" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="170" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="190" font-size="12" font-weight="normal" data-narration="Data races occur when multiple threads access and modify the same shared variable simultaneously." fill="#337ab7" class="annotated-text"/>
    <animate x="150" y="100" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="230" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="250" font-size="12" font-weight="normal" data-narration="Order of operations within a parallel loop is determined by the order in which threads execute." fill="#337ab7" class="annotated-text"/>
    <animate x="250" y="100" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="280" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="300" font-size="12" font-weight="normal" data-narration="Threads must synchronize their access to shared resources to avoid data races." fill="#337ab7" class="annotated-text"/>
  </g>
  <g transform="translate(20, 370)">
    <rect x="50" y="50" width="200" height="50" rx="10" fill="#fff"/>
    <text x="75" y="70" font-size="18" font-weight="bold" fill="#337ab7">Scope of Variables</text>
    <rect x="50" y="110" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="130" font-size="12" font-weight="normal" data-narration="Variables have different scopes, including global, local, and thread-specific scopes." fill="#337ab7" class="annotated-text"/>
    <animate x="100" y="50" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="170" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="190" font-size="12" font-weight="normal" data-narration="Global scope variables are accessible throughout the program, while local scope variables are only accessible within their block." fill="#337ab7" class="annotated-text"/>
    <animate x="150" y="100" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="230" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="250" font-size="12" font-weight="normal" data-narration="Thread-specific scope variables are private to each thread and can only be accessed by that thread." fill="#337ab7" class="annotated-text"/>
    <animate x="250" y="100" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="280" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="300" font-size="12" font-weight="normal" data-narration="The reduction clause is a feature in OpenMP that allows threads to reduce data across parallel loops." fill="#337ab7" class="annotated-text"/>
  </g>
  <g transform="translate(20, 520)">
    <rect x="50" y="50" width="200" height="50" rx="10" fill="#fff"/>
    <text x="75" y="70" font-size="18" font-weight="bold" fill="#337ab7">The Reduction Clause</text>
    <rect x="50" y="110" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="130" font-size="12" font-weight="normal" data-narration="The reduction clause allows threads to accumulate data across parallel loops." fill="#337ab7" class="annotated-text"/>
    <animate x="100" y="50" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="170" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="190" font-size="12" font-weight="normal" data-narration="It is a binary operation that takes two operands and produces a single result." fill="#337ab7" class="annotated-text"/>
    <animate x="150" y="100" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="230" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="250" font-size="12" font-weight="normal" data-narration="The reduction clause is used in the example code to sum the elements in the array." fill="#337ab7" class="annotated-text"/>
    <animate x="250" y="100" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="280" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="300" font-size="12" font-weight="normal" data-narration="This is an example of how the reduction clause can be used in practice." fill="#337ab7" class="annotated-text"/>
  </g>
  <g transform="translate(20, 620)">
    <rect x="50" y="50" width="200" height="50" rx="10" fill="#fff"/>
    <text x="75" y="70" font-size="18" font-weight="bold" fill="#337ab7">Loop Carried Dependency</text>
    <rect x="50" y="110" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="130" font-size="12" font-weight="normal" data-narration="Loop carried dependency refers to the phenomenon where the execution of one thread depends on the execution of other threads." fill="#337ab7" class="annotated-text"/>
    <animate x="100" y="50" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="170" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="190" font-size="12" font-weight="normal" data-narration="This can cause unpredictable behavior if not handled properly." fill="#337ab7" class="annotated-text"/>
    <animate x="150" y="100" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="230" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="250" font-size="12" font-weight="normal" data-narration="To handle loop carried dependency, threads must synchronize their access to shared resources." fill="#337ab7" class="annotated-text"/>
    <animate x="250" y="100" fill="freeze" begin="0s" dur="4000" repeatCount="indefinite"/>
    <rect x="50" y="280" width="150" height="20" rx="10" fill="#fff"/>
    <text x="75" y="300" font-size="12" font-weight="normal" data-narration="In the provided example code, the reduction clause is used to illustrate the concept of loop carried dependency." fill="#337ab7" class="annotated-text"/>
  </g>
  <rect x="0" y="0" width="420" height="40" fill="#337ab7" transform="rotate(90 210 0)" class="footer"/>
  <text x="210" y="10" font-size="18" font-weight="bold" fill="#fff">Educational Diagram</text>
</svg>