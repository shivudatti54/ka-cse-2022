      <stop offset="100%" stop-color="#C5E1F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <title>Speedup and Efficiency in MIMD Systems - Amdahl's Law</title>
  <g transform="translate(15, 20)">
    <rect x="0" y="0" width="100" height="30" fill="#2F4F7F"/>
    <text x="5" y="5" font-size="16" font-family="Arial" fill="#FFFFFF">Definition and Overview</text>
    <rect x="120" y="0" width="200" height="30" fill="#2F4F7F"/>
    <text x="125" y="5" font-size="16" font-family="Arial" fill="#FFFFFF">Speedup and Efficiency</text>
    <rect x="330" y="0" width="100" height="30" fill="#2F4F7F"/>
    <text x="335" y="5" font-size="16" font-family="Arial" fill="#FFFFFF">Amdahl's Law</text>
    <rect x="10" y="50" width="400" height="100" fill="#FFFFFF"/>
    <rect x="10" y="160" width="400" height="100" fill="#FFFFFF"/>
    <rect x="10" y="270" width="400" height="100" fill="#FFFFFF"/>
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="100" height="30" fill="#2F4F7F"/>
      <text x="5" y="5" font-size="14" font-family="Arial" fill="#666666" data-narration="The ratio of the time taken by a sequential program to the time taken by the parallel program."/>
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" begin="0s"/>
    </g>
    <g transform="translate(10, 160)">
