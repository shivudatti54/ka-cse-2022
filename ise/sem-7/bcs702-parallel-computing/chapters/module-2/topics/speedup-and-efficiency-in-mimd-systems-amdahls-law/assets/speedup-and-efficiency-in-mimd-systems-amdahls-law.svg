      <text x="5" y="5" font-size="14" font-family="Arial" fill="#666666" data-narration="The ratio of the speedup to the number of processors."/>
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" begin="5s"/>
    </g>
    <g transform="translate(10, 270)">
      <rect x="0" y="0" width="100" height="30" fill="#2F4F7F"/>
      <text x="5" y="5" font-size="14" font-family="Arial" fill="#666666" data-narration="The maximum theoretical speedup of a parallel program is limited by the fraction of the program that cannot be parallelized."/>
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" begin="10s"/>
    </g>
    <rect x="10" y="370" width="400" height="30" fill="#2F4F7F"/>
    <text x="15" y="375" font-size="16" font-family="Arial" fill="#FFFFFF">Scalability in MIMD Systems</text>
    <rect x="10" y="400" width="400" height="30" fill="#2F4F7F"/>
    <text x="15" y="405" font-size="16" font-family="Arial" fill="#FFFFFF">GPU Performance</text>
    <rect x="15" y="410" width="100" height="30" fill="#2F4F7F"/>
    <text x="20" y="415" font-size="14" font-family="Arial" fill="#666666" data-narration="The ability of a MIMD system to utilize more processors while maintaining the same level of speedup."/>
    <rect x="20" y="420" width="100" height="30" fill="#2F4F7F"/>
    <text x="25" y="425" font-size="14" font-family="Arial" fill="#666666" data-narration="The time taken by the parallel program to complete execution."/>
    <rect x="20" y="430" width="100" height="30" fill="#2F4F7F"/>
    <text x="25" y="435" font-size="14" font-family="Arial" fill="#666666" data-narration="The time taken by the program to complete execution on a single processor."/>
    <rect x="20" y="440" width="100" height="30" fill="#2F4F7F"/>
    <text x="25" y="445" font-size="14" font-family="Arial" fill="#666666" data-narration="The time taken by the program to complete execution."/>
