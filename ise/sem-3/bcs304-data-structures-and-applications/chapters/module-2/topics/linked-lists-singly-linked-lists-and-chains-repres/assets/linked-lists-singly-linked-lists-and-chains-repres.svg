<svg
  width="420"
  height="400"
  data-topic-id="linked-lists-singly-linked-lists-and-chains-representation"
  xmlns="http://www.w3.org/2000/svg"
  xml:lang="en"
  viewBox="0 0 420 400"
  style="background: linear-gradient(to bottom, #7B68FE, #6495ED)"
>

  <!-- Header Section -->
  <defs>
    <linearGradient id="header-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="30" fill="url(#header-gradient)" rx="5" />
  <text x="20" y="40" font-size="18" font-family="Arial" text-anchor="middle" fill="#fff">Linked Lists</text>

  <!-- Definition Section -->
  <rect x="10" y="60" width="400" height="80" fill="#6495ED" rx="5" />
  <text x="20" y="80" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">
    <data-narration>Definition of Linked Lists</data-narration>
    A linked list is a linear collection of data elements, where each element is a separate object, called a "node".
    Each node contains two items:
    - Data: The actual data stored in the node.
    - Link: A reference (i.e., a "link") to the next node in the sequence.
  </text>

  <!-- Types of Linked Lists Section -->
  <rect x="10" y="150" width="400" height="80" fill="#6495ED" rx="5" />
  <text x="20" y="170" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">
    <data-narration>Types of Linked Lists</data-narration>
    There are three main types of linked lists:
    - Singly Linked List: Each node points to the next node in the sequence.
    - Doubly Linked List: Each node points to both the previous and next nodes in the sequence.
    - Circularly Linked List: The last node points back to the first node, forming a circle.
  </text>

  <!-- Singly Linked List Section -->
  <rect x="10" y="240" width="400" height="80" fill="#6495ED" rx="5" />
  <text x="20" y="260" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">
    <data-narration>Singly Linked List</data-narration>
    A singly linked list is the most common type of linked list.
    Each node contains a data field and a link to the next node.
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze">
      <rect x="10" y="250" width="400" height="60" fill="#6495ED" rx="5" />
    </animate>
  </text>

  <!-- Operations on Singly Linked Lists Section -->
  <rect x="10" y="340" width="400" height="80" fill="#6495ED" rx="5" />
  <text x="20" y="360" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">
    <data-narration>Operations on Singly Linked Lists</data-narration>
    - Insertion: Adding a new node to the list.
    - Deletion: Removing a node from the list.
    - Traversal: Visiting each node in the list.
  </text>

  <!-- Footer Section -->
  <rect x="10" y="440" width="400" height="30" fill="#6495ED" rx="5" />
  <text x="20" y="460" font-size="14" font-family="Arial" text-anchor="middle" fill="#fff">Representation</text>

</svg>