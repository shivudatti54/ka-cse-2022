<svg width="420" height="400" data-topic-id="Queues-Circular-Queues-Using-Dynamic-Arrays"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2A9FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" />
  
  <!-- Title at top -->
  <text x="10" y="10" font-size="24" font-family="Arial" font-weight="bold" fill="#2E4053">
    Queues, Circular Queues, Using Dynamic Arrays
  </text>
  
  <!-- Section 1: Definition of a Queue -->
  <g transform="translate(70, 50)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
      Definition
    </text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">
      A queue is a linear data structure that follows the FIFO (First-In-First-Out) principle.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="2s" begin="0s" />
  </g>
  
  <!-- Section 2: Characteristics of a Queue -->
  <g transform="translate(70, 200)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
      Characteristics
    </text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">
      Elements are added to the end of the queue and removed from the front of the queue.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 300" dur="2s" begin="2s" />
  </g>
  
  <!-- Section 3: Example of a Queue -->
  <g transform="translate(70, 350)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
      Example
    </text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">
      A line of people waiting for a concert. The person who arrives first will be the first one to enter the concert hall.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 450" dur="2s" begin="4s" />
  </g>
  
  <!-- Section 4: Operations of a Queue -->
  <g transform="translate(70, 200)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
    Operations
    </text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">
      - Enqueue: Add an element to the end of the queue
      - Dequeue: Remove an element from the front of the queue
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 300" dur="2s" begin="6s" />
  </g>
  
  <!-- Section 5: Code Example (Python) -->
  <g transform="translate(70, 350)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
    Code Example (Python)
    </text>
    <pre>
      class Queue:
        def __init__(self):
          self.queue = []

        def enqueue(self, item):
          self.queue.append(item)

        def dequeue(self):
          if len(self.queue) < 1:
            return None
          return self.queue.pop(0)
    </pre>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 450" dur="2s" begin="8s" />
  </g>
  
  <!-- Section 6: Circular Queue -->
  <g transform="translate(70, 50)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
      Circular Queue
    </text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">
      A circular queue is a type of queue where the last element is connected to the first element, forming a circle.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="2s" begin="10s" />
  </g>
  
  <!-- Section 7: Characteristics of a Circular Queue -->
  <g transform="translate(70, 200)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
    Characteristics
    </text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">
      Elements are added to the end of the queue and removed from the front of the queue.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 300" dur="2s" begin="12s" />
  </g>
  
  <!-- Section 8: Example of a Circular Queue -->
  <g transform="translate(70, 350)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
    Example
    </text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">
      A conveyor belt that wraps around a circle. The element that is added to the end of the belt will be the first one to be removed.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 450" dur="2s" begin="14s" />
  </g>
  
  <!-- Section 9: Operations of a Circular Queue -->
  <g transform="translate(70, 200)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
    Operations
    </text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">
      - Enqueue: Add an element to the end of the queue
      - Dequeue: Remove an element from the front of the queue
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 300" dur="2s" begin="16s" />
  </g>
  
  <!-- Section 10: Code Example (Python) -->
  <g transform="translate(70, 350)">
    <rect x="0" y="0" width="200" height="100" fill="#E0E0E0" rx="10" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
    Code Example (Python)
    </text>
    <pre>
      class CircularQueue:
        def __init__(self, size):
          self.queue = [None] * size
          self.head = 0
          self.tail = 0
          self.size = size

        def enqueue(self, item):
          if self.tail == self.size:
            self.tail = 0
          self.queue[self.tail] = item
          self.tail += 1

        def dequeue(self):
          if self.head == self.tail:
            return None
          item = self.queue[self.head]
          self.queue[self.head] = None
          self.head += 1
          return item
    </pre>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 450" dur="2s" begin="18s" />
  
  <!-- Footer at bottom -->
  <text x="10" y="380" font-size="16" font-family="Arial" font-weight="bold" fill="#2E4053">
    Queues, Circular Queues, Using Dynamic Arrays
  </text>
</svg>