<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="chapter-4-45" viewBox="0 0 420 400" style="background-color: #C7D9F5;">

  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="40" fill="#4B5154" rx="10"/>
  <text x="15" y="25" font-size="24" font-family="Arial" fill="#66CCCC">Text Book Chapter 4 45</text>
  <rect x="10" y="50" width="400" height="20" fill="#66CCCC" rx="10"/>
  <text x="15" y="65" font-size="18" font-family="Arial" fill="#4B5154">Hash Tables</text>

  <!-- Section 1: Definition -->
  <section data-narration="Definition" style="margin-top: 20px;">
    <rect x="10" y="20" width="400" height="100" fill="#F2E4DF" rx="10"/>
    <text x="15" y="35" font-size="16" font-family="Arial" fill="#4B5154">A hash table is a data structure that stores key-value pairs in an array using a hash function to map keys to indices of the array.</text>
    <animate attributeName="fill" from="#F2E4DF" to="#C7D9F5" begin="0s" dur="2s"/>
  </section>

  <!-- Section 2: Components of a Hash Table -->
  <section data-narration="Components of a Hash Table" style="margin-top: 20px;">
    <rect x="10" y="20" width="400" height="100" fill="#F2E4DF" rx="10"/>
    <text x="15" y="35" font-size="16" font-family="Arial" fill="#4B5154">Key: The unique identifier for each element in the hash table.</text>
    <text x="15" y="55" font-size="16" font-family="Arial" fill="#4B5154">Value: The data associated with each key.</text>
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#4B5154">Hash Table: The array that stores the key-value pairs.</text>
    <text x="15" y="95" font-size="16" font-family="Arial" fill="#4B5154">Hash Function: The function that maps keys to indices of the array.</text>
    <animate attributeName="fill" from="#F2E4DF" to="#C7D9F5" begin="0s" dur="2s"/>
  </section>

  <!-- Section 3: Operations on Hash Tables -->
  <section data-narration="Operations on Hash Tables" style="margin-top: 20px;">
    <rect x="10" y="20" width="400" height="100" fill="#F2E4DF" rx="10"/>
    <text x="15" y="35" font-size="16" font-family="Arial" fill="#4B5154">Insert: Adds a new key-value pair to the hash table.</text>
    <text x="15" y="55" font-size="16" font-family="Arial" fill="#4B5154">Search: Retrieves the value associated with a given key.</text>
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#4B5154">Delete: Removes a key-value pair from the hash table.</text>
    <animate attributeName="fill" from="#F2E4DF" to="#C7D9F5" begin="0s" dur="2s"/>
  </section>

  <!-- Section 4: Advantages of Hash Tables -->
  <section data-narration="Advantages of Hash Tables" style="margin-top: 20px;">
    <rect x="10" y="20" width="400" height="100" fill="#F2E4DF" rx="10"/>
    <text x="15" y="35" font-size="16" font-family="Arial" fill="#66CCCC">Efficient Search: Hash tables allow for fast search operations with an average time complexity of O(1).</text>
    <text x="15" y="55" font-size="16" font-family="Arial" fill="#66CCCC">Efficient Insertion and Deletion: Hash tables can insert and delete elements efficiently with an average time complexity of O(1).</text>
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#66CCCC">Good Cache Performance: Hash tables exhibit good cache performance, leading to faster access times.</text>
    <animate attributeName="fill" from="#F2E4DF" to="#C7D9F5" begin="0s" dur="2s"/>
  </section>

  <!-- Section 5: Disadvantages of Hash Tables -->
  <section data-narration="Disadvantages of Hash Tables" style="margin-top: 20px;">
    <rect x="10" y="20" width="400" height="100" fill="#F2E4DF" rx="10"/>
    <text x="15" y="35" font-size="16" font-family="Arial" fill="#4B5154">Collision Resolution: Hash tables can suffer from collisions, where two keys hash to the same index.</text>
    <text x="15" y="55" font-size="16" font-family="Arial" fill="#4B5154">Space Complexity: Hash tables require additional space to store the hash function and collision resolution data structures.</text>
    <animate attributeName="fill" from="#F2E4DF" to="#C7D9F5" begin="0s" dur="2s"/>
  </section>

  <!-- Section 6: Types of Hash Functions -->
  <section data-narration="Types of Hash Functions" style="margin-top: 20px;">
    <rect x="10" y="20" width="400" height="100" fill="#F2E4DF" rx="10"/>
    <text x="15" y="35" font-size="16" font-family="Arial" fill="#4B5154">Separate Chaining: A combination of open addressing and chaining to resolve collisions.</text>
    <text x="15" y="55" font-size="16" font-family="Arial" fill="#4B5154">Open Addressing: A technique that uses multiple probes to find an empty slot in the hash table.</text>
    <animate attributeName="fill" from="#F2E4DF" to="#C7D9F5" begin="0s" dur="2s"/>
  </section>

  <!-- Footer Section -->
  <rect x="10" y="320" width="400" height="40" fill="#4B5154" rx="10"/>
  <text x="15" y="335" font-size="18" font-family="Arial" fill="#66CCCC">Copyright 2023</text>
</svg>