<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="linked-lists-additional-list-operations">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Linked List Additional Operations. Let us explore key operations: reversal, concatenation, sorted insertion, and deletion.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#3949AB">Linked List Operations</text>
    <line x1="110" y1="34" x2="310" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="140" y1="38" x2="280" y2="38" stroke="#3949AB" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Group 2: Reverse a Linked List -->
  <g opacity="0" data-narration="Reverse or invert a linked list. The original list A points to B points to C points to D points to NULL. After reversal, D points to C points to B points to A points to NULL. Each pointer is reversed one by one in O of n time.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="12" y="58" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">1. Reverse / Invert</text>
    <!-- Before label -->
    <text x="12" y="74" font-family="Arial" font-size="9" fill="#444">Before:</text>
    <!-- Before: A -> B -> C -> D -> NULL -->
    <rect x="48" y="64" width="32" height="18" rx="3" fill="#3949AB" opacity="0.9"/>
    <text x="64" y="77" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">A</text>
    <line x1="80" y1="73" x2="98" y2="73" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <rect x="100" y="64" width="32" height="18" rx="3" fill="#3949AB" opacity="0.9"/>
    <text x="116" y="77" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">B</text>
    <line x1="132" y1="73" x2="150" y2="73" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <rect x="152" y="64" width="32" height="18" rx="3" fill="#3949AB" opacity="0.9"/>
    <text x="168" y="77" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">C</text>
    <line x1="184" y1="73" x2="202" y2="73" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <rect x="204" y="64" width="32" height="18" rx="3" fill="#3949AB" opacity="0.9"/>
    <text x="220" y="77" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">D</text>
    <line x1="236" y1="73" x2="260" y2="73" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <text x="264" y="77" font-family="monospace" font-size="9" fill="#666">NULL</text>

    <!-- Curved arrows showing reversal -->
    <path d="M116,64 C116,52 64,52 64,64" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowOrange)"/>
    <path d="M168,64 C168,50 116,50 116,64" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowOrange)"/>
    <path d="M220,64 C220,48 168,48 168,64" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowOrange)"/>

    <!-- After label -->
    <text x="12" y="100" font-family="Arial" font-size="9" fill="#444">After:</text>
    <!-- After: D -> C -> B -> A -> NULL -->
    <rect x="48" y="90" width="32" height="18" rx="3" fill="#00695C" opacity="0.9"/>
    <text x="64" y="103" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">D</text>
    <line x1="80" y1="99" x2="98" y2="99" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <rect x="100" y="90" width="32" height="18" rx="3" fill="#00695C" opacity="0.9"/>
    <text x="116" y="103" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">C</text>
    <line x1="132" y1="99" x2="150" y2="99" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <rect x="152" y="90" width="32" height="18" rx="3" fill="#00695C" opacity="0.9"/>
    <text x="168" y="103" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">B</text>
    <line x1="184" y1="99" x2="202" y2="99" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <rect x="204" y="90" width="32" height="18" rx="3" fill="#00695C" opacity="0.9"/>
    <text x="220" y="103" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">A</text>
    <line x1="236" y1="99" x2="260" y2="99" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="264" y="103" font-family="monospace" font-size="9" fill="#666">NULL</text>

    <text x="310" y="80" font-family="monospace" font-size="8" fill="#E65100">O(n)</text>
  </g>

  <!-- Group 3: Concatenation -->
  <g opacity="0" data-narration="Concatenation joins two linked lists. List 1 has nodes 1, 2, 3 and List 2 has nodes 4, 5. After concatenation, the last node of list 1 points to the first node of list 2, forming 1, 2, 3, 4, 5.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="12" y="130" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">2. Concatenation</text>
    <!-- List1: [1] -> [2] -> [3] -->
    <text x="12" y="146" font-family="Arial" font-size="9" fill="#444">List1:</text>
    <rect x="48" y="136" width="30" height="18" rx="3" fill="#3949AB"/>
    <text x="63" y="149" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">1</text>
    <line x1="78" y1="145" x2="93" y2="145" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <rect x="95" y="136" width="30" height="18" rx="3" fill="#3949AB"/>
    <text x="110" y="149" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">2</text>
    <line x1="125" y1="145" x2="140" y2="145" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <rect x="142" y="136" width="30" height="18" rx="3" fill="#3949AB"/>
    <text x="157" y="149" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">3</text>

    <!-- List2: [4] -> [5] -->
    <text x="200" y="146" font-family="Arial" font-size="9" fill="#444">List2:</text>
    <rect x="234" y="136" width="30" height="18" rx="3" fill="#00695C"/>
    <text x="249" y="149" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">4</text>
    <line x1="264" y1="145" x2="279" y2="145" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <rect x="281" y="136" width="30" height="18" rx="3" fill="#00695C"/>
    <text x="296" y="149" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">5</text>

    <!-- Result -->
    <text x="12" y="172" font-family="Arial" font-size="9" fill="#444">Result:</text>
    <rect x="48" y="162" width="28" height="16" rx="3" fill="#3949AB"/>
    <text x="62" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">1</text>
    <line x1="76" y1="170" x2="88" y2="170" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <rect x="90" y="162" width="28" height="16" rx="3" fill="#3949AB"/>
    <text x="104" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">2</text>
    <line x1="118" y1="170" x2="130" y2="170" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <rect x="132" y="162" width="28" height="16" rx="3" fill="#3949AB"/>
    <text x="146" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">3</text>
    <line x1="160" y1="170" x2="172" y2="170" stroke="#E65100" stroke-width="1.8" marker-end="url(#arrowOrange)"/>
    <rect x="174" y="162" width="28" height="16" rx="3" fill="#00695C"/>
    <text x="188" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">4</text>
    <line x1="202" y1="170" x2="214" y2="170" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrowTeal)"/>
    <rect x="216" y="162" width="28" height="16" rx="3" fill="#00695C"/>
    <text x="230" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">5</text>

    <!-- Highlight the join -->
    <rect x="156" y="160" width="22" height="20" rx="2" fill="none" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="270" y="174" font-family="monospace" font-size="8" fill="#E65100">link last-&gt;first</text>
  </g>

  <!-- Group 4: Insert in Sorted Position -->
  <g opacity="0" data-narration="Insert in sorted position. To insert 25 into the sorted list 10, 20, 30, 40, traverse until the correct position is found. Node 25 is inserted between 20 and 30 by adjusting pointers.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="12" y="200" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">3. Insert in Sorted Position</text>
    <!-- Original: [10] -> [20] -> [30] -> [40] -->
    <text x="12" y="216" font-family="Arial" font-size="9" fill="#444">List:</text>
    <rect x="40" y="206" width="32" height="18" rx="3" fill="#3949AB"/>
    <text x="56" y="219" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">10</text>
    <line x1="72" y1="215" x2="87" y2="215" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <rect x="89" y="206" width="32" height="18" rx="3" fill="#3949AB"/>
    <text x="105" y="219" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">20</text>
    <line x1="121" y1="215" x2="136" y2="215" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <rect x="138" y="206" width="32" height="18" rx="3" fill="#3949AB"/>
    <text x="154" y="219" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">30</text>
    <line x1="170" y1="215" x2="185" y2="215" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <rect x="187" y="206" width="32" height="18" rx="3" fill="#3949AB"/>
    <text x="203" y="219" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">40</text>

    <!-- New node 25 dropping in -->
    <rect x="240" y="204" width="34" height="20" rx="4" fill="#E65100" stroke="#E65100" stroke-width="1"/>
    <text x="257" y="218" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">25</text>
    <text x="280" y="214" font-family="Arial" font-size="8" fill="#E65100">insert</text>

    <!-- Result after insertion -->
    <text x="12" y="242" font-family="Arial" font-size="9" fill="#444">Result:</text>
    <rect x="40" y="232" width="28" height="16" rx="3" fill="#3949AB"/>
    <text x="54" y="244" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">10</text>
    <line x1="68" y1="240" x2="78" y2="240" stroke="#3949AB" stroke-width="1" marker-end="url(#arrowIndigo)"/>
    <rect x="80" y="232" width="28" height="16" rx="3" fill="#3949AB"/>
    <text x="94" y="244" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">20</text>
    <line x1="108" y1="240" x2="118" y2="240" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <rect x="120" y="232" width="28" height="16" rx="3" fill="#E65100"/>
    <text x="134" y="244" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#fff">25</text>
    <line x1="148" y1="240" x2="158" y2="240" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <rect x="160" y="232" width="28" height="16" rx="3" fill="#3949AB"/>
    <text x="174" y="244" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">30</text>
    <line x1="188" y1="240" x2="198" y2="240" stroke="#3949AB" stroke-width="1" marker-end="url(#arrowIndigo)"/>
    <rect x="200" y="232" width="28" height="16" rx="3" fill="#3949AB"/>
    <text x="214" y="244" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">40</text>

    <!-- Arrow highlighting the insertion spot -->
    <path d="M134,230 L134,225 L134,225" fill="none" stroke="#E65100" stroke-width="1.2"/>
    <text x="250" y="244" font-family="monospace" font-size="8" fill="#E65100">O(n) traverse</text>
  </g>

  <!-- Group 5: Delete by Value -->
  <g opacity="0" data-narration="Delete by value. To remove node 30 from the list 10, 20, 30, 40, find the node, then update the previous node 20 to point directly to 40, bypassing the deleted node.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="12" y="270" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">4. Delete by Value</text>
    <!-- Original: [10] -> [20] -> [30] -> [40] -->
    <text x="12" y="286" font-family="Arial" font-size="9" fill="#444">List:</text>
    <rect x="40" y="276" width="32" height="18" rx="3" fill="#3949AB"/>
    <text x="56" y="289" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">10</text>
    <line x1="72" y1="285" x2="87" y2="285" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <rect x="89" y="276" width="32" height="18" rx="3" fill="#3949AB"/>
    <text x="105" y="289" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">20</text>
    <line x1="121" y1="285" x2="136" y2="285" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <!-- Node to delete: 30 (marked red) -->
    <rect x="138" y="276" width="32" height="18" rx="3" fill="#C62828" opacity="0.85"/>
    <text x="154" y="289" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">30</text>
    <line x1="170" y1="285" x2="185" y2="285" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <rect x="187" y="276" width="32" height="18" rx="3" fill="#3949AB"/>
    <text x="203" y="289" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">40</text>
    <!-- X mark on deleted node -->
    <line x1="140" y1="278" x2="168" y2="292" stroke="#C62828" stroke-width="2"/>
    <line x1="168" y1="278" x2="140" y2="292" stroke="#C62828" stroke-width="2"/>
    <text x="240" y="286" font-family="Arial" font-size="8" fill="#C62828">delete 30</text>

    <!-- Result after deletion -->
    <text x="12" y="312" font-family="Arial" font-size="9" fill="#444">Result:</text>
    <rect x="40" y="302" width="32" height="16" rx="3" fill="#3949AB"/>
    <text x="56" y="314" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">10</text>
    <line x1="72" y1="310" x2="87" y2="310" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <rect x="89" y="302" width="32" height="16" rx="3" fill="#3949AB"/>
    <text x="105" y="314" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">20</text>
    <!-- Updated pointer: 20 now points directly to 40 -->
    <path d="M121,310 C132,310 140,310 152,310" fill="none" stroke="#C62828" stroke-width="1.8" marker-end="url(#arrowRed)"/>
    <rect x="154" y="302" width="32" height="16" rx="3" fill="#3949AB"/>
    <text x="170" y="314" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">40</text>
    <text x="200" y="314" font-family="monospace" font-size="8" fill="#C62828">prev-&gt;next = curr-&gt;next</text>
  </g>

  <!-- Group 6: Complexity Table -->
  <g opacity="0" data-narration="Time complexity summary. Insert at head is O of 1, insert at position is O of n. Delete at head is O of 1, delete by value is O of n. Search takes O of n. Reverse takes O of n.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="12" y="340" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">5. Complexity Summary</text>
    <!-- Table background -->
    <rect x="20" y="348" width="380" height="46" rx="4" fill="#fff" opacity="0.7" stroke="#3949AB" stroke-width="0.8"/>
    <!-- Header row -->
    <rect x="20" y="348" width="380" height="14" rx="4" fill="#3949AB" opacity="0.15"/>
    <text x="80" y="358" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Operation</text>
    <text x="175" y="358" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Best</text>
    <text x="255" y="358" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Worst</text>
    <text x="345" y="358" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Notes</text>
    <!-- Divider lines -->
    <line x1="130" y1="348" x2="130" y2="394" stroke="#3949AB" stroke-width="0.3" opacity="0.4"/>
    <line x1="215" y1="348" x2="215" y2="394" stroke="#3949AB" stroke-width="0.3" opacity="0.4"/>
    <line x1="295" y1="348" x2="295" y2="394" stroke="#3949AB" stroke-width="0.3" opacity="0.4"/>
    <!-- Row 1: Insert -->
    <text x="80" y="370" text-anchor="middle" font-family="monospace" font-size="8" fill="#444">Insert</text>
    <text x="175" y="370" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(1)</text>
    <text x="255" y="370" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">O(n)</text>
    <text x="345" y="370" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">head vs pos</text>
    <!-- Row 2: Delete -->
    <text x="80" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#444">Delete</text>
    <text x="175" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(1)</text>
    <text x="255" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">O(n)</text>
    <text x="345" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">head vs value</text>
    <!-- Row 3: Search & Reverse -->
    <text x="80" y="390" text-anchor="middle" font-family="monospace" font-size="8" fill="#444">Search/Rev</text>
    <text x="175" y="390" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">O(n)</text>
    <text x="255" y="390" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">O(n)</text>
    <text x="345" y="390" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">linear scan</text>
  </g>
</svg>
