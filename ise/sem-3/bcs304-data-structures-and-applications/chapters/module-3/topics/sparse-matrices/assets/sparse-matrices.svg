<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="sparse-matrices">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Sparse Matrices: a matrix where most elements are zero, enabling efficient storage representations.">
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB">Sparse Matrices</text>
    <line x1="120" y1="34" x2="300" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="150" y1="38" x2="270" y2="38" stroke="#E65100" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 2: 5x5 Sparse Matrix with highlighted non-zero elements -->
  <g opacity="0" data-narration="Here is a five by five matrix. Most elements are zero. The highlighted cells show the only non-zero values: 3, 7, 5, and 9.">
    <text x="28" y="58" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">5x5 Matrix</text>
    <text x="28" y="69" font-family="Arial" font-size="8" fill="#00695C">Most elements are zero</text>
    <!-- Grid background -->
    <rect x="20" y="74" width="175" height="105" fill="white" rx="4" stroke="#3949AB" stroke-width="1" opacity="0.5"/>
    <!-- Row 0 -->
    <text x="32" y="90" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="67" y="90" font-family="monospace" font-size="10" fill="#888">0</text>
    <rect x="90" y="80" width="22" height="14" fill="#E65100" rx="2" opacity="0.2"/>
    <text x="101" y="90" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">3</text>
    <text x="127" y="90" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="162" y="90" font-family="monospace" font-size="10" fill="#888">0</text>
    <!-- Row 1 -->
    <text x="32" y="106" font-family="monospace" font-size="10" fill="#888">0</text>
    <rect x="55" y="96" width="22" height="14" fill="#E65100" rx="2" opacity="0.2"/>
    <text x="66" y="106" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">7</text>
    <text x="101" y="106" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="127" y="106" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="162" y="106" font-family="monospace" font-size="10" fill="#888">0</text>
    <!-- Row 2 -->
    <text x="32" y="122" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="67" y="122" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="101" y="122" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="127" y="122" font-family="monospace" font-size="10" fill="#888">0</text>
    <rect x="150" y="112" width="22" height="14" fill="#E65100" rx="2" opacity="0.2"/>
    <text x="161" y="122" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">5</text>
    <!-- Row 3 -->
    <text x="32" y="138" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="67" y="138" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="101" y="138" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="127" y="138" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="162" y="138" font-family="monospace" font-size="10" fill="#888">0</text>
    <!-- Row 4 -->
    <text x="32" y="154" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="67" y="154" font-family="monospace" font-size="10" fill="#888">0</text>
    <text x="101" y="154" font-family="monospace" font-size="10" fill="#888">0</text>
    <rect x="115" y="144" width="22" height="14" fill="#E65100" rx="2" opacity="0.2"/>
    <text x="126" y="154" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">9</text>
    <text x="162" y="154" font-family="monospace" font-size="10" fill="#888">0</text>
    <!-- Row labels -->
    <text x="10" y="90" font-family="Arial" font-size="7" fill="#3949AB">R0</text>
    <text x="10" y="106" font-family="Arial" font-size="7" fill="#3949AB">R1</text>
    <text x="10" y="122" font-family="Arial" font-size="7" fill="#3949AB">R2</text>
    <text x="10" y="138" font-family="Arial" font-size="7" fill="#3949AB">R3</text>
    <text x="10" y="154" font-family="Arial" font-size="7" fill="#3949AB">R4</text>
    <text x="160" y="170" font-family="Arial" font-size="8" fill="#C62828" font-style="italic">nnz = 4</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 3: Triplet (COO) representation -->
  <g opacity="0" data-narration="The triplet or coordinate representation stores each non-zero element as a row, column, value tuple. Only 4 entries are needed instead of 25.">
    <text x="240" y="58" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Triplet (COO) Format</text>
    <rect x="225" y="64" width="180" height="110" fill="white" rx="4" stroke="#00695C" stroke-width="1" opacity="0.7"/>
    <!-- Header -->
    <text x="260" y="79" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Row</text>
    <text x="315" y="79" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Col</text>
    <text x="370" y="79" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Val</text>
    <line x1="235" y1="82" x2="395" y2="82" stroke="#3949AB" stroke-width="0.5"/>
    <!-- Entry 1 -->
    <text x="260" y="96" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">0</text>
    <text x="315" y="96" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">2</text>
    <text x="370" y="96" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">3</text>
    <!-- Entry 2 -->
    <text x="260" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">1</text>
    <text x="315" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">1</text>
    <text x="370" y="112" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">7</text>
    <!-- Entry 3 -->
    <text x="260" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">2</text>
    <text x="315" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">4</text>
    <text x="370" y="128" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">5</text>
    <!-- Entry 4 -->
    <text x="260" y="144" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">4</text>
    <text x="315" y="144" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">3</text>
    <text x="370" y="144" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">9</text>
    <!-- Note -->
    <text x="315" y="164" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828" font-style="italic">Storage: 3 x nnz = 12 cells</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 4: CSR Format -->
  <g opacity="0" data-narration="Compressed Sparse Row format uses three arrays: values stores non-zero elements, column index stores their column positions, and row pointer marks where each row starts in the values array.">
    <text x="210" y="195" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Compressed Sparse Row (CSR)</text>
    <!-- Values array -->
    <text x="18" y="215" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">values[]</text>
    <rect x="80" y="205" width="35" height="16" fill="#E65100" rx="2" opacity="0.15" stroke="#E65100" stroke-width="0.5"/>
    <text x="97" y="216" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">3</text>
    <rect x="115" y="205" width="35" height="16" fill="#E65100" rx="2" opacity="0.15" stroke="#E65100" stroke-width="0.5"/>
    <text x="132" y="216" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">7</text>
    <rect x="150" y="205" width="35" height="16" fill="#E65100" rx="2" opacity="0.15" stroke="#E65100" stroke-width="0.5"/>
    <text x="167" y="216" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">5</text>
    <rect x="185" y="205" width="35" height="16" fill="#E65100" rx="2" opacity="0.15" stroke="#E65100" stroke-width="0.5"/>
    <text x="202" y="216" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">9</text>
    <!-- Col index array -->
    <text x="18" y="237" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">col_idx[]</text>
    <rect x="80" y="227" width="35" height="16" fill="#00695C" rx="2" opacity="0.15" stroke="#00695C" stroke-width="0.5"/>
    <text x="97" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">2</text>
    <rect x="115" y="227" width="35" height="16" fill="#00695C" rx="2" opacity="0.15" stroke="#00695C" stroke-width="0.5"/>
    <text x="132" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">1</text>
    <rect x="150" y="227" width="35" height="16" fill="#00695C" rx="2" opacity="0.15" stroke="#00695C" stroke-width="0.5"/>
    <text x="167" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">4</text>
    <rect x="185" y="227" width="35" height="16" fill="#00695C" rx="2" opacity="0.15" stroke="#00695C" stroke-width="0.5"/>
    <text x="202" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">3</text>
    <!-- Row pointer array -->
    <text x="18" y="259" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">row_ptr[]</text>
    <rect x="80" y="249" width="28" height="16" fill="#3949AB" rx="2" opacity="0.15" stroke="#3949AB" stroke-width="0.5"/>
    <text x="94" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">0</text>
    <rect x="108" y="249" width="28" height="16" fill="#3949AB" rx="2" opacity="0.15" stroke="#3949AB" stroke-width="0.5"/>
    <text x="122" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">1</text>
    <rect x="136" y="249" width="28" height="16" fill="#3949AB" rx="2" opacity="0.15" stroke="#3949AB" stroke-width="0.5"/>
    <text x="150" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">2</text>
    <rect x="164" y="249" width="28" height="16" fill="#3949AB" rx="2" opacity="0.15" stroke="#3949AB" stroke-width="0.5"/>
    <text x="178" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">3</text>
    <rect x="192" y="249" width="28" height="16" fill="#3949AB" rx="2" opacity="0.15" stroke="#3949AB" stroke-width="0.5"/>
    <text x="206" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">3</text>
    <rect x="220" y="249" width="28" height="16" fill="#3949AB" rx="2" opacity="0.15" stroke="#3949AB" stroke-width="0.5"/>
    <text x="234" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">4</text>
    <!-- Annotation -->
    <text x="270" y="212" font-family="Arial" font-size="8" fill="#888">idx:  0   1   2   3</text>
    <text x="270" y="238" font-family="Arial" font-size="7" fill="#C62828">row_ptr[i] = start index</text>
    <text x="270" y="248" font-family="Arial" font-size="7" fill="#C62828">of row i in values[]</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 5: Memory comparison bar chart -->
  <g opacity="0" data-narration="Memory comparison: a dense five by five matrix needs 25 storage cells. The sparse representation needs only 12 cells for triplet format, saving over 50 percent memory.">
    <text x="105" y="285" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Memory Comparison</text>
    <!-- Dense bar -->
    <text x="18" y="303" font-family="Arial" font-size="8" fill="#C62828">Dense</text>
    <text x="18" y="312" font-family="Arial" font-size="7" fill="#888">n x m = 25</text>
    <rect x="70" y="295" width="150" height="14" fill="#C62828" rx="3" opacity="0.8"/>
    <text x="145" y="305" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">25 cells</text>
    <!-- Sparse bar -->
    <text x="18" y="332" font-family="Arial" font-size="8" fill="#00695C">Sparse</text>
    <text x="18" y="341" font-family="Arial" font-size="7" fill="#888">3 x nnz = 12</text>
    <rect x="70" y="324" width="72" height="14" fill="#00695C" rx="3" opacity="0.8"/>
    <text x="106" y="334" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">12 cells</text>
    <!-- Savings -->
    <text x="160" y="336" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">52% saved!</text>
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="Sparse matrices are widely used in scientific computing, graph adjacency matrices, machine learning algorithms, and image processing pipelines.">
    <text x="340" y="285" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Applications</text>
    <line x1="290" y1="289" x2="390" y2="289" stroke="#3949AB" stroke-width="0.5"/>
    <!-- App 1 -->
    <rect x="260" y="295" width="8" height="8" fill="#E65100" rx="1"/>
    <text x="275" y="303" font-family="Arial" font-size="9" fill="#333">Scientific Computing</text>
    <!-- App 2 -->
    <rect x="260" y="311" width="8" height="8" fill="#00695C" rx="1"/>
    <text x="275" y="319" font-family="Arial" font-size="9" fill="#333">Graph Adjacency</text>
    <!-- App 3 -->
    <rect x="260" y="327" width="8" height="8" fill="#3949AB" rx="1"/>
    <text x="275" y="335" font-family="Arial" font-size="9" fill="#333">Machine Learning</text>
    <!-- App 4 -->
    <rect x="260" y="343" width="8" height="8" fill="#C62828" rx="1"/>
    <text x="275" y="351" font-family="Arial" font-size="9" fill="#333">Image Processing</text>
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
