<svg width="420" height="400" data-topic-id="trees-introduction-binary-trees-binary-tree-traversals">
  <style>
    /* Style for gradient background */
    ._gradient {
      fill: #ADD8E6;
    }

    /* Style for text and labels */
    text {
      font-size: 20px;
      font-family: Arial, sans-serif;
      fill: #4B5154;
      text-anchor: middle;
    }

    /* Style for arrows */
    line {
      stroke: #0097A7;
      stroke-width: 2;
      stroke-dasharray: 5 5;
    }
  </style>

  <defs>
    <linearGradient id=" gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="380" fill="url(# gradient)"/>
  <title>Introduction to Trees</title>

  <section data-narration="Introduction to Trees">
    <rect x="10" y="60" width="380" height="100" fill="#ADD8E6"/>
    <text x="190" y="90">A tree is a non-linear data structure consisting of nodes, where each node has a value and zero or more child nodes.</text>
  </section>

  <section data-narration="Binary Trees">
    <rect x="10" y="170" width="380" height="100" fill="#ADD8E6"/>
    <text x="190" y="200">A binary tree is a special type of tree where each node has at most two child nodes, referred to as the left child and the right child.</text>
  </section>

  <section data-narration="Threaded Binary Trees">
    <rect x="10" y="270" width="380" height="100" fill="#ADD8E6"/>
    <text x="190" y="300">A threaded binary tree is a type of binary tree where each node has a reference to its sibling node, instead of a reference to the parent node.</text>
  </section>

  <section data-narration="Binary Tree Traversals">
    <rect x="10" y="370" width="380" height="100" fill="#ADD8E6"/>
    <text x="190" y="400">Binary tree traversals are methods used to visit each node in a binary tree exactly once. There are three main types of traversals: In-Order, Pre-Order, and Post-Order.</text>
  </section>

  <section data-narration="In-Order Traversal">
    <rect x="10" y="470" width="380" height="100" fill="#ADD8E6"/>
    <text x="190" y="500">In-order traversal visits the left subtree, the current node, and finally the right subtree.</text>
  </section>

  <section data-narration="Pre-Order Traversal">
    <rect x="10" y="570" width="380" height="100" fill="#ADD8E6"/>
    <text x="190" y="600">Pre-order traversal visits the current node, the left subtree, and finally the right subtree.</text>
  </section>

  <section data-narration="Post-Order Traversal">
    <rect x="10" y="670" width="380" height="100" fill="#ADD8E6"/>
    <text x="190" y="700">Post-order traversal visits the left subtree, the right subtree, and finally the current node.</text>
  </section>

  <footer>Created by [Your Name]</footer>

  <animate attributeName="opacity" from="1" to="0.5" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.5" to="1" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="x" from="10" to="120" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="x" from="120" to="10" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="y" from="10" to="30" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="y" from="30" to="10" dur="5s" repeatCount="indefinite"/>
</svg>