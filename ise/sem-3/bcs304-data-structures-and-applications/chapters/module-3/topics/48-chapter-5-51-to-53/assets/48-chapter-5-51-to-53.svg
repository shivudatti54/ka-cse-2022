<svg width="420" height="400" data-topic-id="48-Chapter-5-51-To-53">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E0F0F0" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  
  <title>Understanding Data Structures</title>
  <g transform="translate(20, 20)">
    <section data-narration="Sets Section">
      <rect x="0" y="0" width="100" height="50" fill="#2F4F7F"/>
      <text x="15" y="20" font-size="16" fill="#fff">Sets</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-40" dur="2000" begin="-500"/>
      <text x="15" y="50" font-size="14" fill="#fff">A set is an unordered collection of unique elements</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-600"/>
      <text x="15" y="70" font-size="14" fill="#fff">Key Characteristics:</br> Unordered, Unique, Mutable</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-700"/>
      <line x1="20" y1="10" x2="80" y2="30" stroke="#fff" stroke-width="2"/>
      <line x1="120" y1="30" x2="80" y2="10" stroke="#fff" stroke-width="2"/>
    </section>
    <section data-narration="Maps Section">
      <rect x="150" y="0" width="100" height="50" fill="#2F4F7F"/>
      <text x="165" y="20" font-size="16" fill="#fff">Maps</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-40" dur="2000" begin="-500"/>
      <text x="165" y="50" font-size="14" fill="#fff">A map is an unordered collection of key-value pairs</text>
      <animate textAnchor="middle" attributeName="x" from="165" to="165" dur="2000" begin="-600"/>
      <text x="165" y="70" font-size="14" fill="#fff">Key Characteristics:</br> Unordered, Key-Value Pairs, Mutable</text>
      <animate textAnchor="middle" attributeName="x" from="165" to="165" dur="2000" begin="-700"/>
      <line x1="270" y1="10" x2="330" y2="30" stroke="#fff" stroke-width="2"/>
      <line x1="370" y1="30" x2="330" y2="10" stroke="#fff" stroke-width="2"/>
    </section>
    <section data-narration="Lists Section">
      <rect x="300" y="0" width="100" height="50" fill="#2F4F7F"/>
      <text x="315" y="20" font-size="16" fill="#fff">Lists</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-40" dur="2000" begin="-500"/>
      <text x="315" y="50" font-size="14" fill="#fff">A list is an ordered collection of elements</text>
      <animate textAnchor="middle" attributeName="x" from="315" to="315" dur="2000" begin="-600"/>
      <text x="315" y="70" font-size="14" fill="#fff">Key Characteristics:</br> Ordered, Mutable, Indexed</text>
      <animate textAnchor="middle" attributeName="x" from="315" to="315" dur="2000" begin="-700"/>
      <line x1="410" y1="10" x2="470" y2="30" stroke="#fff" stroke-width="2"/>
      <line x1="510" y1="30" x2="470" y2="10" stroke="#fff" stroke-width="2"/>
    </section>
    <section data-narration="Set Operations Section">
      <rect x="0" y="150" width="400" height="50" fill="#2F4F7F"/>
      <text x="15" y="170" font-size="16" fill="#fff">Set Operations</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-40" dur="2000" begin="-500"/>
      <text x="15" y="190" font-size="14" fill="#fff">Union (A ∪ B): All elements from both sets</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-600"/>
      <text x="15" y="210" font-size="14" fill="#fff">Intersection (A ∩ B): Only common elements</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-700"/>
      <text x="15" y="230" font-size="14" fill="#fff">Difference (A \ B): Elements in A but not in B</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-800"/>
      <line x1="20" y1="200" x2="80" y2="220" stroke="#fff" stroke-width="2"/>
      <line x1="120" y1="220" x2="80" y2="200" stroke="#fff" stroke-width="2"/>
      <line x1="200" y1="220" x2="40" y2="200" stroke="#fff" stroke-width="2"/>
    </section>
    <section data-narration="Map Operations Section">
      <rect x="0" y="300" width="400" height="50" fill="#2F4F7F"/>
      <text x="15" y="320" font-size="16" fill="#fff">Map Operations</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-40" dur="2000" begin="-500"/>
      <text x="15" y="340" font-size="14" fill="#fff">Lookup: Finding a specific value in a map</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-600"/>
      <text x="15" y="360" font-size="14" fill="#fff">Insertion: Adding a new key-value pair to a map</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-700"/>
      <text x="15" y="380" font-size="14" fill="#fff">Deletion: Removing a key-value pair from a map</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-800"/>
      <line x1="20" y1="380" x2="80" y2="400" stroke="#fff" stroke-width="2"/>
      <line x1="120" y1="400" x2="80" y2="380" stroke="#fff" stroke-width="2"/>
      <line x1="200" y1="400" x2="40" y2="380" stroke="#fff" stroke-width="2"/>
    </section>
    <section data-narration="List Methods Section">
      <rect x="0" y="400" width="400" height="50" fill="#2F4F7F"/>
      <text x="15" y="420" font-size="16" fill="#fff">List Methods</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-40" dur="2000" begin="-500"/>
      <text x="15" y="440" font-size="14" fill="#fff">Insertion: Adding a new element to a list</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-600"/>
      <text x="15" y="460" font-size="14" fill="#fff">Deletion: Removing an element from a list</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-700"/>
      <text x="15" y="480" font-size="14" fill="#fff">Indexing: Accessing an element at a specific position</text>
      <animate textAnchor="middle" attributeName="x" from="15" to="15" dur="2000" begin="-800"/>
      <line x1="20" y1="480" x2="80" y2="500" stroke="#fff" stroke-width="2"/>
      <line x1="120" y1="500" x2="80" y2="480" stroke="#fff" stroke-width="2"/>
      <line x1="200" y1="500" x2="40" y2="480" stroke="#fff" stroke-width="2"/>
    </section>
    <footer>
      <text x="15" y="420" font-size="14" fill="#fff">Understanding Data Structures</text>
    </footer>
  </g>
</svg>