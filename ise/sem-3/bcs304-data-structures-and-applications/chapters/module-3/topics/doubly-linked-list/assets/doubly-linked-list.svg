<svg width="420" height="400" data-topic-id="doubly-linked-list" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink" style="background: linear-gradient(to bottom, #C7B8EA, #87CEEB);">
  <title>Doubly Linked List</title>
  <text x="10" y="10" font-size="24" text-anchor="start" fill="#3498db">Doubly Linked List</text>
  <text x="10" y="50" font-size="18" text-anchor="start" fill="#8e44ad">Overview</text>
  <section data-narration="Introduction">
    <rect x="10" y="80" width="400" height="20" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="120" width="400" height="20" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="160" width="400" height="20" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="200" width="400" height="20" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="240" width="400" height="20" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="280" width="400" height="20" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 80" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="Node Structure">
    <rect x="10" y="60" width="400" height="80" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="150" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="180" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 200" begin="2s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="Advantages">
    <rect x="10" y="60" width="400" height="80" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="150" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="180" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="210" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <animateTransform attributeName="transform" type="translate" from="0 280" to="0 300" begin="4s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="Operations">
    <rect x="10" y="60" width="400" height="80" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="150" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="180" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="210" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="240" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 320" begin="6s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="Create Node">
    <rect x="10" y="60" width="400" height="80" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="150" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="180" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="210" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="240" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="270" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 340" begin="8s" dur="2s" repeatCount="indefinite" />
  </section>
  <section data-narration="Insert at Beginning - O(1)">
    <rect x="10" y="60" width="400" height="80" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="150" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="180" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="210" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="240" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <rect x="10" y="270" width="400" height="30" style="fill: #f9f9f9; border: 1px solid #ddd; padding: 5px;"></rect>
    <animateTransform attributeName="transform" type="translate" from="0 340" to="0 360" begin="10s" dur="2s" repeatCount="indefinite" />
  </section>
  <footer>Copyright 2023</footer>
