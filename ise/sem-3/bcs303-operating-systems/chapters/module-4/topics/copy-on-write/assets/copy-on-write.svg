<svg width="420" height="400" data-topic-id="copy-on-write" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #3498db;
      margin-bottom: 20px;
    }

    .footer {
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }

    .section {
      margin-bottom: 20px;
    }

    .animate {
      fill: #2ecc71;
      transition: fill 0.5s ease-in-out;
    }

    .gradient {
      background: #c7e0ff;
      background: linear-gradient(to bottom, #a2c3f3, #2ecc71);
    }

    .pastel {
      background: #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .text {
      font-size: 16px;
      color: #333;
    }
  </style>

  <rect class="gradient pastel" width="100%" height="100%"></rect>

  <g class="title">
    <text x="50%" y="20%" class="text">Copy-on-Write</text>
  </g>

  <g class="footer">
    <text x="50%" y="80%" class="text">Developed by [Your Name]</text>
  </g>

  <g class="section data-narration" data-section-id="initial-creation">
    <rect class="pastel" width="80%" height="60%"></rect>
    <g transform="translate(10%, 10%)">
      <text class="text">Initial Creation</text>
      <rect class="animate" width="100%" height="20%"></rect>
      <animate attributeName="fill" from="#2ecc71" to="#3498db" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
  </g>

  <g class="section data-narration" data-section-id="write-operation">
    <rect class="pastel" width="80%" height="60%"></rect>
    <g transform="translate(10%, 10%)">
      <text class="text">Write Operation</text>
      <rect class="animate" width="100%" height="20%"></rect>
      <animate attributeName="fill" from="#3498db" to="#2ecc71" begin="2s" dur="2s" repeatCount="indefinite" />
    </g>
  </g>

  <g class="section data-narration" data-section-id="copy-on-write">
    <rect class="pastel" width="80%" height="60%"></rect>
    <g transform="translate(10%, 10%)">
      <text class="text">Copy-on-Write</text>
      <rect class="animate" width="100%" height="20%"></rect>
      <animate attributeName="fill" from="#2ecc71" to="#3498db" begin="4s" dur="2s" repeatCount="indefinite" />
    </g>
  </g>

  <g class="section data-narration" data-section-id="benefits">
    <rect class="pastel" width="80%" height="60%"></rect>
    <g transform="translate(10%, 10%)">
      <text class="text">Benefits</text>
      <rect class="animate" width="100%" height="20%"></rect>
      <animate attributeName="fill" from="#3498db" to="#2ecc71" begin="6s" dur="2s" repeatCount="indefinite" />
    </g>
  </g>

  <g class="section data-narration" data-section-id="example-uses">
    <rect class="pastel" width="80%" height="60%"></rect>
    <g transform="translate(10%, 10%)">
      <text class="text">Example Use Cases</text>
      <rect class="animate" width="100%" height="20%"></rect>
      <animate attributeName="fill" from="#3498db" to="#2ecc71" begin="8s" dur="2s" repeatCount="indefinite" />
    </g>
  </g>

  <g class="section data-narration" data-section-id="conclusion">
    <rect class="pastel" width="80%" height="60%"></rect>
    <g transform="translate(10%, 10%)">
      <text class="text">Conclusion</text>
      <rect class="animate" width="100%" height="20%"></rect>
      <animate attributeName="fill" from="#3498db" to="#2ecc71" begin="10s" dur="2s" repeatCount="indefinite" />
    </g>
  </g>

  <line x1="50%" y1="20%" x2="50%" y2="80%" stroke="#333" stroke-width="2" />
  <line x1="50%" y1="80%" x2="50%" y2="20%" stroke="#333" stroke-width="2" />
  <line x1="20%" y1="50%" x2="80%" y2="50%" stroke="#2ecc71" stroke-width="2" />
  <line x1="20%" y1="50%" x2="50%" y2="80%" stroke="#2ecc71" stroke-width="2" />
</svg>