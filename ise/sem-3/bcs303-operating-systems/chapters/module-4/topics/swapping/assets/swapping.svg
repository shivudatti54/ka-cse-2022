<svg width="420" height="400" data-topic-id="swapping-in-operating-systems"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background-image: linear-gradient(to bottom, #6c5ce7, #4db0e8);">
  <title>Swapping in Operating Systems</title>
  <desc>Animated Educational Diagram</desc>

  <!-- Header Section -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0E0E0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="350" fill="url(#pastel-gradient)"/>
  <rect x="10" y="10" width="400" height="5" fill="#E0E0E0"/>
  <text x="15" y="30" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">
    Swapping in Operating Systems
  </text>

  <!-- Section 1: Introduction -->
  <rect x="10" y="50" width="350" height="50" fill="#F5F5F5"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 60" dur="1000" begin="-2000"/>
  <g opacity="1" animation="swap-in">
    <text x="20" y="70" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Swapping is a process in operating systems that involves swapping out one program or data block for another in main memory. It is a simple and efficient technique to manage memory, but it can have significant performance implications.">
      What is Swapping?
    </text>
  </g>
  <g opacity="0" animation="swap-out">
    <text x="20" y="70" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Swapping is a process where the operating system swaps out a program or data block from main memory to the hard disk or disk swap space. This process is also known as &quot;page-out&quot; or &quot;page-swapping&quot;. The swapped out program or data block is replaced by a new program or data block from the hard disk or disk swap space.">
      What is Swapping?
    </text>
  </g>

  <!-- Section 2: Page Fault -->
  <rect x="10" y="120" width="350" height="50" fill="#F5F5F5"/>
  <animateTransform attributeName="transform" type="translate" from="0 120" to="0 130" dur="1000" begin="-1500"/>
  <g opacity="1" animation="swap-in">
    <text x="20" y="140" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="When a program attempts to access a page that is not in main memory, a page fault occurs.">
      Page Fault
    </text>
  </g>
  <g opacity="0" animation="swap-out">
    <text x="20" y="140" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="When a program attempts to access a page that is not in main memory, a page fault occurs.">
      Page Fault
    </text>
  </g>

  <!-- Section 3: Page Replacement -->
  <rect x="10" y="170" width="350" height="50" fill="#F5F5F5"/>
  <animateTransform attributeName="transform" type="translate" from="0 170" to="0 180" dur="1000" begin="-1000"/>
  <g opacity="1" animation="swap-in">
    <text x="20" y="190" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The operating system selects a page to replace the page that is not in main memory. This page is selected based on a replacement policy such as First-In-First-Out (FIFO), Least Recently Used (LRU), or Random Replacement.">
      Page Replacement
    </text>
  </g>
  <g opacity="0" animation="swap-out">
    <text x="20" y="190" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The operating system selects a page to replace the page that is not in main memory. This page is selected based on a replacement policy such as First-In-First-Out (FIFO), Least Recently Used (LRU), or Random Replacement.">
      Page Replacement
    </text>
  </g>

  <!-- Section 4: Swap Out -->
  <rect x="10" y="210" width="350" height="50" fill="#F5F5F5"/>
  <animateTransform attributeName="transform" type="translate" from="0 210" to="0 220" dur="1000" begin="-500"/>
  <g opacity="1" animation="swap-in">
    <text x="20" y="230" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The selected page is swapped out of main memory to the hard disk or disk swap space.">
      Swap Out
    </text>
  </g>
  <g opacity="0" animation="swap-out">
    <text x="20" y="230" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The selected page is swapped out of main memory to the hard disk or disk swap space.">
      Swap Out
    </text>
  </g>

  <!-- Section 5: Page In -->
  <rect x="10" y="250" width="350" height="50" fill="#F5F5F5"/>
  <animateTransform attributeName="transform" type="translate" from="0 250" to="0 260" dur="1000" begin="-0"/>
  <g opacity="1" animation="swap-in">
    <text x="20" y="270" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The page that was previously swapped out is swapped back into main memory.">
      Page In
    </text>
  </g>
  <g opacity="0" animation="swap-out">
    <text x="20" y="270" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="The page that was previously swapped out is swapped back into main memory.">
      Page In
    </text>
  </g>

  <!-- Section 6: Advantages of Swapping -->
  <rect x="10" y="290" width="350" height="50" fill="#F5F5F5"/>
  <animateTransform attributeName="transform" type="translate" from="0 290" to="0 300" dur="1000" begin="-200"/>
  <g opacity="1" animation="swap-in">
    <text x="20" y="310" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Swapping helps to conserve memory by allowing the operating system to use the hard disk or disk swap space for temporary storage.">
      Advantages of Swapping
    </text>
  </g>
  <g opacity="0" animation="swap-out">
    <text x="20" y="310" font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Swapping helps to conserve memory by allowing the operating system to use the hard disk or disk swap space for temporary storage.">
      Advantages of Swapping
    </text>
  </g>

  <!-- Footer Section -->
  <rect x="10" y="330" width="400" height="30" fill="#F5F5F5"/>
  <text x="15" y="350" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">
    Created by [Your Name]
  </text>
</svg>