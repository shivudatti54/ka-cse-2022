<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="structure-of-page-table">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- ========== GROUP 1: Title (0.3s) ========== -->
  <g data-narration="The structure of the page table is critical because a simple flat page table can consume enormous amounts of memory for large address spaces." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Structure of the Page Table</text>
    <line x1="90" y1="28" x2="330" y2="28" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ========== GROUP 2: Problem with Single-Level (1.5s) ========== -->
  <g data-narration="For a 32-bit address space with 4KB pages, the page table needs 2 to the power 20 entries, which is about 1 million entries. At 4 bytes each, that is 4 megabytes per process, far too large to keep contiguously in memory." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="15" y="48" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Problem: Single-Level Page Table</text>

    <!-- Address breakdown box -->
    <rect x="15" y="53" width="390" height="24" fill="white" stroke="#3949AB" stroke-width="1.5" rx="4"/>
    <text x="22" y="69" font-family="monospace" font-size="9" fill="#3949AB">32-bit addr:</text>
    <rect x="110" y="55" width="130" height="20" fill="#E8EAF6" rx="2"/>
    <text x="175" y="69" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#3949AB">20-bit Page # (2^20)</text>
    <rect x="242" y="55" width="80" height="20" fill="#C5CAE9" rx="2"/>
    <text x="282" y="69" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#3949AB">12-bit Offset</text>
    <text x="335" y="69" font-family="monospace" font-size="8" fill="#3949AB">4KB pages</text>

    <!-- Warning callout -->
    <rect x="15" y="80" width="390" height="18" fill="#FFCDD2" stroke="#C62828" stroke-width="1" rx="3"/>
    <text x="210" y="93" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#C62828">2^20 entries x 4 bytes = 4MB page table per process!</text>
  </g>

  <!-- ========== GROUP 3: Two-Level Paging (3.0s) ========== -->
  <g data-narration="Two-level paging splits the page number into two parts: P1 indexes the outer page table to find an inner page table, and P2 indexes the inner page table to find the frame number. This avoids allocating the entire page table contiguously." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="15" y="118" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Two-Level (Hierarchical) Paging</text>

    <!-- Address split -->
    <rect x="15" y="123" width="260" height="20" fill="white" stroke="#00695C" stroke-width="1.2" rx="3"/>
    <rect x="16" y="124" width="75" height="18" fill="#B2DFDB" rx="2"/>
    <text x="53" y="137" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">P1 (10-bit)</text>
    <rect x="93" y="124" width="75" height="18" fill="#80CBC4" rx="2"/>
    <text x="130" y="137" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">P2 (10-bit)</text>
    <rect x="170" y="124" width="103" height="18" fill="#E0F2F1" rx="2"/>
    <text x="221" y="137" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">Offset (12-bit)</text>

    <!-- Outer page table -->
    <line x1="53" y1="143" x2="53" y2="153" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <rect x="20" y="155" width="66" height="40" fill="#00695C" rx="3"/>
    <text x="53" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Outer</text>
    <text x="53" y="181" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Page Table</text>
    <text x="53" y="205" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">1024 entries</text>

    <!-- Arrow outer to inner -->
    <line x1="86" y1="175" x2="108" y2="175" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Inner page table -->
    <line x1="130" y1="143" x2="130" y2="153" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="110" y="155" width="66" height="40" fill="#00897B" rx="3"/>
    <text x="143" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Inner</text>
    <text x="143" y="181" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Page Table</text>
    <text x="143" y="205" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">1024 entries</text>

    <!-- Arrow inner to frame -->
    <line x1="176" y1="175" x2="198" y2="175" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Frame result -->
    <rect x="200" y="162" width="60" height="26" fill="#4DB6AC" rx="4"/>
    <text x="230" y="179" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Frame #</text>

    <!-- Benefit note -->
    <rect x="275" y="123" width="130" height="38" fill="white" stroke="#00695C" stroke-width="1" rx="3" opacity="0.9"/>
    <text x="340" y="137" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C" font-weight="bold">Only allocate inner</text>
    <text x="340" y="147" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C" font-weight="bold">tables as needed.</text>
    <text x="340" y="157" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Saves memory!</text>
  </g>

  <!-- ========== GROUP 4: Hashed Page Table (4.5s) ========== -->
  <g data-narration="A hashed page table uses a hash function on the virtual page number to index into a hash table. Each bucket contains a chain of entries with the virtual page number and corresponding frame number. This is efficient for sparse address spaces." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="15" y="225" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Hashed Page Table</text>

    <!-- Virtual page number input -->
    <rect x="15" y="231" width="60" height="22" fill="#E65100" rx="4"/>
    <text x="45" y="246" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">VPN = 42</text>

    <!-- Arrow to hash function -->
    <line x1="75" y1="242" x2="90" y2="242" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Hash function box -->
    <rect x="92" y="231" width="52" height="22" fill="#FF8F00" rx="4"/>
    <text x="118" y="246" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">h(VPN)</text>

    <!-- Arrow to bucket -->
    <line x1="144" y1="242" x2="162" y2="242" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Hash table buckets -->
    <rect x="164" y="228" width="30" height="12" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="1"/>
    <text x="179" y="238" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">0</text>
    <rect x="164" y="240" width="30" height="12" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" rx="1"/>
    <text x="179" y="250" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100" font-weight="bold">1</text>
    <rect x="164" y="252" width="30" height="12" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="1"/>
    <text x="179" y="262" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">2</text>
    <rect x="164" y="264" width="30" height="12" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="1"/>
    <text x="179" y="274" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">3</text>

    <!-- Chain from bucket 1 -->
    <line x1="194" y1="246" x2="210" y2="246" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

    <!-- Chain entry 1 -->
    <rect x="212" y="235" width="70" height="22" fill="white" stroke="#E65100" stroke-width="1.2" rx="3"/>
    <text x="247" y="245" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">VPN:17 F:9</text>
    <text x="247" y="254" text-anchor="middle" font-family="monospace" font-size="6" fill="#999">next-></text>

    <!-- Arrow to next chain entry -->
    <line x1="282" y1="246" x2="298" y2="246" stroke="#E65100" stroke-width="1" marker-end="url(#arrowOrange)"/>

    <!-- Chain entry 2 (match!) -->
    <rect x="300" y="235" width="70" height="22" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="3"/>
    <text x="335" y="245" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100" font-weight="bold">VPN:42 F:3</text>
    <text x="335" y="254" text-anchor="middle" font-family="monospace" font-size="6" fill="#4CAF50" font-weight="bold">MATCH!</text>

    <!-- Result arrow -->
    <line x1="370" y1="246" x2="385" y2="246" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <rect x="387" y="237" width="28" height="18" fill="#E65100" rx="3"/>
    <text x="401" y="250" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">F:3</text>

    <!-- Note -->
    <text x="15" y="287" font-family="Arial" font-size="7" fill="#E65100">Good for sparse or very large (64-bit) address spaces</text>
  </g>

  <!-- ========== GROUP 5: Inverted Page Table (6.0s) ========== -->
  <g data-narration="An inverted page table has one entry for each physical frame in the system, not one entry per virtual page. Each entry stores the process ID and page number. To translate, the system searches for the matching PID and page number entry. This saves memory but makes lookup slower." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="15" y="303" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Inverted Page Table</text>

    <!-- Search input -->
    <rect x="15" y="308" width="82" height="20" fill="#C62828" rx="4"/>
    <text x="56" y="322" text-anchor="middle" font-family="monospace" font-size="7" fill="white" font-weight="bold">PID:2 Page:5</text>

    <!-- Search arrow -->
    <line x1="97" y1="318" x2="117" y2="318" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <text x="107" y="312" text-anchor="middle" font-family="Arial" font-size="6" fill="#C62828">search</text>

    <!-- Inverted table (one row per frame) -->
    <rect x="120" y="296" width="105" height="14" fill="#C62828" rx="2"/>
    <text x="172" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Frame  PID  Page#</text>

    <rect x="120" y="310" width="105" height="12" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5" rx="1"/>
    <text x="172" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">  0     1     3</text>

    <rect x="120" y="322" width="105" height="12" fill="#FFCDD2" stroke="#C62828" stroke-width="0.5" rx="1"/>
    <text x="172" y="332" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">  1     3     0</text>

    <rect x="120" y="334" width="105" height="12" fill="#EF9A9A" stroke="#C62828" stroke-width="1.5" rx="1"/>
    <text x="172" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828" font-weight="bold">  2     2     5</text>

    <rect x="120" y="346" width="105" height="12" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5" rx="1"/>
    <text x="172" y="356" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">  3     1     7</text>

    <!-- Match indicator -->
    <line x1="225" y1="340" x2="242" y2="340" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <text x="262" y="337" text-anchor="middle" font-family="Arial" font-size="7" fill="#4CAF50" font-weight="bold">Found!</text>
    <text x="262" y="347" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828" font-weight="bold">Frame 2</text>

    <!-- Properties -->
    <rect x="290" y="298" width="120" height="40" fill="white" stroke="#C62828" stroke-width="1" rx="3" opacity="0.9"/>
    <text x="350" y="311" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828" font-weight="bold">ONE table for entire</text>
    <text x="350" y="321" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828" font-weight="bold">system (all processes)</text>
    <text x="350" y="333" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Indexed by frame number</text>
  </g>

  <!-- ========== GROUP 6: Comparison (7.5s) ========== -->
  <g data-narration="Comparing the three structures: Hierarchical paging is the most common approach with multi-step lookup. Hashed page tables work well for sparse address spaces. Inverted page tables save memory since there is only one system-wide table, but searching is slower." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="15" y="375" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Comparison</text>

    <!-- Hierarchical -->
    <circle cx="115" cy="388" r="4" fill="#00695C"/>
    <text x="122" y="391" font-family="Arial" font-size="8" fill="#00695C" font-weight="bold">Hierarchical:</text>
    <text x="185" y="391" font-family="Arial" font-size="7" fill="#555">Common, multi-step</text>

    <!-- Hashed -->
    <circle cx="245" cy="388" r="4" fill="#E65100"/>
    <text x="252" y="391" font-family="Arial" font-size="8" fill="#E65100" font-weight="bold">Hashed:</text>
    <text x="295" y="391" font-family="Arial" font-size="7" fill="#555">Sparse/large addr</text>

    <!-- Inverted -->
    <circle cx="365" cy="388" r="4" fill="#C62828"/>
    <text x="372" y="391" font-family="Arial" font-size="8" fill="#C62828" font-weight="bold">Inv:</text>
    <text x="388" y="391" font-family="Arial" font-size="7" fill="#555">Saves mem</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="396" width="420" height="4" fill="#3949AB" rx="0" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="8.0s" fill="freeze"/>
  </rect>
</svg>