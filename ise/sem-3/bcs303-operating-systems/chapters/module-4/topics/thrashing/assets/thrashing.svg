<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="thrashing">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Thrashing occurs when a process spends more time page faulting than executing useful instructions." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Thrashing in Virtual Memory</text>
    <line x1="80" y1="30" x2="340" y2="30" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Thrashing Graph -->
  <g data-narration="As degree of multiprogramming increases, CPU utilization rises to a peak then drops sharply at the thrashing point because processes constantly page fault." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Axes -->
    <line x1="50" y1="130" x2="50" y2="42" stroke="#3949AB" stroke-width="2"/>
    <line x1="50" y1="130" x2="230" y2="130" stroke="#3949AB" stroke-width="2"/>
    <!-- Y-axis label -->
    <text x="16" y="88" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" transform="rotate(-90,16,88)">CPU Utilization</text>
    <!-- X-axis label -->
    <text x="140" y="145" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Degree of Multiprogramming</text>
    <!-- Curve: rises then drops sharply -->
    <polyline points="50,128 70,115 90,98 110,78 130,60 145,55 155,58 165,70 175,90 185,110 200,125 220,129" fill="none" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Peak marker -->
    <circle cx="145" cy="55" r="3" fill="#C62828"/>
    <text x="145" y="48" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Peak</text>
    <!-- Thrashing point arrow -->
    <line x1="165" y1="45" x2="165" y2="65" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <text x="195" y="44" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Thrashing</text>
    <text x="195" y="52" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Point</text>
    <!-- Arrow marker -->
    <defs>
      <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
      </marker>
    </defs>
    <!-- Shaded drop zone -->
    <rect x="155" y="55" width="70" height="75" fill="#C62828" opacity="0.07" rx="4"/>
    <text x="190" y="105" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828" font-style="italic">Drop zone</text>
  </g>

  <!-- Group 3: Vicious Cycle -->
  <g data-narration="Thrashing is a vicious cycle: too many processes lead to not enough frames, causing constant page faults, CPU sits idle waiting for I/O, so the OS adds more processes making it worse." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Cycle background -->
    <ellipse cx="340" cy="88" rx="72" ry="62" fill="#C62828" opacity="0.08" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="340" y="38" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Vicious Cycle</text>
    <!-- Circular arrows using arcs -->
    <path d="M295,55 A50,45 0 0,1 385,55" fill="none" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <path d="M390,75 A50,45 0 0,1 390,110" fill="none" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <path d="M385,120 A50,45 0 0,1 295,120" fill="none" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <path d="M290,110 A50,45 0 0,1 290,75" fill="none" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <!-- Labels around the cycle -->
    <text x="340" y="52" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Too many</text>
    <text x="340" y="59" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">processes</text>
    <text x="375" y="80" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Not enough</text>
    <text x="375" y="87" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">frames</text>
    <text x="340" y="115" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Constant</text>
    <text x="340" y="122" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">page faults</text>
    <text x="305" y="80" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">CPU idle</text>
    <text x="305" y="87" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">OS adds more</text>
    <text x="340" y="98" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">WORSE!</text>
  </g>

  <!-- Group 4: Working Set Model -->
  <g data-narration="The Working Set Model tracks recently used pages. For page references 2, 3, 5, 2, 3, 1 the working set is the set of unique pages: 1, 2, 3, 5. The working set equals the pages actively used by the process." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="168" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Working Set Model</text>
    <!-- Window bracket -->
    <rect x="62" y="177" width="240" height="30" fill="#00695C" opacity="0.08" rx="4" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="42" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Window:</text>
    <!-- Page reference boxes -->
    <rect x="72" y="180" width="32" height="24" fill="white" stroke="#00695C" stroke-width="1.5" rx="4"/>
    <text x="88" y="196" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">2</text>
    <rect x="110" y="180" width="32" height="24" fill="white" stroke="#00695C" stroke-width="1.5" rx="4"/>
    <text x="126" y="196" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">3</text>
    <rect x="148" y="180" width="32" height="24" fill="white" stroke="#00695C" stroke-width="1.5" rx="4"/>
    <text x="164" y="196" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">5</text>
    <rect x="186" y="180" width="32" height="24" fill="white" stroke="#00695C" stroke-width="1.5" rx="4"/>
    <text x="202" y="196" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">2</text>
    <rect x="224" y="180" width="32" height="24" fill="white" stroke="#00695C" stroke-width="1.5" rx="4"/>
    <text x="240" y="196" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">3</text>
    <rect x="262" y="180" width="32" height="24" fill="white" stroke="#00695C" stroke-width="1.5" rx="4"/>
    <text x="278" y="196" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">1</text>
    <!-- Arrow down -->
    <line x1="182" y1="208" x2="182" y2="220" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="178,220 182,227 186,220" fill="#00695C"/>
    <!-- Working set result -->
    <rect x="100" y="228" width="220" height="24" fill="#00695C" opacity="0.12" rx="6"/>
    <text x="210" y="244" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#00695C">Working Set = {1, 2, 3, 5}</text>
    <text x="210" y="264" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C" font-style="italic">Working set = pages actively used by the process</text>
  </g>

  <!-- Group 5: Prevention Strategies -->
  <g data-narration="Thrashing can be prevented using three strategies: the Working Set Model to allocate enough frames, Page Fault Frequency monitoring to adjust allocations, and limiting the degree of multiprogramming." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="284" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Prevention Strategies</text>
    <!-- Strategy 1 -->
    <rect x="20" y="292" width="18" height="18" fill="#E65100" rx="9"/>
    <text x="29" y="305" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">1</text>
    <text x="44" y="304" font-family="Arial" font-size="8.5" fill="#E65100" font-weight="bold">Working Set Model</text>
    <text x="175" y="304" font-family="Arial" font-size="8" fill="#4E342E">(allocate enough frames)</text>
    <!-- Strategy 2 -->
    <rect x="20" y="314" width="18" height="18" fill="#E65100" rx="9"/>
    <text x="29" y="327" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">2</text>
    <text x="44" y="326" font-family="Arial" font-size="8.5" fill="#E65100" font-weight="bold">Page Fault Frequency</text>
    <text x="182" y="326" font-family="Arial" font-size="8" fill="#4E342E">(monitor and adjust)</text>
    <!-- Strategy 3 -->
    <rect x="20" y="336" width="18" height="18" fill="#E65100" rx="9"/>
    <text x="29" y="349" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">3</text>
    <text x="44" y="348" font-family="Arial" font-size="8.5" fill="#E65100" font-weight="bold">Limit degree of multiprogramming</text>
  </g>

  <!-- Group 6: Key Insight -->
  <g data-narration="The key insight is: if the sum of all working sets exceeds the total number of available frames, thrashing will occur. The solution is to suspend one or more processes to free up frames." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="25" y="362" width="370" height="32" fill="#3949AB" opacity="0.10" rx="6" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="376" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">If SUM(working sets) &gt; total frames</text>
    <text x="210" y="389" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">= THRASHING.  Solution: </text>
    <text x="297" y="389" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Suspend a process</text>
  </g>
</svg>
