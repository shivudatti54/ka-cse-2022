        <animateTransform attributeName="transform" type="rotate" from="0 180 150" to="360 180 150" dur="4s" begin="0s"/>
    </g>
    <g transform="rotate(-45 180 150)">
        <path class="highlight" d="M 190 20 C 190 10 200 0 210 0 C 220 0 230 10 230 20 Z"/>
