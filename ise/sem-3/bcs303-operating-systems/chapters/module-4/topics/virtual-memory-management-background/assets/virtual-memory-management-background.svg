<svg width="420" height="400" data-topic-id="virtual-memory-management-background" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <!-- Title and Footer -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3498db" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="80" fill="url(#gradient)"/>
  <text x="20" y="100" font-size="32" font-family="Arial" text-anchor="middle">Virtual Memory Management Background</text>
  <path d="M 40,150 L 380,150" stroke="#3498db" stroke-width="2" fill="none"/>
  <path d="M 40,220 L 380,220" stroke="#3498db" stroke-width="2" fill="none"/>
  <text x="20" y="200" font-size="24" font-family="Arial" text-anchor="middle">What is Virtual Memory?</text>
  <section data-narration="What is Virtual Memory?">
    <text x="20" y="250" font-size="18" font-family="Arial" text-anchor="start">Virtual memory is a combination of physical RAM and hard disk storage that appears as a single, contiguous memory space to the operating system.</text>
    <path d="M 60,280 L 60,300" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 80,280 L 80,300" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="280" font-size="18" font-family="Arial" text-anchor="start">The operating system allocates pages of memory to the CPU as needed, and when the physical RAM is full, it uses the hard disk to store pages that are not currently in use.</text>
  </section>
  <path d="M 80,320 L 380,320" stroke="#3498db" stroke-width="2" fill="none"/>
  <text x="20" y="350" font-size="24" font-family="Arial" text-anchor="middle">Hardware Components</text>
  <section data-narration="Hardware Components">
    <text x="20" y="380" font-size="18" font-family="Arial" text-anchor="start">RAM (Random Access Memory) is the physical memory where data is stored temporarily while the CPU processes it.</text>
    <path d="M 100,410 L 100,430" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 120,410 L 120,430" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="410" font-size="18" font-family="Arial" text-anchor="start">Hard Disk Drive (HDD) is a non-volatile storage device that stores data long-term.</text>
    <path d="M 140,430 L 140,450" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 160,430 L 160,450" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="420" font-size="18" font-family="Arial" text-anchor="start">Swap Space is a reserved area on the hard disk where pages are written when physical RAM is full.</text>
  </section>
  <path d="M 160,460 L 380,460" stroke="#3498db" stroke-width="2" fill="none"/>
  <text x="20" y="490" font-size="24" font-family="Arial" text-anchor="middle">Memory Hierarchy</text>
  <section data-narration="Memory Hierarchy">
    <text x="20" y="520" font-size="18" font-family="Arial" text-anchor="start">The memory hierarchy is a hierarchical organization of memory levels, from fastest to slowest.</text>
    <path d="M 100,550 L 100,570" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 120,550 L 120,570" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="520" font-size="18" font-family="Arial" text-anchor="start">L1 Cache is a small, fast cache memory built into the CPU.</text>
    <path d="M 140,550 L 140,570" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 160,550 L 160,570" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="520" font-size="18" font-family="Arial" text-anchor="start">L2 Cache is a larger, slower cache memory built into the CPU.</text>
    <path d="M 180,550 L 180,570" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 200,550 L 200,570" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="520" font-size="18" font-family="Arial" text-anchor="start">RAM (Main Memory) is the physical memory where data is stored.</text>
  </section>
  <path d="M 200,600 L 380,600" stroke="#3498db" stroke-width="2" fill="none"/>
  <text x="20" y="630" font-size="24" font-family="Arial" text-anchor="middle">Demand Paging</text>
  <section data-narration="Demand Paging">
    <text x="20" y="660" font-size="18" font-family="Arial" text-anchor="start">Demand paging is a technique used by operating systems to allocate pages of memory to the CPU as needed.</text>
    <path d="M 100,700 L 100,720" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 120,700 L 120,720" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="720" font-size="18" font-family="Arial" text-anchor="start">When the physical RAM is full, the hard disk is used to store pages that are not currently in use.</text>
  </section>
  <path d="M 220,760 L 380,760" stroke="#3498db" stroke-width="2" fill="none"/>
  <text x="20" y="790" font-size="24" font-family="Arial" text-anchor="middle">Page Replacement Algorithms</text>
  <section data-narration="Page Replacement Algorithms">
    <text x="20" y="820" font-size="18" font-family="Arial" text-anchor="start">Page replacement algorithms are used by operating systems to decide which pages to replace when the physical RAM is full.</text>
    <path d="M 100,860 L 100,880" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 120,860 L 120,880" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="880" font-size="18" font-family="Arial" text-anchor="start">The most common page replacement algorithms are First-In-First-Out (FIFO), Optimal, and Least Recently Used (LRU).</text>
  </section>
  <path d="M 320,920 L 380,920" stroke="#3498db" stroke-width="2" fill="none"/>
  <text x="20" y="950" font-size="24" font-family="Arial" text-anchor="middle">Virtual Memory Management</text>
  <section data-narration="Virtual Memory Management">
    <text x="20" y="980" font-size="18" font-family="Arial" text-anchor="start">Virtual memory management is a crucial aspect of operating system design that enables computers to use more memory than is physically available.</text>
    <path d="M 100,1020 L 100,1040" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 120,1020 L 120,1040" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="20" y="1040" font-size="18" font-family="Arial" text-anchor="start">The operating system allocates pages of memory to the CPU as needed, and when the physical RAM is full, it uses the hard disk to store pages that are not currently in use.</text>
  </section>
  <path d="M 340,1070 L 380,1070" stroke="#3498db" stroke-width="2" fill="none"/>
  <text x="20" y="1100" font-size="24" font-family="Arial" text-anchor="middle">Conclusion</text>
  <footer>
    <text x="20" y="1130" font-size="18" font-family="Arial" text-anchor="start">This diagram illustrates the background of virtual memory management, including its definition, hardware components, memory hierarchy, demand paging, page replacement algorithms, and virtual memory management.</text>
  </footer>
</svg>