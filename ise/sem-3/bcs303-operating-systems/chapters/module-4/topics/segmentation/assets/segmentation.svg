<svg width="420" height="400" data-topic-id="segmentation">
  <!-- Title and Footer -->
  <rect x="10" y="10" width="400" height="20" fill="#3498db" rx="5"/>
  <text x="15" y="15" font-size="16" font-family="Arial" fill="#ffffff">Segmentation</text>
  <rect x="10" y="40" width="400" height="20" fill="#2ecc71" rx="5"/>
  <text x="15" y="45" font-size="12" font-family="Arial" fill="#ffffff">Example</text>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca"/>
      <stop offset="100%" stop-color="#6495ed"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Segment Table -->
  <rect x="10" y="50" width="370" height="150" fill="#f1c40f" rx="5"/>
  <rect x="10" y="50" width="300" height="50" fill="#2ecc71" rx="5"/>
  <text x="15" y="65" font-size="14" font-family="Arial" fill="#ffffff">Segment Table</text>
  <rect x="10" y="50" width="300" height="50" fill="#e74c3c" rx="5"/>
  <text x="15" y="65" font-size="12" font-family="Arial" fill="#ffffff">Base, Limit</text>

  <!-- Segment Table entries -->
  <rect x="15" y="80" width="250" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="85" font-size="12" font-family="Arial" fill="#ffffff">Segment | Base | Limit</text>
  <rect x="15" y="80" width="50" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="85" font-size="12" font-family="Arial" fill="#ffffff">0       | 1400 | 1000</text>
  <rect x="15" y="80" width="50" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="85" font-size="12" font-family="Arial" fill="#ffffff">1       | 6300 | 400</text>
  <rect x="15" y="80" width="50" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="85" font-size="12" font-family="Arial" fill="#ffffff">2       | 4300 | 400</text>
  <rect x="15" y="80" width="50" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="85" font-size="12" font-family="Arial" fill="#ffffff">3       | 3200 | 1100</text>

  <!-- Address Translation -->
  <rect x="10" y="200" width="370" height="150" fill="#f1c40f" rx="5"/>
  <rect x="10" y="200" width="300" height="50" fill="#2ecc71" rx="5"/>
  <text x="15" y="215" font-size="14" font-family="Arial" fill="#ffffff">Address Translation</text>
  <rect x="10" y="200" width="300" height="50" fill="#e74c3c" rx="5"/>
  <text x="15" y="215" font-size="12" font-family="Arial" fill="#ffffff">Logical: (segment, offset)</text>

  <!-- Address Translation example -->
  <rect x="15" y="240" width="200" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="245" font-size="12" font-family="Arial" fill="#ffffff">(2, 53)</text>
  <rect x="15" y="240" width="50" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="245" font-size="12" font-family="Arial" fill="#ffffff">Logical: (2, 53)</text>
  <rect x="15" y="240" width="50" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="245" font-size="12" font-family="Arial" fill="#ffffff">Base: 4300</text>
  <rect x="15" y="240" width="50" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="245" font-size="12" font-family="Arial" fill="#ffffff">Offset: 53</text>
  <rect x="15" y="240" width="50" height="30" fill="#2ecc71" rx="5"/>
  <text x="20" y="245" font-size="12" font-family="Arial" fill="#ffffff">Physical: 4353</text>

  <!-- Address Translation steps -->
  <rect x="10" y="280" width="370" height="30" fill="#2ecc71" rx="5"/>
  <text x="15" y="285" font-size="12" font-family="Arial" fill="#ffffff">Check: offset < limit[segment]?</text>
  <rect x="10" y="280" width="370" height="30" fill="#f1c40f" rx="5"/>
  <text x="15" y="285" font-size="12" font-family="Arial" fill="#ffffff">NO → Trap (segmentation fault)</text>
  <rect x="10" y="280" width="370" height="30" fill="#e74c3c" rx="5"/>
  <text x="15" y="285" font-size="12" font-family="Arial" fill="#ffffff">YES → Continue</text>

  <!-- Trap (Segmentation Fault) -->
  <rect x="10" y="320" width="370" height="70" fill="#f1c40f" rx="5"/>
  <text x="15" y="325" font-size="14" font-family="Arial" fill="#ffffff">Trap (Segmentation Fault)</text>
  <rect x="10" y="320" width="370" height="70" fill="#6495ed" rx="5"/>
  <text x="15" y="325" font-size="12" font-family="Arial" fill="#ffffff">Segmentation Fault</text>

  <!-- Arrow markers -->
  <line x1="10" y1="50" x2="10" y2="80" stroke="#2ecc71" stroke-width="2"/>
  <line x1="10" y1="80" x2="10" y2="240" stroke="#2ecc71" stroke-width="2"/>
  <line x1="10" y1="240" x2="10" y2="320" stroke="#2ecc71" stroke-width="2"/>
</svg>