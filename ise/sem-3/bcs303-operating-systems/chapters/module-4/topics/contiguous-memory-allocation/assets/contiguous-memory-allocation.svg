<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="contiguous-memory-allocation">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Contiguous Memory Allocation assigns each process a single continuous block of memory." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#283593">Contiguous Memory Allocation</text>
    <line x1="60" y1="30" x2="360" y2="30" stroke="#7986CB" stroke-width="1"/>
  </g>

  <!-- Group 2: Memory Layout -->
  <g data-narration="Memory is divided into contiguous partitions. The OS sits at the top, followed by processes and free holes scattered throughout." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="55" y="52" font-family="Arial" font-size="11" font-weight="bold" fill="#283593">Memory Layout</text>
    <!-- Memory bar outline -->
    <rect x="20" y="58" width="80" height="180" fill="none" stroke="#3949AB" stroke-width="1.5" rx="3"/>
    <!-- OS partition -->
    <rect x="20" y="58" width="80" height="28" fill="#3949AB" rx="3"/>
    <text x="60" y="76" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">OS</text>
    <!-- Process A -->
    <rect x="20" y="86" width="80" height="32" fill="#5C6BC0" rx="0"/>
    <text x="60" y="106" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Process A</text>
    <!-- Free Hole 1 -->
    <rect x="20" y="118" width="80" height="24" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1" rx="0"/>
    <text x="60" y="134" text-anchor="middle" font-family="Arial" font-size="8" fill="#2E7D32">Free (30K)</text>
    <!-- Process B -->
    <rect x="20" y="142" width="80" height="30" fill="#5C6BC0" rx="0"/>
    <text x="60" y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Process B</text>
    <!-- Free Hole 2 -->
    <rect x="20" y="172" width="80" height="36" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1" rx="0"/>
    <text x="60" y="194" text-anchor="middle" font-family="Arial" font-size="8" fill="#2E7D32">Free (50K)</text>
    <!-- Process C -->
    <rect x="20" y="208" width="80" height="30" fill="#5C6BC0" rx="0"/>
    <text x="60" y="227" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Process C</text>
  </g>

  <!-- Group 3: First Fit -->
  <g data-narration="First Fit allocates the first hole that is large enough. It is fast because it stops searching as soon as a fit is found, but may waste space at the beginning of memory." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="52" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">First Fit</text>
    <text x="210" y="64" font-family="Arial" font-size="8" fill="#00695C">"Allocate first hole big enough"</text>
    <!-- Memory bar -->
    <rect x="140" y="72" width="70" height="165" fill="none" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <!-- OS -->
    <rect x="140" y="72" width="70" height="22" fill="#3949AB" rx="3"/>
    <text x="175" y="87" text-anchor="middle" font-family="Arial" font-size="8" fill="white">OS</text>
    <!-- Hole 1 — 30K — new process goes HERE -->
    <rect x="140" y="94" width="70" height="24" fill="#A5D6A7" stroke="#00695C" stroke-width="1.5" rx="0"/>
    <text x="175" y="108" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">New P (20K)</text>
    <!-- Arrow pointing to first hole -->
    <line x1="128" y1="106" x2="138" y2="106" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="138,103 138,109 143,106" fill="#00695C"/>
    <text x="126" y="108" text-anchor="end" font-family="Arial" font-size="7" fill="#00695C">1st</text>
    <!-- Remaining of Hole 1 -->
    <rect x="140" y="118" width="70" height="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.5" rx="0"/>
    <text x="175" y="125" text-anchor="middle" font-family="Arial" font-size="6" fill="#2E7D32">10K left</text>
    <!-- Process existing -->
    <rect x="140" y="126" width="70" height="28" fill="#5C6BC0" rx="0"/>
    <text x="175" y="144" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Used</text>
    <!-- Hole 2 — 50K (skipped) -->
    <rect x="140" y="154" width="70" height="36" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1" rx="0"/>
    <text x="175" y="176" text-anchor="middle" font-family="Arial" font-size="8" fill="#2E7D32">Free 50K</text>
    <!-- Process -->
    <rect x="140" y="190" width="70" height="25" fill="#5C6BC0" rx="0"/>
    <text x="175" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Used</text>
    <!-- Hole 3 -->
    <rect x="140" y="215" width="70" height="22" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1" rx="0"/>
    <text x="175" y="229" text-anchor="middle" font-family="Arial" font-size="8" fill="#2E7D32">Free 15K</text>
    <!-- Label -->
    <text x="175" y="248" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Fast search</text>
  </g>

  <!-- Group 4: Best Fit -->
  <g data-narration="Best Fit allocates the smallest hole that is big enough. It leaves the least leftover space but requires searching the entire list, making it slower." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="365" y="52" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Best Fit</text>
    <text x="365" y="64" font-family="Arial" font-size="8" fill="#E65100">"Smallest hole that fits"</text>
    <!-- Memory bar -->
    <rect x="295" y="72" width="70" height="165" fill="none" stroke="#E65100" stroke-width="1.5" rx="3"/>
    <!-- OS -->
    <rect x="295" y="72" width="70" height="22" fill="#3949AB" rx="3"/>
    <text x="330" y="87" text-anchor="middle" font-family="Arial" font-size="8" fill="white">OS</text>
    <!-- Hole 1 — 30K — skipped, not smallest fit -->
    <rect x="295" y="94" width="70" height="24" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1" rx="0"/>
    <text x="330" y="109" text-anchor="middle" font-family="Arial" font-size="8" fill="#2E7D32">Free 30K</text>
    <!-- Process existing -->
    <rect x="295" y="118" width="70" height="28" fill="#5C6BC0" rx="0"/>
    <text x="330" y="136" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Used</text>
    <!-- Hole 2 — 50K — skipped -->
    <rect x="295" y="146" width="70" height="36" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1" rx="0"/>
    <text x="330" y="168" text-anchor="middle" font-family="Arial" font-size="8" fill="#2E7D32">Free 50K</text>
    <!-- Process -->
    <rect x="295" y="182" width="70" height="25" fill="#5C6BC0" rx="0"/>
    <text x="330" y="198" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Used</text>
    <!-- Hole 3 — 22K — best fit for 20K! -->
    <rect x="295" y="207" width="70" height="18" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" rx="0"/>
    <text x="330" y="219" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">New P (20K)</text>
    <!-- Arrow pointing to best hole -->
    <line x1="283" y1="216" x2="293" y2="216" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="293,213 293,219 298,216" fill="#E65100"/>
    <text x="281" y="218" text-anchor="end" font-family="Arial" font-size="7" fill="#E65100">Best</text>
    <!-- Remaining -->
    <rect x="295" y="225" width="70" height="12" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.5" rx="0"/>
    <text x="330" y="234" text-anchor="middle" font-family="Arial" font-size="6" fill="#2E7D32">2K left</text>
    <!-- Label -->
    <text x="330" y="248" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Least waste, slow</text>
  </g>

  <!-- Group 5: Worst Fit -->
  <g data-narration="Worst Fit allocates the largest available hole. This leaves the largest remaining hole, hoping it can still be useful, but leads to the most overall waste." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="105" y="262" font-family="Arial" font-size="11" font-weight="bold" fill="#6A1B9A">Worst Fit</text>
    <text x="105" y="273" font-family="Arial" font-size="8" fill="#6A1B9A">"Allocate largest hole"</text>
    <!-- Memory bar -->
    <rect x="20" y="278" width="170" height="50" fill="none" stroke="#6A1B9A" stroke-width="1.5" rx="3"/>
    <!-- Holes layout horizontal -->
    <rect x="22" y="280" width="30" height="46" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1" rx="0"/>
    <text x="37" y="307" text-anchor="middle" font-family="Arial" font-size="7" fill="#2E7D32">30K</text>
    <rect x="52" y="280" width="28" height="46" fill="#5C6BC0" rx="0"/>
    <text x="66" y="307" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Used</text>
    <!-- Largest hole — worst fit goes here -->
    <rect x="80" y="280" width="55" height="46" fill="#CE93D8" stroke="#6A1B9A" stroke-width="1.5" rx="0"/>
    <text x="107" y="300" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#6A1B9A">New P (20K)</text>
    <text x="107" y="312" text-anchor="middle" font-family="Arial" font-size="6" fill="#6A1B9A">in 50K hole</text>
    <!-- Arrow -->
    <line x1="107" y1="275" x2="107" y2="279" stroke="#6A1B9A" stroke-width="1.5"/>
    <polygon points="104,275 110,275 107,270" fill="#6A1B9A"/>
    <text x="107" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="#6A1B9A">Largest</text>
    <!-- Remaining after -->
    <rect x="135" y="280" width="22" height="46" fill="#5C6BC0" rx="0"/>
    <text x="146" y="307" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Used</text>
    <rect x="157" y="280" width="31" height="46" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1" rx="0"/>
    <text x="172" y="307" text-anchor="middle" font-family="Arial" font-size="7" fill="#2E7D32">15K</text>
    <!-- Label -->
    <text x="105" y="340" text-anchor="middle" font-family="Arial" font-size="7" fill="#6A1B9A">Largest leftover, most waste</text>
  </g>

  <!-- Group 6: External Fragmentation and Compaction -->
  <g data-narration="External fragmentation occurs when total free memory is sufficient but not contiguous. Compaction solves this by moving processes together to create one large free block." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="320" y="262" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">External Fragmentation</text>
    <text x="320" y="274" font-family="Arial" font-size="8" fill="#C62828">"Total free = enough, but NOT contiguous!"</text>
    <!-- Fragmented memory -->
    <rect x="230" y="280" width="180" height="28" fill="none" stroke="#C62828" stroke-width="1.5" rx="3"/>
    <rect x="232" y="282" width="22" height="24" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.5" rx="0"/>
    <text x="243" y="297" text-anchor="middle" font-family="Arial" font-size="6" fill="#C62828">8K</text>
    <rect x="254" y="282" width="30" height="24" fill="#5C6BC0" rx="0"/>
    <text x="269" y="297" text-anchor="middle" font-family="Arial" font-size="6" fill="white">P1</text>
    <rect x="284" y="282" width="18" height="24" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.5" rx="0"/>
    <text x="293" y="297" text-anchor="middle" font-family="Arial" font-size="6" fill="#C62828">6K</text>
    <rect x="302" y="282" width="35" height="24" fill="#5C6BC0" rx="0"/>
    <text x="319" y="297" text-anchor="middle" font-family="Arial" font-size="6" fill="white">P2</text>
    <rect x="337" y="282" width="15" height="24" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.5" rx="0"/>
    <text x="344" y="297" text-anchor="middle" font-family="Arial" font-size="6" fill="#C62828">5K</text>
    <rect x="352" y="282" width="28" height="24" fill="#5C6BC0" rx="0"/>
    <text x="366" y="297" text-anchor="middle" font-family="Arial" font-size="6" fill="white">P3</text>
    <rect x="380" y="282" width="28" height="24" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.5" rx="0"/>
    <text x="394" y="297" text-anchor="middle" font-family="Arial" font-size="6" fill="#C62828">6K</text>
    <!-- Total label -->
    <text x="320" y="320" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Total free = 25K but scattered!</text>
    <!-- Arrow down to compaction -->
    <line x1="320" y1="324" x2="320" y2="336" stroke="#2E7D32" stroke-width="1.5"/>
    <polygon points="317,336 323,336 320,341" fill="#2E7D32"/>
    <!-- Compacted memory -->
    <text x="320" y="352" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2E7D32">Compaction</text>
    <rect x="230" y="358" width="180" height="24" fill="none" stroke="#2E7D32" stroke-width="1.5" rx="3"/>
    <rect x="232" y="360" width="30" height="20" fill="#5C6BC0" rx="0"/>
    <text x="247" y="373" text-anchor="middle" font-family="Arial" font-size="6" fill="white">P1</text>
    <rect x="262" y="360" width="35" height="20" fill="#5C6BC0" rx="0"/>
    <text x="279" y="373" text-anchor="middle" font-family="Arial" font-size="6" fill="white">P2</text>
    <rect x="297" y="360" width="28" height="20" fill="#5C6BC0" rx="0"/>
    <text x="311" y="373" text-anchor="middle" font-family="Arial" font-size="6" fill="white">P3</text>
    <rect x="325" y="360" width="83" height="20" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1" rx="0"/>
    <text x="366" y="373" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#2E7D32">Free 25K</text>
    <text x="320" y="394" text-anchor="middle" font-family="Arial" font-size="7" fill="#2E7D32">Move processes together = one big free block</text>
  </g>
</svg>
