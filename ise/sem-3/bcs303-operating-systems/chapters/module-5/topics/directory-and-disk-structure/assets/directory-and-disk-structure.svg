<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="directory-and-disk-structure">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Directory and Disk Structure covers how files are organized in directories and how disks are partitioned into logical volumes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#283593">Directory &amp; Disk Structure</text>
    <line x1="80" y1="30" x2="340" y2="30" stroke="#7986CB" stroke-width="1.5"/>
  </g>

  <!-- Group 2: Single-Level Directory -->
  <g data-narration="Single-level directory: all files reside in one directory. Simple but causes name collisions and has no logical grouping." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="12" y="52" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">1. Single-Level Directory</text>
    <!-- Root box -->
    <rect x="12" y="58" width="60" height="22" rx="4" fill="#3949AB"/>
    <text x="42" y="73" text-anchor="middle" font-family="monospace" font-size="9" fill="white">root</text>
    <!-- Lines to files -->
    <line x1="72" y1="69" x2="92" y2="69" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="92" y1="69" x2="92" y2="58" stroke="#3949AB" stroke-width="1"/>
    <line x1="92" y1="69" x2="92" y2="80" stroke="#3949AB" stroke-width="1"/>
    <!-- file1 -->
    <rect x="96" y="56" width="48" height="14" rx="3" fill="#5C6BC0"/>
    <text x="120" y="66" text-anchor="middle" font-family="monospace" font-size="8" fill="white">file1</text>
    <!-- file2 -->
    <rect x="148" y="56" width="48" height="14" rx="3" fill="#5C6BC0"/>
    <text x="172" y="66" text-anchor="middle" font-family="monospace" font-size="8" fill="white">file2</text>
    <!-- file3 -->
    <rect x="96" y="74" width="48" height="14" rx="3" fill="#5C6BC0"/>
    <text x="120" y="84" text-anchor="middle" font-family="monospace" font-size="8" fill="white">file3</text>
    <!-- file4 -->
    <rect x="148" y="74" width="48" height="14" rx="3" fill="#5C6BC0"/>
    <text x="172" y="84" text-anchor="middle" font-family="monospace" font-size="8" fill="white">file4</text>
    <!-- Lines connecting -->
    <line x1="92" y1="63" x2="96" y2="63" stroke="#3949AB" stroke-width="1"/>
    <line x1="144" y1="63" x2="148" y2="63" stroke="#3949AB" stroke-width="1"/>
    <line x1="92" y1="81" x2="96" y2="81" stroke="#3949AB" stroke-width="1"/>
    <line x1="144" y1="81" x2="148" y2="81" stroke="#3949AB" stroke-width="1"/>
    <!-- Problem note -->
    <text x="204" y="66" font-family="Arial" font-size="8" fill="#C62828" font-style="italic">No organization,</text>
    <text x="204" y="76" font-family="Arial" font-size="8" fill="#C62828" font-style="italic">name collisions</text>
  </g>

  <!-- Group 3: Two-Level Directory -->
  <g data-narration="Two-level directory: a root directory contains user directories, each user has a separate folder. Better isolation but limited to one level of nesting." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="12" y="108" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">2. Two-Level Directory</text>
    <!-- Master File Directory -->
    <rect x="12" y="114" width="50" height="20" rx="4" fill="#00695C"/>
    <text x="37" y="127" text-anchor="middle" font-family="monospace" font-size="8" fill="white">MFD</text>
    <!-- Lines to UFDs -->
    <line x1="62" y1="124" x2="82" y2="114" stroke="#00695C" stroke-width="1.5"/>
    <line x1="62" y1="124" x2="82" y2="134" stroke="#00695C" stroke-width="1.5"/>
    <!-- User1 UFD -->
    <rect x="82" y="106" width="52" height="16" rx="3" fill="#00897B"/>
    <text x="108" y="117" text-anchor="middle" font-family="monospace" font-size="8" fill="white">user1</text>
    <!-- User2 UFD -->
    <rect x="82" y="126" width="52" height="16" rx="3" fill="#00897B"/>
    <text x="108" y="137" text-anchor="middle" font-family="monospace" font-size="8" fill="white">user2</text>
    <!-- User1 files -->
    <line x1="134" y1="114" x2="148" y2="110" stroke="#00897B" stroke-width="1"/>
    <line x1="134" y1="114" x2="148" y2="120" stroke="#00897B" stroke-width="1"/>
    <rect x="148" y="104" width="40" height="12" rx="2" fill="#4DB6AC"/>
    <text x="168" y="113" text-anchor="middle" font-family="monospace" font-size="7" fill="white">a.txt</text>
    <rect x="148" y="118" width="40" height="12" rx="2" fill="#4DB6AC"/>
    <text x="168" y="127" text-anchor="middle" font-family="monospace" font-size="7" fill="white">b.doc</text>
    <!-- User2 files -->
    <line x1="134" y1="134" x2="148" y2="130" stroke="#00897B" stroke-width="1"/>
    <line x1="134" y1="134" x2="148" y2="140" stroke="#00897B" stroke-width="1"/>
    <rect x="148" y="124" width="40" height="12" rx="2" fill="#4DB6AC"/>
    <text x="168" y="133" text-anchor="middle" font-family="monospace" font-size="7" fill="white">c.py</text>
    <rect x="148" y="138" width="40" height="12" rx="2" fill="#4DB6AC"/>
    <text x="168" y="147" text-anchor="middle" font-family="monospace" font-size="7" fill="white">d.c</text>
    <!-- Note -->
    <text x="200" y="120" font-family="Arial" font-size="8" fill="#00695C" font-style="italic">Each user has own space;</text>
    <text x="200" y="130" font-family="Arial" font-size="8" fill="#00695C" font-style="italic">limited nesting depth</text>
  </g>

  <!-- Group 4: Tree-Structured Directory -->
  <g data-narration="Tree-structured directory: a hierarchy of directories and subdirectories forming a tree. This is the most common structure used in Unix and Windows. Paths like /home/user/docs/file.txt navigate the tree." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="12" y="168" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">3. Tree Structure (Unix/Windows)</text>
    <!-- Root -->
    <rect x="60" y="174" width="28" height="16" rx="3" fill="#E65100"/>
    <text x="74" y="185" text-anchor="middle" font-family="monospace" font-size="8" fill="white">/</text>
    <!-- Lines from root -->
    <line x1="74" y1="190" x2="40" y2="198" stroke="#E65100" stroke-width="1.2"/>
    <line x1="74" y1="190" x2="108" y2="198" stroke="#E65100" stroke-width="1.2"/>
    <!-- home -->
    <rect x="18" y="198" width="44" height="14" rx="3" fill="#F57C00"/>
    <text x="40" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="white">home</text>
    <!-- etc -->
    <rect x="86" y="198" width="44" height="14" rx="3" fill="#F57C00"/>
    <text x="108" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="white">etc</text>
    <!-- Lines from home -->
    <line x1="40" y1="212" x2="26" y2="220" stroke="#F57C00" stroke-width="1"/>
    <line x1="40" y1="212" x2="56" y2="220" stroke="#F57C00" stroke-width="1"/>
    <!-- user dir -->
    <rect x="8" y="220" width="36" height="14" rx="3" fill="#FFB74D"/>
    <text x="26" y="230" text-anchor="middle" font-family="monospace" font-size="7" fill="#3E2723">user</text>
    <!-- var dir -->
    <rect x="48" y="220" width="36" height="14" rx="3" fill="#FFB74D"/>
    <text x="66" y="230" text-anchor="middle" font-family="monospace" font-size="7" fill="#3E2723">var</text>
    <!-- Lines from user -->
    <line x1="26" y1="234" x2="26" y2="240" stroke="#FFB74D" stroke-width="1"/>
    <!-- docs -->
    <rect x="8" y="240" width="36" height="14" rx="3" fill="#FFE0B2"/>
    <text x="26" y="250" text-anchor="middle" font-family="monospace" font-size="7" fill="#3E2723">docs</text>
    <!-- Line from docs -->
    <line x1="26" y1="254" x2="26" y2="260" stroke="#FFE0B2" stroke-width="1"/>
    <!-- file.txt -->
    <rect x="4" y="260" width="44" height="12" rx="2" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
    <text x="26" y="269" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#E65100">file.txt</text>
    <!-- Path label -->
    <text x="140" y="186" font-family="monospace" font-size="8" fill="#E65100">/home/user/docs/file.txt</text>
    <text x="140" y="198" font-family="Arial" font-size="8" fill="#BF360C" font-style="italic">Most common structure;</text>
    <text x="140" y="208" font-family="Arial" font-size="8" fill="#BF360C" font-style="italic">arbitrary nesting depth</text>
  </g>

  <!-- Group 5: Acyclic Graph Directory -->
  <g data-narration="Acyclic graph directory: like a tree but shared files or subdirectories can be referenced from multiple parent directories using hard links or symbolic links. Two directories can point to the same file without creating cycles." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="280" y="52" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">4. Acyclic Graph</text>
    <!-- Dir A -->
    <rect x="290" y="58" width="44" height="16" rx="3" fill="#3949AB"/>
    <text x="312" y="69" text-anchor="middle" font-family="monospace" font-size="8" fill="white">dirA</text>
    <!-- Dir B -->
    <rect x="360" y="58" width="44" height="16" rx="3" fill="#3949AB"/>
    <text x="382" y="69" text-anchor="middle" font-family="monospace" font-size="8" fill="white">dirB</text>
    <!-- Lines from dirA -->
    <line x1="312" y1="74" x2="296" y2="88" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="312" y1="74" x2="340" y2="96" stroke="#7986CB" stroke-width="1.2" stroke-dasharray="3,2"/>
    <!-- Lines from dirB -->
    <line x1="382" y1="74" x2="396" y2="88" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="382" y1="74" x2="340" y2="96" stroke="#7986CB" stroke-width="1.2" stroke-dasharray="3,2"/>
    <!-- File under dirA -->
    <rect x="278" y="88" width="36" height="14" rx="2" fill="#5C6BC0"/>
    <text x="296" y="98" text-anchor="middle" font-family="monospace" font-size="7" fill="white">x.c</text>
    <!-- Shared file -->
    <rect x="322" y="96" width="40" height="16" rx="3" fill="#C62828"/>
    <text x="342" y="107" text-anchor="middle" font-family="monospace" font-size="7" fill="white">shared</text>
    <!-- File under dirB -->
    <rect x="378" y="88" width="36" height="14" rx="2" fill="#5C6BC0"/>
    <text x="396" y="98" text-anchor="middle" font-family="monospace" font-size="7" fill="white">y.c</text>
    <!-- Labels -->
    <text x="280" y="122" font-family="Arial" font-size="7.5" fill="#3949AB">Hard links / symlinks</text>
    <text x="280" y="132" font-family="Arial" font-size="7.5" fill="#3949AB">allow shared files;</text>
    <text x="280" y="142" font-family="Arial" font-size="7.5" fill="#C62828" font-weight="bold">no cycles allowed</text>
    <!-- Dashed arrow labels -->
    <text x="326" y="92" font-family="Arial" font-size="6" fill="#7986CB">link</text>
    <text x="358" y="86" font-family="Arial" font-size="6" fill="#7986CB">link</text>
  </g>

  <!-- Group 5 continued: General Graph note (right side) -->
  <g data-narration="A general graph directory allows cycles, but requires garbage collection to reclaim unreachable files. Acyclic graphs avoid this complexity." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="278" y="148" width="132" height="32" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
    <text x="344" y="161" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#C62828" font-weight="bold">5. General Graph</text>
    <text x="344" y="173" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Allows cycles; needs</text>
    <!-- Small cycle icon -->
    <text x="344" y="183" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828" font-style="italic">garbage collection</text>
  </g>

  <!-- Group 6: Disk Structure -->
  <g data-narration="Disk structure: a physical disk is divided into partitions. Each partition can hold a volume with a file system. Key regions include the boot block, superblock, free-space management, directory structure, and data blocks." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="12" y="290" font-family="Arial" font-size="11" font-weight="bold" fill="#283593">6. Disk Structure (Partition Layout)</text>
    <!-- Disk outline -->
    <rect x="12" y="298" width="396" height="90" rx="8" fill="none" stroke="#283593" stroke-width="1.5"/>
    <text x="210" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#283593">Physical Disk / Partition (Volume)</text>
    <!-- Boot Block -->
    <rect x="20" y="318" width="62" height="40" rx="4" fill="#3949AB"/>
    <text x="51" y="335" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Boot</text>
    <text x="51" y="347" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Block</text>
    <!-- Superblock -->
    <rect x="88" y="318" width="68" height="40" rx="4" fill="#00695C"/>
    <text x="122" y="335" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Super-</text>
    <text x="122" y="347" text-anchor="middle" font-family="Arial" font-size="8" fill="white">block</text>
    <!-- Free-space mgmt -->
    <rect x="162" y="318" width="68" height="40" rx="4" fill="#E65100"/>
    <text x="196" y="335" text-anchor="middle" font-family="Arial" font-size="7.5" font-weight="bold" fill="white">Free-space</text>
    <text x="196" y="347" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Mgmt</text>
    <!-- Directory -->
    <rect x="236" y="318" width="64" height="40" rx="4" fill="#C62828"/>
    <text x="268" y="335" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Directory</text>
    <text x="268" y="347" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Structure</text>
    <!-- Data Blocks -->
    <rect x="306" y="318" width="96" height="40" rx="4" fill="#1565C0"/>
    <text x="354" y="335" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Data Blocks</text>
    <text x="354" y="347" text-anchor="middle" font-family="Arial" font-size="8" fill="white">(File Content)</text>
    <!-- Arrow showing partition -->
    <line x1="20" y1="365" x2="402" y2="365" stroke="#283593" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="210" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#283593" font-style="italic">Partition = Volume with file system metadata + data</text>
  </g>

  <!-- Summary footer -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="8.5s" fill="freeze"/>
    <text x="210" y="396" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#5C6BC0">Single-level | Two-level | Tree | Acyclic Graph | General Graph | Disk Layout</text>
  </g>
</svg>