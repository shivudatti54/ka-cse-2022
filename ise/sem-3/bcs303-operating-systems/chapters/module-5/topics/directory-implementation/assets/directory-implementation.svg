<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="directory-implementation">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Directory Implementation covers how the OS organizes and manages directory entries on disk." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#283593">Directory Implementation</text>
    <line x1="80" y1="30" x2="340" y2="30" stroke="#7986CB" stroke-width="1.5"/>
  </g>

  <!-- Group 2: Linear List -->
  <g data-narration="A linear list stores directory entries sequentially. Each entry holds a filename and inode number. Searching requires O(n) time as entries must be scanned one by one." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="15" y="52" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Linear List</text>
    <rect x="15" y="58" width="390" height="52" fill="white" stroke="#3949AB" stroke-width="1.5" rx="6"/>
    <rect x="22" y="64" width="80" height="18" fill="#E8EAF6" stroke="#5C6BC0" rx="3"/>
    <text x="62" y="77" text-anchor="middle" font-family="monospace" font-size="8" fill="#283593">file1.txt | 42</text>
    <rect x="108" y="64" width="80" height="18" fill="#E8EAF6" stroke="#5C6BC0" rx="3"/>
    <text x="148" y="77" text-anchor="middle" font-family="monospace" font-size="8" fill="#283593">data.csv | 87</text>
    <rect x="194" y="64" width="80" height="18" fill="#E8EAF6" stroke="#5C6BC0" rx="3"/>
    <text x="234" y="77" text-anchor="middle" font-family="monospace" font-size="8" fill="#283593">main.c | 103</text>
    <rect x="280" y="64" width="80" height="18" fill="#E8EAF6" stroke="#5C6BC0" rx="3"/>
    <text x="320" y="77" text-anchor="middle" font-family="monospace" font-size="8" fill="#283593">img.png | 56</text>
    <text x="370" y="77" font-family="Arial" font-size="10" fill="#5C6BC0">...</text>
    <text x="30" y="88" font-family="monospace" font-size="8" fill="#666">(filename, inode#)</text>
    <line x1="30" y1="93" x2="130" y2="93" stroke="#3949AB" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="22" y="105" font-family="Arial" font-size="9" font-style="italic" fill="#3949AB">Simple but O(n) search -- must scan all entries sequentially</text>
  </g>

  <!-- Group 3: Hash Table -->
  <g data-narration="A hash table maps filenames to bucket indices using a hash function. Each bucket points to a linked list of entries to handle collisions, giving O(1) average lookup time." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="15" y="130" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Hash Table</text>
    <!-- Hash function arrow -->
    <text x="15" y="148" font-family="monospace" font-size="9" fill="#00695C">filename</text>
    <line x1="70" y1="145" x2="100" y2="145" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <rect x="102" y="136" width="50" height="18" fill="#E0F2F1" stroke="#00695C" rx="3"/>
    <text x="127" y="149" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">hash()</text>
    <line x1="154" y1="145" x2="178" y2="145" stroke="#00695C" stroke-width="1.5"/>
    <!-- Buckets -->
    <rect x="180" y="136" width="30" height="16" fill="#B2DFDB" stroke="#00695C" rx="2"/>
    <text x="195" y="148" text-anchor="middle" font-family="monospace" font-size="7" fill="#004D40">B0</text>
    <line x1="212" y1="144" x2="230" y2="144" stroke="#00695C" stroke-width="1"/>
    <rect x="232" y="136" width="56" height="16" fill="#E0F2F1" stroke="#00695C" rx="2"/>
    <text x="260" y="148" text-anchor="middle" font-family="monospace" font-size="7" fill="#004D40">file1.txt</text>
    <line x1="290" y1="144" x2="304" y2="144" stroke="#00695C" stroke-width="1"/>
    <rect x="306" y="136" width="56" height="16" fill="#E0F2F1" stroke="#00695C" rx="2"/>
    <text x="334" y="148" text-anchor="middle" font-family="monospace" font-size="7" fill="#004D40">data.csv</text>
    <circle cx="370" cy="144" r="3" fill="#00695C"/>

    <rect x="180" y="156" width="30" height="16" fill="#B2DFDB" stroke="#00695C" rx="2"/>
    <text x="195" y="168" text-anchor="middle" font-family="monospace" font-size="7" fill="#004D40">B1</text>
    <line x1="212" y1="164" x2="230" y2="164" stroke="#00695C" stroke-width="1"/>
    <rect x="232" y="156" width="56" height="16" fill="#E0F2F1" stroke="#00695C" rx="2"/>
    <text x="260" y="168" text-anchor="middle" font-family="monospace" font-size="7" fill="#004D40">main.c</text>
    <circle cx="296" cy="164" r="3" fill="#00695C"/>

    <rect x="180" y="176" width="30" height="16" fill="#B2DFDB" stroke="#00695C" rx="2"/>
    <text x="195" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#004D40">B2</text>
    <line x1="212" y1="184" x2="230" y2="184" stroke="#00695C" stroke-width="1"/>
    <rect x="232" y="176" width="56" height="16" fill="#E0F2F1" stroke="#00695C" rx="2"/>
    <text x="260" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#004D40">img.png</text>
    <circle cx="296" cy="184" r="3" fill="#00695C"/>

    <text x="15" y="200" font-family="Arial" font-size="9" font-style="italic" fill="#00695C">O(1) average lookup; collisions handled by chaining</text>
  </g>

  <!-- Group 4: Directory Entry Structure -->
  <g data-narration="Each directory entry contains fields like the filename, file type, inode number, and record length. The record length allows variable-size entries for different filename lengths." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="15" y="222" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Directory Entry Structure</text>
    <rect x="15" y="228" width="390" height="42" fill="white" stroke="#E65100" stroke-width="1.5" rx="6"/>
    <!-- Fields -->
    <rect x="22" y="234" width="90" height="28" fill="#FFF3E0" stroke="#F57C00" rx="3"/>
    <text x="67" y="246" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">filename</text>
    <text x="67" y="257" text-anchor="middle" font-family="monospace" font-size="7" fill="#BF360C">(variable len)</text>

    <rect x="118" y="234" width="70" height="28" fill="#FFF3E0" stroke="#F57C00" rx="3"/>
    <text x="153" y="246" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">file type</text>
    <text x="153" y="257" text-anchor="middle" font-family="monospace" font-size="7" fill="#BF360C">(1 byte)</text>

    <rect x="194" y="234" width="80" height="28" fill="#FFF3E0" stroke="#F57C00" rx="3"/>
    <text x="234" y="246" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">inode number</text>
    <text x="234" y="257" text-anchor="middle" font-family="monospace" font-size="7" fill="#BF360C">(4 bytes)</text>

    <rect x="280" y="234" width="80" height="28" fill="#FFF3E0" stroke="#F57C00" rx="3"/>
    <text x="320" y="246" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">record length</text>
    <text x="320" y="257" text-anchor="middle" font-family="monospace" font-size="7" fill="#BF360C">(2 bytes)</text>

    <line x1="365" y1="240" x2="395" y2="240" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Group 5: Operations Comparison Table -->
  <g data-narration="Comparing operations: Search is O(n) for linear list but O(1) for hash table. Insert is O(1) append for both. Delete requires O(n) find plus compaction in linear list but O(1) in hash table." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="15" y="290" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Operations Comparison</text>
    <!-- Table header -->
    <rect x="15" y="296" width="100" height="18" fill="#FFCDD2" stroke="#C62828" rx="2"/>
    <text x="65" y="309" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Operation</text>
    <rect x="117" y="296" width="135" height="18" fill="#E8EAF6" stroke="#3949AB" rx="2"/>
    <text x="184" y="309" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Linear List</text>
    <rect x="254" y="296" width="135" height="18" fill="#E0F2F1" stroke="#00695C" rx="2"/>
    <text x="321" y="309" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Hash Table</text>
    <!-- Row 1: Search -->
    <rect x="15" y="316" width="100" height="16" fill="white" stroke="#EEE" rx="2"/>
    <text x="65" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Search</text>
    <rect x="117" y="316" width="135" height="16" fill="white" stroke="#EEE" rx="2"/>
    <text x="184" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#C62828">O(n)</text>
    <rect x="254" y="316" width="135" height="16" fill="white" stroke="#EEE" rx="2"/>
    <text x="321" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#2E7D32">O(1)</text>
    <!-- Row 2: Insert -->
    <rect x="15" y="334" width="100" height="16" fill="#FAFAFA" stroke="#EEE" rx="2"/>
    <text x="65" y="346" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Insert</text>
    <rect x="117" y="334" width="135" height="16" fill="#FAFAFA" stroke="#EEE" rx="2"/>
    <text x="184" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="#2E7D32">O(1) append</text>
    <rect x="254" y="334" width="135" height="16" fill="#FAFAFA" stroke="#EEE" rx="2"/>
    <text x="321" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="#2E7D32">O(1)</text>
    <!-- Row 3: Delete -->
    <rect x="15" y="352" width="100" height="16" fill="white" stroke="#EEE" rx="2"/>
    <text x="65" y="364" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Delete</text>
    <rect x="117" y="352" width="135" height="16" fill="white" stroke="#EEE" rx="2"/>
    <text x="184" y="364" text-anchor="middle" font-family="monospace" font-size="9" fill="#C62828">O(n) find+compact</text>
    <rect x="254" y="352" width="135" height="16" fill="white" stroke="#EEE" rx="2"/>
    <text x="321" y="364" text-anchor="middle" font-family="monospace" font-size="9" fill="#2E7D32">O(1)</text>
  </g>

  <!-- Group 6: B-tree Alternative -->
  <g data-narration="Modern filesystems like NTFS and HFS+ use B-trees to maintain sorted directory entries. B-trees offer O(log n) search with efficient range queries and balanced performance." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="15" y="376" width="390" height="18" fill="#E8EAF6" stroke="#7986CB" stroke-width="1" rx="4"/>
    <text x="210" y="389" text-anchor="middle" font-family="Arial" font-size="9" fill="#283593">B-tree: Used by modern filesystems (NTFS, HFS+) for sorted directory entries -- O(log n) search</text>
  </g>
</svg>