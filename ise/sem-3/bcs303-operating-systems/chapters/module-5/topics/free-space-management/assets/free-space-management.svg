<svg
    xmlns="http://www.w3.org/2000/svg"
    width="420"
    height="400"
    viewBox="0 0 420 400"
    data-topic-id="free-space-management"
    data-slug="free-space-management"
    style="background-color: #C7E5F5; background-image: linear-gradient(to bottom, #C7E5F5, #87CEEB);">

    <!-- Header -->
    <rect
        x="0"
        y="0"
        width="100%"
        height="20%"
        fill="#87CEEB"
        rx="5"
        data-narration="Title section: Free Space Management Introduction"
        style="font-size: 20px; font-weight: bold; color: #000; text-align: center;" />

    <!-- Section 1: Bitmap -->
    <g
        transform="translate(0, 20%)"
        data-narration="Section 1: Bitmap">
        <path
            d="M 50 50 L 70 70 L 90 70 L 110 50"
            stroke="#000"
            stroke-width="2"
            fill="none"
            data-narration="Bitmap representation of free space management" />
        <text x="50%" y="60%" data-narration="Advantages: simple, efficient, easy to find first free block">
            <tspan x="50%" y="60%" style="font-size: 14px;" >Advantages:</tspan>
            <tspan x="50%" y="60%" style="font-size: 14px;" >Simple, efficient, easy to find first free block</tspan>
        </text>
        <text x="50%" y="80%" data-narration="Disadvantages: bitmap can be large for big disks">
            <tspan x="50%" y="80%" style="font-size: 14px;" >Disadvantages:</tspan>
            <tspan x="50%" y="80%" style="font-size: 14px;" >Bitmap can be large for big disks</tspan>
        </text>
    </g>

    <!-- Section 2: Linked List -->
    <g
        transform="translate(150%, 20%)"
        data-narration="Section 2: Linked List">
        <path
            d="M 50 50 L 70 70 L 90 70 L 110 50"
            stroke="#000"
            stroke-width="2"
            fill="none"
            data-narration="Linked List representation of free space management" />
        <text x="50%" y="60%" data-narration="Advantages: no space waste, easy to traverse">
            <tspan x="50%" y="60%" style="font-size: 14px;" >Advantages:</tspan>
            <tspan x="50%" y="60%" style="font-size: 14px;" >No space waste, easy to traverse</tspan>
        </text>
        <text x="50%" y="80%" data-narration="Disadvantages: cannot easily get contiguous blocks">
            <tspan x="50%" y="80%" style="font-size: 14px;" >Disadvantages:</tspan>
            <tspan x="50%" y="80%" style="font-size: 14px;" >Cannot easily get contiguous blocks</tspan>
        </text>
    </g>

    <!-- Section 3: Grouping -->
    <g
        transform="translate(250%, 20%)"
        data-narration="Section 3: Grouping">
        <path
            d="M 50 50 L 70 70 L 90 70 L 110 50"
            stroke="#000"
            stroke-width="2"
            fill="none"
            data-narration="Grouping representation of free space management" />
        <text x="50%" y="60%" data-narration="Advantages: efficient, minimal overhead">
            <tspan x="50%" y="60%" style="font-size: 14px;" >Advantages:</tspan>
            <tspan x="50%" y="60%" style="font-size: 14px;" >Efficient, minimal overhead</tspan>
        </text>
        <text x="50%" y="80%" data-narration="Disadvantages: not suitable for large disks">
            <tspan x="50%" y="80%" style="font-size: 14px;" >Disadvantages:</tspan>
            <tspan x="50%" y="80%" style="font-size: 14px;" >Not suitable for large disks</tspan>
        </text>
    </g>

    <!-- Section 4: Counting -->
    <g
        transform="translate(350%, 20%)"
        data-narration="Section 4: Counting">
        <path
            d="M 50 50 L 70 70 L 90 70 L 110 50"
            stroke="#000"
            stroke-width="2"
            fill="none"
            data-narration="Counting representation of free space management" />
        <text x="50%" y="60%" data-narration="Advantages: efficient, minimal overhead">
            <tspan x="50%" y="60%" style="font-size: 14px;" >Advantages:</tspan>
            <tspan x="50%" y="60%" style="font-size: 14px;" >Efficient, minimal overhead</tspan>
        </text>
        <text x="50%" y="80%" data-narration="Disadvantages: not suitable for small disks">
            <tspan x="50%" y="80%" style="font-size: 14px;" >Disadvantages:</tspan>
            <tspan x="50%" y="80%" style="font-size: 14px;" >Not suitable for small disks</tspan>
        </text>
    </g>

    <!-- Footer -->
    <rect
        x="0"
        y="100%"
        width="100%"
        height="10%"
        fill="#87CEEB"
        rx="5"
        data-narration="Footer section: Free Space Management Conclusion"
        style="font-size: 14px; font-weight: bold; color: #000; text-align: center;" />

    <!-- Animations -->
    <animate
        attributeName="opacity"
        from="1"
        to="0.5"
        begin="100ms"
        dur="500ms" />
    <animate
        attributeName="opacity"
        from="0.5"
        to="1"
        begin="600ms"
        dur="500ms" />

    <!-- Arrow markers -->
    <line x1="150%" y1="20%" x2="150%" y2="80%" stroke="#000" stroke-width="2" data-narration="Connection between sections" style="stroke-dasharray: 10, 10;" />
    <line x1="250%" y1="20%" x2="250%" y2="80%" stroke="#000" stroke-width="2" data-narration="Connection between sections" style="stroke-dasharray: 10, 10;" />
    <line x1="350%" y1="20%" x2="350%" y2="80%" stroke="#000" stroke-width="2" data-narration="Connection between sections" style="stroke-dasharray: 10, 10;" />

    <!-- Title -->
    <text x="50%" y="10%" data-narration="Free Space Management" style="font-size: 24px; font-weight: bold; color: #000; text-align: center;" />
</svg>