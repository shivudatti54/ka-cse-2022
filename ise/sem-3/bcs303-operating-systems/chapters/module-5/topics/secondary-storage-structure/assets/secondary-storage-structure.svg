<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="secondary-storage-structure">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#E65100"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Secondary storage provides persistent, large-capacity data storage using magnetic disks, SSDs, and other media.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Secondary Storage Structure</text>
    <line x1="80" y1="28" x2="340" y2="28" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- Group 2: Disk Structure - platters, tracks, sectors, head arm -->
  <g opacity="0" data-narration="A disk platter has concentric tracks divided into sectors. A cylinder is the set of tracks at the same position across all platters. The read-write head moves radially to access data.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="105" y="48" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Disk Structure</text>
    <!-- Platter with concentric tracks -->
    <circle cx="95" cy="95" r="52" fill="none" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="3,2"/>
    <circle cx="95" cy="95" r="42" fill="none" stroke="#3949AB" stroke-width="1.2"/>
    <circle cx="95" cy="95" r="32" fill="none" stroke="#5C6BC0" stroke-width="1.0"/>
    <circle cx="95" cy="95" r="22" fill="none" stroke="#7986CB" stroke-width="1.0"/>
    <circle cx="95" cy="95" r="10" fill="#3949AB" opacity="0.3"/>
    <circle cx="95" cy="95" r="4" fill="#3949AB"/>
    <!-- Sector wedge -->
    <path d="M95 95 L135 75 A52 52 0 0 1 147 95 Z" fill="#3949AB" opacity="0.15" stroke="#3949AB" stroke-width="0.8"/>
    <text x="138" y="82" font-family="Arial" font-size="7" fill="#3949AB">Sector</text>
    <!-- Track label -->
    <text x="55" y="60" font-family="Arial" font-size="7" fill="#3949AB">Track</text>
    <line x1="62" y1="62" x2="72" y2="70" stroke="#3949AB" stroke-width="0.6" marker-end="url(#arrowIndigo)"/>
    <!-- Read/Write Head Arm -->
    <line x1="150" y1="95" x2="175" y2="95" stroke="#3949AB" stroke-width="3" stroke-linecap="round"/>
    <line x1="175" y1="75" x2="175" y2="115" stroke="#3949AB" stroke-width="2"/>
    <polygon points="148,92 148,98 137,95" fill="#C62828"/>
    <text x="175" y="72" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#3949AB">Arm</text>
    <!-- Cylinder label -->
    <rect x="155" y="106" width="50" height="14" rx="3" fill="#3949AB" opacity="0.12"/>
    <text x="180" y="116" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Cylinder =</text>
    <text x="180" y="125" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#3949AB">same track,</text>
    <text x="180" y="133" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#3949AB">all platters</text>
  </g>

  <!-- Group 3: Disk Scheduling - FCFS, SSTF, SCAN -->
  <g opacity="0" data-narration="FCFS serves requests in arrival order but can cause large seek times. SSTF picks the nearest request first, reducing average seek but risking starvation. SCAN moves the head in one direction servicing requests, then reverses like an elevator.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="330" y="48" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Disk Scheduling</text>

    <!-- FCFS mini diagram -->
    <rect x="222" y="54" width="62" height="80" rx="4" fill="white" opacity="0.6" stroke="#00695C" stroke-width="0.8"/>
    <text x="253" y="65" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">FCFS</text>
    <!-- Track axis -->
    <line x1="232" y1="72" x2="232" y2="128" stroke="#00695C" stroke-width="0.6"/>
    <text x="229" y="77" text-anchor="end" font-family="monospace" font-size="5.5" fill="#00695C">0</text>
    <text x="229" y="128" text-anchor="end" font-family="monospace" font-size="5.5" fill="#00695C">200</text>
    <!-- Zigzag path representing FCFS order -->
    <polyline points="237,78 260,105 240,85 270,120 245,90 265,110" fill="none" stroke="#00695C" stroke-width="1" marker-end="url(#arrowTeal)"/>
    <text x="253" y="136" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C">Serve in order</text>

    <!-- SSTF mini diagram -->
    <rect x="290" y="54" width="62" height="80" rx="4" fill="white" opacity="0.6" stroke="#00695C" stroke-width="0.8"/>
    <text x="321" y="65" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">SSTF</text>
    <line x1="300" y1="72" x2="300" y2="128" stroke="#00695C" stroke-width="0.6"/>
    <text x="297" y="77" text-anchor="end" font-family="monospace" font-size="5.5" fill="#00695C">0</text>
    <text x="297" y="128" text-anchor="end" font-family="monospace" font-size="5.5" fill="#00695C">200</text>
    <!-- Smoother path - nearest first -->
    <polyline points="305,90 315,95 325,98 335,105 340,115 345,120" fill="none" stroke="#00695C" stroke-width="1" marker-end="url(#arrowTeal)"/>
    <text x="321" y="136" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C">Nearest first</text>

    <!-- SCAN mini diagram -->
    <rect x="358" y="54" width="54" height="80" rx="4" fill="white" opacity="0.6" stroke="#00695C" stroke-width="0.8"/>
    <text x="385" y="65" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">SCAN</text>
    <line x1="368" y1="72" x2="368" y2="128" stroke="#00695C" stroke-width="0.6"/>
    <text x="365" y="77" text-anchor="end" font-family="monospace" font-size="5.5" fill="#00695C">0</text>
    <text x="365" y="128" text-anchor="end" font-family="monospace" font-size="5.5" fill="#00695C">200</text>
    <!-- Elevator: go down then reverse up -->
    <polyline points="373,85 380,95 390,110 400,128 390,115 380,100 373,90" fill="none" stroke="#00695C" stroke-width="1" marker-end="url(#arrowTeal)"/>
    <text x="385" y="136" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C">Elevator</text>
  </g>

  <!-- Group 4: C-SCAN and LOOK -->
  <g opacity="0" data-narration="C-SCAN is a circular variant of SCAN: the head moves in one direction, then jumps back to the start without servicing. LOOK is like SCAN but the head reverses at the last request rather than going to the disk end.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="105" y="158" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">C-SCAN &amp; LOOK</text>

    <!-- C-SCAN box -->
    <rect x="15" y="165" width="90" height="72" rx="5" fill="white" opacity="0.65" stroke="#E65100" stroke-width="0.8"/>
    <text x="60" y="177" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">C-SCAN</text>
    <!-- Track axis -->
    <line x1="28" y1="183" x2="28" y2="228" stroke="#E65100" stroke-width="0.6"/>
    <text x="25" y="188" text-anchor="end" font-family="monospace" font-size="5.5" fill="#E65100">0</text>
    <text x="25" y="228" text-anchor="end" font-family="monospace" font-size="5.5" fill="#E65100">200</text>
    <!-- Go to end, jump to start, continue -->
    <polyline points="33,190 45,200 60,210 75,220 88,228" fill="none" stroke="#E65100" stroke-width="1.0" marker-end="url(#arrowOrange)"/>
    <line x1="88" y1="228" x2="33" y2="183" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3,2"/>
    <polyline points="33,183 45,193 55,200" fill="none" stroke="#E65100" stroke-width="1.0" marker-end="url(#arrowOrange)"/>
    <text x="60" y="240" text-anchor="middle" font-family="Arial" font-size="6" fill="#E65100">Go to end, jump start</text>

    <!-- LOOK box -->
    <rect x="115" y="165" width="90" height="72" rx="5" fill="white" opacity="0.65" stroke="#E65100" stroke-width="0.8"/>
    <text x="160" y="177" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#E65100">LOOK</text>
    <line x1="128" y1="183" x2="128" y2="228" stroke="#E65100" stroke-width="0.6"/>
    <text x="125" y="188" text-anchor="end" font-family="monospace" font-size="5.5" fill="#E65100">0</text>
    <text x="125" y="228" text-anchor="end" font-family="monospace" font-size="5.5" fill="#E65100">200</text>
    <!-- Like SCAN but reverse at last request, not disk end -->
    <polyline points="133,190 145,200 160,210 175,218" fill="none" stroke="#E65100" stroke-width="1.0"/>
    <polyline points="175,218 160,205 145,195 133,188" fill="none" stroke="#E65100" stroke-width="1.0" marker-end="url(#arrowOrange)"/>
    <!-- Dashed line showing it does NOT go to end -->
    <line x1="175" y1="218" x2="190" y2="228" stroke="#E65100" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.4"/>
    <text x="190" y="222" font-family="Arial" font-size="5.5" fill="#C62828">not end</text>
    <text x="160" y="240" text-anchor="middle" font-family="Arial" font-size="6" fill="#E65100">Reverse at last request</text>
  </g>

  <!-- Group 5: Access Time Formula -->
  <g opacity="0" data-narration="Disk access time has three components: seek time to move the head to the correct track, rotational latency to wait for the sector to spin under the head, and transfer time to read or write the data.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="315" y="158" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Access Time</text>

    <rect x="222" y="164" width="192" height="82" rx="6" fill="white" opacity="0.6" stroke="#C62828" stroke-width="0.8"/>

    <!-- Formula -->
    <text x="318" y="182" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#C62828">Access = Seek + Latency + Transfer</text>

    <!-- Seek time -->
    <rect x="230" y="190" width="55" height="22" rx="3" fill="#3949AB" opacity="0.15"/>
    <text x="257" y="200" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">Seek Time</text>
    <text x="257" y="209" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#3949AB">3-15 ms</text>

    <!-- Rotational Latency -->
    <rect x="291" y="190" width="58" height="22" rx="3" fill="#00695C" opacity="0.15"/>
    <text x="320" y="200" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#00695C">Rot. Latency</text>
    <text x="320" y="209" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#00695C">2-6 ms</text>

    <!-- Transfer time -->
    <rect x="355" y="190" width="52" height="22" rx="3" fill="#E65100" opacity="0.15"/>
    <text x="381" y="200" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#E65100">Transfer</text>
    <text x="381" y="209" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#E65100">&lt;1 ms</text>

    <!-- Average values note -->
    <text x="318" y="226" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Seek dominates; scheduling reduces avg seek</text>
    <text x="318" y="236" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Avg rotational latency = 1/2 rotation time</text>
  </g>

  <!-- Group 6: RAID Overview -->
  <g opacity="0" data-narration="RAID uses multiple disks for performance and reliability. RAID 0 stripes data across disks for speed with no redundancy. RAID 1 mirrors data for full reliability. RAID 5 uses distributed parity across disks, balancing speed, capacity, and fault tolerance.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="268" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">RAID Levels Overview</text>

    <!-- RAID 0 Box -->
    <rect x="15" y="278" width="125" height="110" rx="6" fill="white" opacity="0.65" stroke="#3949AB" stroke-width="1"/>
    <text x="77" y="293" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#3949AB">RAID 0</text>
    <text x="77" y="304" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#3949AB">Striping</text>
    <!-- Disks with striped data -->
    <rect x="28" y="310" width="24" height="35" rx="3" fill="#3949AB" opacity="0.12" stroke="#3949AB" stroke-width="0.6"/>
    <rect x="56" y="310" width="24" height="35" rx="3" fill="#3949AB" opacity="0.12" stroke="#3949AB" stroke-width="0.6"/>
    <rect x="84" y="310" width="24" height="35" rx="3" fill="#3949AB" opacity="0.12" stroke="#3949AB" stroke-width="0.6"/>
    <!-- Stripe blocks -->
    <rect x="30" y="313" width="20" height="6" rx="1" fill="#3949AB" opacity="0.5"/>
    <rect x="58" y="313" width="20" height="6" rx="1" fill="#5C6BC0" opacity="0.5"/>
    <rect x="86" y="313" width="20" height="6" rx="1" fill="#7986CB" opacity="0.5"/>
    <rect x="30" y="322" width="20" height="6" rx="1" fill="#7986CB" opacity="0.5"/>
    <rect x="58" y="322" width="20" height="6" rx="1" fill="#3949AB" opacity="0.5"/>
    <rect x="86" y="322" width="20" height="6" rx="1" fill="#5C6BC0" opacity="0.5"/>
    <rect x="30" y="331" width="20" height="6" rx="1" fill="#5C6BC0" opacity="0.5"/>
    <rect x="58" y="331" width="20" height="6" rx="1" fill="#7986CB" opacity="0.5"/>
    <rect x="86" y="331" width="20" height="6" rx="1" fill="#3949AB" opacity="0.5"/>
    <text x="40" y="352" font-family="monospace" font-size="5.5" fill="#3949AB">D0</text>
    <text x="68" y="352" font-family="monospace" font-size="5.5" fill="#3949AB">D1</text>
    <text x="96" y="352" font-family="monospace" font-size="5.5" fill="#3949AB">D2</text>
    <!-- Pros/Cons -->
    <text x="77" y="368" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#00695C">+ High speed</text>
    <text x="77" y="378" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#C62828">- No redundancy</text>

    <!-- RAID 1 Box -->
    <rect x="148" y="278" width="125" height="110" rx="6" fill="white" opacity="0.65" stroke="#00695C" stroke-width="1"/>
    <text x="210" y="293" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">RAID 1</text>
    <text x="210" y="304" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#00695C">Mirroring</text>
    <!-- Mirrored disks -->
    <rect x="165" y="310" width="28" height="35" rx="3" fill="#00695C" opacity="0.12" stroke="#00695C" stroke-width="0.6"/>
    <rect x="219" y="310" width="28" height="35" rx="3" fill="#00695C" opacity="0.12" stroke="#00695C" stroke-width="0.6"/>
    <!-- Same data blocks -->
    <rect x="168" y="313" width="22" height="6" rx="1" fill="#00695C" opacity="0.4"/>
    <rect x="168" y="322" width="22" height="6" rx="1" fill="#00695C" opacity="0.4"/>
    <rect x="168" y="331" width="22" height="6" rx="1" fill="#00695C" opacity="0.4"/>
    <rect x="222" y="313" width="22" height="6" rx="1" fill="#00695C" opacity="0.4"/>
    <rect x="222" y="322" width="22" height="6" rx="1" fill="#00695C" opacity="0.4"/>
    <rect x="222" y="331" width="22" height="6" rx="1" fill="#00695C" opacity="0.4"/>
    <!-- Mirror arrow -->
    <text x="205" y="330" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695C">=</text>
    <text x="179" y="352" font-family="monospace" font-size="5.5" fill="#00695C">Disk</text>
    <text x="230" y="352" font-family="monospace" font-size="5.5" fill="#00695C">Copy</text>
    <!-- Pros/Cons -->
    <text x="210" y="368" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#00695C">+ Full redundancy</text>
    <text x="210" y="378" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#C62828">- 50% capacity cost</text>

    <!-- RAID 5 Box -->
    <rect x="281" y="278" width="130" height="110" rx="6" fill="white" opacity="0.65" stroke="#E65100" stroke-width="1"/>
    <text x="346" y="293" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">RAID 5</text>
    <text x="346" y="304" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#E65100">Distributed Parity</text>
    <!-- Disks with parity rotation -->
    <rect x="293" y="310" width="24" height="35" rx="3" fill="#E65100" opacity="0.10" stroke="#E65100" stroke-width="0.6"/>
    <rect x="322" y="310" width="24" height="35" rx="3" fill="#E65100" opacity="0.10" stroke="#E65100" stroke-width="0.6"/>
    <rect x="351" y="310" width="24" height="35" rx="3" fill="#E65100" opacity="0.10" stroke="#E65100" stroke-width="0.6"/>
    <rect x="380" y="310" width="24" height="35" rx="3" fill="#E65100" opacity="0.10" stroke="#E65100" stroke-width="0.6"/>
    <!-- Row 1: parity on D3 -->
    <rect x="295" y="313" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <rect x="324" y="313" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <rect x="353" y="313" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <rect x="382" y="313" width="20" height="6" rx="1" fill="#C62828" opacity="0.5"/>
    <!-- Row 2: parity on D2 -->
    <rect x="295" y="322" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <rect x="324" y="322" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <rect x="353" y="322" width="20" height="6" rx="1" fill="#C62828" opacity="0.5"/>
    <rect x="382" y="322" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <!-- Row 3: parity on D1 -->
    <rect x="295" y="331" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <rect x="324" y="331" width="20" height="6" rx="1" fill="#C62828" opacity="0.5"/>
    <rect x="353" y="331" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <rect x="382" y="331" width="20" height="6" rx="1" fill="#E65100" opacity="0.35"/>
    <!-- Labels -->
    <text x="305" y="352" font-family="monospace" font-size="5" fill="#E65100">D0</text>
    <text x="334" y="352" font-family="monospace" font-size="5" fill="#E65100">D1</text>
    <text x="363" y="352" font-family="monospace" font-size="5" fill="#E65100">D2</text>
    <text x="392" y="352" font-family="monospace" font-size="5" fill="#E65100">D3</text>
    <text x="346" y="362" text-anchor="middle" font-family="Arial" font-size="5.5" fill="#C62828">P = parity (rotates)</text>
    <!-- Pros/Cons -->
    <text x="346" y="374" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#00695C">+ Speed + fault tolerance</text>
    <text x="346" y="384" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#E65100">1 disk overhead for parity</text>
  </g>
</svg>