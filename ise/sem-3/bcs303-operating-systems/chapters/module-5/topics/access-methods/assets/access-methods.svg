<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="access-methods">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title (0.3s) -->
  <g data-narration="File Access Methods define how data stored in a file is accessed. The three main methods are Sequential, Direct, and Indexed Sequential access." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#283593">File Access Methods</text>
    <line x1="100" y1="30" x2="320" y2="30" stroke="#5C6BC0" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Group 2: Sequential Access (1.5s) -->
  <g data-narration="Sequential Access reads records one after another in order. A read pointer advances forward through the file. Operations include read_next to read the next record, write_next to append, and reset to return to the beginning." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="15" y="52" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">1. Sequential Access</text>
    <!-- Tape strip -->
    <rect x="15" y="58" width="60" height="28" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="3"/>
    <text x="45" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">R1</text>
    <rect x="77" y="58" width="60" height="28" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="3"/>
    <text x="107" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">R2</text>
    <rect x="139" y="58" width="60" height="28" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="3"/>
    <text x="169" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">R3</text>
    <rect x="201" y="58" width="60" height="28" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="3"/>
    <text x="231" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">R4</text>
    <rect x="263" y="58" width="60" height="28" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="3"/>
    <text x="293" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">R5</text>
    <!-- Arrows between records -->
    <polygon points="73,72 77,68 77,76" fill="#3949AB"/>
    <polygon points="135,72 139,68 139,76" fill="#3949AB"/>
    <polygon points="197,72 201,68 201,76" fill="#3949AB"/>
    <polygon points="259,72 263,68 263,76" fill="#3949AB"/>
    <!-- Read pointer moving left to right -->
    <g>
      <polygon points="45,55 40,48 50,48" fill="#C62828">
        <animateTransform attributeName="transform" type="translate" values="0,0;62,0;124,0;186,0;248,0" dur="3s" begin="2s" repeatCount="indefinite"/>
      </polygon>
      <text x="45" y="46" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">
        ptr
        <animateTransform attributeName="transform" type="translate" values="0,0;62,0;124,0;186,0;248,0" dur="3s" begin="2s" repeatCount="indefinite"/>
      </text>
    </g>
    <!-- Operations -->
    <text x="340" y="60" font-family="monospace" font-size="8" fill="#3949AB">read_next()</text>
    <text x="340" y="72" font-family="monospace" font-size="8" fill="#3949AB">write_next()</text>
    <text x="340" y="84" font-family="monospace" font-size="8" fill="#3949AB">reset()</text>
  </g>

  <!-- Group 3: Direct (Random) Access (3.0s) -->
  <g data-narration="Direct or Random Access allows jumping to any block immediately without reading preceding blocks. A logical block number is used to position the read/write head. Operations include read n, write n, and position n." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="15" y="108" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">2. Direct (Random) Access</text>
    <!-- Numbered blocks -->
    <rect x="15" y="114" width="38" height="28" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <text x="34" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">0</text>
    <rect x="57" y="114" width="38" height="28" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <text x="76" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">1</text>
    <rect x="99" y="114" width="38" height="28" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <text x="118" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">2</text>
    <rect x="141" y="114" width="38" height="28" fill="#B2DFDB" stroke="#00695C" stroke-width="2" rx="3"/>
    <text x="160" y="132" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#00695C">3</text>
    <rect x="183" y="114" width="38" height="28" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <text x="202" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">4</text>
    <rect x="225" y="114" width="38" height="28" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <text x="244" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">...</text>
    <rect x="267" y="114" width="38" height="28" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <text x="286" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">n</text>
    <!-- Curved arrow jumping directly to block 3 -->
    <path d="M160,155 C160,168 160,168 160,155" fill="none" stroke="#C62828" stroke-width="0"/>
    <polygon points="160,112 155,105 165,105" fill="#C62828"/>
    <path d="M40,155 Q40,170 100,170 Q160,170 160,155" fill="none" stroke="#C62828" stroke-width="1.5" stroke-dasharray="3,2">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" begin="3.5s" repeatCount="indefinite"/>
    </path>
    <text x="100" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">jump to block 3</text>
    <!-- Operations -->
    <text x="340" y="118" font-family="monospace" font-size="8" fill="#00695C">read(n)</text>
    <text x="340" y="130" font-family="monospace" font-size="8" fill="#00695C">write(n)</text>
    <text x="340" y="142" font-family="monospace" font-size="8" fill="#00695C">position(n)</text>
  </g>

  <!-- Group 4: Indexed Sequential Access (4.5s) -->
  <g data-narration="Indexed Sequential Access uses an index table that maps keys to block numbers. First the index is searched to find the target block number, then the data block is accessed directly. This combines the benefits of sequential and direct access." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="15" y="192" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">3. Indexed Sequential Access</text>
    <!-- Index Table -->
    <rect x="15" y="198" width="100" height="16" fill="#E65100" rx="2"/>
    <text x="65" y="210" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Index Table</text>
    <rect x="15" y="216" width="50" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="40" y="226" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Key: A</text>
    <rect x="65" y="216" width="50" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="90" y="226" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Blk: 0</text>
    <rect x="15" y="230" width="50" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="40" y="240" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Key: D</text>
    <rect x="65" y="230" width="50" height="14" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
    <text x="90" y="240" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#E65100">Blk: 3</text>
    <rect x="15" y="244" width="50" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="40" y="254" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Key: G</text>
    <rect x="65" y="244" width="50" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="90" y="254" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Blk: 6</text>
    <!-- Arrow from index to data blocks -->
    <line x1="115" y1="237" x2="155" y2="237" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <!-- Step labels -->
    <circle cx="130" cy="222" r="7" fill="#C62828"/>
    <text x="130" y="225" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">1</text>
    <text x="124" y="216" font-family="Arial" font-size="7" fill="#C62828">search</text>
    <circle cx="148" cy="237" r="7" fill="#C62828"/>
    <text x="148" y="240" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">2</text>
    <!-- Data Blocks -->
    <rect x="160" y="198" width="100" height="16" fill="#E65100" rx="2"/>
    <text x="210" y="210" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Data Blocks</text>
    <rect x="160" y="216" width="45" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="182" y="226" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Blk 0</text>
    <rect x="207" y="216" width="45" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="230" y="226" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Blk 1</text>
    <rect x="160" y="230" width="45" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="182" y="240" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Blk 2</text>
    <rect x="207" y="230" width="45" height="14" fill="#FFE0B2" stroke="#E65100" stroke-width="2"/>
    <text x="230" y="240" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#E65100">Blk 3</text>
    <rect x="160" y="244" width="45" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="182" y="254" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Blk 4</text>
    <rect x="207" y="244" width="45" height="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="230" y="254" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Blk 5</text>
    <!-- Flow description -->
    <text x="280" y="225" font-family="Arial" font-size="7" fill="#E65100">Search index</text>
    <text x="280" y="237" font-family="Arial" font-size="7" fill="#E65100">for Key D</text>
    <text x="280" y="249" font-family="Arial" font-size="7" fill="#E65100">then access</text>
    <text x="280" y="261" font-family="Arial" font-size="7" fill="#C62828" font-weight="bold">Block 3</text>
  </g>

  <!-- Group 5: Comparison Table (6.0s) -->
  <g data-narration="Comparing the three methods: Sequential is simple but slow for random access. Direct access is fast for random reads but requires knowing the block size. Indexed sequential provides fast search but needs extra storage for the index." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="15" y="282" font-family="Arial" font-size="11" font-weight="bold" fill="#283593">Comparison</text>
    <!-- Table Header -->
    <rect x="15" y="288" width="95" height="16" fill="#3949AB" rx="2"/>
    <text x="62" y="300" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Method</text>
    <rect x="110" y="288" width="100" height="16" fill="#3949AB" rx="2"/>
    <text x="160" y="300" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Strength</text>
    <rect x="210" y="288" width="110" height="16" fill="#3949AB" rx="2"/>
    <text x="265" y="300" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Weakness</text>
    <rect x="320" y="288" width="85" height="16" fill="#3949AB" rx="2"/>
    <text x="362" y="300" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Speed</text>
    <!-- Row 1: Sequential -->
    <rect x="15" y="304" width="95" height="16" fill="#E8EAF6" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="315" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB" font-weight="bold">Sequential</text>
    <rect x="110" y="304" width="100" height="16" fill="#E8EAF6" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="160" y="315" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Simple, ordered</text>
    <rect x="210" y="304" width="110" height="16" fill="#E8EAF6" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="265" y="315" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Slow random access</text>
    <rect x="320" y="304" width="85" height="16" fill="#E8EAF6" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="362" y="315" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">O(n)</text>
    <!-- Row 2: Direct -->
    <rect x="15" y="320" width="95" height="16" fill="#F3F4FA" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="331" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C" font-weight="bold">Direct</text>
    <rect x="110" y="320" width="100" height="16" fill="#F3F4FA" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="160" y="331" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Fast random</text>
    <rect x="210" y="320" width="110" height="16" fill="#F3F4FA" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="265" y="331" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Needs block size</text>
    <rect x="320" y="320" width="85" height="16" fill="#F3F4FA" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="362" y="331" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">O(1)</text>
    <!-- Row 3: Indexed -->
    <rect x="15" y="336" width="95" height="16" fill="#E8EAF6" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="347" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" font-weight="bold">Indexed Seq.</text>
    <rect x="110" y="336" width="100" height="16" fill="#E8EAF6" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="160" y="347" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Fast key search</text>
    <rect x="210" y="336" width="110" height="16" fill="#E8EAF6" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="265" y="347" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Extra index storage</text>
    <rect x="320" y="336" width="85" height="16" fill="#E8EAF6" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="362" y="347" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">O(log n)</text>
  </g>

  <!-- Group 6: Use Cases (7.5s) -->
  <g data-narration="Use cases: Sequential access is ideal for log files and backups where data is processed in order. Direct access suits databases needing instant record retrieval. Indexed sequential is best for large sorted files requiring fast key-based lookup." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="15" y="367" font-family="Arial" font-size="11" font-weight="bold" fill="#283593">Use Cases</text>
    <!-- Sequential use case -->
    <rect x="15" y="373" width="120" height="20" fill="#3949AB" rx="10"/>
    <text x="75" y="386" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Sequential: Log files, Backups</text>
    <!-- Direct use case -->
    <rect x="145" y="373" width="120" height="20" fill="#00695C" rx="10"/>
    <text x="205" y="386" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Direct: Databases</text>
    <!-- Indexed use case -->
    <rect x="275" y="373" width="130" height="20" fill="#E65100" rx="10"/>
    <text x="340" y="386" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">Indexed: Large sorted files</text>
  </g>
</svg>