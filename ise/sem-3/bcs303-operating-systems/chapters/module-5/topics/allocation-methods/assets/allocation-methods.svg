<svg width="420" height="400" data-topic-id="allocation-methods">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10" />
  
  <!-- Title -->
  <text x="50%" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#3498DB">
    Allocation Methods
  </text>
  
  <!-- Section 1: Contiguous Allocation -->
  <section id="contiguous-allocation" style="background-color: #F7F7F7; padding: 20px; margin-bottom: 20px;">
    <data-narration data-narration-id="section-1" data-topic-id="allocation-methods">
      <h2>Contiguous Allocation</h2>
      <p>Each file occupies contiguous blocks on disk.</p>
      <ul>
        <li><strong>Directory Entry:</strong> (filename, start_block, length)</li>
        <li><strong>Advantages:</strong> Simple implementation, excellent read performance, supports direct access</li>
        <li><strong>Disadvantages:</strong> External fragmentation, file size must be known at creation, difficult to grow files</li>
      </ul>
      <svg width="100%" height="200" viewBox="0 0 100 200">
        <rect x="20" y="20" width="60" height="160" fill="#F7F7F7" rx="10" />
        <text x="50%" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#666666">
          Directory Entry: (filename, start_block, length)
        </text>
        <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0" repeatCount="indefinite" />
      </svg>