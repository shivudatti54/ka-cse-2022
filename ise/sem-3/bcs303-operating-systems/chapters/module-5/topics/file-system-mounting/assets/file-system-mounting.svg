<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="file-system-mounting">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="File System Mounting allows attaching a filesystem stored on a device to a specific directory in the existing directory tree." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#3949AB">File System Mounting</text>
    <line x1="100" y1="34" x2="320" y2="34" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Mount Concept — disk partition plugging into mount point -->
  <g data-narration="Mounting attaches a disk partition with a filesystem like ext4 to a directory called the mount point, such as /mnt/data, making its contents accessible in the directory tree." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Directory tree side -->
    <text x="60" y="58" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Directory Tree</text>
    <text x="30" y="74" font-family="monospace" font-size="9" fill="#283593">/</text>
    <line x1="34" y1="76" x2="34" y2="86" stroke="#5C6BC0" stroke-width="1"/>
    <text x="40" y="94" font-family="monospace" font-size="9" fill="#283593">mnt/</text>
    <line x1="48" y1="96" x2="48" y2="106" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="52" y="100" width="70" height="16" fill="#3949AB" rx="3"/>
    <text x="87" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="white">/mnt/data</text>
    <text x="87" y="126" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">(mount point)</text>

    <!-- Arrow showing plug-in action -->
    <line x1="175" y1="105" x2="145" y2="105" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <defs>
      <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
      </marker>
    </defs>
    <text x="160" y="98" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">mount</text>

    <!-- Disk partition -->
    <rect x="180" y="88" width="90" height="36" fill="white" stroke="#3949AB" stroke-width="1.5" rx="5"/>
    <text x="225" y="102" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">/dev/sda1</text>
    <text x="225" y="114" text-anchor="middle" font-family="Arial" font-size="7" fill="#5C6BC0">ext4 filesystem</text>

    <!-- Disk icon -->
    <ellipse cx="310" cy="100" rx="28" ry="12" fill="#C5CAE9" stroke="#3949AB" stroke-width="1"/>
    <rect x="282" y="100" width="56" height="16" fill="#C5CAE9" stroke="#3949AB" stroke-width="1"/>
    <ellipse cx="310" cy="116" rx="28" ry="12" fill="#9FA8DA" stroke="#3949AB" stroke-width="1"/>
    <text x="310" y="120" text-anchor="middle" font-family="Arial" font-size="7" fill="#1A237E">Disk</text>
  </g>

  <!-- Group 3: Before/After Mounting side by side -->
  <g data-narration="Before mounting, the directory /mnt/data is an empty folder. After mounting, it reveals the contents of the partition including files and subdirectories." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Before box -->
    <rect x="15" y="140" width="185" height="72" fill="white" stroke="#00695C" stroke-width="1.5" rx="6"/>
    <rect x="15" y="140" width="185" height="16" fill="#00695C" rx="6"/>
    <rect x="15" y="150" width="185" height="6" fill="#00695C"/>
    <text x="107" y="152" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Before Mounting</text>
    <text x="30" y="172" font-family="monospace" font-size="9" fill="#00695C">/mnt/data/</text>
    <text x="50" y="186" font-family="Arial" font-size="8" fill="#999">(empty directory)</text>
    <rect x="40" y="192" width="60" height="12" fill="#E0F2F1" stroke="#B2DFDB" rx="2"/>
    <text x="70" y="201" text-anchor="middle" font-family="Arial" font-size="7" fill="#999">no files</text>

    <!-- After box -->
    <rect x="220" y="140" width="185" height="72" fill="white" stroke="#00695C" stroke-width="1.5" rx="6"/>
    <rect x="220" y="140" width="185" height="16" fill="#00695C" rx="6"/>
    <rect x="220" y="150" width="185" height="6" fill="#00695C"/>
    <text x="312" y="152" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">After Mounting</text>
    <text x="235" y="172" font-family="monospace" font-size="9" fill="#00695C">/mnt/data/</text>
    <rect x="240" y="177" width="50" height="11" fill="#E0F2F1" stroke="#80CBC4" rx="2"/>
    <text x="265" y="185" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">file1.txt</text>
    <rect x="296" y="177" width="50" height="11" fill="#E0F2F1" stroke="#80CBC4" rx="2"/>
    <text x="321" y="185" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">file2.log</text>
    <rect x="352" y="177" width="40" height="11" fill="#E0F2F1" stroke="#80CBC4" rx="2"/>
    <text x="372" y="185" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">dir1/</text>
    <text x="260" y="204" font-family="Arial" font-size="7" fill="#00695C">Partition contents visible</text>
  </g>

  <!-- Group 4: Common Mount Points as directory tree -->
  <g data-narration="Linux uses standard mount points: root slash, /home for user files, /boot for boot loader, /mnt and /media for temporary and removable mounts, and /tmp for temporary data." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="15" y="228" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Common Linux Mount Points</text>
    <!-- Root -->
    <text x="30" y="244" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">/</text>
    <line x1="34" y1="246" x2="34" y2="254" stroke="#F57C00" stroke-width="1"/>
    <!-- Branches -->
    <line x1="34" y1="254" x2="50" y2="254" stroke="#F57C00" stroke-width="1"/>
    <line x1="34" y1="254" x2="34" y2="296" stroke="#F57C00" stroke-width="1"/>
    <!-- /home -->
    <rect x="52" y="247" width="48" height="14" fill="#FFF3E0" stroke="#E65100" rx="3"/>
    <text x="76" y="257" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">/home</text>
    <text x="106" y="257" font-family="Arial" font-size="6" fill="#BF360C">/dev/sda2</text>
    <!-- /boot -->
    <line x1="34" y1="268" x2="50" y2="268" stroke="#F57C00" stroke-width="1"/>
    <rect x="52" y="261" width="44" height="14" fill="#FFF3E0" stroke="#E65100" rx="3"/>
    <text x="74" y="271" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">/boot</text>
    <text x="102" y="271" font-family="Arial" font-size="6" fill="#BF360C">/dev/sda1</text>
    <!-- /mnt -->
    <line x1="34" y1="282" x2="50" y2="282" stroke="#F57C00" stroke-width="1"/>
    <rect x="52" y="275" width="40" height="14" fill="#FFF3E0" stroke="#E65100" rx="3"/>
    <text x="72" y="285" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">/mnt</text>
    <text x="98" y="285" font-family="Arial" font-size="6" fill="#BF360C">manual mounts</text>
    <!-- /media -->
    <line x1="34" y1="296" x2="50" y2="296" stroke="#F57C00" stroke-width="1"/>
    <rect x="52" y="289" width="50" height="14" fill="#FFF3E0" stroke="#E65100" rx="3"/>
    <text x="77" y="299" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">/media</text>
    <text x="108" y="299" font-family="Arial" font-size="6" fill="#BF360C">removable (USB, CD)</text>

    <!-- /tmp -->
    <rect x="200" y="247" width="40" height="14" fill="#FFF3E0" stroke="#E65100" rx="3"/>
    <text x="220" y="257" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">/tmp</text>
    <text x="246" y="257" font-family="Arial" font-size="6" fill="#BF360C">tmpfs (RAM)</text>
  </g>

  <!-- Group 5: VFS Abstraction Layer -->
  <g data-narration="The Virtual File System provides a uniform API so applications can use the same read, write, and open calls regardless of whether the underlying filesystem is ext4, NTFS, or FAT32." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="255" y="228" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Virtual File System (VFS)</text>

    <!-- Applications layer -->
    <rect x="260" y="236" width="145" height="18" fill="#FFCDD2" stroke="#C62828" stroke-width="1" rx="4"/>
    <text x="332" y="249" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Applications</text>
    <!-- Arrow down -->
    <line x1="332" y1="254" x2="332" y2="262" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="328,262 332,268 336,262" fill="#C62828"/>

    <!-- VFS API layer -->
    <rect x="260" y="270" width="145" height="18" fill="#C62828" rx="4"/>
    <text x="332" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">VFS API (open, read, write)</text>
    <!-- Arrow down -->
    <line x1="300" y1="288" x2="300" y2="296" stroke="#C62828" stroke-width="1"/>
    <polygon points="296,296 300,302 304,296" fill="#C62828"/>
    <line x1="332" y1="288" x2="332" y2="296" stroke="#C62828" stroke-width="1"/>
    <polygon points="328,296 332,302 336,296" fill="#C62828"/>
    <line x1="365" y1="288" x2="365" y2="296" stroke="#C62828" stroke-width="1"/>
    <polygon points="361,296 365,302 369,296" fill="#C62828"/>

    <!-- FS drivers -->
    <rect x="270" y="303" width="38" height="16" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="3"/>
    <text x="289" y="314" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">ext4</text>
    <rect x="314" y="303" width="38" height="16" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="3"/>
    <text x="333" y="314" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">NTFS</text>
    <rect x="358" y="303" width="42" height="16" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="3"/>
    <text x="379" y="314" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">FAT32</text>

    <text x="332" y="332" text-anchor="middle" font-family="Arial" font-size="7" font-style="italic" fill="#C62828">Same interface, any filesystem</text>
  </g>

  <!-- Group 6: Mount/Umount Commands -->
  <g data-narration="The mount command attaches a device to a directory: mount /dev/sda1 /mnt/data. The umount command detaches it: umount /mnt/data. These are essential Linux administration commands." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="15" y="340" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Mount / Unmount Commands</text>

    <!-- mount command box -->
    <rect x="15" y="348" width="245" height="20" fill="#1A237E" rx="4"/>
    <text x="22" y="360" font-family="monospace" font-size="8" fill="#76FF03">$ </text>
    <text x="34" y="360" font-family="monospace" font-size="8" fill="#E8EAF6">mount /dev/sda1 /mnt/data</text>
    <text x="268" y="361" font-family="Arial" font-size="7" fill="#3949AB">attach</text>

    <!-- umount command box -->
    <rect x="15" y="374" width="245" height="20" fill="#1A237E" rx="4"/>
    <text x="22" y="386" font-family="monospace" font-size="8" fill="#76FF03">$ </text>
    <text x="34" y="386" font-family="monospace" font-size="8" fill="#E8EAF6">umount /mnt/data</text>
    <text x="268" y="387" font-family="Arial" font-size="7" fill="#C62828">detach</text>

    <!-- Visual indicators -->
    <rect x="295" y="350" width="16" height="16" fill="#4CAF50" rx="3"/>
    <text x="303" y="362" text-anchor="middle" font-family="Arial" font-size="10" fill="white">+</text>
    <rect x="295" y="376" width="16" height="16" fill="#C62828" rx="3"/>
    <text x="303" y="387" text-anchor="middle" font-family="Arial" font-size="9" fill="white">-</text>

    <!-- fstab note -->
    <rect x="320" y="350" width="90" height="42" fill="white" stroke="#5C6BC0" stroke-width="1" rx="4" stroke-dasharray="3,2"/>
    <text x="365" y="363" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">/etc/fstab</text>
    <text x="365" y="374" text-anchor="middle" font-family="Arial" font-size="6" fill="#5C6BC0">Persistent mounts</text>
    <text x="365" y="384" text-anchor="middle" font-family="Arial" font-size="6" fill="#5C6BC0">applied at boot</text>
  </g>
</svg>