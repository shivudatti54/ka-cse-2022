<svg width="420" height="400" data-topic-id="implementation-of-file-system-file-system-file-con" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-image: url('https://images.unsplash.com/photo-1551584934-873c2e6c4a7c/1600x?ixid=eyJhcHBfaWxpaWxuM3dwaG90cyZ2L2FwaS9zdGF0aWMiLCJweCI6MjIwMDIwLCJfYmxpY2VfYmxpY2UiLCJ3aW5lbmN0b3J5cy9zY2hlY2VfYmxpY2VfX1wiLCJ1c2VyX1lvdXNlci1zdW5zdGlvbi1zdW5zdGlvbi1zdW5zdGlvbiJ9')">
  <title Implementation of File System: File System: File Concept</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4F69C5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <text x="10" y="10" font-size="24" text-anchor="start" fill="#333" fill-opacity="0.8">Implementation of File System: File System: File Concept</text>
  <rect x="10" y="40" width="400" height="300" fill="url(#pastel-gradient)"/>
  <g opacity="0.8" transform="translate(20, 50)">
    <rect x="0" y="0" width="200" height="100" fill="#C9E4CA" rx="10"/>
    <text x="10" y="10" font-size="18" text-anchor="start" fill="#333">Definition of a File</text>
    <text x="10" y="40" font-size="18" text-anchor="start" fill="#333" data-narration="A file is a collection of data that is stored in a computer's memory or on a storage device. Files can contain text, images, audio, video, and other types of data. A file is identified by a unique name and is associated with a file type, which determines how the data is displayed and used." transform="translate(0, 50) rotate(45)" fill="#666"/>
    <animate transform="rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="70" width="190" height="30" fill="#4F69C5" rx="5"/>
    <text x="20" y="80" font-size="16" text-anchor="start" fill="#fff">Name, Type, Size, Location, and Access Control</text>
    <rect x="10" y="110" width="200" height="100" fill="#C7B8EA" rx="10"/>
    <text x="10" y="130" font-size="18" text-anchor="start" fill="#333" data-narration="- Name: A file has a unique name that identifies it.
- Type: A file has a type that determines how the data is displayed and used.
- Size: A file has a size in bytes, kilobytes, megabytes, or gigabytes.
- Location: A file is stored in a specific location on a storage device.
- Access Control: A file has access control permissions that determine who can read, write, or delete the file." transform="translate(0, 150) rotate(45)" fill="#666"/>
    <animate transform="rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="180" width="190" height="30" fill="#4F69C5" rx="5"/>
    <text x="20" y="190" font-size="16" text-anchor="start" fill="#fff">Types of Files</text>
    <rect x="10" y="220" width="200" height="100" fill="#C9E4CA" rx="10"/>
    <text x="10" y="240" font-size="18" text-anchor="start" fill="#333" data-narration="- Text File: A text file contains plain text data, such as words, sentences, and paragraphs.
- Binary File: A binary file contains binary data, such as images, audio, and video.
- Executable File: An executable file contains machine code that can be executed by a computer's processor.
- Archive File: An archive file contains compressed data that can be stored on a storage device." transform="translate(0, 250) rotate(45)" fill="#666"/>
    <animate transform="rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="280" width="190" height="30" fill="#4F69C5" rx="5"/>
    <text x="20" y="290" font-size="16" text-anchor="start" fill="#fff">File System Structure</text>
    <rect x="10" y="320" width="200" height="100" fill="#C7B8EA" rx="10"/>
    <text x="10" y="340" font-size="18" text-anchor="start" fill="#333" data-narration="A file system is organized into directories, which are hierarchical structures that contain files. The file system structure consists of:
- Root Directory: The root directory is the top-level directory that contains all other directories and files.
- Subdirectories: Subdirectories are directories that are contained within a parent directory.
- Files: Files are the individual data containers within a file system." transform="translate(0, 350) rotate(45)" fill="#666"/>
    <animate transform="rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="380" width="190" height="30" fill="#4F69C5" rx="5"/>
    <text x="20" y="390" font-size="16" text-anchor="start" fill="#fff">Footer</text>
  </g>
  <g opacity="0.8" transform="translate(20, 410)">
    <rect x="0" y="0" width="200" height="100" fill="#C9E4CA" rx="10"/>
    <text x="10" y="10" font-size="18" text-anchor="start" fill="#333">References</text>
    <text x="10" y="40" font-size="18" text-anchor="start" fill="#333" data-narration="For more information on file systems, visit https://en.wikipedia.org/wiki/File_system" transform="translate(0, 50) rotate(45)" fill="#666"/>
    <animate transform="rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="70" width="190" height="30" fill="#4F69C5" rx="5"/>
    <text x="20" y="80" font-size="16" text-anchor="start" fill="#fff">Arrow Marker</text>
  </g>
</svg>