<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="file-sharing">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="File Sharing allows multiple users and processes to access the same files, essential in multi-user operating systems." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#3949AB">File Sharing in Operating Systems</text>
    <line x1="80" y1="35" x2="340" y2="35" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Unix Permissions Model -->
  <g data-narration="Unix uses a permission model with three categories: Owner, Group, and Other. Each has read, write, and execute bits shown as rwx." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- File icon -->
    <rect x="20" y="48" width="30" height="36" fill="#3949AB" rx="3" opacity="0.15"/>
    <path d="M25 52 L25 80 L45 80 L45 58 L39 52 Z" fill="none" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="29" y1="62" x2="41" y2="62" stroke="#3949AB" stroke-width="1"/>
    <line x1="29" y1="67" x2="41" y2="67" stroke="#3949AB" stroke-width="1"/>
    <line x1="29" y1="72" x2="38" y2="72" stroke="#3949AB" stroke-width="1"/>
    <text x="60" y="58" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Unix Permission Model</text>
    <!-- Permission table header -->
    <rect x="60" y="64" width="340" height="18" fill="#3949AB" rx="2"/>
    <text x="140" y="77" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Owner</text>
    <text x="230" y="77" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Group</text>
    <text x="320" y="77" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Other</text>
    <!-- Permission bits -->
    <rect x="60" y="82" width="340" height="20" fill="#3949AB" rx="2" opacity="0.08"/>
    <text x="140" y="96" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#3949AB">r w x</text>
    <text x="230" y="96" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#3949AB">r - x</text>
    <text x="320" y="96" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#3949AB">r - -</text>
    <!-- Numeric -->
    <text x="210" y="114" text-anchor="middle" font-family="monospace" font-size="10" fill="#5C6BC0">chmod 754 = rwxr-xr--</text>
  </g>

  <!-- Group 3: Access Control Lists -->
  <g data-narration="Access Control Lists provide finer-grained control than basic permissions. Each user or group can have individually specified access rights." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="30" y="140" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Access Control Lists (ACLs)</text>
    <!-- ACL Table -->
    <rect x="30" y="146" width="170" height="18" fill="#00695C" rx="2"/>
    <text x="70" y="159" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Identity</text>
    <text x="155" y="159" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Permissions</text>
    <!-- Row 1 -->
    <rect x="30" y="164" width="170" height="16" fill="#00695C" rx="1" opacity="0.08"/>
    <text x="70" y="176" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">User:Alice</text>
    <text x="155" y="176" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">R W</text>
    <!-- Row 2 -->
    <rect x="30" y="180" width="170" height="16" fill="#00695C" rx="1" opacity="0.04"/>
    <text x="70" y="192" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">User:Bob</text>
    <text x="155" y="192" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">R</text>
    <!-- Row 3 -->
    <rect x="30" y="196" width="170" height="16" fill="#00695C" rx="1" opacity="0.08"/>
    <text x="70" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">Group:Dev</text>
    <text x="155" y="208" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">R W X</text>
    <!-- Annotation -->
    <text x="30" y="224" font-family="Arial" font-size="8" fill="#00897B" font-style="italic">Fine-grained per-user/group control</text>
  </g>

  <!-- Group 4: File Locking -->
  <g data-narration="File locking prevents conflicts. A shared lock allows multiple readers simultaneously, while an exclusive lock permits only a single writer at a time." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="240" y="140" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">File Locking Mechanisms</text>
    <!-- Shared Lock Box -->
    <rect x="225" y="148" width="180" height="42" fill="#E65100" rx="4" opacity="0.1"/>
    <rect x="228" y="150" width="174" height="14" fill="#E65100" rx="2" opacity="0.2"/>
    <text x="315" y="161" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Shared Lock</text>
    <!-- Multiple reader icons -->
    <circle cx="255" cy="178" r="6" fill="none" stroke="#E65100" stroke-width="1.2"/>
    <line x1="255" y1="184" x2="255" y2="190" stroke="#E65100" stroke-width="1.2"/>
    <text x="255" y="176" text-anchor="middle" font-family="Arial" font-size="5" fill="#E65100">R</text>
    <circle cx="285" cy="178" r="6" fill="none" stroke="#E65100" stroke-width="1.2"/>
    <line x1="285" y1="184" x2="285" y2="190" stroke="#E65100" stroke-width="1.2"/>
    <text x="285" y="176" text-anchor="middle" font-family="Arial" font-size="5" fill="#E65100">R</text>
    <circle cx="315" cy="178" r="6" fill="none" stroke="#E65100" stroke-width="1.2"/>
    <line x1="315" y1="184" x2="315" y2="190" stroke="#E65100" stroke-width="1.2"/>
    <text x="315" y="176" text-anchor="middle" font-family="Arial" font-size="5" fill="#E65100">R</text>
    <text x="360" y="182" font-family="Arial" font-size="8" fill="#E65100">OK</text>
    <!-- Exclusive Lock Box -->
    <rect x="225" y="196" width="180" height="42" fill="#E65100" rx="4" opacity="0.1"/>
    <rect x="228" y="198" width="174" height="14" fill="#E65100" rx="2" opacity="0.2"/>
    <text x="315" y="209" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Exclusive Lock</text>
    <!-- Single writer icon -->
    <circle cx="270" cy="226" r="6" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <line x1="270" y1="232" x2="270" y2="238" stroke="#E65100" stroke-width="1.5"/>
    <text x="270" y="224" text-anchor="middle" font-family="Arial" font-size="5" fill="#E65100">W</text>
    <!-- Blocked users with X -->
    <circle cx="310" cy="226" r="6" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="306" y1="222" x2="314" y2="230" stroke="#C62828" stroke-width="1.5"/>
    <line x1="314" y1="222" x2="306" y2="230" stroke="#C62828" stroke-width="1.5"/>
    <circle cx="340" cy="226" r="6" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="336" y1="222" x2="344" y2="230" stroke="#C62828" stroke-width="1.5"/>
    <line x1="344" y1="222" x2="336" y2="230" stroke="#C62828" stroke-width="1.5"/>
    <text x="370" y="230" font-family="Arial" font-size="8" fill="#C62828">Blocked</text>
  </g>

  <!-- Group 5: Network File Sharing -->
  <g data-narration="Network file sharing lets clients access remote files as if they were local. NFS and CIFS are common protocols in a client-server architecture." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="262" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Network File Sharing (NFS / CIFS)</text>
    <!-- Client box -->
    <rect x="20" y="272" width="80" height="44" fill="#3949AB" rx="5" opacity="0.12"/>
    <rect x="30" y="278" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="60" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="white">NFS Client</text>
    <text x="60" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Application</text>
    <!-- Arrow: Client to Network -->
    <line x1="100" y1="293" x2="140" y2="293" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <!-- Network cloud -->
    <ellipse cx="180" cy="293" rx="35" ry="18" fill="#5C6BC0" opacity="0.15" stroke="#3949AB" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="180" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Network</text>
    <!-- Arrow: Network to Server -->
    <line x1="215" y1="293" x2="255" y2="293" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <!-- Server box -->
    <rect x="255" y="272" width="80" height="44" fill="#3949AB" rx="5" opacity="0.12"/>
    <rect x="265" y="278" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="295" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="white">NFS Server</text>
    <text x="295" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Export FS</text>
    <!-- Arrow: Server to Disk -->
    <line x1="335" y1="293" x2="365" y2="293" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <!-- Disk icon -->
    <ellipse cx="388" cy="286" rx="18" ry="6" fill="#3949AB" opacity="0.2" stroke="#3949AB" stroke-width="1"/>
    <rect x="370" y="286" width="36" height="16" fill="#C5CAE9" stroke="#3949AB" stroke-width="1"/>
    <ellipse cx="388" cy="302" rx="18" ry="6" fill="#3949AB" opacity="0.2" stroke="#3949AB" stroke-width="1"/>
    <text x="388" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Disk</text>
    <!-- Arrow marker definition -->
    <defs>
      <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
      </marker>
    </defs>
    <!-- Label -->
    <text x="210" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#5C6BC0" font-style="italic">"Access remote files as if they were local"</text>
  </g>

  <!-- Group 6: Challenges -->
  <g data-narration="File sharing poses challenges including maintaining consistency across users, deadlocks from locking, and security risks when sharing files over networks." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="355" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Key Challenges</text>
    <!-- Challenge 1 -->
    <rect x="20" y="362" width="120" height="26" fill="#C62828" rx="4" opacity="0.1"/>
    <text x="80" y="374" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828" font-weight="bold">Consistency</text>
    <text x="80" y="385" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Concurrent updates</text>
    <!-- Challenge 2 -->
    <rect x="150" y="362" width="120" height="26" fill="#C62828" rx="4" opacity="0.1"/>
    <text x="210" y="374" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828" font-weight="bold">Deadlocks</text>
    <text x="210" y="385" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">From lock contention</text>
    <!-- Challenge 3 -->
    <rect x="280" y="362" width="120" height="26" fill="#C62828" rx="4" opacity="0.1"/>
    <text x="340" y="374" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828" font-weight="bold">Security</text>
    <text x="340" y="385" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Across networks</text>
  </g>
</svg>