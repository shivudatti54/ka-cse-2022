<svg width="420" height="400" data-topic-id="operating-system-operations" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title and footer -->
  <text x="10" y="10" font-size="24" font-family="Arial" text-anchor="start" fill="#2F4F7F">Operating System Operations</text>
  <text x="10" y="390" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Diagram</text>
  
  <!-- Narration sections -->
  <section data-narration="Boolean Algebra" id="boolean-algebra">
    <rect x="20" y="50" width="380" height="100" fill="#F7D2C4"/>
    <text x="20" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Boolean Algebra</text>
    <animate attributeName="opacity" dur="2000" begin="0s" repeatCount="indefinite" from="1" to="0"/>
    <text x="20" y="150" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">A branch of mathematics dealing with variables with two possible values: true (1) and false (0)</text>
  </section>
  <section data-narration="Fundamental Operations" id="fundamental-operations">
    <rect x="20" y="170" width="380" height="100" fill="#C7B8EA"/>
    <text x="20" y="190" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Fundamental Operations</text>
    <animate attributeName="opacity" dur="2000" begin="2s" repeatCount="indefinite" from="1" to="0"/>
    <rect x="50" y="50" width="50" height="50" fill="#FFC107" rx="10" marker-end="url(#arrow-markers)"/>
    <text x="120" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">AND Operation (Conjunction)</text>
    <rect x="150" y="50" width="50" height="50" fill="#FFC107" rx="10" marker-end="url(#arrow-markers)"/>
    <text x="220" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">OR Operation (Disjunction)</text>
  </section>
  <section data-narration="NOT Operation" id="not-operation">
    <rect x="20" y="300" width="380" height="100" fill="#B2FFFC"/>
    <text x="20" y="320" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">NOT Operation (Negation/Complement)</text>
    <animate attributeName="opacity" dur="2000" begin="4s" repeatCount="indefinite" from="1" to="0"/>
    <rect x="50" y="250" width="50" height="50" fill="#FFC107" rx="10" marker-end="url(#arrow-markers)"/>
    <text x="120" y="250" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Inverts the input</text>
  </section>
  <section data-narration="Derived Operations" id="derived-operations">
    <rect x="20" y="330" width="380" height="100" fill="#C7B8EA"/>
    <text x="20" y="350" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Derived Operations</text>
    <animate attributeName="opacity" dur="2000" begin="6s" repeatCount="indefinite" from="1" to="0"/>
    <rect x="50" y="300" width="50" height="50" fill="#FFC107" rx="10" marker-end="url(#arrow-markers)"/>
    <text x="120" y="300" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">XOR (Exclusive OR)</text>
    <rect x="150" y="300" width="50" height="50" fill="#FFC107" rx="10" marker-end="url(#arrow-markers)"/>
    <text x="220" y="300" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">XNOR (Exclusive NOR)</text>
  </section>
  <section data-narration="XNOR (Exclusive NOR)" id="xnor-operation">
    <rect x="20" y="370" width="380" height="100" fill="#B2FFFC"/>
    <text x="20" y="390" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">XNOR (Exclusive NOR)</text>
    <animate attributeName="opacity" dur="2000" begin="8s" repeatCount="indefinite" from="1" to="0"/>
    <rect x="50" y="330" width="50" height="50" fill="#FFC107" rx="10" marker-end="url(#arrow-markers)"/>
    <text x="120" y="330" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Outputs 1 when inputs are same</text>
  </section>
</svg>