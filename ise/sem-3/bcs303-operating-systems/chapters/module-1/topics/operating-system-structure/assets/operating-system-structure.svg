<svg
  width="420"
  height="400"
  data-topic-id="operating-system-structure"
  viewBox="0 0 420 400"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="background-image: linear-gradient(to bottom, #7A809B, #517F8F);">
  <title>Operating System Structure</title>
  <footer>Learn about the structure of an Operating System</footer>
  <g id=" Diagram" transform="translate(20 260)">
    <rect x="10" y="10" width="400" height="120" fill="#E5E5EA" rx="10"/>
    <rect x="10" y="140" width="400" height="120" fill="#E5E5EA" rx="10"/>
    <rect x="10" y="270" width="400" height="120" fill="#E5E5EA" rx="10"/>
    <rect x="10" y="400" width="400" height="20" fill="#E5E5EA" rx="5"/>
    <path d="M 100 350 L 300 350 L 300 100 L 100 100 Z" stroke="#3B5998" stroke-width="5" fill="none"/>
    <path d="M 50 250 L 320 250 L 320 150 L 50 150 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
    <path d="M 200 250 L 320 250 L 320 150 L 200 150 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
    <path d="M 250 200 L 320 200 L 320 150 L 250 150 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
    <path d="M 20 200 L 50 200 L 50 150 L 20 150 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
    <path d="M 100 100 L 120 100 L 120 50 L 100 50 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
    <path d="M 100 220 L 120 220 L 120 260 L 100 260 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
    <path d="M 320 220 L 300 220 L 300 260 L 320 260 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
    <rect x="60" y="120" width="110" height="30" fill="#C4C4C4" rx="5"/>
    <rect x="60" y="180" width="110" height="30" fill="#C4C4C4" rx="5"/>
    <rect x="60" y="240" width="110" height="30" fill="#C4C4C4" rx="5"/>
    <rect x="210" y="120" width="110" height="30" fill="#C4C4C4" rx="5"/>
    <rect x="210" y="180" width="110" height="30" fill="#C4C4C4" rx="5"/>
    <rect x="210" y="240" width="110" height="30" fill="#C4C4C4" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 260" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="0.5s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="1.5s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="2s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="2.5s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="3s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="3.5s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="4s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="4.5s"/>
    <g id="Section1">
      <rect x="10" y="10" width="400" height="120" fill="#E5E5EA" rx="10"/>
      <rect x="10" y="140" width="400" height="120" fill="#E5E5EA" rx="10"/>
      <rect x="10" y="270" width="400" height="120" fill="#E5E5EA" rx="10"/>
      <rect x="10" y="400" width="400" height="20" fill="#E5E5EA" rx="5"/>
      <path d="M 100 350 L 300 350 L 300 100 L 100 100 Z" stroke="#3B5998" stroke-width="5" fill="none"/>
      <text x="50" y="150" text-anchor="middle" font-size="18" fill="#4F4F4F">Hardware Abstraction Layer (HAL)</text>
      <text x="50" y="170" text-anchor="middle" font-size="14" fill="#4F4F4F">Provides a standardized interface to hardware components</text>
    </g>
    <g id="Section2">
      <rect x="60" y="120" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="60" y="180" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="60" y="240" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="210" y="120" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="210" y="180" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="210" y="240" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <path d="M 100 100 L 120 100 L 120 50 L 100 50 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
      <text x="100" y="120" text-anchor="middle" font-size="18" fill="#4F4F4F">Device Driver</text>
      <text x="100" y="140" text-anchor="middle" font-size="14" fill="#4F4F4F">Translates requests from the operating system into instructions that the hardware can understand</text>
    </g>
    <g id="Section3">
      <rect x="60" y="120" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="60" y="180" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="60" y="240" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="210" y="120" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="210" y="180" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <rect x="210" y="240" width="110" height="30" fill="#C4C4C4" rx="5"/>
      <path d="M 200 100 L 220 100 L 220 50 L 200 50 Z" stroke="#8E44AD" stroke-width="5" fill="none"/>
      <text x="200" y="120" text-anchor="middle" font-size="18" fill="#4F4F4F">Process Management</text>
      <text x="200" y="140" text-anchor="middle" font-size="14" fill="#4F4F4F">Creates, schedules, and terminates processes</text>
    </g>
  </g>
</svg>