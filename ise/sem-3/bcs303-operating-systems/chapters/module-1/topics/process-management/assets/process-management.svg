<svg xmlns="http://www.w3.org/2000/svg" width="420" height="1300" data-topic-id="process-management">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="420" height="1300" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== GROUP 1: Title (0.3s) ===== -->
  <g data-narration="Process Management is a core OS function that handles process creation, scheduling, execution, and termination." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#3949AB">Process Management in OS</text>
    <line x1="100" y1="40" x2="320" y2="40" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ===== GROUP 2: Process State Diagram (1.5s) ===== -->
  <g data-narration="A process moves through five states: New, Ready, Running, Waiting, and Terminated. Transitions are governed by scheduling and I/O events." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#283593">Process State Diagram</text>

    <!-- New state -->
    <ellipse cx="60" cy="120" rx="38" ry="18" fill="#E8EAF6" stroke="#3949AB" stroke-width="2"/>
    <text x="60" y="124" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">New</text>

    <!-- Ready state -->
    <ellipse cx="175" cy="120" rx="38" ry="18" fill="#E8EAF6" stroke="#3949AB" stroke-width="2"/>
    <text x="175" y="124" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Ready</text>

    <!-- Running state -->
    <ellipse cx="310" cy="120" rx="42" ry="18" fill="#3949AB" stroke="#283593" stroke-width="2"/>
    <text x="310" y="124" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF">Running</text>

    <!-- Waiting state -->
    <ellipse cx="245" cy="200" rx="42" ry="18" fill="#E8EAF6" stroke="#3949AB" stroke-width="2"/>
    <text x="245" y="204" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Waiting</text>

    <!-- Terminated state -->
    <ellipse cx="395" cy="200" rx="20" ry="18" fill="#E8EAF6" stroke="#C62828" stroke-width="2"/>
    <text x="395" y="196" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Termi-</text>
    <text x="395" y="206" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">nated</text>

    <!-- Arrow: New -> Ready (admit) -->
    <line x1="98" y1="120" x2="132" y2="120" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="115" y="113" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-style="italic">admit</text>

    <!-- Arrow: Ready -> Running (dispatch) -->
    <line x1="213" y1="120" x2="262" y2="120" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="238" y="113" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-style="italic">dispatch</text>

    <!-- Arrow: Running -> Ready (interrupt) - curved above -->
    <path d="M290 103 Q240 78 195 103" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="240" y="85" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100" font-style="italic">interrupt</text>

    <!-- Arrow: Running -> Waiting (I/O wait) -->
    <line x1="295" y1="138" x2="260" y2="182" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="290" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-style="italic">I/O wait</text>

    <!-- Arrow: Waiting -> Ready (I/O complete) -->
    <line x1="210" y1="193" x2="195" y2="140" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="190" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C" font-style="italic">I/O done</text>

    <!-- Arrow: Running -> Terminated (exit) -->
    <line x1="340" y1="135" x2="380" y2="185" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <text x="370" y="157" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828" font-style="italic">exit</text>
  </g>

  <!-- ===== GROUP 3: PCB (Process Control Block) (3.0s) ===== -->
  <g data-narration="The Process Control Block stores all information about a process: its ID, state, program counter, CPU registers, memory info, and I/O status." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="258" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#00695C">Process Control Block (PCB)</text>

    <!-- PCB outer box -->
    <rect x="120" y="268" width="180" height="220" fill="#E0F2F1" stroke="#00695C" stroke-width="2" rx="6"/>

    <!-- PCB Header -->
    <rect x="120" y="268" width="180" height="28" fill="#00695C" rx="6"/>
    <rect x="120" y="284" width="180" height="12" fill="#00695C"/>
    <text x="210" y="287" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#FFFFFF">PCB</text>

    <!-- Field: Process ID -->
    <line x1="130" y1="318" x2="290" y2="318" stroke="#00695C" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="140" y="312" font-family="monospace" font-size="10" fill="#00695C">Process ID</text>
    <text x="260" y="312" font-family="monospace" font-size="9" fill="#004D40" text-anchor="end">PID: 1024</text>

    <!-- Field: State -->
    <line x1="130" y1="340" x2="290" y2="340" stroke="#00695C" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="140" y="334" font-family="monospace" font-size="10" fill="#00695C">State</text>
    <text x="260" y="334" font-family="monospace" font-size="9" fill="#004D40" text-anchor="end">Running</text>

    <!-- Field: Program Counter -->
    <line x1="130" y1="362" x2="290" y2="362" stroke="#00695C" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="140" y="356" font-family="monospace" font-size="10" fill="#00695C">Program Counter</text>
    <text x="260" y="356" font-family="monospace" font-size="9" fill="#004D40" text-anchor="end">0x7FFA</text>

    <!-- Field: CPU Registers -->
    <line x1="130" y1="384" x2="290" y2="384" stroke="#00695C" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="140" y="378" font-family="monospace" font-size="10" fill="#00695C">CPU Registers</text>
    <text x="260" y="378" font-family="monospace" font-size="9" fill="#004D40" text-anchor="end">AX,BX,SP...</text>

    <!-- Field: Memory Info -->
    <line x1="130" y1="406" x2="290" y2="406" stroke="#00695C" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="140" y="400" font-family="monospace" font-size="10" fill="#00695C">Memory Info</text>
    <text x="260" y="400" font-family="monospace" font-size="9" fill="#004D40" text-anchor="end">Base/Limit</text>

    <!-- Field: I/O Status -->
    <line x1="130" y1="428" x2="290" y2="428" stroke="#00695C" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="140" y="422" font-family="monospace" font-size="10" fill="#00695C">I/O Status</text>
    <text x="260" y="422" font-family="monospace" font-size="9" fill="#004D40" text-anchor="end">Open files</text>

    <!-- Field: Scheduling Info -->
    <text x="140" y="448" font-family="monospace" font-size="10" fill="#00695C">Scheduling Info</text>
    <text x="260" y="448" font-family="monospace" font-size="9" fill="#004D40" text-anchor="end">Priority: 5</text>

    <!-- Pointer icon -->
    <text x="210" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#004D40" font-style="italic">One PCB per process in the system</text>
  </g>

  <!-- ===== GROUP 4: Context Switching (4.5s) ===== -->
  <g data-narration="Context switching saves the state of the current process into its PCB and loads the saved state of the next process, allowing the CPU to switch between processes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="515" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E65100">Context Switch</text>

    <!-- Timeline line -->
    <line x1="210" y1="530" x2="210" y2="710" stroke="#E65100" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="210" y="526" text-anchor="middle" font-family="Arial" font-size="8" fill="#BF360C">CPU Timeline</text>

    <!-- P1 Running (left side, top) -->
    <rect x="30" y="535" width="150" height="35" fill="#E65100" rx="5"/>
    <text x="105" y="557" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">P1 Running</text>

    <!-- Save state P1 arrow -->
    <path d="M180 560 L210 580" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="170" y="578" text-anchor="end" font-family="Arial" font-size="8" fill="#E65100">save state</text>

    <!-- PCB1 box -->
    <rect x="40" y="585" width="130" height="30" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" rx="4"/>
    <text x="105" y="604" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">PCB1 (P1 state)</text>

    <!-- Idle marker -->
    <rect x="185" y="580" width="50" height="20" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="3"/>
    <text x="210" y="594" text-anchor="middle" font-family="Arial" font-size="8" fill="#BF360C">switch</text>

    <!-- Load state P2 arrow -->
    <path d="M210 610 L250 630" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="255" y="618" font-family="Arial" font-size="8" fill="#E65100">load state</text>

    <!-- PCB2 box -->
    <rect x="250" y="620" width="130" height="30" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" rx="4"/>
    <text x="315" y="639" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">PCB2 (P2 state)</text>

    <!-- P2 Running (right side, bottom) -->
    <rect x="240" y="660" width="150" height="35" fill="#E65100" rx="5"/>
    <text x="315" y="682" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">P2 Running</text>

    <!-- Overhead label -->
    <rect x="130" y="700" width="160" height="18" fill="#FBE9E7" stroke="#E65100" stroke-width="1" rx="3"/>
    <text x="210" y="713" text-anchor="middle" font-family="Arial" font-size="8" fill="#BF360C" font-style="italic">Context switch = overhead (no useful work)</text>
  </g>

  <!-- ===== GROUP 5: Process Creation with fork() (6.0s) ===== -->
  <g data-narration="The fork system call creates a new child process. The parent receives the child's PID as the return value, while the child receives 0." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="750" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Process Creation: fork()</text>

    <!-- Parent process box -->
    <rect x="140" y="765" width="140" height="40" fill="#3949AB" rx="6"/>
    <text x="210" y="783" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF">Parent Process</text>
    <text x="210" y="797" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">PID = 100</text>

    <!-- fork() call label -->
    <rect x="175" y="812" width="70" height="20" fill="#5C6BC0" rx="10"/>
    <text x="210" y="826" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#FFFFFF">fork()</text>

    <!-- Fork arrows diverging -->
    <line x1="175" y1="832" x2="105" y2="870" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="245" y1="832" x2="315" y2="870" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Parent continues (left) -->
    <rect x="35" y="875" width="140" height="55" fill="#E8EAF6" stroke="#3949AB" stroke-width="2" rx="6"/>
    <text x="105" y="893" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Parent (continues)</text>
    <text x="105" y="908" text-anchor="middle" font-family="monospace" font-size="9" fill="#283593">fork() returns:</text>
    <text x="105" y="921" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">child PID (101)</text>

    <!-- Child created (right) -->
    <rect x="245" y="875" width="140" height="55" fill="#E8EAF6" stroke="#3949AB" stroke-width="2" rx="6"/>
    <text x="315" y="893" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Child (new)</text>
    <text x="315" y="908" text-anchor="middle" font-family="monospace" font-size="9" fill="#283593">fork() returns:</text>
    <text x="315" y="921" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#00695C">0</text>

    <!-- Code snippet -->
    <rect x="80" y="940" width="260" height="70" fill="#263238" rx="5"/>
    <text x="95" y="958" font-family="monospace" font-size="9" fill="#80CBC4">pid = fork();</text>
    <text x="95" y="972" font-family="monospace" font-size="9" fill="#80CBC4">if (pid &gt; 0) {</text>
    <text x="105" y="986" font-family="monospace" font-size="9" fill="#FFCC80">  // parent code</text>
    <text x="95" y="1000" font-family="monospace" font-size="9" fill="#80CBC4">} else if (pid == 0) {</text>
    <text x="105" y="1000" font-family="monospace" font-size="9" fill="#80CBC4"/>
    <!-- Overlay for last lines -->
    <text x="105" y="1000" font-family="monospace" font-size="9" fill="#FFCC80">          // child code }</text>
  </g>

  <!-- ===== GROUP 6: Summary (7.5s) ===== -->
  <g data-narration="In summary, the OS manages the entire process lifecycle through four key operations: Create, Schedule, Execute, and Terminate." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="1050" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">OS Manages Process Lifecycle</text>

    <!-- Pill badges row -->
    <!-- Create -->
    <rect x="30" y="1065" width="80" height="28" fill="#3949AB" rx="14"/>
    <text x="70" y="1083" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">Create</text>

    <!-- Schedule -->
    <rect x="125" y="1065" width="80" height="28" fill="#00695C" rx="14"/>
    <text x="165" y="1083" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">Schedule</text>

    <!-- Execute -->
    <rect x="220" y="1065" width="80" height="28" fill="#E65100" rx="14"/>
    <text x="260" y="1083" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">Execute</text>

    <!-- Terminate -->
    <rect x="315" y="1065" width="80" height="28" fill="#C62828" rx="14"/>
    <text x="355" y="1083" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">Terminate</text>

    <!-- Connecting arrows between pills -->
    <line x1="110" y1="1079" x2="122" y2="1079" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="205" y1="1079" x2="217" y2="1079" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="300" y1="1079" x2="312" y2="1079" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Key concepts -->
    <rect x="60" y="1105" width="300" height="90" fill="#FFFFFF" stroke="#3949AB" stroke-width="1.5" rx="8" opacity="0.85"/>
    <text x="210" y="1125" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#283593">Key Takeaways</text>
    <text x="80" y="1143" font-family="Arial" font-size="9" fill="#37474F">- Process = program in execution</text>
    <text x="80" y="1158" font-family="Arial" font-size="9" fill="#37474F">- PCB stores all process metadata</text>
    <text x="80" y="1173" font-family="Arial" font-size="9" fill="#37474F">- Context switch enables multitasking</text>
    <text x="80" y="1188" font-family="Arial" font-size="9" fill="#37474F">- fork() creates a child process (copy of parent)</text>

    <!-- Bottom border -->
    <line x1="60" y1="1210" x2="360" y2="1210" stroke="#3949AB" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
</svg>