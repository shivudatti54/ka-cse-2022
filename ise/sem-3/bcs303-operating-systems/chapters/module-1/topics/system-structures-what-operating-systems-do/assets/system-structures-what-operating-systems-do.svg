<svg width="420" height="400" data-topic-id="system-structures-what-operating-systems-do">
  <rect x="10" y="10" width="400" height="380" fill="#ADD8E6" rx="10"/>
  <title>System Structures: What Operating Systems Do</title>
  <rect x="10" y="50" width="400" height="30" fill="#66CCCC" rx="10"/>
  <text x="20" y="60" font-size="18" font-family="Arial" fill="#34495D" text-anchor="start">Process Structure</text>
  <rect x="10" y="90" width="400" height="100" fill="#C9E4CA" rx="10"/>
  <animateTransform attributeName="transform" type="translate" from="0,90" to="0,100" dur="2s" begin="0s" end="2s"/>
  <data-narration x="10" y="100" font-size="14" font-family="Arial" fill="#34495D">Process Scheduling: Assigns a time slice to each process</data-narration>
  <data-narration x="10" y="120" font-size="14" font-family="Arial" fill="#34495D">Process Communication: Exchanges data between processes</data-narration>
  <data-narration x="10" y="140" font-size="14" font-family="Arial" fill="#34495D">Process Synchronization: Ensures multiple processes don't interfere</data-narration>
  <rect x="10" y="180" width="400" height="100" fill="#C9E4CA" rx="10"/>
  <animateTransform attributeName="transform" type="translate" from="0,180" to="0,200" dur="2s" begin="2s" end="4s"/>
  <data-narration x="10" y="190" font-size="14" font-family="Arial" fill="#34495D">Thread Structure: Manages multiple threads</data-narration>
  <data-narration x="10" y="210" font-size="14" font-family="Arial" fill="#34495D">Thread Scheduling: Assigns a time slice to each thread</data-narration>
  <data-narration x="10" y="230" font-size="14" font-family="Arial" fill="#34495D">Thread Communication: Exchanges data between threads</data-narration>
  <rect x="10" y="280" width="400" height="30" fill="#66CCCC" rx="10"/>
  <text x="20" y="290" font-size="18" font-family="Arial" fill="#34495D" text-anchor="start">Thread Synchronization</text>
  <rect x="10" y="330" width="400" height="50" fill="#ADD8E6" rx="10"/>
  <data-narration x="10" y="340" font-size="14" font-family="Arial" fill="#34495D">Ensures multiple threads don't interfere</data-narration>
  <footertext x="10" y="370" font-size="14" font-family="Arial" fill="#34495D">Learn more about system structures and operating systems</footertext>
  <rect x="10" y="400" width="400" height="10" fill="#ADD8E6" rx="10"/>
</svg>