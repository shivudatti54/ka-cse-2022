<svg width="420" height="400" data-topic-id="special-purpose-systems" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8CFA"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="170" y="20" font-size="24" font-weight="bold" text-anchor="middle" fill="#2E4053">
    Special Purpose Systems
  </text>
  
  <!-- Section 1: Introduction -->
  <section id="section1" data-narration="Introduction">
    <rect x="20" y="60" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="70" font-size="18" font-weight="bold" text-anchor="left" fill="#2E4053">
      A special-purpose system is a computer system designed to perform a specific function or set of functions.
    </text>
    <text x="20" y="100" font-size="16" text-anchor="left" fill="#666666">
      These systems are tailored to meet the needs of a particular industry, application, or user group.
    </text>
  </section>
  <animate transform="translate(30, 70)" begin="100ms" duration="1000ms" repeatCount="indefinite"/>
  <animate transform="translate(30, 70)" begin="300ms" duration="1000ms" repeatCount="indefinite"/>
  
  <!-- Section 2: Characteristics -->
  <section id="section2" data-narration="Characteristics">
    <rect x="20" y="160" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="170" font-size="18" font-weight="bold" text-anchor="left" fill="#2E4053">
      Narrow functionality:
    </text>
    <text x="20" y="190" font-size="16" text-anchor="left" fill="#666666">
      Special-purpose systems are designed to perform a single task or a limited set of tasks.
    </text>
    <animate transform="translate(30, 170)" begin="400ms" duration="1000ms" repeatCount="indefinite"/>
    <animate transform="translate(30, 190)" begin="800ms" duration="1000ms" repeatCount="indefinite"/>
  </section>
  <rect x="20" y="160" width="380" height="50" fill="#F7F7F7" rx="10"/>
  <rect x="20" y="170" width="380" height="50" fill="#F7F7F7" rx="10"/>
  <rect x="20" y="190" width="380" height="50" fill="#F7F7F7" rx="10"/>
  
  <!-- Section 3: Examples -->
  <section id="section3" data-narration="Examples">
    <rect x="20" y="240" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="250" font-size="18" font-weight="bold" text-anchor="left" fill="#2E4053">
      Terminal servers:
    </text>
    <text x="20" y="270" font-size="16" text-anchor="left" fill="#666666">
      Time-sharing systems:
    </text>
    <animate transform="translate(30, 250)" begin="1000ms" duration="1000ms" repeatCount="indefinite"/>
    <animate transform="translate(30, 270)" begin="1500ms" duration="1000ms" repeatCount="indefinite"/>
  </section>
  <rect x="20" y="240" width="380" height="50" fill="#F7F7F7" rx="10"/>
  <rect x="20" y="250" width="380" height="50" fill="#F7F7F7" rx="10"/>
  <rect x="20" y="270" width="380" height="50" fill="#F7F7F7" rx="10"/>
  
  <!-- Section 4: Advantages -->
  <section id="section4" data-narration="Advantages">
    <rect x="20" y="320" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="330" font-size="18" font-weight="bold" text-anchor="left" fill="#2E4053">
      High performance:
    </text>
    <text x="20" y="350" font-size="16" text-anchor="left" fill="#666666">
      Low cost:
    </text>
    <animate transform="translate(30, 330)" begin="2000ms" duration="1000ms" repeatCount="indefinite"/>
    <animate transform="translate(30, 350)" begin="2500ms" duration="1000ms" repeatCount="indefinite"/>
  </section>
  <rect x="20" y="320" width="380" height="50" fill="#F7F7F7" rx="10"/>
  <rect x="20" y="330" width="380" height="50" fill="#F7F7F7" rx="10"/>
  <rect x="20" y="350" width="380" height="50" fill="#F7F7F7" rx="10"/>
  
  <!-- Footer -->
  <rect x="0" y="380" width="420" height="20" fill="#333333"/>
  <text x="170" y="390" font-size="14" text-anchor="middle" fill="#666666">
    &copy; 2023 Special Purpose Systems
  </text>
</svg>