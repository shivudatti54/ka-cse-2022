<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="ethereum-architecture">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63B7F5" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#4BC7F5" stop-opacity="1"></stop>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"></rect>

  <!-- Title -->
  <text x="50%" y="20%" text-anchor="middle" font-size="24" fill="#3498db">
    Ethereum Architecture
  </text>

  <!-- Section 1: Ethereum Network -->
  <rect x="50" y="100" width="320" height="100" fill="#f9f9f9" rx="10" data-narration="The Ethereum network consists of thousands of nodes worldwide that maintain a shared state">
    <animate transform="rotate(0deg) scale(1)" begin="0s" dur="2s" repeat="forever"></animate>
  </rect>
  <text x="75" y="150" text-anchor="middle" font-size="18" fill="#3498db">
    Ethereum Network
  </text>
  <text x="75" y="180" text-anchor="middle" font-size="14" fill="#666">
    <tspan>Full Nodes</tspan>
    <tspan> | Light Nodes</tspan>
    <tspan> | Archive Nodes</tspan>
    <tspan> | Validator Nodes</tspan>
  </text>

  <!-- Section 2: Ethereum State -->
  <rect x="50" y="300" width="320" height="150" fill="#f9f9f9" rx="10" data-narration="Ethereum maintains a global state that includes an account state, world state, storage, and code for smart contracts">
    <animate transform="rotate(0deg) scale(1)" begin="2s" dur="2s" repeat="forever"></animate>
  </rect>
  <text x="75" y="350" text-anchor="middle" font-size="18" fill="#3498db">
    Ethereum State
  </text>
  <text x="75" y="380" text-anchor="middle" font-size="14" fill="#666">
    <tspan>Account State</tspan>
    <tspan> | World State</tspan>
    <tspan> | Storage</tspan>
    <tspan> | Code</tspan>
  </text>

  <!-- Section 3: Block Structure -->
  <rect x="50" y="500" width="320" height="100" fill="#f9f9f9" rx="10" data-narration="Each Ethereum block contains a header with a parent hash, state root, transactions root, receipts root, block number, gas limit, gas used, timestamp, and base fee">
    <animate transform="rotate(0deg) scale(1)" begin="4s" dur="2s" repeat="forever"></animate>
  </rect>
  <text x="75" y="550" text-anchor="middle" font-size="18" fill="#3498db">
    Block Structure
  </text>
  <text x="75" y="580" text-anchor="middle" font-size="14" fill="#666">
    <tspan>Block Header</tspan>
    <tspan> | State Root</tspan>
    <tspan> | Transactions Root</tspan>
    <tspan> | Receipts Root</tspan>
  </text>

  <!-- Section 4: Consensus Mechanism -->
  <rect x="50" y="700" width="320" height="100" fill="#f9f9f9" rx="10" data-narration="After The Merge, Ethereum uses Proof of Stake (PoS) with validators staking 32 ETH to participate and random selection for block proposal">
    <animate transform="rotate(0deg) scale(1)" begin="6s" dur="2s" repeat="forever"></animate>
  </rect>
  <text x="75" y="750" text-anchor="middle" font-size="18" fill="#3498db">
    Consensus Mechanism
  </text>
  <text x="75" y="780" text-anchor="middle" font-size="14" fill="#666">
    <tspan>Proof of Stake</tspan>
    <tspan> | Validator Nodes</tspan>
  </text>

  <!-- Footer -->
  <text x="50%" y="390" text-anchor="middle" font-size="18" fill="#666">
    Ethereum Architecture
  </text>
</svg>