<svg xmlns="http://www.w3.org/2000/svg" width="420" height="680" data-topic-id="protection-and-security">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="680" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="OS Protection and Security covers mechanisms to control access and defend against threats." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1A237E">OS Protection &amp; Security</text>
    <line x1="100" y1="38" x2="320" y2="38" stroke="#3949AB" stroke-width="2"/>
  </g>

  <!-- Group 2: Protection vs Security distinction -->
  <g data-narration="Protection is an internal mechanism controlling access among processes and users. Security is external, defending the system against attacks and unauthorized access." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Protection box -->
    <rect x="15" y="50" width="190" height="70" fill="#3949AB" rx="8"/>
    <text x="110" y="70" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Protection (Internal)</text>
    <text x="110" y="86" text-anchor="middle" font-family="Arial" font-size="9" fill="#E8EAF6">Control access between</text>
    <text x="110" y="98" text-anchor="middle" font-family="Arial" font-size="9" fill="#E8EAF6">processes &amp; resources</text>
    <text x="110" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#B3E5FC">WHO can do WHAT</text>
    <!-- Security box -->
    <rect x="215" y="50" width="190" height="70" fill="#00695C" rx="8"/>
    <text x="310" y="70" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Security (External)</text>
    <text x="310" y="86" text-anchor="middle" font-family="Arial" font-size="9" fill="#E0F2F1">Defend system against</text>
    <text x="310" y="98" text-anchor="middle" font-family="Arial" font-size="9" fill="#E0F2F1">attacks &amp; threats</text>
    <text x="310" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#B2DFDB">STOP unauthorized access</text>
  </g>

  <!-- Group 3: Access Matrix -->
  <g data-narration="The Access Matrix is a protection model. Rows represent domains (like users or processes), columns represent objects (files, printers). Each cell specifies the allowed operations such as read, write, or print." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="148" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1A237E">Access Matrix</text>
    <!-- Table header row -->
    <rect x="30" y="158" width="70" height="28" fill="#283593" rx="3"/>
    <text x="65" y="176" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Domain</text>
    <rect x="100" y="158" width="100" height="28" fill="#283593" rx="3"/>
    <text x="150" y="176" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">File1</text>
    <rect x="200" y="158" width="100" height="28" fill="#283593" rx="3"/>
    <text x="250" y="176" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">File2</text>
    <rect x="300" y="158" width="100" height="28" fill="#283593" rx="3"/>
    <text x="350" y="176" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Printer</text>
    <!-- Row D1 -->
    <rect x="30" y="186" width="70" height="26" fill="#3949AB" rx="2"/>
    <text x="65" y="203" text-anchor="middle" font-family="monospace" font-size="10" fill="white">D1</text>
    <rect x="100" y="186" width="100" height="26" fill="#E8EAF6" rx="2" stroke="#9FA8DA" stroke-width="1"/>
    <text x="150" y="203" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A237E">read, write</text>
    <rect x="200" y="186" width="100" height="26" fill="#E8EAF6" rx="2" stroke="#9FA8DA" stroke-width="1"/>
    <text x="250" y="203" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A237E">read</text>
    <rect x="300" y="186" width="100" height="26" fill="#E8EAF6" rx="2" stroke="#9FA8DA" stroke-width="1"/>
    <text x="350" y="203" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">--</text>
    <!-- Row D2 -->
    <rect x="30" y="212" width="70" height="26" fill="#3949AB" rx="2"/>
    <text x="65" y="229" text-anchor="middle" font-family="monospace" font-size="10" fill="white">D2</text>
    <rect x="100" y="212" width="100" height="26" fill="#F3E5F5" rx="2" stroke="#CE93D8" stroke-width="1"/>
    <text x="150" y="229" text-anchor="middle" font-family="monospace" font-size="9" fill="#4A148C">read</text>
    <rect x="200" y="212" width="100" height="26" fill="#F3E5F5" rx="2" stroke="#CE93D8" stroke-width="1"/>
    <text x="250" y="229" text-anchor="middle" font-family="monospace" font-size="9" fill="#4A148C">read, write</text>
    <rect x="300" y="212" width="100" height="26" fill="#F3E5F5" rx="2" stroke="#CE93D8" stroke-width="1"/>
    <text x="350" y="229" text-anchor="middle" font-family="monospace" font-size="9" fill="#4A148C">print</text>
    <!-- Row D3 -->
    <rect x="30" y="238" width="70" height="26" fill="#3949AB" rx="2"/>
    <text x="65" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="white">D3</text>
    <rect x="100" y="238" width="100" height="26" fill="#E0F2F1" rx="2" stroke="#80CBC4" stroke-width="1"/>
    <text x="150" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#004D40">--</text>
    <rect x="200" y="238" width="100" height="26" fill="#E0F2F1" rx="2" stroke="#80CBC4" stroke-width="1"/>
    <text x="250" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#004D40">read</text>
    <rect x="300" y="238" width="100" height="26" fill="#E0F2F1" rx="2" stroke="#80CBC4" stroke-width="1"/>
    <text x="350" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#004D40">print</text>
  </g>

  <!-- Group 4: Authentication Flow -->
  <g data-narration="Authentication verifies a user's identity. The flow starts with a user providing credentials like a password or biometric. The system verifies these, and if valid, access is granted." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="290" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#E65100">Authentication Flow</text>
    <!-- User -->
    <rect x="15" y="302" width="72" height="36" fill="#E65100" rx="6"/>
    <text x="51" y="317" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">User</text>
    <text x="51" y="329" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFE0B2">Request</text>
    <!-- Arrow 1 -->
    <polygon points="90,320 97,316 97,324" fill="#E65100"/>
    <line x1="87" y1="320" x2="97" y2="320" stroke="#E65100" stroke-width="2"/>
    <!-- Password/Biometric -->
    <rect x="100" y="302" width="90" height="36" fill="#F57C00" rx="6"/>
    <text x="145" y="317" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Password /</text>
    <text x="145" y="329" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Biometric</text>
    <!-- Arrow 2 -->
    <polygon points="193,320 200,316 200,324" fill="#E65100"/>
    <line x1="190" y1="320" x2="200" y2="320" stroke="#E65100" stroke-width="2"/>
    <!-- Verified -->
    <rect x="203" y="302" width="80" height="36" fill="#EF6C00" rx="6"/>
    <text x="243" y="317" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Verified</text>
    <text x="243" y="329" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFE0B2">Identity OK</text>
    <!-- Arrow 3 -->
    <polygon points="286,320 293,316 293,324" fill="#E65100"/>
    <line x1="283" y1="320" x2="293" y2="320" stroke="#E65100" stroke-width="2"/>
    <!-- Access Granted -->
    <rect x="296" y="302" width="108" height="36" fill="#2E7D32" rx="6"/>
    <text x="350" y="315" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Access</text>
    <text x="350" y="328" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Granted</text>
    <!-- Checkmark -->
    <circle cx="390" cy="306" r="8" fill="#A5D6A7"/>
    <polyline points="385,306 389,310 396,302" stroke="#1B5E20" stroke-width="2" fill="none"/>
  </g>

  <!-- Group 5: Security Threats -->
  <g data-narration="Major security threats include Viruses that attach to programs and spread when executed, Worms that self-replicate across networks without user action, and Trojans that disguise as legitimate software but contain malware." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="365" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#C62828">Security Threats</text>
    <!-- Virus -->
    <rect x="15" y="376" width="125" height="68" fill="#C62828" rx="8"/>
    <text x="77" y="394" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Virus</text>
    <line x1="35" y1="400" x2="105" y2="400" stroke="#EF9A9A" stroke-width="1"/>
    <text x="77" y="414" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">Attaches to host</text>
    <text x="77" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">programs; spreads</text>
    <text x="77" y="436" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">on execution</text>
    <!-- Worm -->
    <rect x="148" y="376" width="125" height="68" fill="#D32F2F" rx="8"/>
    <text x="210" y="394" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Worm</text>
    <line x1="168" y1="400" x2="253" y2="400" stroke="#EF9A9A" stroke-width="1"/>
    <text x="210" y="414" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">Self-replicating;</text>
    <text x="210" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">spreads across</text>
    <text x="210" y="436" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">networks alone</text>
    <!-- Trojan -->
    <rect x="281" y="376" width="125" height="68" fill="#B71C1C" rx="8"/>
    <text x="343" y="394" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Trojan</text>
    <line x1="301" y1="400" x2="386" y2="400" stroke="#EF9A9A" stroke-width="1"/>
    <text x="343" y="414" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">Disguised as</text>
    <text x="343" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">legitimate software;</text>
    <text x="343" y="436" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFCDD2">contains malware</text>
    <!-- Warning icons -->
    <text x="26" y="392" font-family="Arial" font-size="12" fill="#FFCDD2">!</text>
    <text x="159" y="392" font-family="Arial" font-size="12" fill="#FFCDD2">!</text>
    <text x="292" y="392" font-family="Arial" font-size="12" fill="#FFCDD2">!</text>
  </g>

  <!-- Group 6: Defense Layers -->
  <g data-narration="Defense in depth uses multiple layers. The outermost layer is the Firewall filtering network traffic, followed by Encryption protecting data, then Access Control restricting resource usage, and finally Auditing to log and review activities." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="472" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1A237E">Defense Layers (Defense in Depth)</text>
    <!-- Outermost layer: Firewall -->
    <rect x="30" y="484" width="360" height="180" fill="none" stroke="#1565C0" stroke-width="3" rx="16" stroke-dasharray="8,4"/>
    <rect x="34" y="480" width="68" height="16" fill="#1565C0" rx="4"/>
    <text x="68" y="491" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Firewall</text>
    <!-- Second layer: Encryption -->
    <rect x="60" y="508" width="300" height="144" fill="none" stroke="#00695C" stroke-width="3" rx="14" stroke-dasharray="6,3"/>
    <rect x="64" y="504" width="80" height="16" fill="#00695C" rx="4"/>
    <text x="104" y="515" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Encryption</text>
    <!-- Third layer: Access Control -->
    <rect x="90" y="530" width="240" height="92" fill="none" stroke="#E65100" stroke-width="3" rx="12"/>
    <rect x="94" y="526" width="96" height="16" fill="#E65100" rx="4"/>
    <text x="142" y="537" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Access Control</text>
    <!-- Innermost layer: Auditing -->
    <rect x="120" y="552" width="180" height="60" fill="#3949AB" rx="10"/>
    <text x="210" y="574" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Auditing</text>
    <text x="210" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#C5CAE9">Log &amp; review all activities</text>
    <!-- Labels for layers -->
    <text x="375" y="500" text-anchor="end" font-family="Arial" font-size="7" fill="#1565C0">Filter traffic</text>
    <text x="348" y="524" text-anchor="end" font-family="Arial" font-size="7" fill="#00695C">Protect data</text>
    <text x="320" y="548" text-anchor="end" font-family="Arial" font-size="7" fill="#E65100">Restrict access</text>
  </g>
</svg>
