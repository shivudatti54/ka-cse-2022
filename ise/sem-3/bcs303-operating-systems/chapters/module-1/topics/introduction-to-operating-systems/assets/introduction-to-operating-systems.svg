<svg width="420" height="400" data-topic-id="introduction-to-operating-systems">
  <!-- Background Gradient -->
  <Defs>
    <Gradient id="background-gradient">
      <Stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <Stop offset="50%" stop-color="#8F4C5C" stop-opacity="1" />
      <Stop offset="100%" stop-color="#C9E4CA" stop-opacity="1" />
    </Gradient>
  </Defs>
  <BgFill style="filter: url(#background-gradient)"/>
  
  <!-- Title Section -->
  <g transform="translate(50, 50)">
    <text data-narration="What is an Array?" x="0" y="150" font-size="24" font-family="Arial" text-anchor="middle">Arrays</text>
  </g>
  
  <!-- Section 1: Key Characteristics -->
  <g transform="translate(50, 200)">
    <rect width="300" height="20" fill="#F7F2E9" rx="5" />
    <text data-narration="Fixed Size" x="10" y="10" font-size="18" font-family="Arial" text-anchor="start">Fixed Size</text>
    <text data-narration="Homogeneous" x="10" y="30" font-size="18" font-family="Arial" text-anchor="start">Homogeneous</text>
    <text data-narration="Contiguous Memory" x="10" y="50" font-size="18" font-family="Arial" text-anchor="start">Contiguous Memory</text>
    <text data-narration="Random Access" x="10" y="70" font-size="18" font-family="Arial" text-anchor="start">Random Access</text>
    <text data-narration="Zero-indexed" x="10" y="90" font-size="18" font-family="Arial" text-anchor="start">Zero-indexed</text>
  </g>
  
  <!-- Section 2: Memory Representation -->
  <g transform="translate(50, 250)">
    <rect width="300" height="120" fill="#F7F2E9" rx="5" />
    <rect x="10" y="20" width="100" height="20" fill="#F7F2E9" rx="5" />
    <rect x="120" y="20" width="100" height="20" fill="#F7F2E9" rx="5" />
    <rect x="230" y="20" width="100" height="20" fill="#F7F2E9" rx="5" />
    <text data-narration="Array: [10, 20, 30, 40, 50]" x="20" y="40" font-size="16" font-family="Arial" text-anchor="start">Array: [10, 20, 30, 40, 50]</text>
    <text data-narration="Index:   0   1   2   3   4" x="120" y="40" font-size="16" font-family="Arial" text-anchor="start">Index:   0   1   2   3   4</text>
    <text data-narration="Memory Layout (assuming 4 bytes per integer):" x="20" y="60" font-size="16" font-family="Arial" text-anchor="start">Memory Layout (assuming 4 bytes per integer):</text>
    <rect x="20" y="80" width="300" height="40" fill="#F7F2E9" rx="5" />
    <text data-narration="┌──────┬──────┬──────┬──────┬──────┐" x="20" y="100" font-size="16" font-family="Arial" text-anchor="start">┌──────┬──────┬──────┬──────┬──────┐</text>
    <text data-narration="│  10  │  20  │  30  │  40  │  50  │" x="20" y="120" font-size="16" font-family="Arial" text-anchor="start">│  10  │  20  │  30  │  40  │  50  │</text>
    <text data-narration="└──────┴──────┴──────┴──────┴──────┘" x="20" y="140" font-size="16" font-family="Arial" text-anchor="start">└──────┴──────┴──────┴──────┴──────┘</text>
  </g>
  
  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="1s" dur="5s" repeatCount="indefinite">
    <animateTransform transform="translate(50, 400)" />
  </animate>
</svg>