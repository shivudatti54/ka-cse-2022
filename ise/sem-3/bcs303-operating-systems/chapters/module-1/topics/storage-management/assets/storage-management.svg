<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="storage-management">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="pyramidGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#3949AB"/>
    </linearGradient>
    <linearGradient id="pyramidGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <linearGradient id="pyramidGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#7986CB"/>
    </linearGradient>
    <linearGradient id="pyramidGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7986CB"/>
      <stop offset="100%" style="stop-color:#9FA8DA"/>
    </linearGradient>
    <linearGradient id="pyramidGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9FA8DA"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="diskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#546E7A"/>
      <stop offset="100%" style="stop-color:#37474F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Group 1: Title (0.3s) ===== -->
  <g data-narration="OS Storage Management covers how the operating system manages different levels of storage, from fast registers to slow mass storage." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#283593">OS Storage Management</text>
    <line x1="110" y1="28" x2="310" y2="28" stroke="#3949AB" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ===== Group 2: Storage Hierarchy Pyramid (1.5s) ===== -->
  <g data-narration="The storage hierarchy is a pyramid. At the top are registers, the fastest and smallest. Below are cache, RAM, SSD or HDD, and magnetic tape or cloud, each slower but larger in capacity." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Speed arrow on left -->
    <text x="18" y="55" font-family="Arial, sans-serif" font-size="8" fill="#3949AB" font-weight="bold">Speed</text>
    <line x1="25" y1="60" x2="25" y2="170" stroke="#3949AB" stroke-width="1.2"/>
    <polygon points="25,57 22,63 28,63" fill="#3949AB"/>

    <!-- Capacity arrow on right -->
    <text x="380" y="170" font-family="Arial, sans-serif" font-size="8" fill="#3949AB" font-weight="bold">Capacity</text>
    <line x1="395" y1="60" x2="395" y2="170" stroke="#3949AB" stroke-width="1.2"/>
    <polygon points="395,173 392,167 398,167" fill="#3949AB"/>

    <!-- Tier 1: Registers (topmost, narrowest) -->
    <polygon points="210,40 240,62 180,62" fill="url(#pyramidGrad1)" stroke="#1A237E" stroke-width="0.5"/>
    <text x="210" y="58" text-anchor="middle" font-family="monospace" font-size="7" fill="white" font-weight="bold">Registers</text>

    <!-- Tier 2: Cache -->
    <polygon points="180,62 240,62 260,88 160,88" fill="url(#pyramidGrad2)" stroke="#283593" stroke-width="0.5"/>
    <text x="210" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="white">Cache (L1/L2/L3)</text>

    <!-- Tier 3: Main Memory (RAM) -->
    <polygon points="160,88 260,88 285,114 135,114" fill="url(#pyramidGrad3)" stroke="#3949AB" stroke-width="0.5"/>
    <text x="210" y="106" text-anchor="middle" font-family="monospace" font-size="8" fill="white">Main Memory (RAM)</text>

    <!-- Tier 4: SSD/HDD -->
    <polygon points="135,114 285,114 310,140 110,140" fill="url(#pyramidGrad4)" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="210" y="132" text-anchor="middle" font-family="monospace" font-size="8" fill="#1A237E">SSD / HDD</text>

    <!-- Tier 5: Magnetic Tape / Cloud -->
    <polygon points="110,140 310,140 335,166 85,166" fill="url(#pyramidGrad5)" stroke="#7986CB" stroke-width="0.5"/>
    <text x="210" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#283593">Magnetic Tape / Cloud</text>

    <!-- Labels on the sides -->
    <text x="50" y="105" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-style="italic">Fastest</text>
    <text x="340" y="105" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-style="italic">Largest</text>
  </g>

  <!-- ===== Group 3: Caching Mechanism (3.0s) ===== -->
  <g data-narration="The caching mechanism works as follows: the CPU first checks the cache. On a cache hit, data is returned quickly. On a miss, data is fetched from RAM and the cache is updated." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">Caching Mechanism</text>

    <!-- CPU box -->
    <rect x="35" y="198" width="50" height="28" fill="#00695C" rx="4"/>
    <text x="60" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">CPU</text>

    <!-- Arrow CPU -> Cache -->
    <line x1="85" y1="212" x2="112" y2="212" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="98" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#004D40">check</text>

    <!-- Cache box -->
    <rect x="115" y="198" width="55" height="28" fill="#00897B" rx="4"/>
    <text x="142" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">Cache</text>

    <!-- HIT path (upward arc) -->
    <path d="M142,198 Q142,185 90,185 Q60,185 60,198" fill="none" stroke="#2E7D32" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="100" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">HIT (fast)</text>

    <!-- MISS arrow Cache -> RAM -->
    <line x1="170" y1="212" x2="197" y2="212" stroke="#C62828" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="183" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#C62828">MISS</text>

    <!-- RAM box -->
    <rect x="200" y="198" width="50" height="28" fill="#00695C" rx="4"/>
    <text x="225" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">RAM</text>

    <!-- Arrow RAM -> update Cache -->
    <path d="M225,226 Q225,240 170,240 Q142,240 142,226" fill="none" stroke="#00695C" stroke-width="1.2"/>
    <text x="183" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#004D40">update cache</text>

    <!-- Animated data block moving on HIT path -->
    <rect x="0" y="0" width="8" height="6" rx="1" fill="#2E7D32" opacity="0.8">
      <animateMotion path="M142,195 Q142,182 90,182 Q60,182 60,195" dur="1.5s" begin="3.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== Group 4: I/O Subsystem Components (4.5s) ===== -->
  <g data-narration="The I/O subsystem has three key components: a buffer for temporary data storage, spooling which queues I/O operations, and device drivers that interface with hardware." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="210" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">I/O Subsystem</text>

    <!-- Buffer box -->
    <rect x="30" y="278" width="110" height="36" fill="#E65100" rx="5" stroke="#BF360C" stroke-width="0.5"/>
    <text x="85" y="293" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">Buffer</text>
    <text x="85" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#FFE0B2">Temporary data store</text>

    <!-- Spooling box -->
    <rect x="155" y="278" width="110" height="36" fill="#E65100" rx="5" stroke="#BF360C" stroke-width="0.5"/>
    <text x="210" y="293" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">Spooling</text>
    <text x="210" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#FFE0B2">Queue for I/O ops</text>

    <!-- Device Drivers box -->
    <rect x="280" y="278" width="110" height="36" fill="#E65100" rx="5" stroke="#BF360C" stroke-width="0.5"/>
    <text x="335" y="293" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">Device Drivers</text>
    <text x="335" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#FFE0B2">HW interface layer</text>

    <!-- Connecting lines -->
    <line x1="140" y1="296" x2="155" y2="296" stroke="#BF360C" stroke-width="1"/>
    <line x1="265" y1="296" x2="280" y2="296" stroke="#BF360C" stroke-width="1"/>
  </g>

  <!-- ===== Group 5: Disk Scheduling (6.0s) ===== -->
  <g data-narration="Disk scheduling is how the OS orders disk access requests for efficiency. The read-write head moves across tracks, and algorithms like FCFS, SSTF, and SCAN optimize access time." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="105" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#37474F">Disk Scheduling</text>

    <!-- Disk platter (concentric circles for tracks) -->
    <circle cx="105" cy="365" r="28" fill="url(#diskGrad)" stroke="#263238" stroke-width="1"/>
    <circle cx="105" cy="365" r="22" fill="none" stroke="#78909C" stroke-width="0.5"/>
    <circle cx="105" cy="365" r="16" fill="none" stroke="#78909C" stroke-width="0.5"/>
    <circle cx="105" cy="365" r="10" fill="none" stroke="#78909C" stroke-width="0.5"/>
    <circle cx="105" cy="365" r="4" fill="#90A4AE"/>

    <!-- Read/Write head arm -->
    <line x1="105" y1="365" x2="133" y2="349" stroke="#C62828" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="0 105 365;15 105 365;-10 105 365;5 105 365;0 105 365" dur="3s" begin="6.5s" repeatCount="indefinite"/>
    </line>
    <circle cx="133" cy="349" r="2.5" fill="#C62828">
      <animateTransform attributeName="transform" type="rotate" values="0 105 365;15 105 365;-10 105 365;5 105 365;0 105 365" dur="3s" begin="6.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Note text -->
    <text x="155" y="350" font-family="Arial, sans-serif" font-size="7" fill="#37474F">OS schedules disk</text>
    <text x="155" y="360" font-family="Arial, sans-serif" font-size="7" fill="#37474F">access for efficiency</text>
    <text x="155" y="374" font-family="monospace" font-size="6.5" fill="#546E7A">Algorithms: FCFS,</text>
    <text x="155" y="384" font-family="monospace" font-size="6.5" fill="#546E7A">SSTF, SCAN, C-SCAN</text>
  </g>

  <!-- ===== Group 6: Key Concepts Summary (7.5s) ===== -->
  <g data-narration="Key concepts in storage management include the difference between volatile and non-volatile storage, random versus sequential access, and the fundamental speed versus cost tradeoff." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Summary box -->
    <rect x="260" y="324" width="148" height="68" fill="white" rx="6" stroke="#3949AB" stroke-width="1" opacity="0.9"/>
    <text x="334" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#283593">Key Concepts</text>

    <!-- Concept 1 -->
    <circle cx="275" cy="352" r="3" fill="#3949AB"/>
    <text x="283" y="355" font-family="Arial, sans-serif" font-size="7.5" fill="#1A237E">Volatile vs Non-volatile</text>

    <!-- Concept 2 -->
    <circle cx="275" cy="366" r="3" fill="#00695C"/>
    <text x="283" y="369" font-family="Arial, sans-serif" font-size="7.5" fill="#004D40">Random vs Sequential Access</text>

    <!-- Concept 3 -->
    <circle cx="275" cy="380" r="3" fill="#E65100"/>
    <text x="283" y="383" font-family="Arial, sans-serif" font-size="7.5" fill="#BF360C">Speed vs Cost tradeoff</text>
  </g>

</svg>