<svg width="420" height="400" data-topic-id="distributed-systems" xmlns="http://www.w3.org/2000/svg">
    <style>
       body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .topic {
            margin-bottom: 50px;
            animation: slideIn 3s;
        }
        @keyframes slideIn {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .section {
            margin-bottom: 150px;
        }
        .section:after {
            content: attr(data-narration);
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: #000;
            color: #fff;
            padding: 20px;
            opacity: 0;
            transition: opacity 1s;
        }
        .section:hover:after {
            opacity: 1;
        }
        .connection {
            stroke: #ccc;
            stroke-width: 2;
            fill: none;
        }
        .connection-line {
            stroke: #ccc;
            stroke-width: 2;
            fill: none;
            animation: connection 3s;
        }
        @keyframes connection {
            from {
                stroke-dasharray: 100, 200;
            }
            to {
                stroke-dasharray: 200, 100;
            }
        }
        .connection-circle {
            fill: #ccc;
            stroke: #fff;
            stroke-width: 2;
            r: 50;
        }
    </style>
    <title>Distributed Systems</title>
    <rect width="100%" height="100%" fill="#87CEEB" rx="10"/>
    <g transform="rotate(45 210 180)">
        <text x="10" y="20" font-size="24" font-family="Arial" fill="#4B0082">Distributed Systems</text>
    </g>
    <g transform="rotate(0 210 180)">
        <rect x="10" y="60" width="400" height="120" fill="#F2C464" rx="10"/>
        <text x="20" y="80" font-size="18" font-family="Arial" fill="#4B0082">What are Distributed Systems?</text>
        <section class="section" data-narration="A distributed system is a collection of independent computers that appears to its users as a single coherent system.">
            <rect x="20" y="100" width="360" height="80" fill="#F2C464" rx="10"/>
            <text x="30" y="110" font-size="18" font-family="Arial" fill="#4B0082">Definition: A collection of independent computers that appears as a single coherent system to its users.</text>
            <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="3s" begin="-1s"/>
        </section>
        <section class="section" data-narration="Key Characteristics: Multiple Components, Message Passing, Common Goal">
            <rect x="20" y="200" width="360" height="80" fill="#F2C464" rx="10"/>
            <text x="30" y="210" font-size="18" font-family="Arial" fill="#4B0082">Key Characteristics:</text>
            <ul>
                <li><text x="50" y="230" font-size="16" font-family="Arial" fill="#4B0082">Multiple Components:</text></li>
                <li><text x="50" y="250" font-size="16" font-family="Arial" fill="#4B0082">Message Passing:</text></li>
                <li><text x="50" y="270" font-size="16" font-family="Arial" fill="#4B0082">Common Goal:</text></li>
            </ul>
            <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="3s" begin="-1s"/>
        </section>
        <section class="section" data-narration="Motivations: Scalability, Reliability, Performance, Resource Sharing, Cost Efficiency">
            <rect x="20" y="300" width="360" height="80" fill="#F2C464" rx="10"/>
            <text x="30" y="310" font-size="18" font-family="Arial" fill="#4B0082">Motivations:</text>
            <ul>
                <li><text x="50" y="330" font-size="16" font-family="Arial" fill="#4B0082">Scalability:</text></li>
                <li><text x="50" y="350" font-size="16" font-family="Arial" fill="#4B0082">Reliability:</text></li>
                <li><text x="50" y="370" font-size="16" font-family="Arial" fill="#4B0082">Performance:</text></li>
                <li><text x="50" y="390" font-size="16" font-family="Arial" fill="#4B0082">Resource Sharing:</text></li>
                <li><text x="50" y="410" font-size="16" font-family="Arial" fill="#4B0082">Cost Efficiency:</text></li>
            </ul>
            <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="3s" begin="-1s"/>
        </section>
        <section class="section" data-narration="Centralized vs Distributed Systems: Scalability, Complexity, Latency, Cost">
            <rect x="20" y="400" width="360" height="80" fill="#F2C464" rx="10"/>
            <text x="30" y="410" font-size="18" font-family="Arial" fill="#4B0082">Centralized vs Distributed Systems:</text>
            <table>
                <tr>
                    <th></th>
                    <th>Centralized</th>
                    <th>Distributed</th>
                </tr>
                <tr>
                    <td>Single Point of Failure</td>
                    <td>Yes</td>
                    <td>No</td>
                </tr>
                <tr>
                    <td>Scalability</td>
                    <td>Limited</td>
                    <td>High</td>
                </tr>
                <tr>
                    <td>Complexity</td>
                    <td>Lower</td>
                    <td>Higher</td>
                </tr>
                <tr>
                    <td>Latency</td>
                    <td>Lower</td>
                    <td>Variable</td>
                </tr>
                <tr>
                    <td>Cost</td>
                    <td>Higher per unit</td>
                    <td>Lower total</td>
                </tr>
            </table>
            <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="3s" begin="-1s"/>
        </section>
        <section class="section" data-narration="Examples of Distributed Systems: World Wide Web, Email, Banking Systems">
            <rect x="20" y="500" width="360" height="80" fill="#F2C464" rx="10"/>
            <text x="30" y="510" font-size="18" font-family="Arial" fill="#4B0082">Examples of Distributed Systems:</text>
            <ul>
                <li><text x="50" y="530" font-size="16" font-family="Arial" fill="#4B0082">World Wide Web:</text></li>
                <li><text x="50" y="550" font-size="16" font-family="Arial" fill="#4B0082">Email:</text></li>
                <li><text x="50" y="570" font-size="16" font-family="Arial" fill="#4B0082">Banking Systems:</text></li>
            </ul>
            <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="3s" begin="-1s"/>
        </section>
        <footer>
            <text x="50%" y="550" font-size="18" font-family="Arial" fill="#4B0082">Distributed Systems</text>
        </footer>
    </g>
    <g transform="rotate(0 210 180)">
        <rect x="10" y="330" width="400" height="50" fill="#FFC107" rx="10"/>
        <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="3s" begin="-1s"/>
    </g>
    <g transform="rotate(0 210 180)">
        <rect x="10" y="570" width="400" height="50" fill="#FF9800" rx="10"/>
        <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="3s" begin="-1s"/>
    </g>
</svg>