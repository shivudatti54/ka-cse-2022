<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="computer-system-organization">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
    <linearGradient id="ioGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#546E7A"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6A1B9A"/>
    </marker>
    <marker id="arrowGrayRev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#546E7A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- ============================================================ -->
  <!-- Group 1: Title (0.3s) -->
  <!-- ============================================================ -->
  <g data-narration="Computer System Organization. This diagram illustrates how the CPU, main memory, I/O devices, system bus, interrupts, and DMA work together in a modern computer system." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1A237E">Computer System Organization</text>
    <line x1="80" y1="30" x2="340" y2="30" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- ============================================================ -->
  <!-- Group 2: CPU box (1.5s) -->
  <!-- ============================================================ -->
  <g data-narration="The CPU, or Central Processing Unit, is the brain of the computer. It contains three main components: the Arithmetic Logic Unit (ALU) that performs calculations, the Control Unit that directs operations, and Registers that provide fast temporary storage." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- CPU outer box -->
    <rect x="20" y="42" width="170" height="120" fill="url(#cpuGrad)" rx="8" stroke="#1A237E" stroke-width="1"/>
    <text x="105" y="60" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">CPU</text>
    <!-- ALU sub-box -->
    <rect x="30" y="68" width="70" height="28" fill="white" fill-opacity="0.2" rx="4"/>
    <text x="65" y="86" text-anchor="middle" font-family="Arial" font-size="9" fill="white">ALU</text>
    <!-- Control Unit sub-box -->
    <rect x="110" y="68" width="70" height="28" fill="white" fill-opacity="0.2" rx="4"/>
    <text x="145" y="86" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Control Unit</text>
    <!-- Registers sub-box -->
    <rect x="30" y="104" width="150" height="48" fill="white" fill-opacity="0.15" rx="4"/>
    <text x="105" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Registers</text>
    <text x="105" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#C5CAE9">PC | IR | MAR | MBR</text>
    <text x="105" y="146" text-anchor="middle" font-family="monospace" font-size="7" fill="#C5CAE9">Accumulator | SP</text>
  </g>

  <!-- ============================================================ -->
  <!-- Group 3: Main Memory + System Bus (3.0s) -->
  <!-- ============================================================ -->
  <g data-narration="Main Memory, or RAM, stores programs and data that the CPU is currently using. It connects to the CPU through the System Bus, a shared communication pathway that carries data, addresses, and control signals between all components." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Main Memory box -->
    <rect x="230" y="42" width="170" height="120" fill="url(#memGrad)" rx="8" stroke="#004D40" stroke-width="1"/>
    <text x="315" y="60" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Main Memory (RAM)</text>
    <rect x="240" y="68" width="150" height="84" fill="white" fill-opacity="0.15" rx="4"/>
    <text x="315" y="86" text-anchor="middle" font-family="Arial" font-size="8" fill="#E0F2F1">Address Space</text>
    <text x="315" y="100" text-anchor="middle" font-family="monospace" font-size="7" fill="white">0x0000: OS Kernel</text>
    <text x="315" y="112" text-anchor="middle" font-family="monospace" font-size="7" fill="white">0x1000: User Programs</text>
    <text x="315" y="124" text-anchor="middle" font-family="monospace" font-size="7" fill="white">0x8000: Stack/Heap</text>
    <text x="315" y="136" text-anchor="middle" font-family="monospace" font-size="7" fill="white">0xFFFF: ROM/BIOS</text>
    <text x="315" y="148" text-anchor="middle" font-family="Arial" font-size="7" fill="#B2DFDB">Volatile - lost on power off</text>

    <!-- System Bus double-arrow connecting CPU and Memory -->
    <line x1="192" y1="100" x2="228" y2="100" stroke="#546E7A" stroke-width="2.5" marker-end="url(#arrowGray)" marker-start="url(#arrowGrayRev)"/>
    <rect x="195" y="88" width="30" height="12" fill="#E8EAF6" rx="2"/>
    <text x="210" y="97" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#37474F">Bus</text>

    <!-- System Bus bar at bottom of CPU/Memory area -->
    <rect x="20" y="170" width="380" height="18" fill="#546E7A" rx="4"/>
    <text x="210" y="183" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">System Bus (Data | Address | Control)</text>

    <!-- Connector lines from CPU and Memory down to bus -->
    <line x1="105" y1="162" x2="105" y2="170" stroke="#546E7A" stroke-width="1.5"/>
    <line x1="315" y1="162" x2="315" y2="170" stroke="#546E7A" stroke-width="1.5"/>
  </g>

  <!-- ============================================================ -->
  <!-- Group 4: I/O Devices with Device Controllers (4.5s) -->
  <!-- ============================================================ -->
  <g data-narration="I/O devices such as disk drives, keyboards, and displays allow the computer to interact with the outside world. Each device has a dedicated Device Controller that manages communication between the device and the system bus, handling data buffering and protocol conversion." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Device Controller row -->
    <!-- Disk Controller -->
    <rect x="22" y="200" width="100" height="22" fill="#78909C" rx="3"/>
    <text x="72" y="215" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Disk Controller</text>
    <line x1="72" y1="188" x2="72" y2="200" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Keyboard Controller -->
    <rect x="152" y="200" width="110" height="22" fill="#78909C" rx="3"/>
    <text x="207" y="215" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Keyboard Controller</text>
    <line x1="207" y1="188" x2="207" y2="200" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Display Controller -->
    <rect x="292" y="200" width="106" height="22" fill="#78909C" rx="3"/>
    <text x="345" y="215" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Display Controller</text>
    <line x1="345" y1="188" x2="345" y2="200" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- I/O Device boxes -->
    <!-- Disk -->
    <rect x="22" y="232" width="100" height="32" fill="url(#ioGrad)" rx="6"/>
    <text x="72" y="252" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Disk</text>
    <line x1="72" y1="222" x2="72" y2="232" stroke="#E65100" stroke-width="1.5"/>

    <!-- Keyboard -->
    <rect x="152" y="232" width="110" height="32" fill="url(#ioGrad)" rx="6"/>
    <text x="207" y="252" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Keyboard</text>
    <line x1="207" y1="222" x2="207" y2="232" stroke="#E65100" stroke-width="1.5"/>

    <!-- Display -->
    <rect x="292" y="232" width="106" height="32" fill="url(#ioGrad)" rx="6"/>
    <text x="345" y="252" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Display</text>
    <line x1="345" y1="222" x2="345" y2="232" stroke="#E65100" stroke-width="1.5"/>
  </g>

  <!-- ============================================================ -->
  <!-- Group 5: Interrupt Mechanism (6.0s) -->
  <!-- ============================================================ -->
  <g data-narration="Interrupt-driven I/O allows devices to signal the CPU when they need attention. When a device controller raises an interrupt signal, the CPU suspends its current task, saves its state, and executes the appropriate Interrupt Service Routine, or ISR, to handle the event. This is more efficient than polling." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Interrupt panel background -->
    <rect x="20" y="275" width="200" height="115" fill="white" fill-opacity="0.6" rx="8" stroke="#C62828" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="120" y="292" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Interrupt Mechanism</text>

    <!-- Interrupt arrow from I/O controller area up to CPU -->
    <path d="M72,275 L72,270 Q72,268 70,268 L40,268 Q30,268 30,258 L30,170 Q30,165 25,162 L25,155 Q25,152 28,152 L28,152" stroke="#C62828" stroke-width="1.8" fill="none" stroke-dasharray="5,3"/>
    <!-- Arrowhead at CPU end -->
    <polygon points="22,155 34,155 28,147" fill="#C62828"/>

    <!-- Label on interrupt arrow -->
    <rect x="2" y="264" width="24" height="38" fill="#FFEBEE" rx="3"/>
    <text x="14" y="276" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#C62828" transform="rotate(-90, 14, 283)">Interrupt Signal</text>

    <!-- Interrupt flow steps -->
    <rect x="30" y="300" width="180" height="16" fill="#EF5350" rx="3"/>
    <text x="120" y="311" text-anchor="middle" font-family="Arial" font-size="7" fill="white">1. Device Controller raises interrupt</text>

    <rect x="30" y="320" width="180" height="16" fill="#EF5350" rx="3"/>
    <text x="120" y="331" text-anchor="middle" font-family="Arial" font-size="7" fill="white">2. CPU saves state (registers, PC)</text>

    <rect x="30" y="340" width="180" height="16" fill="#EF5350" rx="3"/>
    <text x="120" y="351" text-anchor="middle" font-family="Arial" font-size="7" fill="white">3. CPU runs ISR (Interrupt Service Routine)</text>

    <rect x="30" y="360" width="180" height="16" fill="#EF5350" rx="3"/>
    <text x="120" y="371" text-anchor="middle" font-family="Arial" font-size="7" fill="white">4. Restore state and resume execution</text>
  </g>

  <!-- ============================================================ -->
  <!-- Group 6: DMA (Direct Memory Access) (7.5s) -->
  <!-- ============================================================ -->
  <g data-narration="Direct Memory Access, or DMA, is a technique that allows I/O devices to transfer data directly to and from main memory without involving the CPU for each byte. The DMA controller takes over the bus, transfers the data block, and then interrupts the CPU only when the transfer is complete. This frees the CPU to perform other work during large data transfers." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- DMA panel background -->
    <rect x="230" y="275" width="180" height="115" fill="white" fill-opacity="0.6" rx="8" stroke="#6A1B9A" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="320" y="292" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6A1B9A">DMA (Direct Memory Access)</text>

    <!-- DMA bypass arrow: from Disk area directly to Memory, bypassing CPU -->
    <path d="M122,242 Q140,242 148,235 Q160,222 170,210 Q178,198 186,192 Q195,186 210,178 Q230,168 260,168 Q290,168 315,162" stroke="#6A1B9A" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

    <!-- DMA Transfer label on the bypass arrow -->
    <rect x="168" y="192" width="68" height="14" fill="#F3E5F5" rx="3" stroke="#6A1B9A" stroke-width="0.5"/>
    <text x="202" y="202" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#6A1B9A">DMA Transfer</text>

    <!-- DMA explanation steps -->
    <rect x="240" y="300" width="160" height="16" fill="#AB47BC" rx="3"/>
    <text x="320" y="311" text-anchor="middle" font-family="Arial" font-size="7" fill="white">1. CPU initiates DMA request</text>

    <rect x="240" y="320" width="160" height="16" fill="#AB47BC" rx="3"/>
    <text x="320" y="331" text-anchor="middle" font-family="Arial" font-size="7" fill="white">2. DMA controller takes over bus</text>

    <rect x="240" y="340" width="160" height="16" fill="#AB47BC" rx="3"/>
    <text x="320" y="351" text-anchor="middle" font-family="Arial" font-size="7" fill="white">3. Data transferred: Device -> Memory</text>

    <rect x="240" y="360" width="160" height="16" fill="#AB47BC" rx="3"/>
    <text x="320" y="371" text-anchor="middle" font-family="Arial" font-size="7" fill="white">4. DMA interrupts CPU when done</text>

    <!-- Note: CPU freed -->
    <text x="320" y="388" text-anchor="middle" font-family="monospace" font-size="7" fill="#6A1B9A">CPU freed for other work</text>
  </g>
</svg>