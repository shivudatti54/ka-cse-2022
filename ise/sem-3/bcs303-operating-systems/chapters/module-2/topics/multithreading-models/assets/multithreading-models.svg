<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="multithreading-models">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Multithreading models define how user-level threads map to kernel-level threads. The mapping determines parallelism capabilities and system overhead." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="22" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1A237E">Multithreading Models</text>
    <line x1="80" y1="28" x2="340" y2="28" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
    <text x="210" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">User Threads &#x2194; Kernel Threads</text>
  </g>

  <!-- Group 2: Many-to-One Model -->
  <g data-narration="Many-to-One model maps many user-level threads to one kernel thread. Thread management is done in user space, so it is efficient. However, if one thread makes a blocking system call, the entire process blocks. Also, only one thread can access the kernel at a time, so multiple threads cannot run in parallel on multicore systems. Examples include Green threads and GNU Portable Threads." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="105" y="62" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Many-to-One</text>

    <!-- User threads row -->
    <rect x="20" y="68" width="30" height="20" rx="4" fill="#3949AB" opacity="0.85"/>
    <text x="35" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">U1</text>
    <rect x="55" y="68" width="30" height="20" rx="4" fill="#3949AB" opacity="0.85"/>
    <text x="70" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">U2</text>
    <rect x="90" y="68" width="30" height="20" rx="4" fill="#3949AB" opacity="0.85"/>
    <text x="105" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">U3</text>
    <rect x="125" y="68" width="30" height="20" rx="4" fill="#3949AB" opacity="0.85"/>
    <text x="140" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">U4</text>

    <!-- Connecting lines to single kernel thread -->
    <line x1="35" y1="88" x2="85" y2="106" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="70" y1="88" x2="85" y2="106" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="105" y1="88" x2="85" y2="106" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="140" y1="88" x2="85" y2="106" stroke="#3949AB" stroke-width="1.2"/>

    <!-- Kernel thread -->
    <rect x="65" y="106" width="40" height="20" rx="4" fill="#1A237E" opacity="0.9"/>
    <text x="85" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="white">K1</text>

    <!-- Note -->
    <text x="105" y="140" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Green threads, no true parallelism</text>
  </g>

  <!-- Group 3: One-to-One Model -->
  <g data-narration="One-to-One model maps each user thread to a separate kernel thread. This provides true parallelism since multiple threads can run simultaneously on different cores. However, creating a user thread requires creating a kernel thread, which adds overhead. Most operating systems limit the number of threads. Examples include Windows and Linux threads." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="290" y="62" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">One-to-One</text>

    <!-- User threads -->
    <rect x="225" y="68" width="30" height="20" rx="4" fill="#00695C" opacity="0.85"/>
    <text x="240" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">U1</text>
    <rect x="270" y="68" width="30" height="20" rx="4" fill="#00695C" opacity="0.85"/>
    <text x="285" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">U2</text>
    <rect x="315" y="68" width="30" height="20" rx="4" fill="#00695C" opacity="0.85"/>
    <text x="330" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">U3</text>

    <!-- 1:1 connecting lines -->
    <line x1="240" y1="88" x2="240" y2="106" stroke="#00695C" stroke-width="1.5"/>
    <line x1="285" y1="88" x2="285" y2="106" stroke="#00695C" stroke-width="1.5"/>
    <line x1="330" y1="88" x2="330" y2="106" stroke="#00695C" stroke-width="1.5"/>

    <!-- Kernel threads -->
    <rect x="225" y="106" width="30" height="20" rx="4" fill="#004D40" opacity="0.9"/>
    <text x="240" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="white">K1</text>
    <rect x="270" y="106" width="30" height="20" rx="4" fill="#004D40" opacity="0.9"/>
    <text x="285" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="white">K2</text>
    <rect x="315" y="106" width="30" height="20" rx="4" fill="#004D40" opacity="0.9"/>
    <text x="330" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="white">K3</text>

    <!-- Note -->
    <text x="290" y="140" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">True parallelism, but thread limit</text>
  </g>

  <!-- Group 4: Many-to-Many Model -->
  <g data-narration="Many-to-Many model multiplexes many user-level threads to a smaller or equal number of kernel threads. It provides true concurrency because the OS can schedule multiple kernel threads on multiple processors. Developers can create as many user threads as needed. When a thread performs a blocking call, the kernel can schedule another thread for execution. Examples include older Solaris with the LWP model." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="115" y="160" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Many-to-Many</text>

    <!-- User threads -->
    <rect x="20" y="167" width="28" height="18" rx="4" fill="#E65100" opacity="0.85"/>
    <text x="34" y="180" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U1</text>
    <rect x="54" y="167" width="28" height="18" rx="4" fill="#E65100" opacity="0.85"/>
    <text x="68" y="180" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U2</text>
    <rect x="88" y="167" width="28" height="18" rx="4" fill="#E65100" opacity="0.85"/>
    <text x="102" y="180" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U3</text>
    <rect x="122" y="167" width="28" height="18" rx="4" fill="#E65100" opacity="0.85"/>
    <text x="136" y="180" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U4</text>

    <!-- Crossing lines to kernel threads -->
    <line x1="34" y1="185" x2="60" y2="202" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <line x1="68" y1="185" x2="60" y2="202" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <line x1="68" y1="185" x2="120" y2="202" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <line x1="102" y1="185" x2="120" y2="202" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <line x1="136" y1="185" x2="120" y2="202" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <line x1="34" y1="185" x2="120" y2="202" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>

    <!-- Kernel threads -->
    <rect x="40" y="202" width="38" height="18" rx="4" fill="#BF360C" opacity="0.9"/>
    <text x="59" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="white">K1</text>
    <rect x="100" y="202" width="38" height="18" rx="4" fill="#BF360C" opacity="0.9"/>
    <text x="119" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="white">K2</text>

    <!-- Note -->
    <text x="105" y="234" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Best of both, flexible mapping</text>
  </g>

  <!-- Group 5: Two-Level Model -->
  <g data-narration="The Two-Level model is similar to Many-to-Many, but it also allows a user thread to be bound directly to a kernel thread. This bound thread has a dedicated kernel thread and guaranteed parallelism. Unbound threads share kernel threads through the many-to-many multiplexing. Examples include older versions of IRIX, HP-UX, and Tru64 UNIX. Modern systems like Linux and Windows use the simpler One-to-One model." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="320" y="160" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Two-Level Model</text>

    <!-- User threads -->
    <rect x="230" y="167" width="26" height="18" rx="4" fill="#C62828" opacity="0.8"/>
    <text x="243" y="179" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U1</text>
    <rect x="262" y="167" width="26" height="18" rx="4" fill="#C62828" opacity="0.8"/>
    <text x="275" y="179" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U2</text>
    <rect x="294" y="167" width="26" height="18" rx="4" fill="#C62828" opacity="0.8"/>
    <text x="307" y="179" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U3</text>
    <rect x="326" y="167" width="26" height="18" rx="4" fill="#C62828" opacity="0.8"/>
    <text x="339" y="179" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U4</text>
    <!-- U5 is the bound thread -->
    <rect x="358" y="167" width="26" height="18" rx="4" fill="#C62828" opacity="1"/>
    <text x="371" y="179" text-anchor="middle" font-family="monospace" font-size="7" fill="white">U5</text>

    <!-- Many-to-many lines (unbound) -->
    <line x1="243" y1="185" x2="265" y2="202" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="275" y1="185" x2="265" y2="202" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="275" y1="185" x2="318" y2="202" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="307" y1="185" x2="318" y2="202" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="339" y1="185" x2="318" y2="202" stroke="#C62828" stroke-width="1" opacity="0.6"/>

    <!-- Bound thread line (U5 -> K3, bold) -->
    <line x1="371" y1="185" x2="371" y2="202" stroke="#C62828" stroke-width="2.5"/>

    <!-- Kernel threads -->
    <rect x="245" y="202" width="38" height="18" rx="4" fill="#7F0000" opacity="0.9"/>
    <text x="264" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="white">K1</text>
    <rect x="298" y="202" width="38" height="18" rx="4" fill="#7F0000" opacity="0.9"/>
    <text x="317" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="white">K2</text>
    <!-- Bound kernel thread -->
    <rect x="351" y="202" width="38" height="18" rx="4" fill="#7F0000" opacity="1"/>
    <text x="370" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="white">K3</text>

    <!-- Labels -->
    <text x="285" y="232" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#C62828">M:M (unbound)</text>
    <text x="371" y="232" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#C62828">1:1 (bound)</text>
  </g>

  <!-- Group 6: Comparison Summary Table -->
  <g data-narration="Comparing the models: Many-to-One has no true parallelism, low overhead, examples are Green Threads and GNU Portable Threads. One-to-One provides true parallelism with higher overhead, used by Linux and Windows. Many-to-Many provides true parallelism with moderate overhead, used by older Solaris. Two-Level is like Many-to-Many plus allows bound threads, used by IRIX and HP-UX." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="256" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1A237E">Comparison Summary</text>

    <!-- Table header -->
    <rect x="12" y="262" width="396" height="16" rx="3" fill="#1A237E" opacity="0.85"/>
    <text x="62" y="274" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Model</text>
    <text x="152" y="274" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Parallelism</text>
    <text x="242" y="274" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Overhead</text>
    <text x="348" y="274" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Examples</text>
    <!-- Column separators -->
    <line x1="108" y1="263" x2="108" y2="277" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <line x1="196" y1="263" x2="196" y2="277" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <line x1="290" y1="263" x2="290" y2="277" stroke="white" stroke-width="0.5" opacity="0.5"/>

    <!-- Row 1: Many-to-One -->
    <rect x="12" y="278" width="396" height="22" rx="0" fill="#3949AB" opacity="0.08"/>
    <rect x="12" y="278" width="396" height="22" rx="0" fill="none" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="291" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">Many-to-One</text>
    <text x="152" y="291" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">No (single kernel thread)</text>
    <text x="242" y="291" text-anchor="middle" font-family="Arial" font-size="7" fill="#2E7D32">Low</text>
    <text x="348" y="291" text-anchor="middle" font-family="Arial" font-size="7" fill="#37474F">Green Threads, GNU Pth</text>

    <!-- Row 2: One-to-One -->
    <rect x="12" y="300" width="396" height="22" rx="0" fill="#00695C" opacity="0.08"/>
    <rect x="12" y="300" width="396" height="22" rx="0" fill="none" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="313" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#00695C">One-to-One</text>
    <text x="152" y="313" text-anchor="middle" font-family="Arial" font-size="7" fill="#2E7D32">Yes (true parallelism)</text>
    <text x="242" y="313" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">High</text>
    <text x="348" y="313" text-anchor="middle" font-family="Arial" font-size="7" fill="#37474F">Linux, Windows</text>

    <!-- Row 3: Many-to-Many -->
    <rect x="12" y="322" width="396" height="22" rx="0" fill="#E65100" opacity="0.08"/>
    <rect x="12" y="322" width="396" height="22" rx="0" fill="none" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="335" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#E65100">Many-to-Many</text>
    <text x="152" y="335" text-anchor="middle" font-family="Arial" font-size="7" fill="#2E7D32">Yes (multiplexed)</text>
    <text x="242" y="335" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Moderate</text>
    <text x="348" y="335" text-anchor="middle" font-family="Arial" font-size="7" fill="#37474F">Solaris (older), IRIX</text>

    <!-- Row 4: Two-Level -->
    <rect x="12" y="344" width="396" height="22" rx="0" fill="#C62828" opacity="0.08"/>
    <rect x="12" y="344" width="396" height="22" rx="0" fill="none" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="357" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Two-Level</text>
    <text x="152" y="357" text-anchor="middle" font-family="Arial" font-size="7" fill="#2E7D32">Yes (bound + unbound)</text>
    <text x="242" y="357" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Moderate</text>
    <text x="348" y="357" text-anchor="middle" font-family="Arial" font-size="7" fill="#37474F">HP-UX, Tru64 UNIX</text>

    <!-- Table border -->
    <rect x="12" y="262" width="396" height="104" rx="3" fill="none" stroke="#1A237E" stroke-width="1"/>

    <!-- Column separators for rows -->
    <line x1="108" y1="278" x2="108" y2="366" stroke="#C5CAE9" stroke-width="0.5"/>
    <line x1="196" y1="278" x2="196" y2="366" stroke="#C5CAE9" stroke-width="0.5"/>
    <line x1="290" y1="278" x2="290" y2="366" stroke="#C5CAE9" stroke-width="0.5"/>

    <!-- Key insight -->
    <text x="210" y="384" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1A237E">Modern OS (Linux, Windows): One-to-One is dominant</text>
    <text x="210" y="395" text-anchor="middle" font-family="Arial" font-size="7" fill="#37474F">Many-to-Many/Two-Level largely historical (Solaris pre-9)</text>
  </g>
</svg>