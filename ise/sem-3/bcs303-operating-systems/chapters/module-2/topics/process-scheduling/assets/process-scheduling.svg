<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="process-scheduling">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Process Scheduling is how the OS decides which process gets the CPU and when." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1A237E">Process Scheduling</text>
    <line x1="100" y1="30" x2="320" y2="30" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Group 2: Scheduling Queues -->
  <g data-narration="Three scheduling queues: Job Queue holds all processes in the system. Ready Queue holds processes in memory waiting for CPU. Device Queue holds processes waiting for I/O completion." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="50" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Scheduling Queues</text>

    <!-- Job Queue -->
    <rect x="10" y="57" width="130" height="42" rx="6" fill="#3949AB" opacity="0.12"/>
    <rect x="10" y="57" width="130" height="42" rx="6" fill="none" stroke="#3949AB" stroke-width="1.5"/>
    <text x="75" y="71" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Job Queue</text>
    <rect x="18" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.7"/>
    <text x="27" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P1</text>
    <rect x="40" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.7"/>
    <text x="49" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P2</text>
    <rect x="62" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.7"/>
    <text x="71" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P3</text>
    <rect x="84" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.5"/>
    <text x="93" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P4</text>
    <rect x="106" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.5"/>
    <text x="115" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P5</text>
    <text x="75" y="107" text-anchor="middle" font-family="Arial" font-size="7" fill="#283593">All processes in system</text>

    <!-- Ready Queue -->
    <rect x="148" y="57" width="130" height="42" rx="6" fill="#3949AB" opacity="0.12"/>
    <rect x="148" y="57" width="130" height="42" rx="6" fill="none" stroke="#3949AB" stroke-width="1.5"/>
    <text x="213" y="71" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Ready Queue</text>
    <rect x="156" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.85"/>
    <text x="165" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P1</text>
    <rect x="178" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.85"/>
    <text x="187" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P3</text>
    <rect x="200" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.85"/>
    <text x="209" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P5</text>
    <text x="213" y="107" text-anchor="middle" font-family="Arial" font-size="7" fill="#283593">In memory, waiting for CPU</text>

    <!-- Device Queue -->
    <rect x="286" y="57" width="126" height="42" rx="6" fill="#3949AB" opacity="0.12"/>
    <rect x="286" y="57" width="126" height="42" rx="6" fill="none" stroke="#3949AB" stroke-width="1.5"/>
    <text x="349" y="71" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Device Queue</text>
    <rect x="294" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.6"/>
    <text x="303" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P2</text>
    <rect x="316" y="77" width="18" height="14" rx="3" fill="#3949AB" opacity="0.6"/>
    <text x="325" y="87" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P4</text>
    <text x="349" y="107" text-anchor="middle" font-family="Arial" font-size="7" fill="#283593">Waiting for I/O</text>
  </g>

  <!-- Group 3: Schedulers -->
  <g data-narration="Long-term scheduler selects processes from the job pool and loads them into the ready queue. Short-term scheduler picks a process from the ready queue and assigns it to the CPU. Medium-term scheduler swaps processes in and out of memory to manage the degree of multiprogramming." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="126" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Schedulers</text>

    <!-- Long-term Scheduler -->
    <rect x="10" y="133" width="128" height="52" rx="6" fill="#00695C" opacity="0.1"/>
    <rect x="10" y="133" width="128" height="52" rx="6" fill="none" stroke="#00695C" stroke-width="1.2"/>
    <text x="74" y="148" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Long-term (Job)</text>
    <text x="74" y="160" text-anchor="middle" font-family="Arial" font-size="7" fill="#004D40">Job Pool</text>
    <line x1="56" y1="164" x2="92" y2="164" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="74" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#004D40">Ready Queue</text>

    <!-- Short-term Scheduler -->
    <rect x="146" y="133" width="128" height="52" rx="6" fill="#00695C" opacity="0.1"/>
    <rect x="146" y="133" width="128" height="52" rx="6" fill="none" stroke="#00695C" stroke-width="1.2"/>
    <text x="210" y="148" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Short-term (CPU)</text>
    <text x="210" y="160" text-anchor="middle" font-family="Arial" font-size="7" fill="#004D40">Ready Queue</text>
    <line x1="192" y1="164" x2="228" y2="164" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="210" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#004D40">CPU Execution</text>

    <!-- Medium-term Scheduler -->
    <rect x="282" y="133" width="128" height="52" rx="6" fill="#00695C" opacity="0.1"/>
    <rect x="282" y="133" width="128" height="52" rx="6" fill="none" stroke="#00695C" stroke-width="1.2"/>
    <text x="346" y="148" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Medium-term</text>
    <text x="346" y="160" text-anchor="middle" font-family="Arial" font-size="7" fill="#004D40">Swap In</text>
    <line x1="330" y1="164" x2="362" y2="164" stroke="#00695C" stroke-width="1.5"/>
    <line x1="362" y1="164" x2="356" y2="160" stroke="#00695C" stroke-width="1.5"/>
    <line x1="362" y1="164" x2="356" y2="168" stroke="#00695C" stroke-width="1.5"/>
    <line x1="330" y1="164" x2="336" y2="160" stroke="#00695C" stroke-width="1.5"/>
    <line x1="330" y1="164" x2="336" y2="168" stroke="#00695C" stroke-width="1.5"/>
    <text x="346" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#004D40">Swap Out (memory mgmt)</text>

    <!-- Flow arrows between schedulers -->
    <line x1="138" y1="159" x2="146" y2="159" stroke="#00695C" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="274" y1="159" x2="282" y2="159" stroke="#00695C" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- Group 4: Dispatcher -->
  <g data-narration="The dispatcher is the module that gives control of the CPU to the process selected by the short-term scheduler. It performs context switching, switching to user mode, and jumping to the correct location in the program to resume execution. Dispatch latency is the time it takes to stop one process and start another." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="202" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Dispatcher</text>

    <rect x="22" y="208" width="376" height="44" rx="8" fill="#E65100" opacity="0.08"/>
    <rect x="22" y="208" width="376" height="44" rx="8" fill="none" stroke="#E65100" stroke-width="1.3"/>

    <!-- Dispatcher flow -->
    <rect x="32" y="216" width="86" height="28" rx="5" fill="#E65100" opacity="0.85"/>
    <text x="75" y="233" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Dispatcher</text>
    <text x="75" y="223" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFE0B2">Gives CPU control</text>

    <!-- Arrow -->
    <line x1="120" y1="230" x2="136" y2="230" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="136,226 144,230 136,234" fill="#E65100"/>

    <rect x="146" y="216" width="74" height="28" rx="5" fill="#E65100" opacity="0.65"/>
    <text x="183" y="225" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Context</text>
    <text x="183" y="235" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Switch</text>

    <!-- Arrow -->
    <line x1="222" y1="230" x2="238" y2="230" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="238,226 246,230 238,234" fill="#E65100"/>

    <rect x="248" y="216" width="66" height="28" rx="5" fill="#E65100" opacity="0.65"/>
    <text x="281" y="225" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Mode</text>
    <text x="281" y="235" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Switch</text>

    <!-- Arrow -->
    <line x1="316" y1="230" x2="332" y2="230" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="332,226 340,230 332,234" fill="#E65100"/>

    <rect x="342" y="216" width="48" height="28" rx="5" fill="#E65100" opacity="0.85"/>
    <text x="366" y="225" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Jump to</text>
    <text x="366" y="235" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Location</text>
  </g>

  <!-- Group 5: Scheduling Criteria -->
  <g data-narration="Scheduling criteria include CPU Utilization (maximize, keep CPU busy), Throughput (maximize, number of processes completed per time unit), Turnaround Time (minimize, total time from submission to completion), Waiting Time (minimize, time spent in the ready queue), and Response Time (minimize, time from submission to first response)." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="270" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1A237E">Scheduling Criteria</text>

    <!-- CPU Utilization -->
    <rect x="10" y="278" width="76" height="40" rx="5" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
    <text x="48" y="292" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">CPU Utilization</text>
    <text x="48" y="304" text-anchor="middle" font-family="Arial" font-size="10" fill="#2E7D32">Maximize</text>
    <text x="48" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="#2E7D32">&#x2191;</text>

    <!-- Throughput -->
    <rect x="92" y="278" width="70" height="40" rx="5" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
    <text x="127" y="292" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#3949AB">Throughput</text>
    <text x="127" y="304" text-anchor="middle" font-family="Arial" font-size="10" fill="#2E7D32">Maximize</text>
    <text x="127" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="#2E7D32">&#x2191;</text>

    <!-- Turnaround Time -->
    <rect x="168" y="278" width="80" height="40" rx="5" fill="#E8EAF6" stroke="#C62828" stroke-width="1"/>
    <text x="208" y="292" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Turnaround Time</text>
    <text x="208" y="304" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">Minimize</text>
    <text x="208" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">&#x2193;</text>

    <!-- Waiting Time -->
    <rect x="254" y="278" width="74" height="40" rx="5" fill="#E8EAF6" stroke="#C62828" stroke-width="1"/>
    <text x="291" y="292" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Waiting Time</text>
    <text x="291" y="304" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">Minimize</text>
    <text x="291" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">&#x2193;</text>

    <!-- Response Time -->
    <rect x="334" y="278" width="78" height="40" rx="5" fill="#E8EAF6" stroke="#C62828" stroke-width="1"/>
    <text x="373" y="292" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Response Time</text>
    <text x="373" y="304" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">Minimize</text>
    <text x="373" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">&#x2193;</text>
  </g>

  <!-- Group 6: Preemptive vs Non-preemptive -->
  <g data-narration="In preemptive scheduling, the OS can forcibly interrupt a running process and move it back to the ready queue, for example when a higher-priority process arrives. In non-preemptive scheduling, once a process is allocated the CPU, it keeps executing until it terminates or voluntarily switches to the waiting state." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="338" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#4A148C">Preemptive vs Non-preemptive</text>

    <!-- Preemptive -->
    <rect x="14" y="346" width="190" height="44" rx="7" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.3"/>
    <text x="109" y="362" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Preemptive</text>
    <text x="109" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="#283593">OS can interrupt running process</text>
    <text x="109" y="384" text-anchor="middle" font-family="Arial" font-size="7" fill="#283593">e.g., Round Robin, SRTF, Priority</text>

    <!-- Non-preemptive -->
    <rect x="216" y="346" width="192" height="44" rx="7" fill="#FBE9E7" stroke="#E65100" stroke-width="1.3"/>
    <text x="312" y="362" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Non-preemptive</text>
    <text x="312" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="#BF360C">Process runs until it voluntarily yields</text>
    <text x="312" y="384" text-anchor="middle" font-family="Arial" font-size="7" fill="#BF360C">e.g., FCFS, SJF, Priority (coop)</text>
  </g>
</svg>