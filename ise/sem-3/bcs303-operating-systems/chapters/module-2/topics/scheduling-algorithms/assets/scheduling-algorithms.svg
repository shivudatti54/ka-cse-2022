<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="scheduling-algorithms">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="CPU Scheduling Algorithms determine the order in which processes execute on the CPU" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#283593">CPU Scheduling Algorithms</text>
    <line x1="90" y1="28" x2="330" y2="28" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Group 2: FCFS -->
  <g data-narration="FCFS schedules processes in arrival order. P1 runs 0 to 4, P2 runs 4 to 7, P3 runs 7 to 10. Simple but causes convoy effect where short processes wait behind long ones." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Section background -->
    <rect x="10" y="34" width="400" height="58" rx="6" fill="white" fill-opacity="0.5" stroke="#3949AB" stroke-width="0.8"/>
    <text x="20" y="48" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">FCFS - First Come First Served</text>
    <!-- Gantt chart -->
    <rect x="20" y="53" width="120" height="16" rx="3" fill="#5C6BC0" stroke="#3949AB" stroke-width="0.5"/>
    <text x="80" y="64" text-anchor="middle" font-family="monospace" font-size="8" fill="white">P1 (0-4)</text>
    <rect x="140" y="53" width="90" height="16" rx="3" fill="#7986CB" stroke="#3949AB" stroke-width="0.5"/>
    <text x="185" y="64" text-anchor="middle" font-family="monospace" font-size="8" fill="white">P2 (4-7)</text>
    <rect x="230" y="53" width="90" height="16" rx="3" fill="#9FA8DA" stroke="#3949AB" stroke-width="0.5"/>
    <text x="275" y="64" text-anchor="middle" font-family="monospace" font-size="8" fill="#283593">P3 (7-10)</text>
    <!-- Time markers -->
    <text x="20" y="80" font-family="monospace" font-size="7" fill="#3949AB">0</text>
    <text x="137" y="80" font-family="monospace" font-size="7" fill="#3949AB">4</text>
    <text x="227" y="80" font-family="monospace" font-size="7" fill="#3949AB">7</text>
    <text x="317" y="80" font-family="monospace" font-size="7" fill="#3949AB">10</text>
    <!-- Note -->
    <text x="330" y="50" font-family="Arial" font-size="7.5" fill="#3949AB" font-style="italic">Non-preemptive, simple</text>
    <text x="330" y="60" font-family="Arial" font-size="7.5" fill="#3949AB" font-style="italic">but convoy effect</text>
    <text x="330" y="70" font-family="Arial" font-size="7.5" fill="#C62828" font-weight="bold">Avg Wait = 3.67</text>
  </g>

  <!-- Group 3: SJF -->
  <g data-narration="Shortest Job First reorders processes by burst time. P3 with burst 3 runs first, then P2 with burst 3, then P1 with burst 4. This gives optimal average waiting time but risks starvation of long processes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="10" y="96" width="400" height="58" rx="6" fill="white" fill-opacity="0.5" stroke="#00695C" stroke-width="0.8"/>
    <text x="20" y="110" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">SJF - Shortest Job First</text>
    <!-- Gantt chart reordered -->
    <rect x="20" y="115" width="90" height="16" rx="3" fill="#26A69A" stroke="#00695C" stroke-width="0.5"/>
    <text x="65" y="126" text-anchor="middle" font-family="monospace" font-size="8" fill="white">P3 (0-3)</text>
    <rect x="110" y="115" width="90" height="16" rx="3" fill="#4DB6AC" stroke="#00695C" stroke-width="0.5"/>
    <text x="155" y="126" text-anchor="middle" font-family="monospace" font-size="8" fill="white">P2 (3-6)</text>
    <rect x="200" y="115" width="120" height="16" rx="3" fill="#80CBC4" stroke="#00695C" stroke-width="0.5"/>
    <text x="260" y="126" text-anchor="middle" font-family="monospace" font-size="8" fill="#004D40">P1 (6-10)</text>
    <!-- Time markers -->
    <text x="20" y="142" font-family="monospace" font-size="7" fill="#00695C">0</text>
    <text x="107" y="142" font-family="monospace" font-size="7" fill="#00695C">3</text>
    <text x="197" y="142" font-family="monospace" font-size="7" fill="#00695C">6</text>
    <text x="317" y="142" font-family="monospace" font-size="7" fill="#00695C">10</text>
    <!-- Note -->
    <text x="330" y="112" font-family="Arial" font-size="7.5" fill="#00695C" font-style="italic">Optimal avg wait time</text>
    <text x="330" y="122" font-family="Arial" font-size="7.5" fill="#00695C" font-style="italic">but starvation risk</text>
    <text x="330" y="132" font-family="Arial" font-size="7.5" fill="#00695C" font-weight="bold">Avg Wait = 3.0</text>
  </g>

  <!-- Group 4: Round Robin -->
  <g data-narration="Round Robin allocates a fixed time quantum of 2 units to each process. P1 gets 2 units, then P2 gets 2, then P3 gets 2, then P1 gets remaining 2. This ensures fairness and good response time for interactive systems." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="10" y="158" width="400" height="58" rx="6" fill="white" fill-opacity="0.5" stroke="#E65100" stroke-width="0.8"/>
    <text x="20" y="172" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Round Robin (quantum = 2)</text>
    <!-- Gantt chart with time slices -->
    <rect x="20" y="177" width="52" height="16" rx="3" fill="#FF8A65" stroke="#E65100" stroke-width="0.5"/>
    <text x="46" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P1</text>
    <rect x="72" y="177" width="52" height="16" rx="3" fill="#FFAB91" stroke="#E65100" stroke-width="0.5"/>
    <text x="98" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#BF360C">P2</text>
    <rect x="124" y="177" width="52" height="16" rx="3" fill="#FFCCBC" stroke="#E65100" stroke-width="0.5"/>
    <text x="150" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#BF360C">P3</text>
    <rect x="176" y="177" width="52" height="16" rx="3" fill="#FF8A65" stroke="#E65100" stroke-width="0.5"/>
    <text x="202" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P1</text>
    <rect x="228" y="177" width="26" height="16" rx="3" fill="#FFAB91" stroke="#E65100" stroke-width="0.5"/>
    <text x="241" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#BF360C">P2</text>
    <rect x="254" y="177" width="26" height="16" rx="3" fill="#FFCCBC" stroke="#E65100" stroke-width="0.5"/>
    <text x="267" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#BF360C">P3</text>
    <!-- Time markers -->
    <text x="20" y="204" font-family="monospace" font-size="7" fill="#E65100">0</text>
    <text x="70" y="204" font-family="monospace" font-size="7" fill="#E65100">2</text>
    <text x="122" y="204" font-family="monospace" font-size="7" fill="#E65100">4</text>
    <text x="174" y="204" font-family="monospace" font-size="7" fill="#E65100">6</text>
    <text x="226" y="204" font-family="monospace" font-size="7" fill="#E65100">8</text>
    <text x="252" y="204" font-family="monospace" font-size="7" fill="#E65100">9</text>
    <text x="278" y="204" font-family="monospace" font-size="7" fill="#E65100">10</text>
    <!-- Note -->
    <text x="300" y="174" font-family="Arial" font-size="7.5" fill="#E65100" font-style="italic">Fair, good response</text>
    <text x="300" y="184" font-family="Arial" font-size="7.5" fill="#E65100" font-style="italic">time for interactive</text>
    <text x="300" y="194" font-family="Arial" font-size="7.5" fill="#E65100" font-weight="bold">Context switches: 5</text>
  </g>

  <!-- Group 5: Priority Scheduling -->
  <g data-narration="Priority Scheduling assigns a priority number to each process. P1 has priority 3, P2 has priority 1 which is highest, P3 has priority 2. Execution order is P2 then P3 then P1. This can cause starvation of low priority processes, which aging technique fixes by gradually increasing priority." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="10" y="220" width="400" height="62" rx="6" fill="white" fill-opacity="0.5" stroke="#C62828" stroke-width="0.8"/>
    <text x="20" y="234" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Priority Scheduling</text>
    <!-- Process priority list -->
    <rect x="20" y="239" width="60" height="14" rx="2" fill="#EF9A9A" stroke="#C62828" stroke-width="0.5"/>
    <text x="50" y="249" text-anchor="middle" font-family="monospace" font-size="7" fill="#B71C1C">P1 pri=3</text>
    <rect x="85" y="239" width="60" height="14" rx="2" fill="#E57373" stroke="#C62828" stroke-width="0.5"/>
    <text x="115" y="249" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P2 pri=1</text>
    <rect x="150" y="239" width="60" height="14" rx="2" fill="#EF5350" stroke="#C62828" stroke-width="0.5"/>
    <text x="180" y="249" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P3 pri=2</text>
    <!-- Arrow showing order -->
    <text x="225" y="249" font-family="Arial" font-size="9" fill="#C62828" font-weight="bold">Order:</text>
    <!-- Gantt chart by priority -->
    <rect x="20" y="258" width="90" height="14" rx="3" fill="#E57373" stroke="#C62828" stroke-width="0.5"/>
    <text x="65" y="268" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P2 (0-3)</text>
    <rect x="110" y="258" width="90" height="14" rx="3" fill="#EF5350" stroke="#C62828" stroke-width="0.5"/>
    <text x="155" y="268" text-anchor="middle" font-family="monospace" font-size="7" fill="white">P3 (3-6)</text>
    <rect x="200" y="258" width="120" height="14" rx="3" fill="#EF9A9A" stroke="#C62828" stroke-width="0.5"/>
    <text x="260" y="268" text-anchor="middle" font-family="monospace" font-size="7" fill="#B71C1C">P1 (6-10)</text>
    <!-- Note -->
    <text x="270" y="236" font-family="Arial" font-size="7.5" fill="#C62828" font-style="italic">Can cause starvation;</text>
    <text x="270" y="246" font-family="Arial" font-size="7.5" fill="#C62828" font-style="italic">aging fixes it</text>
    <text x="330" y="268" font-family="monospace" font-size="7" fill="#C62828">1=highest</text>
  </g>

  <!-- Group 6: Comparison Table -->
  <g data-narration="Comparison summary: FCFS is non-preemptive with no starvation, best for batch systems. SJF is non-preemptive with possible starvation, best for minimizing wait time. Round Robin is preemptive with no starvation, best for interactive and time-sharing systems. Priority can be either, has starvation risk, best for real-time systems." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="10" y="286" width="400" height="108" rx="6" fill="white" fill-opacity="0.6" stroke="#283593" stroke-width="0.8"/>
    <text x="210" y="300" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#283593">Comparison Summary</text>
    <!-- Table header -->
    <rect x="18" y="305" width="388" height="14" rx="2" fill="#3949AB"/>
    <text x="78" y="315" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Algorithm</text>
    <text x="178" y="315" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Preemptive?</text>
    <text x="268" y="315" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Starvation?</text>
    <text x="358" y="315" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Best For</text>
    <!-- Row 1: FCFS -->
    <rect x="18" y="319" width="388" height="16" rx="0" fill="#E8EAF6"/>
    <text x="78" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">FCFS</text>
    <text x="178" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">No</text>
    <text x="268" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#2E7D32">No</text>
    <text x="358" y="330" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#3949AB">Batch systems</text>
    <!-- Row 2: SJF -->
    <rect x="18" y="335" width="388" height="16" rx="0" fill="white" fill-opacity="0.7"/>
    <text x="78" y="346" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">SJF</text>
    <text x="178" y="346" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">No*</text>
    <text x="268" y="346" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Yes</text>
    <text x="358" y="346" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#00695C">Min wait time</text>
    <!-- Row 3: Round Robin -->
    <rect x="18" y="351" width="388" height="16" rx="0" fill="#E8EAF6"/>
    <text x="78" y="362" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">Round Robin</text>
    <text x="178" y="362" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">Yes</text>
    <text x="268" y="362" text-anchor="middle" font-family="Arial" font-size="8" fill="#2E7D32">No</text>
    <text x="358" y="362" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#E65100">Time-sharing</text>
    <!-- Row 4: Priority -->
    <rect x="18" y="367" width="388" height="16" rx="0" fill="white" fill-opacity="0.7"/>
    <text x="78" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Priority</text>
    <text x="178" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Both</text>
    <text x="268" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Yes</text>
    <text x="358" y="378" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#C62828">Real-time</text>
    <!-- Footnote -->
    <text x="20" y="392" font-family="Arial" font-size="6.5" fill="#616161" font-style="italic">*SJF has preemptive variant called SRTF (Shortest Remaining Time First)</text>
  </g>
</svg>