<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="scheduling-criteria">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF5350"/>
      <stop offset="40%" style="stop-color:#FFA726"/>
      <stop offset="100%" style="stop-color:#66BB6A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Group 1: Title (0.3s) ===== -->
  <g data-narration="CPU Scheduling Criteria determine how the operating system evaluates and compares scheduling algorithms." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <rect x="60" y="8" width="300" height="30" rx="6" fill="#3949AB"/>
    <text x="210" y="29" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="white">CPU Scheduling Criteria</text>
  </g>

  <!-- ===== Group 2: CPU Utilization (1.5s) ===== -->
  <g data-narration="CPU Utilization measures how busy the CPU is. The goal is to keep it between 40 percent for lightly loaded and 90 percent for heavily loaded systems." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Section background -->
    <rect x="10" y="44" width="400" height="58" rx="6" fill="white" fill-opacity="0.6"/>
    <!-- Label -->
    <text x="20" y="60" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">1. CPU Utilization</text>
    <!-- Gauge background -->
    <rect x="20" y="66" width="200" height="12" rx="4" fill="#E0E0E0"/>
    <!-- Gauge fill -->
    <rect x="20" y="66" width="0" height="12" rx="4" fill="url(#gaugeGrad)">
      <animate attributeName="width" from="0" to="180" dur="1s" begin="2.0s" fill="freeze"/>
    </rect>
    <!-- Gauge marks -->
    <line x1="100" y1="64" x2="100" y2="80" stroke="#757575" stroke-width="1"/>
    <text x="100" y="92" text-anchor="middle" font-family="Arial" font-size="8" fill="#757575">40%</text>
    <line x1="200" y1="64" x2="200" y2="80" stroke="#757575" stroke-width="1"/>
    <text x="200" y="92" text-anchor="middle" font-family="Arial" font-size="8" fill="#757575">90%</text>
    <!-- Description -->
    <text x="240" y="72" font-family="Arial" font-size="10" fill="#3949AB">Keep CPU as busy as possible</text>
    <text x="240" y="84" font-family="Arial" font-size="9" fill="#5C6BC0">Range: 40% (light) - 90% (heavy)</text>
  </g>

  <!-- ===== Group 3: Throughput + Turnaround Time (3.0s) ===== -->
  <g data-narration="Throughput is the number of processes completed per time unit. Turnaround Time is the total time from arrival to completion, calculated as Completion Time minus Arrival Time." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Section background -->
    <rect x="10" y="108" width="400" height="72" rx="6" fill="white" fill-opacity="0.6"/>
    <!-- Throughput label -->
    <text x="20" y="124" font-family="Arial" font-size="12" font-weight="bold" fill="#00695C">2. Throughput</text>
    <text x="20" y="138" font-family="Arial" font-size="9" fill="#00695C">Processes completed per time unit</text>
    <!-- Bar chart: 3 bars for processes/sec -->
    <rect x="20" y="144" width="22" height="26" rx="2" fill="#26A69A" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.3s" fill="freeze"/>
    </rect>
    <text x="31" y="158" text-anchor="middle" font-family="Arial" font-size="7" fill="white">P1</text>
    <rect x="46" y="148" width="22" height="22" rx="2" fill="#4DB6AC" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.5s" fill="freeze"/>
    </rect>
    <text x="57" y="162" text-anchor="middle" font-family="Arial" font-size="7" fill="white">P2</text>
    <rect x="72" y="152" width="22" height="18" rx="2" fill="#80CBC4" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.7s" fill="freeze"/>
    </rect>
    <text x="83" y="164" text-anchor="middle" font-family="Arial" font-size="7" fill="white">P3</text>
    <text x="100" y="168" font-family="Arial" font-size="8" fill="#00695C">= 3 proc/sec</text>
    <!-- Turnaround Time -->
    <line x="170" y1="118" x2="170" y2="175" stroke="#B2DFDB" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="180" y="124" font-family="Arial" font-size="12" font-weight="bold" fill="#00695C">3. Turnaround Time</text>
    <!-- Formula box -->
    <rect x="180" y="130" width="220" height="22" rx="4" fill="#E0F2F1"/>
    <text x="290" y="145" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#00695C">TAT = Completion - Arrival</text>
    <!-- Example -->
    <text x="180" y="165" font-family="Arial" font-size="9" fill="#00897B">Example: Arrival=0, Complete=8</text>
    <text x="180" y="175" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">TAT = 8 - 0 = 8 units</text>
  </g>

  <!-- ===== Group 4: Waiting Time (4.5s) ===== -->
  <g data-narration="Waiting Time is the total time a process spends in the ready queue. It equals Turnaround Time minus Burst Time. For example, with Arrival 0, Burst 5, and Completion 8, the Waiting Time is 3." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <!-- Section background -->
    <rect x="10" y="186" width="400" height="68" rx="6" fill="white" fill-opacity="0.6"/>
    <!-- Label -->
    <text x="20" y="202" font-family="Arial" font-size="12" font-weight="bold" fill="#E65100">4. Waiting Time</text>
    <!-- Formula box -->
    <rect x="20" y="208" width="220" height="20" rx="4" fill="#FFF3E0"/>
    <text x="130" y="222" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">WT = Turnaround - Burst</text>
    <!-- Worked example -->
    <rect x="20" y="232" width="380" height="16" rx="3" fill="#FFE0B2" fill-opacity="0.6"/>
    <text x="30" y="244" font-family="monospace" font-size="9" fill="#BF360C">Arrival=0  Burst=5  Completion=8  |  TAT=8-0=8  |  WT=8-5=3</text>
    <!-- Visual timeline -->
    <rect x="258" y="205" width="132" height="24" rx="4" fill="#FBE9E7"/>
    <!-- Burst portion (blue) -->
    <rect x="262" y="209" width="80" height="7" rx="2" fill="#3949AB"/>
    <text x="302" y="215" text-anchor="middle" font-family="Arial" font-size="6" fill="white">Burst = 5</text>
    <!-- Wait portion (orange) -->
    <rect x="342" y="209" width="44" height="7" rx="2" fill="#E65100"/>
    <text x="364" y="215" text-anchor="middle" font-family="Arial" font-size="6" fill="white">Wait=3</text>
    <text x="262" y="226" font-family="Arial" font-size="7" fill="#BF360C">0</text>
    <text x="340" y="226" font-family="Arial" font-size="7" fill="#BF360C">5</text>
    <text x="384" y="226" font-family="Arial" font-size="7" fill="#BF360C">8</text>
  </g>

  <!-- ===== Group 5: Response Time (6.0s) ===== -->
  <g data-narration="Response Time is the time from submission until the first response is produced. This is especially important for interactive systems where users expect quick feedback." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <!-- Section background -->
    <rect x="10" y="260" width="400" height="62" rx="6" fill="white" fill-opacity="0.6"/>
    <!-- Label -->
    <text x="20" y="276" font-family="Arial" font-size="12" font-weight="bold" fill="#C62828">5. Response Time</text>
    <!-- Formula box -->
    <rect x="20" y="282" width="250" height="18" rx="4" fill="#FFEBEE"/>
    <text x="145" y="294" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#C62828">RT = First Response - Arrival</text>
    <!-- Timeline -->
    <line x1="20" y1="310" x2="390" y2="310" stroke="#BDBDBD" stroke-width="2"/>
    <!-- Arrival tick -->
    <line x1="40" y1="305" x2="40" y2="315" stroke="#3949AB" stroke-width="2"/>
    <text x="40" y="324" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Arrival</text>
    <text x="40" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">t=0</text>
    <!-- First Response tick (highlighted) -->
    <line x1="160" y1="302" x2="160" y2="318" stroke="#C62828" stroke-width="2"/>
    <rect x="130" y="296" width="60" height="10" rx="3" fill="#C62828" opacity="0.15"/>
    <text x="160" y="324" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">1st Response</text>
    <text x="160" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">t=2</text>
    <!-- Arrow showing RT -->
    <line x1="42" y1="310" x2="158" y2="310" stroke="#C62828" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="155,307 160,310 155,313" fill="#C62828"/>
    <text x="100" y="308" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">RT = 2</text>
    <!-- Completion tick -->
    <line x1="340" y1="305" x2="340" y2="315" stroke="#757575" stroke-width="2"/>
    <text x="340" y="324" text-anchor="middle" font-family="Arial" font-size="7" fill="#757575">Complete</text>
    <!-- Note -->
    <text x="285" y="280" font-family="Arial" font-size="9" font-style="italic" fill="#C62828">Important for interactive systems</text>
  </g>

  <!-- ===== Group 6: Optimization Goals (7.5s) ===== -->
  <g data-narration="The goal of scheduling is to maximize CPU Utilization and Throughput while minimizing Turnaround Time, Waiting Time, and Response Time." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Section background -->
    <rect x="10" y="328" width="400" height="64" rx="6" fill="white" fill-opacity="0.6"/>
    <!-- Title -->
    <text x="210" y="344" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#37474F">Optimization Goals</text>
    <!-- Maximize box (green) -->
    <rect x="20" y="350" width="185" height="36" rx="5" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
    <text x="30" y="364" font-family="Arial" font-size="11" font-weight="bold" fill="#2E7D32">Maximize</text>
    <text x="100" y="364" font-family="Arial" font-size="14" fill="#2E7D32">&#x2191;</text>
    <text x="30" y="378" font-family="Arial" font-size="9" fill="#388E3C">CPU Utilization, Throughput</text>
    <!-- Minimize box (red) -->
    <rect x="215" y="350" width="185" height="36" rx="5" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
    <text x="225" y="364" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Minimize</text>
    <text x="295" y="364" font-family="Arial" font-size="14" fill="#C62828">&#x2193;</text>
    <text x="225" y="378" font-family="Arial" font-size="9" fill="#D32F2F">Turnaround, Waiting, Response</text>
  </g>
</svg>