    <rect x="10" y="20" width="400" height="350" fill="#f7f7f7"/>
    <title>Thread Libraries</title>
    <g transform="translate(10, 20)">
        <rect x="0" y="0" width="400" height="350" fill="#f7f7f7"/>
        <text x="15" y="20" font-size="24" font-family="Arial" text-anchor="start">Web3 Libraries</text>
        <text x="15" y="50" font-size="18" font-family="Arial" text-anchor="start">Overview</text>
        <section data-narration="what-is-web3">
            <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite"/>
            <text x="15" y="100" font-size="18" font-family="Arial" text-anchor="start">Web3 libraries provide JavaScript/Python interfaces to interact with Ethereum nodes.</text>
        </section>
        <section data-narration="what-are-web3-libraries">
            <animate attributeName="opacity" begin="1.5s" dur="1s" repeatCount="indefinite"/>
            <text x="15" y="100" font-size="18" font-family="Arial" text-anchor="start">They handle RPC communication, transaction signing, ABI encoding/decoding, and other blockchain operations.</text>
        </section>
        <section data-narration="major-web3-libraries">
            <animate attributeName="opacity" begin="3s" dur="1s" repeatCount="indefinite"/>
            <rect x="50" y="100" width="200" height="150" rx="10"/>
            <text x="60" y="120" font-size="18" font-family="Arial" text-anchor="start">1. ethers.js</text>
            <text x="60" y="140" font-size="18" font-family="Arial" text-anchor="start">The most popular library for Ethereum interaction.</text>
            <text x="60" y="160" font-size="18" font-family="Arial" text-anchor="start">Key Features:</text>
            <text x="60" y="180" font-size="18" font-family="Arial" text-anchor="start">• Lightweight (~120KB)</text>
            <text x="60" y="200" font-size="18" font-family="Arial" text-anchor="start">• TypeScript support</text>
            <text x="60" y="220" font-size="18" font-family="Arial" text-anchor="start">• ENS integration</text>
            <text x="60" y="240" font-size="18" font-family="Arial" text-anchor="start">• Human-readable ABI</text>
            <text x="60" y="260" font-size="18" font-family="Arial" text-anchor="start">• Multiple provider types</text>
        </section>
        <section data-narration="what-are-the-key-features-of-ethers-js">
            <animate attributeName="opacity" begin="4.5s" dur="1s" repeatCount="indefinite"/>
            <text x="15" y="100" font-size="18" font-family="Arial" text-anchor="start">Ethers.js Key Features:</text>
        </section>
        <section data-narration="ethers-vs-web3-js">
            <animate attributeName="opacity" begin="6s" dur="1s" repeatCount="indefinite"/>
            <rect x="50" y="100" width="200" height="150" rx="10"/>
            <text x="60" y="120" font-size="18" font-family="Arial" text-anchor="start">2. web3.js</text>
            <text x="60" y="140" font-size="18" font-family="Arial" text-anchor="start">The original Ethereum JavaScript library.</text>
            <text x="60" y="160" font-size="18" font-family="Arial" text-anchor="start">Key Features:</text>
            <text x="60" y="180" font-size="18" font-family="Arial" text-anchor="start">• Connects to provider</text>
            <text x="60" y="200" font-size="18" font-family="Arial" text-anchor="start">• Contract interaction</text>
            <text x="60" y="220" font-size="18" font-family="Arial" text-anchor="start">• Supports multiple provider types</text>
        </section>
