<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="thread-libraries">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
        </linearGradient>
        <style>
            .section {
                background-image: url(#pastel-gradient);
                padding: 20px;
                border: 1px solid #3498db;
                border-radius: 10px;
                margin-bottom: 20px;
            }
            .section:hover {
                transform: translateY(-10px);
            }
            .arrow {
                fill: #3498db;
