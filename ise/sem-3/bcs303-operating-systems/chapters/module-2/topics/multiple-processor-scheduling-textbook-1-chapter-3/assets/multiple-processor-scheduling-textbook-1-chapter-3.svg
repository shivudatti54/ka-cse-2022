<svg width="420" height="400" data-topic-id="multiple-processor-scheduling-textbook-1-chapter-3">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A98FF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body>
    <!-- Title -->
    <rect x="10" y="10" width="400" height="20" fill="url(#gradient)" rx="5"/>
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#2F4F7F">Multiple Processor Scheduling</text>
    <!-- Section 1: Introduction -->
    <section data-narration="Multiple-processor scheduling is a type of scheduling that involves allocating tasks to multiple processors in a system. This type of scheduling is used in systems with multiple processors to improve system performance, increase throughput, and reduce response times.">
      <rect x="10" y="60" width="400" height="100" fill="#F7F7F7" rx="5"/>
      <text x="20" y="80" font-size="18" font-family="Arial" fill="#666" data-topic-id="multiple-processor-scheduling-textbook-1-chapter-3">Introduction</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="0s"/>
    </section>
    <!-- Section 2: Single-Processor Systems -->
    <section data-narration="In a single-processor system, a single processor is used to execute all tasks in the system.">
      <rect x="10" y="170" width="400" height="100" fill="#F7F7F7" rx="5"/>
      <text x="20" y="190" font-size="18" font-family="Arial" fill="#666" data-topic-id="multiple-processor-scheduling-textbook-1-chapter-3">Single-Processor Systems</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="0s"/>
    </section>
    <!-- Section 3: Multiple-Processor Systems -->
    <section data-narration="In a multiple-processor system, multiple processors are used to execute tasks in the system.">
      <rect x="10" y="270" width="400" height="100" fill="#F7F7F7" rx="5"/>
      <text x="20" y="290" font-size="18" font-family="Arial" fill="#666" data-topic-id="multiple-processor-scheduling-textbook-1-chapter-3">Multiple-Processor Systems</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="0s"/>
    </section>
    <!-- Section 4: Types of Multiple-Processor Scheduling -->
    <section data-narration="There are several types of multiple-processor scheduling algorithms, including:">
      <rect x="10" y="360" width="400" height="100" fill="#F7F7F7" rx="5"/>
      <text x="20" y="380" font-size="18" font-family="Arial" fill="#666" data-topic-id="multiple-processor-scheduling-textbook-1-chapter-3">Types of Multiple-Processor Scheduling</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="0s"/>
    </section>
    <!-- Section 5: Round-Robin Scheduling -->
    <section data-narration="Round-robin scheduling is a popular algorithm for multiple-processor systems.">
      <rect x="10" y="450" width="400" height="100" fill="#F7F7F7" rx="5"/>
      <text x="20" y="470" font-size="18" font-family="Arial" fill="#666" data-topic-id="multiple-processor-scheduling-textbook-1-chapter-3">Round-Robin Scheduling</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="0s"/>
    </section>
    <!-- Section 6: Priority Scheduling -->
    <section data-narration="Priority scheduling is an algorithm that assigns a priority level to each task, and the processor with the highest priority is executed first.">
      <rect x="10" y="530" width="400" height="100" fill="#F7F7F7" rx="5"/>
      <text x="20" y="550" font-size="18" font-family="Arial" fill="#666" data-topic-id="multiple-processor-scheduling-textbook-1-chapter-3">Priority Scheduling</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="0s"/>
    </section>
    <!-- Footer -->
    <rect x="10" y="620" width="400" height="30" fill="#2F4F7F" rx="5"/>
    <text x="20" y="630" font-size="18" font-family="Arial" fill="#F7F7F7">Chapter 3: Multiple-Processor Scheduling</text>
  </body>
</svg>