<svg width="420" height="400" data-topic-id="process-scheduling-basic-concepts">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" fill="#3498DB">
    Process Scheduling Basic Concepts
  </text>

  <!-- Section 1: Why CPU Scheduling? -->
  <section data-narration="Why CPU Scheduling?">
    <rect x="20" y="80" width="380" height="100" fill="#F9F9F9" rx="10"/>
    <text x="50%" y="100" text-anchor="middle" font-size="18" fill="#666">
      Maximize CPU utilization, throughput, waiting time, turnaround time, and response time.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="3000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Scheduling Criteria -->
  <section data-narration="Scheduling Criteria">
    <rect x="20" y="190" width="380" height="150" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="220" width="380" height="100" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="280" width="380" height="100" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="310" width="380" height="100" fill="#F9F9F9" rx="10"/>
    <text x="50%" y="230" text-anchor="middle" font-size="18" fill="#666">
      CPU Utilization: Maximize
      Throughput: Maximize
      Turnaround Time: Minimize
      Waiting Time: Minimize
      Response Time: Minimize
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 250 250" to="0 220 220" dur="3000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 3: Key Formulas -->
  <section data-narration="Key Formulas">
    <rect x="20" y="290" width="380" height="50" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="330" width="380" height="50" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="370" width="380" height="50" fill="#F9F9F9" rx="10"/>
    <text x="50%" y="310" text-anchor="middle" font-size="18" fill="#666">
      Turnaround Time = Completion Time - Arrival Time
      Waiting Time = Turnaround Time - Burst Time
      Response Time = First Response Time - Arrival Time
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 380 380" to="0 330 330" dur="3000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 4: Types of Scheduling -->
  <section data-narration="Types of Scheduling">
    <rect x="20" y="100" width="380" height="150" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="260" width="380" height="150" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="410" width="380" height="150" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="560" width="380" height="150" fill="#F9F9F9" rx="10"/>
    <text x="50%" y="170" text-anchor="middle" font-size="18" fill="#666">
      Non-Preemptive: Process runs until it blocks or terminates
      Preemptive: Process can be interrupted
    </text>
    <text x="50%" y="310" text-anchor="middle" font-size="18" fill="#666">
      Examples: FCFS, SJF (non-preemptive), Round Robin, SRTF, Priority (preemptive)
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 170 170" to="0 260 260" dur="3000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 5: Scheduling Queues -->
  <section data-narration="Scheduling Queues">
    <rect x="20" y="240" width="380" height="100" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="300" width="380" height="100" fill="#F9F9F9" rx="10"/>
    <text x="50%" y="280" text-anchor="middle" font-size="18" fill="#666">
      Job Queue: All processes in system
      Ready Queue: Processes in memory, ready to run
    </text>
    <text x="50%" y="320" text-anchor="middle" font-size="18" fill="#666">
      Device Queues: Processes waiting for I/O
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 320 320" to="0 300 300" dur="3000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 6: Dispatcher -->
  <section data-narration="Dispatcher">
    <rect x="20" y="180" width="380" height="150" fill="#F9F9F9" rx="10"/>
    <rect x="20" y="340" width="380" height="150" fill="#F9F9F9" rx="10"/>
    <text x="50%" y="210" text-anchor="middle" font-size="18" fill="#666">
      Gives CPU control to selected process
    </text>
    <text x="50%" y="350" text-anchor="middle" font-size="18" fill="#666">
      Examples: Context switch, Switch to user mode, Jump to proper location in program
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 210 210" to="0 340 340" dur="3000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Footer -->
  <text x="50%" y="380" text-anchor="middle" font-size="18" fill="#666">
    Process Scheduling Basic Concepts
  </text>
</svg>