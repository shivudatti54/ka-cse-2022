<svg width="420" height="400" data-topic-id="thread-scheduling">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)" rx="10" />
  <text x="170" y="130" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">Thread Scheduling</text>
  <text x="170" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Disk Scheduling Algorithms</text>

  <g data-narration="Disk Structure">
    <ellipse cx="100" cy="150" rx="40" ry="30" fill="#3498db" />
    <text x="120" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Platter</text>
    <text x="120" y="200" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Circular disk surface</text>
    <line x1="120" y1="150" x2="220" y2="150" stroke="#2ecc71" stroke-width="2" />
    <text x="120" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Track</text>
    <text x="120" y="240" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Concentric circle on platter</text>
  </g>

  <g data-narration="Seek Time Minimization">
    <rect x="50" y="320" width="320" height="80" fill="#e74c3c" rx="10" />
    <text x="170" y="350" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Seek Time Minimization</text>
    <text x="170" y="370" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Disk scheduling algorithms minimize total head movement.</text>
  </g>

  <g data-narration="FCFS Algorithm">
    <rect x="50" y="330" width="320" height="60" fill="#2ecc71" rx="10" />
    <text x="170" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">FCFS (First-Come First-Served)</text>
    <text x="170" y="380" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Process requests in arrival order.</text>
    <rect x="120" y="390" width="80" height="20" fill="#3498db" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2s" begin="0s" repeatCount="indefinite" />
  </g>

  <g data-narration="SSTF Algorithm">
    <rect x="50" y="270" width="320" height="60" fill="#e74c3c" rx="10" />
    <text x="170" y="290" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">SSTF (Shortest Seek Time First)</text>
    <text x="170" y="310" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Select request closest to current head position.</text>
    <rect x="120" y="320" width="80" height="20" fill="#3498db" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2s" begin="2s" repeatCount="indefinite" />
  </g>

  <g data-narration="SCAN Algorithm">
    <rect x="50" y="210" width="320" height="60" fill="#2ecc71" rx="10" />
    <text x="170" y="230" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">SCAN (Elevator)</text>
    <text x="170" y="250" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Move head in one direction servicing requests, then reverse.</text>
    <rect x="120" y="260" width="80" height="20" fill="#3498db" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2s" begin="4s" repeatCount="indefinite" />
  </g>

  <g data-narration="C-SCAN Algorithm">
    <rect x="50" y="150" width="320" height="60" fill="#e74c3c" rx="10" />
    <text x="170" y="170" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">C-SCAN (Circular SCAN)</text>
    <text x="170" y="190" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Like SCAN but returns to beginning without servicing.</text>
    <rect x="120" y="200" width="80" height="20" fill="#3498db" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2s" begin="6s" repeatCount="indefinite" />
  </g>

  <g data-narration="LOOK / C-LOOK Algorithm">
    <rect x="50" y="90" width="320" height="60" fill="#2ecc71" rx="10" />
    <text x="170" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">LOOK / C-LOOK</text>
    <text x="170" y="130" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Like SCAN/C-SCAN but only goes to last request, not disk end.</text>
    <rect x="120" y="140" width="80" height="20" fill="#3498db" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2s" begin="8s" repeatCount="indefinite" />
  </g>

  <g data-narration="Comparison">
    <rect x="50" y="0" width="320" height="100" fill="#3498db" rx="10" />
    <rect x="50" y="110" width="320" height="100" fill="#2ecc71" rx="10" />
    <rect x="50" y="220" width="320" height="100" fill="#e74c3c" rx="10" />
    <text x="170" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">| Algorithm | Movement | Starvation | Variance |</text>
    <text x="170" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">| FCFS      | High     | No         | High     |</text>
    <text x="170" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">| SSTF      | Low      | Yes        | Medium   |</text>
    <text x="170" y="130" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">| SCAN      | Medium   | No         | Medium   |</text>
    <text x="170" y="140" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">| C-SCAN    | Medium   | No         | Low      |</text>
    <text x="170" y="150" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">| LOOK      | Low      | No         | Medium   |</text>
  </g>

  <g data-narration="Formula">
    <rect x="50" y="330" width="320" height="60" fill="#2ecc71" rx="10" />
    <text x="170" y="350" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">**Total Seek Time** = Sum of |current - next| for all requests</text>
    <text x="170" y="370" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Total movement = 640 cylinders</text>
  </g>

  <footer>
    <text x="170" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">Thread Scheduling</text>
  </footer>
</svg>