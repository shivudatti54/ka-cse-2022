<svg width="420" height="400" data-topic-id="inter-process-communication-multi-threaded-programming">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" />
      <stop offset="50%" stop-color="#ADD8E6" />
      <stop offset="100%" stop-color="#87CEEB" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url (#pastel-gradient)" />
  
  <!-- Title -->
  <g transform="translate(10, 10)">
    <text font-size="24" font-weight="bold" text-anchor="left">Inter Process Communication Multi-threaded Program</text>
  </g>
  
  <!-- Section 1: Introduction to IPC -->
  <g transform="translate(15, 50)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="18" font-weight="bold" text-anchor="left">Introduction to IPC</text>
    <text data-narration="In this module, we will explore the concepts of inter-process communication (IPC) and multi-threaded programming." y="60" font-size="14" text-anchor="left" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 2: Types of IPC -->
  <g transform="translate(15, 90)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="18" font-weight="bold" text-anchor="left">Types of IPC</text>
    <rect x="20" y="40" width="150" height="20" fill="#36A2FF" rx="5" />
    <text data-narration="There are four types of IPC: synchronous, asynchronous, message passing, and shared memory." y="60" font-size="14" text-anchor="left" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 3: Advantages of IPC -->
  <g transform="translate(15, 150)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="18" font-weight="bold" text-anchor="left">Advantages of IPC</text>
    <rect x="20" y="40" width="150" height="20" fill="#3E8E41" rx="5" />
    <text data-narration="IPC allows for improved system resource utilization and fault tolerance." y="60" font-size="14" text-anchor="left" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 4: Disadvantages of IPC -->
  <g transform="translate(15, 210)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="18" font-weight="bold" text-anchor="left">Disadvantages of IPC</text>
    <rect x="20" y="40" width="150" height="20" fill="#FFC080" rx="5" />
    <text data-narration="IPC adds complexity to the program and increases communication overhead." y="60" font-size="14" text-anchor="left" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 5: IPC Mechanisms -->
  <g transform="translate(15, 270)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="18" font-weight="bold" text-anchor="left">IPC Mechanisms</text>
    <g fill="none" stroke="#2ECC71" stroke-width="2">
      <path d="M 20 40 L 170 40" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 170 40 L 220 40" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <text data-narration="There are four types of IPC mechanisms: pipes, message queues, shared memory, and semaphores." y="60" font-size="14" text-anchor="left" />
    <animate transform="translate(0, 20)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 6: Example of IPC -->
  <g transform="translate(15, 330)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="18" font-weight="bold" text-anchor="left">Example of IPC</text>
    <rect x="20" y="40" width="150" height="20" fill="#36A2FF" rx="5" />
    <text y="60" font-size="14" text-anchor="left">Process1 sends a message to Process2.</text>
    <g fill="none" stroke="#2ECC71" stroke-width="2">
      <path d="M 20 40 L 170 40" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 170 40 L 220 40" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <animate transform="translate(0, 20)" begin="0.5s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 7: Conclusion -->
  <g transform="translate(15, 390)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="18" font-weight="bold" text-anchor="left">Conclusion</text>
    <text data-narration="In conclusion, IPC is a crucial concept in multi-threaded programming that allows different processes to communicate with each other." y="60" font-size="14" text-anchor="left" />
    <animate transform="translate(0, 20)" begin="1s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Footer -->
  <g transform="translate(15, 440)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="14" text-anchor="left">Copyright 2023</text>
  </g>
</svg>