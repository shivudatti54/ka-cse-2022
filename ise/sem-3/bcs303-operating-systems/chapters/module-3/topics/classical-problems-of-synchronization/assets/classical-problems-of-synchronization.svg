<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="classical-problems-of-synchronization">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Classical synchronization problems are fundamental concurrency challenges involving shared resources and coordinated access." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="22" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#3949AB">Classical Synchronization Problems</text>
    <line x1="60" y1="28" x2="360" y2="28" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- Group 2: Producer-Consumer (Bounded Buffer) -->
  <g data-narration="The Producer-Consumer problem uses a bounded buffer. The producer adds items and the consumer removes them. Three semaphores coordinate access: empty counts free slots, full counts occupied slots, and mutex guards the buffer." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Producer box -->
    <rect x="10" y="38" width="68" height="30" fill="#3949AB" rx="5"/>
    <text x="44" y="57" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Producer</text>
    <!-- Arrow from producer to buffer -->
    <line x1="78" y1="53" x2="108" y2="53" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <polygon points="106,49 114,53 106,57" fill="#3949AB"/>
    <!-- Bounded Buffer -->
    <rect x="114" y="38" width="192" height="30" fill="none" stroke="#3949AB" stroke-width="1.5" rx="3"/>
    <line x1="152" y1="38" x2="152" y2="68" stroke="#3949AB" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="190" y1="38" x2="190" y2="68" stroke="#3949AB" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="228" y1="38" x2="228" y2="68" stroke="#3949AB" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="268" y1="38" x2="268" y2="68" stroke="#3949AB" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="116" y="42" width="34" height="22" fill="#7986CB" rx="2" opacity="0.7"/>
    <rect x="154" y="42" width="34" height="22" fill="#7986CB" rx="2" opacity="0.7"/>
    <rect x="192" y="42" width="34" height="22" fill="#7986CB" rx="2" opacity="0.4"/>
    <text x="210" y="34" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-weight="bold">Bounded Buffer</text>
    <!-- Arrow from buffer to consumer -->
    <polygon points="308,49 316,53 308,57" fill="#3949AB"/>
    <line x1="306" y1="53" x2="336" y2="53" stroke="#3949AB" stroke-width="2"/>
    <!-- Consumer box -->
    <rect x="340" y="38" width="70" height="30" fill="#3949AB" rx="5"/>
    <text x="375" y="57" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Consumer</text>
    <!-- Semaphore labels -->
    <text x="133" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">empty=N</text>
    <text x="210" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">mutex=1</text>
    <text x="287" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">full=0</text>
  </g>

  <!-- Group 3: Readers-Writers -->
  <g data-narration="The Readers-Writers problem allows multiple readers to access shared data simultaneously, but a writer requires exclusive access. When a writer is active, no reader or other writer may proceed." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Shared data box -->
    <rect x="160" y="96" width="100" height="28" fill="#00695C" rx="5"/>
    <text x="210" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Shared Data</text>
    <!-- Reader boxes on left -->
    <rect x="14" y="132" width="56" height="22" fill="#2E7D32" rx="4"/>
    <text x="42" y="147" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Reader 1</text>
    <rect x="76" y="132" width="56" height="22" fill="#2E7D32" rx="4"/>
    <text x="104" y="147" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Reader 2</text>
    <rect x="138" y="132" width="56" height="22" fill="#2E7D32" rx="4"/>
    <text x="166" y="147" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Reader 3</text>
    <!-- Green arrows from readers to data -->
    <line x1="42" y1="132" x2="175" y2="124" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="104" y1="132" x2="195" y2="124" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="166" y1="132" x2="210" y2="124" stroke="#2E7D32" stroke-width="1.2"/>
    <!-- Checkmark for readers OK -->
    <text x="198" y="145" font-family="Arial" font-size="10" fill="#2E7D32" font-weight="bold">OK</text>
    <!-- Writer on right with lock -->
    <rect x="280" y="132" width="56" height="22" fill="#C62828" rx="4"/>
    <text x="308" y="147" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Writer</text>
    <!-- Red lock icon -->
    <rect x="342" y="131" width="16" height="12" fill="#C62828" rx="2"/>
    <rect x="345" y="125" width="10" height="8" fill="none" stroke="#C62828" stroke-width="2" rx="4"/>
    <!-- Red arrow from writer to data with X -->
    <line x1="308" y1="132" x2="250" y2="124" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="365" y="145" font-family="Arial" font-size="8" fill="#C62828" font-weight="bold">Exclusive</text>
    <!-- Description -->
    <text x="210" y="166" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#00695C" font-style="italic">Multiple readers OK, but writer needs exclusive access</text>
  </g>

  <!-- Group 4: Dining Philosophers -->
  <g data-narration="Five philosophers sit around a table with five forks. Each needs two forks to eat. If all pick up their left fork simultaneously, deadlock occurs because none can acquire the right fork." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <!-- Table circle -->
    <circle cx="105" cy="225" r="42" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <text x="105" y="222" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">TABLE</text>
    <text x="105" y="231" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#C62828" font-weight="bold">DEADLOCK!</text>
    <!-- Philosopher 0 (top) -->
    <circle cx="105" cy="175" r="11" fill="#E65100"/>
    <text x="105" y="179" text-anchor="middle" font-family="Arial" font-size="7" fill="white">P0</text>
    <!-- Philosopher 1 (top-right) -->
    <circle cx="147" cy="195" r="11" fill="#E65100"/>
    <text x="147" y="199" text-anchor="middle" font-family="Arial" font-size="7" fill="white">P1</text>
    <!-- Philosopher 2 (bottom-right) -->
    <circle cx="135" cy="265" r="11" fill="#E65100"/>
    <text x="135" y="269" text-anchor="middle" font-family="Arial" font-size="7" fill="white">P2</text>
    <!-- Philosopher 3 (bottom-left) -->
    <circle cx="75" cy="265" r="11" fill="#E65100"/>
    <text x="75" y="269" text-anchor="middle" font-family="Arial" font-size="7" fill="white">P3</text>
    <!-- Philosopher 4 (top-left) -->
    <circle cx="63" cy="195" r="11" fill="#E65100"/>
    <text x="63" y="199" text-anchor="middle" font-family="Arial" font-size="7" fill="white">P4</text>
    <!-- Fork 0 (between P0 and P1) -->
    <rect x="123" y="180" width="3" height="14" fill="#5D4037" transform="rotate(-20, 124, 187)"/>
    <text x="133" y="183" font-family="Arial" font-size="6" fill="#5D4037">F0</text>
    <!-- Fork 1 (between P1 and P2) -->
    <rect x="146" y="228" width="3" height="14" fill="#5D4037" transform="rotate(50, 147, 235)"/>
    <text x="150" y="240" font-family="Arial" font-size="6" fill="#5D4037">F1</text>
    <!-- Fork 2 (between P2 and P3) -->
    <rect x="104" y="268" width="3" height="14" fill="#5D4037" transform="rotate(90, 105, 275)"/>
    <text x="103" y="282" font-family="Arial" font-size="6" fill="#5D4037">F2</text>
    <!-- Fork 3 (between P3 and P4) -->
    <rect x="60" y="228" width="3" height="14" fill="#5D4037" transform="rotate(-50, 61, 235)"/>
    <text x="52" y="240" font-family="Arial" font-size="6" fill="#5D4037">F3</text>
    <!-- Fork 4 (between P4 and P0) -->
    <rect x="78" y="180" width="3" height="14" fill="#5D4037" transform="rotate(20, 79, 187)"/>
    <text x="69" y="183" font-family="Arial" font-size="6" fill="#5D4037">F4</text>
    <!-- Deadlock scenario annotation -->
    <text x="105" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" font-style="italic">All pick left fork -- none can eat</text>

    <!-- Solutions on the right side -->
    <rect x="200" y="178" width="210" height="110" fill="white" fill-opacity="0.5" rx="6" stroke="#3949AB" stroke-width="1"/>
    <text x="305" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB" font-weight="bold">Key Mechanisms</text>
    <!-- Producer-Consumer solution -->
    <circle cx="212" cy="210" r="4" fill="#3949AB"/>
    <text x="220" y="213" font-family="Arial" font-size="7.5" fill="#1A237E">P-C: 3 semaphores (empty, full, mutex)</text>
    <!-- Readers-Writers solution -->
    <circle cx="212" cy="228" r="4" fill="#00695C"/>
    <text x="220" y="231" font-family="Arial" font-size="7.5" fill="#1A237E">R-W: reader_count + rw_mutex</text>
    <!-- Dining Philosophers solution -->
    <circle cx="212" cy="246" r="4" fill="#E65100"/>
    <text x="220" y="249" font-family="Arial" font-size="7.5" fill="#1A237E">Dining: Limit to N-1 philosophers</text>
    <text x="220" y="261" font-family="Arial" font-size="7.5" fill="#1A237E">  or asymmetric fork picking</text>
    <circle cx="212" cy="276" r="4" fill="#7B1FA2"/>
    <text x="220" y="279" font-family="Arial" font-size="7.5" fill="#1A237E">All use wait() and signal() ops</text>
  </g>

  <!-- Group 5: Solutions Overview -->
  <g data-narration="The Producer-Consumer problem uses three semaphores: empty, full, and mutex. Readers-Writers uses a reader count and a read-write mutex. The Dining Philosophers problem can be solved by limiting philosophers or using asymmetric fork picking." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="10" y="305" width="400" height="42" fill="white" fill-opacity="0.55" rx="6" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="319" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Solution Patterns Summary</text>
    <text x="18" y="333" font-family="monospace" font-size="7" fill="#3949AB">Producer-Consumer</text>
    <text x="18" y="342" font-family="monospace" font-size="6.5" fill="#1A237E">  wait(empty); wait(mutex); ... signal(mutex); signal(full);</text>
    <text x="215" y="333" font-family="monospace" font-size="7" fill="#00695C">Readers-Writers</text>
    <text x="215" y="342" font-family="monospace" font-size="6.5" fill="#1A237E">  wait(rw_mutex); ...write... signal(rw_mutex);</text>
  </g>

  <!-- Group 6: Common Challenges -->
  <g data-narration="The three main challenges in synchronization are deadlock, where processes wait forever in a circular chain; starvation, where a process never gets access; and race conditions, where outcomes depend on unpredictable execution order." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="362" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Common Challenges</text>
    <!-- Deadlock warning box -->
    <rect x="20" y="368" width="115" height="24" fill="#FFCDD2" rx="4" stroke="#C62828" stroke-width="1"/>
    <text x="30" y="384" font-family="Arial" font-size="9" fill="#C62828" font-weight="bold">!! Deadlock</text>
    <text x="90" y="384" font-family="Arial" font-size="7" fill="#B71C1C">circular wait</text>
    <!-- Starvation warning box -->
    <rect x="148" y="368" width="120" height="24" fill="#FFF9C4" rx="4" stroke="#F57F17" stroke-width="1"/>
    <text x="158" y="384" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">!! Starvation</text>
    <text x="226" y="384" font-family="Arial" font-size="7" fill="#E65100">no access</text>
    <!-- Race Condition warning box -->
    <rect x="282" y="368" width="126" height="24" fill="#FBE9E7" rx="4" stroke="#E65100" stroke-width="1"/>
    <text x="292" y="384" font-family="Arial" font-size="9" fill="#BF360C" font-weight="bold">!! Race Cond.</text>
    <text x="365" y="384" font-family="Arial" font-size="7" fill="#BF360C">bad order</text>
  </g>
</svg>