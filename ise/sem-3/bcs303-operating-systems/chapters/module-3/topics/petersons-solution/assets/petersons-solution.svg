<svg width="420" height="400" data-topic-id="petersons-solution" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="overflow: visible;">
  <rect fill="url(#gradient-1)" width="420" height="400"/>
  <g id="layer1">
    <g id="group1" transform="translate(10, 10)">
      <text x="15" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3498db" text-anchor="start" id="title">
        Peterson's Solution
      </text>
      <rect fill="#66cccc" width="100" height="10" rx="2" transform="rotate(45 100 5)"/>
      <rect fill="#f1c40f" width="100" height="10" rx="2" transform="rotate(45 200 5)"/>
      <rect fill="#e74c3c" width="100" height="10" rx="2" transform="rotate(45 300 5)"/>
      <rect fill="#2ecc71" width="100" height="10" rx="2" transform="rotate(45 400 5)"/>
    </g>
    <g id="group2">
      <rect x="10" y="50" width="100" height="20" rx="2" fill="#4CAF50"/>
      <animateTransform attributeName="transform" type="rotate" from="0 100 10" to="45 100 10" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="100 10" to="100 30" dur="2s" repeatCount="indefinite"/>
      <text x="110" y="25" font-size="16" font-family="Arial, sans-serif" fill="#4CAF50" text-anchor="end" id="section1">
        Initialize two semaphores, R and W, representing the reader and writer semaphores, respectively.
      </text>
    </g>
    <g id="group3">
      <rect x="10" y="120" width="100" height="20" rx="2" fill="#4CAF50"/>
      <animateTransform attributeName="transform" type="rotate" from="0 100 10" to="90 100 10" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="100 10" to="100 140" dur="2s" repeatCount="indefinite"/>
      <text x="110" y="35" font-size="16" font-family="Arial, sans-serif" fill="#4CAF50" text-anchor="end" id="section2">
        When a reader wants to access the shared resource R:
        <br/> R = R - 1
        <br/> while (W == 0) { W = W + 1; }
        <br/> W = W - 1
      </text>
    </g>
    <g id="group4">
      <rect x="10" y="220" width="100" height="20" rx="2" fill="#4CAF50"/>
      <animateTransform attributeName="transform" type="rotate" from="0 100 10" to="180 100 10" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="100 10" to="100 260" dur="2s" repeatCount="indefinite"/>
      <text x="110" y="35" font-size="16" font-family="Arial, sans-serif" fill="#4CAF50" text-anchor="end" id="section3">
        When the writer wants to modify the shared resource R:
        <br/> W = W + 1
        <br/> R = R - 1
      </text>
    </g>
    <g id="group5">
      <rect x="10" y="320" width="100" height="20" rx="2" fill="#4CAF50"/>
      <animateTransform attributeName="transform" type="rotate" from="0 100 10" to="270 100 10" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="100 10" to="100 340" dur="2s" repeatCount="indefinite"/>
      <text x="110" y="35" font-size="16" font-family="Arial, sans-serif" fill="#4CAF50" text-anchor="end" id="section4">
        When the writer finishes modifying the shared resource, it sets the W semaphore to 0.
        <br/> W = W - 1
      </text>
    </g>
    <g id="group6">
      <rect x="10" y="120" width="100" height="20" rx="2" fill="#4CAF50"/>
      <animateTransform attributeName="transform" type="rotate" from="0 100 10" to="0 100 10" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="100 10" to="100 10" dur="2s" repeatCount="indefinite"/>
      <text x="110" y="25" font-size="16" font-family="Arial, sans-serif" fill="#4CAF50" text-anchor="end" id="section5">
        The final result is a synchronization algorithm that uses two semaphores, one for readers and one for writers.
      </text>
    </g>
    <g id="group7">
      <rect x="10" y="220" width="100" height="20" rx="2" fill="#4CAF50"/>
      <animateTransform attributeName="transform" type="rotate" from="180 100 10" to="180 100 10" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="100 10" to="100 10" dur="2s" repeatCount="indefinite"/>
      <text x="110" y="35" font-size="16" font-family="Arial, sans-serif" fill="#4CAF50" text-anchor="end" id="section6">
        This algorithm provides a way for readers and writers to safely access a shared resource.
      </text>
    </g>
    <rect fill="#66cccc" width="420" height="10" rx="2" transform="rotate(45 10 5)"/>
    <rect fill="#f1c40f" width="420" height="10" rx="2" transform="rotate(45 210 5)"/>
