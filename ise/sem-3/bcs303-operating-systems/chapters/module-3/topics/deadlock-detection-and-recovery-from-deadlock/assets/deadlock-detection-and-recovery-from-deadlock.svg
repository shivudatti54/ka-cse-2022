<svg width="420" height="400" data-topic-id="deadlock-detection-and-recovery-from-deadlock" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" />
      <stop offset="100%" stop-color="#33CCCC" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)" rx="10" />
  <title>Deadlock Detection and Recovery</title>
  <text x="180" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Deadlock Detection and Recovery</text>
  <g transform="translate(0, 50)">
    <section data-narration="Deadlock Detection Algorithm: Banker's Algorithm">
      <rect x="10" y="10" width="400" height="80" fill="#F9F9F9" rx="10" />
      <text x="20" y="30" font-size="16" font-family="Arial, sans-serif">Banker's Algorithm</text>
      <rect x="10" y="60" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="80" font-size="16" font-family="Arial, sans-serif">Maximum Resources Available</text>
      <rect x="10" y="110" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="130" font-size="16" font-family="Arial, sans-serif">Maximum Resources Requested</text>
      <rect x="10" y="160" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="180" font-size="16" font-family="Arial, sans-serif">Available Resources</text>
      <rect x="10" y="210" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="230" font-size="16" font-family="Arial, sans-serif">Requested Resources</text>
    </section>
    <section data-narration="Deadlock Detection Table">
      <rect x="10" y="280" width="400" height="80" fill="#F9F9F9" rx="10" />
      <text x="20" y="300" font-size="16" font-family="Arial, sans-serif">Deadlock Detection Table</text>
      <rect x="10" y="330" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="350" font-size="16" font-family="Arial, sans-serif">Process ID</text>
      <rect x="10" y="380" width="100" height="30" fill="#66CCCC" rx="5" />
      <text x="20" y="400" font-size="16" font-family="Arial, sans-serif">Resource 1</text>
      <rect x="130" width="100" height="30" fill="#66CCCC" rx="5" />
      <text x="240" y="400" font-size="16" font-family="Arial, sans-serif">Resource 2</text>
    </section>
    <section data-narration="Deadlock Recovery">
      <rect x="10" y="450" width="400" height="80" fill="#F9F9F9" rx="10" />
      <text x="20" y="470" font-size="16" font-family="Arial, sans-serif">Deadlock Recovery</text>
      <rect x="10" y="500" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="520" font-size="16" font-family="Arial, sans-serif">Resource Allocation</text>
      <rect x="10" y="550" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="570" font-size="16" font-family="Arial, sans-serif">Resource Release</text>
      <rect x="10" y="610" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="630" font-size="16" font-family="Arial, sans-serif">Process Termination</text>
    </section>
    <section data-narration="Animation">
      <rect x="10" y="680" width="400" height="80" fill="#F9F9F9" rx="10" />
      <text x="20" y="700" font-size="16" font-family="Arial, sans-serif">Animation</text>
      <rect x="10" y="740" width="350" height="30" fill="#66CCCC" rx="5" />
      <text x="15" y="760" font-size="16" font-family="Arial, sans-serif">Animate SVG</text>
      <animate transform="rotate(360 200 200)" begin="0s" dur="2s" repeatCount="indefinite" />
    </section>
  </g>
  <footer>Deadlock Detection and Recovery</footer>
</svg>