<svg width="420" height="400" data-topic-id="deadlock-prevention">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B5A0E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Deadlock Prevention</text>
  
  <!-- Section 1: Mutual Exclusion -->
  <section id="mutual-exclusion" data-narration="Ensure that at least one of the four necessary conditions cannot hold.">
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Mutual Exclusion</text>
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Cannot break for non-shareable resources. Can use spooling to make resource appear shareable.</text>
    <rect x="50" y="100" width="50" height="50" fill="#00BFFF" rx="10"/>
    <text x="70" y="130" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Spooling</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Hold and Wait -->
  <section id="hold-and-wait" data-narration="Request all resources at once before execution.">
    <text x="20" y="160" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Hold and Wait</text>
    <text x="20" y="180" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Problem: Low resource utilization, starvation possible.</text>
    <text x="20" y="200" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Solution A: Request all resources at once before execution.</text>
    <code>
      <text x="20" y="220" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
        <tspan x="20" y="220" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">acquire(R1, R2, R3);</tspan>
        <tspan x="20" y="230" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">// All or none</tspan>
        <tspan x="20" y="240" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">release_all();</tspan>
      </code>
    </section>
  
  <!-- Section 3: No Preemption -->
  <section id="no-preemption" data-narration="If request fails, release all held resources.">
    <text x="20" y="280" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">No Preemption</text>
    <text x="20" y="300" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Solution: If request fails, release all held resources.</text>
    <text x="20" y="320" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Problem: Not always possible.</text>
    <code>
      <text x="20" y="340" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
        <tspan x="20" y="340" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">if (request(R3) fails):</tspan>
        <tspan x="20" y="350" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">release(R1, R2);</tspan>
        <tspan x="20" y="360" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">retry_later();</tspan>
      </code>
    </section>
  
  <!-- Section 4: Circular Wait -->
  <section id="circular-wait" data-narration="Impose ordering on resources. Request in increasing order.">
    <text x="20" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Circular Wait</text>
    <text x="20" y="420" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Solution: Impose ordering on resources. Request in increasing order.</text>
    <text x="20" y="440" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Why it works: If P1 holds Ri and waits for Rj where j > i, and P2 holds Rj, P2 cannot be waiting for Ri (would violate ordering).</text>
  </section>
  
  <!-- Footer -->
  <text x="20" y="380" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">Educational Diagram for Deadlock Prevention</text>
</svg>