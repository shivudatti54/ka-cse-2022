<svg width="420" height="400" data-topic-id="handling-deadlocks">
  <!-- Title Section -->
  <rect x="50" y="20" width="320" height="40" fill="#3498db" />
  <text x="150" y="35" font-size="24" font-family="Arial" fill="#ffffff">Methods for Handling Deadlocks</text>

  <!-- Gradient Background -->
  <linearGradient x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#87ceeb" stop-opacity="1" />
    <stop offset="100%" stop-color="#4682b4" stop-opacity="1" />
  </linearGradient>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" />

  <!-- Section 1: Abort and Restart -->
  <section data-narration="Abort and Restart">
    <rect x="50" y="100" width="320" height="80" fill="#f2f2f2" />
    <animate attributeName="opacity" begin="0s" dur="2000ms" fill="freeze" repeatCount="indefinite" />
    <g transform="rotate(90 190 110)">
      <circle cx="190" cy="110" r="30" fill="#ff9800" />
      <text x="240" y="120" font-size="18" font-family="Arial" fill="#black">Abort and Restart</text>
    </g>
    <path d="M 180 120 C 200 100 220 100 240 120" stroke="#666" stroke-width="2" fill="none" />
    <text x="200" y="150" font-size="16" font-family="Arial" fill="#666">Terminates one process and restarts it.</text>
  </section>

  <section data-narration="Rollback Recovery">
    <rect x="50" y="190" width="320" height="80" fill="#f2f2f2" />
    <animate attributeName="opacity" begin="2s" dur="2000ms" fill="freeze" repeatCount="indefinite" />
    <g transform="rotate(90 190 110)">
      <circle cx="190" cy="110" r="30" fill="#2ecc71" />
      <text x="240" y="120" font-size="18" font-family="Arial" fill="#black">Rollback Recovery</text>
    </g>
    <path d="M 180 120 C 200 100 220 100 240 120" stroke="#666" stroke-width="2" fill="none" />
    <text x="200" y="150" font-size="16" font-family="Arial" fill="#666">Rolls back changes made by processes.</text>
  </section>

  <section data-narration="Priority Inheritance">
    <rect x="50" y="280" width="320" height="80" fill="#f2f2f2" />
    <animate attributeName="opacity" begin="4s" dur="2000ms" fill="freeze" repeatCount="indefinite" />
    <g transform="rotate(90 190 110)">
      <circle cx="190" cy="110" r="30" fill="#e74c3c" />
      <text x="240" y="120" font-size="18" font-family="Arial" fill="#black">Priority Inheritance</text>
    </g>
    <path d="M 180 120 C 200 100 220 100 240 120" stroke="#666" stroke-width="2" fill="none" />
    <text x="200" y="150" font-size="16" font-family="Arial" fill="#666">Prevents priority inversion.</text>
  </section>

  <section data-narration="Resource Preemption">
    <rect x="50" y="330" width="320" height="80" fill="#f2f2f2" />
    <animate attributeName="opacity" begin="6s" dur="2000ms" fill="freeze" repeatCount="indefinite" />
    <g transform="rotate(90 190 110)">
      <circle cx="190" cy="110" r="30" fill="#9b59b6" />
      <text x="240" y="120" font-size="18" font-family="Arial" fill="#black">Resource Preemption</text>
    </g>
    <path d="M 180 120 C 200 100 220 100 240 120" stroke="#666" stroke-width="2" fill="none" />
    <text x="200" y="150" font-size="16" font-family="Arial" fill="#666">Forcibly takes resources from a process.</text>
  </section>

  <!-- Footer Section -->
  <rect x="50" y="370" width="320" height="40" fill="#3498db" />
  <text x="150" y="385" font-size="18" font-family="Arial" fill="#ffffff">Handling Deadlocks</text>
</svg>