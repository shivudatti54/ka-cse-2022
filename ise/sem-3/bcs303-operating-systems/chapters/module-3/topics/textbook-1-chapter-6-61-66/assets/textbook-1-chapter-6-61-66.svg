<svg width="420" height="400" data-topic-id="textbook-1-chapter-6-66"
     xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E9F4F7" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Textbook 1 Chapter 6 6.1-6.6: Interrupts</title>

  <!-- Gradient background with pastel colors -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Section 1: Definition of Interrupt -->
  <section data-narration="Definition of Interrupt">
    <rect x="0" y="50" width="420" height="100" fill="#E9F4F7" rx="10"/>
    <rect x="0" y="120" width="420" height="200" fill="#C9E4CA" rx="10"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 210 210"
      to="360 210 210"
      dur="10s"
      repeatCount="indefinite"/>
    <g fill="#E9F4F7" opacity=".7">
      <text x="20" y="50" font-size="24" text-anchor="middle">
        An interrupt is a signal sent to the CPU by a hardware device or another process to terminate the current execution of the CPU and switch to a new task.
      </text>
    </g>
  </section>

  <!-- Section 2: Causes of Interrupts -->
  <section data-narration="Causes of Interrupts">
    <rect x="0" y="250" width="420" height="100" fill="#E9F4F7" rx="10"/>
    <rect x="0" y="320" width="420" height="200" fill="#C9E4CA" rx="10"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 210 210"
      to="360 210 210"
      dur="10s"
      repeatCount="indefinite"/>
    <g fill="#E9F4F7" opacity=".7">
      <text x="20" y="250" font-size="24" text-anchor="middle">
        <tspan>Hardware interrupts:</tspan>
        <tspan> triggered by hardware devices such as keyboards, mice, and printers.</tspan>
      </text>
      <tspan x="20" y="280">Software interrupts:</tspan>
      <tspan x="20" y="310">triggered by other processes or threads.</tspan>
    </g>
  </section>

  <!-- Section 3: Types of Interrupts -->
  <section data-narration="Types of Interrupts">
    <rect x="0" y="400" width="420" height="100" fill="#E9F4F7" rx="10"/>
    <rect x="0" y="470" width="420" height="200" fill="#C9E4CA" rx="10"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 210 210"
      to="360 210 210"
      dur="10s"
      repeatCount="indefinite"/>
    <g fill="#E9F4F7" opacity=".7">
      <text x="20" y="400" font-size="24" text-anchor="middle">
        <tspan>Hardware Interrupts:</tspan>
        <tspan> triggered by hardware devices such as:</tspan>
        <tspan x="20" y="430">keyboard press</tspan>
        <tspan x="20" y="460">mouse movement</tspan>
        <tspan x="20" y="490">printer output</tspan>
      </text>
      <tspan x="20" y="520">Software Interrupts:</tspan>
      <tspan x="20" y="550">triggered by other processes or threads.</tspan>
    </g>
  </section>

  <!-- Section 4: Interrupt Handling Process -->
  <section data-narration="Interrupt Handling Process">
    <rect x="0" y="600" width="420" height="100" fill="#E9F4F7" rx="10"/>
    <rect x="0" y="670" width="420" height="200" fill="#C9E4CA" rx="10"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 210 210"
      to="360 210 210"
      dur="10s"
      repeatCount="indefinite"/>
    <g fill="#E9F4F7" opacity=".7">
      <text x="20" y="600" font-size="24" text-anchor="middle">
        An interrupt is triggered.
      </text>
      <tspan x="20" y="630">The CPU saves the current state and switches to the interrupt handler routine.</tspan>
      <tspan x="20" y="660">The interrupt handler routine handles the interrupt.</tspan>
      <tspan x="20" y="690">The interrupt handler routine restores the CPU state.</tspan>
    </g>
  </section>

  <!-- Section 5: Steps Involved in Interrupt Handling -->
  <section data-narration="Steps Involved in Interrupt Handling">
    <rect x="0" y="800" width="420" height="100" fill="#E9F4F7" rx="10"/>
    <rect x="0" y="870" width="420" height="200" fill="#C9E4CA" rx="10"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 210 210"
      to="360 210 210"
      dur="10s"
      repeatCount="indefinite"/>
    <g fill="#E9F4F7" opacity=".7">
      <text x="20" y="800" font-size="24" text-anchor="middle">
        <tspan>Interrupt Detection:</tspan>
        <tspan>x</tspan>
      </text>
      <tspan x="20" y="830">Interrupt Request (IRQ):</tspan>
      <tspan>x</tspan>
      <tspan x="20" y="860">Interrupt Vector:</tspan>
      <tspan>x</tspan>
      <tspan x="20" y="890">Context Switching:</tspan>
      <tspan>x</tspan>
      <tspan x="20" y="920">Interrupt Handler Routine:</tspan>
      <tspan>x</tspan>
      <tspan x="20" y="950">Restoring State:</tspan>
      <tspan>x</tspan>
    </g>
  </section>

  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="0" y="1000" width="420" height="100" fill="#E9F4F7" rx="10"/>
    <rect x="0" y="1070" width="420" height="200" fill="#C9E4CA" rx="10"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 210 210"
      to="360 210 210"
      dur="10s"
      repeatCount="indefinite"/>
    <g fill="#E9F4F7" opacity=".7">
      <text x="20" y="1000" font-size="24" text-anchor="middle">
        In conclusion, interrupts are a crucial aspect of computer programming.
      </text>
    </g>
  </section>

  <!-- Footer -->
  <rect x="0" y="370" width="420" height="30" fill="#E9F4F7" rx="10"/>
  <g fill="#E9F4F7" opacity=".7">
    <text x="20" y="375" font-size="18" text-anchor="middle">
      Created by [Your Name]
    </text>
  </g>

  <!-- Arrow markers for connections -->
  <path d="M 20 50 L 40 70 Z"/>
  <path d="M 20 120 L 40 140 Z"/>
  <path d="M 20 250 L 40 270 Z"/>
  <path d="M 20 320 L 40 340 Z"/>
  <path d="M 20 400 L 40 420 Z"/>
  <path d="M 20 600 L 40 620 Z"/>
  <path d="M 20 670 L 40 690 Z"/>
  <path d="M 20 800 L 40 820 Z"/>
  <path d="M 20 870 L 40 890 Z"/>
  <path d="M 20 1000 L 40 1020 Z"/>
</svg>