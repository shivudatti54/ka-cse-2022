<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="deadlock-characterization">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title (0.3s) -->
  <g data-narration="Deadlock Characterization: understanding necessary conditions, resource allocation graphs, and handling strategies." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#283593">Deadlock Characterization</text>
    <line x1="80" y1="35" x2="340" y2="35" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Group 2: Four Necessary Conditions (1.5s) -->
  <g data-narration="Four necessary conditions must ALL hold simultaneously for deadlock: Mutual Exclusion, Hold and Wait, No Preemption, and Circular Wait." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="56" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">4 Necessary Conditions (ALL must hold)</text>
    <!-- Mutual Exclusion -->
    <rect x="15" y="63" width="192" height="38" rx="6" fill="#3949AB"/>
    <text x="111" y="78" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">Mutual Exclusion</text>
    <text x="111" y="93" text-anchor="middle" font-family="Arial" font-size="8" fill="#C5CAE9">Only 1 process can use resource</text>
    <!-- Hold and Wait -->
    <rect x="213" y="63" width="192" height="38" rx="6" fill="#3949AB"/>
    <text x="309" y="78" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">Hold &amp; Wait</text>
    <text x="309" y="93" text-anchor="middle" font-family="Arial" font-size="8" fill="#C5CAE9">Holding one, waiting for another</text>
    <!-- No Preemption -->
    <rect x="15" y="105" width="192" height="38" rx="6" fill="#3949AB"/>
    <text x="111" y="120" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">No Preemption</text>
    <text x="111" y="135" text-anchor="middle" font-family="Arial" font-size="8" fill="#C5CAE9">Resources can't be forcibly taken</text>
    <!-- Circular Wait -->
    <rect x="213" y="105" width="192" height="38" rx="6" fill="#3949AB"/>
    <text x="309" y="120" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF">Circular Wait</text>
    <text x="309" y="135" text-anchor="middle" font-family="Arial" font-size="8" fill="#C5CAE9">P1-R1-P2-R2-P1 cycle</text>
  </g>

  <!-- Group 3: Resource Allocation Graph (3.0s) -->
  <g data-narration="Resource Allocation Graph shows processes as circles, resources as squares. Request edges go from process to resource; assignment edges go from resource to process. A cycle indicates potential deadlock." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="162" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Resource Allocation Graph (RAG)</text>
    <!-- P1 circle -->
    <circle cx="85" cy="195" r="18" fill="none" stroke="#00695C" stroke-width="2"/>
    <text x="85" y="199" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#00695C">P1</text>
    <!-- P2 circle -->
    <circle cx="335" cy="195" r="18" fill="none" stroke="#00695C" stroke-width="2"/>
    <text x="335" y="199" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#00695C">P2</text>
    <!-- R1 square -->
    <rect x="155" y="178" width="34" height="34" fill="none" stroke="#00695C" stroke-width="2"/>
    <circle cx="172" cy="195" r="4" fill="#00695C"/>
    <text x="172" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">R1</text>
    <!-- R2 square -->
    <rect x="233" y="178" width="34" height="34" fill="none" stroke="#00695C" stroke-width="2"/>
    <circle cx="250" cy="195" r="4" fill="#00695C"/>
    <text x="250" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">R2</text>
    <!-- R1 -> P1 (assignment edge) -->
    <line x1="155" y1="195" x2="103" y2="195" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <!-- P1 -> R2 (request edge) -->
    <line x1="100" y1="183" x2="237" y2="183" stroke="#00897B" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowTeal)"/>
    <!-- R2 -> P2 (assignment edge) -->
    <line x1="267" y1="195" x2="317" y2="195" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <!-- P2 -> R1 (request edge) -->
    <line x1="320" y1="207" x2="185" y2="207" stroke="#00897B" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowTealRev)"/>
    <!-- Arrow markers -->
    <defs>
      <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
      </marker>
      <marker id="arrowTealRev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
        <path d="M8,0 L0,3 L8,6 Z" fill="#00695C"/>
      </marker>
    </defs>
    <!-- Legend -->
    <text x="110" y="242" font-family="Arial" font-size="8" fill="#00695C">--- = request</text>
    <text x="210" y="242" font-family="Arial" font-size="8" fill="#00695C">--- = assignment</text>
    <line x1="88" y1="239" x2="108" y2="239" stroke="#00897B" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="188" y1="239" x2="208" y2="239" stroke="#00695C" stroke-width="1.5"/>
  </g>

  <!-- Group 4: Deadlock Detection (4.5s) -->
  <g data-narration="If a cycle exists in the Resource Allocation Graph with single-instance resources, deadlock is confirmed. The cycle P1 to R2 to P2 to R1 to P1 proves deadlock." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="25" y="250" width="370" height="32" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <text x="210" y="263" text-anchor="middle" font-family="Arial" font-size="9.5" font-weight="bold" fill="#C62828">Deadlock Detection</text>
    <text x="210" y="276" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#C62828">Cycle in RAG + single-instance resources = DEADLOCK</text>
  </g>

  <!-- Group 5: Handling Strategies (6.0s) -->
  <g data-narration="Three main deadlock handling strategies: Prevention breaks at least one necessary condition; Avoidance uses the Banker's algorithm to stay in safe state; Detection and Recovery detects deadlocks then kills or rolls back processes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="298" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Handling Strategies</text>
    <!-- Prevention -->
    <rect x="15" y="305" width="125" height="40" rx="6" fill="#E65100"/>
    <text x="77" y="320" text-anchor="middle" font-family="Arial" font-size="9.5" font-weight="bold" fill="#FFFFFF">Prevention</text>
    <text x="77" y="337" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#FFE0B2">Break one condition</text>
    <!-- Avoidance -->
    <rect x="148" y="305" width="125" height="40" rx="6" fill="#E65100"/>
    <text x="210" y="320" text-anchor="middle" font-family="Arial" font-size="9.5" font-weight="bold" fill="#FFFFFF">Avoidance</text>
    <text x="210" y="337" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#FFE0B2">Banker's Algorithm</text>
    <!-- Detection & Recovery -->
    <rect x="281" y="305" width="125" height="40" rx="6" fill="#E65100"/>
    <text x="343" y="320" text-anchor="middle" font-family="Arial" font-size="9.5" font-weight="bold" fill="#FFFFFF">Detect &amp; Recover</text>
    <text x="343" y="337" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#FFE0B2">Kill / Rollback</text>
  </g>

  <!-- Group 6: Break Any ONE Condition (7.5s) -->
  <g data-narration="To prevent deadlock, break any ONE of the four conditions. Allow sharing to break mutual exclusion. Request all resources at once to break hold and wait. Allow preemption to break no preemption. Impose resource ordering to break circular wait." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="15" y="352" width="390" height="42" rx="6" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5"/>
    <text x="210" y="366" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#283593">Break ANY ONE Condition to Prevent Deadlock</text>
    <text x="55" y="384" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#2E7D32">&#x2713; Share resources</text>
    <text x="160" y="384" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#2E7D32">&#x2713; Request all at once</text>
    <text x="270" y="384" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#2E7D32">&#x2713; Allow preemption</text>
    <text x="370" y="384" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#2E7D32">&#x2713; Order resources</text>
  </g>
</svg>
