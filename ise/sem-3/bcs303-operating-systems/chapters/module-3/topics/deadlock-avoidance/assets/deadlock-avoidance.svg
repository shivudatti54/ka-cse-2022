<svg width="420" height="400" data-topic-id="deadlock-avoidance">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" />
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="40" width="400" height="30" fill="#FFFFFF" stroke="#333333" />
    <text x="50" y="50" font-size="24" fill="#333333">Deadlock Avoidance</text>
    <text x="50" y="70" font-size="18" fill="#666666">Banker's Algorithm</text>
  </section>
  
  <!-- Section 2: Banker's Algorithm Data Structures -->
  <section data-narration="Banker's Algorithm Data Structures">
    <rect x="10" y="80" width="350" height="50" fill="#FFFFFF" stroke="#333333" />
    <rect x="10" y="90" width="100" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="120" y="90" width="50" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="120" y="110" width="100" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="120" y="120" width="100" height="20" fill="#FFFFFF" stroke="#333333" />
    <text x="50" y="100" font-size="18" fill="#333333">State</text>
    <text x="190" y="90" font-size="18" fill="#333333">Available</text>
    <text x="250" y="90" font-size="18" fill="#333333">Max</text>
    <text x="50" y="120" font-size="18" fill="#333333">Allocation</text>
    <text x="190" y="110" font-size="18" fill="#333333">Need</text>
  </section>
  
  <!-- Section 3: Safety Algorithm -->
  <section data-narration="Safety Algorithm">
    <rect x="10" y="160" width="400" height="50" fill="#FFFFFF" stroke="#333333" />
    <rect x="10" y="170" width="150" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="170" y="170" width="80" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="70" y="210" width="150" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="170" y="220" width="80" height="20" fill="#FFFFFF" stroke="#333333" />
    <text x="50" y="190" font-size="18" fill="#333333">Work = Available</text>
    <text x="50" y="210" font-size="18" fill="#333333">Finish[i] = false</text>
    <text x="190" y="190" font-size="18" fill="#333333">Find i: Need[i] <= Work</text>
    <text x="50" y="220" font-size="18" fill="#333333">Work = Work + Allocation[i]</text>
    <text x="50" y="240" font-size="18" fill="#333333">Finish[i] = true</text>
  </section>
  
  <!-- Section 4: Resource Request Algorithm -->
  <section data-narration="Resource Request Algorithm">
    <rect x="10" y="290" width="400" height="50" fill="#FFFFFF" stroke="#333333" />
    <rect x="10" y="300" width="50" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="120" y="300" width="50" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="60" y="340" width="50" height="20" fill="#FFFFFF" stroke="#333333" />
    <text x="50" y="310" font-size="18" fill="#333333">Request[i] > Need[i]: ERROR</text>
    <text x="50" y="330" font-size="18" fill="#333333">Request[i] > Available: Wait</text>
    <text x="120" y="310" font-size="18" fill="#333333">Pretend to allocate</text>
    <text x="120" y="330" font-size="18" fill="#333333">Run Safety Algorithm</text>
    <text x="60" y="340" font-size="18" fill="#333333">Grant request</text>
  </section>
  
  <!-- Section 5: Example -->
  <section data-narration="Example">
    <rect x="10" y="390" width="100" height="50" fill="#FFFFFF" stroke="#333333" />
    <rect x="120" y="390" width="100" height="50" fill="#FFFFFF" stroke="#333333" />
    <rect x="220" y="390" width="100" height="50" fill="#FFFFFF" stroke="#333333" />
    <rect x="320" y="390" width="100" height="50" fill="#FFFFFF" stroke="#333333" />
    <rect x="420" y="390" width="100" height="50" fill="#FFFFFF" stroke="#333333" />
    <text x="50" y="410" font-size="18" fill="#333333">Processes: P0, P1, P2, P3, P4</text>
    <text x="120" y="410" font-size="18" fill="#333333">Resources: A(10), B(5), C(7)</text>
    <text x="220" y="410" font-size="18" fill="#333333">Allocation    Max         Need</text>
    <text x="220" y="430" font-size="18" fill="#333333">    A B C     A B C       A B C</text>
    <text x="220" y="450" font-size="18" fill="#333333">P0  0 1 0     7 5 3       7 4 3</text>
    <text x="220" y="470" font-size="18" fill="#333333">P1  2 0 0     3 2 2       1 2 2</text>
    <text x="220" y="490" font-size="18" fill="#333333">P2  3 0 2     9 0 2       6 0 0</text>
    <text x="220" y="510" font-size="18" fill="#333333">P3  2 1 1     2 2 2       0 1 1</text>
    <text x="220" y="530" font-size="18" fill="#333333">P4  0 0 2     4 3 3       4 3 1</text>
    <text x="220" y="550" font-size="18" fill="#333333">Available: 3 3 2</text>
    <text x="220" y="570" font-size="18" fill="#333333">Safe sequence: P1 → P3 → P4 → P2 → P0</text>
  </section>
  
  <!-- Section 6: Limitations -->
  <section data-narration="Limitations">
    <rect x="10" y="630" width="400" height="50" fill="#FFFFFF" stroke="#333333" />
    <rect x="10" y="640" width="50" height="20" fill="#FFFFFF" stroke="#333333" />
    <rect x="120" y="640" width="50" height="20" fill="#FFFFFF" stroke="#333333" />
    <text x="50" y="650" font-size="18" fill="#333333">Processes must declare max needs in advance</text>
    <text x="50" y="670" font-size="18" fill="#333333">Number of resources fixed</text>
    <text x="120" y="650" font-size="18" fill="#333333">Overhead of safety check for each request</text>
  </section>
  
  <!-- Title -->
  <text x="50" y="20" font-size="36" fill="#66CCCC" text-anchor="middle">Deadlock Avoidance</text>
  
  <!-- Footer -->
  <text x="50" y="380" font-size="18" fill="#666666" text-anchor="middle">Animated Educational Diagram</text>
</svg>