<svg 
  width="420" 
  height="400" 
  viewBox="0 0 420 400" 
  xmlns="http://www.w3.org/2000/svg" 
  data-topic-id="digital-design-and-computer-organization-1-9" 
  data-slug="digital-design-and-computer-organization-1-9"
>
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"></stop>
    </linearGradient>
  </defs>

  <!-- Background layer -->
  <rect fill="url(#gradient-background)" width="420" height="400"></rect>

  <!-- Title section -->
  <section data-narration="Introduction to Digital Design">
    <text x="50%" y="20%" font-size="48" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Text Book 1 19: Digital Design and Computer Organization</text>
  </section>

  <!-- Section 1: Definition of Digital Design -->
  <section data-narration="Definition of Digital Design">
    <rect x="10" y="100" width="400" height="50" fill="#F7F7F7" rx="5" data-narration="A digital circuit is a circuit that processes digital information using binary digits;"></rect>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"></animateTransform>
    <text x="20" y="150" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Digital circuits use binary digits (bits) to process information.</text>
    <text x="20" y="180" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Digital design is the process of creating these circuits.</text>
  </section>

  <!-- Section 2: Importance of Digital Design -->
  <section data-narration="Importance of Digital Design">
    <rect x="10" y="170" width="400" height="50" fill="#F7F7F7" rx="5" data-narration="Digital design is crucial in computer organization as it forms the basis of all digital systems;"></rect>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"></animateTransform>
    <text x="20" y="210" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">It enables the creation of digital circuits that can perform specific functions.</text>
    <text x="20" y="240" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">These functions are then combined to form larger systems.</text>
  </section>

  <!-- Section 3: Types of Digital Design -->
  <section data-narration="Types of Digital Design">
    <rect x="10" y="260" width="400" height="50" fill="#F7F7F7" rx="5" data-narration="There are two types of digital design: sequential and combinational design;"></rect>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"></animateTransform>
    <text x="20" y="300" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Sequential design depends on the current input and state of the circuit.</text>
    <text x="20" y="330" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Combinational design depends only on the current inputs.</text>
  </section>

  <!-- Section 4: Digital Design Techniques -->
  <section data-narration="Digital Design Techniques">
    <rect x="10" y="350" width="400" height="50" fill="#F7F7F7" rx="5" data-narration="Digital design techniques include combinatorial and sequential logic;"></rect>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"></animateTransform>
    <text x="20" y="390" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Combinatorial logic is used for combinational design.</text>
    <text x="20" y="420" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Sequential logic is used for sequential design.</text>
  </section>

  <!-- Section 5: Digital Design Tools -->
  <section data-narration="Digital Design Tools">
    <rect x="10" y="430" width="400" height="50" fill="#F7F7F7" rx="5" data-narration="Digital design tools include logic simulators and more;"></rect>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"></animateTransform>
    <text x="20" y="470" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Logic simulators are used to design and simulate digital circuits.</text>
    <text x="20" y="500" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Other tools include more advanced software for designing and optimizing digital circuits.</text>
  </section>

  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="10" y="510" width="400" height="50" fill="#F7F7F7" rx="5" data-narration="Digital design is a crucial component of computer organization, enabling the creation of digital circuits that perform specific functions."</rect>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"></animateTransform>
    <text x="20" y="550" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Understanding digital design is essential for anyone working in computer organization.</text>
  </section>

  <!-- Footer section -->
  <text x="50%" y="380" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3577B7">Animated Educational Diagram</text>
</svg>