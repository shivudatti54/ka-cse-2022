<svg width="420" height="400" data-topic-id="HDL-Models-Of-Combinational-Circuits-Adder">
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="pastel-colors" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-colors)"/>
    
    <!-- Title -->
    <text x="50%" y="20" font-size="30" font-family="Arial" fill="#2E4053" text-anchor="middle">HDL Models of Combinational Circuits Adder</text>
    
    <!-- Introduction Section -->
    <section data-narration="Introduction">
        <rect x="10" y="50" width="400" height="30" fill="#E0E0E0"/>
        <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Introduction</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="5000" begin="0s"/>
    </section>
    
    <!-- What is an Adder Section -->
    <section data-narration="What is an Adder">
        <rect x="10" y="90" width="400" height="30" fill="#E0E0E0"/>
        <text x="20" y="100" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">What is an Adder?</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 120" to="360 200 120" dur="5000" begin="1s"/>
        <line x1="50" y1="100" x2="300" y2="100" stroke="#2E4053" stroke-width="2"/>
    </section>
    
    <!-- Types of Adders Section -->
    <section data-narration="Types of Adders">
        <rect x="10" y="130" width="400" height="30" fill="#E0E0E0"/>
        <text x="20" y="140" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Types of Adders</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 160" to="360 200 160" dur="5000" begin="2s"/>
        <circle cx="200" cy="150" r="50" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
    </section>
    
    <!-- HDL Models of Adders Section -->
    <section data-narration="HDL Models of Adders">
        <rect x="10" y="170" width="400" height="30" fill="#E0E0E0"/>
        <text x="20" y="180" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">HDL Models of Adders</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5000" begin="3s"/>
        <rect x="50" y="190" width="300" height="20" fill="#E0E0E0" stroke="#2E4053" stroke-width="2"/>
    </section>
    
    <!-- Verilog Example Section -->
    <section data-narration="Verilog Example">
        <rect x="10" y="210" width="400" height="30" fill="#E0E0E0"/>
        <text x="20" y="220" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Verilog Example</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 240" to="360 200 240" dur="5000" begin="4s"/>
        <code>module adder(a, b, sum, carry_out); input [1:0] a; input [1:0] b; output [1:0] sum; output carry_out; assign sum = a + b; assign carry_out = (a + b) > 2'b11; endmodule</code>
    </section>
    
    <!-- VHDL Example Section -->
    <section data-narration="VHDL Example">
        <rect x="10" y="250" width="400" height="30" fill="#E0E0E0"/>
        <text x="20" y="260" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">VHDL Example</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 280" to="360 200 280" dur="5000" begin="5s"/>
        <code>library IEEE; use IEEE.STD_LOGIC; entity adder is Port ( a : in  STD_LOGIC_VECTOR (1 downto 0); b : in ...); endentity</code>
    </section>
    
    <!-- Conclusion Section -->
    <section data-narration="Conclusion">
        <rect x="10" y="290" width="400" height="30" fill="#E0E0E0"/>
        <text x="20" y="300" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Conclusion</text>
        <animate-transform attributeName="transform" type="rotate" from="0 200 320" to="360 200 320" dur="5000" begin="6s"/>
    </section>
    
    <!-- Footer -->
    <text x="50%" y="380" font-size="20" font-family="Arial" fill="#2E4053" text-anchor="middle">Learn more about digital design and computer organization</text>
</svg>