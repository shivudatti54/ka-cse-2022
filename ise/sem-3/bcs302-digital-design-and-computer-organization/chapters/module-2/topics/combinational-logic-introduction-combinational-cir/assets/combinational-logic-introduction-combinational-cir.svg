<svg width="420" height="400" data-topic-id="combinational-logic-introduction-combinational-circuit" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8E225F"/>
      <stop offset="50%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
  </defs>
  <title>Combinational Logic Introduction Combinational Circuit</title>
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="30" height="15" fill="#333" rx="5"/>
    <text x="5" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Combinational Logic</text>
    <rect x="35" y="0" width="30" height="15" fill="#333" rx="5"/>
    <animate transform="rotate(360 35 0)" begin="0s" dur="2s" fill="freeze"/>
    <text x="40" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Introduction</text>
    <rect x="70" y="0" width="30" height="15" fill="#333" rx="5"/>
    <animate transform="rotate(720 70 0)" begin="2s" dur="2s" fill="freeze"/>
    <text x="75" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Combinational Circuits</text>
    <rect x="105" y="0" width="30" height="15" fill="#333" rx="5"/>
    <animate transform="rotate(1080 105 0)" begin="4s" dur="2s" fill="freeze"/>
    <text x="110" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Types of Combinational Circuits</text>
    <rect x="140" y="0" width="30" height="15" fill="#333" rx="5"/>
    <animate transform="rotate(1440 140 0)" begin="6s" dur="2s" fill="freeze"/>
    <text x="145" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">AND Gate</text>
    <path d="M 150 15 L 180 45 L 210 15 Z" stroke="#3E8E41" stroke-width="2" fill="none"/>
    <text x="155" y="25" font-size="16" font-family="Arial, sans-serif" fill="#fff">OR Gate</text>
    <path d="M 150 15 L 120 45 L 210 15 Z" stroke="#3E8E41" stroke-width="2" fill="none"/>
    <rect x="250" y="0" width="30" height="15" fill="#333" rx="5"/>
    <animate transform="rotate(1680 250 0)" begin="8s" dur="2s" fill="freeze"/>
    <text x="255" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">NOT Gate</text>
    <path d="M 250 15 L 290 45 L 330 15 Z" stroke="#3E8E41" stroke-width="2" fill="none"/>
    <text x="255" y="25" font-size="16" font-family="Arial, sans-serif" fill="#fff">XOR Gate</text>
    <path d="M 250 15 L 280 45 L 290 15 Z" stroke="#3E8E41" stroke-width="2" fill="none"/>
    <rect x="370" y="0" width="30" height="15" fill="#333" rx="5"/>
    <animate transform="rotate(1920 370 0)" begin="10s" dur="2s" fill="freeze"/>
    <text x="375" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Design Procedure</text>
    <rect x="405" y="0" width="30" height="15" fill="#333" rx="5"/>
    <animate transform="rotate(2160 405 0)" begin="12s" dur="2s" fill="freeze"/>
    <text x="410" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Karnaugh Map Method</text>
    <rect x="450" y="0" width="30" height="15" fill="#333" rx="5"/>
    <animate transform="rotate(2400 450 0)" begin="14s" dur="2s" fill="freeze"/>
    <text x="455" y="5" font-size="16" font-family="Arial, sans-serif" fill="#fff">Conclusion</text>
  </g>
  <rect x="10" y="400" width="400" height="10" fill="#333"/>
  <text x="20" y="415" font-size="16" font-family="Arial, sans-serif" fill="#fff">Copyright 2023</text>
