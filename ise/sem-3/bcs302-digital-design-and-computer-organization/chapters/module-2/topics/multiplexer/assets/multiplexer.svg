<svg width="420" height="400" data-topic-id="Multiplexer" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <style>
    /* Gradient background */
    .background {
      fill: none;
      stroke: #f0f0f0;
      stroke-width: 2;
    }

    /* Pastel colors */
    .pastel-indigo {
      fill: #7a288a;
      stroke: #7a288a;
    }

    .pastel-teal {
      fill: #1abc9c;
      stroke: #1abc9c;
    }

    .pastel-orange {
      fill: #e74c3c;
      stroke: #e74c3c;
    }

    /* Text styles */
    .text {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    .text-sub {
      font-size: 12px;
      color: #666;
    }
  </style>

  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f0f0" stop-opacity="1" />
      <stop offset="100%" stop-color="#e0e0e0" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" class="background" style="fill: url(#gradient);" />

  <!-- Section 1: Introduction -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="300" height="50" class="pastel-indigo" />
    <text class="text" x="10" y="20" text-anchor="start">Multiplexer</text>
    <text class="text-sub" x="10" y="40" text-anchor="start">A digital switch controlled by select lines</text>
  </g>

  <!-- Section 2: 2:1 Multiplexer -->
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="200" height="100" class="pastel-teal" />
    <text class="text" x="10" y="20" text-anchor="start">2:1 Multiplexer</text>
    <text class="text-sub" x="10" y="40" text-anchor="start">I0, I1, S, Y</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0 0" to="200 0" dur="2s" begin="0.5s" />
  </g>

  <!-- Section 3: 4:1 Multiplexer -->
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="400" height="150" class="pastel-orange" />
    <text class="text" x="10" y="20" text-anchor="start">4:1 Multiplexer</text>
    <text class="text-sub" x="10" y="40" text-anchor="start">I0, I1, I2, I3, S1, S0, Y</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 0" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0 0" to="400 0" dur="2s" begin="0.5s" />
  </g>

  <!-- Section 4: General n:1 Multiplexer -->
  <g transform="translate(20, 320)">
    <rect x="0" y="0" width="420" height="150" class="pastel-teal" />
    <text class="text" x="10" y="20" text-anchor="start">General n:1 Multiplexer</text>
    <text class="text-sub" x="10" y="40" text-anchor="start">n data inputs, k select lines, 1 output</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 0" dur="2s" begin="0s" />
  </g>

  <!-- Section 5: Truth Tables -->
  <g transform="translate(20, 410)">
    <rect x="0" y="0" width="400" height="150" class="pastel-orange" />
    <text class="text" x="10" y="20" text-anchor="start">Truth Tables</text>
    <text class="text-sub" x="10" y="40" text-anchor="start">2:1 MUX, 4:1 MUX</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 0" dur="2s" begin="0s" />
  </g>

  <!-- Section 6: Gate-Level Implementation -->
  <g transform="translate(20, 510)">
    <rect x="0" y="0" width="420" height="150" class="pastel-teal" />
    <text class="text" x="10" y="20" text-anchor="start">Gate-Level Implementation</text>
    <text class="text-sub" x="10" y="40" text-anchor="start">2:1 MUX, 4:1 MUX</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 0" dur="2s" begin="0s" />
  </g>

  <!-- Footer -->
  <text class="text" x="20" y="380" text-anchor="start">Multiplexer</text>
</svg>