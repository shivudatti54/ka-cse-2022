<svg width="420" height="400" data-topic-id="encoder" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="0s" />
      </stop>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="0s" />
      </stop>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="0s" />
      </stop>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="50" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#1A1D23">Encoder</text>

  <!-- 4:2 Simple Encoder Section -->
  <rect x="20" y="60" width="300" height="100" fill="url(#pastel-gradient)" rx="10" data-narration="This is a 4:2 simple encoder, which converts 4 input lines into 2 output lines. It performs the reverse operation of a decoder, converting a one-hot input into a binary code. The output is represented by Y1 and Y0, which can be either 0 or 1." begin="0s" />

  <rect x="20" y="170" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| I3  | I2  | I1  | I0  | Y1  | Y0  |" begin="0s" />
  <rect x="140" y="170" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 0   | 0   | 0   | 1   | 0   | 0   |" begin="0s" />
  <rect x="140" y="200" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 0   | 0   | 1   | 0   | 0   | 1   |" begin="0s" />
  <rect x="140" y="230" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 1   | 0   | 0   | 0   | 1   | 1   |" begin="0s" />

  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="0s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="5s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="10s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="15s" />

  <text x="20" y="250" font-size="18" font-family="Arial" text-anchor="middle" fill="#1A1D23">Truth Table</text>
  <text x="140" y="250" font-size="18" font-family="Arial" text-anchor="middle" fill="#1A1D23">Boolean Expressions</text>

  <!-- Priority Encoder Section -->
  <rect x="20" y="330" width="300" height="100" fill="url(#pastel-gradient)" rx="10" data-narration="The priority encoder is used to encode higher priority inputs and handle multiple active inputs. It outputs the code for the highest priority input and includes a valid output to indicate any input active." begin="0s" />

  <rect x="20" y="400" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| Active Inputs       | Y2  | Y1  | Y0  | V   |" begin="0s" />
  <rect x="140" y="400" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| None                | X   | X   | X   | 0   |" begin="0s" />
  <rect x="140" y="430" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| I0 only             | 0   | 0   | 0   | 1   |" begin="0s" />
  <rect x="140" y="460" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| I1 (I0&#39;s don&#39;t care)  | 0   | 0   | 1   | 1   |" begin="0s" />
  <rect x="140" y="490" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| I7 (all don&#39;t care) | 1   | 1   | 1   | 1   |" begin="0s" />

  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="0s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="5s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="10s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="15s" />

  <text x="20" y="510" font-size="18" font-family="Arial" text-anchor="middle" fill="#1A1D23">Boolean Expressions</text>

  <!-- Decimal-to-BCD Encoder Section -->
  <rect x="20" y="600" width="300" height="100" fill="url(#pastel-gradient)" rx="10" data-narration="The decimal-to-BCD encoder converts decimal digits (0-9) to 4-bit BCD. It is commonly used in calculators and keyboards." begin="0s" />

  <rect x="20" y="670" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| Decimal Digit | BCD Code |" begin="0s" />
  <rect x="140" y="670" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 0              | 0000  |" begin="0s" />
  <rect x="140" y="700" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 1              | 0001  |" begin="0s" />
  <rect x="140" y="730" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 2              | 0010  |" begin="0s" />
  <rect x="140" y="760" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 3              | 0011  |" begin="0s" />
  <rect x="140" y="790" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 4              | 0100  |" begin="0s" />
  <rect x="140" y="820" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 5              | 0101  |" begin="0s" />
  <rect x="140" y="850" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 6              | 0110  |" begin="0s" />
  <rect x="140" y="880" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 7              | 0111  |" begin="0s" />
  <rect x="140" y="910" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 8              | 1000  |" begin="0s" />
  <rect x="140" y="940" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| 9              | 1001  |" begin="0s" />

  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="0s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="5s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="10s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="15s" />

  <text x="20" y="980" font-size="18" font-family="Arial" text-anchor="middle" fill="#1A1D23">Applications</text>

  <!-- Applications Section -->
  <rect x="20" y="1050" width="300" height="100" fill="url(#pastel-gradient)" rx="10" data-narration="The encoder is used in various applications, such as keyboards, position encoders, and calculators. Its primary function is to convert inputs into outputs, making it a crucial component in digital systems." begin="0s" />

  <rect x="20" y="1120" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| Keyboards: Convert key press to scan code" begin="0s" />
  <rect x="140" y="1120" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| Position Encoders: Encode shaft/wheel position" begin="0s" />
  <rect x="140" y="1150" width="100" height="30" fill="#E0E0E0" rx="5" data-narration="| Calculators: Convert decimal digits to BCD" begin="0s" />

  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="0s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="5s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="10s" />
  <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" begin="15s" />

  <!-- Footer -->
  <text x="50" y="380" font-size="18" font-family="Arial" text-anchor="middle" fill="#1A1D23">Encoder</text>
</svg>