<svg width="420" height="400" data-topic-id="4-bit-full-adder-and-subtractor-and-simulation">
    <!-- Header Section -->
    <rect x="0" y="0" width="420" height="100" fill="#87CEEB" rx="10"></rect>
    <g transform="translate(10, 10)">
        <text x="0" y="25" fill="#000" font-size="24" font-family="Arial">2 Design A 4 Bit Full Adder And Subtractor And Sim</text>
    </g>

    <!-- Background Gradient Section -->
    <rect x="0" y="150" width="420" height="150" fill="#ADD8E6" rx="10"></rect>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1</stop>
        <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"></stop>
        <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"></stop>
    </linearGradient>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1</stop>
            <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"></stop>
            <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"></stop>
        </linearGradient>
    </defs>
    <rect x="0" y="150" width="420" height="150" fill="url(#pastel-gradient)"></rect>

    <!-- Full Adder Section -->
    <section data-narration="Full Adder">
        <rect x="10" y="250" width="220" height="50" fill="#4CAF50" rx="10"></rect>
        <g transform="translate(12, 260)">
            <text x="0" y="20" fill="#000" font-size="18" font-family="Arial">A (Input Bit)</text>
            <rect x="0" y="40" width="10" height="10" fill="#000"></rect>
            <text x="15" y="40" fill="#000" font-size="14" font-family="Arial">B (Input Bit)</text>
            <rect x="30" y="40" width="10" height="10" fill="#000"></rect>
            <text x="45" y="40" fill="#000" font-size="14" font-family="Arial">Ci (Carry-In Bit)</text>
            <rect x="60" y="40" width="10" height="10" fill="#000"></rect>
            <text x="75" y="40" fill="#000" font-size="14" font-family="Arial">S (Sum Bit)</text>
            <rect x="90" y="40" width="10" height="10" fill="#000"></rect>
            <text x="105" y="40" fill="#000" font-size="14" font-family="Arial">C (Carry Bit)</text>
            <rect x="120" y="40" width="10" height="10" fill="#000"></rect>
            <text x="135" y="40" fill="#000" font-size="14" font-family="Arial">C_out (Carry-Out Bit)</text>
        </g>
        <animate transform="translate(12, 260) rotate(45) translate(0, -20)" begin="100ms" duration="2000" repeat-count="indefinite"></animate>
        <animate transform="translate(12, 260) rotate(90) translate(0, -20)" begin="300ms" duration="2000" repeat-count="indefinite"></animate>
    </section>

    <!-- Subtractor Section -->
    <section data-narration="Subtractor">
        <rect x="10" y="350" width="220" height="50" fill="#4CAF50" rx="10"></rect>
        <g transform="translate(12, 360)">
            <text x="0" y="20" fill="#000" font-size="18" font-family="Arial">A (Input Bit)</text>
            <rect x="0" y="40" width="10" height="10" fill="#000"></rect>
            <text x="15" y="40" fill="#000" font-size="14" font-family="Arial">B (Input Bit)</text>
            <rect x="30" y="40" width="10" height="10" fill="#000"></rect>
            <text x="45" y="40" fill="#000" font-size="14" font-family="Arial">Bi (Borrow-In Bit)</text>
            <rect x="60" y="40" width="10" height="10" fill="#000"></rect>
            <text x="75" y="40" fill="#000" font-size="14" font-family="Arial">S (Difference Bit)</text>
            <rect x="90" y="40" width="10" height="10" fill="#000"></rect>
            <text x="105" y="40" fill="#000" font-size="14" font-family="Arial">B (Borrow Bit)</text>
            <rect x="120" y="40" width="10" height="10" fill="#000"></rect>
            <text x="135" y="40" fill="#000" font-size="14" font-family="Arial">B_out (Borrow-Out Bit)</text>
        </g>
        <animate transform="translate(12, 360) rotate(45) translate(0, -20)" begin="100ms" duration="2000" repeat-count="indefinite"></animate>
        <animate transform="translate(12, 360) rotate(90) translate(0, -20)" begin="300ms" duration="2000" repeat-count="indefinite"></animate>
    </section>

    <!-- Title Section -->
    <rect x="0" y="0" width="420" height="50" fill="#87CEEB" rx="10"></rect>
    <g transform="translate(10, 10)">
        <text x="0" y="25" fill="#000" font-size="24" font-family="Arial">2 Design A 4 Bit Full Adder And Subtractor And Sim</text>
    </g>

    <!-- Footer Section -->
    <rect x="0" y="400" width="420" height="50" fill="#87CEEB" rx="10"></rect>
    <g transform="translate(10, 410)">
        <text x="0" y="25" fill="#000" font-size="18" font-family="Arial">Learn Digital Design and Computer Organization</text>
    </g>
</svg>