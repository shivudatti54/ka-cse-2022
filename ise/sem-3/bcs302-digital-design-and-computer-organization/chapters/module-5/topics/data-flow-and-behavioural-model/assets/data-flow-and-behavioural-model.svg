<svg width="420" height="400" data-topic-id="data-flow-and-behavioural-model">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="20" fill="url(#pastel-gradient)"/>
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#2F4F7F">Data Flow and Behavioural Model</text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="60" width="400" height="100" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="xy" type="translate" from="0 0" to="0 20" dur="2s" begin="0s"/>
    <polygon points="25,60 35,50 45,60 55,50 65,60" fill="none" stroke="#2F4F7F" stroke-width="2"/>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#2F4F7F" transform="rotate(45 25 60)">Data Flow Model</text>
    <animateTransform attributeName="rotate" type="rotate" from="45 25 60" to="0 25 60" dur="2s" begin="0s"/>
  </section>

  <!-- Section 2: Key Concepts -->
  <section data-narration="Key Concepts">
    <rect x="10" y="160" width="400" height="100" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="xy" type="translate" from="0 0" to="0 30" dur="2s" begin="0s"/>
    <line x1="25" y1="50" x2="75" y2="50" stroke="#2F4F7F" stroke-width="2"/>
    <line x1="75" y1="50" x2="25" y2="50" stroke="#2F4F7F" stroke-width="2"/>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#2F4F7F">Data, Data Flow, Processing Element</text>
    <animateTransform attributeName="rotate" type="rotate" from="0 25 60" to="45 25 60" dur="2s" begin="0s"/>
  </section>

  <!-- Section 3: Characteristics -->
  <section data-narration="Characteristics">
    <rect x="10" y="260" width="400" height="100" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="xy" type="translate" from="0 0" to="0 40" dur="2s" begin="0s"/>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#2F4F7F">Graphical Representation, Simple and Intuitive</text>
    <animateTransform attributeName="rotate" type="rotate" from="0 25 60" to="0 25 60" dur="2s" begin="0s"/>
  </section>

  <!-- Section 4: Advantages -->
  <section data-narration="Advantages">
    <rect x="10" y="360" width="400" height="100" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="xy" type="translate" from="0 0" to="0 50" dur="2s" begin="0s"/>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#2F4F7F">Easy to Analyze, Graphical Representation</text>
    <animateTransform attributeName="rotate" type="rotate" from="0 25 60" to="45 25 60" dur="2s" begin="0s"/>
  </section>

  <!-- Section 5: Disadvantages -->
  <section data-narration="Disadvantages">
    <rect x="10" y="460" width="400" height="100" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="xy" type="translate" from="0 0" to="0 70" dur="2s" begin="0s"/>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#2F4F7F">Not Suitable for Complex Systems, Not Suitable for Analysing Behavior</text>
    <animateTransform attributeName="rotate" type="rotate" from="0 25 60" to="0 25 60" dur="2s" begin="0s"/>
  </section>

  <!-- Section 6: Behavioural Model -->
  <section data-narration="Behavioural Model">
    <rect x="10" y="560" width="400" height="100" fill="url(#pastel-gradient)" rx="10"/>
    <animateTransform attributeName="xy" type="translate" from="0 0" to="0 90" dur="2s" begin="0s"/>
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#2F4F7F">Mathematical Representation, Based on Concurrency</text>
    <animateTransform attributeName="rotate" type="rotate" from="0 25 60" to="0 25 60" dur="2s" begin="0s"/>
  </section>

  <!-- Footer at bottom -->
  <rect x="10" y="370" width="400" height="30" fill="#2F4F7F"/>
  <text x="20" y="390" font-size="18" font-family="Arial" fill="#FFFFFF">Data Flow and Behavioural Model</text>
</svg>