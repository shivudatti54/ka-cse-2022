<svg width="420" height="400" data-topic-id="pipeline-performance">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="50" fill="#2F4F7F" rx="10" />
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#FFF" text-anchor="start">
    Pipeline Performance
  </text>

  <!-- Section 1: Pipeline Stages -->
  <rect x="10" y="80" width="400" height="150" fill="url(#pastel-gradient)" rx="10" />
  <rect x="10" y="80" width="50" height="150" fill="#Indigo" rx="10" />
  <text x="60" y="90" font-size="16" font-family="Arial" fill="#FFF" data-narration="The pipeline consists of the following stages: Instruction Fetch, Instruction Decode, Operand Fetch, Execution, Memory Access, Write Back, and Register File.">
    Pipeline Stages
  </text>
  <circle cx="120" cy="110" r="10" fill="#Indigo" />
  <line x1="100" y1="120" x2="140" y2="120" stroke="#Indigo" stroke-width="2" />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="0 120"
    to="140 120"
    begin="0s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="140 120"
    to="0 120"
    begin="2s"
    dur="2s"
    repeatCount="indefinite"
  />
  <text x="120" y="130" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    Instruction Fetch (IF)
  </text>
  <text x="120" y="140" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    Instruction Decode (ID)
  </text>
  <text x="120" y="150" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    Operand Fetch (OF)
  </text>
  <text x="120" y="160" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    Execution (EX)
  </text>
  <text x="120" y="170" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    Memory Access (MA)
  </text>
  <text x="120" y="180" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    Write Back (WB)
  </text>
  <text x="120" y="190" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    Register File (RF)
  </text>

  <!-- Section 2: Pipeline Stages with Execution Time -->
  <rect x="10" y="250" width="400" height="150" fill="url(#pastel-gradient)" rx="10" />
  <rect x="10" y="250" width="50" height="150" fill="#Indigo" rx="10" />
  <text x="60" y="260" font-size="16" font-family="Arial" fill="#FFF" data-narration="The execution time for each stage varies. Instruction Fetch, Instruction Decode, and Operand Fetch are fixed at 1 cycle each. Execution time is variable. Memory Access and Write Back are also variable. Register File is fixed at 1 cycle.">
    Pipeline Stages with Execution Time
  </text>
  <circle cx="120" cy="270" r="10" fill="#Indigo" />
  <line x1="100" y1="280" x2="140" y2="280" stroke="#Indigo" stroke-width="2" />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="0 280"
    to="140 280"
    begin="0s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="140 280"
    to="0 280"
    begin="2s"
    dur="2s"
    repeatCount="indefinite"
  />
  <text x="120" y="290" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    IF
  </text>
  <text x="120" y="300" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    ID
  </text>
  <text x="120" y="310" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    OF
  </text>
  <text x="120" y="320" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    EX
  </text>
  <text x="120" y="330" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    MA
  </text>
  <text x="120" y="340" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    WB
  </text>
  <text x="120" y="350" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    RF
  </text>

  <!-- Section 3: Pipeline Stages with Data Transfer Time -->
  <rect x="10" y="450" width="400" height="150" fill="url(#pastel-gradient)" rx="10" />
  <rect x="10" y="450" width="50" height="150" fill="#Indigo" rx="10" />
  <text x="60" y="460" font-size="16" font-family="Arial" fill="#FFF" data-narration="The data transfer time between stages is also fixed at 1 cycle each, except for Register File which is fixed at 1 cycle.">
    Pipeline Stages with Data Transfer Time
  </text>
  <circle cx="120" cy="470" r="10" fill="#Indigo" />
  <line x1="100" y1="480" x2="140" y2="480" stroke="#Indigo" stroke-width="2" />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="0 480"
    to="140 480"
    begin="0s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="140 480"
    to="0 480"
    begin="2s"
    dur="2s"
    repeatCount="indefinite"
  />
  <text x="120" y="490" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    IF to ID
  </text>
  <text x="120" y="500" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    ID to OF
  </text>
  <text x="120" y="510" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    OF to EX
  </text>
  <text x="120" y="520" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    EX to MA
  </text>
  <text x="120" y="530" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    MA to WB
  </text>
  <text x="120" y="540" font-size="14" font-family="Arial" fill="#FFF" text-anchor="middle">
    WB to RF
  </text>

  <!-- Footer at bottom -->
  <rect x="10" y="390" width="400" height="20" fill="#2F4F7F" rx="10" />
  <text x="20" y="400" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">
    Created by [Your Name]
  </text>
</svg>