<svg width="420" height="400" data-topic-id="execution-of-a-complete-instruction">
  <style>
    /* Add some basic styling to our SVG */
    body {
      background-color: #66CCCC; /* light blue, indigo base */
    }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  <title>Execution of a Complete Instruction</title>
  <g transform="translate(10, 10)">
    <!-- Instruction Code Section -->
    <g data-narration="Instruction Code">
      <rect x="0" y="20" width="150" height="50" fill="#C6E2B5" rx="5" stroke="#000" stroke-width="1"/>
      <text x="15" y="35" fill="#000" font-size="16">Instruction Code</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="2s"/>
    </g>
    <line x1="170" y1="20" x2="170" y2="50" stroke="#000" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- Operand Section -->
    <g data-narration="Operand">
      <rect x="0" y="80" width="150" height="50" fill="#C6E2B5" rx="5" stroke="#000" stroke-width="1"/>
      <text x="15" y="95" fill="#000" font-size="16">Operand</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,70" dur="2s"/>
    </g>
    <line x1="170" y1="80" x2="170" y2="50" stroke="#000" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- Addressing Mode Section -->
    <g data-narration="Addressing Mode">
      <rect x="0" y="140" width="150" height="50" fill="#C6E2B5" rx="5" stroke="#000" stroke-width="1"/>
      <text x="15" y="155" fill="#000" font-size="16">Addressing Mode</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s"/>
    </g>
    <line x1="170" y1="140" x2="170" y2="50" stroke="#000" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- Instruction Fetch Section -->
    <g data-narration="Instruction Fetch">
      <rect x="0" y="200" width="150" height="50" fill="#C6E2B5" rx="5" stroke="#000" stroke-width="1"/>
      <text x="15" y="215" fill="#000" font-size="16">Instruction Fetch</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s"/>
    </g>
    <line x1="170" y1="200" x2="170" y2="50" stroke="#000" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- Instruction Decode Section -->
    <g data-narration="Instruction Decode">
      <rect x="0" y="260" width="150" height="50" fill="#C6E2B5" rx="5" stroke="#000" stroke-width="1"/>
      <text x="15" y="275" fill="#000" font-size="16">Instruction Decode</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s"/>
    </g>
    <line x1="170" y1="260" x2="170" y2="50" stroke="#000" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- Execution Section -->
    <g data-narration="Execution">
      <rect x="0" y="320" width="150" height="50" fill="#C6E2B5" rx="5" stroke="#000" stroke-width="1"/>
      <text x="15" y="335" fill="#000" font-size="16">Execution</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,10" dur="2s"/>
    </g>
    <line x1="170" y1="320" x2="170" y2="50" stroke="#000" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- Memory Access Section -->
    <g data-narration="Memory Access">
      <rect x="0" y="380" width="150" height="50" fill="#C6E2B5" rx="5" stroke="#000" stroke-width="1"/>
      <text x="15" y="395" fill="#000" font-size="16">Memory Access</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,0" dur="2s"/>
    </g>
    <line x1="170" y1="380" x2="170" y2="50" stroke="#000" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- Write Back Section -->
    <g data-narration="Write Back">
      <rect x="0" y="440" width="150" height="50" fill="#C6E2B5" rx="5" stroke="#000" stroke-width="1"/>
      <text x="15" y="455" fill="#000" font-size="16">Write Back</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,0" dur="2s"/>
    </g>
    <line x1="170" y1="440" x2="170" y2="50" stroke="#000" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  </g>
  <g transform="translate(10, 430)">
    <text x="0" y="450" font-size="24">Complete Instruction Execution</text>
  </g>
</svg>