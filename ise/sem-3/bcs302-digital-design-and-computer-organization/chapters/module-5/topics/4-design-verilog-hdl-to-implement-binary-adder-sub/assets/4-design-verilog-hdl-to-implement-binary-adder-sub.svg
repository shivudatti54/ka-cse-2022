<svg width="420" height="400" data-topic-id="Design-Verilog-HDL-Binary-Adder-Subtractor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" style="background-color: #66CCCC; gradient: linear-gradient(to bottom, #66CCCC, #66CCCC9);">
    <!-- Header Section -->
    <rect x="10" y="10" width="400" height="50" style="fill: #2E4053; border-radius: 10px 10px 0 0; background-image: linear-gradient(to bottom, #66CCCC, #66CCCC9);"/>
    <text x="15" y="25" style="font-size: 24px; font-family: Arial, sans-serif; color: #2E4053;" data-narration="Binary Adder/Subtractor: Introduction">Binary Adder/Subtractor</text>
    <animate transform="rotate(0 200 150)" begin="0s" dur="5s" repeatCount="indefinite"/>
    
    <!-- Half Adder Section -->
    <rect x="10" y="70" width="400" height="100" style="fill: #66CCCC; border-radius: 10px 10px 10px 10px; background-image: linear-gradient(to bottom, #66CCCC, #66CCCC9);"/>
    <g transform="translate(40, 85)">
        <circle cx="20" cy="20" r="10" fill="#66CCCC" style="stroke: #2E4053; stroke-width: 2;" data-narration="Half Adder Circuit: XOR Gates"/>
        <line x1="40" y1="40" x2="40" y2="80" style="stroke: #2E4053; stroke-width: 2;" data-narration="Half Adder Circuit: AND Gate"/>
        <circle cx="80" cy="20" r="10" fill="#66CCCC" style="stroke: #2E4053; stroke-width: 2;" data-narration="Half Adder Circuit: XOR Gates"/>
        <line x1="100" y1="40" x2="100" y2="80" style="stroke: #2E4053; stroke-width: 2;" data-narration="Half Adder Circuit: AND Gate"/>
        <text x="30" y="120" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" data-narration="Half Adder Truth Table: Sum and Carry Outputs">Sum and Carry Outputs</text>
        <animate transform="rotate(0 140 100)" begin="0s" dur="5s" repeatCount="indefinite"/>
    </g>
    <rect x="10" y="175" width="400" height="50" style="fill: #66CCCC; border-radius: 10px 10px 0 0; background-image: linear-gradient(to bottom, #66CCCC, #66CCCC9);"/>
    <text x="15" y="190" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" data-narration="Half Adder Verilog Code: Module Definition">Half Adder Verilog Code</text>
    <code y="210" x="15" style="font-size: 12px; font-family: monospace; color: #2E4053;" data-narration="Half Adder Verilog Code: Input Ports and Output Ports">module half_adder(A, B, sum, carry);\n    input A, B;\n    output sum, carry;\n    sum = A XOR B;\n    carry = A AND B;\nendmodule</code>
    
    <!-- Full Adder Section -->
    <rect x="10" y="250" width="400" height="100" style="fill: #66CCCC; border-radius: 10px 10px 10px 10px; background-image: linear-gradient(to bottom, #66CCCC, #66CCCC9);"/>
    <g transform="translate(40, 265)">
        <circle cx="20" cy="20" r="10" fill="#66CCCC" style="stroke: #2E4053; stroke-width: 2;" data-narration="Full Adder Circuit: XOR Gates"/>
        <line x1="40" y1="40" x2="40" y2="80" style="stroke: #2E4053; stroke-width: 2;" data-narration="Full Adder Circuit: AND Gate"/>
        <circle cx="80" cy="20" r="10" fill="#66CCCC" style="stroke: #2E4053; stroke-width: 2;" data-narration="Full Adder Circuit: XOR Gates"/>
        <line x1="100" y1="40" x2="100" y2="80" style="stroke: #2E4053; stroke-width: 2;" data-narration="Full Adder Circuit: AND Gate"/>
        <circle cx="120" cy="20" r="10" fill="#66CCCC" style="stroke: #2E4053; stroke-width: 2;" data-narration="Full Adder Circuit: XOR Gates"/>
        <line x1="140" y1="40" x2="140" y2="80" style="stroke: #2E4053; stroke-width: 2;" data-narration="Full Adder Circuit: AND Gate"/>
        <text x="30" y="285" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" data-narration="Full Adder Truth Table: Sum and Carry Outputs">Sum and Carry Outputs</text>
        <animate transform="rotate(0 160 110)" begin="0s" dur="5s" repeatCount="indefinite"/>
    </g>
    <rect x="10" y="330" width="400" height="50" style="fill: #66CCCC; border-radius: 10px 10px 0 0; background-image: linear-gradient(to bottom, #66CCCC, #66CCCC9);"/>
    <text x="15" y="345" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" data-narration="Full Adder Verilog Code: Module Definition">Full Adder Verilog Code</text>
    <code y="365" x="15" style="font-size: 12px; font-family: monospace; color: #2E4053;" data-narration="Full Adder Verilog Code: Input Ports and Output Ports">module full_adder(A, B, C, sum, carry);\n    input A, B, C;\n    output sum, carry;\n    sum = ((A XOR B) XOR C);\n    carry = ((A AND B) OR (B AND C) OR (A AND C));\nendmodule</code>
    
    <!-- Footer Section -->
    <rect x="10" y="390" width="400" height="20" style="fill: #2E4053; border-radius: 10px 10px 10px 10px; background-image: linear-gradient(to bottom, #66CCCC, #66CCCC9);"/>
    <text x="15" y="400" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" data-narration="Binary Adder/Subtractor: Conclusion">Binary Adder/Subtractor</text>
</svg>