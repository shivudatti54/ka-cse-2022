<svg width="420" height="400" data-topic-id="multiplexers-and-demultiplexers" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
    <title>Multiplexers and Demultiplexers</title>
    <rect x="120" y="20" width="180" height="360" style="fill: #C7B8EA;"/>
    <g transform="translate(0 20)">
        <rect x="10" y="10" width="100" height="10" style="fill: #3498db;"/>
        <text x="15" y="25" style="font-family: 'Open Sans', sans-serif; font-size: 16px; color: #2c3e50;" fill="none">Multiplexers and Demultiplexers</text>
        <g transform="translate(150 10)">
            <rect x="10" y="10" width="100" height="10" style="fill: #C7B8EA;"/>
            <text x="15" y="25" style="font-family: 'Open Sans', sans-serif; font-size: 16px; color: #2c3e50;" fill="none">Introduction</text>
            <section data-narration="Introduction" style="display: none;">
                <p>Multiplexers are digital circuits that select one of several input signals and send it to a single output.</p>
            </section>
        </g>
        <g transform="translate(330 10)">
            <rect x="10" y="10" width="100" height="10" style="fill: #C7B8EA;"/>
            <text x="15" y="25" style="font-family: 'Open Sans', sans-serif; font-size: 16px; color: #2c3e50;" fill="none">Types of Multiplexers</text>
            <section data-narration="Types of Multiplexers" style="display: none;">
                <h2>2:1 Multiplexer</h2>
                <table style="border-collapse: collapse;">
                    <tr>
                        <th style="border: 1px solid #3498db;">Select Line 1</th>
                        <th style="border: 1px solid #3498db;">Select Line 2</th>
                        <th style="border: 1px solid #3498db;">Data Input</th>
                        <th style="border: 1px solid #3498db;">Output</th>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #3498db;">0</td>
                        <td style="border: 1px solid #3498db;">0</td>
                        <td style="border: 1px solid #3498db;">A</td>
                        <td style="border: 1px solid #3498db;">A</td>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #3498db;">0</td>
                        <td style="border: 1px solid #3498db;">1</td>
                        <td style="border: 1px solid #3498db;">B</td>
                        <td style="border: 1px solid #3498db;">B</td>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #3498db;">1</td>
                        <td style="border: 1px solid #3498db;">0</td>
                        <td style="border: 1px solid #3498db;">C</td>
                        <td style="border: 1px solid #3498db;">C</td>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #3498db;">1</td>
                        <td style="border: 1px solid #3498db;">1</td>
                        <td style="border: 1px solid #3498db;">D</td>
                        <td style="border: 1px solid #3498db;">D</td>
                    </tr>
                </table>
                <p>The 2:1 multiplexer has three inputs: two select lines and one data input.</p>
            </section>
            <section data-narration="2:1 Multiplexer Truth Table" style="display: none;">
                <h2>Verilog Code for 2:1 Multiplexer</h2>
                <pre style="font-family: 'Monaco', monospace; font-size: 14px; color: #2c3e50;">
                    module mux_21(
                        input  wires[1:0] sel,
                        input  wires[2:0] data,
                        output wires[2:0] output
                    );

                    always @*
                        case(sel)
                            0: output = data[0];
                            1: output = data[1];
                            default: output = 3'd0;
                        endcase
                    endmodule
                </pre>
            </section>
            <section data-narration="3:1 Multiplexer" style="display: none;">
                <p>The 3:1 multiplexer is an extension of the 2:1 multiplexer that selects one of three input signals and sends it to a single output.</p>
            </section>
        </g>
        <g transform="translate(120 170)">
            <rect x="10" y="10" width="100" height="10" style="fill: #3498db;"/>
            <text x="15" y="25" style="font-family: 'Open Sans', sans-serif; font-size: 16px; color: #2c3e50;" fill="none">3:1 Multiplexer</text>
            <section data-narration="3:1 Multiplexer Truth Table" style="display: none;">
                <h2>Verilog Code for 3:1 Multiplexer</h2>
                <pre style="font-family: 'Monaco', monospace; font-size: 14px; color: #2c3e50;">
                    module mux_31(
                        input  wires[2:0] sel,
                        input  wires[3:0] data,
                        output wires[3:0] output
                    );

                    always @*
                        case(sel)
                            0: output = data[0];
                            1: output = data[1];
                            2: output = data[2];
                            default: output = 3'd0;
                        endcase
                    endmodule
                </pre>
            </section>
        </g>
        <g transform="translate(330 170)">
            <rect x="10" y="10" width="100" height="10" style="fill: #3498db;"/>
            <text x="15" y="25" style="font-family: 'Open Sans', sans-serif; font-size: 16px; color: #2c3e50;" fill="none">Demultiplexers</text>
            <section data-narration="Demultiplexers" style="display: none;">
                <p>Demultiplexers are digital circuits that select one of several output signals and send it to a single input.</p>
            </section>
        </g>
        <g transform="translate(120 320)">
            <rect x="10" y="10" width="100" height="10" style="fill: #C7B8EA;"/>
            <text x="15" y="25" style="font-family: 'Open Sans', sans-serif; font-size: 16px; color: #2c3e50;" fill="none">Conclusion</text>
            <section data-narration="Conclusion" style="display: none;">
                <p>Multiplexers and demultiplexers are essential components in digital systems.</p>
            </section>
        </g>
    </g>
    <g transform="translate(0 370)">
        <rect x="10" y="10" width="100" height="10" style="fill: #3498db;"/>
