<svg width="420" height="400" data-topic-id="pipelining-basic-concepts">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7E8C5" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" opacity="0.8" />
  
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="left">
    Pipelining Basic Concepts
  </text>
  
  <!-- Section 1: What is Pipelining? -->
  <section data-narration="What is Pipelining?">
    <rect x="10" y="50" width="400" height="50" fill="#87CEEB" opacity="1" rx="10" />
    <text x="20" y="70" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      Pipelining is a technique to overlap instruction execution.
    </text>
    <text x="20" y="90" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      It's like an assembly line where multiple instructions are executed simultaneously.
    </text>
  </section>
  
  <!-- Section 2: 5-Stage MIPS Pipeline -->
  <section data-narration="5-Stage MIPS Pipeline">
    <rect x="10" y="120" width="400" height="50" fill="#87CEEB" opacity="1" rx="10" />
    <rect x="15" y="130" width="340" height="30" fill="#C9E4CA" opacity="1" rx="5" />
    <text x="15" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      5-Stage MIPS Pipeline
    </text>
    <text x="15" y="170" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      | Stage | Name               | Action                             |
    </text>
    <text x="15" y="190" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      | IF    | Instruction Fetch  | Read instruction from memory       |
    </text>
    <text x="15" y="210" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      | ID    | Instruction Decode | Decode opcode, read registers      |
    </text>
    <text x="15" y="230" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      | EX    | Execute            | ALU operation, address calculation |
    </text>
    <text x="15" y="250" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      | MEM   | Memory Access      | Load/Store memory access           |
    </text>
    <text x="15" y="270" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      | WB    | Write Back         | Write result to register           |
    </text>
  </section>
  
  <!-- Section 3: Pipeline Execution -->
  <section data-narration="Pipeline Execution">
    <rect x="10" y="310" width="400" height="50" fill="#87CEEB" opacity="1" rx="10" />
    <rect x="15" y="320" width="340" height="30" fill="#C9E4CA" opacity="1" rx="5" />
    <text x="15" y="340" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      Time
    </text>
    <text x="15" y="360" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      →  1   2   3   4   5   6   7   8   9
    </text>
    <text x="15" y="380" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      I1:    IF  ID  EX MEM  WB
    </text>
    <text x="15" y="400" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      I2:        IF  ID  EX MEM  WB
    </text>
    <text x="15" y="420" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      I3:            IF  ID  EX MEM  WB
    </text>
    <text x="15" y="440" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      I4:                IF  ID  EX MEM  WB
    </text>
    <text x="15" y="460" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      I5:                    IF  ID  EX MEM  WB
    </text>
  </section>
  
  <!-- Section 4: Performance Metrics -->
  <section data-narration="Performance Metrics">
    <rect x="10" y="500" width="400" height="50" fill="#87CEEB" opacity="1" rx="10" />
    <rect x="15" y="510" width="340" height="30" fill="#C9E4CA" opacity="1" rx="5" />
    <text x="15" y="530" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      Without pipelining:
    </text>
    <text x="15" y="550" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      - Time = n × k × τ (n instructions, k stages, τ cycle time)
    </text>
    <text x="15" y="570" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      With pipelining:
    </text>
    <text x="15" y="590" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      - Time = (k + n - 1) × τ
    </text>
    <text x="15" y="610" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      Speedup:
    </text>
    <text x="15" y="630" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      Speedup = n × k / (k + n - 1)
    </text>
    <text x="15" y="650" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      For large n: Speedup ≈ k
    </text>
  </section>
  
  <!-- Section 5: CPI (Cycles Per Instruction) -->
  <section data-narration="CPI (Cycles Per Instruction)">
    <rect x="10" y="700" width="400" height="50" fill="#87CEEB" opacity="1" rx="10" />
    <rect x="15" y="710" width="340" height="30" fill="#C9E4CA" opacity="1" rx="5" />
    <text x="15" y="730" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      Ideal pipelined CPI = 1
    </text>
    <text x="15" y="750" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
      Actual CPI = 1 + stall cycles
    </text>
  </section>
  
  <!-- Footer -->
  <text x="10" y="390" font-size="16" font-family="Arial, sans-serif" text-anchor="left">
    Created by [Your Name]
  </text>
</svg>