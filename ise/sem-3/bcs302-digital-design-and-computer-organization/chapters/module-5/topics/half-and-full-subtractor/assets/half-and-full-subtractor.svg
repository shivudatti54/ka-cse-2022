<svg width="420" height="400" data-topic-id="half-and-full-subtractor" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#66B3FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#gradient)" rx="10"/>
  <text x="10" y="20" font-size="24" fill="#4F4F4F">Half and Full Subtractor</text>
  <g transform="translate(50, 100)">
    <rect width="30" height="30" fill="#66CCCC" rx="5" data-narration="Half Subtractor Circuit"/>
    <rect x="10" width="20" height="20" fill="#66B3FF" rx="5" data-narration="AND Gate"/>
    <rect x="30" width="20" height="20" fill="#66B3FF" rx="5" data-narration="Inverter 1"/>
    <rect x="10" width="20" height="20" fill="#66B3FF" rx="5" data-narration="OR Gate"/>
    <rect x="30" width="20" height="20" fill="#66B3FF" rx="5" data-narration="Inverter 2"/>
    <rect x="40" width="10" height="10" fill="#FFA07A" rx="5" data-narration="Output (Borrow)"/>
    <rect x="50" width="10" height="10" fill="#FFA07A" rx="5" data-narration="Output (Result)"/>
    <line x1="40" y1="50" x2="50" y2="50" stroke="#4F4F4F" stroke-width="2" data-narration="Borrow Flag"/>
    <line x1="50" y1="50" x2="60" y2="50" stroke="#4F4F4F" stroke-width="2" data-narration="Result Flag"/>
    <line x1="40" y1="30" x2="50" y2="30" stroke="#4F4F4F" stroke-width="2" data-narration="Inverter 1 Input"/>
    <line x1="50" y1="30" x2="60" y2="30" stroke="#4F4F4F" stroke-width="2" data-narration="Inverter 2 Input"/>
    <line x1="40" y1="20" x2="50" y2="20" stroke="#4F4F4F" stroke-width="2" data-narration="AND Gate Input"/>
    <line x1="50" y1="20" x2="60" y2="20" stroke="#4F4F4F" stroke-width="2" data-narration="OR Gate Input"/>
    <animate transform="translate(50, 150)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(50, 250)" begin="2s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(50, 350)" begin="4s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(50, 450)" begin="6s" dur="2s" repeatCount="indefinite"/>
  </g>
  <text x="10" y="380" font-size="24" fill="#4F4F4F">Educational Diagram: Half and Full Subtractor</text>
</svg>