<svg width="420" height="400" data-topic-id="cache-memory" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#44AA99" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0097A7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Cache Memory Diagram -->
  <g transform="translate(10, 20)">
    <!-- Cache Line Structure -->
    <rect x="10" y="10" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="Cache Line Structure: A small, fast memory that stores frequently accessed data to reduce average memory access time.">
      <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="30" font-size="12" fill="#333" text-anchor="middle">Valid</text>
      <text x="60" y="30" font-size="12" fill="#333" text-anchor="middle">Tag</text>
      <text x="100" y="30" font-size="12" fill="#333" text-anchor="middle">Data Block</text>
    </rect>
    
    <!-- Address Partitioning -->
    <g transform="translate(220, 10)">
      <rect x="10" y="10" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="Address Partitioning: Memory address is divided into three parts: tag, index, and offset.">
        <animateTransform attributeName="transform" type="translate" begin="0.2s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="30" font-size="12" fill="#333" text-anchor="middle">Tag</text>
        <text x="70" y="30" font-size="12" fill="#333" text-anchor="middle">Index</text>
        <text x="120" y="30" font-size="12" fill="#333" text-anchor="middle">Offset</text>
      </g>
      
      <!-- Cache Mapping Techniques -->
      <g transform="translate(220, 70)">
        <!-- Direct Mapped Cache -->
        <rect x="10" y="10" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="Direct Mapped Cache: Each memory block maps to exactly one cache line.">
          <animateTransform attributeName="transform" type="translate" begin="0.4s" dur="2s" repeatCount="indefinite"/>
          <text x="20" y="30" font-size="12" fill="#333" text-anchor="middle">Conflict Misses</text>
        </rect>
        
        <!-- Fully Associative Cache -->
        <rect x="10" y="70" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="Fully Associative Cache: Any memory block can go in any cache line.">
          <animateTransform attributeName="transform" type="translate" begin="0.6s" dur="2s" repeatCount="indefinite"/>
          <text x="20" y="30" font-size="12" fill="#333" text-anchor="middle">No Conflict Misses</text>
        </rect>
        
        <!-- Set-Associative Cache -->
        <rect x="10" y="130" width="200" height="50" fill="#F7F7F7" rx="5" data-narration="Set-Associative Cache: Compromise between direct-mapped and fully associative.">
          <animateTransform attributeName="transform" type="translate" begin="0.8s" dur="2s" repeatCount="indefinite"/>
          <text x="20" y="30" font-size="12" fill="#333" text-anchor="middle">n-way Set Associative</text>
        </rect>
      </g>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="14" fill="#333" text-anchor="left">Cache Memory Diagram</text>
</svg>