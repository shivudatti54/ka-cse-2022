<svg width="420" height="400" data-topic-id="digital-design-and-computer-organization-4.1-introduction-to-digital-logic">
    <!-- Gradient background with pastel colors -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
    
    <!-- Title at top -->
    <text x="50%" y="20%" font-size="30" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">
        Introduction to Digital Logic
    </text>
    
    <!-- Section 1: Binary Numbers -->
    <section data-narration="Binary Numbers are the fundamental unit of digital logic. They consist of only two digits: 0 and 1.">
        <rect x="50%" y="150%" width="80%" height="30%" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2"/>
        <text x="70%" y="170%" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
            Binary Numbers
        </text>
        <animateTransform attributeName="transform" type="translate" from="0,150" to="0,150" dur="1s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="0,170" to="0,170" dur="1s" begin="0.5s"/>
    </section>
    
    <!-- Section 2: Boolean Algebra -->
    <section data-narration="Boolean algebra is a mathematical system used to describe digital logic. It involves the use of logical operators such as AND, OR, and NOT.">
        <rect x="50%" y="240%" width="80%" height="30%" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2"/>
        <text x="70%" y="270%" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
            Boolean Algebra
        </text>
        <animateTransform attributeName="transform" type="translate" from="0,240" to="0,240" dur="1s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="0,270" to="0,270" dur="1s" begin="0.5s"/>
    </section>
    
    <!-- Section 3: AND Operation -->
    <section data-narration="The AND operation is represented by the symbol ∧. It produces an output of 1 only if both inputs are 1.">
        <rect x="50%" y="330%" width="80%" height="30%" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2"/>
        <text x="70%" y="360%" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
            AND Operation
        </text>
        <animateTransform attributeName="transform" type="translate" from="0,330" to="0,330" dur="1s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="0,360" to="0,360" dur="1s" begin="0.5s"/>
        <line x1="70%" y1="360%" x2="130%" y2="360%" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    </section>
    
    <!-- Section 4: OR Operation -->
    <section data-narration="The OR operation is represented by the symbol ∨. It produces an output of 1 if either or both inputs are 1.">
        <rect x="50%" y="420%" width="80%" height="30%" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2"/>
        <text x="70%" y="450%" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
            OR Operation
        </text>
        <animateTransform attributeName="transform" type="translate" from="0,420" to="0,420" dur="1s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="0,450" to="0,450" dur="1s" begin="0.5s"/>
        <line x1="70%" y1="450%" x2="130%" y2="450%" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    </section>
    
    <!-- Section 5: NOT Operation -->
    <section data-narration="The NOT operation is represented by the symbol ¬. It produces an output that is the opposite of the input.">
        <rect x="50%" y="510%" width="80%" height="30%" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2"/>
        <text x="70%" y="540%" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
            NOT Operation
        </text>
        <animateTransform attributeName="transform" type="translate" from="0,510" to="0,510" dur="1s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="0,540" to="0,540" dur="1s" begin="0.5s"/>
        <line x1="70%" y1="540%" x2="130%" y2="540%" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    </section>
    
    <!-- Footer -->
    <text x="50%" y="380%" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498DB">
        Created by [Your Name]
    </text>
</svg>