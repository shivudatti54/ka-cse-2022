<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="templates-generic-functions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="C++ Templates allow writing generic, reusable code that works with any data type." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#283593">C++ Templates &amp; Generic Functions</text>
    <line x1="60" y1="35" x2="360" y2="35" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Function Template -->
  <g data-narration="A function template lets you write one function that works with multiple types. Here, add works for both int and double." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <rect x="15" y="44" width="390" height="82" rx="6" fill="#3949AB" fill-opacity="0.08" stroke="#3949AB" stroke-width="1"/>
    <text x="25" y="60" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Function Template</text>
    <text x="25" y="76" font-family="monospace" font-size="9.5" fill="#1A237E">template&lt;typename T&gt;</text>
    <text x="25" y="89" font-family="monospace" font-size="9.5" fill="#1A237E">T add(T a, T b) { return a + b; }</text>
    <rect x="240" y="65" width="155" height="16" rx="3" fill="#3949AB" fill-opacity="0.12"/>
    <text x="248" y="77" font-family="monospace" font-size="9" fill="#3949AB">add(3, 5)</text>
    <text x="315" y="77" font-family="Arial" font-size="9" fill="#283593" font-weight="bold">--> 8</text>
    <rect x="240" y="84" width="155" height="16" rx="3" fill="#3949AB" fill-opacity="0.12"/>
    <text x="248" y="96" font-family="monospace" font-size="9" fill="#3949AB">add(1.5, 2.5)</text>
    <text x="340" y="96" font-family="Arial" font-size="9" fill="#283593" font-weight="bold">--> 4.0</text>
    <text x="25" y="120" font-family="Arial" font-size="8.5" fill="#5C6BC0" font-style="italic">One definition, multiple type usages</text>
  </g>

  <!-- Group 3: Class Template -->
  <g data-narration="A class template defines a blueprint class that can be instantiated with different types, like Vector of int or Vector of string." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="15" y="132" width="390" height="78" rx="6" fill="#00695C" fill-opacity="0.08" stroke="#00695C" stroke-width="1"/>
    <text x="25" y="148" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Class Template</text>
    <text x="25" y="163" font-family="monospace" font-size="9.5" fill="#004D40">template&lt;class T&gt;</text>
    <text x="25" y="176" font-family="monospace" font-size="9.5" fill="#004D40">class Vector { T* arr; int sz; };</text>
    <rect x="255" y="150" width="140" height="18" rx="4" fill="#00695C" fill-opacity="0.15"/>
    <text x="262" y="163" font-family="monospace" font-size="9.5" fill="#00695C" font-weight="bold">Vector&lt;int&gt;</text>
    <rect x="255" y="172" width="140" height="18" rx="4" fill="#00695C" fill-opacity="0.15"/>
    <text x="262" y="185" font-family="monospace" font-size="9.5" fill="#00695C" font-weight="bold">Vector&lt;string&gt;</text>
    <text x="25" y="204" font-family="Arial" font-size="8.5" fill="#26A69A" font-style="italic">Reusable container for any data type</text>
  </g>

  <!-- Group 4: Template Argument Deduction -->
  <g data-narration="When you call add(3, 5), the compiler inspects argument types, deduces T equals int, and generates a concrete int version of the function." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="15" y="216" width="390" height="56" rx="6" fill="#E65100" fill-opacity="0.08" stroke="#E65100" stroke-width="1"/>
    <text x="25" y="232" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Template Argument Deduction</text>
    <!-- Flow: call -> inspect -> deduce -> generate -->
    <rect x="22" y="240" width="68" height="24" rx="4" fill="#E65100" fill-opacity="0.15"/>
    <text x="56" y="256" text-anchor="middle" font-family="monospace" font-size="8" fill="#BF360C">add(3, 5)</text>
    <text x="96" y="255" font-family="Arial" font-size="10" fill="#E65100">--></text>
    <rect x="110" y="240" width="72" height="24" rx="4" fill="#E65100" fill-opacity="0.15"/>
    <text x="146" y="256" text-anchor="middle" font-family="Arial" font-size="8" fill="#BF360C">Inspect args</text>
    <text x="188" y="255" font-family="Arial" font-size="10" fill="#E65100">--></text>
    <rect x="200" y="240" width="68" height="24" rx="4" fill="#E65100" fill-opacity="0.15"/>
    <text x="234" y="256" text-anchor="middle" font-family="Arial" font-size="8" fill="#BF360C">T = int</text>
    <text x="274" y="255" font-family="Arial" font-size="10" fill="#E65100">--></text>
    <rect x="286" y="240" width="110" height="24" rx="4" fill="#E65100" fill-opacity="0.2"/>
    <text x="341" y="256" text-anchor="middle" font-family="monospace" font-size="8" fill="#BF360C" font-weight="bold">int add(int,int)</text>
  </g>

  <!-- Group 5: Two-Phase Compilation -->
  <g data-narration="Template compilation happens in two phases. Phase 1 checks the template definition for syntax errors. Phase 2 instantiates the template with actual types and generates machine code." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="15" y="278" width="390" height="62" rx="6" fill="#C62828" fill-opacity="0.07" stroke="#C62828" stroke-width="1"/>
    <text x="25" y="294" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Two-Phase Compilation</text>
    <!-- Phase 1 -->
    <rect x="22" y="301" width="175" height="30" rx="5" fill="#C62828" fill-opacity="0.12"/>
    <text x="30" y="314" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Phase 1</text>
    <text x="74" y="314" font-family="Arial" font-size="8.5" fill="#B71C1C">Template definition</text>
    <text x="30" y="326" font-family="Arial" font-size="8" fill="#E53935">checked for syntax correctness</text>
    <!-- Arrow -->
    <text x="205" y="320" font-family="Arial" font-size="14" fill="#C62828" font-weight="bold">--></text>
    <!-- Phase 2 -->
    <rect x="225" y="301" width="172" height="30" rx="5" fill="#C62828" fill-opacity="0.18"/>
    <text x="233" y="314" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Phase 2</text>
    <text x="277" y="314" font-family="Arial" font-size="8.5" fill="#B71C1C">Template instantiated</text>
    <text x="233" y="326" font-family="Arial" font-size="8" fill="#E53935">with actual types, code generated</text>
  </g>

  <!-- Group 6: Summary - Templates & STL -->
  <g data-narration="Templates are the foundation of the Standard Template Library. STL containers like vector and map, and algorithms like sort and find, are all built using templates." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="15" y="346" width="390" height="46" rx="6" fill="#283593" fill-opacity="0.08" stroke="#283593" stroke-width="1"/>
    <text x="210" y="363" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#283593">Templates are the foundation of the STL</text>
    <rect x="35" y="370" width="68" height="16" rx="3" fill="#3949AB" fill-opacity="0.18"/>
    <text x="69" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB" font-weight="bold">vector</text>
    <rect x="115" y="370" width="55" height="16" rx="3" fill="#00695C" fill-opacity="0.18"/>
    <text x="142" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C" font-weight="bold">map</text>
    <rect x="182" y="370" width="55" height="16" rx="3" fill="#E65100" fill-opacity="0.18"/>
    <text x="209" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">sort</text>
    <rect x="249" y="370" width="55" height="16" rx="3" fill="#C62828" fill-opacity="0.18"/>
    <text x="276" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">find</text>
    <rect x="316" y="370" width="75" height="16" rx="3" fill="#283593" fill-opacity="0.18"/>
    <text x="353" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#283593" font-weight="bold">algorithm</text>
  </g>
</svg>