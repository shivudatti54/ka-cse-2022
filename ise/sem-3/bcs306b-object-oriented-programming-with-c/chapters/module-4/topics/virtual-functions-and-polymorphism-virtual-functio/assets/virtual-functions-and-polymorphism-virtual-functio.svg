      <stop offset="50%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="gradient-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008080" stop-opacity="1" />
      <stop offset="50%" stop-color="#00B200" stop-opacity="1" />
