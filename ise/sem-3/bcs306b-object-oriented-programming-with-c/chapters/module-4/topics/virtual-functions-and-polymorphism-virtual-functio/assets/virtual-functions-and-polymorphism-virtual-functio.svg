    <rect x="10" y="180" width="400" height="20" fill="#C0C0C0" />

    <animateTransform
      attributeName="transform"
      transformOrigin="50% 50%"
      type="rotate"
      from="0 200 100"
      to="45 200 100"
      dur="2s"
      begin="0s"
      repeatCount="indefinite"
    />
    <animateTransform
      attributeName="transform"
      transformOrigin="50% 50%"
      type="translate"
      from="200 100"
      to="220 120"
      dur="2s"
      begin="2s"
      repeatCount="indefinite"
