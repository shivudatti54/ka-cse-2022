<svg width="420" height="400" data-topic-id="virtual-functions-and-polymorphism" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id=" gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
