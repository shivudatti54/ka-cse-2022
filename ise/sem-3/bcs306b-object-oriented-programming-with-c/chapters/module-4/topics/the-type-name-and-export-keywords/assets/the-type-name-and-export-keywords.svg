<svg width="420" height="400" data-topic-id="type-name-and-export-keywords">
  <metadata>
    <title>The Type Name and Export Keywords</title>
    <description>An animated educational SVG diagram for C++</description>
  </metadata>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5E1F5" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        fill: none;
        stroke: #3498db;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .section .title {
        font-size: 24px;
        font-weight: bold;
        text-anchor: start;
        fill: #1f77b4;
      }
      .section .data {
        font-size: 18px;
        text-anchor: start;
        fill: #1f77b4;
      }
      .section .connection {
        stroke: #1f77b4;
        stroke-width: 1;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="400" height="380" fill="url(#pastel-gradient)"/>
    <text x="15" y="10" text-anchor="start" fill="#1f77b4">The Type Name and Export Keywords</text>
    <rect x="0" y="50" width="400" height="100" class="section"/>
    <text x="15" y="60" class="title">Type Name Keyword</text>
    <text x="15" y="80" class="data">The `typename` keyword is used to explicitly specify the type of a variable or function. It is used to avoid ambiguity in the code.</text>
    <path d="M 50 100 L 100 100 L 100 150 L 50 150 Z" class="connection"/>
    <rect x="0" y="160" width="400" height="100" class="section"/>
    <text x="15" y="170" class="title">Export Keyword</text>
    <text x="15" y="190" class="data">The `export` keyword is used to specify that a variable or function should be exported from the current translation unit.</text>
    <path d="M 50 100 L 100 100 L 100 150 L 50 150 Z" class="connection"/>
    <rect x="0" y="260" width="400" height="100" class="section"/>
    <text x="15" y="270" class="title">Example: Type Name Keyword</text>
    <text x="15" y="290" class="data">```cpp template <typename T> class Container { private: T* data; public: void add(T value) { data = &value; } }; ```</text>
    <path d="M 50 100 L 100 100 L 100 150 L 50 150 Z" class="connection"/>
    <rect x="0" y="340" width="400" height="50" class="section"/>
    <text x="15" y="350" class="title">Example: Export Keyword</text>
    <text x="15" y="370" class="data">```cpp extern "C" { void foo() { cout << "Hello, World!" << endl; } } ```</text>
    <path d="M 50 100 L 100 100 L 100 150 L 50 150 Z" class="connection"/>
  </g>
  <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#pastel-gradient" begin="0s" dur="10s" repeatCount="indefinite"/>
</svg>