<svg xmlns="http://www.w3.org/2000/svg" width="420" height="820" data-topic-id="applying-generic-functions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#3949AB"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F57C00"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Applying Generic Functions in C++ - Function templates let you write one function that works with any data type." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1A237E">Applying Generic Functions in C++</text>
    <text x="210" y="48" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">Write once, use with any type</text>
    <line x1="60" y1="56" x2="360" y2="56" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Generic Swap -->
  <g data-narration="A generic swap function uses template typename T to swap any two values. The compiler generates specific versions for int, double, and string automatically." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="20" y="80" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">1. Generic Swap Function</text>

    <!-- Code box -->
    <rect x="15" y="88" width="390" height="62" fill="url(#indigoGrad)" rx="6"/>
    <text x="25" y="104" font-family="monospace" font-size="9.5" fill="#E8EAF6">template&lt;typename T&gt;</text>
    <text x="25" y="117" font-family="monospace" font-size="9.5" fill="#E8EAF6">void swap(T&amp; a, T&amp; b) {</text>
    <text x="25" y="130" font-family="monospace" font-size="9.5" fill="#C5CAE9">    T temp = a;  a = b;  b = temp;</text>
    <text x="25" y="143" font-family="monospace" font-size="9.5" fill="#E8EAF6">}</text>

    <!-- Call examples -->
    <rect x="15" y="156" width="120" height="30" fill="#E8EAF6" rx="4" stroke="#3949AB" stroke-width="1"/>
    <text x="75" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">swap(x, y);</text>
    <text x="75" y="178" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#5C6BC0">T = int</text>

    <rect x="150" y="156" width="120" height="30" fill="#E8EAF6" rx="4" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">swap(a, b);</text>
    <text x="210" y="178" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#5C6BC0">T = double</text>

    <rect x="285" y="156" width="120" height="30" fill="#E8EAF6" rx="4" stroke="#3949AB" stroke-width="1"/>
    <text x="345" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">swap(s1, s2);</text>
    <text x="345" y="178" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#5C6BC0">T = string</text>

    <!-- Arrows from code box to calls -->
    <line x1="75" y1="150" x2="75" y2="156" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="210" y1="150" x2="210" y2="156" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="345" y1="150" x2="345" y2="156" stroke="#3949AB" stroke-width="1.2"/>
  </g>

  <!-- Group 3: Generic Sort -->
  <g data-narration="A generic bubble sort template works on arrays of any comparable type. Call it with integer arrays or string arrays using the same function name." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="20" y="210" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">2. Generic Sort (Bubble Sort)</text>

    <!-- Code box -->
    <rect x="15" y="218" width="390" height="50" fill="url(#tealGrad)" rx="6"/>
    <text x="25" y="234" font-family="monospace" font-size="9.5" fill="#E0F2F1">template&lt;typename T&gt;</text>
    <text x="25" y="247" font-family="monospace" font-size="9.5" fill="#E0F2F1">void bubbleSort(T arr[], int n) {</text>
    <text x="25" y="260" font-family="monospace" font-size="9.5" fill="#B2DFDB">  /* compare &amp; swap adjacent elements */ }</text>

    <!-- Usage boxes -->
    <rect x="15" y="276" width="190" height="38" fill="#E0F2F1" rx="4" stroke="#00695C" stroke-width="1"/>
    <text x="110" y="292" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">bubbleSort(intArr, 5);</text>
    <text x="110" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#00897B">Sorts: [42, 7, 19, 3, 88]</text>

    <rect x="215" y="276" width="190" height="38" fill="#E0F2F1" rx="4" stroke="#00695C" stroke-width="1"/>
    <text x="310" y="292" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">bubbleSort(strArr, 3);</text>
    <text x="310" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#00897B">Sorts: ["cat","ant","bat"]</text>

    <!-- Arrow connectors -->
    <line x1="110" y1="268" x2="110" y2="276" stroke="#00695C" stroke-width="1.2"/>
    <line x1="310" y1="268" x2="310" y2="276" stroke="#00695C" stroke-width="1.2"/>
  </g>

  <!-- Group 4: Implicit vs Explicit Instantiation -->
  <g data-narration="Implicit instantiation lets the compiler deduce the type from arguments. Explicit instantiation uses angle brackets to specify the type directly, like swap angle-bracket double." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="20" y="338" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">3. Implicit vs Explicit Instantiation</text>

    <!-- Left: Implicit -->
    <rect x="15" y="346" width="190" height="82" fill="url(#orangeGrad)" rx="6"/>
    <text x="110" y="362" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFF3E0">IMPLICIT</text>
    <text x="110" y="378" text-anchor="middle" font-family="monospace" font-size="9.5" fill="white">swap(3, 5);</text>
    <line x1="40" y1="385" x2="180" y2="385" stroke="#FFE0B2" stroke-width="0.5"/>
    <text x="110" y="399" text-anchor="middle" font-family="Arial" font-size="8.5" fill="#FFE0B2">Compiler deduces</text>
    <text x="110" y="412" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#FFF3E0">T = int</text>
    <text x="110" y="424" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#FFE0B2">from argument types</text>

    <!-- Right: Explicit -->
    <rect x="215" y="346" width="190" height="82" fill="url(#orangeGrad)" rx="6"/>
    <text x="310" y="362" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#FFF3E0">EXPLICIT</text>
    <text x="310" y="378" text-anchor="middle" font-family="monospace" font-size="9.5" fill="white">swap&lt;double&gt;(3, 5);</text>
    <line x1="240" y1="385" x2="380" y2="385" stroke="#FFE0B2" stroke-width="0.5"/>
    <text x="310" y="399" text-anchor="middle" font-family="Arial" font-size="8.5" fill="#FFE0B2">Programmer specifies</text>
    <text x="310" y="412" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#FFF3E0">T = double</text>
    <text x="310" y="424" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#FFE0B2">3,5 converted to double</text>

    <!-- VS divider -->
    <circle cx="210" cy="387" r="12" fill="#FFF3E0"/>
    <text x="210" y="391" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">vs</text>
  </g>

  <!-- Group 5: Overloading Templates -->
  <g data-narration="Function templates can be overloaded. A non-template function with the same name takes priority for exact type matches. Here, a specialized max for C-strings uses strcmp instead of the less-than operator." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="20" y="454" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">4. Overloading Function Templates</text>

    <!-- Template version -->
    <rect x="15" y="462" width="190" height="72" fill="url(#redGrad)" rx="6"/>
    <text x="110" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FFCDD2">TEMPLATE VERSION</text>
    <text x="25" y="494" font-family="monospace" font-size="8.5" fill="#FFEBEE">template&lt;typename T&gt;</text>
    <text x="25" y="507" font-family="monospace" font-size="8.5" fill="#FFEBEE">T max(T a, T b) {</text>
    <text x="25" y="520" font-family="monospace" font-size="8.5" fill="#EF9A9A">  return (a&gt;b)?a:b; }</text>

    <!-- Non-template specialization -->
    <rect x="215" y="462" width="190" height="72" fill="url(#redGrad)" rx="6"/>
    <text x="310" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FFCDD2">NON-TEMPLATE (specialized)</text>
    <text x="225" y="494" font-family="monospace" font-size="8" fill="#FFEBEE">const char* max(</text>
    <text x="225" y="507" font-family="monospace" font-size="8" fill="#FFEBEE">  const char* a,</text>
    <text x="225" y="520" font-family="monospace" font-size="8" fill="#EF9A9A">  const char* b);</text>

    <!-- Priority note -->
    <rect x="15" y="540" width="390" height="28" fill="#FFEBEE" rx="4" stroke="#C62828" stroke-width="1"/>
    <text x="210" y="553" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828">Non-template is preferred for exact match:</text>
    <text x="210" y="563" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">max("hello","world") calls non-template version (uses strcmp)</text>

    <!-- Arrow showing priority -->
    <polygon points="205,540 210,535 215,540" fill="#C62828"/>
  </g>

  <!-- Group 6: Practical Uses / STL -->
  <g data-narration="The C++ Standard Template Library is built on function templates. Algorithms like std::sort, std::find, and std::transform all use templates to work with any container and data type." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="20" y="594" font-family="Arial" font-size="11" font-weight="bold" fill="#1A237E">5. Practical Uses: STL Algorithms</text>

    <rect x="15" y="602" width="390" height="24" fill="#E8EAF6" rx="4"/>
    <text x="210" y="618" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">STL algorithms are built with function templates under the hood</text>

    <!-- Pill badges row 1 -->
    <rect x="25" y="634" width="110" height="28" fill="#3949AB" rx="14"/>
    <text x="80" y="652" text-anchor="middle" font-family="monospace" font-size="10" fill="white">std::sort</text>

    <rect x="155" y="634" width="110" height="28" fill="#00695C" rx="14"/>
    <text x="210" y="652" text-anchor="middle" font-family="monospace" font-size="10" fill="white">std::find</text>

    <rect x="285" y="634" width="120" height="28" fill="#E65100" rx="14"/>
    <text x="345" y="652" text-anchor="middle" font-family="monospace" font-size="10" fill="white">std::transform</text>

    <!-- Pill badges row 2 -->
    <rect x="50" y="670" width="130" height="28" fill="#C62828" rx="14"/>
    <text x="115" y="688" text-anchor="middle" font-family="monospace" font-size="10" fill="white">std::accumulate</text>

    <rect x="200" y="670" width="110" height="28" fill="#3949AB" rx="14"/>
    <text x="255" y="688" text-anchor="middle" font-family="monospace" font-size="10" fill="white">std::copy</text>

    <rect x="330" y="670" width="75" height="28" fill="#00695C" rx="14"/>
    <text x="367" y="688" text-anchor="middle" font-family="monospace" font-size="10" fill="white">std::swap</text>

    <!-- Example usage -->
    <rect x="15" y="708" width="390" height="48" fill="#1A237E" rx="6"/>
    <text x="25" y="724" font-family="monospace" font-size="9" fill="#C5CAE9">vector&lt;int&gt; v = {5, 2, 8, 1, 9};</text>
    <text x="25" y="738" font-family="monospace" font-size="9" fill="#C5CAE9">sort(v.begin(), v.end());</text>
    <text x="25" y="750" font-family="monospace" font-size="9" fill="#7986CB">// Works because sort is a template!</text>

    <!-- Summary box -->
    <rect x="15" y="766" width="390" height="36" fill="#E8EAF6" rx="6" stroke="#3949AB" stroke-width="1.2"/>
    <text x="210" y="782" text-anchor="middle" font-family="Arial" font-size="9.5" font-weight="bold" fill="#1A237E">Key Takeaway</text>
    <text x="210" y="795" text-anchor="middle" font-family="Arial" font-size="8.5" fill="#3949AB">Templates enable type-safe generic programming - write once, use with any type.</text>
  </g>
</svg>