<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="generic-classes">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="C++ Class Templates allow you to write generic classes that work with any data type." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#283593">C++ Class Templates (Generic Classes)</text>
    <line x1="60" y1="35" x2="360" y2="35" stroke="#7986CB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Basic syntax - Single type parameter -->
  <g data-narration="The basic syntax uses template angle bracket class T to define a class template. Here, Pair stores two values of the same type T." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Box -->
    <rect x="15" y="44" width="390" height="72" rx="6" fill="#3949AB" fill-opacity="0.1" stroke="#3949AB" stroke-width="1.5"/>
    <text x="25" y="58" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">1. Single Type Parameter</text>
    <!-- Code block -->
    <text x="25" y="73" font-family="monospace" font-size="9.5" fill="#1A237E">template&lt;class T&gt;</text>
    <text x="25" y="85" font-family="monospace" font-size="9.5" fill="#1A237E">class Pair {</text>
    <text x="40" y="97" font-family="monospace" font-size="9.5" fill="#1A237E">T first, second;</text>
    <text x="25" y="109" font-family="monospace" font-size="9.5" fill="#1A237E">public:</text>
    <!-- Right side: instantiation -->
    <text x="220" y="73" font-family="monospace" font-size="9.5" fill="#3949AB">Pair(T a, T b);</text>
    <text x="220" y="85" font-family="monospace" font-size="9.5" fill="#3949AB">T getFirst();</text>
    <text x="220" y="100" font-family="Arial" font-size="9" fill="#283593" font-style="italic">};</text>
    <!-- Arrow and instantiation example -->
    <text x="260" y="112" font-family="monospace" font-size="9" font-weight="bold" fill="#3949AB">Pair&lt;int&gt; p(1, 2);</text>
  </g>

  <!-- Group 3: Multiple type parameters -->
  <g data-narration="Templates can have multiple type parameters. Here, Map uses T for the key type and U for the value type, allowing different types for keys and values." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="15" y="122" width="390" height="65" rx="6" fill="#00695C" fill-opacity="0.1" stroke="#00695C" stroke-width="1.5"/>
    <text x="25" y="137" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">2. Multiple Type Parameters</text>
    <text x="25" y="153" font-family="monospace" font-size="9.5" fill="#004D40">template&lt;class T, class U&gt;</text>
    <text x="25" y="165" font-family="monospace" font-size="9.5" fill="#004D40">class Map { T key; U value; };</text>
    <!-- Instantiation arrow -->
    <line x1="280" y1="157" x2="295" y2="157" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="300" y="153" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">Map&lt;string, int&gt; m;</text>
    <text x="300" y="165" font-family="Arial" font-size="8" fill="#00695C" font-style="italic">T=string, U=int</text>
    <!-- Visual type boxes -->
    <rect x="25" y="172" width="32" height="12" rx="3" fill="#00695C"/>
    <text x="41" y="181" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">T</text>
    <rect x="62" y="172" width="32" height="12" rx="3" fill="#26A69A"/>
    <text x="78" y="181" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">U</text>
    <text x="100" y="181" font-family="Arial" font-size="7.5" fill="#004D40">= independent types</text>
  </g>

  <!-- Group 4: Non-type template parameter -->
  <g data-narration="Non-type template parameters let you pass constant values like integers at compile time. Here, SIZE defines the array length as a template parameter." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="15" y="194" width="390" height="65" rx="6" fill="#E65100" fill-opacity="0.1" stroke="#E65100" stroke-width="1.5"/>
    <text x="25" y="209" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">3. Non-type Template Parameter</text>
    <text x="25" y="225" font-family="monospace" font-size="9.5" fill="#BF360C">template&lt;class T, int SIZE&gt;</text>
    <text x="25" y="237" font-family="monospace" font-size="9.5" fill="#BF360C">class Array { T data[SIZE]; };</text>
    <!-- Arrow -->
    <line x1="265" y1="230" x2="280" y2="230" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="280,227 286,230 280,233" fill="#E65100"/>
    <text x="290" y="226" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">Array&lt;int, 10&gt; arr;</text>
    <text x="290" y="238" font-family="Arial" font-size="8" fill="#E65100" font-style="italic">T=int, SIZE=10</text>
    <!-- Highlight non-type -->
    <rect x="25" y="244" width="55" height="12" rx="3" fill="#E65100"/>
    <text x="52" y="253" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">int SIZE</text>
    <text x="86" y="253" font-family="Arial" font-size="7.5" fill="#BF360C">= compile-time constant (not a type!)</text>
  </g>

  <!-- Group 5: Default template arguments -->
  <g data-narration="Default template arguments provide fallback types and values. When you use empty angle brackets, the compiler uses the default arguments int and 100." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="15" y="266" width="390" height="65" rx="6" fill="#C62828" fill-opacity="0.1" stroke="#C62828" stroke-width="1.5"/>
    <text x="25" y="281" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">4. Default Template Arguments</text>
    <text x="25" y="297" font-family="monospace" font-size="9.5" fill="#B71C1C">template&lt;class T = int, int N = 100&gt;</text>
    <text x="25" y="309" font-family="monospace" font-size="9.5" fill="#B71C1C">class Buffer { T buf[N]; };</text>
    <!-- Arrow -->
    <line x1="248" y1="302" x2="263" y2="302" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="263,299 269,302 263,305" fill="#C62828"/>
    <text x="273" y="298" font-family="monospace" font-size="9" font-weight="bold" fill="#C62828">Buffer&lt;&gt; defaultBuf;</text>
    <text x="273" y="310" font-family="Arial" font-size="8" fill="#C62828" font-style="italic">T=int, N=100 (defaults!)</text>
    <!-- Default highlight -->
    <rect x="25" y="316" width="60" height="12" rx="3" fill="#C62828"/>
    <text x="55" y="325" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">= defaults</text>
    <text x="91" y="325" font-family="Arial" font-size="7.5" fill="#B71C1C">empty &lt;&gt; uses default type &amp; value</text>
  </g>

  <!-- Group 6: Summary with STL examples -->
  <g data-narration="In summary, class templates are blueprints that work with any type. The STL uses them extensively in containers like vector, map, and set." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="15" y="338" width="390" height="52" rx="6" fill="#283593" fill-opacity="0.12" stroke="#283593" stroke-width="1.5"/>
    <text x="210" y="355" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1A237E">Class Templates = Blueprint for any type</text>
    <!-- STL pills -->
    <rect x="72" y="362" width="70" height="20" rx="10" fill="#3949AB"/>
    <text x="107" y="376" text-anchor="middle" font-family="monospace" font-size="10" fill="white">vector&lt;T&gt;</text>
    <rect x="152" y="362" width="60" height="20" rx="10" fill="#00695C"/>
    <text x="182" y="376" text-anchor="middle" font-family="monospace" font-size="10" fill="white">map&lt;K,V&gt;</text>
    <rect x="222" y="362" width="56" height="20" rx="10" fill="#E65100"/>
    <text x="250" y="376" text-anchor="middle" font-family="monospace" font-size="10" fill="white">set&lt;T&gt;</text>
    <rect x="288" y="362" width="62" height="20" rx="10" fill="#C62828"/>
    <text x="319" y="376" text-anchor="middle" font-family="monospace" font-size="10" fill="white">stack&lt;T&gt;</text>
  </g>

  <!-- Arrowhead marker for teal arrows -->
  <defs>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
  </defs>
</svg>
