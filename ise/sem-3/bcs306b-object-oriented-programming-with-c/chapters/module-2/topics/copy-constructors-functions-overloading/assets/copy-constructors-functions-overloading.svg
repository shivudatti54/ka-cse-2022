<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="copy-constructors-functions-overloading">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#37474F"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C62828"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="Copy constructors create a new object as a copy of an existing object in C++." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#283593">Copy Constructors in C++</text>
    <line x1="90" y1="30" x2="330" y2="30" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Syntax Box -->
  <g data-narration="The copy constructor takes a const reference to an object of the same class, allowing you to define how an object is duplicated." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <rect x="18" y="38" width="384" height="48" fill="#3949AB" rx="6"/>
    <text x="210" y="57" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#E8EAF6">ClassName(const ClassName&amp; src) {</text>
    <text x="210" y="72" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#C5CAE9">  /* deep copy members */  }</text>
    <rect x="18" y="88" width="384" height="16" fill="none" rx="3"/>
    <text x="210" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3949AB" font-style="italic">Takes const reference to same class -- prevents modification of source</text>
  </g>

  <!-- Group 3: Shallow Copy Problem -->
  <g data-narration="Shallow copy is dangerous because both the original and copied object point to the same heap memory. Deleting one invalidates the other, causing a double-delete crash." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Section label -->
    <text x="108" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C62828">Shallow Copy (Problem)</text>
    <!-- Object a -->
    <rect x="22" y="132" width="72" height="34" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5" rx="4"/>
    <text x="58" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#B71C1C">obj a</text>
    <text x="58" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">ptr</text>
    <!-- Object b -->
    <rect x="22" y="174" width="72" height="34" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5" rx="4"/>
    <text x="58" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#B71C1C">obj b</text>
    <text x="58" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">ptr</text>
    <!-- Shared heap block -->
    <rect x="140" y="155" width="56" height="30" fill="#EF9A9A" stroke="#C62828" stroke-width="1.5" rx="3"/>
    <text x="168" y="168" text-anchor="middle" font-family="monospace" font-size="8" fill="#B71C1C">0xABC</text>
    <text x="168" y="178" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">heap</text>
    <!-- Arrows from both objects to same memory -->
    <line x1="94" y1="149" x2="138" y2="164" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <line x1="94" y1="191" x2="138" y2="174" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <!-- Danger sign -->
    <polygon points="168,195 155,215 181,215" fill="#FFEB3B" stroke="#C62828" stroke-width="1.2"/>
    <text x="168" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#C62828">!</text>
    <text x="168" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#C62828">Double delete!</text>
  </g>

  <!-- Group 4: Deep Copy Solution -->
  <g data-narration="Deep copy allocates new memory for the copied object and duplicates the data, so each object owns its own memory. This is safe and prevents double-delete errors." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <!-- Section label -->
    <text x="330" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Deep Copy (Solution)</text>
    <!-- Object a -->
    <rect x="262" y="132" width="72" height="34" fill="#C8E6C9" stroke="#00695C" stroke-width="1.5" rx="4"/>
    <text x="298" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#1B5E20">obj a</text>
    <text x="298" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">ptr</text>
    <!-- Object b -->
    <rect x="262" y="174" width="72" height="34" fill="#C8E6C9" stroke="#00695C" stroke-width="1.5" rx="4"/>
    <text x="298" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#1B5E20">obj b</text>
    <text x="298" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">ptr</text>
    <!-- Heap block for a -->
    <rect x="365" y="132" width="48" height="28" fill="#A5D6A7" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <text x="389" y="145" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#1B5E20">0xABC</text>
    <text x="389" y="155" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">data</text>
    <!-- Heap block for b (NEW) -->
    <rect x="365" y="176" width="48" height="28" fill="#A5D6A7" stroke="#00695C" stroke-width="1.5" rx="3"/>
    <text x="389" y="189" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#1B5E20">0xDEF</text>
    <text x="389" y="199" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">copy</text>
    <!-- Arrows to separate memory -->
    <line x1="334" y1="148" x2="363" y2="145" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <line x1="334" y1="191" x2="363" y2="190" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <!-- Green checkmark -->
    <circle cx="330" cy="220" r="9" fill="#00695C"/>
    <polyline points="324,220 328,224 336,216" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="330" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#00695C">Safe!</text>
  </g>

  <!-- Group 5: Three Invocation Scenarios -->
  <g data-narration="A copy constructor is invoked in three scenarios: when initializing a new object from an existing one, when passing an object by value to a function, and when returning an object by value from a function." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">When is the Copy Constructor Invoked?</text>
    <!-- Scenario 1: Initialization -->
    <rect x="14" y="268" width="122" height="42" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2" rx="5"/>
    <text x="75" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100">1. Initialization</text>
    <text x="75" y="296" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#BF360C">String b(a);</text>
    <text x="75" y="307" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">String b = a;</text>
    <!-- Scenario 2: Pass by value -->
    <rect x="148" y="268" width="122" height="42" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2" rx="5"/>
    <text x="209" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100">2. Pass-by-value</text>
    <text x="209" y="296" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#BF360C">func(String s)</text>
    <text x="209" y="307" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">copies argument</text>
    <!-- Scenario 3: Return by value -->
    <rect x="282" y="268" width="122" height="42" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2" rx="5"/>
    <text x="343" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100">3. Return-by-value</text>
    <text x="343" y="296" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#BF360C">return s;</text>
    <text x="343" y="307" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">copies to caller</text>
  </g>

  <!-- Group 6: Rule of Three -->
  <g data-narration="The Rule of Three states that if a class needs a custom copy constructor, it almost certainly also needs a custom destructor and a custom copy assignment operator. All three manage the same resource." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#283593">The Rule of Three</text>
    <text x="210" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5C6BC0" font-style="italic">If you need one, you need all three:</text>
    <!-- Box 1: Copy Constructor -->
    <rect x="22" y="350" width="112" height="36" fill="#3949AB" rx="5"/>
    <text x="78" y="364" text-anchor="middle" font-family="monospace" font-size="8.5" fill="white">ClassName(const</text>
    <text x="78" y="377" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#C5CAE9">ClassName&amp;)</text>
    <!-- Box 2: Destructor -->
    <rect x="154" y="350" width="112" height="36" fill="#3949AB" rx="5"/>
    <text x="210" y="366" text-anchor="middle" font-family="monospace" font-size="9" fill="white">~ClassName()</text>
    <text x="210" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#C5CAE9">destructor</text>
    <!-- Box 3: Copy Assignment -->
    <rect x="286" y="350" width="112" height="36" fill="#3949AB" rx="5"/>
    <text x="342" y="364" text-anchor="middle" font-family="monospace" font-size="8.5" fill="white">operator=(const</text>
    <text x="342" y="377" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#C5CAE9">ClassName&amp;)</text>
    <!-- Connecting lines between three boxes -->
    <line x1="134" y1="368" x2="154" y2="368" stroke="#7986CB" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="266" y1="368" x2="286" y2="368" stroke="#7986CB" stroke-width="2" stroke-dasharray="3,2"/>
    <!-- Bottom bracket -->
    <path d="M78 390 L78 395 L342 395 L342 390" fill="none" stroke="#5C6BC0" stroke-width="1.2"/>
    <text x="210" y="399" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#3949AB" font-weight="bold">all manage the same resource</text>
  </g>
</svg>
