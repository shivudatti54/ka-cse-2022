<svg xmlns="http://www.w3.org/2000/svg" width="420" height="820" data-topic-id="function-overloading-and-ambiguity">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#FF8F00"/>
    </linearGradient>
  </defs>
  <rect width="420" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title (0.3s) -->
  <g data-narration="Function overloading allows multiple functions with the same name but different parameters. Ambiguity occurs when the compiler cannot decide which overload to call." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1A237E">Function Overloading &amp; Ambiguity</text>
    <line x1="60" y1="40" x2="360" y2="40" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Group 2: Overloading examples (1.5s) -->
  <g data-narration="Here are three overloaded area functions: area taking an int for circle, area taking two ints for rectangle, and area taking two floats for triangle. Same name, different parameter signatures." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Overloaded Functions — Same Name, Different Params</text>

    <!-- Function 1: area(int r) -->
    <rect x="20" y="78" width="120" height="58" fill="url(#indigoGrad)" rx="6"/>
    <text x="80" y="96" text-anchor="middle" font-family="monospace" font-size="10" fill="#E8EAF6">double area</text>
    <text x="80" y="110" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#FFEB3B">(int r)</text>
    <text x="80" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#B3E5FC">Circle</text>

    <!-- Function 2: area(int l, int w) -->
    <rect x="150" y="78" width="120" height="58" fill="url(#indigoGrad)" rx="6"/>
    <text x="210" y="96" text-anchor="middle" font-family="monospace" font-size="10" fill="#E8EAF6">double area</text>
    <text x="210" y="110" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#FFEB3B">(int l, int w)</text>
    <text x="210" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#B3E5FC">Rectangle</text>

    <!-- Function 3: area(float b, float h) -->
    <rect x="280" y="78" width="120" height="58" fill="url(#indigoGrad)" rx="6"/>
    <text x="340" y="96" text-anchor="middle" font-family="monospace" font-size="10" fill="#E8EAF6">double area</text>
    <text x="340" y="110" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#FFEB3B">(float b, float h)</text>
    <text x="340" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#B3E5FC">Triangle</text>
  </g>

  <!-- Group 3: Decision tree for resolution (3.0s) -->
  <g data-narration="The compiler resolves overloads by matching arguments. area(5) exactly matches area(int r). area(5, 3) exactly matches area(int, int). Arrows show the resolution path from call to correct function." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="162" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#00695C">Resolution Decision Tree</text>

    <!-- Call 1: area(5) -->
    <rect x="30" y="174" width="100" height="30" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="5"/>
    <text x="80" y="193" text-anchor="middle" font-family="monospace" font-size="11" fill="#004D40">area(5)</text>
    <!-- Arrow from call to function -->
    <line x1="130" y1="189" x2="168" y2="189" stroke="#00695C" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <!-- Match box -->
    <rect x="170" y="174" width="130" height="30" fill="url(#tealGrad)" rx="5"/>
    <text x="235" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="white">area(int r) Exact!</text>
    <!-- Checkmark -->
    <text x="310" y="194" font-family="Arial" font-size="16" fill="#A5D6A7">&#x2713;</text>

    <!-- Call 2: area(5, 3) -->
    <rect x="30" y="214" width="100" height="30" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="5"/>
    <text x="80" y="233" text-anchor="middle" font-family="monospace" font-size="11" fill="#004D40">area(5, 3)</text>
    <!-- Arrow -->
    <line x1="130" y1="229" x2="168" y2="229" stroke="#00695C" stroke-width="2"/>
    <!-- Match box -->
    <rect x="170" y="214" width="156" height="30" fill="url(#tealGrad)" rx="5"/>
    <text x="248" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="white">area(int l, int w) Exact!</text>
    <!-- Checkmark -->
    <text x="336" y="234" font-family="Arial" font-size="16" fill="#A5D6A7">&#x2713;</text>

    <!-- Call 3: area(2.5f, 4.0f) -->
    <rect x="30" y="254" width="130" height="30" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" rx="5"/>
    <text x="95" y="273" text-anchor="middle" font-family="monospace" font-size="10" fill="#004D40">area(2.5f, 4.0f)</text>
    <!-- Arrow -->
    <line x1="160" y1="269" x2="193" y2="269" stroke="#00695C" stroke-width="2"/>
    <!-- Match box -->
    <rect x="195" y="254" width="175" height="30" fill="url(#tealGrad)" rx="5"/>
    <text x="282" y="273" text-anchor="middle" font-family="monospace" font-size="10" fill="white">area(float b, float h) Exact!</text>
    <!-- Checkmark -->
    <text x="380" y="274" font-family="Arial" font-size="16" fill="#A5D6A7">&#x2713;</text>
  </g>

  <!-- Group 4: Ambiguity scenario (4.5s) -->
  <g data-narration="Ambiguity arises when a call matches multiple overloads equally. Here, calc(5u) where 5u is unsigned int could convert to both int and long — the compiler cannot choose and reports an ambiguity error." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="314" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E65100">Ambiguity Scenario</text>

    <!-- Two declarations -->
    <rect x="20" y="324" width="175" height="28" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="4"/>
    <text x="108" y="342" text-anchor="middle" font-family="monospace" font-size="10" fill="#BF360C">void calc(int);</text>

    <rect x="225" y="324" width="175" height="28" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="4"/>
    <text x="312" y="342" text-anchor="middle" font-family="monospace" font-size="10" fill="#BF360C">void calc(long);</text>

    <!-- The problematic call -->
    <rect x="115" y="366" width="190" height="32" fill="url(#orangeGrad)" rx="6"/>
    <text x="210" y="386" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">calc(5u)  // unsigned</text>

    <!-- Arrows to both -->
    <line x1="165" y1="366" x2="108" y2="352" stroke="#C62828" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="255" y1="366" x2="312" y2="352" stroke="#C62828" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- Question marks -->
    <text x="130" y="362" font-family="Arial" font-size="12" fill="#C62828">?</text>
    <text x="270" y="362" font-family="Arial" font-size="12" fill="#C62828">?</text>

    <!-- Error box -->
    <rect x="100" y="408" width="220" height="30" fill="#C62828" rx="5"/>
    <text x="135" y="427" font-family="Arial" font-size="14" fill="white">&#x2717;</text>
    <text x="210" y="427" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FFCDD2">  Ambiguity Error!</text>
    <text x="210" y="452" text-anchor="middle" font-family="Arial" font-size="9" fill="#5D4037">unsigned int converts equally to int and long — compiler cannot decide</text>
  </g>

  <!-- Group 5: Rules to avoid ambiguity (6.0s) -->
  <g data-narration="To avoid ambiguity: first, use explicit casts to tell the compiler which overload you intend. Second, avoid relying on implicit type conversions. Third, use different parameter counts to make overloads distinct." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="484" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1A237E">Rules to Avoid Ambiguity</text>

    <!-- Rule 1 -->
    <rect x="30" y="496" width="360" height="34" fill="#E8EAF6" stroke="#3949AB" stroke-width="1" rx="5"/>
    <rect x="30" y="496" width="28" height="34" fill="#3949AB" rx="5"/>
    <rect x="46" y="496" width="1" height="34" fill="#3949AB"/>
    <text x="44" y="518" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">1</text>
    <text x="65" y="517" font-family="Arial" font-size="11" fill="#1A237E">Use explicit casts: </text>
    <text x="197" y="517" font-family="monospace" font-size="10" fill="#3949AB">calc( (int)5u )</text>
    <text x="358" y="517" font-family="Arial" font-size="14" fill="#2E7D32">&#x2713;</text>

    <!-- Rule 2 -->
    <rect x="30" y="538" width="360" height="34" fill="#E8EAF6" stroke="#3949AB" stroke-width="1" rx="5"/>
    <rect x="30" y="538" width="28" height="34" fill="#3949AB" rx="5"/>
    <rect x="46" y="538" width="1" height="34" fill="#3949AB"/>
    <text x="44" y="560" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">2</text>
    <text x="65" y="559" font-family="Arial" font-size="11" fill="#1A237E">Avoid implicit conversions between similar types</text>
    <text x="358" y="559" font-family="Arial" font-size="14" fill="#2E7D32">&#x2713;</text>

    <!-- Rule 3 -->
    <rect x="30" y="580" width="360" height="34" fill="#E8EAF6" stroke="#3949AB" stroke-width="1" rx="5"/>
    <rect x="30" y="580" width="28" height="34" fill="#3949AB" rx="5"/>
    <rect x="46" y="580" width="1" height="34" fill="#3949AB"/>
    <text x="44" y="602" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">3</text>
    <text x="65" y="601" font-family="Arial" font-size="11" fill="#1A237E">Use different parameter counts for clarity</text>
    <text x="358" y="601" font-family="Arial" font-size="14" fill="#2E7D32">&#x2713;</text>
  </g>

  <!-- Group 6: Resolution priority ranking (7.5s) -->
  <g data-narration="The compiler follows a strict priority order: first it tries an exact match, then type promotion like int to long, then standard conversion like int to double, and if multiple matches remain, it reports an ambiguity error." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="644" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1A237E">Overload Resolution Priority</text>

    <!-- Priority 1: Exact Match -->
    <rect x="60" y="656" width="300" height="32" fill="#1B5E20" rx="6"/>
    <text x="80" y="676" font-family="Arial" font-size="12" font-weight="bold" fill="#A5D6A7">1.</text>
    <text x="100" y="676" font-family="Arial" font-size="12" font-weight="bold" fill="white">Exact Match</text>
    <text x="340" y="676" text-anchor="end" font-family="Arial" font-size="10" fill="#C8E6C9">Highest</text>

    <!-- Arrow down -->
    <text x="210" y="698" text-anchor="middle" font-family="Arial" font-size="14" fill="#546E7A">&#x25BC;</text>

    <!-- Priority 2: Promotion -->
    <rect x="60" y="702" width="300" height="32" fill="#00695C" rx="6"/>
    <text x="80" y="722" font-family="Arial" font-size="12" font-weight="bold" fill="#B2DFDB">2.</text>
    <text x="100" y="722" font-family="Arial" font-size="12" font-weight="bold" fill="white">Type Promotion</text>
    <text x="340" y="722" text-anchor="end" font-family="monospace" font-size="9" fill="#B2DFDB">int &#x2192; long</text>

    <!-- Arrow down -->
    <text x="210" y="744" text-anchor="middle" font-family="Arial" font-size="14" fill="#546E7A">&#x25BC;</text>

    <!-- Priority 3: Conversion -->
    <rect x="60" y="748" width="300" height="32" fill="#E65100" rx="6"/>
    <text x="80" y="768" font-family="Arial" font-size="12" font-weight="bold" fill="#FFE0B2">3.</text>
    <text x="100" y="768" font-family="Arial" font-size="12" font-weight="bold" fill="white">Standard Conversion</text>
    <text x="340" y="768" text-anchor="end" font-family="monospace" font-size="9" fill="#FFE0B2">int &#x2192; double</text>

    <!-- Arrow down -->
    <text x="210" y="790" text-anchor="middle" font-family="Arial" font-size="14" fill="#546E7A">&#x25BC;</text>

    <!-- Priority 4: Error -->
    <rect x="60" y="794" width="300" height="32" fill="#C62828" rx="6"/>
    <text x="80" y="814" font-family="Arial" font-size="12" font-weight="bold" fill="#FFCDD2">&#x2717;</text>
    <text x="100" y="814" font-family="Arial" font-size="12" font-weight="bold" fill="white">Ambiguity Error</text>
    <text x="340" y="814" text-anchor="end" font-family="Arial" font-size="10" fill="#FFCDD2">No unique match</text>
  </g>
</svg>