<svg width="420" height="400" data-topic-id="arrays-pointers-references-and-dynamic-allocators" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="font-family:Arial, sans-serif;">
  <!--Title Section-->
  <rect x="10" y="10" width="400" height="40" fill="#2E4053" rx="10">
    <text x="15" y="20" fill="#66CCCC" font-size="24" text-anchor="start">Arrays, Pointers, References, and the Dynamic Allocation Operators</text>
  </rect>
  
  <!--Section 1: Arrays-->
  <section id="arrays" data-narration="Arrays are a collection of elements of the same data type stored in contiguous memory locations. They have a fixed size that is defined at compile time. Elements of an array are accessed using an index (a non-negative integer) that starts from 0. Arrays can be treated as vectors, allowing for random access and modification of elements.">
    <rect x="10" y="60" width="400" height="80" fill="#E0E0E0" rx="10"></rect>
    <rect x="10" y="60" width="200" height="60" fill="#66CCCC" rx="10" style="opacity: 0.5;">
      <text x="15" y="70" fill="#2E4053" font-size="18">Definition</text>
      <text x="15" y="90" fill="#2E4053" font-size="18">Characteristics</text>
      <text x="15" y="110" fill="#2E4053" font-size="18">Example</text>
    </rect>
    <rect x="220" y="60" width="180" height="60" fill="#66CCCC" rx="10" style="opacity: 0.5;"></rect>
    <g>
      <rect x="220" y="60" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="70" fill="#2E4053" font-size="18">int scores[5] = {90, 85, 95, 80, 75};</text>
      <rect x="230" y="90" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="100" fill="#2E4053" font-size="18">std::cout << scores[0] << std::endl;  // Output: 90</text>
    </g>
    <g>
      <rect x="230" y="110" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="120" fill="#2E4053" font-size="18">scores[0] = 92;</text>
      <rect x="230" y="140" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="150" fill="#2E4053" font-size="18">std::cout << scores[0] << std::endl;  // Output: 92</text>
    </g>
  </section>
  
  <!--Section 2: Pointers-->
  <section id="pointers" data-narration="A pointer is a variable that stores the memory address of another variable. Pointers can be used to access and modify the values of variables. Pointers can be used to manipulate memory directly. Pointers can be dereferenced using the unary * operator.">
    <rect x="10" y="140" width="400" height="80" fill="#E0E0E0" rx="10"></rect>
    <rect x="10" y="140" width="200" height="60" fill="#66CCCC" rx="10" style="opacity: 0.5;">
      <text x="15" y="150" fill="#2E4053" font-size="18">Definition</text>
      <text x="15" y="170" fill="#2E4053" font-size="18">Characteristics</text>
      <text x="15" y="190" fill="#2E4053" font-size="18">Example</text>
    </rect>
    <rect x="220" y="140" width="180" height="60" fill="#66CCCC" rx="10" style="opacity: 0.5;"></rect>
    <g>
      <rect x="220" y="140" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="150" fill="#2E4053" font-size="18">int x = 10;</text>
      <rect x="230" y="170" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="180" fill="#2E4053" font-size="18">int* p = &x;</text>
    </g>
    <g>
      <rect x="230" y="190" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="200" fill="#2E4053" font-size="18">*</text>
      <rect x="230" y="220" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="230" fill="#2E4053" font-size="18">std::cout << *p << std::endl;  // Output: 10</text>
    </g>
    <g>
      <rect x="230" y="240" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="250" fill="#2E4053" font-size="18">*</text>
      <rect x="230" y="270" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="280" fill="#2E4053" font-size="18">*</text>
      <rect x="230" y="300" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="310" fill="#2E4053" font-size="18">*</text>
      <text x="230" y="330" fill="#2E4053" font-size="18">*p = 20;</text>
      <text x="230" y="350" fill="#2E4053" font-size="18">std::cout << x << std::endl;  // Output: 20</text>
    </g>
  </section>
  
  <!--Section 3: References-->
  <section id="references" data-narration="A reference is an alias for an existing variable. References can be used to pass variables by reference to functions. References can also be used to return values from functions.">
    <rect x="10" y="310" width="400" height="80" fill="#E0E0E0" rx="10"></rect>
    <rect x="10" y="310" width="200" height="60" fill="#66CCCC" rx="10" style="opacity: 0.5;">
      <text x="15" y="320" fill="#2E4053" font-size="18">Definition</text>
      <text x="15" y="340" fill="#2E4053" font-size="18">Characteristics</text>
      <text x="15" y="360" fill="#2E4053" font-size="18">Example</text>
    </rect>
    <rect x="220" y="310" width="180" height="60" fill="#66CCCC" rx="10" style="opacity: 0.5;"></rect>
    <g>
      <rect x="220" y="310" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="320" fill="#2E4053" font-size="18">int x = 10;</text>
      <rect x="230" y="340" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="350" fill="#2E4053" font-size="18">int& ref = x;</text>
    </g>
    <g>
      <rect x="230" y="360" width="50" height="20" fill="#66CCCC" rx="10"></rect>
      <text x="230" y="370" fill="#2E4053" font-size="18">std::cout << ref << std::endl;  // Output: 10</text>
    </g>
  </section>
  
  <!--Section 4: Dynamic Allocation Operators-->
  <section id="dynamic-allocators" data-narration="The dynamic allocation operators are used to allocate memory on the heap. This is useful when the size of the array is not known at compile time.">
    <rect x="10" y="410" width="400" height="80" fill="#E0E0E0" rx="10"></rect>
