<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="overloading-constructor-functions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title (0.3s) -->
  <g data-narration="Constructor overloading allows a class to have multiple constructors with different parameter lists." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Constructor Overloading in C++</text>
    <line x1="80" y1="30" x2="340" y2="30" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Group 2: Class with 3 constructors (1.5s) -->
  <g data-narration="A class Rectangle defines three overloaded constructors: a default constructor with no parameters, a parameterized constructor taking width and height, and a copy constructor taking a reference to another Rectangle." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Class box -->
    <rect x="20" y="38" width="185" height="120" fill="white" stroke="#3949AB" stroke-width="2" rx="6"/>
    <rect x="20" y="38" width="185" height="22" fill="#3949AB" rx="6"/>
    <rect x="20" y="52" width="185" height="8" fill="#3949AB"/>
    <text x="112" y="54" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">class Rectangle</text>
    <!-- Default constructor -->
    <text x="30" y="78" font-family="monospace" font-size="9" fill="#3949AB">Rectangle();</text>
    <rect x="30" y="67" width="100" height="14" fill="none" stroke="#3949AB" stroke-width="0.5" rx="2" stroke-dasharray="2,1"/>
    <text x="135" y="78" font-family="Arial" font-size="7" fill="#666">default</text>
    <!-- Parameterized constructor -->
    <text x="30" y="100" font-family="monospace" font-size="9" fill="#3949AB">Rectangle(int w, int h);</text>
    <rect x="30" y="89" width="155" height="14" fill="none" stroke="#3949AB" stroke-width="0.5" rx="2" stroke-dasharray="2,1"/>
    <!-- Copy constructor -->
    <text x="30" y="122" font-family="monospace" font-size="9" fill="#3949AB">Rectangle(const Rectangle&amp; r);</text>
    <rect x="30" y="111" width="168" height="14" fill="none" stroke="#3949AB" stroke-width="0.5" rx="2" stroke-dasharray="2,1"/>
    <!-- Labels -->
    <text x="135" y="100" font-family="Arial" font-size="7" fill="#666">param</text>
    <text x="135" y="122" font-family="Arial" font-size="7" fill="#666">copy</text>
  </g>

  <!-- Group 3: Object creation with arrows (3.0s) -->
  <g data-narration="When objects are created, the compiler selects the matching constructor. Rectangle r1 with no arguments calls the default constructor. Rectangle r2 with integers 10 and 20 calls the parameterized constructor. Rectangle r3 taking r2 as argument calls the copy constructor." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Object creation box -->
    <rect x="220" y="38" width="185" height="120" fill="white" stroke="#00695C" stroke-width="2" rx="6"/>
    <rect x="220" y="38" width="185" height="22" fill="#00695C" rx="6"/>
    <rect x="220" y="52" width="185" height="8" fill="#00695C"/>
    <text x="312" y="54" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Object Creation</text>
    <!-- r1 default -->
    <text x="232" y="78" font-family="monospace" font-size="9" fill="#00695C">Rectangle r1;</text>
    <!-- r2 parameterized -->
    <text x="232" y="100" font-family="monospace" font-size="9" fill="#00695C">Rectangle r2(10, 20);</text>
    <!-- r3 copy -->
    <text x="232" y="122" font-family="monospace" font-size="9" fill="#00695C">Rectangle r3(r2);</text>
    <!-- Arrows from objects to constructors -->
    <line x1="226" y1="74" x2="210" y2="74" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)">
      <animate attributeName="x1" from="260" to="218" dur="0.4s" begin="3.3s" fill="freeze"/>
    </line>
    <line x1="226" y1="96" x2="210" y2="96" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)">
      <animate attributeName="x1" from="260" to="218" dur="0.4s" begin="3.5s" fill="freeze"/>
    </line>
    <line x1="226" y1="118" x2="210" y2="118" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)">
      <animate attributeName="x1" from="260" to="218" dur="0.4s" begin="3.7s" fill="freeze"/>
    </line>
    <!-- Arrow labels -->
    <text x="215" y="70" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C">calls</text>
    <text x="215" y="92" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C">calls</text>
    <text x="215" y="114" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C">calls</text>
  </g>

  <!-- Group 4: Delegating constructors (4.5s) -->
  <g data-narration="C++11 introduced delegating constructors. A default constructor can delegate to the parameterized constructor by calling it in the initializer list. Here Rectangle with no arguments delegates to Rectangle with zero and zero, avoiding code duplication." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="20" y="168" width="380" height="68" fill="white" stroke="#E65100" stroke-width="2" rx="6"/>
    <rect x="20" y="168" width="380" height="20" fill="#E65100" rx="6"/>
    <rect x="20" y="180" width="380" height="8" fill="#E65100"/>
    <text x="210" y="182" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Delegating Constructor (C++11)</text>
    <!-- Code -->
    <text x="32" y="204" font-family="monospace" font-size="9" fill="#E65100">Rectangle() : Rectangle(0, 0) {}</text>
    <text x="32" y="218" font-family="monospace" font-size="9" fill="#333">// Default delegates to parameterized</text>
    <!-- Curved arrow showing delegation -->
    <path d="M 230,200 Q 310,190 310,204 Q 310,218 260,218" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)" stroke-dasharray="4,2"/>
    <text x="330" y="200" font-family="Arial" font-size="7" fill="#E65100">delegates</text>
    <text x="330" y="208" font-family="Arial" font-size="7" fill="#E65100">to other</text>
    <text x="330" y="216" font-family="Arial" font-size="7" fill="#E65100">constructor</text>
  </g>

  <!-- Group 5: Member initializer list (6.0s) -->
  <g data-narration="The member initializer list is the preferred way to initialize data members. Using Rectangle int w int h colon width w height h is more efficient than assigning values inside the constructor body, as it avoids default construction followed by assignment." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="20" y="244" width="380" height="82" fill="white" stroke="#C62828" stroke-width="2" rx="6"/>
    <rect x="20" y="244" width="380" height="20" fill="#C62828" rx="6"/>
    <rect x="20" y="256" width="380" height="8" fill="#C62828"/>
    <text x="210" y="258" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Member Initializer List</text>
    <!-- Preferred way -->
    <rect x="30" y="270" width="170" height="46" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="4"/>
    <text x="115" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2E7D32">Preferred</text>
    <text x="38" y="296" font-family="monospace" font-size="8" fill="#333">Rectangle(int w, int h)</text>
    <text x="42" y="308" font-family="monospace" font-size="8" fill="#2E7D32">  : width(w), height(h) {}</text>
    <!-- Not preferred -->
    <rect x="215" y="270" width="175" height="46" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="4"/>
    <text x="302" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Avoid</text>
    <text x="223" y="296" font-family="monospace" font-size="8" fill="#333">Rectangle(int w, int h) {</text>
    <text x="227" y="308" font-family="monospace" font-size="8" fill="#C62828">  width=w; height=h; }</text>
  </g>

  <!-- Group 6: Summary (7.5s) -->
  <g data-narration="In summary, constructor overloading provides flexible object initialization. The three primary types are the default constructor for no arguments, the parameterized constructor for custom values, and the copy constructor for duplicating objects." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="20" y="336" width="380" height="54" fill="white" stroke="#3949AB" stroke-width="1.5" rx="6"/>
    <text x="210" y="352" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Constructor overloading provides flexible object initialization</text>
    <!-- Badges -->
    <rect x="40" y="360" width="90" height="20" fill="#3949AB" rx="10"/>
    <text x="85" y="374" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Default</text>
    <rect x="145" y="360" width="120" height="20" fill="#00695C" rx="10"/>
    <text x="205" y="374" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Parameterized</text>
    <rect x="280" y="360" width="100" height="20" fill="#E65100" rx="10"/>
    <text x="330" y="374" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Copy</text>
  </g>
</svg>