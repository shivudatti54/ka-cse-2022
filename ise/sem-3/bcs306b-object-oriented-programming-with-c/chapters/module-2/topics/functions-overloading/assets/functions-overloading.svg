<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="functions-overloading">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g data-narration="C++ Functions and Overloading — core concepts for writing reusable and flexible code." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3949AB">C++ Functions &amp; Overloading</text>
    <line x1="100" y1="34" x2="320" y2="34" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- Group 2: Function Anatomy -->
  <g data-narration="A function has four parts: return type, name, parameters, and body. Here int add takes two int parameters and returns their sum." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Section label -->
    <text x="14" y="56" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Function Anatomy</text>
    <!-- Code background -->
    <rect x="14" y="62" width="392" height="32" rx="4" fill="#1A237E" opacity="0.9"/>
    <!-- Code text -->
    <text x="24" y="82" font-family="monospace" font-size="11" fill="#E8EAF6">
      <tspan fill="#80CBC4">int</tspan> <tspan fill="#FFD54F">add</tspan><tspan fill="#EEEEEE">(</tspan><tspan fill="#80CBC4">int</tspan> <tspan fill="#EEEEEE">a,</tspan> <tspan fill="#80CBC4">int</tspan> <tspan fill="#EEEEEE">b) {</tspan> <tspan fill="#CE93D8">return</tspan> <tspan fill="#EEEEEE">a + b; }</tspan>
    </text>
    <!-- Labels with lines -->
    <line x1="30" y1="96" x2="30" y2="106" stroke="#3949AB" stroke-width="1"/>
    <text x="30" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3949AB">return</text>
    <text x="30" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3949AB">type</text>

    <line x1="68" y1="96" x2="68" y2="106" stroke="#3949AB" stroke-width="1"/>
    <text x="68" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3949AB">name</text>

    <line x1="140" y1="96" x2="140" y2="106" stroke="#3949AB" stroke-width="1"/>
    <text x="140" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3949AB">parameters</text>

    <line x1="310" y1="96" x2="310" y2="106" stroke="#3949AB" stroke-width="1"/>
    <text x="310" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3949AB">body</text>
  </g>

  <!-- Group 3: Parameter Passing Modes -->
  <g data-narration="Parameters can be passed three ways: by value creates a copy, by reference uses an alias with the ampersand, and by pointer uses an address with the asterisk." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="14" y="144" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">Parameter Passing Modes</text>

    <!-- By Value box -->
    <rect x="14" y="150" width="124" height="52" rx="5" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <text x="76" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#00695C">By Value</text>
    <text x="76" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">f(int x)</text>
    <text x="76" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">copy of data</text>

    <!-- By Reference box -->
    <rect x="148" y="150" width="124" height="52" rx="5" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <text x="210" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#00695C">By Reference</text>
    <text x="210" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">f(int&amp; x)</text>
    <text x="210" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">alias to original</text>

    <!-- By Pointer box -->
    <rect x="282" y="150" width="124" height="52" rx="5" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <text x="344" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#00695C">By Pointer</text>
    <text x="344" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">f(int* p)</text>
    <text x="344" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">address of data</text>
  </g>

  <!-- Group 4: Overloading Concept -->
  <g data-narration="Function overloading lets you define multiple functions with the same name but different parameter types. The compiler picks the right one based on the arguments." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="14" y="220" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Overloading: Same Name, Different Signatures</text>

    <!-- Function 1 -->
    <rect x="14" y="226" width="186" height="22" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="22" y="241" font-family="monospace" font-size="10" fill="#E65100">void display(int n)</text>

    <!-- Function 2 -->
    <rect x="14" y="252" width="186" height="22" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="22" y="267" font-family="monospace" font-size="10" fill="#E65100">void display(double d)</text>

    <!-- Function 3 -->
    <rect x="14" y="278" width="186" height="22" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="22" y="293" font-family="monospace" font-size="10" fill="#E65100">void display(string s)</text>

    <!-- Brace annotation -->
    <text x="210" y="260" font-family="Arial, sans-serif" font-size="28" fill="#E65100">}</text>
    <text x="226" y="258" font-family="Arial, sans-serif" font-size="9" fill="#E65100">same name</text>
    <text x="226" y="270" font-family="Arial, sans-serif" font-size="9" fill="#E65100">different</text>
    <text x="226" y="282" font-family="Arial, sans-serif" font-size="9" fill="#E65100">params</text>
  </g>

  <!-- Group 5: Compiler Decision / Name Mangling -->
  <g data-narration="When you call display with 42, the compiler matches it to display int. Internally, name mangling creates unique symbols like _Z7displayi for each overloaded version." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="14" y="314" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Compiler Resolution</text>

    <!-- Call box -->
    <rect x="14" y="320" width="106" height="24" rx="4" fill="#3949AB"/>
    <text x="67" y="336" text-anchor="middle" font-family="monospace" font-size="10" fill="white">display(42)</text>

    <!-- Arrow -->
    <line x1="124" y1="332" x2="164" y2="332" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Match box -->
    <rect x="168" y="320" width="116" height="24" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
    <text x="226" y="336" text-anchor="middle" font-family="monospace" font-size="10" fill="#2E7D32">display(int)</text>
    <text x="292" y="336" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32">Match!</text>

    <!-- Name mangling note -->
    <rect x="14" y="350" width="280" height="18" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
    <text x="22" y="363" font-family="Arial, sans-serif" font-size="8" fill="#3949AB">Name mangling: _Z7displayi, _Z7displayd, _Z7displayNSt7string</text>
  </g>

  <!-- Group 6: Default Arguments -->
  <g data-narration="Default arguments let you omit trailing parameters. Calling greet with just Alice uses the default greeting Hello, while greet with Bob and Hi overrides the default." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="310" y="314" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Default Arguments</text>

    <!-- Function signature -->
    <rect x="296" y="320" width="114" height="46" rx="4" fill="white" stroke="#C62828" stroke-width="1"/>
    <text x="304" y="334" font-family="monospace" font-size="7.5" fill="#C62828">void greet(string name,</text>
    <text x="304" y="346" font-family="monospace" font-size="7.5" fill="#C62828">  string g = "Hello")</text>

    <!-- Call examples -->
    <rect x="296" y="370" width="114" height="24" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5"/>
    <text x="304" y="380" font-family="monospace" font-size="7.5" fill="#C62828">greet("Alice")</text>
    <text x="304" y="390" font-family="monospace" font-size="7.5" fill="#C62828">greet("Bob","Hi")</text>
  </g>
</svg>
