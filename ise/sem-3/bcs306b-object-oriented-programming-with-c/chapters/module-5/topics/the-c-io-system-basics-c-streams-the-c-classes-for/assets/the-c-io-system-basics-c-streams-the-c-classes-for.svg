    <foreignObject x="10" y="10" width="400" height="30">
        <text class="title">C++ I/O System Basics</text>
    </foreignObject>
    <rect x="10" y="40" width="400" height="300" class="container" />
    <rect x="10" y="30" width="400" height="50" class="footer" />
    <section data-narration="What are Streams?" class="section">
        <rect x="10" y="50" width="390" height="30" class="section-border" />
        <text x="10" y="60" class="section-text">Streams are sequences of characters that can be read from or written to.</text>
        <animate class="animate" begin="0s" />
        <rect x="10" y="90" width="390" height="30" class="section-border" />
        <text x="10" y="100" class="section-text">There are three types of streams: input streams, output streams, and error streams.</text>
    </section>
    <section data-narration="C++ Streams Classes" class="section">
        <rect x="10" y="220" width="390" height="30" class="section-border" />
        <text x="10" y="230" class="section-text">The C++ I/O system provides several classes that support input/output operations.</text>
        <animate class="animate" begin="1s" />
        <rect x="10" y="270" width="390" height="30" class="section-border" />
        <text x="10" y="280" class="section-text">The primary classes are istream, ostream, and fstream.</text>
    </section>
    <section data-narration="Formatted I/O File I/O: <fstream> and File Classes" class="section">
        <rect x="10" y="300" width="390" height="30" class="section-border" />
        <text x="10" y="310" class="section-text">The <fstream> library provides classes for formatted I/O file operations.</text>
        <animate class="animate" begin="2s" />
        <rect x="10" y="350" width="390" height="30" class="section-border" />
        <text x="10" y="360" class="section-text">The key classes are ifstream, ofstream, and fstream.</text>
    </section>
    <section data-narration="Opening and Closing a File" class="section">
        <rect x="10" y="390" width="390" height="30" class="section-border" />
        <text x="10" y="400" class="section-text">To open a file, you need to create a file stream object.</text>
        <animate class="animate" begin="3s" />
        <rect x="10" y="440" width="390" height="30" class="section-border" />
        <text x="10" y="450" class="section-text">The open method is used to open the file. If the file does not exist, the open method returns false.</text>
    </section>
    <section data-narration="Reading and Writing" class="section">
        <rect x="10" y="480" width="390" height="30" class="section-border" />
        <text x="10" y="490" class="section-text">To read from a file, you can use the read method.</text>
        <animate class="animate" begin="4s" />
        <rect x="10" y="530" width="390" height="30" class="section-border" />
        <text x="10" y="540" class="section-text">To write to a file, you can use the write method.</text>
    </section>
