<svg width="420" height="400" data-topic-id="exception-handling-fundamentals">
    <defs>
        <linearGradient id=" gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C7B8EA" stop-opacity="0.5"/>
        </linearGradient>
    </defs>
    <rect fill="url(#gradient)" width="100%" height="100%"/>
    <title>Exception Handling: Exception Handling Fundamentals</title>
    <rect x="20" y="20" width="380" height="60" fill="#3498DB"/>
    <g transform="rotate(90 20 20)">
        <text x="0" y="40" font-size="24" fill="#FFFFFF" text-anchor="middle">Exception Handling Fundamentals</text>
    </g>
    <rect x="20" y="90" width="340" height="20" fill="#2ecc71"/>
    <text x="50" y="110" font-size="18" fill="#FFFFFF" text-anchor="middle">Exception Handling Fundamentals</text>
    <section id="section1" data-narration="Exception Handling is a mechanism that allows a program to recover from errors and unexpected events">
        <rect x="20" y="130" width="320" height="100" fill="#3498DB"/>
        <g transform="rotate(90 20 130)">
            <text x="0" y="150" font-size="18" fill="#FFFFFF" text-anchor="middle">Exception Handling is a mechanism that allows a program to recover from errors and unexpected events</text>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0 20 130" to="360 20 130" dur="5s" begin="0s"/>
    </section>
    <section id="section2" data-narration="The purpose of exception handling is to prevent the program from crashing or terminating unexpectedly">
        <rect x="20" y="230" width="320" height="100" fill="#2ecc71"/>
        <g transform="rotate(90 20 230)">
            <text x="0" y="250" font-size="18" fill="#FFFFFF" text-anchor="middle">The purpose of exception handling is to prevent the program from crashing or terminating unexpectedly</text>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0 20 230" to="360 20 230" dur="5s" begin="1s"/>
    </section>
    <section id="section3" data-narration="An exception is an event that occurs during the execution of a program, such as division by zero or null pointer dereference">
        <rect x="20" y="330" width="320" height="100" fill="#3498DB"/>
        <g transform="rotate(90 20 330)">
            <text x="0" y="350" font-size="18" fill="#FFFFFF" text-anchor="middle">An exception is an event that occurs during the execution of a program, such as division by zero or null pointer dereference</text>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0 20 330" to="360 20 330" dur="5s" begin="2s"/>
    </section>
    <section id="section4" data-narration="The throw statement is used to declare an exception and transfer control to the exception handling mechanism">
        <rect x="20" y="430" width="320" height="100" fill="#2ecc71"/>
        <g transform="rotate(90 20 430)">
            <text x="0" y="450" font-size="18" fill="#FFFFFF" text-anchor="middle">The throw statement is used to declare an exception and transfer control to the exception handling mechanism</text>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0 20 430" to="360 20 430" dur="5s" begin="3s"/>
    </section>
    <section id="section5" data-narration="The catch clause is used to handle exceptions">
        <rect x="20" y="530" width="320" height="100" fill="#3498DB"/>
        <g transform="rotate(90 20 530)">
            <text x="0" y="550" font-size="18" fill="#FFFFFF" text-anchor="middle">The catch clause is used to handle exceptions</text>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0 20 530" to="360 20 530" dur="5s" begin="4s"/>
    </section>
    <footer>
        <rect x="20" y="380" width="380" height="20" fill="#2ecc71"/>
        <text x="50" y="400" font-size="18" fill="#FFFFFF" text-anchor="middle">Learn More about Exception Handling</text>
    </footer>
</svg>