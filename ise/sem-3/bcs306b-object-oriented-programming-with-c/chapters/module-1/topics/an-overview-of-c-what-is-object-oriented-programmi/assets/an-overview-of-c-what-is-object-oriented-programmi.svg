<svg width="420" height="400" data-topic-id="c++-object-oriented-programming" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)"/>
  <g transform="translate(50, 50)">
    <g data-narration="section1">
      <rect width="150" height="50" fill="#66CCCC" rx="10"/>
      <text x="10" y="15" font-size="18">What is Object-Oriented Programming?</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="3s" begin="0s"/>
    </g>
    <g data-narration="section2">
      <rect width="150" height="50" fill="#66CCCC" rx="10"/>
      <text x="10" y="15" font-size="18">Encapsulation</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="3s" begin="3s"/>
    </g>
    <g data-narration="section3">
      <rect width="150" height="50" fill="#66CCCC" rx="10"/>
      <text x="10" y="15" font-size="18">Abstraction</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" dur="3s" begin="6s"/>
    </g>
    <g data-narration="section4">
      <rect width="150" height="50" fill="#66CCCC" rx="10"/>
      <text x="10" y="15" font-size="18">Inheritance</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,250" dur="3s" begin="9s"/>
    </g>
    <g data-narration="section5">
      <rect width="150" height="50" fill="#66CCCC" rx="10"/>
      <text x="10" y="15" font-size="18">Polymorphism</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="3s" begin="12s"/>
    </g>
    <g data-narration="section6">
      <rect width="150" height="50" fill="#66CCCC" rx="10"/>
      <text x="10" y="15" font-size="18">C++ Classes</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,350" dur="3s" begin="15s"/>
    </g>
    <g data-narration="section7">
      <rect width="150" height="50" fill="#66CCCC" rx="10"/>
      <text x="10" y="15" font-size="18">Constructors and Destructor</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,400" dur="3s" begin="18s"/>
    </g>
    <g data-narration="footer">
      <text x="50" y="370" font-size="18">C++ Object-Oriented Programming</text>
      <rect x="50" y="350" width="320" height="20" fill="#66CCCC" rx="10"/>
    </g>
