<svg width="420" height="400" data-topic-id="the-general-form-of-a-c-program" xmlns="http://www.w3.org/2000/svg">
  <title>The General Form of a C++ Program</title>
  <style>
    /* Add some basic styling to make the diagram look nicer */
    .section {
      background-color: #f0f0f0;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    
    .section:last-child {
      margin-bottom: 0;
    }
    
    .arrow {
      fill: #2196f3;
    }
  </style>
  <defs>
    <linearGradient id="pastel-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E8F4"/>
      <stop offset="100%" stop-color="#F7D2C4"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" fill="url(#pastel-grad)"/>
  <g transform="translate(20, 20)">
    <text x="10" y="10" font-size="24" font-family="Arial" fill="#3B5998">The General Form of a C++ Program</text>
  </g>
  <g transform="translate(20, 50)">
    <section data-narration="Header Files (.h or .hpp)">
      <rect x="0" y="0" width="100%" height="50" fill="#f0f0f0"/>
      <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" data-narration="Include the necessary library files that define the functions and variables used in the program.">Header Files (.h or .hpp)</text>
      <animate transform="translate(0, 40)" begin="0s" dur="2s" repeatCount="indef"/>
    </section>
    <section data-narration="Source Files (.cpp)">
      <rect x="0" y="0" width="100%" height="50" fill="#f0f0f0"/>
      <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" data-narration="Contain the actual code of the program. May include functions, variables, and other definitions.">Source Files (.cpp)</text>
      <animate transform="translate(0, 40)" begin="2s" dur="2s" repeatCount="indef"/>
    </section>
    <section data-narration="Main Function">
      <rect x="0" y="0" width="100%" height="50" fill="#f0f0f0"/>
      <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" data-narration="The entry point of the program. Where the program starts execution. Returns an integer value to indicate the program's exit status.">Main Function</text>
      <animate transform="translate(0, 40)" begin="4s" dur="2s" repeatCount="indef"/>
    </section>
    <section data-narration="Object-Oriented Classes and Objects">
      <rect x="0" y="0" width="100%" height="50" fill="#f0f0f0"/>
      <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" data-narration="A class defines a blueprint for objects. An object is an instance of a class.">Object-Oriented Classes and Objects</text>
      <animate transform="translate(0, 40)" begin="6s" dur="2s" repeatCount="indef"/>
    </section>
    <section data-narration="Supporting Functions">
      <rect x="0" y="0" width="100%" height="50" fill="#f0f0f0"/>
      <text x="10" y="20" font-size="18" font-family="Arial" fill="#666" data-narration="May include functions that perform tasks, such as input/output operations, data manipulation, or algorithm implementation. Can be defined inside the class or outside of it.">Supporting Functions</text>
      <animate transform="translate(0, 40)" begin="8s" dur="2s" repeatCount="indef"/>
    </section>
  </g>
  <g transform="translate(20, 360)">
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#3B5998">Footer</text>
  </g>
  <g transform="translate(20, 370)">
    <animateAuthorization>
      <circle cx="20" cy="20" r="20" fill="#2196f3" fill-opacity="0.5"/>
    </animateAuthorization>
  </g>
</svg>