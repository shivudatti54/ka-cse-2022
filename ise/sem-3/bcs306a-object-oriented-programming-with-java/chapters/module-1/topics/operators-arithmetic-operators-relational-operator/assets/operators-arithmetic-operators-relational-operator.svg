<svg width="420" height="400" data-topic-id="arithmetic-operators-relational-operators">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.5"/>

  <!-- Title Section -->
  <section data-narration="Title Section">
    <rect x="10" y="10" width="400" height="50" fill="#2196F3" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial" text-anchor="middle" fill="#FFFFFF">Arithmetic Operators & Relational Operators</text>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" fill="freeze" dur="2s" begin="0s" attributeName="opacity">
    <animate-transform transform="rotate(10 20 30)" begin="0s" dur="2s"/>
  </animate>

  <!-- Arithmetic Operators Section -->
  <section data-narration="Arithmetic Operators Section">
    <rect x="10" y="70" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="10" width="20" height="20" fill="#FF9800" rx="5" transform="rotate(45 12 12)"/>
    <text x="50" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Arithmetic Operators</text>
    <animate xmlns="http://www.w3.org/2000/svg" fill="freeze" dur="2s" begin="0s" attributeName="opacity">
      <animate-transform transform="rotate(45 50 50)" begin="0s" dur="2s"/>
    </animate>
    <text x="50" y="80" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Addition (+)</text>
    <text x="50" y="110" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Subtraction (-)</text>
    <text x="50" y="140" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Multiplication (*)</text>
    <text x="50" y="170" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Division (/)</text>
    <text x="50" y="200" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Modulus (%)</text>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" fill="freeze" dur="2s" begin="0s" attributeName="opacity">
    <animate-transform transform="rotate(90 60 120)" begin="0.5s" dur="1.5s"/>
  </animate>

  <!-- Relational Operators Section -->
  <section data-narration="Relational Operators Section">
    <rect x="10" y="230" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="10" width="20" height="20" fill="#FF9800" rx="5" transform="rotate(45 12 12)"/>
    <text x="50" y="50" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Relational Operators</text>
    <animate xmlns="http://www.w3.org/2000/svg" fill="freeze" dur="2s" begin="0s" attributeName="opacity">
      <animate-transform transform="rotate(45 50 50)" begin="0s" dur="2s"/>
    </animate>
    <text x="50" y="80" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Equal (==)</text>
    <text x="50" y="110" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Not Equal (!=)</text>
    <text x="50" y="140" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Greater Than (></text>
    <text x="50" y="170" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Less Than (<)</text>
    <text x="50" y="200" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Greater Than or Equal (>=)</text>
    <text x="50" y="230" font-size="18" font-family="Arial" text-anchor="middle" fill="#333333">Less Than or Equal (<=)</text>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" fill="freeze" dur="2s" begin="0.5s" attributeName="opacity">
    <animate-transform transform="rotate(90 60 120)" begin="1.5s" dur="1.5s"/>
  </animate>

  <!-- Footer Section -->
  <section data-narration="Footer Section">
    <rect x="10" y="380" width="400" height="30" fill="#2196F3" rx="10"/>
    <text x="20" y="390" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">Learn More</text>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" fill="freeze" dur="2s" begin="2s" attributeName="opacity">
    <animate-transform transform="rotate(10 20 30)" begin="2s" dur="2s"/>
  </animate>
</svg>