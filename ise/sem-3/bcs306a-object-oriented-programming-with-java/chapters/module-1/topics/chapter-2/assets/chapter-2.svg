  <section data-narration="2.1 Introduction to Object-Oriented Programming (OOP)">
    <rect x="10" y="50" width="380" height="100" fill="#f9f9f9" rx="10"/>
    <text x="20" y="70" font-size="18" font-family="Arial" fill="#666">Key Concepts:</text>
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#666">
      <tspan>Object</tspan><tspan> (</tspan><tspan>an</tspan><tspan> </tspan><tspan>instance</tspan><tspan> of</tspan><tspan> a</tspan><tspan> class</tspan><tspan> that</tspan><tspan> has</tspan><tspan> its</tspan><tspan> own</tspan><tspan> set</tspan><tspan> of</tspan><tspan> attributes</tspan><tspan> (</tspan><tspan>data)</tspan><tspan> and</tspan><tspan> methods</tspan><tspan> (</tspan><tspan>functions)</tspan>).
    </text>
    <text x="20" y="180" font-size="18" font-family="Arial" fill="#666">
