            </text>
            <text x="10" y="50" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
                Multi-line comments
            </text>
        </g>
    </g>
    
    <!-- Separators -->
    <g transform="translate(10, 550)">
        <rect x="0" y="0" width="300" height="200" fill="#fff" stroke="#0097a7" stroke-opacity="0.5" rx="10"/>
        <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
            Separators
        </text>
        <g transform="translate(10, 30)">
            <rect x="0" y="0" width="100" height="50" fill="none" stroke="#0097a7" stroke-opacity="0.5" rx="5"/>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <text x="10" y="25" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
                Identifiers
            </text>
            <text x="10" y="50" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
                Literals
            </text>
            <text x="10" y="75" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
                Whitespace
            </text>
        </g>
    </g>
    
    <!-- The Java Keywords -->
    <g transform="translate(10, 650)">
        <rect x="0" y="0" width="300" height="200" fill="#fff" stroke="#0097a7" stroke-opacity="0.5" rx="10"/>
        <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
            The Java Keywords
        </text>
        <g transform="translate(10, 30)">
            <rect x="0" y="0" width="100" height="50" fill="none" stroke="#0097a7" stroke-opacity="0.5" rx="5"/>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <text x="10" y="25" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
            </text>
        </g>
    </g>
</svg>