        </text>
        <g transform="translate(10, 30)">
            <rect x="0" y="0" width="100" height="50" fill="none" stroke="#0097a7" stroke-opacity="0.5" rx="5"/>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <text x="10" y="25" font-size="14" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
