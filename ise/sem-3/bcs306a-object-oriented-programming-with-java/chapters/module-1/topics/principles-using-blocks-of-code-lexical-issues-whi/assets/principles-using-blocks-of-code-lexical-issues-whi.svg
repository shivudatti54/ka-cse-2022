<svg width="420" height="400" data-topic-id="principles-using-blocks-of-code-lexical-issues-whitespace-identifiers-literals-comments-separators-the-java-keywords">
    <!-- Gradient background -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8e24aa" stop-opacity="1"/>
            <stop offset="100%" stop-color="#0097a7" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    
    <!-- Title -->
    <g transform="translate(10, 20)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#fff" text-anchor="middle" stroke="#fff" stroke-opacity="0.5">
