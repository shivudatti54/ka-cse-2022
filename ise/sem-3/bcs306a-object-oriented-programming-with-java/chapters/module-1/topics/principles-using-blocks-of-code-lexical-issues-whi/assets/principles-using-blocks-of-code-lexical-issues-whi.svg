            </text>
        </g>
    </g>
    
    <!-- Comments -->
    <g transform="translate(10, 450)">
        <rect x="0" y="0" width="300" height="200" fill="#fff" stroke="#0097a7" stroke-opacity="0.5" rx="10"/>
        <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">
