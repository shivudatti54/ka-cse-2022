<svg width="420" height="400" data-topic-id="multithreaded-programming-in-java">
  <title>Chapter 11: Multithreaded Programming in Java</title>
  <footer>Created with love by [Your Name]</footer>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" x="0" y="0" width="420" height="400"/>
  <g transform="translate(10, 20)">
    <text x="10" y="30" font-size="24" font-family="Arial" text-anchor="middle">The Java Thread Model</text>
  </g>
  <g transform="translate(50, 70)">
    <section data-narration="The Java Thread Model consists of the following key components">
      <g>
        <circle cx="50" cy="50" r="30" fill="#4FC0F5"/>
        <text x="50" y="50" font-size="18" font-family="Arial" text-anchor="middle">Thread</text>
      </g>
      <g>
        <circle cx="150" cy="50" r="30" fill="#4FC0F5"/>
        <text x="150" y="50" font-size="18" font-family="Arial" text-anchor="middle">Runnable</text>
      </g>
      <g>
        <circle cx="250" cy="50" r="30" fill="#4FC0F5"/>
        <text x="250" y="50" font-size="18" font-family="Arial" text-anchor="middle">Thread Group</text>
      </g>
      <g>
        <circle cx="350" cy="50" r="30" fill="#4FC0F5"/>
        <text x="350" y="50" font-size="18" font-family="Arial" text-anchor="middle">Thread Local Storage</text>
      </g>
    </section>
  </g>
  <g transform="translate(50, 120)">
    <section data-narration="The main thread is the primary thread of a Java application.">
      <g>
        <rect x="50" y="50" width="200" height="50" fill="#F7D2C4"/>
        <text x="60" y="60" font-size="18" font-family="Arial" text-anchor="middle">Starts first</text>
      </g>
      <g>
        <rect x="280" y="50" width="200" height="50" fill="#F7D2C4"/>
        <text x="290" y="60" font-size="18" font-family="Arial" text-anchor="middle">Has priority</text>
      </g>
      <g>
        <rect x="50" y="120" width="200" height="50" fill="#F7D2C4"/>
        <text x="60" y="130" font-size="18" font-family="Arial" text-anchor="middle">Cannot be stopped</text>
      </g>
    </section>
  </g>
  <g transform="translate(50, 190)">
    <section data-narration="There are two ways to create threads in Java:">
      <g>
        <rect x="50" y="50" width="150" height="50" fill="#F7D2C4"/>
        <text x="60" y="60" font-size="18" font-family="Arial" text-anchor="middle">Extending the Thread Class</text>
      </g>
      <g>
        <rect x="220" y="50" width="150" height="50" fill="#F7D2C4"/>
        <text x="230" y="60" font-size="18" font-family="Arial" text-anchor="middle">Creating a Runnable</text>
      </g>
    </section>
  </g>
  <g transform="translate(50, 260)">
    <section data-narration="Example of the Main Thread">
      <g>
        <code>
          <pre>
            public class Main {
              public static void main(String[] args) {
                System.out.println("Main thread started");
                // Code to be executed by the main thread
              }
            }
          </pre>
        </code>
      </g>
    </section>
  </g>
  <g transform="translate(50, 320)">
    <section data-narration="Key Characteristics of the Main Thread">
      <g>
        <rect x="50" y="50" width="150" height="50" fill="#F7D2C4"/>
        <text x="60" y="60" font-size="18" font-family="Arial" text-anchor="middle">Starts first</text>
      </g>
      <g>
        <rect x="220" y="50" width="150" height="50" fill="#F7D2C4"/>
        <text x="230" y="60" font-size="18" font-family="Arial" text-anchor="middle">Has priority</text>
      </g>
      <g>
        <rect x="50" y="120" width="150" height="50" fill="#F7D2C4"/>
        <text x="60" y="130" font-size="18" font-family="Arial" text-anchor="middle">Cannot be stopped</text>
      </g>
    </section>
  </g>
</svg>