<svg width="420" height="400" data-topic-id="packages">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CCFFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E5F5" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .title {
        font-size: 24px;
        font-weight: bold;
        color: #3498db;
      }
      .footer {
        text-align: center;
        padding: 10px;
        font-size: 14px;
        color: #2ecc71;
      }
    </style>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  <g transform="translate(20, 20)">
    <rect width="100%" height="40" fill="#f9f9f9"/>
    <text class="title" x="50%" y="20%" text-anchor="middle">Chapter 9: Packages</text>
  </g>
  <g transform="translate(20, 70)">
    <rect width="100%" height="40" fill="#f9f9f9"/>
    <section class="section" data-narration="Introduction">
      <text x="50%" y="20%" text-anchor="middle">In object-oriented programming, a package is a collection of related classes, interfaces, and other types that can be used together to create a library of reusable code.</text>
      <animateTransform attributeName="transform" type="translate" from="0,10" to="0,-10" dur="2s" repeatCount="indefinite"/>
    </section>
    <section class="section" data-narration="What is a Package?">
      <text x="50%" y="20%" text-anchor="middle">A package is a way to group packages and classes together to create a namespace.</text>
      <animateTransform attributeName="transform" type="translate" from="-20,10" to="20,-10" dur="2s" repeatCount="indefinite"/>
    </section>
    <section class="section" data-narration="Benefits of Packages">
      <text x="50%" y="20%" text-anchor="middle">Using packages provides several benefits, including organization, naming conventions, reusability, and security.</text>
      <animateTransform attributeName="transform" type="translate" from="-30,10" to="30,-10" dur="2s" repeatCount="indefinite"/>
    </section>
    <section class="section" data-narration="Creating a Package">
      <text x="50%" y="20%" text-anchor="middle">To create a package, you need to use the package keyword followed by the package name.</text>
      <animateTransform attributeName="transform" type="translate" from="-40,10" to="40,-10" dur="2s" repeatCount="indefinite"/>
    </section>
    <section class="section" data-narration="Member Access">
      <text x="50%" y="20%" text-anchor="middle">In Java, you can access package members using a dot notation.</text>
      <animateTransform attributeName="transform" type="translate" from="-50,10" to="50,-10" dur="2s" repeatCount="indefinite"/>
    </section>
    <section class="section" data-narration="Importing Packages">
      <text x="50%" y="20%" text-anchor="middle">To use a package, you need to import it using the import statement.</text>
      <animateTransform attributeName="transform" type="translate" from="-60,10" to="60,-10" dur="2s" repeatCount="indefinite"/>
    </section>
    <g transform="translate(20, 250)">
      <rect width="100%" height="40" fill="#f9f9f9"/>
      <text class="footer" x="50%" y="100%" text-anchor="middle">Educational Content Created by [Author's Name]</text>
    </g>
  </g>
</svg>