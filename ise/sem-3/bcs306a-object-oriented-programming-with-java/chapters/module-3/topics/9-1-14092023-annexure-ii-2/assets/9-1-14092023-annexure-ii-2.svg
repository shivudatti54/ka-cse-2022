<svg width="420" height="400" data-topic-id="inher-01">
    <style>
        .pastel {
            filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#C7B8EA', endColorstr='#87CEEB');
        }
        .text {
            font-size: 16px;
            font-family: Arial, sans-serif;
            color: #2F4F7F;
            fill: #2F4F7F;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #2F4F7F;
            fill: #2F4F7F;
            text-anchor: center;
        }
        .footer {
            font-size: 14px;
            font-family: Arial, sans-serif;
            color: #2F4F7F;
            fill: #2F4F7F;
            text-anchor: center;
        }
    </style>

    <defs>
        <linearGradient id="pastelGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#C7B8EA" stop-opacity="1" />
            <stop offset="1" stop-color="#87CEEB" stop-opacity="1" />
        </linearGradient>
    </defs>

    <rect x="0" y="0" width="100%" height="100%" fill="url(#pastelGradient)" />
    <g transform="translate(10, 20)">
        <text class="title" x="50%" y="20%" text-anchor="middle">Inheritance Basics</text>
    </g>

    <g transform="translate(10, 60)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="text" x="50%" y="50%" text-anchor="middle">What is Inheritance?</text>
        <animateTransform attributeName="transform" type="translate" from="0 40" to="0 60" begin="0s" dur="2s" repeatCount="1" />
    </g>

    <g transform="translate(10, 110)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="text" x="50%" y="50%" text-anchor="middle">Benefits of Inheritance</text>
        <animateTransform attributeName="transform" type="translate" from="0 60" to="0 80" begin="0.5s" dur="1.5s" repeatCount="1" />
    </g>

    <g transform="translate(10, 160)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="text" x="50%" y="50%" text-anchor="middle">Using the `super` Keyword</text>
        <animateTransform attributeName="transform" type="translate" from="0 80" to="0 100" begin="1s" dur="1.5s" repeatCount="1" />
    </g>

    <g transform="translate(10, 210)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="text" x="50%" y="50%" text-anchor="middle">Creating a Multilevel Hierarchy</text>
        <animateTransform attributeName="transform" type="translate" from="0 100" to="0 120" begin="2.5s" dur="1.5s" repeatCount="1" />
    </g>

    <g transform="translate(10, 260)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="text" x="50%" y="50%" text-anchor="middle">Benefits of Inheritance</text>
        <animateTransform attributeName="transform" type="translate" from="0 120" to="0 140" begin="3.5s" dur="1s" repeatCount="1" />
    </g>

    <g transform="translate(10, 310)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="text" x="50%" y="50%" text-anchor="middle">Easier Maintenance</text>
        <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" begin="4s" dur="1s" repeatCount="1" />
    </g>

    <g transform="translate(10, 360)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="text" x="50%" y="50%" text-anchor="middle">Improved Readability</text>
        <animateTransform attributeName="transform" type="translate" from="0 160" to="0 180" begin="4.5s" dur="1s" repeatCount="1" />
    </g>

    <g transform="translate(10, 410)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="text" x="50%" y="50%" text-anchor="middle">Conclusion</text>
        <animateTransform attributeName="transform" type="translate" from="0 180" to="0 200" begin="5.5s" dur="1s" repeatCount="1" />
    </g>

    <g transform="translate(10, 460)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="footer" x="50%" y="50%" text-anchor="middle">Footer</text>
    </g>

    <g transform="translate(10, 510)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="footer" x="50%" y="50%" text-anchor="middle">Arrow marker for connections</text>
    </g>

    <g transform="translate(10, 560)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="footer" x="50%" y="50%" text-anchor="middle">Arrow marker for connections</text>
    </g>

    <g transform="translate(10, 610)">
        <rect x="0" y="0" width="100%" height="40" fill="#F7F7F7" rx="10" />
        <text class="footer" x="50%" y="50%" text-anchor="middle">Arrow marker for connections</text>
    </g>

</svg>