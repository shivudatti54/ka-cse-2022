<svg width="420" height="400" data-topic-id="interfaces-interfaces-default-interface-methods-us">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2A9F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A2A9F4" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="380" height="360" fill="url(#pastel-gradient)"/>
  <rect x="10" y="10" width="400" height="10" fill="#2E4053"/>
  <rect x="10" y="120" width="400" height="10" fill="#2E4053"/>
  <rect x="10" y="230" width="400" height="10" fill="#2E4053"/>
  <rect x="10" y="340" width="400" height="10" fill="#2E4053"/>
  <rect x="10" y="450" width="400" height="10" fill="#2E4053"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="100" fill="#E0E0E0" rx="10"/>
    <text x="15" y="45" font-size="24" font-family="Arial" fill="#4B5154">Interfaces</text>
    <path d="M 0 0 L 100 0 L 100 100 L 0 100 Z" stroke="#2E4053" stroke-width="4" fill="none"/>
  </g>
  <g transform="translate(140, 20)">
    <rect x="0" y="0" width="100" height="100" fill="#E0E0E0" rx="10"/>
    <text x="15" y="45" font-size="24" font-family="Arial" fill="#4B5154">Default Interface Methods</text>
    <path d="M 0 0 L 100 0 L 100 100 L 0 100 Z" stroke="#2E4053" stroke-width="4" fill="none"/>
  </g>
  <g transform="translate(280, 20)">
    <rect x="0" y="0" width="100" height="100" fill="#E0E0E0" rx="10"/>
    <text x="15" y="45" font-size="24" font-family="Arial" fill="#4B5154">Us</text>
    <path d="M 0 0 L 100 0 L 100 100 L 0 100 Z" stroke="#2E4053" stroke-width="4" fill="none"/>
  </g>

  <g transform="translate(10, 120)">
    <rect x="0" y="0" width="300" height="50" fill="#E0E0E0" rx="10"/>
    <text x="15" y="25" font-size="18" font-family="Arial" fill="#4B5154" data-narration="An interface defines a contract between classes. It provides a blueprint for implementing a set of methods, which must be implemented by any class that implements the interface.">
      <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="1" to="0" fill="freeze"/>
    </text>
    <path d="M 0 0 L 300 0 L 300 50 L 0 50 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
  </g>
  <g transform="translate(10, 230)">
    <rect x="0" y="0" width="300" height="50" fill="#E0E0E0" rx="10"/>
    <text x="15" y="25" font-size="18" font-family="Arial" fill="#4B5154" data-narration="A default interface method is a method declared in an interface. It can be overridden by a class that implements the interface. The default method can be called without creating an instance of the interface.">
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="1" to="0" fill="freeze"/>
    </text>
    <path d="M 0 0 L 300 0 L 300 50 L 0 50 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
  </g>
  <g transform="translate(10, 340)">
    <rect x="0" y="0" width="300" height="50" fill="#E0E0E0" rx="10"/>
    <text x="15" y="25" font-size="18" font-family="Arial" fill="#4B5154" data-narration="Static methods in an interface are methods declared in an interface. They cannot be overridden by a class that implements the interface. These methods can be used without creating an instance of the interface.">
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="1" to="0" fill="freeze"/>
    </text>
    <path d="M 0 0 L 300 0 L 300 50 L 0 50 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
  </g>
  <g transform="translate(10, 450)">
    <rect x="0" y="0" width="300" height="50" fill="#E0E0E0" rx="10"/>
    <text x="15" y="25" font-size="18" font-family="Arial" fill="#4B5154" data-narration="Private interface methods are methods declared in an interface. They cannot be accessed directly from outside the class that implements the interface. These methods are used to provide internal implementation details.">
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="1" to="0" fill="freeze"/>
    </text>
    <path d="M 0 0 L 300 0 L 300 50 L 0 50 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(10, 520)">
    <rect x="0" y="0" width="380" height="10" fill="#4B5154"/>
    <text x="15" y="5" font-size="18" font-family="Arial" fill="#4B5154" data-narration="Interfaces are used to define a contract between classes. They provide a blueprint for implementing a set of methods, which must be implemented by any class that implements the interface. Default interface methods can be overridden by classes that implement the interface. Static methods in an interface are methods that cannot be overridden and can be used without creating an instance of the interface. Private interface methods are used to provide internal implementation details and cannot be accessed directly from outside the class that implements the interface.">
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity" from="1" to="0" fill="freeze"/>
    </text>
    <path d="M 0 0 L 380 0 L 380 10 L 0 10 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
  </g>
</svg>