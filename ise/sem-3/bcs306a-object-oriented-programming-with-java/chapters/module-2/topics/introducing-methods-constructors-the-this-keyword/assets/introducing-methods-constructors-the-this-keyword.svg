<svg
  width="420"
  height="400"
  data-topic-id="introducing-methods-constructors-this-keyword"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 420 400"
  style="overflow:m auto"
  focusable="true"
  focusable="true"
  font-size="16px"
  font-family="Arial,Tahoma, Geneva, Verdana, sans-serif"
  text-anchor="start"
  fill="none"
  stroke="#333333"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round">

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title Section -->
  <rect
    x="10"
    y="10"
    width="400"
    height="50"
    rx="10"
    fill="url(#grad)"
    data-narration="Title Section"
    style="font-weight: bold; font-size: 24px; margin: 5px 0; padding: 5px 10px; border-radius: 5px 5px 0 0; background-color: rgba(255, 235, 235, 0.5); color: #3498db;"/>

  <!-- Introducing Methods Section -->
  <g transform="translate(30, 100)">
    <rect
      x="0"
      y="0"
      width="100"
      height="150"
      rx="10"
      fill="url(#grad)"
      data-narration="Introducing Methods Section"
      style="font-size: 18px; margin: 10px 0; padding: 10px 20px; border-radius: 5px 5px 0 0; background-color: rgba(255, 235, 235, 0.5); color: #3498db;"/>
    <text
      x="50"
      y="70"
      style="font-size: 20px; font-weight: bold; fill: #3498db;"
      data-narration="Definition: A method is a block of code that can be executed multiple times from different parts of a program."
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <text
      x="50"
      y="110"
      style="font-size: 18px; fill: #3498db;"
      data-narration="Purpose: Methods help organize code, reduce duplication, and improve code readability."
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <text
      x="50"
      y="140"
      style="font-size: 18px; fill: #3498db;"
      data-narration="Types of Methods: Instance Methods, Static Methods, Abstract Methods"
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Constructors Section -->
  <g transform="translate(220, 100)">
    <rect
      x="0"
      y="0"
      width="100"
      height="150"
      rx="10"
      fill="url(#grad)"
      data-narration="Constructors Section"
      style="font-size: 18px; margin: 10px 0; padding: 10px 20px; border-radius: 5px 5px 0 0; background-color: rgba(255, 235, 235, 0.5); color: #3498db;"/>
    <text
      x="50"
      y="70"
      style="font-size: 20px; font-weight: bold; fill: #3498db;"
      data-narration="Definition: A constructor is a special method that is used to initialize objects when they are created."
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <text
      x="50"
      y="110"
      style="font-size: 18px; fill: #3498db;"
      data-narration="Purpose: Constructors set the initial state of an object."
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <text
      x="50"
      y="140"
      style="font-size: 18px; fill: #3498db;"
      data-narration="Types of Constructors: Parameterized Constructors, No-Argument Constructors"
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- The this Keyword Section -->
  <g transform="translate(170, 300)">
    <rect
      x="0"
      y="0"
      width="100"
      height="150"
      rx="10"
      fill="url(#grad)"
      data-narration="The this Keyword Section"
      style="font-size: 18px; margin: 10px 0; padding: 10px 20px; border-radius: 5px 5px 0 0; background-color: rgba(255, 235, 235, 0.5); color: #3498db;"/>
    <text
      x="50"
      y="70"
      style="font-size: 20px; font-weight: bold; fill: #3498db;"
      data-narration="Definition: The this keyword is used to refer to the current object."
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <text
      x="50"
      y="110"
      style="font-size: 18px; fill: #3498db;"
      data-narration="Purpose: The this keyword provides access to the current object's state."
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <text
      x="50"
      y="140"
      style="font-size: 18px; fill: #3498db;"
      data-narration="Example: this.name = name;"
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Garbage Collection Section -->
  <g transform="translate(230, 350)">
    <rect
      x="0"
      y="0"
      width="100"
      height="150"
      rx="10"
      fill="url(#grad)"
      data-narration="Garbage Collection Section"
      style="font-size: 18px; margin: 10px 0; padding: 10px 20px; border-radius: 5px 5px 0 0; background-color: rgba(255, 235, 235, 0.5); color: #3498db;"/>
    <text
      x="50"
      y="70"
      style="font-size: 20px; font-weight: bold; fill: #3498db;"
      data-narration="Definition: Garbage collection is a process that automatically frees memory occupied by objects that are no longer needed."
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <text
      x="50"
      y="110"
      style="font-size: 18px; fill: #3498db;"
      data-narration="Purpose: Garbage collection prevents memory leaks and reduces the risk of memory-related bugs."
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <text
      x="50"
      y="140"
      style="font-size: 18px; fill: #3498db;"
      data-narration="Example: System.gc();"
      text-anchor="middle"
      dom-events="click"
      focusable="true"
      focusable="true"
      fill="none"
      stroke="#333333"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Animate sections -->
  <animate
    attributeName="opacity"
    from="1"
    to="0.5"
    dur="2s"
    begin="0s"
    repeatCount="indefinite"
    fill="freeze"/>

  <animate
    attributeName="opacity"
    from="0.5"
    to="1"
    dur="2s"
    begin="2s"
    repeatCount="indefinite"
    fill="freeze"/>

  <!-- Arrow markers for connections -->
  <line
    x1="50"
    y1="90"
    x2="90"
    y2="120"
    stroke="#3498db"
    stroke-width="2"
    style="stroke-dasharray: 5,"/>
  <line
    x1="50"
    y1="90"
    x2="70"
    y2="120"
    stroke="#3498db"
    stroke-width="2"
    style="stroke-dasharray: 5,"/>
  <line
    x1="50"
    y1="90"
    x2="30"
    y2="120"
    stroke="#3498db"
    stroke-width="2"
    style="stroke-dasharray: 5,"/>

  <!-- Title at top and footer at bottom -->
  <text
    x="10"
    y="10"
    style="font-size: 36px; font-weight: bold; fill: #3498db;"
    text-anchor="start"
    fill="none"
    stroke="#333333"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    data-narration="Methods, Constructors, The this Keyword, Garbage Collection"
    text-anchor="start"
    dom-events="click"
    focusable="true"
    focusable="true"
    fill="none"
    stroke="#333333"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <text
    x="10"
    y="360"
    style="font-size: 14px; fill: #3498db;"
    text-anchor="start"
    fill="none"
    stroke="#333333"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    data-narration="Topic: Methods, Constructors, The this Keyword, Garbage Collection"
    text-anchor="start"
    dom-events="click"
    focusable="true"
    focusable="true"
    fill="none"
    stroke="#333333"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>