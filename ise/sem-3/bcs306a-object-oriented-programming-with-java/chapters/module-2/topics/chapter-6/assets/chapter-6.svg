<svg width="420" height="400" data-topic-id="introducing-classes" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b2fffc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c7eaea" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <text x="50" y="20" font-size="24" text-anchor="middle" fill="#2f4f7f">Chapter 6: Introducing Classes</text>
  <section data-narration="Introduction to Classes">
    <rect x="20" y="60" width="400" height="100" fill="#fff" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="200" y="150" font-size="18" text-anchor="middle" fill="#2f4f7f">In Object-Oriented Programming (OOP), a class is a blueprint or a template that defines the properties and behavior of an object.</text>
  </section>
  <section data-narration="Defining a Class">
    <rect x="20" y="180" width="400" height="100" fill="#fff" rx="10"/>
    <animateTransform attributeName="transform" type="translateY" from="180" to="220" dur="0.5s" begin="0.5s" repeatCount="indefinite"/>
    <text x="200" y="240" font-size="18" text-anchor="middle" fill="#2f4f7f">To define a class, we use the `class` keyword followed by the name of the class.</text>
  </section>
  <section data-narration="Declaring an Object">
    <rect x="20" y="260" width="400" height="100" fill="#fff" rx="10"/>
    <animateTransform attributeName="transform" type="translateY" from="280" to="310" dur="0.5s" begin="1s" repeatCount="indefinite"/>
    <text x="200" y="310" font-size="18" text-anchor="middle" fill="#2f4f7f">To declare an object, we use the `new` keyword followed by the class name and parentheses containing the required parameters.</text>
  </section>
  <section data-narration="Constructors">
    <rect x="20" y="340" width="400" height="100" fill="#fff" rx="10"/>
    <animateTransform attributeName="transform" type="translateY" from="380" to="410" dur="0.5s" begin="1.5s" repeatCount="indefinite"/>
    <text x="200" y="390" font-size="18" text-anchor="middle" fill="#2f4f7f">A constructor is a special method that is used to initialize an object when it is created.</text>
  </section>
  <section data-narration="Instance Variables">
    <rect x="20" y="420" width="400" height="100" fill="#fff" rx="10"/>
    <animateTransform attributeName="transform" type="translateY" from="520" to="550" dur="0.5s" begin="2s" repeatCount="indefinite"/>
    <text x="200" y="560" font-size="18" text-anchor="middle" fill="#2f4f7f">Instance variables are variables that are defined inside the class and are associated with an instance of the class.</text>
  </section>
  <section data-narration="Access Modifiers">
    <rect x="20" y="600" width="400" height="100" fill="#fff" rx="10"/>
    <animateTransform attributeName="transform" type="translateY" from="680" to="710" dur="0.5s" begin="2.5s" repeatCount="indefinite"/>
    <text x="200" y="700" font-size="18" text-anchor="middle" fill="#2f4f7f">Access modifiers are used to control access to the attributes and methods of a class.</text>
  </section>
  <footer>
    <line x1="20" y1="20" x2="20" y2="400"/>
    <line x1="20" y1="400" x2="400" y2="400"/>
    <text x="50" y="380" font-size="18" text-anchor="middle" fill="#2f4f7f">Learn more about Object-Oriented Programming (OOP)</text>
  </footer>
</svg>