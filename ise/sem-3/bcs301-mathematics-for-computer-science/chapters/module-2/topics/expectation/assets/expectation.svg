<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="expectation">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5CAE9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12" />

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Mathematical Expectation, denoted E of X, is the weighted average of all possible values a random variable can take.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze" />
    <text x="210" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3949AB" text-anchor="middle">Mathematical Expectation (E[X])</text>
    <line x1="80" y1="36" x2="340" y2="36" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round" />
    <line x1="120" y1="40" x2="300" y2="40" stroke="#3949AB" stroke-width="1" stroke-linecap="round" opacity="0.5" />
  </g>

  <!-- Group 2: Discrete case formula with dice example -->
  <g opacity="0" data-narration="For a discrete random variable, the expected value equals the sum of each outcome multiplied by its probability. For a fair die, E of X equals 3.5.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze" />
    <rect x="10" y="50" width="195" height="110" rx="8" fill="white" fill-opacity="0.6" stroke="#3949AB" stroke-width="1" />
    <text x="107" y="68" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB" text-anchor="middle">Discrete Case</text>
    <text x="107" y="90" font-family="monospace" font-size="13" fill="#00695C" text-anchor="middle">E[X] = &#x03A3; x&#x1D62; &#x00B7; P(x&#x1D62;)</text>
    <!-- Dice icon -->
    <rect x="22" y="100" width="22" height="22" rx="4" fill="white" stroke="#E65100" stroke-width="1.5" />
    <circle cx="33" cy="111" r="2.5" fill="#E65100" />
    <circle cx="27" cy="105" r="2" fill="#E65100" />
    <circle cx="39" cy="117" r="2" fill="#E65100" />
    <text x="50" y="110" font-family="monospace" font-size="8" fill="#E65100">E[X] = 1&#x00B7;&#x2159; + 2&#x00B7;&#x2159; +</text>
    <text x="50" y="121" font-family="monospace" font-size="8" fill="#E65100">... + 6&#x00B7;&#x2159;</text>
    <text x="107" y="148" font-family="monospace" font-size="13" font-weight="bold" fill="#C62828" text-anchor="middle">= 3.5</text>
  </g>

  <!-- Group 3: Continuous case formula with density curve -->
  <g opacity="0" data-narration="For a continuous random variable, the expected value is the integral of x times the probability density function f of x, evaluated over the entire real line.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze" />
    <rect x="215" y="50" width="195" height="110" rx="8" fill="white" fill-opacity="0.6" stroke="#00695C" stroke-width="1" />
    <text x="312" y="68" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C" text-anchor="middle">Continuous Case</text>
    <text x="312" y="90" font-family="monospace" font-size="11" fill="#3949AB" text-anchor="middle">E[X] = &#x222B; x&#x00B7;f(x) dx</text>
    <text x="312" y="104" font-family="monospace" font-size="9" fill="#3949AB" text-anchor="middle">from &#x2212;&#x221E; to &#x221E;</text>
    <!-- PDF curve -->
    <line x1="235" y1="148" x2="390" y2="148" stroke="#00695C" stroke-width="1" />
    <line x1="235" y1="148" x2="235" y2="112" stroke="#00695C" stroke-width="1" />
    <path d="M245,148 Q270,145 290,130 Q312,112 335,130 Q355,145 375,148" fill="none" stroke="#E65100" stroke-width="2" />
    <!-- Shaded area under curve -->
    <path d="M270,148 Q280,143 290,130 Q300,120 312,115 Q325,120 335,130 Q345,143 355,148 Z" fill="#E65100" fill-opacity="0.15" />
    <text x="312" y="144" font-family="Arial, sans-serif" font-size="8" fill="#E65100" text-anchor="middle">f(x)</text>
  </g>

  <!-- Group 4: Properties -->
  <g opacity="0" data-narration="Key properties of expectation include linearity: E of a X plus b equals a times E of X plus b. Also, E of X plus Y equals E of X plus E of Y, and for independent variables, E of X Y equals E of X times E of Y.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze" />
    <rect x="10" y="170" width="400" height="72" rx="8" fill="white" fill-opacity="0.6" stroke="#E65100" stroke-width="1" />
    <text x="210" y="188" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Properties of Expectation</text>
    <text x="30" y="207" font-family="monospace" font-size="11" fill="#3949AB">Linearity: E[aX + b] = a&#x00B7;E[X] + b</text>
    <text x="30" y="222" font-family="monospace" font-size="11" fill="#00695C">Additive: E[X + Y] = E[X] + E[Y]</text>
    <text x="30" y="237" font-family="monospace" font-size="11" fill="#C62828">Independent: E[XY] = E[X]&#x00B7;E[Y]</text>
  </g>

  <!-- Group 5: Variance connection -->
  <g opacity="0" data-narration="Variance is deeply connected to expectation. Var of X equals E of X squared minus E of X quantity squared, measuring the spread of values around the mean.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze" />
    <rect x="10" y="250" width="400" height="68" rx="8" fill="white" fill-opacity="0.6" stroke="#C62828" stroke-width="1" />
    <text x="210" y="268" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C62828" text-anchor="middle">Variance Connection</text>
    <text x="210" y="290" font-family="monospace" font-size="13" fill="#3949AB" text-anchor="middle">Var(X) = E[X&#x00B2;] - (E[X])&#x00B2;</text>
    <!-- Visual: spread around mean -->
    <line x1="60" y1="308" x2="360" y2="308" stroke="#00695C" stroke-width="1" />
    <!-- Mean marker -->
    <line x1="210" y1="298" x2="210" y2="312" stroke="#C62828" stroke-width="2" />
    <text x="210" y="312" font-family="Arial, sans-serif" font-size="8" fill="#C62828" text-anchor="middle" dy="6">&#x03BC; = E[X]</text>
    <!-- Spread arrows -->
    <line x1="140" y1="305" x2="280" y2="305" stroke="#E65100" stroke-width="1.5" />
    <polygon points="140,305 148,302 148,308" fill="#E65100" />
    <polygon points="280,305 272,302 272,308" fill="#E65100" />
    <text x="210" y="303" font-family="Arial, sans-serif" font-size="8" fill="#E65100" text-anchor="middle">&#x03C3;&#x00B2; = Var(X)</text>
  </g>

  <!-- Group 6: Common distributions -->
  <g opacity="0" data-narration="Common distributions and their expected values: Binomial has E of X equals n p, Poisson has E of X equals lambda, Normal has E of X equals mu, and Uniform has E of X equals a plus b over 2.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze" />
    <rect x="10" y="328" width="400" height="64" rx="8" fill="white" fill-opacity="0.6" stroke="#3949AB" stroke-width="1" />
    <text x="210" y="346" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB" text-anchor="middle">Common Distributions - Expected Values</text>
    <!-- Four distribution boxes -->
    <rect x="20" y="353" width="88" height="30" rx="5" fill="#3949AB" fill-opacity="0.1" stroke="#3949AB" stroke-width="0.5" />
    <text x="64" y="365" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB" text-anchor="middle">Binomial</text>
    <text x="64" y="377" font-family="monospace" font-size="9" fill="#3949AB" text-anchor="middle">E[X] = np</text>

    <rect x="116" y="353" width="88" height="30" rx="5" fill="#00695C" fill-opacity="0.1" stroke="#00695C" stroke-width="0.5" />
    <text x="160" y="365" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00695C" text-anchor="middle">Poisson</text>
    <text x="160" y="377" font-family="monospace" font-size="9" fill="#00695C" text-anchor="middle">E[X] = &#x03BB;</text>

    <rect x="212" y="353" width="88" height="30" rx="5" fill="#E65100" fill-opacity="0.1" stroke="#E65100" stroke-width="0.5" />
    <text x="256" y="365" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">Normal</text>
    <text x="256" y="377" font-family="monospace" font-size="9" fill="#E65100" text-anchor="middle">E[X] = &#x03BC;</text>

    <rect x="308" y="353" width="92" height="30" rx="5" fill="#C62828" fill-opacity="0.1" stroke="#C62828" stroke-width="0.5" />
    <text x="354" y="365" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">Uniform</text>
    <text x="354" y="377" font-family="monospace" font-size="9" fill="#C62828" text-anchor="middle">E[X]=(a+b)/2</text>
  </g>
</svg>
