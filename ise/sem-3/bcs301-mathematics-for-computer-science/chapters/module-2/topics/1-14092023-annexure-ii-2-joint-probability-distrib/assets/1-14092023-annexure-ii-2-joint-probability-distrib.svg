<svg width="420" height="400" data-topic-id="joint-probability-distribution-two-discrete-random-variables">
  <defs>
    <linearGradient id=" gradient " x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5f7bae" stop-opacity="1" />
      <stop offset="50%" stop-color="#8f4f5f" stop-opacity="1" />
      <stop offset="100%" stop-color="#8f4f5f" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>
    <text x="150" y="10" font-size="18" font-family="Arial" fill="#5f7bae">
      Joint Probability Distribution for Two Discrete Random Variables
    </text>
  </title>
  <rect x="10" y="30" width="400" height="300" style="fill: url(# gradient )" />
  <g transform="translate(10, 40)">
    <rect x="10" y="10" width="300" height="50" style="fill:#fff; stroke: #8f4f5f; stroke-width: 2" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="2s" begin="0s" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#5f7bae">Definition of Joint Probability Distribution</text>
    <text x="10" y="70" font-size="16" font-family="Arial" fill="#5f7bae" data-narration> A joint probability distribution is a mathematical concept used to describe the probability of two or more discrete random variables occurring together.</text>
    <rect x="10" y="110" width="300" height="50" style="fill:#fff; stroke: #8f4f5f; stroke-width: 2" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,110" to="0,170" dur="2s" begin="0s" />
    <text x="10" y="120" font-size="16" font-family="Arial" fill="#5f7bae">Example of Joint Probability Distribution</text>
    <text x="10" y="180" font-size="16" font-family="Arial" fill="#5f7bae" data-narration> Suppose we have two discrete random variables, X and Y, which represent the number of hours studied and the number of hours slept, respectively.</text>
    <rect x="10" y="210" width="300" height="50" style="fill:#fff; stroke: #8f4f5f; stroke-width: 2" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,210" to="0,270" dur="2s" begin="0s" />
    <text x="10" y="220" font-size="16" font-family="Arial" fill="#5f7bae">Joint Probability Distribution Formula</text>
    <text x="10" y="280" font-size="16" font-family="Arial" fill="#5f7bae" data-narration> The joint probability distribution formula is defined as: P(X=x, Y=y) = P(X=x) \* P(Y=y|x)</text>
    <rect x="10" y="310" width="300" height="50" style="fill:#fff; stroke: #8f4f5f; stroke-width: 2" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,310" to="0,370" dur="2s" begin="0s" />
    <text x="10" y="320" font-size="16" font-family="Arial" fill="#5f7bae">Key Concepts</text>
    <text x="10" y="370" font-size="16" font-family="Arial" fill="#5f7bae" data-narration> Joint probability distribution, marginal probability, conditional probability.</text>
    <rect x="10" y="390" width="300" height="50" style="fill:#fff; stroke: #8f4f5f; stroke-width: 2" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,390" to="0,450" dur="2s" begin="0s" />
    <text x="10" y="400" font-size="16" font-family="Arial" fill="#5f7bae">Real-World Applications</text>
    <text x="10" y="450" font-size="16" font-family="Arial" fill="#5f7bae" data-narration> Statistical analysis, machine learning, data science.</text>
    <rect x="10" y="460" width="300" height="50" style="fill:#fff; stroke: #8f4f5f; stroke-width: 2" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,460" to="0,510" dur="2s" begin="0s" />
    <text x="10" y="470" font-size="16" font-family="Arial" fill="#5f7bae">Arrow markers for connections.</text>
  </g>
  <g transform="translate(10, 520)">
    <rect x="10" y="10" width="400" height="50" style="fill:#fff; stroke: #8f4f5f; stroke-width: 2" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,10" to="0,60" dur="2s" begin="0s" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#5f7bae">Footer</text>
  </g>
</svg>