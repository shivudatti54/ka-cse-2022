<svg width="420" height="400" data-topic-id="completely-randomized-design" xmlns="http://www.w3.org/2000/svg">
  <title>Analysis of Completely Randomized Design</title>
  <footer>Generated using study material</footer>
  <background>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
    <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  </background>
  <g id="analysis-of-completely-randomized-design">
    <section data-narration="Introduction">
      <rect x="10" y="10" width="400" height="50" fill="#F7F7F7"/>
      <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">Introduction</text>
    </section>
    <section data-narration="Assumptions">
      <rect x="10" y="80" width="400" height="50" fill="#F7F7F7"/>
      <text x="20" y="100" font-size="18" font-family="Arial, sans-serif">Assumptions</text>
      <rect x="20" y="110" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="120" font-size="18" font-family="Arial, sans-serif">Each experimental unit is randomly assigned to a treatment.</text>
      <rect x="20" y="140" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="150" font-size="18" font-family="Arial, sans-serif">The treatments are mutually exclusive and exhaustive.</text>
    </section>
    <section data-narration="Methods">
      <rect x="10" y="210" width="400" height="50" fill="#F7F7F7"/>
      <text x="20" y="230" font-size="18" font-family="Arial, sans-serif">Methods</text>
      <rect x="20" y="240" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="250" font-size="18" font-family="Arial, sans-serif">Data Analysis</text>
      <rect x="20" y="270" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="280" font-size="18" font-family="Arial, sans-serif">Anova</text>
      <rect x="20" y="300" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="310" font-size="18" font-family="Arial, sans-serif">Post-Hoc Tests</text>
    </section>
    <section data-narration="Anova">
      <rect x="10" y="370" width="400" height="50" fill="#F7F7F7"/>
      <text x="20" y="390" font-size="18" font-family="Arial, sans-serif">Anova</text>
      <rect x="20" y="400" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="410" font-size="18" font-family="Arial, sans-serif">Yijk = μ + Ti + εijk</text>
    </section>
    <section data-narration="Example">
      <rect x="10" y="470" width="400" height="50" fill="#F7F7F7"/>
      <text x="20" y="490" font-size="18" font-family="Arial, sans-serif">Example</text>
      <rect x="20" y="500" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="510" font-size="18" font-family="Arial, sans-serif">Suppose we want to compare the yield of two different varieties of wheat.</text>
      <rect x="20" y="530" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="540" font-size="18" font-family="Arial, sans-serif">We have three experimental units for each treatment.</text>
      <rect x="20" y="560" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="570" font-size="18" font-family="Arial, sans-serif">The yield data is:</text>
    </section>
    <section data-narration="Statistical Analysis">
      <rect x="10" y="640" width="400" height="50" fill="#F7F7F7"/>
      <text x="20" y="660" font-size="18" font-family="Arial, sans-serif">Statistical Analysis</text>
      <rect x="20" y="670" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="680" font-size="18" font-family="Arial, sans-serif">The ANOVA model for CRD is: Yijk = μ + Ti + εijk</text>
    </section>
    <section data-narration="Post-Hoc Tests">
      <rect x="10" y="750" width="400" height="50" fill="#F7F7F7"/>
      <text x="20" y="770" font-size="18" font-family="Arial, sans-serif">Post-Hoc Tests</text>
      <rect x="20" y="780" width="350" height="20" fill="#C7B8EA" rx="5"/>
      <text x="40" y="790" font-size="18" font-family="Arial, sans-serif">Post-hoc tests are used to compare the treatment means.</text>
    </section>
  </g>
  <animate id="fade-in" dur="2s" begin="0s" repeatCount="indefinite">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,420" dur="1s"/>
    <animateTransform attributeName="transform" type="translate" from="0,-420" to="0,0" dur="1s"/>
  </animate>
  <animate id="fade-out" dur="2s" begin="2s" repeatCount="indefinite">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-420" dur="1s"/>
    <animateTransform attributeName="transform" type="translate" from="0,-420" to="0,0" dur="1s"/>
  </animate>
</svg>