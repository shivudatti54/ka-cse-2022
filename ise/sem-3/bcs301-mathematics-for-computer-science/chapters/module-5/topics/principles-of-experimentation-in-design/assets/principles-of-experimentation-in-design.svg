<svg width="420" height="400" data-topic-id="principles-of-experimentation-in-design" xmlns="http://www.w3.org/2000/svg">
  <title>Principles of Experimentation in Design</title>
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA" />
  <rect x="110" y="50" width="200" height="300" fill="#87CEEB" />
  <rect x="0" y="0" width="420" height="50" fill="#3498DB" />
  <rect x="0" y="350" width="420" height="50" fill="#F1C40F" />
  <g id="Experimentation-In-Design-Section-1">
    <rect x="15" y="10" width="400" height="40" fill="#87CEEB" />
    <g transform="rotate(90 15 10)">
      <text x="10" y="15">Research Question</text>
      <animate transform="rotate(90 15 10)" begin="0s" dur="2s" repeat="1s" />
    </g>
    <g data-narration="Research Question is a clear and specific question that guides the experiment. It should be concise and focused on the research objective.">
      <text x="10" y="50" fill="#333333" font-size="16">Research Question:
          <tspan x="10" y="65">A clear and specific question that guides the experiment.</tspan>
          <tspan x="10" y="80">It should be concise and focused on the research objective.</tspan>
      </text>
    </g>
  </g>
  <g id="Types-of-Experiments-Section">
    <rect x="15" y="10" width="400" height="40" fill="#87CEEB" />
    <g transform="rotate(90 15 10)">
      <text x="10" y="15">Types of Experiments</text>
      <animate transform="rotate(90 15 10)" begin="2s" dur="2s" repeat="1s" />
    </g>
    <g data-narration="Factorial Experiment involves testing multiple factors simultaneously. Two-factor experiment involves testing two factors separately. Single-factor experiment involves testing a single factor at different levels.">
      <rect x="10" y="50" width="200" height="50" fill="#CCFF99" />
      <rect x="220" y="50" width="80" height="50" fill="#CCFF99" />
      <rect x="320" y="50" width="80" height="50" fill="#CCFF99" />
      <text x="10" y="100" fill="#333333" font-size="16">Factorial Experiment:</text>
      <text x="220" y="100" fill="#333333" font-size="16">Two-Factor Experiment:</text>
      <text x="320" y="100" fill="#333333" font-size="16">Single-Factor Experiment:</text>
      <animate transform="translateX(20) rotate(90 10 100)" begin="3s" dur="2s" repeat="1s" />
      <animate transform="translateX(220) rotate(90 220 100)" begin="5s" dur="2s" repeat="1s" />
      <animate transform="translateX(320) rotate(90 320 100)" begin="7s" dur="2s" repeat="1s" />
    </g>
  </g>
  <g id="Experimental-Design-Section">
    <rect x="15" y="10" width="400" height="40" fill="#87CEEB" />
    <g transform="rotate(90 15 10)">
      <text x="10" y="15">Experimental Design</text>
      <animate transform="rotate(90 15 10)" begin="9s" dur="2s" repeat="1s" />
    </g>
    <g data-narration="Research Question is a clear and specific question that guides the experiment. It should be concise and focused on the research objective.">
      <rect x="10" y="50" width="400" height="50" fill="#F7DC6F" />
      <text x="10" y="110" fill="#333333" font-size="16">Dependent Variable:</text>
      <text x="10" y="130" fill="#333333" font-size="16">Independent Variable:</text>
      <text x="10" y="150" fill="#333333" font-size="16">Controlled Variables:</text>
      <text x="10" y="170" fill="#333333" font-size="16">Sample Size:</text>
      <animate transform="translateX(50) rotate(90 10 150)" begin="10s" dur="2s" repeat="1s" />
      <animate transform="translateX(150) rotate(90 10 170)" begin="12s" dur="2s" repeat="1s" />
      <animate transform="translateX(250) rotate(90 10 190)" begin="14s" dur="2s" repeat="1s" />
      <animate transform="translateX(350) rotate(90 10 210)" begin="16s" dur="2s" repeat="1s" />
    </g>
  </g>
  <g id="Conclusion-Section">
    <rect x="15" y="10" width="400" height="40" fill="#87CEEB" />
    <g transform="rotate(90 15 10)">
      <text x="10" y="15">Conclusion</text>
      <animate transform="rotate(90 15 10)" begin="18s" dur="2s" repeat="1s" />
    </g>
    <g data-narration="Experimental design is a crucial step in the research process. It involves planning and organizing an experiment to achieve specific research objectives.">
      <rect x="10" y="50" width="400" height="50" fill="#F7DC6F" />
      <text x="10" y="110" fill="#333333" font-size="16">Key Components:</text>
      <text x="10" y="130" fill="#333333" font-size="16">Research Question: A clear and specific question that guides the experiment.</text>
      <text x="10" y="150" fill="#333333" font-size="16">Dependent Variable: The variable being measured or observed.</text>
      <text x="10" y="170" fill="#333333" font-size="16">Independent Variable: The variable being manipulated or changed.</text>
      <text x="10" y="190" fill="#333333" font-size="16">Controlled Variables: Variables that are kept constant to minimize their effect on the experiment.</text>
      <animate transform="translateX(50) rotate(90 10 150)" begin="19s" dur="2s" repeat="1s" />
      <animate transform="translateX(150) rotate(90 10 170)" begin="21s" dur="2s" repeat="1s" />
      <animate transform="translateX(250) rotate(90 10 190)" begin="23s" dur="2s" repeat="1s" />
      <animate transform="translateX(350) rotate(90 10 210)" begin="25s" dur="2s" repeat="1s" />
    </g>
  </g>
  <g id="Footer-Section">
    <rect x="0" y="350" width="420" height="50" fill="#F1C40F" />
    <text x="10" y="370" fill="#333333" font-size="16">Data Topic ID: principles-of-experimentation-in-design</text>
  </g>
</svg>