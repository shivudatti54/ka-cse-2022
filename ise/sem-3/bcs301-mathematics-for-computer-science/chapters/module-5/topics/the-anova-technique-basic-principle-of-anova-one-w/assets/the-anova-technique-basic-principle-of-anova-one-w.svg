<svg
    width="420"
    height="400"
    viewBox="0 0 420 400"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    xml:lang="en"
    data-topic-id="The-ANOVA-Technique-Basic-Principle-Of-ANOVA-One-W"
    style="background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB);
            background-size: 100% 100%;
            color: #5C6BC0;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.5;
            text-align: center;"
    role="presentation"
>
    <title>Understanding ANOVA: A Statistical Analysis Technique</title>
    <footer>uto</footer>
    <section data-narration="Introduction to ANOVA">
        <rect x="10" y="20" width="400" height="50" fill="#87CEEB" rx="10" />
        <g transform="translate(20, 30)">
            <rect x="0" y="0" width="60" height="20" fill="#87CEEB" rx="10" />
            <text x="15" y="15" font-size="16px" font-weight="bold">ANOVA Analysis</text>
        </g>
        <animate transform="translateX(20)" begin="-0.5s" duration="1.5s" repeat="forever" />
    </section>
    <section data-narration="Basic Principle of ANOVA">
        <rect x="10" y="100" width="400" height="50" fill="#87CEEB" rx="10" />
        <g transform="translate(20, 110)">
            <rect x="0" y="0" width="60" height="20" fill="#87CEEB" rx="10" />
            <text x="15" y="15" font-size="16px" font-weight="bold">Variance Calculation</text>
        </g>
        <g transform="translate(20, 130)">
            <animate transform="translateX(20)" begin="-0.5s" duration="1.5s" repeat="forever" />
        </g>
        <g transform="translate(20, 150)">
            <rect x="0" y="0" width="60" height="20" fill="#87CEEB" rx="10" />
            <text x="15" y="15" font-size="16px" font-weight="bold">F-Distribution</text>
        </g>
    </section>
    <section data-narration="One-Way ANOVA">
        <rect x="10" y="220" width="400" height="50" fill="#87CEEB" rx="10" />
        <g transform="translate(20, 230)">
            <rect x="0" y="0" width="60" height="20" fill="#87CEEB" rx="10" />
            <text x="15" y="15" font-size="16px" font-weight="bold">Null Hypothesis</text>
        </g>
        <g transform="translate(20, 250)">
            <rect x="0" y="0" width="60" height="20" fill="#87CEEB" rx="10" />
            <text x="15" y="15" font-size="16px" font-weight="bold">Alternative Hypothesis</text>
        </g>
        <g transform="translate(20, 270)">
            <animate transform="translateX(20)" begin="-0.5s" duration="1.5s" repeat="forever" />
        </g>
    </section>
    <section data-narration="Two-Way ANOVA">
        <rect x="10" y="330" width="400" height="50" fill="#87CEEB" rx="10" />
        <g transform="translate(20, 340)">
            <rect x="0" y="0" width="60" height="20" fill="#87CEEB" rx="10" />
            <text x="15" y="15" font-size="16px" font-weight="bold">Interaction Effects</text>
        </g>
        <g transform="translate(20, 360)">
            <rect x="0" y="0" width="60" height="20" fill="#87CEEB" rx="10" />
            <text x="15" y="15" font-size="16px" font-weight="bold">Null Hypothesis</text>
        </g>
        <g transform="translate(20, 380)">
            <rect x="0" y="0" width="60" height="20" fill="#87CEEB" rx="10" />
            <text x="15" y="15" font-size="16px" font-weight="bold">Alternative Hypothesis</text>
        </g>
        <g transform="translate(20, 400)">
            <animate transform="translateX(20)" begin="-0.5s" duration="1.5s" repeat="forever" />
        </g>
    </section>
    <g transform="translate(0, 0)">
        <line x1="20" y1="20" x2="400" y2="20" stroke="#5C6BC0" stroke-width="2" />
        <line x1="20" y1="220" x2="400" y2="220" stroke="#5C6BC0" stroke-width="2" />
        <line x1="20" y1="320" x2="400" y2="320" stroke="#5C6BC0" stroke-width="2" />
        <arrow marker-end="triangle" marker-width="4" marker-orientation="45" fill="#5C6BC0" />
        <text x="20" y="20" font-size="16px" font-weight="bold">Variance</text>
        <text x="20" y="220" font-size="16px" font-weight="bold">Mean</text>
        <text x="20" y="320" font-size="16px" font-weight="bold">Interaction</text>
    </g>
</svg>