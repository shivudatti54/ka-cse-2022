<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="f-distribution">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="14"/>

  <!-- ======================== GROUP 1: Title (0.3s) ======================== -->
  <g data-narration="The F-Distribution is a fundamental probability distribution used in statistical hypothesis testing." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <rect x="110" y="8" width="200" height="32" rx="16" fill="#3949AB"/>
    <text x="210" y="29" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="white">F-Distribution</text>
  </g>

  <!-- ======================== GROUP 2: F-Distribution Curve (1.5s) ======================== -->
  <g data-narration="The F-distribution is right-skewed, starts at zero, peaks near one, and has a long right tail. The x-axis represents the F value and the y-axis represents probability density." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Axes -->
    <line x1="55" y1="140" x2="395" y2="140" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="55" y1="140" x2="55" y2="52" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Axis arrows -->
    <polygon points="395,140 389,137 389,143" fill="#3949AB"/>
    <polygon points="55,52 52,58 58,58" fill="#3949AB"/>
    <!-- Axis labels -->
    <text x="225" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">F value</text>
    <text x="18" y="98" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB" transform="rotate(-90,18,98)">Probability density</text>
    <!-- Tick marks on x-axis -->
    <line x1="55" y1="140" x2="55" y2="143" stroke="#3949AB" stroke-width="1"/>
    <text x="55" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">0</text>
    <line x1="123" y1="140" x2="123" y2="143" stroke="#3949AB" stroke-width="1"/>
    <text x="123" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">1</text>
    <line x1="191" y1="140" x2="191" y2="143" stroke="#3949AB" stroke-width="1"/>
    <text x="191" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">2</text>
    <line x1="259" y1="140" x2="259" y2="143" stroke="#3949AB" stroke-width="1"/>
    <text x="259" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">3</text>
    <line x1="327" y1="140" x2="327" y2="143" stroke="#3949AB" stroke-width="1"/>
    <text x="327" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">4</text>

    <!-- F-distribution curve (df1=5, df2=20): right-skewed, peak near 1 -->
    <path d="M 55,140
             C 62,138 70,120 80,90
             C 85,76 92,66 100,62
             C 108,58 115,60 123,68
             C 135,80 150,98 170,110
             C 190,120 215,128 245,133
             C 275,136 310,138 350,139
             L 380,140"
          fill="none" stroke="url(#curveGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Shaded area under curve -->
    <path d="M 55,140
             C 62,138 70,120 80,90
             C 85,76 92,66 100,62
             C 108,58 115,60 123,68
             C 135,80 150,98 170,110
             C 190,120 215,128 245,133
             C 275,136 310,138 350,139
             L 380,140 Z"
          fill="#3949AB" opacity="0.1"/>
    <!-- Peak label -->
    <text x="100" y="55" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-style="italic">peak</text>
    <!-- Right tail label -->
    <text x="345" y="132" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-style="italic">long right tail</text>
  </g>

  <!-- ======================== GROUP 3: Definition/Formula (3.0s) ======================== -->
  <g data-narration="The F-statistic is defined as the ratio of two sample variances divided by their respective population variances. It equals the ratio of two independent chi-squared variables divided by their degrees of freedom." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Formula box -->
    <rect x="30" y="164" width="360" height="52" rx="8" fill="white" stroke="#00695C" stroke-width="1.5" opacity="0.92"/>
    <!-- Formula title -->
    <text x="210" y="179" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">F-Statistic Formula</text>
    <!-- Main formula using Unicode characters -->
    <!-- F = (S&#x00B9;&#x00B2; / &#x03C3;&#x00B9;&#x00B2;) / (S&#x00B2;&#x00B2; / &#x03C3;&#x00B2;&#x00B2;) -->
    <text x="210" y="200" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#00695C">F = (S&#x00B2;&#x2081; / &#x03C3;&#x00B2;&#x2081;) / (S&#x00B2;&#x2082; / &#x03C3;&#x00B2;&#x2082;)</text>
    <!-- Explanation -->
    <text x="210" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Ratio of two &#x03C7;&#x00B2; / df</text>
  </g>

  <!-- ======================== GROUP 4: Degrees of Freedom Effect (4.5s) ======================== -->
  <g data-narration="The shape of the F-distribution depends on two degrees of freedom parameters, d-f-1 and d-f-2. Higher degrees of freedom make the distribution more symmetric and concentrated around 1." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <text x="210" y="234" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Effect of Degrees of Freedom</text>

    <!-- Mini axes -->
    <line x1="50" y1="300" x2="200" y2="300" stroke="#888" stroke-width="1"/>
    <line x1="50" y1="300" x2="50" y2="248" stroke="#888" stroke-width="1"/>

    <!-- Curve 1: df1=5, df2=10 (more peaked, solid orange) -->
    <path d="M 50,300
             C 55,298 62,285 70,265
             C 75,252 82,246 90,248
             C 100,252 112,268 125,280
             C 140,290 158,296 178,299
             L 200,300"
          fill="none" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
    <!-- Curve 2: df1=2, df2=5 (more spread, dashed orange) -->
    <path d="M 50,300
             C 54,296 60,280 66,268
             C 72,258 78,255 82,258
             C 90,265 100,278 115,288
             C 130,294 148,298 170,299
             L 200,300"
          fill="none" stroke="#E65100" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" opacity="0.7"/>

    <!-- Legends -->
    <line x1="215" y1="258" x2="235" y2="258" stroke="#E65100" stroke-width="2"/>
    <text x="240" y="261" font-family="Arial" font-size="9" fill="#E65100">df1=5, df2=10</text>
    <line x1="215" y1="272" x2="235" y2="272" stroke="#E65100" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
    <text x="240" y="275" font-family="Arial" font-size="9" fill="#E65100">df1=2, df2=5</text>

    <!-- Insight box -->
    <rect x="215" y="284" width="175" height="22" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="302" y="299" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Higher df &#x2192; more symmetric</text>
  </g>

  <!-- ======================== GROUP 5: F-Test Application (6.0s) ======================== -->
  <g data-narration="The F-test is used to test whether two populations have equal variances. The null hypothesis states that the variances are equal, and the alternative hypothesis states they are not. The critical region is in the right tail of the F-distribution." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <text x="210" y="322" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">F-Test: Comparing Two Variances</text>

    <!-- Hypotheses -->
    <rect x="30" y="328" width="165" height="28" rx="6" fill="white" stroke="#C62828" stroke-width="1" opacity="0.9"/>
    <text x="112" y="346" text-anchor="middle" font-family="monospace" font-size="11" fill="#C62828">H&#x2080;: &#x03C3;&#x00B2;&#x2081; = &#x03C3;&#x00B2;&#x2082;</text>

    <rect x="210" y="328" width="165" height="28" rx="6" fill="white" stroke="#C62828" stroke-width="1" opacity="0.9"/>
    <text x="292" y="346" text-anchor="middle" font-family="monospace" font-size="11" fill="#C62828">H&#x2081;: &#x03C3;&#x00B2;&#x2081; &#x2260; &#x03C3;&#x00B2;&#x2082;</text>

    <!-- Critical region indicator -->
    <rect x="330" y="358" width="70" height="14" rx="4" fill="#C62828" opacity="0.2" stroke="#C62828" stroke-width="0.5"/>
    <text x="365" y="368" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828" font-weight="bold">Critical region (right tail)</text>
  </g>

  <!-- ======================== GROUP 6: Applications (7.5s) ======================== -->
  <g data-narration="The F-distribution has three major applications: ANOVA for comparing group means, regression significance testing, and comparing variances of two populations." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Application pills -->
    <rect x="28" y="378" width="110" height="18" rx="9" fill="#3949AB"/>
    <text x="83" y="391" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">ANOVA</text>

    <rect x="150" y="378" width="140" height="18" rx="9" fill="#00695C"/>
    <text x="220" y="391" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Regression Significance</text>

    <rect x="302" y="378" width="110" height="18" rx="9" fill="#E65100"/>
    <text x="357" y="391" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Comparing Variances</text>
  </g>
</svg>