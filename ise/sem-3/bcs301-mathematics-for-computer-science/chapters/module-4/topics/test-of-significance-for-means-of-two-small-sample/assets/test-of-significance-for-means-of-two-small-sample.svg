<svg width="420" height="400" data-topic-id="test-of-significance-for-means-of-two-small-samples" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E6DAC3" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#2E4053" color="#5C6BC0">
    Test of Significance for Means of Two Small Samples
  </text>

  <!-- Section 1: Introduction -->
  <rect x="20" y="60" width="380" height="40" style="fill:transparent; stroke: #2E4053; stroke-width: 2;"/>
  <text x="20" y="70" font-size="16" text-anchor="start" fill="#5C6BC0" color="#2E4053" data-narration="The test of significance for means of two small samples is used to determine if there is a significant difference between the means of two independent samples.">
    Introduction
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="6000" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,320,200" to="360,320,200" dur="6000" begin="2000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,440,200" to="360,440,200" dur="6000" begin="4000s"/>

  <!-- Section 2: Mathematical Definition -->
  <rect x="20" y="120" width="380" height="40" style="fill:transparent; stroke: #2E4053; stroke-width: 2;"/>
  <text x="20" y="130" font-size="16" text-anchor="start" fill="#5C6BC0" color="#2E4053" data-narration="The test of significance for means of two small samples is based on the concept of hypothesis testing. The null hypothesis is that there is no significant difference between the means of the two samples, while the alternative hypothesis is that there is a significant difference.">
    Mathematical Definition
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="6000" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,320,200" to="360,320,200" dur="6000" begin="2000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,440,200" to="360,440,200" dur="6000" begin="4000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,560,200" to="360,560,200" dur="6000" begin="6000s"/>

  <!-- Section 3: Null and Alternative Hypotheses -->
  <rect x="20" y="180" width="380" height="40" style="fill:transparent; stroke: #2E4053; stroke-width: 2;"/>
  <text x="20" y="190" font-size="16" text-anchor="start" fill="#5C6BC0" color="#2E4053" data-narration="The null hypothesis is that there is no significant difference between the means of the two samples, while the alternative hypothesis is that there is a significant difference.">
    Null and Alternative Hypotheses
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="6000" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,320,200" to="360,320,200" dur="6000" begin="2000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,440,200" to="360,440,200" dur="6000" begin="4000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,560,200" to="360,560,200" dur="6000" begin="6000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,680,200" to="360,680,200" dur="6000" begin="8000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,800,200" to="360,800,200" dur="6000" begin="10000s"/>

  <!-- Section 4: Test Statistic -->
  <rect x="20" y="240" width="380" height="40" style="fill:transparent; stroke: #2E4053; stroke-width: 2;"/>
  <text x="20" y="250" font-size="16" text-anchor="start" fill="#5C6BC0" color="#2E4053" data-narration="The test statistic is calculated as: t = (x̄1 - x̄2) / sqrt((s1^2/n1) + (s2^2/n2)).">
    Test Statistic
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="6000" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,320,200" to="360,320,200" dur="6000" begin="2000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,440,200" to="360,440,200" dur="6000" begin="4000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,560,200" to="360,560,200" dur="6000" begin="6000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,680,200" to="360,680,200" dur="6000" begin="8000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,800,200" to="360,800,200" dur="6000" begin="10000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,920,200" to="360,920,200" dur="6000" begin="12000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1040,200" to="360,1040,200" dur="6000" begin="14000s"/>

  <!-- Section 5: Critical Region -->
  <rect x="20" y="300" width="380" height="40" style="fill:transparent; stroke: #2E4053; stroke-width: 2;"/>
  <text x="20" y="310" font-size="16" text-anchor="start" fill="#5C6BC0" color="#2E4053" data-narration="The critical region is the region of the test statistic where the null hypothesis is rejected. The critical region is typically located in the tails of the distribution, far away from the mean.">
    Critical Region
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="6000" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,320,200" to="360,320,200" dur="6000" begin="2000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,440,200" to="360,440,200" dur="6000" begin="4000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,560,200" to="360,560,200" dur="6000" begin="6000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,680,200" to="360,680,200" dur="6000" begin="8000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,800,200" to="360,800,200" dur="6000" begin="10000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,920,200" to="360,920,200" dur="6000" begin="12000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1040,200" to="360,1040,200" dur="6000" begin="14000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1160,200" to="360,1160,200" dur="6000" begin="16000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1280,200" to="360,1280,200" dur="6000" begin="18000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1400,200" to="360,1400,200" dur="6000" begin="20000s"/>

  <!-- Section 6: Type I and Type II Errors -->
  <rect x="20" y="360" width="380" height="40" style="fill:transparent; stroke: #2E4053; stroke-width: 2;"/>
  <text x="20" y="370" font-size="16" text-anchor="start" fill="#5C6BC0" color="#2E4053" data-narration="Type I Error: Rejecting the null hypothesis when it is true (α). Type II Error: Failing to reject the null hypothesis when it is false (β).">
    Type I and Type II Errors
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0,200,200" to="360,200,200" dur="6000" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,320,200" to="360,320,200" dur="6000" begin="2000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,440,200" to="360,440,200" dur="6000" begin="4000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,560,200" to="360,560,200" dur="6000" begin="6000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,680,200" to="360,680,200" dur="6000" begin="8000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,800,200" to="360,800,200" dur="6000" begin="10000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,920,200" to="360,920,200" dur="6000" begin="12000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1040,200" to="360,1040,200" dur="6000" begin="14000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1160,200" to="360,1160,200" dur="6000" begin="16000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1280,200" to="360,1280,200" dur="6000" begin="18000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1400,200" to="360,1400,200" dur="6000" begin="20000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1520,200" to="360,1520,200" dur="6000" begin="22000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1640,200" to="360,1640,200" dur="6000" begin="24000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1760,200" to="360,1760,200" dur="6000" begin="26000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,1880,200" to="360,1880,200" dur="6000" begin="28000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0,2000,200" to="360,2000,200" dur="6000" begin="30000s"/>

  <!-- Footer -->
  <text x="50%" y="380" font-size="16" text-anchor="middle" fill="#2E4053" color="#5C6BC0">
    Created by [Your Name]
  </text>
</svg>