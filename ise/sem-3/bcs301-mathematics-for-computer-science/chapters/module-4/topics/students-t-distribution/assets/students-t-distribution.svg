<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="students-t-distribution">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Student's t-Distribution: a probability distribution used for inference when the population standard deviation is unknown.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3949AB">Student&#x2019;s t-Distribution</text>
    <line x1="100" y1="40" x2="320" y2="40" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="100" cy="40" r="3" fill="#E65100"/>
    <circle cx="210" cy="40" r="3" fill="#E65100"/>
    <circle cx="320" cy="40" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Bell curve comparison -->
  <g opacity="0" data-narration="The t-distribution resembles a normal distribution but has heavier tails. This means more probability in the extremes, especially with fewer degrees of freedom.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Axes -->
    <line x1="40" y1="140" x2="400" y2="140" stroke="#333" stroke-width="1"/>
    <line x1="210" y1="55" x2="210" y2="145" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3"/>
    <!-- Normal distribution curve (narrower, taller peak) -->
    <path d="M 50,140 Q 80,138 110,132 Q 140,118 160,95 Q 180,68 195,58 Q 205,53 210,52 Q 215,53 225,58 Q 240,68 260,95 Q 280,118 310,132 Q 340,138 370,140" fill="none" stroke="#00695C" stroke-width="2" stroke-linecap="round"/>
    <!-- t-distribution curve (wider, shorter peak, heavier tails) -->
    <path d="M 40,139 Q 60,137 85,133 Q 110,126 135,112 Q 160,93 180,76 Q 195,66 205,62 Q 210,61 215,62 Q 225,66 240,76 Q 260,93 285,112 Q 310,126 335,133 Q 360,137 380,139" fill="none" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tail emphasis -->
    <text x="38" y="129" font-family="Arial, sans-serif" font-size="8" fill="#C62828">heavier tail</text>
    <text x="348" y="129" font-family="Arial, sans-serif" font-size="8" fill="#C62828">heavier tail</text>
    <!-- Legend -->
    <line x1="55" y1="60" x2="75" y2="60" stroke="#3949AB" stroke-width="2.5"/>
    <text x="80" y="63" font-family="Arial, sans-serif" font-size="9" fill="#3949AB">t-distribution</text>
    <line x1="55" y1="73" x2="75" y2="73" stroke="#00695C" stroke-width="2"/>
    <text x="80" y="76" font-family="Arial, sans-serif" font-size="9" fill="#00695C">Normal (z)</text>
    <!-- X-axis labels -->
    <text x="210" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">0</text>
    <text x="130" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">-2</text>
    <text x="290" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">+2</text>
  </g>

  <!-- Group 3: Formula -->
  <g opacity="0" data-narration="The t-statistic formula is t equals x-bar minus mu, divided by s over square root of n. Here x-bar is the sample mean, mu is the population mean, s is the sample standard deviation, and n is the sample size.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <rect x="30" y="163" width="360" height="68" rx="8" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="1"/>
    <text x="50" y="183" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Formula:</text>
    <!-- t = (X-bar - mu) / (S / sqrt(n)) -->
    <text x="210" y="188" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#E65100">t = (X&#x0304; &#x2212; &#x03BC;) / (S / &#x221A;n)</text>
    <!-- Component labels -->
    <text x="170" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#00695C">X&#x0304; = sample mean</text>
    <text x="290" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#00695C">&#x03BC; = population mean</text>
    <text x="170" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#00695C">S = sample std dev</text>
    <text x="290" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#00695C">n = sample size</text>
  </g>

  <!-- Group 4: Degrees of freedom -->
  <g opacity="0" data-narration="The degrees of freedom, d f equals n minus 1, controls the shape. With d f equal to 1, the curve is very wide and flat. At d f equal to 5, it is moderately peaked. At d f equal to 30, it is nearly identical to the normal distribution.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="30" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Degrees of Freedom:</text>
    <text x="190" y="250" font-family="monospace" font-size="12" font-weight="bold" fill="#E65100">df = n &#x2212; 1</text>
    <!-- Mini curves showing df effect -->
    <!-- df=1: very flat and wide -->
    <path d="M 30,300 Q 60,298 90,293 Q 120,286 145,280 Q 165,276 175,274 Q 180,273.5 185,274 Q 195,276 215,280 Q 240,286 270,293 Q 300,298 330,300" fill="none" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- df=5: moderate -->
    <path d="M 40,300 Q 65,298 90,294 Q 115,284 135,270 Q 150,260 165,256 Q 175,253 180,252 Q 185,253 195,256 Q 210,260 225,270 Q 245,284 270,294 Q 295,298 320,300" fill="none" stroke="#E65100" stroke-width="1.8" stroke-dasharray="6,3"/>
    <!-- df=30: nearly normal (tall and narrow) -->
    <path d="M 60,300 Q 85,298 105,293 Q 125,282 140,268 Q 155,250 165,240 Q 172,234 177,232 Q 180,231 183,232 Q 188,234 195,240 Q 205,250 220,268 Q 235,282 255,293 Q 275,298 300,300" fill="none" stroke="#00695C" stroke-width="2"/>
    <!-- Baseline -->
    <line x1="25" y1="300" x2="335" y2="300" stroke="#666" stroke-width="0.5"/>
    <!-- Legend for df curves -->
    <line x1="340" y1="270" x2="360" y2="270" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="365" y="273" font-family="Arial, sans-serif" font-size="9" fill="#C62828">df=1</text>
    <line x1="340" y1="283" x2="360" y2="283" stroke="#E65100" stroke-width="1.8" stroke-dasharray="6,3"/>
    <text x="365" y="286" font-family="Arial, sans-serif" font-size="9" fill="#E65100">df=5</text>
    <line x1="340" y1="296" x2="360" y2="296" stroke="#00695C" stroke-width="2"/>
    <text x="365" y="299" font-family="Arial, sans-serif" font-size="9" fill="#00695C">df=30</text>
  </g>

  <!-- Group 5: Key properties -->
  <g opacity="0" data-narration="Key properties: the t-distribution is symmetric about zero, has heavier tails than the normal distribution, approaches the normal distribution as degrees of freedom increase to infinity, and is used when sigma is unknown with small sample sizes.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="310" width="195" height="82" rx="7" fill="white" fill-opacity="0.75" stroke="#3949AB" stroke-width="1"/>
    <text x="112" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#3949AB">Key Properties</text>
    <circle cx="30" cy="340" r="2.5" fill="#E65100"/>
    <text x="38" y="343" font-family="Arial, sans-serif" font-size="9" fill="#333">Symmetric about 0</text>
    <circle cx="30" cy="355" r="2.5" fill="#E65100"/>
    <text x="38" y="358" font-family="Arial, sans-serif" font-size="9" fill="#333">Heavier tails than normal</text>
    <circle cx="30" cy="370" r="2.5" fill="#E65100"/>
    <text x="38" y="373" font-family="Arial, sans-serif" font-size="9" fill="#333">Approaches normal as df&#x2192;&#x221E;</text>
    <circle cx="30" cy="385" r="2.5" fill="#E65100"/>
    <text x="38" y="388" font-family="Arial, sans-serif" font-size="9" fill="#333">Used when &#x03C3; unknown, small n</text>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="Applications of the t-distribution include constructing confidence intervals for the mean, hypothesis testing for population means, and comparing two sample means using a two-sample t-test.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="218" y="310" width="190" height="82" rx="7" fill="white" fill-opacity="0.75" stroke="#00695C" stroke-width="1"/>
    <text x="313" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#00695C">Applications</text>
    <rect x="230" y="333" width="12" height="12" rx="2" fill="#3949AB" fill-opacity="0.15" stroke="#3949AB" stroke-width="0.7"/>
    <text x="233" y="343" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB">&#x2713;</text>
    <text x="248" y="343" font-family="Arial, sans-serif" font-size="9" fill="#333">Confidence intervals</text>
    <rect x="230" y="351" width="12" height="12" rx="2" fill="#3949AB" fill-opacity="0.15" stroke="#3949AB" stroke-width="0.7"/>
    <text x="233" y="361" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB">&#x2713;</text>
    <text x="248" y="361" font-family="Arial, sans-serif" font-size="9" fill="#333">Hypothesis testing</text>
    <rect x="230" y="369" width="12" height="12" rx="2" fill="#3949AB" fill-opacity="0.15" stroke="#3949AB" stroke-width="0.7"/>
    <text x="233" y="379" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB">&#x2713;</text>
    <text x="248" y="379" font-family="Arial, sans-serif" font-size="9" fill="#333">Comparing two means</text>
  </g>
</svg>
