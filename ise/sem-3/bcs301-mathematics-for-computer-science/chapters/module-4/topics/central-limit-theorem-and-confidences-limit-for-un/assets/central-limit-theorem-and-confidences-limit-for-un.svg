<svg width="420" height="400" data-topic-id="central-limit-theorem-and-confidence-limits-for-unknown-mean">
  <style>
    /* Style the gradient background */
    linear-gradient(to bottom, #C7B8EA, #C7B8EA 50%, #87CEEB 50%, #87CEEB);

    /* Style the text */
    text-anchor: middle;
    font-size: 16px;
    fill: #000;
  </style>

  <!-- Title -->
  <rect x="10" y="10" width="400" height="30" fill="#87CEEB" rx="10" />
  <text x="20" y="20" fill="#000" font-size="24px">Central Limit Theorem and Confidence Limits for Unknown Mean</text>

  <!-- Section 1: Introduction -->
  <rect x="10" y="50" width="400" height="100" fill="#C7B8EA" rx="10" />
  <text x="20" y="70" fill="#000" font-size="16px">Introduction</text>
  <animate attributeName="opacity" from="1" to="0" dur="2000" begin="0s" repeatCount="indefinite" />

  <data-narration x="20" y="90" font-size="14px">The Central Limit Theorem (CLT) states that the distribution of the mean of a large sample of independent and identically distributed (i.i.d.) random variables will be approximately normally distributed, regardless of the original variable's distribution shape.</data-narration>

  <!-- Section 2: Definitions -->
  <rect x="10" y="180" width="400" height="100" fill="#87CEEB" rx="10" />
  <text x="20" y="200" fill="#000" font-size="16px">Definitions</text>
  <animate attributeName="opacity" from="1" to="0" dur="2000" begin="2000s" repeatCount="indefinite" />

  <data-narration x="20" y="230" font-size="14px">- Central Limit Theorem (CLT): A theorem that describes the distribution of the mean of a large sample of i.i.d. random variables.</data-narration>
  <data-narration x="20" y="260" font-size="14px">- Mean: The average value of a set of numbers.</data-narration>
  <data-narration x="20" y="290" font-size="14px">- Sample size: The number of observations in the sample.</data-narration>
  <data-narration x="20" y="320" font-size="14px">- Confidence interval: A range of values within which the true population mean is likely to lie.</data-narration>

  <!-- Section 3: Central Limit Theorem -->
  <rect x="10" y="310" width="400" height="100" fill="#C7B8EA" rx="10" />
  <text x="20" y="330" fill="#000" font-size="16px">Central Limit Theorem</text>
  <animate attributeName="opacity" from="1" to="0" dur="2000" begin="4000s" repeatCount="indefinite" />

  <data-narration x="20" y="360" font-size="14px">- Key Concepts:</data-narration>
  <data-narration x="20" y="390" font-size="14px">  • Large Sample Size: The sample size must be sufficiently large to satisfy the CLT conditions.</data-narration>
  <data-narration x="20" y="420" font-size="14px">  • Independence: Observations must be independent and identically distributed.</data-narration>
  <data-narration x="20" y="450" font-size="14px">  • Identical Distribution: The original variable's distribution shape is identical across all observations.</data-narration>
  <data-narration x="20" y="480" font-size="14px">  • Approximate Normal Distribution: The distribution of the sample mean will be approximately normally distributed.</data-narration>

  <!-- Section 4: Mathematical Representation -->
  <rect x="10" y="390" width="400" height="100" fill="#87CEEB" rx="10" />
  <text x="20" y="410" fill="#000" font-size="16px">Mathematical Representation</text>
  <animate attributeName="opacity" from="1" to="0" dur="2000" begin="6000s" repeatCount="indefinite" />

  <data-narration x="20" y="440" font-size="14px">X̄ = (1/n) \* ΣXi</data-narration>

  <!-- Section 5: Confidence Limits for Unknown Mean -->
  <rect x="10" y="540" width="400" height="100" fill="#C7B8EA" rx="10" />
  <text x="20" y="560" fill="#000" font-size="16px">Confidence Limits for Unknown Mean</text>
  <animate attributeName="opacity" from="1" to="0" dur="2000" begin="8000s" repeatCount="indefinite" />

  <data-narration x="20" y="590" font-size="14px">- Definition:</data-narration>
  <data-narration x="20" y="620" font-size="14px">- A confidence interval is a range of values within which the true population mean is likely to lie.</data-narration>
  <data-narration x="20" y="650" font-size="14px">- The confidence interval is calculated using the sample mean and standard error.</data-narration>

  <!-- Footer -->
  <rect x="10" y="370" width="400" height="30" fill="#87CEEB" rx="10" />
  <text x="20" y="380" fill="#000" font-size="16px"> footer </text>
</svg>