<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="sampling-variables">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Sampling and Random Variables: fundamental concepts in statistics and probability theory.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#3949AB">Sampling &amp; Random Variables</text>
    <line x1="100" y1="37" x2="320" y2="37" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="140" y1="41" x2="280" y2="41" stroke="#E65100" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Group 2: Population vs Sample -->
  <g opacity="0" data-narration="A population is the entire set of N elements. A sample of size n is randomly selected from the population for analysis.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Population circle -->
    <circle cx="120" cy="90" r="40" fill="none" stroke="#3949AB" stroke-width="2"/>
    <text x="120" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Population</text>
    <!-- Dots representing population -->
    <circle cx="100" cy="82" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="112" cy="78" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="130" cy="80" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="140" cy="88" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="108" cy="95" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="125" cy="100" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="135" cy="96" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="98" cy="105" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="118" cy="110" r="2" fill="#3949AB" opacity="0.5"/>
    <circle cx="140" cy="108" r="2" fill="#3949AB" opacity="0.5"/>
    <text x="120" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">N</text>
    <!-- Sample circle inside -->
    <ellipse cx="118" cy="92" rx="18" ry="16" fill="#E65100" fill-opacity="0.15" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- Highlighted sample dots -->
    <circle cx="112" cy="88" r="2.5" fill="#E65100"/>
    <circle cx="125" cy="90" r="2.5" fill="#E65100"/>
    <circle cx="118" cy="98" r="2.5" fill="#E65100"/>
    <!-- Arrow from population to sample label -->
    <path d="M160 90 L200 90" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="205" y="85" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">Sample (n)</text>
    <text x="205" y="97" font-family="Arial" font-size="8" fill="#3949AB">Random Selection</text>
    <!-- Sample box -->
    <rect x="270" y="70" width="60" height="40" fill="#E65100" fill-opacity="0.12" stroke="#E65100" stroke-width="1.5" rx="5"/>
    <circle cx="284" cy="86" r="2.5" fill="#E65100"/>
    <circle cx="298" cy="82" r="2.5" fill="#E65100"/>
    <circle cx="312" cy="90" r="2.5" fill="#E65100"/>
    <text x="300" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">n &lt;&lt; N</text>
    <path d="M240 90 L268 90" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  </g>

  <!-- Group 3: Types of Sampling -->
  <g opacity="0" data-narration="Four main types of sampling: Simple Random where every element has equal chance, Stratified where population is divided into strata, Systematic using fixed intervals, and Cluster sampling using natural groups.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="145" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Types of Sampling</text>

    <!-- Simple Random -->
    <rect x="15" y="155" width="90" height="55" fill="white" fill-opacity="0.7" rx="5" stroke="#00695C" stroke-width="1"/>
    <text x="60" y="168" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Simple Random</text>
    <circle cx="30" cy="182" r="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="1"/>
    <circle cx="45" cy="178" r="3" fill="#E65100" stroke="#E65100" stroke-width="1"/>
    <circle cx="60" cy="185" r="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="1"/>
    <circle cx="75" cy="180" r="3" fill="#E65100" stroke="#E65100" stroke-width="1"/>
    <circle cx="50" cy="195" r="3" fill="#E65100" stroke="#E65100" stroke-width="1"/>
    <circle cx="70" cy="193" r="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="1"/>
    <text x="60" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Equal chance</text>

    <!-- Stratified -->
    <rect x="115" y="155" width="90" height="55" fill="white" fill-opacity="0.7" rx="5" stroke="#00695C" stroke-width="1"/>
    <text x="160" y="168" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Stratified</text>
    <rect x="125" y="174" width="70" height="8" fill="#3949AB" fill-opacity="0.3" rx="2"/>
    <circle cx="145" cy="178" r="2" fill="#3949AB"/>
    <rect x="125" y="184" width="70" height="8" fill="#E65100" fill-opacity="0.3" rx="2"/>
    <circle cx="165" cy="188" r="2" fill="#E65100"/>
    <rect x="125" y="194" width="70" height="8" fill="#00695C" fill-opacity="0.3" rx="2"/>
    <circle cx="155" cy="198" r="2" fill="#00695C"/>
    <text x="160" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">By strata</text>

    <!-- Systematic -->
    <rect x="215" y="155" width="90" height="55" fill="white" fill-opacity="0.7" rx="5" stroke="#00695C" stroke-width="1"/>
    <text x="260" y="168" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Systematic</text>
    <circle cx="230" cy="182" r="3" fill="#E65100"/>
    <circle cx="242" cy="182" r="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5"/>
    <circle cx="254" cy="182" r="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5"/>
    <circle cx="266" cy="182" r="3" fill="#E65100"/>
    <circle cx="278" cy="182" r="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5"/>
    <circle cx="290" cy="182" r="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5"/>
    <circle cx="230" cy="195" r="3" fill="#E65100"/>
    <text x="260" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Every k-th</text>

    <!-- Cluster -->
    <rect x="315" y="155" width="90" height="55" fill="white" fill-opacity="0.7" rx="5" stroke="#00695C" stroke-width="1"/>
    <text x="360" y="168" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Cluster</text>
    <circle cx="335" cy="185" r="10" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" opacity="0.5"/>
    <circle cx="360" cy="183" r="10" fill="#E65100" fill-opacity="0.25" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="385" cy="187" r="10" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" opacity="0.5"/>
    <circle cx="358" cy="181" r="2" fill="#E65100"/>
    <circle cx="363" cy="186" r="2" fill="#E65100"/>
    <text x="360" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Whole groups</text>
  </g>

  <!-- Group 4: Random Variables -->
  <g opacity="0" data-narration="A random variable X maps outcomes of a random experiment to real numbers. Discrete random variables take countable values like dice rolls, while continuous random variables can take any value in an interval like height or weight.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="230" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Random Variable X: Outcomes &#x2192; Numbers</text>

    <!-- Discrete section -->
    <rect x="20" y="238" width="180" height="55" fill="white" fill-opacity="0.6" rx="6" stroke="#3949AB" stroke-width="1"/>
    <text x="110" y="252" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Discrete</text>
    <rect x="35" y="257" width="18" height="18" fill="white" stroke="#3949AB" stroke-width="1" rx="3"/>
    <circle cx="40" cy="262" r="1.2" fill="#3949AB"/>
    <circle cx="48" cy="270" r="1.2" fill="#3949AB"/>
    <circle cx="44" cy="266" r="1.2" fill="#3949AB"/>
    <circle cx="72" cy="266" r="9" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <text x="72" y="269" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#E65100">H/T</text>
    <text x="140" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">P(X = x)</text>
    <text x="140" y="278" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Countable values</text>

    <!-- Continuous section -->
    <rect x="220" y="238" width="180" height="55" fill="white" fill-opacity="0.6" rx="6" stroke="#E65100" stroke-width="1"/>
    <text x="310" y="252" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Continuous</text>
    <path d="M240 282 Q250 282 260 275 Q270 258 280 255 Q290 258 300 275 Q310 282 320 282" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <line x1="238" y1="282" x2="322" y2="282" stroke="#E65100" stroke-width="0.8"/>
    <text x="280" y="270" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">height, weight</text>
    <text x="360" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">f(x)dx</text>
    <text x="360" y="278" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Any value in [a,b]</text>
  </g>

  <!-- Group 5: Sampling Distribution -->
  <g opacity="0" data-narration="When we repeatedly draw samples and compute their means, those sample means form a sampling distribution. By the Central Limit Theorem, this distribution approaches a normal curve regardless of the population shape.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="310" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Sampling Distribution (Central Limit Theorem)</text>

    <!-- Sample means -->
    <text x="38" y="330" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">X&#x0304;&#x2081;</text>
    <text x="68" y="330" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">X&#x0304;&#x2082;</text>
    <text x="98" y="330" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">X&#x0304;&#x2083;</text>
    <text x="118" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">...</text>

    <!-- Arrow to distribution -->
    <path d="M130 326 L160 340" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Normal curve for sampling distribution -->
    <path d="M165 370 Q185 370 205 360 Q220 348 240 335 Q250 330 260 335 Q280 348 295 360 Q315 370 335 370" fill="#3949AB" fill-opacity="0.12" stroke="#3949AB" stroke-width="2"/>
    <line x1="163" y1="370" x2="337" y2="370" stroke="#3949AB" stroke-width="1"/>
    <!-- Mean line -->
    <line x1="250" y1="328" x2="250" y2="374" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="250" y="383" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">&#x03BC;</text>

    <text x="250" y="345" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Distribution of X&#x0304;</text>
    <text x="365" y="355" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">As n&#x2192;&#x221E;</text>
    <text x="365" y="366" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">&#x2192; Normal</text>
  </g>

  <!-- Group 6: Key Formulas -->
  <g opacity="0" data-narration="Key formulas: The expected value of the sample mean equals the population mean mu. The standard error equals sigma divided by the square root of n. The Central Limit Theorem guarantees normality of the sampling distribution for large n.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="30" y="388" width="360" height="8" fill="#3949AB" fill-opacity="0.08" rx="4"/>
    <text x="50" y="396" font-family="monospace" font-size="9" fill="#3949AB" font-weight="bold">E(X&#x0304;) = &#x03BC;</text>
    <text x="170" y="396" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">SE = &#x03C3;/&#x221A;n</text>
    <text x="300" y="396" font-family="Arial" font-size="8" fill="#C62828" font-weight="bold">CLT: n &#x2265; 30</text>
  </g>
</svg>
