<svg width="420" height="400" data-topic-id="mathematical-expectation">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>

  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="50%" y="20%" width="200%" height="20%" fill="#4FC3F7" rx="10"/>
    <text x="65%" y="35%" font-size="24" font-family="Arial, sans-serif" fill="#fff">Mathematical Expectation</text>
  </section>

  <!-- Definition Section -->
  <section data-narration="Definition">
    <rect x="50%" y="70%" width="200%" height="20%" fill="#C7B8EA" rx="10"/>
    <text x="65%" y="90%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Definition:</text>
    <text x="65%" y="110%" font-size="18" font-family="Arial, sans-serif" fill="#fff">E(X) = ∑xP(X=x)</text>
  </section>

  <!-- Properties Section -->
  <section data-narration="Properties">
    <rect x="50%" y="140%" width="200%" height="20%" fill="#4FC3F7" rx="10"/>
    <text x="65%" y="160%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Properties:</text>
    <text x="65%" y="180%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Linearity: E(aX + b) = aE(X) + b</text>
    <text x="65%" y="200%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Independence: E(X1 \* X2) = E(X1) \* E(X2)</text>
    <text x="65%" y="220%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Normalization: E(1) = 1</text>
  </section>

  <!-- Types of Expectation Section -->
  <section data-narration="Types of Expectation">
    <rect x="50%" y="260%" width="200%" height="20%" fill="#4FC3F7" rx="10"/>
    <text x="65%" y="280%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Types of Expectation:</text>
    <rect x="55%" y="300%" width="90%" height="10%" fill="#C7B8EA" rx="5"/>
    <text x="65%" y="315%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Discrete Expectation</text>
    <rect x="155%" y="300%" width="90%" height="10%" fill="#C7B8EA" rx="5"/>
    <text x="165%" y="315%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Continuous Expectation</text>
  </section>

  <!-- Calculating Mathematical Expectation Section -->
  <section data-narration="Calculating Mathematical Expectation">
    <rect x="50%" y="350%" width="200%" height="20%" fill="#4FC3F7" rx="10"/>
    <text x="65%" y="370%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Calculating Mathematical Expectation:</text>
    <rect x="55%" y="400%" width="90%" height="10%" fill="#C7B8EA" rx="5"/>
    <text x="65%" y="415%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Discrete Expectation</text>
    <text x="55%" y="435%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Example:</text>
    <text x="65%" y="455%" font-size="18" font-family="Arial, sans-serif" fill="#fff">E(X) = 1 \* (1/4) + 2 \* (1/2) + 3 \* (1/4) = 2</text>
  </section>

  <!-- Animation for Expectation Value -->
  <animate xmlns="http://www.w3.org/2000/svg" dur="5s" begin="1s" repeatCount="indefinite">
    <circle cx="200%" cy="70%" r="40%" fill="#4FC3F7" opacity="0.5"/>
    <text x="200%" y="90%" font-size="48" font-family="Arial, sans-serif" fill="#fff">2</text>
  </animate>

  <!-- Footer Section -->
  <footer>
    <rect x="50%" y="380%" width="200%" height="20%" fill="#4FC3F7" rx="10"/>
    <text x="65%" y="400%" font-size="18" font-family="Arial, sans-serif" fill="#fff">Mathematical Expectation</text>
  </footer>
</svg>