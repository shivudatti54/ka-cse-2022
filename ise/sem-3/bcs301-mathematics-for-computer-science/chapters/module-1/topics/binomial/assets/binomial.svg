<svg width="420" height="400" data-topic-id="binomial-distribution" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
            <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Title Section -->
    <rect x="10" y="10" width="400" height="30" fill="none" rx="10" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2"/>
    <text x="10" y="35" font-size="18" font-family="Arial" text-anchor="start" fill="white" style="fill: white; opacity: 0.8">Binomial Distribution</text>

    <!-- Overview Section -->
    <rect x="10" y="75" width="400" height="30" fill="none" rx="10" style="fill: #3A5CD6; stroke: #2F4F7F; stroke-width: 2"/>
    <text x="10" y="100" font-size="14" font-family="Arial" text-anchor="start" fill="white" data-narration="The Binomial distribution is a discrete probability distribution that models the number of successes in a fixed number of independent trials, where each trial has a constant probability of success.">
        <tspan x="10" y="100">This distribution is widely used in computer science to analyze and model random events.</tspan>
    </text>

    <!-- Parameters Section -->
    <rect x="10" y="135" width="400" height="30" fill="none" rx="10" style="fill: #3A5CD6; stroke: #2F4F7F; stroke-width: 2"/>
    <text x="10" y="160" font-size="14" font-family="Arial" text-anchor="start" fill="white" data-narration="A Binomial distribution is a probability distribution that models the number of successes in `n` independent trials, where each trial has a probability of success `p`. The probability of failure is `q = 1 - p`.">
        <tspan x="10" y="160">The probability mass function of the Binomial distribution is given by:</tspan>
        <tspan x="10" y="170">P(X = k) = (nCk) \* (p^k) \* (q^(n-k))</tspan>
    </text>

    <!-- Formula Section -->
    <rect x="10" y="205" width="400" height="30" fill="none" rx="10" style="fill: #3A5CD6; stroke: #2F4F7F; stroke-width: 2"/>
    <text x="10" y="220" font-size="14" font-family="Arial" text-anchor="start" fill="white" data-narration="where `nCk` is the binomial coefficient, which represents the number of ways to choose `k` successes from `n` trials.">
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>

    <!-- Key Concepts Section -->
    <rect x="10" y="255" width="400" height="30" fill="none" rx="10" style="fill: #3A5CD6; stroke: #2F4F7F; stroke-width: 2"/>
    <text x="10" y="270" font-size="14" font-family="Arial" text-anchor="start" fill="white" data-narration="The Binomial distribution has the following key characteristics:">
        <tspan x="10" y="270">- **Independence**: Each trial is independent of the other trials.</tspan>
        <tspan x="10" y="280">- **Constant probability**: The probability of success is constant in each trial.</tspan>
    </text>

    <!-- Examples Section -->
    <rect x="10" y="310" width="400" height="30" fill="none" rx="10" style="fill: #3A5CD6; stroke: #2F4F7F; stroke-width: 2"/>
    <text x="10" y="325" font-size="14" font-family="Arial" text-anchor="start" fill="white" data-narration="Examples of the Binomial distribution include:">
        <tspan x="10" y="325">1. A coin toss: Suppose a fair coin is tossed 5 times.</tspan>
        <tspan x="10" y="335">2. Exam scores: Suppose a student takes an exam with 10 questions, and each question has a probability of 0.7 of being answered correctly.</tspan>
    </text>

    <!-- Applications Section -->
    <rect x="10" y="370" width="400" height="30" fill="none" rx="10" style="fill: #3A5CD6; stroke: #2F4F7F; stroke-width: 2"/>
    <text x="10" y="385" font-size="14" font-family="Arial" text-anchor="start" fill="white" data-narration="The Binomial distribution has applications in computer science, including:">
        <tspan x="10" y="385">- **Random number generation**: The Binomial distribution is used to generate random numbers for simulations, modeling, and analysis.</tspan>
        <tspan x="10" y="395">- **Error-correcting codes**: The Binomial distribution is used to develop error-correcting codes.</tspan>
    </text>

    <!-- Footer Section -->
    <rect x="10" y="425" width="400" height="30" fill="none" rx="10" style="fill: #2F4F7F; stroke: #2F4F7F; stroke-width: 2"/>
    <text x="10" y="440" font-size="14" font-family="Arial" text-anchor="start" fill="white" style="fill: white; opacity: 0.8" data-narration="Learn more about the Binomial distribution and its applications in computer science."></text>

    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
            <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <rect x="0" y="0" width="420" height="400" style="fill: url(#grad)"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,400" begin="0s" dur="4s" repeatCount="indefinite"/>

    <g id="arrow-markers">
        <line x1="10" y1="25" x2="10" y2="375" style="stroke: #2F4F7F; stroke-width: 2; stroke-dasharray: 3,3"/>
        <line x1="120" y1="25" x2="120" y2="375" style="stroke: #2F4F7F; stroke-width: 2; stroke-dasharray: 3,3"/>
        <line x1="230" y1="25" x2="230" y2="375" style="stroke: #2F4F7F; stroke-width: 2; stroke-dasharray: 3,3"/>
        <line x1="340" y1="25" x2="340" y2="375" style="stroke: #2F4F7F; stroke-width: 2; stroke-dasharray: 3,3"/>
    </g>

</svg>