<svg width="420" height="400" data-topic-id="random-variables-discrete-continuous">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7A88D8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        background-color: #F7F7F7;
        margin-bottom: 20px;
        animation: fade-in 1s;
      }
      @keyframes fade-in {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)"/>
  <title>Random Variables: Discrete and Continuous</title>
  <g id="introduction">
    <rect x="20" y="20" width="380" height="30" fill="#F7F7F7"/>
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#333333">Introduction</text>
    <section class="section" data-narration="Introduction">
      <text x="20" y="50" font-size="18" font-family="Arial" fill="#333333">A random variable is a mathematical concept used to model a variable that can take on different values with varying probabilities. Random variables can be either discrete or continuous, and they play a crucial role in probability theory.</text>
    </section>
  </g>
  <g id="discrete-random-variables">
    <rect x="20" y="50" width="380" height="30" fill="#F7F7F7"/>
    <text x="20" y="60" font-size="24" font-family="Arial" fill="#333333">Discrete Random Variables</text>
    <section class="section" data-narration="Discrete Random Variables">
      <text x="20" y="80" font-size="18" font-family="Arial" fill="#333333">A discrete random variable is a variable that can take on a countable number of distinct values. These values are usually represented as integers or other countable numbers.</text>
      <rect x="50" y="100" width="50" height="50" fill="#C9E4CA" rx="10"/>
      <rect x="110" y="100" width="50" height="50" fill="#F7DC6F" rx="10"/>
      <rect x="170" y="100" width="50" height="50" fill="#FF99CC" rx="10"/>
      <text x="50" y="160" font-size="18" font-family="Arial" fill="#333333">Discrete Random Variables have distinct values, such as 0 and 1, or integers.</text>
      <text x="110" y="160" font-size="18" font-family="Arial" fill="#333333">Discrete Random Variables have a limited number of possible values.</text>
      <text x="170" y="160" font-size="18" font-family="Arial" fill="#333333">Discrete Random Variables are often used to model events with a limited number of outcomes.</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="1s"/>
    </section>
  </g>
  <g id="continuous-random-variables">
    <rect x="20" y="150" width="380" height="30" fill="#F7F7F7"/>
    <text x="20" y="160" font-size="24" font-family="Arial" fill="#333333">Continuous Random Variables</text>
    <section class="section" data-narration="Continuous Random Variables">
      <text x="20" y="180" font-size="18" font-family="Arial" fill="#333333">A continuous random variable is a variable that can take on any value within a given interval. These values are usually represented as real numbers.</text>
      <rect x="50" y="200" width="50" height="50" fill="#ADD8E6" rx="10"/>
      <rect x="110" y="200" width="50" height="50" fill="#C6E2B5" rx="10"/>
      <rect x="170" y="200" width="50" height="50" fill="#F2C464" rx="10"/>
      <text x="50" y="250" font-size="18" font-family="Arial" fill="#333333">Continuous Random Variables can take on any value within a given interval, such as a range of numbers.</text>
      <text x="110" y="250" font-size="18" font-family="Arial" fill="#333333">Continuous Random Variables are often used to model events with an infinite number of possible outcomes.</text>
      <text x="170" y="250" font-size="18" font-family="Arial" fill="#333333">Continuous Random Variables have a probability density function (PDF) that describes the likelihood of each value.</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="2s"/>
    </section>
  </g>
  <g id="random-variables-and-their-distributions">
    <rect x="20" y="300" width="380" height="30" fill="#F7F7F7"/>
    <text x="20" y="310" font-size="24" font-family="Arial" fill="#333333">Random Variables and Their Distributions</text>
    <section class="section" data-narration="Discrete Uniform Distribution">
      <text x="20" y="330" font-size="18" font-family="Arial" fill="#333333">Discrete Uniform Distribution</text>
      <rect x="50" y="350" width="50" height="50" fill="#C9E4CA" rx="10"/>
      <rect x="110" y="350" width="50" height="50" fill="#F7DC6F" rx="10"/>
      <rect x="170" y="350" width="50" height="50" fill="#FF99CC" rx="10"/>
      <text x="50" y="400" font-size="18" font-family="Arial" fill="#333333">The Discrete Uniform Distribution is a probability distribution where each value has an equal probability of occurring.</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="3s"/>
    </section>
    <section class="section" data-narration="Discrete Bernoulli Distribution">
      <text x="20" y="430" font-size="18" font-family="Arial" fill="#333333">Discrete Bernoulli Distribution</text>
      <rect x="50" y="460" width="50" height="50" fill="#ADD8E6" rx="10"/>
      <rect x="110" y="460" width="50" height="50" fill="#C6E2B5" rx="10"/>
      <rect x="170" y="460" width="50" height="50" fill="#F2C464" rx="10"/>
      <text x="50" y="510" font-size="18" font-family="Arial" fill="#333333">The Discrete Bernoulli Distribution is a probability distribution that models a single trial with two possible outcomes.</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="4s"/>
    </section>
    <section class="section" data-narration="Continuous Uniform Distribution">
      <text x="20" y="530" font-size="18" font-family="Arial" fill="#333333">Continuous Uniform Distribution</text>
      <rect x="50" y="560" width="50" height="50" fill="#ADD8E6" rx="10"/>
      <rect x="110" y="560" width="50" height="50" fill="#C6E2B5" rx="10"/>
      <rect x="170" y="560" width="50" height="50" fill="#F2C464" rx="10"/>
      <text x="50" y="610" font-size="18" font-family="Arial" fill="#333333">The Continuous Uniform Distribution is a probability distribution where each value within a given interval has an equal probability of occurring.</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="5s"/>
    </section>
    <section class="section" data-narration="Normal Distribution">
      <text x="20" y="630" font-size="18" font-family="Arial" fill="#333333">Normal Distribution</text>
      <rect x="50" y="660" width="50" height="50" fill="#ADD8E6" rx="10"/>
      <rect x="110" y="660" width="50" height="50" fill="#C6E2B5" rx="10"/>
      <rect x="170" y="660" width="50" height="50" fill="#F2C464" rx="10"/>
      <text x="50" y="710" font-size="18" font-family="Arial" fill="#333333">The Normal Distribution is a probability distribution that is symmetric about the mean and has a bell-shaped curve.</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="6s"/>
    </section>
  </g>
  <g id="expected-value-and-variance">
    <rect x="20" y="770" width="380" height="30" fill="#F7F7F7"/>
    <text x="20" y="780" font-size="24" font-family="Arial" fill="#333333">Expected Value and Variance</text>
    <section class="section" data-narration="Expected Value">
      <text x="20" y="810" font-size="18" font-family="Arial" fill="#333333">Expected Value</text>
      <rect x="50" y="840" width="50" height="50" fill="#ADD8E6" rx="10"/>
      <rect x="110" y="840" width="50" height="50" fill="#C6E2B5" rx="10"/>
      <rect x="170" y="840" width="50" height="50" fill="#F2C464" rx="10"/>
      <text x="50" y="890" font-size="18" font-family="Arial" fill="#333333">The expected value (mean) of a random variable is the sum of each possible value multiplied by its probability.</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="7s"/>
    </section>
    <section class="section" data-narration="Variance">
      <text x="20" y="930" font-size="18" font-family="Arial" fill="#333333">Variance</text>
      <rect x="50" y="960" width="50" height="50" fill="#ADD8E6" rx="10"/>
      <rect x="110" y="960" width="50" height="50" fill="#C6E2B5" rx="10"/>
      <rect x="170" y="960" width="50" height="50" fill="#F2C464" rx="10"/>
      <text x="50" y="1000" font-size="18" font-family="Arial" fill="#333333">The variance of a random variable is a measure of its spread or dispersion from the mean.</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="8s"/>
    </section>
  </g>
  <footer>
    <text x="20" y="370" font-size="18" font-family="Arial" fill="#333333">Footer</text>
  </footer>
</svg>