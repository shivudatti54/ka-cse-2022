<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="exponential-distribution">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="pdfGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
    <linearGradient id="cdfGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="The Exponential Distribution is a continuous probability distribution that models the time between independent events occurring at a constant average rate.">
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3949AB">Exponential Distribution</text>
    <line x1="100" y1="38" x2="320" y2="38" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="140" y1="42" x2="280" y2="42" stroke="#E65100" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 2: PDF curve f(x) = lambda*e^(-lambda*x) -->
  <g opacity="0" data-narration="The probability density function is f of x equals lambda times e to the negative lambda x, for x greater than or equal to zero. The curve starts at lambda and decreases exponentially toward zero.">
    <!-- Axes for PDF -->
    <line x1="30" y1="115" x2="200" y2="115" stroke="#333" stroke-width="1.2"/>
    <line x1="30" y1="115" x2="30" y2="52" stroke="#333" stroke-width="1.2"/>
    <text x="33" y="60" font-family="Arial, sans-serif" font-size="8" fill="#333">f(x)</text>
    <text x="190" y="125" font-family="Arial, sans-serif" font-size="8" fill="#333">x</text>
    <!-- Axis ticks -->
    <line x1="72" y1="115" x2="72" y2="118" stroke="#333" stroke-width="0.8"/>
    <text x="72" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">1</text>
    <line x1="114" y1="115" x2="114" y2="118" stroke="#333" stroke-width="0.8"/>
    <text x="114" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">2</text>
    <line x1="156" y1="115" x2="156" y2="118" stroke="#333" stroke-width="0.8"/>
    <text x="156" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">3</text>
    <!-- lambda=1 PDF curve: f(x)=e^(-x), plotted from x=0 to x=4 -->
    <!-- y-axis: 0 to 1 maps to y=115 to y=55 (60px range), x-axis: 0 to 4 maps to x=30 to x=198 (42px per unit) -->
    <polyline points="30,55 32,56.2 34,57.4 36,58.5 38,59.7 40,60.8 44,63 48,65.1 52,67.2 56,69.1 60,71 64,72.9 68,74.7 72,76.4 78,78.9 84,81.2 90,83.4 96,85.4 102,87.3 108,89.1 114,90.8 120,92.3 128,94.2 136,95.9 144,97.4 152,98.8 160,100 168,101.2 176,102.2 184,103.1 192,103.9 198,104.5" fill="none" stroke="#3949AB" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Shaded area under curve -->
    <polyline points="30,55 32,56.2 34,57.4 36,58.5 38,59.7 40,60.8 44,63 48,65.1 52,67.2 56,69.1 60,71 64,72.9 68,74.7 72,76.4 78,78.9 84,81.2 90,83.4 96,85.4 102,87.3 108,89.1 114,90.8 120,92.3 128,94.2 136,95.9 144,97.4 152,98.8 160,100 168,101.2 176,102.2 184,103.1 192,103.9 198,104.5 198,115 30,115" fill="#3949AB" fill-opacity="0.1"/>
    <!-- Label -->
    <text x="30" y="48" font-family="Arial, sans-serif" font-size="7.5" fill="#3949AB" font-weight="bold">PDF (lambda=1)</text>
    <!-- Formula -->
    <rect x="212" y="52" width="190" height="34" rx="6" fill="white" fill-opacity="0.85" stroke="#3949AB" stroke-width="1"/>
    <text x="287" y="66" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#3949AB">f(x) = </text>
    <text x="336" y="66" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#3949AB">&#x03BB;e</text>
    <text x="358" y="58" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">-&#x03BB;x</text>
    <text x="307" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">for x &#x2265; 0, &#x03BB; &gt; 0</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 3: CDF curve F(x) = 1 - e^(-lambda*x) -->
  <g opacity="0" data-narration="The cumulative distribution function is F of x equals 1 minus e to the negative lambda x. It starts at zero and increases, approaching 1 as x goes to infinity.">
    <!-- Axes for CDF -->
    <line x1="30" y1="205" x2="200" y2="205" stroke="#333" stroke-width="1.2"/>
    <line x1="30" y1="205" x2="30" y2="140" stroke="#333" stroke-width="1.2"/>
    <text x="33" y="149" font-family="Arial, sans-serif" font-size="8" fill="#333">F(x)</text>
    <text x="190" y="215" font-family="Arial, sans-serif" font-size="8" fill="#333">x</text>
    <!-- Dashed line at F(x)=1 -->
    <line x1="30" y1="145" x2="198" y2="145" stroke="#999" stroke-width="0.7" stroke-dasharray="4,3"/>
    <text x="23" y="148" text-anchor="end" font-family="Arial, sans-serif" font-size="7" fill="#555">1</text>
    <!-- Axis ticks -->
    <line x1="72" y1="205" x2="72" y2="208" stroke="#333" stroke-width="0.8"/>
    <text x="72" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">1</text>
    <line x1="114" y1="205" x2="114" y2="208" stroke="#333" stroke-width="0.8"/>
    <text x="114" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">2</text>
    <line x1="156" y1="205" x2="156" y2="208" stroke="#333" stroke-width="0.8"/>
    <text x="156" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">3</text>
    <!-- CDF curve: F(x) = 1 - e^(-x), y: 0 to 1 maps to 205 to 145 (60px range) -->
    <polyline points="30,205 32,203.8 34,202.6 36,201.5 38,200.3 40,199.2 44,197 48,194.9 52,192.8 56,190.9 60,189 64,187.1 68,185.3 72,183.6 78,181.1 84,178.8 90,176.6 96,174.6 102,172.7 108,170.9 114,169.2 120,167.7 128,165.8 136,164.1 144,162.6 152,161.2 160,160 168,158.8 176,157.8 184,156.9 192,156.1 198,155.5" fill="none" stroke="#00695C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label -->
    <text x="30" y="137" font-family="Arial, sans-serif" font-size="7.5" fill="#00695C" font-weight="bold">CDF (lambda=1)</text>
    <!-- Formula -->
    <rect x="212" y="140" width="190" height="34" rx="6" fill="white" fill-opacity="0.85" stroke="#00695C" stroke-width="1"/>
    <text x="290" y="155" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#00695C">F(x) = 1 - e</text>
    <text x="358" y="149" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">-&#x03BB;x</text>
    <text x="307" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Approaches 1 as x &#x2192; &#x221E;</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 4: Key parameters with multiple lambda curves -->
  <g opacity="0" data-narration="The mean of the exponential distribution is 1 over lambda, and the variance is 1 over lambda squared. Larger values of lambda produce steeper curves concentrated near zero, while smaller lambda values create flatter, more spread-out curves.">
    <!-- Mini plot showing multiple lambda curves -->
    <line x1="30" y1="290" x2="200" y2="290" stroke="#333" stroke-width="1.2"/>
    <line x1="30" y1="290" x2="30" y2="225" stroke="#333" stroke-width="1.2"/>
    <text x="33" y="233" font-family="Arial, sans-serif" font-size="7.5" fill="#333" font-weight="bold">Multiple &#x03BB; values</text>
    <!-- lambda=0.5 curve (flattest): f(x)=0.5*e^(-0.5x), peak=0.5 -->
    <polyline points="30,275 36,276.1 42,277.2 48,278.2 54,279.1 60,280 66,280.8 72,281.5 80,282.5 88,283.4 96,284.2 108,285.3 120,286.2 136,287.3 152,288.1 168,288.7 184,289.1 198,289.4" fill="none" stroke="#E65100" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <text x="175" y="286" font-family="Arial, sans-serif" font-size="7" fill="#E65100" font-weight="bold">&#x03BB;=0.5</text>
    <!-- lambda=1 curve: f(x)=e^(-x), peak=1 -->
    <polyline points="30,260 34,261.2 38,262.4 42,263.5 48,265.3 54,267 60,268.5 68,270.5 76,272.3 84,273.9 96,276.2 108,278.1 120,279.6 136,281.5 152,283 168,284.1 184,285 198,285.6" fill="none" stroke="#3949AB" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <text x="175" y="281" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">&#x03BB;=1</text>
    <!-- lambda=2 curve (steepest): f(x)=2*e^(-2x), peak=2 -->
    <polyline points="30,230 32,232.4 34,234.7 36,236.9 38,239 40,241.1 44,244.9 48,248.4 52,251.5 56,254.3 60,256.8 66,260.3 72,263.3 80,266.8 88,269.7 96,272.1 108,275.5 120,277.9 136,280.6 152,282.5 168,283.8 184,284.7 198,285.3" fill="none" stroke="#C62828" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <text x="42" y="229" font-family="Arial, sans-serif" font-size="7" fill="#C62828" font-weight="bold">&#x03BB;=2</text>
    <!-- Parameters box -->
    <rect x="212" y="225" width="190" height="68" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
    <text x="307" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Key Parameters</text>
    <line x1="232" y1="247" x2="382" y2="247" stroke="#3949AB" stroke-width="0.5" opacity="0.4"/>
    <text x="307" y="262" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100" font-weight="bold">E[X] = 1/&#x03BB;</text>
    <text x="307" y="280" text-anchor="middle" font-family="monospace" font-size="11" fill="#C62828" font-weight="bold">Var(X) = 1/&#x03BB;&#x00B2;</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 5: Memoryless property -->
  <g opacity="0" data-narration="The exponential distribution has the unique memoryless property. The probability that you wait more than s plus t given that you already waited s, equals the probability of waiting more than t from scratch. Past waiting time does not affect future probability.">
    <!-- Formula box -->
    <rect x="18" y="298" width="243" height="44" rx="6" fill="white" fill-opacity="0.9" stroke="#E65100" stroke-width="1.2"/>
    <text x="139" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#E65100">Memoryless Property</text>
    <text x="139" y="330" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#333" font-weight="bold">P(X&gt;s+t | X&gt;s) = P(X&gt;t)</text>
    <!-- Timeline illustration -->
    <line x1="26" y1="356" x2="252" y2="356" stroke="#333" stroke-width="1.5"/>
    <!-- Arrow marker via triangle -->
    <polygon points="252,353 260,356 252,359" fill="#333"/>
    <!-- s marker -->
    <line x1="100" y1="350" x2="100" y2="362" stroke="#E65100" stroke-width="2"/>
    <text x="100" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100" font-weight="bold">s</text>
    <!-- s+t marker -->
    <line x1="190" y1="350" x2="190" y2="362" stroke="#C62828" stroke-width="2"/>
    <text x="190" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#C62828" font-weight="bold">s+t</text>
    <!-- Bracket for waited s -->
    <line x1="30" y1="348" x2="100" y2="348" stroke="#3949AB" stroke-width="1.2"/>
    <text x="65" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#3949AB">waited s</text>
    <!-- Bracket for t more -->
    <line x1="100" y1="348" x2="190" y2="348" stroke="#00695C" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="145" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#00695C">t more?</text>
    <!-- No memory label -->
    <rect x="38" y="380" width="110" height="16" rx="3" fill="#E65100" fill-opacity="0.12"/>
    <text x="93" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#E65100" font-style="italic">No memory of past!</text>
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="The exponential distribution is widely used to model time between events in a Poisson process, such as customer arrivals, equipment failures, and radioactive decay. It is fundamental in reliability engineering and queuing theory.">
    <rect x="270" y="298" width="138" height="96" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1.2"/>
    <text x="339" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#00695C">Applications</text>
    <line x1="285" y1="318" x2="393" y2="318" stroke="#00695C" stroke-width="0.5" opacity="0.4"/>
    <!-- Bullet items -->
    <circle cx="285" cy="332" r="2" fill="#3949AB"/>
    <text x="292" y="335" font-family="Arial, sans-serif" font-size="8" fill="#333">Time between arrivals</text>
    <circle cx="285" cy="348" r="2" fill="#E65100"/>
    <text x="292" y="351" font-family="Arial, sans-serif" font-size="8" fill="#333">Equipment failures</text>
    <circle cx="285" cy="364" r="2" fill="#C62828"/>
    <text x="292" y="367" font-family="Arial, sans-serif" font-size="8" fill="#333">Poisson process link</text>
    <circle cx="285" cy="380" r="2" fill="#00695C"/>
    <text x="292" y="383" font-family="Arial, sans-serif" font-size="8" fill="#333">Reliability engineering</text>
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
