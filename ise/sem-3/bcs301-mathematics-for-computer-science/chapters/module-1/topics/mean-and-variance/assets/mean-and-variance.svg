<svg width="420" height="400" data-topic-id="mean-and-variance" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A8F4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#3498DB">
    Mean and Variance
  </text>

  <!-- Section 1: Mean -->
  <section data-narration="Mean" x="50%" y="150%" width="80%" height="100">
    <rect fill="#F9F4F7" width="100%" height="20"/>
    <text x="10%" y="25%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2ECC71" stroke="#2ECC71" stroke-width="2">
      Mean
    </text>
    <text x="50%" y="60%" font-size="18" fill="#2ECC71">
      The mean represents the average value of a random variable.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,120" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Formula -->
  <section data-narration="Mean Formula" x="50%" y="200%" width="80%" height="100">
    <rect fill="#F9F4F7" width="100%" height="20"/>
    <text x="10%" y="25%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2ECC71" stroke="#2ECC71" stroke-width="2">
        Formula
      </text>
      <text x="50%" y="60%" font-size="18" fill="#2ECC71">
        E(X) = ∑xP(x)
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,200" to="0,180" begin="1s" dur="1s" repeatCount="indefinite"/>
  </section>

  <!-- Section 3: Example -->
  <section data-narration="Mean Example" x="50%" y="280%" width="80%" height="100">
    <rect fill="#F9F4F7" width="100%" height="20"/>
    <text x="10%" y="25%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2ECC71" stroke="#2ECC71" stroke-width="2">
        Example
      </text>
      <text x="50%" y="60%" font-size="18" fill="#2ECC71">
        Suppose we roll a fair six-sided die.
      </text>
      <text x="50%" y="80%" font-size="18" fill="#2ECC71">
        The possible values of the random variable X are 1, 2, 3, 4, 5, and 6, with equal probabilities of 1/6.
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,280" to="0,260" begin="2s" dur="1s" repeatCount="indefinite"/>
  </section>

  <!-- Section 4: Variance -->
  <section data-narration="Variance" x="50%" y="350%" width="80%" height="100">
    <rect fill="#F9F4F7" width="100%" height="20"/>
    <text x="10%" y="25%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2ECC71" stroke="#2ECC71" stroke-width="2">
      Variance
    </text>
    <text x="50%" y="60%" font-size="18" fill="#2ECC71">
      The variance is a measure of the spread or dispersion of a random variable.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,350" to="0,320" begin="3s" dur="1s" repeatCount="indefinite"/>
  </section>

  <!-- Section 5: Formula Variance -->
  <section data-narration="Variance Formula" x="50%" y="410%" width="80%" height="100">
    <rect fill="#F9F4F7" width="100%" height="20"/>
    <text x="10%" y="25%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2ECC71" stroke="#2ECC71" stroke-width="2">
        Variance Formula
      </text>
      <text x="50%" y="60%" font-size="18" fill="#2ECC71">
        σ^2 = ∑(x - E(X))^2P(x)
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,410" to="0,390" begin="4s" dur="1s" repeatCount="indefinite"/>
  </section>

  <!-- Section 6: Example Variance -->
  <section data-narration="Variance Example" x="50%" y="470%" width="80%" height="100">
    <rect fill="#F9F4F7" width="100%" height="20"/>
    <text x="10%" y="25%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2ECC71" stroke="#2ECC71" stroke-width="2">
        Example Variance
      </text>
      <text x="50%" y="60%" font-size="18" fill="#2ECC71">
        Using the same example as before, we can calculate the variance.
      </text>
      <text x="50%" y="80%" font-size="18" fill="#2ECC71">
        The variance of the random variable X is approximately 2.0833.
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,470" to="0,450" begin="5s" dur="1s" repeatCount="indefinite"/>
  </section>

  <!-- Footer -->
  <text x="50%" y="400%" font-size="18" fill="#2ECC71" text-anchor="middle">
    Created by [Your Name] 
  </text>
</svg>