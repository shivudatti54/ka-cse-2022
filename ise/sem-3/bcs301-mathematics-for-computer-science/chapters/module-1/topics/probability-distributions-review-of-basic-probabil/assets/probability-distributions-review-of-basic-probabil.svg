<svg width="420" height="400" data-topic-id="probability-distributions-review-of-basic-probability-theory" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <style>
    /* Add a gradient background with pastel colors */
    rect {
      fill: #ADD8E6;
    }

    /* Set a professional color scheme */
    text {
      fill: #2F4F7F;
      stroke: #2F4F7F;
    }

    path {
      stroke: #2F4F7F;
      stroke-width: 2;
    }

    /* Add clear labels and annotations */
    .label {
      font-size: 14px;
      font-weight: bold;
      fill: #2F4F7F;
    }

    .annotation {
      font-size: 12px;
      fill: #2F4F7F;
    }
  </style>

  <!-- Title at top -->
  <text x="10" y="20" class="title">Probability Distributions Review</text>

  <!-- Gradient background -->
  <rect x="0" y="40" width="420" height="320" rx="10" fill="radial-gradient(#C9E4CA, #B2FFFC, #ADD8E6)"/>

  <!-- Section 1: Introduction -->
  <rect x="10" y="50" width="400" height="60" rx="10" fill="#ADD8E6" data-narration="Introduction to Probability Theory"/>
  <text x="15" y="70" class="label">Introduction</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <path d="M 15 70 L 30 70 L 30 80 L 15 80 Z" stroke="#2F4F7F" stroke-width="2"/>
  </animate>
  <text x="15" y="100" class="annotation">Probability theory is the mathematical framework used to analyze random events and make predictions based on uncertainty.</text>

  <!-- Section 2: Basic Probability Concepts -->
  <rect x="10" y="170" width="400" height="60" rx="10" fill="#ADD8E6" data-narration="Random Experiment, Sample Space, Event, Probability"/>
  <text x="15" y="190" class="label">Basic Probability Concepts</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="2s" dur="2s" repeatCount="indefinite">
    <path d="M 15 190 L 30 190 L 30 200 L 15 200 Z" stroke="#2F4F7F" stroke-width="2"/>
  </animate>
  <text x="15" y="220" class="annotation">A random experiment is an event that produces a set of possible outcomes, some of which may be favorable or unfavorable.</text>

  <!-- Section 3: Probability Rules -->
  <rect x="10" y="310" width="400" height="60" rx="10" fill="#ADD8E6" data-narration="Complementary Rule, Addition Rule, Multiplication Rule"/>
  <text x="15" y="330" class="label">Probability Rules</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="4s" dur="2s" repeatCount="indefinite">
    <path d="M 15 330 L 30 330 L 30 340 L 15 340 Z" stroke="#2F4F7F" stroke-width="2"/>
  </animate>
  <text x="15" y="360" class="annotation">The probability of an event occurring is equal to 1 minus the probability of the event not occurring.</text>

  <!-- Section 4: Types of Probability Distributions -->
  <rect x="10" y="410" width="400" height="60" rx="10" fill="#ADD8E6" data-narration="Uniform Distribution, Bernoulli Distribution"/>
  <text x="15" y="430" class="label">Types of Probability Distributions</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="6s" dur="2s" repeatCount="indefinite">
    <path d="M 15 430 L 30 430 L 30 440 L 15 440 Z" stroke="#2F4F7F" stroke-width="2"/>
  </animate>
  <text x="15" y="460" class="annotation">A uniform distribution is a discrete probability distribution where each possible outcome has a probability equal to 1 divided by the number of outcomes.</text>

  <!-- Footer -->
  <text x="10" y="430" class="footer">Probability Distributions Review</text>
</svg>