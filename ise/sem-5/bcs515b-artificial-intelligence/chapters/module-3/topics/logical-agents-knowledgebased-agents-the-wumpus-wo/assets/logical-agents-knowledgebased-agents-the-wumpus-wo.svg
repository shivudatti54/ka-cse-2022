<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="logical-agents-kb-the-wumpus-world">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Logical Agents: Knowledge-Based Agents - The Wumpus World</title>
  <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#3498DB">Logical Agents</text>
  <text x="20" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#E74C3C">Knowledge-Based Agents</text>
  <text x="20" y="100" font-size="18" font-family="Arial" text-anchor="start" fill="#2EC4B0">The Wumpus World</text>
  <text x="20" y="140" font-size="18" font-family="Arial" text-anchor="start" fill="#E74C3C">Logic</text>
  <section data-narration="Introduction">
    <rect x="10" y="170" width="400" height="20" fill="#F9F9F9"/>
    <text x="20" y="180" font-size="16" font-family="Arial" text-anchor="start" fill="#333">In the field of Artificial Intelligence (AI), a logical agent is a type of intelligent agent that uses reasoning and inference to solve problems and make decisions.</text>
    <animateTransform attribute-name="transform" type="rotate" from="0 20 20" to="360 20 20" dur="10" begin="0s"/>
  </section>
  <section data-narration="Knowledge-based Agents">
    <rect x="10" y="200" width="400" height="20" fill="#F9F9F9"/>
    <text x="20" y="210" font-size="16" font-family="Arial" text-anchor="start" fill="#333">A knowledge-based agent is an intelligent agent that uses knowledge to reason and make decisions.</text>
    <animateTransform attribute-name="transform" type="translate" from="0 220" to="0 240" dur="10" begin="1s"/>
  </section>
  <section data-narration="The Wumpus World">
    <rect x="10" y="230" width="400" height="20" fill="#F9F9F9"/>
    <text x="20" y="240" font-size="16" font-family="Arial" text-anchor="start" fill="#333">The Wumpus world is a classic problem in artificial intelligence, introduced by Herbert A. Simon in 1969.</text>
    <animateTransform attribute-name="transform" type="translate" from="0 260" to="0 280" dur="10" begin="2s"/>
  </section>
  <section data-narration="Logic">
    <rect x="10" y="290" width="400" height="20" fill="#F9F9F9"/>
    <text x="20" y="300" font-size="16" font-family="Arial" text-anchor="start" fill="#333">Logic is a branch of mathematics that deals with reasoning and inference.</text>
    <animateTransform attribute-name="transform" type="rotate" from="0 320 320" to="360 320 320" dur="10" begin="3s"/>
  </section>
  <footer>
    <text x="20" y="380" font-size="16" font-family="Arial" text-anchor="start" fill="#333">Logical Agents: Knowledge-Based Agents - The Wumpus World</text>
  </footer>
</svg>