<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="uninformed-search-strategies-chapter-3-31">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and heading -->
  <g data-narration="Uninformed Search Strategies, also called blind search, explore the search space without heuristic guidance." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Uninformed Search Strategies</text>
    <text x="210" y="44" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695C">(Blind Search -- No Heuristic Information Used)</text>
  </g>

  <!-- Group 2: Tree structure for BFS/DFS visualization -->
  <g data-narration="A sample tree with root A, children B and C, and grandchildren D, E, and F. This tree is used to demonstrate BFS and DFS traversals." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Edges -->
    <line x1="105" y1="75" x2="65" y2="110" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="105" y1="75" x2="145" y2="110" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="65" y1="130" x2="35" y2="160" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="65" y1="130" x2="95" y2="160" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="145" y1="130" x2="145" y2="160" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Node A -->
    <circle cx="105" cy="72" r="14" fill="#3949AB"/>
    <text x="105" y="76" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">A</text>
    <!-- Node B -->
    <circle cx="65" cy="120" r="14" fill="#00695C"/>
    <text x="65" y="124" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">B</text>
    <!-- Node C -->
    <circle cx="145" cy="120" r="14" fill="#00695C"/>
    <text x="145" y="124" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">C</text>
    <!-- Node D -->
    <circle cx="35" cy="170" r="14" fill="#E65100"/>
    <text x="35" y="174" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">D</text>
    <!-- Node E -->
    <circle cx="95" cy="170" r="14" fill="#E65100"/>
    <text x="95" y="174" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">E</text>
    <!-- Node F -->
    <circle cx="145" cy="170" r="14" fill="#E65100"/>
    <text x="145" y="174" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">F</text>
    <!-- Label -->
    <text x="90" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Sample Search Tree</text>
  </g>

  <!-- Group 3: BFS and DFS traversal orders -->
  <g data-narration="BFS explores level by level: A, B, C, D, E, F using a queue. DFS explores depth-first: A, B, D, E, C, F using a stack." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- BFS Order -->
    <rect x="210" y="58" width="195" height="42" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5"/>
    <text x="218" y="73" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">BFS Order (Queue):</text>
    <text x="218" y="92" font-family="monospace" font-size="11" fill="#00695C">A -> B -> C -> D -> E -> F</text>
    <!-- DFS Order -->
    <rect x="210" y="108" width="195" height="42" fill="white" rx="6" stroke="#E65100" stroke-width="1.5"/>
    <text x="218" y="123" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">DFS Order (Stack):</text>
    <text x="218" y="142" font-family="monospace" font-size="11" fill="#C62828">A -> B -> D -> E -> C -> F</text>
  </g>

  <!-- Group 4: Five strategies listed -->
  <g data-narration="The five uninformed search strategies are: Breadth-First Search, Depth-First Search, Uniform-Cost Search, Depth-Limited Search, and Iterative Deepening Depth-First Search." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="224" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Five Uninformed Search Strategies</text>
    <!-- Strategy boxes -->
    <rect x="12" y="234" width="75" height="32" fill="#3949AB" rx="5"/>
    <text x="49" y="248" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">BFS</text>
    <text x="49" y="260" text-anchor="middle" font-family="Arial" font-size="7" fill="#C5CAE9">Breadth-First</text>

    <rect x="93" y="234" width="75" height="32" fill="#00695C" rx="5"/>
    <text x="130" y="248" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">DFS</text>
    <text x="130" y="260" text-anchor="middle" font-family="Arial" font-size="7" fill="#B2DFDB">Depth-First</text>

    <rect x="174" y="234" width="75" height="32" fill="#E65100" rx="5"/>
    <text x="211" y="248" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">UCS</text>
    <text x="211" y="260" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFE0B2">Uniform-Cost</text>

    <rect x="255" y="234" width="75" height="32" fill="#C62828" rx="5"/>
    <text x="292" y="248" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">DLS</text>
    <text x="292" y="260" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFCDD2">Depth-Limited</text>

    <rect x="336" y="234" width="75" height="32" fill="#3949AB" rx="5"/>
    <text x="373" y="248" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">IDDFS</text>
    <text x="373" y="260" text-anchor="middle" font-family="Arial" font-size="7" fill="#C5CAE9">Iterative Deep.</text>
  </g>

  <!-- Group 5: Complexity comparison table -->
  <g data-narration="Complexity comparison: BFS has time O of b to the d and space O of b to the d. DFS has time O of b to the d and space O of d. UCS has time O of b to the d and space O of b to the d. DLS has time O of b to the l and space O of l. IDDFS has time O of b to the d and space O of d." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="286" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Complexity Comparison</text>
    <!-- Table header -->
    <rect x="30" y="294" width="90" height="18" fill="#3949AB" rx="2"/>
    <text x="75" y="306" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Strategy</text>
    <rect x="120" y="294" width="140" height="18" fill="#3949AB" rx="2"/>
    <text x="190" y="306" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Time Complexity</text>
    <rect x="260" y="294" width="130" height="18" fill="#3949AB" rx="2"/>
    <text x="325" y="306" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Space Complexity</text>
    <!-- Row 1: BFS -->
    <rect x="30" y="312" width="90" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="75" y="323" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">BFS</text>
    <rect x="120" y="312" width="140" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="190" y="323" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(b^d)</text>
    <rect x="260" y="312" width="130" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="325" y="323" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">O(b^d)</text>
    <!-- Row 2: DFS -->
    <rect x="30" y="328" width="90" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="75" y="339" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">DFS</text>
    <rect x="120" y="328" width="140" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="190" y="339" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(b^d)</text>
    <rect x="260" y="328" width="130" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="325" y="339" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(d)</text>
    <!-- Row 3: UCS -->
    <rect x="30" y="344" width="90" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="75" y="355" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">UCS</text>
    <rect x="120" y="344" width="140" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="190" y="355" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(b^d)</text>
    <rect x="260" y="344" width="130" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="325" y="355" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">O(b^d)</text>
    <!-- Row 4: DLS -->
    <rect x="30" y="360" width="90" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="75" y="371" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">DLS</text>
    <rect x="120" y="360" width="140" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="190" y="371" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(b^l)</text>
    <rect x="260" y="360" width="130" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="325" y="371" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(l)</text>
    <!-- Row 5: IDDFS -->
    <rect x="30" y="376" width="90" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="75" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">IDDFS</text>
    <rect x="120" y="376" width="140" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="190" y="387" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(b^d)</text>
    <rect x="260" y="376" width="130" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="325" y="387" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(d)</text>
  </g>

  <!-- Group 6: Key insight and data structures -->
  <g data-narration="Key insight: BFS uses a queue and guarantees shortest path. DFS uses a stack and requires less memory. IDDFS combines the best of both, using DFS memory with BFS completeness." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Data structure labels on the tree side -->
    <rect x="10" y="58" width="185" height="14" fill="none"/>
    <text x="105" y="68" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">BFS = Queue | DFS = Stack</text>
    <!-- Key insight box -->
    <rect x="210" y="158" width="195" height="42" fill="#FFF8E1" rx="6" stroke="#E65100" stroke-width="1"/>
    <text x="218" y="172" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Key Insight:</text>
    <text x="218" y="184" font-family="Arial" font-size="8" fill="#3949AB">IDDFS = Best of BFS + DFS</text>
    <text x="218" y="194" font-family="Arial" font-size="8" fill="#00695C">O(d) space + completeness + optimality</text>
  </g>
</svg>