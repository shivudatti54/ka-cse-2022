<svg width="420" height="400" data-topic-id="intelligent-agents-agents-and-environment-concept">
  <rect x="0" y="0" width="420" height="400" style="fill: #66CCCC;"/>
  <title>Intelligent Agents: Agents and Environment, Concept of Rationality</title>
  <footer>Created by [Your Name]</footer>

  <!-- Section 1: Agents and Environment -->
  <section data-narration="Agents and Environment">
    <rect x="0" y="50" width="400" height="150" style="fill: #ADD8E6;"/>
    <text x="50" y="120" style="font-size: 24px; font-weight: bold;">Agents</text>
    <text x="50" y="150" style="font-size: 18px;">An agent is an entity that perceives its environment and takes actions to achieve its goals.</text>
    <path d="M 200,220 L 250,240 L 300,220 Z" style="stroke: #3498DB; stroke-width: 2; fill: none"/>
    <path d="M 250,220 L 300,240 L 350,220 Z" style="stroke: #E74C3C; stroke-width: 2; fill: none"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" begin="0s"/>
  </section>

  <!-- Section 2: Characteristics of Agents -->
  <section data-narration="Characteristics of Agents">
    <rect x="0" y="220" width="400" height="150" style="fill: #F1C40F;"/>
    <text x="50" y="290" style="font-size: 24px; font-weight: bold;">Autonomy</text>
    <text x="50" y="320" style="font-size: 18px;">The ability to make decisions and act independently.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" begin="0s"/>
    <path d="M 200,220 L 250,240 L 300,220 Z" style="stroke: #3498DB; stroke-width: 2; fill: none"/>
    <path d="M 250,220 L 300,240 L 350,220 Z" style="stroke: #E74C3C; stroke-width: 2; fill: none"/>
  </section>

  <!-- Section 3: Types of Agents -->
  <section data-narration="Types of Agents">
    <rect x="0" y="390" width="400" height="150" style="fill: #2ecc71;"/>
    <text x="50" y="460" style="font-size: 24px; font-weight: bold;">Simple Reflex Agents</text>
    <text x="50" y="490" style="font-size: 18px;">These agents react to the current state of the environment without considering the future consequences.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" begin="0s"/>
    <path d="M 200,220 L 250,240 L 300,220 Z" style="stroke: #3498DB; stroke-width: 2; fill: none"/>
    <path d="M 250,220 L 300,240 L 350,220 Z" style="stroke: #E74C3C; stroke-width: 2; fill: none"/>
  </section>

  <!-- Section 4: Environment -->
  <section data-narration="Environment">
    <rect x="0" y="170" width="400" height="150" style="fill: #8e44ad;"/>
    <text x="50" y="240" style="font-size: 24px; font-weight: bold;">Environment</text>
    <text x="50" y="270" style="font-size: 18px;">The external world that an agent interacts with.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" begin="0s"/>
    <path d="M 200,220 L 250,240 L 300,220 Z" style="stroke: #3498DB; stroke-width: 2; fill: none"/>
    <path d="M 250,220 L 300,240 L 350,220 Z" style="stroke: #E74C3C; stroke-width: 2; fill: none"/>
  </section>

  <!-- Section 5: Interaction between Agents and Environment -->
  <section data-narration="Interaction between Agents and Environment">
    <rect x="0" y="110" width="400" height="150" style="fill: #1abc9c;"/>
    <text x="50" y="180" style="font-size: 24px; font-weight: bold;">Agents interact with the environment through sensors and actuators.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" begin="0s"/>
    <path d="M 200,220 L 250,240 L 300,220 Z" style="stroke: #3498DB; stroke-width: 2; fill: none"/>
    <path d="M 250,220 L 300,240 L 350,220 Z" style="stroke: #E74C3C; stroke-width: 2; fill: none"/>
  </section>

  <!-- Section 6: Example -->
  <section data-narration="Example">
    <rect x="0" y="30" width="400" height="150" style="fill: #f7dc6f;"/>
    <text x="50" y="100" style="font-size: 24px; font-weight: bold;">Self-driving car</text>
    <text x="50" y="130" style="font-size: 18px;">An example of an intelligent agent that interacts with the environment through sensors and actuators.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="10s" begin="0s"/>
    <path d="M 200,220 L 250,240 L 300,220 Z" style="stroke: #3498DB; stroke-width: 2; fill: none"/>
    <path d="M 250,220 L 300,240 L 350,220 Z" style="stroke: #E74C3C; stroke-width: 2; fill: none"/>
  </section>

  <footer>Created by [Your Name]</footer>
</svg>