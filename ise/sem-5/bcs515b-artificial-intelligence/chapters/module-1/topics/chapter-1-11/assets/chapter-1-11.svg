<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="chapter-1-11" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="40" fill="#3498db" rx="10"/>
  <text x="15" y="30" font-size="18" font-family="Arial" fill="#ffffff" data-narration="Chapter 1: Introduction to Artificial Intelligence">
    Artificial Intelligence
  </text>
  
  <!-- Background Gradient -->
  < defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e1e6f2"/>
      <stop offset="50%" stop-color="#6495ed"/>
      <stop offset="100%" stop-color="#e1e6f2"/>
    </linearGradient>
  </defs>
  <rect x="0" y="60" width="420" height="280" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Definition of AI -->
  <section id="definition-of-ai" data-narration="Definition of AI">
    <rect x="10" y="60" width="400" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="80" font-size="16" font-family="Arial" fill="#ffffff">
      Artificial Intelligence is a field of study that focuses on creating intelligent machines that can think and act like humans.
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity">
      <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="0" to="-20" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateY" from="0" to="-20" begin="0s" dur="1s"/>
    </animate>
  </section>
  
  <!-- Section 2: Types of AI -->
  <section id="types-of-ai" data-narration="Types of AI">
    <rect x="10" y="120" width="400" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="140" font-size="16" font-family="Arial" fill="#ffffff">
      There are several types of AI, including Narrow or Weak AI, General or Strong AI, and Superintelligence.
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity">
      <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="0" to="-20" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateY" from="0" to="-20" begin="0s" dur="1s"/>
    </animate>
  </section>
  
  <!-- Section 3: History of AI -->
  <section id="history-of-ai" data-narration="History of AI">
    <rect x="10" y="180" width="400" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="200" font-size="16" font-family="Arial" fill="#ffffff">
      The field of AI has a rich and varied history, with contributions from many researchers and scientists over the years.
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity">
      <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="0" to="-20" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateY" from="0" to="-20" begin="0s" dur="1s"/>
    </animate>
  </section>
  
  <!-- Section 4: Narrow or Weak AI -->
  <section id="narrow-or-weak-ai" data-narration="Narrow or Weak AI">
    <rect x="10" y="240" width="400" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="260" font-size="16" font-family="Arial" fill="#ffffff">
      Narrow or Weak AI is designed to perform a specific task, such as facial recognition or language translation.
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity">
      <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="0" to="-20" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateY" from="0" to="-20" begin="0s" dur="1s"/>
    </animate>
  </section>
  
  <!-- Section 5: General or Strong AI -->
  <section id="general-or-strong-ai" data-narration="General or Strong AI">
    <rect x="10" y="300" width="400" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="320" font-size="16" font-family="Arial" fill="#ffffff">
      General or Strong AI is designed to perform any intellectual task that a human can, and is still a subject of ongoing research and development.
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity">
      <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="0" to="-20" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateY" from="0" to="-20" begin="0s" dur="1s"/>
    </animate>
  </section>
  
  <!-- Section 6: Superintelligence -->
  <section id="superintelligence" data-narration="Superintelligence">
    <rect x="10" y="360" width="400" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="380" font-size="16" font-family="Arial" fill="#ffffff">
      Superintelligence is significantly more intelligent than the best human minds, and is a topic of ongoing debate and speculation.
    </text>
    <animate begin="0s" dur="2s" repeatCount="indefinite" attributeName="opacity">
      <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateX" from="0" to="-20" begin="0s" dur="1s"/>
      <animateTransform attributeName="transform" type="translateY" from="0" to="-20" begin="0s" dur="1s"/>
    </animate>
  </section>
  
  <!-- Footer Section -->
  <rect x="10" y="400" width="400" height="40" fill="#3498db" rx="10"/>
  <text x="15" y="420" font-size="18" font-family="Arial" fill="#ffffff" data-narration="Chapter 1: Introduction to Artificial Intelligence">
    Learn more about Artificial Intelligence
  </text>
</svg>