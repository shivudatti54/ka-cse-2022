<svg width="420" height="400" data-topic-id="classical-planning-definition-of-classical-plannin" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9ec5e5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3498db" text-anchor="start">
      Classical Planning
    </text>
  </g>
  
  <!-- Section 1: Definition of Classical Planning -->
  <g transform="translate(10, 60)">
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" />
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" opacity="0.5"/>
    <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start" data-narration="Classical planning is a type of planning problem that involves finding a sequence of actions to achieve a goal.">
      Definition of Classical Planning
    </text>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" delay="0s" from="0 0" to="0 120" />
  </g>
  
  <!-- Section 2: Key Features of Classical Planning -->
  <g transform="translate(10, 190)">
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" />
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" opacity="0.5"/>
    <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start" data-narration="The problem is represented as a set of states, actions, and goals. The initial state is known, and the goal state is known. The actions are deterministic and have no side effects. The constraints are given by a set of rules, which may involve conditional statements and quantifiers.">
      Key Features of Classical Planning
    </text>
    <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" delay="0s" from="0 0" to="0 240" />
  </g>
  
  <!-- Section 3: Algorithms for Planning as State-Space Search -->
  <g transform="translate(10, 280)">
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" />
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" opacity="0.5"/>
    <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start" data-narration="State-space search is a type of planning algorithm that involves exploring all possible states of the problem and selecting the one that leads to the goal state.">
      Algorithms for Planning as State-Space Search
    </text>
    <animateTransform attributeName="transform" type="translate" begin="4s" dur="2s" delay="0s" from="0 0" to="0 360" />
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g transform="translate(10, 360)">
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" />
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" opacity="0.5"/>
    <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start" data-narration="The state space is the set of all possible states of the problem. The goal test is a function that takes a state as input and returns true if the goal state is achieved, and false otherwise.">
      Key Concepts
    </text>
    <animateTransform attributeName="transform" type="translate" begin="6s" dur="2s" delay="0s" from="0 0" to="0 400" />
  </g>
  
  <!-- Section 5: Breadth-First Search -->
  <g transform="translate(10, 420)">
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" />
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" opacity="0.5"/>
    <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start" data-narration="Breadth-First Search is a state-space search algorithm that explores all nodes at a given depth level before moving on to the next level.">
      Breadth-First Search
    </text>
    <animateTransform attributeName="transform" type="translate" begin="8s" dur="2s" delay="0s" from="0 0" to="0 440" />
  </g>
  
  <!-- Section 6: Depth-First Search -->
  <g transform="translate(10, 480)">
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" />
    <rect x="0" y="0" width="400" height="120" fill="#f9f9f9" rx="10" opacity="0.5"/>
    <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start" data-narration="Depth-First Search is a state-space search algorithm that explores as far as possible along each branch before backtracking.">
      Depth-First Search
    </text>
    <animateTransform attributeName="transform" type="translate" begin="10s" dur="2s" delay="0s" from="0 0" to="0 480" />
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 540)">
    <text x="0" y="520" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      Classical Planning
    </text>
  </g>
</svg>