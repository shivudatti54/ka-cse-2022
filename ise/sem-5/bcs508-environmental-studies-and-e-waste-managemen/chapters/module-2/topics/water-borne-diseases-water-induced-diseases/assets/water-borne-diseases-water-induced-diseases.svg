        <text x="5" y="5" font-size="18" text-anchor="middle" fill="#ffffff">Examples</text>
        <line x1="30" y1="40" x2="30" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
        <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" begin="0.5s" dur="1.5s" from="0 0" to="100 0"/>
        <animate attributeName="opacity" begin="2.5s" dur="2s" from="0" to="1" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" begin="3.5s" dur="1.5s" from="100 0" to="0 0"/>
        <animate attributeName="opacity" begin="5s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
