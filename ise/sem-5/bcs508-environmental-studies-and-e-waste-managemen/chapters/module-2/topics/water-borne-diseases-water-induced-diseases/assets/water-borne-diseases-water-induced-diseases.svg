        <text x="5" y="30" font-size="14" text-anchor="middle" fill="#666666">Causes:</text>
        <text x="5" y="55" font-size="14" text-anchor="middle" fill="#666666">Physical contaminants, chemical exposure, respiratory problems</text>
    </g>
