        <text x="5" y="5" font-size="18" text-anchor="middle" fill="#ffffff">Waterborne Diseases</text>
        <text x="5" y="30" font-size="14" text-anchor="middle" fill="#666666">Causes:</text>
        <text x="5" y="55" font-size="14" text-anchor="middle" fill="#666666">Contaminated water sources, poor water treatment, lack of sanitation, climate change</text>
    </g>
    <g transform="translate(150, 100)">
