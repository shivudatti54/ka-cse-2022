<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="e-resource2">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C62828"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Hydrological Cycle Header -->
  <g data-narration="Water Resources Management covers the systematic planning, development, and distribution of water. The hydrological cycle is the foundation of all water resources." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Water Resources Management</text>
    <text x="210" y="46" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">The Hydrological Cycle</text>
    <!-- Sun -->
    <circle cx="50" cy="70" r="14" fill="#E65100" opacity="0.9"/>
    <text x="50" y="74" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">SUN</text>
    <!-- Solar rays -->
    <line x1="66" y1="70" x2="80" y2="70" stroke="#E65100" stroke-width="1.5"/>
    <line x1="62" y1="58" x2="72" y2="50" stroke="#E65100" stroke-width="1.5"/>
    <line x1="62" y1="82" x2="72" y2="90" stroke="#E65100" stroke-width="1.5"/>
    <!-- Evaporation box -->
    <rect x="90" y="58" width="80" height="26" fill="#3949AB" rx="4"/>
    <text x="130" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Evaporation</text>
    <!-- Transpiration box -->
    <rect x="90" y="92" width="80" height="26" fill="#3949AB" rx="4"/>
    <text x="130" y="109" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Transpiration</text>
    <!-- Condensation box -->
    <rect x="200" y="58" width="80" height="26" fill="#00695C" rx="4"/>
    <text x="240" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Condensation</text>
    <!-- Arrows: Evaporation/Transpiration to Condensation -->
    <line x1="170" y1="71" x2="196" y2="71" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
    <line x1="170" y1="105" x2="190" y2="80" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
    <!-- Cloud -->
    <rect x="310" y="58" width="80" height="26" fill="#00695C" rx="4"/>
    <text x="350" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Clouds</text>
    <!-- Arrow: Condensation to Cloud -->
    <line x1="280" y1="71" x2="306" y2="71" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  </g>

  <!-- Group 2: Precipitation, Runoff, Infiltration, Groundwater -->
  <g data-narration="Precipitation falls as rain or snow. Water then flows as surface runoff to rivers and oceans, or infiltrates into the ground to become groundwater stored in aquifers." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Precipitation box -->
    <rect x="310" y="92" width="80" height="26" fill="#E65100" rx="4"/>
    <text x="350" y="109" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Precipitation</text>
    <!-- Arrow: Cloud to Precipitation -->
    <line x1="350" y1="84" x2="350" y2="88" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <!-- Surface Runoff box -->
    <rect x="200" y="126" width="90" height="26" fill="#E65100" rx="4"/>
    <text x="245" y="143" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Surface Runoff</text>
    <!-- Infiltration box -->
    <rect x="310" y="126" width="80" height="26" fill="#00695C" rx="4"/>
    <text x="350" y="143" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Infiltration</text>
    <!-- Groundwater box -->
    <rect x="310" y="160" width="80" height="26" fill="#3949AB" rx="4"/>
    <text x="350" y="177" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Groundwater</text>
    <!-- Arrow: Precipitation to Runoff -->
    <line x1="330" y1="118" x2="294" y2="124" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <!-- Arrow: Precipitation to Infiltration -->
    <line x1="350" y1="118" x2="350" y2="122" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
    <!-- Arrow: Infiltration to Groundwater -->
    <line x1="350" y1="152" x2="350" y2="156" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
    <!-- Cycle return arrow (dashed) -->
    <path d="M200 139 L130 139 L90 80" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-indigo)"/>
    <text x="130" y="135" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">cycle returns</text>
  </g>

  <!-- Group 3: Types of Water Resources -->
  <g data-narration="The three main types of water resources are surface water such as rivers and lakes, groundwater stored in aquifers, and other sources like rainwater harvesting, recycled wastewater, and desalination." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="208" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Types of Water Resources</text>
    <!-- Surface Water -->
    <rect x="15" y="218" width="120" height="50" fill="#3949AB" rx="6"/>
    <text x="75" y="236" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Surface Water</text>
    <text x="75" y="250" text-anchor="middle" font-family="monospace" font-size="7" fill="#C5CAE9">Rivers, Lakes,</text>
    <text x="75" y="260" text-anchor="middle" font-family="monospace" font-size="7" fill="#C5CAE9">Reservoirs, Wetlands</text>
    <!-- Groundwater -->
    <rect x="150" y="218" width="120" height="50" fill="#00695C" rx="6"/>
    <text x="210" y="236" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Groundwater</text>
    <text x="210" y="250" text-anchor="middle" font-family="monospace" font-size="7" fill="#B2DFDB">Aquifers, Soil Water</text>
    <text x="210" y="260" text-anchor="middle" font-family="monospace" font-size="7" fill="#B2DFDB">Primary rural source</text>
    <!-- Other Sources -->
    <rect x="285" y="218" width="120" height="50" fill="#E65100" rx="6"/>
    <text x="345" y="236" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Other Sources</text>
    <text x="345" y="250" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFE0B2">Rainwater Harvesting</text>
    <text x="345" y="260" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFE0B2">Recycled / Desalination</text>
  </g>

  <!-- Group 4: Water Demand Sectors -->
  <g data-narration="Agriculture consumes about 70 percent of global water use, followed by industrial use at 15 to 20 percent, and domestic or municipal use at 10 to 15 percent. Environmental water needs are often overlooked." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="288" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Water Demand Sectors</text>
    <!-- Agriculture bar -->
    <rect x="30" y="296" width="252" height="16" fill="#3949AB" rx="3"/>
    <text x="156" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Agriculture ~70%</text>
    <!-- Industrial bar -->
    <rect x="30" y="316" width="72" height="16" fill="#E65100" rx="3"/>
    <text x="66" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Industry ~20%</text>
    <!-- Domestic bar -->
    <rect x="106" y="316" width="54" height="16" fill="#00695C" rx="3"/>
    <text x="133" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Domestic ~10%</text>
    <!-- Environmental label -->
    <rect x="164" y="316" width="70" height="16" fill="#C62828" rx="3"/>
    <text x="199" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Environ.</text>
  </g>

  <!-- Group 5: Key Challenges -->
  <g data-narration="Key challenges include water scarcity affecting over 2 billion people, water pollution from industrial and agricultural sources, over-exploitation of groundwater, climate change impacts, transboundary conflicts, and inequitable distribution." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="115" y="350" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Key Challenges</text>
    <!-- Challenge items -->
    <circle cx="25" cy="362" r="3" fill="#C62828"/>
    <text x="32" y="365" font-family="Arial" font-size="8" fill="#333">Water Scarcity (2B+ affected)</text>
    <circle cx="25" cy="376" r="3" fill="#C62828"/>
    <text x="32" y="379" font-family="Arial" font-size="8" fill="#333">Pollution &amp; Groundwater depletion</text>
    <circle cx="25" cy="390" r="3" fill="#C62828"/>
    <text x="32" y="393" font-family="Arial" font-size="8" fill="#333">Climate Change &amp; Conflicts</text>
  </g>

  <!-- Group 6: Management Strategies (IWRM) -->
  <g data-narration="Sustainable management uses Integrated Water Resources Management or IWRM, focusing on social equity, economic efficiency, and environmental sustainability. Strategies include demand management, supply augmentation, pollution control, and policy frameworks." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="325" y="350" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">IWRM Strategies</text>
    <!-- Strategy items -->
    <circle cx="245" cy="362" r="3" fill="#00695C"/>
    <text x="252" y="365" font-family="Arial" font-size="8" fill="#333">Demand Mgmt (drip irrigation)</text>
    <circle cx="245" cy="376" r="3" fill="#00695C"/>
    <text x="252" y="379" font-family="Arial" font-size="8" fill="#333">Supply Mgmt (dams, reuse)</text>
    <circle cx="245" cy="390" r="3" fill="#00695C"/>
    <text x="252" y="393" font-family="Arial" font-size="8" fill="#333">Pollution Control &amp; Policy</text>
  </g>
</svg>