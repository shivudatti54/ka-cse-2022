<svg width="420" height="400" data-topic-id="Self-Study-Component-SSC-Case-Studies-Of-Air-Pollution-Episodes">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d9eff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7f86bf" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" fill="url(#background-gradient)"/>
  
  <g transform="translate(20, 50)">
    <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#3498db" text-anchor="middle">Air Pollution Episodes</text>
    <line x1="50%" y1="50%" x2="50%" y2="100%" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  </g>
  
  <g transform="translate(20, 120)">
    <section data-narration="What is Air Pollution?">
      <rect width="300" height="40" fill="#f9f9f9"/>
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Air pollution is the release of pollutants into the air that can cause harm to human health, wildlife, and the environment.</text>
    </section>
    
    <section data-narration="Types of Air Pollution">
      <rect width="300" height="40" fill="#f9f9f9"/>
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Primary air pollution occurs when a pollutant is released directly into the air from a source such as a factory or vehicle.</text>
      <line x1="50%" y1="50%" x2="50%" y2="60%" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="0" y="60" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Secondary air pollution occurs when a pollutant is formed in the air through chemical reactions between other pollutants.</text>
    </section>
    
    <section data-narration="The Great Smog of London (1952)">
      <rect width="300" height="40" fill="#f9f9f9"/>
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">The Great Smog of London was a severe air pollution episode that occurred in December 1952.</text>
      <line x1="50%" y1="50%" x2="50%" y2="100%" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
      <rect x="50" y="60" width="200" height="40" fill="#f2dede"/>
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Caused by a combination of cold weather, industrial pollution, and wood-burning fires.</text>
      <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Effects: 4,000-12,000 premature deaths.</text>
    </section>
    
    <section data-narration="2015 Nepal Earthquake and Air Pollution">
      <rect width="300" height="40" fill="#f9f9f9"/>
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">A devastating earthquake struck Nepal in 2015, causing widespread destruction and air pollution.</text>
      <line x1="50%" y1="50%" x2="50%" y2="100%" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
      <rect x="50" y="60" width="200" height="40" fill="#f2dede"/>
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Caused by a massive landslide in the Langtang Valley.</text>
      <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Debris burned, releasing large amounts of particulate matter into the air.</text>
    </section>
    
    <section data-narration="Key Concepts">
      <rect width="300" height="40" fill="#f9f9f9"/>
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">Primary and secondary air pollution, causes of air pollution, and effects of air pollution.</text>
    </section>
  </g>
  
  <g transform="translate(20, 380)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="middle">References</text>
  </g>
</svg>