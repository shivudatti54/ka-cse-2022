<svg width="420" height="400" data-topic-id="forest-dese" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A88D8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      margin-bottom: 20px;
    }
    .arrow {
      stroke: #6495ED;
      stroke-width: 2;
      fill: none;
    }
  </style>
  <g fill="url(#gradient)">
    <rect x="10" y="10" width="400" height="380"/>
  </g>
  <g>
    <rect x="10" y="50" width="300" height="50" rx="10" fill="#fff"/>
    <text x="15" y="25" font-size="18" font-family="Arial" fill="#7A88D8" text-anchor="middle">Ecosystem Structure</text>
    <text x="15" y="65" font-size="14" font-family="Arial" fill="#7A88D8" text-anchor="middle">of Forest Ecosystems</text>
  </g>
  <g class="section" data-narration="Producers">
    <rect x="10" y="120" width="300" height="50" rx="10" fill="#fff"/>
    <text x="15" y="125" font-size="18" font-family="Arial" fill="#6495ED" text-anchor="middle">Producers</text>
    <text x="15" y="155" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="middle">Photosynthesis: converting sunlight into energy</text>
    <animateTransform attribute="transform" type="rotate" from="0 220 120" to="180 220 120" dur="5000" begin="1000" repeatCount="indefinite"/>
  </g>
  <g class="section" data-narration="Consumers">
    <rect x="10" y="180" width="300" height="50" rx="10" fill="#fff"/>
    <text x="15" y="185" font-size="18" font-family="Arial" fill="#6495ED" text-anchor="middle">Consumers</text>
    <text x="15" y="215" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="middle">Energy transfer through consumption</text>
    <animateTransform attribute="transform" type="rotate" from="0 220 180" to="180 220 180" dur="5000" begin="1500" repeatCount="indefinite"/>
  </g>
  <g class="section" data-narration="Decomposers">
    <rect x="10" y="240" width="300" height="50" rx="10" fill="#fff"/>
    <text x="15" y="245" font-size="18" font-family="Arial" fill="#6495ED" text-anchor="middle">Decomposers</text>
    <text x="15" y="275" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="middle">Releasing nutrients back into the ecosystem</text>
    <animateTransform attribute="transform" type="rotate" from="0 220 240" to="180 220 240" dur="5000" begin="3000" repeatCount="indefinite"/>
  </g>
  <g class="section" data-narration="Physical Environment">
    <rect x="10" y="300" width="300" height="50" rx="10" fill="#fff"/>
    <text x="15" y="305" font-size="18" font-family="Arial" fill="#6495ED" text-anchor="middle">Physical Environment</text>
    <text x="15" y="335" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="middle">Abiotic factors supporting life</text>
    <animateTransform attribute="transform" type="rotate" from="0 220 300" to="180 220 300" dur="5000" begin="4000" repeatCount="indefinite"/>
  </g>
  <g class="section" data-narration="Biological Components">
    <rect x="10" y="360" width="300" height="50" rx="10" fill="#fff"/>
    <text x="15" y="365" font-size="18" font-family="Arial" fill="#6495ED" text-anchor="middle">Biological Components</text>
    <text x="15" y="395" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="middle">Living organisms interacting</text>
    <animateTransform attribute="transform" type="rotate" from="0 220 360" to="180 220 360" dur="5000" begin="5000" repeatCount="indefinite"/>
  </g>
  <g class="section" data-narration="Energy Flow">
    <rect x="10" y="420" width="300" height="50" rx="10" fill="#fff"/>
    <text x="15" y="425" font-size="18" font-family="Arial" fill="#6495ED" text-anchor="middle">Energy Flow</text>
    <text x="15" y="455" font-size="14" font-family="Arial" fill="#6495ED" text-anchor="middle">Sunlight → Producers → Consumers → Decomposers</text>
    <animateTransform attribute="transform" type="rotate" from="0 220 420" to="180 220 420" dur="5000" begin="6000" repeatCount="indefinite"/>
  </g>
  <g>
    <rect x="10" y="460" width="400" height="40" rx="10" fill="#fff"/>
    <text x="15" y="465" font-size="18" font-family="Arial" fill="#7A88D8" text-anchor="middle">Forest Ecosystems</text>
    <text x="15" y="485" font-size="14" font-family="Arial" fill="#7A88D8" text-anchor="middle">Home to diverse plant and animal species</text>
  </g>
  <g>
    <rect x="10" y="520" width="400" height="40" rx="10" fill="#fff"/>
    <text x="15" y="525" font-size="18" font-family="Arial" fill="#6495ED" text-anchor="middle">Footer</text>
  </g>
</svg>