<svg width="420" height="400" data-topic-id="sustainability-17-sdg-targets-and-possible-actions"
     viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" style="background-color: #4b5154;">

  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial, sans-serif"
        style="color: #fff; opacity: 0.9;" fill="url(#grad)">
    Sustainability: 17 SDG Targets and Possible Actions
  </text>

  <!-- Section 1: SDG 13 - Climate Action -->
  <rect x="20" y="60" width="380" height="100" style="fill: #6495ed; opacity: 0.8;"/>
  <animateTransform attributeName="transform"
                     type="rotate"
                     from="0 390 110"
                     to="360 390 110"
                     dur="6000" repeatCount="indefinite"/>
  <text x="50%" y="80" text-anchor="middle" font-size="16" font-family="Arial, sans-serif"
        style="color: #fff; opacity: 0.9;" data-narration="Target 13.1: Increase the global ambition of climate action in the Paris Agreement">
    Target 13.1: Increase the global ambition of climate action in the Paris Agreement
  </text>
  <animate attributeName="opacity" from="0.8" to="1" begin="0s" dur="1500"/>
  <animate attributeName="opacity" from="1" to="0.8" begin="1500s" dur="1500"/>

  <!-- Section 2: SDG 14 - Life Below Water -->
  <rect x="20" y="170" width="380" height="100" style="fill: #33ccff; opacity: 0.8;"/>
  <animateTransform attributeName="transform"
                     type="rotate"
                     from="0 390 220"
                     to="360 390 220"
                     dur="6000" repeatCount="indefinite"/>
  <text x="50%" y="190" text-anchor="middle" font-size="16" font-family="Arial, sans-serif"
        style="color: #fff; opacity: 0.9;" data-narration="Target 14.1: Explore and protect the ocean's marine ecosystems">
    Target 14.1: Explore and protect the ocean's marine ecosystems
  </text>
  <animate attributeName="opacity" from="0.8" to="1" begin="0s" dur="1500"/>
  <animate attributeName="opacity" from="1" to="0.8" begin="1500s" dur="1500"/>

  <!-- Section 3: SDG 15 - Life on Land -->
  <rect x="20" y="280" width="380" height="100" style="fill: #f7dc6f; opacity: 0.8;"/>
  <animateTransform attributeName="transform"
                     type="rotate"
                     from="0 390 330"
                     to="360 390 330"
                     dur="6000" repeatCount="indefinite"/>
  <text x="50%" y="300" text-anchor="middle" font-size="16" font-family="Arial, sans-serif"
        style="color: #fff; opacity: 0.9;" data-narration="Target 15.1: Protect, restore, and promote sustainable use of land">
    Target 15.1: Protect, restore, and promote sustainable use of land
  </text>
  <animate attributeName="opacity" from="0.8" to="1" begin="0s" dur="1500"/>
  <animate attributeName="opacity" from="1" to="0.8" begin="1500s" dur="1500"/>

  <!-- Section 4: SDG 13 - Climate Action (continued) -->
  <rect x="20" y="380" width="380" height="100" style="fill: #6495ed; opacity: 0.8;"/>
  <animateTransform attributeName="transform"
                     type="rotate"
                     from="0 390 110"
                     to="360 390 110"
                     dur="6000" repeatCount="indefinite"/>
  <text x="50%" y="400" text-anchor="middle" font-size="16" font-family="Arial, sans-serif"
        style="color: #fff; opacity: 0.9;" data-narration="Target 13.2: Reduce greenhouse gas emissions by at least 45% by 2030">
    Target 13.2: Reduce greenhouse gas emissions by at least 45% by 2030
  </text>
  <animate attributeName="opacity" from="0.8" to="1" begin="0s" dur="1500"/>
  <animate attributeName="opacity" from="1" to="0.8" begin="1500s" dur="1500"/>

  <!-- Section 5: SDG 14 - Life Below Water (continued) -->
  <rect x="20" y="480" width="380" height="100" style="fill: #33ccff; opacity: 0.8;"/>
  <animateTransform attributeName="transform"
                     type="rotate"
                     from="0 390 220"
                     to="360 390 220"
                     dur="6000" repeatCount="indefinite"/>
  <text x="50%" y="500" text-anchor="middle" font-size="16" font-family="Arial, sans-serif"
        style="color: #fff; opacity: 0.9;" data-narration="Target 14.2: Prevent and reduce marine pollution">
    Target 14.2: Prevent and reduce marine pollution
  </text>
  <animate attributeName="opacity" from="0.8" to="1" begin="0s" dur="1500"/>
  <animate attributeName="opacity" from="1" to="0.8" begin="1500s" dur="1500"/>

  <!-- Footer -->
  <text x="50%" y="430" text-anchor="middle" font-size="16" font-family="Arial, sans-serif"
        style="color: #fff; opacity: 0.9;" data-narration="Learn more about the 17 SDG targets and possible actions at [link]">
    Learn more
  </text>

  <!-- Arrow markers for connections -->
  <line x1="50%" y1="20" x2="50%" y2="20" style="stroke: #fff; stroke-width: 2;"/>
  <line x1="50%" y1="400" x2="50%" y2="400" style="stroke: #fff; stroke-width: 2;"/>
</svg>