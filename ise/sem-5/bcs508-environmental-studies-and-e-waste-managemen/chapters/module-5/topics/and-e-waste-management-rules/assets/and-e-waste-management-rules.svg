<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="and-e-waste-management-rules">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Waste Hierarchy Header -->
  <g opacity="0" data-narration="Waste Management Strategies and the Waste Hierarchy. The waste hierarchy is the guiding framework that prioritizes actions from most preferred to least preferred.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Waste Management Strategies</text>
    <text x="210" y="46" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">The Waste Hierarchy (Most to Least Preferred)</text>
    <line x1="60" y1="54" x2="360" y2="54" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Waste Hierarchy - 5 tiers as inverted pyramid -->
  <g opacity="0" data-narration="The five tiers of the waste hierarchy are: Reduce or prevention at the top, then Reuse, followed by Recycle, then Recovery including energy recovery, and finally Disposal at the bottom as the least preferred option.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Tier 1: Reduce -->
    <polygon points="110,64 310,64 300,88 120,88" fill="#00695C" opacity="0.95"/>
    <text x="210" y="80" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">1. REDUCE</text>
    <!-- Tier 2: Reuse -->
    <polygon points="120,92 300,92 290,116 130,116" fill="#00897B" opacity="0.9"/>
    <text x="210" y="108" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">2. REUSE</text>
    <!-- Tier 3: Recycle -->
    <polygon points="130,120 290,120 280,144 140,144" fill="#3949AB" opacity="0.9"/>
    <text x="210" y="136" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">3. RECYCLE</text>
    <!-- Tier 4: Recovery -->
    <polygon points="140,148 280,148 270,172 150,172" fill="#E65100" opacity="0.9"/>
    <text x="210" y="164" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">4. RECOVERY</text>
    <!-- Tier 5: Disposal -->
    <polygon points="150,176 270,176 260,200 160,200" fill="#C62828" opacity="0.9"/>
    <text x="210" y="192" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">5. DISPOSAL</text>
    <!-- Arrows on the side -->
    <text x="80" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Most</text>
    <text x="80" y="110" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Preferred</text>
    <line x1="80" y1="115" x2="80" y2="185" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>
    <text x="80" y="198" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Least</text>
  </g>

  <!-- Group 3: Recycling Process Flow -->
  <g opacity="0" data-narration="The recycling process involves four key steps: Collection of waste materials, Sorting to remove contaminants, Processing which includes cleaning shredding and melting, and finally Manufacturing into new products.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="224" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Recycling Process Flow</text>
    <!-- Step boxes -->
    <rect x="16" y="232" width="80" height="34" rx="5" fill="#3949AB"/>
    <text x="56" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Collection</text>
    <text x="56" y="258" text-anchor="middle" font-family="monospace" font-size="7" fill="#C5CAE9">Gather waste</text>
    <line x1="96" y1="249" x2="116" y2="249" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <rect x="118" y="232" width="80" height="34" rx="5" fill="#00695C"/>
    <text x="158" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Sorting</text>
    <text x="158" y="258" text-anchor="middle" font-family="monospace" font-size="7" fill="#B2DFDB">Separate types</text>
    <line x1="198" y1="249" x2="218" y2="249" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <rect x="220" y="232" width="80" height="34" rx="5" fill="#E65100"/>
    <text x="260" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Processing</text>
    <text x="260" y="258" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFE0B2">Clean &amp; shred</text>
    <line x1="300" y1="249" x2="320" y2="249" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <rect x="322" y="232" width="82" height="34" rx="5" fill="#3949AB"/>
    <text x="363" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Manufacturing</text>
    <text x="363" y="258" text-anchor="middle" font-family="monospace" font-size="7" fill="#C5CAE9">New products</text>
  </g>

  <!-- Group 4: Sanitary Landfill Cross-Section -->
  <g opacity="0" data-narration="A sanitary landfill has key components: a final cap on top made of clay and soil, waste cells where municipal solid waste is compacted, a drainage layer of sand and gravel, leachate collection pipes, an impermeable liner system, and gas extraction wells to capture methane.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="120" y="286" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Sanitary Landfill</text>
    <!-- Landfill cross-section -->
    <rect x="20" y="293" width="200" height="16" rx="3" fill="#8D6E63"/>
    <text x="120" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Final Cap (Clay + Soil)</text>
    <rect x="20" y="311" width="200" height="22" rx="3" fill="#795548"/>
    <text x="120" y="325" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Waste Cells (Compacted MSW)</text>
    <rect x="20" y="335" width="200" height="14" rx="3" fill="#A1887F"/>
    <text x="120" y="345" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Drainage Layer (Sand/Gravel)</text>
    <rect x="20" y="351" width="200" height="14" rx="3" fill="#37474F"/>
    <text x="120" y="361" text-anchor="middle" font-family="Arial" font-size="7" fill="white">HDPE Liner (Impermeable)</text>
    <!-- Gas well icon -->
    <line x1="195" y1="293" x2="195" y2="278" stroke="#E65100" stroke-width="2"/>
    <circle cx="195" cy="275" r="4" fill="#E65100"/>
    <text x="195" y="272" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">CH4</text>
    <!-- Leachate pipe -->
    <line x1="45" y1="349" x2="45" y2="375" stroke="#00695C" stroke-width="2"/>
    <text x="45" y="385" text-anchor="middle" font-family="monospace" font-size="6" fill="#00695C">Leachate</text>
  </g>

  <!-- Group 5: WtE and Biological Treatment -->
  <g opacity="0" data-narration="Waste to Energy technologies include incineration at 900 to 1000 degrees Celsius generating electricity, and gasification or pyrolysis. Biological treatment methods include anaerobic digestion which produces biogas and composting which produces soil amendment.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="338" y="286" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Treatment Methods</text>
    <!-- WtE Box -->
    <rect x="250" y="293" width="160" height="32" rx="6" fill="#E65100" opacity="0.9"/>
    <text x="330" y="306" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Waste-to-Energy (WtE)</text>
    <text x="330" y="318" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFE0B2">Incineration 900-1000C</text>
    <!-- Biological Box -->
    <rect x="250" y="329" width="160" height="32" rx="6" fill="#00695C" opacity="0.9"/>
    <text x="330" y="342" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Biological Treatment</text>
    <text x="330" y="354" text-anchor="middle" font-family="monospace" font-size="7" fill="#B2DFDB">Anaerobic Digestion + Biogas</text>
  </g>

  <!-- Group 6: IWM and Policy Footer -->
  <g opacity="0" data-narration="Integrated Waste Management combines all strategies based on local conditions. Key policy tools include Extended Producer Responsibility or EPR, Pay As You Throw schemes, and mandatory waste segregation at source for public participation.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="20" y="370" width="380" height="24" rx="6" fill="#3949AB" opacity="0.15"/>
    <text x="210" y="384" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Integrated Waste Management (IWM): EPR + PAYT + Source Segregation + Circular Economy</text>
  </g>
</svg>