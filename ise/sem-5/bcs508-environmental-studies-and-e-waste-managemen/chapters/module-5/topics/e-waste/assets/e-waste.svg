<svg width="420" height="400" data-topic-id="e-waste" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#333333">E-Waste</text>
  <rect x="10" y="60" width="350" height="50" fill="#F7F7F7" rx="5"/>
  <text x="20" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#333333" data-narration="Definition and Scope">
    Electronic waste refers to the disposal of obsolete, broken, or discarded electronic devices.
  </text>
  <rect x="10" y="120" width="350" height="50" fill="#F7F7F7" rx="5"/>
  <text x="20" y="130" font-size="18" font-family="Arial" text-anchor="start" fill="#333333" data-narration="Causes of E-Waste">
    Obsolescence, improper disposal, and overproduction are the main causes of e-waste.
  </text>
  <rect x="10" y="180" width="350" height="50" fill="#F7F7F7" rx="5"/>
  <text x="20" y="190" font-size="18" font-family="Arial" text-anchor="start" fill="#333333" data-narration="Types of E-Waste">
    E-waste encompasses hardware, software, and batteries.
  </text>
  <rect x="10" y="240" width="350" height="50" fill="#F7F7F7" rx="5"/>
  <text x="20" y="250" font-size="18" font-family="Arial" text-anchor="start" fill="#333333" data-narration="Environmental Impacts of E-Waste">
    E-waste can release toxic chemicals and heavy metals into the air, water, and soil.
  </text>
  <rect x="10" y="300" width="350" height="50" fill="#F7F7F7" rx="5"/>
  <text x="20" y="310" font-size="18" font-family="Arial" text-anchor="start" fill="#333333" data-narration="Consequences of E-Waste">
    E-waste can harm human health, deplete natural resources, and contribute to climate change.
  </text>
  <rect x="10" y="360" width="350" height="50" fill="#F7F7F7" rx="5"/>
  <text x="20" y="370" font-size="18" font-family="Arial" text-anchor="start" fill="#333333" data-narration="E-Waste Management Strategies">
    Recycling, reusing, and proper disposal are essential for reducing e-waste.
  </text>
  <text x="20" y="400" font-size="18" font-family="Arial" text-anchor="start" fill="#333333" data-narration="Learn more about e-waste management strategies and how you can make a difference!">
    <animateTransform attributeName="transform" type="translate" from="0,400" to="0,-20" dur="2s" begin="0s"/>
  </text>
</svg>