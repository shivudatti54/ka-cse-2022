<svg width="420" height="400" data-topic-id="2022-salient-features-and-its-implications">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A5D9F5" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.8" />
  
  <!-- Title at top -->
  <text x="50%" y="20" font-size="24" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
    2022 Salient Features and its Implications
  </text>
  
  <!-- Section 1: Global E-Waste Generation -->
  <section data-narration="Global E-Waste Generation">
    <rect x="0" y="60" width="420" height="80" fill="#C9E4CA" opacity="0.8" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 210 20" to="360 210 20" dur="10s" repeatCount="indefinite" begin="0s" />
    <text x="50%" y="80" font-size="16" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
      Global E-Waste Generation
    </text>
    <text x="50%" y="100" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
      The World Economic Forum (WEF) reported that the global electronic waste (e-waste) generation reached 74 million metric tons in 2022, a 13% increase from 2019.
    </text>
    <text x="50%" y="120" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
      This rapid growth is driven by the increasing global population, urbanization, and the growing demand for electronic devices.
    </text>
  </section>
  
  <!-- Section 2: Extended Producer Responsibility (EPR) Policies -->
  <section data-narration="Extended Producer Responsibility (EPR) Policies">
    <rect x="0" y="150" width="420" height="80" fill="#A5D9F5" opacity="0.8" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 210 30" to="360 210 30" dur="10s" repeatCount="indefinite" begin="0s" />
    <text x="50%" y="80" font-size="16" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
      Extended Producer Responsibility (EPR) Policies
    </text>
    <text x="50%" y="100" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
      Many countries, including the European Union, implemented or strengthened EPR policies in 2022, which hold manufacturers responsible for the waste generated by their products.
    </text>
    <text x="50%" y="120" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
      EPR policies aim to reduce waste, increase recycling rates, and promote sustainable consumption patterns.
    </text>
  </section>
  
  <!-- Section 3: Circular Economy Initiatives -->
  <section data-narration="Circular Economy Initiatives">
    <rect x="0" y="190" width="420" height="80" fill="#C9E4CA" opacity="0.8" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 210 40" to="360 210 40" dur="10s" repeatCount="indefinite" begin="0s" />
    <text x="50%" y="80" font-size="16" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
    Circular Economy Initiatives
  </text>
    <text x="50%" y="100" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
    The United Nations Environment Programme (UNEP) launched the "Circular Economy and Waste" initiative in 2022, aiming to promote sustainable consumption and production patterns.
    </text>
    <text x="50%" y="120" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
    The initiative encourages companies to adopt circular economy practices, such as designing products for recyclability and reusability.
    </text>
  </section>
  
  <!-- Section 4: Electronics Take-Back Programs -->
  <section data-narration="Electronics Take-Back Programs">
    <rect x="0" y="230" width="420" height="80" fill="#A5D9F5" opacity="0.8" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="360 210 50" dur="10s" repeatCount="indefinite" begin="0s" />
    <text x="50%" y="80" font-size="16" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
    Electronics Take-Back Programs
  </text>
    <text x="50%" y="100" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
    Several countries, including the United States and Japan, implemented or expanded electronics take-back programs in 2022.
    </text>
    <text x="50%" y="120" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
    These programs require manufacturers to collect and recycle electronic waste at the end of a product's life cycle.
    </text>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="14" text-anchor="middle" fill="#2F4F7F" font-family="Arial Black">
    Created by [Your Name]
  </text>
</svg>