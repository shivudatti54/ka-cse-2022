<svg width="420" height="400" data-topic-id="pumping-lemma-context-free-languages">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A7D3F4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400"/>

  <!-- Title at top -->
  <text x="50%" y="10%" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" color="#3498db">
    The Pumping Lemma for Context-Free Languages
  </text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10%" y="50%" width="300%" height="150" fill="#f2f2f2" rx="10" />
    <text x="15%" y="70%" text-anchor="start" font-size="18" font-family="Arial, sans-serif" color="#333">
      In the theory of computation, a context-free language is a language that can be generated by a context-free grammar.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="1000" repeatCount="indefinite"/>
    <circle cx="200" cy="200" r="10" fill="#3498db" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  </section>

  <!-- Section 2: Definition of Context-Free Grammar -->
  <section data-narration="Definition of Context-Free Grammar">
    <rect x="10%" y="220%" width="300%" height="150" fill="#f2f2f2" rx="10" />
    <text x="15%" y="240%" text-anchor="start" font-size="18" font-family="Arial, sans-serif" color="#333">
      A context-free grammar is a set of production rules that define the structure of a language.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 270" dur="500" repeatCount="indefinite"/>
    <line x1="150" y1="200" x2="150" y2="230" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  </section>

  <!-- Section 3: Definition of Context-Free Language -->
  <section data-narration="Definition of Context-Free Language">
    <rect x="10%" y="290%" width="300%" height="150" fill="#f2f2f2" rx="10" />
    <text x="15%" y="310%" text-anchor="start" font-size="18" font-family="Arial, sans-serif" color="#333">
      A context-free language is a language that can be generated by a context-free grammar.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 330" to="0 350" dur="500" repeatCount="indefinite"/>
    <line x1="150" y1="300" x2="150" y2="320" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  </section>

  <!-- Section 4: The Pumping Lemma -->
  <section data-narration="The Pumping Lemma">
    <rect x="10%" y="370%" width="300%" height="150" fill="#f2f2f2" rx="10" />
    <text x="15%" y="390%" text-anchor="start" font-size="18" font-family="Arial, sans-serif" color="#333">
      The pumping lemma states that for any context-free language L, there exists a constant p such that:
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 410" to="0 430" dur="500" repeatCount="indefinite"/>
    <line x1="150" y1="400" x2="150" y2="420" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
    <text x="150" y="420" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" color="#333">
      For any string w in L with length at least p, we can divide w into three substrings u, v, and z such that:
    </text>
  </section>

  <!-- Section 5: uz has length at least p -->
  <section data-narration="uz has length at least p">
    <rect x="10%" y="460%" width="300%" height="150" fill="#f2f2f2" rx="10" />
    <text x="15%" y="480%" text-anchor="start" font-size="18" font-family="Arial, sans-serif" color="#333">
      - uz has length at least p
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 510" to="0 530" dur="500" repeatCount="indefinite"/>
    <line x1="150" y1="500" x2="150" y2="520" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  </section>

  <!-- Section 6: v is not empty -->
  <section data-narration="v is not empty">
    <rect x="10%" y="570%" width="300%" height="150" fill="#f2f2f2" rx="10" />
    <text x="15%" y="590%" text-anchor="start" font-size="18" font-family="Arial, sans-serif" color="#333">
      - v is not empty
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 630" to="0 650" dur="500" repeatCount="indefinite"/>
    <line x1="150" y1="620" x2="150" y2="640" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  </section>

  <!-- Section 7: For all i ≥ 0, uzv^iz is in L -->
  <section data-narration="For all i ≥ 0, uzv^iz is in L">
    <rect x="10%" y="690%" width="300%" height="150" fill="#f2f2f2" rx="10" />
    <text x="15%" y="710%" text-anchor="start" font-size="18" font-family="Arial, sans-serif" color="#333">
      - For all i ≥ 0, the string uzv^iz is in L
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 750" to="0 770" dur="500" repeatCount="indefinite"/>
    <line x1="150" y1="700" x2="150" y2="720" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  </section>

  <!-- Footer at bottom -->
  <text x="50%" y="390%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" color="#333">
    Created by [Your Name]
  </text>
</svg>