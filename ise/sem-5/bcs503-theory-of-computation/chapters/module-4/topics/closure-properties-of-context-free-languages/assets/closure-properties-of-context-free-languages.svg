<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="closure-properties-of-context-free-languages">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Central Hub (0.3s) -->
  <g opacity="0" data-narration="Closure properties of regular languages. Regular languages remain regular under several operations.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#3949AB">Closure Properties of Regular Languages</text>
    <!-- Central node -->
    <ellipse cx="210" cy="80" rx="75" ry="28" fill="#3949AB" stroke="#283593" stroke-width="2"/>
    <text x="210" y="76" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Regular</text>
    <text x="210" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#E8EAF6">Languages</text>
  </g>

  <!-- Group 2: Union and Intersection (1.5s) -->
  <g opacity="0" data-narration="Union: If L1 and L2 are regular, then L1 union L2 is also regular. Intersection: If L1 and L2 are regular, then L1 intersect L2 is also regular.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Union box -->
    <rect x="30" y="140" width="120" height="55" fill="#00695C" rx="8" stroke="#004D40" stroke-width="1.5"/>
    <text x="90" y="160" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Union (L1 ∪ L2)</text>
    <text x="90" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#B2DFDB">Result: Regular</text>
    <!-- Arrow from Union to center -->
    <line x1="130" y1="140" x2="180" y2="105" stroke="#00695C" stroke-width="2" marker-end="url(#arrow-teal)"/>

    <!-- Intersection box -->
    <rect x="270" y="140" width="120" height="55" fill="#00695C" rx="8" stroke="#004D40" stroke-width="1.5"/>
    <text x="330" y="160" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Intersect (L1 ∩ L2)</text>
    <text x="330" y="178" text-anchor="middle" font-family="monospace" font-size="9" fill="#B2DFDB">Result: Regular</text>
    <!-- Arrow from Intersection to center -->
    <line x1="290" y1="140" x2="240" y2="105" stroke="#00695C" stroke-width="2" marker-end="url(#arrow-teal)"/>
  </g>

  <!-- Group 3: Complement (3.0s) -->
  <g opacity="0" data-narration="Complement: If L is regular, then the complement of L, denoted L prime, is also regular. This is proved by swapping accept and reject states in the DFA.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="150" y="215" width="120" height="55" fill="#E65100" rx="8" stroke="#BF360C" stroke-width="1.5"/>
    <text x="210" y="235" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Complement (L')</text>
    <text x="210" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFE0B2">Result: Regular</text>
    <!-- Arrow from Complement to center -->
    <line x1="210" y1="215" x2="210" y2="110" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Proof hint -->
    <text x="280" y="240" font-family="Arial" font-size="8" fill="#E65100" font-style="italic">swap accept/reject</text>
  </g>

  <!-- Group 4: Concatenation (4.5s) -->
  <g opacity="0" data-narration="Concatenation: If L1 and L2 are regular, then L1 concatenated with L2 is also regular. For example, if L1 equals a, b and L2 equals c, d, then L1 L2 equals ac, ad, bc, bd.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="20" y="290" width="135" height="55" fill="#3949AB" rx="8" stroke="#283593" stroke-width="1.5"/>
    <text x="87" y="310" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Concatenation (L1L2)</text>
    <text x="87" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">Result: Regular</text>
    <!-- Arrow -->
    <path d="M87,290 Q87,250 170,215" stroke="#3949AB" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- Group 5: Kleene Closure (6.0s) -->
  <g opacity="0" data-narration="Kleene closure: If L is regular, then L star, the Kleene closure, is also regular. L star includes epsilon and all possible concatenations of strings in L.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="265" y="290" width="135" height="55" fill="#C62828" rx="8" stroke="#B71C1C" stroke-width="1.5"/>
    <text x="332" y="310" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Kleene Star (L*)</text>
    <text x="332" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFCDD2">Result: Regular</text>
    <!-- Arrow -->
    <path d="M332,290 Q332,250 250,215" stroke="#C62828" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- Group 6: Summary table (7.5s) -->
  <g opacity="0" data-narration="Summary: All five operations, union, intersection, complement, concatenation, and Kleene star, preserve regularity. Regular languages are closed under all these operations.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Summary bar at bottom -->
    <rect x="30" y="362" width="360" height="28" fill="#283593" rx="6" opacity="0.9"/>
    <text x="210" y="380" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">All 5 operations preserve regularity: ∪  ∩  '  concat  *</text>

    <!-- Checkmarks next to each box -->
    <circle cx="145" cy="167" r="8" fill="#4CAF50"/>
    <text x="145" y="171" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">&#x2713;</text>

    <circle cx="275" cy="167" r="8" fill="#4CAF50"/>
    <text x="275" y="171" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">&#x2713;</text>

    <circle cx="265" cy="242" r="8" fill="#4CAF50"/>
    <text x="265" y="246" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">&#x2713;</text>

    <circle cx="150" cy="317" r="8" fill="#4CAF50"/>
    <text x="150" y="321" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">&#x2713;</text>

    <circle cx="270" cy="317" r="8" fill="#4CAF50"/>
    <text x="270" y="321" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">&#x2713;</text>
  </g>
</svg>