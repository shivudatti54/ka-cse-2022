<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="normal-forms-for-context-free-grammars">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and CFG 4-tuple definition -->
  <g data-narration="A Context-Free Grammar G is formally defined as a 4-tuple: V for non-terminals, T for terminals, P for production rules, and S for the start symbol." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Context-Free Grammar (CFG)</text>
    <rect x="20" y="38" width="380" height="52" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="1.5" rx="6"/>
    <text x="210" y="56" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Formal Definition: G = (V, T, P, S)</text>
    <text x="60" y="78" font-family="monospace" font-size="10" fill="#00695C">V = Non-terminals</text>
    <text x="185" y="78" font-family="monospace" font-size="10" fill="#E65100">T = Terminals</text>
    <text x="295" y="78" font-family="monospace" font-size="10" fill="#C62828">P = Rules</text>
    <text x="365" y="78" font-family="monospace" font-size="10" fill="#3949AB">S = Start</text>
  </g>

  <!-- Group 2: Production rule example with grammar -->
  <g data-narration="Production rules define how non-terminals are rewritten. Here is a classic expression grammar: E produces E plus T or T, T produces T times F or F, and F produces parenthesized E or id." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <rect x="20" y="98" width="185" height="90" fill="white" fill-opacity="0.6" stroke="#00695C" stroke-width="1.5" rx="6"/>
    <text x="112" y="116" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Production Rules (P)</text>
    <text x="35" y="135" font-family="monospace" font-size="11" fill="#3949AB">E</text>
    <text x="50" y="135" font-family="monospace" font-size="11" fill="#333"> -> </text>
    <text x="80" y="135" font-family="monospace" font-size="11" fill="#3949AB">E</text>
    <text x="92" y="135" font-family="monospace" font-size="11" fill="#E65100"> + </text>
    <text x="108" y="135" font-family="monospace" font-size="11" fill="#3949AB">T</text>
    <text x="120" y="135" font-family="monospace" font-size="11" fill="#333"> | </text>
    <text x="135" y="135" font-family="monospace" font-size="11" fill="#3949AB">T</text>
    <text x="35" y="155" font-family="monospace" font-size="11" fill="#3949AB">T</text>
    <text x="50" y="155" font-family="monospace" font-size="11" fill="#333"> -> </text>
    <text x="80" y="155" font-family="monospace" font-size="11" fill="#3949AB">T</text>
    <text x="92" y="155" font-family="monospace" font-size="11" fill="#E65100"> * </text>
    <text x="108" y="155" font-family="monospace" font-size="11" fill="#3949AB">F</text>
    <text x="120" y="155" font-family="monospace" font-size="11" fill="#333"> | </text>
    <text x="135" y="155" font-family="monospace" font-size="11" fill="#3949AB">F</text>
    <text x="35" y="175" font-family="monospace" font-size="11" fill="#3949AB">F</text>
    <text x="50" y="175" font-family="monospace" font-size="11" fill="#333"> -> </text>
    <text x="80" y="175" font-family="monospace" font-size="11" fill="#E65100">(</text>
    <text x="90" y="175" font-family="monospace" font-size="11" fill="#3949AB">E</text>
    <text x="100" y="175" font-family="monospace" font-size="11" fill="#E65100">)</text>
    <text x="112" y="175" font-family="monospace" font-size="11" fill="#333"> | </text>
    <text x="127" y="175" font-family="monospace" font-size="11" fill="#E65100">id</text>
  </g>

  <!-- Group 3: Context-Free meaning explanation -->
  <g data-narration="Context-free means that any non-terminal A can be replaced by its right-hand side alpha regardless of the surrounding symbols. The rule A produces alpha always applies." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="215" y="98" width="185" height="90" fill="white" fill-opacity="0.6" stroke="#E65100" stroke-width="1.5" rx="6"/>
    <text x="307" y="116" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Why "Context-Free"?</text>
    <text x="225" y="137" font-family="Arial" font-size="10" fill="#333">Rule </text>
    <text x="250" y="137" font-family="monospace" font-size="11" font-weight="bold" fill="#3949AB">A -> &#945;</text>
    <text x="300" y="137" font-family="Arial" font-size="10" fill="#333"> applies</text>
    <text x="225" y="155" font-family="Arial" font-size="10" fill="#333">regardless of surrounding</text>
    <text x="225" y="170" font-family="Arial" font-size="10" fill="#333">symbols (no context needed)</text>
    <rect x="240" y="175" width="30" height="6" fill="#C5CAE9" rx="3"/>
    <rect x="275" y="175" width="22" height="6" fill="#C62828" rx="3"/>
    <rect x="302" y="175" width="30" height="6" fill="#C5CAE9" rx="3"/>
    <text x="286" y="173" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">A</text>
  </g>

  <!-- Group 4: Parse Tree for id + id * id -->
  <g data-narration="A parse tree shows the hierarchical structure of a derivation. This tree for id plus id times id shows E decomposes into E plus T, with the multiplication T times F nested under the right T, correctly enforcing operator precedence." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="20" y="196" width="245" height="190" fill="white" fill-opacity="0.6" stroke="#3949AB" stroke-width="1.5" rx="6"/>
    <text x="142" y="214" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Parse Tree: id + id * id</text>

    <!-- Root E -->
    <circle cx="142" cy="235" r="12" fill="#3949AB"/>
    <text x="142" y="239" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">E</text>

    <!-- Left E -->
    <line x1="132" y1="246" x2="72" y2="260" stroke="#3949AB" stroke-width="1.2"/>
    <circle cx="68" cy="270" r="12" fill="#3949AB"/>
    <text x="68" y="274" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">E</text>

    <!-- + -->
    <line x1="142" y1="247" x2="142" y2="260" stroke="#E65100" stroke-width="1.2"/>
    <circle cx="142" cy="270" r="10" fill="#E65100"/>
    <text x="142" y="274" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">+</text>

    <!-- Right T -->
    <line x1="152" y1="246" x2="212" y2="260" stroke="#3949AB" stroke-width="1.2"/>
    <circle cx="216" cy="270" r="12" fill="#3949AB"/>
    <text x="216" y="274" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">T</text>

    <!-- Left E -> T -> F -> id -->
    <line x1="68" y1="282" x2="68" y2="295" stroke="#00695C" stroke-width="1"/>
    <circle cx="68" cy="304" r="10" fill="#00695C"/>
    <text x="68" y="308" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">T</text>
    <line x1="68" y1="314" x2="68" y2="327" stroke="#00695C" stroke-width="1"/>
    <circle cx="68" cy="336" r="10" fill="#00695C"/>
    <text x="68" y="340" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">F</text>
    <line x1="68" y1="346" x2="68" y2="355" stroke="#E65100" stroke-width="1"/>
    <text x="68" y="370" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">id</text>

    <!-- Right T -> T * F -->
    <line x1="206" y1="280" x2="178" y2="295" stroke="#00695C" stroke-width="1"/>
    <circle cx="174" cy="304" r="10" fill="#00695C"/>
    <text x="174" y="308" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">T</text>

    <line x1="216" y1="282" x2="216" y2="295" stroke="#E65100" stroke-width="1"/>
    <circle cx="216" cy="304" r="8" fill="#E65100"/>
    <text x="216" y="308" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">*</text>

    <line x1="226" y1="280" x2="248" y2="295" stroke="#00695C" stroke-width="1"/>
    <circle cx="252" cy="304" r="10" fill="#00695C"/>
    <text x="252" y="308" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">F</text>

    <!-- T -> F -> id (left under T*F) -->
    <line x1="174" y1="314" x2="174" y2="327" stroke="#00695C" stroke-width="1"/>
    <circle cx="174" cy="336" r="10" fill="#00695C"/>
    <text x="174" y="340" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">F</text>
    <line x1="174" y1="346" x2="174" y2="355" stroke="#E65100" stroke-width="1"/>
    <text x="174" y="370" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">id</text>

    <!-- F -> id (right under T*F) -->
    <line x1="252" y1="314" x2="252" y2="327" stroke="#E65100" stroke-width="1"/>
    <text x="252" y="342" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">id</text>
  </g>

  <!-- Group 5: Leftmost vs Rightmost Derivation -->
  <g data-narration="Derivations can be leftmost, where the leftmost non-terminal is always replaced first, used by top-down parsers. Or rightmost, where the rightmost non-terminal is replaced first, used by bottom-up parsers." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="275" y="196" width="125" height="95" fill="white" fill-opacity="0.6" stroke="#00695C" stroke-width="1.5" rx="6"/>
    <text x="337" y="214" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Derivations</text>

    <!-- Leftmost -->
    <rect x="283" y="222" width="110" height="26" fill="#3949AB" fill-opacity="0.15" rx="4"/>
    <text x="338" y="233" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Leftmost (LM)</text>
    <text x="338" y="244" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Top-down (LL) parsers</text>

    <!-- Rightmost -->
    <rect x="283" y="254" width="110" height="26" fill="#E65100" fill-opacity="0.15" rx="4"/>
    <text x="338" y="265" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Rightmost (RM)</text>
    <text x="338" y="276" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">Bottom-up (LR) parsers</text>
  </g>

  <!-- Group 6: Ambiguity warning -->
  <g data-narration="A grammar is ambiguous if it produces more than one parse tree for the same string. Ambiguity is resolved by refactoring the grammar to enforce operator precedence and associativity, or by using parser directives." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="275" y="298" width="125" height="88" fill="white" fill-opacity="0.6" stroke="#C62828" stroke-width="1.5" rx="6"/>
    <text x="337" y="316" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Ambiguity</text>
    <text x="337" y="332" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Same string, multiple</text>
    <text x="337" y="344" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">parse trees = ambiguous</text>

    <text x="285" y="362" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Fix:</text>
    <text x="285" y="374" font-family="Arial" font-size="7.5" fill="#333">1. Refactor grammar (E,T,F)</text>
    <text x="285" y="384" font-family="Arial" font-size="7.5" fill="#333">2. Parser directives</text>
  </g>
</svg>