<svg width="420" height="400" data-topic-id="turing-machine">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Theory of Computation</title>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <text x="15" y="50" font-size="24" fill="#2196F3">Introduction to Turing Machines</text>
  <text x="15" y="150" font-size="18" fill="#C9E4CA" data-narration="A Turing Machine is a mathematical model for computation that consists of a tape, a read/write head, and a set of rules for determining the next state of the machine."/>

  <rect x="80" y="100" width="200" height="50" fill="#C9E4CA" rx="10"/>
  <text x="100" y="110" font-size="18" fill="#2196F3" data-narration="Tape: The tape is the medium on which the machine writes and reads its input. It is divided into cells, each of which can hold a symbol from a finite alphabet."/>
  <text x="100" y="130" font-size="18" fill="#2196F3" data-narration="Head: The head is the read/write head that moves along the tape, reading and writing symbols."/>
  <text x="100" y="150" font-size="18" fill="#2196F3" data-narration="State: The state is the current status of the machine, which determines what action it takes."/>

  <rect x="310" y="100" width="200" height="50" fill="#C9E4CA" rx="10"/>
  <text x="320" y="110" font-size="18" fill="#2196F3" data-narration="Turing Machine Operations: Read, Write, Move, and Examples of Turing Machine Operations."/>
  <text x="320" y="130" font-size="18" fill="#2196F3" data-narration="Advantages: Simplicity, Universality, and Flexibility."/>
  <text x="320" y="150" font-size="18" fill="#2196F3" data-narration="Disadvantages: Complexity and Limited Expressiveness."/>

  <rect x="0" y="300" width="420" height="50" fill="#2196F3" rx="10"/>
  <text x="15" y="310" font-size="18" fill="#C9E4CA">References</text>

  <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2000" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="2000" begin="1000s"/>
  <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2000" begin="2000s"/>

  <line x1="150" y1="200" x2="300" y2="250" stroke="#2196F3" stroke-width="2" arrowhead="clear"/>
  <line x1="150" y1="250" x2="300" y2="300" stroke="#2196F3" stroke-width="2" arrowhead="clear"/>
  <line x1="310" y1="200" x2="380" y2="250" stroke="#2196F3" stroke-width="2" arrowhead="clear"/>
  <line x1="310" y1="250" x2="380" y2="300" stroke="#2196F3" stroke-width="2" arrowhead="clear"/>

</svg>