<svg width="420" height="400" data-topic-id="text-book-sections-81" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a288a" stop-opacity="1" />
      <stop offset="50%" stop-color="#4694c5" stop-opacity="1" />
      <stop offset="100%" stop-color="#f2c464" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Theory of Computation</title>
  <rect x="10" y="10" width="400" height="20" style="fill:#4694c5;stroke:#f2c464;stroke-width:1" />
  <text x="20" y="30" font-size="18" font-family="Arial" style="fill:#f2c464">Theory of Computation</text>
  <rect x="10" y="50" width="400" height="150" style="fill:url(#gradient);stroke:#f2c464;stroke-width:1" />
  <section data-narration="What is Computation?" style="display:none;">
    <rect x="10" y="10" width="380" height="30" style="fill:#f2c464;stroke:#7a288a;stroke-width:1" />
    <text x="20" y="20" font-size="14" font-family="Arial" style="fill:#7a288a">What is Computation?</text>
    <animate transform="translateX(-20px)" begin="0s" duration="2s" repeatCount="indefinite" />
    <text x="20" y="50" font-size="14" font-family="Arial" style="fill:#7a288a">Computation refers to the process of performing a series of operations on data to produce a desired output.</text>
  </section>
  <section data-narration="Types of Computation" style="display:none;">
    <rect x="10" y="170" width="380" height="30" style="fill:#f2c464;stroke:#4694c5;stroke-width:1" />
    <text x="20" y="180" font-size="14" font-family="Arial" style="fill:#4694c5">Types of Computation</text>
    <animate transform="translateX(-20px)" begin="0.5s" duration="2s" repeatCount="indefinite" />
    <text x="20" y="210" font-size="14" font-family="Arial" style="fill:#4694c5">There are two main types of computation: digital and analog.</text>
    <rect x="10" y="240" width="380" height="30" style="fill:#f2c464;stroke:#7a288a;stroke-width:1" />
    <text x="20" y="250" font-size="14" font-family="Arial" style="fill:#7a288a">Digital Computation uses binary digits to represent information.</text>
    <animate transform="translateX(-20px)" begin="1s" duration="2s" repeatCount="indefinite" />
    <text x="20" y="280" font-size="14" font-family="Arial" style="fill:#7a288a">Analog Computation uses continuous variables to represent information.</text>
  </section>
  <section data-narration="Basic Components of a Computer" style="display:none;">
    <rect x="10" y="310" width="380" height="30" style="fill:#f2c464;stroke:#4694c5;stroke-width:1" />
    <text x="20" y="320" font-size="14" font-family="Arial" style="fill:#4694c5">Basic Components of a Computer</text>
    <animate transform="translateX(-20px)" begin="1.5s" duration="2s" repeatCount="indefinite" />
    <text x="20" y="350" font-size="14" font-family="Arial" style="fill:#4694c5">A computer consists of three basic components: input, processing unit, and output.</text>
    <rect x="10" y="380" width="380" height="30" style="fill:#f2c464;stroke:#7a288a;stroke-width:1" />
    <text x="20" y="390" font-size="14" font-family="Arial" style="fill:#7a288a">Input provides the data to be processed.</text>
    <animate transform="translateX(-20px)" begin="2.5s" duration="2s" repeatCount="indefinite" />
    <text x="20" y="420" font-size="14" font-family="Arial" style="fill:#7a288a">Output displays the result of the computation.</text>
  </section>
  <rect x="10" y="10" width="400" height="20" style="fill:#7a288a;stroke:#f2c464;stroke-width:1" />
  <text x="20" y="30" font-size="18" font-family="Arial" style="fill:#f2c464">Footer</text>
  <rect x="10" y="50" width="400" height="150" style="fill:url(#gradient);stroke:#f2c464;stroke-width:1" />
</svg>