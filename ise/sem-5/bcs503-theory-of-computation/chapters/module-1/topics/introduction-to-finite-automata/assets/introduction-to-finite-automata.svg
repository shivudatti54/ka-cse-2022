<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="introduction-to-finite-automata">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Formal Definition -->
  <g opacity="0" data-narration="A Finite Automaton is defined as a 5-tuple: a set of states Q, an input alphabet Sigma, a transition function delta, an initial state q0, and a set of final states F.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Introduction to Finite Automata</text>
    <rect x="20" y="38" width="380" height="42" rx="6" fill="#3949AB" opacity="0.1" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="56" text-anchor="middle" font-family="monospace" font-size="11" fill="#3949AB" font-weight="bold">FA = ( Q, &#x3A3;, &#x3B4;, q0, F )</text>
    <text x="210" y="72" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">States | Alphabet | Transition Fn | Start State | Final States</text>
  </g>

  <!-- Group 2: DFA State Diagram - accepts strings ending with 1 -->
  <g opacity="0" data-narration="This DFA accepts all binary strings ending with 1. State q0 is the initial state. State q1 is the accepting final state shown with a double circle. On input 1, the machine moves to q1. On input 0, it returns to q0.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="102" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">DFA: Accepts strings ending with 1</text>

    <!-- Start arrow -->
    <line x1="50" y1="140" x2="78" y2="140" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="55" y="133" font-family="Arial" font-size="9" fill="#3949AB">start</text>

    <!-- State q0 -->
    <circle cx="110" cy="140" r="24" stroke="#3949AB" stroke-width="2" fill="#E8EAF6"/>
    <text x="110" y="144" text-anchor="middle" font-family="monospace" font-size="13" fill="#3949AB" font-weight="bold">q0</text>

    <!-- State q1 (double circle = final state) -->
    <circle cx="280" cy="140" r="24" stroke="#00695C" stroke-width="2" fill="#E0F2F1"/>
    <circle cx="280" cy="140" r="19" stroke="#00695C" stroke-width="1.5" fill="none"/>
    <text x="280" y="144" text-anchor="middle" font-family="monospace" font-size="13" fill="#00695C" font-weight="bold">q1</text>

    <!-- Transition q0 --1--> q1 (top arc) -->
    <path d="M134,130 C180,105 230,105 256,130" stroke="#3949AB" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="195" y="113" text-anchor="middle" font-family="monospace" font-size="11" fill="#3949AB" font-weight="bold">1</text>

    <!-- Transition q1 --0--> q0 (bottom arc) -->
    <path d="M256,150 C230,175 180,175 134,150" stroke="#E65100" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
    <text x="195" y="182" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100" font-weight="bold">0</text>

    <!-- Self-loop on q0 for 0 -->
    <path d="M96,117 C75,85 145,85 124,117" stroke="#E65100" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
    <text x="110" y="93" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100" font-weight="bold">0</text>

    <!-- Self-loop on q1 for 1 -->
    <path d="M266,117 C245,85 315,85 294,117" stroke="#00695C" stroke-width="1.5" fill="none" marker-end="url(#arrow-teal)"/>
    <text x="280" y="93" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C" font-weight="bold">1</text>

    <!-- Legend -->
    <rect x="325" y="122" width="80" height="36" rx="4" fill="white" opacity="0.7" stroke="#3949AB" stroke-width="0.5"/>
    <circle cx="338" cy="133" r="5" stroke="#3949AB" stroke-width="1.5" fill="#E8EAF6"/>
    <text x="348" y="136" font-family="Arial" font-size="8" fill="#3949AB">= State</text>
    <circle cx="338" cy="149" r="5" stroke="#00695C" stroke-width="1.5" fill="#E0F2F1"/>
    <circle cx="338" cy="149" r="3.5" stroke="#00695C" stroke-width="1" fill="none"/>
    <text x="348" y="152" font-family="Arial" font-size="8" fill="#00695C">= Final State</text>
  </g>

  <!-- Group 3: Formal Transition Table -->
  <g opacity="0" data-narration="The transition table shows how the DFA moves between states. From q0 on input 0, it stays at q0. From q0 on input 1, it goes to q1. From q1 on input 0, it goes back to q0. From q1 on input 1, it stays at q1.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="105" y="210" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Transition Table</text>

    <!-- Table header -->
    <rect x="20" y="215" width="60" height="22" rx="3" fill="#3949AB"/>
    <text x="50" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">&#x3B4;</text>
    <rect x="80" y="215" width="55" height="22" rx="3" fill="#3949AB"/>
    <text x="107" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">0</text>
    <rect x="135" y="215" width="55" height="22" rx="3" fill="#3949AB"/>
    <text x="162" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">1</text>

    <!-- Row q0 -->
    <rect x="20" y="237" width="60" height="20" fill="white" stroke="#C5CAE9" stroke-width="1"/>
    <text x="50" y="251" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB" font-weight="bold">&#x2192;q0</text>
    <rect x="80" y="237" width="55" height="20" fill="white" stroke="#C5CAE9" stroke-width="1"/>
    <text x="107" y="251" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100">q0</text>
    <rect x="135" y="237" width="55" height="20" fill="white" stroke="#C5CAE9" stroke-width="1"/>
    <text x="162" y="251" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">q1</text>

    <!-- Row q1 -->
    <rect x="20" y="257" width="60" height="20" fill="white" stroke="#C5CAE9" stroke-width="1"/>
    <text x="50" y="271" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C" font-weight="bold">*q1</text>
    <rect x="80" y="257" width="55" height="20" fill="white" stroke="#C5CAE9" stroke-width="1"/>
    <text x="107" y="271" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100">q0</text>
    <rect x="135" y="257" width="55" height="20" fill="white" stroke="#C5CAE9" stroke-width="1"/>
    <text x="162" y="271" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">q1</text>

    <text x="50" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">&#x2192; = initial  * = final</text>
  </g>

  <!-- Group 4: DFA vs NFA Comparison -->
  <g opacity="0" data-narration="There are two types of Finite Automata. A DFA or Deterministic Finite Automaton has exactly one next state for each state and input. An NFA or Nondeterministic Finite Automaton can have zero or more next states. Despite this difference, DFA and NFA are equivalent in power.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="320" y="210" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">DFA vs NFA</text>

    <!-- DFA Box -->
    <rect x="222" y="218" width="90" height="78" rx="6" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5"/>
    <text x="267" y="234" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">DFA</text>
    <text x="267" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Exactly 1</text>
    <text x="267" y="258" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">next state</text>
    <line x1="237" y1="264" x2="297" y2="264" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="267" y="277" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Deterministic</text>
    <text x="267" y="289" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">transitions</text>

    <!-- NFA Box -->
    <rect x="320" y="218" width="90" height="78" rx="6" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5"/>
    <text x="365" y="234" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">NFA</text>
    <text x="365" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">0 or more</text>
    <text x="365" y="258" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">next states</text>
    <line x1="335" y1="264" x2="395" y2="264" stroke="#B2DFDB" stroke-width="0.5"/>
    <text x="365" y="277" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Non-deterministic</text>
    <text x="365" y="289" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">transitions</text>

    <!-- Equivalence arrow -->
    <line x1="312" y1="257" x2="320" y2="257" stroke="#E65100" stroke-width="0" />
    <text x="316" y="310" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Equivalent in power!</text>
  </g>

  <!-- Group 5: Components Breakdown -->
  <g opacity="0" data-narration="The five essential components of a Finite Automaton are: Q, the finite set of states; Sigma, the input alphabet; delta, the transition function; q0, the initial start state; and F, the set of final or accepting states.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="335" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Five Components of a Finite Automaton</text>

    <!-- Q -->
    <rect x="15" y="342" width="72" height="28" rx="5" fill="#3949AB"/>
    <text x="51" y="357" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Q</text>
    <text x="51" y="366" text-anchor="middle" font-family="Arial" font-size="7" fill="#C5CAE9">States</text>

    <!-- Sigma -->
    <rect x="93" y="342" width="72" height="28" rx="5" fill="#00695C"/>
    <text x="129" y="357" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">&#x3A3;</text>
    <text x="129" y="366" text-anchor="middle" font-family="Arial" font-size="7" fill="#B2DFDB">Alphabet</text>

    <!-- Delta -->
    <rect x="171" y="342" width="72" height="28" rx="5" fill="#E65100"/>
    <text x="207" y="357" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">&#x3B4;</text>
    <text x="207" y="366" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFE0B2">Transition Fn</text>

    <!-- q0 -->
    <rect x="249" y="342" width="72" height="28" rx="5" fill="#C62828"/>
    <text x="285" y="357" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">q0</text>
    <text x="285" y="366" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFCDD2">Start State</text>

    <!-- F -->
    <rect x="327" y="342" width="72" height="28" rx="5" fill="#3949AB"/>
    <text x="363" y="357" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">F</text>
    <text x="363" y="366" text-anchor="middle" font-family="Arial" font-size="7" fill="#C5CAE9">Final States</text>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="Finite Automata are widely used in computer science applications such as text search and pattern matching, compiler design for lexical analysis, and natural language processing for recognizing language patterns.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">
      <tspan font-weight="bold">Applications:</tspan>
      <tspan fill="#00695C"> Text Search</tspan> |
      <tspan fill="#E65100"> Compiler Design</tspan> |
      <tspan fill="#C62828"> NLP</tspan>
    </text>
  </g>
</svg>