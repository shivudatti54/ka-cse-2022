<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="the-central-concepts-of-automata-theory">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and FA Definition -->
  <g opacity="0" data-narration="Central Concepts of Automata Theory. A Finite Automaton is a mathematical model that recognizes patterns in strings using states, an alphabet, and a transition function.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Central Concepts of Automata Theory</text>
    <rect x="20" y="38" width="380" height="42" rx="6" fill="#3949AB" opacity="0.9"/>
    <text x="210" y="55" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Finite Automaton (FA): A model with States, Alphabet,</text>
    <text x="210" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="white">and Transition Function to recognize string patterns</text>
  </g>

  <!-- Group 2: DFA Section - Transition Diagram -->
  <g opacity="0" data-narration="Deterministic Finite Automaton or DFA. In a DFA, each state and input symbol maps to exactly one next state. Here, state q0 is the start state. On input 0, it stays at q0. On input 1, it moves to the accepting state q1.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="115" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">DFA: Ends with 1</text>
    <!-- Start arrow -->
    <line x1="30" y1="145" x2="52" y2="145" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="28" y="140" font-family="Arial" font-size="8" fill="#3949AB">start</text>
    <!-- State q0 -->
    <circle cx="75" cy="145" r="20" fill="white" stroke="#3949AB" stroke-width="2.5"/>
    <text x="75" y="149" text-anchor="middle" font-family="monospace" font-size="12" fill="#3949AB">q0</text>
    <!-- Self-loop on q0 for input 0 -->
    <path d="M 65 127 C 55 100, 95 100, 85 127" fill="none" stroke="#00695C" stroke-width="1.8" marker-end="url(#arrow-teal)"/>
    <text x="75" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">0</text>
    <!-- Transition q0 to q1 on input 1 -->
    <line x1="96" y1="145" x2="132" y2="145" stroke="#E65100" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
    <text x="114" y="139" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100">1</text>
    <!-- State q1 (accepting - double circle) -->
    <circle cx="155" cy="145" r="20" fill="white" stroke="#3949AB" stroke-width="2.5"/>
    <circle cx="155" cy="145" r="16" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <text x="155" y="149" text-anchor="middle" font-family="monospace" font-size="12" fill="#3949AB">q1</text>
    <!-- Self-loop on q1 for input 1 -->
    <path d="M 145 127 C 135 100, 175 100, 165 127" fill="none" stroke="#E65100" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
    <text x="155" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100">1</text>
    <!-- Transition q1 to q0 on input 0 -->
    <path d="M 138 157 C 125 175, 95 175, 82 157" fill="none" stroke="#00695C" stroke-width="1.8" marker-end="url(#arrow-teal)"/>
    <text x="110" y="180" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">0</text>
    <!-- Label -->
    <text x="115" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB" font-style="italic">One next state per input</text>
  </g>

  <!-- Group 3: NFA Section - Transition Diagram -->
  <g opacity="0" data-narration="Nondeterministic Finite Automaton or NFA. In an NFA, a state and input symbol can lead to multiple possible next states. State q0 on input 1 can go to both q0 and q1, making it nondeterministic. State q1 is the accepting state.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="320" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E65100">NFA: Contains 1</text>
    <!-- Start arrow -->
    <line x1="240" y1="145" x2="262" y2="145" stroke="#E65100" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="238" y="140" font-family="Arial" font-size="8" fill="#E65100">start</text>
    <!-- State q0 -->
    <circle cx="285" cy="145" r="20" fill="white" stroke="#E65100" stroke-width="2.5"/>
    <text x="285" y="149" text-anchor="middle" font-family="monospace" font-size="12" fill="#E65100">q0</text>
    <!-- Self-loop on q0 for input 0,1 -->
    <path d="M 275 127 C 265 100, 305 100, 295 127" fill="none" stroke="#00695C" stroke-width="1.8" marker-end="url(#arrow-teal)"/>
    <text x="285" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">0,1</text>
    <!-- Transition q0 to q1 on input 1 -->
    <line x1="306" y1="145" x2="342" y2="145" stroke="#E65100" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
    <text x="324" y="139" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100">1</text>
    <!-- State q1 (accepting - double circle) -->
    <circle cx="365" cy="145" r="20" fill="white" stroke="#E65100" stroke-width="2.5"/>
    <circle cx="365" cy="145" r="16" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <text x="365" y="149" text-anchor="middle" font-family="monospace" font-size="12" fill="#E65100">q1</text>
    <!-- Label -->
    <text x="320" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#E65100" font-style="italic">Multiple next states possible</text>
  </g>

  <!-- Group 4: Structural Representations -->
  <g opacity="0" data-narration="Structural Representations of Finite Automata. There are two ways to represent an automaton: a Transition Diagram, which is a graph with states as nodes and transitions as edges; and a Transition Table, which is a tabular form with rows for states and columns for input symbols.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="225" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#00695C">Structural Representations</text>
    <!-- Transition Diagram box -->
    <rect x="25" y="235" width="175" height="55" rx="6" fill="white" stroke="#00695C" stroke-width="1.5" opacity="0.9"/>
    <text x="112" y="252" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Transition Diagram</text>
    <text x="112" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">States = Nodes (circles)</text>
    <text x="112" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Transitions = Edges (arrows)</text>
    <!-- Transition Table box -->
    <rect x="220" y="235" width="175" height="55" rx="6" fill="white" stroke="#00695C" stroke-width="1.5" opacity="0.9"/>
    <text x="307" y="252" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Transition Table</text>
    <text x="307" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Rows = States</text>
    <text x="307" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Columns = Input Symbols</text>
  </g>

  <!-- Group 5: DFA vs NFA Comparison Table -->
  <g opacity="0" data-narration="Comparison of DFA and NFA. A DFA is deterministic with exactly one next state per input, while an NFA is nondeterministic with multiple possible next states. NFAs are more expressive but both recognize the same class of regular languages.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="310" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#C62828">DFA vs NFA Comparison</text>
    <!-- Table header -->
    <rect x="45" y="316" width="110" height="20" rx="3" fill="#C62828"/>
    <text x="100" y="330" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Property</text>
    <rect x="155" y="316" width="110" height="20" rx="3" fill="#3949AB"/>
    <text x="210" y="330" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">DFA</text>
    <rect x="265" y="316" width="110" height="20" rx="3" fill="#E65100"/>
    <text x="320" y="330" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">NFA</text>
    <!-- Row 1 -->
    <rect x="45" y="336" width="110" height="18" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="100" y="349" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Determinism</text>
    <rect x="155" y="336" width="110" height="18" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="210" y="349" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">Yes</text>
    <rect x="265" y="336" width="110" height="18" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="320" y="349" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">No</text>
    <!-- Row 2 -->
    <rect x="45" y="354" width="110" height="18" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
    <text x="100" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Next States</text>
    <rect x="155" y="354" width="110" height="18" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
    <text x="210" y="367" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">Exactly 1</text>
    <rect x="265" y="354" width="110" height="18" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
    <text x="320" y="367" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">Multiple</text>
    <!-- Row 3 -->
    <rect x="45" y="372" width="110" height="18" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="100" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Power</text>
    <rect x="155" y="372" width="110" height="18" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="210" y="385" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">Limited</text>
    <rect x="265" y="372" width="110" height="18" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="320" y="385" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">More powerful</text>
  </g>

  <!-- Group 6: Key Formula / Formal Definition -->
  <g opacity="0" data-narration="Formal definition of a Finite Automaton. An FA is defined as a 5-tuple: Q is the finite set of states, Sigma is the input alphabet, delta is the transition function, q0 is the start state, and F is the set of accepting states.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="55" y="86" width="5" height="5" rx="1" fill="#3949AB" opacity="0"/>
    <text x="210" y="397" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">FA = (Q, Sigma, delta, q0, F) where Q=States, Sigma=Alphabet, delta=Transition Fn, F=Accept States</text>
  </g>
</svg>