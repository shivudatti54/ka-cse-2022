<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="automata-and-complexity">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title and Header -->
  <g opacity="0" data-narration="Automata and Complexity: understanding finite automata, their types, and how they relate to computational complexity.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Automata and Complexity</text>
    <text x="210" y="40" text-anchor="middle" font-family="Arial" font-size="9" fill="#5C6BC0">Finite Automata: Abstract machines with finite states that recognize patterns in input strings</text>
  </g>

  <!-- Group 2: DFA Section - Deterministic Finite Automaton -->
  <g opacity="0" data-narration="A Deterministic Finite Automaton, or DFA, can be in only one state at a time. Here we see a DFA that accepts all binary strings ending with 1. State q0 is the start state and q1 is the accepting state, shown with a double circle.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- DFA Label -->
    <rect x="15" y="50" width="190" height="18" rx="4" fill="#3949AB"/>
    <text x="110" y="63" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">DFA (Deterministic)</text>

    <!-- Start arrow -->
    <line x1="28" y1="100" x2="50" y2="100" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <text x="26" y="94" font-family="Arial" font-size="7" fill="#3949AB">start</text>

    <!-- State q0 -->
    <circle cx="72" cy="100" r="16" fill="none" stroke="#3949AB" stroke-width="2"/>
    <text x="72" y="104" text-anchor="middle" font-family="monospace" font-size="11" fill="#3949AB">q0</text>

    <!-- Transition q0 --0--> q0 (self-loop top) -->
    <path d="M61,87 C55,62 89,62 83,87" fill="none" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <text x="72" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">0</text>

    <!-- Transition q0 --1--> q1 -->
    <line x1="88" y1="100" x2="130" y2="100" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <text x="109" y="94" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">1</text>

    <!-- State q1 (accepting - double circle) -->
    <circle cx="150" cy="100" r="16" fill="none" stroke="#3949AB" stroke-width="2"/>
    <circle cx="150" cy="100" r="12" fill="none" stroke="#3949AB" stroke-width="1.5"/>
    <text x="150" y="104" text-anchor="middle" font-family="monospace" font-size="11" fill="#3949AB">q1</text>

    <!-- Transition q1 --1--> q1 (self-loop top) -->
    <path d="M139,87 C133,62 167,62 161,87" fill="none" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <text x="150" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">1</text>

    <!-- Transition q1 --0--> q0 (curved below) -->
    <path d="M137,113 C125,132 97,132 83,113" fill="none" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <text x="110" y="138" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">0</text>

    <!-- DFA formal definition -->
    <text x="15" y="155" font-family="monospace" font-size="7.5" fill="#3949AB">M = (Q, Sigma, delta, q0, F)</text>
    <text x="15" y="165" font-family="monospace" font-size="7.5" fill="#5C6BC0">Q={q0,q1}  Sigma={0,1}  F={q1}</text>
  </g>

  <!-- Group 3: NFA Section - Nondeterministic Finite Automaton -->
  <g opacity="0" data-narration="A Nondeterministic Finite Automaton, or NFA, can be in multiple states simultaneously. This NFA accepts strings containing the symbol 1. From state q0 it can stay in q0 on any input and also transition to accepting state q1 on input 1.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- NFA Label -->
    <rect x="215" y="50" width="190" height="18" rx="4" fill="#00695C"/>
    <text x="310" y="63" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">NFA (Nondeterministic)</text>

    <!-- Start arrow -->
    <line x1="230" y1="100" x2="250" y2="100" stroke="#00695C" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <text x="228" y="94" font-family="Arial" font-size="7" fill="#00695C">start</text>

    <!-- State q0 -->
    <circle cx="272" cy="100" r="16" fill="none" stroke="#00695C" stroke-width="2"/>
    <text x="272" y="104" text-anchor="middle" font-family="monospace" font-size="11" fill="#00695C">q0</text>

    <!-- Transition q0 --0,1--> q0 (self-loop top) -->
    <path d="M261,87 C255,62 289,62 283,87" fill="none" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="272" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">0,1</text>

    <!-- Transition q0 --1--> q1 -->
    <line x1="288" y1="100" x2="332" y2="100" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="310" y="94" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">1</text>

    <!-- State q1 (accepting - double circle) -->
    <circle cx="352" cy="100" r="16" fill="none" stroke="#00695C" stroke-width="2"/>
    <circle cx="352" cy="100" r="12" fill="none" stroke="#00695C" stroke-width="1.5"/>
    <text x="352" y="104" text-anchor="middle" font-family="monospace" font-size="11" fill="#00695C">q1</text>

    <!-- NFA note -->
    <text x="215" y="132" font-family="Arial" font-size="7.5" fill="#00695C" font-style="italic">Multiple transitions possible per input</text>

    <!-- NFA formal definition -->
    <text x="215" y="155" font-family="monospace" font-size="7.5" fill="#00695C">M = (Q, Sigma, delta, q0, F)</text>
    <text x="215" y="165" font-family="monospace" font-size="7.5" fill="#00897B">delta: Q x Sigma -&gt; P(Q)</text>
  </g>

  <!-- Group 4: Structural Representations -->
  <g opacity="0" data-narration="Finite automata can be represented in three main ways. A Transition Diagram uses circles for states and arrows for transitions. A Transition Table lists all state changes in tabular format. A State Diagram shows the current state and possible next states.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="15" y="178" width="390" height="18" rx="4" fill="#E65100"/>
    <text x="210" y="191" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Structural Representations</text>

    <!-- Transition Diagram box -->
    <rect x="15" y="202" width="120" height="55" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <text x="75" y="215" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">Transition Diagram</text>
    <!-- Mini diagram -->
    <circle cx="42" cy="238" r="8" fill="none" stroke="#E65100" stroke-width="1"/>
    <text x="42" y="241" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">q0</text>
    <circle cx="108" cy="238" r="8" fill="none" stroke="#E65100" stroke-width="1"/>
    <text x="108" y="241" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">q1</text>
    <line x1="50" y1="238" x2="98" y2="238" stroke="#E65100" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <text x="75" y="233" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">a</text>

    <!-- Transition Table box -->
    <rect x="150" y="202" width="120" height="55" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <text x="210" y="215" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">Transition Table</text>
    <!-- Mini table header -->
    <line x1="162" y1="221" x2="258" y2="221" stroke="#E65100" stroke-width="0.5"/>
    <text x="174" y="230" font-family="monospace" font-size="7" fill="#E65100">delta</text>
    <text x="214" y="230" font-family="monospace" font-size="7" fill="#E65100">0</text>
    <text x="244" y="230" font-family="monospace" font-size="7" fill="#E65100">1</text>
    <line x1="162" y1="233" x2="258" y2="233" stroke="#E65100" stroke-width="0.5"/>
    <text x="174" y="243" font-family="monospace" font-size="7" fill="#E65100">q0</text>
    <text x="214" y="243" font-family="monospace" font-size="7" fill="#E65100">q0</text>
    <text x="244" y="243" font-family="monospace" font-size="7" fill="#E65100">q1</text>
    <text x="174" y="253" font-family="monospace" font-size="7" fill="#E65100">q1</text>
    <text x="214" y="253" font-family="monospace" font-size="7" fill="#E65100">q0</text>
    <text x="244" y="253" font-family="monospace" font-size="7" fill="#E65100">q1</text>

    <!-- State Diagram box -->
    <rect x="285" y="202" width="120" height="55" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <text x="345" y="215" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">State Diagram</text>
    <!-- Mini state diagram -->
    <rect x="300" y="226" width="35" height="14" rx="3" fill="#E65100" opacity="0.2" stroke="#E65100" stroke-width="0.5"/>
    <text x="317" y="236" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">curr</text>
    <rect x="355" y="226" width="35" height="14" rx="3" fill="#E65100" opacity="0.4" stroke="#E65100" stroke-width="0.5"/>
    <text x="372" y="236" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">next</text>
    <line x1="335" y1="233" x2="353" y2="233" stroke="#E65100" stroke-width="1" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- Group 5: DFA vs NFA Comparison Table -->
  <g opacity="0" data-narration="Comparing DFA and NFA: A DFA has exactly one transition per symbol per state, while an NFA can have zero, one, or many transitions. DFA is easier to implement directly, while NFA provides a more compact representation. Both recognize the same class of regular languages.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="15" y="268" width="390" height="18" rx="4" fill="#C62828"/>
    <text x="210" y="281" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">DFA vs NFA Comparison</text>

    <!-- Table header -->
    <text x="30" y="302" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Feature</text>
    <text x="165" y="302" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">DFA</text>
    <text x="315" y="302" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">NFA</text>
    <line x1="20" y1="306" x2="400" y2="306" stroke="#C62828" stroke-width="0.5"/>

    <!-- Row 1 -->
    <text x="30" y="318" font-family="Arial" font-size="8" fill="#424242">Transitions per symbol</text>
    <text x="165" y="318" font-family="Arial" font-size="8" fill="#3949AB">Exactly one</text>
    <text x="315" y="318" font-family="Arial" font-size="8" fill="#00695C">Zero or more</text>

    <!-- Row 2 -->
    <text x="30" y="330" font-family="Arial" font-size="8" fill="#424242">Active states</text>
    <text x="165" y="330" font-family="Arial" font-size="8" fill="#3949AB">Single state</text>
    <text x="315" y="330" font-family="Arial" font-size="8" fill="#00695C">Multiple states</text>

    <!-- Row 3 -->
    <text x="30" y="342" font-family="Arial" font-size="8" fill="#424242">Transition function</text>
    <text x="165" y="342" font-family="monospace" font-size="7" fill="#3949AB">Q x Sigma -&gt; Q</text>
    <text x="315" y="342" font-family="monospace" font-size="7" fill="#00695C">Q x Sigma -&gt; P(Q)</text>

    <!-- Row 4 -->
    <text x="30" y="354" font-family="Arial" font-size="8" fill="#424242">Implementation</text>
    <text x="165" y="354" font-family="Arial" font-size="8" fill="#3949AB">Direct, efficient</text>
    <text x="315" y="354" font-family="Arial" font-size="8" fill="#00695C">Needs subset construction</text>
  </g>

  <!-- Group 6: Key Insight - Equivalence -->
  <g opacity="0" data-narration="The key insight is that DFA and NFA are equivalent in recognition power. Every NFA can be converted to a DFA using subset construction, though the DFA may have exponentially more states. Both recognize exactly the class of regular languages.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Equivalence banner -->
    <rect x="30" y="367" width="360" height="24" rx="6" fill="#C62828" opacity="0.12"/>
    <rect x="30" y="367" width="360" height="24" rx="6" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="210" y="376" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">KEY INSIGHT</text>
    <text x="210" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">DFA and NFA are equivalent in power -- both recognize exactly the Regular Languages</text>
  </g>
</svg>