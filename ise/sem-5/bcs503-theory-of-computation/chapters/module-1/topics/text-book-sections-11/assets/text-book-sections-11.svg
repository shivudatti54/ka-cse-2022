<svg width="420" height="400" data-topic-id="theory-of-computation-text-book-section-11" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ACC7F4"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4B0082"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="350" fill="url(#pastel-gradient)"/>
  <text x="20" y="50" font-size="24" font-family="Arial" fill="#000" text-anchor="middle">Theory of Computation</text>
  <rect x="15" y="80" width="370" height="200" fill="#fff" rx="10"/>
  <g transform="translate(15, 90)">
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Computing</text>
    <rect x="10" y="10" width="300" height="150" fill="#fff" rx="10"/>
    <g transform="translate(18, 15)">
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Computing refers to the process of processing information using a computer.</text>
      <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">It involves input, processing, and output of information using a computer's hardware and software components.</text>
    </g>
    <g transform="translate(18, 90)">
      <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Models of Computation</text>
      <rect x="10" y="10" width="300" height="150" fill="#fff" rx="10"/>
      <g transform="translate(18, 15)">
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">A model of computation is a mathematical representation of a computer's behavior.</text>
        <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">There are several models of computation, including:</text>
        <rect x="10" y="80" width="280" height="50" fill="#fff" rx="10"/>
        <g transform="translate(20, 85)">
          <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
          <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Sequential Model</text>
          <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">This model assumes that the computer executes statements one at a time, in a linear sequence.</text>
        </g>
        <g transform="translate(20, 90)">
          <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
          <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Parallel Model</text>
          <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">This model assumes that the computer executes statements simultaneously, in parallel.</text>
        </g>
        <g transform="translate(20, 105)">
          <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" />
          <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Finite State Machine (FSM)</text>
          <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">This model assumes that the computer is a finite set of states, with transitions between states based on input.</text>
        </g>
      </g>
      <g transform="translate(18, 115)">
        <animate attributeName="opacity" begin="6s" dur="2s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Algorithms</text>
        <rect x="10" y="10" width="300" height="150" fill="#fff" rx="10"/>
        <g transform="translate(18, 15)">
          <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
          <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">An algorithm is a set of instructions that is used to solve a specific problem.</text>
          <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">It is a well-defined procedure that takes input and produces output.</text>
        </g>
        <g transform="translate(18, 90)">
          <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
          <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Key Characteristics of Algorithms</text>
          <rect x="10" y="10" width="280" height="50" fill="#fff" rx="10"/>
          <g transform="translate(20, 15)">
            <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
            <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Well-defined</text>
            <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">The algorithm must have a clear and unambiguous set of instructions.</text>
          </g>
          <g transform="translate(20, 65)">
            <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
            <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Deterministic</text>
            <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">The algorithm must produce the same output for a given input.</text>
          </g>
          <g transform="translate(20, 90)">
            <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" />
            <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Efficient</text>
            <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">The algorithm must use a minimal amount of resources (such as time and memory).</text>
          </g>
        </g>
        <g transform="translate(18, 115)">
          <animate attributeName="opacity" begin="6s" dur="2s" repeatCount="indefinite" />
          <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Types of Algorithms</text>
          <rect x="10" y="10" width="280" height="50" fill="#fff" rx="10"/>
          <g transform="translate(20, 15)">
            <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
            <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Sequential Algorithm</text>
            <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">An algorithm that executes statements one at a time, in a linear sequence.</text>
          </g>
          <g transform="translate(20, 65)">
            <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
            <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Parallel Algorithm</text>
            <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">An algorithm that executes statements simultaneously, in parallel.</text>
          </g>
          <g transform="translate(20, 90)">
            <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" />
            <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Divide and Conquer Algorithm</text>
            <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">An algorithm that solves a problem by dividing it into smaller subproblems.</text>
          </g>
        </g>
      </g>
    </g>
    <g transform="translate(15, 250)">
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Conclusion</text>
      <rect x="10" y="10" width="370" height="200" fill="#fff" rx="10"/>
      <g transform="translate(18, 15)">
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">The theory of computation is a fundamental area of computer science.</text>
        <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">This module has covered the basics of computers, models of computation, and the structure of algorithms.</text>
      </g>
    </g>
    <g transform="translate(15, 320)">
      <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
      <rect x="10" y="10" width="370" height="200" fill="#fff" rx="10"/>
      <g transform="translate(18, 15)">
        <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">References</text>
        <rect x="10" y="10" width="350" height="200" fill="#fff" rx="10"/>
      </g>
    </g>
    <g transform="translate(15, 390)">
      <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Future Work</text>
      <rect x="10" y="10" width="350" height="200" fill="#fff" rx="10"/>
      <g transform="translate(18, 15)">
        <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Further research is needed to explore the applications of algorithms in real-world scenarios.</text>
        <text x="0" y="50" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Additionally, the development of more efficient algorithms is essential to tackle complex problems.</text>
      </g>
    </g>
  </g>
  <g transform="translate(15, 10)">
    <rect x="10" y="10" width="400" height="20" fill="#000" rx="10"/>
    <text x="20" y="15" font-size="16" font-family="Arial" fill="#fff" text-anchor="start">Theory of Computation</text>
    <rect x="10" y="45" width="400" height="20" fill="#000" rx="10"/>
    <text x="20" y="50" font-size="16" font-family="Arial" fill="#fff" text-anchor="start">Text Book Sections 11</text>
  </g>
  <g transform="translate(15, 40)">
    <rect x="10" y="10" width="400" height="20" fill="#000" rx="10"/>
    <text x="20" y="15" font-size="16" font-family="Arial" fill="#fff" text-anchor="start">Modules</text>
    <rect x="10" y="45" width="400" height="20" fill="#000" rx="10"/>
    <text x="20" y="50" font-size="16" font-family="Arial" fill="#fff" text-anchor="start">Hours</text>
  </g>
</svg>