<svg width="420" height="400" data-topic-id="deterministic-finite-automata-nondeterministic-finite">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <g transform="translate(10, 10)">
    <title>Deterministic Finite Automata vs Nondeterministic Finite Automata</title>
    <rect width="400" height="40" fill="rgba(0, 0, 0, 0.2)"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">DFA</text>
    <rect x="0" y="50" width="400" height="200" fill="rgba(0, 0, 0, 0.2)"/>
    <text x="10" y="55" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">States</text>
    <g transform="translate(10, 60)">
      <circle cx="20" cy="20" r="10" fill="#87ceeb" stroke="#6495ed" stroke-width="2"/>
      <text x="20" y="30" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q0</text>
      <text x="20" y="40" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q1</text>
      <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q2</text>
    </g>
    <rect x="0" y="250" width="400" height="150" fill="rgba(0, 0, 0, 0.2)"/>
    <text x="10" y="255" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Nondeterministic Finite Automata (NFA)</text>
    <g transform="translate(10, 265)">
      <circle cx="20" cy="20" r="10" fill="#87ceeb" stroke="#6495ed" stroke-width="2"/>
      <text x="20" y="30" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q0</text>
      <text x="20" y="40" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q1</text>
      <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q2</text>
    </g>
    <rect x="0" y="410" width="400" height="40" fill="rgba(0, 0, 0, 0.2)"/>
    <text x="10" y="415" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Key Differences</text>
    <rect x="0" y="435" width="400" height="150" fill="rgba(0, 0, 0, 0.2)"/>
    <text x="10" y="440" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Transition Function</text>
    <g transform="translate(10, 455)">
      <text x="20" y="460" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">DFA: For every state, input symbol, and current state, there is at most one next state.</text>
      <text x="20" y="470" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">NFA: For every state, input symbol, and current state, there is at most one next state, but multiple states can be in the same next state.</text>
    </g>
    <rect x="0" y="605" width="400" height="40" fill="rgba(0, 0, 0, 0.2)"/>
    <text x="10" y="610" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">Example</text>
    <rect x="0" y="630" width="400" height="150" fill="rgba(0, 0, 0, 0.2)"/>
    <text x="10" y="635" font-size="18" font-family="Arial, sans-serif" fill="#2f4f7f">DFA for palindromes</text>
    <g transform="translate(10, 655)">
      <rect width="100" height="20" fill="#87ceeb" rx="5"/>
      <text x="15" y="25" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q0</text>
      <rect width="100" height="20" fill="#6495ed" rx="5"/>
      <text x="115" y="25" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q1</text>
      <rect width="100" height="20" fill="#6495ed" rx="5"/>
      <text x="215" y="25" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q2</text>
      <rect width="100" height="20" fill="#6495ed" rx="5"/>
      <text x="315" y="25" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q2</text>
      <rect width="100" height="20" fill="#6495ed" rx="5"/>
      <text x="415" y="25" font-size="14" font-family="Arial, sans-serif" fill="#2f4f7f">Q2</text>
