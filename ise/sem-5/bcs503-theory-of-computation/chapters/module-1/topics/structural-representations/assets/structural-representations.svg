<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="structural-representations">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title (begin=0.3s) -->
  <g opacity="0" data-narration="Structural Representations of Finite Automata. There are three main ways to represent an automaton: transition diagrams, transition tables, and state transition functions.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Structural Representations of Finite Automata</text>
    <line x1="60" y1="35" x2="360" y2="35" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- Group 2: Transition Diagram (begin=1.5s) -->
  <g opacity="0" data-narration="First representation: Transition Diagram. States are shown as circles and transitions as labeled arrows. State q0 goes to q1 on input a, and to q2 on input b. State q1 goes to q3 on input a. State q2 goes to q3 on input b. q3 is a sink state.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <rect x="12" y="44" width="170" height="20" rx="4" fill="#3949AB"/>
    <text x="97" y="58" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">1. Transition Diagram</text>

    <!-- State q0 -->
    <circle cx="70" cy="100" r="20" fill="none" stroke="#3949AB" stroke-width="2"/>
    <text x="70" y="104" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">q0</text>
    <!-- Start arrow -->
    <line x1="30" y1="100" x2="48" y2="100" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- State q1 -->
    <circle cx="170" cy="100" r="20" fill="none" stroke="#00695C" stroke-width="2"/>
    <text x="170" y="104" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">q1</text>

    <!-- State q2 -->
    <circle cx="70" cy="175" r="20" fill="none" stroke="#E65100" stroke-width="2"/>
    <text x="70" y="179" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">q2</text>

    <!-- State q3 (double circle = accepting) -->
    <circle cx="170" cy="175" r="20" fill="none" stroke="#C62828" stroke-width="2"/>
    <circle cx="170" cy="175" r="16" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <text x="170" y="179" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">q3</text>

    <!-- Transition q0 -> q1 (a) -->
    <line x1="92" y1="100" x2="148" y2="100" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="120" y="93" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#3949AB">a</text>

    <!-- Transition q0 -> q2 (b) -->
    <line x1="70" y1="122" x2="70" y2="153" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="60" y="141" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#E65100">b</text>

    <!-- Transition q1 -> q3 (a) -->
    <line x1="170" y1="122" x2="170" y2="153" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="181" y="141" text-anchor="start" font-family="monospace" font-size="11" font-weight="bold" fill="#C62828">a</text>

    <!-- Transition q1 self-loop (b) -->
    <path d="M185 85 C210 65 220 85 192 96" fill="none" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
    <text x="212" y="76" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#00695C">b</text>

    <!-- Transition q2 -> q3 (b) -->
    <line x1="92" y1="175" x2="148" y2="175" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="120" y="169" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#C62828">b</text>

    <!-- Transition q2 self-loop (a) -->
    <path d="M55 190 C35 215 55 220 66 197" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <text x="35" y="213" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#E65100">a</text>

    <!-- q3 self-loops (a,b) -->
    <path d="M185 190 C210 215 220 210 192 180" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <text x="218" y="202" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#C62828">a,b</text>
  </g>

  <!-- Group 3: Transition Table header (begin=3.0s) -->
  <g opacity="0" data-narration="Second representation: Transition Table. A table with states as rows and input symbols as columns. Each cell shows the next state for that combination.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Section label -->
    <rect x="240" y="44" width="168" height="20" rx="4" fill="#00695C"/>
    <text x="324" y="58" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">2. Transition Table</text>

    <!-- Table border -->
    <rect x="248" y="70" width="160" height="130" rx="4" fill="white" fill-opacity="0.7" stroke="#00695C" stroke-width="1.5"/>

    <!-- Header row -->
    <rect x="248" y="70" width="160" height="24" rx="4" fill="#00695C"/>
    <text x="288" y="86" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">State</text>
    <text x="358" y="86" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">a</text>
    <text x="398" y="86" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">b</text>

    <!-- Vertical dividers -->
    <line x1="328" y1="70" x2="328" y2="200" stroke="#00695C" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="378" y1="70" x2="378" y2="200" stroke="#00695C" stroke-width="0.8" stroke-opacity="0.4"/>

    <!-- Horizontal dividers -->
    <line x1="248" y1="94" x2="408" y2="94" stroke="#00695C" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="248" y1="120" x2="408" y2="120" stroke="#00695C" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="248" y1="146" x2="408" y2="146" stroke="#00695C" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="248" y1="172" x2="408" y2="172" stroke="#00695C" stroke-width="0.8" stroke-opacity="0.4"/>

    <!-- Row q0 -->
    <text x="288" y="112" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">q0</text>
    <text x="358" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">q1</text>
    <text x="398" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">q2</text>

    <!-- Row q1 -->
    <text x="288" y="138" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">q1</text>
    <text x="358" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">q3</text>
    <text x="398" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">q1</text>

    <!-- Row q2 -->
    <text x="288" y="164" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">q2</text>
    <text x="358" y="164" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100">q2</text>
    <text x="398" y="164" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100">q3</text>

    <!-- Row q3 -->
    <text x="288" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">q3</text>
    <text x="358" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#C62828">q3</text>
    <text x="398" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#C62828">q3</text>
  </g>

  <!-- Group 4: State Transition Function (begin=4.5s) -->
  <g opacity="0" data-narration="Third representation: State Transition Function. The delta function maps each state and input symbol pair to the next state. For example, delta of q0 and a equals q1.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Section label -->
    <rect x="12" y="205" width="220" height="20" rx="4" fill="#E65100"/>
    <text x="122" y="219" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">3. State Transition Function</text>

    <!-- Function box -->
    <rect x="12" y="230" width="220" height="115" rx="6" fill="white" fill-opacity="0.7" stroke="#E65100" stroke-width="1.5"/>

    <!-- delta functions - left column -->
    <text x="24" y="252" font-family="monospace" font-size="10.5" fill="#3949AB" font-weight="bold">&#x03B4;(q0, a) = q1</text>
    <text x="24" y="270" font-family="monospace" font-size="10.5" fill="#3949AB" font-weight="bold">&#x03B4;(q0, b) = q2</text>
    <text x="24" y="291" font-family="monospace" font-size="10.5" fill="#00695C" font-weight="bold">&#x03B4;(q1, a) = q3</text>
    <text x="24" y="309" font-family="monospace" font-size="10.5" fill="#00695C" font-weight="bold">&#x03B4;(q1, b) = q1</text>

    <!-- delta functions - right column -->
    <text x="132" y="252" font-family="monospace" font-size="10.5" fill="#E65100" font-weight="bold">&#x03B4;(q2, a) = q2</text>
    <text x="132" y="270" font-family="monospace" font-size="10.5" fill="#E65100" font-weight="bold">&#x03B4;(q2, b) = q3</text>
    <text x="132" y="291" font-family="monospace" font-size="10.5" fill="#C62828" font-weight="bold">&#x03B4;(q3, a) = q3</text>
    <text x="132" y="309" font-family="monospace" font-size="10.5" fill="#C62828" font-weight="bold">&#x03B4;(q3, b) = q3</text>

    <!-- Divider line between columns -->
    <line x1="126" y1="238" x2="126" y2="338" stroke="#E65100" stroke-width="0.6" stroke-opacity="0.3"/>
  </g>

  <!-- Group 5: Comparison summary (begin=6.0s) -->
  <g opacity="0" data-narration="Comparison of the three representations. Transition diagrams are visual and intuitive. Transition tables are structured and easy to analyze. State transition functions are formal and mathematical.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Comparison box -->
    <rect x="240" y="210" width="168" height="135" rx="6" fill="white" fill-opacity="0.6" stroke="#3949AB" stroke-width="1"/>

    <text x="324" y="228" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Comparison</text>
    <line x1="252" y1="233" x2="396" y2="233" stroke="#3949AB" stroke-width="0.8" stroke-opacity="0.3"/>

    <!-- Diagram row -->
    <circle cx="260" cy="250" r="5" fill="#3949AB"/>
    <text x="270" y="254" font-family="Arial" font-size="9" fill="#3949AB" font-weight="bold">Diagram</text>
    <text x="322" y="254" font-family="Arial" font-size="8.5" fill="#555">Visual, intuitive</text>

    <!-- Table row -->
    <circle cx="260" cy="275" r="5" fill="#00695C"/>
    <text x="270" y="279" font-family="Arial" font-size="9" fill="#00695C" font-weight="bold">Table</text>
    <text x="310" y="279" font-family="Arial" font-size="8.5" fill="#555">Structured, analyzable</text>

    <!-- Function row -->
    <circle cx="260" cy="300" r="5" fill="#E65100"/>
    <text x="270" y="304" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">Function</text>
    <text x="318" y="304" font-family="Arial" font-size="8.5" fill="#555">Formal, mathematical</text>

    <!-- Note -->
    <line x1="252" y1="315" x2="396" y2="315" stroke="#3949AB" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="324" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#555" font-style="italic">All three describe the</text>
    <text x="324" y="340" text-anchor="middle" font-family="Arial" font-size="8" fill="#555" font-style="italic">same automaton equivalently</text>
  </g>

  <!-- Group 6: Key/Legend (begin=7.5s) -->
  <g opacity="0" data-narration="Color legend. Indigo represents state q0, teal represents state q1, orange represents state q2, and red represents the accepting state q3. The double circle on q3 indicates it is the accepting or final state.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <rect x="12" y="352" width="396" height="38" rx="6" fill="white" fill-opacity="0.5" stroke="#3949AB" stroke-width="0.8"/>

    <text x="22" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#555">Legend:</text>

    <!-- q0 -->
    <circle cx="80" cy="371" r="6" fill="#3949AB"/>
    <text x="92" y="374" font-family="Arial" font-size="9" fill="#3949AB">q0 (start)</text>

    <!-- q1 -->
    <circle cx="162" cy="371" r="6" fill="#00695C"/>
    <text x="174" y="374" font-family="Arial" font-size="9" fill="#00695C">q1</text>

    <!-- q2 -->
    <circle cx="210" cy="371" r="6" fill="#E65100"/>
    <text x="222" y="374" font-family="Arial" font-size="9" fill="#E65100">q2</text>

    <!-- q3 -->
    <circle cx="260" cy="371" r="6" fill="#C62828"/>
    <circle cx="260" cy="371" r="4" fill="none" stroke="white" stroke-width="1"/>
    <text x="272" y="374" font-family="Arial" font-size="9" fill="#C62828">q3 (accept)</text>

    <!-- Arrow symbol -->
    <text x="350" y="374" font-family="Arial" font-size="9" fill="#555">&#x2192; = transition</text>
  </g>

</svg>