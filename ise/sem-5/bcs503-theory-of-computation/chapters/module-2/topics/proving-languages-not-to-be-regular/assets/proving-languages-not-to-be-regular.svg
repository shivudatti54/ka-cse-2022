<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="proving-languages-not-to-be-regular">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title and Pumping Lemma Statement -->
  <g opacity="0" data-narration="The Pumping Lemma is the primary tool for proving a language is not regular. It states that every regular language has a pumping length p.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Proving Languages Not to be Regular</text>
    <rect x="20" y="38" width="380" height="62" fill="#3949AB" rx="8" opacity="0.95"/>
    <text x="210" y="56" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Pumping Lemma</text>
    <text x="210" y="72" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#C5CAE9">If L is regular, there exists pumping length p such that</text>
    <text x="210" y="86" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#C5CAE9">any w in L with |w| &gt;= p can be split: w = xyz</text>
    <text x="210" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#9FA8DA">|y| &gt; 0 , |xy| &lt;= p , xy^i z in L for all i &gt;= 0</text>
  </g>

  <!-- Group 2: Proof Strategy - Contradiction Flow -->
  <g opacity="0" data-narration="The proof strategy uses contradiction. First assume L is regular, then choose a string w of length at least p, decompose it as x y z, and show pumping y leads to a contradiction.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Step boxes connected by arrows -->
    <rect x="20" y="110" width="90" height="34" fill="#00695C" rx="6"/>
    <text x="65" y="130" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">1. Assume</text>
    <text x="65" y="140" text-anchor="middle" font-family="Arial" font-size="8" fill="#B2DFDB">L is regular</text>

    <line x1="110" y1="127" x2="128" y2="127" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="130" y="110" width="80" height="34" fill="#00695C" rx="6"/>
    <text x="170" y="130" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">2. Choose</text>
    <text x="170" y="140" text-anchor="middle" font-family="monospace" font-size="8" fill="#B2DFDB">w, |w| &gt;= p</text>

    <line x1="210" y1="127" x2="228" y2="127" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="230" y="110" width="80" height="34" fill="#00695C" rx="6"/>
    <text x="270" y="130" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">3. Split</text>
    <text x="270" y="140" text-anchor="middle" font-family="monospace" font-size="8" fill="#B2DFDB">w = xyz</text>

    <line x1="310" y1="127" x2="328" y2="127" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

    <rect x="330" y="110" width="70" height="34" fill="#C62828" rx="6"/>
    <text x="365" y="127" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">4. Show</text>
    <text x="365" y="138" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#FFCDD2">xy^i z not in L</text>
  </g>

  <!-- Group 3: Example 1 - a^n b^n decomposition diagram -->
  <g opacity="0" data-narration="Example one: The language L equals a to the n, b to the n is not regular. Choose w equals a to the p, b to the p. Since x y must lie within the first p characters, y consists only of a's. Pumping y gives more a's than b's, a contradiction.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="20" y="155" width="380" height="95" fill="white" rx="8" opacity="0.85" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="172" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Example 1: L = { a^n b^n | n &gt;= 0 }</text>

    <!-- String visualization: w = a^p b^p -->
    <text x="40" y="192" font-family="monospace" font-size="9" fill="#3949AB">w = a^p b^p :</text>

    <!-- x region -->
    <rect x="120" y="183" width="40" height="16" fill="#C5CAE9" rx="3" stroke="#3949AB" stroke-width="0.8"/>
    <text x="140" y="194" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">x</text>

    <!-- y region (pumped part) -->
    <rect x="160" y="183" width="50" height="16" fill="#E65100" rx="3" opacity="0.85"/>
    <text x="185" y="194" text-anchor="middle" font-family="monospace" font-size="9" fill="white">y = a^k</text>

    <!-- z region -->
    <rect x="210" y="183" width="130" height="16" fill="#C5CAE9" rx="3" stroke="#3949AB" stroke-width="0.8"/>
    <text x="275" y="194" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">z = a...a b^p</text>

    <!-- Brace for xy <= p -->
    <line x1="120" y1="203" x2="210" y2="203" stroke="#00695C" stroke-width="1.5"/>
    <text x="165" y="213" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">|xy| &lt;= p (all a's)</text>

    <!-- Pumping result -->
    <text x="40" y="232" font-family="monospace" font-size="9" fill="#C62828">xy^2z = a^(p+k) b^p</text>
    <text x="230" y="232" font-family="Arial" font-size="9" fill="#C62828" font-weight="bold">p+k != p  --  Contradiction!</text>
  </g>

  <!-- Group 4: Example 2 - ww language -->
  <g opacity="0" data-narration="Example two: The language L equals w w, where w is over a and b, is also not regular. Choose the string a b repeated p times, twice. Pumping y disrupts the repeated pattern, producing a string not in L.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="20" y="256" width="380" height="52" fill="white" rx="8" opacity="0.85" stroke="#E65100" stroke-width="1"/>
    <text x="210" y="273" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Example 2: L = { ww | w in {a,b}* }</text>

    <text x="40" y="292" font-family="monospace" font-size="9" fill="#3949AB">Choose (ab)^p (ab)^p</text>
    <text x="230" y="292" font-family="Arial" font-size="9" fill="#C62828">Pump y --> pattern breaks</text>
    <text x="365" y="292" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Not in L!</text>
  </g>

  <!-- Group 5: Regular vs Non-Regular comparison -->
  <g opacity="0" data-narration="Regular languages like a star can be recognized by finite automata. Non-regular languages like a to the n b to the n and w w require memory to count or match, which finite automata cannot do.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="20" y="314" width="185" height="44" fill="#3949AB" rx="8" opacity="0.9"/>
    <text x="112" y="331" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Regular (DFA possible)</text>
    <text x="112" y="349" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">a*  (a|b)*  a*b*</text>

    <rect x="215" y="314" width="185" height="44" fill="#C62828" rx="8" opacity="0.9"/>
    <text x="307" y="331" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Non-Regular (no DFA)</text>
    <text x="307" y="349" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFCDD2">a^n b^n   ww   a^(n^2)</text>
  </g>

  <!-- Group 6: Key Insight / Exam Tips -->
  <g opacity="0" data-narration="Key insight: Finite automata have finite memory and cannot count or remember unbounded information. For exams, always use the Pumping Lemma, choose a clever string, decompose into x y z, and show a contradiction by pumping.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="20" y="365" width="380" height="28" fill="#00695C" rx="6" opacity="0.95"/>
    <text x="210" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Key: Finite automata cannot count -- use Pumping Lemma to prove it!</text>
  </g>
</svg>