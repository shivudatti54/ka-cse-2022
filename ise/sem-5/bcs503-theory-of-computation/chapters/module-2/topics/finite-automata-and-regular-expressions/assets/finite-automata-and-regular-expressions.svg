<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="finite-automata-and-regular-expressions">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and DFA Section Header -->
  <g opacity="0" data-narration="Finite Automata and Regular Expressions. A finite automaton is a machine with finite states that reads input symbols and transitions between states.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Finite Automata and Regular Expressions</text>
    <text x="105" y="52" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">DFA (Deterministic)</text>
    <!-- DFA diagram: q0 to q1 to q2 -->
    <circle cx="55" cy="82" r="18" fill="none" stroke="#3949AB" stroke-width="2"/>
    <text x="55" y="86" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">q0</text>
    <!-- Start arrow -->
    <line x1="20" y1="82" x2="35" y2="82" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="105" cy="82" r="18" fill="none" stroke="#3949AB" stroke-width="2"/>
    <text x="105" y="86" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">q1</text>
    <circle cx="155" cy="82" r="18" fill="none" stroke="#3949AB" stroke-width="2"/>
    <circle cx="155" cy="82" r="15" fill="none" stroke="#3949AB" stroke-width="2"/>
    <text x="155" y="86" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">q2</text>
    <!-- Transitions -->
    <line x1="73" y1="82" x2="85" y2="82" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="79" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">a</text>
    <line x1="123" y1="82" x2="135" y2="82" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="129" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">b</text>
    <!-- Self-loop on q2 -->
    <path d="M155 64 C165 45, 175 45, 170 62" fill="none" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="172" y="50" font-family="monospace" font-size="9" fill="#3949AB">b</text>
    <text x="105" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Unique next state per input</text>
  </g>

  <!-- Group 2: NFA Section -->
  <g opacity="0" data-narration="Nondeterministic Finite Automaton or NFA. Unlike DFA, an NFA can have multiple possible next states for a given input, including epsilon transitions.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="320" y="52" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">NFA (Nondeterministic)</text>
    <!-- NFA diagram: q0 branches to q1 and q2 on 'a' -->
    <circle cx="260" cy="82" r="18" fill="none" stroke="#00695C" stroke-width="2"/>
    <text x="260" y="86" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695C">q0</text>
    <!-- Start arrow -->
    <line x1="225" y1="82" x2="240" y2="82" stroke="#00695C" stroke-width="2" marker-end="url(#arrow-teal)"/>
    <circle cx="325" cy="62" r="18" fill="none" stroke="#00695C" stroke-width="2"/>
    <text x="325" y="66" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695C">q1</text>
    <circle cx="325" cy="102" r="18" fill="none" stroke="#00695C" stroke-width="2"/>
    <circle cx="325" cy="102" r="15" fill="none" stroke="#00695C" stroke-width="2"/>
    <text x="325" y="106" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695C">q2</text>
    <!-- Branching transitions -->
    <line x1="278" y1="75" x2="305" y2="65" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
    <text x="288" y="64" font-family="monospace" font-size="9" fill="#00695C">a</text>
    <line x1="278" y1="89" x2="305" y2="99" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
    <text x="288" y="103" font-family="monospace" font-size="9" fill="#00695C">a</text>
    <!-- Epsilon from q1 to q2 -->
    <line x1="325" y1="80" x2="325" y2="83" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
    <text x="340" y="88" font-family="monospace" font-size="8" fill="#00695C">\u03B5</text>
    <text x="320" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Multiple paths possible</text>
  </g>

  <!-- Group 3: Regular Expression Operations -->
  <g opacity="0" data-narration="Regular expressions have three basic operations. Union combines two patterns with the pipe symbol. Concatenation joins patterns sequentially. Kleene star matches zero or more repetitions.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="160" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E65100">Regular Expression Operations</text>
    <!-- Union -->
    <rect x="15" y="172" width="120" height="44" fill="#E65100" rx="6" opacity="0.9"/>
    <text x="75" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Union (|)</text>
    <text x="75" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="white">R1 | R2</text>
    <!-- Concatenation -->
    <rect x="150" y="172" width="120" height="44" fill="#E65100" rx="6" opacity="0.9"/>
    <text x="210" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Concatenation</text>
    <text x="210" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="white">R1 R2</text>
    <!-- Kleene Star -->
    <rect x="285" y="172" width="120" height="44" fill="#E65100" rx="6" opacity="0.9"/>
    <text x="345" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Kleene Star (*)</text>
    <text x="345" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="white">R*</text>
  </g>

  <!-- Group 4: Equivalence theorem -->
  <g opacity="0" data-narration="Kleene's theorem states that finite automata and regular expressions are equivalent. Any regular expression can be converted to an FA, and any FA can be converted to a regular expression. They recognize exactly the same class of languages: regular languages.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="40" y="228" width="340" height="52" fill="white" rx="8" stroke="#3949AB" stroke-width="2" opacity="0.95"/>
    <text x="210" y="247" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Kleene's Theorem: FA \u2261 Regular Expressions</text>
    <!-- Bidirectional arrows -->
    <text x="120" y="270" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">RE</text>
    <line x1="140" y1="267" x2="195" y2="267" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="168" y="262" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Thompson</text>
    <text x="210" y="270" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">NFA</text>
    <line x1="230" y1="267" x2="275" y2="267" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="253" y="262" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Subset</text>
    <text x="295" y="270" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">DFA</text>
  </g>

  <!-- Group 5: Example DFA for ab* -->
  <g opacity="0" data-narration="Example: the regular expression a b star matches strings starting with a followed by zero or more b's. The DFA has three states: q0 is the start state, q1 accepts on reading a, and q2 loops on b. Both q1 and q2 are accepting states.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="302" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Example: DFA for ab*</text>
    <!-- States -->
    <circle cx="90" cy="340" r="18" fill="none" stroke="#C62828" stroke-width="2"/>
    <text x="90" y="344" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">q0</text>
    <line x1="55" y1="340" x2="70" y2="340" stroke="#C62828" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="180" cy="340" r="18" fill="none" stroke="#C62828" stroke-width="2"/>
    <circle cx="180" cy="340" r="15" fill="none" stroke="#C62828" stroke-width="2"/>
    <text x="180" y="344" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">q1</text>
    <circle cx="270" cy="340" r="18" fill="none" stroke="#C62828" stroke-width="2"/>
    <circle cx="270" cy="340" r="15" fill="none" stroke="#C62828" stroke-width="2"/>
    <text x="270" y="344" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">q2</text>
    <!-- Transitions -->
    <line x1="108" y1="340" x2="160" y2="340" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="134" y="334" text-anchor="middle" font-family="monospace" font-size="10" fill="#C62828">a</text>
    <line x1="198" y1="340" x2="250" y2="340" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="224" y="334" text-anchor="middle" font-family="monospace" font-size="10" fill="#C62828">b</text>
    <!-- Self-loop on q2 for b -->
    <path d="M270 322 C280 302, 296 302, 286 320" fill="none" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="290" y="307" font-family="monospace" font-size="10" fill="#C62828">b</text>
  </g>

  <!-- Group 6: Regex notation for the example -->
  <g opacity="0" data-narration="The regular expression ab star is written as a followed by b with asterisk. It matches strings like a, ab, abb, abbb, and so on. The double circles on q1 and q2 indicate accepting or final states.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="310" y="315" width="100" height="50" fill="#C62828" rx="6" opacity="0.9"/>
    <text x="360" y="335" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Regex:</text>
    <text x="360" y="352" text-anchor="middle" font-family="monospace" font-size="13" fill="white">ab*</text>
    <!-- Legend at bottom -->
    <text x="210" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Double circle = accepting state | Arrow = start state</text>
  </g>
</svg>