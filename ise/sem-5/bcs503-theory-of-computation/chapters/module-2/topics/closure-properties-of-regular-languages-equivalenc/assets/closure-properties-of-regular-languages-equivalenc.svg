<svg width="420" height="400" data-topic-id="Closure-Properties-Of-Regular-Languages-Equivalenc"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="overflow:visible;">
  <defs>
    <linearGradient id="gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65C9C9" stop-opacity="1"/>
      <stop offset="50%" stop-color="#70D2E7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gradient-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA07A" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFC107" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Closure Properties Of Regular Languages Equivalenc</title>
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 200px; background: url(#gradient-1) no-repeat; background-size: 100% 200px; z-index: 1;">
    <div style="position: relative; width: 100%; height: 100%; text-align: center; color: #fff;">
      <h2 style="font-size: 20px; margin-bottom: 10px;">Closure Properties Of Regular Languages Equivalenc</h2>
      <hr style="background-color: #fff; width: 80%; margin: 20px 10%"/>
    </div>
  </div>
  <g transform="translate(10, 220) scale(1.2)">
    <g data-narration="Introduction" style="color: #70D2E7; font-size: 18px; font-weight: bold;">
      <rect x="0" y="0" width="100%" height="25" fill="#fff" rx="5"/>
      <text x="0" y="30" fill="#70D2E7" font-size="18px" font-weight="bold">Introduction</text>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" dur="1000" begin="0s"/>
    </g>
    <g data-narration="Closure Properties of Regular Languages" style="color: #6495ED; font-size: 18px;">
      <rect x="0" y="0" width="100%" height="25" fill="#fff" rx="5"/>
      <text x="0" y="30" fill="#6495ED" font-size="18px">Closure Properties of Regular Languages</text>
      <animateTransform attributeName="transform" type="translate" from="0 220" to="20 220" dur="1000" begin="0s"/>
      <line x1="20" y1="240" x2="60" y2="240" style="stroke:#fff; stroke-width:3; stroke-dasharray:5,5;"/>
      <text x="40" y="270" fill="#fff" font-size="16px">Union Closure</text>
      <text x="40" y="300" fill="#fff" font-size="16px">Intersection Closure</text>
      <text x="40" y="330" fill="#fff" font-size="16px">Kleene Star Closure</text>
      <text x="40" y="360" fill="#fff" font-size="16px">Complement Closure</text>
    </g>
    <g data-narration="Equivalence of Regular Languages" style="color: #FFA07A; font-size: 18px;">
      <rect x="0" y="0" width="100%" height="25" fill="#fff" rx="5"/>
      <text x="0" y="30" fill="#FFA07A" font-size="18px">Equivalence of Regular Languages</text>
      <animateTransform attributeName="transform" type="translate" from="100 220" to="120 220" dur="1000" begin="0s"/>
      <line x1="120" y1="240" x2="160" y2="240" style="stroke:#fff; stroke-width:3; stroke-dasharray:5,5;"/>
      <text x="140" y="270" fill="#fff" font-size="16px">Equivalence</text>
      <text x="140" y="300" fill="#fff" font-size="16px">Congruence</text>
    </g>
    <g data-narration="Applications of Regular Expressions" style="color: #70D2E7; font-size: 18px;">
      <rect x="0" y="0" width="100%" height="25" fill="#fff" rx="5"/>
      <text x="0" y="30" fill="#70D2E7" font-size="18px" font-weight="bold">Applications of Regular Expressions</text>
      <animateTransform attributeName="transform" type="translate" from="200 220" to="220 220" dur="1000" begin="0s"/>
      <line x1="220" y1="240" x2="260" y2="240" style="stroke:#fff; stroke-width:3; stroke-dasharray:5,5;"/>
      <text x="240" y="270" fill="#fff" font-size="16px">Regular Algebra</text>
      <text x="240" y="300" fill="#fff" font-size="16px">Regular Grammars</text>
      <text x="240" y="330" fill="#fff" font-size="16px">Regular Languages</text>
    </g>
    <g data-narration="Minimization of Automata" style="color: #6495ED; font-size: 18px;">
      <rect x="0" y="0" width="100%" height="25" fill="#fff" rx="5"/>
      <text x="0" y="30" fill="#6495ED" font-size="18px">Minimization of Automata</text>
      <animateTransform attributeName="transform" type="translate" from="300 220" to="320 220" dur="1000" begin="0s"/>
      <line x1="320" y1="240" x2="360" y2="240" style="stroke:#fff; stroke-width:3; stroke-dasharray:5,5;"/>
      <text x="340" y="270" fill="#fff" font-size="16px">Determinization</text>
      <text x="340" y="300" fill="#fff" font-size="16px">Nondeterminization</text>
      <text x="340" y="330" fill="#fff" font-size="16px">Unification</text>
    </g>
  </g>
  <footer style="position: absolute; bottom: 0; width: 100%; height: 200px; background: url(#gradient-2) no-repeat; background-size: 100% 200px; z-index: 1;">
    <div style="position: relative; width: 100%; height: 100%; text-align: center; color: #fff;">
      <h2 style="font-size: 20px; margin-bottom: 10px;">Closure Properties Of Regular Languages Equivalenc</h2>
      <hr style="background-color: #fff; width: 80%; margin: 20px 10%"/>
    </div>
  </footer>
</svg>