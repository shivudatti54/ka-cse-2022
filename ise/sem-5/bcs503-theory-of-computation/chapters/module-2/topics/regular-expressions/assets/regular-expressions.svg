<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="regular-expressions">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and grep syntax -->
  <g data-narration="Regular Expressions with grep. The grep command searches text using regex patterns. Basic syntax is grep options pattern file." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Regular Expressions with grep</text>
    <rect x="30" y="38" width="360" height="36" fill="#3949AB" rx="6"/>
    <text x="210" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="white">grep [options] pattern [file...]</text>
    <text x="210" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#C5CAE9">-i ignore case | -v invert | -n line numbers | -c count</text>
  </g>

  <!-- Group 2: grep processing flow -->
  <g data-narration="The grep processing flow. Input source is read line by line. Each line is tested against the regex pattern. Matching lines are printed to output. Non-matching lines are discarded." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="96" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">grep Processing Flow</text>
    <!-- Flow boxes -->
    <rect x="30" y="104" width="72" height="30" fill="white" stroke="#3949AB" stroke-width="1.5" rx="4"/>
    <text x="66" y="123" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Input File</text>

    <line x1="102" y1="119" x2="118" y2="119" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="120" y="104" width="72" height="30" fill="white" stroke="#3949AB" stroke-width="1.5" rx="4"/>
    <text x="156" y="123" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Read Line</text>

    <line x1="192" y1="119" x2="208" y2="119" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Decision diamond -->
    <polygon points="248,104 288,119 248,134 208,119" fill="#E65100" stroke="#E65100" stroke-width="1"/>
    <text x="248" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Match?</text>

    <!-- Yes path -->
    <line x1="288" y1="119" x2="304" y2="119" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="296" y="114" font-family="Arial" font-size="8" fill="#00695C">Yes</text>
    <rect x="306" y="104" width="84" height="30" fill="#00695C" rx="4"/>
    <text x="348" y="123" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Print Line</text>

    <!-- No path -->
    <line x1="248" y1="134" x2="248" y2="144" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <text x="260" y="142" font-family="Arial" font-size="8" fill="#C62828">No</text>
    <rect x="216" y="146" width="64" height="20" fill="#C62828" rx="4"/>
    <text x="248" y="160" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Discard</text>

    <!-- Loop back arrow from Discard to Read Line -->
    <path d="M216 156 L156 156 L156 134" stroke="#C62828" stroke-width="1" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="3,2"/>
  </g>

  <!-- Group 3: Key metacharacters table -->
  <g data-narration="Key regex metacharacters. Dot matches any single character. Caret anchors to start of line. Dollar anchors to end of line. Square brackets define character classes. Asterisk matches zero or more of previous character." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="120" y="186" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Metacharacters</text>
    <!-- Table header -->
    <rect x="20" y="192" width="190" height="18" fill="#3949AB" rx="3"/>
    <text x="50" y="204" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Symbol</text>
    <text x="140" y="204" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Meaning</text>
    <!-- Row 1 -->
    <rect x="20" y="210" width="190" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="50" y="221" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">.</text>
    <text x="140" y="221" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Any single character</text>
    <!-- Row 2 -->
    <rect x="20" y="226" width="190" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="50" y="237" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">^</text>
    <text x="140" y="237" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Start of line</text>
    <!-- Row 3 -->
    <rect x="20" y="242" width="190" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="50" y="253" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">$</text>
    <text x="140" y="253" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">End of line</text>
    <!-- Row 4 -->
    <rect x="20" y="258" width="190" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="50" y="269" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">[abc]</text>
    <text x="140" y="269" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Character class</text>
    <!-- Row 5 -->
    <rect x="20" y="274" width="190" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="50" y="285" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">*</text>
    <text x="140" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Zero or more</text>
  </g>

  <!-- Group 4: BRE vs ERE comparison -->
  <g data-narration="Basic Regular Expressions versus Extended Regular Expressions. In BRE used with grep, special characters like plus, question mark, pipe, and braces must be escaped with backslash. In ERE used with egrep, these characters work directly without escaping." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="330" y="186" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">BRE vs ERE</text>
    <!-- BRE column -->
    <rect x="225" y="192" width="80" height="18" fill="#E65100" rx="3"/>
    <text x="265" y="204" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">BRE (grep)</text>
    <!-- ERE column -->
    <rect x="305" y="192" width="95" height="18" fill="#00695C" rx="3"/>
    <text x="352" y="204" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">ERE (egrep)</text>
    <!-- Rows -->
    <rect x="225" y="210" width="80" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="265" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">\+</text>
    <rect x="305" y="210" width="95" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="352" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">+</text>

    <rect x="225" y="226" width="80" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="265" y="237" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">\?</text>
    <rect x="305" y="226" width="95" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="352" y="237" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">?</text>

    <rect x="225" y="242" width="80" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="265" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">\|</text>
    <rect x="305" y="242" width="95" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="352" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">|</text>

    <rect x="225" y="258" width="80" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="265" y="269" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">\{ \}</text>
    <rect x="305" y="258" width="95" height="16" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="352" y="269" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">{ }</text>

    <rect x="225" y="274" width="80" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="265" y="285" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">\( \)</text>
    <rect x="305" y="274" width="95" height="16" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="352" y="285" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">( )</text>
  </g>

  <!-- Group 5: Pattern matching example -->
  <g data-narration="Pattern matching example. The regex pattern caret hello dot asterisk world dollar is applied to the text hello beautiful world. The caret matches start of line, dot asterisk matches any characters in between, and dollar matches end of line. Result: full match." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="310" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Pattern Matching Example</text>
    <!-- Pattern box -->
    <rect x="20" y="318" width="180" height="32" fill="white" stroke="#3949AB" stroke-width="1.5" rx="5"/>
    <text x="28" y="331" font-family="Arial" font-size="9" fill="#666">Pattern:</text>
    <text x="78" y="331" font-family="monospace" font-size="10" font-weight="bold" fill="#E65100">^hello.*world$</text>
    <text x="28" y="344" font-family="Arial" font-size="9" fill="#666">Text:</text>
    <text x="64" y="344" font-family="monospace" font-size="9" fill="#333">hello beautiful world</text>
    <!-- Arrow -->
    <line x1="200" y1="334" x2="216" y2="334" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <!-- Result -->
    <rect x="218" y="320" width="182" height="28" fill="#00695C" rx="5"/>
    <text x="309" y="338" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Full Match</text>
    <!-- Breakdown annotations -->
    <text x="232" y="360" font-family="monospace" font-size="8" fill="#3949AB">^</text>
    <text x="242" y="360" font-family="Arial" font-size="7" fill="#666">start</text>
    <text x="275" y="360" font-family="monospace" font-size="8" fill="#3949AB">.*</text>
    <text x="290" y="360" font-family="Arial" font-size="7" fill="#666">any chars</text>
    <text x="340" y="360" font-family="monospace" font-size="8" fill="#3949AB">$</text>
    <text x="350" y="360" font-family="Arial" font-size="7" fill="#666">end</text>
  </g>

  <!-- Group 6: Practical use cases -->
  <g data-narration="Practical use cases of grep with regular expressions. Finding email addresses using character class patterns. Searching log files for error messages using case insensitive grep. Finding users with shell access by matching lines ending with bin bash." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="110" y="380" font-family="Arial" font-size="9" fill="#3949AB" font-weight="bold">Use Cases:</text>
    <text x="170" y="380" font-family="monospace" font-size="8" fill="#E65100">grep -i 'error' syslog</text>
    <text x="210" y="393" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">grep '/bin/bash$' /etc/passwd</text>
  </g>
</svg>