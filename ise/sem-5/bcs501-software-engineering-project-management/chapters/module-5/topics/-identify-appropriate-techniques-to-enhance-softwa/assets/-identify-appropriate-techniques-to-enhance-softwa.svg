<svg width="420" height="400" data-topic-id="software-quality-enancement-techniques">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  
  <section data-narration="Introduction to Software Quality Enhancement">
    <title>Software Quality Enhancement</title>
  </section>
  <section data-narration="Definition of Software Quality">
    <text x="20" y="50" font-size="24">Software Quality Definition</text>
    <text x="20" y="80" font-size="18">Correctness, Reliability, Efficiency, Usability, Maintainability</text>
  </section>
  <section data-narration="Test-Driven Development (TDD) Technique">
    <title>TDD Technique</title>
    <text x="50" y="50" font-size="24">Write Test Before Code</text>
    <animate transform="rotate(360 50 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section data-narration="TDD Example">
    <text x="50" y="150" font-size="18">Example: Calculator Program</text>
    <text x="50" y="180" font-size="18">Write Test Before Code, Run Test, Refactor Code</text>
  </section>
  <section data-narration="Benefits of TDD">
    <title>Benefits of TDD</title>
    <text x="50" y="250" font-size="18">Reduced Defects, Improved Code Quality, Faster Development</text>
  </section>
  <section data-narration="Additional Software Quality Enhancement Techniques">
    <title>Additional Techniques</title>
    <text x="50" y="350" font-size="18">Code Review, Pair Programming, Refactoring</text>
  </section>
  <footer>
    <text x="20" y="400" font-size="18">Software Quality Enhancement Techniques</text>
  </footer>
</svg>