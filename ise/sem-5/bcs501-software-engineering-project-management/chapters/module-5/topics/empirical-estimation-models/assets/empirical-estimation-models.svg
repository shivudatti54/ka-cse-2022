<svg width="420" height="400" data-topic-id="Empirical Estimation Models">
  <style>
    /* Add some basic styling to make the SVG look decent */
    body {
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }
  </style>
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A7CDCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#color-gradient)" width="100%" height="100%"/>
  
  <!-- Title at top -->
  <text text-anchor="middle" x="50%" y="20" font-size="24" font-weight="bold">Empirical Estimation Models</text>
  
  <!-- Section 1: Historical Data Analysis -->
  <g transform="translate(50, 100)">
    <rect fill="#F7F7F7" width="80" height="30" rx="5"/>
    <text text-anchor="start" x="10" y="10" font-size="16">Historical Data Analysis</text>
    <text data-narration="Provides a baseline for estimating effort, takes into account historical data and trends." x="10" y="30" font-size="14" fill="#666" dy=".35em"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: Case Study Analysis -->
  <g transform="translate(50, 150)">
    <rect fill="#F7F7F7" width="80" height="30" rx="5"/>
    <text text-anchor="start" x="10" y="10" font-size="16">Case Study Analysis</text>
    <text data-narration="Provides a detailed analysis of the project, takes into account specific requirements and constraints." x="10" y="30" font-size="14" fill="#666" dy=".35em"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Expert Judgment -->
  <g transform="translate(50, 200)">
    <rect fill="#F7F7F7" width="80" height="30" rx="5"/>
    <text text-anchor="start" x="10" y="10" font-size="16">Expert Judgment</text>
    <text data-narration="Provides a human perspective, takes into account non-technical factors such as team dynamics and stakeholder expectations." x="10" y="30" font-size="14" fill="#666" dy=".35em"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 60" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Cost Accounting -->
  <g transform="translate(50, 250)">
    <rect fill="#F7F7F7" width="80" height="30" rx="5"/>
    <text text-anchor="start" x="10" y="10" font-size="16">Cost Accounting</text>
    <text data-narration="Provides a detailed analysis of costs, takes into account historical data and trends." x="10" y="30" font-size="14" fill="#666" dy=".35em"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 80" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 5: Simulation-Based Estimation -->
  <g transform="translate(50, 300)">
    <rect fill="#F7F7F7" width="80" height="30" rx="5"/>
    <text text-anchor="start" x="10" y="10" font-size="16">Simulation-Based Estimation</text>
    <text data-narration="Uses statistical models to estimate effort based on historical data." x="10" y="30" font-size="14" fill="#666" dy=".35em"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Title at bottom -->
  <text text-anchor="middle" x="50%" y="380" font-size="24" font-weight="bold">Empirical Estimation Models</text>
</svg>