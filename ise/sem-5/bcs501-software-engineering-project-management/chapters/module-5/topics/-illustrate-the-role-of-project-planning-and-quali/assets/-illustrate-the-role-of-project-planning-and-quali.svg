<svg width="420" height="400" data-topic-id="software-engineering-project-management-illustrating-the-role-of-project-planning-and-quality-management">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#backgroundGradient)"/>
  
  <!-- Sections with data-narration attributes explaining each part -->
  <section data-narration="project-planning">
    <rect x="0" y="50" width="420" height="150" fill="#F0E4CC"/>
    <text x="20" y="80" fill="#000" font-size="16" font-family="Arial">Project Planning</text>
    <animate transform="rotate(45 20 80)" begin="0s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="defining-project-scope">
    <rect x="0" y="230" width="420" height="150" fill="#C5CAE9"/>
    <text x="20" y="260" fill="#000" font-size="16" font-family="Arial">Defining Project Scope</text>
    <animate transform="rotate(90 20 260)" begin="2s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="developing-a-project-schedule">
    <rect x="0" y="410" width="420" height="150" fill="#F7D2C4"/>
    <text x="20" y="440" fill="#000" font-size="16" font-family="Arial">Developing a Project Schedule</text>
    <animate transform="rotate(135 20 440)" begin="4s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="allocating-resources">
    <rect x="0" y="190" width="420" height="150" fill="#B2FFFC"/>
    <text x="20" y="220" fill="#000" font-size="16" font-family="Arial">Allocating Resources</text>
    <animate transform="rotate(180 20 220)" begin="6s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="establishing-a-budget">
    <rect x="0" y="210" width="420" height="150" fill="#C5E1F5"/>
    <text x="20" y="240" fill="#000" font-size="16" font-family="Arial">Establishing a Budget</text>
    <animate transform="rotate(225 20 240)" begin="8s" dur="2s" repeat="forever"/>
  </section>
  
  <!-- Quality Management sections -->
  <section data-narration="quality-management">
    <rect x="0" y="50" width="420" height="150" fill="#66CCCC"/>
    <text x="20" y="80" fill="#000" font-size="16" font-family="Arial">Quality Management</text>
    <animate transform="rotate(45 20 80)" begin="0s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="defining-quality-standards">
    <rect x="0" y="230" width="420" height="150" fill="#C5CAE9"/>
    <text x="20" y="260" fill="#000" font-size="16" font-family="Arial">Defining Quality Standards</text>
    <animate transform="rotate(90 20 260)" begin="2s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="conducting-quality-assurance">
    <rect x="0" y="410" width="420" height="150" fill="#F7D2C4"/>
    <text x="20" y="440" fill="#000" font-size="16" font-family="Arial">Conducting Quality Assurance</text>
    <animate transform="rotate(135 20 440)" begin="4s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="implementing-testing-and-validation">
    <rect x="0" y="190" width="420" height="150" fill="#B2FFFC"/>
    <text x="20" y="220" fill="#000" font-size="16" font-family="Arial">Implementing Testing and Validation</text>
    <animate transform="rotate(180 20 220)" begin="6s" dur="2s" repeat="forever"/>
  </section>
  
  <!-- Arrow markers for connections -->
  <line x1="20" y1="100" x2="400" y2="100" stroke="#000" stroke-width="2"/>
  <line x1="20" y1="230" x2="400" y2="230" stroke="#000" stroke-width="2"/>
  <line x1="20" y1="410" x2="400" y2="410" stroke="#000" stroke-width="2"/>
  
  <!-- Title at top and footer at bottom -->
  <text x="20" y="10" fill="#000" font-size="24" font-family="Arial">Illustrating the Role of Project Planning and Quality Management in Software Development</text>
  <text x="20" y="390" fill="#000" font-size="18" font-family="Arial">Software Engineering & Project Management</text>
</svg>