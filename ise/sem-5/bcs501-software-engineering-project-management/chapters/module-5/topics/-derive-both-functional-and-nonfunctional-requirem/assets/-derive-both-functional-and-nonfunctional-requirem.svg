<svg width="420" height="400">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B0C4DE" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="20" y="50" font-size="24" font-family="Arial" fill="#2F4F7F">Deriving Functional and Nonfunctional Requirements</text>
  <rect x="50" y="100" width="200" height="100" fill="#FFC107" rx="10"/>
  <text x="60" y="120" font-size="18" font-family="Arial" fill="#2F4F7F" data-narration="Identify the problem domain">Identify the problem domain</text>
  <rect x="270" y="100" width="200" height="100" fill="#2F4F7F" rx="10"/>
  <text x="280" y="120" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Define the user needs">Define the user needs</text>
  <rect x="50" y="220" width="200" height="100" fill="#2F4F7F" rx="10"/>
  <text x="60" y="240" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Brainstorm possible solutions">Brainstorm possible solutions</text>
  <rect x="270" y="220" width="200" height="100" fill="#2F4F7F" rx="10"/>
  <text x="280" y="240" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Prioritize the solutions">Prioritize the solutions</text>
  <rect x="50" y="320" width="200" height="100" fill="#2F4F7F" rx="10"/>
  <text x="60" y="340" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Refine the solutions">Refine the solutions</text>
  <rect x="50" y="10" width="200" height="20" fill="#2F4F7F" rx="10"/>
  <text x="60" y="30" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Nonfunctional requirements are limitations and constraints of a system">Nonfunctional requirements</text>
  <rect x="270" y="10" width="200" height="20" fill="#2F4F7F" rx="10"/>
  <text x="280" y="30" font-size="18" font-family="Arial" fill="#FFC107" data-narration="These include performance, security, and usability requirements">These include</text>
  <rect x="50" y="40" width="200" height="20" fill="#2F4F7F" rx="10"/>
  <text x="60" y="60" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Performance requirements describe how quickly a system should respond">Performance</text>
  <rect x="270" y="40" width="200" height="20" fill="#2F4F7F" rx="10"/>
  <text x="280" y="60" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Security requirements describe the protection of user data">Security</text>
  <rect x="50" y="60" width="200" height="20" fill="#2F4F7F" rx="10"/>
  <text x="60" y="80" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Usability requirements describe how easy a system should be to use">Usability</text>
  <rect x="270" y="60" width="200" height="20" fill="#2F4F7F" rx="10"/>
  <text x="280" y="80" font-size="18" font-family="Arial" fill="#FFC107" data-narration="These requirements are crucial for the success of a system">These</text>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  <line x1="50" y1="100" x2="200" y2="100" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="270" y1="100" x2="400" y2="100" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="50" y1="150" x2="200" y2="150" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="270" y1="150" x2="400" y2="150" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="50" y1="200" x2="200" y2="200" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="270" y1="200" x2="400" y2="200" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="50" y1="250" x2="200" y2="250" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="270" y1="250" x2="400" y2="250" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="50" y1="300" x2="200" y2="300" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="270" y1="300" x2="400" y2="300" stroke="#2F4F7F" stroke-width="2"/>
  <title>Deriving Functional and Nonfunctional Requirements</title>
  <defs>
    <path id="arrow" d="M0,0 L10,10 L0,20 Z"/>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="white"/>
  <rect x="10" y="10" width="400" height="40" fill="#2F4F7F" rx="10"/>
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#2F4F7F" text-anchor="start">Requirements</text>
  <rect x="10" y="350" width="400" height="40" fill="#2F4F7F" rx="10"/>
  <text x="20" y="370" font-size="24" font-family="Arial" fill="#2F4F7F" text-anchor="start">Education</text>
  <rect x="10" y="390" width="400" height="10" fill="#2F4F7F" rx="10"/>
  <text x="20" y="410" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Arrow markers</text>
  <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="5s"/>
  <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="5s"/>
</svg>