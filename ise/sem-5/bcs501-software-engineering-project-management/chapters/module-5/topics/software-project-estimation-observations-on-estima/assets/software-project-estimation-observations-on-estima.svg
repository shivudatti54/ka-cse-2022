<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5E66CC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4F67B7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3B5C9E" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <g transform="translate(20, 40)">
    <rect x="0" y="0" width="400" height="200" fill="#FFFFFF" rx="10"/>
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#2E4053">Software Project Estimation</text>
    <g data-topic-id="introduction" data-narration="Introduction to Software Project Estimation">
      <rect x="0" y="50" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="60" font-size="18" font-family="Arial" fill="#2E4053">Software project estimation is a critical component of software engineering and project management.</text>
      <animateTransform attributeName="transform" type="translate" from="0,50" to="0,0" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="80" font-size="18" font-family="Arial" fill="#2E4053">It involves estimating the effort, cost, and time required to complete a software project.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-topic-id="definition" data-narration="Definition of Software Project Estimation">
      <rect x="0" y="230" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="240" font-size="18" font-family="Arial" fill="#2E4053">Software project estimation is the process of estimating the effort, cost, and time required to complete a software project.</text>
      <animateTransform attributeName="transform" type="translate" from="0,230" to="0,0" begin="2s" dur="2s" repeatCount="indefinite"/>
      <text x="20" y="260" font-size="18" font-family="Arial" fill="#2E4053">It involves making predictions about the resources needed to complete the project, including personnel, materials, and equipment.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,240" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-topic-id="types" data-narration="Types of Estimation">
      <rect x="0" y="390" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="400" font-size="18" font-family="Arial" fill="#2E4053">There are three types of estimation:</text>
      <rect x="40" y="420" width="50" height="20" fill="#F7F7F7" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="90" y="420" font-size="18" font-family="Arial" fill="#2E4053">Bottom-up Estimation</text>
      <rect x="0" y="460" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="470" font-size="18" font-family="Arial" fill="#2E4053">Top-down Estimation</text>
      <rect x="0" y="520" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="530" font-size="18" font-family="Arial" fill="#2E4053">Hybrid Estimation</text>
      <animateTransform attributeName="transform" type="translate" from="0,520" to="0,0" begin="4s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-topic-id="accuracy" data-narration="Factors Affecting Estimation Accuracy">
      <rect x="0" y="590" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="600" font-size="18" font-family="Arial" fill="#2E4053">Several factors can affect the accuracy of estimation, including:</text>
      <rect x="40" y="620" width="50" height="20" fill="#F7F7F7" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="90" y="620" font-size="18" font-family="Arial" fill="#2E4053">Complexity of the project</text>
      <rect x="0" y="670" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="680" font-size="18" font-family="Arial" fill="#2E4053">Availability of data</text>
      <rect x="0" y="730" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="740" font-size="18" font-family="Arial" fill="#2E4053">Assumptions and uncertainties</text>
      <animateTransform attributeName="transform" type="translate" from="0,730" to="0,0" begin="6s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-topic-id="techniques" data-narration="Estimation Techniques">
      <rect x="0" y="800" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="810" font-size="18" font-family="Arial" fill="#2E4053">There are several estimation techniques available, including:</text>
      <rect x="40" y="840" width="50" height="20" fill="#F7F7F7" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="90" y="840" font-size="18" font-family="Arial" fill="#2E4053">Bottom-up Estimation</text>
      <rect x="0" y="890" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="900" font-size="18" font-family="Arial" fill="#2E4053">Top-down Estimation</text>
      <rect x="0" y="950" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="960" font-size="18" font-family="Arial" fill="#2E4053">Hybrid Estimation</text>
      <animateTransform attributeName="transform" type="translate" from="0,950" to="0,0" begin="8s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-topic-id="mistakes" data-narration="Common Estimation Mistakes">
      <rect x="0" y="1000" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="1010" font-size="18" font-family="Arial" fill="#2E4053">There are several common estimation mistakes to watch out for, including:</text>
      <rect x="40" y="1040" width="50" height="20" fill="#F7F7F7" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="90" y="1040" font-size="18" font-family="Arial" fill="#2E4053">Overestimation</text>
      <rect x="0" y="1090" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="1100" font-size="18" font-family="Arial" fill="#2E4053">Underestimation</text>
      <rect x="0" y="1160" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="1170" font-size="18" font-family="Arial" fill="#2E4053">Ignoring uncertainty</text>
      <animateTransform attributeName="transform" type="translate" from="0,1160" to="0,0" begin="10s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-topic-id="best-practices" data-narration="Best Practices for Software Project Estimation">
      <rect x="0" y="1200" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="1210" font-size="18" font-family="Arial" fill="#2E4053">To improve estimation accuracy, follow these best practices:</text>
      <rect x="40" y="1240" width="50" height="20" fill="#F7F7F7" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="90" y="1240" font-size="18" font-family="Arial" fill="#2E4053">Use multiple estimation techniques</text>
      <rect x="0" y="1290" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="1300" font-size="18" font-family="Arial" fill="#2E4053">Consider the complexity of the project</text>
      <rect x="0" y="1390" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="1400" font-size="18" font-family="Arial" fill="#2E4053">Use historical data and analogies</text>
      <animateTransform attributeName="transform" type="translate" from="0,1390" to="0,0" begin="12s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-topic-id="footer" data-narration="Footer">
      <rect x="0" y="1500" width="400" height="80" fill="#F7F7F7" rx="10"/>
      <text x="20" y="1510" font-size="18" font-family="Arial" fill="#2E4053">This diagram illustrates the importance of software project estimation and its various aspects.</text>
    </g>
  </g>
</svg>