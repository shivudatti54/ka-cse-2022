<svg width="420" height="400" data-topic-id="software-testing-methods-and-agile">
  <defs>
    <style>.section { fill: none; stroke: #333; stroke-width: 1; }</style>
    <style>.connection { stroke: #666; stroke-width: 2; stroke-linecap: round; }</style>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="#ADD8E6"/>
  <defs>
    <style>.pastel1 { filter: progid:DXImageTransform.ColorMatrix(1 0 0 0 30); }</style>
    <style>.pastel2 { filter: progid:DXImageTransform.ColorMatrix(1 0 0 0 -30); }</style>
    <style>.pastel3 { filter: progid:DXImageTransform.ColorMatrix(1 0 0 0 60); }</style>
    <style>.pastel4 { filter: progid:DXImageTransform.ColorMatrix(1 0 0 0 -60); }</style>
  </defs>
  <g id="title">
    <text x="50" y="50" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="Title">Software Testing Methods and Agile Methodology</text>
  </g>
  <g id="footer">
    <text x="50" y="350" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="Footer">Software Testing Methods and Agile Methodology</text>
  </g>
  <g id="sections">
    <g id="section1">
      <rect x="50" y="100" width="120" height="100" fill="#C9E4CA" rx="10"/>
      <text x="70" y="160" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="Black Box Testing: Focuses on inputs and expected outputs, tests software without knowledge of its internal workings." class="section"/>
      <circle cx="90" cy="150" r="10" fill="#2F4F7F" data-narration="Identify inputs, expected outputs, and defects"/>
      <line x1="50" y1="80" x2="170" y2="80" stroke="#666" stroke-width="2" data-narration="Test software with different inputs"/>
      <line x1="150" y1="80" x2="150" y2="200" stroke="#666" stroke-width="2" data-narration="Verify expected outputs"/>
      <line x1="90" y1="150" x2="90" y2="180" stroke="#666" stroke-width="2" data-narration="Check for defects"/>
    </g>
    <g id="section2">
      <rect x="50" y="220" width="120" height="100" fill="#C9E4CA" rx="10"/>
      <text x="70" y="280" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="White Box Testing: Focuses on internal workings of software, tests software by examining its source code or design." class="section"/>
      <circle cx="90" cy="250" r="10" fill="#2F4F7F" data-narration="Examine source code or design"/>
      <line x1="50" y1="190" x2="170" y2="190" stroke="#666" stroke-width="2" data-narration="Identify internal workings of software"/>
      <line x1="150" y1="190" x2="150" y2="220" stroke="#666" stroke-width="2" data-narration="Test software by examining its internal workings"/>
    </g>
    <g id="section3">
      <rect x="50" y="340" width="120" height="100" fill="#C9E4CA" rx="10"/>
      <text x="70" y="400" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="Gray Box Testing: Combines elements of black box and white box testing, tests software by understanding some of its internal workings." class="section"/>
      <circle cx="90" cy="370" r="10" fill="#2F4F7F" data-narration="Understand internal workings of software"/>
      <line x1="50" y1="330" x2="170" y2="330" stroke="#666" stroke-width="2" data-narration="Identify internal workings of software"/>
      <line x1="150" y1="330" x2="150" y2="360" stroke="#666" stroke-width="2" data-narration="Test software by understanding some of its internal workings"/>
    </g>
    <g id="section4">
      <rect x="50" y="100" width="120" height="100" fill="#C9E4CA" rx="10"/>
      <text x="70" y="160" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="Acceptance Testing: Verifies that software meets requirements and specifications, tests software against a set of predefined acceptance criteria." class="section"/>
      <circle cx="90" cy="150" r="10" fill="#2F4F7F" data-narration="Verify requirements and specifications"/>
      <line x1="50" y1="80" x2="170" y2="80" stroke="#666" stroke-width="2" data-narration="Test software against predefined acceptance criteria"/>
      <line x1="150" y1="80" x2="150" y2="200" stroke="#666" stroke-width="2" data-narration="Verify expected outcomes"/>
    </g>
    <g id="section5">
      <rect x="50" y="220" width="120" height="100" fill="#C9E4CA" rx="10"/>
      <text x="70" y="280" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="Exploratory Testing: Involves manual testing with no pre-defined test cases, tests software to identify potential issues and defects." class="section"/>
      <circle cx="90" cy="250" r="10" fill="#2F4F7F" data-narration="Manually test software"/>
      <line x1="50" y1="190" x2="170" y2="190" stroke="#666" stroke-width="2" data-narration="Identify potential issues and defects"/>
      <line x1="150" y1="190" x2="150" y2="220" stroke="#666" stroke-width="2" data-narration="Test software to identify potential issues and defects"/>
    </g>
    <g id="section6">
      <rect x="50" y="340" width="120" height="100" fill="#C9E4CA" rx="10"/>
      <text x="70" y="400" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="Equivalence Partitioning Testing: Divides input data into partitions based on its values, tests all possible values within each partition." class="section"/>
      <circle cx="90" cy="370" r="10" fill="#2F4F7F" data-narration="Divide input data into partitions"/>
      <line x1="50" y1="330" x2="170" y2="330" stroke="#666" stroke-width="2" data-narration="Test all possible values within each partition"/>
      <line x1="150" y1="330" x2="150" y2="360" stroke="#666" stroke-width="2" data-narration="Verify expected outcomes"/>
    </g>
  </g>
  <g id="agile">
    <rect x="50" y="50" width="320" height="300" fill="#ADD8E6"/>
    <text x="50" y="50" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F" stroke="#2F4F7F" stroke-width="2" data-narration="Agile Methodology" class="section"/>
    <circle cx="90" cy="100" r="10" fill="#2F4F7F" data-narration="Focus on delivering working software in short iterations"/>
    <line x1="50" y1="80" x2="170" y2="80" stroke="#666" stroke-width="2" data-narration="Iterate and refine software development process"/>
    <line x1="150" y1="80" x2="150" y2="200" stroke="#666" stroke-width="2" data-narration="Continuously deliver working software in short iterations"/>
  </g>
  <g id="connections">
    <line x1="100" y1="200" x2="120" y2="200" data-narration="Connects black box testing to white box testing" class="connection"/>
    <line x1="150" y1="200" x2="170" y2="200" data-narration="Connects white box testing to gray box testing" class="connection"/>
    <line x1="200" y1="200" x2="220" y2="200" data-narration="Connects gray box testing to acceptance testing" class="connection"/>
    <line x1="250" y1="200" x2="270" y2="200" data-narration="Connects acceptance testing to exploratory testing" class="connection"/>
    <line x1="300" y1="200" x2="320" y2="200" data-narration="Connects exploratory testing to equivalence partitioning testing" class="connection"/>
  </g>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="3s" repeatCount="indefinite">
    <animateTransform transform="rotate(360 200 200)" />
  </animate>
</svg>