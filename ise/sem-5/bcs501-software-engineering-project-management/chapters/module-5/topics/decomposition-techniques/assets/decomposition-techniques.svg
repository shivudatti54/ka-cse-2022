<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="decomposition-techniques">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title (0.3s) -->
  <g opacity="0" data-narration="Decomposition Techniques break large software projects into smaller, estimable components for better planning and estimation.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#3949AB">Decomposition Techniques</text>
    <line x1="105" y1="32" x2="315" y2="32" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <text x="210" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#5C6BC0">Software Project Estimation &amp; Planning</text>
  </g>

  <!-- G2: WBS Tree Hierarchy (1.5s) -->
  <g opacity="0" data-narration="Work Breakdown Structure decomposes a project into phases, then tasks, then subtasks, creating a manageable hierarchy.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Section label -->
    <rect x="8" y="52" width="200" height="14" fill="#3949AB" rx="3"/>
    <text x="108" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">WBS - Work Breakdown Structure</text>
    <!-- Project node -->
    <rect x="74" y="72" width="68" height="18" fill="#3949AB" rx="4"/>
    <text x="108" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Project</text>
    <!-- Lines to phases -->
    <line x1="90" y1="90" x2="42" y2="100" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="108" y1="90" x2="108" y2="100" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="126" y1="90" x2="174" y2="100" stroke="#3949AB" stroke-width="1.2"/>
    <!-- Phase nodes -->
    <rect x="14" y="100" width="56" height="16" fill="#5C6BC0" rx="3"/>
    <text x="42" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Phase 1</text>
    <rect x="80" y="100" width="56" height="16" fill="#5C6BC0" rx="3"/>
    <text x="108" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Phase 2</text>
    <rect x="146" y="100" width="56" height="16" fill="#5C6BC0" rx="3"/>
    <text x="174" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Phase 3</text>
    <!-- Lines to tasks from Phase 1 -->
    <line x1="30" y1="116" x2="22" y2="124" stroke="#5C6BC0" stroke-width="1"/>
    <line x1="54" y1="116" x2="62" y2="124" stroke="#5C6BC0" stroke-width="1"/>
    <!-- Task nodes -->
    <rect x="6" y="124" width="34" height="14" fill="#7986CB" rx="2"/>
    <text x="23" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Task 1</text>
    <rect x="46" y="124" width="34" height="14" fill="#7986CB" rx="2"/>
    <text x="63" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Task 2</text>
    <!-- Lines to subtasks -->
    <line x1="23" y1="138" x2="18" y2="145" stroke="#7986CB" stroke-width="0.8"/>
    <line x1="23" y1="138" x2="38" y2="145" stroke="#7986CB" stroke-width="0.8"/>
    <!-- Subtask nodes -->
    <rect x="4" y="145" width="30" height="12" fill="#9FA8DA" rx="2"/>
    <text x="19" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="white">Sub 1a</text>
    <rect x="38" y="145" width="30" height="12" fill="#9FA8DA" rx="2"/>
    <text x="53" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="white">Sub 1b</text>
    <!-- Flow arrow label -->
    <text x="150" y="155" font-family="Arial,sans-serif" font-size="6" fill="#3949AB" font-style="italic">Divide until estimable</text>
  </g>

  <!-- G3: LOC Size-based Estimation (3.0s) -->
  <g opacity="0" data-narration="Size-based LOC estimation breaks software into functions, estimates lines of code for each, then sums the total for the project estimate.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="218" y="52" width="194" height="14" fill="#00695C" rx="3"/>
    <text x="315" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">LOC Size-Based Estimation</text>
    <!-- Software box -->
    <rect x="275" y="72" width="80" height="16" fill="#00695C" rx="3"/>
    <text x="315" y="83" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="white">Software</text>
    <!-- Arrow down -->
    <line x1="315" y1="88" x2="315" y2="95" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
    <!-- Function boxes -->
    <rect x="226" y="97" width="52" height="22" fill="#00897B" rx="3"/>
    <text x="252" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="white">Function A</text>
    <text x="252" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#B2DFDB">~200 LOC</text>
    <rect x="284" y="97" width="52" height="22" fill="#00897B" rx="3"/>
    <text x="310" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="white">Function B</text>
    <text x="310" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#B2DFDB">~350 LOC</text>
    <rect x="342" y="97" width="52" height="22" fill="#00897B" rx="3"/>
    <text x="368" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="white">Function C</text>
    <text x="368" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#B2DFDB">~150 LOC</text>
    <!-- Arrow to sum -->
    <line x1="252" y1="119" x2="315" y2="130" stroke="#00695C" stroke-width="0.8"/>
    <line x1="310" y1="119" x2="315" y2="130" stroke="#00695C" stroke-width="0.8"/>
    <line x1="368" y1="119" x2="315" y2="130" stroke="#00695C" stroke-width="0.8"/>
    <!-- Total box -->
    <rect x="272" y="130" width="86" height="16" fill="#004D40" rx="3"/>
    <text x="315" y="141" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E0F2F1">Total = ~700 LOC</text>
    <text x="315" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00695C" font-style="italic">Estimate each, sum all</text>
  </g>

  <!-- G4: Function Point Estimation (4.5s) -->
  <g opacity="0" data-narration="Function Point estimation counts external inputs, outputs, inquiries, internal files, and external interfaces, then applies complexity weights to get the total FP count.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="8" y="168" width="200" height="14" fill="#E65100" rx="3"/>
    <text x="108" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Function Point Estimation</text>
    <!-- FP table header -->
    <rect x="10" y="186" width="90" height="12" fill="#F57C00" rx="2"/>
    <text x="55" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="white">Domain Value</text>
    <rect x="102" y="186" width="50" height="12" fill="#F57C00" rx="2"/>
    <text x="127" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="white">Count</text>
    <rect x="154" y="186" width="50" height="12" fill="#F57C00" rx="2"/>
    <text x="179" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="white">Weight</text>
    <!-- Rows -->
    <rect x="10" y="200" width="90" height="10" fill="#FFF3E0" rx="1"/>
    <text x="55" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">External Inputs (EI)</text>
    <text x="127" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">4</text>
    <text x="179" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">x 4</text>

    <rect x="10" y="212" width="90" height="10" fill="#FFE0B2" rx="1"/>
    <text x="55" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">External Outputs (EO)</text>
    <text x="127" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">5</text>
    <text x="179" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">x 5</text>

    <rect x="10" y="224" width="90" height="10" fill="#FFF3E0" rx="1"/>
    <text x="55" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">External Inquiries (EQ)</text>
    <text x="127" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">3</text>
    <text x="179" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">x 4</text>

    <rect x="10" y="236" width="90" height="10" fill="#FFE0B2" rx="1"/>
    <text x="55" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">Internal Files (ILF)</text>
    <text x="127" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">2</text>
    <text x="179" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">x 10</text>

    <rect x="10" y="248" width="90" height="10" fill="#FFF3E0" rx="1"/>
    <text x="55" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">Ext. Interfaces (EIF)</text>
    <text x="127" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">1</text>
    <text x="179" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">x 7</text>

    <!-- Formula -->
    <rect x="20" y="262" width="180" height="14" fill="#BF360C" rx="3"/>
    <text x="110" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="white">FP = Count Total x [0.65 + 0.01 x Fi]</text>
  </g>

  <!-- G5: COCOMO Effort Estimation (6.0s) -->
  <g opacity="0" data-narration="COCOMO model provides three levels of effort estimation: Basic for quick early estimates, Intermediate adding cost drivers, and Detailed for per-phase granularity using E equals a times KLOC to the power b.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="218" y="168" width="194" height="14" fill="#C62828" rx="3"/>
    <text x="315" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">COCOMO Effort Estimation</text>
    <!-- Formula box -->
    <rect x="248" y="186" width="134" height="18" fill="#D32F2F" rx="4"/>
    <text x="315" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">E = a (KLOC)^b</text>
    <!-- Three levels -->
    <!-- Basic -->
    <rect x="222" y="210" width="58" height="42" fill="#EF5350" rx="4" stroke="#C62828" stroke-width="0.8"/>
    <text x="251" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="white">Basic</text>
    <text x="251" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">Quick estimate</text>
    <text x="251" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">a=2.4, b=1.05</text>
    <text x="251" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">(Organic)</text>
    <!-- Intermediate -->
    <rect x="284" y="210" width="58" height="42" fill="#E53935" rx="4" stroke="#C62828" stroke-width="0.8"/>
    <text x="313" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="white">Intermediate</text>
    <text x="313" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">+ Cost drivers</text>
    <text x="313" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">15 attributes</text>
    <text x="313" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">EAF applied</text>
    <!-- Detailed -->
    <rect x="346" y="210" width="58" height="42" fill="#C62828" rx="4" stroke="#B71C1C" stroke-width="0.8"/>
    <text x="375" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="white">Detailed</text>
    <text x="375" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">Per-phase</text>
    <text x="375" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">estimates</text>
    <text x="375" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCDD2">Most accurate</text>
    <!-- Arrow showing progression -->
    <line x1="280" y1="258" x2="345" y2="258" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="312" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-style="italic">Increasing accuracy</text>
  </g>

  <!-- G6: Benefits (7.5s) -->
  <g opacity="0" data-narration="Decomposition techniques provide better estimation accuracy, manageable work pieces, trackable progress, and risk identification at every level of the project.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="8" y="284" width="404" height="14" fill="#3949AB" rx="3"/>
    <text x="210" y="294" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Benefits of Decomposition Techniques</text>
    <!-- Benefit cards -->
    <rect x="10" y="304" width="95" height="40" fill="white" rx="5" stroke="#3949AB" stroke-width="1"/>
    <circle cx="28" cy="316" r="7" fill="#3949AB"/>
    <text x="28" y="319" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">1</text>
    <text x="62" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#3949AB">Better</text>
    <text x="62" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#3949AB">Accuracy</text>
    <text x="57" y="339" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5C6BC0">Smaller = precise</text>

    <rect x="112" y="304" width="95" height="40" fill="white" rx="5" stroke="#00695C" stroke-width="1"/>
    <circle cx="130" cy="316" r="7" fill="#00695C"/>
    <text x="130" y="319" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">2</text>
    <text x="164" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#00695C">Manageable</text>
    <text x="164" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#00695C">Pieces</text>
    <text x="159" y="339" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#00897B">Divide &amp; conquer</text>

    <rect x="214" y="304" width="95" height="40" fill="white" rx="5" stroke="#E65100" stroke-width="1"/>
    <circle cx="232" cy="316" r="7" fill="#E65100"/>
    <text x="232" y="319" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">3</text>
    <text x="266" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#E65100">Trackable</text>
    <text x="266" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#E65100">Progress</text>
    <text x="261" y="339" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#F57C00">Monitor milestones</text>

    <rect x="316" y="304" width="95" height="40" fill="white" rx="5" stroke="#C62828" stroke-width="1"/>
    <circle cx="334" cy="316" r="7" fill="#C62828"/>
    <text x="334" y="319" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">4</text>
    <text x="368" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#C62828">Risk</text>
    <text x="368" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#C62828">Identification</text>
    <text x="363" y="339" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#E53935">Spot issues early</text>

    <!-- Bottom summary -->
    <text x="210" y="360" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#3949AB" font-style="italic">Decompose project scope to improve estimation reliability at every level</text>
  </g>

  <!-- Subtle watermark -->
  <text x="210" y="392" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#9FA8DA" opacity="0.6">BCS501 - Software Engineering &amp; Project Management - Module 5</text>
</svg>
