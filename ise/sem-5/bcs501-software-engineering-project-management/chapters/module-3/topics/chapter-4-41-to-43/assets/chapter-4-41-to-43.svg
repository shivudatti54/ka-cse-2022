<svg width="420" height="400" data-topic-id="software-engineering-project-management" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1" />
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Section 1: Introduction to Software Engineering -->
  <section data-narration="Introduction to Software Engineering">
    <rect x="0" y="20" width="420" height="50" fill="#2f4f7f" rx="10" />
    <text x="15" y="30" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">Software Engineering</text>
    <animateTransform x="15" y="30" attributeName="transform" type="translate" from="0,30" to="0,40" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 2: Software Development Lifecycle (SDLC) -->
  <section data-narration="Software Development Lifecycle (SDLC)">
    <rect x="0" y="70" width="420" height="50" fill="#2f4f7f" rx="10" />
    <text x="15" y="80" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">SDLC</text>
    <animateTransform x="15" y="80" attributeName="transform" type="translate" from="0,80" to="0,90" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="90" width="400" height="10" fill="#87ceeb" rx="5" />
  </section>
  
  <!-- Section 3: Software Engineering Principles -->
  <section data-narration="Software Engineering Principles">
    <rect x="0" y="120" width="420" height="50" fill="#2f4f7f" rx="10" />
    <text x="15" y="130" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">Software Engineering Principles</text>
    <animateTransform x="15" y="130" attributeName="transform" type="translate" from="0,130" to="0,140" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="140" width="400" height="10" fill="#87ceeb" rx="5" />
  </section>
  
  <!-- Section 4: Project Management -->
  <section data-narration="Project Management">
    <rect x="0" y="170" width="420" height="50" fill="#2f4f7f" rx="10" />
    <text x="15" y="180" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">Project Management</text>
    <animateTransform x="15" y="180" attributeName="transform" type="translate" from="0,180" to="0,190" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="190" width="400" height="10" fill="#87ceeb" rx="5" />
  </section>
  
  <!-- Section 5: Software Engineering Process -->
  <section data-narration="Software Engineering Process">
    <rect x="0" y="220" width="420" height="50" fill="#2f4f7f" rx="10" />
    <text x="15" y="230" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">Software Engineering Process</text>
    <animateTransform x="15" y="230" attributeName="transform" type="translate" from="0,230" to="0,240" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="240" width="400" height="10" fill="#87ceeb" rx="5" />
  </section>
  
  <!-- Footer -->
  <rect x="0" y="270" width="420" height="30" fill="#2f4f7f" rx="10" />
  <text x="15" y="280" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Software Engineering & Project Management</text>
  <animateTransform x="15" y="280" attributeName="transform" type="translate" from="0,280" to="0,290" begin="0s" dur="2s" repeatCount="indefinite" />
</svg>