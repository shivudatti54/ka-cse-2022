<svg width="420" height="400" data-topic-id="principles-that-guide-each-framework-activity" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">

    <!-- Gradient Background -->
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4CAF50" stop-opacity="1"/>
            <stop offset="50%" stop-color="#32CD32" stop-opacity="1"/>
            <stop offset="100%" stop-color="#3e8e41" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <rect x="50" y="50" width="320" height="300" fill="url(#grad)"/>

    <!-- Section 1: Agile Framework -->
    <g transform="translate(50,50)">
        <rect x="0" y="0" width="100" height="30" fill="#007bff" rx="5"/>

        <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff">Agile Framework</text>

        <text x="10" y="30" font-size="14" font-family="Arial" fill="#ffffff">Definition</text>

        <text x="10" y="45" font-size="14" font-family="Arial" fill="#ffffff">Agile is an iterative and incremental approach to software development that emphasizes flexibility, collaboration, and customer satisfaction.</text>

        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Section 2: Waterfall Framework -->
    <g transform="translate(210,50)">
        <rect x="0" y="0" width="100" height="30" fill="#007bff" rx="5"/>

        <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff">Waterfall Framework</text>

        <text x="10" y="30" font-size="14" font-family="Arial" fill="#ffffff">Definition</text>

        <text x="10" y="45" font-size="14" font-family="Arial" fill="#ffffff">Waterfall is a linear and sequential approach to software development that emphasizes predictability, stability, and control.</text>

        <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Section 3: Key Principles -->
    <g transform="translate(50,120)">
        <rect x="0" y="0" width="320" height="30" fill="#007bff" rx="5"/>

        <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff">Key Principles</text>

        <text x="10" y="30" font-size="14" font-family="Arial" fill="#ffffff">Individuals and interactions over processes and tools</text>

        <text x="10" y="50" font-size="14" font-family="Arial" fill="#ffffff">Working software over comprehensive documentation</text>

        <text x="10" y="70" font-size="14" font-family="Arial" fill="#ffffff">Customer collaboration over contract negotiation</text>

        <text x="10" y="90" font-size="14" font-family="Arial" fill="#ffffff">Responding to change over following a plan</text>

        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Section 4: Agile Key Principles -->
    <g transform="translate(210,120)">
        <rect x="0" y="0" width="100" height="30" fill="#007bff" rx="5"/>

        <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff">Agile Key Principles</text>

        <text x="10" y="30" font-size="14" font-family="Arial" fill="#ffffff">Prioritize delivering working software over documenting every detail</text>

        <text x="10" y="50" font-size="14" font-family="Arial" fill="#ffffff">Encourage collaboration with customers throughout the project</text>

        <text x="10" y="70" font-size="14" font-family="Arial" fill="#ffffff">Emphasize adaptability and responding to change rather than following a fixed plan</text>

        <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Section 5: Waterfall Key Principles -->
    <g transform="translate(50,210)">
        <rect x="0" y="0" width="320" height="30" fill="#007bff" rx="5"/>

        <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff">Waterfall Key Principles</text>

        <text x="10" y="30" font-size="14" font-family="Arial" fill="#ffffff">Prioritize maintaining stability and control over adapting to change</text>

        <text x="10" y="50" font-size="14" font-family="Arial" fill="#ffffff">Document every detail and requirement before proceeding to the next phase</text>

        <text x="10" y="70" font-size="14" font-family="Arial" fill="#ffffff">Prioritize predicting requirements and delivering software in a linear and sequential manner</text>

        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Section 6: Comparison -->
    <g transform="translate(210,210)">
        <rect x="0" y="0" width="100" height="30" fill="#007bff" rx="5"/>

        <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff">Comparison</text>

        <text x="10" y="30" font-size="14" font-family="Arial" fill="#ffffff">Agile focuses on delivering working software and customer collaboration, while Waterfall focuses on maintaining stability and control.</text>

        <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Title -->
    <text x="10" y="20" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="left">Principles That Guide Each Framework Activity</text>

    <!-- Footer -->
    <text x="10" y="380" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="left">Developed with love</text>

</svg>