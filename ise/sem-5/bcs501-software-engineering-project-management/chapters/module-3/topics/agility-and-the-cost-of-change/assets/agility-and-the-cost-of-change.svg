<svg width="420" height="400" data-topic-id="agility-cost-of-change" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="">
  <rect x="0" y="0" width="420" height="400" fill="rgba(75, 75, 75, 0.5)" />
