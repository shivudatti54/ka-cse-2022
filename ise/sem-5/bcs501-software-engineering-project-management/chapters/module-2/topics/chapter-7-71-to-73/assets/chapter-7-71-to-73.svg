<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="software-design" data-slugified-name="Software Design">
  <defs>
    <linearGradient id="gradient-background" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7A8CFF" stop-opacity="1"/>
      <stop offset="1" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient-background)"/>
  <g id="title">
    <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start" fill="#3498DB">
      <tspan data-narration="Title explains software design">Software Design</tspan>
    </text>
  </g>
  <g id="footer">
    <text x="10" y="380" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start" fill="#3498DB">
      <tspan data-narration="Footer provides additional information">Software Design</tspan>
    </text>
  </g>
  <g id="arrow-markers">
    <circle cx="20" cy="40" r="10" fill="none" stroke="#3498DB" stroke-width="2"/>
    <line x1="20" y1="40" x2="80" y2="120" stroke="#3498DB" stroke-width="2"/>
  </g>
  <g id="sections">
    <rect x="60" y="80" width="300" height="100" fill="#fff" rx="10"/>
    <text x="70" y="90" font-size="18" font-family="Arial" text-anchor="start" fill="#5B6368">
      <tspan data-narration="Section 1 explains the process of software design">Section 1: Software Design Process</tspan>
    </text>
    <rect x="60" y="200" width="300" height="100" fill="#fff" rx="10"/>
    <text x="70" y="210" font-size="18" font-family="Arial" text-anchor="start" fill="#5B6368">
      <tspan data-narration="Section 2 explains the different types of software designs">Section 2: Types of Software Designs</tspan>
    </text>
    <rect x="60" y="320" width="300" height="100" fill="#fff" rx="10"/>
    <text x="70" y="330" font-size="18" font-family="Arial" text-anchor="start" fill="#5B6368">
      <tspan data-narration="Section 3 explains the importance of software design">Section 3: Importance of Software Design</tspan>
    </text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="420,0" dur="2s" begin="0s" />
</svg>