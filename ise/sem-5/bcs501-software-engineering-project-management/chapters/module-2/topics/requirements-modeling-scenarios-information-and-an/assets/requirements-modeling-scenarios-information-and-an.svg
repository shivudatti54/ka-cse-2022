<svg width="420" height="400" data-topic-id="requirements-modeling-scenarios-information-and-analysis" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #f0f0f0; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">
  <defs>
    <style>
      .section {
        padding: 20px;
        border-bottom: 1px solid #ccc;
      }
      .section:last-child {
        border-bottom: none;
      }
      .animate {
        animation: fadeIn 2s;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </defs>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="350" rx="10" fill="#f0f0f0" />
    <rect x="0" y="0" width="420" height="40" rx="10" fill="#4f4f4f" />
    <g id="title">
      <text x="20" y="10" fill="#fff" font-size="24" font-weight="bold" text-anchor="start">Requirements Modeling Scenarios, Information and Analysis</text>
    </g>
    <g id="footer">
      <text x="20" y="370" fill="#fff" font-size="18" text-anchor="start">Developed by [Your Name]</text>
    </g>
    <g id="sections">
      <g class="section" data-narration="Introduction to Requirements Modeling">
        <rect x="20" y="60" width="380" height="80" rx="10" fill="#d1d1d1" />
        <text x="20" y="80" fill="#333" font-size="18" text-anchor="start">Requirements modeling is the process of creating a visual representation of the system's requirements</text>
      </g>
      <g class="section" data-narration="Requirement Analysis">
        <rect x="20" y="150" width="380" height="80" rx="10" fill="#d1d1d1" />
        <text x="20" y="170" fill="#333" font-size="18" text-anchor="start">Requirement analysis is the process of identifying, documenting, and analyzing the requirements of the system</text>
      </g>
      <g class="section" data-narration="Scenario-Based Modeling">
        <rect x="20" y="240" width="380" height="80" rx="10" fill="#d1d1d1" />
        <text x="20" y="260" fill="#333" font-size="18" text-anchor="start">Scenario-based modeling is a technique for creating a visual representation of the system's requirements</text>
      </g>
      <g class="section" data-narration="Key Concepts">
        <rect x="20" y="330" width="380" height="80" rx="10" fill="#d1d1d1" />
        <text x="20" y="350" fill="#333" font-size="18" text-anchor="start">Key concepts include functional requirements, non-functional requirements, and stakeholders</text>
      </g>
    </g>
    <g id="connections">
      <path id="connection1" d="M 60 170 L 120 170" stroke="#333" stroke-width="2" />
      <path id="connection2" d="M 120 170 L 180 170" stroke="#333" stroke-width="2" />
      <path id="connection3" d="M 180 170 L 240 170" stroke="#333" stroke-width="2" />
    </g>
    <animate id="fade-in" attributes="opacity" begin="0s" dur="2s" repeatCount="forever" />
  </g>
</svg>