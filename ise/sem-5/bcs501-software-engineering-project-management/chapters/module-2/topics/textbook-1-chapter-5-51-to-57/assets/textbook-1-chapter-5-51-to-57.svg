<svg width="420" height="400" data-topic-id="textbook-1-chapter-5-51-to-57" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5"/>
      <stop offset="100%" stop-color="#C7E5F5"/>
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .section:last-child {
        margin-bottom: 0;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" text-anchor="start">Software Requirements</text>
    <rect x="0" y="40" width="400" height="150" rx="10" fill="#2E4053"/>
    <animateTransform attributeName="transform" dur="1000" begin="0s" type="translate(0, 150)" from="translate(0, 0)" to="translate(0, 100)"/>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start">Definition</text>
    <section data-narration="Introduction to Software Requirements Definition">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="#4C5154"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start">Software requirements are the specifications that describe the desired functionality of a software system.</text>
    </section>
    <section data-narration="The Importance of Software Requirements">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="#4C5154"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start">Software requirements are crucial in determining the feasibility, viability, and success of a software project.</text>
    </section>
    <section data-narration="Example of Software Requirements">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="#4C5154"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start">A software company develops an e-commerce platform for online shopping. The software requirements include:</text>
      <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start">- User authentication and authorization</text>
      <text x="10" y="50" font-size="16" font-family="Arial" text-anchor="start">- Product catalog management</text>
      <text x="10" y="70" font-size="16" font-family="Arial" text-anchor="start">- Payment gateway integration</text>
    </section>
    <section data-narration="Key Concepts: Functional, Non-Functional, and User Requirements">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="#4C5154"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start">- Functional requirements describe the desired functionality of the software.</text>
      <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start">- Non-functional requirements describe the constraints and limitations of the software.</text>
      <text x="10" y="50" font-size="16" font-family="Arial" text-anchor="start">- User requirements describe the needs and expectations of the users.</text>
    </section>
    <section data-narration="Types of Software Requirements">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="#4C5154"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start">There are two types of software requirements: functional and non-functional.</text>
    </section>
    <section data-narration="Functional Requirements">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="#4C5154"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start">Functional requirements describe the desired functionality of the software.</text>
    </section>
    <section data-narration="Non-Functional Requirements">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="#4C5154"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start">Non-functional requirements describe the constraints and limitations of the software.</text>
    </section>
    <section data-narration="Example of Functional and Non-Functional Requirements">
      <rect x="0" y="0" width="100" height="50" rx="5" fill="#4C5154"/>
      <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start">A software company develops a mobile app for tracking fitness goals. The functional requirements include:</text>
      <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start">- Tracking workout data</text>
      <text x="10" y="50" font-size="16" font-family="Arial" text-anchor="start">- Setting goals and targets</text>
      <text x="10" y="70" font-size="16" font-family="Arial" text-anchor="start">The non-functional requirements include:</text>
      <text x="10" y="90" font-size="16" font-family="Arial" text-anchor="start">- Security: the app should be secure and protect user data</text>
      <text x="10" y="110" font-size="16" font-family="Arial" text-anchor="start">- Performance: the app should be fast and responsive</text>
    </section>
    <g transform="translate(0, 340)">
      <rect x="0" y="0" width="400" height="60" rx="10" fill="#2E4053"/>
      <animateTransform attributeName="transform" dur="1000" begin="0s" type="translate(0, 60)" from="translate(0, 0)" to="translate(0, 120)"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="start">Study Tips</text>
      <text x="10" y="70" font-size="16" font-family="Arial" text-anchor="start">- Read the software requirements carefully to understand the desired functionality</text>
      <text x="10" y="90" font-size="16" font-family="Arial" text-anchor="start">- Identify the functional and non-functional requirements</text>
      <text x="10" y="110" font-size="16" font-family="Arial" text-anchor="start">- Analyze the user requirements to understand their needs and expectations</text>
    </g>
  </g>
  <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" data-topic-id="textbook-1-chapter-5-51-to-57">Textbook 1 Chapter 5 51 To 57</text>
  <rect x="0" y="380" width="400" height="20" fill="#2E4053"/>
  <text x="10" y="390" font-size="16" font-family="Arial" text-anchor="start">References</text>
</svg>