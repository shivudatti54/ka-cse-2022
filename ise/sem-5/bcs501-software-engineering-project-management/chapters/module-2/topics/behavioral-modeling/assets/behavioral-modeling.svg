<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="behavioral-modeling" role="img" aria-label="Behavioral Modeling in Software Engineering - animated diagram showing state, sequence, and activity diagrams with UML overview and purpose">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E65100"/>
    </marker>
    <marker id="arrowDashTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00695C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- ============ G1: Title (0.3s) ============ -->
  <g opacity="0" data-narration="Behavioral Modeling captures the dynamic behavior of a software system, showing how it responds to external events over time.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#3949AB">Behavioral Modeling</text>
    <line x1="115" y1="33" x2="305" y2="33" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <text x="210" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5C6BC0" font-style="italic">Dynamic aspects of software systems</text>
  </g>

  <!-- ============ G2: State Diagrams (1.5s) ============ -->
  <g opacity="0" data-narration="State diagrams show system states as rounded rectangles, transitions as labeled arrows with events and conditions, and use filled circles for initial and bullseye for final states.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="16" y="68" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3949AB">State Diagram</text>

    <!-- Initial state (filled circle) -->
    <circle cx="30" cy="90" r="6" fill="#3949AB"/>

    <!-- Transition arrow: initial to Idle -->
    <line x1="36" y1="90" x2="52" y2="90" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- State: Idle -->
    <rect x="54" y="78" width="52" height="24" rx="8" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <text x="80" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#3949AB">Idle</text>

    <!-- Transition: Idle to Processing -->
    <line x1="106" y1="90" x2="126" y2="90" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="116" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5C6BC0">event</text>

    <!-- State: Processing -->
    <rect x="128" y="78" width="62" height="24" rx="8" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <text x="159" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#3949AB">Processing</text>

    <!-- Transition: Processing to Done -->
    <path d="M190 90 L206 90" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="198" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5C6BC0">[done]</text>

    <!-- Final state (bullseye) -->
    <circle cx="216" cy="90" r="7" fill="none" stroke="#3949AB" stroke-width="1.5"/>
    <circle cx="216" cy="90" r="4" fill="#3949AB"/>

    <!-- Legend -->
    <circle cx="240" cy="82" r="3.5" fill="#3949AB"/>
    <text x="248" y="85" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Initial</text>
    <circle cx="240" cy="96" r="4" fill="none" stroke="#3949AB" stroke-width="1"/>
    <circle cx="240" cy="96" r="2" fill="#3949AB"/>
    <text x="248" y="99" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Final</text>
  </g>

  <!-- ============ G3: Sequence Diagrams (3.0s) ============ -->
  <g opacity="0" data-narration="Sequence diagrams show object lifelines as vertical dashed lines, synchronous messages as solid arrows, asynchronous messages as dashed arrows, and activation boxes showing when objects are active.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="16" y="128" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">Sequence Diagram</text>

    <!-- Object A -->
    <rect x="28" y="138" width="50" height="18" rx="3" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <text x="53" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#00695C">:Client</text>
    <!-- Lifeline A -->
    <line x1="53" y1="156" x2="53" y2="216" stroke="#00695C" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Activation box A -->
    <rect x="49" y="162" width="8" height="30" fill="#E0F2F1" stroke="#00695C" stroke-width="1"/>

    <!-- Object B -->
    <rect x="118" y="138" width="50" height="18" rx="3" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <text x="143" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#00695C">:Server</text>
    <!-- Lifeline B -->
    <line x1="143" y1="156" x2="143" y2="216" stroke="#00695C" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Activation box B -->
    <rect x="139" y="172" width="8" height="25" fill="#E0F2F1" stroke="#00695C" stroke-width="1"/>

    <!-- Object C -->
    <rect x="208" y="138" width="50" height="18" rx="3" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <text x="233" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#00695C">:Database</text>
    <!-- Lifeline C -->
    <line x1="233" y1="156" x2="233" y2="216" stroke="#00695C" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Activation box C -->
    <rect x="229" y="182" width="8" height="12" fill="#E0F2F1" stroke="#00695C" stroke-width="1"/>

    <!-- Synchronous message: Client to Server (solid arrow) -->
    <line x1="57" y1="170" x2="139" y2="170" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="98" y="166" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">request()</text>

    <!-- Synchronous message: Server to Database (solid arrow) -->
    <line x1="147" y1="184" x2="229" y2="184" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="188" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">query()</text>

    <!-- Async return: Database to Server (dashed arrow) -->
    <line x1="229" y1="194" x2="147" y2="194" stroke="#00695C" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowDashTeal)"/>
    <text x="188" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">result</text>

    <!-- Legend -->
    <line x1="280" y1="145" x2="305" y2="145" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="310" y="148" font-family="Arial,sans-serif" font-size="7" fill="#00695C">Sync</text>
    <line x1="280" y1="158" x2="305" y2="158" stroke="#00695C" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowDashTeal)"/>
    <text x="310" y="161" font-family="Arial,sans-serif" font-size="7" fill="#00695C">Async</text>
    <rect x="280" y="166" width="6" height="12" fill="#E0F2F1" stroke="#00695C" stroke-width="1"/>
    <text x="291" y="175" font-family="Arial,sans-serif" font-size="7" fill="#00695C">Activation</text>
  </g>

  <!-- ============ G4: Activity Diagrams (4.5s) ============ -->
  <g opacity="0" data-narration="Activity diagrams model workflows with actions in rounded rectangles, decisions in diamonds, and fork-join bars for concurrent flows. Swim lanes separate responsibilities.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="16" y="236" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100">Activity Diagram</text>

    <!-- Swim lane divider -->
    <line x1="155" y1="242" x2="155" y2="310" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="85" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-style="italic">Lane A</text>
    <text x="215" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-style="italic">Lane B</text>

    <!-- Initial node -->
    <circle cx="35" cy="268" r="5" fill="#E65100"/>

    <!-- Arrow to Action 1 -->
    <line x1="40" y1="268" x2="52" y2="268" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

    <!-- Action 1 -->
    <rect x="54" y="258" width="55" height="20" rx="6" fill="white" stroke="#E65100" stroke-width="1.3"/>
    <text x="81" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E65100">Validate</text>

    <!-- Arrow to Decision -->
    <line x1="109" y1="268" x2="122" y2="268" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

    <!-- Decision diamond -->
    <polygon points="135,256 148,268 135,280 122,268" fill="white" stroke="#E65100" stroke-width="1.3"/>
    <text x="135" y="271" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">?</text>

    <!-- Yes path to Fork bar -->
    <line x1="148" y1="268" x2="160" y2="268" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <text x="154" y="263" font-family="Arial,sans-serif" font-size="6" fill="#E65100">Y</text>

    <!-- Fork bar (thick vertical) -->
    <rect x="162" y="265" width="4" height="24" rx="1" fill="#E65100"/>

    <!-- Upper fork path to Action 2 -->
    <line x1="166" y1="272" x2="178" y2="272" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <rect x="180" y="262" width="55" height="20" rx="6" fill="white" stroke="#E65100" stroke-width="1.3"/>
    <text x="207" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E65100">Process</text>

    <!-- Lower fork path to Action 3 -->
    <line x1="166" y1="282" x2="178" y2="295" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <rect x="180" y="288" width="55" height="20" rx="6" fill="white" stroke="#E65100" stroke-width="1.3"/>
    <text x="207" y="302" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E65100">Notify</text>

    <!-- Join bar -->
    <rect x="242" y="265" width="4" height="24" rx="1" fill="#E65100"/>
    <line x1="235" y1="272" x2="242" y2="272" stroke="#E65100" stroke-width="1.2"/>
    <line x1="235" y1="298" x2="246" y2="282" stroke="#E65100" stroke-width="1.2"/>

    <!-- Arrow to final -->
    <line x1="246" y1="277" x2="258" y2="277" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

    <!-- Final node -->
    <circle cx="268" cy="277" r="6" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="268" cy="277" r="3.5" fill="#E65100"/>

    <!-- No path label -->
    <line x1="135" y1="280" x2="135" y2="300" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="127" y="296" font-family="Arial,sans-serif" font-size="6" fill="#E65100">N</text>
    <text x="120" y="308" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Reject</text>

    <!-- Legend -->
    <polygon points="300,248 308,255 300,262 292,255" fill="white" stroke="#E65100" stroke-width="1"/>
    <text x="314" y="258" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Decision</text>
    <rect x="292" y="268" width="16" height="4" rx="1" fill="#E65100"/>
    <text x="314" y="274" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Fork/Join</text>
  </g>

  <!-- ============ G5: UML Behavioral Diagram Types (6.0s) ============ -->
  <g opacity="0" data-narration="UML defines four main behavioral diagram types: Use Case diagrams for system functionality, State Machine diagrams for object lifecycles, Activity diagrams for workflows, and Interaction diagrams including sequence and collaboration.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Section label -->
    <text x="16" y="330" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828">UML Behavioral Diagram Types</text>

    <!-- Central node -->
    <rect x="140" y="338" width="80" height="20" rx="4" fill="#C62828"/>
    <text x="180" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Behavioral</text>

    <!-- Use Case -->
    <rect x="16" y="340" width="70" height="18" rx="9" fill="white" stroke="#C62828" stroke-width="1.3"/>
    <text x="51" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828">Use Case</text>
    <line x1="86" y1="349" x2="140" y2="349" stroke="#C62828" stroke-width="1"/>

    <!-- State Machine -->
    <rect x="16" y="364" width="70" height="18" rx="9" fill="white" stroke="#C62828" stroke-width="1.3"/>
    <text x="51" y="376" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828">State Machine</text>
    <line x1="86" y1="373" x2="140" y2="355" stroke="#C62828" stroke-width="1"/>

    <!-- Activity -->
    <rect x="270" y="340" width="70" height="18" rx="9" fill="white" stroke="#C62828" stroke-width="1.3"/>
    <text x="305" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828">Activity</text>
    <line x1="220" y1="349" x2="270" y2="349" stroke="#C62828" stroke-width="1"/>

    <!-- Interaction (umbrella) -->
    <rect x="270" y="364" width="70" height="18" rx="9" fill="white" stroke="#C62828" stroke-width="1.3"/>
    <text x="305" y="376" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828">Interaction</text>
    <line x1="220" y1="355" x2="270" y2="373" stroke="#C62828" stroke-width="1"/>

    <!-- Sub-types of Interaction -->
    <text x="352" y="368" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828">Sequence</text>
    <text x="352" y="380" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828">Collaboration</text>
    <line x1="340" y1="373" x2="350" y2="366" stroke="#C62828" stroke-width="0.8"/>
    <line x1="340" y1="373" x2="350" y2="378" stroke="#C62828" stroke-width="0.8"/>
  </g>

  <!-- ============ G6: Purpose (7.5s) ============ -->
  <g opacity="0" data-narration="The purpose of behavioral modeling is to model dynamic behavior, capture how the system responds to events, validate requirements with stakeholders, and guide implementation through clear behavioral specifications.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Bottom bar -->
    <rect x="10" y="388" width="400" height="10" rx="4" fill="#3949AB" opacity="0.12"/>

    <circle cx="28" cy="393" r="3" fill="#3949AB"/>
    <text x="34" y="396" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Model dynamic behavior</text>

    <circle cx="148" cy="393" r="3" fill="#00695C"/>
    <text x="154" y="396" font-family="Arial,sans-serif" font-size="7" fill="#00695C">Capture event responses</text>

    <circle cx="268" cy="393" r="3" fill="#E65100"/>
    <text x="274" y="396" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Validate &amp; guide impl.</text>
  </g>
</svg>
