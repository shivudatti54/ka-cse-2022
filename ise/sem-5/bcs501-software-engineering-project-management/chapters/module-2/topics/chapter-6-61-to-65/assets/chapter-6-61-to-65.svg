<svg width="420" height="400" data-topic-id="chapter-6-61-to-65">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Introduction to Software Engineering">Software Engineering</tspan>
    is the application of engineering principles and techniques to the design, development, testing, and maintenance of software systems.
  </text>
  <rect x="10" y="60" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Key Features">Key Features</tspan>
    include:
    <tspan data-narration="Systematic approach">Systematic approach to software development</tspan>
    <tspan data-narration="Emphasis on quality and reliability">Emphasis on quality and reliability</tspan>
    <tspan data-narration="Use of engineering principles and techniques">Use of engineering principles and techniques</tspan>
  </text>
  <rect x="220" y="60" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="230" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Software Engineering Lifecycle">Software Engineering Lifecycle</tspan>
    includes:
    <tspan data-narration="Requirements Gathering">Requirements Gathering</tspan>
    <tspan data-narration="Analysis and Design">Analysis and Design</tspan>
    <tspan data-narration="Implementation">Implementation</tspan>
    <tspan data-narration="Testing and Quality Assurance">Testing and Quality Assurance</tspan>
  </text>
  <rect x="10" y="110" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="120" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Requirements Gathering">Requirements Gathering</tspan>
    involves identifying and documenting the needs and wants of stakeholders.
    <tspan data-narration="Activities">Activities:</tspan>
    <tspan data-narration="Collecting and analyzing requirements">Collecting and analyzing requirements</tspan>
    <tspan data-narration="Validating and verifying requirements">Validating and verifying requirements</tspan>
    <tspan data-narration="Documenting requirements">Documenting requirements</tspan>
    <tspan data-narration="Tools and Techniques">Tools and Techniques:</tspan>
    <tspan data-narration="Use cases">Use cases</tspan>
    <tspan data-narration="Use case diagrams">Use case diagrams</tspan>
    <tspan data-narration="Requirements specifications">Requirements specifications</tspan>
  </text>
  <rect x="220" y="110" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="230" y="120" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Analysis and Design">Analysis and Design</tspan>
    involves breaking down the requirements into smaller components and creating a detailed plan for the software system.
    <tspan data-narration="Activities">Activities:</tspan>
    <tspan data-narration="Identifying and analyzing the system's functional and non-functional requirements">Identifying and analyzing the system's functional and non-functional requirements</tspan>
    <tspan data-narration="Creating a detailed design for the software system">Creating a detailed design for the software system</tspan>
    <tspan data-narration="Documenting the design">Documenting the design</tspan>
    <tspan data-narration="Tools and Techniques">Tools and Techniques:</tspan>
    <tspan data-narration="Use cases">Use cases</tspan>
    <tspan data-narration="Use case diagrams">Use case diagrams</tspan>
    <tspan data-narration="Class diagrams">Class diagrams</tspan>
    <tspan data-narration="Sequence diagrams">Sequence diagrams</tspan>
  </text>
  <rect x="10" y="160" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="170" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Implementation">Implementation</tspan>
    involves translating the design into code and testing the software system.
    <tspan data-narration="Activities">Activities:</tspan>
    <tspan data-narration="Writing the code">Writing the code</tspan>
    <tspan data-narration="Testing the software system">Testing the software system</tspan>
    <tspan data-narration="Debugging and resolving issues">Debugging and resolving issues</tspan>
    <tspan data-narration="Tools and Techniques">Tools and Techniques:</tspan>
    <tspan data-narration="Programming languages">Programming languages</tspan>
    <tspan data-narration="Integrated development environments (IDEs)">Integrated development environments (IDEs)</tspan>
    <tspan data-narration="Version control systems">Version control systems</tspan>
  </text>
  <rect x="220" y="160" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="230" y="170" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Testing and Quality Assurance">Testing and Quality Assurance</tspan>
    involves verifying that the software system meets the requirements and is reliable.
    <tspan data-narration="Activities">Activities:</tspan>
    <tspan data-narration="Writing tests">Writing tests</tspan>
    <tspan data-narration="Running tests">Running tests</tspan>
    <tspan data-narration="Debugging and resolving issues">Debugging and resolving issues</tspan>
    <tspan data-narration="Tools and Techniques">Tools and Techniques:</tspan>
    <tspan data-narration="Use cases">Use cases</tspan>
    <tspan data-narration="Use case diagrams">Use case diagrams</tspan>
    <tspan data-narration="Requirements specifications">Requirements specifications</tspan>
  </text>
  <rect x="10" y="210" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="20" y="220" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Software Engineering Lifecycle">Software Engineering Lifecycle</tspan>
    is a systematic approach to software development.
  </text>
  <rect x="220" y="210" width="200" height="30" fill="#87CEEB" rx="5"/>
  <text x="230" y="220" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    <tspan data-narration="Benefits">Benefits:</tspan>
    <tspan data-narration="Improved quality">Improved quality</tspan>
    <tspan data-narration="Increased efficiency">Increased efficiency</tspan>
    <tspan data-narration="Enhanced reliability">Enhanced reliability</tspan>
  </text>
  <g transform="translate(10, 280)">
    <rect width="400" height="20" fill="#87CEEB" rx="5"/>
    <text x="20" y="290" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      <tspan data-narration="Chapter Summary">Chapter Summary</tspan>
    </text>
  </g>
</svg>