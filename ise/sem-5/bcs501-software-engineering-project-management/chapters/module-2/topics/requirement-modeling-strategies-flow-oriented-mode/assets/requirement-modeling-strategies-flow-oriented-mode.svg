<svg width="420" height="400" data-topic-id="requirement-modeling-strategies-flow-oriented-mode">
  <style>
    /* Gradient background */
    .background {
      fill: #C7E8FF; /* indigo background */
    }

    /* Pastel colors */
    .pastel-1 {
      fill: #FFC5C5; /* light orange */
    }

    .pastel-2 {
      fill: #ADD8E6; /* light teal */
    }

    /* Animation */
    @keyframes animation {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E8FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect class="background" width="100%" height="100%"/>
  <rect class="pastel-1" x="0" y="0" width="100%" height="20" rx="10"/>
  <rect class="pastel-2" x="0" y="20" width="100%" height="20" rx="10"/>
  <rect class="pastel-1" x="0" y="40" width="100%" height="20" rx="10"/>
  <rect class="pastel-2" x="0" y="60" width="100%" height="20" rx="10"/>
  <rect class="pastel-1" x="0" y="80" width="100%" height="20" rx="10"/>
  <rect class="pastel-2" x="0" y="100" width="100%" height="20" rx="10"/>

  <title>Requirement Modeling Strategies: Flow-Oriented Modeling</title>

  <g id="section-1">
    <rect class="pastel-1" x="0" y="110" width="100%" height="20" rx="10"/>
    <text x="10" y="130" class="section-title">What is Flow-Oriented Modeling?</text>
    <text x="10" y="150" class="section-narration">Flow-oriented modeling is a technique used to model the flow of data and processes within a system.</text>
  </g>

  <g id="section-2">
    <rect class="pastel-2" x="0" y="170" width="100%" height="20" rx="10"/>
    <text x="10" y="190" class="section-title">Types of Flow-Oriented Modeling</text>
    <text x="10" y="210" class="section-narration">There are several types of flow-oriented modeling techniques, including Data Flow Diagrams (DFDs), Process Flow Diagrams (PFDs), and Activity Diagrams.</text>
  </g>

  <g id="section-3">
    <rect class="pastel-1" x="0" y="250" width="100%" height="20" rx="10"/>
    <text x="10" y="270" class="section-title">Key Concepts</text>
    <text x="10" y="290" class="section-narration">Data flow and control flow are key concepts in flow-oriented modeling, showing how data and control are exchanged between components.</text>
  </g>

  <g id="section-4">
    <rect class="pastel-2" x="0" y="320" width="100%" height="20" rx="10"/>
    <text x="10" y="340" class="section-title">Components</text>
    <text x="10" y="360" class="section-narration">Components are the building blocks of a system, and their interactions determine the flow of data and control.</text>
  </g>

  <g id="section-5">
    <rect class="pastel-1" x="0" y="390" width="100%" height="20" rx="10"/>
    <text x="10" y="410" class="section-title">Benefits</text>
    <text x="10" y="430" class="section-narration">Flow-oriented modeling provides a clear understanding of the system's behavior, making it easier to design and implement.</text>
  </g>

  <g id="footer">
    <rect class="pastel-2" x="0" y="410" width="100%" height="20" rx="10"/>
    <text x="10" y="430" class="footer-text">Copyright 2023</text>
  </g>

  <animate duration="2s" begin="100ms" attributeName="opacity" attributeNameType="xml" from="0" to="1"/>
  <animate duration="2s" begin="300ms" attributeName="opacity" attributeNameType="xml" from="0" to="1"/>
  <animate duration="2s" begin="500ms" attributeName="opacity" attributeNameType="xml" from="0" to="1"/>
</svg>