<svg width="420" height="400" data-topic-id="software-engineering-process" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="overflow:visible;">

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#CCCC66" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="20" fill="url(#gradient)" opacity="0.9" rx="5" />
  <text x="15" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#000000" data-narration="Software Engineering Process">
    <tspan x="15" y="35">Software Engineering Process</tspan>
  </text>

  <!-- Requirements Gathering Section -->
  <rect x="10" y="50" width="400" height="60" fill="#F2F2F2" rx="5" />
  <text x="15" y="60" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#000000" data-narration="Requirements Gathering">
    <tspan x="15" y="70">Identify and collect requirements from stakeholders</tspan>
    <tspan x="15" y="80">Define the problem or opportunity</tspan>
    <tspan x="15" y="90">Develop a feasibility study</tspan>
  </text>

  <!-- Design Section -->
  <rect x="10" y="120" width="400" height="60" fill="#F2F2F2" rx="5" />
  <text x="15" y="130" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#000000" data-narration="Design">
    <tspan x="15" y="140">Create a concept of the system</tspan>
    <tspan x="15" y="150">Develop a detailed design document</tspan>
    <tspan x="15" y="160">Identify potential risks and constraints</tspan>
  </text>

  <!-- Implementation Section -->
  <rect x="10" y="180" width="400" height="60" fill="#F2F2F2" rx="5" />
  <text x="15" y="190" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#000000" data-narration="Implementation">
    <tspan x="15" y="200">Write the code</tspan>
    <tspan x="15" y="210">Develop and test the system</tspan>
    <tspan x="15" y="220">Ensure the system meets the requirements</tspan>
  </text>

  <!-- Testing and Validation Section -->
  <rect x="10" y="250" width="400" height="60" fill="#F2F2F2" rx="5" />
  <text x="15" y="260" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#000000" data-narration="Testing and Validation">
    <tspan x="15" y="270">Test the system to ensure it meets the requirements</tspan>
    <tspan x="15" y="280">Validate the system to ensure it meets the stakeholders' needs</tspan>
  </text>

  <!-- Maintenance Section -->
  <rect x="10" y="310" width="400" height="60" fill="#F2F2F2" rx="5" />
  <text x="15" y="320" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#000000" data-narration="Maintenance">
    <tspan x="15" y="330">Ensure the system is maintained and updated</tspan>
    <tspan x="15" y="340">Fix defects and bugs</tspan>
    <tspan x="15" y="350">Improve the system to meet changing requirements</tspan>
  </text>

  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" attributes="x" type="linear" begin="0s" dur="10s" fill="freeze" />
  <animate xmlns="http://www.w3.org/2000/svg" attributes="y" type="linear" begin="0s" dur="10s" fill="freeze" />
  <animate xmlns="http://www.w3.org/2000/svg" attributes="opacity" type="linear" begin="0s" dur="10s" fill="freeze" />
</svg>