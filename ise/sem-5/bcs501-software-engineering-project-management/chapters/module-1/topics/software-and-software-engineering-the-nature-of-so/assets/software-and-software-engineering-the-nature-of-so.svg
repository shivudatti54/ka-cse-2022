<svg width="420" height="400" data-topic-id="software-and-software-engineering-the-nature-of-so" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2ff"/>
      <stop offset="50%" stop-color="#a2e2ff"/>
      <stop offset="100%" stop-color="#6495ed"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="80" fill="url(#pastel-gradient)"/>
  <text x="20" y="100" font-size="24" font-family="Arial" fill="#2f4f7f">The Nature of Software</text>
  <rect x="10" y="120" width="400" height="100" fill="#ffffff"/>
  <section data-narration="The Definition of Software">
    <text x="20" y="150" font-size="18" font-family="Arial" fill="#2f4f7f">Definition:</text>
    <text x="40" y="170" font-size="18" font-family="Arial" fill="#2f4f7f">Software is an intangible product that uses computer programming to operate, manage, and store data.</text>
  </section>
  <section data-narration="The Characteristics of Software">
    <text x="20" y="220" font-size="18" font-family="Arial" fill="#2f4f7f">Characteristics:</text>
    <text x="40" y="240" font-size="18" font-family="Arial" fill="#2f4f7f">Intangible, Programmable, Digital, Electronic, Can be replicated and distributed easily.</text>
  </section>
  <section data-narration="Types of Software">
    <text x="20" y="290" font-size="18" font-family="Arial" fill="#2f4f7f">Types of Software:</text>
    <text x="40" y="310" font-size="18" font-family="Arial" fill="#2f4f7f">System Software, Application Software, Utility Software, Games.</text>
  </section>
  <section data-narration="The Unique Nature of WebApps">
    <text x="20" y="360" font-size="18" font-family="Arial" fill="#2f4f7f">The Unique Nature of WebApps:</text>
    <text x="40" y="380" font-size="18" font-family="Arial" fill="#2f4f7f">Dynamic, Decentralized, Client-server, Stateless.</text>
  </section>
  <a href="#" data-narration="Benefits of WebApps">
    <text x="20" y="410" font-size="18" font-family="Arial" fill="#2f4f7f">Benefits:</text>
  </a>
  <section data-narration="Accessibility and Scalability">
    <text x="40" y="430" font-size="18" font-family="Arial" fill="#2f4f7f">Accessibility and Scalability:</text>
    <text x="60" y="450" font-size="18" font-family="Arial" fill="#2f4f7f">WebApps can be accessed from anywhere with an internet connection and can be easily replicated and distributed.</text>
  </section>
  <a href="#" data-narration="Examples of WebApps">
    <text x="20" y="490" font-size="18" font-family="Arial" fill="#2f4f7f">Examples:</text>
  </a>
  <section data-narration="Online Banking and Social Media">
    <text x="40" y="510" font-size="18" font-family="Arial" fill="#2f4f7f">Online Banking and Social Media:</text>
    <text x="60" y="530" font-size="18" font-family="Arial" fill="#2f4f7f">WebApps used for online banking and social media platforms like Facebook and Twitter.</text>
  </section>
  <footer>
    <text x="20" y="570" font-size="18" font-family="Arial" fill="#2f4f7f">Software and Software Engineering Study Material</text>
  </footer>
</svg>