<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="unified-process">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="phaseGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <linearGradient id="phaseGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <linearGradient id="phaseGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#F57C00"/>
    </linearGradient>
    <linearGradient id="phaseGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C62828"/>
      <stop offset="100%" style="stop-color:#E53935"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title with underline (begin=0.3s) -->
  <g opacity="0" data-narration="The Unified Process is a popular iterative software development framework.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#3949AB">Unified Process (UP)</text>
    <line x1="120" y1="29" x2="300" y2="29" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- G2: Four phases as connected blocks with milestones (begin=1.5s) -->
  <g opacity="0" data-narration="UP has four sequential phases: Inception, Elaboration, Construction, and Transition, each ending with a milestone.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Phase labels row -->
    <text x="210" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Phases</text>

    <!-- Inception -->
    <rect x="12" y="52" width="90" height="30" rx="5" fill="url(#phaseGrad1)"/>
    <text x="57" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Inception</text>

    <!-- Arrow 1 -->
    <polygon points="104,67 110,62 110,72" fill="#3949AB"/>

    <!-- Elaboration -->
    <rect x="113" y="52" width="90" height="30" rx="5" fill="url(#phaseGrad2)"/>
    <text x="158" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Elaboration</text>

    <!-- Arrow 2 -->
    <polygon points="205,67 211,62 211,72" fill="#00695C"/>

    <!-- Construction -->
    <rect x="214" y="52" width="90" height="30" rx="5" fill="url(#phaseGrad3)"/>
    <text x="259" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Construction</text>

    <!-- Arrow 3 -->
    <polygon points="306,67 312,62 312,72" fill="#E65100"/>

    <!-- Transition -->
    <rect x="315" y="52" width="90" height="30" rx="5" fill="url(#phaseGrad4)"/>
    <text x="360" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Transition</text>

    <!-- Milestones (diamonds below phases) -->
    <polygon points="57,90 63,96 57,102 51,96" fill="#3949AB"/>
    <text x="57" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">LCO</text>

    <polygon points="158,90 164,96 158,102 152,96" fill="#00695C"/>
    <text x="158" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00695C">LCA</text>

    <polygon points="259,90 265,96 259,102 253,96" fill="#E65100"/>
    <text x="259" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">IOC</text>

    <polygon points="360,90 366,96 360,102 354,96" fill="#C62828"/>
    <text x="360" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">PR</text>
  </g>

  <!-- G3: Disciplines/Workflows spanning all phases (begin=3.0s) -->
  <g opacity="0" data-narration="Five core disciplines span all phases with varying intensity: Requirements, Analysis, Design, Implementation, and Testing.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <text x="210" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Disciplines across Phases</text>

    <!-- Grid background -->
    <rect x="80" y="133" width="328" height="100" rx="4" fill="white" fill-opacity="0.4" stroke="#B0BEC5" stroke-width="0.5"/>

    <!-- Phase column headers -->
    <text x="122" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#3949AB">INC</text>
    <text x="204" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00695C">ELA</text>
    <text x="286" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100">CON</text>
    <text x="368" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828">TRA</text>

    <!-- Vertical phase dividers -->
    <line x1="163" y1="133" x2="163" y2="233" stroke="#B0BEC5" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="245" y1="133" x2="245" y2="233" stroke="#B0BEC5" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="327" y1="133" x2="327" y2="233" stroke="#B0BEC5" stroke-width="0.5" stroke-dasharray="2,2"/>

    <!-- Discipline labels -->
    <text x="76" y="157" text-anchor="end" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Requirements</text>
    <text x="76" y="173" text-anchor="end" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Analysis</text>
    <text x="76" y="189" text-anchor="end" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Design</text>
    <text x="76" y="205" text-anchor="end" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Implementation</text>
    <text x="76" y="221" text-anchor="end" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Testing</text>

    <!-- Requirements effort bars (high in INC/ELA, low in CON/TRA) -->
    <rect x="90" y="150" width="70" height="10" rx="2" fill="#3949AB" fill-opacity="0.8"/>
    <rect x="172" y="150" width="60" height="10" rx="2" fill="#3949AB" fill-opacity="0.5"/>
    <rect x="254" y="150" width="25" height="10" rx="2" fill="#3949AB" fill-opacity="0.25"/>
    <rect x="336" y="150" width="10" height="10" rx="2" fill="#3949AB" fill-opacity="0.15"/>

    <!-- Analysis effort bars -->
    <rect x="90" y="166" width="40" height="10" rx="2" fill="#00695C" fill-opacity="0.5"/>
    <rect x="172" y="166" width="65" height="10" rx="2" fill="#00695C" fill-opacity="0.8"/>
    <rect x="254" y="166" width="30" height="10" rx="2" fill="#00695C" fill-opacity="0.3"/>
    <rect x="336" y="166" width="10" height="10" rx="2" fill="#00695C" fill-opacity="0.15"/>

    <!-- Design effort bars -->
    <rect x="90" y="182" width="20" height="10" rx="2" fill="#E65100" fill-opacity="0.3"/>
    <rect x="172" y="182" width="55" height="10" rx="2" fill="#E65100" fill-opacity="0.7"/>
    <rect x="254" y="182" width="45" height="10" rx="2" fill="#E65100" fill-opacity="0.5"/>
    <rect x="336" y="182" width="15" height="10" rx="2" fill="#E65100" fill-opacity="0.2"/>

    <!-- Implementation effort bars -->
    <rect x="90" y="198" width="10" height="10" rx="2" fill="#C62828" fill-opacity="0.15"/>
    <rect x="172" y="198" width="30" height="10" rx="2" fill="#C62828" fill-opacity="0.4"/>
    <rect x="254" y="198" width="70" height="10" rx="2" fill="#C62828" fill-opacity="0.8"/>
    <rect x="336" y="198" width="25" height="10" rx="2" fill="#C62828" fill-opacity="0.3"/>

    <!-- Testing effort bars -->
    <rect x="90" y="214" width="8" height="10" rx="2" fill="#6A1B9A" fill-opacity="0.15"/>
    <rect x="172" y="214" width="25" height="10" rx="2" fill="#6A1B9A" fill-opacity="0.35"/>
    <rect x="254" y="214" width="55" height="10" rx="2" fill="#6A1B9A" fill-opacity="0.6"/>
    <rect x="336" y="214" width="60" height="10" rx="2" fill="#6A1B9A" fill-opacity="0.8"/>
  </g>

  <!-- G4: Key characteristics - 3 pillars (begin=4.5s) -->
  <g opacity="0" data-narration="UP is defined by three key characteristics: Use-case driven, Architecture-centric, and Iterative and Incremental development.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <text x="210" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Key Characteristics</text>

    <!-- Pillar base -->
    <rect x="30" y="310" width="360" height="6" rx="3" fill="#3949AB" fill-opacity="0.3"/>

    <!-- Pillar 1: Use-case driven -->
    <rect x="50" y="260" width="90" height="50" rx="5" fill="#3949AB" fill-opacity="0.9"/>
    <text x="95" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Use-Case</text>
    <text x="95" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Driven</text>
    <text x="95" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" fill-opacity="0.8">Guides dev</text>

    <!-- Pillar 2: Architecture-centric -->
    <rect x="165" y="260" width="90" height="50" rx="5" fill="#00695C" fill-opacity="0.9"/>
    <text x="210" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Architecture</text>
    <text x="210" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Centric</text>
    <text x="210" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" fill-opacity="0.8">Core structure</text>

    <!-- Pillar 3: Iterative & Incremental -->
    <rect x="280" y="260" width="90" height="50" rx="5" fill="#E65100" fill-opacity="0.9"/>
    <text x="325" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Iterative &amp;</text>
    <text x="325" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">Incremental</text>
    <text x="325" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" fill-opacity="0.8">Evolve in cycles</text>
  </g>

  <!-- G5: Inception phase detail (begin=6.0s) -->
  <g opacity="0" data-narration="The Inception phase defines scope, identifies key use cases, estimates cost and schedule, assesses risks, and ends with the Lifecycle Objectives milestone.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Inception detail box -->
    <rect x="12" y="322" width="195" height="72" rx="6" fill="white" fill-opacity="0.85" stroke="#3949AB" stroke-width="1"/>
    <text x="110" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#3949AB">Inception Phase Detail</text>
    <line x1="22" y1="339" x2="197" y2="339" stroke="#3949AB" stroke-width="0.5" stroke-opacity="0.4"/>

    <circle cx="24" cy="350" r="2" fill="#3949AB"/>
    <text x="30" y="353" font-family="Arial,sans-serif" font-size="7" fill="#333">Define scope &amp; vision</text>

    <circle cx="24" cy="362" r="2" fill="#3949AB"/>
    <text x="30" y="365" font-family="Arial,sans-serif" font-size="7" fill="#333">Identify key use cases</text>

    <circle cx="24" cy="374" r="2" fill="#3949AB"/>
    <text x="30" y="377" font-family="Arial,sans-serif" font-size="7" fill="#333">Estimate cost/schedule</text>

    <circle cx="24" cy="386" r="2" fill="#3949AB"/>
    <text x="30" y="389" font-family="Arial,sans-serif" font-size="7" fill="#333">Assess risks</text>

    <!-- Milestone badge -->
    <rect x="120" y="360" width="80" height="28" rx="4" fill="#3949AB" fill-opacity="0.15" stroke="#3949AB" stroke-width="0.5"/>
    <text x="160" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#3949AB">Milestone:</text>
    <text x="160" y="383" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">Lifecycle Objectives</text>
  </g>

  <!-- G6: RUP as implementation of UP (begin=7.5s) -->
  <g opacity="0" data-narration="RUP, or Rational Unified Process, is a popular commercial implementation of UP, producing key artifacts like use case models, architecture documents, and iteration plans.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- RUP box -->
    <rect x="215" y="322" width="195" height="72" rx="6" fill="white" fill-opacity="0.85" stroke="#C62828" stroke-width="1"/>
    <text x="313" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">RUP (Rational UP)</text>
    <line x1="225" y1="339" x2="400" y2="339" stroke="#C62828" stroke-width="0.5" stroke-opacity="0.4"/>

    <text x="225" y="351" font-family="Arial,sans-serif" font-size="7" font-style="italic" fill="#555">Popular UP implementation</text>

    <text x="225" y="364" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828">Key Artifacts:</text>

    <circle cx="227" cy="374" r="2" fill="#C62828"/>
    <text x="233" y="377" font-family="Arial,sans-serif" font-size="7" fill="#333">Use case model</text>

    <circle cx="227" cy="386" r="2" fill="#C62828"/>
    <text x="233" y="389" font-family="Arial,sans-serif" font-size="7" fill="#333">Architecture document</text>

    <circle cx="330" cy="374" r="2" fill="#C62828"/>
    <text x="336" y="377" font-family="Arial,sans-serif" font-size="7" fill="#333">Iteration plan</text>
  </g>
</svg>
