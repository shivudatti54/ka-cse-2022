<svg width="420" height="400" data-topic-id="basic-unix-commands">
  <!-- Header Section -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <style>
      .title {
        font-size: 24px;
        font-weight: bold;
        color: #2F4F7F;
      }
      .footer {
        font-size: 12px;
        color: #2F4F7F;
        margin-top: 20px;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#pastel-gradient)" rx="10"/>
  <g transform="translate(20, 20)">
    <!-- Section 1: Introduction -->
    <rect x="0" y="0" width="100%" height="50" style="fill: #F7F7F7; padding: 10px; border-bottom: 1px solid #E5E5E5"/>
    <text class="title" x="50%" y="25%" dominant-baseline="hanging" text-anchor="middle">Basic Unix Commands</text>
    <text x="50%" y="70%" dominant-baseline="hanging" text-anchor="middle" data-narration="Introduction">In this section, we will cover the basic Unix commands that are used to interact with the operating system and perform various tasks.</text>
    <!-- Section 2: Echo Command -->
    <rect x="0" y="60" width="100%" height="50" style="fill: #F7F7F7; padding: 10px; border-bottom: 1px solid #E5E5E5"/>
    <text x="50%" y="25%" dominant-baseline="hanging" text-anchor="middle" class="title">Echo Command</text>
    <text x="50%" y="70%" dominant-baseline="hanging" text-anchor="middle" data-narration="Syntax">The `echo` command is used to display text on the screen. `echo [options] \&#39;string\&#39;`">
      <animate transform="translate(0, 0) rotate(0) scale(1)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="0" y="120" width="100%" height="50" style="fill: #F7F7F7; padding: 10px; border-bottom: 1px solid #E5E5E5"/>
    <text x="50%" y="25%" dominant-baseline="hanging" text-anchor="middle" class="title">Options</text>
    <text x="50%" y="70%" dominant-baseline="hanging" text-anchor="middle" data-narration="Options The `echo` command has several options that can be used to customize its behavior.">
      <animate transform="translate(0, 0) rotate(0) scale(1)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Section 3: Print Command -->
    <rect x="0" y="190" width="100%" height="50" style="fill: #F7F7F7; padding: 10px; border-bottom: 1px solid #E5E5E5"/>
    <text x="50%" y="25%" dominant-baseline="hanging" text-anchor="middle" class="title">Print Command</text>
    <text x="50%" y="70%" dominant-baseline="hanging" text-anchor="middle" data-narration="Syntax The `printf` command is used to format and display text on the screen. `printf [options] \&#39;format \&#39; [arguments...]`">
      <animate transform="translate(0, 0) rotate(0) scale(1)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="0" y="240" width="100%" height="50" style="fill: #F7F7F7; padding: 10px; border-bottom: 1px solid #E5E5E5"/>
    <text x="50%" y="25%" dominant-baseline="hanging" text-anchor="middle" class="title">Options</text>
    <text x="50%" y="70%" dominant-baseline="hanging" text-anchor="middle" data-narration="Options The `printf` command has several options that can be used to customize its behavior.">
      <animate transform="translate(0, 0) rotate(0) scale(1)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Section 4: List Command -->
    <rect x="0" y="310" width="100%" height="50" style="fill: #F7F7F7; padding: 10px; border-bottom: 1px solid #E5E5E5"/>
    <text x="50%" y="25%" dominant-baseline="hanging" text-anchor="middle" class="title">List Command</text>
    <text x="50%" y="70%" dominant-baseline="hanging" text-anchor="middle" data-narration="Syntax The `ls` command is used to list files and directories in the current directory. `ls [options] [file...]`">
      <animate transform="translate(0, 0) rotate(0) scale(1)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="0" y="360" width="100%" height="50" style="fill: #F7F7F7; padding: 10px; border-bottom: 1px solid #E5E5E5"/>
    <text x="50%" y="25%" dominant-baseline="hanging" text-anchor="middle" class="title">Options</text>
    <text x="50%" y="70%" dominant-baseline="hanging" text-anchor="middle" data-narration="Options The `ls` command has several options that can be used to customize its behavior.">
      <animate transform="translate(0, 0) rotate(0) scale(1)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Section 5: Who Command -->
    <rect x="0" y="430" width="100%" height="50" style="fill: #F7F7F7; padding: 10px; border-bottom: 1px solid #E5E5E5"/>
    <text x="50%" y="25%" dominant-baseline="hanging" text-anchor="middle" class="title">Who Command</text>
    <text x="50%" y="70%" dominant-baseline="hanging" text-anchor="middle" data-narration="Syntax The `who` command is used to display information about the current user. `who`">
      <animate transform="translate(0, 0) rotate(0) scale(1)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Footer Section -->
    <rect x="10" y="460" width="400" height="20" style="fill: #F7F7F7"/>
    <text x="50%" y="48%" dominant-baseline="hanging" text-anchor="middle" class="footer">Learn more about Unix commands at <a href="https://www.example.com">example.com</a>.</text>
  </g>
</svg>