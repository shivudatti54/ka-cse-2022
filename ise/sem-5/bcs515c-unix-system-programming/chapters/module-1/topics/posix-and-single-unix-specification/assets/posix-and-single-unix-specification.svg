<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="posix-and-single-unix-specification">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.15"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title (0.3s) -->
  <g opacity="0" data-narration="POSIX and Single UNIX Specification - the key standards for portable UNIX-like operating systems.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#3949AB">POSIX &amp; Single UNIX Spec</text>
    <line x1="80" y1="37" x2="340" y2="37" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- G2: What is POSIX? (1.5s) -->
  <g opacity="0" data-narration="POSIX stands for Portable Operating System Interface, an IEEE standard (1003.x) ensuring OS compatibility. The goal: write once, run anywhere on POSIX-compliant systems.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <rect x="15" y="48" width="190" height="90" rx="8" fill="#3949AB" filter="url(#shadow)"/>
    <text x="110" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">What is POSIX?</text>
    <text x="110" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#E8EAF6">Portable Operating System</text>
    <text x="110" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#E8EAF6">Interface (IEEE 1003.x)</text>
    <line x1="35" y1="97" x2="185" y2="97" stroke="#7986CB" stroke-width="0.5"/>
    <text x="110" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#C5CAE9">Goal: Write once, run</text>
    <text x="110" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#C5CAE9">anywhere on POSIX systems</text>
    <circle cx="30" cy="65" r="8" fill="#7986CB"/>
    <text x="30" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFFFFF">P</text>
  </g>

  <!-- G3: POSIX Standards (3.0s) -->
  <g opacity="0" data-narration="POSIX is a family of standards: POSIX.1 defines system interfaces, POSIX.2 covers shell and utilities, POSIX.1b adds real-time extensions, and POSIX.1c specifies threads.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="215" y="48" width="190" height="90" rx="8" fill="#00695C" filter="url(#shadow)"/>
    <text x="310" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">POSIX Standards</text>
    <rect x="225" y="73" width="86" height="18" rx="4" fill="#00897B"/>
    <text x="268" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#FFFFFF">POSIX.1 - Sys APIs</text>
    <rect x="317" y="73" width="80" height="18" rx="4" fill="#00897B"/>
    <text x="357" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#FFFFFF">POSIX.2 - Shell</text>
    <rect x="225" y="96" width="86" height="18" rx="4" fill="#00897B"/>
    <text x="268" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#FFFFFF">POSIX.1b - RT</text>
    <rect x="317" y="96" width="80" height="18" rx="4" fill="#00897B"/>
    <text x="357" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#FFFFFF">POSIX.1c - Thrd</text>
    <text x="310" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#B2DFDB">IEEE 1003 family of standards</text>
  </g>

  <!-- G4: Single UNIX Specification (4.5s) -->
  <g opacity="0" data-narration="The Single UNIX Specification, or SUS, is a superset of POSIX maintained by The Open Group. It evolved from the X/Open Portability Guide (XPG) and defines what constitutes a certified UNIX system.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="15" y="148" width="390" height="72" rx="8" fill="#E65100" filter="url(#shadow)"/>
    <text x="210" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">Single UNIX Specification (SUS)</text>
    <text x="210" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFE0B2">Superset of POSIX | Maintained by The Open Group</text>
    <rect x="30" y="190" width="80" height="22" rx="6" fill="#FF8F00"/>
    <text x="70" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">POSIX (core)</text>
    <text x="130" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFE0B2">&#x2286;</text>
    <rect x="150" y="190" width="100" height="22" rx="6" fill="#BF360C"/>
    <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">SUS (superset)</text>
    <text x="268" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFE0B2">&#x2190;</text>
    <rect x="290" y="190" width="100" height="22" rx="6" fill="#FF8F00"/>
    <text x="340" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">XPG Evolution</text>
  </g>

  <!-- G5: Key POSIX APIs (6.0s) -->
  <g opacity="0" data-narration="Key POSIX APIs include file I/O functions like open, read, write, and close; process control with fork, exec, and wait; signal handling with signal and kill; and threading with pthread_create.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="15" y="230" width="390" height="80" rx="8" fill="#C62828" filter="url(#shadow)"/>
    <text x="210" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Key POSIX APIs</text>
    <rect x="25" y="255" width="88" height="46" rx="5" fill="#D32F2F"/>
    <text x="69" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFCDD2">File I/O</text>
    <text x="69" y="280" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">open() read()</text>
    <text x="69" y="290" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">write() close()</text>
    <rect x="120" y="255" width="88" height="46" rx="5" fill="#D32F2F"/>
    <text x="164" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFCDD2">Process</text>
    <text x="164" y="280" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">fork() exec()</text>
    <text x="164" y="290" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">wait() exit()</text>
    <rect x="215" y="255" width="88" height="46" rx="5" fill="#D32F2F"/>
    <text x="259" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFCDD2">Signals</text>
    <text x="259" y="280" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">signal() kill()</text>
    <text x="259" y="290" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">sigaction()</text>
    <rect x="310" y="255" width="88" height="46" rx="5" fill="#D32F2F"/>
    <text x="354" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFCDD2">Threads</text>
    <text x="354" y="280" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">pthread_create()</text>
    <text x="354" y="290" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">pthread_join()</text>
  </g>

  <!-- G6: Compliance (7.5s) -->
  <g opacity="0" data-narration="Many operating systems comply with POSIX. Linux is mostly POSIX-compliant, macOS is a certified UNIX system, FreeBSD is largely compliant, and Solaris is a fully certified UNIX.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">OS Compliance</text>
    <rect x="18" y="338" width="88" height="44" rx="7" fill="#3949AB" filter="url(#shadow)"/>
    <text x="62" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">Linux</text>
    <text x="62" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C5CAE9">Mostly compliant</text>
    <circle cx="100" cy="344" r="4" fill="#66BB6A"/>
    <rect x="114" y="338" width="88" height="44" rx="7" fill="#00695C" filter="url(#shadow)"/>
    <text x="158" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">macOS</text>
    <text x="158" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#B2DFDB">Certified UNIX</text>
    <circle cx="196" cy="344" r="4" fill="#43A047"/>
    <rect x="210" y="338" width="88" height="44" rx="7" fill="#E65100" filter="url(#shadow)"/>
    <text x="254" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">FreeBSD</text>
    <text x="254" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFE0B2">Largely compliant</text>
    <circle cx="292" cy="344" r="4" fill="#66BB6A"/>
    <rect x="306" y="338" width="96" height="44" rx="7" fill="#C62828" filter="url(#shadow)"/>
    <text x="354" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">Solaris</text>
    <text x="354" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFCDD2">Certified UNIX</text>
    <circle cx="396" cy="344" r="4" fill="#43A047"/>
  </g>
</svg>
