<svg width="420" height="400" data-topic-id="meaning-of-internal-and-external-commands">
  <desc>
    Meaning of Internal and External Commands
  </desc>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e24aa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2196f3" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      margin-bottom: 20px;
    }
    .section .title {
      font-size: 16px;
      color: #fff;
    }
    .section .narration {
      font-size: 14px;
      color: #333;
    }
  </style>
  <rect x="10" y="10" width="400" height="300" style="fill: url(#grad)"/>
  <text x="20" y="20" style="font-size: 24px; font-weight: bold; fill: #fff">Meaning of Internal and External Commands</text>
  <text x="20" y="40" style="font-size: 14px; fill: #333">UNIX Operating System</text>
  <g id="internal-commands">
    <rect x="10" y="60" width="80" height="50" style="fill: #8e24aa; border-radius: 5px"/>
    <text x="15" y="65" style="font-size: 16px; fill: #fff">Internal Commands</text>
    <text x="15" y="85" style="font-size: 14px; fill: #333">Built-in to the shell, no external program required.</text>
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,70" begin="0s" dur="2s"/>
    <animateTransform attributeName="transform" type="translate" from="0,70" to="0,80" begin="2s" dur="2s"/>
  </g>
  <g id="external-commands">
    <rect x="110" y="60" width="80" height="50" style="fill: #2196f3; border-radius: 5px"/>
    <text x="115" y="65" style="font-size: 16px; fill: #fff">External Commands</text>
    <text x="115" y="85" style="font-size: 14px; fill: #333">Separate programs stored on disk, produce output or error messages.</text>
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,70" begin="0s" dur="2s"/>
    <animateTransform attributeName="transform" type="translate" from="0,70" to="0,80" begin="2s" dur="2s"/>
  </g>
  <g id="section-1">
    <rect x="10" y="130" width="400" height="50" style="fill: #fff; border-radius: 5px"/>
    <text x="15" y="135" style="font-size: 16px; fill: #333">Internal Commands Examples:</text>
    <ul>
      <li>
        <text x="15" y="155" style="font-size: 14px; fill: #666">cd - Changes the current directory.</text>
      </li>
      <li>
        <text x="15" y="175" style="font-size: 14px; fill: #666">pwd - Prints the current working directory.</text>
      </li>
      <li>
        <text x="15" y="195" style="font-size: 14px; fill: #666">set - Sets the shell variables and options.</text>
      </li>
      <li>
        <text x="15" y="215" style="font-size: 14px; fill: #666">export - Exports shell variables to the environment.</text>
      </li>
      <li>
        <text x="15" y="235" style="font-size: 14px; fill: #666">alias - Creates an alias for a command.</text>
      </li>
    </ul>
  </g>
  <g id="section-2">
    <rect x="10" y="285" width="400" height="50" style="fill: #fff; border-radius: 5px"/>
    <text x="15" y="290" style="font-size: 16px; fill: #333">External Commands Examples:</text>
    <ul>
      <li>
        <text x="15" y="310" style="font-size: 14px; fill: #666">ls - Lists the files and directories in a given directory.</text>
      </li>
      <li>
        <text x="15" y="330" style="font-size: 14px; fill: #666">cp - Copies files and directories.</text>
      </li>
      <li>
        <text x="15" y="350" style="font-size: 14px; fill: #666">mv - Moves or renames files and directories.</text>
      </li>
      <li>
        <text x="15" y="370" style="font-size: 14px; fill: #666">rm - Removes files and directories.</text>
      </li>
      <li>
        <text x="15" y="390" style="font-size: 14px; fill: #666">grep - Searches for patterns in files.</text>
      </li>
    </ul>
  </g>
  <g id="section-3">
    <rect x="10" y="430" width="400" height="50" style="fill: #fff; border-radius: 5px"/>
    <text x="15" y="435" style="font-size: 16px; fill: #333">Internal Commands Characteristics:</text>
    <ul>
      <li>
        <text x="15" y="455" style="font-size: 14px; fill: #666">Built-in to the shell, no external program required.</text>
      </li>
      <li>
        <text x="15" y="475" style="font-size: 14px; fill: #666">Do not produce any output or error messages.</text>
      </li>
      <li>
        <text x="15" y="495" style="font-size: 14px; fill: #666">Can be used for file manipulation, process management, and control of the shell.</text>
      </li>
      <li>
        <text x="15" y="515" style="font-size: 14px; fill: #666">Can be overridden by other commands with the same name.</text>
      </li>
    </ul>
  </g>
  <g id="section-4">
    <rect x="10" y="565" width="400" height="50" style="fill: #fff; border-radius: 5px"/>
    <text x="15" y="570" style="font-size: 16px; fill: #333">External Commands Characteristics:</text>
    <ul>
      <li>
        <text x="15" y="590" style="font-size: 14px; fill: #666">Separate programs stored on disk.</text>
      </li>
      <li>
        <text x="15" y="610" style="font-size: 14px; fill: #666">Produce output or error messages.</text>
      </li>
      <li>
        <text x="15" y="630" style="font-size: 14px; fill: #666">Typically used for file management, system administration, and application-specific tasks.</text>
      </li>
      <li>
        <text x="15" y="650" style="font-size: 14px; fill: #666">Can be used in conjunction with internal commands to perform more complex tasks.</text>
      </li>
    </ul>
  </g>
  <g id="section-5">
    <rect x="10" y="705" width="400" height="50" style="fill: #fff; border-radius: 5px"/>
    <text x="15" y="710" style="font-size: 16px; fill: #333">Conclusion:</text>
    <text x="15" y="730" style="font-size: 14px; fill: #333">In conclusion, internal and external commands are essential tools in the UNIX operating system.</text>
  </g>
  <g id="footer">
    <text x="20" y="380" style="font-size: 14px; fill: #333">Learn more about UNIX commands at [link]</text>
    <text x="20" y="400" style="font-size: 14px; fill: #333">Designed by [Author]</text>
  </g>
</svg>