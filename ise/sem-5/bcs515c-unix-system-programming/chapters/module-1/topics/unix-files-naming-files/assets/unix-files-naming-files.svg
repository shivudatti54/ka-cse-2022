<svg width="420" height="400" data-topic-id="Unix-Files-Naming-Files" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a7c2ff" stop-opacity="1" />
      <stop offset="50%" stop-color="#c9e4ca" stop-opacity="1" />
      <stop offset="100%" stop-color="#f7f2c4" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.5" />
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <text x="50%" y="10%" font-size="36" font-family="Arial, sans-serif" fill="#2b5cbf" text-anchor="middle">Unix Files Naming Files</text>
  </section>
  
  <!-- File Types Section -->
  <section data-narration="File Types">
    <rect x="10" y="60" width="400" height="50" fill="#f7f2c4" opacity="0.8" />
    <text x="20" y="65" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">File Types</text>
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,70" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="70" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="20" y="75" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">Regular Files</text>
    <animateTransform attributeName="transform" type="translate" from="0,70" to="0,80" begin="0.5s" dur="2s" repeatCount="indefinite" />
    <rect x="230" y="70" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="240" y="75" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">Directory Files</text>
    <animateTransform attributeName="transform" type="translate" from="0,70" to="0,80" begin="1s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="110" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="20" y="115" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">Special Files</text>
    <animateTransform attributeName="transform" type="translate" from="0,110" to="0,120" begin="1.5s" dur="2s" repeatCount="indefinite" />
    <rect x="230" y="110" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="240" y="115" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">Symbolic Links</text>
  </section>
  
  <!-- File Naming Conventions Section -->
  <section data-narration="File Naming Conventions">
    <rect x="10" y="170" width="400" height="50" fill="#f7f2c4" opacity="0.8" />
    <text x="20" y="175" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">File Naming Conventions</text>
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,180" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="180" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="20" y="185" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">File Name Length</text>
    <animateTransform attributeName="transform" type="translate" from="0,180" to="0,190" begin="0.5s" dur="2s" repeatCount="indefinite" />
    <rect x="230" y="180" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="240" y="185" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">File Name Characters</text>
    <animateTransform attributeName="transform" type="translate" from="0,180" to="0,190" begin="1s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="210" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="20" y="215" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">File Name Special Characters</text>
    <animateTransform attributeName="transform" type="translate" from="0,210" to="0,220" begin="1.5s" dur="2s" repeatCount="indefinite" />
    <rect x="230" y="210" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="240" y="215" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">Extension</text>
  </section>
  
  <!-- File Name Components Section -->
  <section data-narration="File Name Components">
    <rect x="10" y="270" width="400" height="50" fill="#f7f2c4" opacity="0.8" />
    <text x="20" y="275" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">File Name Components</text>
    <animateTransform attributeName="transform" type="translate" from="0,270" to="0,280" begin="0s" dur="2s" repeatCount="indefinite" />
    <rect x="10" y="280" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="20" y="285" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">Base Name</text>
    <animateTransform attributeName="transform" type="translate" from="0,280" to="0,290" begin="0.5s" dur="2s" repeatCount="indefinite" />
    <rect x="230" y="280" width="200" height="20" fill="#f7f2c4" opacity="0.8" />
    <text x="240" y="285" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">Extension</text>
    <animateTransform attributeName="transform" type="translate" from="0,280" to="0,290" begin="1s" dur="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Arrow Markers -->
  <line x1="50%" y1="10%" x2="50%" y2="100%" stroke="#2b5cbf" stroke-width="2" />
  <line x1="350%" y1="10%" x2="350%" y2="100%" stroke="#2b5cbf" stroke-width="2" />
  <line x1="50%" y1="350%" x2="50%" y2="50%" stroke="#2b5cbf" stroke-width="2" />
  <line x1="350%" y1="350%" x2="350%" y2="50%" stroke="#2b5cbf" stroke-width="2" />
  
  <!-- Footer Section -->
  <footer>
    <text x="50%" y="380%" font-size="18" font-family="Arial, sans-serif" fill="#2b5cbf">Copyright 2023</text>
  </footer>
</svg>