<svg width="420" height="400" data-topic-id="basic-file-typescategories" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" style="background-color: #66CCCC; background-image: linear-gradient(to bottom, #ADD8E6, #66CCCC);">
  <!-- Title and Footer -->
  <text x="10" y="10" font-size="24" font-family="Arial" text-anchor="start" fill="#000000">
    <tspan>Basic File Types/Categories</tspan>
  </text>
  <text x="10" y="350" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
    Created by [Your Name]
  </text>

  <!-- Background Gradient -->
  <rect x="0" y="0" width="420" height="400" fill="rgba(102, 204, 204, 0.2)"/>
  <rect x="0" y="0" width="420" height="400" fill="rgba(66, 204, 204, 0.5)"/>
  <rect x="0" y="0" width="420" height="400" fill="rgba(0, 192, 192, 0.8)"/>

  <!-- Section 1: Regular Files -->
  <section data-narration="Regular Files" x="10" y="50" width="380" height="50">
    <rect x="10" y="10" width="80" height="20" fill="#FFFFFF" rx="5"/>
    <rect x="110" y="10" width="80" height="20" fill="#FFFFFF" rx="5"/>
    <animate transform="rotate(45 110 10)" begin="0s" duration="2s" repeatCount="indefinite"/>
    <animate transform="rotate(45 110 10)" begin="2s" duration="2s" repeatCount="indefinite"/>
    <text x="110" y="30" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      Text files
    </text>
    <text x="110" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      Image files
    </text>
    <text x="110" y="50" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      Executable programs
    </text>
    <line x1="110" y1="50" x2="110" y2="70" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <circle cx="110" cy="50" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  </section>

  <!-- Section 2: Directories -->
  <section data-narration="Directories" x="10" y="120" width="380" height="50">
    <rect x="10" y="10" width="80" height="20" fill="#FFFFFF" rx="5"/>
    <rect x="110" y="10" width="80" height="20" fill="#FFFFFF" rx="5"/>
    <animate transform="rotate(45 110 10)" begin="0s" duration="2s" repeatCount="indefinite"/>
    <animate transform="rotate(45 110 10)" begin="2s" duration="2s" repeatCount="indefinite"/>
    <text x="110" y="30" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      Home directories
    </text>
    <text x="110" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      System directories
    </text>
    <text x="110" y="50" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      Project directories
    </text>
    <line x1="110" y1="50" x2="110" y2="70" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <circle cx="110" cy="50" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  </section>

  <!-- Section 3: Symbolic Links -->
  <section data-narration="Symbolic Links" x="10" y="210" width="380" height="50">
    <rect x="10" y="10" width="80" height="20" fill="#FFFFFF" rx="5"/>
    <rect x="110" y="10" width="80" height="20" fill="#FFFFFF" rx="5"/>
    <animate transform="rotate(45 110 10)" begin="0s" duration="2s" repeatCount="indefinite"/>
    <animate transform="rotate(45 110 10)" begin="2s" duration="2s" repeatCount="indefinite"/>
    <text x="110" y="30" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      Alias files
    </text>
    <text x="110" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      Links to executable programs
    </text>
    <line x1="110" y1="50" x2="110" y2="70" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <circle cx="110" cy="50" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  </section>

  <!-- Section 4: Special Files -->
  <section data-narration="Special Files" x="10" y="300" width="380" height="50">
    <rect x="10" y="10" width="80" height="20" fill="#FFFFFF" rx="5"/>
    <rect x="110" y="10" width="80" height="20" fill="#FFFFFF" rx="5"/>
    <animate transform="rotate(45 110 10)" begin="0s" duration="2s" repeatCount="indefinite"/>
    <animate transform="rotate(45 110 10)" begin="2s" duration="2s" repeatCount="indefinite"/>
    <text x="110" y="30" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      System files
    </text>
    <text x="110" y="40" font-size="16" font-family="Arial" text-anchor="middle" fill="#000000">
      Device files
    </text>
    <line x1="110" y1="50" x2="110" y2="70" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <circle cx="110" cy="50" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  </section>

  <!-- Arrow Marker -->
  <symbol id="arrow" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
    <path d="M 5 0 L 10 5 L 5 10 Z"/>
  </symbol>

  <!-- Footer -->
  <text x="10" y="360" font-size="14" font-family="Arial" text-anchor="start" fill="#000000">
    Created by [Your Name]
  </text>
</svg>