<svg width="420" height="400" data-topic-id="organization-of-files">
    <title>Organization of Files</title>
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#8CBAE2" stop-opacity="1"/>
        </linearGradient>
        <style>
            .section {
                background-image: url("url(#gradient)");
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
        </style>
    </defs>
    <g id="root-dir">
        <text x="50" y="50" font-size="24" fill="#3498db" font-family="Arial">Root Directory</text>
        <rect x="20" y="20" width="80" height="40" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
    </g>
    <g id="directories">
        <text x="50" y="150" font-size="18" fill="#8BC34A" font-family="Arial">Directories (or Folders)</text>
        <animateTransform attributeName="transform" type="translate" from="0 150" to="0 200" begin="0s" dur="2s" repeatCount="indefinite"/>
        <rect x="30" y="180" width="30" height="30" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
        <text x="70" y="180" font-size="16" fill="#fff" font-family="Arial">Files</text>
    </g>
    <g id="files">
        <text x="50" y="250" font-size="18" fill="#8BC34A" font-family="Arial">Files</text>
        <animateTransform attributeName="transform" type="translate" from="0 250" to="0 300" begin="2s" dur="2s" repeatCount="indefinite"/>
        <rect x="30" y="280" width="30" height="30" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
        <text x="70" y="280" font-size="16" fill="#fff" font-family="Arial">Data, such as text or images</text>
    </g>
    <g id="special-files">
        <text x="50" y="350" font-size="18" fill="#8BC34A" font-family="Arial">Special Files</text>
        <animateTransform attributeName="transform" type="translate" from="0 350" to="0 400" begin="4s" dur="2s" repeatCount="indefinite"/>
        <rect x="30" y="380" width="30" height="30" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
        <text x="70" y="380" font-size="16" fill="#fff" font-family="Arial">Represent devices, such as hard drives or keyboards</text>
    </g>
    <g id="file-permissions">
        <text x="50" y="150" font-size="18" fill="#8BC34A" font-family="Arial">File Permissions</text>
        <animateTransform attributeName="transform" type="translate" from="0 150" to="0 200" begin="0s" dur="2s" repeatCount="indefinite"/>
        <rect x="30" y="180" width="30" height="30" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
        <text x="70" y="180" font-size="16" fill="#fff" font-family="Arial">Owner (u), Group (g), Other (o)</text>
        <text x="10" y="220" font-size="16" fill="#fff" font-family="Arial">Read (r), Write (w), Execute (x)</text>
        <text x="30" y="240" font-size="16" fill="#fff" font-family="Arial">SUID (Set User ID), SGID (Set Group ID)</text>
    </g>
    <g id="file-modes">
        <text x="50" y="350" font-size="18" fill="#8BC34A" font-family="Arial">File Modes</text>
        <animateTransform attributeName="transform" type="translate" from="0 350" to="0 400" begin="4s" dur="2s" repeatCount="indefinite"/>
        <rect x="30" y="380" width="30" height="30" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
        <text x="70" y="380" font-size="16" fill="#fff" font-family="Arial">u+x, g+x, o+x</text>
    </g>
</svg>