<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="unix-structure">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title with underline (0.3s) -->
  <g opacity="0" data-narration="Unix System Structure - the layered architecture of the Unix operating system">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#3949AB">Unix System Structure</text>
    <line x1="110" y1="34" x2="310" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- G2: Layered architecture - concentric rings (1.5s) -->
  <g opacity="0" data-narration="Unix follows a layered architecture: Hardware at the core, surrounded by the Kernel, System Calls interface, Shell and Libraries, and Applications at the outermost layer">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Applications (outermost) -->
    <ellipse cx="130" cy="130" rx="112" ry="80" fill="none" stroke="#C62828" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="130" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828">Applications</text>
    <!-- Shell / Libraries -->
    <ellipse cx="130" cy="130" rx="90" ry="64" fill="none" stroke="#E65100" stroke-width="2"/>
    <text x="130" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#E65100">Shell / Libraries</text>
    <!-- System Calls -->
    <ellipse cx="130" cy="130" rx="68" ry="48" fill="none" stroke="#00695C" stroke-width="2"/>
    <text x="130" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#00695C">System Calls</text>
    <!-- Kernel -->
    <ellipse cx="130" cy="130" rx="46" ry="32" fill="#3949AB" fill-opacity="0.15" stroke="#3949AB" stroke-width="2.5"/>
    <text x="130" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Kernel</text>
    <!-- Hardware (innermost) -->
    <ellipse cx="130" cy="130" rx="24" ry="16" fill="#3949AB" fill-opacity="0.35" stroke="#3949AB" stroke-width="1.5"/>
    <text x="130" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#3949AB">Hardware</text>
  </g>

  <!-- G3: Kernel components (3.0s) -->
  <g opacity="0" data-narration="The Kernel manages five core subsystems: Process management, Memory management, File system, I/O system, and Networking">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="340" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Kernel Components</text>
    <line x1="280" y1="62" x2="400" y2="62" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Process mgmt -->
    <rect x="272" y="70" width="136" height="20" rx="4" fill="#3949AB" fill-opacity="0.12" stroke="#3949AB" stroke-width="1"/>
    <text x="340" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#3949AB">Process Management</text>
    <!-- Memory mgmt -->
    <rect x="272" y="94" width="136" height="20" rx="4" fill="#3949AB" fill-opacity="0.12" stroke="#3949AB" stroke-width="1"/>
    <text x="340" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#3949AB">Memory Management</text>
    <!-- File system -->
    <rect x="272" y="118" width="136" height="20" rx="4" fill="#00695C" fill-opacity="0.12" stroke="#00695C" stroke-width="1"/>
    <text x="340" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#00695C">File System</text>
    <!-- I/O system -->
    <rect x="272" y="142" width="136" height="20" rx="4" fill="#00695C" fill-opacity="0.12" stroke="#00695C" stroke-width="1"/>
    <text x="340" y="156" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#00695C">I/O System</text>
    <!-- Networking -->
    <rect x="272" y="166" width="136" height="20" rx="4" fill="#E65100" fill-opacity="0.12" stroke="#E65100" stroke-width="1"/>
    <text x="340" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#E65100">Networking</text>
  </g>

  <!-- G4: Shell types (4.5s) -->
  <g opacity="0" data-narration="Unix offers multiple shell types: Bourne shell (sh) the original, C shell (csh) with C-like syntax, Korn shell (ksh) combining sh and csh features, and Bash the most widely used modern shell">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="105" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100">Shell Types</text>
    <line x1="40" y1="232" x2="170" y2="232" stroke="#E65100" stroke-width="1.5"/>
    <!-- sh -->
    <rect x="16" y="238" width="84" height="32" rx="5" fill="#E65100" fill-opacity="0.1" stroke="#E65100" stroke-width="1.2"/>
    <text x="58" y="251" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">sh</text>
    <text x="58" y="264" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Bourne (original)</text>
    <!-- csh -->
    <rect x="108" y="238" width="84" height="32" rx="5" fill="#C62828" fill-opacity="0.1" stroke="#C62828" stroke-width="1.2"/>
    <text x="150" y="251" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#C62828">csh</text>
    <text x="150" y="264" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">C-like syntax</text>
    <!-- ksh -->
    <rect x="16" y="276" width="84" height="32" rx="5" fill="#3949AB" fill-opacity="0.1" stroke="#3949AB" stroke-width="1.2"/>
    <text x="58" y="289" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#3949AB">ksh</text>
    <text x="58" y="302" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">sh + csh features</text>
    <!-- bash -->
    <rect x="108" y="276" width="84" height="32" rx="5" fill="#00695C" fill-opacity="0.1" stroke="#00695C" stroke-width="1.2"/>
    <text x="150" y="289" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">bash</text>
    <text x="150" y="302" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">Most popular</text>
  </g>

  <!-- G5: System call interface (6.0s) -->
  <g opacity="0" data-narration="The system call interface bridges user space and kernel space. Programs invoke system calls like open, read, write, fork, and exec to request kernel services">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="315" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">System Call Interface</text>
    <line x1="240" y1="214" x2="390" y2="214" stroke="#00695C" stroke-width="1.5"/>
    <!-- User space box -->
    <rect x="240" y="220" width="70" height="26" rx="4" fill="#3949AB" fill-opacity="0.15" stroke="#3949AB" stroke-width="1.2"/>
    <text x="275" y="237" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#3949AB">User Space</text>
    <!-- Arrow down -->
    <polygon points="310,226 320,226 315,244" fill="#00695C"/>
    <!-- System call box -->
    <rect x="330" y="220" width="76" height="26" rx="4" fill="#00695C" fill-opacity="0.15" stroke="#00695C" stroke-width="1.2"/>
    <text x="368" y="237" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#00695C">Sys Call</text>
    <!-- Arrow to kernel -->
    <polygon points="350,248 358,248 354,258" fill="#C62828"/>
    <!-- Kernel space box -->
    <rect x="270" y="260" width="136" height="26" rx="4" fill="#C62828" fill-opacity="0.12" stroke="#C62828" stroke-width="1.2"/>
    <text x="338" y="277" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#C62828">Kernel Space</text>
    <!-- Example calls -->
    <text x="315" y="300" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">open() read() write()</text>
    <text x="315" y="312" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">fork() exec()</text>
  </g>

  <!-- G6: File system hierarchy (7.5s) -->
  <g opacity="0" data-narration="The Unix file system hierarchy starts at root (/) and branches into directories: /bin for binaries, /etc for configuration, /home for users, /usr for user programs, /var for variable data, and /tmp for temporary files">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="105" y="326" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828">File System Hierarchy</text>
    <line x1="20" y1="330" x2="190" y2="330" stroke="#C62828" stroke-width="1.5"/>
    <!-- Root -->
    <rect x="82" y="335" width="46" height="18" rx="4" fill="#C62828" stroke="#C62828" stroke-width="1"/>
    <text x="105" y="348" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">/</text>
    <!-- Branches -->
    <line x1="105" y1="353" x2="22" y2="365" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="105" y1="353" x2="52" y2="365" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="105" y1="353" x2="82" y2="365" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="105" y1="353" x2="112" y2="365" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="105" y1="353" x2="142" y2="365" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="105" y1="353" x2="170" y2="365" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <line x1="105" y1="353" x2="200" y2="365" stroke="#C62828" stroke-width="1" opacity="0.6"/>
    <!-- Directory labels -->
    <text x="22" y="378" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#3949AB">/bin</text>
    <text x="52" y="378" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00695C">/etc</text>
    <text x="82" y="378" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#E65100">/home</text>
    <text x="112" y="378" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#3949AB">/usr</text>
    <text x="142" y="378" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00695C">/var</text>
    <text x="170" y="378" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#E65100">/tmp</text>
    <text x="200" y="378" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#C62828">/dev</text>
    <!-- Small description labels -->
    <text x="22" y="389" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">binaries</text>
    <text x="52" y="389" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">config</text>
    <text x="82" y="389" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">users</text>
    <text x="112" y="389" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">programs</text>
    <text x="142" y="389" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">variable</text>
    <text x="170" y="389" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">temp</text>
    <text x="200" y="389" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">devices</text>
  </g>
</svg>
