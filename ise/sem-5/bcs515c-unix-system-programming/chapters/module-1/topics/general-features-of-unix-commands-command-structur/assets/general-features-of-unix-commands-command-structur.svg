<svg width="420" height="400" data-topic-id="unix-commands-structure">
  <title>General Features of Unix Commands/Command Structure</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%" 
                     stop-color="#87CEEB" stop-opacity="1" stop-color-stop="0%" 
                     stop-color-stop="100%" stop-color="#C5CAE9" stop-opacity="1" />
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="0%" y2="100%" 
                     stop-color="#3B5998" stop-opacity="1" stop-color-stop="0%" 
                     stop-color-stop="100%" stop-color="#6c5ce7" stop-opacity="1" />
  </defs>
  <rect x="10" y="20" width="400" height="350" style="fill: url(#pastel-gradient)" 
        data-narration="This is the background rectangle" />
  <rect x="10" y="70" width="340" height="50" style="fill: #3498db; 
      border-radius: 5px; border: 1px solid #ccc; background-color: #3498db;" 
        data-narration="This is the title section" />
  <rect x="10" y="120" width="340" height="50" style="fill: #87CEEB; 
      border-radius: 5px; border: 1px solid #ccc;" data-narration="This is the CLI section" />
  <rect x="10" y="170" width="340" height="50" style="fill: #87CEEB; 
      border-radius: 5px; border: 1px solid #ccc;" data-narration="This is the command syntax section" />
  <rect x="10" y="220" width="340" height="50" style="fill: #87CEEB; 
      border-radius: 5px; border: 1px solid #ccc;" data-narration="This is the command options section" />
  <rect x="10" y="270" width="340" height="50" style="fill: #87CEEB; 
      border-radius: 5px; border: 1px solid #ccc;" data-narration="This is the command arguments section" />
  <rect x="10" y="320" width="340" height="50" style="fill: #87CEEB; 
      border-radius: 5px; border: 1px solid #ccc;" data-narration="This is the redirectors section" />
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="340" height="320" style="fill: #fff;" 
          data-narration="This is the diagram section" />
    <path d="M 10 200 L 330 200" style="stroke: #333; stroke-width: 2;" 
          data-narration="This is the command-line interface arrow" />
    <path d="M 20 220 L 320 220" style="stroke: #333; stroke-width: 2;" 
          data-narration="This is the command syntax arrow" />
    <path d="M 30 250 L 310 250" style="stroke: #333; stroke-width: 2;" 
          data-narration="This is the command options arrow" />
    <path d="M 40 280 L 300 280" style="stroke: #333; stroke-width: 2;" 
          data-narration="This is the command arguments arrow" />
    <path d="M 50 310 L 290 310" style="stroke: #333; stroke-width: 2;" 
          data-narration="This is the redirectors arrow" />
  </g>
  <rect x="10" y="380" width="400" height="20" style="fill: #3498db; 
      border-radius: 5px; border: 1px solid #ccc; background-color: #3498db;" 
        data-narration="This is the footer section" />
  <animate xlink:href="#pastel-gradient" 
           attributeName="stop-color" from="#C5CAE9" to="#87CEEB" 
           begin="0s" dur="2s" repeatCount="indefinite" />
  <animate xlink:href="#indigo-gradient" 
           attributeName="stop-color" from="#6c5ce7" to="#3B5998" 
           begin="2s" dur="2s" repeatCount="indefinite" />
</svg>