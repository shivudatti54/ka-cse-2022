<svg width="420" height="400" data-topic-id="relative-and-absolute-permissions-changing-methods">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#background-gradient)"/>
  <text x="15" y="20" font-size="24" font-family="Arial" fill="white" fill-opacity="0.8" text-anchor="middle" data-narration="Introduction">
    The Relative and Absolute Permissions Changing Methods
  </text>
  <rect x="10" y="50" width="400" height="50" fill="#87CEEB"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="0s" repeatCount="indefinite"/>
  <text x="15" y="100" font-size="18" font-family="Arial" fill="#FFC107" fill-opacity="0.8" text-anchor="middle" data-narration="Relative Permissions Changing Methods">
    Relative Permissions Changing Methods
  </text>
  <rect x="10" y="150" width="400" height="50" fill="#87CEEB"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="1s" repeatCount="indefinite"/>
  <text x="15" y="200" font-size="18" font-family="Arial" fill="#FF9800" fill-opacity="0.8" text-anchor="middle" data-narration="Types of Relative Permissions">
    <tspan x="10" y="220">Types of Relative Permissions:</tspan>
    <tspan x="70" y="220">u (user): Modifies the permissions for the current user.</tspan>
    <tspan x="150" y="220">g (group): Modifies the permissions for the current group.</tspan>
    <tspan x="230" y="220">o (other): Modifies the permissions for others (users outside the current group and user).</tspan>
  </text>
  <rect x="10" y="250" width="400" height="50" fill="#87CEEB"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="2s" repeatCount="indefinite"/>
  <text x="15" y="300" font-size="18" font-family="Arial" fill="#FF9800" fill-opacity="0.8" text-anchor="middle" data-narration="Example: Modifying File Permissions with Relative Permissions">
    <tspan x="10" y="320">Example: Modifying File Permissions with Relative Permissions:</tspan>
    <tspan x="70" y="320">Suppose we have a file `example.txt` with the following permissions:</tspan>
    <tspan x="150" y="320">-rwxr-xr-x</tspan>
    <tspan x="230" y="320">To modify the file permissions to:</tspan>
    <tspan x="310" y="320">-rwxr-w-rx</tspan>
    <tspan x="70" y="340">We can use the following `chmod` command:</tspan>
    <tspan x="150" y="340">`chmod u+w,g-w,o+w example.txt`</tspan>
  </text>
  <rect x="10" y="370" width="400" height="50" fill="#87CEEB"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="3s" repeatCount="indefinite"/>
  <text x="15" y="420" font-size="18" font-family="Arial" fill="#FF9800" fill-opacity="0.8" text-anchor="middle" data-narration="Absolute Permissions Changing Methods">
    <tspan x="10" y="440">Absolute Permissions Changing Methods</tspan>
    <tspan x="70" y="440">- Modify the file permissions directly, without considering the current user, group, or other permissions.</tspan>
    <tspan x="150" y="440">- Use the `chmod` command with the `u`, `g`, or `o` attribute.</tspan>
  </text>
  <rect x="10" y="470" width="400" height="50" fill="#87CEEB"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="4s" repeatCount="indefinite"/>
  <text x="15" y="520" font-size="18" font-family="Arial" fill="#FF9800" fill-opacity="0.8" text-anchor="middle" data-narration="Key Concepts">
    <tspan x="10" y="540">Key Concepts:</tspan>
    <tspan x="70" y="540">- Relative permissions changing methods are used to modify the file permissions based on the current user, group, and other permissions.</tspan>
    <tspan x="150" y="540">- Absolute permissions changing methods are used to modify the file permissions directly, without considering the current user, group, or other permissions.</tspan>
  </text>
  <g>
    <line x1="200" y1="300" x2="300" y2="300" stroke="#FF9800" stroke-width="2" stroke-dasharray="3,3"/>
    <line x1="200" y1="300" x2="300" y2="300" stroke="#FF9800" stroke-width="2" stroke-dasharray="3,3"/>
    <line x1="200" y1="300" x2="300" y2="300" stroke="#FF9800" stroke-width="2" stroke-dasharray="3,3"/>
  </g>
</svg>