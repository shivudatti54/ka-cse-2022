<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400"
     data-topic-id="shells-programming-ordinary-environment-variables"
     viewBox="0 0 420 400" style="background-color: rgb(75, 96, 194);">
  <title>Shell Programming Ordinary and Environment Variables</title>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastelGradient)"/>
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(175, 201, 255)" stop-opacity="1"/>
      <stop offset="50%" stop-color="rgb(146, 175, 255)" stop-opacity="1"/>
      <stop offset="100%" stop-color="rgb(110, 147, 255)" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g transform="translate(10, 20)">
    <rect width="100%" height="10" fill="#fff" rx="5"/>
    <text x="10" y="15" fill="#333" font-size="18">Shell Programming</text>
    <text x="10" y="30" fill="#333" font-size="24">Ordinary and Environment Variables</text>
    <rect x="10" y="50" width="100%" height="50" fill="#fff" rx="5"/>
    <g transform="translate(10, 60)">
      <rect width="50" height="20" fill="#0f0" rx="5"/>
      <text x="15" y="22" fill="#333" font-size="16">Characteristics of Ordinary Variables</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="50,0" dur="2s" begin="0s"/>
      <text x="80" y="22" fill="#333" font-size="16">Scope: Local to the shell script or command</text>
      <text x="80" y="37" fill="#333" font-size="16">Lifetime: Temporary, deleted when the shell script or command terminates</text>
      <text x="80" y="52" fill="#333" font-size="16">Access: Can be accessed within the shell script or command where they are defined</text>
      <animateTransform attributeName="transform" type="translate" from="50,0" to="0,0" dur="2s" begin="2s"/>
    </g>
    <g transform="translate(10, 120)">
      <rect width="50" height="20" fill="#0f0" rx="5"/>
      <text x="15" y="22" fill="#333" font-size="16">Characteristics of Environment Variables</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="50,0" dur="2s" begin="0s"/>
      <text x="80" y="22" fill="#333" font-size="16">Scope: Global, accessible across different shell sessions</text>
      <text x="80" y="37" fill="#333" font-size="16">Lifetime: Persistent, retains its value across shell sessions</text>
      <text x="80" y="52" fill="#333" font-size="16">Access: Can be accessed from any shell session where the variable is set</text>
      <animateTransform attributeName="transform" type="translate" from="50,0" to="0,0" dur="2s" begin="2s"/>
    </g>
    <g transform="translate(10, 200)">
      <rect width="50" height="20" fill="#0f0" rx="5"/>
      <text x="15" y="22" fill="#333" font-size="16">Setting Environment Variables</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="50,0" dur="2s" begin="0s"/>
      <text x="80" y="22" fill="#333" font-size="16">Local variables: Set using the export command within a shell script or command</text>
      <text x="80" y="37" fill="#333" font-size="16">System-wide variables: Set using the export command in the shell's startup file (e.g., ~/.bashrc)</text>
      <text x="80" y="52" fill="#333" font-size="16">Environment file</text>
      <animateTransform attributeName="transform" type="translate" from="50,0" to="0,0" dur="2s" begin="2s"/>
    </g>
    <rect x="10" y="280" width="100%" height="20" fill="#fff" rx="5"/>
    <text x="10" y="285" fill="#333" font-size="18">References</text>
    <rect x="10" y="300" width="100%" height="20" fill="#fff" rx="5"/>
    <text x="10" y="305" fill="#333" font-size="18">Author</text>
  </g>
  <g transform="translate(10, 340)">
    <rect width="100%" height="10" fill="#fff" rx="5"/>
    <text x="10" y="335" fill="#333" font-size="18">Copyright 2023</text>
  </g>
</svg>