<svg width="420" height="400" data-topic-id="connecting-commands-pipe" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A8EA" stop-opacity="1"/>
    </linearGradient>
    <style>
      .pipe {
        stroke: #03A9F4;
        stroke-width: 3;
        stroke-linecap: round;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Connecting Commands: Pipe</title>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="40" fill="#F7F7F7" rx="5"/>
    <g data-narration="What is a Pipe?" transform="translate(10, 10)">
      <text x="0" y="15" fill="#333" font-size="16">What is a Pipe?</text>
      <animateTransform attributeName="transform" type="translate" from="0 10" to="0 -5" dur="2000" begin="-1000"/>
    </g>
    <g data-narration="Basic Syntax">
      <rect x="0" y="50" width="100" height="40" fill="#F7F7F7" rx="5"/>
      <g transform="translate(10, 55)">
        <text x="0" y="60" fill="#333" font-size="16">Basic Syntax</text>
        <animateTransform attributeName="transform" type="translate" from="0 55" to="0 60" dur="2000" begin="-1000"/>
      </g>
      <g data-narration="How Pipes Work">
        <rect x="0" y="90" width="100" height="40" fill="#F7F7F7" rx="5"/>
        <g transform="translate(10, 95)">
          <text x="0" y="100" fill="#333" font-size="16">How Pipes Work</text>
          <animateTransform attributeName="transform" type="translate" from="0 95" to="0 100" dur="2000" begin="-1000"/>
        </g>
        <path d="M 150, 110 L 250, 110" class="pipe"/>
        <animateTransform attributeName="transform" type="translate" from="150 110" to="250 110" dur="2000" begin="-1000"/>
      </g>
      <g data-narration="Examples">
        <rect x="0" y="130" width="100" height="40" fill="#F7F7F7" rx="5"/>
        <g transform="translate(10, 135)">
          <text x="0" y="140" fill="#333" font-size="16">Examples</text>
          <animateTransform attributeName="transform" type="translate" from="0 135" to="0 140" dur="2000" begin="-1000"/>
        </g>
        <path d="M 200, 110 L 300, 110" class="pipe"/>
        <animateTransform attributeName="transform" type="translate" from="200 110" to="300 110" dur="2000" begin="-1000"/>
        <path d="M 350, 110 L 450, 110" class="pipe"/>
        <animateTransform attributeName="transform" type="translate" from="350 110" to="450 110" dur="2000" begin="-1000"/>
      </g>
    </g>
    <g data-narration="Key Concepts">
      <rect x="0" y="170" width="100" height="40" fill="#F7F7F7" rx="5"/>
      <g transform="translate(10, 175)">
        <text x="0" y="180" fill="#333" font-size="16">Key Concepts</text>
        <animateTransform attributeName="transform" type="translate" from="0 175" to="0 180" dur="2000" begin="-1000"/>
      </g>
      <path d="M 200, 110 L 300, 110" class="pipe"/>
      <animateTransform attributeName="transform" type="translate" from="200 110" to="300 110" dur="2000" begin="-1000"/>
      <path d="M 350, 110 L 450, 110" class="pipe"/>
      <animateTransform attributeName="transform" type="translate" from="350 110" to="450 110" dur="2000" begin="-1000"/>
      <path d="M 500, 110 L 600, 110" class="pipe"/>
      <animateTransform attributeName="transform" type="translate" from="500 110" to="600 110" dur="2000" begin="-1000"/>
    </g>
    <g data-narration="Animation">
      <rect x="0" y="210" width="100" height="40" fill="#F7F7F7" rx="5"/>
      <g transform="translate(10, 215)">
        <text x="0" y="220" fill="#333" font-size="16">Animation</text>
        <animateTransform attributeName="transform" type="translate" from="0 215" to="0 220" dur="2000" begin="-1000"/>
      </g>
      <g data-narration="Arrow Markers">
        <rect x="0" y="240" width="100" height="40" fill="#F7F7F7" rx="5"/>
        <g transform="translate(10, 245)">
          <text x="0" y="250" fill="#333" font-size="16">Arrow Markers</text>
          <animateTransform attributeName="transform" type="translate" from="0 245" to="0 250" dur="2000" begin="-1000"/>
        </g>
        <path d="M 150, 110 L 250, 110" class="pipe"/>
        <path d="M 250, 110 L 350, 110" class="pipe"/>
        <path d="M 350, 110 L 450, 110" class="pipe"/>
        <animateTransform attributeName="transform" type="translate" from="150 110" to="250 110" dur="2000" begin="-1000"/>
        <animateTransform attributeName="transform" type="translate" from="250 110" to="350 110" dur="2000" begin="-1000"/>
        <animateTransform attributeName="transform" type="translate" from="350 110" to="450 110" dur="2000" begin="-1000"/>
      </g>
  </g>
  <footer>Connecting Commands: Pipe</footer>
</svg>