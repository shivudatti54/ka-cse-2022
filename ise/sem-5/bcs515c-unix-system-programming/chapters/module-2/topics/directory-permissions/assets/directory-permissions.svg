<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="directory-permissions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title (0.3s) -->
  <g opacity="0" data-narration="Directory Permissions control who can list, modify, and traverse directories in Unix.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#3949AB">Directory Permissions</text>
    <line x1="110" y1="34" x2="310" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- G2: Permission bits breakdown (1.5s) -->
  <g opacity="0" data-narration="A directory listing like drwxr-xr-x breaks down into file type d, owner rwx, group r-x, and others r-x.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Permission String Breakdown</text>
    <!-- Full string -->
    <rect x="95" y="63" width="230" height="26" rx="4" fill="#fff" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="81" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold">
      <tspan fill="#C62828">d</tspan><tspan fill="#3949AB">r</tspan><tspan fill="#3949AB">w</tspan><tspan fill="#3949AB">x</tspan><tspan fill="#00695C">r</tspan><tspan fill="#00695C">-</tspan><tspan fill="#00695C">x</tspan><tspan fill="#E65100">r</tspan><tspan fill="#E65100">-</tspan><tspan fill="#E65100">x</tspan>
    </text>
    <!-- Labels -->
    <line x1="120" y1="89" x2="120" y2="97" stroke="#C62828" stroke-width="1"/>
    <text x="120" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#C62828">Type</text>
    <line x1="170" y1="89" x2="170" y2="97" stroke="#3949AB" stroke-width="1"/>
    <text x="170" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#3949AB">Owner</text>
    <line x1="225" y1="89" x2="225" y2="97" stroke="#00695C" stroke-width="1"/>
    <text x="225" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#00695C">Group</text>
    <line x1="280" y1="89" x2="280" y2="97" stroke="#E65100" stroke-width="1"/>
    <text x="280" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E65100">Others</text>
  </g>

  <!-- G3: Directory-specific meanings (3.0s) -->
  <g opacity="0" data-narration="For directories, read means list contents, write means create or delete files, and execute means cd into the directory. This differs from file permissions.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#C62828">Directory-Specific Meanings (Different from Files!)</text>
    <!-- r -->
    <rect x="15" y="135" width="125" height="52" rx="6" fill="#fff" stroke="#3949AB" stroke-width="1.5"/>
    <text x="77" y="151" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#3949AB">r (read)</text>
    <text x="77" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#333">List contents</text>
    <text x="77" y="178" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">ls directory/</text>
    <!-- w -->
    <rect x="148" y="135" width="125" height="52" rx="6" fill="#fff" stroke="#00695C" stroke-width="1.5"/>
    <text x="210" y="151" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#00695C">w (write)</text>
    <text x="210" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#333">Create/delete files</text>
    <text x="210" y="178" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">touch dir/file</text>
    <!-- x -->
    <rect x="281" y="135" width="125" height="52" rx="6" fill="#fff" stroke="#E65100" stroke-width="1.5"/>
    <text x="343" y="151" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#E65100">x (execute)</text>
    <text x="343" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#333">Access (cd into)</text>
    <text x="343" y="178" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">cd directory/</text>
  </g>

  <!-- G4: Octal notation (4.5s) -->
  <g opacity="0" data-narration="In octal notation, r equals 4, w equals 2, and x equals 1. For example, 755 means rwxr-xr-x, 700 means rwx for owner only, and 644 means rw-r--r--.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Octal Notation</text>
    <!-- Octal values -->
    <rect x="15" y="212" width="80" height="20" rx="3" fill="#3949AB"/>
    <text x="55" y="226" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">r=4 w=2 x=1</text>
    <!-- Examples -->
    <rect x="105" y="212" width="95" height="20" rx="3" fill="#fff" stroke="#00695C" stroke-width="1"/>
    <text x="152" y="226" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">755=rwxr-xr-x</text>
    <rect x="208" y="212" width="95" height="20" rx="3" fill="#fff" stroke="#E65100" stroke-width="1"/>
    <text x="255" y="226" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">700=rwx------</text>
    <rect x="311" y="212" width="95" height="20" rx="3" fill="#fff" stroke="#C62828" stroke-width="1"/>
    <text x="358" y="226" text-anchor="middle" font-family="monospace" font-size="9" fill="#C62828">644=rw-r--r--</text>
  </g>

  <!-- G5: Special bits (6.0s) -->
  <g opacity="0" data-narration="Special permission bits include SetUID shown as s in owner execute, SetGID shown as s in group execute, and the Sticky bit shown as t in others execute, commonly seen on /tmp.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#C62828">Special Permission Bits</text>
    <!-- ls -l output example -->
    <rect x="30" y="261" width="360" height="22" rx="4" fill="#1a1a2e"/>
    <text x="40" y="276" font-family="monospace" font-size="10" fill="#0f0">$ ls -l</text>
    <text x="115" y="276" font-family="monospace" font-size="10">
      <tspan fill="#ccc">drwx</tspan><tspan fill="#ff6" font-weight="bold">r-s</tspan><tspan fill="#ccc">r-</tspan><tspan fill="#f96" font-weight="bold">t</tspan>
    </text>
    <!-- SetUID -->
    <rect x="15" y="290" width="125" height="42" rx="5" fill="#fff" stroke="#3949AB" stroke-width="1.2"/>
    <text x="77" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3949AB">SetUID (s)</text>
    <text x="77" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#555">Owner execute position</text>
    <text x="77" y="328" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">rws = 4xxx</text>
    <!-- SetGID -->
    <rect x="148" y="290" width="125" height="42" rx="5" fill="#fff" stroke="#00695C" stroke-width="1.2"/>
    <text x="210" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">SetGID (s)</text>
    <text x="210" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#555">Group execute position</text>
    <text x="210" y="328" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">r-s = 2xxx</text>
    <!-- Sticky bit -->
    <rect x="281" y="290" width="125" height="42" rx="5" fill="#fff" stroke="#E65100" stroke-width="1.2"/>
    <text x="343" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100">Sticky (t)</text>
    <text x="343" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#555">Others execute position</text>
    <text x="343" y="328" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">r-t = 1xxx (/tmp)</text>
  </g>

  <!-- G6: Commands (7.5s) -->
  <g opacity="0" data-narration="Key commands include chmod to change permissions, chown to change owner, chgrp to change group, and umask to set the default permission mask.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Key Commands</text>
    <!-- chmod -->
    <rect x="15" y="358" width="93" height="34" rx="5" fill="#3949AB"/>
    <text x="61" y="372" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">chmod</text>
    <text x="61" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#C5CAE9">change perms</text>
    <!-- chown -->
    <rect x="116" y="358" width="93" height="34" rx="5" fill="#00695C"/>
    <text x="162" y="372" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">chown</text>
    <text x="162" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#B2DFDB">change owner</text>
    <!-- chgrp -->
    <rect x="217" y="358" width="93" height="34" rx="5" fill="#E65100"/>
    <text x="263" y="372" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">chgrp</text>
    <text x="263" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#FFE0B2">change group</text>
    <!-- umask -->
    <rect x="318" y="358" width="88" height="34" rx="5" fill="#C62828"/>
    <text x="362" y="372" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">umask</text>
    <text x="362" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#FFCDD2">default mask</text>
  </g>
</svg>
