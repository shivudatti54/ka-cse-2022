<svg width="420" height="400" data-topic-id="profile" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="profile-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A98FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#profile-gradient)"/>
  <g transform="translate(10, 20)">
    <title>
      <text x="10" y="10" font-size="24" font-family="Arial" text-anchor="start">UNIX System Programming: Profiles</text>
    </title>
    <rect x="0" y="30" width="400" height="200" fill="#FFFFFF" rx="10"/>
    <g transform="rotate(45 200 100)">
      <rect x="0" y="0" width="80" height="50" fill="#DC3545" rx="5"/>
      <text x="20" y="20" font-size="16" font-family="Arial" text-anchor="start">Login Profile</text>
      <text x="20" y="40" font-size="14" font-family="Arial" text-anchor="start" data-narration="A login profile is executed when a user logs in to the system. It sets up the user's shell and environment." style="fill:#000">Description</text>
      <animate transform="rotate(45 200 100)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="rotate(45 200 150)">
      <rect x="0" y="0" width="80" height="50" fill="#5CB85C" rx="5"/>
      <text x="20" y="20" font-size="16" font-family="Arial" text-anchor="start">Interactive Profile</text>
      <text x="20" y="40" font-size="14" font-family="Arial" text-anchor="start" data-narration="An interactive profile is executed when a user starts a new shell session interactively. It allows users to customize their environment and set up their shell to behave in a specific way." style="fill:#000">Description</text>
      <animate transform="rotate(45 200 150)" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="rotate(45 200 200)">
      <rect x="0" y="0" width="80" height="50" fill="#FF9800" rx="5"/>
      <text x="20" y="20" font-size="16" font-family="Arial" text-anchor="start">Creating a Profile</text>
      <text x="20" y="40" font-size="14" font-family="Arial" text-anchor="start" data-narration="To create a profile, you need to edit the .profile or .bash_profile file in your home directory. The .profile file is executed when a user logs in, while the .bash_profile file is executed when a user starts a new shell session interactively." style="fill:#000">Description</text>
      <animate transform="rotate(45 200 200)" begin="4s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="rotate(45 200 250)">
      <rect x="0" y="0" width="80" height="50" fill="#16A085" rx="5"/>
      <text x="20" y="20" font-size="16" font-family="Arial" text-anchor="start">Best Practices</text>
      <text x="20" y="40" font-size="14" font-family="Arial" text-anchor="start" data-narration="Keep your profile script short and concise. Avoid using complex commands or loops in your profile script. Use variables to customize your environment and set up your shell. Test your profile script regularly to ensure it works correctly." style="fill:#000">Description</text>
      <animate transform="rotate(45 200 250)" begin="6s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="rotate(45 200 300)">
      <rect x="0" y="0" width="80" height="50" fill="#FFC107" rx="5"/>
      <text x="20" y="20" font-size="16" font-family="Arial" text-anchor="start">Common Profile Directories</text>
      <text x="20" y="40" font-size="14" font-family="Arial" text-anchor="start" data-narration="The .profile file is executed when a user logs in, while the .bash_profile file is executed when a user starts a new shell session interactively. Both files are typically stored in the /home/user/.bashrc file." style="fill:#000">Description</text>
      <animate transform="rotate(45 200 300)" begin="8s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="rotate(45 200 350)">
      <rect x="0" y="0" width="80" height="50" fill="#3498DB" rx="5"/>
      <text x="20" y="20" font-size="16" font-family="Arial" text-anchor="start">Conclusion</text>
      <text x="20" y="40" font-size="14" font-family="Arial" text-anchor="start" data-narration="Profiles are an essential part of UNIX system programming. They allow users to customize their environment and set up their shell to behave in a specific way." style="fill:#000">Description</text>
      <animate transform="rotate(45 200 350)" begin="10s" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
  <footer>
    <g transform="rotate(45 400 370)">
      <rect x="0" y="0" width="80" height="50" fill="#E74C3C" rx="5"/>
      <text x="20" y="20" font-size="16" font-family="Arial" text-anchor="start">Sources</text>
      <text x="20" y="40" font-size="14" font-family="Arial" text-anchor="start" data-narration="This diagram was created using SVG and was inspired by UNIX system programming concepts." style="fill:#000">Description</text>
      <animate transform="rotate(45 400 370)" begin="12s" dur="2s" repeatCount="indefinite"/>
    </g>
  </footer>
</svg>