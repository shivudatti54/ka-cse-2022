<svg width="420" height="400" data-topic-id="recursively-changing-file-permissions"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background-color: #E0E0E0">
    <!-- Header -->
    <defs>
        <linearGradient id="header-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="30" fill="url(#header-gradient)" rx="5" />
    <text x="20" y="40" font-size="24" font-family="Arial" font-weight="bold"
          text-anchor="middle" fill="#3498DB">Recursively Changing File Permissions</text>
    <!-- Section 1: Introduction -->
    <rect x="10" y="70" width="400" height="30" fill="#E0E0E0" rx="5" />
    <text x="20" y="90" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="In UNIX systems, file permissions play a crucial role in controlling access to files and directories." />
    <animateTransform attributeName="transform" type="translate"
                      begin="0s" dur="2s" from="0,70" to="0,80" />
    <animateTransform attributeName="transform" type="translate"
                      begin="2s" dur="2s" from="0,80" to="0,70" />
    <!-- Section 2: File Permissions Basics -->
    <rect x="10" y="120" width="400" height="30" fill="#E0E0E0" rx="5" />
    <text x="20" y="140" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="File permissions are a set of three numbers that define the permissions for a file or directory:" />
    <rect x="150" y="160" width="20" height="20" fill="#3498DB" rx="5" />
    <text x="180" y="160" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="r: Read permission" />
    <rect x="200" y="160" width="20" height="20" fill="#3498DB" rx="5" />
    <text x="240" y="160" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="w: Write permission" />
    <rect x="260" y="160" width="20" height="20" fill="#3498DB" rx="5" />
    <text x="300" y="160" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="x: Execute permission" />
    <animateTransform attributeName="transform" type="translate"
                      begin="4s" dur="2s" from="0,160" to="0,180" />
    <animateTransform attributeName="transform" type="translate"
                      begin="6s" dur="2s" from="0,180" to="0,160" />
    <!-- Section 3: The `chmod` Command -->
    <rect x="10" y="240" width="400" height="30" fill="#E0E0E0" rx="5" />
    <text x="20" y="260" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="The `chmod` command is used to change the permissions of a file or directory:" />
    <rect x="150" y="280" width="20" height="20" fill="#3498DB" rx="5" />
    <text x="180" y="280" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="chmod [permissions] [file_name]" />
    <rect x="200" y="280" width="20" height="20" fill="#3498DB" rx="5" />
    <text x="240" y="280" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="Example: chmod 755 example.txt" />
    <animateTransform attributeName="transform" type="translate"
                      begin="8s" dur="2s" from="0,280" to="0,300" />
    <animateTransform attributeName="transform" type="translate"
                      begin="10s" dur="2s" from="0,300" to="0,280" />
    <!-- Section 4: Change Permissions for a Single File -->
    <rect x="10" y="340" width="400" height="30" fill="#E0E0E0" rx="5" />
    <text x="20" y="360" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="To change the permissions of a single file, you can use the following syntax:" />
    <rect x="150" y="380" width="20" height="20" fill="#3498DB" rx="5" />
    <text x="180" y="380" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="chmod [permissions] [file_name]" />
    <rect x="200" y="380" width="20" height="20" fill="#3498DB" rx="5" />
    <text x="240" y="380" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="Example: chmod u+x example.txt" />
    <animateTransform attributeName="transform" type="translate"
                      begin="12s" dur="2s" from="0,380" to="0,400" />
    <animateTransform attributeName="transform" type="translate"
                      begin="14s" dur="2s" from="0,400" to="0,380" />
    <!-- Footer -->
    <rect x="10" y="420" width="400" height="30" fill="#E0E0E0" rx="5" />
    <text x="20" y="440" font-size="18" font-family="Arial" text-anchor="start"
          fill="#2E4053" data-narration="To learn more about file permissions and the `chmod` command, refer to the UNIX documentation." />
</svg>