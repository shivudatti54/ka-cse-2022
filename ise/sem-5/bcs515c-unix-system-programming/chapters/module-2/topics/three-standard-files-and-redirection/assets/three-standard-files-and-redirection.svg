    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#ACC2FF" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3B5998" stop-opacity="1"/>
            <stop offset="100%" stop-color="#6c5ce7" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <rect x="20" y="20" width="380" height="300" fill="url(#pastel-gradient)"/>
    <circle cx="210" cy="50" r="50" stroke="#fff" stroke-width="2"/>
    <g transform="translate(210, 70)">
        <text x="50" y="70" fill="#fff" font-size="24" font-family="Arial, sans-serif">Three Standard Files and Redirection</text>
    </g>

    <section data-narration="Introduction" style="padding: 20px; border-bottom: 1px solid #ccc;">
        <h2>Introduction</h2>
        <p>In UNIX system programming, the three standard files, also known as the "special files" or "character devices," are used to redirect input/output operations.</p>
    </section>

    <section data-narration="Standard Input (stdin)" style="padding: 20px; border-bottom: 1px solid #ccc;">
        <h2>Standard Input (stdin)</h2>
        <p>Also known as the keyboard, used to receive input from the user, file descriptor 0, can be redirected using the <code>&lt;</code> symbol.</p>
        <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#fff" stroke="#ccc" stroke-width="2"/>
            <path d="M 50 50 Q 75 50 75 75"/>
        </svg>