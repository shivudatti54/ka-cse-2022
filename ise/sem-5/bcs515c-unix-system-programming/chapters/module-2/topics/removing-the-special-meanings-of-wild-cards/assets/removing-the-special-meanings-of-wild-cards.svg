<svg width="420" height="400" data-topic-id="removing-special-meanings-of-wild-cards">
  <title>Removing the Special Meanings of Wild Cards</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 20)">
    <text x="10" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">Removing the Special Meanings of Wild Cards</text>
  </g>
  <section data-narration="What are Wild Cards?">
    <g transform="translate(50, 100)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">What are Wild Cards?</text>
      <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(50, 130)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">In the context of the `ls` command, wild cards are special characters that allow you to match patterns in file names.</text>
      <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <section data-narration="Common Wild Cards">
    <g transform="translate(50, 180)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">Common Wild Cards</text>
      <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(50, 210)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">The two most common wild cards used in `ls` are:</text>
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `*` (asterisk): matches any sequence of characters</text>
      <text x="10" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `?` (question mark): matches any single character</text>
      <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <section data-narration="Removing Special Meanings">
    <g transform="translate(50, 260)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">Removing Special Meanings</text>
      <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(50, 290)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">Quoting prevents `ls` from interpreting the special meanings of `*` and `?` characters</text>
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">Use double quotes (`"`) or single quotes (`'`) like this:</text>
      <text x="10" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `ls "file\*"`</text>
      <text x="10" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `ls 'file\?'`</text>
      <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(50, 320)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">Alternatively, you can use the `-l` option to display a long listing format</text>
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `ls -l "file\*"`</text>
      <text x="10" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `ls -l 'file\?'`</text>
      <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <section data-narration="Using the `glob` Option">
    <g transform="translate(50, 370)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">Using the `glob` Option</text>
      <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(50, 400)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">To remove the special meanings of wild cards from all `ls` commands, you can set the `glob` option</text>
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `export GLOB=\*`</text>
      <text x="10" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `export GLOB='?'`</text>
      <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <section data-narration="Example Use Cases">
    <g transform="translate(50, 450)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">Example Use Cases</text>
      <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(50, 480)">
      <rect width="80" height="20" fill="#F7F7F7" rx="5"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `ls "file\*"`: lists all files with the name "file" and any characters after it</text>
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">- `ls 'file\?'`: lists all files with the name "file" and any characters after it</text>
      <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <footer>
    <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F"> This diagram was created using SVG and is designed to be educational and visually clear.</text>
  </footer>
</svg>