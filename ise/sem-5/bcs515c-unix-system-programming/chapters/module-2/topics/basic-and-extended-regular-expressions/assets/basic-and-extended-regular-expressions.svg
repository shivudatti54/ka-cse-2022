<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="basic-and-extended-regular-expressions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title (0.3s) -->
  <g opacity="0" data-narration="Regular Expressions are powerful pattern-matching tools in Unix, divided into Basic (BRE) and Extended (ERE) types.">
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#3949AB">Regular Expressions in Unix</text>
    <line x1="100" y1="34" x2="320" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3949AB">BRE (Basic) &amp; ERE (Extended)</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- G2: BRE Metacharacters (1.5s) -->
  <g opacity="0" data-narration="Basic Regular Expression metacharacters include dot for any character, asterisk for zero or more, caret for start of line, dollar for end, brackets for character class, and backslash-parentheses for grouping.">
    <rect x="10" y="56" width="195" height="108" rx="6" fill="#FFFFFF" fill-opacity="0.85" stroke="#3949AB" stroke-width="1.2"/>
    <text x="107" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">BRE Metacharacters</text>
    <text x="20" y="87" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">.</text>
    <text x="35" y="87" font-family="Arial, sans-serif" font-size="8" fill="#333">any char</text>
    <text x="105" y="87" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">*</text>
    <text x="117" y="87" font-family="Arial, sans-serif" font-size="8" fill="#333">zero or more</text>
    <text x="20" y="101" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">^</text>
    <text x="35" y="101" font-family="Arial, sans-serif" font-size="8" fill="#333">start of line</text>
    <text x="105" y="101" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">$</text>
    <text x="117" y="101" font-family="Arial, sans-serif" font-size="8" fill="#333">end of line</text>
    <text x="20" y="115" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">[ ]</text>
    <text x="42" y="115" font-family="Arial, sans-serif" font-size="8" fill="#333">char class</text>
    <text x="105" y="115" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">\( \)</text>
    <text x="132" y="115" font-family="Arial, sans-serif" font-size="8" fill="#333">grouping</text>
    <rect x="16" y="122" width="183" height="18" rx="3" fill="#E8EAF6"/>
    <text x="20" y="134" font-family="monospace" font-size="8" fill="#3949AB">grep '^[A-Z].*end$' file</text>
    <rect x="16" y="142" width="183" height="18" rx="3" fill="#E8EAF6"/>
    <text x="20" y="154" font-family="monospace" font-size="8" fill="#3949AB">grep 'c.t' file  → cat, cot</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- G3: ERE Additions (3.0s) -->
  <g opacity="0" data-narration="Extended Regular Expressions add plus for one or more, question mark for zero or one, pipe for alternation, parentheses without backslash for grouping, and curly braces for quantifiers.">
    <rect x="215" y="56" width="195" height="108" rx="6" fill="#FFFFFF" fill-opacity="0.85" stroke="#00695C" stroke-width="1.2"/>
    <text x="312" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">ERE Additions</text>
    <text x="225" y="87" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">+</text>
    <text x="238" y="87" font-family="Arial, sans-serif" font-size="8" fill="#333">one or more</text>
    <text x="310" y="87" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">?</text>
    <text x="323" y="87" font-family="Arial, sans-serif" font-size="8" fill="#333">zero or one</text>
    <text x="225" y="101" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">|</text>
    <text x="238" y="101" font-family="Arial, sans-serif" font-size="8" fill="#333">alternation</text>
    <text x="310" y="101" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">( )</text>
    <text x="330" y="101" font-family="Arial, sans-serif" font-size="8" fill="#333">grouping</text>
    <text x="225" y="115" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">{ }</text>
    <text x="247" y="115" font-family="Arial, sans-serif" font-size="8" fill="#333">quantifiers {n,m}</text>
    <rect x="221" y="122" width="183" height="18" rx="3" fill="#E0F2F1"/>
    <text x="225" y="134" font-family="monospace" font-size="8" fill="#00695C">egrep 'cat|dog' file</text>
    <rect x="221" y="142" width="183" height="18" rx="3" fill="#E0F2F1"/>
    <text x="225" y="154" font-family="monospace" font-size="8" fill="#00695C">egrep 'go+d' → god, good</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- G4: Character Classes (4.5s) -->
  <g opacity="0" data-narration="Character classes let you match specific sets: a-z for lowercase, 0-9 for digits, caret-abc to negate, and POSIX classes like alpha, digit, and space for portability.">
    <rect x="10" y="172" width="400" height="68" rx="6" fill="#FFFFFF" fill-opacity="0.85" stroke="#E65100" stroke-width="1.2"/>
    <text x="210" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Character Classes &amp; POSIX Bracket Expressions</text>
    <!-- Row 1: basic classes -->
    <rect x="18" y="194" width="58" height="18" rx="3" fill="#FFF3E0"/>
    <text x="47" y="206" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#E65100">[a-z]</text>
    <rect x="82" y="194" width="58" height="18" rx="3" fill="#FFF3E0"/>
    <text x="111" y="206" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#E65100">[0-9]</text>
    <rect x="146" y="194" width="62" height="18" rx="3" fill="#FFF3E0"/>
    <text x="177" y="206" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#E65100">[^abc]</text>
    <!-- Row 1: POSIX -->
    <rect x="216" y="194" width="58" height="18" rx="3" fill="#E8EAF6"/>
    <text x="245" y="206" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">[:alpha:]</text>
    <rect x="280" y="194" width="58" height="18" rx="3" fill="#E8EAF6"/>
    <text x="309" y="206" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">[:digit:]</text>
    <rect x="344" y="194" width="60" height="18" rx="3" fill="#E8EAF6"/>
    <text x="374" y="206" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">[:space:]</text>
    <!-- Descriptions -->
    <text x="47" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">lowercase</text>
    <text x="111" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">digits</text>
    <text x="177" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">not a,b,c</text>
    <text x="245" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">letters</text>
    <text x="309" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">0-9</text>
    <text x="374" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">whitespace</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- G5: BRE vs ERE Comparison (6.0s) -->
  <g opacity="0" data-narration="BRE is used by grep and sed, requiring backslashes for grouping and quantifiers. ERE is used by egrep and awk, where plus, question mark, pipe, and parentheses work without backslashes.">
    <rect x="10" y="248" width="400" height="72" rx="6" fill="#FFFFFF" fill-opacity="0.85" stroke="#C62828" stroke-width="1.2"/>
    <text x="210" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">BRE vs ERE Comparison</text>
    <!-- Headers -->
    <rect x="18" y="270" width="88" height="14" rx="2" fill="#3949AB"/>
    <text x="62" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFF" font-weight="bold">Feature</text>
    <rect x="110" y="270" width="143" height="14" rx="2" fill="#3949AB"/>
    <text x="181" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFF" font-weight="bold">BRE (grep, sed)</text>
    <rect x="257" y="270" width="147" height="14" rx="2" fill="#00695C"/>
    <text x="330" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFF" font-weight="bold">ERE (egrep, awk)</text>
    <!-- Row 1 -->
    <text x="62" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#333">Grouping</text>
    <text x="181" y="296" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#3949AB">\( \)</text>
    <text x="330" y="296" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00695C">( )</text>
    <!-- Row 2 -->
    <text x="62" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#333">Quantifiers</text>
    <text x="181" y="308" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#3949AB">\{ \}  (no + ?)</text>
    <text x="330" y="308" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00695C">{ }  +  ?  |</text>
    <line x1="18" y1="286" x2="396" y2="286" stroke="#DDD" stroke-width="0.5"/>
    <line x1="18" y1="300" x2="396" y2="300" stroke="#DDD" stroke-width="0.5"/>
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- G6: Practical Examples (7.5s) -->
  <g opacity="0" data-narration="Practical examples: use grep with caret to find lines starting with Error, sed with s-command for substitution, egrep to match email patterns, and egrep to match IP address patterns.">
    <rect x="10" y="328" width="400" height="64" rx="6" fill="#FFFFFF" fill-opacity="0.85" stroke="#3949AB" stroke-width="1.2"/>
    <text x="210" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Practical Examples</text>
    <!-- Example 1: grep -->
    <rect x="16" y="349" width="190" height="16" rx="3" fill="#E8EAF6"/>
    <text x="20" y="360" font-family="monospace" font-size="7.5" fill="#3949AB">grep '^Error' log.txt</text>
    <!-- Example 2: sed -->
    <rect x="214" y="349" width="190" height="16" rx="3" fill="#E0F2F1"/>
    <text x="218" y="360" font-family="monospace" font-size="7.5" fill="#00695C">sed 's/old/new/g' file</text>
    <!-- Example 3: email -->
    <rect x="16" y="369" width="190" height="16" rx="3" fill="#FFF3E0"/>
    <text x="20" y="380" font-family="monospace" font-size="7" fill="#E65100">egrep '[a-z]+@[a-z]+\.[a-z]+' f</text>
    <!-- Example 4: IP -->
    <rect x="214" y="369" width="190" height="16" rx="3" fill="#FFEBEE"/>
    <text x="218" y="380" font-family="monospace" font-size="7" fill="#C62828">egrep '[0-9]{1,3}(\.[0-9]{1,3}){3}'</text>
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
