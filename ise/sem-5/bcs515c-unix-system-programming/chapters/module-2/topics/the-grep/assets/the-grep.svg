<svg 
    width="420" 
    height="400" 
    data-topic-id="the-grep"
    viewBox="0 0 420 400" 
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink" 
    style="background-image: linear-gradient(to bottom, #3498db, #2ecc71); margin: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);">
  <title>The Grep</title>
  <footer>
    &copy; 2023
  </footer>
  <rect x="10" y="10" width="400" height="50" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
  <g data-narration="What is grep?">
    <rect x="10" y="70" width="350" height="30" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
    <text x="15" y="100" font-size="18" font-family="Arial, sans-serif" fill="#000">What is grep?</text>
    <text x="15" y="120" font-size="14" font-family="Arial, sans-serif" fill="#666">grep is a command-line utility in UNIX-based systems that allows users to search for specific patterns or text within files and output the matched lines.</text>
  </g>
  <g data-narration="Syntax">
    <rect x="10" y="120" width="350" height="30" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
    <text x="15" y="150" font-size="18" font-family="Arial, sans-serif" fill="#000">Syntax</text>
    <text x="15" y="170" font-size="14" font-family="Arial, sans-serif" fill="#666">The basic syntax of `grep` is as follows:</text>
    <text x="15" y="190" font-size="14" font-family="Arial, sans-serif" fill="#666">grep [options] pattern file</text>
  </g>
  <g data-narration="How it Works">
    <rect x="10" y="210" width="350" height="30" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
    <text x="15" y="240" font-size="18" font-family="Arial, sans-serif" fill="#000">How it Works</text>
    <text x="15" y="260" font-size="14" font-family="Arial, sans-serif" fill="#666">Here's a step-by-step explanation of how `grep` works:</text>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" />
    <animate attributeName="opacity" from="0" to="1" dur="2s" begin="2s" />
  </g>
  <g data-narration="Options">
    <rect x="10" y="260" width="350" height="30" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
    <text x="15" y="290" font-size="18" font-family="Arial, sans-serif" fill="#000">Options</text>
    <text x="15" y="310" font-size="14" font-family="Arial, sans-serif" fill="#666">Here are some common options used with `grep`:</text>
    <text x="15" y="330" font-size="14" font-family="Arial, sans-serif" fill="#666">-e or --regexp specifies a regular expression pattern instead of a text search</text>
    <text x="15" y="350" font-size="14" font-family="Arial, sans-serif" fill="#666">-i or --ignore-case makes the search case-insensitive</text>
    <text x="15" y="370" font-size="14" font-family="Arial, sans-serif" fill="#666">-v or --verse inverts the match, printing lines that don't match the pattern</text>
  </g>
  <g data-narration="Regular Expressions">
    <rect x="10" y="370" width="350" height="30" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
    <text x="15" y="400" font-size="18" font-family="Arial, sans-serif" fill="#000">Regular Expressions</text>
    <text x="15" y="420" font-size="14" font-family="Arial, sans-serif" fill="#666">Regular expressions are a powerful way to specify patterns for searching.</text>
    <text x="15" y="440" font-size="14" font-family="Arial, sans-serif" fill="#666">Here are some common regular expression concepts:</text>
    <text x="15" y="460" font-size="14" font-family="Arial, sans-serif" fill="#666">- . matches any single character</text>
    <text x="15" y="480" font-size="14" font-family="Arial, sans-serif" fill="#666">- * matches zero or more occurrences of the preceding element</text>
  </g>
  <g data-narration="Examples">
    <rect x="10" y="480" width="350" height="30" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
    <text x="15" y="510" font-size="18" font-family="Arial, sans-serif" fill="#000">Examples</text>
    <text x="15" y="530" font-size="14" font-family="Arial, sans-serif" fill="#666">Here are some examples:</text>
    <text x="15" y="550" font-size="14" font-family="Arial, sans-serif" fill="#666">grep 'pattern' file</text>
    <text x="15" y="570" font-size="14" font-family="Arial, sans-serif" fill="#666">grep -e 'pattern' file</text>
  </g>
  <g data-narration="Arrow Markers">
    <rect x="10" y="570" width="350" height="30" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
    <text x="15" y="600" font-size="18" font-family="Arial, sans-serif" fill="#000">Arrow Markers</text>
    <text x="15" y="620" font-size="14" font-family="Arial, sans-serif" fill="#666">Arrow markers are used to connect different sections of the diagram.</text>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" />
    <animate attributeName="opacity" from="0" to="1" dur="2s" begin="2s" />
  </g>
  <g data-narration="Connections">
    <rect x="10" y="620" width="350" height="30" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" />
    <text x="15" y="650" font-size="18" font-family="Arial, sans-serif" fill="#000">Connections</text>
    <text x="15" y="670" font-size="14" font-family="Arial, sans-serif" fill="#666">Connections are used to show the relationships between different sections of the diagram.</text>
  </g>
</svg>