      <line x1="120" y1="280" x2="120" y2="380" stroke="#2E4053" stroke-width="2"/>
      <line x1="200" y1="280" x2="200" y2="380" stroke="#2E4053" stroke-width="2"/>
      <line x1="120" y1="380" x2="200" y2="380" stroke="#2E4053" stroke-width="2"/>
