      <line x1="0" y1="280" x2="0" y2="280" stroke="#2E4053" stroke-width="2"/>
      <line x1="100" y1="280" x2="100" y2="380" stroke="#2E4053" stroke-width="2"/>
    </g>
    <g transform="translate(15, 190)">
      <line x1="0" y1="280" x2="100" y2="280" stroke="#2E4053" stroke-width="2"/>
      <line x1="120" y1="280" x2="200" y2="280" stroke="#2E4053" stroke-width="2"/>
      <line x1="0" y1="280" x2="0" y2="380" stroke="#2E4053" stroke-width="2"/>
      <line x1="100" y1="280" x2="100" y2="380" stroke="#2E4053" stroke-width="2"/>
      <line x1="120" y1="280" x2="120" y2="380" stroke="#2E4053" stroke-width="2"/>
