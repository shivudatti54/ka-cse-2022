    </g>
    <g transform="translate(15, 10)">
      <text x="0" y="40" text-anchor="start" font-size="18" fill="#2E4053">Arrow markers for connections.</text>
      <text x="10" y="60" text-anchor="start" font-size="18" fill="#2E4053">Use arrow markers to highlight the relationships between different concepts.</text>
    </g>
    <g transform="translate(15, 190)">
      <text x="0" y="40" text-anchor="start" font-size="18" fill="#2E4053">Clear labels and annotations.</text>
      <text x="10" y="60" text-anchor="start" font-size="18" fill="#2E4053">Use clear labels and annotations to make the diagram easy to understand.</text>
    </g>
    <g transform="translate(15, 370)">
      <text x="0" y="40" text-anchor="start" font-size="18" fill="#2E4053">Professional color scheme.</text>
