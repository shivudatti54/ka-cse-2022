      <animate xmlns="http://www.w3.org/1999/09/SVG/NS" begin="4s" dur="2s" fill="freeze" from="scale(1)" to="scale(1.1)" repeatCount="indefinite"/>
    </g>
    <g transform="translate(15, 10)">
