<svg width="420" height="400" data-topic-id="typical-examples-involving-different-regular-expressions" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2A8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5C3C5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Typical Examples Involving Different Regular Expressions</title>
  <body>
    <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
    <g transform="translate(15, 50)">
      <text x="0" y="0" text-anchor="start" font-size="24" fill="#2E4053">Character Classes</text>
      <text x="0" y="30" text-anchor="start" font-size="18" fill="#2E4053">A character class is a set of characters enclosed in square brackets ([]).</text>
      <rect x="0" y="60" width="100" height="20" fill="#2E4053" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="10" y="80" text-anchor="start" font-size="18" fill="#2E4053">Example: `[^abc]` matches any single character except `a`, `b`, or `c`.</text>
      <rect x="10" y="110" width="100" height="20" fill="#2E4053" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="10" y="130" text-anchor="start" font-size="18" fill="#2E4053">Example: `echo "Hello, World!" | grep "[a-zA-Z]"` prints the line that matches this pattern.</text>
    </g>
    <g transform="translate(15, 200)">
      <text x="0" y="0" text-anchor="start" font-size="24" fill="#2E4053">Quantifiers</text>
      <text x="0" y="30" text-anchor="start" font-size="18" fill="#2E4053">A quantifier is a symbol that specifies the number of times a preceding element should be matched.</text>
      <rect x="0" y="60" width="100" height="20" fill="#2E4053" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="10" y="80" text-anchor="start" font-size="18" fill="#2E4053">Example: `o*` matches zero or more occurrences of the character `o`.</text>
      <rect x="10" y="110" width="100" height="20" fill="#2E4053" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="10" y="130" text-anchor="start" font-size="18" fill="#2E4053">Example: `echo "Hello, World!" | grep "o*"` prints the line that matches this pattern.</text>
    </g>
    <g transform="translate(15, 350)">
      <text x="0" y="0" text-anchor="start" font-size="24" fill="#2E4053">Repetition</text>
      <text x="0" y="30" text-anchor="start" font-size="18" fill="#2E4053">Repetition is used to specify how often a preceding element should be matched.</text>
      <rect x="0" y="60" width="100" height="20" fill="#2E4053" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="10" y="80" text-anchor="start" font-size="18" fill="#2E4053">Example: `o{2}` matches exactly 2 occurrences of the character `o`.</text>
      <rect x="10" y="110" width="100" height="20" fill="#2E4053" rx="5" stroke="#2E4053" stroke-width="2"/>
      <text x="10" y="130" text-anchor="start" font-size="18" fill="#2E4053">Example: `echo "Hello, World!" | grep "o{2}"` prints the line that matches this pattern.</text>
    </g>
    <g transform="translate(15, 10)">
      <animate xmlns="http://www.w3.org/1999/09/SVG/NS" begin="0s" dur="2s" fill="freeze" from="scale(1)" to="scale(1.1)" repeatCount="indefinite"/>
      <animate xmlns="http://www.w3.org/1999/09/SVG/NS" begin="2s" dur="2s" fill="freeze" from="scale(1)" to="scale(1.1)" repeatCount="indefinite"/>
      <animate xmlns="http://www.w3.org/1999/09/SVG/NS" begin="4s" dur="2s" fill="freeze" from="scale(1)" to="scale(1.1)" repeatCount="indefinite"/>
    </g>
    <g transform="translate(15, 190)">
      <animate xmlns="http://www.w3.org/1999/09/SVG/NS" begin="0s" dur="2s" fill="freeze" from="scale(1)" to="scale(1.1)" repeatCount="indefinite"/>
      <animate xmlns="http://www.w3.org/1999/09/SVG/NS" begin="2s" dur="2s" fill="freeze" from="scale(1)" to="scale(1.1)" repeatCount="indefinite"/>
      <animate xmlns="http://www.w3.org/1999/09/SVG/NS" begin="4s" dur="2s" fill="freeze" from="scale(1)" to="scale(1.1)" repeatCount="indefinite"/>
    </g>
    <g transform="translate(15, 370)">
      <animate xmlns="http://www.w3.org/1999/09/SVG/NS" begin="0s" dur="2s" fill="freeze" from="scale(1)" to="scale(1.1)" repeatCount="indefinite"/>
