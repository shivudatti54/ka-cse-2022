<svg width="420" height="400" data-topic-id="unix-system-programming-chapter-10">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="40" fill="#2f4f7f" rx="10"/>
  <text x="20" y="30" fill="#ffffff" font-size="24" text-anchor="middle">File Permissions and Access Control</text>
  <animateTransform attributeName="transform" type="translate" from="0 40" to="0 50" begin="0s" dur="2s"/>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2ff"/>
      <stop offset="100%" stop-color="#a7c2ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="50" width="400" height="300" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Overview -->
  <section data-narration="Overview">
    <rect x="10" y="60" width="380" height="40" fill="#2f4f7f" rx="10"/>
    <text x="20" y="70" fill="#ffffff" font-size="18" text-anchor="middle">Overview</text>
    <animateTransform attributeName="transform" type="translate" from="0 70" to="0 80" begin="0s" dur="2s"/>
    <animateTransform attributeName="transform" type="rotate" from="0 20 80" to="360 20 80" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Types of File Permissions -->
  <section data-narration="Types of File Permissions">
    <rect x="10" y="110" width="380" height="40" fill="#2f4f7f" rx="10"/>
    <text x="20" y="120" fill="#ffffff" font-size="18" text-anchor="middle">Types of File Permissions</text>
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 130" begin="0s" dur="2s"/>
    <animateTransform attributeName="transform" type="rotate" from="0 20 130" to="360 20 130" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="50" y="110" width="20" height="20" fill="#ffffff" rx="10"/>
    <text x="70" y="110" fill="#000000" font-size="12" text-anchor="middle">Read</text>
    <rect x="100" y="110" width="20" height="20" fill="#ffffff" rx="10"/>
    <text x="120" y="110" fill="#000000" font-size="12" text-anchor="middle">Write</text>
    <rect x="150" y="110" width="20" height="20" fill="#ffffff" rx="10"/>
    <text x="170" y="110" fill="#000000" font-size="12" text-anchor="middle">Execute</text>
  </section>
  
  <!-- Section 3: File Permissions Notation -->
  <section data-narration="File Permissions Notation">
    <rect x="10" y="160" width="380" height="40" fill="#2f4f7f" rx="10"/>
    <text x="20" y="170" fill="#ffffff" font-size="18" text-anchor="middle">File Permissions Notation</text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 180" begin="0s" dur="2s"/>
    <text x="20" y="200" fill="#000000" font-size="14" text-anchor="middle">User ID (u)</text>
    <animateTransform attributeName="transform" type="translate" from="50 200" to="50 210" begin="0s" dur="2s"/>
    <text x="70" y="200" fill="#000000" font-size="14" text-anchor="middle">Group ID (g)</text>
    <animateTransform attributeName="transform" type="translate" from="100 200" to="100 210" begin="0s" dur="2s"/>
    <text x="130" y="200" fill="#000000" font-size="14" text-anchor="middle">Other (o)</text>
  </section>
  
  <!-- Section 4: Examples of File Permissions -->
  <section data-narration="Examples of File Permissions">
    <rect x="10" y="220" width="380" height="40" fill="#2f4f7f" rx="10"/>
    <text x="20" y="230" fill="#ffffff" font-size="18" text-anchor="middle">Examples of File Permissions</text>
    <animateTransform attributeName="transform" type="translate" from="0 230" to="0 240" begin="0s" dur="2s"/>
    <rect x="50" y="220" width="20" height="20" fill="#ffffff" rx="10"/>
    <text x="70" y="220" fill="#000000" font-size="12" text-anchor="middle">755</text>
    <rect x="100" y="220" width="20" height="20" fill="#ffffff" rx="10"/>
    <text x="120" y="220" fill="#000000" font-size="12" text-anchor="middle">644</text>
    <rect x="150" y="220" width="20" height="20" fill="#ffffff" rx="10"/>
    <text x="170" y="220" fill="#000000" font-size="12" text-anchor="middle">777</text>
  </section>
  
  <!-- Footer -->
  <rect x="10" y="360" width="400" height="40" fill="#2f4f7f" rx="10"/>
  <text x="20" y="370" fill="#ffffff" font-size="18" text-anchor="middle">Chapter 10: File Permissions and Access Control</text>
  <animateTransform attributeName="transform" type="translate" from="0 370" to="0 380" begin="0s" dur="2s"/>
</svg>