<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="system-implementation">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Content Security Policy Implementation. CSP is an HTTP security header that protects websites against cross-site scripting and data injection attacks.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Content Security Policy (CSP) Implementation</text>
    <text x="210" y="44" text-anchor="middle" font-family="Arial" font-size="10" fill="#5C6BC0">Whitelist-based browser security mechanism</text>
  </g>

  <!-- Group 2: Server sends CSP header -->
  <g opacity="0" data-narration="Step 1: The web server sends an HTTP response containing the CSP header. This header specifies trusted sources for scripts, styles, images, and other resources.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Server box -->
    <rect x="30" y="60" width="110" height="50" fill="#3949AB" rx="6"/>
    <text x="85" y="82" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Web Server</text>
    <text x="85" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="#C5CAE9">Sends CSP Header</text>
    <!-- Arrow to HTTP Response -->
    <line x1="140" y1="85" x2="168" y2="85" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- HTTP Response box -->
    <rect x="170" y="60" width="110" height="50" fill="#5C6BC0" rx="6"/>
    <text x="225" y="80" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">HTTP Response</text>
    <text x="225" y="94" text-anchor="middle" font-family="monospace" font-size="7" fill="#E8EAF6">Content-Security-Policy:</text>
    <text x="225" y="104" text-anchor="middle" font-family="monospace" font-size="7" fill="#E8EAF6">default-src 'self'</text>
    <!-- Arrow to Browser -->
    <line x1="280" y1="85" x2="308" y2="85" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Browser box -->
    <rect x="310" y="60" width="90" height="50" fill="#3949AB" rx="6"/>
    <text x="355" y="82" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Browser</text>
    <text x="355" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="#C5CAE9">Enforces Policy</text>
  </g>

  <!-- Group 3: Core Directives -->
  <g opacity="0" data-narration="CSP uses directives to control different resource types. The key directives are: default-src as the fallback, script-src for JavaScript, style-src for CSS, img-src for images, connect-src for AJAX and WebSocket connections, and frame-src for iframes.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="135" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E65100">Core CSP Directives</text>
    <!-- Directive boxes in 2 rows of 3 -->
    <rect x="20" y="145" width="115" height="30" fill="#E65100" rx="4"/>
    <text x="77" y="164" text-anchor="middle" font-family="monospace" font-size="9" fill="white">default-src</text>
    <rect x="152" y="145" width="115" height="30" fill="#E65100" rx="4"/>
    <text x="209" y="164" text-anchor="middle" font-family="monospace" font-size="9" fill="white">script-src</text>
    <rect x="284" y="145" width="115" height="30" fill="#E65100" rx="4"/>
    <text x="341" y="164" text-anchor="middle" font-family="monospace" font-size="9" fill="white">style-src</text>
    <rect x="20" y="182" width="115" height="30" fill="#BF360C" rx="4"/>
    <text x="77" y="201" text-anchor="middle" font-family="monospace" font-size="9" fill="white">img-src</text>
    <rect x="152" y="182" width="115" height="30" fill="#BF360C" rx="4"/>
    <text x="209" y="201" text-anchor="middle" font-family="monospace" font-size="9" fill="white">connect-src</text>
    <rect x="284" y="182" width="115" height="30" fill="#BF360C" rx="4"/>
    <text x="341" y="201" text-anchor="middle" font-family="monospace" font-size="9" fill="white">frame-src</text>
  </g>

  <!-- Group 4: Source Values -->
  <g opacity="0" data-narration="Each directive accepts source values that define which origins are allowed. The key values are: 'self' for same origin, 'none' to block all, 'unsafe-inline' for inline code, specific domains, and nonce-based values for modern applications.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="232" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#00695C">Allowed Source Values</text>
    <!-- Source value tags -->
    <rect x="20" y="240" width="75" height="24" fill="#00695C" rx="12"/>
    <text x="57" y="256" text-anchor="middle" font-family="monospace" font-size="9" fill="white">'self'</text>
    <rect x="102" y="240" width="75" height="24" fill="#00695C" rx="12"/>
    <text x="139" y="256" text-anchor="middle" font-family="monospace" font-size="9" fill="white">'none'</text>
    <rect x="184" y="240" width="105" height="24" fill="#00695C" rx="12"/>
    <text x="236" y="256" text-anchor="middle" font-family="monospace" font-size="9" fill="white">'unsafe-inline'</text>
    <rect x="296" y="240" width="105" height="24" fill="#00695C" rx="12"/>
    <text x="348" y="256" text-anchor="middle" font-family="monospace" font-size="9" fill="white">'unsafe-eval'</text>
    <rect x="20" y="270" width="95" height="24" fill="#00897B" rx="12"/>
    <text x="67" y="286" text-anchor="middle" font-family="monospace" font-size="9" fill="white">https:</text>
    <rect x="122" y="270" width="115" height="24" fill="#00897B" rx="12"/>
    <text x="179" y="286" text-anchor="middle" font-family="monospace" font-size="9" fill="white">domain.com</text>
    <rect x="244" y="270" width="155" height="24" fill="#00897B" rx="12"/>
    <text x="321" y="286" text-anchor="middle" font-family="monospace" font-size="9" fill="white">'nonce-abc123'</text>
  </g>

  <!-- Group 5: Enforcement Decision Flow -->
  <g opacity="0" data-narration="When a resource is requested, the browser checks it against the CSP whitelist. If the source is whitelisted, the resource loads normally. If the source is not whitelisted, the browser blocks the resource and optionally reports the violation.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="314" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Enforcement Decision</text>
    <!-- Resource request diamond -->
    <polygon points="210,322 270,340 210,358 150,340" fill="#3949AB" stroke="#283593" stroke-width="1"/>
    <text x="210" y="343" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Source Whitelisted?</text>
    <!-- Allowed path -->
    <line x1="270" y1="340" x2="318" y2="340" stroke="#00695C" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="320" y="326" width="80" height="28" fill="#00695C" rx="5"/>
    <text x="360" y="344" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Allowed</text>
    <text x="295" y="335" font-family="Arial" font-size="8" fill="#00695C">Yes</text>
    <!-- Blocked path -->
    <line x1="150" y1="340" x2="102" y2="340" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)"/>
    <rect x="20" y="326" width="80" height="28" fill="#C62828" rx="5"/>
    <text x="60" y="344" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Blocked</text>
    <text x="128" y="335" font-family="Arial" font-size="8" fill="#C62828">No</text>
  </g>

  <!-- Group 6: Deployment Strategy -->
  <g opacity="0" data-narration="The recommended deployment strategy has four phases: First, use Report-Only mode to monitor issues. Second, start with a loose policy and gradually restrict it. Third, analyze violation reports and adjust the policy. Fourth, switch to full enforcement once confident.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="376" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Deployment: Report-Only</text>
    <text x="210" y="390" text-anchor="middle" font-family="monospace" font-size="8" fill="#5C6BC0">Report-Only -> Gradual Restrictions -> Violation Analysis -> Full Enforcement</text>
  </g>
</svg>