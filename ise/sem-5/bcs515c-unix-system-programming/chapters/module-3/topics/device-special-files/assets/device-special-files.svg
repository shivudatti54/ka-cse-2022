<svg width="420" height="400" data-topic-id="device-special-files" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <LinearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6"/>
      <stop offset="100%" stop-color="#C7B8EA"/>
    </LinearGradient>
  </defs>
  <title>Device Special Files</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="100" height="30" fill="#3498db" rx="10"/>
    <text x="5" y="5" font-size="18" font-family="Arial, sans-serif" fill="#fff">Device Special Files</text>
  </g>
  <section data-narration="Introduction">
    <rect x="10" y="60" width="380" height="30" fill="#3498db" rx="10"/>
    <text x="15" y="70" font-size="16" font-family="Arial, sans-serif" fill="#fff">Introduction</text>
    <text x="15" y="90" font-size="14" font-family="Arial, sans-serif" fill="#fff">In UNIX, a special file is a file that provides access to a hardware device or a system resource.</text>
  </section>
  <section data-narration="Types of Device Special Files">
    <rect x="10" y="120" width="380" height="30" fill="#3498db" rx="10"/>
    <text x="15" y="130" font-size="16" font-family="Arial, sans-serif" fill="#fff">Types of Device Special Files</text>
    <rect x="10" y="150" width="30" height="20" fill="#3498db" rx="10"/>
    <text x="40" y="160" font-size="14" font-family="Arial, sans-serif" fill="#fff">Block Device Special Files:</text>
    <rect x="70" y="150" width="30" height="20" fill="#3498db" rx="10"/>
    <text x="100" y="160" font-size="14" font-family="Arial, sans-serif" fill="#fff">Character Device Special Files:</text>
  </section>
  <section data-narration="Creating Device Special Files">
    <rect x="10" y="190" width="380" height="30" fill="#3498db" rx="10"/>
    <text x="15" y="200" font-size="16" font-family="Arial, sans-serif" fill="#fff">Creating Device Special Files</text>
    <rect x="10" y="220" width="380" height="30" fill="#3498db" rx="10"/>
    <text x="15" y="230" font-size="14" font-family="Arial, sans-serif" fill="#fff">The `mknod` command is used to create a new special file that represents a device.</text>
  </section>
  <section data-narration="UNIX System Calls">
    <rect x="10" y="260" width="380" height="30" fill="#3498db" rx="10"/>
    <text x="15" y="270" font-size="16" font-family="Arial, sans-serif" fill="#fff">UNIX System Calls</text>
    <rect x="10" y="290" width="380" height="30" fill="#3498db" rx="10"/>
    <text x="15" y="300" font-size="14" font-family="Arial, sans-serif" fill="#fff">The most commonly used system calls for interacting with devices special files are:</text>
    <rect x="10" y="320" width="30" height="20" fill="#3498db" rx="10"/>
    <text x="40" y="330" font-size="14" font-family="Arial, sans-serif" fill="#fff">open, read, write, close.</text>
  </section>
  <section data-narration="Example">
    <rect x="10" y="360" width="380" height="30" fill="#3498db" rx="10"/>
    <text x="15" y="370" font-size="16" font-family="Arial, sans-serif" fill="#fff">Example</text>
    <rect x="10" y="390" width="380" height="30" fill="#3498db" rx="10"/>
    <text x="15" y="400" font-size="14" font-family="Arial, sans-serif" fill="#fff">Here is an example of how to use these system calls to interact with a device special file:</text>
  </section>
  <g transform="translate(20, 450)">
    <rect x="0" y="0" width="100" height="30" fill="#e74c3c" rx="10"/>
    <text x="5" y="5" font-size="18" font-family="Arial, sans-serif" fill="#fff">Footer</text>
  </g>
</svg>