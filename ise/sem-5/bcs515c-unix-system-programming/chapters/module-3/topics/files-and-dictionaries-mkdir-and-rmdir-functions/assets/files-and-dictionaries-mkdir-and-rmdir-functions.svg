    <path d="M 190 120 L 190 170" fill="none" stroke="#4C6C9D" stroke-width="1" />
    <path d="M 190 170 L 190 230" fill="none" stroke="#4C6C9D" stroke-width="1" />
    <path d="M 190 230 L 190 280" fill="none" stroke="#4C6C9D" stroke-width="1" />
    <path d="M 190 280 L 190 330" fill="none" stroke="#4C6C9D" stroke-width="1" />
    <path d="M 190 330 L 190 380" fill="none" stroke="#4C6C9D" stroke-width="1" />

</svg>