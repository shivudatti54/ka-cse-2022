<svg width="420" height="400" data-topic-id="files-and-dictionaries-mkdir-and-rmdir-functions" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #C7D2E4;">

    <!-- Header Section -->
    <rect x="10" y="10" width="400" height="50" fill="#4C6C9D" rx="5" />
    <text x="15" y="25" font-size="22" font-family="Arial" fill="#1A1D23" text-anchor="start" data-narration="Title">Files and Dictionaries: mkdir and rmdir functions</text>

    <!-- Gradient Background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
            <stop offset="100%" stop-color="#D2E6FF" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect x="0" y="60" width="400" height="280" fill="url(#pastel-gradient)" rx="5" opacity="0.8" data-narration="Introduction" />

    <!-- Section 1: Mkdir Function -->
    <rect x="10" y="100" width="375" height="100" fill="#E0E0E0" rx="5" data-narration="Mkdir Function" />
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start">mkdir function</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 120" to="360 190 120" dur="10s" begin="0s" repeatCount="indefinite" />
    <text x="20" y="170" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start" data-narration="Definition and Explanation">Definition and Explanation</text>

    <!-- Section 2: Mkdir Function Syntax -->
    <rect x="10" y="220" width="375" height="100" fill="#E0E0E0" rx="5" data-narration="Mkdir Function Syntax" />
    <text x="20" y="230" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start">mkdir [options] dirname</text>
    <text x="20" y="260" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start" data-narration="Options">Options</text>

    <!-- Section 3: Mkdir Function Examples -->
    <rect x="10" y="330" width="375" height="100" fill="#E0E0E0" rx="5" data-narration="Mkdir Function Examples" />
    <text x="20" y="340" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start">mkdir mydir</text>
    <text x="20" y="370" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start" data-narration="Examples">Examples</text>

    <!-- Section 4: Rmdir Function -->
    <rect x="10" y="100" width="375" height="100" fill="#E0E0E0" rx="5" data-narration="Rmdir Function" />
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start">rmdir function</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 120" to="360 190 120" dur="10s" begin="0s" repeatCount="indefinite" />
    <text x="20" y="170" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start" data-narration="Definition and Explanation">Definition and Explanation</text>

    <!-- Section 5: Rmdir Function Syntax -->
    <rect x="10" y="220" width="375" height="100" fill="#E0E0E0" rx="5" data-narration="Rmdir Function Syntax" />
    <text x="20" y="230" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start">rmdir [options] dirname</text>
    <text x="20" y="260" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start" data-narration="Options">Options</text>

    <!-- Section 6: Rmdir Function Examples -->
    <rect x="10" y="330" width="375" height="100" fill="#E0E0E0" rx="5" data-narration="Rmdir Function Examples" />
    <text x="20" y="340" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start">rmdir mydir</text>
    <text x="20" y="370" font-size="18" font-family="Arial" fill="#4C6C9D" text-anchor="start" data-narration="Examples">Examples</text>

    <!-- Footer Section -->
    <rect x="10" y="380" width="400" height="30" fill="#4C6C9D" rx="5" />
    <text x="15" y="390" font-size="18" font-family="Arial" fill="#1A1D23" text-anchor="start" data-narration="Footer">Files and Dictionaries: mkdir and rmdir functions</text>

