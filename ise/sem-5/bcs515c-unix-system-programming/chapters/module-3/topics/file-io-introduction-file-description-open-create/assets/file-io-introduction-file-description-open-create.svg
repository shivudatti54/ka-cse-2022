<svg width="420" height="400" data-topic-id="file-io-introduction-file-description-open-create">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2E4053" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" text-anchor="middle" fill="#7A288A">
    File I/O: Introduction, File Description, Open, Create
  </text>
  
  <!-- Section 1: Introduction to File I/O -->
  <section data-narration="Introduction to File I/O">
    <rect x="10" y="60" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="70%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      File Input/Output (I/O) is a fundamental concept in programming
    </text>
    <animate transform="translate(0, -10%)" begin="0s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Section 2: File Description -->
  <section data-narration="File Description">
    <rect x="10" y="120" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="130%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      A file is a sequence of bytes stored on disk. It is described by a file descriptor.
    </text>
    <animate transform="translate(0, -10%)" begin="2s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Section 3: File Types -->
  <section data-narration="File Types">
    <rect x="10" y="180" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="190%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      There are two main types of file types: Regular files and Special files.
    </text>
    <animate transform="translate(0, -10%)" begin="4s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Section 4: Opening a File -->
  <section data-narration="Opening a File">
    <rect x="10" y="240" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="250%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      To open a file, you use the open() function, which takes two arguments: 
      file descriptor and mode.
    </text>
    <animate transform="translate(0, -10%)" begin="6s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Section 5: Creating a File -->
  <section data-narration="Creating a File">
    <rect x="10" y="300" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="310%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      To create a new file, you can use the open() function with the O_CREAT mode.
    </text>
    <animate transform="translate(0, -10%)" begin="8s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Section 6: Reading from a File -->
  <section data-narration="Reading from a File">
    <rect x="10" y="360" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="370%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      To read from a file, you use the read() function, which takes three arguments: 
      file descriptor, buffer, and length.
    </text>
    <animate transform="translate(0, -10%)" begin="10s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Section 7: Writing to a File -->
  <section data-narration="Writing to a File">
    <rect x="10" y="420" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="430%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      To write to a file, you use the write() function, which takes three arguments: 
      file descriptor, buffer, and length.
    </text>
    <animate transform="translate(0, -10%)" begin="12s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Section 8: Closing a File -->
  <section data-narration="Closing a File">
    <rect x="10" y="480" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="490%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      To close a file, you use the close() function.
    </text>
    <animate transform="translate(0, -10%)" begin="14s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Section 9: Using the fcntl Functions -->
  <section data-narration="Using the fcntl Functions">
    <rect x="10" y="540" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20%" y="550%" font-size="18" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
      The fcntl functions are used to perform various operations on files, such as locking and setting file flags.
    </text>
    <animate transform="translate(0, -10%)" begin="16s" duration="2s" repeat="forever"/>
  </section>
  
  <!-- Footer -->
  <rect x="0" y="490" width="420" height="10" fill="#2E4053"/>
  <text x="50%" y="500%" font-size="14" font-family="Arial" text-anchor="middle" fill="#FFFFFF">
    &copy; 2023
  </text>
</svg>