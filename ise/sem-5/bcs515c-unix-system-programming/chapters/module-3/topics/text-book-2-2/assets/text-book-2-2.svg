<svg width="420" height="400" data-topic-id="unix-system-programming-2">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#33CCFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
    <style>
      .title {
        font-size: 24px;
        font-weight: bold;
        color: #007bff;
        margin: 20px 0;
      }
      .section {
        background: url(#grad);
        background-size: cover;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .data-narration {
        font-size: 18px;
        color: #333;
        margin-bottom: 10px;
      }
      .animation {
        fill: #007bff;
        stroke: #007bff;
      }
    </style>
  </defs>
  <title>Text Book 2 2: UNIX SYSTEM PROGRAMMING</title>
  <rect x="10" y="10" width="400" height="380" rx="10" fill="#fff"/>
  <rect x="10" y="10" width="400" height="40" rx="10" fill="#007bff"/>
  <g transform="scale(1.5)">
    <text class="title" x="25%" y="50%" text-anchor="middle">UNIX SYSTEM PROGRAMMING</text>
    <rect x="10" y="70" width="400" height="30" rx="10" fill="#fff"/>
  </g>
  <g transform="scale(1)">
    <section class="section" data-narration="Unix Standardization is the process of defining and implementing a set of rules and guidelines for the development and implementation of Unix-compatible systems.">
      <rect x="20" y="20" width="360" height="160" rx="10" fill="#fff"/>
      <text class="data-narration" x="20%" y="60%" text-anchor="middle">Portability, Security, and Interoperability are key features of Unix standardization.</text>
      <animate transform="rotate(360 190 160)" begin="0s" dur="2s" repeat="never" class="animation"/>
      <animate transform="rotate(720 190 160)" begin="2s" dur="2s" repeat="never" class="animation"/>
      <line x1="200" y1="120" x2="220" y2="140" stroke="#007bff" stroke-width="2" arrowhead="triangle"/>
    </section>
    <section class="section" data-narration="UNIX is a trademarked operating system that is widely used in various forms and flavors. There are many different versions of UNIX, including BSD, System V, Solaris, HP-UX, and Linux.">
      <rect x="20" y="200" width="360" height="160" rx="10" fill="#fff"/>
      <text class="data-narration" x="20%" y="60%" text-anchor="middle">UNIX is a multi-user, multi-tasking operating system that supports a hierarchical file system.</text>
      <animate transform="rotate(360 190 120)" begin="0s" dur="2s" repeat="never" class="animation"/>
      <animate transform="rotate(720 190 120)" begin="2s" dur="2s" repeat="never" class="animation"/>
      <line x1="200" y1="140" x2="220" y2="160" stroke="#007bff" stroke-width="2" arrowhead="triangle"/>
    </section>
    <section class="section" data-narration="The key features of UNIX include multi-user, multi-tasking, file system, and shell.">
      <rect x="20" y="300" width="360" height="160" rx="10" fill="#fff"/>
      <text class="data-narration" x="20%" y="60%" text-anchor="middle">UNIX also includes Apache, MySQL, and SSH.</text>
      <animate transform="rotate(360 190 180)" begin="0s" dur="2s" repeat="never" class="animation"/>
      <animate transform="rotate(720 190 180)" begin="2s" dur="2s" repeat="never" class="animation"/>
      <line x1="200" y1="160" x2="220" y2="180" stroke="#007bff" stroke-width="2" arrowhead="triangle"/>
    </section>
  </g>
  <g transform="scale(1)">
    <rect x="10" y="10" width="400" height="40" rx="10" fill="#007bff"/>
    <text x="20%" y="10%" text-anchor="middle">UNIX SYSTEM PROGRAMMING</text>
  </g>
  <rect x="10" y="10" width="400" height="40" rx="10" fill="#007bff"/>
  <text x="20%" y="10%" text-anchor="middle">Text Book 2 2</text>
</svg>