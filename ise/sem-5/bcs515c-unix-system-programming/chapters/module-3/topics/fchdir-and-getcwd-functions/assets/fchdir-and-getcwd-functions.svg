<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="fchdir-and-getcwd-functions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title (0.3s) -->
  <g opacity="0" data-narration="fchdir and getcwd are Unix system calls for changing and querying the current working directory of a process.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#3949AB">fchdir &amp; getcwd Functions</text>
    <line x1="100" y1="37" x2="320" y2="37" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- G2: CWD Concept (1.5s) -->
  <g opacity="0" data-narration="Every process has a Current Working Directory stored in its process table entry. Relative pathnames are resolved from the CWD.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <rect x="20" y="50" width="380" height="52" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5" opacity="0.9"/>
    <text x="30" y="67" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Process Table Entry</text>
    <rect x="30" y="73" width="100" height="22" fill="#E8EAF6" rx="3" stroke="#3949AB" stroke-width="0.8"/>
    <text x="80" y="88" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">pid</text>
    <rect x="138" y="73" width="120" height="22" fill="#3949AB" rx="3"/>
    <text x="198" y="88" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">CWD: /home/user</text>
    <rect x="266" y="73" width="124" height="22" fill="#E8EAF6" rx="3" stroke="#3949AB" stroke-width="0.8"/>
    <text x="328" y="88" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">root dir, open files...</text>
  </g>

  <!-- G3: chdir and fchdir (3.0s) -->
  <g opacity="0" data-narration="chdir takes a pathname string to change the CWD. fchdir takes an open file descriptor pointing to a directory, useful when you have already opened it.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="20" y="112" width="185" height="68" fill="white" rx="6" stroke="#E65100" stroke-width="1.5" opacity="0.95"/>
    <text x="112" y="128" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#E65100">chdir(pathname)</text>
    <line x1="30" y1="133" x2="195" y2="133" stroke="#E65100" stroke-width="0.8"/>
    <text x="30" y="147" font-family="Arial, sans-serif" font-size="9" fill="#333">Takes a path string:</text>
    <text x="30" y="160" font-family="monospace" font-size="9" fill="#E65100">chdir("/tmp/work");</text>
    <text x="30" y="174" font-family="Arial, sans-serif" font-size="9" fill="#555">Returns 0 success, -1 error</text>
    <rect x="215" y="112" width="185" height="68" fill="white" rx="6" stroke="#00695C" stroke-width="1.5" opacity="0.95"/>
    <text x="307" y="128" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#00695C">fchdir(fd)</text>
    <line x1="225" y1="133" x2="390" y2="133" stroke="#00695C" stroke-width="0.8"/>
    <text x="225" y="147" font-family="Arial, sans-serif" font-size="9" fill="#333">Takes open file descriptor:</text>
    <text x="225" y="160" font-family="monospace" font-size="9" fill="#00695C">fd=open("/tmp",O_RDONLY);</text>
    <text x="225" y="174" font-family="monospace" font-size="9" fill="#00695C">fchdir(fd);</text>
  </g>

  <!-- G4: getcwd (4.5s) -->
  <g opacity="0" data-narration="getcwd copies the absolute pathname of the current working directory into the supplied buffer. It returns NULL on error, for example if the buffer is too small.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="20" y="190" width="380" height="62" fill="white" rx="6" stroke="#C62828" stroke-width="1.5" opacity="0.95"/>
    <text x="30" y="207" font-family="monospace" font-size="11" font-weight="bold" fill="#C62828">getcwd(buf, size)</text>
    <line x1="30" y1="212" x2="390" y2="212" stroke="#C62828" stroke-width="0.8"/>
    <text x="30" y="226" font-family="monospace" font-size="9" fill="#333">char buf[PATH_MAX];</text>
    <text x="30" y="239" font-family="monospace" font-size="9" fill="#C62828">getcwd(buf, PATH_MAX);</text>
    <text x="250" y="226" font-family="Arial, sans-serif" font-size="9" fill="#555">Returns pointer to buf on success</text>
    <text x="250" y="239" font-family="Arial, sans-serif" font-size="9" fill="#C62828">Returns NULL on error (sets errno)</text>
  </g>

  <!-- G5: Use Pattern (6.0s) -->
  <g opacity="0" data-narration="A common pattern is to save the CWD with getcwd, change to the target directory, perform work, then change back. Alternatively, open dot and use fchdir to return.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="20" y="268" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Common Usage Pattern:</text>
    <rect x="20" y="275" width="82" height="30" fill="#3949AB" rx="4"/>
    <text x="61" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="white">getcwd(save)</text>
    <line x1="102" y1="290" x2="118" y2="290" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="120" y="275" width="82" height="30" fill="#E65100" rx="4"/>
    <text x="161" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="white">chdir(target)</text>
    <line x1="202" y1="290" x2="218" y2="290" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="220" y="275" width="62" height="30" fill="#00695C" rx="4"/>
    <text x="251" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="white">do work</text>
    <line x1="282" y1="290" x2="298" y2="290" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="300" y="275" width="100" height="30" fill="#3949AB" rx="4"/>
    <text x="350" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="white">chdir(save)</text>
    <text x="20" y="322" font-family="Arial, sans-serif" font-size="9" fill="#555">Alternative:</text>
    <rect x="80" y="312" width="90" height="22" fill="#00695C" rx="3"/>
    <text x="125" y="326" text-anchor="middle" font-family="monospace" font-size="8" fill="white">fd=open(".")</text>
    <line x1="170" y1="323" x2="186" y2="323" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
    <rect x="188" y="312" width="80" height="22" fill="#E65100" rx="3"/>
    <text x="228" y="326" text-anchor="middle" font-family="monospace" font-size="8" fill="white">chdir(target)</text>
    <line x1="268" y1="323" x2="284" y2="323" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
    <rect x="286" y="312" width="80" height="22" fill="#00695C" rx="3"/>
    <text x="326" y="326" text-anchor="middle" font-family="monospace" font-size="8" fill="white">fchdir(fd)</text>
  </g>

  <!-- G6: Related Functions (7.5s) -->
  <g opacity="0" data-narration="Related directory functions include opendir, readdir, and closedir for reading directory contents. PATH_MAX defines the maximum pathname length for getcwd buffers.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="20" y="344" width="380" height="48" fill="white" rx="6" stroke="#3949AB" stroke-width="1.2" opacity="0.9"/>
    <text x="30" y="360" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Related Functions &amp; Constants</text>
    <rect x="30" y="366" width="65" height="18" fill="#E8EAF6" rx="3" stroke="#3949AB" stroke-width="0.6"/>
    <text x="62" y="379" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">opendir()</text>
    <rect x="103" y="366" width="65" height="18" fill="#E8EAF6" rx="3" stroke="#3949AB" stroke-width="0.6"/>
    <text x="135" y="379" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">readdir()</text>
    <rect x="176" y="366" width="68" height="18" fill="#E8EAF6" rx="3" stroke="#3949AB" stroke-width="0.6"/>
    <text x="210" y="379" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">closedir()</text>
    <rect x="256" y="366" width="134" height="18" fill="#C62828" rx="3"/>
    <text x="323" y="379" text-anchor="middle" font-family="monospace" font-size="8" fill="white">PATH_MAX (limits.h)</text>
  </g>
</svg>
