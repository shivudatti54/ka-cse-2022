  <title>Overview of IPC Methods, Pipes, popen, pclose Functions</title>

  <!-- Gradient background -->
  <rect x="0" y="0" width="420" height="400" rx="10" fill="#C7B8EA" />

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#2E4053">
    Overview of IPC Methods, Pipes, popen, pclose Functions
  </text>

  <!-- Section 1: What are IPC Methods? -->
  <div class="section">
    <text x="50%" y="100%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration>
      What are IPC Methods?
    </text>
    <text x="50%" y="120%" font-size="16" text-anchor="middle" fill="#2E4053">
      Inter-Process Communication (IPC) is a technique used to enable communication between multiple processes in a computer system.
    </text>
  </div>

  <!-- Section 2: Methods of IPC -->
  <div class="section">
    <text x="50%" y="150%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration>
      Methods of IPC
    </text>
    <text x="50%" y="170%" font-size="16" text-anchor="middle" fill="#2E4053">
      IPC methods allow processes to exchange data, send messages, or control the execution of other processes.
    </text>
  </div>

  <!-- Section 3: Pipes -->
  <div class="section">
    <text x="50%" y="200%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration>
      Pipes
    </text>
    <rect x="150" y="150" width="120" height="30" rx="5" fill="#34C759" class="pipe" />
    <text x="170" y="160" font-size="16" text-anchor="middle" fill="#2E4053" class="arrow">
      ↵
    </text>
    <text x="170" y="170" font-size="16" text-anchor="middle" fill="#2E4053">
      Pipes are a type of IPC method that allows two processes to communicate by sending data to each other in a continuous stream.
    </text>
  </div>

  <!-- Section 4: Popen and Pclose Functions -->
  <div class="section">
    <text x="50%" y="250%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration>
      Popen and Pclose Functions
    </text>
    <text x="50%" y="270%" font-size="16" text-anchor="middle" fill="#2E4053">
      Popen and pclose are functions that allow processes to communicate with each other using pipes.
    </text>
  </div>

  <!-- Section 5: Coprocesses -->
  <div class="section">
    <text x="50%" y="300%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration>
      Coprocesses
    </text>
    <text x="50%" y="320%" font-size="16" text-anchor="middle" fill="#2E4053">
      Coprocesses are a type of IPC method that allows processes to communicate by sending data to each other in a shared memory space.
    </text>
  </div>

  <!-- Section 6: FIFOs -->
  <div class="section">
    <text x="50%" y="350%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration>
      FIFOs
    </text>
    <text x="50%" y="370%" font-size="16" text-anchor="middle" fill="#2E4053">
      FIFOs (First-In-First-Out) are a type of IPC method that allows processes to communicate by sending data to each other in a queue.
    </text>
  </div>

  <!-- Section 7: System V IPC -->
  <div class="section">
    <text x="50%" y="400%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration>
      System V IPC
    </text>
    <text x="50%" y="420%" font-size="16" text-anchor="middle" fill="#2E4053">
      System V IPC is a type of IPC method that allows processes to communicate using semaphores, message queues, and shared memory.
    </text>
  </div>

