<svg width="420" height="400" data-topic-id="unix-system-programming-chapter-8">
  <!-- Gradient background with pastel colors -->
  <def focus="url(#pastel-gradient)">
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A6C9E3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B3E5FF" stop-opacity="1"/>
    </linearGradient>
  </def>

  <!-- Title at top -->
  <rect x="50" y="50" width="320" height="20" fill="url(#pastel-gradient)"/>
  <text x="100" y="60" font-size="18" font-family="Arial" fill="#3B5998">Text Book 2 Chapter 8</text>

  <!-- Section 1: Process Identifiers -->
  <rect x="50" y="90" width="320" height="40" fill="url(#pastel-gradient)"/>
  <text x="100" y="100" font-size="16" font-family="Arial" fill="#3B5998" data-narration="Process ID (PID): A unique identifier assigned to a process by the operating system.">
    Process ID (PID)
  </text>
  <rect x="50" y="120" width="50" height="20" fill="#8BC34A"/>
  <text x="100" y="130" font-size="16" font-family="Arial" fill="#8BC34A">PID</text>

  <!-- Section 2: Process Name -->
  <rect x="50" y="160" width="320" height="40" fill="url(#pastel-gradient)"/>
  <text x="100" y="170" font-size="16" font-family="Arial" fill="#3B5998" data-narration="Process Name: The name given to a process, usually by the programmer.">
    Process Name
  </text>
  <rect x="50" y="190" width="50" height="20" fill="#8BC34A"/>
  <text x="100" y="200" font-size="16" font-family="Arial" fill="#8BC34A">Name</text>
  <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0"/>
  <animate attributeName="opacity" begin="2s" dur="2s" from="0" to="1"/>

  <!-- Section 3: Process Status -->
  <rect x="50" y="240" width="320" height="40" fill="url(#pastel-gradient)"/>
  <text x="100" y="250" font-size="16" font-family="Arial" fill="#3B5998" data-narration="Process Status: The current state of a process, including RUNNABLE, RUNNING, SLEEPING, ZOMBIE, DEAD, and more.">
    Process Status
  </text>
  <rect x="50" y="270" width="50" height="20" fill="#8BC34A"/>
  <text x="100" y="280" font-size="16" font-family="Arial" fill="#8BC34A">Status</text>

  <!-- Section 4: Fork -->
  <rect x="50" y="320" width="320" height="40" fill="url(#pastel-gradient)"/>
  <text x="100" y="330" font-size="16" font-family="Arial" fill="#3B5998" data-narration="The fork system call is used to create a new process from an existing one. When a process calls fork, the operating system creates a new process that is a copy of the calling process. The new process receives a new PID, while the calling process retains its original PID.">
    Fork
  </text>
  <rect x="50" y="350" width="50" height="20" fill="#8BC34A"/>
  <text x="100" y="360" font-size="16" font-family="Arial" fill="#8BC34A">Fork</text>
  <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0"/>
  <animate attributeName="opacity" begin="2s" dur="2s" from="0" to="1"/>
  <animate attributeName="x" begin="3s" dur="2s" from="50" to="150"/>
  <animate attributeName="x" begin="5s" dur="2s" from="150" to="250"/>

  <!-- Section 5: Vfork -->
  <rect x="50" y="410" width="320" height="40" fill="url(#pastel-gradient)"/>
  <text x="100" y="420" font-size="16" font-family="Arial" fill="#3B5998" data-narration="The vfork system call is similar to fork, but it also copies the parent process's memory space to the child process. This can be useful when the parent process needs to interact with the child process.">
    Vfork
  </text>
  <rect x="50" y="440" width="50" height="20" fill="#8BC34A"/>
  <text x="100" y="450" font-size="16" font-family="Arial" fill="#8BC34A">Vfork</text>
  <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0"/>
  <animate attributeName="opacity" begin="2s" dur="2s" from="0" to="1"/>
  <animate attributeName="x" begin="3s" dur="2s" from="50" to="150"/>
  <animate attributeName="x" begin="5s" dur="2s" from="150" to="250"/>
  <animate attributeName="x" begin="7s" dur="2s" from="250" to="350"/>

  <!-- Footer at bottom -->
  <rect x="50" y="370" width="320" height="20" fill="url(#pastel-gradient)"/>
  <text x="100" y="380" font-size="18" font-family="Arial" fill="#3B5998"></text>
</svg>