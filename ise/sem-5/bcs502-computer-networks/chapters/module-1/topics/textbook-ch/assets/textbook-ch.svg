        <text x="20" y="185" font-size="14" text-anchor="middle" fill="#2B4155" data-narration="Definition: Data communications is the process of sending and receiving data between devices over a communication channel.">Definition</text>
        <rect x="10" y="215" width="100" height="40" fill="#FFFFFF" rx="10"/>
        <text x="20" y="220" font-size="14" text-anchor="middle" fill="#2B4155" data-narration="Importance: Data communications is essential in today's digital world, as it enables communication between devices, systems, and networks.">Importance</text>
