<svg width="420" height="400" data-topic-id="tcpip-osi-model-intro">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(20, 50)">
    <title>Layering TCP/IP Protocol Suite &amp; The OSI Model Introduction</title>
  </g>
  <g>
    <rect x="50" y="20" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="30" font-size="18" font-family="Arial" fill="#2E4053">Introduction to Layering</text>
    <text x="50" y="60" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Layering is a fundamental concept in computer networking that separates the communication process into distinct layers. Each layer has specific responsibilities, and the communication process occurs from top to bottom, followed by a reverse process from bottom to top. This allows different layers to be designed, tested, and implemented independently.">
    </text>
  </g>
  <g>
    <rect x="50" y="90" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="100" font-size="18" font-family="Arial" fill="#2E4053">Application Layer</text>
    <text x="50" y="130" font-size="14" font-family="Arial" fill="#2E4053" data-narration="The topmost layer where applications reside. It includes protocols for email, file transfer, and web browsing.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 90" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <rect x="50" y="180" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="190" font-size="18" font-family="Arial" fill="#2E4053">Presentation Layer</text>
    <text x="50" y="220" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Responsible for data formatting and conversion. It ensures data is presented in a manner that's understandable by the receiving system.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <rect x="50" y="270" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="280" font-size="18" font-family="Arial" fill="#2E4053">Transport Layer</text>
    <text x="50" y="310" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Ensures reliable data transfer between devices. It provides error-checking and retransmission of data.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 270" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <rect x="50" y="360" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="370" font-size="18" font-family="Arial" fill="#2E4053">Network Layer</text>
    <text x="50" y="400" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Routes data between devices on different networks. It provides logical addressing and routing of data.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 360" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <rect x="50" y="20" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="30" font-size="18" font-family="Arial" fill="#2E4053">TCP/IP Protocol Suite</text>
    <text x="50" y="60" font-size="14" font-family="Arial" fill="#2E4053" data-narration="The Transmission Control Protocol/Internet Protocol (TCP/IP) suite is a set of communication protocols used to interconnect network devices on the internet. It's the most widely used protocol suite on the internet.">
    </text>
  </g>
  <g>
    <rect x="50" y="90" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="100" font-size="18" font-family="Arial" fill="#2E4053">HTTP (Hypertext Transfer Protocol)</text>
    <text x="50" y="130" font-size="14" font-family="Arial" fill="#2E4053" data-narration="The protocol used for transferring web pages.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 90" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <rect x="50" y="180" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="190" font-size="18" font-family="Arial" fill="#2E4053">FTP (File Transfer Protocol)</text>
    <text x="50" y="220" font-size="14" font-family="Arial" fill="#2E4053" data-narration="The protocol used for transferring files.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <rect x="50" y="270" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="280" font-size="18" font-family="Arial" fill="#2E4053">TCP (Transmission Control Protocol)</text>
    <text x="50" y="310" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Ensures reliable data transfer between devices.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 270" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <rect x="50" y="360" width="300" height="30" fill="#FFFFFF" rx="5"/>
    <text x="50" y="370" font-size="18" font-family="Arial" fill="#2E4053">IP (Internet Protocol)</text>
    <text x="50" y="400" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Routes data between devices on different networks.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 360" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <rect x="10" y="10" width="400" height="30" fill="#FFFFFF" rx="5"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2E4053">Physical Layer</text>
    <text x="10" y="50" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Defines the physical means of data transmission.">
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="1s" begin="-0.5s"/>
  </g>
  <g>
    <path d="M 20, 20 L 400, 20" stroke="#2E4053" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 20, 20 L 20, 400" stroke="#2E4053" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 400, 20 L 400, 400" stroke="#2E4053" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 20, 400 L 20, 20" stroke="#2E4053" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <arrow marker-end="url(#arrowhead)" marker-start="url(#arrowhead)" marker-width="2" marker-height="4" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
    <defs>
      <marker id="arrowhead" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="45" markerUnits="userSpaceOnUse" 
              fill="#FFA07A" stroke="#2E4053" stroke-width="2"/>
    </defs>
  </g>
  <g>
    <rect x="10" y="10" width="400" height="30" fill="#FFFFFF" rx="5"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2E4053">Footer</text>
  </g>
</svg>