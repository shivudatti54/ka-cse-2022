<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="7-1-73" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="PastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1" />
      <stop offset="100%" stop-color="#E6F2FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#PastelGradient)" width="420" height="400" rx="10" />
  
  <!-- Title Section -->
  <g transform="translate(10, 10)">
    <text text-anchor="start" font-size="24" font-family="Arial" fill="#2F4F7F">Data Communication</text>
  </g>
  
  <!-- Sender Section -->
  <g transform="translate(50, 100)">
    <circle cx="50" cy="50" r="40" fill="#F7DC6F" stroke "#2F4F7F" stroke-width="2" data-narration=" Sender: The device that sends data to the receiver." />
    <text text-anchor="middle" font-size="16" font-family="Arial" fill="#2F4F7F">Sender</text>
  </g>
  <g transform="translate(50, 150)">
    <line x1="50" y1="50" x2="50" y2="70" stroke="#2F4F7F" stroke-width="2" data-narration=" Channel: The medium through which data is transmitted, such as a wireless network or a physical medium like a cable." />
  </g>
  <g transform="translate(50, 150)">
    <circle cx="50" cy="70" r="40" fill="#C9E4CA" stroke="#2F4F7F" stroke-width="2" data-narration=" Receiver: The device that receives and decodes the data." />
    <text text-anchor="middle" font-size="16" font-family="Arial" fill="#2F4F7F">Receiver</text>
  </g>
  
  <!-- Animation Section -->
  <g transform="translate(150, 100)">
    <animateTransform attributeName="transform" type="translate" from="0,100" to="420,100" dur="2s" begin="0s" />
    <rect fill="#F7DC6F" width="40" height="40" rx="20" transform="rotate(0 50 50)" opacity="1" />
  </g>
  <g transform="translate(150, 150)">
    <animateTransform attributeName="transform" type="translate" from="0,150" to="420,150" dur="2s" begin="0.5s" />
    <rect fill="#C9E4CA" width="40" height="40" rx="20" transform="rotate(0 50 50)" opacity="1" />
  </g>
  <g transform="translate(150, 200)">
    <animateTransform attributeName="transform" type="translate" from="0,200" to="420,200" dur="2s" begin="1s" />
    <rect fill="#E6F2FF" width="40" height="40" rx="20" transform="rotate(0 50 50)" opacity="1" />
  </g>
  
  <!-- Footer Section -->
  <g transform="translate(10, 350)">
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#2F4F7F">Data Communication</text>
  </g>
</svg>