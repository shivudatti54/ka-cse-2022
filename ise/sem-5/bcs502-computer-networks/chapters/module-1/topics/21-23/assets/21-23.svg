<svg width="420" height="400" data-topic-id="21-23" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .topic-label {
        font-size: 18px;
        font-weight: bold;
        color: #4f69ff;
      }
      .section {
        margin-bottom: 20px;
      }
      .section:after {
        content: "";
        width: 40px;
        height: 40px;
        background-color: #0097a7;
        border-radius: 50%;
        margin-left: 10px;
        position: absolute;
      }
      .connection {
        stroke: #0097a7;
        stroke-width: 2;
      }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#a9c9ff" />
  <title>Computer Networks Study Material: 2.1 - 2.3</title>
  <g transform="translate(10, 10)">
    <text class="topic-label" data-narration="Network Topology" x="10" y="20">Network Topology</text>
    <rect x="50" y="50" width="200" height="100" fill="#fff" rx="10" data-narration="Definition: The physical and logical arrangement of devices in a computer network." />
    <rect x="50" y="170" width="200" height="100" fill="#fff" rx="10" data-narration="A network model is a simplified representation of a computer network, used for analysis, design, and troubleshooting." />
    <rect x="50" y="290" width="200" height="100" fill="#fff" rx="10" data-narration="Types of Network Topology: Bus, Star, Ring, Mesh." />
    <rect x="50" y="410" width="200" height="100" fill="#fff" rx="10" data-narration="Advantages and Disadvantages of each topology." />
    <rect x="50" y="430" width="200" height="100" fill="#fff" rx="10" data-narration="Real-World Example: Bank's network using a star topology." />
  </g>
  <g transform="translate(10, 10)">
    <text class="topic-label" data-narration="Network Models" x="10" y="20">Network Models</text>
    <rect x="50" y="50" width="200" height="100" fill="#fff" rx="10" data-narration="Physical Model: Represents the physical components of a network." />
    <rect x="50" y="170" width="200" height="100" fill="#fff" rx="10" data-narration="Logical Model: Represents the data flow and communication between devices." />
    <rect x="50" y="290" width="200" height="100" fill="#fff" rx="10" data-narration="Network Topology Model: Represents the physical and logical arrangement of devices." />
    <rect x="50" y="410" width="200" height="100" fill="#fff" rx="10" data-narration="Entity-Relationship Diagram (ERD): A graphical representation of the logical structure of a network." />
  </g>
  <g transform="translate(10, 10)">
    <text class="topic-label" data-narration="Bus Topology" x="10" y="20">Bus Topology</text>
    <rect x="50" y="50" width="200" height="100" fill="#fff" rx="10" data-narration="Advantages: Easy to install and maintain, cost-effective." />
    <rect x="50" y="170" width="200" height="100" fill="#fff" rx="10" data-narration="Disadvantages: Limited scalability." />
    <rect x="50" y="290" width="200" height="100" fill="#fff" rx="10" data-narration="Real-World Example: A bank's network using a bus topology." />
  </g>
  <g transform="translate(10, 10)">
    <text class="topic-label" data-narration="Star Topology" x="10" y="20">Star Topology</text>
    <rect x="50" y="50" width="200" height="100" fill="#fff" rx="10" data-narration="Advantages: Easy to install, maintain, and troubleshoot." />
    <rect x="50" y="170" width="200" height="100" fill="#fff" rx="10" data-narration="Disadvantages: Central point of failure." />
    <rect x="50" y="290" width="200" height="100" fill="#fff" rx="10" data-narration="Real-World Example: A bank's network using a star topology." />
  </g>
  <g transform="translate(10, 10)">
    <text class="topic-label" data-narration="Ring Topology" x="10" y="20">Ring Topology</text>
    <rect x="50" y="50" width="200" height="100" fill="#fff" rx="10" data-narration="Advantages: High-speed data transfer." />
    <rect x="50" y="170" width="200" height="100" fill="#fff" rx="10" data-narration="Disadvantages: Limited scalability, difficult to install." />
    <rect x="50" y="290" width="200" height="100" fill="#fff" rx="10" data-narration="Real-World Example: A network using a ring topology." />
  </g>
  <g transform="translate(10, 10)">
    <text class="topic-label" data-narration="Mesh Topology" x="10" y="20">Mesh Topology</text>
    <rect x="50" y="50" width="200" height="100" fill="#fff" rx="10" data-narration="Advantages: High availability, scalability." />
    <rect x="50" y="170" width="200" height="100" fill="#fff" rx="10" data-narration="Disadvantages: Expensive, complex installation." />
    <rect x="50" y="290" width="200" height="100" fill="#fff" rx="10" data-narration="Real-World Example: A network using a mesh topology." />
  </g>
  <g transform="translate(10, 10)">
    <rect x="50" y="410" width="200" height="100" fill="#fff" rx="10" data-narration="Advantages and Disadvantages of each topology." />
    <rect x="50" y="430" width="200" height="100" fill="#fff" rx="10" data-narration="Real-World Example: Bank's network using a star topology." />
  </g>
  <footer>Computer Networks Study Material: 2.1 - 2.3</footer>
</svg>