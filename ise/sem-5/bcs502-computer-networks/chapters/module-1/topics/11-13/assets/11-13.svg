<svg width="420" height="400" data-topic-id="computer-networks-communication-101-3">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" />
  
  <!-- Title Section -->
  <section data-narration="Introduction to Computer Networks">
    <rect x="10" y="10" width="400" height="50" fill="#66CCCC" rx="10" />
    <text x="20" y="30" text-anchor="middle" font-size="24" fill="#000" font-weight="bold">Introduction to Computer Networks</text>
  </section>
  
  <!-- Data Communications Section -->
  <section data-narration="Data Communications">
    <rect x="10" y="100" width="400" height="150" fill="#ADD8E6" rx="10" />
    <text x="20" y="120" text-anchor="start" font-size="18" fill="#000">Data Communications</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s" repeatCount="indefinite" />
    <line x1="200" y1="200" x2="200" y2="300" stroke="#000" stroke-width="2" stroke-dasharray="3,3" />
    <line x1="220" y1="250" x2="280" y2="300" stroke="#000" stroke-width="2" stroke-dasharray="3,3" />
  </section>
  
  <!-- Key Concepts Section -->
  <section data-narration="Key Concepts">
    <rect x="10" y="270" width="400" height="180" fill="#66CCCC" rx="10" />
    <text x="20" y="290" text-anchor="start" font-size="18" fill="#000">Key Concepts</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.5 1.5" dur="5s" begin="0s" repeatCount="indefinite" />
    <circle cx="200" cy="200" r="40" fill="#ADD8E6" stroke="#000" stroke-width="2" />
    <text x="170" y="220" text-anchor="middle" font-size="16" fill="#000">Data: A set of digital characters used to represent information</text>
  </section>
  
  <!-- Example Section -->
  <section data-narration="Example">
    <rect x="10" y="450" width="400" height="120" fill="#ADD8E6" rx="10" />
    <text x="20" y="470" text-anchor="start" font-size="18" fill="#000">Example</text>
    <animateTransform attributeName="transform" type="translate" from="0 500" to="0 0" dur="5s" begin="0s" repeatCount="indefinite" />
    <rect x="100" y="100" width="200" height="100" fill="#66CCCC" rx="10" />
    <line x1="150" y1="150" x2="200" y2="200" stroke="#000" stroke-width="2" stroke-dasharray="3,3" />
    <line x1="150" y1="150" x2="200" y2="250" stroke="#000" stroke-width="2" stroke-dasharray="3,3" />
  </section>
  
  <!-- Key Technologies Section -->
  <section data-narration="Key Technologies">
    <rect x="10" y="580" width="400" height="180" fill="#ADD8E6" rx="10" />
    <text x="20" y="600" text-anchor="start" font-size="18" fill="#000">Key Technologies</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" begin="0s" repeatCount="indefinite" />
    <line x1="200" y1="200" x2="200" y2="300" stroke="#000" stroke-width="2" stroke-dasharray="3,3" />
    <line x1="220" y1="250" x2="280" y2="300" stroke="#000" stroke-width="2" stroke-dasharray="3,3" />
  </section>
  
  <!-- Footer Section -->
  <footer>
    <rect x="10" y="760" width="400" height="50" fill="#66CCCC" rx="10" />
    <text x="20" y="770" text-anchor="middle" font-size="18" fill="#000">Computer Networks 101</text>
  </footer>
</svg>