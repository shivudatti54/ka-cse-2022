<svg width="420" height="400" data-topic-id="2132" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0097A7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction to the Network Layer">
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#000000">
      <tspan x="20" y="20">Network Layer</tspan>
      <tspan x="120" y="20">Services</tspan>
    </text>
  </section>
  
  <!-- Routing Section -->
  <section data-narration="Routing Services">
    <rect x="120" y="60" width="100" height="150" rx="10" fill="#F7F7F7" stroke="#999999" stroke-width="2"/>
    <circle cx="120" cy="100" r="10" fill="#66CCCC"/>
    <text x="150" y="100" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000">
      Routing
    </text>
    <animateTransform attribute="transform" type="rotate" from="0 120 100" to="360 120 100" dur="6000" begin="0s" repeatCount="indefinite"/>
    <animate x="120" from="120" to="180" dur="2000" begin="0s" repeatCount="indefinite"/>
    <animate y="100" from="100" to="120" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Logical Addressing Section -->
  <section data-narration="Logical Addressing">
    <rect x="120" y="210" width="100" height="150" rx="10" fill="#F7F7F7" stroke="#999999" stroke-width="2"/>
    <circle cx="120" cy="180" r="10" fill="#66CCCC"/>
    <text x="150" y="180" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000">
      Logical Addressing
    </text>
    <animateTransform attribute="transform" type="rotate" from="0 120 180" to="360 120 180" dur="6000" begin="0s" repeatCount="indefinite"/>
    <animate x="120" from="120" to="180" dur="2000" begin="0s" repeatCount="indefinite"/>
    <animate y="180" from="180" to="120" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Congestion Control Section -->
  <section data-narration="Congestion Control">
    <rect x="120" y="290" width="100" height="150" rx="10" fill="#F7F7F7" stroke="#999999" stroke-width="2"/>
    <circle cx="120" cy="260" r="10" fill="#66CCCC"/>
    <text x="150" y="260" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000">
      Congestion Control
    </text>
    <animateTransform attribute="transform" type="rotate" from="0 120 260" to="360 120 260" dur="6000" begin="0s" repeatCount="indefinite"/>
    <animate x="120" from="120" to="180" dur="2000" begin="0s" repeatCount="indefinite"/>
    <animate y="260" from="260" to="180" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Error Detection and Recovery Section -->
  <section data-narration="Error Detection and Recovery">
    <rect x="120" y="370" width="100" height="150" rx="10" fill="#F7F7F7" stroke="#999999" stroke-width="2"/>
    <circle cx="120" cy="340" r="10" fill="#66CCCC"/>
    <text x="150" y="340" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000">
      Error Detection and Recovery
    </text>
    <animateTransform attribute="transform" type="rotate" from="0 120 340" to="360 120 340" dur="6000" begin="0s" repeatCount="indefinite"/>
    <animate x="120" from="120" to="180" dur="2000" begin="0s" repeatCount="indefinite"/>
    <animate y="340" from="340" to="180" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Packet Switching Section -->
  <section data-narration="Packet Switching">
    <rect x="120" y="450" width="100" height="150" rx="10" fill="#F7F7F7" stroke="#999999" stroke-width="2"/>
    <circle cx="120" cy="410" r="10" fill="#66CCCC"/>
    <text x="150" y="410" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#000000">
      Packet Switching
    </text>
    <animateTransform attribute="transform" type="rotate" from="0 120 410" to="360 120 410" dur="6000" begin="0s" repeatCount="indefinite"/>
    <animate x="120" from="120" to="180" dur="2000" begin="0s" repeatCount="indefinite"/>
    <animate y="410" from="410" to="180" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer Section -->
  <text x="20" y="380" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000000">
    <tspan x="20" y="380">Network Layer</tspan>
    <tspan x="120" y="380">Services</tspan>
  </text>
</svg>