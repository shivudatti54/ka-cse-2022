<svg width="420" height="400" data-topic-id="datagram-introduction-to-routing-algorithms-unicast-routing-protocols">
  <!-- Gradient background with pastel colors -->
  <Defs>
    <LinearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <Stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <Stop offset="50%" stop-color="#6495ED" stop-opacity="1"/>
      <Stop offset="100%" stop-color="#CIFE7A" stop-opacity="1"/>
    </LinearGradient>
  </Defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#grad)"/>
  
  <!-- Section 1: Introduction to Datagram -->
  <g transform="translate(50, 80)">
    <rect width="100" height="20" fill="#F0F0F0"/>
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#666666">Datagram Introduction</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#666666">A self-contained unit of data transmitted over a network</text>
    <animateTransform attributeName="transform" type="translate" from="0,80" to="0,90" begin="0s" dur="2s"/>
  </g>
  
  <!-- Section 2: Characteristics of Datagram -->
  <g transform="translate(50, 120)">
    <rect width="100" height="20" fill="#F0F0F0"/>
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#666666">Characteristics</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#666666">Best-effort delivery mechanism, fast transmission</text>
    <animateTransform attributeName="transform" type="translate" from="0,120" to="0,130" begin="0.5s" dur="2s"/>
  </g>
  
  <!-- Section 3: Characteristics of Datagram (continued) -->
  <g transform="translate(50, 160)">
    <rect width="100" height="20" fill="#F0F0F0"/>
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#666666">Characteristics</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#666666">No guaranteed delivery, fast transmission</text>
    <animateTransform attributeName="transform" type="translate" from="0,160" to="0,170" begin="1s" dur="2s"/>
  </g>
  
  <!-- Section 4: Introduction to Routing Algorithms -->
  <g transform="translate(50, 220)">
    <rect width="100" height="20" fill="#F0F0F0"/>
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#666666">Routing Algorithms</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#666666">Set of rules and procedures for forwarding packets</text>
    <animateTransform attributeName="transform" type="translate" from="0,220" to="0,230" begin="2.5s" dur="2s"/>
  </g>
  
  <!-- Section 5: Types of Routing Algorithms -->
  <g transform="translate(50, 280)">
    <rect width="100" height="20" fill="#F0F0F0"/>
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#666666">Types of Routing Algorithms</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#666666">Distance-vector, link-state, hybrid</text>
    <animateTransform attributeName="transform" type="translate" from="0,280" to="0,290" begin="3.5s" dur="2s"/>
  </g>
  
  <!-- Section 6: Examples of Routing Algorithms -->
  <g transform="translate(50, 340)">
    <rect width="100" height="20" fill="#F0F0F0"/>
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#666666">Examples</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#666666">RIP, OSPF, BGP</text>
    <animateTransform attributeName="transform" type="translate" from="0,340" to="0,350" begin="4.5s" dur="2s"/>
  </g>
  
  <!-- Unicast Routing Protocols -->
  <g transform="translate(50, 400)">
    <rect width="100" height="20" fill="#F0F0F0"/>
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#666666">Unicast Routing Protocols</text>
    <text x="10" y="25" font-size="14" font-family="Arial" fill="#666666">Used to forward packets between networks</text>
    <animateTransform attributeName="transform" type="translate" from="0,400" to="0,410" begin="5.5s" dur="2s"/>
  </g>
  
  <!-- Arrow markers for connections -->
  <path d="M 100 20 L 120 40 L 140 60" stroke="#666666" stroke-width="2"/>
  <path d="M 100 80 L 120 100 L 140 120" stroke="#666666" stroke-width="2"/>
  <path d="M 100 140 L 120 160 L 140 180" stroke="#666666" stroke-width="2"/>
  
  <!-- Title and footer -->
  <text x="10" y="30" font-size="32" font-family="Arial" fill="#666666">Datagram Introduction To Routing Algorithms Unicast Routing Protocols</text>
  <text x="10" y="380" font-size="16" font-family="Arial" fill="#666666">Copyright 2023</text>
</svg>