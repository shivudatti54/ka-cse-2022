<svg width="420" height="400" data-topic-id="201-203">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA"/>
      <stop offset="50%" stop-color="#B2FFFC"/>
      <stop offset="100%" stop-color="#C9E4CA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title at top -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial" fill="#3498db">
    Network Layer Services
  </text>

  <!-- Section 1: Routing -->
  <rect x="50" y="100" width="320" height="50" fill="#fff" rx="10"/>
  <text x="60" y="110" text-anchor="middle" font-size="18" font-family="Arial" fill="#666" data-narration="Routing is the process of forwarding packets between different networks.">
    Routing
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4000" repeatCount="indefinite"/>
  <line x1="200" y1="150" x2="200" y2="250" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5""/>
  <line x1="250" y1="150" x2="250" y2="250" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="200" y1="300" x2="200" y2="300" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" arrowhead="none" arrowmark="none" marker-end="url(#arrow-mark)"/>

  <!-- Section 2: Fragmentation -->
  <rect x="50" y="170" width="320" height="50" fill="#fff" rx="10"/>
  <text x="60" y="180" text-anchor="middle" font-size="18" font-family="Arial" fill="#666" data-narration="Fragmentation is the process of breaking down large packets into smaller packets that can be transmitted over networks with different maximum transmission unit (MTU).">
    Fragmentation
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4000" repeatCount="indefinite"/>
  <line x1="200" y1="220" x2="200" y2="330" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="10"/>
  <line x1="250" y1="220" x2="250" y2="330" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="10"/>
  <line x1="200" y1="290" x2="200" y2="290" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" arrowhead="none" arrowmark="none" marker-end="url(#arrow-mark)"/>

  <!-- Section 3: Reassembly -->
  <rect x="50" y="310" width="320" height="50" fill="#fff" rx="10"/>
  <text x="60" y="320" text-anchor="middle" font-size="18" font-family="Arial" fill="#666" data-narration="Reassembly is the process of reassembling fragmented packets at the receiving end.">
    Reassembly
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4000" repeatCount="indefinite"/>
  <line x1="200" y1="350" x2="200" y2="470" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="10"/>
  <line x1="250" y1="350" x2="250" y2="470" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="10"/>
  <line x1="200" y1="420" x2="200" y2="420" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" arrowhead="none" arrowmark="none" marker-end="url(#arrow-mark)"/>

  <!-- Section 4: Internetworking -->
  <rect x="50" y="420" width="320" height="50" fill="#fff" rx="10"/>
  <text x="60" y="430" text-anchor="middle" font-size="18" font-family="Arial" fill="#666" data-narration="Internetworking is the process of connecting multiple networks together to form a single network. This is achieved through the use of routers and gateways.">
    Internetworking
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4000" repeatCount="indefinite"/>
  <line x1="200" y1="460" x2="200" y2="580" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="10"/>
  <line x1="250" y1="460" x2="250" y2="580" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="10"/>
  <line x1="200" y1="530" x2="200" y2="530" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" arrowhead="none" arrowmark="none" marker-end="url(#arrow-mark)"/>

  <!-- Section 5: Network Addressing -->
  <rect x="50" y="550" width="320" height="50" fill="#fff" rx="10"/>
  <text x="60" y="560" text-anchor="middle" font-size="18" font-family="Arial" fill="#666" data-narration="Network addressing is the process of assigning a unique address to a device on a network.">
    Network Addressing
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4000" repeatCount="indefinite"/>
  <line x1="200" y1="590" x2="200" y2="710" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="10"/>
  <line x1="250" y1="590" x2="250" y2="710" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="10"/>
  <line x1="200" y1="670" x2="200" y2="670" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" arrowhead="none" arrowmark="none" marker-end="url(#arrow-mark)"/>

  <!-- Footer -->
  <text x="50%" y="390" text-anchor="middle" font-size="18" font-family="Arial" fill="#666">
    201-203
  </text>
</svg>