<svg width="420" height="400" data-topic-id="packets-dropped">
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4ec3f7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g id="packets-dropped">
    <rect x="50" y="50" width="320" height="300" fill="#fff" rx="10"/>
    <text x="150" y="50" font-size="24" font-weight="bold" text-anchor="middle">And Find The Number Of Packets Dropped</text>
    <text x="150" y="150" font-size="18" text-anchor="middle">What are Packets Dropped?</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
    <text x="150" y="200" font-size="18" text-anchor="middle">Packets dropped refer to the packets that are lost or discarded during transmission due to various reasons.</text>
    <animate x="150" y="250" attributeName="x" by="50" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="250" font-size="18" text-anchor="middle">These packets are never received by the destination device and are considered as lost packets.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
    <text x="150" y="300" font-size="18" text-anchor="middle">Causes of Packet Loss</text>
    <animate x="150" y="350" attributeName="x" by="50" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="350" font-size="18" text-anchor="middle">Packet loss can occur due to various reasons, including physical layer issues, data link layer issues, network layer issues, transport layer issues.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
    <text x="150" y="400" font-size="18" text-anchor="middle">Types of Packet Loss</text>
    <animate x="150" y="450" attributeName="x" by="50" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="450" font-size="18" text-anchor="middle">There are two types of packet loss: duplicate packets and lost packets.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
    <text x="150" y="500" font-size="18" text-anchor="middle">Impact on Network Performance</text>
    <animate x="150" y="550" attributeName="x" by="50" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="550" font-size="18" text-anchor="middle">Packet loss can have a significant impact on network performance, including decreased throughput, increased latency, and reduced quality of service.</text>
    <path d="M 100, 50 L 100, 150" stroke="#4ec3f7" stroke-width="2" fill="none" mark="line"/>
    <path d="M 100, 150 L 100, 250" stroke="#4ec3f7" stroke-width="2" fill="none" mark="line"/>
    <path d="M 100, 250 L 100, 350" stroke="#4ec3f7" stroke-width="2" fill="none" mark="line"/>
    <path d="M 100, 350 L 100, 450" stroke="#4ec3f7" stroke-width="2" fill="none" mark="line"/>
    <text x="100" y="450" font-size="18" text-anchor="middle">Examples</text>
    <path d="M 50, 50 L 150, 50" stroke="#6c5ce7" stroke-width="2" fill="none" mark="line"/>
    <text x="100" y="500" font-size="18" text-anchor="middle">Suppose we have a network with two nodes ...</text>
    <text x="100" y="550" font-size="18" text-anchor="middle">Conclusion</text>
    <footer>Learn more about computer networks and network performance metrics.</footer>
  </g>
</svg>