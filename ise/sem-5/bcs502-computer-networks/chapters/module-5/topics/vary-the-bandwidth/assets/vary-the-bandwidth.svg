<svg width="420" height="400" data-topic-id="vary-bandwidth">
  <style>
    /* Styles for the SVG */
    body {
      background-color: #87ceeb;
    }
    . gradient-fill {
      gradient: linear-gradient(to bottom, #ADD8E6, #87CEEB);
    }
    .text {
      font-family: Arial, sans-serif;
      font-size: 18px;
      color: #0097A7;
    }
    .title {
      font-size: 36px;
      font-weight: bold;
      color: #FFC107;
    }
    .footer {
      font-size: 18px;
      color: #0097A7;
    }
  </style>

  <!-- Title and background gradient -->
  <rect x="50" y="20" width="320" height="50" class="gradient-fill" fill="#ADD8E6"/>
  <text x="150" y="40" class="title">Vary the Bandwidth</text>
  <text x="150" y="70" class="footer">Computer Networking</text>

  <!-- Introduction section -->
  <rect x="50" y="130" width="320" height="40" class="gradient-fill" fill="#87CEEB"/>
  <text x="150" y="150" class="text" data-narration="Introduction">Bandwidth is a fundamental concept in computer networking that refers to the amount of data that can be transmitted over a network connection within a given time period.</text>

  <!-- Key Concepts section -->
  <rect x="50" y="190" width="320" height="40" class="gradient-fill" fill="#87CEEB"/>
  <text x="150" y="210" class="text" data-narration="Key Concepts: Bit rate, Bandwidth, and Packet size are essential to understand when discussing bandwidth in computer networking."/>
  <rect x="50" y="250" width="320" height="40" class="gradient-fill" fill="#87CEEB"/>
  <text x="150" y="270" class="text" data-narration="Understanding the relationships between these concepts is crucial for efficient data transfer and network management."/>

  <!-- Types of Bandwidth Variations section -->
  <rect x="50" y="310" width="320" height="40" class="gradient-fill" fill="#87CEEB"/>
  <text x="150" y="330" class="text" data-narration="There are two main ways to vary the bandwidth in a computer network: Increasing Bandwidth and Decreasing Bandwidth."/>
  <rect x="50" y="380" width="320" height="40" class="gradient-fill" fill="#87CEEB"/>
  <text x="150" y="400" class="text" data-narration="Increasing bandwidth can be achieved through various means, such as upgrading to faster wired connections or using multiplexing techniques."/>
  <rect x="50" y="450" width="320" height="40" class="gradient-fill" fill="#87CEEB"/>
  <text x="150" y="470" class="text" data-narration="Decreasing bandwidth can be achieved through various means, such as congestion management or Quality of Service (QoS) techniques."/>
  <rect x="50" y="520" width="320" height="40" class="gradient-fill" fill="#87CEEB"/>
  <text x="150" y="540" class="text" data-narration="Understanding the differences between these methods is essential for effective network management."/>

  <!-- Connection arrows -->
  <line x1="50" y1="200" x2="50" y2="270" stroke="#0097A7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="260" x2="50" y2="330" stroke="#0097A7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="310" x2="50" y2="380" stroke="#0097A7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="370" x2="50" y2="440" stroke="#0097A7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="430" x2="50" y2="500" stroke="#0097A7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="10s" fill="freeze" attributeName="opacity">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.1 1.1"dur="10s"/>
  </animate>

  <!-- Gradient arrowhead -->
  <metadata>
    <title>markerEnd</title>
    <path id="arrowhead" d="M0 0 L0 10 L10 10 Z"/>
  </metadata>
</svg>