<svg width="420" height="400" data-topic-id="tcpip-sockets">
  <title>7 Using TCP/IP Sockets</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Definition</text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">A TCP/IP socket is an endpoint for communication between two devices in a network.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(140, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Types</text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">There are two primary types of TCP/IP sockets: stream sockets and datagram sockets.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(280, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Creating a TCP/IP Socket</text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">To create a TCP/IP socket, you need to import the necessary libraries, create a socket object, bind the socket to a local address and port number, and listen for incoming connections.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(420, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Stream Sockets</text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">Stream sockets provide a connection-oriented service, where a connection is established between the two endpoints before data is sent.</text>
    <text x="10" y="50" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">They are suitable for applications that require guaranteed delivery of data, such as file transfers.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(560, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Datagram Sockets</text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">Datagram sockets provide a connectionless service, where data is sent without establishing a connection first.</text>
    <text x="10" y="50" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">They are suitable for applications that require fast transmission of data, such as online gaming.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(700, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Creating a TCP/IP Socket (continued)</text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">To create a TCP/IP socket, you need to import the necessary libraries, create a socket object, bind the socket to a local address and port number, and listen for incoming connections.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(840, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Stream Sockets (continued)</text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">Stream sockets provide a connection-oriented service, where a connection is established between the two endpoints before data is sent.</text>
    <text x="10" y="50" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">They are suitable for applications that require guaranteed delivery of data, such as file transfers.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(980, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Datagram Sockets (continued)</text>
    <text x="10" y="30" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">Datagram sockets provide a connectionless service, where data is sent without establishing a connection first.</text>
    <text x="10" y="50" font-size="14" font-family="Arial" fill="#FFF" text-anchor="start">They are suitable for applications that require fast transmission of data, such as online gaming.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(1120, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#2F4F7F" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#FFF" text-anchor="start">Footer</text>
  </g>
</svg>