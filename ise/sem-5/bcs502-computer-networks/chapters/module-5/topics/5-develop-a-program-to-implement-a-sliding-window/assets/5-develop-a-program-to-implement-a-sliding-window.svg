<svg width="420" height="400" data-topic-id="slide-window-protocol" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8FBCFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  
  <!-- Title section -->
  <section data-narration="Introduction">
    <g transform="translate(10, 20)">
      <rect x="0" y="0" width="300" height="40" fill="#3B5998" rx="5"/>
      <text x="10" y="15" fill="#ffffff" font-size="18">Slide Window Protocol</text>
    </g>
  </section>
  
  <!-- Definitions section -->
  <section data-narration="Definitions">
    <g transform="translate(10, 60)">
      <rect x="0" y="0" width="300" height="40" fill="#8FBCFF" rx="5"/>
      <rect x="0" y="0" width="50" height="40" fill="#3B5998" rx="5" transform="translate(10, 5)"/>
      <text x="15" y="12" fill="#ffffff" font-size="14">Slide Window Protocol</text>
      <text x="75" y="12" fill="#ffffff" font-size="14">Standard Sliding Window Protocol</text>
    </g>
  </section>
  
  <!-- How it works section -->
  <section data-narration="How it works">
    <g transform="translate(10, 100)">
      <rect x="0" y="0" width="300" height="80" fill="#A1C9F2" rx="5"/>
      <rect x="0" y="0" width="50" height="40" fill="#3B5998" rx="5" transform="translate(10, 5)"/>
      <text x="15" y="20" fill="#ffffff" font-size="14">Synchronization</text>
      <rect x="0" y="50" width="50" height="40" fill="#3B5998" rx="5" transform="translate(10, 60)"/>
      <text x="15" y="62" fill="#ffffff" font-size="14">Window Establishment</text>
      <rect x="0" y="90" width="50" height="40" fill="#3B5998" rx="5" transform="translate(10, 90)"/>
      <text x="15" y="102" fill="#ffffff" font-size="14">Data Transmission</text>
      <rect x="0" y="130" width="50" height="40" fill="#3B5998" rx="5" transform="translate(10, 130)"/>
      <text x="15" y="142" fill="#ffffff" font-size="14">Acknowledgment</text>
      <rect x="0" y="170" width="50" height="40" fill="#3B5998" rx="5" transform="translate(10, 170)"/>
      <text x="15" y="182" fill="#ffffff" font-size="14">Window Update</text>
    </g>
  </section>
  
  <!-- Key concepts section -->
  <section data-narration="Key Concepts">
    <g transform="translate(10, 220)">
      <rect x="0" y="0" width="300" height="80" fill="#3B5998" rx="5"/>
      <rect x="0" y="0" width="50" height="40" fill="#8FBCFF" rx="5" transform="translate(10, 5)"/>
      <text x="15" y="20" fill="#ffffff" font-size="14">Flow Control</text>
      <rect x="0" y="50" width="50" height="40" fill="#3B5998" rx="5" transform="translate(10, 60)"/>
      <text x="15" y="62" fill="#ffffff" font-size="14">Error Detection and Correction</text>
    </g>
  </section>
  
  <!-- Benefits section -->
  <section data-narration="Benefits">
    <g transform="translate(10, 270)">
      <rect x="0" y="0" width="300" height="80" fill="#A1C9F2" rx="5"/>
      <text x="10" y="15" fill="#ffffff" font-size="18">Improved Performance</text>
      <rect x="0" y="50" width="50" height="40" fill="#3B5998" rx="5" transform="translate(10, 60)"/>
      <text x="15" y="62" fill="#ffffff" font-size="14">Reduced Overhead</text>
    </g>
  </section>
  
  <!-- Animations -->
  <animate xlink:href="#gradient" begin="0s" dur="2s" fill="freeze"/>
  <animate xlink:href="#gradient" begin="2s" dur="2s" fill="freeze"/>
  <animate xlink:href="#gradient" begin="4s" dur="2s" fill="freeze"/>
  <animate xlink:href="#gradient" begin="6s" dur="2s" fill="freeze"/>
  
  <!-- Arrow markers -->
  <line x1="80" y1="0" x2="80" y2="400" stroke="#3B5998" stroke-width="2"/>
  <line x1="320" y1="0" x2="320" y2="400" stroke="#3B5998" stroke-width="2"/>
  
  <!-- Footer -->
  <g transform="translate(10, 380)">
    <rect x="0" y="0" width="300" height="20" fill="#3B5998" rx="5"/>
    <text x="10" y="15" fill="#ffffff" font-size="14">Slide Window Protocol</text>
  </g>
</svg>