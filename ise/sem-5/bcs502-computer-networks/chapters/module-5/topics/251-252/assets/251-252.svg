<svg width="420" height="400" data-topic-id="251-252" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <title>Network Topology and Protocols</title>
  <g transform="translate(20, 50)">
    <rect width="100" height="20" fill="#f0f0f0" rx="5"/>
    <text x="5" y="3" font-size="16" font-family="Arial" fill="#333">Network Topology</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
    <g data-narration="Bus Topology">
      <rect x="10" y="30" width="80" height="20" fill="#fff" rx="5"/>
      <text x="15" y="25" font-size="14" font-family="Arial" fill="#666">All devices connected to a single cable</text>
      <circle cx="50" cy="35" r="10" fill="#f0f0f0"/>
      <path d="M 50, 35 L 70, 55" stroke="#f0f0f0" stroke-width="2"/>
      <g transform="translate(70, 55)">
        <rect width="20" height="20" fill="#fff" rx="5"/>
        <text x="10" y="15" font-size="12" font-family="Arial" fill="#666">Easy installation and maintenance</text>
        <text x="30" y="15" font-size="12" font-family="Arial" fill="#666">Low cost</text>
      </g>
    </g>
    <g data-narration="Star Topology">
      <rect x="150" y="30" width="80" height="20" fill="#fff" rx="5"/>
      <text x="155" y="25" font-size="14" font-family="Arial" fill="#666">All devices connected to a central device</text>
      <circle cx="200" cy="35" r="10" fill="#f0f0f0"/>
      <path d="M 200, 35 L 220, 55" stroke="#f0f0f0" stroke-width="2"/>
      <g transform="translate(220, 55)">
        <rect width="20" height="20" fill="#fff" rx="5"/>
        <text x="10" y="15" font-size="12" font-family="Arial" fill="#666">Easy management and troubleshooting</text>
        <text x="30" y="15" font-size="12" font-family="Arial" fill="#666">Redundant connections</text>
      </g>
    </g>
    <g data-narration="Ring Topology">
      <rect x="300" y="30" width="80" height="20" fill="#fff" rx="5"/>
      <text x="305" y="25" font-size="14" font-family="Arial" fill="#666">Devices connected in a circular configuration</text>
      <circle cx="350" cy="35" r="10" fill="#f0f0f0"/>
      <path d="M 350, 35 L 370, 55" stroke="#f0f0f0" stroke-width="2"/>
      <g transform="translate(370, 55)">
        <rect width="20" height="20" fill="#fff" rx="5"/>
        <text x="10" y="15" font-size="12" font-family="Arial" fill="#666">Fast data transfer</text>
        <text x="30" y="15" font-size="12" font-family="Arial" fill="#666">Redundant connections</text>
      </g>
    </g>
    <g data-narration="Mesh Topology">
      <rect x="150" y="100" width="80" height="20" fill="#fff" rx="5"/>
      <text x="155" y="95" font-size="14" font-family="Arial" fill="#666">Each device connected to every other device</text>
      <circle cx="200" cy="105" r="10" fill="#f0f0f0"/>
      <path d="M 200, 105 L 220, 125" stroke="#f0f0f0" stroke-width="2"/>
      <g transform="translate(220, 125)">
        <rect width="20" height="20" fill="#fff" rx="5"/>
        <text x="10" y="115" font-size="12" font-family="Arial" fill="#666">High reliability and redundancy</text>
        <text x="30" y="115" font-size="12" font-family="Arial" fill="#666">Multiple paths for data transfer</text>
      </g>
    </g>
  </g>
  <g transform="translate(10, 380)">
    <rect width="400" height="20" fill="#f0f0f0" rx="5"/>
    <text x="20" y="15" font-size="16" font-family="Arial" fill="#333">Network Protocols</text>
  </g>
</svg>