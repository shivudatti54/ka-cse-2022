<svg width="420" height="400" data-topic-id="Develop-a-Program-To-Find-The-Shortest-Path-Between-Vertices" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#E6F9EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title at top -->
  <g transform="translate(10, 10)">
    <text font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      Shortest Path Problem
    </text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      <data-narration>In computer networks, finding the shortest path between vertices is a crucial task in many applications such as network routing, traffic optimization, and resource allocation.</data-narration>
    </text>
    <animate transform="translateX(10) rotate(90)" begin="100ms" dur="1000ms" repeat-count="indefinite" />
  </g>
  
  <!-- Section 2: Bellman-Ford Algorithm -->
  <g transform="translate(10, 90)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      <data-narration>Bellman-Ford algorithm is a dynamic programming algorithm used to find the shortest path from a source vertex to all other vertices in a weighted graph.</data-narration>
    </text>
    <animate transform="translateX(10) rotate(90)" begin="200ms" dur="1000ms" repeat-count="indefinite" />
  </g>
  
  <!-- Section 3: How Bellman-Ford Algorithm Works -->
  <g transform="translate(10, 130)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      <data-narration>The steps involved in Bellman-Ford algorithm are: initialize distance of source vertex to 0 and all other vertices to infinity, relax all edges repeatedly, and check for negative cycles.</data-narration>
    </text>
    <animate transform="translateX(10) rotate(90)" begin="300ms" dur="1000ms" repeat-count="indefinite" />
  </g>
  
  <!-- Section 4: Example -->
  <g transform="translate(10, 170)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      <data-narration>Suppose we have the following graph:</data-narration>
    </text>
    <rect x="50" y="50" width="60" height="30" fill="#F7F7F7" rx="5" />
    <rect x="120" y="50" width="60" height="30" fill="#F7F7F7" rx="5" />
    <rect x="190" y="50" width="60" height="30" fill="#F7F7F7" rx="5" />
    <rect x="260" y="50" width="60" height="30" fill="#F7F7F7" rx="5" />
    <animate transform="translateX(10) rotate(90)" begin="400ms" dur="1000ms" repeat-count="indefinite" />
  </g>
  <g transform="translate(10, 210)">
    <text font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      <data-narration>Weights of the edges are:</data-narration>
    </text>
    <rect x="50" y="50" width="60" height="30" fill="#F7F7F7" rx="5" />
    <text x="50" y="80" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">A</text>
    <text x="120" y="80" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">B</text>
    <text x="190" y="80" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">C</text>
    <text x="260" y="80" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">D</text>
    <text x="50" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">5</text>
    <text x="120" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">2</text>
    <text x="190" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">1</text>
    <text x="260" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">0</text>
    <animate transform="translateX(10) rotate(90)" begin="500ms" dur="1000ms" repeat-count="indefinite" />
  </g>
  <g transform="translate(10, 260)">
    <text font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      <data-narration>Vertices</data-narration>
    </text>
    <text x="50" y="300" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">A</text>
    <text x="120" y="300" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">B</text>
    <text x="190" y="300" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">C</text>
    <text x="260" y="300" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">D</text>
    <text x="50" y="340" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">0</text>
    <text x="120" y="340" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">3</text>
    <text x="190" y="340" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">2</text>
    <text x="260" y="340" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">4</text>
    <animate transform="translateX(10) rotate(90)" begin="600ms" dur="1000ms" repeat-count="indefinite" />
  </g>
  
  <!-- Section 5: Path Vector Routing Algorithm -->
  <g transform="translate(10, 310)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      <data-narration>Path vector routing algorithm is a routing algorithm used to find the shortest path in a network.</data-narration>
    </text>
    <animate transform="translateX(10) rotate(90)" begin="700ms" dur="1000ms" repeat-count="indefinite" />
  </g>
  
  <!-- Section 6: Conclusion -->
  <g transform="translate(10, 370)">
    <rect width="380" height="30" fill="#F7F7F7" rx="5" />
    <text font-size="16" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      <data-narration>Conclusion</data-narration>
    </text>
    <animate transform="translateX(10) rotate(90)" begin="800ms" dur="1000ms" repeat-count="indefinite" />
  </g>
  
  <!-- Footer at bottom -->
  <g transform="translate(10, 420)">
    <text font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      &copy; 2023
    </text>
  </g>
</svg>