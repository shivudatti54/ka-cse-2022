<svg width="420" height="400" data-topic-id="datagram-socket-client-server">
  <title>Datagram Socket Client/Server Communication</title>
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a288a" stop-opacity="1"/>
      <stop offset="50%" stop-color="#7089d9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f1e6cb" stop-opacity="1"/>
