      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="2s" begin="0s"/>
      <animateTransform attributeName="transform" type="translate" from="0,60" to="0,120" dur="2s" begin="2s"/>
      <rect x="10" y="100" width="100%" height="30" fill="#f0e4cc"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,140" dur="2s" begin="4s"/>
      <rect x="10" y="120" width="100%" height="30" fill="#f0e4cc"/>
      <animateTransform attributeName="transform" type="translate" from="0,120" to="0,160" dur="2s" begin="6s"/>
    </g>
    <g transform="translate(10, 240)">
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#000" text-anchor="middle">
        <tspan data-narration="Example Program">He</tspan>
      </text>
      <rect x="10" y="20" width="100%" height="30" fill="#f0e4cc"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="2s" begin="0s"/>
      <animateTransform attributeName="transform" type="translate" from="0,60" to="0,120" dur="2s" begin="2s"/>
      <rect x="10" y="100" width="100%" height="30" fill="#f0e4cc"/>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,140" dur="2s" begin="4s"/>
      <rect x="10" y="120" width="100%" height="30" fill="#f0e4cc"/>
      <animateTransform attributeName="transform" type="translate" from="0,120" to="0,160" dur="2s" begin="6s"/>
