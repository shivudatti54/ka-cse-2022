<svg width="420" height="400" data-topic-id="101-104">
  <style>
    * {
      font-family: Arial, sans-serif;
    }
    .section {
      margin-bottom: 20px;
    }
    .section .title {
      font-weight: bold;
      font-size: 18px;
    }
    .section .text {
      font-size: 14px;
    }
    .arrow {
      fill: none;
      stroke: #ccc;
      stroke-width: 2;
      stroke-linecap: round;
    }
  </style>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>
  <g transform="translate(20, 20)">
    <text x="50%" y="80%" font-size="36px" font-weight="bold">Error Detection and Correction</text>
    <g opacity="0" transform="translate(0, 120)">
      <animate transform="translate(0, 0)" begin="0s" duration="2s" fill="freeze" />
    </g>
    <g transform="translate(0, 160)">
      <section data-narration="101">
        <div class="title">Introduction</div>
        <div class="text">Error detection and correction are crucial components of data communication in computer networks.</div>
        <g>
          <line x1="50%" y1="180" x2="50%" y2="220" stroke="#3B3F54" stroke-width="2" />
          <text x="50%" y="190" font-size="14px">Bit errors occur when a single bit in the data is flipped during transmission.</text>
        </g>
        <g>
          <line x1="50%" y1="180" x2="50%" y2="220" stroke="#3B3F54" stroke-width="2" class="arrow" />
          <line x1="55%" y1="190" x2="45%" y2="210" stroke="#3B3F54" stroke-width="2" />
          <text x="55%" y="190" font-size="14px">Packet errors occur when a packet of data is corrupted or lost during transmission.</text>
        </g>
      </section>
      <g transform="translate(0, 220)">
        <section data-narration="102">
          <div class="title">Block Coding</div>
          <div class="text">Block coding is a technique used to detect and correct errors in data transmission.</div>
          <g>
            <line x1="50%" y1="240" x2="50%" y2="280" stroke="#3B3F54" stroke-width="2" />
            <text x="50%" y="250" font-size="14px">Blocks of data are encoded with redundancy bits.</text>
          </g>
          <g>
            <line x1="50%" y1="240" x2="50%" y2="280" stroke="#3B3F54" stroke-width="2" class="arrow" />
            <line x1="55%" y1="250" x2="45%" y2="270" stroke="#3B3F54" stroke-width="2" />
            <text x="55%" y="250" font-size="14px">Redundancy bits are used to detect and correct errors.</text>
          </g>
        </section>
        <g transform="translate(0, 280)">
          <section data-narration="103">
            <div class="title">Cyclic Codes</div>
            <div class="text">Cyclic codes are a type of block code that is used to detect and correct errors in data transmission.</div>
            <g>
              <line x1="50%" y1="300" x2="50%" y2="340" stroke="#3B3F54" stroke-width="2" />
              <text x="50%" y="310" font-size="14px">Cyclic codes use mathematical algorithms to encode and decode data.</text>
            </g>
            <g>
              <line x1="50%" y1="300" x2="50%" y2="340" stroke="#3B3F54" stroke-width="2" class="arrow" />
              <line x1="55%" y1="310" x2="45%" y2="330" stroke="#3B3F54" stroke-width="2" />
              <text x="55%" y="310" font-size="14px">Cyclic codes are invariant under cyclic shifts.</text>
            </g>
          </section>
          <g transform="translate(0, 340)">
            <section data-narration="104">
              <div class="title">Properties of Cyclic Codes</div>
              <div class="text">Cyclic codes have several properties that make them useful for error detection and correction.</div>
              <g>
                <line x1="50%" y1="360" x2="50%" y2="400" stroke="#3B3F54" stroke-width="2" />
                <text x="50%" y="370" font-size="14px">Cyclic codes are used to detect and correct single-bit, double-bit, and triple-bit errors.</text>
              </g>
              <g>
                <line x1="50%" y1="360" x2="50%" y2="400" stroke="#3B3F54" stroke-width="2" class="arrow" />
                <line x1="55%" y1="370" x2="45%" y2="390" stroke="#3B3F54" stroke-width="2" />
                <text x="55%" y="370" font-size="14px">Cyclic codes are used to detect and correct errors in data transmission.</text>
              </g>
            </section>
          </g>
        </g>
        <g transform="translate(0, 380)">
          <g class="arrow" />
          <text x="50%" y="400" font-size="36px" font-weight="bold">Conclusion</text>
        </g>
      </section>
    </g>
  </g>
</svg>