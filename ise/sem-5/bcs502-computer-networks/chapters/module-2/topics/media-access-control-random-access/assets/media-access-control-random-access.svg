<svg width="420" height="400" data-topic-id="Media-Access-Control-Random-Access" xmlns="http://www.w3.org/2000/svg">
  <style>
    .style {
      fill: #1a1d23;
      stroke: #4c5154;
    }
    
    .title {
      fill: #1a1d23;
      font-size: 24px;
      font-weight: bold;
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
    
    .footer {
      fill: #1a1d23;
      font-size: 14px;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
    
    .section {
      stroke: #4c5154;
      stroke-width: 2;
      fill: none;
      margin-bottom: 20px;
    }
    
    .section-line {
      stroke: #4c5154;
      stroke-width: 2;
      fill: none;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#33CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#gradient)"/>
  <title>Media Access Control Random Access</title>
  <g>
    <path class="section" d="M 20,100 L 400,100 Z"/>
    <path class="section-line" d="M 20,100 L 400,100 Z"/>
    <g>
      <g data-narration="Introduction">
        <rect x="20" y="20" width="380" height="60" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
        <text x="50%" y="30" text-anchor="middle" class="title">Media Access Control (MAC)</text>
        <text x="50%" y="50" text-anchor="middle" class="title">Protocols</text>
      </g>
      <g data-narration="Types of MAC Protocols">
        <rect x="20" y="90" width="380" height="60" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
        <text x="50%" y="100" text-anchor="middle" class="title">Random Access Protocols</text>
        <g>
          <path class="section-line" d="M 50,120 L 300,120 Z"/>
          <text x="50%" y="130" text-anchor="middle" class="title">ALOHA</text>
          <text x="150%" y="130" text-anchor="middle" class="title">CSMA</text>
          <text x="250%" y="130" text-anchor="middle" class="title">CSMA/CD</text>
        </g>
        <g>
          <path class="section-line" d="M 50,180 L 300,180 Z"/>
          <text x="50%" y="190" text-anchor="middle" class="title">Token Ring</text>
        </g>
      </g>
      <g data-narration="MAC Protocol Functions">
        <rect x="20" y="250" width="380" height="60" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
        <text x="50%" y="260" text-anchor="middle" class="title">Framing</text>
        <g>
          <path class="section-line" d="M 50,280 L 300,280 Z"/>
          <text x="50%" y="290" text-anchor="middle" class="title">Addressing</text>
        </g>
        <g>
          <path class="section-line" d="M 50,340 L 300,340 Z"/>
          <text x="50%" y="350" text-anchor="middle" class="title">Error Detection and Correction</text>
        </g>
        <g>
          <path class="section-line" d="M 50,400 L 300,400 Z"/>
          <text x="50%" y="410" text-anchor="middle" class="title">Flow Control</text>
        </g>
      </g>
      <g data-narration="MAC Protocol Examples">
        <rect x="20" y="370" width="380" height="60" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
        <text x="50%" y="380" text-anchor="middle" class="title">CSMA/CD</text>
        <g>
          <path class="section-line" d="M 50,410 L 300,410 Z"/>
          <text x="50%" y="420" text-anchor="middle" class="title">Token Ring</text>
        </g>
      </g>
    </g>
    <g>
      <path class="section" d="M 20,450 L 400,450 Z"/>
      <path class="section-line" d="M 20,450 L 400,450 Z"/>
      <g>
        <rect x="20" y="470" width="380" height="30" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
        <text x="50%" y="480" text-anchor="middle" class="title">Arrows represent connection between devices</text>
      </g>
    </g>
    <g>
      <rect x="20" y="500" width="380" height="30" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
      <text x="50%" y="510" text-anchor="middle" class="title">Arrow marker for connections</text>
    </g>
    <g>
      <rect x="20" y="530" width="380" height="30" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
      <text x="50%" y="540" text-anchor="middle" class="title">Key terms: Framing, Addressing, Error Detection and Correction, Flow Control</text>
    </g>
    <g>
      <rect x="20" y="570" width="380" height="30" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
      <text x="50%" y="580" text-anchor="middle" class="title">Key terms: ALOHA, CSMA, CSMA/CD, Token Ring</text>
    </g>
  </g>
  <g>
    <rect x="20" y="600" width="380" height="30" style="fill: #F7F7F7; stroke: #4c5154; stroke-width: 2"/>
    <text x="50%" y="610" text-anchor="middle" class="title">Footer</text>
  </g>
</svg>