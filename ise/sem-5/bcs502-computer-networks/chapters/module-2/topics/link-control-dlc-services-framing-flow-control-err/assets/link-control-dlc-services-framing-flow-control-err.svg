      <text x="10" y="15" text-anchor="start" font-size="18">Link control is a crucial aspect of data communication</text>
    </rect>
  </g>

  <g data-narration="Framing" transform="translate(10, 120)">
    <rect x="0" y="0" width="400" height="150" fill="#F7F7F7" rx="5">
