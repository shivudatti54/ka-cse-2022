      <rect x="140" y="20" width="100" height="50" fill="#F2C464" rx="5"/>
      <text x="50%" y="50" text-anchor="middle" font-size="18">Flow control is the process of controlling the amount of data transmitted over a link</text>
    </rect>
  </g>

  <g data-narration="Error Control" transform="translate(10, 350)">
