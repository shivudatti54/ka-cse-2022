      <rect x="140" y="20" width="100" height="100" fill="#ACC7F2" rx="5"/>
      <text x="50%" y="50" text-anchor="middle" font-size="18">Framing is the process of dividing data into frames</text>
    </rect>
  </g>

  <g data-narration="Flow Control" transform="translate(10, 280)">
    <rect x="0" y="0" width="400" height="150" fill="#F7F7F7" rx="5">
