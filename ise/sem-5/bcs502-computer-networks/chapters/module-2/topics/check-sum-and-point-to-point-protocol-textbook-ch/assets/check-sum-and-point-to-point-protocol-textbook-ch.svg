<svg width="420" height="400" data-topic-id="check-sum-and-point-to-point-protocol">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)"/>
  <text x="150" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3498db" text-anchor="middle">Check Sum and Point to Point Protocol</text>
  <section data-narration="Introduction">
    <rect x="50" y="100" width="320" height="50" fill="#f9f9f9"/>
    <text x="50" y="110" font-size="18" font-family="Arial, sans-serif" fill="#3e8e41">In a data communication system, errors can occur during data transmission due to various reasons such as signal degradation, noise, or interference.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s"/>
  </section>
  <section data-narration="Check Sum">
    <rect x="50" y="170" width="320" height="50" fill="#f9f9f9"/>
    <text x="50" y="180" font-size="18" font-family="Arial, sans-serif" fill="#3e8e41">Check Sum is a mechanism used to detect errors in data transmission by calculating a digital signature of the data packet.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" begin="0s" dur="2s"/>
    <line x1="50" y1="180" x2="50" y2="220" stroke="#3498db" stroke-width="2"/>
    <text x="50" y="210" font-size="18" font-family="Arial, sans-serif" fill="#3498db">The digital signature is then compared with the received Check Sum to determine if any errors occurred during transmission.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="0.5s" dur="2s"/>
  </section>
  <section data-narration="How it works">
    <rect x="50" y="230" width="320" height="50" fill="#f9f9f9"/>
    <text x="50" y="240" font-size="18" font-family="Arial, sans-serif" fill="#3e8e41">The sender calculates the Check Sum of the data packet by summing up all the bits of the packet.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" begin="1s" dur="2s"/>
    <line x1="50" y1="240" x2="50" y2="280" stroke="#3498db" stroke-width="2"/>
    <text x="50" y="260" font-size="18" font-family="Arial, sans-serif" fill="#3498db">The sender sends the Check Sum along with the data packet.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="1.5s" dur="2s"/>
  </section>
  <section data-narration="Example">
    <rect x="50" y="300" width="320" height="50" fill="#f9f9f9"/>
    <text x="50" y="310" font-size="18" font-family="Arial, sans-serif" fill="#3e8e41">Suppose we have a data packet with the following bits: 11010110.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" begin="2s" dur="2s"/>
    <line x1="50" y1="310" x2="50" y2="360" stroke="#3498db" stroke-width="2"/>
    <text x="50" y="330" font-size="18" font-family="Arial, sans-serif" fill="#3498db">The Check Sum of this packet is 6 (1+1+0+1+0+1+1+0).</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,140" begin="2.5s" dur="2s"/>
  </section>
  <section data-narration="Error detection">
    <rect x="50" y="400" width="320" height="50" fill="#f9f9f9"/>
    <text x="50" y="410" font-size="18" font-family="Arial, sans-serif" fill="#3e8e41">If the receiver receives the packet with the following bits: 11010110 (no error) and the Check Sum is 5, then the receiver will detect an error because the calculated Check Sum does not match the received Check Sum.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,160" begin="3s" dur="2s"/>
    <line x1="50" y1="410" x2="50" y2="460" stroke="#3498db" stroke-width="2"/>
  </section>
  <section data-narration="Point to Point Protocol">
    <rect x="50" y="520" width="320" height="50" fill="#f9f9f9"/>
    <text x="50" y="530" font-size="18" font-family="Arial, sans-serif" fill="#3e8e41">Point to Point Protocol (PTP) is a protocol used in a data communication system to detect errors in real-time.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,160" begin="3.5s" dur="2s"/>
  </section>
  <footer>
    <text x="50" y="600" font-size="18" font-family="Arial, sans-serif" fill="#3498db">Check Sum and Point to Point Protocol</text>
  </footer>
</svg>