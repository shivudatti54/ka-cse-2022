<svg width="420" height="400" data-topic-id="121-122" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="fill:rgb(69, 90, 100);overflow:visible;">
  <!--Footer-->
  <defs>
    <style>
      .footer {
        font-size: 12px;
        color: #ccc;
        position: absolute;
        bottom: 10px;
        left: 10px;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="30" fill="#ADD8E6" rx="5"/>
  <g transform="translate(10, 40)">
    <!--Title-->
    <text x="50%" y="50%" font-size="24px" font-family="Arial" font-weight="bold">Error Detection and Correction</text>
  </g>
  <!--Section 1: Error Detection -->
  <g transform="translate(10, 100)">
    <rect x="0" y="0" width="400" height="60" fill="#DCDCDC"/>
    <text x="10" y="10" font-size="18px" font-family="Arial" font-weight="bold">Error Detection</text>
    <g transform="translate(50, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">Error detection is the process of identifying errors that occur during data transmission.</text>
    </g>
    <g transform="translate(150, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">It involves checking the received data against a redundant copy of the original data.</text>
    </g>
  </g>
  <!--Section 2: Types of Errors -->
  <g transform="translate(10, 170)">
    <rect x="0" y="0" width="400" height="60" fill="#DCDCDC"/>
    <text x="10" y="10" font-size="18px" font-family="Arial" font-weight="bold">Types of Errors</text>
    <g transform="translate(50, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">Bit Flip Errors: A single bit is flipped from 0 to 1 or vice versa.</text>
    </g>
    <g transform="translate(150, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">Bit Insertion Errors: One or more bits are inserted into the data stream.</text>
    </g>
    <g transform="translate(250, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">Bit Deletion Errors: One or more bits are deleted from the data stream.</text>
    </g>
    <g transform="translate(350, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">Bit Erasure Errors: One or more bits are completely erased from the data stream.</text>
    </g>
  </g>
  <!--Section 3: Error Correction -->
  <g transform="translate(10, 210)">
    <rect x="0" y="0" width="400" height="60" fill="#DCDCDC"/>
    <text x="10" y="10" font-size="18px" font-family="Arial" font-weight="bold">Error Correction</text>
    <g transform="translate(50, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">Error correction is the process of correcting the errors detected during data transmission.</text>
    </g>
    <g transform="translate(150, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">It involves using error-correcting codes to rebuild the original data from the received data.</text>
    </g>
  </g>
  <!--Section 4: Block Codes -->
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="400" height="60" fill="#DCDCDC"/>
    <text x="10" y="10" font-size="18px" font-family="Arial" font-weight="bold">Block Codes</text>
    <g transform="translate(50, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">Block codes divide the data into fixed-length blocks and add redundancy to each block.</text>
    </g>
    <g transform="translate(150, 50)">
      <animate attributeName="opacity" dur="2000" begin="-0.5s" fill="freeze" from="1" to="0.5"/>
      <rect x="0" y="0" width="100" height="10" fill="#F0E68C"/>
      <text x="10" y="10" font-size="14px" font-family="Arial" font-weight="normal">The redundancy is used to detect and correct errors.</text>
    </g>
  </g>
  <!--Footer-->
  <g transform="translate(10, 300)">
    <rect x="0" y="0" width="400" height="30" fill="#ADD8E6" rx="5"/>
    <g transform="translate(10, 340)">
      <text x="50%" y="50%" font-size="12px" font-family="Arial" font-weight="normal">Developed by [Your Name]</text>
    </g>
  </g>
</svg>