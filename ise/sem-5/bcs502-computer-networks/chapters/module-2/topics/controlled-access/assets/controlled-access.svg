<svg width="420" height="400" data-topic-id="controlled-access" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" text-anchor="middle" fill="#3498db">
    Controlled Access
  </text>
  
  <!-- Section 1: Introduction -->
  <rect x="20" y="60" width="380" height="100" fill="#fff" rx="10" data-narration="Introduction">
    <text x="50%" y="70%" font-size="18" font-family="Arial" text-anchor="middle" fill="#337ab7">
      Introduction
    </text>
  </rect>
  <animateTransform attributeName="transform" type="rotate" from="0 220 60" to="360 220 60" dur="3000" begin="0s" repeatCount="indefinite"/>
  <line x1="220" y1="60" x2="220" y2="120" stroke="#337ab7" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow-end)" marker-start="url(#arrow-start)"/>
  
  <!-- Section 2: Why Controlled Access is Needed -->
  <rect x="20" y="170" width="380" height="100" fill="#fff" rx="10" data-narration="Why Controlled Access is Needed">
    <text x="50%" y="80%" font-size="18" font-family="Arial" text-anchor="middle" fill="#337ab7">
      Why Controlled Access is Needed
    </text>
  </rect>
  <animateTransform attributeName="transform" type="rotate" from="0 220 120" to="360 220 120" dur="3000" begin="0s" repeatCount="indefinite"/>
  <line x1="220" y1="120" x2="220" y2="180" stroke="#337ab7" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow-end)" marker-start="url(#arrow-start)"/>
  
  <!-- Section 3: Types of Controlled Access -->
  <rect x="20" y="280" width="380" height="100" fill="#fff" rx="10" data-narration="Types of Controlled Access">
    <text x="50%" y="90%" font-size="18" font-family="Arial" text-anchor="middle" fill="#337ab7">
      Types of Controlled Access
    </text>
  </rect>
  <animateTransform attributeName="transform" type="rotate" from="0 220 180" to="360 220 180" dur="3000" begin="0s" repeatCount="indefinite"/>
  <line x1="220" y1="180" x2="220" y2="240" stroke="#337ab7" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow-end)" marker-start="url(#arrow-start)"/>
  <rect x="140" y="100" width="140" height="40" fill="#f1c40f" rx="5" data-narration="TDMA">
    <text x="50%" y="110%" font-size="16" font-family="Arial" text-anchor="middle" fill="#f1c40f">
      TDMA
    </text>
  </rect>
  <rect x="140" y="150" width="140" height="40" fill="#f1c40f" rx="5" data-narration="FDMA">
    <text x="50%" y="160%" font-size="16" font-family="Arial" text-anchor="middle" fill="#f1c40f">
      FDMA
    </text>
  </rect>
  <rect x="140" y="200" width="140" height="40" fill="#f1c40f" rx="5" data-narration="CDMA">
    <text x="50%" y="210%" font-size="16" font-family="Arial" text-anchor="middle" fill="#f1c40f">
      CDMA
    </text>
  </rect>
  
  <!-- Section 4: How Controlled Access Works -->
  <rect x="20" y="340" width="380" height="100" fill="#fff" rx="10" data-narration="How Controlled Access Works">
    <text x="50%" y="350%" font-size="18" font-family="Arial" text-anchor="middle" fill="#337ab7">
      How Controlled Access Works
    </text>
  </rect>
  <animateTransform attributeName="transform" type="rotate" from="0 220 300" to="360 220 300" dur="3000" begin="0s" repeatCount="indefinite"/>
  <line x1="220" y1="300" x2="220" y2="360" stroke="#337ab7" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow-end)" marker-start="url(#arrow-start)"/>
  <rect x="140" y="230" width="140" height="40" fill="#f1c40f" rx="5" data-narration="Device Detection">
    <text x="50%" y="240%" font-size="16" font-family="Arial" text-anchor="middle" fill="#f1c40f">
      Device Detection
    </text>
  </rect>
  <rect x="140" y="280" width="140" height="40" fill="#f1c40f" rx="5" data-narration="Channel Allocation">
    <text x="50%" y="290%" font-size="16" font-family="Arial" text-anchor="middle" fill="#f1c40f">
      Channel Allocation
    </text>
  </rect>
  <rect x="140" y="330" width="140" height="40" fill="#f1c40f" rx="5" data-narration="Data Transmission">
    <text x="50%" y="340%" font-size="16" font-family="Arial" text-anchor="middle" fill="#f1c40f">
      Data Transmission
    </text>
  </rect>
  
  <!-- Section 5: Conclusion -->
  <rect x="20" y="380" width="380" height="100" fill="#fff" rx="10" data-narration="Conclusion">
    <text x="50%" y="390%" font-size="18" font-family="Arial" text-anchor="middle" fill="#337ab7">
      Conclusion
    </text>
  </rect>
  <animateTransform attributeName="transform" type="rotate" from="0 220 400" to="360 220 400" dur="3000" begin="0s" repeatCount="indefinite"/>
  <line x1="220" y1="400" x2="220" y2="460" stroke="#337ab7" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow-end)" marker-start="url(#arrow-start)"/>
  
  <!-- Footer -->
  <text x="50%" y="410%" font-size="16" font-family="Arial" text-anchor="middle" fill="#337ab7">
    Learn more about Controlled Access
  </text>
  
  <!-- Arrow markers -->
  <symbol id="arrow-start" viewBox="0 0 10 10">
    <line x1="0" y1="0" x2="5" y2="5" stroke="#337ab7" stroke-width="2"/>
    <line x1="5" y1="0" x2="0" y2="5" stroke="#337ab7" stroke-width="2"/>
  </symbol>
  <symbol id="arrow-end" viewBox="0 0 10 10">
    <line x1="0" y1="0" x2="5" y2="5" stroke="#337ab7" stroke-width="2"/>
    <line x1="5" y1="0" x2="0" y2="5" stroke="#337ab7" stroke-width="2"/>
  </symbol>
</svg>