<svg width="420" height="400" data-topic-id="data-link-layer-error-detection-and-correction"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400"
     style="background-image: linear-gradient(to bottom, #7a8dbf, #5c73b4); background-size: 100% 100%;">

  <!-- Title -->
  <text x="10" y="20" font-size="24" text-anchor="left" fill="#3498db">Data Link Layer Error Detection and Correction</text>

  <!-- Background Gradient -->
  <rect x="0" y="0" width="420" height="400" fill="#7a8dbf" rx="10" />
  <rect x="0" y="0" width="420" height="400" fill="#5c73b4" opacity="0.5" rx="10" />

  <!-- Section 1: Introduction -->
  <rect x="10" y="50" width="400" height="80" fill="#fff" rx="10" />
  <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0" fill="freeze" />
  <text x="15" y="60" font-size="18" text-anchor="left" fill="#3498db" data-narration="The Data Link Layer is responsible for framing, error detection, and error correction.">
    <tspan x="15" y="60">Error Detection</tspan>
    <tspan x="15" y="80" font-size="14">Error Detection is the process of identifying errors that may have occurred during data transmission.</tspan>
  </text>

  <!-- Section 2: Block Coding -->
  <rect x="10" y="150" width="400" height="80" fill="#fff" rx="10" />
  <animate attributeName="opacity" begin="2s" dur="2s" from="1" to="0" fill="freeze" />
  <text x="15" y="160" font-size="18" text-anchor="left" fill="#3498db" data-narration="Block coding is a technique used to detect errors in data transmission. It works by dividing the data into blocks, encoding each block with error-checking information, and transmitting the encoded blocks.">
    <tspan x="15" y="160">Block Size</tspan>
    <tspan x="15" y="180" font-size="14">Parity Bit: A single bit added to a block of data to detect errors.</tspan>
  </text>

  <!-- Section 3: Cyclic Codes -->
  <rect x="10" y="250" width="400" height="80" fill="#fff" rx="10" />
  <animate attributeName="opacity" begin="4s" dur="2s" from="1" to="0" fill="freeze" />
  <text x="15" y="260" font-size="18" text-anchor="left" fill="#3498db" data-narration="Cyclic codes are a type of block code that is used to detect and correct errors in data transmission. They work by adding error-checking information to each block of data.">
    <tspan x="15" y="260">Cyclic Code</tspan>
    <tspan x="15" y="280" font-size="14">Generator Polynomial: A polynomial used to generate the cyclic code.</tspan>
  </text>

  <!-- Section 4: Error Detection -->
  <rect x="10" y="350" width="400" height="80" fill="#fff" rx="10" />
  <animate attributeName="opacity" begin="6s" dur="2s" from="1" to="0" fill="freeze" />
  <text x="15" y="360" font-size="18" text-anchor="left" fill="#3498db" data-narration="Error detection is the process of identifying errors that may have occurred during data transmission. It can be done using Parity Check or Cyclic Redundancy Check (CRC).">
    <tspan x="15" y="360">Parity Check</tspan>
    <tspan x="15" y="380" font-size="14">Cyclic Redundancy Check (CRC)</tspan>
  </text>

  <!-- Section 5: Error Correction -->
  <rect x="10" y="450" width="400" height="80" fill="#fff" rx="10" />
  <animate attributeName="opacity" begin="8s" dur="2s" from="1" to="0" fill="freeze" />
  <text x="15" y="460" font-size="18" text-anchor="left" fill="#3498db" data-narration="Error correction is the process of correcting errors that have been detected. It can be done using Single-Error Correction (SEC) or other error correction techniques.">
    <tspan x="15" y="460">Single-Error Correction (SEC)</tspan>
    <tspan x="15" y="480" font-size="14">Other error correction techniques</tspan>
  </text>

  <!-- Footer -->
  <text x="10" y="470" font-size="18" text-anchor="left" fill="#3498db">Data Link Layer Error Detection and Correction</text>

  <!-- Arrow markers for connections -->
  <path d="M 20 200 L 400 200" stroke="#3498db" stroke-width="2" fill="none" />
  <path d="M 20 250 L 400 250" stroke="#3498db" stroke-width="2" fill="none" />
  <path d="M 20 300 L 400 300" stroke="#3498db" stroke-width="2" fill="none" />
  <path d="M 20 350 L 400 350" stroke="#3498db" stroke-width="2" fill="none" />
  <path d="M 20 400 L 400 400" stroke="#3498db" stroke-width="2" fill="none" />

</svg>