<svg width="420" height="400" data-topic-id="transport-layer-23">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="50%" stop-color="#33CC66" stop-opacity="1" />
      <stop offset="100%" stop-color="#00CC66" stop-opacity="1" />
    </linearGradient>
  </defs>
  <style>
    .section {
      background: url(#gradient) no-repeat;
      background-size: 100% 100%;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
  </style>
  <title>Transport Layer (23.1-23.2)</title>
  <rect x="10" y="10" width="400" height="60" fill="#F0F0F0" rx="10" />
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#333333">Transport Layer (23.1-23.2)</text>
  <rect x="10" y="70" width="400" height="330" fill="#FFFFFF" rx="10" />
  <g id="section-1">
    <rect x="10" y="80" width="350" height="150" fill="#FFFFFF" rx="10" />
    <text x="20" y="100" font-size="18" font-family="Arial" fill="#666666" data-narration="The Transport Layer is the fourth layer of the OSI model and is responsible for ensuring reliable data transfer between devices over the network." />
    <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g id="section-2">
    <rect x="10" y="250" width="350" height="150" fill="#FFFFFF" rx="10" />
    <text x="20" y="270" font-size="18" font-family="Arial" fill="#666666" data-narration="The Transport Layer is a logical layer that provides a connection-oriented or connectionless service between devices, ensuring that data is delivered in the correct order and that errors are detected and corrected." />
    <animate transform="translateX(0) rotate(0)" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  <g id="section-3">
    <rect x="10" y="420" width="350" height="150" fill="#FFFFFF" rx="10" />
    <text x="20" y="440" font-size="18" font-family="Arial" fill="#666666" data-narration="TCP is a connection-oriented protocol that provides reliable data transfer between devices. It ensures that data is delivered in the correct order and that errors are detected and corrected." />
    <animate transform="translateX(0) rotate(0)" begin="4s" dur="2s" repeatCount="indefinite" />
  </g>
  <g id="section-4">
    <rect x="10" y="190" width="350" height="150" fill="#FFFFFF" rx="10" />
    <text x="20" y="210" font-size="18" font-family="Arial" fill="#666666" data-narration="UDP is a connectionless protocol that provides best-effort delivery of data between devices. It does not guarantee delivery of data, but it provides fast transmission of data." />
    <animate transform="translateX(0) rotate(0)" begin="6s" dur="2s" repeatCount="indefinite" />
  </g>
  <g id="section-5">
    <rect x="10" y="280" width="350" height="150" fill="#FFFFFF" rx="10" />
    <text x="20" y="300" font-size="18" font-family="Arial" fill="#666666" data-narration="TCP establishes a connection between devices before data transfer begins. It breaks data into small segments and assigns sequence numbers to each segment." />
    <animate transform="translateX(0) rotate(0)" begin="8s" dur="2s" repeatCount="indefinite" />
  </g>
  <g id="section-6">
    <rect x="10" y="370" width="350" height="150" fill="#FFFFFF" rx="10" />
    <text x="20" y="390" font-size="18" font-family="Arial" fill="#666666" data-narration="UDP does not establish a connection before data transfer begins. It sends data without any guarantees of delivery or order." />
    <animate transform="translateX(0) rotate(0)" begin="10s" dur="2s" repeatCount="indefinite" />
  </g>
  <rect x="10" y="400" width="400" height="20" fill="#F0F0F0" rx="10" />
  <text x="20" y="420" font-size="18" font-family="Arial" fill="#333333">Transport Layer (23.1-23.2)</text>
</svg>