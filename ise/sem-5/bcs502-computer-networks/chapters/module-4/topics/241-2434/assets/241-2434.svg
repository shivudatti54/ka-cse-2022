<svg
  width="420"
  height="400"
  viewBox="0 0 420 400"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="background-image: linear-gradient(to bottom, #80BFFF 0%, #C4B2FF 100%);">
  <title>Transport Layer: 241 2434</title>
  <metadata>
    <meta name="data-topic-id" content="24.1-24.3.4"/>
  </metadata>
  <style>
    text {
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .section {
      margin-bottom: 20px;
    }
    .label {
      font-weight: bold;
    }
  </style>

  <!-- Introduction to Transport Layer -->
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="150" style="fill: #F0F0F0;"/>
    <text x="10" y="20" text-anchor="start" font-size="18px">Introduction to Transport Layer</text>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 200 50"
      to="360 200 50"
      dur="10s"
      repeatCount="indefinite"/>
  </g>

  <!-- Definition and Functions -->
  <g transform="translate(10, 170)">
    <rect x="0" y="0" width="400" height="150" style="fill: #F0F0F0;"/>
    <section class="section" data-narration="The Transport Layer is responsible for providing reliable data transfer between devices on a network.">
      <div class="label">Definition</div>
      <text x="10" y="20" text-anchor="start" font-size="14px">The Transport Layer is responsible for providing reliable data transfer between devices on a network.</text>
      <text x="10" y="40" text-anchor="start" font-size="14px">Functions:</text>
      <text x="10" y="60" text-anchor="start" font-size="14px">Provide reliable data transfer between devices</text>
      <text x="10" y="80" text-anchor="start" font-size="14px">Ensure data is delivered in the correct order</text>
      <text x="10" y="100" text-anchor="start" font-size="14px">Detect and correct errors</text>
      <text x="10" y="120" text-anchor="start" font-size="14px">Provide flow control to prevent network congestion</text>
      <text x="10" y="140" text-anchor="start" font-size="14px">Provide error-free delivery of data</text>
    </section>
  </g>

  <!-- Connection-Oriented vs Connectionless -->
  <g transform="translate(10, 320)">
    <rect x="0" y="0" width="400" height="150" style="fill: #F0F0F0;"/>
    <section class="section" data-narration="Connection-Oriented vs Connectionless Protocols">
      <div class="label">Connection-Oriented Protocols</div>
      <text x="10" y="20" text-anchor="start" font-size="14px">Establishes a connection before data transfer</text>
      <text x="10" y="40" text-anchor="start" font-size="14px">Ensures reliable data transfer</text>
      <text x="10" y="60" text-anchor="start" font-size="14px">Provides flow control and error correction</text>
      <text x="10" y="80" text-anchor="start" font-size="14px">Examples: TCP, SAP</text>
    </section>
    <section class="section" data-narration="Connectionless Protocols">
      <div class="label">Connectionless Protocols</div>
      <text x="10" y="20" text-anchor="start" font-size="14px">Does not establish a connection before data transfer</text>
      <text x="10" y="40" text-anchor="start" font-size="14px">Does not ensure reliable data transfer</text>
      <text x="10" y="60" text-anchor="start" font-size="14px">Provides best-effort delivery of data</text>
      <text x="10" y="80" text-anchor="start" font-size="14px">Examples: UDP, DCCP</text>
    </section>
  </g>

  <!-- TCP and UDP -->
  <g transform="translate(10, 480)">
    <rect x="0" y="0" width="400" height="150" style="fill: #F0F0F0;"/>
    <section class="section" data-narration="TCP and UDP">
      <div class="label">TCP (Transmission Control Protocol)</div>
      <text x="10" y="20" text-anchor="start" font-size="14px">Establishes a connection before data transfer</text>
      <text x="10" y="40" text-anchor="start" font-size="14px">Ensures reliable data transfer</text>
      <text x="10" y="60" text-anchor="start" font-size="14px">Provides flow control and error correction</text>
      <text x="10" y="80" text-anchor="start" font-size="14px">Example: File transfer over the internet</text>
    </section>
    <section class="section" data-narration="UDP (User Datagram Protocol)">
      <div class="label">UDP (User Datagram Protocol)</div>
      <text x="10" y="20" text-anchor="start" font-size="14px">Does not establish a connection before data transfer</text>
      <text x="10" y="40" text-anchor="start" font-size="14px">Does not ensure reliable data transfer</text>
      <text x="10" y="60" text-anchor="start" font-size="14px">Provides best-effort delivery of data</text>
      <text x="10" y="80" text-anchor="start" font-size="14px">Example: Online gaming</text>
    </section>
  </g>

  <!-- Footer -->
  <g transform="translate(10, 540)">
    <rect x="0" y="0" width="400" height="50" style="fill: #F0F0F0;"/>
    <text x="10" y="20" text-anchor="start" font-size="14px">Transport Layer: 241 2434</text>
  </g>
</svg>