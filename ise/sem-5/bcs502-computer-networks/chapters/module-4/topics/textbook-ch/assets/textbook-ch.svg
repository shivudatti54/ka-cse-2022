<svg width="420" height="400" data-topic-id="textbook-ch" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink" style="background: #66CCCC;">

    <!-- Section 1: Overview of Transport Layer -->
    <section data-narration="Overview of Transport Layer">
        <rect x="20" y="20" width="380" height="100" style="fill: #ADD8E6;"/>
        <text x="20" y="60" style="font-size: 24px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 30 60)">Transport Layer</text>
        <line x1="20" y1="120" x2="400" y2="120" style="stroke: #2E4053; stroke-width: 2; stroke-linecap: round;" />
        <animateTransform attributeName="transform" type="rotate" from="0 30 60" to="360 30 60" dur="10s" begin="0s" />
    </section>

    <!-- Section 2: Functions of Transport Layer -->
    <section data-narration="Functions of Transport Layer">
        <rect x="20" y="160" width="380" height="100" style="fill: #C9E4CA;"/>
        <text x="20" y="200" style="font-size: 24px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 30 220)">Ensures reliable data transfer between devices</text>
        <line x1="20" y1="260" x2="400" y2="260" style="stroke: #2E4053; stroke-width: 2; stroke-linecap: round;" />
        <animateTransform attributeName="transform" type="rotate" from="0 30 260" to="360 30 260" dur="10s" begin="0s" />
        <line x1="20" y1="300" x2="400" y2="300" style="stroke: #2E4053; stroke-width: 2; stroke-linecap: round;" />
        <animateTransform attributeName="transform" type="rotate" from="0 30 300" to="360 30 300" dur="10s" begin="10s" />
    </section>

    <!-- Section 3: Transport-Layer Protocols -->
    <section data-narration="Transport-Layer Protocols">
        <rect x="20" y="320" width="380" height="100" style="fill: #FFC107;"/>
        <text x="20" y="360" style="font-size: 24px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 30 360)">TCP (Transmission Control Protocol)</text>
        <line x1="20" y1="400" x2="400" y2="400" style="stroke: #2E4053; stroke-width: 2; stroke-linecap: round;" />
        <animateTransform attributeName="transform" type="rotate" from="0 30 400" to="360 30 400" dur="10s" begin="20s" />
        <rect x="20" y="120" width="60" height="20" style="fill: #2196F3;"/>
        <text x="20" y="140" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 25 140)">Establishs connection</text>
        <line x1="80" y1="120" x2="80" y2="200" style="stroke: #2E4053; stroke-width: 2; stroke-linecap: round;" />
        <animateTransform attributeName="transform" type="rotate" from="0 80 120" to="360 80 120" dur="10s" begin="20s" />
        <rect x="20" y="300" width="60" height="20" style="fill: #2196F3;"/>
        <text x="20" y="320" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 25 320)">Provides error detection and correction</text>
    </section>

    <!-- Section 4: TCP Functions -->
    <section data-narration="TCP Functions">
        <rect x="20" y="200" width="380" height="100" style="fill: #ADD8E6;"/>
        <text x="20" y="240" style="font-size: 24px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 30 240)">Establishes connection</text>
        <line x1="20" y1="280" x2="400" y2="280" style="stroke: #2E4053; stroke-width: 2; stroke-linecap: round;" />
        <animateTransform attributeName="transform" type="rotate" from="0 30 280" to="360 30 280" dur="10s" begin="30s" />
        <rect x="20" y="300" width="60" height="20" style="fill: #2196F3;"/>
        <text x="20" y="320" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 25 320)">Provides error detection and correction</text>
        <rect x="20" y="340" width="60" height="20" style="fill: #2196F3;"/>
        <text x="20" y="360" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 25 360)">Provides flow control</text>
    </section>

    <!-- Section 5: UDP Functions -->
    <section data-narration="UDP Functions">
        <rect x="20" y="200" width="380" height="100" style="fill: #C9E4CA;"/>
        <text x="20" y="240" style="font-size: 24px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 30 240)">Does not establish connection</text>
        <line x1="20" y1="280" x2="400" y2="280" style="stroke: #2E4053; stroke-width: 2; stroke-linecap: round;" />
        <animateTransform attributeName="transform" type="rotate" from="0 30 280" to="360 30 280" dur="10s" begin="40s" />
        <rect x="20" y="300" width="60" height="20" style="fill: #2196F3;"/>
        <text x="20" y="320" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 25 320)">Does not provide error detection and correction</text>
        <rect x="20" y="340" width="60" height="20" style="fill: #2196F3;"/>
        <text x="20" y="360" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 25 360)">Does not provide flow control</text>
    </section>

    <!-- Footer -->
    <g>
        <rect x="20" y="380" width="380" height="20" style="fill: #66CCCC;"/>
        <text x="20" y="400" style="font-size: 18px; font-family: Arial, sans-serif; color: #2E4053;" transform="rotate(-45 30 400)">Textbook Ch</text>
    </g>
</svg>