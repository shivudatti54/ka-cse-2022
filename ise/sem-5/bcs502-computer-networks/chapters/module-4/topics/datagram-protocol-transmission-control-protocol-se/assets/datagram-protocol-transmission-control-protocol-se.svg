<svg width="420" height="400" data-topic-id="Datagram-Protocol-Transmission-Control-Protocol-Se">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1" />
      <stop offset="100%" stop-color="#99CCFF" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <text x="10" y="20" fill="#2F4F7F" font-size="24" text-anchor="start">
    Datagram Protocol and Transmission Control Protocol (TCP)
  </text>

  <!-- Section 1: Datagram Protocol (DP) -->
  <section x="10" y="50" width="400" height="100" data-narration="Datagram Protocol (DP) is a connectionless protocol, meaning it does not establish a dedicated connection between the sender and receiver before data transmission.">
    <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="15" y="30" fill="#2F4F7F" font-size="18">Connectionless</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="0s" />
  </section>

  <!-- Section 2: Services Provided by DP -->
  <section x="10" y="160" width="400" height="100" data-narration="DP provides best-effort delivery, no error detection, and no guarantee of packet delivery.">
    <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="15" y="30" fill="#2F4F7F" font-size="18">Best-effort delivery</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="0.5s" />
  </section>

  <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
  <text x="15" y="30" fill="#2F4F7F" font-size="18">No error detection</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="1s" />

  <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
  <text x="15" y="30" fill="#2F4F7F" font-size="18">No guarantee of packet delivery</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="1.5s" />

  <!-- Section 3: Transmission Control Protocol (TCP) -->
  <section x="10" y="280" width="400" height="100" data-narration="TCP is a connection-oriented protocol, ensuring reliable data transfer, including guaranteed delivery, error detection, and correction.">
    <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="15" y="30" fill="#2F4F7F" font-size="18">Connection-oriented</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="2.5s" />
  </section>

  <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
  <text x="15" y="30" fill="#2F4F7F" font-size="18">Guaranteed delivery</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="3s" />

  <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
  <text x="15" y="30" fill="#2F4F7F" font-size="18">Error detection and correction</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="3.5s" />

  <!-- Section 4: Segmentation -->
  <section x="10" y="330" width="400" height="100" data-narration="TCP uses segmentation to divide data into smaller units, improving data transmission efficiency and reliability.">
    <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="15" y="30" fill="#2F4F7F" font-size="18">Segmentation</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="4s" />
  </section>

  <!-- Section 5: Segmentation in DP -->
  <section x="10" y="370" width="400" height="100" data-narration="DP uses single-segment packets, with no segmentation. This approach provides best-effort delivery, but lacks reliability.">
    <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="15" y="30" fill="#2F4F7F" font-size="18">Single-segment packets</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="4.5s" />
  </section>

  <!-- Section 6: Segmentation in TCP -->
  <section x="10" y="410" width="400" height="100" data-narration="TCP uses segment-based segmentation, dividing data into smaller units for efficient transmission and reliable delivery.">
    <rect x="10" y="10" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="15" y="30" fill="#2F4F7F" font-size="18">Segment-based segmentation</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="2s" begin="5s" />

  <!-- Footer at bottom -->
  <text x="10" y="380" fill="#2F4F7F" font-size="18" text-anchor="start">
    Datagram Protocol and Transmission Control Protocol (TCP)
  </text>
</svg>