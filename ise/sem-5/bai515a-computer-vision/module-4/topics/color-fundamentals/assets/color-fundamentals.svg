<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#ab47bc"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <text x="400" y="30" font-size="22" font-weight="bold" fill="#1565c0" text-anchor="middle">Color Fundamentals in Image Processing</text>
  
  <g id="step1" class="step" data-narration="Color is light physics: objects absorb some wavelengths and reflect others. The reflected wavelengths determine the color we perceive, combining physical light properties with human visual perception.">
    <rect x="50" y="55" width="160" height="45" fill="url(#gradBlue)" rx="8"/>
    <text x="130" y="85" font-size="13" fill="white" text-anchor="middle">Physics of Color</text>
    <path d="M220 77 L290 77" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="300" y="55" width="180" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="390" y="85" font-size="12" fill="#e65100" text-anchor="middle">Light → Object → Reflected Wavelengths</text>
  </g>
  
  <g id="step2" class="step" data-narration="The human visible spectrum spans 400nm to 700nm. Violet at 400nm through blue, green, yellow, orange, to red at 700nm. Each wavelength produces a distinct color sensation in our eyes.">
    <rect x="50" y="115" width="700" height="40" fill="url(#gradGreen)" rx="6"/>
    <text x="400" y="140" font-size="13" fill="white" text-anchor="middle">Visible Spectrum: 400nm (Violet) → 700nm (Red)</text>
    <rect x="60" y="165" width="100" height="18" fill="#8b5cf6" rx="3"/>
    <text x="110" y="178" font-size="10" fill="white" text-anchor="middle">Violet 400-450</text>
    <rect x="170" y="165" width="100" height="18" fill="#1976d2" rx="3"/>
    <text x="220" y="178" font-size="10" fill="white" text-anchor="middle">Blue 450-490</text>
    <rect x="280" y="165" width="100" height="18" fill="#388e3c" rx="3"/>
    <text x="330" y="178" font-size="10" fill="white" text-anchor="middle">Green 490-550</text>
    <rect x="390" y="165" width="100" height="18" fill="#fbc02d" rx="3"/>
    <text x="440" y="178" font-size="10" fill="#333" text-anchor="middle">Yellow 550-580</text>
    <rect x="500" y="165" width="100" height="18" fill="#ff9800" rx="3"/>
    <text x="550" y="178" font-size="10" fill="white" text-anchor="middle">Orange 580-600</text>
    <rect x="610" y="165" width="100" height="18" fill="#f44336" rx="3"/>
    <text x="660" y="178" font-size="10" fill="white" text-anchor="middle">Red 600-700</text>
  </g>
  
  <g id="step3" class="step" data-narration="Human color vision relies on three cone cell types in the retina: S-cones detect blue (short wavelengths), M-cones detect green (medium), and L-cones detect red (long wavelengths).">
    <rect x="50" y="200" width="220" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="160" y="223" font-size="11" fill="#1565c0" text-anchor="middle">S-Cones: Blue (Short λ)</text>
    <rect x="290" y="200" width="220" height="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="400" y="223" font-size="11" fill="#2e7d32" text-anchor="middle">M-Cones: Green (Medium λ)</text>
    <rect x="530" y="200" width="220" height="35" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="6"/>
    <text x="640" y="223" font-size="11" fill="#c62828" text-anchor="middle">L-Cones: Red (Long λ)</text>
    <text x="400" y="250" font-size="11" fill="#666" text-anchor="middle">Trichromatic Theory: Three cone types enable color perception</text>
  </g>
  
  <g id="step4" class="step" data-narration="Three major color models serve different purposes: RGB (additive, for displays), CMY (subtractive, for printing), and HSI (separates hue, saturation, intensity for intuitive processing).">
    <rect x="50" y="265" width="230" height="55" fill="#f44336" rx="6"/>
    <text x="165" y="285" font-size="12" fill="white" text-anchor="middle" font-weight="bold">RGB Model</text>
    <text x="165" y="302" font-size="10" fill="white" text-anchor="middle">Additive (Light)</text>
    <text x="165" y="314" font-size="9" fill="white" text-anchor="middle">R,G,B: 0-255</text>
    
    <rect x="285" y="265" width="230" height="55" fill="#2196f3" rx="6"/>
    <text x="400" y="285" font-size="12" fill="white" text-anchor="middle" font-weight="bold">CMY Model</text>
    <text x="400" y="302" font-size="10" fill="white" text-anchor="middle">Subtractive (Pigment)</text>
    <text x="400" y="314" font-size="9" fill="white" text-anchor="middle">C=1-R, M=1-G, Y=1-B</text>
    
    <rect x="520" y="265" width="230" height="55" fill="#9c27b0" rx="6"/>
    <text x="635" y="285" font-size="12" fill="white" text-anchor="middle" font-weight="bold">HSI Model</text>
    <text x="635" y="302" font-size="10" fill="white" text-anchor="middle">Hue, Saturation, Intensity</text>
    <text x="635" y="314" font-size="9" fill="white" text-anchor="middle">Aligns with human perception</text>
  </g>
  
  <g id="step5" class="step" data-narration="Colors have three characteristics: Brightness is perceived light intensity (achromatic), Hue distinguishes color families like red from green, and Saturation measures color purity from vivid to washed out.">
    <rect x="50" y="335" width="140" height="45" fill="url(#gradBlue)" rx="6"/>
    <text x="120" y="355" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Brightness</text>
    <text x="120" y="370" font-size="9" fill="white" text-anchor="middle">Light intensity</text>
    
    <rect x="200" y="335" width="140" height="45" fill="#ff9800" rx="6"/>
    <text x="270" y="355" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Hue</text>
    <text x="270" y="370" font-size="9" fill="white" text-anchor="middle">Color family</text>
    
    <rect x="350" y="335" width="140" height="45" fill="#388e3c" rx="6"/>
    <text x="420" y="355" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Saturation</text>
    <text x="420" y="370" font-size="9" fill="white" text-anchor="middle">Color purity</text>
    
    <rect x="500" y="335" width="250" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="6"/>
    <text x="625" y="352" font-size="10" fill="#e65100" text-anchor="middle">Fully Saturated + White</text>
    <text x="625" y="367" font-size="9" fill="#e65100" text-anchor="middle">→ Pastel Colors → Near White</text>
  </g>
  
  <g id="step6" class="step" data-narration="A color gamut is the complete range of colors a device can represent. Different devices have different gamuts, which is why colors appear differently across monitors and printers.">
    <rect x="50" y="395" width="320" height="50" fill="url(#gradPurple)" rx="6"/>
    <text x="210" y="415" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Color Gamut</text>
    <text x="210" y="430" font-size="10" fill="white" text-anchor="middle">Subset of colors representable by a device</text>
    
    <rect x="380" y="395" width="370" height="50" fill="#eceff1" stroke="#78909c" stroke-width="2" rx="6"/>
    <text x="565" y="412" font-size="11" fill="#37474f" text-anchor="middle">Color Depth (Bits per Pixel)</text>
    <rect x="395" y="420" width="60" height="18" fill="#1976d2" rx="3"/>
    <text x="425" y="433" font-size="9" fill="white" text-anchor="middle">8-bit: 256</text>
    <rect x="465" y="420" width="70" height="18" fill="#388e3c" rx="3"/>
    <text x="500" y="433" font-size="9" fill="white" text-anchor="middle">24-bit: 16.7M</text>
    <rect x="545" y="420" width="80" height="18" fill="#7b1fa2" rx="3"/>
    <text x="585" y="433" font-size="9" fill="white" text-anchor="middle">32-bit: +Alpha</text>
    <rect x="635" y="420" width="100" height="18" fill="#f57c00" rx="3"/>
    <text x="685" y="433" font-size="9" fill="white" text-anchor="middle">True Color</text>
  </g>
  
  <g id="step7" class="step" data-narration="Color fundamentals enable key computer vision tasks: object recognition using color features, image segmentation by color similarity, skin color-based face detection, and content-based image retrieval.">
    <rect x="50" y="460" width="700" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="400" y="478" font-size="12" fill="#1565c0" text-anchor="middle" font-weight="bold">Applications in Computer Vision</text>
    
    <rect x="60" y="510" width="130" height="35" fill="#ffebee" stroke="#ef5350" rx="5"/>
    <text x="125" y="530" font-size="10" fill="#c62828" text-anchor="middle">Object Recognition</text>
    
    <rect x="200" y="510" width="130" height="35" fill="#e8f5e9" stroke="#66bb6a" rx="5"/>
    <text x="265" y="530" font-size="10" fill="#2e7d32" text-anchor="middle">Image Segmentation</text>
    
    <rect x="340" y="510" width="130" height="35" fill="#fff3e0" stroke="#ffa726" rx="5"/>
    <text x="405" y="530" font-size="10" fill="#e65100" text-anchor="middle">Face Detection</text>
    
    <rect x="480" y="510" width="130" height="35" fill="#f3e5f5" stroke="#ab47bc" rx="5"/>
    <text x="545" y="530" font-size="10" fill="#6a1b9a" text-anchor="middle">Object Tracking</text>
    
    <rect x="620" y="510" width="130" height="35" fill="#e0f7fa" stroke="#26c6da" rx="5"/>
    <text x="685" y="530" font-size="10" fill="#006064" text-anchor="middle">Image Retrieval</text>
  </g>
  
  <g id="step8" class="step" data-narration="For exam success, remember RGB is additive for displays, CMY is subtractive for printing, HSI separates intensity from color making it superior for computer vision tasks.">
    <rect x="50" y="560" width="700" height="30" fill="#263238" rx="4"/>
    <text x="400" y="580" font-size="11" fill="#cfd8dc" text-anchor="middle">Key Takeaway: RGB (display) • CMY (print) • HSI (computer vision) • HSI conversion formulas are frequently tested</text>
  </g>
</svg>