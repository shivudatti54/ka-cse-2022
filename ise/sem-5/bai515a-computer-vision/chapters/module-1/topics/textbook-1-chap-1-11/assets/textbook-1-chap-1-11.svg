<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="textbook-1-chap-1-11" viewBox="0 0 420 400">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title Section -->
  <g transform="translate(20, 20)">
    <text x="0" y="15" font-size="24" font-family="Arial, sans-serif" fill="#3498DB">Introduction to Computer Vision</text>
  </g>
  
  <!-- Section 1: What is Computer Vision -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="What is Computer Vision?">What is Computer Vision?</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: Brief History of Computer Vision -->
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Brief History of Computer Vision">Brief History of Computer Vision</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Applications of Computer Vision -->
  <g transform="translate(20, 380)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Applications of Computer Vision">Applications of Computer Vision</text>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Image Formation -->
  <g transform="translate(20, 140)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Image Formation">Image Formation</text>
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 5: Photometric Image -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Photometric Image">Photometric Image</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 6: Image Representation -->
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Image Representation">Image Representation</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(20, 340)">
    <text x="10" y="350" font-size="18" font-family="Arial, sans-serif" fill="#333">Copyright 2023</text>
  </g>
</svg>