<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="the-digital-camera">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title with underline (begin=0.3s) -->
  <g opacity="0" data-narration="The Digital Camera: core imaging device in computer vision systems">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#3949AB">The Digital Camera</text>
    <line x1="115" y1="33" x2="305" y2="33" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#455A64">Image Acquisition Pipeline in Computer Vision</text>
  </g>

  <!-- G2: Camera components pipeline (begin=1.5s) -->
  <g opacity="0" data-narration="Light passes through the lens system to the sensor (CCD or CMOS), then to the ADC, image processor, and finally storage">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="14" y="66" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Camera Pipeline</text>

    <!-- Lens System -->
    <rect x="10" y="72" width="62" height="32" rx="5" fill="#3949AB" opacity="0.9"/>
    <text x="41" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">Lens</text>
    <text x="41" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E8EAF6">System</text>

    <!-- Arrow 1 -->
    <line x1="74" y1="88" x2="88" y2="88" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Sensor -->
    <rect x="90" y="72" width="62" height="32" rx="5" fill="#00695C" opacity="0.9"/>
    <text x="121" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">Sensor</text>
    <text x="121" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E8F5E9">CCD/CMOS</text>

    <!-- Arrow 2 -->
    <line x1="154" y1="88" x2="168" y2="88" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- ADC -->
    <rect x="170" y="72" width="52" height="32" rx="5" fill="#E65100" opacity="0.9"/>
    <text x="196" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">ADC</text>
    <text x="196" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFF3E0">Converter</text>

    <!-- Arrow 3 -->
    <line x1="224" y1="88" x2="238" y2="88" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Image Processor -->
    <rect x="240" y="72" width="72" height="32" rx="5" fill="#C62828" opacity="0.9"/>
    <text x="276" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">Image</text>
    <text x="276" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFEBEE">Processor</text>

    <!-- Arrow 4 -->
    <line x1="314" y1="88" x2="328" y2="88" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Storage -->
    <rect x="330" y="72" width="78" height="32" rx="5" fill="#3949AB" opacity="0.9"/>
    <text x="369" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff" font-weight="bold">Storage</text>
    <text x="369" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E8EAF6">JPEG/RAW</text>
  </g>

  <!-- G3: Image sensor - Bayer pattern (begin=3.0s) -->
  <g opacity="0" data-narration="The image sensor uses a Bayer pattern color filter array with RGGB arrangement. Each photosite converts incoming photons to electrical charge proportional to light intensity">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <text x="14" y="126" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#00695C">Image Sensor: Bayer Pattern (RGGB)</text>

    <!-- Bayer pattern grid 4x4 -->
    <!-- Row 1: R G R G -->
    <rect x="14" y="133" width="22" height="22" fill="#E53935" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="25" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">R</text>
    <rect x="36" y="133" width="22" height="22" fill="#43A047" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="47" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">G</text>
    <rect x="58" y="133" width="22" height="22" fill="#E53935" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="69" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">R</text>
    <rect x="80" y="133" width="22" height="22" fill="#43A047" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="91" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">G</text>

    <!-- Row 2: G B G B -->
    <rect x="14" y="155" width="22" height="22" fill="#43A047" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="25" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">G</text>
    <rect x="36" y="155" width="22" height="22" fill="#1E88E5" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="47" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">B</text>
    <rect x="58" y="155" width="22" height="22" fill="#43A047" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="69" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">G</text>
    <rect x="80" y="155" width="22" height="22" fill="#1E88E5" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="91" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">B</text>

    <!-- Row 3: R G R G -->
    <rect x="14" y="177" width="22" height="22" fill="#E53935" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="25" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">R</text>
    <rect x="36" y="177" width="22" height="22" fill="#43A047" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="47" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">G</text>
    <rect x="58" y="177" width="22" height="22" fill="#E53935" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="69" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">R</text>
    <rect x="80" y="177" width="22" height="22" fill="#43A047" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="91" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">G</text>

    <!-- Row 4: G B G B -->
    <rect x="14" y="199" width="22" height="22" fill="#43A047" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="25" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">G</text>
    <rect x="36" y="199" width="22" height="22" fill="#1E88E5" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="47" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">B</text>
    <rect x="58" y="199" width="22" height="22" fill="#43A047" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="69" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">G</text>
    <rect x="80" y="199" width="22" height="22" fill="#1E88E5" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="91" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">B</text>

    <!-- Photosite diagram -->
    <text x="130" y="142" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00695C">Photosite (Single Pixel)</text>

    <!-- Photosite box -->
    <rect x="130" y="148" width="90" height="70" rx="4" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5"/>

    <!-- Light rays coming in -->
    <line x1="155" y1="133" x2="155" y2="148" stroke="#FDD835" stroke-width="1.5"/>
    <line x1="175" y1="130" x2="175" y2="148" stroke="#FDD835" stroke-width="1.5"/>
    <line x1="195" y1="133" x2="195" y2="148" stroke="#FDD835" stroke-width="1.5"/>
    <text x="175" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E65100">Photons (hv)</text>

    <!-- Microlens -->
    <ellipse cx="175" cy="156" rx="35" ry="5" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.8"/>
    <text x="175" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#01579B">Microlens</text>

    <!-- Color filter -->
    <rect x="140" y="165" width="70" height="10" fill="#43A047" opacity="0.5" rx="2"/>
    <text x="175" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#1B5E20">Color Filter</text>

    <!-- Photodiode -->
    <rect x="140" y="180" width="70" height="20" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="2"/>
    <text x="175" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#0D47A1">Photodiode</text>

    <!-- Charge output -->
    <text x="175" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#00695C">Light to Charge (e-)</text>

    <!-- CFA annotation -->
    <text x="14" y="234" font-family="Arial, sans-serif" font-size="7" fill="#455A64">50% Green, 25% Red, 25% Blue</text>
    <text x="14" y="244" font-family="Arial, sans-serif" font-size="7" fill="#455A64">(mimics human eye sensitivity)</text>
  </g>

  <!-- G4: Resolution concepts (begin=4.5s) -->
  <g opacity="0" data-narration="Resolution is defined by pixel count (width times height). Sensor size and pixel pitch determine image quality. Megapixels equals total pixels divided by one million">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <text x="250" y="126" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#E65100">Resolution and Sensor</text>

    <!-- Resolution box -->
    <rect x="250" y="133" width="160" height="112" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>

    <!-- Pixel count -->
    <text x="260" y="150" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Pixel Count:</text>
    <text x="260" y="162" font-family="Arial, sans-serif" font-size="7.5" fill="#37474F">Width x Height (e.g. 4000x3000)</text>

    <!-- Megapixels formula -->
    <text x="260" y="178" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Megapixels:</text>
    <rect x="260" y="182" width="138" height="16" rx="3" fill="#E65100" opacity="0.1"/>
    <text x="329" y="193" text-anchor="middle" font-family="monospace" font-size="8" fill="#BF360C">MP = (W x H) / 10^6</text>

    <!-- Sensor size -->
    <text x="260" y="210" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Sensor Size:</text>
    <text x="260" y="222" font-family="Arial, sans-serif" font-size="7.5" fill="#37474F">Full-frame: 36x24mm</text>
    <text x="260" y="232" font-family="Arial, sans-serif" font-size="7.5" fill="#37474F">APS-C: 23.5x15.6mm</text>

    <!-- Pixel pitch -->
    <text x="260" y="243" font-family="Arial, sans-serif" font-size="7" fill="#455A64">Pixel Pitch = Sensor Width / Pixel Cols</text>
  </g>

  <!-- G5: Dynamic range and bit depth (begin=6.0s) -->
  <g opacity="0" data-narration="Dynamic range determines the ratio between brightest and darkest tones. 8-bit gives 256 levels, 12-bit gives 4096 levels, and 16-bit gives 65536 levels. Signal-to-noise ratio (SNR) measures image quality">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <text x="14" y="264" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#C62828">Dynamic Range and Bit Depth</text>

    <!-- Bit depth bars -->
    <rect x="14" y="272" width="200" height="64" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>

    <!-- 8-bit -->
    <rect x="22" y="280" width="60" height="14" rx="3" fill="#EF9A9A"/>
    <text x="52" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#B71C1C">8-bit</text>
    <text x="90" y="290" font-family="Arial, sans-serif" font-size="7" fill="#37474F">= 256 levels</text>

    <!-- 12-bit -->
    <rect x="22" y="296" width="110" height="14" rx="3" fill="#EF5350" opacity="0.6"/>
    <text x="52" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#fff">12-bit</text>
    <text x="140" y="306" font-family="Arial, sans-serif" font-size="7" fill="#37474F">= 4096 levels</text>

    <!-- 16-bit -->
    <rect x="22" y="312" width="180" height="14" rx="3" fill="#C62828" opacity="0.7"/>
    <text x="52" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#fff">16-bit</text>
    <text x="140" y="322" font-family="Arial, sans-serif" font-size="7" fill="#fff">= 65536 levels</text>

    <!-- SNR box -->
    <rect x="222" y="264" width="188" height="36" rx="5" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
    <text x="316" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#C62828">Signal-to-Noise Ratio (SNR)</text>
    <text x="316" y="292" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#37474F">SNR = 20 log10(Signal/Noise) dB</text>

    <!-- Dynamic range annotation -->
    <rect x="222" y="304" width="188" height="32" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
    <text x="316" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#C62828">Dynamic Range</text>
    <text x="316" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#37474F">DR = max intensity / min intensity</text>
  </g>

  <!-- G6: Camera parameters (begin=7.5s) -->
  <g opacity="0" data-narration="Key camera parameters: focal length controls field of view, aperture (f-stop) controls depth of field, shutter speed controls motion blur, and ISO sensitivity controls signal amplification">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <text x="14" y="352" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Camera Parameters</text>

    <!-- Focal Length -->
    <rect x="14" y="358" width="96" height="34" rx="5" fill="#3949AB" opacity="0.9"/>
    <text x="62" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#fff" font-weight="bold">Focal Length</text>
    <text x="62" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#C5CAE9">Field of View (mm)</text>

    <!-- Aperture -->
    <rect x="116" y="358" width="96" height="34" rx="5" fill="#00695C" opacity="0.9"/>
    <text x="164" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#fff" font-weight="bold">Aperture (f-stop)</text>
    <text x="164" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#B2DFDB">Depth of Field</text>

    <!-- Shutter Speed -->
    <rect x="218" y="358" width="96" height="34" rx="5" fill="#E65100" opacity="0.9"/>
    <text x="266" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#fff" font-weight="bold">Shutter Speed</text>
    <text x="266" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#FFE0B2">Motion Blur (s)</text>

    <!-- ISO -->
    <rect x="320" y="358" width="90" height="34" rx="5" fill="#C62828" opacity="0.9"/>
    <text x="365" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#fff" font-weight="bold">ISO</text>
    <text x="365" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#FFCDD2">Sensitivity/Gain</text>
  </g>
</svg>
