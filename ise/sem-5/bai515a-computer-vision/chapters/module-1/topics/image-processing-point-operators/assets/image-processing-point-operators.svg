<svg width="420" height="400" data-topic-id="image-processing-point-operators">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A8DE" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Image Processing Point Operators</title>

  <rect x="10" y="10" width="400" height="100" fill="url(#pastel-gradient)"/>
  <text x="15" y="30" font-size="24" font-family="Arial" fill="#2E4053">Image Processing Point Operators</text>

  <section data-narration="What is Image Processing?">
    <rect x="10" y="150" width="400" height="50" fill="#87CEEB"/>
    <text x="15" y="170" font-size="18" font-family="Arial" fill="#2E4053">What is Image Processing?</text>
    <text x="15" y="200" font-size="18" font-family="Arial" fill="#2E4053">Image processing involves manipulating digital images using mathematical operations.</text>
  </section>

  <section data-narration="Types of Image Processing Operations">
    <rect x="10" y="250" width="400" height="50" fill="#87CEEB"/>
    <text x="15" y="270" font-size="18" font-family="Arial" fill="#2E4053">Types of Image Processing Operations</text>
    <text x="15" y="300" font-size="18" font-family="Arial" fill="#2E4053">There are three main types of image processing operations:</text>
  </section>

  <section data-narration="Point Operations (Pixel-wise)">
    <rect x="10" y="350" width="400" height="50" fill="#87CEEB"/>
    <text x="15" y="370" font-size="18" font-family="Arial" fill="#2E4053">Point Operations (Pixel-wise)</text>
    <text x="15" y="400" font-size="18" font-family="Arial" fill="#2E4053">Operate on individual pixels independently.</text>
    <ul>
      <li><text x="20" y="420" font-size="14" font-family="Arial" fill="#2E4053">Brightness:</text> O = I + c</li>
      <li><text x="20" y="440" font-size="14" font-family="Arial" fill="#2E4053">Contrast:</text> O = a \* I</li>
      <li><text x="20" y="460" font-size="14" font-family="Arial" fill="#2E4053">Inversion:</text> O = 255 - I</li>
      <li><text x="20" y="480" font-size="14" font-family="Arial" fill="#2E4053">Thresholding:</text> O = 255 if I > T else 0</li>
    </ul>
  </section>

  <section data-narration="Convolution and Filtering">
    <rect x="10" y="450" width="400" height="50" fill="#87CEEB"/>
    <text x="15" y="470" font-size="18" font-family="Arial" fill="#2E4053">Convolution and Filtering</text>
    <text x="15" y="500" font-size="18" font-family="Arial" fill="#2E4053">Convolution applies a small matrix (kernel) across the image.</text>
    <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M 10 10 L 90 10 L 90 90 L 10 90 Z" stroke="#2E4053" stroke-width="2"/>
      <path d="M 30 30 L 70 30 L 70 90 L 30 90 Z" fill="#87CEEB" stroke="#2E4053" stroke-width="2"/>
      <path d="M 50 50 L 50 100 L 90 100 L 90 50 Z" fill="#87CEEB" stroke="#2E4053" stroke-width="2"/>
      <path d="M 20 20 L 20 60 L 60 60 L 60 20 Z" fill="#87CEEB" stroke="#2E4053" stroke-width="2"/>
    </svg>