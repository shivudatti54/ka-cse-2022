<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="chap-3-31">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A68D8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)"/>
  <title>Photometric Image Formation</title>
  <g transform="translate(20, 10)">
    <rect width="200" height="50" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="16" font-family="Arial, sans-serif" fill="#333">Light and Its Properties</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="2s" begin="0s" delay="0s"/>
    <ellipse cx="100" cy="25" rx="30" ry="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="90" y="35" font-size="14" font-family="Arial, sans-serif" fill="#333">Intensity:</text>
    <rect x="10" y="60" width="50" height="50" fill="#fff" rx="10"/>
    <text x="40" y="70" font-size="14" font-family="Arial, sans-serif" fill="#333">Wavelength:</text>
    <rect x="10" y="100" width="50" height="50" fill="#fff" rx="10"/>
    <text x="40" y="110" font-size="14" font-family="Arial, sans-serif" fill="#333">Frequency:</text>
  </g>
  <g transform="translate(220, 10)">
    <rect width="200" height="50" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="16" font-family="Arial, sans-serif" fill="#333">Image Formation</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="2s" begin="0.5s" delay="0s"/>
    <ellipse cx="100" cy="25" rx="30" ry="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="90" y="35" font-size="14" font-family="Arial, sans-serif" fill="#333">Light Source:</text>
    <rect x="10" y="60" width="50" height="50" fill="#fff" rx="10"/>
    <text x="40" y="70" font-size="14" font-family="Arial, sans-serif" fill="#333">Object:</text>
  </g>
  <g transform="translate(420, 10)">
    <rect width="200" height="50" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="16" font-family="Arial, sans-serif" fill="#333">Image Capturing Devices</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="2s" begin="1s" delay="0s"/>
    <ellipse cx="100" cy="25" rx="30" ry="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="90" y="35" font-size="14" font-family="Arial, sans-serif" fill="#333">Cameras:</text>
    <rect x="10" y="60" width="50" height="50" fill="#fff" rx="10"/>
    <text x="40" y="70" font-size="14" font-family="Arial, sans-serif" fill="#333">Sensors:</text>
    <rect x="10" y="100" width="50" height="50" fill="#fff" rx="10"/>
    <text x="40" y="110" font-size="14" font-family="Arial, sans-serif" fill="#333">Scanners:</text>
  </g>
  <g transform="translate(520, 10)">
    <rect width="200" height="50" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="16" font-family="Arial, sans-serif" fill="#333">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="2s" begin="1.5s" delay="0s"/>
    <ellipse cx="100" cy="25" rx="30" ry="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="90" y="35" font-size="14" font-family="Arial, sans-serif" fill="#333">Photometric image formation is the process of creating a digital image from the physical world.</text>
  </g>
  < footer>Photometric Image Formation</footer>
</svg>