<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="formation">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowO" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E65100"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#C62828"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title (begin=0.3s) -->
  <g opacity="0" data-narration="Image Formation is the process by which a 3D scene is captured as a 2D digital image through camera optics.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#3949AB">Image Formation</text>
    <line x1="120" y1="34" x2="300" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- G2: Pinhole Camera Model (begin=1.5s) -->
  <g opacity="0" data-narration="In the pinhole camera model, light from a 3D scene passes through a tiny aperture and forms an inverted image on the sensor plane behind.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="14" y="56" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Pinhole Camera Model</text>
    <!-- 3D Scene object -->
    <rect x="14" y="64" width="28" height="36" fill="#00695C" rx="3" opacity="0.85"/>
    <text x="28" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">3D</text>
    <text x="28" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Scene</text>
    <!-- Pinhole wall -->
    <rect x="108" y="58" width="4" height="48" fill="#3949AB" rx="1"/>
    <circle cx="110" cy="82" r="3" fill="#C5CAE9"/>
    <text x="110" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">Pinhole</text>
    <!-- Light rays through pinhole -->
    <line x1="42" y1="72" x2="107" y2="82" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="42" y1="92" x2="107" y2="82" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Rays continue inverted -->
    <line x1="113" y1="82" x2="190" y2="96" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="113" y1="82" x2="190" y2="68" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Sensor plane -->
    <rect x="188" y="62" width="3" height="44" fill="#C62828" rx="1"/>
    <text x="198" y="88" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Sensor</text>
    <!-- Inverted image on sensor -->
    <rect x="178" y="66" width="10" height="14" fill="#00695C" rx="1" opacity="0.5" transform="rotate(180,183,73)"/>
    <text x="195" y="80" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Inverted</text>
    <!-- Focal length -->
    <line x1="110" y1="110" x2="189" y2="110" stroke="#3949AB" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="150" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#3949AB">f (focal length)</text>
  </g>

  <!-- G3: Perspective Projection (begin=3.0s) -->
  <g opacity="0" data-narration="Perspective projection maps a 3D point at coordinates X, Y, Z to a 2D image point using the formulas x equals f times X over Z, and y equals f times Y over Z.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="248" y="56" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Perspective Projection</text>
    <!-- Coordinate frame -->
    <line x1="260" y1="100" x2="310" y2="100" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowG)"/>
    <text x="316" y="103" font-family="Arial,sans-serif" font-size="7" fill="#00695C">X</text>
    <line x1="260" y1="100" x2="260" y2="62" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowG)"/>
    <text x="254" y="60" font-family="Arial,sans-serif" font-size="7" fill="#00695C">Y</text>
    <line x1="260" y1="100" x2="240" y2="116" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowG)"/>
    <text x="234" y="122" font-family="Arial,sans-serif" font-size="7" fill="#00695C">Z</text>
    <!-- 3D point -->
    <circle cx="300" cy="72" r="3.5" fill="#E65100"/>
    <text x="308" y="70" font-family="Arial,sans-serif" font-size="7" fill="#E65100">(X,Y,Z)</text>
    <!-- Projection line -->
    <line x1="300" y1="75" x2="375" y2="92" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Image plane -->
    <rect x="370" y="66" width="3" height="48" fill="#3949AB" rx="1"/>
    <circle cx="375" cy="92" r="2.5" fill="#C62828"/>
    <text x="382" y="88" font-family="Arial,sans-serif" font-size="6" fill="#C62828">(x,y)</text>
    <!-- Formulas -->
    <rect x="248" y="125" width="160" height="24" fill="white" rx="4" opacity="0.7"/>
    <text x="328" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#3949AB" font-weight="bold">x = fX/Z</text>
    <text x="328" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#3949AB" font-weight="bold">y = fY/Z</text>
  </g>

  <!-- G4: Illumination (begin=4.5s) -->
  <g opacity="0" data-narration="Illumination involves light from a source reflecting off surfaces. Diffuse reflection follows the Lambertian model scattering light equally, while specular reflection follows the Phong model creating highlights.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="14" y="148" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">Illumination and Reflection</text>
    <!-- Light source -->
    <circle cx="30" cy="172" r="10" fill="#E65100" opacity="0.9"/>
    <text x="30" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">L</text>
    <!-- Light rays to surface -->
    <line x1="40" y1="176" x2="90" y2="200" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowO)"/>
    <!-- Surface -->
    <rect x="80" y="200" width="60" height="6" fill="#3949AB" rx="2"/>
    <text x="110" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">Surface</text>
    <!-- Diffuse reflection (scattered arrows) -->
    <line x1="95" y1="200" x2="80" y2="175" stroke="#00695C" stroke-width="1" marker-end="url(#arrowG)"/>
    <line x1="100" y1="200" x2="100" y2="170" stroke="#00695C" stroke-width="1" marker-end="url(#arrowG)"/>
    <line x1="105" y1="200" x2="120" y2="175" stroke="#00695C" stroke-width="1" marker-end="url(#arrowG)"/>
    <text x="100" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00695C">Diffuse</text>
    <!-- Specular reflection -->
    <line x1="125" y1="200" x2="160" y2="168" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowR)"/>
    <text x="168" y="165" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Specular</text>
    <!-- Camera -->
    <rect x="155" y="170" width="20" height="14" fill="#3949AB" rx="2"/>
    <circle cx="165" cy="177" r="4" fill="#C5CAE9"/>
    <text x="165" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#3949AB">Camera</text>
    <!-- Model labels -->
    <rect x="14" y="228" width="85" height="18" fill="white" rx="3" opacity="0.7"/>
    <text x="56" y="239" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C" font-weight="bold">Lambertian (diffuse)</text>
    <rect x="104" y="228" width="80" height="18" fill="white" rx="3" opacity="0.7"/>
    <text x="144" y="239" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Phong (specular)</text>
  </g>

  <!-- G5: Digital Image Formation (begin=6.0s) -->
  <g opacity="0" data-narration="A continuous scene is converted to a digital image through sampling, which discretizes spatial locations, and quantization, which maps continuous intensity to discrete levels.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="248" y="165" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828">Digital Image Pipeline</text>
    <!-- Continuous scene -->
    <rect x="248" y="175" width="40" height="28" fill="#00695C" rx="3"/>
    <text x="268" y="191" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Continuous</text>
    <text x="268" y="199" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Scene</text>
    <!-- Arrow -->
    <line x1="290" y1="189" x2="300" y2="189" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- Sampling -->
    <rect x="304" y="175" width="40" height="28" fill="#E65100" rx="3"/>
    <text x="324" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Sampling</text>
    <text x="324" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">(spatial)</text>
    <!-- Arrow -->
    <line x1="346" y1="189" x2="356" y2="189" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- Quantization -->
    <rect x="360" y="175" width="48" height="28" fill="#C62828" rx="3"/>
    <text x="384" y="187" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="white">Quantization</text>
    <text x="384" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">(intensity)</text>
    <!-- Arrow down to grid -->
    <line x1="384" y1="205" x2="384" y2="215" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- Digital image grid -->
    <rect x="340" y="218" width="68" height="34" fill="none" stroke="#3949AB" stroke-width="1"/>
    <line x1="357" y1="218" x2="357" y2="252" stroke="#3949AB" stroke-width="0.5"/>
    <line x1="374" y1="218" x2="374" y2="252" stroke="#3949AB" stroke-width="0.5"/>
    <line x1="391" y1="218" x2="391" y2="252" stroke="#3949AB" stroke-width="0.5"/>
    <line x1="340" y1="229" x2="408" y2="229" stroke="#3949AB" stroke-width="0.5"/>
    <line x1="340" y1="240" x2="408" y2="240" stroke="#3949AB" stroke-width="0.5"/>
    <text x="348" y="227" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">120</text>
    <text x="365" y="227" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">85</text>
    <text x="382" y="227" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">200</text>
    <text x="399" y="227" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">45</text>
    <text x="348" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">90</text>
    <text x="365" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">155</text>
    <text x="382" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">70</text>
    <text x="399" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">210</text>
    <text x="348" y="249" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">180</text>
    <text x="365" y="249" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">60</text>
    <text x="382" y="249" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">130</text>
    <text x="399" y="249" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">95</text>
    <text x="374" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">Digital Image (M x N)</text>
  </g>

  <!-- G6: Color Models (begin=7.5s) -->
  <g opacity="0" data-narration="Color images use models like RGB which combines red green and blue additively, HSV which separates hue saturation and value, and grayscale which maps color to single intensity using a weighted sum.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Color Models</text>
    <!-- RGB Additive -->
    <circle cx="62" cy="330" r="18" fill="#C62828" opacity="0.5"/>
    <circle cx="52" cy="345" r="18" fill="#00695C" opacity="0.5"/>
    <circle cx="72" cy="345" r="18" fill="#3949AB" opacity="0.5"/>
    <text x="62" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">RGB</text>
    <text x="62" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#3949AB" font-weight="bold">RGB (Additive)</text>
    <text x="62" y="316" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">R</text>
    <text x="38" y="355" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00695C">G</text>
    <text x="86" y="355" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3949AB">B</text>
    <!-- HSV Cone -->
    <polygon points="210,360 180,310 240,310" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <path d="M192,315 A20,8 0 1,1 228,315" fill="none" stroke="#E65100" stroke-width="1.2"/>
    <text x="210" y="322" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100">H</text>
    <line x1="210" y1="310" x2="232" y2="310" stroke="#C62828" stroke-width="1"/>
    <text x="237" y="313" font-family="Arial,sans-serif" font-size="6" fill="#C62828">S</text>
    <line x1="210" y1="310" x2="210" y2="360" stroke="#00695C" stroke-width="1"/>
    <text x="218" y="352" font-family="Arial,sans-serif" font-size="6" fill="#00695C">V</text>
    <text x="210" y="374" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">HSV Model</text>
    <!-- Grayscale Conversion -->
    <rect x="295" y="305" width="100" height="55" fill="none" stroke="#00695C" stroke-width="1" rx="4"/>
    <rect x="305" y="315" width="80" height="12" fill="url(#grayGrad)" rx="2"/>
    <text x="305" y="310" font-family="Arial,sans-serif" font-size="5" fill="#3949AB">0</text>
    <text x="380" y="310" font-family="Arial,sans-serif" font-size="5" fill="#3949AB">255</text>
    <text x="345" y="342" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00695C" font-weight="bold">Gray = 0.299R</text>
    <text x="345" y="350" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00695C" font-weight="bold">+ 0.587G + 0.114B</text>
    <text x="345" y="374" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C" font-weight="bold">Grayscale</text>
    <!-- Summary flow at bottom -->
    <rect x="14" y="384" width="392" height="12" fill="white" rx="3" opacity="0.6"/>
    <text x="210" y="393" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#3949AB" font-weight="bold">Scene &#x2192; Camera Model &#x2192; Projection &#x2192; Illumination &#x2192; Sampling &#x2192; Digital Image</text>
  </g>
</svg>
