<svg width="420" height="400" data-topic-id="computer-vision-image-processing-more-neighborhood-operators-fourier-transforms-pyramids-wavelets-chap-3-3-3-6">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65bbff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#45a0e6" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffc107" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffa07a" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <text x="10" y="20" font-size="24" fill="#fff" opacity="0.8" text-anchor="start">Textbook 1 Chap 3 33 36</text>
  <section data-narration="3.3 Neighborhood Operators">
    <rect x="50" y="50" width="320" height="200" fill="#fff" rx="10" />
    <rect x="50" y="50" width="320" height="200" fill="#fff" rx="10">
      <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="80" font-size="16" fill="#000" text-anchor="start">Neighborhood Operators</text>
    <text x="60" y="120" font-size="16" fill="#000" text-anchor="start">Definition:</text>
    <text x="60" y="160" font-size="16" fill="#000" text-anchor="start">A neighborhood operator is a mathematical function that takes a pixel value and its neighboring pixel values as input and produces an output value.</text>
    <text x="60" y="200" font-size="16" fill="#000" text-anchor="start">Types of Neighborhood Operators:</text>
    <text x="60" y="240" font-size="16" fill="#000" text-anchor="start">Mean Filter, Median Filter, Gaussian Filter, Sobel Operator</text>
  </section>
  <section data-narration="3.4 Fourier Transforms">
    <rect x="50" y="280" width="320" height="200" fill="#fff" rx="10" />
    <rect x="50" y="280" width="320" height="200" fill="#fff" rx="10">
      <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="300" font-size="16" fill="#000" text-anchor="start">Fourier Transforms</text>
    <text x="60" y="340" font-size="16" fill="#000" text-anchor="start">Definition:</text>
    <text x="60" y="380" font-size="16" fill="#000" text-anchor="start">The Fourier transform is a mathematical tool used to decompose a signal or image into its constituent frequencies.</text>
    <text x="60" y="420" font-size="16" fill="#000" text-anchor="start">Types of Fourier Transforms:</text>
    <text x="60" y="460" font-size="16" fill="#000" text-anchor="start">Discrete Fourier Transform (DFT), Fast Fourier Transform (FFT)</text>
  </section>
  <section data-narration="3.3 Neighborhood Operators">
    <rect x="50" y="50" width="320" height="200" fill="#fff" rx="10" />
    <rect x="50" y="50" width="320" height="200" fill="#fff" rx="10">
      <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="80" font-size="16" fill="#000" text-anchor="start">Mean Filter:</text>
    <text x="60" y="120" font-size="16" fill="#000" text-anchor="start">calculates the mean of neighboring pixel values and assigns it to the current pixel.</text>
    <text x="60" y="160" font-size="16" fill="#000" text-anchor="start">Median Filter:</text>
    <text x="60" y="200" font-size="16" fill="#000" text-anchor="start">calculates the median of neighboring pixel values and assigns it to the current pixel.</text>
    <text x="60" y="240" font-size="16" fill="#000" text-anchor="start">Gaussian Filter:</text>
    <text x="60" y="280" font-size="16" fill="#000" text-anchor="start">uses a Gaussian distribution to weight neighboring pixel values and calculates their weighted sum.</text>
    <text x="60" y="320" font-size="16" fill="#000" text-anchor="start">Sobel Operator:</text>
    <text x="60" y="360" font-size="16" fill="#000" text-anchor="start">uses a Sobel kernel to detect edges in an image.</text>
  </section>
  <section data-narration="3.4 Fourier Transforms">
    <rect x="50" y="280" width="320" height="200" fill="#fff" rx="10" />
    <rect x="50" y="280" width="320" height="200" fill="#fff" rx="10">
      <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="300" font-size="16" fill="#000" text-anchor="start">Discrete Fourier Transform (DFT):</text>
    <text x="60" y="340" font-size="16" fill="#000" text-anchor="start">used for discrete-time signals.</text>
    <text x="60" y="380" font-size="16" fill="#000" text-anchor="start">Fast Fourier Transform (FFT):</text>
    <text x="60" y="420" font-size="16" fill="#000" text-anchor="start">an efficient algorithm for computing the DFT.</text>
  </section>
</svg>