<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="geometric-transformations">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#E65100"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#3949AB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Geometric Transformations modify the spatial arrangement of pixels in an image.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3949AB">Geometric Transformations</text>
    <line x1="90" y1="40" x2="330" y2="40" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="90" cy="40" r="3" fill="#E65100"/>
    <circle cx="330" cy="40" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Translation -->
  <g opacity="0" data-narration="Translation shifts every pixel by t-x in x and t-y in y. The new position equals the old position plus the translation vector.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="15" y="68" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Translation</text>
    <!-- Before rectangle -->
    <rect x="20" y="76" width="30" height="22" fill="none" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="35" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">before</text>
    <!-- Arrow showing shift -->
    <line x1="56" y1="87" x2="86" y2="77" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="71" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100">(tx,ty)</text>
    <!-- After rectangle -->
    <rect x="90" y="66" width="30" height="22" fill="rgba(0,105,92,0.15)" stroke="#00695C" stroke-width="1.5"/>
    <text x="105" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">after</text>
    <!-- Formula -->
    <text x="150" y="78" font-family="monospace" font-size="10" fill="#3949AB">[x']   [x + tx]</text>
    <text x="150" y="92" font-family="monospace" font-size="10" fill="#3949AB">[y'] = [y + ty]</text>
  </g>

  <!-- Group 3: Rotation -->
  <g opacity="0" data-narration="Rotation turns the image by angle theta around the origin. The rotation matrix uses cosine and sine to compute new coordinates.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="15" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Rotation</text>
    <!-- Original square -->
    <rect x="25" y="130" width="26" height="26" fill="none" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <!-- Curved rotation arrow -->
    <path d="M 56,143 A 18,18 0 0,1 72,131" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="68" y="150" font-family="Arial, sans-serif" font-size="9" fill="#E65100">&#x3B8;</text>
    <!-- Rotated square -->
    <g transform="translate(90,143) rotate(-25)">
      <rect x="-13" y="-13" width="26" height="26" fill="rgba(0,105,92,0.15)" stroke="#00695C" stroke-width="1.5"/>
    </g>
    <!-- Rotation matrix formula -->
    <text x="140" y="133" font-family="monospace" font-size="10" fill="#3949AB">[x']   [cos&#x3B8;  -sin&#x3B8;] [x]</text>
    <text x="140" y="147" font-family="monospace" font-size="10" fill="#3949AB">[y'] = [sin&#x3B8;   cos&#x3B8;] [y]</text>
    <line x1="15" y1="163" x2="405" y2="163" stroke="#C5CAE9" stroke-width="0.8"/>
  </g>

  <!-- Group 4: Scaling -->
  <g opacity="0" data-narration="Scaling resizes the image. Uniform scaling uses the same factor for both axes, while non-uniform scaling stretches or compresses axes independently.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="15" y="182" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Scaling</text>
    <!-- Original small square -->
    <rect x="22" y="190" width="20" height="20" fill="none" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="32" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C">1x</text>
    <!-- Uniform scaled -->
    <rect x="52" y="186" width="30" height="30" fill="rgba(57,73,171,0.12)" stroke="#3949AB" stroke-width="1.5"/>
    <text x="67" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB">uniform</text>
    <!-- Non-uniform scaled -->
    <rect x="92" y="192" width="36" height="18" fill="rgba(230,81,0,0.12)" stroke="#E65100" stroke-width="1.5"/>
    <text x="110" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E65100">non-uni</text>
    <!-- Formula -->
    <text x="150" y="195" font-family="monospace" font-size="10" fill="#3949AB">[x']   [sx  0 ] [x]</text>
    <text x="150" y="209" font-family="monospace" font-size="10" fill="#3949AB">[y'] = [0   sy] [y]</text>
    <text x="310" y="195" font-family="Arial, sans-serif" font-size="9" fill="#00695C">sx=sy: uniform</text>
    <text x="310" y="209" font-family="Arial, sans-serif" font-size="9" fill="#E65100">sx&#x2260;sy: non-uniform</text>
    <line x1="15" y1="222" x2="405" y2="222" stroke="#C5CAE9" stroke-width="0.8"/>
  </g>

  <!-- Group 5: Affine Transformation -->
  <g opacity="0" data-narration="An affine transformation combines translation, rotation, scaling, and shear into a single two-by-three matrix that preserves parallel lines.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="15" y="242" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Affine Transform</text>
    <!-- Visual: parallelogram from rectangle -->
    <rect x="22" y="254" width="24" height="18" fill="none" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="52" y1="263" x2="72" y2="263" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <polygon points="78,256 104,250 110,270 84,276" fill="rgba(198,40,40,0.12)" stroke="#C62828" stroke-width="1.5"/>
    <text x="94" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C62828">sheared</text>
    <!-- General affine matrix -->
    <text x="140" y="252" font-family="monospace" font-size="10" fill="#3949AB">[x']   [a  b  tx] [x]</text>
    <text x="140" y="266" font-family="monospace" font-size="10" fill="#3949AB">[y'] = [c  d  ty] [y]</text>
    <text x="140" y="280" font-family="monospace" font-size="10" fill="#3949AB">                  [1]</text>
    <!-- Labels -->
    <text x="310" y="257" font-family="Arial, sans-serif" font-size="8" fill="#00695C">&#x2022; Preserves parallel lines</text>
    <text x="310" y="270" font-family="Arial, sans-serif" font-size="8" fill="#00695C">&#x2022; 6 parameters (2&#xD7;3)</text>
    <text x="310" y="283" font-family="Arial, sans-serif" font-size="8" fill="#00695C">&#x2022; Combines all basic transforms</text>
    <line x1="15" y1="294" x2="405" y2="294" stroke="#C5CAE9" stroke-width="0.8"/>
  </g>

  <!-- Group 6: Homogeneous Coordinates -->
  <g opacity="0" data-narration="Homogeneous coordinates append a one to the coordinate vector, enabling all transformations including translation to be expressed as matrix multiplications. This also leads to projective and perspective transforms.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="15" y="314" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Homogeneous Coordinates</text>
    <!-- Coordinate representation -->
    <rect x="20" y="322" width="110" height="30" rx="6" fill="rgba(57,73,171,0.08)" stroke="#3949AB" stroke-width="1"/>
    <text x="75" y="341" text-anchor="middle" font-family="monospace" font-size="12" fill="#3949AB">(x, y) &#x2192; [x, y, 1]</text>
    <!-- 3x3 matrix -->
    <text x="150" y="330" font-family="monospace" font-size="10" fill="#00695C">[a  b  tx] [x]   [x']</text>
    <text x="150" y="344" font-family="monospace" font-size="10" fill="#00695C">[c  d  ty] [y] = [y']</text>
    <text x="150" y="358" font-family="monospace" font-size="10" fill="#00695C">[0  0   1] [1]   [ 1]</text>
    <!-- Benefits box -->
    <rect x="20" y="362" width="390" height="32" rx="6" fill="rgba(230,81,0,0.08)" stroke="#E65100" stroke-width="1"/>
    <text x="210" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#E65100">All transforms as matrix multiply &#x2192; chain transforms by multiplying matrices</text>
    <text x="210" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#C62828">Extends to projective / perspective transforms (3&#xD7;3 with non-zero last row)</text>
  </g>
</svg>
