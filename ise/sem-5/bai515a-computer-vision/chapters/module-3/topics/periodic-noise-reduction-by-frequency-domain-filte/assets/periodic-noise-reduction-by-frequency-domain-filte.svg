<svg width="420" height="400" data-topic-id="periodic-noise-reduction-by-frequency-domain-filtering" xmlns="http://www.w3.org/2000/svg">
  <title>Periodic Noise Reduction by Frequency Domain Filtering</title>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #3498db; stop-opacity: 1"/>
      <stop offset="100%" style="stop-color: #2ecc71; stop-opacity: 1"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#grad)" rx="10"/>
  <g transform="translate(10, 10)">
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3498db" text-anchor="start">Periodic Noise Reduction by Frequency Domain Filtering</text>
    <rect x="10" y="50" width="380" height="200" fill="#f9f9f9" rx="10"/>
    <g transform="translate(10, 60)">
      <text data-narration="What is Periodic Noise?" x="10" y="70" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="start">Periodic noise is a type of noise that occurs in periodic signals, such as images with regular patterns.</text>
      <rect x="10" y="90" width="350" height="100" fill="#f9f9f9" rx="10"/>
      <g transform="translate(10, 110)">
        <text data-narration="Frequency Domain Filtering" x="10" y="130" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="start">Frequency domain filtering is a technique for removing periodic noise from images by analyzing the frequency components of the image.</text>
        <rect x="10" y="150" width="340" height="100" fill="#f9f9f9" rx="10"/>
        <g transform="translate(10, 170)">
          <text data-narration="Types of Frequency Domain Filtering" x="10" y="190" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="start">There are several types of frequency domain filtering that can be used for periodic noise reduction, including spectral estimation and peak picking.</text>
          <rect x="10" y="210" width="330" height="100" fill="#f9f9f9" rx="10"/>
          <g transform="translate(10, 230)">
            <rect x="10" y="260" width="320" height="80" fill="#f9f9f9" rx="10"/>
            <text x="10" y="310" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="start">Restoring the image is done by using the removed frequency components.</text>
          </g>
        </g>
      </g>
    </rect>
    <g transform="translate(10, 240)">
      <rect x="10" y="280" width="340" height="60" fill="#f9f9f9" rx="10"/>
      <text x="10" y="310" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="start">Smooth animations are added to visualize periodic noise reduction.</text>
      <animate begin="0s" dur="2s" fill="freeze" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
      <animate begin="0.5s" dur="2s" fill="freeze" attributeName="opacity" from="0" to="1" repeatCount="indefinite"/>
      <animate begin="1s" dur="2s" fill="freeze" attributeName="transform" from="translate(10, 310)" to="translate(20, 310)" repeatCount="indefinite"/>
      <animate begin="1.5s" dur="2s" fill="freeze" attributeName="transform" from="translate(20, 310)" to="translate(30, 310)" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(10, 330)">
    <rect x="10" y="360" width="400" height="40" fill="#f9f9f9" rx="10"/>
    <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="start">This educational diagram illustrates the concept of periodic noise reduction by frequency domain filtering.</text>
  </g>
</svg>