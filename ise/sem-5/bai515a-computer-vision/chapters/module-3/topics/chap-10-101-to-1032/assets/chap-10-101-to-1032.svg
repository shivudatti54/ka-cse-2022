<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="chap10-101-to-1032">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title Section -->
  <section data-narration="Introduction to Image Restoration">
    <rect x="10" y="10" width="400" height="50" fill="url(#gradient)" rx="10" />
    <text x="20" y="25" font-size="24" font-family="Arial" text-anchor="middle">Image Restoration</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="1s" begin="0s" />
  </section>

  <!-- Section 1: Definition -->
  <section data-narration="Definition of Image Restoration">
    <rect x="10" y="70" width="400" height="50" fill="url(#gradient)" rx="10" />
    <text x="20" y="85" font-size="18" font-family="Arial" text-anchor="middle">Image Restoration</text>
    <text x="20" y="105" font-size="14" font-family="Arial" text-anchor="middle">is the process of estimating the original image from a noisy or degraded image.</text>
    <animateTransform attributeName="transform" type="translate" from="0,70" to="0,110" dur="1.5s" begin="0s" />
  </section>

  <!-- Section 2: Types of Image Degradation -->
  <section data-narration="Types of Image Degradation">
    <rect x="10" y="150" width="400" height="50" fill="url(#gradient)" rx="10" />
    <text x="20" y="165" font-size="18" font-family="Arial" text-anchor="middle">Additive Noise</text>
    <rect x="50" y="165" width="10" height="20" fill="#C0C0C0" rx="2" />
    <text x="70" y="165" font-size="14" font-family="Arial" text-anchor="middle">Random fluctuations in image intensities</text>
    <animateTransform attributeName="transform" type="translate" from="50,165" to="50,185" dur="1s" begin="0s" />
    <text x="20" y="195" font-size="18" font-family="Arial" text-anchor="middle">Multiplicative Noise</text>
    <rect x="50" y="195" width="10" height="20" fill="#C0C0C0" rx="2" />
    <text x="70" y="195" font-size="14" font-family="Arial" text-anchor="middle">Non-uniform fluctuations in image intensities</text>
    <animateTransform attributeName="transform" type="translate" from="50,195" to="50,215" dur="1s" begin="0.5s" />
    <text x="20" y="225" font-size="18" font-family="Arial" text-anchor="middle">Blurring</text>
    <rect x="50" y="225" width="10" height="20" fill="#C0C0C0" rx="2" />
    <text x="70" y="225" font-size="14" font-family="Arial" text-anchor="middle">Degradation of image sharpness</text>
    <animateTransform attributeName="transform" type="translate" from="50,225" to="50,245" dur="1s" begin="1s" />
  </section>

  <!-- Section 3: Image Restoration Techniques -->
  <section data-narration="Image Restoration Techniques">
    <rect x="10" y="300" width="400" height="50" fill="url(#gradient)" rx="10" />
    <text x="20" y="315" font-size="18" font-family="Arial" text-anchor="middle">Filtering</text>
    <rect x="50" y="315" width="10" height="20" fill="#C0C0C0" rx="2" />
    <text x="70" y="315" font-size="14" font-family="Arial" text-anchor="middle">Removes noise and improves image quality</text>
    <animateTransform attributeName="transform" type="translate" from="50,315" to="50,335" dur="1s" begin="0s" />
    <text x="20" y="335" font-size="18" font-family="Arial" text-anchor="middle">Deblurring</text>
    <rect x="50" y="335" width="10" height="20" fill="#C0C0C0" rx="2" />
    <text x="70" y="335" font-size="14" font-family="Arial" text-anchor="middle">Removes blur from images</text>
    <animateTransform attributeName="transform" type="translate" from="50,335" to="50,355" dur="1s" begin="0.5s" />
    <text x="20" y="355" font-size="18" font-family="Arial" text-anchor="middle">Super Resolution</text>
    <rect x="50" y="355" width="10" height="20" fill="#C0C0C0" rx="2" />
    <text x="70" y="355" font-size="14" font-family="Arial" text-anchor="middle">Enhances image resolution</text>
    <animateTransform attributeName="transform" type="translate" from="50,355" to="50,375" dur="1s" begin="1s" />
  </section>

  <!-- Section 4: Image Restoration Algorithms -->
  <section data-narration="Image Restoration Algorithms">
    <rect x="10" y="420" width="400" height="50" fill="url(#gradient)" rx="10" />
    <text x="20" y="435" font-size="18" font-family="Arial" text-anchor="middle">Wiener Filter</text>
    <text x="20" y="455" font-size="14" font-family="Arial" text-anchor="middle">A linear filter that minimizes the mean squared error between the degraded image and the original image.</text>
    <animateTransform attributeName="transform" type="translate" from="0,420" to="20,450" dur="1.5s" begin="0s" />
    <text x="20" y="475" font-size="18" font-family="Arial" text-anchor="middle">Holistic Deblurring</text>
    <text x="20" y="495" font-size="14" font-family="Arial" text-anchor="middle">A non-linear algorithm that restores images by modeling the relationship between the image and the degrading factors.</text>
    <animateTransform attributeName="transform" type="translate" from="0,420" to="40,450" dur="1s" begin="0.5s" />
    <text x="20" y="515" font-size="18" font-family="Arial" text-anchor="middle">Deep Learning-based Methods</text>
    <text x="20" y="535" font-size="14" font-family="Arial" text-anchor="middle">Neural networks are used to learn the mapping between the degraded image and the original image.</text>
    <animateTransform attributeName="transform" type="translate" from="0,420" to="60,450" dur="1s" begin="1s" />
  </section>

  <!-- Footer -->
  <footer>
    <rect x="10" y="470" width="400" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="485" font-size="18" font-family="Arial" text-anchor="middle">Chap 10.101-1032</text>
  </footer>
</svg>