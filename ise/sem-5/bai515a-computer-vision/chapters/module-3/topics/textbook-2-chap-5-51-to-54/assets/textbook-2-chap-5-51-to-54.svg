<svg width="420" height="400" data-topic-id="textbook-2-chap-5-51-to-54">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title section -->
  <section data-narration="Introduction to Image Degradation">
    <rect x="0" y="0" width="420" height="50" fill="#2F4F7F" opacity="1" />
    <text x="10" y="20" font-size="24" fill="#FFFFFF" text-anchor="start">Textbook 2 Chap 5 51 To 54</text>
  </section>
  
  <!-- Noise Model section -->
  <section data-narration="Noise Model">
    <rect x="0" y="70" width="420" height="50" fill="#ADD8E6" opacity="1" />
    <text x="10" y="90" font-size="18" fill="#2F4F7F">Additive Noise</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="10" begin="0s" repeatCount="indefinite" />
    <animate x="210" y="180" dur="10" begin="0s" repeatCount="indefinite" />
    <text x="220" y="200" font-size="16" fill="#2F4F7F">y = x + n</text>
  </section>
  
  <!-- Blurring Model section -->
  <section data-narration="Blurring Model">
    <rect x="0" y="140" width="420" height="50" fill="#2F4F7F" opacity="1" />
    <text x="10" y="160" font-size="18" fill="#ADD8E6">Linear Blurring</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="10" begin="0s" repeatCount="indefinite" />
    <animate x="210" y="180" dur="10" begin="0s" repeatCount="indefinite" />
    <text x="220" y="200" font-size="16" fill="#ADD8E6">y = ∑h_i * x_i</text>
    <text x="270" y="200" font-size="16" fill="#ADD8E6">y = ∑h_i * x_i^p</text>
  </section>
  
  <!-- Image Restoration section -->
  <section data-narration="Image Restoration">
    <rect x="0" y="210" width="420" height="50" fill="#2F4F7F" opacity="1" />
    <text x="10" y="230" font-size="18" fill="#ADD8E6">Image Restoration</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="10" begin="0s" repeatCount="indefinite" />
    <animate x="210" y="180" dur="10" begin="0s" repeatCount="indefinite" />
    <text x="220" y="200" font-size="16" fill="#ADD8E6">Recovering the original image</text>
  </section>
  
  <!-- Compression section -->
  <section data-narration="Compression">
    <rect x="0" y="280" width="420" height="50" fill="#2F4F7F" opacity="1" />
    <text x="10" y="300" font-size="18" fill="#ADD8E6">Compression</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="10" begin="0s" repeatCount="indefinite" />
    <animate x="210" y="180" dur="10" begin="0s" repeatCount="indefinite" />
    <text x="220" y="200" font-size="16" fill="#ADD8E6">Reducing image data to reduce file size</text>
  </section>
  
  <!-- Obbliteration and Obliteration section -->
  <section data-narration="Obbliteration and Obliteration">
    <rect x="0" y="350" width="420" height="50" fill="#2F4F7F" opacity="1" />
    <text x="10" y="370" font-size="18" fill="#ADD8E6">Obliteration</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="10" begin="0s" repeatCount="indefinite" />
    <animate x="210" y="180" dur="10" begin="0s" repeatCount="indefinite" />
    <text x="220" y="200" font-size="16" fill="#ADD8E6">Loss of important details in the image</text>
  </section>
  
  <!-- Diagram of Image Degradation -->
  <svg x="420" y="0" width="100" height="400" data-topic-id="textbook-2-chap-5-51-to-54">
    <circle cx="50" cy="200" r="30" fill="#FFFFFF" />
    <line x1="50" y1="200" x2="50" y2="250" stroke="#2F4F7F" stroke-width="2" />
    <line x1="50" y1="250" x2="50" y2="300" stroke="#2F4F7F" stroke-width="2" />
    <text x="50" y="170" font-size="16" fill="#2F4F7F">Original Image</text>
    <text x="50" y="270" font-size="16" fill="#2F4F7F">Degraded Image</text>
  </svg>