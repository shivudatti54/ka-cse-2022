<svg width="420" height="400" data-topic-id="restoration-in-the-presence-of-noise-only">
    <title>Restoration In The Presence Of Noise Only</title>
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4B56F5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#3498db" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <style>
        /* Add some basic styling to the SVG */
        * {
            font-family: Arial, sans-serif;
            text-align: left;
        }
        
        rect {
            stroke: #3498db;
            stroke-width: 2;
        }
        
        path {
            stroke: #4B56F5;
            stroke-width: 2;
        }
    </style>
    <g id="image-restore">
        <rect x="50" y="50" width="320" height="300" fill="url(#gradient)" rx="10"/>
        <rect x="70" y="70" width="280" height="260" fill="#fff" rx="10"/>
        <rect x="80" y="80" width="240" height="240" fill="#fff" rx="10"/>
        <rect x="60" y="60" width="300" height="280" fill="#fff" rx="10"/>
        <circle cx="200" cy="200" r="100" fill="#fff"/>
        <g id="image-degraded">
            <rect x="50" y="50" width="320" height="300" fill="#fff" rx="10"/>
            <rect x="70" y="70" width="280" height="260" fill="#fff" rx="10"/>
            <rect x="80" y="80" width="240" height="240" fill="#fff" rx="10"/>
            <rect x="60" y="60" width="300" height="280" fill="#fff" rx="10"/>
            <circle cx="200" cy="200" r="100" fill="#fff"/>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="100,100" dur="2s" begin=".5s" delay=".5s"/>
        </g>
        <g id="image-restored">
            <rect x="50" y="50" width="320" height="300" fill="#fff" rx="10"/>
            <rect x="70" y="70" width="280" height="260" fill="#fff" rx="10"/>
            <rect x="80" y="80" width="240" height="240" fill="#fff" rx="10"/>
            <rect x="60" y="60" width="300" height="280" fill="#fff" rx="10"/>
            <circle cx="200" cy="200" r="100" fill="#fff"/>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="100,100" dur="2s" begin=".8s" delay=".8s"/>
        </g>
        <g id="noise-only">
            <rect x="50" y="50" width="320" height="300" fill="#fff" rx="10"/>
            <rect x="70" y="70" width="280" height="260" fill="#fff" rx="10"/>
            <rect x="80" y="80" width="240" height="240" fill="#fff" rx="10"/>
            <rect x="60" y="60" width="300" height="280" fill="#fff" rx="10"/>
            <circle cx="200" cy="200" r="100" fill="#fff"/>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="150,150" dur="2s" begin=".3s" delay=".3s"/>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="250,250" dur="2s" begin=".5s" delay=".5s"/>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="350,350" dur="2s" begin=".8s" delay=".8s"/>
        </g>
    </g>
    <g id="filtering">
        <rect x="50" y="50" width="320" height="300" fill="#fff" rx="10"/>
        <rect x="70" y="70" width="280" height="260" fill="#fff" rx="10"/>
        <rect x="80" y="80" width="240" height="240" fill="#fff" rx="10"/>
        <rect x="60" y="60" width="300" height="280" fill="#fff" rx="10"/>
        <circle cx="200" cy="200" r="100" fill="#fff"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,0" dur="2s" begin=".5s" delay=".5s"/>
        <rect x="70" y="70" width="250" height="250" fill="#3498db" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="30,30" dur="2s" begin=".5s" delay=".5s"/>
        <rect x="80" y="80" width="220" height="220" fill="#3498db" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="60,60" dur="2s" begin=".5s" delay=".5s"/>
    </g>
    <g id="deconvolution">
        <rect x="50" y="50" width="320" height="300" fill="#fff" rx="10"/>
        <rect x="70" y="70" width="280" height="260" fill="#fff" rx="10"/>
        <rect x="80" y="80" width="240" height="240" fill="#fff" rx="10"/>
        <rect x="60" y="60" width="300" height="280" fill="#fff" rx="10"/>
        <circle cx="200" cy="200" r="100" fill="#fff"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="100,100" dur="2s" begin=".5s" delay=".5s"/>
        <rect x="50" y="50" width="300" height="250" fill="#3498db" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="100,150" dur="2s" begin=".5s" delay=".5s"/>
        <rect x="70" y="70" width="250" height="200" fill="#3498db" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="150,200" dur="2s" begin=".5s" delay=".5s"/>
    </g>
    <g id="ml estimation">
        <rect x="50" y="50" width="320" height="300" fill="#fff" rx="10"/>
        <rect x="70" y="70" width="280" height="260" fill="#fff" rx="10"/>
        <rect x="80" y="80" width="240" height="240" fill="#fff" rx="10"/>
        <rect x="60" y="60" width="300" height="280" fill="#fff" rx="10"/>
        <circle cx="200" cy="200" r="100" fill="#fff"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,0" dur="2s" begin=".5s" delay=".5s"/>
        <rect x="70" y="70" width="220" height="220" fill="#3498db" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="30,30" dur="2s" begin=".5s" delay=".5s"/>
        <rect x="80" y="80" width="200" height="200" fill="#3498db" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="60,60" dur="2s" begin=".5s" delay=".5s"/>
    </g>
</svg>