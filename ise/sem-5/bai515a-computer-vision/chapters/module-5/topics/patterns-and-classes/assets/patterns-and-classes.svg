<svg width="420" height="400" data-topic-id="patterns-and-classes" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8CFA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3A5C8E" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Patterns and Classes</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <animate href="#gradient" attributeName="offset" from="0%" to="100%" dur="10s" begin="0s" repeatCount="indefinite"/>
  <g id="patterns-and-classes">
    <text x="150" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Patterns and Classes</text>
    <rect x="10" y="50" width="200" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="0s" repeatCount="indefinite"/>
    <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Introduction">Introduction</text>
    <rect x="10" y="150" width="200" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="1s" repeatCount="indefinite"/>
    <text x="10" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="Definitions">Definitions</text>
    <rect x="10" y="250" width="200" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="10s" begin="2s" repeatCount="indefinite"/>
    <g id="patterns">
      <text x="50" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Patterns</text>
      <rect x="10" y="110" width="100" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
      <animateTransform attributeName="transform" type="translate" from="0 50" to="100 50" dur="10s" begin="3s" repeatCount="indefinite"/>
      <line x1="50" y1="80" x2="100" y2="80" stroke="#5A6C9C" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="120" y="110" width="100" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
      <animateTransform attributeName="transform" type="translate" from="0 50" to="200 50" dur="10s" begin="4s" repeatCount="indefinite"/>
      <line x1="120" y1="80" x2="200" y2="80" stroke="#5A6C9C" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <g id="classes">
      <text x="50" y="150" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Classes</text>
      <rect x="10" y="180" width="100" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
      <animateTransform attributeName="transform" type="translate" from="0 50" to="100 50" dur="10s" begin="5s" repeatCount="indefinite"/>
      <line x1="50" y1="180" x2="100" y2="180" stroke="#5A6C9C" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="120" y="180" width="100" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
      <animateTransform attributeName="transform" type="translate" from="0 50" to="200 50" dur="10s" begin="6s" repeatCount="indefinite"/>
      <line x1="120" y1="180" x2="200" y2="180" stroke="#5A6C9C" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <g id="application">
      <text x="50" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Applications</text>
      <rect x="10" y="250" width="100" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
      <animateTransform attributeName="transform" type="translate" from="0 50" to="100 50" dur="10s" begin="7s" repeatCount="indefinite"/>
      <line x1="50" y1="250" x2="100" y2="250" stroke="#5A6C9C" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="120" y="250" width="100" height="50" fill="#fff" stroke="#5A6C9C" stroke-width="2" rx="10"/>
      <animateTransform attributeName="transform" type="translate" from="0 50" to="200 50" dur="10s" begin="8s" repeatCount="indefinite"/>
      <line x1="120" y1="250" x2="200" y2="250" stroke="#5A6C9C" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <footer>
      <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Patterns and Classes</text>
    </footer>
  </g>
</svg>