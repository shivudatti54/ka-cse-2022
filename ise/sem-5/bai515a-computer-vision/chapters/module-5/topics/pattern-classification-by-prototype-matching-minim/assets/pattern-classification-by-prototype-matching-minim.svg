<svg width="420" height="400" data-topic-id="pattern-classification-by-prototype-matching-min">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <style>
      .text {
        font-size: 18px;
        font-weight: bold;
        color: #3498db;
      }
      .title {
        font-size: 24px;
        font-weight: bold;
        color: #2ecc71;
      }
      .footer {
        font-size: 14px;
        color: #e74c3c;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="20" y="20" class="title">Pattern Classification by Prototype Matching (Minimum Distance Classifier)</text>
  <rect x="10" y="50" width="400" height="20" fill="#f9f9f9"/>
  <text x="20" y="60" class="text" data-narration="Introduction to Pattern Classification">Pattern classification is a fundamental concept in computer vision, where the goal is to assign a class label to an input pattern based on its similarity to a set of predefined prototypes.</text>
  <animateTransform attribute-name="x" attributeName="x" from="20" to="340" dur="1000" begin="0s" repeatCount="indefinite"/>
  <circle cx="220" cy="120" r="10" fill="#3498db" stroke="#3498db" stroke-width="2"/>
  <animate path="M 20 120 Q 140 120 220 120" attributeName="d" from="M 20 120" to="M 140 120 Q 220 120 220 120" dur="1000" begin="0s" repeatCount="indefinite"/>
  <rect x="10" y="160" width="400" height="20" fill="#f9f9f9"/>
  <text x="20" y="170" class="text" data-narration="Prototypes in Feature Space">A set of input patterns with known class labels, represented as points in a high-dimensional feature space.</text>
  <rect x="10" y="200" width="400" height="20" fill="#f9f9f9"/>
  <text x="20" y="210" class="text" data-narration="Distance Calculation">The distance between the input pattern and each prototype is calculated using a distance metric, such as Euclidean distance.</text>
  <animate path="M 140 200 Q 220 200 220 200" attributeName="d" from="M 140 200" to="M 220 200 Q 220 200 220 200" dur="1000" begin="0s" repeatCount="indefinite"/>
  <rect x="10" y="240" width="400" height="20" fill="#f9f9f9"/>
  <text x="20" y="250" class="text" data-narration="Minimum Distance Search">The prototype with the minimum distance from the input pattern is found, and its class label is assigned to the input pattern.</text>
  <animate path="M 220 280 Q 220 320 220 280" attributeName="d" from="M 220 280" to="M 220 320 Q 220 280 220 280" dur="1000" begin="0s" repeatCount="indefinite"/>
  <rect x="10" y="300" width="400" height="20" fill="#f9f9f9"/>
  <text x="20" y="310" class="text" data-narration="Example">Suppose we have a set of prototypes for different classes of objects, and we want to classify a new input pattern.</text>
  <rect x="10" y="340" width="400" height="20" fill="#f9f9f9"/>
  <text x="20" y="350" class="text" data-narration="Conclusion">Prototype Matching is a simple yet effective pattern classification algorithm that assigns a class label to an input pattern based on its similarity to a set of predefined prototypes.</text>
  <rect x="10" y="380" width="400" height="20" fill="#f9f9f9"/>
  <text x="20" y="390" class="footer">Pattern Classification by Prototype Matching (Minimum Distance Classifier)</text>
</svg>