<svg width="420" height="400" data-topic-id="textbook-2-chap-9-91-95">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="1" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  <!-- Title at top -->
  <text x="180" y="40" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Morphological Image Processing
  </text>
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction to Morphological Image Processing">
    <rect x="20" y="80" width="380" height="50" fill="#fff" rx="5"/>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Morphological image processing is a technique used to analyze and process images.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 80" to="0 100" dur="500" begin="0s"/>
  </section>
  <!-- Section 2: Terminology and Notations -->
  <section data-narration="Terminology and Notations">
    <rect x="20" y="150" width="380" height="50" fill="#fff" rx="5"/>
    <text x="20" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Morphological operation, kernel, opening, closing, hit-or-miss operation.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 170" dur="500" begin="0.5s"/>
  </section>
  <!-- Section 3: Types of Morphological Operations -->
  <section data-narration="Types of Morphological Operations">
    <rect x="20" y="220" width="380" height="50" fill="#fff" rx="5"/>
    <text x="20" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Erosion, dilation, opening, closing.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="0 240" dur="500" begin="1s"/>
  </section>
  <!-- Section 4: Mathematical Formulation -->
  <section data-narration="Mathematical Formulation">
    <rect x="20" y="290" width="380" height="50" fill="#fff" rx="5"/>
    <text x="20" y="320" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Erosion: Image \* Kernel, Dilation: Kernel \* Image, Opening: Eroded image \* Structuring element.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 290" to="0 310" dur="500" begin="1.5s"/>
  </section>
  <!-- Section 5: Implementation in PDE-9 -->
  <section data-narration="Implementation in PDE-9">
    <rect x="20" y="370" width="380" height="50" fill="#fff" rx="5"/>
    <text x="20" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Erosion, dilation, opening, closing implemented.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 370" to="0 390" dur="500" begin="2.5s"/>
  </section>
  <!-- Footer with arrow markers for connections -->
  <rect x="20" y="410" width="380" height="30" fill="#fff" rx="5"/>
  <line x1="20" y1="410" x2="400" y2="410" stroke="#3498db" stroke-width="2"/>
  <line x1="20" y1="410" x2="20" y2="400" stroke="#3498db" stroke-width="2"/>
  <line x1="400" y1="410" x2="400" y2="400" stroke="#3498db" stroke-width="2"/>
  <text x="20" y="430" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
    Morphological Image Processing
  </text>
</svg>