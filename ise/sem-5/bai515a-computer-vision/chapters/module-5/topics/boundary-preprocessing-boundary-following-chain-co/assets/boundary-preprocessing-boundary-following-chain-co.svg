  <section class="section">
    <h2>Boundary Preprocessing</h2>
    <div class="data-narration">
      Boundary preprocessing is an important step in morphological image processing.
      It involves converting the input image into a more manageable form to facilitate subsequent operations.
    </div>
  </section>
  <section class="section">
    <h2>Boundary Following</h2>
    <div class="data-narration">
      Boundary following is a technique used to extract the boundary of an object in an image.
      It involves tracing the outermost pixels of the object, which form the boundary.
    </div>
