<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="miss-transform">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Hit-or-Miss Transform: a powerful morphological operation for detecting specific patterns in binary images.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3949AB">Hit-or-Miss Transform</text>
    <line x1="110" y1="40" x2="310" y2="40" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="108" cy="40" r="3" fill="#E65100"/>
    <circle cx="312" cy="40" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Formula -->
  <g opacity="0" data-narration="The hit-or-miss transform formula: A circle-star B equals the intersection of erosion of A by B1 and erosion of A complement by B2. B1 matches the foreground, B2 matches the background.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <rect x="20" y="52" width="380" height="58" rx="8" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Formula</text>
    <text x="210" y="92" text-anchor="middle" font-family="monospace" font-size="12" fill="#00695C">A &#x229B; B = (A &#x2296; B1) &#x2229; (A&#x1D9C; &#x2296; B2)</text>
    <text x="210" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">B1 = foreground SE | B2 = background SE</text>
  </g>

  <!-- Group 3: Structuring Element Pair -->
  <g opacity="0" data-narration="The structuring element has two parts. B1 marks foreground pixels shown as ones. B2 marks background pixels shown as zeros. Don't-care positions are marked with X.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Structuring Element Pair</text>

    <!-- B1 grid -->
    <text x="100" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">B1 (Foreground)</text>
    <rect x="55" y="153" width="24" height="18" fill="#00695C" stroke="#333" stroke-width="0.5"/>
    <text x="67" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="white">1</text>
    <rect x="79" y="153" width="24" height="18" fill="#00695C" stroke="#333" stroke-width="0.5"/>
    <text x="91" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="white">1</text>
    <rect x="103" y="153" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="115" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>
    <rect x="55" y="171" width="24" height="18" fill="#00695C" stroke="#333" stroke-width="0.5"/>
    <text x="67" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="white">1</text>
    <rect x="79" y="171" width="24" height="18" fill="#00695C" stroke="#333" stroke-width="0.5"/>
    <text x="91" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="white">1</text>
    <rect x="103" y="171" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="115" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>
    <rect x="55" y="189" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="67" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>
    <rect x="79" y="189" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="91" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>
    <rect x="103" y="189" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="115" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>

    <!-- B2 grid -->
    <text x="320" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">B2 (Background)</text>
    <rect x="275" y="153" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="287" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>
    <rect x="299" y="153" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="311" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>
    <rect x="323" y="153" width="24" height="18" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="335" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="white">0</text>
    <rect x="275" y="171" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="287" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>
    <rect x="299" y="171" width="24" height="18" fill="#ccc" stroke="#333" stroke-width="0.5"/>
    <text x="311" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">X</text>
    <rect x="323" y="171" width="24" height="18" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="335" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="white">0</text>
    <rect x="275" y="189" width="24" height="18" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="287" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="white">0</text>
    <rect x="299" y="189" width="24" height="18" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="311" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="white">0</text>
    <rect x="323" y="189" width="24" height="18" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="335" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="white">0</text>
  </g>

  <!-- Group 4: Step-by-step process -->
  <g opacity="0" data-narration="The process has four steps. Step one: erode the image A by B1 to find foreground matches. Step two: compute the complement of A. Step three: erode the complement by B2 to find background matches. Step four: intersect both results to get the final output.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Step-by-Step Process</text>
    <rect x="20" y="235" width="175" height="22" rx="4" fill="#3949AB"/>
    <text x="108" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">1. Erode A by B1</text>
    <rect x="225" y="235" width="175" height="22" rx="4" fill="#00695C"/>
    <text x="313" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">2. Complement A</text>
    <rect x="20" y="261" width="175" height="22" rx="4" fill="#E65100"/>
    <text x="108" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">3. Erode complement by B2</text>
    <rect x="225" y="261" width="175" height="22" rx="4" fill="#C62828"/>
    <text x="313" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">4. Intersect Results</text>
  </g>

  <!-- Group 5: Visual example -->
  <g opacity="0" data-narration="Here is a visual example. A binary image contains an L-shaped corner pattern. The structuring element matches this specific pattern. The result highlights only the locations where the pattern is found.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Visual Example</text>

    <!-- Input image 4x4 -->
    <text x="62" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Input A</text>
    <rect x="30" y="318" width="16" height="14" fill="#333" stroke="#666" stroke-width="0.5"/>
    <rect x="46" y="318" width="16" height="14" fill="#333" stroke="#666" stroke-width="0.5"/>
    <rect x="62" y="318" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="78" y="318" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="30" y="332" width="16" height="14" fill="#333" stroke="#666" stroke-width="0.5"/>
    <rect x="46" y="332" width="16" height="14" fill="#333" stroke="#666" stroke-width="0.5"/>
    <rect x="62" y="332" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="78" y="332" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="30" y="346" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="46" y="346" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="62" y="346" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="78" y="346" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="30" y="360" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="46" y="360" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="62" y="360" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="78" y="360" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>

    <!-- Arrow -->
    <text x="120" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3949AB">&#x27A1;</text>

    <!-- SE -->
    <text x="175" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">SE (B)</text>
    <rect x="155" y="320" width="14" height="14" fill="#00695C" stroke="#333" stroke-width="0.5"/>
    <text x="162" y="331" text-anchor="middle" font-family="monospace" font-size="8" fill="white">1</text>
    <rect x="169" y="320" width="14" height="14" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="176" y="331" text-anchor="middle" font-family="monospace" font-size="8" fill="white">0</text>
    <rect x="155" y="334" width="14" height="14" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="162" y="345" text-anchor="middle" font-family="monospace" font-size="8" fill="white">0</text>
    <rect x="169" y="334" width="14" height="14" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="176" y="345" text-anchor="middle" font-family="monospace" font-size="8" fill="white">0</text>

    <!-- Arrow -->
    <text x="215" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3949AB">&#x27A1;</text>

    <!-- Result image -->
    <text x="300" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Result</text>
    <rect x="268" y="318" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="284" y="318" width="16" height="14" fill="#C62828" stroke="#666" stroke-width="0.5"/>
    <text x="292" y="329" text-anchor="middle" font-family="monospace" font-size="8" fill="white">&#x2713;</text>
    <rect x="300" y="318" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="316" y="318" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="268" y="332" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="284" y="332" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="300" y="332" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="316" y="332" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="268" y="346" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="284" y="346" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="300" y="346" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="316" y="346" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="268" y="360" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="284" y="360" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="300" y="360" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>
    <rect x="316" y="360" width="16" height="14" fill="white" stroke="#666" stroke-width="0.5"/>

    <text x="292" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C62828">Corner detected at (1,1)</text>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="Applications of the hit-or-miss transform include corner detection, pattern matching, template matching in binary images, and shape recognition.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="230" y="370" width="180" height="28" rx="6" fill="white" fill-opacity="0.8" stroke="#3949AB" stroke-width="1"/>
    <text x="320" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB">Applications</text>
    <text x="320" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C">Corner | Pattern | Template | Shape</text>
  </g>
</svg>
