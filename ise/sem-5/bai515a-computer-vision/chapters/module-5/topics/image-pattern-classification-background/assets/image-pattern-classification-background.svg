<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="image-pattern-classification-background">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Image Pattern Classification is the process of assigning category labels to images based on extracted features.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#3949AB">Image Pattern Classification</text>
    <line x1="100" y1="35" x2="320" y2="35" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="100" cy="35" r="3" fill="#E65100"/>
    <circle cx="320" cy="35" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Classification Pipeline -->
  <g opacity="0" data-narration="The pipeline starts with an input image, extracts features into a vector, passes it to a classifier, and outputs a class label.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Image Input -->
    <rect x="10" y="50" width="62" height="30" rx="5" fill="#3949AB"/>
    <text x="41" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Image Input</text>
    <!-- Arrow 1 -->
    <polygon points="76,65 84,61 84,69" fill="#00695C"/>
    <!-- Feature Extraction -->
    <rect x="88" y="50" width="78" height="30" rx="5" fill="#00695C"/>
    <text x="127" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Feature Extract.</text>
    <!-- Arrow 2 -->
    <polygon points="170,65 178,61 178,69" fill="#E65100"/>
    <!-- Feature Vector -->
    <rect x="182" y="50" width="68" height="30" rx="5" fill="#E65100"/>
    <text x="216" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Feature Vector</text>
    <!-- Arrow 3 -->
    <polygon points="254,65 262,61 262,69" fill="#C62828"/>
    <!-- Classifier -->
    <rect x="266" y="50" width="60" height="30" rx="5" fill="#C62828"/>
    <text x="296" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Classifier</text>
    <!-- Arrow 4 -->
    <polygon points="330,65 338,61 338,69" fill="#3949AB"/>
    <!-- Class Label -->
    <rect x="342" y="50" width="66" height="30" rx="5" fill="#3949AB"/>
    <text x="375" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Class Label</text>
  </g>

  <!-- Group 3: Feature Types as 4 cards -->
  <g opacity="0" data-narration="Key feature types include Texture for patterns, Shape for contours, Color for histograms, and Spatial for layout information.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Feature Types</text>
    <!-- Texture card -->
    <rect x="14" y="112" width="90" height="64" rx="6" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <text x="59" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Texture</text>
    <line x1="30" y1="136" x2="88" y2="136" stroke="#C5CAE9" stroke-width="1.5"/>
    <line x1="30" y1="141" x2="88" y2="141" stroke="#3949AB" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="30" y1="146" x2="88" y2="146" stroke="#C5CAE9" stroke-width="1.5"/>
    <line x1="30" y1="151" x2="88" y2="151" stroke="#3949AB" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="59" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Patterns</text>
    <!-- Shape card -->
    <rect x="114" y="112" width="90" height="64" rx="6" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <text x="159" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">Shape</text>
    <ellipse cx="159" cy="148" rx="22" ry="14" fill="none" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="145,150 159,138 173,150" fill="none" stroke="#00695C" stroke-width="1"/>
    <text x="159" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Contours</text>
    <!-- Color card -->
    <rect x="214" y="112" width="90" height="64" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <text x="259" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Color</text>
    <rect x="230" y="154" width="8" height="14" fill="#C62828" rx="1"/>
    <rect x="241" y="146" width="8" height="22" fill="#E65100" rx="1"/>
    <rect x="252" y="138" width="8" height="30" fill="#00695C" rx="1"/>
    <rect x="263" y="150" width="8" height="18" fill="#3949AB" rx="1"/>
    <rect x="274" y="156" width="8" height="12" fill="#C62828" rx="1"/>
    <text x="259" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Histograms</text>
    <!-- Spatial card -->
    <rect x="314" y="112" width="92" height="64" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
    <text x="360" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Spatial</text>
    <rect x="336" y="134" width="12" height="12" fill="#C5CAE9" stroke="#C62828" stroke-width="0.5"/>
    <rect x="350" y="134" width="12" height="12" fill="#E8EAF6" stroke="#C62828" stroke-width="0.5"/>
    <rect x="364" y="134" width="12" height="12" fill="#C5CAE9" stroke="#C62828" stroke-width="0.5"/>
    <rect x="336" y="148" width="12" height="12" fill="#E8EAF6" stroke="#C62828" stroke-width="0.5"/>
    <rect x="350" y="148" width="12" height="12" fill="#C5CAE9" stroke="#C62828" stroke-width="0.5"/>
    <rect x="364" y="148" width="12" height="12" fill="#E8EAF6" stroke="#C62828" stroke-width="0.5"/>
    <text x="360" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Layout</text>
  </g>

  <!-- Group 4: Decision Boundary in 2D Feature Space -->
  <g opacity="0" data-narration="A classifier learns a decision boundary in feature space to separate different classes, shown here with class A and class B dots.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Decision Boundary in 2D Feature Space</text>
    <!-- Axes -->
    <line x1="50" y1="290" x2="250" y2="290" stroke="#333" stroke-width="1.5"/>
    <line x1="50" y1="290" x2="50" y2="210" stroke="#333" stroke-width="1.5"/>
    <text x="150" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Feature 1</text>
    <text x="38" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333" transform="rotate(-90,38,250)">Feature 2</text>
    <!-- Decision boundary -->
    <line x1="60" y1="280" x2="240" y2="218" stroke="#3949AB" stroke-width="2" stroke-dasharray="6,3"/>
    <!-- Class A dots (above boundary) -->
    <circle cx="90" cy="230" r="5" fill="#00695C"/>
    <circle cx="120" cy="225" r="5" fill="#00695C"/>
    <circle cx="105" cy="240" r="5" fill="#00695C"/>
    <circle cx="140" cy="220" r="5" fill="#00695C"/>
    <circle cx="160" cy="218" r="5" fill="#00695C"/>
    <circle cx="130" cy="235" r="5" fill="#00695C"/>
    <circle cx="175" cy="215" r="5" fill="#00695C"/>
    <!-- Class B dots (below boundary) -->
    <circle cx="80" cy="270" r="5" fill="#E65100"/>
    <circle cx="110" cy="268" r="5" fill="#E65100"/>
    <circle cx="140" cy="260" r="5" fill="#E65100"/>
    <circle cx="95" cy="278" r="5" fill="#E65100"/>
    <circle cx="170" cy="255" r="5" fill="#E65100"/>
    <circle cx="200" cy="248" r="5" fill="#E65100"/>
    <circle cx="155" cy="270" r="5" fill="#E65100"/>
    <!-- Legend -->
    <circle cx="275" cy="225" r="5" fill="#00695C"/>
    <text x="285" y="228" font-family="Arial, sans-serif" font-size="9" fill="#00695C">Class A</text>
    <circle cx="275" cy="245" r="5" fill="#E65100"/>
    <text x="285" y="248" font-family="Arial, sans-serif" font-size="9" fill="#E65100">Class B</text>
    <line x1="265" y1="262" x2="310" y2="262" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="315" y="265" font-family="Arial, sans-serif" font-size="8" fill="#3949AB">Boundary</text>
  </g>

  <!-- Group 5: Common Approaches -->
  <g opacity="0" data-narration="Common approaches include template matching, statistical Bayesian methods, neural networks for deep learning, and support vector machines.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="370" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Approaches</text>
    <!-- Template Matching -->
    <rect x="280" y="206" width="130" height="22" rx="4" fill="white" stroke="#3949AB" stroke-width="1"/>
    <circle cx="292" cy="217" r="6" fill="#3949AB"/>
    <text x="292" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">T</text>
    <text x="306" y="220" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB">Template Match</text>
    <!-- Statistical -->
    <rect x="280" y="232" width="130" height="22" rx="4" fill="white" stroke="#00695C" stroke-width="1"/>
    <circle cx="292" cy="243" r="6" fill="#00695C"/>
    <text x="292" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">S</text>
    <text x="306" y="246" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00695C">Statistical (Bayes)</text>
    <!-- Neural Networks -->
    <rect x="280" y="258" width="130" height="22" rx="4" fill="white" stroke="#E65100" stroke-width="1"/>
    <circle cx="292" cy="269" r="6" fill="#E65100"/>
    <text x="292" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">N</text>
    <text x="306" y="272" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Neural Networks</text>
    <!-- SVM -->
    <rect x="280" y="284" width="130" height="22" rx="4" fill="white" stroke="#C62828" stroke-width="1"/>
    <circle cx="292" cy="295" r="6" fill="#C62828"/>
    <text x="292" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">V</text>
    <text x="306" y="298" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#C62828">SVM (Max Margin)</text>
  </g>

  <!-- Group 6: Performance Metrics -->
  <g opacity="0" data-narration="Performance is measured using accuracy, precision, recall, F1-score, and the confusion matrix to evaluate classification quality.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Performance Metrics</text>
    <!-- Metric pills -->
    <rect x="14" y="334" width="70" height="22" rx="11" fill="#3949AB"/>
    <text x="49" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Accuracy</text>
    <rect x="92" y="334" width="70" height="22" rx="11" fill="#00695C"/>
    <text x="127" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Precision</text>
    <rect x="170" y="334" width="56" height="22" rx="11" fill="#E65100"/>
    <text x="198" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Recall</text>
    <rect x="234" y="334" width="62" height="22" rx="11" fill="#C62828"/>
    <text x="265" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">F1-Score</text>
    <!-- Confusion Matrix mini -->
    <rect x="308" y="332" width="100" height="58" rx="6" fill="white" stroke="#3949AB" stroke-width="1"/>
    <text x="358" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB">Confusion Matrix</text>
    <line x1="338" y1="348" x2="338" y2="386" stroke="#C5CAE9" stroke-width="1"/>
    <line x1="318" y1="358" x2="398" y2="358" stroke="#C5CAE9" stroke-width="1"/>
    <text x="325" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">Pred</text>
    <text x="313" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666" transform="rotate(-90,313,370)">Act</text>
    <!-- TP -->
    <rect x="340" y="360" width="26" height="12" rx="2" fill="#00695C" opacity="0.8"/>
    <text x="353" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">TP</text>
    <!-- FP -->
    <rect x="370" y="360" width="26" height="12" rx="2" fill="#E65100" opacity="0.6"/>
    <text x="383" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">FP</text>
    <!-- FN -->
    <rect x="340" y="374" width="26" height="12" rx="2" fill="#E65100" opacity="0.6"/>
    <text x="353" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">FN</text>
    <!-- TN -->
    <rect x="370" y="374" width="26" height="12" rx="2" fill="#00695C" opacity="0.8"/>
    <text x="383" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">TN</text>
  </g>
</svg>
