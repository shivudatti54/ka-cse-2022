<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="morphological-image-processing-preliminaries-erosion-and-dilation-opening-and-closing-hit-or-miss-transform">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title Section -->
  <section data-narration="Overview">
    <text x="10" y="10" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Morphological Image Processing</text>
  </section>

  <!-- Section 1: Morphological Operations -->
  <section data-narration="Definitions">
    <rect x="10" y="50" width="400" height="50" fill="#F7F7F7"/>
    <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Morphological Operations</text>
    <text x="10" y="80" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Reduce size of objects by removing small details and noise</text>
  </section>

  <!-- Section 2: Erosion -->
  <section data-narration="Erosion">
    <rect x="10" y="120" width="400" height="50" fill="#F7F7F7"/>
    <text x="10" y="130" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Erosion</text>
    <text x="10" y="150" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Reduces size of objects by removing small details and noise</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="10s" begin="0s"/>
  </section>

  <!-- Section 3: Dilation -->
  <section data-narration="Dilation">
    <rect x="10" y="180" width="400" height="50" fill="#F7F7F7"/>
    <text x="10" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Dilation</text>
    <text x="10" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Increases size of objects by adding new details and noise</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="10s" begin="2s"/>
  </section>

  <!-- Section 4: Opening -->
  <section data-narration="Opening">
    <rect x="10" y="240" width="400" height="50" fill="#F7F7F7"/>
    <text x="10" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Opening</text>
    <text x="10" y="270" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Removes small details and noise while preserving large features</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="10s" begin="4s"/>
  </section>

  <!-- Section 5: Closing -->
  <section data-narration="Closing">
    <rect x="10" y="300" width="400" height="50" fill="#F7F7F7"/>
    <text x="10" y="310" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Closing</text>
    <text x="10" y="330" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Preserves large features while removing small details and noise</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="10s" begin="6s"/>
  </section>

  <!-- Section 6: Hit-or-Miss Transform -->
  <section data-narration="Hit-or-Miss Transform">
    <rect x="10" y="350" width="400" height="50" fill="#F7F7F7"/>
    <text x="10" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Hit-or-Miss Transform</text>
    <text x="10" y="380" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Finds objects in an image based on their shape and structure</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="10s" begin="8s"/>
  </section>

  <!-- Footer -->
  <footer>
    <text x="10" y="380" font-size="14" font-family="Arial, sans-serif" text-anchor="start">Morphological Image Processing</text>
  </footer>
</svg>