<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="some-basic-morphological-algorithms">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Morphological Algorithms are fundamental operations in image processing that analyze shapes in binary and grayscale images using a structuring element.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3949AB">Morphological Algorithms</text>
    <line x1="100" y1="40" x2="320" y2="40" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="100" cy="40" r="3" fill="#E65100"/>
    <circle cx="320" cy="40" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Erosion -->
  <g opacity="0" data-narration="Erosion slides a structuring element over the image and sets each pixel to the minimum value in its neighborhood. This shrinks objects and removes thin protrusions.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="105" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Erosion</text>
    <!-- Before label -->
    <text x="55" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00695C">Before</text>
    <!-- 5x4 grid before - larger blob -->
    <rect x="30" y="88" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="42" y="88" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="54" y="88" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="66" y="88" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="78" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="30" y="100" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="42" y="100" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="54" y="100" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="66" y="100" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="78" y="100" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="30" y="112" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="42" y="112" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="54" y="112" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="66" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="78" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="30" y="124" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="42" y="124" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="54" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="66" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="78" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <!-- Arrow -->
    <polygon points="96,108 104,112 96,116" fill="#E65100"/>
    <!-- After label -->
    <text x="150" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#C62828">After</text>
    <!-- After: eroded (smaller) -->
    <rect x="126" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="138" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="150" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="162" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="174" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="126" y="100" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="138" y="100" width="12" height="12" fill="#C62828" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="150" y="100" width="12" height="12" fill="#C62828" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="162" y="100" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="174" y="100" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="126" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="138" y="112" width="12" height="12" fill="#C62828" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="150" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="162" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="174" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="126" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="138" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="150" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="162" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="174" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="105" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">Shrinks objects, removes protrusions</text>
  </g>

  <!-- Group 3: Dilation -->
  <g opacity="0" data-narration="Dilation slides the structuring element over the image and sets each pixel to the maximum in its neighborhood. This grows objects and fills small holes.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="330" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3949AB">Dilation</text>
    <!-- Before label -->
    <text x="264" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00695C">Before</text>
    <!-- Before: small shape -->
    <rect x="240" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="252" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="264" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="276" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="240" y="100" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="252" y="100" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="264" y="100" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="276" y="100" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="240" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="252" y="112" width="12" height="12" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="264" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="276" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="240" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="252" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="264" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="276" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <!-- Arrow -->
    <polygon points="294,108 302,112 294,116" fill="#E65100"/>
    <!-- After label -->
    <text x="345" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#C62828">After</text>
    <!-- After: expanded shape -->
    <rect x="316" y="88" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="328" y="88" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="340" y="88" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="352" y="88" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="316" y="100" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="328" y="100" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="340" y="100" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="352" y="100" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="316" y="112" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="328" y="112" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="340" y="112" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="352" y="112" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="316" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="328" y="124" width="12" height="12" fill="#00695C" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="340" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="352" y="124" width="12" height="12" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="330" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">Grows objects, fills small holes</text>
  </g>

  <!-- Group 4: Opening and Closing -->
  <g opacity="0" data-narration="Opening is erosion followed by dilation. It smooths contours and breaks thin connections. Closing is dilation followed by erosion. It fills small gaps and fuses narrow breaks.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <!-- Opening box -->
    <rect x="15" y="165" width="185" height="80" rx="8" fill="white" fill-opacity="0.5" stroke="#3949AB" stroke-width="1.2"/>
    <text x="107" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3949AB">Opening</text>
    <rect x="28" y="192" width="58" height="22" rx="4" fill="#3949AB"/>
    <text x="57" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Erosion</text>
    <line x1="88" y1="203" x2="108" y2="203" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="106,199 114,203 106,207" fill="#E65100"/>
    <rect x="116" y="192" width="58" height="22" rx="4" fill="#00695C"/>
    <text x="145" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Dilation</text>
    <text x="107" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">Smooths contours, breaks thin connections</text>
    <!-- Closing box -->
    <rect x="220" y="165" width="185" height="80" rx="8" fill="white" fill-opacity="0.5" stroke="#E65100" stroke-width="1.2"/>
    <text x="312" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100">Closing</text>
    <rect x="233" y="192" width="58" height="22" rx="4" fill="#00695C"/>
    <text x="262" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Dilation</text>
    <line x1="293" y1="203" x2="313" y2="203" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="311,199 319,203 311,207" fill="#E65100"/>
    <rect x="321" y="192" width="58" height="22" rx="4" fill="#3949AB"/>
    <text x="350" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Erosion</text>
    <text x="312" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100">Fills small gaps, fuses narrow breaks</text>
  </g>

  <!-- Group 5: Structuring Element -->
  <g opacity="0" data-narration="The structuring element is a small shape like a cross, square, or disk that defines the neighborhood for morphological operations. Here are three common 3 by 3 examples.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3949AB">Structuring Elements (3x3)</text>
    <!-- Cross -->
    <text x="80" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00695C">Cross</text>
    <rect x="68" y="290" width="10" height="10" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="78" y="290" width="10" height="10" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="88" y="290" width="10" height="10" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="68" y="300" width="10" height="10" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="78" y="300" width="10" height="10" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="88" y="300" width="10" height="10" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="68" y="310" width="10" height="10" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="78" y="310" width="10" height="10" fill="#3949AB" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="88" y="310" width="10" height="10" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <!-- Square -->
    <text x="210" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00695C">Square</text>
    <rect x="198" y="290" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="208" y="290" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="218" y="290" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="198" y="300" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="208" y="300" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="218" y="300" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="198" y="310" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="208" y="310" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="218" y="310" width="10" height="10" fill="#E65100" stroke="#C5CAE9" stroke-width="0.5"/>
    <!-- Disk (approximate) -->
    <text x="340" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00695C">Disk</text>
    <rect x="328" y="290" width="10" height="10" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="338" y="290" width="10" height="10" fill="#C62828" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="348" y="290" width="10" height="10" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="328" y="300" width="10" height="10" fill="#C62828" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="338" y="300" width="10" height="10" fill="#C62828" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="348" y="300" width="10" height="10" fill="#C62828" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="328" y="310" width="10" height="10" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="338" y="310" width="10" height="10" fill="#C62828" stroke="#C5CAE9" stroke-width="0.5"/>
    <rect x="348" y="310" width="10" height="10" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="Morphological algorithms are widely applied for noise removal, edge detection, feature extraction, and object segmentation in computer vision systems.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3949AB">Applications</text>
    <rect x="18" y="354" width="88" height="28" rx="6" fill="#3949AB"/>
    <text x="62" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Noise Removal</text>
    <rect x="116" y="354" width="88" height="28" rx="6" fill="#00695C"/>
    <text x="160" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Edge Detection</text>
    <rect x="214" y="354" width="92" height="28" rx="6" fill="#E65100"/>
    <text x="260" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Feature Extraction</text>
    <rect x="316" y="354" width="88" height="28" rx="6" fill="#C62828"/>
    <text x="360" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Segmentation</text>
  </g>
</svg>
