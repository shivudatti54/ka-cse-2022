<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g id="step1" class="step" data-narration="The degradation model shows how original images become corrupted. The equation g(x,y) equals h(x,y) convolved with f(x,y), plus noise η(x,y). Each term represents a key part of image degradation.">
    <text x="30" y="35" font-size="20" font-weight="bold" fill="#1976d2">Image Degradation Model Equation</text>
    <text x="30" y="60" font-size="14" fill="#388e3c">g(x,y) = h(x,y) * f(x,y) + η(x,y)</text>
    <rect x="30" y="75" width="220" height="55" fill="#e3f2fd" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="92" font-size="10" fill="#333">f(x,y): Original image</text>
    <text x="40" y="107" font-size="10" fill="#333">h(x,y): PSF/Blur function</text>
    <text x="40" y="122" font-size="10" fill="#333">η(x,y): Additive noise</text>
  </g>

  <g id="step2" class="step" data-narration="The degradation process flows from left to right. First, the original image undergoes convolution with the Point Spread Function, which causes blurring effects like motion or out-of-focus blur.">
    <text x="30" y="155" font-size="18" font-weight="bold" fill="#1976d2">Degradation Process Flow</text>
    <rect x="30" y="175" width="80" height="45" fill="#1976d2" rx="4"/>
    <text x="40" y="202" font-size="9" fill="#fff" text-anchor="middle">Original</text>
    <text x="42" y="213" font-size="8" fill="#fff" text-anchor="middle">f(x,y)</text>
    <line x1="110" y1="197" x2="150" y2="197" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="150" y="175" width="80" height="45" fill="#ff9800" rx="4"/>
    <text x="160" y="202" font-size="9" fill="#fff" text-anchor="middle">Convolution</text>
    <text x="162" y="213" font-size="8" fill="#fff" text-anchor="middle">with PSF</text>
    <line x1="230" y1="197" x2="270" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="270" y="175" width="80" height="45" fill="#9c27b0" rx="4"/>
    <text x="280" y="202" font-size="9" fill="#fff" text-anchor="middle">Add Noise</text>
    <text x="282" y="213" font-size="8" fill="#fff" text-anchor="middle">η(x,y)</text>
    <line x1="350" y1="197" x2="390" y2="197" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="390" y="175" width="80" height="45" fill="#f44336" rx="4"/>
    <text x="400" y="202" font-size="9" fill="#fff" text-anchor="middle">Degraded</text>
    <text x="402" y="213" font-size="8" fill="#fff" text-anchor="middle">g(x,y)</text>
  </g>

  <g id="step3" class="step" data-narration="In the frequency domain, convolution becomes simple multiplication. The equation G equals H times F plus N, where each term is the Fourier Transform of its spatial domain counterpart.">
    <text x="30" y="245" font-size="18" font-weight="bold" fill="#1976d2">Frequency Domain Representation</text>
    <text x="30" y="265" font-size="13" fill="#388e3c">G(u,v) = H(u,v) × F(u,v) + N(u,v)</text>
    <rect x="30" y="280" width="160" height="50" fill="#e8f5e9" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="298" font-size="10" fill="#333">H(u,v): Optical Transfer</text>
    <text x="40" y="312" font-size="10" fill="#333">Function (OTF/MTF)</text>
    <text x="200" y="300" font-size="9" fill="#666">Convolution → Multiplication</text>
    <text x="200" y="315" font-size="9" fill="#666">(Fourier Transform)</text>
  </g>

  <g id="step4" class="step" data-narration="Common blur types include motion blur from camera movement, out-of-focus blur from lens errors, and atmospheric turbulence blur in long-range imaging. Each has a distinct Point Spread Function shape.">
    <text x="30" y="350" font-size="18" font-weight="bold" fill="#1976d2">Types of Blur / PSF</text>
    <rect x="30" y="370" width="70" height="45" fill="#e3f2fd" rx="3"/>
    <text x="35" y="390" font-size="8" fill="#333" text-anchor="middle">Motion Blur</text>
    <rect x="35" y="398" width="60" height="8" fill="#1976d2" rx="1"/>
    <rect x="110" y="370" width="70" height="45" fill="#fff3e0" rx="3"/>
    <text x="115" y="390" font-size="8" fill="#333" text-anchor="middle">Out-of-Focus</text>
    <circle cx="145" cy="392" r="10" fill="#ff9800" opacity="0.6"/>
    <rect x="190" y="370" width="70" height="45" fill="#f3e5f5" rx="3"/>
    <text x="195" y="390" font-size="8" fill="#333" text-anchor="middle">Gaussian</text>
    <ellipse cx="225" cy="392" rx="15" ry="8" fill="#9c27b0" opacity="0.5"/>
  </g>

  <g id="step5" class="step" data-narration="Noise models include Gaussian from electronic sensors, Salt-and-Pepper from transmission errors, and Rayleigh noise common in range imaging. Each has unique probability density characteristics.">
    <text x="30" y="435" font-size="18" font-weight="bold" fill="#1976d2">Common Noise Types</text>
    <rect x="30" y="455" width="100" height="50" fill="#e3f2fd" rx="3"/>
    <text x="40" y="472" font-size="10" fill="#333">Gaussian</text>
    <text x="40" y="486" font-size="8" fill="#666">Sensor/circuit noise</text>
    <rect x="140" y="455" width="100" height="50" fill="#e8f5e9" rx="3"/>
    <text x="150" y="472" font-size="10" fill="#333">Salt-and-Pepper</text>
    <text x="150" y="486" font-size="8" fill="#666">Transmission errors</text>
    <circle cx="165" cy="478" r="2" fill="#000"/>
    <circle cx="175" cy="482" r="2" fill="#fff"/>
    <circle cx="185" cy="475" r="2" fill="#000"/>
    <rect x="250" y="455" width="100" height="50" fill="#fff3e0" rx="3"/>
    <text x="260" y="472" font-size="10" fill="#333">Rayleigh</text>
    <text x="260" y="486" font-size="8" fill="#666">Range imaging</text>
  </g>

  <g id="step6" class="step" data-narration="Restoration reverses degradation using inverse filtering or Wiener filtering. Inverse filtering divides by H but amplifies noise. Wiener filtering adds a constant K to stabilize results against noise.">
    <text x="400" y="35" font-size="18" font-weight="bold" fill="#1976d2">Image Restoration</text>
    <rect x="400" y="55" width="130" height="40" fill="#f44336" rx="3"/>
    <text x="415" y="75" font-size="10" fill="#fff" text-anchor="middle">Degraded Image g(x,y)</text>
    <line x1="530" y1="75" x2="570" y2="75" stroke="#f44336" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="570" y="55" width="130" height="40" fill="#9c27b0" rx="3"/>
    <text x="585" y="75" font-size="10" fill="#fff" text-anchor="middle">Estimate H and Noise</text>
    <line x1="700" y1="75" x2="740" y2="75" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="400" y="105" width="340" height="45" fill="#f3e5f5" rx="3"/>
    <text x="410" y="122" font-size="10" fill="#333">Inverse Filter: F̂ = G/H (amplifies noise!)</text>
    <text x="410" y="138" font-size="10" fill="#333">Wiener Filter: F̂ = G × (|H|²/(|H|²+K)) / H (stable)</text>
    <line x1="570" y1="150" x2="570" y2="180" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="480" y="180" width="180" height="45" fill="#388e3c" rx="3"/>
    <text x="520" y="207" font-size="12" fill="#fff" text-anchor="middle">Restored Image f̂(x,y)</text>
  </g>

  <g id="step7" class="step" data-narration="The restoration process has three main steps: identify the degradation model, apply the restoration filter, and reconstruct the estimated original image. Success depends on accurate PSF estimation.">
    <text x="400" y="250" font-size="18" font-weight="bold" fill="#1976d2">Restoration Process Steps</text>
    <rect x="400" y="270" width="340" height="90" fill="#e3f2fd" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="410" y="290" font-size="11" fill="#333">Step 1: Model Identification - Analyze imaging system or use</text>
    <text x="410" y="305" font-size="11" fill="#333">blind deconvolution to estimate h(x,y) and noise.</text>
    <text x="410" y="325" font-size="11" fill="#333">Step 2: Apply Filter - Use Inverse or Wiener filter</text>
    <text x="410" y="340" font-size="11" fill="#333">with identified model parameters.</text>
    <text x="410" y="355" font-size="11" fill="#333">Step 3: Reconstruction - Obtain f̂(x,y) estimate.</text>
  </g>

  <g id="step8" class="step" data-narration="Key differences: Inverse filtering ignores noise and amplifies it badly when H is small. Wiener filtering explicitly accounts for noise using the noise-to-signal power ratio K, producing smoother results.">
    <text x="400" y="380" font-size="18" font-weight="bold" fill="#1976d2">Inverse vs Wiener Filter Comparison</text>
    <rect x="400" y="400" width="165" height="80" fill="#ffebee" rx="3"/>
    <text x="410" y="418" font-size="11" font-weight="bold" fill="#f44336">Inverse Filter</text>
    <text x="410" y="434" font-size="9" fill="#333">• Formula: F̂ = G/H</text>
    <text x="410" y="446" font-size="9" fill="#333">• Ignores noise term</text>
    <text x="410" y="458" font-size="9" fill="#333">• Catastrophic when H≈0</text>
    <text x="410" y="470" font-size="9" fill="#333">• Simple but unstable</text>
    <rect x="575" y="400" width="165" height="80" fill="#e8f5e9" rx="3"/>
    <text x="585" y="418" font-size="11" font-weight="bold" fill="#388e3c">Wiener Filter</text>
    <text x="585" y="434" font-size="9" fill="#333">• Formula: F̂ = G × (|H|²/(|H|²+K)) / H</text>
    <text x="585" y="446" font-size="9" fill="#333">• Accounts for noise</text>
    <text x="585" y="458" font-size="9" fill="#333">• K = noise-to-signal ratio</text>
    <text x="585" y="470" font-size="9" fill="#333">• Smoother, robust results</text>
  </g>

  <g id="step9" class="step" data-narration="Remember: The key equation g equals h convolved with f plus noise. Restoration needs accurate PSF knowledge. Wiener filter is preferred over inverse due to noise handling. These are exam essentials.">
    <text x="400" y="500" font-size="18" font-weight="bold" fill="#1976d2">Key Takeaways</text>
    <rect x="400" y="520" width="340" height="55" fill="#fff3e0" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="410" y="538" font-size="10" fill="#333">• Model: g = h * f + η (spatial), G = H × F + N (frequency)</text>
    <text x="410" y="552" font-size="10" fill="#333">• PSF characterizes blur; success depends on accurate PSF estimation</text>
    <text x="410" y="566" font-size="10" fill="#333">• Restoration is inverse of degradation; Wiener handles noise better</text>
  </g>
</svg>