<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="22" font-weight="bold" fill="#1976d2" text-anchor="middle">Periodic Noise Reduction by Frequency Domain Filtering</text>
  <line x1="100" y1="45" x2="700" y2="45" stroke="#1976d2" stroke-width="2"/>
  
  <!-- Step 1: What is Periodic Noise -->
  <g id="step1" class="step" data-narration="Periodic noise appears as regular repeating patterns like stripes or grid lines in images. It follows a sinusoidal function with specific frequency and amplitude.">
    <text x="50" y="70" font-size="14" font-weight="bold" fill="#1976d2">Step 1: What is Periodic Noise?</text>
    <rect x="50" y="85" width="160" height="60" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="60" y="105" font-size="11" fill="#333">f(x) = A × sin(2πfx) + n(x)</text>
    <text x="60" y="125" font-size="10" fill="#666">Amplitude, Frequency, Noise</text>
    <!-- Visual: sine wave representation -->
    <path d="M230 95 Q250 75, 270 95 Q290 115, 310 95 Q330 75, 350 95" fill="none" stroke="#ff9800" stroke-width="2"/>
    <path d="M230 125 Q250 105, 270 125 Q290 145, 310 125 Q330 105, 350 125" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="230" y="155" font-size="10" fill="#666">Repeating Pattern</text>
    <circle cx="400" cy="115" r="25" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="112" font-size="10" text-anchor="middle" fill="#333">Noisy</text>
    <text x="400" y="125" font-size="10" text-anchor="middle" fill="#333">Image</text>
  </g>
  
  <!-- Step 2: Noise Models -->
  <g id="step2" class="step" data-narration="Three main noise types affect images: Gaussian noise (random bell-shaped分布), salt and pepper (random black and white pixels), and impulsive noise (sudden bright spikes).">
    <text x="50" y="175" font-size="14" font-weight="bold" fill="#388e3c">Step 2: Noise Models</text>
    <!-- Gaussian -->
    <rect x="50" y="195" width="70" height="45" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="85" y="215" font-size="9" text-anchor="middle" fill="#333">Gaussian</text>
    <path d="M60 230 Q70 225, 80 230 Q90 225, 100 230" fill="none" stroke="#388e3c" stroke-width="1"/>
    <!-- Salt and Pepper -->
    <rect x="140" y="195" width="70" height="45" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="175" y="215" font-size="9" text-anchor="middle" fill="#333">Salt &amp; Pepper</text>
    <circle cx="160" cy="228" r="2" fill="#000"/><circle cx="175" cy="225" r="2" fill="#fff"/><circle cx="190" cy="230" r="2" fill="#000"/>
    <!-- Impulsive -->
    <rect x="230" y="195" width="70" height="45" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="265" y="215" font-size="9" text-anchor="middle" fill="#333">Impulsive</text>
    <line x1="265" y1="225" x2="265" y2="235" stroke="#9c27b0" stroke-width="2"/>
    <text x="330" y="220" font-size="10" fill="#666">→ Image Degradation</text>
  </g>
  
  <!-- Step 3: FFT Conversion -->
  <g id="step3" class="step" data-narration="The process begins by converting the noisy image from spatial domain to frequency domain using Fast Fourier Transform (FFT). This reveals frequency components.">
    <text x="50" y="270" font-size="14" font-weight="bold" fill="#1976d2">Step 3: Convert to Frequency Domain (FFT)</text>
    <rect x="50" y="290" width="120" height="50" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="110" y="315" font-size="10" text-anchor="middle" fill="#333">Noisy Image</text>
    <text x="110" y="330" font-size="8" text-anchor="middle" fill="#666">(Spatial Domain)</text>
    <path d="M190 y="310" L230 315" marker-end="url(#arrowBlue)"/>
    <rect x="250" y="290" width="120" height="50" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="310" y="310" font-size="11" text-anchor="middle" fill="#333">FFT</text>
    <text x="310" y="325" font-size="8" text-anchor="middle" fill="#666">Fast Fourier</text>
    <text x="310" y="335" font-size="8" text-anchor="middle" fill="#666">Transform</text>
    <path d="M390 y="310" L430 315" marker-end="url(#arrowBlue)"/>
    <!-- Frequency spectrum representation -->
    <rect x="450" y="285" width="130" height="60" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <circle cx="515" cy="315" r="20" fill="#ff9800" opacity="0.3"/>
    <circle cx="515" cy="315" r="12" fill="#ff9800" opacity="0.5"/>
    <circle cx="515" cy="315" r="5" fill="#ff9800"/>
    <text x="515" y="360" font-size="9" text-anchor="middle" fill="#333">Frequency Spectrum</text>
    <!-- Mark noise frequencies -->
    <circle cx="480" cy="300" r="4" fill="#f44336"/>
    <circle cx="550" cy="300" r="4" fill="#f44336"/>
    <text x="515" y="295" font-size="8" text-anchor="middle" fill="#f44336">Noise Peaks</text>
  </g>
  
  <!-- Step 4: Filter Types -->
  <g id="step4" class="step" data-narration="Three filter types work in frequency domain: low-pass removes high frequencies (smooths), high-pass keeps edges, and band-pass isolates specific frequency bands.">
    <text x="50" y="380" font-size="14" font-weight="bold" fill="#388e3c">Step 4: Choose Filter Type</text>
    <!-- Low-pass -->
    <rect x="50" y="400" width="80" height="45" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="90" y="418" font-size="9" text-anchor="middle" fill="#333">Low-Pass</text>
    <text x="90" y="432" font-size="8" text-anchor="middle" fill="#666">Keep low freq</text>
    <!-- High-pass -->
    <rect x="150" y="400" width="80" height="45" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="190" y="418" font-size="9" text-anchor="middle" fill="#333">High-Pass</text>
    <text x="190" y="432" font-size="8" text-anchor="middle" fill="#666">Keep high freq</text>
    <!-- Band-pass -->
    <rect x="250" y="400" width="80" height="45" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="290" y="418" font-size="9" text-anchor="middle" fill="#333">Band-Pass</text>
    <text x="290" y="432" font-size="8" text-anchor="middle" fill="#666">Keep band</text>
    <text x="350" y="420" font-size="10" fill="#666">→ Filter out noise peaks</text>
    <!-- Filter visualization -->
    <rect x="450" y="400" width="100" height="45" fill="#ffebee" stroke="#f44336" rx="5"/>
    <text x="500" y="418" font-size="9" text-anchor="middle" fill="#333">Notch/Band</text>
    <text x="500" y="432" font-size="8" text-anchor="middle" fill="#666">Stop Filter</text>
    <line x1="480" y1="415" x2="520" y2="415" stroke="#f44336" stroke-width="2"/>
  </g>
  
  <!-- Step 5: Inverse FFT and Result -->
  <g id="step5" class="step" data-narration="After filtering, apply inverse FFT to convert back to spatial domain, producing a clean image with periodic noise removed while preserving important image details.">
    <text x="50" y="480" font-size="14" font-weight="bold" fill="#1976d2">Step 5: Inverse FFT &amp; Result</text>
    <path d="M110 y="490" L150 495" marker-end="url(#arrowOrange)"/>
    <rect x="170" y="475" width="100" height="45" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="220" y="495" font-size="10" text-anchor="middle" fill="#333">Apply Filter</text>
    <text x="220" y="508" font-size="8" text-anchor="middle" fill="#666">Remove noise freq</text>
    <path d="M290 y="490" L330 495" marker-end="url(#arrowOrange)"/>
    <rect x="350" y="475" width="100" height="45" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="400" y="495" font-size="10" text-anchor="middle" fill="#333">Inverse FFT</text>
    <text x="400" y="508" font-size="8" text-anchor="middle" fill="#666">IFFT</text>
    <path d="M470 y="490" L510 495" marker-end="url(#arrowOrange)"/>
    <circle cx="560" cy="497" r="25" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="560" y="494" font-size="10" text-anchor="middle" fill="#333">Clean</text>
    <text x="560" y="507" font-size="10" text-anchor="middle" fill="#333">Image</text>
  </g>
  
  <!-- Step 6: Applications -->
  <g id="step6" class="step" data-narration="This technique applies to medical imaging, astronomy, and surveillance. Advantages include efficient processing, simple implementation, and compatibility with other restoration methods.">
    <text x="50" y="545" font-size="14" font-weight="bold" fill="#9c27b0">Step 6: Applications &amp; Advantages</text>
    <rect x="50" y="560" width="90" height="30" fill="#f3e5f5" stroke="#9c27b0" rx="4"/>
    <text x="95" y="578" font-size="9" text-anchor="middle" fill="#333">Medical Imaging</text>
    <rect x="150" y="560" width="90" height="30" fill="#f3e5f5" stroke="#9c27b0" rx="4"/>
    <text x="195" y="578" font-size="9" text-anchor="middle" fill="#333">Astronomy</text>
    <rect x="250" y="560" width="90" height="30" fill="#f3e5f5" stroke="#9c27b0" rx="4"/>
    <text x="295" y="578" font-size="9" text-anchor="middle" fill="#333">Surveillance</text>
    <rect x="350" y="560" width="90" height="30" fill="#e8f5e9" stroke="#388e3c" rx="4"/>
    <text x="395" y="575" font-size="8" text-anchor="middle" fill="#333">Efficient</text>
    <text x="395" y="585" font-size="8" text-anchor="middle" fill="#333">Effective</text>
    <rect x="450" y="560" width="90" height="30" fill="#e8f5e9" stroke="#388e3c" rx="4"/>
    <text x="495" y="575" font-size="8" text-anchor="middle" fill="#333">Easy to</text>
    <text x="495" y="585" font-size="8" text-anchor="middle" fill="#333">Implement</text>
  </g>
</svg>