<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#ffb74d"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#ba68c8"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f57c00"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7b1fa2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <text x="400" y="30" font-size="22" font-weight="bold" fill="#1976d2" text-anchor="middle">The Digital Camera: Image Formation Pipeline</text>
  
  <g id="step1" class="step" data-narration="The digital camera acts as the eye of a computer vision system. It captures light from a scene and converts it into a digital image—a matrix of numbers that computers can process and analyze for understanding.">
    <rect x="40" y="50" width="200" height="60" rx="8" fill="url(#blueGrad)"/>
    <text x="140" y="75" font-size="14" fill="white" text-anchor="middle">Physical Scene</text>
    <text x="140" y="92" font-size="11" fill="#e3f2fd" text-anchor="middle">(3D World)</text>
    <line x1="240" y1="80" x2="300" y2="80" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="300" y="50" width="120" height="60" rx="8" fill="url(#orangeGrad)"/>
    <text x="360" y="75" font-size="14" fill="white" text-anchor="middle">Camera Lens</text>
    <text x="360" y="92" font-size="11" fill="#fff3e0" text-anchor="middle">+ Aperture</text>
    <line x1="420" y1="80" x2="480" y2="80" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="480" y="50" width="140" height="60" rx="8" fill="url(#greenGrad)"/>
    <text x="550" y="75" font-size="14" fill="white" text-anchor="middle">Image Sensor</text>
    <text x="550" y="92" font-size="11" fill="#e8f5e9" text-anchor="middle">(CCD/CMOS)</text>
    <line x1="620" y1="80" x2="680" y2="80" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="680" y="50" width="80" height="60" rx="8" fill="url(#purpleGrad)"/>
    <text x="720" y="80" font-size="14" fill="white" text-anchor="middle">Digital</text>
    <text x="720" y="95" font-size="14" fill="white" text-anchor="middle">Image</text>
  </g>
  
  <g id="step2" class="step" data-narration="The lens performs perspective projection, transforming 3D to 2D. Focal length controls magnification—longer focal lengths give telephoto effects while shorter ones provide wide-angle views. The aperture controls light amount.">
    <rect x="40" y="125" width="160" height="55" rx="8" fill="url(#orangeGrad)"/>
    <text x="120" y="150" font-size="13" fill="white" text-anchor="middle">LENS PROPERTIES</text>
    <text x="120" y="168" font-size="10" fill="#fff3e0" text-anchor="middle">Perspective Projection</text>
    <rect x="210" y="125" width="90" height="25" rx="5" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
    <text x="255" y="142" font-size="10" fill="#e65100" text-anchor="middle">Focal Length</text>
    <text x="255" y="155" font-size="9" fill="#f57c00" text-anchor="middle">Telephoto / Wide</text>
    <rect x="310" y="125" width="70" height="25" rx="5" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
    <text x="345" y="142" font-size="10" fill="#e65100" text-anchor="middle">Aperture</text>
    <text x="345" y="155" font-size="9" fill="#f57c00" text-anchor="middle">f/2.8 - f/16</text>
    <rect x="40" y="190" width="340" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="210" y="210" font-size="12" fill="#1565c0" text-anchor="middle">Lens focuses light rays onto the image sensor plane</text>
    <text x="210" y="225" font-size="10" fill="#1976d2" text-anchor="middle">Aperture (f-stop) controls light quantity - lower f = larger opening</text>
  </g>
  
  <g id="step3" class="step" data-narration="The image sensor contains millions of photosites that convert photons to electrical signals. CCD sensors offer higher quality with global shutter but use more power. CMOS sensors are cheaper, faster, and dominate modern cameras.">
    <rect x="40" y="250" width="160" height="55" rx="8" fill="url(#greenGrad)"/>
    <text x="120" y="275" font-size="13" fill="white" text-anchor="middle">CCD SENSOR</text>
    <text x="120" y="293" font-size="10" fill="#e8f5e9" text-anchor="middle">Higher quality, Global shutter</text>
    <text x="120" y="306" font-size="9" fill="#c8e6c9" text-anchor="middle">Higher power, slower readout</text>
    <rect x="210" y="250" width="170" height="55" rx="8" fill="url(#blueGrad)"/>
    <text x="295" y="275" font-size="13" fill="white" text-anchor="middle">CMOS SENSOR</text>
    <text x="295" y="293" font-size="10" fill="#e3f2fd" text-anchor="middle">Lower cost, faster, lower power</text>
    <text x="295" y="306" font-size="9" fill="#bbdefb" text-anchor="middle">Rolling shutter, dominates today</text>
    <rect x="40" y="315" width="340" height="35" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="210" y="335" font-size="11" fill="#e65100" text-anchor="middle">Both sensors have millions of photosites (light-sensitive elements)</text>
  </g>
  
  <g id="step4" class="step" data-narration="The Bayer filter is a color filter array placed over the sensor. It has a RGGB pattern with more green because human eyes are more sensitive to green, providing better luminance information for each pixel location.">
    <rect x="40" y="365" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="130" y="390" font-size="13" fill="white" text-anchor="middle">BAYER FILTER</text>
    <text x="130" y="408" font-size="10" fill="#f3e5f5" text-anchor="middle">Color Filter Array (CFA)</text>
    <rect x="50" y="425" width="50" height="25" rx="3" fill="#ffcdd2"/>
    <text x="75" y="442" font-size="10" fill="#c62828" text-anchor="middle">R</text>
    <rect x="100" y="425" width="50" height="25" rx="3" fill="#c8e6c9"/>
    <text x="125" y="442" font-size="10" fill="#2e7d32" text-anchor="middle">G</text>
    <rect x="50" y="450" width="50" height="25" rx="3" fill="#c8e6c9"/>
    <text x="75" y="467" font-size="10" fill="#2e7d32" text-anchor="middle">G</text>
    <rect x="100" y="450" width="50" height="25" rx="3" fill="#bbdefb"/>
    <text x="125" y="467" font-size="10" fill="#1565c0" text-anchor="middle">B</text>
    <text x="240" y="435" font-size="11" fill="#7b1fa2">50% Green (human eye</text>
    <text x="240" y="450" font-size="11" fill="#7b1fa2">sensitive to green)</text>
  </g>
  
  <g id="step5" class="step" data-narration="Demosaicing interpolates missing color values at each pixel. A pixel under a red filter gets its green and blue values estimated from neighboring pixels. Advanced algorithms avoid artifacts at edges.">
    <rect x="40" y="490" width="140" height="40" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="110" y="512" font-size="12" fill="#7b1fa2" text-anchor="middle">BAYER PATTERN</text>
    <text x="110" y="526" font-size="10" fill="#9c27b0" text-anchor="middle">Incomplete color data</text>
    <line x1="180" y1="510" x2="240" y2="510" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="240" y="490" width="140" height="40" rx="8" fill="url(#purpleGrad)"/>
    <text x="310" y="512" font-size="12" fill="white" text-anchor="middle">DEMOSAICING</text>
    <text x="310" y="526" font-size="10" fill="#f3e5f5" text-anchor="middle">Full RGB at each pixel</text>
    <line x1="380" y1="510" x2="440" y2="510" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="440" y="490" width="100" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="490" y="512" font-size="12" fill="#2e7d32" text-anchor="middle">Full Color</text>
    <text x="490" y="526" font-size="10" fill="#388e3c" text-anchor="middle">RGB Image</text>
  </g>
  
  <g id="step6" class="step" data-narration="ADC converts analog voltage to digital values. Bit depth defines levels: 8-bit gives 256 values, 12-bit gives 4096. Higher bit depth prevents banding but creates larger files. Post-processing includes white balance and gamma correction.">
    <rect x="40" y="540" width="110" height="40" rx="8" fill="url(#greenGrad)"/>
    <text x="95" y="562" font-size="12" fill="white" text-anchor="middle">ADC</text>
    <text x="95" y="576" font-size="10" fill="#c8e6c9" text-anchor="middle">Analog→Digital</text>
    <line x1="150" y1="560" x2="200" y2="560" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="200" y="540" width="80" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="240" y="562" font-size="11" fill="#1565c0" text-anchor="middle">8-bit: 256</text>
    <text x="240" y="576" font-size="11" fill="#1565c0" text-anchor="middle">12-bit: 4096</text>
    <line x1="280" y1="560" x2="330" y2="560" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="330" y="540" width="160" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="410" y="562" font-size="11" fill="#e65100" text-anchor="middle">POST-PROCESSING</text>
    <text x="410" y="576" font-size="10" fill="#f57c00" text-anchor="middle">White Balance, Gamma, JPEG</text>
  </g>
</svg>