<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Linear Filtering and Convolution</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Linear filtering modifies pixels using weighted sums of neighbors through the convolution operation.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Output(x,y) = Sum of I(x-i,y-j) * K(i,j) over kernel window</text>
  </g>

  <g id="step1" class="step" data-narration="Place the kernel over target pixel, multiply corresponding values, sum the products for the output.">
    <text x="250" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Convolution Process</text>
    <rect x="40" y="105" width="180" height="140" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="130" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Input Image (5x5)</text>
    <text x="65" y="142" font-size="11" fill="#1976d2">1  2  3  4  5</text>
    <text x="65" y="158" font-size="11" fill="#1976d2">6  7  8  9  0</text>
    <text x="65" y="174" font-size="11" fill="#1976d2">1  2  3  4  5</text>
    <text x="65" y="190" font-size="11" fill="#1976d2">6  7  8  9  0</text>
    <text x="65" y="206" font-size="11" fill="#1976d2">1  2  3  4  5</text>
    <rect x="77" y="130" width="55" height="50" rx="2" fill="none" stroke="#f44336" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="225" y1="170" x2="270" y2="170" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="275" y="120" width="100" height="90" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="325" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Kernel 3x3</text>
    <text x="325" y="162" text-anchor="middle" font-size="11" fill="#ff9800">a  b  c</text>
    <text x="325" y="178" text-anchor="middle" font-size="11" fill="#ff9800">d  e  f</text>
    <text x="325" y="194" text-anchor="middle" font-size="11" fill="#ff9800">g  h  i</text>
    <line x1="380" y1="170" x2="415" y2="170" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="398" y="162" text-anchor="middle" font-size="9" fill="#616161">*</text>
  </g>

  <g id="step2" class="step" data-narration="The output value equals the sum of element-wise products between image patch and kernel values.">
    <rect x="420" y="105" width="350" height="140" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="595" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Computation at center</text>
    <text x="595" y="150" text-anchor="middle" font-size="11" fill="#388e3c">1*a + 2*b + 3*c +</text>
    <text x="595" y="170" text-anchor="middle" font-size="11" fill="#388e3c">6*d + 7*e + 8*f +</text>
    <text x="595" y="190" text-anchor="middle" font-size="11" fill="#388e3c">1*g + 2*h + 3*i</text>
    <text x="595" y="215" text-anchor="middle" font-size="11" fill="#388e3c">= Output pixel value</text>
    <text x="595" y="235" text-anchor="middle" font-size="10" fill="#616161">Slide kernel across entire image</text>
  </g>

  <g id="step3" class="step" data-narration="Box filter averages all neighbors equally, producing a smoothing or blurring effect on the image.">
    <text x="150" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Box Filter (Smoothing)</text>
    <rect x="30" y="285" width="240" height="110" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="80" y="310" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="120" y="310" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="160" y="310" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="80" y="340" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="120" y="340" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="160" y="340" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="80" y="370" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="120" y="370" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="160" y="370" text-anchor="middle" font-size="13" fill="#1976d2">1/9</text>
    <text x="215" y="340" text-anchor="middle" font-size="10" fill="#1976d2">Average</text>
    <text x="215" y="358" text-anchor="middle" font-size="10" fill="#1976d2">Low-pass</text>
    <text x="215" y="376" text-anchor="middle" font-size="10" fill="#1976d2">Reduces noise</text>
  </g>

  <g id="step4" class="step" data-narration="Gaussian filter gives more weight to central pixels creating smoother blur following a bell curve shape.">
    <text x="530" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Gaussian Filter</text>
    <rect x="410" y="285" width="240" height="110" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="460" y="310" text-anchor="middle" font-size="13" fill="#ff9800">1</text>
    <text x="500" y="310" text-anchor="middle" font-size="13" fill="#ff9800">2</text>
    <text x="540" y="310" text-anchor="middle" font-size="13" fill="#ff9800">1</text>
    <text x="460" y="340" text-anchor="middle" font-size="13" fill="#ff9800">2</text>
    <text x="500" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">4</text>
    <text x="540" y="340" text-anchor="middle" font-size="13" fill="#ff9800">2</text>
    <text x="460" y="370" text-anchor="middle" font-size="13" fill="#ff9800">1</text>
    <text x="500" y="370" text-anchor="middle" font-size="13" fill="#ff9800">2</text>
    <text x="540" y="370" text-anchor="middle" font-size="13" fill="#ff9800">1</text>
    <text x="600" y="340" text-anchor="middle" font-size="10" fill="#ff9800">1/16 x</text>
    <text x="600" y="358" text-anchor="middle" font-size="10" fill="#ff9800">Weighted</text>
    <text x="600" y="376" text-anchor="middle" font-size="10" fill="#ff9800">Bell curve</text>
  </g>

  <g id="step5" class="step" data-narration="Sharpening filters enhance edges by subtracting a blurred version from the original image intensities.">
    <text x="150" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Sharpening (Laplacian)</text>
    <rect x="30" y="435" width="240" height="110" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="80" y="465" text-anchor="middle" font-size="13" fill="#f44336">0</text>
    <text x="120" y="465" text-anchor="middle" font-size="13" fill="#f44336">-1</text>
    <text x="160" y="465" text-anchor="middle" font-size="13" fill="#f44336">0</text>
    <text x="80" y="495" text-anchor="middle" font-size="13" fill="#f44336">-1</text>
    <text x="120" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">4</text>
    <text x="160" y="495" text-anchor="middle" font-size="13" fill="#f44336">-1</text>
    <text x="80" y="525" text-anchor="middle" font-size="13" fill="#f44336">0</text>
    <text x="120" y="525" text-anchor="middle" font-size="13" fill="#f44336">-1</text>
    <text x="160" y="525" text-anchor="middle" font-size="13" fill="#f44336">0</text>
    <text x="215" y="495" text-anchor="middle" font-size="10" fill="#f44336">High-pass</text>
    <text x="215" y="513" text-anchor="middle" font-size="10" fill="#f44336">Enhances</text>
    <text x="215" y="531" text-anchor="middle" font-size="10" fill="#f44336">edges</text>
  </g>

  <g id="step6" class="step" data-narration="Edge detection kernels like Sobel detect horizontal and vertical gradient changes revealing object boundaries.">
    <text x="530" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Sobel Edge Detection</text>
    <rect x="410" y="435" width="130" height="110" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="475" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">Gx (Horizontal)</text>
    <text x="440" y="478" font-size="12" fill="#9c27b0">-1  0  1</text>
    <text x="440" y="498" font-size="12" fill="#9c27b0">-2  0  2</text>
    <text x="440" y="518" font-size="12" fill="#9c27b0">-1  0  1</text>
    <rect x="560" y="435" width="130" height="110" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="625" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">Gy (Vertical)</text>
    <text x="590" y="478" font-size="12" fill="#9c27b0">-1 -2 -1</text>
    <text x="590" y="498" font-size="12" fill="#9c27b0"> 0   0   0</text>
    <text x="590" y="518" font-size="12" fill="#9c27b0"> 1   2   1</text>
  </g>

  <g id="step7" class="step" data-narration="Boundary handling uses zero padding, mirror, or wrap strategies when the kernel extends beyond image edges.">
    <rect x="100" y="560" width="600" height="30" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Boundary: Zero Padding | Mirror | Wrap | Clamp (at edges)</text>
  </g>
</svg>