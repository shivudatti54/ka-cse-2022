<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9800" />
    </marker>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Step 1: Title and concept -->
  <g id="step1" class="step" data-narration="Multi-resolution analysis lets us examine images at different scales. Fine details appear at high resolutions while broader structures are visible at lower resolutions.">
    <text x="400" y="30" font-size="22" fill="#1976d2" text-anchor="middle" font-weight="bold">Pyramids and Wavelets</text>
    <text x="400" y="50" font-size="13" fill="#555" text-anchor="middle">Multi-Resolution Image Analysis</text>
    
    <!-- Visual pyramid representation -->
    <polygon points="400,70 340,100 460,100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <polygon points="400,82 355,100 445,100" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <polygon points="400,94 370,100 430,100" fill="#90caf9" stroke="#1976d2" stroke-width="1"/>
    
    <text x="320" y="90" font-size="10" fill="#1976d2">High Res</text>
    <text x="470" y="90" font-size="10" fill="#555">Low Res</text>
    <text x="400" y="115" font-size="10" fill="#666" text-anchor="middle">Image Pyramid Structure</text>
  </g>

  <!-- Step 2: Gaussian Pyramid -->
  <g id="step2" class="step" data-narration="The Gaussian pyramid reduces resolution by applying Gaussian smoothing then subsampling by two, creating progressively smaller blurred images at each level.">
    <rect x="30" y="130" width="280" height="150" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="170" y="152" font-size="14" fill="#1976d2" text-anchor="middle" font-weight="bold">Gaussian Pyramid</text>
    
    <rect x="80" y="165" width="60" height="45" fill="#fff" stroke="#1976d2" stroke-width="1.5" rx="3"/>
    <text x="110" y="182" font-size="10" fill="#333" text-anchor="middle">G₀</text>
    <text x="110" y="198" font-size="8" fill="#666" text-anchor="middle">Original</text>
    
    <line x1="145" y1="187" x2="165" y2="187" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="160" y="178" font-size="8" fill="#1976d2">Blur+Sample</text>
    
    <rect x="170" y="165" width="45" height="34" fill="#fff" stroke="#1976d2" stroke-width="1.5" rx="3"/>
    <text x="192.5" y="182" font-size="9" fill="#333" text-anchor="middle">G₁</text>
    <text x="192.5" y="195" font-size="7" fill="#666" text-anchor="middle">½ size</text>
    
    <line x1="218" y1="182" x2="233" y2="182" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    
    <rect x="238" y="165" width="35" height="26" fill="#fff" stroke="#1976d2" stroke-width="1.5" rx="3"/>
    <text x="255.5" y="180" font-size="8" fill="#333" text-anchor="middle">G₂</text>
    <text x="255.5" y="192" font-size="7" fill="#666" text-anchor="middle">¼ size</text>
    
    <text x="170" y="262" font-size="9" fill="#555" text-anchor="middle">Repeated blur + subsampling creates multi-scale representation</text>
  </g>

  <!-- Step 3: Laplacian Pyramid -->
  <g id="step3" class="step" data-narration="The Laplacian pyramid stores differences between Gaussian levels, capturing details lost during reduction. This enables perfect reconstruction of the original image.">
    <rect x="320" y="130" width="280" height="150" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="460" y="152" font-size="14" fill="#e65100" text-anchor="middle" font-weight="bold">Laplacian Pyramid</text>
    
    <rect x="335" y="168" width="80" height="30" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5" rx="3"/>
    <text x="375" y="185" font-size="10" fill="#333" text-anchor="middle">L₀ = G₀ - Expand(G₁)</text>
    <text x="375" y="198" font-size="8" fill="#666" text-anchor="middle">Fine details</text>
    
    <rect x="335" y="205" width="80" height="30" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5" rx="3"/>
    <text x="375" y="222" font-size="10" fill="#333" text-anchor="middle">L₁ = G₁ - Expand(G₂)</text>
    <text x="375" y="235" font-size="8" fill="#666" text-anchor="middle">Mid-level details</text>
    
    <rect x="335" y="242" width="80" height="30" fill="#ffcc80" stroke="#f57c00" stroke-width="1.5" rx="3"/>
    <text x="375" y="259" font-size="10" fill="#333" text-anchor="middle">Lₙ = Gₙ</text>
    <text x="375" y="272" font-size="8" fill="#2e7d32" text-anchor="middle">Top level (coarse)</text>
  </g>

  <!-- Step 4: Wavelet Decomposition -->
  <g id="step4" class="step" data-narration="Discrete wavelet transform decomposes images into four subbands: LL approximation, HL horizontal edges, LH vertical edges, and HH diagonal edges.">
    <rect x="30" y="295" width="370" height="130" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="215" y="318" font-size="14" fill="#2e7d32" text-anchor="middle" font-weight="bold">Wavelet Decomposition (DWT)</text>
    
    <!-- 2x2 grid for subbands -->
    <rect x="50" y="335" width="80" height="50" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5" rx="3"/>
    <text x="90" y="352" font-size="11" fill="#1b5e20" text-anchor="middle" font-weight="bold">LL</text>
    <text x="90" y="368" font-size="9" fill="#1b5e20" text-anchor="middle">Approximation</text>
    <text x="90" y="380" font-size="8" fill="#2e7d32" text-anchor="middle">Low Freq</text>
    
    <rect x="135" y="335" width="80" height="50" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5" rx="3"/>
    <text x="175" y="352" font-size="11" fill="#0d47a1" text-anchor="middle" font-weight="bold">HL</text>
    <text x="175" y="368" font-size="9" fill="#0d47a1" text-anchor="middle">Horizontal</text>
    <text x="175" y="380" font-size="8" fill="#1565c0" text-anchor="middle">Edges</text>
    
    <rect x="220" y="335" width="80" height="50" fill="#e1bee7" stroke="#9c27b0" stroke-width="1.5" rx="3"/>
    <text x="260" y="352" font-size="11" fill="#4a148c" text-anchor="middle" font-weight="bold">LH</text>
    <text x="260" y="368" font-size="9" fill="#4a148c" text-anchor="middle">Vertical</text>
    <text x="260" y="380" font-size="8" fill="#6a1b9a" text-anchor="middle">Edges</text>
    
    <rect x="305" y="335" width="80" height="50" fill="#ffcdd2" stroke="#f44336" stroke-width="1.5" rx="3"/>
    <text x="345" y="352" font-size="11" fill="#b71c1c" text-anchor="middle" font-weight="bold">HH</text>
    <text x="345" y="368" font-size="9" fill="#b71c1c" text-anchor="middle">Diagonal</text>
    <text x="345" y="380" font-size="8" fill="#c62828" text-anchor="middle">Details</text>
    
    <line x1="345" y1="355" x2="365" y2="355" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="375" y="360" font-size="9" fill="#e65100">Recursive</text>
  </g>

  <!-- Step 5: Wavelet Types -->
  <g id="step5" class="step" data-narration="Common wavelet types include Haar for simplicity, Daubechies for JPEG2000 compression, and Coiflet for balanced properties in various applications.">
    <rect x="410" y="295" width="180" height="130" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="500" y="318" font-size="14" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Wavelet Types</text>
    
    <rect x="425" y="332" width="150" height="24" fill="#ede7f6" stroke="#7b1fa2" stroke-width="1.5" rx="3"/>
    <text x="500" y="348" font-size="11" fill="#4a148c" text-anchor="middle">Haar - Simplest wavelet</text>
    
    <rect x="425" y="362" width="150" height="24" fill="#d1c4e9" stroke="#673ab7" stroke-width="1.5" rx="3"/>
    <text x="500" y="378" font-size="11" fill="#311b92" text-anchor="middle">Daubechies - JPEG2000</text>
    
    <rect x="425" y="392" width="150" height="24" fill="#c5cae9" stroke="#3f51b5" stroke-width="1.5" rx="3"/>
    <text x="500" y="408" font-size="11" fill="#1a237e" text-anchor="middle">Coiflet - Balanced</text>
  </g>

  <!-- Step 6: Comparison -->
  <g id="step6" class="step" data-narration="Pyramids use fixed Gaussian kernels with 1.33 times storage but are computationally fast. Wavelets provide perfect reconstruction with various families available.">
    <rect x="30" y="440" width="270" height="120" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="165" y="462" font-size="14" fill="#c62828" text-anchor="middle" font-weight="bold">Pyramids vs Wavelets</text>
    
    <text x="50" y="485" font-size="11" fill="#ff9800" text-anchor="start" font-weight="bold">Pyramids:</text>
    <text x="100" y="485" font-size="10" fill="#333" text-anchor="start">Fixed kernel (Gaussian)</text>
    <text x="50" y="502" font-size="10" fill="#333" text-anchor="start">• 1.33× storage overhead</text>
    <text x="50" y="517" font-size="10" fill="#388e3c" text-anchor="start">• Fast and simple</text>
    <text x="50" y="532" font-size="10" fill="#333" text-anchor="start">• Great for blending</text>
    
    <text x="165" y="502" font-size="11" fill="#1976d2" text-anchor="start" font-weight="bold">Wavelets:</text>
    <text x="220" y="502" font-size="10" fill="#333" text-anchor="start">Many families</text>
    <text x="165" y="517" font-size="10" fill="#388e3c" text-anchor="start">• Perfect reconstruction</text>
    <text x="165" y="532" font-size="10" fill="#333" text-anchor="start">• Compression (JPEG2000)</text>
  </g>

  <!-- Step 7: Applications -->
  <g id="step7" class="step" data-narration="Pyramid applications include seamless image blending for panoramas and texture synthesis. Wavelet applications include compression, denoising, and watermarking.">
    <rect x="310" y="440" width="280" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="450" y="462" font-size="14" fill="#1565c0" text-anchor="middle" font-weight="bold">Applications</text>
    
    <rect x="325" y="478" width="120" height="70" fill="#fff" stroke="#ff9800" stroke-width="1.5" rx="3"/>
    <text x="385" y="495" font-size="12" fill="#e65100" text-anchor="middle" font-weight="bold">Pyramids</text>
    <text x="385" y="512" font-size="10" fill="#333" text-anchor="middle">• Image blending</text>
    <text x="385" y="526" font-size="10" fill="#333" text-anchor="middle">• Texture synthesis</text>
    <text x="385" y="540" font-size="10" fill="#333" text-anchor="middle">• Multi-scale processing</text>
    
    <rect x="455" y="478" width="120" height="70" fill="#fff" stroke="#388e3c" stroke-width="1.5" rx="3"/>
    <text x="515" y="495" font-size="12" fill="#2e7d32" text-anchor="middle" font-weight="bold">Wavelets</text>
    <text x="515" y="512" font-size="10" fill="#333" text-anchor="middle">• Compression</text>
    <text x="515" y="526" font-size="10" fill="#333" text-anchor="middle">• Denoising</text>
    <text x="515" y="540" font-size="10" fill="#333" text-anchor="middle">• Watermarking</text>
  </g>

  <!-- Step 8: Reconstruction -->
  <g id="step8" class="step" data-narration="Laplacian reconstruction expands and adds levels: Gn plus expand(Ln-1) plus expand all the way to L0. Wavelet reconstruction uses inverse DWT on all subbands.">
    <rect x="30" y="570" width="740" height="25" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="3"/>
    <text x="50" y="586" font-size="11" fill="#2e7d32" text-anchor="start" font-weight="bold">Reconstruction:</text>
    <text x="145" y="586" font-size="10" fill="#333" text-anchor="start">Laplacian: Gₙ + Expand(Lₙ₋₁) + ... + Expand(L₀)  |  Wavelet: Inverse DWT → Original</text>
  </g>
</svg>