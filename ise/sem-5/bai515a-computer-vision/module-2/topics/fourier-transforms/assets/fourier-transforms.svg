<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Fourier Transforms in Image Processing</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Fourier transform converts images from spatial domain to frequency domain for analysis.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Spatial Domain to Frequency Domain Conversion</text>
  </g>
  <g id="step1" class="step" data-narration="The spatial domain represents pixel intensity values at each x y location in the image.">
    <rect x="30" y="80" width="220" height="120" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="140" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Spatial Domain f(x,y)</text>
    <rect x="50" y="120" width="25" height="25" fill="#1976d2" opacity="0.3"/><rect x="80" y="120" width="25" height="25" fill="#1976d2" opacity="0.6"/>
    <rect x="110" y="120" width="25" height="25" fill="#1976d2" opacity="0.9"/><rect x="140" y="120" width="25" height="25" fill="#1976d2" opacity="0.4"/>
    <rect x="170" y="120" width="25" height="25" fill="#1976d2" opacity="0.7"/>
    <rect x="50" y="150" width="25" height="25" fill="#1976d2" opacity="0.5"/><rect x="80" y="150" width="25" height="25" fill="#1976d2" opacity="0.8"/>
    <rect x="110" y="150" width="25" height="25" fill="#1976d2" opacity="0.2"/><rect x="140" y="150" width="25" height="25" fill="#1976d2" opacity="0.6"/>
    <text x="140" y="195" text-anchor="middle" font-size="10" fill="#1976d2">Pixel intensity grid</text>
  </g>
  <g id="step2" class="step" data-narration="DFT decomposes the image into sinusoidal components of varying frequencies and orientations.">
    <line x1="255" y1="140" x2="310" y2="140" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="282" y="132" text-anchor="middle" font-size="10" fill="#1976d2">DFT</text>
    <rect x="315" y="80" width="220" height="120" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="425" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Frequency Domain F(u,v)</text>
    <circle cx="425" cy="155" r="35" fill="#ff9800" opacity="0.1" stroke="#ff9800" stroke-width="1"/>
    <circle cx="425" cy="155" r="22" fill="#ff9800" opacity="0.2"/><circle cx="425" cy="155" r="12" fill="#ff9800" opacity="0.4"/>
    <circle cx="425" cy="155" r="5" fill="#ff9800"/>
    <text x="425" y="195" text-anchor="middle" font-size="10" fill="#ff9800">Magnitude spectrum</text>
  </g>
  <g id="step3" class="step" data-narration="The DFT formula sums pixel values multiplied by complex exponential basis functions.">
    <rect x="560" y="80" width="220" height="120" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="670" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">DFT Formula</text>
    <text x="670" y="130" text-anchor="middle" font-size="11" fill="#9c27b0">F(u,v) = Sum Sum</text>
    <text x="670" y="150" text-anchor="middle" font-size="11" fill="#9c27b0">f(x,y) * e^(-j2pi</text>
    <text x="670" y="170" text-anchor="middle" font-size="11" fill="#9c27b0">(ux/M + vy/N))</text>
    <text x="670" y="195" text-anchor="middle" font-size="10" fill="#616161">M,N = image dimensions</text>
  </g>
  <g id="step4" class="step" data-narration="Low frequencies represent smooth regions. High frequencies capture edges and fine details.">
    <text x="400" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Frequency Components</text>
    <rect x="80" y="245" width="280" height="75" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="220" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Low Frequencies</text>
    <text x="220" y="290" text-anchor="middle" font-size="11" fill="#1976d2">Smooth regions, overall structure</text>
    <text x="220" y="308" text-anchor="middle" font-size="10" fill="#1976d2">Gradual intensity changes</text>
    <rect x="440" y="245" width="280" height="75" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="580" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">High Frequencies</text>
    <text x="580" y="290" text-anchor="middle" font-size="11" fill="#f44336">Edges, noise, sharp transitions</text>
    <text x="580" y="308" text-anchor="middle" font-size="10" fill="#f44336">Rapid intensity changes</text>
  </g>
  <g id="step5" class="step" data-narration="Frequency domain filtering multiplies the spectrum by a filter function then applies inverse DFT.">
    <text x="400" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Filtering Pipeline</text>
    <rect x="40" y="370" width="120" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="395" text-anchor="middle" font-size="11" fill="#1976d2">f(x,y)</text>
    <line x1="160" y1="390" x2="190" y2="390" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="195" y="370" width="90" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="240" y="395" text-anchor="middle" font-size="11" fill="#ff9800">DFT</text>
    <line x1="285" y1="390" x2="315" y2="390" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="320" y="370" width="130" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="385" y="395" text-anchor="middle" font-size="11" fill="#9c27b0">H(u,v) * F(u,v)</text>
    <line x1="450" y1="390" x2="480" y2="390" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="485" y="370" width="90" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="530" y="395" text-anchor="middle" font-size="11" fill="#ff9800">IDFT</text>
    <line x1="575" y1="390" x2="605" y2="390" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="610" y="370" width="120" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="670" y="395" text-anchor="middle" font-size="11" fill="#388e3c">g(x,y)</text>
  </g>
  <g id="step6" class="step" data-narration="Low-pass filters smooth images. High-pass filters sharpen. Band-pass selects specific frequencies.">
    <text x="400" y="440" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Filter Types</text>
    <rect x="50" y="455" width="210" height="65" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="155" y="480" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Low-Pass</text>
    <text x="155" y="500" text-anchor="middle" font-size="10" fill="#388e3c">Smoothing, blur, denoise</text>
    <rect x="290" y="455" width="210" height="65" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="395" y="480" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">High-Pass</text>
    <text x="395" y="500" text-anchor="middle" font-size="10" fill="#f44336">Edge enhancement, sharpen</text>
    <rect x="530" y="455" width="210" height="65" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="635" y="480" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Band-Pass</text>
    <text x="635" y="500" text-anchor="middle" font-size="10" fill="#ff9800">Texture, specific features</text>
  </g>
  <g id="step7" class="step" data-narration="FFT computes DFT efficiently in O(N log N) time making real-time frequency analysis practical.">
    <rect x="150" y="540" width="500" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="558" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">FFT: Fast Fourier Transform</text>
    <text x="400" y="574" text-anchor="middle" font-size="11" fill="#388e3c">O(N log N) vs O(N^2) - enables real-time processing</text>
  </g>
</svg>