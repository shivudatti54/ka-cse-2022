<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" class="step" data-narration="Introduction to Morphological Image Processing">
    <text x="50" y="50" font-size="24" fill="#2563eb">Morphological Image Processing</text>
    <text x="50" y="80" font-size="18" fill="#10b981">Enhancing image information using pseudocolor techniques</text>
  </g>
  <g id="step1" class="step" data-narration="True Color vs Pseudocolor Images">
    <rect x="50" y="120" width="100" height="50" fill="#2563eb" rx="5" />
    <text x="60" y="145" font-size="18" fill="#fff">True Color</text>
    <rect x="200" y="120" width="100" height="50" fill="#10b981" rx="5" />
    <text x="210" y="145" font-size="18" fill="#fff">Pseudocolor</text>
    <line x1="150" y1="135" x2="200" y2="135" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" class="step" data-narration="Intensity Slicing and Color Coding">
    <rect x="50" y="200" width="200" height="20" fill="#f59e0b" rx="5" />
    <text x="60" y="215" font-size="18" fill="#fff">Intensity Slicing</text>
    <rect x="300" y="200" width="200" height="20" fill="#8b5cf6" rx="5" />
    <text x="310" y="215" font-size="18" fill="#fff">Color Coding</text>
    <line x1="250" y1="210" x2="300" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" class="step" data-narration="Assigning Colors to Intensity Values">
    <rect x="50" y="250" width="50" height="20" fill="#2563eb" rx="5" />
    <text x="60" y="265" font-size="18" fill="#fff">0-50</text>
    <rect x="120" y="250" width="50" height="20" fill="#10b981" rx="5" />
    <text x="130" y="265" font-size="18" fill="#fff">51-100</text>
    <rect x="190" y="250" width="50" height="20" fill="#f59e0b" rx="5" />
    <text x="200" y="265" font-size="18" fill="#fff">101-150</text>
    <rect x="260" y="250" width="50" height="20" fill="#8b5cf6" rx="5" />
    <text x="270" y="265" font-size="18" fill="#fff">151-200</text>
    <rect x="330" y="250" width="50" height="20" fill="#2563eb" rx="5" />
    <text x="340" y="265" font-size="18" fill="#fff">201-255</text>
  </g>
  <g id="step4" class="step" data-narration="Applications of Pseudocolor Image Processing">
    <text x="50" y="300" font-size="18" fill="#2563eb">Medical Imaging</text>
    <text x="50" y="320" font-size="18" fill="#10b981">Satellite and Aerial Imagery</text>
    <text x="50" y="340" font-size="18" fill="#f59e0b">Scientific Visualization</text>
    <text x="50" y="360" font-size="18" fill="#8b5cf6">Astronomical Imaging</text>
    <text x="50" y="380" font-size="18" fill="#2563eb">Non-Destructive Testing</text>
  </g>
  <g id="step5" class="step" data-narration="Benefits of Pseudocolor Image Processing">
    <text x="400" y="300" font-size="18" fill="#2563eb">Enhances image interpretation</text>
    <text x="400" y="320" font-size="18" fill="#10b981">Highlights subtle details and patterns</text>
    <text x="400" y="340" font-size="18" fill="#f59e0b">Improves visualization of complex data</text>
    <text x="400" y="360" font-size="18" fill="#8b5cf6">Facilitates data analysis and decision-making</text>
  </g>
  <g id="step6" class="step" data-narration="Limitations and Challenges">
    <text x="50" y="420" font-size="18" fill="#2563eb">Dependence on color assignment</text>
    <text x="50" y="440" font-size="18" fill="#10b981">Potential for misinterpretation</text>
    <text x="50" y="460" font-size="18" fill="#f59e0b">Requires expertise in image processing</text>
  </g>
  <g id="step7" class="step" data-narration="Future Directions and Advances">
    <text x="400" y="420" font-size="18" fill="#2563eb">Development of new pseudocolor techniques</text>
    <text x="400" y="440" font-size="18" fill="#10b981">Integration with machine learning and AI</text>
    <text x="400" y="460" font-size="18" fill="#f59e0b">Expansion to new applications and fields</text>
  </g>
  <g id="step8" class="step" data-narration="Conclusion and Summary">
    <text x="50" y="520" font-size="24" fill="#2563eb">Morphological Image Processing using Pseudocolor Techniques</text>
    <text x="50" y="550" font-size="18" fill="#10b981">A powerful tool for image enhancement and interpretation</text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 600" dur="10s" repeatCount="indefinite" />
</svg>