<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc" />
  <g id="step0" class="step" data-narration="Introduction to Morphological Image Processing">
    <text x="50" y="50" font-size="24" fill="#2563eb">Morphological Image Processing</text>
    <text x="50" y="80" font-size="18" fill="#8b5cf6">Non-linear operations related to shape or morphology of features</text>
    <rect x="50" y="120" width="100" height="100" fill="#10b981" rx="10" />
    <text x="50" y="230" font-size="18" fill="#f59e0b">Structuring Element (Kernel)</text>
  </g>
  <g id="step1" class="step" data-narration="Erosion Operation">
    <use href="#step0" />
    <text x="250" y="50" font-size="24" fill="#2563eb">Erosion (⊖)</text>
    <text x="250" y="80" font-size="18" fill="#8b5cf6">Removes small-scale details and disconnects thin connections</text>
    <rect x="250" y="120" width="100" height="100" fill="#10b981" rx="10" />
    <text x="250" y="230" font-size="18" fill="#f59e0b">Minimum value of all pixels in the neighborhood</text>
    <path d="M 350 200 L 400 200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" class="step" data-narration="Dilation Operation">
    <use href="#step1" />
    <text x="450" y="50" font-size="24" fill="#2563eb">Dilation (⊕)</text>
    <text x="450" y="80" font-size="18" fill="#8b5cf6">Fills in holes, broken sections, and gaps</text>
    <rect x="450" y="120" width="100" height="100" fill="#10b981" rx="10" />
    <text x="450" y="230" font-size="18" fill="#f59e0b">Maximum value of all pixels in the neighborhood</text>
    <path d="M 550 200 L 600 200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" class="step" data-narration="Opening Operation">
    <use href="#step2" />
    <text x="50" y="300" font-size="24" fill="#2563eb">Opening (A ∘ B)</text>
    <text x="50" y="330" font-size="18" fill="#8b5cf6">Erosion followed by Dilation</text>
    <rect x="50" y="370" width="100" height="100" fill="#10b981" rx="10" />
    <text x="50" y="480" font-size="18" fill="#f59e0b">Removes noise and smooths the object</text>
  </g>
  <g id="step4" class="step" data-narration="Closing Operation">
    <use href="#step3" />
    <text x="250" y="300" font-size="24" fill="#2563eb">Closing</text>
    <text x="250" y="330" font-size="18" fill="#8b5cf6">Dilation followed by Erosion</text>
    <rect x="250" y="370" width="100" height="100" fill="#10b981" rx="10" />
    <text x="250" y="480" font-size="18" fill="#f59e0b">Fills in holes and connects objects</text>
  </g>
  <g id="step5" class="step" data-narration="Comparison of Opening and Closing">
    <use href="#step4" />
    <text x="450" y="300" font-size="24" fill="#2563eb">Comparison</text>
    <text x="450" y="330" font-size="18" fill="#8b5cf6">Opening removes noise, Closing fills in holes</text>
    <rect x="450" y="370" width="100" height="100" fill="#10b981" rx="10" />
    <text x="450" y="480" font-size="18" fill="#f59e0b">Choose the right operation based on the application</text>
  </g>
</svg>