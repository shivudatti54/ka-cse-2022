<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" class="step" data-narration="Introduction to the Hit-or-Miss Transform">
    <text x="50" y="50" font-size="24" fill="#2563eb">Hit-or-Miss Transform</text>
    <text x="50" y="80" font-size="18" fill="#10b981">A morphological operation for shape detection and pattern matching</text>
    <rect x="50" y="120" width="100" height="100" fill="#f59e0b" rx="10" />
    <text x="50" y="230" font-size="18" fill="#8b5cf6">Input Binary Image</text>
  </g>
  <g id="step1" class="step" data-narration="Defining the Structuring Elements">
    <use href="#step0" />
    <rect x="200" y="120" width="50" height="50" fill="#2563eb" rx="5" />
    <text x="200" y="180" font-size="18" fill="#10b981">Foreground Structuring Element (Hit)</text>
    <rect x="300" y="120" width="50" height="50" fill="#f59e0b" rx="5" />
    <text x="300" y="180" font-size="18" fill="#8b5cf6">Background Structuring Element (Miss)</text>
  </g>
  <g id="step2" class="step" data-narration="Eroding with the Foreground Element">
    <use href="#step1" />
    <rect x="200" y="250" width="50" height="50" fill="#2563eb" rx="5" opacity="0.5" />
    <text x="200" y="310" font-size="18" fill="#10b981">Eroded with Foreground Element</text>
    <path d="M 200 280 L 250 280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" class="step" data-narration="Eroding with the Background Element">
    <use href="#step2" />
    <rect x="300" y="250" width="50" height="50" fill="#f59e0b" rx="5" opacity="0.5" />
    <text x="300" y="310" font-size="18" fill="#8b5cf6">Eroded with Background Element</text>
    <path d="M 300 280 L 350 280" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" class="step" data-narration="Intersection of the Two Eroded Images">
    <use href="#step3" />
    <rect x="250" y="350" width="50" height="50" fill="#2563eb" rx="5" opacity="0.5" />
    <text x="250" y="410" font-size="18" fill="#10b981">Intersection of Eroded Images</text>
    <path d="M 200 380 L 250 380" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 300 380 L 250 380" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step5" class="step" data-narration="Final Result of the Hit-or-Miss Transform">
    <use href="#step4" />
    <rect x="250" y="450" width="50" height="50" fill="#8b5cf6" rx="5" opacity="0.5" />
    <text x="250" y="510" font-size="18" fill="#10b981">Detected Pattern</text>
    <path d="M 250 480 L 250 530" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
</svg>