<svg width="420" height="400" data-topic-id="distributed-transactions-introduction-flat-nested">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6baed6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4ec3d9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <title>Distributed Transactions: Introduction to Flat and Nested Transactions</title>
  <g transform="translate(20, 20)">
    <rect width="380" height="350" fill="#ffffff" rx="10"/>
    <g transform="translate(10, 15)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#333333">Textbook Chapter 171-176</text>
    </g>
    <g transform="translate(10, 60)">
      <section data-narration="Distributed transaction: A sequence of operations that are executed as a single unit, involving multiple nodes in a distributed system.">
        <rect width="320" height="50" fill="#e0e0e0" rx="5"/>
        <text x="10" y="15" font-size="14" font-family="Arial" fill="#666666">Definition</text>
        <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">Sequence of operations that are executed as a single unit</text>
      </section>
      <section data-narration="Key Concepts">
        <rect width="320" height="50" fill="#e0e0e0" rx="5"/>
        <text x="10" y="15" font-size="14" font-family="Arial" fill="#666666">Key Concepts</text>
        <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">Distributed transaction</text>
        <text x="10" y="45" font-size="14" font-family="Arial" fill="#666666">Transaction</text>
      </section>
      <section data-narration="Flat Distributed Transactions">
        <rect width="320" height="50" fill="#e0e0e0" rx="5"/>
        <text x="10" y="15" font-size="14" font-family="Arial" fill="#666666">Flat Distributed Transactions</text>
        <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">All nodes are at the same level of abstraction</text>
        <text x="10" y="45" font-size="14" font-family="Arial" fill="#666666">No nesting</text>
      </section>
      <section data-narration="Characteristics">
        <rect width="320" height="50" fill="#e0e0e0" rx="5"/>
        <text x="10" y="15" font-size="14" font-family="Arial" fill="#666666">Characteristics</text>
        <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">All nodes are at the same level</text>
        <text x="10" y="45" font-size="14" font-family="Arial" fill="#666666">No nesting</text>
      </section>
      <section data-narration="Example">
        <rect width="320" height="50" fill="#e0e0e0" rx="5"/>
        <text x="10" y="15" font-size="14" font-family="Arial" fill="#666666">Example</text>
        <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">A flat distributed transaction could involve a deposit operation at one branch</text>
        <text x="10" y="45" font-size="14" font-family="Arial" fill="#666666">followed by a withdrawal operation at another branch</text>
      </section>
      <section data-narration="Benefits">
        <rect width="320" height="50" fill="#e0e0e0" rx="5"/>
        <text x="10" y="15" font-size="14" font-family="Arial" fill="#666666">Benefits</text>
        <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">Simplified system design</text>
        <text x="10" y="45" font-size="14" font-family="Arial" fill="#666666">Improved performance</text>
      </section>
      <section data-narration="Drawbacks">
        <rect width="320" height="50" fill="#e0e0e0" rx="5"/>
        <text x="10" y="15" font-size="14" font-family="Arial" fill="#666666">Drawbacks</text>
        <text x="10" y="30" font-size="14" font-family="Arial" fill="#666666">Limited scalability</text>
        <text x="10" y="45" font-size="14" font-family="Arial" fill="#666666">No support for nested transactions</text>
      </section>
    </g>
    <g transform="translate(10, 410)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#333333">Arrow markers for connections</text>
    </g>
  </g>
  <footer>Education is the key to unlock the golden door of freedom</footer>
</svg>