<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="elections">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="leaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- ==================== G1: Title (0.3s) ==================== -->
  <g opacity="0" data-narration="Leader Election is a fundamental problem in distributed systems where nodes must agree on a single coordinator.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3949AB">Leader Election in Distributed Systems</text>
    <line x1="70" y1="34" x2="350" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="120" y1="38" x2="300" y2="38" stroke="#E65100" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- ==================== G2: Why Elect a Leader? (1.5s) ==================== -->
  <g opacity="0" data-narration="A leader provides coordination, makes decisions, and resolves conflicts among distributed nodes. One node is elected as the leader while others follow.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Why Elect a Leader?</text>

    <!-- Follower nodes -->
    <circle cx="120" cy="88" r="14" fill="url(#nodeGrad)" filter="url(#shadow)"/>
    <text x="120" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">N1</text>

    <circle cx="170" cy="105" r="14" fill="url(#nodeGrad)" filter="url(#shadow)"/>
    <text x="170" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">N2</text>

    <circle cx="120" cy="118" r="14" fill="url(#nodeGrad)" filter="url(#shadow)"/>
    <text x="120" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">N3</text>

    <!-- Leader node (highlighted) -->
    <circle cx="68" cy="100" r="18" fill="url(#leaderGrad)" filter="url(#shadow)" stroke="#E65100" stroke-width="2"/>
    <text x="68" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white" font-weight="bold">LEADER</text>
    <text x="68" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFD54F" font-weight="bold">&#9733;</text>

    <!-- Arrows from leader to followers -->
    <line x1="86" y1="93" x2="104" y2="88" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <line x1="86" y1="100" x2="154" y2="104" stroke="#3949AB" stroke-width="1.2"/>
    <line x1="86" y1="107" x2="104" y2="115" stroke="#3949AB" stroke-width="1.2"/>

    <!-- Reasons -->
    <rect x="210" y="68" width="185" height="58" rx="6" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="0.8"/>
    <text x="220" y="82" font-family="Arial, sans-serif" font-size="9" fill="#3949AB" font-weight="bold">&#8226; Coordination</text>
    <text x="232" y="93" font-family="Arial, sans-serif" font-size="8" fill="#333">Orchestrate distributed tasks</text>
    <text x="220" y="105" font-family="Arial, sans-serif" font-size="9" fill="#3949AB" font-weight="bold">&#8226; Decision-Making &amp; Conflict Resolution</text>
    <text x="232" y="116" font-family="Arial, sans-serif" font-size="8" fill="#333">Single authority avoids split-brain</text>
  </g>

  <!-- ==================== G3: Bully Algorithm (3.0s) ==================== -->
  <g opacity="0" data-narration="In the Bully Algorithm, the process with the highest ID always wins. When a node detects leader failure, it sends election messages to all higher-ID processes. The highest ID that responds becomes the new leader.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <rect x="10" y="135" width="195" height="118" rx="8" fill="white" fill-opacity="0.75" stroke="#C62828" stroke-width="1.2"/>
    <text x="107" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C62828">Bully Algorithm</text>
    <text x="107" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">Highest ID wins the election</text>

    <!-- Nodes in a row -->
    <rect x="22" y="170" width="28" height="20" rx="4" fill="#00695C" filter="url(#shadow)"/>
    <text x="36" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">P1</text>

    <rect x="58" y="170" width="28" height="20" rx="4" fill="#00695C" filter="url(#shadow)"/>
    <text x="72" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">P2</text>

    <rect x="94" y="170" width="28" height="20" rx="4" fill="#E65100" filter="url(#shadow)"/>
    <text x="108" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">P3</text>
    <text x="108" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">initiator</text>

    <rect x="130" y="170" width="28" height="20" rx="4" fill="#00695C" filter="url(#shadow)"/>
    <text x="144" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">P4</text>

    <rect x="166" y="170" width="28" height="20" rx="4" fill="#3949AB" filter="url(#shadow)" stroke="#FFD54F" stroke-width="1.5"/>
    <text x="180" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">P5</text>
    <text x="180" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB" font-weight="bold">&#9733; winner</text>

    <!-- Election arrows from P3 to higher IDs -->
    <line x1="115" y1="176" x2="128" y2="176" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="115" y1="178" x2="164" y2="178" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Steps -->
    <text x="20" y="202" font-family="Arial, sans-serif" font-size="7.5" fill="#333">1. P3 detects leader crash</text>
    <text x="20" y="212" font-family="Arial, sans-serif" font-size="7.5" fill="#333">2. Sends ELECTION to P4, P5</text>
    <text x="20" y="222" font-family="Arial, sans-serif" font-size="7.5" fill="#333">3. P4 &amp; P5 reply OK (alive)</text>
    <text x="20" y="232" font-family="Arial, sans-serif" font-size="7.5" fill="#333">4. P5 (highest ID) becomes leader</text>
    <text x="20" y="244" font-family="Arial, sans-serif" font-size="7.5" fill="#C62828" font-weight="bold">5. P5 sends COORDINATOR msg to all</text>
  </g>

  <!-- ==================== G4: Ring Algorithm (4.5s) ==================== -->
  <g opacity="0" data-narration="In the Ring Algorithm, an election message circulates around a logical ring. Each node appends its own ID if it is higher. When the message returns to the initiator, the node with the largest ID is elected as leader.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <rect x="215" y="135" width="195" height="118" rx="8" fill="white" fill-opacity="0.75" stroke="#E65100" stroke-width="1.2"/>
    <text x="312" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Ring Algorithm</text>
    <text x="312" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">Message circulates, largest ID wins</text>

    <!-- Ring of nodes -->
    <circle cx="280" cy="190" r="11" fill="#E65100" filter="url(#shadow)"/>
    <text x="280" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white" font-weight="bold">P2</text>
    <text x="280" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">start</text>

    <circle cx="335" cy="190" r="11" fill="url(#nodeGrad)" filter="url(#shadow)"/>
    <text x="335" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white" font-weight="bold">P5</text>

    <circle cx="355" cy="228" r="11" fill="url(#nodeGrad)" filter="url(#shadow)"/>
    <text x="355" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white" font-weight="bold">P1</text>

    <circle cx="312" cy="245" r="11" fill="url(#nodeGrad)" filter="url(#shadow)"/>
    <text x="312" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white" font-weight="bold">P4</text>

    <circle cx="260" cy="228" r="11" fill="url(#nodeGrad)" filter="url(#shadow)"/>
    <text x="260" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white" font-weight="bold">P3</text>

    <!-- Ring arrows (clockwise) -->
    <path d="M292,186 Q310,178 324,186" fill="none" stroke="#E65100" stroke-width="1.2" stroke-dasharray="3,2"/>
    <path d="M344,196 Q356,208 356,216" fill="none" stroke="#E65100" stroke-width="1.2" stroke-dasharray="3,2"/>
    <path d="M348,236 Q335,248 324,248" fill="none" stroke="#E65100" stroke-width="1.2" stroke-dasharray="3,2"/>
    <path d="M300,248 Q282,248 266,238" fill="none" stroke="#E65100" stroke-width="1.2" stroke-dasharray="3,2"/>
    <path d="M256,218 Q258,202 272,192" fill="none" stroke="#E65100" stroke-width="1.2" stroke-dasharray="3,2"/>

    <!-- Winner highlight on P5 -->
    <circle cx="335" cy="190" r="14" fill="none" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="365" y="188" font-family="Arial, sans-serif" font-size="6" fill="#3949AB" font-weight="bold">&#9733;Leader</text>
  </g>

  <!-- ==================== G5: Requirements (6.0s) ==================== -->
  <g opacity="0" data-narration="Election algorithms must satisfy Safety, meaning at most one leader is elected at any time, and Liveness, meaning a leader is eventually elected. They must also handle node failures and network partitions gracefully.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <rect x="10" y="260" width="195" height="68" rx="8" fill="white" fill-opacity="0.75" stroke="#00695C" stroke-width="1.2"/>
    <text x="107" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Requirements</text>

    <!-- Safety -->
    <rect x="18" y="282" width="84" height="38" rx="5" fill="#E8F5E9" stroke="#00695C" stroke-width="0.8"/>
    <text x="60" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00695C">Safety</text>
    <text x="60" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">At most one</text>
    <text x="60" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">leader at a time</text>

    <!-- Liveness -->
    <rect x="112" y="282" width="84" height="38" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
    <text x="154" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Liveness</text>
    <text x="154" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">Eventually a</text>
    <text x="154" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">leader is elected</text>
  </g>

  <!-- ==================== G6: Applications (7.5s) ==================== -->
  <g opacity="0" data-narration="Leader election is used in database primary selection for replication, cluster management to coordinate worker nodes, and distributed lock management to ensure mutual exclusion.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <rect x="215" y="260" width="195" height="68" rx="8" fill="white" fill-opacity="0.75" stroke="#3949AB" stroke-width="1.2"/>
    <text x="312" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Applications</text>

    <rect x="222" y="282" width="56" height="38" rx="5" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.8"/>
    <text x="250" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#3949AB">Database</text>
    <text x="250" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Primary</text>
    <text x="250" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Selection</text>

    <rect x="284" y="282" width="56" height="38" rx="5" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.8"/>
    <text x="312" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#3949AB">Cluster</text>
    <text x="312" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Management</text>
    <text x="312" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#333">&amp; Scheduling</text>

    <rect x="346" y="282" width="56" height="38" rx="5" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.8"/>
    <text x="374" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#3949AB">Dist. Lock</text>
    <text x="374" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Management</text>
    <text x="374" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#333">&amp; Mutex</text>
  </g>

  <!-- Footer -->
  <text x="210" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666" opacity="0.6"> BCS515D - Distributed Systems - Module 4</text>
</svg>
