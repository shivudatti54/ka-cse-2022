<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="consensus-and-related-problems">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title (0.3s) -->
  <g opacity="0" data-narration="Consensus and Related Problems in distributed systems">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#3949AB">Consensus &amp; Related Problems</text>
    <line x1="95" y1="34" x2="325" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- G2: Consensus Problem - Nodes proposing then deciding (1.5s) -->
  <g opacity="0" data-narration="All processes must agree on a single value. Nodes propose different values v1 v2 v3, then all decide on one common value.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">The Consensus Problem</text>
    <!-- Node P1 proposing v1 -->
    <circle cx="70" cy="82" r="16" fill="#3949AB" stroke="#283593" stroke-width="1"/>
    <text x="70" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">P1</text>
    <text x="70" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100" font-weight="bold">v1</text>
    <!-- Node P2 proposing v2 -->
    <circle cx="150" cy="82" r="16" fill="#3949AB" stroke="#283593" stroke-width="1"/>
    <text x="150" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">P2</text>
    <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100" font-weight="bold">v2</text>
    <!-- Node P3 proposing v3 -->
    <circle cx="110" cy="120" r="16" fill="#3949AB" stroke="#283593" stroke-width="1"/>
    <text x="110" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">P3</text>
    <text x="110" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100" font-weight="bold">v3</text>
    <!-- Arrow to decision -->
    <line x1="175" y1="95" x2="210" y2="95" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <!-- Decision box -->
    <rect x="222" y="68" width="85" height="55" rx="8" fill="#00695C" stroke="#004D40" stroke-width="1"/>
    <text x="264" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">All Decide</text>
    <text x="264" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFEB3B" font-weight="bold">v2</text>
    <text x="264" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#B2DFDB">P1=v2, P2=v2, P3=v2</text>
    <!-- Label -->
    <text x="330" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#3949AB" font-style="italic">single value</text>
  </g>

  <!-- G3: Requirements (3.0s) -->
  <g opacity="0" data-narration="Consensus requires Agreement: all decide same value, Validity: decided value was proposed, Termination: all eventually decide, Integrity: each process decides only once.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">Consensus Requirements</text>
    <!-- Agreement -->
    <rect x="12" y="165" width="92" height="38" rx="6" fill="#3949AB"/>
    <text x="58" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Agreement</text>
    <text x="58" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C5CAE9">All decide same</text>
    <!-- Validity -->
    <rect x="112" y="165" width="92" height="38" rx="6" fill="#00695C"/>
    <text x="158" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Validity</text>
    <text x="158" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#B2DFDB">Value was proposed</text>
    <!-- Termination -->
    <rect x="212" y="165" width="92" height="38" rx="6" fill="#E65100"/>
    <text x="258" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Termination</text>
    <text x="258" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFE0B2">All eventually decide</text>
    <!-- Integrity -->
    <rect x="312" y="165" width="96" height="38" rx="6" fill="#C62828"/>
    <text x="360" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Integrity</text>
    <text x="360" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFCDD2">Decide only once</text>
  </g>

  <!-- G4: FLP Impossibility (4.5s) -->
  <g opacity="0" data-narration="FLP Impossibility: In an asynchronous system with even one crash failure, no deterministic consensus protocol exists. This is a landmark impossibility result by Fischer, Lynch, and Paterson.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="12" y="212" width="396" height="52" rx="8" fill="#C62828" stroke="#B71C1C" stroke-width="1.5"/>
    <text x="22" y="228" font-family="Arial, sans-serif" font-size="10" fill="#FFEB3B" font-weight="bold">FLP Impossibility Result (1985)</text>
    <text x="22" y="242" font-family="Arial, sans-serif" font-size="8" fill="white">In an async system with even 1 crash failure, NO deterministic</text>
    <text x="22" y="254" font-family="Arial, sans-serif" font-size="8" fill="white">consensus protocol exists. (Fischer, Lynch, Paterson)</text>
    <!-- Warning icon -->
    <polygon points="380,220 395,250 365,250" fill="#FFEB3B" stroke="#F57F17" stroke-width="1"/>
    <text x="380" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C62828" font-weight="bold">!</text>
    <text x="380" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#FFCDD2">Landmark</text>
  </g>

  <!-- G5: Practical Algorithms - Paxos and Raft (6.0s) -->
  <g opacity="0" data-narration="Practical consensus algorithms: Paxos uses proposer, acceptor, and learner phases. Raft uses leader election and log replication for simpler understanding.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Practical Consensus Algorithms</text>
    <!-- Paxos flow -->
    <rect x="12" y="288" width="195" height="54" rx="7" fill="white" stroke="#3949AB" stroke-width="1.2" opacity="0.9"/>
    <text x="110" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Paxos</text>
    <rect x="18" y="306" width="50" height="18" rx="4" fill="#3949AB"/>
    <text x="43" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Proposer</text>
    <line x1="70" y1="315" x2="82" y2="315" stroke="#3949AB" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <rect x="85" y="306" width="50" height="18" rx="4" fill="#00695C"/>
    <text x="110" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Acceptor</text>
    <line x1="137" y1="315" x2="149" y2="315" stroke="#00695C" stroke-width="1" marker-end="url(#arrowGreen)"/>
    <rect x="152" y="306" width="48" height="18" rx="4" fill="#E65100"/>
    <text x="176" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Learner</text>
    <text x="110" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#3949AB" font-style="italic">prepare &gt; promise &gt; accept</text>
    <!-- Raft flow -->
    <rect x="215" y="288" width="193" height="54" rx="7" fill="white" stroke="#00695C" stroke-width="1.2" opacity="0.9"/>
    <text x="312" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#00695C">Raft</text>
    <rect x="222" y="306" width="58" height="18" rx="4" fill="#00695C"/>
    <text x="251" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Leader Elect</text>
    <line x1="282" y1="315" x2="298" y2="315" stroke="#E65100" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <rect x="301" y="306" width="58" height="18" rx="4" fill="#E65100"/>
    <text x="330" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Log Replicate</text>
    <line x1="361" y1="315" x2="373" y2="315" stroke="#3949AB" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <rect x="375" y="306" width="28" height="18" rx="4" fill="#3949AB"/>
    <text x="389" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="white">Commit</text>
    <text x="312" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#00695C" font-style="italic">simpler than Paxos</text>
  </g>

  <!-- G6: Related Problems (7.5s) -->
  <g opacity="0" data-narration="Related problems include Byzantine Generals for handling malicious failures, Atomic Broadcast for total order delivery, Leader Election for coordinator selection, and State Machine Replication for fault-tolerant services.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Related Problems</text>
    <rect x="12" y="367" width="92" height="24" rx="5" fill="#3949AB"/>
    <text x="58" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white" font-weight="bold">Byzantine Gen.</text>
    <rect x="112" y="367" width="92" height="24" rx="5" fill="#00695C"/>
    <text x="158" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white" font-weight="bold">Atomic Broadcast</text>
    <rect x="212" y="367" width="92" height="24" rx="5" fill="#E65100"/>
    <text x="258" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white" font-weight="bold">Leader Election</text>
    <rect x="312" y="367" width="96" height="24" rx="5" fill="#C62828"/>
    <text x="360" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white" font-weight="bold">State Machine Rep.</text>
  </g>
</svg>
