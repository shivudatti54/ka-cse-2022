<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="directory-services">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title "Directory Services" with underline (begin=0.3s) -->
  <g opacity="0" data-narration="Directory Services store and organize information about distributed resources for efficient lookup.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <rect x="90" y="8" width="240" height="32" rx="6" fill="url(#headerGrad)" filter="url(#shadow)"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Directory Services</text>
    <line x1="120" y1="37" x2="300" y2="37" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- G2: What is a directory service? (begin=1.5s) -->
  <g opacity="0" data-narration="A directory service stores and organizes information about network resources such as users, services, and devices. Unlike naming services, directories support lookup by attributes, not just names.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <rect x="12" y="48" width="396" height="52" rx="7" fill="#FFFFFF" stroke="#3949AB" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="22" y="64" font-family="Arial,sans-serif" font-size="10.5" font-weight="bold" fill="#3949AB">What is a Directory Service?</text>
    <text x="22" y="78" font-family="Arial,sans-serif" font-size="9.5" fill="#333">Stores &amp; organizes info about resources (users, services, devices).</text>
    <text x="22" y="92" font-family="Arial,sans-serif" font-size="9.5" fill="#333">Supports lookup by attributes, not just names — richer queries than naming.</text>
  </g>

  <!-- G3: LDAP & DIT hierarchy (begin=3.0s) -->
  <g opacity="0" data-narration="LDAP, the Lightweight Directory Access Protocol, organizes data in a hierarchical Directory Information Tree. The tree uses domain components (dc), organizational units (ou), and common names (cn) as entries.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="12" y="108" width="192" height="130" rx="7" fill="#FFFFFF" stroke="#00695C" stroke-width="1.2" filter="url(#shadow)"/>
    <rect x="12" y="108" width="192" height="20" rx="7" fill="#00695C"/>
    <rect x="12" y="118" width="192" height="10" fill="#00695C"/>
    <text x="108" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">LDAP &amp; DIT Hierarchy</text>

    <!-- DIT Tree -->
    <rect x="62" y="136" width="96" height="16" rx="4" fill="#E8F5E9" stroke="#00695C" stroke-width="0.8"/>
    <text x="110" y="148" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#00695C">dc=example,dc=com</text>

    <!-- Branches from root -->
    <line x1="90" y1="152" x2="58" y2="165" stroke="#00695C" stroke-width="1"/>
    <line x1="130" y1="152" x2="158" y2="165" stroke="#00695C" stroke-width="1"/>

    <!-- ou=People -->
    <rect x="22" y="165" width="72" height="15" rx="3" fill="#C8E6C9" stroke="#00695C" stroke-width="0.7"/>
    <text x="58" y="176" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">ou=People</text>

    <!-- ou=Services -->
    <rect x="122" y="165" width="72" height="15" rx="3" fill="#C8E6C9" stroke="#00695C" stroke-width="0.7"/>
    <text x="158" y="176" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">ou=Services</text>

    <!-- cn entries under People -->
    <line x1="44" y1="180" x2="36" y2="192" stroke="#00695C" stroke-width="0.8"/>
    <line x1="72" y1="180" x2="80" y2="192" stroke="#00695C" stroke-width="0.8"/>

    <rect x="16" y="192" width="48" height="14" rx="3" fill="#E8F5E9" stroke="#00695C" stroke-width="0.6"/>
    <text x="40" y="202" text-anchor="middle" font-family="monospace" font-size="7" fill="#333">cn=Alice</text>

    <rect x="68" y="192" width="42" height="14" rx="3" fill="#E8F5E9" stroke="#00695C" stroke-width="0.6"/>
    <text x="89" y="202" text-anchor="middle" font-family="monospace" font-size="7" fill="#333">cn=Bob</text>

    <!-- cn entries under Services -->
    <line x1="158" y1="180" x2="158" y2="192" stroke="#00695C" stroke-width="0.8"/>
    <rect x="132" y="192" width="52" height="14" rx="3" fill="#E8F5E9" stroke="#00695C" stroke-width="0.6"/>
    <text x="158" y="202" text-anchor="middle" font-family="monospace" font-size="7" fill="#333">cn=LDAP</text>

    <text x="22" y="224" font-family="Arial,sans-serif" font-size="8.5" fill="#555">DIT = Directory Information Tree</text>
  </g>

  <!-- G4: X.500 Standard (begin=4.5s) -->
  <g opacity="0" data-narration="X.500 is the ISO standard for directory services. It defines DAP (Directory Access Protocol), which LDAP simplifies. X.500 uses a Directory Information Base (DIB) and Directory System Agents (DSA) for distributed directory access.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="216" y="108" width="192" height="130" rx="7" fill="#FFFFFF" stroke="#E65100" stroke-width="1.2" filter="url(#shadow)"/>
    <rect x="216" y="108" width="192" height="20" rx="7" fill="#E65100"/>
    <rect x="216" y="118" width="192" height="10" fill="#E65100"/>
    <text x="312" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">X.500 Standard</text>

    <!-- DAP vs LDAP -->
    <text x="226" y="145" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">DAP vs LDAP:</text>
    <text x="226" y="157" font-family="Arial,sans-serif" font-size="8.5" fill="#444">DAP — full X.500 protocol (heavy, OSI-based)</text>
    <text x="226" y="168" font-family="Arial,sans-serif" font-size="8.5" fill="#444">LDAP — lightweight, runs over TCP/IP</text>

    <!-- DIB -->
    <text x="226" y="184" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">DIB (Directory Information Base):</text>
    <text x="226" y="196" font-family="Arial,sans-serif" font-size="8.5" fill="#444">The complete set of directory data</text>

    <!-- DSA -->
    <text x="226" y="212" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">DSA (Directory System Agent):</text>
    <text x="226" y="224" font-family="Arial,sans-serif" font-size="8.5" fill="#444">Server that holds a portion of the DIB</text>
  </g>

  <!-- G5: Operations (begin=6.0s) -->
  <g opacity="0" data-narration="Core directory operations include Bind for authentication, Search with base DN, scope and filter parameters, and CRUD operations like Add, Delete, Modify and Compare for entry management.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="12" y="248" width="396" height="68" rx="7" fill="#FFFFFF" stroke="#C62828" stroke-width="1.2" filter="url(#shadow)"/>
    <rect x="12" y="248" width="396" height="20" rx="7" fill="#C62828"/>
    <rect x="12" y="258" width="396" height="10" fill="#C62828"/>
    <text x="210" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">Directory Operations</text>

    <!-- Operation boxes in a row -->
    <rect x="22" y="276" width="50" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.7"/>
    <text x="47" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Bind</text>

    <rect x="78" y="276" width="84" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.7"/>
    <text x="120" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Search</text>

    <rect x="168" y="276" width="42" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.7"/>
    <text x="189" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Add</text>

    <rect x="216" y="276" width="50" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.7"/>
    <text x="241" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Delete</text>

    <rect x="272" y="276" width="54" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.7"/>
    <text x="299" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Modify</text>

    <rect x="332" y="276" width="66" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.7"/>
    <text x="365" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Compare</text>

    <text x="22" y="306" font-family="Arial,sans-serif" font-size="8.5" fill="#555">Search params: base DN, scope (base/one/sub), filter (e.g. (cn=Alice))</text>
  </g>

  <!-- G6: Examples & Use Cases (begin=7.5s) -->
  <g opacity="0" data-narration="Common directory service implementations include Microsoft Active Directory, OpenLDAP, and DNS which acts as a specialized directory. Use cases span authentication, authorization, address books, and resource discovery.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="12" y="324" width="396" height="68" rx="7" fill="#FFFFFF" stroke="#3949AB" stroke-width="1.2" filter="url(#shadow)"/>
    <rect x="12" y="324" width="396" height="20" rx="7" fill="#3949AB"/>
    <rect x="12" y="334" width="396" height="10" fill="#3949AB"/>
    <text x="210" y="339" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">Examples &amp; Use Cases</text>

    <!-- Example boxes -->
    <rect x="22" y="352" width="90" height="16" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.7"/>
    <text x="67" y="364" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#3949AB">Active Directory</text>

    <rect x="118" y="352" width="68" height="16" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.7"/>
    <text x="152" y="364" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#3949AB">OpenLDAP</text>

    <rect x="192" y="352" width="90" height="16" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.7"/>
    <text x="237" y="364" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#3949AB">DNS as Directory</text>

    <text x="22" y="382" font-family="Arial,sans-serif" font-size="8.5" fill="#555">Use cases: Authentication, Authorization, Address books, Resource discovery</text>
  </g>
</svg>
