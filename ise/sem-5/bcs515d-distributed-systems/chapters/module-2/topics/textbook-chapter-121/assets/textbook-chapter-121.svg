<svg width="420" height="400" data-topic-id="distributed-systems-fluid">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E8F8" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastelGradient)" rx="10" />
  
  <!-- Title Section -->
  <g data-narration="Introduction to Distributed File Systems">
    <rect x="10" y="10" width="400" height="40" fill="#4C5154" rx="5" />
    <g transform="translate(15, 15)">
      <text font-size="24" font-family="Arial" fill="#87CEEB" text-anchor="middle">Distributed File Systems</text>
    </g>
    <line x1="20" y1="40" x2="400" y2="40" stroke="#87CEEB" stroke-width="2" />
  </g>
  
  <!-- File Service Architecture Section -->
  <g data-narration="File Service Architecture">
    <rect x="10" y="60" width="400" height="80" fill="#4C5154" rx="5" />
    <g transform="translate(10, 60)">
      <text font-size="18" font-family="Arial" fill="#4C5154" text-anchor="start">File System Client</text>
      <line x1="15" y1="75" x2="380" y2="75" stroke="#87CEEB" stroke-width="2" />
      <text font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="end">File System Server</text>
    </g>
    <g transform="translate(10, 80)">
      <text font-size="18" font-family="Arial" fill="#4C5154" text-anchor="start">File System Manager</text>
      <line x1="15" y1="95" x2="380" y2="95" stroke="#87CEEB" stroke-width="2" />
      <text font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="end">Storage Devices</text>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Key Concepts">
    <rect x="10" y="150" width="400" height="80" fill="#4C5154" rx="5" />
    <g transform="translate(10, 150)">
      <text font-size="18" font-family="Arial" fill="#4C5154" text-anchor="start">Distributed Computing</text>
      <line x1="15" y1="165" x2="320" y2="165" stroke="#87CEEB" stroke-width="2" />
      <text font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="end">File System Hierarchy Standard (FHS)</text>
    </g>
    <g transform="translate(10, 180)">
      <text font-size="18" font-family="Arial" fill="#4C5154" text-anchor="start">File System Encryption (FSE)</text>
      <line x1="15" y1="195" x2="320" y2="195" stroke="#87CEEB" stroke-width="2" />
      <text font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="end">Access Control Lists (ACLs)</text>
    </g>
    <g transform="translate(10, 210)">
      <text font-size="18" font-family="Arial" fill="#4C5154" text-anchor="start">File System Replication (FSR)</text>
      <line x1="15" y1="225" x2="320" y2="225" stroke="#87CEEB" stroke-width="2" />
      <text font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="end">Distributed Computing</text>
    </g>
  </g>
  
  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" dur="10s" fill="freeze">
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" delay="1s" />
    <animateTransform attributeName="transform" type="translate" from="210 210" to="210 250" delay="2s" />
    <animateTransform attributeName="transform" type="translate" from="210 250" to="210 190" delay="3s" />
  </animate>
  
  <!-- Footer Section -->
  <g data-narration="Footer">
    <rect x="10" y="280" width="400" height="20" fill="#4C5154" rx="5" />
    <text font-size="14" font-family="Arial" fill="#4C5154" text-anchor="start">Copyright 2023</text>
  </g>
</svg>