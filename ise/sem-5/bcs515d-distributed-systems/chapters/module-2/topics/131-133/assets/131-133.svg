<svg width="420" height="400" data-topic-id="131-133" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #87CEEB;">

    <!-- Title -->
    <text x="10" y="50" font-size="24" font-family="Arial" text-anchor="start" fill="#3498DB">
        Distributed File System (DFS)
    </text>

    <!-- Section 1: Overview -->
    <rect x="10" y="70" width="400" height="50" fill="rgba(240, 230, 140, 0.5)"/>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-50" dur="1s" begin="0s"/>
    <g transform="translate(10, -60)">
        <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2ECC71">
            Overview
        </text>
        <rect x="10" y="30" width="370" height="30" fill="rgba(240, 230, 140, 0.5)"/>
        <animateTransform attributeName="transform" type="translateY" from="0" to="-30" dur="1s" begin="0s"/>
        <text x="10" y="50" font-size="16" font-family="Arial" text-anchor="start" fill="#2ECC71" data-narration="A Distributed File System (DFS) is a type of file system that spans multiple physical locations, allowing users to access and share files across a network of computers. DFS enables high scalability, fault tolerance, and performance, making it an essential component of modern computing systems." style="opacity: 0;"/>
    </g>

    <!-- Section 2: Key Characteristics -->
    <rect x="10" y="120" width="400" height="50" fill="rgba(240, 230, 140, 0.5)"/>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-50" dur="1s" begin="0.5s"/>
    <g transform="translate(10, -60)">
        <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2ECC71">
            Key Characteristics
        </text>
        <rect x="10" y="30" width="370" height="30" fill="rgba(240, 230, 140, 0.5)"/>
        <animateTransform attributeName="transform" type="translateY" from="0" to="-30" dur="1s" begin="0.5s"/>
        <text x="10" y="50" font-size="16" font-family="Arial" text-anchor="start" fill="#2ECC71" data-narration="DFS allows for the addition of new nodes to the system as needed, enabling it to grow with the organization. DFS can continue to function even if one or more nodes fail, ensuring that data is not lost. DFS can distribute read and write operations across multiple nodes, improving overall system performance." style="opacity: 0;"/>
    </g>

    <!-- Section 3: Benefits -->
    <rect x="10" y="210" width="400" height="50" fill="rgba(240, 230, 140, 0.5)"/>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-50" dur="1s" begin="1s"/>
    <g transform="translate(10, -60)">
        <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2ECC71">
            Benefits
        </text>
        <rect x="10" y="30" width="370" height="30" fill="rgba(240, 230, 140, 0.5)"/>
        <animateTransform attributeName="transform" type="translateY" from="0" to="-30" dur="1s" begin="1s"/>
        <text x="10" y="50" font-size="16" font-family="Arial" text-anchor="start" fill="#2ECC71" data-narration="DFS ensures that files are always accessible, even in the event of hardware failures. DFS facilitates collaboration by enabling multiple users to access and share files simultaneously. DFS improves system performance, allowing users to work more efficiently." style="opacity: 0;"/>
    </g>

    <!-- Section 4: Types of Distributed File Systems -->
    <rect x="10" y="300" width="400" height="50" fill="rgba(240, 230, 140, 0.5)"/>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-50" dur="1s" begin="1.5s"/>
    <g transform="translate(10, -60)">
        <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2ECC71">
            Types of Distributed File Systems
        </text>
        <rect x="10" y="30" width="370" height="30" fill="rgba(240, 230, 140, 0.5)"/>
        <animateTransform attributeName="transform" type="translateY" from="0" to="-30" dur="1s" begin="1.5s"/>
        <text x="10" y="50" font-size="16" font-family="Arial" text-anchor="start" fill="#2ECC71" data-narration="The Client-Server Model is a centralized server that manages the file system, with clients accessing files through a network. The Peer-to-Peer Model is a decentralized system where all nodes act as both clients and servers." style="opacity: 0;"/>
    </g>

    <!-- Section 5: Example Use Cases -->
    <rect x="10" y="390" width="400" height="50" fill="rgba(240, 230, 140, 0.5)"/>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-50" dur="1s" begin="2s"/>
    <g transform="translate(10, -60)">
        <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2ECC71">
            Example Use Cases
        </text>
        <rect x="10" y="30" width="370" height="30" fill="rgba(240, 230, 140, 0.5)"/>
        <animateTransform attributeName="transform" type="translateY" from="0" to="-30" dur="1s" begin="2s"/>
        <text x="10" y="50" font-size="16" font-family="Arial" text-anchor="start" fill="#2ECC71" data-narration="Cloud storage services like Amazon S3 and Google Cloud Storage use DFS to provide scalable and fault-tolerant storage. File sharing systems like Dropbox and Google Drive use DFS to enable users to access and share files across different devices." style="opacity: 0;"/>
    </g>

    <!-- Footer -->
    <text x="10" y="400" font-size="16" font-family="Arial" text-anchor="start" fill="#2ECC71">
        Created by [Your Name]
    </text>

</svg>