<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="challenges">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- G1: Title (begin=0.3s) -->
  <g opacity="0" data-narration="Challenges of Distributed Systems - key obstacles in building reliable distributed systems">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#3949AB">Challenges of Distributed Systems</text>
    <line x1="60" y1="34" x2="360" y2="34" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- G2: Heterogeneity (begin=1.5s) -->
  <g opacity="0" data-narration="Heterogeneity: distributed systems integrate different hardware, operating systems, networks, and programming languages. Middleware provides an abstraction layer to bridge these differences.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <rect x="10" y="42" width="195" height="115" rx="6" fill="white" fill-opacity="0.85" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="10" y="42" width="195" height="22" rx="6" fill="#3949AB"/>
    <rect x="10" y="56" width="195" height="8" fill="#3949AB"/>
    <text x="107" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Heterogeneity</text>
    <!-- Icons row: hardware, OS, network, lang -->
    <rect x="20" y="72" width="38" height="28" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.8"/>
    <text x="39" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">HW</text>
    <text x="39" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">x86/ARM</text>
    <rect x="63" y="72" width="38" height="28" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.8"/>
    <text x="82" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">OS</text>
    <text x="82" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">Win/Linux</text>
    <rect x="106" y="72" width="38" height="28" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.8"/>
    <text x="125" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">Net</text>
    <text x="125" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">TCP/UDP</text>
    <rect x="149" y="72" width="46" height="28" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.8"/>
    <text x="172" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">Lang</text>
    <text x="172" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">Java/C++</text>
    <!-- Arrows down -->
    <polygon points="39,112 36,108 42,108" fill="#3949AB"/>
    <polygon points="82,112 79,108 85,108" fill="#3949AB"/>
    <polygon points="125,112 122,108 128,108" fill="#3949AB"/>
    <polygon points="172,112 169,108 175,108" fill="#3949AB"/>
    <!-- Middleware bar -->
    <rect x="20" y="114" width="175" height="20" rx="4" fill="#3949AB" fill-opacity="0.15" stroke="#3949AB" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="107" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Middleware Abstraction Layer</text>
    <!-- Down arrow from middleware -->
    <polygon points="107,148 104,143 110,143" fill="#3949AB"/>
    <text x="107" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB">Unified Interface</text>
  </g>

  <!-- G3: Transparency (begin=3.0s) -->
  <g opacity="0" data-narration="Transparency hides the distributed nature of the system from users. Key types include access, location, concurrency, replication, failure, and migration transparency.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <rect x="215" y="42" width="195" height="115" rx="6" fill="white" fill-opacity="0.85" stroke="#00695C" stroke-width="1.5"/>
    <rect x="215" y="42" width="195" height="22" rx="6" fill="#00695C"/>
    <rect x="215" y="56" width="195" height="8" fill="#00695C"/>
    <text x="312" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Transparency</text>
    <!-- 6 transparency types in 2x3 grid -->
    <rect x="222" y="70" width="58" height="22" rx="3" fill="#E0F2F1" stroke="#00695C" stroke-width="0.8"/>
    <text x="251" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#00695C" font-weight="bold">Access</text>
    <rect x="284" y="70" width="58" height="22" rx="3" fill="#E0F2F1" stroke="#00695C" stroke-width="0.8"/>
    <text x="313" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#00695C" font-weight="bold">Location</text>
    <rect x="346" y="70" width="58" height="22" rx="3" fill="#E0F2F1" stroke="#00695C" stroke-width="0.8"/>
    <text x="375" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C" font-weight="bold">Concurrency</text>
    <rect x="222" y="96" width="58" height="22" rx="3" fill="#E0F2F1" stroke="#00695C" stroke-width="0.8"/>
    <text x="251" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C" font-weight="bold">Replication</text>
    <rect x="284" y="96" width="58" height="22" rx="3" fill="#E0F2F1" stroke="#00695C" stroke-width="0.8"/>
    <text x="313" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#00695C" font-weight="bold">Failure</text>
    <rect x="346" y="96" width="58" height="22" rx="3" fill="#E0F2F1" stroke="#00695C" stroke-width="0.8"/>
    <text x="375" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C" font-weight="bold">Migration</text>
    <!-- Goal text -->
    <text x="312" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C">Hide distribution from users</text>
    <text x="312" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C">System appears as single entity</text>
    <!-- Eye icon (simple) -->
    <ellipse cx="312" cy="151" rx="10" ry="5" fill="none" stroke="#00695C" stroke-width="0.8"/>
    <circle cx="312" cy="151" r="2.5" fill="#00695C"/>
  </g>

  <!-- G4: Scalability (begin=4.5s) -->
  <g opacity="0" data-narration="Scalability is the ability to handle growing numbers of users, data volumes, and transactions. Systems can scale up by adding more power to existing nodes, or scale out by adding more nodes.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="10" y="165" width="195" height="115" rx="6" fill="white" fill-opacity="0.85" stroke="#E65100" stroke-width="1.5"/>
    <rect x="10" y="165" width="195" height="22" rx="6" fill="#E65100"/>
    <rect x="10" y="179" width="195" height="8" fill="#E65100"/>
    <text x="107" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Scalability</text>
    <!-- Growing bars -->
    <rect x="22" y="220" width="12" height="15" rx="2" fill="#E65100" fill-opacity="0.3"/>
    <rect x="38" y="210" width="12" height="25" rx="2" fill="#E65100" fill-opacity="0.5"/>
    <rect x="54" y="197" width="12" height="38" rx="2" fill="#E65100" fill-opacity="0.7"/>
    <rect x="70" y="192" width="12" height="43" rx="2" fill="#E65100" fill-opacity="0.9"/>
    <text x="48" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#E65100">Users / Data / TXN</text>
    <!-- Scale Up vs Scale Out -->
    <rect x="95" y="195" width="50" height="35" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
    <text x="120" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#E65100">Scale Up</text>
    <text x="120" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">More CPU</text>
    <text x="120" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">More RAM</text>
    <rect x="150" y="195" width="50" height="35" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
    <text x="175" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#E65100">Scale Out</text>
    <text x="175" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Add nodes</text>
    <text x="175" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Distribute</text>
    <!-- Arrows -->
    <polygon points="120,248 117,243 123,243" fill="#E65100"/>
    <polygon points="175,248 172,243 178,243" fill="#E65100"/>
    <!-- Vertical vs Horizontal labels -->
    <text x="120" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Vertical</text>
    <text x="175" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Horizontal</text>
    <!-- Challenge text -->
    <text x="107" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#E65100" font-style="italic">Managing load distribution</text>
  </g>

  <!-- G5: Failure Handling (begin=6.0s) -->
  <g opacity="0" data-narration="Failure handling deals with partial failures where some nodes fail while others continue operating. Detecting failures and implementing recovery strategies are critical challenges.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <rect x="215" y="165" width="195" height="115" rx="6" fill="white" fill-opacity="0.85" stroke="#C62828" stroke-width="1.5"/>
    <rect x="215" y="165" width="195" height="22" rx="6" fill="#C62828"/>
    <rect x="215" y="179" width="195" height="8" fill="#C62828"/>
    <text x="312" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Failure Handling</text>
    <!-- Node diagrams: 3 nodes, one failed -->
    <circle cx="245" cy="210" r="12" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="245" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4CAF50" font-weight="bold">N1</text>
    <circle cx="312" cy="210" r="12" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="312" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C62828" font-weight="bold">N2</text>
    <!-- X mark on failed node -->
    <line x1="306" y1="204" x2="318" y2="216" stroke="#C62828" stroke-width="2"/>
    <line x1="318" y1="204" x2="306" y2="216" stroke="#C62828" stroke-width="2"/>
    <circle cx="379" cy="210" r="12" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="379" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4CAF50" font-weight="bold">N3</text>
    <!-- Labels -->
    <text x="245" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#4CAF50">Running</text>
    <text x="312" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#C62828">Failed</text>
    <text x="379" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#4CAF50">Running</text>
    <!-- Strategies list -->
    <text x="222" y="246" font-family="Arial, sans-serif" font-size="7" fill="#C62828" font-weight="bold">Strategies:</text>
    <circle cx="227" cy="255" r="1.5" fill="#C62828"/>
    <text x="233" y="258" font-family="Arial, sans-serif" font-size="6.5" fill="#C62828">Detect: heartbeats, timeouts</text>
    <circle cx="227" cy="265" r="1.5" fill="#C62828"/>
    <text x="233" y="268" font-family="Arial, sans-serif" font-size="6.5" fill="#C62828">Recover: checkpoints, replicas</text>
    <circle cx="227" cy="275" r="1.5" fill="#C62828"/>
    <text x="233" y="278" font-family="Arial, sans-serif" font-size="6.5" fill="#C62828">Mask: redundancy, failover</text>
  </g>

  <!-- G6: Security & Concurrency (begin=7.5s) -->
  <g opacity="0" data-narration="Security involves authentication across multiple nodes. Concurrency challenges include distributed locking, avoiding race conditions, and clock synchronization using logical or vector clocks.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="10" y="288" width="400" height="102" rx="6" fill="white" fill-opacity="0.85" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="10" y="288" width="400" height="22" rx="6" fill="#3949AB"/>
    <rect x="10" y="302" width="400" height="8" fill="#3949AB"/>
    <text x="210" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Security &amp; Concurrency</text>
    <!-- Security section -->
    <rect x="18" y="316" width="185" height="66" rx="4" fill="#E8EAF6" fill-opacity="0.5" stroke="#3949AB" stroke-width="0.5"/>
    <text x="110" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB">Security</text>
    <!-- Auth across nodes diagram -->
    <rect x="28" y="334" width="40" height="18" rx="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.6"/>
    <text x="48" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">Node A</text>
    <rect x="80" y="334" width="40" height="18" rx="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.6"/>
    <text x="100" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">Node B</text>
    <rect x="132" y="334" width="40" height="18" rx="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.6"/>
    <text x="152" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">Node C</text>
    <!-- Auth labels -->
    <line x1="68" y1="343" x2="80" y2="343" stroke="#3949AB" stroke-width="0.8"/>
    <line x1="120" y1="343" x2="132" y2="343" stroke="#3949AB" stroke-width="0.8"/>
    <text x="74" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#3949AB">Auth</text>
    <text x="126" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#3949AB">Auth</text>
    <text x="110" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB" font-style="italic">Cross-node authentication</text>
    <text x="110" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#3949AB" font-style="italic">Encryption &amp; access control</text>
    <!-- Concurrency section -->
    <rect x="213" y="316" width="190" height="66" rx="4" fill="#FFF3E0" fill-opacity="0.5" stroke="#E65100" stroke-width="0.5"/>
    <text x="308" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Concurrency</text>
    <!-- Concurrency items -->
    <rect x="223" y="336" width="50" height="16" rx="3" fill="#FFE0B2" stroke="#E65100" stroke-width="0.6"/>
    <text x="248" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Dist. Lock</text>
    <rect x="280" y="336" width="50" height="16" rx="3" fill="#FFE0B2" stroke="#E65100" stroke-width="0.6"/>
    <text x="305" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Race Cond.</text>
    <rect x="337" y="336" width="58" height="16" rx="3" fill="#FFE0B2" stroke="#E65100" stroke-width="0.6"/>
    <text x="366" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Clock Sync</text>
    <!-- Clock sync detail -->
    <text x="308" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100" font-style="italic">Logical clocks (Lamport)</text>
    <text x="308" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100" font-style="italic">Vector clocks for ordering</text>
    <text x="308" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100" font-style="italic">Mutual exclusion protocols</text>
  </g>
</svg>
