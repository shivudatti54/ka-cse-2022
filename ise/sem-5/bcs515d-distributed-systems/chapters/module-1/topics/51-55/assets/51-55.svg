    </g>
    <rect x="0" y="120" width="200" height="100" fill="#F1C40F" rx="10"/>
    <g transform="translate(25, 130)">
      <text x="25" y="150" font-size="16" fill="#F1C40F" font-family="Arial, sans-serif">Scalability</text>
      <animateTransform attributeName="transform" type="translate" from="25 130" to="25 140" dur="2s" begin="0.5s"/>
