<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="resource-sharing">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3949AB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#E65100"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- G1: Title "Resource Sharing" with underline (begin=0.3s) -->
  <g opacity="0" data-narration="Resource Sharing allows multiple users and processes to access shared resources across a distributed system.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3949AB">Resource Sharing</text>
    <line x1="110" y1="34" x2="310" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">in Distributed Systems</text>
  </g>

  <!-- G2: What is resource sharing? (begin=1.5s) -->
  <g opacity="0" data-narration="Resource sharing means multiple users or processes access shared resources such as files, printers, databases, and services over a network.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <rect x="15" y="56" width="390" height="52" rx="8" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">What is Resource Sharing?</text>
    <text x="210" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Multiple users/processes access shared resources over a network.</text>
    <!-- Resource icons row -->
    <text x="75" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">Files</text>
    <text x="155" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">Printers</text>
    <text x="245" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">Databases</text>
    <text x="345" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#00695C">Services</text>
    <!-- Dots between -->
    <circle cx="115" cy="98" r="1.5" fill="#00695C"/>
    <circle cx="200" cy="98" r="1.5" fill="#00695C"/>
    <circle cx="295" cy="98" r="1.5" fill="#00695C"/>
  </g>

  <!-- G3: Client-Server Model (begin=3.0s) -->
  <g opacity="0" data-narration="In the Client-Server model, clients send requests to a central server which provides the shared resources back to them.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="112" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Client-Server Model</text>
    <!-- Server -->
    <rect x="85" y="132" width="54" height="36" rx="5" fill="#3949AB"/>
    <text x="112" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">SERVER</text>
    <rect x="95" y="152" width="34" height="4" rx="1" fill="#7986CB"/>
    <rect x="95" y="158" width="34" height="4" rx="1" fill="#7986CB"/>
    <!-- Client 1 -->
    <rect x="15" y="190" width="44" height="28" rx="4" fill="#00695C"/>
    <text x="37" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Client 1</text>
    <!-- Client 2 -->
    <rect x="90" y="190" width="44" height="28" rx="4" fill="#00695C"/>
    <text x="112" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Client 2</text>
    <!-- Client 3 -->
    <rect x="165" y="190" width="44" height="28" rx="4" fill="#00695C"/>
    <text x="187" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Client 3</text>
    <!-- Arrows from clients to server -->
    <line x1="37" y1="190" x2="100" y2="168" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <line x1="112" y1="190" x2="112" y2="168" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <line x1="187" y1="190" x2="124" y2="168" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <!-- Labels -->
    <text x="55" y="180" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">request</text>
    <text x="117" y="180" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">request</text>
    <text x="150" y="180" font-family="Arial, sans-serif" font-size="6" fill="#3949AB">request</text>
  </g>

  <!-- G4: Peer-to-Peer Model (begin=4.5s) -->
  <g opacity="0" data-narration="In the Peer-to-Peer model, each node acts as both client and server, enabling direct resource sharing between peers without a central server.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="330" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Peer-to-Peer Model</text>
    <!-- Peer A -->
    <rect x="282" y="134" width="40" height="24" rx="5" fill="#E65100"/>
    <text x="302" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Peer A</text>
    <!-- Peer B -->
    <rect x="348" y="134" width="40" height="24" rx="5" fill="#E65100"/>
    <text x="368" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Peer B</text>
    <!-- Peer C -->
    <rect x="282" y="186" width="40" height="24" rx="5" fill="#E65100"/>
    <text x="302" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Peer C</text>
    <!-- Peer D -->
    <rect x="348" y="186" width="40" height="24" rx="5" fill="#E65100"/>
    <text x="368" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Peer D</text>
    <!-- Connections between peers -->
    <line x1="322" y1="146" x2="348" y2="146" stroke="#E65100" stroke-width="1.2"/>
    <line x1="322" y1="198" x2="348" y2="198" stroke="#E65100" stroke-width="1.2"/>
    <line x1="302" y1="158" x2="302" y2="186" stroke="#E65100" stroke-width="1.2"/>
    <line x1="368" y1="158" x2="368" y2="186" stroke="#E65100" stroke-width="1.2"/>
    <line x1="322" y1="158" x2="348" y2="186" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="348" y1="158" x2="322" y2="186" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Label -->
    <text x="335" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100" font-style="italic">direct sharing</text>
  </g>

  <!-- G5: Resource Management (begin=6.0s) -->
  <g opacity="0" data-narration="Resource management involves three key aspects: Naming to locate resources, Access Control to authorize users, and Concurrency Control to handle simultaneous access.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Resource Management</text>
    <!-- Naming -->
    <rect x="15" y="250" width="120" height="54" rx="7" fill="white" fill-opacity="0.8" stroke="#C62828" stroke-width="1.2"/>
    <text x="75" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#C62828">Naming</text>
    <text x="75" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#444">Locate and identify</text>
    <text x="75" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#444">resources by name/URI</text>
    <text x="75" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C62828" font-style="italic">find resources</text>
    <!-- Access Control -->
    <rect x="150" y="250" width="120" height="54" rx="7" fill="white" fill-opacity="0.8" stroke="#C62828" stroke-width="1.2"/>
    <text x="210" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#C62828">Access Control</text>
    <text x="210" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#444">Authentication and</text>
    <text x="210" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#444">authorization policies</text>
    <text x="210" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C62828" font-style="italic">who can access</text>
    <!-- Concurrency Control -->
    <rect x="285" y="250" width="120" height="54" rx="7" fill="white" fill-opacity="0.8" stroke="#C62828" stroke-width="1.2"/>
    <text x="345" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#C62828">Concurrency</text>
    <text x="345" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#444">Handle simultaneous</text>
    <text x="345" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#444">access with locks/txn</text>
    <text x="345" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C62828" font-style="italic">simultaneous access</text>
  </g>

  <!-- G6: Examples (begin=7.5s) -->
  <g opacity="0" data-narration="Real-world examples of resource sharing include Cloud Storage, Network File Systems like NFS, Shared Databases, Web Services, and Distributed Computing projects like BOINC.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">Real-World Examples</text>
    <!-- Example boxes -->
    <rect x="15" y="330" width="72" height="30" rx="5" fill="#3949AB" fill-opacity="0.9"/>
    <text x="51" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Cloud</text>
    <text x="51" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Storage</text>

    <rect x="96" y="330" width="72" height="30" rx="5" fill="#00695C" fill-opacity="0.9"/>
    <text x="132" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">NFS</text>
    <text x="132" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">File Systems</text>

    <rect x="177" y="330" width="72" height="30" rx="5" fill="#E65100" fill-opacity="0.9"/>
    <text x="213" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Shared</text>
    <text x="213" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Databases</text>

    <rect x="258" y="330" width="72" height="30" rx="5" fill="#C62828" fill-opacity="0.9"/>
    <text x="294" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Web</text>
    <text x="294" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Services</text>

    <rect x="339" y="330" width="72" height="30" rx="5" fill="#3949AB" fill-opacity="0.85"/>
    <text x="375" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">BOINC</text>
    <text x="375" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Computing</text>

    <!-- Connecting dots -->
    <circle cx="88" cy="370" r="2" fill="#3949AB"/>
    <circle cx="168" cy="370" r="2" fill="#00695C"/>
    <circle cx="249" cy="370" r="2" fill="#E65100"/>
    <circle cx="330" cy="370" r="2" fill="#C62828"/>
    <line x1="88" y1="370" x2="330" y2="370" stroke="#999" stroke-width="0.8" stroke-dasharray="3,2"/>

    <text x="210" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555" font-style="italic">Distributed systems enable seamless resource sharing at scale</text>
  </g>
</svg>
