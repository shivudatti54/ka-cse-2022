<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="logical-time-and-logical-clocks" viewBox="0 0 420 400">
  <defs>
    <style>
      .background {
        fill: #C7E5F5;
        filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#C7E5F5', endColorstr='#A1C9F2' );
      }
      .section {
        background: #A1C9F2;
        border: 1px solid #007bff;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .title {
        font-size: 24px;
        font-weight: bold;
        color: #00698f;
      }
      .annotation {
        font-size: 18px;
        color: #666;
      }
    </style>
  </defs>
  <rect class="background" x="0" y="0" width="100%" height="100%"></rect>
  <text class="title" x="120" y="30" text-anchor="middle">Logical Time and Logical Clocks</text>
  <rect x="50" y="100" width="320" height="200" class="section" data-narration="What is Logical Time?">
    <text x="100" y="150" class="annotation">Logical time refers to the time experienced by a process or node in a distributed system.</text>
  </rect>
  <rect x="50" y="310" width="320" height="200" class="section" data-narration="Types of Logical Time">
    <text x="100" y="260" class="annotation">There are two main types of logical time:</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin=".2s" dur="1s" repeatCount="indefinite"></animateTransform>
    <rect x="50" y="220" width="150" height="40" class="marker" fill="#007bff"></rect>
    <text x="170" y="220" class="annotation">Monotonic Clock: always increases monotonically.</text>
    <rect x="50" y="290" width="150" height="40" class="marker" fill="#007bff"></rect>
    <text x="170" y="290" class="annotation">Bounded Clock: may decrease or stay the same.</text>
  </rect>
  <rect x="50" y="170" width="320" height="200" class="section" data-narration="Logical Clocks">
    <text x="100" y="210" class="annotation">A logical clock is a mechanism that allows nodes to communicate and synchronize their views of time.</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin=".2s" dur="1s" repeatCount="indefinite"></animateTransform>
    <rect x="50" y="240" width="150" height="40" class="marker" fill="#007bff"></rect>
    <text x="170" y="240" class="annotation">Logical clocks provide a way to resolve conflicts that may arise when multiple nodes or processes access shared resources.</text>
  </rect>
  <rect x="50" y="350" width="320" height="200" class="section" data-narration="Leap Clock, Synchronous Clock, and more...">
    <text x="100" y="390" class="annotation">There are many types of logical clocks, including Leap Clock, Synchronous Clock, and more.</text>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin=".2s" dur="1s" repeatCount="indefinite"></animateTransform>
    <rect x="50" y="330" width="150" height="40" class="marker" fill="#007bff"></rect>
    <text x="170" y="330" class="annotation">Each has its own strengths and weaknesses.</text>
  </rect>
  <rect x="50" y="50" width="320" height="200" class="section" data-narration="Conclusion">
    <text x="100" y="90" class="annotation">In conclusion, logical time and logical clocks are crucial components of distributed systems.</text>
  </rect>
  <text x="120" y="400" class="annotation">Learn more about distributed systems and computer science.</text>
</svg>