  <g transform="translate(20, 20)">
    <text x="0" y="20" text-anchor="start" font-size="24" fill="#2E4053">Global States</text>
    <text x="0" y="60" text-anchor="start" font-size="18" fill="#2E4053">Introduction</text>
    <rect x="0" y="80" width="300" height="100" fill="#F7F7F7" rx="10" data-narration="The global state is the complete and consistent state of all processes in the system." />
    <rect x="10" y="80" width="60" height="100" fill="#F7F7F7" rx="10" data-narration="A global state is a snapshot of the entire system, capturing the current values of all variables, process states, and resource statuses." />
    <rect x="120" y="80" width="60" height="100" fill="#F7F7F7" rx="10" data-narration="There are two types of global states: the global state of a system and the global state of a process." />
    <rect x="10" y="190" width="300" height="100" fill="#F7F7F7" rx="10" data-narration="Consistency, completeness, and validity are key properties of a global state." />
    <rect x="10" y="310" width="300" height="100" fill="#F7F7F7" rx="10" data-narration="Determinism and transitivity are also crucial aspects of a global state." />
    <rect x="10" y="430" width="300" height="50" fill="#F7F7F7" rx="10" data-narration="σ = (π, v): The global state" />
    <rect x="10" y="470" width="300" height="50" fill="#F7F7F7" rx="10" data-narration="π: The global state of a process" />
    <rect x="10" y="510" width="300" height="50" fill="#F7F7F7" rx="10" data-narration="σ = (π, v): The global state of a system" />
    <rect x="120" y="510" width="300" height="50" fill="#F7F7F7" rx="10" data-narration="Example: A distributed database system maintains a global state of all transactions in progress." />
  </g>
