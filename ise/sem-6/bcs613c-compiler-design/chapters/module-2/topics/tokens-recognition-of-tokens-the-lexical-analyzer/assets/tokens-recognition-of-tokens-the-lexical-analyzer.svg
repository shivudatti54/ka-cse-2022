<svg width="420" height="400" data-topic-id="tokens-recognition-of-tokens-the-lexical-analyzer">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#2E4053" text-anchor="middle">Tokens Recognition Of Tokens The Lexical Analyzer</text>

  <section data-narration="Introduction to Tokens">
    <rect x="20" y="60" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="70" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Tokens</text>
    <rect x="20" y="90" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="100" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Represent a single element of the input source code, such as a keyword, identifier, operator, or symbol.</text>
  </section>

  <section data-narration="Defining Tokens">
    <rect x="20" y="160" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="170" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Tokens can be classified into two categories:</text>
    <rect x="20" y="190" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="200" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Terminal tokens and Non-terminal tokens.</text>
  </section>

  <section data-narration="Recognition of Tokens">
    <rect x="20" y="260" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="270" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Recognition of tokens is the process of identifying and parsing individual tokens from the input source code.</text>
    <rect x="20" y="290" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="300" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">The lexical analyzer generator Lex is a tool used to create lexical analyzers.</text>
  </section>

  <section data-narration="Defining Tokens with Lex">
    <rect x="20" y="360" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="370" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">To define tokens with Lex, you create a file called `lex.yy` that contains the token recognition patterns.</text>
    <rect x="20" y="390" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="400" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Each pattern is defined using a **regex**, which is a string that matches certain characters or patterns.</text>
  </section>

  <a href="#" data-narration="Link to more information">
    <rect x="20" y="460" width="370" height="50" fill="#F7F7F7" rx="5" />
    <text x="25" y="470" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Learn more about Token Recognition and Lexical Analyzer Generator Lex.</text>
  </a>

  <animate attributeName="opacity" dur="2s" begin="0s" delay="2s" from="0" to="0.5" />
  <animate attributeName="opacity" dur="2s" begin="2s" delay="2s" from="0.5" to="0" />
</svg>