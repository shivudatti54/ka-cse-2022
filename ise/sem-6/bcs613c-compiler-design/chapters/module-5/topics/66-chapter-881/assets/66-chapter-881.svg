<svg width="420" height="400" data-topic-id="66 Chapter 881" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  
  <!-- Title at top -->
  <text x="20" y="20" font-size="24" font-weight="bold" text-anchor="middle" fill="#2E4053">
    Syntax Tree Traversal
  </text>
  
  <!-- Section 1: In-Order Traversal -->
  <section data-narration="In-order traversal visits the left subtree, the current node, and then the right subtree. This order is useful for generating code, as it allows the compiler to first generate code for the left subtree, then the current node, and finally the right subtree.">
    <rect x="20" y="60" width="380" height="100" fill="#F7F7F7" rx="10"/>
    <text x="10" y="80" font-size="16" fill="#333">Left subtree</text>
    <text x="220" y="80" font-size="16" fill="#333">Current node</text>
    <text x="390" y="80" font-size="16" fill="#333">Right subtree</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 180" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Pre-Order Traversal -->
  <section data-narration="Pre-order traversal visits the current node, then the left subtree, and finally the right subtree. This order is useful for parsing, as it allows the compiler to first analyze the current node, then the left subtree, and finally the right subtree.">
    <rect x="20" y="180" width="380" height="100" fill="#F7F7F7" rx="10"/>
    <text x="10" y="210" font-size="16" fill="#333">Current node</text>
    <text x="220" y="210" font-size="16" fill="#333">Left subtree</text>
    <text x="390" y="210" font-size="16" fill="#333">Right subtree</text>
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 300" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Post-Order Traversal -->
  <section data-narration="Post-order traversal visits the left subtree, then the right subtree, and finally the current node. This order is useful for optimizing, as it allows the compiler to first optimize the left and right subtrees, then the current node.">
    <rect x="20" y="280" width="380" height="100" fill="#F7F7F7" rx="10"/>
    <text x="10" y="310" font-size="16" fill="#333">Left subtree</text>
    <text x="390" y="310" font-size="16" fill="#333">Right subtree</text>
    <text x="10" y="410" font-size="16" fill="#333">Current node</text>
    <animateTransform attributeName="transform" type="translate" from="0 280" to="0 400" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: Depth-First Traversal -->
  <section data-narration="Depth-first traversal visits the left subtree, then the right subtree, and repeats until a specified depth is reached. This order is useful for traversing the syntax tree efficiently.">
    <rect x="20" y="370" width="380" height="100" fill="#F7F7F7" rx="10"/>
    <text x="10" y="400" font-size="16" fill="#333">Left subtree</text>
    <text x="390" y="400" font-size="16" fill="#333">Right subtree</text>
    <text x="10" y="410" font-size="16" fill="#333">Current node</text>
    <animateTransform attributeName="transform" type="translate" from="0 370" to="0 450" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Arrow markers for connections -->
  <polygon points="20,60 30,60" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="220,80 230,80" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="390,80 400,80" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="20,210" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="220,210" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="390,210" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="20,310" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="390,310" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="20,410" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="390,410" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="20,380" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="390,380" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="20,400" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  <polygon points="390,400" fill="#F7F7F7" stroke="#333" stroke-width="2" rx="5"/>
  
  <!-- Footer at bottom -->
  <text x="20" y="380" font-size="16" text-anchor="middle" fill="#2E4053">
    Syntax Tree Traversal
  </text>
</svg>