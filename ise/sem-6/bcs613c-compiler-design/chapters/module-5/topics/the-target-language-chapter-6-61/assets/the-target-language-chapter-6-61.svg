<svg width="420" height="400"
     data-topic-id="the-target-language-chapter-6-61"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400"
     style="background-color: #C7D9F5; background-image: linear-gradient(to bottom, #ACCBEA, #E2E5F3);">
  <title>The Target Language</title>
  <footer>Compiler Design</footer>

  <!-- Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" style="fill: #E2E5F3;"/>
    <text x="15" y="25" font-size="24" font-family="Arial, sans-serif">The Target Language</text>
    <animate transform="rotate(360 35 10)" begin="0s" dur="10s" repeatCount="indefinite"/>
  </section>

  <!-- What is the Target Language? -->
  <section data-narration="What is the Target Language?">
    <rect x="10" y="70" width="400" height="50" style="fill: #E2E5F3;"/>
    <text x="15" y="85" font-size="18" font-family="Arial, sans-serif" style="font-weight: bold;">The Target Language</text>
    <text x="15" y="100" font-size="16" font-family="Arial, sans-serif">is the language that the compiler is designed to generate code for.</text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Importance of the Target Language -->
  <section data-narration="Importance of the Target Language">
    <rect x="10" y="130" width="400" height="50" style="fill: #E2E5F3;"/>
    <rect x="10" y="170" width="400" height="50" style="fill: #E2E5F3;"/>
    <text x="15" y="185" font-size="18" font-family="Arial, sans-serif" style="font-weight: bold;">The Target Language</text>
    <text x="15" y="200" font-size="16" font-family="Arial, sans-serif">plays a crucial role in compiler design.</text>
  </section>

  <!-- Key Features of the Target Language -->
  <section data-narration="Key Features of the Target Language">
    <rect x="10" y="220" width="400" height="50" style="fill: #E2E5F3;"/>
    <text x="15" y="235" font-size="16" font-family="Arial, sans-serif">Key Features:</text>
    <text x="15" y="250" font-size="14" font-family="Arial, sans-serif">Syntax, Semantics, and Platform-specific.</text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Example of a Target Language -->
  <section data-narration="Example of a Target Language">
    <rect x="10" y="280" width="400" height="50" style="fill: #E2E5F3;"/>
    <text x="15" y="295" font-size="16" font-family="Arial, sans-serif">Example:</text>
    <text x="15" y="310" font-size="14" font-family="Arial, sans-serif">Assembly Language.</text>
    <rect x="10" y="330" width="400" height="50" style="fill: #E2E5F3;"/>
    <text x="15" y="345" font-size="16" font-family="Arial, sans-serif">Syntax:</text>
    <text x="15" y="360" font-size="14" font-family="Arial, sans-serif">mov ax, 10; add ax, 20; print <ax>.</text>
    <animate transform="translateX(20)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>

  <footer>Compiler Design</footer>
</svg>