<svg width="420" height="400" data-topic-id="Parsing Tables" xmlns="http://www.w3.org/2000/svg">
  <desc>Parsing Tables are a crucial component of LR (Lefebvre-Retière) parsing algorithms.</desc>
  <title>Parsing Tables</title>
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4567b7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6b9cfa" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7dc6f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f2c464" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient1)"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100%" height="20" fill="#fff"/>
    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Components of a Parsing Table</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 60" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 60)">
    <section data-narration="What is a Parsing Table?">
      <rect x="0" y="0" width="100%" height="20" fill="#fff"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Input String</text>
      <rect x="150" y="0" width="20" height="20" fill="#fff"/>
      <text x="170" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">State</text>
      <rect x="250" y="0" width="20" height="20" fill="#fff"/>
      <text x="270" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Action</text>
      <rect x="350" y="0" width="20" height="20" fill="#fff"/>
      <text x="370" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Return</text>
      <animateTransform attributeName="transform" type="translate" from="0 60" to="0 120" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>
    <g transform="translate(20, 120)">
      <section data-narration="Construction of a Parsing Table">
        <rect x="0" y="0" width="100%" height="20" fill="#fff"/>
        <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Determine States</text>
        <rect x="150" y="0" width="20" height="20" fill="#fff"/>
        <text x="170" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Determine Actions</text>
        <rect x="250" y="0" width="20" height="20" fill="#fff"/>
        <text x="270" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Determine Return Items</text>
        <rect x="350" y="0" width="20" height="20" fill="#fff"/>
        <text x="370" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Create the Parsing Table</text>
        <animateTransform attributeName="transform" type="translate" from="0 180" to="0 240" dur="2s" begin="0s" repeatCount="indefinite"/>
      </section>
      <g transform="translate(20, 240)">
        <section data-narration="Example of a Parsing Table">
          <rect x="0" y="0" width="100%" height="20" fill="#fff"/>
          <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Input String</text>
          <rect x="150" y="0" width="20" height="20" fill="#fff"/>
          <text x="170" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">State</text>
          <rect x="250" y="0" width="20" height="20" fill="#fff"/>
          <text x="270" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Action</text>
          <rect x="350" y="0" width="20" height="20" fill="#fff"/>
          <text x="370" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Return</text>
          <animateTransform attributeName="transform" type="translate" from="0 300" to="0 360" dur="2s" begin="0s" repeatCount="indefinite"/>
        </section>
      </g>
    </g>
    <g transform="translate(20, 360)">
      <section data-narration="Parsing Table Example Continued">
        <rect x="0" y="0" width="100%" height="20" fill="#fff"/>
        <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Input String</text>
        <rect x="150" y="0" width="20" height="20" fill="#fff"/>
        <text x="170" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">State</text>
        <rect x="250" y="0" width="20" height="20" fill="#fff"/>
        <text x="270" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Action</text>
        <rect x="350" y="0" width="20" height="20" fill="#fff"/>
        <text x="370" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Return</text>
        <animateTransform attributeName="transform" type="translate" from="0 420" to="0 480" dur="2s" begin="0s" repeatCount="indefinite"/>
      </section>
    </g>
  </g>
  <g transform="translate(20, 480)">
    <section data-narration="Conclusion">
      <rect x="0" y="0" width="100%" height="20" fill="#fff"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Parsing tables are a fundamental component of LR parsing algorithms, allowing for efficient and systematic parsing.</text>
        <rect x="150" y="0" width="20" height="20" fill="#fff"/>
        <text x="170" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">They provide a mapping between the input string and the resulting parse tree.</text>
        <rect x="250" y="0" width="20" height="20" fill="#fff"/>
        <text x="270" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">By understanding parsing tables, developers can create efficient and effective LR parsers.</text>
        <rect x="350" y="0" width="20" height="20" fill="#fff"/>
        <text x="370" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">Parsing tables are an essential tool in compiler design, enabling developers to create parsers that are both efficient and accurate.</text>
        <animateTransform attributeName="transform" type="translate" from="0 540" to="0 600" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>
  </g>
  <g transform="translate(20, 600)">
    <footer>
      <text x="10" y="10" font-size="14" font-family="Arial, sans-serif" fill="#333">Designed and Developed by [Your Name]</text>
    </footer>
  </g>
</svg>