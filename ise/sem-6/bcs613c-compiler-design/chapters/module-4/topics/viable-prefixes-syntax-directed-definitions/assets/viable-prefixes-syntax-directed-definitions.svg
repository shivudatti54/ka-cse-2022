<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="viable-prefixes-syntax-directed-definitions">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and SDD Overview -->
  <g opacity="0" data-narration="Syntax Directed Definitions associate semantic rules with grammar productions. They compute attribute values during parsing.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Syntax Directed Definitions (SDDs)</text>
    <rect x="20" y="40" width="380" height="42" fill="#3949AB" rx="6" opacity="0.9"/>
    <text x="210" y="56" text-anchor="middle" font-family="monospace" font-size="10" fill="#E8EAF6">Production: E -> E1 + T</text>
    <text x="210" y="72" text-anchor="middle" font-family="monospace" font-size="10" fill="#E8EAF6">Semantic Rule: E.val = E1.val + T.val</text>
  </g>

  <!-- Group 2: Two Attribute Types -->
  <g opacity="0" data-narration="There are two attribute types. Synthesized attributes flow bottom-up from children to parent. Inherited attributes flow top-down from parent to children.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Synthesized box -->
    <rect x="20" y="92" width="185" height="55" fill="white" rx="6" stroke="#00695C" stroke-width="2"/>
    <text x="112" y="110" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Synthesized Attr.</text>
    <text x="112" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Children -> Parent</text>
    <text x="112" y="139" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">(Bottom-Up)</text>
    <!-- Inherited box -->
    <rect x="215" y="92" width="185" height="55" fill="white" rx="6" stroke="#E65100" stroke-width="2"/>
    <text x="307" y="110" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Inherited Attr.</text>
    <text x="307" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Parent -> Children</text>
    <text x="307" y="139" text-anchor="middle" font-family="Arial" font-size="9" fill="#E65100">(Top-Down)</text>
  </g>

  <!-- Group 3: Parse Tree with Attribute Flow for "3+5*2" -->
  <g opacity="0" data-narration="This parse tree evaluates the expression 3 plus 5 times 2 to get 13. Synthesized attributes carry values upward from digit leaves to the root E node.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="165" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Parse Tree: 3 + 5 * 2 = 13</text>
    <!-- Root E -->
    <circle cx="210" cy="190" r="16" fill="#3949AB" stroke="#283593" stroke-width="1.5"/>
    <text x="210" y="194" text-anchor="middle" font-family="monospace" font-size="10" fill="white">E</text>
    <text x="235" y="188" font-family="Arial" font-size="8" fill="#C62828">val=13</text>
    <!-- Left child E -->
    <circle cx="130" cy="225" r="14" fill="#00695C"/>
    <text x="130" y="229" text-anchor="middle" font-family="monospace" font-size="9" fill="white">E</text>
    <text x="106" y="222" font-family="Arial" font-size="7" fill="#C62828">val=3</text>
    <!-- + operator -->
    <circle cx="210" cy="225" r="10" fill="#E65100"/>
    <text x="210" y="229" text-anchor="middle" font-family="monospace" font-size="10" fill="white">+</text>
    <!-- Right child T -->
    <circle cx="290" cy="225" r="14" fill="#00695C"/>
    <text x="290" y="229" text-anchor="middle" font-family="monospace" font-size="9" fill="white">T</text>
    <text x="312" y="222" font-family="Arial" font-size="7" fill="#C62828">val=10</text>
    <!-- Lines from E root -->
    <line x1="198" y1="202" x2="140" y2="215" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="210" y1="206" x2="210" y2="215" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="222" y1="202" x2="280" y2="215" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Leaf: digit 3 -->
    <rect x="115" y="248" width="30" height="18" fill="#3949AB" rx="3"/>
    <text x="130" y="260" text-anchor="middle" font-family="monospace" font-size="8" fill="white">3</text>
    <line x1="130" y1="239" x2="130" y2="248" stroke="#00695C" stroke-width="1.5"/>
    <!-- T children: T * F -->
    <circle cx="260" cy="258" r="12" fill="#00695C" opacity="0.8"/>
    <text x="260" y="262" text-anchor="middle" font-family="monospace" font-size="8" fill="white">T</text>
    <text x="244" y="255" font-family="Arial" font-size="7" fill="#C62828">5</text>
    <circle cx="290" cy="258" r="8" fill="#E65100"/>
    <text x="290" y="261" text-anchor="middle" font-family="monospace" font-size="8" fill="white">*</text>
    <circle cx="320" cy="258" r="12" fill="#00695C" opacity="0.8"/>
    <text x="320" y="262" text-anchor="middle" font-family="monospace" font-size="8" fill="white">F</text>
    <text x="336" y="255" font-family="Arial" font-size="7" fill="#C62828">2</text>
    <line x1="280" y1="236" x2="260" y2="248" stroke="#00695C" stroke-width="1.2"/>
    <line x1="290" y1="236" x2="290" y2="250" stroke="#00695C" stroke-width="1.2"/>
    <line x1="300" y1="236" x2="320" y2="248" stroke="#00695C" stroke-width="1.2"/>
    <!-- Upward arrows for synthesized flow -->
    <path d="M130 248 L130 242 L130 239" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowTeal)"/>
  </g>

  <!-- Group 4: S-Attributed vs L-Attributed comparison -->
  <g opacity="0" data-narration="S-attributed definitions use only synthesized attributes and work with bottom-up LR parsers. L-attributed definitions use both synthesized and inherited attributes and work with top-down LL parsers.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="290" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">SDD Types Comparison</text>
    <!-- S-Attributed -->
    <rect x="20" y="298" width="185" height="44" fill="#00695C" rx="5" opacity="0.9"/>
    <text x="112" y="313" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">S-Attributed</text>
    <text x="112" y="326" text-anchor="middle" font-family="Arial" font-size="8" fill="#C8E6C9">Synthesized only | LR Parsing</text>
    <text x="112" y="337" text-anchor="middle" font-family="Arial" font-size="8" fill="#C8E6C9">Bottom-up evaluation</text>
    <!-- L-Attributed -->
    <rect x="215" y="298" width="185" height="44" fill="#E65100" rx="5" opacity="0.9"/>
    <text x="307" y="313" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">L-Attributed</text>
    <text x="307" y="326" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFE0B2">Both types | LL Parsing</text>
    <text x="307" y="337" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFE0B2">Left-to-right evaluation</text>
  </g>

  <!-- Group 5: Dependency Graph -->
  <g opacity="0" data-narration="A dependency graph shows how attribute values depend on each other. Here, S dot val depends on both A dot val and B dot val, representing the production S goes to A B.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="105" y="358" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Dependency Graph</text>
    <!-- A.val node -->
    <rect x="20" y="364" width="55" height="22" fill="white" rx="4" stroke="#00695C" stroke-width="1.5"/>
    <text x="47" y="379" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">A.val</text>
    <!-- S.val node -->
    <rect x="100" y="364" width="55" height="22" fill="#3949AB" rx="4"/>
    <text x="127" y="379" text-anchor="middle" font-family="monospace" font-size="8" fill="white">S.val</text>
    <!-- B.val node -->
    <rect x="20" y="388" width="55" height="10" fill="white" rx="4" stroke="#00695C" stroke-width="1.5" opacity="0"/>
    <!-- Arrow A.val -> S.val -->
    <path d="M75 375 L96 375" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <!-- B.val below -->
    <rect x="100" y="388" width="55" height="1" opacity="0"/>
    <!-- B.val node repositioned -->
    <rect x="165" y="364" width="55" height="22" fill="white" rx="4" stroke="#E65100" stroke-width="1.5"/>
    <text x="192" y="379" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">B.val</text>
    <!-- Arrow B.val -> S.val -->
    <path d="M165 375 L159 375" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- Group 6: Applications and Evaluation Pipeline -->
  <g opacity="0" data-narration="Syntax directed definitions are applied in five key compiler phases: abstract syntax tree construction, type checking, intermediate code generation, symbol table management, and code optimization.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="330" y="358" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">SDD Applications</text>
    <!-- Application pills -->
    <rect x="245" y="363" width="75" height="16" fill="#3949AB" rx="8"/>
    <text x="282" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="white">AST Build</text>
    <rect x="325" y="363" width="75" height="16" fill="#00695C" rx="8"/>
    <text x="362" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Type Check</text>
    <rect x="245" y="382" width="75" height="16" fill="#E65100" rx="8"/>
    <text x="282" y="393" text-anchor="middle" font-family="Arial" font-size="7" fill="white">IR Code Gen</text>
    <rect x="325" y="382" width="75" height="16" fill="#C62828" rx="8"/>
    <text x="362" y="393" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Symbol Tbl</text>
  </g>
</svg>