<svg width="420" height="400" data-topic-id="Evaluation-Orders-For-SDD-Chapter-5-51" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A88C7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#Gradient)"/>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(10, 20)">
    <rect width="400" height="50" fill="#6495ED" rx="10"/>
    <text x="10" y="15" font-size="18" fill="#FFFFFF">Evaluation Orders for SDD Chapter 5: 5.1</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 30" dur="1s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: What is an SDD Table? -->
  <g transform="translate(10, 80)">
    <rect width="400" height="50" fill="#F5F5F5" rx="10"/>
    <text x="10" y="15" font-size="18" fill="#666666">What is an SDD Table?</text>
    <text x="10" y="50" font-size="14" fill="#666666">An SDD table is a two-dimensional table used in LR parsing to store the possible next actions from a given state.</text>
    <animateTransform attributeName="transform" type="translate" from="0 80" to="0 90" dur="1s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Evaluation Orders -->
  <g transform="translate(10, 130)">
    <rect width="400" height="50" fill="#F5F5F5" rx="10"/>
    <text x="10" y="15" font-size="18" fill="#666666">Evaluation Orders</text>
    <text x="10" y="50" font-size="14" fill="#666666">An evaluation order is a sequence of actions taken to evaluate the SDD table.</text>
    <text x="10" y="80" font-size="14" fill="#666666">The evaluation order is determined by the following steps:</text>
    <text x="100" y="80" font-size="14" fill="#666666">1. Start: Begin with the initial state and the start symbol.</text>
    <text x="100" y="100" font-size="14" fill="#666666">2. Shift: If the current state has a shift action, shift the terminal symbol onto the stack.</text>
    <text x="100" y="120" font-size="14" fill="#666666">3. Reduce: If the current state has a reduce action, reduce the non-terminal symbol to a terminal symbol.</text>
    <text x="100" y="140" font-size="14" fill="#666666">4. Decision: If the current state has a decision action, decide which non-terminal symbol to replace.</text>
    <animateTransform attributeName="transform" type="translate" from="0 130" to="0 140" dur="1s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Types of Evaluation Orders -->
  <g transform="translate(10, 200)">
    <rect width="400" height="50" fill="#F5F5F5" rx="10"/>
    <text x="10" y="15" font-size="18" fill="#666666">Types of Evaluation Orders</text>
    <text x="10" y="50" font-size="14" fill="#666666">There are two types of evaluation orders:</text>
    <text x="100" y="50" font-size="14" fill="#666666">1. Linear Evaluation Order</text>
    <text x="100" y="70" font-size="14" fill="#666666">2. Non-Linear Evaluation Order</text>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 210" dur="1s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 5: Example -->
  <g transform="translate(10, 270)">
    <rect width="400" height="50" fill="#F5F5F5" rx="10"/>
    <text x="10" y="15" font-size="18" fill="#666666">Example</text>
    <text x="10" y="50" font-size="14" fill="#666666">Suppose we have a grammar with the following SDD table:</text>
    <text x="10" y="70" font-size="14" fill="#666666">| State | Shift | Reduce | Decision |</text>
    <text x="10" y="90" font-size="14" fill="#666666">| ----- | ----- | ------ | - |</text>
    <text x="10" y="110" font-size="14" fill="#666666">| State | Shift | Reduce | Decision |</text>
    <text x="10" y="130" font-size="14" fill="#666666">| ----- | ----- | ------ | - |</text>
    <animateTransform attributeName="transform" type="translate" from="0 270" to="0 280" dur="1s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <rect x="10" y="350" width="400" height="50" fill="#6495ED" rx="10"/>
  <text x="10" y="355" font-size="18" fill="#FFFFFF">Evaluation Orders for SDD Chapter 5: 5.1</text>
</svg>