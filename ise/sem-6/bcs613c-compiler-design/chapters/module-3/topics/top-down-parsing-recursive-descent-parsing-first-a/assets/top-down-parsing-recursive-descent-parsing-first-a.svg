<svg width="420" height="400" data-topic-id="top-down-parsing-recursive-descent-parsing-first-a" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" />
      <stop offset="100%" stop-color="#87CEEB" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title -->
  <g transform="translate(10, 20)">
    <text font-size="24" font-family="Arial" font-weight="bold" text-anchor="left">Top-Down Parsing: Recursive Descent Parsing, First and Follow</text>
  </g>
  
  <!-- Section 1: Introduction to Top-Down Parsing -->
  <g transform="translate(10, 60)">
    <rect x="0" y="0" width="400" height="40" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" dur="2s" from="0,60" to="0,80" begin="0s" />
    <text x="10" y="30" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">Top-Down Parsing is a parsing technique used to analyze the structure of a programming language.</text>
    <text x="10" y="50" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">It works by starting with the overall structure of the program and breaking it down into smaller components.</text>
  </g>
  
  <!-- Section 2: Recursive Descent Parsing -->
  <g transform="translate(10, 120)">
    <rect x="0" y="0" width="400" height="40" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" dur="2s" from="0,120" to="0,140" begin="0s" />
    <text x="10" y="30" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">Recursive Descent Parsing is a top-down parsing technique that uses a set of production rules to parse the structure of a programming language.</text>
    <text x="10" y="50" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">Each production rule is used to parse a specific component of the program, and the process is repeated until the entire program has been parsed.</text>
  </g>
  
  <!-- Section 3: First and Follow Sets -->
  <g transform="translate(10, 180)">
    <rect x="0" y="0" width="400" height="40" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" dur="2s" from="0,180" to="0,200" begin="0s" />
    <text x="10" y="30" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">The First and Follow sets are used to determine the possible next tokens in the input stream.</text>
    <text x="10" y="50" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">The First set contains the possible next tokens that can be consumed by the parser, while the Follow set contains the possible next tokens that can be consumed after the current token.</text>
  </g>
  
  <!-- Section 4: LL(1) Grammars -->
  <g transform="translate(10, 240)">
    <rect x="0" y="0" width="400" height="40" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" dur="2s" from="0,240" to="0,260" begin="0s" />
    <text x="10" y="30" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">LL(1) Grammars are a type of grammar that can be parsed using a top-down parser.</text>
    <text x="10" y="50" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">These grammars have the property that the parser can always determine the next token in the input stream based on the current token and the production rule.</text>
  </g>
  
  <!-- Section 5: Bottom-Up Parsing -->
  <g transform="translate(10, 300)">
    <rect x="0" y="0" width="400" height="40" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" dur="2s" from="0,300" to="0,320" begin="0s" />
    <text x="10" y="30" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">Bottom-Up Parsing is a parsing technique that starts with the individual components of the program and builds up to the overall structure.</text>
    <text x="10" y="50" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">This approach is in contrast to Top-Down Parsing, which starts with the overall structure of the program.</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 360)">
    <rect x="0" y="0" width="400" height="30" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="translate" dur="2s" from="0,360" to="0,380" begin="0s" />
    <text x="10" y="10" font-size="16" font-family="Arial" font-weight="normal" text-anchor="left">Copyright 2023</text>
  </g>
  
  <!-- Arrow markers -->
  <path d="M 420 20 L 420 50" stroke="#333" stroke-width="2" fill="none" />
  <path d="M 420 100 L 420 120" stroke="#333" stroke-width="2" fill="none" />
  <path d="M 420 180 L 420 200" stroke="#333" stroke-width="2" fill="none" />
  <path d="M 420 260 L 420 280" stroke="#333" stroke-width="2" fill="none" />
</svg>