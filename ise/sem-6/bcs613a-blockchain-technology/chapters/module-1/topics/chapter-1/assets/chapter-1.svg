<svg width="420" height="400" data-topic-id="chapter-1">
  <rect x="0" y="0" width="420" height="400" fill="#8f0a1a" />
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1" />
      <stop offset="50%" stop-color="#a1c9f2" stop-opacity="1" />
      <stop offset="100%" stop-color="#f7dc6f" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" />
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#fff" text-anchor="middle">Chapter 1</text>
  <g transform="rotate(90)">
    <rect x="100" y="100" width="40" height="40" rx="10" fill="#3498db" />
    <text x="130" y="140" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">What is Blockchain Technology?</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10000" begin="0s" repeatCount="2" />
    <section data-narration="1.1">
      <rect x="150" y="150" width="200" height="200" rx="10" fill="#f1c40f" />
      <text x="170" y="180" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">A decentralized, digital ledger records transactions across a network of computers.</text>
      <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="10000" begin="0s" repeatCount="2" />
    </section>
    <rect x="350" y="100" width="40" height="40" rx="10" fill="#e74c3c" />
    <text x="380" y="140" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Key Characteristics</text>
    <animateTransform attributeName="transform" type="rotate" from="0 350 100" to="360 350 100" dur="10000" begin="0s" repeatCount="2" />
    <section data-narration="1.2">
      <rect x="400" y="150" width="200" height="200" rx="10" fill="#2ecc71" />
      <text x="420" y="180" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Decentralized, Immutable, Transparent, and Consensus mechanisms.</text>
      <animateTransform attributeName="transform" type="rotate" from="0 400 150" to="360 400 150" dur="10000" begin="0s" repeatCount="2" />
    </section>
    <rect x="100" y="300" width="40" height="40" rx="10" fill="#1abc9c" />
    <text x="130" y="340" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">History</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 300" to="360 100 300" dur="10000" begin="0s" repeatCount="2" />
    <section data-narration="1.3">
      <rect x="150" y="320" width="200" height="200" rx="10" fill="#e74c3c" />
      <text x="170" y="350" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">From digital ledger to blockchain, and the rise of altcoins.</text>
      <animateTransform attributeName="transform" type="rotate" from="0 150 320" to="360 150 320" dur="10000" begin="0s" repeatCount="2" />
    </section>
    <rect x="350" y="300" width="40" height="40" rx="10" fill="#2ecc71" />
    <text x="380" y="340" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Distributed Systems</text>
    <animateTransform attributeName="transform" type="rotate" from="0 350 300" to="360 350 300" dur="10000" begin="0s" repeatCount="2" />
    <section data-narration="1.4">
      <rect x="400" y="310" width="200" height="200" rx="10" fill="#1abc9c" />
      <text x="420" y="340" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">A network of computers working together to achieve a common goal.</text>
      <animateTransform attributeName="transform" type="rotate" from="0 400 310" to="360 400 310" dur="10000" begin="0s" repeatCount="2" />
    </section>
    <rect x="100" y="400" width="40" height="40" rx="10" fill="#f1c40f" />
    <text x="130" y="430" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">CAP Theorem</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 400" to="360 100 400" dur="10000" begin="0s" repeatCount="2" />
    <section data-narration="1.5">
      <rect x="150" y="410" width="200" height="200" rx="10" fill="#e74c3c" />
      <text x="170" y="440" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Two out of three properties: Consistency, Availability, or Partition tolerance.</text>
      <animateTransform attributeName="transform" type="rotate" from="0 150 410" to="360 150 410" dur="10000" begin="0s" repeatCount="2" />
    </section>
    <rect x="350" y="400" width="40" height="40" rx="10" fill="#2ecc71" />
    <text x="380" y="430" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Byzantine Generals Problem</text>
    <animateTransform attributeName="transform" type="rotate" from="0 350 400" to="360 350 400" dur="10000" begin="0s" repeatCount="2" />
    <section data-narration="1.6">
      <rect x="400" y="410" width="200" height="200" rx="10" fill="#1abc9c" />
      <text x="420" y="440" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">A classic problem in distributed systems.</text>
      <animateTransform attributeName="transform" type="rotate" from="0 400 410" to="360 400 410" dur="10000" begin="0s" repeatCount="2" />
    </section>
  </g>
  <rect x="10" y="10" width="400" height="30" fill="#3498db" />
  <text x="20" y="25" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Chapter 1</text>
  <rect x="10" y="50" width="400" height="10" fill="#e74c3c" />
  <text x="20" y="60" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Footer</text>
</svg>