<svg width="420" height="400" data-topic-id="chapter-3-decentralization-using-blockchain">
  <!-- Header -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0099CC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#000000" data-narration="Introduction to Decentralization in Blockchain Technology">
    Chapter 3: Decentralization using Blockchain
  </text>

  <!-- Section 1: Definition of Decentralization -->
  <rect x="10" y="50" width="380" height="50" fill="#FFFFFF" rx="10"/>
  <g transform="rotate(90)">
    <rect x="20" y="10" width="60" height="20" fill="#F7DC6F" rx="5"/>
    <text x="30" y="25" font-size="18" font-family="Arial" text-anchor="start" fill="#000000" data-narration="Decentralization refers to the distribution of power and control among multiple entities, rather than concentrating it in a single point. In a decentralized system, no single entity has control over the entire network, and decision-making is distributed among all participants.">
      Definition of Decentralization
    </text>
  </g>
  <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="90 20 10" dur="2s" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="90 20 10" to="0 20 10" dur="2s" begin="2s"/>

  <!-- Section 2: Methods of Decentralization -->
  <rect x="10" y="110" width="380" height="50" fill="#FFFFFF" rx="10"/>
  <g transform="rotate(90)">
    <rect x="20" y="10" width="60" height="20" fill="#F7DC6F" rx="5"/>
    <text x="30" y="25" font-size="18" font-family="Arial" text-anchor="start" fill="#000000" data-narration="Distributed Ledger Technology (DLT) is a decentralized ledger that records transactions across multiple nodes, rather than relying on a central authority. Consensus mechanisms, such as Proof of Work (PoW) and Proof of Stake (PoS), enable nodes to agree on the state of the ledger without relying on a central authority. Blockchain architecture involves a network of nodes that validate and record transactions, rather than relying on a central authority.">
      Methods of Decentralization
    </text>
  </g>
  <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="90 20 10" dur="2s" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="90 20 10" to="0 20 10" dur="2s" begin="2s"/>
  <line x1="35" y1="45" x2="100" y2="45" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="35" y1="45" x2="100" y2="45" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Section 3: Blockchain and Full Ecosystem -->
  <rect x="10" y="170" width="380" height="50" fill="#FFFFFF" rx="10"/>
  <g transform="rotate(90)">
    <rect x="20" y="10" width="60" height="20" fill="#F7DC6F" rx="5"/>
    <text x="30" y="25" font-size="18" font-family="Arial" text-anchor="start" fill="#000000" data-narration="A blockchain is a distributed digital ledger that records transactions across a network of nodes. The blockchain is made up of multiple &quot;blocks&quot; that contain a record of transactions, and each block is linked to the previous block through a unique code called a &quot;hash.&quot; The full ecosystem of blockchain technology includes hardware, software, and network components that enable the decentralized network.">
      Blockchain and Full Ecosystem
    </text>
  </g>
  <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="90 20 10" dur="2s" begin="0s"/>
  <animateTransform attributeName="transform" type="rotate" from="90 20 10" to="0 20 10" dur="2s" begin="2s"/>
  <line x1="35" y1="45" x2="100" y2="45" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="35" y1="45" x2="100" y2="45" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="20" y="380" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">
    Created by [Your Name]
  </text>
</svg>