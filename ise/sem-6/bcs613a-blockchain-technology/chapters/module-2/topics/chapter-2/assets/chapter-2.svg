<svg width="420" height="400" data-topic-id="chapter-2-decentralization">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="1"/>
      <stop offset="50%" stop-color="#2ecc71" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <title>Chapter 2: Decentralization using Blockchain</title>
  <text x="170" y="20" font-size="24" font-family="Arial" fill="#2ecc71">Decentralization</text>

  <!-- Background Gradient Fill -->
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <!-- Section 1 -->
  <g id="section-1">
    <rect x="10" y="70" width="400" height="50" fill="#f7f7f7"/>
    <animateTransform attributeName="transform" type="translate" from="0 70" to="0 80" dur="1s" begin="0s"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#f7f7f7" data-narration="Decentralization is a system where there is no central authority controlling the data or decision-making process.">Decentralization</text>
    <line x1="150" y1="80" x2="200" y2="80" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  </g>

  <!-- Section 2 -->
  <g id="section-2">
    <rect x="10" y="150" width="400" height="50" fill="#f7f7f7"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 160" dur="1s" begin="0.5s"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#f7f7f7" data-narration="Distributed Ledger Technology (DLT) is a technology that allows for the creation of a decentralized ledger, where data is stored and updated across a network of nodes.">Distributed Ledger Technology (DLT)</text>
    <line x1="150" y1="160" x2="200" y2="160" stroke="#2ecc71" stroke-width="2" stroke-dasharray="3,3"/>
  </g>

  <!-- Section 3 -->
  <g id="section-3">
    <rect x="10" y="230" width="400" height="50" fill="#f7f7f7"/>
    <animateTransform attributeName="transform" type="translate" from="0 230" to="0 240" dur="1s" begin="1s"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#f7f7f7" data-narration="Cryptography is the use of algorithms to secure data and prevent unauthorized access.">Cryptography</text>
    <line x1="150" y1="240" x2="200" y2="240" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,3"/>
  </g>

  <!-- Section 4 -->
  <g id="section-4">
    <rect x="10" y="310" width="400" height="50" fill="#f7f7f7"/>
    <animateTransform attributeName="transform" type="translate" from="0 310" to="0 320" dur="1s" begin="1.5s"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#f7f7f7" data-narration="Consensus mechanisms are used to validate data and ensure that all nodes on the network agree on the state of the ledger.">Consensus Mechanisms</text>
    <line x1="150" y1="320" x2="200" y2="320" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  </g>

  <!-- Section 5 -->
  <g id="section-5">
    <rect x="10" y="390" width="400" height="50" fill="#f7f7f7"/>
    <animateTransform attributeName="transform" type="translate" from="0 390" to="0 400" dur="1s" begin="2s"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#f7f7f7" data-narration="A blockchain is a decentralized ledger that uses cryptography and consensus mechanisms to secure data.">Blockchain</text>
    <line x1="150" y1="400" x2="200" y2="400" stroke="#2ecc71" stroke-width="2" stroke-dasharray="3,3"/>
  </g>

  <!-- Section 6 -->
  <g id="section-6">
    <rect x="10" y="460" width="400" height="50" fill="#f7f7f7"/>
    <animateTransform attributeName="transform" type="translate" from="0 460" to="0 470" dur="1s" begin="2.5s"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#f7f7f7" data-narration="The full ecosystem of a blockchain includes nodes, wallets, mining, and more.">Full Ecosystem</text>
    <line x1="150" y1="470" x2="200" y2="470" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,3"/>
  </g>

  <!-- Footer -->
  <text x="170" y="420" font-size="18" font-family="Arial" fill="#2ecc71">Chapter 2: Decentralization using Blockchain</text>
</svg>