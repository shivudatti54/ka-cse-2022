<svg width="420" height="400" data-topic-id="ethereum-blockchain" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCFF" stop-opacity="1" />
      <stop offset="50%" stop-color="#33CCFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#00FFCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  
  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)" data-narration="Introduction to Ethereum Blockchain">
    <text fill="#1A1D23" font-size="24">Introduction to Ethereum Blockchain</text>
    <rect x="0" y="-20" width="400" height="40" fill="#FFFFFF" rx="5" />
    <g transform="translate(20, 0)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Decentralized</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 30)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Distributed</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 50)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Immutable</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 70)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Transparent</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
  </g>
  
  <!-- Section 2: Architecture -->
  <g transform="translate(10, 120)" data-narration="Ethereum Blockchain Architecture">
    <rect x="0" y="-20" width="400" height="40" fill="#FFFFFF" rx="5" />
    <g transform="translate(20, 0)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Client Software</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 30)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">P2P Network</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 50)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Full Node</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 70)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Light Node</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
  </g>
  
  <!-- Section 3: Consensus Mechanism -->
  <g transform="translate(10, 180)" data-narration="Consensus Mechanism">
    <rect x="0" y="-20" width="400" height="40" fill="#FFFFFF" rx="5" />
    <g transform="translate(20, 0)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Proof of Work (PoW)</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 30)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Hash Function</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 50)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Block Reward</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
    <g transform="translate(20, 70)">
      <circle cx="20" cy="10" r="10" fill="#1A1D23" />
      <text fill="#1A1D23" font-size="18">Proof of Stake (PoS)</text>
      <line x1="20" y1="10" x2="40" y2="10" stroke="#1A1D23" stroke-width="2" />
    </g>
  </g>
  
  <!-- Title and Footer -->
  <g transform="translate(10, 220)">
    <rect x="0" y="0" width="400" height="40" fill="#FFFFFF" rx="5" />
    <text fill="#1A1D23" font-size="36">Ethereum Blockchain</text>
  </g>
  <g transform="translate(10, 270)">
    <rect x="0" y="0" width="400" height="40" fill="#FFFFFF" rx="5" />
    <text fill="#1A1D23" font-size="18">Chapter 7, Pages 210-227</text>
  </g>
</svg>