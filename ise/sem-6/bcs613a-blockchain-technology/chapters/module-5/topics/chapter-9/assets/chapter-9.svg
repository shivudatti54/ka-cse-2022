<svg width="420" height="400" data-topic-id="Hyperledger-Platforms" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Add some basic styles to the SVG */
    body {
      background: #f7f7f7;
      font-family: Arial, sans-serif;
    }
    /* Set color palette */
    indigo {fill:#4B0082;}
    teal {fill:#0097A7;}
    orange {fill:#FFC107;}
  </style>
  <title>Hyperledger Platforms</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="indigo" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>

  <!-- Title section -->
  <g id="title-section" transform="translate(10, 50)">
    <text x="0" y="0" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Hyperledger Platforms</text>
  </g>

  <!-- Section 1: Introduction -->
  <g id="section-1" transform="translate(20, 100)">
    <rect x="0" y="0" width="90%" height="70%" fill="white" rx="10"/>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="0" y="20" font-size="18" font-weight="bold" fill="indigo" text-anchor="middle" data-narration="What is Hyperledger?">
      <tspan x="0" y="0" font-size="14">Hyperledger is an open-source software project</tspan>
      <tspan x="0" y="25" font-size="14">that enables the development of blockchain applications</tspan>
    </text>
  </g>

  <!-- Section 2: Hyperledger Fabric -->
  <g id="section-2" transform="translate(20, 180)">
    <rect x="0" y="0" width="90%" height="70%" fill="white" rx="10"/>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="0" y="20" font-size="18" font-weight="bold" fill="teal" text-anchor="middle" data-narration="Hyperledger Fabric">
      <tspan x="0" y="0" font-size="14">Hyperledger Fabric is a blockchain platform</tspan>
      <tspan x="0" y="25" font-size="14">developed by IBM and the Linux Foundation</tspan>
    </text>
    <line x1="50" y1="20" x2="50" y2="150" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Section 3: Hyperledger Sawtooth Lake -->
  <g id="section-3" transform="translate(20, 250)">
    <rect x="0" y="0" width="90%" height="70%" fill="white" rx="10"/>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="0" y="20" font-size="18" font-weight="bold" fill="indigo" text-anchor="middle" data-narration="Hyperledger Sawtooth Lake">
      <tspan x="0" y="0" font-size="14">Hyperledger Sawtooth Lake is a blockchain platform</tspan>
      <tspan x="0" y="25" font-size="14">developed by Intel and the Linux Foundation</tspan>
    </text>
    <line x1="50" y1="20" x2="50" y2="150" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Section 4: Hyperledger Corda -->
  <g id="section-4" transform="translate(20, 320)">
    <rect x="0" y="0" width="90%" height="70%" fill="white" rx="10"/>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="0" y="20" font-size="18" font-weight="bold" fill="teal" text-anchor="middle" data-narration="Hyperledger Corda">
      <tspan x="0" y="0" font-size="14">Hyperledger Corda is a blockchain platform</tspan>
      <tspan x="0" y="25" font-size="14">developed by R3 and the Linux Foundation</tspan>
    </text>
    <line x1="50" y1="20" x2="50" y2="150" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Footer section -->
  <g id="footer-section" transform="translate(10, 380)">
    <text x="0" y="0" font-size="14" font-weight="normal" fill="black" text-anchor="middle">Learn more about Hyperledger Platforms</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" mark="url(#arrow-mark)"/>
    <symbol id="arrow-mark" viewBox="0 0 10 10">
      <line x1="0" y1="0" x2="5" y2="5"/>
    </symbol>
  </defs>
</svg>