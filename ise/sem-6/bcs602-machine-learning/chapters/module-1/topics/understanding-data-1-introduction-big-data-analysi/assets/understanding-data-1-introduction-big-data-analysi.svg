<svg width="420" height="400" data-topic-id="understanding-data-1-introduction-big-data-analysis" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background: #C7B8EA;">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#4682B4"/>
    </linearGradient>
  </defs>
  <title>Understanding Data 1: Introduction, Big Data Analysis Framework, Descriptive Statistics, Univariate Data Analysis and Visualization</title>
  <style>
    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin: 20px;
    }
    .section.data-narration {
      background: #F7F7F7;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .section .title {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
    .section .description {
      font-size: 14px;
      color: #666;
    }
    .section .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section .stats .stat {
      display: flex;
      align-items: center;
      margin: 0 10px;
    }
    .section .stats .stat .value {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
    .section .stats .stat .unit {
      font-size: 14px;
      color: #666;
    }
  </style>
  <rect x="10" y="10" width="400" height="370" rx="10" style="fill: url(#grad)"/>
  <g transform="scale(1.2)">
    <g id="section-1">
      <rect x="20" y="20" width="340" height="60" rx="10" style="fill: #F7F7F7"/>
      <text x="50%" y="30%" class="title">Why Data is Important</text>
      <text x="50%" y="50%" class="description">Data is the lifeblood of any organization. It provides insights that can inform business decisions. It's used to train machine learning models that can make predictions and classify data.</text>
      <g transform="translate(20, 80)">
        <rect x="20" y="20" width="60" height="60" rx="10" style="fill: #87CEEB"/>
        <text x="30%" y="30%" class="stats">
          <text x="30%" y="40%" class="stat">Mean: 10.2</text>
          <text x="30%" y="50%" class="stat">Median: 8.5</text>
          <text x="30%" y="60%" class="stat">Mode: 9.1</text>
        </g>
      </g>
    </g>
    <g id="section-2">
      <rect x="20" y="20" width="340" height="60" rx="10" style="fill: #F7F7F7"/>
      <text x="50%" y="30%" class="title">Big Data Analysis Framework</text>
      <text x="50%" y="50%" class="description">Big data analysis involves collecting, processing, and analyzing large amounts of data. The big data analysis framework typically consists of the following steps:</text>
      <ul>
        <li><text x="50%" y="70%" class="data-narration">Data Collection: Collecting data from various sources, such as sensors, social media, and databases.</text></li>
        <li><text x="50%" y="90%" class="data-narration">Data Cleaning: Cleaning and preprocessing the data to remove errors and inconsistencies.</text></li>
        <li><text x="50%" y="110%" class="data-narration">Data Integration: Integrating data from different sources into a single platform.</text></li>
        <li><text x="50%" y="130%" class="data-narration">Data Analysis: Analyzing the data using various techniques, such as machine learning and statistical analysis.</text></li>
        <li><text x="50%" y="150%" class="data-narration">Data Visualization: Visualizing the data to identify trends and patterns.</text></li>
      </ul>
      <g transform="translate(20, 180)">
        <rect x="20" y="20" width="60" height="60" rx="10" style="fill: #87CEEB"/>
        <text x="30%" y="30%" class="stats">
          <text x="30%" y="40%" class="stat">Hadoop</text>
          <text x="30%" y="50%" class="stat">Spark</text>
          <text x="30%" y="60%" class="stat">Apache Kafka</text>
        </g>
      </g>
    </g>
    <g id="section-3">
      <rect x="20" y="20" width="340" height="60" rx="10" style="fill: #F7F7F7"/>
      <text x="50%" y="30%" class="title">Descriptive Statistics</text>
      <text x="50%" y="50%" class="description">Descriptive statistics involves summarizing and describing the basic features of a dataset. It includes measures such as mean, median, mode, and standard deviation.</text>
      <g transform="translate(20, 80)">
        <rect x="20" y="20" width="60" height="60" rx="10" style="fill: #87CEEB"/>
        <text x="30%" y="30%" class="stats">
          <text x="30%" y="40%" class="stat">Mean: 10.2</text>
          <text x="30%" y="50%" class="stat">Median: 8.5</text>
          <text x="30%" y="60%" class="stat">Mode: 9.1</text>
        </g>
      </g>
    </g>
    <g id="section-4">
      <rect x="20" y="20" width="340" height="60" rx="10" style="fill: #F7F7F7"/>
      <text x="50%" y="30%" class="title">Univariate Data Analysis and Visualization</text>
      <text x="50%" y="50%" class="description">Univariate data analysis involves analyzing and visualizing a single variable or a small number of variables.</text>
      <g transform="translate(20, 80)">
        <rect x="20" y="20" width="60" height="60" rx="10" style="fill: #87CEEB"/>
        <text x="30%" y="30%" class="stats">
          <text x="30%" y="40%" class="stat">Bar chart</text>
          <text x="30%" y="50%" class="stat">Scatter plot</text>
          <text x="30%" y="60%" class="stat">Histogram</text>
        </g>
      </g>
    </g>
  </g>
  <g transform="translate(20, 350)">
    <rect x="10" y="10" width="400" height="40" rx="10" style="fill: #4682B4"/>
    <text x="50%" y="20%" class="footer">Footer</text>
  </g>
</svg>