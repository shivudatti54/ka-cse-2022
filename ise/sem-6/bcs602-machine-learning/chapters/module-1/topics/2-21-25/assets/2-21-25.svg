<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
  <title>Machine Learning Explained</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f8fe6"/>
      <stop offset="50%" stop-color="#8bc3e0"/>
      <stop offset="100%" stop-color="#5bc0de"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(20, 20)">
    <g data-topic-id="2.1-definition-of-machine-learning">
      <rect width="100" height="20" fill="#8bc3e0"/>
      <text x="10" y="5" fill="#fff">Definition of Machine Learning</text>
      <rect x="120" y="10" width="200" height="20" fill="#5bc0de"/>
      <text x="130" y="15" fill="#fff">Machine Learning is a subset of artificial intelligence that involves training algorithms to learn patterns and relationships in data, allowing them to make predictions or decisions without being explicitly programmed.</text>
    </g>
    <g data-narration="2.1-key-concepts">
      <rect width="100" height="20" fill="#8bc3e0"/>
      <text x="10" y="5" fill="#fff">Key Concepts</text>
      <rect x="120" y="10" width="200" height="20" fill="#5bc0de"/>
      <text x="130" y="15" fill="#fff">
        <animateTransform attributeName="x" begin="0s" dur="2s" from="120" to="240"/>
        Supervised Learning: Learning from labeled data, where the algorithm is trained to predict the correct output.
        <animateTransform attributeName="x" begin="2s" dur="2s" from="240" to="360"/>
        Unsupervised Learning: Learning from unlabeled data, where the algorithm identifies patterns or relationships.
        <animateTransform attributeName="x" begin="4s" dur="2s" from="360" to="480"/>
        Semi-Supervised Learning: Learning from a combination of labeled and unlabeled data.
      </text>
    </g>
    <g data-narration="2.2-types-of-machine-learning">
      <rect width="100" height="20" fill="#8bc3e0"/>
      <text x="10" y="5" fill="#fff">Types of Machine Learning</text>
      <rect x="120" y="10" width="200" height="20" fill="#5bc0de"/>
      <text x="130" y="15" fill="#fff">
        <animateTransform attributeName="x" begin="0s" dur="2s" from="120" to="240"/>
        Supervised Learning
        <animateTransform attributeName="x" begin="2s" dur="2s" from="240" to="360"/>
        Unsupervised Learning
        <animateTransform attributeName="x" begin="4s" dur="2s" from="360" to="480"/>
        Semi-Supervised Learning
        <animateTransform attributeName="x" begin="6s" dur="2s" from="480" to="600"/>
        Reinforcement Learning
        <animateTransform attributeName="x" begin="8s" dur="2s" from="600" to="720"/>
        Deep Learning
        <animateTransform attributeName="x" begin="10s" dur="2s" from="720" to="840"/>
        Transfer Learning
        <animateTransform attributeName="x" begin="12s" dur="2s" from="840" to="960"/>
        Batch Learning
      </text>
    </g>
    <g data-topic-id="2.2-types-of-machine-learning">
      <rect width="100" height="20" fill="#8bc3e0"/>
      <text x="10" y="5" fill="#fff">Machine Learning Types</text>
      <rect x="120" y="10" width="200" height="20" fill="#5bc0de"/>
      <text x="130" y="15" fill="#fff">
        <animateTransform attributeName="x" begin="0s" dur="2s" from="120" to="240"/>
        Supervised Learning
        <animateTransform attributeName="x" begin="2s" dur="2s" from="240" to="360"/>
        Unsupervised Learning
        <animateTransform attributeName="x" begin="4s" dur="2s" from="360" to="480"/>
        Semi-Supervised Learning
        <animateTransform attributeName="x" begin="6s" dur="2s" from="480" to="600"/>
        Reinforcement Learning
        <animateTransform attributeName="x" begin="8s" dur="2s" from="600" to="720"/>
        Deep Learning
        <animateTransform attributeName="x" begin="10s" dur="2s" from="720" to="840"/>
        Transfer Learning
        <animateTransform attributeName="x" begin="12s" dur="2s" from="840" to="960"/>
        Batch Learning
      </text>
    </g>
    <g data-topic-id="2" data-narration="2.1-example">
      <rect width="100" height="20" fill="#8bc3e0"/>
      <text x="10" y="5" fill="#fff">Example</text>
      <rect x="120" y="10" width="200" height="20" fill="#5bc0de"/>
      <text x="130" y="15" fill="#fff">
        <animateTransform attributeName="x" begin="0s" dur="2s" from="120" to="240"/>
        A company wants to predict whether a customer will churn based on their usage patterns.
        <animateTransform attributeName="x" begin="2s" dur="2s" from="240" to="360"/>
        They collect data on customer usage and label it as either "churned" or "not churned".
        <animateTransform attributeName="x" begin="4s" dur="2s" from="360" to="480"/>
        The machine learning algorithm can then learn the patterns in the data and make predictions on new, unseen data.
      </text>
    </g>
    <g data-narration="2.2-types-of-machine-learning">
      <rect width="100" height="20" fill="#8bc3e0"/>
      <text x="10" y="5" fill="#fff">Types of Machine Learning</text>
      <rect x="120" y="10" width="200" height="20" fill="#5bc0de"/>
      <text x="130" y="15" fill="#fff">
        <animateTransform attributeName="x" begin="0s" dur="2s" from="120" to="240"/>
        Supervised Learning
        <animateTransform attributeName="x" begin="2s" dur="2s" from="240" to="360"/>
        Unsupervised Learning
        <animateTransform attributeName="x" begin="4s" dur="2s" from="360" to="480"/>
        Semi-Supervised Learning
        <animateTransform attributeName="x" begin="6s" dur="2s" from="480" to="600"/>
        Reinforcement Learning
        <animateTransform attributeName="x" begin="8s" dur="2s" from="600" to="720"/>
        Deep Learning
        <animateTransform attributeName="x" begin="10s" dur="2s" from="720" to="840"/>
        Transfer Learning
        <animateTransform attributeName="x" begin="12s" dur="2s" from="840" to="960"/>
        Batch Learning
      </text>
    </g>
  </g>
  <g transform="translate(10, 390)">
    <rect width="400" height="10" fill="#8bc3e0"/>
    <text x="10" y="5" fill="#fff">Footer</text>
  </g>
</svg>