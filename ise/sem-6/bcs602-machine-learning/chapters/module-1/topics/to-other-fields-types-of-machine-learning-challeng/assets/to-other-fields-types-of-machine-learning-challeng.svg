    <path d="M 100,100 L 300,100" stroke="#fff" stroke-width="2" fill="none" />
    <animate transform="rotate(360 100 100)" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>

  <section data-narration="Types of Machine Learning">
    <rect x="10" y="130" width="400" height="50" fill="#6495ed" opacity="0.5" />
