    <rect x="10" y="170" width="400" height="50" fill="#6495ed" opacity="0.5" />
    <text x="20" y="180" font-size="18" fill="#fff" text-anchor="middle">Unsupervised Learning</text>
    <rect x="10" y="210" width="400" height="50" fill="#6495ed" opacity="0.5" />
    <text x="20" y="220" font-size="18" fill="#fff" text-anchor="middle">Reinforcement Learning</text>
  </section>

  <section data-narration="Supervised Learning">
    <rect x="10" y="260" width="400" height="50" fill="#6495ed" opacity="0.5" />
