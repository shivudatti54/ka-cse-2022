    <rect x="10" y="300" width="400" height="50" fill="#6495ed" opacity="0.5" />
    <text x="20" y="310" font-size="18" fill="#fff" text-anchor="middle">Example: Sentiment Analysis</text>
  </section>

  <section data-narration="Unsupervised Learning">
    <rect x="10" y="350" width="400" height="50" fill="#6495ed" opacity="0.5" />
    <text x="20" y="360" font-size="18" fill="#fff" text-anchor="middle">Example: Clustering Customers</text>
    <rect x="10" y="390" width="400" height="50" fill="#6495ed" opacity="0.5" />
    <text x="20" y="400" font-size="18" fill="#fff" text-anchor="middle">Example: Dimensionality Reduction</text>
  </section>

  <section data-narration="Reinforcement Learning">
    <rect x="10" y="430" width="400" height="50" fill="#6495ed" opacity="0.5" />
    <text x="20" y="440" font-size="18" fill="#fff" text-anchor="middle">Example: Game Playing</text>
    <rect x="10" y="470" width="400" height="50" fill="#6495ed" opacity="0.5" />
