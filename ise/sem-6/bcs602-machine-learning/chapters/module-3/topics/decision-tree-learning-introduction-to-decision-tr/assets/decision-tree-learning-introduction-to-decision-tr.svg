<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="decision-tree-learning-introduction-to-decision-trees">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#66CCCC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="30" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Decision Tree Learning
  </text>
  
  <!-- Introduction section -->
  <section data-narration="Introduction">
    <rect x="10%" y="100%" width="80%" height="100" fill="#f9f9f9" rx="10"/>
    <text x="15%" y="120%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666">
      Decision Tree Learning is a type of supervised learning algorithm used in machine learning for classification and regression tasks.
    </text>
  </section>
  
  <!-- What is a Decision Tree section -->
  <section data-narration="What is a Decision Tree">
    <rect x="10%" y="150%" width="80%" height="100" fill="#f9f9f9" rx="10"/>
    <text x="15%" y="170%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666">
      A decision tree is a graphical representation of a decision-making process. It consists of a root node, internal nodes, leaf nodes, and a set of branches.
    </text>
    <path d="M 20,150 L 40,150" stroke="#8BC34A" stroke-width="2" fill="none"/>
    <path d="M 60,150 L 80,150" stroke="#8BC34A" stroke-width="2" fill="none"/>
  </section>
  
  <!-- Decision Tree Learning Process section -->
  <section data-narration="Decision Tree Learning Process">
    <rect x="10%" y="200%" width="80%" height="100" fill="#f9f9f9" rx="10"/>
    <text x="15%" y="220%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666">
      The decision tree learning process involves the following steps:
      <ul>
        <li>Data Collection</li>
        <li>Data Preprocessing</li>
        <li>Splitting the Data</li>
        <li>Building the Decision Tree</li>
        <li>Evaluating the Decision Tree</li>
        <li>Tuning the Decision Tree</li>
      </ul>
    </text>
  </section>
  
  <!-- Types of Decision Trees section -->
  <section data-narration="Types of Decision Trees">
    <rect x="10%" y="250%" width="80%" height="100" fill="#f9f9f9" rx="10"/>
    <text x="15%" y="270%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666">
      There are several types of decision trees, including:
      <ul>
        <li>Classification Trees</li>
        <li>Regression Trees</li>
      </ul>
    </text>
    <path d="M 20,270 L 40,270" stroke="#8BC34A" stroke-width="2" fill="none"/>
    <path d="M 60,270 L 80,270" stroke="#8BC34A" stroke-width="2" fill="none"/>
  </section>
  
  <!-- Advantages and Disadvantages section -->
  <section data-narration="Advantages and Disadvantages">
    <rect x="10%" y="300%" width="80%" height="100" fill="#f9f9f9" rx="10"/>
    <text x="15%" y="320%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666">
      Advantages:
      <ul>
        <li>Simple and interpretable</li>
        <li>Effective for modeling complex relationships between variables</li>
      </ul>
      Disadvantages:
      <ul>
        <li>Prone to overfitting</li>
        <li>Can be computationally expensive</li>
      </ul>
    </text>
  </section>
  
  <!-- Real-World Applications section -->
  <section data-narration="Real-World Applications">
    <rect x="10%" y="350%" width="80%" height="100" fill="#f9f9f9" rx="10"/>
    <text x="15%" y="370%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666">
      Decision trees have many real-world applications, including:
      <ul>
        <li>Classification and regression tasks</li>
        <li>Feature selection and feature engineering</li>
      </ul>
    </text>
  </section>
  
  <!-- Footers -->
  <text x="50%" y="380%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666">
    Data Topic ID: decision-tree-learning-introduction-to-decision-trees
  </text>
</svg>