<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="decision-tree-induction-algorithms">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Decision Tree Structure (begin=0.3s) -->
  <g data-narration="A decision tree is a supervised learning model shaped like a tree. It has a root node at the top, internal decision nodes that split data based on conditions, and leaf nodes at the bottom that give the final prediction." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>

    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#3949AB">Decision Tree Induction Algorithms</text>

    <!-- Root Node -->
    <rect x="160" y="36" width="100" height="28" fill="url(#nodeGrad)" rx="6"/>
    <text x="210" y="55" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Root Node</text>

    <!-- Branches from root -->
    <line x1="185" y1="64" x2="120" y2="80" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="235" y1="64" x2="300" y2="80" stroke="#3949AB" stroke-width="1.5"/>

    <!-- Left internal node -->
    <rect x="70" y="80" width="100" height="24" fill="#5C6BC0" rx="5"/>
    <text x="120" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Decision Node</text>

    <!-- Right leaf -->
    <rect x="255" y="80" width="90" height="24" fill="url(#leafGrad)" rx="10"/>
    <text x="300" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Leaf: Class X</text>

    <!-- Branches from internal node -->
    <line x1="95" y1="104" x2="60" y2="118" stroke="#5C6BC0" stroke-width="1.5"/>
    <line x1="145" y1="104" x2="180" y2="118" stroke="#5C6BC0" stroke-width="1.5"/>

    <!-- Two leaves -->
    <rect x="15" y="118" width="85" height="22" fill="url(#leafGrad)" rx="10"/>
    <text x="57" y="133" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Leaf: Class Y</text>

    <rect x="140" y="118" width="85" height="22" fill="url(#leafGrad)" rx="10"/>
    <text x="182" y="133" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Leaf: Class Z</text>

    <!-- Legend -->
    <rect x="290" y="112" width="10" height="10" fill="#3949AB" rx="2"/>
    <text x="305" y="121" font-family="Arial" font-size="8" fill="#333">Internal Node</text>
    <rect x="290" y="126" width="10" height="10" fill="#00695C" rx="5"/>
    <text x="305" y="135" font-family="Arial" font-size="8" fill="#333">Leaf Node</text>
  </g>

  <!-- Group 2: Splitting Criteria - Entropy and Gini (begin=1.5s) -->
  <g data-narration="The key to building a decision tree is choosing the best feature to split on. Two main measures are used: Entropy-based Information Gain, which measures the reduction in uncertainty, and Gini Impurity, which measures the probability of misclassification. Both range from zero for pure nodes to a maximum for impure nodes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <text x="210" y="160" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Splitting Criteria</text>

    <!-- Entropy box -->
    <rect x="15" y="168" width="185" height="62" fill="white" rx="6" stroke="#E65100" stroke-width="1.2"/>
    <text x="107" y="182" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Entropy (Information Gain)</text>
    <text x="107" y="196" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">H(S) = -Sum(p_i * log2(p_i))</text>
    <text x="107" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Range: 0 (pure) to 1 (max impurity)</text>
    <text x="107" y="222" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-weight="bold">Used by: ID3, C4.5</text>

    <!-- Gini box -->
    <rect x="215" y="168" width="190" height="62" fill="white" rx="6" stroke="#C62828" stroke-width="1.2"/>
    <text x="310" y="182" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Gini Impurity</text>
    <text x="310" y="196" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">Gini(S) = 1 - Sum(p_i^2)</text>
    <text x="310" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Range: 0 (pure) to 0.5 (max impurity)</text>
    <text x="310" y="222" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-weight="bold">Used by: CART</text>
  </g>

  <!-- Group 3: ID3 Algorithm (begin=3.0s) -->
  <g data-narration="The ID3 algorithm, or Iterative Dichotomiser 3, is the simplest decision tree algorithm. It uses Information Gain to select the best splitting feature. It works only with categorical data, does not handle missing values, and builds multi-way trees. It is prone to overfitting because it has no built-in pruning." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <rect x="15" y="240" width="120" height="72" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="15" y="240" width="120" height="18" fill="#3949AB" rx="6"/>
    <rect x="15" y="250" width="120" height="8" fill="#3949AB"/>
    <text x="75" y="254" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">ID3</text>

    <text x="75" y="272" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Info Gain splitting</text>
    <text x="75" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Categorical only</text>
    <text x="75" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">No pruning</text>
    <text x="75" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Multi-way splits</text>
  </g>

  <!-- Group 4: C4.5 Algorithm (begin=4.5s) -->
  <g data-narration="C4.5 is the successor to ID3 with major improvements. It uses Gain Ratio instead of Information Gain to avoid bias towards features with many values. It handles both categorical and continuous features, can deal with missing values, and includes post-pruning to reduce overfitting." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <rect x="150" y="240" width="120" height="72" fill="white" rx="6" stroke="#E65100" stroke-width="1.5"/>
    <rect x="150" y="240" width="120" height="18" fill="#E65100" rx="6"/>
    <rect x="150" y="250" width="120" height="8" fill="#E65100"/>
    <text x="210" y="254" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">C4.5</text>

    <text x="210" y="272" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Gain Ratio splitting</text>
    <text x="210" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Numeric + Categorical</text>
    <text x="210" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Post-pruning</text>
    <text x="210" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Handles missing vals</text>
  </g>

  <!-- Group 5: CART Algorithm (begin=6.0s) -->
  <g data-narration="CART, or Classification and Regression Trees, builds strictly binary trees. For classification it uses Gini Impurity, and for regression it uses variance reduction. It employs cost-complexity pruning and forms the basis for powerful ensemble methods like Random Forest and Gradient Boosting." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <rect x="285" y="240" width="120" height="72" fill="white" rx="6" stroke="#C62828" stroke-width="1.5"/>
    <rect x="285" y="240" width="120" height="18" fill="#C62828" rx="6"/>
    <rect x="285" y="250" width="120" height="8" fill="#C62828"/>
    <text x="345" y="254" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">CART</text>

    <text x="345" y="272" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Gini / Variance split</text>
    <text x="345" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Classification + Regression</text>
    <text x="345" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Cost-complexity pruning</text>
    <text x="345" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Binary trees only</text>

    <!-- Evolution arrows between algorithm boxes -->
    <line x1="135" y1="276" x2="150" y2="276" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="270" y1="276" x2="285" y2="276" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow2)"/>

    <defs>
      <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#3949AB"/>
      </marker>
      <marker id="arrow2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#E65100"/>
      </marker>
    </defs>
  </g>

  <!-- Group 6: Induction Process Summary and Pruning (begin=7.5s) -->
  <g data-narration="The tree induction process follows these steps: start with the full dataset, compute the splitting criterion for all features, select the best feature, split the data, then recurse on each subset until a stopping criterion is met. Pruning, either pre-pruning by early stopping or post-pruning by trimming branches, is essential to avoid overfitting and improve generalization." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <rect x="15" y="320" width="390" height="72" fill="white" rx="8" stroke="#3949AB" stroke-width="1.2"/>
    <text x="210" y="336" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Tree Induction Process</text>

    <!-- Flow steps -->
    <rect x="22" y="343" width="62" height="20" fill="#3949AB" rx="4"/>
    <text x="53" y="357" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Full Dataset</text>

    <text x="89" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">&#x2192;</text>

    <rect x="96" y="343" width="68" height="20" fill="#E65100" rx="4"/>
    <text x="130" y="357" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Calc Criterion</text>

    <text x="169" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#E65100">&#x2192;</text>

    <rect x="176" y="343" width="62" height="20" fill="#3949AB" rx="4"/>
    <text x="207" y="357" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Best Feature</text>

    <text x="243" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">&#x2192;</text>

    <rect x="250" y="343" width="52" height="20" fill="#E65100" rx="4"/>
    <text x="276" y="357" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Split Data</text>

    <text x="307" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#E65100">&#x2192;</text>

    <rect x="314" y="343" width="84" height="20" fill="#00695C" rx="4"/>
    <text x="356" y="357" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Recurse / Leaf</text>

    <!-- Pruning note -->
    <rect x="22" y="370" width="175" height="16" fill="#FFF3E0" rx="4" stroke="#E65100" stroke-width="0.8"/>
    <text x="110" y="381" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">Pre-pruning: Early stopping rules</text>

    <rect x="210" y="370" width="188" height="16" fill="#FCE4EC" rx="4" stroke="#C62828" stroke-width="0.8"/>
    <text x="304" y="381" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Post-pruning: Trim after full build</text>
  </g>
</svg>