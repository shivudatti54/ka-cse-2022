<svg
    width="420"
    height="400"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 420 400"
    data-topic-id="Chapter 4 42 45 Chapter 5 51 53 55 57 Chapter 6 61"
    data-narration="This diagram illustrates the key concepts of Chapter 4, Section 42-45, Chapter 5, Sections 51-53, 55-57, and Chapter 6, Section 61 of the Machine Learning study material."
    data-color-scheme="indigo, teal, orange"
>

    <!-- Gradient background with pastel colors -->
    <defs>
        <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
            <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
        </linearGradient>
    </defs>

    <!-- Background rectangle -->
    <rect
        x="0"
        y="0"
        width="420"
        height="400"
        fill="url(#backgroundGradient)"
        data-narration="Background: Gradient background with pastel colors"
        data-topic-id="Chapter 4 42 45 Chapter 5 51 53 55 57 Chapter 6 61"
    />

    <!-- Title at top -->
    <text
        x="10"
        y="20"
        font-size="24"
        font-family="Arial, sans-serif"
        text-anchor="start"
        fill="#2F4F7F"
        data-narration="Title: Supervised Learning"
    >
        Supervised Learning
    </text>

    <!-- Linear Regression section -->
    <section
        x="10"
        y="60"
        width="400"
        height="100"
        fill="#F7F7F7"
        data-narration="Linear Regression: Predicting continuous output variables"
        data-topic-id="Chapter 4 42 45 Chapter 5 51 53 55 57 Chapter 6 61"
    >
        <rect
            x="0"
            y="0"
            width="100"
            height="100"
            fill="#F7F7F7"
            rx="10"
        />
        <path
            d="M 20 20 L 320 320"
            stroke="#2F4F7F"
            stroke-width="2"
            data-narration="Linear Regression: Best-fitting line"
        />
        <animate
            attributeName="opacity"
            begin="0s"
            dur="2s"
            repeatCount="indefinite"
        />
        <animate
            attributeName="x"
            begin="2s"
            value="320"
            dur="2s"
            repeatCount="indefinite"
        />
    </section>

    <!-- Logistic Regression section -->
    <section
        x="10"
        y="170"
        width="400"
        height="100"
        fill="#F7F7F7"
        data-narration="Logistic Regression: Predicting categorical output variables"
        data-topic-id="Chapter 4 42 45 Chapter 5 51 53 55 57 Chapter 6 61"
    >
        <rect
            x="0"
            y="0"
            width="100"
            height="100"
            fill="#F7F7F7"
            rx="10"
        />
        <path
            d="M 20 20 L 320 320"
            stroke="#2F4F7F"
            stroke-width="2"
            data-narration="Logistic Regression: Best-fitting function"
        />
        <animate
            attributeName="opacity"
            begin="0s"
            dur="2s"
            repeatCount="indefinite"
        />
        <animate
            attributeName="x"
            begin="2s"
            value="320"
            dur="2s"
            repeatCount="indefinite"
        />
    </section>

    <!-- Animation section -->
    <section
        x="10"
        y="300"
        width="400"
        height="100"
        fill="#F7F7F7"
        data-narration="Animation: Smooth transitions between sections"
        data-topic-id="Chapter 4 42 45 Chapter 5 51 53 55 57 Chapter 6 61"
    >
        <rect
            x="0"
            y="0"
            width="100"
            height="100"
            fill="#F7F7F7"
            rx="10"
        />
        <rect
            x="10"
            y="10"
            width="300"
            height="80"
            fill="#F7F7F7"
            rx="10"
        />
        <animate
            attributeName="opacity"
            begin="0s"
            dur="2s"
            repeatCount="indefinite"
        />
        <animate
            attributeName="x"
            begin="2s"
            value="320"
            dur="2s"
            repeatCount="indefinite"
        />
    </section>

    <!-- Footer at bottom -->
    <text
        x="10"
        y="380"
        font-size="18"
        font-family="Arial, sans-serif"
        text-anchor="start"
        fill="#2F4F7F"
        data-narration="Footer: Supervised Learning"
    >
        Supervised Learning
    </text>

</svg>