<svg width="420" height="400" data-topic-id="annexure-ii-2-similarity-based-learning-nearest-ne" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-image: linear-gradient(to bottom, #7B81FF, #DCEDC9);">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7B81FF" stop-opacity="1" />
            <stop offset="100%" stop-color="#DCEDC9" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" style="fill: transparent; stroke: #000; stroke-width: 2;"/>
    <title>Annexure II 2 Similarity Based Learning Nearest Ne</title>
    <rect x="10" y="40" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
    <text x="15" y="50" font-size="16" text-anchor="middle" fill="#000">Similarity Based Learning</text>
    <rect x="10" y="80" width="380" height="30" style="fill: #DCEDC9;"/>
    <text x="15" y="90" font-size="16" text-anchor="middle" fill="#000">Nearest-Neighbor Learning</text>
    <rect x="10" y="120" width="380" height="150" style="fill: transparent; stroke: #000; stroke-width: 2;"/>
    <section data-narration="How it works">
        <rect x="10" y="150" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="160" font-size="14" text-anchor="middle" fill="#000">Train the model on a dataset of labeled examples.</text>
        <rect x="10" y="190" width="380" height="30" style="fill: #DCEDC9;"/>
        <text x="15" y="200" font-size="14" text-anchor="middle" fill="#000">When a new, unseen data point is presented, the model finds the k most similar data points in the training set.</text>
        <rect x="10" y="230" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="240" font-size="14" text-anchor="middle" fill="#000">The new data point is then classified based on the majority vote of the k most similar data points.</text>
    </section>
    <section data-narration="Example">
        <rect x="10" y="280" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="290" font-size="14" text-anchor="middle" fill="#000">Suppose we want to classify a new data point as either "class A" or "class B" based on a dataset of labeled examples.</text>
        <rect x="10" y="320" width="380" height="30" style="fill: #DCEDC9;"/>
        <text x="15" y="330" font-size="14" text-anchor="middle" fill="#000">If the training set contains the following data points:</text>
        <rect x="10" y="360" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="370" font-size="14" text-anchor="middle" fill="#000">| Feature 1 | Feature 2 | Class |</text>
        <rect x="10" y="400" width="380" height="30" style="fill: #DCEDC9;"/>
        <text x="15" y="410" font-size="14" text-anchor="middle" fill="#000">| 1.2       | 3.4       | A     |</text>
        <rect x="10" y="440" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="450" font-size="14" text-anchor="middle" fill="#000">| 2.1       | 3.5       | B     |</text>
        <rect x="10" y="480" width="380" height="30" style="fill: #DCEDC9;"/>
        <text x="15" y="490" font-size="14" text-anchor="middle" fill="#000">| 1.5       | 3.2       | A     |</text>
        <rect x="10" y="520" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="530" font-size="14" text-anchor="middle" fill="#000">| 2.2       | 3.3       | B     |</text>
        <rect x="10" y="560" width="380" height="30" style="fill: #DCEDC9;"/>
        <text x="15" y="570" font-size="14" text-anchor="middle" fill="#000">If the new data point has the following features: 1.3, 3.4, we would find the k most similar data points as follows:</text>
        <rect x="10" y="600" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="610" font-size="14" text-anchor="middle" fill="#000">- The distance between the new data point and the first data point (1.2, 3.4) is sqrt((1.3-1.2)^2 + (3.4-3.4)^2) = 0.1.</text>
        <rect x="10" y="640" width="380" height="30" style="fill: #DCEDC9;"/>
        <text x="15" y="650" font-size="14" text-anchor="middle" fill="#000">- The distance between the new data point and the second data point (2.1, 3.5) is sqrt((1.3-2.1)^2 + (3.4-3.5)^2) = 0.4.</text>
        <rect x="10" y="680" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="690" font-size="14" text-anchor="middle" fill="#000">- The distance between the new data point and the third data point (1.5, 3.2) is sqrt((1.3-1.5)^2 + (3.4-3.2)^2) = 0.1.</text>
        <rect x="10" y="720" width="380" height="30" style="fill: #DCEDC9;"/>
        <text x="15" y="730" font-size="14" text-anchor="middle" fill="#000">- The distance between the new data point and the fourth data point (2.2, 3.3) is sqrt((1.3-2.2)^2 + (3.4-3.3)^2) = 0.3.</text>
        <rect x="10" y="760" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="770" font-size="14" text-anchor="middle" fill="#000">We would then find the k most similar data points as the first and third data points (1.2, 3.4) and (1.5, 3.2) respectively.</text>
        <rect x="10" y="800" width="380" height="30" style="fill: #DCEDC9;"/>
        <text x="15" y="810" font-size="14" text-anchor="middle" fill="#000">Classification:</text>
        <rect x="10" y="840" width="380" height="30" style="fill: #7B81FF; background-image: linear-gradient(to bottom, #DCEDC9, #7B81FF);"/>
        <text x="15" y="850" font-size="14" text-anchor="middle" fill="#000">Based on the majority vote of the k most similar data points, the new data point is classified as class A.</text>
    </section>
    <rect x="10" y="900" width="380" height="30" style="fill: #DCEDC9;"/>
    <text x="15" y="910" font-size="14" text-anchor="middle" fill="#000">This is an example of the Nearest-Neighbor Learning algorithm.</text>
    <animate duration="3000" start="1000" attributeName="opacity" from="1" to="0.5" repeatCount="indefinite"/>
    <animate duration="3000" start="3000" attributeName="opacity" from="0.5" to="1" repeatCount="indefinite"/>
</svg>