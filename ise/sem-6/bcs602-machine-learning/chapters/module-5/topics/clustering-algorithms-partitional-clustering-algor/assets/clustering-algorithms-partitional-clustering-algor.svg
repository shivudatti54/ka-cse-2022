    <animate transform="rotate(360 20 50)" begin="0s" dur="10s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Definition">
    <rect x="10" y="100" width="380" height="20" fill="#2ecc71" rx="5"/>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Partitional Clustering Algorithm</text>
    <animate transform="translate(20 110)" begin="0.2s" dur="5s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Examples">
    <rect x="10" y="130" width="380" height="20" fill="#e74c3c" rx="5"/>
    <text x="20" y="140" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">K-Means Clustering</text>
    <text x="20" y="160" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Hierarchical Clustering</text>
    <animate transform="translate(20 140)" begin="0.4s" dur="5s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Characteristics">
    <rect x="10" y="170" width="380" height="20" fill="#2ecc71" rx="5"/>
    <text x="20" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Each data point is assigned to only one cluster.</text>
    <text x="20" y="200" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">The number of clusters is predefined.</text>
    <animate transform="translate(20 180)" begin="0.6s" dur="5s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Advantages">
    <rect x="10" y="210" width="380" height="20" fill="#e74c3c" rx="5"/>
    <text x="20" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Easy to implement and interpret.</text>
    <text x="20" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Fast execution time.</text>
    <animate transform="translate(20 220)" begin="0.8s" dur="5s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Disadvantages">
    <rect x="10" y="260" width="380" height="20" fill="#e74c3c" rx="5"/>
    <text x="20" y="270" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Does not handle noise or outliers well.</text>
    <text x="20" y="290" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">May not work well with high-dimensional data.</text>
    <animate transform="translate(20 270)" begin="1s" dur="5s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Example Code">
    <rect x="10" y="320" width="380" height="20" fill="#2ecc71" rx="5"/>
    <text x="20" y="330" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Example Code</text>
    <text x="20" y="350" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">```python
from sklearn.cluster import KMeans
import numpy as np

# Generate sample data
np.random.seed(0)
data = np.random.rand(100, 2)

# Create a KMeans model with 3 clusters
kmeans = KMeans(n_clusters=3)

# Fit the model to the data
kmeans.fit(data)

# Print the cluster labels
print(kmeans.labels_)
```
