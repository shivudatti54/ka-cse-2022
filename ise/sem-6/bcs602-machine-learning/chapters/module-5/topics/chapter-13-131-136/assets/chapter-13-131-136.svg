<svg width="420" height="400" data-topic-id="chapter-13">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFC080" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFC080" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" rx="10"/>
  <!-- Title Section -->
  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
      Clustering Algorithms
    </text>
  </g>
  <!-- Section 1: Introduction to Clustering Approaches -->
  <g transform="translate(10, 50)">
    <rect width="100%" height="20" fill="#87CEEB" rx="5"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Introduction to Clustering Approaches">
      Clustering is a type of unsupervised machine learning algorithm that groups similar data points into clusters.
    </text>
  </g>
  <animate transform="translateX(100%)" begin="0s" dur="2s" repeat-count="indefinite"/>
  <!-- Section 2: Types of Clustering Approaches -->
  <g transform="translate(10, 80)">
    <rect width="100%" height="20" fill="#FFC080" rx="5"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Types of Clustering Approaches">
      There are three main types of clustering algorithms: Hierarchical Clustering, K-Means Clustering, and DBSCAN.
    </text>
  </g>
  <animate transform="translateX(100%)" begin="0.5s" dur="2s" repeat-count="indefinite"/>
  <!-- Section 3: Advantages and Disadvantages of Clustering -->
  <g transform="translate(10, 110)">
    <rect width="100%" height="20" fill="#87CEEB" rx="5"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Advantages and Disadvantages of Clustering">
      Clustering has several advantages, including pattern identification and anomaly detection.
    </text>
  </g>
  <animate transform="translateX(100%)" begin="1s" dur="2s" repeat-count="indefinite"/>
  <!-- Section 4: Key Concepts -->
  <g transform="translate(10, 140)">
    <rect width="100%" height="20" fill="#C7B8EA" rx="5"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Key Concepts">
      A cluster is a group of similar data points, while distance and proximity measures calculate the similarity between data points.
    </text>
  </g>
  <animate transform="translateX(100%)" begin="1.5s" dur="2s" repeat-count="indefinite"/>
  <!-- Section 5: Example -->
  <g transform="translate(10, 170)">
    <rect width="100%" height="20" fill="#FFC080" rx="5"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Example">
      For instance, a clustering algorithm can group customers based on their demographics and purchasing behavior.
    </text>
  </g>
  <animate transform="translateX(100%)" begin="2s" dur="2s" repeat-count="indefinite"/>
  <!-- Footer Section -->
  <g transform="translate(10, 200)">
    <rect width="100%" height="20" fill="#87CEEB" rx="5"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Clustering Algorithms
    </text>
  </g>
</svg>