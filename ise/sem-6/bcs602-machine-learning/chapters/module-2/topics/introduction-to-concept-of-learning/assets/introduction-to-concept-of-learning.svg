<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="introduction-to-concept-of-learning">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Algorithm Analysis Overview -->
  <g data-narration="Algorithm Analysis evaluates the efficiency of algorithms by measuring how their performance scales with input size." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Introduction to Algorithm Analysis</text>
    <rect x="30" y="40" width="360" height="42" fill="#3949AB" rx="8"/>
    <text x="210" y="57" text-anchor="middle" font-family="Arial" font-size="11" fill="white">How does performance scale as input size increases?</text>
    <text x="210" y="73" text-anchor="middle" font-family="monospace" font-size="10" fill="#C5CAE9">Input (n) --&gt; Algorithm --&gt; Time &amp; Space Cost</text>
  </g>

  <!-- Group 2: Time Complexity and Space Complexity boxes -->
  <g data-narration="Time complexity counts basic operations as a function of input size. Space complexity measures memory usage including auxiliary space." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Time Complexity -->
    <rect x="30" y="95" width="170" height="68" fill="white" stroke="#3949AB" stroke-width="2" rx="6"/>
    <text x="115" y="113" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Time Complexity</text>
    <text x="115" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#444">Counts basic operations</text>
    <text x="115" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">Linear Search: O(n)</text>
    <text x="115" y="156" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">Binary Search: O(log n)</text>
    <!-- Space Complexity -->
    <rect x="220" y="95" width="170" height="68" fill="white" stroke="#00695C" stroke-width="2" rx="6"/>
    <text x="305" y="113" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Space Complexity</text>
    <text x="305" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#444">Measures memory usage</text>
    <text x="305" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">Input + Auxiliary + Output</text>
    <text x="305" y="156" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">Reverse Array: O(n)</text>
  </g>

  <!-- Group 3: Asymptotic Notations - Big-O, Omega, Theta -->
  <g data-narration="Asymptotic notations describe growth rates. Big-O gives the upper bound or worst case. Omega gives the lower bound or best case. Theta gives the tight bound when both match." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="183" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Asymptotic Notations</text>
    <!-- Big-O -->
    <rect x="20" y="192" width="120" height="52" fill="#E65100" rx="6"/>
    <text x="80" y="210" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Big-O (Upper)</text>
    <text x="80" y="224" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFE0B2">f(n) &lt;= c.g(n)</text>
    <text x="80" y="237" text-anchor="middle" font-family="Arial" font-size="8" fill="#FFE0B2">Worst Case</text>
    <!-- Omega -->
    <rect x="150" y="192" width="120" height="52" fill="#00695C" rx="6"/>
    <text x="210" y="210" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Omega (Lower)</text>
    <text x="210" y="224" text-anchor="middle" font-family="monospace" font-size="9" fill="#B2DFDB">c.g(n) &lt;= f(n)</text>
    <text x="210" y="237" text-anchor="middle" font-family="Arial" font-size="8" fill="#B2DFDB">Best Case</text>
    <!-- Theta -->
    <rect x="280" y="192" width="120" height="52" fill="#3949AB" rx="6"/>
    <text x="340" y="210" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Theta (Tight)</text>
    <text x="340" y="224" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">c1.g &lt;= f &lt;= c2.g</text>
    <text x="340" y="237" text-anchor="middle" font-family="Arial" font-size="8" fill="#C5CAE9">Both Bounds</text>
    <!-- Arrows showing Theta = O + Omega -->
    <line x1="140" y1="230" x2="150" y2="230" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <line x1="270" y1="230" x2="280" y2="230" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  </g>

  <!-- Group 4: Complexity Classes Table -->
  <g data-narration="Common complexity classes from fastest to slowest are: constant O of 1, logarithmic O of log n, linear O of n, linearithmic O of n log n, quadratic O of n squared, and exponential O of 2 to the n." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="264" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Common Complexity Classes</text>
    <!-- Bars representing growth rates -->
    <rect x="30" y="273" width="20" height="8" fill="#00695C" rx="2"/>
    <text x="55" y="281" font-family="monospace" font-size="9" fill="#00695C">O(1)</text>
    <text x="105" y="281" font-family="Arial" font-size="8" fill="#444">Constant</text>

    <rect x="30" y="286" width="40" height="8" fill="#00695C" rx="2"/>
    <text x="75" y="294" font-family="monospace" font-size="9" fill="#00695C">O(log n)</text>
    <text x="135" y="294" font-family="Arial" font-size="8" fill="#444">Logarithmic</text>

    <rect x="30" y="299" width="80" height="8" fill="#3949AB" rx="2"/>
    <text x="115" y="307" font-family="monospace" font-size="9" fill="#3949AB">O(n)</text>
    <text x="150" y="307" font-family="Arial" font-size="8" fill="#444">Linear</text>

    <rect x="30" y="312" width="140" height="8" fill="#E65100" rx="2"/>
    <text x="175" y="320" font-family="monospace" font-size="9" fill="#E65100">O(n log n)</text>
    <text x="245" y="320" font-family="Arial" font-size="8" fill="#444">Linearithmic</text>

    <rect x="30" y="325" width="240" height="8" fill="#C62828" rx="2"/>
    <text x="275" y="333" font-family="monospace" font-size="9" fill="#C62828">O(n^2)</text>
    <text x="315" y="333" font-family="Arial" font-size="8" fill="#444">Quadratic</text>

    <rect x="30" y="338" width="360" height="8" fill="#C62828" rx="2"/>
    <text x="210" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="white">O(2^n)</text>
  </g>

  <!-- Group 5: Case Analysis - Best/Worst/Average -->
  <g data-narration="Case analysis involves three scenarios. Best case is the minimum operations, for example finding the target at the first position. Worst case is maximum operations. Average case uses expected values over all inputs." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="363" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Case Analysis (Linear Search Example)</text>
    <!-- Best Case -->
    <rect x="20" y="369" width="118" height="24" fill="#00695C" rx="4"/>
    <text x="79" y="385" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Best: O(1)</text>
    <!-- Worst Case -->
    <rect x="148" y="369" width="118" height="24" fill="#C62828" rx="4"/>
    <text x="207" y="385" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Worst: O(n)</text>
    <!-- Average Case -->
    <rect x="276" y="369" width="124" height="24" fill="#E65100" rx="4"/>
    <text x="338" y="385" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Average: O(n)</text>
  </g>

  <!-- Group 6: Key Takeaway -->
  <g data-narration="The key takeaway is that algorithm analysis provides machine-independent comparison using asymptotic notations, focusing on growth rate rather than exact operation counts." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="100" y="356" width="220" height="0" fill="none"/>
    <!-- This group adds a subtle pulsing highlight to the title to emphasize the takeaway -->
    <rect x="30" y="40" width="360" height="42" fill="none" stroke="#3949AB" stroke-width="2" rx="8" opacity="0.3">
      <animate attributeName="stroke-width" values="2;4;2" dur="2s" begin="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="7.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>