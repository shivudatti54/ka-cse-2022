<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#ADD8E6" x="0" y="0" width="420" height="100" rx="10"/>
  <rect fill="#ADD8E6" x="0" y="100" width="420" height="100" rx="10"/>
  <rect fill="#6495ED" x="0" y="200" width="420" height="100" rx="10"/>
  <rect fill="#FFA07A" x="0" y="300" width="420" height="100" rx="10"/>
  <title>Modelling in Machine Learning</title>
  <definesection data-narration="Types of Machine Learning">
    <rect fill="#6495ED" x="10" y="50" width="400" height="20" rx="10"/>
    <text x="15" y="30" font-size="16" font-family="Arial">Types of Machine Learning</text>
  </definesection>
  <definesection data-narration="Supervised Learning">
    <rect fill="#ADD8E6" x="10" y="150" width="400" height="20" rx="10"/>
    <text x="15" y="130" font-size="16" font-family="Arial">Supervised Learning</text>
    <animate duration="2000" begin="0s" fill="freeze">
      <path d="M 100,150 L 150,100" stroke="#6495ED" stroke-width="2" fill="none" />
      <path d="M 100,100 L 100,150" stroke="#6495ED" stroke-width="2" fill="none" />
    </animate>
    <text x="15" y="160" font-size="14" font-family="Arial">Uses labeled data to learn a mapping from features to targets.</text>
  </definesection>
  <definesection data-narration="Unsupervised Learning">
    <rect fill="#ADD8E6" x="10" y="250" width="400" height="20" rx="10"/>
    <text x="15" y="230" font-size="16" font-family="Arial">Unsupervised Learning</text>
    <animate duration="2000" begin="0s" fill="freeze">
      <path d="M 100,250 L 150,200" stroke="#6495ED" stroke-width="2" fill="none" />
      <path d="M 100,200 L 100,250" stroke="#6495ED" stroke-width="2" fill="none" />
    </animate>
    <text x="15" y="270" font-size="14" font-family="Arial">Uses unlabeled data to discover hidden structure, patterns, or groupings.</text>
  </definesection>
  <definesection data-narration="Reinforcement Learning">
    <rect fill="#ADD8E6" x="10" y="350" width="400" height="20" rx="10"/>
    <text x="15" y="330" font-size="16" font-family="Arial">Reinforcement Learning</text>
    <animate duration="2000" begin="0s" fill="freeze">
      <path d="M 100,350 L 150,300" stroke="#6495ED" stroke-width="2" fill="none" />
      <path d="M 100,300 L 100,350" stroke="#6495ED" stroke-width="2" fill="none" />
    </animate>
    <text x="15" y="370" font-size="14" font-family="Arial">An agent learns by interacting with an environment and receiving rewards.</text>
  </definesection>
  <footer>Designed by [Your Name]</footer>
</svg>