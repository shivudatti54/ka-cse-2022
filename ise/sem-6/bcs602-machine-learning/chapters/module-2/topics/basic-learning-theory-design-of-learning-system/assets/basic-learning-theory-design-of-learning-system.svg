<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#33CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Basic Learning Theory Design Of Learning System</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(10, 50)">
    <text text-anchor="start" x="0" y="20" font-size="18" font-family="Arial" fill="#2E4053">Basic Learning Theory</text>
  </g>
  <g transform="translate(10, 70)">
    <section data-narration="Problem Definition" data-topic-id="basic-learning-theory-design-of-learning-system">
      <rect x="10" y="10" width="380" height="50" fill="#F7F7F7" rx="5"/>
      <text x="15" y="25" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Problem Definition</text>
      <text x="15" y="50" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Define the problem that the system needs to solve</text>
    </section>
    <section data-narration="Data Collection" data-topic-id="basic-learning-theory-design-of-learning-system">
      <rect x="10" y="170" width="380" height="50" fill="#F7F7F7" rx="5"/>
      <text x="15" y="185" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Data Collection</text>
      <text x="15" y="210" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Collect the data that will be used to train the system</text>
    </section>
    <section data-narration="Feature Engineering" data-topic-id="basic-learning-theory-design-of-learning-system">
      <rect x="10" y="320" width="380" height="50" fill="#F7F7F7" rx="5"/>
      <text x="15" y="335" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Feature Engineering</text>
      <text x="15" y="350" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Extract relevant features from the data</text>
    </section>
    <section data-narration="Model Selection" data-topic-id="basic-learning-theory-design-of-learning-system">
      <rect x="10" y="370" width="380" height="50" fill="#F7F7F7" rx="5"/>
      <text x="15" y="385" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Model Selection</text>
      <text x="15" y="400" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Choose a suitable learning algorithm</text>
    </section>
    <section data-narration="Hyperparameter Tuning" data-topic-id="basic-learning-theory-design-of-learning-system">
      <rect x="10" y="450" width="380" height="50" fill="#F7F7F7" rx="5"/>
      <text x="15" y="465" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Hyperparameter Tuning</text>
      <text x="15" y="480" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Adjust hyperparameters to optimize performance</text>
    </section>
    <section data-narration="Optimization" data-topic-id="basic-learning-theory-design-of-learning-system">
      <rect x="10" y="510" width="380" height="50" fill="#F7F7F7" rx="5"/>
      <text x="15" y="525" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Optimization</text>
      <text x="15" y="540" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Find the values of parameters that maximize performance</text>
    </section>
    <g transform="translate(10, 600)">
      <text x="0" y="20" font-size="18" font-family="Arial" fill="#2E4053">Reinforcement Learning</text>
      <text x="15" y="40" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Reinforcement Learning</text>
      <text x="15" y="55" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Use rewards or penalties to update parameters</text>
    </g>
    <g transform="translate(10, 650)">
      <text x="0" y="20" font-size="18" font-family="Arial" fill="#2E4053">Supervised Learning</text>
      <text x="15" y="40" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Supervised Learning</text>
      <text x="15" y="55" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Use labeled data to train the system</text>
    </g>
    <g transform="translate(10, 700)">
      <text x="0" y="20" font-size="18" font-family="Arial" fill="#2E4053">Unsupervised Learning</text>
      <text x="15" y="40" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Unsupervised Learning</text>
      <text x="15" y="55" font-size="14" font-family="Arial" fill="#666" text-anchor="start">Use unlabeled data to identify patterns</text>
    </g>
  </svg>