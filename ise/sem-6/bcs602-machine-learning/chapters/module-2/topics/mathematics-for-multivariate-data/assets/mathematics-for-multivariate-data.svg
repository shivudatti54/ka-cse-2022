<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="mathematics-for-multivariate-data">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="posGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695C;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00695C;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="negGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C62828;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#C62828;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and topic header -->
  <g data-narration="Mathematics for Multivariate Data. This topic covers bivariate and multivariate analysis, including correlation, covariance, and dimensionality reduction techniques used in machine learning." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Mathematics for Multivariate Data</text>
    <line x1="60" y1="36" x2="360" y2="36" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Bivariate vs Multivariate boxes -->
    <rect x="30" y="44" width="170" height="32" fill="#3949AB" rx="6"/>
    <text x="115" y="64" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Bivariate (2 vars)</text>
    <rect x="220" y="44" width="170" height="32" fill="#00695C" rx="6"/>
    <text x="305" y="64" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Multivariate (3+ vars)</text>
    <text x="205" y="64" text-anchor="middle" font-family="Arial" font-size="14" fill="#3949AB" font-weight="bold">&amp;</text>
  </g>

  <!-- Group 2: Scatter plots showing correlation types -->
  <g data-narration="Correlation measures the direction and strength of a relationship between two variables. Positive correlation means both variables increase together. Negative correlation means one increases while the other decreases. No correlation means no linear relationship exists." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="96" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Correlation Types (Pearson r ranges from -1 to +1)</text>

    <!-- Positive correlation scatter -->
    <rect x="18" y="104" width="120" height="90" fill="white" fill-opacity="0.5" rx="5" stroke="#00695C" stroke-width="1"/>
    <text x="78" y="118" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">r = +1 (Positive)</text>
    <!-- Axes -->
    <line x1="32" y1="185" x2="32" y2="122" stroke="#333" stroke-width="1"/>
    <line x1="32" y1="185" x2="130" y2="185" stroke="#333" stroke-width="1"/>
    <text x="28" y="155" text-anchor="middle" font-family="Arial" font-size="7" fill="#555" transform="rotate(-90,28,155)">Y</text>
    <text x="82" y="193" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">X</text>
    <!-- Positive trend dots -->
    <circle cx="42" cy="178" r="3" fill="#00695C"/>
    <circle cx="52" cy="172" r="3" fill="#00695C"/>
    <circle cx="62" cy="164" r="3" fill="#00695C"/>
    <circle cx="72" cy="156" r="3" fill="#00695C"/>
    <circle cx="82" cy="148" r="3" fill="#00695C"/>
    <circle cx="92" cy="140" r="3" fill="#00695C"/>
    <circle cx="102" cy="132" r="3" fill="#00695C"/>
    <circle cx="112" cy="126" r="3" fill="#00695C"/>
    <line x1="40" y1="180" x2="115" y2="124" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

    <!-- Negative correlation scatter -->
    <rect x="150" y="104" width="120" height="90" fill="white" fill-opacity="0.5" rx="5" stroke="#C62828" stroke-width="1"/>
    <text x="210" y="118" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">r = -1 (Negative)</text>
    <line x1="164" y1="185" x2="164" y2="122" stroke="#333" stroke-width="1"/>
    <line x1="164" y1="185" x2="262" y2="185" stroke="#333" stroke-width="1"/>
    <text x="160" y="155" text-anchor="middle" font-family="Arial" font-size="7" fill="#555" transform="rotate(-90,160,155)">Y</text>
    <text x="214" y="193" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">X</text>
    <!-- Negative trend dots -->
    <circle cx="174" cy="128" r="3" fill="#C62828"/>
    <circle cx="184" cy="136" r="3" fill="#C62828"/>
    <circle cx="194" cy="144" r="3" fill="#C62828"/>
    <circle cx="204" cy="152" r="3" fill="#C62828"/>
    <circle cx="214" cy="158" r="3" fill="#C62828"/>
    <circle cx="224" cy="166" r="3" fill="#C62828"/>
    <circle cx="234" cy="172" r="3" fill="#C62828"/>
    <circle cx="244" cy="180" r="3" fill="#C62828"/>
    <line x1="172" y1="126" x2="247" y2="182" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

    <!-- No correlation scatter -->
    <rect x="282" y="104" width="120" height="90" fill="white" fill-opacity="0.5" rx="5" stroke="#E65100" stroke-width="1"/>
    <text x="342" y="118" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">r = 0 (None)</text>
    <line x1="296" y1="185" x2="296" y2="122" stroke="#333" stroke-width="1"/>
    <line x1="296" y1="185" x2="394" y2="185" stroke="#333" stroke-width="1"/>
    <text x="292" y="155" text-anchor="middle" font-family="Arial" font-size="7" fill="#555" transform="rotate(-90,292,155)">Y</text>
    <text x="346" y="193" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">X</text>
    <!-- Random dots -->
    <circle cx="306" cy="140" r="3" fill="#E65100"/>
    <circle cx="318" cy="175" r="3" fill="#E65100"/>
    <circle cx="328" cy="132" r="3" fill="#E65100"/>
    <circle cx="340" cy="168" r="3" fill="#E65100"/>
    <circle cx="350" cy="128" r="3" fill="#E65100"/>
    <circle cx="362" cy="160" r="3" fill="#E65100"/>
    <circle cx="374" cy="145" r="3" fill="#E65100"/>
    <circle cx="384" cy="172" r="3" fill="#E65100"/>
  </g>

  <!-- Group 3: Covariance and Pearson formula -->
  <g data-narration="Covariance measures how two variables change together. The Pearson correlation coefficient r standardizes covariance by dividing by the product of standard deviations, producing a value between negative one and positive one." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="18" y="200" width="384" height="48" fill="white" fill-opacity="0.6" rx="6" stroke="#3949AB" stroke-width="1"/>
    <text x="28" y="216" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Key Formulas:</text>
    <text x="28" y="232" font-family="monospace" font-size="9" fill="#333">Cov(X,Y) = Sum[(Xi - X_mean)(Yi - Y_mean)] / (n-1)</text>
    <text x="28" y="244" font-family="monospace" font-size="9" fill="#3949AB" font-weight="bold">r = Cov(X,Y) / (std_X * std_Y)    Range: [-1, +1]</text>
  </g>

  <!-- Group 4: Multiple Regression model -->
  <g data-narration="Multiple regression extends linear regression to model the relationship between a dependent variable Y and multiple independent variables X1, X2 through Xn, with coefficients beta and an error term epsilon." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="18" y="255" width="384" height="40" fill="#3949AB" fill-opacity="0.1" rx="6" stroke="#3949AB" stroke-width="1"/>
    <text x="28" y="271" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Multiple Regression Model:</text>
    <text x="28" y="287" font-family="monospace" font-size="10" fill="#333">Y = B0 + B1*X1 + B2*X2 + ... + Bn*Xn + e</text>
    <text x="310" y="287" font-family="Arial" font-size="8" fill="#E65100">(Bi = coefficients)</text>
  </g>

  <!-- Group 5: PCA Pipeline -->
  <g data-narration="Principal Component Analysis, or PCA, reduces the dimensionality of large datasets while preserving as much variance as possible. The process flows from original data through standardization, covariance matrix computation, eigenvalue calculation, and finally transformation to lower dimensions." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="310" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">PCA Dimensionality Reduction Pipeline</text>

    <!-- Pipeline boxes -->
    <rect x="10" y="318" width="70" height="28" fill="#00695C" rx="4"/>
    <text x="45" y="335" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Raw Data</text>

    <text x="84" y="335" text-anchor="middle" font-family="Arial" font-size="12" fill="#00695C">&#8594;</text>

    <rect x="92" y="318" width="76" height="28" fill="#00695C" rx="4"/>
    <text x="130" y="335" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Standardize</text>

    <text x="173" y="335" text-anchor="middle" font-family="Arial" font-size="12" fill="#00695C">&#8594;</text>

    <rect x="180" y="318" width="76" height="28" fill="#00695C" rx="4"/>
    <text x="218" y="335" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Cov Matrix</text>

    <text x="261" y="335" text-anchor="middle" font-family="Arial" font-size="12" fill="#00695C">&#8594;</text>

    <rect x="268" y="318" width="68" height="28" fill="#00695C" rx="4"/>
    <text x="302" y="335" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Eigenvalues</text>

    <text x="340" y="335" text-anchor="middle" font-family="Arial" font-size="12" fill="#00695C">&#8594;</text>

    <rect x="346" y="318" width="64" height="28" fill="#3949AB" rx="4"/>
    <text x="378" y="331" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Low-D</text>
    <text x="378" y="341" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Output</text>
  </g>

  <!-- Group 6: Comparison table of DR techniques -->
  <g data-narration="Dimensionality reduction techniques compared: PCA is linear and unsupervised, best for general reduction. LDA is linear and supervised, best for classification. t-SNE is non-linear and unsupervised, best for data visualization." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="362" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Dimensionality Reduction Techniques</text>

    <!-- Table header -->
    <rect x="18" y="367" width="122" height="14" fill="#3949AB" rx="2"/>
    <text x="79" y="377" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Technique / Type</text>
    <rect x="142" y="367" width="68" height="14" fill="#3949AB" rx="2"/>
    <text x="176" y="377" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Supervised?</text>
    <rect x="212" y="367" width="190" height="14" fill="#3949AB" rx="2"/>
    <text x="307" y="377" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white" font-weight="bold">Best Use Case</text>

    <!-- PCA row -->
    <rect x="18" y="382" width="122" height="12" fill="white" fill-opacity="0.5"/>
    <text x="79" y="391" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">PCA (Linear)</text>
    <rect x="142" y="382" width="68" height="12" fill="white" fill-opacity="0.5"/>
    <text x="176" y="391" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">No</text>
    <rect x="212" y="382" width="190" height="12" fill="white" fill-opacity="0.5"/>
    <text x="307" y="391" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">General dimensionality reduction</text>

    <!-- LDA row -->
    <rect x="18" y="394" width="122" height="12" fill="#E8EAF6" fill-opacity="0.7"/>
    <text x="79" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">LDA (Linear)</text>
    <rect x="142" y="394" width="68" height="12" fill="#E8EAF6" fill-opacity="0.7"/>
    <text x="176" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Yes</text>
    <rect x="212" y="394" width="190" height="12" fill="#E8EAF6" fill-opacity="0.7"/>
    <text x="307" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Classification tasks</text>
  </g>
</svg>