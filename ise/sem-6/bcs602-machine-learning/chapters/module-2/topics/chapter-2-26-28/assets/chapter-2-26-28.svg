<svg width="420" height="400" data-topic-id="chapter2-26-28">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" />
  
  <!-- Title Section -->
  <rect x="50" y="20" width="320" height="50" fill="#2E4053" rx="10">
    <text x="80" y="35" fill="#FFF" font-size="24" font-family="Arial">
      Bivariate Data
    </text>
  </rect>
  <animateTransform attributeName="x" type="translate" FROM="50" TO="0" begin="0s" dur="1s" repeatCount="1" />
  
  <!-- Section 1: Definition -->
  <rect x="0" y="90" width="420" height="150" fill="#2E4053" rx="10">
    <rect x="0" y="0" width="100" height="100" fill="#C7B8EA" rx="10" />
    <rect x="100" y="0" width="100" height="100" fill="#A1C9F2" rx="10" />
    <text x="120" y="25" fill="#FFF" font-size="18" font-family="Arial">
      Definition: Bivariate data refers to data that consists of two variables.
    </text>
  </rect>
  <animateTransform attributeName="x" type="translate" FROM="0" TO="420" begin="0.5s" dur="0.5s" repeatCount="1" />
  
  <!-- Section 2: Types of Bivariate Data -->
  <rect x="0" y="250" width="420" height="150" fill="#2E4053" rx="10">
    <rect x="0" y="0" width="150" height="150" fill="#C7B8EA" rx="10" />
    <rect x="150" y="0" width="150" height="150" fill="#A1C9F2" rx="10" />
    <text x="170" y="25" fill="#FFF" font-size="18" font-family="Arial">
      Discrete: Categorical data (gender, color)
      <tspan x="320" y="25" fill="#FFF" font-size="18" font-family="Arial">
        &nbsp;Continuous: Numerical data (height, weight)
      </tspan>
    </text>
  </rect>
  <animateTransform attributeName="x" type="translate" FROM="0" TO="420" begin="1s" dur="0.5s" repeatCount="1" />
  
  <!-- Section 3: Types of Relationships -->
  <rect x="0" y="410" width="420" height="150" fill="#2E4053" rx="10">
    <rect x="0" y="0" width="100" height="100" fill="#C7B8EA" rx="10" />
    <rect x="100" y="0" width="100" height="100" fill="#A1C9F2" rx="10" />
    <text x="120" y="25" fill="#FFF" font-size="18" font-family="Arial">
      Positive Correlation: Both variables increase together
    </text>
    <text x="300" y="25" fill="#FFF" font-size="18" font-family="Arial">
      Negative Correlation: One variable increases, other decreases
    </text>
    <text x="50" y="75" fill="#FFF" font-size="18" font-family="Arial">
      No Correlation: No significant relationship
    </text>
  </rect>
  <animateTransform attributeName="x" type="translate" FROM="0" TO="420" begin="1.5s" dur="0.5s" repeatCount="1" />
  
  <!-- Section 4: Measuring Bivariate Relationships -->
  <rect x="0" y="570" width="420" height="150" fill="#2E4053" rx="10">
    <rect x="0" y="0" width="100" height="100" fill="#C7B8EA" rx="10" />
    <rect x="100" y="0" width="100" height="100" fill="#A1C9F2" rx="10" />
    <text x="120" y="25" fill="#FFF" font-size="18" font-family="Arial">
      Correlation Coefficient (r): Measures strength and direction of linear relationship
    </text>
    <text x="300" y="25" fill="#FFF" font-size="18" font-family="Arial">
      Spearman's Rank Correlation Coefficient: Measures rank correlation for non-linear relationships
    </text>
  </rect>
  <animateTransform attributeName="x" type="translate" FROM="0" TO="420" begin="2s" dur="0.5s" repeatCount="1" />
  
  <!-- Footer Section -->
  <rect x="0" y="730" width="420" height="50" fill="#2E4053" rx="10">
    <text x="20" y="25" fill="#FFF" font-size="18" font-family="Arial">
      Chapter 2: Understanding Data
    </text>
  </rect>
  <animateTransform attributeName="x" type="translate" FROM="20" TO="0" begin="2.5s" dur="1s" repeatCount="1" />
</svg>