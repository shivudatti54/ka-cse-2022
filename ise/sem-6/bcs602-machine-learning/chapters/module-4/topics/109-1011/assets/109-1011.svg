<svg width="420" height="400" data-topic-id="bayesian-learning-109-1011">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  
  <!-- Section 1: Bayes' Theorem Introduction -->
  <g data-narration="Bayes' Theorem Introduction">
    <rect x="10" y="20" width="400" height="50" fill="#F7F7F7" rx="10" />
    <text x="20" y="25" fill="#333" font-size="18">Bayes' Theorem</text>
    <circle cx="220" cy="25" r="15" fill="#87CEEB" stroke="#333" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" begin="0s" dur="1s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 2: Bayes' Theorem Formula -->
  <g data-narration="Bayes' Theorem Formula">
    <rect x="10" y="80" width="400" height="50" fill="#F7F7F7" rx="10" />
    <text x="20" y="85" fill="#333" font-size="18">P(H|D) = P(D|H) \* P(H) / P(D)</text>
    <line x1="220" y1="80" x2="220" y2="150" stroke="#333" stroke-width="2" />
    <line x1="220" y1="150" x2="320" y2="150" stroke="#333" stroke-width="2" />
    <line x1="320" y1="150" x2="320" y2="220" stroke="#333" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 0" begin="0.2s" dur="0.5s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 3: Bayes' Theorem Example -->
  <g data-narration="Bayes' Theorem Example">
    <rect x="10" y="130" width="400" height="50" fill="#F7F7F7" rx="10" />
    <text x="20" y="135" fill="#333" font-size="18">Example</text>
    <rect x="100" y="140" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="120" y="145" fill="#333" font-size="12">P(Disease|Test Result)</text>
    <rect x="220" y="140" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="240" y="145" fill="#333" font-size="12">= 0.9 \* 0.1 / 0.55</text>
    <animateTransform attributeName="transform" type="translate" from="0 160" to="0 0" begin="0.3s" dur="0.5s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 4: Decision Theory Introduction -->
  <g data-narration="Decision Theory Introduction">
    <rect x="10" y="190" width="400" height="50" fill="#F7F7F7" rx="10" />
    <text x="20" y="195" fill="#333" font-size="18">Decision Theory</text>
    <circle cx="220" cy="195" r="15" fill="#87CEEB" stroke="#333" stroke-width="2" />
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 0" begin="0.5s" dur="1s" repeatCount="indefinite" />
  </g>
  
  <!-- Section 5: Expected Utility -->
  <g data-narration="Expected Utility">
    <rect x="10" y="260" width="400" height="50" fill="#F7F7F7" rx="10" />
    <text x="20" y="265" fill="#333" font-size="18">Expected Utility</text>
    <rect x="100" y="270" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="120" y="275" fill="#333" font-size="12">E(U) = ∑[P(i) \* U(i)]</text>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 0" begin="1s" dur="1s" repeatCount="indefinite" />
  </g>
  
  <!-- Footer -->
  <g>
    <rect x="10" y="350" width="400" height="50" fill="#F7F7F7" rx="10" />
    <text x="20" y="355" fill="#333" font-size="18">Bayesian Learning: Introduction to Probability-based Learning</text>
  </g>
</svg>