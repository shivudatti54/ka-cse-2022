<svg width="420" height="400" data-topic-id="classification-using-bayes-model">
  <style>
    /* Add a gradient background with pastel colors */
    body {
      background-color: #C7B8EA;
      background-image: linear-gradient(to bottom, #C7B8EA, #A1C9F2);
    }
  </style>
  <animate id="title-animation" attributeName="opacity" begin="0s" dur="2s" fill="freeze" from="1" to="0.5"/>
  <animate id="footer-animation" attributeName="opacity" begin="2s" dur="2s" fill="freeze" from="1" to="0.5"/>
  
  <!-- Section 1: Introduction -->
  <rect x="50" y="50" width="320" height="120" fill="#86B3C4" rx="10"/>
  <text x="150" y="90" fill="#fff" font-size="24" font-family="Arial, sans-serif" data-narration="Classification using Bayes model is a probability-based approach to assign new data points to predefined classes. It uses Bayes' theorem to update the probability of a hypothesis as more evidence becomes available." />
  <animateTransform transform="translate(150,90) rotate(45)" id="section1-animation" begin="0s" dur="2s" fill="freeze"/>
  
  <!-- Section 2: Bayes' Theorem -->
  <rect x="50" y="200" width="320" height="120" fill="#8BC34A" rx="10"/>
  <text x="150" y="250" fill="#fff" font-size="24" font-family="Arial, sans-serif" data-narration="Bayes' theorem is a mathematical formula that describes the probability of an event occurring given some new evidence. The formula is as follows: P(H|E) = P(E|H) \* P(H) / P(E)" />
  <animateTransform transform="translate(150,250) rotate(-45)" id="section2-animation" begin="0.5s" dur="2s" fill="freeze"/>
  
  <!-- Section 3: Classification Using Bayes Model -->
  <rect x="50" y="350" width="320" height="120" fill="#FF9800" rx="10"/>
  <text x="150" y="400" fill="#fff" font-size="24" font-family="Arial, sans-serif" data-narration="In classification using Bayes model, the goal is to assign a new data point to one of the predefined classes based on the probability of each class given the observed features" />
  <animateTransform transform="translate(150,400) rotate(45)" id="section3-animation" begin="1.5s" dur="2s" fill="freeze"/>
  
  <!-- Section 4: Posterior Probability -->
  <rect x="50" y="150" width="320" height="120" fill="#2196F3" rx="10"/>
  <text x="150" y="200" fill="#fff" font-size="24" font-family="Arial, sans-serif" data-narration="The posterior probability of a class given the observed evidence is calculated using Bayes' theorem: P(H|E) = P(E|H) \* P(H) / P(E)" />
  <animateTransform transform="translate(150,200) rotate(-45)" id="section4-animation" begin="0.5s" dur="2s" fill="freeze"/>
  
  <!-- Section 5: Prior Probability -->
  <rect x="50" y="250" width="320" height="120" fill="#03A9F4" rx="10"/>
  <text x="150" y="300" fill="#fff" font-size="24" font-family="Arial, sans-serif" data-narration="The prior probability of a class is the probability of the class before observing any evidence" />
  <animateTransform transform="translate(150,300) rotate(45)" id="section5-animation" begin="1s" dur="2s" fill="freeze"/>
  
  <!-- Section 6: Likelihood -->
  <rect x="50" y="350" width="320" height="120" fill="#FFC107" rx="10"/>
  <text x="150" y="400" fill="#fff" font-size="24" font-family="Arial, sans-serif" data-narration="The likelihood of observing the evidence given a class is calculated as P(E|H)" />
  <animateTransform transform="translate(150,400) rotate(-45)" id="section6-animation" begin="1.5s" dur="2s" fill="freeze"/>
  
  <!-- Title -->
  <rect x="50" y="20" width="320" height="80" fill="#87CEEB" rx="10"/>
  <text x="150" y="60" fill="#fff" font-size="32" font-family="Arial, sans-serif" data-narration="Classification using Bayes model">Classification using Bayes model</text>
  <animate id="title-animation" attributeName="opacity" begin="0s" dur="2s" fill="freeze" from="1" to="0.5"/>
  
  <!-- Footer -->
  <rect x="50" y="380" width="320" height="40" fill="#2196F3" rx="10"/>
  <text x="150" y="420" fill="#fff" font-size="24" font-family="Arial, sans-serif" data-narration="Learn more about classification using Bayes model" />
  <animate id="footer-animation" attributeName="opacity" begin="2s" dur="2s" fill="freeze" from="1" to="0.5"/>
</svg>