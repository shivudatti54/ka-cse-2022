<svg 
    width="420" 
    height="400" 
    viewBox="0 0 420 400" 
    xmlns="http://www.w3.org/2000/svg" 
    xmlns:xlink="http://www.w3.org/1999/xlink" 
    style="font-family:sans-serif; font-size:14px; color:#333; background-color: #C5CAE9">
    
    <!--Title Section-->
    <rect 
        x="0" 
        y="20" 
        width="100%" 
        height="40" 
        style="background-color: #03A9F4; border-radius: 5px; padding: 5px; text-align: center;">
        <animate 
            attributeName="opacity" 
            begin="0s" 
            dur="1s" 
            calcMode="spline" 
            keyTimes="0;1" 
            keySplines="5 2 1 2; 5 2 1 2" 
            fill="freeze" 
            style="opacity:0; opacity:1;" />
        <text x="50%" y="50%" 
              text-anchor="middle" 
              font-size="18px" 
              fill="#fff">
            Naïve Bayes Algorithm for Continuous Attributes
        </text>
    </rect>
    
    <!--Gradient Background Section-->
    <rect 
        x="0" 
        y="60" 
        width="100%" 
        height="240" 
        style="background-image: linear-gradient(to bottom right, #C7B8EA, #87CEEB); padding: 20px; border-radius: 10px;">
        <animate 
            attributeName="opacity" 
            begin="0s" 
            dur="1s" 
            calcMode="spline" 
            keyTimes="0;1" 
            keySplines="5 2 1 2; 5 2 1 2" 
            fill="freeze" 
            style="opacity:0; opacity:1;" />
    </rect>
    
    <!--Section 1 Section-->
    <rect 
        x="0" 
        y="310" 
        width="100%" 
        height="40" 
        style="background-color: #FFC107; border-radius: 5px; padding: 5px; text-align: center;">
        <animate 
            attributeName="opacity" 
            begin="1s" 
            dur="1s" 
            calcMode="spline" 
            keyTimes="0;1" 
            keySplines="5 2 1 2; 5 2 1 2" 
            fill="freeze" 
            style="opacity:0; opacity:1;" />
        <text x="50%" y="50%" 
              text-anchor="middle" 
              font-size="18px" 
              fill="#fff">
            Definition and Assumptions
        </text>
    </rect>
    <section data-narration="Definition and Assumptions" 
            data-topic-id="naive-bayes-algorithm-for-continuous-attributes" 
            style="padding: 20px; border-radius: 10px;">
        <text x="20%" y="20%" 
              text-anchor="start" 
              font-size="16px" 
              fill="#333">Naïve Bayes Algorithm: A probabilistic classification algorithm based on Bayes' theorem.</text>
        <text x="20%" y="40%" 
              text-anchor="start" 
              font-size="16px" 
              fill="#333">Conditional Independence: The assumption that the value of one feature does not affect the probability of another feature.</text>
    </section>
    
    <!--Section 2 Section-->
    <rect 
        x="0" 
        y="350" 
        width="100%" 
        height="40" 
        style="background-color: #03A9F4; border-radius: 5px; padding: 5px; text-align: center;">
        <animate 
            attributeName="opacity" 
            begin="2s" 
            dur="1s" 
            calcMode="spline" 
            keyTimes="0;1" 
            keySplines="5 2 1 2; 5 2 1 2" 
            fill="freeze" 
            style="opacity:0; opacity:1;" />
        <text x="50%" y="50%" 
              text-anchor="middle" 
              font-size="18px" 
              fill="#fff">
            How Naïve Bayes Works
        </text>
    </rect>
    <section data-narration="How Naïve Bayes Works" 
            data-topic-id="naive-bayes-algorithm-for-continuous-attributes" 
            style="padding: 20px; border-radius: 10px;">
        <text x="20%" y="20%" 
              text-anchor="start" 
              font-size="16px" 
              fill="#333">Training: The algorithm is trained on a labeled dataset, where each instance is represented by a set of features (continuous attributes) and a target label.</text>
        <text x="20%" y="40%" 
              text-anchor="start" 
              font-size="16px" 
              fill="#333">Probability Calculation: The algorithm calculates the probability of each feature value given the target label.</text>
    </section>
    
    <!--Section 3 Section-->
    <rect 
        x="0" 
        y="300" 
        width="100%" 
        height="40" 
        style="background-color: #FFC107; border-radius: 5px; padding: 5px; text-align: center;">
        <animate 
            attributeName="opacity" 
            begin="3s" 
            dur="1s" 
            calcMode="spline" 
            keyTimes="0;1" 
            keySplines="5 2 1 2; 5 2 1 2" 
            fill="freeze" 
            style="opacity:0; opacity:1;" />
        <text x="50%" y="50%" 
              text-anchor="middle" 
              font-size="18px" 
              fill="#fff">
            Key Concepts
        </text>
    </rect>
    <section data-narration="Key Concepts" 
            data-topic-id="naive-bayes-algorithm-for-continuous-attributes" 
            style="padding: 20px; border-radius: 10px;">
        <text x="20%" y="20%" 
              text-anchor="start" 
              font-size="16px" 
              fill="#333">Prior Probability: The probability of the target label before considering the features.</text>
        <text x="20%" y="40%" 
              text-anchor="start" 
              font-size="16px" 
              fill="#333">Likelihood: The probability of the feature values given the target label.</text>
        <text x="20%" y="60%" 
              text-anchor="start" 
              font-size="16px" 
              fill="#333">Posterior Probability: The probability of the feature values given the target label.</text>
    </section>
    
    <!--Footer Section-->
    <rect 
        x="0" 
        y="380" 
        width="100%" 
        height="40" 
        style="background-color: #03A9F4; border-radius: 5px; padding: 5px; text-align: center;">
        <animate 
            attributeName="opacity" 
            begin="4s" 
            dur="1s" 
            calcMode="spline" 
            keyTimes="0;1" 
            keySplines="5 2 1 2; 5 2 1 2" 
            fill="freeze" 
            style="opacity:0; opacity:1;" />
        <text x="50%" y="50%" 
              text-anchor="middle" 
              font-size="18px" 
              fill="#fff">
            Contact for more information
        </text>
    </rect>
    <footer style="padding: 20px; border-radius: 10px; background-color: #03A9F4; color: #fff;">
        <text x="20%" y="20%" 
              text-anchor="start" 
              font-size="16px" 
              fill="#fff">Copyright &copy; 2023. All rights reserved.</text>
    </footer>
</svg>