<svg width="420" height="400" data-topic-id="bayesian-learning-101-105">
  <title>Bayesian Learning</title>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2E4053" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="380" height="360" fill="url(#grad)" rx="10"/>

  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="30" fill="#F7F7F7" rx="5" transform="rotate(45, 50, 15)"/>
    <text x="50" y="10" font-size="16" font-family="Arial" fill="#2E4053">Prior Probability</text>
    <text x="5" y="15" font-size="12" font-family="Arial" fill="#F7F7F7">P(H)</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 15" to="45 50 15" dur="2s" begin="-0.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(140, 20)">
    <rect x="0" y="0" width="100" height="30" fill="#F7F7F7" rx="5"/>
    <text x="50" y="10" font-size="16" font-family="Arial" fill="#2E4053">Likelihood</text>
    <text x="5" y="15" font-size="12" font-family="Arial" fill="#F7F7F7">P(D|H)</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 15" to="90 50 15" dur="2s" begin="-0.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(260, 20)">
    <rect x="0" y="0" width="100" height="30" fill="#F7F7F7" rx="5"/>
    <text x="50" y="10" font-size="16" font-family="Arial" fill="#2E4053">Posterior Probability</text>
    <text x="5" y="15" font-size="12" font-family="Arial" fill="#F7F7F7">P(H|D)</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 15" to="135 50 15" dur="2s" begin="-0.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 140)">
    <rect x="0" y="0" width="100" height="30" fill="#F7F7F7" rx="5" transform="rotate(45, 50, 225)"/>
    <text x="50" y="10" font-size="16" font-family="Arial" fill="#2E4053">Prior Probability</text>
    <text x="5" y="15" font-size="12" font-family="Arial" fill="#F7F7F7">P(H)</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 225" to="45 50 225" dur="2s" begin="-0.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(140, 140)">
    <rect x="0" y="0" width="100" height="30" fill="#F7F7F7" rx="5" transform="rotate(90, 50, 225)"/>
    <text x="50" y="10" font-size="16" font-family="Arial" fill="#2E4053">Likelihood</text>
    <text x="5" y="15" font-size="12" font-family="Arial" fill="#F7F7F7">P(D|H)</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 225" to="90 50 225" dur="2s" begin="-0.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(260, 140)">
    <rect x="0" y="0" width="100" height="30" fill="#F7F7F7" rx="5" transform="rotate(135, 50, 225)"/>
    <text x="50" y="10" font-size="16" font-family="Arial" fill="#2E4053">Posterior Probability</text>
    <text x="5" y="15" font-size="12" font-family="Arial" fill="#F7F7F7">P(H|D)</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 225" to="135 50 225" dur="2s" begin="-0.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="380" height="80" fill="#F7F7F7" rx="10"/>
    <text x="50" y="50" font-size="24" font-family="Arial" fill="#2E4053">Bayesian Learning</text>
    <text x="5" y="60" font-size="18" font-family="Arial" fill="#F7F7F7">Update probability of hypothesis based on new data</text>
  </g>

  <g transform="translate(20, 340)">
    <rect x="0" y="0" width="380" height="60" fill="#F7F7F7" rx="10"/>
    <text x="50" y="50" font-size="18" font-family="Arial" fill="#2E4053">Key Concepts</text>
    <text x="5" y="60" font-size="14" font-family="Arial" fill="#F7F7F7">Bayes' theorem, prior probability, likelihood, posterior probability</text>
  </g>

  <g transform="translate(140, 340)">
    <rect x="0" y="0" width="380" height="60" fill="#F7F7F7" rx="10"/>
    <text x="50" y="50" font-size="18" font-family="Arial" fill="#2E4053">Real-World Applications</text>
    <text x="5" y="60" font-size="14" font-family="Arial" fill="#F7F7F7">Image and speech recognition, natural language processing, recommender systems</text>
  </g>

  <g transform="translate(260, 340)">
    <rect x="0" y="0" width="380" height="60" fill="#F7F7F7" rx="10"/>
    <text x="50" y="50" font-size="18" font-family="Arial" fill="#2E4053">Challenge Questions</text>
    <text x="5" y="60" font-size="14" font-family="Arial" fill="#F7F7F7">1. What is the purpose of Bayesian learning?</text>
    <text x="5" y="75" font-size="14" font-family="Arial" fill="#F7F7F7">2. How does Bayes' theorem update the probability of a hypothesis?</text>
  </g>

  <g transform="translate(20, 340)">
    <rect x="0" y="0" width="380" height="60" fill="#F7F7F7" rx="10"/>
    <text x="50" y="50" font-size="18" font-family="Arial" fill="#2E4053">Practice Questions</text>
    <text x="5" y="60" font-size="14" font-family="Arial" fill="#F7F7F7">1. A coin is flipped and lands heads up. What is the likelihood of the coin being heads?</text>
    <text x="5" y="75" font-size="14" font-family="Arial" fill="#F7F7F7">2. A person believes that it will rain tomorrow. What is their prior probability of it raining?</text>
  </g>
</svg>