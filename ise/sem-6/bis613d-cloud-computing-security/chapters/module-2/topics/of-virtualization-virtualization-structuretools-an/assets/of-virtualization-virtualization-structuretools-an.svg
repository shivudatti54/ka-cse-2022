<svg
  width="420"
  height="400"
  data-topic-id="virtualization-structuretools-an"
  viewBox="0 0 420 400"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="overflow:visible;enable-background:new 0 0 420 400;">
  <metadata>
    <title>Virtualization Structure/Tools and Mechanisms</title>
    <description>Animated Educational SVG Diagram: Virtualization Structure/Tools and Mechanisms</description>
  </metadata>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6"/>
      <stop offset="100%" stop-color="#4682B4"/>
    </linearGradient>
  </defs>
  <title>Virtualization Structure/Tools and Mechanisms</title>
  <rect
    x="10"
    y="10"
    width="400"
    height="380"
    fill="url(#grad)"/>
  <g id="section-1">
    <rect
      x="10"
      y="50"
      width="100"
      height="50"
      fill="#F7DC6F"/>
    <text x="20" y="60" font-size="24" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#333333">Hypervisor (Virtual Machine Monitor)</text>
    <text x="20" y="80" font-size="18" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#666666">Manages and allocates resources to VMs</text>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 100 50"
      to="360 100 50"
      dur="10s"
      begin="0s"/>
  </g>
  <g id="section-2">
    <rect
      x="120"
      y="50"
      width="100"
      height="50"
      fill="#F7DC6F"/>
    <text x="130" y="60" font-size="24" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#333333">Virtual Machine</text>
    <text x="130" y="80" font-size="18" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#666666">Isolated environment that runs on top of the hypervisor</text>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 120 50"
      to="360 120 50"
      dur="10s"
      begin="0s"/>
  </g>
  <g id="section-3">
    <rect
      x="220"
      y="50"
      width="100"
      height="50"
      fill="#F7DC6F"/>
    <text x="230" y="60" font-size="24" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#333333">Virtual Network Interface (VNI)</text>
    <text x="230" y="80" font-size="18" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#666666">Connects a VM to a network</text>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 220 50"
      to="360 220 50"
      dur="10s"
      begin="0s"/>
  </g>
  <g id="section-4">
    <rect
      x="320"
      y="50"
      width="100"
      height="50"
      fill="#F7DC6F"/>
    <text x="330" y="60" font-size="24" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#333333">Hardware Virtualization</text>
    <text x="330" y="80" font-size="18" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#666666">Uses physical hardware to create and manage VMs</text>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 320 50"
      to="360 320 50"
      dur="10s"
      begin="0s"/>
  </g>
  <g id="section-5">
    <rect
      x="10"
      y="220"
      width="100"
      height="50"
      fill="#F7DC6F"/>
    <text x="20" y="230" font-size="24" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#333333">Virtualization of CPU/Memory and I/O Devices</text>
    <text x="20" y="250" font-size="18" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#666666">Improves resource utilization and reduces waste</text>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 100 220"
      to="360 100 220"
      dur="10s"
      begin="0s"/>
  </g>
  <g id="section-6">
    <rect
      x="120"
      y="220"
      width="100"
      height="50"
      fill="#F7DC6F"/>
    <text x="130" y="230" font-size="24" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#333333">Software Virtualization</text>
    <text x="130" y="250" font-size="18" font-family="Arial, sans-serif"
          text-anchor="middle" fill="#666666">Uses software components to create and manage VMs</text>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 120 220"
      to="360 120 220"
      dur="10s"
      begin="0s"/>
  </g>
  <rect
    x="10"
    y="380"
    width="400"
    height="20"
    fill="#F7DC6F"/>
  <text x="20" y="390" font-size="24" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#333333">Virtualization Structure/Tools and Mechanisms</text>
  <text x="20" y="410" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#666666">A crucial component of cloud computing</text>
</svg>