<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="textbook-1-chapter-3-31-to-35">
  <title>Textbook 1 Chapter 3 31 To 35</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a68ad" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g id="section-1">
    <rect x="15" y="15" width="300" height="50" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" dur="1s" begin="0s"/>
    <text x="20" y="30" font-size="16" font-family="Arial" fill="#000" data-narration="Definition of Virtualization">
      Virtualization
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#000" data-narration="The process of creating a virtualized environment, where multiple operating systems (OS) or applications run on a single physical host machine.">
      Virtualized Environment
    </text>
  </g>
  <g id="section-2">
    <rect x="15" y="120" width="300" height="50" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" dur="1s" begin="1s"/>
    <text x="20" y="30" font-size="16" font-family="Arial" fill="#000" data-narration="Types of Virtualization">
      Types of Virtualization
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#000" data-narration="Server Virtualization allows multiple virtual machines (VMs) to run on a single physical server. Desktop Virtualization allows multiple desktop environments to run on a single physical machine. Storage Virtualization allows multiple physical storage devices to be presented as a single logical device.">
      Server
      Desktop
      Storage
    </text>
  </g>
  <g id="section-3">
    <rect x="15" y="180" width="300" height="50" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" dur="1s" begin="2s"/>
    <text x="20" y="30" font-size="16" font-family="Arial" fill="#000" data-narration="Benefits of Virtualization">
      Benefits of Virtualization
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#000" data-narration="Increased Resource Utilization, Improved Security, Enhanced Portability.">
      Increased Resource Utilization
      Improved Security
      Enhanced Portability
    </text>
  </g>
  <g id="section-4">
    <rect x="15" y="240" width="300" height="50" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" dur="1s" begin="3s"/>
    <text x="20" y="30" font-size="16" font-family="Arial" fill="#000" data-narration="Types of Virtualization Platforms">
      Types of Virtualization Platforms
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#000" data-narration="VMware vSphere, Microsoft Hyper-V, Amazon Web Services (AWS) EC2, Microsoft Azure Virtual Machines.">
      VMware vSphere
      Microsoft Hyper-V
      Amazon Web Services (AWS) EC2
      Microsoft Azure Virtual Machines
    </text>
  </g>
  <g id="section-5">
    <rect x="15" y="300" width="300" height="50" fill="#fff"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" dur="1s" begin="4s"/>
    <text x="20" y="30" font-size="16" font-family="Arial" fill="#000" data-narration="Cloud Virtualization">
      Cloud Virtualization
    </text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#000" data-narration="Amazon Web Services (AWS) EC2, Microsoft Azure Virtual Machines.">
      Amazon Web Services (AWS) EC2
      Microsoft Azure Virtual Machines
    </text>
  </g>
  <g id="footer">
    <rect x="15" y="360" width="300" height="30" fill="#fff"/>
    <text x="20" y="370" font-size="16" font-family="Arial" fill="#000">Footer</text>
  </g>
  <g id="arrow-markers">
    <line x1="20" y1="40" x2="60" y2="40" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="80" x2="60" y2="80" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="120" x2="60" y2="120" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="160" x2="60" y2="160" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="200" x2="60" y2="200" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="240" x2="60" y2="240" stroke="#000" stroke-width="2"/>
  </g>
</svg>