<svg width="420" height="400" data-topic-id="textbook-1-chapter-1-11-15">
  <style>
    /* Add some basic styling to make the diagram look nicer */
    circle {
      fill: #ADD8E6;
    }
    text {
      font-size: 16px;
    }
    .topic-section {
      margin-bottom: 20px;
    }
  </style>
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <!-- Title -->
  <text x="50%" y="50%" font-size="32px" text-anchor="middle">Cloud Computing</text>
  <!-- Section 1: Cloud Computing Overview -->
  <g class="topic-section" data-narration="Cloud Computing Overview">
    <rect x="20" y="20" width="380" height="120" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="50%" font-size="18px" text-anchor="middle">Definition:</text>
    <text x="50%" y="70%" font-size="18px" text-anchor="middle">Cloud computing is a model for delivering computing services over the internet, where resources such as servers, storage, databases, software, and applications are provided as a service to users on-demand.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50%,0" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 2: Distributed System Models -->
  <g class="topic-section" data-narration="Distributed System Models">
    <rect x="20" y="150" width="380" height="120" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="70%" font-size="18px" text-anchor="middle">Types:</text>
    <text x="50%" y="90%" font-size="18px" text-anchor="middle">Client-server model, Peer-to-peer model, Client-server-pub-sub model.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50%,0" begin="1s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 3: Scalable Computing -->
  <g class="topic-section" data-narration="Scalable Computing">
    <rect x="20" y="280" width="380" height="120" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="110%" font-size="18px" text-anchor="middle">Definition:</text>
    <text x="50%" y="130%" font-size="18px" text-anchor="middle">Scalable computing refers to the ability of a system to automatically increase or decrease resources as needed to match changing demands.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50%,0" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 4: Cloud Computing Example -->
  <g class="topic-section" data-narration="Cloud Computing Example">
    <rect x="20" y="120" width="380" height="120" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="80%" font-size="18px" text-anchor="middle">Example:</text>
    <text x="50%" y="100%" font-size="18px" text-anchor="middle">A company uses a cloud-based email service to provide email, calendar, and collaboration tools to its employees.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50%,0" begin="3s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 5: Distributed System Example -->
  <g class="topic-section" data-narration="Distributed System Example">
    <rect x="20" y="310" width="380" height="120" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="260%" font-size="18px" text-anchor="middle">Example:</text>
    <text x="50%" y="280%" font-size="18px" text-anchor="middle">A social network like Facebook uses a peer-to-peer model to connect users and facilitate communication.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50%,0" begin="4s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Section 6: Scalable Computing Example -->
  <g class="topic-section" data-narration="Scalable Computing Example">
    <rect x="20" y="400" width="380" height="120" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="360%" font-size="18px" text-anchor="middle">Example:</text>
    <text x="50%" y="380%" font-size="18px" text-anchor="middle">A company uses a cloud-based email service to provide email, calendar, and collaboration tools to its employees.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50%,0" begin="5s" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Footer -->
  <text x="50%" y="380%" font-size="18px" text-anchor="middle">Cloud Computing</text>
</svg>