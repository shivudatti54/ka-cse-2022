<svg
   width="420"
   height="400"
   xmlns="http://www.w3.org/2000/svg"
   data-topic-id="cloud-security-architecture"
   viewBox="0 0 420 400"
   style="background: linear-gradient(to bottom, #7A8BD2, #C3E6F5);">
 <title>Textbook 1 Chapter 6 61 To 65</title>
 <rect x="10" y="10" width="400" height="80" fill="#C3E6F5" rx="10"/>
 <rect x="10" y="90" width="400" height="130" fill="#7A8BD2" rx="10"/>
 <g opacity="0" transform="translate(0,150)">
  <rect x="20" y="20" width="380" height="50" fill="#FFC107" rx="10"/>
  <animate attributeName="opacity" begin="0s" dur="3s" repeatCount="indefinite"/>
  <g transform="translate(20,30)">
   <text x="30" y="40" text-anchor="middle" font-size="18" fill="#FFC107" opacity="0" data-narration="Cloud Security Gateways acts as a single point of management for all cloud security controls." style="font-weight: bold;">
    Cloud Security Gateways
   </text>
   <line x1="80" y1="-20" x2="80" y2="60" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="60" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,100)">
   <text x="30" y="120" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Cloud Access Security Brokers (CASBs) provides real-time security monitoring and control of cloud-based applications." style="font-weight: bold;">
    Cloud Access Security Brokers (CASBs)
   </text>
   <line x1="80" y1="-20" x2="80" y2="80" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="80" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,170)">
   <text x="30" y="190" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Cloud Security Information and Event Management (SIEM) Systems collects and analyzes security-related data from various sources." style="font-weight: bold;">
    Cloud Security Information and Event Management (SIEM) Systems
   </text>
   <line x1="80" y1="-20" x2="80" y2="120" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="120" stroke="#FFC107" stroke-width="2"/>
  </g>
 </g>
 <g opacity="0" transform="translate(0,220)">
  <rect x="20" y="20" width="380" height="50" fill="#FFC107" rx="10"/>
  <animate attributeName="opacity" begin="3s" dur="3s" repeatCount="indefinite"/>
  <g transform="translate(20,30)">
   <text x="30" y="40" text-anchor="middle" font-size="18" fill="#FFC107" opacity="0" data-narration="Separate Cloud Environments use different cloud accounts and networks for different applications and data." style="font-weight: bold;">
    Separate Cloud Environments
   </text>
   <line x1="80" y1="-20" x2="80" y2="60" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="60" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,100)">
   <text x="30" y="120" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Implement Least Privilege Access grant minimum necessary permissions to users and services." style="font-weight: bold;">
    Implement Least Privilege Access
   </text>
   <line x1="80" y1="-20" x2="80" y2="80" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="80" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,170)">
   <text x="30" y="190" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Regularly Update and Patch keep cloud security controls and applications up-to-date with the latest security patches." style="font-weight: bold;">
    Regularly Update and Patch
   </text>
   <line x1="80" y1="-20" x2="80" y2="120" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="120" stroke="#FFC107" stroke-width="2"/>
  </g>
 </g>
 <g opacity="0" transform="translate(0,270)">
  <rect x="20" y="20" width="380" height="50" fill="#FFC107" rx="10"/>
  <animate attributeName="opacity" begin="6s" dur="3s" repeatCount="indefinite"/>
  <g transform="translate(20,30)">
   <text x="30" y="40" text-anchor="middle" font-size="18" fill="#FFC107" opacity="0" data-narration="Cloud compliance and governance refer to the processes and procedures in place to ensure that cloud computing resources are used in accordance with organizational policies and regulatory requirements." style="font-weight: bold;">
    Cloud Compliance and Governance
   </text>
   <line x1="80" y1="-20" x2="80" y2="60" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="60" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,100)">
   <text x="30" y="120" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Cloud compliance frameworks standards and guidelines for cloud computing security such as NIST Cloud Computing Security Framework." style="font-weight: bold;">
    Cloud Compliance Frameworks
   </text>
   <line x1="80" y1="-20" x2="80" y2="80" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="80" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,170)">
   <text x="30" y="190" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Cloud governance models frameworks for managing cloud computing resources such as the ITIL Cloud Governance Model." style="font-weight: bold;">
    Cloud Governance Models
   </text>
   <line x1="80" y1="-20" x2="80" y2="120" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="120" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,230)">
   <text x="30" y="250" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Regulatory requirements laws and regulations governing cloud computing such as GDPR and HIPAA." style="font-weight: bold;">
    Regulatory Requirements
   </text>
   <line x1="80" y1="-20" x2="80" y2="180" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="180" stroke="#FFC107" stroke-width="2"/>
  </g>
 </g>
 <g opacity="0" transform="translate(0,330)">
  <rect x="20" y="20" width="380" height="50" fill="#FFC107" rx="10"/>
  <animate attributeName="opacity" begin="9s" dur="3s" repeatCount="indefinite"/>
  <g transform="translate(20,30)">
   <text x="30" y="40" text-anchor="middle" font-size="18" fill="#FFC107" opacity="0" data-narration="Establish cloud compliance frameworks develop and implement frameworks for cloud computing security and governance." style="font-weight: bold;">
    Establish Cloud Compliance Frameworks
   </text>
   <line x1="80" y1="-20" x2="80" y2="60" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="60" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,100)">
   <text x="30" y="120" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Implement cloud governance models frameworks for managing cloud computing resources." style="font-weight: bold;">
    Implement Cloud Governance Models
   </text>
   <line x1="80" y1="-20" x2="80" y2="80" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="80" stroke="#FFC107" stroke-width="2"/>
  </g>
  <g transform="translate(20,170)">
   <text x="30" y="190" text-anchor="middle" font-size="18" fill="#FFC107" data-narration="Regularly review and update cloud compliance and governance frameworks as needed." style="font-weight: bold;">
    Regularly Review and Update
   </text>
   <line x1="80" y1="-20" x2="80" y2="120" stroke="#FFC107" stroke-width="2"/>
   <line x1="220" y1="-20" x2="220" y2="120" stroke="#FFC107" stroke-width="2"/>
  </g>
 </g>
</svg>