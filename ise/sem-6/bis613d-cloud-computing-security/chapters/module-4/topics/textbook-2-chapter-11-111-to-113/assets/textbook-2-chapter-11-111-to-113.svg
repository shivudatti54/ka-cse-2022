<svg width="420" height="400" data-topic-id="cloud-computing-security-11-1-113">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E8F4"/>
      <stop offset="100%" stop-color="#C9E4CA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <g transform="translate(10, 10)">
    <text font-size="24" font-weight="bold" fill="#2C6DA4">Cloud Computing & Security</text>
  </g>
  
  <!-- Section 1: Risks Associated with Cloud Computing -->
  <g transform="translate(20, 50)">
    <rect width="360" height="150" fill="#FFFFFF" rx="10" data-narration="Section 1: Risks Associated with Cloud Computing">
      <text font-size="18" font-weight="bold" fill="#2C6DA4">Risks</text>
      <animate transform="translate(15, 20)" begin="0s" durability="forever" repeatCount="indefinite"/>
      <text x="15" y="30" font-size="14" fill="#2C6DA4">Data Loss, Data Breach, Security Breach, Downtime</text>
    </rect>
  </g>
  
  <!-- Section 2: Cloud Service Provider (CSP) Risk -->
  <g transform="translate(20, 200)">
    <rect width="360" height="150" fill="#FFFFFF" rx="10" data-narration="Section 2: Cloud Service Provider (CSP) Risk">
      <text font-size="18" font-weight="bold" fill="#2C6DA4">CSP Risk</text>
      <animate transform="translate(15, 20)" begin="0s" durability="forever" repeatCount="indefinite"/>
      <text x="15" y="30" font-size="14" fill="#2C6DA4">Reliance on a third-party provider</text>
    </rect>
  </g>
  
  <!-- Section 3: User Error Risk -->
  <g transform="translate(20, 350)">
    <rect width="360" height="150" fill="#FFFFFF" rx="10" data-narration="Section 3: User Error Risk">
      <text font-size="18" font-weight="bold" fill="#2C6DA4">User Error Risk</text>
      <animate transform="translate(15, 20)" begin="0s" durability="forever" repeatCount="indefinite"/>
      <text x="15" y="30" font-size="14" fill="#2C6DA4">Human error, incorrect configuration</text>
    </rect>
  </g>
  
  <!-- Section 4: System Failure Risk -->
  <g transform="translate(20, 500)">
    <rect width="360" height="150" fill="#FFFFFF" rx="10" data-narration="Section 4: System Failure Risk">
      <text font-size="18" font-weight="bold" fill="#2C6DA4">System Failure Risk</text>
      <animate transform="translate(15, 20)" begin="0s" durability="forever" repeatCount="indefinite"/>
      <text x="15" y="30" font-size="14" fill="#2C6DA4">Technical failures, hardware or software issues</text>
    </rect>
  </g>
  
  <!-- Section 5: Privacy Impact Assessment -->
  <g transform="translate(20, 650)">
    <rect width="360" height="150" fill="#FFFFFF" rx="10" data-narration="Section 5: Privacy Impact Assessment">
      <text font-size="18" font-weight="bold" fill="#2C6DA4">Privacy Impact Assessment</text>
      <animate transform="translate(15, 20)" begin="0s" durability="forever" repeatCount="indefinite"/>
      <text x="15" y="30" font-size="14" fill="#2C6DA4">Risk identification, risk assessment, risk mitigation, risk monitoring</text>
    </rect>
  </g>
  
  <!-- Section 6: Data Classification -->
  <g transform="translate(20, 800)">
    <rect width="360" height="150" fill="#FFFFFF" rx="10" data-narration="Section 6: Data Classification">
      <text font-size="18" font-weight="bold" fill="#2C6DA4">Data Classification</text>
      <animate transform="translate(15, 20)" begin="0s" durability="forever" repeatCount="indefinite"/>
      <text x="15" y="30" font-size="14" fill="#2C6DA4">Classify data based on sensitivity and importance</text>
    </rect>
  </g>
  
  <!-- Footer at bottom -->
  <g transform="translate(10, 350)">
    <rect width="400" height="50" fill="#FFFFFF" rx="10"/>
    <text font-size="14" font-weight="bold" fill="#2C6DA4">Cloud Computing & Security</text>
  </g>
  
  <!-- Arrow markers for connections -->
  <path fill="#FFFFFF" stroke="#2C6DA4" stroke-width="2" d="M 20 20 L 150 150"/>
  <path fill="#FFFFFF" stroke="#2C6DA4" stroke-width="2" d="M 150 150 L 300 100"/>
</svg>