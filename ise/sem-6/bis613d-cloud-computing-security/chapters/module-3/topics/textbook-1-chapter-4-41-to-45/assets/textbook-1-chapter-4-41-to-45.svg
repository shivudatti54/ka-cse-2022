<svg width="420" height="400" data-topic-id="cloud-computing-security-module-cloud-platform-architecture-over-virtualized-datacenters-chapter-4-1-to-4-5">
    <desc>Cloud Computing & Security</desc>
    <title>Cloud Computing Architecture and Virtualized Datacenters</title>
    <rect x="0" y="0" width="420" height="400" fill="linearGradient(x1="0", y1="0", x2="0", y2="1", stop-stop="rgb(130, 130, 255, 1) 0%, rgb(100, 150, 250, 1) 100%)" rx="5" />
    <animate attributeName="opacity" from="1" to="0.5" dur="5000" begin="0s" repeatCount="indefinite" />
    <text x="20" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#fff" data-narration="Cloud computing architecture refers to the design and organization of cloud computing systems, including the hardware, software, and networking components." style="text-decoration: underline;" onclick="location.href='#'" />
    <text x="20" y="50" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#fff" data-narration="The key components of cloud computing architecture are Infrastructure as a Service (IaaS), Platform as a Service (PaaS), and Software as a Service (SaaS)." style="text-decoration: underline;" onclick="location.href='#'" />
    <rect x="20" y="100" width="380" height="50" fill="linearGradient(x1="0", y1="0", x2="0", y2="1", stop-stop="rgb(130, 130, 255, 1) 0%, rgb(100, 150, 250, 1) 100%)" rx="5" />
    <animate attributeName="opacity" from="1" to="0.5" dur="5000" begin="0s" repeatCount="indefinite" />
    <text x="50" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#fff" data-narration="IaaS provides virtualized computing resources, such as servers, storage, and networking. The benefits of IaaS include scalability, flexibility, and security." style="text-decoration: underline;" onclick="location.href='#'" />
    <text x="20" y="200" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#fff" data-narration="PaaS provides a platform for developing, running, and managing applications without the need for underlying infrastructure. The benefits of PaaS include scalability, flexibility, and security." style="text-decoration: underline;" onclick="location.href='#'" />
    <text x="20" y="250" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#fff" data-narration="SaaS provides software applications over the internet, eliminating the need for local installation and maintenance. The benefits of SaaS include scalability, flexibility, and security." style="text-decoration: underline;" onclick="location.href='#'" />
    <rect x="20" y="300" width="380" height="50" fill="linearGradient(x1="0", y1="0", x2="0", y2="1", stop-stop="rgb(130, 130, 255, 1) 0%, rgb(100, 150, 250, 1) 100%)" rx="5" />
    <animate attributeName="opacity" from="1" to="0.5" dur="5000" begin="0s" repeatCount="indefinite" />
    <text x="50" y="350" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#fff" data-narration="Virtualized datacenters refer to the use of virtualization technology to create multiple virtualized environments within a physical datacenter. The benefits of virtualized datacenters include increased efficiency, improved flexibility, and enhanced security." style="text-decoration: underline;" onclick="location.href='#'" />
    <text x="20" y="400" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#fff" data-narration="Hypervisors create and manage virtualized environments, while virtual machines are self-contained operating environments." style="text-decoration: underline;" onclick="location.href='#'" />
    <rect x="20" y="450" width="380" height="20" fill="linearGradient(x1="0", y1="0", x2="0", y2="1", stop-stop="rgb(130, 130, 255, 1) 0%, rgb(100, 150, 250, 1) 100%)" rx="5" />
    <animate attributeName="opacity" from="1" to="0.5" dur="5000" begin="0s" repeatCount="indefinite" />
    <text x="20" y="470" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#fff" data-narration="A company uses a cloud computing architecture to provide its employees with access to email, productivity software, and other applications through a web-based interface. The benefits include scalability, flexibility, and security." style="text-decoration: underline;" onclick="location.href='#'" />
