<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="access-methods">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#C62828"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3949AB"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title (0.3s) -->
  <g data-narration="User Research Methods are systematic approaches to study target users and their requirements. Methods are classified along two dimensions: qualitative versus quantitative, and attitudinal versus behavioral." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#283593">User Research Methods</text>
    <line x1="80" y1="28" x2="340" y2="28" stroke="#5C6BC0" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="210" y="42" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Classification Framework and Core Methods</text>
  </g>

  <!-- Group 2: Two-Dimensional Classification (1.5s) -->
  <g data-narration="Research methods are classified on two axes. The first axis is Qualitative versus Quantitative: qualitative asks why and how using small samples, while quantitative asks what and how many using large samples. The second axis is Attitudinal versus Behavioral: attitudinal studies what people say, behavioral observes what people do." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="15" y="62" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Research Classification Grid</text>
    <!-- Axis labels -->
    <text x="210" y="76" text-anchor="middle" font-family="Arial" font-size="8" fill="#283593">QUALITATIVE (Why? How?)</text>
    <line x1="110" y1="80" x2="310" y2="80" stroke="#3949AB" stroke-width="1" marker-end="url(#arrowIndigo)"/>
    <text x="210" y="166" text-anchor="middle" font-family="Arial" font-size="8" fill="#283593">QUANTITATIVE (What? How many?)</text>
    <!-- Vertical axis -->
    <text x="58" y="102" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">ATTITUDINAL</text>
    <text x="58" y="110" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">(What people say)</text>
    <text x="362" y="102" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">BEHAVIORAL</text>
    <text x="362" y="110" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">(What people do)</text>
    <!-- Quadrant 1: Qual + Attitudinal -->
    <rect x="110" y="84" width="100" height="36" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.2" rx="4"/>
    <text x="160" y="98" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Interviews</text>
    <text x="160" y="110" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">Focus Groups</text>
    <!-- Quadrant 2: Qual + Behavioral -->
    <rect x="215" y="84" width="100" height="36" fill="#E0F2F1" stroke="#00695C" stroke-width="1.2" rx="4"/>
    <text x="265" y="98" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Usability Testing</text>
    <text x="265" y="110" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">Field Studies</text>
    <!-- Quadrant 3: Quant + Attitudinal -->
    <rect x="110" y="124" width="100" height="36" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2" rx="4"/>
    <text x="160" y="138" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">Surveys</text>
    <text x="160" y="150" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">Questionnaires</text>
    <!-- Quadrant 4: Quant + Behavioral -->
    <rect x="215" y="124" width="100" height="36" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2" rx="4"/>
    <text x="265" y="138" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Analytics</text>
    <text x="265" y="150" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">A/B Testing</text>
    <!-- Animated scanning highlight -->
    <rect x="110" y="84" width="100" height="36" fill="#3949AB" rx="4" opacity="0">
      <animate attributeName="opacity" values="0;0.15;0;0;0;0;0;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="215" y="84" width="100" height="36" fill="#00695C" rx="4" opacity="0">
      <animate attributeName="opacity" values="0;0;0.15;0;0;0;0;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="110" y="124" width="100" height="36" fill="#E65100" rx="4" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.15;0;0;0;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="215" y="124" width="100" height="36" fill="#C62828" rx="4" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0.15;0;0;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Group 3: Core Methods Detail (3.0s) -->
  <g data-narration="The six core research methods are User Interviews for understanding perspectives, Surveys for large-scale data collection, Usability Testing for observing task completion, Contextual Inquiry for real-world observation, Card Sorting for information architecture, and A/B Testing for comparing design alternatives." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="15" y="186" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Core Methods</text>
    <!-- Method 1: Interviews -->
    <rect x="15" y="192" width="120" height="30" fill="#3949AB" rx="5"/>
    <text x="75" y="204" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">User Interviews</text>
    <text x="75" y="214" text-anchor="middle" font-family="monospace" font-size="6" fill="#C5CAE9">1-on-1 conversations</text>
    <!-- Method 2: Surveys -->
    <rect x="145" y="192" width="120" height="30" fill="#00695C" rx="5"/>
    <text x="205" y="204" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Surveys</text>
    <text x="205" y="214" text-anchor="middle" font-family="monospace" font-size="6" fill="#B2DFDB">Large-scale data</text>
    <!-- Method 3: Usability Testing -->
    <rect x="275" y="192" width="130" height="30" fill="#E65100" rx="5"/>
    <text x="340" y="204" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Usability Testing</text>
    <text x="340" y="214" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFE0B2">Task observation</text>
    <!-- Method 4: Contextual Inquiry -->
    <rect x="15" y="226" width="120" height="30" fill="#C62828" rx="5"/>
    <text x="75" y="238" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Contextual Inquiry</text>
    <text x="75" y="248" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFCDD2">Natural environment</text>
    <!-- Method 5: Card Sorting -->
    <rect x="145" y="226" width="120" height="30" fill="#3949AB" rx="5"/>
    <text x="205" y="238" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Card Sorting</text>
    <text x="205" y="248" text-anchor="middle" font-family="monospace" font-size="6" fill="#C5CAE9">Info architecture</text>
    <!-- Method 6: A/B Testing -->
    <rect x="275" y="226" width="130" height="30" fill="#00695C" rx="5"/>
    <text x="340" y="238" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">A/B Testing</text>
    <text x="340" y="248" text-anchor="middle" font-family="monospace" font-size="6" fill="#B2DFDB">Statistical comparison</text>
  </g>

  <!-- Group 4: Design Thinking Integration (4.5s) -->
  <g data-narration="User research integrates into the Design Thinking process across five phases: Empathize through research, Define by synthesizing findings, Ideate to brainstorm solutions, Prototype to create representations, and Test to validate with users. The process iterates continuously." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="15" y="272" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Design Thinking Integration</text>
    <!-- Phase boxes connected with arrows -->
    <rect x="15" y="278" width="70" height="28" fill="#3949AB" rx="4"/>
    <text x="50" y="290" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">EMPATHIZE</text>
    <text x="50" y="300" text-anchor="middle" font-family="Arial" font-size="6" fill="#C5CAE9">Research</text>
    <line x1="85" y1="292" x2="95" y2="292" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <rect x="98" y="278" width="65" height="28" fill="#00695C" rx="4"/>
    <text x="130" y="290" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">DEFINE</text>
    <text x="130" y="300" text-anchor="middle" font-family="Arial" font-size="6" fill="#B2DFDB">Synthesize</text>
    <line x1="163" y1="292" x2="173" y2="292" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <rect x="176" y="278" width="65" height="28" fill="#E65100" rx="4"/>
    <text x="208" y="290" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">IDEATE</text>
    <text x="208" y="300" text-anchor="middle" font-family="Arial" font-size="6" fill="#FFE0B2">Brainstorm</text>
    <line x1="241" y1="292" x2="251" y2="292" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <rect x="254" y="278" width="70" height="28" fill="#C62828" rx="4"/>
    <text x="289" y="290" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">PROTOTYPE</text>
    <text x="289" y="300" text-anchor="middle" font-family="Arial" font-size="6" fill="#FFCDD2">Build</text>
    <line x1="324" y1="292" x2="334" y2="292" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <rect x="337" y="278" width="68" height="28" fill="#3949AB" rx="4"/>
    <text x="371" y="290" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">TEST</text>
    <text x="371" y="300" text-anchor="middle" font-family="Arial" font-size="6" fill="#C5CAE9">Validate</text>
    <!-- Iterate arrow (curved back) -->
    <path d="M371,306 Q371,318 210,318 Q50,318 50,306" fill="none" stroke="#C62828" stroke-width="1.2" stroke-dasharray="4,2">
      <animate attributeName="stroke-dashoffset" values="24;0" dur="1.5s" begin="5s" repeatCount="indefinite"/>
    </path>
    <text x="210" y="316" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">ITERATE</text>
  </g>

  <!-- Group 5: Sample Size Guidelines (6.0s) -->
  <g data-narration="Sample size guidelines vary by method. For qualitative usability testing, Nielsen's law states 5 users find 85 percent of usability problems. Qualitative studies need 5 to 8 participants per segment, while quantitative studies need a minimum of 30 to 50 participants for statistical significance." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="15" y="338" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Sample Size Guidelines</text>
    <!-- Usability test: 5 users -->
    <rect x="15" y="344" width="125" height="22" fill="#E0F2F1" stroke="#00695C" stroke-width="1.2" rx="3"/>
    <text x="77" y="353" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C" font-weight="bold">Usability Testing</text>
    <text x="77" y="362" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">5 users = 85% issues</text>
    <!-- Qualitative: 5-8 per segment -->
    <rect x="148" y="344" width="125" height="22" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.2" rx="3"/>
    <text x="210" y="353" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB" font-weight="bold">Qualitative Studies</text>
    <text x="210" y="362" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">5-8 per segment</text>
    <!-- Quantitative: 30-50 min -->
    <rect x="281" y="344" width="125" height="22" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2" rx="3"/>
    <text x="343" y="353" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" font-weight="bold">Quantitative Studies</text>
    <text x="343" y="362" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">30-50 minimum</text>
  </g>

  <!-- Group 6: Ethical Principles (7.5s) -->
  <g data-narration="Ethical considerations are crucial in user research. Key principles include informed consent where participants understand and agree to the research, privacy and confidentiality to protect participant data, the right to withdraw at any time, minimization of harm, and transparency about research purposes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="15" y="381" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Ethical Principles</text>
    <rect x="15" y="385" width="78" height="12" fill="#C62828" rx="6"/>
    <text x="54" y="394" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white" font-weight="bold">Informed Consent</text>
    <rect x="97" y="385" width="68" height="12" fill="#3949AB" rx="6"/>
    <text x="131" y="394" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white" font-weight="bold">Privacy</text>
    <rect x="169" y="385" width="78" height="12" fill="#00695C" rx="6"/>
    <text x="208" y="394" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white" font-weight="bold">Right to Withdraw</text>
    <rect x="251" y="385" width="78" height="12" fill="#E65100" rx="6"/>
    <text x="290" y="394" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white" font-weight="bold">Minimize Harm</text>
    <rect x="333" y="385" width="72" height="12" fill="#C62828" rx="6"/>
    <text x="369" y="394" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white" font-weight="bold">Transparency</text>
  </g>
</svg>