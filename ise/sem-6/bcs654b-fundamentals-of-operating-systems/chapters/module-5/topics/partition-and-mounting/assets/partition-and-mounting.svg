<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="partition-and-mounting">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title (0.3s) -->
  <g data-narration="Partitional clustering divides data into k non-overlapping clusters. K-Means is the most popular partitional clustering algorithm, using centroids to iteratively assign and refine cluster memberships." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="26" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Partitional Clustering: K-Means</text>
    <line x1="70" y1="32" x2="350" y2="32" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="210" y="44" text-anchor="middle" font-family="Arial" font-size="8" fill="#5C6BC0">Unsupervised learning: group similar data points into k clusters</text>
  </g>

  <!-- Group 2: K-Means Concept, scatter plot with centroids (1.5s) -->
  <g data-narration="K-Means assigns each data point to the nearest centroid, then recalculates centroids as the mean of assigned points. The objective is to minimize the Within-Cluster Sum of Squares or WCSS." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="15" y="62" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Cluster Visualization (k=3)</text>

    <!-- Cluster 1 (indigo) points -->
    <circle cx="50" cy="95" r="4" fill="#3949AB" opacity="0.7"/>
    <circle cx="65" cy="85" r="4" fill="#3949AB" opacity="0.7"/>
    <circle cx="55" cy="110" r="4" fill="#3949AB" opacity="0.7"/>
    <circle cx="72" cy="100" r="4" fill="#3949AB" opacity="0.7"/>
    <circle cx="40" cy="102" r="4" fill="#3949AB" opacity="0.7"/>
    <!-- Centroid 1 -->
    <rect x="52" y="93" width="10" height="10" fill="#1A237E" stroke="white" stroke-width="1.5" transform="rotate(45,57,98)"/>
    <text x="57" y="125" text-anchor="middle" font-family="Arial" font-size="7" fill="#1A237E">C1</text>

    <!-- Cluster 2 (teal) points -->
    <circle cx="135" cy="75" r="4" fill="#00695C" opacity="0.7"/>
    <circle cx="150" cy="85" r="4" fill="#00695C" opacity="0.7"/>
    <circle cx="125" cy="90" r="4" fill="#00695C" opacity="0.7"/>
    <circle cx="145" cy="68" r="4" fill="#00695C" opacity="0.7"/>
    <circle cx="155" cy="95" r="4" fill="#00695C" opacity="0.7"/>
    <!-- Centroid 2 -->
    <rect x="137" y="78" width="10" height="10" fill="#004D40" stroke="white" stroke-width="1.5" transform="rotate(45,142,83)"/>
    <text x="142" y="110" text-anchor="middle" font-family="Arial" font-size="7" fill="#004D40">C2</text>

    <!-- Cluster 3 (orange) points -->
    <circle cx="105" cy="120" r="4" fill="#E65100" opacity="0.7"/>
    <circle cx="120" cy="130" r="4" fill="#E65100" opacity="0.7"/>
    <circle cx="90" cy="130" r="4" fill="#E65100" opacity="0.7"/>
    <circle cx="110" cy="138" r="4" fill="#E65100" opacity="0.7"/>
    <!-- Centroid 3 -->
    <rect x="101" y="123" width="10" height="10" fill="#BF360C" stroke="white" stroke-width="1.5" transform="rotate(45,106,128)"/>
    <text x="106" y="152" text-anchor="middle" font-family="Arial" font-size="7" fill="#BF360C">C3</text>

    <!-- Legend -->
    <rect x="180" y="66" width="100" height="40" fill="white" stroke="#3949AB" stroke-width="1" rx="4" opacity="0.9"/>
    <circle cx="192" cy="78" r="3" fill="#5C6BC0"/>
    <text x="200" y="81" font-family="Arial" font-size="7" fill="#283593">Data points</text>
    <rect x="188" y="88" width="7" height="7" fill="#1A237E" stroke="white" stroke-width="1" transform="rotate(45,191.5,91.5)"/>
    <text x="200" y="96" font-family="Arial" font-size="7" fill="#283593">Centroids (mean)</text>

    <!-- WCSS formula -->
    <rect x="180" y="112" width="120" height="22" fill="#E8EAF6" stroke="#3949AB" stroke-width="1" rx="3"/>
    <text x="240" y="123" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">WCSS = Sum(dist(x, c))^2</text>
    <text x="240" y="132" text-anchor="middle" font-family="Arial" font-size="6" fill="#5C6BC0">Objective: minimize WCSS</text>
  </g>

  <!-- Group 3: Algorithm Steps (3.0s) -->
  <g data-narration="The K-Means algorithm has three main steps: first, initialize k centroids randomly or using K-Means++. Second, assign each data point to the nearest centroid. Third, update centroids by computing the mean of assigned points. Repeat until convergence." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="168" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">K-Means Algorithm Steps (Lloyd's Algorithm)</text>

    <!-- Step 1: Initialize -->
    <rect x="15" y="176" width="90" height="36" fill="white" stroke="#00695C" stroke-width="1.5" rx="5"/>
    <rect x="15" y="176" width="90" height="14" fill="#00695C" rx="5"/>
    <rect x="15" y="185" width="90" height="5" fill="#00695C"/>
    <text x="60" y="187" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">1. Initialize</text>
    <text x="60" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Choose k initial</text>
    <text x="60" y="208" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">centroids</text>

    <!-- Arrow -->
    <line x1="108" y1="194" x2="120" y2="194" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Step 2: Assign -->
    <rect x="125" y="176" width="90" height="36" fill="white" stroke="#00695C" stroke-width="1.5" rx="5"/>
    <rect x="125" y="176" width="90" height="14" fill="#00695C" rx="5"/>
    <rect x="125" y="185" width="90" height="5" fill="#00695C"/>
    <text x="170" y="187" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">2. Assign</text>
    <text x="170" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Each point to</text>
    <text x="170" y="208" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">nearest centroid</text>

    <!-- Arrow -->
    <line x1="218" y1="194" x2="230" y2="194" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Step 3: Update -->
    <rect x="235" y="176" width="90" height="36" fill="white" stroke="#00695C" stroke-width="1.5" rx="5"/>
    <rect x="235" y="176" width="90" height="14" fill="#00695C" rx="5"/>
    <rect x="235" y="185" width="90" height="5" fill="#00695C"/>
    <text x="280" y="187" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">3. Update</text>
    <text x="280" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Recalculate</text>
    <text x="280" y="208" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">centroid means</text>

    <!-- Loop arrow back from Update to Assign -->
    <path d="M280,214 L280,222 L170,222 L170,214" fill="none" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <text x="225" y="231" text-anchor="middle" font-family="Arial" font-size="6" font-style="italic" fill="#00695C">Repeat until convergence</text>

    <!-- Converge box -->
    <rect x="340" y="180" width="70" height="28" fill="#E0F2F1" stroke="#00695C" stroke-width="1" rx="4" stroke-dasharray="3,2"/>
    <text x="375" y="192" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#00695C">Stop when:</text>
    <text x="375" y="202" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C">centroids stable</text>
  </g>

  <!-- Group 4: Elbow Method (4.5s) -->
  <g data-narration="The Elbow Method helps choose the optimal number of clusters k. Plot WCSS against k values. The elbow point, where the rate of decrease sharply changes, indicates the best k. After this point, adding clusters gives diminishing returns." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="15" y="252" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Elbow Method (Choosing k)</text>

    <!-- Chart axes -->
    <line x1="30" y1="260" x2="30" y2="320" stroke="#E65100" stroke-width="1.5"/>
    <line x1="30" y1="320" x2="170" y2="320" stroke="#E65100" stroke-width="1.5"/>
    <text x="18" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" transform="rotate(-90,18,290)">WCSS</text>
    <text x="100" y="332" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">k values</text>

    <!-- Data points on curve -->
    <circle cx="42" cy="264" r="3" fill="#E65100"/>
    <circle cx="62" cy="278" r="3" fill="#E65100"/>
    <circle cx="82" cy="296" r="3" fill="#BF360C"/>
    <circle cx="102" cy="304" r="3" fill="#E65100"/>
    <circle cx="122" cy="308" r="3" fill="#E65100"/>
    <circle cx="142" cy="312" r="3" fill="#E65100"/>
    <circle cx="162" cy="314" r="3" fill="#E65100"/>

    <!-- Curve connecting points -->
    <polyline points="42,264 62,278 82,296 102,304 122,308 142,312 162,314" fill="none" stroke="#E65100" stroke-width="1.5"/>

    <!-- Elbow indicator -->
    <line x1="82" y1="296" x2="82" y2="324" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="82" y="332" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">k=3</text>
    <text x="82" y="268" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Elbow</text>
    <path d="M72,274 Q78,282 82,296" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- k-axis labels -->
    <text x="42" y="328" text-anchor="middle" font-family="monospace" font-size="6" fill="#BF360C">1</text>
    <text x="62" y="328" text-anchor="middle" font-family="monospace" font-size="6" fill="#BF360C">2</text>
    <text x="102" y="328" text-anchor="middle" font-family="monospace" font-size="6" fill="#BF360C">4</text>
    <text x="122" y="328" text-anchor="middle" font-family="monospace" font-size="6" fill="#BF360C">5</text>
    <text x="142" y="328" text-anchor="middle" font-family="monospace" font-size="6" fill="#BF360C">6</text>
    <text x="162" y="328" text-anchor="middle" font-family="monospace" font-size="6" fill="#BF360C">7</text>
  </g>

  <!-- Group 5: K-Means++ Initialization (6.0s) -->
  <g data-narration="K-Means++ improves initialization by spreading out initial centroids. It picks the first centroid randomly, then selects subsequent centroids with probability proportional to the squared distance from the nearest existing centroid. This leads to faster convergence and better results." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="252" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">K-Means++ Initialization</text>

    <!-- Step boxes -->
    <rect x="195" y="258" width="215" height="16" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="3"/>
    <text x="200" y="269" font-family="Arial" font-size="7" fill="#C62828">1. Pick first centroid randomly from data</text>

    <rect x="195" y="278" width="215" height="16" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="3"/>
    <text x="200" y="289" font-family="Arial" font-size="7" fill="#C62828">2. Compute D(x)^2 to nearest chosen centroid</text>

    <rect x="195" y="298" width="215" height="16" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="3"/>
    <text x="200" y="309" font-family="Arial" font-size="7" fill="#C62828">3. Select next centroid with prob ~ D(x)^2</text>

    <rect x="195" y="318" width="215" height="16" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="3"/>
    <text x="200" y="329" font-family="Arial" font-size="7" fill="#C62828">4. Repeat 2-3 until k centroids chosen</text>

    <!-- Benefit callout -->
    <rect x="195" y="338" width="215" height="14" fill="#C62828" rx="3"/>
    <text x="302" y="348" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">Faster convergence + better clusters</text>
  </g>

  <!-- Group 6: Advantages & Limitations (7.5s) -->
  <g data-narration="K-Means advantages include simplicity, speed with O of n k i d complexity, and guaranteed convergence. Its limitations are sensitivity to initial centroids, the need to pre-specify k, vulnerability to outliers, assumption of spherical clusters, and unsuitability for categorical data." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="210" y="366" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Advantages vs Limitations</text>

    <!-- Advantages -->
    <rect x="15" y="372" width="190" height="24" fill="white" stroke="#00695C" stroke-width="1" rx="4"/>
    <rect x="15" y="372" width="12" height="24" fill="#00695C" rx="4"/>
    <rect x="22" y="372" width="5" height="24" fill="#00695C"/>
    <text x="18" y="387" text-anchor="middle" font-family="Arial" font-size="10" fill="white">+</text>
    <text x="34" y="382" font-family="Arial" font-size="7" fill="#00695C">Simple, fast O(nkid), scalable</text>
    <text x="34" y="392" font-family="Arial" font-size="7" fill="#00695C">Guaranteed convergence to local min</text>

    <!-- Limitations -->
    <rect x="215" y="372" width="195" height="24" fill="white" stroke="#C62828" stroke-width="1" rx="4"/>
    <rect x="215" y="372" width="12" height="24" fill="#C62828" rx="4"/>
    <rect x="222" y="372" width="5" height="24" fill="#C62828"/>
    <text x="218" y="387" text-anchor="middle" font-family="Arial" font-size="10" fill="white">-</text>
    <text x="234" y="382" font-family="Arial" font-size="7" fill="#C62828">Must pre-specify k, outlier-sensitive</text>
    <text x="234" y="392" font-family="Arial" font-size="7" fill="#C62828">Spherical clusters only, not for categorical</text>
  </g>
</svg>