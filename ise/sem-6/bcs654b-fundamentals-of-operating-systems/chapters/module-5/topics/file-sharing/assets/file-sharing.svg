<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="file-sharing">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Threat Intelligence Sharing Lifecycle</text>

  <!-- ===== Group 1: Analyze Malware (0.3s) ===== -->
  <g data-narration="Step 1: Malware Analysis. Analysts perform static, dynamic, and reverse engineering analysis to uncover artifacts such as file hashes, suspicious IPs, registry keys, and API calls." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <!-- Box -->
    <rect x="30" y="50" width="160" height="52" rx="8" fill="#3949AB"/>
    <text x="110" y="70" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">1. Analyze Malware</text>
    <text x="110" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">Static / Dynamic / RE</text>
    <!-- Magnifying glass icon -->
    <circle cx="55" cy="74" r="7" fill="none" stroke="#C5CAE9" stroke-width="1.5"/>
    <line x1="60" y1="79" x2="65" y2="84" stroke="#C5CAE9" stroke-width="1.5"/>
    <!-- Arrow down -->
    <line x1="110" y1="102" x2="110" y2="128" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- ===== Group 2: Extract IOCs & TTPs (1.5s) ===== -->
  <g data-narration="Step 2: Extract IOCs and TTPs. Raw artifacts discovered during analysis are identified as Indicators of Compromise (hashes, IPs, domains) and mapped to adversary Tactics, Techniques, and Procedures using the MITRE ATT&CK framework." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Box -->
    <rect x="30" y="132" width="160" height="52" rx="8" fill="#00695C"/>
    <text x="110" y="152" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">2. Extract IOCs &amp; TTPs</text>
    <text x="110" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#B2DFDB">Hashes, IPs, ATT&amp;CK</text>
    <!-- Shield icon -->
    <path d="M52,148 L52,158 Q52,165 58,168 L52,168 Q46,165 46,158 L46,148 Z" fill="none" stroke="#B2DFDB" stroke-width="1.2"/>
    <!-- Arrow right -->
    <line x1="190" y1="158" x2="226" y2="158" stroke="#00695C" stroke-width="2" marker-end="url(#arrowTeal)"/>
  </g>

  <!-- ===== Group 3: Structure as STIX (3.0s) ===== -->
  <g data-narration="Step 3: Structure Data using STIX. The extracted indicators and techniques are packaged into Structured Threat Information eXpression (STIX) format, a standardized JSON-based language that represents indicators, campaigns, threat actors, and courses of action." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Box -->
    <rect x="230" y="132" width="160" height="52" rx="8" fill="#E65100"/>
    <text x="310" y="152" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">3. Structure (STIX)</text>
    <text x="310" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFE0B2">JSON format, schema</text>
    <!-- Document icon -->
    <rect x="252" y="144" width="12" height="15" rx="1" fill="none" stroke="#FFE0B2" stroke-width="1.2"/>
    <line x1="255" y1="149" x2="261" y2="149" stroke="#FFE0B2" stroke-width="0.8"/>
    <line x1="255" y1="152" x2="261" y2="152" stroke="#FFE0B2" stroke-width="0.8"/>
    <line x1="255" y1="155" x2="259" y2="155" stroke="#FFE0B2" stroke-width="0.8"/>
    <!-- Arrow down -->
    <line x1="310" y1="184" x2="310" y2="210" stroke="#E65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- ===== Group 4: Share via TAXII / ISAC (4.5s) ===== -->
  <g data-narration="Step 4: Share via TAXII and ISACs. The structured STIX packages are distributed through TAXII (Trusted Automated eXchange of Intelligence Information) servers or shared within ISACs (Information Sharing and Analysis Centers), with appropriate TLP labels controlling dissemination." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <!-- Box -->
    <rect x="230" y="214" width="160" height="52" rx="8" fill="#C62828"/>
    <text x="310" y="234" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">4. Share (TAXII/ISAC)</text>
    <text x="310" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFCDD2">TLP labels, feeds</text>
    <!-- Network icon -->
    <circle cx="253" cy="236" r="3" fill="#FFCDD2"/>
    <circle cx="262" cy="228" r="3" fill="#FFCDD2"/>
    <circle cx="262" cy="244" r="3" fill="#FFCDD2"/>
    <line x1="253" y1="236" x2="262" y2="228" stroke="#FFCDD2" stroke-width="0.8"/>
    <line x1="253" y1="236" x2="262" y2="244" stroke="#FFCDD2" stroke-width="0.8"/>
    <!-- Arrow left -->
    <line x1="230" y1="240" x2="194" y2="240" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)"/>
  </g>

  <!-- ===== Group 5: Consume & Apply (6.0s) ===== -->
  <g data-narration="Step 5: Consume and Apply Intelligence. Consumer organizations ingest the shared STIX data into their SIEM, firewalls, and EDR tools. IOCs are automatically blocked, while TTPs are used by threat hunters to proactively search for similar attacks in their networks." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <!-- Box -->
    <rect x="30" y="214" width="160" height="52" rx="8" fill="#3949AB"/>
    <text x="110" y="234" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">5. Consume &amp; Apply</text>
    <text x="110" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">SIEM, Firewall, EDR</text>
    <!-- Gear icon -->
    <circle cx="55" cy="238" r="7" fill="none" stroke="#C5CAE9" stroke-width="1.5"/>
    <circle cx="55" cy="238" r="3" fill="none" stroke="#C5CAE9" stroke-width="1"/>
    <!-- Arrow down -->
    <line x1="110" y1="266" x2="110" y2="292" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- ===== Group 6: Feedback & TLP Legend (7.5s) ===== -->
  <g data-narration="Step 6: Feedback and Enrichment Loop. Consumers provide feedback and additional data, enriching the original intelligence. The Traffic Light Protocol (TLP) governs dissemination: RED means no disclosure beyond recipients, AMBER limits to the organization, GREEN allows community sharing, and CLEAR has no restrictions." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Feedback box -->
    <rect x="30" y="296" width="160" height="42" rx="8" fill="#00695C"/>
    <text x="110" y="314" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">6. Feedback &amp; Enrich</text>
    <text x="110" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#B2DFDB">Virtuous cycle</text>
    <!-- Feedback arrow curving back up to step 1 -->
    <path d="M30,317 Q10,317 10,200 Q10,70 30,70" fill="none" stroke="#00695C" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowTeal)"/>

    <!-- TLP Legend -->
    <rect x="230" y="278" width="160" height="94" rx="8" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="1"/>
    <text x="310" y="296" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Traffic Light Protocol</text>
    <!-- TLP:RED -->
    <circle cx="248" cy="312" r="5" fill="#C62828"/>
    <text x="260" y="315" font-family="monospace" font-size="9" fill="#C62828">RED</text>
    <text x="295" y="315" font-family="Arial" font-size="8" fill="#424242">No disclosure</text>
    <!-- TLP:AMBER -->
    <circle cx="248" cy="328" r="5" fill="#FF8F00"/>
    <text x="260" y="331" font-family="monospace" font-size="9" fill="#E65100">AMBER</text>
    <text x="305" y="331" font-family="Arial" font-size="8" fill="#424242">Org only</text>
    <!-- TLP:GREEN -->
    <circle cx="248" cy="344" r="5" fill="#2E7D32"/>
    <text x="260" y="347" font-family="monospace" font-size="9" fill="#2E7D32">GREEN</text>
    <text x="305" y="347" font-family="Arial" font-size="8" fill="#424242">Community</text>
    <!-- TLP:CLEAR -->
    <circle cx="248" cy="360" r="5" fill="white" stroke="#616161" stroke-width="1"/>
    <text x="260" y="363" font-family="monospace" font-size="9" fill="#616161">CLEAR</text>
    <text x="305" y="363" font-family="Arial" font-size="8" fill="#424242">No limits</text>
  </g>
</svg>
