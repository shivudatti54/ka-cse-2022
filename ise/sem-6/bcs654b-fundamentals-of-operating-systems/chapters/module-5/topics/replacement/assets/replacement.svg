<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="replacement">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#3949AB"/>
    </linearGradient>
    <linearGradient id="victimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF5350"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
    <linearGradient id="newPageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="algoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#F57C00"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- GROUP 1: Title and reference string (0.3s) -->
  <g data-narration="A page replacement algorithm selects which page to evict from memory when no free frames are available. We trace through reference string 7, 0, 1, 2, 0, 3 with 3 frames." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>

    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Page Replacement Algorithms</text>
    <line x1="80" y1="30" x2="340" y2="30" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.4"/>

    <text x="15" y="52" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Reference String:</text>
    <rect x="110" y="40" width="26" height="20" fill="url(#frameGrad)" rx="3" filter="url(#shadow)"/>
    <text x="123" y="54" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">7</text>
    <rect x="140" y="40" width="26" height="20" fill="url(#frameGrad)" rx="3" filter="url(#shadow)"/>
    <text x="153" y="54" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">0</text>
    <rect x="170" y="40" width="26" height="20" fill="url(#frameGrad)" rx="3" filter="url(#shadow)"/>
    <text x="183" y="54" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">1</text>
    <rect x="200" y="40" width="26" height="20" fill="url(#frameGrad)" rx="3" filter="url(#shadow)"/>
    <text x="213" y="54" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">2</text>
    <rect x="230" y="40" width="26" height="20" fill="url(#frameGrad)" rx="3" filter="url(#shadow)"/>
    <text x="243" y="54" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">0</text>
    <rect x="260" y="40" width="26" height="20" fill="url(#frameGrad)" rx="3" filter="url(#shadow)"/>
    <text x="273" y="54" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">3</text>

    <text x="300" y="52" font-family="Arial" font-size="9" fill="#3949AB" font-style="italic">3 frames</text>
  </g>

  <!-- GROUP 2: Memory frames filling up - pages 7, 0, 1 load (1.5s) -->
  <g data-narration="Pages 7, 0, and 1 load into 3 empty frames, causing 3 compulsory page faults. All frames are now full." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <text x="15" y="82" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Step 1-3: Fill empty frames</text>

    <!-- Frame labels -->
    <text x="95" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Frame 0</text>
    <text x="165" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Frame 1</text>
    <text x="235" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Frame 2</text>

    <!-- Frame boxes with pages -->
    <rect x="70" y="100" width="50" height="28" fill="url(#newPageGrad)" rx="4" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
    </rect>
    <text x="95" y="118" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white" opacity="0">
      P7
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
    </text>

    <rect x="140" y="100" width="50" height="28" fill="url(#newPageGrad)" rx="4" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
    </rect>
    <text x="165" y="118" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white" opacity="0">
      P0
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
    </text>

    <rect x="210" y="100" width="50" height="28" fill="url(#newPageGrad)" rx="4" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.3s" fill="freeze"/>
    </rect>
    <text x="235" y="118" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white" opacity="0">
      P1
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.3s" fill="freeze"/>
    </text>

    <!-- Page fault indicators -->
    <circle cx="310" cy="107" r="8" fill="#C62828" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.5s" fill="freeze"/>
    </circle>
    <text x="310" y="111" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white" opacity="0">
      3
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.5s" fill="freeze"/>
    </text>
    <text x="330" y="111" font-family="Arial" font-size="8" fill="#C62828" opacity="0">
      faults
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.5s" fill="freeze"/>
    </text>
  </g>

  <!-- GROUP 3: Page 2 arrives - victim selection (3.0s) -->
  <g data-narration="Page 2 is requested but all frames are full. A page replacement algorithm must choose which page to evict. FIFO picks page 7 (oldest), OPT picks page 7 (not used for longest), LRU picks page 7 (least recently used)." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <text x="15" y="150" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Step 4: Page 2 requested - frames full!</text>

    <!-- New page arriving -->
    <rect x="15" y="158" width="40" height="24" fill="url(#newPageGrad)" rx="4" filter="url(#shadow)">
      <animate attributeName="x" from="15" to="55" dur="0.6s" begin="3.3s" fill="freeze"/>
    </rect>
    <text x="35" y="174" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">
      P2
      <animate attributeName="x" from="35" to="75" dur="0.6s" begin="3.3s" fill="freeze"/>
    </text>

    <!-- Arrow pointing to victim -->
    <line x1="100" y1="166" x2="128" y2="166" stroke="#C62828" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.5s" fill="freeze"/>
    </line>
    <polygon points="128,166 122,162 122,170" fill="#C62828" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.5s" fill="freeze"/>
    </polygon>

    <!-- Victim frame (Page 7 highlighted in red) -->
    <rect x="130" y="156" width="50" height="28" fill="url(#victimGrad)" rx="4" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="0.8s" begin="3.6s" repeatCount="3"/>
    </rect>
    <text x="155" y="174" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white" opacity="0">
      P7
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    </text>
    <text x="155" y="198" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828" font-weight="bold" opacity="0">
      VICTIM
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.8s" fill="freeze"/>
    </text>

    <!-- Remaining frames -->
    <rect x="200" y="156" width="50" height="28" fill="url(#frameGrad)" rx="4" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    </rect>
    <text x="225" y="174" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white" opacity="0">
      P0
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    </text>
    <rect x="270" y="156" width="50" height="28" fill="url(#frameGrad)" rx="4" filter="url(#shadow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    </rect>
    <text x="295" y="174" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white" opacity="0">
      P1
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    </text>

    <!-- Dirty bit label -->
    <rect x="340" y="156" width="65" height="28" fill="none" stroke="#E65100" stroke-width="1" rx="4" stroke-dasharray="3,2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.0s" fill="freeze"/>
    </rect>
    <text x="372" y="168" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" opacity="0">
      Dirty bit=0?
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.0s" fill="freeze"/>
    </text>
    <text x="372" y="179" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C" font-weight="bold" opacity="0">
      No disk write
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.0s" fill="freeze"/>
    </text>
  </g>

  <!-- GROUP 4: Algorithm comparison - FIFO, OPT, LRU (4.5s) -->
  <g data-narration="Three main algorithms: FIFO replaces the oldest page in memory. Optimal replaces the page not used for the longest time in the future. LRU replaces the page not used for the longest time in the past." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <text x="210" y="220" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Algorithm Comparison (same reference string, 3 frames)</text>

    <!-- FIFO Box -->
    <rect x="15" y="228" width="120" height="60" fill="white" rx="6" filter="url(#shadow)" stroke="#3949AB" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.8s" fill="freeze"/>
    </rect>
    <rect x="15" y="228" width="120" height="18" fill="#3949AB" rx="6"/>
    <rect x="15" y="238" width="120" height="8" fill="#3949AB"/>
    <text x="75" y="241" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">FIFO</text>
    <text x="25" y="260" font-family="Arial" font-size="8" fill="#333">Replace oldest page</text>
    <text x="25" y="272" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">15 page faults</text>
    <text x="25" y="283" font-family="Arial" font-size="7" fill="#E65100">Belady's Anomaly!</text>

    <!-- OPT Box -->
    <rect x="150" y="228" width="120" height="60" fill="white" rx="6" filter="url(#shadow)" stroke="#00695C" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.1s" fill="freeze"/>
    </rect>
    <rect x="150" y="228" width="120" height="18" fill="#00695C" rx="6"/>
    <rect x="150" y="238" width="120" height="8" fill="#00695C"/>
    <text x="210" y="241" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">OPTIMAL</text>
    <text x="160" y="260" font-family="Arial" font-size="8" fill="#333">Replace farthest future</text>
    <text x="160" y="272" font-family="monospace" font-size="9" fill="#00695C" font-weight="bold">9 page faults</text>
    <text x="160" y="283" font-family="Arial" font-size="7" fill="#E65100">Benchmark only</text>

    <!-- LRU Box -->
    <rect x="285" y="228" width="120" height="60" fill="white" rx="6" filter="url(#shadow)" stroke="#E65100" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.4s" fill="freeze"/>
    </rect>
    <rect x="285" y="228" width="120" height="18" fill="#E65100" rx="6"/>
    <rect x="285" y="238" width="120" height="8" fill="#E65100"/>
    <text x="345" y="241" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">LRU</text>
    <text x="295" y="260" font-family="Arial" font-size="8" fill="#333">Replace least recent</text>
    <text x="295" y="272" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">12 page faults</text>
    <text x="295" y="283" font-family="Arial" font-size="7" fill="#00695C">Most practical</text>
  </g>

  <!-- GROUP 5: Clock (Second-Chance) Algorithm visualization (6.0s) -->
  <g data-narration="The Clock or Second-Chance algorithm arranges pages in a circular buffer. A pointer sweeps clockwise: if the reference bit is 1, it resets to 0 and moves on. If the bit is 0, that page is replaced." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <text x="15" y="305" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Clock (Second-Chance) Algorithm</text>

    <!-- Circular buffer representation -->
    <circle cx="80" cy="352" r="30" fill="none" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2"/>

    <!-- Pages around the circle -->
    <rect x="65" y="316" width="30" height="16" fill="#3949AB" rx="3"/>
    <text x="80" y="328" text-anchor="middle" font-family="monospace" font-size="8" fill="white">P0:1</text>

    <rect x="100" y="340" width="30" height="16" fill="#3949AB" rx="3"/>
    <text x="115" y="352" text-anchor="middle" font-family="monospace" font-size="8" fill="white">P1:0</text>

    <rect x="65" y="370" width="30" height="16" fill="#3949AB" rx="3"/>
    <text x="80" y="382" text-anchor="middle" font-family="monospace" font-size="8" fill="white">P2:1</text>

    <rect x="30" y="340" width="30" height="16" fill="url(#victimGrad)" rx="3"/>
    <text x="45" y="352" text-anchor="middle" font-family="monospace" font-size="8" fill="white">P3:0</text>

    <!-- Clock hand -->
    <line x1="80" y1="352" x2="48" y2="348" stroke="#C62828" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 80 352" to="360 80 352" dur="4s" begin="6.5s" repeatCount="1" fill="freeze"/>
    </line>
    <circle cx="80" cy="352" r="3" fill="#C62828"/>

    <!-- Legend -->
    <text x="148" y="325" font-family="Arial" font-size="8" fill="#333">ref bit=1: Give second chance</text>
    <rect x="148" y="316" width="6" height="6" fill="#3949AB" rx="1"/>

    <text x="148" y="340" font-family="Arial" font-size="8" fill="#333">ref bit=0: Replace this page</text>
    <rect x="148" y="332" width="6" height="6" fill="#C62828" rx="1"/>

    <!-- Enhanced second-chance categories -->
    <text x="148" y="358" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Enhanced (ref, dirty):</text>
    <text x="148" y="370" font-family="monospace" font-size="7" fill="#00695C">(0,0) Best to replace</text>
    <text x="148" y="380" font-family="monospace" font-size="7" fill="#E65100">(0,1) Must write to disk</text>
    <text x="148" y="390" font-family="monospace" font-size="7" fill="#3949AB">(1,0) May be used again</text>
  </g>

  <!-- GROUP 6: Summary and key takeaways (7.5s) -->
  <g data-narration="Key takeaways: FIFO is simplest but suffers from Belady's Anomaly. Optimal gives fewest faults but needs future knowledge. LRU is the best practical choice. The Clock algorithm approximates LRU efficiently in real operating systems." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- Summary bar -->
    <rect x="290" y="300" width="118" height="90" fill="white" rx="6" filter="url(#shadow)" stroke="#3949AB" stroke-width="1"/>
    <rect x="290" y="300" width="118" height="16" fill="url(#algoGrad)" rx="6"/>
    <rect x="290" y="310" width="118" height="6" fill="url(#algoGrad)"/>
    <text x="349" y="312" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Key Takeaways</text>

    <!-- Bullet points -->
    <circle cx="300" cy="327" r="2" fill="#3949AB"/>
    <text x="306" y="330" font-family="Arial" font-size="7" fill="#333">FIFO: Simple, poor perf</text>

    <circle cx="300" cy="341" r="2" fill="#00695C"/>
    <text x="306" y="344" font-family="Arial" font-size="7" fill="#333">OPT: Ideal benchmark</text>

    <circle cx="300" cy="355" r="2" fill="#E65100"/>
    <text x="306" y="358" font-family="Arial" font-size="7" fill="#333">LRU: Best practical</text>

    <circle cx="300" cy="369" r="2" fill="#C62828"/>
    <text x="306" y="372" font-family="Arial" font-size="7" fill="#333">Clock: Used in real OS</text>

    <!-- Page fault performance bar chart -->
    <text x="302" y="386" font-family="Arial" font-size="6" fill="#3949AB">Faults: FIFO(15) > LRU(12) > OPT(9)</text>
  </g>
</svg>