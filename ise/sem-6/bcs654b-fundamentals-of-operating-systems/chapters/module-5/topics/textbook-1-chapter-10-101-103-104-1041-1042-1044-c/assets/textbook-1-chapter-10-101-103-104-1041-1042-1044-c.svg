    <text x="50" y="35" fill="#2F4F7F" font-size="16" font-family="Arial, sans-serif">References</text>
    <animateTransform attributeName="transform" type="translate" from="10 35" to="10 45" dur="1000" begin="5s" repeatCount="indefinite"/>
