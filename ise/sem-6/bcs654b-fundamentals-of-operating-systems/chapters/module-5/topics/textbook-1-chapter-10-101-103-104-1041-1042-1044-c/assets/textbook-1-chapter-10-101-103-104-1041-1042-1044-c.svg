    <text x="50" y="15" fill="#2F4F7F" font-size="16" font-family="Arial, sans-serif">Conclusion</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 220" to="360 210 220" dur="10000" begin="4s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 270)">
