<svg width="420" height="400" data-topic-id="textbook-1-chapter-10-101-103-104-1041-1042-1044-c">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>
  <title>Virtual Memory Management</title>
  <rect width="100%" height="20" fill="#F2F2F2"/>
  <rect x="10" y="10" width="400" height="350" fill="url(#pastel-gradient)"/>
  <rect x="10" y="10" width="100%" height="40" fill="#F2F2F2"/>
  <g transform="translate(10, 40)">
    <rect width="100%" height="20" fill="#F2F2F2"/>
    <text x="50" y="15" fill="#2F4F7F" font-size="16" font-family="Arial, sans-serif">10.1 Introduction to Virtual Memory</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 20" to="360 190 20" dur="10000" begin="0s" repeatCount="indefinite"/>
    <g data-narration="Virtual Address Space is the set of all possible memory addresses that a process can access" transform="translate(10, 45)">
      <rect width="100%" height="20" fill="#F2F2F2"/>
      <text x="50" y="15" fill="#2F4F7F" font-size="16" font-family="Arial, sans-serif">Virtual Address Space</text>
      <rect x="10" y="30" width="20" height="10" fill="#4CAF50" rx="5"/>
      <text x="30" y="35" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Page Frame</text>
      <text x="60" y="35" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Page Table</text>
      <rect x="10" y="55" width="20" height="10" fill="#4CAF50" rx="5"/>
      <text x="30" y="60" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Page Replacement</text>
      <animateTransform attributeName="transform" type="translate" from="10 55" to="10 65" dur="1000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Demand Paging is a technique that loads pages into physical memory only when they are needed" transform="translate(10, 90)">
      <rect width="100%" height="20" fill="#F2F2F2"/>
      <text x="50" y="15" fill="#2F4F7F" font-size="16" font-family="Arial, sans-serif">10.2 Demand Paging</text>
      <rect x="10" y="30" width="20" height="10" fill="#4CAF50" rx="5"/>
      <text x="30" y="35" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Page Fault</text>
      <rect x="10" y="55" width="20" height="10" fill="#4CAF50" rx="5"/>
      <text x="30" y="60" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Page Replacement</text>
      <animateTransform attributeName="transform" type="translate" from="10 55" to="10 65" dur="1000" begin="1s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Copy-on-Write is a technique that creates a copy of a page when it is first written to" transform="translate(10, 135)">
      <rect width="100%" height="20" fill="#F2F2F2"/>
      <text x="50" y="15" fill="#2F4F7F" font-size="16" font-family="Arial, sans-serif">10.3 Copy-on-Write</text>
      <rect x="10" y="30" width="20" height="10" fill="#4CAF50" rx="5"/>
      <text x="30" y="35" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Copy-on-Write</text>
      <rect x="10" y="55" width="20" height="10" fill="#4CAF50" rx="5"/>
      <text x="30" y="60" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Page Table</text>
      <animateTransform attributeName="transform" type="translate" from="10 55" to="10 65" dur="1000" begin="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Optimal is a page replacement algorithm that replaces the page that will not be needed for the longest time" transform="translate(10, 175)">
      <rect width="100%" height="20" fill="#F2F2F2"/>
      <text x="50" y="15" fill="#2F4F7F" font-size="16" font-family="Arial, sans-serif">10.4 Optimal</text>
      <rect x="10" y="30" width="20" height="10" fill="#4CAF50" rx="5"/>
      <text x="30" y="35" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Optimal</text>
      <rect x="10" y="55" width="20" height="10" fill="#4CAF50" rx="5"/>
      <text x="30" y="60" fill="#2F4F7F" font-size="14" font-family="Arial, sans-serif">Page Replacement</text>
      <animateTransform attributeName="transform" type="translate" from="10 55" to="10 65" dur="1000" begin="3s" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(10, 215)">
