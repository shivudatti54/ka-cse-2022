<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="semaphores">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="semBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="procBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
    <linearGradient id="warnBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C62828"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- GROUP 1: Title and Semaphore Integer Variable (0.3s) -->
  <g opacity="0" data-narration="A semaphore is an integer variable S accessed only through two atomic operations: wait() and signal(). It controls access to shared resources in concurrent systems.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>

    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Semaphores and Synchronization</text>
    <line x1="100" y1="34" x2="320" y2="34" stroke="#3949AB" stroke-width="1.5" opacity="0.5"/>

    <!-- Semaphore S box -->
    <rect x="155" y="44" width="110" height="44" fill="url(#semBox)" rx="8"/>
    <text x="210" y="62" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Semaphore S</text>
    <rect x="185" y="68" width="50" height="16" fill="white" rx="3" opacity="0.9"/>
    <text x="210" y="80" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#3949AB">S = 1</text>

    <!-- Atomic badge -->
    <rect x="280" y="52" width="70" height="20" fill="#E65100" rx="10"/>
    <text x="315" y="66" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">ATOMIC</text>
  </g>

  <!-- GROUP 2: wait() and signal() Operations (1.5s) -->
  <g opacity="0" data-narration="wait(S) decrements S. If S becomes negative, the process blocks. signal(S) increments S and wakes a blocked process if any. These are also called P() and V() operations.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- wait() box -->
    <rect x="20" y="100" width="175" height="68" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="20" y="100" width="175" height="20" fill="#3949AB" rx="6"/>
    <rect x="20" y="112" width="175" height="8" fill="#3949AB"/>
    <text x="107" y="115" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">wait(S) / P(S)</text>
    <text x="30" y="136" font-family="monospace" font-size="9" fill="#1A237E">while (S &lt;= 0) ; //wait</text>
    <text x="30" y="150" font-family="monospace" font-size="9" fill="#C62828">S--;</text>
    <!-- Down arrow from semaphore -->
    <line x1="180" y1="88" x2="107" y2="100" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

    <!-- signal() box -->
    <rect x="225" y="100" width="175" height="68" fill="white" rx="6" stroke="#00695C" stroke-width="1.5"/>
    <rect x="225" y="100" width="175" height="20" fill="#00695C" rx="6"/>
    <rect x="225" y="112" width="175" height="8" fill="#00695C"/>
    <text x="312" y="115" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">signal(S) / V(S)</text>
    <text x="235" y="136" font-family="monospace" font-size="9" fill="#004D40">S++;</text>
    <text x="235" y="150" font-family="monospace" font-size="9" fill="#004D40">// wakeup blocked proc</text>
    <!-- Down arrow from semaphore -->
    <line x1="240" y1="88" x2="312" y2="100" stroke="#00695C" stroke-width="1.5"/>

    <!-- Arrow markers -->
    <defs>
      <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
      </marker>
      <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
      </marker>
      <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
      </marker>
      <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
      </marker>
    </defs>
  </g>

  <!-- GROUP 3: Binary vs Counting Semaphore (3.0s) -->
  <g opacity="0" data-narration="Binary semaphores hold values 0 or 1, acting as a lock for mutual exclusion. Counting semaphores range over any non-negative integer, managing multiple resource instances.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- Binary Semaphore -->
    <rect x="20" y="180" width="175" height="52" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5"/>
    <text x="107" y="197" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Binary Semaphore</text>
    <text x="107" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Value: 0 or 1 (Lock)</text>
    <!-- Toggle indicator -->
    <rect x="62" y="218" width="36" height="10" fill="#E0E0E0" rx="5"/>
    <circle cx="90" cy="223" r="7" fill="#3949AB">
      <animate attributeName="cx" values="90;70;90" dur="2s" begin="3.5s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="227" font-family="monospace" font-size="7" fill="#666">0</text>
    <text x="102" y="227" font-family="monospace" font-size="7" fill="#666">1</text>

    <!-- Counting Semaphore -->
    <rect x="225" y="180" width="175" height="52" fill="white" rx="6" stroke="#00695C" stroke-width="1.5"/>
    <text x="312" y="197" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Counting Semaphore</text>
    <text x="312" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Value: 0 to N (Resources)</text>
    <!-- Counter display -->
    <rect x="278" y="217" width="68" height="12" fill="#E0F2F1" rx="3"/>
    <text x="312" y="227" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">
      S = 3
      <animate attributeName="textContent" values="S = 3;S = 2;S = 1;S = 0;S = 1;S = 2;S = 3" dur="3.5s" begin="3.5s" repeatCount="indefinite"/>
    </text>
    <!-- Resource dots -->
    <circle cx="262" cy="223" r="3" fill="#00695C" opacity="0.8"/>
    <circle cx="354" cy="223" r="3" fill="#00695C" opacity="0.8"/>
    <circle cx="362" cy="223" r="3" fill="#00695C" opacity="0.5"/>
  </g>

  <!-- GROUP 4: Critical Section - Mutual Exclusion (4.5s) -->
  <g opacity="0" data-narration="For mutual exclusion, a binary semaphore mutex is initialized to 1. A process calls wait(mutex) to enter the critical section and signal(mutex) to exit, ensuring only one process enters at a time.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <text x="210" y="250" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Critical Section with Mutex</text>

    <!-- Process P1 -->
    <rect x="20" y="258" width="80" height="28" fill="url(#procBox)" rx="5"/>
    <text x="60" y="276" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Process P1</text>

    <!-- Arrow P1 -> wait -->
    <line x1="100" y1="272" x2="125" y2="272" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- wait(mutex) -->
    <rect x="134" y="260" width="70" height="24" fill="#E65100" rx="4"/>
    <text x="169" y="276" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">wait(m)</text>

    <!-- Critical Section -->
    <rect x="215" y="256" width="85" height="32" fill="white" rx="4" stroke="#C62828" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="257" y="270" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">CRITICAL</text>
    <text x="257" y="281" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">SECTION</text>
    <!-- Arrow wait -> CS -->
    <line x1="204" y1="272" x2="213" y2="272" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

    <!-- signal(mutex) -->
    <rect x="312" y="260" width="70" height="24" fill="#00695C" rx="4"/>
    <text x="347" y="276" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">signal(m)</text>
    <!-- Arrow CS -> signal -->
    <line x1="300" y1="272" x2="310" y2="272" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Process P2 blocked -->
    <rect x="20" y="292" width="80" height="22" fill="#9E9E9E" rx="5"/>
    <text x="60" y="307" text-anchor="middle" font-family="Arial" font-size="8" fill="white">P2 BLOCKED</text>
    <!-- X mark -->
    <line x1="110" y1="296" x2="122" y2="308" stroke="#C62828" stroke-width="2"/>
    <line x1="122" y1="296" x2="110" y2="308" stroke="#C62828" stroke-width="2"/>
    <!-- Pulsing blocked indicator -->
    <circle cx="116" cy="302" r="10" fill="none" stroke="#C62828" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" begin="5.0s" repeatCount="indefinite"/>
      <animate attributeName="r" values="10;16;10" dur="1.5s" begin="5.0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- GROUP 5: Producer-Consumer Problem (6.0s) -->
  <g opacity="0" data-narration="The Producer-Consumer problem uses three semaphores: mutex for buffer access, empty counting free slots, and full counting used slots. The producer waits on empty then mutex; the consumer waits on full then mutex.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <text x="210" y="330" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Producer-Consumer (Bounded Buffer)</text>

    <!-- Producer -->
    <rect x="20" y="338" width="72" height="24" fill="url(#procBox)" rx="5"/>
    <text x="56" y="354" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Producer</text>
    <line x1="92" y1="350" x2="118" y2="350" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Buffer visualization - 5 slots -->
    <rect x="122" y="338" width="24" height="24" fill="#3949AB" rx="2" stroke="white" stroke-width="1"/>
    <rect x="148" y="338" width="24" height="24" fill="#3949AB" rx="2" stroke="white" stroke-width="1"/>
    <rect x="174" y="338" width="24" height="24" fill="#3949AB" rx="2" stroke="white" stroke-width="1"/>
    <rect x="200" y="338" width="24" height="24" fill="white" rx="2" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="226" y="338" width="24" height="24" fill="white" rx="2" stroke="#3949AB" stroke-width="1.5"/>

    <!-- Items in buffer -->
    <text x="134" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="white">D</text>
    <text x="160" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="white">D</text>
    <text x="186" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="white">D</text>

    <!-- Animated item moving into buffer -->
    <circle cx="119" cy="350" r="4" fill="#E65100" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="6.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="100;212;212;100" dur="2s" begin="6.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Consumer -->
    <line x1="252" y1="350" x2="278" y2="350" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <rect x="282" y="338" width="72" height="24" fill="#E65100" rx="5"/>
    <text x="318" y="354" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Consumer</text>

    <!-- Semaphore labels -->
    <text x="122" y="374" font-family="monospace" font-size="7" fill="#3949AB">full=3</text>
    <text x="182" y="374" font-family="monospace" font-size="7" fill="#00695C">mutex=1</text>
    <text x="232" y="374" font-family="monospace" font-size="7" fill="#E65100">empty=2</text>
  </g>

  <!-- GROUP 6: Deadlock Warning (7.5s) -->
  <g opacity="0" data-narration="Deadlock occurs when processes hold resources while waiting for others held by other processes. Always acquire semaphores in a consistent global order to prevent deadlock. Starvation can also occur if a process is indefinitely denied access.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <rect x="360" y="336" width="55" height="40" fill="url(#warnBox)" rx="5"/>
    <text x="387" y="352" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Deadlock</text>
    <text x="387" y="364" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFCDD2">Lock order</text>
    <text x="387" y="373" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFCDD2">matters!</text>

    <!-- Pulsing warning border -->
    <rect x="358" y="334" width="59" height="44" fill="none" rx="6" stroke="#C62828" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="8.0s" repeatCount="indefinite"/>
    </rect>

    <!-- Circular arrows indicating deadlock cycle -->
    <path d="M372,344 A6,6 0 1,1 372,338" fill="none" stroke="white" stroke-width="1.2" marker-end="url(#arrowWhite)"/>
    <defs>
      <marker id="arrowWhite" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
        <path d="M0,0 L6,2 L0,4 Z" fill="white"/>
      </marker>
    </defs>
  </g>
</svg>