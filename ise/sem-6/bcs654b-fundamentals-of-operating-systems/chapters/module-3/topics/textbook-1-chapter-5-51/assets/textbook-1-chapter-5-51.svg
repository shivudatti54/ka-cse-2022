<svg width="420" height="400" data-topic-id="fundamentals-of-operating-systems-51" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E6F2C4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <text x="150" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
    Fundamentals of Operating Systems
  </text>
  
  <!-- Introduction section -->
  <section data-narration="Introduction">
    <rect x="20" y="80" width="380" height="40" fill="#F7F7F7"/>
    <text x="10" y="90" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      What is an Operating System?
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,80" to="0,100" begin="0s" dur="2s"/>
  </section>
  
  <!-- Characteristics of an Operating System section -->
  <section data-narration="Characteristics of an Operating System">
    <rect x="20" y="140" width="380" height="40" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0,140" to="0,160" begin="2s" dur="2s"/>
    <g transform="rotate(90 200 140)">
      <rect x="10" y="150" width="20" height="20" fill="#74B9EA"/>
      <text x="15" y="160" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Process Management
      </text>
      <text x="15" y="170" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Memory Management
      </text>
      <text x="15" y="190" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        File System Management
      </text>
      <text x="15" y="210" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Input/Output Management
      </text>
      <text x="15" y="230" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Security
      </text>
    </g>
  </section>
  
  <!-- Types of Operating Systems section -->
  <section data-narration="Types of Operating Systems">
    <rect x="20" y="200" width="380" height="40" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0,200" to="0,220" begin="4s" dur="2s"/>
    <g transform="rotate(90 200 200)">
      <rect x="10" y="210" width="20" height="20" fill="#74B9EA"/>
      <text x="15" y="220" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Single-User, Single-Tasking OS
      </text>
      <text x="15" y="230" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Single-User, Multi-Tasking OS
      </text>
    </g>
  </section>
  
  <!-- Advantages of Operating Systems section -->
  <section data-narration="Advantages of Operating Systems">
    <rect x="20" y="260" width="380" height="40" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0,260" to="0,280" begin="6s" dur="2s"/>
    <g transform="rotate(90 200 260)">
      <rect x="10" y="270" width="20" height="20" fill="#74B9EA"/>
      <text x="15" y="280" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Efficient Resource Utilization
      </text>
      <text x="15" y="290" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Improved Productivity
      </text>
      <text x="15" y="300" font-size="14" font-family="Arial" text-anchor="start" fill="#2F4F7F">
        Security
      </text>
    </g>
  </section>
  
  <!-- Footer at bottom -->
  <rect x="20" y="340" width="380" height="40" fill="#F7F7F7"/>
  <text x="10" y="350" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">
    Copyright 2023
  </text>
</svg>