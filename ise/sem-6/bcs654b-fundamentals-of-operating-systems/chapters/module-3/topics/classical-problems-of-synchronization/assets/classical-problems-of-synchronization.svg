<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="classical-problems-of-synchronization">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title & Overview (0.3s) -->
  <g data-narration="Classical synchronization problems are fundamental scenarios illustrating concurrency challenges in operating systems, solved using semaphores and mutex locks." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Classical Problems of Synchronization</text>
    <text x="210" y="46" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">Semaphores: wait(P) and signal(V) atomic operations</text>
    <line x1="30" y1="54" x2="390" y2="54" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Group 2: Producer-Consumer Problem (1.5s) -->
  <g data-narration="The Producer-Consumer (bounded buffer) problem uses three semaphores: mutex for mutual exclusion, empty to track free slots, and full to track occupied slots. Producers wait on empty, consumers wait on full." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>
    <text x="30" y="76" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">1. Producer-Consumer (Bounded Buffer)</text>

    <!-- Producer box -->
    <rect x="20" y="84" width="90" height="50" fill="#3949AB" rx="6"/>
    <text x="65" y="104" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">PRODUCER</text>
    <text x="65" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">wait(empty)</text>
    <text x="65" y="128" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">wait(mutex)</text>

    <!-- Buffer -->
    <rect x="140" y="84" width="140" height="50" fill="white" rx="6" stroke="#3949AB" stroke-width="2"/>
    <text x="210" y="98" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">BUFFER (size N)</text>
    <!-- Buffer slots -->
    <rect x="152" y="104" width="22" height="22" fill="#C5CAE9" rx="3" stroke="#3949AB" stroke-width="1"/>
    <rect x="178" y="104" width="22" height="22" fill="#3949AB" rx="3"/>
    <rect x="204" y="104" width="22" height="22" fill="#3949AB" rx="3"/>
    <rect x="230" y="104" width="22" height="22" fill="#C5CAE9" rx="3" stroke="#3949AB" stroke-width="1"/>
    <rect x="256" y="104" width="22" height="22" fill="#C5CAE9" rx="3" stroke="#3949AB" stroke-width="1"/>
    <!-- Animated item moving in buffer -->
    <rect x="152" y="104" width="22" height="22" fill="#3949AB" rx="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.0s" fill="freeze"/>
    </rect>

    <!-- Consumer box -->
    <rect x="310" y="84" width="90" height="50" fill="#00695C" rx="6"/>
    <text x="355" y="104" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">CONSUMER</text>
    <text x="355" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#B2DFDB">wait(full)</text>
    <text x="355" y="128" text-anchor="middle" font-family="monospace" font-size="8" fill="#B2DFDB">wait(mutex)</text>

    <!-- Arrows -->
    <line x1="110" y1="109" x2="137" y2="109" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <line x1="280" y1="109" x2="307" y2="109" stroke="#00695C" stroke-width="2" marker-end="url(#arrowTeal)"/>

    <!-- Semaphore labels -->
    <rect x="145" y="134" width="52" height="14" fill="#E65100" rx="3"/>
    <text x="171" y="144" text-anchor="middle" font-family="monospace" font-size="7" fill="white">mutex=1</text>
    <rect x="203" y="134" width="44" height="14" fill="#00695C" rx="3"/>
    <text x="225" y="144" text-anchor="middle" font-family="monospace" font-size="7" fill="white">full=0</text>
    <rect x="253" y="134" width="52" height="14" fill="#3949AB" rx="3"/>
    <text x="279" y="144" text-anchor="middle" font-family="monospace" font-size="7" fill="white">empty=N</text>
  </g>

  <!-- Group 3: Readers-Writers Problem (3.0s) -->
  <g data-narration="The Readers-Writers problem allows multiple readers to access data simultaneously, but writers require exclusive access. The first reader locks out writers, and the last reader releases the lock." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>
    <text x="30" y="170" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">2. Readers-Writers Problem</text>

    <!-- Shared data -->
    <rect x="170" y="178" width="80" height="44" fill="white" rx="6" stroke="#00695C" stroke-width="2"/>
    <text x="210" y="194" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">SHARED</text>
    <text x="210" y="206" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">DATA</text>
    <text x="210" y="218" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">wrt=1</text>

    <!-- Readers -->
    <circle cx="55" cy="188" r="14" fill="#3949AB"/>
    <text x="55" y="191" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">R1</text>
    <circle cx="55" cy="220" r="14" fill="#3949AB"/>
    <text x="55" y="223" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">R2</text>
    <circle cx="100" cy="204" r="14" fill="#3949AB"/>
    <text x="100" y="207" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">R3</text>
    <text x="70" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">Readers (concurrent)</text>

    <!-- Arrows from readers -->
    <line x1="69" y1="188" x2="167" y2="195" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <line x1="114" y1="204" x2="167" y2="200" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

    <!-- Writer -->
    <rect x="310" y="185" width="70" height="30" fill="#C62828" rx="6"/>
    <text x="345" y="204" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">WRITER</text>
    <text x="345" y="228" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Exclusive access</text>

    <!-- Blocked arrow from writer -->
    <line x1="307" y1="200" x2="253" y2="200" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="280" y="193" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">BLOCKED</text>

    <!-- read_count label -->
    <rect x="115" y="178" width="52" height="14" fill="#E65100" rx="3"/>
    <text x="141" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="white">cnt=3</text>
  </g>

  <!-- Group 4: Dining Philosophers (4.5s) -->
  <g data-narration="Five philosophers sit in a circle sharing chopsticks. Each needs both adjacent chopsticks to eat. The naive solution causes deadlock if all pick up their left chopstick simultaneously." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>
    <text x="30" y="268" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">3. Dining Philosophers</text>

    <!-- Circular table -->
    <circle cx="105" cy="330" r="38" fill="none" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,3"/>
    <circle cx="105" cy="330" r="10" fill="#E65100" opacity="0.2"/>
    <text x="105" y="333" text-anchor="middle" font-family="Arial" font-size="6" fill="#E65100">Table</text>

    <!-- Philosophers (P0-P4) arranged in circle -->
    <circle cx="105" cy="284" r="12" fill="#3949AB"/>
    <text x="105" y="287" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">P0</text>

    <circle cx="143" cy="306" r="12" fill="#3949AB"/>
    <text x="143" y="309" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">P1</text>

    <circle cx="130" cy="354" r="12" fill="#3949AB"/>
    <text x="130" y="357" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">P2</text>

    <circle cx="80" cy="354" r="12" fill="#3949AB"/>
    <text x="80" y="357" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">P3</text>

    <circle cx="67" cy="306" r="12" fill="#3949AB"/>
    <text x="67" y="309" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">P4</text>

    <!-- Chopsticks (C0-C4) between philosophers -->
    <rect x="121" y="288" width="4" height="16" fill="#E65100" rx="1" transform="rotate(25,123,296)"/>
    <text x="130" y="292" font-family="Arial" font-size="6" fill="#E65100">C1</text>

    <rect x="140" y="330" width="4" height="16" fill="#E65100" rx="1" transform="rotate(75,142,338)"/>
    <text x="148" y="338" font-family="Arial" font-size="6" fill="#E65100">C2</text>

    <rect x="103" y="360" width="4" height="16" fill="#E65100" rx="1" transform="rotate(0,105,368)"/>
    <text x="112" y="372" font-family="Arial" font-size="6" fill="#E65100">C3</text>

    <rect x="66" y="330" width="4" height="16" fill="#E65100" rx="1" transform="rotate(-75,68,338)"/>
    <text x="55" y="340" font-family="Arial" font-size="6" fill="#E65100">C4</text>

    <rect x="84" y="288" width="4" height="16" fill="#E65100" rx="1" transform="rotate(-25,86,296)"/>
    <text x="76" y="292" font-family="Arial" font-size="6" fill="#E65100">C0</text>
  </g>

  <!-- Group 5: Sleeping Barber (6.0s) -->
  <g data-narration="In the Sleeping Barber problem, the barber sleeps when no customers are present. Arriving customers wake the barber or wait in chairs. If all chairs are full, the customer leaves." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>
    <text x="210" y="268" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">4. Sleeping Barber</text>

    <!-- Barber chair -->
    <rect x="215" y="278" width="50" height="40" fill="#C62828" rx="5"/>
    <text x="240" y="295" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">BARBER</text>
    <text x="240" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Chair</text>

    <!-- Zzz for sleeping -->
    <text x="270" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828" opacity="0">
      Zzz
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="6.3s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" dur="0.4s" begin="7.0s" fill="freeze"/>
    </text>

    <!-- Waiting chairs -->
    <rect x="290" y="278" width="18" height="20" fill="white" rx="3" stroke="#C62828" stroke-width="1.5"/>
    <rect x="312" y="278" width="18" height="20" fill="white" rx="3" stroke="#C62828" stroke-width="1.5"/>
    <rect x="334" y="278" width="18" height="20" fill="white" rx="3" stroke="#C62828" stroke-width="1.5"/>
    <rect x="356" y="278" width="18" height="20" fill="white" rx="3" stroke="#C62828" stroke-width="1.5"/>
    <text x="340" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">Waiting Chairs (N)</text>

    <!-- Customer figures in waiting chairs -->
    <circle cx="299" cy="285" r="6" fill="#E65100"/>
    <text x="299" y="288" text-anchor="middle" font-family="Arial" font-size="6" fill="white">C</text>
    <circle cx="321" cy="285" r="6" fill="#E65100"/>
    <text x="321" y="288" text-anchor="middle" font-family="Arial" font-size="6" fill="white">C</text>

    <!-- Incoming customer arrow -->
    <line x1="400" y1="288" x2="377" y2="288" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="395" y="282" font-family="Arial" font-size="7" fill="#E65100">New</text>

    <!-- Semaphore labels -->
    <rect x="215" y="320" width="60" height="14" fill="#3949AB" rx="3"/>
    <text x="245" y="330" text-anchor="middle" font-family="monospace" font-size="7" fill="white">customers=0</text>
    <rect x="280" y="320" width="52" height="14" fill="#00695C" rx="3"/>
    <text x="306" y="330" text-anchor="middle" font-family="monospace" font-size="7" fill="white">barber=0</text>
    <rect x="337" y="320" width="52" height="14" fill="#E65100" rx="3"/>
    <text x="363" y="330" text-anchor="middle" font-family="monospace" font-size="7" fill="white">mutex=1</text>
  </g>

  <!-- Group 6: Deadlock Warning & Solutions Summary (7.5s) -->
  <g data-narration="Deadlock avoidance is critical. Solutions include limiting concurrent philosophers, asymmetric resource picking, and using monitors or condition variables for structured synchronization." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>

    <!-- Deadlock warning for philosophers -->
    <rect x="20" y="380" width="175" height="16" fill="#C62828" rx="3" opacity="0.9"/>
    <text x="107" y="391" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Deadlock: All pick left chopstick!</text>

    <!-- Solutions summary -->
    <rect x="205" y="345" width="200" height="52" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5" opacity="0.95"/>
    <text x="305" y="358" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Deadlock Avoidance Solutions</text>
    <text x="215" y="370" font-family="Arial" font-size="7" fill="#00695C">1. Limit to N-1 philosophers at table</text>
    <text x="215" y="381" font-family="Arial" font-size="7" fill="#E65100">2. Asymmetric picking (odd/even rule)</text>
    <text x="215" y="392" font-family="Arial" font-size="7" fill="#C62828">3. Atomic pickup with mutex lock</text>
  </g>
</svg>