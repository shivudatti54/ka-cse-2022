<svg width="420" height="400" data-topic-id="cpu-scheduling-basic-concepts-scheduling-criteria" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="# ACC2FF"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>
  <title>CPU Scheduling Basic Concepts</title>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  <g transform="translate(30,20)">
    <text x="10" y="30" font-size="24" font-family="Arial" fill="#2196F3">CPU Scheduling Basic Concepts</text>
  </g>
  <g transform="translate(40,70)">
    <rect width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#666666">Scheduling Criteria</text>
    <g data-narration="FCFS (First-Come-First-Served)">
      <rect width="50" height="20" fill="#E91E63" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">FCFS</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="50,0" begin="-0.5s"/>
    </g>
    <g data-narration="SJF (Shortest-Job-First)">
      <rect width="50" height="20" fill="#3F51B5" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">SJF</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="90,0" begin="-0.5s"/>
    </g>
    <g data-narration="Priority Scheduling">
      <rect width="50" height="20" fill="#2196F3" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">Priority Scheduling</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="130,0" begin="-0.5s"/>
    </g>
    <g data-narration="Round Robin">
      <rect width="50" height="20" fill="#4CAF50" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">Round Robin</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="170,0" begin="-0.5s"/>
    </g>
    <g data-narration="Shortest Remaining Time First (SRTF)">
      <rect width="50" height="20" fill="#8BC34A" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">SRTF</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="210,0" begin="-0.5s"/>
    </g>
  </g>
  <g transform="translate(40,140)">
    <rect width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#666666">Scheduling Algorithms</text>
    <g data-narration="FCFS Scheduling Algorithm">
      <rect width="50" height="20" fill="#E91E63" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">FCFS</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="50,0" begin="-0.5s"/>
    </g>
    <g data-narration="SJF Scheduling Algorithm">
      <rect width="50" height="20" fill="#3F51B5" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">SJF</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="90,0" begin="-0.5s"/>
    </g>
    <g data-narration="Priority Scheduling Algorithm">
      <rect width="50" height="20" fill="#2196F3" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">Priority Scheduling</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="130,0" begin="-0.5s"/>
    </g>
    <g data-narration="Round Robin Algorithm">
      <rect width="50" height="20" fill="#4CAF50" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">Round Robin</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="170,0" begin="-0.5s"/>
    </g>
    <g data-narration="SRTF Scheduling Algorithm">
      <rect width="50" height="20" fill="#8BC34A" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">SRTF</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="210,0" begin="-0.5s"/>
    </g>
  </g>
  <g transform="translate(40,210)">
    <rect width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#666666">Thread Scheduling</text>
    <g data-narration="Thread Synchronization">
      <rect width="50" height="20" fill="#E91E63" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">Thread Synchronization</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="50,0" begin="-0.5s"/>
    </g>
    <g data-narration="Process Synchronization">
      <rect width="50" height="20" fill="#3F51B5" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">Process Synchronization</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="90,0" begin="-0.5s"/>
    </g>
  </g>
  <g transform="translate(40,290)">
    <rect width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#666666">Process Synchronization</text>
    <g data-narration="Synchronization - The Critical">
      <rect width="50" height="20" fill="#E91E63" rx="5"/>
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#FFFFFF">Synchronization - The Critical</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="50,0" begin="-0.5s"/>
    </g>
  </g>
  <footer>
    <text x="10" y="380" font-size="18" font-family="Arial" fill="#666666">Learn more about CPU Scheduling</text>
  </footer>
</svg>