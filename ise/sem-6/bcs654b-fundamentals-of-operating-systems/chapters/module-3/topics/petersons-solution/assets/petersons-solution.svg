<svg width="420" height="400" data-topic-id="petersons-solution">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>

  <g data-narration="Introduction">
    <rect x="20" y="50" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="70" font-size="18" font-family="Arial" fill="#FFFFFF">Peterson's Solution</text>
  </g>

  <g data-narration="Definition">
    <rect x="20" y="150" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="170" font-size="18" font-family="Arial" fill="#FFFFFF">Definition</text>
    <rect x="20" y="180" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">Peterson's solution is a synchronization algorithm used to protect shared resources in a multi-process system.</text>
  </g>

  <g data-narration="Components">
    <rect x="20" y="280" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="300" font-size="18" font-family="Arial" fill="#FFFFFF">Components</text>
    <rect x="20" y="310" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="330" font-size="18" font-family="Arial" fill="#FFFFFF">- turn: a local variable that indicates whether a process is allowed to access the shared resource.</text>
    <rect x="20" y="340" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="360" font-size="18" font-family="Arial" fill="#FFFFFF">- shared: a local variable that indicates whether the shared resource is currently being accessed by a process.</text>
  </g>

  <g data-narration="How it Works">
    <rect x="20" y="450" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="470" font-size="18" font-family="Arial" fill="#FFFFFF">How it Works</text>
    <rect x="20" y="490" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="510" font-size="18" font-family="Arial" fill="#FFFFFF">1. Each process initializes the turn and shared variables to 0.</text>
    <rect x="20" y="530" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="550" font-size="18" font-family="Arial" fill="#FFFFFF">2. The processes then enter a loop where they continuously try to access the shared resource.</text>
    <rect x="20" y="570" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="590" font-size="18" font-family="Arial" fill="#FFFFFF">3. If a process finds that the shared variable is 0, it sets shared to 1 and turn to itself (P[i]).</text>
  </g>

  <g data-narration="Example">
    <rect x="20" y="700" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="720" font-size="18" font-family="Arial" fill="#FFFFFF">Example</text>
    <rect x="20" y="740" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="760" font-size="18" font-family="Arial" fill="#FFFFFF">Suppose we have two processes, P0 and P1, that are trying to access a shared resource.</text>
    <rect x="20" y="780" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="800" font-size="18" font-family="Arial" fill="#FFFFFF">The shared resource is initially empty (i.e., shared = 0).</text>
  </g>

  <g data-narration="Process">
    <rect x="20" y="900" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="920" font-size="18" font-family="Arial" fill="#FFFFFF">Process</text>
    <rect x="20" y="940" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="960" font-size="18" font-family="Arial" fill="#FFFFFF">- Initialize turn and shared variables to 0.</text>
    <rect x="20" y="980" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="1000" font-size="18" font-family="Arial" fill="#FFFFFF">- Enter a loop where you continuously try to access the shared resource.</text>
  </g>

  <g data-narration="Shared Resource">
    <rect x="20" y="1100" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="1120" font-size="18" font-family="Arial" fill="#FFFFFF">Shared Resource</text>
    <rect x="20" y="1140" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="1160" font-size="18" font-family="Arial" fill="#FFFFFF">- If shared is 0, set shared to 1 and turn to yourself (P[i]).</text>
    <rect x="20" y="1180" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="1200" font-size="18" font-family="Arial" fill="#FFFFFF">- If turn is not equal to P[i], wait and check turn again.</text>
  </g>

  <g data-narration="Animation">
    <rect x="20" y="1300" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="1320" font-size="18" font-family="Arial" fill="#FFFFFF">Animation</text>
    <rect x="20" y="1340" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="1360" font-size="18" font-family="Arial" fill="#FFFFFF">- If turn is equal to P[i], access the shared resource and set shared to 0.</text>
  </g>

  <g data-narration="Conclusion">
    <rect x="20" y="1450" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="1470" font-size="18" font-family="Arial" fill="#FFFFFF">Conclusion</text>
    <rect x="20" y="1490" width="300" height="20" fill="#4C5154" rx="5" />
    <text x="50" y="1510" font-size="18" font-family="Arial" fill="#FFFFFF">Peterson's solution is a simple and efficient way to ensure that only one process can access a shared resource at a time.</text>
  </g>

  <footer>
    <text x="20" y="1800" font-size="18" font-family="Arial" fill="#FFFFFF">Learn more about synchronization algorithms in operating systems.</text>
  </footer>

  <animate x="0" y="0" attributeName="x" from="0" to="420" dur="5s" xml:name="animateX"/>
  <animate x="420" y="0" attributeName="x" from="420" to="0" dur="5s" xml:name="animateX"/>
  <animate y="0" attributeName="y" from="0" to="400" dur="5s" xml:name="animateY"/>
  <animate y="400" attributeName="y" from="400" to="0" dur="5s" xml:name="animateY"/>
</svg>