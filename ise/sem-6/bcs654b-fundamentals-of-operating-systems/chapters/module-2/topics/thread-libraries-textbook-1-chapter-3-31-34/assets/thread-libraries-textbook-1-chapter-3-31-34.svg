<svg width="420" height="400" data-topic-id="thread-libraries-textbook-1-chapter-3-31-34">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="36" font-family="Arial" fill="#FFC107" data-narration="Thread Libraries Textbook 1: Chapter 3">
    Thread Libraries Textbook 1: Chapter 3
  </text>
  
  <!-- Section 1: Process Concept -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#fff" data-narration="Definition: A process is an independent unit of execution that runs in its own memory space, sharing the same address space as the parent process.">
      Definition:
    </text>
    <text x="10" y="40" font-size="18" font-family="Arial" fill="#fff" data-narration="Each process has its own program counter, stack, and local variables.">
      Each process has its own program counter, stack, and local variables.
    </text>
  </g>
  
  <!-- Section 2: Characteristics -->
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#fff" data-narration="Autonomy: Each process has its own program execution, and it can run independently of other processes.">
      Autonomy:
    </text>
    <text x="10" y="40" font-size="18" font-family="Arial" fill="#fff" data-narration="Resource allocation: Processes can share or allocate resources such as memory, I/O devices, and files.">
      Resource allocation:
    </text>
    <text x="10" y="60" font-size="18" font-family="Arial" fill="#fff" data-narration="Communication: Processes can exchange data with each other through inter-process communication (IPC) mechanisms.">
      Communication:
    </text>
  </g>
  
  <!-- Section 3: Process Scheduling -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#fff" data-narration="Process Scheduling: The discipline of allocating a shared resource (CPU) to a set of processes, optimizing their execution over time.">
      Process Scheduling:
    </text>
    <text x="10" y="40" font-size="18" font-family="Arial" fill="#fff" data-narration="Types of Process Scheduling: Preemptive Scheduling and Non-Preemptive Scheduling.">
      Types of Process Scheduling:
    </text>
  </g>
  
  <!-- Section 4: Algorithms -->
  <g transform="translate(50, 270)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#fff" data-narration="First-Come-First-Served (FCFS): The process that arrives first is executed first.">
      First-Come-First-Served (FCFS):
    </text>
    <text x="10" y="40" font-size="18" font-family="Arial" fill="#fff" data-narration="Shortest Job First (SJF): The process with the shortest execution time is executed first.">
      Shortest Job First (SJF):
    </text>
    <text x="10" y="60" font-size="18" font-family="Arial" fill="#fff" data-narration="Prioritized Scheduling: The operating system assigns a priority to each process, and the highest-priority process is executed first.">
      Prioritized Scheduling:
    </text>
  </g>
  
  <!-- Section 5: Context Switching -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#fff" data-narration="Context Switching: The process of switching from one process to another.">
      Context Switching:
    </text>
  </g>
  
  <!-- Footer -->
  <text x="50%" y="380%" font-size="24" font-family="Arial" fill="#FFC107" data-narration="Thread Libraries Textbook 1: Chapter 3">
    Thread Libraries Textbook 1: Chapter 3
  </text>
  
  <!-- Arrow markers for connections -->
  <line x1="50%" y1="20%" x2="50%" y2="200%" stroke="#FFC107" stroke-width="2"/>
  <line x1="50%" y1="200%" x2="50%" y2="20%" stroke="#FFC107" stroke-width="2"/>
</svg>