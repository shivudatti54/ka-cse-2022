<svg width="420" height="400" data-topic-id="interprocess-communication-multi-threaded-programming">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"></stop>
    </linearGradient>
  </defs>
  <title>Interprocess Communication Multi-threaded Programming</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"></rect>
  <g opacity="0.8">
    <animate attributeName="opacity" begin="0s" dur="3s" repeatCount="indefinite" />
  </g>
  <text x="20" y="30" text-anchor="start" font-size="24" fill="#3498db">Introduction</text>
  <rect x="50" y="50" width="300" height="50" fill="#fff" rx="10" data-narration="Interprocess Communication refers to the exchange of data between multiple processes or threads.">
    <animate attributeName="opacity" begin="0s" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <path d="M 60 80 V 120 H 300 V 80 L 60 80 Z" stroke="#3480db" stroke-width="2" fill="none" data-narration="Synchronous IPC: The receiving process waits for the sending process to finish before continuing.">
    <animate attributeName="stroke-width" begin="0s" dur="1.5s" repeatCount="indefinite" />
  </path>
  <rect x="50" y="150" width="300" height="50" fill="#fff" rx="10" data-narration="Asynchronous IPC: The receiving process can continue executing while waiting for the sending process to finish.">
    <animate attributeName="opacity" begin="2s" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <path d="M 60 220 V 280 H 300 V 220 L 60 220 Z" stroke="#3498db" stroke-width="2" fill="none" data-narration="Message Passing: Data is passed between processes using messages. This method allows for asynchronous communication.">
    <animate attributeName="stroke-width" begin="3.5s" dur="1.5s" repeatCount="indefinite" />
  </path>
  <rect x="50" y="280" width="300" height="50" fill="#fff" rx="10" data-narration="Shared Memory: Multiple processes share the same memory space, allowing for fast and efficient communication. This method also allows for asynchronous communication.">
    <animate attributeName="opacity" begin="5s" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <g transform="rotate(45 340 300)">
    <path d="M 10 10 H 400 V 400 H 10 L 10 10 Z" stroke="#26a6da" stroke-width="2" fill="none"></path>
  </g>
  <text x="20" y="420" text-anchor="start" font-size="24" fill="#3498db">Conclusion</text>
</svg>