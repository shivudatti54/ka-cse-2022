<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="multithreading-models">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- GROUP 1: Title and Introduction (0.3s) -->
  <g opacity="0" data-narration="Multithreading models define how user-level threads map to kernel-level threads. Let us explore the three primary models.">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Multithreading Models</text>
    <text x="210" y="46" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">User Threads to Kernel Threads Mapping</text>
    <!-- Divider line -->
    <line x1="30" y1="54" x2="390" y2="54" stroke="#3949AB" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- GROUP 2: Many-to-One Model (1.5s) -->
  <g opacity="0" data-narration="Many-to-One: Multiple user threads map to a single kernel thread. Thread management is in user space, but one blocking call blocks all threads. Cannot use multiple CPUs.">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="1.5s" fill="freeze"/>
    <!-- Section label -->
    <text x="30" y="74" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">1. Many-to-One</text>
    <!-- User threads row -->
    <rect x="30" y="82" width="44" height="24" rx="4" fill="#3949AB"/>
    <text x="52" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="white">UT1</text>
    <rect x="80" y="82" width="44" height="24" rx="4" fill="#3949AB"/>
    <text x="102" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="white">UT2</text>
    <rect x="130" y="82" width="44" height="24" rx="4" fill="#3949AB"/>
    <text x="152" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="white">UT3</text>
    <rect x="180" y="82" width="44" height="24" rx="4" fill="#3949AB"/>
    <text x="202" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="white">UT4</text>
    <!-- Arrows converging to single kernel thread -->
    <line x1="52" y1="106" x2="127" y2="122" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <line x1="102" y1="106" x2="127" y2="122" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <line x1="152" y1="106" x2="137" y2="122" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <line x1="202" y1="106" x2="147" y2="122" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <!-- Single kernel thread -->
    <rect x="110" y="124" width="54" height="24" rx="4" fill="#C62828"/>
    <text x="137" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="white">KT1</text>
    <!-- Traits -->
    <text x="260" y="92" font-family="Arial" font-size="9" fill="#C62828">Blocks all if one blocks</text>
    <text x="260" y="105" font-family="Arial" font-size="9" fill="#C62828">Single CPU only</text>
    <text x="260" y="118" font-family="Arial" font-size="9" fill="#00695C">Fast user-space mgmt</text>
    <text x="260" y="131" font-family="Arial" font-size="8" fill="#3949AB">Ex: Green threads (old Java)</text>
  </g>

  <!-- GROUP 3: One-to-One Model (3.0s) -->
  <g opacity="0" data-narration="One-to-One: Each user thread maps to its own kernel thread. This provides true concurrency and multiprocessor support, but creating too many kernel threads adds overhead.">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="3.0s" fill="freeze"/>
    <!-- Section label -->
    <text x="30" y="170" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">2. One-to-One</text>
    <!-- User threads row -->
    <rect x="30" y="178" width="44" height="24" rx="4" fill="#00695C"/>
    <text x="52" y="194" text-anchor="middle" font-family="monospace" font-size="9" fill="white">UT1</text>
    <rect x="80" y="178" width="44" height="24" rx="4" fill="#00695C"/>
    <text x="102" y="194" text-anchor="middle" font-family="monospace" font-size="9" fill="white">UT2</text>
    <rect x="130" y="178" width="44" height="24" rx="4" fill="#00695C"/>
    <text x="152" y="194" text-anchor="middle" font-family="monospace" font-size="9" fill="white">UT3</text>
    <!-- Arrows one-to-one -->
    <line x1="52" y1="202" x2="52" y2="218" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <line x1="102" y1="202" x2="102" y2="218" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <line x1="152" y1="202" x2="152" y2="218" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
    <!-- Kernel threads row -->
    <rect x="30" y="220" width="44" height="24" rx="4" fill="#C62828"/>
    <text x="52" y="236" text-anchor="middle" font-family="monospace" font-size="9" fill="white">KT1</text>
    <rect x="80" y="220" width="44" height="24" rx="4" fill="#C62828"/>
    <text x="102" y="236" text-anchor="middle" font-family="monospace" font-size="9" fill="white">KT2</text>
    <rect x="130" y="220" width="44" height="24" rx="4" fill="#C62828"/>
    <text x="152" y="236" text-anchor="middle" font-family="monospace" font-size="9" fill="white">KT3</text>
    <!-- Traits -->
    <text x="260" y="188" font-family="Arial" font-size="9" fill="#00695C">True concurrency</text>
    <text x="260" y="201" font-family="Arial" font-size="9" fill="#00695C">Multiprocessor support</text>
    <text x="260" y="214" font-family="Arial" font-size="9" fill="#C62828">Kernel thread overhead</text>
    <text x="260" y="227" font-family="Arial" font-size="8" fill="#3949AB">Ex: Linux, Windows, modern Java</text>
  </g>

  <!-- GROUP 4: Many-to-Many Model (4.5s) -->
  <g opacity="0" data-narration="Many-to-Many: Multiple user threads multiplex onto a smaller or equal number of kernel threads. Developers create as many user threads as needed while the OS manages kernel threads for parallelism.">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="4.5s" fill="freeze"/>
    <!-- Section label -->
    <text x="30" y="264" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">3. Many-to-Many</text>
    <!-- User threads row -->
    <rect x="15" y="272" width="38" height="24" rx="4" fill="#E65100"/>
    <text x="34" y="288" text-anchor="middle" font-family="monospace" font-size="8" fill="white">UT1</text>
    <rect x="58" y="272" width="38" height="24" rx="4" fill="#E65100"/>
    <text x="77" y="288" text-anchor="middle" font-family="monospace" font-size="8" fill="white">UT2</text>
    <rect x="101" y="272" width="38" height="24" rx="4" fill="#E65100"/>
    <text x="120" y="288" text-anchor="middle" font-family="monospace" font-size="8" fill="white">UT3</text>
    <rect x="144" y="272" width="38" height="24" rx="4" fill="#E65100"/>
    <text x="163" y="288" text-anchor="middle" font-family="monospace" font-size="8" fill="white">UT4</text>
    <rect x="187" y="272" width="38" height="24" rx="4" fill="#E65100"/>
    <text x="206" y="288" text-anchor="middle" font-family="monospace" font-size="8" fill="white">UT5</text>
    <!-- Arrows many-to-fewer -->
    <line x1="34" y1="296" x2="62" y2="314" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <line x1="77" y1="296" x2="72" y2="314" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <line x1="120" y1="296" x2="82" y2="314" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <line x1="163" y1="296" x2="157" y2="314" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <line x1="206" y1="296" x2="167" y2="314" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <!-- Kernel threads row (fewer) -->
    <rect x="47" y="316" width="50" height="24" rx="4" fill="#C62828"/>
    <text x="72" y="332" text-anchor="middle" font-family="monospace" font-size="9" fill="white">KT1</text>
    <rect x="137" y="316" width="50" height="24" rx="4" fill="#C62828"/>
    <text x="162" y="332" text-anchor="middle" font-family="monospace" font-size="9" fill="white">KT2</text>
    <!-- Traits -->
    <text x="260" y="282" font-family="Arial" font-size="9" fill="#00695C">Best of both worlds</text>
    <text x="260" y="295" font-family="Arial" font-size="9" fill="#00695C">Flexible thread creation</text>
    <text x="260" y="308" font-family="Arial" font-size="9" fill="#00695C">OS adjusts kernel threads</text>
    <text x="260" y="321" font-family="Arial" font-size="8" fill="#3949AB">Ex: Solaris, IRIX, HP-UX</text>
  </g>

  <!-- GROUP 5: Thread Libraries (6.0s) -->
  <g opacity="0" data-narration="Three major thread libraries are Pthreads for UNIX systems, Windows Thread API for Windows, and Java Threads which are cross-platform. Each provides create, join, and exit operations.">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="6.0s" fill="freeze"/>
    <line x1="30" y1="350" x2="390" y2="350" stroke="#3949AB" stroke-width="1" stroke-opacity="0.4"/>
    <text x="30" y="366" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Thread Libraries:</text>
    <!-- Pthreads pill -->
    <rect x="140" y="354" width="70" height="20" rx="10" fill="#3949AB"/>
    <text x="175" y="368" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Pthreads</text>
    <!-- Windows pill -->
    <rect x="216" y="354" width="70" height="20" rx="10" fill="#00695C"/>
    <text x="251" y="368" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Win32</text>
    <!-- Java pill -->
    <rect x="292" y="354" width="70" height="20" rx="10" fill="#E65100"/>
    <text x="327" y="368" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Java</text>
  </g>

  <!-- GROUP 6: Key Takeaway (7.5s) -->
  <g opacity="0" data-narration="Key takeaway: Many-to-One is fast but limited. One-to-One offers true parallelism at higher cost. Many-to-Many balances flexibility and performance. Choose the model based on concurrency needs.">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="7.5s" fill="freeze"/>
    <rect x="30" y="380" width="360" height="16" rx="3" fill="#3949AB" fill-opacity="0.1"/>
    <text x="210" y="393" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">M:1 = fast, limited | 1:1 = true parallel | M:M = balanced flexibility</text>
  </g>
</svg>