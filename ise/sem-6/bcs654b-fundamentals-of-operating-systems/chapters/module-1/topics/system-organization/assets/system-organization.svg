<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="system-organization">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="hierGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="flashGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <linearGradient id="sramGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#EF6C00"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1A237E">Memory Organization in Microcontrollers</text>

  <!-- GROUP 1: Memory Hierarchy Pyramid (0.3s) -->
  <g data-narration="The memory hierarchy has four levels: CPU Registers are the fastest and smallest, Cache is very fast, Main Memory uses SRAM and Flash, and External Memory is the slowest but largest." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>

    <text x="20" y="50" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Memory Hierarchy</text>

    <!-- Pyramid level 1 - Registers -->
    <polygon points="105,58 145,58 155,74 95,74" fill="#3949AB" filter="url(#shadow)">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
    </polygon>
    <text x="125" y="70" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Registers</text>

    <!-- Pyramid level 2 - Cache -->
    <polygon points="95,76 155,76 170,92 80,92" fill="#5C6BC0" filter="url(#shadow)">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
    </polygon>
    <text x="125" y="88" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Cache (SRAM)</text>

    <!-- Pyramid level 3 - Main Memory -->
    <polygon points="80,94 170,94 185,110 65,110" fill="#7986CB" filter="url(#shadow)">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.7s" fill="freeze"/>
    </polygon>
    <text x="125" y="106" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Main (Flash/SRAM)</text>

    <!-- Pyramid level 4 - External -->
    <polygon points="65,112 185,112 200,128 50,128" fill="#9FA8DA" filter="url(#shadow)">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.9s" fill="freeze"/>
    </polygon>
    <text x="125" y="124" text-anchor="middle" font-family="Arial" font-size="8" fill="#1A237E" font-weight="bold">External Storage</text>

    <!-- Speed / Size arrows -->
    <text x="38" y="74" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Fast</text>
    <line x1="38" y1="77" x2="38" y2="120" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
    <text x="38" y="128" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">Slow</text>

    <text x="212" y="74" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Small</text>
    <line x1="212" y1="77" x2="212" y2="120" stroke="#E65100" stroke-width="1.2"/>
    <text x="212" y="128" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Large</text>
  </g>

  <!-- GROUP 2: Harvard vs Von Neumann Architecture (1.5s) -->
  <g data-narration="Harvard architecture uses separate buses for program and data memory, allowing simultaneous access. Von Neumann uses a single shared bus for both, which is simpler but slower." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>

    <text x="260" y="50" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Architecture Models</text>

    <!-- Harvard Architecture -->
    <rect x="240" y="56" width="168" height="72" fill="white" rx="6" stroke="#3949AB" stroke-width="1" filter="url(#shadow)" opacity="0.9"/>
    <text x="324" y="68" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Harvard Architecture</text>

    <rect x="250" y="73" width="62" height="20" fill="#00695C" rx="3"/>
    <text x="281" y="86" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Program Mem</text>

    <rect x="336" y="73" width="62" height="20" fill="#E65100" rx="3"/>
    <text x="367" y="86" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Data Mem</text>

    <line x1="281" y1="93" x2="281" y2="105" stroke="#00695C" stroke-width="1.5"/>
    <line x1="367" y1="93" x2="367" y2="105" stroke="#E65100" stroke-width="1.5"/>

    <rect x="270" y="105" width="108" height="18" fill="url(#hierGrad)" rx="3"/>
    <text x="324" y="117" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">CPU Core</text>

    <!-- Von Neumann -->
    <rect x="240" y="133" width="168" height="50" fill="white" rx="6" stroke="#C62828" stroke-width="1" filter="url(#shadow)" opacity="0.9"/>
    <text x="324" y="146" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Von Neumann</text>

    <rect x="258" y="152" width="80" height="16" fill="#C62828" rx="3"/>
    <text x="298" y="163" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Unified Memory</text>

    <line x1="338" y1="160" x2="353" y2="160" stroke="#C62828" stroke-width="1.5"/>
    <rect x="353" y="152" width="42" height="16" fill="url(#hierGrad)" rx="3"/>
    <text x="374" y="163" text-anchor="middle" font-family="Arial" font-size="7" fill="white">CPU</text>
  </g>

  <!-- GROUP 3: Memory Technologies (3.0s) -->
  <g data-narration="Volatile memory like SRAM loses data without power but is fast. Non-volatile memory like Flash and EEPROM retains data without power and is used for program storage." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>

    <text x="20" y="152" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Memory Technologies</text>

    <!-- Volatile box -->
    <rect x="14" y="158" width="100" height="78" fill="white" rx="5" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,2" filter="url(#shadow)"/>
    <text x="64" y="172" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Volatile</text>
    <text x="64" y="182" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">(needs power)</text>

    <rect x="24" y="188" width="80" height="16" fill="url(#sramGrad)" rx="3">
      <animate attributeName="width" from="0" to="80" dur="0.5s" begin="3.2s" fill="freeze"/>
    </rect>
    <text x="64" y="199" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">SRAM</text>

    <text x="64" y="215" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">6T cell, no refresh</text>
    <text x="64" y="225" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">10-50ns access</text>

    <!-- Non-volatile box -->
    <rect x="120" y="158" width="110" height="78" fill="white" rx="5" stroke="#00695C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="175" y="172" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Non-Volatile</text>
    <text x="175" y="182" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">(retains data)</text>

    <rect x="128" y="188" width="46" height="16" fill="url(#flashGrad)" rx="3">
      <animate attributeName="width" from="0" to="46" dur="0.4s" begin="3.4s" fill="freeze"/>
    </rect>
    <text x="151" y="199" text-anchor="middle" font-family="monospace" font-size="7" fill="white" font-weight="bold">Flash</text>

    <rect x="178" y="188" width="46" height="16" fill="#00695C" rx="3">
      <animate attributeName="width" from="0" to="46" dur="0.4s" begin="3.6s" fill="freeze"/>
    </rect>
    <text x="201" y="199" text-anchor="middle" font-family="monospace" font-size="7" fill="white" font-weight="bold">EEPROM</text>

    <text x="175" y="215" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Flash: 10K-100K cycles</text>
    <text x="175" y="225" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">EEPROM: byte-erase</text>
    <text x="175" y="234" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">FRAM: 10^13 cycles</text>
  </g>

  <!-- GROUP 4: Memory Map - 8051 Address Space (4.5s) -->
  <g data-narration="The 8051 memory map shows code memory starting at address 0x0000, internal RAM at 128 bytes with SFRs at 0x80 to 0xFF, and optional external RAM up to 64KB." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>

    <text x="20" y="252" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">8051 Memory Map</text>

    <!-- Address space blocks -->
    <rect x="14" y="258" width="104" height="22" fill="#3949AB" rx="3" filter="url(#shadow)">
      <animate attributeName="width" from="0" to="104" dur="0.4s" begin="4.6s" fill="freeze"/>
    </rect>
    <text x="66" y="272" text-anchor="middle" font-family="monospace" font-size="7" fill="white">0x0000 Code (ROM)</text>

    <rect x="14" y="282" width="104" height="22" fill="#5C6BC0" rx="3" filter="url(#shadow)">
      <animate attributeName="width" from="0" to="104" dur="0.4s" begin="4.8s" fill="freeze"/>
    </rect>
    <text x="66" y="296" text-anchor="middle" font-family="monospace" font-size="7" fill="white">0x00-0x7F RAM 128B</text>

    <rect x="14" y="306" width="104" height="22" fill="#7986CB" rx="3" filter="url(#shadow)">
      <animate attributeName="width" from="0" to="104" dur="0.4s" begin="5.0s" fill="freeze"/>
    </rect>
    <text x="66" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="white">0x80-0xFF SFRs</text>

    <rect x="14" y="330" width="104" height="22" fill="#9FA8DA" rx="3" filter="url(#shadow)">
      <animate attributeName="width" from="0" to="104" dur="0.4s" begin="5.2s" fill="freeze"/>
    </rect>
    <text x="66" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#1A237E">0x0100 Ext RAM (opt)</text>

    <!-- Reset vector annotation -->
    <line x1="120" y1="264" x2="135" y2="264" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="137" y="267" font-family="Arial" font-size="7" fill="#C62828">Reset Vector</text>
  </g>

  <!-- GROUP 5: Special Function Registers (6.0s) -->
  <g data-narration="Special Function Registers or SFRs are memory-mapped registers controlling peripherals. Key examples include the Accumulator at 0xE0, Stack Pointer at 0x81, and Port registers like P0 at 0x80." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>

    <text x="148" y="252" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Key SFRs (8051)</text>

    <!-- SFR Table -->
    <rect x="138" y="258" width="130" height="14" fill="#3949AB" rx="2"/>
    <text x="170" y="268" font-family="monospace" font-size="7" fill="white" font-weight="bold">Name</text>
    <text x="220" y="268" font-family="monospace" font-size="7" fill="white" font-weight="bold">Addr</text>
    <text x="254" y="268" font-family="monospace" font-size="7" fill="white" font-weight="bold">Use</text>

    <rect x="138" y="273" width="130" height="13" fill="#E8EAF6" rx="1"/>
    <text x="170" y="283" text-anchor="middle" font-family="monospace" font-size="7" fill="#1A237E">ACC</text>
    <text x="220" y="283" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">0xE0</text>
    <text x="254" y="283" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Accum</text>

    <rect x="138" y="287" width="130" height="13" fill="white" rx="1"/>
    <text x="170" y="297" text-anchor="middle" font-family="monospace" font-size="7" fill="#1A237E">SP</text>
    <text x="220" y="297" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">0x81</text>
    <text x="254" y="297" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Stack</text>

    <rect x="138" y="301" width="130" height="13" fill="#E8EAF6" rx="1"/>
    <text x="170" y="311" text-anchor="middle" font-family="monospace" font-size="7" fill="#1A237E">PSW</text>
    <text x="220" y="311" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">0xD0</text>
    <text x="254" y="311" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Status</text>

    <rect x="138" y="315" width="130" height="13" fill="white" rx="1"/>
    <text x="170" y="325" text-anchor="middle" font-family="monospace" font-size="7" fill="#1A237E">P0</text>
    <text x="220" y="325" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">0x80</text>
    <text x="254" y="325" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Port 0</text>

    <rect x="138" y="329" width="130" height="13" fill="#E8EAF6" rx="1"/>
    <text x="170" y="339" text-anchor="middle" font-family="monospace" font-size="7" fill="#1A237E">TCON</text>
    <text x="220" y="339" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">0x88</text>
    <text x="254" y="339" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Timer</text>

    <rect x="138" y="343" width="130" height="13" fill="white" rx="1"/>
    <text x="170" y="353" text-anchor="middle" font-family="monospace" font-size="7" fill="#1A237E">IE</text>
    <text x="220" y="353" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">0xA8</text>
    <text x="254" y="353" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Intrpt</text>
  </g>

  <!-- GROUP 6: Addressing Modes (7.5s) -->
  <g data-narration="Microcontrollers support five addressing modes: Direct addressing accesses memory by explicit address, Indirect uses a pointer in a register, Register addressing is fastest, Indexed combines base plus offset, and Bit addressing manipulates individual bits." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>

    <text x="280" y="198" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Addressing Modes</text>

    <!-- Direct -->
    <rect x="278" y="204" width="130" height="24" fill="white" rx="4" stroke="#3949AB" stroke-width="1" filter="url(#shadow)"/>
    <text x="296" y="219" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Direct</text>
    <text x="360" y="219" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">MOV A, 30h</text>

    <!-- Indirect -->
    <rect x="278" y="231" width="130" height="24" fill="white" rx="4" stroke="#00695C" stroke-width="1" filter="url(#shadow)"/>
    <text x="296" y="246" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Indirect</text>
    <text x="364" y="246" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">MOV A, @R0</text>

    <!-- Register -->
    <rect x="278" y="258" width="130" height="24" fill="white" rx="4" stroke="#E65100" stroke-width="1" filter="url(#shadow)"/>
    <text x="296" y="273" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">Register</text>
    <text x="364" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">MOV R1, R2</text>

    <!-- Indexed -->
    <rect x="278" y="285" width="130" height="24" fill="white" rx="4" stroke="#C62828" stroke-width="1" filter="url(#shadow)"/>
    <text x="296" y="300" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Indexed</text>
    <text x="368" y="300" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">LDR R0,[R1,#4]</text>

    <!-- Bit -->
    <rect x="278" y="312" width="130" height="24" fill="white" rx="4" stroke="#3949AB" stroke-width="1" filter="url(#shadow)"/>
    <text x="296" y="327" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Bit</text>
    <text x="362" y="327" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">SETB 20h.0</text>

    <!-- Stack note at bottom -->
    <rect x="278" y="342" width="130" height="48" fill="white" rx="5" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" filter="url(#shadow)"/>
    <text x="343" y="356" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Stack (LIFO)</text>
    <text x="343" y="368" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">SP tracks top</text>
    <text x="343" y="378" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Return addr + context</text>
    <text x="343" y="388" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">PUSH / POP ops</text>
  </g>
</svg>