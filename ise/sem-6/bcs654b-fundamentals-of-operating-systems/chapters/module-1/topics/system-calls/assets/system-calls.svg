<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="system-calls">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <linearGradient id="trapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#F57C00"/>
    </linearGradient>
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C62828"/>
      <stop offset="100%" style="stop-color:#E53935"/>
    </linearGradient>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0 z" fill="#3949AB"/>
    </marker>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 z" fill="#C62828"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">System Call Execution Flow</text>

  <!-- Dividing line: User Mode / Kernel Mode -->
  <line x1="20" y1="220" x2="400" y2="220" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="30" y="214" font-family="Arial" font-size="9" fill="#3949AB" font-weight="bold" opacity="0.7">USER MODE</text>
  <text x="30" y="232" font-family="Arial" font-size="9" fill="#C62828" font-weight="bold" opacity="0.7">KERNEL MODE</text>

  <!-- GROUP 1: User Application calls read() -->
  <g data-narration="The user application invokes the read() API function from the C standard library to request data from a file." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
    <rect x="30" y="38" width="170" height="48" fill="url(#userGrad)" rx="8" filter="url(#shadow)"/>
    <text x="115" y="57" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">User Application</text>
    <text x="115" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="#C5CAE9">bytes = read(fd, buf, n)</text>
    <!-- Step number -->
    <circle cx="45" cy="48" r="8" fill="white" opacity="0.9"/>
    <text x="45" y="52" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">1</text>
  </g>

  <!-- GROUP 2: API Library prepares parameters -->
  <g data-narration="The C library function prepares arguments: file descriptor in register, buffer pointer, and byte count. It sets the system call number in the EAX register." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>
    <rect x="220" y="38" width="170" height="48" fill="url(#apiGrad)" rx="8" filter="url(#shadow)"/>
    <text x="305" y="57" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">C Library (API)</text>
    <text x="305" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="#B2DFDB">eax = SYS_READ (0)</text>
    <!-- Step number -->
    <circle cx="235" cy="48" r="8" fill="white" opacity="0.9"/>
    <text x="235" y="52" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">2</text>
    <!-- Arrow from App to Library -->
    <line x1="200" y1="62" x2="218" y2="62" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowDown)">
      <animate attributeName="x2" from="200" to="218" dur="0.3s" begin="1.5s" fill="freeze"/>
    </line>
    <text x="209" y="56" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">call</text>
  </g>

  <!-- GROUP 3: Trap instruction triggers mode switch -->
  <g data-narration="The library executes the syscall instruction, triggering a trap. The CPU saves the user process state and switches from user mode to kernel mode." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>
    <rect x="100" y="105" width="220" height="48" fill="url(#trapGrad)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="124" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Trap: Mode Switch</text>
    <text x="210" y="142" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFE0B2">syscall / int 0x80</text>
    <!-- Step number -->
    <circle cx="115" cy="115" r="8" fill="white" opacity="0.9"/>
    <text x="115" y="119" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">3</text>
    <!-- Arrow down from Library -->
    <path d="M305 86 Q305 96 260 96 L210 96 L210 103" stroke="#00695C" stroke-width="2" fill="none" marker-end="url(#arrowDown)">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.0s" fill="freeze"/>
    </path>
    <!-- Animated flash effect for trap -->
    <rect x="98" y="103" width="224" height="52" fill="none" stroke="#E65100" stroke-width="2" rx="9">
      <animate attributeName="stroke-opacity" values="1;0.2;1;0.2;1" dur="1.2s" begin="3.0s" fill="freeze"/>
    </rect>
    <!-- Mode labels -->
    <text x="100" y="170" font-family="Arial" font-size="9" fill="#E65100">
      <tspan>Save state + switch to Kernel Mode</tspan>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.3s" fill="freeze"/>
    </text>
    <!-- Downward arrow crossing the boundary -->
    <line x1="210" y1="175" x2="210" y2="218" stroke="#E65100" stroke-width="2" stroke-dasharray="4,3">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.5s" fill="freeze"/>
    </line>
    <polygon points="204,215 210,225 216,215" fill="#E65100">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    </polygon>
  </g>

  <!-- GROUP 4: Kernel dispatches to handler via system call table -->
  <g data-narration="The kernel trap handler looks up the system call number in the system call table and dispatches execution to the corresponding handler, sys_read()." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>
    <rect x="30" y="245" width="170" height="58" fill="url(#kernelGrad)" rx="8" filter="url(#shadow)"/>
    <text x="115" y="264" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Kernel: Dispatch</text>
    <text x="115" y="280" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFCDD2">syscall_table[eax]</text>
    <text x="115" y="294" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFCDD2">-> sys_read()</text>
    <!-- Step number -->
    <circle cx="45" cy="255" r="8" fill="white" opacity="0.9"/>
    <text x="45" y="259" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">4</text>
    <!-- Arrow from boundary to kernel dispatch -->
    <path d="M210 225 Q210 238 160 238 L115 238 L115 243" stroke="#C62828" stroke-width="2" fill="none">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.5s" fill="freeze"/>
    </path>
  </g>

  <!-- GROUP 5: Kernel executes the handler and returns result -->
  <g data-narration="The kernel executes sys_read(), performs the privileged disk I/O operation, copies data to the user buffer, and prepares the return value in the EAX register." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>
    <rect x="220" y="245" width="170" height="58" fill="url(#kernelGrad)" rx="8" filter="url(#shadow)"/>
    <text x="305" y="264" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Kernel: Execute</text>
    <text x="305" y="280" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFCDD2">sys_read() runs</text>
    <text x="305" y="294" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFCDD2">eax = bytes_read</text>
    <!-- Step number -->
    <circle cx="235" cy="255" r="8" fill="white" opacity="0.9"/>
    <text x="235" y="259" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">5</text>
    <!-- Arrow from dispatch to execute -->
    <line x1="200" y1="274" x2="218" y2="274" stroke="#C62828" stroke-width="2" marker-end="url(#arrowDown)">
      <animate attributeName="x2" from="200" to="218" dur="0.3s" begin="6.0s" fill="freeze"/>
    </line>
  </g>

  <!-- GROUP 6: Return to user mode -->
  <g data-narration="The kernel arranges a return-from-trap. The CPU restores the saved user process state, switches back to user mode, and the application resumes with the result." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>
    <rect x="100" y="330" width="220" height="48" fill="url(#userGrad)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="349" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Return to User Mode</text>
    <text x="210" y="366" text-anchor="middle" font-family="monospace" font-size="10" fill="#C5CAE9">restore state + resume</text>
    <!-- Step number -->
    <circle cx="115" cy="340" r="8" fill="white" opacity="0.9"/>
    <text x="115" y="344" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">6</text>
    <!-- Arrow from execute down to return -->
    <path d="M305 303 Q305 318 260 318 L210 318 L210 328" stroke="#C62828" stroke-width="2" fill="none">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.5s" fill="freeze"/>
    </path>
    <!-- Upward return arrow back to user mode area -->
    <path d="M370 330 Q390 200 370 105 L365 95" stroke="#3949AB" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowUp)">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="8.0s" fill="freeze"/>
    </path>
    <text x="395" y="200" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" writing-mode="tb" opacity="0">
      return
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="8.2s" fill="freeze"/>
    </text>
    <!-- Completion checkmark -->
    <circle cx="380" cy="365" r="12" fill="#00695C" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="8.5s" fill="freeze"/>
    </circle>
    <text x="380" y="370" text-anchor="middle" font-family="Arial" font-size="14" fill="white" opacity="0">
      &#x2713;
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="8.6s" fill="freeze"/>
    </text>
  </g>

  <!-- Category legend at bottom -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.85" dur="0.5s" begin="8.8s" fill="freeze"/>
    <rect x="20" y="385" width="8" height="8" fill="#3949AB" rx="2"/>
    <text x="32" y="392" font-family="Arial" font-size="8" fill="#3949AB">User Mode</text>
    <rect x="90" y="385" width="8" height="8" fill="#00695C" rx="2"/>
    <text x="102" y="392" font-family="Arial" font-size="8" fill="#00695C">API/Library</text>
    <rect x="165" y="385" width="8" height="8" fill="#E65100" rx="2"/>
    <text x="177" y="392" font-family="Arial" font-size="8" fill="#E65100">Trap</text>
    <rect x="210" y="385" width="8" height="8" fill="#C62828" rx="2"/>
    <text x="222" y="392" font-family="Arial" font-size="8" fill="#C62828">Kernel Mode</text>
  </g>
</svg>