<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="application-program-interface">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <linearGradient id="libGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <linearGradient id="drvGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#EF6C00"/>
    </linearGradient>
    <linearGradient id="hwGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C62828"/>
      <stop offset="100%" style="stop-color:#E53935"/>
    </linearGradient>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and header (0.3s) -->
  <g data-narration="The Programmer's Interface is a layered software architecture that connects application programs to graphics hardware through APIs." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">The Programmer's Interface (API)</text>
    <text x="210" y="46" text-anchor="middle" font-family="Arial" font-size="10" fill="#5C6BC0">Layered Architecture of a Graphics System</text>
    <line x1="60" y1="54" x2="360" y2="54" stroke="#3949AB" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- Group 2: Application Program Layer (1.5s) -->
  <g data-narration="The Application Program sits at the top layer. It uses API calls to request graphics operations like drawing shapes and rendering scenes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>
    <rect x="110" y="65" width="200" height="48" fill="url(#appGrad)" rx="8" stroke="#283593" stroke-width="1.5"/>
    <text x="210" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF">Application Program</text>
    <text x="210" y="102" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">drawLine(), renderPolygon()</text>
    <!-- Arrow down -->
    <line x1="210" y1="113" x2="210" y2="133" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="330" y="90" font-family="Arial" font-size="8" fill="#3949AB" font-style="italic">API Calls</text>
    <path d="M318 88 L312 92" stroke="#3949AB" stroke-width="1" fill="none"/>
  </g>

  <!-- Group 3: Graphics Library Layer (3.0s) -->
  <g data-narration="The Graphics Library provides pre-written functions for common graphics tasks. It translates high-level API calls into lower-level device-specific commands." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>
    <rect x="90" y="138" width="240" height="48" fill="url(#libGrad)" rx="8" stroke="#004D40" stroke-width="1.5"/>
    <text x="210" y="158" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF">Graphics Library</text>
    <text x="210" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#B2DFDB">OpenGL, DirectX, Vulkan</text>
    <!-- Arrow down -->
    <line x1="210" y1="186" x2="210" y2="206" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="348" y="158" font-family="Arial" font-size="8" fill="#00695C" font-style="italic">Translates</text>
    <text x="348" y="168" font-family="Arial" font-size="8" fill="#00695C" font-style="italic">Commands</text>
  </g>

  <!-- Group 4: Device Driver Layer (4.5s) -->
  <g data-narration="The Device Driver manages interaction between the graphics library and the hardware. It converts generic commands into hardware-specific instructions." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>
    <rect x="90" y="211" width="240" height="48" fill="url(#drvGrad)" rx="8" stroke="#BF360C" stroke-width="1.5"/>
    <text x="210" y="231" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF">Device Driver</text>
    <text x="210" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFE0B2">GPU driver, display adapter</text>
    <!-- Arrow down -->
    <line x1="210" y1="259" x2="210" y2="279" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="348" y="231" font-family="Arial" font-size="8" fill="#E65100" font-style="italic">HW-Specific</text>
    <text x="348" y="241" font-family="Arial" font-size="8" fill="#E65100" font-style="italic">Instructions</text>
  </g>

  <!-- Group 5: Graphics Hardware Layer (6.0s) -->
  <g data-narration="The Graphics Hardware is the physical GPU that executes rendering operations. It performs vertex processing, geometry transformation, and pixel rendering at high speed." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>
    <rect x="110" y="284" width="200" height="48" fill="url(#hwGrad)" rx="8" stroke="#B71C1C" stroke-width="1.5"/>
    <text x="210" y="304" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF">Graphics Hardware</text>
    <text x="210" y="321" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFCDD2">GPU / Display Unit</text>
    <!-- Chip icon decoration -->
    <rect x="125" y="296" width="14" height="14" fill="none" stroke="#FFCDD2" stroke-width="1" rx="2"/>
    <line x1="128" y1="300" x2="136" y2="300" stroke="#FFCDD2" stroke-width="0.8"/>
    <line x1="128" y1="304" x2="136" y2="304" stroke="#FFCDD2" stroke-width="0.8"/>
    <line x1="132" y1="297" x2="132" y2="309" stroke="#FFCDD2" stroke-width="0.8"/>
  </g>

  <!-- Group 6: Pipeline Functions (7.5s) -->
  <g data-narration="The graphics pipeline performs three key functions: Vertex Processing handles 3D model points, Geometry Transformation applies rotation, translation, and scaling, and Pixel Rendering draws the final output." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>
    <line x1="30" y1="345" x2="390" y2="345" stroke="#3949AB" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="210" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Graphics Pipeline Functions</text>

    <!-- Vertex Processing -->
    <rect x="18" y="368" width="120" height="24" fill="#3949AB" rx="5" opacity="0.9"/>
    <text x="78" y="384" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FFFFFF">Vertex Processing</text>

    <!-- Geometry Transformation -->
    <rect x="150" y="368" width="120" height="24" fill="#00695C" rx="5" opacity="0.9"/>
    <text x="210" y="384" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FFFFFF">Geometry Transform</text>

    <!-- Pixel Rendering -->
    <rect x="282" y="368" width="120" height="24" fill="#E65100" rx="5" opacity="0.9"/>
    <text x="342" y="384" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FFFFFF">Pixel Rendering</text>

    <!-- Small arrows between function boxes -->
    <line x1="138" y1="380" x2="148" y2="380" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="270" y1="380" x2="280" y2="380" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>
</svg>