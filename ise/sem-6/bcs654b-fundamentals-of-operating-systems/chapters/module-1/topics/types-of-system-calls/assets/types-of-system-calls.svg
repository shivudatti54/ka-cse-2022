<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="types-of-system-calls">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00695C"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and User-Kernel boundary diagram (0.3s) -->
  <g data-narration="System calls are the only gateway between user applications running in user mode and the OS kernel running in kernel mode. They provide a secure, controlled interface for requesting privileged services.">
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB" opacity="0">
      Types of System Calls
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    </text>
    <!-- User Mode box -->
    <rect x="20" y="38" width="175" height="42" fill="#3949AB" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
    </rect>
    <text x="107" y="55" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white" opacity="0">
      USER MODE
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
    </text>
    <text x="107" y="72" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9" opacity="0">
      read(), fork(), open()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
    </text>
    <!-- Arrow between modes -->
    <line x1="200" y1="59" x2="220" y2="59" stroke="#E65100" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
    </line>
    <text x="210" y="52" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100" opacity="0">
      trap
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
    </text>
    <!-- Kernel Mode box -->
    <rect x="225" y="38" width="175" height="42" fill="#00695C" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
    </rect>
    <text x="312" y="55" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white" opacity="0">
      KERNEL MODE
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
    </text>
    <text x="312" y="72" text-anchor="middle" font-family="monospace" font-size="9" fill="#B2DFDB" opacity="0">
      sys_read(), sys_fork()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
    </text>
  </g>

  <!-- Group 2: Process Control & File Management categories (1.5s) -->
  <g data-narration="The first two categories are Process Control, which manages process creation, execution and termination using calls like fork and exec, and File Management, which handles file operations like open, read, write and close.">
    <!-- Section label -->
    <text x="210" y="102" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB" opacity="0">
      Six Categories of System Calls
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
    </text>
    <!-- Process Control -->
    <rect x="16" y="112" width="190" height="54" fill="white" stroke="#3949AB" stroke-width="1.5" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.7s" fill="freeze"/>
    </rect>
    <circle cx="34" cy="128" r="9" fill="#3949AB" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
    </circle>
    <text x="34" y="132" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white" opacity="0">
      1
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
    </text>
    <text x="50" y="131" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB" opacity="0">
      Process Control
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.9s" fill="freeze"/>
    </text>
    <text x="30" y="148" font-family="monospace" font-size="8" fill="#555" opacity="0">
      fork() exec() exit() wait()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
    </text>
    <text x="30" y="160" font-family="Arial" font-size="8" fill="#777" opacity="0">
      Create, manage, terminate processes
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
    </text>
    <!-- File Management -->
    <rect x="214" y="112" width="190" height="54" fill="white" stroke="#00695C" stroke-width="1.5" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.1s" fill="freeze"/>
    </rect>
    <circle cx="232" cy="128" r="9" fill="#00695C" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
    </circle>
    <text x="232" y="132" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white" opacity="0">
      2
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
    </text>
    <text x="248" y="131" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C" opacity="0">
      File Management
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.3s" fill="freeze"/>
    </text>
    <text x="228" y="148" font-family="monospace" font-size="8" fill="#555" opacity="0">
      open() read() write() close()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
    </text>
    <text x="228" y="160" font-family="Arial" font-size="8" fill="#777" opacity="0">
      Create, delete, read, write files
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
    </text>
  </g>

  <!-- Group 3: Device Management & Information Maintenance (3.0s) -->
  <g data-narration="Device Management handles requesting and releasing devices with calls like ioctl, while Information Maintenance deals with getting and setting system data such as time and process attributes using getpid and gettimeofday.">
    <!-- Device Management -->
    <rect x="16" y="174" width="190" height="54" fill="white" stroke="#E65100" stroke-width="1.5" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.0s" fill="freeze"/>
    </rect>
    <circle cx="34" cy="190" r="9" fill="#E65100" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.1s" fill="freeze"/>
    </circle>
    <text x="34" y="194" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white" opacity="0">
      3
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.1s" fill="freeze"/>
    </text>
    <text x="50" y="193" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100" opacity="0">
      Device Management
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.2s" fill="freeze"/>
    </text>
    <text x="30" y="210" font-family="monospace" font-size="8" fill="#555" opacity="0">
      ioctl() read() write()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.3s" fill="freeze"/>
    </text>
    <text x="30" y="222" font-family="Arial" font-size="8" fill="#777" opacity="0">
      Request, release, r/w devices
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.3s" fill="freeze"/>
    </text>
    <!-- Information Maintenance -->
    <rect x="214" y="174" width="190" height="54" fill="white" stroke="#C62828" stroke-width="1.5" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.4s" fill="freeze"/>
    </rect>
    <circle cx="232" cy="190" r="9" fill="#C62828" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.5s" fill="freeze"/>
    </circle>
    <text x="232" y="194" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white" opacity="0">
      4
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.5s" fill="freeze"/>
    </text>
    <text x="248" y="193" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828" opacity="0">
      Info Maintenance
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    </text>
    <text x="228" y="210" font-family="monospace" font-size="8" fill="#555" opacity="0">
      getpid() gettimeofday()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.7s" fill="freeze"/>
    </text>
    <text x="228" y="222" font-family="Arial" font-size="8" fill="#777" opacity="0">
      Get/set system data, attributes
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.7s" fill="freeze"/>
    </text>
  </g>

  <!-- Group 4: Communication & Protection (4.5s) -->
  <g data-narration="Communication system calls establish inter-process communication links using pipe, shared memory via shmget, and message queues via msgget. Protection calls control resource access permissions with chmod, chown, and setuid.">
    <!-- Communication -->
    <rect x="16" y="236" width="190" height="54" fill="white" stroke="#3949AB" stroke-width="1.5" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="4.5s" fill="freeze"/>
    </rect>
    <circle cx="34" cy="252" r="9" fill="#3949AB" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.6s" fill="freeze"/>
    </circle>
    <text x="34" y="256" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white" opacity="0">
      5
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.6s" fill="freeze"/>
    </text>
    <text x="50" y="255" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB" opacity="0">
      Communication
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.7s" fill="freeze"/>
    </text>
    <text x="30" y="272" font-family="monospace" font-size="8" fill="#555" opacity="0">
      pipe() shmget() msgget()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.8s" fill="freeze"/>
    </text>
    <text x="30" y="284" font-family="Arial" font-size="8" fill="#777" opacity="0">
      IPC: pipes, shared mem, msg queues
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.8s" fill="freeze"/>
    </text>
    <!-- Protection -->
    <rect x="214" y="236" width="190" height="54" fill="white" stroke="#00695C" stroke-width="1.5" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="4.9s" fill="freeze"/>
    </rect>
    <circle cx="232" cy="252" r="9" fill="#00695C" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.0s" fill="freeze"/>
    </circle>
    <text x="232" y="256" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white" opacity="0">
      6
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.0s" fill="freeze"/>
    </text>
    <text x="248" y="255" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C" opacity="0">
      Protection
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.1s" fill="freeze"/>
    </text>
    <text x="228" y="272" font-family="monospace" font-size="8" fill="#555" opacity="0">
      chmod() chown() setuid()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.2s" fill="freeze"/>
    </text>
    <text x="228" y="284" font-family="Arial" font-size="8" fill="#777" opacity="0">
      Control access, users, perms
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.2s" fill="freeze"/>
    </text>
  </g>

  <!-- Group 5: System Call Execution Flow (6.0s) -->
  <g data-narration="The system call execution flow starts when a user process calls an API function like read. The library prepares parameters and issues a trap instruction like int 0x80, causing the CPU to switch to kernel mode. The kernel executes the handler and returns the result back to user mode.">
    <rect x="16" y="298" width="388" height="52" fill="white" stroke="#E65100" stroke-width="1.5" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="6.0s" fill="freeze"/>
    </rect>
    <text x="210" y="314" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100" opacity="0">
      Execution Flow: API call --> Library prepares args --> Trap (int 0x80) --> Kernel mode
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="6.2s" fill="freeze"/>
    </text>
    <!-- Mini flow boxes -->
    <rect x="24" y="322" width="62" height="20" fill="#3949AB" rx="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.4s" fill="freeze"/>
    </rect>
    <text x="55" y="336" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0">
      read()
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.4s" fill="freeze"/>
    </text>
    <line x1="88" y1="332" x2="100" y2="332" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="6.6s" fill="freeze"/>
    </line>
    <rect x="103" y="322" width="62" height="20" fill="#00695C" rx="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.7s" fill="freeze"/>
    </rect>
    <text x="134" y="336" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0">
      libc
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.7s" fill="freeze"/>
    </text>
    <line x1="167" y1="332" x2="179" y2="332" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="6.9s" fill="freeze"/>
    </line>
    <rect x="182" y="322" width="62" height="20" fill="#E65100" rx="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.0s" fill="freeze"/>
    </rect>
    <text x="213" y="336" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0">
      int 0x80
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.0s" fill="freeze"/>
    </text>
    <line x1="246" y1="332" x2="258" y2="332" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="7.2s" fill="freeze"/>
    </line>
    <rect x="261" y="322" width="62" height="20" fill="#C62828" rx="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.3s" fill="freeze"/>
    </rect>
    <text x="292" y="336" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0">
      kernel
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.3s" fill="freeze"/>
    </text>
    <line x1="325" y1="332" x2="337" y2="332" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="7.4s" fill="freeze"/>
    </line>
    <rect x="340" y="322" width="56" height="20" fill="#3949AB" rx="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.4s" fill="freeze"/>
    </rect>
    <text x="368" y="336" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0">
      result
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.4s" fill="freeze"/>
    </text>
  </g>

  <!-- Group 6: Key Exam Tip (7.5s) -->
  <g data-narration="Remember for exams: an API like printf is the interface definition, the what. A system call like write is the low-level implementation mechanism, the how. An API function may wrap one or more system calls, or none at all for pure computation functions like sin.">
    <rect x="16" y="358" width="388" height="34" fill="#3949AB" rx="6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="7.5s" fill="freeze"/>
    </rect>
    <text x="210" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="white" opacity="0">
      Key: API = interface definition (the "what")
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="7.7s" fill="freeze"/>
    </text>
    <text x="210" y="385" text-anchor="middle" font-family="Arial" font-size="10" fill="#C5CAE9" opacity="0">
      System Call = implementation mechanism (the "how") e.g. printf() --> write()
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="7.9s" fill="freeze"/>
    </text>
  </g>
</svg>