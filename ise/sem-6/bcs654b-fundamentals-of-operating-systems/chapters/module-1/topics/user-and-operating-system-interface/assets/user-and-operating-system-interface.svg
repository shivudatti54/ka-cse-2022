<svg width="420" height="400" data-topic-id="user-and-operating-system-interface" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <g transform="translate(10, 10)">
    <text font-size="24" font-family="Arial" font-weight="bold" text-anchor="start">User and Operating System Interface</text>
  </g>
  
  <!-- Section 1: Command-Line Interface -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="300" height="100" fill="#FFC107" rx="10"/>
    <text font-size="18" font-family="Arial" font-weight="bold" text-anchor="start" fill="#000">Command-Line Interface (CLI)</text>
    <text data-narration="The CLI is a text-based interface that uses commands to interact with the operating system. It is typically used by system administrators, programmers, and other power users who need to perform complex tasks." x="10" y="150" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Definition</text>
    <animate transform="scale(1.1) rotate(5)" begin="0s" duration="2s" repeat="indefinite"/>
    <animate transform="scale(1) rotate(0)" begin="2s" duration="2s" repeat="indefinite"/>
    <rect x="10" y="120" width="280" height="60" fill="#C9E4CA" rx="5"/>
    <text x="15" y="130" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Example:</text>
    <text x="15" y="150" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Types cd to change the current directory</text>
    <text x="15" y="170" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Types ls to list files in the current directory</text>
  </g>
  
  <!-- Section 2: Graphical User Interface -->
  <g transform="translate(20, 200)">
    <rect x="0" y="0" width="300" height="100" fill="#00BFFF" rx="10"/>
    <text font-size="18" font-family="Arial" font-weight="bold" text-anchor="start" fill="#000">Graphical User Interface (GUI)</text>
    <text data-narration="A GUI is a visual interface that uses icons, menus, and windows to interact with the operating system. It is typically used by non-technical users who want to interact with the operating system in a more intuitive way." x="10" y="250" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Definition</text>
    <animate transform="scale(1.1) rotate(5)" begin="0s" duration="2s" repeat="indefinite"/>
    <animate transform="scale(1) rotate(0)" begin="2s" duration="2s" repeat="indefinite"/>
    <rect x="10" y="220" width="280" height="60" fill="#C9E4CA" rx="5"/>
    <text x="15" y="230" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Example:</text>
    <text x="15" y="250" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Clicks on a file icon to open it</text>
    <text x="15" y="270" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Clicks on a menu item to execute a command</text>
  </g>
  
  <!-- Section 3: Touchscreen Interface -->
  <g transform="translate(20, 350)">
    <rect x="0" y="0" width="300" height="100" fill="#FF9800" rx="10"/>
    <text font-size="18" font-family="Arial" font-weight="bold" text-anchor="start" fill="#000">Touchscreen Interface</text>
    <text data-narration="A touchscreen interface uses a touch-sensitive screen to interact with the operating system. It is typically used on mobile devices and other portable computers." x="10" y="430" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Definition</text>
    <animate transform="scale(1.1) rotate(5)" begin="0s" duration="2s" repeat="indefinite"/>
    <animate transform="scale(1) rotate(0)" begin="2s" duration="2s" repeat="indefinite"/>
    <rect x="10" y="410" width="280" height="60" fill="#C9E4CA" rx="5"/>
    <text x="15" y="420" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Example:</text>
    <text x="15" y="440" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Taps on a button to execute a command</text>
    <text x="15" y="460" font-size="14" font-family="Arial" text-anchor="start" fill="#000">Swipes on the screen to navigate through menus</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 380)">
    <text font-size="14" font-family="Arial" text-anchor="start" fill="#000">User and Operating System Interface</text>
  </g>
</svg>