<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="fundamentals-of-operating-systems" data-slugified-name="fundamentals-of-operating-systems">
  <defs>
    <linearGradient id="pastel-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="1" stop-color="#C4B5E2" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="pastel-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="1" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="pastel-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC107" stop-opacity="1"/>
      <stop offset="1" stop-color="#FF9800" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Fundamentals of Operating Systems</title>

  <rect x="10" y="10" width="400" height="350" fill="url (#pastel-purple)"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-color" from="#C7B8EA" to="#C4B5E2" begin="0s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-opacity" from="1" to="0.9" begin="1s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-color" from="#C4B5E2" to="#6495ED" begin="2s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-opacity" from="0.9" to="0.7" begin="2s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-color" from="#6495ED" to="#FFC107" begin="3s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-opacity" from="0.7" to="0.5" begin="3s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-color" from="#FFC107" to="#FF9800" begin="4s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-opacity" from="0.5" to="0.3" begin="4s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-color" from="#FF9800" to="#C7B8EA" begin="5s" dur="1s"/>
  <animate xlink:href="#pastel-purple" attributeName="stop-opacity" from="0.3" to="1" begin="5s" dur="1s"/>

  <g transform="translate(20, 50)">
    <rect width="100" height="20" fill="#3498DB" rx="5"/>
    <text x="50" y="15" fill="#FFFFFF" font-size="16">What are Operating Systems?</text>
    <rect width="100" height="20" fill="#E74C3C" rx="5"/>
    <text x="50" y="35" fill="#FFFFFF" font-size="16">Key Functions of Operating Systems</text>
  </g>

  <g transform="translate(140, 50)">
    <rect width="100" height="20" fill="#2ECC71" rx="5"/>
    <text x="50" y="15" fill="#FFFFFF" font-size="16">Computer System Organization</text>
    <rect width="100" height="20" fill="#1ABC9C" rx="5"/>
    <text x="50" y="35" fill="#FFFFFF" font-size="16">Types of Operating Systems</text>
  </g>

  <g transform="translate(260, 50)">
    <rect width="100" height="20" fill="#F1C40F" rx="5"/>
    <text x="50" y="15" fill="#FFFFFF" font-size="16">Operating System Hierarchy</text>
    <rect width="100" height="20" fill="#E67E73" rx="5"/>
    <text x="50" y="35" fill="#FFFFFF" font-size="16">Security and Networking</text>
  </g>

  <g transform="translate(380, 50)">
    <rect width="100" height="20" fill="#2ECC71" rx="5"/>
    <text x="50" y="15" fill="#FFFFFF" font-size="16">Process Management</text>
    <rect width="100" height="20" fill="#1ABC9C" rx="5"/>
    <text x="50" y="35" fill="#FFFFFF" font-size="16">Memory Management</text>
  </g>

  <rect x="10" y="390" width="400" height="10" fill="#3498DB"/>
  <text x="50" y="395" fill="#FFFFFF" font-size="12">References</text>
  <rect x="10" y="410" width="400" height="10" fill="#E74C3C"/>
  <text x="50" y="415" fill="#FFFFFF" font-size="12">About</text>
</svg>