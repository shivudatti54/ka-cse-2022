<svg width="420" height="400" data-topic-id="operating-system-operations">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A98F9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
    <style>.rect{fill:url(#grad);stroke:#4682B4;stroke-opacity:0.5;stroke-width:2;}</style>
  </defs>
  <body>
    <rect x="50" y="50" width="320" height="300" class="rect"/>
    <title>Operating System Operations</title>
    <g transform="translate(50,50)">
      <text x="10" y="20" text-anchor="start" font-size="24" font-family="Arial" fill="#7A98F9">Boolean Operations</text>
      <rect x="20" y="50" width="300" height="20" class="rect"/>
      <text x="20" y="70" text-anchor="start" font-size="18" font-family="Arial" fill="#4682B4" data-narration="Boolean Algebra is a branch of mathematics that deals with variables that have two possible values: **true (1)** and **false (0)**. It was developed by George Boole in 1854 and forms the mathematical foundation for digital circuit design and computer science." class="section-text"/>
      <rect x="20" y="100" width="300" height="20" class="rect"/>
      <text x="20" y="120" text-anchor="start" font-size="18" font-family="Arial" fill="#4682B4" data-narration="The AND operation outputs **1** only when **all inputs are 1**." class="section-text"/>
      <rect x="20" y="150" width="300" height="20" class="rect"/>
      <text x="20" y="170" text-anchor="start" font-size="18" font-family="Arial" fill="#4682B4" data-narration="The OR operation outputs **1** when **at least one input is 1**." class="section-text"/>
      <rect x="20" y="200" width="300" height="20" class="rect"/>
      <text x="20" y="220" text-anchor="start" font-size="18" font-family="Arial" fill="#4682B4" data-narration="The NOT operation **inverts** the input." class="section-text"/>
      <rect x="20" y="250" width="300" height="20" class="rect"/>
      <text x="20" y="270" text-anchor="start" font-size="18" font-family="Arial" fill="#4682B4" data-narration="XOR (Exclusive OR) outputs **1** when inputs are **different**." class="section-text"/>
      <rect x="20" y="300" width="300" height="20" class="rect"/>
      <text x="20" y="320" text-anchor="start" font-size="18" font-family="Arial" fill="#4682B4" data-narration="XNOR (Exclusive NOR) outputs **1** when inputs are **same**." class="section-text"/>
    </g>
  </body>
</svg>