<svg width="420" height="400" data-topic-id="computer-system-architecture">
  <!-- Header Section -->
  <rect x="50" y="50" width="320" height="100" fill="#64BFFF" rx="20"/>
  <g transform="translate(55, 60)">
    <text x="0" y="0" font-size="24" font-weight="bold" fill="#FFFFFF">Computer System Architecture</text>
    <animate transform="rotate(360 55 60)" dur="4000" begin="0s" repeatCount="indefinite"/>
  </g>
  <rect x="50" y="170" width="320" height="100" fill="#66CCCC" rx="20"/>
  <g transform="translate(55, 180)">
    <text x="0" y="0" font-size="18" font-weight="normal" fill="#000000">Ethereum Architecture</text>
  </g>

  <!-- Ethereum Network Section -->
  <section data-narration="Ethereum Network">
    <rect x="50" y="220" width="320" height="150" fill="#CCFFCC" rx="20"/>
    <g transform="translate(55, 230)">
      <text x="0" y="0" font-size="16" font-weight="normal" fill="#666666">Ethereum Network</text>
      <animate transform="translateX(320)" dur="1000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(55, 240)">
      <circle cx="15" cy="20" r="5" fill="#66CCCC"/>
      <text x="10" y="20" font-size="14" font-weight="normal" fill="#000000">Full Nodes</text>
      <text x="50" y="20" font-size="14" font-weight="normal" fill="#000000">Light Nodes</text>
      <text x="90" y="20" font-size="14" font-weight="normal" fill="#000000">Archive Nodes</text>
      <text x="130" y="20" font-size="14" font-weight="normal" fill="#000000">Validator Nodes</text>
      <animate path="M 15,20 L 50,20 L 90,20 L 130,20 L 15,20" dur="1000" begin="0s" repeatCount="indefinite"/>
    </g>
  </section>

  <!-- Ethereum State Section -->
  <section data-narration="Ethereum State">
    <rect x="50" y="380" width="320" height="150" fill="#CCCCFF" rx="20"/>
    <g transform="translate(55, 390)">
      <text x="0" y="0" font-size="16" font-weight="normal" fill="#666666">Ethereum State</text>
      <animate transform="translateX(320)" dur="1000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(55, 400)">
      <g>
        <rect x="10" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="10" y="10" font-size="14" font-weight="normal" fill="#000000">Account State</text>
        <animate rect="x 10 y 10 width 40 height 30" dur="1000" begin="0s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="60" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="60" y="10" font-size="14" font-weight="normal" fill="#000000">World State</text>
        <animate rect="x 60 y 10 width 40 height 30" dur="1000" begin="1000s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="110" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="110" y="10" font-size="14" font-weight="normal" fill="#000000">Storage</text>
        <animate rect="x 110 y 10 width 40 height 30" dur="1000" begin="2000s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="160" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="160" y="10" font-size="14" font-weight="normal" fill="#000000">Code</text>
        <animate rect="x 160 y 10 width 40 height 30" dur="1000" begin="3000s" repeatCount="indefinite"/>
      </g>
    </g>
  </section>

  <!-- Block Structure Section -->
  <section data-narration="Block Structure">
    <rect x="50" y="220" width="320" height="150" fill="#CCCCFF" rx="20"/>
    <g transform="translate(55, 230)">
      <text x="0" y="0" font-size="16" font-weight="normal" fill="#666666">Block Structure</text>
      <animate transform="translateX(320)" dur="1000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(55, 240)">
      <g>
        <rect x="10" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="10" y="10" font-size="14" font-weight="normal" fill="#000000">Block Header</text>
        <animate rect="x 10 y 10 width 40 height 30" dur="1000" begin="0s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="60" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="60" y="10" font-size="14" font-weight="normal" fill="#000000">Parent Hash</text>
        <animate rect="x 60 y 10 width 40 height 30" dur="1000" begin="1000s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="110" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="110" y="10" font-size="14" font-weight="normal" fill="#000000">State Root</text>
        <animate rect="x 110 y 10 width 40 height 30" dur="1000" begin="2000s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="160" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="160" y="10" font-size="14" font-weight="normal" fill="#000000">Transactions Root</text>
        <animate rect="x 160 y 10 width 40 height 30" dur="1000" begin="3000s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="210" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="210" y="10" font-size="14" font-weight="normal" fill="#000000">Receipts Root</text>
        <animate rect="x 210 y 10 width 40 height 30" dur="1000" begin="4000s" repeatCount="indefinite"/>
      </g>
    </g>
  </section>

  <!-- Consensus Mechanism Section -->
  <section data-narration="Consensus Mechanism">
    <rect x="50" y="380" width="320" height="150" fill="#CCCCFF" rx="20"/>
    <g transform="translate(55, 390)">
      <text x="0" y="0" font-size="16" font-weight="normal" fill="#666666">Consensus Mechanism</text>
      <animate transform="translateX(320)" dur="1000" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(55, 400)">
      <g>
        <rect x="10" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="10" y="10" font-size="14" font-weight="normal" fill="#000000">Proof of Stake</text>
        <animate rect="x 10 y 10 width 40 height 30" dur="1000" begin="0s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="60" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="60" y="10" font-size="14" font-weight="normal" fill="#000000">Validator Nodes</text>
        <animate rect="x 60 y 10 width 40 height 30" dur="1000" begin="1000s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="110" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="110" y="10" font-size="14" font-weight="normal" fill="#000000">Random Selection</text>
        <animate rect="x 110 y 10 width 40 height 30" dur="1000" begin="2000s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="160" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="160" y="10" font-size="14" font-weight="normal" fill="#000000">Attestations</text>
        <animate rect="x 160 y 10 width 40 height 30" dur="1000" begin="3000s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="210" y="10" width="40" height="30" fill="#66CCCC"/>
        <text x="210" y="10" font-size="14" font-weight="normal" fill="#000000">Finality</text>
        <animate rect="x 210 y 10 width 40 height 30" dur="1000" begin="4000s" repeatCount="indefinite"/>
      </g>
    </g>
  </section>

  <!-- Footer Section -->
  <g>
    <rect x="50" y="340" width="320" height="20" fill="#66CCCC"/>
    <text x="0" y="0" font-size="14" font-weight="normal" fill="#000000">Ethereum Architecture</text>
  </g>
</svg>