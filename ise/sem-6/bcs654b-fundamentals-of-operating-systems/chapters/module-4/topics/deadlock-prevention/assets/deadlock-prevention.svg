<svg width="420" height="400" data-topic-id="deadlock-prevention">
  <!-- gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- title and background -->
  <rect x="10" y="10" width="400" height="40" rx="10" fill="url(#pastel-gradient)" />
  <text x="20" y="40" font-size="24" font-family="Arial" text-anchor="middle" fill="#2196F3">
    Deadlock Prevention
  </text>

  <!-- section 1: strategy -->
  <section data-narration="Ensure at least ONE of the four necessary conditions cannot hold.">
    <rect x="10" y="60" width="400" height="80" rx="10" fill="#F7F7F7" />
    <text x="20" y="80" font-size="18" font-family="Arial" text-anchor="middle" fill="#666666">
      Strategy
    </text>
  </section>

  <!-- section 2: mutual exclusion -->
  <section data-narration="Cannot break for non-shareable resources. Can use spooling to make resource appear shareable.">
    <rect x="10" y="150" width="400" height="80" rx="10" fill="#F7F7F7" />
    <text x="20" y="170" font-size="18" font-family="Arial" text-anchor="middle" fill="#666666">
      Mutual Exclusion
    </text>
    <animateTransform attribute="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 20 200 L 100 200" stroke="#2196F3" stroke-width="2" fill="none" />
  </section>

  <!-- section 3: hold and wait -->
  <section data-narration="Solution A: Request all resources at once before execution. Solution B: Release all before requesting more.">
    <rect x="10" y="230" width="400" height="80" rx="10" fill="#F7F7F7" />
    <text x="20" y="250" font-size="18" font-family="Arial" text-anchor="middle" fill="#666666">
      Hold and Wait
    </text>
    <animateTransform attribute="transform" type="translate" begin="0.2s" dur="2s" repeatCount="indefinite" />
    <path d="M 20 220 L 100 220" stroke="#2196F3" stroke-width="2" fill="none" />
  </section>

  <!-- section 4: no preemption -->
  <section data-narration="If request fails, release all held resources. Works for CPU, memory. Doesn't work for Printers, tape drives.">
    <rect x="10" y="310" width="400" height="80" rx="10" fill="#F7F7F7" />
    <text x="20" y="330" font-size="18" font-family="Arial" text-anchor="middle" fill="#666666">
      No Preemption
    </text>
    <animateTransform attribute="transform" type="translate" begin="0.4s" dur="2s" repeatCount="indefinite" />
    <path d="M 20 300 L 100 300" stroke="#2196F3" stroke-width="2" fill="none" />
  </section>

  <!-- section 5: circular wait -->
  <section data-narration="Impose ordering on resources. Request in increasing order. Works because if P1 holds Ri and waits for Rj where j > i, and P2 holds Rj, P2 cannot be waiting for Ri (would violate ordering).">
    <rect x="10" y="390" width="400" height="80" rx="10" fill="#F7F7F7" />
    <text x="20" y="410" font-size="18" font-family="Arial" text-anchor="middle" fill="#666666">
      Circular Wait
    </text>
    <animateTransform attribute="transform" type="translate" begin="0.6s" dur="2s" repeatCount="indefinite" />
    <path d="M 20 380 L 100 380" stroke="#2196F3" stroke-width="2" fill="none" />
  </section>

  <!-- footer -->
  <rect x="10" y="470" width="400" height="30" rx="10" fill="#F7F7F7" />
  <text x="20" y="490" font-size="18" font-family="Arial" text-anchor="middle" fill="#666666">
    Copyright 2023
  </text>
</svg>