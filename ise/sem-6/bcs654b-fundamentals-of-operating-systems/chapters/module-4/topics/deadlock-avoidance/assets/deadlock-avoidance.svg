<svg
    width="420"
    height="400"
    viewBox="0 0 420 400"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    xml:space="preserve"
    data-topic-id="deadlock-avoidance"
>
    <style>
        /* Set default font family for text */
        text {
            font-family: Arial, sans-serif;
        }
    </style>
    <defs>
        <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
            <stop offset="100%" stop-color="#C7D2E8" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="deepIndigoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3B3F54" stop-opacity="1" />
            <stop offset="100%" stop-color="#434A5F" stop-opacity="1" />
        </linearGradient>
    </defs>

    <!-- Title Section -->
    <g transform="translate(10, 10)">
        <rect width="400" height="50" stroke="#fff" fill="url(#deepIndigoGradient)" rx="5" />
        <text x="20" y="20" text-anchor="start" font-size="24" font-weight="bold" fill="#fff">
            Deadlock Avoidance
        </text>
    </g>

    <!-- Background Gradient -->
    <rect x="0" y="60" width="400" height="280" fill="url(#pastelGradient)" />
    <rect x="0" y="360" width="400" height="40" fill="#fff" rx="5" />

    <!-- Banker's Algorithm Diagram -->
    <g transform="translate(10, 70)">
        <!-- Available Resources -->
        <rect x="20" y="20" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <rect x="140" y="20" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <rect x="260" y="20" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <text x="20" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            Available
        </text>
        <text x="140" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            A
        </text>
        <text x="260" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            C
        </text>

        <!-- Max Resource Demands -->
        <rect x="20" y="80" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <rect x="140" y="80" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <rect x="260" y="80" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <text x="20" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            Max
        </text>
        <text x="140" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            A
        </text>
        <text x="260" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            B
        </text>
        <text x="260" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            C
        </text>

        <!-- Allocation -->
        <rect x="20" y="120" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <rect x="140" y="120" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <rect x="260" y="120" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <text x="20" y="140" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            Allocation
        </text>
        <text x="140" y="140" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            A
        </text>
        <text x="260" y="140" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            B
        </text>
        <text x="260" y="140" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            C
        </text>

        <!-- Need -->
        <rect x="20" y="160" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <rect x="140" y="160" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <rect x="260" y="160" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
        <text x="20" y="180" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            Need
        </text>
        <text x="140" y="180" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            A
        </text>
        <text x="260" y="180" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            B
        </text>
        <text x="260" y="180" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            C
        </text>

        <!-- Safety Algorithm Diagram -->
        <g transform="translate(10, 200)">
            <!-- Work = Available -->
            <rect x="20" y="20" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Work = Available
            </text>
            <text x="140" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                A
            </text>
            <text x="260" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                C
            </text>

            <!-- Finish[i] = false for all i -->
            <rect x="20" y="80" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Finish[i] = false
            </text>
            <text x="140" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                P0
            </text>
            <text x="260" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                P1
            </text>
            <text x="260" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                P2
            </text>
            <text x="260" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                P3
            </text>
            <text x="260" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                P4
            </text>

            <!-- Find i such that - Finish[i] = false and Need[i] <= Work -->
            <rect x="20" y="120" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="140" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Find i such that
            </text>
            <text x="140" y="140" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Finish[i] = false
            </text>
            <text x="140" y="160" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                and Need[i] <= Work
            </text>
            <text x="260" y="160" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                A
            </text>
            <text x="260" y="160" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                B
            </text>
            <text x="260" y="160" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
            </text>

            <!-- If no such i, go to step 4 -->
            <rect x="20" y="180" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="200" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                If no such i,
            </text>
            <text x="140" y="200" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                go to step 4
            </text>

            <!-- Work = Work + Allocation[i] -->
            <rect x="20" y="220" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="240" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Work =
            </text>
            <text x="140" y="240" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Work + Allocation[i]
            </text>
            <text x="260" y="240" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                A
            </text>

            <!-- Finish[i] = true -->
            <rect x="20" y="260" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="280" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Finish[i] = true
            </text>
            <text x="140" y="280" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                P0
            </text>

            <!-- Go to step 2 -->
            <rect x="20" y="300" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="320" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Go to step 2
            </text>
        </g>

        <!-- Resource Request Algorithm Diagram -->
        <g transform="translate(10, 350)">
            <!-- Process Pi requests Request[i] -->
            <rect x="20" y="20" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Process Pi requests
            </text>
            <text x="140" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Request[i]
            </text>

            <!-- If Request[i] > Need[i]: ERROR (requested more than declared) -->
            <rect x="20" y="80" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                If Request[i] > Need[i]:
            </text>
            <text x="140" y="100" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                ERROR (requested more than declared)
            </text>

            <!-- If Request[i] > Available: Wait (not enough resources) -->
            <rect x="20" y="120" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="140" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                If Request[i] > Available:
            </text>
            <text x="140" y="140" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Wait (not enough resources)
            </text>

            <!-- Pretend to allocate -->
            <rect x="20" y="160" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="180" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Pretend to allocate:
            </text>
            <text x="140" y="180" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Available = Available - Request[i]
            </text>
            <text x="260" y="180" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Allocation[i] = Allocation[i] + Request[i]
            </text>
            <text x="260" y="180" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Need[i] = Need[i] - Request[i]
            </text>

            <!-- Run Safety Algorithm -->
            <rect x="20" y="200" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="220" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Run Safety Algorithm:
            </text>
            <text x="140" y="220" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                If safe: Grant request
            </text>
            <text x="260" y="220" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                If unsafe: Restore old state, make process wait
            </text>
        </g>

        <!-- Example Diagram -->
        <g transform="translate(10, 420)">
            <!-- Safe sequence: P1 → P3 → P4 → P2 → P0 -->
            <rect x="20" y="20" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
            <text x="20" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                Safe sequence:
            </text>
            <text x="140" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                P1 → P3 → P4 → P2 → P0
            </text>

            <!-- Limitations -->
            <g transform="translate(10, 450)">
                <rect x="20" y="20" width="100" height="20" fill="#fff" rx="5" stroke="#fff" />
                <text x="20" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                    Limitations
                </text>
                <text x="140" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                    1. Processes must declare max needs in advance
                </text>
                <text x="260" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                    2. Number of resources fixed
                </text>
                <text x="260" y="40" text-anchor="start" font-size="16" font-weight="bold" fill="#333">
                    3. Overhead of safety check for each request
                </text>
            </g>
        </g>
    </svg>