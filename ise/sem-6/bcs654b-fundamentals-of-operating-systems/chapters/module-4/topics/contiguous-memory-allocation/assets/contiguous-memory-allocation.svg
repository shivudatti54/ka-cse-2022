<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="contiguous-memory-allocation">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C62828"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Heap Memory outline (0.3s) -->
  <g data-narration="Dynamic memory allocation lets programs request memory from the heap at runtime using functions like malloc, calloc, realloc, and free." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>

    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Dynamic Memory Allocation</text>

    <!-- Heap memory container -->
    <rect x="20" y="38" width="380" height="135" fill="#FFFFFF" fill-opacity="0.5" stroke="#3949AB" stroke-width="1.5" rx="6" stroke-dasharray="6,3"/>
    <text x="210" y="55" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">HEAP MEMORY</text>

    <!-- Address bar -->
    <text x="30" y="70" font-family="monospace" font-size="8" fill="#666">0x1000</text>
    <text x="380" y="70" text-anchor="end" font-family="monospace" font-size="8" fill="#666">0x1FFF</text>
    <line x1="30" y1="74" x2="390" y2="74" stroke="#9FA8DA" stroke-width="1"/>

    <!-- Empty memory cells -->
    <rect x="30" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="66" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="102" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="138" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="174" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="210" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="246" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="282" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="318" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>
    <rect x="354" y="80" width="36" height="30" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5" rx="2"/>

    <text x="210" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#7986CB">Unallocated Memory</text>
  </g>

  <!-- Group 2: malloc() allocates a block (1.5s) -->
  <g data-narration="malloc allocates a single contiguous block of specified size and returns a pointer to the first byte. The memory contents are uninitialized." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>

    <!-- malloc label -->
    <rect x="30" y="120" width="120" height="22" fill="#3949AB" rx="4"/>
    <text x="90" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="white">malloc(5*sizeof(int))</text>

    <!-- Allocated block (5 cells) -->
    <rect x="30" y="80" width="36" height="30" fill="#3949AB" fill-opacity="0.8" stroke="#3949AB" stroke-width="1" rx="2"/>
    <rect x="66" y="80" width="36" height="30" fill="#3949AB" fill-opacity="0.8" stroke="#3949AB" stroke-width="1" rx="2"/>
    <rect x="102" y="80" width="36" height="30" fill="#3949AB" fill-opacity="0.8" stroke="#3949AB" stroke-width="1" rx="2"/>
    <rect x="138" y="80" width="36" height="30" fill="#3949AB" fill-opacity="0.7" stroke="#3949AB" stroke-width="1" rx="2"/>
    <rect x="174" y="80" width="36" height="30" fill="#3949AB" fill-opacity="0.7" stroke="#3949AB" stroke-width="1" rx="2"/>

    <!-- Garbage values indicator -->
    <text x="48" y="99" text-anchor="middle" font-family="monospace" font-size="8" fill="white">??</text>
    <text x="84" y="99" text-anchor="middle" font-family="monospace" font-size="8" fill="white">??</text>
    <text x="120" y="99" text-anchor="middle" font-family="monospace" font-size="8" fill="white">??</text>
    <text x="156" y="99" text-anchor="middle" font-family="monospace" font-size="8" fill="white">??</text>
    <text x="192" y="99" text-anchor="middle" font-family="monospace" font-size="8" fill="white">??</text>

    <!-- Pointer arrow -->
    <line x1="90" y1="142" x2="90" y2="114" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- ptr label -->
    <text x="30" y="155" font-family="monospace" font-size="9" fill="#3949AB" font-weight="bold">int *ptr</text>

    <text x="170" y="135" font-family="Arial" font-size="9" fill="#E65100" font-style="italic">Uninitialized!</text>
  </g>

  <!-- Group 3: calloc() allocates and zeroes (3.0s) -->
  <g data-narration="calloc allocates multiple blocks of specified size and initializes all bytes to zero, unlike malloc which leaves memory uninitialized." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>

    <!-- calloc label -->
    <rect x="246" y="120" width="144" height="22" fill="#00695C" rx="4"/>
    <text x="318" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="white">calloc(3, sizeof(int))</text>

    <!-- Allocated block (3 cells) with zeros -->
    <rect x="282" y="80" width="36" height="30" fill="#00695C" fill-opacity="0.8" stroke="#00695C" stroke-width="1" rx="2"/>
    <rect x="318" y="80" width="36" height="30" fill="#00695C" fill-opacity="0.8" stroke="#00695C" stroke-width="1" rx="2"/>
    <rect x="354" y="80" width="36" height="30" fill="#00695C" fill-opacity="0.8" stroke="#00695C" stroke-width="1" rx="2"/>

    <!-- Zero values -->
    <text x="300" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="white">0</text>
    <text x="336" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="white">0</text>
    <text x="372" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="white">0</text>

    <!-- Pointer arrow -->
    <line x1="318" y1="142" x2="318" y2="114" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- arr label -->
    <text x="248" y="155" font-family="monospace" font-size="9" fill="#00695C" font-weight="bold">int *arr</text>

    <text x="330" y="155" font-family="Arial" font-size="9" fill="#00695C" font-style="italic">Zero-initialized</text>
  </g>

  <!-- Group 4: realloc() resizes memory (4.5s) -->
  <g data-narration="realloc changes the size of a previously allocated block. It may move the block to a new location if the current space cannot be extended." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>

    <!-- Realloc section -->
    <rect x="20" y="175" width="380" height="75" fill="#FFFFFF" fill-opacity="0.4" stroke="#E65100" stroke-width="1" rx="6" stroke-dasharray="4,2"/>
    <text x="210" y="191" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">realloc() - Resize Memory</text>

    <!-- Original block (small) -->
    <rect x="30" y="200" width="25" height="20" fill="#3949AB" rx="2"/>
    <rect x="55" y="200" width="25" height="20" fill="#3949AB" rx="2"/>
    <rect x="80" y="200" width="25" height="20" fill="#3949AB" rx="2"/>
    <text x="67" y="214" text-anchor="middle" font-family="monospace" font-size="8" fill="white">3 ints</text>

    <!-- Arrow showing growth -->
    <line x1="115" y1="210" x2="145" y2="210" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="130" y="205" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">realloc</text>

    <!-- Expanded block -->
    <rect x="155" y="200" width="25" height="20" fill="#3949AB" rx="2"/>
    <rect x="180" y="200" width="25" height="20" fill="#3949AB" rx="2"/>
    <rect x="205" y="200" width="25" height="20" fill="#3949AB" rx="2"/>
    <rect x="230" y="200" width="25" height="20" fill="#E65100" fill-opacity="0.7" rx="2"/>
    <rect x="255" y="200" width="25" height="20" fill="#E65100" fill-opacity="0.7" rx="2"/>
    <text x="205" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="white">old</text>
    <text x="242" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="white">new</text>
    <text x="217" y="237" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">5 ints (expanded)</text>

    <!-- Shrink example -->
    <rect x="300" y="200" width="20" height="20" fill="#3949AB" rx="2"/>
    <rect x="320" y="200" width="20" height="20" fill="#3949AB" rx="2"/>
    <rect x="340" y="200" width="20" height="20" fill="#FFCCBC" stroke="#E65100" stroke-width="0.5" stroke-dasharray="2,2" rx="2"/>
    <text x="320" y="237" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">shrink: 2 ints</text>
    <line x1="340" y1="197" x2="360" y2="223" stroke="#C62828" stroke-width="1.5"/>
    <line x1="360" y1="197" x2="340" y2="223" stroke="#C62828" stroke-width="1.5"/>
  </g>

  <!-- Group 5: free() and memory lifecycle (6.0s) -->
  <g data-narration="free deallocates previously allocated memory, returning it to the heap. Always set the pointer to NULL after freeing to avoid dangling pointers." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>

    <!-- free() section -->
    <rect x="20" y="258" width="185" height="80" fill="#FFFFFF" fill-opacity="0.4" stroke="#C62828" stroke-width="1" rx="6"/>
    <text x="112" y="274" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">free() - Release Memory</text>

    <!-- Allocated block turning into freed -->
    <rect x="30" y="283" width="30" height="20" fill="#3949AB" rx="2"/>
    <rect x="60" y="283" width="30" height="20" fill="#3949AB" rx="2"/>
    <rect x="90" y="283" width="30" height="20" fill="#3949AB" rx="2"/>

    <!-- Arrow -->
    <line x1="130" y1="293" x2="145" y2="293" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed)"/>

    <!-- Freed blocks -->
    <rect x="155" y="283" width="30" height="20" fill="#FFCDD2" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" rx="2"/>

    <text x="170" y="296" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">freed</text>

    <!-- Code snippet -->
    <text x="35" y="325" font-family="monospace" font-size="8" fill="#C62828">free(ptr);</text>
    <text x="35" y="335" font-family="monospace" font-size="8" fill="#3949AB">ptr = NULL;</text>
  </g>

  <!-- Group 6: Common errors and comparison table (7.5s) -->
  <g data-narration="Common errors include memory leaks from forgetting to free, dangling pointers from using freed memory, and double free errors from freeing the same block twice." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>

    <!-- Comparison and Errors section -->
    <rect x="215" y="258" width="185" height="80" fill="#FFFFFF" fill-opacity="0.4" stroke="#E65100" stroke-width="1" rx="6"/>
    <text x="307" y="274" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Common Errors</text>

    <!-- Error icons and labels -->
    <circle cx="232" cy="291" r="5" fill="#C62828"/>
    <text x="230" y="294" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">!</text>
    <text x="242" y="294" font-family="Arial" font-size="9" fill="#333">Memory Leak</text>

    <circle cx="232" cy="308" r="5" fill="#C62828"/>
    <text x="230" y="311" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">!</text>
    <text x="242" y="311" font-family="Arial" font-size="9" fill="#333">Dangling Pointer</text>

    <circle cx="232" cy="325" r="5" fill="#C62828"/>
    <text x="230" y="328" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">!</text>
    <text x="242" y="328" font-family="Arial" font-size="9" fill="#333">Double Free</text>

    <!-- Legend at bottom -->
    <rect x="20" y="348" width="380" height="42" fill="#FFFFFF" fill-opacity="0.6" stroke="#9FA8DA" stroke-width="0.5" rx="6"/>

    <rect x="30" y="356" width="12" height="10" fill="#3949AB" rx="2"/>
    <text x="47" y="365" font-family="Arial" font-size="8" fill="#333">malloc (uninitialized)</text>

    <rect x="150" y="356" width="12" height="10" fill="#00695C" rx="2"/>
    <text x="167" y="365" font-family="Arial" font-size="8" fill="#333">calloc (zeroed)</text>

    <rect x="260" y="356" width="12" height="10" fill="#E65100" rx="2"/>
    <text x="277" y="365" font-family="Arial" font-size="8" fill="#333">realloc (resized)</text>

    <rect x="30" y="372" width="12" height="10" fill="#FFCDD2" stroke="#C62828" stroke-width="0.5" rx="2"/>
    <text x="47" y="381" font-family="Arial" font-size="8" fill="#333">free (released)</text>

    <text x="150" y="381" font-family="Arial" font-size="8" fill="#3949AB" font-weight="bold">Tip:</text>
    <text x="168" y="381" font-family="Arial" font-size="8" fill="#333">Always check for NULL after allocation</text>
  </g>
</svg>