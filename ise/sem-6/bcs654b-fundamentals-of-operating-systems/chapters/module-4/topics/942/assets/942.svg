<svg width="420" height="400" data-topic-id="deadlocks">
  <defs>
    <linearGradient id=" PastelColors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E5F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Deadlocks in Multi-Process Systems</title>
  <rect x="10" y="10" width="400" height="380" fill="url(# PastelColors)"/>
  <g transform="translate(10, 20)">
    <text x="10" y="20" font-size="18" font-family="Arial" font-weight="bold" fill="#3498db">Introduction</text>
    <rect x="50" y="40" width="300" height="20" fill="#3498db" rx="5"/>
    <text x="55" y="50" font-size="14" font-family="Arial" fill="#fff">Deadlocks occur when two or more processes are blocked indefinitely, waiting for each other to release resources.</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" dur="2s" begin="0s"/>
  </g>
  <g transform="translate(10, 70)">
    <text x="10" y="80" font-size="18" font-family="Arial" font-weight="bold" fill="#2ecc71">System Model</text>
    <rect x="50" y="100" width="300" height="20" fill="#2ecc71" rx="5"/>
    <text x="55" y="110" font-size="14" font-family="Arial" fill="#fff">A system model is a representation of the operating system and its components.</text>
    <rect x="50" y="130" width="300" height="20" fill="#2ecc71" rx="5"/>
    <text x="55" y="140" font-size="14" font-family="Arial" fill="#fff">In the context of deadlocks, the system model is crucial in understanding the causes and effects of deadlocks.</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 150" dur="2s" begin="2s"/>
  </g>
  <g transform="translate(10, 200)">
    <text x="10" y="210" font-size="18" font-family="Arial" font-weight="bold" fill="#e74c3c">Process Model</text>
    <rect x="50" y="230" width="300" height="20" fill="#e74c3c" rx="5"/>
    <text x="55" y="240" font-size="14" font-family="Arial" fill="#fff">A process is a program in execution.</text>
    <rect x="50" y="260" width="300" height="20" fill="#e74c3c" rx="5"/>
    <text x="55" y="270" font-size="14" font-family="Arial" fill="#fff">A process has a unique process ID (PID) and identity.</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 280" dur="2s" begin="4s"/>
  </g>
  <g transform="translate(10, 350)">
    <text x="10" y="360" font-size="18" font-family="Arial" font-weight="bold" fill="#e67e73">Deadlock Characterization</text>
    <rect x="50" y="380" width="300" height="20" fill="#e67e73" rx="5"/>
    <text x="55" y="390" font-size="14" font-family="Arial" fill="#fff">A deadlock is characterized by the following properties:</text>
    <rect x="50" y="410" width="300" height="20" fill="#e67e73" rx="5"/>
    <text x="55" y="420" font-size="14" font-family="Arial" fill="#fff">1. Mutual Exclusion (M) resources are held by processes.</text>
    <rect x="50" y="440" width="300" height="20" fill="#e67e73" rx="5"/>
    <text x="55" y="450" font-size="14" font-family="Arial" fill="#fff">2. Hold and Wait.</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 460" dur="2s" begin="6s"/>
  </g>
  <g transform="translate(10, 500)">
    <text x="10" y="510" font-size="18" font-family="Arial" font-weight="bold" fill="#2ecc71">Synchronization Model</text>
    <rect x="50" y="530" width="300" height="20" fill="#2ecc71" rx="5"/>
    <text x="55" y="540" font-size="14" font-family="Arial" fill="#fff">Synchronization is the mechanism by which processes interact with each other.</text>
    <rect x="50" y="560" width="300" height="20" fill="#2ecc71" rx="5"/>
    <text x="55" y="570" font-size="14" font-family="Arial" fill="#fff">Synchronization primitives include semaphores, monitors, and condition variables.</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 580" dur="2s" begin="8s"/>
  </g>
  <footer>
    <g transform="translate(10, 600)">
      <text x="10" y="610" font-size="14" font-family="Arial" fill="#3498db">Navigating Deadlocks</text>
      <rect x="50" y="630" width="300" height="20" fill="#3498db" rx="5"/>
      <text x="55" y="640" font-size="14" font-family="Arial" fill="#fff">Learn more about deadlocks and how to avoid them.</text>
    </g>
  </footer>
</svg>