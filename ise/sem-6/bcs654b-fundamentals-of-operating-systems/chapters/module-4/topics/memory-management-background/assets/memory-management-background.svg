<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="memory-management-background">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title and Introduction -->
  <g data-narration="Key Management is the backbone of all cryptographic operations, governing the full lifecycle of cryptographic keys from creation to destruction." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Cryptographic Key Management Lifecycle</text>
    <line x1="50" y1="28" x2="370" y2="28" stroke="#7986CB" stroke-width="1"/>
    <text x="210" y="42" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">A key is not static -- it has a lifespan governed by 7 phases</text>
  </g>

  <!-- Group 2: Key Lifecycle Flow (7 phases as connected boxes) -->
  <g data-narration="The key lifecycle has seven phases: Generation using high-entropy randomness, Distribution via secure transport, Storage in HSMs or encrypted keystores, Usage for encrypt/decrypt/sign operations, Rotation to periodically change keys, Revocation if compromised, and Destruction via cryptographic shredding." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="60" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Key Lifecycle Phases</text>

    <!-- Phase 1: Generation -->
    <rect x="15" y="70" width="52" height="36" fill="#3949AB" rx="4"/>
    <text x="41" y="84" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">1. Generate</text>
    <text x="41" y="98" text-anchor="middle" font-family="monospace" font-size="6" fill="#C5CAE9">Entropy</text>

    <!-- Arrow 1->2 -->
    <line x1="67" y1="88" x2="73" y2="88" stroke="#3949AB" stroke-width="1.2"/>
    <polygon points="73,86 73,90 77,88" fill="#3949AB"/>

    <!-- Phase 2: Distribution -->
    <rect x="77" y="70" width="52" height="36" fill="#00695C" rx="4"/>
    <text x="103" y="84" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">2. Distribute</text>
    <text x="103" y="98" text-anchor="middle" font-family="monospace" font-size="6" fill="#B2DFDB">Secure Tx</text>

    <!-- Arrow 2->3 -->
    <line x1="129" y1="88" x2="135" y2="88" stroke="#00695C" stroke-width="1.2"/>
    <polygon points="135,86 135,90 139,88" fill="#00695C"/>

    <!-- Phase 3: Storage -->
    <rect x="139" y="70" width="52" height="36" fill="#3949AB" rx="4"/>
    <text x="165" y="84" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">3. Store</text>
    <text x="165" y="98" text-anchor="middle" font-family="monospace" font-size="6" fill="#C5CAE9">HSM/KMS</text>

    <!-- Arrow 3->4 -->
    <line x1="191" y1="88" x2="197" y2="88" stroke="#3949AB" stroke-width="1.2"/>
    <polygon points="197,86 197,90 201,88" fill="#3949AB"/>

    <!-- Phase 4: Usage -->
    <rect x="201" y="70" width="52" height="36" fill="#E65100" rx="4"/>
    <text x="227" y="84" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">4. Use</text>
    <text x="227" y="98" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFE0B2">Enc/Dec</text>

    <!-- Arrow 4->5 -->
    <line x1="253" y1="88" x2="259" y2="88" stroke="#E65100" stroke-width="1.2"/>
    <polygon points="259,86 259,90 263,88" fill="#E65100"/>

    <!-- Phase 5: Rotation -->
    <rect x="263" y="70" width="52" height="36" fill="#00695C" rx="4"/>
    <text x="289" y="84" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">5. Rotate</text>
    <text x="289" y="98" text-anchor="middle" font-family="monospace" font-size="6" fill="#B2DFDB">90 days</text>

    <!-- Arrow 5->6 -->
    <line x1="315" y1="88" x2="321" y2="88" stroke="#00695C" stroke-width="1.2"/>
    <polygon points="321,86 321,90 325,88" fill="#00695C"/>

    <!-- Phase 6: Revocation -->
    <rect x="325" y="70" width="52" height="36" fill="#C62828" rx="4"/>
    <text x="351" y="84" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">6. Revoke</text>
    <text x="351" y="98" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFCDD2">CRL/OCSP</text>

    <!-- Arrow 6->7 (wraps below) -->
    <line x1="377" y1="88" x2="383" y2="88" stroke="#C62828" stroke-width="1.2"/>
    <line x1="383" y1="88" x2="383" y2="116" stroke="#C62828" stroke-width="1.2"/>
    <line x1="383" y1="116" x2="356" y2="116" stroke="#C62828" stroke-width="1.2"/>
    <polygon points="356,114 356,118 352,116" fill="#C62828"/>

    <!-- Phase 7: Destruction -->
    <rect x="300" y="108" width="52" height="24" fill="#3949AB" rx="4"/>
    <text x="326" y="124" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">7. Destroy</text>

    <!-- Rotation feedback arrow (5 -> 4) -->
    <path d="M289 106 Q289 118 240 118 Q227 118 227 106" stroke="#E65100" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
    <polygon points="225,108 229,108 227,104" fill="#E65100"/>
    <text x="258" y="126" text-anchor="middle" font-family="Arial" font-size="6" fill="#E65100">New Key</text>
  </g>

  <!-- Group 3: Symmetric Key Distribution Problem -->
  <g data-narration="Symmetric key distribution is the core challenge: how do Alice and Bob share a secret key securely? Bob encrypts the symmetric key with Alice's public key and sends the ciphertext over an insecure channel. Alice decrypts it with her private key." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="120" y="152" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Symmetric Key Distribution</text>

    <!-- Bob -->
    <rect x="15" y="162" width="74" height="60" fill="white" stroke="#00695C" stroke-width="1.5" rx="5"/>
    <text x="52" y="175" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Bob</text>
    <text x="52" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">K_symmetric</text>
    <text x="52" y="200" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">Pub_Alice</text>
    <text x="52" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Encrypt(K_sym)</text>

    <!-- Channel -->
    <rect x="100" y="172" width="76" height="40" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
    <text x="138" y="188" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">Insecure Channel</text>
    <text x="138" y="200" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">C = ciphertext</text>
    <!-- Arrows -->
    <line x1="89" y1="192" x2="100" y2="192" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="98,190 98,194 102,192" fill="#00695C"/>
    <line x1="176" y1="192" x2="186" y2="192" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="184,190 184,194 188,192" fill="#00695C"/>

    <!-- Alice -->
    <rect x="188" y="162" width="74" height="60" fill="white" stroke="#3949AB" stroke-width="1.5" rx="5"/>
    <text x="225" y="175" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Alice</text>
    <text x="225" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">Priv_Alice</text>
    <text x="225" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Decrypt(C)</text>
    <text x="225" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">K_symmetric</text>
  </g>

  <!-- Group 4: Storage Methods Comparison -->
  <g data-narration="Keys must be stored securely. Hardware Security Modules provide tamper-resistant physical storage. Software keystores offer password-protected storage. Keys should never be stored in plaintext in code or config files." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="360" y="152" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Key Storage</text>

    <!-- HSM box -->
    <rect x="290" y="162" width="120" height="28" fill="#3949AB" rx="4"/>
    <text x="350" y="175" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">HSM (Hardware)</text>
    <text x="350" y="186" text-anchor="middle" font-family="Arial" font-size="7" fill="#C5CAE9">Tamper-resistant, most secure</text>

    <!-- Software keystore -->
    <rect x="290" y="194" width="120" height="28" fill="#00695C" rx="4"/>
    <text x="350" y="207" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Software Keystore</text>
    <text x="350" y="218" text-anchor="middle" font-family="Arial" font-size="7" fill="#B2DFDB">Password-protected, practical</text>

    <!-- Bad practice -->
    <rect x="290" y="226" width="120" height="24" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5" rx="4"/>
    <text x="310" y="241" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Plaintext in code</text>
    <text x="395" y="241" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">X</text>
  </g>

  <!-- Group 5: Symmetric vs Asymmetric Scale Comparison -->
  <g data-narration="Symmetric key management requires n times n minus 1 divided by 2 keys for n users, making it hard to scale. Asymmetric requires only 2n keys using public-private pairs, scaling much more efficiently." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="130" y="248" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Scalability: Symmetric vs Asymmetric</text>

    <!-- Symmetric side -->
    <rect x="15" y="258" width="130" height="58" fill="white" stroke="#C62828" stroke-width="1.5" rx="5"/>
    <text x="80" y="272" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Symmetric</text>
    <text x="80" y="285" text-anchor="middle" font-family="monospace" font-size="9" fill="#C62828">n(n-1)/2 keys</text>
    <text x="80" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">10 users = 45 keys</text>
    <text x="80" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Hard to scale!</text>

    <!-- vs -->
    <text x="160" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">vs</text>

    <!-- Asymmetric side -->
    <rect x="175" y="258" width="130" height="58" fill="white" stroke="#00695C" stroke-width="1.5" rx="5"/>
    <text x="240" y="272" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Asymmetric</text>
    <text x="240" y="285" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">2n keys</text>
    <text x="240" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">10 users = 20 keys</text>
    <text x="240" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Scales efficiently</text>
  </g>

  <!-- Group 6: Best Practices Summary -->
  <g data-narration="Key management best practices: never hardcode keys in source code, use dedicated KMS or HSM systems, apply least privilege access, rotate keys on a defined schedule, and separate keys by purpose and environment." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <text x="370" y="268" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Best Practices</text>

    <circle cx="325" cy="284" r="4" fill="#00695C"/>
    <text x="333" y="288" font-family="Arial" font-size="7" fill="#3949AB">Never hardcode keys</text>

    <circle cx="325" cy="300" r="4" fill="#00695C"/>
    <text x="333" y="304" font-family="Arial" font-size="7" fill="#3949AB">Use dedicated KMS/HSM</text>

    <circle cx="325" cy="316" r="4" fill="#00695C"/>
    <text x="333" y="320" font-family="Arial" font-size="7" fill="#3949AB">Least privilege access</text>

    <circle cx="325" cy="332" r="4" fill="#00695C"/>
    <text x="333" y="336" font-family="Arial" font-size="7" fill="#3949AB">Rotate keys regularly</text>

    <circle cx="325" cy="348" r="4" fill="#00695C"/>
    <text x="333" y="352" font-family="Arial" font-size="7" fill="#3949AB">Separate by purpose</text>

    <!-- Compliance callout -->
    <rect x="15" y="326" width="290" height="32" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="4"/>
    <text x="160" y="340" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Compliance: GDPR, HIPAA, PCI-DSS require robust key management</text>
    <text x="160" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">A key breach = catastrophic compromise, not just a password change</text>

    <!-- Kerckhoffs Principle footer -->
    <rect x="15" y="366" width="395" height="26" fill="#3949AB" rx="6"/>
    <text x="210" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Kerckhoffs' Principle: A system must be secure even if everything except the key is public.</text>
    <text x="210" y="389" text-anchor="middle" font-family="Arial" font-size="7" fill="#C5CAE9">The entire security rests on the secrecy and integrity of the keys.</text>
  </g>
</svg>