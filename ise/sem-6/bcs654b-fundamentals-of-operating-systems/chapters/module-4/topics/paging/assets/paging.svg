<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="paging">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Logical Address (0.3s) -->
  <g data-narration="A logical address is split into two parts: the page number p and the page offset d." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>

    <text x="210" y="26" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Paging: Logical to Physical Address Translation</text>

    <!-- Logical Address box -->
    <rect x="60" y="40" width="300" height="44" fill="white" stroke="#3949AB" stroke-width="1.5" rx="6"/>
    <text x="210" y="55" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Logical Address</text>

    <!-- Page Number portion -->
    <rect x="65" y="60" width="145" height="20" fill="#3949AB" rx="3"/>
    <text x="137" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Page Number (p)</text>

    <!-- Offset portion -->
    <rect x="215" y="60" width="140" height="20" fill="#00695C" rx="3"/>
    <text x="285" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Offset (d)</text>
  </g>

  <!-- Group 2: Page Table lookup (1.5s) -->
  <g data-narration="The page number p is used as an index into the page table. Each process has its own page table stored in memory." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>

    <!-- Arrow from page number down to page table -->
    <line x1="137" y1="84" x2="137" y2="108" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="155" y="100" font-family="Arial" font-size="9" fill="#3949AB" font-style="italic">index</text>

    <!-- Page Table -->
    <rect x="60" y="112" width="195" height="118" fill="white" stroke="#3949AB" stroke-width="1.5" rx="6"/>
    <text x="157" y="128" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Page Table</text>

    <!-- Table header -->
    <rect x="68" y="133" width="60" height="16" fill="#C5CAE9" rx="2"/>
    <text x="98" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">Page</text>
    <rect x="132" y="133" width="60" height="16" fill="#C5CAE9" rx="2"/>
    <text x="162" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">Frame</text>
    <rect x="196" y="133" width="50" height="16" fill="#C5CAE9" rx="2"/>
    <text x="221" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">Valid</text>

    <!-- Row 0 -->
    <text x="98" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">0</text>
    <text x="162" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">5</text>
    <text x="221" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">1</text>

    <!-- Row 1 -->
    <text x="98" y="177" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">1</text>
    <text x="162" y="177" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">2</text>
    <text x="221" y="177" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">1</text>

    <!-- Row 2 (highlighted - this is the lookup) -->
    <rect x="68" y="182" width="178" height="15" fill="#E8EAF6" rx="2"/>
    <text x="98" y="193" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">2</text>
    <text x="162" y="193" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#E65100">7</text>
    <text x="221" y="193" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">1</text>

    <!-- Row 3 -->
    <text x="98" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">3</text>
    <text x="162" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">-</text>
    <text x="221" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#C62828">0</text>

    <!-- Row 4 -->
    <text x="98" y="223" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">4</text>
    <text x="162" y="223" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">1</text>
    <text x="221" y="223" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">1</text>

    <!-- Highlight arrow pointing at row 2 -->
    <text x="50" y="193" font-family="Arial" font-size="11" fill="#E65100" font-weight="bold">&gt;</text>
  </g>

  <!-- Group 3: Frame number extraction and offset passthrough (3.0s) -->
  <g data-narration="The page table returns frame number f. The offset d passes through unchanged to form part of the physical address." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>

    <!-- Arrow from frame column to physical address area -->
    <line x1="162" y1="230" x2="162" y2="258" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="175" y="248" font-family="Arial" font-size="9" fill="#E65100" font-style="italic">f = 7</text>

    <!-- Offset pass-through arrow curving from logical to physical -->
    <path d="M 285 84 Q 370 180 325 258" fill="none" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-teal)"/>
    <text x="355" y="175" font-family="Arial" font-size="9" fill="#00695C" font-style="italic">d</text>
  </g>

  <!-- Group 4: Physical Address construction (4.5s) -->
  <g data-narration="The physical address is formed by combining the frame number f with the original offset d. Physical Address equals f times page size plus offset d." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>

    <!-- Physical Address box -->
    <rect x="60" y="262" width="300" height="44" fill="white" stroke="#E65100" stroke-width="1.5" rx="6"/>
    <text x="210" y="277" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Physical Address</text>

    <!-- Frame Number portion -->
    <rect x="65" y="282" width="145" height="20" fill="#E65100" rx="3"/>
    <text x="137" y="296" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Frame Number (f=7)</text>

    <!-- Offset portion -->
    <rect x="215" y="282" width="140" height="20" fill="#00695C" rx="3"/>
    <text x="285" y="296" text-anchor="middle" font-family="monospace" font-size="10" fill="white">Offset (d)</text>
  </g>

  <!-- Group 5: Physical Memory visualization (6.0s) -->
  <g data-narration="In physical memory, each frame is a fixed-size block. The target data is located at frame 7 plus offset d. Pages and frames are always the same size, typically 4 kilobytes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>

    <!-- Physical Memory strip -->
    <rect x="60" y="316" width="300" height="36" fill="white" stroke="#3949AB" stroke-width="1" rx="4"/>
    <text x="210" y="330" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Physical Memory (Frames)</text>

    <!-- Frame boxes -->
    <rect x="64" y="334" width="30" height="14" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" rx="2"/>
    <text x="79" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">0</text>

    <rect x="97" y="334" width="30" height="14" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" rx="2"/>
    <text x="112" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">1</text>

    <rect x="130" y="334" width="30" height="14" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" rx="2"/>
    <text x="145" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">2</text>

    <text x="170" y="344" font-family="monospace" font-size="8" fill="#3949AB">...</text>

    <rect x="185" y="334" width="30" height="14" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" rx="2"/>
    <text x="200" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">5</text>

    <rect x="218" y="334" width="30" height="14" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" rx="2"/>
    <text x="233" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">6</text>

    <!-- Frame 7 highlighted -->
    <rect x="251" y="334" width="30" height="14" fill="#E65100" stroke="#E65100" stroke-width="0.5" rx="2"/>
    <text x="266" y="344" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="white">7</text>

    <rect x="284" y="334" width="30" height="14" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" rx="2"/>
    <text x="299" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">8</text>

    <rect x="317" y="334" width="30" height="14" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5" rx="2"/>
    <text x="332" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">...</text>

    <!-- Arrow from physical address to frame 7 -->
    <line x1="210" y1="306" x2="266" y2="332" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  </g>

  <!-- Group 6: Formula summary (7.5s) -->
  <g data-narration="The complete formula is: Page Number equals Logical Address divided by Page Size, Offset equals Logical Address modulo Page Size, and Physical Address equals Frame Number times Page Size plus Offset." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>

    <!-- Formula box -->
    <rect x="60" y="358" width="300" height="34" fill="white" stroke="#C62828" stroke-width="1.5" rx="6"/>
    <text x="210" y="371" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828" font-weight="bold">p = LA / PageSize   d = LA % PageSize</text>
    <text x="210" y="384" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828" font-weight="bold">PhysAddr = PageTable[p] x PageSize + d</text>
  </g>
</svg>
