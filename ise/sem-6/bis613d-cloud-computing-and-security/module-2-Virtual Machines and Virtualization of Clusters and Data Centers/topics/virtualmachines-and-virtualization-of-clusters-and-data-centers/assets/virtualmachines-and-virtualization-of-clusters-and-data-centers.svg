<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Virtual Machines &amp; Virtualization Overview</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Virtualization creates virtual environments on physical hardware, enabling multiple VMs to share a single host for better resource utilization, cost savings, and easier system management.">
    <text x="400" y="55" text-anchor="middle" font-size="12" fill="#616161">Definition, Types, Components, Advantages, and Challenges</text>
  </g>

  <g id="step1" class="step" data-narration="A virtual machine emulates a physical computer with its own virtual CPU, memory, storage, and operating system, all running on shared physical hardware managed by a hypervisor.">
    <rect x="30" y="70" width="740" height="80" rx="8" fill="white" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">VM Architecture</text>
    
    <rect x="50" y="105" width="100" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="100" y="122" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">VM 1</text>
    <text x="100" y="133" text-anchor="middle" font-size="7" fill="#1565c0">Guest OS + Apps</text>

    <rect x="160" y="105" width="100" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="210" y="122" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">VM 2</text>
    <text x="210" y="133" text-anchor="middle" font-size="7" fill="#1565c0">Guest OS + Apps</text>

    <rect x="270" y="105" width="100" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="320" y="122" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">VM 3</text>
    <text x="320" y="133" text-anchor="middle" font-size="7" fill="#1565c0">Guest OS + Apps</text>

    <rect x="400" y="105" width="100" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="450" y="122" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">VM n</text>
    <text x="450" y="133" text-anchor="middle" font-size="7" fill="#1565c0">Guest OS + Apps</text>

    <rect x="550" y="105" width="80" height="35" rx="4" fill="#1976d2"/>
    <text x="590" y="120" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Hypervisor</text>
    <text x="590" y="132" text-anchor="middle" font-size="7" fill="white">(VMM)</text>

    <rect x="640" y="105" width="110" height="35" rx="4" fill="#0d47a1"/>
    <text x="695" y="120" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Physical Hardware</text>
    <text x="695" y="132" text-anchor="middle" font-size="7" fill="white">CPU, RAM, Storage</text>
  </g>

  <g id="step2" class="step" data-narration="There are three main types of virtualization: hosted for running multiple VMs on a desktop, server for consolidating data center resources, and desktop for remote access to different operating systems.">
    <rect x="30" y="160" width="740" height="75" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Types of Virtualization</text>

    <rect x="50" y="195" width="220" height="30" rx="5" fill="white" stroke="#388e3c" stroke-width="1.5"/>
    <text x="160" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Hosted Virtualization</text>
    <text x="270" y="214" text-anchor="start" font-size="9" fill="#455a64">Desktop VMs on physical host</text>

    <rect x="290" y="195" width="220" height="30" rx="5" fill="white" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Server Virtualization</text>
    <text x="520" y="214" text-anchor="start" font-size="9" fill="#455a64">Multiple VMs on one server</text>

    <rect x="530" y="195" width="220" height="30" rx="5" fill="white" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="640" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Desktop Virtualization</text>
    <text x="760" y="214" text-anchor="start" font-size="9" fill="#455a64">Remote desktop environments</text>
  </g>

  <g id="step3" class="step" data-narration="Every virtual machine has three essential components: the hypervisor that creates and manages VMs, the guest operating system that runs inside each VM, and virtual hardware like virtual CPU, memory, storage, and network.">
    <rect x="30" y="245" width="740" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">VM Components</text>

    <rect x="50" y="280" width="220" height="25" rx="4" fill="white" stroke="#1976d2" stroke-width="1.5"/>
    <text x="160" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Hypervisor</text>
    <text x="280" y="297" text-anchor="start" font-size="9" fill="#455a64">Creates and manages VMs</text>

    <rect x="290" y="280" width="220" height="25" rx="4" fill="white" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Guest Operating System</text>
    <text x="520" y="297" text-anchor="start" font-size="9" fill="#455a64">OS running inside the VM</text>

    <rect x="530" y="280" width="220" height="25" rx="4" fill="white" stroke="#e65100" stroke-width="1.5"/>
    <text x="640" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Virtual Hardware</text>
    <text x="760" y="297" text-anchor="start" font-size="9" fill="#455a64">vCPU, vRAM, vDisk, vNIC</text>
  </g>

  <g id="step4" class="step" data-narration="Virtualization offers significant advantages including improved resource utilization by sharing hardware across multiple VMs, hardware consolidation to reduce physical servers, and better manageability through centralized software-defined control.">
    <rect x="30" y="325" width="360" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Advantages</text>

    <rect x="48" y="358" width="325" height="20" rx="3" fill="#bbdefb"/>
    <text x="210" y="372" text-anchor="middle" font-size="10" fill="#1565c0">Resource Utilization - multiple VMs share hardware</text>

    <rect x="48" y="382" width="325" height="20" rx="3" fill="#bbdefb"/>
    <text x="210" y="396" text-anchor="middle" font-size="10" fill="#1565c0">Hardware Consolidation - fewer physical servers needed</text>
  </g>

  <g id="step5" class="step" data-narration="Virtualization presents challenges like performance overhead from the virtualization layer, security risks in complex multi-VM environments, and compatibility issues between different operating systems and hardware configurations.">
    <rect x="410" y="325" width="365" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="592" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Challenges</text>

    <rect x="428" y="358" width="330" height="20" rx="3" fill="#ffcdd2"/>
    <text x="593" y="372" text-anchor="middle" font-size="10" fill="#c62828">Performance Overhead - VM creation adds cost</text>

    <rect x="428" y="382" width="330" height="20" rx="3" fill="#ffcdd2"/>
    <text x="593" y="396" text-anchor="middle" font-size="10" fill="#c62828">Security Risks - complex multi-VM environments</text>
  </g>

  <g id="step6" class="step" data-narration="Virtualization is the foundation of cloud computing, enabling the delivery of Infrastructure as a Service, Platform as a Service, and Software as a Service through resource abstraction and multi-tenant architectures.">
    <rect x="30" y="420" width="740" height="65" rx="8" fill="white" stroke="#3f51b5" stroke-width="1.5"/>
    <text x="400" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Virtualization in Cloud Computing</text>
    <text x="400" y="458" text-anchor="middle" font-size="10" fill="#455a64">Cloud service delivery models enabled by virtualization:</text>

    <rect x="100" y="468" width="120" height="22" rx="11" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="160" y="483" text-anchor="middle" font-size="10" fill="#1976d2">IaaS (VMs)</text>

    <rect x="340" y="468" width="120" height="22" rx="11" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="483" text-anchor="middle" font-size="10" fill="#388e3c">PaaS (Platform)</text>

    <rect x="580" y="468" width="120" height="22" rx="11" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="640" y="483" text-anchor="middle" font-size="10" fill="#9c27b0">SaaS (Apps)</text>
  </g>
</svg>