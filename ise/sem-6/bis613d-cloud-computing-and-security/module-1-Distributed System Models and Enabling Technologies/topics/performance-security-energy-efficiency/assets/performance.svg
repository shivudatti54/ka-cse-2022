<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Performance, Security &amp; Energy Efficiency</text>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Three essential pillars of distributed systems design are Performance for speed, Security for protection, and Energy Efficiency for sustainability in modern computing infrastructures.">
    <rect x="40" y="42" width="720" height="45" rx="8" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
    <text x="400" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Three Pillars of Distributed System Design</text>
    <rect x="70" y="68" width="190" height="14" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="165" y="79" text-anchor="middle" font-size="10" fill="#1565c0">Performance</text>
    <rect x="280" y="68" width="190" height="14" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="375" y="79" text-anchor="middle" font-size="10" fill="#c62828">Security</text>
    <rect x="490" y="68" width="190" height="14" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="585" y="79" text-anchor="middle" font-size="10" fill="#2e7d32">Energy Efficiency</text>
  </g>

  <!-- Step 1: Performance Metrics -->
  <g class="step" id="step1" data-narration="Performance is measured by throughput for task completion rates, latency for response delays, scalability for handling growing loads, and availability for uptime reliability percentages.">
    <rect x="40" y="95" width="720" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Performance Metrics</text>
    <rect x="60" y="122" width="155" height="25" rx="4" fill="#bbdefb"/>
    <text x="137" y="137" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Throughput</text>
    <rect x="225" y="122" width="155" height="25" rx="4" fill="#bbdefb"/>
    <text x="302" y="137" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Latency</text>
    <rect x="390" y="122" width="155" height="25" rx="4" fill="#bbdefb"/>
    <text x="467" y="137" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Scalability</text>
    <rect x="555" y="122" width="155" height="25" rx="4" fill="#bbdefb"/>
    <text x="632" y="137" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Availability</text>
  </g>

  <!-- Step 2: Optimization & Security -->
  <g class="step" id="step2" data-narration="Optimization techniques include load balancing, caching, and parallel processing. Security relies on the CIA Triad: Confidentiality, Integrity, and Availability of data assets.">
    <rect x="40" y="163" width="720" height="75" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Optimization</text>
    <text x="600" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Security: CIA Triad</text>
    <rect x="50" y="190" width="100" height="20" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="100" y="204" text-anchor="middle" font-size="8" font-weight="bold" fill="#e65100">Load Balancing</text>
    <rect x="155" y="190" width="100" height="20" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="205" y="204" text-anchor="middle" font-size="8" font-weight="bold" fill="#7b1fa2">Caching</text>
    <rect x="260" y="190" width="100" height="20" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="310" y="204" text-anchor="middle" font-size="8" font-weight="bold" fill="#2e7d32">Parallel</text>
    <rect x="430" y="190" width="100" height="20" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="480" y="204" text-anchor="middle" font-size="8" font-weight="bold" fill="#c62828">Confidentiality</text>
    <rect x="535" y="190" width="100" height="20" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="585" y="204" text-anchor="middle" font-size="8" font-weight="bold" fill="#c62828">Integrity</text>
    <rect x="640" y="190" width="100" height="20" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="690" y="204" text-anchor="middle" font-size="8" font-weight="bold" fill="#c62828">Availability</text>
  </g>

  <!-- Step 3: Security Mechanisms -->
  <g class="step" id="step3" data-narration="Security implementations use symmetric encryption like AES and DES, asymmetric encryption with RSA and ECC, and TLS or SSL protocols for secure network communications.">
    <rect x="40" y="246" width="720" height="60" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">Security Mechanisms</text>
    <rect x="60" y="273" width="210" height="22" rx="4" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="165" y="286" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">Symmetric (AES, DES)</text>
    <rect x="285" y="273" width="210" height="22" rx="4" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="390" y="286" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">Asymmetric (RSA, ECC)</text>
    <rect x="510" y="273" width="210" height="22" rx="4" fill="#9c27b0"/>
    <text x="615" y="286" text-anchor="middle" font-size="9" font-weight="bold" fill="white">TLS / SSL</text>
  </g>

  <!-- Step 4: Energy Efficiency Combined -->
  <g class="step" id="step4" data-narration="PUE measures data center efficiency; ideal is 1.0. Server consolidation uses virtualization to combine four 40% servers into one 80% virtual server, saving energy.">
    <rect x="40" y="314" width="720" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="215" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">PUE Metric</text>
    <text x="215" y="345" text-anchor="middle" font-size="8" fill="#2e7d32">PUE = Total / IT Power</text>
    <rect x="55" y="353" width="60" height="22" rx="3" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="85" y="366" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">1.0 Ideal</text>
    <rect x="125" y="353" width="60" height="22" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="155" y="366" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">&lt;1.2 Good</text>
    <rect x="195" y="353" width="60" height="22" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="225" y="366" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">1.5 Normal</text>
    <rect x="265" y="353" width="60" height="22" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="295" y="366" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">2.0 Poor</text>
    <text x="400" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Server Consolidation</text>
    <rect x="380" y="345" width="28" height="22" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="394" y="359" text-anchor="middle" font-size="7" fill="#2e7d32">40%</text>
    <rect x="412" y="345" width="28" height="22" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="426" y="359" text-anchor="middle" font-size="7" fill="#2e7d32">40%</text>
    <rect x="444" y="345" width="28" height="22" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="458" y="359" text-anchor="middle" font-size="7" fill="#2e7d32">40%</text>
    <rect x="476" y="345" width="28" height="22" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="490" y="359" text-anchor="middle" font-size="7" fill="#2e7d32">40%</text>
    <text x="530" y="359" text-anchor="middle" font-size="12" fill="#388e3c">&#x2192;</text>
    <rect x="550" y="341" width="80" height="30" rx="4" fill="#388e3c"/>
    <text x="590" y="356" text-anchor="middle" font-size="9" font-weight="bold" fill="white">80% Util</text>
    <text x="590" y="369" text-anchor="middle" font-size="7" fill="#a5d6a7">1 virtual</text>
  </g>

  <!-- Step 5: Trade-offs & Examples -->
  <g class="step" id="step5" data-narration="Real systems involve trade-offs: encryption improves security but adds latency, higher performance demands more power, and redundancy enhances availability while consuming additional energy resources.">
    <rect x="40" y="412" width="720" height="85" rx="8" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
    <text x="400" y="429" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Trade-offs &amp; Industry Examples</text>
    <rect x="60" y="441" width="210" height="22" rx="4" fill="#ffcdd2" stroke="#f44336"/>
    <text x="165" y="455" text-anchor="middle" font-size="9" fill="#c62828">Security adds latency</text>
    <rect x="285" y="441" width="210" height="22" rx="4" fill="#bbdefb" stroke="#1976d2"/>
    <text x="390" y="455" text-anchor="middle" font-size="9" fill="#1565c0">Performance needs power</text>
    <rect x="510" y="441" width="210" height="22" rx="4" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="615" y="455" text-anchor="middle" font-size="9" fill="#2e7d32">Redundancy uses energy</text>
    <rect x="60" y="471" width="120" height="18" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="120" y="484" text-anchor="middle" font-size="8" fill="#1565c0">Google: PUE 1.1</text>
    <rect x="190" y="471" width="120" height="18" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="250" y="484" text-anchor="middle" font-size="8" fill="#c62828">AWS: IAM, VPC</text>
    <rect x="320" y="471" width="120" height="18" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="380" y="484" text-anchor="middle" font-size="8" fill="#2e7d32">Facebook: OCP</text>
    <rect x="450" y="471" width="120" height="18" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="510" y="484" text-anchor="middle" font-size="8" fill="#7b1fa2">Azure: Green</text>
    <rect x="580" y="471" width="120" height="18" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="640" y="484" text-anchor="middle" font-size="8" fill="#e65100">Netflix: Chaos</text>
  </g>
</svg>