<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Programming on AWS and Microsoft Azure</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Cloud programming shifts development from managing physical hardware to using scalable, managed services via APIs and SDKs for focus on business logic.">
    <text x="400" y="55" text-anchor="middle" font-size="11" fill="#616161">Introduction: Cloud Programming Paradigm Shift</text>
  </g>

  <g id="step1" class="step" data-narration="AWS offers over 200 services including Lambda for serverless computing, S3 for storage, DynamoDB for NoSQL, and RDS for relational databases.">
    <rect x="30" y="70" width="360" height="140" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d47a1">Amazon Web Services (AWS)</text>
    <rect x="45" y="105" width="330" height="28" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="210" y="124" text-anchor="middle" font-size="10" fill="#0d47a1">Compute: Lambda (Serverless), EC2 (Virtual Servers)</text>
    <rect x="45" y="138" width="330" height="28" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="210" y="157" text-anchor="middle" font-size="10" fill="#0d47a1">Storage: S3 (Object Storage), EBS (Block Storage)</text>
    <rect x="45" y="171" width="330" height="28" rx="4" fill="#1976d2"/>
    <text x="210" y="190" text-anchor="middle" font-size="10" fill="white">Database: DynamoDB (NoSQL), RDS (SQL)</text>
  </g>

  <g id="step2" class="step" data-narration="Azure provides deep Microsoft ecosystem integration with Functions for serverless, Blob Storage for objects, Cosmos DB for global NoSQL, and SQL Database.">
    <rect x="410" y="70" width="360" height="140" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b1fa2">Microsoft Azure</text>
    <rect x="425" y="105" width="330" height="28" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="590" y="124" text-anchor="middle" font-size="10" fill="#7b1fa2">Compute: Azure Functions (Serverless), VMs</text>
    <rect x="425" y="138" width="330" height="28" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="590" y="157" text-anchor="middle" font-size="10" fill="#7b1fa2">Storage: Blob Storage, Disk Storage</text>
    <rect x="425" y="171" width="330" height="28" rx="4" fill="#9c27b0"/>
    <text x="590" y="190" text-anchor="middle" font-size="10" fill="white">Database: Cosmos DB (NoSQL), SQL Database</text>
  </g>

  <g id="step3" class="step" data-narration="The Shared Responsibility Model divides security: cloud providers secure the infrastructure, while customers secure their data, access, and applications.">
    <rect x="30" y="225" width="740" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Shared Responsibility Model</text>
    <rect x="50" y="260" width="340" height="25" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="220" y="277" text-anchor="middle" font-size="10" fill="#e65100">Provider: Security OF the cloud (infrastructure)</text>
    <rect x="410" y="260" width="340" height="25" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="580" y="277" text-anchor="middle" font-size="10" fill="#e65100">Customer: Security IN the cloud (data, access, code)</text>
  </g>

  <g id="step4" class="step" data-narration="Infrastructure as Code enables version-controlled, repeatable environments using CloudFormation for AWS and ARM Templates or Bicep for Azure.">
    <rect x="30" y="310" width="740" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="333" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Infrastructure as Code (IaC)</text>
    <rect x="50" y="348" width="220" height="22" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="160" y="363" text-anchor="middle" font-size="10" fill="#1b5e20">AWS: CloudFormation</text>
    <rect x="290" y="348" width="220" height="22" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="363" text-anchor="middle" font-size="10" fill="#1b5e20">Azure: ARM Templates / Bicep</text>
    <rect x="530" y="348" width="220" height="22" rx="4" fill="#388e3c"/>
    <text x="640" y="363" text-anchor="middle" font-size="10" fill="white">Version-controlled, repeatable</text>
  </g>

  <g id="step5" class="step" data-narration="Event-driven architecture triggers code execution in response to events. For example, an S3 file upload triggers Lambda to process the image automatically.">
    <rect x="30" y="395" width="740" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Event-Driven Architecture Example</text>
    <rect x="50" y="432" width="150" height="35" rx="5" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="125" y="450" text-anchor="middle" font-size="9" fill="#c62828">User uploads image</text>
    <text x="125" y="462" text-anchor="middle" font-size="8" fill="#c62828">to S3 Bucket</text>
    <line x1="200" y1="450" x2="240" y2="450" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="260" y="432" width="150" height="35" rx="5" fill="#ef9a9a" stroke="#f44336" stroke-width="1"/>
    <text x="335" y="450" text-anchor="middle" font-size="9" fill="#c62828">Lambda Function</text>
    <text x="335" y="462" text-anchor="middle" font-size="8" fill="#c62828">triggered automatically</text>
    <line x1="410" y1="450" x2="450" y2="450" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="470" y="432" width="150" height="35" rx="5" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="545" y="450" text-anchor="middle" font-size="9" fill="#c62828">Save thumbnail</text>
    <text x="545" y="462" text-anchor="middle" font-size="8" fill="#c62828">to another S3 bucket</text>
  </g>

  <g id="step6" class="step" data-narration="AWS uses Boto3 SDK for Python while Azure uses Azure SDK with DefaultAzureCredential for programmatic service interaction like listing storage containers.">
    <rect x="30" y="495" width="740" height="90" rx="8" fill="#e1f5fe" stroke="#0277bd" stroke-width="2"/>
    <text x="400" y="518" text-anchor="middle" font-size="13" font-weight="bold" fill="#01579b">SDK Programming Examples</text>
    <rect x="50" y="530" width="340" height="45" rx="5" fill="#b3e5fc" stroke="#0277bd" stroke-width="1"/>
    <text x="220" y="548" text-anchor="middle" font-size="10" font-weight="bold" fill="#01579b">AWS (Python Boto3)</text>
    <text x="220" y="563" text-anchor="middle" font-size="8" fill="#01579b">s3_client = boto3.client('s3')</text>
    <text x="220" y="573" text-anchor="middle" font-size="8" fill="#01579b">response = s3_client.list_buckets()</text>
    <rect x="410" y="530" width="340" height="45" rx="5" fill="#b3e5fc" stroke="#0277bd" stroke-width="1"/>
    <text x="580" y="548" text-anchor="middle" font-size="10" font-weight="bold" fill="#01579b">Azure (Python SDK)</text>
    <text x="580" y="563" text-anchor="middle" font-size="8" fill="#01579b">credential = DefaultAzureCredential()</text>
    <text x="580" y="573" text-anchor="middle" font-size="8" fill="#01579b">blob_service_client.list_containers()</text>
  </g>

</svg>