<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6z" fill="#546E7A"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 1: Title -->
  <g class="step" data-narration="Cloud security uses defense-in-depth with multiple layers. Physical security protects data centers, then network, identity, application, data, and monitoring controls work together.">
    <rect x="50" y="20" width="700" height="56" rx="10" fill="url(#headerGrad)"/>
    <text x="400" y="55" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Cloud Security Defense Strategies</text>
  </g>

  <!-- Step 2: Defense-in-Depth Layers -->
  <g class="step" data-narration="Defense-in-depth has six layers. Physical security is the outer layer, then network, IAM, application, data, and monitoring at the core. If one layer fails, others still protect.">
    <text x="400" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">Defense-in-Depth: Six Security Layers</text>

    <!-- Concentric rectangles representing layers -->
    <rect x="40" y="115" width="720" height="85" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
    <text x="60" y="132" font-size="11" font-weight="bold" fill="#1565C0">Layer 1: Physical</text>
    <text x="200" y="132" font-size="10" fill="#555">DC access controls, biometrics, surveillance (provider)</text>

    <rect x="60" y="150" width="680" height="35" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="80" y="168" font-size="11" font-weight="bold" fill="#2E7D32">Layer 2: Network</text>
    <text x="250" y="168" font-size="10" fill="#555">VPCs, firewalls, NACLs, DDoS protection, IDS/IPS</text>

    <rect x="80" y="185" width="640" height="30" rx="6" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5"/>
    <text x="100" y="203" font-size="11" font-weight="bold" fill="#E65100">Layer 3: IAM</text>
    <text x="280" y="203" font-size="10" fill="#555">MFA, RBAC, least privilege, JIT access</text>

    <rect x="100" y="215" width="600" height="28" rx="5" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5"/>
    <text x="120" y="232" font-size="10" font-weight="bold" fill="#C62828">Layer 4: Application</text>
    <text x="320" y="232" font-size="10" fill="#555">Secure coding, WAFs, input validation, scanning</text>

    <rect x="120" y="243" width="560" height="26" rx="5" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
    <text x="140" y="260" font-size="10" font-weight="bold" fill="#4527A0">Layer 5: Data</text>
    <text x="350" y="260" font-size="10" fill="#555">Encryption at rest/transit/use, DLP, classification</text>

    <rect x="200" y="269" width="400" height="24" rx="4" fill="#E0F7FA" stroke="#0097A7" stroke-width="1.5"/>
    <text x="400" y="286" text-anchor="middle" font-size="10" font-weight="bold" fill="#006064">Layer 6: Monitoring & Logging</text>
  </g>

  <!-- Step 3: IAM Strategies -->
  <g class="step" data-narration="IAM is the cornerstone. MFA requires two verification factors. RBAC assigns permissions to roles, not users. Least privilege gives minimum access. JIT provides temporary elevation when needed.">
    <text x="400" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">IAM: The Cornerstone</text>

    <rect x="40" y="325" width="230" height="55" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
    <text x="55" y="345" font-size="11" font-weight="bold" fill="#E65100">MFA</text>
    <text x="55" y="362" font-size="10" fill="#555">Password + OTP/biometric</text>

    <rect x="285" y="325" width="230" height="55" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
    <text x="300" y="345" font-size="11" font-weight="bold" fill="#E65100">RBAC</text>
    <text x="300" y="362" font-size="10" fill="#555">Permissions to roles</text>

    <rect x="530" y="325" width="230" height="55" rx="8" fill="#FFF8E1" stroke="#FFC107" stroke-width="1.5"/>
    <text x="545" y="345" font-size="11" font-weight="bold" fill="#F57F17">Least Privilege</text>
    <text x="545" y="362" font-size="10" fill="#555">Minimum necessary access</text>

    <rect x="40" y="390" width="230" height="45" rx="8" fill="#FFF8E1" stroke="#FFC107" stroke-width="1.5"/>
    <text x="55" y="410" font-size="11" font-weight="bold" fill="#F57F17">JIT Access</text>
    <text x="55" y="424" font-size="10" fill="#555">Temporary, auto-revoke</text>

    <rect x="285" y="390" width="230" height="45" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="300" y="410" font-size="11" font-weight="bold" fill="#2E7D32">Managed Identities</text>
    <text x="300" y="424" font-size="10" fill="#555">Replace API keys</text>

    <rect x="530" y="390" width="230" height="45" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="545" y="410" font-size="11" font-weight="bold" fill="#2E7D32">Service Account Security</text>
    <text x="545" y="424" font-size="10" fill="#555">Rotate credentials</text>
  </g>

  <!-- Step 4: Network Security -->
  <g class="step" data-narration="Network security uses VPCs to isolate workloads. Security Groups filter at instance level with stateful rules. NACLs filter at subnet level with stateless rules. Private endpoints avoid the public internet.">
    <text x="400" y="455" text-anchor="middle" font-size="15" font-weight="bold" fill="#2E7D32">Network Security Architecture</text>

    <rect x="60" y="470" width="680" height="100" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="80" y="488" font-size="12" font-weight="bold" fill="#2E7D32">VPC (Isolated Network)</text>

    <rect x="90" y="498" width="180" height="55" rx="5" fill="#C8E6C9" stroke="#66BB6A"/>
    <text x="180" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Public Subnet</text>
    <text x="180" y="532" text-anchor="middle" font-size="9" fill="#555">Web Tier + WAF</text>

    <rect x="310" y="498" width="180" height="55" rx="5" fill="#DCEDC8" stroke="#9CCC65"/>
    <text x="400" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="#33691E">Private Subnet</text>
    <text x="400" y="532" text-anchor="middle" font-size="9" fill="#555">App Tier (SG rules)</text>

    <rect x="530" y="498" width="180" height="55" rx="5" fill="#F1F8E9" stroke="#AED581"/>
    <text x="620" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="#33691E">Isolated Subnet</text>
    <text x="620" y="532" text-anchor="middle" font-size="9" fill="#555">DB Tier (private)</text>

    <rect x="100" y="560" width="290" height="25" rx="4" fill="#FFEBEE" stroke="#EF5350"/>
    <text x="245" y="578" text-anchor="middle" font-size="10" fill="#C62828">DDoS Protection (AWS Shield / Azure)</text>

    <rect x="410" y="560" width="290" height="25" rx="4" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="555" y="578" text-anchor="middle" font-size="10" fill="#E65100">WAF (OWASP Top 10 protection)</text>
  </g>

  <!-- Step 5: Data Protection -->
  <g class="step" data-narration="Protect data through encryption. At rest uses AES-256. In transit uses TLS 1.2 or higher. In use through confidential computing. Classify data by sensitivity and apply DLP controls.">
    <text x="400" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#7B1FA2">Data Protection Strategies</text>

    <rect x="40" y="115" width="240" height="60" rx="8" fill="#EDE7F6" stroke="#9C27B0" stroke-width="1.5"/>
    <text x="160" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">Encryption at Rest</text>
    <text x="160" y="152" text-anchor="middle" font-size="10" fill="#555">AES-256, disk and database</text>
    <text x="160" y="166" text-anchor="middle" font-size="9" fill="#888">Provider-managed or CMK</text>

    <rect x="280" y="115" width="240" height="60" rx="8" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5"/>
    <text x="400" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#283593">Encryption in Transit</text>
    <text x="400" y="152" text-anchor="middle" font-size="10" fill="#555">TLS 1.2+ for all traffic</text>
    <text x="400" y="166" text-anchor="middle" font-size="9" fill="#888">API calls, data transfer</text>

    <rect x="520" y="115" width="240" height="60" rx="8" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5"/>
    <text x="640" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#00695C">Encryption in Use</text>
    <text x="640" y="152" text-anchor="middle" font-size="10" fill="#555">Confidential computing</text>
    <text x="640" y="166" text-anchor="middle" font-size="9" fill="#888">Secure enclaves (TEE)</text>

    <rect x="40" y="185" width="350" height="45" rx="8" fill="#F3E5F5" stroke="#AB47BC"/>
    <text x="55" y="205" font-size="11" font-weight="bold" fill="#7B1FA2">Data Classification</text>
    <text x="55" y="220" font-size="10" fill="#555">Public → Internal → Confidential → Restricted</text>

    <rect x="410" y="185" width="350" height="45" rx="8" fill="#F3E5F5" stroke="#AB47BC"/>
    <text x="425" y="205" font-size="11" font-weight="bold" fill="#7B1FA2">Data Loss Prevention</text>
    <text x="425" y="220" font-size="10" fill="#555">Detect and block unauthorized data exfiltration</text>

    <rect x="150" y="240" width="500" height="30" rx="6" fill="#E3F2FD" stroke="#64B5F6"/>
    <text x="400" y="260" text-anchor="middle" font-size="10" fill="#1565C0">+ Regular Backups (geo-redundant) + Data Masking for dev/test</text>
  </g>

  <!-- Step 6: Monitoring & Incident Response -->
  <g class="step" data-narration="Continuous monitoring uses SIEM to aggregate logs. IDS and IPS detect and block threats. Automated alerting notifies of anomalies. Incident response plans define how to handle security breaches.">
    <text x="400" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#C62828">Security Monitoring & Incident Response</text>

    <rect x="40" y="325" width="350" height="55" rx="8" fill="#FFEBEE" stroke="#EF5350" stroke-width="1.5"/>
    <text x="55" y="345" font-size="11" font-weight="bold" fill="#C62828">SIEM</text>
    <text x="55" y="362" font-size="10" fill="#555">Central log aggregation</text>
    <text x="280" y="362" font-size="9" fill="#888">AWS GuardDuty, Azure Sentinel</text>

    <rect x="410" y="325" width="350" height="55" rx="8" fill="#FFEBEE" stroke="#EF5350" stroke-width="1.5"/>
    <text x="425" y="345" font-size="11" font-weight="bold" fill="#C62828">IDS / IPS</text>
    <text x="425" y="362" font-size="10" fill="#555">Detect and block threats</text>
    <text x="650" y="362" font-size="9" fill="#888">Traffic monitoring</text>

    <rect x="40" y="390" width="350" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
    <text x="55" y="410" font-size="11" font-weight="bold" fill="#E65100">Automated Alerting</text>
    <text x="55" y="428" font-size="10" fill="#555">Unusual login, large download, privilege escalation</text>

    <rect x="410" y="390" width="350" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
    <text x="425" y="410" font-size="11" font-weight="bold" fill="#E65100">Incident Response Plan</text>
    <text x="425" y="428" font-size="10" fill="#555">Documented roles, communication, escalation procedures</text>

    <rect x="150" y="450" width="500" height="30" rx="6" fill="#E8F5E9" stroke="#4CAF50"/>
    <text x="400" y="470" text-anchor="middle" font-size="10" fill="#2E7D32">Forensic Readiness: Immutable logs + audit trails for investigation</text>
  </g>

  <!-- Step 7: Cloud-Native Services Comparison -->
  <g class="step" data-narration="AWS and Azure offer matching security services. AWS IAM maps to Azure AD for identity. GuardDuty maps to Sentinel for threat detection. KMS maps to Key Vault for encryption keys.">
    <text x="400" y="500" text-anchor="middle" font-size="15" font-weight="bold" fill="#0277BD">Cloud-Native Security Services</text>

    <rect x="60" y="515" width="150" height="24" rx="0" fill="#1565C0"/>
    <text x="135" y="532" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">AWS</text>
    <rect x="210" y="515" width="150" height="24" rx="0" fill="#0277BD"/>
    <text x="285" y="532" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Azure</text>
    <rect x="360" y="515" width="180" height="24" rx="0" fill="#01579B"/>
    <text x="450" y="532" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Purpose</text>

    <rect x="60" y="539" width="150" height="22" fill="#E3F2FD"/>
    <text x="135" y="555" text-anchor="middle" font-size="9" fill="#333">IAM</text>
    <rect x="210" y="539" width="150" height="22" fill="#E3F2FD"/>
    <text x="285" y="555" text-anchor="middle" font-size="9" fill="#333">Azure AD</text>
    <rect x="360" y="539" width="180" height="22" fill="#E3F2FD"/>
    <text x="450" y="555" text-anchor="middle" font-size="9" fill="#555">Identity</text>

    <rect x="60" y="561" width="150" height="22" fill="#fff"/>
    <text x="135" y="577" text-anchor="middle" font-size="9" fill="#333">GuardDuty</text>
    <rect x="210" y="561" width="150" height="22" fill="#fff"/>
    <text x="285" y="577" text-anchor="middle" font-size="9" fill="#333">Sentinel</text>
    <rect x="360" y="561" width="180" height="22" fill="#fff"/>
    <text x="450" y="577" text-anchor="middle" font-size="9" fill="#555">Threat Detection</text>

    <rect x="60" y="583" width="150" height="22" fill="#E3F2FD"/>
    <text x="135" y="599" text-anchor="middle" font-size="9" fill="#333">KMS</text>
    <rect x="210" y="583" width="150" height="22" fill="#E3F2FD"/>
    <text x="285" y="599" text-anchor="middle" font-size="9" fill="#333">Key Vault</text>
    <rect x="360" y="583" width="180" height="22" fill="#E3F2FD"/>
    <text x="450" y="599" text-anchor="middle" font-size="9" fill="#555">Key Management</text>
  </g>

  <!-- Step 8: Zero Trust & DevSecOps -->
  <g class="step" data-narration="Zero Trust never trusts any user or device by default. It verifies every request and uses micro-segmentation. DevSecOps shifts security left by integrating testing into CI/CD pipelines.">
    <text x="400" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#00695C">Modern Approaches</text>

    <rect x="40" y="115" width="345" height="100" rx="8" fill="#E0F2F1" stroke="#00897B" stroke-width="2"/>
    <text x="212" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#004D40">Zero Trust Architecture</text>
    <text x="60" y="158" font-size="10" fill="#555">• Never trust, always verify</text>
    <text x="60" y="175" font-size="10" fill="#555">• Authenticate every request</text>
    <text x="60" y="192" font-size="10" fill="#555">• Micro-segment networks</text>
    <text x="60" y="209" font-size="10" fill="#555">• Limit blast radius</text>

    <rect x="415" y="115" width="345" height="100" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
    <text x="587" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#F57F17">DevSecOps</text>
    <text x="435" y="158" font-size="10" fill="#555">• Security in CI/CD pipelines</text>
    <text x="435" y="175" font-size="10" fill="#555">• SAST: static code analysis</text>
    <text x="435" y="192" font-size="10" fill="#555">• DAST: dynamic testing</text>
    <text x="435" y="209" font-size="10" fill="#555">• IaC security scanning</text>
  </g>

  <!-- Step 9: Key Takeaways -->
  <g class="step" data-narration="Remember these key points: defense-in-depth has six layers. IAM is the cornerstone with MFA and RBAC. Network uses VPCs and security groups. Data needs encryption everywhere. SIEM enables monitoring.">
    <text x="400" y="240" text-anchor="middle" font-size="15" font-weight="bold" fill="#311B92">Key Takeaways</text>

    <rect x="40" y="255" width="720" height="140" rx="10" fill="#EDE7F6" stroke="#7E57C2" stroke-width="2"/>

    <circle cx="70" cy="280" r="10" fill="#1565C0"/>
    <text x="70" y="285" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">1</text>
    <text x="95" y="285" font-size="11" fill="#333"><tspan font-weight="bold">Defense-in-depth</tspan>: 6 layers — Physical, Network, IAM, App, Data, Monitoring</text>

    <circle cx="70" cy="310" r="10" fill="#E65100"/>
    <text x="70" y="315" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">2</text>
    <text x="95" y="315" font-size="11" fill="#333"><tspan font-weight="bold">IAM</tspan>: MFA + RBAC + Least Privilege + JIT Access</text>

    <circle cx="70" cy="340" r="10" fill="#2E7D32"/>
    <text x="70" y="345" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">3</text>
    <text x="95" y="345" font-size="11" fill="#333"><tspan font-weight="bold">Network</tspan>: VPCs, Security Groups (stateful), NACLs (stateless), WAF, DDoS</text>

    <circle cx="70" cy="370" r="10" fill="#7B1FA2"/>
    <text x="70" y="375" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">4</text>
    <text x="95" y="375" font-size="11" fill="#333"><tspan font-weight="bold">Data</tspan>: Encrypt at rest/transit/use + DLP + Classification + Backups</text>

    <circle cx="400" cy="280" r="10" fill="#C62828"/>
    <text x="400" y="285" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">5</text>
    <text x="425" y="285" font-size="11" fill="#333"><tspan font-weight="bold">Monitoring</tspan>: SIEM + IDS/IPS + Alerting + Incident Response</text>

    <circle cx="400" cy="310" r="10" fill="#00695C"/>
    <text x="400" y="315" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">6</text>
    <text x="425" y="315" font-size="11" fill="#333"><tspan font-weight="bold">Modern</tspan>: Zero Trust + DevSecOps (shift security left)</text>

    <circle cx="400" cy="340" r="10" fill="#0277BD"/>
    <text x="400" y="345" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">7</text>
    <text x="425" y="345" font-size="11" fill="#333"><tspan font-weight="bold">Cloud Services</tspan>: AWS ↔ Azure security equivalents</text>
  </g>
</svg>