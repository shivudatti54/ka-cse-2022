<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Data Center Design and Interconnection Networks</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Data centers are the physical engine rooms of cloud computing, housing thousands of servers, storage systems, and networking equipment that deliver scalable, reliable, and high-performance services.">
    <text x="400" y="52" text-anchor="middle" font-size="11" fill="#616161">Design Principles • Key Components • Network Architectures • SDN • Global Connectivity</text>
  </g>

  <g id="step1" class="step" data-narration="Modern data centers follow core principles: scalability through horizontal scaling with commodity servers, high availability with redundant power and networking, and energy efficiency measured by PUE, plus strong security.">
    <rect x="20" y="65" width="760" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">Core Design Principles</text>

    <rect x="35" y="92" width="170" height="38" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="120" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#0d47a1">Scalability</text>
    <text x="120" y="122" text-anchor="middle" font-size="7" fill="#0d47a1">Horizontal scale-out, commodity servers</text>

    <rect x="215" y="92" width="170" height="38" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="300" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#0d47a1">Reliability (99.99%)</text>
    <text x="300" y="122" text-anchor="middle" font-size="7" fill="#0d47a1">Redundancy, no single point of failure</text>

    <rect x="395" y="92" width="170" height="38" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="480" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#0d47a1">Efficiency (PUE)</text>
    <text x="480" y="122" text-anchor="middle" font-size="7" fill="#0d47a1">PUE 1.1-1.4, free/liquid cooling</text>

    <rect x="575" y="92" width="190" height="38" rx="4" fill="#1976d2"/>
    <text x="670" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Security &amp; Automation</text>
    <text x="670" y="122" text-anchor="middle" font-size="7" fill="#bbdefb">Biometric, 24/7, software-defined</text>
  </g>

  <g id="step2" class="step" data-narration="A data center contains physical components including server racks housing compute nodes, top-of-rack switches for network connectivity, power distribution units, storage area networks, and CRAC cooling systems.">
    <rect x="20" y="150" width="380" height="100" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="210" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Key Data Center Components</text>

    <rect x="35" y="180" width="110" height="30" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="90" y="196" text-anchor="middle" font-size="8" font-weight="bold" fill="#e65100">Server Racks</text>
    <text x="90" y="208" text-anchor="middle" font-size="7" fill="#e65100">Blade/rack servers</text>

    <rect x="155" y="180" width="110" height="30" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="210" y="196" text-anchor="middle" font-size="8" font-weight="bold" fill="#e65100">ToR Switch</text>
    <text x="210" y="208" text-anchor="middle" font-size="7" fill="#e65100">Top-of-Rack network</text>

    <rect x="275" y="180" width="110" height="30" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="330" y="196" text-anchor="middle" font-size="8" font-weight="bold" fill="#e65100">SAN / NAS</text>
    <text x="330" y="208" text-anchor="middle" font-size="7" fill="#e65100">Storage arrays</text>

    <rect x="35" y="218" width="110" height="24" rx="4" fill="#ff9800"/>
    <text x="90" y="232" text-anchor="middle" font-size="7" font-weight="bold" fill="white">PDUs</text>
    <rect x="155" y="218" width="110" height="24" rx="4" fill="#ff9800"/>
    <text x="210" y="232" text-anchor="middle" font-size="7" font-weight="bold" fill="white">CRAC Units</text>
    <rect x="275" y="218" width="110" height="24" rx="4" fill="#ff9800"/>
    <text x="330" y="232" text-anchor="middle" font-size="7" font-weight="bold" fill="white">UPS / Generators</text>
  </g>

  <g id="step3" class="step" data-narration="The traditional three-tier architecture has access, aggregation, and core layers. East-west traffic between servers must travel up to the core and back down, creating latency and bottlenecks.">
    <rect x="410" y="150" width="370" height="100" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="595" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Traditional Three-Tier Network</text>

    <rect x="530" y="182" width="130" height="26" rx="4" fill="#f44336"/>
    <text x="595" y="198" text-anchor="middle" font-size="8" fill="white">Core Layer</text>
    <text x="595" y="210" text-anchor="middle" font-size="6" fill="#ffcdd2">High-speed backbone</text>

    <rect x="430" y="218" width="140" height="24" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="500" y="233" text-anchor="middle" font-size="8" fill="#c62828">Aggregation</text>
    <rect x="620" y="218" width="140" height="24" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="690" y="233" text-anchor="middle" font-size="8" fill="#c62828">Aggregation</text>

    <text x="500" y="252" text-anchor="middle" font-size="7" fill="#616161">Access (ToR) → Servers</text>
    <text x="690" y="252" text-anchor="middle" font-size="7" fill="#616161">Access (ToR) → Servers</text>
  </g>

  <g id="step4" class="step" data-narration="The modern spine-leaf architecture uses a two-tier flat fabric where every leaf switch connects to every spine switch, enabling any server to reach any other in just two hops with predictable low latency.">
    <rect x="20" y="260" width="380" height="115" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="210" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Modern Spine-Leaf (Clos Network)</text>

    <rect x="70" y="295" width="75" height="24" rx="4" fill="#388e3c"/>
    <text x="107" y="310" text-anchor="middle" font-size="8" fill="white">Spine 1</text>
    <rect x="172" y="295" width="75" height="24" rx="4" fill="#388e3c"/>
    <text x="209" y="310" text-anchor="middle" font-size="8" fill="white">Spine 2</text>
    <rect x="274" y="295" width="75" height="24" rx="4" fill="#388e3c"/>
    <text x="311" y="310" text-anchor="middle" font-size="8" fill="white">Spine 3</text>

    <line x1="70" y1="335" x2="107" y2="319" stroke="#388e3c" stroke-width="1"/>
    <line x1="70" y1="335" x2="209" y2="319" stroke="#388e3c" stroke-width="1"/>
    <line x1="70" y1="335" x2="311" y2="319" stroke="#388e3c" stroke-width="1"/>
    <line x1="209" y1="335" x2="107" y2="319" stroke="#388e3c" stroke-width="1"/>
    <line x1="209" y1="335" x2="209" y2="319" stroke="#388e3c" stroke-width="1"/>
    <line x1="209" y1="335" x2="311" y2="319" stroke="#388e3c" stroke-width="1"/>
    <line x1="348" y1="335" x2="107" y2="319" stroke="#388e3c" stroke-width="1"/>
    <line x1="348" y1="335" x2="209" y2="319" stroke="#388e3c" stroke-width="1"/>
    <line x1="348" y1="335" x2="311" y2="319" stroke="#388e3c" stroke-width="1"/>

    <rect x="40" y="335" width="60" height="20" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="349" text-anchor="middle" font-size="7" fill="#2e7d32">Leaf 1</text>
    <rect x="179" y="335" width="60" height="20" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="209" y="349" text-anchor="middle" font-size="7" fill="#2e7d32">Leaf 2</text>
    <rect x="318" y="335" width="60" height="20" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="348" y="349" text-anchor="middle" font-size="7" fill="#2e7d32">Leaf 3</text>

    <text x="70" y="368" text-anchor="middle" font-size="6" fill="#616161">Servers</text>
    <text x="209" y="368" text-anchor="middle" font-size="6" fill="#616161">Servers</text>
    <text x="348" y="368" text-anchor="middle" font-size="6" fill="#616161">Servers</text>
  </g>

  <g id="step5" class="step" data-narration="Software-Defined Networking separates the control plane (centralized SDN controller) from the data plane (commodity switches). This enables automation, dynamic policy changes, and optimized traffic management across the network.">
    <rect x="410" y="260" width="370" height="115" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="595" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">Software-Defined Networking (SDN)</text>

    <rect x="520" y="295" width="150" height="28" rx="4" fill="#9c27b0"/>
    <text x="595" y="309" text-anchor="middle" font-size="9" font-weight="bold" fill="white">SDN Controller</text>
    <text x="595" y="321" text-anchor="middle" font-size="6" fill="#e1bee7">Control Plane (the brain)</text>

    <line x1="545" y1="323" x2="480" y2="345" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="595" y1="323" x2="595" y2="345" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="645" y1="323" x2="710" y2="345" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="440" y="348" width="80" height="20" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="480" y="362" text-anchor="middle" font-size="7" fill="#7b1fa2">Switch 1</text>
    <rect x="555" y="348" width="80" height="20" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="595" y="362" text-anchor="middle" font-size="7" fill="#7b1fa2">Switch 2</text>
    <rect x="670" y="348" width="80" height="20" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="710" y="362" text-anchor="middle" font-size="7" fill="#7b1fa2">Switch 3</text>
    <text x="595" y="378" text-anchor="middle" font-size="7" fill="#616161">Data Plane (commodity switches)</text>
  </g>

  <g id="step6" class="step" data-narration="Comparing architectures: three-tier has hierarchical layers with variable latency and bottlenecks, while spine-leaf offers flat non-blocking fabric with predictable low latency, linear scalability, and cost-effective commodity hardware.">
    <rect x="20" y="385" width="760" height="65" rx="8" fill="white" stroke="#455a64" stroke-width="1.5"/>
    <text x="400" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Three-Tier vs Spine-Leaf Comparison</text>
    <line x1="20" y1="410" x2="780" y2="410" stroke="#ccc" stroke-width="1"/>

    <text x="80" y="428" text-anchor="middle" font-size="8" font-weight="bold" fill="#455a64">Structure</text>
    <text x="260" y="428" text-anchor="middle" font-size="8" fill="#c62828">Hierarchical (3 layers)</text>
    <text x="540" y="428" text-anchor="middle" font-size="8" fill="#2e7d32">Flat, non-blocking fabric</text>

    <text x="80" y="443" text-anchor="middle" font-size="8" font-weight="bold" fill="#455a64">Latency</text>
    <text x="260" y="443" text-anchor="middle" font-size="8" fill="#c62828">Variable, multiple hops</text>
    <text x="540" y="443" text-anchor="middle" font-size="8" fill="#2e7d32">Predictable, max 2 hops</text>
  </g>

  <g id="step7" class="step" data-narration="Inter-data center networks connect the cloud globally through high-speed fiber WANs, enabling global load balancing, data replication across availability zones, and CDN edge caching for faster content delivery.">
    <rect x="20" y="460" width="760" height="55" rx="8" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1.5"/>
    <text x="400" y="478" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f51b5">Inter-Data Center: Connecting the Cloud Globally</text>

    <rect x="45" y="490" width="160" height="18" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="125" y="503" text-anchor="middle" font-size="8" fill="#1a237e">WAN (fiber-optic links)</text>

    <rect x="220" y="490" width="160" height="18" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="300" y="503" text-anchor="middle" font-size="8" fill="#1a237e">Global Load Balancing</text>

    <rect x="395" y="490" width="160" height="18" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="475" y="503" text-anchor="middle" font-size="8" fill="#1a237e">Data Replication (AZs)</text>

    <rect x="570" y="490" width="190" height="18" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="665" y="503" text-anchor="middle" font-size="8" fill="#1a237e">CDNs (edge caching)</text>
  </g>
</svg>