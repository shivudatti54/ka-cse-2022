<svg width="420" height="400" data-topic-id="text-book-1-chapter-2">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A88FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#9C8EFF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad-bg)" rx="10" />
  
  <!-- Title Section -->
  <section data-narration="title" x="50%" y="20%" transform="translateX(-50%)">
    <text fill="#2E4053" font-size="24" font-family="Open Sans, sans-serif">Text Book 1: Chapter 2</text>
  </section>
  
  <!-- Basic JavaScript Instructions Section -->
  <section data-narration="instructions" x="50%" y="80%" transform="translateX(-50%)">
    <h2>Basic JavaScript Instructions, Statements, Comments</h2>
    <div style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
      <p>In JavaScript, an instruction is a single statement that performs a specific task. Instructions are used to write JavaScript code that can be executed by the browser or a Node.js environment.</p>
      <p>There are several types of instructions in JavaScript:</p>
      <ul>
        <li><b>Arithmetic Instructions</b>: These instructions perform mathematical operations such as addition, subtraction, multiplication, and division.</li>
        <li><b>Assignment Instructions</b>: These instructions assign a value to a variable.</li>
        <li><b>Comparison Instructions</b>: These instructions compare two values and return a boolean result.</li>
        <li><b>Logical Instructions</b>: These instructions perform logical operations such as AND, OR, and NOT.</li>
      </ul>
    </div>
  </section>
  
  <!-- Arithmetic Instruction Example Section -->
  <section data-narration="example-arithmetic" x="50%" y="140%" transform="translateX(-50%)">
    <h2>Arithmetic Instruction Example</h2>
    <div style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
      <pre>
        <code>
          // Arithmetic Instruction: Addition
          let x = 5;
          let y = 3;
          let result = x + y;
          console.log(result);
        </code>
      </pre>
    </div>
  </section>
  
  <!-- Assignment Instruction Example Section -->
  <section data-narration="example-assignment" x="50%" y="200%" transform="translateX(-50%)">
    <h2>Assignment Instruction Example</h2>
    <div style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
      <pre>
        <code>
          // Assignment Instruction: Assigning a value to a variable
          x = 10;
          console.log(x);
        </code>
      </pre>
    </div>
  </section>
  
  <!-- Comparison Instruction Example Section -->
  <section data-narration="example-comparison" x="50%" y="260%" transform="translateX(-50%)">
    <h2>Comparison Instruction Example</h2>
    <div style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
      <pre>
        <code>
          // Comparison Instruction: Comparing two values
          let a = 5;
          let b = 10;
          if (a > b) {
            console.log('a is greater than b');
          } else {
            console.log('a is less than or equal to b');
          }
        </code>
      </pre>
    </div>
  </section>
  
  <!-- Logical Instruction Example Section -->
  <section data-narration="example-logical" x="50%" y="320%" transform="translateX(-50%)">
    <h2>Logical Instruction Example</h2>
    <div style="background-color: #F7F7F7; padding: 20px; border-radius: 10px;">
      <pre>
        <code>
          // Logical Instruction: Logical AND
          let c = true;
          let d = false;
          let result = c && d;
          console.log(result);
        </code>
      </pre>
    </div>
  </section>
  
  <!-- Title Footer Section -->
  <footer data-narration="footer" x="50%" y="380%" transform="translateX(-50%)">
    <text fill="#2E4053" font-size="12" font-family="Open Sans, sans-serif">Text Book 1: Chapter 2</text>
  </footer>
</svg>