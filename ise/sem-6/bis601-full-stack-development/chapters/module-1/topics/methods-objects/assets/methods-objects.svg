<svg width="420" height="400" data-topic-id="methods-objects" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <!-- Header -->
  <rect x="10" y="10" width="400" height="50" fill="#2F4F7F" />
  <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" fill="#FFFFFF" text-anchor="start">Methods & Objects</text>
  <rect x="10" y="60" width="400" height="10" fill="#2F4F7F" />
  <text x="15" y="75" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" text-anchor="start">Introduction</text>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E5F4" stop-opacity="1" />
      <stop offset="25%" stop-color="#A7D8F8" stop-opacity="1" />
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="75%" stop-color="#46B3FA" stop-opacity="1" />
      <stop offset="100%" stop-color="#1A9CFF" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="10" y="85" width="400" height="250" fill="url(#pastel-gradient)" />
  <rect x="10" y="10" width="400" height="50" fill="#2F4F7F" />
  <rect x="10" y="60" width="400" height="10" fill="#2F4F7F" />
  <rect x="10" y="75" width="400" height="10" fill="#2F4F7F" />
  <rect x="10" y="100" width="400" height="10" fill="#2F4F7F" />
  <rect x="10" y="125" width="400" height="10" fill="#2F4F7F" />

  <!-- Section 1: Methods -->
  <g data-narration="Section 1" transform="translate(10, 85)">
    <rect x="0" y="0" width="100" height="50" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">Methods</text>
    <animate transform="rotate(45 50 50)" attributeName="transform" begin="100ms" dur="500ms" repeatCount="indefinite" />
    <text x="10" y="30" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">A block of code executed in response to a specific event or action</text>
  </g>

  <!-- Section 2: Objects -->
  <g data-narration="Section 2" transform="translate(120, 85)">
    <rect x="0" y="0" width="100" height="50" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">Objects</text>
    <animate transform="rotate(90 50 50)" attributeName="transform" begin="200ms" dur="500ms" repeatCount="indefinite" />
    <text x="10" y="30" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">A collection of key-value pairs that represent data</text>
  </g>

  <!-- Section 3: Instance Methods -->
  <g data-narration="Section 3" transform="translate(240, 85)">
    <rect x="0" y="0" width="100" height="50" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">Instance Methods</text>
    <animate transform="rotate(45 50 50)" attributeName="transform" begin="100ms" dur="500ms" repeatCount="indefinite" />
    <text x="10" y="30" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">Methods that belong to an object and are used to perform actions on that object</text>
  </g>

  <!-- Section 4: Static Methods -->
  <g data-narration="Section 4" transform="translate(360, 85)">
    <rect x="0" y="0" width="100" height="50" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">Static Methods</text>
    <animate transform="rotate(90 50 50)" attributeName="transform" begin="200ms" dur="500ms" repeatCount="indefinite" />
    <text x="10" y="30" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">Methods that belong to a class and are used to perform actions on a class or its instances</text>
  </g>

  <!-- Footer -->
  <rect x="10" y="350" width="400" height="50" fill="#2F4F7F" />
  <text x="15" y="365" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" text-anchor="start">Methods & Objects</text>
</svg>