<svg width="420" height="400" data-topic-id="decisions-loops" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7D9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2E6CE" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="350" fill="url(#gradient)"/>
  <g id="title">
    <text x="50%" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
      Decisions & Loops
    </text>
  </g>
  <g id="footer">
    <text x="50%" y="370" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
      &copy; 2023
    </text>
  </g>
  <g id="section-1">
    <rect x="10" y="40" width="380" height="100" fill="#FFFFFF" rx="10"/>
    <text x="15" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053" data-narration="What is a Decision?">
      What is a Decision?
    </text>
    <text x="15" y="70" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      A decision is a condition that determines the flow of your program's execution.
    </text>
  </g>
  <g id="section-2">
    <rect x="10" y="150" width="380" height="100" fill="#FFFFFF" rx="10"/>
    <text x="15" y="160" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053" data-narration="Types of Decisions">
      Types of Decisions
    </text>
    <text x="15" y="180" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Simple Decision: Evaluates a single condition and executes one block of code if true and another block of code if false.
    </text>
    <text x="15" y="200" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Nested Decision: Evaluates a condition within another condition.
    </text>
  </g>
  <g id="section-3">
    <rect x="10" y="240" width="380" height="100" fill="#FFFFFF" rx="10"/>
    <text x="15" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053" data-narration="Decision Statements">
      Decision Statements
    </text>
    <text x="15" y="270" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      If Statement: Used to execute a block of code if a condition is true.
    </text>
    <text x="15" y="290" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      If-Else Statement: Used to execute one block of code if a condition is true and another block of code if the condition is false.
    </text>
  </g>
  <g id="section-4">
    <rect x="10" y="330" width="380" height="100" fill="#FFFFFF" rx="10"/>
    <text x="15" y="340" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053" data-narration="Loops">
      Loops
    </text>
    <text x="15" y="360" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      What is a Loop?
    </text>
    <text x="15" y="380" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      A loop is a control structure that repeats a set of instructions for each item in a collection.
    </text>
  </g>
  <g id="arrow-markers">
    <line x1="20" y1="15" x2="20" y2="310"/>
    <line x1="20" y1="310" x2="20" y2="15"/>
    <line x1="120" y1="15" x2="120" y2="310"/>
    <line x1="120" y1="310" x2="120" y2="15"/>
  </g>
  <g id="animations">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,350" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="380,0" to="380,350" dur="2s" begin="0.5s"/>
    <animateTransform attributeName="transform" type="translate" from="0,350" to="0,0" dur="2s" begin="1s"/>
    <animateTransform attributeName="transform" type="translate" from="380,350" to="380,0" dur="2s" begin="1.5s"/>
  </g>
</svg>