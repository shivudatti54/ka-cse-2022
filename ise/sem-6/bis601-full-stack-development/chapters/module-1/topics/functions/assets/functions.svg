<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="functions">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- GROUP 1: Title and Function Definition (0.3s) -->
  <g data-narration="A function f from set A to set B assigns each element in A exactly one element in B. This is denoted f: A to B." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Functions and Types</text>
    <rect x="30" y="34" width="360" height="38" fill="#3949AB" rx="6" opacity="0.9"/>
    <text x="210" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="white">f : A --> B where f(a) = b</text>
    <text x="210" y="64" text-anchor="middle" font-family="Arial" font-size="9" fill="#C5CAE9">Each element in A maps to exactly one element in B</text>
  </g>

  <!-- GROUP 2: Injective (One-to-One) (1.5s) -->
  <g data-narration="An injective or one-to-one function maps distinct inputs to distinct outputs. No two elements in domain A share the same image in codomain B." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="105" y="92" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Injective (1-to-1)</text>
    <!-- Domain set -->
    <ellipse cx="60" cy="130" rx="30" ry="32" fill="none" stroke="#3949AB" stroke-width="1.5"/>
    <text x="60" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">A</text>
    <circle cx="60" cy="118" r="3" fill="#3949AB"/>
    <circle cx="60" cy="130" r="3" fill="#3949AB"/>
    <circle cx="60" cy="142" r="3" fill="#3949AB"/>
    <text x="52" y="121" text-anchor="end" font-family="monospace" font-size="7" fill="#3949AB">1</text>
    <text x="52" y="133" text-anchor="end" font-family="monospace" font-size="7" fill="#3949AB">2</text>
    <text x="52" y="145" text-anchor="end" font-family="monospace" font-size="7" fill="#3949AB">3</text>
    <!-- Codomain set -->
    <ellipse cx="150" cy="130" rx="30" ry="38" fill="none" stroke="#3949AB" stroke-width="1.5"/>
    <text x="150" y="94" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">B</text>
    <circle cx="150" cy="112" r="3" fill="#3949AB"/>
    <circle cx="150" cy="124" r="3" fill="#3949AB"/>
    <circle cx="150" cy="136" r="3" fill="#3949AB"/>
    <circle cx="150" cy="148" r="3" fill="#3949AB" opacity="0.4"/>
    <text x="162" y="115" font-family="monospace" font-size="7" fill="#3949AB">a</text>
    <text x="162" y="127" font-family="monospace" font-size="7" fill="#3949AB">b</text>
    <text x="162" y="139" font-family="monospace" font-size="7" fill="#3949AB">c</text>
    <text x="162" y="151" font-family="monospace" font-size="7" fill="#3949AB" opacity="0.4">d</text>
    <!-- Arrows -->
    <line x1="63" y1="118" x2="147" y2="112" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrow)"/>
    <line x1="63" y1="130" x2="147" y2="124" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrow)"/>
    <line x1="63" y1="142" x2="147" y2="136" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- Check mark -->
    <text x="105" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Distinct inputs -> Distinct outputs</text>
  </g>

  <!-- GROUP 3: Surjective (Onto) (3.0s) -->
  <g data-narration="A surjective or onto function ensures every element in the codomain B is mapped to by at least one element in domain A. The range equals the codomain." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="315" y="92" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Surjective (Onto)</text>
    <!-- Domain set -->
    <ellipse cx="270" cy="130" rx="30" ry="38" fill="none" stroke="#00695C" stroke-width="1.5"/>
    <text x="270" y="94" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">A</text>
    <circle cx="270" cy="112" r="3" fill="#00695C"/>
    <circle cx="270" cy="124" r="3" fill="#00695C"/>
    <circle cx="270" cy="136" r="3" fill="#00695C"/>
    <circle cx="270" cy="148" r="3" fill="#00695C"/>
    <text x="262" y="115" text-anchor="end" font-family="monospace" font-size="7" fill="#00695C">1</text>
    <text x="262" y="127" text-anchor="end" font-family="monospace" font-size="7" fill="#00695C">2</text>
    <text x="262" y="139" text-anchor="end" font-family="monospace" font-size="7" fill="#00695C">3</text>
    <text x="262" y="151" text-anchor="end" font-family="monospace" font-size="7" fill="#00695C">4</text>
    <!-- Codomain set -->
    <ellipse cx="360" cy="130" rx="30" ry="32" fill="none" stroke="#00695C" stroke-width="1.5"/>
    <text x="360" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">B</text>
    <circle cx="360" cy="118" r="3" fill="#00695C"/>
    <circle cx="360" cy="130" r="3" fill="#00695C"/>
    <circle cx="360" cy="142" r="3" fill="#00695C"/>
    <text x="372" y="121" font-family="monospace" font-size="7" fill="#00695C">a</text>
    <text x="372" y="133" font-family="monospace" font-size="7" fill="#00695C">b</text>
    <text x="372" y="145" font-family="monospace" font-size="7" fill="#00695C">c</text>
    <!-- Arrows -->
    <line x1="273" y1="112" x2="357" y2="118" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
    <line x1="273" y1="124" x2="357" y2="130" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
    <line x1="273" y1="136" x2="357" y2="142" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
    <line x1="273" y1="148" x2="357" y2="142" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
    <!-- Label -->
    <text x="315" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Every output has a pre-image</text>
  </g>

  <!-- GROUP 4: Bijective (4.5s) -->
  <g data-narration="A bijective function is both injective and surjective. It creates a perfect one-to-one correspondence between domain and codomain, and always has an inverse." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="105" y="198" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Bijective (1-to-1 + Onto)</text>
    <!-- Domain set -->
    <ellipse cx="60" cy="235" rx="30" ry="32" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <text x="60" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">A</text>
    <circle cx="60" cy="223" r="3" fill="#E65100"/>
    <circle cx="60" cy="235" r="3" fill="#E65100"/>
    <circle cx="60" cy="247" r="3" fill="#E65100"/>
    <text x="52" y="226" text-anchor="end" font-family="monospace" font-size="7" fill="#E65100">1</text>
    <text x="52" y="238" text-anchor="end" font-family="monospace" font-size="7" fill="#E65100">2</text>
    <text x="52" y="250" text-anchor="end" font-family="monospace" font-size="7" fill="#E65100">3</text>
    <!-- Codomain set -->
    <ellipse cx="150" cy="235" rx="30" ry="32" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <text x="150" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">B</text>
    <circle cx="150" cy="223" r="3" fill="#E65100"/>
    <circle cx="150" cy="235" r="3" fill="#E65100"/>
    <circle cx="150" cy="247" r="3" fill="#E65100"/>
    <text x="162" y="226" font-family="monospace" font-size="7" fill="#E65100">a</text>
    <text x="162" y="238" font-family="monospace" font-size="7" fill="#E65100">b</text>
    <text x="162" y="250" font-family="monospace" font-size="7" fill="#E65100">c</text>
    <!-- Arrows -->
    <line x1="63" y1="223" x2="147" y2="223" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
    <line x1="63" y1="235" x2="147" y2="235" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
    <line x1="63" y1="247" x2="147" y2="247" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
    <!-- Label -->
    <text x="105" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">Perfect pairing = Inverse exists</text>
  </g>

  <!-- GROUP 5: Function Composition (6.0s) -->
  <g data-narration="Function composition combines two functions. Given f from A to B and g from B to C, the composition g circle f maps A directly to C by applying f first, then g." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="315" y="198" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Composition g&#x2218;f</text>
    <!-- Set A -->
    <rect x="245" y="210" width="36" height="26" fill="#C62828" rx="4" opacity="0.85"/>
    <text x="263" y="227" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">A</text>
    <!-- Set B -->
    <rect x="297" y="210" width="36" height="26" fill="#C62828" rx="4" opacity="0.65"/>
    <text x="315" y="227" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">B</text>
    <!-- Set C -->
    <rect x="349" y="210" width="36" height="26" fill="#C62828" rx="4" opacity="0.85"/>
    <text x="367" y="227" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">C</text>
    <!-- Arrow f: A->B -->
    <line x1="281" y1="218" x2="295" y2="218" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>
    <text x="288" y="213" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">f</text>
    <!-- Arrow g: B->C -->
    <line x1="333" y1="218" x2="347" y2="218" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>
    <text x="340" y="213" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">g</text>
    <!-- Curved arrow g∘f: A->C -->
    <path d="M263 236 Q315 268 367 236" stroke="#C62828" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
    <text x="315" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">g&#x2218;f</text>
    <!-- Formula -->
    <text x="315" y="280" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">(g&#x2218;f)(a) = g(f(a))</text>
  </g>

  <!-- GROUP 6: Inverse Function and Summary Table (7.5s) -->
  <g data-narration="Only bijective functions have inverses. The inverse f-inverse reverses the mapping: if f of a equals b, then f-inverse of b equals a. Injective alone or surjective alone is not enough for an inverse." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Inverse illustration -->
    <text x="210" y="304" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Inverse Function (f&#x207B;&#xB9;)</text>
    <!-- Forward arrow -->
    <rect x="70" y="314" width="56" height="22" fill="#3949AB" rx="4"/>
    <text x="98" y="329" text-anchor="middle" font-family="monospace" font-size="9" fill="white">a</text>
    <line x1="126" y1="325" x2="168" y2="325" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="147" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB">f</text>
    <rect x="170" y="314" width="56" height="22" fill="#00695C" rx="4"/>
    <text x="198" y="329" text-anchor="middle" font-family="monospace" font-size="9" fill="white">b</text>
    <!-- Reverse arrow -->
    <line x1="226" y1="325" x2="268" y2="325" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="247" y="320" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">f&#x207B;&#xB9;</text>
    <rect x="270" y="314" width="56" height="22" fill="#3949AB" rx="4"/>
    <text x="298" y="329" text-anchor="middle" font-family="monospace" font-size="9" fill="white">a</text>
    <!-- Summary row -->
    <rect x="30" y="348" width="360" height="40" fill="white" rx="6" opacity="0.7"/>
    <text x="210" y="362" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Summary: Which functions have inverses?</text>
    <text x="210" y="376" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">Injective: maybe | Surjective: maybe | Bijective: YES | Identity: YES</text>
    <text x="210" y="386" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">Constant: NO  |  # functions from A to B = |B|^|A|</text>
  </g>
</svg>