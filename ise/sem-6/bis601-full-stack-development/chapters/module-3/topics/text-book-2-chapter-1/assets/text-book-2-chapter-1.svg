<svg
  xmlns="http://www.w3.org/2000/svg"
  width="420"
  height="400"
  data-topic-id="full-stack-development-text-book-2-chapter-1"
  viewBox="0 0 420 400"
  style="background-image: linear-gradient(to bottom, #C7B8EA, #87CEEB);">

  <title>Form Enhancement and Validation</title>

  <!-- Introduction Section -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="25" fill="#000" font-size="18" font-family="serif">Introduction</text>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 210 15"
      to="0 210 200"
      dur="2s"
      begin="-0.5s"
      repeatCount="indefinite"
    />
  </section>

  <!-- What are Forms? Section -->
  <section data-narration="What are Forms?">
    <rect x="10" y="80" width="400" height="50" fill="#F5F5DC" rx="10"/>
    <text x="20" y="95" fill="#000" font-size="18" font-family="serif">What are Forms?</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 100"
      to="0 150"
      dur="2s"
      begin="-0.5s"
      repeatCount="indefinite"
    />
    <line x1="210" y1="140" x2="210" y2="190" stroke="#000" stroke-width="2"/>
    <line x1="210" y1="190" x2="210" y2="140" stroke="#000" stroke-width="2"/>
  </section>

  <!-- Why is Form Validation Important? Section -->
  <section data-narration="Why is Form Validation Important?">
    <rect x="10" y="150" width="400" height="50" fill="#F5F5DC" rx="10"/>
    <text x="20" y="165" fill="#000" font-size="18" font-family="serif">Why is Form Validation Important?</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 170"
      to="0 220"
      dur="2s"
      begin="-0.5s"
      repeatCount="indefinite"
    />
    <line x1="210" y1="200" x2="210" y2="240" stroke="#000" stroke-width="2"/>
    <line x1="210" y1="240" x2="210" y2="200" stroke="#000" stroke-width="2"/>
  </section>

  <!-- Types of Form Validation Section -->
  <section data-narration="Types of Form Validation">
    <rect x="10" y="220" width="400" height="50" fill="#F5F5DC" rx="10"/>
    <text x="20" y="235" fill="#000" font-size="18" font-family="serif">Types of Form Validation</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 255"
      to="0 305"
      dur="2s"
      begin="-0.5s"
      repeatCount="indefinite"
    />
    <line x1="210" y1="280" x2="210" y2="320" stroke="#000" stroke-width="2"/>
    <line x1="210" y1="320" x2="210" y2="280" stroke="#000" stroke-width="2"/>
  </section>

  <!-- Form Enhancement Section -->
  <section data-narration="Form Enhancement">
    <rect x="10" y="310" width="400" height="50" fill="#F5F5DC" rx="10"/>
    <text x="20" y="325" fill="#000" font-size="18" font-family="serif">Form Enhancement</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 345"
      to="0 395"
      dur="2s"
      begin="-0.5s"
      repeatCount="indefinite"
    />
    <line x1="210" y1="380" x2="210" y2="420" stroke="#000" stroke-width="2"/>
    <line x1="210" y1="420" x2="210" y2="380" stroke="#000" stroke-width="2"/>
  </section>

  <!-- Error Messages Section -->
  <section data-narration="Error Messages">
    <rect x="10" y="400" width="400" height="50" fill="#F5F5DC" rx="10"/>
    <text x="20" y="415" fill="#000" font-size="18" font-family="serif">Error Messages</text>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 435"
      to="0 485"
      dur="2s"
      begin="-0.5s"
      repeatCount="indefinite"
    />
  </section>

  <!-- Footer Section -->
  <footer>
    <rect x="10" y="500" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="515" fill="#000" font-size="18" font-family="serif">Footer</text>
  </footer>

</svg>