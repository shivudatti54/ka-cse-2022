<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Document Object Model: DOM Manipulation, Selecting Elements, Working with DOM Nodes, Updating</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <text x="20" y="20" text-anchor="middle" fill="#2E4053" font-size="24" font-family="Arial, sans-serif">
    Text Book 1: Chapter 5
  </text>
  <g id="dom-structure">
    <rect x="50" y="50" width="100" height="30" fill="#E0E0E0" rx="5" />
    <text x="60" y="60" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="The DOM is composed of several key elements">
      DOM Structure
    </text>
    <rect x="150" y="50" width="100" height="30" fill="#E0E0E0" rx="5" />
    <text x="160" y="60" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="A node that represents an HTML element, such as a <div>, <p>, or <img>">
      Element
    </text>
    <rect x="250" y="50" width="100" height="30" fill="#E0E0E0" rx="5" />
    <text x="260" y="60" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="A property of an element that provides additional information, such as the src attribute of an <img> element">
      Attribute
    </text>
    <rect x="350" y="50" width="100" height="30" fill="#E0E0E0" rx="5" />
    <text x="360" y="60" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="A node that represents the text content of an element">
      Text Node
    </text>
  </g>
  <g id="dom-manipulation">
    <rect x="50" y="150" width="100" height="30" fill="#E0E0E0" rx="5" />
    <text x="60" y="160" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="The most common methods for DOM manipulation are">
      DOM Manipulation
    </text>
    <g id="methods-for-manipulating-elements">
      <circle cx="180" cy="170" r="10" fill="#E0E0E0" />
      <text x="190" y="180" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="Creates a new element with the specified tag name">
        createElement()
      </text>
      <rect x="270" y="170" width="100" height="30" fill="#E0E0E0" rx="5" />
      <text x="280" y="180" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="Adds a new element to the end of the DOM tree">
        appendChild()
      </text>
      <rect x="370" y="170" width="100" height="30" fill="#E0E0E0" rx="5" />
      <text x="380" y="180" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="Inserts a new element before the specified node">
        insertBefore()
      </text>
      <rect x="470" y="170" width="100" height="30" fill="#E0E0E0" rx="5" />
      <text x="480" y="180" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="Removes the specified node from the DOM tree">
        removeChild()
      </text>
      <rect x="570" y="170" width="100" height="30" fill="#E0E0E0" rx="5" />
      <text x="580" y="180" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="Replaces the specified node with a new element">
        replaceChild()
      </text>
    </g>
    <g id="methods-for-updating-element-properties">
      <rect x="50" y="250" width="100" height="30" fill="#E0E0E0" rx="5" />
      <text x="60" y="260" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="The most common methods for updating element properties are">
        Updating Element Properties
      </text>
      <rect x="150" y="240" width="100" height="30" fill="#E0E0E0" rx="5" />
      <text x="160" y="250" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="Sets the value of an element's attribute">
        setAttribute()
      </text>
      <rect x="250" y="240" width="100" height="30" fill="#E0E0E0" rx="5" />
      <text x="260" y="250" text-anchor="middle" fill="#2E4053" font-size="18" font-family="Arial, sans-serif" data-narration="Gets the value of an element's attribute">
        getAttribute()
      </text>
    </g>
  </g>
  <g id="annotational-connections">
    <line x1="100" y1="60" x2="100" y2="120" stroke="#2E4053" stroke-width="2" />
    <text x="100" y="100" text-anchor="middle" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" data-narration="DOM structure consists of elements, attributes, and text nodes">
      DOM Structure
    </text>
    <line x1="200" y1="60" x2="200" y2="120" stroke="#2E4053" stroke-width="2" />
    <text x="200" y="100" text-anchor="middle" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" data-narration="Elements are represented as nodes in the DOM tree">
      Elements
    </text>
    <line x1="300" y1="60" x2="300" y2="120" stroke="#2E4053" stroke-width="2" />
    <text x="300" y="100" text-anchor="middle" fill="#2E4053" font-size="14" font-family="Arial, sans-serif" data-narration="Attributes provide additional information about elements, such as the src attribute of an <img> element">
      Attributes
    </text>
  </g>
  <g id="footer">
    <rect x="10" y="380" width="400" height="10" fill="#2E4053" rx="5" />
    <text x="20" y="390" text-anchor="middle" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
      Document Object Model: DOM Manipulation, Selecting Elements, Working with DOM Nodes, Updating
    </text>
  </g>
  <animate id="animation" attributeName="opacity" begin="0s" dur="10s" repeatCount="indefinite" />
</svg>