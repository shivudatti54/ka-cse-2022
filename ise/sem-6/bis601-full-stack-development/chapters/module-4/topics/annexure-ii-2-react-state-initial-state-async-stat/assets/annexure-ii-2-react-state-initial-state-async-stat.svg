<svg width="420" height="400" data-topic-id="annexure-ii-2-react-state">
  <title>Annexure II 2 React State: Initial State, Async State Initialization, Updating State, Lifting State Up, Event Handling, Stateless Components, Designin</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="indigo-orange-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B0B55" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFC080" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g opacity="1">
    <rect x="10" y="10" width="400" height="60" fill="url(#pastel-gradient)"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#4F4F4F">Initial State</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 10" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Definition:</text>
    <text x="40" y="40" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F">Initial state = The state of the component at the beginning of its lifecycle.</text>
    <text x="40" y="60" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Example:</text>
    <rect x="10" y="80" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> import React, { useState } from 'react'; </text>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> function Counter() { const [count, setCount] = useState(0); return ( <div> <p>Count: {count}</p> <button onClick={() => setCount(count + 1)}>Increment</button> </div> ); } </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 80" begin="2s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="60" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#4B4B4F">Async State Initialization</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 10" begin="4s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Definition:</text>
    <text x="40" y="40" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F">Async state initialization = Initializing state in a React component when it receives data from an external source.</text>
    <text x="40" y="60" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Example:</text>
    <rect x="10" y="80" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> import React, { useState, useEffect } from 'react'; </text>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> function FetchData() { const [data, setData] = useState(null); useEffect(() => { fetch('https://api.example.com/data') .then((response) => response.json()) .then((data) => setData(data)); }, []); return ( <div> {data ? <p>Data: {data}</p> : <p>Loading...</p>} </div> ); } </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 80" begin="6s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="60" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#4F4F4F">Updating State</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 10" begin="8s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Definition:</text>
    <text x="40" y="40" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F">Updating state = Changing the state of a React component.</text>
    <text x="40" y="60" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Example:</text>
    <rect x="10" y="80" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> import React, { useState } from 'react'; </text>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> function Counter2() { const [count, setCount] = useState(0); return ( <div> <p>Count: {count}</p> <button onClick={() => setCount(count + 1)}>Increment</button> </div> ); } </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 80" begin="10s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="60" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#4F4F4F">Lifting State Up</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 10" begin="12s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Definition:</text>
    <text x="40" y="40" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F">Lifting state up = Moving the state of a component up to its parent component.</text>
    <text x="40" y="60" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Example:</text>
    <rect x="10" y="80" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> import React from 'react'; </text>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> function Parent() { const [count, setCount] = useState(0); return ( <div> <Counter2 /> <button onClick={() => setCount(count + 1)}>Increment</button> </div> ); } </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 80" begin="14s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="60" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#4F4F4F">Event Handling</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 10" begin="16s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Definition:</text>
    <text x="40" y="40" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F">Event handling = Reacting to events in a React component.</text>
    <text x="40" y="60" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Example:</text>
    <rect x="10" y="80" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> import React from 'react'; </text>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> function Button() { return ( <button onClick={() => console.log('Button clicked!')}>Click me!</button> ); } </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 80" begin="18s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="60" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#4F4F4F">Stateless Components</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 10" begin="20s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Definition:</text>
    <text x="40" y="40" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F">Stateless components = Components that can be used without a state.</text>
    <text x="40" y="60" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Example:</text>
    <rect x="10" y="80" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> import React from 'react'; </text>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> function Stateless() { return ( <div>Hello, world!</div> ); } </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 80" begin="22s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="60" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#4F4F4F">Designin</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 10" begin="24s" dur="2s" repeatCount="indefinite"/>
    <rect x="10" y="10" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="30" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Definition:</text>
    <text x="40" y="40" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F">Designin = The process of creating a user interface for a React application.</text>
    <text x="40" y="60" font-size="18" font-family="Arial, sans-serif" fill="#3B0B55">Example:</text>
    <rect x="10" y="80" width="400" height="50" fill="#4F4F4F" rx="10"/>
    <text x="20" y="90" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> import React from 'react'; </text>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F"> function Design() { return ( <div> <h1>Designin</h1> <p>This is a designin example.</p> </div> ); } </text>
  </g>
  <footer>
    <text x="20" y="380" font-size="18" font-family="Arial, sans-serif" fill="#4F4F4F">Annexure II 2 React State: Initial State, Async State Initialization, Updating State, Lifting State Up, Event Handling, Stateless Components, Designin</text>
  </footer>
</svg>