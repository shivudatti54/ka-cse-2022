<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="full-stack-development" xmlns:a="http://www.w3.org/1999/xlink">
  <style>
    /* add styles for the progress bars */
    .progress-bar {
      stroke: #333;
      stroke-width: 2;
    }
  </style>
  <!-- gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <!-- title -->
  <g transform="translate(20, 20)">
    <text x="0" y="0" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#2E4053">Full Stack Development</text>
  </g>
  <!-- sections -->
  <g transform="translate(20, 60)">
    <!-- section 1: front-end development -->
    <rect x="0" y="0" width="100%" height="20" rx="10" stroke="#2E4053" stroke-width="2" fill="none" data-narration="Front-end development refers to the process of building the user interface and user experience (UI/UX) of a web application using programming languages such as HTML, CSS, and JavaScript.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="50%" y="10" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">HTML, CSS, JavaScript, UI/UX</text>
    <line x1="50%" y1="20" x2="50%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="70%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="30%" y2="60" stroke="#2E4053" stroke-width="2" />
    <rect x="50%" y="80" width="20" height="20" rx="5" fill="#F7DC6F" />
  </g>
  <g transform="translate(20, 100)">
    <!-- section 2: back-end development -->
    <rect x="0" y="0" width="100%" height="20" rx="10" stroke="#2E4053" stroke-width="2" fill="none" data-narration="Back-end development refers to the process of building the server-side logic and database integration of a web application using programming languages such as Java, Python, or Ruby.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="2s" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="50%" y="10" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">Java, Python, Ruby, Server-side programming, Database management, APIs</text>
    <line x1="50%" y1="20" x2="50%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="70%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="30%" y2="60" stroke="#2E4053" stroke-width="2" />
    <rect x="50%" y="80" width="20" height="20" rx="5" fill="#F7DC6F" />
  </g>
  <g transform="translate(20, 180)">
    <!-- section 3: full stack development -->
    <rect x="0" y="0" width="100%" height="20" rx="10" stroke="#2E4053" stroke-width="2" fill="none" data-narration="Full stack development involves working on all layers of a web application, from the front-end user interface to the back-end database.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="4s" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="50%" y="10" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">HTML, CSS, JavaScript, UI/UX, Java, Python, Ruby, Server-side programming, Database management, APIs, Monolithic architecture, Microservices architecture</text>
    <line x1="50%" y1="20" x2="50%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="70%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="30%" y2="60" stroke="#2E4053" stroke-width="2" />
    <rect x="50%" y="80" width="20" height="20" rx="5" fill="#F7DC6F" />
  </g>
  <g transform="translate(20, 260)">
    <!-- section 4: examples -->
    <rect x="0" y="0" width="100%" height="20" rx="10" stroke="#2E4053" stroke-width="2" fill="none" data-narration="Examples of full stack development include building a responsive web design using HTML, CSS, and JavaScript, and creating a dynamic web page using JavaScript and a framework such as React or Angular.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="6s" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="50%" y="10" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">Responsive web design, Dynamic web page, React, Angular</text>
    <line x1="50%" y1="20" x2="50%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="70%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="30%" y2="60" stroke="#2E4053" stroke-width="2" />
    <rect x="50%" y="80" width="20" height="20" rx="5" fill="#F7DC6F" />
  </g>
  <g transform="translate(20, 340)">
    <!-- section 5: full stack development -->
    <rect x="0" y="0" width="100%" height="20" rx="10" stroke="#2E4053" stroke-width="2" fill="none" data-narration="Full stack development involves working on all layers of a web application, from the front-end user interface to the back-end database.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="8s" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="50%" y="10" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">Monolithic architecture, Microservices architecture, RESTful API, Server-side programming, Database management, APIs</text>
    <line x1="50%" y1="20" x2="50%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="70%" y2="60" stroke="#2E4053" stroke-width="2" />
    <line x1="50%" y1="60" x2="30%" y2="60" stroke="#2E4053" stroke-width="2" />
    <rect x="50%" y="80" width="20" height="20" rx="5" fill="#F7DC6F" />
  </g>
  <g transform="translate(20, 420)">
    <!-- footer -->
    <text x="50%" y="420" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">Full Stack Development</text>
  </g>
</svg>