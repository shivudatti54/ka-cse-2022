<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="communication">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.18"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- ===== GROUP 1: Title + Coordinator (0.3s) ===== -->
  <g data-narration="Group Communication in Distributed Systems: A coordinator sends messages to a group of processes." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>

    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Group Communication in Distributed Systems</text>
    <line x1="60" y1="30" x2="360" y2="30" stroke="#3949AB" stroke-width="1" opacity="0.4"/>

    <!-- Coordinator node -->
    <rect x="155" y="42" width="110" height="36" rx="8" fill="#3949AB" filter="url(#shadow)"/>
    <text x="210" y="57" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">COORDINATOR</text>
    <text x="210" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#C5CAE9">sender process</text>
  </g>

  <!-- ===== GROUP 2: Multicast Model (1.5s) ===== -->
  <g data-narration="Multicast: The coordinator sends messages to all group members. Three receiver nodes appear representing the multicast group." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>

    <text x="25" y="105" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">MULTICAST</text>

    <!-- Receiver nodes -->
    <rect x="42" y="115" width="90" height="30" rx="6" fill="#00695C" filter="url(#shadow)"/>
    <text x="87" y="134" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Receiver 1</text>

    <rect x="165" y="115" width="90" height="30" rx="6" fill="#00695C" filter="url(#shadow)"/>
    <text x="210" y="134" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Receiver 2</text>

    <rect x="288" y="115" width="90" height="30" rx="6" fill="#00695C" filter="url(#shadow)"/>
    <text x="333" y="134" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Receiver 3</text>

    <!-- Arrows from coordinator to receivers -->
    <line x1="180" y1="78" x2="95" y2="115" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <line x1="210" y1="78" x2="210" y2="115" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <line x1="240" y1="78" x2="325" y2="115" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

    <!-- Animated message dots flowing down -->
    <circle r="4" fill="#E65100" opacity="0.85">
      <animate attributeName="cx" values="180;95" dur="0.8s" begin="2.0s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="78;115" dur="0.8s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#E65100" opacity="0.85">
      <animate attributeName="cx" values="210;210" dur="0.8s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="78;115" dur="0.8s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#E65100" opacity="0.85">
      <animate attributeName="cx" values="240;325" dur="0.8s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="78;115" dur="0.8s" begin="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== GROUP 3: Message Ordering (3.0s) ===== -->
  <g data-narration="Message Ordering Semantics: FIFO ensures messages from one sender arrive in order. Causal ordering respects cause-effect. Total ordering gives identical order at all receivers." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>

    <rect x="15" y="158" width="390" height="72" rx="8" fill="#fff" fill-opacity="0.6" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="174" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Message Ordering Semantics</text>

    <!-- FIFO -->
    <rect x="25" y="182" width="112" height="40" rx="5" fill="#3949AB" fill-opacity="0.1" stroke="#3949AB" stroke-width="0.8"/>
    <text x="81" y="196" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">FIFO Order</text>
    <text x="81" y="214" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">A, B, C -> A, B, C</text>

    <!-- Causal -->
    <rect x="153" y="182" width="112" height="40" rx="5" fill="#00695C" fill-opacity="0.1" stroke="#00695C" stroke-width="0.8"/>
    <text x="209" y="196" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Causal Order</text>
    <text x="209" y="214" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">A->B => A before B</text>

    <!-- Total -->
    <rect x="281" y="182" width="112" height="40" rx="5" fill="#E65100" fill-opacity="0.1" stroke="#E65100" stroke-width="0.8"/>
    <text x="337" y="196" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Total Order</text>
    <text x="337" y="214" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">same order @ all</text>

    <!-- Animated highlight bar -->
    <rect x="25" y="182" width="112" height="40" rx="5" fill="#3949AB" opacity="0">
      <animate attributeName="opacity" values="0;0.15;0" dur="3s" begin="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="153" y="182" width="112" height="40" rx="5" fill="#00695C" opacity="0">
      <animate attributeName="opacity" values="0;0.15;0" dur="3s" begin="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="281" y="182" width="112" height="40" rx="5" fill="#E65100" opacity="0">
      <animate attributeName="opacity" values="0;0.15;0" dur="3s" begin="5.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== GROUP 4: Two-Phase Commit - Phase 1 (4.5s) ===== -->
  <g data-narration="Two-Phase Commit Protocol, Phase 1: The coordinator sends PREPARE requests to all participants. Each participant votes YES or NO." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>

    <text x="210" y="250" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Two-Phase Commit (2PC)</text>

    <!-- Phase 1 label -->
    <rect x="20" y="260" width="185" height="60" rx="6" fill="#fff" fill-opacity="0.5" stroke="#E65100" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="112" y="276" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Phase 1: Voting</text>

    <!-- Coordinator mini -->
    <rect x="36" y="284" width="60" height="26" rx="4" fill="#3949AB"/>
    <text x="66" y="301" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Coordinator</text>

    <!-- Participants -->
    <rect x="130" y="278" width="60" height="16" rx="3" fill="#00695C"/>
    <text x="160" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">P1: Vote</text>
    <rect x="130" y="298" width="60" height="16" rx="3" fill="#00695C"/>
    <text x="160" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">P2: Vote</text>

    <!-- Prepare arrows -->
    <line x1="96" y1="290" x2="128" y2="286" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <line x1="96" y1="300" x2="128" y2="306" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
    <text x="112" y="284" font-family="monospace" font-size="6" fill="#E65100">PREPARE</text>

    <!-- Animated pulse on prepare -->
    <circle cx="112" cy="293" r="3" fill="#E65100" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="1.5s" begin="5.0s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;6;2" dur="1.5s" begin="5.0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== GROUP 5: Two-Phase Commit - Phase 2 (6.0s) ===== -->
  <g data-narration="Phase 2: If all participants vote YES, the coordinator sends COMMIT. If any votes NO, the coordinator sends ABORT to all participants." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>

    <!-- Phase 2 label -->
    <rect x="215" y="260" width="185" height="60" rx="6" fill="#fff" fill-opacity="0.5" stroke="#00695C" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="307" y="276" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Phase 2: Decision</text>

    <!-- Coordinator mini -->
    <rect x="232" y="284" width="60" height="26" rx="4" fill="#3949AB"/>
    <text x="262" y="301" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Coordinator</text>

    <!-- Decision outcomes -->
    <rect x="318" y="278" width="68" height="16" rx="3" fill="#00695C"/>
    <text x="352" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">COMMIT</text>
    <rect x="318" y="298" width="68" height="16" rx="3" fill="#C62828"/>
    <text x="352" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">ABORT</text>

    <!-- Decision arrows -->
    <line x1="292" y1="290" x2="316" y2="286" stroke="#00695C" stroke-width="1.2" marker-end="url(#arrowTeal)"/>
    <line x1="292" y1="300" x2="316" y2="306" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <text x="304" y="284" font-family="monospace" font-size="6" fill="#3949AB">DECIDE</text>

    <!-- Animated checkmark for commit -->
    <path d="M324,286 L328,290 L336,282" fill="none" stroke="#fff" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="6.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ===== GROUP 6: Reliability + Group Types (7.5s) ===== -->
  <g data-narration="Group types and reliability levels. Closed groups restrict senders to members only. Open groups allow external senders. Reliability ranges from best-effort to atomic delivery." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>

    <rect x="15" y="330" width="390" height="58" rx="8" fill="#fff" fill-opacity="0.55" stroke="#3949AB" stroke-width="0.8"/>
    <text x="210" y="346" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Group Types & Reliability Levels</text>

    <!-- Group types -->
    <rect x="25" y="352" width="70" height="28" rx="4" fill="#3949AB"/>
    <text x="60" y="364" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">Closed</text>
    <text x="60" y="374" text-anchor="middle" font-family="Arial" font-size="6" fill="#C5CAE9">members only</text>

    <rect x="103" y="352" width="70" height="28" rx="4" fill="#00695C"/>
    <text x="138" y="364" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">Open</text>
    <text x="138" y="374" text-anchor="middle" font-family="Arial" font-size="6" fill="#B2DFDB">any sender</text>

    <!-- Reliability spectrum -->
    <rect x="190" y="352" width="205" height="28" rx="4" fill="none" stroke="#E65100" stroke-width="0.8"/>
    <text x="292" y="362" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#E65100">Reliability Spectrum</text>

    <!-- Gradient bar -->
    <rect x="198" y="368" width="189" height="6" rx="3" fill="#E65100" opacity="0.2"/>
    <rect x="198" y="368" width="0" height="6" rx="3" fill="#E65100" opacity="0.7">
      <animate attributeName="width" from="0" to="189" dur="2s" begin="8.0s" fill="freeze"/>
    </rect>
    <text x="210" y="380" font-family="monospace" font-size="6" fill="#E65100">best-effort</text>
    <text x="292" y="380" text-anchor="middle" font-family="monospace" font-size="6" fill="#E65100">reliable</text>
    <text x="375" y="380" text-anchor="end" font-family="monospace" font-size="6" fill="#C62828">atomic</text>
  </g>
</svg>