<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="stateless-components">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and header (0.3s) -->
  <g opacity="0" data-narration="Swing GUI applications are built from Components and Containers arranged in a hierarchy.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Swing Components &amp; Containers Hierarchy</text>
    <line x1="60" y1="36" x2="360" y2="36" stroke="#3949AB" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- Group 2: Top-Level Container - JFrame (1.5s) -->
  <g opacity="0" data-narration="JFrame is the top-level container that provides the main application window with title bar and borders.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- JFrame outer box -->
    <rect x="30" y="48" width="360" height="310" rx="8" fill="none" stroke="#3949AB" stroke-width="2.5" stroke-dasharray="6,3"/>
    <rect x="30" y="48" width="360" height="22" rx="8" fill="#3949AB"/>
    <rect x="30" y="60" width="360" height="10" fill="#3949AB"/>
    <text x="210" y="64" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">JFrame</text>
    <text x="375" y="64" text-anchor="middle" font-family="Arial" font-size="9" fill="#C5CAE9">x</text>
    <!-- Label: Top-Level -->
    <rect x="305" y="74" width="80" height="16" rx="3" fill="#3949AB" fill-opacity="0.15"/>
    <text x="345" y="85" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB" font-weight="bold">TOP-LEVEL</text>
  </g>

  <!-- Group 3: ContentPane and JPanel intermediate containers (3.0s) -->
  <g opacity="0" data-narration="The ContentPane holds all visible components. JPanel is the workhorse intermediate container used to group related components together.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- ContentPane -->
    <rect x="45" y="95" width="330" height="250" rx="6" fill="white" fill-opacity="0.35" stroke="#00695C" stroke-width="2"/>
    <text x="210" y="112" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#00695C">ContentPane</text>
    <!-- JPanel -->
    <rect x="60" y="122" width="195" height="210" rx="5" fill="white" fill-opacity="0.5" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <rect x="60" y="122" width="195" height="18" rx="5" fill="#00695C" fill-opacity="0.15"/>
    <text x="157" y="135" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">JPanel</text>
    <!-- Label: Intermediate -->
    <rect x="60" y="342" width="80" height="14" rx="3" fill="#00695C" fill-opacity="0.15"/>
    <text x="100" y="352" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#00695C" font-weight="bold">INTERMEDIATE</text>
  </g>

  <!-- Group 4: Leaf components inside JPanel (4.5s) -->
  <g opacity="0" data-narration="Individual UI components like JLabel, JTextField, and JButton are placed inside containers. These are the interactive elements users see and interact with.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <!-- JLabel -->
    <rect x="75" y="148" width="165" height="30" rx="4" fill="#E65100" fill-opacity="0.12" stroke="#E65100" stroke-width="1.2"/>
    <text x="90" y="162" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">JLabel</text>
    <text x="90" y="173" font-family="monospace" font-size="8" fill="#E65100" fill-opacity="0.7">"Username:"</text>
    <!-- JTextField -->
    <rect x="75" y="186" width="165" height="30" rx="4" fill="#E65100" fill-opacity="0.12" stroke="#E65100" stroke-width="1.2"/>
    <text x="90" y="200" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">JTextField</text>
    <rect x="90" y="206" width="120" height="7" rx="2" fill="#E65100" fill-opacity="0.18"/>
    <line x1="95" y1="212" x2="98" y2="206" stroke="#E65100" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- JButton -->
    <rect x="75" y="224" width="165" height="30" rx="4" fill="#E65100" fill-opacity="0.12" stroke="#E65100" stroke-width="1.2"/>
    <text x="90" y="238" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">JButton</text>
    <rect x="90" y="244" width="50" height="7" rx="3" fill="#E65100" fill-opacity="0.3"/>
    <text x="115" y="250" text-anchor="middle" font-family="Arial" font-size="5.5" fill="white">Submit</text>
    <!-- JPasswordField -->
    <rect x="75" y="262" width="165" height="30" rx="4" fill="#E65100" fill-opacity="0.12" stroke="#E65100" stroke-width="1.2"/>
    <text x="90" y="276" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">JPasswordField</text>
    <text x="90" y="287" font-family="monospace" font-size="8" fill="#E65100" fill-opacity="0.5">*****</text>
    <!-- Label: Components -->
    <rect x="155" y="342" width="68" height="14" rx="3" fill="#E65100" fill-opacity="0.15"/>
    <text x="189" y="352" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#E65100" font-weight="bold">COMPONENTS</text>
  </g>

  <!-- Group 5: JScrollPane + JTextArea on the right side (6.0s) -->
  <g opacity="0" data-narration="JScrollPane is another intermediate container that provides scrollable views. It wraps components like JTextArea that may have content exceeding visible space.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <!-- JScrollPane -->
    <rect x="270" y="122" width="95" height="130" rx="5" fill="white" fill-opacity="0.5" stroke="#00695C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <rect x="270" y="122" width="95" height="18" rx="5" fill="#00695C" fill-opacity="0.15"/>
    <text x="317" y="135" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00695C">JScrollPane</text>
    <!-- JTextArea inside -->
    <rect x="278" y="148" width="72" height="90" rx="3" fill="#E65100" fill-opacity="0.12" stroke="#E65100" stroke-width="1"/>
    <text x="314" y="161" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100" font-weight="bold">JTextArea</text>
    <line x1="284" y1="168" x2="340" y2="168" stroke="#E65100" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="284" y1="175" x2="335" y2="175" stroke="#E65100" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="284" y1="182" x2="338" y2="182" stroke="#E65100" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="284" y1="189" x2="330" y2="189" stroke="#E65100" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="284" y1="196" x2="337" y2="196" stroke="#E65100" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Scrollbar -->
    <rect x="352" y="148" width="6" height="90" rx="3" fill="#00695C" fill-opacity="0.1"/>
    <rect x="352" y="148" width="6" height="30" rx="3" fill="#00695C" fill-opacity="0.35">
      <animate attributeName="y" values="148;208;148" dur="4s" begin="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Group 6: Layout managers legend and key insight (7.5s) -->
  <g opacity="0" data-narration="Layout Managers control how components are positioned within containers. Common managers include BorderLayout, FlowLayout, and GridLayout. Lightweight Swing components do not use native OS peers.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Layout manager box -->
    <rect x="270" y="262" width="95" height="68" rx="5" fill="#C62828" fill-opacity="0.08" stroke="#C62828" stroke-width="1.2"/>
    <text x="317" y="277" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Layout Managers</text>
    <text x="280" y="291" font-family="monospace" font-size="7" fill="#C62828" fill-opacity="0.8">BorderLayout</text>
    <text x="280" y="302" font-family="monospace" font-size="7" fill="#C62828" fill-opacity="0.8">FlowLayout</text>
    <text x="280" y="313" font-family="monospace" font-size="7" fill="#C62828" fill-opacity="0.8">GridLayout</text>
    <text x="280" y="324" font-family="monospace" font-size="7" fill="#C62828" fill-opacity="0.8">BoxLayout</text>
    <!-- Key insight label -->
    <rect x="238" y="342" width="130" height="14" rx="3" fill="#C62828" fill-opacity="0.15"/>
    <text x="303" y="352" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#C62828" font-weight="bold">LAYOUT MANAGEMENT</text>
    <!-- Connecting arrow from layout to JPanel -->
    <line x1="270" y1="296" x2="255" y2="260" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  </g>
</svg>