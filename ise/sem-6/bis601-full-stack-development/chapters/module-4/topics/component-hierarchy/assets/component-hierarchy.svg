<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Top banner -->
  <rect x="0" y="0" width="420" height="50" fill="#2E4053" rx="10"/>
  <text x="50%" y="25%" font-size="24" font-weight="bold" fill="#87CEEB">Component Hierarchy</text>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="component-hierarchy-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="50" width="420" height="250" fill="url(#component-hierarchy-gradient)"/>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(20, 100)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="50%" y="25%" font-size="16" font-weight="normal" fill="#2E4053">Introduction</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 50" to="360 190 50" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="75%" font-size="16" font-weight="normal" fill="#2E4053">A component hierarchy is a tree-like structure of components that represent a single unit of functionality in a user interface.</text>
  </g>
  
  <!-- Section 2: Importance -->
  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="50%" y="25%" font-size="16" font-weight="normal" fill="#2E4053">Importance</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 50" to="360 190 50" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="75%" font-size="16" font-weight="normal" fill="#2E4053">A well-designed component hierarchy is crucial for reusability, scalability, and flexibility.</text>
  </g>
  
  <!-- Section 3: Types of Component Hierarchy -->
  <g transform="translate(20, 230)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="50%" y="25%" font-size="16" font-weight="normal" fill="#2E4053">Types of Component Hierarchy</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 50" to="360 190 50" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="75%" font-size="16" font-weight="normal" fill="#2E4053">There are two main types of component hierarchies: flat and nested.</text>
  </g>
  
  <!-- Section 4: Best Practices -->
  <g transform="translate(20, 290)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="50%" y="25%" font-size="16" font-weight="normal" fill="#2E4053">Best Practices</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 50" to="360 190 50" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="75%" font-size="16" font-weight="normal" fill="#2E4053">Use a single responsibility principle and avoid tight coupling between components.</text>
  </g>
  
  <!-- Section 5: Conclusion -->
  <g transform="translate(20, 350)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="50%" y="25%" font-size="16" font-weight="normal" fill="#2E4053">Conclusion</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 50" to="360 190 50" dur="2s" repeatCount="indefinite"/>
    <text x="50%" y="75%" font-size="16" font-weight="normal" fill="#2E4053">A well-designed component hierarchy is essential for building maintainable and scalable UI components.</text>
  </g>
  
  <!-- Section 6: References -->
  <g transform="translate(20, 410)">
    <rect x="0" y="0" width="300" height="50" fill="#87CEEB" rx="10"/>
    <text x="50%" y="25%" font-size="16" font-weight="normal" fill="#2E4053">References</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 50" to="360 190 50" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <rect x="0" y="370" width="420" height="30" fill="#2E4053" rx="10"/>
  <text x="50%" y="15%" font-size="16" font-weight="normal" fill="#87CEEB">2023</text>
</svg>