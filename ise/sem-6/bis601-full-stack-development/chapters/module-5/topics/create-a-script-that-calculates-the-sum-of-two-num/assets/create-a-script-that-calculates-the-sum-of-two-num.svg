    <linearGradient id="linear-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" style="stop-color:rgb(75,75,75);stop-opacity:1"/>
      <stop offset="1" style="stop-color:rgb(30,126,255);stop-opacity:1"/>
    </linearGradient>
