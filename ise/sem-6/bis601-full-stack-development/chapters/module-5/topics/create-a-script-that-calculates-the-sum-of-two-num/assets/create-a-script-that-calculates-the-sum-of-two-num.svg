<svg width="420" height="400" data-topic-id="Create-a-Script-That-Calculates-the-Sum-of-Two-Numbers-and-Displays-the-Result-in-an-Alert-Box"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
