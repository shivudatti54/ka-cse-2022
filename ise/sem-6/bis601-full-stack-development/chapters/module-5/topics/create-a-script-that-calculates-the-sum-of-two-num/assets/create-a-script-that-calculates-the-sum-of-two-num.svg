     style="fill:rgb(75,75,75);stroke:rgb(75,75,75);stroke-width:2;stroke-linecap:square;stroke-linejoin:round;">
  <title>Learn JavaScript: Create a Script That Calculates the Sum of Two Numbers and Displays the Result in an Alert Box</title>
  <metadata>
    <description>JavaScript Tutorial: Calculating the Sum of Two Numbers</description>
  </metadata>
  <g id="root" transform="translate(0,0)">
    <rect id="rect" x="10" y="10" width="400" height="380" style="fill:linear-gradient(to bottom,rgb(54,93,154),rgb(30,126,255))"/>
    <text id="title" x="15" y="20" style="font-size:24px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Learn JavaScript</text>
    <rect id="title-box" x="10" y="50" width="400" height="20" style="fill:rgb(54,93,154);opacity:0.7;"/>
    <text id="section1" x="15" y="60" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">What is a Script?</text>
    <rect id="section-box-1" x="10" y="80" width="400" height="20" style="fill:rgb(54,93,154);opacity:0.7;"/>
    <g id="section-1" transform="translate(0,90)">
      <rect id="section-1-box" x="10" y="10" width="370" height="60" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
      <text id="section-1-text" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">A script is a set of instructions that are used to automate a task or perform a specific function. Scripts are often used in programming to simplify repetitive tasks and improve efficiency.</text>
    </g>
    <g id="section2" transform="translate(0,160)">
      <rect id="section-box-2" x="10" y="10" width="370" height="60" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
      <text id="section2-text" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">What is an Alert Box?</text>
      <rect id="section-box-2-text" x="10" y="40" width="370" height="20" style="fill:rgb(75,75,75);opacity:0.7;"/>
      <g id="section-2" transform="translate(0,60)">
        <rect id="section-2-box" x="10" y="10" width="370" height="40" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
        <text id="section-2-text-2" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">An alert box is a small window that appears on the screen to display a message or notification. Alert boxes are often used in programming to inform the user of a specific event or action.</text>
      </g>
    </g>
    <g id="section3" transform="translate(0,240)">
      <rect id="section-box-3" x="10" y="10" width="370" height="60" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
      <text id="section3-text" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Choosing a Programming Language</text>
      <rect id="section-box-3-text" x="10" y="40" width="370" height="20" style="fill:rgb(75,75,75);opacity:0.7;"/>
      <g id="section-3" transform="translate(0,60)">
        <rect id="section-3-box" x="10" y="10" width="370" height="40" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
        <text id="section-3-text-2" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">For this topic, we will be using JavaScript as our programming language. JavaScript is a popular language used for client-side scripting on the web.</text>
      </g>
    </g>
    <g id="section4" transform="translate(0,320)">
      <rect id="section-box-4" x="10" y="10" width="370" height="60" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
      <text id="section4-text" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Example Code</text>
      <rect id="section-box-4-text" x="10" y="40" width="370" height="20" style="fill:rgb(75,75,75);opacity:0.7;"/>
      <g id="section-4" transform="translate(0,60)">
        <rect id="section-4-box" x="10" y="10" width="370" height="40" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
        <text id="section-4-text-2" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Here is an example of a JavaScript script that calculates the sum of two numbers and displays the result in an alert box:</text>
        <text id="section-4-text-3" x="15" y="40" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">```javascript
var num1 = 10;
var num2 = 20;
var sum = num1 + num2;
alert('The sum of ' + num1 + ' and ' + num2 + ' is ' + sum);
```
</text>
      </g>
    </g>
    <g id="section5" transform="translate(0,400)">
      <rect id="section-box-5" x="10" y="10" width="370" height="60" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
      <text id="section5-text" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">How the Code Works</text>
      <rect id="section-box-5-text" x="10" y="40" width="370" height="20" style="fill:rgb(75,75,75);opacity:0.7;"/>
      <g id="section-5" transform="translate(0,60)">
        <rect id="section-5-box" x="10" y="10" width="370" height="40" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
        <text id="section-5-text-2" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">We define two variables `num1` and `num2` to store the two numbers. We calculate the sum of the two numbers using the `+` operator. We display the result in an alert box using the `alert()` function.</text>
      </g>
    </g>
    <g id="section6" transform="translate(0,460)">
      <rect id="section-box-6" x="10" y="10" width="370" height="60" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
      <text id="section6-text" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Key Concepts</text>
      <rect id="section-box-6-text" x="10" y="40" width="370" height="20" style="fill:rgb(75,75,75);opacity:0.7;"/>
      <g id="section-6" transform="translate(0,60)">
        <rect id="section-6-box" x="10" y="10" width="370" height="40" style="fill:linear-gradient(to bottom,rgb(75,75,75),rgb(54,93,154));"/>
        <text id="section-6-text-2" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Variables: used to store values in a script</text>
        <text id="section-6-text-3" x="15" y="40" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Operators: used to perform mathematical operations (e.g., `+`, `-`, `*`, `/`)</text>
        <text id="section-6-text-4" x="15" y="60" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Alert boxes: used to display notifications or messages to the user</text>
        <text id="section-6-text-5" x="15" y="80" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">JavaScript: a popular language used for client-side scripting on the web</text>
      </g>
    </g>
    <g id="footer" transform="translate(0,500)">
      <rect id="footer-box" x="10" y="10" width="400" height="40" style="fill:rgb(54,93,154);opacity:0.7;"/>
      <text id="footer-text" x="15" y="20" style="font-size:16px;fill:rgb(255,255,255);font-family:Arial, sans-serif;letter-spacing:1px;" text-anchor="start">Learn JavaScript: <a href="https://www.w3schools.com/js/" target="_blank">https://www.w3schools.com/js/</a></text>
    </g>
  </g>
