<svg width="420" height="400" data-topic-id="find-and-log-the-index-of-a-specific-city">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#B2A9F6" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3B3F54" stop-opacity="1"/>
            <stop offset="100%" stop-color="#434A5F" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFC107" stop-opacity="1"/>
            <stop offset="100%" stop-color="#FF9800" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <title>Find and Log the Index of a Specific City</title>

    <rect x="10" y="10" width="400" height="30" fill="url(#pastel-gradient)" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 30" to="0 0" dur="2s" begin="0s" repeatCount="indefinite"/>

    <g data-narration="What are indexes in MongoDB?">
        <rect x="10" y="60" width="380" height="30" fill="#C7B8EA" rx="5"/>
        <text x="15" y="70" font-size="18" font-family="Arial" fill="#3B3F54">Indexes are data structures that improve query speed in MongoDB.</text>
        <animateTransform attributeName="transform" type="translate" from="0 60" to="0 65" dur="2s" begin="0s" repeatCount="indefinite"/>
    </g>

    <g data-narration="Types of indexes in MongoDB">
        <rect x="10" y="110" width="380" height="30" fill="#B2A9F6" rx="5"/>
        <text x="15" y="120" font-size="18" font-family="Arial" fill="#3B3F54">Single Field Index, Compound Index, Text Index, and Secondary Index.</text>
        <animateTransform attributeName="transform" type="translate" from="0 110" to="0 115" dur="2s" begin="0s" repeatCount="indefinite"/>
    </g>

    <g data-narration="Creating an index in MongoDB">
        <rect x="10" y="160" width="380" height="30" fill="#434A5F" rx="5"/>
        <text x="15" y="170" font-size="18" font-family="Arial" fill="#3B3F54">db.collection.createIndex({ field: 1 })</text>
        <animateTransform attributeName="transform" type="translate" from="0 160" to="0 165" dur="2s" begin="0s" repeatCount="indefinite"/>
    </g>

    <g data-narration="Example">
        <rect x="10" y="210" width="380" height="30" fill="#FFC107" rx="5"/>
        <text x="15" y="220" font-size="18" font-family="Arial" fill="#FF9800">db.cities.createIndex({ name: 1, country: 1 })</text>
        <animateTransform attributeName="transform" type="translate" from="0 210" to="0 215" dur="2s" begin="0s" repeatCount="indefinite"/>
    </g>

    <g data-narration="Finding the index of a specific city">
        <rect x="10" y="260" width="380" height="30" fill="#C7B8EA" rx="5"/>
        <text x="15" y="270" font-size="18" font-family="Arial" fill="#3B3F54">db.collection.indexes()</text>
        <animateTransform attributeName="transform" type="translate" from="0 260" to="0 265" dur="2s" begin="0s" repeatCount="indefinite"/>
    </g>

    <footer>
        <rect x="10" y="310" width="400" height="30" fill="#B2A9F6" rx="5"/>
        <text x="15" y="320" font-size="18" font-family="Arial" fill="#3B3F54">Find and Log the Index of a Specific City</text>
    </footer>
</svg>