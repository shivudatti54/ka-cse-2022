<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="world-to-the-console">
  <rect x="0" y="0" width="420" height="400" fill="#C7E8F4 "/>
  <text x="210" y="40" font-size="16" text-anchor="middle" fill="#2B5CE7">World! to the Console</text>
  <g transform="translate(0, 60)">
    <rect x="0" y="0" width="420" height="340" fill="#F7F7F7" rx="20"/>
    <path d="M 20, 200 L 400, 200" stroke="#37B6E5" stroke-width="2" fill="none"/>
    <path d="M 20, 340 L 400, 340" stroke="#37B6E5" stroke-width="2" fill="none"/>
    <path d="M 20, 100 L 400, 100" stroke="#37B6E5" stroke-width="2" fill="none"/>
    <path d="M 20, 260 L 400, 260" stroke="#37B6E5" stroke-width="2" fill="none"/>
    <g transform="translate(20, 100)">
      <rect x="0" y="0" width="360" height="140" fill="#F7F7F7" rx="20"/>
      <text x="180" y="20" font-size="14" text-anchor="middle" fill="#2B5CE7">Mercator Projection</text>
      <text x="180" y="60" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="Developed by Flemish cartographer Gerardus Mercator in 1569. Preserves angles and shapes well. Not suitable for longitudes near the poles." />
    </g>
    <g transform="translate(20, 260)">
      <rect x="0" y="0" width="360" height="140" fill="#F7F7F7" rx="20"/>
      <text x="180" y="20" font-size="14" text-anchor="middle" fill="#2B5CE7">Gall-Peters Projection</text>
      <text x="180" y="60" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="Developed by James Gall and Arno Peters. Preserves area and shape well. Distorts longitudes near the poles." />
    </g>
    <path d="M 20, 100 L 100, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 100, 100 L 320, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 320, 100 L 100, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 100, 320 L 320, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <g transform="translate(100, 100)">
      <rect x="0" y="0" width="220" height="220" fill="#F7F7F7" rx="20"/>
      <text x="110" y="20" font-size="14" text-anchor="middle" fill="#2B5CE7">Cylindrical Projection</text>
      <text x="110" y="60" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <path d="M 100, 320 L 200, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 200, 320 L 300, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 300, 320 L 100, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 100, 100 L 200, 100" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <g transform="translate(200, 320)">
      <rect x="0" y="0" width="220" height="220" fill="#F7F7F7" rx="20"/>
      <text x="210" y="20" font-size="14" text-anchor="middle" fill="#2B5CE7">Stereographic Projection</text>
      <text x="210" y="60" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <g transform="translate(100, 100)">
      <rect x="0" y="0" width="220" height="220" fill="#F7F7F7" rx="20"/>
      <text x="110" y="20" font-size="14" text-anchor="middle" fill="#2B5CE7">Orthographic Projection</text>
      <text x="110" y="60" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <g transform="translate(200, 320)">
      <rect x="0" y="0" width="220" height="220" fill="#F7F7F7" rx="20"/>
      <text x="210" y="20" font-size="14" text-anchor="middle" fill="#2B5CE7">Azimuthal Equidistant Projection</text>
      <text x="210" y="60" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <g transform="translate(100, 100)">
      <rect x="0" y="0" width="220" height="220" fill="#F7F7F7" rx="20"/>
      <text x="110" y="20" font-size="14" text-anchor="middle" fill="#2B5CE7">Mollweide Projection</text>
      <text x="110" y="60" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <path d="M 300, 100 L 320, 100" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 320, 100 L 300, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 300, 320 L 320, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 320, 100 L 300, 100" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <g transform="translate(300, 100)">
      <rect x="0" y="0" width="20" height="200" fill="#F7F7F7" rx="10"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#2B5CE7">Polar Stereographic Projection</text>
      <text x="10" y="50" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <path d="M 320, 100 L 320, 320" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <path d="M 320, 320 L 320, 100" stroke="#F7DC6F" stroke-width="2" fill="none"/>
    <g transform="translate(320, 100)">
      <rect x="0" y="0" width="20" height="200" fill="#F7F7F7" rx="10"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#2B5CE7">Cassini Projection</text>
      <text x="10" y="50" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <g transform="translate(320, 320)">
      <rect x="0" y="0" width="20" height="200" fill="#F7F7F7" rx="10"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#2B5CE7">Robinson Projection</text>
      <text x="10" y="50" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <g transform="translate(100, 320)">
      <rect x="0" y="0" width="20" height="200" fill="#F7F7F7" rx="10"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#2B5CE7">Albers Projection</text>
      <text x="10" y="50" font-size="12" text-anchor="middle" fill="#2B5CE7" data-narration="A 2D representation of a 3D surface. Used for maps and other 2D applications." />
    </g>
    <animate transform="translate(0, 0)" duration="5000" begin="0s" repeatCount="indefinite"/>
    <animate transform="translate(0, 360)" duration="5000" begin="2000s" repeatCount="indefinite"/>
    <animate transform="translate(0, 720)" duration="5000" begin="4000s" repeatCount="indefinite"/>
    <animate transform="translate(0, 1080)" duration="5000" begin="6000s" repeatCount="indefinite"/>
  </g>
</svg>