<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>MongoDB CRUD Operations</title>
  <defs>
    <style>.highlight { fill: #FFC107; }</style>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA"/>
  <rect x="0" y="0" width="100%" height="30" fill="#3498db"/>
  <text x="10" y="15" fill="#ffffff" font-size="24" font-family="Arial" text-anchor="start">MONGODB CRUD OPERATIONS</text>
  <rect x="0" y="50" width="100%" height="30" fill="#2ecc71"/>
  <text x="10" y="65" fill="#ffffff" font-size="18" font-family="Arial" text-anchor="start">CREATE (INSERT)</text>
  <section data-topic-id="create" data-narration="Insert a new document into a collection">
    <rect x="0" y="95" width="100%" height="150" fill="#8e44ad"/>
    <text x="10" y="110" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="start">db.collection.insertOne(document)</text>
    <animate xlink:href="#icon-create" begin="0s" dur="2s" repeatCount="indefinite" />
    <symbol id="icon-create">
      <circle cx="20" cy="20" r="10" fill="#ffffff"/>
      <text x="20" y="40" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="middle">+</text>
    </symbol>
    <rect x="20" y="50" width="30" height="30" fill="#ffffff" rx="5"/>
    <animate xlink:href="#icon-create" begin="1s" dur="1s" repeatCount="indefinite" />
  </section>
  <section data-topic-id="read-find-all" data-narration="Find all documents from a collection">
    <rect x="0" y="255" width="100%" height="150" fill="#1abc9c"/>
    <text x="10" y="270" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="start">collection.find().toArray(function (err, documents) { ... })</text>
    <animate xlink:href="#icon-read" begin="0s" dur="2s" repeatCount="indefinite" />
    <symbol id="icon-read">
      <circle cx="20" cy="20" r="10" fill="#ffffff"/>
      <text x="20" y="40" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="middle">></text>
    </symbol>
    <rect x="20" y="50" width="30" height="30" fill="#ffffff" rx="5"/>
    <animate xlink:href="#icon-read" begin="1s" dur="1s" repeatCount="indefinite" />
  </section>
  <section data-topic-id="read-one" data-narration="Find one document from a collection">
    <rect x="0" y="400" width="100%" height="150" fill="#2ecc71"/>
    <text x="10" y="415" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="start">collection.findOne(function (err, document) { ... })</text>
    <animate xlink:href="#icon-read" begin="0s" dur="2s" repeatCount="indefinite" />
    <symbol id="icon-read">
      <circle cx="20" cy="20" r="10" fill="#ffffff"/>
      <text x="20" y="40" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="middle">></text>
    </symbol>
    <rect x="20" y="50" width="30" height="30" fill="#ffffff" rx="5"/>
    <animate xlink:href="#icon-read" begin="1s" dur="1s" repeatCount="indefinite" />
  </section>
  <section data-topic-id="update" data-narration="Update an existing document in a collection">
    <rect x="0" y="155" width="100%" height="150" fill="#e74c3c"/>
    <text x="10" y="170" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="start">db.collection.updateOne(document, { $set: { field: value } }, function (err, result) { ... })</text>
    <animate xlink:href="#icon-update" begin="0s" dur="2s" repeatCount="indefinite" />
    <symbol id="icon-update">
      <circle cx="20" cy="20" r="10" fill="#ffffff"/>
      <text x="20" y="40" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="middle">></text>
    </symbol>
    <rect x="20" y="50" width="30" height="30" fill="#ffffff" rx="5"/>
    <animate xlink:href="#icon-update" begin="1s" dur="1s" repeatCount="indefinite" />
  </section>
  <section data-topic-id="delete" data-narration="Delete a document from a collection">
    <rect x="0" y="265" width="100%" height="150" fill="#e74c3c"/>
    <text x="10" y="280" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="start">db.collection.deleteOne(document, function (err, result) { ... })</text>
    <animate xlink:href="#icon-delete" begin="0s" dur="2s" repeatCount="indefinite" />
    <symbol id="icon-delete">
      <circle cx="20" cy="20" r="10" fill="#ffffff"/>
      <text x="20" y="40" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="middle">X</text>
    </symbol>
    <rect x="20" y="50" width="30" height="30" fill="#ffffff" rx="5"/>
    <animate xlink:href="#icon-delete" begin="1s" dur="1s" repeatCount="indefinite" />
  </section>
  <rect x="0" y="0" width="100%" height="30" fill="#3498db"/>
  <text x="10" y="15" fill="#ffffff" font-size="24" font-family="Arial" text-anchor="start">MONGODB CRUD OPERATIONS</text>
</svg>