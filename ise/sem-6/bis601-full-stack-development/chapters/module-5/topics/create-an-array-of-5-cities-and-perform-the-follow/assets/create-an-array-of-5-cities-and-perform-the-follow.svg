<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <title>Create an Array of Cities</title>
  <footer>Created with love</footer>
  <style>
    body {
      background: linear-gradient(to bottom, #6c5ce7, #9dc5e5);
      color: #2c3e50;
      font-family: Arial, sans-serif;
    }
  </style>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ccc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b2d2ff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="100" fill="#fff" rx="5"/>
    <g transform="rotate(45 100 100)">
      <text x="0" y="90" text-anchor="middle" font-size="24" fill="#2c3e50">Create an Array of Cities</text>
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(120, 120)">
      <rect x="0" y="0" width="150" height="50" fill="#fff" rx="5"/>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#2c3e50">What are Arrays in MongoDB?</text>
      <text x="0" y="60" text-anchor="middle" font-size="18" fill="#2c3e50" data-narration="Arrays are data structures that store a collection of values of the same data type.">
        <animateTransform attributeName="x" type="translate" from="0" to="150" dur="2s" begin="-1s"/>
      </text>
      <line x1="50" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(280, 260)">
      <rect x="0" y="0" width="150" height="50" fill="#fff" rx="5"/>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#2c3e50">Creating an Array of Cities</text>
      <text x="0" y="60" text-anchor="middle" font-size="18" fill="#2c3e50" data-narration="To create an array of cities, we use the $set operator in the MongoDB shell.">
        <animateTransform attributeName="x" type="translate" from="0" to="150" dur="2s" begin="-1s"/>
      </text>
      <line x1="50" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(140, 340)">
      <rect x="0" y="0" width="100" height="100" fill="#fff" rx="5"/>
      <g transform="rotate(45 100 100)">
        <text x="0" y="90" text-anchor="middle" font-size="24" fill="#2c3e50">Getting the First Element of the Array</text>
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
      </g>
    </g>
    <g transform="translate(100, 80)">
      <rect x="0" y="0" width="100" height="50" fill="#fff" rx="5"/>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#2c3e50" data-narration="To get the first element of the array, we use the $elementAt() operator:">
        <animateTransform attributeName="x" type="translate" from="0" to="100" dur="2s" begin="-1s"/>
      </text>
      <line x1="50" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(320, 120)">
      <rect x="0" y="0" width="100" height="50" fill="#fff" rx="5"/>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#2c3e50" data-narration="Here's an example:">
        <animateTransform attributeName="x" type="translate" from="0" to="100" dur="2s" begin="-1s"/>
      </text>
      <line x1="50" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(200, 300)">
      <rect x="0" y="0" width="150" height="50" fill="#fff" rx="5"/>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#2c3e50">Getting the Last Element of the Array</text>
      <text x="0" y="60" text-anchor="middle" font-size="18" fill="#2c3e50" data-narration="To get the last element of the array, we use the $elementAt() operator with the index -1:">
        <animateTransform attributeName="x" type="translate" from="0" to="150" dur="2s" begin="-1s"/>
      </text>
      <line x1="50" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(270, 340)">
      <rect x="0" y="0" width="100" height="100" fill="#fff" rx="5"/>
      <g transform="rotate(45 100 100)">
        <text x="0" y="90" text-anchor="middle" font-size="24" fill="#2c3e50">Performing Operations on the Array</text>
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
      </g>
    </g>
    <g transform="translate(180, 80)">
      <rect x="0" y="0" width="100" height="50" fill="#fff" rx="5"/>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#2c3e50" data-narration="Here's an example:">
        <animateTransform attributeName="x" type="translate" from="0" to="100" dur="2s" begin="-1s"/>
      </text>
      <line x1="50" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(310, 120)">
      <rect x="0" y="0" width="100" height="50" fill="#fff" rx="5"/>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#2c3e50" data-narration="To get the sum of all elements in the array, we can use the $sum() operator:">
        <animateTransform attributeName="x" type="translate" from="0" to="100" dur="2s" begin="-1s"/>
      </text>
      <line x1="50" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(240, 300)">
      <rect x="0" y="0" width="150" height="50" fill="#fff" rx="5"/>
      <text x="0" y="25" text-anchor="middle" font-size="18" fill="#2c3e50" data-narration="To get the average of all elements in the array, we can use the $avg() operator:">
        <animateTransform attributeName="x" type="translate" from="0" to="150" dur="2s" begin="-1s"/>
      </text>
      <line x1="50" y1="25" x2="100" y2="25" stroke="#2c3e50" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(290, 340)">
      <rect x="0" y="0" width="100" height="100" fill="#fff" rx="5"/>
      <g transform="rotate(45 100 100)">
        <text x="0" y="90" text-anchor="middle" font-size="24" fill="#2c3e50">Conclusion</text>
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>
</svg>