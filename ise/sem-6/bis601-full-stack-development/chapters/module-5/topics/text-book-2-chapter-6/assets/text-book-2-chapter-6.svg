<svg width="420" height="400" data-topic-id="mongodb-basics">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Section: What is MongoDB? -->
  <section data-narration="What is MongoDB?" style="background-color: #2E4053; padding: 20px;">
    <h2>What is MongoDB?</h2>
    <p>MongoDB is a NoSQL database that stores data in the form of semi-structured documents.</p>
  </section>

  <!-- Section: Key Features of MongoDB -->
  <section data-narration="Key Features of MongoDB" style="background-color: #2E4053; padding: 20px;">
    <h2>Key Features of MongoDB</h2>
    <ul>
      <li><span style="color: #3498DB;">Document-Oriented Database</span>: MongoDB stores data in the form of JSON-like documents.</li>
      <li><span style="color: #3498DB;">Schemaless</span>: MongoDB does not require a predefined schema.</li>
      <li><span style="color: #3498DB;">Scalable</span>: MongoDB is designed to scale horizontally.</li>
      <li><span style="color: #3498DB;">High Performance</span>: MongoDB is optimized for high-performance data retrieval and storage.</li>
    </ul>
  </section>

  <!-- Section: Types of MongoDB Collections -->
  <section data-narration="Types of MongoDB Collections" style="background-color: #2E4053; padding: 20px;">
    <h2>Types of MongoDB Collections</h2>
    <ul>
      <li><span style="color: #3498DB;">Document Collection</span>: A collection of documents, each with its own unique set of fields.</li>
      <li><span style="color: #3498DB;">Array Collection</span>: A collection of arrays, where each array element represents a single document.</li>
      <li><span style="color: #3498DB;">Map Collection</span>: A collection of key-value pairs, where each key maps to a specific value.</li>
    </ul>
  </section>

  <!-- Section: MongoDB Database -->
  <section data-narration="MongoDB Database" style="background-color: #2E4053; padding: 20px;">
    <h2>MongoDB Database</h2>
    <p>A MongoDB database is a container that holds one or more collections.</p>
  </section>

  <!-- Section: MongoDB Query Language -->
  <section data-narration="MongoDB Query Language" style="background-color: #2E4053; padding: 20px;">
    <h2>MongoDB Query Language</h2>
    <p>MongoDB uses a query language to retrieve data from the database.</p>
    <ul>
      <li><span style="color: #3498DB;">Query Operators</span>: $eq, $ne, $gt, $lt, $gte, $lte, $in, $nin</li>
      <li><span style="color: #3498DB;">Query Filters</span>: $match, $project, $sort, $limit, $skip</li>
    </ul>
  </section>

  <!-- Animation: Section transitions -->
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,400" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="0s" dur="2s" repeatCount="indefinite"/>

  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" fill="#3498DB" stroke="#2E4053">MongoDB Basics</text>

  <!-- Footer -->
  <text x="50%" y="380" text-anchor="middle" font-size="24" fill="#3498DB" stroke="#2E4053">Powered by SVG</text>
</svg>