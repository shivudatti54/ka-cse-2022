<svg width="420" height="400" data-topic-id="android-ecosystem-activity-features" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <!-- Title -->
  <title>Android Ecosystem and Activity Features</title>
  <rect x="10" y="10" width="400" height="40" style="fill:rgb(53, 73, 106);"/>
  <text x="15" y="30" font-size="24" font-family="Arial" fill="white">Android Ecosystem and Activity Features</text>
  
  <!-- Section 1: Android Ecosystem -->
  <rect x="10" y="60" width="400" height="100" style="fill:rgb(0, 191, 255);"/>
  <animate begin="0s" dur="1s" calcMode="linear" fill="freeze" attributeName="opacity" from="1" to=".5"/>
  <text x="15" y="80" font-size="18" font-family="Arial" fill="black">Android Ecosystem</text>
  <rect x="10" y="100" width="100" height="20" style="fill:rgb(255, 165, 0);"/>
  <text x="120" y="120" font-size="18" font-family="Arial" fill="black" data-narration="The Android ecosystem consists of hardware, software, services, and developers that work together to provide a comprehensive mobile experience." style="text-anchor: start;"/>
  <animate begin="0s" dur="1s" calcMode="linear" fill="freeze" attributeName="opacity" from=".5" to="1"/>
  
  <!-- Section 2: Android Versions -->
  <rect x="10" y="150" width="400" height="100" style="fill:rgb(216, 191, 216);"/>
  <animate begin="1s" dur="1s" calcMode="linear" fill="freeze" attributeName="opacity" from=".5" to="1"/>
  <text x="15" y="170" font-size="18" font-family="Arial" fill="black">Android Versions</text>
  <rect x="10" y="190" width="100" height="20" style="fill:rgb(255, 165, 0);"/>
  <text x="120" y="210" font-size="18" font-family="Arial" fill="black" data-narration="Some notable Android versions include Android 1.0, Android 4.0 (Ice Cream Sandwich), Android 7.0 (Nougat), and Android 10." style="text-anchor: start;"/>
  <animate begin="1s" dur="1s" calcMode="linear" fill="freeze" attributeName="opacity" from=".5" to="1"/>
  
  <!-- Section 3: Android Activity -->
  <rect x="10" y="260" width="400" height="100" style="fill:rgb(54, 232, 205);"/>
  <animate begin="2s" dur="1s" calcMode="linear" fill="freeze" attributeName="opacity" from=".5" to="1"/>
  <text x="15" y="280" font-size="18" font-family="Arial" fill="black">Android Activity</text>
  <rect x="10" y="300" width="100" height="20" style="fill:rgb(255, 165, 0);"/>
  <text x="120" y="320" font-size="18" font-family="Arial" fill="black" data-narration="An Android activity is a single screen that can contain multiple UI elements, such as buttons, text views, and images." style="text-anchor: start;"/>
  <animate begin="2s" dur="1s" calcMode="linear" fill="freeze" attributeName="opacity" from=".5" to="1"/>
  
  <!-- Section 4: Features of Android -->
  <rect x="10" y="370" width="400" height="100" style="fill:rgb(240, 245, 240);"/>
  <animate begin="3s" dur="1s" calcMode="linear" fill="freeze" attributeName="opacity" from=".5" to="1"/>
  <text x="15" y="390" font-size="18" font-family="Arial" fill="black">Features of Android</text>
  <rect x="10" y="410" width="100" height="20" style="fill:rgb(255, 165, 0);"/>
  <text x="120" y="430" font-size="18" font-family="Arial" fill="black" data-narration="Some key features of Android include a custom user interface, multi-touch support, and a wide range of hardware configurations." style="text-anchor: start;"/>
  <animate begin="3s" dur="1s" calcMode="linear" fill="freeze" attributeName="opacity" from=".5" to="1"/>
  
  <!-- Footer -->
  <rect x="10" y="410" width="400" height="40" style="fill:rgb(53, 73, 106);"/>
  <text x="15" y="430" font-size="18" font-family="Arial" fill="white">Android Ecosystem and Activity Features</text>
</svg>