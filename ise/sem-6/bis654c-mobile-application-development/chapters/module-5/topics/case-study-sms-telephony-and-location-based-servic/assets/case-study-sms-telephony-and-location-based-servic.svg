<svg width="420" height="400" data-topic-id="case-study-sms-telephony-and-location-based-services">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4C99E9"/>
      <stop offset="50%" stop-color="#2F64B5"/>
      <stop offset="100%" stop-color="#45B3FA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <!-- Title -->
  <text x="10" y="20" font-size="24" font-weight="bold" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="Introduction">Case Study: SMS Telephony and Location Based Services</tspan>
  </text>

  <!-- Section 1: SMS Telephony -->
  <rect x="10" y="50" width="400" height="80" fill="#F7F7F7" rx="10"/>
  <text x="15" y="70" font-size="18" font-weight="bold" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="What is SMS Telephony?">SMS Telephony</tspan>
  </text>
  <rect x="10" y="90" width="100" height="20" fill="#45B3FA" rx="5"/>
  <text x="120" y="110" font-size="16" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="Key Features: Short text messages, Simple text-based messages, Used for personal and business communication, Can be sent and received between any two mobile devices">Key Features</tspan>
  </text>
  <animateTransform attributeName="Transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 2: LBS -->
  <rect x="10" y="170" width="400" height="80" fill="#F7F7F7" rx="10"/>
  <text x="15" y="190" font-size="18" font-weight="bold" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="What is Location Based Services (LBS)?">Location Based Services (LBS)</tspan>
  </text>
  <rect x="10" y="220" width="100" height="20" fill="#45B3FA" rx="5"/>
  <text x="120" y="240" font-size="16" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="Key Features: Provides location-based data to mobile devices, Used for navigation, mapping, and location-based advertising, Can provide location-based services such as directions, traffic updates, and nearby points of interest">Key Features</tspan>
  </text>
  <animateTransform attributeName="Transform" type="translate" from="0,0" to="0,40" begin="2s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 3: SMS Telephony for LBS -->
  <rect x="10" y="310" width="400" height="80" fill="#F7F7F7" rx="10"/>
  <text x="15" y="330" font-size="18" font-weight="bold" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="SMS Telephony for LBS">SMS Telephony for LBS</tspan>
  </text>
  <rect x="10" y="360" width="100" height="20" fill="#45B3FA" rx="5"/>
  <text x="120" y="380" font-size="16" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="Example: User sends an SMS message with their location to a friend or family member who can then use a mapping application to find their location">Example</tspan>
  </text>
  <animateTransform attributeName="Transform" type="translate" from="0,0" to="0,60" begin="4s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 4: LBS for SMS Telephony -->
  <rect x="10" y="450" width="400" height="80" fill="#F7F7F7" rx="10"/>
  <text x="15" y="470" font-size="18" font-weight="bold" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="LBS for SMS Telephony">LBS for SMS Telephony</tspan>
  </text>
  <rect x="10" y="510" width="100" height="20" fill="#45B3FA" rx="5"/>
  <text x="120" y="530" font-size="16" fill="#2F4F7F" text-anchor="start">
    <tspan data-narration="Example: LBS can enhance the SMS telephony experience by providing location-based information between mobile devices">Example</tspan>
  </text>
  <animateTransform attributeName="Transform" type="translate" from="0,0" to="0,80" begin="6s" dur="2s" repeatCount="indefinite"/>
</svg>