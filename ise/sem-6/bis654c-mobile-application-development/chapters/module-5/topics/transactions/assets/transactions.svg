<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="transactions">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3949AB"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00695C"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62828"/>
    </marker>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title + ACID Properties (0.3s) -->
  <g data-narration="JDBC transactions follow ACID properties: Atomicity, Consistency, Isolation, and Durability. These ensure reliable database operations." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>

    <text x="210" y="26" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">JDBC Transaction Processing</text>

    <!-- ACID boxes -->
    <rect x="18" y="36" width="90" height="30" rx="4" fill="#3949AB"/>
    <text x="63" y="55" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Atomicity</text>

    <rect x="116" y="36" width="90" height="30" rx="4" fill="#00695C"/>
    <text x="161" y="55" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Consistency</text>

    <rect x="214" y="36" width="90" height="30" rx="4" fill="#E65100"/>
    <text x="259" y="55" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Isolation</text>

    <rect x="312" y="36" width="90" height="30" rx="4" fill="#C62828"/>
    <text x="357" y="55" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Durability</text>
  </g>

  <!-- Group 2: Begin Transaction - setAutoCommit(false) (1.5s) -->
  <g data-narration="A transaction begins by disabling auto-commit mode with setAutoCommit(false). This groups subsequent SQL statements into one logical unit." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Connection box -->
    <rect x="130" y="78" width="160" height="38" rx="6" fill="#3949AB"/>
    <text x="210" y="93" text-anchor="middle" font-family="monospace" font-size="10" fill="white">conn.setAutoCommit</text>
    <text x="210" y="108" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#C5CAE9">(false)</text>

    <!-- Arrow down -->
    <line x1="210" y1="116" x2="210" y2="138" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>

    <text x="320" y="92" font-family="Arial" font-size="9" fill="#3949AB" font-style="italic">Begin Transaction</text>
  </g>

  <!-- Group 3: Execute SQL Operations (3.0s) -->
  <g data-narration="Inside the try block, multiple SQL statements are executed. For example, a bank transfer debits one account and credits another using PreparedStatements." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>

    <!-- SQL operations box -->
    <rect x="60" y="140" width="300" height="62" rx="6" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <text x="210" y="156" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Execute SQL Operations</text>

    <text x="80" y="172" font-family="monospace" font-size="9" fill="#E65100">UPDATE accounts SET balance = balance - 100</text>
    <text x="80" y="186" font-family="monospace" font-size="9" fill="#00695C">UPDATE accounts SET balance = balance + 100</text>

    <!-- Arrow down -->
    <line x1="210" y1="202" x2="210" y2="222" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Group 4: Decision Diamond - Success or Error? (4.5s) -->
  <g data-narration="After executing SQL, the program checks for errors. If all statements succeed, the transaction proceeds to commit. If any SQLException occurs, it goes to rollback." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <!-- Diamond shape -->
    <polygon points="210,224 280,252 210,280 140,252" fill="#E65100" stroke="#E65100" stroke-width="1"/>
    <text x="210" y="249" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Success</text>
    <text x="210" y="261" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">or Error?</text>

    <!-- Left arrow (to Rollback) -->
    <line x1="140" y1="252" x2="78" y2="252" stroke="#C62828" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="110" y="246" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Error</text>

    <!-- Right arrow (to Commit) -->
    <line x1="280" y1="252" x2="342" y2="252" stroke="#00695C" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="312" y="246" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">OK</text>
  </g>

  <!-- Group 5: Commit and Rollback paths (6.0s) -->
  <g data-narration="On success, conn.commit() persists all changes permanently. On failure, conn.rollback() undoes all operations in the transaction, maintaining atomicity." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>

    <!-- Rollback box (left) -->
    <rect x="10" y="234" width="68" height="36" rx="5" fill="#C62828"/>
    <text x="44" y="250" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">rollback</text>
    <text x="44" y="262" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFCDD2">()</text>

    <!-- Commit box (right) -->
    <rect x="342" y="234" width="68" height="36" rx="5" fill="#00695C"/>
    <text x="376" y="250" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">commit</text>
    <text x="376" y="262" text-anchor="middle" font-family="monospace" font-size="8" fill="#B2DFDB">()</text>

    <!-- Both arrows converge down -->
    <line x1="44" y1="270" x2="44" y2="298" stroke="#C62828" stroke-width="1.5"/>
    <line x1="44" y1="298" x2="180" y2="298" stroke="#3949AB" stroke-width="1.5"/>

    <line x1="376" y1="270" x2="376" y2="298" stroke="#00695C" stroke-width="1.5"/>
    <line x1="376" y1="298" x2="240" y2="298" stroke="#3949AB" stroke-width="1.5"/>

    <!-- Arrow down from merge point -->
    <line x1="210" y1="298" x2="210" y2="320" stroke="#3949AB" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Undo symbol next to rollback -->
    <text x="14" y="284" font-family="Arial" font-size="8" fill="#C62828" font-style="italic">Undo all</text>

    <!-- Persist symbol next to commit -->
    <text x="348" y="284" font-family="Arial" font-size="8" fill="#00695C" font-style="italic">Persist all</text>
  </g>

  <!-- Group 6: Cleanup + Savepoint note (7.5s) -->
  <g data-narration="Finally, auto-commit is restored and the connection is closed. Savepoints allow partial rollback within a transaction using conn.setSavepoint() and conn.rollback(savepoint)." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>

    <!-- End Transaction box -->
    <rect x="120" y="322" width="180" height="32" rx="6" fill="#3949AB"/>
    <text x="210" y="337" text-anchor="middle" font-family="monospace" font-size="9" fill="white">setAutoCommit(true)</text>
    <text x="210" y="349" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">conn.close()</text>

    <!-- Savepoint info bar at bottom -->
    <rect x="18" y="364" width="384" height="28" rx="5" fill="white" stroke="#E65100" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="28" y="380" font-family="Arial" font-size="9" fill="#E65100" font-weight="bold">Savepoints:</text>
    <text x="96" y="380" font-family="monospace" font-size="8.5" fill="#3949AB">setSavepoint("SP1")  |  rollback(savepoint)  |  releaseSavepoint(sp)</text>
  </g>
</svg>
