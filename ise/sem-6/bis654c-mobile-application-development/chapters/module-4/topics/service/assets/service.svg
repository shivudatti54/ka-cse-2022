<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="service">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and OS Kernel Core (0.3s) -->
  <g opacity="0" data-narration="The Operating System Kernel sits at the center, acting as the intermediary between hardware and user programs. It provides essential services for program execution.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="24" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#3949AB">Operating System Services Architecture</text>
    <!-- Kernel Mode Zone -->
    <rect x="130" y="120" width="160" height="100" fill="url(#kernelGrad)" rx="8" stroke="#1A237E" stroke-width="1.5"/>
    <text x="210" y="145" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">OS KERNEL</text>
    <text x="210" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#C5CAE9">(Kernel Mode)</text>
    <!-- Inner services icons -->
    <rect x="145" y="172" width="55" height="20" fill="#5C6BC0" rx="3"/>
    <text x="172" y="186" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Scheduler</text>
    <rect x="210" y="172" width="65" height="20" fill="#5C6BC0" rx="3"/>
    <text x="242" y="186" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Mem Mgmt</text>
    <rect x="145" y="197" width="55" height="16" fill="#7986CB" rx="3"/>
    <text x="172" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="white">I/O Sys</text>
    <rect x="210" y="197" width="65" height="16" fill="#7986CB" rx="3"/>
    <text x="242" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="white">File Sys</text>
  </g>

  <!-- Group 2: User Program and System Call Interface (1.5s) -->
  <g opacity="0" data-narration="User programs run in User Mode with restricted access. When they need OS services, they make system calls like fork(), open(), read(), and write() to request kernel assistance.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- User Mode Zone -->
    <rect x="30" y="42" width="130" height="65" fill="url(#userGrad)" rx="8" stroke="#004D40" stroke-width="1.5"/>
    <text x="95" y="62" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">User Program</text>
    <text x="95" y="78" text-anchor="middle" font-family="monospace" font-size="9" fill="#A5D6A7">(User Mode)</text>
    <text x="95" y="96" text-anchor="middle" font-family="monospace" font-size="8" fill="#E0F2F1">fopen(), printf()</text>
    <!-- Arrow: User to System Call -->
    <line x1="130" y1="107" x2="160" y2="120" stroke="#E65100" stroke-width="2" stroke-dasharray="4,2">
      <animate attributeName="stroke-dashoffset" from="12" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <polygon points="158,115 165,122 155,122" fill="#E65100"/>
    <text x="115" y="118" font-family="monospace" font-size="8" fill="#E65100" font-weight="bold">syscall</text>
  </g>

  <!-- Group 3: System Call Table and Categories (3.0s) -->
  <g opacity="0" data-narration="System calls are categorized into six types: Process Control (fork, exit), File Management (open, read, write), Device Management (ioctl), Information (getpid), Communication (pipe, shmget), and Protection (chmod).">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- System Call Table -->
    <rect x="260" y="42" width="150" height="68" fill="white" rx="6" stroke="#3949AB" stroke-width="1"/>
    <text x="335" y="56" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">System Call Types</text>
    <line x1="265" y1="60" x2="405" y2="60" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="270" y="73" font-family="monospace" font-size="8" fill="#00695C">Process:</text>
    <text x="320" y="73" font-family="monospace" font-size="8" fill="#333">fork() exit() wait()</text>
    <text x="270" y="84" font-family="monospace" font-size="8" fill="#00695C">File:</text>
    <text x="320" y="84" font-family="monospace" font-size="8" fill="#333">open() read() close()</text>
    <text x="270" y="95" font-family="monospace" font-size="8" fill="#00695C">Device:</text>
    <text x="320" y="95" font-family="monospace" font-size="8" fill="#333">ioctl() read()</text>
    <text x="270" y="106" font-family="monospace" font-size="8" fill="#00695C">Comms:</text>
    <text x="320" y="106" font-family="monospace" font-size="8" fill="#333">pipe() shmget()</text>
    <!-- Arrow from table to kernel -->
    <line x1="290" y1="110" x2="270" y2="130" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="3,2">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <polygon points="268,125 274,133 264,131" fill="#3949AB"/>
  </g>

  <!-- Group 4: Core Services - Program Execution & I/O Flow (4.5s) -->
  <g opacity="0" data-narration="Core OS services include Program Execution (loading programs into memory and managing their lifecycle) and I/O Operations (providing secure, standardized interfaces to hardware devices like keyboards, disks, and displays).">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <!-- Program Execution Flow -->
    <rect x="20" y="240" width="115" height="70" fill="white" rx="6" stroke="#E65100" stroke-width="1.5"/>
    <text x="77" y="256" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Program Execution</text>
    <line x1="25" y1="260" x2="130" y2="260" stroke="#FFE0B2" stroke-width="0.5"/>
    <!-- Mini flow inside -->
    <rect x="30" y="265" width="45" height="14" fill="#FFF3E0" rx="2" stroke="#E65100" stroke-width="0.5"/>
    <text x="52" y="275" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Load</text>
    <text x="80" y="275" font-family="Arial" font-size="9" fill="#E65100">&#8594;</text>
    <rect x="87" y="265" width="40" height="14" fill="#FFF3E0" rx="2" stroke="#E65100" stroke-width="0.5"/>
    <text x="107" y="275" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Execute</text>
    <rect x="30" y="285" width="45" height="14" fill="#FFF3E0" rx="2" stroke="#E65100" stroke-width="0.5"/>
    <text x="52" y="295" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Allocate</text>
    <text x="80" y="295" font-family="Arial" font-size="9" fill="#E65100">&#8594;</text>
    <rect x="87" y="285" width="40" height="14" fill="#FFF3E0" rx="2" stroke="#E65100" stroke-width="0.5"/>
    <text x="107" y="295" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">Terminate</text>
    <!-- Connection to kernel -->
    <line x1="95" y1="240" x2="180" y2="220" stroke="#E65100" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Group 5: Resource Management & Error Detection (6.0s) -->
  <g opacity="0" data-narration="Resource Management services handle process scheduling, memory allocation, and device control. The OS also constantly monitors for errors including hardware failures, software exceptions, security violations, and resource exhaustion.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <!-- Resource Management -->
    <rect x="150" y="240" width="120" height="70" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5"/>
    <text x="210" y="256" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Resource Management</text>
    <line x1="155" y1="260" x2="265" y2="260" stroke="#C5CAE9" stroke-width="0.5"/>
    <circle cx="170" cy="275" r="6" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
    <text x="170" y="278" text-anchor="middle" font-family="Arial" font-size="6" fill="#3949AB">CPU</text>
    <text x="185" y="278" font-family="Arial" font-size="8" fill="#3949AB">Scheduling</text>
    <circle cx="170" cy="293" r="6" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
    <text x="170" y="296" text-anchor="middle" font-family="Arial" font-size="6" fill="#3949AB">M</text>
    <text x="185" y="296" font-family="Arial" font-size="8" fill="#3949AB">Virtual Memory</text>
    <!-- Error indicator -->
    <rect x="230" y="268" width="35" height="35" fill="#FFEBEE" rx="4" stroke="#C62828" stroke-width="1">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="247" y="282" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Error</text>
    <text x="247" y="295" text-anchor="middle" font-family="Arial" font-size="6" fill="#C62828">Detect</text>
    <!-- Connection to kernel -->
    <line x1="210" y1="240" x2="210" y2="220" stroke="#3949AB" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Group 6: Protection/Security & Architecture Comparison (7.5s) -->
  <g opacity="0" data-narration="Protection and Security services enforce access control, user authentication, and permission systems. OS architectures include Monolithic (all services in kernel, fast but less stable), Microkernel (minimal kernel, more stable), and Layered (hierarchical organization).">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Security Shield -->
    <rect x="285" y="240" width="120" height="70" fill="white" rx="6" stroke="#C62828" stroke-width="1.5"/>
    <text x="345" y="256" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">Protection &amp; Security</text>
    <line x1="290" y1="260" x2="400" y2="260" stroke="#FFCDD2" stroke-width="0.5"/>
    <text x="295" y="273" font-family="monospace" font-size="7" fill="#C62828">&#x1F512; Authentication</text>
    <text x="295" y="285" font-family="monospace" font-size="7" fill="#C62828">&#x1F511; Access Control</text>
    <text x="295" y="297" font-family="monospace" font-size="7" fill="#C62828">&#x1F6E1; chmod() chown()</text>
    <!-- Connection to kernel -->
    <line x1="310" y1="240" x2="270" y2="220" stroke="#C62828" stroke-width="1" opacity="0.6"/>

    <!-- Architecture Comparison at bottom -->
    <rect x="20" y="325" width="380" height="60" fill="white" rx="6" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="340" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">OS Architecture Comparison</text>
    <line x1="25" y1="344" x2="395" y2="344" stroke="#C5CAE9" stroke-width="0.5"/>
    <!-- Monolithic -->
    <rect x="30" y="350" width="100" height="28" fill="#E8EAF6" rx="4"/>
    <text x="80" y="362" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Monolithic</text>
    <text x="80" y="373" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Fast | Less Stable</text>
    <!-- Microkernel -->
    <rect x="155" y="350" width="100" height="28" fill="#E0F2F1" rx="4"/>
    <text x="205" y="362" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Microkernel</text>
    <text x="205" y="373" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Slower | More Stable</text>
    <!-- Layered -->
    <rect x="280" y="350" width="100" height="28" fill="#FFF3E0" rx="4"/>
    <text x="330" y="362" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">Layered</text>
    <text x="330" y="373" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Moderate Balance</text>
  </g>
</svg>