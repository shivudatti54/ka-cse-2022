<svg
  width="420"
  height="400"
  viewBox="0 0 420 400"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="color: #333333; font-family: Arial, sans-serif; font-size: 14px;">
  <title>Mobile Application Development: Intent Filters and Activity Life Cycle</title>
  <footer>
    <g id="footer-group">
      <text x="10" y="380" font-size="14" font-family="Arial, sans-serif">
        This diagram is based on the provided study material.
      </text>
    </g>
  </footer>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" fill="url(#gradient)"/>
  <rect x="10" y="10" width="400" height="40" fill="#87CEEB"/>
  <rect x="10" y="370" width="400" height="40" fill="#87CEEB"/>
  <rect x="10" y="10" width="400" height="350" fill="#6495ED"/>
  <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#333333">
    Intent Filters
  </text>
  <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" fill="#666666">
    <tspan>Intent filters define what components can handle an intent.</tspan>
    <tspan>They are used in implicit intents to specify which activities can handle the intent.</tspan>
  </text>
  <animateTransform 
    attributeName="transform"
    type="translate"
    from="0 0"
    to="0 -40"
    begin="0s"
    dur="2s"
    repeatCount="indefinite"/>
  <g id="section-1">
    <rect x="10" y="100" width="350" height="60" fill="#F5F5F5"/>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#444444">
      <tspan data-narration="What is an Intent Filter?" fill="#666666">What is an Intent Filter?</tspan>
      <tspan fill="#666666">An intent filter is a string that defines the components that can handle an intent.</tspan>
    </text>
    <text x="10" y="180" font-size="18" font-family="Arial, sans-serif" fill="#444444">
      <tspan data-narration="How to use an Intent Filter?" fill="#666666">How to use an Intent Filter?</tspan>
      <tspan fill="#666666">You can declare an intent filter in the AndroidManifest.xml file.</tspan>
    </text>
    <path d="M 10 220 L 50 260 L 90 300 Z"/>
    <animateTransform 
      attributeName="transform"
      type="translate"
      from="0 0"
      to="0 -140"
      begin="0s"
      dur="2s"
      repeatCount="indefinite"/>
  </g>
  <g id="section-2">
    <rect x="10" y="200" width="350" height="60" fill="#F5F5F5"/>
    <text x="20" y="210" font-size="18" font-family="Arial, sans-serif" fill="#444444">
      <tspan data-narration="Explicit Intent Filters" fill="#666666">Explicit Intent Filters</tspan>
      <tspan fill="#666666">These are used to launch a specific activity.</tspan>
    </text>
    <text x="10" y="280" font-size="18" font-family="Arial, sans-serif" fill="#444444">
      <tspan data-narration="Implicit Intent Filters" fill="#666666">Implicit Intent Filters</tspan>
      <tspan fill="#666666">These are used to request the system to find an activity that can handle the intent.</tspan>
    </text>
    <path d="M 10 300 L 50 340 L 90 380 Z"/>
    <animateTransform 
      attributeName="transform"
      type="translate"
      from="0 0"
      to="0 -200"
      begin="2s"
      dur="2s"
      repeatCount="indefinite"/>
  </g>
  <g id="section-3">
    <rect x="10" y="300" width="350" height="60" fill="#F5F5F5"/>
    <text x="20" y="310" font-size="18" font-family="Arial, sans-serif" fill="#444444">
      <tspan data-narration="Activity Life Cycle" fill="#666666">Activity Life Cycle</tspan>
      <tspan fill="#666666">This is the sequence of events that occur when an activity is started and stopped.</tspan>
    </text>
    <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" fill="#444444">
      <tspan data-narration="State of an Activity" fill="#666666">State of an Activity</tspan>
      <tspan fill="#666666">An activity can be in one of several states: paused, resumed, stopped, paused, created or destroyed.</tspan>
    </text>
    <path d="M 10 420 L 50 460 L 90 500 Z"/>
    <animateTransform 
      attributeName="transform"
      type="translate"
      from="0 0"
      to="0 -300"
      begin="4s"
      dur="2s"
      repeatCount="indefinite"/>
  </g>
  <g id="connection-1">
    <path d="M 40 120 L 60 150 L 80 180 Z"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -120" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="connection-2">
    <path d="M 120 120 L 140 150 L 160 180 Z"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -120" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="connection-3">
    <path d="M 200 120 L 220 150 L 240 180 Z"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -120" begin="4s" dur="2s" repeatCount="indefinite"/>
  </g>
</svg>