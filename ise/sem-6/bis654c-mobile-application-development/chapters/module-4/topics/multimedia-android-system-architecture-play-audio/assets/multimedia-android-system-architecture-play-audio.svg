<svg width="420" height="400" data-topic-id="multimedia-android-system-architecture-play-audio">
    <style>
        /* Set the gradient background */
        .background {
            background-image: linear-gradient(to bottom, #7a8ea8, #8bc0e8);
            background-size: 100% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    <defs>
        <linearGradient id="Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7a8ea8"/>
            <stop offset="100%" stop-color="#8bc0e8"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="100%" height="100%" class="background" rx="10"/>
    <g transform="translate(20, 20)">
        <rect x="0" y="0" width="360" height="360" rx="10" fill="#fff"/>
        <text x="180" y="10" text-anchor="middle" font-size="18" font-family="Arial" fill="#333">Multimedia Android System Architecture</text>
        <text x="10" y="10" text-anchor="start" font-size="14" font-family="Arial" fill="#666">Play Audio</text>
        <rect x="80" y="50" width="200" height="30" rx="5" fill="#f7d2c4" class="section" data-narration="Introduction"/>
        <rect x="80" y="90" width="200" height="30" rx="5" fill="#c6e2b5" class="section" data-narration="Android System Architecture"/>
        <rect x="80" y="130" width="200" height="30" rx="5" fill="#f7dc6f" class="section" data-narration="Intent"/>
        <rect x="80" y="170" width="200" height="30" rx="5" fill="#c7b8ea" class="section" data-narration="Broadcast Life Cycle"/>
        <rect x="80" y="210" width="200" height="30" rx="5" fill="#f2c464" class="section" data-narration="Activity Life Cycle"/>
        <rect x="80" y="250" width="200" height="30" rx="5" fill="#8bc0e8" class="section" data-narration="Intent Filter"/>
        <rect x="80" y="290" width="200" height="30" rx="5" fill="#7a8ea8" class="section" data-narration="Intent Data"/>
        <animate transform="rotate(360 180 10)" dur="10s" repeatCount="indefinite"/>
        <animate transform="translate(180 10) rotate(360)" dur="10s" repeatCount="indefinite"/>
        <animate transform="translate(180 10) rotate(360)" dur="10s" repeatCount="indefinite"/>
        <animate transform="rotate(360 180 10)" dur="10s" repeatCount="indefinite"/>
        <animate transform="translate(180 10) rotate(360)" dur="10s" repeatCount="indefinite"/>
        <animate transform="translate(180 10) rotate(360)" dur="10s" repeatCount="indefinite"/>
        <g>
            <line x1="110" y1="100" x2="250" y2="100" stroke="#666" stroke-width="2"/>
            <line x1="110" y1="80" x2="250" y2="80" stroke="#666" stroke-width="2"/>
            <line x1="110" y1="60" x2="250" y2="60" stroke="#666" stroke-width="2"/>
        </g>
        <text x="90" y="100" text-anchor="middle" font-size="16" font-family="Arial" fill="#333" data-narration="The Android system architecture is composed of various components, including applications, services, broadcasts, content providers, and more. These components interact with each other through intent, broadcast, and content provider mechanisms." class="annotation"/>
        <text x="90" y="120" text-anchor="middle" font-size="16" font-family="Arial" fill="#333" data-narration="An intent is a message that an application sends to the system to request a specific action or service. An intent filter is a mechanism that allows an application to specify what actions it can handle. An intent action is the specific action that an application is requesting, such as &quot;play audio&quot; or &quot;open URL&quot;. An intent data is the additional information associated with an intent, such as a URL or a file path." class="annotation"/>
        <text x="90" y="140" text-anchor="middle" font-size="16" font-family="Arial" fill="#333" data-narration="When an activity is created, it goes through a life cycle of states, including CREATE, START, RESUMED, PAUSED, STOPPED, and DESTROY. Activities have various methods that can be called at different points during the life cycle, such as onCreate, onStart, and onPause." class="annotation"/>
        <text x="90" y="160" text-anchor="middle" font-size="16" font-family="Arial" fill="#333" data-narration="A broadcast is a way for an application to send a message to other applications. A broadcast receiver is an application that receives the broadcast message and responds accordingly." class="annotation"/>
        <text x="90" y="180" text-anchor="middle" font-size="16" font-family="Arial" fill="#333" data-narration="The intent filter specifies what actions an application can handle, while the intent data provides additional information about the intent." class="annotation"/>
        <text x="90" y="200" text-anchor="middle" font-size="16" font-family="Arial" fill="#333" data-narration="The Android system architecture is composed of various components, including applications, services, broadcasts, content providers, and more. These components interact with each other through intent, broadcast, and content provider mechanisms." class="annotation"/>
    </g>
    < footer>
        <g>
            <line x1="20" y1="380" x2="400" y2="380" stroke="#666" stroke-width="2"/>
            <line x1="20" y1="360" x2="400" y2="360" stroke="#666" stroke-width="2"/>
            <line x1="20" y1="340" x2="400" y2="340" stroke="#666" stroke-width="2"/>
        </g>
    </footer>
</svg>