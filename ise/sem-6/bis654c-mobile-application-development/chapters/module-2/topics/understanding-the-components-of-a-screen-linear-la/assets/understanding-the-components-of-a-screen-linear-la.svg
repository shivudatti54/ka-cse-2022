<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="420"
    height="400"
    viewBox="0 0 420 400"
    data-topic-id="Understanding-The-Components-Of-A-Screen-Linear-La"
    data-slug="understanding-the-components-of-a-screen-linear-la">

    <!-- Title Section -->
    <rect
        x="10"
        y="10"
        width="400"
        height="30"
        rx="10"
        fill="#3498db"
        data-narration="Understanding the Components of a Screen: Linear Layout, Absolute Layout, and Frame" />

    <text
        x="20"
        y="30"
        font-size="24"
        fill="#ffffff"
        text-anchor="start"
        data-narration="Title: Understanding the Components of a Screen" />
    <line
        x1="20"
        y1="40"
        x2="20"
        y2="60"
        stroke="#3498db"
        stroke-width="2"
        data-narration="Connects to: Linear Layout" />

    <!-- Linear Layout Section -->
    <rect
        x="40"
        y="80"
        width="300"
        height="100"
        rx="10"
        fill="#8e44ad"
        data-narration="Linear Layout: A Linear Layout is a type of layout manager that arranges its children in a linear fashion, either horizontally or vertically." />

    <rect
        x="50"
        y="90"
        width="150"
        height="50"
        rx="10"
        fill="#3498db"
        data-narration="Arranges children in a linear fashion, either horizontally or vertically" />

    <line
        x1="50"
        y1="100"
        x2="50"
        y2="120"
        stroke="#3498db"
        stroke-width="2"
        data-narration="Supports different orientations (portrait and landscape)" />

    <!-- Absolute Layout Section -->
    <rect
        x="40"
        y="220"
        width="300"
        height="100"
        rx="10"
        fill="#8e44ad"
        data-narration="Absolute Layout: An Absolute Layout is a type of layout manager that allows you to position its children absolutely, relative to their parent or other children." />

    <rect
        x="50"
        y="230"
        width="150"
        height="50"
        rx="10"
        fill="#3498db"
        data-narration="Allows absolute positioning of children" />

    <line
        x1="50"
        y1="240"
        x2="50"
        y2="260"
        stroke="#3498db"
        stroke-width="2"
        data-narration="Children can be positioned relative to their parent or other children" />

    <!-- Frame Section -->
    <rect
        x="40"
        y="340"
        width="300"
        height="100"
        rx="10"
        fill="#8e44ad"
        data-narration="Frame: A Frame is a type of layout manager that provides a basic structure for a layout." />

    <rect
        x="50"
        y="350"
        width="150"
        height="50"
        rx="10"
        fill="#3498db"
        data-narration="Provides a basic structure for a layout" />

    <line
        x1="50"
        y1="360"
        x2="50"
        y2="380"
        stroke="#3498db"
        stroke-width="2"
        data-narration="Used to create complex and customized layouts" />

    <!-- Gradient Background -->
    <defs>
        <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f7f7f7" stop-opacity="1" />
            <stop offset="50%" stop-color="#ffffff" stop-opacity="1" />
            <stop offset="100%" stop-color="#f7f7f7" stop-opacity="1" />
        </linearGradient>
    </defs>

    <rect
        x="0"
        y="0"
        width="420"
        height="400"
        fill="url(#background-gradient)"
        data-topic-id="Understanding-The-Components-Of-A-Screen-Linear-La"
        data-slug="understanding-the-components-of-a-screen-linear-la" />

    <!-- Title Footer -->
    <rect
        x="10"
        y="390"
        width="400"
        height="10"
        rx="10"
        fill="#3498db"
        data-narration="Footer: Understanding the Components of a Screen" />

    <text
        x="20"
        y="400"
        font-size="18"
        fill="#ffffff"
        text-anchor="start"
        data-narration="powered by" />

</svg>