<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="layout-relative-layout-table-layout" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:dc="http://purl.org/dc/elements/1.1/">
  <style>
    .section {
      fill-opacity: 0.5;
    }
    .section:hover {
      fill-opacity: 1;
    }
    .arrow {
      stroke: #fff;
      fill: #fff;
      stroke-width: 2;
      marker-end: url(#arrow-head);
    }
    .arrow-markers {
      fill: #fff;
    }
    .arrow-markers path {
      stroke: #fff;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      text-anchor: center;
      fill: #2ec4b5;
      opacity: 0.8;
    }
    .footer {
      font-size: 18px;
      font-weight: bold;
      text-anchor: center;
      fill: #2ec4b5;
      opacity: 0.8;
      transform: translateY(20);
    }
    .gradient {
      fill: #c9e4ca;
    }
  </style>
  <defs>
    <marker id="arrow-head" mark="url(#arrow)">
      <rect x="0" y="0" width="8" height="8" fill="#fff" rx="4"/>
    </marker>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b2fffc" stop-opacity="1"/>
      <stop offset="50%" stop-color="#a5e9f3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66d9ef" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="50" fill="none"/>
  <g id="title">
    <text class="title" x="50%" y="10%" text-anchor="middle">Layout Relative Layout – Table Layout</text>
  </g>
  <g id="footer">
    <text class="footer" x="50%" y="70%" text-anchor="middle">Last updated: 10:00 AM, 14 Dec 2023</text>
  </g>
  <rect x="0" y="80" width="100%" height="300" fill="url(#gradient)"/>
  <g id="sections">
    <g id="section-1" class="section">
      <title data-narration="This is an example of a Layout Relative Layout with a Table Layout.">Layout Relative Layout</title>
      <img x="10%" y="10%" width="80%" height="80%" src="layout-relative-layout.png" class="animation" data-duration="2000" data-delay="0"/>
      <p data-narration="In this section, we will discuss how the Layout Relative Layout works and its key features, including the Table Layout.">Layout Relative Layout is a layout manager in Android that allows you to arrange views in a relative way, where the position and size of one view can be defined relative to another view. This is useful when you want to create a layout with multiple views that have different sizes and positions.</p>
    </g>
    <g id="section-2" class="section">
      <title data-narration="A Table Layout is a type of Layout Relative Layout that arranges views in a table-like structure.">Table Layout</title>
      <img x="10%" y="10%" width="80%" height="80%" src="table-layout.png" class="animation" data-duration="2000" data-delay="1000"/>
      <p data-narration="A Table Layout is a type of Layout Relative Layout that arranges views in a table-like structure. Each row and column in the table has a defined width and height. The views in the table are arranged in a grid, where each view is positioned at the intersection of a row and column.">A Table Layout is a type of Layout Relative Layout that arranges views in a table-like structure. Each row and column in the table has a defined width and height. The views in the table are arranged in a grid, where each view is positioned at the intersection of a row and column.</p>
    </g>
    <g id="section-3" class="section">
      <title data-narration="The views in the table can be aligned to the top, bottom, left, right, or center of their cell.">Alignment</title>
      <img x="10%" y="10%" width="80%" height="80%" src="alignment.png" class="animation" data-duration="2000" data-delay="2000"/>
      <p data-narration="The views in the table can be aligned to the top, bottom, left, right, or center of their cell. For example, a text view can be aligned to the center of its cell using the <code>android:gravity=&quot;center&quot;</code> attribute.">The views in the table can be aligned to the top, bottom, left, right, or center of their cell. For example, a text view can be aligned to the center of its cell using the <code>android:gravity=&quot;center&quot;</code> attribute.</p>
    </g>
    <g id="section-4" class="section">
      <title data-narration="To create a table layout, you need to add a TableLayout to your layout file and set its layout parameters.">Creating a Table Layout</title>
      <img x="10%" y="10%" width="80%" height="80%" src="creating-table-layout.png" class="animation" data-duration="2000" data-delay="3000"/>
      <p data-narration="To create a table layout, you need to add a TableLayout to your layout file and set its layout parameters. For example, you can use the <code>android:layout_width=&quot;match_parent&quot;</code> and <code>android:layout_height=&quot;match_parent&quot;</code> attributes to set the width and height of the TableLayout.">To create a table layout, you need to add a TableLayout to your layout file and set its layout parameters. For example, you can use the <code>android:layout_width=&quot;match_parent&quot;</code> and <code>android:layout_height=&quot;match_parent&quot;</code> attributes to set the width and height of the TableLayout.</p>
    </g>
    <g id="section-5" class="section">
      <title data-narration="The TableLayout can be used to create complex layouts with multiple rows and columns.">Complex Layouts</title>
      <img x="10%" y="10%" width="80%" height="80%" src="complex-layouts.png" class="animation" data-duration="2000" data-delay="4000"/>
      <p data-narration="The TableLayout can be used to create complex layouts with multiple rows and columns. For example, you can use the <code>android:layout_width=&quot;match_parent&quot;</code> and <code>android:layout_height=&quot;wrap_content&quot;</code> attributes to set the width and height of the TableLayout.">The TableLayout can be used to create complex layouts with multiple rows and columns. For example, you can use the <code>android:layout_width=&quot;match_parent&quot;</code> and <code>android:layout_height=&quot;wrap_content&quot;</code> attributes to set the width and height of the TableLayout.</p>
    </g>
  </g>
  <g id="arrow-markers">
    <path class="arrow-markers" d="M 10 10 L 100 10" fill="none"/>
    <path class="arrow-markers" d="M 10 100 L 100 100" fill="none"/>
    <path class="arrow-markers" d="M 100 10 L 100 100" fill="none"/>
  </g>
