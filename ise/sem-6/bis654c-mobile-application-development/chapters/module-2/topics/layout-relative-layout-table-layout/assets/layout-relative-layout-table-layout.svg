    <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#section-2" begin="1000"s dur="2000" calcMode="spline 0 1 1 2" keyTimes="0 0.5 1" keySplines="0.25, 0.5, 0.25, 1" fill="freeze"/>
    <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#section-3" begin="2000"s dur="2000" calcMode="spline 0 1 1 2" keyTimes="0 0.5 1" keySplines="0.25, 0.5, 0.25, 1" fill="freeze"/>
    <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#section-4" begin="3000"s dur="2000" calcMode="spline 0 1 1 2" keyTimes="0 0.5 1" keySplines="0.25, 0.5, 0.25, 1" fill="freeze"/>
    <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#section-5" begin="4000"s dur="2000" calcMode="spline 0 1 1 2" keyTimes="0 0.5 1" keySplines="0.25, 0.5, 0.25, 1" fill="freeze"/>
  </g>
</svg>