<svg width="420" height="400" data-topic-id="directory-structure" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <!-- Title -->
  <g transform="translate(10, 10)">
    <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start" fill="#3498DB">
      Directory Structure
    </text>
  </g>
  <!-- Background gradient -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <!-- Main content -->
  <g transform="translate(20, 50)">
    <!-- Section 1: Overview -->
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Overview
    </text>
    <rect x="10" y="35" width="100%" height="15" fill="#E5E5E5" rx="10"/>
    <text x="15" y="40" font-size="14" font-family="Arial" text-anchor="start" fill="#2E4053" data-narration="A directory structure is a hierarchical organization of files and folders that make up an Android application. Understanding the directory structure is crucial for building, maintaining, and debugging Android applications.">
      <animateTransform attributeName="x" type="translate" from="15" to="115" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="10" y="60" font-size="14" font-family="Arial" text-anchor="start" fill="#2E4053" data-narration="A well-organized directory structure has several benefits: easier maintenance, improved readability, and better debugging.">
      <animateTransform attributeName="x" type="translate" from="15" to="115" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Section 2: Definition -->
    <rect x="0" y="110" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="115" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Definition
    </text>
    <rect x="10" y="125" width="100%" height="15" fill="#E5E5E5" rx="10"/>
    <text x="15" y="130" font-size="14" font-family="Arial" text-anchor="start" fill="#2E4053" data-narration="A directory structure in Android refers to the way files and folders are organized within an application package (APK).">
      <animateTransform attributeName="x" type="translate" from="15" to="115" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="10" y="150" font-size="14" font-family="Arial" text-anchor="start" fill="#2E4053" data-narration="It is a tree-like structure that defines the location of files and folders within the APK.">
      <animateTransform attributeName="x" type="translate" from="15" to="115" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Section 3: Importance -->
    <rect x="0" y="205" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="210" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Importance
    </text>
    <rect x="10" y="220" width="100%" height="15" fill="#E5E5E5" rx="10"/>
    <text x="15" y="225" font-size="14" font-family="Arial" text-anchor="start" fill="#2E4053" data-narration="A well-organized directory structure has several benefits: easier maintenance, improved readability, and better debugging.">
      <animateTransform attributeName="x" type="translate" from="15" to="115" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="10" y="250" font-size="14" font-family="Arial" text-anchor="start" fill="#2E4053" data-narration="It also makes it easier for developers to identify and debug issues more efficiently.">
      <animateTransform attributeName="x" type="translate" from="15" to="115" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Section 4: Directory Structure -->
    <rect x="0" y="305" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="10" y="310" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Directory Structure
    </text>
    <rect x="10" y="320" width="100%" height="15" fill="#E5E5E5" rx="10"/>
    <text x="15" y="325" font-size="14" font-family="Arial" text-anchor="start" fill="#2E4053" data-narration="The Android directory structure is based on the following root directories: assets, bin, lib, res, and src.">
      <animateTransform attributeName="x" type="translate" from="15" to="115" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="10" y="350" font-size="14" font-family="Arial" text-anchor="start" fill="#2E4053" data-narration="The assets directory contains asset files such as images, layouts, and audio files.">
      <animateTransform attributeName="x" type="translate" from="15" to="115" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Footer -->
  <g transform="translate(20, 370)">
    <rect x="0" y="0" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start" fill="#3498DB">
      Learn more about Android directory structure
    </text>
    <rect x="10" y="25" width="100%" height="5" fill="#E5E5E5" rx="10"/>
  </g>
</svg>