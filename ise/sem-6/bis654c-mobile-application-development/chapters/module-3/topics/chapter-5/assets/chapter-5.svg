<svg width="420" height="400" data-topic-id="chapter-5" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="1" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#88CEEB" stop-opacity="1"/>
      <stop offset="1" stop-color="#88CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="60" fill="url(#gradient)"/>
  <rect x="10" y="80" width="400" height="60" fill="url(#gradient2)"/>
  <text x="20" y="40" font-size="24" font-family="Arial" fill="#008000" text-anchor="middle">Chapter 5: Mobile Application Development</text>
  <text x="20" y="150" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Introduction</text>
  <g transform="rotate(90 230 40)">
    <path d="M 230 40 C 230 30 240 30 240 40" stroke="#008000" stroke-width="2" fill="none"/>
    <animateTransform attributeName="cx" attributeName="cx" type="translate" from="230" to="230" dur="0.5" begin="0s"/>
    <animateTransform attributeName="cy" attributeName="cy" type="translate" from="40" to="40" dur="0.5" begin="0.5s"/>
  </g>
  <g id="section1">
    <rect x="10" y="220" width="400" height="60" fill="transparent"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">
      <tspan data-narration="Mobile application development is the process of designing, creating, testing, and deploying mobile applications for various mobile devices such as smartphones and tablets." x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Mobile Application Development</tspan>
      <tspan x="20" y="260" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">is</tspan>
      <tspan x="20" y="280" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">the</tspan>
      <tspan x="20" y="300" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">process</tspan>
      <tspan x="20" y="320" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">of</tspan>
      <tspan x="20" y="340" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">designing</tspan>
      <tspan x="20" y="360" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">creating</tspan>
      <tspan x="20" y="380" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">testing</tspan>
      <tspan x="20" y="400" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">and</tspan>
      <tspan x="20" y="420" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">deploying</tspan>
      <tspan x="20" y="440" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">mobile</tspan>
      <tspan x="20" y="460" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">applications</tspan>
      <tspan x="20" y="480" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">for</tspan>
      <tspan x="20" y="500" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">various</tspan>
      <tspan x="20" y="520" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">mobile</tspan>
      <tspan x="20" y="540" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">devices</tspan>
      <tspan x="20" y="560" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">such</tspan>
      <tspan x="20" y="580" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">as</tspan>
      <tspan x="20" y="600" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">smartphones</tspan>
      <tspan x="20" y="620" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">and</tspan>
      <tspan x="20" y="640" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">tablets.</tspan>
    </text>
  </g>
  <g id="section2">
    <rect x="10" y="220" width="400" height="60" fill="transparent"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">
      <tspan data-narration="There are two main types of mobile applications: native and cross-platform applications." x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Types</tspan>
      <tspan x="20" y="260" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">of</tspan>
      <tspan x="20" y="280" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Mobile</tspan>
      <tspan x="20" y="300" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Applications</tspan>
      <tspan x="20" y="320" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">:</tspan>
      <tspan x="20" y="340" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">native</tspan>
      <tspan x="20" y="360" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">and</tspan>
      <tspan x="20" y="380" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">cross-platform</tspan>
      <tspan x="20" y="400" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">applications.</tspan>
    </text>
  </g>
  <g id="section3">
    <rect x="10" y="220" width="400" height="60" fill="transparent"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">
      <tspan data-narration="The mobile application development life cycle consists of several stages: requirements gathering, design, development, testing, and deployment." x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Mobile</tspan>
      <tspan x="20" y="260" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Application</tspan>
      <tspan x="20" y="280" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Development</tspan>
      <tspan x="20" y="300" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Life</tspan>
      <tspan x="20" y="320" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Cycle:</tspan>
      <tspan x="20" y="340" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">requirements</tspan>
      <tspan x="20" y="360" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">gathering,</tspan>
      <tspan x="20" y="380" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">design,</tspan>
      <tspan x="20" y="400" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">development,</tspan>
      <tspan x="20" y="420" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">testing,</tspan>
      <tspan x="20" y="440" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">and</tspan>
      <tspan x="20" y="460" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">deployment.</tspan>
    </text>
  </g>
  <g id="section4">
    <rect x="10" y="220" width="400" height="60" fill="transparent"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">
      <tspan data-narration="The MVC pattern is a widely used pattern in mobile application development. It separates the application logic into three interconnected components: model, view, and controller." x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">MVC</tspan>
      <tspan x="20" y="260" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Pattern:</tspan>
      <tspan x="20" y="280" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">The</tspan>
      <tspan x="20" y="300" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">MVC</tspan>
      <tspan x="20" y="320" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">pattern</tspan>
      <tspan x="20" y="340" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">is</tspan>
      <tspan x="20" y="360" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">a</tspan>
      <tspan x="20" y="380" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">widely</tspan>
      <tspan x="20" y="400" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">used</tspan>
      <tspan x="20" y="420" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">pattern</tspan>
      <tspan x="20" y="440" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">in</tspan>
      <tspan x="20" y="460" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">mobile</tspan>
      <tspan x="20" y="480" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">application</tspan>
      <tspan x="20" y="500" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">development.</tspan>
      <tspan x="20" y="520" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">It</tspan>
      <tspan x="20" y="540" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">separates</tspan>
      <tspan x="20" y="560" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">the</tspan>
      <tspan x="20" y="580" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">application</tspan>
      <tspan x="20" y="600" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">logic</tspan>
      <tspan x="20" y="620" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">into</tspan>
      <tspan x="20" y="640" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">three</tspan>
      <tspan x="20" y="660" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">interconnected</tspan>
      <tspan x="20" y="680" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">components:</tspan>
      <tspan x="20" y="700" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">model,</tspan>
      <tspan x="20" y="720" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">view,</tspan>
      <tspan x="20" y="740" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">and</tspan>
      <tspan x="20" y="760" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">controller.</tspan>
    </text>
  </g>
  <g id="section5">
    <rect x="10" y="220" width="400" height="60" fill="transparent"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">
      <tspan data-narration="The singleton pattern is a design pattern that restricts a class from instantiating multiple objects." x="20" y="240" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Singleton</tspan>
      <tspan x="20" y="260" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">Pattern:</tspan>
      <tspan x="20" y="280" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">The</tspan>
      <tspan x="20" y="300" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">singleton</tspan>
      <tspan x="20" y="320" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">pattern</tspan>
      <tspan x="20" y="340" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">is</tspan>
      <tspan x="20" y="360" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">a</tspan>
      <tspan x="20" y="380" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">design</tspan>
      <tspan x="20" y="400" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">pattern</tspan>
      <tspan x="20" y="420" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">that</tspan>
      <tspan x="20" y="440" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">restricts</tspan>
      <tspan x="20" y="460" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">a</tspan>
      <tspan x="20" y="480" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">class</tspan>
      <tspan x="20" y="500" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">from</tspan>
      <tspan x="20" y="520" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">instantiating</tspan>
      <tspan x="20" y="540" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">multiple</tspan>
      <tspan x="20" y="560" font-size="18" font-family="Arial" fill="#008000" text-anchor="middle">objects.</tspan>
    </text>
  </g>
</svg>