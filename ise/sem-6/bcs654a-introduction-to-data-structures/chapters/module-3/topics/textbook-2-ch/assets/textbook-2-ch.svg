<svg width="420" height="400" data-topic-id="Textbook2ChIntroduction">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA"/>
      <stop offset="100%" stop-color="#FFC5C5"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="20" y="20" font-size="24" fill="#1A1D23">Introduction to Data Structures</text>
  <rect x="10" y="60" width="400" height="30" fill="#2E4053"/>
  <text x="20" y="70" font-size="18" fill="#1A1D23">What is a Linked List?</text>
  <section data-narration="Linked List Definition">
    <rect x="10" y="100" width="400" height="80" fill="#2E4053"/>
    <text x="20" y="110" font-size="18" fill="#1A1D23">A linked list is a linear data structure where each element is a separate object, and each element points to the next element in the sequence.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="1s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Key Characteristics">
    <rect x="10" y="190" width="400" height="80" fill="#2E4053"/>
    <text x="20" y="200" font-size="18" fill="#1A1D23">Key Characteristics:</text>
    <ul>
      <li>
        <rect x="10" y="220" width="400" height="20" fill="#2E4053"/>
        <text x="20" y="230" font-size="14" fill="#1A1D23">Each element is a separate object.</text>
        <animateTransform attributeName="transform" type="translate" from="0 250" to="0 270" dur="1s" begin="2s"/>
      </li>
      <li>
        <rect x="10" y="260" width="400" height="20" fill="#2E4053"/>
        <text x="20" y="270" font-size="14" fill="#1A1D23">Each element points to the next node in the sequence.</text>
        <animateTransform attributeName="transform" type="translate" from="0 310" to="0 330" dur="1s" begin="3s"/>
      </li>
    </ul>
  </section>
  <section data-narration="Types of Linked Lists">
    <rect x="10" y="340" width="400" height="80" fill="#2E4053"/>
    <text x="20" y="350" font-size="18" fill="#1A1D23">Types of Linked Lists:</text>
    <ul>
      <li>
        <rect x="10" y="370" width="400" height="20" fill="#2E4053"/>
        <text x="20" y="380" font-size="14" fill="#1A1D23">Singly Linked List.</text>
        <animateTransform attributeName="transform" type="translate" from="0 420" to="0 440" dur="1s" begin="4s"/>
      </li>
      <li>
        <rect x="10" y="460" width="400" height="20" fill="#2E4053"/>
        <text x="20" y="470" font-size="14" fill="#1A1D23">Doubly Linked List.</text>
        <animateTransform attributeName="transform" type="translate" from="0 510" to="0 530" dur="1s" begin="5s"/>
      </li>
      <li>
        <rect x="10" y="540" width="400" height="20" fill="#2E4053"/>
        <text x="20" y="550" font-size="14" fill="#1A1D23">Self-Referential Linked List.</text>
        <animateTransform attributeName="transform" type="translate" from="0 590" to="0 610" dur="1s" begin="6s"/>
      </li>
    </ul>
  </section>
  <section data-narration="Operations on Linked Lists">
    <rect x="10" y="620" width="400" height="80" fill="#2E4053"/>
    <text x="20" y="630" font-size="18" fill="#1A1D23">Operations on Linked Lists:</text>
    <ol>
      <li>
        <rect x="10" y="660" width="400" height="20" fill="#2E4053"/>
        <text x="20" y="670" font-size="14" fill="#1A1D23">Insertion.</text>
        <animateTransform attributeName="transform" type="translate" from="0 720" to="0 740" dur="1s" begin="7s"/>
      </li>
    </ol>
  </section>
  <footer>
    <text x="10" y="380" font-size="18" fill="#1A1D23">Learn More</text>
  </footer>
</svg>