<svg width="420" height="400" data-topic-id="introduction-to-linked-lists-91-to-92-93-only-931-to-935-9311-to-9312-94-to-95">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2E4F3" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Sans-Serif" text-anchor="middle" fill="#3498db">
    Introduction to Linked Lists
  </text>
  
  <!-- Section 1: What is a Linked List? -->
  <g transform="translate(50, 100)">
    <rect x="0" y="-20" width="100" height="40" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db">
      What is a Linked List?
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 -20" begin="0s" dur="2s"/>
    <text x="10" y="30" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db" data-narration>
      A linked list is a linear data structure where each element is a separate object, known as a node. Each node contains two items: the data and a reference (or link) to the next node in the sequence.
    </text>
    <animate-transform attributeName="transform" type="translate" from="0 100" to="0 30" begin="0s" dur="2s"/>
  </g>
  
  <!-- Section 2: Key Characteristics -->
  <g transform="translate(50, 150)">
    <rect x="0" y="-20" width="100" height="40" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db">
      Key Characteristics
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 -20" begin="2s" dur="2s"/>
    <text x="10" y="30" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db" data-narration>
      Dynamic size: Linked lists can grow or shrink as elements are added or removed.
      Efficient insertion and deletion: Linked lists can insert or delete elements at any position without shifting all elements.
      Variable memory allocation: Each node may require a different amount of memory.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 30" begin="2s" dur="2s"/>
  </g>
  
  <!-- Section 3: Advantages -->
  <g transform="translate(50, 200)">
    <rect x="0" y="-20" width="100" height="40" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db">
      Advantages
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 -20" begin="4s" dur="2s"/>
    <text x="10" y="30" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db" data-narration>
      Efficient use of memory: Linked lists can use less memory than arrays when elements are inserted or deleted frequently.
      Efficient insertion and deletion: Linked lists can insert or delete elements at any position without shifting all elements.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 30" begin="4s" dur="2s"/>
  </g>
  
  <!-- Section 4: Disadvantages -->
  <g transform="translate(50, 250)">
    <rect x="0" y="-20" width="100" height="40" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db">
      Disadvantages
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 -20" begin="6s" dur="2s"/>
    <text x="10" y="30" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db" data-narration>
      Slow search: Linked lists can be slower to search than arrays because each node must be traversed individually.
      More complex implementation: Linked lists require more complex implementation than arrays.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 30" begin="6s" dur="2s"/>
  </g>
  
  <!-- Section 5: Example Code -->
  <g transform="translate(50, 300)">
    <rect x="0" y="-20" width="100" height="40" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Sans-Serif" text-anchor="start" fill="#3498db">
      Example Code
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 -20" begin="8s" dur="2s"/>
    <code>
      <pre>
        class Node:
          def __init__(self, data=None):
            self.data = data
            self.next = None

        class LinkedList:
          def __init__(self):
            self.head = None

          def insert(self, data):
            if not self.head:
              self.head = Node(data)
            else:
              current = self.head
              while current.next:
                current = current.next
              current.next = Node(data)

          def print_list(self):
            current = self.head
            while current:
              print(current.data)
              current = current.next
      </pre>
    </code>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 30" begin="8s" dur="2s"/>
  </g>
  
  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Sans-Serif" text-anchor="middle" fill="#3498db">
    Created by [Your Name]
  </text>
</svg>