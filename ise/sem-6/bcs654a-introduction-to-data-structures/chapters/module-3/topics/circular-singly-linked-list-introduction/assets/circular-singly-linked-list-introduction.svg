<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="circular-singly-linked-list-introduction">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title and Linked List concept overview -->
  <g data-narration="A linked list is a linear data structure where each element called a node contains data and a pointer to the next node. Unlike arrays, nodes are stored non-contiguously in memory." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Introduction to Linked Lists</text>
    <text x="210" y="48" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">Each node holds data + pointer to next node</text>
    <!-- Node structure diagram -->
    <rect x="60" y="58" width="55" height="28" fill="#3949AB" rx="4"/>
    <text x="87" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="white">data</text>
    <rect x="115" y="58" width="40" height="28" fill="#00695C" rx="4"/>
    <text x="135" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="white">next</text>
    <text x="97" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">Node Structure</text>
    <!-- Self-referential struct -->
    <rect x="200" y="56" width="180" height="50" fill="white" rx="5" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="71" font-family="monospace" font-size="8" fill="#00695C">struct Node {</text>
    <text x="220" y="82" font-family="monospace" font-size="8" fill="#E65100">  int data;</text>
    <text x="220" y="93" font-family="monospace" font-size="8" fill="#E65100">  struct Node* next;</text>
    <text x="210" y="104" font-family="monospace" font-size="8" fill="#00695C">};</text>
  </g>

  <!-- Group 2: Singly linked list with 3 nodes, Head and Tail labels -->
  <g data-narration="A singly linked list has a head pointing to the first node. Each node links to the next. The last node, called the tail, points to NULL, marking the end of the list." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="210" y="132" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Singly Linked List Traversal</text>
    <!-- Head label -->
    <text x="46" y="155" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">HEAD</text>
    <line x1="46" y1="158" x2="46" y2="168" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <!-- Node 1 -->
    <rect x="20" y="170" width="50" height="26" fill="#3949AB" rx="4"/>
    <text x="45" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="white">10</text>
    <rect x="70" y="170" width="24" height="26" fill="#00695C" rx="4"/>
    <text x="82" y="186" text-anchor="middle" font-family="monospace" font-size="8" fill="white">*</text>
    <!-- Arrow 1->2 -->
    <line x1="94" y1="183" x2="118" y2="183" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <!-- Node 2 -->
    <rect x="120" y="170" width="50" height="26" fill="#3949AB" rx="4"/>
    <text x="145" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="white">20</text>
    <rect x="170" y="170" width="24" height="26" fill="#00695C" rx="4"/>
    <text x="182" y="186" text-anchor="middle" font-family="monospace" font-size="8" fill="white">*</text>
    <!-- Arrow 2->3 -->
    <line x1="194" y1="183" x2="218" y2="183" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <!-- Node 3 -->
    <rect x="220" y="170" width="50" height="26" fill="#3949AB" rx="4"/>
    <text x="245" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="white">30</text>
    <rect x="270" y="170" width="24" height="26" fill="#00695C" rx="4"/>
    <text x="282" y="186" text-anchor="middle" font-family="monospace" font-size="8" fill="white">*</text>
    <!-- Arrow to NULL -->
    <line x1="294" y1="183" x2="318" y2="183" stroke="#3949AB" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <text x="338" y="187" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#C62828">NULL</text>
    <!-- Tail label -->
    <text x="257" y="210" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">TAIL</text>
    <line x1="257" y1="200" x2="257" y2="197" stroke="#C62828" stroke-width="1.5"/>
  </g>

  <!-- Group 3: Insert at beginning operation -->
  <g data-narration="Inserting at the beginning creates a new node, sets its next pointer to the current head, then updates head to the new node. This takes constant O of 1 time." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="210" y="232" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Insert at Beginning (O(1))</text>
    <!-- New node being inserted -->
    <rect x="20" y="242" width="42" height="22" fill="#E65100" rx="4" stroke="#E65100" stroke-width="1"/>
    <text x="41" y="257" text-anchor="middle" font-family="monospace" font-size="9" fill="white">5</text>
    <rect x="62" y="242" width="20" height="22" fill="#00695C" rx="4"/>
    <text x="72" y="256" text-anchor="middle" font-family="monospace" font-size="7" fill="white">*</text>
    <text x="46" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">new</text>
    <!-- Arrow from new node to old head -->
    <line x1="82" y1="253" x2="106" y2="253" stroke="#E65100" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>
    <!-- Existing nodes (faded to show context) -->
    <rect x="108" y="242" width="42" height="22" fill="#3949AB" rx="4" opacity="0.7"/>
    <text x="129" y="257" text-anchor="middle" font-family="monospace" font-size="9" fill="white">10</text>
    <rect x="150" y="242" width="20" height="22" fill="#00695C" rx="4" opacity="0.7"/>
    <line x1="170" y1="253" x2="190" y2="253" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)" opacity="0.7"/>
    <rect x="192" y="242" width="42" height="22" fill="#3949AB" rx="4" opacity="0.7"/>
    <text x="213" y="257" text-anchor="middle" font-family="monospace" font-size="9" fill="white">20</text>
    <rect x="234" y="242" width="20" height="22" fill="#00695C" rx="4" opacity="0.7"/>
    <line x1="254" y1="253" x2="274" y2="253" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)" opacity="0.7"/>
    <text x="292" y="257" font-family="monospace" font-size="9" fill="#C62828" opacity="0.7">...</text>
    <!-- Steps -->
    <text x="340" y="248" font-family="Arial" font-size="7" fill="#00695C">1. Create node</text>
    <text x="340" y="259" font-family="Arial" font-size="7" fill="#00695C">2. new->next = head</text>
    <text x="340" y="270" font-family="Arial" font-size="7" fill="#00695C">3. head = new</text>
  </g>

  <!-- Group 4: Deletion from beginning operation -->
  <g data-narration="Deleting from the beginning saves the head pointer in a temp variable, moves head to the next node, then frees the old head. This is also an O of 1 operation." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="296" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Delete from Beginning (O(1))</text>
    <!-- Node being deleted (crossed out) -->
    <rect x="20" y="306" width="42" height="22" fill="#C62828" rx="4" opacity="0.5"/>
    <text x="41" y="321" text-anchor="middle" font-family="monospace" font-size="9" fill="white">10</text>
    <rect x="62" y="306" width="20" height="22" fill="#C62828" rx="4" opacity="0.5"/>
    <!-- X mark over deleted node -->
    <line x1="20" y1="306" x2="82" y2="328" stroke="#C62828" stroke-width="2"/>
    <line x1="82" y1="306" x2="20" y2="328" stroke="#C62828" stroke-width="2"/>
    <text x="46" y="342" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">free(temp)</text>
    <!-- Arrow showing head movement -->
    <path d="M 82 317 C 100 300 110 300 118 310" fill="none" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowOrange)"/>
    <!-- Remaining nodes -->
    <rect x="120" y="306" width="42" height="22" fill="#3949AB" rx="4"/>
    <text x="141" y="321" text-anchor="middle" font-family="monospace" font-size="9" fill="white">20</text>
    <rect x="162" y="306" width="20" height="22" fill="#00695C" rx="4"/>
    <line x1="182" y1="317" x2="206" y2="317" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <rect x="208" y="306" width="42" height="22" fill="#3949AB" rx="4"/>
    <text x="229" y="321" text-anchor="middle" font-family="monospace" font-size="9" fill="white">30</text>
    <rect x="250" y="306" width="20" height="22" fill="#00695C" rx="4"/>
    <line x1="270" y1="317" x2="294" y2="317" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
    <text x="312" y="321" font-family="monospace" font-size="9" font-weight="bold" fill="#C62828">NULL</text>
    <!-- New head label -->
    <text x="141" y="344" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">new HEAD</text>
    <!-- Steps -->
    <text x="365" y="312" font-family="Arial" font-size="7" fill="#C62828">1. temp = head</text>
    <text x="365" y="323" font-family="Arial" font-size="7" fill="#C62828">2. head = head->next</text>
    <text x="365" y="334" font-family="Arial" font-size="7" fill="#C62828">3. free(temp)</text>
  </g>

  <!-- Group 5: Types of linked lists -->
  <g data-narration="There are three types of linked lists. Singly linked list where each node points to the next. Doubly linked list where nodes point both forward and backward. Circular linked list where the last node points back to the first." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="105" y="363" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Types:</text>
    <!-- Singly -->
    <circle cx="145" cy="360" r="5" fill="#3949AB"/>
    <text x="155" y="363" font-family="Arial" font-size="8" fill="#3949AB">Singly</text>
    <!-- Doubly -->
    <circle cx="200" cy="360" r="5" fill="#00695C"/>
    <text x="210" y="363" font-family="Arial" font-size="8" fill="#00695C">Doubly</text>
    <!-- Circular -->
    <circle cx="260" cy="360" r="5" fill="#E65100"/>
    <text x="270" y="363" font-family="Arial" font-size="8" fill="#E65100">Circular</text>
  </g>

  <!-- Group 6: Arrays vs Linked Lists comparison -->
  <g data-narration="Key difference: Arrays offer O of 1 random access but O of n insertion. Linked lists offer O of 1 insertion at the head but O of n access. Choose based on your operation needs." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <!-- Comparison table -->
    <rect x="20" y="372" width="186" height="22" fill="white" rx="4" stroke="#3949AB" stroke-width="1"/>
    <text x="29" y="386" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Array: Access O(1) | Insert O(n)</text>
    <rect x="214" y="372" width="190" height="22" fill="white" rx="4" stroke="#00695C" stroke-width="1"/>
    <text x="223" y="386" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">List: Access O(n) | Insert O(1)</text>
  </g>
</svg>