<svg width="420" height="400" data-topic-id="operations-insert-delete-display">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A88CE" stop-opacity="1"/>
      <stop offset="100%" stop-color="#45A0E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  
  <!-- Title -->
  <text x="150" y="20" fill="#3498db" font-size="24" font-family="Arial">
    <tspan data-narration="Introduction">Operations Insert-Delete-Display</tspan>
  </text>
  
  <!-- Section 1: Introduction -->
  <rect x="0" y="60" width="420" height="100" fill="#f0f0f0" rx="10" />
  <text x="20" y="80" fill="#7A88CE" font-size="18" font-family="Arial">
    <tspan data-narration="Introduction">Introduction</tspan>
    In the context of linked lists, operations are essential for maintaining and manipulating the data.
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,60" to="0,80" dur="1000" begin="0s"/>
  
  <!-- Section 2: Insert Operation -->
  <rect x="0" y="170" width="420" height="100" fill="#f0f0f0" rx="10" />
  <text x="20" y="190" fill="#45A0E6" font-size="18" font-family="Arial">
    <tspan data-narration="Insert Operation">Insert Operation</tspan>
    The insert operation is used to add a new node to the linked list.
  </text>
  <rect x="20" y="220" width="40" height="40" fill="#3498db" rx="5" />
  <text x="90" y="230" fill="#45A0E6" font-size="16" font-family="Arial">
    <tspan data-narration="Types of Insertion">Types of Insertion</tspan>
    There are three types of insertion: <tspan data-narration="Append">Append</tspan>, <tspan data-narration="Prepend">Prepend</tspan>, and <tspan data-narration="Middle">Middle</tspan>.
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,250" to="0,270" dur="1000" begin="0.5s"/>
  <animateTransform attributeName="transform" type="translate" from="0,250" to="0,270" dur="1000" begin="1s"/>
  <animateTransform attributeName="transform" type="translate" from="0,250" to="0,270" dur="1000" begin="1.5s"/>
  <animateTransform attributeName="transform" type="translate" from="0,250" to="0,270" dur="1000" begin="2s"/>
  
  <!-- Section 3: Delete Operation -->
  <rect x="0" y="320" width="420" height="100" fill="#f0f0f0" rx="10" />
  <text x="20" y="340" fill="#7A88CE" font-size="18" font-family="Arial">
    <tspan data-narration="Delete Operation">Delete Operation</tspan>
    The delete operation is used to remove a node from the linked list.
  </text>
  <rect x="20" y="380" width="40" height="40" fill="#3498db" rx="5" />
  <text x="90" y="390" fill="#45A0E6" font-size="16" font-family="Arial">
    <tspan data-narration="Types of Deletion">Types of Deletion</tspan>
    There are three types of deletion: <tspan data-narration="Single Node Deletion">Single Node Deletion</tspan>, <tspan data-narration="Node with Two Children">Node with Two Children</tspan>, and <tspan data-narration="Node with No Children">Node with No Children</tspan>.
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,400" to="0,420" dur="1000" begin="0.5s"/>
  <animateTransform attributeName="transform" type="translate" from="0,400" to="0,420" dur="1000" begin="1s"/>
  <animateTransform attributeName="transform" type="translate" from="0,400" to="0,420" dur="1000" begin="1.5s"/>
  <animateTransform attributeName="transform" type="translate" from="0,400" to="0,420" dur="1000" begin="2s"/>
  
  <!-- Footer -->
  <text x="150" y="380" fill="#7A88CE" font-size="18" font-family="Arial">
    <tspan data-narration="References">References</tspan>
  </text>
</svg>