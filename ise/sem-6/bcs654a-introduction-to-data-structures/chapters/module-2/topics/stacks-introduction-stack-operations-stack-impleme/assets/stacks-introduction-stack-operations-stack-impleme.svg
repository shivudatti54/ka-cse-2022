<svg width="420" height="400" data-topic-id="stacks-introduction-stack-operations-stack-implementation">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#E0F0FF" stop-opacity="1" />
    </linearGradient>
  </defs>

  <title>Stacks: Introduction, Stack Operations, Stack Implementation</title>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction to Stacks">
    <rect x="10" y="10" width="400" height="100" fill="url(#pastel-gradient)" rx="10" />
    <text x="20" y="50" font-size="24" font-weight="bold" text-anchor="middle">Stacks: Introduction</text>
    <text x="20" y="80" font-size="18" text-anchor="middle">A stack is a linear data structure that follows the Last In, First Out (LIFO) principle.</text>
  </section>

  <!-- Section 2: Stack Operations -->
  <section data-narration="Stack Operations">
    <rect x="10" y="120" width="400" height="100" fill="url(#pastel-gradient)" rx="10" />
    <text x="20" y="150" font-size="24" font-weight="bold" text-anchor="middle">Stack Operations</text>
    <text x="20" y="180" font-size="18" text-anchor="middle">A stack supports two primary operations: push and pop.</text>
    <animate transform="rotate(360 50 50)" begin="1s" dur="2s" repeat="indefinite" />
  </section>

  <!-- Section 3: Push Operation -->
  <section data-narration="Push Operation">
    <rect x="10" y="250" width="400" height="100" fill="url(#pastel-gradient)" rx="10" />
    <text x="20" y="280" font-size="24" font-weight="bold" text-anchor="middle">Push Operation</text>
    <text x="20" y="310" font-size="18" text-anchor="middle">The push operation adds an element to the top of the stack.</text>
    <animate transform="translateX(50)" begin="3s" dur="2s" repeat="indefinite" />
  </section>

  <!-- Section 4: Pop Operation -->
  <section data-narration="Pop Operation">
    <rect x="10" y="350" width="400" height="100" fill="url(#pastel-gradient)" rx="10" />
    <text x="20" y="380" font-size="24" font-weight="bold" text-anchor="middle">Pop Operation</text>
    <text x="20" y="410" font-size="18" text-anchor="middle">The pop operation removes an element from the top of the stack.</text>
    <animate transform="translateX(-50)" begin="5s" dur="2s" repeat="indefinite" />
  </section>

  <!-- Section 5: Stack Implementation using Arrays -->
  <section data-narration="Stack Implementation using Arrays">
    <rect x="10" y="450" width="400" height="100" fill="url(#pastel-gradient)" rx="10" />
    <text x="20" y="480" font-size="24" font-weight="bold" text-anchor="middle">Stack Implementation using Arrays</text>
    <text x="20" y="510" font-size="18" text-anchor="middle">An array can be used to implement a stack.</text>
    <animate transform="translateX(50)" begin="7s" dur="2s" repeat="indefinite" />
  </section>

  <!-- Footer -->
  <footer>
    <text x="10" y="490" font-size="24" font-weight="bold" text-anchor="middle">Stacks: Introduction, Stack Operations, Stack Implementation</text>
  </footer>
</svg>