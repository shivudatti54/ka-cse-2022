<svg width="420" height="400" data-topic-id="queues-introduction-queue-operations-queue-implementation">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" />
  
  <!-- Title -->
  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start">Queues: Introduction, Queue Operations, Queue Implementation</text>
  </g>
  
  <!-- Section 1: Characteristics of a Queue -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="50" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Characteristics of a Queue</text>
    <text x="10" y="55" font-size="14" font-family="Arial" text-anchor="start" data-narration="Elements are added to the end of the queue.">Elements are added to the end of the queue.</text>
    <text x="10" y="85" font-size="14" font-family="Arial" text-anchor="start" data-narration="Elements are removed from the front of the queue.">Elements are removed from the front of the queue.</text>
    <text x="10" y="115" font-size="14" font-family="Arial" text-anchor="start" data-narration="No element can be inserted or removed from anywhere except the front and rear.">No element can be inserted or removed from anywhere except the front and rear.</text>
    <text x="10" y="145" font-size="14" font-family="Arial" text-anchor="start" data-narration="The order of removal is the same as the order of insertion.">The order of removal is the same as the order of insertion.</text>
  </g>
  
  <!-- Section 2: Operations on a Queue -->
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Operations on a Queue</text>
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="40" height="40" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Enqueue</text>
      <text x="10" y="55" font-size="14" font-family="Arial" text-anchor="start" data-narration="Adding an element to the end of the queue.">Adding an element to the end of the queue.</text>
    </g>
    <g transform="translate(60, 50)">
      <rect x="0" y="0" width="40" height="40" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Dequeue</text>
      <text x="10" y="55" font-size="14" font-family="Arial" text-anchor="start" data-narration="Removing an element from the front of the queue.">Removing an element from the front of the queue.</text>
    </g>
    <g transform="translate(120, 50)">
      <rect x="0" y="0" width="40" height="40" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Peek</text>
      <text x="10" y="55" font-size="14" font-family="Arial" text-anchor="start" data-narration="Looking at the front element of the queue without removing it.">Looking at the front element of the queue without removing it.</text>
    </g>
    <g transform="translate(180, 50)">
      <rect x="0" y="0" width="40" height="40" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Is Empty</text>
      <text x="10" y="55" font-size="14" font-family="Arial" text-anchor="start" data-narration="Checking if the queue is empty.">Checking if the queue is empty.</text>
    </g>
  </g>
  
  <!-- Section 3: Enqueue Operation -->
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Enqueue Operation</text>
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="40" height="40" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Adding 5 elements to the queue</text>
      <animate attributeName="opacity" from="1" to="0" dur="2000" begin="0s" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="40 100" dur="2000" begin="0s" />
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2000" begin="0s" />
      <text x="10" y="85" font-size="14" font-family="Arial" text-anchor="start" data-narration="Enqueue(1), Enqueue(2), Enqueue(3), Enqueue(4), Enqueue(5)</text>
    </g>
  </g>
  
  <!-- Section 4: Dequeue Operation -->
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Dequeue Operation</text>
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="40" height="40" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Removing an element from the queue</text>
      <animate attributeName="opacity" from="1" to="0" dur="2000" begin="0s" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-40 100" dur="2000" begin="0s" />
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2000" begin="0s" />
      <text x="10" y="85" font-size="14" font-family="Arial" text-anchor="start" data-narration="Dequeue(1)</text>
    </g>
  </g>
  
  <!-- Section 5: Peek Operation -->
  <g transform="translate(10, 450)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Peek Operation</text>
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="40" height="40" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Looking at the front element of the queue</text>
      <animate attributeName="opacity" from="1" to="0" dur="2000" begin="0s" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-40 100" dur="2000" begin="0s" />
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2000" begin="0s" />
      <text x="10" y="85" font-size="14" font-family="Arial" text-anchor="start" data-narration="Peek</text>
    </g>
  </g>
  
  <!-- Section 6: Is Empty Operation -->
  <g transform="translate(10, 550)">
    <rect x="0" y="0" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Is Empty Operation</text>
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="40" height="40" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="16" font-family="Arial" text-anchor="start">Checking if the queue is empty</text>
      <animate attributeName="opacity" from="1" to="0" dur="2000" begin="0s" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-40 100" dur="2000" begin="0s" />
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2000" begin="0s" />
      <text x="10" y="85" font-size="14" font-family="Arial" text-anchor="start" data-narration="Is Empty</text>
    </g>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 650)">
    <rect x="0" y="0" width="400" height="50" fill="#FFFFFF" rx="10" />
    <text x="10" y="25" font-size="16" font-family="Arial" font-weight="bold" text-anchor="start">Queues: Introduction, Queue Operations, Queue Implementation</text>
  </g>
</svg>