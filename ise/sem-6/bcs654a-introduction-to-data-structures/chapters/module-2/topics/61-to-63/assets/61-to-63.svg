<svg width="420" height="400" data-topic-id="6-1-to-6-3" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><gradient id="g1" stops="0%,#C7B8EA;100%,#C7B8EA" />
<rect x="0" y="0" width="420" height="400" fill="url(#g1)"/>
<defs><linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#F5F5F5"/><stop offset="100%" stop-color="#F5F5F5"/></linearGradient></defs>
<text x="15" y="30" font-size="24" font-family="Arial" text-anchor="start">Introduction to Data Structures</text>
<text x="15" y="60" font-size="18" font-family="Arial" text-anchor="start">6.1 to 6.3</text>
<rect x="15" y="90" width="390" height="250" fill="#F5F5F5"/><rect x="15" y="370" width="390" height="25" fill="#F5F5F5"/>
<g transform="translate(15,100)">
<rect x="0" y="0" width="100" height="50" fill="#F7DC6F"/><rect x="110" y="0" width="100" height="50" fill="#F7DC6F"/><rect x="220" y="0" width="100" height="50" fill="#F7DC6F"/>
<animateTransform attributeName="transform" type="translate" x="100" y="50" dur="2s" begin="-1s"/><animateTransform attributeName="transform" type="translate" x="220" y="50" dur="2s" begin="0s"/>
<animateTransform attributeName="transform" type="translate" x="320" y="50" dur="2s" begin="1s"/>
</g>
<text x="15" y="110" font-size="18" font-family="Arial" text-anchor="start" data-narration="Arrays are a fundamental data structure in programming languages. They allow us to store multiple values of the same type in a single variable." />
<text x="15" y="140" font-size="18" font-family="Arial" text-anchor="start" data-narration="Elements in an array are accessed using an index, which is a numerical value that represents the position of the element in the array." />
<text x="15" y="170" font-size="18" font-family="Arial" text-anchor="start" data-narration="The number of elements in an array is known as its size. Arrays can be initialized with a set of values before they are used." />
<rect x="15" y="210" width="390" height="120" fill="#F5F5F5"/><rect x="15" y="330" width="390" height="70" fill="#F5F5F5"/>
<g transform="translate(15,220)">
<rect x="0" y="0" width="100" height="50" fill="#03A9F4"/><rect x="110" y="0" width="100" height="50" fill="#03A9F4"/><rect x="220" y="0" width="100" height="50" fill="#03A9F4"/>
<animateTransform attributeName="transform" type="translate" x="100" y="50" dur="2s" begin="-1s"/><animateTransform attributeName="transform" type="translate" x="220" y="50" dur="2s" begin="0s"/>
<animateTransform attributeName="transform" type="translate" x="320" y="50" dur="2s" begin="1s"/>
</g>
<text x="15" y="250" font-size="18" font-family="Arial" text-anchor="start" data-narration="A linked list is a dynamic collection of elements, where each element points to the next element in the list." />
<text x="15" y="280" font-size="18" font-family="Arial" text-anchor="start" data-narration="Each element in a linked list is called a node, which contains a value and a reference to the next node in the list." />
<text x="15" y="310" font-size="18" font-family="Arial" text-anchor="start" data-narration="To insert a new node in a linked list, we need to update the references of the adjacent nodes." />
<rect x="15" y="350" width="390" height="50" fill="#F5F5F5"/>
<g transform="translate(15,370)">
<rect x="0" y="0" width="100" height="50" fill="#FFC107"/><rect x="110" y="0" width="100" height="50" fill="#FFC107"/><rect x="220" y="0" width="100" height="50" fill="#FFC107"/>
<animateTransform attributeName="transform" type="translate" x="100" y="50" dur="2s" begin="-1s"/><animateTransform attributeName="transform" type="translate" x="220" y="50" dur="2s" begin="0s"/>
<animateTransform attributeName="transform" type="translate" x="320" y="50" dur="2s" begin="1s"/>
</g>
<text x="15" y="390" font-size="18" font-family="Arial" text-anchor="start">Conclusion</text></svg>