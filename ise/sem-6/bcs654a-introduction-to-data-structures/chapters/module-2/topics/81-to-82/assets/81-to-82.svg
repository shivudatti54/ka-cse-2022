  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>81 To 82: Introduction to Data Structures</title>
  <g>
    <g data-narration="What are Data Structures?" transform="translate(10, 10)">
      <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">What are Data Structures?</text>
    </g>
    <g data-narration="Data Structures are ways to organize and store data in a computer" transform="translate(10, 50)">
      <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Data Structures are ways to organize and store data in a computer</text>
    </g>
    <g data-narration="They provide a way to manage data by grouping it into collections of elements" transform="translate(10, 90)">
      <text x="10" y="110" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">They provide a way to manage data by grouping it into collections of elements</text>
    </g>
    <g data-narration="Types of Data Structures: Arrays, Linked Lists, Stacks, Queues, Trees, Graphs" transform="translate(10, 130)">
      <text x="10" y="150" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Types of Data Structures: Arrays, Linked Lists, Stacks, Queues, Trees, Graphs</text>
    </g>
    <g data-narration="Arrays: a collection of elements of the same data type stored in contiguous memory locations" transform="translate(10, 170)">
      <text x="10" y="190" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Arrays: a collection of elements of the same data type stored in contiguous memory locations</text>
    </g>
    <g data-narration="Linked Lists: a dynamic collection of elements, each of which points to the next element" transform="translate(10, 210)">
      <text x="10" y="230" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Linked Lists: a dynamic collection of elements, each of which points to the next element</text>
    </g>
    <g data-narration="Stacks: a Last-In-First-Out (LIFO) data structure" transform="translate(10, 250)">
      <text x="10" y="270" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Stacks: a Last-In-First-Out (LIFO) data structure</text>
    </g>
    <g data-narration="Queues: a First-In-First-Out (FIFO) data structure" transform="translate(10, 290)">
      <text x="10" y="310" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Queues: a First-In-First-Out (FIFO) data structure</text>
    </g>
    <g data-narration="Trees: a hierarchical data structure" transform="translate(10, 330)">
      <text x="10" y="350" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Trees: a hierarchical data structure</text>
    </g>
    <g data-narration="Graphs: a non-linear data structure" transform="translate(10, 370)">
      <text x="10" y="390" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Graphs: a non-linear data structure</text>
    </g>
    <g data-narration="Importance of Data Structures" transform="translate(10, 410)">
      <text x="10" y="430" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Importance of Data Structures</text>
    </g>
    <g data-narration="Data Structures are used in a wide range of applications" transform="translate(10, 460)">
      <text x="10" y="480" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Data Structures are used in a wide range of applications</text>
    </g>
    <g data-narration="Example of Data Structures in Real Life" transform="translate(10, 510)">
      <text x="10" y="530" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Example of Data Structures in Real Life</text>
    </g>
    <g data-narration="Phonebook: a data structure that organizes a collection of names, phone numbers, and addresses" transform="translate(10, 550)">
      <text x="10" y="570" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Phonebook: a data structure that organizes a collection of names, phone numbers, and addresses</text>
    </g>
    <g data-narration="Image Editing Software: uses data structures such as matrices and arrays to manipulate and store images" transform="translate(10, 590)">
      <text x="10" y="610" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Image Editing Software: uses data structures such as matrices and arrays to manipulate and store images</text>
    </g>
