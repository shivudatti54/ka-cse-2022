<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="multidimensional-arrays">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title and declaration -->
  <g opacity="0" data-narration="A multidimensional array is an array of arrays. In C, a 2D array is declared as int matrix with rows and columns in square brackets.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#3949AB">Multidimensional Arrays</text>
    <rect x="60" y="38" width="300" height="24" fill="#3949AB" rx="4" opacity="0.12"/>
    <text x="210" y="55" text-anchor="middle" font-family="monospace" font-size="12" fill="#3949AB">int matrix[3][4]; // 3 rows, 4 cols</text>
  </g>

  <!-- Group 2: 2D Array grid visualization with row/col labels -->
  <g opacity="0" data-narration="A 2D array can be visualized as a table. Here is a 3-by-4 grid. Row indices go from 0 to 2, and column indices go from 0 to 3. Each cell is accessed by its row and column index.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="40" y="82" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">2D Array Grid</text>
    <!-- Column headers -->
    <text x="130" y="82" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Col 0</text>
    <text x="195" y="82" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Col 1</text>
    <text x="260" y="82" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Col 2</text>
    <text x="325" y="82" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Col 3</text>
    <!-- Row 0 -->
    <text x="75" y="104" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Row 0</text>
    <rect x="100" y="88" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="130" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[0][0]</text>
    <rect x="165" y="88" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="195" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[0][1]</text>
    <rect x="230" y="88" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="260" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[0][2]</text>
    <rect x="295" y="88" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="325" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[0][3]</text>
    <!-- Row 1 -->
    <text x="75" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Row 1</text>
    <rect x="100" y="114" width="60" height="24" fill="#5C6BC0" rx="3"/>
    <text x="130" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[1][0]</text>
    <rect x="165" y="114" width="60" height="24" fill="#5C6BC0" rx="3"/>
    <text x="195" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[1][1]</text>
    <rect x="230" y="114" width="60" height="24" fill="#5C6BC0" rx="3"/>
    <text x="260" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[1][2]</text>
    <rect x="295" y="114" width="60" height="24" fill="#5C6BC0" rx="3"/>
    <text x="325" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[1][3]</text>
    <!-- Row 2 -->
    <text x="75" y="156" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Row 2</text>
    <rect x="100" y="140" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="130" y="156" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[2][0]</text>
    <rect x="165" y="140" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="195" y="156" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[2][1]</text>
    <rect x="230" y="140" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="260" y="156" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[2][2]</text>
    <rect x="295" y="140" width="60" height="24" fill="#3949AB" rx="3"/>
    <text x="325" y="156" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[2][3]</text>
  </g>

  <!-- Group 3: Row-major memory layout -->
  <g opacity="0" data-narration="In C, multidimensional arrays are stored in row-major order. Elements are placed row by row in contiguous memory. Row 0 comes first, followed by Row 1, in a single linear block of memory.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <text x="40" y="186" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Row-Major Memory Layout</text>
    <text x="40" y="198" font-family="Arial" font-size="9" fill="#666">(for int arr[2][3])</text>
    <!-- Memory cells -->
    <rect x="40" y="204" width="55" height="26" fill="#E65100" rx="3"/>
    <text x="67" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="white">[0][0]</text>
    <rect x="100" y="204" width="55" height="26" fill="#E65100" rx="3"/>
    <text x="127" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="white">[0][1]</text>
    <rect x="160" y="204" width="55" height="26" fill="#E65100" rx="3"/>
    <text x="187" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="white">[0][2]</text>
    <rect x="220" y="204" width="55" height="26" fill="#00695C" rx="3"/>
    <text x="247" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="white">[1][0]</text>
    <rect x="280" y="204" width="55" height="26" fill="#00695C" rx="3"/>
    <text x="307" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="white">[1][1]</text>
    <rect x="340" y="204" width="55" height="26" fill="#00695C" rx="3"/>
    <text x="367" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="white">[1][2]</text>
    <!-- Address labels -->
    <text x="67" y="243" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">1000</text>
    <text x="127" y="243" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">1004</text>
    <text x="187" y="243" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">1008</text>
    <text x="247" y="243" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">1012</text>
    <text x="307" y="243" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">1016</text>
    <text x="367" y="243" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">1020</text>
    <!-- Arrow connecting grid to memory -->
    <line x1="210" y1="168" x2="210" y2="200" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)" stroke-dasharray="4,2"/>
    <!-- Row labels under memory -->
    <rect x="68" y="248" width="90" height="14" fill="#E65100" rx="2" opacity="0.15"/>
    <text x="113" y="259" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">Row 0</text>
    <rect x="248" y="248" width="90" height="14" fill="#00695C" rx="2" opacity="0.15"/>
    <text x="293" y="259" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">Row 1</text>
  </g>

  <!-- Group 4: Pointer equivalence -->
  <g opacity="0" data-narration="Element access using indices is equivalent to pointer arithmetic. arr at index i j is the same as dereferencing the pointer expression star of star of arr plus i plus j.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="20" y="270" width="185" height="42" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5" opacity="0.9"/>
    <text x="112" y="285" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Pointer Equivalence</text>
    <text x="112" y="302" text-anchor="middle" font-family="monospace" font-size="10" fill="#C62828">arr[i][j] == *(*(arr+i)+j)</text>
  </g>

  <!-- Group 5: Initialization example -->
  <g opacity="0" data-narration="A 2D array can be initialized at declaration. Here, matrix is declared with 2 rows and 3 columns, initialized with values 1 through 6 grouped by rows.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="215" y="270" width="190" height="42" fill="white" rx="6" stroke="#00695C" stroke-width="1.5" opacity="0.9"/>
    <text x="310" y="285" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Initialization</text>
    <text x="310" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">{{1,2,3},{4,5,6}}</text>
  </g>

  <!-- Group 6: 3D array concept and applications -->
  <g opacity="0" data-narration="Three-dimensional arrays add a depth dimension, like stacked layers of 2D tables. They are used for volumetric data and R G B images. Higher dimensions follow the same pattern but grow memory exponentially.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="20" y="320" width="380" height="70" fill="white" rx="8" stroke="#C62828" stroke-width="1.5" opacity="0.92"/>
    <text x="210" y="338" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">3D Arrays &amp; Beyond</text>
    <!-- Stacked layers visual -->
    <rect x="40" y="346" width="50" height="30" fill="#3949AB" rx="3" opacity="0.3"/>
    <rect x="48" y="342" width="50" height="30" fill="#3949AB" rx="3" opacity="0.5"/>
    <rect x="56" y="338" width="50" height="30" fill="#3949AB" rx="3" opacity="0.8"/>
    <text x="81" y="357" text-anchor="middle" font-family="monospace" font-size="8" fill="white">int[2][3][4]</text>
    <!-- Application labels -->
    <rect x="125" y="345" width="80" height="18" fill="#00695C" rx="9"/>
    <text x="165" y="358" text-anchor="middle" font-family="Arial" font-size="9" fill="white">RGB Images</text>
    <rect x="215" y="345" width="80" height="18" fill="#E65100" rx="9"/>
    <text x="255" y="358" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Game Boards</text>
    <rect x="305" y="345" width="80" height="18" fill="#C62828" rx="9"/>
    <text x="345" y="358" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Scientific</text>
    <!-- Memory note -->
    <text x="210" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Space: O(n^k) for k dimensions | Access: O(1) for any element</text>
  </g>
</svg>