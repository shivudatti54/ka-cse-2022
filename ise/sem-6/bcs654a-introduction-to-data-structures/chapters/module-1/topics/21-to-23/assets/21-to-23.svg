<svg width="420" height="400" data-topic-id="introduction-to-data-structures-arrays-21-to-23">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A8CFA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E0FFFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body>
    <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
    <title>Introduction to Data Structures: Arrays</title>
    <section data-narration="section1">
      <rect x="0" y="20" width="420" height="40" fill="#fff" rx="10"/>
      <text x="10" y="25" font-size="24" font-family="Arial" fill="#000">What is an Array?</text>
      <text x="10" y="40" font-size="18" font-family="Arial" fill="#000">An array is a collection of elements of the same data type.</text>
    </section>
    <section data-narration="section2">
      <rect x="0" y="80" width="420" height="40" fill="#fff" rx="10"/>
      <text x="10" y="85" font-size="24" font-family="Arial" fill="#000">Types of Arrays</text>
      <text x="10" y="100" font-size="18" font-family="Arial" fill="#000">One-Dimensional Arrays</text>
    </section>
    <section data-narration="section3">
      <rect x="0" y="140" width="420" height="40" fill="#fff" rx="10"/>
      <text x="10" y="145" font-size="24" font-family="Arial" fill="#000">Declaration of a One-Dimensional Array</text>
      <text x="10" y="160" font-size="18" font-family="Arial" fill="#000">int arr[5];</text>
    </section>
    <section data-narration="section4">
      <rect x="0" y="200" width="420" height="40" fill="#fff" rx="10"/>
      <text x="10" y="205" font-size="24" font-family="Arial" fill="#000">Example of a One-Dimensional Array</text>
      <text x="10" y="220" font-size="18" font-family="Arial" fill="#000">int arr[5] = {1, 2, 3, 4, 5};</text>
    </section>
    <section data-narration="section5">
      <rect x="0" y="260" width="420" height="40" fill="#fff" rx="10"/>
      <text x="10" y="265" font-size="24" font-family="Arial" fill="#000">Output of the Program</text>
      <text x="10" y="280" font-size="18" font-family="Arial" fill="#000">Array elements: 1 2 3 4 5</text>
    </section>
    <footer>
      <text x="10" y="380" font-size="24" font-family="Arial" fill="#000">Footer Text</text>
    </footer>
  </body>
  <animate xmlns="http://www.w3.org/2000/svg"
           attributes="x y"
           begin="0s" dur="2s" repeatCount="indefinite"/>
</svg>