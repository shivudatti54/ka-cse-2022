<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="12-1-array-introduction">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#ACC2E9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10" />
  
  <!-- Title -->
  <text x="10" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
    <tspan font-size="36">Arrays</tspan>
    <tspan>Topic 12.1</tspan>
  </text>
  
  <!-- Section 1: Definition and Purpose -->
  <rect x="10" y="60" width="400" height="100" fill="#C7B8EA" rx="10" />
  <animate transform="translateY(0) rotate(0)" begin="0s" dur="1s" repeatCount="indefinite" />
  <text x="10" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <textPath id="section1-text" xml:space="preserve">
      <tspan font-size="18">Definition and Purpose</tspan>
      <tspan font-size="18">An array is a collection of elements of the same data type stored in contiguous memory locations.</tspan>
      <tspan font-size="18">Arrays are used to store collections of data that need to be accessed by their index or position.</tspan>
    </textPath>
    <animateTransform attributeName="transform" type="translateY" from="-50" to="0" begin="0s" dur="1s" repeatCount="indefinite" />
  </text>
  
  <!-- Section 2: Key Characteristics -->
  <rect x="10" y="180" width="400" height="100" fill="#ACC2E9" rx="10" />
  <animate transform="translateY(0) rotate(0)" begin="1s" dur="1s" repeatCount="indefinite" />
  <text x="10" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <textPath id="section2-text" xml:space="preserve">
      <tspan font-size="18">Key Characteristics</tspan>
      <tspan font-size="18">Elements of the same data type are stored in adjacent memory locations.</tspan>
      <tspan font-size="18">Array elements can be accessed using their index or position.</tspan>
      <tspan font-size="18">Arrays can be of any data type, including integers, floats, characters, and strings.</tspan>
    </textPath>
    <animateTransform attributeName="transform" type="translateY" from="-50" to="0" begin="1.5s" dur="1s" repeatCount="indefinite" />
  </text>
  
  <!-- Section 3: Example -->
  <rect x="10" y="280" width="400" height="100" fill="#C7B8EA" rx="10" />
  <animate transform="translateY(0) rotate(0)" begin="2s" dur="1s" repeatCount="indefinite" />
  <text x="10" y="290" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <textPath id="section3-text" xml:space="preserve">
      <tspan font-size="18">Example</tspan>
      <tspan font-size="18">int num[5] = {1, 2, 3, 4, 5};</tspan>
    </textPath>
    <animateTransform attributeName="transform" type="translateY" from="-50" to="0" begin="2.5s" dur="1s" repeatCount="indefinite" />
  </text>
  
  <!-- Section 4: Benefits of Arrays -->
  <rect x="10" y="370" width="400" height="100" fill="#ACC2E9" rx="10" />
  <animate transform="translateY(0) rotate(0)" begin="3s" dur="1s" repeatCount="indefinite" />
  <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <textPath id="section4-text" xml:space="preserve">
      <tspan font-size="18">Benefits of Arrays</tspan>
      <tspan font-size="18">Arrays can store large amounts of data in a single variable.</tspan>
      <tspan font-size="18">Arrays provide efficient access to specific elements using their index.</tspan>
      <tspan font-size="18">Arrays can be used to represent relationships between data.</tspan>
    </textPath>
    <animateTransform attributeName="transform" type="translateY" from="-50" to="0" begin="3.5s" dur="1s" repeatCount="indefinite" />
  </text>
  
  <!-- Section 5: One-Dimensional Arrays -->
  <rect x="10" y="460" width="400" height="100" fill="#C7B8EA" rx="10" />
  <animate transform="translateY(0) rotate(0)" begin="4s" dur="1s" repeatCount="indefinite" />
  <text x="10" y="470" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <textPath id="section5-text" xml:space="preserve">
      <tspan font-size="18">One-Dimensional Arrays</tspan>
      <tspan font-size="18">A one-dimensional array is an array with elements stored in a single row or column.</tspan>
    </textPath>
    <animateTransform attributeName="transform" type="translateY" from="-50" to="0" begin="4.5s" dur="1s" repeatCount="indefinite" />
  </text>
  
  <!-- Section 6: Example of One-Dimensional Array -->
  <rect x="10" y="560" width="400" height="100" fill="#ACC2E9" rx="10" />
  <animate transform="translateY(0) rotate(0)" begin="5.5s" dur="1s" repeatCount="indefinite" />
  <text x="10" y="570" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <textPath id="section6-text" xml:space="preserve">
      <tspan font-size="18">Example of One-Dimensional Array</tspan>
      <tspan font-size="18">float score[5] = {90.5, 85.2, 92.1, 88.6, 76.3};</tspan>
    </textPath>
    <animateTransform attributeName="transform" type="translateY" from="-50" to="0" begin="6s" dur="1s" repeatCount="indefinite" />
  </text>
  
  <!-- Footer -->
  <text x="10" y="390" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    Created by [Your Name]
  </text>
</svg>