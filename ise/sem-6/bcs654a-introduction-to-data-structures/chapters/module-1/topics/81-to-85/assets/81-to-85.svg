<svg width="420" height="400" data-topic-id="81-to-85" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <style>
        .pastel-purple {
            filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#C7B8EA', endColorstr='#C5C3F2');
        }
        .pastel-green {
            filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#8BC34A', endColorstr='#4CAF50');
        }
        .pastel-orange {
            filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#FF9800', endColorstr='#FFA07A');
        }
    </style>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
            <stop offset="100%" stop-color="#C5C3F2" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="pastel-gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8BC34A" stop-opacity="1" />
            <stop offset="100%" stop-color="#4CAF50" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="pastel-gradient3" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF9800" stop-opacity="1" />
            <stop offset="100%" stop-color="#FFA07A" stop-opacity="1" />
        </linearGradient>
    </defs>
    <title>Understanding Arrays</title>
    <rect x="20" y="20" width="380" height="350" style="fill: url(#pastel-gradient)" />
    <rect x="120" y="20" width="80" height="50" style="fill: #1A1D23; opacity: 0.5;" />
    <text x="140" y="60" style="font-size: 16px; font-weight: bold;" text-anchor="middle">What are Arrays?</text>
    <rect x="20" y="80" width="380" height="30" style="fill: url(#pastel-gradient2)" />
    <text x="20" y="110" style="font-size: 14px;" text-anchor="middle">Arrays are a fundamental data structure in computer science, used to store a collection of elements of the same data type in a single variable.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 150 50" to="360 150 50" dur="10s" repeatCount="indefinite" begin="1s" />
    <rect x="20" y="140" width="380" height="30" style="fill: url(#pastel-gradient3)" />
    <rect x="20" y="170" width="380" height="30" style="fill: #1A1D23; opacity: 0.5;" />
    <text x="20" y="200" style="font-size: 14px;" text-anchor="middle">Benefits of Arrays:</text>
    <text x="20" y="230" style="font-size: 14px;" text-anchor="middle">- Efficient Storage: Arrays store elements in contiguous memory locations, reducing memory overhead.</text>
    <rect x="20" y="260" width="380" height="30" style="fill: url(#pastel-gradient2)" />
    <text x="20" y="290" style="font-size: 14px;" text-anchor="middle">- Fast Access: Arrays allow for fast access and manipulation of elements using their index.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 150 50" to="360 150 50" dur="10s" repeatCount="indefinite" begin="2s" />
    <rect x="20" y="310" width="380" height="30" style="fill: url(#pastel-gradient3)" />
    <rect x="20" y="340" width="380" height="30" style="fill: #1A1D23; opacity: 0.5;" />
    <text x="20" y="370" style="font-size: 14px;" text-anchor="middle">- Flexible: Arrays can be used to store a wide range of data types.</text>
    <rect x="20" y="400" width="380" height="30" style="fill: url(#pastel-gradient)" />
    <text x="20" y="430" style="font-size: 14px;" text-anchor="middle">One-Dimensional Arrays</text>
    <rect x="120" y="450" width="80" height="50" style="fill: #1A1D23; opacity: 0.5;" />
    <text x="140" y="480" style="font-size: 14px;" text-anchor="middle">Indexing: Elements in a one-dimensional array are accessed using an index that starts from 0.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 150 50" to="360 150 50" dur="10s" repeatCount="indefinite" begin="3s" />
    <rect x="20" y="510" width="380" height="30" style="fill: url(#pastel-gradient2)" />
    <text x="20" y="540" style="font-size: 14px;" text-anchor="middle">Two-Dimensional Arrays</text>
    <rect x="120" y="570" width="80" height="50" style="fill: #1A1D23; opacity: 0.5;" />
    <text x="140" y="600" style="font-size: 14px;" text-anchor="middle">Definition: A two-dimensional array is an array that stores elements in rows and columns.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 150 50" to="360 150 50" dur="10s" repeatCount="indefinite" begin="4s" />
    <rect x="20" y="630" width="380" height="30" style="fill: url(#pastel-gradient3)" />
    <rect x="20" y="660" width="380" height="30" style="fill: #1A1D23; opacity: 0.5;" />
    <text x="20" y="690" style="font-size: 14px;" text-anchor="middle">Footer</text>
    <text x="20" y="730" style="font-size: 14px;" text-anchor="middle">81 to 85</text>
    <rect x="20" y="760" width="380" height="30" style="fill: url(#pastel-gradient)" />
</svg>