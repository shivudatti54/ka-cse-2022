<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="dimensional-arrays">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Array Declaration -->
  <g opacity="0" data-narration="A one-dimensional array is declared with a data type, name, and size. Here we declare an integer array called arr with 5 elements.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">One-Dimensional Array: Memory Layout</text>
    <rect x="50" y="40" width="320" height="24" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="4"/>
    <text x="210" y="57" text-anchor="middle" font-family="monospace" font-size="12" fill="#3949AB">int arr[5] = {10, 20, 30, 40, 50};</text>
  </g>

  <!-- Group 2: Memory Blocks with Addresses and Values -->
  <g opacity="0" data-narration="The array occupies contiguous memory. Each integer takes 4 bytes. Starting at address 1000, the 5 elements are stored at addresses 1000, 1004, 1008, 1012, and 1016.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Header labels -->
    <text x="82" y="88" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Address</text>
    <text x="210" y="88" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Value</text>
    <text x="338" y="88" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Index</text>

    <!-- Element 0 -->
    <rect x="130" y="95" width="160" height="30" fill="#3949AB" stroke="#283593" stroke-width="1" rx="3"/>
    <text x="82" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#00695C">1000</text>
    <text x="210" y="115" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">10</text>
    <text x="338" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100">arr[0]</text>

    <!-- Element 1 -->
    <rect x="130" y="128" width="160" height="30" fill="#3F51B5" stroke="#283593" stroke-width="1" rx="3"/>
    <text x="82" y="148" text-anchor="middle" font-family="monospace" font-size="11" fill="#00695C">1004</text>
    <text x="210" y="148" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">20</text>
    <text x="338" y="148" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100">arr[1]</text>

    <!-- Element 2 -->
    <rect x="130" y="161" width="160" height="30" fill="#3949AB" stroke="#283593" stroke-width="1" rx="3"/>
    <text x="82" y="181" text-anchor="middle" font-family="monospace" font-size="11" fill="#00695C">1008</text>
    <text x="210" y="181" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">30</text>
    <text x="338" y="181" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100">arr[2]</text>

    <!-- Element 3 -->
    <rect x="130" y="194" width="160" height="30" fill="#3F51B5" stroke="#283593" stroke-width="1" rx="3"/>
    <text x="82" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#00695C">1012</text>
    <text x="210" y="214" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">40</text>
    <text x="338" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100">arr[3]</text>

    <!-- Element 4 -->
    <rect x="130" y="227" width="160" height="30" fill="#3949AB" stroke="#283593" stroke-width="1" rx="3"/>
    <text x="82" y="247" text-anchor="middle" font-family="monospace" font-size="11" fill="#00695C">1016</text>
    <text x="210" y="247" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">50</text>
    <text x="338" y="247" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100">arr[4]</text>

    <!-- Contiguous memory bracket -->
    <line x1="120" y1="97" x2="120" y2="255" stroke="#00695C" stroke-width="2"/>
    <line x1="120" y1="97" x2="126" y2="97" stroke="#00695C" stroke-width="2"/>
    <line x1="120" y1="255" x2="126" y2="255" stroke="#00695C" stroke-width="2"/>
    <text x="112" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C" transform="rotate(-90, 112, 180)">Contiguous</text>
  </g>

  <!-- Group 3: Memory Calculation -->
  <g opacity="0" data-narration="Total memory is calculated as number of elements times size of each element. For 5 integers at 4 bytes each, the total is 20 bytes of contiguous memory.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="30" y="268" width="360" height="26" fill="white" fill-opacity="0.7" stroke="#E65100" stroke-width="1.5" rx="4"/>
    <text x="210" y="285" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100">Total = 5 elements x 4 bytes = 20 bytes</text>
  </g>

  <!-- Group 4: Access Pattern with Pointer Notation -->
  <g opacity="0" data-narration="Array elements can be accessed by index or by pointer arithmetic. arr[2] is equivalent to star open parenthesis arr plus 2 close parenthesis, both returning the value 30.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <text x="210" y="314" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Random Access via Index or Pointer:</text>
    <rect x="40" y="320" width="155" height="22" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="1" rx="3"/>
    <text x="117" y="335" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">arr[2] = 30</text>
    <text x="210" y="335" text-anchor="middle" font-family="Arial" font-size="11" fill="#00695C">=</text>
    <rect x="225" y="320" width="155" height="22" fill="white" fill-opacity="0.7" stroke="#00695C" stroke-width="1" rx="3"/>
    <text x="302" y="335" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">*(arr + 2) = 30</text>
  </g>

  <!-- Group 5: Key Characteristics -->
  <g opacity="0" data-narration="Key characteristics of arrays include homogeneous elements of the same type, fixed size determined at declaration, contiguous memory allocation, and zero-based indexing starting from index 0.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <text x="210" y="360" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Key Characteristics</text>
    <circle cx="62" cy="376" r="4" fill="#3949AB"/>
    <text x="70" y="380" font-family="Arial" font-size="10" fill="#3949AB">Homogeneous</text>
    <circle cx="160" cy="376" r="4" fill="#00695C"/>
    <text x="168" y="380" font-family="Arial" font-size="10" fill="#00695C">Fixed Size</text>
    <circle cx="248" cy="376" r="4" fill="#E65100"/>
    <text x="256" y="380" font-family="Arial" font-size="10" fill="#E65100">Contiguous</text>
    <circle cx="338" cy="376" r="4" fill="#C62828"/>
    <text x="346" y="380" font-family="Arial" font-size="10" fill="#C62828">Index 0-N</text>
  </g>

  <!-- Group 6: Operations Summary -->
  <g opacity="0" data-narration="Common array operations include traversal by visiting each element, insertion by shifting elements right, deletion by shifting elements left, linear search, and bubble sort for ordering.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="30" y="389" width="360" height="6" rx="3" fill="#C62828" fill-opacity="0.3"/>
    <text x="70" y="399" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Traverse</text>
    <text x="150" y="399" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Insert</text>
    <text x="220" y="399" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Delete</text>
    <text x="290" y="399" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Search</text>
    <text x="360" y="399" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828">Sort</text>
  </g>
</svg>