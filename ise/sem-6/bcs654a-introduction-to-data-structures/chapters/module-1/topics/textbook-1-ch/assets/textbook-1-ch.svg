<svg width="420" height="400" data-topic-id="textbook-1-ch">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" style="fill: url(#gradient); opacity: 0.5"/>
  
  <!-- Title Section -->
  <section data-narration="title">
    <g transform="translate(50, 20)">
      <text x="50" y="50" font-size="24" font-family="Arial" font-weight="bold">Introduction to Data Structures</text>
      <line x1="50" y1="70" x2="50" y2="100" stroke="#005AC9" stroke-width="2" />
    </g>
  </section>
  
  <!-- One-Dimensional Arrays Section -->
  <section data-narration="one-dimensions-arrays">
    <g transform="translate(50, 150)">
      <rect x="0" y="0" width="150" height="50" style="fill: #F5F5F5; border: 1px solid #C5C5C5; border-radius: 5px"/>
      <text x="10" y="20" font-size="16" font-family="Arial">One-Dimensional Arrays</text>
      <line x1="10" y1="40" x2="10" y2="70" stroke="#005AC9" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 40" to="150 40" dur="1000" begin="0s" delay="1000s"/>
      <text x="10" y="80" font-size="16" font-family="Arial">Example:</text>
      <text x="10" y="100" font-size="16" font-family="Arial">int arr[5] = {1, 2, 3, 4, 5};</text>
      <line x1="10" y1="120" x2="10" y2="150" stroke="#005AC9" stroke-width="2" />
    </g>
  </section>
  
  <!-- Accessing Elements and Assigning Values Section -->
  <section data-narration="accessing-elements">
    <g transform="translate(50, 250)">
      <rect x="0" y="0" width="150" height="50" style="fill: #F5F5F5; border: 1px solid #C5C5C5; border-radius: 5px"/>
      <text x="10" y="20" font-size="16" font-family="Arial">Accessing Elements:</text>
      <line x1="10" y1="40" x2="10" y2="70" stroke="#005AC9" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 40" to="150 40" dur="1000" begin="0s" delay="1000s"/>
      <text x="10" y="80" font-size="16" font-family="Arial">Example:</text>
      <text x="10" y="100" font-size="16" font-family="Arial">arr[0] = 10;</text>
      <line x1="10" y1="120" x2="10" y2="150" stroke="#005AC9" stroke-width="2" />
    </g>
    <g transform="translate(50, 300)">
      <rect x="0" y="0" width="150" height="50" style="fill: #F5F5F5; border: 1px solid #C5C5C5; border-radius: 5px"/>
      <text x="10" y="20" font-size="16" font-family="Arial">Assigning Values:</text>
      <line x1="10" y1="40" x2="10" y2="70" stroke="#005AC9" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 40" to="150 40" dur="1000" begin="0s" delay="1000s"/>
      <text x="10" y="80" font-size="16" font-family="Arial">Example:</text>
      <text x="10" y="100" font-size="16" font-family="Arial">arr[0] = 10;</text>
      <line x1="10" y1="120" x2="10" y2="150" stroke="#005AC9" stroke-width="2" />
    </g>
  </section>
  
  <!-- Two-Dimensional Arrays Section -->
  <section data-narration="two-dimensions-arrays">
    <g transform="translate(50, 400)">
      <rect x="0" y="0" width="150" height="50" style="fill: #F5F5F5; border: 1px solid #C5C5C5; border-radius: 5px"/>
      <text x="10" y="20" font-size="16" font-family="Arial">Two-Dimensional Arrays</text>
      <line x1="10" y1="40" x2="10" y2="70" stroke="#005AC9" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 40" to="150 40" dur="1000" begin="0s" delay="1000s"/>
      <text x="10" y="80" font-size="16" font-family="Arial">Example:</text>
      <text x="10" y="100" font-size="16" font-family="Arial">int arr[2][3] = {{1, 2, 3}, {4, 5, 6}};</text>
      <line x1="10" y1="120" x2="10" y2="150" stroke="#005AC9" stroke-width="2" />
    </g>
  </section>
</svg>