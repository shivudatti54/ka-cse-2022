<svg
    width="420"
    height="400"
    data-topic-id="pointer-introduction"
    style="background-image: linear-gradient(45deg, #79B3FF 20%, #C7E2FF 80%); background-size: 100% 100%; background-origin: padding-box; background-clip: padding-box; -webkit-background-clip: padding-box; -moz-background-clip: padding-box;"
    xmlns:dc="http://purl.org/dc/elements/1.1/"
    xmlns:cc="http://creativecommons.org/ns#"
    xmlns:dc="http://purl.org/dc/elements/1.1/"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    xmlns:animate="http://www.w3.org/2002/animatronics"
    version="1.1"
    data-narration="
    Introduction to Pointers
    Pointer Concepts
    Accessing Variables through Pointers
    Pointer Applications
    Dynamic Memory Allocation Functions
    "
    color="#3B3F4E"
    font-size="16px"
    font-family="Arial, sans-serif"
    text-anchor="start"
    font-style="normal"
    fill="#FFFFFF"
    stroke="#000000"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    style="user-select: none;"
    display="block"
    z-index="0"
>
    <!-- Section 1: Introduction to Pointers -->
    <g data-narration="Introduction to Pointers">
        <rect x="10" y="10" width="400" height="50" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
        <text x="20" y="30" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">A pointer is a variable that holds the memory address of another variable.</text>
        <animate begin="0s" dur="1s" attributeName="opacity" from="1" to="0" repeat="indefinite" />
    </g>

    <!-- Section 2: Key Concepts -->
    <g data-narration="Key Concepts">
        <rect x="10" y="70" width="400" height="50" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
        <text x="20" y="90" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Pointer Declaration: A pointer is declared using the asterisk symbol (\*).</text>
        <text x="20" y="120" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Dereferencing: The value stored at the memory address pointed to by a pointer is called dereferencing.</text>
        <text x="20" y="150" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Null Pointer: A null pointer is a pointer that does not point to any valid memory location.</text>
        <animate begin="0s" dur="2s" attributeName="opacity" from="1" to="0" repeat="indefinite" />
    </g>

    <!-- Section 3: Pointer Types -->
    <g data-narration="Pointer Types">
        <rect x="10" y="230" width="400" height="50" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
        <text x="20" y="250" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Int Pointer: Declared using int\*, holds the memory address of an int variable.</text>
        <text x="20" y="280" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Char Pointer: Declared using char\*, holds the memory address of a char variable.</text>
        <text x="20" y="310" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Void Pointer: Declared using void\*, holds the memory address of any type of variable.</text>
        <animate begin="0s" dur="2s" attributeName="opacity" from="1" to="0" repeat="indefinite" />
    </g>

    <!-- Section 4: Pointer Operations -->
    <g data-narration="Pointer Operations">
        <rect x="10" y="370" width="400" height="50" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
        <text x="20" y="390" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Address of: The address of a variable can be obtained using the unary unary operator &.</text>
        <text x="20" y="420" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Pointer Arithmetic: Pointers can be incremented or decremented to traverse the memory locations.</text>
        <animate begin="0s" dur="2s" attributeName="opacity" from="1" to="0" repeat="indefinite" />
    </g>

    <!-- Section 5: Accessing Variables through Pointers -->
    <g data-narration="Accessing Variables through Pointers">
        <rect x="10" y="10" width="400" height="150" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
        <text x="20" y="30" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Pointer Declaration:</text>
        <text x="20" y="60" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">int x = 10; int* ptr = &x;</text>
        <text x="20" y="90" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Dereferencing:</text>
        <text x="20" y="120" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">printf("%d", *ptr); // prints 10</text>
        <text x="20" y="150" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Pointer Addition:</text>
        <text x="20" y="180" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">int x = 10; int* ptr1 = &x; int* ptr2 = ptr1 + 1;</text>
        <text x="20" y="210" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">printf("%d", *ptr2); // prints 11</text>
        <animate begin="0s" dur="3s" attributeName="opacity" from="1" to="0" repeat="indefinite" />
    </g>

    <!-- Section 6: Pointer Applications -->
    <g data-narration="Pointer Applications">
        <rect x="10" y="270" width="400" height="50" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
        <text x="20" y="290" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Dynamic Memory Allocation:</text>
        <text x="20" y="320" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">int* ptr = malloc(sizeof(int)); *ptr = 10;</text>
        <text x="20" y="350" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Passing Pointers as Arguments:</text>
        <text x="20" y="380" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">void func(int* ptr) { *ptr = 20; }</text>
        <text x="20" y="410" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">Returning Pointers from Functions:</text>
        <text x="20" y="440" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">int* func() { return malloc(sizeof(int)); }</text>
        <animate begin="0s" dur="3s" attributeName="opacity" from="1" to="0" repeat="indefinite" />
    </g>

    <!-- Section 7: Dynamic Memory Allocation Functions -->
    <g data-narration="Dynamic Memory Allocation Functions">
        <rect x="10" y="510" width="400" height="50" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
        <text x="20" y="530" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">malloc:</text>
        <text x="20" y="560" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">int* ptr = malloc(sizeof(int)); *ptr = 10;</text>
        <text x="20" y="590" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">calloc:</text>
        <text x="20" y="620" text-anchor="start" font-size="24px" font-family="Arial, sans-serif" fill="#000000">int* ptr = calloc(1, sizeof(int)); *ptr = 10;</text>
        <animate begin="0s" dur="3s" attributeName="opacity" from="1" to="0" repeat="indefinite" />
    </g>
</svg>