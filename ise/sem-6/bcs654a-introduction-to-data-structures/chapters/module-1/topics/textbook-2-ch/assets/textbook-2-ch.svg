<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="textbook-2-ch">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ADD8E6"/>
            <stop offset="100%" stop-color="#C7B8EA"/>
        </linearGradient>
    </defs>
    <title>Introduction to Data Structures</title>
    <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
    <section data-narration="definition-of-arrays" style="background-color: #C7B8EA; padding: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>Definition of Arrays</h2>
        </div>
        <div style="text-align: justify;">
            An array is a collection of elements of the same data type stored in contiguous memory locations. The elements are identified by their index or subscript, which starts from 0.
        </div>
        <div style="clear: both;"></div>
    </section>
    <section data-narration="key-concepts" style="background-color: #ADD8E6; padding: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>Key Concepts</h2>
        </div>
        <div style="text-align: justify;">
            - A fixed-size collection of elements
            - Elements are stored in contiguous memory locations
            - Elements are identified by their index or subscript
            - Arrays are used to store multiple values of a single data type
        </div>
        <div style="clear: both;"></div>
    </section>
    <section data-narration="example-of-an-array" style="background-color: #C7B8EA; padding: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>Example of an Array</h2>
        </div>
        <div style="text-align: justify;">
            Consider the following example of an array of integers:
            <rect x="10" y="10" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="25" font-size="16" font-family="Arial" fill="#455A64">int numbers[] = {10, 20, 30, 40, 50};</text>
        </div>
        <div style="clear: both;"></div>
    </section>
    <section data-narration="declaring-arrays" style="background-color: #ADD8E6; padding: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>Declaring Arrays</h2>
        </div>
        <div style="text-align: justify;">
            Arrays are declared in C++ using the following syntax:
            <rect x="10" y="10" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="25" font-size="16" font-family="Arial" fill="#455A64">type name[index];</text>
            <text x="15" y="55" font-size="16" font-family="Arial" fill="#455A64">For example:</text>
            <rect x="10" y="70" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="85" font-size="16" font-family="Arial" fill="#455A64">int numbers[5];</text>
        </div>
        <div style="clear: both;"></div>
    </section>
    <section data-narration="initializing-arrays" style="background-color: #C7B8EA; padding: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>Initializing Arrays</h2>
        </div>
        <div style="text-align: justify;">
            Arrays can be initialized when declared using the following syntax:
            <rect x="10" y="10" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="25" font-size="16" font-family="Arial" fill="#455A64">type name[index] = {value1, value2, ..., valuen};</text>
            <text x="15" y="55" font-size="16" font-family="Arial" fill="#455A64">For example:</text>
            <rect x="10" y="70" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="85" font-size="16" font-family="Arial" fill="#455A64">int numbers[5] = {10, 20, 30, 40, 50};</text>
        </div>
        <div style="clear: both;"></div>
    </section>
    <section data-narration="one-dimensional-arrays" style="background-color: #ADD8E6; padding: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>One-Dimensional Arrays</h2>
        </div>
        <div style="text-align: justify;">
            One-dimensional arrays are arrays that have only one dimension. They are the most commonly used type of array.
            <rect x="10" y="10" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="25" font-size="16" font-family="Arial" fill="#455A64">Example of a one-dimensional array:</text>
            <rect x="10" y="45" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="60" font-size="16" font-family="Arial" fill="#455A64">int numbers[] = {10, 20, 30, 40, 50};</text>
        </div>
        <div style="clear: both;"></div>
    </section>
    <section data-narration="accessing-elements" style="background-color: #C7B8EA; padding: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>Accessing Elements</h2>
        </div>
        <div style="text-align: justify;">
            Elements of a one-dimensional array are accessed using their index or subscript. The index starts from 0.
            <rect x="10" y="10" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="25" font-size="16" font-family="Arial" fill="#455A64">For example:</text>
            <rect x="10" y="60" width="400" height="50" fill="#ADD8E6" rx="10"/>
            <text x="15" y="75" font-size="16" font-family="Arial" fill="#455A64">int number = numbers[0];</text>
        </div>
        <div style="clear: both;"></div>
    </section>
    <footer>
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>Textbook 2 Ch</h2>
        </div>
    </footer>
</svg>