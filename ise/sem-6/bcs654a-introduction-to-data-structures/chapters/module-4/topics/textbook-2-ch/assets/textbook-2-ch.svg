<svg width="420" height="400" data-topic-id="textbook-2-ch">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ccffcc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66ccff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#grad)"/>
  
  <!-- Title Section -->
  <g transform="translate(50, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" fill="#2f4f7f" data-narration="Introduction to Trees">
      Introduction to Trees
    </text>
  </g>
  
  <!-- Definition and Importance Section -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="100%" height="100%" fill="#f0f0f0" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Definition and Importance of Trees">
      Definition and Importance of Trees
    </text>
    <rect x="0" y="40" width="100%" height="60%" fill="#f0f0f0" rx="10" />
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Explanation of the importance of trees in computer science">
      Explanation of the importance of trees in computer science
    </text>
  </g>
  
  <!-- Types of Trees Section -->
  <g transform="translate(50, 140)">
    <rect x="0" y="0" width="100%" height="100%" fill="#f0f0f0" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Types of Trees">
      Types of Trees
    </text>
    <rect x="0" y="40" width="100%" height="60%" fill="#f0f0f0" rx="10" />
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Binary Trees, N-ary Trees">
      Binary Trees, N-ary Trees
    </text>
  </g>
  
  <!-- Properties of Trees Section -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="100%" height="100%" fill="#f0f0f0" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Properties of Trees">
      Properties of Trees
    </text>
    <rect x="0" y="40" width="100%" height="60%" fill="#f0f0f0" rx="10" />
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Root Node, Child Nodes, Parent Node, Leaf Nodes">
      Root Node, Child Nodes, Parent Node, Leaf Nodes
    </text>
  </g>
  
  <!-- Representation of Binary Trees Section -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="100%" height="100%" fill="#f0f0f0" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Representation of Binary Trees">
      Representation of Binary Trees
    </text>
    <rect x="0" y="40" width="100%" height="60%" fill="#f0f0f0" rx="10" />
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Node Structure, Root Node, Child Nodes">
      Node Structure, Root Node, Child Nodes
    </text>
  </g>
  
  <!-- Operations on Binary Trees Section -->
  <g transform="translate(50, 440)">
    <rect x="0" y="0" width="100%" height="100%" fill="#f0f0f0" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Operations on Binary Trees">
      Operations on Binary Trees
    </text>
    <rect x="0" y="40" width="100%" height="60%" fill="#f0f0f0" rx="10" />
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Insertion, Deletion, Traversal">
      Insertion, Deletion, Traversal
    </text>
  </g>
  
  <!-- Example of a Binary Tree Section -->
  <g transform="translate(50, 540)">
    <rect x="0" y="0" width="100%" height="100%" fill="#f0f0f0" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Example of a Binary Tree">
      Example of a Binary Tree
    </text>
    <rect x="0" y="40" width="100%" height="80%" fill="#f0f0f0" rx="10" />
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Root Node is 4, Child Nodes are 2 and 6">
      Root Node is 4, Child Nodes are 2 and 6
    </text>
    <text x="10" y="80" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Child Node of 2 is 1, Child Node of 6 is 5">
      Child Node of 2 is 1, Child Node of 6 is 5
    </text>
  </g>
  
  <!-- Key Concepts Section -->
  <g transform="translate(50, 640)">
    <rect x="0" y="0" width="100%" height="100%" fill="#f0f0f0" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Key Concepts">
      Key Concepts
    </text>
    <rect x="0" y="40" width="100%" height="60%" fill="#f0f0f0" rx="10" />
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Height, Properties of Binary Trees">
      Height, Properties of Binary Trees
    </text>
  </g>
  
  <!-- Footer Section -->
  <g transform="translate(50, 740)">
    <rect x="0" y="0" width="100%" height="50%" fill="#f0f0f0" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#2f4f7f" data-narration="Footer">
      Footer
    </text>
  </g>
  
  <!-- Arrow Markers -->
  <path d="M 100,30 L 120,40" fill="none" stroke="#666" stroke-width="2" data-narration="Root Node">
    <animate transform="rotate(45 100 30)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 100,40 L 120,50" fill="none" stroke="#666" stroke-width="2" data-narration="Child Node">
    <animate transform="rotate(45 120 40)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 100,50 L 120,40" fill="none" stroke="#666" stroke-width="2" data-narration="Parent Node">
    <animate transform="rotate(45 120 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 100,40 L 100,80" fill="none" stroke="#666" stroke-width="2" data-narration="Leaf Node">
    <animate transform="rotate(45 100 40)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Smooth Animations -->
  <animateTransform attributeName="transform" type="rotate" from="0 100 30" to="360 100 30" dur="10s" repeatCount="indefinite"/>
  
</svg>