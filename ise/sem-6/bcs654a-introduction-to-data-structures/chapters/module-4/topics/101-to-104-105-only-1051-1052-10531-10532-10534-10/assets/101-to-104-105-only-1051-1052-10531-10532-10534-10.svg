<svg width="420" height="400" data-topic-id="101-104-105-only-1051-1052-10531-10532-10534-10">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"/>
            <stop offset="100%" stop-color="#8bc34a" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
    <title>Introduction to Trees</title>
    <g transform="translate(20, 20)">
        <text x="0" y("-30") font-size="24" font-family="Arial, sans-serif" fill="#455a64">Definition and Importance of Trees</text>
        <text x="0" y="-20" font-size="18" font-family="Arial, sans-serif" fill="#8bc34a">A tree is a non-linear data structure consisting of nodes, where each node has a value and zero or more child nodes.</text>
        <g data-narration="Introduction to Trees">
            <circle cx="100" cy="50" r="40" fill="white" opacity="0.5"/>
            <text x="100" y="60" font-size="16" font-family="Arial, sans-serif" fill="#8bc34a">Connectedness: A tree is connected if there is a path between every pair of nodes.</text>
            <line x1="80" y1="60" x2="120" y2="60" stroke="#455a64" stroke-width="2"/>
            <line x1="100" y1="60" x2="100" y2="20" stroke="#8bc34a" stroke-width="2"/>
        </g>
        <g transform="translate(150, 20)">
            <text x="0" y="-30" font-size="24" font-family="Arial, sans-serif" fill="#455a64">Types of Trees</text>
            <text x="0" y="-20" font-size="18" font-family="Arial, sans-serif" fill="#8bc34a">Binary Trees: A tree in which each node has at most two child nodes.</text>
            <g data-narration="Types of Trees">
                <rect x="-50" y="50" width="100" height="20" fill="#8bc34a" rx="10"/>
                <rect x="-50" y="80" width="100" height="20" fill="#455a64" rx="10"/>
                <line x1="-50" y1="60" x2="50" y2="60" stroke="#8bc34a" stroke-width="2"/>
                <line x1="-50" y1="80" x2="50" y2="80" stroke="#455a64" stroke-width="2"/>
                <text x="-50" y="60" font-size="14" font-family="Arial, sans-serif" fill="#8bc34a">Left child and right child.</text>
                <text x="-50" y="80" font-size="14" font-family="Arial, sans-serif" fill="#455a64">Parent node.</text>
            </g>
        </g>
        <g transform="translate(350, 20)">
            <text x="0" y="-30" font-size="24" font-family="Arial, sans-serif" fill="#455a64">Operations on Binary Trees</text>
            <text x="0" y="-20" font-size="18" font-family="Arial, sans-serif" fill="#8bc34a">Traversal of Binary Trees: In-order traversal.</text>
            <g data-narration="Operations on Binary Trees">
                <line x1="90" y1="60" x2="190" y2="60" stroke="#455a64" stroke-width="2"/>
                <line x1="160" y1="60" x2="160" y2="20" stroke="#8bc34a" stroke-width="2"/>
                <text x="90" y="60" font-size="16" font-family="Arial, sans-serif" fill="#8bc34a">Left subtree.</text>
                <text x="160" y="60" font-size="16" font-family="Arial, sans-serif" fill="#8bc34a">Root.</text>
                <text x="160" y="20" font-size="16" font-family="Arial, sans-serif" fill="#8bc34a">Right subtree.</text>
            </g>
        </g>
        <g transform="translate(150, 200)">
            <text x="0" y="-30" font-size="24" font-family="Arial, sans-serif" fill="#455a64">N-ary Trees</text>
            <text x="0" y="-20" font-size="18" font-family="Arial, sans-serif" fill="#8bc34a">A tree in which each node can have any number of child nodes.</text>
            <g data-narration="N-ary Trees">
                <rect x="-50" y="50" width="100" height="20" fill="#8bc34a" rx="10"/>
                <rect x="-50" y="80" width="100" height="20" fill="#455a64" rx="10"/>
                <line x1="-50" y1="60" x2="50" y2="60" stroke="#8bc34a" stroke-width="2"/>
                <line x1="-50" y1="80" x2="50" y2="80" stroke="#455a64" stroke-width="2"/>
                <text x="-50" y="60" font-size="14" font-family="Arial, sans-serif" fill="#8bc34a">Any number of child nodes.</text>
                <text x="-50" y="80" font-size="14" font-family="Arial, sans-serif" fill="#455a64">Parent node.</text>
            </g>
        </g>
        <g transform="translate(350, 200)">
            <text x="0" y="-30" font-size="24" font-family="Arial, sans-serif" fill="#455a64">Height of a binary tree</text>
            <text x="0" y="-20" font-size="18" font-family="Arial, sans-serif" fill="#8bc34a">The maximum distance from the root node to any leaf node.</text>
            <g data-narration="Height of a binary tree">
                <line x1="90" y1="60" x2="190" y2="60" stroke="#455a64" stroke-width="2"/>
                <line x1="160" y1="60" x2="160" y2="20" stroke="#8bc34a" stroke-width="2"/>
                <text x="90" y="60" font-size="16" font-family="Arial, sans-serif" fill="#8bc34a">Root.</text>
                <text x="160" y="60" font-size="16" font-family="Arial, sans-serif" fill="#8bc34a">Height.</text>
                <text x="160" y="20" font-size="16" font-family="Arial, sans-serif" fill="#8bc34a">Leaf node.</text>
            </g>
        </g>
        <g transform="translate(20, 340)">
            <text x="0" y="-30" font-size="24" font-family="Arial, sans-serif" fill="#455a64">Example: A Simple Binary Tree</text>
            <g data-narration="Example: A Simple Binary Tree">
                <rect x="-50" y="50" width="100" height="20" fill="#8bc34a" rx="10"/>
                <rect x="-50" y="80" width="100" height="20" fill="#455a64" rx="10"/>
                <line x1="-50" y1="60" x2="50" y2="60" stroke="#8bc34a" stroke-width="2"/>
                <line x1="-50" y1="80" x2="50" y2="80" stroke="#455a64" stroke-width="2"/>
                <text x="-50" y="60" font-size="14" font-family="Arial, sans-serif" fill="#8bc34a">Left child.</text>
                <text x="-50" y="80" font-size="14" font-family="Arial, sans-serif" fill="#455a64">Right child.</text>
            </g>
        </g>
    </g>
    <g transform="translate(20, 380)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#455a64">Footer</text>
    </g>
</svg>