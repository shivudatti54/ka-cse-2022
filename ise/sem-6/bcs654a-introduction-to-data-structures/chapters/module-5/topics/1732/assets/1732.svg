<svg width="420" height="400" data-topic-id="1732" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <text x="120" y="20" font-size="36" font-family="Arial, sans-serif" fill="#2F4F7F">Insertion Sort</text>
  
  <!-- Section 1: Overview -->
  <section data-narration="Overview">
    <rect x="10" y="60" width="400" height="50" fill="#E0E0E0" rx="10"/>
    <text x="20" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Insertion Sort is a sorting algorithm that works by dividing the input into a sorted and an unsorted region.</text>
  </section>
  
  <!-- Section 2: Step 1 - Divide the Input into Sorted and Unsorted Regions -->
  <section data-narration="Step 1: Divide the Input into Sorted and Unsorted Regions">
    <rect x="10" y="120" width="400" height="50" fill="#E0E0E0" rx="10"/>
    <rect x="20" y="150" width="100" height="30" fill="#ADD8E6" rx="5"/>
    <text x="20" y="170" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Sorted region:</text>
    <text x="140" y="170" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">[]</text>
    <rect x="20" y="200" width="100" height="30" fill="#ADD8E6" rx="5"/>
    <text x="20" y="230" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Unsorted region:</text>
    <text x="140" y="230" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">[5, 2, 8, 3, 1, 4]</text>
  </section>
  
  <!-- Section 3: Step 2 - Iterate through the Unsorted Region and Insert Elements into the Sorted Region -->
  <section data-narration="Step 2: Iterate through the Unsorted Region and Insert Elements into the Sorted Region">
    <rect x="10" y="270" width="400" height="50" fill="#E0E0E0" rx="10"/>
    <rect x="20" y="300" width="100" height="30" fill="#ADD8E6" rx="5"/>
    <text x="20" y="320" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Insert 2 into the sorted region:</text>
    <text x="140" y="320" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">[2]</text>
    <rect x="20" y="350" width="100" height="30" fill="#ADD8E6" rx="5"/>
    <text x="20" y="370" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Insert 5 into the sorted region:</text>
    <text x="140" y="370" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">[2, 5]</text>
    <rect x="20" y="400" width="100" height="30" fill="#ADD8E6" rx="5"/>
    <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">... (insertion continues)</text>
  </section>
  
  <!-- Section 4: Example Walkthrough -->
  <section data-narration="Example Walkthrough">
    <rect x="10" y="510" width="400" height="50" fill="#E0E0E0" rx="10"/>
    <rect x="20" y="540" width="100" height="30" fill="#ADD8E6" rx="5"/>
    <text x="20" y="560" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Sorted array:</text>
    <text x="140" y="560" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">[1, 2, 3, 4, 5]</text>
  </section>
  
  <!-- Section 5: Code Implementation -->
  <section data-narration="Code Implementation">
    <rect x="10" y="610" width="400" height="50" fill="#E0E0E0" rx="10"/>
    <rect x="20" y="640" width="100" height="30" fill="#ADD8E6" rx="5"/>
    <text x="20" y="660" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">def insertion_sort(arr):</text>
    <text x="140" y="660" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">    for i in range(1, len(arr)): ...</text>
  </section>
  
  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="10" y="710" width="400" height="50" fill="#E0E0E0" rx="10"/>
    <text x="20" y="730" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Insertion sort is a simple and efficient sorting algorithm.</text>
  </section>
  
  <!-- Footer at bottom -->
  <text x="120" y="400" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Educational animation by [Your Name]</text>
</svg>