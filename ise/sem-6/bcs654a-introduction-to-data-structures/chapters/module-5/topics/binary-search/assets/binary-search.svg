<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="binary-search">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title + Sorted Array (0.3s) -->
  <g data-narration="Binary search works on a sorted array. Here we have 7 elements: 5, 12, 19, 23, 37, 42, 58. Our target is 37." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">Binary Search Algorithm</text>
    <text x="210" y="48" text-anchor="middle" font-family="Arial" font-size="11" fill="#3949AB">Target = 37</text>
    <!-- Array cells -->
    <rect x="36" y="62" width="48" height="34" fill="#3949AB" rx="4" stroke="#283593" stroke-width="1"/>
    <rect x="86" y="62" width="48" height="34" fill="#3949AB" rx="4" stroke="#283593" stroke-width="1"/>
    <rect x="136" y="62" width="48" height="34" fill="#3949AB" rx="4" stroke="#283593" stroke-width="1"/>
    <rect x="186" y="62" width="48" height="34" fill="#3949AB" rx="4" stroke="#283593" stroke-width="1"/>
    <rect x="236" y="62" width="48" height="34" fill="#3949AB" rx="4" stroke="#283593" stroke-width="1"/>
    <rect x="286" y="62" width="48" height="34" fill="#3949AB" rx="4" stroke="#283593" stroke-width="1"/>
    <rect x="336" y="62" width="48" height="34" fill="#3949AB" rx="4" stroke="#283593" stroke-width="1"/>
    <!-- Array values -->
    <text x="60" y="84" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">5</text>
    <text x="110" y="84" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">12</text>
    <text x="160" y="84" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">19</text>
    <text x="210" y="84" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">23</text>
    <text x="260" y="84" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">37</text>
    <text x="310" y="84" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">42</text>
    <text x="360" y="84" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">58</text>
    <!-- Index labels -->
    <text x="60" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#5C6BC0">[0]</text>
    <text x="110" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#5C6BC0">[1]</text>
    <text x="160" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#5C6BC0">[2]</text>
    <text x="210" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#5C6BC0">[3]</text>
    <text x="260" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#5C6BC0">[4]</text>
    <text x="310" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#5C6BC0">[5]</text>
    <text x="360" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#5C6BC0">[6]</text>
  </g>

  <!-- Group 2: Pass 1 - low=0, high=6, mid=3 (1.5s) -->
  <g data-narration="Pass 1: low=0, high=6, mid=(0+6)/2=3. The middle element arr[3]=23. Since 37 is greater than 23, we discard the left half and search the right half." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>
    <text x="20" y="138" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Pass 1:</text>
    <!-- Low pointer -->
    <line x1="60" y1="120" x2="60" y2="130" stroke="#00695C" stroke-width="2"/>
    <polygon points="55,130 65,130 60,136" fill="#00695C"/>
    <text x="60" y="150" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">low=0</text>
    <!-- High pointer -->
    <line x1="360" y1="120" x2="360" y2="130" stroke="#C62828" stroke-width="2"/>
    <polygon points="355,130 365,130 360,136" fill="#C62828"/>
    <text x="360" y="150" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">high=6</text>
    <!-- Mid pointer -->
    <line x1="210" y1="120" x2="210" y2="130" stroke="#E65100" stroke-width="2"/>
    <polygon points="205,130 215,130 210,136" fill="#E65100"/>
    <text x="210" y="150" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">mid=3</text>
    <!-- Comparison box -->
    <rect x="90" y="155" width="240" height="22" fill="white" rx="4" stroke="#3949AB" stroke-width="1" opacity="0.9"/>
    <text x="210" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">arr[3]=23 &lt; 37  =>  search right half</text>
  </g>

  <!-- Group 3: Pass 2 - low=4, high=6, mid=5 (3.0s) -->
  <g data-narration="Pass 2: low=4, high=6, mid=(4+6)/2=5. The middle element arr[5]=42. Since 37 is less than 42, we discard the right half and search the left half." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>
    <!-- Greyed out left half from pass 1 -->
    <rect x="36" y="62" width="148" height="34" fill="#C5CAE9" rx="4" opacity="0.6"/>
    <text x="20" y="200" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Pass 2:</text>
    <!-- Low pointer -->
    <line x1="260" y1="182" x2="260" y2="192" stroke="#00695C" stroke-width="2"/>
    <polygon points="255,192 265,192 260,198" fill="#00695C"/>
    <text x="260" y="212" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">low=4</text>
    <!-- High pointer -->
    <line x1="360" y1="182" x2="360" y2="192" stroke="#C62828" stroke-width="2"/>
    <polygon points="355,192 365,192 360,198" fill="#C62828"/>
    <text x="360" y="212" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">high=6</text>
    <!-- Mid pointer -->
    <line x1="310" y1="182" x2="310" y2="192" stroke="#E65100" stroke-width="2"/>
    <polygon points="305,192 315,192 310,198" fill="#E65100"/>
    <text x="310" y="212" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">mid=5</text>
    <!-- Comparison box -->
    <rect x="90" y="217" width="240" height="22" fill="white" rx="4" stroke="#3949AB" stroke-width="1" opacity="0.9"/>
    <text x="210" y="232" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">arr[5]=42 &gt; 37  =>  search left half</text>
  </g>

  <!-- Group 4: Pass 3 - low=4, high=4, mid=4 FOUND! (4.5s) -->
  <g data-narration="Pass 3: low=4, high=4, mid=(4+4)/2=4. The middle element arr[4]=37. This matches the target! Element found at index 4." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>
    <!-- Grey out right portion from pass 2 -->
    <rect x="286" y="62" width="98" height="34" fill="#C5CAE9" rx="4" opacity="0.6"/>
    <text x="20" y="260" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Pass 3:</text>
    <!-- All three pointers converge on index 4 -->
    <line x1="248" y1="245" x2="248" y2="255" stroke="#00695C" stroke-width="2"/>
    <polygon points="243,255 253,255 248,261" fill="#00695C"/>
    <text x="248" y="275" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">low=4</text>
    <line x1="272" y1="245" x2="272" y2="255" stroke="#C62828" stroke-width="2"/>
    <polygon points="267,255 277,255 272,261" fill="#C62828"/>
    <text x="272" y="275" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">high=4</text>
    <line x1="260" y1="240" x2="260" y2="248" stroke="#E65100" stroke-width="2"/>
    <polygon points="255,248 265,248 260,254" fill="#E65100"/>
    <text x="260" y="290" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">mid=4</text>
    <!-- Highlight found element -->
    <rect x="236" y="62" width="48" height="34" fill="#00695C" rx="4" stroke="#004D40" stroke-width="2">
      <animate attributeName="fill" values="#00695C;#00897B;#00695C" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <text x="260" y="84" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">37</text>
    <!-- Found box -->
    <rect x="90" y="296" width="240" height="22" fill="#00695C" rx="4" opacity="0.9"/>
    <text x="210" y="311" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">arr[4]=37 == 37  =>  FOUND at index 4!</text>
  </g>

  <!-- Group 5: Complexity Analysis (6.0s) -->
  <g data-narration="Binary search has O(log n) time complexity and O(1) space complexity. For 7 elements, it took only 3 comparisons instead of up to 7 with linear search." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>
    <rect x="20" y="325" width="185" height="65" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5" opacity="0.95"/>
    <text x="112" y="343" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Complexity</text>
    <text x="30" y="360" font-family="monospace" font-size="10" fill="#00695C">Time:  O(log n)</text>
    <text x="30" y="378" font-family="monospace" font-size="10" fill="#00695C">Space: O(1)</text>
  </g>

  <!-- Group 6: Comparison with Linear Search (7.5s) -->
  <g data-narration="Compared to linear search which checks every element sequentially with O(n) time, binary search is far more efficient for large sorted arrays, needing only log-base-2-of-n comparisons." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>
    <rect x="215" y="325" width="185" height="65" fill="white" rx="6" stroke="#E65100" stroke-width="1.5" opacity="0.95"/>
    <text x="307" y="343" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">vs Linear Search</text>
    <text x="225" y="360" font-family="monospace" font-size="10" fill="#C62828">Time:  O(n)</text>
    <text x="225" y="378" font-family="monospace" font-size="10" fill="#C62828">Space: O(1)</text>
    <!-- Verdict -->
    <text x="307" y="395" text-anchor="middle" font-family="Arial" font-size="9" fill="#3949AB">3 steps vs 5 steps for n=7</text>
  </g>
</svg>