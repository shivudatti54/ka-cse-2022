<svg width="420" height="400" data-topic-id="sorting-ch">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65c9e9" stop-opacity="1" />
      <stop offset="50%" stop-color="#8cc5e4" stop-opacity="1" />
      <stop offset="100%" stop-color="#f7f9fa" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />

  <!-- Introduction -->
  <section class="section" data-narration="Introduction to Sorting">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" dur="5s" begin="-2s" />
    <text x="50%" y="50%" font-size="24" font-weight="bold" text-anchor="middle">Introduction to Sorting</text>
  </section>

  <!-- Why Sorting? -->
  <section class="section" data-narration="Why Sorting?">
    <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" dur="5s" begin="-3s" />
    <text x="50%" y="50%" font-size="18" text-anchor="middle">Why Sorting?</text>
  </section>

  <!-- Types of Sorting -->
  <section class="section" data-narration="Types of Sorting">
    <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" dur="5s" begin="-3s" />
    <rect x="20" y="20" width="80" height="40" fill="#66d9ef" rx="10" />
    <text x="50%" y="50%" font-size="18" text-anchor="middle">Comparison-based sorting</text>
    <rect x="120" y="20" width="80" height="40" fill="#66d9ef" rx="10" />
    <text x="250%" y="50%" font-size="18" text-anchor="middle">Non-comparison-based sorting</text>
  </section>

  <!-- Sorting Algorithms -->
  <section class="section" data-narration="Sorting Algorithms">
    <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" dur="5s" begin="-3s" />
    <rect x="20" y="20" width="80" height="40" fill="#66d9ef" rx="10" />
    <text x="50%" y="50%" font-size="18" text-anchor="middle">Bubble Sort</text>
    <rect x="120" y="20" width="80" height="40" fill="#f7f9fa" rx="10" />
    <text x="250%" y="50%" font-size="18" text-anchor="middle">Selection Sort</text>
  </section>

  <!-- Bubble Sort Animation -->
  <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" dur="10s" begin="-2s" />
  <rect x="0" y="0" width="420" height="400" fill="#66d9ef" rx="10" />
  <rect x="0" y="0" width="150" height="150" fill="#f7f9fa" rx="10" />
  <text x="50%" y="50%" font-size="18" text-anchor="middle">Bubble Sort</text>
  <text x="250%" y="50%" font-size="18" text-anchor="middle">Bubble Sort</text>

  <!-- Selection Sort Animation -->
  <animateTransform attributeName="transform" type="translate" from="0,100" to="0,0" dur="10s" begin="-3s" />
  <rect x="0" y="0" width="420" height="400" fill="#66d9ef" rx="10" />
  <rect x="0" y="0" width="150" height="150" fill="#f7f9fa" rx="10" />
  <text x="50%" y="50%" font-size="18" text-anchor="middle">Selection Sort</text>
  <text x="250%" y="50%" font-size="18" text-anchor="middle">Selection Sort</text>

  <!-- Footer -->
  <text x="50%" y="50%" font-size="18" text-anchor="middle">Page 1 of 2</text>
</svg>