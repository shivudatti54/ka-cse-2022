<svg width="420" height="400" data-topic-id="textbook-2-ch">
  <g>
    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    <title>Textbook 2 Ch</title>
    <footer>Sorting Algorithms</footer>

    <g id="sort-intro">
      <rect x="10" y="10" width="400" height="50" fill="#3498db" rx="5"/>
      <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" fill="#fff">Introduction to Sorting</text>
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g id="sort-types">
      <rect x="10" y="70" width="400" height="150" fill="#2ecc71" rx="5"/>
      <rect x="10" y="70" width="400" height="150" fill="#e74c3c" rx="5"/>
      <text x="15" y="100" font-size="18" font-family="Arial, sans-serif" fill="#fff">Types of Sorting</text>
      <animate attributeName="opacity" begin="0.5s" dur="2s" repeatCount="indefinite"/>
      <text x="15" y="120" font-size="18" font-family="Arial, sans-serif" fill="#fff">Comparison-based sorting</text>
      <animate attributeName="opacity" begin="1.5s" dur="2s" repeatCount="indefinite"/>
      <text x="15" y="140" font-size="18" font-family="Arial, sans-serif" fill="#fff">Non-comparison-based sorting</text>
      <animate attributeName="opacity" begin="2.5s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g id="bubble-sort">
      <rect x="10" y="230" width="400" height="200" fill="#2ecc71" rx="5"/>
      <rect x="10" y="230" width="400" height="200" fill="#e74c3c" rx="5"/>
      <text x="15" y="260" font-size="18" font-family="Arial, sans-serif" fill="#fff">Bubble Sort</text>
      <animate attributeName="opacity" begin="0.5s" dur="2s" repeatCount="indefinite"/>
      <text x="15" y="280" font-size="18" font-family="Arial, sans-serif" fill="#fff">How Bubble Sort Works</text>
      <animate attributeName="opacity" begin="1.5s" dur="2s" repeatCount="indefinite"/>
      <text x="15" y="300" font-size="18" font-family="Arial, sans-serif" fill="#fff">Example</text>
      <animate attributeName="opacity" begin="2.5s" dur="2s" repeatCount="indefinite"/>
      <rect x="50" y="250" width="20" height="20" fill="#3498db" rx="5" stroke="#fff" stroke-width="2"/>
      <rect x="200" y="250" width="20" height="20" fill="#3498db" rx="5" stroke="#fff" stroke-width="2"/>
      <text x="30" y="270" font-size="18" font-family="Arial, sans-serif" fill="#fff">Initial List</text>
      <text x="220" y="270" font-size="18" font-family="Arial, sans-serif" fill="#fff">Sorted List</text>
      <animate attributeName="opacity" begin="3.5s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g id="sort-conclusion">
      <rect x="10" y="430" width="400" height="30" fill="#2ecc71" rx="5"/>
      <text x="15" y="445" font-size="18" font-family="Arial, sans-serif" fill="#fff">Conclusion</text>
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <defs>
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#87ceeb"/>
        <stop offset="50%" stop-color="#f7fcfd"/>
        <stop offset="100%" stop-color="#87ceeb"/>
      </linearGradient>
    </defs>
  </g>
</svg>