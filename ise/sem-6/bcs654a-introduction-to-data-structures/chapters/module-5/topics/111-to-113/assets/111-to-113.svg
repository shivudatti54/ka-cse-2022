<svg width="420" height="400" data-topic-id="111-113" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
    <title>Sorting Algorithms: Introduction to Sorting</title>
    <defs>
        <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#6F5CE7" stop-opacity="1"/>
            <stop offset="1" stop-color="#66CCCC" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Gradient background -->
    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    
    <!-- Section 1: Introduction to Sorting -->
    <rect x="10" y="10" width="400" height="100" fill="#F0F4F7" rx="10"/>
    <g transform="translate(15, 20)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Sorting is the process of arranging a set of elements in a specific order.</text>
        <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#999">It is a fundamental operation in computer science and is used in a wide range of applications.</text>
    </g>
    
    <!-- Section 2: Types of Sorting -->
    <rect x="10" y="130" width="400" height="150" fill="#F0F4F7" rx="10"/>
    <g transform="translate(15, 140)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Comparative Sorting</text>
        <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#999">This is the most common type of sorting, where each element is compared to others and rearranged accordingly.</text>
    </g>
    <g transform="translate(15, 240)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Non-Comparative Sorting</text>
        <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#999">This type of sorting uses a different approach, such as counting or dynamic programming, to sort the elements.</text>
    </g>
    <g transform="translate(15, 340)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="start">In-Place Sorting</text>
        <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#999">This type of sorting does not require any additional storage, as it sorts the elements in place.</text>
    </g>
    <g transform="translate(15, 440)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="start">External Sorting</text>
        <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#999">This type of sorting requires additional storage, as it sorts large datasets that do not fit in memory.</text>
    </g>

    <!-- Section 3: Bubble Sort -->
    <rect x="10" y="310" width="400" height="150" fill="#F0F4F7" rx="10"/>
    <g transform="translate(15, 320)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Bubble Sort</text>
        <animateTransform attributeName="transform" type="translate" from="0 320" to="0 360" dur="2s" begin="-0.5s"/>
        <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#999" text-anchor="start">This is a simple sorting algorithm that works by repeatedly iterating through the elements and swapping adjacent elements if they are in the wrong order.</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 360" dur="2s" begin="-0.5s"/>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 360" dur="2s" begin="-0.2s"/>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 360" dur="2s" begin="-0.1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 360" dur="2s" begin="0s"/>
    <g transform="translate(15, 520)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Example of Bubble Sort</text>
        <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#999" text-anchor="start">Suppose we have the following array:</text>
        <text x="0" y="60" font-size="18" font-family="Arial, sans-serif" fill="#999" text-anchor="start">[5, 2, 8, 3, 1, 6, 4]</text>
        <text x="0" y="80" font-size="18" font-family="Arial, sans-serif" fill="#999" text-anchor="start">After sorting, the array becomes:</text>
        <text x="0" y="100" font-size="18" font-family="Arial, sans-serif" fill="#999" text-anchor="start">[1, 2, 3, 4, 5, 6, 8]</text>
    </g>

    <!-- Section 4: Need for Sorting -->
    <rect x="10" y="610" width="400" height="150" fill="#F0F4F7" rx="10"/>
    <g transform="translate(15, 620)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Need for Sorting</text>
        <text x="0" y="40" font-size="18" font-family="Arial, sans-serif" fill="#999">Sorting is essential in many applications, including:</text>
        <text x="0" y="60" font-size="18" font-family="Arial, sans-serif" fill="#999" text-anchor="start">Database Query Optimization</text>
        <text x="0" y="80" font-size="18" font-family="Arial, sans-serif" fill="#999" text-anchor="start">File System Organization</text>
        <text x="0" y="100" font-size="18" font-family="Arial, sans-serif" fill="#999" text-anchor="start">Web Search Engine</text>
    </g>

    <!-- Arrow markers for connections -->
    <path d="M 50, 270 L 150, 270" stroke="#666" stroke-width="2"/>
    <path d="M 150, 270 L 250, 270" stroke="#666" stroke-width="2"/>
    <path d="M 250, 270 L 350, 270" stroke="#666" stroke-width="2"/>
    <path d="M 50, 270 L 100, 360" stroke="#666" stroke-width="2"/>
    <path d="M 100, 360 L 150, 360" stroke="#666" stroke-width="2"/>
    <path d="M 150, 360 L 200, 360" stroke="#666" stroke-width="2"/>
    <path d="M 200, 360 L 250, 360" stroke="#666" stroke-width="2"/>
    <path d="M 250, 360 L 300, 360" stroke="#666" stroke-width="2"/>
    <path d="M 300, 360 L 350, 360" stroke="#666" stroke-width="2"/>
    <path d="M 350, 360 L 400, 360" stroke="#666" stroke-width="2"/>

    <!-- Footer -->
    <rect x="10" y="390" width="400" height="10" fill="#F0F4F7"/>
    <text x="0" y="0" font-size="16" font-family="Arial, sans-serif" fill="#333" text-anchor="start">111-113</text>
</svg>