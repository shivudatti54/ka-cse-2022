<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="linear-search">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#3949AB"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4511E"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3949AB"/>
    </marker>
    <marker id="arrowhead-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00695C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg-grad)" rx="12"/>

  <!-- Group 1: Title and problem statement -->
  <g data-narration="Linear Search scans each element one by one. We search for value 86 in an array of 7 elements." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#3949AB">Linear Search: Sequential Scan</text>
    <rect x="30" y="38" width="360" height="24" rx="4" fill="#3949AB" opacity="0.1"/>
    <text x="210" y="55" text-anchor="middle" font-family="Arial" font-size="12" fill="#3949AB">Target = 86  |  Array size = 7  |  Scan left to right</text>
  </g>

  <!-- Group 2: Array visualization with indices -->
  <g data-narration="The array contains values 10, 23, 45, 72, 86, 91, and 105 at indices 0 through 6." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <!-- Index labels -->
    <text x="52" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">[0]</text>
    <text x="104" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">[1]</text>
    <text x="156" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">[2]</text>
    <text x="210" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">[3]</text>
    <text x="262" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">[4]</text>
    <text x="314" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">[5]</text>
    <text x="368" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#3949AB">[6]</text>
    <!-- Array cells -->
    <rect x="28" y="88" width="48" height="36" rx="4" fill="url(#indigo-grad)" stroke="#283593" stroke-width="1"/>
    <text x="52" y="111" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">10</text>
    <rect x="80" y="88" width="48" height="36" rx="4" fill="url(#indigo-grad)" stroke="#283593" stroke-width="1"/>
    <text x="104" y="111" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">23</text>
    <rect x="132" y="88" width="48" height="36" rx="4" fill="url(#indigo-grad)" stroke="#283593" stroke-width="1"/>
    <text x="156" y="111" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">45</text>
    <rect x="186" y="88" width="48" height="36" rx="4" fill="url(#indigo-grad)" stroke="#283593" stroke-width="1"/>
    <text x="210" y="111" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">72</text>
    <rect x="238" y="88" width="48" height="36" rx="4" fill="url(#teal-grad)" stroke="#004D40" stroke-width="2"/>
    <text x="262" y="111" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">86</text>
    <rect x="290" y="88" width="48" height="36" rx="4" fill="url(#indigo-grad)" stroke="#283593" stroke-width="1"/>
    <text x="314" y="111" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">91</text>
    <rect x="344" y="88" width="48" height="36" rx="4" fill="url(#indigo-grad)" stroke="#283593" stroke-width="1"/>
    <text x="368" y="111" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">105</text>
  </g>

  <!-- Group 3: Steps 1-3 comparisons (mismatches) -->
  <g data-narration="Step 1: compare index 0 value 10 with 86, no match. Step 2: compare index 1 value 23, no match. Step 3: compare index 2 value 45, no match." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <!-- Step 1 -->
    <rect x="22" y="138" width="120" height="28" rx="6" fill="url(#orange-grad)" opacity="0.9"/>
    <text x="82" y="156" text-anchor="middle" font-family="monospace" font-size="11" fill="white">10 == 86?</text>
    <text x="152" y="156" font-family="Arial" font-size="13" font-weight="bold" fill="#C62828">X</text>
    <!-- Arrow from cell 0 down -->
    <line x1="52" y1="124" x2="52" y2="136" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <!-- Step 2 -->
    <rect x="160" y="138" width="120" height="28" rx="6" fill="url(#orange-grad)" opacity="0.9"/>
    <text x="220" y="156" text-anchor="middle" font-family="monospace" font-size="11" fill="white">23 == 86?</text>
    <text x="290" y="156" font-family="Arial" font-size="13" font-weight="bold" fill="#C62828">X</text>
    <line x1="104" y1="124" x2="104" y2="132" stroke="#E65100" stroke-width="1.5"/>
    <line x1="104" y1="132" x2="190" y2="132" stroke="#E65100" stroke-width="1.5"/>
    <line x1="190" y1="132" x2="190" y2="136" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <!-- Step 3 -->
    <rect x="298" y="138" width="120" height="28" rx="6" fill="url(#orange-grad)" opacity="0.9"/>
    <text x="358" y="156" text-anchor="middle" font-family="monospace" font-size="11" fill="white">45 == 86?</text>
    <line x1="156" y1="124" x2="156" y2="132" stroke="#E65100" stroke-width="1.5"/>
    <line x1="156" y1="132" x2="340" y2="132" stroke="#E65100" stroke-width="1.5"/>
    <line x1="340" y1="132" x2="340" y2="136" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="396" y="172" font-family="Arial" font-size="13" font-weight="bold" fill="#C62828">X</text>
  </g>

  <!-- Group 4: Steps 4-5 with match found -->
  <g data-narration="Step 4: compare index 3 value 72 with 86, still no match. Step 5: compare index 4 value 86 with target 86, match found! Element located at index 4." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <!-- Step 4: Mismatch -->
    <rect x="22" y="180" width="120" height="28" rx="6" fill="url(#orange-grad)" opacity="0.9"/>
    <text x="82" y="198" text-anchor="middle" font-family="monospace" font-size="11" fill="white">72 == 86?</text>
    <text x="152" y="198" font-family="Arial" font-size="13" font-weight="bold" fill="#C62828">X</text>
    <!-- Step 5: Match! -->
    <rect x="180" y="180" width="140" height="28" rx="6" fill="url(#teal-grad)"/>
    <text x="250" y="198" text-anchor="middle" font-family="monospace" font-size="11" fill="white">86 == 86?</text>
    <text x="330" y="198" font-family="Arial" font-size="15" font-weight="bold" fill="#00695C">&#10003;</text>
    <!-- Found indicator arrow pointing to index 4 -->
    <line x1="262" y1="124" x2="262" y2="178" stroke="#00695C" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowhead-teal)"/>
    <!-- Found badge -->
    <rect x="335" y="178" width="80" height="30" rx="8" fill="#00695C"/>
    <text x="375" y="197" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">FOUND!</text>
  </g>

  <!-- Group 5: C code snippet -->
  <g data-narration="The C implementation uses a for loop iterating from index 0 to n minus 1, comparing each element with the target, and returning the index on match or minus 1 if not found." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="20" y="220" width="380" height="105" rx="8" fill="#1A237E" opacity="0.92"/>
    <text x="210" y="238" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7986CB">C Implementation</text>
    <text x="32" y="256" font-family="monospace" font-size="10" fill="#A5D6A7">int</text>
    <text x="55" y="256" font-family="monospace" font-size="10" fill="#E8EAF6"> linearSearch(</text>
    <text x="155" y="256" font-family="monospace" font-size="10" fill="#A5D6A7">int</text>
    <text x="178" y="256" font-family="monospace" font-size="10" fill="#E8EAF6"> arr[],</text>
    <text x="220" y="256" font-family="monospace" font-size="10" fill="#A5D6A7">int</text>
    <text x="243" y="256" font-family="monospace" font-size="10" fill="#E8EAF6"> n,</text>
    <text x="261" y="256" font-family="monospace" font-size="10" fill="#A5D6A7">int</text>
    <text x="284" y="256" font-family="monospace" font-size="10" fill="#E8EAF6"> target) {</text>
    <text x="42" y="272" font-family="monospace" font-size="10" fill="#FFCC80">for</text>
    <text x="62" y="272" font-family="monospace" font-size="10" fill="#E8EAF6">(</text>
    <text x="69" y="272" font-family="monospace" font-size="10" fill="#A5D6A7">int</text>
    <text x="92" y="272" font-family="monospace" font-size="10" fill="#E8EAF6"> i=0; i&lt;n; i++) {</text>
    <text x="52" y="288" font-family="monospace" font-size="10" fill="#FFCC80">  if</text>
    <text x="75" y="288" font-family="monospace" font-size="10" fill="#E8EAF6"> (arr[i] == target)</text>
    <text x="62" y="302" font-family="monospace" font-size="10" fill="#FFCC80">    return</text>
    <text x="115" y="302" font-family="monospace" font-size="10" fill="#CE93D8"> i;</text>
    <text x="42" y="316" font-family="monospace" font-size="10" fill="#E8EAF6">}</text>
    <text x="32" y="316" font-family="monospace" font-size="10" fill="#FFCC80">  return</text>
    <text x="86" y="316" font-family="monospace" font-size="10" fill="#EF9A9A"> -1;</text>
    <text x="110" y="316" font-family="monospace" font-size="10" fill="#E8EAF6"> }</text>
  </g>

  <!-- Group 6: Complexity summary -->
  <g data-narration="Time complexity: Best case is O of 1 when the target is the first element. Average and worst case are both O of n. Space complexity is O of 1 since only constant extra space is used." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="20" y="335" width="380" height="55" rx="8" fill="white" opacity="0.85" stroke="#3949AB" stroke-width="1"/>
    <text x="210" y="353" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">Complexity Analysis</text>
    <!-- Best -->
    <rect x="32" y="360" width="80" height="22" rx="4" fill="#00695C" opacity="0.15"/>
    <text x="72" y="376" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695C">Best: O(1)</text>
    <!-- Average -->
    <rect x="122" y="360" width="90" height="22" rx="4" fill="#E65100" opacity="0.15"/>
    <text x="167" y="376" text-anchor="middle" font-family="Arial" font-size="10" fill="#E65100">Avg: O(n)</text>
    <!-- Worst -->
    <rect x="222" y="360" width="90" height="22" rx="4" fill="#C62828" opacity="0.15"/>
    <text x="267" y="376" text-anchor="middle" font-family="Arial" font-size="10" fill="#C62828">Worst: O(n)</text>
    <!-- Space -->
    <rect x="322" y="360" width="70" height="22" rx="4" fill="#3949AB" opacity="0.15"/>
    <text x="357" y="376" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB">Space: O(1)</text>
  </g>
</svg>