<svg width="420" height="400" data-topic-id="insertion-sort-1726" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A7D3F7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 20)">
    <rect width="400" height="350" fill="#FFFFFF" rx="10"/>
    <text x="50%" y="10" font-size="24" text-anchor="middle" fill="#2F4F7F">1726 - Insertion Sort</text>
    <text x="50%" y="40" font-size="18" text-anchor="middle" fill="#2F4F7F" data-narration="Introduction">Introduction</text>
    <rect x="50%" y="70" width="200" height="30" fill="#FFFFFF" rx="5" stroke="#2F4F7F" stroke-width="2"/>
    <text x="70%" y="80" font-size="16" text-anchor="middle" fill="#2F4F7F" data-narration="Step 1: Initialize the Sorted Region">Step 1: Initialize the Sorted Region</text>
    <animate attributes="x" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate attributes="y" begin="1.5s" dur="2s" repeatCount="indefinite"/>
    <rect x="70%" y="110" width="200" height="30" fill="#FFFFFF" rx="5" stroke="#2F4F7F" stroke-width="2"/>
    <text x="70%" y="120" font-size="16" text-anchor="middle" fill="#2F4F7F" data-narration="Step 2: Iterate Through the Unsorted Region">Step 2: Iterate Through the Unsorted Region</text>
    <animate attributes="x" begin="3s" dur="2s" repeatCount="indefinite"/>
    <animate attributes="y" begin="4.5s" dur="2s" repeatCount="indefinite"/>
    <rect x="70%" y="150" width="200" height="30" fill="#FFFFFF" rx="5" stroke="#2F4F7F" stroke-width="2"/>
    <text x="70%" y="160" font-size="16" text-anchor="middle" fill="#2F4F7F" data-narration="Step 3: Repeat Until the Entire Unsorted Region is Sorted">Step 3: Repeat Until the Entire Unsorted Region is Sorted</text>
    <animate attributes="x" begin="5.5s" dur="2s" repeatCount="indefinite"/>
    <animate attributes="y" begin="6.5s" dur="2s" repeatCount="indefinite"/>
    <rect x="50%" y="200" width="300" height="50" fill="#FFFFFF" rx="10" stroke="#2F4F7F" stroke-width="2"/>
    <text x="70%" y="210" font-size="16" text-anchor="middle" fill="#2F4F7F" data-narration="Example">Example</text>
    <rect x="70%" y="240" width="200" height="30" fill="#FFFFFF" rx="5" stroke="#2F4F7F" stroke-width="2"/>
    <text x="70%" y="250" font-size="16" text-anchor="middle" fill="#2F4F7F" data-narration="Suppose we have the following unsorted array:">Suppose we have the following unsorted array:</text>
    <text x="70%" y="300" font-size="16" text-anchor="middle" fill="#2F4F7F" data-narration="[5, 2, 8, 3, 1, 4, 6]">[5, 2, 8, 3, 1, 4, 6]</text>
  </g>
  <g transform="translate(10, 380)">
    <rect width="400" height="20" fill="#FFFFFF" rx="5" stroke="#2F4F7F" stroke-width="2"/>
    <text x="50%" y="10" font-size="16" text-anchor="middle" fill="#2F4F7F">Footer</text>
  </g>
</svg>