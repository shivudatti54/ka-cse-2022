<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="searching-introduction">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- Group 1: Title and Compilation Pipeline Header -->
  <g opacity="0" data-narration="Introduction to Parsing. Parsing is the second phase of compilation that analyzes token streams and builds syntax trees.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <rect x="20" y="12" width="380" height="30" fill="url(#headerGrad)" rx="6"/>
    <text x="210" y="33" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Introduction to Parsing in Compiler Design</text>
    <!-- Pipeline boxes -->
    <rect x="20" y="52" width="78" height="28" fill="#3949AB" rx="4"/>
    <text x="59" y="70" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Source Code</text>
    <polygon points="102,66 110,60 110,72" fill="#3949AB"/>
    <rect x="114" y="52" width="62" height="28" fill="#00695C" rx="4"/>
    <text x="145" y="70" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Lexer</text>
    <polygon points="180,66 188,60 188,72" fill="#00695C"/>
    <rect x="192" y="52" width="62" height="28" fill="#E65100" rx="4"/>
    <text x="223" y="70" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Tokens</text>
    <polygon points="258,66 266,60 266,72" fill="#E65100"/>
    <rect x="270" y="52" width="62" height="28" fill="#C62828" rx="4" stroke="#C62828" stroke-width="2"/>
    <text x="301" y="70" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Parser</text>
    <polygon points="336,66 344,60 344,72" fill="#C62828"/>
    <rect x="348" y="52" width="52" height="28" fill="#3949AB" rx="4"/>
    <text x="374" y="70" text-anchor="middle" font-family="Arial" font-size="9" fill="white">AST</text>
  </g>

  <!-- Group 2: Context-Free Grammar Example -->
  <g opacity="0" data-narration="Context-Free Grammars define the syntax of programming languages. Here is a grammar for arithmetic expressions with productions for addition, multiplication, parentheses, and identifiers.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <rect x="20" y="90" width="185" height="105" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5" opacity="0.95"/>
    <text x="112" y="108" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Context-Free Grammar (CFG)</text>
    <line x1="30" y1="114" x2="195" y2="114" stroke="#C5CAE9" stroke-width="1"/>
    <text x="35" y="132" font-family="monospace" font-size="10" fill="#00695C">E  ->  E + T | T</text>
    <text x="35" y="148" font-family="monospace" font-size="10" fill="#00695C">T  ->  T * F | F</text>
    <text x="35" y="164" font-family="monospace" font-size="10" fill="#00695C">F  ->  ( E ) | id</text>
    <text x="35" y="184" font-family="Arial" font-size="9" fill="#666">Terminals: +, *, (, ), id</text>
  </g>

  <!-- Group 3: Parse Tree for a + b * c -->
  <g opacity="0" data-narration="A parse tree for the expression a plus b times c. The tree shows operator precedence with multiplication binding tighter than addition. E derives E plus T, where E derives T then F then a, and T derives T times F giving b times c.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
    <rect x="215" y="90" width="185" height="105" fill="white" rx="6" stroke="#E65100" stroke-width="1.5" opacity="0.95"/>
    <text x="307" y="108" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Parse Tree: a + b * c</text>
    <line x1="225" y1="114" x2="390" y2="114" stroke="#C5CAE9" stroke-width="1"/>
    <!-- Tree structure -->
    <!-- Root E -->
    <circle cx="307" cy="128" r="10" fill="#E65100"/>
    <text x="307" y="132" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">E</text>
    <!-- Left E -->
    <line x1="297" y1="136" x2="265" y2="148" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="260" cy="153" r="9" fill="#E65100"/>
    <text x="260" y="157" text-anchor="middle" font-family="monospace" font-size="9" fill="white">E</text>
    <!-- + operator -->
    <line x1="307" y1="138" x2="307" y2="148" stroke="#C62828" stroke-width="1.5"/>
    <circle cx="307" cy="153" r="9" fill="#C62828"/>
    <text x="307" y="157" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">+</text>
    <!-- Right T -->
    <line x1="317" y1="136" x2="350" y2="148" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="355" cy="153" r="9" fill="#E65100"/>
    <text x="355" y="157" text-anchor="middle" font-family="monospace" font-size="9" fill="white">T</text>
    <!-- Leaf a -->
    <line x1="260" y1="162" x2="260" y2="172" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="249" y="172" width="22" height="16" fill="#3949AB" rx="3"/>
    <text x="260" y="184" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">a</text>
    <!-- T -> T * F -->
    <line x1="348" y1="162" x2="332" y2="172" stroke="#E65100" stroke-width="1.2"/>
    <rect x="321" y="172" width="22" height="16" fill="#3949AB" rx="3"/>
    <text x="332" y="184" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">b</text>
    <line x1="355" y1="162" x2="355" y2="172" stroke="#C62828" stroke-width="1.2"/>
    <circle cx="355" cy="178" r="6" fill="#C62828"/>
    <text x="355" y="181" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">*</text>
    <line x1="362" y1="162" x2="378" y2="172" stroke="#E65100" stroke-width="1.2"/>
    <rect x="367" y="172" width="22" height="16" fill="#3949AB" rx="3"/>
    <text x="378" y="184" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">c</text>
  </g>

  <!-- Group 4: Top-Down Parsing -->
  <g opacity="0" data-narration="Top-Down Parsing starts from the start symbol and works down to the input string. It uses predictive methods like recursive descent and LL parsers, building the parse tree from root to leaves.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
    <rect x="20" y="205" width="185" height="90" fill="white" rx="6" stroke="#00695C" stroke-width="1.5" opacity="0.95"/>
    <rect x="20" y="205" width="185" height="22" fill="#00695C" rx="6"/>
    <rect x="20" y="217" width="185" height="10" fill="#00695C"/>
    <text x="112" y="221" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Top-Down Parsing</text>
    <!-- Arrow downward: Root to Leaves -->
    <rect x="85" y="234" width="56" height="18" fill="#00695C" rx="3" opacity="0.15"/>
    <text x="113" y="247" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Start S</text>
    <line x1="113" y1="254" x2="113" y2="260" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="113,264 108,258 118,258" fill="#00695C"/>
    <rect x="70" y="266" width="86" height="18" fill="#00695C" rx="3" opacity="0.15"/>
    <text x="113" y="279" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">Apply Productions</text>
    <line x1="113" y1="286" x2="113" y2="292" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="113,296 108,290 118,290" fill="#00695C"/>
    <!-- Examples -->
    <text x="35" y="247" font-family="Arial" font-size="8" fill="#666">LL(1)</text>
    <text x="155" y="247" font-family="Arial" font-size="8" fill="#666">Recursive</text>
    <text x="155" y="257" font-family="Arial" font-size="8" fill="#666">Descent</text>
  </g>

  <!-- Group 5: Bottom-Up Parsing -->
  <g opacity="0" data-narration="Bottom-Up Parsing starts from the input string and reduces it back to the start symbol. It uses shift-reduce techniques like LR, SLR, and LALR parsers, building the tree from leaves to root.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"/>
    <rect x="215" y="205" width="185" height="90" fill="white" rx="6" stroke="#C62828" stroke-width="1.5" opacity="0.95"/>
    <rect x="215" y="205" width="185" height="22" fill="#C62828" rx="6"/>
    <rect x="215" y="217" width="185" height="10" fill="#C62828"/>
    <text x="307" y="221" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Bottom-Up Parsing</text>
    <!-- Arrow upward: Leaves to Root -->
    <rect x="267" y="274" width="82" height="18" fill="#C62828" rx="3" opacity="0.15"/>
    <text x="308" y="287" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828">Input String</text>
    <line x1="308" y1="272" x2="308" y2="266" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="308,262 303,268 313,268" fill="#C62828"/>
    <rect x="267" y="242" width="82" height="18" fill="#C62828" rx="3" opacity="0.15"/>
    <text x="308" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828">Reduce Handle</text>
    <line x1="308" y1="240" x2="308" y2="234" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="308,230 303,236 313,236" fill="#C62828"/>
    <!-- Examples -->
    <text x="230" y="255" font-family="Arial" font-size="8" fill="#666">LR(1)</text>
    <text x="230" y="265" font-family="Arial" font-size="8" fill="#666">SLR</text>
    <text x="230" y="275" font-family="Arial" font-size="8" fill="#666">LALR</text>
    <text x="365" y="255" font-family="Arial" font-size="8" fill="#666">Shift</text>
    <text x="365" y="265" font-family="Arial" font-size="8" fill="#666">Reduce</text>
  </g>

  <!-- Group 6: Shift-Reduce Operations and Key Takeaways -->
  <g opacity="0" data-narration="The shift-reduce parser uses four operations: Shift moves input tokens onto the stack, Reduce replaces a handle with a nonterminal, Accept signals successful parsing, and Error detects syntax problems. Common parsing challenges include ambiguous grammars, left recursion, and left factoring.">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.5s" fill="freeze"/>
    <rect x="20" y="305" width="380" height="82" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5" opacity="0.95"/>
    <text x="210" y="322" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Shift-Reduce Operations and Key Challenges</text>
    <line x1="30" y1="328" x2="390" y2="328" stroke="#C5CAE9" stroke-width="1"/>
    <!-- Operations -->
    <rect x="32" y="335" width="58" height="18" fill="#3949AB" rx="3"/>
    <text x="61" y="348" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Shift</text>
    <rect x="96" y="335" width="58" height="18" fill="#00695C" rx="3"/>
    <text x="125" y="348" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Reduce</text>
    <rect x="160" y="335" width="58" height="18" fill="#E65100" rx="3"/>
    <text x="189" y="348" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Accept</text>
    <rect x="224" y="335" width="58" height="18" fill="#C62828" rx="3"/>
    <text x="253" y="348" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Error</text>
    <!-- Challenges -->
    <text x="300" y="342" font-family="Arial" font-size="8" fill="#3949AB" font-weight="bold">Challenges:</text>
    <text x="300" y="354" font-family="Arial" font-size="8" fill="#666">Ambiguity, Left Recursion</text>
    <!-- Bottom labels -->
    <text x="32" y="375" font-family="Arial" font-size="8" fill="#666">Move token</text>
    <text x="32" y="383" font-family="Arial" font-size="8" fill="#666">to stack</text>
    <text x="96" y="375" font-family="Arial" font-size="8" fill="#666">Replace handle</text>
    <text x="96" y="383" font-family="Arial" font-size="8" fill="#666">with nonterminal</text>
    <text x="160" y="375" font-family="Arial" font-size="8" fill="#666">Parsing</text>
    <text x="160" y="383" font-family="Arial" font-size="8" fill="#666">complete</text>
    <text x="224" y="375" font-family="Arial" font-size="8" fill="#666">Syntax error</text>
    <text x="224" y="383" font-family="Arial" font-size="8" fill="#666">detected</text>
    <text x="300" y="375" font-family="Arial" font-size="8" fill="#666">Left Factoring,</text>
    <text x="300" y="383" font-family="Arial" font-size="8" fill="#666">Error Recovery</text>
  </g>
</svg>