<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Real-Time IoT Stream Pipeline</text>

  <g id="step0" class="step" data-narration="End-to-end real-time analysis flows from IoT sensors through Kafka message broker into Storm processing to storage and dashboards.">
    <text x="400" y="60" text-anchor="middle" font-size="12" fill="#666">Sensors to Kafka to Storm to Database to Dashboard - continuous data flow</text>
  </g>

  <g id="step1" class="step" data-narration="IoT sensors continuously generate data streams: temperature, pressure, humidity, motion readings every millisecond.">
    <rect x="20" y="100" width="110" height="200" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="75" y="125" text-anchor="middle" font-size="12" fill="#0d47a1" font-weight="bold">IoT Sensors</text>
    <circle cx="50" cy="160" r="16" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
    <text x="50" y="164" text-anchor="middle" font-size="7" fill="#0d47a1" font-weight="bold">Temp</text>
    <circle cx="100" cy="160" r="16" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
    <text x="100" y="164" text-anchor="middle" font-size="7" fill="#0d47a1" font-weight="bold">Press</text>
    <circle cx="50" cy="210" r="16" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
    <text x="50" y="214" text-anchor="middle" font-size="7" fill="#0d47a1" font-weight="bold">Humid</text>
    <circle cx="100" cy="210" r="16" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
    <text x="100" y="214" text-anchor="middle" font-size="7" fill="#0d47a1" font-weight="bold">GPS</text>
    <text x="75" y="260" text-anchor="middle" font-size="8" fill="#1565c0">Continuous</text>
    <text x="75" y="274" text-anchor="middle" font-size="8" fill="#1565c0">data streams</text>
    <!-- Stream arrows -->
    <path d="M 75 290 L 75 295 L 68 295 L 75 305 L 82 295 L 75 295" fill="#1976d2"/>
  </g>

  <g id="step2" class="step" data-narration="Apache Kafka serves as the message broker, buffering and distributing sensor data across topics with high throughput.">
    <line x1="130" y1="200" x2="170" y2="200" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="170" y="120" width="130" height="160" rx="12" fill="#fff3e0" stroke="#ff9800" stroke-width="2.5"/>
    <text x="235" y="150" text-anchor="middle" font-size="14" fill="#e65100" font-weight="bold">Apache</text>
    <text x="235" y="170" text-anchor="middle" font-size="14" fill="#e65100" font-weight="bold">Kafka</text>
    <rect x="185" y="185" width="100" height="22" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="235" y="200" text-anchor="middle" font-size="8" fill="#bf360c">Topic: iot-sensors</text>
    <rect x="185" y="213" width="100" height="22" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="235" y="228" text-anchor="middle" font-size="8" fill="#bf360c">Topic: iot-alerts</text>
    <text x="235" y="260" text-anchor="middle" font-size="8" fill="#f57c00">High throughput</text>
    <text x="235" y="274" text-anchor="middle" font-size="8" fill="#f57c00">Message broker</text>
  </g>

  <g id="step3" class="step" data-narration="Apache Storm consumes from Kafka topics, processing each tuple through a topology of spouts and bolts in real-time.">
    <line x1="300" y1="200" x2="340" y2="200" stroke="#ff9800" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="340" y="90" width="200" height="225" rx="14" fill="#e8f5e9" stroke="#388e3c" stroke-width="2.5"/>
    <text x="440" y="115" text-anchor="middle" font-size="14" fill="#1b5e20" font-weight="bold">Apache Storm</text>
    <text x="440" y="133" text-anchor="middle" font-size="10" fill="#2e7d32">Real-time Processing</text>

    <!-- Spout -->
    <rect x="360" y="145" width="80" height="30" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="164" text-anchor="middle" font-size="8" fill="#1b5e20" font-weight="bold">Kafka Spout</text>

    <!-- Bolts -->
    <line x1="400" y1="175" x2="380" y2="195" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="400" y1="175" x2="470" y2="195" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="350" y="195" width="65" height="28" rx="5" fill="#a5d6a7" stroke="#66bb6a" stroke-width="1"/>
    <text x="382" y="213" text-anchor="middle" font-size="7" fill="#1b5e20" font-weight="bold">Parse Bolt</text>

    <rect x="445" y="195" width="65" height="28" rx="5" fill="#a5d6a7" stroke="#66bb6a" stroke-width="1"/>
    <text x="477" y="213" text-anchor="middle" font-size="7" fill="#1b5e20" font-weight="bold">Filter Bolt</text>

    <line x1="382" y1="223" x2="430" y2="243" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="477" y1="223" x2="430" y2="243" stroke="#388e3c" stroke-width="1.5"/>

    <rect x="395" y="243" width="80" height="28" rx="5" fill="#81c784" stroke="#388e3c" stroke-width="1.5"/>
    <text x="435" y="261" text-anchor="middle" font-size="7" fill="#1b5e20" font-weight="bold">Aggregate Bolt</text>

    <line x1="435" y1="271" x2="400" y2="285" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="435" y1="271" x2="470" y2="285" stroke="#388e3c" stroke-width="1.5"/>

    <rect x="365" y="285" width="60" height="22" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="395" y="300" text-anchor="middle" font-size="7" fill="#c62828" font-weight="bold">Alert Bolt</text>

    <rect x="440" y="285" width="60" height="22" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="470" y="300" text-anchor="middle" font-size="7" fill="#1a237e" font-weight="bold">DB Bolt</text>
  </g>

  <g id="step4" class="step" data-narration="Processed results are stored in time-series databases and NoSQL stores for historical analysis and querying.">
    <line x1="540" y1="200" x2="575" y2="200" stroke="#388e3c" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="575" y="130" width="100" height="140" rx="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="625" y="160" text-anchor="middle" font-size="12" fill="#4a148c" font-weight="bold">Database</text>
    <rect x="588" y="172" width="75" height="22" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="625" y="187" text-anchor="middle" font-size="8" fill="#6a1b9a">InfluxDB</text>
    <rect x="588" y="200" width="75" height="22" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="625" y="215" text-anchor="middle" font-size="8" fill="#6a1b9a">Cassandra</text>
    <rect x="588" y="228" width="75" height="22" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="625" y="243" text-anchor="middle" font-size="8" fill="#6a1b9a">MongoDB</text>
    <text x="625" y="263" text-anchor="middle" font-size="7" fill="#9c27b0">Time-series +</text>
    <text x="625" y="273" text-anchor="middle" font-size="7" fill="#9c27b0">document store</text>
  </g>

  <g id="step5" class="step" data-narration="Real-time dashboards visualize live data using Grafana and Kibana, showing metrics, trends, and active alerts.">
    <line x1="675" y1="200" x2="700" y2="200" stroke="#9c27b0" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="700" y="110" width="85" height="180" rx="12" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="742" y="140" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold">Live</text>
    <text x="742" y="157" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold">Dashboard</text>
    <rect x="712" y="170" width="60" height="18" rx="3" fill="#f8bbd0"/>
    <rect x="712" y="170" width="35" height="18" rx="3" fill="#e91e63"/>
    <rect x="712" y="195" width="60" height="18" rx="3" fill="#f8bbd0"/>
    <rect x="712" y="195" width="48" height="18" rx="3" fill="#ce93d8"/>
    <rect x="712" y="220" width="60" height="18" rx="3" fill="#f8bbd0"/>
    <rect x="712" y="220" width="20" height="18" rx="3" fill="#42a5f5"/>
    <text x="742" y="257" text-anchor="middle" font-size="8" fill="#c2185b">Grafana</text>
    <text x="742" y="270" text-anchor="middle" font-size="8" fill="#c2185b">Kibana</text>
    <text x="742" y="283" text-anchor="middle" font-size="8" fill="#e91e63">Mobile App</text>
  </g>

  <g id="step6" class="step" data-narration="The pipeline achieves sub-second latency from sensor reading to dashboard display, critical for real-time IoT decisions.">
    <rect x="50" y="340" width="700" height="45" rx="10" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
    <text x="400" y="362" text-anchor="middle" font-size="12" fill="#1a237e" font-weight="bold">End-to-End Latency: Sub-second (milliseconds)</text>
    <text x="400" y="378" text-anchor="middle" font-size="9" fill="#283593">Sensor Read (ms) &gt; Kafka (ms) &gt; Storm Process (ms) &gt; DB Write (ms) &gt; Dashboard Refresh (s)</text>
  </g>

  <g id="step7" class="step" data-narration="Use cases include industrial equipment monitoring, smart grid management, traffic anomaly detection, and health alerts.">
    <rect x="50" y="400" width="340" height="65" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="220" y="422" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Real-Time IoT Use Cases</text>
    <text x="220" y="442" text-anchor="middle" font-size="9" fill="#2e7d32">Factory equipment monitoring | Smart grid alerts</text>
    <text x="220" y="458" text-anchor="middle" font-size="9" fill="#388e3c">Traffic anomaly detection | Health vital alerts</text>
  </g>

  <g id="step8" class="step" data-narration="Key advantages: guaranteed processing with tuple tracking, horizontal scaling, fault tolerance, and multi-language support.">
    <rect x="410" y="400" width="340" height="65" rx="10" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="580" y="422" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">Storm Pipeline Advantages</text>
    <text x="580" y="442" text-anchor="middle" font-size="9" fill="#bf360c">Guaranteed processing | Horizontal scaling</text>
    <text x="580" y="458" text-anchor="middle" font-size="9" fill="#f57c00">Fault-tolerant | Multi-language (Java, Python)</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>