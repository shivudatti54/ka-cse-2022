<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">SDN and NFV for IoT</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#666">Programmable networks and virtualized functions for scalable IoT</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <!-- Step 0: SDN Core Concept -->
  <g id="step0" class="step" data-narration="Software-Defined Networking separates the control plane from the data plane. The control plane makes forwarding decisions centrally, while the data plane handles actual packet forwarding in switches.">
    <text x="200" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">SDN: Separation of Planes</text>
    <rect x="60" y="95" width="130" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="125" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Control Plane</text>
    <text x="125" y="135" text-anchor="middle" font-size="9" fill="#555">(Decisions)</text>
    <rect x="210" y="95" width="130" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="275" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Data Plane</text>
    <text x="275" y="135" text-anchor="middle" font-size="9" fill="#555">(Forwarding)</text>
    <line x1="190" y1="120" x2="205" y2="120" stroke="#e91e63" stroke-width="2"/>
    <text x="200" y="155" text-anchor="middle" font-size="9" fill="#e91e63">Separated</text>
  </g>

  <!-- Step 1: NFV Core Concept -->
  <g id="step1" class="step" data-narration="Network Functions Virtualization replaces dedicated hardware appliances with software running on standard servers. Functions like firewalls, load balancers, and gateways become virtual network functions.">
    <text x="600" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">NFV: Virtualization</text>
    <rect x="460" y="95" width="130" height="50" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    <text x="525" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#e91e63">Proprietary HW</text>
    <text x="525" y="135" text-anchor="middle" font-size="9" fill="#555">(Expensive)</text>
    <text x="610" y="120" text-anchor="middle" font-size="14" fill="#388e3c">--></text>
    <rect x="630" y="95" width="140" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="700" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">VNFs on COTS</text>
    <text x="700" y="135" text-anchor="middle" font-size="9" fill="#555">(Software-based)</text>
  </g>

  <!-- Step 2: SDN Three-Layer Architecture -->
  <g id="step2" class="step" data-narration="SDN has three layers: the Application Layer with IoT management apps, the Control Layer with the centralized SDN controller, and the Infrastructure Layer with physical switches and routers.">
    <text x="200" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">SDN Architecture Layers</text>
    <rect x="60" y="195" width="280" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="200" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Application Layer (IoT Apps)</text>
    <text x="200" y="248" text-anchor="middle" font-size="9" fill="#888">-- Northbound API --</text>
    <rect x="60" y="255" width="280" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="200" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Control Layer (SDN Controller)</text>
    <text x="200" y="308" text-anchor="middle" font-size="9" fill="#888">-- Southbound API (OpenFlow) --</text>
    <rect x="60" y="315" width="280" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="200" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Infrastructure Layer (Switches)</text>
  </g>

  <!-- Step 3: SDN Benefits for IoT -->
  <g id="step3" class="step" data-narration="SDN benefits for IoT include centralized management of millions of devices, dynamic traffic rerouting for congestion avoidance, enhanced security through anomaly detection, and network slicing for different IoT applications.">
    <text x="600" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">SDN Benefits for IoT</text>
    <rect x="460" y="198" width="280" height="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="6"/>
    <text x="600" y="218" text-anchor="middle" font-size="11" fill="#1976d2">Centralized Management</text>
    <rect x="460" y="233" width="280" height="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="6"/>
    <text x="600" y="253" text-anchor="middle" font-size="11" fill="#388e3c">Dynamic Traffic Engineering</text>
    <rect x="460" y="268" width="280" height="30" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" rx="6"/>
    <text x="600" y="288" text-anchor="middle" font-size="11" fill="#e91e63">Enhanced Security</text>
    <rect x="460" y="303" width="280" height="30" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="6"/>
    <text x="600" y="323" text-anchor="middle" font-size="11" fill="#9c27b0">Network Slicing</text>
  </g>

  <!-- Step 4: NFV Benefits for IoT -->
  <g id="step4" class="step" data-narration="NFV benefits for IoT include cost reduction using standard servers instead of appliances, elastic scalability of VNFs based on demand, flexible edge deployment, and automated service chaining through multiple VNFs.">
    <text x="600" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">NFV Benefits for IoT</text>
    <rect x="460" y="378" width="280" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="6"/>
    <text x="600" y="398" text-anchor="middle" font-size="11" fill="#ff9800">Cost Reduction (COTS servers)</text>
    <rect x="460" y="413" width="280" height="30" fill="#fff8e1" stroke="#ffa000" stroke-width="1.5" rx="6"/>
    <text x="600" y="433" text-anchor="middle" font-size="11" fill="#ffa000">Elastic Scalability</text>
    <rect x="460" y="448" width="280" height="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="6"/>
    <text x="600" y="468" text-anchor="middle" font-size="11" fill="#388e3c">Flexible Edge Deployment</text>
    <rect x="460" y="483" width="280" height="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="6"/>
    <text x="600" y="503" text-anchor="middle" font-size="11" fill="#1976d2">Service Chaining</text>
  </g>

  <!-- Step 5: SDN + NFV Synergy -->
  <g id="step5" class="step" data-narration="SDN and NFV work together: SDN provides programmable network paths to connect and steer traffic between VNFs, while NFV provides the agile software-based services that process IoT data.">
    <text x="200" y="385" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">SDN + NFV Synergy</text>
    <rect x="60" y="395" width="280" height="130" fill="#f5f5f5" stroke="#666" stroke-width="1.5" rx="10"/>
    <text x="200" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">SDN Controller</text>
    <text x="200" y="430" text-anchor="middle" font-size="9" fill="#555">(Orchestrates paths)</text>
    <line x1="80" y1="440" x2="320" y2="440" stroke="#ddd" stroke-width="1"/>
    <rect x="75" y="450" width="80" height="35" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" rx="4"/>
    <text x="115" y="472" text-anchor="middle" font-size="9" font-weight="bold" fill="#e91e63">VNF: FW</text>
    <rect x="160" y="450" width="80" height="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="4"/>
    <text x="200" y="472" text-anchor="middle" font-size="9" font-weight="bold" fill="#388e3c">VNF: GW</text>
    <rect x="245" y="450" width="80" height="35" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="4"/>
    <text x="285" y="472" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff9800">VNF: LB</text>
    <line x1="155" y1="467" x2="160" y2="467" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="240" y1="467" x2="245" y2="467" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="200" y="510" text-anchor="middle" font-size="10" fill="#555">IoT Data Flow --></text>
  </g>

  <!-- Step 6: Summary -->
  <g id="step6" class="step" data-narration="Together, SDN provides intelligent programmable connectivity while NFV provides agile virtualized services, creating the flexible and cost-effective infrastructure that massive IoT deployments require.">
    <rect x="60" y="545" width="680" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="15"/>
    <text x="400" y="562" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">SDN = Programmable Paths | NFV = Virtual Functions</text>
    <text x="400" y="578" text-anchor="middle" font-size="10" fill="#555">Together: Agile, Scalable, Cost-Effective IoT Infrastructure</text>
  </g>
</svg>
