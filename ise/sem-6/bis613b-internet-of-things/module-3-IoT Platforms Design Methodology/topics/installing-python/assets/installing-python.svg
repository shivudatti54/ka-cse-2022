<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Installing Python for IoT</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Python is the preferred language for IoT due to its simple syntax, cross-platform support, and extensive library ecosystem for hardware interfacing and data processing.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">Setting up Python for IoT development on Windows, macOS, and Linux</text>
  </g>

  <g id="step1" class="step" data-narration="Python is preferred for IoT because of its ease of use with simple readable syntax, cross-platform compatibility across devices, and extensive libraries like PySerial and RPi.GPIO.">
    <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Why Python for IoT?</text>
    <rect x="60" y="105" width="200" height="60" rx="8" fill="#1976d2"/>
    <text x="160" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Ease of Use</text>
    <text x="160" y="150" text-anchor="middle" font-size="10" fill="#bbdefb">Simple, readable syntax</text>
    <rect x="290" y="105" width="200" height="60" rx="8" fill="#388e3c"/>
    <text x="390" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Cross-Platform</text>
    <text x="390" y="150" text-anchor="middle" font-size="10" fill="#c8e6c9">Windows, macOS, Linux, RPi</text>
    <rect x="520" y="105" width="220" height="60" rx="8" fill="#ff9800"/>
    <text x="630" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Extensive Libraries</text>
    <text x="630" y="150" text-anchor="middle" font-size="10" fill="#fff3e0">PySerial, RPi.GPIO, paho-mqtt</text>
  </g>

  <g id="step2" class="step" data-narration="On Windows, download from python.org, run the installer, check 'Add Python to PATH', and click Install Now. Verify with python --version in Command Prompt.">
    <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Installation by Platform</text>
    <rect x="30" y="210" width="230" height="125" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="145" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Windows</text>
    <text x="50" y="252" font-size="10" fill="#555">1. Download from python.org</text>
    <text x="50" y="268" font-size="10" fill="#555">2. Run installer</text>
    <text x="50" y="284" font-size="10" fill="#e91e63" font-weight="bold">3. Check "Add to PATH"</text>
    <text x="50" y="300" font-size="10" fill="#555">4. Click Install Now</text>
    <text x="50" y="320" font-size="10" fill="#1976d2">Verify: python --version</text>
  </g>

  <g id="step3" class="step" data-narration="On macOS, install Homebrew first, then run brew install python. Verify the installation with python3 --version in Terminal.">
    <rect x="280" y="210" width="230" height="125" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="395" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">macOS</text>
    <text x="300" y="252" font-size="10" fill="#555">1. Install Homebrew</text>
    <text x="300" y="268" font-size="10" fill="#555">2. brew update</text>
    <text x="300" y="284" font-size="10" fill="#555">3. brew install python</text>
    <text x="300" y="320" font-size="10" fill="#388e3c">Verify: python3 --version</text>
  </g>

  <g id="step4" class="step" data-narration="On Linux and Raspberry Pi, use sudo apt update followed by sudo apt install python3. Most Linux distros include Python pre-installed. Verify with python3 --version.">
    <rect x="530" y="210" width="240" height="125" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="650" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Linux / Raspberry Pi</text>
    <text x="550" y="252" font-size="10" fill="#555">1. sudo apt update</text>
    <text x="550" y="268" font-size="10" fill="#555">2. sudo apt install python3</text>
    <text x="550" y="284" font-size="10" fill="#555">3. Often pre-installed</text>
    <text x="550" y="320" font-size="10" fill="#ff9800">Verify: python3 --version</text>
  </g>

  <g id="step5" class="step" data-narration="After installing Python, set up pip for package management. Create virtual environments with python -m venv to isolate project dependencies and prevent conflicts.">
    <text x="400" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Post-Installation Setup</text>
    <rect x="30" y="380" width="230" height="75" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="145" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">pip (Package Manager)</text>
    <text x="145" y="423" text-anchor="middle" font-size="10" fill="#555">pip install paho-mqtt</text>
    <text x="145" y="440" text-anchor="middle" font-size="10" fill="#555">pip install RPi.GPIO</text>
    <rect x="280" y="380" width="240" height="75" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="400" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Virtual Environments</text>
    <text x="400" y="423" text-anchor="middle" font-size="10" fill="#555">python -m venv myenv</text>
    <text x="400" y="440" text-anchor="middle" font-size="10" fill="#555">Isolate project dependencies</text>
    <rect x="540" y="380" width="230" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="655" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">IDE Setup</text>
    <text x="655" y="423" text-anchor="middle" font-size="10" fill="#555">VS Code, Thonny, IDLE</text>
    <text x="655" y="440" text-anchor="middle" font-size="10" fill="#555">Python extensions</text>
  </g>

  <g id="step6" class="step" data-narration="For IoT-specific setup, install key packages like paho-mqtt for messaging, pyserial for serial communication, and RPi.GPIO for Raspberry Pi hardware control.">
    <text x="400" y="485" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Essential IoT Packages to Install</text>
    <rect x="50" y="500" width="155" height="40" rx="6" fill="#1976d2"/>
    <text x="127" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="white">paho-mqtt</text>
    <rect x="220" y="500" width="140" height="40" rx="6" fill="#388e3c"/>
    <text x="290" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="white">pyserial</text>
    <rect x="375" y="500" width="140" height="40" rx="6" fill="#ff9800"/>
    <text x="445" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="white">RPi.GPIO</text>
    <rect x="530" y="500" width="115" height="40" rx="6" fill="#e91e63"/>
    <text x="587" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="white">requests</text>
    <rect x="660" y="500" width="100" height="40" rx="6" fill="#9c27b0"/>
    <text x="710" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="white">flask</text>
  </g>

  <g id="step7" class="step" data-narration="Key takeaway: always use Python 3.x, add to PATH during installation, use virtual environments for project isolation, and install IoT-specific packages via pip.">
    <rect x="100" y="560" width="600" height="28" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="400" y="579" text-anchor="middle" font-size="11" fill="#555">Use Python 3.x | Add to PATH | Virtual environments | pip install IoT packages</text>
  </g>
</svg>
