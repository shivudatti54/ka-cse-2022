<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">IoT Design Methodology - 7 Steps</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="The IoT design methodology provides a structured 7-step framework for building IoT solutions, from defining requirements to final deployment.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">Systematic flow from concept to deployment</text>
  </g>

  <g id="step1" class="step" data-narration="Step 1: Define the system purpose, identify stakeholders, and specify functional and non-functional requirements such as scalability, security, and power consumption.">
    <rect x="30" y="80" width="160" height="65" rx="8" fill="#1976d2"/>
    <text x="110" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1. Purpose &amp;</text>
    <text x="110" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Requirements</text>
    <text x="110" y="138" text-anchor="middle" font-size="9" fill="#bbdefb">Goals, stakeholders</text>
    <line x1="190" y1="112" x2="220" y2="112" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step2" class="step" data-narration="Step 2: Process specification describes system behavior abstractly using Data Flow Diagrams to show how data moves from sensors through processing to actions.">
    <rect x="220" y="80" width="160" height="65" rx="8" fill="#388e3c"/>
    <text x="300" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="white">2. Process</text>
    <text x="300" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Specification</text>
    <text x="300" y="138" text-anchor="middle" font-size="9" fill="#c8e6c9">Data Flow Diagrams</text>
    <line x1="380" y1="112" x2="410" y2="112" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step3" class="step" data-narration="Step 3: Domain model identifies key entities like sensors, gateways, and cloud services, their properties, and relationships using UML class diagrams.">
    <rect x="410" y="80" width="160" height="65" rx="8" fill="#ff9800"/>
    <text x="490" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="white">3. Domain Model</text>
    <text x="490" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Specification</text>
    <text x="490" y="138" text-anchor="middle" font-size="9" fill="#fff3e0">Entities, relationships</text>
    <line x1="570" y1="112" x2="600" y2="112" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step4" class="step" data-narration="Step 4: Information model defines data schemas, formats like JSON, metadata, and semantics to ensure all components interpret exchanged data correctly.">
    <rect x="600" y="80" width="170" height="65" rx="8" fill="#e91e63"/>
    <text x="685" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="white">4. Information</text>
    <text x="685" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Model Spec</text>
    <text x="685" y="138" text-anchor="middle" font-size="9" fill="#fce4ec">Schema, semantics</text>
    <line x1="685" y1="145" x2="685" y2="175" stroke="#e91e63" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step5" class="step" data-narration="Step 5: Service specification defines software services including device management, data ingestion, storage, analytics, and API services following microservices patterns.">
    <rect x="540" y="175" width="170" height="65" rx="8" fill="#9c27b0"/>
    <text x="625" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="white">5. Service</text>
    <text x="625" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Specification</text>
    <text x="625" y="233" text-anchor="middle" font-size="9" fill="#e1bee7">APIs, microservices</text>
    <line x1="540" y1="207" x2="510" y2="207" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step6" class="step" data-narration="Step 6: IoT level specification determines system complexity from Level 1 single device local storage to Level 6 large-scale cloud-coordinated systems with fog nodes.">
    <rect x="330" y="175" width="180" height="65" rx="8" fill="#00897b"/>
    <text x="420" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="white">6. IoT Level Spec</text>
    <text x="420" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">(Levels 1-6)</text>
    <text x="420" y="233" text-anchor="middle" font-size="9" fill="#b2dfdb">Complexity, deployment</text>
    <line x1="330" y1="207" x2="300" y2="207" stroke="#00897b" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step7" class="step" data-narration="Step 7: Functional view specifies concrete hardware, protocols like MQTT and CoAP, cloud platforms like AWS IoT, databases, and visualization tools for implementation.">
    <rect x="80" y="175" width="220" height="65" rx="8" fill="#1565c0"/>
    <text x="190" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="white">7. Functional View Spec</text>
    <text x="190" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">(Implementation Blueprint)</text>
    <text x="190" y="233" text-anchor="middle" font-size="9" fill="#bbdefb">HW, protocols, cloud</text>
  </g>

  <g id="step8" class="step" data-narration="IoT systems range from Level 1 with a single local device to Level 6 with global cloud-coordinated networks. Level 4 adds fog/edge processing between devices and cloud.">
    <text x="400" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">IoT Levels Overview</text>
    <line x1="60" y1="285" x2="740" y2="285" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="30" y="295" width="115" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="87" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Level 1</text>
    <text x="87" y="330" text-anchor="middle" font-size="9" fill="#555">Single device</text>
    <text x="87" y="345" text-anchor="middle" font-size="9" fill="#555">Local storage</text>
    <rect x="155" y="295" width="115" height="60" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="212" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Level 2</text>
    <text x="212" y="330" text-anchor="middle" font-size="9" fill="#555">Single device</text>
    <text x="212" y="345" text-anchor="middle" font-size="9" fill="#555">Cloud storage</text>
    <rect x="280" y="295" width="115" height="60" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="337" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Level 3</text>
    <text x="337" y="330" text-anchor="middle" font-size="9" fill="#555">Multi-device</text>
    <text x="337" y="345" text-anchor="middle" font-size="9" fill="#555">Cloud analytics</text>
    <rect x="405" y="295" width="115" height="60" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="462" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Level 4</text>
    <text x="462" y="330" text-anchor="middle" font-size="9" fill="#555">+ Fog/Edge</text>
    <text x="462" y="345" text-anchor="middle" font-size="9" fill="#555">preprocessing</text>
    <rect x="530" y="295" width="115" height="60" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="587" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">Level 5</text>
    <text x="587" y="330" text-anchor="middle" font-size="9" fill="#555">Fog + Cloud</text>
    <text x="587" y="345" text-anchor="middle" font-size="9" fill="#555">coordination</text>
    <rect x="655" y="295" width="115" height="60" rx="6" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5"/>
    <text x="712" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#00897b">Level 6</text>
    <text x="712" y="330" text-anchor="middle" font-size="9" fill="#555">Large-scale</text>
    <text x="712" y="345" text-anchor="middle" font-size="9" fill="#555">WAN + cloud</text>
  </g>

  <g id="step9" class="step" data-narration="Python plays a key role across all IoT layers: MicroPython for devices, Raspberry Pi scripts for gateways, Flask and Lambda for cloud, and Pandas for analytics.">
    <text x="400" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Python in IoT Development</text>
    <line x1="60" y1="400" x2="740" y2="400" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="30" y="410" width="170" height="70" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="115" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Device Layer</text>
    <text x="115" y="450" text-anchor="middle" font-size="10" fill="#555">MicroPython, GPIO</text>
    <text x="115" y="465" text-anchor="middle" font-size="10" fill="#555">Sensors, actuators</text>
    <rect x="215" y="410" width="170" height="70" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="300" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Gateway Layer</text>
    <text x="300" y="450" text-anchor="middle" font-size="10" fill="#555">Raspberry Pi scripts</text>
    <text x="300" y="465" text-anchor="middle" font-size="10" fill="#555">Local aggregation</text>
    <rect x="400" y="410" width="170" height="70" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="485" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Cloud Layer</text>
    <text x="485" y="450" text-anchor="middle" font-size="10" fill="#555">Flask, AWS Lambda</text>
    <text x="485" y="465" text-anchor="middle" font-size="10" fill="#555">REST APIs, storage</text>
    <rect x="585" y="410" width="185" height="70" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="677" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">Analytics Layer</text>
    <text x="677" y="450" text-anchor="middle" font-size="10" fill="#555">Pandas, NumPy</text>
    <text x="677" y="465" text-anchor="middle" font-size="10" fill="#555">PySpark, dashboards</text>
  </g>

  <g id="step10" class="step" data-narration="Key exam tip: memorize the 7 steps in order. Distinguish Domain Model (entities) from Information Model (data schema). Know IoT Levels 1 through 6.">
    <rect x="100" y="505" width="600" height="55" rx="8" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="400" y="528" text-anchor="middle" font-size="12" font-weight="bold" fill="#37474f">Key Exam Focus</text>
    <text x="400" y="548" text-anchor="middle" font-size="11" fill="#555">7 Steps: Purpose - Process - Domain - Info - Service - Level - Functional View</text>
  </g>
</svg>
