  <text x="50" y="50" font-size="24" font-family="Arial" fill="#000" data-narration="802.15.4g and IEEE 802.15.4e Overview">802.15.4g and IEEE 802.15.4e</text>
  <text x="50" y="120" font-size="18" font-family="Arial" fill="#000" data-narration="Key Features - Higher Data Rates">Higher Data Rates: Supports data transfer rates up to 20 Mbps</text>
  <text x="50" y="180" font-size="18" font-family="Arial" fill="#000" data-narration="Key Features - Increased Range">Increased Range: Supports longer ranges, up to 100 m</text>
  <text x="50" y="240" font-size="18" font-family="Arial" fill="#000" data-narration="Key Features - Improved Interoperability">Improved Interoperability: Supports interoperability between different devices and networks</text>
  <text x="50" y="300" font-size="18" font-family="Arial" fill="#000" data-narration="IEEE 1901.2a Overview">IEEE 1901.2a Overview</text>
  <text x="50" y="370" font-size="18" font-family="Arial" fill="#000" data-narration="Key Features - Mesh Networking">Mesh Networking: Allows for the creation of a mesh network, where devices can communicate with each other directly</text>
  <text x="50" y="420" font-size="18" font-family="Arial" fill="#000" data-narration="IEEE 802.11ah Overview">IEEE 802.11ah Overview</text>
  <text x="50" y="490" font-size="18" font-family="Arial" fill="#000" data-narration="Key Features - Low Power Consumption">Low Power Consumption: Designed to consume low power, making it suitable for IoT devices</text>
