<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="chapter-2-introduction-to-iot">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2E6CE" stop-opacity="1"/>
      <stop offset="50%" stop-color="#E8F1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2E6CE" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction to IoT">
    <g transform="translate(20, 20)">
      <text text-anchor="middle" x="200" y="50" font-size="24" font-family="Arial, sans-serif" fill="#3498DB">
        Chapter 2: Introduction to IoT
      </text>
    </g>
  </section>
  
  <!-- Genesis of IoT Section -->
  <section data-narration="Genesis of IoT">
    <g transform="translate(20, 120)">
      <rect x="0" y="0" width="200" height="30" fill="#F5F5F5"/>
      <text text-anchor="left" x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">
        Ubiquitous Computing
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="-1s"/>
      <g transform="translate(220, 120)">
        <rect x="0" y="0" width="200" height="30" fill="#F5F5F5"/>
        <text text-anchor="left" x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">
          1990s
        </text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="-1s"/>
      </g>
    </g>
  </section>
  
  <!-- IoT Digitization Section -->
  <section data-narration="IoT Digitization">
    <g transform="translate(20, 200)">
      <rect x="0" y="0" width="200" height="30" fill="#F5F5F5"/>
      <text text-anchor="left" x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">
        Hardware Digitization
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="-1s"/>
      <g transform="translate(220, 200)">
        <rect x="0" y="0" width="200" height="30" fill="#F5F5F5"/>
        <text text-anchor="left" x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">
          Software Digitization
        </text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="-1s"/>
      </g>
    </g>
  </section>
  
  <!-- IoT Impact Section -->
  <section data-narration="IoT Impact">
    <g transform="translate(20, 280)">
      <rect x="0" y="0" width="200" height="30" fill="#F5F5F5"/>
      <text text-anchor="left" x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">
        Increased Efficiency
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="-1s"/>
      <g transform="translate(220, 280)">
        <rect x="0" y="0" width="200" height="30" fill="#F5F5F5"/>
        <text text-anchor="left" x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">
        Improved Decision-Making
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="-1s"/>
      <g transform="translate(220, 300)">
        <rect x="0" y="0" width="200" height="30" fill="#F5F5F5"/>
        <text text-anchor="left" x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">
        Enhanced Customer Experience
        </text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="-1s"/>
      </g>
    </g>
  </section>
  
  <!-- Converge IT and OT Section -->
  <section data-narration="Converge IT and OT">
    <g transform="translate(20, 360)">
      <rect x="0" y="0" width="200" height="30" fill="#F5F5F5"/>
      <text text-anchor="left" x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#333">
        Integration of IT and OT Systems
      </text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" begin="-1s"/>
    </g>
  </section>
  
  <!-- Arrow Markers -->
  <line x1="50" y1="0" x2="200" y2="0" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="0" x2="0" y2="200" stroke="#333" stroke-width="2"/>
  <line x1="200" y1="0" x2="350" y2="0" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="200" x2="0" y2="350" stroke="#333" stroke-width="2"/>
  
  <!-- Footer -->
  <text text-anchor="center" x="210" y="380" font-size="16" font-family="Arial, sans-serif" fill="#333">
    Chapter 2: Introduction to IoT
  </text>
</svg>