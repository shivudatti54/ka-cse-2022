<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>IoT Network Architecture and Design</title>
  <desc>IoT Network Architecture and Design</desc>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A0E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start">IoT Network Architecture and Design</text>
    <rect x="10" y="50" width="100" height="20" fill="#3498DB" rx="5"/>
    <text x="10" y="60" font-size="14" font-family="Arial" text-anchor="start">Drivers Behind</text>
    <text x="10" y="80" font-size="14" font-family="Arial" text-anchor="start" data-narration="Scalability">Scalability</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="-1s"/>
    <line x1="120" y1="80" x2="220" y2="80" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="150" cy="80" r="10" fill="#E74C3C"/>
    <text x="150" y="80" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Real-time data processing">Real-time data processing</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s"/>
    <line x1="120" y1="120" x2="220" y2="120" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="150" cy="120" r="10" fill="#E74C3C"/>
    <text x="150" y="120" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Security">Security</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="-1s"/>
    <line x1="120" y1="160" x2="220" y2="160" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="150" cy="160" r="10" fill="#E74C3C"/>
    <text x="150" y="160" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Interoperability">Interoperability</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s"/>
    <line x1="120" y1="200" x2="220" y2="200" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="150" cy="200" r="10" fill="#E74C3C"/>
    <text x="150" y="200" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Cloud-centric architecture">Cloud-centric architecture</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="-1s"/>
    <line x1="120" y1="240" x2="220" y2="240" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="150" cy="240" r="10" fill="#E74C3C"/>
    <text x="150" y="240" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Device-centric architecture">Device-centric architecture</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s"/>
    <line x1="120" y1="280" x2="220" y2="280" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="150" cy="280" r="10" fill="#E74C3C"/>
    <text x="150" y="280" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Gateway-centric architecture">Gateway-centric architecture</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="-1s"/>
    <line x1="120" y1="320" x2="220" y2="320" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="150" cy="320" r="10" fill="#E74C3C"/>
    <text x="150" y="320" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Hub-centric architecture">Hub-centric architecture</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s"/>
  </g>
  <g transform="translate(10, 350)">
    <rect width="400" height="50" fill="#2C3E50" rx="5"/>
    <text x="10" y="360" font-size="14" font-family="Arial" text-anchor="start">Table 1: Comparison of IoT Architectures</text>
    <rect x="10" y="380" width="100" height="20" fill="#3498DB" rx="5"/>
    <text x="10" y="390" font-size="14" font-family="Arial" text-anchor="start">IoT Architecture          | Description                        | Strengths                                            | Weaknesses                                                |
    <rect x="120" y="380" width="300" height="20" fill="#3498DB" rx="5"/>
    <text x="120" y="390" font-size="14" font-family="Arial" text-anchor="start" data-topic-id="device-centric">Device-centric architecture         | Centered around individual devices      | Scalability, Real-time data processing, Security, Interoperability</text>
    <rect x="120" y="410" width="300" height="20" fill="#3498DB" rx="5"/>
    <text x="120" y="420" font-size="14" font-family="Arial" text-anchor="start" data-topic-id="gateway-centric">Gateway-centric architecture        | Centered around gateways              | Scalability, Real-time data processing, Security, Interoperability</text>
    <rect x="120" y="450" width="300" height="20" fill="#3498DB" rx="5"/>
    <text x="120" y="460" font-size="14" font-family="Arial" text-anchor="start" data-topic-id="hub-centric">Hub-centric architecture          | Centered around hubs                 | Scalability, Real-time data processing, Security, Interoperability</text>
    <rect x="120" y="490" width="300" height="20" fill="#3498DB" rx="5"/>
    <text x="120" y="500" font-size="14" font-family="Arial" text-anchor="start" data-topic-id="cloud-centric">Cloud-centric architecture         | Centered around the cloud          | Scalability, Real-time data processing, Security, Interoperability</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="-1s"/>
    <line x1="120" y1="550" x2="320" y2="550" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="250" cy="550" r="10" fill="#E74C3C"/>
    <text x="250" y="550" font-size="14" font-family="Arial" text-anchor="middle" data-narration="Cloud-centric architecture has the most interoperability benefits but requires more infrastructure and security measures to support it." data-topic-id="cloud-centric">Cloud-centric architecture has the most interoperability benefits but requires more infrastructure and security measures to support it.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s"/>
  </g>
</svg>