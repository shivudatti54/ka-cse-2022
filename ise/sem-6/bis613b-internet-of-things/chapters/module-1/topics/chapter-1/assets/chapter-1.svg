<svg width="420" height="400" data-topic-id="chapter-1">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A2E9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)"/>
  <text x="50" y="20" font-size="24" font-family="Arial" fill="#2F4F7F">Chapter 1: Introduction to IoT</text>
  <section data-narration="genesis-of-iot">
    <rect x="50" y="100" width="320" height="50" fill="#F7DC6F" rx="10"/>
    <text x="60" y="110" font-size="18" font-family="Arial" fill="#2F4F7F">Genesis of IoT</text>
    <animateTransform attributeName="transform" type="translate" from="0,100" to="0,120" dur="2s" begin="1s"/>
    <text x="60" y="130" font-size="14" font-family="Arial" fill="#2F4F7F">Key Milestones:</text>
    <text x="60" y="140" font-size="14" font-family="Arial" fill="#2F4F7F">1999: Kevin Ashton uses the term "Internet of Things"</text>
    <text x="60" y="150" font-size="14" font-family="Arial" fill="#2F4F7F">2005: The term "Machine-to-Machine" (M2M) is widely adopted</text>
    <text x="60" y="160" font-size="14" font-family="Arial" fill="#2F4F7F">2010: The International Telecommunication Union (ITU) defines the IoT</text>
    <line x1="120" y1="120" x2="260" y2="120" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3"/>
  </section>
  <section data-narration="iot-digitization">
    <rect x="50" y="220" width="320" height="50" fill="#F7DC6F" rx="10"/>
    <text x="60" y="230" font-size="18" font-family="Arial" fill="#2F4F7F">IoT Digitization</text>
    <animateTransform attributeName="transform" type="translate" from="0,220" to="0,240" dur="2s" begin="2s"/>
    <text x="60" y="250" font-size="14" font-family="Arial" fill="#2F4F7F">Device Connectivity:</text>
    <text x="60" y="260" font-size="14" font-family="Arial" fill="#2F4F7F">The ability of devices to connect to the internet and communicate with each other</text>
    <text x="60" y="270" font-size="14" font-family="Arial" fill="#2F4F7F">Data Generation:</text>
    <text x="60" y="280" font-size="14" font-family="Arial" fill="#2F4F7F">The creation of digital data from physical devices and systems</text>
    <line x1="120" y1="240" x2="260" y2="240" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3"/>
  </section>
  <section data-narration="iot-impact">
    <rect x="50" y="310" width="320" height="50" fill="#F7DC6F" rx="10"/>
    <text x="60" y="320" font-size="18" font-family="Arial" fill="#2F4F7F">IoT Impact</text>
    <animateTransform attributeName="transform" type="translate" from="0,310" to="0,330" dur="2s" begin="4s"/>
    <text x="60" y="340" font-size="14" font-family="Arial" fill="#2F4F7F">Economic Impact:</text>
    <text x="60" y="350" font-size="14" font-family="Arial" fill="#2F4F7F">Job Creation, Increased Efficiency</text>
    <text x="60" y="360" font-size="14" font-family="Arial" fill="#2F4F7F">Social Impact:</text>
    <text x="60" y="370" font-size="14" font-family="Arial" fill="#2F4F7F">Improved Quality of Life, Environmental Impact</text>
    <line x1="120" y1="330" x2="260" y2="330" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3"/>
  </section>
  <footer>
    <text x="50" y="380" font-size="18" font-family="Arial" fill="#2F4F7F">Chapter 1: Introduction to IoT</text>
  </footer>
</svg>