<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="challenges">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="card-grad-indigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="card-grad-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="card-grad-orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF6C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="card-grad-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <style>
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      @keyframes dashFlow {
        to { stroke-dashoffset: -12; }
      }
      @keyframes scaleUp {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      .g1 { animation: fadeSlideIn 0.6s 0.3s ease-out both; }
      .g2 { animation: fadeSlideIn 0.6s 1.5s ease-out both; }
      .g3 { animation: fadeSlideIn 0.6s 3.0s ease-out both; }
      .g4 { animation: fadeSlideIn 0.6s 4.5s ease-out both; }
      .g5 { animation: fadeSlideIn 0.6s 6.0s ease-out both; }
      .g6 { animation: fadeSlideIn 0.6s 7.5s ease-out both; }
      .dash-flow { animation: dashFlow 0.8s linear infinite; }
      .pulse { animation: pulseGlow 2.5s ease-in-out infinite; }
      .icon-bounce { animation: scaleUp 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bg-grad)" rx="12"/>

  <!-- ============================================ -->
  <!-- GROUP 1: Title & Central Hub (0.3s)          -->
  <!-- ============================================ -->
  <g class="g1" data-narration="A distributed system faces six core challenges. These emerge from connecting independent computers into one coherent system.">
    <!-- Title -->
    <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3949AB">Challenges in Distributed Systems</text>

    <!-- Central hub circle -->
    <circle cx="210" cy="200" r="42" fill="#3949AB" opacity="0.12" class="pulse"/>
    <circle cx="210" cy="200" r="30" fill="#3949AB" opacity="0.22"/>
    <text x="210" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#fff">Distributed</text>
    <text x="210" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#fff">System</text>

    <!-- Connector lines (dashed, animated) -->
    <!-- Top-left: Heterogeneity -->
    <line x1="185" y1="176" x2="117" y2="108" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="4,4" class="dash-flow" opacity="0.5"/>
    <!-- Top-right: Concurrency -->
    <line x1="235" y1="176" x2="303" y2="108" stroke="#00695C" stroke-width="1.2" stroke-dasharray="4,4" class="dash-flow" opacity="0.5"/>
    <!-- Mid-left: Security -->
    <line x1="180" y1="200" x2="115" y2="220" stroke="#E65100" stroke-width="1.2" stroke-dasharray="4,4" class="dash-flow" opacity="0.5"/>
    <!-- Mid-right: Scalability -->
    <line x1="240" y1="200" x2="305" y2="220" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="4,4" class="dash-flow" opacity="0.5"/>
    <!-- Bottom-left: Failure -->
    <line x1="190" y1="226" x2="117" y2="325" stroke="#C62828" stroke-width="1.2" stroke-dasharray="4,4" class="dash-flow" opacity="0.5"/>
    <!-- Bottom-right: Transparency -->
    <line x1="230" y1="226" x2="303" y2="325" stroke="#00695C" stroke-width="1.2" stroke-dasharray="4,4" class="dash-flow" opacity="0.5"/>
  </g>

  <!-- ============================================ -->
  <!-- GROUP 2: Heterogeneity (1.5s) top-left       -->
  <!-- ============================================ -->
  <g class="g2" data-narration="Heterogeneity: distributed systems combine different hardware, OSes, networks, and languages. Standard protocols and middleware solve this.">
    <rect x="22" y="52" width="130" height="68" rx="8" fill="url(#card-grad-indigo)" opacity="0.92"/>
    <!-- Gear icon -->
    <g transform="translate(42, 72)" class="icon-bounce">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="3" fill="#fff"/>
      <line x1="0" y1="-8" x2="0" y2="-11" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="8" x2="0" y2="11" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="-11" y2="0" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="0" x2="11" y2="0" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="60" y="70" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">Heterogeneity</text>
    <text x="60" y="82" font-family="monospace" font-size="6.5" fill="#C5CAE9">HW + OS + Network</text>
    <text x="60" y="93" font-family="monospace" font-size="6.5" fill="#C5CAE9">+ Languages</text>
    <!-- Solution tag -->
    <rect x="30" y="104" width="114" height="13" rx="3" fill="#fff" opacity="0.18"/>
    <text x="87" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E8EAF6">Fix: Protocols &amp; Middleware</text>
  </g>

  <!-- ============================================ -->
  <!-- GROUP 3: Concurrency (3.0s) top-right        -->
  <!-- ============================================ -->
  <g class="g3" data-narration="Concurrency: multiple processes access shared resources simultaneously, risking race conditions. Locks and transactions maintain correctness.">
    <rect x="268" y="52" width="130" height="68" rx="8" fill="url(#card-grad-teal)" opacity="0.92"/>
    <!-- Parallel arrows icon -->
    <g transform="translate(288, 72)" class="icon-bounce">
      <line x1="-6" y1="-6" x2="6" y2="-6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="3,-9 6,-6 3,-3" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="6" y1="2" x2="-6" y2="2" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="-3,-1 -6,2 -3,5" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="306" y="70" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">Concurrency</text>
    <text x="306" y="82" font-family="monospace" font-size="6.5" fill="#B2DFDB">Shared resources</text>
    <text x="306" y="93" font-family="monospace" font-size="6.5" fill="#B2DFDB">Race conditions</text>
    <!-- Solution tag -->
    <rect x="276" y="104" width="114" height="13" rx="3" fill="#fff" opacity="0.18"/>
    <text x="333" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E0F2F1">Fix: Locks &amp; Transactions</text>
  </g>

  <!-- ============================================ -->
  <!-- GROUP 4: Security & Scalability (4.5s) mid   -->
  <!-- ============================================ -->
  <g class="g4" data-narration="Security requires confidentiality, integrity, and availability through encryption and authentication. Scalability uses sharding, caching, and replication to handle growth.">
    <!-- Security card (left) -->
    <rect x="16" y="178" width="118" height="68" rx="8" fill="url(#card-grad-orange)" opacity="0.92"/>
    <!-- Shield icon -->
    <g transform="translate(36, 198)" class="icon-bounce">
      <path d="M0-10 L8-5 L8,4 Q0,11 0,11 Q0,11 -8,4 L-8-5 Z" fill="none" stroke="#fff" stroke-width="1.3"/>
      <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fff" font-weight="bold">!</text>
    </g>
    <text x="52" y="196" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">Security</text>
    <text x="52" y="208" font-family="monospace" font-size="6.5" fill="#FFE0B2">CIA triad</text>
    <text x="52" y="219" font-family="monospace" font-size="6.5" fill="#FFE0B2">Auth + Encryption</text>
    <rect x="24" y="228" width="102" height="13" rx="3" fill="#fff" opacity="0.18"/>
    <text x="75" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#FFF3E0">Fix: TLS, OAuth, Kerberos</text>

    <!-- Scalability card (right) -->
    <rect x="286" y="178" width="118" height="68" rx="8" fill="url(#card-grad-indigo)" opacity="0.92"/>
    <!-- Scale-up icon (stacked bars) -->
    <g transform="translate(306, 200)" class="icon-bounce">
      <rect x="-8" y="2" width="5" height="8" rx="1" fill="#fff" opacity="0.7"/>
      <rect x="-2" y="-2" width="5" height="12" rx="1" fill="#fff" opacity="0.85"/>
      <rect x="4" y="-7" width="5" height="17" rx="1" fill="#fff"/>
    </g>
    <text x="322" y="196" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">Scalability</text>
    <text x="322" y="208" font-family="monospace" font-size="6.5" fill="#C5CAE9">Vertical + Horizontal</text>
    <text x="322" y="219" font-family="monospace" font-size="6.5" fill="#C5CAE9">Avoid bottlenecks</text>
    <rect x="294" y="228" width="102" height="13" rx="3" fill="#fff" opacity="0.18"/>
    <text x="345" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E8EAF6">Fix: Shard, Cache, Replicate</text>
  </g>

  <!-- ============================================ -->
  <!-- GROUP 5: Failure Handling (6.0s) bottom-left  -->
  <!-- ============================================ -->
  <g class="g5" data-narration="Failure handling addresses partial failures where one node crashes while others run. Heartbeats, replication, and logging ensure fault tolerance and recovery.">
    <rect x="22" y="285" width="130" height="68" rx="8" fill="url(#card-grad-red)" opacity="0.92"/>
    <!-- Warning triangle icon -->
    <g transform="translate(44, 306)" class="icon-bounce">
      <polygon points="0,-10 10,7 -10,7" fill="none" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/>
      <line x1="0" y1="-4" x2="0" y2="1" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="0" cy="4" r="1" fill="#fff"/>
    </g>
    <text x="62" y="303" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">Failure Handling</text>
    <text x="62" y="315" font-family="monospace" font-size="6.5" fill="#FFCDD2">Partial failure</text>
    <text x="62" y="326" font-family="monospace" font-size="6.5" fill="#FFCDD2">Fault tolerance</text>
    <rect x="30" y="337" width="114" height="13" rx="3" fill="#fff" opacity="0.18"/>
    <text x="87" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#FFEBEE">Fix: Heartbeats &amp; Replication</text>
  </g>

  <!-- ============================================ -->
  <!-- GROUP 6: Transparency (7.5s) bottom-right     -->
  <!-- ============================================ -->
  <g class="g6" data-narration="Transparency hides complexity so a distributed system appears as one machine. Types include access, location, concurrency, replication, failure, and migration transparency.">
    <rect x="268" y="285" width="130" height="68" rx="8" fill="url(#card-grad-teal)" opacity="0.92"/>
    <!-- Eye icon -->
    <g transform="translate(290, 306)" class="icon-bounce">
      <ellipse cx="0" cy="0" rx="10" ry="6" fill="none" stroke="#fff" stroke-width="1.3"/>
      <circle cx="0" cy="0" r="3.5" fill="#fff" opacity="0.9"/>
      <circle cx="0" cy="0" r="1.5" fill="#00695C"/>
    </g>
    <text x="308" y="303" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">Transparency</text>
    <text x="308" y="315" font-family="monospace" font-size="6.5" fill="#B2DFDB">Access, Location</text>
    <text x="308" y="326" font-family="monospace" font-size="6.5" fill="#B2DFDB">Replication, Failure</text>
    <rect x="276" y="337" width="114" height="13" rx="3" fill="#fff" opacity="0.18"/>
    <text x="333" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E0F2F1">Goal: Single-system image</text>
  </g>

  <!-- ============================================ -->
  <!-- Footer: Fallacies reminder                    -->
  <!-- ============================================ -->
  <g class="g6">
    <rect x="60" y="372" width="300" height="18" rx="5" fill="#3949AB" opacity="0.10"/>
    <text x="210" y="384" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB" opacity="0.7">8 Fallacies: network != reliable, latency != 0, bandwidth != infinite ...</text>
  </g>
</svg>