<svg width="420" height="400" data-topic-id="phased-application-of-security-in-an-operation">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title at top -->
  <g transform="translate(10, 10)">
    <text text-anchor="start" x="0" y="20" font-size="24" font-family="Arial" fill="#6c5ce7">
      <tspan data-narration="1" style="font-weight: bold;">The Phased Application of Security in an Operational Environment</tspan>
    </text>
  </g>

  <!-- Section 1: Introduction -->
  <g transform="translate(20, 50)">
    <rect width="380" height="50" fill="#f0f0f0" rx="10"/>
    <g transform="rotate(90) translate(-10, 25)">
      <text text-anchor="start" x="0" y="0" font-size="18" font-family="Arial" fill="#6c5ce7" data-narration="2">
        The Internet of Things (IoT) has revolutionized the way we live and work, connecting devices and systems to create a more efficient and automated operational environment.
      </text>
    </g>
  </g>

  <!-- Section 2: Benefits of Phased Application of Security -->
  <g transform="translate(20, 120)">
    <rect width="380" height="50" fill="#f0f0f0" rx="10"/>
    <g transform="rotate(90) translate(-10, 25)">
      <text text-anchor="start" x="0" y="0" font-size="18" font-family="Arial" fill="#6c5ce7" data-narration="3">
        The phased application of security offers several benefits, including reduced costs, improved effectiveness, and enhanced organization.
      </text>
    </g>
  </g>

  <!-- Section 3: Phased Application of Security Steps -->
  <g transform="translate(20, 180)">
    <rect width="380" height="50" fill="#f0f0f0" rx="10"/>
    <g transform="rotate(90) translate(-10, 25)">
      <text text-anchor="start" x="0" y="0" font-size="18" font-family="Arial" fill="#6c5ce7" data-narration="4">
        The phased application of security typically involves the following steps:
        <tspan data-narration="5">Phase 1: Network Segmentation</tspan>
        <tspan data-narration="6">Phase 2: Device Hardening</tspan>
        <tspan data-narration="7">Phase 3: Access Control</tspan>
        <tspan data-narration="8">Phase 4: Monitoring and Incident Response</tspan>
      </text>
    </g>
  </g>

  <!-- Section 4: Importance of Phased Application of Security -->
  <g transform="translate(20, 240)">
    <rect width="380" height="50" fill="#f0f0f0" rx="10"/>
    <g transform="rotate(90) translate(-10, 25)">
      <text text-anchor="start" x="0" y="0" font-size="18" font-family="Arial" fill="#6c5ce7" data-narration="9">
        The phased application of security is crucial in today's operational environment, where devices and systems are constantly connected and vulnerable to attacks.
      </text>
    </g>
  </g>

  <!-- Section 5: Conclusion -->
  <g transform="translate(20, 300)">
    <rect width="380" height="50" fill="#f0f0f0" rx="10"/>
    <g transform="rotate(90) translate(-10, 25)">
      <text text-anchor="start" x="0" y="0" font-size="18" font-family="Arial" fill="#6c5ce7" data-narration="10">
        In conclusion, the phased application of security is a critical component of any operational environment, offering numerous benefits and ensuring the security and efficiency of devices and systems.
      </text>
    </g>
  </g>

  <!-- Section 6: Call to Action -->
  <g transform="translate(20, 350)">
    <rect width="380" height="50" fill="#f0f0f0" rx="10"/>
    <g transform="rotate(90) translate(-10, 25)">
      <text text-anchor="start" x="0" y="0" font-size="18" font-family="Arial" fill="#6c5ce7" data-narration="11">
        Implement the phased application of security in your operational environment today and safeguard your devices and systems against cyber threats.
      </text>
    </g>
  </g>

  <!-- Footer at bottom -->
  <g transform="translate(10, 400)">
    <text text-anchor="start" x="0" y="0" font-size="18" font-family="Arial" fill="#6c5ce7">
      <tspan data-narration="12">Learn more about the phased application of security in our resources section.</tspan>
    </text>
  </g>

  <!-- Arrow markers for connections -->
  <g transform="translate(50, 200)">
    <line x1="0" y1="0" x2="10" y2="0" stroke="#3b5998" stroke-width="2"/>
    <line x1="10" y1="0" x2="20" y2="0" stroke="#3b5998" stroke-width="2"/>
  </g>

  <!-- Animated sections -->
  <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="10s" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="40,0" dur="10s" begin="10s"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="60,0" dur="10s" begin="20s"/>
</svg>