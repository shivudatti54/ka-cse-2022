<svg width="420" height="400" data-topic-id="formal-risk-analysis-structures-otave-and-fair">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="40" fill="url(#pastel-gradient)" rx="10" />
    <text x="15" y="25" fill="#2E4053" font-size="18" font-family="Arial, sans-serif">
      Formal Risk Analysis Structures
    </text>
    <text x="15" y="55" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
      OT-Analytical Tool for Evaluating Vulnerabilities (OTAVE) and Fault-Infected Risk Estimation (FAIR)
    </text>
  </section>

  <!-- OT-Analytical Tool for Evaluating Vulnerabilities (OTAVE) Section -->
  <section data-narration="OT-Analytical Tool for Evaluating Vulnerabilities (OTAVE)">
    <rect x="10" y="70" width="400" height="120" fill="url(#pastel-gradient)" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 160" to="360 200 160" dur="5s" begin="0s" repeatCount="indefinite" />
    <g transform="translate(200 160)">
      <path d="M 10, 20 L 410, 20" stroke="#87CEEB" stroke-width="2" stroke-linecap="round" />
      <text x="15" y="60" fill="#2E4053" font-size="16" font-family="Arial, sans-serif">
        Vulnerability Identification
      </text>
      <text x="15" y="90" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
        Risk Assessment
      </text>
      <text x="15" y="130" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
        Risk Mitigation
      </text>
    </g>
  </section>

  <!-- Fault-Infected Risk Estimation (FAIR) Section -->
  <section data-narration="Fault-Infected Risk Estimation (FAIR)">
    <rect x="10" y="190" width="400" height="120" fill="url(#pastel-gradient)" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 160" to="360 200 160" dur="5s" begin="0s" repeatCount="indefinite" />
    <g transform="translate(200 160)">
      <path d="M 10, 20 L 410, 20" stroke="#87CEEB" stroke-width="2" stroke-linecap="round" />
      <text x="15" y="60" fill="#2E4053" font-size="16" font-family="Arial, sans-serif">
        Risk Assessment
      </text>
      <text x="15" y="90" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
        Fault-Infected Risk Estimation (FAIR)
      </text>
      <text x="15" y="130" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
        Mitigation Strategies
      </text>
    </g>
  </section>

  <!-- Arrow Markers -->
  <path d="M 10, 20 L 30, 40" stroke="#87CEEB" stroke-width="2" stroke-linecap="round" fill="none" />
  <path d="M 70, 20 L 90, 40" stroke="#87CEEB" stroke-width="2" stroke-linecap="round" fill="none" />
  <path d="M 130, 20 L 150, 40" stroke="#87CEEB" stroke-width="2" stroke-linecap="round" fill="none" />
  <path d="M 190, 20 L 210, 40" stroke="#87CEEB" stroke-width="2" stroke-linecap="round" fill="none" />

  <!-- Footer Section -->
  <footer>
    <rect x="10" y="300" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="15" y="310" fill="#2E4053" font-size="14" font-family="Arial, sans-serif">
      Created by [Your Name]
    </text>
  </footer>
