<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="systems-vary">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949AB"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="mqGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>
    <linearGradient id="semGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C62828"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
    <linearGradient id="shmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/>
      <stop offset="100%" style="stop-color:#004D40"/>
    </linearGradient>
  </defs>

  <rect width="420" height="400" fill="url(#bg)" rx="12"/>

  <!-- ===== GROUP 1: Title and Kernel Core (0.3s) ===== -->
  <g data-narration="System V IPC provides three inter-process communication mechanisms managed by the kernel: Message Queues, Semaphores, and Shared Memory." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>

    <!-- Title -->
    <text x="210" y="26" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3949AB">System V IPC Architecture</text>
    <text x="210" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#5C6BC0">Inter-Process Communication via Kernel</text>

    <!-- Central Kernel Box -->
    <rect x="135" y="52" width="150" height="40" fill="url(#kernelGrad)" rx="8" stroke="#1A237E" stroke-width="1.5"/>
    <text x="210" y="70" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">KERNEL</text>
    <text x="210" y="83" text-anchor="middle" font-family="monospace" font-size="9" fill="#B3E5FC">ftok() + IPC identifiers</text>

    <!-- Key generation annotation -->
    <text x="300" y="63" font-family="monospace" font-size="8" fill="#3949AB">key_t key =</text>
    <text x="300" y="73" font-family="monospace" font-size="8" fill="#3949AB">ftok(path, id);</text>
  </g>

  <!-- ===== GROUP 2: Three IPC Mechanism Boxes (1.5s) ===== -->
  <g data-narration="Message Queues use msgget, msgsnd, and msgrcv for structured message passing. Semaphores use semget and semop for synchronization. Shared Memory uses shmget and shmat for direct memory access." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>

    <!-- Connecting lines from kernel to IPC boxes -->
    <line x1="170" y1="92" x2="75" y2="115" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="210" y1="92" x2="210" y2="115" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="250" y1="92" x2="345" y2="115" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2"/>

    <!-- Message Queues Box -->
    <rect x="15" y="115" width="120" height="72" fill="url(#mqGrad)" rx="6" stroke="#BF360C" stroke-width="1"/>
    <text x="75" y="132" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Message Queues</text>
    <text x="75" y="147" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFCC80">msgget(key, flg)</text>
    <text x="75" y="159" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFCC80">msgsnd() / msgrcv()</text>
    <text x="75" y="171" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFCC80">msgctl(IPC_RMID)</text>
    <!-- Message icon -->
    <rect x="21" y="177" width="8" height="5" fill="#FFCC80" rx="1" opacity="0.6"/>
    <rect x="31" y="177" width="8" height="5" fill="#FFCC80" rx="1" opacity="0.4"/>

    <!-- Semaphores Box -->
    <rect x="150" y="115" width="120" height="72" fill="url(#semGrad)" rx="6" stroke="#B71C1C" stroke-width="1"/>
    <text x="210" y="132" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Semaphores</text>
    <text x="210" y="147" text-anchor="middle" font-family="monospace" font-size="8" fill="#EF9A9A">semget(key, n, flg)</text>
    <text x="210" y="159" text-anchor="middle" font-family="monospace" font-size="8" fill="#EF9A9A">semop() P/V ops</text>
    <text x="210" y="171" text-anchor="middle" font-family="monospace" font-size="8" fill="#EF9A9A">semctl(SETVAL)</text>
    <!-- Lock icon -->
    <circle cx="157" cy="180" r="3" fill="none" stroke="#EF9A9A" stroke-width="1" opacity="0.6"/>
    <rect x="154" y="180" width="6" height="4" fill="#EF9A9A" rx="1" opacity="0.6"/>

    <!-- Shared Memory Box -->
    <rect x="285" y="115" width="120" height="72" fill="url(#shmGrad)" rx="6" stroke="#004D40" stroke-width="1"/>
    <text x="345" y="132" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Shared Memory</text>
    <text x="345" y="147" text-anchor="middle" font-family="monospace" font-size="8" fill="#A5D6A7">shmget(key, sz, flg)</text>
    <text x="345" y="159" text-anchor="middle" font-family="monospace" font-size="8" fill="#A5D6A7">shmat() / shmdt()</text>
    <text x="345" y="171" text-anchor="middle" font-family="monospace" font-size="8" fill="#A5D6A7">shmctl(IPC_RMID)</text>
    <!-- Memory grid icon -->
    <rect x="291" y="177" width="5" height="5" fill="#A5D6A7" rx="0.5" opacity="0.5"/>
    <rect x="298" y="177" width="5" height="5" fill="#A5D6A7" rx="0.5" opacity="0.4"/>
    <rect x="305" y="177" width="5" height="5" fill="#A5D6A7" rx="0.5" opacity="0.3"/>
  </g>

  <!-- ===== GROUP 3: IPC Permissions Structure (3.0s) ===== -->
  <g data-narration="Every IPC object has an ipc_perm structure containing owner UID, GID, creator IDs, and permission mode bits similar to file permissions like 0644." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.0s" fill="freeze"/>

    <!-- Permissions panel -->
    <rect x="15" y="198" width="188" height="68" fill="white" rx="5" stroke="#3949AB" stroke-width="1" opacity="0.9"/>
    <text x="109" y="213" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">ipc_perm Structure</text>

    <!-- Fields -->
    <text x="25" y="228" font-family="monospace" font-size="8" fill="#E65100">uid_t uid</text>
    <text x="95" y="228" font-family="monospace" font-size="8" fill="#E65100">gid_t gid</text>
    <text x="25" y="241" font-family="monospace" font-size="8" fill="#C62828">uid_t cuid</text>
    <text x="95" y="241" font-family="monospace" font-size="8" fill="#C62828">gid_t cgid</text>
    <text x="25" y="256" font-family="monospace" font-size="8" fill="#00695C">mode_t mode = 0644</text>

    <!-- Permission visual -->
    <rect x="140" y="246" width="16" height="12" fill="#3949AB" rx="2"/>
    <text x="148" y="255" text-anchor="middle" font-family="monospace" font-size="7" fill="white">rw</text>
    <rect x="158" y="246" width="12" height="12" fill="#5C6BC0" rx="2"/>
    <text x="164" y="255" text-anchor="middle" font-family="monospace" font-size="7" fill="white">r</text>
    <rect x="172" y="246" width="12" height="12" fill="#7986CB" rx="2"/>
    <text x="178" y="255" text-anchor="middle" font-family="monospace" font-size="7" fill="white">r</text>
  </g>

  <!-- ===== GROUP 4: Process Communication Flow (4.5s) ===== -->
  <g data-narration="Processes communicate through IPC: Process A sends a message to the queue, Process B receives it. Both use the same key from ftok to access the same IPC object." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>

    <!-- Process A -->
    <rect x="218" y="198" width="82" height="32" fill="#3949AB" rx="5"/>
    <text x="259" y="218" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Process A</text>

    <!-- Process B -->
    <rect x="318" y="198" width="82" height="32" fill="#3949AB" rx="5"/>
    <text x="359" y="218" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Process B</text>

    <!-- Animated message flow A to B -->
    <line x1="300" y1="214" x2="318" y2="214" stroke="#E65100" stroke-width="2" marker-end="url(#arrowOrange)"/>

    <!-- Message envelope traveling -->
    <rect x="302" y="209" width="10" height="8" fill="#E65100" rx="2">
      <animate attributeName="x" values="302;310;302" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </rect>

    <!-- Label -->
    <text x="309" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#E65100">msgsnd/msgrcv</text>

    <!-- Shared memory arrow below -->
    <path d="M259 230 L259 240 L359 240 L359 230" fill="none" stroke="#00695C" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="309" y="250" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">shared memory segment</text>

    <!-- Pulsing shared region -->
    <rect x="270" y="234" width="78" height="4" fill="#00695C" rx="2" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== GROUP 5: Producer-Consumer Pattern (6.0s) ===== -->
  <g data-narration="The producer-consumer pattern uses shared memory for data transfer and semaphores for synchronization. The producer writes data and signals the consumer with a V operation; the consumer waits with a P operation then reads." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze"/>

    <!-- Producer-Consumer flow -->
    <rect x="15" y="278" width="390" height="58" fill="white" rx="6" stroke="#3949AB" stroke-width="1" opacity="0.85"/>
    <text x="210" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Producer-Consumer Pattern</text>

    <!-- Producer -->
    <rect x="25" y="300" width="68" height="28" fill="#E65100" rx="4"/>
    <text x="59" y="318" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Producer</text>

    <!-- Arrow: write -->
    <line x1="93" y1="314" x2="115" y2="314" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="115,311 121,314 115,317" fill="#E65100"/>
    <text x="107" y="308" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100">write</text>

    <!-- Shared Memory block -->
    <rect x="122" y="300" width="72" height="28" fill="#00695C" rx="4"/>
    <text x="158" y="313" text-anchor="middle" font-family="monospace" font-size="8" fill="white">SHM</text>
    <text x="158" y="323" text-anchor="middle" font-family="monospace" font-size="7" fill="#A5D6A7">data = 42</text>

    <!-- Animated pulse on SHM -->
    <rect x="122" y="300" width="72" height="28" fill="none" rx="4" stroke="#A5D6A7" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite" begin="6.5s"/>
    </rect>

    <!-- Semaphore in between -->
    <rect x="206" y="300" width="56" height="28" fill="#C62828" rx="4"/>
    <text x="234" y="313" text-anchor="middle" font-family="monospace" font-size="8" fill="white">SEM</text>
    <text x="234" y="323" text-anchor="middle" font-family="monospace" font-size="7" fill="#EF9A9A">P / V</text>

    <!-- Signal arrow -->
    <line x1="194" y1="314" x2="206" y2="314" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="204,311 210,314 204,317" fill="#C62828"/>
    <text x="200" y="308" text-anchor="middle" font-family="monospace" font-size="6" fill="#C62828">V</text>

    <!-- Arrow: read -->
    <line x1="262" y1="314" x2="280" y2="314" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="278,311 284,314 278,317" fill="#00695C"/>
    <text x="273" y="308" text-anchor="middle" font-family="monospace" font-size="6" fill="#C62828">P</text>

    <!-- Consumer -->
    <rect x="285" y="300" width="68" height="28" fill="#3949AB" rx="4"/>
    <text x="319" y="318" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Consumer</text>

    <!-- Read arrow from consumer to shm -->
    <path d="M319 328 C319 340 158 340 158 328" fill="none" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="238" y="346" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">read via shmat()</text>

    <!-- Signal label -->
    <text x="370" y="318" font-family="monospace" font-size="7" fill="#3949AB">sync</text>
    <text x="370" y="328" font-family="monospace" font-size="7" fill="#3949AB">via sem</text>
  </g>

  <!-- ===== GROUP 6: Comparison Summary (7.5s) ===== -->
  <g data-narration="In summary: Message Queues offer structured communication at medium speed. Semaphores provide fast synchronization with high complexity. Shared Memory is the fastest IPC but needs external synchronization. All persist until explicitly removed." opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="7.5s" fill="freeze"/>

    <!-- Comparison table -->
    <rect x="15" y="352" width="390" height="40" fill="white" rx="5" stroke="#3949AB" stroke-width="1" opacity="0.85"/>

    <!-- Headers -->
    <text x="65" y="366" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100">Msg Queues</text>
    <text x="163" y="366" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Semaphores</text>
    <text x="267" y="366" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C">Shared Mem</text>
    <text x="365" y="366" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">Pipes</text>

    <!-- Speed row -->
    <text x="65" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Medium speed</text>
    <text x="163" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Fast sync</text>
    <text x="267" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Very fast</text>
    <text x="365" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Slow</text>

    <!-- Dividers -->
    <line x1="114" y1="356" x2="114" y2="388" stroke="#C5CAE9" stroke-width="0.5"/>
    <line x1="216" y1="356" x2="216" y2="388" stroke="#C5CAE9" stroke-width="0.5"/>
    <line x1="320" y1="356" x2="320" y2="388" stroke="#C5CAE9" stroke-width="0.5"/>

    <!-- Persist badge -->
    <text x="210" y="396" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB" font-style="italic">All System V IPC objects persist until explicitly removed (IPC_RMID) or system reboot</text>
  </g>
</svg>