      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" />
  
  <!-- Title -->
  <text x="20" y="20" font-size="30" font-family="Arial" fill="#6495ED" text-anchor="left">
    Public Safety
  </text>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(20, 60)">
    <rect width="200" height="20" fill="#FFFFFF" rx="5" />
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#000000" text-anchor="left">
      Introduction
    </text>
    <animate transform="translate(10, 30)" begin="0s" duration="2s" repeatCount="indefinite" />
  </g>
  <g data-narration="The Internet of Things has transformed the way public safety is managed...">
    <line x1="220" y1="60" x2="220" y2="100" stroke="#6495ED" stroke-width="2" />
    <line x1="220" y1="60" x2="200" y2="100" stroke="#87CEEB" stroke-width="2" />
  </g>
  
  <!-- Section 2: What is OT Security -->
  <g transform="translate(20, 120)">
    <rect width="200" height="20" fill="#FFFFFF" rx="5" />
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#000000" text-anchor="left">
      What is OT Security?
    </text>
    <animate transform="translate(10, 30)" begin="2s" duration="2s" repeatCount="indefinite" />
  </g>
  <g data-narration="Definition: Operational Technology (OT) security refers to the security practices and protocols...">
    <line x1="220" y1="140" x2="220" y2="180" stroke="#6495ED" stroke-width="2" />
    <line x1="220" y1="140" x2="200" y2="180" stroke="#87CEEB" stroke-width="2" />
  </g>
  
  <!-- Section 3: Common Challenges in OT Security -->
  <g transform="translate(20, 200)">
    <rect width="200" height="20" fill="#FFFFFF" rx="5" />
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#000000" text-anchor="left">
      Common Challenges in OT Security
    </text>
    <animate transform="translate(10, 30)" begin="4s" duration="2s" repeatCount="indefinite" />
  </g>
  <g data-narration="Different OT systems and devices have varying security protocols and standards...">
    <line x1="220" y1="220" x2="220" y2="260" stroke="#6495ED" stroke-width="2" />
    <line x1="220" y1="220" x2="200" y2="260" stroke="#87CEEB" stroke-width="2" />
  </g>
  
  <!-- Section 4: Interoperability Issues -->
  <g transform="translate(20, 280)">
    <rect width="200" height="20" fill="#FFFFFF" rx="5" />
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#000000" text-anchor="left">
