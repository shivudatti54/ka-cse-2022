<svg width="420" height="400" data-topic-id="data-analytic-for-iot-introduction-to-data-analytics">
  <title>Data Analytics for IoT: Introduction</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="50" fill="url(#pastel-gradient)"/>
  <g id="section-1">
    <rect x="10" y="70" width="200" height="50" fill="#2F4F7F"/>
    <text x="20" y="30" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="middle">What is Data Analytics for IoT?</text>
    <text x="20" y="100" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="middle">Data analytics for IoT refers to the process of collecting, storing, processing, and analyzing data generated by Internet of Things (IoT) devices.</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="1000" />
  </g>
  <g id="section-2">
    <rect x="220" y="70" width="200" height="50" fill="#2F4F7F"/>
    <text x="230" y="30" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="middle">Importance of Data Analytics for IoT</text>
    <text x="230" y="100" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="middle">- Enables real-time decision-making - Improves operational efficiency - Enhances customer experience - Identifies new business opportunities - Reduces costs and improves resource allocation</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="1500" />
  </g>
  <g id="section-3">
    <rect x="10" y="170" width="200" height="50" fill="#2F4F7F"/>
    <text x="20" y="120" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="middle">Machine Learning for IoT</text>
    <text x="20" y="150" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="middle">Machine learning is a subset of artificial intelligence (AI) that enables IoT devices to learn from data and make predictions or decisions without human intervention.</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="3000" />
  </g>
  <g id="section-4">
    <rect x="220" y="170" width="200" height="50" fill="#2F4F7F"/>
    <text x="230" y="120" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="middle">Big Data Analytics Tools and Technology</text>
    <text x="230" y="150" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="middle">- Hadoop - Spark - NoSQL databases (e.g. MongoDB, Cassandra) - Cloud-based analytics platforms (e.g. AWS, Google Cloud)</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="4500" />
  </g>
  <g id="section-5">
    <rect x="10" y="270" width="200" height="50" fill="#2F4F7F"/>
    <text x="20" y="220" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="middle">Edge Streaming Analytics</text>
    <text x="20" y="250" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="middle">Edge streaming analytics refers to the process of analyzing data in real-time at the edge of the network, i.e. closer to the source of the data.</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="6000" />
  </g>
  <g id="section-6">
    <rect x="220" y="270" width="200" height="50" fill="#2F4F7F"/>
    <text x="230" y="220" fill="#FFFFFF" font-size="18" font-family="Arial" text-anchor="middle">Edge Computing</text>
    <text x="230" y="250" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="middle">Edge computing is a distributed computing paradigm that enables data processing and analysis closer to the source of the data.</text>
    <animate attributeName="opacity" from="1" to="0" dur="2000" begin="7500" />
  </g>
  <text x="10" y="20" fill="#FFFFFF" font-size="24" font-family="Arial" text-anchor="left">Data Analytics for IoT: Introduction</text>
  <rect x="10" y="380" width="400" height="20" fill="#2F4F7F"/>
  <text x="10" y="400" fill="#FFFFFF" font-size="14" font-family="Arial" text-anchor="left">Learn more about Data Analytics for IoT</text>
</svg>