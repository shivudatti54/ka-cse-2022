<svg width="420" height="400" data-topic-id="chapter-6-application-protocols-for-iot-the-transport-layer" xmlns="http://www.w3.org/2000/svg">
  <title>Chapter 6: Application Protocols for IoT: The Transport Layer</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B5998" stop-opacity="1" />
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF9800" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
  <rect x="10" y="10" width="100" height="40" fill="#C7B8EA" rx="5">
    <animateTransform attributeName="transform" type="rotate" from="0 50 20" to="360 50 20" dur="10s" repeatCount="indefinite"/>
  </rect>
  <g id="transport-layer">
    <text x="15" y="50" fill="#000" font-size="24" font-family="Arial" text-anchor="middle">Transport Layer Protocols</text>
    <text x="15" y="70" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Ensures Reliable Data Transfer</text>
    <rect x="20" y="90" width="80" height="40" fill="#A1C9F2" rx="5">
      <animateTransform attributeName="transform" type="translate" from="20 90" to="20 110" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="110" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Connection-Oriented</text>
    <rect x="20" y="150" width="80" height="40" fill="#5C6BC0" rx="5">
      <animateTransform attributeName="transform" type="translate" from="20 150" to="20 170" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="170" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Reliable</text>
    <rect x="20" y="210" width="80" height="40" fill="#3B5998" rx="5">
      <animateTransform attributeName="transform" type="translate" from="20 210" to="20 230" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="230" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Ordered</text>
    <g id="tcp">
      <rect x="50" y="90" width="60" height="40" fill="#A1C9F2" rx="5"/>
      <text x="55" y="110" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">TCP</text>
      <path d="M 50 100 L 110 100" stroke="#000" stroke-width="2" fill="none"/>
      <animateTransform attributeName="transform" type="translate" from="50 90" to="110 90" dur="2s" repeatCount="indefinite"/>
    </g>
    <g id="udp">
      <rect x="50" y="150" width="60" height="40" fill="#5C6BC0" rx="5"/>
      <text x="55" y="170" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">UDP</text>
      <path d="M 50 150 L 110 150" stroke="#000" stroke-width="2" fill="none"/>
      <animateTransform attributeName="transform" type="translate" from="50 140" to="110 140" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
  <rect x="10" y="390" width="400" height="10" fill="#FFC107" rx="5"/>
  <text x="15" y="400" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Chapter 6: Application Protocols for IoT: The Transport Layer</text>
</svg>