<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <title>Internet of Things (IoT) Educational Diagram</title>
    <description>Interactive SVG diagram for IoT architecture and benefits</description>
  </metadata>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(10, 10)">
    <text text-anchor="start" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Internet of Things (IoT)
    </text>
    <section data-topic-id="5.1-introduction-to-iot" data-narration="Introduction to IoT">
      <rect x="20" y="50" width="200" height="30" fill="#FFFFFF" rx="5" />
      <text text-anchor="start" x="20" y="60" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">
        Convergence of Physical and Virtual Worlds
      </text>
      <animate transform="translate(20, 60) rotate(360) rotateX(360)" begin="0s" dur="2s" repeat="repeat" />
      <path d="M 20 60 L 220 60" stroke="#2E4053" stroke-width="2" fill="none" />
    </section>
    <section data-topic-id="5.1-data-generation-and-analysis" data-narration="Data Generation and Analysis">
      <rect x="20" y="90" width="200" height="30" fill="#FFFFFF" rx="5" />
      <text text-anchor="start" x="20" y="100" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">
        Data Generation and Analysis
      </text>
      <animate transform="translate(20, 100) rotate(360) rotateX(360)" begin="2s" dur="2s" repeat="repeat" />
      <path d="M 20 100 L 220 100" stroke="#2E4053" stroke-width="2" fill="none" />
    </section>
    <section data-topic-id="5.2-iot-architecture" data-narration="IoT Architecture">
      <rect x="20" y="130" width="200" height="30" fill="#FFFFFF" rx="5" />
      <text text-anchor="start" x="20" y="140" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">
        IoT Architecture
      </text>
      <animate transform="translate(20, 140) rotate(360) rotateX(360)" begin="4s" dur="2s" repeat="repeat" />
      <path d="M 20 140 L 220 140" stroke="#2E4053" stroke-width="2" fill="none" />
    </section>
    <section data-topic-id="5.2-key-components-of-iot-architecture" data-narration="Key Components of IoT Architecture">
      <rect x="20" y="170" width="200" height="30" fill="#FFFFFF" rx="5" />
      <text text-anchor="start" x="20" y="180" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">
        Sensors, Gateways, Cloud, Applications
      </text>
      <animate transform="translate(20, 180) rotate(360) rotateX(360)" begin="6s" dur="2s" repeat="repeat" />
      <path d="M 20 180 L 220 180" stroke="#2E4053" stroke-width="2" fill="none" />
    </section>
    <section data-topic-id="5.2-iot-communication-protocols" data-narration="IoT Communication Protocols">
      <rect x="20" y="210" width="200" height="30" fill="#FFFFFF" rx="5" />
      <text text-anchor="start" x="20" y="220" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">
        Wireless Sensor Networks, Machine-to-Machine
      </text>
      <animate transform="translate(20, 220) rotate(360) rotateX(360)" begin="8s" dur="2s" repeat="repeat" />
      <path d="M 20 220 L 220 220" stroke="#2E4053" stroke-width="2" fill="none" />
    </section>
    <section data-topic-id="5.2-benefits-of-iot" data-narration="Benefits of IoT">
      <rect x="20" y="250" width="200" height="30" fill="#FFFFFF" rx="5" />
      <text text-anchor="start" x="20" y="260" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">
        Improved Efficiency, Enhanced Customer Experience, Increased Safety and Security
      </text>
      <animate transform="translate(20, 260) rotate(360) rotateX(360)" begin="10s" dur="2s" repeat="repeat" />
      <path d="M 20 260 L 220 260" stroke="#2E4053" stroke-width="2" fill="none" />
    </section>
    <footer>
      <text text-anchor="start" x="10" y="400" font-size="12" font-family="Arial, sans-serif" fill="#2E4053">
        Created with love for educational purposes
      </text>
    </footer>
  </g>
</svg>