<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">IoT in Smart Cities</text>

  <g id="step0" class="step" data-narration="A smart city uses ICT and IoT sensors to enhance citizen quality of life, improve service efficiency, and reduce costs. Core components include infrastructure, transportation, energy, waste management, and public safety systems.">
    <rect x="50" y="55" width="700" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="75" text-anchor="middle" font-size="13" fill="#0d47a1" font-weight="bold">What is a Smart City?</text>
    <text x="400" y="95" text-anchor="middle" font-size="10" fill="#1565c0">Urban area using IoT sensors and data analytics to manage resources and services efficiently</text>
  </g>

  <g id="step1" class="step" data-narration="Smart infrastructure includes both physical assets like roads and bridges and digital assets like broadband networks, sensor arrays, and data centers. This dual layer enables real-time monitoring and management of city systems.">
    <rect x="50" y="120" width="220" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="160" y="142" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">Infrastructure</text>
    <text x="160" y="160" text-anchor="middle" font-size="9" fill="#2e7d32">Physical: roads, bridges</text>
    <text x="160" y="175" text-anchor="middle" font-size="9" fill="#2e7d32">Digital: sensors, networks</text>
    <text x="160" y="190" text-anchor="middle" font-size="8" fill="#388e3c">Data centers + broadband</text>
  </g>

  <g id="step2" class="step" data-narration="Smart transportation uses IoT sensors to monitor traffic flow, optimize signal timing, and reduce congestion. GPS data from vehicles combined with road sensors enables intelligent routing and real-time transit updates.">
    <rect x="290" y="120" width="220" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="142" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">Transportation</text>
    <text x="400" y="160" text-anchor="middle" font-size="9" fill="#bf360c">Traffic flow monitoring</text>
    <text x="400" y="175" text-anchor="middle" font-size="9" fill="#bf360c">Signal optimization</text>
    <text x="400" y="190" text-anchor="middle" font-size="8" fill="#e65100">GPS + road sensors</text>
  </g>

  <g id="step3" class="step" data-narration="Smart energy management monitors consumption with IoT meters, integrates renewable sources, and optimizes distribution through smart grids. This reduces waste and enables demand-response programs for peak load management.">
    <rect x="530" y="120" width="220" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="640" y="142" text-anchor="middle" font-size="10" fill="#4a148c" font-weight="bold">Energy Management</text>
    <text x="640" y="160" text-anchor="middle" font-size="9" fill="#6a1b9a">Smart grid monitoring</text>
    <text x="640" y="175" text-anchor="middle" font-size="9" fill="#6a1b9a">Renewable integration</text>
    <text x="640" y="190" text-anchor="middle" font-size="8" fill="#9c27b0">Demand-response systems</text>
  </g>

  <g id="step4" class="step" data-narration="Smart waste management uses fill-level sensors in bins to optimize collection routes, reducing fuel consumption by up to 40%. IoT alerts notify when bins are full, eliminating unnecessary pickup trips.">
    <rect x="50" y="215" width="220" height="80" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="160" y="237" text-anchor="middle" font-size="10" fill="#880e4f" font-weight="bold">Waste Management</text>
    <text x="160" y="255" text-anchor="middle" font-size="9" fill="#c2185b">Fill-level sensors in bins</text>
    <text x="160" y="270" text-anchor="middle" font-size="9" fill="#c2185b">Optimized collection routes</text>
    <text x="160" y="285" text-anchor="middle" font-size="8" fill="#e91e63">Up to 40% fuel savings</text>
  </g>

  <g id="step5" class="step" data-narration="Public safety systems use IoT cameras, gunshot detectors, and environmental sensors for crime prevention and emergency response. Real-time data enables faster police dispatch and disaster management coordination.">
    <rect x="290" y="215" width="220" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="237" text-anchor="middle" font-size="10" fill="#0d47a1" font-weight="bold">Public Safety</text>
    <text x="400" y="255" text-anchor="middle" font-size="9" fill="#1565c0">Surveillance cameras</text>
    <text x="400" y="270" text-anchor="middle" font-size="9" fill="#1565c0">Emergency response</text>
    <text x="400" y="285" text-anchor="middle" font-size="8" fill="#42a5f5">Real-time crime detection</text>
  </g>

  <g id="step6" class="step" data-narration="Environmental monitoring deploys IoT sensors to track air quality, water quality, noise levels, and weather patterns. This data drives policy decisions on pollution control and public health advisories.">
    <rect x="530" y="215" width="220" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="640" y="237" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">Environment</text>
    <text x="640" y="255" text-anchor="middle" font-size="9" fill="#2e7d32">Air + water quality</text>
    <text x="640" y="270" text-anchor="middle" font-size="9" fill="#2e7d32">Noise monitoring</text>
    <text x="640" y="285" text-anchor="middle" font-size="8" fill="#388e3c">Data-driven policy</text>
  </g>

  <g id="step7" class="step" data-narration="The IoT ecosystem for smart cities has five layers: sensors collect data, communication networks like 5G and LoRaWAN transmit it, cloud platforms process and analyze, applications enable management, and dashboards provide citizen access.">
    <rect x="50" y="310" width="700" height="105" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="400" y="333" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">Smart City IoT Ecosystem</text>
    <rect x="70" y="345" width="120" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="130" y="364" text-anchor="middle" font-size="8" fill="#0d47a1" font-weight="bold">IoT Sensors</text>
    <text x="200" y="364" text-anchor="middle" font-size="10" fill="#999">--></text>
    <rect x="210" y="345" width="120" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="270" y="364" text-anchor="middle" font-size="8" fill="#1b5e20" font-weight="bold">5G / LoRaWAN</text>
    <text x="340" y="364" text-anchor="middle" font-size="10" fill="#999">--></text>
    <rect x="350" y="345" width="120" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="410" y="364" text-anchor="middle" font-size="8" fill="#4a148c" font-weight="bold">Cloud Analytics</text>
    <text x="480" y="364" text-anchor="middle" font-size="10" fill="#999">--></text>
    <rect x="490" y="345" width="120" height="28" rx="4" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
    <text x="550" y="364" text-anchor="middle" font-size="8" fill="#880e4f" font-weight="bold">City Mgmt Apps</text>
    <text x="620" y="364" text-anchor="middle" font-size="10" fill="#999">--></text>
    <rect x="630" y="345" width="100" height="28" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="680" y="364" text-anchor="middle" font-size="8" fill="#e65100" font-weight="bold">Dashboards</text>
    <text x="400" y="400" text-anchor="middle" font-size="9" fill="#666">Sensors --> Networks --> Processing --> Applications --> Citizens</text>
  </g>

  <g id="step8" class="step" data-narration="Examples include Singapore's smart nation initiative for traffic and energy management, Barcelona's IoT-driven waste and water systems, and Copenhagen's focus on environmental sustainability through connected sensors.">
    <rect x="50" y="430" width="700" height="65" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="450" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">Smart City Examples</text>
    <text x="175" y="475" text-anchor="middle" font-size="9" fill="#333">Singapore: Traffic + Energy</text>
    <text x="400" y="475" text-anchor="middle" font-size="9" fill="#333">Barcelona: Waste + Water</text>
    <text x="625" y="475" text-anchor="middle" font-size="9" fill="#333">Copenhagen: Environment</text>
  </g>

  <g id="step9" class="step" data-narration="Key challenges for smart cities include data security and citizen privacy protection, ensuring interoperability between different vendor systems, bridging the digital divide, and managing the environmental footprint of billions of IoT devices.">
    <rect x="50" y="510" width="700" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="400" y="533" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">Key Challenges</text>
    <text x="150" y="558" text-anchor="middle" font-size="9" fill="#333">Data Security</text>
    <text x="300" y="558" text-anchor="middle" font-size="9" fill="#333">Citizen Privacy</text>
    <text x="440" y="558" text-anchor="middle" font-size="9" fill="#333">Interoperability</text>
    <text x="580" y="558" text-anchor="middle" font-size="9" fill="#333">Digital Divide</text>
    <text x="700" y="558" text-anchor="middle" font-size="9" fill="#333">E-Waste</text>
  </g>
</svg>