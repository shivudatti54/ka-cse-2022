<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">What is an IoT Device? - Feature Checklist</text>

  <g id="step0" class="step" data-narration="An IoT device is a physical object enhanced with computing, sensors, and connectivity to collect and share data.">
    <rect x="280" y="140" width="240" height="280" rx="16" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2.5"/>
    <rect x="310" y="165" width="180" height="40" rx="6" fill="#3f51b5"/>
    <text x="400" y="190" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">IoT DEVICE</text>
    <rect x="320" y="220" width="160" height="80" rx="8" fill="#c5cae9" stroke="#5c6bc0" stroke-width="1.5"/>
    <text x="400" y="250" text-anchor="middle" font-size="11" fill="#1a237e" font-weight="bold">Microcontroller</text>
    <text x="400" y="268" text-anchor="middle" font-size="9" fill="#283593">/ Microprocessor</text>
    <text x="400" y="286" text-anchor="middle" font-size="8" fill="#3949ab">(The Brain)</text>
    <rect x="310" y="315" width="80" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="350" y="337" text-anchor="middle" font-size="8" fill="#1b5e20" font-weight="bold">RAM</text>
    <rect x="410" y="315" width="80" height="35" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="450" y="337" text-anchor="middle" font-size="8" fill="#e65100" font-weight="bold">Flash</text>
    <rect x="310" y="360" width="180" height="30" rx="4" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
    <text x="400" y="380" text-anchor="middle" font-size="9" fill="#880e4f" font-weight="bold">GPIO / I2C / SPI / UART</text>
    <text x="400" y="410" text-anchor="middle" font-size="9" fill="#3f51b5">5V or Battery Powered</text>
  </g>

  <g id="step1" class="step" data-narration="Sensing capability allows the device to detect physical changes like temperature, motion, light, and humidity.">
    <line x1="280" y1="200" x2="155" y2="130" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,3"/>
    <ellipse cx="110" cy="110" rx="65" ry="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="110" y="107" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">Sensing</text>
    <text x="110" y="123" text-anchor="middle" font-size="8" fill="#1565c0">Temp, Motion, Light</text>
    <text x="55" y="80" font-size="16" fill="#1976d2">&#x2713;</text>
  </g>

  <g id="step2" class="step" data-narration="Processing power enables onboard data filtering, averaging, and decision-making before sending to cloud.">
    <line x1="280" y1="270" x2="155" y2="230" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
    <ellipse cx="110" cy="215" rx="65" ry="35" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="110" y="212" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">Processing</text>
    <text x="110" y="228" text-anchor="middle" font-size="8" fill="#bf360c">Filter, Average, Decide</text>
    <text x="55" y="185" font-size="16" fill="#ff9800">&#x2713;</text>
  </g>

  <g id="step3" class="step" data-narration="Connectivity enables the device to transmit data via WiFi, Bluetooth, Zigbee, LoRaWAN, or cellular networks.">
    <line x1="280" y1="340" x2="155" y2="340" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,3"/>
    <ellipse cx="110" cy="330" rx="65" ry="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="110" y="325" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Connectivity</text>
    <text x="110" y="341" text-anchor="middle" font-size="8" fill="#2e7d32">WiFi, BLE, LoRa, 5G</text>
    <text x="55" y="300" font-size="16" fill="#388e3c">&#x2713;</text>
  </g>

  <g id="step4" class="step" data-narration="Low power operation is critical for battery-operated field devices that must run for months or years.">
    <line x1="280" y1="400" x2="155" y2="440" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5,3"/>
    <ellipse cx="110" cy="440" rx="65" ry="35" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="110" y="437" text-anchor="middle" font-size="11" fill="#4a148c" font-weight="bold">Low Power</text>
    <text x="110" y="453" text-anchor="middle" font-size="8" fill="#6a1b9a">Battery, Solar, Sleep</text>
    <text x="55" y="412" font-size="16" fill="#9c27b0">&#x2713;</text>
  </g>

  <g id="step5" class="step" data-narration="Actuation allows the device to perform physical actions like switching relays, moving motors, or triggering alerts.">
    <line x1="520" y1="200" x2="630" y2="130" stroke="#e91e63" stroke-width="2" stroke-dasharray="5,3"/>
    <ellipse cx="680" cy="115" rx="65" ry="35" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="680" y="112" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold">Actuation</text>
    <text x="680" y="128" text-anchor="middle" font-size="8" fill="#c2185b">Relay, Motor, LED</text>
    <text x="735" y="88" font-size="16" fill="#e91e63">&#x2713;</text>
  </g>

  <g id="step6" class="step" data-narration="Cost-effectiveness enables mass deployment. Simple IoT sensors cost just a few dollars each.">
    <line x1="520" y1="300" x2="630" y2="240" stroke="#ff5722" stroke-width="2" stroke-dasharray="5,3"/>
    <ellipse cx="680" cy="225" rx="65" ry="35" fill="#fbe9e7" stroke="#ff5722" stroke-width="2"/>
    <text x="680" y="222" text-anchor="middle" font-size="11" fill="#bf360c" font-weight="bold">Cost-Effective</text>
    <text x="680" y="238" text-anchor="middle" font-size="8" fill="#d84315">$1-50 per device</text>
    <text x="735" y="198" font-size="16" fill="#ff5722">&#x2713;</text>
  </g>

  <g id="step7" class="step" data-narration="IoT devices sit at the perception layer of the 4-layer IoT architecture, generating data from the physical world.">
    <rect x="540" y="280" width="240" height="145" rx="10" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="660" y="305" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">IoT Architecture Layers</text>
    <rect x="560" y="315" width="200" height="22" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="660" y="331" text-anchor="middle" font-size="9" fill="#4a148c">Application (Dashboard)</text>
    <rect x="560" y="342" width="200" height="22" rx="4" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
    <text x="660" y="358" text-anchor="middle" font-size="9" fill="#880e4f">Processing (Cloud/Edge)</text>
    <rect x="560" y="369" width="200" height="22" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="660" y="385" text-anchor="middle" font-size="9" fill="#1b5e20">Network (Protocols)</text>
    <rect x="560" y="396" width="200" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="660" y="412" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Perception (IoT Devices)</text>
  </g>

  <g id="step8" class="step" data-narration="Examples include smart bulbs, fitness trackers, industrial vibration sensors, and agricultural soil probes.">
    <rect x="120" y="510" width="560" height="70" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="535" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">IoT Device Examples</text>
    <text x="200" y="558" text-anchor="middle" font-size="9" fill="#333">Consumer: Smart bulbs</text>
    <text x="340" y="558" text-anchor="middle" font-size="9" fill="#333">Industrial: Vibration sensors</text>
    <text x="500" y="558" text-anchor="middle" font-size="9" fill="#333">Agri: Soil moisture probes</text>
    <text x="620" y="558" text-anchor="middle" font-size="9" fill="#333">Health: Wearables</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>