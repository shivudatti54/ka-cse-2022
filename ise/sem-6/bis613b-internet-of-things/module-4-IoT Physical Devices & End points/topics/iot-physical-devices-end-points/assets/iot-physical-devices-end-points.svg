<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">IoT Physical Devices &amp; Endpoints - Network</text>

  <g id="step0" class="step" data-narration="IoT endpoints are physical devices like sensors and actuators that connect to gateways and cloud services.">
    <text x="400" y="60" text-anchor="middle" font-size="12" fill="#666">Network topology showing how endpoints connect to the IoT ecosystem</text>
  </g>

  <g id="step1" class="step" data-narration="Sensors detect physical phenomena like temperature, humidity, motion, and pressure, generating raw data.">
    <circle cx="100" cy="160" r="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="100" y="155" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Temp</text>
    <text x="100" y="168" text-anchor="middle" font-size="8" fill="#1565c0">Sensor</text>
    <circle cx="100" cy="290" r="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="100" y="285" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Motion</text>
    <text x="100" y="298" text-anchor="middle" font-size="8" fill="#1565c0">PIR</text>
    <circle cx="100" cy="420" r="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="100" y="415" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Humidity</text>
    <text x="100" y="428" text-anchor="middle" font-size="8" fill="#1565c0">Sensor</text>
    <text x="100" y="120" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">Sensors</text>
  </g>

  <g id="step2" class="step" data-narration="Actuators perform physical actions like switching relays, moving motors, and controlling valves based on commands.">
    <rect x="65" y="490" width="70" height="50" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="100" y="515" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold">Relay</text>
    <text x="100" y="528" text-anchor="middle" font-size="8" fill="#bf360c">Actuator</text>
    <rect x="165" y="490" width="70" height="50" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="515" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold">Motor</text>
    <text x="200" y="528" text-anchor="middle" font-size="8" fill="#bf360c">Actuator</text>
    <text x="150" y="560" text-anchor="middle" font-size="11" fill="#ff9800" font-weight="bold">Actuators</text>
  </g>

  <g id="step3" class="step" data-narration="An IoT gateway aggregates data from nearby sensors using protocols like Zigbee, BLE, or Wi-Fi.">
    <line x1="135" y1="160" x2="270" y2="250" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="135" y1="290" x2="270" y2="280" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="135" y1="420" x2="270" y2="310" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="135" y1="510" x2="270" y2="320" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="200" y1="500" x2="270" y2="330" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3"/>
    <rect x="260" y="220" width="130" height="130" rx="14" fill="#e8f5e9" stroke="#388e3c" stroke-width="2.5"/>
    <text x="325" y="260" text-anchor="middle" font-size="13" fill="#1b5e20" font-weight="bold">Gateway</text>
    <text x="325" y="280" text-anchor="middle" font-size="10" fill="#2e7d32">Raspberry Pi</text>
    <text x="325" y="298" text-anchor="middle" font-size="9" fill="#388e3c">Protocol</text>
    <text x="325" y="312" text-anchor="middle" font-size="9" fill="#388e3c">Translation</text>
    <text x="325" y="330" text-anchor="middle" font-size="8" fill="#4caf50">Zigbee/BLE/WiFi</text>
  </g>

  <g id="step4" class="step" data-narration="The gateway sends aggregated data over the internet to cloud platforms for storage and processing.">
    <line x1="390" y1="285" x2="470" y2="285" stroke="#388e3c" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <ellipse cx="530" cy="285" rx="55" ry="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="530" y="275" text-anchor="middle" font-size="10" fill="#0d47a1" font-weight="bold">Internet</text>
    <text x="530" y="293" text-anchor="middle" font-size="9" fill="#1565c0">TCP/IP</text>
    <text x="530" y="308" text-anchor="middle" font-size="8" fill="#42a5f5">MQTT/HTTP</text>
  </g>

  <g id="step5" class="step" data-narration="Cloud platforms like AWS IoT and Azure IoT Hub store, process, and analyze massive streams of device data.">
    <line x1="585" y1="285" x2="630" y2="285" stroke="#1976d2" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <path d="M 645 265 Q 660 230 690 235 Q 720 228 730 250 Q 755 245 755 270 Q 770 275 760 295 Q 765 315 740 318 Q 730 335 700 330 Q 670 340 660 318 Q 635 320 635 295 Q 625 280 645 265 Z" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="700" y="278" text-anchor="middle" font-size="11" fill="#4a148c" font-weight="bold">Cloud</text>
    <text x="700" y="295" text-anchor="middle" font-size="9" fill="#6a1b9a">AWS IoT</text>
    <text x="700" y="310" text-anchor="middle" font-size="8" fill="#9c27b0">Store + Process</text>
  </g>

  <g id="step6" class="step" data-narration="Users access IoT data through mobile apps, web dashboards, and voice assistants for monitoring and control.">
    <line x1="700" y1="340" x2="700" y2="390" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="640" y="395" width="120" height="60" rx="10" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="700" y="420" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold">Dashboard</text>
    <text x="700" y="438" text-anchor="middle" font-size="9" fill="#c2185b">Mobile / Web App</text>
    <text x="700" y="450" text-anchor="middle" font-size="8" fill="#e91e63">Voice Assistant</text>
  </g>

  <g id="step7" class="step" data-narration="IoT endpoints have four key characteristics: sensing capability, processing power, connectivity, and low power.">
    <rect x="270" y="400" width="320" height="100" rx="10" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="430" y="425" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">IoT Endpoint Characteristics</text>
    <circle cx="310" cy="465" r="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="310" y="470" text-anchor="middle" font-size="8" fill="#0d47a1" font-weight="bold">Sense</text>
    <circle cx="380" cy="465" r="18" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="380" y="470" text-anchor="middle" font-size="8" fill="#e65100" font-weight="bold">Process</text>
    <circle cx="450" cy="465" r="18" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="450" y="470" text-anchor="middle" font-size="8" fill="#1b5e20" font-weight="bold">Connect</text>
    <circle cx="520" cy="465" r="18" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="520" y="463" text-anchor="middle" font-size="8" fill="#4a148c" font-weight="bold">Low</text>
    <text x="520" y="474" text-anchor="middle" font-size="7" fill="#6a1b9a">Power</text>
  </g>

  <g id="step8" class="step" data-narration="Device types include sensors, actuators, microcontrollers, gateways, and wearables, each serving specific roles.">
    <rect x="270" y="520" width="320" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="430" y="542" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">Device Types: Sensors | Actuators | MCUs</text>
    <text x="430" y="558" text-anchor="middle" font-size="10" fill="#2e7d32">Gateways | Wearables | Smart Appliances</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>