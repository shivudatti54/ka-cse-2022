<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">Introduction to the Internet of Things</text>
  <line x1="200" y1="46" x2="600" y2="46" stroke="#1565c0" stroke-width="2" opacity="0.3"/>

  <!-- Step 0: What is IoT -->
  <g id="step0" class="step" data-narration="The Internet of Things, or IoT, is the network of physical objects embedded with sensors, software, and connectivity to exchange data over the internet.">
    <rect x="150" y="65" width="500" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="10"/>
    <text x="400" y="92" text-anchor="middle" font-size="17" font-weight="bold" fill="#1565c0">What is IoT?</text>
    <text x="400" y="115" text-anchor="middle" font-size="13" fill="#333">Connecting physical objects to the internet for</text>
    <text x="400" y="130" text-anchor="middle" font-size="13" fill="#333">data collection, analysis, and automation</text>
  </g>

  <!-- Step 1: Physical Design - Hardware Components -->
  <g id="step1" class="step" data-narration="The physical design involves hardware: sensors detect environment changes, microcontrollers process data, actuators perform actions, and communication modules connect to the network.">
    <text x="400" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">Physical Design — Hardware Components</text>
    <rect x="40" y="182" width="130" height="55" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="105" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Sensors</text>
    <text x="105" y="222" text-anchor="middle" font-size="10" fill="#555">LM35, PIR, LDR</text>
    <rect x="210" y="182" width="130" height="55" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="275" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Microcontroller</text>
    <text x="275" y="222" text-anchor="middle" font-size="10" fill="#555">Arduino, ESP32</text>
    <rect x="380" y="182" width="130" height="55" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    <text x="445" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#c2185b">Actuators</text>
    <text x="445" y="222" text-anchor="middle" font-size="10" fill="#555">Motor, Relay, LED</text>
    <rect x="550" y="182" width="155" height="55" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="627" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">Communication</text>
    <text x="627" y="222" text-anchor="middle" font-size="10" fill="#555">Wi-Fi, BLE, LoRa</text>
  </g>

  <!-- Step 2: IoT Data Flow -->
  <g id="step2" class="step" data-narration="Data flows in a loop: the environment triggers a sensor, which sends data to the microcontroller, which commands the actuator, which acts on the environment.">
    <text x="400" y="268" text-anchor="middle" font-size="15" font-weight="bold" fill="#d84315">IoT Data Flow Cycle</text>
    <rect x="60" y="280" width="120" height="44" fill="#ffebee" stroke="#f44336" stroke-width="1.5" rx="6"/>
    <text x="120" y="307" text-anchor="middle" font-size="12" fill="#c62828">Environment</text>
    <polygon points="192,302 205,296 205,308" fill="#f44336"/>
    <line x1="180" y1="302" x2="205" y2="302" stroke="#f44336" stroke-width="2"/>
    <rect x="215" y="280" width="100" height="44" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="6"/>
    <text x="265" y="307" text-anchor="middle" font-size="12" fill="#2e7d32">Sensor</text>
    <polygon points="327,302 340,296 340,308" fill="#388e3c"/>
    <line x1="315" y1="302" x2="340" y2="302" stroke="#388e3c" stroke-width="2"/>
    <rect x="350" y="280" width="120" height="44" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="6"/>
    <text x="410" y="307" text-anchor="middle" font-size="12" fill="#e65100">Microcontroller</text>
    <polygon points="482,302 495,296 495,308" fill="#ff9800"/>
    <line x1="470" y1="302" x2="495" y2="302" stroke="#ff9800" stroke-width="2"/>
    <rect x="505" y="280" width="100" height="44" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" rx="6"/>
    <text x="555" y="307" text-anchor="middle" font-size="12" fill="#c2185b">Actuator</text>
    <polygon points="617,302 630,296 630,308" fill="#e91e63"/>
    <line x1="605" y1="302" x2="630" y2="302" stroke="#e91e63" stroke-width="2"/>
    <rect x="640" y="280" width="110" height="44" fill="#ffebee" stroke="#f44336" stroke-width="1.5" rx="6"/>
    <text x="695" y="307" text-anchor="middle" font-size="12" fill="#c62828">Environment</text>
    <path d="M 695 324 Q 695 345 400 345 Q 120 345 120 324" fill="none" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="400" y="358" text-anchor="middle" font-size="10" fill="#757575" font-style="italic">feedback loop</text>
  </g>

  <!-- Step 3: Logical Design - Functional Blocks -->
  <g id="step3" class="step" data-narration="The logical design defines six functional blocks: Device, Communication, Services, Management, Application, and Security, which cuts across all layers.">
    <text x="400" y="390" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">Logical Design — 6 Functional Blocks</text>
    <rect x="40" y="402" width="105" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="6"/>
    <text x="92" y="426" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Device</text>
    <rect x="155" y="402" width="125" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="6"/>
    <text x="217" y="426" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Communication</text>
    <rect x="290" y="402" width="105" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="6"/>
    <text x="342" y="426" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Services</text>
    <rect x="405" y="402" width="115" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="6"/>
    <text x="462" y="426" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Management</text>
    <rect x="530" y="402" width="110" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="6"/>
    <text x="585" y="426" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Application</text>
    <rect x="650" y="402" width="105" height="38" fill="#ffcdd2" stroke="#e53935" stroke-width="2" rx="6"/>
    <text x="702" y="426" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Security</text>
  </g>

  <!-- Step 4: Communication Models -->
  <g id="step4" class="step" data-narration="IoT uses four communication models. Request-Response like HTTP, Publish-Subscribe like MQTT which is most important for IoT, Push-Pull, and Exclusive Pair like WebSockets.">
    <text x="195" y="468" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a1b9a">Communication Models</text>
    <rect x="40" y="478" width="145" height="28" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="5"/>
    <text x="112" y="497" text-anchor="middle" font-size="11" fill="#6a1b9a">Request-Response</text>
    <text x="112" y="520" text-anchor="middle" font-size="9" fill="#888">(HTTP)</text>
    <rect x="195" y="478" width="145" height="28" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2" rx="5"/>
    <text x="267" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="#283593">Publish-Subscribe</text>
    <text x="267" y="520" text-anchor="middle" font-size="9" fill="#3f51b5">(MQTT — Key for IoT)</text>
  </g>

  <!-- Step 5: Push-Pull and Exclusive Pair -->
  <g id="step5" class="step" data-narration="Push-Pull decouples producers and consumers using a queue, like ZeroMQ. Exclusive Pair provides a full-duplex channel like WebSockets.">
    <rect x="40" y="530" width="145" height="28" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="5"/>
    <text x="112" y="549" text-anchor="middle" font-size="11" fill="#6a1b9a">Push-Pull</text>
    <text x="112" y="570" text-anchor="middle" font-size="9" fill="#888">(ZeroMQ)</text>
    <rect x="195" y="530" width="145" height="28" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="5"/>
    <text x="267" y="549" text-anchor="middle" font-size="11" fill="#6a1b9a">Exclusive Pair</text>
    <text x="267" y="570" text-anchor="middle" font-size="9" fill="#888">(WebSockets)</text>
  </g>

  <!-- Step 6: IoT Levels -->
  <g id="step6" class="step" data-narration="IoT systems are classified into 6 levels. Level 1 is a single device like a smart lamp. Level 6 is a distributed mesh network like smart city sensors.">
    <text x="590" y="468" text-anchor="middle" font-size="14" font-weight="bold" fill="#00695c">IoT Levels (1-6)</text>
    <rect x="440" y="478" width="70" height="30" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" rx="4"/>
    <text x="475" y="498" text-anchor="middle" font-size="10" font-weight="bold" fill="#00695c">L1</text>
    <rect x="518" y="478" width="70" height="30" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" rx="4"/>
    <text x="553" y="498" text-anchor="middle" font-size="10" font-weight="bold" fill="#00695c">L2</text>
    <rect x="596" y="478" width="70" height="30" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" rx="4"/>
    <text x="631" y="498" text-anchor="middle" font-size="10" font-weight="bold" fill="#00695c">L3</text>
    <rect x="440" y="516" width="70" height="30" fill="#b2dfdb" stroke="#00897b" stroke-width="1.5" rx="4"/>
    <text x="475" y="536" text-anchor="middle" font-size="10" font-weight="bold" fill="#00695c">L4</text>
    <rect x="518" y="516" width="70" height="30" fill="#b2dfdb" stroke="#00897b" stroke-width="1.5" rx="4"/>
    <text x="553" y="536" text-anchor="middle" font-size="10" font-weight="bold" fill="#00695c">L5</text>
    <rect x="596" y="516" width="70" height="30" fill="#80cbc4" stroke="#00695c" stroke-width="2" rx="4"/>
    <text x="631" y="536" text-anchor="middle" font-size="10" font-weight="bold" fill="#004d40">L6</text>
    <text x="475" y="562" text-anchor="middle" font-size="9" fill="#888">Single device</text>
    <text x="631" y="562" text-anchor="middle" font-size="9" fill="#888">Distributed mesh</text>
    <line x1="510" y1="556" x2="596" y2="556" stroke="#00897b" stroke-width="1" marker-end="url(#tealArrow)"/>
  </g>

  <!-- Step 7: Enabling Technologies -->
  <g id="step7" class="step" data-narration="IoT is powered by enabling technologies: Wireless Sensor Networks, Cloud Computing, Big Data Analytics, Embedded Systems, Communication Protocols, and Machine Learning.">
    <text x="590" y="582" text-anchor="middle" font-size="10" fill="#555">Enabled by: WSN | Cloud | Big Data | Embedded | ML/AI</text>
  </g>

  <defs>
    <marker id="tealArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00897b"/>
    </marker>
  </defs>
</svg>