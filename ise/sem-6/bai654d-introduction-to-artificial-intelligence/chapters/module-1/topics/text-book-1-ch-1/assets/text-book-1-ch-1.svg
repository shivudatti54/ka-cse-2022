<svg width="420" height="400" data-topic-id="introduction-to-artificial-intelligence-chapter-1">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9ec4f7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#2f4f7f">Introduction to Artificial Intelligence: Chapter 1</text>
  <section data-narration="Definition of Artificial Intelligence">
    <rect x="10" y="50" width="400" height="100" fill="#fff" rx="10"/>
    <text x="20" y="70" font-size="18" font-family="Arial" fill="#2f4f7f">Definition of Artificial Intelligence</text>
    <text x="20" y="90" font-size="16" font-family="Arial" fill="#666">Artificial intelligence (AI) refers to the development of computer systems that can perform tasks that typically require human intelligence, such as:</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="1s"/>
    <text x="200" y="170" font-size="14" font-family="Arial" fill="#666">Learning, Problem-solving, Reasoning, Perception, Language understanding</text>
  </section>
  <section data-narration="History of AI">
    <rect x="10" y="170" width="400" height="100" fill="#fff" rx="10"/>
    <text x="20" y="190" font-size="18" font-family="Arial" fill="#2f4f7f">History of AI</text>
    <text x="20" y="210" font-size="16" font-family="Arial" fill="#666">The term "Artificial Intelligence" was first coined in 1956 by John McCarthy, a computer scientist and cognitive scientist.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="2s"/>
    <text x="200" y="190" font-size="14" font-family="Arial" fill="#666">...Development of the first AI programs, such as Logical Theorist and ELIZA, Creation of the first AI laboratory, the Stanford AI Laboratory...</text>
  </section>
  <section data-narration="Types of AI">
    <rect x="10" y="300" width="400" height="100" fill="#fff" rx="10"/>
    <text x="20" y="320" font-size="18" font-family="Arial" fill="#2f4f7f">Types of AI</text>
    <text x="20" y="340" font-size="16" font-family="Arial" fill="#666">Narrow or Weak AI: Designed to perform a specific task, such as facial recognition or language translation</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="3s"/>
    <text x="200" y="310" font-size="14" font-family="Arial" fill="#666">General or Strong AI: Capable of performing any intellectual task that a human can</text>
  </section>
  <section data-narration="Applications of AI">
    <rect x="10" y="400" width="400" height="100" fill="#fff" rx="10"/>
    <text x="20" y="420" font-size="18" font-family="Arial" fill="#2f4f7f">Applications of AI</text>
    <text x="20" y="440" font-size="16" font-family="Arial" fill="#666">AI has numerous applications in various fields, including:</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="4s"/>
    <text x="200" y="410" font-size="14" font-family="Arial" fill="#666">Healthcare: AI-assisted diagnosis and treatment planning, Finance: AI-driven trading and risk management...</text>
  </section>
  <footer>
    <g>
      <path d="M 10 10 L 30 30 L 50 50 L 70 70 L 90 90 L 110 110 L 130 130 L 150 150 L 170 170 L 190 190 L 210 210 L 230 230 L 250 250 L 270 270 L 290 290 L 310 310 L 330 330 L 350 350 L 370 370 L 390 390 L 410 410 Z"/>
