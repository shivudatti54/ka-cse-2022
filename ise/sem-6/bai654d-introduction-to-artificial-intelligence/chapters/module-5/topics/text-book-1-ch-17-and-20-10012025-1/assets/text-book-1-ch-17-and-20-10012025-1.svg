<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="introduction-to-artificial-intelligence-1">
    <title>Learning and Expert Systems</title>
    <desc>Text Book 1 Ch 17 And 20 10012025 1</desc>
    <style>
        * {
            font-family: Arial, sans-serif;
        }
        text {
            font-size: 18px;
        }
        .gradient {
            background: linear-gradient(to bottom, #6495ED, #87CEEB);
        }
        .section {
            margin-bottom: 20px;
        }
    </style>
    <g transform="translate(10, 10)">
        <rect class="gradient" width="400" height="350" rx="10"></rect>
        <g>
            <g data-narration="Definition of Learning">
                <text x="10" y="20">Definition of Learning</text>
                <rect x="10" y="40" width="380" height="20" rx="5"></rect>
                <animate xlink:href="#define-learning-text" begin=".1s" dur="1.5s" repeatCount="indefinite"></animate>
                <text id="define-learning-text" x="10" y="40">Learning is the process of acquiring new knowledge, skills, or behaviors through experience, study, or teaching.</text>
            </g>
            <g data-narration="Types of Learning">
                <text x="10" y="70">Types of Learning</text>
                <rect x="10" y="90" width="380" height="20" rx="5"></rect>
                <animate xlink:href="#types-learning-text" begin=".2s" dur="1.5s" repeatCount="indefinite"></animate>
                <text id="types-learning-text" x="10" y="90">There are three types of learning: Supervised Learning, Unsupervised Learning, and Reinforcement Learning.</text>
            </g>
            <g data-narration="Key Concepts">
                <text x="10" y="120">Key Concepts</text>
                <rect x="10" y="140" width="380" height="20" rx="5"></rect>
                <animate xlink:href="#key-concepts-text" begin=".3s" dur="1.5s" repeatCount="indefinite"></animate>
                <text id="key-concepts-text" x="10" y="140">Neural Networks, Gradient Descent, and Overfitting are key concepts in machine learning.</text>
            </g>
            <g data-narration="Example">
                <text x="10" y="170">Example</text>
                <rect x="10" y="190" width="380" height="20" rx="5"></rect>
                <animate xlink:href="#example-text" begin=".4s" dur="1.5s" repeatCount="indefinite"></animate>
                <text id="example-text" x="10" y="190">A neural network can be trained to predict house prices based on features like number of bedrooms, square footage, and location.</text>
            </g>
            <g data-narration="Expert Systems">
                <text x="10" y="220">Expert Systems</text>
                <rect x="10" y="240" width="380" height="20" rx="5"></rect>
                <animate xlink:href="#expert-systems-text" begin=".5s" dur="1.5s" repeatCount="indefinite"></animate>
                <text id="expert-systems-text" x="10" y="240">Expert systems are computer programs that mimic the decision-making abilities of a human expert.</text>
            </g>
        </g>
        <g transform="translate(10, 360)">
            <text x="10" y="370">Expert Systems</text>
        </g>
    </svg>