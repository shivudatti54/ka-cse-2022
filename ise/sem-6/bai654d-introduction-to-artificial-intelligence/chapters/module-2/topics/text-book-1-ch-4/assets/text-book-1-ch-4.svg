<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="font-family: Arial, sans-serif; font-size: 16px;">
    <title>Text Book 1 Ch 4</title>
    <style>
        .gradient {
            background: radial-gradient(74.22% 74.22% at 0 0, #3498db 0%, #2ecc71 34.36%, #2ecc71 68.59%, #1abc9c 100%);
            background-size: 100% 100%;
            background-origin: padding-box;
            background-position: center;
            -webkit-background-clip: padding-box;
            -moz-background-clip: padding-box;
            -ms-background-clip: padding-box;
            -o-background-clip: padding-box;
            clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 50% 100%, 0% 100%, 0% 0%);
        }
        .section {
            background: #f0f0f0;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .section:last-child {
            margin-bottom: 0;
        }
    </style>
    <g id="root">
        <rect class="gradient" x="0" y="0" width="420" height="400" rx="10" fill="#ffffff" />
        <rect x="0" y="0" width="420" height="40" rx="10" fill="#3498db" />
        <rect x="0" y="40" width="420" height="60" rx="10" fill="#2ecc71" />
        <rect x="0" y="100" width="420" height="60" rx="10" fill="#1abc9c" />
        <rect x="0" y="160" width="420" height="60" rx="10" fill="#2ecc71" />
        <rect x="0" y="220" width="420" height="60" rx="10" fill="#1abc9c" />
        <rect x="0" y="280" width="420" height="40" rx="10" fill="#3498db" />
        <g id="section-1">
            <rect class="section" x="20" y="40" width="380" height="20" rx="10" fill="#ffffff" />
            <text x="20" y="60" class="section-text" fill="#000000" fill-opacity="0.8">Introduction to Artificial Intelligence</text>
            <text x="20" y="80" class="section-text" fill="#000000" fill-opacity="0.6">Knowledge Representation Issues</text>
        </g>
        <g id="section-2">
            <rect class="section" x="20" y="100" width="380" height="20" rx="10" fill="#ffffff" />
            <text x="20" y="120" class="section-text" fill="#000000" fill-opacity="0.8">Predicate Logic</text>
            <animate style="opacity: 0" begin="0s" dur="1s" repeatCount="1" />
            <animate style="opacity: 1" begin="1s" dur="1s" repeatCount="1" />
            <text x="20" y="140" class="section-text" fill="#000000" fill-opacity="0.6">A formal system used to represent knowledge in a logical and expressive way</text>
            <animate style="opacity: 0" begin="1.5s" dur="1s" repeatCount="1" />
            <animate style="opacity: 1" begin="2.5s" dur="1s" repeatCount="1" />
            <text x="20" y="160" class="section-text" fill="#000000" fill-opacity="0.6">Predicate calculus, a branch of mathematical logic that deals with propositions and their relationships</text>
        </g>
        <g id="section-3">
            <rect class="section" x="20" y="220" width="380" height="20" rx="10" fill="#ffffff" />
            <text x="20" y="240" class="section-text" fill="#000000" fill-opacity="0.8">Representing Relationships</text>
            <animate style="opacity: 0" begin="0s" dur="1s" repeatCount="1" />
            <animate style="opacity: 1" begin="1s" dur="1s" repeatCount="1" />
            <text x="20" y="260" class="section-text" fill="#000000" fill-opacity="0.6">Predicates, variables, individual, and properties</text>
            <animate style="opacity: 0" begin="1.5s" dur="1s" repeatCount="1" />
            <animate style="opacity: 1" begin="2.5s" dur="1s" repeatCount="1" />
            <text x="20" y="280" class="section-text" fill="#000000" fill-opacity="0.6">Predicate P(x), where P is a predicate, x is a variable, and x is an individual</text>
        </g>
        <g id="section-4">
            <rect class="section" x="20" y="280" width="380" height="20" rx="10" fill="#ffffff" />
            <text x="20" y="300" class="section-text" fill="#000000" fill-opacity="0.8">Key Concepts</text>
            <animate style="opacity: 0" begin="0s" dur="1s" repeatCount="1" />
            <animate style="opacity: 1" begin="1s" dur="1s" repeatCount="1" />
            <text x="20" y="320" class="section-text" fill="#000000" fill-opacity="0.6">Predicate, variable, individual, and property</text>
            <animate style="opacity: 0" begin="1.5s" dur="1s" repeatCount="1" />
            <animate style="opacity: 1" begin="2.5s" dur="1s" repeatCount="1" />
            <text x="20" y="340" class="section-text" fill="#000000" fill-opacity="0.6">Predicate P(x), where P is a predicate, x is a variable, and x is an individual</text>
        </g>
    </g>
    <g id="footer">
        <rect x="20" y="360" width="380" height="40" rx="10" fill="#3498db" />
        <text x="20" y="380" class="footer-text" fill="#ffffff">Text Book 1 Ch 4</text>
    </g>
</svg>