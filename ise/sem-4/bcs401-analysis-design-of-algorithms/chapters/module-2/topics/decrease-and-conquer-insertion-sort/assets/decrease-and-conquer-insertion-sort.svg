<svg width="420" height="400" data-topic-id="decrease-and-conquer-insertion-sort" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <Defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#F7D2C4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E6DAC3" stop-opacity="1"/>
    </linearGradient>
  </Defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <g transform="translate(10, 10)">
    <text text-anchor="start" x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">Decrease and Conquer: Insertion Sort</text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)">
    <rect width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text text-anchor="start" x="0" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Introduction</text>
    <text data-narration="True" x="10" y="30" font-size="16" font-family="Arial, sans-serif" fill="#2E4053">Insertion Sort is a simple sorting algorithm that works by dividing the input into a sorted and an unsorted region.</text>
  </g>
  
  <!-- Section 2: Decrease-and-Conquer Approach -->
  <g transform="translate(10, 80)">
    <rect width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text text-anchor="start" x="0" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Decrease-and-Conquer Approach</text>
    <text data-narration="True" x="10" y="30" font-size="16" font-family="Arial, sans-serif" fill="#2E4053">Insertion Sort can be viewed as a decrease-and-conquer algorithm, where we repeatedly divide the input into two regions: a sorted region and an unsorted region.</text>
  </g>
  
  <!-- Section 3: Step-by-Step Process -->
  <g transform="translate(10, 110)">
    <rect width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text text-anchor="start" x="0" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Step-by-Step Process</text>
    <text data-narration="True" x="10" y="30" font-size="16" font-family="Arial, sans-serif" fill="#2E4053">1. Initialize the sorted region: Start with the first element as the sorted region.</text>
    <text data-narration="True" x="10" y="50" font-size="16" font-family="Arial, sans-serif" fill="#2E4053">2. Iterate through the unsorted region: Iterate through the remaining elements in the input, considering each one as the next element to be inserted into the sorted region.</text>
    <text data-narration="True" x="10" y="70" font-size="16" font-family="Arial, sans-serif" fill="#2E4053">3. Compare and shift: Compare the current element with the elements in the sorted region. If the current element is smaller, shift the larger elements to the right to make space for it.</text>
    <text data-narration="True" x="10" y="90" font-size="16" font-family="Arial, sans-serif" fill="#2E4053">4. Insert the element: Insert the current element into the correct position in the sorted region.</text>
  </g>
  
  <!-- Section 4: Example -->
  <g transform="translate(10, 140)">
    <rect width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text text-anchor="start" x="0" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Example</text>
    <rect x="10" y="30" width="80" height="10" fill="#2E4053" rx="5"/>
    <text x="10" y="40" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">Input:</text>
    <text x="120" y="40" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">[5, 2, 8, 3, 1, 4, 6]</text>
    <rect x="10" y="60" width="80" height="10" fill="#2E4053" rx="5"/>
    <text x="10" y="70" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">Sorted:</text>
    <text x="120" y="70" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">[1, 2, 3, 4, 5, 6, 8]</text>
  </g>
  
  <!-- Section 5: Conclusion -->
  <g transform="translate(10, 180)">
    <rect width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text text-anchor="start" x="0" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Conclusion</text>
    <text data-narration="True" x="10" y="30" font-size="16" font-family="Arial, sans-serif" fill="#2E4053">Insertion Sort is a simple yet efficient sorting algorithm that works by dividing the input into a sorted and an unsorted region.</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 220)">
    <rect width="400" height="20" fill="#F7F7F7" rx="5"/>
    <text text-anchor="start" x="0" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Footer</text>
  </g>
  
  <!-- Arrow markers for connections -->
  <g transform="translate(350, 50)">
    <line x1="10" y1="0" x2="10" y2="400" stroke="#2E4053" stroke-width="2"/>
    <line x1="350" y1="0" x2="350" y2="400" stroke="#2E4053" stroke-width="2"/>
  </g>
  
  <!-- Smooth animations using <animate> elements with sequential begin times -->
  <animate xmlns="http://www.w3.org/1999/09/XLink" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="10" y="30" width="80" height="10" fill="#2E4053" rx="5"/>
    <animateTransform transform-origin="50% 50%" attributeName="transform" type="translate" from="0 30" to="10 30" dur="1s"/>
  </animate>
  <animate xmlns="http://www.w3.org/1999/09/XLink" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="120" y="40" width="80" height="10" fill="#2E4053" rx="5"/>
    <animateTransform transform-origin="50% 50%" attributeName="transform" type="translate" from="0 40" to="120 40" dur="1s"/>
  </animate>
  <animate xmlns="http://www.w3.org/1999/09/XLink" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="10" y="60" width="80" height="10" fill="#2E4053" rx="5"/>
    <animateTransform transform-origin="50% 50%" attributeName="transform" type="translate" from="0 60" to="10 60" dur="1s"/>
  </animate>
  <animate xmlns="http://www.w3.org/1999/09/XLink" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="120" y="70" width="80" height="10" fill="#2E4053" rx="5"/>
    <animateTransform transform-origin="50% 50%" attributeName="transform" type="translate" from="0 70" to="120 70" dur="1s"/>
  </animate>
  <animate xmlns="http://www.w3.org/1999/09/XLink" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="10" y="90" width="80" height="10" fill="#2E4053" rx="5"/>
    <animateTransform transform-origin="50% 50%" attributeName="transform" type="translate" from="0 90" to="10 90" dur="1s"/>
  </animate>
  <animate xmlns="http://www.w3.org/1999/09/XLink" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="120" y="90" width="80" height="10" fill="#2E4053" rx="5"/>
    <animateTransform transform-origin="50% 50%" attributeName="transform" type="translate" from="0 90" to="120 90" dur="1s"/>
  </animate>
</svg>