<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="travelling-salesman-problem-exhaustive-search">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" />
      <stop offset="100%" stop-color="#C5CAE9" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" />
  
  <!-- Title section -->
  <section data-narration="Introduction to Exhaustive Search Algorithm">
    <rect x="40" y="40" width="340" height="60" fill="#2F4F7F">
      <animateTransform attributeName="transform" type="translate" from="0,40" to="0,60" begin="0s" dur="1s" repeat Count="1" />
      <text x="170" y="50" font-size="24" font-family="Arial" fill="#fff" text-anchor="middle">Exhaustive Search Algorithm</text>
    </rect>
  </section>
  
  <!-- TSP section -->
  <section data-narration="What is TSP?">
    <rect x="40" y="120" width="340" height="60" fill="#2F4F7F">
      <animateTransform attributeName="transform" type="translate" from="0,120" to="0,180" begin="0.5s" dur="1s" repeat Count="1" />
      <text x="170" y="130" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">TSP: Traversing Salesman Problem</text>
    </rect>
  </section>
  
  <!-- Key Concepts section -->
  <section data-narration="Key Concepts">
    <rect x="40" y="200" width="340" height="60" fill="#2F4F7F">
      <animateTransform attributeName="transform" type="translate" from="0,200" to="0,260" begin="1s" dur="1s" repeat Count="1" />
      <text x="170" y="210" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Permutations and Distance Calculation</text>
    </rect>
  </section>
  
  <!-- Algorithm Steps section -->
  <section data-narration="Algorithm Steps">
    <rect x="40" y="280" width="340" height="60" fill="#2F4F7F">
      <animateTransform attributeName="transform" type="translate" from="0,280" to="0,340" begin="1.5s" dur="1s" repeat Count="1" />
      <text x="170" y="290" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Generate Permutations, Calculate Distance, Find Shortest</text>
    </rect>
  </section>
  
  <!-- Example section -->
  <section data-narration="Example">
    <rect x="40" y="360" width="340" height="60" fill="#2F4F7F">
      <animateTransform attributeName="transform" type="translate" from="0,360" to="0,420" begin="2s" dur="1s" repeat Count="1" />
      <text x="170" y="370" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">Shortest Distance: 21</text>
    </rect>
  </section>
  
  <!-- Time Complexity section -->
  <section data-narration="Time Complexity">
    <rect x="40" y="440" width="340" height="60" fill="#2F4F7F">
      <animateTransform attributeName="transform" type="translate" from="0,440" to="0,500" begin="2.5s" dur="1s" repeat Count="1" />
      <text x="170" y="450" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">O(n!) Time Complexity</text>
    </rect>
  </section>
  
  <!-- Arrow markers -->
  <line x1="40" y1="120" x2="380" y2="120" stroke="#fff" stroke-width="2" />
  <line x1="40" y1="200" x2="380" y2="200" stroke="#fff" stroke-width="2" />
  <line x1="40" y1="280" x2="380" y2="280" stroke="#fff" stroke-width="2" />
  <line x1="40" y1="360" x2="380" y2="360" stroke="#fff" stroke-width="2" />
  
  <!-- Footer -->
  <rect x="0" y="460" width="100%" height="40" fill="#2F4F7F">
    <text x="170" y="470" font-size="18" font-family="Arial" fill="#fff" text-anchor="middle">By [Your Name]</text>
  </rect>
</svg>