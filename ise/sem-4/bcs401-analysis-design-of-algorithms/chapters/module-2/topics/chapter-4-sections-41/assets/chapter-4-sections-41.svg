<svg width="420" height="400"
     data-topic-id="traveling-salesman-problem-tsp"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     style="background: linear-gradient(45deg, #7dbbee, #88d2e4);">

    <!-- Header -->
    <rect x="10" y="10" width="400" height="20" style="background-color: #1a1d23;"/>
    <text x="15" y="25" font-size="18" font-family="Arial" fill="#88d2e4">Traveling Salesman Problem (TSP)</text>

    <!-- Section 1: Definition -->
    <rect x="10" y="50" width="400" height="50" style="background-color: #7dbbee;"/>
    <text x="15" y="60" font-size="14" font-family="Arial" fill="#1a1d23">Definition:</text>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#1a1d23">The Traveling Salesman Problem (TSP) is a classic problem in combinatorial optimization and computer science. It involves finding the shortest possible tour that visits a set of cities and returns to the starting city.</text>

    <animate duration="2000" begin="1000" from="0%" to="100%" fill="freeze"/>
    <animate duration="2000" begin="2000" from="0%" to="100%" fill="freeze"/>

    <!-- Section 2: Examples -->
    <rect x="10" y="120" width="400" height="50" style="background-color: #88d2e4;"/>
    <text x="15" y="130" font-size="14" font-family="Arial" fill="#1a1d23">Examples:</text>
    <text x="20" y="150" font-size="18" font-family="Arial" fill="#1a1d23">- A salesman who needs to visit a set of customers, return to the salesperson's office, and minimize the total distance traveled.</text>
    <text x="20" y="170" font-size="18" font-family="Arial" fill="#1a1d23">- A delivery truck that needs to visit a set of warehouses, return to the depot, and minimize the total distance traveled.</text>

    <animate duration="2000" begin="3000" from="0%" to="100%" fill="freeze"/>
    <animate duration="2000" begin="4000" from="0%" to="100%" fill="freeze"/>

    <!-- Section 3: Key Concepts -->
    <rect x="10" y="200" width="400" height="50" style="background-color: #7dbbee;"/>
    <text x="15" y="210" font-size="14" font-family="Arial" fill="#1a1d23">Key Concepts:</text>
    <text x="20" y="230" font-size="18" font-family="Arial" fill="#1a1d23">- Distance Matrix: A matrix that represents the pairwise distances between each pair of cities.</text>
    <text x="20" y="250" font-size="18" font-family="Arial" fill="#1a1d23">- TSP Instance: A specific instance of the TSP problem, represented by a group of cities and their pairwise distances.</text>
    <text x="20" y="270" font-size="18" font-family="Arial" fill="#1a1d23">- Tour: A sequence of cities visited in a particular order, representing a possible solution to the TSP.</text>

    <animate duration="2000" begin="5000" from="0%" to="100%" fill="freeze"/>
    <animate duration="2000" begin="6000" from="0%" to="100%" fill="freeze"/>

    <!-- Section 4: Brute Force Approach -->
    <rect x="10" y="280" width="400" height="50" style="background-color: #88d2e4;"/>
    <text x="15" y="290" font-size="14" font-family="Arial" fill="#1a1d23">Brute Force Approach:</text>
    <text x="20" y="310" font-size="18" font-family="Arial" fill="#1a1d23">The brute force approach to solving TSP involves generating all possible tours of the given cities and selecting the shortest one.</text>
    <text x="20" y="330" font-size="18" font-family="Arial" fill="#1a1d23">This is often referred to as the exhaustive search method.</text>

    <animate duration="2000" begin="7000" from="0%" to="100%" fill="freeze"/>
    <animate duration="2000" begin="8000" from="0%" to="100%" fill="freeze"/>

    <!-- Section 5: Algorithm -->
    <rect x="10" y="360" width="400" height="50" style="background-color: #7dbbee;"/>
    <text x="15" y="370" font-size="14" font-family="Arial" fill="#1a1d23">Algorithm:</text>
    <text x="20" y="390" font-size="18" font-family="Arial" fill="#1a1d23">1. Generate all possible permutations of the cities (i.e., all possible tours).</text>
    <text x="20" y="410" font-size="18" font-family="Arial" fill="#1a1d23">2. Calculate the total distance of each tour using the distance matrix.</text>
    <text x="20" y="430" font-size="18" font-family="Arial" fill="#1a1d23">3. Compare the distances of each tour and select the shortest one.</text>
    <text x="20" y="450" font-size="18" font-family="Arial" fill="#1a1d23">4. Return the shortest tour as the solution to the TSP.</text>

    <animate duration="2000" begin="9000" from="0%" to="100%" fill="freeze"/>
    <animate duration="2000" begin="10000" from="0%" to="100%" fill="freeze"/>

    <!-- Section 6: Time Complexity -->
    <rect x="10" y="420" width="400" height="50" style="background-color: #88d2e4;"/>
    <text x="15" y="430" font-size="14" font-family="Arial" fill="#1a1d23">Time Complexity:</text>
    <text x="20" y="450" font-size="18" font-family="Arial" fill="#1a1d23">The time complexity of the brute force approach is O(n!), where n is the number of cities.</text>
    <text x="20" y="470" font-size="18" font-family="Arial" fill="#1a1d23">This is because there are n! possible permutations of the cities, and generating each permutation requires O(n) time.</text>

    <animate duration="2000" begin="11000" from="0%" to="100%" fill="freeze"/>
    <animate duration="2000" begin="12000" from="0%" to="100%" fill="freeze"/>

    <!-- Footer -->
    <rect x="10" y="490" width="400" height="20" style="background-color: #1a1d23;"/>
    <text x="15" y="505" font-size="18" font-family="Arial" fill="#88d2e4">Copyright 2023</text>

</svg>