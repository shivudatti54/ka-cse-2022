<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="knapsack-problem">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3949AB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="The Knapsack Problem is a classic optimization problem in algorithm design.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB">Knapsack Problem</text>
    <line x1="120" y1="40" x2="300" y2="40" stroke="#3949AB" stroke-width="3" stroke-linecap="round"/>
    <circle cx="120" cy="40" r="3" fill="#E65100"/>
    <circle cx="300" cy="40" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Problem Setup -->
  <g opacity="0" data-narration="Given a knapsack with weight capacity W and items each having a weight and value, the goal is to maximize total value without exceeding capacity.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Knapsack shape -->
    <rect x="20" y="55" width="70" height="55" rx="6" fill="#3949AB" opacity="0.15" stroke="#3949AB" stroke-width="1.5"/>
    <text x="55" y="72" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Knapsack</text>
    <text x="55" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">W = cap</text>
    <text x="55" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">max weight</text>
    <!-- Items -->
    <rect x="105" y="55" width="55" height="22" rx="4" fill="#E65100" opacity="0.2" stroke="#E65100" stroke-width="1"/>
    <text x="132" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">w1, v1</text>
    <rect x="165" y="55" width="55" height="22" rx="4" fill="#E65100" opacity="0.2" stroke="#E65100" stroke-width="1"/>
    <text x="192" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">w2, v2</text>
    <rect x="225" y="55" width="55" height="22" rx="4" fill="#E65100" opacity="0.2" stroke="#E65100" stroke-width="1"/>
    <text x="252" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">w3, v3</text>
    <rect x="285" y="55" width="40" height="22" rx="4" fill="#E65100" opacity="0.2" stroke="#E65100" stroke-width="1"/>
    <text x="305" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">...</text>
    <!-- Goal -->
    <rect x="105" y="83" width="295" height="26" rx="5" fill="#00695C" opacity="0.12" stroke="#00695C" stroke-width="1"/>
    <text x="252" y="100" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Goal: Maximize value, keep weight &#x2264; W</text>
    <!-- Arrow -->
    <line x1="105" y1="66" x2="92" y2="75" stroke="#3949AB" stroke-width="1.2" marker-end="url(#arrow)"/>
  </g>

  <!-- Group 3: 0/1 vs Fractional Comparison -->
  <g opacity="0" data-narration="There are two variants. In 0/1 Knapsack, each item is either taken whole or left behind. In Fractional Knapsack, items can be broken into fractions.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <!-- 0/1 Knapsack box -->
    <rect x="20" y="120" width="185" height="68" rx="7" fill="white" opacity="0.7" stroke="#3949AB" stroke-width="1.5"/>
    <text x="112" y="136" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">0/1 Knapsack</text>
    <line x1="40" y1="140" x2="185" y2="140" stroke="#3949AB" stroke-width="0.5" opacity="0.4"/>
    <text x="112" y="154" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Take whole item or leave it</text>
    <rect x="40" y="160" width="30" height="16" rx="3" fill="#3949AB" opacity="0.3"/>
    <text x="55" y="172" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949AB">ALL</text>
    <text x="82" y="172" font-family="Arial" font-size="10" fill="#333">or</text>
    <rect x="95" y="160" width="30" height="16" rx="3" fill="#C62828" opacity="0.2" stroke="#C62828" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="110" y="172" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">NONE</text>
    <text x="145" y="172" font-family="Arial" font-size="8" fill="#333">&#x2190; binary</text>
    <!-- Fractional Knapsack box -->
    <rect x="215" y="120" width="185" height="68" rx="7" fill="white" opacity="0.7" stroke="#00695C" stroke-width="1.5"/>
    <text x="307" y="136" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Fractional Knapsack</text>
    <line x1="235" y1="140" x2="380" y2="140" stroke="#00695C" stroke-width="0.5" opacity="0.4"/>
    <text x="307" y="154" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Can take fractions of items</text>
    <rect x="235" y="160" width="30" height="16" rx="3" fill="#00695C" opacity="0.3"/>
    <text x="250" y="172" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">ALL</text>
    <text x="277" y="172" font-family="Arial" font-size="10" fill="#333">or</text>
    <rect x="290" y="160" width="30" height="16" rx="3" fill="#00695C" opacity="0.15"/>
    <rect x="290" y="160" width="18" height="16" rx="3" fill="#00695C" opacity="0.4"/>
    <text x="305" y="172" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">PART</text>
    <text x="340" y="172" font-family="Arial" font-size="8" fill="#333">&#x2190; 0 to 1</text>
  </g>

  <!-- Group 4: Greedy Approach for Fractional -->
  <g opacity="0" data-narration="The greedy approach solves fractional knapsack optimally. Sort items by value-to-weight ratio in decreasing order, then greedily pick the highest ratio items first.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="20" y="198" width="185" height="88" rx="7" fill="white" opacity="0.7" stroke="#00695C" stroke-width="1.5"/>
    <text x="112" y="214" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Greedy (Fractional)</text>
    <line x1="35" y1="218" x2="190" y2="218" stroke="#00695C" stroke-width="0.5" opacity="0.4"/>
    <text x="35" y="232" font-family="Arial" font-size="8" fill="#333">1. Compute ratio = vi / wi</text>
    <text x="35" y="244" font-family="Arial" font-size="8" fill="#333">2. Sort by ratio (descending)</text>
    <text x="35" y="256" font-family="Arial" font-size="8" fill="#333">3. Take items greedily</text>
    <!-- Example sorted items -->
    <rect x="35" y="260" width="38" height="18" rx="3" fill="#00695C" opacity="0.25"/>
    <text x="54" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">v/w=6</text>
    <rect x="77" y="260" width="38" height="18" rx="3" fill="#00695C" opacity="0.18"/>
    <text x="96" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">v/w=5</text>
    <rect x="119" y="260" width="38" height="18" rx="3" fill="#00695C" opacity="0.12"/>
    <text x="138" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C">v/w=3</text>
    <text x="170" y="273" font-family="Arial" font-size="9" fill="#00695C">&#x2192;</text>
  </g>

  <!-- Group 5: DP Approach for 0/1 -->
  <g opacity="0" data-narration="The 0/1 Knapsack is solved using dynamic programming. Build a table V of i items and w capacities. Each cell stores the maximum value achievable. The recurrence is V[i][w] equals the max of excluding the item or including it.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <rect x="215" y="198" width="185" height="88" rx="7" fill="white" opacity="0.7" stroke="#3949AB" stroke-width="1.5"/>
    <text x="307" y="214" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">DP (0/1 Knapsack)</text>
    <line x1="230" y1="218" x2="385" y2="218" stroke="#3949AB" stroke-width="0.5" opacity="0.4"/>
    <text x="230" y="231" font-family="monospace" font-size="7" fill="#3949AB">V[i][w] = max(</text>
    <text x="238" y="242" font-family="monospace" font-size="7" fill="#333">  V[i-1][w],</text>
    <text x="238" y="253" font-family="monospace" font-size="7" fill="#E65100">  V[i-1][w-wi] + vi</text>
    <text x="230" y="264" font-family="monospace" font-size="7" fill="#3949AB">)</text>
    <!-- Mini DP table -->
    <rect x="322" y="224" width="70" height="55" rx="3" fill="#3949AB" opacity="0.06" stroke="#3949AB" stroke-width="0.6"/>
    <text x="357" y="235" text-anchor="middle" font-family="monospace" font-size="6" fill="#3949AB">w: 0 1 2 3</text>
    <line x1="325" y1="237" x2="389" y2="237" stroke="#3949AB" stroke-width="0.4"/>
    <text x="327" y="247" font-family="monospace" font-size="6" fill="#333">0: 0 0 0 0</text>
    <text x="327" y="257" font-family="monospace" font-size="6" fill="#333">1: 0 1 1 1</text>
    <text x="327" y="267" font-family="monospace" font-size="6" fill="#E65100">2: 0 1 4 5</text>
    <text x="327" y="277" font-family="monospace" font-size="6" fill="#00695C">3: 0 1 4 7</text>
  </g>

  <!-- Group 6: Complexity and Applications -->
  <g opacity="0" data-narration="Greedy fractional knapsack runs in O of n log n time. The 0/1 DP solution runs in O of n times W pseudo-polynomial time. Applications include resource allocation, budget optimization, and cargo loading.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <!-- Complexity -->
    <rect x="20" y="296" width="185" height="94" rx="7" fill="white" opacity="0.7" stroke="#E65100" stroke-width="1.5"/>
    <text x="112" y="312" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Time Complexity</text>
    <line x1="35" y1="316" x2="190" y2="316" stroke="#E65100" stroke-width="0.5" opacity="0.4"/>
    <rect x="35" y="322" width="160" height="18" rx="4" fill="#00695C" opacity="0.12"/>
    <text x="40" y="334" font-family="Arial" font-size="9" fill="#00695C">Greedy (Fractional):</text>
    <text x="148" y="334" font-family="monospace" font-size="9" font-weight="bold" fill="#00695C">O(n log n)</text>
    <rect x="35" y="344" width="160" height="18" rx="4" fill="#3949AB" opacity="0.12"/>
    <text x="40" y="356" font-family="Arial" font-size="9" fill="#3949AB">DP (0/1):</text>
    <text x="148" y="356" font-family="monospace" font-size="9" font-weight="bold" fill="#3949AB">O(nW)</text>
    <text x="112" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">* O(nW) is pseudo-polynomial</text>
    <!-- Applications -->
    <rect x="215" y="296" width="185" height="94" rx="7" fill="white" opacity="0.7" stroke="#C62828" stroke-width="1.5"/>
    <text x="307" y="312" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">Applications</text>
    <line x1="230" y1="316" x2="385" y2="316" stroke="#C62828" stroke-width="0.5" opacity="0.4"/>
    <circle cx="237" cy="332" r="3" fill="#E65100"/>
    <text x="245" y="335" font-family="Arial" font-size="9" fill="#333">Resource Allocation</text>
    <circle cx="237" cy="350" r="3" fill="#3949AB"/>
    <text x="245" y="353" font-family="Arial" font-size="9" fill="#333">Budget Optimization</text>
    <circle cx="237" cy="368" r="3" fill="#00695C"/>
    <text x="245" y="371" font-family="Arial" font-size="9" fill="#333">Cargo Loading</text>
    <circle cx="237" cy="386" r="3" fill="#C62828"/>
    <text x="245" y="389" font-family="Arial" font-size="9" fill="#333">Portfolio Selection</text>
  </g>
</svg>
