<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="topological-sorting">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Topological Sorting arranges vertices of a directed acyclic graph in a linear order such that for every directed edge u to v, u comes before v.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="28" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB" text-anchor="middle">Topological Sorting</text>
    <line x1="120" y1="34" x2="300" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="145" y1="38" x2="275" y2="38" stroke="#E65100" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Group 2: DAG with 6 nodes -->
  <g opacity="0" data-narration="A Directed Acyclic Graph with six nodes. Edges show dependencies: A to C, A to D, B to D, B to E, C to F, D to F, E to F. This DAG has no cycles.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="10" y="58" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">DAG Example (Task Dependencies)</text>
    <!-- Node A -->
    <circle cx="50" cy="80" r="14" fill="#3949AB" stroke="#283593" stroke-width="1.5"/>
    <text x="50" y="84" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">A</text>
    <!-- Node B -->
    <circle cx="50" cy="120" r="14" fill="#3949AB" stroke="#283593" stroke-width="1.5"/>
    <text x="50" y="124" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">B</text>
    <!-- Node C -->
    <circle cx="130" cy="68" r="14" fill="#3949AB" stroke="#283593" stroke-width="1.5"/>
    <text x="130" y="72" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">C</text>
    <!-- Node D -->
    <circle cx="130" cy="110" r="14" fill="#3949AB" stroke="#283593" stroke-width="1.5"/>
    <text x="130" y="114" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">D</text>
    <!-- Node E -->
    <circle cx="130" cy="148" r="14" fill="#3949AB" stroke="#283593" stroke-width="1.5"/>
    <text x="130" y="152" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">E</text>
    <!-- Node F -->
    <circle cx="210" cy="110" r="14" fill="#C62828" stroke="#B71C1C" stroke-width="1.5"/>
    <text x="210" y="114" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">F</text>
    <!-- Edges -->
    <line x1="63" y1="74" x2="116" y2="70" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>
    <line x1="63" y1="86" x2="116" y2="104" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>
    <line x1="63" y1="116" x2="116" y2="112" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>
    <line x1="63" y1="126" x2="116" y2="142" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>
    <line x1="143" y1="74" x2="196" y2="104" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>
    <line x1="144" y1="110" x2="196" y2="110" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>
    <line x1="143" y1="142" x2="196" y2="116" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  </g>

  <!-- Group 3: Kahn's Algorithm (BFS) -->
  <g opacity="0" data-narration="Kahn's Algorithm uses BFS. First compute in-degree of every vertex. Enqueue all vertices with in-degree zero. Dequeue a vertex, add it to the result, and reduce in-degree of its neighbors. Repeat until the queue is empty.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <rect x="240" y="48" width="172" height="118" rx="6" fill="white" fill-opacity="0.5" stroke="#00695C" stroke-width="1"/>
    <text x="326" y="62" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle">Kahn's Algorithm (BFS)</text>
    <text x="250" y="78" font-family="Arial" font-size="8.5" fill="#333">1. Compute in-degree of all vertices</text>
    <text x="250" y="90" font-family="Arial" font-size="8.5" fill="#333">2. Enqueue vertices with in-degree 0</text>
    <text x="250" y="102" font-family="Arial" font-size="8.5" fill="#333">3. Dequeue u, add to result</text>
    <text x="250" y="114" font-family="Arial" font-size="8.5" fill="#333">4. Reduce in-degree of neighbors</text>
    <text x="250" y="126" font-family="Arial" font-size="8.5" fill="#333">5. Enqueue if in-degree becomes 0</text>
    <text x="250" y="138" font-family="Arial" font-size="8.5" fill="#333">6. Repeat until queue is empty</text>
    <text x="260" y="154" font-family="monospace" font-size="8" fill="#00695C" font-weight="bold">In-degree:</text>
    <text x="330" y="154" font-family="monospace" font-size="8" fill="#333">A:0 B:0 C:1</text>
    <text x="330" y="163" font-family="monospace" font-size="8" fill="#333">D:2 E:1 F:3</text>
  </g>

  <!-- Group 4: DFS-based Approach -->
  <g opacity="0" data-narration="The DFS-based approach runs depth-first search from each unvisited vertex. When a vertex finishes, it is pushed onto a stack. Popping the stack gives the topological order. This works because a vertex finishes only after all its descendants finish.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="8" y="172" width="200" height="100" rx="6" fill="white" fill-opacity="0.5" stroke="#E65100" stroke-width="1"/>
    <text x="108" y="186" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">DFS-based Approach</text>
    <text x="16" y="200" font-family="monospace" font-size="8" fill="#333">for each vertex v:</text>
    <text x="16" y="211" font-family="monospace" font-size="8" fill="#333">  if v not visited:</text>
    <text x="16" y="222" font-family="monospace" font-size="8" fill="#333">    DFS(v)</text>
    <text x="16" y="237" font-family="monospace" font-size="8" fill="#E65100" font-weight="bold">DFS(v):</text>
    <text x="16" y="248" font-family="monospace" font-size="8" fill="#333">  mark v visited</text>
    <text x="16" y="259" font-family="monospace" font-size="8" fill="#333">  for each neighbor u of v:</text>
    <text x="16" y="268" font-family="monospace" font-size="8" fill="#333">    if u not visited: DFS(u)</text>
    <rect x="150" y="198" width="50" height="68" rx="3" fill="none" stroke="#E65100" stroke-width="1.2"/>
    <text x="175" y="212" font-family="monospace" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Stack</text>
    <text x="175" y="224" font-family="monospace" font-size="8" fill="#333" text-anchor="middle">push on</text>
    <text x="175" y="234" font-family="monospace" font-size="8" fill="#333" text-anchor="middle">finish</text>
    <path d="M175,240 L175,255 L170,250 M175,255 L180,250" stroke="#E65100" stroke-width="1.2" fill="none"/>
    <text x="175" y="265" font-family="monospace" font-size="7" fill="#C62828" text-anchor="middle">pop = order</text>
  </g>

  <!-- Group 5: Step-by-step Trace -->
  <g opacity="0" data-narration="Tracing Kahn's algorithm on the DAG: Start with A and B which have in-degree 0. Process A, reducing in-degree of C and D. Then process B, reducing D and E. Next C becomes 0, then D, then E, and finally F. The topological order is A, B, C, D, E, F.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <rect x="216" y="172" width="196" height="118" rx="6" fill="white" fill-opacity="0.5" stroke="#3949AB" stroke-width="1"/>
    <text x="314" y="186" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB" text-anchor="middle">Step-by-step Trace</text>
    <text x="224" y="200" font-family="monospace" font-size="8" fill="#00695C" font-weight="bold">Queue</text>
    <text x="280" y="200" font-family="monospace" font-size="8" fill="#E65100" font-weight="bold">Result</text>
    <text x="224" y="212" font-family="monospace" font-size="7.5" fill="#333">[A,B]</text>
    <text x="280" y="212" font-family="monospace" font-size="7.5" fill="#333">[]</text>
    <text x="224" y="223" font-family="monospace" font-size="7.5" fill="#333">[B]</text>
    <text x="280" y="223" font-family="monospace" font-size="7.5" fill="#333">[A]</text>
    <text x="350" y="223" font-family="Arial" font-size="7" fill="#888">C:0, D:1</text>
    <text x="224" y="234" font-family="monospace" font-size="7.5" fill="#333">[C]</text>
    <text x="280" y="234" font-family="monospace" font-size="7.5" fill="#333">[A,B]</text>
    <text x="350" y="234" font-family="Arial" font-size="7" fill="#888">D:0, E:0</text>
    <text x="224" y="245" font-family="monospace" font-size="7.5" fill="#333">[D,E]</text>
    <text x="280" y="245" font-family="monospace" font-size="7.5" fill="#333">[A,B,C]</text>
    <text x="350" y="245" font-family="Arial" font-size="7" fill="#888">F:2</text>
    <text x="224" y="256" font-family="monospace" font-size="7.5" fill="#333">[E]</text>
    <text x="280" y="256" font-family="monospace" font-size="7.5" fill="#333">[A,B,C,D]</text>
    <text x="350" y="256" font-family="Arial" font-size="7" fill="#888">F:1</text>
    <text x="224" y="267" font-family="monospace" font-size="7.5" fill="#333">[F]</text>
    <text x="280" y="267" font-family="monospace" font-size="7.5" fill="#333">[A,B,C,D,E]</text>
    <rect x="224" y="274" width="180" height="14" rx="3" fill="#3949AB" fill-opacity="0.1"/>
    <text x="314" y="284" font-family="monospace" font-size="9" fill="#3949AB" text-anchor="middle" font-weight="bold">Order: A, B, C, D, E, F</text>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="Topological sorting has many real-world applications. Build systems like Makefiles use it to determine compilation order. Universities use it to plan course prerequisites. Task schedulers use it for job ordering. Package managers use it to resolve dependency chains.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="8" y="298" width="404" height="94" rx="6" fill="white" fill-opacity="0.5" stroke="#C62828" stroke-width="1"/>
    <text x="210" y="314" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828" text-anchor="middle">Applications</text>
    <!-- Build Systems -->
    <rect x="16" y="322" width="90" height="62" rx="5" fill="#3949AB" fill-opacity="0.1" stroke="#3949AB" stroke-width="0.8"/>
    <text x="61" y="336" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB" text-anchor="middle">Build Systems</text>
    <text x="61" y="350" font-family="monospace" font-size="7.5" fill="#333" text-anchor="middle">Makefile</text>
    <text x="61" y="362" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">Compile order</text>
    <text x="61" y="374" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">for source files</text>
    <!-- Course Prerequisites -->
    <rect x="114" y="322" width="90" height="62" rx="5" fill="#00695C" fill-opacity="0.1" stroke="#00695C" stroke-width="0.8"/>
    <text x="159" y="336" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Prerequisites</text>
    <text x="159" y="350" font-family="Arial" font-size="7.5" fill="#333" text-anchor="middle">Course planning</text>
    <text x="159" y="362" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">Semester-wise</text>
    <text x="159" y="374" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">scheduling</text>
    <!-- Task Scheduling -->
    <rect x="212" y="322" width="90" height="62" rx="5" fill="#E65100" fill-opacity="0.1" stroke="#E65100" stroke-width="0.8"/>
    <text x="257" y="336" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Task Scheduling</text>
    <text x="257" y="350" font-family="Arial" font-size="7.5" fill="#333" text-anchor="middle">Job ordering</text>
    <text x="257" y="362" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">Dependency-aware</text>
    <text x="257" y="374" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">execution</text>
    <!-- Package Dependencies -->
    <rect x="310" y="322" width="94" height="62" rx="5" fill="#C62828" fill-opacity="0.1" stroke="#C62828" stroke-width="0.8"/>
    <text x="357" y="336" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Pkg Manager</text>
    <text x="357" y="350" font-family="monospace" font-size="7.5" fill="#333" text-anchor="middle">npm, apt</text>
    <text x="357" y="362" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">Dependency</text>
    <text x="357" y="374" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">resolution</text>
  </g>
</svg>
