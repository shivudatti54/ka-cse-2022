<svg 
    width="420" 
    height="400" 
    data-topic-id="travelling-salesman-problem"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 0 420 400"
    style="background-color: #c7d9f8;">

<defs>
<linearGradient id="pasteel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ADD8E6"/>
    <stop offset="100%" stop-color="#C4E8F3"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="420" height="400" style="fill: url(#pasteel-gradient)" rx="10"/>

<rect x="10" y="10" width="400" height="380" style="fill: rgba(105, 105, 105, 0.3)"/>
<g transform="translate(15, 15)">
<g data-narration="The Travelling Salesman Problem is a classic problem in computer science and operations research that involves finding the shortest possible tour that visits a set of cities and returns to the starting city.">
<text x="0" y="0" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #2E4053">TSP Introduction</text>
<animate transform="rotate(0 0 0)" attributeName="transform" dur="2000" begin="0s" repeatCount="indefinite"/>
</g>

<g data-narration="The Travelling Salesman Problem is defined as follows: A set of `n` cities, each represented by a coordinate (x, y), and each city has a distance function `d(i, j)` that calculates the distance between cities `i` and `j`">
<rect x="0" y="60" width="30" height="30" style="fill: #F5F5F5"/>
<text x="15" y="50" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053" transform="rotate(0 15 0)">n</text>
<text x="40" y="60" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">Cities</text>
<text x="75" y="50" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">(x, y)</text>
<text x="100" y="60" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">d(i, j)</text>
</g>

<g data-narration="The Brute Force approach to solving TSP involves exhaustively searching all possible permutations of cities. Here is a high-level outline of the steps involved:">
<g transform="translate(15, 80)">
<rect x="0" y="0" width="400" height="50" style="fill: #F5F5F5"/>
<rect x="0" y="20" width="30" height="30" style="fill: #F5F5F5"/>
<text x="15" y="10" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053" transform="rotate(0 15 0)">Generate all permutations</text>
<text x="40" y="20" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">Calculate distance</text>
<text x="75" y="10" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">Compare distances</text>
<text x="100" y="20" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">Keep track of the shortest one</text>
</g>
<g transform="translate(15, 130)">
<rect x="0" y="0" width="400" height="50" style="fill: #F5F5F5"/>
<rect x="0" y="20" width="30" height="30" style="fill: #F5F5F5"/>
<text x="15" y="10" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053" transform="rotate(0 15 0)">Example</text>
<text x="40" y="20" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">Suppose we have 4 cities: A(0, 0), B(3, 4), C(6, 8), and D(9, 12)</text>
<text x="75" y="10" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">(x, y)</text>
<text x="100" y="20" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">Calculate the distance of each permutation</text>
</g>

<g data-narration="As we can see, the Brute Force approach requires an exponential amount of computation, especially for larger values of `n`.">
<g transform="translate(15, 170)">
<rect x="0" y="0" width="400" height="50" style="fill: #F5F5F5"/>
<rect x="0" y="20" width="30" height="30" style="fill: #F5F5F5"/>
<text x="15" y="10" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053" transform="rotate(0 15 0)">Time Complexity</text>
<text x="40" y="20" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">O(2^n)</text>
</g>

<g data-narration="In conclusion, the Brute Force approach to solving TSP is not efficient for large values of `n`.">
<g transform="translate(15, 210)">
<rect x="0" y="0" width="400" height="50" style="fill: #F5F5F5"/>
<rect x="0" y="20" width="30" height="30" style="fill: #F5F5F5"/>
<text x="15" y="10" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053" transform="rotate(0 15 0)">Conclusion</text>
<text x="40" y="20" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053">The Brute Force approach is not efficient for large values of `n`</text>
</g>

<g transform="translate(15, 250)">
<g data-narration="The next section will explore more efficient algorithms for solving TSP.">
<rect x="0" y="0" width="30" height="30" style="fill: #F5F5F5"/>
<text x="15" y="10" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053" transform="rotate(0 15 0)">Next Section</text>
</g>
<g transform="translate(240, 250)">
<g data-narration="For more information on TSP and related algorithms, visit our website at <a href="https://www.example.com">https://www.example.com</a>">
<rect x="0" y="0" width="30" height="30" style="fill: #F5F5F5"/>
<text x="15" y="10" font-size="18" font-family="Arial" text-anchor="middle" style="fill: #2E4053" transform="rotate(0 15 0)">Learn More</text>
</a>
</g>

<g transform="translate(15, 300)">
<g data-narration="The Travelling Salesman Problem is a classic problem in computer science and operations research that involves finding the shortest possible tour that visits a set of cities and returns to the starting city.">
<text x="0" y="0" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #2E4053">TSP</text>
<animate transform="rotate(0 0 0)" attributeName="transform" dur="2000" begin="0s" repeatCount="indefinite"/>
</g>

<g transform="translate(15, 350)">
<g data-narration="Section 5.1: Brute Force Approaches (continued)">
<text x="0" y="0" font-size="24" font-family="Arial" text-anchor="middle" style="fill: #2E4053">TSP</text>
</g>

</svg>