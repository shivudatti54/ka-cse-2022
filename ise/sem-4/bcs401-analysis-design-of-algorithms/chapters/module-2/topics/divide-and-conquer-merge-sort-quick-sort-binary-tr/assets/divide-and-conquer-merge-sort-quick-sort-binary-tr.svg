<svg width="420" height="400" data-topic-id="divide-and-conquer-merge-sort-quick-sort-binary-tree-traversals-multiplication-of-large-integers-strassen-matrix-multiplication">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6577cc" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4682b4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#337ab7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="10" y="10" font-size="24" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">
    Divide and Conquer Algorithms
  </text>
  
  <!-- Section 1: Merge Sort -->
  <section id="merge-sort" data-narration="Merge Sort is a divide-and-conquer algorithm that splits a list into two halves, recursively sorts each half, and then merges them.">
    <rect x="10" y="40" width="400" height="100" fill="#fff" rx="10" data-narration="Merge Sort">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Merge Sort</text>
    </rect>
    <rect x="10" y="150" width="400" height="100" fill="#fff" rx="10" data-narration="Divide the list into two halves.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="130" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Divide</text>
    </rect>
    <rect x="10" y="300" width="400" height="100" fill="#fff" rx="10" data-narration="Merging the two sorted halves.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="280" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Merge</text>
    </rect>
  </section>
  
  <!-- Section 2: Quick Sort -->
  <section id="quick-sort" data-narration="Quick Sort is a divide-and-conquer algorithm that selects a pivot element, partitions the list around the pivot, and recursively sorts each partition.">
    <rect x="10" y="40" width="400" height="100" fill="#fff" rx="10" data-narration="Select a pivot element.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Quick Sort</text>
    </rect>
    <rect x="10" y="150" width="400" height="100" fill="#fff" rx="10" data-narration="Partition the list around the pivot.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="130" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Partition</text>
    </rect>
    <rect x="10" y="300" width="400" height="100" fill="#fff" rx="10" data-narration="Recursively sort each partition.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="280" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Recursion</text>
    </rect>
  </section>
  
  <!-- Section 3: Binary Tree Traversals -->
  <section id="binary-tree-traversals" data-narration="A binary tree is a tree data structure in which each node has at most two children (i.e., left child and right child).">
    <rect x="10" y="40" width="400" height="100" fill="#fff" rx="10" data-narration="In-Order Traversal: Left subtree + Current Node + Right subtree.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">In-Order</text>
    </rect>
    <rect x="10" y="150" width="400" height="100" fill="#fff" rx="10" data-narration="Pre-Order Traversal: Current Node + Left subtree + Right subtree.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="130" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Pre-Order</text>
    </rect>
    <rect x="10" y="300" width="400" height="100" fill="#fff" rx="10" data-narration="Post-Order Traversal: Left subtree + Right subtree + Current Node.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="280" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Post-Order</text>
    </rect>
  </section>
  
  <!-- Section 4: Multiplication of Large Integers -->
  <section id="multiplication-of-large-integers" data-narration="Multiplication of Large Integers is a critical operation in computer arithmetic.">
    <rect x="10" y="40" width="400" height="100" fill="#fff" rx="10" data-narration="Base 10 system for multiplication.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Base 10</text>
    </rect>
    <rect x="10" y="150" width="400" height="100" fill="#fff" rx="10" data-narration="PEMDAS for multiplication.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="130" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">PEMDAS</text>
    </rect>
  </section>
  
  <!-- Section 5: Strassen’s Matrix Multiplication -->
  <section id="strassens-matrix-multiplication" data-narration="Strassen’s Matrix Multiplication is a divide-and-conquer algorithm for multiplying two matrices.">
    <rect x="10" y="40" width="400" height="100" fill="#fff" rx="10" data-narration="Divide the matrix into quadrants.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Divide</text>
    </rect>
    <rect x="10" y="150" width="400" height="100" fill="#fff" rx="10" data-narration="Recursively multiply the quadrants.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" repeatCount="indefinite"/>
      <text x="10" y="130" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Recursion</text>
    </rect>
  </section>
  
  <!-- Footer -->
  <text x="10" y="370" font-size="18" font-family="Arial, sans-serif" fill="#337ab7" text-anchor="start">Divide and Conquer Algorithms</text>
</svg>