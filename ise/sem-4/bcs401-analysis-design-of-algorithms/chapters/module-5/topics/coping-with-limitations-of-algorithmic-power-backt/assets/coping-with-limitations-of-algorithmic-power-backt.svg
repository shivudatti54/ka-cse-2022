  </section>
  
  <!-- Section 2: Backtracking -->
  <section data-narration="Backtracking">
    <rect x="10" y="80" width="400" height="50" style="fill: #f9f9f9; border: 1px solid #ccc; background-color: #fff; padding: 10px"/>
    <g transform="translate(20, 90)">
      <rect x="0" y="0" width="20" height="20" style="fill: #ccc; stroke: #666; stroke-width: 2"/>
      <text x="10" y="15" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">Recursion</text>
      <text x="10" y="25" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">Branching</text>
      <text x="10" y="35" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">Backtracking</text>
      <animateTransform attributeName="transform" type="rotate" from="0 180 50" to="360 180 50" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  
  <!-- Section 3: n-Queens Problem -->
  <section data-narration="n-Queens Problem">
    <rect x="10" y="130" width="400" height="50" style="fill: #f9f9f9; border: 1px solid #ccc; background-color: #fff; padding: 10px"/>
    <g transform="translate(20, 140)">
      <rect x="0" y="0" width="20" height="20" style="fill: #ccc; stroke: #666; stroke-width: 2"/>
      <text x="10" y="15" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">n = 4</text>
      <text x="10" y="25" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">
        <tspan x="10" y="25">  . Q . . </tspan>
        <tspan x="10" y="35">  . . . . </tspan>
        <tspan x="10" y="45">  . . . . </tspan>
        <tspan x="10" y="55">  . . Q . </tspan>
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0 180 50" to="360 180 50" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  
  <!-- Section 4: Subset-Sum Problem -->
  <section data-narration="Subset-Sum Problem">
    <rect x="10" y="190" width="400" height="50" style="fill: #f9f9f9; border: 1px solid #ccc; background-color: #fff; padding: 10px"/>
    <g transform="translate(20, 200)">
      <rect x="0" y="0" width="20" height="20" style="fill: #ccc; stroke: #666; stroke-width: 2"/>
      <text x="10" y="15" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">Subset</text>
      <text x="10" y="25" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">Sum</text>
      <text x="10" y="35" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">Problem</text>
      <animateTransform attributeName="transform" type="rotate" from="0 180 50" to="360 180 50" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  
  <!-- Section 5: Example -->
  <section data-narration="Example">
    <rect x="10" y="240" width="400" height="50" style="fill: #f9f9f9; border: 1px solid #ccc; background-color: #fff; padding: 10px"/>
    <g transform="translate(20, 250)">
      <rect x="0" y="0" width="20" height="20" style="fill: #ccc; stroke: #666; stroke-width: 2"/>
      <text x="10" y="15" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">n = 4</text>
      <text x="10" y="25" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">
        <tspan x="10" y="25">  Q . . . </tspan>
        <tspan x="10" y="35">  . . . . </tspan>
        <tspan x="10" y="45">  . . . . </tspan>
        <tspan x="10" y="55">  . . Q . </tspan>
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0 180 50" to="360 180 50" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  
  <!-- Section 6: Code -->
  <section data-narration="Code">
    <rect x="10" y="300" width="400" height="50" style="fill: #f9f9f9; border: 1px solid #ccc; background-color: #fff; padding: 10px"/>
    <pre>
      <code>
        def solve_n_queens(n):
          def is_valid(board, row, col):
            for i in range(row):
              if board[i] == col or \
                board[i] - i == col - row or \
                board[i] + i == col + row:
                return False
            return True

          def place_queens(n, row, board):
            if row == n:
              result.append(board[:])
              return
            for col in range(n):
              if is_valid(board, row, col):
                board[row] = col
                place_queens(n, row + 1, board)

          result = []
          place_queens(n, 0, [-1]*n)
          return result

        print(solve_n_queens(4))
      </code>
    </pre>
    <animateTransform attributeName="transform" type="rotate" from="0 180 50" to="360 180 50" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer -->
  <footer>
    <text x="10" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Coping with Limitations of Algorithmic Power</text>
  </footer>
</svg>