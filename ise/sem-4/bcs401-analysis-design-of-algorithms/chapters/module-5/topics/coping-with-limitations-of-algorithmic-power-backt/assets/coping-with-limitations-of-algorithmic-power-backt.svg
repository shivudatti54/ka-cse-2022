<svg width="420" height="400" data-topic-id="coping-with-limitations-of-algorithmic-power">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7e7f5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#cdffdb" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient)"/>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="20" width="400" height="50" style="fill: #f9f9f9; border: 1px solid #ccc; background-color: #fff; padding: 10px"/>
    <text x="15" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Coping with Limitations of Algorithmic Power</text>
