<svg width="420" height="400" data-topic-id="chapter-12-sections-121">
  <!-- Title -->
  <title>Chapter 12 Sections 121</title>
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1 -->
  <section data-narration="Introduction to Decision Trees">
    <rect x="20" y="20" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <rect x="20" y="190" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <text x="50" y="70" font-size="24" font-family="Arial" fill="#2E4053">A decision tree is a tree-like structure used to represent the possible choices and outcomes of a problem.</text>
    <text x="50" y="220" font-size="24" font-family="Arial" fill="#2E4053">It is a fundamental concept in algorithm design and is used to solve problems in a systematic and efficient manner.</text>
  </section>
  
  <!-- Section 2 -->
  <section data-narration="Definition of Decision Trees">
    <rect x="20" y="20" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <rect x="20" y="190" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 190" dur="2s" begin="0s"/>
    <g transform="translate(0 20)">
      <circle cx="50" cy="70" r="20" fill="#2E4053" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="70" font-size="18" font-family="Arial" fill="#2E4053">Nodes represent decisions or choices.</text>
      <line x1="50" y1="70" x2="100" y2="100" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="100" font-size="18" font-family="Arial" fill="#2E4053">Edges represent the flow of control between nodes.</text>
    </g>
  </section>
  
  <!-- Section 3 -->
  <section data-narration="Example of a Decision Tree">
    <rect x="20" y="20" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <rect x="20" y="190" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 190" dur="2s" begin="2s"/>
    <g transform="translate(0 20)">
      <circle cx="50" cy="70" r="20" fill="#2E4053" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="70" font-size="18" font-family="Arial" fill="#2E4053">Nodes represent decisions or choices.</text>
      <line x1="50" y1="70" x2="100" y2="100" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="100" font-size="18" font-family="Arial" fill="#2E4053">Edges represent the flow of control between nodes.</text>
      <line x1="50" y1="100" x2="100" y2="150" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="150" font-size="18" font-family="Arial" fill="#2E4053">Leaves represent the possible outcomes or solutions to the problem.</text>
    </g>
  </section>
  
  <!-- Section 4 -->
  <section data-narration="Shortest Path Problem">
    <rect x="20" y="20" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <rect x="20" y="190" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 190" dur="2s" begin="4s"/>
    <g transform="translate(0 20)">
      <circle cx="50" cy="70" r="20" fill="#2E4053" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="70" font-size="18" font-family="Arial" fill="#2E4053">Nodes represent decisions or choices.</text>
      <line x1="50" y1="70" x2="100" y2="100" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="100" font-size="18" font-family="Arial" fill="#2E4053">Edges represent the flow of control between nodes.</text>
      <line x1="50" y1="100" x2="100" y2="150" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="150" font-size="18" font-family="Arial" fill="#2E4053">Leaves represent the possible outcomes or solutions to the problem.</text>
      <line x1="50" y1="150" x2="200" y2="200" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="200" font-size="18" font-family="Arial" fill="#2E4053">The leaf with the shortest path is the solution to the problem.</text>
    </g>
  </section>
  
  <!-- Section 5 -->
  <section data-narration="NP-Complete Problems">
    <rect x="20" y="20" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <rect x="20" y="190" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 190" dur="2s" begin="6s"/>
    <g transform="translate(0 20)">
      <circle cx="50" cy="70" r="20" fill="#2E4053" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="70" font-size="18" font-family="Arial" fill="#2E4053">NP-complete problems are a class of problems that are computationally intractable.</text>
      <line x1="50" y1="70" x2="100" y2="100" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="100" font-size="18" font-family="Arial" fill="#2E4053">They are problems that are at least as hard as the hardest problems in NP.</text>
      <line x1="50" y1="100" x2="100" y2="150" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="150" font-size="18" font-family="Arial" fill="#2E4053">NP-complete problems include problems like the traveling salesman problem and the Boolean satisfiability problem.</text>
    </g>
  </section>
  
  <!-- Section 6 -->
  <section data-narration="Conclusion">
    <rect x="20" y="20" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <rect x="20" y="190" width="380" height="150" fill="#ADD8E6" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 190" dur="2s" begin="8s"/>
    <g transform="translate(0 20)">
      <circle cx="50" cy="70" r="20" fill="#2E4053" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="70" font-size="18" font-family="Arial" fill="#2E4053">In conclusion, decision trees are a powerful tool for solving problems in a systematic and efficient manner.</text>
      <line x1="50" y1="70" x2="100" y2="100" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="100" font-size="18" font-family="Arial" fill="#2E4053">NP-complete problems are a class of problems that are computationally intractable.</text>
      <line x1="50" y1="100" x2="100" y2="150" stroke="#ADD8E6" stroke-width="2"/>
      <text x="50" y="150" font-size="18" font-family="Arial" fill="#2E4053">Understanding decision trees and NP-complete problems is essential for designing efficient algorithms.</text>
    </g>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="390" font-size="24" font-family="Arial" fill="#2E4053">Chapter 12 Sections 121</text>
</svg>