<svg width="420" height="400" data-topic-id="limitations-of-algorithmic-power">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <g transform="translate(20, 50)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Chapter 11: Limitations of Algorithmic Power</text>
  </g>

  <g transform="translate(20, 100)">
    <rect width="100" height="20" fill="#FFFFFF" rx="5" data-narration="Introduction to Decision Trees"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Decision Trees</text>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" from="translate(20, 100)" to="translate(20, 120)" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 140)">
    <rect width="100" height="20" fill="#FFFFFF" rx="5" data-narration="Definition of Decision Trees"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">A directed acyclic graph (DAG) with nodes representing decisions and edges representing relationships between nodes.</text>
    <animateTransform attributeName="transform" type="translate" begin="0.5s" dur="2s" from="translate(20, 140)" to="translate(20, 160)" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 180)">
    <rect width="100" height="20" fill="#FFFFFF" rx="5" data-narration="Example of a Decision Tree"/>
    <rect width="200" height="50" fill="#FFFFFF" rx="5" data-narration="Is even? - Yes -> Composite, No -> Prime"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" transform="rotate(90 100 10)"></text>
    <animateTransform attributeName="transform" type="rotate" begin="1s" dur="2s" from="rotate(0 100 10)" to="rotate(180 100 10)" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 220)">
    <rect width="100" height="20" fill="#FFFFFF" rx="5" data-narration="P Problems"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Decision problems that can be solved in polynomial time.</text>
    <rect width="200" height="50" fill="#FFFFFF" rx="5" data-narration="Sorting - O(n), Finding Maximum - O(n), Checking Palindrome - O(n)"/>
    <animateTransform attributeName="transform" type="translate" begin="1.5s" dur="2s" from="translate(20, 220)" to="translate(20, 240)" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 270)">
    <rect width="100" height="20" fill="#FFFFFF" rx="5" data-narration="NP Problems"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Decision problems that can be verified in polynomial time, but may not be solvable in polynomial time.</text>
    <rect width="200" height="50" fill="#FFFFFF" rx="5" data-narration="Sorting - NP Complete, Finding Maximum - NP Complete, Checking Palindrome - NP Complete"/>
    <animateTransform attributeName="transform" type="translate" begin="2.5s" dur="2s" from="translate(20, 270)" to="translate(20, 290)" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 320)">
    <rect width="100" height="20" fill="#FFFFFF" rx="5" data-narration="NP-Complete Problems"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Decision problems that are NP-Complete and cannot be approximated in polynomial time.</text>
    <rect width="200" height="50" fill="#FFFFFF" rx="5" data-narration="Checking whether a given string is a palindrome - NP Complete, Knapsack Problem - NP Complete"/>
    <animateTransform attributeName="transform" type="translate" begin="3.5s" dur="2s" from="translate(20, 320)" to="translate(20, 340)" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 380)">
    <rect width="100" height="20" fill="#FFFFFF" rx="5" data-narration="Conclusion"/>
    <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Algorithms have limitations, but understanding these limitations is crucial for designing efficient algorithms.</text>
    <g transform="rotate(90 100 10)">
      <rect width="200" height="50" fill="#FFFFFF" rx="5" data-narration="References"/>
      <text x="0" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle"></text>
    </g>
  </g>
</svg>