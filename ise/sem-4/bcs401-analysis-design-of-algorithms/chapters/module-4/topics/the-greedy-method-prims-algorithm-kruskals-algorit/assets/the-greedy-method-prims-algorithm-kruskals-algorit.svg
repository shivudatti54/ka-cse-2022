    <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#4C5154">Dijkstra's Algorithm</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">Dijkstra's Algorithm is a greedy algorithm that finds the shortest path between two nodes in a weighted graph.</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">It works by selecting the edge with the smallest weight that does not form a cycle.</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">For example, if we have a graph with five vertices and six edges.</text>
    <text x="10" y="100" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">We can select the edges with the smallest weight that do not form a cycle.</text>
    <text x="10" y="120" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">The resulting graph is a minimum spanning tree.</text>
    <text x="10" y="140" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">For example:</text>
    <text x="10" y="160" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">We can draw the edges with the smallest weight that do not form a cycle.</text>
    <text x="10" y="180" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">The resulting graph is a minimum spanning tree.</text>
    <animate transform="translate(15,30)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(15,50)" begin="2s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(15,70)" begin="4s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(15,90)" begin="6s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(15,110)" begin="8s" dur="2s" repeatCount="indefinite"/>
  </g>
