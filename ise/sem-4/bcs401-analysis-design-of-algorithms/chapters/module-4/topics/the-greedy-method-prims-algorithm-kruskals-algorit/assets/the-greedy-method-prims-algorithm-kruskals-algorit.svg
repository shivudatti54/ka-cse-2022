  <title>The Greedy Method Prims Algorithm Kruskals Algorithm</title>
  <g id="g-0" transform="translate(15,15)">
    <rect width="389" height="359" rx="10" fill="url(#pastel-1)"/>
    <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#4C5154">Introduction</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">The Greedy Method is a simple, intuitive approach to solving optimization problems.</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">It works by making the locally optimal choice at each stage, with the hope that these local choices will lead to a global optimum.</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">This method is useful when the problem has a clear definition of "optimal" and when the cost of making a suboptimal choice is high.</text>
  </g>
  <g id="g-1" transform="translate(15,180)">
    <rect width="389" height="359" rx="10" fill="url(#pastel-1)"/>
    <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#4C5154">Huffman Trees and Codes</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">A Huffman tree is a binary tree in which all internal nodes have a degree of at least two.</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">Huffman trees are used to compress data by assigning shorter codes to more frequent symbols.</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">For example, if we want to compress a message that consists of the letters A, B, C, and D.</text>
    <text x="10" y="100" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">We can construct a Huffman tree as follows:</text>
  </g>
  <g id="g-2" transform="translate(15,280)">
    <rect width="389" height="359" rx="10" fill="url(#pastel-1)"/>
    <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#4C5154">Constructing the Huffman Tree</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">First, we calculate the frequency of each symbol.</text>
    <animate transform="translate(15,30)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(15,50)" begin="2s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(15,70)" begin="4s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(15,90)" begin="6s" dur="2s" repeatCount="indefinite"/>
    <animate transform="translate(15,110)" begin="8s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="g-3" transform="translate(15,360)">
    <rect width="389" height="359" rx="10" fill="url(#pastel-2)"/>
    <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#4C5154">Kruskal's Algorithm</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">Kruskal's Algorithm is a greedy algorithm that finds the minimum spanning tree of a connected graph.</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">It works by selecting the edge with the smallest weight that does not form a cycle.</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">For example, if we have a graph with five vertices and six edges.</text>
    <text x="10" y="100" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">We can select the edges with the smallest weight that do not form a cycle.</text>
    <text x="10" y="120" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">The resulting graph is a minimum spanning tree.</text>
    <text x="10" y="140" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">For example:</text>
    <text x="10" y="160" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">We can draw the edges with the smallest weight that do not form a cycle.</text>
    <text x="10" y="180" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">The resulting graph is a minimum spanning tree.</text>
  </g>
  <g id="g-4" transform="translate(15,180)">
