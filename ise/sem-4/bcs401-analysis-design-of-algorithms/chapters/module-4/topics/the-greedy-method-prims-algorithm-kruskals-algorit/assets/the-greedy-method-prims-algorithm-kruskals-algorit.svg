    <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#4C5154">Example Applications</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">The Greedy Method is used in a wide range of applications, including:</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">graph algorithms, coding theory, and combinatorics.</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">For example:</text>
    <text x="10" y="100" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">in network optimization, data compression, and scheduling.</text>
    <text x="10" y="120" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">The Greedy Method is a powerful tool for solving optimization problems.</text>
    <text x="10" y="140" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">It is used in many real-world applications.</text>
    <text x="10" y="160" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">For example:</text>
    <text x="10" y="180" font-size="18" font-family="Arial" text-anchor="start" fill="#4C5154">in data compression, image processing, and machine learning.</text>
  </g>
