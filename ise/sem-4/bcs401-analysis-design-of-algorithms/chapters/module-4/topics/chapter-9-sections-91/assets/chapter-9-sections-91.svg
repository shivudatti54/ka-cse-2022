<svg width="420" height="400" data-topic-id="dynamic-programming-three-basic-examples-and-the-knapsack-problem">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1" />
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" />
  
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle">Chapter 9: Dynamic Programming - Three Basic Examples and The Knapsack Problem</text>
  
  <!-- Section 1: Introduction to Dynamic Programming -->
  <rect x="10" y="50" width="400" height="50" fill="#2F4F7F" rx="10" />
  <text x="20" y="75" font-size="18" font-family="Arial" fill="#C9E4CA">Introduction to Dynamic Programming</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="2s" begin="0s" />
  <text x="20" y="100" font-size="18" font-family="Arial" fill="#C9E4CA" data-narration="Dynamic programming is a method for solving complex problems by breaking them down into smaller subproblems, solving each subproblem only once, and storing the solutions to subproblems to avoid redundant computation." />
  
  <!-- Section 2: Key Concepts -->
  <rect x="10" y="160" width="400" height="50" fill="#2F4F7F" rx="10" />
  <text x="20" y="185" font-size="18" font-family="Arial" fill="#C9E4CA">Key Concepts</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="1s" />
  <rect x="20" y="120" width="100" height="50" fill="#FFC107" rx="10" />
  <text x="120" y="155" font-size="18" font-family="Arial" fill="#C9E4CA">Optimal Substructure</text>
  <text x="120" y="180" font-size="18" font-family="Arial" fill="#C9E4CA" data-narration="A problem has optimal substructure if the optimal solution to the problem can be constructed from the optimal solutions of its subproblems." />
  
  <!-- Section 3: Overlapping Subproblems -->
  <rect x="10" y="230" width="400" height="50" fill="#2F4F7F" rx="10" />
  <text x="20" y="255" font-size="18" font-family="Arial" fill="#C9E4CA">Overlapping Subproblems</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="2s" begin="2s" />
  <rect x="20" y="180" width="100" height="50" fill="#FFC107" rx="10" />
  <text x="120" y="215" font-size="18" font-family="Arial" fill="#C9E4CA">Memoization</text>
  <text x="120" y="240" font-size="18" font-family="Arial" fill="#C9E4CA" data-narration="Storing the solutions to subproblems in a memory (e.g., an array or a table) to avoid redundant computation." />
  
  <!-- Section 4: Fibonacci Series -->
  <rect x="10" y="290" width="400" height="50" fill="#2F4F7F" rx="10" />
  <text x="20" y="315" font-size="18" font-family="Arial" fill="#C9E4CA">Fibonacci Series</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,130" dur="2s" begin="3s" />
  <rect x="20" y="260" width="100" height="50" fill="#FFC107" rx="10" />
  <text x="120" y="295" font-size="18" font-family="Arial" fill="#C9E4CA">F(n) = F(n-1) + F(n-2)</text>
  <text x="120" y="320" font-size="18" font-family="Arial" fill="#C9E4CA" data-narration="A naive recursive solution to this problem would have an exponential time complexity due to the repeated computation of the same subproblems. However, using dynamic programming, we can solve this problem in linear time complexity by storing the solutions to subproblems in an array:" />
  
  <!-- Section 5: Longest Common Subsequence -->
  <rect x="10" y="370" width="400" height="50" fill="#2F4F7F" rx="10" />
  <text x="20" y="395" font-size="18" font-family="Arial" fill="#C9E4CA">Longest Common Subsequence</text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="4s" />
  <rect x="20" y="330" width="100" height="50" fill="#FFC107" rx="10" />
  <text x="120" y="365" font-size="18" font-family="Arial" fill="#C9E4CA">Two sequences X and Y</text>
  <text x="120" y="390" font-size="18" font-family="Arial" fill="#C9E4CA" data-narration="We need to find the longest subsequence that is common to both sequences. A naive recursive solution to this problem would have an exponential time complexity due to the repeated computation of the same subproblems. However, using dynamic programming, we can solve this problem in linear time complexity by storing the solutions to subproblems in an array:" />
  
  <!-- Footer -->
  <text x="10" y="410" font-size="18" font-family="Arial" text-anchor="middle">Chapter 9: Dynamic Programming - Three Basic Examples and The Knapsack Problem</text>
</svg>