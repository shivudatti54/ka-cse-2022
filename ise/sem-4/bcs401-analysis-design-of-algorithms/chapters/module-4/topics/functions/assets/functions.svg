<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="functions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Growth of Functions studies how algorithm running time increases with input size, using asymptotic notation.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB">Growth of Functions</text>
    <line x1="100" y1="38" x2="320" y2="38" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="100" cy="38" r="3" fill="#E65100"/>
    <circle cx="320" cy="38" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Big-O, Big-Omega, Big-Theta definitions with curves -->
  <g opacity="0" data-narration="Big-O gives the upper bound, Big-Omega the lower bound, and Big-Theta the tight bound of an algorithm's growth rate.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- O(g(n)) - Upper Bound -->
    <rect x="8" y="48" width="130" height="62" rx="6" fill="#FFFFFF" stroke="#3949AB" stroke-width="1.2"/>
    <text x="73" y="63" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#3949AB">O(g(n))</text>
    <text x="73" y="76" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Upper Bound</text>
    <!-- Mini curve: c*g(n) above f(n) -->
    <polyline points="20,104 40,100 60,94 80,86 100,76 120,64" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <polyline points="20,104 40,102 60,98 80,95 100,92 120,88" fill="none" stroke="#3949AB" stroke-width="1.2" opacity="0.7"/>
    <text x="125" y="68" font-family="monospace" font-size="7" fill="#C62828">cg(n)</text>
    <text x="125" y="91" font-family="monospace" font-size="7" fill="#3949AB">f(n)</text>

    <!-- Omega(g(n)) - Lower Bound -->
    <rect x="145" y="48" width="130" height="62" rx="6" fill="#FFFFFF" stroke="#00695C" stroke-width="1.2"/>
    <text x="210" y="63" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#00695C">&#937;(g(n))</text>
    <text x="210" y="76" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Lower Bound</text>
    <!-- Mini curve: f(n) above c*g(n) -->
    <polyline points="157,104 177,102 197,98 217,95 237,92 257,88" fill="none" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <polyline points="157,104 177,100 197,94 217,86 237,76 257,64" fill="none" stroke="#3949AB" stroke-width="1.2" opacity="0.7"/>
    <text x="262" y="91" font-family="monospace" font-size="7" fill="#00695C">cg(n)</text>
    <text x="262" y="68" font-family="monospace" font-size="7" fill="#3949AB">f(n)</text>

    <!-- Theta(g(n)) - Tight Bound -->
    <rect x="282" y="48" width="130" height="62" rx="6" fill="#FFFFFF" stroke="#E65100" stroke-width="1.2"/>
    <text x="347" y="63" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#E65100">&#920;(g(n))</text>
    <text x="347" y="76" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Tight Bound</text>
    <!-- Mini curve: f(n) sandwiched between c1*g(n) and c2*g(n) -->
    <polyline points="294,104 314,100 334,94 354,86 374,76 394,64" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
    <polyline points="294,104 314,101 334,97 354,92 374,86 394,78" fill="none" stroke="#E65100" stroke-width="1.2" opacity="0.7"/>
    <polyline points="294,104 314,102 334,100 354,97 374,94 394,90" fill="none" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
    <text x="397" y="67" font-family="monospace" font-size="6" fill="#C62828">c&#8322;g</text>
    <text x="397" y="81" font-family="monospace" font-size="6" fill="#E65100">f</text>
    <text x="397" y="93" font-family="monospace" font-size="6" fill="#00695C">c&#8321;g</text>
  </g>

  <!-- Group 3: Common growth rates hierarchy as increasing curves -->
  <g opacity="0" data-narration="Common growth rates from fastest to slowest are: constant, logarithmic, linear, n log n, quadratic, exponential, and factorial.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="126" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Growth Rate Hierarchy</text>
    <!-- Axes -->
    <line x1="30" y1="200" x2="250" y2="200" stroke="#555" stroke-width="1"/>
    <line x1="30" y1="200" x2="30" y2="135" stroke="#555" stroke-width="1"/>
    <text x="140" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">n (input size)</text>
    <text x="18" y="168" text-anchor="middle" font-family="Arial" font-size="8" fill="#555" transform="rotate(-90,18,168)">time</text>
    <!-- O(1) - flat -->
    <line x1="35" y1="196" x2="245" y2="196" stroke="#00695C" stroke-width="1.3"/>
    <text x="248" y="198" font-family="monospace" font-size="7" fill="#00695C">O(1)</text>
    <!-- O(log n) -->
    <polyline points="35,196 65,188 105,182 155,177 205,174 245,172" fill="none" stroke="#3949AB" stroke-width="1.3"/>
    <text x="248" y="174" font-family="monospace" font-size="7" fill="#3949AB">O(log n)</text>
    <!-- O(n) -->
    <polyline points="35,196 85,186 135,176 185,166 235,156 245,154" fill="none" stroke="#E65100" stroke-width="1.3"/>
    <text x="248" y="156" font-family="monospace" font-size="7" fill="#E65100">O(n)</text>
    <!-- O(n log n) -->
    <polyline points="35,196 75,185 115,172 155,158 195,142 235,125 245,122" fill="none" stroke="#7B1FA2" stroke-width="1.3"/>
    <text x="248" y="124" font-family="monospace" font-size="7" fill="#7B1FA2">O(n log n)</text>
    <!-- O(n^2) -->
    <polyline points="35,196 65,194 95,188 125,178 155,164 185,147 215,126 245,102" fill="none" stroke="#C62828" stroke-width="1.3"/>
    <text x="248" y="104" font-family="monospace" font-size="7" fill="#C62828">O(n&#178;)</text>
    <!-- O(2^n) -->
    <polyline points="35,196 65,195 95,193 125,189 145,183 165,172 180,158 195,138" fill="none" stroke="#D84315" stroke-width="1.3" stroke-dasharray="4,2"/>
    <text x="198" y="136" font-family="monospace" font-size="7" fill="#D84315">O(2&#8319;)</text>
    <!-- Hierarchy order listing -->
    <text x="325" y="140" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Order:</text>
    <text x="325" y="152" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00695C">O(1)</text>
    <text x="325" y="161" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">&lt;</text>
    <text x="325" y="170" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#3949AB">O(log n)</text>
    <text x="325" y="179" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">&lt;</text>
    <text x="325" y="188" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#E65100">O(n)</text>
    <text x="325" y="197" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">&lt;</text>
    <text x="325" y="206" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#C62828">O(n&#178;)</text>
    <text x="390" y="152" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#7B1FA2">O(n log n)</text>
    <text x="390" y="161" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">&lt;</text>
    <text x="390" y="170" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#D84315">O(2&#8319;)</text>
    <text x="390" y="179" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">&lt;</text>
    <text x="390" y="188" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#C62828">O(n!)</text>
  </g>

  <!-- Group 4: Algorithm-Complexity Examples -->
  <g opacity="0" data-narration="Common algorithm examples: Binary search is O of log n, Linear search is O of n, Merge sort is O of n log n, and Bubble sort is O of n squared.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="108" y="228" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Algorithm Examples</text>
    <!-- Binary Search -->
    <rect x="8" y="233" width="96" height="36" rx="5" fill="#E8F5E9" stroke="#00695C" stroke-width="1"/>
    <text x="56" y="247" text-anchor="middle" font-family="Arial" font-size="8.5" font-weight="bold" fill="#333">Binary Search</text>
    <text x="56" y="262" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">O(log n)</text>
    <!-- Linear Search -->
    <rect x="110" y="233" width="96" height="36" rx="5" fill="#E3F2FD" stroke="#3949AB" stroke-width="1"/>
    <text x="158" y="247" text-anchor="middle" font-family="Arial" font-size="8.5" font-weight="bold" fill="#333">Linear Search</text>
    <text x="158" y="262" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">O(n)</text>
    <!-- Merge Sort -->
    <rect x="8" y="274" width="96" height="36" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="56" y="288" text-anchor="middle" font-family="Arial" font-size="8.5" font-weight="bold" fill="#333">Merge Sort</text>
    <text x="56" y="303" text-anchor="middle" font-family="monospace" font-size="9" fill="#E65100">O(n log n)</text>
    <!-- Bubble Sort -->
    <rect x="110" y="274" width="96" height="36" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
    <text x="158" y="288" text-anchor="middle" font-family="Arial" font-size="8.5" font-weight="bold" fill="#333">Bubble Sort</text>
    <text x="158" y="303" text-anchor="middle" font-family="monospace" font-size="9" fill="#C62828">O(n&#178;)</text>
  </g>

  <!-- Group 5: Master Theorem -->
  <g opacity="0" data-narration="The Master Theorem solves recurrences of the form T of n equals a times T of n over b plus f of n, with three cases based on comparing f of n to n to the power log base b of a.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="330" y="228" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Master Theorem</text>
    <rect x="218" y="234" width="196" height="78" rx="6" fill="#FFFFFF" stroke="#3949AB" stroke-width="1.2"/>
    <!-- Recurrence formula -->
    <text x="316" y="250" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#3949AB">T(n) = aT(n/b) + f(n)</text>
    <!-- Case 1 -->
    <text x="226" y="265" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Case 1:</text>
    <text x="264" y="265" font-family="monospace" font-size="7.5" fill="#333">f(n) = O(n^(log_b(a)-&#949;))</text>
    <text x="226" y="274" font-family="monospace" font-size="7.5" fill="#00695C">&#8594; T(n) = &#920;(n^log_b(a))</text>
    <!-- Case 2 -->
    <text x="226" y="287" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Case 2:</text>
    <text x="264" y="287" font-family="monospace" font-size="7.5" fill="#333">f(n) = &#920;(n^log_b(a))</text>
    <text x="226" y="296" font-family="monospace" font-size="7.5" fill="#00695C">&#8594; T(n) = &#920;(n^log_b(a) log n)</text>
    <!-- Case 3 -->
    <text x="226" y="308" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828">Case 3:</text>
    <text x="264" y="308" font-family="monospace" font-size="7.5" fill="#333">f(n) = &#937;(n^(log_b(a)+&#949;))</text>
    <text x="226" y="317" font-family="monospace" font-size="7.5" fill="#00695C">&#8594; T(n) = &#920;(f(n))</text>
  </g>

  <!-- Group 6: Comparison table with practical n=100 values -->
  <g opacity="0" data-narration="For n equals 100: constant is 1, log n is about 7, linear is 100, n log n is 664, n squared is 10000, and 2 to the n is astronomically large.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="333" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Complexity at n = 100</text>
    <!-- Table header -->
    <rect x="20" y="338" width="380" height="16" rx="3" fill="#3949AB"/>
    <text x="90" y="350" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF">Complexity</text>
    <text x="210" y="350" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF">Operations</text>
    <text x="330" y="350" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF">Feasible?</text>
    <!-- Row 1: O(1) -->
    <rect x="20" y="354" width="380" height="14" rx="0" fill="#E8F5E9"/>
    <text x="90" y="364" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(1)</text>
    <text x="210" y="364" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">1</text>
    <text x="330" y="364" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">&#10003; Instant</text>
    <!-- Row 2: O(log n) -->
    <rect x="20" y="368" width="380" height="14" rx="0" fill="#FFFFFF"/>
    <text x="90" y="378" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">O(log n)</text>
    <text x="210" y="378" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">~7</text>
    <text x="330" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">&#10003; Very Fast</text>
    <!-- Row 3: O(n) -->
    <rect x="20" y="382" width="380" height="14" rx="0" fill="#E8F5E9"/>
    <text x="90" y="392" text-anchor="middle" font-family="monospace" font-size="8" fill="#3949AB">O(n)</text>
    <text x="210" y="392" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">100</text>
    <text x="330" y="392" text-anchor="middle" font-family="Arial" font-size="8" fill="#00695C">&#10003; Fast</text>
  </g>
</svg>
