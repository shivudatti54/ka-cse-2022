<svg width="420" height="400" data-topic-id="chapter-1-introduction-to-algorithmic-problem-solving">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E5F5" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        position: relative;
        width: 100%;
        height: 80%;
        background-color: #ADD8E6;
        color: #2F4F7F;
        padding: 20px;
        border-bottom: 1px solid #C7E5F5;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
      }
      .section[data-narration="title"] {
        border-bottom: none;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#background-gradient)" />
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Chapter 1: Introduction to Algorithmic Problem Solving</text>
  <section data-narration="title" data-section-id="section-11">
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">What is an Algorithm?</text>
    <rect x="20" y="70" width="360" height="30" style="fill: #ADD8E6; border-radius: 5px 5px 0 0" />
    <animate-transform attributeName="transform" type="rotate" from="0 20 70" to="360 20 70" dur="10s" begin="0s" delay="1s" />
    <text x="20" y="100" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">A well-defined procedure that takes some input and produces a corresponding output.</text>
  </section>
  <section data-narration="description" data-section-id="section-12">
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Key Characteristics:</text>
    <text x="20" y="100" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="1.5s" />
      A set of instructions that solves a problem
      <animate-margin-x attributeName="margin-left" type="translate" from="20" to="0" dur="2s" begin="1.8s" />
      Takes input and produces output
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="2s" />
      Fails if the input is not in the correct format
      <animate-margin-x attributeName="margin-left" type="translate" from="20" to="0" dur="2s" begin="2.5s" />
      Can be expressed in a clear and concise manner
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="3s" />
      Can be tested and verified for correctness
    </text>
  </section>
  <section data-narration="example" data-section-id="section-13">
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Examples of Algorithms:</text>
    <text x="20" y="100" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="4s" />
      A recipe for making a cake
      <animate-margin-x attributeName="margin-left" type="translate" from="20" to="0" dur="2s" begin="4.5s" />
      A set of instructions for driving a car
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="5s" />
      A program for solving a mathematical equation
    </text>
  </section>
  <section data-narration="importance" data-section-id="section-14">
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Importance of Algorithmic Problem Solving:</text>
    <text x="20" y="100" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="6s" />
      Efficient solution to complex problems
      <animate-margin-x attributeName="margin-left" type="translate" from="20" to="0" dur="2s" begin="6.5s" />
      Development of problem-solving skills
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="7s" />
      Increased productivity and accuracy
    </text>
  </section>
  <section data-narration="techniques" data-section-id="section-15">
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Algorithmic Techniques:</text>
    <text x="20" y="100" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="7.5s" />
      Sorting
      <animate-margin-x attributeName="margin-left" type="translate" from="20" to="0" dur="2s" begin="8s" />
      Searching
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="8.5s" />
      Graph Traversal
    </text>
  </section>
  <section data-narration="pseudocode" data-section-id="section-16">
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Pseudocode:</text>
    <text x="20" y="100" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">
      <animate-margin-x attributeName="margin-left" type="translate" from="0" to="20" dur="2s" begin="9s" />
      A high-level representation of the algorithm using text-based notation
      <animate-margin-x attributeName="margin-left" type="translate" from="20" to="0" dur="2s" begin="9.5s" />
    </text>
  </section>
  <footer>
    <text x="20" y="350" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Chapter 1: Introduction to Algorithmic Problem Solving</text>
  </footer>
</svg>