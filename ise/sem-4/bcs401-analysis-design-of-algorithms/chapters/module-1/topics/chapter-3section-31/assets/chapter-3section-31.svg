<svg width="420" height="400" data-topic-id="chapter-3-section-31">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle" data-narration="What is an Algorithm?">
    Chapter 3: Introduction to Algorithms
  </text>
  <section x="10" y="50" width="300" height="100" fill="none" stroke="#333" stroke-width="2" data-narration="Definition of an Algorithm">
    <rect x="10" y="10" width="280" height="80" rx="10" fill="white" />
    <text x="20" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">An algorithm is a well-defined procedure that takes some input and produces a corresponding output.</text>
  </section>
  <section x="10" y="160" width="300" height="100" fill="none" stroke="#333" stroke-width="2" data-narration="Characteristics of an Algorithm">
    <rect x="10" y="10" width="280" height="80" rx="10" fill="white" />
    <text x="20" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">
      An algorithm should have the following characteristics:
      <ul>
        <li>Input: The data or information that is used to execute the algorithm.</li>
        <li>Output: The result or answer that is produced by the algorithm.</li>
        <li>Step-by-Step Procedure: The algorithm should have a clear and unambiguous procedure for solving the problem.</li>
        <li>Finite: The algorithm should be able to be executed in a finite number of steps.</li>
        <li>Deterministic: The algorithm should always produce the same output for a given input.</li>
      </ul>
    </text>
  </section>
  <section x="10" y="310" width="300" height="100" fill="none" stroke="#333" stroke-width="2" data-narration="Example of an Algorithm">
    <rect x="10" y="10" width="280" height="80" rx="10" fill="white" />
    <text x="20" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">
      A simple algorithm for calculating the area of a rectangle is:
      <ol start="1">
        <li>Input: Length and width of the rectangle</li>
        <li>Output: Area of the rectangle</li>
        <li>Procedure: Multiply the length and width to get the area. Return the result.</li>
      </ol>
    </text>
  </section>
  <section x="10" y="360" width="300" height="100" fill="none" stroke="#333" stroke-width="2" data-narration="Why Algorithms are Important">
    <rect x="10" y="10" width="280" height="80" rx="10" fill="white" />
    <text x="20" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">
      Algorithms are essential in computer science because they provide a way to solve problems and perform tasks efficiently.
    </text>
  </section>
  <section x="10" y="410" width="300" height="100" fill="none" stroke="#333" stroke-width="2" data-narration="Types of Algorithms">
    <rect x="10" y="10" width="280" height="80" rx="10" fill="white" />
    <text x="20" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">
      There are several types of algorithms, including:
      <ul>
        <li>Sorting Algorithms</li>
        <li>Searching Algorithms</li>
        <li>Graph Algorithms</li>
      </ul>
    </text>
  </section>
  <text x="15" y="20" font-size="12" font-family="Arial, sans-serif" text-anchor="middle" fill="#666">Indigo</text>
  <text x="15" y="40" font-size="12" font-family="Arial, sans-serif" text-anchor="middle" fill="#87CEEB">Teal</text>
