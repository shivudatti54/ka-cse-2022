<svg width="420" height="400" data-topic-id="sequential-search-and-brute-force-string-matching">
  <style>
    /* Add a gradient background with pastel colors */
    body {
      background-image: linear-gradient(to bottom, #C7B8EA, #6495ED);
      background-size: 100% 100%;
      background-position: 0% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>

  <!-- Title at top -->
  <rect x="50" y="50" width="320" height="50" rx="10" fill="#6495ED" data-narration="Title: Sequential Search and Brute Force String Matching">
    <text x="150" y="60" font-size="24" fill="#fff">Sequential Search and Brute Force String Matching</text>
  </rect>

  <!-- Section 1: Definition and Problem Statement -->
  <rect x="50" y="120" width="320" height="100" rx="10" fill="#C7B8EA" data-narration="Definition and Problem Statement">
    <text x="150" y="130" font-size="18" fill="#fff">String matching is a fundamental problem in computer science that involves finding a specific pattern within a larger string.</text>
  </rect>

  <!-- Section 2: Sequential Search Algorithm -->
  <rect x="50" y="220" width="320" height="100" rx="10" fill="#6495ED" data-narration="Sequential Search Algorithm">
    <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="230" font-size="18" fill="#fff">Sequential search algorithm: iterate through each character of the string and compare it to the corresponding character of the pattern.</text>
  </rect>

  <animate transform="translateX(100%) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
  <rect x="250" y="220" width="70" height="70" rx="10" fill="#C7B8EA" data-narration="Step-by-Step Process">
    <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="280" y="230" font-size="18" fill="#fff">1. Initialize two pointers, one for the string and one for the pattern.</text>
    <animate transform="translateX(100%) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <rect x="250" y="300" width="70" height="70" rx="10" fill="#6495ED" data-narration="2. Compare the characters at the current positions of the string and pattern.">
      <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <text x="280" y="310" font-size="18" fill="#fff">If the characters match, move the pointers one position forward.</text>
      <animate transform="translateX(100%) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="250" y="370" width="70" height="70" rx="10" fill="#C7B8EA" data-narration="3. If the characters do not match, move the pointer for the string one position forward.">
        <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <text x="280" y="380" font-size="18" fill="#fff">Repeat steps 2-4 until the end of the string or pattern is reached.</text>
        <animate transform="translateX(100%) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <rect x="250" y="440" width="70" height="70" rx="10" fill="#6495ED" data-narration="4. If the entire pattern is matched, return the starting position of the match.">
          <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
          <text x="280" y="450" font-size="18" fill="#fff">Return the starting position of the match.</text>
        </rect>
      </rect>
  </rect>

  <!-- Section 3: Brute Force Algorithm -->
  <rect x="50" y="320" width="320" height="100" rx="10" fill="#6495ED" data-narration="Brute Force Algorithm">
    <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="330" font-size="18" fill="#fff">Brute force algorithm: try all possible combinations of the string to find the pattern.</text>
  </rect>

  <!-- Section 4: Time and Space Complexity -->
  <rect x="50" y="420" width="320" height="100" rx="10" fill="#C7B8EA" data-narration="Time and Space Complexity">
    <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="430" font-size="18" fill="#fff">Time complexity: O(n*m), where n is the length of the string and m is the length of the pattern.</text>
    <text x="150" y="450" font-size="18" fill="#fff">Space complexity: O(1), as we only need to store the string and pattern.</text>
  </rect>

  <!-- Section 5: Example Use Cases -->
  <rect x="50" y="520" width="320" height="100" rx="10" fill="#6495ED" data-narration="Example Use Cases">
    <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="530" font-size="18" fill="#fff">Find a specific pattern within a larger string.</text>
  </rect>

  <!-- Section 6: Code Implementation -->
  <rect x="50" y="620" width="320" height="100" rx="10" fill="#C7B8EA" data-narration="Code Implementation">
    <animate transform="translateX(0) rotate(0)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="150" y="630" font-size="18" fill="#fff">Use a programming language of your choice to implement the sequential search algorithm.</text>
  </rect>

  <!-- Footer at bottom -->
  <rect x="50" y="720" width="320" height="50" rx="10" fill="#6495ED" data-narration="Footer">
    <text x="150" y="730" font-size="18" fill="#fff">Sequential Search and Brute Force String Matching</text>
  </rect>
</svg>