<svg width="420" height="400" data-topic-id="brute-force-approaches-selection-sort-and-bubble-sort" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel)"/>
  
  <!-- Title -->
  <text x="150" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3498db">
    Brute Force Approaches: Selection Sort and Bubble Sort
  </text>
  
  <!-- Introduction Section -->
  <rect x="50" y="60" width="320" height="80" fill="#f9f9f9" rx="10"/>
  <text x="50" y="80" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="Introduction">
    In algorithmic problem solving, a brute force approach is a simple and straightforward method to solve a problem.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
  
  <!-- Selection Sort Section -->
  <rect x="50" y="160" width="320" height="120" fill="#f9f9f9" rx="10"/>
  <text x="50" y="180" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="Selection Sort">
    Selection sort is a brute force sorting algorithm that works by dividing the input into a sorted and an unsorted region.
  </text>
  <rect x="100" y="150" width="20" height="20" fill="#3498db" rx="5" transform="rotate(45 105 165)"/>
  <rect x="220" y="150" width="20" height="20" fill="#3498db" rx="5" transform="rotate(-45 225 165)"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" repeatCount="indefinite"/>
  
  <!-- How it Works Section -->
  <rect x="50" y="280" width="320" height="80" fill="#f9f9f9" rx="10"/>
  <text x="50" y="300" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="How it Works">
    Start from the first element of the array. Find the smallest element in the unsorted region. Swap the smallest element with the first element of the unsorted region.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
  
  <!-- Example Section -->
  <rect x="50" y="360" width="320" height="100" fill="#f9f9f9" rx="10"/>
  <text x="50" y="380" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="Example">
    Suppose we have the following array: [64, 25, 12, 22, 11]
  </text>
  <text x="50" y="400" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="Start from the first element (64). The smallest element in the unsorted region is 11. Swap 64 with 11: [11, 25, 12, 22, 64]">
    <tspan x="150" y="390">64, 25, 12, 22, 11</tspan>
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" repeatCount="indefinite"/>
  
  <!-- Time Complexity Section -->
  <rect x="50" y="460" width="320" height="80" fill="#f9f9f9" rx="10"/>
  <text x="50" y="480" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="Time Complexity">
    The number of operations required to sort the array is proportional to the square of the number of elements.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
  
  <!-- Conclusion Section -->
  <rect x="50" y="540" width="320" height="80" fill="#f9f9f9" rx="10"/>
  <text x="50" y="560" font-size="18" font-family="Arial, sans-serif" fill="#666" data-narration="Conclusion">
    Brute force algorithms like selection sort and bubble sort are simple to understand and implement but are inefficient for large datasets.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" repeatCount="indefinite"/>
  
  <!-- Footer -->
  <text x="150" y="380" font-size="18" font-family="Arial, sans-serif" fill="#3498db">
    Created with love for Education
  </text>
</svg>