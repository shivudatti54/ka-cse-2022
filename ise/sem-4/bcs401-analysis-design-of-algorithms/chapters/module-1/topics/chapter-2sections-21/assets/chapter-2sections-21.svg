<svg width="420" height="400" data-topic-id="chapter-2-21" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
    <g fill="none" opacity=".01">
        <rect x="0" y="0" width="420" height="400" rx="10" style="stroke:rgb(34, 36, 49);stroke-width:2;"/>
    </g>
    <g id="root" data-narration="What is an algorithm?" transform="translate(10, 20)">
        <text x="10" y="10" font-size="24" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Chapter 2: Introduction to Algorithmic Problem Solving</text>
        <text x="10" y="50" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">2.1: What is an Algorithm?</text>
    </g>
    <g id="section-what-is-an-algorithm" data-narration="What is an algorithm?" transform="translate(10, 80)">
        <rect x="0" y="0" width="100%" height="200" rx="10" style="fill:rgb(220, 240, 255);stroke:rgb(34, 36, 49);stroke-width:2"/>
        <g fill="none">
            <circle cx="150" cy="70" r="30" style="fill:rgb(240, 255, 255);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="150" y="50" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Input: Data that an algorithm uses to solve a problem</text>
            <text x="150" y="100" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Output: Result that an algorithm produces as a solution</text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g id="section-algorithm-characteristics" data-narration="Algorithm characteristics" transform="translate(10, 290)">
        <rect x="0" y="0" width="100%" height="200" rx="10" style="fill:rgb(220, 240, 255);stroke:rgb(34, 36, 49);stroke-width:2"/>
        <g fill="none">
            <rect x="100" y="50" width="30" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="120" y="65" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Well-defined: Easy to understand and follow</text>
            <text x="120" y="105" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Unambiguous: Clear and concise, no ambiguity or confusion</text>
            <rect x="100" y="155" width="30" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="120" y="170" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Efficient: Designed to solve the problem in the most efficient way possible</text>
            <rect x="100" y="210" width="30" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="120" y="225" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Reusable: Can be used in a variety of different contexts</text>
            <rect x="100" y="265" width="30" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="120" y="280" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Testable: Can be tested and verified to ensure that it is working correctly</text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="1s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g id="section-algorithm-types" data-narration="Algorithm types" transform="translate(10, 350)">
        <rect x="0" y="0" width="100%" height="200" rx="10" style="fill:rgb(220, 240, 255);stroke:rgb(34, 36, 49);stroke-width:2"/>
        <g fill="none">
            <rect x="150" y="80" width="40" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="170" y="95" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Deterministic algorithms: Always produce the same output for the same input</text>
            <rect x="150" y="135" width="40" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="170" y="150" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Non-deterministic algorithms: May produce different outputs for the same input</text>
            <rect x="150" y="180" width="40" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="170" y="195" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Recursive algorithms: Use recursion to solve a problem</text>
            <rect x="150" y="225" width="40" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="170" y="240" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Iterative algorithms: Use iteration to solve a problem</text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g id="section-algorithm-example" data-narration="Algorithm example" transform="translate(10, 410)">
        <rect x="0" y="0" width="100%" height="200" rx="10" style="fill:rgb(220, 240, 255);stroke:rgb(34, 36, 49);stroke-width:2"/>
        <g fill="none">
            <rect x="100" y="50" width="150" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="120" y="65" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Input: Length and width of a rectangle</text>
            <rect x="100" y="95" width="150" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="120" y="110" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Output: Area of the rectangle</text>
            <rect x="100" y="145" width="150" height="40" rx="5" style="fill:rgb(255, 222, 194);stroke:rgb(24, 44, 70);stroke-width:2"/>
            <text x="120" y="160" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Procedure: Calculates the area by multiplying the length and width</text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="3s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g id="footer" transform="translate(10, 470)">
        <rect x="0" y="0" width="100%" height="30" rx="10" style="fill:rgb(220, 240, 255);stroke:rgb(34, 36, 49);stroke-width:2"/>
        <text x="10" y="25" font-size="18" font-family="Arial" fill="rgb(24, 44, 70)>" style="mix-blend-mode: multiply;opacity: 1;filter: opacity(0.8)">Chapter 2: Introduction to Algorithmic Problem Solving</text>
    </g>
</svg>