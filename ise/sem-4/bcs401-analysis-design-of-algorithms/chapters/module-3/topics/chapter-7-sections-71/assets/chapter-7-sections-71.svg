<svg width="420" height="400" data-topic-id="chapter-7-sections-71" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="0.5" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <title>Chapter 7: Sections 71</title>
  <g transform="translate(20, 20)">
    <g data-narration="Introduction to Balanced Search Trees">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Introduction</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">In this chapter, we will focus on analyzing and designing algorithms for sorting and searching data in Balanced Search Trees, Heaps, and Heapsort.</text>
    </g>
    <g data-narration="Definition of Balanced Search Trees">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Definition</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">A balanced search tree is a data structure where each node has at most two children (i.e., left child and right child).</text>
    </g>
    <g data-narration="Properties of Balanced Search Trees">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Properties</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Each node has a unique key.</text>
      <text x="10" y="80" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- For every node, all the keys in the left subtree are less than the node's key.</text>
    </g>
    <g data-narration="Types of Balanced Search Trees">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Types</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- AVL Tree: All levels of the tree are balanced, and the height of the left subtree of a node plus the height of the right subtree of a node is at most 2.</text>
      <text x="10" y="80" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Red-Black Tree: Each node is either red or black, and all red nodes are located in a tree-like structure called a "red path"</text>
    </g>
    <g data-narration="Operations in Balanced Search Trees">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Operations</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Insert: Insert a new key into the tree.</text>
      <text x="10" y="80" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Delete: Delete a key from the tree.</text>
      <text x="10" y="100" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Search: Find a key in the tree.</text>
    </g>
    <g data-narration="Heaps">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Heaps</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">A heap is a specialized tree-based data structure that satisfies the heap property.</text>
    </g>
    <g data-narration="Types of Heaps">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Types</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Max Heap: The value of the root node is the maximum value among all nodes in the heap.</text>
      <text x="10" y="80" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Min Heap: The value of the root node is the minimum value among all nodes in the heap.</text>
    </g>
    <g data-narration="Operations in Heaps">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Operations</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Requirements: 1. SVG dimensions: width="420" height="400"</text>
      <text x="10" y="80" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- 2. Include data-topic-id attribute with slugified topic name</text>
      <text x="10" y="100" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- 3. Use gradient background with pastel colors</text>
    </g>
    <g data-narration="Animations and Transitions">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Animations and Transitions</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle"><animate xlink:href="#animate-1" begin="0s"dur="2s" repeatCount="indefinite" />Smooth animations using <animate> elements with sequential begin times</text>
    </g>
    <g data-narration="Color Scheme and Visuals">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Color Scheme and Visuals</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Professional color scheme (indigo, teal, orange accents)</text>
      <text x="10" y="80" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Clear labels and annotations</text>
    </g>
    <g data-narration="Arrow Markers and Connections">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Arrow Markers and Connections</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">- Arrow markers for connections</text>
    </g>
    <g data-narration="Conclusion">
      <rect x="0" y="0" width="200" height="80" fill="#87CEEB" rx="10" />
      <text x="10" y="30" font-size="18" font-family="Arial, sans-serif" fill="#222" text-anchor="middle">Conclusion</text>
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">This chapter has provided an overview of the importance of Balancing Search Trees, Heaps, and Heapsort algorithms for efficient data search.</text>
    </g>
  </g>
  <g transform="translate(0, 390)">
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#222" text-anchor="start">Chapter 7: Sections 71</text>
  </g>
</svg>