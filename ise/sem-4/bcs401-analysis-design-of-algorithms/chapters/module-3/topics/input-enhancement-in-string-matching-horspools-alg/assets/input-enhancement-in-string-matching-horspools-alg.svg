<svg data-topic-id="input-enhancement-string-matching-horspool-algorithm" width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" style="background: linear-gradient(to bottom, #C7B8EA 0%, #87CEEB 100%);">
    <title>Input Enhancement in String Matching: Horspool’s Algorithm</title>
    <desc>Animated Educational Diagram</desc>
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <g transform="translate(10, 10)">
        <!-- Section 1: Overview -->
        <rect x="10" y="20" width="400" height="50" fill="url(#gradient)" rx="5"/>
        <rect x="10" y="70" width="400" height="50" fill="#fff" rx="5"/>
        <text x="15" y="50" font-size="18" font-family="Arial" fill="#333" data-narration="String matching is a fundamental problem in computer science, where we need to find a substring within a given text. One approach to improve the efficiency of string matching is to enhance the input data. Horspool’s algorithm is a popular string matching algorithm that uses input enhancement to reduce the number of comparisons required.">
            Overview
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="0s" dur="2s" repeatCount="indefinite"/>
        <!-- end of Section 1 -->
        
        <!-- Section 2: What is Input Enhancement? -->
        <rect x="10" y="130" width="400" height="50" fill="#fff" rx="5"/>
        <rect x="10" y="180" width="400" height="50" fill="url(#gradient)" rx="5"/>
        <text x="15" y="140" font-size="18" font-family="Arial" fill="#333" data-narration="Input enhancement is a technique used to modify the input data to make it more efficient for the algorithm to process. In the context of string matching, input enhancement involves modifying the input text to reduce the number of comparisons required.">
            What is Input Enhancement?
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 180" begin="2s" dur="2s" repeatCount="indefinite"/>
        <!-- end of Section 2 -->
        
        <!-- Section 3: Horspool’s Algorithm -->
        <rect x="10" y="260" width="400" height="50" fill="#fff" rx="5"/>
        <rect x="10" y="310" width="400" height="50" fill="url(#gradient)" rx="5"/>
        <text x="15" y="280" font-size="18" font-family="Arial" fill="#333" data-narration="Horspool’s algorithm is a string matching algorithm that uses input enhancement to reduce the number of comparisons required. The algorithm works by using a hashing function to map the characters of the text to a range of indices in a table. The table is used to store the maximum number of characters that can be shifted without causing a collision.">
            Horspool’s Algorithm
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 310" begin="4s" dur="2s" repeatCount="indefinite"/>
        <!-- end of Section 3 -->
        
        <!-- Section 4: How Horspool’s Algorithm Works -->
        <rect x="10" y="360" width="400" height="50" fill="#fff" rx="5"/>
        <rect x="10" y="410" width="400" height="50" fill="url(#gradient)" rx="5"/>
        <text x="15" y="380" font-size="18" font-family="Arial" fill="#333" data-narration="The algorithm works as follows:
1. Create a hash table of size m, where m is the length of the pattern.
2. For each character c in the text, calculate the hash value h = (b * p + c) mod m, where b is the current index and p is the pattern length.
3. Compare the hash value h with the hash values in the table. If a match is found, return the starting index of the match.
4. If no match is found, shift the window by one character and repeat the process.">
            How Horspool’s Algorithm Works
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 410" begin="6s" dur="2s" repeatCount="indefinite"/>
        <!-- end of Section 4 -->
        
        <!-- Section 5: Example Use Case -->
        <rect x="10" y="460" width="400" height="50" fill="#fff" rx="5"/>
        <rect x="10" y="510" width="400" height="50" fill="url(#gradient)" rx="5"/>
        <text x="15" y="480" font-size="18" font-family="Arial" fill="#333" data-narration="Suppose we want to search for the pattern &quot;abc&quot; in the text &quot;banana&quot;:
|     | a   | b   | a   | n   | a   | n   | a   |
| --- | --- | --- | --- | --- | --- | --- | --- |
| b   | 2   | 5   | 8   | 11  | 14  | 17  | 20  |
| a   | 11  | 14  | 17  | 20  | 23  | 26  | 29  |
| c   | 20  | 23  | 26  | 29  | 32  | 35  | 38  |">
            Example Use Case
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 510" begin="8s" dur="2s" repeatCount="indefinite"/>
        <!-- end of Section 5 -->
        
        <!-- Section 6: Benefits -->
        <rect x="10" y="590" width="400" height="50" fill="#fff" rx="5"/>
        <rect x="10" y="640" width="400" height="50" fill="url(#gradient)" rx="5"/>
        <text x="15" y="610" font-size="18" font-family="Arial" fill="#333" data-narration="Horspool’s algorithm has several benefits, including:
1. Improved efficiency: The algorithm reduces the number of comparisons required, making it faster and more efficient.
2. Simplified implementation: The algorithm uses a simple hashing function, making it easy to implement and understand.
3. Scalability: The algorithm can handle large inputs and is suitable for real-time applications.">
            Benefits
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 640" begin="10s" dur="2s" repeatCount="indefinite"/>
        <!-- end of Section 6 -->
        
        <!-- Footer -->
        <rect x="10" y="690" width="400" height="50" fill="#fff" rx="5"/>
        <text x="15" y="670" font-size="18" font-family="Arial" fill="#333">Footer</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 690" begin="12s" dur="2s" repeatCount="indefinite"/>
        <!-- end of Footer -->
    </g>
</svg>