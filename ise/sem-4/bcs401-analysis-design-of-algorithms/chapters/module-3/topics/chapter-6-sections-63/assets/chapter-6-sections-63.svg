<svg width="420" height="400" data-topic-id="analysis-and-design-of-algorithms-module-transform-and-conquer-balanced-search-trees-heaps-and-heapsort">
  <title>Chapter 6: Analysis and Design of Algorithms</title>
  <footer>Module: TRANSFORM-AND-CONQUER: Balanced Search Trees, Heaps and Heapsort</footer>

  <g id="gradient-background">
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  </g>

  <g id="section-1">
    <rect x="20" y="50" width="380" height="150" fill="#FFF"/>
    <text x="20" y="150" font-size="24" font-family="Arial" fill="#333">Time Complexity</text>
    <text x="20" y="170" font-size="18" font-family="Arial" fill="#666">Big O Notation: Upper bound of time taken by algorithm</text>
    <text x="20" y="190" font-size="18" font-family="Arial" fill="#666">T(n) = Upper bound of time taken by algorithm</text>
  </g>

  <g id="section-2">
    <rect x="20" y="220" width="380" height="150" fill="#FFF"/>
    <text x="20" y="230" font-size="24" font-family="Arial" fill="#333">Space Complexity</text>
    <text x="20" y="250" font-size="18" font-family="Arial" fill="#666">Big O Notation: Upper bound of space required by algorithm</text>
    <text x="20" y="270" font-size="18" font-family="Arial" fill="#666">S(n) = Upper bound of space required by algorithm</text>
  </g>

  <g id="section-3">
    <rect x="20" y="300" width="380" height="150" fill="#FFF"/>
    <text x="20" y="310" font-size="24" font-family="Arial" fill="#333">Divide and Conquer</text>
    <text x="20" y="330" font-size="18" font-family="Arial" fill="#666">Method of dividing the problem into smaller sub-problems</text>
  </g>

  <g id="section-4">
    <rect x="20" y="370" width="380" height="150" fill="#FFF"/>
    <text x="20" y="380" font-size="24" font-family="Arial" fill="#333">Measuring Time and Space Complexity</text>
    <text x="20" y="400" font-size="18" font-family="Arial" fill="#666">T(n) = Upper bound of time taken by algorithm, S(n) = Upper bound of space required by algorithm</text>
  </g>

  <g id="section-5">
    <rect x="20" y="430" width="380" height="150" fill="#FFF"/>
    <text x="20" y="440" font-size="24" font-family="Arial" fill="#333">Example</text>
    <text x="20" y="460" font-size="18" font-family="Arial" fill="#666">Suppose we have an algorithm that sorts an array of n elements using bubble sort</text>
    <text x="20" y="480" font-size="18" font-family="Arial" fill="#666">T(n) = O(n^2), S(n) = O(1)</text>
  </g>

  <g id="section-6">
    <rect x="20" y="520" width="380" height="150" fill="#FFF"/>
    <text x="20" y="530" font-size="24" font-family="Arial" fill="#333">Key Concepts</text>
    <text x="20" y="550" font-size="18" font-family="Arial" fill="#666">Big O Notation, Upper Bound, Time Complexity, Space Complexity</text>
  </g>

  <animate id="gradient-color-change" attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
  <animate id="title-appear" attributeName="opacity" from="0" to="1"dur="1s" begin="0s"/>
  <animate id="footer-appear" attributeName="opacity" from="0" to="1"dur="1s" begin="2s"/>
</svg>