<svg width="420" height="400" data-topic-id="paths-and-circuits-isomorphism-sub-graphs-walks-pa">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#grad)" opacity="0.5"/>

  <!-- Title section -->
  <section data-narration="Introduction to Paths and Circuits">
    <title>Paths and Circuits</title>
    <text x="50%" y="20%" font-size="36">Paths and Circuits</text>
  </section>

  <!-- Paths section -->
  <section data-narration="What is a Path?">
    <rect x="0" y="150" width="100%" height="150" fill="#D0D0D0"/>
    <path d="M 50,50 L 150,150 L 50,150 Z" stroke="#008000" stroke-width="2" fill="none"/>
    <text x="50%" y="120%" font-size="24">A path is a sequence of vertices connected by edges.</text>
  </section>

  <!-- Circuits section -->
  <section data-narration="What is a Circuit?">
    <rect x="0" y="320" width="100%" height="150" fill="#D0D0D0"/>
    <path d="M 50,50 C 100,150 50,150 50,50 Z" stroke="#008000" stroke-width="2" fill="none"/>
    <text x="50%" y="280%" font-size="24">A circuit is a closed path that starts and ends at the same vertex.</text>
  </section>

  <!-- Isomorphism section -->
  <section data-narration="Isomorphism in Graph Theory">
    <rect x="0" y="400" width="100%" height="150" fill="#D0D0D0"/>
    <path d="M 50,50 L 100,150 L 50,150 Z" stroke="#008000" stroke-width="2" fill="none"/>
    <text x="50%" y="380%" font-size="24">Two graphs are isomorphic if they have the same number of vertices and edges, and the adjacency matrix can be transformed using a permutation matrix.</text>
  </section>

  <!-- Sub-Graphs section -->
  <section data-narration="Sub-Graphs in Graph Theory">
    <rect x="0" y="50" width="100%" height="150" fill="#D0D0D0"/>
    <path d="M 50,50 L 100,150 L 50,150 Z" stroke="#008000" stroke-width="2" fill="none"/>
    <text x="50%" y="120%" font-size="24">A sub-graph is a graph formed by selecting some vertices and edges from the original graph.</text>
  </section>

  <!-- Walks section -->
  <section data-narration="Walks in Graph Theory">
    <rect x="0" y="200" width="100%" height="150" fill="#D0D0D0"/>
    <path d="M 50,50 L 100,150 L 50,150 Z" stroke="#008000" stroke-width="2" fill="none"/>
    <text x="50%" y="180%" font-size="24">A walk is a sequence of vertices connected by edges, but not necessarily a path.</text>
  </section>

  <!-- Connections section -->
  <section data-narration="Connections between Paths, Circuits, Isomorphism, Sub-Graphs, and Walks">
    <rect x="0" y="300" width="100%" height="150" fill="#D0D0D0"/>
    <path d="M 50,50 L 150,150 L 50,150 Z" stroke="#008000" stroke-width="2" fill="none"/>
    <text x="50%" y="280%" font-size="24">These concepts are interconnected and form the foundation of graph theory.</text>
  </section>

  <!-- Arrow markers -->
  <symbol id="arrow">
    <path d="M 10,10 L 20,20"/>
  </symbol>
  <use x="20" y="20" transform="rotate(45 20 20)" fill="#008000" fill-opacity="0.5" stroke="#008000" stroke-width="1" xlink:href="#arrow"/>

  <!-- Title and footer -->
  <text x="50%" y="10%" font-size="36">Paths and Circuits</text>
  <text x="50%" y="390%" font-size="24">Graph Theory</text>
</svg>