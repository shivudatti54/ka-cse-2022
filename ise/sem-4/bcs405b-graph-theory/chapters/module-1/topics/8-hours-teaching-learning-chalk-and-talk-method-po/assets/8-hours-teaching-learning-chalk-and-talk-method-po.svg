<svg width="420" height="400" data-topic-id="po" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="overflow: hidden; color: #333; font-family: Arial, sans-serif; font-size: 24px;">
  <defs>
