<svg width="420" height="400" data-topic-id="Pendant-Vertex-And-Null-Graph" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Styles for the SVG */
    body {
      background: linear-gradient(to bottom, #66CCCC, #66CCCC 30%, #66D9E7 30%, #66D9E7 80%, #66CCCC 80%);
    }
    /* Styles for the title and footer */
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #3498db;
      text-align: center;
      margin-bottom: 20px;
    }
    .footer {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-top: 20px;
    }
    /* Styles for the sections */
    .section {
      margin-bottom: 40px;
    }
    /* Styles for the text */
    .text {
      font-size: 18px;
      font-weight: normal;
      color: #333;
    }
    /* Styles for the arrows */
    .arrow {
      stroke: #66D9E7;
      stroke-width: 2;
      fill: none;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="50%" stop-color="#66D9E7" stop-opacity="1" />
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <!-- Title -->
  <g class="title">
    <text x="50%" y="20%" text-anchor="middle" font-size="24px" font-weight="bold" color="#3498db">Pendant Vertex and Null Graph</text>
  </g>
  <!-- Background gradient -->
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" />
  <!-- Sections -->
  <g class="sections">
    <!-- Section 1: Definition of Pendant Vertex -->
    <g class="section">
      <rect x="10" y="10" width="400" height="40" rx="10" fill="#fff" opacity="0.9" />
      <text x="20%" y="25%" text-anchor="middle" font-size="18px" font-weight="normal" color="#333" class="text" data-narration="A pendant vertex is a vertex in a graph that has a degree of 1.">Pendant Vertex</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" begin="0s" repeatCount="indefinite" />
    </g>
    <!-- Section 2: Examples of Pendant Vertices -->
    <g class="section">
      <rect x="10" y="60" width="400" height="40" rx="10" fill="#fff" opacity="0.9" />
      <text x="20%" y="75%" text-anchor="middle" font-size="18px" font-weight="normal" color="#333" class="text" data-narration="Consider a graph with two vertices, A and B, and a single edge connecting them. The vertex A is a pendant vertex because it has a degree of 1.">Example 1</text>
      <circle cx="200" cy="150" r="10" fill="none" stroke="#66D9E7" stroke-width="2" class="arrow" data-narration="An edge connecting two vertices A and B.">
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" begin="0s" repeatCount="indefinite" />
      </circle>
      <text x="20%" y="100%" text-anchor="middle" font-size="18px" font-weight="normal" color="#333" class="text" data-narration="Consider a graph with three vertices, A, B, and C, and edges connecting A to B and C to B. Vertex C is a pendant vertex because it has a degree of 1.">Example 2</text>
      <circle cx="200" cy="250" r="10" fill="none" stroke="#66D9E7" stroke-width="2" class="arrow" data-narration="An edge connecting vertices A and B, and another edge connecting vertices C and B.">
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" begin="0s" repeatCount="indefinite" />
      </circle>
    </g>
    <!-- Section 3: Properties of Pendant Vertices -->
    <g class="section">
      <rect x="10" y="110" width="400" height="40" rx="10" fill="#fff" opacity="0.9" />
      <text x="20%" y="125%" text-anchor="middle" font-size="18px" font-weight="normal" color="#333" class="text" data-narration="A pendant vertex is also known as an isolated vertex.">Properties of Pendant Vertices</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" begin="0s" repeatCount="indefinite" />
    </g>
    <!-- Section 4: Relationship between Pendant Vertex and Null Graph -->
    <g class="section">
      <rect x="10" y="160" width="400" height="40" rx="10" fill="#fff" opacity="0.9" />
      <text x="20%" y="175%" text-anchor="middle" font-size="18px" font-weight="normal" color="#333" class="text" data-narration="A pendant vertex can be part of a null graph if the null graph has only one vertex.">Relationship between Pendant Vertex and Null Graph</text>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" begin="0s" repeatCount="indefinite" />
    </g>
    <!-- Footer -->
    <g class="footer">
      <text x="50%" y="380%" text-anchor="middle" font-size="14px" color="#666" class="text">Created with love</text>
    </g>
  </g>
</svg>