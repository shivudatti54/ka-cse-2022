<svg width="420" height="400" data-topic-id="Teaching-Learning-Process-Chalk-and-Talk-M"
     xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400"
     style="background-image: radial-gradient(to bottom, #C7B8EA, #87CEEB);">
  <!-- Header Section -->
  <defs>
    <linearGradient id="header-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="40" fill="url(#header-gradient)"/>
  <text x="20" y="25" font-size="24" font-family="Arial" fill="#000">
    <tspan data-narration="Introduction">8 Hours Teaching Learning Process Chalk And Talk M</tspan>
  </text>

  <!-- Section 1: Chalk and Talk Method -->
  <rect x="10" y="60" width="390" height="100" fill="#F7F7F7"/>
  <rect x="10" y="60" width="390" height="100" fill="#F7F7F7" rx="10"/>
  <g transform="translate(10, 70)">
    <rect x="0" y="0" width="50" height="50" fill="#C7B8EA" rx="10"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Definition">
      The chalk and talk method is an interactive teaching technique where the teacher writes key points on the blackboard or whiteboard and discusses them with students.
    </text>
  </g>
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="50" height="50" fill="#C7B8EA" rx="10"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Advantages">
      Encourages student participation and engagement, allows teachers to clarify complex concepts, facilitates feedback and discussion.
    </text>
  </g>
  <g transform="translate(120, 70)">
    <rect x="0" y="0" width="50" height="50" fill="#C7B8EA" rx="10"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Disadvantages">
      Time-consuming and labor-intensive, limited ability to illustrate complex concepts, may not be suitable for large classes.
    </text>
  </g>
  <g transform="translate(180, 70)">
    <rect x="0" y="0" width="50" height="50" fill="#C7B8EA" rx="10"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Example">
      Teacher writes key points on the board, teacher explains the concept and asks questions to check understanding, students discuss and clarify any doubts, teacher provides additional examples or illustrations.
    </text>
  </g>

  <!-- Section 2: PowerPoint Presentation -->
  <rect x="10" y="190" width="390" height="100" fill="#F7F7F7"/>
  <rect x="10" y="190" width="390" height="100" fill="#F7F7F7" rx="10"/>
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="50" height="50" fill="#87CEEB" rx="10"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Definition">
      A PowerPoint presentation is a multimedia presentation that uses a combination of text, images, and audio to convey information.
    </text>
  </g>
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="50" height="50" fill="#87CEEB" rx="10"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Advantages">
      Highly engaging and interactive, can be used for large classes or presentations, allows for easy editing and revision, can include multimedia elements.
    </text>
  </g>
  <g transform="translate(120, 200)">
    <rect x="0" y="0" width="50" height="50" fill="#87CEEB" rx="10"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Disadvantages">
      Requires technical expertise to create and use, can be distrac
    </text>
  </g>

  <!-- Footer Section -->
  <rect x="10" y="330" width="400" height="30" fill="#F7F7F7"/>
  <text x="20" y="345" font-size="18" font-family="Arial" fill="#000">
    <tspan data-narration="References">Teaching-Learning Process: Chalk and Talk Method / PowerPoint Presentation</tspan>
  </text>
</svg>