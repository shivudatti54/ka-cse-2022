<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" data-topic-id="Directed Graphs-Types Of Digraphs">
    <style>
        .rect {
            fill: #3498db;
            stroke: #1abc9c;
            stroke-width: 2;
            animation: pulse 2s infinite;
        }

        .rect:hover {
            fill: #2ecc71;
        }

        .text {
            fill: #f1f1f1;
            font-size: 18px;
            font-weight: bold;
            text-anchor: middle;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>

    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3498db" stop-opacity="1"/>
            <stop offset="100%" stop-color="#2ecc71" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <rect class="rect" x="50" y="50" width="320" height="300" fill="url(#gradient)"/>

    <g transform="translate(20, 100)">
        <text class="text" data-narration="Introduction to Directed Graphs" x="0" y="0">Introduction to Directed Graphs</text>
        <rect class="rect" x="0" y="30" width="100" height="40" fill="#3498db" opacity="0" data-narration="A directed graph, also known as a digraph, is a type of graph that has directed edges between its vertices. Each edge in a digraph has a direction and can be thought of as a one-way path between two vertices." rx="5" ry="5" transform="rotate(0 50 50)">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        </rect>
    </g>

    <g transform="translate(20, 170)">
        <text class="text" data-narration="Definition of a Digraph" x="0" y="0">Definition of a Digraph</text>
        <rect class="rect" x="0" y="30" width="100" height="40" fill="#3498db" opacity="0" data-narration="A digraph is a pair G = (V, E), where: V is the set of vertices (or nodes) E is the set of edges, and each edge (u, v) is an ordered pair of vertices" rx="5" ry="5" transform="rotate(0 50 50)">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        </rect>
    </g>

    <g transform="translate(20, 250)">
        <text class="text" data-narration="Types of Digraphs" x="0" y="0">Types of Digraphs</text>
        <rect class="rect" x="0" y="30" width="100" height="40" fill="#3498db" opacity="0" data-narration="There are three types of digraphs: Directed Acyclic Graphs (DAGs), Directed Cyclic Graphs (DCGs), and Bicyclic Graphs" rx="5" ry="5" transform="rotate(0 50 50)">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        </rect>
    </g>

    <g transform="translate(20, 330)">
        <text class="text" data-narration="Directed Acyclic Graphs (DAGs)" x="0" y="0">Directed Acyclic Graphs (DAGs)</text>
        <rect class="rect" x="0" y="30" width="100" height="40" fill="#3498db" opacity="0" data-narration="A DAG is a digraph that has no cycles. A cycle in a digraph is a path that starts and ends at the same vertex, and passes through at least one edge" rx="5" ry="5" transform="rotate(0 50 50)">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        </rect>
        <path class="arrow" d="M 25 35 L 25 65 Z"/>
    </g>

    <g transform="translate(20, 400)">
        <text class="text" data-narration="Directed Cyclic Graphs (DCGs)" x="0" y="0">Directed Cyclic Graphs (DCGs)</text>
        <rect class="rect" x="0" y="30" width="100" height="40" fill="#3498db" opacity="0" data-narration="A DCG is a digraph that has cycles. A cycle in a digraph is a path that starts and ends at the same vertex, and passes through at least one edge" rx="5" ry="5" transform="rotate(0 50 50)">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        </rect>
        <path class="arrow" d="M 25 35 L 25 65 Z"/>
    </g>

    <g transform="translate(20, 470)">
        <text class="text" data-narration="Bicyclic Graphs" x="0" y="0">Bicyclic Graphs</text>
        <rect class="rect" x="0" y="30" width="100" height="40" fill="#3498db" opacity="0" data-narration="A bicyclic graph is a digraph that has exactly two cycles. A bicycle is a cycle that contains only two edges" rx="5" ry="5" transform="rotate(0 50 50)">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
        </rect>
        <path class="arrow" d="M 25 35 L 25 65 Z"/>
    </g>

    <footer>
        <text class="text" x="0" y="350">Learn about Directed Graphs and Types of Digraphs</text>
    </footer>
</svg>