<svg width="420" height="400" data-topic-id="circuits" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Circuits</title>
  <footer>Circuits</footer>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%"/>
  <g transform="translate(10, 10)">
    <rect width="320" height="320" fill="#FFFFFF" rx="10"/>
    <g transform="translate(160, 160)">
      <circle cx="10" cy="10" r="30" fill="#4D7F7F" stroke="#C7B8EA" stroke-width="2"/>
      <text x="10" y="50" text-anchor="middle" fill="#C7B8EA" font-size="18">Circuits</text>
      <rect x="0" y="80" width="320" height="240" fill="#FFFFFF"/>
      <text x="15" y="110" text-anchor="start" fill="#4D7F7F" font-size="14">What is a Circuit?</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 240" dur="2s" repeatCount="indefinite"/>
      <section data-narration="Definition">
        <rect x="0" y="120" width="320" height="20" fill="#4D7F7F"/>
        <text x="15" y="140" text-anchor="start" fill="#C7B8EA" font-size="14">A circuit is a path in a graph that starts and ends at the same vertex, and passes through at least one edge more than once.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 110 140" to="360 110 140" dur="2s" repeatCount="indefinite"/>
      </section>
      <section data-narration="Types of Circuits">
        <rect x="0" y="150" width="320" height="20" fill="#4D7F7F"/>
        <text x="15" y="170" text-anchor="start" fill="#C7B8EA" font-size="14">There are two main types of circuits:</text>
        <rect x="0" y="190" width="320" height="20" fill="#F7D2C4"/>
        <text x="15" y="210" text-anchor="start" fill="#C7B8EA" font-size="14">Simple Circuit and Multiple Circuit.</text>
        <animateTransform attributeName="transform" type="translate" from="0 220" to="0 240" dur="2s" repeatCount="indefinite"/>
      </section>
      <section data-narration="Eulerian Circuit">
        <rect x="0" y="250" width="320" height="20" fill="#4D7F7F"/>
        <text x="15" y="270" text-anchor="start" fill="#C7B8EA" font-size="14">An Eulerian circuit is a circuit in a graph that visits every edge exactly once.</text>
        <animateTransform attributeName="transform" type="translate" from="0 300" to="0 320" dur="2s" repeatCount="indefinite"/>
        <line x1="10" y1="310" x2="10" y2="320" stroke="#C7B8EA" stroke-width="2"/>
        <line x1="30" y1="310" x2="30" y2="320" stroke="#C7B8EA" stroke-width="2"/>
        <line x1="50" y1="310" x2="50" y2="320" stroke="#C7B8EA" stroke-width="2"/>
      </section>
      <section data-narration="Hamiltonian Circuit">
        <rect x="0" y="300" width="320" height="20" fill="#4D7F7F"/>
        <text x="15" y="320" text-anchor="start" fill="#C7B8EA" font-size="14">A Hamiltonian circuit is a circuit in a graph that visits every vertex exactly once.</text>
        <animateTransform attributeName="transform" type="translate" from="0 360" to="0 380" dur="2s" repeatCount="indefinite"/>
        <line x1="10" y1="370" x2="10" y2="380" stroke="#C7B8EA" stroke-width="2"/>
        <line x1="30" y1="370" x2="30" y2="380" stroke="#C7B8EA" stroke-width="2"/>
        <line x1="50" y1="370" x2="50" y2="380" stroke="#C7B8EA" stroke-width="2"/>
        <animateTransform attributeName="transform" type="translate" from="0 400" to="0 420" dur="2s" repeatCount="indefinite"/>
      </section>
      <section data-narration="Operations on Graphs">
        <rect x="0" y="350" width="320" height="20" fill="#4D7F7F"/>
        <text x="15" y="370" text-anchor="start" fill="#C7B8EA" font-size="14">Graphs can be manipulated using various operations, including Union of graphs, Intersection of graphs, and Complement of a graph.</text>
        <animateTransform attributeName="transform" type="translate" from="0 410" to="0 430" dur="2s" repeatCount="indefinite"/>
      </section>
    </g>
  </svg>