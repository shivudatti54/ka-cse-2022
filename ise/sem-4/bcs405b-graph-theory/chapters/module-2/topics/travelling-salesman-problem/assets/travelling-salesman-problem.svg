<svg width="420" height="400" data-topic-id="travelling-salesman-problem">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />

  <!-- Title at top -->
  <text x="130" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
    Travelling Salesman Problem
  </text>

  <!-- Section 1: Introduction -->
  <rect x="20" y="60" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="30" y="70" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="The Travelling Salesman Problem is a classic problem in graph theory and computer science. It is a computational problem that involves finding the shortest possible tour that visits a set of cities and returns to the original city.">
    Introduction
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="0s" dur="2s" repeatCount="indefinite" />

  <!-- Section 2: Problem Statement -->
  <rect x="20" y="120" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="30" y="130" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Given a set of cities and the distances between each pair of cities, find the shortest possible tour that visits each city exactly once and returns to the original city.">
    Problem Statement
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" begin="0s" dur="2s" repeatCount="indefinite" />

  <!-- Section 3: Mathematical Formulation -->
  <rect x="20" y="180" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="30" y="190" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Let G = (V, E) be a weighted graph, where V is the set of vertices (cities) and E is the set of edges (distances between cities). Let T be a Hamiltonian path in G, which is a path that visits each vertex exactly once. The TSP is to find the shortest Hamiltonian cycle in G, which is a cycle that visits each vertex exactly once and returns to the original vertex.">
    Mathematical Formulation
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,180" begin="0s" dur="2s" repeatCount="indefinite" />

  <!-- Section 4: Key Concepts -->
  <rect x="20" y="240" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="30" y="250" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Weighted Graph: A graph where each edge has a weight or distance associated with it. Hamiltonian Path: A path that visits each vertex exactly once. Hamiltonian Cycle: A cycle that visits each vertex exactly once and returns to the original vertex. TSP Instance: A specific instance of the TSP problem, which consists of a weighted graph G and a set of cities.">
    Key Concepts
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,240" begin="0s" dur="2s" repeatCount="indefinite" />

  <!-- Section 5: Algorithms for TSP -->
  <rect x="20" y="300" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="30" y="310" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="There are several algorithms for solving TSP, including: Brute Force Algorithm, Dynamic Programming, Greedy Algorithm, Local Search Algorithm, and Metaheuristic Algorithms.">
    Algorithms for TSP
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" begin="0s" dur="2s" repeatCount="indefinite" />

  <!-- Section 6: Conclusion -->
  <rect x="20" y="360" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="30" y="370" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="The Travelling Salesman Problem is a fundamental problem in operations research and has numerous applications in logistics, transportation, and telecommunications.">
    Conclusion
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,360" begin="0s" dur="2s" repeatCount="indefinite" />

  <!-- Arrow markers for connections -->
  <symbol id="arrow">
    <line x1="10" y1="20" x2="20" y2="30" stroke="#2E4053" stroke-width="2" />
  </symbol>
  <circle cx="10" cy="20" r="5" fill="#2E4053" />
  <circle cx="20" cy="30" r="5" fill="#2E4053" />
  <use xlink:href="#arrow" fill="#2E4053" />

  <!-- Footer at bottom -->
  <text x="130" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2E4053">
    Developed by [Your Name]
  </text>
</svg>