<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="spanning-trees">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Spanning Trees in Graph Theory. Let us explore how spanning trees connect all vertices with minimum edges.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB">Spanning Trees</text>
    <line x1="130" y1="38" x2="290" y2="38" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="125" cy="38" r="3" fill="#E65100"/>
    <circle cx="295" cy="38" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Definition with graph example -->
  <g opacity="0" data-narration="A spanning tree of a graph G is a subgraph that includes all vertices and is a tree, meaning it is connected and has no cycles. On the left is an original graph with 5 vertices, and on the right is one of its spanning trees highlighted in green.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>

    <!-- Definition text -->
    <text x="210" y="62" text-anchor="middle" font-family="Arial" font-size="10" fill="#3949AB" font-style="italic">A subgraph containing all vertices, connected, with no cycles</text>

    <!-- Original Graph label -->
    <text x="110" y="82" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Original Graph G</text>

    <!-- Original Graph: 5 vertices (A-E) with edges forming cycles -->
    <!-- Edges of original graph (gray, drawn first so nodes appear on top) -->
    <line x1="80" y1="100" x2="140" y2="100" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="140" y1="100" x2="160" y2="145" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="160" y1="145" x2="110" y2="170" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="110" y1="170" x2="60" y2="145" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="60" y1="145" x2="80" y2="100" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="80" y1="100" x2="110" y2="170" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="140" y1="100" x2="60" y2="145" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="4,2"/>

    <!-- Vertices -->
    <circle cx="80" cy="100" r="10" fill="#3949AB" stroke="#1A237E" stroke-width="1.5"/>
    <text x="80" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">A</text>
    <circle cx="140" cy="100" r="10" fill="#3949AB" stroke="#1A237E" stroke-width="1.5"/>
    <text x="140" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">B</text>
    <circle cx="160" cy="145" r="10" fill="#3949AB" stroke="#1A237E" stroke-width="1.5"/>
    <text x="160" y="149" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">C</text>
    <circle cx="110" cy="170" r="10" fill="#3949AB" stroke="#1A237E" stroke-width="1.5"/>
    <text x="110" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">D</text>
    <circle cx="60" cy="145" r="10" fill="#3949AB" stroke="#1A237E" stroke-width="1.5"/>
    <text x="60" y="149" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">E</text>

    <!-- Arrow between graphs -->
    <text x="210" y="138" text-anchor="middle" font-family="Arial" font-size="16" fill="#E65100">&#x2192;</text>

    <!-- Spanning Tree label -->
    <text x="320" y="82" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Spanning Tree T</text>

    <!-- Spanning Tree edges (green, 4 edges for 5 vertices, drawn first) -->
    <line x1="290" y1="100" x2="350" y2="100" stroke="#00695C" stroke-width="2.5"/>
    <line x1="350" y1="100" x2="370" y2="145" stroke="#00695C" stroke-width="2.5"/>
    <line x1="370" y1="145" x2="320" y2="170" stroke="#00695C" stroke-width="2.5"/>
    <line x1="320" y1="170" x2="270" y2="145" stroke="#00695C" stroke-width="2.5"/>

    <!-- Spanning Tree: same 5 vertices, only 4 edges (no cycles) -->
    <circle cx="290" cy="100" r="10" fill="#00695C" stroke="#004D40" stroke-width="1.5"/>
    <text x="290" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">A</text>
    <circle cx="350" cy="100" r="10" fill="#00695C" stroke="#004D40" stroke-width="1.5"/>
    <text x="350" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">B</text>
    <circle cx="370" cy="145" r="10" fill="#00695C" stroke="#004D40" stroke-width="1.5"/>
    <text x="370" y="149" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">C</text>
    <circle cx="320" cy="170" r="10" fill="#00695C" stroke="#004D40" stroke-width="1.5"/>
    <text x="320" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">D</text>
    <circle cx="270" cy="145" r="10" fill="#00695C" stroke="#004D40" stroke-width="1.5"/>
    <text x="270" y="149" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">E</text>
  </g>

  <!-- Group 3: Properties -->
  <g opacity="0" data-narration="Key properties of spanning trees. A graph with n vertices has n minus 1 edges in its spanning tree. It is always connected and acyclic. Removing any edge disconnects the tree, and adding any edge creates exactly one cycle.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>

    <rect x="15" y="190" width="390" height="68" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="1.5" rx="8"/>
    <text x="210" y="206" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Properties of Spanning Trees</text>

    <circle cx="35" cy="220" r="3" fill="#E65100"/>
    <text x="45" y="224" font-family="monospace" font-size="9" fill="#1A237E">n vertices &#x2192; n-1 edges</text>

    <circle cx="195" cy="220" r="3" fill="#E65100"/>
    <text x="205" y="224" font-family="monospace" font-size="9" fill="#1A237E">Connected + Acyclic</text>

    <circle cx="35" cy="240" r="3" fill="#C62828"/>
    <text x="45" y="244" font-family="Arial" font-size="9" fill="#1A237E">Remove any edge &#x2192; disconnects</text>

    <circle cx="235" cy="240" r="3" fill="#C62828"/>
    <text x="245" y="244" font-family="Arial" font-size="9" fill="#1A237E">Add any edge &#x2192; creates a cycle</text>
  </g>

  <!-- Group 4: Kruskal's Algorithm -->
  <g opacity="0" data-narration="Kruskal's algorithm finds the Minimum Spanning Tree. First, sort all edges by weight. Then add edges one by one in increasing order, skipping any edge that would create a cycle. Here, edges with weights 1, 2, and 3 are added, while the edge with weight 5 is rejected because it forms a cycle.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>

    <rect x="15" y="264" width="192" height="90" fill="white" fill-opacity="0.7" stroke="#E65100" stroke-width="1.5" rx="8"/>
    <text x="111" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Kruskal's Algorithm (MST)</text>

    <!-- Mini weighted graph for Kruskal -->
    <!-- MST edges with weights (drawn first) -->
    <line x1="45" y1="305" x2="85" y2="295" stroke="#00695C" stroke-width="2"/>
    <text x="60" y="295" font-family="monospace" font-size="8" fill="#00695C" font-weight="bold">1</text>
    <line x1="85" y1="295" x2="125" y2="305" stroke="#00695C" stroke-width="2"/>
    <text x="110" y="295" font-family="monospace" font-size="8" fill="#00695C" font-weight="bold">2</text>
    <line x1="45" y1="305" x2="85" y2="330" stroke="#00695C" stroke-width="2"/>
    <text x="58" y="325" font-family="monospace" font-size="8" fill="#00695C" font-weight="bold">3</text>

    <!-- Rejected edge (dashed red) -->
    <line x1="85" y1="295" x2="85" y2="330" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="92" y="316" font-family="monospace" font-size="7" fill="#C62828">5&#x2717;</text>

    <!-- Nodes -->
    <circle cx="45" cy="305" r="7" fill="#E65100"/>
    <text x="45" y="308" text-anchor="middle" font-family="monospace" font-size="7" fill="white">1</text>
    <circle cx="85" cy="295" r="7" fill="#E65100"/>
    <text x="85" y="298" text-anchor="middle" font-family="monospace" font-size="7" fill="white">2</text>
    <circle cx="85" cy="330" r="7" fill="#E65100"/>
    <text x="85" y="333" text-anchor="middle" font-family="monospace" font-size="7" fill="white">3</text>
    <circle cx="125" cy="305" r="7" fill="#E65100"/>
    <text x="125" y="308" text-anchor="middle" font-family="monospace" font-size="7" fill="white">4</text>

    <!-- Steps text -->
    <text x="155" y="296" font-family="Arial" font-size="8" fill="#1A237E">1. Sort edges by weight</text>
    <text x="155" y="310" font-family="Arial" font-size="8" fill="#1A237E">2. Add edge if no cycle</text>
    <text x="155" y="324" font-family="Arial" font-size="8" fill="#1A237E">3. Skip if cycle forms</text>
    <text x="155" y="338" font-family="Arial" font-size="8" fill="#1A237E">4. Stop at n-1 edges</text>
  </g>

  <!-- Group 5: Prim's Algorithm -->
  <g opacity="0" data-narration="Prim's algorithm also finds the MST but works differently. Start from any vertex and grow the tree by always adding the minimum weight edge that connects a tree vertex to a non-tree vertex. The tree expands one vertex at a time until all vertices are included.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>

    <rect x="213" y="264" width="192" height="90" fill="white" fill-opacity="0.7" stroke="#00695C" stroke-width="1.5" rx="8"/>
    <text x="309" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Prim's Algorithm (MST)</text>

    <!-- Mini graph for Prim showing growth -->
    <!-- Edges drawn first -->
    <line x1="242" y1="300" x2="268" y2="295" stroke="#00695C" stroke-width="2"/>
    <text x="255" y="292" font-family="monospace" font-size="7" fill="#00695C" font-weight="bold">1</text>
    <line x1="282" y1="295" x2="308" y2="300" stroke="#00695C" stroke-width="2"/>
    <text x="298" y="292" font-family="monospace" font-size="7" fill="#00695C" font-weight="bold">2</text>
    <line x1="315" y1="307" x2="315" y2="325" stroke="#00695C" stroke-width="2"/>
    <text x="324" y="320" font-family="monospace" font-size="7" fill="#00695C" font-weight="bold">3</text>

    <!-- Nodes with step indicators -->
    <circle cx="235" cy="300" r="7" fill="#00695C"/>
    <text x="235" y="303" text-anchor="middle" font-family="monospace" font-size="7" fill="white">A</text>

    <circle cx="275" cy="295" r="7" fill="#00695C"/>
    <text x="275" y="298" text-anchor="middle" font-family="monospace" font-size="7" fill="white">B</text>

    <circle cx="315" cy="300" r="7" fill="#00695C"/>
    <text x="315" y="303" text-anchor="middle" font-family="monospace" font-size="7" fill="white">C</text>

    <circle cx="315" cy="332" r="7" fill="#00695C"/>
    <text x="315" y="335" text-anchor="middle" font-family="monospace" font-size="7" fill="white">D</text>

    <!-- Steps text -->
    <text x="240" y="325" font-family="Arial" font-size="8" fill="#1A237E">1. Start at any vertex</text>
    <text x="240" y="339" font-family="Arial" font-size="8" fill="#1A237E">2. Add min edge to new vtx</text>
    <text x="240" y="353" font-family="Arial" font-size="8" fill="#1A237E">3. Repeat until all included</text>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="Spanning trees have many practical applications including network design for laying cables or pipes at minimum cost, cluster analysis in data mining, circuit design in electronics, and serving as the basis for shortest path algorithms.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>

    <rect x="15" y="360" width="390" height="32" fill="#3949AB" fill-opacity="0.1" stroke="#3949AB" stroke-width="1.5" rx="8"/>
    <text x="210" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Applications:</text>
    <text x="40" y="387" font-family="Arial" font-size="8" fill="#1A237E">&#x2022; Network Design</text>
    <text x="155" y="387" font-family="Arial" font-size="8" fill="#1A237E">&#x2022; Cluster Analysis</text>
    <text x="265" y="387" font-family="Arial" font-size="8" fill="#1A237E">&#x2022; Circuit Design</text>
    <text x="370" y="387" font-family="Arial" font-size="8" fill="#1A237E">&#x2022; Shortest Path</text>
  </g>
</svg>
