<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="counting-trees">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Counting Trees: understanding how many labeled trees exist on n vertices.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#3949AB">Counting Trees</text>
    <line x1="120" y1="38" x2="300" y2="38" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="150" y1="42" x2="270" y2="42" stroke="#3949AB" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Group 2: Cayley's Formula -->
  <g opacity="0" data-narration="Cayley's Formula states that the number of labeled trees on n vertices equals n raised to the power n minus 2. For n equals 3 vertices, there are 3 to the power 1 which is 3 trees. For n equals 4, there are 4 squared which is 16 trees.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="52" width="390" height="68" rx="8" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="1.2"/>
    <text x="210" y="71" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#3949AB">Cayley's Formula</text>
    <text x="185" y="89" text-anchor="middle" font-family="monospace" font-size="13" fill="#00695C">T(n) = n</text>
    <text x="237" y="83" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">(n&#x2212;2)</text>
    <text x="80" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100">n=3: 3&#xB9; = 3</text>
    <text x="210" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#3949AB">|</text>
    <text x="330" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#E65100">n=4: 4&#xB2; = 16</text>
  </g>

  <!-- Group 3: Three labeled trees for n=3 -->
  <g opacity="0" data-narration="Here are all 3 labeled trees on vertices 1, 2, 3. Tree one is the path 1 to 2 to 3. Tree two is the path 1 to 3 to 2. Tree three is a star with vertex 1 connected to both 2 and 3.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="140" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB">All 3 Labeled Trees on {1, 2, 3}</text>

    <!-- Tree 1: 1-2-3 (path) -->
    <g transform="translate(60,155)">
      <line x1="0" y1="12" x2="35" y2="12" stroke="#00695C" stroke-width="2"/>
      <line x1="35" y1="12" x2="70" y2="12" stroke="#00695C" stroke-width="2"/>
      <circle cx="0" cy="12" r="10" fill="#3949AB"/>
      <text x="0" y="16" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">1</text>
      <circle cx="35" cy="12" r="10" fill="#3949AB"/>
      <text x="35" y="16" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">2</text>
      <circle cx="70" cy="12" r="10" fill="#3949AB"/>
      <text x="70" y="16" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">3</text>
      <text x="35" y="40" text-anchor="middle" font-family="Arial" font-size="9" fill="#E65100">1&#x2013;2&#x2013;3</text>
    </g>

    <!-- Tree 2: 1-3-2 (path) -->
    <g transform="translate(175,155)">
      <line x1="0" y1="12" x2="35" y2="12" stroke="#00695C" stroke-width="2"/>
      <line x1="35" y1="12" x2="70" y2="12" stroke="#00695C" stroke-width="2"/>
      <circle cx="0" cy="12" r="10" fill="#3949AB"/>
      <text x="0" y="16" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">1</text>
      <circle cx="35" cy="12" r="10" fill="#3949AB"/>
      <text x="35" y="16" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">3</text>
      <circle cx="70" cy="12" r="10" fill="#3949AB"/>
      <text x="70" y="16" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">2</text>
      <text x="35" y="40" text-anchor="middle" font-family="Arial" font-size="9" fill="#E65100">1&#x2013;3&#x2013;2</text>
    </g>

    <!-- Tree 3: Star centered on 1 -->
    <g transform="translate(305,155)">
      <line x1="35" y1="5" x2="5" y2="28" stroke="#00695C" stroke-width="2"/>
      <line x1="35" y1="5" x2="65" y2="28" stroke="#00695C" stroke-width="2"/>
      <circle cx="35" cy="5" r="10" fill="#C62828"/>
      <text x="35" y="9" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">1</text>
      <circle cx="5" cy="28" r="10" fill="#3949AB"/>
      <text x="5" y="32" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">2</text>
      <circle cx="65" cy="28" r="10" fill="#3949AB"/>
      <text x="65" y="32" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">3</text>
      <text x="35" y="52" text-anchor="middle" font-family="Arial" font-size="9" fill="#E65100">2&#x2013;1&#x2013;3 (star)</text>
    </g>
  </g>

  <!-- Group 4: Prufer Sequence concept -->
  <g opacity="0" data-narration="The Prufer sequence provides a bijection between labeled trees on n vertices and sequences of length n minus 2. To encode: remove the smallest-labeled leaf, record its neighbor, and repeat until 2 vertices remain.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="212" width="390" height="56" rx="8" fill="white" fill-opacity="0.7" stroke="#00695C" stroke-width="1.2"/>
    <text x="210" y="231" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#00695C">Pr&#xFC;fer Sequence (Bijection)</text>
    <text x="210" y="248" text-anchor="middle" font-family="Arial" font-size="10.5" fill="#3949AB">Labeled trees on n vertices  &#x2194;  Sequences of length (n&#x2212;2)</text>
    <text x="210" y="262" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#E65100">Encode: remove smallest leaf &#x2192; record neighbor &#x2192; repeat</text>
  </g>

  <!-- Group 5: Prufer sequence example for n=5 -->
  <g opacity="0" data-narration="Example with a 5-vertex tree having edges 1 to 3, 2 to 3, 3 to 4, and 4 to 5. Step 1: remove leaf 1, record neighbor 3. Step 2: remove leaf 2, record neighbor 3. Step 3: remove leaf 3, record neighbor 4. The resulting Prufer sequence is 3, 3, 4.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="286" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Pr&#xFC;fer Encoding Example (n=5)</text>

    <!-- The tree: 1-3, 2-3, 3-4, 4-5 -->
    <g transform="translate(25,294)">
      <line x1="5" y1="0" x2="45" y2="14" stroke="#00695C" stroke-width="1.8"/>
      <line x1="5" y1="30" x2="45" y2="14" stroke="#00695C" stroke-width="1.8"/>
      <line x1="45" y1="14" x2="85" y2="14" stroke="#00695C" stroke-width="1.8"/>
      <line x1="85" y1="14" x2="125" y2="14" stroke="#00695C" stroke-width="1.8"/>
      <circle cx="5" cy="0" r="9" fill="#3949AB"/>
      <text x="5" y="4" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">1</text>
      <circle cx="5" cy="30" r="9" fill="#3949AB"/>
      <text x="5" y="34" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">2</text>
      <circle cx="45" cy="14" r="9" fill="#C62828"/>
      <text x="45" y="18" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">3</text>
      <circle cx="85" cy="14" r="9" fill="#E65100"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">4</text>
      <circle cx="125" cy="14" r="9" fill="#3949AB"/>
      <text x="125" y="18" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">5</text>
    </g>

    <!-- Steps -->
    <g transform="translate(185,295)">
      <text x="0" y="6" font-family="monospace" font-size="9" fill="#00695C">Step 1: rm 1 &#x2192; record 3</text>
      <text x="0" y="19" font-family="monospace" font-size="9" fill="#00695C">Step 2: rm 2 &#x2192; record 3</text>
      <text x="0" y="32" font-family="monospace" font-size="9" fill="#00695C">Step 3: rm 3 &#x2192; record 4</text>
    </g>

    <!-- Result box -->
    <rect x="348" y="293" width="62" height="30" rx="5" fill="#E65100" fill-opacity="0.15" stroke="#E65100" stroke-width="1"/>
    <text x="379" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100">Pr&#xFC;fer seq</text>
    <text x="379" y="318" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#C62828">(3,3,4)</text>
  </g>

  <!-- Group 6: Key results -->
  <g opacity="0" data-narration="Key results: The complete graph K n has n to the power n minus 2 spanning trees. The complete bipartite graph K m,n has m to the power n minus 1 times n to the power m minus 1 spanning trees.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="338" width="390" height="52" rx="8" fill="white" fill-opacity="0.8" stroke="#C62828" stroke-width="1.2"/>
    <text x="210" y="356" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#C62828">Key Results</text>
    <text x="30" y="372" font-family="Arial" font-size="11" fill="#3949AB">Spanning trees of </text>
    <text x="148" y="372" font-family="monospace" font-size="11" font-weight="bold" fill="#3949AB">K</text>
    <text x="158" y="376" font-family="monospace" font-size="8" fill="#3949AB">n</text>
    <text x="168" y="372" font-family="Arial" font-size="11" fill="#3949AB"> = </text>
    <text x="185" y="372" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">n</text>
    <text x="195" y="365" font-family="monospace" font-size="9" fill="#00695C">(n&#x2212;2)</text>
    <text x="30" y="386" font-family="Arial" font-size="11" fill="#3949AB">Spanning trees of </text>
    <text x="148" y="386" font-family="monospace" font-size="11" font-weight="bold" fill="#3949AB">K</text>
    <text x="158" y="390" font-family="monospace" font-size="8" fill="#3949AB">m,n</text>
    <text x="178" y="386" font-family="Arial" font-size="11" fill="#3949AB"> = </text>
    <text x="195" y="386" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">m</text>
    <text x="207" y="379" font-family="monospace" font-size="9" fill="#00695C">(n&#x2212;1)</text>
    <text x="245" y="386" font-family="monospace" font-size="12" font-weight="bold" fill="#00695C">&#xB7; n</text>
    <text x="271" y="379" font-family="monospace" font-size="9" fill="#00695C">(m&#x2212;1)</text>
  </g>
</svg>
