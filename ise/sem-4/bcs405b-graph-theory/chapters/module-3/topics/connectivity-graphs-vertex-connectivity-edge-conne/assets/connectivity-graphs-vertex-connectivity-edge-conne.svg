<svg width="420" height="400" data-topic-id="Connectivity Graphs" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#81A2F4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2D5F7" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
        padding: 20px;
        background-color: #F7F7F7;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .section::before {
        content: "";
        position: absolute;
        top: 20px;
        left: 20px;
        width: 100%;
        height: 4px;
        background-color: #3B5998;
        transform: skewX(30deg);
      }
    </style>
  </defs>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="380" fill="url(#gradient-1)"/>
    <g id="section-1">
      <rect x="0" y="0" width="100%" height="100" fill="#F7F7F7"/>
      <text x="50%" y="50%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3B5998">Vertex Connectivity</text>
      <animateTransform attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="10s" begin="-2s"/>
      <g id="narration-1">
        <text x="50%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Vertex Connectivity is a measure of how connected a graph is, in terms of the removal of vertices.</text>
        <animateTransform attributeName="transform" type="translate" from="50% 70%" to="50% 80%" dur="5s" begin="-1s"/>
      </g>
    </g>
    <g id="section-2">
      <rect x="0" y="0" width="100%" height="100" fill="#F7F7F7"/>
      <text x="50%" y="50%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3B5998">Edge Connectivity</text>
      <animateTransform attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="10s" begin="-4s"/>
      <g id="narration-2">
        <text x="50%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Edge Connectivity is a measure of how connected a graph is, in terms of the removal of edges.</text>
        <animateTransform attributeName="transform" type="translate" from="50% 70%" to="50% 80%" dur="5s" begin="-3s"/>
      </g>
    </g>
    <g id="section-3">
      <rect x="0" y="0" width="100%" height="100" fill="#F7F7F7"/>
      <text x="50%" y="50%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3B5998">Cut Sets</text>
      <animateTransform attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="10s" begin="-6s"/>
      <g id="narration-3">
        <text x="50%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">A cut set is a set of vertices whose removal disconnects the graph.</text>
        <animateTransform attributeName="transform" type="translate" from="50% 70%" to="50% 80%" dur="5s" begin="-5s"/>
      </g>
    </g>
    <g id="section-4">
      <rect x="0" y="0" width="100%" height="100" fill="#F7F7F7"/>
      <text x="50%" y="50%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3B5998">Cut Vertices</text>
      <animateTransform attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="10s" begin="-8s"/>
      <g id="narration-4">
        <text x="50%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">A cut vertex is a vertex that is part of all cuts in the graph.</text>
        <animateTransform attributeName="transform" type="translate" from="50% 70%" to="50% 80%" dur="5s" begin="-7s"/>
      </g>
    </g>
    <g id="section-5">
      <rect x="0" y="0" width="100%" height="100" fill="#F7F7F7"/>
      <text x="50%" y="50%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3B5998">Fundamental Circuits</text>
      <animateTransform attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="10s" begin="-10s"/>
      <g id="narration-5">
        <text x="50%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">A fundamental circuit is a circuit in the graph that has the highest edge connectivity.</text>
        <animateTransform attributeName="transform" type="translate" from="50% 70%" to="50% 80%" dur="5s" begin="-9s"/>
      </g>
    </g>
    <g id="footer">
      <text x="50%" y="380%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">Connectivity Graphs: Vertex Connectivity, Edge Connectivity, Cut set and Cut Vertices, Fundamental circuits</text>
    </g>
    <g id="arrow-1" transform="rotate(30 60 60)">
      <path d="M 60 60 L 120 60" stroke="#3B5998" stroke-width="2" fill="none"/>
    </g>
    <g id="arrow-2" transform="rotate(-30 60 60)">
      <path d="M 60 60 L 120 60" stroke="#3B5998" stroke-width="2" fill="none"/>
    </g>
    <g id="arrow-3" transform="rotate(60 120 60)">
      <path d="M 120 60 L 180 60" stroke="#3B5998" stroke-width="2" fill="none"/>
    </g>
    <g id="arrow-4" transform="rotate(-60 120 60)">
      <path d="M 120 60 L 180 60" stroke="#3B5998" stroke-width="2" fill="none"/>
    </g>
  </g>
</svg>