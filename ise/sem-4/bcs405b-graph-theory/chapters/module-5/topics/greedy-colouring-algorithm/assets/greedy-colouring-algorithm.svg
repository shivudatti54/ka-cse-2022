<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="greedy-colouring-algorithm">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="50%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Greedy Colouring Algorithm. A fundamental technique in graph theory for assigning colours to vertices.">
    <text x="210" y="32" font-family="Arial" font-size="17" font-weight="bold" fill="#3949AB" text-anchor="middle">Greedy Colouring Algorithm</text>
    <rect x="70" y="38" width="280" height="3" rx="1.5" fill="url(#titleUnderline)"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 2: What is Graph Colouring - 5 vertices, 6 edges -->
  <g opacity="0" data-narration="Graph colouring assigns colours to vertices so that no two adjacent vertices share the same colour. Here is a properly coloured graph with five vertices and six edges using three colours.">
    <text x="18" y="68" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">What is Graph Colouring?</text>
    <!-- Edges -->
    <line x1="80" y1="85" x2="140" y2="85" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="80" y1="85" x2="60" y2="130" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="80" y1="85" x2="110" y2="135" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="140" y1="85" x2="160" y2="130" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="140" y1="85" x2="110" y2="135" stroke="#9E9E9E" stroke-width="1.5"/>
    <line x1="60" y1="130" x2="110" y2="135" stroke="#9E9E9E" stroke-width="1.5"/>
    <!-- Vertices -->
    <circle cx="80" cy="85" r="12" fill="#C62828" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="89" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">v1</text>
    <circle cx="140" cy="85" r="12" fill="#00695C" stroke="#fff" stroke-width="1.5"/>
    <text x="140" y="89" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">v2</text>
    <circle cx="60" cy="130" r="12" fill="#00695C" stroke="#fff" stroke-width="1.5"/>
    <text x="60" y="134" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">v3</text>
    <circle cx="110" cy="135" r="12" fill="#3949AB" stroke="#fff" stroke-width="1.5"/>
    <text x="110" y="139" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">v4</text>
    <circle cx="160" cy="130" r="12" fill="#C62828" stroke="#fff" stroke-width="1.5"/>
    <text x="160" y="134" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">v5</text>
    <!-- Legend -->
    <rect x="200" y="76" width="200" height="75" rx="6" fill="#fff" fill-opacity="0.6" stroke="#B0BEC5" stroke-width="0.8"/>
    <text x="210" y="92" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Rule:</text>
    <text x="210" y="106" font-family="Arial" font-size="9" fill="#555">Adjacent vertices must have</text>
    <text x="210" y="118" font-family="Arial" font-size="9" fill="#555">different colours.</text>
    <circle cx="220" cy="137" r="6" fill="#C62828"/><text x="232" y="140" font-family="Arial" font-size="9" fill="#555">C1</text>
    <circle cx="265" cy="137" r="6" fill="#00695C"/><text x="277" y="140" font-family="Arial" font-size="9" fill="#555">C2</text>
    <circle cx="310" cy="137" r="6" fill="#3949AB"/><text x="322" y="140" font-family="Arial" font-size="9" fill="#555">C3</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 3: Algorithm Steps -->
  <g opacity="0" data-narration="The greedy colouring algorithm works in three steps. First, order the vertices. Second, for each vertex assign the smallest available colour not used by its neighbours. Third, repeat until all vertices are coloured.">
    <rect x="14" y="160" width="190" height="100" rx="6" fill="#fff" fill-opacity="0.7" stroke="#3949AB" stroke-width="1"/>
    <text x="24" y="177" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Algorithm Steps</text>
    <text x="24" y="195" font-family="monospace" font-size="9" fill="#E65100">1.</text>
    <text x="38" y="195" font-family="Arial" font-size="9" fill="#333">Order the vertices</text>
    <text x="24" y="212" font-family="monospace" font-size="9" fill="#E65100">2.</text>
    <text x="38" y="212" font-family="Arial" font-size="9" fill="#333">For each vertex, assign the</text>
    <text x="38" y="224" font-family="Arial" font-size="9" fill="#333">smallest colour not used</text>
    <text x="38" y="236" font-family="Arial" font-size="9" fill="#333">by its neighbours</text>
    <text x="24" y="252" font-family="monospace" font-size="9" fill="#E65100">3.</text>
    <text x="38" y="252" font-family="Arial" font-size="9" fill="#333">Repeat until all coloured</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 4: Step-by-step trace -->
  <g opacity="0" data-narration="Let us trace the algorithm. Vertex v1 gets colour C1. Vertex v2 is adjacent to v1 so it gets colour C2. Vertex v3 is not adjacent to v1 so it can reuse colour C1. Vertex v4 is adjacent to both v1 and v2 so it needs colour C3.">
    <rect x="216" y="160" width="190" height="100" rx="6" fill="#fff" fill-opacity="0.7" stroke="#00695C" stroke-width="1"/>
    <text x="226" y="177" font-family="Arial" font-size="11" font-weight="bold" fill="#00695C">Step-by-step Trace</text>
    <!-- v1 -->
    <circle cx="236" cy="197" r="8" fill="#C62828" stroke="#fff" stroke-width="1"/>
    <text x="236" y="200" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle">v1</text>
    <text x="250" y="200" font-family="monospace" font-size="9" fill="#333">-&gt; C1 (first vertex)</text>
    <!-- v2 -->
    <circle cx="236" cy="217" r="8" fill="#00695C" stroke="#fff" stroke-width="1"/>
    <text x="236" y="220" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle">v2</text>
    <text x="250" y="220" font-family="monospace" font-size="9" fill="#333">-&gt; C2 (adj to v1)</text>
    <!-- v3 -->
    <circle cx="236" cy="237" r="8" fill="#C62828" stroke="#fff" stroke-width="1"/>
    <text x="236" y="240" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle">v3</text>
    <text x="250" y="240" font-family="monospace" font-size="9" fill="#333">-&gt; C1 (not adj v1)</text>
    <!-- v4 -->
    <circle cx="236" cy="253" r="8" fill="#3949AB" stroke="#fff" stroke-width="1"/>
    <text x="236" y="256" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle">v4</text>
    <text x="250" y="256" font-family="monospace" font-size="9" fill="#333">-&gt; C3 (adj v1,v2)</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 5: Chromatic Number -->
  <g opacity="0" data-narration="The chromatic number chi of G is the minimum number of colours needed to properly colour a graph. The greedy algorithm may not always give the optimal colouring. The result depends on the vertex ordering chosen.">
    <rect x="14" y="270" width="392" height="55" rx="6" fill="#fff" fill-opacity="0.7" stroke="#E65100" stroke-width="1"/>
    <text x="24" y="288" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Chromatic Number &#x3C7;(G)</text>
    <text x="24" y="304" font-family="Arial" font-size="9" fill="#333">&#x2022; &#x3C7;(G) = minimum colours needed for a proper colouring</text>
    <text x="24" y="317" font-family="Arial" font-size="9" fill="#C62828">&#x2022; Greedy may not give optimal result &#x2014; depends on vertex ordering</text>
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 6: Applications -->
  <g opacity="0" data-narration="Graph colouring has many real-world applications including map colouring where adjacent regions need different colours, scheduling to avoid conflicts, register allocation in compilers, and frequency assignment in wireless networks.">
    <rect x="14" y="335" width="392" height="55" rx="6" fill="#fff" fill-opacity="0.7" stroke="#3949AB" stroke-width="1"/>
    <text x="24" y="353" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Applications</text>
    <circle cx="30" cy="367" r="4" fill="#C62828"/>
    <text x="40" y="370" font-family="Arial" font-size="9" fill="#333">Map Colouring</text>
    <circle cx="140" cy="367" r="4" fill="#00695C"/>
    <text x="150" y="370" font-family="Arial" font-size="9" fill="#333">Scheduling</text>
    <circle cx="30" cy="383" r="4" fill="#3949AB"/>
    <text x="40" y="386" font-family="Arial" font-size="9" fill="#333">Register Allocation</text>
    <circle cx="185" cy="383" r="4" fill="#E65100"/>
    <text x="195" y="386" font-family="Arial" font-size="9" fill="#333">Frequency Assignment</text>
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
