<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="eulers-theorem">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Euler's Theorem covers fundamental results in graph theory including Euler's formula for planar graphs, Euler paths, and Euler circuits.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB">Euler's Theorem</text>
    <line x1="120" y1="37" x2="300" y2="37" stroke="#3949AB" stroke-width="3" stroke-linecap="round"/>
    <line x1="150" y1="42" x2="270" y2="42" stroke="#00695C" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Group 2: Euler's Formula V - E + F = 2 -->
  <g opacity="0" data-narration="Euler's formula for connected planar graphs states that V minus E plus F equals 2, where V is vertices, E is edges, and F is faces including the outer face. For example, a triangle has 3 vertices, 3 edges, and 2 faces.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="62" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Euler's Formula (Planar Graphs)</text>
    <!-- Formula box -->
    <rect x="130" y="68" width="160" height="28" rx="6" fill="#3949AB" opacity="0.12"/>
    <text x="210" y="87" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#3949AB">V - E + F = 2</text>
    <!-- Sample planar graph: triangle -->
    <circle cx="60" cy="85" r="7" fill="#00695C"/>
    <circle cx="90" cy="65" r="7" fill="#00695C"/>
    <circle cx="120" cy="85" r="7" fill="#00695C"/>
    <line x1="60" y1="85" x2="90" y2="65" stroke="#00695C" stroke-width="1.5"/>
    <line x1="90" y1="65" x2="120" y2="85" stroke="#00695C" stroke-width="1.5"/>
    <line x1="120" y1="85" x2="60" y2="85" stroke="#00695C" stroke-width="1.5"/>
    <text x="90" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">V=3 E=3 F=2</text>
    <!-- Legend -->
    <text x="315" y="77" text-anchor="start" font-family="Arial" font-size="9" fill="#3949AB">V = vertices</text>
    <text x="315" y="89" text-anchor="start" font-family="Arial" font-size="9" fill="#3949AB">E = edges</text>
    <text x="315" y="101" text-anchor="start" font-family="Arial" font-size="9" fill="#3949AB">F = faces</text>
  </g>

  <!-- Group 3: Euler Path vs Euler Circuit -->
  <g opacity="0" data-narration="An Euler path is a trail that visits every edge of a graph exactly once, where the start and end vertices are different. An Euler circuit is a closed trail that visits every edge exactly once and returns to the starting vertex.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="128" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Euler Path vs Euler Circuit</text>

    <!-- Euler Path example: linear graph A-B-C-D -->
    <rect x="15" y="136" width="190" height="72" rx="6" fill="white" opacity="0.5"/>
    <text x="110" y="150" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Euler Path</text>
    <text x="110" y="162" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">visits every edge once (start ≠ end)</text>
    <!-- Path graph: A to B to C to D with extra edge B to D -->
    <circle cx="40" cy="185" r="6" fill="#E65100"/>
    <circle cx="80" cy="185" r="6" fill="#E65100"/>
    <circle cx="120" cy="185" r="6" fill="#E65100"/>
    <circle cx="160" cy="185" r="6" fill="#E65100"/>
    <line x1="46" y1="185" x2="74" y2="185" stroke="#E65100" stroke-width="2"/>
    <line x1="86" y1="185" x2="114" y2="185" stroke="#E65100" stroke-width="2"/>
    <line x1="126" y1="185" x2="154" y2="185" stroke="#E65100" stroke-width="2"/>
    <path d="M80,179 Q120,165 160,179" fill="none" stroke="#E65100" stroke-width="2"/>
    <text x="40" y="200" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">A</text>
    <text x="80" y="200" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">B</text>
    <text x="120" y="200" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">C</text>
    <text x="160" y="200" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">D</text>

    <!-- Euler Circuit example: triangle -->
    <rect x="215" y="136" width="190" height="72" rx="6" fill="white" opacity="0.5"/>
    <text x="310" y="150" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Euler Circuit</text>
    <text x="310" y="162" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">visits every edge, returns to start</text>
    <!-- Square graph for circuit: all even degree -->
    <circle cx="280" cy="178" r="6" fill="#00695C"/>
    <circle cx="340" cy="178" r="6" fill="#00695C"/>
    <circle cx="340" cy="198" r="6" fill="#00695C"/>
    <circle cx="280" cy="198" r="6" fill="#00695C"/>
    <line x1="286" y1="178" x2="334" y2="178" stroke="#00695C" stroke-width="2"/>
    <line x1="340" y1="184" x2="340" y2="192" stroke="#00695C" stroke-width="2"/>
    <line x1="334" y1="198" x2="286" y2="198" stroke="#00695C" stroke-width="2"/>
    <line x1="280" y1="192" x2="280" y2="184" stroke="#00695C" stroke-width="2"/>
    <!-- Arrow showing circuit direction -->
    <text x="310" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695C">↻</text>
  </g>

  <!-- Group 4: Conditions for existence -->
  <g opacity="0" data-narration="An Euler circuit exists if and only if every vertex in the graph has even degree. An Euler path exists if and only if the graph has exactly zero or exactly two vertices with odd degree.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="224" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Conditions for Existence</text>

    <!-- Circuit condition -->
    <rect x="15" y="232" width="190" height="44" rx="6" fill="#3949AB" opacity="0.08"/>
    <text x="110" y="247" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Euler Circuit exists iff:</text>
    <text x="110" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#00695C">every vertex has even degree</text>
    <text x="110" y="272" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">(0 vertices with odd degree)</text>

    <!-- Path condition -->
    <rect x="215" y="232" width="190" height="44" rx="6" fill="#E65100" opacity="0.08"/>
    <text x="310" y="247" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Euler Path exists iff:</text>
    <text x="310" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#E65100">exactly 0 or 2 odd-degree</text>
    <text x="310" y="272" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">(path starts/ends at odd vertices)</text>
  </g>

  <!-- Group 5: Konigsberg Bridge Problem -->
  <g opacity="0" data-narration="The Konigsberg Bridge problem asks whether one can walk through the city crossing each of the seven bridges exactly once. Euler modeled this as a graph with 4 nodes and 7 edges. Every vertex has odd degree: 3, 5, 3, and 3. Since more than 2 vertices have odd degree, no Euler path or circuit exists.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="296" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">Königsberg Bridge Problem</text>

    <!-- 4 nodes: A(top), B(left), C(right), D(bottom) -->
    <circle cx="130" cy="320" r="10" fill="#C62828"/>
    <text x="130" y="324" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">A</text>
    <text x="130" y="340" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">deg=3</text>

    <circle cx="70" cy="355" r="10" fill="#C62828"/>
    <text x="70" y="359" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">B</text>
    <text x="50" y="355" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">deg=5</text>

    <circle cx="190" cy="355" r="10" fill="#C62828"/>
    <text x="190" y="359" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">C</text>
    <text x="210" y="355" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">deg=3</text>

    <circle cx="130" cy="380" r="10" fill="#C62828"/>
    <text x="130" y="384" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">D</text>
    <text x="130" y="396" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828">deg=3</text>

    <!-- 7 edges representing 7 bridges -->
    <!-- A-B (2 bridges) -->
    <path d="M122,326 Q90,330 76,349" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <path d="M126,328 Q100,345 76,351" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <!-- A-C (2 bridges) -->
    <path d="M138,326 Q170,330 184,349" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <path d="M134,328 Q160,345 184,351" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <!-- B-D -->
    <path d="M76,363 Q100,380 122,380" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <!-- C-D -->
    <path d="M184,363 Q160,380 138,380" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <!-- B-C (through center) -->
    <line x1="80" y1="355" x2="180" y2="355" stroke="#C62828" stroke-width="1.5"/>

    <!-- Result box -->
    <rect x="235" y="310" width="170" height="50" rx="6" fill="#C62828" opacity="0.1"/>
    <text x="320" y="327" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#C62828">All 4 vertices have odd degree</text>
    <text x="320" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828">(need 0 or 2 for Euler path)</text>
    <text x="320" y="355" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#C62828">No Euler path exists!</text>
  </g>

  <!-- Group 6: Fleury's Algorithm -->
  <g opacity="0" data-narration="Fleury's algorithm finds an Euler path or circuit. Start at an odd-degree vertex if one exists, otherwise start anywhere. At each step, choose an edge that is not a bridge unless there is no alternative. A bridge is an edge whose removal disconnects the graph.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="235" y="362" width="170" height="34" rx="6" fill="#3949AB" opacity="0.1"/>
    <text x="320" y="376" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Fleury's Algorithm</text>
    <text x="320" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">Start at odd-deg vertex; avoid bridges</text>
  </g>
</svg>
