<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="Representations Of Planar Graphs" viewBox="0 0 420 400">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
            <stop offset="100%" stop-color="#66CCCC" stop-opacity="0" />
        </linearGradient>
    </defs>
    <background>
        <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" />
    </background>
    <title>Representations Of Planar Graphs</title>
    <section data-narration="Planar Embedding">
        <rect x="10" y="30" width="400" height="100" fill="#C7E5F1" rx="10" />
        <text x="20" y="50" font-size="18" fill="#2E4053" stroke="#2E4053" stroke-width="2">Planar Embedding</text>
        <animateTransform attribute="transform" type="rotate" from="0 200 150" to="360 200 150" dur="6000" begin="0s" />
    </section>
    <section data-narration="Dual Graph">
        <rect x="10" y="150" width="400" height="100" fill="#C7E5F1" rx="10" />
        <text x="20" y="170" font-size="18" fill="#2E4053" stroke="#2E4053" stroke-width="2">Dual Graph</text>
        <animateTransform attribute="transform" type="rotate" from="0 200 200" to="360 200 200" dur="6000" begin="2s" />
    </section>
    <section data-narration="Grid Representation">
        <rect x="10" y="280" width="400" height="100" fill="#C7E5F1" rx="10" />
        <text x="20" y="300" font-size="18" fill="#2E4053" stroke="#2E4053" stroke-width="2">Grid Representation</text>
        <animateTransform attribute="transform" type="rotate" from="0 200 250" to="360 200 250" dur="6000" begin="4s" />
    </section>
    <section data-narration="Relationship Between Planar Embeddings">
        <rect x="10" y="370" width="400" height="100" fill="#C7E5F1" rx="10" />
        <text x="20" y="390" font-size="18" fill="#2E4053" stroke="#2E4053" stroke-width="2">Relationship Between Planar Embeddings</text>
        <animateTransform attribute="transform" type="rotate" from="0 200 300" to="360 200 300" dur="6000" begin="6s" />
    </section>
    <footer>Representations Of Planar Graphs</footer>
</svg>