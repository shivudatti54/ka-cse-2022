<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="chalk-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C7E5F3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9C99C7" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC5C5" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFA07A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF99CC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>8 Hours Teaching Learning Process Chalk and Talk Method</title>
  <metadata>
    <title>Chalk and Talk Method</title>
    <description>8 Hours Teaching Learning Process Chalk and Talk Method</description>
  </metadata>
  <g id="chalk-and-talk-method">
    <rect fill="url(#chalk-gradient)" width="100%" height="100"/>
    <path d="M 50 100 L 350 100" stroke="#9C99C7" stroke-width="2"/>
    <text x="180" y="120" font-size="24" font-family="Arial" fill="#9C99C7">Chalk and Talk Method</text>
    <text x="180" y="150" font-size="18" font-family="Arial" fill="#9C99C7">Definition</text>
    <text x="180" y="180" font-size="18" font-family="Arial" fill="#9C99C7">The Chalk and Talk method is a traditional teaching approach where the lecturer uses a blackboard or a whiteboard to write mathematical concepts and equations, while explaining them to the students.</text>
    <g id="benefits">
      <rect fill="#FFC5C5" width="100%" height="80"/>
      <path d="M 50 200 L 350 200" stroke="#9C99C7" stroke-width="2"/>
      <text x="180" y="220" font-size="18" font-family="Arial" fill="#9C99C7">Benefits</text>
      <text x="180" y="250" font-size="18" font-family="Arial" fill="#9C99C7">- Encourages active participation and engagement from students</text>
      <text x="180" y="280" font-size="18" font-family="Arial" fill="#9C99C7">- Allows for immediate feedback and clarification</text>
      <text x="180" y="310" font-size="18" font-family="Arial" fill="#9C99C7">- Helps students to visualize complex concepts</text>
    </g>
    <g id="procedure">
      <rect fill="#FFA07A" width="100%" height="80"/>
      <path d="M 50 320 L 350 320" stroke="#9C99C7" stroke-width="2"/>
      <text x="180" y="340" font-size="18" font-family="Arial" fill="#9C99C7">Procedure</text>
      <text x="180" y="370" font-size="18" font-family="Arial" fill="#9C99C7">1. Preparation: The lecturer prepares a detailed lesson plan, including the topics to be covered, examples, and exercises.</text>
      <text x="180" y="400" font-size="18" font-family="Arial" fill="#9C99C7">2. Introduction: The lecturer introduces the topic, writes the relevant equations on the board, and explains the concept.</text>
      <text x="180" y="430" font-size="18" font-family="Arial" fill="#9C99C7">3. Explanation: The lecturer explains the concept, using examples and analogies to help students understand.</text>
      <text x="180" y="460" font-size="18" font-family="Arial" fill="#9C99C7">4. Practice: The lecturer provides students with practice problems, exercises, or quizzes to reinforce their understanding.</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 300" dur="5s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 400" dur="5s" begin="1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 500" dur="5s" begin="2s"/>
    <animateTransform attributeName="transform" type="translate" from="0 400" to="0 600" dur="5s" begin="3s"/>
  </g>
  <g id="footer">
    <rect fill="#FF99CC" width="100%" height="20"/>
    <text x="180" y="380" font-size="18" font-family="Arial" fill="#9C99C7">8 Hours Teaching Learning Process Chalk and Talk Method</text>
  </g>
</svg>