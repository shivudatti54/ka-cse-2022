<svg width="420" height="400" data-topic-id="geometric-dual" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Geometric Dual of a Planar Graph</title>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  <g id="section1">
    <rect x="10" y="10" width="300" height="50" fill="#FFFFFF" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#333333">Definition</text>
    <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0" fill="freeze"/>
    <rect x="50" y="30" width="200" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50" y="40" font-size="14" font-family="Arial" fill="#333333">The geometric dual of a planar graph is a planar graph constructed from the original graph by replacing each face with a vertex, and each edge with an edge between the corresponding vertices.</text>
  </g>
  <g id="section2">
    <rect x="10" y="150" width="300" height="50" fill="#FFFFFF" rx="10"/>
    <text x="10" y="160" font-size="18" font-family="Arial" fill="#333333">Properties of the Geometric Dual</text>
    <animate attributeName="opacity" begin="2s" dur="2s" from="1" to="0" fill="freeze"/>
    <rect x="50" y="170" width="200" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50" y="180" font-size="14" font-family="Arial" fill="#333333">The dual graph has the same number of vertices and edges as the original graph, and is also planar.</text>
  </g>
  <g id="section3">
    <rect x="10" y="270" width="300" height="50" fill="#FFFFFF" rx="10"/>
    <text x="10" y="280" font-size="18" font-family="Arial" fill="#333333">Examples</text>
    <animate attributeName="opacity" begin="4s" dur="2s" from="1" to="0" fill="freeze"/>
    <rect x="50" y="290" width="200" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50" y="300" font-size="14" font-family="Arial" fill="#333333">Consider a cube graph, which has 8 vertices and 12 edges. The dual graph of the cube is a tetrahedral graph, which also has 8 vertices and 12 edges.</text>
  </g>
  <g id="section4">
    <rect x="10" y="370" width="300" height="50" fill="#FFFFFF" rx="10"/>
    <text x="10" y="380" font-size="18" font-family="Arial" fill="#333333">Key Concepts</text>
    <animate attributeName="opacity" begin="6s" dur="2s" from="1" to="0" fill="freeze"/>
    <rect x="50" y="390" width="200" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50" y="400" font-size="14" font-family="Arial" fill="#333333">Euler formula: V - E + F = 2, face bounding, and dual face.</text>
  </g>
  <g id="section5">
    <rect x="10" y="470" width="300" height="50" fill="#FFFFFF" rx="10"/>
    <text x="10" y="480" font-size="18" font-family="Arial" fill="#333333">Applications</text>
    <animate attributeName="opacity" begin="8s" dur="2s" from="1" to="0" fill="freeze"/>
    <rect x="50" y="490" width="200" height="20" fill="#FFFFFF" rx="10"/>
    <text x="50" y="500" font-size="14" font-family="Arial" fill="#333333">The geometric dual of a planar graph can be used to solve problems related to planar graph theory.</text>
  </g>
  <g id="footer">
    <rect x="10" y="540" width="300" height="20" fill="#FFFFFF" rx="10"/>
    <text x="10" y="550" font-size="14" font-family="Arial" fill="#666666">Copyright 2023</text>
  </g>
  <g id="arrow">
    <path d="M 0,0 L 10,20" stroke="#666666" stroke-width="2" fill="none"/>
    <path d="M 10,20 L 20,10" stroke="#666666" stroke-width="2" fill="none"/>
    <path d="M 20,10 L 30,0" stroke="#666666" stroke-width="2" fill="none"/>
  </g>
</svg>