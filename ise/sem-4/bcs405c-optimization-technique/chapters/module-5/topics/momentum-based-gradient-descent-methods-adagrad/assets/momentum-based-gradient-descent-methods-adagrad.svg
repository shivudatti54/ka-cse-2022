<svg width="420" height="400" data-topic-id="momentum-based-gradient-descent-methods-adagrad">
  <!-- Title -->
  <title>Adagrad: Momentum-Based Gradient Descent Method</title>
  
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="Gradient" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity=".5"/>
      <stop offset="50%" stop-color="#7b8ee9" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#8e44ad" stop-opacity=".5"/>
    </linearGradient>
  </defs>
  <rect fill="url(#Gradient)" x="0" y="0" width="100%" height="100%"/>
  
  <!-- Section 1: Introduction -->
  <section id="section-1" data-narration="Gradient Descent is a widely used optimization technique">
    <rect fill="#f0f0f0" x="0" y="50" width="100%" height="50"/>
    <text x="20" y="20" font-size="24" fill="#333">Gradient Descent</text>
    <text x="20" y="60" font-size="18" fill="#666">A widely used optimization technique</text>
    <animate transform="rotate(0 20 20)" attributeName="transform" begin="100ms" dur="1000ms" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: What is Adagrad? -->
  <section id="section-2" data-narration="Adagrad is a popular optimization algorithm developed by John Wright, Randeep S. Singh, and Trevor P. Van Ditmaer">
    <rect fill="#f0f0f0" x="0" y="120" width="100%" height="50"/>
    <text x="20" y="90" font-size="24" fill="#333">Adagrad</text>
    <text x="20" y="130" font-size="18" fill="#666">A popular optimization algorithm</text>
    <animate transform="rotate(45 20 90)" attributeName="transform" begin="200ms" dur="1000ms" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Key Concepts -->
  <section id="section-3" data-narration="Adagrad uses adaptive learning rates to adjust the step size based on the magnitude of the gradient">
    <rect fill="#f0f0f0" x="0" y="190" width="100%" height="50"/>
    <text x="20" y="160" font-size="24" fill="#333">Adaptive Learning Rate</text>
    <text x="20" y="190" font-size="18" fill="#666">Adjusts step size based on gradient magnitude</text>
    <animate transform="rotate(90 20 160)" attributeName="transform" begin="300ms" dur="1000ms" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: How Adagrad Works -->
  <section id="section-4" data-narration="The Adagrad algorithm works by initializing the parameters, computing the gradient, updating the learning rate, and updating the parameters">
    <rect fill="#f0f0f0" x="0" y="260" width="100%" height="50"/>
    <text x="20" y="230" font-size="24" fill="#333">How Adagrad Works</text>
    <text x="20" y="260" font-size="18" fill="#666">Initialize parameters, compute gradient, update learning rate, update parameters</text>
    <animate transform="rotate(135 20 230)" attributeName="transform" begin="400ms" dur="1000ms" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: Update Formula -->
  <section id="section-5" data-narration="The update formula for Adagrad is given by v_t = v_(t-1) + (e_t * h_t)">
    <rect fill="#f0f0f0" x="0" y="330" width="100%" height="50"/>
    <text x="20" y="300" font-size="24" fill="#333">Update Formula</text>
    <text x="20" y="330" font-size="18" fill="#666">v_t = v_(t-1) + (e_t * h_t)</text>
    <animate transform="rotate(165 20 300)" attributeName="transform" begin="500ms" dur="1000ms" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 6: Example -->
  <section id="section-6" data-narration="Suppose we have a simple linear regression model with a single feature x and an output y. The loss function is given by L(w, x, y) = (1/2) * (w * x - y)^2">
    <rect fill="#f0f0f0" x="0" y="400" width="100%" height="50"/>
    <text x="20" y="370" font-size="24" fill="#333">Example</text>
    <text x="20" y="400" font-size="18" fill="#666">Simple linear regression model</text>
    <animate transform="rotate(195 20 370)" attributeName="transform" begin="600ms" dur="1000ms" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer -->
  <footer>
    <text x="20" y="410" font-size="18" fill="#666">Adagrad: Momentum-Based Gradient Descent Method</text>
  </footer>
  
  <!-- Arrow Markers -->
  <line x1="20" y1="20" x2="20" y2="20" style="stroke:#333;stroke-width:2"/>
  <line x1="20" y1="60" x2="20" y2="60" style="stroke:#333;stroke-width:2"/>
  <line x1="20" y1="120" x2="20" y2="120" style="stroke:#333;stroke-width:2"/>
  <line x1="20" y1="190" x2="20" y2="190" style="stroke:#333;stroke-width:2"/>
  <line x1="20" y1="260" x2="20" y2="260" style="stroke:#333;stroke-width:2"/>
  <line x1="20" y1="330" x2="20" y2="330" style="stroke:#333;stroke-width:2"/>
  <line x1="20" y1="400" x2="20" y2="400" style="stroke:#333;stroke-width:2"/>
</svg>