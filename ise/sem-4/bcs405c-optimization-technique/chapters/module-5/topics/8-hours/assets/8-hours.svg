<svg width="420" height="400" data-topic-id="8-hour-optimization-technique">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#2F4F7F">8-Hour Optimization Technique</text>
  <rect x="100" y="100" width="200" height="50" fill="#F7DC6F" rx="10" data-narration="What is the 8-Hour Optimization Technique?"/>
  <animateTransform attributeName="transform" type="translate" from="0 100" to="0 200" dur="2s" begin="0s"/>
  <text x="120" y="150" font-size="18" font-family="Arial" fill="#2F4F7F">Dedicate 8 hours to a single task or activity.</text>
  <rect x="100" y="220" width="200" height="50" fill="#87CEEB" rx="10" data-narration="Benefits of the 8-Hour Optimization Technique?"/>
  <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="2s" begin="0.5s"/>
  <text x="120" y="350" font-size="18" font-family="Arial" fill="#2F4F7F">Increased productivity, improved work-life balance, reduced stress, and increased motivation.</text>
  <g>
    <rect x="100" y="220" width="200" height="50" fill="#F7DC6F" rx="10" data-narration="How to Apply the 8-Hour Optimization Technique?"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="2s" begin="1s"/>
    <text x="120" y="350" font-size="18" font-family="Arial" fill="#2F4F7F">Prioritize tasks, eliminate distractions, and take regular breaks.</text>
  </g>
  <g>
    <rect x="100" y="220" width="200" height="50" fill="#87CEEB" rx="10" data-narration="Common Challenges and Limitations?"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="2s" begin="1.5s"/>
    <text x="120" y="350" font-size="18" font-family="Arial" fill="#2F4F7F">Overcommitting, procrastination, and lack of motivation.</text>
  </g>
  <g>
    <rect x="100" y="220" width="200" height="50" fill="#F7DC6F" rx="10" data-narration="Real-World Applications of the 8-Hour Optimization Technique?"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="2s" begin="2s"/>
    <text x="120" y="350" font-size="18" font-family="Arial" fill="#2F4F7F">Improving productivity, achieving goals, and enhancing work-life balance.</text>
  </g>
  <g>
    <rect x="100" y="220" width="200" height="50" fill="#87CEEB" rx="10" data-narration="Conclusion?"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="2s" begin="2.5s"/>
    <text x="120" y="350" font-size="18" font-family="Arial" fill="#2F4F7F">The 8-Hour Optimization Technique is a simple yet powerful tool for improving productivity and achieving your goals.</text>
  </g>
  <rect x="10" y="380" width="400" height="10" fill="#2F4F7F"/>
  <text x="20" y="390" font-size="18" font-family="Arial" fill="#2F4F7F">By following the 8-Hour Optimization Technique, you can transform your work and life.</text>
</svg>