<svg width="420" height="400" data-topic-id="saddle-point-methods">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" />
      <stop offset="100%" stop-color="#87CEEB" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#4B0082">
    Saddle Point Methods
  </text>
  
  <!-- Section 1: Contiguous Allocation -->
  <section data-narration="Contiguous Allocation">
    <rect x="10" y="50" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="20" y="70" font-size="18" font-family="Arial" fill="#5C6BC0">
      Directory Entry: (filename, start_block, length)
    </text>
    <text x="20" y="90" font-size="18" font-family="Arial" fill="#5C6BC0">
      Advantages: Simple implementation, Excellent read performance, Supports direct access
    </text>
    <text x="20" y="110" font-size="18" font-family="Arial" fill="#5C6BC0">
      Disadvantages: External fragmentation, File size must be known at creation, Difficult to grow files
    </text>
  </section>
  
  <!-- Animation for Contiguous Allocation -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s">
    <rect x="10" y="50" width="400" height="100" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" />
  </animate>
  
  <!-- Section 2: Linked Allocation -->
  <section data-narration="Linked Allocation">
    <rect x="10" y="170" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="20" y="190" font-size="18" font-family="Arial" fill="#5C6BC0">
      Directory Entry: (filename, start_block, end_block)
    </text>
    <text x="20" y="210" font-size="18" font-family="Arial" fill="#5C6BC0">
      Advantages: No external fragmentation, Files can grow dynamically, Simple allocation
    </text>
    <text x="20" y="230" font-size="18" font-family="Arial" fill="#5C6BC0">
      Disadvantages: No direct access (must traverse), Pointer space overhead, Reliability issues (one bad pointer loses rest)
    </text>
  </section>
  
  <!-- Animation for Linked Allocation -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="2s" dur="2s">
    <rect x="10" y="170" width="400" height="100" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" />
  </animate>
  
  <!-- Section 3: Indexed Allocation -->
  <section data-narration="Indexed Allocation">
    <rect x="10" y="310" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="20" y="330" font-size="18" font-family="Arial" fill="#5C6BC0">
      Directory Entry: (filename, index_block)
    </text>
    <text x="20" y="350" font-size="18" font-family="Arial" fill="#5C6BC0">
      Advantages: Direct access supported, No external fragmentation, Easy file growth
    </text>
    <text x="20" y="370" font-size="18" font-family="Arial" fill="#5C6BC0">
      Disadvantages: Index block overhead, Index block size limits file size
    </text>
  </section>
  
  <!-- Animation for Indexed Allocation -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="4s" dur="2s">
    <rect x="10" y="310" width="400" height="100" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" />
  </animate>
  
  <!-- Section 4: Handling Large Files -->
  <section data-narration="Handling Large Files">
    <rect x="10" y="420" width="400" height="100" fill="#F7F7F7" rx="10" />
    <text x="20" y="440" font-size="18" font-family="Arial" fill="#5C6BC0">
      Linked Index: Index blocks linked together
    </text>
    <text x="20" y="460" font-size="18" font-family="Arial" fill="#5C6BC0">
      Multi-level Index: Index of indexes
    </text>
  </section>
  
  <!-- Animation for Handling Large Files -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="6s" dur="2s">
    <rect x="10" y="420" width="400" height="100" fill="#F7F7F7" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" />
  </animate>
  
  <!-- Footer -->
  <text x="10" y="480" font-size="18" font-family="Arial" fill="#4B0082">
    Created by [Your Name]
  </text>
</svg>