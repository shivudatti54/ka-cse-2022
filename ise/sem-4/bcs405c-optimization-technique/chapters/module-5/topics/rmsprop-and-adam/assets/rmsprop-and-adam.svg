<svg width="420" height="400" data-topic-id="rmsprop-and-adam">
  <title>RMSprop and Adam: Advanced Optimization Techniques</title>
  <footer>Learn Advanced Optimization Techniques with RMSprop and Adam</footer>

  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0097a7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <!-- Section 1: Introduction -->
  <section data-narration="RMSprop Introduction">
    <rect x="0" y="0" width="420" height="100" fill="#fff" rx="10"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#333">RMSprop:</text>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" fill="#666">An optimization algorithm that adapts the learning rate based on the magnitude of the gradient.</text>
  </section>

  <!-- Section 2: How RMSprop Works -->
  <section data-narration="RMSprop Formula">
    <rect x="0" y="100" width="420" height="100" fill="#fff" rx="10"/>
    <text x="20" y="110" font-size="18" font-family="Arial, sans-serif" fill="#333">v = 0.9 * v + 0.01 * (y - y_old)^2</text>
    <text x="20" y="130" font-size="18" font-family="Arial, sans-serif" fill="#666">y = y - alpha * g</text>
    <text x="20" y="150" font-size="18" font-family="Arial, sans-serif" fill="#666">y_old = y_old - alpha * g</text>
  </section>

  <!-- Section 3: Key Concepts -->
  <section data-narration="RMSprop Key Concepts">
    <rect x="0" y="200" width="420" height="100" fill="#fff" rx="10"/>
    <text x="20" y="210" font-size="18" font-family="Arial, sans-serif" fill="#333">Moving Average:</text>
    <text x="20" y="230" font-size="18" font-family="Arial, sans-serif" fill="#666">Adaptive Learning Rate:</text>
    <text x="20" y="250" font-size="18" font-family="Arial, sans-serif" fill="#666">Exponential Decay:</text>
  </section>

  <!-- Section 4: Example -->
  <section data-narration="RMSprop Example">
    <rect x="0" y="300" width="420" height="100" fill="#fff" rx="10"/>
    <text x="20" y="310" font-size="18" font-family="Arial, sans-serif" fill="#333">RMSprop Example:</text>
    <text x="20" y="330" font-size="18" font-family="Arial, sans-serif" fill="#666">Train the network for 100 epochs with a learning rate of 0.01 and a momentum of 0.9.</text>
  </section>

  <!-- Section 5: Adam -->
  <section data-narration="Adam Introduction">
    <rect x="0" y="400" width="420" height="100" fill="#fff" rx="10"/>
    <text x="20" y="410" font-size="24" font-family="Arial, sans-serif" fill="#333">Adam:</text>
    <text x="20" y="430" font-size="18" font-family="Arial, sans-serif" fill="#666">Another optimization algorithm that adapts the learning rate based on the magnitude of the gradient.</text>
  </section>

  <!-- Section 6: Advantages -->
  <section data-narration="Adam Advantages">
    <rect x="0" y="500" width="420" height="100" fill="#fff" rx="10"/>
    <text x="20" y="510" font-size="18" font-family="Arial, sans-serif" fill="#333">Adam Advantages:</text>
    <text x="20" y="530" font-size="18" font-family="Arial, sans-serif" fill="#666">Improved convergence rates and better performance on nonlinear problems.</text>
  </section>

  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" xml:lang="en" begin="0s" dur="2s" repeatCount="indefinite">
    <circle cx="210" cy="200" r="20" fill="#6c5ce7" opacity="0"/>
    <circle cx="210" cy="200" r="20" fill="#0097a7" opacity="1"/>
  </animate>

  <animate xmlns="http://www.w3.org/2000/svg" xml:lang="en" begin="0.5s" dur="2s" repeatCount="indefinite">
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#333">RMSprop:</text>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" fill="#666">Adapts the learning rate based on the magnitude of the gradient.</text>
  </animate>

  <animate xmlns="http://www.w3.org/2000/svg" xml:lang="en" begin="1s" dur="2s" repeatCount="indefinite">
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#333">Adam:</text>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" fill="#666">Adapts the learning rate based on the magnitude of the gradient.</text>
  </animate>

</svg>