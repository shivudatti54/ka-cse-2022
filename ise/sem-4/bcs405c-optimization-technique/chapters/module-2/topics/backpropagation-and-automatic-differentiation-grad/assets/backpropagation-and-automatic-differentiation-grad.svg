<svg width="420" height="400" data-topic-id="backpropagation-and-automatic-differentiation-grad">
  <!-- Title -->
  <title>Backpropagation and Automatic Differentiation: Gradients in a Deep Network</title>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4C6CEC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#32B6FF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#grad);"/>
  
  <!-- Sections -->
  <section data-narration="Introduction to Backpropagation">
    <rect x="20" y="20" width="380" height="50" style="fill: white; background-color: #f0f0f0; border-radius: 10px; padding: 10px;"/>
    <text x="50" y="40" font-size="18" font-family="Arial" text-anchor="middle">Backpropagation</text>
  </section>
  <section data-narration="How Backpropagation Works">
    <rect x="20" y="100" width="380" height="50" style="fill: white; background-color: #f0f0f0; border-radius: 10px; padding: 10px;"/>
    <text x="50" y="120" font-size="18" font-family="Arial" text-anchor="middle">Forward Pass: Propagating inputs through the network</text>
    <text x="50" y="160" font-size="18" font-family="Arial" text-anchor="middle">Backward Pass: Calculating the error and computing gradients</text>
  </section>
  <section data-narration="Automatic Differentiation">
    <rect x="20" y="200" width="380" height="50" style="fill: white; background-color: #f0f0f0; border-radius: 10px; padding: 10px;"/>
    <text x="50" y="220" font-size="18" font-family="Arial" text-anchor="middle">Automatic Differentiation</text>
    <text x="50" y="260" font-size="18" font-family="Arial" text-anchor="middle">Computing derivatives of a function without manual computation</text>
  </section>
  <section data-narration="Gradients in a Deep Network">
    <rect x="20" y="300" width="380" height="50" style="fill: white; background-color: #f0f0f0; border-radius: 10px; padding: 10px;"/>
    <text x="50" y="320" font-size="18" font-family="Arial" text-anchor="middle">Gradients in a Deep Network</text>
    <text x="50" y="360" font-size="18" font-family="Arial" text-anchor="middle">Computing gradients recursively, starting from the output layer</text>
  </section>
  <section data-narration="Gradient of Quadratic Cost">
    <rect x="20" y="400" width="380" height="50" style="fill: white; background-color: #f0f0f0; border-radius: 10px; padding: 10px;"/>
    <text x="50" y="420" font-size="18" font-family="Arial" text-anchor="middle">Gradient of Quadratic Cost</text>
    <text x="50" y="460" font-size="18" font-family="Arial" text-anchor="middle">∂L/∂w = (y - y^') \* y'</text>
  </section>
  <section data-narration="Descending the Gradient of Cost">
    <rect x="20" y="500" width="380" height="50" style="fill: white; background-color: #f0f0f0; border-radius: 10px; padding: 10px;"/>
    <text x="50" y="520" font-size="18" font-family="Arial" text-anchor="middle">Descending the Gradient of Cost</text>
    <text x="50" y="560" font-size="18" font-family="Arial" text-anchor="middle">Updating model parameters using the gradients</text>
  </section>
  
  <!-- Animation -->
  <animate id="animate" begin="0s" dur="10s" repeatCount="indefinite">
    <animateTransform transform="rotate(360deg)" begin="0s" dur="2s"/>
  </animate>
  
  <!-- Arrows -->
  <line x1="250" y1="150" x2="210" y2="150" style="stroke: #4C6CEC; stroke-width: 2;"/>
  <line x1="250" y1="250" x2="210" y2="250" style="stroke: #32B6FF; stroke-width: 2;"/>
  
  <!-- Footer -->
  <text x="50" y="370" font-size="18" font-family="Arial" text-anchor="middle">Backpropagation and Automatic Differentiation: Gradients in a Deep Network</text>
</svg>