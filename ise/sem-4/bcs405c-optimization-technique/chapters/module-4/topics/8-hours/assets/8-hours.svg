<svg width="420" height="400" data-topic-id="8-hours">
  <!-- Gradient background with pastel colors -->
  <def focus="url(#pastel-gradient)">
    <filter id="pastel-gradient" type="linear">
      <feColorMatrix type="matrix" values="0.84 0 0.16 0 0.22 0 0 0 0.22"/>
    </filter>
  </def>
  
  <!-- Title at top -->
  <rect x="50" y="20" width="320" height="40" fill="#3498db" rx="10" data-narration="Title: 8 Hours">
    <animateTransform attributeName="transform" type="rotate" from="0 170 20" to="360 170 20" dur="10s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Section 1: Introduction -->
  <rect x="50" y="70" width="320" height="40" fill="#2ecc71" rx="10" data-narration="What is (8 Hours)?">
    <animateTransform attributeName="transform" type="translate" from="170 70" to="170 70" dur="0s" begin="0s"/>
  </rect>
  <text x="170" y="110" fill="#2ecc71" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Introduction to (8 Hours)">
    <tspan x="170" y="110" font-size="18" font-family="Arial">In optimization techniques, a problem is considered optimal if it satisfies the given constraints and achieves the best possible outcome.</tspan>
  </text>
  
  <!-- Section 2: Definition and Explanation -->
  <rect x="50" y="150" width="320" height="40" fill="#2ecc71" rx="10" data-narration="Definition and Explanation of (8 Hours)">
    <animateTransform attributeName="transform" type="translate" from="170 150" to="170 150" dur="0s" begin="2s"/>
  </rect>
  <rect x="50" y="190" width="320" height="40" fill="#2ecc71" rx="10" data-narration="Optimal Solution">
    <animateTransform attributeName="transform" type="translate" from="170 190" to="170 190" dur="0s" begin="4s"/>
  </rect>
  <rect x="50" y="230" width="320" height="40" fill="#2ecc71" rx="10" data-narration="Linear Programming">
    <animateTransform attributeName="transform" type="translate" from="170 230" to="170 230" dur="0s" begin="6s"/>
  </rect>
  <text x="170" y="260" fill="#2ecc71" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Recursion and (8 Hours)">
    <tspan x="170" y="260" font-size="18" font-family="Arial">Recursion is a method used to solve problems by dividing the problem into smaller sub-problems and solving each sub-problem recursively.</tspan>
  </text>
  
  <!-- Section 3: Example Problem -->
  <rect x="50" y="290" width="320" height="40" fill="#2ecc71" rx="10" data-narration="Example Problem">
    <animateTransform attributeName="transform" type="translate" from="170 290" to="170 290" dur="0s" begin="8s"/>
  </rect>
  <rect x="50" y="330" width="320" height="40" fill="#2ecc71" rx="10" data-narration="Solving the Problem">
    <animateTransform attributeName="transform" type="translate" from="170 330" to="170 330" dur="0s" begin="10s"/>
  </rect>
  <rect x="50" y="370" width="320" height="40" fill="#2ecc71" rx="10" data-narration="Optimal Solution">
    <animateTransform attributeName="transform" type="translate" from="170 370" to="170 370" dur="0s" begin="12s"/>
  </rect>
  <text x="170" y="400" fill="#2ecc71" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Conclusion">
    <tspan x="170" y="400" font-size="18" font-family="Arial">The (8 Hours) technique is used to solve problems that involve maximizing or minimizing a linear function subject to linear constraints.</tspan>
  </text>
  
  <!-- Arrow markers for connections -->
  <path id="arrow" d="M 120,20 L 200,20" fill="none" stroke="#3498db" stroke-width="2"/>
  <path id="arrow2" d="M 200,20 L 100,20" fill="none" stroke="#3498db" stroke-width="2"/>
  
  <!-- Gradient background with pastel colors -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
</svg>