<svg width="420" height="400" data-topic-id="unconstrained-optimization-method-of-steepest-ascent">
  <desc>Unconstrained Optimization Method Of Steepest Ascent</desc>
  <style>
    /* Pastel colors */
    body {
      background-color: #C9E4CA;
    }
    .section {
      background-color: #87CEEB;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .arrow {
      fill: #0097A7;
      stroke: #0097A7;
      stroke-width: 2;
      shape-rendering: strokePainted;
    }
  </style>
  <title>Unconstrained Optimization Method Of Steepest Ascent</title>
  <footer>Copyright 2022</footer>

  <!-- Steepest Ascent/Descent -->
  <section data-narration="Unconstrained Optimization: Steepest Ascent/Descent">
    <animate
      xmlns="http://www.w3.org/2000/svg"
      begin="0s"
      dur="2s"
      repeatCount="indefinite"
    >
      <path
        fill="none"
        stroke="#0097A7"
        stroke-width="2"
        d="M 50, 50 L 50, 150"
        class="arrow"
      />
    </animate>
    <div class="section">
      <h2>Method of Steepest Ascent/Descent</h2>
      <p>
        The Method of Steepest Ascent/Descent is an iterative method that
        uses the gradient of the objective function to update the parameters.
      </p>
      <p>
        The algorithm starts with an initial guess for the parameters and
        iteratively updates them in the direction of the negative gradient.
      </p>
      <p>
        <math>
          <mrow>
            <mi>x</mi>
            <mo>(t+1)</mo>
            <mo>=</mo>
            <mi>x</mi>
            <mo>(t)</mo>
            <mo>-</mo>
            <mi>α</mi>
            <mo>∇</mo>
            <mi>f</mi>
            <mi>(</mi>
            <mi>x</mi>
            <mo>)</mo>
            <mo>(t)</mo>
          </mrow>
        </math>
        <math>
          <mrow>
            <mi>x</mi>
            <mo>(t+1)</mo>
            <mo>=</mo>
            <mi>x</mi>
            <mo>(t)</mo>
            <mo>-</mo>
            <mi>β</mi>
            <mo>∇</mo>
            <mi>f</mi>
            <mi>(</mi>
            <mi>x</mi>
            <mo>)</mo>
            <mo>(t)</mo>
          </mrow>
        </math>
      </p>
    </div>

    <!-- Gradient Background -->
    <div class="gradient-background">
      <animate
        xmlns="http://www.w3.org/2000/svg"
        begin="0s"
        dur="2s"
        repeatCount="indefinite"
      >
        <path
          fill="none"
          stroke="#0097A7"
          stroke-width="2"
          d="M 0, 0 L 420, 0"
          class="arrow"
        />
        <circle cx="210" cy="20" r="100" fill="#87CEEB" />
      </animate>
    </div>

    <!-- Newton's Method -->
    <section data-narration="Unconstrained Optimization: Newton's Method">
      <animate
        xmlns="http://www.w3.org/2000/svg"
        begin="2s"
        dur="2s"
        repeatCount="indefinite"
      >
        <path
          fill="none"
          stroke="#0097A7"
          stroke-width="2"
          d="M 50, 50 L 50, 150"
          class="arrow"
        />
      </animate>
      <div class="section">
        <h2>Newton's Method</h2>
        <p>
          Newton's Method is an iterative method that uses the Hessian
          matrix of the objective function to update the parameters.
        </p>
        <p>
          The algorithm starts with an initial guess for the parameters and
          iteratively updates them in the direction of the negative Hessian
          matrix.
        </p>
        <p>
          <math>
            <mrow>
              <mi>x</mi>
              <mo>(t+1)</mo>
              <mo>=</mo>
              <mi>x</mi>
              <mo>(t)</mo>
              <mo>-</mo>
              <mi>H</mi>
          <mo>^</mo>
          <mo>^</mo>
          <mi>−1</mi>
          <mo>∇</mo>
          <mi>f</mi>
          <mi>(</mi>
          <mi>x</mi>
          <mo>)</mo>
          <mo>(t)</mo>
          </mrow>
        </math>
      </p>
    </div>

    <!-- Example -->
    <section data-narration="Unconstrained Optimization: Example">
      <animate
        xmlns="http://www.w3.org/2000/svg"
        begin="4s"
        dur="2s"
        repeatCount="indefinite"
      >
        <path
          fill="none"
          stroke="#0097A7"
          stroke-width="2"
          d="M 50, 50 L 50, 150"
          class="arrow"
        />
      </animate>
      <div class="section">
        <h2>Example</h2>
        <p>
          Suppose we want to find the maximum of the function
          <math>
            <mrow>
              <mi>f</mi>
              <mo>(</mo>
              <mi>x</mi>
              <mo>)</mo>
              <mo>=</mo>
              <mi>x</mi>
              <mo>^2</mo>
            </mrow>
          </math>
          on the interval <mrow>
            <mi>[</mi>
            <mi>0</mi>
            <mo>,</mo>
            <mi>1</mi>
            <mi>]</mi>
          </mrow>.
        </p>
        <p>
          We start with an initial guess <mi>x</mi> = 0.5.
        </p>
        <p>
          Iteration 1:
          <math>
            <mrow>
              <mi>f</mi>
              <mo>(</mo>
              <mi>x</mi>
              <mo>)</mo>
              <mo>=</mo>
              <mi>x</mi>
              <mo>^2</mo>
              <mo>=</mo>
              <mo>0</mo>
              <mo>.</mo>
              <mi>25</mi>
            </mrow>
          </math>
          <math>
            <mrow>
              <mi>∇</mi>
              <mi>f</mi>
              <mo>(</mo>
              <mi>x</mi>
              <mo>)</mo>
              <mo>=</mo>
              <mo>0</mo>
            </mrow>
          </math>
          <math>
            <mrow>
              <mi>x</mi>
              <mo>(</mo>
              <mi>1</mi>
              <mo>)</mo>
              <mo>=</mo>
              <mi>x</mi>
              <mo>(</mo>
              <mi>0</mi>
              <mo>)</mo>
              <mo>-</mo>
              <mi>α</mi>
              <mo>∇</mo>
              <mi>f</mi>
              <mi>(</mi>
              <mi>x</mi>
              <mo>(</mo>
              <mi>0</mi>
              <mo>))</mo>
          </mrow>
          </math>
        </p>
        <p>
          Iteration 2:
          <math>
            <mrow>
              <mi>f</mi>
              <mo>(</mo>
              <mi>x</mi>
              <mo>)</mo>
              <mo>=</mo>
              <mi>x</mi>
              <mo>^2</mo>
              <mo>=</mo>
              <mo>0</mo>
              <mo>.</mo>
              <mi>25</mi>
            </mrow>
          </math>
          <math>
            <mrow>
              <mi>∇</mi>
              <mi>f</mi>
              <mo>(</mo>
              <mi>x</mi>
              <mo>)</mo>
              <mo>=</mo>
              <mo>0</mo>
            </mrow>
          </math>
          <math>
            <mrow>
              <mi>x</mi>
              <mo>(</mo>
              <mi>1</mi>
              <mo>)</mo>
              <mo>=</mo>
              <mi>x</mi>
              <mo>(</mo>
              <mi>0</mi>
              <mo>)</mo>
              <mo>-</mo>
              <mi>β</mi>
              <mo>∇</mo>
              <mi>f</mi>
              <mi>(</mi>
              <mi>x</mi>
              <mo>(</mi>
              <mi>0</mi>
              <mo>))</mo>
          </mrow>
          </math>
        </p>
      </div>

    <!-- Footers -->
    <footer>Copyright 2022</footer>
  </svg>