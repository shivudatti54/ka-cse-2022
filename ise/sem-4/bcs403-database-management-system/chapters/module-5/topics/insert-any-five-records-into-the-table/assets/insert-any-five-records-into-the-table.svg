<svg width="420" height="400" data-topic-id="insert-records-into-table">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2e5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a7cee4" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .section:last-child {
        margin-bottom: 0;
      }
    </style>
  </defs>
  <g>
    <rect x="10" y="10" width="400" height="80" fill="url(#pastel-gradient)"/>
    <text x="15" y="90" font-size="24" font-family="Arial" fill="#2f4f7f">Insert Records into a Table</text>
    <text x="15" y="150" font-size="18" font-family="Arial" fill="#2f4f7f">What is a Record?</text>
    <section data-narration="What is a Record?" data-animation-time="2s">
      <rect x="10" y="170" width="380" height="30" fill="#fff"/>
      <text x="15" y="190" font-size="18" font-family="Arial" fill="#2f4f7f">A record is a single row in a database table that contains a set of related data.</text>
    </section>
    <section data-narration="Types of Records" data-animation-time="2s">
      <rect x="10" y="220" width="380" height="30" fill="#fff"/>
      <text x="15" y="240" font-size="18" font-family="Arial" fill="#2f4f7f">There are two types of records:</text>
      <text x="15" y="260" font-size="18" font-family="Arial" fill="#2f4f7f">New Record: A new record is added to the table to store new data.</text>
      <text x="15" y="280" font-size="18" font-family="Arial" fill="#2f4f7f">Existing Record: An existing record is updated with new data.</text>
    </section>
    <section data-narration="Benefits of Proper Record Insertion" data-animation-time="2s">
      <rect x="10" y="310" width="380" height="30" fill="#fff"/>
      <text x="15" y="330" font-size="18" font-family="Arial" fill="#2f4f7f">Proper record insertion is essential for maintaining the integrity of a database.</text>
      <text x="15" y="350" font-size="18" font-family="Arial" fill="#2f4f7f">It ensures that:</text>
      <text x="15" y="370" font-size="18" font-family="Arial" fill="#2f4f7f">Data Consistency: Records are inserted in the correct order to maintain data consistency.</text>
      <text x="15" y="390" font-size="18" font-family="Arial" fill="#2f4f7f">Data Security: Records are inserted securely to prevent data tampering or unauthorized access.</text>
      <text x="15" y="410" font-size="18" font-family="Arial" fill="#2f4f7f">Data Accuracy: Records are inserted accurately to ensure that the data is correct and reliable.</text>
    </section>
    <section data-narration="Inserting Records into a Table" data-animation-time="2s">
      <rect x="10" y="450" width="380" height="30" fill="#fff"/>
      <text x="15" y="470" font-size="18" font-family="Arial" fill="#2f4f7f">To insert a record into a table, follow these steps:</text>
      <text x="15" y="490" font-size="18" font-family="Arial" fill="#2f4f7f">1. Open the table where you want to insert the record.</text>
      <text x="15" y="510" font-size="18" font-family="Arial" fill="#2f4f7f">2. Choose the values you want to insert into the record.</text>
      <text x="15" y="530" font-size="18" font-family="Arial" fill="#2f4f7f">3. Insert the record.</text>
    </section>
    <section data-narration="SQL Commands for Inserting Records" data-animation-time="2s">
      <rect x="10" y="570" width="380" height="30" fill="#fff"/>
      <text x="15" y="590" font-size="18" font-family="Arial" fill="#2f4f7f">Here are some common SQL commands for inserting records:</text>
      <text x="15" y="610" font-size="18" font-family="Arial" fill="#2f4f7f">INSERT INTO: This command is used to insert a new record into a table.</text>
      <text x="15" y="630" font-size="18" font-family="Arial" fill="#2f4f7f">INSERT INTO ... VALUES: This command is used to insert a new record into a table with specific values.</text>
      <text x="15" y="650" font-size="18" font-family="Arial" fill="#2f4f7f">INSERT INTO ... SELECT: This command is used to insert multiple records into a table from another table.</text>
    </section>
    <g>
      <a href="#" style="text-decoration: none; color: #2f4f7f;">Back to Top</a>
    </g>
  </g>
</svg>