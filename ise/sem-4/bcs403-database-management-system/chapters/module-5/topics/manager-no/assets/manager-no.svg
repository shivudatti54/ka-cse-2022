<svg width="420" height="400" data-topic-id="manager-no" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id=" gradient-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <!-- Title -->
  <text x="10" y="10" font-size="24" font-family="Arial" text-anchor="start" fill="#4CAF50">
    Manager NO
  </text>
  <!-- Overview Section -->
  <section data-narration="Overview" style="background-color: #f7f7f7; padding: 20px; border: 1px solid #ddd;">
    <animate duration="1000" begin="0s" fill="freeze">
      <rect x="10" y="20" width="400" height="300" style="stroke: #ddd; stroke-width: 2; fill: none"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#666">
        Overview
      </text>
    </animate>
    <text x="10" y="80" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    MANAGER_NO is a control structure used in database management systems to manage and update the number of records in a table.
  </text>
  </section>
  <!-- Definition Section -->
  <section data-narration="Definition" style="background-color: #f7f7f7; padding: 20px; border: 1px solid #ddd;">
    <animate duration="1000" begin="1000s" fill="freeze">
      <rect x="10" y="20" width="400" height="300" style="stroke: #ddd; stroke-width: 2; fill: none"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#666">
        Definition
      </text>
    </animate>
    <text x="10" y="80" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    MANAGER_NO is a control structure that is used to manage and update the number of records in a table.
  </text>
  </section>
  <!-- How it Works Section -->
  <section data-narration="How it Works" style="background-color: #f7f7f7; padding: 20px; border: 1px solid #ddd;">
    <animate duration="1000" begin="2000s" fill="freeze">
      <rect x="10" y="20" width="400" height="300" style="stroke: #ddd; stroke-width: 2; fill: none"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#666">
        How it Works
      </text>
    </animate>
    <text x="10" y="80" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    MANAGER_NO works by maintaining a separate record in the database that indicates the number of records in a table.
  </text>
  <text x="10" y="110" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    When a user adds or deletes a record from a table, the MANAGER_NO control structure updates the number of records in the separate record.
  </text>
  </section>
  <!-- Key Concepts Section -->
  <section data-narration="Key Concepts" style="background-color: #f7f7f7; padding: 20px; border: 1px solid #ddd;">
    <animate duration="1000" begin="3000s" fill="freeze">
      <rect x="10" y="20" width="400" height="300" style="stroke: #ddd; stroke-width: 2; fill: none"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#666">
        Key Concepts
      </text>
    </animate>
    <text x="10" y="80" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    Number of Records: The number of records in a table.
  </text>
  <text x="10" y="110" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    MANAGER_NO Control Structure: A control structure used to manage and update the number of records in a table.
  </text>
  <text x="10" y="140" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    Record: A single entry in a table.
  </text>
  <text x="10" y="170" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    Table: A collection of related records.
  </text>
  </section>
  <!-- Example Section -->
  <section data-narration="Example" style="background-color: #f7f7f7; padding: 20px; border: 1px solid #ddd;">
    <animate duration="1000" begin="4000s" fill="freeze">
      <rect x="10" y="20" width="400" height="300" style="stroke: #ddd; stroke-width: 2; fill: none"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#666">
        Example
      </text>
    </animate>
    <text x="10" y="80" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    Suppose we have a table called "Employees" with the following records:
  </text>
  <text x="10" y="110" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    | Employee ID | Name | Department |
    </text>
    <text x="10" y="130" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    | 1           | John | Sales      |
    </text>
    <text x="10" y="150" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    | 2           | Jane | Marketing  |
    </text>
    <text x="10" y="170" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    | 3           | Joe  | HR         |
    </text>
    <text x="10" y="190" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    The MANAGER_NO control structure would maintain the following record:
  </text>
    <text x="10" y="210" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    | Record ID | Number of Records |
    </text>
    <text x="10" y="230" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    | 1         | 3                 |
    </text>
  </section>
  <!-- Advantages Section -->
  <section data-narration="Advantages" style="background-color: #f7f7f7; padding: 20px; border: 1px solid #ddd;">
    <animate duration="1000" begin="5000s" fill="freeze">
      <rect x="10" y="20" width="400" height="300" style="stroke: #ddd; stroke-width: 2; fill: none"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#666">
        Advantages
      </text>
    </animate>
    <text x="10" y="80" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    Efficient Data Storage: MANAGER_NO control structure allows for efficient data storage by maintaining a separate record for the number of records in a table.
  </text>
  <text x="10" y="110" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    Easy Updates: MANAGER_NO control structure makes it easy to update the number of records in a table.
  </text>
  </section>
  <!-- Footer -->
  <text x="10" y="380" font-size="14" font-family="Arial" text-anchor="start" fill="#666">
    Manager NO
  </text>
</svg>