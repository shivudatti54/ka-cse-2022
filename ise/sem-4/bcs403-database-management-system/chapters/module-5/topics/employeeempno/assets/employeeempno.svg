<svg width="420" height="400" data-topic-id="employee">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" />
  <title>Employee</title>
  <g id="employee-narration">
    <group data-narration="Introduction" transform="translate(10, 50)">
      <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Employee (EMPNO)</text>
      <rect x="20" y="40" width="350" height="30" fill="#F7F7F7" rx="5" />
      <text x="40" y="50" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">A unique identifier assigned to each employee in the organization.</text>
    </group>
    <group data-narration="Definitions and Concepts" transform="translate(10, 100)">
      <rect x="20" y="110" width="350" height="30" fill="#F7F7F7" rx="5" />
      <text x="40" y="120" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">Primary Key:</text>
      <text x="150" y="120" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">A field or set of fields that uniquely identify each record in a table.</text>
      <rect x="20" y="140" width="350" height="30" fill="#F7F7F7" rx="5" />
      <text x="40" y="150" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">Foreign Key:</text>
      <text x="150" y="150" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">A field or set of fields that references the primary key of another table.</text>
    </group>
    <group data-narration="Employee Table Structure" transform="translate(10, 200)">
      <rect x="20" y="210" width="350" height="30" fill="#F7F7F7" rx="5" />
      <text x="40" y="220" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">EMPNO:</text>
      <text x="150" y="220" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">int            Unique identifier for each employee  </text>
      <rect x="20" y="240" width="350" height="30" fill="#F7F7F7" rx="5" />
      <text x="40" y="250" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">EMPNAME:</text>
      <text x="150" y="250" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">varchar(50)    Employee name                        </text>
    </group>
    <group data-narration="Example Use Cases" transform="translate(10, 280)">
      <rect x="20" y="310" width="350" height="30" fill="#F7F7F7" rx="5" />
      <text x="40" y="320" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">Employee Data Management:</text>
      <text x="150" y="320" font-size="16" font-family="Arial, sans-serif" fill="#4D5D8F">The employee table is used to store information about employees in an organization.</text>
    </group>
    <g id="footer">
      <rect x="10" y="390" width="400" height="10" fill="#F7F7F7" rx="5" />
      <text x="20" y="400" font-size="14" font-family="Arial, sans-serif" fill="#4D5D8F">Learn More about Database Management Systems</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" dur="10s" repeatCount="indefinite" begin="0s" />
  </g>
</svg>