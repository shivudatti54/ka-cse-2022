<svg width="420" height="400" data-topic-id="add-primary-key-constraint-and-not-null-constraint">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body>
    <title>Add Primary Key Constraint and Not Null Constraint</title>
    <section data-narration="Introduction">
      <rect x="10" y="10" width="400" height="50" fill="#87CEEB"/>
      <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" fill="#C7B8EA">Add Primary Key Constraint and Not Null Constraint</text>
    </section>
    <section data-narration="Primary Key Constraint">
      <rect x="10" y="70" width="400" height="50" fill="#C7B8EA"/>
      <text x="15" y="85" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">Primary Key Constraint</text>
      <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="360 210 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
      <rect x="150" y="70" width="50" height="30" fill="#87CEEB" rx="5" mark="arrow"/>
      <text x="170" y="90" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">Definition: A primary key constraint ensures each record has a unique combination of values in its columns.</text>
      <rect x="10" y="150" width="400" height="200" fill="#87CEEB" opacity="0.5"/>
      <text x="15" y="170" font-size="18" font-family="Arial, sans-serif" fill="#C7B8EA">Example:</text>
      <rect x="10" y="200" width="300" height="150" fill="white" rx="10"/>
      <table>
        <tr>
          <td>Employee ID</td>
          <td>Name</td>
          <td>Age</td>
          <td>Salary</td>
        </tr>
        <tr>
          <td>1</td>
          <td>John</td>
          <td>25</td>
          <td>5000</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Jane</td>
          <td>30</td>
          <td>6000</td>
        </tr>
      </table>
      <text x="15" y="350" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">How to Add Primary Key Constraint:</text>
      <rect x="10" y="390" width="400" height="50" fill="#C7B8EA"/>
      <text x="15" y="405" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">1. Open the table in the database management system.</text>
      <text x="15" y="420" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">2. Click on the column you want to make the primary key.</text>
      <text x="15" y="445" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">3. In the constraints section, select "Primary Key" from the dropdown menu.</text>
      <text x="15" y="470" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">4. Click "OK" to save the changes.</text>
    </section>
    <section data-narration="Not Null Constraint">
      <rect x="10" y="70" width="400" height="50" fill="#C7B8EA"/>
      <text x="15" y="85" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">Not Null Constraint</text>
      <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="360 210 50" dur="10s" begin="-2s" repeatCount="indefinite"/>
      <rect x="150" y="70" width="50" height="30" fill="#87CEEB" rx="5" mark="arrow"/>
      <text x="170" y="90" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">Definition: A not null constraint ensures a column cannot contain null values.</text>
      <rect x="10" y="150" width="400" height="200" fill="#87CEEB" opacity="0.5"/>
      <text x="15" y="170" font-size="18" font-family="Arial, sans-serif" fill="#C7B8EA">Example:</text>
      <rect x="10" y="200" width="300" height="150" fill="white" rx="10"/>
      <table>
        <tr>
          <td>Employee ID</td>
          <td>Name</td>
          <td>Age</td>
          <td>Salary</td>
        </tr>
        <tr>
          <td>1</td>
          <td>John</td>
          <td>25</td>
          <td>5000</td>
        </tr>
        <tr>
          <td>2</td>
          <td></td>
          <td>30</td>
          <td>6000</td>
        </tr>
      </table>
      <text x="15" y="350" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">How to Add Not Null Constraint:</text>
      <rect x="10" y="390" width="400" height="50" fill="#C7B8EA"/>
      <text x="15" y="405" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">1. Open the table in the database management system.</text>
      <text x="15" y="420" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">2. Click on the column you want to make not null.</text>
      <text x="15" y="445" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">3. In the constraints section, select "Not Null" from the dropdown menu.</text>
      <text x="15" y="470" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">4. Click "OK" to save the changes.</text>
    </section>
    <footer>
      <text x="15" y="380" font-size="18" font-family="Arial, sans-serif" fill="#87CEEB">Learn More</text>
    </footer>
  </body>
</svg>