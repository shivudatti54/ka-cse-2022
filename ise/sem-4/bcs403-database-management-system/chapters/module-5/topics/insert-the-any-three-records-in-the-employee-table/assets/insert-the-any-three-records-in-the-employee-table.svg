<svg width="420" height="400" data-topic-id="insert-records-into-employee-table" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #7A8AD8; background-image: linear-gradient(to bottom, #ACC5E7, #B6C5F7);">

    <!-- Title Section -->
    <rect x="10" y="10" width="400" height="40" fill="#3498DB" rx="10"></rect>
    <text x="15" y="25" fill="#fff" font-size="24" text-anchor="middle">Insert Records into the Employee Table</text>

    <!-- Introduction Section -->
    <section id="introduction" style="background-color: #f9f9f9; padding: 20px; margin-bottom: 20px;">
        <h2 style="font-size: 18;">Introduction</h2>
        <p style="font-size: 14;">In this module, we will learn how to insert records into the employee table using SQL.</p>
    </section>

    <!-- Employee Table Section -->
    <section id="employee-table" data-narration="Defining the Employee Table">
        <rect x="10" y="60" width="400" height="100" fill="#fff" rx="10"></rect>
        <rect x="10" y="70" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <rect x="10" y="90" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <rect x="10" y="110" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <rect x="10" y="130" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <rect x="10" y="150" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <g style="fill: none; stroke: #666; stroke-width: 1;">
            < polygon points="10,70 300,70 300,90 10,90" />
            <line x1="10" y1="70" x2="300" y2="70" />
            <line x1="10" y1="90" x2="300" y2="90" />
        </g>
        <text x="15" y="110" fill="#333" font-size="14;">EMPNO</text>
        <text x="15" y="130" fill="#333" font-size="14;">ENAME</text>
        <text x="15" y="150" fill="#333" font-size="14;">JOB</text>
        <text x="15" y="170" fill="#333" font-size="14;">MANAGER_NO</text>
        <text x="15" y="190" fill="#333" font-size="14;">SAL</text>
        <text x="15" y="210" fill="#333" font-size="14;">COMMISSION</text>
    </section>

    <!-- Basic Insert Statement Section -->
    <section id="basic-insert" data-narration="Inserting Records into the Employee Table">
        <rect x="10" y="260" width="400" height="120" fill="#fff" rx="10"></rect>
        <rect x="10" y="270" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <rect x="10" y="290" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <rect x="10" y="310" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <g style="fill: none; stroke: #666; stroke-width: 1;">
            <path d="M 10 270 L 300 270 L 300 290 L 10 290 L 10 270" stroke-dasharray="4,4,4,4" stroke-width="2" />
        </g>
        <text x="15" y="290" fill="#333" font-size="14;">INSERT INTO Employee (EMPNO, ENAME, JOB, MANAGER_NO, SAL, COMMISSION) VALUES (1, 'John Doe', 'Software Engineer', 101, 50000.00, 1000.00);</text>
    </section>

    <!-- Multiple Records Insert Section -->
    <section id="multiple-records" data-narration="Inserting Multiple Records">
        <rect x="10" y="360" width="400" height="120" fill="#fff" rx="10"></rect>
        <rect x="10" y="370" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <rect x="10" y="390" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <g style="fill: none; stroke: #666; stroke-width: 1;">
            <path d="M 10 370 L 300 370 L 300 390 L 10 390 L 10 370" stroke-dasharray="4,4,4,4" stroke-width="2" />
        </g>
        <text x="15" y="390" fill="#333" font-size="14;">INSERT INTO Employee (EMPNO, ENAME, JOB, MANAGER_NO, SAL, COMMISSION) VALUES</text>
        <text x="15" y="410" fill="#333" font-size="14;">(2, 'Jane Doe', 'Marketing Manager', 102, 60000.00, 2000.00), (3, 'Bob Smith', 'Sales Representative', 103, 40000.00, 1500.00);</text>
    </section>

    <!-- ROLLBACK Statement Section -->
    <section id="rollback" data-narration="Using ROLLBACK to Undo Changes">
        <rect x="10" y="440" width="400" height="120" fill="#fff" rx="10"></rect>
        <rect x="10" y="450" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <rect x="10" y="470" width="300" height="20" fill="#f1f1f1" rx="10"></rect>
        <g style="fill: none; stroke: #666; stroke-width: 1;">
            <path d="M 10 450 L 300 450 L 300 470 L 10 470 L 10 450" stroke-dasharray="4,4,4,4" stroke-width="2" />
        </g>
        <text x="15" y="470" fill="#333" font-size="14;">ROLLBACK;</text>
    </section>

    <!-- Footer Section -->
    <rect x="10" y="510" width="400" height="40" fill="#3498DB" rx="10"></rect>
    <text x="15" y="525" fill="#fff" font-size="18" text-anchor="middle">Insert Records into the Employee Table</text>
</svg>