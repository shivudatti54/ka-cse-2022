<svg width="420" height="400" data-topic-id="commission-1">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="commission-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"/>
      <stop offset="35%" stop-color="#a1c9f2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6baed6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#commission-gradient)"/>

  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3498db" data-narration="Title">
    Commission 1
  </text>

  <!-- Section 1: Definition -->
  <rect x="50%" y="100" width="200" height="50" fill="#fff" rx="10" data-narration="Commission is a type of payment structure in which an employee or agent receives a percentage of the sales or revenue generated by their efforts.">
    <animateTransform attributeName="transform" type="translate" from="0 100" to="-50 100" dur="1s" begin="0s" repeatCount="indefinite"/>
    <text x="100%" y="35" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Definition">
      Commission is a type of payment structure in which an employee or agent receives a percentage of the sales or revenue generated by their efforts.
    </text>
  </rect>

  <!-- Section 2: Types of Commission -->
  <rect x="50%" y="165" width="200" height="50" fill="#fff" rx="10" data-narration="There are three types of commission structures: Fixed, Variable, and Hybrid.">
    <animateTransform attributeName="transform" type="translate" from="0 165" to="-50 165" dur="1s" begin="0s" repeatCount="indefinite"/>
    <rect x="80" y="10" width="40" height="30" fill="#f1c40f" rx="5" data-narration="Fixed Commission: A fixed amount is paid to the employee or agent for each sale or transaction made.">
      <animateTransform attributeName="transform" type="translate" from="80 10" to="120 10" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="60" width="40" height="30" fill="#80ccff" rx="5" data-narration="Variable Commission: The commission is directly related to the total sales or revenue generated.">
      <animateTransform attributeName="transform" type="translate" from="80 60" to="120 60" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="110" width="40" height="30" fill="#ff9900" rx="5" data-narration="Hybrid Commission: Combines fixed and variable commission structures.">
      <animateTransform attributeName="transform" type="translate" from="80 110" to="120 110" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </rect>

  <!-- Section 3: Advantages of Commission -->
  <rect x="50%" y="220" width="200" height="50" fill="#fff" rx="10" data-narration="The advantages of commission include motivating employees or agents to increase sales or revenue, encouraging competition among employees or agents, and being more cost-effective than traditional salary structures.">
    <animateTransform attributeName="transform" type="translate" from="0 220" to="-50 220" dur="1s" begin="0s" repeatCount="indefinite"/>
    <rect x="100%" y="25" width="40" height="30" fill="#8bc34a" rx="5" data-narration="Motivates employees or agents to increase sales or revenue.">
      <animateTransform attributeName="transform" type="translate" from="100 25" to="140 25" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="100%" y="75" width="40" height="30" fill="#9c27b0" rx="5" data-narration="Encourages competition among employees or agents.">
      <animateTransform attributeName="transform" type="translate" from="100 75" to="140 75" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="100%" y="125" width="40" height="30" fill="#e83e8c" rx="5" data-narration="More cost-effective than traditional salary structures.">
      <animateTransform attributeName="transform" type="translate" from="100 125" to="140 125" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </rect>

  <!-- Section 4: Disadvantages of Commission -->
  <rect x="50%" y="275" width="200" height="50" fill="#fff" rx="10" data-narration="The disadvantages of commission include creating uncertainty and instability for employees or agents, leading to overemphasis on short-term gains rather than long-term performance, and being difficult to manage and track.">
    <animateTransform attributeName="transform" type="translate" from="0 275" to="-50 275" dur="1s" begin="0s" repeatCount="indefinite"/>
    <rect x="100%" y="30" width="40" height="30" fill="#f1c40f" rx="5" data-narration="Creates uncertainty and instability for employees or agents.">
      <animateTransform attributeName="transform" type="translate" from="100 30" to="140 30" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="100%" y="80" width="40" height="30" fill="#9c27b0" rx="5" data-narration="Leads to overemphasis on short-term gains rather than long-term performance.">
      <animateTransform attributeName="transform" type="translate" from="100 80" to="140 80" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="100%" y="130" width="40" height="30" fill="#8bc34a" rx="5" data-narration="Difficult to manage and track.">
      <animateTransform attributeName="transform" type="translate" from="100 130" to="140 130" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </rect>

  <!-- Section 5: Example of Commission in Action -->
  <rect x="50%" y="320" width="200" height="50" fill="#fff" rx="10" data-narration="An example of commission in action is a salesperson who earns a 10% commission on each sale made.">
    <animateTransform attributeName="transform" type="translate" from="0 320" to="-50 320" dur="1s" begin="0s" repeatCount="indefinite"/>
    <rect x="100%" y="25" width="40" height="30" fill="#f1c40f" rx="5" data-narration="If the salesperson makes 10 sales in a month, their total commission would be 10% of $10,000, which is $1,000.">
      <animateTransform attributeName="transform" type="translate" from="100 25" to="140 25" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </rect>

  <!-- Section 6: Real-World Applications -->
  <rect x="50%" y="370" width="200" height="50" fill="#fff" rx="10" data-narration="Commission structures are commonly used in sales and marketing teams, real estate agents, and insurance agents.">
    <animateTransform attributeName="transform" type="translate" from="0 370" to="-50 370" dur="1s" begin="0s" repeatCount="indefinite"/>
    <rect x="80%" y="20" width="40" height="30" fill="#3498db" rx="5" data-narration="Sales and marketing teams">
      <animateTransform attributeName="transform" type="translate" from="80 20" to="120 20" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="80%" y="70" width="40" height="30" fill="#2ecc71" rx="5" data-narration="Real estate agents">
      <animateTransform attributeName="transform" type="translate" from="80 70" to="120 70" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="80%" y="120" width="40" height="30" fill="#e74c3c" rx="5" data-narration="Insurance agents">
      <animateTransform attributeName="transform" type="translate" from="80 120" to="120 120" dur="1s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </rect>

  <!-- Footer -->
  <text x="50%" y="400" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Commission 1">
    Commission 1
  </text>
</svg>