<svg width="420" height="400" data-topic-id="add-column-commission-with-domain-to-employee">
  <desc>Animated Educational SVG Diagram: Add a Column Commission with Domain to the Employee</desc>
  <title>Add a Column Commission with Domain to the Employee</title>
  <metadata>
    <title>Add a Column Commission with Domain to the Employee</title>
    <description>Add a column commission with domain to the employee table</description>
    <keywords>Add a column commission with domain to the employee table, commission, domain, employee table</keywords>
  </metadata>
  <g id="root">
    <rect x="10" y="10" width="400" height="390" fill="#C7B8EA"/>
    <rect x="20" y="20" width="360" height="360" fill="#ADD8E6"/>
    <rect x="100" y="50" width="220" height="100" fill="#6495ED"/>
    <rect x="30" y="170" width="350" height="120" fill="#C7B8EA"/>
    <rect x="40" y="290" width="330" height="110" fill="#ADD8E6"/>
    <rect x="220" y="50" width="180" height="100" fill="#FFC107"/>
    <g id="domain">
      <rect x="230" y="60" width="140" height="80" fill="#C7B8EA"/>
      <rect x="230" y="150" width="140" height="80" fill="#ADD8E6"/>
      <animateTransform attributeName="transform" type="rotate" from="0 230 70" to="360 230 70" dur="10s" repeatCount="indefinite"/>
    </g>
    <g id="commission">
      <rect x="230" y="60" width="140" height="80" fill="#6495ED"/>
      <rect x="230" y="150" width="140" height="80" fill="#C7B8EA"/>
      <animateTransform attributeName="transform" type="rotate" from="0 230 70" to="360 230 70" dur="10s" repeatCount="indefinite"/>
    </g>
    <g id="employee">
      <rect x="40" y="50" width="300" height="100" fill="#FFC107"/>
      <rect x="40" y="160" width="300" height="100" fill="#C7B8EA"/>
      <animateTransform attributeName="transform" type="rotate" from="0 40 50" to="360 40 50" dur="10s" repeatCount="indefinite"/>
    </g>
    <g id="title">
      <text x="20" y="20" font-size="24" font-family="Arial" fill="#2F4F7F">Add a Column Commission with Domain to the Employee</text>
    </g>
    <g id="footer">
      <text x="20" y="390" font-size="18" font-family="Arial" fill="#2F4F7F">Animated Educational SVG Diagram</text>
    </g>
    <g id="arrow">
      <path d="M 100, 50 L 220, 50" stroke="#2F4F7F" stroke-width="2" fill="none"/>
      <path d="M 40, 50 L 40, 160" stroke="#2F4F7F" stroke-width="2" fill="none"/>
      <path d="M 230, 60 L 230, 150" stroke="#2F4F7F" stroke-width="2" fill="none"/>
      <path d="M 230, 150 L 230, 60" stroke="#2F4F7F" stroke-width="2" fill="none"/>
    </g>
  </g>
</svg>