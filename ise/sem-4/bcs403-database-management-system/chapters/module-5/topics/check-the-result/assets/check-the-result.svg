<svg width="420" height="400" data-topic-id="check-the-result" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  
  <!-- Title Section -->
  <g transform="translate(40, 20)">
    <text x="0" y="0" text-anchor="middle" font-size="24" font-family="Arial" fill="#3498DB">
      Check the Result
    </text>
  </g>
  
  <!-- Section 1: What is Check the Result? -->
  <g transform="translate(10, 100)">
    <rect width="300" height="60" fill="#F9F9F9" rx="10" data-narration="What is Check the Result?">
      <animateTransform attributeName="transform" type="rotate" from="0 300 30" to="0 300 0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="15" y="25" text-anchor="middle" font-size="18" font-family="Arial" fill="#3498DB">
      Check the result is a crucial operation in a DBMS that involves verifying the accuracy of data stored in a database.
    </text>
  </g>
  
  <!-- Section 2: Types of Check the Result Operations -->
  <g transform="translate(10, 170)">
    <rect width="300" height="100" fill="#F9F9F9" rx="10" data-narration="Types of Check the Result Operations">
      <animateTransform attributeName="transform" type="rotate" from="0 300 30" to="0 300 0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <g>
      <path d="M 100 50 L 100 150" stroke="#3498DB" stroke-width="2" stroke-linecap="round" data-narration="Static Check the Result"/>
      <path d="M 100 50 L 100 150" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" data-narration="Dynamic Check the Result"/>
    </g>
    <text x="15" y="60" text-anchor="middle" font-size="18" font-family="Arial" fill="#3498DB">
      There are two main types of check the result operations: static and dynamic.
    </text>
  </g>
  
  <!-- Section 3: Check the Result Methods -->
  <g transform="translate(10, 230)">
    <rect width="300" height="100" fill="#F9F9F9" rx="10" data-narration="Check the Result Methods">
      <animateTransform attributeName="transform" type="rotate" from="0 300 30" to="0 300 0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <g>
      <path d="M 100 50 L 100 150" stroke="#3498DB" stroke-width="2" stroke-linecap="round" data-narration="Query Methods"/>
      <path d="M 100 50 L 100 150" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" data-narration="Transaction Methods"/>
    </g>
    <text x="15" y="60" text-anchor="middle" font-size="18" font-family="Arial" fill="#3498DB">
      There are two main types of check the result operations: query methods and transaction methods.
    </text>
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g transform="translate(10, 290)">
    <rect width="300" height="100" fill="#F9F9F9" rx="10" data-narration="Key Concepts">
      <animateTransform attributeName="transform" type="rotate" from="0 300 30" to="0 300 0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="15" y="25" text-anchor="middle" font-size="18" font-family="Arial" fill="#3498DB">
      Data integrity is the quality of being accurate and consistent.
    </text>
  </g>
  
  <!-- Footer Section -->
  <g transform="translate(10, 340)">
    <rect width="300" height="40" fill="#F9F9F9" rx="10" data-narration="Footer Section">
      <animateTransform attributeName="transform" type="rotate" from="0 300 30" to="0 300 0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="15" y="20" text-anchor="middle" font-size="18" font-family="Arial" fill="#3498DB">
      Learn more about checking the result in a DBMS.
    </text>
  </g>
</svg>