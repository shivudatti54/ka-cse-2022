<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="insert-null-values-to-the-employee-table-and-verify-the-result" viewBox="0 0 420 400" style="background-color: #C7E5F8;">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5F5F5"/>
      <stop offset="100%" stop-color="#E7F4F7"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" style="fill: url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family=" Arial, sans-serif" text-anchor="start" style="fill: #2E4053">
    Insert Null Values to the Employee Table and Verify the Result
  </text>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="50" width="380" height="150" style="fill: #FFFFFF; opacity: 0.9;"/>
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start" style="fill: #2E4053">
      In a database management system, null values are used to represent missing or unknown data.
    </text>
    <animate xlink:href="#icon-null-value" begin="0s" dur="3s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: What are Null Values? -->
  <section data-narration="What are Null Values?">
    <rect x="10" y="210" width="380" height="150" style="fill: #FFFFFF; opacity: 0.9;"/>
    <text x="20" y="230" font-size="18" font-family="Arial, sans-serif" text-anchor="start" style="fill: #2E4053">
      Null values are represented by a special symbol (NULL) in a database.
    </text>
    <animate xlink:href="#icon-null-value-1" begin="0s" dur="3s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Types of Null Values -->
  <section data-narration="Types of Null Values">
    <rect x="10" y="370" width="380" height="150" style="fill: #FFFFFF; opacity: 0.9;"/>
    <text x="20" y="390" font-size="18" font-family="Arial, sans-serif" text-anchor="start" style="fill: #2E4053">
      There are three types of null values: Not Null, Nullable, and Defined.
    </text>
    <animate xlink:href="#icon-null-value-2" begin="0s" dur="3s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: Inserting Null Values -->
  <section data-narration="Inserting Null Values">
    <rect x="10" y="130" width="380" height="150" style="fill: #FFFFFF; opacity: 0.9;"/>
    <text x="20" y="150" font-size="18" font-family="Arial, sans-serif" text-anchor="start" style="fill: #2E4053">
      To insert null values into the employee table, we can use the INSERT statement.
    </text>
    <code>INSERT INTO employee (name, age, salary)
VALUES ('John Doe', NULL, NULL);</code>
    <animate xlink:href="#icon-insert" begin="0.5s" dur="3s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: Using SET NULL Statement -->
  <section data-narration="Using SET NULL Statement">
    <rect x="10" y="290" width="380" height="150" style="fill: #FFFFFF; opacity: 0.9;"/>
    <text x="20" y="310" font-size="18" font-family="Arial, sans-serif" text-anchor="start" style="fill: #2E4053">
      Alternatively, we can use the SET NULL statement to insert null values.
    </text>
    <code>SET employee.name = NULL;
SET employee.age = NULL;
SET employee.salary = NULL;</code>
    <animate xlink:href="#icon-set-null" begin="0.5s" dur="3s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 6: Verifying the Result -->
  <section data-narration="Verifying the Result">
    <rect x="10" y="460" width="380" height="150" style="fill: #FFFFFF; opacity: 0.9;"/>
    <text x="20" y="480" font-size="18" font-family="Arial, sans-serif" text-anchor="start" style="fill: #2E4053">
      To verify the result, we can use the SELECT statement.
    </text>
    <code>SELECT * FROM employee;</code>
    <animate xlink:href="#icon-verify" begin="0.5s" dur="3s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer -->
  <text x="10" y="500" font-size="18" font-family="Arial, sans-serif" text-anchor="start" style="fill: #2E4053">
    Created by [Your Name]
  </text>
</svg>