<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="sal" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" />
      <stop offset="100%" stop-color="#C5E1A5" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel)" rx="10" />
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">
    SAL
  </text>
  <!-- Section 1: What is a Database Management System (DBMS)? -->
  <rect x="20" y="80" width="380" height="50" fill="#FFC5C5" rx="10" data-narration="What is a Database Management System (DBMS)?" />
  <animateTransform attributeName="transform" type="translate" from="0 80" to="0 100" dur="1000" begin="0s" />
  <text x="50%" y="90%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">
    A Database Management System (DBMS) is a software system that manages a database, providing features such as data definition, data manipulation, and data retrieval.
  </text>
  <!-- Section 2: SAL -->
  <rect x="20" y="140" width="380" height="50" fill="#ADD8E6" rx="10" data-narration="SAL" />
  <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" dur="1000" begin="1000s" />
  <text x="50%" y="150%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">
    SAL stands for System Analysis and Laboratory. It is a module that focuses on the practical application of database management concepts and techniques.
  </text>
  <!-- Section 3: Key Concepts -->
  <rect x="20" y="210" width="380" height="50" fill="#C5E1A5" rx="10" data-narration="Database, Data Model, Database Schema, Normalization" />
  <animateTransform attributeName="transform" type="translate" from="0 210" to="0 230" dur="1000" begin="2000s" />
  <text x="50%" y="220%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">
    Key Concepts:
    <tspan x="50%" y="240%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Database</tspan>
    <tspan x="50%" y="250%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Data Model</tspan>
    <tspan x="50%" y="260%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Database Schema</tspan>
    <tspan x="50%" y="270%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Normalization</tspan>
  </text>
  <!-- Section 4: Types of DBMS -->
  <rect x="20" y="280" width="380" height="50" fill="#FFC0CB" rx="10" data-narration="Relational DBMS, Object-Oriented DBMS, Graph DBMS" />
  <animateTransform attributeName="transform" type="translate" from="0 280" to="0 310" dur="1000" begin="3000s" />
  <text x="50%" y="290%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">
    Types of DBMS:
    <tspan x="50%" y="310%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Relational DBMS</tspan>
    <tspan x="50%" y="320%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Object-Oriented DBMS</tspan>
    <tspan x="50%" y="330%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Graph DBMS</tspan>
  </text>
  <!-- Section 5: DBMS Components -->
  <rect x="20" y="350" width="380" height="50" fill="#ADD8E6" rx="10" data-narration="User Interface, Data Subsystem" />
  <animateTransform attributeName="transform" type="translate" from="0 350" to="0 370" dur="1000" begin="4000s" />
  <text x="50%" y="360%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">
    DBMS Components:
    <tspan x="50%" y="380%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">User Interface</tspan>
    <tspan x="50%" y="390%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Data Subsystem</tspan>
  </text>
  <!-- Footer -->
  <rect x="0" y="400" width="420" height="20" fill="#2F4F7F" rx="10" />
  <text x="50%" y="410%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">
    Copyright 2023
  </text>
</svg>