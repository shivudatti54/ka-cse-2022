<svg width="420" height="400" data-topic-id="create-a-table-called-employee-that-contain-attr" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A9FF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="30" fill="#F7F7F7" rx="5" stroke="#333" stroke-width="2"/>
    <text x="15" y="15" font-size="18" font-family="Arial" text-anchor="start">Create a Table Called Employee That Contain Attr</text>
  </g>
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7" rx="5" stroke="#333" stroke-width="2"/>
    <text x="15" y="15" font-size="16" font-family="Arial" text-anchor="start">What is a Table?</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="0s"/>
  </g>
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7" rx="5" stroke="#333" stroke-width="2"/>
    <text x="15" y="15" font-size="16" font-family="Arial" text-anchor="start">Key Characteristics of a Table:</text>
    <text x="15" y="40" font-size="14" font-family="Arial" text-anchor="start">Rows: Represent individual records</text>
    <text x="15" y="60" font-size="14" font-family="Arial" text-anchor="start">Columns: Represent attributes of the data</text>
    <text x="15" y="80" font-size="14" font-family="Arial" text-anchor="start">Primary Key: A unique identifier for each record</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" begin="0s"/>
  </g>
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7" rx="5" stroke="#333" stroke-width="2"/>
    <text x="15" y="15" font-size="16" font-family="Arial" text-anchor="start">Employee Table Attributes:</text>
    <text x="15" y="40" font-size="14" font-family="Arial" text-anchor="start">EMPNO: Unique identifier for each employee</text>
    <text x="15" y="60" font-size="14" font-family="Arial" text-anchor="start">ENAME: Employee name</text>
    <text x="15" y="80" font-size="14" font-family="Arial" text-anchor="start">JTITLE: Job title</text>
    <text x="15" y="100" font-size="14" font-family="Arial" text-anchor="start">MGRNO: Manager's EMPNO (for hierarchical relationships)</text>
    <text x="15" y="120" font-size="14" font-family="Arial" text-anchor="start">DEPTNO: Department number</text>
    <text x="15" y="140" font-size="14" font-family="Arial" text-anchor="start">SALARY: Employee salary</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="2s" begin="0s"/>
  </g>
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="5" stroke="#333" stroke-width="2"/>
    <text x="15" y="15" font-size="16" font-family="Arial" text-anchor="start">Example Employee Table:</text>
    <text x="15" y="40" font-size="14" font-family="Arial" text-anchor="start">| EMPNO | ENAME       | JTITLE    | MGRNO | DEPTNO | SALARY |</text>
    <text x="15" y="70" font-size="14" font-family="Arial" text-anchor="start">| 101   | John Smith  | Manager   | 202   | 1      | 50000  |</text>
    <text x="15" y="100" font-size="14" font-family="Arial" text-anchor="start">| 102   | Jane Doe    | Sales Rep | 201   | 2      | 40000  |</text>
    <text x="15" y="130" font-size="14" font-family="Arial" text-anchor="start">| 103   | Bob Johnson | Engineer  | 202   | 1      | 60000  |</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,450" dur="2s" begin="0s"/>
  </g>
  <g transform="translate(10, 450)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="5" stroke="#333" stroke-width="2"/>
    <text x="15" y="15" font-size="16" font-family="Arial" text-anchor="start">SQL Syntax for Creating a Table:</text>
    <text x="15" y="40" font-size="14" font-family="Arial" text-anchor="start">CREATE TABLE Employee (<br/>EMPNO INT PRIMARY KEY,<br/>ENAME VARCHAR(20),<br/>JTITLE VARCHAR(20),<br/>MGRNO INT,<br/>DEPTNO INT,<br/>SALARY DECIMAL(10,2))</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,500" dur="2s" begin="0s"/>
  </g>
  <g transform="translate(10, 550)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="5" stroke="#333" stroke-width="2"/>
    <text x="15" y="15" font-size="16" font-family="Arial" text-anchor="start">Example Use Case:</text>
    <text x="15" y="40" font-size="14" font-family="Arial" text-anchor="start">INSERT INTO Employee (<br/>EMPNO,<br/>ENAME,<br/>JTITLE,<br/>MGRNO,<br/>DEPTNO,<br/>SALARY)<br/>VALUES (<br/>101,<br/>John Smith,<br/>Manager,<br/>202,<br/>1,<br/>50000)</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,600" dur="2s" begin="0s"/>
  </g>
</svg>