<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="mapping-conceptual-design-into-logical-design" data-slugified-topic-name="Mapping Conceptual Design into a Logical Design">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="20" rx="5" fill="#2f4f7f" />
  <text x="15" y="25" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="start">Mapping Conceptual Design into a Logical Design</text>
  
  <!-- Section 1: Introduction -->
  <section id="section1" data-narration="Introduction">
    <rect x="10" y="50" width="400" height="100" rx="5" fill="#e0e0e0" />
    <animateTransform attributeName="transform" type="translateY" from="-100" to="0" dur="2s" begin="0s" />
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Relational database design is crucial for DBMS development</text>
    <text x="15" y="150" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Involves mapping conceptual design to logical design</text>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-100" dur="2s" begin="0.5s" />
  </section>
  
  <!-- Section 2: ER-to-Relational Mapping -->
  <section id="section2" data-narration="ER-to-Relational Mapping">
    <rect x="10" y="50" width="400" height="100" rx="5" fill="#e0e0e0" />
    <animateTransform attributeName="transform" type="translateY" from="-100" to="0" dur="2s" begin="1s" />
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Transforms ERD to relational database design</text>
    <text x="15" y="150" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Using RDBMS</text>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-100" dur="2s" begin="1.5s" />
  </section>
  
  <!-- Section 3: Entities -->
  <section id="section3" data-narration="Entities">
    <rect x="10" y="50" width="400" height="100" rx="5" fill="#e0e0e0" />
    <animateTransform attributeName="transform" type="translateY" from="-100" to="0" dur="2s" begin="2s" />
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Entities are represented as tables</text>
    <text x="15" y="150" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">With attributes and relationships</text>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-100" dur="2s" begin="2.5s" />
  </section>
  
  <!-- Section 4: Relationships -->
  <section id="section4" data-narration="Relationships">
    <rect x="10" y="50" width="400" height="100" rx="5" fill="#e0e0e0" />
    <animateTransform attributeName="transform" type="translateY" from="-100" to="0" dur="2s" begin="3s" />
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Relationships define how entities are connected</text>
    <text x="15" y="150" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">One-to-one, one-to-many, and many-to-many</text>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-100" dur="2s" begin="3.5s" />
  </section>
  
  <!-- Section 5: Attribute -->
  <section id="section5" data-narration="Attribute">
    <rect x="10" y="50" width="400" height="100" rx="5" fill="#e0e0e0" />
    <animateTransform attributeName="transform" type="translateY" from="-100" to="0" dur="2s" begin="4s" />
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Attributes describe entities</text>
    <text x="15" y="150" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Characteristics of entities</text>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-100" dur="2s" begin="4.5s" />
  </section>
  
  <!-- Section 6: ER-to-Relational Mapping -->
  <section id="section6" data-narration="ER-to-Relational Mapping">
    <rect x="10" y="50" width="400" height="100" rx="5" fill="#e0e0e0" />
    <animateTransform attributeName="transform" type="translateY" from="-100" to="0" dur="2s" begin="5s" />
    <text x="15" y="75" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Transforms ERD to relational database design</text>
    <text x="15" y="150" font-size="16" font-family="Arial" fill="#666666" text-anchor="start">Using RDBMS</text>
    <animateTransform attributeName="transform" type="translateY" from="0" to="-100" dur="2s" begin="5.5s" />
  </section>
  
  <!-- Footer -->
  <rect x="10" y="350" width="400" height="50" rx="5" fill="#2f4f7f" />
  <text x="15" y="365" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="start">Mapping Conceptual Design into a Logical Design</text>
</svg>