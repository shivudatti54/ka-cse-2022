<svg width="420" height="400" data-topic-id="database-management-system-8-1-to-8-5">
  <style>
    body {
      background-image: linear-gradient(to bottom, #7A288A, #C5C3C8);
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5C3C8" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Database Management System Study Material</title>
  <g id="layer1" transform="translate(10, 10)">
    <rect width="400" height="350" fill="url(#gradient)" rx="10" />
    <text x="20" y="40" text-anchor="middle" font-size="24" fill="#000">
      <tspan>Database Management System Study Material</tspan>
    </text>
    <g id="layer2" transform="translate(20, 70)">
      <rect width="300" height="200" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" begin="0s" dur="2s" repeatCount="indefinite" />
      <rect x="10" y="10" width="50" height="50" fill="#2196F3" rx="10" />
      <text x="70" y="20" text-anchor="middle" font-size="18" fill="#000">
        <tspan>8.1 Introduction to DBMS</tspan>
        <tspan>Definition and Characteristics</tspan>
      </text>
      <text x="10" y="80" text-anchor="middle" font-size="14" fill="#000">
        <tspan>A Database Management System (DBMS) is a software application that allows users to define, create, maintain, and manipulate databases.</tspan>
        <tspan>A DBMS provides a way to manage data, supports data independence, data integrity, and data security.</tspan>
      </text>
    </g>
    <g id="layer3" transform="translate(20, 290)">
      <rect width="300" height="200" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" begin="2s" dur="2s" repeatCount="indefinite" />
      <rect x="10" y="10" width="50" height="50" fill="#FF9800" rx="10" />
      <text x="70" y="20" text-anchor="middle" font-size="18" fill="#000">
        <tspan>8.2 Database Design</tspan>
        <tspan>Phases of Database Design</tspan>
      </text>
      <text x="10" y="80" text-anchor="middle" font-size="14" fill="#000">
        <tspan>Database design refers to the process of creating a conceptual, logical, and physical model of a database.</tspan>
        <tspan>The phases of database design are Data Analysis, Data Definition, and Data Implementation.</tspan>
      </text>
      <text x="10" y="150" text-anchor="middle" font-size="14" fill="#000">
        <tspan>A university database may have the following tables:</tspan>
        <tspan>Students (Student_ID, Name, Age)</tspan>
        <tspan>Courses (Course_ID, Course_Name)</tspan>
        <tspan>Enrollments (Student_ID, Course_ID)</tspan>
      </text>
    </g>
    <g id="layer4" transform="translate(20, 380)">
      <rect width="300" height="200" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" begin="4s" dur="2s" repeatCount="indefinite" />
      <rect x="10" y="10" width="50" height="50" fill="#2196F3" rx="10" />
      <text x="70" y="20" text-anchor="middle" font-size="18" fill="#000">
        <tspan>8.3 Database Normalization</tspan>
        <tspan>Normalization Rules</tspan>
      </text>
      <text x="10" y="80" text-anchor="middle" font-size="14" fill="#000">
        <tspan>Database normalization is the process of organizing data in a database to minimize data redundancy and improve data integrity.</tspan>
        <tspan>The normalization rules are First Normal Form (1NF), Second Normal Form (2NF), and Third Normal Form (3NF).</tspan>
      </text>
      <text x="10" y="150" text-anchor="middle" font-size="14" fill="#000">
        <tspan>A table for customers with columns for customer ID, name, address, and phone number may be normalized into two tables:</tspan>
        <tspan>Customer</tspan>
        <tspan>Customer Addresses</tspan>
      </text>
    </g>
  </g>
  <g id="layer5">
    <rect width="400" height="40" fill="#000" rx="10" />
    <text x="20" y="10" text-anchor="middle" font-size="18" fill="#FFF">
      <tspan>Footer</tspan>
    </text>
  </g>
</svg>