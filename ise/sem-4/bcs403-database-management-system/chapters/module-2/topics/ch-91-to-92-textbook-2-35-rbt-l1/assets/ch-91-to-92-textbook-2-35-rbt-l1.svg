<svg width="420" height="400" data-topic-id="database-management-system-ch-91-to-92-textbook-2-35-rbt-l1" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a88ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" rx="10" fill="url(#gradient)"/>
  
  <!-- Title Section -->
  <g transform="translate(10, 20)">
    <text data-narration="What is a Database Management System (DBMS)?" x="0" y="0" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Database Management System (DBMS)</text>
  </g>
  
  <!-- Section 1: Key Characteristics -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="100%" height="40" rx="5" fill="#f7f7f7"/>
    <text data-narration="Data Independence" x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Data Independence</text>
    <text data-narration="Concurrent Access" x="10" y="30" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Concurrent Access</text>
    <text data-narration="Data Integrity" x="10" y="45" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Data Integrity</text>
    <text data-narration="Data Security" x="10" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Data Security</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: Types of DBMS -->
  <g transform="translate(10, 100)">
    <rect x="0" y="0" width="100%" height="80" rx="5" fill="#f7f7f7"/>
    <text data-narration="Relational DBMS (RDBMS)" x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Relational DBMS (RDBMS)</text>
    <text data-narration="Object-Oriented DBMS (OODB)" x="10" y="40" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Object-Oriented DBMS (OODB)</text>
    <text data-narration="Graph DBMS" x="10" y="65" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Graph DBMS</text>
    <text data-narration="Document-Oriented DBMS" x="10" y="90" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Document-Oriented DBMS</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Database Management System Components -->
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="100%" height="80" rx="5" fill="#f7f7f7"/>
    <text data-narration="Database" x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Database</text>
    <text data-narration="Database Management System (DBMS)" x="10" y="40" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Database Management System (DBMS)</text>
    <text data-narration="Database Engine" x="10" y="65" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Database Engine</text>
    <text data-narration="Database Interface" x="10" y="90" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Database Interface</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Benefits of DBMS -->
  <g transform="translate(10, 300)">
    <rect x="0" y="0" width="100%" height="80" rx="5" fill="#f7f7f7"/>
    <text data-narration="Improved Data Security" x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Improved Data Security</text>
    <text data-narration="Concurrent Access" x="10" y="40" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Concurrent Access</text>
    <text data-narration="Data Integrity" x="10" y="65" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Data Integrity</text>
    <text data-narration="Data Security" x="10" y="90" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Data Security</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 380)">
    <text x="10" y="390" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">Database Management System (DBMS)</text>
  </g>
</svg>