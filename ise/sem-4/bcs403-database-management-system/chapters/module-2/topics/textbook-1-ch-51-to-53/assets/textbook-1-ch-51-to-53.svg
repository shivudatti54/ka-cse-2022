<svg width="420" height="400" data-topic-id="textbook-1-ch-51-to-53" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.8" />
  
  <!-- Title section -->
  <g transform="translate(10, 20)">
    <text data-narration="Introduction to Database Management System" x="0" y="30" font-size="24" font-family="Arial" font-weight="bold">Textbook 1, Ch 5.1 to 5.3</text>
  </g>
  
  <!-- 5.1: Database Management System (DBMS) Components section -->
  <g transform="translate(10, 60)">
    <rect width="400" height="100" fill="#F7F7F7" />
    <g transform="translate(10, 50)">
      <text data-narration="Definition: A DBMS is composed of several components that work together to provide a comprehensive database system." x="0" y="20" font-size="18" font-family="Arial">Definition:</text>
      <text data-narration="Components: Data, Control, User Interface, and Database Engine." x="0" y="60" font-size="18" font-family="Arial">Components:</text>
      <rect x="10" y="80" width="380" height="50" fill="#F7F7F7" stroke="#000" stroke-width="2" rx="10" />
      <g transform="translate(15, 90)">
        <circle cx="50" cy="50" r="20" fill="#F7F7F7" />
        <text data-narration="Data: The collection of information stored in the database." x="25" y="60" font-size="16" font-family="Arial">Data:</text>
        <text data-narration="Control: The mechanisms used to manage and modify the data." x="25" y="80" font-size="16" font-family="Arial">Control:</text>
        <text data-narration="User Interface: The tools and languages used to interact with the database." x="25" y="100" font-size="16" font-family="Arial">User Interface:</text>
        <text data-narration="Database Engine: The software that manages the data and provides access to it." x="25" y="120" font-size="16" font-family="Arial">Database Engine:</text>
      </g>
    </g>
    
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,80" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- 5.2: Types of Databases section -->
  <g transform="translate(10, 170)">
    <rect width="400" height="100" fill="#F7F7F7" />
    <g transform="translate(10, 160)">
      <text data-narration="Definition: Databases can be classified based on their structure, data types, and applications." x="0" y="20" font-size="18" font-family="Arial">Definition:</text>
      <text data-narration="Types of Databases: Relational, Object-Oriented, and Graph Databases." x="0" y="60" font-size="18" font-family="Arial">Types of Databases:</text>
      <rect x="10" y="80" width="380" height="50" fill="#F7F7F7" stroke="#000" stroke-width="2" rx="10" />
      <g transform="translate(15, 90)">
        <circle cx="50" cy="50" r="20" fill="#F7F7F7" />
        <text data-narration="Relational Database: Stores data in tables with well-defined relationships between them." x="25" y="60" font-size="16" font-family="Arial">Relational Database:</text>
        <text data-narration="Object-Oriented Database: Stores data as objects that have attributes and methods." x="25" y="80" font-size="16" font-family="Arial">Object-Oriented Database:</text>
        <text data-narration="Graph Database: Stores data as nodes and edges that represent relationships." x="25" y="100" font-size="16" font-family="Arial">Graph Database:</text>
      </g>
    </g>
    
    <animateTransform attributeName="transform" type="translate" from="0,160" to="0,180" begin="1s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- 5.3: Database Management System Tools section -->
  <g transform="translate(10, 230)">
    <rect width="400" height="100" fill="#F7F7F7" />
    <g transform="translate(10, 220)">
      <text data-narration="Definition: DBMS tools are used to manage and manipulate databases." x="0" y="20" font-size="18" font-family="Arial">Definition:</text>
      <text data-narration="Tools: Data Modeling, Data Normalization, and Data Validation." x="0" y="60" font-size="18" font-family="Arial">Tools:</text>
      <rect x="10" y="80" width="380" height="50" fill="#F7F7F7" stroke="#000" stroke-width="2" rx="10" />
      <g transform="translate(15, 90)">
        <circle cx="50" cy="50" r="20" fill="#F7F7F7" />
        <text data-narration="Data Modeling: The process of designing and analyzing the structure of a database." x="25" y="60" font-size="16" font-family="Arial">Data Modeling:</text>
        <text data-narration="Data Normalization: The process of organizing the data in a database to minimize data redundancy." x="25" y="80" font-size="16" font-family="Arial">Data Normalization:</text>
        <text data-narration="Data Validation: The process of checking the data in a database for errors and inconsistencies." x="25" y="100" font-size="16" font-family="Arial">Data Validation:</text>
      </g>
    </g>
    
    <animateTransform attributeName="transform" type="translate" from="0,220" to="0,240" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Footer section -->
  <g transform="translate(10, 330)">
    <rect width="400" height="30" fill="#F7F7F7" />
    <text x="0" y="10" font-size="18" font-family="Arial">Textbook 1, Ch 5.1 to 5.3</text>
  </g>
</svg>