        <rect x="0" y="40" width="100%" height="20" fill="#F5F5F5" rx="5"/>
        <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(10, 370)">
        <text x="10" y="10" font-size="18" font-family="Arial" font-weight="bold" fill="#3498db" text-anchor="start">Action Triggers</text>
        <rect x="0" y="40" width="100%" height="20" fill="#F5F5F5" rx="5"/>
        <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" begin="4s" dur="2s" repeatCount="indefinite"/>
