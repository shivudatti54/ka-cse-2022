<svg width="420" height="400" data-topic-id="specifying-constraints-as-assertions-and-action-triggers" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
