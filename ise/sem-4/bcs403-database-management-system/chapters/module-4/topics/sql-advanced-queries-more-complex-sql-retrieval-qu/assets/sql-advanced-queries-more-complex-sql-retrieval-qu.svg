<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect fill="#c7d2f5" width="420" height="400" rx="10"/>
  <g transform="translate(20, 20)">
    <defs>
      <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#aad9f2"/>
        <stop offset="50%" stop-color="#66CCCC"/>
        <stop offset="100%" stop-color="#33CCCC"/>
      </linearGradient>
      <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FFC107"/>
        <stop offset="50%" stop-color="#FF9800"/>
        <stop offset="100%" stop-color="#FF0000"/>
      </linearGradient>
    </defs>
    <rect fill="url(#grad1)" width="380" height="360" rx="10"/>
  </g>
  <text x="10" y="10" font-size="18" fill="#000" text-anchor="start">SQL Advanced Queries</text>
  <g transform="translate(0, 40)">
    <rect fill="#c7d2f5" width="380" height="60" rx="10"/>
    <text x="10" y="20" font-size="16" fill="#000" text-anchor="start">Data-Topic-Id: sql-advanced-queries-more-complex-sql-retrieval-queries</text>
  </g>
  <g transform="translate(0, 120)">
    <rect fill="#c7d2f5" width="380" height="160" rx="10"/>
    <text x="10" y="20" font-size="16" fill="#000" text-anchor="start">Subqueries</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 120" to="360 190 120" dur="4s" repeatCount="indefinite"/>
    <g>
      <rect fill="#fff" width="50" height="50" rx="10" transform="rotate(0 190 120)"/>
      <text x="10" y="10" font-size="14" fill="#000" text-anchor="start">Single-Row Subquery</text>
      <text x="10" y="70" font-size="14" fill="#000" text-anchor="start">Example:</text>
      <text x="10" y="120" font-size="14" fill="#000" text-anchor="start">SELECT \* FROM customers WHERE country IN (SELECT country FROM orders);</text>
    </g>
    <g>
      <rect fill="#fff" width="50" height="50" rx="10" transform="rotate(90 190 120)"/>
      <text x="10" y="10" font-size="14" fill="#000" text-anchor="start">Multi-Row Subquery</text>
      <text x="10" y="70" font-size="14" fill="#000" text-anchor="start">Example:</text>
      <text x="10" y="120" font-size="14" fill="#000" text-anchor="start">SELECT \* FROM customers WHERE country IN (SELECT country FROM orders);</text>
    </g>
  </g>
  <g transform="translate(0, 300)">
    <rect fill="#c7d2f5" width="380" height="60" rx="10"/>
    <text x="10" y="20" font-size="16" fill="#000" text-anchor="start">Joining Tables</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 240" to="360 190 240" dur="4s" repeatCount="indefinite"/>
    <g>
      <rect fill="#fff" width="50" height="50" rx="10" transform="rotate(0 190 240)"/>
      <text x="10" y="10" font-size="14" fill="#000" text-anchor="start">Inner Join</text>
      <text x="10" y="70" font-size="14" fill="#000" text-anchor="start">Example:</text>
      <text x="10" y="120" font-size="14" fill="#000" text-anchor="start">SELECT \* FROM customers INNER JOIN orders ON customers.customer_id = orders.customer_id;</text>
    </g>
    <g>
      <rect fill="#fff" width="50" height="50" rx="10" transform="rotate(90 190 240)"/>
      <text x="10" y="10" font-size="14" fill="#000" text-anchor="start">Left Join</text>
      <text x="10" y="70" font-size="14" fill="#000" text-anchor="start">Example:</text>
      <text x="10" y="120" font-size="14" fill="#000" text-anchor="start">SELECT \* FROM customers LEFT JOIN orders ON customers.customer_id = orders.customer_id;</text>
    </g>
  </g>
  <g transform="translate(0, 380)">
    <rect fill="#c7d2f5" width="380" height="60" rx="10"/>
    <text x="10" y="20" font-size="16" fill="#000" text-anchor="start">Correlated Subqueries</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 300" to="360 190 300" dur="4s" repeatCount="indefinite"/>
    <g>
      <rect fill="#fff" width="50" height="50" rx="10" transform="rotate(0 190 300)"/>
      <text x="10" y="10" font-size="14" fill="#000" text-anchor="start">Correlated Subquery</text>
      <text x="10" y="70" font-size="14" fill="#000" text-anchor="start">Example:</text>
      <text x="10" y="120" font-size="14" fill="#000" text-anchor="start">SELECT \* FROM customers WHERE customer_id IN (SELECT customer_id FROM orders WHERE total_amount > 100);</text>
    </g>
  </g>
  <g transform="translate(0, 460)">
    <rect fill="#c7d2f5" width="380" height="20" rx="10"/>
    <text x="10" y="5" font-size="16" fill="#000" text-anchor="start">Arrow Markers for Connections</text>
    <line x1="190" y1="120" x2="190" y2="240" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(0, 480)">
    <rect fill="#c7d2f5" width="380" height="40" rx="10"/>
    <text x="10" y="20" font-size="16" fill="#000" text-anchor="start">Footer</text>
    <line x1="190" y1="300" x2="190" y2="320" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>