        <rect fill="none" stroke="#666666" stroke-width="1" x="30" y="60" width="10" height="10" rx="5" />
        <rect fill="none" stroke="#666666" stroke-width="1" x="55" y="60" width="10" height="10" rx="5" />
        <rect fill="none" stroke="#666666" stroke-width="1" x="55" y="70" width="10" height="10" rx="5" />
        <rect fill="none" stroke="#666666" stroke-width="1" x="30" y="70" width="10" height="10" rx="5" />
