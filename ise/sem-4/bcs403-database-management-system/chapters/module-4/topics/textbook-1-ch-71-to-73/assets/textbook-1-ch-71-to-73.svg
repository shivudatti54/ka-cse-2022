<svg width="420" height="400" data-topic-id="textbook-1-ch-71-to-73" data-slugified-topic-name="database-management-system-module-8-hours-topic-71-to-73">
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
            <stop offset="100%" stop-color="#3498db" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect fill="url(#gradient)" width="100%" height="100%" rx="10" />
    
    <!-- Introduction Section -->
    <section data-narration="Introduction" data-x="50%" data-y="80%" data-width="80%" data-height="20%">
        <g transform="translate(50%, 80%)">
            <text fill="#3498db" font-size="20" font-family="Arial, sans-serif">Database Management System</text>
            <text fill="#666666" font-size="14" font-family="Arial, sans-serif">A software that helps in managing and organizing data in a database.</text>
        </g>
    </section>
    
    <!-- Data Types Section -->
    <section data-narration="Data Types" data-x="50%" data-y="60%" data-width="80%" data-height="20%">
        <g transform="translate(50%, 60%)">
            <rect fill="#FFFFFF" width="100%" height="10" rx="5" />
            <text fill="#666666" font-size="14" font-family="Arial, sans-serif">Data Types:</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">Integer: whole numbers, decimal numbers</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">Character: alphabets, special characters</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">Date: date of birth, date of hire</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">Time: time of birth, time of hire</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">Boolean: true or false values</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">String: a sequence of characters</text>
        </g>
    </section>
    
    <!-- Database Normalization Section -->
    <section data-narration="Database Normalization" data-x="50%" data-y="40%" data-width="80%" data-height="20%">
        <g transform="translate(50%, 40%)">
            <rect fill="#FFFFFF" width="100%" height="10" rx="5" />
            <text fill="#666666" font-size="14" font-family="Arial, sans-serif">Database Normalization:</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">First Normal Form (1NF): each table cell must contain a single value</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">Second Normal Form (2NF): each non-key attribute must depend on the entire primary key</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">Third Normal Form (3NF): if a table is in 2NF, and a non-key attribute depends on another non-key attribute, then it should be moved to a separate table</text>
        </g>
    </section>
    
    <!-- Orders Table Section -->
    <section data-narration="Orders Table" data-x="50%" data-y="20%" data-width="80%" data-height="20%">
        <g transform="translate(50%, 20%)">
            <rect fill="#FFFFFF" width="100%" height="10" rx="5" />
            <text fill="#666666" font-size="14" font-family="Arial, sans-serif">Orders Table:</text>
            <text fill="#3498db" font-size="16" font-family="Arial, sans-serif">Order ID, Customer ID, Order Date, Product</text>
        </g>
    </section>
    
    <!-- Footer Section -->
    <tfoot>
        <rect fill="#FFFFFF" width="100%" height="10" rx="5" />
        <text fill="#666666" font-size="14" font-family="Arial, sans-serif">Database Management System Module 8 Hours Topic 71 to 73</text>
    </tfoot>
    
    <!-- Arrow Markers -->
    <symbol id="arrow-marker">
        <path d="M 0,0 L 10,0 L 5,10 Z" fill="#3498db" />
    </symbol>
    
    <!-- Connections -->
    <g>
        <path fill="none" stroke="#666666" stroke-width="1" d="M 50,80 L 60,80" />
        <path fill="none" stroke="#666666" stroke-width="1" d="M 50,60 L 55,60" />
        <path fill="none" stroke="#666666" stroke-width="1" d="M 60,40 L 65,40" />
        <path fill="none" stroke="#666666" stroke-width="1" d="M 55,20 L 50,20" />
