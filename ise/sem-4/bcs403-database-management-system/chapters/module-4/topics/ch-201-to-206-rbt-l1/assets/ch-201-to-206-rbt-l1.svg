<svg width="420" height="400" data-topic-id="ch-201-to-206-rbt-l1">
    <desc>Database Management System (DBMS) Study Material - Ch 20.1 to 20.6 RBT: L1</desc>
    <title>Database Management System (DBMS) Study Material - Ch 20.1 to 20.6 RBT: L1</title>
    <style>
        /* Gradient background with pastel colors */
        .background {
            fill: #ADD8E6;
            stroke: #444;
            stroke-width: 1;
            mask: url(#mask);
        }
        
        /* Mask for gradient background */
        .mask {
            mask-type: radial;
            mask-origin: center;
            mask-size: 100%;
            mask-composite: source-out;
            mask-radius: 0px;
            fill: rgba(0,0,0,0);
        }
        
        /* Colors for the diagram */
        .indigo {
            fill: #4B0082;
        }
        
        .teal {
            fill: #0097A7;
        }
        
        .orange {
            fill: #FF9900;
        }
    </style>
    <defs>
        <mask id="mask">
            <circle cx="100%" cy="100%" r="100%" fill="white" />
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
                <stop offset="100%" stop-color="#E6DAC3" stop-opacity="1" />
            </linearGradient>
            <rect x="0%" y="0%" width="100%" height="100%" fill="url(#gradient)" />
        </mask>
    </defs>
    <g data-narration="Introduction to DBMS">
        <rect x="10" y="10" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <rect x="10" y="90" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <g transform="translate(20, 10)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Definition:</text>
        </g>
        <g transform="translate(20, 90)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Characteristics of a DBMS:</text>
        </g>
    </g>
    <g data-narration="Types of DBMS">
        <rect x="10" y="10" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <rect x="10" y="90" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <g transform="translate(20, 10)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Relational DBMS (RDBMS)</text>
        </g>
        <g transform="translate(20, 90)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Object-Oriented DBMS (OODBMS)</text>
        </g>
    </g>
    <g data-narration="Normalization of Database">
        <rect x="10" y="10" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <rect x="10" y="90" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <g transform="translate(20, 10)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">First Normal Form (1NF)</text>
        </g>
        <g transform="translate(20, 90)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Second Normal Form (2NF)</text>
        </g>
    </g>
    <g data-narration="Normalization Rules">
        <rect x="10" y="10" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <rect x="10" y="90" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <g transform="translate(20, 10)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Each cell in a table should contain a single value</text>
        </g>
        <g transform="translate(20, 90)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Each row should contain a unique combination of values</text>
        </g>
    </g>
    <g data-narration="Normalization Example">
        <rect x="10" y="10" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <rect x="10" y="90" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <g transform="translate(20, 10)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Example:</text>
        </g>
        <g transform="translate(20, 90)">
            <rect x="20" y="20" width="100" height="20" style="fill: #ADD8E6; stroke: #444; stroke-width: 1;" class="indigo" />
            <rect x="140" y="20" width="100" height="20" style="fill: #ADD8E6; stroke: #444; stroke-width: 1;" class="indigo" />
            <rect x="20" y="50" width="100" height="20" style="fill: #ADD8E6; stroke: #444; stroke-width: 1;" class="teal" />
            <rect x="140" y="50" width="100" height="20" style="fill: #ADD8E6; stroke: #444; stroke-width: 1;" class="teal" />
        </g>
    </g>
    <g data-narration="Features of RDBMS">
        <rect x="10" y="10" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <rect x="10" y="90" width="400" height="80" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <g transform="translate(20, 10)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Supports multiple users</text>
        </g>
        <g transform="translate(20, 90)">
            <text x="50%" y="50%" font-size="24" font-weight="bold">Supports transactions</text>
        </g>
    </g>
    <g data-narration="Footer">
        <rect x="10" y="10" width="400" height="30" style="fill: #fff; stroke: #444; stroke-width: 1;" class="background" />
        <g transform="translate(20, 10)">
            <text x="50%" y="50%" font-size="18" font-weight="normal">Database Management System (DBMS) Study Material - Ch 20.1 to 20.6 RBT: L1</text>
        </g>
    </g>
</svg>