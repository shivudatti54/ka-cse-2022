<svg width="420" height="400" data-topic-id="views-in-sql" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#grad)" width="100%" height="100%"/>
  
  <!-- Title Section -->
  <g transform="translate(50, 50)">
    <text x="0" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      Views in SQL
    </text>
  </g>
  
  <!-- Introduction Section -->
  <g transform="translate(50, 80)">
    <rect width="300" height="40" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Introduction
    </text>
    <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F" data-narration>
      Views in SQL are virtual tables that are based on the result of a SQL query.
    </text>
  </g>
  
  <!-- Types of Views Section -->
  <g transform="translate(50, 120)">
    <rect width="300" height="40" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Types of Views
    </text>
    <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F" data-narration>
      There are three types of views: simple, complex, and derived.
    </text>
    <rect x="150" y="30" width="100" height="30" fill="#8BC34A" rx="5"/>
    <text x="160" y="40" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Simple View
    </text>
    <rect x="360" y="30" width="100" height="30" fill="#8BC34A" rx="5"/>
    <text x="370" y="40" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Complex View
    </text>
    <rect x="150" y="70" width="100" height="30" fill="#8BC34A" rx="5"/>
    <text x="160" y="80" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Derived View
    </text>
  </g>
  
  <!-- Creating a View Section -->
  <g transform="translate(50, 200)">
    <rect width="300" height="40" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Creating a View
    </text>
    <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F" data-narration>
      A view can be created using the CREATE VIEW statement.
    </text>
    <rect x="150" y="30" width="100" height="30" fill="#8BC34A" rx="5"/>
    <text x="160" y="40" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      CREATE VIEW view_name AS
      SELECT column1, column2, ...
      FROM table_name;
    </text>
  </g>
  
  <!-- Dropping a View Section -->
  <g transform="translate(50, 280)">
    <rect width="300" height="40" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Dropping a View
    </text>
    <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F" data-narration>
      A view can be dropped using the DROP VIEW statement.
    </text>
    <rect x="150" y="30" width="100" height="30" fill="#8BC34A" rx="5"/>
    <text x="160" y="40" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      DROP VIEW view_name;
    </text>
  </g>
  
  <!-- Using Views Section -->
  <g transform="translate(50, 360)">
    <rect width="300" height="40" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Using Views
    </text>
    <text x="10" y="30" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F" data-narration>
      Views can be used to query data, restrict access, and improve performance.
    </text>
  </g>
  
  <!-- Footer Section -->
  <g transform="translate(50, 420)">
    <rect width="300" height="40" fill="#F7F7F7" rx="10"/>
    <text x="10" y="10" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">
      Copyright 2023
    </text>
  </g>
</svg>