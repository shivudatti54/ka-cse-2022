<svg width="420" height="400" data-topic-id="conceptual-data-modelling-using-entities-and-relationships" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <style>
    .section {
      background-color: #C7D2F1;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #ADD8E6;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      color: #3498db;
      margin-bottom: 10px;
    }

    .footer {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-top: 20px;
    }

    .arrow {
      fill: #3498db;
      stroke: #3498db;
      stroke-width: 2;
      shape-rendering: crispEdges;
    }

    .animate {
      animation: animate 2s forwards;
    }

    @keyframes animate {
      0% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(20px);
      }
      100% {
        transform: translateX(0);
      }
    }
  </style>

  <!-- Top title -->
  <g transform="translate(10, 10)">
    <text class="title" data-narration="Conceptual Data Modelling using Entities and Relationships" x="50%" y="70%" dominant-baseline="hanging">Conceptual Data Modelling</text>
  </g>

  <!-- Section 1: Entity Types -->
  <g transform="translate(10, 60)">
    <rect class="section" x="0" y="0" width="400" height="150" rx="10"/>
    <text class="section-title" data-narration="Entity Types" x="50%" y="20%" dominant-baseline="hanging">Entity Types</text>
    <text class="section-narration" data-narration="An entity type is a concept in the real world that has a distinct identity and can be described by a set of attributes.">
      <tspan x="50%" y="50%" font-size="16px">Entity Types</tspan>
      <tspan x="50%" y="70%" font-size="16px">Example: Person, Product, Customer, etc.</tspan>
    </text>
  </g>

  <!-- Section 2: Entity Sets -->
  <g transform="translate(10, 220)">
    <rect class="section" x="0" y="0" width="400" height="150" rx="10"/>
    <text class="section-title" data-narration="Entity Sets" x="50%" y="20%" dominant-baseline="hanging">Entity Sets</text>
    <text class="section-narration" data-narration="An entity set is a collection of entity types that are related to each other.">
      <tspan x="50%" y="50%" font-size="16px">Example: Customer entity set that includes customers, orders, and invoices.</tspan>
      <tspan x="50%" y="70%" font-size="16px">Characteristics: Collection of related entity types, can be described by a set of attributes, can have multiple relationships.</tspan>
    </text>
  </g>

  <!-- Section 3: Structural Constraints -->
  <g transform="translate(10, 380)">
    <rect class="section" x="0" y="0" width="400" height="150" rx="10"/>
    <text class="section-title" data-narration="Structural Constraints" x="50%" y="20%" dominant-baseline="hanging">Structural Constraints</text>
    <text class="section-narration" data-narration="Structural constraints are rules that govern the relationships between entity types. They ensure data consistency and integrity.">
      <tspan x="50%" y="50%" font-size="16px">Example: One-to-one relationship between a customer and an order.</tspan>
      <tspan x="50%" y="70%" font-size="16px">Characteristics: Governs the relationships between entity types, ensures data consistency and integrity, can be used to enforce relationships.</tspan>
    </text>
  </g>

  <!-- Section 4: Weak Entity Types -->
  <g transform="translate(10, 150)">
    <rect class="section" x="0" y="0" width="400" height="150" rx="10"/>
    <text class="section-title" data-narration="Weak Entity Types" x="50%" y="20%" dominant-baseline="hanging">Weak Entity Types</text>
    <text class="section-narration" data-narration="A weak entity type is an entity type that cannot exist independently. It relies on another entity type to exist.">
      <tspan x="50%" y="50%" font-size="16px">Example: Order, which relies on a Customer entity type to exist.</tspan>
      <tspan x="50%" y="70%" font-size="16px">Characteristics: Cannot exist independently, relies on another entity type to exist.</tspan>
    </text>
  </g>

  <!-- Connections -->
  <path class="arrow" data-narration="Entity Types to Entity Sets" x="100" y="150" d="M 100,150 L 200,150"}},
  <path class="arrow" data-narration="Entity Sets to Structural Constraints" x="100" y="220" d="M 100,220 L 200,220"}},
  <path class="arrow" data-narration="Structural Constraints to Weak Entity Types" x="150" y="150" d="M 150,150 L 250,150"}},
  <path class="arrow" data-narration="Weak Entity Types to Entity Sets" x="150" y="220" d="M 150,220 L 250,220"}},
  <path class="arrow" data-narration="Entity Sets to Entity Types" x="100" y="80" d="M 100,80 L 200,80"}},
  <path class="arrow" data-narration="Structural Constraints to Entity Sets" x="100" y="160" d="M 100,160 L 200,160"}},
  <path class="arrow" data-narration="Weak Entity Types to Structural Constraints" x="150" y="80" d="M 150,80 L 250,80"}},
  <path class="arrow" data-narration="Entity Sets to Structural Constraints" x="150" y="160" d="M 150,160 L 250,160"}}>

  <!-- Footer -->
  <g transform="translate(10, 420)">
    <text class="footer" data-narration="By: [Your Name]">By: [Your Name]</text>
  </g>
</svg>