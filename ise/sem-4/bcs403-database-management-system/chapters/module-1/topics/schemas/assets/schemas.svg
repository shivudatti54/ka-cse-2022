<svg width="420" height="400" data-topic-id="schemas" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#5BC0DE" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" style="opacity: 0.5" />
  
  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3498DB" data-narration="Title">
    Schemas
  </text>
  
  <!-- Section 1: Definition -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Definition">
      A schema is a representation of the structure of a database.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 2: Types of Schemas -->
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Types of Schemas">
      There are several types of schemas, including:
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 3: Physical Schema -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Physical Schema">
      This type of schema describes the actual storage structure of the database.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 4: Logical Schema -->
  <g transform="translate(50, 370)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Logical Schema">
      This type of schema describes the conceptual structure of the database.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 5: Normalized Schema -->
  <g transform="translate(50, 410)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Normalized Schema">
      This type of schema is designed to minimize data redundancy and dependence on individual tables.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 6: Components of a Schema -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Components of a Schema">
      A schema typically consists of the following components:
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 7: Tables -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Tables">
      These are the basic building blocks of a database.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 8: Rows -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Rows">
      Each row represents a single record or entry in a table.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 9: Columns -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Columns">
      Each column represents a field or attribute of a table.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 10: Primary Keys -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Primary Keys">
      These are unique identifiers for each row in a table.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 11: Foreign Keys -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Foreign Keys">
      These are columns in one table that reference the primary key of another table.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Section 12: Relationships -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="300" height="100" fill="#F9F9F9" rx="10" />
    <text x="10" y="20" text-anchor="start" font-size="16" font-family="Arial, sans-serif" fill="#333" data-narration="Relationships">
      These define the connections between tables and rows.
    </text>
    <animate attributeName="opacity" begin="1s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </g>
  
  <!-- Arrow markers for connections -->
  <path d="M 50 500 L 70 500" stroke="#3498DB" stroke-width="2" fill="none" />
  <path d="M 50 500 L 30 500" stroke="#3498DB" stroke-width="2" fill="none" />
  <path d="M 70 500 L 90 500" stroke="#3498DB" stroke-width="2" fill="none" />
  <path d="M 30 500 L 10 500" stroke="#3498DB" stroke-width="2" fill="none" />
  <path d="M 70 500 L 90 500" stroke="#3498DB" stroke-width="2" fill="none" />
  <path d="M 50 500 L 70 500" stroke="#3498DB" stroke-width="2" fill="none" />
  
  <!-- Footer -->
  <text x="50%" y="380" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">
    Created by [Your Name]
  </text>
</svg>