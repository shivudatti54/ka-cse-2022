<svg width="420" height="400" data-topic-id="database-management-system-topic">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Database Management System (DBMS)</title>
  <rect x="10" y="10" width="400" height="50" style="fill:linear-gradient(to bottom, #6495ED 0%, #B2FFFC 50%, #C7B8EA 100%);"/>
  <rect x="10" y="70" width="400" height="50" style="fill:linear-gradient(to bottom, #6495ED 0%, #B2FFFC 50%, #C7B8EA 100%);"/>
  <g id="dbms-types">
    <rect x="10" y="130" width="100" height="40" style="fill:#E6DAC3;"/>
    <text x="30" y="140" font-size="16" font-family="Arial, sans-serif" font-weight="bold">Relational DBMS (RDBMS)</text>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" begin="0s" dur="2s"/>
    <line x1="120" y1="150" x2="220" y2="250" stroke="#6495ED" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="140" y="180" font-size="14" font-family="Arial, sans-serif">Examples: MySQL, PostgreSQL, Microsoft SQL Server.</text>
  </g>
  <g id="no-sql-dbms">
    <rect x="10" y="210" width="100" height="40" style="fill:#E6DAC3;"/>
    <text x="30" y="220" font-size="16" font-family="Arial, sans-serif" font-weight="bold">NoSQL DBMS</text>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="0 240" begin="2s" dur="2s"/>
    <line x1="120" y1="230" x2="220" y2="340" stroke="#6495ED" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="140" y="260" font-size="14" font-family="Arial, sans-serif">Examples: MongoDB, Cassandra, Redis.</text>
  </g>
  <g id="object-oriented-dbms">
    <rect x="10" y="270" width="100" height="40" style="fill:#E6DAC3;"/>
    <text x="30" y="280" font-size="16" font-family="Arial, sans-serif" font-weight="bold">Object-Oriented DBMS (OODB)</text>
    <animateTransform attributeName="transform" type="translate" from="0 280" to="0 310" begin="4s" dur="2s"/>
    <line x1="120" y1="290" x2="220" y2="400" stroke="#6495ED" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="140" y="320" font-size="14" font-family="Arial, sans-serif">Examples: Oracle, Informix.</text>
  </g>
  <g id="time-series-dbms">
    <rect x="10" y="360" width="100" height="40" style="fill:#E6DAC3;"/>
    <text x="30" y="370" font-size="16" font-family="Arial, sans-serif" font-weight="bold">Time-Series DBMS</text>
    <animateTransform attributeName="transform" type="translate" from="0 370" to="0 390" begin="6s" dur="2s"/>
    <line x1="120" y1="380" x2="220" y2="490" stroke="#6495ED" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="140" y="410" font-size="14" font-family="Arial, sans-serif">Examples: InfluxDB, OpenTSDB.</text>
  </g>
  <g id="dbms-key-features">
    <rect x="10" y="460" width="100" height="40" style="fill:#E6DAC3;"/>
    <text x="30" y="470" font-size="16" font-family="Arial, sans-serif" font-weight="bold">Key Features of DBMS</text>
    <animateTransform attributeName="transform" type="translate" from="0 470" to="0 490" begin="8s" dur="2s"/>
    <line x1="120" y1="480" x2="220" y2="590" stroke="#6495ED" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="140" y="510" font-size="14" font-family="Arial, sans-serif">Data Control, Data Security, Data Integrity, Data Backup and Recovery, Data Sharing.</text>
  </g>
  <g id="database-concepts">
    <rect x="10" y="570" width="100" height="40" style="fill:#E6DAC3;"/>
    <text x="30" y="580" font-size="16" font-family="Arial, sans-serif" font-weight="bold">Database Concepts</text>
    <animateTransform attributeName="transform" type="translate" from="0 580" to="0 610" begin="10s" dur="2s"/>
    <line x1="120" y1="590" x2="220" y2="700" stroke="#6495ED" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="140" y="630" font-size="14" font-family="Arial, sans-serif">Database Schema, Database Normalization, Database Denormalization, Database Indexing.</text>
  </g>
  <footer>
    <rect x="10" y="390" width="400" height="20" style="fill:#6495ED;"/>
    <text x="15" y="400" font-size="14" font-family="Arial, sans-serif">Database Management System (DBMS)</text>
  </footer>
</svg>