<svg width="420" height="400" data-topic-id="rbt-l1-3-1-to-3-10">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="20" fill="none" stroke="#2196F3" stroke-width="2" rx="5" />
  <text x="20" y="25" font-size="18" font-family="Arial" font-weight="bold" fill="#2196F3">Data Management</text>

  <!-- Section 1: Data Management Life Cycle -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="200" height="100" fill="none" stroke="#EF9A9A" stroke-width="2" rx="5" data-narration="The stages of data management include data definition, data development, data implementation, data maintenance, and data evaluation." />
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="3s" begin="0s" />
    <line x1="100" y1="0" x2="100" y2="100" stroke="#EF9A9A" stroke-width="2" />
    <line x1="100" y1="0" x2="200" y2="0" stroke="#EF9A9A" stroke-width="2" />
    <line x1="200" y1="0" x2="200" y2="100" stroke="#EF9A9A" stroke-width="2" />
    <line x1="200" y1="100" x2="100" y2="100" stroke="#EF9A9A" stroke-width="2" />
  </g>

  <!-- Section 2: Data Definition Language (DDL) -->
  <g transform="translate(250, 50)">
    <rect x="0" y="0" width="200" height="100" fill="none" stroke="#8BC34A" stroke-width="2" rx="5" data-narration="A language used to define the structure of a database." />
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="3s" begin="3s" />
    <line x1="100" y1="0" x2="100" y2="100" stroke="#8BC34A" stroke-width="2" />
    <line x1="100" y1="0" x2="200" y2="0" stroke="#8BC34A" stroke-width="2" />
    <line x1="200" y1="0" x2="200" y2="100" stroke="#8BC34A" stroke-width="2" />
    <line x1="200" y1="100" x2="100" y2="100" stroke="#8BC34A" stroke-width="2" />
  </g>

  <!-- Section 3: Data Control Language (DCL) -->
  <g transform="translate(500, 50)">
    <rect x="0" y="0" width="200" height="100" fill="none" stroke="#F44336" stroke-width="2" rx="5" data-narration="A language used to control access to a database." />
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="3s" begin="6s" />
    <line x1="100" y1="0" x2="100" y2="100" stroke="#F44336" stroke-width="2" />
    <line x1="100" y1="0" x2="200" y2="0" stroke="#F44336" stroke-width="2" />
    <line x1="200" y1="0" x2="200" y2="100" stroke="#F44336" stroke-width="2" />
    <line x1="200" y1="100" x2="100" y2="100" stroke="#F44336" stroke-width="2" />
  </g>

  <!-- Section 4: Entity Relationship Model (ERM) -->
  <g transform="translate(750, 50)">
    <rect x="0" y="0" width="200" height="100" fill="none" stroke="#03A9F4" stroke-width="2" rx="5" data-narration="A model that represents the relationships between entities in a database." />
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="3s" begin="9s" />
    <line x1="100" y1="0" x2="100" y2="100" stroke="#03A9F4" stroke-width="2" />
    <line x1="100" y1="0" x2="200" y2="0" stroke="#03A9F4" stroke-width="2" />
    <line x1="200" y1="0" x2="200" y2="100" stroke="#03A9F4" stroke-width="2" />
    <line x1="200" y1="100" x2="100" y2="100" stroke="#03A9F4" stroke-width="2" />
  </g>

  <!-- Gradient background with pastel colors -->
  <rect x="0" y="170" width="420" height="220" fill="url(#pastel-gradient)" />

  <!-- Footer at bottom -->
  <rect x="10" y="370" width="400" height="30" fill="none" stroke="#2196F3" stroke-width="2" rx="5" />
  <text x="20" y="385" font-size="18" font-family="Arial" font-weight="bold" fill="#2196F3">Data Management</text>
</svg>