<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="database-languages-and-architectures-d" data-slugified-name="Introduction to Database Languages and Architectures">
  
  <!-- Background gradient -->
  <Defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </Defs>
  
  <!-- Container -->
  <g transform="translate(0, 0)">
    <rect x="0" y="0" width="420" height="400" fill="url(#backgroundGradient)"/>
    
    <!-- Title -->
    <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#4B5154">
      Overview of Database Languages and Architectures D
    </text>
    
    <!-- Section 1: Introduction -->
    <rect x="0" y="50" width="420" height="100" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" from="0,0" to="0,100"/>
      <text x="50%" y="70%" font-size="16" font-weight="bold" text-anchor="middle" fill="#4B5154" data-narration="This module provides an overview of database languages and architectures.">
        Introduction
      </text>
      <line x1="50%" y1="120" x2="50%" y2="180" stroke="#4B5154" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    </rect>
    
    <!-- Section 2: What are Data Models -->
    <rect x="0" y="200" width="420" height="100" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite" from="0,100" to="0,200"/>
      <text x="50%" y="70%" font-size="16" font-weight="bold" text-anchor="middle" fill="#4B5154" data-narration="Data models are abstract representations of data and their relationships. They provide a way to define the structure and organization of data in a database.">
        What are Data Models?
      </text>
      <line x1="50%" y1="180" x2="50%" y2="240" stroke="#4B5154" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    </rect>
    
    <!-- Section 3: Types of Data Models -->
    <rect x="0" y="350" width="420" height="100" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" begin="4s" dur="2s" repeatCount="indefinite" from="0,200" to="0,350"/>
      <text x="50%" y="70%" font-size="16" font-weight="bold" text-anchor="middle" fill="#4B5154" data-narration="There are several types of data models, including relational, entity-relationship, object-oriented, and hierarchical models.">
        Types of Data Models
      </text>
      <line x1="50%" y1="380" x2="50%" y2="440" stroke="#4B5154" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    </rect>
    
    <!-- Section 4: Relational Model -->
    <rect x="0" y="50" width="420" height="100" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" from="0,0" to="0,100"/>
      <text x="50%" y="70%" font-size="16" font-weight="bold" text-anchor="middle" fill="#4B5154" data-narration="The relational model is one of the most widely used data models. It uses tables to store data and defines relationships between them using primary and foreign keys.">
        Relational Model
      </text>
      <line x1="50%" y1="120" x2="50%" y2="180" stroke="#4B5154" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    </rect>
    
    <!-- Section 5: Primary Key and Foreign Key -->
    <rect x="0" y="200" width="420" height="100" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite" from="0,100" to="0,200"/>
      <text x="50%" y="70%" font-size="16" font-weight="bold" text-anchor="middle" fill="#4B5154" data-narration="A primary key is a unique identifier for each row in a table, while a foreign key references the primary key of another table.">
        Primary Key and Foreign Key
      </text>
      <line x1="50%" y1="180" x2="50%" y2="240" stroke="#4B5154" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    </rect>
    
    <!-- Footer -->
    <g transform="translate(0, 350)">
      <rect x="0" y="0" width="420" height="50" fill="#4B5154" rx="10"/>
      <text x="50%" y="25%" font-size="16" font-weight="bold" text-anchor="middle" fill="#F7F7F7">
        Database Management Systems
      </text>
    </g>
  </g>
</svg>