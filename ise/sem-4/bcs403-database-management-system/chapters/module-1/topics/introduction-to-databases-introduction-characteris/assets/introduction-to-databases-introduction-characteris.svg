<svg width="420" height="400" data-topic-id="introduction-to-databases-introduction-characteristics" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="36" font-family="Arial" text-anchor="middle" fill="#3498DB">Introduction to Databases: Introduction and Characteristics</text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="20" y="100" width="380" height="50" fill="#FFFFFF" rx="10"/>
    <text x="50" y="120" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">A database is a collection of organized data that is stored in a way that allows for efficient retrieval and manipulation.</text>
  </section>

  <!-- Section 2: Data Integration -->
  <section data-narration="Data Integration">
    <rect x="20" y="170" width="380" height="50" fill="#FFFFFF" rx="10"/>
    <text x="50" y="190" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Data integration integrates data from various sources into a single, unified view.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s"/>
  </section>

  <!-- Section 3: Data Storage -->
  <section data-narration="Data Storage">
    <rect x="20" y="220" width="380" height="50" fill="#FFFFFF" rx="10"/>
    <text x="50" y="240" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Data is stored in a structured and organized manner, making it easier to retrieve and manipulate.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="720 200 200" dur="10s" begin="10s"/>
  </section>

  <!-- Section 4: Data Retrieval -->
  <section data-narration="Data Retrieval">
    <rect x="20" y="270" width="380" height="50" fill="#FFFFFF" rx="10"/>
    <text x="50" y="290" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Data can be retrieved efficiently through queries and requests.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="1080 200 200" dur="10s" begin="20s"/>
  </section>

  <!-- Section 5: Data Manipulation -->
  <section data-narration="Data Manipulation">
    <rect x="20" y="310" width="380" height="50" fill="#FFFFFF" rx="10"/>
    <text x="50" y="330" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Data can be modified and updated as needed.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="1350 200 200" dur="10s" begin="30s"/>
  </section>

  <!-- Section 6: Data Security -->
  <section data-narration="Data Security">
    <rect x="20" y="350" width="380" height="50" fill="#FFFFFF" rx="10"/>
    <text x="50" y="370" font-size="18" font-family="Arial" text-anchor="middle" fill="#2C3E50">Data is protected from unauthorized access through access control and encryption.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="1680 200 200" dur="10s" begin="40s"/>
  </section>

  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Introduction to Databases: Introduction and Characteristics</text>
</svg>