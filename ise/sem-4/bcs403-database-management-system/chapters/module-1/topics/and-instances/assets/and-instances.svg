<svg width="420" height="400" data-topic-id="spot-instances-in-cloud-computing">
  <defs>
    <style>
      .pastel-background {
        background-image: linear-gradient(to bottom, #C7B8EA, #B2A9E1, #A1A8F5);
        background-size: 100% 100%;
        background-position: 0% 0%;
        background-repeat: no-repeat;
        background-clip: padding-box;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </defs>
  <rect class="pastel-background" x="0" y="0" width="420" height="400" fill="#FFC5C5"/>
  <g transform="translate(20, 20)">
    <text x="0" y="0" text-anchor="start" font-size="18" fill="#3498db">
      Spot Instances in Cloud Computing
    </text>
  </g>
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="What are Spot Instances?">
      What are Spot Instances?
    </text>
    <text x="10" y="30" text-anchor="start" font-size="14" fill="#666666">
      Spot Instances are unused EC2 capacity offered at up to 90% discount compared to On-Demand prices.
    </text>
  </g>
  <g transform="translate(40, 250)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="How Spot Instances Work">
      How Spot Instances Work
    </text>
    <text x="10" y="30" text-anchor="start" font-size="14" fill="#666666">
      1. You request instances at current spot price
      2. AWS provides instances while capacity available
      3. If capacity needed, AWS sends 2-minute warning
      4. Instance is terminated (you only pay for used time)
    </text>
  </g>
  <g transform="translate(40, 450)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="Pricing Model">
      Pricing Model
    </text>
    <rect x="0" y="0" width="100" height="20" rx="5" fill="#FFC499"/>
    <text x="10" y="10" text-anchor="start" font-size="14" fill="#666666" data-narration="On-Demand: 0% discount, no interruption risk">
      On-Demand
    </text>
    <rect x="120" y="0" width="100" height="20" rx="5" fill="#FFC499"/>
    <text x="130" y="10" text-anchor="start" font-size="14" fill="#666666" data-narration="Reserved: 40-72% discount, no interruption risk">
      Reserved
    </text>
    <rect x="220" y="0" width="100" height="20" rx="5" fill="#FFC499"/>
    <text x="230" y="10" text-anchor="start" font-size="14" fill="#666666" data-narration="Spot: 60-90% discount, 2-minute interruption risk">
      Spot
    </text>
  </g>
  <g transform="translate(40, 550)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="Price Fluctuation">
      Price Fluctuation
    </text>
    <text x="10" y="30" text-anchor="start" font-size="14" fill="#666666">
      Prices change based on supply and demand
      You can set a maximum price you are willing to pay
      No bidding, you get the current spot price
    </text>
  </g>
  <g transform="translate(40, 650)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="Spot Instance Best Practices">
      Spot Instance Best Practices
    </text>
    <rect x="0" y="0" width="100" height="20" rx="5" fill="#FFC499"/>
    <text x="10" y="10" text-anchor="start" font-size="14" fill="#666666" data-narration="Design for Interruption">
      Design for Interruption
    </text>
    <text x="10" y="30" text-anchor="start" font-size="14" fill="#666666">
      Save state periodically
      Use checkpointing for long jobs
      Implement graceful shutdown handling
      Store data externally
    </text>
    <rect x="120" y="0" width="100" height="20" rx="5" fill="#FFC499"/>
    <text x="130" y="10" text-anchor="start" font-size="14" fill="#666666" data-narration="Diversify Instance Types">
      Diversify Instance Types
    </text>
    <text x="130" y="30" text-anchor="start" font-size="14" fill="#666666">
      Use multiple instance types and AZs
      More options = higher availability
    </text>
    <rect x="220" y="0" width="100" height="20" rx="5" fill="#FFC499"/>
    <text x="230" y="10" text-anchor="start" font-size="14" fill="#666666" data-narration="Mix with On-Demand">
      Mix with On-Demand
    </text>
    <text x="230" y="30" text-anchor="start" font-size="14" fill="#666666">
      Base capacity: On-Demand (reliable)
      Scaling capacity: Spot (cost-effective)
    </text>
  </g>
  <g transform="translate(40, 750)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="Use Cases">
      Use Cases
    </text>
    <text x="10" y="30" text-anchor="start" font-size="14" fill="#666666">
      Batch processing jobs
      Big data analytics
      CI/CD build workers
      Testing environments
    </text>
  </g>
  <g transform="translate(40, 850)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="Not Good for Spot">
      Not Good for Spot
    </text>
    <text x="10" y="30" text-anchor="start" font-size="14" fill="#666666">
      Production web servers
      Databases
      Single critical instances
      Stateful applications without checkpointing
    </text>
  </g>
  <g transform="translate(40, 950)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="Handling Interruptions">
      Handling Interruptions
    </text>
    <text x="10" y="30" text-anchor="start" font-size="14" fill="#666666">
      Termination Notice
      AWS provides 2-minute warning via instance metadata service
      CloudWatch Events
      EventBridge
    </text>
  </g>
  <g transform="translate(40, 1050)">
    <rect x="0" y="0" width="360" height="200" rx="10" fill="#B2B8C9"/>
    <text x="10" y="10" text-anchor="start" font-size="16" fill="#3498db" data-narration="Conclusion">
      Conclusion
    </text>
    <text x="10" y="30" text-anchor="start" font-size="14" fill="#666666">
      Spot Instances are a cost-effective way to run EC2 capacity
      However, they may have interruption risks
    </text>
  </g>
</svg>