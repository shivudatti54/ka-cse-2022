<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="three-schema-architecture-and-data-independence" viewBox="0 0 420 400">
  <style>
    /* Add styles for the background gradient */
    background {
      background-image: linear-gradient(to bottom, #4f9db6, #87ceeb);
      background-size: 100% 100%;
      background-position: 0% 0%;
      background-repeat: repeat-x;
    }
    
    /* Style for rectangles and lines */
    rect {
      stroke: #2f4f7f;
      stroke-width: 2;
      fill: #f0f0f0;
    }
    
    line {
      stroke: #2f4f7f;
      stroke-width: 2;
    }
    
    text {
      fill: #2f4f7f;
      font-size: 12px;
    }
  </style>
  
  <!-- Background gradient -->
  <rect x="0" y="0" width="100%" height="100%" style="background" />
  
  <!-- Title -->
  <g transform="translate(10, 10)">
    <text data-narration="Title" x="10" y="20">Three Schema Architecture and Data Independence</text>
  </g>
  
  <!-- External Schema -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="200" height="150" rx="10" />
    <text data-narration="External Schema" x="10" y="20">External Schema</text>
    <line x1="20" y1="20" x2="210" y2="120" style="stroke-width: 2" />
    <line x1="20" y1="120" x2="210" y2="120" style="stroke-width: 2" />
  </g>
  
  <!-- Application Schema -->
  <g transform="translate(10, 160)">
    <rect x="0" y="0" width="200" height="150" rx="10" />
    <text data-narration="Application Schema" x="10" y="20">Application Schema</text>
    <line x1="20" y1="20" x2="210" y2="120" style="stroke-width: 2" />
    <line x1="20" y1="120" x2="210" y2="120" style="stroke-width: 2" />
  </g>
  
  <!-- Data Schema -->
  <g transform="translate(10, 310)">
    <rect x="0" y="0" width="200" height="150" rx="10" />
    <text data-narration="Data Schema" x="10" y="20">Data Schema</text>
    <line x1="20" y1="20" x2="210" y2="120" style="stroke-width: 2" />
    <line x1="20" y1="120" x2="210" y2="120" style="stroke-width: 2" />
  </g>
  
  <!-- Data Independence -->
  <g transform="translate(10, 380)">
    <rect x="0" y="0" width="200" height="80" rx="10" />
    <text data-narration="Data Independence" x="10" y="20">Data Independence</text>
    <line x1="20" y1="20" x2="200" y2="80" style="stroke-width: 2" />
    <line x1="20" y1="80" x2="200" y2="80" style="stroke-width: 2" />
  </g>
  
  <!-- Animation for sections -->
  <animate transform="translate(10, 50)" attributeName="transform" values="translate(10, 50);translate(10, 90)" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate transform="translate(10, 160)" attributeName="transform" values="translate(10, 160);translate(10, 210)" begin="2s" dur="2s" repeatCount="indefinite" />
  <animate transform="translate(10, 310)" attributeName="transform" values="translate(10, 310);translate(10, 350)" begin="4s" dur="2s" repeatCount="indefinite" />
  <animate transform="translate(10, 380)" attributeName="transform" values="translate(10, 380);translate(10, 420)" begin="6s" dur="2s" repeatCount="indefinite" />
  
  <!-- Arrow markers for connections -->
  <line x1="30" y1="70" x2="170" y2="70" style="stroke-width: 1" />
  <line x1="30" y1="100" x2="170" y2="100" style="stroke-width: 1" />
  <line x1="30" y1="130" x2="170" y2="130" style="stroke-width: 1" />
  <line x1="30" y1="160" x2="170" y2="160" style="stroke-width: 1" />
  <line x1="30" y1="190" x2="170" y2="190" style="stroke-width: 1" />
  <line x1="30" y1="210" x2="170" y2="210" style="stroke-width: 1" />
  
  <!-- Footer -->
  <g transform="translate(10, 420)">
    <text data-narration="Footer" x="10" y="430">Three Schema Architecture and Data Independence</text>
  </g>
</svg>