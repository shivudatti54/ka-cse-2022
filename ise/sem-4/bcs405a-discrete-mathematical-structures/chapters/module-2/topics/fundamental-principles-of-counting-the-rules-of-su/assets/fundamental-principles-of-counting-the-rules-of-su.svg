<svg width="420" height="400" data-topic-id="fundamental-principles-of-counting-the-rules-of-sum-and-product" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8DFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#3F51B5" stop-opacity="1" />
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .section:last-child {
        margin-bottom: 0;
      }
      .data-narration {
        font-size: 18px;
        font-weight: bold;
        color: #fff;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .label {
        font-size: 16px;
        font-weight: bold;
        color: #fff;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <text x="20" y="50" font-size="32px" font-weight="bold" text-anchor="middle" fill="#fff" text-shadow="0 0 10px rgba(0, 0, 0, 0.5)">
    Fundamental Principles of Counting
  </text>
  <text x="20" y="120" font-size="18px" font-weight="normal" text-anchor="middle" fill="#fff" text-shadow="0 0 10px rgba(0, 0, 0, 0.5)">
    The Rules of Sum and Product
  </text>
  <section class="section" data-narration="The Rule of Sum">
    <rect x="10" y="150" width="380" height="100" fill="#fff" rx="10" />
    <text x="20" y="170" font-size="18px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)">
      The Rule of Sum:
      <tspan x="20" y="190" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8">
        m ways to perform the first task
        <tspan x="20" y="210" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        and
      </tspan>
      n ways to perform the second task
      <tspan x="20" y="210" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        then there are (m + n) ways to perform both tasks
      </tspan>
      <tspan x="20" y="230" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        <tspan x="20" y="230" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        | A ∪ B | = | A | + | B | - | A ∩ B |
      </tspan>
      </tspan>
    </text>
    <animate duration="2000" begin="1000" attributeName="opacity" from="1" to="0" repeatCount="indefinite" />
    <line x1="20" y1="180" x2="20" y2="200" stroke="#fff" stroke-width="2" opacity="0.5" />
  </section>
  <section class="section" data-narration="The Rule of Product">
    <rect x="10" y="280" width="380" height="100" fill="#fff" rx="10" />
    <text x="20" y="300" font-size="18px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8">
      The Rule of Product:
      <tspan x="20" y="320" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        m ways to perform the first task
        <tspan x="20" y="340" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        and
      </tspan>
      n ways to perform the second task
      <tspan x="20" y="340" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        then there are m × n ways to perform both tasks
      </tspan>
      <tspan x="20" y="360" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        <tspan x="20" y="360" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        | A × B | = | A | × | B |
      </tspan>
      </tspan>
    </text>
    <animate duration="2000" begin="2000" attributeName="opacity" from="0" to="1" repeatCount="indefinite" />
    <line x1="20" y1="260" x2="20" y2="280" stroke="#fff" stroke-width="2" opacity="0.5" />
  </section>
  <section class="section" data-narration="Permutations">
    <rect x="10" y="440" width="380" height="100" fill="#fff" rx="10" />
    <text x="20" y="460" font-size="18px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8">
      Permutations:
      <tspan x="20" y="480" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        n! ways to arrange objects in a specific order
      </tspan>
    </text>
    <animate duration="2000" begin="3000" attributeName="opacity" from="1" to="0" repeatCount="indefinite" />
    <line x1="20" y1="410" x2="20" y2="430" stroke="#fff" stroke-width="2" opacity="0.5" />
  </section>
  <section class="section" data-narration="Combinations">
    <rect x="10" y="510" width="380" height="100" fill="#fff" rx="10" />
    <text x="20" y="530" font-size="18px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8">
      Combinations:
      <tspan x="20" y="560" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        nCk ways to choose k objects without considering order
      </tspan>
    </text>
    <animate duration="2000" begin="4000" attributeName="opacity" from="0" to="1" repeatCount="indefinite" />
    <line x1="20" y1="460" x2="20" y2="480" stroke="#fff" stroke-width="2" opacity="0.5" />
  </section>
  <section class="section" data-narration="The Binomial Theorem">
    <rect x="10" y="600" width="380" height="100" fill="#fff" rx="10" />
    <text x="20" y="620" font-size="18px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8">
      The Binomial Theorem:
      <tspan x="20" y="650" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        (x + y)^n = ∑[nCk x^(n-k) y^k]
      </tspan>
    </text>
    <animate duration="2000" begin="5000" attributeName="opacity" from="0" to="1" repeatCount="indefinite" />
    <line x1="20" y1="570" x2="20" y2="590" stroke="#fff" stroke-width="2" opacity="0.5" />
  </section>
  <section class="section" data-narration="Combinations with Repetition">
    <rect x="10" y="680" width="380" height="100" fill="#fff" rx="10" />
    <text x="20" y="700" font-size="18px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8">
      Combinations with Repetition:
      <tspan x="20" y="740" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8" style="display: inline-block; margin-left: 10px;">
        n+k-1Ck ways to choose k objects from n items with repetition
      </tspan>
    </text>
    <animate duration="2000" begin="6000" attributeName="opacity" from="0" to="1" repeatCount="indefinite" />
    <line x1="20" y1="620" x2="20" y2="640" stroke="#fff" stroke-width="2" opacity="0.5" />
  </section>
  <footer>
    <rect x="10" y="740" width="400" height="20" fill="#fff" rx="10" />
    <text x="20" y="760" font-size="16px" font-weight="normal" text-anchor="middle" fill="#000" text-shadow="0 0 10px rgba(255, 165, 0, 0.5)" opacity="0.8">
      Created by [Your Name]
    </text>
  </footer>
</svg>