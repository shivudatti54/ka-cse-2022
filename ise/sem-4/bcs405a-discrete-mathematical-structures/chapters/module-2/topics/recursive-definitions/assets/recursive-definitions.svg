<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="recursive-definitions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="blockGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
    <linearGradient id="blockGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="blockGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#F57C00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Recursive Definitions: a method of defining objects by specifying a base case, a recursive step, and a closure rule.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3949AB" text-anchor="middle">Recursive Definitions</text>
    <line x1="110" y1="38" x2="310" y2="38" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="110" cy="38" r="3" fill="#E65100"/>
    <circle cx="310" cy="38" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Three Components as stacked blocks -->
  <g opacity="0" data-narration="Every recursive definition has three components: a base case that forms the foundation, a recursive step that provides the building rule, and a closure clause stating nothing else belongs.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Base Case block -->
    <rect x="20" y="50" width="120" height="44" rx="6" fill="url(#blockGrad1)"/>
    <text x="80" y="67" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Base Case</text>
    <text x="80" y="82" font-family="Arial, sans-serif" font-size="8" fill="#E8EAF6" text-anchor="middle">(Foundation)</text>
    <!-- Recursive Step block -->
    <rect x="150" y="50" width="120" height="44" rx="6" fill="url(#blockGrad2)"/>
    <text x="210" y="67" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Recursive Step</text>
    <text x="210" y="82" font-family="Arial, sans-serif" font-size="8" fill="#E8EAF6" text-anchor="middle">(Building Rule)</text>
    <!-- Closure block -->
    <rect x="280" y="50" width="120" height="44" rx="6" fill="url(#blockGrad3)"/>
    <text x="340" y="67" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Closure</text>
    <text x="340" y="82" font-family="Arial, sans-serif" font-size="8" fill="#FFF3E0" text-anchor="middle">(Nothing Else)</text>
  </g>

  <!-- Group 3: Factorial Example -->
  <g opacity="0" data-narration="Factorial is a classic recursive definition. The base case is zero factorial equals one. The recursive step says n factorial equals n times n minus one factorial. Tracing four factorial: four times three factorial, which is four times three times two factorial, then four times three times two times one factorial, giving four times three times two times one, which equals twenty-four.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <rect x="20" y="104" width="380" height="80" rx="8" fill="#FFFFFF" fill-opacity="0.7" stroke="#3949AB" stroke-width="1"/>
    <text x="30" y="120" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Factorial Example</text>
    <!-- Definition -->
    <text x="30" y="137" font-family="monospace" font-size="10" fill="#00695C">Base: 0! = 1</text>
    <text x="180" y="137" font-family="monospace" font-size="10" fill="#E65100">Rule: n! = n x (n-1)!</text>
    <!-- Trace -->
    <text x="30" y="155" font-family="monospace" font-size="9" fill="#3949AB">4! = 4x3!</text>
    <text x="110" y="155" font-family="monospace" font-size="9" fill="#3949AB">= 4x3x2!</text>
    <text x="200" y="155" font-family="monospace" font-size="9" fill="#3949AB">= 4x3x2x1!</text>
    <text x="310" y="155" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">= 24</text>
    <!-- Base case highlight -->
    <text x="30" y="174" font-family="monospace" font-size="8" fill="#00695C">1! = 1x0! = 1x1 = 1 (base case reached)</text>
  </g>

  <!-- Group 4: Fibonacci Example with tree -->
  <g opacity="0" data-narration="The Fibonacci sequence is another important recursive definition. The base cases are F of zero equals zero and F of one equals one. The recursive step says F of n equals F of n minus one plus F of n minus two. A tree diagram for F of four shows how it breaks down into repeated sub-problems.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="20" y="192" width="380" height="92" rx="8" fill="#FFFFFF" fill-opacity="0.7" stroke="#00695C" stroke-width="1"/>
    <text x="30" y="208" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Fibonacci Example</text>
    <!-- Definition -->
    <text x="30" y="224" font-family="monospace" font-size="9" fill="#3949AB">Base: F(0)=0, F(1)=1</text>
    <text x="210" y="224" font-family="monospace" font-size="9" fill="#E65100">Rule: F(n) = F(n-1) + F(n-2)</text>
    <!-- Recursive call tree for F(4) -->
    <!-- F(4) root -->
    <text x="210" y="244" font-family="monospace" font-size="9" font-weight="bold" fill="#3949AB" text-anchor="middle">F(4)</text>
    <line x1="195" y1="247" x2="140" y2="256" stroke="#3949AB" stroke-width="1"/>
    <line x1="225" y1="247" x2="280" y2="256" stroke="#3949AB" stroke-width="1"/>
    <!-- F(3) and F(2) -->
    <text x="130" y="264" font-family="monospace" font-size="8" fill="#E65100" text-anchor="middle">F(3)</text>
    <text x="290" y="264" font-family="monospace" font-size="8" fill="#E65100" text-anchor="middle">F(2)</text>
    <!-- F(3) children -->
    <line x1="120" y1="267" x2="80" y2="274" stroke="#00695C" stroke-width="0.8"/>
    <line x1="140" y1="267" x2="170" y2="274" stroke="#00695C" stroke-width="0.8"/>
    <text x="72" y="282" font-family="monospace" font-size="7" fill="#00695C" text-anchor="middle">F(2)</text>
    <text x="178" y="282" font-family="monospace" font-size="7" fill="#C62828" text-anchor="middle">F(1)=1</text>
    <!-- F(2) right children -->
    <line x1="280" y1="267" x2="258" y2="274" stroke="#00695C" stroke-width="0.8"/>
    <line x1="300" y1="267" x2="322" y2="274" stroke="#00695C" stroke-width="0.8"/>
    <text x="250" y="282" font-family="monospace" font-size="7" fill="#C62828" text-anchor="middle">F(1)=1</text>
    <text x="330" y="282" font-family="monospace" font-size="7" fill="#C62828" text-anchor="middle">F(0)=0</text>
    <!-- F(2) left children -->
    <line x1="64" y1="284" x2="44" y2="290" stroke="#00695C" stroke-width="0.8"/>
    <line x1="80" y1="284" x2="102" y2="290" stroke="#00695C" stroke-width="0.8"/>
    <!-- leaves -->
    <text x="38" y="298" font-family="monospace" font-size="7" fill="#C62828" text-anchor="middle">F(1)=1</text>
    <text x="108" y="298" font-family="monospace" font-size="7" fill="#C62828" text-anchor="middle">F(0)=0</text>
  </g>

  <!-- Group 5: Recursively Defined Sets -->
  <g opacity="0" data-narration="Recursively defined sets use the same principle. For natural numbers, the base case is zero belongs to N, and the recursive step says if n belongs to N then n plus one also belongs to N. For strings, the base is the empty string epsilon belongs to S, and if w is in S and a is in the alphabet sigma, then the concatenation w a is also in S.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <rect x="20" y="292" width="185" height="60" rx="8" fill="#FFFFFF" fill-opacity="0.7" stroke="#E65100" stroke-width="1"/>
    <text x="30" y="307" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Natural Numbers</text>
    <text x="30" y="322" font-family="monospace" font-size="8" fill="#3949AB">Base: 0 &#x2208; N</text>
    <text x="30" y="336" font-family="monospace" font-size="8" fill="#00695C">If n &#x2208; N then n+1 &#x2208; N</text>
    <text x="30" y="348" font-family="monospace" font-size="7" fill="#888888">0, 1, 2, 3, 4, ...</text>

    <rect x="215" y="292" width="185" height="60" rx="8" fill="#FFFFFF" fill-opacity="0.7" stroke="#C62828" stroke-width="1"/>
    <text x="225" y="307" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Strings over &#x3A3;</text>
    <text x="225" y="322" font-family="monospace" font-size="8" fill="#3949AB">Base: &#x03B5; &#x2208; S</text>
    <text x="225" y="336" font-family="monospace" font-size="8" fill="#00695C">If w&#x2208;S, a&#x2208;&#x3A3; then wa&#x2208;S</text>
    <text x="225" y="348" font-family="monospace" font-size="7" fill="#888888">&#x03B5;, a, b, aa, ab, ...</text>
  </g>

  <!-- Group 6: Structural Induction Connection -->
  <g opacity="0" data-narration="Structural induction proves properties of recursively defined objects. The base case verifies the property holds for the initial elements. The inductive step assumes the property holds for smaller structures and then proves it for larger ones built by the recursive rule.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="20" y="360" width="380" height="32" rx="6" fill="#3949AB" fill-opacity="0.1" stroke="#3949AB" stroke-width="1"/>
    <text x="30" y="376" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3949AB">Structural Induction:</text>
    <polygon points="148,374 152,371 152,377" fill="#3949AB"/>
    <text x="158" y="376" font-family="Arial, sans-serif" font-size="8" fill="#00695C">Base: verify property</text>
    <polygon points="268,374 272,371 272,377" fill="#00695C"/>
    <text x="278" y="376" font-family="Arial, sans-serif" font-size="8" fill="#E65100">Inductive: assume smaller, prove larger</text>
  </g>
</svg>
