<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="mathematical-induction">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Mathematical Induction is a proof technique used to prove statements for all natural numbers.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#3949AB">Mathematical Induction</text>
    <line x1="110" y1="38" x2="310" y2="38" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="110" cy="38" r="3" fill="#E65100"/>
    <circle cx="310" cy="38" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Domino analogy -->
  <g opacity="0" data-narration="Think of dominos in a row. If the first domino falls, that is the base case. Each domino knocks down the next, that is the inductive step. So all dominos fall.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="62" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Domino Analogy</text>
    <!-- Domino 1 (fallen - base case) -->
    <rect x="42" y="72" width="8" height="28" rx="2" fill="#C62828" transform="rotate(-60 46 86)"/>
    <text x="30" y="108" font-family="Arial" font-size="7" fill="#C62828">Push!</text>
    <!-- Domino 2 (falling) -->
    <rect x="72" y="72" width="8" height="28" rx="2" fill="#E65100" transform="rotate(-40 76 86)"/>
    <!-- Domino 3 (falling) -->
    <rect x="102" y="72" width="8" height="28" rx="2" fill="#E65100" transform="rotate(-25 106 86)"/>
    <!-- Domino 4 (tilting) -->
    <rect x="132" y="72" width="8" height="28" rx="2" fill="#3949AB" transform="rotate(-10 136 86)"/>
    <!-- Domino 5 (standing) -->
    <rect x="162" y="72" width="8" height="28" rx="2" fill="#3949AB"/>
    <!-- Domino 6 (standing) -->
    <rect x="192" y="72" width="8" height="28" rx="2" fill="#3949AB"/>
    <!-- Domino 7 (standing) -->
    <rect x="222" y="72" width="8" height="28" rx="2" fill="#3949AB"/>
    <!-- Dots -->
    <text x="252" y="95" font-family="Arial" font-size="14" fill="#3949AB">...</text>
    <!-- Domino n -->
    <rect x="278" y="72" width="8" height="28" rx="2" fill="#3949AB"/>
    <text x="282" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#3949AB">n</text>
    <!-- Labels -->
    <text x="46" y="122" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Base</text>
    <text x="46" y="130" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#C62828">Case</text>
    <!-- Arrow showing chain reaction -->
    <line x1="60" y1="86" x2="270" y2="86" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2"/>
    <polygon points="270,83 278,86 270,89" fill="#00695C"/>
    <text x="165" y="82" text-anchor="middle" font-family="Arial" font-size="7" fill="#00695C">Inductive Step: each pushes next</text>
    <text x="340" y="90" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB">All fall!</text>
    <text x="340" y="100" text-anchor="middle" font-family="Arial" font-size="14">&#x2714;</text>
  </g>

  <!-- Group 3: Two Steps -->
  <g opacity="0" data-narration="Step one, Base Case: prove P of 1 is true. Step two, Inductive Step: assume P of k is true, then prove P of k plus 1 is also true.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <!-- Step 1 box -->
    <rect x="15" y="140" width="190" height="55" rx="6" fill="white" stroke="#3949AB" stroke-width="1.5" opacity="0.9"/>
    <text x="110" y="155" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Step 1: Base Case</text>
    <text x="110" y="170" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">Prove P(1) is true</text>
    <text x="110" y="185" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Verify the smallest case)</text>
    <!-- Arrow between boxes -->
    <line x1="210" y1="167" x2="220" y2="167" stroke="#E65100" stroke-width="2"/>
    <polygon points="220,164 228,167 220,170" fill="#E65100"/>
    <!-- Step 2 box -->
    <rect x="230" y="140" width="178" height="55" rx="6" fill="white" stroke="#E65100" stroke-width="1.5" opacity="0.9"/>
    <text x="319" y="155" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">Step 2: Inductive Step</text>
    <text x="319" y="170" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">Assume P(k) true</text>
    <text x="319" y="183" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828">&#x2192; Prove P(k+1) true</text>
  </g>

  <!-- Group 4: Example -->
  <g opacity="0" data-narration="Example: Prove that 1 plus 2 plus dot dot dot plus n equals n times n plus 1 divided by 2. Base case: P of 1 gives 1 equals 1 times 2 over 2 equals 1, which is true. Inductive step: assume it holds for k, then prove it for k plus 1.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="205" width="393" height="75" rx="6" fill="white" stroke="#00695C" stroke-width="1.5" opacity="0.9"/>
    <text x="210" y="220" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Example: Sum of First n Natural Numbers</text>
    <text x="210" y="235" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB">Prove: 1 + 2 + ... + n = n(n+1)/2</text>
    <line x1="30" y1="241" x2="390" y2="241" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="30" y="254" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Base:</text>
    <text x="70" y="254" font-family="monospace" font-size="8" fill="#00695C">P(1): 1 = 1(2)/2 = 1 &#x2713;</text>
    <text x="30" y="270" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Inductive:</text>
    <text x="95" y="270" font-family="monospace" font-size="8" fill="#333">Assume: 1+2+...+k = k(k+1)/2</text>
    <text x="290" y="270" font-family="monospace" font-size="8" fill="#C62828">&#x2192; Prove for k+1</text>
  </g>

  <!-- Group 5: Strong Induction -->
  <g opacity="0" data-narration="Strong induction variant: Instead of assuming only P of k, assume P of 1 through P of k are all true, then prove P of k plus 1. This is useful when the proof needs multiple previous cases.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="290" width="393" height="46" rx="6" fill="white" stroke="#3949AB" stroke-width="1.5" opacity="0.9"/>
    <text x="210" y="305" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Strong Induction Variant</text>
    <text x="210" y="319" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C">Assume P(1), P(2), ..., P(k) ALL true &#x2192; Prove P(k+1)</text>
    <text x="210" y="331" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Used when proof of P(k+1) depends on multiple previous cases</text>
  </g>

  <!-- Group 6: Common Pitfalls -->
  <g opacity="0" data-narration="Common pitfalls to avoid: forgetting the base case, using the wrong inductive hypothesis, and not actually using the inductive assumption in the proof of P of k plus 1.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="345" width="393" height="47" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" opacity="0.95"/>
    <text x="210" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#C62828">&#x26A0; Common Pitfalls</text>
    <text x="30" y="376" font-family="Arial" font-size="8" fill="#C62828">&#x2022;</text>
    <text x="38" y="376" font-family="Arial" font-size="8" fill="#333">Forgetting the base case</text>
    <text x="165" y="376" font-family="Arial" font-size="8" fill="#C62828">&#x2022;</text>
    <text x="173" y="376" font-family="Arial" font-size="8" fill="#333">Wrong inductive hypothesis</text>
    <text x="318" y="376" font-family="Arial" font-size="8" fill="#C62828">&#x2022;</text>
    <text x="326" y="376" font-family="Arial" font-size="8" fill="#333">Not using assumption</text>
    <text x="210" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Always verify you use P(k) when proving P(k+1)!</text>
  </g>
</svg>
