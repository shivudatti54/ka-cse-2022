<svg width="420" height="400" data-topic-id="logical-implication-rules-of-inference">
  <defs>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .label {
        font-weight: bold;
        font-size: 16px;
        color: #333;
      }
      .arrow {
        fill: #fff;
        stroke: #333;
        stroke-width: 2;
        stroke-linecap: round;
      }
    </style>
  </defs>
  <title>Logical Implication Rules of Inference</title>
  <rect x="0" y="0" width="100%" height="100%" fill="#c7e5ff"/>
  <rect x="0" y="40" width="100%" height="20" fill="#86c9ff"/>
  <text x="50%" y="50" font-size="24" font-family="Arial" fill="#333">Logical Implication Rules of Inference</text>
  <rect x="0" y="70" width="100%" height="30" fill="#f1e6dd"/>
  <section data-narration="Definition of Logical Implication">
    <rect x="0" y="0" width="100%" height="50" fill="#f5f5f5"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#333">Logical Implication (→)</text>
    <text x="20" y="40" font-size="16" font-family="Arial" fill="#333">p → q ≡ ¬p ∨ q</text>
  </section>
  <section data-narration="Types of Logical Implication">
    <rect x="0" y="60" width="100%" height="50" fill="#f5f5f5"/>
    <rect x="30" y="30" width="40" height="40" fill="#0c96ff" rx="10"/>
    <rect x="70" y="30" width="40" height="40" fill="#0c96ff" rx="10"/>
    <g transform="rotate(90)">
      <rect x="30" y="0" width="40" height="40" fill="#0c96ff" rx="10"/>
      <rect x="70" y="0" width="40" height="40" fill="#0c96ff" rx="10"/>
    </g>
    <text x="50" y="50" font-size="18" font-family="Arial" fill="#333">Material Implication (→)</text>
    <text x="70" y="50" font-size="18" font-family="Arial" fill="#333">Tarski Implication (⇒)</text>
  </section>
  <section data-narration="Modus Ponens">
    <rect x="0" y="110" width="100%" height="50" fill="#f5f5f5"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#333">p → q</text>
    <text x="20" y="40" font-size="16" font-family="Arial" fill="#333">p</text>
    <text x="150" y="40" font-size="16" font-family="Arial" fill="#333">q</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 200" begin="0s" dur="2s"/>
  </section>
  <section data-narration="Disjunctive Syllogism">
    <rect x="0" y="170" width="100%" height="50" fill="#f5f5f5"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#333">p → q</text>
    <text x="20" y="40" font-size="16" font-family="Arial" fill="#333">¬p ∨ q</text>
    <text x="150" y="40" font-size="16" font-family="Arial" fill="#333">q</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 200" begin="2s" dur="2s"/>
  </section>
  <section data-narration="Hypothetical Syllogism">
    <rect x="0" y="230" width="100%" height="50" fill="#f5f5f5"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#333">p → q</text>
    <text x="20" y="40" font-size="16" font-family="Arial" fill="#333">q → r</text>
    <text x="150" y="40" font-size="16" font-family="Arial" fill="#333">p → r</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 200" begin="4s" dur="2s"/>
  </section>
  <footer>
    <text x="50%" y="340" font-size="18" font-family="Arial" fill="#333">Logical Implication Rules of Inference</text>
  </footer>
</svg>