<svg width="420" height="400" data-topic-id="definitions-and-the-proofs-of-theorems">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Definitions and The Proofs of Theorems</title>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <rect width="400" height="20" style="fill: #3B5998; stroke: #fff; stroke-width: 2"/>
    <text x="10" y="5" style="font-size: 18; fill: #fff">Definitions and The Proofs of Theorems</text>
  </g>
  <section data-narration="What are Definitions?">
    <rect x="10" y="30" width="400" height="100" style="fill: #fff; stroke: #ddd; stroke-width: 2"/>
    <text x="20" y="30" style="font-size: 16; fill: #3B5998">A definition is a statement that assigns a meaning to a mathematical term or concept.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="5s" begin="-1s"/>
  </section>
  <section data-narration="Types of Definitions">
    <rect x="10" y="140" width="400" height="100" style="fill: #fff; stroke: #ddd; stroke-width: 2"/>
    <g>
      <text x="20" y="30" style="font-size: 16; fill: #3B5998">Informal Definitions:</text>
      <line x1="150" y1="50" x2="150" y2="100" style="stroke: #66D9EF; stroke-width: 2" marker-end="url(#arrow-head)"/>
      <text x="20" y="150" style="font-size: 16; fill: #3B5998">Formal Definitions:</text>
      <line x1="150" y1="170" x2="150" y2="220" style="stroke: #03A9F4; stroke-width: 2" marker-end="url(#arrow-head)"/>
      <text x="20" y="230" style="font-size: 16; fill: #3B5998">Recursive Definitions:</text>
      <line x1="150" y1="250" x2="150" y2="300" style="stroke: #FFC107; stroke-width: 2" marker-end="url(#arrow-head)"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" begin="-1s"/>
  </section>
  <section data-narration="Key Concepts">
    <rect x="10" y="280" width="400" height="100" style="fill: #fff; stroke: #ddd; stroke-width: 2"/>
    <g>
      <text x="20" y="30" style="font-size: 16; fill: #3B5998">Axioms:</text>
      <line x1="150" y1="50" x2="150" y2="100" style="stroke: #66D9EF; stroke-width: 2" marker-end="url(#arrow-head)"/>
      <text x="20" y="160" style="font-size: 16; fill: #3B5998">Postulates:</text>
      <line x1="150" y1="180" x2="150" y2="230" style="stroke: #03A9F4; stroke-width: 2" marker-end="url(#arrow-head)"/>
      <text x="20" y="240" style="font-size: 16; fill: #3B5998">Theorems:</text>
      <line x1="150" y1="260" x2="150" y2="310" style="stroke: #FFC107; stroke-width: 2" marker-end="url(#arrow-head)"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" begin="-1s"/>
  </section>
  <footer>
    <g transform="translate(10, 380)">
      <rect width="400" height="20" style="fill: #3B5998; stroke: #fff; stroke-width: 2"/>
      <text x="10" y="5" style="font-size: 18; fill: #fff">Definitions and The Proofs of Theorems</text>
    </g>
  </footer>
</svg>