<svg width="420" height="400" data-topic-id="The-Use-Of-Quantifiers" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: lighten;">

  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E5F4"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>

  <style>
    text {
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .section {
      margin-bottom: 20px;
    }
    .data-narration {
      background-color: #F7F7F7;
      border: 1px solid #E5E5E5;
      padding: 10px;
      border-radius: 5px;
    }
    .arrow {
      fill: #FFC107;
      stroke-width: 2;
      stroke-linecap: round;
    }
  </style>

  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient)"/>
  <text x="20" y="20" text-anchor="start" fill="#2E4053" font-size="24px" font-weight="bold">The Use of Quantifiers</text>

  <section class="section" data-narration="Introduction to Quantifiers">
    <rect x="20" y="50" width="380" height="80" style="fill: #F7F7F7"/>
    <text x="40" y="60" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Quantifiers are logical operators used to express the scope of a predicate over a set of objects.</text>
  </section>

  <section class="section" data-narration="Types of Quantifiers">
    <rect x="20" y="130" width="380" height="80" style="fill: #F7F7F7"/>
    <rect x="120" y="130" width="20" height="80" style="fill: none; stroke: #FFC107; stroke-width: 2;"/>
    <text x="140" y="160" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Universal Quantifier (∀)</text>
    <text x="220" y="160" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Existential Quantifier (∃)</text>
    <rect x="300" y="130" width="20" height="80" style="fill: none; stroke: #FFC107; stroke-width: 2;"/>
    <text x="320" y="160" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Co-Universal Quantifier (∀\*)</text>
    <text x="400" y="160" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Inter-Universal Quantifier (∃\*)</text>
  </section>

  <section class="section" data-narration="Universal Quantifier (∀)">
    <rect x="20" y="220" width="380" height="80" style="fill: #F7F7F7"/>
    <rect x="20" y="230" width="20" height="80" style="fill: none; stroke: #FFC107; stroke-width: 2;"/>
    <text x="40" y="250" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">∀x P(x) means "P(x) is true for all x in the domain."</text>
    <rect x="20" y="260" width="20" height="80" style="fill: none; stroke: #FFC107; stroke-width: 2;"/>
    <text x="40" y="280" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">∀x x > 0 means "x is greater than 0 for all x."</text>
  </section>

  <section class="section" data-narration="Existential Quantifier (∃)">
    <rect x="20" y="320" width="380" height="80" style="fill: #F7F7F7"/>
    <rect x="20" y="330" width="20" height="80" style="fill: none; stroke: #FFC107; stroke-width: 2;"/>
    <text x="40" y="350" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">∃x P(x) means "P(x) is true for at least one x in the domain."</text>
    <rect x="20" y="360" width="20" height="80" style="fill: none; stroke: #FFC107; stroke-width: 2;"/>
    <text x="40" y="380" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">∃x x = 5 means "there exists an x such that x is equal to 5"</text>
  </section>

  <section class="section" data-narration="Other Quantifiers">
    <rect x="20" y="410" width="380" height="80" style="fill: #F7F7F7"/>
    <rect x="120" y="410" width="20" height="80" style="fill: none; stroke: #FFC107; stroke-width: 2;"/>
    <text x="140" y="430" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Co-Universal Quantifier (∀\*)</text>
    <text x="220" y="430" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Inter-Universal Quantifier (∃\*)</text>
    <rect x="300" y="410" width="20" height="80" style="fill: none; stroke: #FFC107; stroke-width: 2;"/>
    <text x="320" y="430" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">∀\*(x ≠ a) P(x) means "P(x) is true for all x, except for x = a"</text>
    <text x="400" y="430" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">∃\*(x ≠ a) P(x) means "P(x) is true for at least one x, but not for x = a"</text>
  </section>

  <rect x="20" y="460" width="380" height="40" style="fill: #F7F7F7"/>
  <text x="40" y="470" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Animations: </text>
  <rect x="20" y="490" width="380" height="40" style="fill: #F7F7F7"/>
  <text x="40" y="500" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Title: The Use of Quantifiers</text>
  <text x="20" y="520" text-anchor="start" fill="#2E4053" font-size="16px" font-weight="normal">Footer: &copy; 2023</text>

</svg>