<svg width="420" height="400" data-topic-id="logic-equivalence-the-laws-of-logic">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b2fffc" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <g transform="translate(10, 20)">
    <text x="50%" y="40%" font-size="24" font-family="Arial" font-weight="bold">
      Logic Equivalence – The Laws of Logic
    </text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(10, 60)">
    <rect width="380" height="20" fill="#fff"/>
    <text x="10" y="25%" font-size="16" font-family="Arial">
      Logic Equivalence is a fundamental concept in discrete mathematical structures, specifically in the field of logic.
    </text>
    <path d="M 10 25 L 40 25" stroke="#000" stroke-width="2" fill="none"/>
    <path d="M 10 25 L 40 25" stroke="#0a0" stroke-width="1" fill="none" data-narration="Logic Equivalence is a binary relation between two statements, denoted as A ≡ B, which means that A and B have the same truth value under all possible interpretations." data-topic-id="logic-equivalence-the-laws-of-logic">
      <animateTransform begin="0s" dur="10s" transform="rotate(360deg)"/>
    </path>
  </g>
  
  <!-- Section 2: The Law of Identity -->
  <g transform="translate(10, 90)">
    <rect width="380" height="20" fill="#fff"/>
    <text x="10" y="25%" font-size="16" font-family="Arial">
      The Law of Identity states that a statement is always logically equivalent to itself.
    </text>
    <path d="M 10 25 L 40 25" stroke="#000" stroke-width="2" fill="none"/>
    <path d="M 10 25 L 40 25" stroke="#0a0" stroke-width="1" fill="none" data-narration="A ≡ A" data-topic-id="logic-equivalence-the-laws-of-logic">
      <animateTransform begin="0s" dur="10s" transform="rotate(360deg)"/>
    </path>
  </g>
  
  <!-- Section 3: The Law of Commutativity -->
  <g transform="translate(10, 130)">
    <rect width="380" height="20" fill="#fff"/>
    <text x="10" y="25%" font-size="16" font-family="Arial">
      The Law of Commutativity states that the order of the statements does not affect their logical equivalence.
    </text>
    <path d="M 10 25 L 40 25" stroke="#000" stroke-width="2" fill="none"/>
    <path d="M 10 25 L 40 25" stroke="#0a0" stroke-width="1" fill="none" data-narration="A ≡ B" data-topic-id="logic-equivalence-the-laws-of-logic">
      <animateTransform begin="0s" dur="10s" transform="rotate(360deg)"/>
    </path>
  </g>
  
  <!-- Section 4: The Law of Associativity -->
  <g transform="translate(10, 170)">
    <rect width="380" height="20" fill="#fff"/>
    <text x="10" y="25%" font-size="16" font-family="Arial">
      The Law of Associativity states that the order in which we combine statements does not affect their logical equivalence.
    </text>
    <path d="M 10 25 L 40 25" stroke="#000" stroke-width="2" fill="none"/>
    <path d="M 10 25 L 40 25" stroke="#0a0" stroke-width="1" fill="none" data-narration="((A ≡ B) ≡ (C ≡ D))" data-topic-id="logic-equivalence-the-laws-of-logic">
      <animateTransform begin="0s" dur="10s" transform="rotate(360deg)"/>
    </path>
  </g>
  
  <!-- Section 5: The Law of Distributivity -->
  <g transform="translate(10, 210)">
    <rect width="380" height="20" fill="#fff"/>
    <text x="10" y="25%" font-size="16" font-family="Arial">
      The Law of Distributivity states that a statement is logically equivalent to a conjunction of statements.
    </text>
    <path d="M 10 25 L 40 25" stroke="#000" stroke-width="2" fill="none"/>
    <path d="M 10 25 L 40 25" stroke="#0a0" stroke-width="1" fill="none" data-narration="A ≡ (B ∧ C)" data-topic-id="logic-equivalence-the-laws-of-logic">
      <animateTransform begin="0s" dur="10s" transform="rotate(360deg)"/>
    </path>
  </g>
  
  <!-- Section 6: The Law of De Morgan -->
  <g transform="translate(10, 250)">
    <rect width="380" height="20" fill="#fff"/>
    <text x="10" y="25%" font-size="16" font-family="Arial">
      The Law of De Morgan states that a statement is logically equivalent to the negation of a conjunction.
    </text>
    <path d="M 10 25 L 40 25" stroke="#000" stroke-width="2" fill="none"/>
    <path d="M 10 25 L 40 25" stroke="#0a0" stroke-width="1" fill="none" data-narration="A ≡ ¬(B ∧ ¬B)" data-topic-id="logic-equivalence-the-laws-of-logic">
      <animateTransform begin="0s" dur="10s" transform="rotate(360deg)"/>
    </path>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 380)">
    <text x="50%" y="90%" font-size="16" font-family="Arial">
      Created with love for educational purposes.
    </text>
  </g>
</svg>