<svg width="420" height="400" data-topic-id="basic-connectives-and-truth-tables">
    <title>Basic Connectives and Truth Tables</title>
    <desc>Animated Educational SVG Diagram for Basic Connectives and Truth Tables</desc>
    <style>
        /* Add styles here */
        body {
            background: linear-gradient(135deg, #ab92fc, #a7c9f2);
            font-family: Arial, sans-serif;
        }
        .section {
            position: relative;
            display: inline-block;
            width: 100%;
            margin: 20px;
        }
        .section .title {
            font-size: 18px;
            font-weight: bold;
            color: #2f4f7f;
            margin-bottom: 10px;
        }
        .section .data-narration {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }
        .section .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: top left;
            font-size: 24px;
            font-weight: bold;
            color: #ff9800;
        }
        .section .connective {
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
    <rect x="10" y="10" width="400" height="350" style="fill: #f9f9f9;"/>
    <g id="basic-connectives">
        <rect x="10" y="50" width="350" height="150" style="fill: #f9f9f9;"/>
        <g transform="translate(20,60)">
            <text class="section title" data-narration="Basic Connectives">Basic Connectives</text>
            <text class="connective">Conjunction (AND)</text>
            <rect x="0" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="70" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="0" y="70" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="140" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="0" y="140" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="140" y="140" width="50" height="50" style="fill: #2f4f7f;"/>
            <g>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(50,50) 0 0;translate(100,100) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(0,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,0) 0 0;translate(0,70) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(140,0) 0 0;translate(70,70) 0 0;" repeatCount="indefinite"/>
            </g>
            <text class="arrow arrow-1" data-narration="Conjunction (AND) = T only when both P and Q are true"></text>
        </g>
    </g>
    <g id="disjunction">
        <rect x="10" y="210" width="350" height="150" style="fill: #f9f9f9;"/>
        <g transform="translate(20,260)">
            <text class="section title" data-narration="Disjunction">Disjunction</text>
            <text class="connective">Disjunction (OR)</text>
            <rect x="0" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="70" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="0" y="70" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="140" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="0" y="140" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="140" y="140" width="50" height="50" style="fill: #2f4f7f;"/>
            <g>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(50,50) 0 0;translate(100,100) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(0,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,0) 0 0;translate(0,70) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(140,0) 0 0;translate(70,70) 0 0;" repeatCount="indefinite"/>
            </g>
            <text class="arrow arrow-2" data-narration="Disjunction (OR) = T if either P or Q (or both) is true"></text>
        </g>
    </g>
    <g id="negation">
        <rect x="10" y="370" width="350" height="150" style="fill: #f9f9f9;"/>
        <g transform="translate(20,410)">
            <text class="section title" data-narration="Negation">Negation</text>
            <text class="connective">Negation (NOT)</text>
            <rect x="0" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="70" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <g>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(50,50) 0 0;translate(100,100) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
            </g>
            <text class="arrow arrow-3" data-narration="Negation (NOT) = T when P is false, and F when P is true"></text>
        </g>
    </g>
    <g id="implication">
        <rect x="10" y="490" width="350" height="150" style="fill: #f9f9f9;"/>
        <g transform="translate(20,530)">
            <text class="section title" data-narration="Implication">Implication</text>
            <text class="connective">Implication (IF-THEN)</text>
            <rect x="0" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="70" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="0" y="70" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="140" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="0" y="140" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="140" y="140" width="50" height="50" style="fill: #2f4f7f;"/>
            <g>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(50,50) 0 0;translate(100,100) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(0,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,0) 0 0;translate(0,70) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(140,0) 0 0;translate(70,70) 0 0;" repeatCount="indefinite"/>
            </g>
            <text class="arrow arrow-4" data-narration="Implication (IF-THEN) = F only when P is true and Q is false"></text>
        </g>
    </g>
    <g id="equivalence">
        <rect x="10" y="620" width="350" height="150" style="fill: #f9f9f9;"/>
        <g transform="translate(20,650)">
            <text class="section title" data-narration="Equivalence">Equivalence</text>
            <text class="connective">Equivalence</text>
            <rect x="0" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="70" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="0" y="70" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="140" y="0" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="0" y="140" width="50" height="50" style="fill: #2f4f7f;"/>
            <rect x="140" y="140" width="50" height="50" style="fill: #2f4f7f;"/>
            <g>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(50,50) 0 0;translate(100,100) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(0,70) 0 0;translate(140,140) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(70,0) 0 0;translate(0,70) 0 0;" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" values="translate(140,0) 0 0;translate(70,70) 0 0;" repeatCount="indefinite"/>
            </g>
            <text class="arrow arrow-5" data-narration="Equivalence = T if and only if P and Q have the same truth value"></text>
        </g>
    </g>
    <g id="footer">
        <text x="50%" y="50%" font-size="18px" font-weight="bold" text-anchor="middle" fill="#2f4f7f">Basic Connectives and Truth Tables</text>
    </g>
</svg>