<svg width="420" height="400" data-topic-id="Quantifiers" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#3498db">
    Quantifiers
  </text>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="quantifiers-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="1" />
      <stop offset="50%" stop-color="#4682b4" stop-opacity="1" />
      <stop offset="100%" stop-color="#4682b4" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="40" width="420" height="320" fill="url(#quantifiers-background)" opacity="0.8" />
  
  <!-- Section 1: Introduction -->
  <g data-narration="Introduction">
    <rect x="20" y="60" width="380" height="80" fill="#fff" rx="10" />
    <text x="50" y="70" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      What are Quantifiers?
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,100" dur="1000" begin="0s" />
  </g>
  
  <!-- Section 2: Definition of Quantifiers -->
  <g data-narration="Definition of Quantifiers">
    <rect x="20" y="160" width="380" height="80" fill="#fff" rx="10" />
    <text x="50" y="170" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Definition of Quantifiers
    </text>
    <text x="50" y="190" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Universal Quantifier (∀): for all
      <tspan x="50" y="210" font-size="18" font-family="Arial" fill="#666">∀</tspan> means "for all"
    </text>
    <text x="50" y="230" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Existential Quantifier (∃): there exists
      <tspan x="50" y="250" font-size="18" font-family="Arial" fill="#666">∃</tspan> means "there exists"
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,200" dur="1000" begin="0s" />
  </g>
  
  <!-- Section 3: Types of Quantifiers -->
  <g data-narration="Types of Quantifiers">
    <rect x="20" y="260" width="380" height="80" fill="#fff" rx="10" />
    <text x="50" y="270" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Types of Quantifiers
    </text>
    <rect x="20" y="290" width="100" height="30" fill="#fff" rx="5" />
    <text x="140" y="290" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Domain Quantifier
    </text>
    <rect x="20" y="320" width="100" height="30" fill="#fff" rx="5" />
    <text x="140" y="320" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Range Quantifier
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,270" to="0,290" dur="1000" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,290" to="0,320" dur="1000" begin="0s" />
  </g>
  
  <!-- Section 4: Universal Quantifier -->
  <g data-narration="Universal Quantifier">
    <rect x="20" y="360" width="380" height="80" fill="#fff" rx="10" />
    <text x="50" y="370" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Universal Quantifier (∀): for all
    </text>
    <text x="50" y="390" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Domain Quantifier: for all elements in the domain
      <tspan x="50" y="410" font-size="18" font-family="Arial" fill="#666">Domain (∀)</tspan>
    </text>
    <text x="50" y="430" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Range Quantifier: for all elements in the range
      <tspan x="50" y="450" font-size="18" font-family="Arial" fill="#666">Range (∀)</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,370" to="0,390" dur="1000" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,390" to="0,410" dur="1000" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,410" to="0,430" dur="1000" begin="0s" />
  </g>
  
  <!-- Section 5: Existential Quantifier -->
  <g data-narration="Existential Quantifier">
    <rect x="20" y="440" width="380" height="80" fill="#fff" rx="10" />
    <text x="50" y="450" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Existential Quantifier (∃): there exists
    </text>
    <text x="50" y="470" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Domain Quantifier: there exists an element in the domain
      <tspan x="50" y="490" font-size="18" font-family="Arial" fill="#666">Domain (∃)</tspan>
    </text>
    <text x="50" y="520" font-size="18" font-family="Arial" fill="#333" text-anchor="middle">
      Range Quantifier: there exists an element in the range
      <tspan x="50" y="540" font-size="18" font-family="Arial" fill="#666">Range (∃)</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,450" to="0,470" dur="1000" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,470" to="0,490" dur="1000" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,490" to="0,510" dur="1000" begin="0s" />
  </g>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#666">
    Created with love for learning
  </text>
</svg>