<svg width="420" height="400" data-topic-id="the-principle-of-inclusion-and-exclusion">
  <desc>The Principle of Inclusion and Exclusion</desc>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A88BC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#32A5F7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      background: url(#grad) no-repeat;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
  </style>
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle">The Principle of Inclusion and Exclusion</text>
  <rect x="50%" y="80%" width="320" height="200" rx="10" fill="#F7F7F7"/>
  <rect x="50%" y="300%" width="320" height="100" rx="10" fill="#F7F7F7"/>
  <g transform="translate(50%, 350%)">
    <rect width="40" height="20" rx="5" fill="#FFC107" transform="rotate(45 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Counting individual sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="45 20 10" dur="2s" begin="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A| + |B| + ... + |N|</text>
  </g>
  <g transform="translate(50%, 200%)">
    <rect width="40" height="20" rx="5" fill="#03A9F4" transform="rotate(90 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Counting intersections of two sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="90 20 10" dur="2s" begin="2s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B| + |A ∩ C| + ... + |N-1 ∩ N|</text>
  </g>
  <g transform="translate(50%, 100%)">
    <rect width="40" height="20" rx="5" fill="#03A9F4" transform="rotate(135 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Counting intersections of three sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="135 20 10" dur="2s" begin="4s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B ∩ C| + |A ∩ B ∩ D| + ... + |N-2 ∩ N-1 ∩ N|</text>
  </g>
  <g transform="translate(50%, 0%)">
    <rect width="40" height="20" rx="5" fill="#03A9F4" transform="rotate(180 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Counting intersections of all sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="180 20 10" dur="2s" begin="6s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B ∩ C ∩ D| + ... + |N-3 ∩ N-2 ∩ N-1 ∩ N|</text>
  </g>
  <g transform="translate(50%, 250%)">
    <rect width="40" height="20" rx="5" fill="#FFC107" transform="rotate(225 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">The Principle of Inclusion and Exclusion</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="225 20 10" dur="2s" begin="8s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A1 ∪ A2 ∪ ... ∪ An| = Σ(-1)^(i1 + i2 + ... + in) |A1 ∩ A2 ∩ ... ∩ Ai|</text>
  </g>
  <g transform="translate(50%, 350%)">
    <rect width="40" height="20" rx="5" fill="#03A9F4" transform="rotate(270 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Generalizing to any number of sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="270 20 10" dur="2s" begin="10s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∪ B ∪ ... ∪ N| = |A| + |B| + ... + |N| - |A ∩ B| - ... - |N-1 ∩ N| + |A ∩ B ∩ C| + ... + |N-2 ∩ N-1 ∩ N| - ... + (-1)^(N-1) |A ∩ B ∩ ... ∩ N|</text>
  </g>
  <g transform="translate(50%, 400%)">
    <rect width="40" height="20" rx="5" fill="#FFC107" transform="rotate(315 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Derangements</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="315 20 10" dur="2s" begin="12s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">A derangement is a permutation of the elements of a set, such that no element appears in its original position</text>
  </g>
  <rect x="50%" y="450%" width="320" height="100" rx="10" fill="#F7F7F7"/>
  <text x="50%" y="460%" font-size="24" font-weight="bold" text-anchor="middle">Educational Diagram</text>
  <g transform="translate(50%, 480%)">
    <rect width="40" height="20" rx="5" fill="#03A9F4" transform="rotate(0 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Counting individual sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="0 20 10" dur="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A| + |B| + ... + |N|</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="0 20 10" dur="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B| + |A ∩ C| + ... + |N-1 ∩ N|</text>
  </g>
  <g transform="translate(50%, 500%)">
    <rect width="40" height="20" rx="5" fill="#03A9F4" transform="rotate(90 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Counting intersections of two sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="90 20 10" dur="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B| + |A ∩ C| + ... + |N-1 ∩ N|</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="90 20 10" dur="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B ∩ C| + |A ∩ B ∩ D| + ... + |N-2 ∩ N-1 ∩ N|</text>
  </g>
  <g transform="translate(50%, 600%)">
    <rect width="40" height="20" rx="5" fill="#03A9F4" transform="rotate(135 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Counting intersections of three sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="135 20 10" dur="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B ∩ C| + |A ∩ B ∩ D| + ... + |N-2 ∩ N-1 ∩ N|</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="135 20 10" dur="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B ∩ C ∩ D| + ... + |N-3 ∩ N-2 ∩ N-1 ∩ N|</text>
  </g>
  <g transform="translate(50%, 700%)">
    <rect width="40" height="20" rx="5" fill="#03A9F4" transform="rotate(180 20 10)"/>
    <text x="10" y="15" font-size="16" text-anchor="middle">Counting intersections of all sets</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="180 20 10" dur="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">|A ∩ B ∩ C ∩ D| + ... + |N-3 ∩ N-2 ∩ N-1 ∩ N|</text>
    <animateTransform attributeName="transform" type="rotate" from="0 20 10" to="180 20 10" dur="0s"/>
    <text x="10" y="25" font-size="16" text-anchor="middle">(-1)^(N-1) |A ∩ B ∩ ... ∩ N|</text>
  </g>
</svg>