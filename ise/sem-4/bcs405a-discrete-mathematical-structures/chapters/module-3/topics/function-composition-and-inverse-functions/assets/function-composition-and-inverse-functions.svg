<svg width="420" height="400" data-topic-id="function-composition-and-inverse-functions">
  <style>
    /* Add some basic styling to our SVG */
    body {
      background-image: linear-gradient(to bottom, #455A64, #4E5154);
      color: #fff;
      font-family: Arial, sans-serif;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10"/>
  <text x="180" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#fff">Function Composition and Inverse Functions</text>
  <section data-narration="Introduction">
    <rect x="20" y="50" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="70" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">In the study of discrete mathematical structures, functions play a crucial role in describing relationships between variables.</text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
  </section>
  <section data-narration="Definitions">
    <rect x="20" y="120" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="140" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      Given two functions f and g, the function composition is defined as (f ∘ g)(x) = f(g(x)).
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
    <rect x="20" y="190" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="210" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      A function f is said to be invertible if it has an inverse function f^(-1), denoted as f^(-1)(x) = y, such that f(f^(-1)(x)) = f^(-1)(f(x)) = x.
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
  </section>
  <section data-narration="Properties of Function Composition">
    <rect x="20" y="280" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="300" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      Function composition is associative, meaning that (f ∘ g) ∘ h = f ∘ (g ∘ h) for any functions f, g, and h.
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
    <rect x="20" y="350" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="370" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      The identity function i(x) = x acts as the identity for composition.
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
  </section>
  <section data-narration="Composition of Inverse Functions">
    <rect x="20" y="420" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="440" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      If f is invertible, then the composition of f with its inverse is the identity function, i.e., (f ∘ f^(-1))(x) = f(f^(-1)(x)) = x.
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
  </section>
  <section data-narration="Example 1: Function Composition">
    <rect x="20" y="490" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="510" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      Let f(x) = 2x and g(x) = x + 1. Find (f ∘ g)(x).
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
    <text x="50" y="530" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      (f ∘ g)(x) = f(g(x)) = f(x + 1) = 2(x + 1) = 2x + 2
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
  </section>
  <section data-narration="Example 2: Inverse Function">
    <rect x="20" y="570" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="590" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      Let f(x) = x^2. Find the inverse function f^(-1).
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
    <text x="50" y="610" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      To find the inverse of f, we need to solve the equation y = x^2 for x. Taking the square root of both sides, we get x = ±√y. Since f is a function, we can assume that x is always non-negative, so x = √y. Therefore, f^(-1)(y) = √y.
    </text>
    <animate dur="2000" begin="0s" attributeName="opacity" attributeNameValue="#fff" attributeName2="fill" attributeName2Value="#ccc" repeatCount="indefinite"/>
  </section>
  <footer>
    <rect x="20" y="640" width="380" height="50" fill="#fff" rx="10"/>
    <text x="50" y="660" font-size="18" font-family="Arial" text-anchor="middle" fill="#000">
      This diagram illustrates the concepts of function composition and inverse functions.
    </text>
  </footer>
</svg>