<svg width="420" height="400" data-topic-id="Functions-Plain-And-One-To-One">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    rect {
      fill: url(#pastel-gradient);
    }
    text {
      font-family: Arial, sans-serif;
      font-size: 18px;
      color: #000;
    }
    g {
      stroke: #3498db;
      stroke-width: 2;
      fill: none;
    }
  </style>
  <g id="plain-functions">
    <rect x="20" y="20" width="380" height="350"/>
    <path d="M 50, 100 L 70, 150" stroke="#3498db" stroke-width="2"/>
    <text x="50" y="120" data-narration="Plain Functions: A relation from A to B">Plain Functions</text>
    <path d="M 80, 120 L 110, 150" stroke="#3498db" stroke-width="2"/>
    <text x="90" y="140" data-narration="Definition: Every element of A is related to exactly one element of B">Definition</text>
    <path d="M 100, 140 L 130, 170" stroke="#3498db" stroke-width="2"/>
    <text x="110" y="160" data-narration="Examples: f: {1, 2, 3} → {a, b, c}, where f(1) = a, f(2) = b, and f(3) = c">Examples</text>
  </g>
  <g id="one-to-one-functions">
    <rect x="20" y="20" width="380" height="350"/>
    <path d="M 50, 100 L 70, 150" stroke="#3498db" stroke-width="2"/>
    <text x="50" y="120" data-narration="One-to-One Functions: For every element in the domain, there is exactly one related element in the codomain">One-to-One Functions</text>
    <path d="M 80, 120 L 110, 150" stroke="#3498db" stroke-width="2"/>
    <text x="90" y="140" data-narration="Definition: A function f: A → B is one-to-one if and only if for every x and y in A, if f(x) = f(y), then x = y">Definition</text>
    <path d="M 100, 140 L 130, 170" stroke="#3498db" stroke-width="2"/>
    <text x="110" y="160" data-narration="Examples: f: {1, 2, 3} → {a, b, c}, where f(1) = a, f(2) = b, and f(3) = c; h: {x, y} → {0, 1}, where h(x) = 0 and h(y) = 1">Examples</text>
  </g>
  <g id="injections-and-surjections">
    <rect x="20" y="20" width="380" height="350"/>
    <path d="M 50, 100 L 70, 150" stroke="#3498db" stroke-width="2"/>
    <text x="50" y="120" data-narration="Injective, Surjective, and Bijective Functions">Injective, Surjective, and Bijective Functions</text>
    <path d="M 80, 120 L 110, 150" stroke="#3498db" stroke-width="2"/>
    <text x="90" y="140" data-narration="Injective: A function is injective if it is one-to-one">Injective</text>
    <path d="M 100, 140 L 130, 170" stroke="#3498db" stroke-width="2"/>
    <text x="110" y="160" data-narration="Surjective: A function is surjective if every element in the codomain is related to at least one element in the domain">Surjective</text>
    <path d="M 120, 160 L 140, 190" stroke="#3498db" stroke-width="2"/>
    <text x="130" y="180" data-narration="Bijective: A function is bijective if it is both injective and surjective">Bijective</text>
  </g>
  <g id="vertical-align">
    <rect x="20" y="20" width="380" height="350"/>
    <path d="M 50, 100 L 70, 150" stroke="#3498db" stroke-width="2"/>
    <text x="50" y="120" data-narration="In SVG, use the 'y1' and 'y2' attributes to change the vertical position">In SVG, use the 'y1' and 'y2' attributes to change the vertical position</text>
    <path d="M 80, 120 L 110, 150" stroke="#3498db" stroke-width="2"/>
    <text x="90" y="140" data-narration="You can also use the 'y' attribute to change the vertical position">You can also use the 'y' attribute to change the vertical position</text>
  </g>
  <g id="arrow-markers">
    <rect x="20" y="20" width="380" height="350"/>
    <path d="M 50, 100 L 60, 130" stroke="#3498db" stroke-width="2"/>
    <text x="55" y="125" data-narration="Arrow markers can be used to connect elements"><tspan x="60" y="140">Arrow markers</tspan></text>
    <path d="M 100, 120 L 110, 150" stroke="#3498db" stroke-width="2"/>
    <text x="105" y="140" data-narration="Use the 'marker' attribute to specify the marker type">Use the 'marker' attribute to specify the marker type</text>
  </g>
  <text x="20" y="20" data-topic-id="Functions-Plain-And-One-To-One">Functions: Plain and One-to-One</text>
  <text x="20" y="380" data-topic-id="Functions-Plain-And-One-To-One">Functions: Plain and One-to-One</text>
</svg>