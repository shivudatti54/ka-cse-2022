<svg width="420" height="400" data-topic-id="cartesian-products-and-relations">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <text x="180" y="20" font-size="24" font-family="Arial" fill="#2E4053">Cartesian Products and Relations</text>
  <section data-narration="Introduction" data-y="100">
    <text x="60" y="150" font-size="18" font-family="Arial" fill="#2E4053">In discrete mathematical structures, a Cartesian product and a relation are fundamental concepts used to describe and analyze relationships between sets. In this study material, we will explore the definitions, properties, and applications of Cartesian products and relations.</text>
  </section>
  <section data-narration="Definition" data-y="230" style="margin-bottom: 20">
    <text x="60" y="300" font-size="18" font-family="Arial" fill="#2E4053">A Cartesian product of two sets A and B, denoted by A × B, is the set of all ordered pairs (a, b) where a ∈ A and b ∈ B.</text>
    <text x="60" y="320" font-size="18" font-family="Arial" fill="#2E4053">A × B = {(a, b) | a ∈ A, b ∈ B}</text>
  </section>
  <section data-narration="Example" data-y="330" style="margin-bottom: 20">
    <text x="60" y="400" font-size="18" font-family="Arial" fill="#2E4053">Let A = {1, 2, 3} and B = {a, b, c}. Then, A × B = {(1, a), (1, b), (1, c), (2, a), (2, b), (2, c), (3, a), (3, b), (3, c)}</text>
  </section>
  <section data-narration="Properties" data-y="430" style="margin-bottom: 20">
    <text x="60" y="450" font-size="18" font-family="Arial" fill="#2E4053">A × ∅ = ∅</text>
    <text x="60" y="470" font-size="18" font-family="Arial" fill="#2E4053">(A × B) × C = A × (B × C)</text>
    <text x="60" y="490" font-size="18" font-family="Arial" fill="#2E4053">The Cartesian product is commutative: A × B = B × A</text>
  </section>
  <section data-narration="Relation" data-y="530" style="margin-bottom: 20">
    <text x="60" y="550" font-size="18" font-family="Arial" fill="#2E4053">A relation from set A to set B, denoted by R, is a subset of the Cartesian product A × B.</text>
    <text x="60" y="570" font-size="18" font-family="Arial" fill="#2E4053">R ⊆ A × B</text>
  </section>
  <section data-narration="Types of Relations" data-y="630" style="margin-bottom: 20">
    <text x="60" y="650" font-size="18" font-family="Arial" fill="#2E4053">- Equivalence relation: reflexive, symmetric, and transitive</text>
    <text x="60" y="670" font-size="18" font-family="Arial" fill="#2E4053">- Partial order: reflexive, transitive, and antisymmetric</text>
    <text x="60" y="690" font-size="18" font-family="Arial" fill="#2E4053">- Function: a relation that is both injective and surjective</text>
  </section>
  <section data-narration="Key Concepts" data-y="750" style="margin-bottom: 20">
    <text x="60" y="770" font-size="18" font-family="Arial" fill="#2E4053">- Domain (A): the set of all first elements in the relation</text>
    <text x="60" y="790" font-size="18" font-family="Arial" fill="#2E4053">- Range (B): the set of all second elements in the relation</text>
    <text x="60" y="810" font-size="18" font-family="Arial" fill="#2E4053">- Image: the set of all second elements in the relation</text>
    <text x="60" y="830" font-size="18" font-family="Arial" fill="#2E4053">- Pre-image: the set of all first elements in the relation</text>
  </section>
  <section data-narration="Applications" data-y="930" style="margin-bottom: 20">
    <text x="60" y="950" font-size="18" font-family="Arial" fill="#2E4053">- Graph theory: relations are used to represent edges and vertices in graphs</text>
    <text x="60" y="970" font-size="18" font-family="Arial" fill="#2E4053">- Database management: relations are used to organize and store data</text>
    <text x="60" y="990" font-size="18" font-family="Arial" fill="#2E4053">- Computer science: relations are used in algorithms and data structures</text>
  </section>
  <footer>
    <text x="180" y="390" font-size="18" font-family="Arial" fill="#2E4053">Copyright 2023</text>
  </footer>
</svg>