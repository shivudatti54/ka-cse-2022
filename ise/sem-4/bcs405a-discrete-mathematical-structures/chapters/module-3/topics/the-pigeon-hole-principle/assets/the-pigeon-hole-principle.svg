<svg width="420" height="400" data-topic-id="pigeon-hole-principle" xmlns="http://www.w3.org/2000/svg">
  <title>The Pigeon Hole Principle</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="50%" stop-color="#A1C9F2"/>
      <stop offset="100%" stop-color="#C7B8EA"/>
    </linearGradient>
    <linearGradient id="indigo-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B3F54"/>
      <stop offset="50%" stop-color="#4C6EF7"/>
      <stop offset="100%" stop-color="#3B3F54"/>
    </linearGradient>
    <linearGradient id="teal-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0097A7"/>
      <stop offset="50%" stop-color="#34A85A"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
  </defs>
  <rect width="420" height="400" fill="url(#pastel-gradient)"/>
  <rect x="10" y="10" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="40" font-size="24" font-family="Arial, sans-serif" fill="#333333">The Pigeon Hole Principle</text>
  <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" fill="#333333">Software Design Principles</text>
  <rect x="10" y="90" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" fill="#333333">S - Single Responsibility Principle</text>
  <section data-narration="S - Single Responsibility Principle">
    <rect x="10" y="150" width="100" height="50" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
    <text x="120" y="170" font-size="14" font-family="Arial, sans-serif" fill="#333333">One class = one job</text>
    <animate transform="rotate(360 180 180)" begin="0s" dur="2s"/>
  </section>
  <section data-narration="O - Open/Closed Principle">
    <rect x="10" y="200" width="100" height="50" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
    <text x="120" y="220" font-size="14" font-family="Arial, sans-serif" fill="#333333">Open for extension, closed for modification</text>
    <animate transform="rotate(360 180 180)" begin="2s" dur="2s"/>
  </section>
  <section data-narration="L - Liskov Substitution Principle">
    <rect x="10" y="250" width="100" height="50" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
    <text x="120" y="270" font-size="14" font-family="Arial, sans-serif" fill="#333333">Subtypes must be substitutable for base types</text>
    <animate transform="rotate(360 180 180)" begin="4s" dur="2s"/>
  </section>
  <section data-narration="I - Interface Segregation Principle">
    <rect x="10" y="300" width="100" height="50" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
    <text x="120" y="320" font-size="14" font-family="Arial, sans-serif" fill="#333333">Clients should not depend on interfaces they don't use</text>
    <animate transform="rotate(360 180 180)" begin="6s" dur="2s"/>
  </section>
  <section data-narration="D - Dependency Inversion Principle">
    <rect x="10" y="350" width="100" height="50" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
    <text x="120" y="370" font-size="14" font-family="Arial, sans-serif" fill="#333333">Depend on abstractions, not concretions</text>
    <animate transform="rotate(360 180 180)" begin="8s" dur="2s"/>
  </section>
  <rect x="10" y="400" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" fill="#333333">DRY - Don't Repeat Yourself</text>
  <rect x="10" y="450" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="470" font-size="18" font-family="Arial, sans-serif" fill="#333333">KISS - Keep It Simple, Stupid</text>
  <rect x="10" y="510" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="530" font-size="18" font-family="Arial, sans-serif" fill="#333333">YAGNI - You Ain't Gonna Need It</text>
  <rect x="10" y="570" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="590" font-size="18" font-family="Arial, sans-serif" fill="#333333">Coupling & Cohesion</text>
  <rect x="10" y="630" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="650" font-size="18" font-family="Arial, sans-serif" fill="#333333">Low Coupling</text>
  <rect x="10" y="690" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="710" font-size="18" font-family="Arial, sans-serif" fill="#333333">High Cohesion</text>
  <rect x="10" y="750" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="770" font-size="18" font-family="Arial, sans-serif" fill="#333333">Interactive Diagram</text>
  <text x="20" y="830" font-size="24" font-family="Arial, sans-serif" fill="#333333">Arrow markers for connections</text>
  <rect x="10" y="870" width="400" height="30" fill="#FFFFFF" rx="5" stroke="#333333" stroke-width="1"/>
  <text x="20" y="890" font-size="18" font-family="Arial, sans-serif" fill="#333333">This is an educational and visually clear diagram</text>
</svg>