<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="Onto-Functions">
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4f69b4" stop-opacity="1" />
            <stop offset="100%" stop-color="#3b4f9e" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
    
    <!-- Title -->
    <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3b4f9e">Onto Functions</text>
    
    <!-- Section 1: Loss vs Cost -->
    <g transform="translate(50, 100)">
        <rect x="0" y="0" width="300" height="60" fill="#f7f7f7" rx="10" />
        <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#4f69b4">Loss vs Cost</text>
        <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#4f69b4">Error for a single example vs average error</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="2s" begin="0s" repeatCount="1" />
    </g>
    
    <!-- Section 2: Desirable Properties -->
    <g transform="translate(50, 200)">
        <rect x="0" y="0" width="300" height="60" fill="#f7f7f7" rx="10" />
        <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#4f69b4">Desirable Properties</text>
        <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#4f69b4">- Differentiable, convex, bounded below, and appropriate scale</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="2s" begin="0s" repeatCount="1" />
    </g>
    
    <!-- Section 3: Regression Loss Functions -->
    <g transform="translate(50, 300)">
        <rect x="0" y="0" width="300" height="60" fill="#f7f7f7" rx="10" />
        <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#4f69b4">Regression Loss Functions</text>
        <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#4f69b4">- Mean Squared Error (MSE), Mean Absolute Error (MAE), Huber Loss</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="2s" begin="0s" repeatCount="1" />
    </g>
    
    <!-- Section 4: Classification Loss Functions -->
    <g transform="translate(50, 400)">
        <rect x="0" y="0" width="300" height="60" fill="#f7f7f7" rx="10" />
        <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#4f69b4">Classification Loss Functions</text>
        <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#4f69b4">- Binary Cross-Entropy (Log Loss), Categorical Cross-Entropy</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="2s" begin="0s" repeatCount="1" />
    </g>
    
    <!-- Footer -->
    <text x="50%" y="420" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#3b4f9e">Onto Functions</text>
</svg>