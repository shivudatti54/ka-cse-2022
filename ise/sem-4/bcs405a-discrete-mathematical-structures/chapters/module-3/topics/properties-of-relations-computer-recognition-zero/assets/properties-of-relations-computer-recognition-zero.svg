<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="50%" stop-color="#87CEEB" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    
    <!-- Title -->
    <text x="50" y="50" font-size="24" fill="#4B0082" stroke="#4B0082" stroke-width="2" text-anchor="middle">Properties Of Relations Computer Recognition Zero</text>
    
    <!-- Section 1: Properties of Relations -->
    <section id="properties-of-relations">
        <rect x="50" y="150" width="320" height="100" fill="#F7DC6F" rx="10"/>
        <text x="70" y="170" font-size="18" fill="#4B0082" text-anchor="middle" data-narration="A relation R on a set A is a subset of the Cartesian product A × A. The following are some important properties of relations: Reflexivity, Symmetry, Transitivity, Antisymmetry"></text>
        <animate transform="rotate(360 70 170)" begin="1s" dur="2s" repeatCount="indefinite"/>
        <path d="M 70 170 L 110 140" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 110 140 L 150 120" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 150 120 L 190 100" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
    </section>
    
    <!-- Section 2: Zero-One Matrices -->
    <section id="zero-one-matrices">
        <rect x="50" y="250" width="320" height="100" fill="#F7DC6F" rx="10"/>
        <text x="70" y="270" font-size="18" fill="#4B0082" text-anchor="middle" data-narration="A zero-one matrix is a matrix with all elements being either 0 or 1. It can be used to represent a relation R on a set A. The entry at row i and column j, denoted as R(i, j), is 1 if (i, j) ∈ R and 0 otherwise"></text>
        <animate transform="rotate(360 70 270)" begin="3s" dur="2s" repeatCount="indefinite"/>
        <path d="M 70 270 L 110 250" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 110 250 L 150 230" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 150 230 L 190 210" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
    </section>
    
    <!-- Section 3: Directed Graphs -->
    <section id="directed-graphs">
        <rect x="50" y="350" width="320" height="100" fill="#F7DC6F" rx="10"/>
        <text x="70" y="370" font-size="18" fill="#4B0082" text-anchor="middle" data-narration="A directed graph is a graph with directed edges. Each edge has a direction and can be represented using a zero-one matrix"></text>
        <animate transform="rotate(360 70 370)" begin="5s" dur="2s" repeatCount="indefinite"/>
        <path d="M 70 370 L 110 350" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 110 350 L 150 330" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 150 330 L 190 310" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
    </section>
    
    <!-- Section 4: Partial Orders -->
    <section id="partial-orders">
        <rect x="50" y="50" width="320" height="100" fill="#87CEEB" rx="10"/>
        <text x="70" y="70" font-size="18" fill="#4B0082" text-anchor="middle" data-narration="A partial order on a set A is a relation R that is reflexive, antisymmetric, and transitive. It can be represented using a Hasse diagram"></text>
        <animate transform="rotate(360 70 70)" begin="1s" dur="2s" repeatCount="indefinite"/>
        <path d="M 70 70 L 110 50" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 110 50 L 150 30" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 150 30 L 190 10" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
    </section>
    
    <!-- Section 5: Equivalence Relations -->
    <section id="equivalence-relations">
        <rect x="50" y="150" width="320" height="100" fill="#87CEEB" rx="10"/>
        <text x="70" y="170" font-size="18" fill="#4B0082" text-anchor="middle" data-narration="An equivalence relation on a set A is a relation R that is reflexive, symmetric, and transitive. The equivalence classes of an equivalence relation R on a set A are the sets {a ∈ A | (a, a) ∈ R} for all a ∈ A"></text>
        <animate transform="rotate(360 70 170)" begin="3s" dur="2s" repeatCount="indefinite"/>
        <path d="M 70 170 L 110 150" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 110 150 L 150 130" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 150 130 L 190 110" stroke="#4B0082" stroke-width="2" fill="none" stroke-linecap="round"/>
    </section>
    
    <!-- Footer -->
    <text x="50" y="380" font-size="18" fill="#4B0082" text-anchor="middle">Part of a Computer Science course on Relations</text>
</svg>