<svg width="420" height="400" data-topic-id="8-hours" xmlns="http://www.w3.org/2000/svg">
  <style>
    .section {
      position: relative;
      margin-bottom: 20px;
    }
    .section:after {
      content: attr(data-narration);
      position: absolute;
      bottom: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      color: #fff;
      z-index: 1;
      animation: fade-in 2s;
      animation-delay: calc(0.5s + (n * 0.5s));
    }
    @keyframes fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64B5F6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E9F4" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#grad)"/>
  <title>8 Hours</title>

  <section class="section" data-narration="Introduction to Relations and Functions">
    <rect x="10" y="10" width="400" height="80" fill="#90EEFF"/>
    <rect x="10" y="100" width="400" height="80" fill="#C7E9F4"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" dur="2s" begin="0s"/>
  </section>

  <section class="section" data-narration="Definition of a Relation">
    <rect x="10" y="10" width="400" height="80" fill="#D7F7F7"/>
    <rect x="10" y="100" width="400" height="80" fill="#F2FCF2"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" dur="2s" begin="0.5s"/>
  </section>

  <section class="section" data-narration="Types of Relations">
    <rect x="10" y="10" width="400" height="80" fill="#B3F2F7"/>
    <rect x="10" y="100" width="400" height="80" fill="#F7F2FF"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" dur="2s" begin="1s"/>
  </section>

  <section class="section" data-narration="Definition of a Function">
    <rect x="10" y="10" width="400" height="80" fill="#C9E4CA"/>
    <rect x="10" y="100" width="400" height="80" fill="#F2F3E6"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" dur="2s" begin="1.5s"/>
  </section>

  <section class="section" data-narration="Types of Functions">
    <rect x="10" y="10" width="400" height="80" fill="#F7F2FF"/>
    <rect x="10" y="100" width="400" height="80" fill="#B3F2F7"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2"/>
    <path d="M 50, 200 L 350, 200" stroke="#33CC33" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" dur="2s" begin="2.5s"/>
  </section>

  <footer>8 Hours - Relations and Functions</footer>
</svg>