<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="using-cookies">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Using Cookies in Java Servlets. Cookies are small pieces of data stored on the client browser and sent with every HTTP request to the server.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3949AB">Using Cookies in Servlets</text>
    <line x1="100" y1="37" x2="320" y2="37" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="140" y1="42" x2="280" y2="42" stroke="#00695C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Group 2: Cookie Lifecycle -->
  <g opacity="0" data-narration="The cookie lifecycle begins when the server creates a cookie and sends it in the HTTP response. The browser stores it locally. On subsequent requests, the browser automatically sends the cookie back to the server.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Cookie Lifecycle</text>
    <!-- Server box -->
    <rect x="15" y="70" width="80" height="32" fill="#3949AB" rx="5"/>
    <text x="55" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Server Creates</text>
    <!-- Arrow 1 -->
    <polygon points="97,82 105,86 97,90" fill="#3949AB"/>
    <!-- HTTP Response box -->
    <rect x="108" y="70" width="88" height="32" fill="#00695C" rx="5"/>
    <text x="152" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Sends in HTTP</text>
    <text x="152" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Response</text>
    <!-- Arrow 2 -->
    <polygon points="198,82 206,86 198,90" fill="#00695C"/>
    <!-- Browser Stores box -->
    <rect x="209" y="70" width="80" height="32" fill="#E65100" rx="5"/>
    <text x="249" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Browser</text>
    <text x="249" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Stores Cookie</text>
    <!-- Arrow 3 -->
    <polygon points="291,82 299,86 291,90" fill="#E65100"/>
    <!-- Sent with Request box -->
    <rect x="302" y="70" width="80" height="32" fill="#C62828" rx="5"/>
    <text x="342" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Sent with</text>
    <text x="342" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Next Request</text>
    <!-- Return arrow (curved) -->
    <path d="M 382,102 L 382,108 Q 382,114 376,114 L 44,114 Q 38,114 38,108 L 38,102" stroke="#C62828" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>
    <polygon points="35,104 38,112 41,104" fill="#C62828"/>
    <text x="210" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C62828">Server reads cookie from request</text>
  </g>

  <!-- Group 3: Creating Cookies -->
  <g opacity="0" data-narration="To create a cookie, instantiate a new Cookie object with a name and value. Set the max age in seconds using setMaxAge. Then add it to the HTTP response using response dot addCookie.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Creating Cookies</text>
    <!-- Code block background -->
    <rect x="30" y="140" width="360" height="58" fill="#1A237E" rx="6" opacity="0.92"/>
    <!-- Code lines -->
    <text x="40" y="155" font-family="Courier New, monospace" font-size="9.5" fill="#C5CAE9">// Step 1: Create cookie object</text>
    <text x="40" y="168" font-family="Courier New, monospace" font-size="9.5" fill="#81D4FA">Cookie c = </text>
    <text x="122" y="168" font-family="Courier New, monospace" font-size="9.5" fill="#A5D6A7">new Cookie("user","John");</text>
    <text x="40" y="181" font-family="Courier New, monospace" font-size="9.5" fill="#81D4FA">c.setMaxAge(</text>
    <text x="140" y="181" font-family="Courier New, monospace" font-size="9.5" fill="#FFCC80">3600</text>
    <text x="172" y="181" font-family="Courier New, monospace" font-size="9.5" fill="#81D4FA">);</text>
    <text x="190" y="181" font-family="Courier New, monospace" font-size="9.5" fill="#A5D6A7">response.addCookie(c);</text>
  </g>

  <!-- Group 4: Reading Cookies -->
  <g opacity="0" data-narration="To read cookies, call request dot getCookies which returns an array of Cookie objects. Iterate through the array using a for-each loop, and use getName and getValue methods to find the desired cookie.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Reading Cookies</text>
    <!-- Code block background -->
    <rect x="30" y="220" width="360" height="58" fill="#1B5E20" rx="6" opacity="0.88"/>
    <text x="40" y="235" font-family="Courier New, monospace" font-size="9" fill="#A5D6A7">Cookie[] cookies = request.getCookies();</text>
    <text x="40" y="248" font-family="Courier New, monospace" font-size="9" fill="#C8E6C9">for (Cookie c : cookies) {</text>
    <text x="52" y="261" font-family="Courier New, monospace" font-size="9" fill="#FFCC80">  if(c.getName().equals("user"))</text>
    <text x="52" y="274" font-family="Courier New, monospace" font-size="9" fill="#81D4FA">    out.print(c.getValue()); }</text>
  </g>

  <!-- Group 5: Cookie Properties Table -->
  <g opacity="0" data-narration="Cookies have several important properties. Name and Value identify the cookie. MaxAge sets expiration in seconds. Path and Domain control scope. The Secure flag restricts to HTTPS. HttpOnly prevents JavaScript access.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Cookie Properties</text>
    <!-- Table header -->
    <rect x="30" y="304" width="175" height="16" fill="#3949AB" rx="3"/>
    <text x="118" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Property</text>
    <rect x="205" y="304" width="185" height="16" fill="#3949AB" rx="3"/>
    <text x="298" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Purpose</text>
    <!-- Row 1 -->
    <rect x="30" y="320" width="175" height="14" fill="#E8EAF6" opacity="0.7"/>
    <text x="38" y="330" font-family="Arial, sans-serif" font-size="8" fill="#3949AB" font-weight="bold">Name / Value</text>
    <rect x="205" y="320" width="185" height="14" fill="#E8EAF6" opacity="0.7"/>
    <text x="213" y="330" font-family="Arial, sans-serif" font-size="8" fill="#1A237E">Key-value pair identifying the cookie</text>
    <!-- Row 2 -->
    <rect x="30" y="334" width="175" height="14" fill="white" opacity="0.5"/>
    <text x="38" y="344" font-family="Arial, sans-serif" font-size="8" fill="#00695C" font-weight="bold">MaxAge</text>
    <rect x="205" y="334" width="185" height="14" fill="white" opacity="0.5"/>
    <text x="213" y="344" font-family="Arial, sans-serif" font-size="8" fill="#1A237E">Expiry in seconds (-1 = session only)</text>
    <!-- Row 3 -->
    <rect x="30" y="348" width="175" height="14" fill="#E8EAF6" opacity="0.7"/>
    <text x="38" y="358" font-family="Arial, sans-serif" font-size="8" fill="#E65100" font-weight="bold">Path / Domain</text>
    <rect x="205" y="348" width="185" height="14" fill="#E8EAF6" opacity="0.7"/>
    <text x="213" y="358" font-family="Arial, sans-serif" font-size="8" fill="#1A237E">Controls cookie visibility scope</text>
    <!-- Row 4 -->
    <rect x="30" y="362" width="175" height="14" fill="white" opacity="0.5"/>
    <text x="38" y="372" font-family="Arial, sans-serif" font-size="8" fill="#C62828" font-weight="bold">Secure / HttpOnly</text>
    <rect x="205" y="362" width="185" height="14" fill="white" opacity="0.5"/>
    <text x="213" y="372" font-family="Arial, sans-serif" font-size="8" fill="#1A237E">HTTPS only / No JavaScript access</text>
  </g>

  <!-- Group 6: Session vs Persistent & Limits -->
  <g opacity="0" data-narration="Session cookies have no MaxAge set and are deleted when the browser closes. Persistent cookies have a defined MaxAge and survive browser restarts. Remember the four KB size limit per cookie, and always use HttpOnly and Secure flags for security.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <!-- Session cookie badge -->
    <rect x="15" y="382" width="110" height="14" fill="#00695C" rx="7"/>
    <text x="70" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white" font-weight="bold">Session Cookie</text>
    <!-- Persistent cookie badge -->
    <rect x="132" y="382" width="110" height="14" fill="#3949AB" rx="7"/>
    <text x="187" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white" font-weight="bold">Persistent Cookie</text>
    <!-- Limit badge -->
    <rect x="249" y="382" width="70" height="14" fill="#C62828" rx="7"/>
    <text x="284" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white" font-weight="bold">4KB Limit</text>
    <!-- Security badge -->
    <rect x="326" y="382" width="82" height="14" fill="#E65100" rx="7"/>
    <text x="367" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white" font-weight="bold">HttpOnly+Secure</text>
  </g>
</svg>
