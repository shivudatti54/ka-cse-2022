<svg width="420" height="400" data-topic-id="advanced-java servlets-education">
    <title>Text Book 1 Ch 36 Text Book 2 Ch 11</title>
    <footer>Education</footer>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFA07A" stop-opacity="1"/>
            <stop offset="100%" stop-color="#FFC107" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="10" y="20" width="400" height="350" fill="url(#pastel-gradient)"/>
    <text x="15" y="50" font-size="24" font-family="Arial" fill="#2E4053">Servlets</text>
    <section data-narration="Background">
        <rect x="10" y="80" width="350" height="100" fill="white"/>
        <text x="15" y="90" font-size="18" font-family="Arial" fill="#2E4053">What are Servlets?</text>
        <rect x="10" y="110" width="340" height="1" fill="#C5E1F5"/>
        <text x="15" y="112" font-size="18" font-family="Arial" fill="#2E4053">A servlet is a small Java program that runs on a web server.</text>
        <rect x="10" y="132" width="340" height="1" fill="#C5E1F5"/>
        <text x="15" y="134" font-size="18" font-family="Arial" fill="#2E4053">Servlets are the primary component of the Java Servlet Technology.</text>
        <animate attributeName="opacity" from="1" to="0" dur="2000" fill="freeze" begin="1000"/>
    </section>
    <section data-narration="Life Cycle">
        <rect x="10" y="240" width="350" height="100" fill="white"/>
        <text x="15" y="250" font-size="18" font-family="Arial" fill="#2E4053">What is the Life Cycle of a Servlet?</text>
        <rect x="10" y="270" width="340" height="1" fill="#C5E1F5"/>
        <text x="15" y="272" font-size="18" font-family="Arial" fill="#2E4053">The life cycle of a servlet refers to the sequence of events that a servlet goes through.</text>
        <rect x="10" y="292" width="340" height="1" fill="#C5E1F5"/>
        <text x="15" y="294" font-size="18" font-family="Arial" fill="#2E4053">The phases of the servlet life cycle include load, init, service, and destroy.</text>
        <animate attributeName="opacity" from="1" to="0" dur="2000" fill="freeze" begin="3000"/>
    </section>
    <section data-narration="Servlets and Java Servlet Technology">
        <rect x="10" y="380" width="350" height="100" fill="white"/>
        <text x="15" y="390" font-size="18" font-family="Arial" fill="#2E4053">Servlets and Java Servlet Technology</text>
        <rect x="10" y="410" width="340" height="1" fill="#C5E1F5"/>
        <text x="15" y="412" font-size="18" font-family="Arial" fill="#2E4053">Servlets are a fundamental component of Java-based web applications.</text>
        <rect x="10" y="432" width="340" height="1" fill="#C5E1F5"/>
        <text x="15" y="434" font-size="18" font-family="Arial" fill="#2E4053">The Java Servlet Technology provides a framework for developing web applications.</text>
        <animate attributeName="opacity" from="1" to="0" dur="2000" fill="freeze" begin="4000"/>
    </section>
    <section data-narration="History of Servlets">
        <rect x="10" y="520" width="350" height="100" fill="white"/>
        <text x="15" y="530" font-size="18" font-family="Arial" fill="#2E4053">History of Servlets</text>
        <rect x="10" y="560" width="340" height="1" fill="#C5E1F5"/>
        <text x="15" y="562" font-size="18" font-family="Arial" fill="#2E4053">The concept of servlets was first introduced in the late 1990s by Sun Microsystems.</text>
        <rect x="10" y="582" width="340" height="1" fill="#C5E1F5"/>
        <text x="15" y="584" font-size="18" font-family="Arial" fill="#2E4053">The first version of the Java Servlet API was released in 1999.</text>
        <animate attributeName="opacity" from="1" to="0" dur="2000" fill="freeze" begin="5000"/>
    </section>
    <footer>Education</footer>
</svg>