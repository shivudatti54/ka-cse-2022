<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>Simple Servlet</title>
    <desc>Animated Educational Diagram for Simple Servlet</desc>
    <style>
        /* Gradient background */
        .background {
            fill: #66CCCC;
            filter: progid:DXImageTransform.Microsoft.gradient(startColorstr="#66CCCC", endColorstr="#66CCCC");
        }
        
        /* Indigo and teal accents */
        .accent {
            fill: #3B5998;
            stroke: #3B5998;
            stroke-width: 2;
        }
        
        /* Orange accents */
        .accent-orange {
            fill: #FFC107;
            stroke: #FFC107;
            stroke-width: 2;
        }
        
        /* Label styles */
        .label {
            font-size: 16px;
            font-weight: bold;
            fill: #333333;
            stroke: #333333;
            stroke-width: 2;
            text-anchor: middle;
        }
        
        /* Annotation styles */
        .annotation {
            font-size: 14px;
            fill: #999999;
            stroke: #999999;
            stroke-width: 1;
        }
    </style>
    
    <rect x="10" y="10" width="400" height="360" class="background" />
    <rect x="10" y="10" width="20" height="40" rx="5" class="accent" />
    <text x="30" y="30" class="label">What is a Servlet?</text>
    <text x="30" y="60" class="annotation">A servlet is a Java class that extends the HttpServlet class.</text>
    <rect x="50" y="60" width="20" height="40" rx="5" class="accent-orange" />
    <text x="70" y="80" class="label">The Life Cycle of a Servlet</text>
    <g transform="translate(50, 100)">
        <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
        <animateTransform attributeName="y" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
        <rect x="0" y="0" width="20" height="40" rx="5" class="accent-orange" />
        <text x="10" y="30" class="label">Load</text>
        <text x="10" y="60" class="annotation">The servlet is loaded into memory by the web container.</text>
        <rect x="30" y="60" width="20" height="40" rx="5" class="accent-orange" />
        <text x="50" y="80" class="label">Init</text>
        <text x="50" y="110" class="annotation">The servlet is initialized and any necessary setup is performed.</text>
        <rect x="70" y="110" width="20" height="40" rx="5" class="accent-orange" />
        <text x="90" y="130" class="label">Service</text>
        <text x="90" y="160" class="annotation">The servlet receives an HTTP request and processes it.</text>
    </g>
    <g transform="translate(150, 200)">
        <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
        <animateTransform attributeName="y" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
        <rect x="0" y="0" width="20" height="40" rx="5" class="accent-orange" />
        <text x="10" y="30" class="label">Destroy</text>
        <text x="10" y="60" class="annotation">The servlet is destroyed and any necessary cleanup is performed.</text>
    </g>
    <g transform="translate(250, 300)">
        <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
        <animateTransform attributeName="y" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
        <rect x="0" y="0" width="20" height="40" rx="5" class="accent-orange" />
        <text x="10" y="30" class="label">Using Tomcat for Servlet Development</text>
        <text x="10" y="60" class="annotation">Tomcat is a popular web server that is used to host and deploy servlets.</text>
    </g>
    <rect x="10" y="360" width="400" height="40" rx="5" class="accent" />
    <text x="20" y="380" class="label">Learn More</text>
</svg>