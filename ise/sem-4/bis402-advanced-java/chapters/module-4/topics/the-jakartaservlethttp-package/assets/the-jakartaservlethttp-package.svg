<svg width="420" height="400" data-topic-id="jakartaservlethttp-package">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="10%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#E5F5EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="30" fill="#3498DB" rx="5"/>
  <text x="20" y="35" font-size="20" font-family="Arial" text-anchor="middle" fill="#FFFFFF">The Jakarta Servlet HTTP Package</text>

  <!-- Section 1: Overview -->
  <section data-narration="Overview">
    <rect x="10" y="50" width="400" height="100" fill="#E5F5EA" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="1s" begin="0s"/>
    <text x="20" y="85" font-size="16" font-family="Arial" text-anchor="middle" fill="#8B9467">The Jakarta Servlet HTTP Package is a Java class library that provides the core functionality for building web applications using the Java Servlet Technology.</text>
  </section>

  <!-- Section 2: Definitions -->
  <section data-narration="Definitions">
    <rect x="10" y="160" width="400" height="100" fill="#B2FFFC" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,160" to="0,260" dur="1s" begin="0s"/>
    <text x="20" y="195" font-size="16" font-family="Arial" text-anchor="middle" fill="#8B9467">A servlet is a Java class that implements the servlet interface and extends the HttpServlet class.</text>
  </section>

  <!-- Section 3: Key Concepts -->
  <section data-narration="Key Concepts">
    <rect x="10" y="250" width="400" height="100" fill="#E5F5EA" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,250" to="0,350" dur="1s" begin="0s"/>
    <text x="20" y="285" font-size="16" font-family="Arial" text-anchor="middle" fill="#8B9467">The servlet life cycle refers to the sequence of events that a servlet goes through when it is created, initialized, serviced, and destroyed.</text>
  </section>

  <!-- Section 4: HTTP Methods -->
  <section data-narration="HTTP Methods">
    <rect x="10" y="320" width="400" height="100" fill="#C9E4CA" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,320" to="0,420" dur="1s" begin="0s"/>
    <text x="20" y="355" font-size="16" font-family="Arial" text-anchor="middle" fill="#8B9467">HTTP methods are used to specify the type of HTTP request being made.</text>
    <rect x="20" y="400" width="200" height="20" fill="#3498DB" rx="2"/>
    <text x="30" y="415" font-size="16" font-family="Arial" text-anchor="middle" fill="#FFFFFF">GET, POST, PUT, DELETE, PATCH</text>
  </section>

  <!-- Section 5: HTTP Status Codes -->
  <section data-narration="HTTP Status Codes">
    <rect x="10" y="420" width="400" height="100" fill="#E5F5EA" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,420" to="0,520" dur="1s" begin="0s"/>
    <text x="20" y="455" font-size="16" font-family="Arial" text-anchor="middle" fill="#8B9467">HTTP status codes are used to indicate the result of an HTTP request.</text>
    <rect x="20" y="500" width="200" height="20" fill="#3498DB" rx="2"/>
    <text x="30" y="515" font-size="16" font-family="Arial" text-anchor="middle" fill="#FFFFFF">200 OK, 404 Not Found, 500 Internal Server Error</text>
  </section>

  <!-- Section 6: Classes and Interfaces -->
  <section data-narration="Classes and Interfaces">
    <rect x="10" y="600" width="400" height="100" fill="#B2FFFC" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,600" to="0,700" dur="1s" begin="0s"/>
    <text x="20" y="625" font-size="16" font-family="Arial" text-anchor="middle" fill="#8B9467">The HttpServlet class is the most commonly used servlet class.</text>
  </section>

  <!-- Footer at bottom -->
  <rect x="10" y="760" width="400" height="30" fill="#3498DB" rx="5"/>
  <text x="20" y="775" font-size="16" font-family="Arial" text-anchor="middle" fill="#FFFFFF">Visit our website for more information</text>
</svg>