    </text>
    <animateTransform attributeName="transform" type="translate" from="0,310" to="-10,310" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 340)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Service
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,340" to="-10,340" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 370)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Destruction
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,370" to="-10,370" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer Section -->
  <g transform="translate(10, 400)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
