<svg width="420" height="400" data-topic-id="The-Jakarta" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="Gradient Background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70C9C4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8BC4E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#Gradient Background)" width="100%" height="100%"/>
  
  <!-- Title Section -->
  <g transform="translate(10, 20)">
    <text text-anchor="start" font-size="24" font-family="Arial" fill="#FFC107">
      The Jakarta
    </text>
  </g>
  
  <!-- Introduction Section -->
  <g transform="translate(10, 60)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Introduction
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,60" to="-10,40" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- What is The Jakarta Section -->
  <g transform="translate(10, 80)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      What is The Jakarta
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,80" to="-10,80" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Key Features Section -->
  <g transform="translate(10, 100)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Key Features
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,100" to="-10,100" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 130)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Web Application Server
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,130" to="-10,130" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 160)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Servlet Container
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,160" to="-10,160" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 190)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Java EE Support
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,190" to="-10,190" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 220)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Security Features
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,220" to="-10,220" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 250)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Scalability and Performance
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,250" to="-10,250" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Life Cycle of a Servlet Section -->
  <g transform="translate(10, 280)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
      Life Cycle of a Servlet
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,280" to="-10,280" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 310)">
    <rect fill="#FFFFFF" width="400" height="20"/>
    <text text-anchor="start" font-size="18" font-family="Arial" fill="#333333">
