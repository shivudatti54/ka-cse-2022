<svg width="420" height="400"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     data-topic-id="HandlingHttpRequestsAndResponses"
     viewBox="0 0 420 400"
     style="background-gradient: #66CCCC, #66CCCC 0%, #66CCCC 51%, #66CCCC 100%, #66CCCC 100%, #66CCCC 51%, #66CCCC 0%;">
    <title>Handling HTTP Requests and Responses</title>
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC"/>
            <stop offset="50%" stop-color="#66CCCC"/>
            <stop offset="100%" stop-color="#66CCCC"/>
        </linearGradient>
    </defs>

    <!-- Section 1: Introduction -->
    <section data-narration="Handling HTTP Requests and Responses Introduction">
        <rect x="50" y="50" width="320" height="200" fill="url(#grad)" rx="10"/>
        <text x="150" y="70" font-size="24" fill="#2E4053">What are HTTP Requests and Responses?</text>
        <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>

    <!-- Section 2: HTTP Request Methods -->
    <section data-narration="HTTP Request Methods">
        <rect x="50" y="250" width="320" height="200" fill="url(#grad)" rx="10"/>
        <text x="150" y="270" font-size="24" fill="#2E4053">HTTP Request Methods</text>
        <g>
            <circle cx="100" cy="80" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="90" y="80" font-size="18" fill="#2E4053">GET</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <circle cx="220" cy="80" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="210" y="80" font-size="18" fill="#2E4053">POST</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="40,0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <circle cx="100" cy="120" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="90" y="120" font-size="18" fill="#2E4053">PUT</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <circle cx="220" cy="120" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="210" y="120" font-size="18" fill="#2E4053">DELETE</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="40,0" dur="2s" begin="0s" repeatCount="indefinite"/>
        </g>
    </section>

    <!-- Section 3: HTTP Response Status Codes -->
    <section data-narration="HTTP Response Status Codes">
        <rect x="50" y="350" width="320" height="200" fill="url(#grad)" rx="10"/>
        <text x="150" y="370" font-size="24" fill="#2E4053">HTTP Response Status Codes</text>
        <g>
            <circle cx="100" cy="300" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="90" y="300" font-size="18" fill="#2E4053">200 OK</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <circle cx="220" cy="300" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="210" y="300" font-size="18" fill="#2E4053">404 Not Found</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="40,0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <circle cx="100" cy="320" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="90" y="320" font-size="18" fill="#2E4053">500 Internal Server Error</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="2s" begin="0s" repeatCount="indefinite"/>
        </g>
    </section>

    <!-- Section 4: Handling HTTP Requests and Responses in Servlets -->
    <section data-narration="Handling HTTP Requests and Responses in Servlets">
        <rect x="50" y="250" width="320" height="200" fill="url(#grad)" rx="10"/>
        <text x="150" y="270" font-size="24" fill="#2E4053">Handling HTTP Requests and Responses in Servlets</text>
        <g>
            <circle cx="100" cy="200" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="90" y="200" font-size="18" fill="#2E4053">Request Parameters</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="20,0" dur="2s" begin="0s" repeatCount="indefinite"/>
            <circle cx="220" cy="200" r="20" fill="#66CCCC" stroke="#2E4053" stroke-width="2"/>
            <text x="210" y="200" font-size="18" fill="#2E4053">Request Body</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="40,0" dur="2s" begin="0s" repeatCount="indefinite"/>
        </g>
    </section>

    <!-- Footer -->
    <footer>
        <rect x="50" y="400" width="320" height="50" fill="#2E4053" rx="10"/>
        <text x="150" y="410" font-size="18" fill="#2E4053">Handling HTTP Requests and Responses</text>
    </footer>
</svg>