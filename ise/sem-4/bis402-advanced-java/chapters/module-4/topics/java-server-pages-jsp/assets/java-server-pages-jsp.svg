<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
        </linearGradient>
        <style>
            .title {
                font-size: 30px;
                font-weight: bold;
                color: #3498db;
            }
            .footnote {
                font-size: 15px;
                color: #666;
            }
        </style>
    </defs>
    <rect x="10" y="10" width="400" height="20" fill="url(#pastel-gradient)"/>
    <text class="title" x="20" y="40" text-anchor="middle">Java Server Pages</text>
    <rect x="10" y="70" width="400" height="40" fill="#fff"/>
    <text x="20" y="90" text-anchor="start">What is JSP?</text>
    <animateTransform attributeName="transform" type="scale" from="1" to="1.2" begin="-0.5s" dur="1s"/>
    <rect x="10" y="130" width="400" height="40" fill="#fff"/>
    <text x="20" y="150" text-anchor="start">Key Features of JSP</text>
    <rect x="10" y="190" width="400" height="40" fill="#fff"/>
    <text x="20" y="210" text-anchor="start">Benefits of Using JSP</text>
    <rect x="10" y="250" width="400" height="40" fill="#fff"/>
    <text x="20" y="270" text-anchor="start">Basic JSP Syntax</text>
    <rect x="10" y="310" width="400" height="40" fill="#fff"/>
    <text x="20" y="330" text-anchor="start">JSP Directives</text>
    <rect x="10" y="370" width="400" height="30" fill="#fff"/>
    <text x="20" y="390" text-anchor="start" class="footnote">Source: Java Tutorials</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="0s" dur="1s"/>
    <rect x="10" y="420" width="400" height="30" fill="#fff"/>
    <text x="20" y="440" text-anchor="start">Java Server Pages JSP</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" begin="1s" dur="1s"/>
    <rect x="10" y="470" width="400" height="30" fill="#fff"/>
    <text x="20" y="490" text-anchor="start" class="footnote">Learn more about Java Server Pages at <a href="https://docs.oracle.com/javaee/7/tutorial/doc/jsp intro.htm">https://docs.oracle.com/javaee/7/tutorial/doc/jspintro.htm</a></text>
</svg>