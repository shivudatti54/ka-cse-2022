<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="the-servlet-api">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="The Servlet API is the foundation of Java web development, providing interfaces and classes for building server-side components.">
    <rect x="60" y="10" width="300" height="38" rx="8" fill="url(#headerGrad)"/>
    <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="17" fill="#FFFFFF">The Servlet API</text>
    <line x1="110" y1="44" x2="310" y2="44" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 2: Servlet Interface Hierarchy -->
  <g opacity="0" data-narration="The Servlet hierarchy starts with the Servlet interface, extended by GenericServlet abstract class, then HttpServlet. Key lifecycle methods are init, service, and destroy.">
    <!-- Servlet interface box -->
    <rect x="145" y="56" width="130" height="28" rx="6" fill="#3949AB" stroke="#1A237E" stroke-width="1"/>
    <text x="210" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFFFFF" font-weight="bold">&#171;interface&#187; Servlet</text>
    <!-- Arrow down -->
    <line x1="210" y1="84" x2="210" y2="92" stroke="#3949AB" stroke-width="1.5"/>
    <polygon points="205,92 210,99 215,92" fill="#3949AB"/>
    <!-- GenericServlet box -->
    <rect x="130" y="100" width="160" height="28" rx="6" fill="#00695C" stroke="#004D40" stroke-width="1"/>
    <text x="210" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFFFFF" font-weight="bold">GenericServlet</text>
    <!-- Arrow down -->
    <line x1="210" y1="128" x2="210" y2="136" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="205,136 210,143 215,136" fill="#00695C"/>
    <!-- HttpServlet box -->
    <rect x="140" y="144" width="140" height="28" rx="6" fill="#E65100" stroke="#BF360C" stroke-width="1"/>
    <text x="210" y="162" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFFFFF" font-weight="bold">HttpServlet</text>
    <!-- Key methods on the right -->
    <rect x="305" y="62" width="105" height="52" rx="5" fill="#FFFFFF" stroke="#3949AB" stroke-width="1" opacity="0.9"/>
    <text x="357" y="77" text-anchor="middle" font-family="monospace" font-size="9" fill="#3949AB" font-weight="bold">Key Methods:</text>
    <text x="357" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">init()</text>
    <text x="357" y="101" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">service()</text>
    <text x="357" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#00695C">destroy()</text>
    <!-- Label on the left -->
    <text x="22" y="100" font-family="Arial, sans-serif" font-size="9" fill="#3949AB" font-weight="bold">Hierarchy</text>
    <line x1="10" y1="104" x2="55" y2="104" stroke="#3949AB" stroke-width="1" opacity="0.5"/>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 3: Servlet Lifecycle Timeline -->
  <g opacity="0" data-narration="The Servlet lifecycle has four phases: Loading the servlet class, Initialization via init, Request handling via service, and Destruction via destroy before garbage collection.">
    <text x="14" y="192" font-family="Arial, sans-serif" font-size="10" fill="#3949AB" font-weight="bold">Lifecycle:</text>
    <!-- Timeline base line -->
    <line x1="14" y1="210" x2="406" y2="210" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
    <!-- Phase 1: Loading -->
    <circle cx="50" cy="210" r="6" fill="#3949AB"/>
    <text x="50" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1A237E" font-weight="bold">Loading</text>
    <!-- Arrow -->
    <polygon points="103,206 110,210 103,214" fill="#3949AB"/>
    <!-- Phase 2: init -->
    <circle cx="130" cy="210" r="6" fill="#00695C"/>
    <text x="130" y="228" text-anchor="middle" font-family="monospace" font-size="8" fill="#004D40" font-weight="bold">init()</text>
    <!-- Arrow -->
    <polygon points="183,206 190,210 183,214" fill="#00695C"/>
    <!-- Phase 3: service -->
    <circle cx="220" cy="210" r="8" fill="#E65100" stroke="#BF360C" stroke-width="1"/>
    <text x="220" y="228" text-anchor="middle" font-family="monospace" font-size="8" fill="#BF360C" font-weight="bold">service()</text>
    <!-- Loop arrow for repeated requests -->
    <path d="M228,203 Q245,188 228,195" fill="none" stroke="#E65100" stroke-width="1"/>
    <text x="252" y="195" font-family="Arial, sans-serif" font-size="7" fill="#E65100">requests</text>
    <!-- Arrow -->
    <polygon points="275,206 282,210 275,214" fill="#E65100"/>
    <!-- Phase 4: destroy -->
    <circle cx="310" cy="210" r="6" fill="#C62828"/>
    <text x="310" y="228" text-anchor="middle" font-family="monospace" font-size="8" fill="#C62828" font-weight="bold">destroy()</text>
    <!-- Arrow -->
    <polygon points="353,206 360,210 353,214" fill="#C62828"/>
    <!-- Phase 5: GC -->
    <circle cx="385" cy="210" r="6" fill="#757575"/>
    <text x="385" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#616161" font-weight="bold">GC</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 4: Key Packages -->
  <g opacity="0" data-narration="The Servlet API is organized into two main packages: javax.servlet for core interfaces like Servlet and GenericServlet, and javax.servlet.http for HTTP-specific classes like HttpServlet and HttpServletRequest.">
    <text x="14" y="254" font-family="Arial, sans-serif" font-size="10" fill="#3949AB" font-weight="bold">Key Packages:</text>
    <!-- javax.servlet package -->
    <rect x="14" y="260" width="192" height="64" rx="6" fill="#FFFFFF" stroke="#3949AB" stroke-width="1.5" opacity="0.95"/>
    <rect x="14" y="260" width="192" height="16" rx="6" fill="#3949AB"/>
    <rect x="14" y="270" width="192" height="6" fill="#3949AB"/>
    <text x="110" y="273" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFF" font-weight="bold">javax.servlet</text>
    <text x="24" y="290" font-family="monospace" font-size="8" fill="#00695C">Servlet</text>
    <text x="24" y="301" font-family="monospace" font-size="8" fill="#00695C">GenericServlet</text>
    <text x="24" y="312" font-family="monospace" font-size="8" fill="#00695C">ServletRequest</text>
    <text x="120" y="312" font-family="monospace" font-size="8" fill="#00695C">ServletResponse</text>
    <!-- javax.servlet.http package -->
    <rect x="214" y="260" width="192" height="64" rx="6" fill="#FFFFFF" stroke="#E65100" stroke-width="1.5" opacity="0.95"/>
    <rect x="214" y="260" width="192" height="16" rx="6" fill="#E65100"/>
    <rect x="214" y="270" width="192" height="6" fill="#E65100"/>
    <text x="310" y="273" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFF" font-weight="bold">javax.servlet.http</text>
    <text x="224" y="290" font-family="monospace" font-size="8" fill="#E65100">HttpServlet</text>
    <text x="224" y="301" font-family="monospace" font-size="8" fill="#E65100">HttpServletRequest</text>
    <text x="224" y="312" font-family="monospace" font-size="8" fill="#E65100">HttpServletResponse</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 5: HTTP Methods -->
  <g opacity="0" data-narration="HttpServlet subclasses override HTTP methods: doGet for GET requests, doPost for POST, doPut for PUT, and doDelete for DELETE operations.">
    <text x="14" y="342" font-family="Arial, sans-serif" font-size="10" fill="#3949AB" font-weight="bold">HTTP Methods (override in HttpServlet):</text>
    <!-- doGet -->
    <rect x="14" y="348" width="90" height="22" rx="5" fill="#3949AB"/>
    <text x="59" y="363" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFF" font-weight="bold">doGet()</text>
    <!-- doPost -->
    <rect x="112" y="348" width="90" height="22" rx="5" fill="#00695C"/>
    <text x="157" y="363" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFF" font-weight="bold">doPost()</text>
    <!-- doPut -->
    <rect x="210" y="348" width="90" height="22" rx="5" fill="#E65100"/>
    <text x="255" y="363" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFF" font-weight="bold">doPut()</text>
    <!-- doDelete -->
    <rect x="308" y="348" width="98" height="22" rx="5" fill="#C62828"/>
    <text x="357" y="363" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFF" font-weight="bold">doDelete()</text>
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 6: Request/Response Objects -->
  <g opacity="0" data-narration="Request objects provide methods like getParameter, getAttribute, and getSession. Response objects offer setContentType, getWriter, and sendRedirect for sending data back to the client.">
    <!-- Request methods -->
    <rect x="14" y="376" width="192" height="18" rx="4" fill="#FFFFFF" stroke="#00695C" stroke-width="1" opacity="0.95"/>
    <text x="20" y="389" font-family="monospace" font-size="7.5" fill="#00695C" font-weight="bold">Req:</text>
    <text x="46" y="389" font-family="monospace" font-size="7" fill="#00695C">getParameter() getAttribute() getSession()</text>
    <!-- Response methods -->
    <rect x="214" y="376" width="192" height="18" rx="4" fill="#FFFFFF" stroke="#E65100" stroke-width="1" opacity="0.95"/>
    <text x="220" y="389" font-family="monospace" font-size="7.5" fill="#E65100" font-weight="bold">Res:</text>
    <text x="244" y="389" font-family="monospace" font-size="7" fill="#E65100">setContentType() getWriter() sendRedirect()</text>
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
