<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="servlet-package">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="The javax.servlet package is the foundation of Java Servlet technology, providing core interfaces and classes for building web applications.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#3949AB">javax.servlet Package</text>
    <line x1="100" y1="40" x2="320" y2="40" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="100" cy="40" r="3" fill="#E65100"/>
    <circle cx="320" cy="40" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Package structure -->
  <g opacity="0" data-narration="The servlet API is split into two main packages: javax.servlet for protocol-independent classes, and javax.servlet.http for HTTP-specific extensions.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- javax.servlet box -->
    <rect x="15" y="52" width="190" height="72" rx="6" fill="#3949AB" opacity="0.9"/>
    <text x="110" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">javax.servlet</text>
    <line x1="25" y1="74" x2="195" y2="74" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <text x="28" y="87" font-family="Arial, sans-serif" font-size="8.5" fill="#E8EAF6">Servlet, GenericServlet</text>
    <text x="28" y="98" font-family="Arial, sans-serif" font-size="8.5" fill="#E8EAF6">ServletRequest, ServletResponse</text>
    <text x="28" y="109" font-family="Arial, sans-serif" font-size="8.5" fill="#E8EAF6">ServletConfig, ServletContext</text>
    <text x="28" y="120" font-family="Arial, sans-serif" font-size="8.5" fill="#E8EAF6">RequestDispatcher, Filter</text>
    <!-- javax.servlet.http box -->
    <rect x="215" y="52" width="190" height="72" rx="6" fill="#00695C" opacity="0.9"/>
    <text x="310" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">javax.servlet.http</text>
    <line x1="225" y1="74" x2="395" y2="74" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <text x="228" y="87" font-family="Arial, sans-serif" font-size="8.5" fill="#C8E6C9">HttpServlet, HttpSession</text>
    <text x="228" y="98" font-family="Arial, sans-serif" font-size="8.5" fill="#C8E6C9">HttpServletRequest</text>
    <text x="228" y="109" font-family="Arial, sans-serif" font-size="8.5" fill="#C8E6C9">HttpServletResponse</text>
    <text x="228" y="120" font-family="Arial, sans-serif" font-size="8.5" fill="#C8E6C9">Cookie, HttpFilter</text>
  </g>

  <!-- Group 3: Core interfaces -->
  <g opacity="0" data-narration="The core interfaces include Servlet with init, service, and destroy methods; ServletRequest for client request data; ServletResponse for sending responses; ServletConfig for initialization parameters; and ServletContext for application-wide information.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Core Interfaces (javax.servlet)</text>
    <!-- Servlet interface -->
    <rect x="10" y="150" width="115" height="56" rx="4" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="10" y="150" width="115" height="15" rx="4" fill="#3949AB"/>
    <rect x="10" y="161" width="115" height="1" fill="#3949AB"/>
    <text x="67" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="white">&#171;interface&#187; Servlet</text>
    <text x="16" y="176" font-family="Arial, sans-serif" font-size="7.5" fill="#333">+ init(ServletConfig)</text>
    <text x="16" y="186" font-family="Arial, sans-serif" font-size="7.5" fill="#333">+ service(Req, Res)</text>
    <text x="16" y="196" font-family="Arial, sans-serif" font-size="7.5" fill="#333">+ destroy()</text>
    <!-- ServletRequest -->
    <rect x="133" y="150" width="90" height="56" rx="4" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="133" y="150" width="90" height="15" rx="4" fill="#3949AB"/>
    <rect x="133" y="161" width="90" height="1" fill="#3949AB"/>
    <text x="178" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="white">ServletRequest</text>
    <text x="139" y="176" font-family="Arial, sans-serif" font-size="7" fill="#333">+ getParameter()</text>
    <text x="139" y="186" font-family="Arial, sans-serif" font-size="7" fill="#333">+ getAttribute()</text>
    <text x="139" y="196" font-family="Arial, sans-serif" font-size="7" fill="#333">+ getInputStream()</text>
    <!-- ServletResponse -->
    <rect x="231" y="150" width="90" height="56" rx="4" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <rect x="231" y="150" width="90" height="15" rx="4" fill="#3949AB"/>
    <rect x="231" y="161" width="90" height="1" fill="#3949AB"/>
    <text x="276" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="white">ServletResponse</text>
    <text x="237" y="176" font-family="Arial, sans-serif" font-size="7" fill="#333">+ getWriter()</text>
    <text x="237" y="186" font-family="Arial, sans-serif" font-size="7" fill="#333">+ setContentType()</text>
    <text x="237" y="196" font-family="Arial, sans-serif" font-size="7" fill="#333">+ getOutputStream()</text>
    <!-- ServletConfig and ServletContext -->
    <rect x="329" y="150" width="82" height="56" rx="4" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <rect x="329" y="150" width="82" height="15" rx="4" fill="#E65100"/>
    <rect x="329" y="161" width="82" height="1" fill="#E65100"/>
    <text x="370" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Config / Context</text>
    <text x="335" y="176" font-family="Arial, sans-serif" font-size="7" fill="#333">Config:</text>
    <text x="335" y="186" font-family="Arial, sans-serif" font-size="6.5" fill="#555"> getInitParameter()</text>
    <text x="335" y="196" font-family="Arial, sans-serif" font-size="7" fill="#333">Context:</text>
    <text x="335" y="205" font-family="Arial, sans-serif" font-size="6.5" fill="#555"> getAttribute()</text>
  </g>

  <!-- Group 4: Core classes with inheritance -->
  <g opacity="0" data-narration="GenericServlet is an abstract class implementing the Servlet interface. It provides default implementations. ServletInputStream and ServletOutputStream handle binary data for request and response streams.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="105" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Core Classes</text>
    <!-- GenericServlet -->
    <rect x="10" y="230" width="130" height="48" rx="4" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <rect x="10" y="230" width="130" height="15" rx="4" fill="#E65100"/>
    <rect x="10" y="241" width="130" height="1" fill="#E65100"/>
    <text x="75" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">GenericServlet (abstract)</text>
    <text x="16" y="256" font-family="Arial, sans-serif" font-size="7.5" fill="#333">implements Servlet, ServletConfig</text>
    <text x="16" y="266" font-family="Arial, sans-serif" font-size="7.5" fill="#333">+ log(), getServletInfo()</text>
    <!-- Inheritance arrow from Servlet to GenericServlet -->
    <line x1="67" y1="206" x2="67" y2="218" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="3,2"/>
    <polygon points="67,228 62,220 72,220" fill="white" stroke="#3949AB" stroke-width="1"/>
    <!-- ServletInputStream -->
    <rect x="150" y="230" width="122" height="48" rx="4" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <rect x="150" y="230" width="122" height="15" rx="4" fill="#E65100"/>
    <rect x="150" y="241" width="122" height="1" fill="#E65100"/>
    <text x="211" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">ServletInputStream</text>
    <text x="156" y="256" font-family="Arial, sans-serif" font-size="7.5" fill="#333">extends InputStream</text>
    <text x="156" y="266" font-family="Arial, sans-serif" font-size="7.5" fill="#333">+ readLine(byte[], int, int)</text>
    <!-- ServletOutputStream -->
    <rect x="282" y="230" width="128" height="48" rx="4" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <rect x="282" y="230" width="128" height="15" rx="4" fill="#E65100"/>
    <rect x="282" y="241" width="128" height="1" fill="#E65100"/>
    <text x="346" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">ServletOutputStream</text>
    <text x="288" y="256" font-family="Arial, sans-serif" font-size="7.5" fill="#333">extends OutputStream</text>
    <text x="288" y="266" font-family="Arial, sans-serif" font-size="7.5" fill="#333">+ print(String), println()</text>
  </g>

  <!-- Group 5: javax.servlet.http additions -->
  <g opacity="0" data-narration="The javax.servlet.http package extends the core with HTTP-specific functionality. HttpServlet extends GenericServlet, adding doGet and doPost methods. HttpServletRequest and HttpServletResponse extend the base interfaces. HttpSession manages user sessions, and Cookie handles client-side cookies.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">javax.servlet.http Additions</text>
    <!-- HttpServlet -->
    <rect x="10" y="302" width="95" height="46" rx="4" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <rect x="10" y="302" width="95" height="14" rx="4" fill="#00695C"/>
    <rect x="10" y="312" width="95" height="1" fill="#00695C"/>
    <text x="57" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="white">HttpServlet</text>
    <text x="16" y="325" font-family="Arial, sans-serif" font-size="7" fill="#333">+ doGet(Req, Res)</text>
    <text x="16" y="335" font-family="Arial, sans-serif" font-size="7" fill="#333">+ doPost(Req, Res)</text>
    <text x="16" y="345" font-family="Arial, sans-serif" font-size="6.5" fill="#555">extends GenericServlet</text>
    <!-- HttpServletRequest -->
    <rect x="112" y="302" width="95" height="46" rx="4" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <rect x="112" y="302" width="95" height="14" rx="4" fill="#00695C"/>
    <rect x="112" y="312" width="95" height="1" fill="#00695C"/>
    <text x="159" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">HttpServletRequest</text>
    <text x="118" y="325" font-family="Arial, sans-serif" font-size="7" fill="#333">+ getSession()</text>
    <text x="118" y="335" font-family="Arial, sans-serif" font-size="7" fill="#333">+ getCookies()</text>
    <text x="118" y="345" font-family="Arial, sans-serif" font-size="6.5" fill="#555">extends ServletRequest</text>
    <!-- HttpServletResponse -->
    <rect x="214" y="302" width="95" height="46" rx="4" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <rect x="214" y="302" width="95" height="14" rx="4" fill="#00695C"/>
    <rect x="214" y="312" width="95" height="1" fill="#00695C"/>
    <text x="261" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="white">HttpServletResponse</text>
    <text x="220" y="325" font-family="Arial, sans-serif" font-size="7" fill="#333">+ sendRedirect()</text>
    <text x="220" y="335" font-family="Arial, sans-serif" font-size="7" fill="#333">+ addCookie()</text>
    <text x="220" y="345" font-family="Arial, sans-serif" font-size="6.5" fill="#555">extends ServletResponse</text>
    <!-- HttpSession and Cookie -->
    <rect x="316" y="302" width="94" height="46" rx="4" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <rect x="316" y="302" width="94" height="14" rx="4" fill="#00695C"/>
    <rect x="316" y="312" width="94" height="1" fill="#00695C"/>
    <text x="363" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="white">Session / Cookie</text>
    <text x="322" y="325" font-family="Arial, sans-serif" font-size="6.5" fill="#333">HttpSession:</text>
    <text x="322" y="335" font-family="Arial, sans-serif" font-size="6.5" fill="#555"> setAttribute(), getId()</text>
    <text x="322" y="345" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Cookie: getName()</text>
  </g>

  <!-- Group 6: RequestDispatcher forward vs include -->
  <g opacity="0" data-narration="RequestDispatcher provides two key methods. Forward transfers the entire request to another resource, and the original servlet cannot write to the response. Include inserts another resource output into the current response, allowing both servlets to contribute content.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">RequestDispatcher: forward() vs include()</text>
    <!-- forward() flow -->
    <rect x="12" y="370" width="50" height="18" rx="3" fill="#3949AB"/>
    <text x="37" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Servlet A</text>
    <line x1="62" y1="379" x2="82" y2="379" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="82,376 88,379 82,382" fill="#C62828"/>
    <rect x="90" y="370" width="55" height="18" rx="3" fill="#C62828"/>
    <text x="117" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">forward()</text>
    <line x1="145" y1="379" x2="157" y2="379" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="157,376 163,379 157,382" fill="#C62828"/>
    <rect x="165" y="370" width="50" height="18" rx="3" fill="#00695C"/>
    <text x="190" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Servlet B</text>
    <text x="110" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#555">Control fully transfers to B</text>
    <!-- include() flow -->
    <rect x="230" y="370" width="50" height="18" rx="3" fill="#3949AB"/>
    <text x="255" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Servlet A</text>
    <line x1="280" y1="379" x2="296" y2="379" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="296,376 302,379 296,382" fill="#E65100"/>
    <rect x="304" y="370" width="52" height="18" rx="3" fill="#E65100"/>
    <text x="330" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">include()</text>
    <line x1="356" y1="379" x2="368" y2="379" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="368,376 374,379 368,382" fill="#E65100"/>
    <rect x="376" y="370" width="36" height="18" rx="3" fill="#00695C"/>
    <text x="394" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">B</text>
    <text x="327" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#555">B output merged into A</text>
  </g>
</svg>
