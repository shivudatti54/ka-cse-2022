<svg width="420" height="400">
    <title>Reading Servlet Parameters</title>
    <style>
        /* Add a gradient background with pastel colors */
        body {
            background: #C7B8EA;
            background: linear-gradient(to bottom, #C7B8EA, #B2A8E7);
            background-size: 100% 100%;
            background-position: 0% 0%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    <desc>
        <data-topic-id data-slug="reading-servlet-parameters"></data-topic-id>
    </desc>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#B2A8E7" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <g>
        <!-- Section 1: Introduction -->
        <rect x="10" y="10" width="400" height="50" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 10" to="0 30" dur="1s" begin="0s"/>
        <text x="15" y="25" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">Reading Servlet Parameters</text>
        <text x="15" y="40" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC">
            In Java Servlets, parameters play a crucial role in handling user input and storing data.
        </text>
        <rect x="10" y="60" width="400" height="30" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 70" to="0 90" dur="1s" begin="0.5s"/>
        <text x="15" y="85" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">Types of Servlet Parameters</text>
        <text x="15" y="110" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC">
            There are two types of servlet parameters: request parameters and session parameters.
        </text>

        <!-- Section 2: Request Parameters -->
        <rect x="10" y="150" width="400" height="50" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 160" to="0 180" dur="1s" begin="1s"/>
        <text x="15" y="175" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">Request Parameters</text>
        <text x="15" y="200" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC">
            Request parameters are passed from the client to the server through the HTTP request.
        </text>
        <rect x="10" y="230" width="400" height="30" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 240" to="0 260" dur="1s" begin="1.5s"/>
        <text x="15" y="265" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">Accessing Request Parameters</text>
        <text x="15" y="290" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC">
            To access request parameters, use the request.getParameter() method.
        </text>

        <!-- Section 3: Session Parameters -->
        <rect x="10" y="350" width="400" height="50" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 360" to="0 380" dur="1s" begin="2s"/>
        <text x="15" y="375" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">Session Parameters</text>
        <text x="15" y="400" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC">
            Session parameters are stored in the user's session, which is maintained by the server.
        </text>
        <rect x="10" y="450" width="400" height="30" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 460" to="0 480" dur="1s" begin="2.5s"/>
        <text x="15" y="485" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">Accessing Session Parameters</text>
        <text x="15" y="510" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC">
            To access session parameters, use the session.getAttribute() method.
        </text>

        <!-- Section 4: Use Cases -->
        <rect x="10" y="550" width="400" height="50" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 560" to="0 580" dur="1s" begin="3s"/>
        <text x="15" y="575" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">Use Cases</text>
        <text x="15" y="600" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC">
            Servlet parameters are used to pass data between different parts of the application.
        </text>
        <rect x="10" y="670" width="400" height="30" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 670" to="0 690" dur="1s" begin="3.5s"/>
        <text x="15" y="685" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">Conclusion</text>
        <text x="15" y="710" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC">
            In conclusion, servlet parameters are an essential part of handling user input and storing data in Java Servlets.
        </text>
    </g>
    <defs>
        <clipPath id="clip-path">
            <rect x="10" y="10" width="400" height="400" rx="10"/>
        </clipPath>
    </defs>
    <g clip-path="url(#clip-path)">
        <rect x="10" y="10" width="400" height="400" style="fill: #66CCCC; background: linear-gradient(to bottom, #66CCCC, #2E4053); background-size: 100% 100%; background-position: 0% 0%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;" />
        <animatedur attributeName="dur" from="0" to="10" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="0 10" to="0 10" dur="10" begin="0s"/>
        <linearGradient id="text-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
            <stop offset="100%" stop-color="#2E4053" stop-opacity="1"/>
        </linearGradient>
        <text x="15" y="25" font-size="18" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">Reading Servlet Parameters</text>
        <text x="15" y="40" font-size="14" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">
            In Java Servlets, parameters play a crucial role in handling user input and storing data.
        </text>
        <text x="15" y="60" font-size="14" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">
            There are two types of servlet parameters: request parameters and session parameters.
        </text>
        <rect x="10" y="90" width="400" height="50" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 90" to="0 90" dur="2s" begin="1s"/>
        <text x="15" y="110" font-size="18" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">Accessing Request Parameters</text>
        <text x="15" y="130" font-size="14" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">
            To access request parameters, use the request.getParameter() method.
        </text>
        <rect x="10" y="180" width="400" height="30" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 180" to="0 180" dur="2s" begin="2s"/>
        <text x="15" y="200" font-size="18" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">Accessing Session Parameters</text>
        <text x="15" y="220" font-size="14" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">
            To access session parameters, use the session.getAttribute() method.
        </text>
        <rect x="10" y="290" width="400" height="50" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 290" to="0 290" dur="3s" begin="3s"/>
        <text x="15" y="310" font-size="18" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">Use Cases</text>
        <text x="15" y="330" font-size="14" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">
            Servlet parameters are used to pass data between different parts of the application.
        </text>
        <rect x="10" y="410" width="400" height="30" fill="#2E4053"/>
        <animateTransform attributeName="transform" type="translate" from="0 410" to="0 410" dur="3s" begin="3.5s"/>
        <text x="15" y="430" font-size="18" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">Conclusion</text>
        <text x="15" y="460" font-size="14" font-family="Arial" text-anchor="middle" fill="url(#text-gradient)">
            In conclusion, servlet parameters are an essential part of handling user input and storing data in Java Servlets.
        </text>
    </g>
</svg>