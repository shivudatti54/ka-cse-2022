<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="session-tracking">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <linearGradient id="lifecycleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="33%" stop-color="#00695C"/>
      <stop offset="66%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Session Tracking in Java Servlets. Let us explore how servers remember users across multiple requests.">
    <text x="210" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#3949AB">Session Tracking</text>
    <rect x="120" y="36" width="180" height="3" rx="1.5" fill="url(#headerGrad)"/>
    <circle cx="120" cy="37.5" r="3" fill="#3949AB"/>
    <circle cx="300" cy="37.5" r="3" fill="#00695C"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 2: Why Session Tracking -->
  <g opacity="0" data-narration="HTTP is a stateless protocol. Each request is independent. Session tracking lets the server maintain user state across multiple requests using a session ID exchanged between client and server.">
    <rect x="15" y="48" width="390" height="62" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
    <text x="25" y="65" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Why Session Tracking?</text>
    <text x="25" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">HTTP is stateless — each request is independent. We need to</text>
    <text x="25" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">maintain user state across multiple requests.</text>
    <!-- Client-Server diagram -->
    <rect x="30" y="94" width="60" height="12" rx="3" fill="#3949AB"/>
    <text x="60" y="103" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#FFF">Client</text>
    <line x1="95" y1="100" x2="285" y2="100" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="190" y="96" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#E65100" font-weight="bold">Session ID</text>
    <polygon points="283,97 290,100 283,103" fill="#E65100"/>
    <polygon points="97,97 90,100 97,103" fill="#E65100"/>
    <rect x="290" y="94" width="60" height="12" rx="3" fill="#00695C"/>
    <text x="320" y="103" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#FFF">Server</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 3: Four Techniques -->
  <g opacity="0" data-narration="There are four main session tracking techniques: Cookies, URL Rewriting, Hidden Form Fields, and the HttpSession API. Each has its own advantages and trade-offs.">
    <text x="210" y="128" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Session Tracking Techniques</text>
    <!-- Card 1: Cookies -->
    <rect x="15" y="134" width="90" height="52" rx="6" fill="#FFF" stroke="#3949AB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="15" y="134" width="90" height="14" rx="6" fill="#3949AB"/>
    <rect x="15" y="142" width="90" height="6" fill="#3949AB"/>
    <text x="60" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFF">Cookies</text>
    <text x="60" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Small data stored</text>
    <text x="60" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">on client browser</text>
    <text x="60" y="180" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">4KB limit</text>
    <!-- Card 2: URL Rewriting -->
    <rect x="113" y="134" width="90" height="52" rx="6" fill="#FFF" stroke="#00695C" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="113" y="134" width="90" height="14" rx="6" fill="#00695C"/>
    <rect x="113" y="142" width="90" height="6" fill="#00695C"/>
    <text x="158" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFF">URL Rewriting</text>
    <text x="158" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Session ID appended</text>
    <text x="158" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">to URL as parameter</text>
    <text x="158" y="180" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Visible in address bar</text>
    <!-- Card 3: Hidden Fields -->
    <rect x="211" y="134" width="90" height="52" rx="6" fill="#FFF" stroke="#E65100" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="211" y="134" width="90" height="14" rx="6" fill="#E65100"/>
    <rect x="211" y="142" width="90" height="6" fill="#E65100"/>
    <text x="256" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFF">Hidden Fields</text>
    <text x="256" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Data embedded in</text>
    <text x="256" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">HTML form as hidden</text>
    <text x="256" y="180" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">input elements</text>
    <!-- Card 4: HttpSession -->
    <rect x="309" y="134" width="96" height="52" rx="6" fill="#FFF" stroke="#C62828" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="309" y="134" width="96" height="14" rx="6" fill="#C62828"/>
    <rect x="309" y="142" width="96" height="6" fill="#C62828"/>
    <text x="357" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFF">HttpSession API</text>
    <text x="357" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Server-side session</text>
    <text x="357" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">management. Most</text>
    <text x="357" y="180" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">secure approach</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 4: HttpSession API Methods -->
  <g opacity="0" data-narration="The HttpSession API provides key methods: getSession to create or retrieve a session, setAttribute and getAttribute to store and read data, invalidate to destroy the session, and setMaxInactiveInterval to configure timeout.">
    <rect x="15" y="194" width="390" height="68" rx="8" fill="#FFF" filter="url(#shadow)"/>
    <rect x="15" y="194" width="390" height="16" rx="8" fill="#3949AB"/>
    <rect x="15" y="202" width="390" height="8" fill="#3949AB"/>
    <text x="210" y="206" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFF">HttpSession API — Key Methods</text>
    <!-- Method list -->
    <text x="30" y="224" font-family="Consolas, monospace" font-size="8" fill="#00695C">request.getSession()</text>
    <text x="170" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">— Create or retrieve session</text>
    <text x="30" y="236" font-family="Consolas, monospace" font-size="8" fill="#00695C">session.setAttribute(key, val)</text>
    <text x="210" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">— Store data</text>
    <text x="30" y="248" font-family="Consolas, monospace" font-size="8" fill="#00695C">session.getAttribute(key)</text>
    <text x="195" y="248" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">— Read data</text>
    <text x="280" y="224" font-family="Consolas, monospace" font-size="8" fill="#C62828">session.invalidate()</text>
    <text x="280" y="236" font-family="Consolas, monospace" font-size="8" fill="#E65100">session.setMaxInactiveInterval(s)</text>
    <text x="280" y="248" font-family="Consolas, monospace" font-size="8" fill="#3949AB">session.getId()</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 5: Session Lifecycle -->
  <g opacity="0" data-narration="The session lifecycle begins with creation when a user first accesses the application. The session remains active as requests are made. It is eventually destroyed either by timeout or explicit invalidation.">
    <text x="210" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Session Lifecycle</text>
    <!-- Lifecycle bar -->
    <rect x="15" y="284" width="390" height="4" rx="2" fill="url(#lifecycleGrad)" opacity="0.3"/>
    <!-- Stage 1: Create -->
    <circle cx="55" cy="304" r="16" fill="#3949AB" filter="url(#shadow)"/>
    <text x="55" y="301" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFF">1</text>
    <text x="55" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="6" fill="#FFF">Create</text>
    <text x="55" y="326" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="6" fill="#3949AB">getSession()</text>
    <!-- Arrow -->
    <line x1="75" y1="304" x2="120" y2="304" stroke="#555" stroke-width="1.5"/>
    <polygon points="118,301 125,304 118,307" fill="#555"/>
    <!-- Stage 2: Active -->
    <circle cx="155" cy="304" r="16" fill="#00695C" filter="url(#shadow)"/>
    <text x="155" y="301" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFF">2</text>
    <text x="155" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="6" fill="#FFF">Active</text>
    <text x="155" y="326" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="6" fill="#00695C">set/getAttribute</text>
    <!-- Arrow -->
    <line x1="175" y1="304" x2="220" y2="304" stroke="#555" stroke-width="1.5"/>
    <polygon points="218,301 225,304 218,307" fill="#555"/>
    <!-- Stage 3: Timeout -->
    <circle cx="255" cy="304" r="16" fill="#E65100" filter="url(#shadow)"/>
    <text x="255" y="301" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFF">3</text>
    <text x="255" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="5" fill="#FFF">Timeout</text>
    <text x="255" y="326" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="6" fill="#E65100">or invalidate()</text>
    <!-- Arrow -->
    <line x1="275" y1="304" x2="320" y2="304" stroke="#555" stroke-width="1.5"/>
    <polygon points="318,301 325,304 318,307" fill="#555"/>
    <!-- Stage 4: Destroyed -->
    <circle cx="355" cy="304" r="16" fill="#C62828" filter="url(#shadow)"/>
    <text x="355" y="301" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFF">4</text>
    <text x="355" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="5" fill="#FFF">Destroyed</text>
    <text x="355" y="326" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="6" fill="#C62828">Session removed</text>
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 6: Comparison Table -->
  <g opacity="0" data-narration="Comparing the techniques: Cookies are stored client-side with a 4 kilobyte limit. URL Rewriting appends session data to URLs and works without cookies. HttpSession stores data server-side and is the most secure option.">
    <text x="210" y="345" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Comparison</text>
    <!-- Table header -->
    <rect x="15" y="350" width="390" height="14" rx="4" fill="#3949AB"/>
    <text x="80" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFF">Technique</text>
    <text x="200" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFF">Storage</text>
    <text x="330" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFF">Key Characteristic</text>
    <!-- Row 1 -->
    <rect x="15" y="364" width="390" height="12" fill="#F5F5FF"/>
    <text x="80" y="373" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">Cookies</text>
    <text x="200" y="373" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Client-side</text>
    <text x="330" y="373" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">4KB limit, can be disabled</text>
    <!-- Row 2 -->
    <rect x="15" y="376" width="390" height="12" fill="#FFFFFF"/>
    <text x="80" y="385" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#00695C" font-weight="bold">URL Rewriting</text>
    <text x="200" y="385" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">URL parameter</text>
    <text x="330" y="385" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Visible in URL, no cookies needed</text>
    <!-- Row 3 -->
    <rect x="15" y="388" width="390" height="12" fill="#F5F5FF"/>
    <text x="80" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#C62828" font-weight="bold">HttpSession</text>
    <text x="200" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Server-side</text>
    <text x="330" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="7" fill="#555">Secure, no size limit</text>
    <!-- Table border -->
    <rect x="15" y="350" width="390" height="50" rx="4" fill="none" stroke="#3949AB" stroke-width="0.5"/>
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
