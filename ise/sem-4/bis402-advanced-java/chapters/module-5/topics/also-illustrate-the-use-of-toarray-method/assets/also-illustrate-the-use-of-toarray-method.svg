<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="also-illustrate-the-use-of-toarray-method">
    <!-- Gradient background with pastel colors -->
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Title at top -->
    <rect x="10" y="10" width="400" height="30" fill="#2E4053" rx="10"/>
    <text x="20" y="30" font-size="24" font-weight="bold" fill="#fff">Also Illustrate the Use of toArray() Method</text>

    <!-- Section 1: Overview -->
    <section data-narration="Overview">
        <rect x="10" y="60" width="400" height="100" fill="#2E4053" rx="10"/>
        <text x="20" y="80" font-size="18" font-weight="normal" fill="#fff">The toArray() method is a part of the Collection interface in Java, which allows us to convert a collection into an array.</text>
    </section>

    <!-- Section 2: Syntax -->
    <section data-narration="Syntax">
        <rect x="10" y="170" width="400" height="100" fill="#2E4053" rx="10"/>
        <text x="20" y="190" font-size="18" font-weight="normal" fill="#fff">public T[] toArray(T[] array)</text>
        <animate transform="scale(1.2) rotate(30)" begin="600ms" dur="500ms" repeatCount="indefinite"/>
    </section>

    <!-- Section 3: Parameters -->
    <section data-narration="Parameters">
        <rect x="10" y="270" width="400" height="100" fill="#2E4053" rx="10"/>
        <text x="20" y="290" font-size="18" font-weight="normal" fill="#fff">- array: The array to be populated if null.</text>
        <animate transform="scale(1.1) rotate(60)" begin="1000ms" dur="500ms" repeatCount="indefinite"/>
    </section>

    <!-- Section 4: Usage -->
    <section data-narration="Usage">
        <rect x="10" y="370" width="400" height="100" fill="#2E4053" rx="10"/>
        <text x="20" y="390" font-size="18" font-weight="normal" fill="#fff">The toArray() method can be used in a variety of situations:</text>
        <animate transform="scale(1.2) rotate(30)" begin="1500ms" dur="500ms" repeatCount="indefinite"/>
    </section>

    <!-- Section 5: Key Concepts -->
    <section data-narration="Key Concepts">
        <rect x="10" y="470" width="400" height="100" fill="#2E4053" rx="10"/>
        <text x="20" y="490" font-size="18" font-weight="normal" fill="#fff">Array vs. Collection: Arrays and collections are both data structures in Java, but they serve different purposes.</text>
        <animate transform="scale(1.1) rotate(60)" begin="2000ms" dur="500ms" repeatCount="indefinite"/>
    </section>

    <!-- Section 6: Examples -->
    <section data-narration="Examples">
        <rect x="10" y="570" width="400" height="100" fill="#2E4053" rx="10"/>
        <text x="20" y="590" font-size="18" font-weight="normal" fill="#fff">Example 1: Converting a List to an Array</text>
        <animate transform="scale(1.2) rotate(30)" begin="2500ms" dur="500ms" repeatCount="indefinite"/>
    </section>

    <!-- Footer -->
    <rect x="10" y="680" width="400" height="30" fill="#2E4053" rx="10"/>
    <text x="20" y="700" font-size="18" font-weight="normal" fill="#fff">Learn more about arrays and collections at [link]</text>
</svg>