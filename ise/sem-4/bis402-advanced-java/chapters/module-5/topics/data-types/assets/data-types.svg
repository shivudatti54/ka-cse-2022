<svg width="420" height="400" data-topic-id="data-types-verilog">
  <style>
    .gradient-fill {
      fill: rgb(174, 216, 230);
    }
    .section {
      margin-bottom: 20px;
    }
    .section-header {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .section-narration {
      font-size: 14px;
      color: #666;
    }
    .connection {
      stroke: #00698f;
      stroke-width: 2;
    }
    .connection-fill {
      fill: #00698f;
    }
  </style>

  <!-- Header -->
  <rect x="10" y="10" width="400" height="40" class="gradient-fill" rx="10" />
  <text x="15" y="25" font-size="24" font-family="Arial Black" text-anchor="middle">Data Types</text>
  <text x="15" y="50" font-size="14" font-family="Arial" text-anchor="middle" fill="#00698f">Verilog</text>

  <!-- Net Types Section -->
  <rect x="10" y="80" width="400" height="120" class="gradient-fill" rx="10" />
  <rect x="10" y="90" width="100" height="10" class="section" />
  <text x="20" y="100" class="section-header">Net Types</text>
  <text x="20" y="120" class="section-narration">Nets represent physical connections between hardware elements.</text>
  <rect x="120" y="90" width="10" height="10" class="connection" />
  <rect x="120" y="90" width="10" height="10" class="connection-fill" />
  <rect x="120" y="110" width="10" height="10" class="connection" />
  <rect x="120" y="110" width="10" height="10" class="connection-fill" />
  <rect x="130" y="90" width="10" height="10" class="connection" />
  <rect x="130" y="90" width="10" height="10" class="connection-fill" />
  <rect x="130" y="110" width="10" height="10" class="connection" />
  <rect x="130" y="110" width="10" height="10" class="connection-fill" />
  <text x="140" y="100" class="section-narration">Wire: Standard connection. Default for ports.</text>
  <text x="140" y="120" class="section-narration">Tri: Same as wire. Explicit tri-state.</text>
  <text x="140" y="140" class="section-narration">Wand: Wired-AND. Open-drain outputs.</text>
  <text x="140" y="160" class="section-narration">Wor: Wired-OR. Open-collector.</text>
  <text x="140" y="180" class="section-narration">Supply0: Constant 0. Ground connection.</text>
  <text x="140" y="200" class="section-narration">Supply1: Constant 1. VCC connection.</text>

  <!-- Variable Types Section -->
  <rect x="10" y="230" width="400" height="120" class="gradient-fill" rx="10" />
  <rect x="10" y="240" width="100" height="10" class="section" />
  <text x="20" y="250" class="section-header">Variable Types</text>
  <text x="20" y="270" class="section-narration">Variables hold values and can be assigned in procedural blocks.</text>
  <rect x="120" y="240" width="10" height="10" class="connection" />
  <rect x="120" y="240" width="10" height="10" class="connection-fill" />
  <rect x="120" y="260" width="10" height="10" class="connection" />
  <rect x="120" y="260" width="10" height="10" class="connection-fill" />
  <rect x="130" y="240" width="10" height="10" class="connection" />
  <rect x="130" y="240" width="10" height="10" class="connection-fill" />
  <rect x="130" y="260" width="10" height="10" class="connection" />
  <rect x="130" y="260" width="10" height="10" class="connection-fill" />
  <text x="140" y="250" class="section-narration">Reg: Holds a value until reassigned.</text>
  <text x="140" y="270" class="section-narration">Integer: 32-bit signed value.</text>
  <text x="140" y="290" class="section-narration">Real: Floating-point (non-synthesizable).</text>
  <text x="140" y="310" class="section-narration">Time: 64-bit for simulation time.</text>

  <!-- Value Set Section -->
  <rect x="10" y="340" width="400" height="120" class="gradient-fill" rx="10" />
  <rect x="10" y="350" width="100" height="10" class="section" />
  <text x="20" y="360" class="section-header">Value Set</text>
  <text x="20" y="380" class="section-narration">Verilog has four logic values.</text>
  <rect x="120" y="350" width="10" height="10" class="connection" />
  <rect x="120" y="350" width="10" height="10" class="connection-fill" />
  <rect x="120" y="370" width="10" height="10" class="connection" />
  <rect x="120" y="370" width="10" height="10" class="connection-fill" />
  <rect x="130" y="350" width="10" height="10" class="connection" />
  <rect x="130" y="350" width="10" height="10" class="connection-fill" />
  <rect x="130" y="370" width="10" height="10" class="connection" />
  <rect x="130" y="370" width="10" height="10" class="connection-fill" />
  <text x="140" y="360" class="section-narration">0: Logic low. Ground.</text>
  <text x="140" y="380" class="section-narration">1: Logic high. VCC.</text>
  <text x="140" y="400" class="section-narration">x: Unknown. Uninitialized.</text>
  <text x="140" y="420" class="section-narration">z: High impedance. Tri-state.</text>

  <!-- Vectors Section -->
  <rect x="10" y="450" width="400" height="120" class="gradient-fill" rx="10" />
  <rect x="10" y="460" width="100" height="10" class="section" />
  <text x="20" y="470" class="section-header">Vectors</text>
  <text x="20" y="490" class="section-narration">Multi-bit signals using bit ranges.</text>
  <rect x="120" y="460" width="10" height="10" class="connection" />
  <rect x="120" y="460" width="10" height="10" class="connection-fill" />
  <rect x="120" y="480" width="10" height="10" class="connection" />
  <rect x="120" y="480" width="10" height="10" class="connection-fill" />
  <rect x="130" y="460" width="10" height="10" class="connection" />
  <rect x="130" y="460" width="10" height="10" class="connection-fill" />
  <rect x="130" y="480" width="10" height="10" class="connection" />
  <rect x="130" y="480" width="10" height="10" class="connection-fill" />
  <text x="140" y="470" class="section-narration">data[7]: 8-bit vector, data[7] is MSB.</text>
  <text x="140" y="490" class="section-narration">address[31:0]: 32-bit vector.</text>

  <!-- Footer -->
  <rect x="10" y="510" width="400" height="40" class="gradient-fill" rx="10" />
  <text x="15" y="520" font-size="14" font-family="Arial" text-anchor="middle" fill="#00698f">Data Types</text>
</svg>