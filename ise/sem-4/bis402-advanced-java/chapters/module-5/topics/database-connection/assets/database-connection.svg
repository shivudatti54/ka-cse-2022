<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="database-connection">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Database Connection in JDBC. JDBC stands for Java Database Connectivity and provides a standard API for connecting Java applications to relational databases.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3949AB">Database Connection (JDBC)</text>
    <line x1="100" y1="40" x2="320" y2="40" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="100" cy="40" r="3" fill="#E65100"/>
    <circle cx="320" cy="40" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: JDBC Architecture -->
  <g opacity="0" data-narration="The JDBC architecture flows from Java Application through the JDBC API, then to the Driver Manager, which selects the appropriate JDBC Driver to communicate with the Database.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">JDBC Architecture</text>
    <!-- Java App -->
    <rect x="12" y="70" width="68" height="28" rx="5" fill="#3949AB"/>
    <text x="46" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Java App</text>
    <!-- Arrow 1 -->
    <polygon points="80,81 86,84 80,87" fill="#E65100"/>
    <!-- JDBC API -->
    <rect x="90" y="70" width="68" height="28" rx="5" fill="#00695C"/>
    <text x="124" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">JDBC API</text>
    <!-- Arrow 2 -->
    <polygon points="158,81 164,84 158,87" fill="#E65100"/>
    <!-- Driver Manager -->
    <rect x="168" y="70" width="76" height="28" rx="5" fill="#3949AB"/>
    <text x="206" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Driver</text>
    <text x="206" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Manager</text>
    <!-- Arrow 3 -->
    <polygon points="244,81 250,84 244,87" fill="#E65100"/>
    <!-- JDBC Driver -->
    <rect x="254" y="70" width="68" height="28" rx="5" fill="#00695C"/>
    <text x="288" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">JDBC</text>
    <text x="288" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">Driver</text>
    <!-- Arrow 4 -->
    <polygon points="322,81 328,84 322,87" fill="#E65100"/>
    <!-- Database -->
    <rect x="332" y="70" width="74" height="28" rx="5" fill="#C62828"/>
    <text x="369" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Database</text>
  </g>

  <!-- Group 3: Connection Steps -->
  <g opacity="0" data-narration="There are six key steps to establish a JDBC connection. First, load the driver using Class dot forName. Second, get a connection via DriverManager dot getConnection. Third, create a statement. Fourth, execute the query. Fifth, process the results. Sixth, close all resources.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Connection Steps</text>
    <!-- Step 1 -->
    <rect x="14" y="128" width="120" height="22" rx="4" fill="#3949AB"/>
    <text x="74" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white">1. Class.forName(driver)</text>
    <!-- Arrow -->
    <polygon points="134,137 140,139 134,141" fill="#E65100"/>
    <!-- Step 2 -->
    <rect x="142" y="128" width="138" height="22" rx="4" fill="#00695C"/>
    <text x="211" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white">2. DriverManager.getConnection()</text>
    <!-- Arrow -->
    <polygon points="280,137 286,139 280,141" fill="#E65100"/>
    <!-- Step 3 -->
    <rect x="288" y="128" width="118" height="22" rx="4" fill="#3949AB"/>
    <text x="347" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white">3. createStatement()</text>
    <!-- Step 4 -->
    <rect x="14" y="156" width="120" height="22" rx="4" fill="#00695C"/>
    <text x="74" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white">4. executeQuery(sql)</text>
    <!-- Arrow -->
    <polygon points="134,165 140,167 134,169" fill="#E65100"/>
    <!-- Step 5 -->
    <rect x="142" y="156" width="138" height="22" rx="4" fill="#3949AB"/>
    <text x="211" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white">5. Process ResultSet</text>
    <!-- Arrow -->
    <polygon points="280,165 286,167 280,169" fill="#E65100"/>
    <!-- Step 6 -->
    <rect x="288" y="156" width="118" height="22" rx="4" fill="#C62828"/>
    <text x="347" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="white">6. Close Resources</text>
  </g>

  <!-- Group 4: Connection URL Format -->
  <g opacity="0" data-narration="The JDBC connection URL follows the format jdbc colon subprotocol colon subname. For MySQL it is jdbc colon mysql colon slash slash localhost colon 3306 slash dbname. For PostgreSQL, jdbc colon postgresql, and for Oracle, jdbc colon oracle colon thin.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Connection URL Format</text>
    <!-- Format box -->
    <rect x="30" y="205" width="360" height="22" rx="5" fill="#3949AB" opacity="0.9"/>
    <text x="210" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="white">jdbc : subprotocol : subname</text>
    <!-- MySQL -->
    <rect x="14" y="232" width="126" height="20" rx="4" fill="#00695C"/>
    <text x="77" y="246" text-anchor="middle" font-family="monospace" font-size="7" fill="white">jdbc:mysql://host:3306/db</text>
    <!-- PostgreSQL -->
    <rect x="147" y="232" width="140" height="20" rx="4" fill="#00695C"/>
    <text x="217" y="246" text-anchor="middle" font-family="monospace" font-size="7" fill="white">jdbc:postgresql://host:5432/db</text>
    <!-- Oracle -->
    <rect x="294" y="232" width="112" height="20" rx="4" fill="#00695C"/>
    <text x="350" y="246" text-anchor="middle" font-family="monospace" font-size="7" fill="white">jdbc:oracle:thin:@host</text>
    <!-- Labels -->
    <text x="77" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">MySQL</text>
    <text x="217" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">PostgreSQL</text>
    <text x="350" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">Oracle</text>
  </g>

  <!-- Group 5: Connection Pooling -->
  <g opacity="0" data-narration="Connection pooling improves performance by maintaining a pool of pre-created database connections. Applications borrow connections from the pool and return them after use, avoiding the overhead of creating new connections each time. The DataSource interface is used for pooling.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Connection Pooling</text>
    <!-- Application box -->
    <rect x="14" y="288" width="70" height="40" rx="5" fill="#3949AB"/>
    <text x="49" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Application</text>
    <text x="49" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C5CAE9">(DataSource)</text>
    <!-- Borrow arrow -->
    <line x1="84" y1="302" x2="138" y2="302" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="138,299 144,302 138,305" fill="#E65100"/>
    <text x="111" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E65100">borrow</text>
    <!-- Return arrow -->
    <line x1="138" y1="314" x2="84" y2="314" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="84,311 78,314 84,317" fill="#00695C"/>
    <text x="111" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#00695C">return</text>
    <!-- Pool box -->
    <rect x="144" y="288" width="130" height="40" rx="5" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <text x="209" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#3949AB">Connection Pool</text>
    <!-- Pool connections -->
    <rect x="152" y="304" width="18" height="14" rx="3" fill="#3949AB" opacity="0.7"/>
    <rect x="174" y="304" width="18" height="14" rx="3" fill="#3949AB" opacity="0.7"/>
    <rect x="196" y="304" width="18" height="14" rx="3" fill="#3949AB" opacity="0.7"/>
    <rect x="218" y="304" width="18" height="14" rx="3" fill="#3949AB" opacity="0.5" stroke="#E65100" stroke-width="1" stroke-dasharray="2,1"/>
    <rect x="240" y="304" width="18" height="14" rx="3" fill="#3949AB" opacity="0.5" stroke="#E65100" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="161" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="white">C1</text>
    <text x="183" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="white">C2</text>
    <text x="205" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="white">C3</text>
    <text x="227" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="white">C4</text>
    <text x="249" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="white">C5</text>
    <!-- Arrow to DB -->
    <line x1="274" y1="308" x2="310" y2="308" stroke="#E65100" stroke-width="1.5"/>
    <polygon points="310,305 316,308 310,311" fill="#E65100"/>
    <!-- Database icon -->
    <ellipse cx="350" cy="295" rx="30" ry="8" fill="#C62828"/>
    <rect x="320" y="295" width="60" height="25" fill="#C62828"/>
    <ellipse cx="350" cy="320" rx="30" ry="8" fill="#C62828"/>
    <ellipse cx="350" cy="295" rx="30" ry="8" fill="#E57373" opacity="0.5"/>
    <text x="350" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Database</text>
  </g>

  <!-- Group 6: Statement Types -->
  <g opacity="0" data-narration="JDBC provides three types of statements. Statement is for simple SQL queries. PreparedStatement handles parameterized queries with precompiled SQL for better performance and security. CallableStatement is used to execute stored procedures in the database.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">Statement Types</text>
    <!-- Statement -->
    <rect x="14" y="352" width="124" height="36" rx="5" fill="#3949AB"/>
    <text x="76" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Statement</text>
    <text x="76" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#C5CAE9">Simple SQL queries</text>
    <!-- PreparedStatement -->
    <rect x="148" y="352" width="124" height="36" rx="5" fill="#E65100"/>
    <text x="210" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">PreparedStatement</text>
    <text x="210" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#FFE0B2">Parameterized queries</text>
    <!-- CallableStatement -->
    <rect x="282" y="352" width="124" height="36" rx="5" fill="#C62828"/>
    <text x="344" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">CallableStatement</text>
    <text x="344" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#FFCDD2">Stored procedures</text>
  </g>
</svg>
