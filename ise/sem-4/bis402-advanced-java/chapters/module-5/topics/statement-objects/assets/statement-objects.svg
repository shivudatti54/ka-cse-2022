    <text x="50" y="10" font-size="16" text-anchor="middle">SQL Statement Execution</text>
    <text x="50" y="30" font-size="14" text-anchor="middle">Statements are used to execute SQL statements, which can be SELECT, INSERT, UPDATE, or DELETE statements.</text>
