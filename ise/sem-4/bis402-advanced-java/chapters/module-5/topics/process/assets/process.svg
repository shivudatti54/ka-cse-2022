<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="process">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title (0.3s) -->
  <g opacity="0" data-narration="JDBC Process. This diagram illustrates the complete JDBC workflow, driver types, statement execution, ResultSet navigation, and resource management.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3949AB">JDBC Process / Workflow</text>
    <line x1="120" y1="34" x2="300" y2="34" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="120" cy="34" r="3" fill="#E65100"/>
    <circle cx="300" cy="34" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: JDBC Workflow vertical flow (1.5s) -->
  <g opacity="0" data-narration="The JDBC workflow follows seven steps: Import packages, Load driver, Establish connection, Create statement, Execute query, Process results, and Close resources.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Step boxes along the left column -->
    <rect x="12" y="46" width="115" height="22" rx="4" fill="#3949AB"/>
    <text x="69" y="61" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">1. Import packages</text>
    <line x1="69" y1="68" x2="69" y2="74" stroke="#3949AB" stroke-width="1.5" marker-end="none"/>
    <polygon points="65,73 69,78 73,73" fill="#3949AB"/>

    <rect x="12" y="80" width="115" height="22" rx="4" fill="#00695C"/>
    <text x="69" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">2. Load Driver</text>
    <line x1="69" y1="102" x2="69" y2="108" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="65,107 69,112 73,107" fill="#00695C"/>

    <rect x="12" y="114" width="115" height="22" rx="4" fill="#3949AB"/>
    <text x="69" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">3. Get Connection</text>
    <line x1="69" y1="136" x2="69" y2="142" stroke="#3949AB" stroke-width="1.5"/>
    <polygon points="65,141 69,146 73,141" fill="#3949AB"/>

    <rect x="12" y="148" width="115" height="22" rx="4" fill="#00695C"/>
    <text x="69" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">4. Create Statement</text>
    <line x1="69" y1="170" x2="69" y2="176" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="65,175 69,180 73,175" fill="#00695C"/>

    <rect x="12" y="182" width="115" height="22" rx="4" fill="#3949AB"/>
    <text x="69" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">5. Execute Query</text>
    <line x1="69" y1="204" x2="69" y2="210" stroke="#3949AB" stroke-width="1.5"/>
    <polygon points="65,209 69,214 73,209" fill="#3949AB"/>

    <rect x="12" y="216" width="115" height="22" rx="4" fill="#00695C"/>
    <text x="69" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">6. Process Results</text>
    <line x1="69" y1="238" x2="69" y2="244" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="65,243 69,248 73,243" fill="#00695C"/>

    <rect x="12" y="250" width="115" height="22" rx="4" fill="#C62828"/>
    <text x="69" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">7. Close Resources</text>
  </g>

  <!-- Group 3: Driver Types (3.0s) -->
  <g opacity="0" data-narration="JDBC supports four driver types. Type 1 is the JDBC-ODBC Bridge. Type 2 uses Native API. Type 3 is Network Protocol based. Type 4, the Thin or Pure Java driver, is the most commonly used.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="290" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">JDBC Driver Types</text>

    <rect x="140" y="64" width="135" height="28" rx="5" fill="#3949AB" opacity="0.9"/>
    <text x="148" y="82" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Type 1</text>
    <text x="185" y="82" font-family="Arial, sans-serif" font-size="8" fill="#C5CAE9">JDBC-ODBC Bridge</text>

    <rect x="282" y="64" width="130" height="28" rx="5" fill="#00695C" opacity="0.9"/>
    <text x="290" y="82" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Type 2</text>
    <text x="323" y="82" font-family="Arial, sans-serif" font-size="8" fill="#B2DFDB">Native API</text>

    <rect x="140" y="96" width="135" height="28" rx="5" fill="#E65100" opacity="0.9"/>
    <text x="148" y="114" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Type 3</text>
    <text x="185" y="114" font-family="Arial, sans-serif" font-size="8" fill="#FFE0B2">Network Protocol</text>

    <rect x="282" y="96" width="130" height="28" rx="5" fill="#C62828" opacity="0.9"/>
    <text x="290" y="114" font-family="Arial, sans-serif" font-size="8.5" fill="white" font-weight="bold">Type 4</text>
    <text x="323" y="114" font-family="Arial, sans-serif" font-size="8" fill="#FFCDD2">Thin / Pure Java</text>
  </g>

  <!-- Group 4: Statement Execution Types (4.5s) -->
  <g opacity="0" data-narration="There are three statement execution methods. executeQuery returns a ResultSet for SELECT statements. executeUpdate returns an integer for INSERT, UPDATE, or DELETE. execute returns a boolean and is used for any SQL statement.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="290" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">Statement Execution</text>

    <!-- executeQuery -->
    <rect x="140" y="153" width="268" height="26" rx="5" fill="white" stroke="#3949AB" stroke-width="1.2"/>
    <text x="150" y="170" font-family="monospace" font-size="9" fill="#3949AB" font-weight="bold">executeQuery()</text>
    <text x="280" y="170" font-family="Arial, sans-serif" font-size="8.5" fill="#00695C">→ ResultSet (SELECT)</text>

    <!-- executeUpdate -->
    <rect x="140" y="183" width="268" height="26" rx="5" fill="white" stroke="#E65100" stroke-width="1.2"/>
    <text x="150" y="200" font-family="monospace" font-size="9" fill="#E65100" font-weight="bold">executeUpdate()</text>
    <text x="280" y="200" font-family="Arial, sans-serif" font-size="8.5" fill="#00695C">→ int (rows affected)</text>

    <!-- execute -->
    <rect x="140" y="213" width="268" height="26" rx="5" fill="white" stroke="#C62828" stroke-width="1.2"/>
    <text x="150" y="230" font-family="monospace" font-size="9" fill="#C62828" font-weight="bold">execute()</text>
    <text x="280" y="230" font-family="Arial, sans-serif" font-size="8.5" fill="#00695C">→ boolean (any SQL)</text>
  </g>

  <!-- Group 5: ResultSet Navigation (6.0s) -->
  <g opacity="0" data-narration="ResultSet provides cursor navigation methods: next moves forward, previous moves backward, first and last jump to endpoints, and absolute n jumps to a specific row.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3949AB">ResultSet Navigation</text>

    <!-- Row boxes representing a cursor -->
    <rect x="14" y="300" width="50" height="20" rx="3" fill="#3949AB"/>
    <text x="39" y="314" text-anchor="middle" font-family="monospace" font-size="7.5" fill="white">first()</text>

    <rect x="70" y="300" width="62" height="20" rx="3" fill="#00695C"/>
    <text x="101" y="314" text-anchor="middle" font-family="monospace" font-size="7.5" fill="white">previous()</text>

    <rect x="138" y="300" width="50" height="20" rx="3" fill="#E65100"/>
    <text x="163" y="314" text-anchor="middle" font-family="monospace" font-size="7.5" fill="white">next()</text>

    <rect x="194" y="300" width="46" height="20" rx="3" fill="#3949AB"/>
    <text x="217" y="314" text-anchor="middle" font-family="monospace" font-size="7.5" fill="white">last()</text>

    <rect x="246" y="300" width="70" height="20" rx="3" fill="#C62828"/>
    <text x="281" y="314" text-anchor="middle" font-family="monospace" font-size="7.5" fill="white">absolute(n)</text>

    <!-- Cursor illustration -->
    <rect x="330" y="298" width="78" height="24" rx="4" fill="white" stroke="#3949AB" stroke-width="1"/>
    <text x="336" y="307" font-family="Arial, sans-serif" font-size="7" fill="#3949AB">Row 1</text>
    <text x="336" y="317" font-family="Arial, sans-serif" font-size="7" fill="#E65100" font-weight="bold">▶ Row 2 (cursor)</text>

    <!-- Arrow showing cursor direction -->
    <line x1="14" y1="326" x2="316" y2="326" stroke="#3949AB" stroke-width="1" stroke-dasharray="3,2"/>
    <polygon points="312,323 318,326 312,329" fill="#3949AB"/>
    <text x="165" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C">← Scrollable cursor direction →</text>
  </g>

  <!-- Group 6: Resource Management (7.5s) -->
  <g opacity="0" data-narration="Proper resource management uses try-with-resources and the AutoCloseable interface. Always close in the correct order: ResultSet first, then Statement, then Connection.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C62828">Resource Management</text>

    <!-- try-with-resources box -->
    <rect x="14" y="362" width="130" height="30" rx="5" fill="white" stroke="#00695C" stroke-width="1.2"/>
    <text x="79" y="375" text-anchor="middle" font-family="monospace" font-size="8" fill="#00695C" font-weight="bold">try-with-resources</text>
    <text x="79" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB">AutoCloseable interface</text>

    <!-- Closing order -->
    <rect x="155" y="362" width="68" height="30" rx="5" fill="#E65100"/>
    <text x="189" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">ResultSet</text>
    <text x="189" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFE0B2">close first</text>

    <text x="230" y="381" font-family="Arial, sans-serif" font-size="12" fill="#3949AB">→</text>

    <rect x="240" y="362" width="68" height="30" rx="5" fill="#3949AB"/>
    <text x="274" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">Statement</text>
    <text x="274" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C5CAE9">close second</text>

    <text x="315" y="381" font-family="Arial, sans-serif" font-size="12" fill="#3949AB">→</text>

    <rect x="325" y="362" width="82" height="30" rx="5" fill="#C62828"/>
    <text x="366" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">Connection</text>
    <text x="366" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFCDD2">close last</text>
  </g>
</svg>
