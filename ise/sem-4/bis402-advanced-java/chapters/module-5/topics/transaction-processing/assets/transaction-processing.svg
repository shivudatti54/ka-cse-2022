<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="transaction-processing">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="acidGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="stepsGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#3949AB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Transaction Processing in JDBC ensures data integrity by grouping database operations into atomic units.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB" text-anchor="middle">Transaction Processing</text>
    <line x1="110" y1="36" x2="310" y2="36" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="140" y1="40" x2="280" y2="40" stroke="#00695C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Group 2: ACID Properties -->
  <g opacity="0" data-narration="ACID properties guarantee reliable transactions: Atomicity means all or nothing, Consistency preserves valid state, Isolation separates concurrent transactions, and Durability ensures committed data persists.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Atomicity -->
    <rect x="16" y="50" width="90" height="48" rx="6" fill="#3949AB" opacity="0.9"/>
    <text x="61" y="69" font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Atomicity</text>
    <text x="61" y="82" font-family="Arial" font-size="8" fill="#C5CAE9" text-anchor="middle">All or Nothing</text>
    <!-- Consistency -->
    <rect x="114" y="50" width="90" height="48" rx="6" fill="#00695C" opacity="0.9"/>
    <text x="159" y="69" font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Consistency</text>
    <text x="159" y="82" font-family="Arial" font-size="8" fill="#A5D6A7" text-anchor="middle">Valid State</text>
    <!-- Isolation -->
    <rect x="212" y="50" width="90" height="48" rx="6" fill="#E65100" opacity="0.9"/>
    <text x="257" y="69" font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Isolation</text>
    <text x="257" y="82" font-family="Arial" font-size="8" fill="#FFCC80" text-anchor="middle">Separate Txns</text>
    <!-- Durability -->
    <rect x="310" y="50" width="94" height="48" rx="6" fill="#C62828" opacity="0.9"/>
    <text x="357" y="69" font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Durability</text>
    <text x="357" y="82" font-family="Arial" font-size="8" fill="#FFCDD2" text-anchor="middle">Persists Data</text>
  </g>

  <!-- Group 3: Transaction Flow -->
  <g opacity="0" data-narration="A transaction begins, executes read and write operations, then either commits on success or rolls back on failure to maintain consistency.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <!-- BEGIN box -->
    <rect x="16" y="108" width="60" height="26" rx="13" fill="#3949AB"/>
    <text x="46" y="125" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">BEGIN</text>
    <!-- Arrow to Operations -->
    <polygon points="78,118 84,121 78,124" fill="#3949AB"/>
    <line x1="76" y1="121" x2="82" y2="121" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Operations box -->
    <rect x="86" y="108" width="120" height="26" rx="5" fill="#FFFFFF" stroke="#3949AB" stroke-width="1.5"/>
    <text x="146" y="123" font-family="monospace" font-size="9" fill="#3949AB" text-anchor="middle">Read / Write Ops</text>
    <!-- Arrow to COMMIT (success) -->
    <line x1="206" y1="114" x2="262" y2="114" stroke="#00695C" stroke-width="1.5"/>
    <polygon points="260,111 266,114 260,117" fill="#00695C"/>
    <text x="234" y="110" font-family="Arial" font-size="7" fill="#00695C" text-anchor="middle">success</text>
    <!-- COMMIT box -->
    <rect x="268" y="104" width="64" height="22" rx="11" fill="#00695C"/>
    <text x="300" y="118" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">COMMIT</text>
    <text x="340" y="118" font-family="Arial" font-size="12" fill="#00695C">&#x2713;</text>
    <!-- Arrow to ROLLBACK (failure) -->
    <line x1="206" y1="128" x2="262" y2="128" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="260,125 266,128 260,131" fill="#C62828"/>
    <text x="234" y="137" font-family="Arial" font-size="7" fill="#C62828" text-anchor="middle">failure</text>
    <!-- ROLLBACK box -->
    <rect x="268" y="120" width="80" height="22" rx="11" fill="#C62828"/>
    <text x="308" y="134" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ROLLBACK</text>
    <text x="356" y="135" font-family="Arial" font-size="12" fill="#C62828">&#x2717;</text>
  </g>

  <!-- Group 4: JDBC Transaction Code Pattern -->
  <g opacity="0" data-narration="In JDBC, disable auto-commit, execute SQL statements, then commit. If an exception occurs, call rollback in the catch block to undo all changes.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="16" y="150" width="388" height="112" rx="6" fill="#1A237E" opacity="0.92"/>
    <text x="210" y="167" font-family="Arial" font-size="10" font-weight="bold" fill="#7986CB" text-anchor="middle">JDBC Transaction Pattern</text>
    <!-- Code lines - try block -->
    <text x="26" y="183" font-family="monospace" font-size="9" fill="#FFCC80">try {</text>
    <text x="36" y="197" font-family="monospace" font-size="9" fill="#81D4FA">conn.setAutoCommit(</text><text x="183" y="197" font-family="monospace" font-size="9" fill="#EF9A9A">false</text><text x="213" y="197" font-family="monospace" font-size="9" fill="#81D4FA">);</text>
    <text x="36" y="211" font-family="monospace" font-size="9" fill="#81D4FA">stmt.executeUpdate(sql1);</text>
    <text x="36" y="225" font-family="monospace" font-size="9" fill="#81D4FA">stmt.executeUpdate(sql2);</text>
    <text x="36" y="239" font-family="monospace" font-size="9" fill="#66BB6A">conn.commit();</text>
    <text x="145" y="239" font-family="monospace" font-size="8" fill="#A5D6A7">// success</text>
    <!-- Divider -->
    <line x1="248" y1="175" x2="248" y2="254" stroke="#7986CB" stroke-width="0.5" stroke-dasharray="3,3"/>
    <!-- catch block -->
    <text x="258" y="183" font-family="monospace" font-size="9" fill="#FFCC80">} catch (SQLException e) {</text>
    <text x="268" y="199" font-family="monospace" font-size="9" fill="#EF9A9A">conn.rollback();</text>
    <text x="268" y="213" font-family="monospace" font-size="8" fill="#A5D6A7">// undo all changes</text>
    <text x="268" y="227" font-family="monospace" font-size="9" fill="#81D4FA">e.printStackTrace();</text>
    <text x="258" y="241" font-family="monospace" font-size="9" fill="#FFCC80">}</text>
    <!-- Highlight boxes -->
    <rect x="32" y="230" width="108" height="14" rx="2" fill="#00695C" opacity="0.2"/>
    <rect x="264" y="190" width="118" height="14" rx="2" fill="#C62828" opacity="0.2"/>
  </g>

  <!-- Group 5: Isolation Levels as ascending steps -->
  <g opacity="0" data-narration="JDBC supports four isolation levels in ascending order: Read Uncommitted allows dirty reads, Read Committed prevents them, Repeatable Read prevents non-repeatable reads, and Serializable provides the highest isolation.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="16" y="278" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Isolation Levels</text>
    <!-- Step 1 -->
    <rect x="16" y="330" width="88" height="22" rx="3" fill="#E65100" opacity="0.75"/>
    <text x="60" y="344" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">READ_UNCOMMITTED</text>
    <text x="60" y="328" font-family="Arial" font-size="7" fill="#E65100" text-anchor="middle">Level 1</text>
    <!-- Step 2 -->
    <rect x="112" y="316" width="88" height="22" rx="3" fill="#E65100" opacity="0.85"/>
    <text x="156" y="330" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">READ_COMMITTED</text>
    <text x="156" y="314" font-family="Arial" font-size="7" fill="#E65100" text-anchor="middle">Level 2</text>
    <!-- Step 3 -->
    <rect x="208" y="302" width="88" height="22" rx="3" fill="#3949AB" opacity="0.85"/>
    <text x="252" y="316" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">REPEATABLE_READ</text>
    <text x="252" y="300" font-family="Arial" font-size="7" fill="#3949AB" text-anchor="middle">Level 3</text>
    <!-- Step 4 -->
    <rect x="304" y="288" width="100" height="22" rx="3" fill="#3949AB"/>
    <text x="354" y="302" font-family="monospace" font-size="7" fill="#FFFFFF" text-anchor="middle">SERIALIZABLE</text>
    <text x="354" y="286" font-family="Arial" font-size="7" fill="#3949AB" text-anchor="middle">Level 4 (Highest)</text>
    <!-- Ascending arrow line -->
    <line x1="50" y1="352" x2="370" y2="288" stroke="url(#stepsGrad)" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  </g>

  <!-- Group 6: Savepoints -->
  <g opacity="0" data-narration="Savepoints allow partial rollback within a transaction. Use setSavepoint to mark a point, then rollback to that savepoint to undo only the operations after it while keeping earlier changes.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="16" y="368" font-family="Arial" font-size="10" font-weight="bold" fill="#00695C">Savepoints (Partial Rollback)</text>
    <!-- Timeline bar -->
    <rect x="16" y="376" width="388" height="6" rx="3" fill="#3949AB" opacity="0.2"/>
    <!-- Op 1 marker -->
    <circle cx="56" cy="379" r="5" fill="#00695C"/>
    <text x="56" y="395" font-family="monospace" font-size="7" fill="#3949AB" text-anchor="middle">Op1</text>
    <!-- Savepoint marker -->
    <rect x="126" y="373" width="10" height="12" rx="2" fill="#E65100"/>
    <text x="131" y="370" font-family="monospace" font-size="7" fill="#E65100" text-anchor="middle">setSavepoint()</text>
    <!-- Op 2 marker -->
    <circle cx="196" cy="379" r="5" fill="#00695C"/>
    <text x="196" y="395" font-family="monospace" font-size="7" fill="#3949AB" text-anchor="middle">Op2</text>
    <!-- Op 3 marker (rolled back) -->
    <circle cx="256" cy="379" r="5" fill="#C62828" opacity="0.5"/>
    <text x="256" y="395" font-family="monospace" font-size="7" fill="#C62828" text-anchor="middle">Op3</text>
    <!-- Rollback zone -->
    <rect x="140" y="374" width="178" height="8" rx="2" fill="#C62828" opacity="0.15"/>
    <text x="330" y="370" font-family="monospace" font-size="7" fill="#C62828" text-anchor="middle">rollback(sp)</text>
    <!-- Arrow showing rollback -->
    <line x1="318" y1="379" x2="142" y2="379" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
    <polygon points="144,377 138,379 144,381" fill="#C62828"/>
    <!-- Kept indicator -->
    <text x="56" y="373" font-family="Arial" font-size="7" fill="#00695C" text-anchor="middle">kept</text>
    <!-- Undone indicator -->
    <text x="226" y="373" font-family="Arial" font-size="7" fill="#C62828" text-anchor="middle">undone</text>
  </g>
</svg>
