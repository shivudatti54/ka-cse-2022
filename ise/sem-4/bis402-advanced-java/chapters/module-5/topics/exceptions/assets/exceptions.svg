<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="exceptions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="JDBC Exceptions — understanding how Java handles database errors through the SQLException hierarchy.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#titleGrad)">JDBC Exceptions</text>
    <line x1="120" y1="36" x2="120" y2="36" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="x2" from="120" to="300" begin="0.3s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="150" y1="40" x2="150" y2="40" stroke="#C62828" stroke-width="1.2" stroke-linecap="round" opacity="0.5">
      <animate attributeName="x2" from="150" to="270" begin="0.5s" dur="0.5s" fill="freeze"/>
    </line>
  </g>

  <!-- Group 2: SQLException Hierarchy -->
  <g opacity="0" data-narration="SQLException is the root class. It has subclasses: SQLWarning, BatchUpdateException, and SQLTimeoutException. DataTruncation extends SQLWarning.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Root node -->
    <rect x="145" y="50" width="130" height="24" rx="5" fill="#3949AB" stroke="#283593" stroke-width="1"/>
    <text x="210" y="66" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF" font-weight="bold">SQLException</text>
    <!-- Vertical connector -->
    <line x1="210" y1="74" x2="210" y2="82" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Horizontal connector -->
    <line x1="65" y1="82" x2="355" y2="82" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Drop lines -->
    <line x1="65" y1="82" x2="65" y2="88" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="170" y1="82" x2="170" y2="88" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="290" y1="82" x2="290" y2="88" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Child: SQLWarning -->
    <rect x="15" y="88" width="100" height="22" rx="4" fill="#00695C" stroke="#004D40" stroke-width="1"/>
    <text x="65" y="103" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#FFFFFF">SQLWarning</text>
    <!-- Child: BatchUpdateException -->
    <rect x="120" y="88" width="100" height="22" rx="4" fill="#E65100" stroke="#BF360C" stroke-width="1"/>
    <text x="170" y="103" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">BatchUpdateExc.</text>
    <!-- Child: SQLTimeoutException -->
    <rect x="240" y="88" width="100" height="22" rx="4" fill="#C62828" stroke="#B71C1C" stroke-width="1"/>
    <text x="290" y="103" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFFFFF">SQLTimeoutExc.</text>
    <!-- DataTruncation from SQLWarning -->
    <line x1="65" y1="110" x2="65" y2="118" stroke="#00695C" stroke-width="1.2"/>
    <rect x="15" y="118" width="100" height="22" rx="4" fill="#00695C" stroke="#004D40" stroke-width="1" opacity="0.75"/>
    <text x="65" y="133" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFFFFF">DataTruncation</text>
    <!-- Legend -->
    <text x="370" y="98" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" text-anchor="end">extends</text>
    <text x="370" y="133" font-family="Arial, sans-serif" font-size="7" fill="#00695C" text-anchor="end">extends</text>
  </g>

  <!-- Group 3: Key Methods -->
  <g opacity="0" data-narration="SQLException provides key methods: getMessage returns the error description, getSQLState returns the SQL state code, getErrorCode returns vendor-specific error code, and getNextException retrieves chained exceptions.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <rect x="10" y="148" width="400" height="68" rx="6" fill="url(#boxGrad)" stroke="#3949AB" stroke-width="1" opacity="0.9"/>
    <text x="210" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">SQLException Key Methods</text>
    <!-- Method 1 -->
    <circle cx="30" cy="176" r="3" fill="#3949AB"/>
    <text x="38" y="179" font-family="monospace" font-size="8.5" fill="#00695C" font-weight="bold">getMessage()</text>
    <text x="128" y="179" font-family="Arial, sans-serif" font-size="8" fill="#333333">— error description</text>
    <!-- Method 2 -->
    <circle cx="230" cy="176" r="3" fill="#3949AB"/>
    <text x="238" y="179" font-family="monospace" font-size="8.5" fill="#00695C" font-weight="bold">getSQLState()</text>
    <text x="330" y="179" font-family="Arial, sans-serif" font-size="8" fill="#333333">— SQL state code</text>
    <!-- Method 3 -->
    <circle cx="30" cy="194" r="3" fill="#E65100"/>
    <text x="38" y="197" font-family="monospace" font-size="8.5" fill="#E65100" font-weight="bold">getErrorCode()</text>
    <text x="135" y="197" font-family="Arial, sans-serif" font-size="8" fill="#333333">— vendor error code</text>
    <!-- Method 4 -->
    <circle cx="230" cy="194" r="3" fill="#C62828"/>
    <text x="238" y="197" font-family="monospace" font-size="8.5" fill="#C62828" font-weight="bold">getNextException()</text>
    <text x="355" y="197" font-family="Arial, sans-serif" font-size="8" fill="#333333">— chained exc.</text>
    <!-- Chain illustration -->
    <text x="210" y="211" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB" opacity="0.7">e.getNextException() &#x2192; next SQLException &#x2192; next &#x2192; null</text>
  </g>

  <!-- Group 4: Common JDBC Exceptions with error codes -->
  <g opacity="0" data-narration="Common JDBC exceptions include connection refused with SQL state 08001, table not found with 42S02, constraint violation with 23000, and syntax error with 42000.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="10" y="222" width="400" height="56" rx="6" fill="url(#boxGrad)" stroke="#E65100" stroke-width="1" opacity="0.9"/>
    <text x="210" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Common JDBC Exceptions</text>
    <!-- Item 1 -->
    <rect x="18" y="242" width="92" height="28" rx="4" fill="#C62828" opacity="0.1" stroke="#C62828" stroke-width="0.5"/>
    <text x="64" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#C62828">Connection Refused</text>
    <text x="64" y="265" text-anchor="middle" font-family="monospace" font-size="7" fill="#C62828" opacity="0.8">SQLState: 08001</text>
    <!-- Item 2 -->
    <rect x="116" y="242" width="94" height="28" rx="4" fill="#E65100" opacity="0.1" stroke="#E65100" stroke-width="0.5"/>
    <text x="163" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Table Not Found</text>
    <text x="163" y="265" text-anchor="middle" font-family="monospace" font-size="7" fill="#E65100" opacity="0.8">SQLState: 42S02</text>
    <!-- Item 3 -->
    <rect x="216" y="242" width="94" height="28" rx="4" fill="#3949AB" opacity="0.1" stroke="#3949AB" stroke-width="0.5"/>
    <text x="263" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3949AB">Constraint Violation</text>
    <text x="263" y="265" text-anchor="middle" font-family="monospace" font-size="7" fill="#3949AB" opacity="0.8">SQLState: 23000</text>
    <!-- Item 4 -->
    <rect x="316" y="242" width="86" height="28" rx="4" fill="#00695C" opacity="0.1" stroke="#00695C" stroke-width="0.5"/>
    <text x="359" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00695C">Syntax Error</text>
    <text x="359" y="265" text-anchor="middle" font-family="monospace" font-size="7" fill="#00695C" opacity="0.8">SQLState: 42000</text>
  </g>

  <!-- Group 5: Exception Handling Pattern -->
  <g opacity="0" data-narration="The standard JDBC exception handling pattern uses a try block for getConnection, createStatement, and executeQuery. The catch block handles the SQLException chain by iterating with getNextException. The finally block closes all resources.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <rect x="10" y="284" width="400" height="62" rx="6" fill="url(#boxGrad)" stroke="#00695C" stroke-width="1" opacity="0.9"/>
    <text x="210" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00695C">Exception Handling Pattern</text>
    <!-- Try block -->
    <rect x="18" y="304" width="120" height="36" rx="4" fill="#3949AB" opacity="0.12"/>
    <text x="24" y="315" font-family="monospace" font-size="7.5" fill="#3949AB" font-weight="bold">try {</text>
    <text x="30" y="324" font-family="monospace" font-size="6.5" fill="#333333">getConnection(url)</text>
    <text x="30" y="332" font-family="monospace" font-size="6.5" fill="#333333">createStatement()</text>
    <text x="30" y="340" font-family="monospace" font-size="6.5" fill="#333333">executeQuery(sql)</text>
    <!-- Arrow try to catch -->
    <text x="143" y="324" font-family="Arial" font-size="12" fill="#3949AB">&#x2192;</text>
    <!-- Catch block -->
    <rect x="155" y="304" width="138" height="36" rx="4" fill="#C62828" opacity="0.12"/>
    <text x="161" y="315" font-family="monospace" font-size="7.5" fill="#C62828" font-weight="bold">catch (SQLException e) {</text>
    <text x="165" y="324" font-family="monospace" font-size="6.5" fill="#333333">while(e != null) {</text>
    <text x="172" y="332" font-family="monospace" font-size="6.5" fill="#333333">log(e.getMessage())</text>
    <text x="172" y="340" font-family="monospace" font-size="6.5" fill="#333333">e=e.getNextException()</text>
    <!-- Arrow catch to finally -->
    <text x="298" y="324" font-family="Arial" font-size="12" fill="#C62828">&#x2192;</text>
    <!-- Finally block -->
    <rect x="310" y="304" width="92" height="36" rx="4" fill="#00695C" opacity="0.12"/>
    <text x="316" y="315" font-family="monospace" font-size="7.5" fill="#00695C" font-weight="bold">finally {</text>
    <text x="320" y="326" font-family="monospace" font-size="6.5" fill="#333333">rs.close()</text>
    <text x="320" y="335" font-family="monospace" font-size="6.5" fill="#333333">stmt.close()</text>
    <text x="320" y="344" font-family="monospace" font-size="6.5" fill="#333333">conn.close()</text>
  </g>

  <!-- Group 6: Best Practices -->
  <g opacity="0" data-narration="Best practices for JDBC exception handling: use try-with-resources for automatic cleanup, handle specific exception subclasses, always log SQL state codes, and iterate the full exception chain.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <rect x="10" y="352" width="400" height="40" rx="6" fill="url(#boxGrad)" stroke="#3949AB" stroke-width="1" opacity="0.9"/>
    <text x="210" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3949AB">Best Practices</text>
    <!-- Practice 1 -->
    <rect x="18" y="372" width="92" height="14" rx="3" fill="#3949AB" opacity="0.1"/>
    <text x="64" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3949AB" font-weight="bold">try-with-resources</text>
    <!-- Practice 2 -->
    <rect x="116" y="372" width="94" height="14" rx="3" fill="#00695C" opacity="0.1"/>
    <text x="163" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00695C" font-weight="bold">Handle specific exc.</text>
    <!-- Practice 3 -->
    <rect x="216" y="372" width="86" height="14" rx="3" fill="#E65100" opacity="0.1"/>
    <text x="259" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E65100" font-weight="bold">Log SQL state</text>
    <!-- Practice 4 -->
    <rect x="308" y="372" width="94" height="14" rx="3" fill="#C62828" opacity="0.1"/>
    <text x="355" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#C62828" font-weight="bold">Iterate exc. chain</text>
  </g>
</svg>
