<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="metadata">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#F57C00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="JDBC Metadata provides information about the database and query results.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3949AB">JDBC Metadata</text>
    <line x1="130" y1="38" x2="290" y2="38" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="130" cy="38" r="2.5" fill="#E65100"/>
    <circle cx="290" cy="38" r="2.5" fill="#E65100"/>
  </g>

  <!-- Group 2: Two Types -->
  <g opacity="0" data-narration="There are two main types: DatabaseMetaData for database information, and ResultSetMetaData for query result information.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- DatabaseMetaData box -->
    <rect x="15" y="50" width="188" height="44" rx="8" fill="url(#indigoGrad)" stroke="#283593" stroke-width="1"/>
    <text x="109" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#FFFFFF">DatabaseMetaData</text>
    <text x="109" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#E8EAF6">Info about the database</text>
    <!-- ResultSetMetaData box -->
    <rect x="217" y="50" width="188" height="44" rx="8" fill="url(#tealGrad)" stroke="#004D40" stroke-width="1"/>
    <text x="311" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#FFFFFF">ResultSetMetaData</text>
    <text x="311" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#E0F2F1">Info about query results</text>
  </g>

  <!-- Group 3: DatabaseMetaData methods -->
  <g opacity="0" data-narration="DatabaseMetaData provides methods like getDatabaseProductName, getDriverName, getTables, getColumns, and supportsTransactions.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="102" width="188" height="110" rx="6" fill="#FFFFFF" stroke="#3949AB" stroke-width="1.2" opacity="0.95"/>
    <text x="109" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#3949AB">Methods</text>
    <line x1="35" y1="123" x2="183" y2="123" stroke="#C5CAE9" stroke-width="0.8"/>
    <circle cx="30" cy="136" r="2.5" fill="#3949AB"/>
    <text x="38" y="139" font-family="monospace" font-size="8.5" fill="#1A237E">getDatabaseProductName()</text>
    <circle cx="30" cy="151" r="2.5" fill="#3949AB"/>
    <text x="38" y="154" font-family="monospace" font-size="8.5" fill="#1A237E">getDriverName()</text>
    <circle cx="30" cy="166" r="2.5" fill="#3949AB"/>
    <text x="38" y="169" font-family="monospace" font-size="8.5" fill="#1A237E">getTables()</text>
    <circle cx="30" cy="181" r="2.5" fill="#3949AB"/>
    <text x="38" y="184" font-family="monospace" font-size="8.5" fill="#1A237E">getColumns()</text>
    <circle cx="30" cy="196" r="2.5" fill="#3949AB"/>
    <text x="38" y="199" font-family="monospace" font-size="8.5" fill="#1A237E">supportsTransactions()</text>
  </g>

  <!-- Group 4: ResultSetMetaData methods -->
  <g opacity="0" data-narration="ResultSetMetaData provides methods like getColumnCount, getColumnName, getColumnType, getTableName, and isNullable.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <rect x="217" y="102" width="188" height="110" rx="6" fill="#FFFFFF" stroke="#00695C" stroke-width="1.2" opacity="0.95"/>
    <text x="311" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#00695C">Methods</text>
    <line x1="237" y1="123" x2="385" y2="123" stroke="#B2DFDB" stroke-width="0.8"/>
    <circle cx="232" cy="136" r="2.5" fill="#00695C"/>
    <text x="240" y="139" font-family="monospace" font-size="8.5" fill="#004D40">getColumnCount()</text>
    <circle cx="232" cy="151" r="2.5" fill="#00695C"/>
    <text x="240" y="154" font-family="monospace" font-size="8.5" fill="#004D40">getColumnName(i)</text>
    <circle cx="232" cy="166" r="2.5" fill="#00695C"/>
    <text x="240" y="169" font-family="monospace" font-size="8.5" fill="#004D40">getColumnType(i)</text>
    <circle cx="232" cy="181" r="2.5" fill="#00695C"/>
    <text x="240" y="184" font-family="monospace" font-size="8.5" fill="#004D40">getTableName(i)</text>
    <circle cx="232" cy="196" r="2.5" fill="#00695C"/>
    <text x="240" y="199" font-family="monospace" font-size="8.5" fill="#004D40">isNullable(i)</text>
  </g>

  <!-- Group 5: Code Pattern -->
  <g opacity="0" data-narration="To obtain metadata, call getMetaData on a Connection object for DatabaseMetaData, or on a ResultSet object for ResultSetMetaData.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <rect x="15" y="222" width="390" height="80" rx="6" fill="#1A237E" opacity="0.92"/>
    <text x="210" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFD54F">How to Obtain Metadata</text>
    <line x1="35" y1="246" x2="385" y2="246" stroke="#3949AB" stroke-width="0.6"/>
    <!-- DatabaseMetaData flow -->
    <rect x="28" y="254" width="76" height="20" rx="4" fill="#3949AB"/>
    <text x="66" y="268" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFFFFF">Connection</text>
    <text x="118" y="268" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD54F">&#x2192;</text>
    <text x="174" y="268" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#BBDEFB">conn.getMetaData()</text>
    <text x="234" y="268" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD54F">&#x2192;</text>
    <rect x="250" y="254" width="138" height="20" rx="4" fill="#3949AB" opacity="0.7"/>
    <text x="319" y="268" text-anchor="middle" font-family="monospace" font-size="7.5" font-weight="bold" fill="#FFFFFF">DatabaseMetaData</text>
    <!-- ResultSetMetaData flow -->
    <rect x="28" y="280" width="76" height="20" rx="4" fill="#00695C"/>
    <text x="66" y="294" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFFFFF">ResultSet</text>
    <text x="118" y="294" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD54F">&#x2192;</text>
    <text x="168" y="294" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#B2DFDB">rs.getMetaData()</text>
    <text x="234" y="294" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD54F">&#x2192;</text>
    <rect x="250" y="280" width="138" height="20" rx="4" fill="#00695C" opacity="0.7"/>
    <text x="319" y="294" text-anchor="middle" font-family="monospace" font-size="7.5" font-weight="bold" fill="#FFFFFF">ResultSetMetaData</text>
  </g>

  <!-- Group 6: Use Cases -->
  <g opacity="0" data-narration="Common use cases include schema discovery, dynamic query building, database migration tools, and ORM frameworks.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Common Use Cases</text>
    <line x1="140" y1="327" x2="280" y2="327" stroke="#C62828" stroke-width="1" stroke-linecap="round"/>
    <!-- Use case boxes -->
    <rect x="15" y="335" width="90" height="36" rx="6" fill="#FFFFFF" stroke="#E65100" stroke-width="1.2"/>
    <text x="60" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Schema</text>
    <text x="60" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100">Discovery</text>

    <rect x="115" y="335" width="90" height="36" rx="6" fill="#FFFFFF" stroke="#E65100" stroke-width="1.2"/>
    <text x="160" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E65100">Dynamic Query</text>
    <text x="160" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100">Building</text>

    <rect x="215" y="335" width="90" height="36" rx="6" fill="#FFFFFF" stroke="#C62828" stroke-width="1.2"/>
    <text x="260" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#C62828">DB Migration</text>
    <text x="260" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#C62828">Tools</text>

    <rect x="315" y="335" width="90" height="36" rx="6" fill="#FFFFFF" stroke="#C62828" stroke-width="1.2"/>
    <text x="360" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#C62828">ORM</text>
    <text x="360" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#C62828">Frameworks</text>
  </g>
</svg>
