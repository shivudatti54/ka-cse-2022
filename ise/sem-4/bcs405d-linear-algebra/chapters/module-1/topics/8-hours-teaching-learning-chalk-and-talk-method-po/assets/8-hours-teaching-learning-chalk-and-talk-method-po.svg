<svg width="420" height="400" data-topic-id="teaching-learning-chalk-and-talk-method-presentation" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A8DE" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="20" y="50" font-size="24" fill="#2E4053">Linear Algebra</text>
  <section data-narration="Introduction">
    <rect x="10" y="80" width="380" height="40" fill="#2E4053"/>
    <text x="20" y="90" font-size="18" fill="#FFFFFF">The chalk and talk method, also known as the lecture method, is a traditional teaching technique where the teacher delivers lectures to students using chalk or other writing tools.</text>
  </section>
  <section data-narration="Advantages">
    <rect x="10" y="130" width="380" height="40" fill="#2E4053"/>
    <text x="20" y="140" font-size="18" fill="#FFFFFF">The teacher can write equations and formulas in real-time, making it easier for students to understand complex concepts.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="20,40" dur="2s"/>
  </section>
  <section data-narration="Disadvantages">
    <rect x="10" y="180" width="380" height="40" fill="#2E4053"/>
    <text x="20" y="190" font-size="18" fill="#FFFFFF">The teacher may not be able to gauge student understanding, making it difficult to adjust the lecture accordingly.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="40,40" dur="2s"/>
  </section>
  <section data-narration="PowerPoint Presentation Process">
    <rect x="10" y="230" width="380" height="40" fill="#2E4053"/>
    <text x="20" y="240" font-size="18" fill="#FFFFFF">The PowerPoint presentation process is a teaching technique where the teacher creates a presentation using PowerPoint software, while delivering lectures to students.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="60,40" dur="2s"/>
  </section>
  <section data-narration="Advantages of PowerPoint Presentation Process">
    <rect x="10" y="280" width="380" height="40" fill="#2E4053"/>
    <text x="20" y="290" font-size="18" fill="#FFFFFF">The teacher can create a visually appealing presentation that captures students' attention.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="80,40" dur="2s"/>
  </section>
  <section data-narration="Disadvantages of PowerPoint Presentation Process">
    <rect x="10" y="330" width="380" height="40" fill="#2E4053"/>
    <text x="20" y="340" font-size="18" fill="#FFFFFF">The teacher may not be able to gauge student understanding, making it difficult to adjust the lecture accordingly.</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,40" dur="2s"/>
  </section>
  <footer>
    <rect x="10" y="370" width="380" height="30" fill="#2E4053"/>
    <text x="20" y="380" font-size="18" fill="#FFFFFF">Teaching-Learning Chalk and Talk Method / PowerPoint Presentation Process</text>
  </footer>
  <text x="20" y="10" font-size="12" fill="#2E4053" text-anchor="start">Linear Algebra</text>
  <text x="20" y="400" font-size="12" fill="#2E4053" text-anchor="end">VECTOR SPACES</text>
</svg>