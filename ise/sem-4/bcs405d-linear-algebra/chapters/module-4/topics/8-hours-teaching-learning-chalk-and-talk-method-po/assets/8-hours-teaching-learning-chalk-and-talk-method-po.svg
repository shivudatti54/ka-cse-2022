<svg width="420" height="400" data-topic-id="linear-algebra-inner-product-spaces"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="text-anchor: middle; font-size: 16px; font-family: Arial, sans-serif;">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"></stop>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" x="0" y="0" width="420" height="400" rx="10"/>
  <g id="title">
    <text fill="#3498DB" x="50%" y="20" text-anchor="middle" data-narration="Topic Title">
      Linear Algebra: Inner Product Spaces
    </text>
  </g>
  <g id="section1">
    <rect x="20" y="60" width="380" height="100" rx="10" fill="#F7F7F7"/>
    <text x="50%" y="70" text-anchor="middle" data-narration="Definition">
      The chalk and talk method is a traditional teaching approach where the instructor writes down key concepts and formulas on the blackboard or a whiteboard, and then explains them to the students.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="20 60" dur="2s" begin="0s"/>
  </g>
  <g id="section2">
    <rect x="20" y="170" width="380" height="100" rx="10" fill="#F7F7F7"/>
    <text x="50%" y="180" text-anchor="middle" data-narration="Advantages">
      Advantages:
      <tspan x="50%" y="200">Encourages active participation and engagement from students</tspan>
      <tspan x="50%" y="220">Allows instructors to clarify complex concepts and provide one-on-one attention</tspan>
      <tspan x="50%" y="240">Facilitates discussion and questions among students</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="20 170" dur="2s" begin="2s"/>
  </g>
  <g id="section3">
    <rect x="20" y="280" width="380" height="100" rx="10" fill="#F7F7F7"/>
    <text x="50%" y="290" text-anchor="middle" data-narration="Best Practices">
      Best Practices:
      <tspan x="50%" y="310">Use clear and concise language when explaining complex concepts</tspan>
      <tspan x="50%" y="330">Provide examples and illustrations to supplement theoretical explanations</tspan>
      <tspan x="50%" y="350">Encourage students to ask questions and engage in discussions</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 280" to="20 280" dur="2s" begin="4s"/>
  </g>
  <g id="section4">
    <rect x="20" y="60" width="380" height="100" rx="10" fill="#F7F7F7"/>
    <text x="50%" y="70" text-anchor="middle" data-narration="PowerPoint Presentation Process">
      PowerPoint Presentation Process:
      <tspan x="50%" y="100">A visual aid that uses a combination of text, images, and multimedia elements to convey information and tell a story.</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="20 60" dur="2s" begin="6s"/>
  </g>
  <g id="section5">
    <rect x="20" y="170" width="380" height="100" rx="10" fill="#F7F7F7"/>
    <text x="50%" y="180" text-anchor="middle" data-narration="Advantages">
      Advantages:
      <tspan x="50%" y="200">Engages students visually and keeps them interested</tspan>
      <tspan x="50%" y="220">Facilitates organization and structure of complex information</tspan>
      <tspan x="50%" y="240">Allows for easy sharing and collaboration</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="20 170" dur="2s" begin="8s"/>
  </g>
  <g id="section6">
    <rect x="20" y="280" width="380" height="100" rx="10" fill="#F7F7F7"/>
    <text x="50%" y="290" text-anchor="middle" data-narration="Best Practices">
      Best Practices:
      <tspan x="50%" y="310">Use clear and concise language in text overlays</tspan>
      <tspan x="50%" y="330">Use high-quality images and graphics to illustrate key concepts</tspan>
      <tspan x="50%" y="350">Limit the use of animations and transitions to avoid distractions</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 280" to="20 280" dur="2s" begin="10s"/>
  </g>
  <g id="footer">
    <text fill="#3498DB" x="50%" y="380" text-anchor="middle" data-narration="Footer">
      Linear Algebra: Inner Product Spaces
    </text>
  </g>
</svg>