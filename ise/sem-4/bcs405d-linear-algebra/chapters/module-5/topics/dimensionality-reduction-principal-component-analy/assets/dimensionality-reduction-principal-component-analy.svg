<svg width="420" height="400" data-topic-id="principal-component-analysis" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <title>Principal Component Analysis (PCA)</title>
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C3E1F6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)">
    <rect width="300" height="50" fill="#FFFFFF" rx="10" data-narration="Dimensionality reduction is a crucial step in data preprocessing, where we reduce the number of features or variables in a dataset while retaining the most important information.">
      <animateTransform attributeName="transform" type="rotate" from="0 150 50" to="360 150 50" dur="1500" begin="0s"/>
    </rect>
    <text x="150" y="25" font-size="24" font-family="Arial" fill="#2F4F7F">Principal Component Analysis (PCA)</text>
  </g>
  
  <!-- Section 2: PCA Overview -->
  <g transform="translate(10, 150)">
    <rect width="300" height="50" fill="#FFFFFF" rx="10" data-narration="PCA is a linear dimensionality reduction technique that transforms a set of correlated variables into a new set of uncorrelated variables, called principal components. The goal is to capture the most important features or patterns in the data, while ignoring the less important ones.">
      <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="1500" begin="500ms"/>
    </rect>
    <text x="150" y="25" font-size="24" font-family="Arial" fill="#2F4F7F">What is PCA?</text>
  </g>
  
  <!-- Section 3: Standardization -->
  <g transform="translate(10, 250)">
    <rect width="300" height="50" fill="#FFFFFF" rx="10" data-narration="The dataset is standardized by subtracting the mean and dividing by the standard deviation for each feature. This step is necessary to ensure that all features are on the same scale and have similar variances.">
      <animateTransform attributeName="transform" type="rotate" from="0 150 250" to="360 150 250" dur="1500" begin="1000ms"/>
    </rect>
    <text x="150" y="25" font-size="24" font-family="Arial" fill="#2F4F7F">Standardization</text>
  </g>
  
  <!-- Section 4: Covariance Matrix -->
  <g transform="translate(10, 350)">
    <rect width="300" height="50" fill="#FFFFFF" rx="10" data-narration="The covariance matrix is computed from the standardized data. It represents the amount of covariance between each pair of features.">
      <animateTransform attributeName="transform" type="rotate" from="0 150 350" to="360 150 350" dur="1500" begin="1500ms"/>
    </rect>
    <text x="150" y="25" font-size="24" font-family="Arial" fill="#2F4F7F">Covariance Matrix</text>
  </g>
  
  <!-- Section 5: Eigenvalue Decomposition -->
  <g transform="translate(10, 450)">
    <rect width="300" height="50" fill="#FFFFFF" rx="10" data-narration="The covariance matrix is decomposed into its eigenvalues and eigenvectors. Eigenvalues represent the amount of variance explained by each eigenvector.">
      <animateTransform attributeName="transform" type="rotate" from="0 150 450" to="360 150 450" dur="1500" begin="2000ms"/>
    </rect>
    <text x="150" y="25" font-size="24" font-family="Arial" fill="#2F4F7F">Eigenvalue Decomposition</text>
  </g>
  
  <!-- Section 6: Principal Components -->
  <g transform="translate(10, 550)">
    <rect width="300" height="50" fill="#FFFFFF" rx="10" data-narration="The eigenvectors corresponding to the largest eigenvalues are selected as the principal components. They represent the directions of maximum variance in the data.">
      <animateTransform attributeName="transform" type="rotate" from="0 150 550" to="360 150 550" dur="1500" begin="2500ms"/>
    </rect>
    <text x="150" y="25" font-size="24" font-family="Arial" fill="#2F4F7F">Principal Components</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 650)">
    <rect width="300" height="50" fill="#FFFFFF" rx="10" data-narration="The original data is transformed into a new dataset using the principal components. This reduces the dimensionality of the data while retaining the most important information.">
      <animateTransform attributeName="transform" type="rotate" from="0 150 650" to="360 150 650" dur="1500" begin="3000ms"/>
    </rect>
    <text x="150" y="25" font-size="24" font-family="Arial" fill="#2F4F7F">Transformation</text>
  </g>
  
  <!-- Arrow markers -->
  <path d="M 20, 100 L 100, 200" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  <path d="M 20, 200 L 100, 200" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  <path d="M 20, 300 L 100, 200" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  <path d="M 20, 400 L 100, 300" stroke="#2F4F7F" stroke-width="2" fill="none"/>
</svg>