<svg width="420" height="400" data-topic-id="teaching-learning-process-chalk-and-talk-method" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#66CCCC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <symbols>
    <symbol id="icon-chalk" viewBox="0 0 24 24">
      <path d="M12 12l0 0-4 4 4 4 1.41 1.41L16.17 19.59l-2.41 2.41L12 19.59 7.59 16.17L4 12z" fill="#3498db"/>
    </symbol>
  </symbols>
  <title>8 Hours Teaching Learning Process Chalk And Talk M</title>
  <g id="root">
    <rect x="10" y="20" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
    <text x="20" y="50" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#e74c3c;" data-narration="Introduction">Introduction</text>
    <rect x="20" y="80" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
    <text x="30" y="110" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#2ecc71;" data-narration="Definition">Definition</text>
    <g transform="rotate(90)">
      <rect x="50" y="140" width="50" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="60" y="170" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#e74c3c;" data-narration="Characteristics">Characteristics</text>
      <rect x="50" y="200" width="50" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="60" y="230" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#2ecc71;" data-narration="Advantages">Advantages</text>
      <rect x="50" y="260" width="50" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="60" y="290" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#e74c3c;" data-narration="Disadvantages">Disadvantages</text>
      <rect x="50" y="320" width="50" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="60" y="350" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#2ecc71;" data-narration="Example">Example</text>
    </g>
    <g transform="translate(200, 20)">
      <rect x="10" y="10" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="20" y="40" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#e74c3c;" data-narration="Chalk and Talk Method is a traditional teaching technique where the teacher uses a chalkboard or whiteboard to write equations, formulas, and diagrams, and then explains the concepts verbally. The teacher talks to the students while writing on the board, allowing them to visualize the concepts and understand them better.">
        <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
      </text>
      <rect x="20" y="80" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="30" y="110" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#2ecc71;" data-narration="The teacher engages with the students through verbal explanations and visual aids. Students can see the equations and diagrams being written on the board, which helps them to understand the concepts better. The teacher can adjust the pace and content according to the student's understanding.">
        <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
      </text>
      <rect x="20" y="140" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="30" y="170" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#e74c3c;" data-narration="This method enhances the understanding of complex concepts in Linear Algebra. It encourages students to ask questions and participate in the learning process. The method is cost-effective, as it does not require any special equipment.">
        <animate attribute="opacity" begin="4s" dur="2s" repeatCount="indefinite"/>
      </text>
      <rect x="20" y="200" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="30" y="230" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#2ecc71;" data-narration="However, the Chalk and Talk Method has some disadvantages. The teacher needs to spend a significant amount of time writing on the board and explaining the concepts. The method does not incorporate technology, which can make it less engaging for modern students.">
        <animate attribute="opacity" begin="6s" dur="2s" repeatCount="indefinite"/>
      </text>
      <rect x="20" y="260" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="30" y="290" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#e74c3c;" data-narration="An example of the Chalk and Talk Method is when the teacher uses it to teach a Linear Algebra concept, such as linear transformation, to a group of students.">
        <animate attribute="opacity" begin="8s" dur="2s" repeatCount="indefinite"/>
      </text>
    </g>
    <g transform="translate(200, 350)">
      <rect x="10" y="10" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
      <text x="20" y="40" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle" style="fill:#e74c3c;" data-narration="The Chalk and Talk Method is a traditional teaching technique that has been used for many years. It is still widely used today due to its effectiveness in conveying complex concepts in Linear Algebra.">
    </g>
  </g>
  <rect x="10" y="380" width="100" height="30" rx="10" style="fill:linear-gradient(135deg, #66CCCC 0%, #66CCCC 50%, #66CCCC 100%);stroke:#f1c40f;padding:2px"/>
