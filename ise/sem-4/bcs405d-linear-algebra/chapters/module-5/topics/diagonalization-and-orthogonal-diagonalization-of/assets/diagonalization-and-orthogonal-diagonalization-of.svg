<svg width="420" height="400" data-topic-id="diagonalization-and-orthogonal-diagonalization-of-real-symmetric-matrices">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Diagonalization and Orthogonal Diagonalization of Real Symmetric Matrices</title>

  <!-- Section 1: Definition of Real Symmetric Matrices -->
  <rect x="10" y="20" width="400" height="100" fill="url(#pastel-gradient)"/>
  <text x="20" y="30" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle">Definition of Real Symmetric Matrices</text>
  <text x="20" y="50" font-size="14" font-family="Arial" text-anchor="middle">A real symmetric matrix is a square matrix that is equal to its transpose.</text>
  <text x="20" y="70" font-size="14" font-family="Arial" text-anchor="middle">This property makes them ideal for diagonalization.</text>

  <!-- Section 2: Properties of Real Symmetric Matrices -->
  <rect x="10" y="180" width="400" height="100" fill="url(#pastel-gradient)"/>
  <text x="20" y="190" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle">Properties of Real Symmetric Matrices</text>
  <text x="20" y="210" font-size="14" font-family="Arial" text-anchor="middle">- All eigenvalues are real.</text>
  <text x="20" y="230" font-size="14" font-family="Arial" text-anchor="middle">- All eigenvectors are orthogonal.</text>
  <text x="20" y="250" font-size="14" font-family="Arial" text-anchor="middle">- The matrix can be diagonalized using an orthogonal matrix.</text>

  <!-- Section 3: Diagonalization of Real Symmetric Matrices -->
  <rect x="10" y="320" width="400" height="100" fill="url(#pastel-gradient)"/>
  <text x="20" y="330" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle">Diagonalization of Real Symmetric Matrices</text>
  <text x="20" y="350" font-size="14" font-family="Arial" text-anchor="middle">1. Find the eigenvalues and eigenvectors of the matrix.</text>
  <text x="20" y="370" font-size="14" font-family="Arial" text-anchor="middle">2. Construct an orthogonal matrix P using the eigenvectors.</text>
  <text x="20" y="390" font-size="14" font-family="Arial" text-anchor="middle">3. Calculate the diagonal matrix D using the eigenvalues and the orthogonal matrix P.</text>
  <text x="20" y="410" font-size="14" font-family="Arial" text-anchor="middle">The diagonalized matrix is given by D = P^T A P.</text>

  <!-- Section 4: Example -->
  <rect x="10" y="510" width="400" height="100" fill="url(#pastel-gradient)"/>
  <text x="20" y="520" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle">Example</text>
  <text x="20" y="540" font-size="14" font-family="Arial" text-anchor="middle">Consider the matrix A = [[2, 1], [1, 2]].</text>
  <text x="20" y="560" font-size="14" font-family="Arial" text-anchor="middle">- Find the eigenvalues and eigenvectors of A.</text>
  <text x="20" y="580" font-size="14" font-family="Arial" text-anchor="middle">Eigenvalues: λ1 = 3, λ2 = 1</text>
  <text x="20" y="600" font-size="14" font-family="Arial" text-anchor="middle">Eigenvectors:</text>
  <text x="20" y="620" font-size="14" font-family="Arial" text-anchor="middle">v1 = [1, 1]</text>
  <text x="20" y="640" font-size="14" font-family="Arial" text-anchor="middle">v2 = [1, -1]</text>

  <!-- Section 5: Orthogonal Diagonalization -->
  <rect x="10" y="720" width="400" height="100" fill="url(#pastel-gradient)"/>
  <text x="20" y="730" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle">Orthogonal Diagonalization</text>
  <text x="20" y="750" font-size="14" font-family="Arial" text-anchor="middle">Orthogonal diagonalization is an extension of diagonalization.</text>
  <text x="20" y="770" font-size="14" font-family="Arial" text-anchor="middle">It involves diagonalizing the matrix into an orthogonal matrix.</text>
  <text x="20" y="790" font-size="14" font-family="Arial" text-anchor="middle">The orthogonal diagonalization matrix is an orthogonal matrix.</text>
  <text x="20" y="810" font-size="14" font-family="Arial" text-anchor="middle">The diagonal matrix is the same as in diagonalization.</text>

  <!-- Section 6: Quadratic Forms and Classifications -->
  <rect x="10" y="910" width="400" height="100" fill="url(#pastel-gradient)"/>
  <text x="20" y="920" font-size="18" font-family="Arial" font-weight="bold" text-anchor="middle">Quadratic Forms and Classifications</text>
  <text x="20" y="940" font-size="14" font-family="Arial" text-anchor="middle">Quadratic forms are used to classify the types of conic sections.</text>
  <text x="20" y="960" font-size="14" font-family="Arial" text-anchor="middle">They are used to find the shape and size of the conic section.</text>

  <!-- Footer -->
  <rect x="10" y="370" width="400" height="30" fill="#6495ED"/>
  <text x="20" y="380" font-size="14" font-family="Arial" text-anchor="middle">Educational Diagram</text>
  <text x="20" y="400" font-size="14" font-family="Arial" text-anchor="middle">Visuals and Animations</text>

  <!-- Arrow markers -->
  <line x1="20" y1="30" x2="110" y2="30"/>
  <line x1="20" y1="70" x2="110" y2="70"/>
  <line x1="20" y1="210" x2="110" y2="210"/>
  <line x1="20" y1="350" x2="110" y2="350"/>
  <line x1="20" y1="510" x2="110" y2="510"/>
  <line x1="20" y1="660" x2="110" y2="660"/>
  <line x1="20" y1="730" x2="110" y2="730"/>
  <line x1="20" y1="890" x2="110" y2="890"/>

  <!-- Animations -->
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="fill" begin="0s" dur="2s" from="#C7B8EA" to="#6495ED" repeatCount="indefinite"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="0s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
</svg>