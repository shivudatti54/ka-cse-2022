<svg width="420" height="400" data-topic-id="systems-engineering-designing-sustainable-ict" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A2D2F3" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Sustainable ICT Systems Engineering</title>
  <rect x="10" y="10" width="400" height="50" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 70)">
    <g data-narration="Introduction to Systems Engineering">
      <text x="10" y="10" font-size="16" font-family="Arial">Systems Engineering for Sustainable ICT-Based Architectures</text>
      <line x1="50" y1="20" x2="350" y2="30" stroke="#3498db" stroke-width="2"/>
      <line x1="50" y1="20" x2="50" y2="30" stroke="#3498db" stroke-width="2"/>
      <line x1="350" y1="20" x2="350" y2="30" stroke="#3498db" stroke-width="2"/>
    </g>
    <g data-narration="Definition of Sustainability">
      <rect x="10" y="80" width="200" height="50" fill="#F7F7F7"/>
      <rect x="220" y="80" width="150" height="50" fill="#F7F7F7"/>
      <g>
        <rect x="10" y="90" width="120" height="30" fill="#F7F7F7"/>
        <text x="10" y="110" font-size="14" font-family="Arial">Environmental</text>
      </g>
      <g>
        <rect x="230" y="90" width="120" height="30" fill="#F7F7F7"/>
        <text x="230" y="110" font-size="14" font-family="Arial">Social</text>
      </g>
      <g>
        <rect x="10" y="130" width="120" height="30" fill="#F7F7F7"/>
        <text x="10" y="150" font-size="14" font-family="Arial">Economic</text>
      </g>
    </g>
    <g data-narration="Life Cycle Assessment (LCA)">
      <rect x="10" y="220" width="300" height="50" fill="#F7F7F7"/>
      <line x1="50" y1="230" x2="250" y2="240" stroke="#3498db" stroke-width="2"/>
      <line x1="50" y1="230" x2="50" y2="240" stroke="#3498db" stroke-width="2"/>
      <line x1="250" y1="230" x2="250" y2="240" stroke="#3498db" stroke-width="2"/>
      <text x="10" y="260" font-size="14" font-family="Arial">LCA: Evaluating Environmental Impacts</text>
    </g>
    <g data-narration="Green Infrastructure">
      <rect x="10" y="320" width="300" height="50" fill="#F7F7F7"/>
      <line x1="50" y1="330" x2="250" y2="340" stroke="#3498db" stroke-width="2"/>
      <line x1="50" y1="330" x2="50" y2="340" stroke="#3498db" stroke-width="2"/>
      <line x1="250" y1="330" x2="250" y2="340" stroke="#3498db" stroke-width="2"/>
      <text x="10" y="350" font-size="14" font-family="Arial">Green Infrastructure: Mitigating Environmental Impacts</text>
    </g>
    <g data-narration="Green Data Centers">
      <rect x="10" y="400" width="300" height="50" fill="#F7F7F7"/>
      <line x1="50" y1="410" x2="250" y2="420" stroke="#3498db" stroke-width="2"/>
      <line x1="50" y1="410" x2="50" y2="420" stroke="#3498db" stroke-width="2"/>
      <line x1="250" y1="410" x2="250" y2="420" stroke="#3498db" stroke-width="2"/>
      <text x="10" y="430" font-size="14" font-family="Arial">Green Data Centers: Renewable Energy</text>
    </g>
  </g>
  <g transform="translate(20, 50)">
    <line x1="10" y1="60" x2="390" y2="70" stroke="#3498db" stroke-width="2"/>
    <line x1="10" y1="60" x2="10" y2="70" stroke="#3498db" stroke-width="2"/>
    <line x1="390" y1="60" x2="390" y2="70" stroke="#3498db" stroke-width="2"/>
  </g>
  <g transform="translate(20, 450)">
    <text x="10" y="460" font-size="16" font-family="Arial">Sustainable ICT Systems Engineering</text>
    <animateTransform attributeName="transform" type="translate" from="0 460" to="0 480" dur="5s" begin="0s"/>
  </g>
  <g transform="translate(20, 500)">
    <rect x="10" y="510" width="400" height="40" fill="#3498db"/>
    <text x="10" y="520" font-size="14" font-family="Arial">Designed by [Your Name]</text>
  </g>
</svg>