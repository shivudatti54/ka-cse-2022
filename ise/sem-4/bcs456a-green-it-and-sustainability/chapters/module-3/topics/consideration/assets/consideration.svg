<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="consideration">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB8C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Green IT Considerations cover key sustainability factors in information technology.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB" text-anchor="middle">Green IT Considerations</text>
    <line x1="110" y1="36" x2="310" y2="36" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="110" cy="36" r="3" fill="#00695C"/>
    <circle cx="310" cy="36" r="3" fill="#00695C"/>
  </g>

  <!-- Group 2: Three Pillars of Sustainability -->
  <g opacity="0" data-narration="Sustainability rests on three pillars: Environmental, Economic, and Social responsibility.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <!-- Sustainability beam on top -->
    <rect x="50" y="48" width="320" height="20" rx="4" fill="url(#pillarGrad)"/>
    <text x="210" y="62" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">SUSTAINABILITY</text>
    <!-- Environmental pillar -->
    <rect x="70" y="68" width="70" height="55" rx="3" fill="url(#tealGrad)"/>
    <text x="105" y="88" font-family="Arial" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Environ-</text>
    <text x="105" y="99" font-family="Arial" font-size="9" font-weight="bold" fill="white" text-anchor="middle">mental</text>
    <!-- Leaf icon -->
    <path d="M100,108 Q105,105 110,108 Q107,115 100,108Z" fill="#A5D6A7" opacity="0.8"/>
    <!-- Economic pillar -->
    <rect x="175" y="68" width="70" height="55" rx="3" fill="url(#orangeGrad)"/>
    <text x="210" y="92" font-family="Arial" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Economic</text>
    <!-- Dollar icon -->
    <text x="210" y="114" font-family="Arial" font-size="14" fill="white" text-anchor="middle" opacity="0.8">$</text>
    <!-- Social pillar -->
    <rect x="280" y="68" width="70" height="55" rx="3" fill="#C62828"/>
    <text x="315" y="92" font-family="Arial" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Social</text>
    <!-- People icon -->
    <circle cx="310" cy="109" r="4" fill="white" opacity="0.7"/>
    <circle cx="320" cy="109" r="4" fill="white" opacity="0.7"/>
    <!-- Base -->
    <rect x="50" y="123" width="320" height="6" rx="2" fill="#3949AB" opacity="0.4"/>
  </g>

  <!-- Group 3: Energy Considerations -->
  <g opacity="0" data-narration="Energy considerations include Power Usage Effectiveness or PUE metric, cooling efficiency, and renewable energy sources.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="148" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB" text-anchor="middle">Energy Considerations</text>
    <!-- PUE box -->
    <rect x="18" y="155" width="120" height="50" rx="6" fill="white" stroke="#00695C" stroke-width="1.5"/>
    <!-- Lightning icon -->
    <polygon points="45,161 40,174 47,174 42,187 52,171 46,171 50,161" fill="#E65100" opacity="0.8"/>
    <text x="85" y="174" font-family="monospace" font-size="9" fill="#00695C" text-anchor="middle">PUE Metric</text>
    <text x="85" y="195" font-family="monospace" font-size="8" fill="#666" text-anchor="middle">Total/IT Power</text>
    <!-- Cooling box -->
    <rect x="150" y="155" width="120" height="50" rx="6" fill="white" stroke="#3949AB" stroke-width="1.5"/>
    <!-- Snowflake icon -->
    <text x="170" y="180" font-family="Arial" font-size="16" fill="#3949AB" opacity="0.6">*</text>
    <text x="218" y="174" font-family="Arial" font-size="9" fill="#3949AB" text-anchor="middle">Cooling</text>
    <text x="218" y="195" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Efficiency</text>
    <!-- Renewable box -->
    <rect x="282" y="155" width="120" height="50" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <!-- Sun icon -->
    <circle cx="302" cy="176" r="7" fill="none" stroke="#E65100" stroke-width="1.2" opacity="0.7"/>
    <line x1="302" y1="166" x2="302" y2="164" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <line x1="302" y1="186" x2="302" y2="188" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <line x1="292" y1="176" x2="290" y2="176" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <line x1="312" y1="176" x2="314" y2="176" stroke="#E65100" stroke-width="1" opacity="0.7"/>
    <text x="348" y="174" font-family="Arial" font-size="9" fill="#E65100" text-anchor="middle">Renewable</text>
    <text x="348" y="195" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Energy</text>
  </g>

  <!-- Group 4: Hardware Lifecycle Timeline -->
  <g opacity="0" data-narration="The hardware lifecycle spans from green procurement, through efficient usage, to responsible disposal including recycling and e-waste management.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="224" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB" text-anchor="middle">Hardware Lifecycle</text>
    <!-- Timeline line -->
    <line x1="60" y1="250" x2="360" y2="250" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="360,250 352,246 352,254" fill="#3949AB"/>
    <!-- Procurement node -->
    <circle cx="100" cy="250" r="10" fill="#00695C"/>
    <text x="100" y="254" font-family="Arial" font-size="8" fill="white" text-anchor="middle">1</text>
    <text x="100" y="240" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C" text-anchor="middle">Procurement</text>
    <text x="100" y="268" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Green Specs</text>
    <!-- Usage node -->
    <circle cx="210" cy="250" r="10" fill="#E65100"/>
    <text x="210" y="254" font-family="Arial" font-size="8" fill="white" text-anchor="middle">2</text>
    <text x="210" y="240" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">Usage</text>
    <text x="210" y="268" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Efficient Ops</text>
    <!-- Disposal node -->
    <circle cx="320" cy="250" r="10" fill="#C62828"/>
    <text x="320" y="254" font-family="Arial" font-size="8" fill="white" text-anchor="middle">3</text>
    <text x="320" y="240" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">Disposal</text>
    <text x="320" y="268" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Recycle / E-waste</text>
  </g>

  <!-- Group 5: Carbon Footprint Factors -->
  <g opacity="0" data-narration="Carbon footprint factors include data center emissions, cloud versus on-premise comparisons, and carbon offset strategies.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="292" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB" text-anchor="middle">Carbon Footprint Factors</text>
    <!-- Data Center Emissions -->
    <rect x="22" y="299" width="116" height="38" rx="5" fill="#C62828" opacity="0.12"/>
    <rect x="22" y="299" width="116" height="38" rx="5" fill="none" stroke="#C62828" stroke-width="1"/>
    <!-- Cloud/smoke icon -->
    <ellipse cx="40" cy="314" rx="8" ry="5" fill="#C62828" opacity="0.25"/>
    <ellipse cx="47" cy="311" rx="6" ry="4" fill="#C62828" opacity="0.25"/>
    <text x="85" y="315" font-family="Arial" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">Data Center</text>
    <text x="85" y="328" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Emissions</text>
    <!-- Cloud vs On-premise -->
    <rect x="152" y="299" width="116" height="38" rx="5" fill="#3949AB" opacity="0.1"/>
    <rect x="152" y="299" width="116" height="38" rx="5" fill="none" stroke="#3949AB" stroke-width="1"/>
    <!-- Cloud icon -->
    <ellipse cx="172" cy="314" rx="9" ry="5" fill="#3949AB" opacity="0.3"/>
    <ellipse cx="179" cy="311" rx="7" ry="4" fill="#3949AB" opacity="0.3"/>
    <text x="218" y="315" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB" text-anchor="middle">Cloud vs</text>
    <text x="218" y="328" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">On-Premise</text>
    <!-- Carbon Offset -->
    <rect x="282" y="299" width="116" height="38" rx="5" fill="#00695C" opacity="0.1"/>
    <rect x="282" y="299" width="116" height="38" rx="5" fill="none" stroke="#00695C" stroke-width="1"/>
    <!-- Tree icon -->
    <polygon points="302,326 308,310 314,326" fill="#00695C" opacity="0.35"/>
    <rect x="306" y="326" width="4" height="5" fill="#795548" opacity="0.4"/>
    <text x="348" y="315" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C" text-anchor="middle">Carbon</text>
    <text x="348" y="328" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Offset</text>
  </g>

  <!-- Group 6: Best Practices -->
  <g opacity="0" data-narration="Best practices include virtualization, power management, green procurement, sustainable design, and compliance with standards.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="354" font-family="Arial" font-size="12" font-weight="bold" fill="#3949AB" text-anchor="middle">Best Practices</text>
    <!-- Practice badges -->
    <rect x="15" y="361" width="72" height="22" rx="11" fill="#3949AB"/>
    <text x="51" y="376" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Virtualization</text>

    <rect x="95" y="361" width="72" height="22" rx="11" fill="#00695C"/>
    <text x="131" y="376" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Power Mgmt</text>

    <rect x="175" y="361" width="72" height="22" rx="11" fill="#E65100"/>
    <text x="211" y="376" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Green Procure</text>

    <rect x="255" y="361" width="76" height="22" rx="11" fill="#C62828"/>
    <text x="293" y="376" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Sustainable Dsgn</text>

    <rect x="339" y="361" width="68" height="22" rx="11" fill="#3949AB" opacity="0.7"/>
    <text x="373" y="376" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Compliance</text>
  </g>
</svg>
