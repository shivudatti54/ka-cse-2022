<svg width="420" height="400" data-topic-id="information-and-communication-technologies">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  <title>Of Information and Communication Technologies</title>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100%" height="50%" fill="#87CEEB" />
    <rect x="0" y="50%" height="50%" fill="#A1C9F2" />
    <text x="10" y="20" font-size="16" font-weight="bold">Information and Communication Technologies</text>
    <text x="10" y="150" font-size="14">The Industrial Revolution and the Emergence of ICTs</text>
    <rect x="100" y="20" width="200" height="50%" fill="#4CAF50" opacity="0.7" />
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 80" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="200" y="30" font-size="12" font-weight="bold">Telegraphs (1830s), Telephones (1870s), Early Computers (1930s-1940s)</text>
    <rect x="400" y="20" width="200" height="50%" fill="#4CAF50" opacity="0.7" />
    <animateTransform attributeName="transform" type="translate" from="0 160" to="0 220" begin="2s" dur="2s" repeatCount="indefinite" />
    <text x="400" y="170" font-size="12" font-weight="bold">Personal Computers (1970s-1980s), Internet and Online Communication (1980s-1990s), Mobile Devices and Smartphones (1990s-2000s)</text>
    <rect x="100" y="150" width="200" height="50%" fill="#FF9800" opacity="0.7" />
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 230" begin="4s" dur="2s" repeatCount="indefinite" />
    <text x="200" y="190" font-size="12" font-weight="bold">Green ICT, Sustainability, and Climate Change</text>
    <rect x="400" y="150" width="200" height="50%" fill="#FF9800" opacity="0.7" />
    <animateTransform attributeName="transform" type="translate" from="0 210" to="0 250" begin="6s" dur="2s" repeatCount="indefinite" />
    <text x="400" y="230" font-size="12" font-weight="bold">Emerging Trends and Future Directions</text>
    <rect x="100" y="220" width="200" height="50%" fill="#4CAF50" opacity="0.7" />
    <animateTransform attributeName="transform" type="translate" from="0 240" to="0 280" begin="8s" dur="2s" repeatCount="indefinite" />
    <text x="200" y="260" font-size="12" font-weight="bold">ICTs for Social Good, Education, and Economic Growth</text>
    <rect x="400" y="220" width="200" height="50%" fill="#4CAF50" opacity="0.7" />
    <animateTransform attributeName="transform" type="translate" from="0 260" to="0 300" begin="10s" dur="2s" repeatCount="indefinite" />
    <text x="400" y="280" font-size="12" font-weight="bold">Case Studies and Best Practices</text>
    <rect x="100" y="280" width="200" height="50%" fill="#FF9800" opacity="0.7" />
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 340" begin="12s" dur="2s" repeatCount="indefinite" />
    <text x="200" y="320" font-size="12" font-weight="bold">Challenges and Opportunities for ICTs in Sustainability</text>
    <rect x="400" y="280" width="200" height="50%" fill="#FF9800" opacity="0.7" />
    <animateTransform attributeName="transform" type="translate" from="0 320" to="0 360" begin="14s" dur="2s" repeatCount="indefinite" />
    <text x="400" y="350" font-size="12" font-weight="bold">Conclusion and Future Directions for ICTs and Sustainability</text>
    <rect x="0" y="350" width="100%" height="50%" fill="#87CEEB" />
    <rect x="0" y="400" width="100%" height="50%" fill="#A1C9F2" />
    <text x="10" y="390" font-size="12" font-weight="bold">Footer: ICTs for a Sustainable Future</text>
  </g>
</svg>