<svg width="420" height="400" data-topic-id="The-Agenda-And-Challenges-Ahead">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>The Agenda and Challenges Ahead</title>
  <path id="background" d="M0,0 L420,0 L420,400 L0,400 Z" fill="url(#pastel-gradient)"/>
  <rect x="10" y="10" width="400" height="350" fill="#3B5998"/>
  <g transform="translate(15, 20)">
    <text x="50" y="20" font-size="24" font-family="Arial" font-weight="bold">The Green IT Agenda</text>
    <text x="50" y="50" font-size="18" font-family="Arial" font-weight="normal">Reduce Energy Consumption</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-300" dur="5s" repeatCount="indefinite"/>
    <path d="M25,300 L150,250 L250,250 L375,300 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
    <text x="150" y="250" font-size="14" font-family="Arial" font-weight="normal">Minimize energy required to power IT systems</text>
    <animateTransform attributeName="transform" type="translate" from="-20,250" to="-20,250" dur="5s" repeatCount="indefinite"/>
    <g transform="translate(150, 250)">
      <text x="50" y="60" font-size="18" font-family="Arial" font-weight="normal">Increase Energy Efficiency</text>
      <path d="M100,250 L200,200 L300,250 L400,200 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
      <text x="200" y="200" font-size="14" font-family="Arial" font-weight="normal">Improve energy efficiency through renewable energy sources</text>
      <animateTransform attributeName="transform" type="translate" from="20,220" to="20,220" dur="5s" repeatCount="indefinite"/>
      <g transform="translate(200, 200)">
        <text x="50" y="70" font-size="18" font-family="Arial" font-weight="normal">Reduce Electronic Waste</text>
        <path d="M200,200 L300,150 L350,200 L400,150 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
        <text x="300" y="150" font-size="14" font-family="Arial" font-weight="normal">Minimize electronic waste generated by IT systems</text>
        <animateTransform attributeName="transform" type="translate" from="-20,180" to="-20,180" dur="5s" repeatCount="indefinite"/>
        <g transform="translate(300, 150)">
          <text x="50" y="80" font-size="18" font-family="Arial" font-weight="normal">Promote Sustainable Practices</text>
          <path d="M250,150 L300,120 L350,150 L400,120 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
          <text x="300" y="120" font-size="14" font-family="Arial" font-weight="normal">Encourage sustainable practices throughout the entire IT lifecycle</text>
          <animateTransform attributeName="transform" type="translate" from="20,130" to="20,130" dur="5s" repeatCount="indefinite"/>
          <g transform="translate(300, 120)">
            <text x="50" y="90" font-size="18" font-family="Arial" font-weight="normal">Challenges Ahead</text>
            <path d="M250,120 L300,90 L350,120 L400,90 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
            <text x="300" y="90" font-size="14" font-family="Arial" font-weight="normal">Cost-Benefit Analysis</text>
            <animateTransform attributeName="transform" type="translate" from="-20,100" to="-20,100" dur="5s" repeatCount="indefinite"/>
            <g transform="translate(300, 90)">
              <text x="50" y="100" font-size="18" font-family="Arial" font-weight="normal">Cost-Benefit Analysis</text>
              <path d="M300,90 L350,60 L400,90 L450,60 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
              <text x="350" y="60" font-size="14" font-family="Arial" font-weight="normal">Increase costs may outweigh benefits</text>
              <animateTransform attributeName="transform" type="translate" from="20,80" to="20,80" dur="5s" repeatCount="indefinite"/>
            </g>
            <g transform="translate(350, 60)">
              <text x="50" y="70" font-size="18" font-family="Arial" font-weight="normal">Limited Adoption</text>
              <path d="M350,60 L400,40 L450,60 L500,40 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
              <text x="400" y="40" font-size="14" font-family="Arial" font-weight="normal">Limited adoption of green IT practices</text>
              <animateTransform attributeName="transform" type="translate" from="-20,30" to="-20,30" dur="5s" repeatCount="indefinite"/>
              <g transform="translate(400, 40)">
                <text x="50" y="50" font-size="18" font-family="Arial" font-weight="normal">Lack of Standardization</text>
                <path d="M400,40 L450,20 L500,40 L550,20 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
                <text x="450" y="20" font-size="14" font-family="Arial" font-weight="normal">Lack of standardization in green IT practices</text>
                <animateTransform attributeName="transform" type="translate" from="20,10" to="20,10" dur="5s" repeatCount="indefinite"/>
                <g transform="translate(450, 20)">
                  <text x="50" y="30" font-size="18" font-family="Arial" font-weight="normal">Skills Gap</text>
                  <path d="M450,20 L500,10 L550,20 L600,10 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
                  <text x="500" y="10" font-size="14" font-family="Arial" font-weight="normal">Skills gap in green IT practices</text>
                  <animateTransform attributeName="transform" type="translate" from="-20,0" to="-20,0" dur="5s" repeatCount="indefinite"/>
                  <g transform="translate(500, 10)">
                    <text x="50" y="20" font-size="18" font-family="Arial" font-weight="normal">Inadequate Infrastructure</text>
                    <path d="M500,10 L550,0 L600,10 L650,0 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
                    <text x="550" y="0" font-size="14" font-family="Arial" font-weight="normal">Inadequate infrastructure for green IT practices</text>
                    <animateTransform attributeName="transform" type="translate" from="20,-10" to="20,-10" dur="5s" repeatCount="indefinite"/>
                    <g transform="translate(550, 0)">
                      <text x="50" y="-10" font-size="18" font-family="Arial" font-weight="normal">Limited Access to Funds</text>
                      <path d="M550,0 L600,-10 L650,0 L700,-10 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
                      <text x="600" y="-10" font-size="14" font-family="Arial" font-weight="normal">Limited access to funds for green IT initiatives</text>
                      <animateTransform attributeName="transform" type="translate" from="20,-30" to="20,-30" dur="5s" repeatCount="indefinite"/>
                      <g transform="translate(600, -10)">
                        <text x="50" y="-40" font-size="18" font-family="Arial" font-weight="normal">Regulatory Framework</text>
                        <path d="M600,-10 L650,-40 L700,-10 L750,-40 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
                        <text x="650" y="-40" font-size="14" font-family="Arial" font-weight="normal">Lack of regulatory framework for green IT practices</text>
                        <animateTransform attributeName="transform" type="translate" from="20,-50" to="20,-50" dur="5s" repeatCount="indefinite"/>
                        <g transform="translate(650, -10)">
                          <text x="50" y="-60" font-size="18" font-family="Arial" font-weight="normal">Education and Awareness</text>
                          <path d="M650,-10 L700,-60 L750,-10 L800,-60 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
                          <text x="700" y="-60" font-size="14" font-family="Arial" font-weight="normal">Limited education and awareness about green IT practices</text>
                          <animateTransform attributeName="transform" type="translate" from="20,-70" to="20,-70" dur="5s" repeatCount="indefinite"/>
                        </g>
                        <g transform="translate(700, -10)">
                          <text x="50" y="-80" font-size="18" font-family="Arial" font-weight="normal">Lack of Government Support</text>
                          <path d="M700,-10 L750,-80 L800,-10 L850,-80 Z" stroke="#46A3E3" stroke-width="3" fill="none"/>
                          <text x="750" y="-80" font-size="14" font-family="Arial" font-weight="normal">Lack of government support for green IT initiatives</text>
                          <animateTransform attributeName="transform" type="translate" from="20,-90" to="20,-90" dur="5s" repeatCount="indefinite"/>
                        </g>
                      </g>
                    </g>
                  </g>
                </g>
              </g>
            </g>
          </g>
        </g>
      </g>
    </g>
  </svg>