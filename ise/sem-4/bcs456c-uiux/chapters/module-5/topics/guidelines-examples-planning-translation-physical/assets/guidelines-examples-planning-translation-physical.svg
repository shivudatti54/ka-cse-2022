<svg width="420" height="400" data-topic-id="guidelines-examples-planning-translation-physical" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="1" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Design Guidelines and Planning</title>
  <rect x="10" y="20" width="400" height="50" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 70)">
    <text x="30" y="30" font-size="24" fill="#2E4053">Guidelines Examples Planning Translation Physical</text>
  </g>
  <g transform="translate(10, 140)">
    <text x="30" y="30" font-size="18" fill="#2E4053">Definition</text>
    <rect x="10" y="60" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="10" y="90" font-size="16" fill="#2E4053">Design guidelines are a set of established principles and rules that designers follow to create consistent, user-centered, and aesthetically pleasing designs.</text>
  </g>
  <g transform="translate(10, 220)">
    <text x="30" y="30" font-size="18" fill="#2E4053">Importance of Guidelines</text>
    <rect x="10" y="60" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="10" y="90" font-size="16" fill="#2E4053">Consistency, Clarity, and Usability</text>
  </g>
  <g transform="translate(10, 310)">
    <text x="30" y="30" font-size="18" fill="#2E4053">Best Practices</text>
    <rect x="10" y="60" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="10" y="90" font-size="16" fill="#2E4053">Create a style guide, Make it accessible, and Review and update</text>
  </g>
  <g transform="translate(10, 400)">
    <text x="30" y="30" font-size="18" fill="#2E4053">Planning</text>
    <rect x="10" y="60" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="10" y="90" font-size="16" fill="#2E4053">Define the problem, Conduct user research, and Develop persona</text>
  </g>
  <g transform="translate(10, 490)">
    <text x="30" y="30" font-size="18" fill="#2E4053">Translation</text>
    <rect x="10" y="60" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="10" y="90" font-size="16" fill="#2E4053">Communicate design decisions and maintain a cohesive visual language</text>
  </g>
  <g transform="translate(10, 580)">
    <text x="30" y="30" font-size="18" fill="#2E4053">Physical</text>
    <rect x="10" y="60" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="10" y="90" font-size="16" fill="#2E4053">Use design principles to create a physical product that is consistent with the digital product</text>
  </g>
  <g transform="translate(10, 670)">
    <text x="30" y="30" font-size="18" fill="#2E4053">Examples</text>
    <rect x="10" y="60" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="10" y="90" font-size="16" fill="#2E4053">Color schemes, Typography, Iconography, and Button styles</text>
  </g>
  <g transform="translate(10, 760)">
    <text x="30" y="30" font-size="18" fill="#2E4053">Best Practices</text>
    <rect x="10" y="60" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="10" y="90" font-size="16" fill="#2E4053">Create a style guide, Make it accessible, and Review and update</text>
  </g>
