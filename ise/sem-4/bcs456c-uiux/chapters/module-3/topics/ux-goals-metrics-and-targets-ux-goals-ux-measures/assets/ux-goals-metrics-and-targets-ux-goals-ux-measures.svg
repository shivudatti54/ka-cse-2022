<svg width="420" height="400" data-topic-id="ux-goals-metrics-targets">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="380" height="360" fill="url(#gradient)" rx="10" />
  
  <!-- Title Section -->
  <g data-narration="Introduction">
    <rect x="20" y="20" width="380" height="40" fill="#F7F7F7" rx="10" />
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#333" text-anchor="left">User Experience (UX) Goals, Metrics, and Targets</text>
  </g>
  
  <!-- UX Goals Section -->
  <g data-narration="UX Goals">
    <rect x="20" y="70" width="380" height="100" fill="#F7F7F7" rx="10" />
    <rect x="20" y="80" width="100" height="50" fill="#F7F7F7" rx="10" />
    <text x="120" y="80" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">UX Goals</text>
    <rect x="20" y="140" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="140" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Definition:</tspan>
      <tspan>UX goals are the desired outcomes or objectives that a product should achieve to meet the needs and expectations of its users.</tspan>
    </text>
    <rect x="20" y="160" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="160" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Examples:</tspan>
      <tspan>Increase user engagement by 20% within the next 6 months.</tspan>
      <tspan>Reduce the average time spent on the login process by 30% within the next 3 months.</tspan>
    </text>
    <animateTransform attributeName="x" type="translate" from="120" to="180" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="x" type="translate" from="180" to="120" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Types of UX Goals Section -->
  <g data-narration="Types of UX Goals">
    <rect x="20" y="230" width="380" height="100" fill="#F7F7F7" rx="10" />
    <rect x="20" y="240" width="100" height="50" fill="#F7F7F7" rx="10" />
    <text x="120" y="240" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Functional Goals</text>
    <rect x="20" y="290" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="290" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Examples:</tspan>
      <tspan>Focus on the product's functionality and usability.</tspan>
    </text>
    <rect x="20" y="310" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="310" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Emotional Goals</tspan>
      <tspan>Focus on the user's emotional experience and engagement.</tspan>
    </text>
    <rect x="20" y="330" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="330" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Economic Goals</tspan>
      <tspan>Focus on the financial benefits of the product.</tspan>
    </text>
    <animateTransform attributeName="x" type="translate" from="120" to="180" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="x" type="translate" from="180" to="120" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- UX Measures Section -->
  <g data-narration="UX Measures">
    <rect x="20" y="400" width="380" height="100" fill="#F7F7F7" rx="10" />
    <rect x="20" y="410" width="100" height="50" fill="#F7F7F7" rx="10" />
    <text x="120" y="410" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">UX Measures</text>
    <rect x="20" y="470" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="470" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Definition:</tspan>
      <tspan>UX measures are the methods used to evaluate and assess the effectiveness of a product's UX goals.</tspan>
    </text>
    <rect x="20" y="490" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="490" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Examples:</tspan>
      <tspan>Surveys and questionnaires: collect feedback from users to understand their needs and expectations.</tspan>
      <tspan>A/B testing: compare the performance of different versions of a product or feature.</tspan>
    </text>
    <rect x="20" y="510" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="510" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Heatmaps and click-tracking: analyze user behavior and interactions with the product.</tspan>
    </text>
    <animateTransform attributeName="x" type="translate" from="120" to="180" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="x" type="translate" from="180" to="120" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Measurement Instruments Section -->
  <g data-narration="Measurement Instruments">
    <rect x="20" y="600" width="380" height="100" fill="#F7F7F7" rx="10" />
    <rect x="20" y="610" width="100" height="50" fill="#F7F7F7" rx="10" />
    <text x="120" y="610" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Measurement Instruments</text>
    <rect x="20" y="670" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="670" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Definition:</tspan>
      <tspan>Measurement instruments are the tools and methods used to collect data and measure the product's UX.</tspan>
    </text>
    <rect x="20" y="690" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="690" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Examples:</tspan>
      <tspan>Surveys and questionnaires: online tools used to collect feedback from users.</tspan>
      <tspan>A/B testing: compare the performance of different versions of a product or feature.</tspan>
    </text>
    <rect x="20" y="710" width="60" height="20" fill="#F7F7F7" rx="5" />
    <text x="80" y="710" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">
      <tspan>Analytics tools: analyze user behavior and interactions with the product.</tspan>
    </text>
    <animateTransform attributeName="x" type="translate" from="120" to="180" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="x" type="translate" from="180" to="120" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  
  <!-- Footer Section -->
  <g data-narration="Footer">
    <rect x="20" y="780" width="380" height="40" fill="#F7F7F7" rx="10" />
    <text x="20" y="790" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Copyright 2023</text>
  </g>
</svg>