<svg width="420" height="400" data-topic-id="sketching-in-ui-ux-design">
  <title>Sketching in UI/UX Design</title>
  <style>
    /* Add a gradient background with pastel colors */
    body {
      background: linear-gradient(to bottom, #c9e4ca, #f7f2c4);
      padding: 20px;
      font-family: Arial, sans-serif;
    }
  </style>
  <defs>
    <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4682b4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2f4f7f" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#color-gradient)"/>
  <text x="20" y="20" style="font-size: 24px; font-weight: bold; fill: #2f4f7f">Sketching in UI/UX Design</text>
  <section data-narration="What is Sketching?">
    <text x="20" y="60" style="font-size: 18px; fill: #4682b4">What is Sketching?</text>
    <text x="20" y="80" style="font-size: 18px; fill: #4682b4">Sketching is a fundamental skill in UI/UX design that involves creating visual representations of ideas, prototypes, and concepts to communicate and refine design solutions.</text>
    <rect x="20" y="100" width="360" height="20" style="fill: #87ceeb; stroke-width: 2; stroke: #2f4f7f; stroke-dasharray: 5, 5"/>
  </section>
  <section data-narration="Benefits of Sketching">
    <text x="20" y="140" style="font-size: 18px; fill: #4682b4">Benefits of Sketching</text>
    <text x="20" y="160" style="font-size: 18px; fill: #4682b4">Improved communication, increased creativity, and faster iteration are just a few of the benefits of sketching.</text>
    <rect x="20" y="180" width="360" height="20" style="fill: #87ceeb; stroke-width: 2; stroke: #2f4f7f; stroke-dasharray: 5, 5"/>
  </section>
  <section data-narration="Types of Sketching">
    <text x="20" y="220" style="font-size: 18px; fill: #4682b4">Types of Sketching</text>
    <text x="20" y="240" style="font-size: 18px; fill: #4682b4">Freehand sketching, grid-based sketching, and digital sketching are just a few of the many types of sketching available.</text>
    <rect x="20" y="260" width="360" height="20" style="fill: #87ceeb; stroke-width: 2; stroke: #2f4f7f; stroke-dasharray: 5, 5"/>
    <path d="M 20 280 L 360 280 L 360 320 L 20 320 Z" style="fill: #87ceeb; stroke-width: 2; stroke: #2f4f7f; stroke-dasharray: 5, 5"/>
  </section>
  <section data-narration="Design Thinking Principles">
    <text x="20" y="300" style="font-size: 18px; fill: #4682b4">Design Thinking Principles</text>
    <text x="20" y="320" style="font-size: 18px; fill: #4682b4">Empathize, define, ideate, prototype, and test are just a few of the design thinking principles that can be applied to sketching.</text>
    <rect x="20" y="340" width="360" height="20" style="fill: #87ceeb; stroke-width: 2; stroke: #2f4f7f; stroke-dasharray: 5, 5"/>
  </section>
  <section data-narration="Sketching Techniques">
    <text x="20" y="380" style="font-size: 18px; fill: #4682b4">Sketching Techniques</text>
    <text x="20" y="400" style="font-size: 18px; fill: #4682b4">Contour drawing, wireframing, user flow diagrams, and persona sketches are just a few of the many sketching techniques available.</text>
  </section>
  <footer>Sketching in UI/UX Design</footer>
</svg>