<svg width="420" height="400" data-topic-id="requirement-extraction-methods" data-narration="Methods for Requirement Extraction">
  <rect x="0" y="0" width="100%" height="100%" fill="#87CEEB" />
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
  <g transform="translate(20, 100)">
    <rect x="0" y="0" width="80" height="80" fill="#3498DB" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Functional Requirements</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
  </g>
  <g transform="translate(20, 150)">
    <rect x="0" y="0" width="80" height="80" fill="#2E865F" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Non-Functional Requirements</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
  </g>
  <g transform="translate(20, 200)">
    <rect x="0" y="0" width="80" height="80" fill="#E74C3C" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Interviews</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Provides in-depth information about users' needs and expectations.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Allows for exploration of users' thoughts and feelings.</text>
  </g>
  <g transform="translate(20, 280)">
    <rect x="0" y="0" width="80" height="80" fill="#F1C40F" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Surveys</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Allows for a large number of respondents to be surveyed.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Can be conducted at a low cost.</text>
  </g>
  <g transform="translate(20, 340)">
    <rect x="0" y="0" width="80" height="80" fill="#E67E73" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Focus Groups</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Allows for a smaller, more intimate discussion group.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Can provide a more nuanced understanding of users' needs and expectations.</text>
  </g>
  <g transform="translate(20, 100)">
    <rect x="0" y="0" width="80" height="80" fill="#1ABC9C" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Observation</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Provides an opportunity to observe users' behavior and interactions.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Can help identify patterns and trends.</text>
  </g>
  <g transform="translate(20, 130)">
    <rect x="0" y="0" width="80" height="80" fill="#2E865F" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Other Methods</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Other methods such as usability testing and contextual inquiry can also be used.</text>
  </g>
  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="80" height="80" fill="#E74C3C" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Case Studies</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Provides a detailed analysis of a specific project or system.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Can help identify best practices and lessons learned.</text>
  </g>
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="80" height="80" fill="#F1C40F" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Workshops and Meetings</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Provides an opportunity for stakeholders to share their knowledge and expertise.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Can help identify requirements and priorities.</text>
  </g>
  <g transform="translate(20, 270)">
    <rect x="0" y="0" width="80" height="80" fill="#E67E73" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Documentation</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Provides a written record of requirements and decisions.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Can help ensure that requirements are understood and implemented correctly.</text>
  </g>
  <g transform="translate(20, 320)">
    <rect x="0" y="0" width="80" height="80" fill="#1ABC9C" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Requirements Management</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Involves the identification, analysis, documentation, and maintenance of requirements.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Is an ongoing process that requires continuous monitoring and review.</text>
  </g>
  <g transform="translate(20, 360)">
    <rect x="0" y="0" width="80" height="80" fill="#2E865F" rx="10" />
    <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Best Practices</text>
    <animate attributeName="opacity" begin="1s" dur="5s" from="1" to="0" repeatCount="indefinite" />
    <text x="10" y="50" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Involves following established methods and guidelines for requirement extraction.</text>
    <text x="10" y="80" text-anchor="middle" font-size="18" font-family="Arial" fill="#2E4053">Can help ensure that requirements are accurate and complete.</text>
  </g>
  <rect x="0" y="0" width="420" height="40" fill="#3498DB" />
  <text x="10" y="10" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Methods for Requirement Extraction</text>
  <rect x="0" y="370" width="420" height="40" fill="#3498DB" />
  <text x="10" y="380" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Methods for Requirement Extraction</text>
</svg>