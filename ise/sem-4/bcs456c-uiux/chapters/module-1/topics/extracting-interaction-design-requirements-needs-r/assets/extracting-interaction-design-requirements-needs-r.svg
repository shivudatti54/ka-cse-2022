<svg width="420" height="400" data-topic-id="interaction-design-requirements" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve" style="mix-blend-mode: multiply;">

  <!-- Gradient background -->
  <defs>
    <linearGradient id="color-based-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4567b7" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="url(#color-based-gradient)" x="0" y="0" width="420" height="400" rx="10" />
  <!-- Title -->
  <text data-narration="Introduction" x="50%" y="20%" font-size="24" fill="#fff" text-anchor="middle">Interaction Design Requirements: Needs &amp; Requirements</text>

  <!-- Section 1: Needs -->
  <rect x="20" y="100" width="380" height="100" rx="10" fill="#fff" data-narration="Functional needs refer to the basic functions users require from a product, such as navigation, communication, or information retrieval.">
    <text x="50%" y="50%" font-size="18" fill="#333" text-anchor="middle">Functional needs</text>
  </rect>

  <!-- Section 2: Emotional needs -->
  <rect x="20" y="200" width="380" height="100" rx="10" fill="#fff" data-narration="Emotional needs refer to the emotional connections users form with a product, such as satisfaction, pleasure, or relaxation.">
    <text x="50%" y="50%" font-size="18" fill="#333" text-anchor="middle">Emotional needs</text>
  </rect>

  <!-- Section 3: Social needs -->
  <rect x="20" y="300" width="380" height="100" rx="10" fill="#fff" data-narration="Social needs refer to the social interactions and relationships users engage with, such as collaboration, community, or social status.">
    <text x="50%" y="50%" font-size="18" fill="#333" text-anchor="middle">Social needs</text>
  </rect>

  <!-- Section 4: Requirements -->
  <rect x="20" y="100" width="380" height="100" rx="10" fill="#fff" data-narration="Requirements are the specifications and constraints that define the functional and non-functional expectations of users.">
    <text x="50%" y="50%" font-size="18" fill="#333" text-anchor="middle">Requirements</text>
  </rect>

  <!-- Section 5: Primary requirements -->
  <rect x="20" y="200" width="380" height="100" rx="10" fill="#fff" data-narration="Primary requirements are the essential needs and expectations that users have, which must be met to ensure a basic level of functionality.">
    <text x="50%" y="50%" font-size="18" fill="#333" text-anchor="middle">Primary requirements</text>
  </rect>

  <!-- Section 6: Secondary requirements -->
  <rect x="20" y="300" width="380" height="100" rx="10" fill="#fff" data-narration="Secondary requirements are the discretionary needs and expectations that users have, which are not essential but can enhance the overall experience.">
    <text x="50%" y="50%" font-size="18" fill="#333" text-anchor="middle">Secondary requirements</text>
  </rect>

  <!-- Animations -->
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="0s" dur="2s" from="0" to="1" fill="freeze" />
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="filter" begin="0s" dur="2s" from="none" to="url(#drop-shadow)" fill="freeze" />
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="x" begin="0s" dur="2s" from="50%" to="80%" fill="freeze" />
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="y" begin="0s" dur="2s" from="20%" to="40%" fill="freeze" />


  <!-- Footer -->
  <text x="50%" y="380" font-size="18" fill="#333" text-anchor="middle">Interaction Design Requirements: Needs &amp; Requirements</text>

</svg>