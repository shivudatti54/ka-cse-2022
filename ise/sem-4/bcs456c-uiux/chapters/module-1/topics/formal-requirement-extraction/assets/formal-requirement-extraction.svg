<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="formal-requirement-extraction">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="50%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Formal Requirement Extraction is the structured process of identifying, documenting, and validating what a system must do.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="28" font-family="Arial" font-size="15" font-weight="bold" fill="#3949AB" text-anchor="middle">Formal Requirement Extraction</text>
    <rect x="80" y="33" width="260" height="3" rx="1.5" fill="url(#titleUnderline)"/>
    <circle cx="78" cy="34" r="3" fill="#3949AB"/>
    <circle cx="342" cy="34" r="3" fill="#E65100"/>
  </g>

  <!-- Group 2: Requirements Gathering Flow -->
  <g opacity="0" data-narration="The gathering flow starts with stakeholder interviews, user research, and document analysis, all feeding into a consolidated requirements document.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>

    <!-- Stakeholder Interviews -->
    <rect x="12" y="46" width="92" height="32" rx="6" fill="#3949AB" opacity="0.9"/>
    <text x="58" y="58" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Stakeholder</text>
    <text x="58" y="68" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Interviews</text>

    <!-- User Research -->
    <rect x="114" y="46" width="92" height="32" rx="6" fill="#00695C" opacity="0.9"/>
    <text x="160" y="58" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">User</text>
    <text x="160" y="68" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Research</text>

    <!-- Document Analysis -->
    <rect x="216" y="46" width="92" height="32" rx="6" fill="#E65100" opacity="0.9"/>
    <text x="262" y="58" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Document</text>
    <text x="262" y="68" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Analysis</text>

    <!-- Arrows converging down -->
    <line x1="58" y1="78" x2="58" y2="86" stroke="#3949AB" stroke-width="1.5"/>
    <line x1="160" y1="78" x2="160" y2="86" stroke="#00695C" stroke-width="1.5"/>
    <line x1="262" y1="78" x2="262" y2="86" stroke="#E65100" stroke-width="1.5"/>

    <!-- Converging lines to center -->
    <line x1="58" y1="86" x2="210" y2="94" stroke="#3949AB" stroke-width="1"/>
    <line x1="160" y1="86" x2="210" y2="94" stroke="#00695C" stroke-width="1"/>
    <line x1="262" y1="86" x2="210" y2="94" stroke="#E65100" stroke-width="1"/>
    <polygon points="210,94 206,89 214,89" fill="#3949AB"/>

    <!-- Arrow from center to Requirements Document -->
    <line x1="210" y1="94" x2="310" y2="62" stroke="#3949AB" stroke-width="1.2" stroke-dasharray="3,2"/>
    <polygon points="310,62 305,66 311,68" fill="#3949AB"/>

    <!-- Requirements Document -->
    <rect x="318" y="46" width="92" height="32" rx="6" fill="#C62828" opacity="0.9"/>
    <text x="364" y="58" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Requirements</text>
    <text x="364" y="68" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Document</text>
  </g>

  <!-- Group 3: Types of Requirements -->
  <g opacity="0" data-narration="Requirements fall into three types: Functional requirements define what the system does, non-functional cover performance, security, and usability, and constraints address technology, budget, and time limits.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>

    <text x="210" y="114" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB" text-anchor="middle">Types of Requirements</text>

    <!-- Functional -->
    <rect x="12" y="122" width="126" height="52" rx="7" fill="white" stroke="#3949AB" stroke-width="1.5" opacity="0.95"/>
    <rect x="12" y="122" width="126" height="16" rx="7" fill="#3949AB"/>
    <text x="75" y="133" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">Functional</text>
    <text x="75" y="148" font-family="Arial" font-size="7" fill="#333" text-anchor="middle">What the system does</text>
    <text x="75" y="159" font-family="monospace" font-size="6.5" fill="#3949AB" text-anchor="middle">features, behaviors</text>
    <text x="75" y="169" font-family="monospace" font-size="6.5" fill="#3949AB" text-anchor="middle">data processing</text>

    <!-- Non-functional -->
    <rect x="147" y="122" width="126" height="52" rx="7" fill="white" stroke="#00695C" stroke-width="1.5" opacity="0.95"/>
    <rect x="147" y="122" width="126" height="16" rx="7" fill="#00695C"/>
    <text x="210" y="133" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">Non-Functional</text>
    <text x="210" y="148" font-family="Arial" font-size="7" fill="#333" text-anchor="middle">Quality attributes</text>
    <text x="210" y="159" font-family="monospace" font-size="6.5" fill="#00695C" text-anchor="middle">performance, security</text>
    <text x="210" y="169" font-family="monospace" font-size="6.5" fill="#00695C" text-anchor="middle">usability, reliability</text>

    <!-- Constraints -->
    <rect x="282" y="122" width="126" height="52" rx="7" fill="white" stroke="#E65100" stroke-width="1.5" opacity="0.95"/>
    <rect x="282" y="122" width="126" height="16" rx="7" fill="#E65100"/>
    <text x="345" y="133" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">Constraints</text>
    <text x="345" y="148" font-family="Arial" font-size="7" fill="#333" text-anchor="middle">Limitations and boundaries</text>
    <text x="345" y="159" font-family="monospace" font-size="6.5" fill="#E65100" text-anchor="middle">tech stack, budget</text>
    <text x="345" y="169" font-family="monospace" font-size="6.5" fill="#E65100" text-anchor="middle">timeline, platforms</text>
  </g>

  <!-- Group 4: Techniques -->
  <g opacity="0" data-narration="Key techniques include user stories written as As a user I want a goal so that reason, use cases mapping actors to system interactions, and personas representing target user archetypes.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>

    <text x="210" y="192" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB" text-anchor="middle">Techniques</text>

    <!-- User Stories -->
    <rect x="12" y="200" width="130" height="58" rx="7" fill="white" stroke="#3949AB" stroke-width="1.2"/>
    <text x="77" y="212" font-family="Arial" font-size="8" font-weight="bold" fill="#3949AB" text-anchor="middle">User Stories</text>
    <text x="77" y="224" font-family="monospace" font-size="5.5" fill="#444" text-anchor="middle">As a [user],</text>
    <text x="77" y="233" font-family="monospace" font-size="5.5" fill="#444" text-anchor="middle">I want [goal],</text>
    <text x="77" y="242" font-family="monospace" font-size="5.5" fill="#444" text-anchor="middle">so that [reason]</text>
    <rect x="16" y="248" width="122" height="6" rx="3" fill="#3949AB" opacity="0.15"/>
    <rect x="16" y="248" width="80" height="6" rx="3" fill="#3949AB" opacity="0.4"/>

    <!-- Use Cases -->
    <rect x="150" y="200" width="120" height="58" rx="7" fill="white" stroke="#00695C" stroke-width="1.2"/>
    <text x="210" y="212" font-family="Arial" font-size="8" font-weight="bold" fill="#00695C" text-anchor="middle">Use Cases</text>
    <!-- Actor stick figure -->
    <circle cx="180" cy="226" r="4" fill="none" stroke="#00695C" stroke-width="1"/>
    <line x1="180" y1="230" x2="180" y2="240" stroke="#00695C" stroke-width="1"/>
    <line x1="174" y1="234" x2="186" y2="234" stroke="#00695C" stroke-width="1"/>
    <line x1="180" y1="240" x2="175" y2="248" stroke="#00695C" stroke-width="1"/>
    <line x1="180" y1="240" x2="185" y2="248" stroke="#00695C" stroke-width="1"/>
    <text x="180" y="255" font-family="Arial" font-size="5.5" fill="#00695C" text-anchor="middle">Actor</text>
    <!-- Arrow -->
    <line x1="192" y1="236" x2="216" y2="236" stroke="#00695C" stroke-width="1" stroke-dasharray="2,1"/>
    <polygon points="216,236 212,233 212,239" fill="#00695C"/>
    <!-- System ellipse -->
    <ellipse cx="237" cy="236" rx="24" ry="14" fill="#00695C" opacity="0.1" stroke="#00695C" stroke-width="1"/>
    <text x="237" y="239" font-family="Arial" font-size="6" fill="#00695C" text-anchor="middle">System</text>

    <!-- Personas -->
    <rect x="278" y="200" width="130" height="58" rx="7" fill="white" stroke="#E65100" stroke-width="1.2"/>
    <text x="343" y="212" font-family="Arial" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">Personas</text>
    <!-- Persona icon -->
    <circle cx="310" cy="228" r="7" fill="#E65100" opacity="0.2" stroke="#E65100" stroke-width="0.8"/>
    <circle cx="310" cy="225" r="3" fill="#E65100" opacity="0.5"/>
    <path d="M304,233 Q310,230 316,233" fill="#E65100" opacity="0.5"/>
    <text x="310" y="244" font-family="Arial" font-size="5.5" fill="#E65100" text-anchor="middle">Name, Goals</text>
    <text x="310" y="252" font-family="Arial" font-size="5.5" fill="#E65100" text-anchor="middle">Pain points</text>
    <!-- Second mini persona -->
    <circle cx="365" cy="228" r="7" fill="#E65100" opacity="0.12" stroke="#E65100" stroke-width="0.8"/>
    <circle cx="365" cy="225" r="3" fill="#E65100" opacity="0.35"/>
    <path d="M359,233 Q365,230 371,233" fill="#E65100" opacity="0.35"/>
    <text x="365" y="244" font-family="Arial" font-size="5.5" fill="#E65100" text-anchor="middle">Behaviors</text>
    <text x="365" y="252" font-family="Arial" font-size="5.5" fill="#E65100" text-anchor="middle">Scenarios</text>
  </g>

  <!-- Group 5: Requirement Specification Format -->
  <g opacity="0" data-narration="Each requirement is documented with a unique ID, description, priority using the MoSCoW method of Must, Should, Could, and Wont, and clear acceptance criteria.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>

    <text x="210" y="276" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB" text-anchor="middle">Requirement Specification Format</text>

    <!-- Mini table header -->
    <rect x="32" y="283" width="356" height="14" rx="4" fill="#3949AB"/>
    <text x="62" y="293" font-family="monospace" font-size="7" font-weight="bold" fill="white" text-anchor="middle">ID</text>
    <text x="155" y="293" font-family="monospace" font-size="7" font-weight="bold" fill="white" text-anchor="middle">Description</text>
    <text x="278" y="293" font-family="monospace" font-size="7" font-weight="bold" fill="white" text-anchor="middle">Priority</text>
    <text x="365" y="293" font-family="monospace" font-size="7" font-weight="bold" fill="white" text-anchor="middle">Criteria</text>

    <!-- Row 1 -->
    <rect x="32" y="297" width="356" height="14" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="307" font-family="monospace" font-size="6.5" fill="#3949AB" text-anchor="middle">REQ-001</text>
    <text x="155" y="307" font-family="Arial" font-size="6.5" fill="#333" text-anchor="middle">User login with email</text>
    <text x="278" y="307" font-family="Arial" font-size="6.5" fill="#C62828" font-weight="bold" text-anchor="middle">Must Have</text>
    <text x="365" y="307" font-family="Arial" font-size="6.5" fill="#333" text-anchor="middle">Auth success</text>

    <!-- Row 2 -->
    <rect x="32" y="311" width="356" height="14" fill="#F5F5F5" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="321" font-family="monospace" font-size="6.5" fill="#3949AB" text-anchor="middle">REQ-002</text>
    <text x="155" y="321" font-family="Arial" font-size="6.5" fill="#333" text-anchor="middle">Dashboard loads in under 2s</text>
    <text x="278" y="321" font-family="Arial" font-size="6.5" fill="#E65100" font-weight="bold" text-anchor="middle">Should Have</text>
    <text x="365" y="321" font-family="Arial" font-size="6.5" fill="#333" text-anchor="middle">Perf. tested</text>

    <!-- Row 3 -->
    <rect x="32" y="325" width="356" height="14" fill="white" stroke="#C5CAE9" stroke-width="0.5"/>
    <text x="62" y="335" font-family="monospace" font-size="6.5" fill="#3949AB" text-anchor="middle">REQ-003</text>
    <text x="155" y="335" font-family="Arial" font-size="6.5" fill="#333" text-anchor="middle">Dark mode theme</text>
    <text x="278" y="335" font-family="Arial" font-size="6.5" fill="#00695C" font-weight="bold" text-anchor="middle">Could Have</text>
    <text x="365" y="335" font-family="Arial" font-size="6.5" fill="#333" text-anchor="middle">Toggle works</text>

    <!-- MoSCoW label -->
    <text x="210" y="348" font-family="Arial" font-size="5.5" fill="#666" text-anchor="middle">MoSCoW: Must | Should | Could | Won't</text>
  </g>

  <!-- Group 6: Validation -->
  <g opacity="0" data-narration="Validation ensures correctness through peer reviews, prototyping for early feedback, and a traceability matrix that maps each requirement to its corresponding feature.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>

    <text x="210" y="364" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB" text-anchor="middle">Validation</text>

    <!-- Review -->
    <rect x="18" y="372" width="80" height="22" rx="5" fill="#3949AB" opacity="0.85"/>
    <text x="58" y="386" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Review</text>

    <!-- Arrow -->
    <line x1="100" y1="383" x2="118" y2="383" stroke="#3949AB" stroke-width="1"/>
    <polygon points="118,383 114,380 114,386" fill="#3949AB"/>

    <!-- Prototyping -->
    <rect x="120" y="372" width="80" height="22" rx="5" fill="#00695C" opacity="0.85"/>
    <text x="160" y="386" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Prototyping</text>

    <!-- Arrow -->
    <line x1="202" y1="383" x2="220" y2="383" stroke="#00695C" stroke-width="1"/>
    <polygon points="220,383 216,380 216,386" fill="#00695C"/>

    <!-- Traceability Matrix -->
    <rect x="222" y="372" width="110" height="22" rx="5" fill="#E65100" opacity="0.85"/>
    <text x="277" y="386" font-family="Arial" font-size="7.5" fill="white" text-anchor="middle">Traceability Matrix</text>

    <!-- Arrow -->
    <line x1="334" y1="383" x2="348" y2="383" stroke="#E65100" stroke-width="1"/>
    <polygon points="348,383 344,380 344,386" fill="#E65100"/>

    <!-- Approved checkmark -->
    <circle cx="370" cy="383" r="12" fill="#00695C" opacity="0.15" stroke="#00695C" stroke-width="1"/>
    <polyline points="363,383 368,388 378,378" fill="none" stroke="#00695C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="370" y="398" font-family="Arial" font-size="5" fill="#00695C" text-anchor="middle">Approved</text>
  </g>
</svg>
