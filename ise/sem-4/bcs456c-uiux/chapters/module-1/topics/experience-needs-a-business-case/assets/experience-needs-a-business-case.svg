<svg width="420" height="400" data-topic-id="experience-needs-a-business-case" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="max-width:100%;overflow:auto;">
  <title>Experience Needs a Business Case</title>
  <style>
    /* styles */
    .background {
      background: linear-gradient(to bottom, #ADD8E6, #C7E8EA);
      height: 100%;
      width: 100%;
      opacity: 0.8;
    }
    .section {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .section.narration {
      font-size: 18px;
      color: #3498db;
    }
    .section.narration > g {
      opacity: 0;
      transition: opacity 1s;
    }
    .section.animate {
      animation: animate 2s forwards;
    }
    @keyframes animate {
      0% {
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
  <g class="background">
    <rect x="0" y="0" width="420" height="400" fill="#ADD8E6" rx="10" />
    <line x1="0" y1="0" x2="420" y2="0" stroke="#3498db" stroke-width="2" />
    <line x1="0" y1="400" x2="420" y2="400" stroke="#3498db" stroke-width="2" />
  </g>
  <g transform="translate(0, -20)">
    <text text-anchor="middle" x="210" y="10" font-size="24" font-family="Arial, sans-serif">Experience Needs a Business Case</text>
  </g>
  <g>
    <rect x="20" y="50" width="400" height="150" fill="#fff" rx="10" />
    <rect x="20" y="50" width="80" height="150" fill="#3498db" rx="10" class="section" data-narration="What is a Business Case?">
      <text class="section.narration" x="40" y="80" font-size="18" font-family="Arial, sans-serif">A business case is a formal document that outlines the rationale for a project or initiative, including its costs, benefits, and potential return on investment (ROI).</text>
      <animate transform="rotate(360 40 80)" begin="0s" dur="1s" fill="freeze" />
    </rect>
    <rect x="120" y="50" width="280" height="150" fill="#fff" rx="10" />
    <rect x="120" y="50" width="80" height="150" fill="#3498db" rx="10" class="section" data-narration="Experience Needs a Business Case">
      <text class="section.narration" x="140" y="80" font-size="18" font-family="Arial, sans-serif">The phrase 'Experience Needs a Business Case' suggests that UX design must be justified and measured in terms of its business value.</text>
      <animate transform="rotate(360 140 80)" begin="1s" dur="1s" fill="freeze" />
    </rect>
    <rect x="20" y="220" width="400" height="150" fill="#fff" rx="10" />
    <rect x="20" y="220" width="80" height="150" fill="#3498db" rx="10" class="section" data-narration="Key Concepts">
      <text class="section.narration" x="40" y="260" font-size="18" font-family="Arial, sans-serif">Return on Investment (ROI), Business Value, Cost-Benefit Analysis, Value Proposition</text>
      <g>
        <line x1="20" y1="240" x2="80" y2="240" stroke="#3498db" stroke-width="2" />
        <line x1="20" y1="240" x2="80" y2="240" stroke="#3498db" stroke-width="2" />
        <line x1="80" y1="240" x2="80" y2="240" stroke="#3498db" stroke-width="2" />
        <line x1="80" y1="240" x2="120" y2="240" stroke="#3498db" stroke-width="2" />
        <line x1="20" y1="240" x2="120" y2="240" stroke="#3498db" stroke-width="2" />
      </g>
    </rect>
    <rect x="120" y="220" width="280" height="150" fill="#fff" rx="10" />
    <rect x="120" y="220" width="80" height="150" fill="#3498db" rx="10" class="section" data-narration="Benefits of Experience Needs a Business Case">
      <text class="section.narration" x="140" y="260" font-size="18" font-family="Arial, sans-serif">Increased Investment in UX, Improved Prioritization, Clear ROI, Business Value Measurement</text>
      <g>
        <line x1="120" y1="240" x2="160" y2="240" stroke="#3498db" stroke-width="2" />
        <line x1="120" y1="240" x2="160" y2="240" stroke="#3498db" stroke-width="2" />
        <line x1="160" y1="240" x2="200" y2="240" stroke="#3498db" stroke-width="2" />
        <line x1="120" y1="240" x2="200" y2="240" stroke="#3498db" stroke-width="2" />
      </g>
    </rect>
    <rect x="20" y="320" width="400" height="150" fill="#fff" rx="10" />
    <rect x="20" y="320" width="80" height="150" fill="#3498db" rx="10" class="section" data-narration="Conclusion">
      <text class="section.narration" x="40" y="360" font-size="18" font-family="Arial, sans-serif">In conclusion, experience needs a business case to demonstrate its value and justify investment.</text>
    </rect>
  </g>
  <g transform="translate(0, 380)">
    <rect x="0" y="0" width="420" height="20" fill="#3498db" rx="10" />
    <text text-anchor="middle" x="210" y="10" font-size="18" font-family="Arial, sans-serif">Footer</text>
  </g>
</svg>