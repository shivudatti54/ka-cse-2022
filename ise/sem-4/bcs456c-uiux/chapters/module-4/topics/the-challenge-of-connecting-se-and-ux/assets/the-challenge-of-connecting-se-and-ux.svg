<svg width="420" height="400" data-topic-id="The-Challenge-Of-Connecting-SE-and-UX" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8DFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#61BDFF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#gradient)" rx="10" />
  <title>Connecting Software Engineering and User Experience</title>
  <g id="section1">
    <rect x="50" y="100" width="220" height="50" fill="#F7F7F7" rx="5" />
    <text x="70" y="120" font-size="18" font-family="Arial" font-weight="bold">Communication Breakdown</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-10" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="70" y="130" font-size="14" font-family="Arial">Lack of understanding between SE and UX teams can lead to miscommunication and conflicting priorities.</text>
  </g>
  <g id="section2">
    <rect x="50" y="150" width="220" height="50" fill="#F7F7F7" rx="5" />
    <text x="70" y="170" font-size="18" font-family="Arial" font-weight="bold">Time and Resource Constraints</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-10" begin="2s" dur="2s" repeatCount="indefinite" />
    <text x="70" y="180" font-size="14" font-family="Arial">SE and UX teams often have different priorities and timelines, making it challenging to allocate resources effectively.</text>
  </g>
  <g id="section3">
    <rect x="50" y="200" width="220" height="50" fill="#F7F7F7" rx="5" />
    <text x="70" y="220" font-size="18" font-family="Arial" font-weight="bold">Trade-offs between Functionality and Usability</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-10" begin="4s" dur="2s" repeatCount="indefinite" />
    <text x="70" y="230" font-size="14" font-family="Arial">SE teams often focus on meeting functional requirements, while UX teams prioritize usability and user experience.</text>
  </g>
  <g id="section4">
    <rect x="50" y="250" width="220" height="50" fill="#F7F7F7" rx="5" />
    <text x="70" y="270" font-size="18" font-family="Arial" font-weight="bold">Technical Debt</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-10" begin="6s" dur="2s" repeatCount="indefinite" />
    <text x="70" y="280" font-size="14" font-family="Arial">SE teams may prioritize technical efficiency over UX considerations, leading to technical debt.</text>
  </g>
  <g id="section5">
    <rect x="50" y="300" width="220" height="50" fill="#F7F7F7" rx="5" />
    <text x="70" y="320" font-size="18" font-family="Arial" font-weight="bold">Key Concepts</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-10" begin="8s" dur="2s" repeatCount="indefinite" />
    <text x="70" y="330" font-size="14" font-family="Arial">User-Centered Design (UCD)</text>
  </g>
  <g id="section6">
    <rect x="50" y="350" width="220" height="50" fill="#F7F7F7" rx="5" />
    <text x="70" y="370" font-size="18" font-family="Arial" font-weight="bold">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-10" begin="10s" dur="2s" repeatCount="indefinite" />
    <text x="70" y="380" font-size="14" font-family="Arial">Connecting SE and UX ensures the creation of software products that meet user needs and are maintainable over time.</text>
  </g>
  <g id="footnote">
    <rect x="50" y="410" width="320" height="20" fill="#F7F7F7" rx="5" />
    <text x="70" y="420" font-size="14" font-family="Arial">References</text>
    <text x="70" y="430" font-size="14" font-family="Arial">[Insert references]</text>
  </g>
  <g id="arrowmarkers">
    <line x1="150" y1="100" x2="150" y2="250" stroke="#333" stroke-width="2" />
    <line x1="150" y1="150" x2="150" y2="250" stroke="#333" stroke-width="2" />
    <line x1="150" y1="200" x2="150" y2="250" stroke="#333" stroke-width="2" />
    <line x1="150" y1="250" x2="150" y2="350" stroke="#333" stroke-width="2" />
  </g>
</svg>