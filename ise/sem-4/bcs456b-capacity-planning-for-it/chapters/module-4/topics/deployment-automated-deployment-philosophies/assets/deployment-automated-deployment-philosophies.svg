<svg width="420" height="400" data-topic-id="deployment-automated-deployment-philosophies">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1" />
      <stop offset="50%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#FFC107" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%" rx="10" />
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <g transform="translate(20, 20)">
      <text x="50%" y="50%" font-size="24" font-family="Arial, sans-serif">
        <tspan x="50%" y="50%" font-size="24">Deployment: Automated Deployment Philosophies</tspan>
      </text>
    </g>
  </section>
  
  <!-- Types of Deployment Section -->
  <section data-narration="Types of Deployment">
    <g transform="translate(20, 80)">
      <rect width="300" height="20" rx="5" fill="#F7F7F7" />
      <text x="5%" y="50%" font-size="16" font-family="Arial, sans-serif">
        <tspan x="5%" y="50%" font-size="16">Manual Deployment</tspan>
        <tspan x="140%" y="50%" font-size="16">Automated Deployment</tspan>
      </text>
      <line x1="150%" y1="20%" x2="150%" y2="80%" stroke="#3498DB" stroke-width="2" />
      <text x="150%" y="60%" font-size="16" font-family="Arial, sans-serif">
        <tspan x="150%" y="60%" font-size="16">Human intervention at every stage</tspan>
        <tspan x="150%" y="70%" font-size="16">Faster, more reliable, and reduces risk of human error</tspan>
      </text>
    </g>
  </section>
  
  <!-- Automated Deployment Philosophies Section -->
  <section data-narration="Automated Deployment Philosophies">
    <g transform="translate(20, 140)">
      <!-- Dark Launch Section -->
      <rect width="300" height="120" rx="5" fill="#F7F7F7" />
      <g transform="translate(5%, 10%)">
        <rect width="100" height="20" rx="5" fill="#FFC107" />
        <text x="50%" y="50%" font-size="16" font-family="Arial, sans-serif">
          <tspan x="50%" y="50%" font-size="16">Dark Launch</tspan>
          <tspan x="50%" y="60%" font-size="16">Deploy in production without testing or validation</tspan>
        </text>
        <line x1="0%" y1="50%" x2="100%" y2="50%" stroke="#FFC107" stroke-width="2" />
        <animateTransform attributeName="transform" type="translate" begin="0s" duration="2s" from="0 50%" to="0 80%" />
      </g>
      
      <!-- Blue-Green Deployment Section -->
      <g transform="translate(110%, 10%)">
        <rect width="100" height="20" rx="5" fill="#C7B8EA" />
        <text x="50%" y="50%" font-size="16" font-family="Arial, sans-serif">
          <tspan x="50%" y="50%" font-size="16">Blue-Green Deployment</tspan>
          <tspan x="50%" y="60%" font-size="16">Deploy two identical versions of the application</tspan>
        </text>
        <line x1="0%" y1="50%" x2="100%" y2="50%" stroke="#C7B8EA" stroke-width="2" />
        <animateTransform attributeName="transform" type="translate" begin="2s" duration="2s" from="0 80%" to="0 100%" />
      </g>
      
      <!-- Canary Release Section -->
      <g transform="translate(220%, 10%)">
        <rect width="100" height="20" rx="5" fill="#8BC34A" />
        <text x="50%" y="50%" font-size="16" font-family="Arial, sans-serif">
          <tspan x="50%" y="50%" font-size="16">Canary Release</tspan>
          <tspan x="50%" y="60%" font-size="16">Deploy a small percentage of users to test the application</tspan>
        </text>
        <line x1="0%" y1="50%" x2="100%" y2="50%" stroke="#8BC34A" stroke-width="2" />
        <animateTransform attributeName="transform" type="translate" begin="4s" duration="2s" from="0 100%" to="0 120%" />
      </g>
      
      <!-- A/B Testing Section -->
      <g transform="translate(320%, 10%)">
        <rect width="100" height="20" rx="5" fill="#9C27B0" />
        <text x="50%" y="50%" font-size="16" font-family="Arial, sans-serif">
          <tspan x="50%" y="50%" font-size="16">A/B Testing</tspan>
          <tspan x="50%" y="60%" font-size="16">Compare the performance of two versions of the application</tspan>
        </text>
        <line x1="0%" y1="50%" x2="100%" y2="50%" stroke="#9C27B0" stroke-width="2" />
        <animateTransform attributeName="transform" type="translate" begin="6s" duration="2s" from="0 120%" to="0 140%" />
      </g>
    </g>
  </section>
  
  <!-- Footer Section -->
  <footer>
    <g transform="translate(20, 340)">
      <rect width="100%" height="20" rx="5" fill="#F7F7F7" />
      <text x="50%" y="50%" font-size="16" font-family="Arial, sans-serif">
        By [Your Name]
      </text>
    </g>
  </footer>
</svg>