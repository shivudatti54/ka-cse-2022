<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="calibration">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3949AB"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- GROUP 1: Title -->
  <g opacity="0" data-narration="Calibration in IT Capacity Planning. Let us understand how we tune models to match real system behavior.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB">Calibration</text>
    <text x="210" y="48" text-anchor="middle" font-family="Arial" font-size="11" fill="#00695C">in IT Capacity Planning</text>
    <line x1="130" y1="54" x2="290" y2="54" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="130" cy="54" r="3" fill="#E65100"/>
    <circle cx="290" cy="54" r="3" fill="#E65100"/>
  </g>

  <!-- GROUP 2: What is Calibration -->
  <g opacity="0" data-narration="Calibration means adjusting model parameters so the model output closely matches real system output, reducing the error gap between them.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="74" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">What is Calibration?</text>

    <!-- Model Output bar -->
    <rect x="40" y="84" width="140" height="28" rx="4" fill="#3949AB" opacity="0.85"/>
    <text x="110" y="102" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Model Output</text>

    <!-- Real System Output bar -->
    <rect x="240" y="84" width="140" height="28" rx="4" fill="#00695C" opacity="0.85"/>
    <text x="310" y="102" text-anchor="middle" font-family="monospace" font-size="9" fill="white">Real System Output</text>

    <!-- Gap indicator -->
    <line x1="185" y1="98" x2="235" y2="98" stroke="#C62828" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="210" y="93" text-anchor="middle" font-family="Arial" font-size="8" fill="#C62828" font-weight="bold">GAP</text>

    <!-- Calibration arrow reducing gap -->
    <line x1="170" y1="120" x2="250" y2="120" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="210" y="134" text-anchor="middle" font-family="Arial" font-size="8" fill="#E65100" font-weight="bold">Calibration reduces this gap</text>
  </g>

  <!-- GROUP 3: Calibration Process Flow -->
  <g opacity="0" data-narration="The calibration process involves five steps: Measure real system, Build model, Compare outputs, Adjust parameters if error is too high, and Validate the model once error is acceptable.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="158" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Calibration Process Flow</text>

    <!-- Step 1: Measure -->
    <rect x="12" y="166" width="70" height="30" rx="5" fill="#3949AB"/>
    <text x="47" y="179" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Measure</text>
    <text x="47" y="189" text-anchor="middle" font-family="Arial" font-size="7" fill="#C5CAE9">Real System</text>

    <!-- Arrow 1-2 -->
    <line x1="84" y1="181" x2="96" y2="181" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Step 2: Build Model -->
    <rect x="98" y="166" width="70" height="30" rx="5" fill="#00695C"/>
    <text x="133" y="179" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Build/Update</text>
    <text x="133" y="189" text-anchor="middle" font-family="Arial" font-size="7" fill="#B2DFDB">Model</text>

    <!-- Arrow 2-3 -->
    <line x1="170" y1="181" x2="182" y2="181" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Step 3: Compare -->
    <rect x="184" y="166" width="70" height="30" rx="5" fill="#E65100"/>
    <text x="219" y="179" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Compare</text>
    <text x="219" y="189" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFE0B2">Outputs</text>

    <!-- Arrow 3-4 -->
    <line x1="256" y1="181" x2="268" y2="181" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Step 4: Adjust -->
    <rect x="270" y="166" width="70" height="30" rx="5" fill="#C62828"/>
    <text x="305" y="179" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Adjust</text>
    <text x="305" y="189" text-anchor="middle" font-family="Arial" font-size="7" fill="#FFCDD2">Parameters</text>

    <!-- Feedback loop arrow from Adjust back to Build -->
    <path d="M 305,197 L 305,208 L 133,208 L 133,197" fill="none" stroke="#C62828" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
    <text x="220" y="217" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#C62828">Error too high - iterate</text>

    <!-- Arrow 3-5 -->
    <line x1="342" y1="181" x2="354" y2="181" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

    <!-- Step 5: Validate -->
    <rect x="356" y="166" width="54" height="30" rx="5" fill="#00695C"/>
    <text x="383" y="183" text-anchor="middle" font-family="Arial" font-size="7.5" fill="white">Validate</text>

    <!-- Label for forward path -->
    <text x="370" y="163" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695C">Error OK</text>
  </g>

  <!-- GROUP 4: Key Metrics - Target vs Actual bars -->
  <g opacity="0" data-narration="Key metrics to calibrate include response time, throughput, utilization, and queue length. The target values from the real system are compared against actual model predictions.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="240" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Key Metrics to Calibrate</text>

    <!-- Legend -->
    <rect x="290" y="244" width="10" height="8" rx="1" fill="#3949AB"/>
    <text x="303" y="251" font-family="Arial" font-size="7" fill="#3949AB">Target</text>
    <rect x="340" y="244" width="10" height="8" rx="1" fill="#E65100"/>
    <text x="353" y="251" font-family="Arial" font-size="7" fill="#E65100">Actual</text>

    <!-- Response Time -->
    <text x="30" y="266" font-family="monospace" font-size="8" fill="#3949AB">Response Time</text>
    <rect x="120" y="258" width="80" height="10" rx="2" fill="#3949AB" opacity="0.8"/>
    <rect x="120" y="270" width="70" height="10" rx="2" fill="#E65100" opacity="0.8"/>

    <!-- Throughput -->
    <text x="30" y="296" font-family="monospace" font-size="8" fill="#3949AB">Throughput</text>
    <rect x="120" y="288" width="95" height="10" rx="2" fill="#3949AB" opacity="0.8"/>
    <rect x="120" y="300" width="88" height="10" rx="2" fill="#E65100" opacity="0.8"/>

    <!-- Utilization -->
    <text x="230" y="266" font-family="monospace" font-size="8" fill="#3949AB">Utilization</text>
    <rect x="310" y="258" width="60" height="10" rx="2" fill="#3949AB" opacity="0.8"/>
    <rect x="310" y="270" width="55" height="10" rx="2" fill="#E65100" opacity="0.8"/>

    <!-- Queue Length -->
    <text x="230" y="296" font-family="monospace" font-size="8" fill="#3949AB">Queue Length</text>
    <rect x="310" y="288" width="75" height="10" rx="2" fill="#3949AB" opacity="0.8"/>
    <rect x="310" y="300" width="68" height="10" rx="2" fill="#E65100" opacity="0.8"/>
  </g>

  <!-- GROUP 5: Techniques -->
  <g opacity="0" data-narration="Common calibration techniques are parameter tuning, which adjusts individual model inputs; sensitivity analysis, which identifies which parameters have the most impact; and regression fitting, which uses statistical methods to find optimal parameter values.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="326" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Calibration Techniques</text>

    <!-- Parameter Tuning -->
    <rect x="18" y="334" width="120" height="26" rx="5" fill="#3949AB" opacity="0.9"/>
    <text x="78" y="350" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Parameter Tuning</text>
    <circle cx="32" cy="347" r="6" fill="none" stroke="white" stroke-width="1.2"/>
    <line x1="32" y1="341" x2="32" y2="344" stroke="white" stroke-width="1.2"/>

    <!-- Sensitivity Analysis -->
    <rect x="150" y="334" width="120" height="26" rx="5" fill="#00695C" opacity="0.9"/>
    <text x="210" y="350" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Sensitivity Analysis</text>
    <path d="M 164,347 Q 170,340 176,347 Q 182,354 188,347" fill="none" stroke="white" stroke-width="1.2"/>

    <!-- Regression Fitting -->
    <rect x="282" y="334" width="120" height="26" rx="5" fill="#E65100" opacity="0.9"/>
    <text x="342" y="350" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">Regression Fitting</text>
    <circle cx="296" cy="349" r="1.5" fill="white"/>
    <circle cx="301" cy="345" r="1.5" fill="white"/>
    <circle cx="306" cy="342" r="1.5" fill="white"/>
    <line x1="294" y1="351" x2="308" y2="340" stroke="white" stroke-width="1"/>
  </g>

  <!-- GROUP 6: Validation Criteria -->
  <g opacity="0" data-narration="A calibrated model is validated by ensuring the prediction error is less than ten percent, the model is consistent across different workloads, and it has good predictive accuracy for future loads.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="376" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Validation Criteria</text>

    <!-- Criterion 1 -->
    <circle cx="52" cy="392" r="5" fill="#00695C"/>
    <text x="52" y="394" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">1</text>
    <text x="62" y="394" font-family="monospace" font-size="7.5" fill="#00695C">Error &lt; 10%</text>

    <!-- Criterion 2 -->
    <circle cx="170" cy="392" r="5" fill="#00695C"/>
    <text x="170" y="394" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">2</text>
    <text x="180" y="394" font-family="monospace" font-size="7.5" fill="#00695C">Consistent across workloads</text>

    <!-- Criterion 3 -->
    <circle cx="345" cy="392" r="5" fill="#00695C"/>
    <text x="345" y="394" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">3</text>
    <text x="355" y="394" font-family="monospace" font-size="7.5" fill="#00695C">Predictive accuracy</text>
  </g>
</svg>
