<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="automated-configuration">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title -->
  <g opacity="0" data-narration="Automated Configuration streamlines IT infrastructure setup by replacing manual processes with repeatable, programmatic workflows.">
    <text x="210" y="32" font-family="Arial" font-size="18" font-weight="bold" fill="#3949AB" text-anchor="middle">Automated Configuration</text>
    <line x1="100" y1="38" x2="320" y2="38" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="140" y1="43" x2="280" y2="43" stroke="#00695C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 2: Configuration Management Cycle -->
  <g opacity="0" data-narration="The configuration management cycle has four stages: Define Configuration, Automate Deployment, Monitor State, and Update or Remediate. These repeat continuously.">
    <!-- Cycle label -->
    <text x="210" y="62" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB" text-anchor="middle">Configuration Management Cycle</text>

    <!-- Define Config (top) -->
    <rect x="155" y="70" width="110" height="22" rx="4" fill="#3949AB"/>
    <text x="210" y="85" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Define Config</text>

    <!-- Automate Deployment (right) -->
    <rect x="290" y="100" width="110" height="22" rx="4" fill="#00695C"/>
    <text x="345" y="115" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Automate Deploy</text>

    <!-- Monitor State (bottom) -->
    <rect x="155" y="130" width="110" height="22" rx="4" fill="#E65100"/>
    <text x="210" y="145" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Monitor State</text>

    <!-- Update/Remediate (left) -->
    <rect x="20" y="100" width="110" height="22" rx="4" fill="#C62828"/>
    <text x="75" y="115" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Update/Remediate</text>

    <!-- Arrows: top-right -->
    <path d="M268,81 Q290,81 290,105" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <!-- right-bottom -->
    <path d="M345,124 Q345,141 268,141" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <!-- bottom-left -->
    <path d="M152,141 Q130,141 130,118" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <!-- left-top -->
    <path d="M75,98 Q75,81 152,81" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <text x="210" y="164" font-family="Arial" font-size="8" fill="#3949AB" text-anchor="middle" font-style="italic">Continuous Cycle</text>

    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 3: Tools/Technologies -->
  <g opacity="0" data-narration="Key tools for automated configuration include Ansible for agentless automation, Puppet for declarative config, Chef for infrastructure as code recipes, and Terraform for cloud provisioning.">
    <text x="210" y="184" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB" text-anchor="middle">Tools &amp; Technologies</text>

    <!-- Ansible -->
    <rect x="15" y="192" width="90" height="40" rx="5" fill="#3949AB" opacity="0.9"/>
    <text x="60" y="207" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Ansible</text>
    <text x="60" y="224" font-family="Arial" font-size="7" fill="#C5CAE9" text-anchor="middle">Agentless YAML</text>

    <!-- Puppet -->
    <rect x="115" y="192" width="90" height="40" rx="5" fill="#00695C" opacity="0.9"/>
    <text x="160" y="207" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Puppet</text>
    <text x="160" y="224" font-family="Arial" font-size="7" fill="#B2DFDB" text-anchor="middle">Declarative DSL</text>

    <!-- Chef -->
    <rect x="215" y="192" width="90" height="40" rx="5" fill="#E65100" opacity="0.9"/>
    <text x="260" y="207" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Chef</text>
    <text x="260" y="224" font-family="Arial" font-size="7" fill="#FFE0B2" text-anchor="middle">Ruby Recipes</text>

    <!-- Terraform -->
    <rect x="315" y="192" width="90" height="40" rx="5" fill="#C62828" opacity="0.9"/>
    <text x="360" y="207" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Terraform</text>
    <text x="360" y="224" font-family="Arial" font-size="7" fill="#FFCDD2" text-anchor="middle">Provisioning HCL</text>

    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 4: Benefits -->
  <g opacity="0" data-narration="Benefits of automated configuration include consistency across environments, faster deployment speed, reduced human errors, easy scalability, and a complete audit trail.">
    <text x="210" y="252" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB" text-anchor="middle">Benefits</text>

    <text x="30" y="270" font-family="Arial" font-size="13" fill="#00695C">&#x2713;</text>
    <text x="46" y="270" font-family="Arial" font-size="9" fill="#333">Consistency</text>

    <text x="125" y="270" font-family="Arial" font-size="13" fill="#00695C">&#x2713;</text>
    <text x="141" y="270" font-family="Arial" font-size="9" fill="#333">Speed</text>

    <text x="195" y="270" font-family="Arial" font-size="13" fill="#00695C">&#x2713;</text>
    <text x="211" y="270" font-family="Arial" font-size="9" fill="#333">Reduced Errors</text>

    <text x="310" y="270" font-family="Arial" font-size="13" fill="#00695C">&#x2713;</text>
    <text x="326" y="270" font-family="Arial" font-size="9" fill="#333">Scalability</text>

    <text x="140" y="287" font-family="Arial" font-size="13" fill="#00695C">&#x2713;</text>
    <text x="156" y="287" font-family="Arial" font-size="9" fill="#333">Audit Trail</text>

    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 5: Infrastructure as Code -->
  <g opacity="0" data-narration="Infrastructure as Code means defining server configurations in YAML or JSON files, passing them through an automation engine, which then provisions and configures multiple servers identically.">
    <text x="210" y="308" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB" text-anchor="middle">Infrastructure as Code</text>

    <!-- Config file -->
    <rect x="20" y="316" width="80" height="50" rx="4" fill="#fff" stroke="#3949AB" stroke-width="1.5"/>
    <text x="60" y="330" font-family="monospace" font-size="7" fill="#3949AB" text-anchor="middle">config.yml</text>
    <text x="60" y="342" font-family="monospace" font-size="6" fill="#666" text-anchor="middle">server: web</text>
    <text x="60" y="352" font-family="monospace" font-size="6" fill="#666" text-anchor="middle">port: 8080</text>
    <text x="60" y="362" font-family="monospace" font-size="6" fill="#666" text-anchor="middle">replicas: 3</text>

    <!-- Arrow 1 -->
    <line x1="105" y1="341" x2="140" y2="341" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Automation Engine -->
    <rect x="145" y="322" width="100" height="38" rx="6" fill="#E65100"/>
    <text x="195" y="340" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">Automation</text>
    <text x="195" y="353" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">Engine</text>

    <!-- Arrow 2 -->
    <line x1="250" y1="341" x2="280" y2="341" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Server icons -->
    <rect x="285" y="318" width="35" height="26" rx="3" fill="#00695C"/>
    <text x="302" y="335" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle">Srv 1</text>

    <rect x="325" y="318" width="35" height="26" rx="3" fill="#00695C"/>
    <text x="342" y="335" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle">Srv 2</text>

    <rect x="365" y="318" width="35" height="26" rx="3" fill="#00695C"/>
    <text x="382" y="335" font-family="Arial" font-size="7" fill="#fff" text-anchor="middle">Srv 3</text>

    <rect x="305" y="350" width="75" height="16" rx="3" fill="none" stroke="#00695C" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="342" y="362" font-family="Arial" font-size="7" fill="#00695C" text-anchor="middle">Identical Config</text>

    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Group 6: Best Practices -->
  <g opacity="0" data-narration="Best practices for automated configuration: version control all configs, test before deploying, ensure idempotent operations so re-runs are safe, and maintain thorough documentation.">
    <text x="210" y="382" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB" text-anchor="middle">Best Practices</text>

    <rect x="15" y="388" width="93" height="16" rx="3" fill="#3949AB" opacity="0.15"/>
    <text x="61" y="399" font-family="Arial" font-size="7.5" fill="#3949AB" text-anchor="middle" font-weight="bold">Version Control</text>

    <rect x="115" y="388" width="93" height="16" rx="3" fill="#00695C" opacity="0.15"/>
    <text x="161" y="399" font-family="Arial" font-size="7.5" fill="#00695C" text-anchor="middle" font-weight="bold">Test First</text>

    <rect x="215" y="388" width="93" height="16" rx="3" fill="#E65100" opacity="0.15"/>
    <text x="261" y="399" font-family="Arial" font-size="7.5" fill="#E65100" text-anchor="middle" font-weight="bold">Idempotent Ops</text>

    <rect x="315" y="388" width="93" height="16" rx="3" fill="#C62828" opacity="0.15"/>
    <text x="361" y="399" font-family="Arial" font-size="7.5" fill="#C62828" text-anchor="middle" font-weight="bold">Documentation</text>

    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
