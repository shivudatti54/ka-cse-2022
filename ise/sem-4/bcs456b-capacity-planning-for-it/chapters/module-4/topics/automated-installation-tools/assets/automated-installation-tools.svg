<svg width="420" height="400" data-topic-id="automated-installation-tools">
  <!-- Title and background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#73A5FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#1A9DFF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%" rx="10" />
  
  <!-- Header and title -->
  <g transform="translate(10, 10)">
    <rect width="400" height="30" fill="#fff" rx="5" />
    <text font-size="24" font-family="Arial" font-weight="bold" fill="#1A9DFF" text-anchor="left">
      Automated Installation Tools
    </text>
  </g>
  
  <!-- Section 1: Definition and Benefits -->
  <g transform="translate(10, 50)">
    <rect width="400" height="150" fill="#fff" rx="5" />
    <text data-narration="Definition and Benefits" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Automated installation tools are software applications that automate the installation process, reducing the need for manual intervention.
    </text>
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 120)" />
    <text data-narration="Benefits" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Reduce installation time and effort, minimize human error, increase efficiency, simplify the installation process, and reduce costs.
    </text>
  </g>
  
  <!-- Section 2: Types of Automated Installation Tools -->
  <g transform="translate(10, 250)">
    <rect width="400" height="150" fill="#fff" rx="5" />
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 220)" />
    <text data-narration="Scripting Tools" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Scripting tools use programming languages to automate installation tasks. Examples include PowerShell (Windows), Bash (Linux), and Python (cross-platform).
    </text>
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 240)" />
    <text data-narration="Configuration Management Tools" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Configuration management tools automate the configuration of systems and applications. Examples include Ansible (cross-platform), Puppet (cross-platform), and Chef (cross-platform).
    </text>
  </g>
  
  <!-- Section 3: Deployment Tools -->
  <g transform="translate(10, 380)">
    <rect width="400" height="150" fill="#fff" rx="5" />
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 350)" />
    <text data-narration="Deployment Tools" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Deployment tools automate the deployment of applications and systems. Examples include Docker (cross-platform), Kubernetes (cross-platform), and SaltStack (cross-platform).
    </text>
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 340)" />
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 330)" />
    <text data-narration="Specialized Installation Tools" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Specialized installation tools are designed for specific installation tasks. Examples include SCCM (System Center Configuration Manager) (Windows), MDT (Microsoft Deployment Toolkit) (Windows), and Jamf (macOS).
    </text>
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g transform="translate(10, 500)">
    <rect width="400" height="150" fill="#fff" rx="5" />
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 470)" />
    <text data-narration="Template-based installation" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Template-based installation uses pre-defined templates to automate installation tasks.
    </text>
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 460)" />
    <text data-narration="Script-based installation" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Script-based installation uses scripting languages to automate installation tasks.
    </text>
    <rect width="100" height="20" fill="#1A9DFF" rx="5" transform="translate(10, 450)" />
    <text data-narration="Automated patch management" font-size="18" font-family="Arial" fill="#444" text-anchor="left">
      Automated patch management automates the application of patches and updates to systems and applications.
    </text>
  </g>
  
  <!-- Footer and animations -->
  <g transform="translate(10, 650)">
    <rect width="400" height="30" fill="#fff" rx="5" />
    <text font-size="18" font-family="Arial" fill="#1A9DFF" text-anchor="left">
      Created with love for educational purposes.
    </text>
  </g>
  <animate transform="translate(10, 760)" begin="0s" dur="10s" repeatCount="indefinite">
    <rect fill="#fff" width="100%" height="30" rx="5" />
  </animate>
</svg>