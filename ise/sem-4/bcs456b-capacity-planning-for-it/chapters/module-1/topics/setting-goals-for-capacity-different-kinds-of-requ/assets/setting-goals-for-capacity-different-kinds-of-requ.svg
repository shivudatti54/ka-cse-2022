<svg width="420" height="400" data-topic-id="setting-goals-for-capacity-different-kinds-of-requirements-and-measurements">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a288a" stop-opacity="1" />
      <stop offset="100%" stop-color="#44a0e6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" style="fill: url(#grad)" />
  <g transform="translate(20, 20)">
    <rect width="200" height="100" rx="10" fill="#fff" opacity="0.8" />
    <rect x="10" y="10" width="180" height="80" rx="10" fill="#fff" opacity="0.8" />
    <text x="10" y="40" font-size="24" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Capacity Planning</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.5 1.5" begin="0.5s" dur="2s" repeatCount="indefinite" />
    <g data-narration="What are Requirements?">
      <rect width="80" height="40" rx="10" fill="#fff" opacity="0.8" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Functional Requirements</text>
      <text x="10" y="45" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Non-Functional Requirements</text>
      <text x="10" y="65" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Performance Requirements</text>
    </g>
    <g data-narration="Types of Requirements">
      <rect width="80" height="40" rx="10" fill="#fff" opacity="0.8" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Service Level Agreement (SLA) Requirements</text>
      <text x="10" y="45" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Business Requirements</text>
      <text x="10" y="65" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Technical Requirements</text>
    </g>
    <g data-narration="Types of Measurements">
      <rect width="80" height="40" rx="10" fill="#fff" opacity="0.8" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Throughput</text>
      <text x="10" y="45" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Response Time</text>
      <text x="10" y="65" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Throughput and Response Time</text>
    </g>
    <g data-narration="Conclusion">
      <rect width="80" height="40" rx="10" fill="#fff" opacity="0.8" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Capacity Planning</text>
      <text x="10" y="45" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Capacity Planning is critical for IT planning</text>
      <text x="10" y="65" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">for organizations to achieve their goals</text>
    </g>
    <g data-narration="Arrow Connections">
      <line x1="10" y1="10" x2="10" y2="50" stroke="#ccc" stroke-width="2" />
      <text x="10" y="20" font-size="12" font-family="Arial, sans-serif" fill="#333">Functional Requirements</text>
      <line x1="10" y1="50" x2="10" y2="90" stroke="#ccc" stroke-width="2" />
      <text x="10" y="60" font-size="12" font-family="Arial, sans-serif" fill="#333">Non-Functional Requirements</text>
      <line x1="10" y1="90" x2="10" y2="130" stroke="#ccc" stroke-width="2" />
      <text x="10" y="100" font-size="12" font-family="Arial, sans-serif" fill="#333">Performance Requirements</text>
    </g>
  </g>
  <g transform="translate(0, 200)">
    <rect width="200" height="100" rx="10" fill="#fff" opacity="0.8" />
    <rect x="10" y="10" width="180" height="80" rx="10" fill="#fff" opacity="0.8" />
    <text x="10" y="40" font-size="24" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Capacity Planning</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 20" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.5 1.5" begin="0.5s" dur="2s" repeatCount="indefinite" />
    <g data-narration="Goal Setting">
      <rect width="80" height="40" rx="10" fill="#fff" opacity="0.8" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Set SMART goals</text>
      <text x="10" y="45" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Define measurable objectives</text>
      <text x="10" y="65" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Establish a timeline</text>
    </g>
    <g data-narration="Capacity Planning">
      <rect width="80" height="40" rx="10" fill="#fff" opacity="0.8" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Assess current capacity</text>
      <text x="10" y="45" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Identify areas for improvement</text>
      <text x="10" y="65" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Develop a plan</text>
    </g>
  </g>
  <footer>
    <text x="10" y="350" font-size="18" font-family="Arial, sans-serif" fill="#333" opacity="0.8">Capacity Planning</text>
  </footer>
</svg>