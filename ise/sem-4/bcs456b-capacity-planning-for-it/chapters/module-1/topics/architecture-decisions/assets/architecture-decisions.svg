<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="architecture-decisions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#3949AB"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4511E"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Group 1: Title (0.3s) -->
  <g opacity="0" data-narration="Architecture Decisions in IT Capacity Planning. Understanding how to choose the right architecture for performance and scalability.">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#3949AB">Architecture Decisions</text>
    <text x="210" y="44" text-anchor="middle" font-family="Arial" font-size="10" fill="#5C6BC0">in IT Capacity Planning</text>
    <line x1="120" y1="50" x2="300" y2="50" stroke="#3949AB" stroke-width="2" stroke-linecap="round"/>
    <circle cx="120" cy="50" r="2.5" fill="#E65100"/>
    <circle cx="210" cy="50" r="2.5" fill="#3949AB"/>
    <circle cx="300" cy="50" r="2.5" fill="#E65100"/>
  </g>

  <!-- Group 2: Architecture Patterns (1.5s) -->
  <g opacity="0" data-narration="Three key architecture patterns: Monolithic is a single deployable unit, simple but hard to scale. Microservices splits into independent services for flexible scaling. Serverless uses on-demand cloud functions for automatic scaling.">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="72" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Architecture Patterns</text>

    <!-- Monolithic -->
    <g>
      <rect x="18" y="80" width="120" height="72" fill="white" rx="6" stroke="#3949AB" stroke-width="1.5" opacity="0.9"/>
      <text x="78" y="95" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3949AB">Monolithic</text>
      <!-- Single block icon -->
      <rect x="48" y="100" width="60" height="30" fill="url(#indigoGrad)" rx="4" opacity="0.8"/>
      <text x="78" y="117" text-anchor="middle" font-family="monospace" font-size="7" fill="white">All-in-One</text>
      <text x="78" y="143" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Simple, tightly coupled</text>
    </g>

    <!-- Microservices -->
    <g>
      <rect x="150" y="80" width="120" height="72" fill="white" rx="6" stroke="#00695C" stroke-width="1.5" opacity="0.9"/>
      <text x="210" y="95" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Microservices</text>
      <!-- Multiple small blocks icon -->
      <rect x="165" y="100" width="26" height="13" fill="url(#tealGrad)" rx="2" opacity="0.8"/>
      <rect x="195" y="100" width="26" height="13" fill="url(#tealGrad)" rx="2" opacity="0.8"/>
      <rect x="225" y="100" width="26" height="13" fill="url(#tealGrad)" rx="2" opacity="0.8"/>
      <rect x="165" y="117" width="26" height="13" fill="url(#tealGrad)" rx="2" opacity="0.6"/>
      <rect x="195" y="117" width="26" height="13" fill="url(#tealGrad)" rx="2" opacity="0.6"/>
      <rect x="225" y="117" width="26" height="13" fill="url(#tealGrad)" rx="2" opacity="0.6"/>
      <text x="210" y="143" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Independent services</text>
    </g>

    <!-- Serverless -->
    <g>
      <rect x="282" y="80" width="120" height="72" fill="white" rx="6" stroke="#E65100" stroke-width="1.5" opacity="0.9"/>
      <text x="342" y="95" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Serverless</text>
      <!-- Cloud/function icons -->
      <ellipse cx="322" cy="112" rx="14" ry="9" fill="url(#orangeGrad)" opacity="0.7"/>
      <ellipse cx="342" cy="108" rx="18" ry="12" fill="url(#orangeGrad)" opacity="0.8"/>
      <ellipse cx="362" cy="112" rx="14" ry="9" fill="url(#orangeGrad)" opacity="0.7"/>
      <text x="342" y="113" text-anchor="middle" font-family="monospace" font-size="8" fill="white">fn()</text>
      <text x="342" y="143" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">On-demand, auto-scale</text>
    </g>
  </g>

  <!-- Group 3: Decision Factors - Weighted Comparison (3.0s) -->
  <g opacity="0" data-narration="Key decision factors include Performance, Scalability, Cost, Reliability, and Maintainability. Each factor carries different weight depending on business needs. A weighted comparison helps evaluate architecture choices objectively.">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="170" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Decision Factors</text>

    <!-- Factor bars - weighted comparison -->
    <text x="30" y="187" font-family="Arial" font-size="8" fill="#333">Performance</text>
    <rect x="110" y="179" width="90" height="10" fill="#3949AB" rx="3" opacity="0.85"/>
    <text x="205" y="187" font-family="monospace" font-size="7" fill="#3949AB">90%</text>

    <text x="30" y="201" font-family="Arial" font-size="8" fill="#333">Scalability</text>
    <rect x="110" y="193" width="85" height="10" fill="#00695C" rx="3" opacity="0.85"/>
    <text x="200" y="201" font-family="monospace" font-size="7" fill="#00695C">85%</text>

    <text x="30" y="215" font-family="Arial" font-size="8" fill="#333">Cost</text>
    <rect x="110" y="207" width="70" height="10" fill="#E65100" rx="3" opacity="0.85"/>
    <text x="185" y="215" font-family="monospace" font-size="7" fill="#E65100">70%</text>

    <text x="30" y="229" font-family="Arial" font-size="8" fill="#333">Reliability</text>
    <rect x="110" y="221" width="80" height="10" fill="#C62828" rx="3" opacity="0.85"/>
    <text x="195" y="229" font-family="monospace" font-size="7" fill="#C62828">80%</text>

    <text x="30" y="243" font-family="Arial" font-size="8" fill="#333">Maintainability</text>
    <rect x="110" y="235" width="75" height="10" fill="#5C6BC0" rx="3" opacity="0.85"/>
    <text x="190" y="243" font-family="monospace" font-size="7" fill="#5C6BC0">75%</text>

    <!-- Pentagon/radar hint -->
    <polygon points="345,195 370,210 363,235 327,235 320,210" fill="none" stroke="#3949AB" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <polygon points="345,200 365,212 359,230 331,230 325,212" fill="#3949AB" opacity="0.12"/>
    <text x="345" y="188" text-anchor="middle" font-family="Arial" font-size="6" fill="#555">Perf</text>
    <text x="376" y="213" font-family="Arial" font-size="6" fill="#555">Scale</text>
    <text x="368" y="243" font-family="Arial" font-size="6" fill="#555">Cost</text>
    <text x="318" y="243" font-family="Arial" font-size="6" fill="#555">Rely</text>
    <text x="312" y="213" font-family="Arial" font-size="6" fill="#555">Maint</text>
  </g>

  <!-- Group 4: Scaling Strategies (4.5s) -->
  <g opacity="0" data-narration="Two main scaling strategies. Vertical scaling means upgrading to a bigger, more powerful server. Horizontal scaling means adding more servers and distributing load across them. Horizontal scaling offers better fault tolerance.">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="263" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Scaling Strategies</text>

    <!-- Vertical Scaling -->
    <g>
      <rect x="25" y="270" width="170" height="50" fill="white" rx="6" stroke="#E65100" stroke-width="1.2" opacity="0.9"/>
      <text x="110" y="283" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#E65100">Vertical (Scale Up)</text>
      <!-- Small server -> big server -->
      <rect x="50" y="289" width="18" height="24" fill="#E65100" rx="3" opacity="0.5"/>
      <text x="59" y="304" text-anchor="middle" font-family="monospace" font-size="6" fill="white">S</text>
      <text x="78" y="304" font-family="Arial" font-size="12" fill="#E65100">&#x2192;</text>
      <rect x="90" y="285" width="28" height="32" fill="#E65100" rx="3" opacity="0.85"/>
      <text x="104" y="305" text-anchor="middle" font-family="monospace" font-size="8" fill="white">XL</text>
      <text x="140" y="300" font-family="Arial" font-size="7" fill="#555">Bigger</text>
      <text x="140" y="310" font-family="Arial" font-size="7" fill="#555">server</text>
    </g>

    <!-- Horizontal Scaling -->
    <g>
      <rect x="215" y="270" width="185" height="50" fill="white" rx="6" stroke="#00695C" stroke-width="1.2" opacity="0.9"/>
      <text x="307" y="283" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00695C">Horizontal (Scale Out)</text>
      <!-- Multiple servers -->
      <rect x="235" y="290" width="18" height="22" fill="#00695C" rx="3" opacity="0.85"/>
      <text x="244" y="304" text-anchor="middle" font-family="monospace" font-size="6" fill="white">S</text>
      <rect x="258" y="290" width="18" height="22" fill="#00695C" rx="3" opacity="0.85"/>
      <text x="267" y="304" text-anchor="middle" font-family="monospace" font-size="6" fill="white">S</text>
      <rect x="281" y="290" width="18" height="22" fill="#00695C" rx="3" opacity="0.85"/>
      <text x="290" y="304" text-anchor="middle" font-family="monospace" font-size="6" fill="white">S</text>
      <rect x="304" y="290" width="18" height="22" fill="#00695C" rx="3" opacity="0.7"/>
      <text x="313" y="304" text-anchor="middle" font-family="monospace" font-size="6" fill="white">S</text>
      <text x="342" y="300" font-family="Arial" font-size="7" fill="#555">More</text>
      <text x="342" y="310" font-family="Arial" font-size="7" fill="#555">servers</text>
    </g>
  </g>

  <!-- Group 5: Capacity Considerations (6.0s) -->
  <g opacity="0" data-narration="Important capacity considerations include peak load planning to handle traffic spikes, redundancy for failover, load balancing to distribute requests evenly, and caching layers to reduce backend load.">
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
    <text x="210" y="337" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3949AB">Capacity Considerations</text>

    <!-- Four consideration boxes -->
    <rect x="15" y="343" width="92" height="22" fill="#3949AB" rx="4" opacity="0.85"/>
    <text x="61" y="357" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Peak Load Plan</text>

    <rect x="115" y="343" width="92" height="22" fill="#00695C" rx="4" opacity="0.85"/>
    <text x="161" y="357" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Redundancy</text>

    <rect x="215" y="343" width="92" height="22" fill="#E65100" rx="4" opacity="0.85"/>
    <text x="261" y="357" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Load Balancing</text>

    <rect x="315" y="343" width="92" height="22" fill="#C62828" rx="4" opacity="0.85"/>
    <text x="361" y="357" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Caching Layers</text>
  </g>

  <!-- Group 6: Decision Framework (7.5s) -->
  <g opacity="0" data-narration="The decision framework follows a cycle: Assess requirements, evaluate architecture options, prototype the top candidates, benchmark their performance, and select the best architecture. Then monitor and iterate.">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="210" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3949AB">Decision Framework</text>

    <!-- Flow: Assess -> Evaluate -> Prototype -> Benchmark -> Select -->
    <rect x="8" y="383" width="62" height="14" fill="#3949AB" rx="3"/>
    <text x="39" y="393" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white">Assess Reqs</text>

    <text x="75" y="393" font-family="Arial" font-size="9" fill="#3949AB">&#x2192;</text>

    <rect x="84" y="383" width="66" height="14" fill="#00695C" rx="3"/>
    <text x="117" y="393" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white">Evaluate Opts</text>

    <text x="156" y="393" font-family="Arial" font-size="9" fill="#00695C">&#x2192;</text>

    <rect x="164" y="383" width="56" height="14" fill="#E65100" rx="3"/>
    <text x="192" y="393" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white">Prototype</text>

    <text x="225" y="393" font-family="Arial" font-size="9" fill="#E65100">&#x2192;</text>

    <rect x="233" y="383" width="64" height="14" fill="#C62828" rx="3"/>
    <text x="265" y="393" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white">Benchmark</text>

    <text x="302" y="393" font-family="Arial" font-size="9" fill="#C62828">&#x2192;</text>

    <rect x="310" y="383" width="100" height="14" fill="#3949AB" rx="3"/>
    <text x="360" y="393" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white">Select Architecture</text>
  </g>
</svg>
