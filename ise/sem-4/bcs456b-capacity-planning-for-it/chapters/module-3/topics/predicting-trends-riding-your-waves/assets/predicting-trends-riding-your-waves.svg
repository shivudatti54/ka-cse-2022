    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" begin="0s" delay="0.5s" />
    <g transform="translate(110 85)">
      <text x="0" y="0" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Trends refer to patterns or cycles in data that can be predicted to occur in the future.</text>
      <text x="0" y="40" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">Some common trends in IT include cloud adoption, mobile usage, and API growth.</text>
    </g>
    <rect x="10" y="210" width="380" height="120" fill="#F7F7F7" rx="10" />
    <rect x="10" y="210" width="100" height="100" fill="#75D8F6" rx="10" style="opacity: 0.5" />
