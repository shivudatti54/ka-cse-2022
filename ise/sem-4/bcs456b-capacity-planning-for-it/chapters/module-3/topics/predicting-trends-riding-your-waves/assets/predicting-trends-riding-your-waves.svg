      <text x="0" y="40" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#2E4053">By understanding trends and planning ahead, businesses can ensure that they have sufficient capacity to handle growing demands.</text>
    </g>
  </section>
