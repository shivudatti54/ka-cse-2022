<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="game-playing-minimax-alpha-beta">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0f8;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7a9a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .node-max { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
    .node-min { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
    .node-leaf { fill: #27ae60; stroke: #1e8449; stroke-width: 2; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #2c3e50; }
    .value-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #fff; font-weight: bold; }
    .concept-box { fill: #fff; stroke: #bdc3c7; stroke-width: 1; rx: 5; }
    .section-1 { animation: fadeIn 0.5s ease-out forwards; }
    .section-2 { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: fadeIn 0.5s ease-out 0.6s forwards; opacity: 0; }
    .tree-anim { animation: drawLine 1s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .highlight { animation: pulse 1.5s ease-in-out 3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title Section -->
  <g class="section-1" data-narration="Introduction to Minimax Algorithm and Alpha-Beta Pruning in game playing AI">
    <text x="210" y="25" text-anchor="middle" class="title">Minimax &amp; Alpha-Beta Pruning</text>
    <line x1="60" y1="35" x2="360" y2="35" stroke="#3498db" stroke-width="2" />
  </g>
  
  <!-- Game Tree Diagram -->
  <g class="section-2" data-narration="Game tree showing MAX (circles) and MIN (squares) nodes with utility values at leaves" transform="translate(20, 50)">
    <!-- Connection Lines -->
    <g stroke="#5a7a9a" stroke-width="1.5" fill="none">
      <!-- Root to Level 1 -->
      <path d="M180,10 L120,50" class="tree-anim" />
      <path d="M180,10 L180,50" class="tree-anim" style="animation-delay: 0.2s"/>
      <path d="M180,10 L240,50" class="tree-anim" style="animation-delay: 0.4s"/>
      
      <!-- Level 1 to Level 2 -->
      <path d="M120,50 L80,90" class="tree-anim" style="animation-delay: 0.5s"/>
      <path d="M120,50 L120,90" class="tree-anim" style="animation-delay: 0.6s"/>
      <path d="M120,50 L160,90" class="tree-anim" style="animation-delay: 0.7s"/>
      
      <path d="M180,50 L180,90" class="tree-anim" style="animation-delay: 0.6s"/>
      <path d="M180,50 L220,90" class="tree-anim" style="animation-delay: 0.7s"/>
      
      <path d="M240,50 L200,90" class="tree-anim" style="animation-delay: 0.5s"/>
      <path d="M240,50 L240,90" class="tree-anim" style="animation-delay: 0.6s"/>
      <path d="M240,50 L280,90" class="tree-anim" style="animation-delay: 0.7s"/>
      
      <!-- Level 2 to Leaves -->
      <path d="M80,90 L60,130" class="tree-anim" style="animation-delay: 0.8s"/>
      <path d="M80,90 L80,130" class="tree-anim" style="animation-delay: 0.85s"/>
      <path d="M80,90 L100,130" class="tree-anim" style="animation-delay: 0.9s"/>
      
      <path d="M120,90 L100,130" class="tree-anim" style="animation-delay: 0.8s"/>
      <path d="M120,90 L120,130" class="tree-anim" style="animation-delay: 0.85s"/>
      <path d="M120,90 L140,130" class="tree-anim" style="animation-delay: 0.9s"/>
      
      <path d="M160,90 L140,130" class="tree-anim" style="animation-delay: 0.8s"/>
      <path d="M160,90 L160,130" class="tree-anim" style="animation-delay: 0.85s"/>
      <path d="M160,90 L180,130" class="tree-anim" style="animation-delay: 0.9s"/>
      
      <path d="M180,90 L180,130" class="tree-anim" style="animation-delay: 0.8s"/>
      <path d="M180,90 L200,130" class="tree-anim" style="animation-delay: 0.85s"/>
      <path d="M180,90 L220,130" class="tree-anim" style="animation-delay: 0.9s"/>
      
      <path d="M200,90 L200,130" class="tree-anim" style="animation-delay: 0.8s"/>
      <path d="M200,90 L220,130" class="tree-anim" style="animation-delay: 0.85s"/>
      <path d="M200,90 L240,130" class="tree-anim" style="animation-delay: 0.9s"/>
      
      <path d="M240,90 L240,130" class="tree-anim" style="animation-delay: 0.8s"/>
      <path d="M240,90 L260,130" class="tree-anim" style="animation-delay: 0.85s"/>
      <path d="M240,90 L280,130" class="tree-anim" style="animation-delay: 0.9s"/>
      
      <path d="M280,90 L260,130" class="tree-anim" style="animation-delay: 0.8s"/>
      <path d="M280,90 L280,130" class="tree-anim" style="animation-delay: 0.85s"/>
      <path d="M280,90 L300,130" class="tree-anim" style="animation-delay: 0.9s"/>
    </g>
    
    <!-- Root MAX Node -->
    <circle cx="180" cy="10" r="16" class="node-max pulse-anim" filter="url(#shadow)" />
    <text x="180" y="14" text-anchor="middle" class="value-label">MAX</text>
    
    <!-- Level 1 MIN Nodes -->
    <rect x="104" y="42" width="32" height="16" class="node-min" filter="url(#shadow)" rx="2"/>
    <text x="120" y="53" text-anchor="middle" class="value-label">MIN</text>
    
    <rect x="164" y="42" width="32" height="16" class="node-min" filter="url(#shadow)" rx="2"/>
    <text x="180" y="53" text-anchor="middle" class="value-label">MIN</text>
    
    <rect x="224" y="42" width="32" height="16" class="node-min" filter="url(#shadow)" rx="2"/>
    <text x="240" y="53" text-anchor="middle" class="value-label">MIN</text>
    
    <!-- Level 2 MAX Nodes -->
    <circle cx="80" cy="90" r="12" class="node-max" filter="url(#shadow)" />
    <text x="80" y="94" text-anchor="middle" class="value-label">MAX</text>
    
    <circle cx="120" cy="90" r="12" class="node-max" filter="url(#shadow)" />
    <text x="120" y="94" text-anchor="middle" class="value-label">MAX</text>
    
    <circle cx="160" cy="90" r="12" class="node-max" filter="url(#shadow)" />
    <text x="160" y="94" text-anchor="middle" class="value-label">MAX</text>
    
    <circle cx="200" cy="90" r="12" class="node-max" filter="url(#shadow)" />
    <text x="200" y="94" text-anchor="middle" class="value-label">MAX</text>
    
    <circle cx="240" cy="90" r="12" class="node-max" filter="url(#shadow)" />
    <text x="240" y="94" text-anchor="middle" class="value-label">MAX</text>
    
    <circle cx="280" cy="90" r="12" class="node-max" filter="url(#shadow)" />
    <text x="280" y="94" text-anchor="middle" class="value-label">MAX</text>
    
    <!-- Leaf Nodes with Values -->
    <rect x="50" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="60" y="133" text-anchor="middle" class="value-label">3</text>
    
    <rect x="70" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="80" y="133" text-anchor="middle" class="value-label">12</text>
    
    <rect x="90" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="100" y="133" text-anchor="middle" class="value-label">8</text>
    
    <rect x="130" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="140" y="133" text-anchor="middle" class="value-label">2</text>
    
    <rect x="170" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="180" y="133" text-anchor="middle" class="value-label">4</text>
    
    <rect x="210" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="220" y="133" text-anchor="middle" class="value-label">14</text>
    
    <rect x="230" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="240" y="133" text-anchor="middle" class="value-label">5</text>
    
    <rect x="250" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="260" y="133" text-anchor="middle" class="value-label">6</text>
    
    <rect x="290" y="124" width="20" height="12" class="node-leaf" filter="url(#shadow)" rx="2"/>
    <text x="300" y="133" text-anchor="middle" class="value-label">7</text>
    
    <!-- Value Propagation Annotations -->
    <g class="section-3" data-narration="MIN nodes choose minimum values from their children">
      <text x="65" y="112" class="label" fill="#e74c3c">min:3</text>
      <text x="105" y="112" class="label" fill="#e74c3c">min:2</text>
      <text x="185" y="112" class="label" fill="#e74c3c">min:4</text>
      <text x="225" y="112" class="label" fill="#e74c3c">min:5</text>
      <text x="265" y="112" class="label" fill="#e74c3c">min:6</text>
    </g>
    
    <!-- MAX node computed values -->
    <text x="120" y="84" class="label" fill="#3498db" font-size="9">12</text>
    <text x="160" y="84" class="label" fill="#3498db" font-size="9">8</text>
    <text x="200" y="84" class="label" fill="#3498db" font-size="9">14</text>
    <text x="240" y="84" class="label" fill="#3498db" font-size="9">7</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="section-3" data-narration="Key concepts: Minimax maximizes MIN's choice, Alpha-Beta prunes irrelevant branches" transform="translate(5, 195)">
    <!-- Box 1: Minimax -->
    <rect x="0" y="0" width="130" height="55" class="concept-box" filter="url(#shadow)"/>
    <rect x="0" y="0" width="130" height="18" fill="#3498db" rx="5"/>
    <text x="65" y="13" text-anchor="middle" class="value-label" font-size="11">MINIMAX</text>
    <text x="10" y="30" class="label">MAX: Choose highest</text>
    <text x="10" y="42" class="label">MIN: Choose lowest</text>
    
    <!-- Box 2: Alpha-Beta -->
    <rect x="140" y="0" width="130" height="55" class="concept-box" filter="url(#shadow)"/>
    <rect x="140" y="0" width="130" height="18" fill="#9b59b6" rx="5"/>
    <text x="205" y="13" text-anchor="middle" class="value-label" font-size="11">ALPHA-BETA</text>
    <text x="150" y="30" class="label">Alpha: MAX's best</text>
    <text x="150" y="42" class="label">Beta: MIN's best</text>
    
    <!-- Box 3: Pruning -->
    <rect x="280" y="0" width="130" height="55" class="concept-box" filter="url(#shadow)"/>
    <rect x="280" y="0" width="130" height="18" fill="#e74c3c" rx="5"/>
    <text x="345" y="13" text-anchor="middle" class="value-label" font-size="11">PRUNING</text>
    <text x="290" y="30" class="label">Skip branches that</text>
    <text x="290" y="42" class="label">won't affect decision</text>
  </g>
  
  <!-- Alpha-Beta Visualization -->
  <g class="section-3" data-narration="Alpha-Beta pruning example showing alpha=12 being propagated" transform="translate(10, 260)">
    <rect x="0" y="0" width="400" height="80" class="concept-box" filter="url(#shadow)"/>
    <text x="10" y="18" class="label" font-size="12" fill="#2c3e50" font-weight="bold">Alpha-Beta Propagation Example:</text>
    
    <!-- Visual representation of alpha-beta values -->
    <g transform="translate(20, 30)">
      <circle cx="30" cy="15" r="10" class="node-max" />
      <text x="30" y="18" text-anchor="middle" class="value-label" font-size="8">α</text>
      <text x="50" y="18" class="label" font-size="10">= 12</text>
      
      <line x1="45" y1="15" x2="80" y2="15" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
      
      <rect x="85" y="8" width="25" height="14" class="node-min" rx="2"/>
      <text x="97" y="18" text-anchor="middle" class="value-label" font-size="8">β</text>
      <text x="120" y="18" class="label" font-size="10">= +∞</text>
      
      <text x="150" y="18" class="label" font-size="10" fill="#27ae60">When MIN sees ≤12, it can prune!</text>
    </g>
    
    <!-- Pruned branch indicator -->
    <g transform="translate(250, 25)">
      <line x1="0" y1="10" x2="30" y2="10" stroke="#e74c3c" stroke-width="2"/>
      <line x1="25" y1="5" x2="30" y2="10" stroke="#e74c3c" stroke-width="2"/>
      <line x1="25" y1="15" x2="30" y2="10" stroke="#e74c3c" stroke-width="2"/>
      <circle cx="40" cy="10" r="8" fill="#e74c3c" opacity="0.7"/>
      <text x="40" y="13" text-anchor="middle" class="value-label" font-size="8">X</text>
      <text x="55" y="14" class="label" font-size="9" fill="#e74c3c">Pruned!</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(10, 55)">
      <circle cx="0" cy="0" r="6" class="node-max"/>
      <text x="12" y="4" class="label" font-size="9">MAX Node</text>
      <rect x="60" y="-6" width="12" height="12" class="node-min" rx="2"/>
      <text x="78" y="4" class="label" font-size="9">MIN Node</text>
      <rect x="120" y="-6" width="12" height="12" class="node-leaf" rx="2"/>
      <text x="138" y="4" class="label" font-size="9">Terminal</text>
    </g>
  </g>
  
  <!-- Bottom note -->
  <g class="section-3" data-narration="Practical applications in chess, checkers, and other adversarial games" transform="translate(0, 355)">
    <text x="210" y="15" text-anchor="middle" class="label" font-size="11" fill="#5a7a9a">Used in Chess engines, Tic-Tac-Toe, and strategic game AI</text>
    <line x1="80" y1="22" x2="340" y2="22" stroke="#bdc3c7" stroke-width="1"/>
  </g>
  
  <!-- Animated highlight on root -->
  <circle cx="200" cy="60" r="18" fill="none" stroke="#3498db" stroke-width="2" opacity="0" class="highlight">
    <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="3"/>
  </circle>
</svg>