<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="constraint-satisfaction-problem">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="varGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="domainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ed9a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7bc48a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="constraintGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a87c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4886a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="solutionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4a4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a884b8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 13px; fill: #555; }
    .value { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .section-box { rx: 8; ry: 8; }
    .variable-circle { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="The title introduces the main topic: Constraint Satisfaction Problems (CSP), a key AI paradigm">Constraint Satisfaction Problem</text>
  <text x="210" y="50" text-anchor="middle" class="detail" data-narration="CSP consists of variables, domains, and constraints that must all be satisfied">CSP Framework Overview</text>
  
  <!-- Variables Section -->
  <g data-narration="Variables section shows X1, X2, X3 as circles - the three variables that need to be assigned values">
    <rect x="20" y="70" width="115" height="130" fill="#f8f9fa" stroke="#ddd" stroke-width="1" rx="8" class="section-box" style="animation: fadeIn 0.8s ease-out" />
    <text x="77" y="90" text-anchor="middle" class="label" data-narration="Variables: The set X = {X1, X2, X3} represents the variables to be assigned">Variables (X)</text>
    <circle cx="55" cy="130" r="22" fill="url(#varGradient)" filter="url(#shadow)" class="variable-circle" />
    <text x="55" y="135" text-anchor="middle" fill="white" font-weight="bold" font-family="Arial">X₁</text>
    <circle cx="100" cy="130" r="22" fill="url(#varGradient)" filter="url(#shadow)" class="variable-circle" style="animation-delay: 0.2s" />
    <text x="100" y="135" text-anchor="middle" fill="white" font-weight="bold" font-family="Arial">X₂</text>
    <circle cx="77" cy="175" r="22" fill="url(#varGradient)" filter="url(#shadow)" class="variable-circle" style="animation-delay: 0.4s" />
    <text x="77" y="180" text-anchor="middle" fill="white" font-weight="bold" font-family="Arial">X₃</text>
  </g>
  
  <!-- Domains Section -->
  <g data-narration="Domains section shows the possible values each variable can take">
    <rect x="150" y="70" width="130" height="130" fill="#f8f9fa" stroke="#ddd" stroke-width="1" rx="8" class="section-box" style="animation: fadeIn 1s ease-out" />
    <text x="215" y="90" text-anchor="middle" class="label" data-narration="Domains: D1 contains {1,2,3}, D2 contains {1,2}, D3 contains {2,3}">Domains (D)</text>
    <text x="165" y="115" class="detail" font-size="12">D₁ = {</text>
    <text x="180" y="115" class="value">1, 2, 3</text>
    <text x="235" y="115" class="detail">}</text>
    <text x="165" y="140" class="detail" font-size="12">D₂ = {</text>
    <text x="180" y="140" class="value">1, 2</text>
    <text x="215" y="140" class="detail">}</text>
    <text x="165" y="165" class="detail" font-size="12">D₃ = {</text>
    <text x="180" y="165" class="value">2, 3</text>
    <text x="215" y="165" class="detail">}</text>
  </g>
  
  <!-- Constraints Section -->
  <g data-narration="Constraints define relationships between variables - here C1 involves X1 and X2, C2 involves X2 and X3">
    <rect x="295" y="70" width="110" height="130" fill="#f8f9fa" stroke="#ddd" stroke-width="1" rx="8" class="section-box" style="animation: fadeIn 1.2s ease-out" />
    <text x="350" y="90" text-anchor="middle" class="label" data-narration="Constraints: Rules that limit allowable combinations of values">Constraints (C)</text>
    <rect x="305" y="105" width="90" height="22" fill="url(#constraintGradient)" rx="4" />
    <text x="350" y="121" text-anchor="middle" fill="white" font-size="11" font-family="Arial">C₁(X₁,X₂)</text>
    <rect x="305" y="135" width="90" height="22" fill="url(#constraintGradient)" rx="4" style="animation-delay: 0.3s" />
    <text x="350" y="151" text-anchor="middle" fill="white" font-size="11" font-family="Arial">C₂(X₂,X₃)</text>
    <text x="350" y="185" class="detail" font-size="10" text-anchor="middle">X₁ ≠ X₂</text>
    <text x="350" y="198" class="detail" font-size="10" text-anchor="middle">X₂ ≠ X₃</text>
  </g>
  
  <!-- Arrows showing CSP structure -->
  <g data-narration="Arrows show how constraints connect variables in the CSP framework">
    <line x1="135" y1="155" x2="150" y2="155" stroke="#e67e22" stroke-width="2" class="arrow-line" style="animation: fadeIn 1.5s ease-out" />
    <line x1="280" y1="155" x2="295" y2="155" stroke="#e67e22" stroke-width="2" class="arrow-line" style="animation-delay: 0.3s; animation: fadeIn 1.5s ease-out" />
  </g>
  
  <!-- Solution Section -->
  <g data-narration="A valid solution assigns values to all variables while satisfying all constraints">
    <rect x="20" y="220" width="385" height="70" fill="#f8f9fa" stroke="#ddd" stroke-width="1" rx="8" class="section-box" style="animation: slideIn 1s ease-out" />
    <text x="210" y="245" text-anchor="middle" class="label" data-narration="Solution: A complete assignment satisfying all constraints">Solution</text>
    <g transform="translate(40, 260)">
      <circle cx="15" cy="15" r="15" fill="url(#solutionGradient)" />
      <text x="15" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="12">X₁</text>
      <text x="45" y="19" class="value" font-size="14">= 1</text>
      <circle cx="100" cy="15" r="15" fill="url(#solutionGradient)" />
      <text x="100" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="12">X₂</text>
      <text x="130" y="19" class="value" font-size="14">= 2</text>
      <circle cx="185" cy="15" r="15" fill="url(#solutionGradient)" />
      <text x="185" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="12">X₃</text>
      <text x="215" y="19" class="value" font-size="14">= 3</text>
    </g>
    <text x="350" y="278" class="detail" font-size="10" fill="#27ae60">✓ All constraints satisfied</text>
  </g>
  
  <!-- Key Concept Box -->
  <g data-narration="Formal definition: CSP is a triple (X, D, C) where X is variables, D is domains, C is constraints">
    <rect x="20" y="305" width="385" height="85" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="8" class="section-box" style="animation: fadeIn 1.5s ease-out" />
    <text x="210" y="325" text-anchor="middle" class="label" fill="#d68910" font-size="14">Formal Definition: CSP = (X, D, C)</text>
    <text x="35" y="350" class="detail" font-size="12">• <tspan font-weight="bold">X</tspan> = {X₁,X₂,...,Xₙ} — set of n variables</text>
    <text x="35" y="368" class="detail" font-size="12">• <tspan font-weight="bold">D</tspan> = {D₁,D₂,...,Dₙ} — domains of possible values</text>
    <text x="35" y="386" class="detail" font-size="12">• <tspan font-weight="bold">C</tspan> = {C₁,C₂,...,Cₘ} — constraints on variable values</text>
  </g>
</svg>