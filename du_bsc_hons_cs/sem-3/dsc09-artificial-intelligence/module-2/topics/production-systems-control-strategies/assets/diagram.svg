<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="production-systems-control-strategies" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rulesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="interpreterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #37474f; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #37474f; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #546e7a; }
    .rule-box { animation: slideInLeft 0.8s ease-out forwards; opacity: 0; }
    .wm-box { animation: slideInUp 0.8s ease-out 0.2s forwards; opacity: 0; }
    .interpreter-box { animation: slideInRight 0.8s ease-out 0.4s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .flow-arrow { stroke-dasharray: 5,5; animation: flowDash 1s linear infinite; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .concept-box { animation: fadeIn 1s ease-out 1s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Production Systems Control Strategies</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#90a4ae" stroke-width="2"/>
  
  <!-- Production Rules Database (Left) -->
  <g class="rule-box" data-narration="Production Rules Database - Contains all IF-THEN condition-action pairs that form the knowledge base of the system">
    <rect x="20" y="70" width="120" height="140" rx="10" fill="url(#rulesGradient)" filter="url(#shadow)"/>
    <rect x="20" y="70" width="120" height="30" rx="10" fill="#90caf9"/>
    <text x="80" y="90" text-anchor="middle" class="label">Production Rules</text>
    <text x="80" y="115" text-anchor="middle" class="detail">Database</text>
    <g transform="translate(30, 135)">
      <text class="detail" x="0" y="0">IF condition THEN</text>
      <text class="detail" x="10" y="14">action</text>
      <text class="detail" x="0" y="28">────────────</text>
      <text class="detail" x="0" y="42">Rule 1: IF x THEN y</text>
      <text class="detail" x="0" y="56">Rule 2: IF a THEN b</text>
      <text class="detail" x="0" y="70">Rule n: ...</text>
    </g>
  </g>
  
  <!-- Working Memory (Center) -->
  <g class="wm-box" data-narration="Working Memory - Acts as a blackboard storing current facts and working memory elements that the interpreter uses for rule matching">
    <rect x="150" y="70" width="120" height="140" rx="10" fill="url(#wmGradient)" filter="url(#shadow)"/>
    <rect x="150" y="70" width="120" height="30" rx="10" fill="#a5d6a7"/>
    <text x="210" y="90" text-anchor="middle" class="label">Working Memory</text>
    <text x="210" y="108" text-anchor="middle" class="detail">(Blackboard/Facts)</text>
    <g transform="translate(160, 130)">
      <text class="detail" x="0" y="0">Current Facts:</text>
      <text class="detail" x="10" y="16">• symptom: fever</text>
      <text class="detail" x="10" y="32">• patient: age>65</text>
      <text class="detail" x="10" y="48">• diagnosis: ?</text>
      <text class="detail" x="0" y="68">Updated by rules</text>
    </g>
  </g>
  
  <!-- Rule Interpreter (Right) -->
  <g class="interpreter-box" data-narration="Rule Interpreter (Inference Engine) - Executes the recognize-act cycle: matching rules against facts, resolving conflicts, and executing actions">
    <rect x="280" y="70" width="120" height="140" rx="10" fill="url(#interpreterGradient)" filter="url(#shadow)"/>
    <rect x="280" y="70" width="120" height="30" rx="10" fill="#ce93d8"/>
    <text x="340" y="90" text-anchor="middle" class="label">Rule Interpreter</text>
    <text x="340" y="108" text-anchor="middle" class="detail">(Inference Engine)</text>
    <g transform="translate(290, 128)">
      <text class="detail" x="0" y="0">Control Cycle:</text>
      <text class="detail" x="10" y="16">1. Match</text>
      <text class="detail" x="10" y="30">2. Resolve</text>
      <text class="detail" x="10" y="44">3. Execute</text>
      <text class="detail" x="0" y="60">Conflict Resolution</text>
      <text class="detail" x="10" y="74">Strategies</text>
    </g>
  </g>
  
  <!-- Arrows showing the cycle -->
  <g class="arrow">
    <!-- WM to Interpreter -->
    <path d="M 210 215 L 210 240 L 280 240 L 280 215" fill="none" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
    <text x="245" y="255" text-anchor="middle" class="detail">Match Facts</text>
    
    <!-- Interpreter to Rules -->
    <path d="M 335 215 L 335 240 L 140 240 L 140 215" fill="none" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
    <text x="237" y="255" text-anchor="middle" class="detail">Select Rule</text>
    
    <!-- Rules to WM -->
    <path d="M 80 215 L 80 240 L 150 240 L 150 215" fill="none" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
    <text x="115" y="255" text-anchor="middle" class="detail">Modify WM</text>
  </g>
  
  <!-- Control Strategies Box -->
  <g class="concept-box" data-narration="Control Strategies - Determine rule execution order, reasoning direction (forward/backward), and conflict resolution methods">
    <rect x="20" y="280" width="380" height="60" rx="8" fill="#fff9c4" filter="url(#shadow)"/>
    <text x="35" y="300" class="label" fill="#f57f17">Control Strategies:</text>
    <g transform="translate(35, 315)">
      <text class="detail" x="0" y="0">• Forward Chaining (Data-Driven) • Backward Chaining (Goal-Driven) • Conflict Resolution: Specificity, Recency, Priority</text>
    </g>
  </g>
  
  <!-- Cycle indicator -->
  <g class="concept-box" data-narration="Recognition-Act Cycle - The core loop of production systems: observe state, select rule, execute action, repeat">
    <circle cx="340" cy="330" r="25" fill="#ffccbc" filter="url(#shadow)" class="pulse-anim"/>
    <text x="340" y="325" text-anchor="middle" class="label" font-size="10">RECOGNIZE</text>
    <text x="340" y="340" text-anchor="middle" class="label" font-size="10">ACT</text>
    <text x="340" y="352" text-anchor="middle" class="detail" font-size="9">CYCLE</text>
  </g>
  
  <!-- Key insight box -->
  <g class="concept-box" data-narration="Key Insight - Control strategies directly impact efficiency, completeness, and optimality of problem-solving in production systems">
    <rect x="20" y="350" width="200" height="35" rx="5" fill="#e1f5fe" filter="url(#shadow)"/>
    <text x="30" y="365" class="detail" font-weight="600">Key: Control strategy determines</text>
    <text x="30" y="378" class="detail">efficiency &amp; completeness</text>
  </g>
</svg>