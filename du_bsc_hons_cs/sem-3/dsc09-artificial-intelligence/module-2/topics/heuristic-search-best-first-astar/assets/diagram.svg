<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="heuristic-search-best-first-astar" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f7fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a8fa8"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: Georgia, serif; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .pulse-node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .flow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out 0.8s forwards; stroke-dashoffset: 100; }
    text { fill: #2c3e50; }
    .label { font-size: 12px; font-family: Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; font-family: Georgia, serif; }
    .concept-title { font-size: 13px; font-weight: bold; font-family: Arial, sans-serif; }
    .formula { font-size: 14px; font-family: 'Courier New', monospace; font-weight: bold; }
    .highlight { fill: #2980b9; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-text" fill="#1a5276">Heuristic Search</text>
  <text x="210" y="46" text-anchor="middle" class="title label" fill="#5a8fa8">Best-First Search &amp; A* Algorithm</text>
  
  <!-- Section 1: Heuristic Definition Box -->
  <g class="section-1" data-narration="The heuristic function h(n) estimates the cost from node n to the goal">
    <rect x="15" y="60" width="120" height="55" rx="5" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#a8d4e6" stroke-width="1"/>
    <text x="75" y="78" text-anchor="middle" class="concept-title" fill="#2980b9">What is Heuristic?</text>
    <text x="75" y="95" text-anchor="middle" class="label" fill="#34495e">h(n) estimates cost</text>
    <text x="75" y="108" text-anchor="middle" class="label" fill="#34495e">from n to goal</text>
  </g>
  
  <!-- Section 2: A* Formula Box -->
  <g class="section-2" data-narration="A* combines path cost g(n) and heuristic h(n) to compute f(n)">
    <rect x="285" y="60" width="120" height="55" rx="5" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#a8d4e6" stroke-width="1"/>
    <text x="345" y="78" text-anchor="middle" class="concept-title" fill="#2980b9">A* Formula</text>
    <text x="345" y="98" text-anchor="middle" class="formula" fill="#c0392b">f(n) = g(n) + h(n)</text>
  </g>
  
  <!-- Main Flowchart -->
  <g class="section-3" data-narration="The A* algorithm initializes with the start node and iteratively expands the node with lowest f-score">
    <!-- Start Node -->
    <circle cx="75" cy="150" r="18" fill="#3498db" class="pulse-node"/>
    <text x="75" y="155" text-anchor="middle" fill="white" font-size="11" font-weight="bold">START</text>
    
    <!-- Process Box 1 -->
    <rect x="140" y="135" width="100" height="30" rx="4" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="190" y="155" text-anchor="middle" fill="white" font-size="11" font-weight="bold">OPEN = {start}</text>
    
    <!-- Arrow 1 -->
    <line x1="93" y1="150" x2="140" y2="150" stroke="#5a8fa8" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line"/>
    
    <!-- Decision Diamond -->
    <polygon points="295,130 345,150 295,170 245,150" fill="#f39c12" filter="url(#shadow)"/>
    <text x="295" y="145" text-anchor="middle" fill="white" font-size="9" font-weight="bold">OPEN</text>
    <text x="295" y="158" text-anchor="middle" fill="white" font-size="9" font-weight="bold">empty?</text>
    
    <!-- Arrow 2 -->
    <line x1="190" y1="150" x2="245" y2="150" stroke="#5a8fa8" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line"/>
    
    <!-- Loop arrow -->
    <path d="M 345 150 Q 380 150 380 200 Q 380 250 345 250" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="378" y="205" fill="#27ae60" font-size="10" font-weight="bold">YES</text>
    
    <!-- Process Box 2 -->
    <rect x="140" y="195" width="100" height="30" rx="4" fill="#9b59b6" filter="url(#shadow)"/>
    <text x="190" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Select min f(n)</text>
    
    <!-- Arrow loop back -->
    <line x1="345" y1="250" x2="345" y2="265" stroke="#27ae60" stroke-width="2"/>
    <line x1="345" y1="265" x2="190" y2="265" stroke="#27ae60" stroke-width="2"/>
    <line x1="190" y1="265" x2="190" y2="225" stroke="#27ae60" stroke-width="2"/>
    
    <!-- Arrow from select to diamond -->
    <line x1="190" y1="195" x2="190" y2="170" stroke="#5a8fa8" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line"/>
    <line x1="190" y1="170" x2="245" y2="150" stroke="#5a8fa8" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line"/>
    
    <!-- Goal Check -->
    <rect x="295" y="185" width="100" height="30" rx="4" fill="#27ae60" filter="url(#shadow)"/>
    <text x="345" y="205" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Goal Found?</text>
    
    <!-- Arrow to goal check -->
    <line x1="295" y1="150" x2="295" y2="185" stroke="#5a8fa8" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line"/>
    
    <!-- NO path -->
    <text x="355" y="220" fill="#e74c3c" font-size="10" font-weight="bold">NO</text>
    <line x1="345" y1="215" x2="345" y2="300" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Expand Node -->
    <rect x="270" y="305" width="150" height="30" rx="4" fill="#3498db" filter="url(#shadow)"/>
    <text x="345" y="325" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Expand &amp; Add to CLOSED</text>
    
    <!-- Arrow from expand back -->
    <line x1="345" y1="335" x2="345" y2="380" stroke="#3498db" stroke-width="2"/>
    <line x1="345" y1="380" x2="190" y2="380" stroke="#3498db" stroke-width="2"/>
    <line x1="190" y1="380" x2="190" y2="330" stroke="#3498db" stroke-width="2"/>
    
    <!-- Goal arrow -->
    <line x1="345" y1="215" x2="395" y2="215" stroke="#27ae60" stroke-width="2"/>
    <line x1="395" y1="215" x2="395" y2="150" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Return Path -->
    <rect x="360" y="120" width="50" height="25" rx="4" fill="#16a085"/>
    <text x="385" y="137" text-anchor="middle" fill="white" font-size="9" font-weight="bold">RETURN</text>
  </g>
  
  <!-- Section 4: Comparison Box -->
  <g class="section-4" data-narration="Greedy Best-First uses only heuristic h(n), while A* combines g(n) and h(n) for optimality">
    <rect x="15" y="260" width="180" height="70" rx="5" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#a8d4e6" stroke-width="1"/>
    <text x="105" y="280" text-anchor="middle" class="concept-title" fill="#2980b9">Algorithm Comparison</text>
    <text x="25" y="300" class="label" fill="#34495e">Greedy:</text>
    <text x="70" y="300" class="label" fill="#c0392b">f(n) = h(n)</text>
    <text x="25" y="318" class="label" fill="#34495e">A* Search:</text>
    <text x="80" y="318" class="label" fill="#27ae60">f(n) = g(n) + h(n)</text>
    <text x="105" y="335" text-anchor="middle" class="label" fill="#7f8c8d" font-size="10">Guarantees optimal path</text>
  </g>
  
  <!-- Properties Box -->
  <g class="section-4" data-narration="A* is complete and optimal when the heuristic is admissible">
    <rect x="210" y="260" width="195" height="70" rx="5" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#a8d4e6" stroke-width="1"/>
    <text x="307" y="280" text-anchor="middle" class="concept-title" fill="#2980b9">Key Properties</text>
    <circle cx="225" cy="298" r="4" fill="#e74c3c"/>
    <text x="235" y="302" class="label" fill="#34495e" font-size="10">Admissible: h(n) ≤ true cost</text>
    <circle cx="225" cy="316" r="4" fill="#e74c3c"/>
    <text x="235" y="320" class="label" fill="#34495e" font-size="10">Consistent: triangle inequality</text>
    <text x="307" y="335" text-anchor="middle" class="label" fill="#7f8c8d" font-size="9">A* finds optimal solution</text>
  </g>
  
  <!-- Bottom labels -->
  <text x="210" y="375" text-anchor="middle" class="label" fill="#7f8c8d" font-size="10" font-style="italic">AI Search Algorithms - University Course Material</text>
</svg>