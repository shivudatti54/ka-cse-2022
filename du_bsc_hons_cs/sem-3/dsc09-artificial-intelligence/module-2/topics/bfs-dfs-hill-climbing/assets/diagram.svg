<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="bfs-dfs-hill-climbing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bfsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e8b84;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dfsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c44545;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hillGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#feca57;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBFS" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e8b84" />
    </marker>
    <marker id="arrowDFS" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c44545" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-bfs { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-dfs { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section-hill { animation: slideInUp 0.6s ease-out 0.6s both; }
    .node { animation: pulse 2s ease-in-out infinite; }
    .node-a { animation-delay: 0s; }
    .node-b { animation-delay: 0.2s; }
    .node-c { animation-delay: 0.3s; }
    .node-d { animation-delay: 0.4s; }
    .node-e { animation-delay: 0.5s; }
    .node-f { animation-delay: 0.6s; }
    .node-g { animation-delay: 0.7s; }
    .path-bfs { stroke-dasharray: 100; animation: drawLine 1.5s ease-out 1s forwards; }
    .path-dfs { stroke-dasharray: 100; animation: drawLine 2s ease-out 1.5s forwards; }
    text { font-family: Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">BFS, DFS &amp; Hill Climbing</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#2c3e50" stroke-width="1" stroke-opacity="0.3" class="title"/>

  <!-- Tree Structure -->
  <g data-narration="Binary tree showing node hierarchy for search algorithms" transform="translate(10, 55)">
    <!-- Tree edges -->
    <line x1="140" y1="70" x2="70" y2="110" stroke="#888" stroke-width="1.5"/>
    <line x1="140" y1="70" x2="210" y2="110" stroke="#888" stroke-width="1.5"/>
    <line x1="70" y1="110" x2="35" y2="150" stroke="#888" stroke-width="1.5"/>
    <line x1="70" y1="110" x2="105" y2="150" stroke="#888" stroke-width="1.5"/>
    <line x1="210" y1="110" x2="175" y2="150" stroke="#888" stroke-width="1.5"/>
    <line x1="210" y1="110" x2="245" y2="150" stroke="#888" stroke-width="1.5"/>
    
    <!-- BFS Path highlight -->
    <path d="M140,70 L70,110 L35,150" fill="none" stroke="#2e8b84" stroke-width="3" marker-end="url(#arrowBFS)" class="path-bfs" opacity="0.8"/>
    <path d="M140,70 L210,110 L175,150" fill="none" stroke="#2e8b84" stroke-width="3" marker-end="url(#arrowBFS)" class="path-bfs" opacity="0.8" style="animation-delay: 1.3s"/>
    <path d="M70,110 L105,150" fill="none" stroke="#2e8b84" stroke-width="3" class="path-bfs" opacity="0.8" style="animation-delay: 1.6s"/>
    
    <!-- DFS Path highlight -->
    <path d="M140,70 L70,110 L105,150" fill="none" stroke="#c44545" stroke-width="3" marker-end="url(#arrowDFS)" class="path-dfs" opacity="0.8"/>
    
    <!-- Nodes -->
    <circle cx="140" cy="70" r="18" fill="url(#bfsGradient)" filter="url(#shadow)" class="node node-a"/>
    <text x="140" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="white">A</text>
    
    <circle cx="70" cy="110" r="16" fill="url(#dfsGradient)" filter="url(#shadow)" class="node node-b"/>
    <text x="70" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="white">B</text>
    
    <circle cx="210" cy="110" r="16" fill="url(#dfsGradient)" filter="url(#shadow)" class="node node-c"/>
    <text x="210" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="white">C</text>
    
    <circle cx="35" cy="150" r="14" fill="#fff" stroke="#666" stroke-width="2" filter="url(#shadow)" class="node node-d"/>
    <text x="35" y="154" text-anchor="middle" font-size="12" fill="#333">D</text>
    
    <circle cx="105" cy="150" r="14" fill="#fff" stroke="#666" stroke-width="2" filter="url(#shadow)" class="node node-e"/>
    <text x="105" y="154" text-anchor="middle" font-size="12" fill="#333">E</text>
    
    <circle cx="175" cy="150" r="14" fill="#fff" stroke="#666" stroke-width="2" filter="url(#shadow)" class="node node-f"/>
    <text x="175" y="154" text-anchor="middle" font-size="12" fill="#333">F</text>
    
    <circle cx="245" cy="150" r="14" fill="#fff" stroke="#666" stroke-width="2" filter="url(#shadow)" class="node node-g"/>
    <text x="245" y="154" text-anchor="middle" font-size="12" fill="#333">G</text>
  </g>

  <!-- Labels for traversal order -->
  <g data-narration="BFS explores level by level using FIFO queue" transform="translate(20, 220)">
    <rect x="0" y="0" width="115" height="55" fill="url(#bfsGradient)" rx="6" filter="url(#shadow)"/>
    <text x="57" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="white">BFS Order</text>
    <text x="57" y="38" text-anchor="middle" font-size="12" fill="white">A→B→C→D→E→F→G</text>
    <text x="57" y="50" text-anchor="middle" font-size="10" fill="white">(Level by Level)</text>
  </g>

  <g data-narration="DFS explores deep first using stack LIFO" transform="translate(145, 220)">
    <rect x="0" y="0" width="115" height="55" fill="url(#dfsGradient)" rx="6" filter="url(#shadow)"/>
    <text x="57" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="white">DFS Order</text>
    <text x="57" y="38" text-anchor="middle" font-size="12" fill="white">A→B→E→F→C→G→D</text>
    <text x="57" y="50" text-anchor="middle" font-size="10" fill="white">(Deep First)</text>
  </g>

  <!-- Hill Climbing Section -->
  <g data-narration="Hill Climbing uses heuristic evaluation to find optimal solution" transform="translate(270, 55)">
    <rect x="0" y="0" width="130" height="55" fill="url(#hillGradient)" rx="6" filter="url(#shadow)"/>
    <text x="65" y="16" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Hill Climbing</text>
    <text x="65" y="32" text-anchor="middle" font-size="11" fill="white">Informed Search</text>
    <text x="65" y="46" text-anchor="middle" font-size="10" fill="white">Heuristic Guided</text>
  </g>

  <!-- Hill diagram -->
  <g transform="translate(275, 125)">
    <path d="M10,60 Q30,10 65,0 Q100,10 120,60" fill="none" stroke="#f39c12" stroke-width="3"/>
    <path d="M10,60 Q30,10 65,0 Q100,10 120,60" fill="url(#hillGradient)" opacity="0.3"/>
    <!-- Points on hill -->
    <circle cx="20" cy="45" r="6" fill="#e74c3c" stroke="#c0392b" stroke-width="2">
      <animate attributeName="r" values="6;7;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="20" r="6" fill="#f1c40f" stroke="#f39c12" stroke-width="2">
      <animate attributeName="r" values="6;7;6" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="65" cy="8" r="8" fill="#27ae60" stroke="#1e8449" stroke-width="2">
      <animate attributeName="r" values="8;9;8" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="85" cy="25" r="6" fill="#f1c40f" stroke="#f39c12" stroke-width="2">
      <animate attributeName="r" values="6;7;6" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <text x="65" y="80" text-anchor="middle" font-size="10" fill="#555">Local Maximum</text>
  </g>

  <!-- Key Concepts Box -->
  <g data-narration="Key characteristics of each algorithm" transform="translate(10, 290)">
    <rect x="0" y="0" width="400" height="100" fill="white" rx="8" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    
    <text x="15" y="20" font-size="12" font-weight="bold" fill="#2e8b84">BFS:</text>
    <text x="50" y="20" font-size="11" fill="#555">Complete, Optimal | Queue (FIFO) | O(b^d)</text>
    
    <text x="15" y="40" font-size="12" font-weight="bold" fill="#c44545">DFS:</text>
    <text x="50" y="40" font-size="11" fill="#555">Not optimal, Memory efficient | Stack (LIFO) | O(b^m)</text>
    
    <text x="15" y="60" font-size="12" font-weight="bold" fill="#f39c12">Hill Climbing:</text>
    <text x="100" y="60" font-size="11" fill="#555">Greedy local search | Heuristic h(n)</text>
    
    <text x="15" y="80" font-size="11" fill="#777">Applications: Pathfinding, Puzzle solving, Game AI, Optimization</text>
    <text x="370" y="95" text-anchor="end" font-size="9" fill="#999">DU CS - AI</text>
  </g>

  <!-- Queue/Stack Visualization hint -->
  <g data-narration="Data structures used: Queue for BFS, Stack for DFS" transform="translate(320, 220)">
    <rect x="0" y="0" width="90" height="55" fill="#f8f9fa" rx="6" stroke="#dee2e6" stroke-width="1"/>
    <text x="45" y="15" text-anchor="middle" font-size="10" fill="#666">Data Structure</text>
    <text x="45" y="30" text-anchor="middle" font-size="9" fill="#2e8b84">BFS: Queue</text>
    <text x="45" y="45" text-anchor="middle" font-size="9" fill="#c44545">DFS: Stack</text>
  </g>
</svg>