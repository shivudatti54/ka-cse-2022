<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="propositional-first-order-logic" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e8eeff"/>
      <stop offset="100%" style="stop-color:#f0f8ff"/>
    </linearGradient>
    <linearGradient id="propGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5e5"/>
      <stop offset="100%" style="stop-color:#fff0f0"/>
    </linearGradient>
    <linearGradient id="folGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5f0ff"/>
      <stop offset="100%" style="stop-color:#f0f5ff"/>
    </linearGradient>
    <linearGradient id="connectGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5ffe5"/>
      <stop offset="100%" style="stop-color:#f0fff0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .subtitle { font-family: Georgia, serif; font-size: 14px; fill: #5d6d7e; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .symbol { font-family: 'Times New Roman', serif; font-size: 18px; font-style: italic; fill: #2c3e50; }
    .box { stroke: #bdc3c7; stroke-width: 1.5; rx: 8; }
    .arrow { stroke: #7f8c8d; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title fade-in">Propositional &amp; First-Order Logic</text>
  <text x="210" y="55" text-anchor="middle" class="subtitle slide-in delay-1">Logical Foundations of AI</text>
  
  <!-- Section 1: Propositional Logic Box -->
  <g class="slide-up delay-1" data-narration="Propositional Logic uses atomic symbols (P, Q, R) representing true/false statements">
    <rect x="20" y="75" width="160" height="140" fill="url(#propGradient)" class="box"/>
    <text x="100" y="95" text-anchor="middle" class="label">Propositional Logic</text>
    <text x="30" y="120" class="detail">Atomic Propositions:</text>
    <text x="35" y="140" class="symbol">P, Q, R, S</text>
    <text x="30" y="160" class="detail">Truth Values:</text>
    <text x="35" y="180" class="symbol">True (T) / False (F)</text>
    <text x="30" y="200" class="detail">Connectives:</text>
    <text x="35" y="218" class="symbol">¬ ∧ ∨ → ↔</text>
  </g>
  
  <!-- Section 2: Connectives/Operators -->
  <g class="slide-up delay-2" data-narration="Logical connectives combine propositions: NOT, AND, OR, IMPLIES, EQUIVALENT">
    <rect x="200" y="75" width="120" height="80" fill="url(#connectGradient)" class="box"/>
    <text x="260" y="95" text-anchor="middle" class="label">Connectives</text>
    <text x="210" y="118" class="detail">¬ NOT  ∧ AND</text>
    <text x="210" y="136" class="detail">∨ OR   → Implies</text>
    <text x="210" y="154" class="detail">↔ Equivalent</text>
  </g>
  
  <!-- Section 3: First-Order Logic Box -->
  <g class="slide-up delay-2" data-narration="First-Order Logic adds quantifiers, variables, and predicates for richer representation">
    <rect x="200" y="165" width="200" height="100" fill="url(#folGradient)" class="box"/>
    <text x="300" y="185" text-anchor="middle" class="label">First-Order Logic (FOL)</text>
    <text x="210" y="208" class="detail">Quantifiers: ∀ (forall), ∃ (exists)</text>
    <text x="210" y="226" class="detail">Variables: x, y, z</text>
    <text x="210" y="244" class="detail">Predicates: P(x), Q(x,y)</text>
    <text x="210" y="262" class="detail">Functions: f(x), g(x,y)</text>
  </g>
  
  <!-- Section 4: FOL Formula Structure Diagram -->
  <g class="slide-up delay-3" data-narration="FOL formula structure shows hierarchical organization from quantifiers to predicates">
    <rect x="20" y="225" width="165" height="150" fill="url(#folGradient)" class="box" opacity="0.9"/>
    <text x="102" y="245" text-anchor="middle" class="label">FOL Formula Structure</text>
    
    <!-- Quantifier node -->
    <rect x="50" y="255" width="50" height="22" fill="#d5e8f7" rx="4" class="pulse"/>
    <text x="75" y="271" text-anchor="middle" class="detail" font-weight="bold">∀x ∃y</text>
    
    <!-- Arrow down -->
    <line x1="75" y1="277" x2="75" y2="295" class="arrow" stroke-dasharray="4,2"/>
    
    <!-- Variable node -->
    <rect x="50" y="295" width="50" height="22" fill="#e8f4fd" rx="4"/>
    <text x="75" y="311" text-anchor="middle" class="detail">x, y, z</text>
    
    <!-- Arrow down -->
    <line x1="75" y1="317" x2="75" y2="335" class="arrow" stroke-dasharray="4,2"/>
    
    <!-- Predicate node -->
    <rect x="35" y="335" width="80" height="22" fill="#cce5ff" rx="4"/>
    <text x="75" y="351" text-anchor="middle" class="detail" font-weight="bold">P(x) → Q(x,y)</text>
  </g>
  
  <!-- Relationship Arrow from Propositional to FOL -->
  <g class="fade-in delay-3">
    <path d="M 180 145 Q 210 130 200 165" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="195" y="135" class="detail" fill="#3498db">extends</text>
  </g>
  
  <!-- Key Insight Box -->
  <g class="slide-in delay-4" data-narration="Key difference: Propositional Logic deals with whole statements while FOL can express properties of objects">
    <rect x="20" y="320" width="120" height="65" fill="#fff9e6" rx="6" opacity="0.9"/>
    <text x="80" y="340" text-anchor="middle" class="label" font-size="12">Key Difference</text>
    <text x="30" y="358" class="detail" font-size="11">Prop: P is TRUE</text>
    <text x="30" y="375" class="detail" font-size="11">FOL: ∀x P(x)</text>
  </g>
  
  <!-- Bottom info -->
  <g class="fade-in delay-4">
    <rect x="150" y="320" width="120" height="65" fill="#e8f8f5" rx="6" opacity="0.9"/>
    <text x="210" y="340" text-anchor="middle" class="label" font-size="12">AI Applications</text>
    <text x="160" y="358" class="detail" font-size="11">• Knowledge Rep.</text>
    <text x="160" y="375" class="detail" font-size="11">• Automated Reasoning</text>
  </g>
  
  <rect x="280" y="275" width="120" height="110" fill="#fdf2e9" rx="6" opacity="0.9" class="slide-in delay-4"/>
  <text x="340" y="295" text-anchor="middle" class="label" font-size="12">Example</text>
  <text x="290" y="315" class="detail" font-size="11" font-family="monospace">Prop: P ∧ Q</text>
  <text x="290" y="335" class="detail" font-size="11" font-family="monospace">FOL: ∀x (Human(x) →</text>
  <text x="305" y="352" class="detail" font-size="11" font-family="monospace">Mortal(x))</text>
  <text x="290" y="378" class="detail" font-size="10" fill="#7f8c8d">Socrates example</text>
  
  <!-- Decorative dots -->
  <circle cx="30" y="380" r="3" fill="#bdc3c7"/>
  <circle cx="45" y="380" r="3" fill="#bdc3c7"/>
  <circle cx="60" y="380" r="3" fill="#bdc3c7"/>
</svg>