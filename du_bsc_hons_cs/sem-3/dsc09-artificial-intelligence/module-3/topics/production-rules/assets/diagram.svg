<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="production-rules" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd1a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6cb873;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c987;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5b46a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9aedf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a88bce;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#666" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section2 { animation: slideInUp 0.6s ease-out 0.3s both; }
    .section3 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section4 { animation: slideInUp 0.6s ease-out 0.5s both; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .rule-box { animation: pulse 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5aa0" class="title">Production Rules in AI</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#2c5aa0" stroke-width="1" stroke-dasharray="4,4" class="title"/>
  
  <!-- Production Memory (Left) -->
  <g class="section1" data-narration="Production Memory stores the rule base containing IF-THEN production rules">
    <rect x="20" y="60" width="110" height="90" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="75" y="82" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Production</text>
    <text x="75" y="98" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Memory</text>
    <text x="75" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="white">(Rule Base)</text>
    <rect x="30" y="130" width="90" height="15" rx="3" fill="white" fill-opacity="0.9"/>
    <text x="75" y="141" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">IF condition</text>
  </g>
  
  <!-- Inference Engine (Center) -->
  <g class="section2" data-narration="Inference Engine performs the match-resolve-act cycle to apply rules">
    <rect x="150" y="60" width="120" height="120" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="210" y="82" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Inference Engine</text>
    <text x="210" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Match-Resolve-Act Cycle</text>
    <!-- Cycle arrows inside -->
    <g transform="translate(175, 115)">
      <path d="M0,20 A20,20 0 0,1 40,20" fill="none" stroke="white" stroke-width="2" class="arrow"/>
      <polygon points="40,15 45,20 40,25" fill="white"/>
      <text x="20" y="35" text-anchor="middle" font-family="Arial" font-size="8" fill="white">MATCH</text>
    </g>
    <g transform="translate(195, 115)">
      <path d="M0,20 A20,20 0 0,1 40,20" fill="none" stroke="white" stroke-width="2" class="arrow"/>
      <polygon points="40,15 45,20 40,25" fill="white"/>
      <text x="20" y="35" text-anchor="middle" font-family="Arial" font-size="8" fill="white">RESOLVE</text>
    </g>
    <g transform="translate(215, 115)">
      <path d="M0,20 A20,20 0 0,1 40,20" fill="none" stroke="white" stroke-width="2" class="arrow"/>
      <polygon points="40,15 45,20 40,25" fill="white"/>
      <text x="20" y="35" text-anchor="middle" font-family="Arial" font-size="8" fill="white">ACT</text>
    </g>
  </g>
  
  <!-- Working Memory (Right) -->
  <g class="section3" data-narration="Working Memory contains current facts and assertions about the problem state">
    <rect x="290" y="60" width="110" height="90" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="345" y="82" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Working</text>
    <text x="345" y="98" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Memory</text>
    <text x="345" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="white">(Facts/Assertions)</text>
    <rect x="300" y="130" width="90" height="15" rx="3" fill="white" fill-opacity="0.9"/>
    <text x="345" y="141" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">fact: value</text>
  </g>
  
  <!-- Arrows between components -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <path d="M130 105 L150 105" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  <path d="M270 105 L290 105" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- IF-THEN Rule Structure Box -->
  <g class="section4" data-narration="Each production rule follows IF-THEN structure: condition triggers action">
    <rect x="80" y="195" width="260" height="75" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="210" y="215" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Production Rule Structure</text>
    <!-- IF part -->
    <rect x="95" y="225" width="100" height="35" rx="5" fill="white" fill-opacity="0.95"/>
    <text x="145" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c5aa0">IF</text>
    <text x="145" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">&lt;condition&gt;</text>
    <!-- THEN part -->
    <rect x="205" y="225" width="120" height="35" rx="5" fill="white" fill-opacity="0.95"/>
    <text x="265" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c5aa0">THEN</text>
    <text x="265" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">&lt;action&gt;</text>
    <!-- Arrow in middle -->
    <text x="200" y="245" text-anchor="middle" font-family="Arial" font-size="16" fill="white">→</text>
  </g>
  
  <!-- External Interface -->
  <g class="section4" data-narration="External Interface connects the production system to external environment">
    <rect x="120" y="285" width="180" height="40" rx="6" fill="#8eb4c8" filter="url(#shadow)"/>
    <text x="210" y="302" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">External Interface</text>
    <text x="210" y="317" text-anchor="middle" font-family="Arial" font-size="9" fill="white">User/Database/Sensors</text>
  </g>
  
  <!-- Arrows from components to external interface -->
  <path d="M175 180 L175 235 L120 285" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="3,3" class="arrow"/>
  <path d="M245 180 L245 235 L300 285" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="3,3" class="arrow"/>
  <path d="M75 150 L75 180 L130 200" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="3,3" class="arrow"/>
  <path d="M345 150 L345 180 L290 200" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="3,3" class="arrow"/>
  
  <!-- Legend/Key at bottom -->
  <g class="section4" data-narration="The production system cycles continuously, updating working memory based on rules">
    <rect x="60" y="335" width="300" height="50" rx="6" fill="white" fill-opacity="0.8" stroke="#aaa" stroke-width="1"/>
    <text x="210" y="352" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">
      <tspan font-weight="bold">Expert System Application:</tspan>
      <tspan> Medical Diagnosis, Financial Planning, Process Control
    </tspan></text>
    <text x="210" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Post (1943) • Newell &amp; Simon (1972)</text>
  </g>
</svg>