<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="semantic-nets-frames-scripts">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="semanticGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="framesGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scriptsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Georgia, serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .box { rx: 8; ry: 8; stroke: #888; stroke-width: 1; }
    .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .node { stroke: #444; stroke-width: 1.5; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-delay-1 { animation-delay: 0.2s; opacity: 0; }
    .anim-delay-2 { animation-delay: 0.4s; opacity: 0; }
    .anim-delay-3 { animation-delay: 0.6s; opacity: 0; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out forwards 0.5s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Semantic Nets, Frames &amp; Scripts</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#888" stroke-width="1" class="anim-fade" style="animation-delay: 0.3s;"/>
  
  <!-- Section 1: Semantic Networks -->
  <g data-narration="Semantic Networks represent knowledge as directed graphs with nodes (concepts) and labeled edges (relationships).">
    <rect x="10" y="50" width="125" height="160" fill="url(#semanticGrad)" class="box anim-slide" style="animation-delay: 0.2s;"/>
    <text x="72" y="68" text-anchor="middle" class="section-title">Semantic Networks</text>
    <text x="20" y="88" class="label">Nodes + Labeled Edges</text>
    
    <!-- Semantic Network Diagram -->
    <g transform="translate(20, 100)">
      <!-- Mammal node -->
      <ellipse cx="30" cy="10" rx="22" ry="12" fill="#fff" class="node"/>
      <text x="30" y="13" text-anchor="middle" class="detail">Mammal</text>
      
      <!-- Dog node -->
      <ellipse cx="10" cy="45" rx="20" ry="12" fill="#fff" class="node"/>
      <text x="10" y="48" text-anchor="middle" class="detail">Dog</text>
      
      <!-- Bird node -->
      <ellipse cx="55" cy="45" rx="22" ry="12" fill="#fff" class="node"/>
      <text x="55" y="48" text-anchor="middle" class="detail">Bird</text>
      
      <!-- Poodle node -->
      <ellipse cx="10" cy="80" rx="24" ry="12" fill="#fff" class="node"/>
      <text x="10" y="83" text-anchor="middle" class="detail">Poodle</text>
      
      <!-- Robin node -->
      <ellipse cx="55" cy="80" rx="24" ry="12" fill="#fff" class="node"/>
      <text x="55" y="83" text-anchor="middle" class="detail">Robin</text>
      
      <!-- Arrows -->
      <line x1="22" y1="22" x2="16" y2="33" class="arrow line-anim"/>
      <text x="38" y="30" class="detail" font-size="8">IS-A</text>
      <line x1="38" y1="22" x2="49" y2="33" class="arrow line-anim"/>
      <text x="50" y="30" class="detail" font-size="8">IS-A</text>
      <line x1="10" y1="57" x2="10" y2="68" class="arrow line-anim"/>
      <text x="18" y="65" class="detail" font-size="8">IS-A</text>
      <line x1="55" y1="57" x2="55" y2="68" class="arrow line-anim"/>
      <text x="63" y="65" class="detail" font-size="8">IS-A</text>
    </g>
  </g>
  
  <!-- Section 2: Frames -->
  <g data-narration="Frames represent knowledge as structured objects with slots (attributes) and default values, mimicking human conceptual schemas.">
    <rect x="145" y="50" width="130" height="160" fill="url(#framesGrad)" class="box anim-slide" style="animation-delay: 0.4s;"/>
    <text x="210" y="68" text-anchor="middle" class="section-title">Frames</text>
    <text x="155" y="88" class="label">Structured Objects</text>
    
    <!-- Frame Example -->
    <g transform="translate(155, 100)">
      <rect x="0" y="0" width="110" height="100" fill="#fff" stroke="#888" rx="5"/>
      <text x="55" y="18" text-anchor="middle" class="detail" font-weight="bold">FRAME: Dog</text>
      <line x1="5" y1="25" x2="105" y2="25" stroke="#ccc"/>
      
      <text x="8" y="40" class="detail">legs: 4</text>
      <text x="8" y="55" class="detail">color: brown</text>
      <text x="8" y="70" class="detail">sound: bark</text>
      <text x="8" y="85" class="detail">eats: meat</text>
      
      <text x="60" y="40" class="detail" fill="#888">[default]</text>
      <text x="60" y="55" class="detail" fill="#888">[default]</text>
      <text x="60" y="70" class="detail" fill="#888">[default]</text>
      <text x="60" y="85" class="detail" fill="#888">[default]</text>
    </g>
  </g>
  
  <!-- Section 3: Scripts -->
  <g data-narration="Scripts capture stereotypical event sequences, enabling systems to predict outcomes and understand narratives.">
    <rect x="285" y="50" width="125" height="160" fill="url(#scriptsGrad)" class="box anim-slide" style="animation-delay: 0.6s;"/>
    <text x="347" y="68" text-anchor="middle" class="section-title">Scripts</text>
    <text x="295" y="88" class="label">Event Sequences</text>
    
    <!-- Script Example -->
    <g transform="translate(295, 100)">
      <rect x="0" y="0" width="105" height="100" fill="#fff" stroke="#888" rx="5"/>
      <text x="52" y="16" text-anchor="middle" class="detail" font-weight="bold">SCRIPT: Restaurant</text>
      <line x1="5" y1="22" x2="100" y2="22" stroke="#ccc"/>
      
      <circle cx="12" cy="35" r="4" fill="#66a6ff"/>
      <text x="20" y="38" class="detail">Enter</text>
      
      <circle cx="12" cy="52" r="4" fill="#66a6ff"/>
      <text x="20" y="55" class="detail">Order</text>
      
      <circle cx="12" cy="69" r="4" fill="#66a6ff"/>
      <text x="20" y="72" class="detail">Eat</text>
      
      <circle cx="12" cy="86" r="4" fill="#66a6ff"/>
      <text x="20" y="89" class="detail">Pay</text>
      
      <path d="M12 40 L12 48" stroke="#999" stroke-width="1" stroke-dasharray="2"/>
      <path d="M12 57 L12 65" stroke="#999" stroke-width="1" stroke-dasharray="2"/>
      <path d="M12 74 L12 82" stroke="#999" stroke-width="1" stroke-dasharray="2"/>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Key comparison points: Semantic Networks use graph structures with inheritance; Frames use slot-filler structures with defaults; Scripts model temporal event sequences.">
    <rect x="10" y="220" width="400" height="165" fill="#fafafa" stroke="#aaa" rx="8" class="anim-fade" style="animation-delay: 0.8s;"/>
    <text x="210" y="242" text-anchor="middle" class="section-title" font-size="13">Key Concepts Comparison</text>
    
    <!-- Comparison Table -->
    <g transform="translate(20, 255)">
      <!-- Headers -->
      <rect x="0" y="0" width="85" height="20" fill="#a8edea" rx="3"/>
      <text x="42" y="14" text-anchor="middle" class="detail" font-weight="bold">Semantic Net</text>
      
      <rect x="90" y="0" width="85" height="20" fill="#d299c2" rx="3"/>
      <text x="132" y="14" text-anchor="middle" class="detail" font-weight="bold">Frame</text>
      
      <rect x="180" y="0" width="85" height="20" fill="#89f7fe" rx="3"/>
      <text x="222" y="14" text-anchor="middle" class="detail" font-weight="bold">Script</text>
      
      <!-- Row 1 -->
      <text x="5" y="32" class="detail" font-weight="bold">Structure</text>
      <text x="5" y="44" class="detail">Directed Graph</text>
      <text x="95" y="44" class="detail">Slot-Filler</text>
      <text x="185" y="44" class="detail">Event Sequence</text>
      
      <!-- Row 2 -->
      <text x="5" y="60" class="detail" font-weight="bold">Use</text>
      <text x="5" y="72" class="detail">Concepts &amp; Relations</text>
      <text x="95" y="72" class="detail">Objects &amp; Attributes</text>
      <text x="185" y="72" class="detail">Stories &amp; Scenarios</text>
      
      <!-- Row 3 -->
      <text x="5" y="88" class="detail" font-weight="bold">Origin</text>
      <text x="5" y="100" class="detail">Quillian 1968</text>
      <text x="95" y="100" class="detail">Minsky 1974</text>
      <text x="185" y="100" class="detail">Schank 1977</text>
    </g>
    
    <!-- Applications -->
    <g transform="translate(290, 280)">
      <text x="55" y="10" text-anchor="middle" class="detail" font-weight="bold" fill="#555">Applications</text>
      <line x1="0" y1="15" x2="110" y2="15" stroke="#ccc"/>
      <text x="5" y="32" class="detail">• Semantic Web</text>
      <text x="5" y="46" class="detail">• Knowledge Graphs</text>
      <text x="5" y="60" class="detail">• NLP Understanding</text>
      <text x="5" y="74" class="detail">• Expert Systems</text>
    </g>
  </g>
  
  <!-- Legend/Key -->
  <g class="anim-fade" style="animation-delay: 1s;">
    <circle cx="30" cy="360" r="5" fill="#a8edea" stroke="#888"/>
    <text x="42" y="364" class="detail">Nodes</text>
    <line x1="80" y1="360" x2="110" y2="360" class="arrow" style="marker-end: url(#arrowhead);"/>
    <text x="115" y="364" class="detail">IS-A</text>
    <rect x="150" y="355" width="12" height="10" fill="#fff" stroke="#888" rx="2"/>
    <text x="167" y="364" class="detail">Slots</text>
    <path d="M200 360 L210 360" stroke="#999" stroke-width="2" stroke-dasharray="3"/>
    <text x="215" y="364" class="detail">Sequence</text>
  </g>
  
  <!-- Footer -->
  <text x="210" y="392" text-anchor="middle" class="detail" fill="#888">AI Knowledge Representation Schemes</text>
</svg>