<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="resolution-unification">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dced"/>
    </linearGradient>
    <linearGradient id="clauseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe0cc"/>
    </linearGradient>
    <linearGradient id="unifyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f3ff"/>
      <stop offset="100%" style="stop-color:#cce0ff"/>
    </linearGradient>
    <linearGradient id="resolventGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6"/>
      <stop offset="100%" style="stop-color:#ccffcc"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .clause-box { animation: slideInLeft 0.6s ease-out forwards; }
    .clause-box-right { animation: slideInRight 0.6s ease-out forwards; }
    .unify-box { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .resolvent-box { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; }
    .label { animation: fadeIn 0.5s ease-out forwards; }
    .concept-box { animation: slideInUp 0.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Resolution &amp; Unification</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555" class="title">Automated Reasoning in AI</text>
  
  <!-- Clause 1 Box -->
  <g class="clause-box" data-narration="Clause 1 represents the first logical disjunction (OR) of literals that we start with">
    <rect x="20" y="70" width="160" height="90" rx="6" fill="url(#clauseGradient)" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d35400">Clause 1</text>
    <text x="100" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">L₁ ∨ L₂ ∨ ... ∨ Lₙ</text>
    <text x="100" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Positive Literals</text>
    <text x="100" y="145" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#333">P(x, f(y))</text>
  </g>
  
  <!-- Clause 2 Box -->
  <g class="clause-box-right" data-narration="Clause 2 represents the second logical disjunction containing complementary literals">
    <rect x="240" y="70" width="160" height="90" rx="6" fill="url(#clauseGradient)" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="320" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d35400">Clause 2</text>
    <text x="320" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">M₁ ∨ M₂ ∨ ... ∨ Mₘ</text>
    <text x="320" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Negative Literals</text>
    <text x="320" y="145" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#333">¬P(a, z)</text>
  </g>
  
  <!-- Arrow from Clause 1 to Unification -->
  <path d="M100 160 L100 190" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Arrow from Clause 2 to Unification -->
  <path d="M320 160 L320 190" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Unification Box -->
  <g class="unify-box" data-narration="Unification finds the Most General Unifier (MGU) that makes complementary literals identical">
    <rect x="140" y="195" width="140" height="70" rx="6" fill="url(#unifyGradient)" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2980b9">Unification</text>
    <text x="210" y="235" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#333">θ = MGU(Lᵢ, ¬Mⱼ)</text>
    <text x="210" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">{x/a, f(y)/z}</text>
  </g>
  
  <!-- Arrow from Unification to Resolvent -->
  <path d="M210 265 L210 295" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Complementary Pair Highlight -->
  <rect x="175" y="165" width="70" height="22" rx="4" fill="#ffcccc" stroke="#e74c3c" stroke-width="1" class="concept-box" data-narration="The complementary literals P and ¬P are identified and unified">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    <text x="210" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c0392b" font-weight="bold">Complementary</text>
  </rect>
  
  <!-- Resolvent Box -->
  <g class="resolvent-box" data-narration="The resolvent is the new clause derived by combining remaining literals after applying the MGU">
    <rect x="80" y="300" width="260" height="70" rx="6" fill="url(#resolventGradient)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e8449">Resolvent</text>
    <text x="210" y="340" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#333">(L₁ ∨ ... ∨ Lₙ ∨ M₁ ∨ ... ∨ Mₘ)θ</text>
    <text x="210" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">- {Literals resolved}</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" transform="translate(10, 370)" data-narration="Key learning points: Resolution is complete for first-order logic, and MGU is unique up to variable renaming">
    <rect x="0" y="0" width="400" height="25" rx="4" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
    <text x="15" y="16" font-family="Arial, sans-serif" font-size="10" fill="#555">
      <tspan font-weight="bold">Key:</tspan> Unification makes expressions identical • Resolution derives new clauses • MGU = Most General Unifier
    </text>
  </g>
  
  <!-- Animated pulse on unification -->
  <circle cx="210" cy="230" r="25" fill="none" stroke="#3498db" stroke-width="2" opacity="0">
    <animate attributeName="r" values="25;35;25" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>