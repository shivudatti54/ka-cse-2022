<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="introduction-to-prolog" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fbdd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ed890;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9b88f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 22px;
      font-weight: bold;
      fill: #2c5aa0;
    }
    .box-title {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      fill: #333;
    }
    .box-text {
      font-family: 'Consolas', monospace;
      font-size: 11px;
      fill: #444;
    }
    .label-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      fill: #555;
    }
    .arrow-line {
      stroke: #666;
      stroke-width: 2;
      fill: none;
    }
    .arrow-head {
      fill: #666;
    }
    .box-rect {
      rx: 8;
      ry: 8;
      stroke: #555;
      stroke-width: 1.5;
    }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text anim-fade">Introduction to Prolog</text>
  <text x="210" y="50" text-anchor="middle" class="label-text anim-fade" style="animation-delay: 0.2s">Logic Programming Paradigm</text>
  
  <!-- Knowledge Base Box -->
  <g class="anim-slide" style="animation-delay: 0.3s" data-narration="The Knowledge Base contains facts and rules - the declarative knowledge that defines the problem domain">
    <rect x="20" y="70" width="170" height="130" fill="url(#boxGradient1)" class="box-rect" filter="url(#shadow)" />
    <text x="105" y="90" text-anchor="middle" class="box-title">Knowledge Base</text>
    <line x1="30" y1="100" x2="180" y2="100" stroke="#777" stroke-width="1" />
    <text x="30" y="118" class="box-text" data-narration="Facts: Basic assertions like parent(tom, mary).">
    <tspan x="30" dy="0">% Facts</tspan>
    <tspan x="30" dy="14">parent(tom, mary).</tspan>
    <tspan x="30" dy="14">likes(john, music).</tspan>
    </text>
    <text x="30" y="168" class="box-text" data-narration="Rules: Conditional statements using :- (if)">
    <tspan x="30" dy="0">% Rules</tspan>
    <tspan x="30" dy="14">grandparent(X,Z) :-</tspan>
    <tspan x="38" dy="12">parent(X,Y),</tspan>
    <tspan x="38" dy="12">parent(Y,Z).</tspan>
    </text>
  </g>
  
  <!-- Query/Goal Box -->
  <g class="anim-slide-right" style="animation-delay: 0.5s" data-narration="The Query is the question asked to the Prolog system - what we want to find out">
    <rect x="230" y="70" width="170" height="130" fill="url(#boxGradient2)" class="box-rect" filter="url(#shadow)" />
    <text x="315" y="90" text-anchor="middle" class="box-title">Query / Goal</text>
    <line x1="240" y1="100" x2="390" y2="100" stroke="#777" stroke-width="1" />
    <text x="240" y="120" class="box-text" data-narration="Ask questions about the knowledge base">
    <tspan x="240" dy="0">% Questions to ask:</tspan>
    <tspan x="240" dy="16">?- parent(tom, X).</tspan>
    <tspan x="240" dy="14">?- grandparent(X, mary).</tspan>
    <tspan x="240" dy="14">?- likes(john, What).</tspan>
    </text>
    <text x="240" y="178" class="box-text" fill="#2a7a2a">
    <tspan x="240" dy="0">Results returned via</tspan>
    <tspan x="240" dy="12">logical inference</tspan>
    </text>
  </g>
  
  <!-- Unification & Backtracking Engine Box -->
  <g class="anim-slide" style="animation-delay: 0.7s" data-narration="The Engine performs unification to match patterns and backtracking to explore alternative solutions">
    <rect x="100" y="230" width="220" height="90" fill="url(#boxGradient3)" class="box-rect" filter="url(#shadow)" />
    <text x="210" y="250" text-anchor="middle" class="box-title">Unification &amp; Backtracking Engine</text>
    <line x1="115" y1="260" x2="305" y2="260" stroke="#777" stroke-width="1" />
    <text x="120" y="280" class="box-text">
    <tspan x="120" dy="0">• Unification: Pattern matching to bind variables</tspan>
    <tspan x="120" dy="16">• Resolution: Proving goals from facts/rules</tspan>
    <tspan x="120" dy="16">• Backtracking: Exploring alternative solutions</tspan>
    </text>
  </g>
  
  <!-- Arrows -->
  <g class="anim-fade" style="animation-delay: 1s">
    <!-- Arrow from Knowledge Base to Engine -->
    <line x1="105" y1="200" x2="105" y2="220" class="arrow-line" />
    <polygon points="105,220 100,212 110,212" class="arrow-head" />
    <text x="70" y="215" class="label-text" font-size="10">provides</text>
    
    <!-- Arrow from Query to Engine -->
    <line x1="315" y1="200" x2="315" y2="220" class="arrow-line" />
    <polygon points="315,220 310,212 320,212" class="arrow-head" />
    <text x="330" y="215" class="label-text" font-size="10">processes</text>
    
    <!-- Arrow from Engine to Results -->
    <line x1="210" y1="320" x2="210" y2="345" class="arrow-line" />
    <polygon points="210,345 205,337 215,337" class="arrow-head" />
    <text x="220" y="338" class="label-text" font-size="10">returns</text>
  </g>
  
  <!-- Bottom Result Box -->
  <g class="anim-fade" style="animation-delay: 1.2s" data-narration="The answer is derived through automated reasoning">
    <rect x="140" y="350" width="140" height="35" fill="#e8f0e8" rx="5" ry="5" stroke="#4a8a4a" stroke-width="1.5" />
    <text x="210" y="368" text-anchor="middle" class="box-text" fill="#2a5a2a" font-size="11">
    <tspan x="210" dy="0">X = mary ;</tspan>
    <tspan x="210" dy="0" font-size="9" fill="#666"> (alternative: X = ann)</tspan>
    </text>
  </g>
  
  <!-- Decorative Prolog Symbol -->
  <g class="anim-pulse" style="animation-delay: 1.5s" data-narration="Prolog uses Horn clauses for logical deduction">
    <circle cx="380" cy="380" r="18" fill="#e8e8f0" stroke="#888" stroke-width="1" />
    <text x="380" y="385" text-anchor="middle" font-family="Consolas, monospace" font-size="14" font-weight="bold" fill="#555">⊢</text>
  </g>
</svg>