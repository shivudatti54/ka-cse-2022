<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="symbolic-vs-data-driven-ai">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5e6f4"/>
      <stop offset="100%" style="stop-color:#e6f0f5"/>
    </linearGradient>
    <linearGradient id="symbolicGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3"/>
      <stop offset="100%" style="stop-color:#8bb8cc"/>
    </linearGradient>
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3d4f0"/>
      <stop offset="100%" style="stop-color:#c4a8d8"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7a8a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #5d6d7e; }
    .box { rx: 8; ry: 8; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title">Symbolic vs Data-Driven AI</text>
  <line x1="60" y1="35" x2="360" y2="35" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Left Section: Symbolic AI -->
  <g data-narration="Symbolic AI Architecture showing expert system components" class="fade-in">
    <rect x="20" y="50" width="180" height="330" rx="10" fill="url(#symbolicGradient)" filter="url(#shadow)" opacity="0.9"/>
    <text x="110" y="70" text-anchor="middle" class="section-title">SYMBOLIC AI</text>
    <text x="110" y="85" text-anchor="middle" class="detail">GOFAI - Expert Systems</text>
    
    <!-- Knowledge Base -->
    <g class="slide-in delay-1">
      <rect x="30" y="100" width="160" height="45" class="box" fill="#ecf0f1" stroke="#2980b9" stroke-width="1.5"/>
      <text x="110" y="118" text-anchor="middle" class="label" font-weight="bold">Knowledge Base</text>
      <text x="110" y="133" text-anchor="middle" class="detail">Facts &amp; Rules</text>
    </g>
    
    <!-- Working Memory -->
    <g class="slide-in delay-2">
      <rect x="30" y="155" width="160" height="45" class="box" fill="#ecf0f1" stroke="#2980b9" stroke-width="1.5"/>
      <text x="110" y="173" text-anchor="middle" class="label" font-weight="bold">Working Memory</text>
      <text x="110" y="188" text-anchor="middle" class="detail">Current Facts</text>
    </g>
    
    <!-- Inference Engine -->
    <g class="slide-in delay-3">
      <rect x="30" y="210" width="160" height="50" class="box" fill="#ecf0f1" stroke="#e74c3c" stroke-width="2"/>
      <text x="110" y="230" text-anchor="middle" class="label" font-weight="bold">Inference Engine</text>
      <text x="110" y="247" text-anchor="middle" class="detail">Forward/Backward Chaining</text>
    </g>
    
    <!-- Arrows connecting components -->
    <g class="fade-in delay-3">
      <line x1="110" y1="145" x2="110" y2="152" stroke="#5a7a8a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <line x1="110" y1="200" x2="110" y2="207" stroke="#5a7a8a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- User Interface -->
    <g class="slide-in delay-4">
      <rect x="30" y="270" width="70" height="35" class="box" fill="#ecf0f1" stroke="#27ae60" stroke-width="1.5"/>
      <text x="65" y="290" text-anchor="middle" class="detail" font-weight="bold">User Interface</text>
    </g>
    
    <!-- Explanation Component -->
    <g class="slide-in delay-4">
      <rect x="110" y="270" width="80" height="35" class="box" fill="#ecf0f1" stroke="#f39c12" stroke-width="1.5"/>
      <text x="150" y="290" text-anchor="middle" class="detail" font-weight="bold">Explanation</text>
    </g>
    
    <!-- Output arrow -->
    <line x1="110" y1="260" x2="110" y2="268" stroke="#5a7a8a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Key characteristics -->
    <g class="float">
      <circle cx="40" cy="320" r="4" fill="#e74c3c"/>
      <text x="50" y="324" class="detail">Rule-based</text>
      <circle cx="110" cy="320" r="4" fill="#e74c3c"/>
      <text x="120" y="324" class="detail">Explainable</text>
      <circle cx="170" cy="320" r="4" fill="#e74c3c"/>
      <text x="180" y="324" class="detail">Logical</text>
    </g>
  </g>
  
  <!-- Right Section: Data-Driven AI -->
  <g data-narration="Data-Driven AI showing neural network approach" class="fade-in delay-2">
    <rect x="220" y="50" width="180" height="330" rx="10" fill="url(#dataGradient)" filter="url(#shadow)" opacity="0.9"/>
    <text x="310" y="70" text-anchor="middle" class="section-title">DATA-DRIVEN AI</text>
    <text x="310" y="85" text-anchor="middle" class="detail">Machine Learning / Deep Learning</text>
    
    <!-- Data Input -->
    <g class="slide-in delay-1">
      <rect x="230" y="100" width="160" height="40" class="box" fill="#ecf0f1" stroke="#9b59b6" stroke-width="1.5"/>
      <text x="310" y="118" text-anchor="middle" class="label" font-weight="bold">Raw Data Input</text>
      <text x="310" y="132" text-anchor="middle" class="detail">Images, Text, Audio</text>
    </g>
    
    <!-- Arrow -->
    <line x1="310" y1="140" x2="310" y2="150" stroke="#5a7a8a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Neural Network -->
    <g class="pulse">
      <rect x="250" y="160" width="120" height="80" rx="10" fill="#ecf0f1" stroke="#8e44ad" stroke-width="2"/>
      <text x="310" y="185" text-anchor="middle" class="label" font-weight="bold">Neural Network</text>
      <text x="310" y="202" text-anchor="middle" class="detail">Deep Learning Layers</text>
      <text x="310" y="220" text-anchor="middle" class="detail">Pattern Recognition</text>
    </g>
    
    <!-- Hidden layers visualization -->
    <g class="fade-in delay-3">
      <line x1="270" y1="180" x2="270" y2="220" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="310" y1="180" x2="310" y2="220" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="350" y1="180" x2="350" y2="220" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,2"/>
    </g>
    
    <!-- Arrow -->
    <line x1="310" y1="240" x2="310" y2="250" stroke="#5a7a8a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Output -->
    <g class="slide-in delay-3">
      <rect x="230" y="260" width="160" height="45" class="box" fill="#ecf0f1" stroke="#16a085" stroke-width="2"/>
      <text x="310" y="280" text-anchor="middle" class="label" font-weight="bold">Learned Output</text>
      <text x="310" y="295" text-anchor="middle" class="detail">Predictions, Classifications</text>
    </g>
    
    <!-- Key characteristics -->
    <g class="float delay-1">
      <circle cx="240" cy="320" r="4" fill="#16a085"/>
      <text x="250" y="324" class="detail">Data-driven</text>
      <circle cx="310" cy="320" r="4" fill="#16a085"/>
      <text x="320" y="324" class="detail">Pattern-based</text>
      <circle cx="260" cy="335" r="4" fill="#16a085"/>
      <text x="270" y="339" class="detail">Scalable</text>
    </g>
  </g>
  
  <!-- VS Divider -->
  <g class="fade-in delay-3">
    <circle cx="210" cy="200" r="20" fill="#2c3e50"/>
    <text x="210" y="205" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">VS</text>
  </g>
  
  <!-- Bottom comparison -->
  <g data-narration="Key differences summary" class="fade-in delay-4">
    <line x1="30" y1="355" x2="390" y2="355" stroke="#7f8c8d" stroke-width="0.5"/>
    <text x="210" y="375" text-anchor="middle" class="detail" font-style="italic">Symbolic: Explicit Rules • Data-Driven: Learned Patterns</text>
    <text x="210" y="390" text-anchor="middle" class="detail" font-style="italic">Hybrid approaches combine both paradigms</text>
  </g>
</svg>