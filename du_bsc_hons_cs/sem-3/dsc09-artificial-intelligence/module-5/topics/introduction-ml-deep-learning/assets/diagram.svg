<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="introduction-ml-deep-learning">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="mlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="dlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#feca57"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; animation: fadeIn 0.8s ease-out; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; animation: fadeIn 1s ease-out; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; animation: slideIn 0.8s ease-out; }
    .section { animation: fadeIn 0.6s ease-out; }
    .circle-ai { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .circle-ml { animation: pulse 3s ease-in-out infinite 0.3s; transform-origin: center; }
    .circle-dl { animation: float 4s ease-in-out infinite; transform-origin: center; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" fill="#2c3e50">Introduction to ML &amp; Deep Learning</text>
  
  <!-- AI Circle (Largest) -->
  <g class="section" data-narration="Artificial Intelligence - The broadest field encompassing all attempts to make machines intelligent">
    <circle cx="210" cy="220" r="150" fill="url(#aiGradient)" class="circle-ai" filter="url(#shadow)" opacity="0.9"/>
    <text x="210" y="95" text-anchor="middle" class="label" font-size="18" fill="white">Artificial Intelligence</text>
    <text x="210" y="115" text-anchor="middle" class="detail" font-size="11" fill="#f0f0f0">The broadest concept</text>
  </g>
  
  <!-- ML Circle (Middle) -->
  <g class="section" data-narration="Machine Learning - A subset of AI where machines learn from data without explicit programming">
    <circle cx="210" cy="220" r="95" fill="url(#mlGradient)" class="circle-ml" filter="url(#shadow)" opacity="0.9"/>
    <text x="210" y="155" text-anchor="middle" class="label" font-size="16" fill="white">Machine Learning</text>
    <text x="210" y="175" text-anchor="middle" class="detail" font-size="11" fill="#e8f5e9">Learn from data</text>
  </g>
  
  <!-- DL Circle (Smallest) -->
  <g class="section" data-narration="Deep Learning - Uses neural networks with multiple layers for hierarchical learning">
    <circle cx="210" cy="220" r="45" fill="url(#dlGradient)" class="circle-dl" filter="url(#shadow)"/>
    <text x="210" y="215" text-anchor="middle" class="label" font-size="14" fill="white">Deep</text>
    <text x="210" y="232" text-anchor="middle" class="label" font-size="14" fill="white">Learning</text>
  </g>
  
  <!-- Arrows showing subset relationship -->
  <g class="section" data-narration="The arrows indicate that ML is a subset of AI, and DL is a subset of ML">
    <line x1="120" y1="280" x2="155" y2="300" stroke="#5c6bc0" stroke-width="2" class="arrow-line"/>
    <line x1="300" y1="280" x2="265" y2="300" stroke="#5c6bc0" stroke-width="2" class="arrow-line"/>
    <polygon points="155,300 165,295 160,285" fill="#5c6bc0"/>
    <polygon points="265,300 255,295 260,285" fill="#5c6bc0"/>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="section" data-narration="Traditional Programming vs Machine Learning - The paradigm shift in how we solve problems">
    <rect x="20" y="310" width="180" height="40" rx="5" fill="#e8f4f8" stroke="#3498db" stroke-width="1"/>
    <text x="110" y="325" text-anchor="middle" class="label" font-size="12" fill="#2c3e50">Traditional Programming</text>
    <text x="110" y="340" text-anchor="middle" class="detail" font-size="10" fill="#5d6d7e">Rules + Data → Output</text>
  </g>
  
  <g class="section" data-narration="Machine Learning approach - Data + Output leads to learned Rules">
    <rect x="220" y="310" width="180" height="40" rx="5" fill="#e8f8f0" stroke="#27ae60" stroke-width="1"/>
    <text x="310" y="325" text-anchor="middle" class="label" font-size="12" fill="#2c3e50">Machine Learning</text>
    <text x="310" y="340" text-anchor="middle" class="detail" font-size="10" fill="#5d6d7e">Data + Output → Rules</text>
  </g>
  
  <!-- Key Features Box -->
  <g class="section" data-narration="Deep Learning features - Automatic feature learning and neural networks">
    <rect x="100" y="355" width="220" height="35" rx="5" fill="#fff3e0" stroke="#e67e22" stroke-width="1"/>
    <text x="210" y="370" text-anchor="middle" class="label" font-size="11" fill="#d35400">Deep Learning: Neural Networks + Auto Feature Learning</text>
  </g>
  
  <!-- Subset Label -->
  <g class="section" data-narration="ML is a subset of AI, meaning all ML is AI but not all AI is ML">
    <text x="370" y="200" text-anchor="middle" class="detail" font-size="10" fill="#5c6bc0" transform="rotate(90, 370, 200)">subset of</text>
  </g>
</svg>