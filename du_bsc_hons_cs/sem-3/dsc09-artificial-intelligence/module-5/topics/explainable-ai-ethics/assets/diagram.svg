<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="explainable-ai-ethics">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="intrinsicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3e6cb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="posthocGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeeba;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="specificGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1ecf1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bee5eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agnosticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d7da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c6cb;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes slideInLeft {
        0% { transform: translateX(-30px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        0% { transform: translateX(30px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      @keyframes drawLine {
        0% { stroke-dashoffset: 100; }
        100% { stroke-dashoffset: 0; }
      }
      .title { animation: fadeIn 0.8s ease-out; }
      .intrinsic-box { animation: slideInLeft 0.6s ease-out 0.2s both; }
      .posthoc-box { animation: slideInRight 0.6s ease-out 0.3s both; }
      .specific-box { animation: slideInUp 0.6s ease-out 0.4s both; }
      .agnostic-box { animation: slideInUp 0.6s ease-out 0.5s both; }
      .connector { animation: drawLine 1s ease-out 0.6s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGrad)" rx="10"/>
  
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c5282" class="title" data-narration="Title: XAI Techniques Classification">Explainable AI (XAI) Techniques</text>
  
  <text x="210" y="46" text-anchor="middle" font-size="11" fill="#4a5568" class="title">Classification Framework</text>
  
  <!-- Main center label -->
  <g class="pulse">
    <rect x="165" y="55" width="90" height="24" rx="4" fill="#4a5568" data-narration="XAI is divided into two main approaches: Intrinsic and Post-hoc"/>
    <text x="210" y="71" text-anchor="middle" font-size="12" fill="white" font-weight="bold">XAI Approaches</text>
  </g>
  
  <!-- Intrinsic Interpretability Box -->
  <g class="intrinsic-box" data-narration="Intrinsic: Models that are inherently interpretable due to their simple structure">
    <rect x="20" y="100" width="140" height="130" rx="8" fill="url(#intrinsicGrad)" stroke="#28a745" stroke-width="2"/>
    <text x="90" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">Intrinsic</text>
    <text x="90" y="136" text-anchor="middle" font-size="10" fill="#155724">Interpretability</text>
    <line x1="30" y1="145" x2="150" y2="145" stroke="#28a745" stroke-width="1" opacity="0.5"/>
    <text x="90" y="160" text-anchor="middle" font-size="10" fill="#155724">• Decision Trees</text>
    <text x="90" y="175" text-anchor="middle" font-size="10" fill="#155724">• Linear Models</text>
    <text x="90" y="190" text-anchor="middle" font-size="10" fill="#155724">• Rule-based Systems</text>
    <text x="90" y="210" text-anchor="middle" font-size="9" fill="#155724" font-style="italic">Self-explaining</text>
  </g>
  
  <!-- Post-hoc Explainability Box -->
  <g class="posthoc-box" data-narration="Post-hoc: Methods applied after model training to explain predictions">
    <rect x="260" y="100" width="140" height="130" rx="8" fill="url(#posthocGrad)" stroke="#ffc107" stroke-width="2"/>
    <text x="330" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">Post-hoc</text>
    <text x="330" y="136" text-anchor="middle" font-size="10" fill="#856404">Explainability</text>
    <line x1="270" y1="145" x2="390" y2="145" stroke="#ffc107" stroke-width="1" opacity="0.5"/>
    <text x="330" y="160" text-anchor="middle" font-size="10" fill="#856404">• LIME</text>
    <text x="330" y="175" text-anchor="middle" font-size="10" fill="#856404">• SHAP</text>
    <text x="330" y="190" text-anchor="middle" font-size="10" fill="#856404">• Feature Importance</text>
    <text x="330" y="210" text-anchor="middle" font-size="9" fill="#856404" font-style="italic">Post-training</text>
  </g>
  
  <!-- Model-specific Box -->
  <g class="specific-box" data-narration="Model-specific: Techniques designed for particular AI model architectures">
    <rect x="20" y="260" width="140" height="85" rx="8" fill="url(#specificGrad)" stroke="#17a2b8" stroke-width="2"/>
    <text x="90" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c5460">Model-specific</text>
    <line x1="30" y1="290" x2="150" y2="290" stroke="#17a2b8" stroke-width="1" opacity="0.5"/>
    <text x="90" y="305" text-anchor="middle" font-size="10" fill="#0c5460">• Grad-CAM</text>
    <text x="90" y="320" text-anchor="middle" font-size="10" fill="#0c5460">• Attention Weights</text>
    <text x="90" y="335" text-anchor="middle" font-size="10" fill="#0c5460">• Tree-based Features</text>
  </g>
  
  <!-- Model-agnostic Box -->
  <g class="agnostic-box" data-narration="Model-agnostic: Methods that work with any machine learning model">
    <rect x="260" y="260" width="140" height="85" rx="8" fill="url(#agnosticGrad)" stroke="#dc3545" stroke-width="2"/>
    <text x="330" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#721c24">Model-agnostic</text>
    <line x1="270" y1="290" x2="390" y2="290" stroke="#dc3545" stroke-width="1" opacity="0.5"/>
    <text x="330" y="305" text-anchor="middle" font-size="10" fill="#721c24">• LIME</text>
    <text x="330" y="320" text-anchor="middle" font-size="10" fill="#721c24">• SHAP</text>
    <text x="330" y="335" text-anchor="middle" font-size="10" fill="#721c24">• Counterfactuals</text>
  </g>
  
  <!-- Connecting lines -->
  <path d="M 165 67 L 90 100" stroke="#666" stroke-width="1.5" fill="none" class="connector" data-narration="Connection from XAI to Intrinsic methods"/>
  <path d="M 255 67 L 330 100" stroke="#666" stroke-width="1.5" fill="none" class="connector" data-narration="Connection from XAI to Post-hoc methods"/>
  <path d="M 130 230 L 90 260" stroke="#666" stroke-width="1.5" fill="none" class="connector"/>
  <path d="M 290 230 L 330 260" stroke="#666" stroke-width="1.5" fill="none" class="connector"/>
  <path d="M 90 230 L 90 260" stroke="#666" stroke-width="1.5" fill="none" class="connector" stroke-dasharray="4,2"/>
  <path d="M 330 230 L 330 260" stroke="#666" stroke-width="1.5" fill="none" class="connector" stroke-dasharray="4,2"/>
  
  <!-- Center arrow labels -->
  <text x="140" y="88" font-size="8" fill="#666">Intrinsic</text>
  <text x="265" y="88" font-size="8" fill="#666">Post-hoc</text>
  
  <!-- Legend/Key -->
  <rect x="145" y="355" width="130" height="35" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="210" y="368" text-anchor="middle" font-size="9" fill="#666" font-weight="bold">Key Insight</text>
  <text x="210" y="382" text-anchor="middle" font-size="8" fill="#888">Balance: Accuracy ↔ Transparency</text>
  
</svg>