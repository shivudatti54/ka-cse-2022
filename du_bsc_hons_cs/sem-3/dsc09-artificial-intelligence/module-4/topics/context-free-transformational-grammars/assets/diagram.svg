<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="context-free-transformational-grammars">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe8cc"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cce8cc"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff"/>
      <stop offset="100%" style="stop-color:#e0ccff"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a9fd4"/>
      <stop offset="100%" style="stop-color:#3d7ab8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box3 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .flow-arrow { animation: flowRight 1.5s ease-in-out infinite; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .main-flow { animation: fadeIn 0.8s ease-out 0.5s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c5282" class="title">Context-Free Transformational</text>
  <text x="210" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#4a6fa5" class="title">Grammars</text>
  <line x1="30" y1="55" x2="390" y2="55" stroke="#8ab4d6" stroke-width="1.5" class="title"/>
  
  <!-- Left Section: CFG Foundation -->
  <g class="box1" data-narration="Context-Free Grammar serves as the foundation with formal definition G=(N, Σ, P, S) where N is non-terminals, Σ is terminals, P is productions, S is start symbol">
    <rect x="15" y="70" width="120" height="85" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="75" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8b5a00">CFG Foundation</text>
    <text x="25" y="108" font-family="Arial, sans-serif" font-size="10" fill="#6b4423">G = (N, Σ, P, S)</text>
    <line x1="25" y1="115" x2="125" y2="115" stroke="#d4a574" stroke-width="0.5"/>
    <text x="25" y="128" font-family="Arial, sans-serif" font-size="9" fill="#5a3d1a">N: Non-terminals</text>
    <text x="25" y="140" font-family="Arial, sans-serif" font-size="9" fill="#5a3d1a">Σ: Terminals</text>
    <text x="25" y="150" font-family="Arial, sans-serif" font-size="9" fill="#5a3d1a">P: Productions</text>
  </g>
  
  <!-- Right Section: Transformational Rules -->
  <g class="box2" data-narration="Transformational rules include Movement, Insertion, and Deletion operations that map deep structure to surface structure">
    <rect x="285" y="70" width="120" height="85" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="345" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5a3d7a">Transform Rules</text>
    <line x1="295" y1="95" x2="395" y2="95" stroke="#b39ddb" stroke-width="0.5"/>
    <text x="295" y="112" font-family="Arial, sans-serif" font-size="9" fill="#4a3060">• Movement</text>
    <text x="295" y="125" font-family="Arial, sans-serif" font-size="9" fill="#4a3060">• Insertion</text>
    <text x="295" y="138" font-family="Arial, sans-serif" font-size="9" fill="#4a3060">• Deletion</text>
    <text x="295" y="151" font-family="Arial, sans-serif" font-size="9" fill="#4a3060">• Substitution</text>
  </g>
  
  <!-- Main Architecture Flow -->
  <g class="main-flow" data-narration="The transformational grammar architecture flows from Phrase Structure through Deep Structure, applies transformations, produces Surface Structure, then Morphophonemics to Phonological output">
    <!-- Flow boxes -->
    <rect x="140" y="165" width="140" height="32" rx="5" fill="#cfe8f5" filter="url(#shadow)"/>
    <text x="210" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e4d6b">Phrase Structure</text>
    <text x="210" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3d7a9e">Base Phrase Marker</text>
    
    <!-- Arrow 1 -->
    <line x1="210" y1="197" x2="210" y2="217" stroke="url(#arrowGradient)" stroke-width="2" class="flow-arrow" stroke-dasharray="5,3"/>
    
    <!-- Deep Structure -->
    <rect x="140" y="220" width="140" height="32" rx="5" fill="#ffe0b2" filter="url(#shadow)"/>
    <text x="210" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6d4c00">Deep Structure</text>
    <text x="210" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8d6e00">Semantic Interpretation</text>
    
    <!-- Arrow 2 -->
    <line x1="210" y1="252" x2="210" y2="272" stroke="url(#arrowGradient)" stroke-width="2" class="flow-arrow" stroke-dasharray="5,3"/>
    
    <!-- Transformations -->
    <rect x="140" y="275" width="140" height="32" rx="5" fill="#e1bee7" filter="url(#shadow)" class="pulse-element"/>
    <text x="210" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a148c">Transformations</text>
    <text x="210" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6a1b9a">Movement, Insert, Delete</text>
    
    <!-- Arrow 3 -->
    <line x1="210" y1="307" x2="210" y2="327" stroke="url(#arrowGradient)" stroke-width="2" class="flow-arrow" stroke-dasharray="5,3"/>
    
    <!-- Surface Structure -->
    <rect x="140" y="330" width="140" height="32" rx="5" fill="#c8e6c9" filter="url(#shadow)"/>
    <text x="210" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Surface Structure</text>
    <text x="210" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#388e3c">Syntactic Form</text>
  </g>
  
  <!-- Side labels -->
  <g class="box3" data-narration="Chomsky's 1957 Syntactic Structures introduced this framework for computational linguistics and AI">
    <rect x="295" y="165" width="110" height="45" rx="5" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="350" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2d5a2d">Historical Note</text>
    <text x="305" y="198" font-family="Arial, sans-serif" font-size="8" fill="#3d703d">Chomsky 1957</text>
    <text x="305" y="208" font-family="Arial, sans-serif" font-size="8" fill="#3d703d">Syntactic Structures</text>
  </g>
  
  <!-- Bottom info -->
  <g class="box3">
    <rect x="15" y="330" width="120" height="55" rx="5" fill="#f5f5f5" filter="url(#shadow)"/>
    <text x="75" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">AI Applications</text>
    <text x="25" y="363" font-family="Arial, sans-serif" font-size="8" fill="#555">• NLP Parsing</text>
    <text x="25" y="375" font-family="Arial, sans-serif" font-size="8" fill="#555">• Machine Translation</text>
    <text x="25" y="382" font-family="Arial, sans-serif" font-size="8" fill="#555">• Language Understanding</text>
  </g>
  
  <!-- Morphophonemics to Phonological -->
  <g class="box3">
    <rect x="295" y="330" width="110" height="55" rx="5" fill="#fce4ec" filter="url(#shadow)"/>
    <text x="350" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#880e4f">Output</text>
    <text x="305" y="363" font-family="Arial, sans-serif" font-size="8" fill="#ad1457">Morphophonemics</text>
    <text x="305" y="375" font-family="Arial, sans-serif" font-size="8" fill="#ad1457">→ Phonological</text>
    <text x="305" y="387" font-family="Arial, sans-serif" font-size="8" fill="#ad1457">Representation</text>
  </g>
  
  <!-- Decorative corner accents -->
  <path d="M5,5 L25,5 L25,15 L5,15 Z" fill="#8ab4d6" opacity="0.4"/>
  <path d="M415,5 L395,5 L395,15 L415,15 Z" fill="#8ab4d6" opacity="0.4"/>
  <path d="M5,395 L25,395 L25,385 L5,385 Z" fill="#8ab4d6" opacity="0.4"/>
  <path d="M415,395 L395,395 L395,385 L415,385 Z" fill="#8ab4d6" opacity="0.4"/>
</svg>