<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="formal-vs-natural-language">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="naturalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="formalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pyramidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9999;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#ffcc99;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#99ccff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#99ff99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes growUp {
      from { transform: scaleY(0); transform-origin: bottom; }
      to { transform: scaleY(1); transform-origin: bottom; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .natural-box { animation: slideInLeft 0.6s ease-out forwards; }
    .formal-box { animation: slideInRight 0.6s ease-out forwards; }
    .pyramid-level { animation: growUp 0.5s ease-out forwards; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .pulse:hover { transform: scale(1.05); }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail-text { font-size: 11px; fill: #555; }
    .pyramid-text { font-size: 10px; font-weight: bold; fill: #333; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title title-text">Formal vs Natural Language</text>
  <line x1="50" y1="35" x2="370" y2="35" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Natural Language Box -->
  <g class="natural-box" data-narration="Natural languages evolved organically through human interaction over thousands of years">
    <rect x="20" y="50" width="170" height="90" rx="8" fill="url(#naturalGrad)" stroke="#e67e22" stroke-width="2"/>
    <text x="105" y="68" text-anchor="middle" class="label-text" fill="#d35400">Natural Language</text>
    <text x="30" y="85" class="detail-text">• Evolved organically</text>
    <text x="30" y="100" class="detail-text">• Context-dependent</text>
    <text x="30" y="115" class="detail-text">• Ambiguous</text>
    <text x="30" y="130" class="detail-text">Examples: English, Hindi</text>
  </g>
  
  <!-- Arrow between boxes -->
  <g class="arrow">
    <line x1="195" y1="95" x2="235" y2="95" stroke="#3498db" stroke-width="2"/>
    <polygon points="235,90 245,95 235,100" fill="#3498db"/>
  </g>
  
  <!-- Formal Language Box -->
  <g class="formal-box" data-narration="Formal languages are precisely defined systems with strict syntactic rules developed for specific purposes">
    <rect x="240" y="50" width="170" height="90" rx="8" fill="url(#formalGrad)" stroke="#2980b9" stroke-width="2"/>
    <text x="325" y="68" text-anchor="middle" class="label-text" fill="#1a5276">Formal Language</text>
    <text x="250" y="85" class="detail-text">• Precisely defined</text>
    <text x="250" y="100" class="detail-text">• Strict rules</text>
    <text x="250" y="115" class="detail-text">• Unambiguous</text>
    <text x="250" y="130" class="detail-text">Examples: Python, Logic</text>
  </g>
  
  <!-- Chomsky Hierarchy Pyramid Title -->
  <text x="210" y="160" text-anchor="middle" class="label-text" data-narration="The Chomsky Hierarchy shows the four types of grammars ordered by their computational power">Chomsky Hierarchy</text>
  
  <!-- Pyramid Levels -->
  <g class="pyramid-level" data-narration="Type 0 (Unrestricted) is the most powerful, containing all formal grammars">
    <!-- Type 0 - Unrestricted -->
    <polygon points="210,175 350,175 280,205" fill="#ff9999" stroke="#e74c3c" stroke-width="1"/>
    <text x="280" y="190" text-anchor="middle" class="pyramid-text">Type 0</text>
    <text x="280" y="200" text-anchor="middle" class="detail-text" font-size="9">Unrestricted</text>
  </g>
  
  <g class="pyramid-level" data-narration="Type 1 (Context-Sensitive) grammars can handle context-dependent languages">
    <polygon points="200,210 340,210 270,240" fill="#ffcc99" stroke="#f39c12" stroke-width="1" style="animation-delay: 0.1s"/>
    <text x="270" y="227" text-anchor="middle" class="pyramid-text">Type 1</text>
    <text x="270" y="237" text-anchor="middle" class="detail-text" font-size="9">Context-Sensitive</text>
  </g>
  
  <g class="pyramid-level" data-narration="Type 2 (Context-Free) grammars are used in programming languages and compilers">
    <polygon points="190,245 330,245 260,275" fill="#99ccff" stroke="#3498db" stroke-width="1" style="animation-delay: 0.2s"/>
    <text x="260" y="262" text-anchor="middle" class="pyramid-text">Type 2</text>
    <text x="260" y="272" text-anchor="middle" class="detail-text" font-size="9">Context-Free</text>
  </g>
  
  <g class="pyramid-level" data-narration="Type 3 (Regular) is the least powerful, used for simple pattern matching">
    <polygon points="180,280 320,280 250,310" fill="#99ff99" stroke="#27ae60" stroke-width="1" style="animation-delay: 0.3s"/>
    <text x="250" y="297" text-anchor="middle" class="pyramid-text">Type 3</text>
    <text x="250" y="307" text-anchor="middle" class="detail-text" font-size="9">Regular</text>
  </g>
  
  <!-- Power Relationship Arrow -->
  <g class="arrow">
    <line x1="365" y1="195" x2="365" y2="290" stroke="#9b59b6" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="360,290 365,300 370,290" fill="#9b59b6"/>
    <text x="375" y="245" class="detail-text" fill="#8e44ad" font-size="9">Power</text>
    <text x="375" y="255" class="detail-text" fill="#8e44ad" font-size="9">↑</text>
  </g>
  
  <!-- Inclusion Arrow (each level includes below) -->
  <g data-narration="Each level includes all languages from the levels below it">
    <text x="105" y="330" class="detail-text" fill="#555">Each level includes:</text>
    <text x="105" y="345" class="detail-text" fill="#555">all languages below</text>
    <line x1="30" y1="355" x2="180" y2="355" stroke="#7f8c8d" stroke-width="1"/>
    <polygon points="30,350 30,360 40,355" fill="#7f8c8d"/>
  </g>
  
  <!-- Key Significance Box -->
  <g data-narration="This concept is crucial for NLP, automated theorem proving, and programming language theory">
    <rect x="200" y="330" width="200" height="55" rx="5" fill="#f8f0fc" stroke="#9b59b6" stroke-width="1"/>
    <text x="300" y="348" text-anchor="middle" class="label-text" fill="#6c3483" font-size="12">Significance in AI</text>
    <text x="210" y="365" class="detail-text">• NLP &amp; Language Processing</text>
    <text x="210" y="378" class="detail-text">• Programming Language Theory</text>
  </g>
  
  <!-- Bottom reference -->
  <text x="210" y="395" text-anchor="middle" class="detail-text" fill="#7f8c8d">DU Semester Exam Topic</text>
</svg>