<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="parsing-techniques" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#4177b8"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47"/>
      <stop offset="100%" style="stop-color:#558b35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .node { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    .leaf { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: white; }
    .section-box { rx: 8; ry: 8; }
    .animated-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animated-slide { animation: slideIn 0.6s ease-out forwards; }
    .animated-pulse { animation: pulse 2s ease-in-out infinite; }
    .line { stroke: #5b9bd5; stroke-width: 2; stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .grammar-box { rx: 5; ry: 5; fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="animated-fade" style="animation-delay: 0.1s">
    <text x="210" y="30" text-anchor="middle" class="title">Parsing Techniques</text>
    <line x1="100" y1="42" x2="320" y2="42" stroke="#5b9bd5" stroke-width="2"/>
  </g>
  
  <!-- Grammar Rules Box -->
  <g class="animated-slide" style="animation-delay: 0.3s" data-narration="The grammar defines production rules: E (Expression) can derive E+T or T, T (Term) can derive T*F or F, and F (Factor) can derive id">
    <rect x="10" y="55" width="180" height="70" class="grammar-box"/>
    <text x="20" y="72" class="label" font-weight="bold">Grammar Rules:</text>
    <text x="20" y="92" class="detail">E → E + T | T</text>
    <text x="20" y="108" class="detail">T → T * F | F</text>
    <text x="20" y="124" class="detail">F → id</text>
  </g>
  
  <!-- Input String Box -->
  <g class="animated-slide" style="animation-delay: 0.4s" data-narration="The input string to be parsed is 'id + id * id', demonstrating operator precedence">
    <rect x="200" y="55" width="210" height="35" class="grammar-box"/>
    <text x="210" y="72" class="label" font-weight="bold">Input: </text>
    <text x="260" y="75" class="leaf" fill="#558b35">id + id * id</text>
  </g>
  
  <!-- Parse Tree Title -->
  <g class="animated-fade" style="animation-delay: 0.5s">
    <text x="210" y="145" text-anchor="middle" class="label" font-weight="bold" font-size="15">Parse Tree Structure</text>
  </g>
  
  <!-- Parse Tree -->
  <g class="animated-fade" style="animation-delay: 0.6s" data-narration="The parse tree shows hierarchical structure: Root E expands to E+T, where E→T*F and T→F, with F→id at leaves">
    <!-- Level 0 - Root -->
    <ellipse cx="210" cy="165" rx="22" ry="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="210" y="170" text-anchor="middle" class="node">E</text>
    
    <!-- Lines from Root -->
    <line x1="195" y1="180" x2="160" y2="205" class="line" style="animation-delay: 0.7s"/>
    <line x1="210" y1="181" x2="210" y2="205" class="line" style="animation-delay: 0.8s"/>
    <line x1="225" y1="180" x2="260" y2="205" class="line" style="animation-delay: 0.9s"/>
    
    <!-- Level 1 -->
    <ellipse cx="160" cy="215" rx="22" ry="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="160" y="220" text-anchor="middle" class="node">E</text>
    
    <ellipse cx="210" cy="215" rx="14" ry="12" fill="#e67e22" filter="url(#shadow)"/>
    <text x="210" y="219" text-anchor="middle" class="leaf" font-size="12">+</text>
    
    <ellipse cx="260" cy="215" rx="22" ry="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="260" y="220" text-anchor="middle" class="node">T</text>
    
    <!-- Lines from Level 1 -->
    <line x1="148" y1="230" x2="130" y2="255" class="line" style="animation-delay: 1s"/>
    <line x1="172" y1="230" x2="190" y2="255" class="line" style="animation-delay: 1.1s"/>
    <line x1="248" y1="230" x2="230" y2="255" class="line" style="animation-delay: 1.2s"/>
    <line x1="272" y1="230" x2="290" y2="255" class="line" style="animation-delay: 1.3s"/>
    
    <!-- Level 2 -->
    <ellipse cx="130" cy="265" rx="22" ry="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="130" y="270" text-anchor="middle" class="node">T</text>
    
    <ellipse cx="190" cy="265" rx="14" ry="12" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="190" y="269" text-anchor="middle" class="leaf" font-size="12">*</text>
    
    <ellipse cx="230" cy="265" rx="22" ry="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="230" y="270" text-anchor="middle" class="node">F</text>
    
    <ellipse cx="290" cy="265" rx="22" ry="16" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="290" y="270" text-anchor="middle" class="leaf">id</text>
    
    <!-- Lines from Level 2 -->
    <line x1="118" y1="280" x2="105" y2="305" class="line" style="animation-delay: 1.4s"/>
    <line x1="142" y1="280" x2="155" y2="305" class="line" style="animation-delay: 1.5s"/>
    <line x1="218" y1="280" x2="205" y2="305" class="line" style="animation-delay: 1.6s"/>
    <line x1="242" y1="280" x2="255" y2="305" class="line" style="animation-delay: 1.7s"/>
    
    <!-- Level 3 -->
    <ellipse cx="105" cy="315" rx="22" ry="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="105" y="320" text-anchor="middle" class="node">F</text>
    
    <ellipse cx="155" cy="315" rx="22" ry="16" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="155" y="320" text-anchor="middle" class="leaf">id</text>
    
    <ellipse cx="205" cy="315" rx="22" ry="16" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="205" y="320" text-anchor="middle" class="leaf">id</text>
    
    <!-- Lines to leaves -->
    <line x1="93" y1="330" x2="85" y2="350" class="line" style="animation-delay: 1.8s"/>
    <line x1="117" y1="330" x2="125" y2="350" class="line" style="animation-delay: 1.9s"/>
    
    <!-- Level 4 - Leaves -->
    <ellipse cx="85" cy="358" rx="18" ry="14" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="85" y="363" text-anchor="middle" class="leaf" font-size="12">id</text>
    
    <ellipse cx="125" cy="358" rx="18" ry="14" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="125" y="363" text-anchor="middle" class="leaf" font-size="12">id</text>
  </g>
  
  <!-- Legend -->
  <g class="animated-fade" style="animation-delay: 2s" data-narration="Legend shows: Non-terminals in blue, Terminals in green, Operators in orange/red">
    <rect x="10" y="340" width="120" height="50" class="grammar-box"/>
    <text x="20" y="358" class="detail" font-weight="bold">Legend:</text>
    <circle cx="30" cy="375" r="6" fill="url(#nodeGradient)"/>
    <text x="45" y="378" class="detail">Non-terminal</text>
    <circle cx="30" cy="388" r="6" fill="url(#leafGradient)"/>
    <text x="45" y="391" class="detail">Terminal (id)</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="animated-pulse" style="animation-delay: 2.2s" data-narration="Key concept: Parsing transforms linear token sequence into hierarchical tree structure representing grammatical relationships">
    <rect x="140" y="340" width="270" height="50" class="section-box" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
    <text x="150" y="358" class="label" font-weight="bold" fill="#856404">Key Concept:</text>
    <text x="150" y="375" class="detail" fill="#856404">Parsing builds hierarchical tree from</text>
    <text x="150" y="388" class="detail" fill="#856404">linear sequence → meaningful structure</text>
  </g>
  
  <!-- Arrow indicating tree flow -->
  <g class="animated-fade" style="animation-delay: 2.5s">
    <path d="M 380 165 L 400 165 L 395 160 M 400 165 L 395 170" stroke="#5b9bd5" stroke-width="2" fill="none"/>
    <text x="385" y="160" class="detail" font-size="10">Root</text>
  </g>
</svg>