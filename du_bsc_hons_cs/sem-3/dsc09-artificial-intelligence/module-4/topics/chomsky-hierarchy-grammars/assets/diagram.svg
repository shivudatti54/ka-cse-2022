<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="chomsky-hierarchy-grammars">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="type0Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="type1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="type2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="type3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .level { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .level-1 { animation-delay: 0.2s; }
    .level-2 { animation-delay: 0.4s; }
    .level-3 { animation-delay: 0.6s; }
    .level-4 { animation-delay: 0.8s; }
    .label { animation: fadeIn 1s ease-out 1s forwards; opacity: 0; }
    .icon { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow { animation: slideInLeft 0.5s ease-out 1.2s forwards; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Chomsky Hierarchy</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="title">Four-Tier Grammar Classification</text>
  
  <!-- Pyramid/Stack Structure -->
  <!-- Type 0 - Unrestricted (Base) -->
  <g class="level level-1" data-narration="Type-0: Unrestricted Grammars - Most powerful, generates recursively enumerable languages">
    <path d="M40 340 L380 340 L340 280 L80 280 Z" fill="url(#type0Grad)" filter="url(#shadow)"/>
    <text x="210" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c0392b">Type-0: Unrestricted</text>
    <text x="210" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7b241c">No restrictions on production rules</text>
    <g class="icon">
      <circle cx="350" cy="310" r="18" fill="#e74c3c" opacity="0.8"/>
      <text x="350" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">TM</text>
    </g>
  </g>
  
  <!-- Type 1 - Context-Sensitive -->
  <g class="level level-2" data-narration="Type-1: Context-Sensitive Grammars - Processed by Linear-Bounded Automata">
    <path d="M80 270 L340 270 L300 210 L120 210 Z" fill="url(#type1Grad)" filter="url(#shadow)"/>
    <text x="210" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a085">Type-1: Context-Sensitive</text>
    <text x="210" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0e6655">αAβ → αγβ, |γ| ≥ 1</text>
    <g class="icon">
      <circle cx="290" cy="240" r="16" fill="#1abc9c" opacity="0.8"/>
      <text x="290" y="244" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">LBA</text>
    </g>
  </g>
  
  <!-- Type 2 - Context-Free -->
  <g class="level level-3" data-narration="Type-2: Context-Free Grammars - Used in programming languages, parsed by Pushdown Automata">
    <path d="M120 200 L300 200 L260 140 L160 140 Z" fill="url(#type2Grad)" filter="url(#shadow)"/>
    <text x="210" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8e44ad">Type-2: Context-Free</text>
    <text x="210" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c3483">A → γ, A ∈ N</text>
    <g class="icon">
      <circle cx="245" cy="170" r="14" fill="#9b59b6" opacity="0.8"/>
      <text x="245" y="174" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">PDA</text>
    </g>
  </g>
  
  <!-- Type 3 - Regular (Top) -->
  <g class="level level-4" data-narration="Type-3: Regular Grammars - Simplest form, recognized by Finite Automata">
    <path d="M160 130 L260 130 L230 80 L190 80 Z" fill="url(#type3Grad)" filter="url(#shadow)"/>
    <text x="215" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">Type-3: Regular</text>
    <text x="215" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a5276">A → aB or A → a</text>
    <g class="icon">
      <circle cx="225" cy="95" r="12" fill="#3498db" opacity="0.8"/>
      <text x="225" y="98" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">FA</text>
    </g>
  </g>
  
  <!-- Hierarchy Arrows -->
  <g class="arrow">
    <path d="M355 330 L355 260" stroke="#c0392b" stroke-width="2" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <path d="M305 250 L275 220" stroke="#16a085" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <path d="M255 170 L225 150" stroke="#8e44ad" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Inclusion Labels -->
  <text x="370" y="300" font-family="Arial, sans-serif" font-size="9" fill="#c0392b" transform="rotate(90, 370, 300)">⊃ contains</text>
  <text x="315" y="230" font-family="Arial, sans-serif" font-size="9" fill="#16a085" transform="rotate(90, 315, 230)">⊃</text>
  <text x="265" y="155" font-family="Arial, sans-serif" font-size="9" fill="#8e44ad" transform="rotate(90, 265, 155)">⊃</text>
  
  <!-- Key Concepts Box -->
  <g class="label" data-narration="The Chomsky Hierarchy shows that each grammar type is a proper subset of the previous type">
    <rect x="10" y="355" width="130" height="35" rx="5" fill="white" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
    <text x="25" y="368" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" font-weight="bold">⊃ = Strict Inclusion</text>
    <text x="25" y="382" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Each type ⊂ previous</text>
  </g>
  
  <!-- Automata Reference Box -->
  <g class="label" data-narration="Each grammar type corresponds to an automaton: Turing Machine, LBA, PDA, and FA">
    <rect x="280" y="355" width="130" height="35" rx="5" fill="white" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
    <text x="290" y="368" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50" font-weight="bold">Automata:</text>
    <text x="290" y="380" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">TM ⊃ LBA ⊃ PDA ⊃ FA</text>
  </g>
  
  <!-- Legend for Automata -->
  <g class="label" data-narration="TM=Turing Machine, LBA=Linear-Bounded Automaton, PDA=Pushdown Automaton, FA=Finite Automaton">
    <rect x="145" y="350" width="130" height="40" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="155" y="362" font-family="Arial, sans-serif" font-size="8" fill="#34495e">TM: Turing Machine</text>
    <text x="155" y="374" font-family="Arial, sans-serif" font-size="8" fill="#34495e">LBA: Linear-Bound</text>
    <text x="155" y="386" font-family="Arial, sans-serif" font-size="8" fill="#34495e">PDA: Pushdown | FA: Finite</text>
  </g>
  
</svg>