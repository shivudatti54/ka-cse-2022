<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ai-background-applications">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="mlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5a2"/>
      <stop offset="100%" style="stop-color:#7cb87a"/>
    </linearGradient>
    <linearGradient id="dlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c6a5"/>
      <stop offset="100%" style="stop-color:#e8a57a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .ai-circle { animation: fadeIn 1s ease-out 0.2s both, pulse 4s ease-in-out 2s infinite; }
    .ml-circle { animation: fadeIn 1s ease-out 0.4s both, pulse 4s ease-in-out 2.5s infinite; }
    .dl-circle { animation: fadeIn 1s ease-out 0.6s both, pulse 4s ease-in-out 3s infinite; }
    .label-ai { animation: slideInLeft 0.8s ease-out 0.8s both; }
    .label-ml { animation: slideInRight 0.8s ease-out 1s both; }
    .label-dl { animation: slideInLeft 0.8s ease-out 1.2s both; }
    .arrow { animation: fadeIn 0.5s ease-out 1.4s both; }
    .info-box { animation: fadeIn 0.6s ease-out 1.5s both, float 3s ease-in-out 2s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title">AI Background &amp; Applications</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" class="title">Hierarchical Relationship</text>
  
  <!-- Outer Circle - AI -->
  <circle cx="210" cy="200" r="130" fill="url(#aiGradient)" stroke="#3d7ea6" stroke-width="3" filter="url(#shadow)" class="ai-circle" data-narration="Artificial Intelligence is the outermost field encompassing all techniques that simulate human intelligence in machines"/>
  
  <!-- Middle Circle - ML -->
  <circle cx="210" cy="200" r="85" fill="url(#mlGradient)" stroke="#5a9e54" stroke-width="2" filter="url(#shadow)" class="ml-circle" data-narration="Machine Learning is a subset of AI that enables systems to learn and improve from experience without explicit programming"/>
  
  <!-- Inner Circle - DL -->
  <circle cx="210" cy="200" r="45" fill="url(#dlGradient)" stroke="#d4824a" stroke-width="2" filter="url(#shadow)" class="dl-circle" data-narration="Deep Learning is a subset of ML using neural networks with multiple layers to learn hierarchical representations"/>
  
  <!-- AI Label -->
  <g class="label-ai" data-narration="AI encompasses visual perception, speech recognition, decision-making, problem-solving, and language translation">
    <rect x="5" y="85" width="85" height="40" fill="#7eb8da" rx="5" stroke="#3d7ea6" stroke-width="1" opacity="0.9"/>
    <text x="47" y="100" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a365d">AI</text>
    <text x="47" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a365d">Full Field</text>
  </g>
  
  <!-- ML Label -->
  <g class="label-ml" data-narration="ML examples include recommendation systems, spam filters, image recognition, and predictive analytics">
    <rect x="330" y="145" width="80" height="50" fill="#a8d5a2" rx="5" stroke="#5a9e54" stroke-width="1" opacity="0.9"/>
    <text x="370" y="162" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1e3a1e">ML</text>
    <text x="370" y="177" text-anchor="middle" font-family="Arial" font-size="8" fill="#1e3a1e">Subset of AI</text>
    <text x="370" y="189" text-anchor="middle" font-family="Arial" font-size="7" fill="#1e3a1e">Learns from data</text>
  </g>
  
  <!-- DL Label -->
  <g class="label-dl" data-narration="DL applications include natural language processing, autonomous vehicles, medical diagnosis, and generative AI">
    <rect x="160" y="295" width="100" height="45" fill="#f5c6a5" rx="5" stroke="#d4824a" stroke-width="1" opacity="0.9"/>
    <text x="210" y="312" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6b3a1a">Deep Learning</text>
    <text x="210" y="327" text-anchor="middle" font-family="Arial" font-size="8" fill="#6b3a1a">Subset of ML</text>
    <text x="210" y="339" text-anchor="middle" font-family="Arial" font-size="7" fill="#6b3a1a">Neural Networks</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow" data-narration="Arrow shows ML is contained within AI">
    <path d="M145 130 L175 160" stroke="#3d7ea6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow" data-narration="Arrow shows DL is contained within ML">
    <path d="M245 130 L225 155" stroke="#5a9e54" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Center Text -->
  <text x="210" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6b3a1a">Neural</text>
  <text x="210" y="208" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6b3a1a">Networks</text>
  
  <!-- Info Box - Applications -->
  <g class="info-box" data-narration="Key applications span healthcare, finance, transportation, entertainment, and education">
    <rect x="10" y="340" width="180" height="50" fill="#fff" rx="5" stroke="#cbd5e0" stroke-width="1" opacity="0.85"/>
    <text x="100" y="355" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2d3748">Applications:</text>
    <text x="100" y="368" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a5568">Healthcare • Finance • Transport</text>
    <text x="100" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a5568">Entertainment • Education</text>
  </g>
  
  <!-- Info Box - Technologies -->
  <g class="info-box" data-narration="Core technologies include machine learning algorithms, natural language processing, and computer vision">
    <rect x="220" y="340" width="190" height="50" fill="#fff" rx="5" stroke="#cbd5e0" stroke-width="1" opacity="0.85"/>
    <text x="315" y="355" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2d3748">Technologies:</text>
    <text x="315" y="368" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a5568">NLP • Computer Vision</text>
    <text x="315" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a5568">Robotics • Expert Systems</text>
  </g>
</svg>