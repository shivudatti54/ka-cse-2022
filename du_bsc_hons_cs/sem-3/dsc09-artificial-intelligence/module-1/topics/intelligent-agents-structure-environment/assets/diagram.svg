<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="intelligent-agents-structure-environment">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="envGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c6f6d5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ae6b4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fed7d7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#feb2b2;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce" />
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38a169" />
    </marker>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .env-anim { animation: slideInLeft 0.8s ease-out forwards; }
    .agent-anim { animation: slideInRight 0.8s ease-out forwards; }
    .arrow-anim { animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0; }
    .box-anim { animation: fadeIn 1.2s ease-out forwards; opacity: 0; }
    .pulse { transform-origin: center; animation: pulse 2s ease-in-out infinite; }
    .line-dashed { stroke-dasharray: 5,5; animation: fadeIn 1s ease-out 0.3s forwards; opacity: 0; }
    text { font-family: Arial, Helvetica, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12" />
  
  <!-- Title -->
  <text x="210" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a365d" text-anchor="middle" class="title-anim">Intelligent Agents</text>
  <text x="210" y="50" font-family="Arial, sans-serif" font-size="12" fill="#2c5282" text-anchor="middle" class="title-anim">Structure &amp; Environment Interaction</text>
  
  <!-- Environment Box -->
  <g class="env-anim" data-narration="The Environment is the world where the agent operates and interacts">
    <rect x="30" y="90" width="120" height="110" fill="url(#envGradient)" stroke="#276749" stroke-width="2" rx="10" />
    <text x="90" y="120" font-size="15" font-weight="bold" fill="#22543d" text-anchor="middle">ENVIRONMENT</text>
    <text x="90" y="145" font-size="10" fill="#276749" text-anchor="middle">World the agent</text>
    <text x="90" y="158" font-size="10" fill="#276749" text-anchor="middle">operates in</text>
    <circle cx="90" cy="180" r="10" fill="#48bb78" class="pulse" />
  </g>
  
  <!-- Agent Box -->
  <g class="agent-anim" data-narration="The Agent perceives environment through sensors, processes information, and takes actions through actuators">
    <rect x="270" y="80" width="120" height="130" fill="url(#agentGradient)" stroke="#c53030" stroke-width="2" rx="10" />
    <text x="330" y="110" font-size="15" font-weight="bold" fill="#742a2a" text-anchor="middle">AGENT</text>
    <text x="330" y="135" font-size="11" fill="#9b2c2c" text-anchor="middle">Percepts → Process →</text>
    <text x="330" y="150" font-size="11" fill="#9b2c2c" text-anchor="middle">Actions</text>
    <circle cx="330" cy="180" r="18" fill="#fc8181" class="pulse" />
    <text x="330" y="185" font-size="9" fill="#742a2a" text-anchor="middle" font-weight="bold">AI</text>
  </g>
  
  <!-- Sensors Arrow (Environment to Agent) -->
  <g class="arrow-anim" data-narration="Sensors collect percepts from the environment">
    <line x1="150" y1="130" x2="260" y2="130" stroke="#3182ce" stroke-width="3" marker-end="url(#arrowheadBlue)" />
    <rect x="175" y="95" width="60" height="24" fill="#ebf8ff" stroke="#3182ce" stroke-width="1" rx="4" />
    <text x="205" y="112" font-size="10" fill="#2c5282" text-anchor="middle" font-weight="bold">SENSORS</text>
    <text x="205" y="135" font-size="9" fill="#3182ce" text-anchor="middle">Percepts</text>
  </g>
  
  <!-- Actuators Arrow (Agent to Environment) -->
  <g class="arrow-anim" data-narration="Actuators execute actions decided by the agent">
    <line x1="270" y1="170" x2="160" y2="170" stroke="#e53e3e" stroke-width="3" marker-end="url(#arrowheadRed)" />
    <rect x="175" y="185" width="60" height="24" fill="#fff5f5" stroke="#e53e3e" stroke-width="1" rx="4" />
    <text x="205" y="202" font-size="10" fill="#c53030" text-anchor="middle" font-weight="bold">ACTUATORS</text>
    <text x="205" y="222" font-size="9" fill="#e53e3e" text-anchor="middle">Actions</text>
  </g>
  
  <!-- Feedback Loop Arrow (Environment bottom to Sensors) -->
  <g class="line-dashed" data-narration="The agent continuously perceives and acts in a feedback loop">
    <path d="M 90 200 Q 90 260 120 260 L 150 260" stroke="#38a169" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowheadGreen)" />
    <text x="125" y="278" font-size="9" fill="#276749" text-anchor="middle">Feedback Loop</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="box-anim" data-narration="Key properties: Autonomy, Perception, Action, Goal-directed behavior">
    <rect x="20" y="300" width="180" height="85" fill="#fffaf0" stroke="#dd6b20" stroke-width="1.5" rx="6" />
    <text x="110" y="320" font-size="11" font-weight="bold" fill="#c05621" text-anchor="middle">KEY PROPERTIES</text>
    <text x="30" y="340" font-size="9" fill="#744210">• Autonomy</text>
    <text x="30" y="355" font-size="9" fill="#744210">• Perception</text>
    <text x="30" y="370" font-size="9" fill="#744210">• Action</text>
    <text x="110" y="340" font-size="9" fill="#744210">• Goal-directed</text>
    <text x="110" y="355" font-size="9" fill="#744210">• Reasoning</text>
    <text x="110" y="370" font-size="9" fill="#744210">• Learning</text>
  </g>
  
  <g class="box-anim" data-narration="The agent function maps percept sequences to actions">
    <rect x="220" y="300" width="180" height="85" fill="#f0fff4" stroke="#276749" stroke-width="1.5" rx="6" />
    <text x="310" y="320" font-size="11" font-weight="bold" fill="#22543d" text-anchor="middle">AGENT FUNCTION</text>
    <text x="230" y="342" font-size="9" fill="#276749">f: P* → A</text>
    <text x="310" y="342" font-size="9" fill="#276749">Percepts → Actions</text>
    <text x="230" y="360" font-size="9" fill="#276749">Sensors → Agent →</text>
    <text x="290" y="360" font-size="9" fill="#276749">Actuators</text>
    <text x="230" y="378" font-size="8" fill="#276749">Standard Model:</text>
    <text x="305" y="378" font-size="8" fill="#276749">S→A→E</text>
  </g>
  
  <!-- Cycle Arrows on Agent -->
  <g class="arrow-anim">
    <path d="M 305 160 Q 295 145 315 145" stroke="#c53030" stroke-width="1.5" fill="none" marker-end="url(#arrowheadRed)" />
  </g>
</svg>