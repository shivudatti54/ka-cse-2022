<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="turing-test-types-of-ai">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="judgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90a4"/>
    </linearGradient>
    <linearGradient id="humanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8fd4a8"/>
      <stop offset="100%" style="stop-color:#5ba87a"/>
    </linearGradient>
    <linearGradient id="machineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c987"/>
      <stop offset="100%" style="stop-color:#d4a96a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { animation: fadeIn 0.8s ease-out; }
    .section-box { animation: slideInLeft 0.6s ease-out backwards; }
    .ai-type { animation: slideInRight 0.6s ease-out backwards; }
    .connection-line { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .float-element { animation: float 3s ease-in-out infinite; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="50" rx="8" fill="url(#headerGradient)" filter="url(#shadow)"/>
  <text x="210" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" class="title-text">Turing Test &amp; Types of AI</text>
  
  <!-- Turing Test Setup Section -->
  <g data-narration="The Turing Test setup shows a judge communicating with two hidden entities - a human and a machine - through text only">
    <rect x="15" y="70" width="190" height="150" rx="8" fill="white" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)" class="section-box" style="animation-delay: 0.2s"/>
    <text x="110" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d5a6b">Turing Test Setup</text>
    
    <!-- Judge -->
    <rect x="60" y="100" width="100" height="35" rx="5" fill="url(#judgeGradient)" class="pulse-element"/>
    <text x="110" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">JUDGE</text>
    
    <!-- Communication Lines -->
    <line x1="110" y1="135" x2="110" y2="160" stroke="#4a90a4" stroke-width="2" stroke-dasharray="5,3" class="connection-line"/>
    <line x1="60" y1="160" x2="160" y2="160" stroke="#4a90a4" stroke-width="2" class="connection-line" style="animation-delay: 0.3s"/>
    
    <!-- Human Contestant -->
    <rect x="30" y="170" width="70" height="40" rx="5" fill="url(#humanGradient)" class="float-element" style="animation-delay: 0.4s"/>
    <text x="65" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Human</text>
    <text x="65" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Contestant</text>
    
    <!-- Machine Contestant -->
    <rect x="120" y="170" width="70" height="40" rx="5" fill="url(#machineGradient)" class="float-element" style="animation-delay: 0.6s"/>
    <text x="155" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Machine</text>
    <text x="155" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Contestant</text>
    
    <!-- Decision Arrow -->
    <path d="M 180 145 L 220 145" stroke="#4a90a4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Types of AI Section -->
  <g data-narration="AI is classified into three types: Artificial Narrow Intelligence (ANI) for specialized tasks, Artificial General Intelligence (AGI) for human-level reasoning, and Artificial Super Intelligence (ASI) for surpassing human intelligence">
    <rect x="215" y="70" width="190" height="150" rx="8" fill="white" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)" class="section-box" style="animation-delay: 0.3s"/>
    <text x="310" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d5a6b">Types of AI</text>
    
    <!-- ANI -->
    <rect x="225" y="100" width="170" height="28" rx="5" fill="#e8d4e8" stroke="#9b6b9b" stroke-width="1" class="ai-type" style="animation-delay: 0.4s"/>
    <text x="235" y="115" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b3b6b">ANI</text>
    <text x="270" y="115" font-family="Arial, sans-serif" font-size="10" fill="#4a2a4a">Narrow/Specialized</text>
    
    <!-- AGI -->
    <rect x="225" y="135" width="170" height="28" rx="5" fill="#d4e8d4" stroke="#6b9b6b" stroke-width="1" class="ai-type" style="animation-delay: 0.5s"/>
    <text x="235" y="150" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b6b3b">AGI</text>
    <text x="270" y="150" font-family="Arial, sans-serif" font-size="10" fill="#2a4a2a">General/Human-level</text>
    
    <!-- ASI -->
    <rect x="225" y="170" width="170" height="28" rx="5" fill="#e8e4d4" stroke="#9b966b" stroke-width="1" class="ai-type" style="animation-delay: 0.6s"/>
    <text x="235" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b643b">ASI</text>
    <text x="270" y="185" font-family="Arial, sans-serif" font-size="10" fill="#4a482a">Super/Supersedes Human</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="The Turing Test evaluates whether a machine can mimic human responses well enough to fool a judge, establishing a benchmark for AI intelligence">
    <rect x="15" y="230" width="390" height="60" rx="8" fill="white" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)" class="fade-in" style="animation-delay: 0.7s"/>
    <text x="30" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d5a6b">Key Concept:</text>
    <text x="30" y="268" font-family="Arial, sans-serif" font-size="11" fill="#4a6a7a">Turing Test: Judge chats with hidden human &amp; machine. If judge cannot</text>
    <text x="30" y="282" font-family="Arial, sans-serif" font-size="11" fill="#4a6a7a">distinguish, machine passes → exhibits human-like intelligence.</text>
  </g>
  
  <!-- Result/Decision Section -->
  <g data-narration="The test outcome determines whether the machine demonstrates intelligence comparable to humans based on conversational ability alone">
    <rect x="220" y="300" width="185" height="90" rx="8" fill="white" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)" class="fade-in" style="animation-delay: 0.8s"/>
    <text x="312" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d5a6b">Test Outcome</text>
    
    <!-- Pass/Fail boxes -->
    <rect x="235" y="330" width="70" height="25" rx="4" fill="#d4f0d4" stroke="#6b9b6b"/>
    <text x="270" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3b6b3b">PASS</text>
    <text x="270" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a8a5a">(cannot distinguish)</text>
    
    <rect x="315" y="330" width="70" height="25" rx="4" fill="#f0d4d4" stroke="#9b6b6b"/>
    <text x="350" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6b3b3b">FAIL</text>
    <text x="350" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8a5a5a">(can distinguish)</text>
  </g>
  
  <!-- Communication Channel Info -->
  <g data-narration="Text-only communication ensures the test focuses on intellectual capacity rather than physical appearance or voice">
    <rect x="15" y="300" width="195" height="90" rx="8" fill="white" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)" class="fade-in" style="animation-delay: 0.9s"/>
    <text x="112" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d5a6b">Communication Channel</text>
    
    <!-- Text icon representation -->
    <rect x="50" y="335" width="125" height="45" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <line x1="60" y1="350" x2="160" y2="350" stroke="#999" stroke-width="2"/>
    <line x1="60" y1="360" x2="140" y2="360" stroke="#999" stroke-width="2"/>
    <line x1="60" y1="370" x2="120" y2="370" stroke="#999" stroke-width="2"/>
    
    <text x="112" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Text-Based Only</text>
  </g>
  
  <!-- Arrow connectors between sections -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90a4"/>
    </marker>
  </defs>
  
  <!-- Animated decorative elements -->
  <circle cx="30" cy="380" r="4" fill="#7eb8da" class="pulse-element" style="animation-delay: 1s"/>
  <circle cx="50" cy="375" r="3" fill="#8fd4a8" class="pulse-element" style="animation-delay: 1.2s"/>
  <circle cx="70" cy="380" r="4" fill="#f0c987" class="pulse-element" style="animation-delay: 1.4s"/>
  <circle cx="390" cy="380" r="4" fill="#7eb8da" class="pulse-element" style="animation-delay: 1.1s"/>
  <circle cx="370" cy="375" r="3" fill="#8fd4a8" class="pulse-element" style="animation-delay: 1.3s"/>
</svg>