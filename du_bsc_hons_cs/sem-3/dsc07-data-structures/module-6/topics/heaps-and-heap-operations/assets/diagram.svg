<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="heaps-and-heap-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4ecf4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .tree-node { animation: slideIn 0.5s ease-out forwards; }
    .array-cell { animation: slideIn 0.5s ease-out forwards; }
    .arrow { stroke-dasharray: 50; animation: drawLine 0.5s ease-out forwards; }
    .concept-box { animation: fadeIn 1s ease-out forwards; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title">Heaps And Heap Operations</text>
  
  <!-- Tree Section -->
  <g data-narration="Binary Tree Representation - Complete binary tree showing max-heap with parent nodes greater than or equal to children">
    <text x="80" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c5282">Binary Tree</text>
    <!-- Edges -->
    <line x1="80" y1="90" x2="45" y2="140" stroke="#666" stroke-width="2" class="arrow"/>
    <line x1="80" y1="90" x2="115" y2="140" stroke="#666" stroke-width="2" class="arrow"/>
    <line x1="45" y1="150" x2="25" y2="195" stroke="#666" stroke-width="2" class="arrow"/>
    <line x1="45" y1="150" x2="65" y2="195" stroke="#666" stroke-width="2" class="arrow"/>
    <line x1="115" y1="150" x2="95" y2="195" stroke="#666" stroke-width="2" class="arrow"/>
    <line x1="115" y1="150" x2="135" y2="195" stroke="#666" stroke-width="2" class="arrow"/>
    
    <!-- Nodes -->
    <circle cx="80" cy="80" r="20" fill="url(#nodeGradient)" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.1s"/>
    <text x="80" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">50</text>
    
    <circle cx="45" cy="145" r="18" fill="url(#nodeGradient)" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.2s"/>
    <text x="45" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">30</text>
    
    <circle cx="115" cy="145" r="18" fill="url(#nodeGradient)" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.3s"/>
    <text x="115" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">20</text>
    
    <circle cx="25" cy="200" r="16" fill="url(#nodeGradient)" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.4s"/>
    <text x="25" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">15</text>
    
    <circle cx="65" cy="200" r="16" fill="url(#nodeGradient)" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.5s"/>
    <text x="65" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">10</text>
    
    <circle cx="95" cy="200" r="16" fill="url(#nodeGradient)" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.6s"/>
    <text x="95" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">8</text>
    
    <circle cx="135" cy="200" r="16" fill="url(#nodeGradient)" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.7s"/>
    <text x="135" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">7</text>
  </g>
  
  <!-- Array Section -->
  <g data-narration="Array Representation - Sequential storage showing indices and values. Parent at i has children at 2i+1 and 2i+2">
    <text x="280" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c5282">Array Representation</text>
    <rect x="230" y="65" width="180" height="150" fill="white" stroke="#ccc" rx="5"/>
    
    <!-- Array header -->
    <text x="245" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">Index:</text>
    <text x="285" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">0</text>
    <text x="305" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">1</text>
    <text x="325" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">2</text>
    <text x="345" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">3</text>
    <text x="365" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">4</text>
    <text x="385" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">5</text>
    <text x="400" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">6</text>
    
    <line x1="230" y1="88" x2="410" y2="88" stroke="#ccc"/>
    
    <!-- Array values -->
    <text x="245" y="112" font-family="Arial, sans-serif" font-size="13" fill="#666">Val:</text>
    <rect x="283" y="98" width="18" height="22" fill="url(#arrayGradient)" rx="3" class="array-cell" style="animation-delay: 0.2s"/>
    <text x="292" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">50</text>
    
    <rect x="303" y="98" width="18" height="22" fill="url(#arrayGradient)" rx="3" class="array-cell" style="animation-delay: 0.3s"/>
    <text x="312" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">30</text>
    
    <rect x="323" y="98" width="18" height="22" fill="url(#arrayGradient)" rx="3" class="array-cell" style="animation-delay: 0.4s"/>
    <text x="332" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">20</text>
    
    <rect x="343" y="98" width="18" height="22" fill="url(#arrayGradient)" rx="3" class="array-cell" style="animation-delay: 0.5s"/>
    <text x="352" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">15</text>
    
    <rect x="363" y="98" width="18" height="22" fill="url(#arrayGradient)" rx="3" class="array-cell" style="animation-delay: 0.6s"/>
    <text x="372" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">10</text>
    
    <rect x="383" y="98" width="18" height="22" fill="url(#arrayGradient)" rx="3" class="array-cell" style="animation-delay: 0.7s"/>
    <text x="392" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">8</text>
    
    <rect x="398" y="98" width="18" height="22" fill="url(#arrayGradient)" rx="3" class="array-cell" style="animation-delay: 0.8s"/>
    <text x="407" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">7</text>
    
    <!-- Formula -->
    <text x="280" y="145" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">Parent(i): (i-1)/2</text>
    <text x="280" y="160" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">Left(i): 2i+1</text>
    <text x="280" y="175" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">Right(i): 2i+2</text>
  </g>
  
  <!-- Key Concepts -->
  <g data-narration="Max-Heap Property - Every parent node is greater than or equal to its children, ensuring root contains maximum element">
    <rect x="10" y="230" width="195" height="55" fill="white" stroke="#4a90d9" stroke-width="2" rx="5" class="concept-box" style="animation-delay: 0.3s"/>
    <text x="20" y="248" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c5282">Max-Heap Property</text>
    <text x="20" y="265" font-family="Arial, sans-serif" font-size="11" fill="#555">Parent ≥ Children</text>
    <text x="20" y="278" font-family="Arial, sans-serif" font-size="11" fill="#555">Root = Maximum</text>
  </g>
  
  <g data-narration="Time Complexity - Heap operations provide O(log n) efficiency for insert and delete operations">
    <rect x="215" y="230" width="195" height="55" fill="white" stroke="#5cb85c" stroke-width="2" rx="5" class="concept-box" style="animation-delay: 0.4s"/>
    <text x="225" y="248" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c5282">Time Complexity</text>
    <text x="225" y="265" font-family="Arial, sans-serif" font-size="11" fill="#555">Insert: O(log n)</text>
    <text x="225" y="278" font-family="Arial, sans-serif" font-size="11" fill="#555">Delete Max: O(log n)</text>
  </g>
  
  <g data-narration="Applications - Heaps used in Priority Queues, Heap Sort, Dijkstra's Algorithm, and Task Scheduling">
    <rect x="10" y="295" width="195" height="50" fill="white" stroke="#9b59b6" stroke-width="2" rx="5" class="concept-box" style="animation-delay: 0.5s"/>
    <text x="20" y="312" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c5282">Applications</text>
    <text x="20" y="329" font-family="Arial, sans-serif" font-size="11" fill="#555">Priority Queue, Heap Sort</text>
    <text x="20" y="342" font-family="Arial, sans-serif" font-size="11" fill="#555">Dijkstra, Scheduling</text>
  </g>
  
  <g data-narration="Complete Binary Tree - All levels filled except possibly last, filled left to right enabling array storage">
    <rect x="215" y="295" width="195" height="50" fill="white" stroke="#e74c3c" stroke-width="2" rx="5" class="concept-box" style="animation-delay: 0.6s"/>
    <text x="225" y="312" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c5282">Complete Tree</text>
    <text x="225" y="329" font-family="Arial, sans-serif" font-size="11" fill="#555">All levels filled</text>
    <text x="225" y="342" font-family="Arial, sans-serif" font-size="11" fill="#555">Last: left to right</text>
  </g>
  
  <!-- Connection arrows between tree and array -->
  <g data-narration="Index mapping - Showing correspondence between tree nodes and array indices">
    <path d="M170 80 L230 105" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4" fill="none" class="arrow" style="animation-delay: 0.8s"/>
    <path d="M145 145 L280 105" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4" fill="none" class="arrow" style="animation-delay: 0.9s"/>
    <path d="M195 145 L330 105" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4" fill="none" class="arrow" style="animation-delay: 1.0s"/>
  </g>
  
  <!-- Highlight box -->
  <rect x="10" y="355" width="400" height="35" fill="#fff9e6" stroke="#f39c12" stroke-width="1" rx="3" class="concept-box" style="animation-delay: 0.7s"/>
  <text x="20" y="375" font-family="Arial, sans-serif" font-size="12" fill="#7f6000">Heap Property: Max-Heap ensures parent (50) ≥ children (30, 20) ≥ grandchildren</text>
</svg>