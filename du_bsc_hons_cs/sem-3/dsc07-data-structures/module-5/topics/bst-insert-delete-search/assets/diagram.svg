<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="bst-insert-delete-search">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e5f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="searchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="insertGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e65100;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deleteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1a237e; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .concept-box { fill: #fff; stroke: #ccc; stroke-width: 1; rx: 8; }
    .node { fill: url(#nodeGradient); stroke: #1b5e20; stroke-width: 2; }
    .node-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .edge { stroke: #555; stroke-width: 2; fill: none; }
    .arrow { fill: #1976d2; }
    .op-node { stroke-width: 2; }
    .op-search { fill: url(#searchGradient); stroke: #0d47a1; }
    .op-insert { fill: url(#insertGradient); stroke: #bf360c; }
    .op-delete { fill: url(#deleteGradient); stroke: #b71c1c; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Binary Search Tree Operations</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4caf50" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- BST Structure Diagram -->
  <g class="slide-left" style="animation-delay: 0.5s" data-narration="BST Structure: Shows hierarchical organization with root 50, left subtree values less than root, right subtree values greater than root">
    <text x="30" y="65" class="label" font-weight="bold">BST Structure</text>
    <!-- Edges -->
    <line x1="210" y1="100" x2="130" y2="150" class="edge draw" style="animation-delay: 0.8s"/>
    <line x1="210" y1="100" x2="290" y2="150" class="edge draw" style="animation-delay: 0.9s"/>
    <line x1="130" y1="150" x2="90" y2="200" class="edge draw" style="animation-delay: 1.0s"/>
    <line x1="130" y1="150" x2="170" y2="200" class="edge draw" style="animation-delay: 1.1s"/>
    <line x1="290" y1="150" x2="250" y2="200" class="edge draw" style="animation-delay: 1.2s"/>
    <line x1="290" y1="150" x2="330" y2="200" class="edge draw" style="animation-delay: 1.3s"/>
    
    <!-- Nodes -->
    <circle cx="210" cy="100" r="22" class="node pulse"/>
    <text x="210" y="100" class="node-text">50</text>
    
    <circle cx="130" cy="150" r="18" class="node"/>
    <text x="130" y="150" class="node-text">20</text>
    
    <circle cx="290" cy="150" r="18" class="node"/>
    <text x="290" y="150" class="node-text">60</text>
    
    <circle cx="90" cy="200" r="15" class="node"/>
    <text x="90" y="200" class="node-text">10</text>
    
    <circle cx="170" cy="200" r="15" class="node"/>
    <text x="170" y="200" class="node-text">30</text>
    
    <circle cx="250" cy="200" r="15" class="node"/>
    <text x="250" y="200" class="node-text">70</text>
    
    <circle cx="330" cy="200" r="15" class="node"/>
    <text x="330" y="200" class="node-text">80</text>
  </g>
  
  <!-- BST Property Box -->
  <g class="slide-up" style="animation-delay: 1.5s" data-narration="BST Property: Left child &lt; Parent &lt; Right child">
    <rect x="270" y="230" width="140" height="50" class="concept-box"/>
    <text x="340" y="248" text-anchor="middle" class="label" font-size="12" font-weight="bold">BST Property</text>
    <text x="340" y="265" text-anchor="middle" class="detail">Left &lt; Root &lt; Right</text>
  </g>
  
  <!-- Operations Section -->
  <g class="slide-right" style="animation-delay: 1.8s" data-narration="Three fundamental operations: Search (O(h)), Insert (O(h)), Delete (O(h))">
    <text x="30" y="300" class="label" font-weight="bold">Operations (Time: O(h))</text>
    
    <!-- Search -->
    <g>
      <circle cx="70" cy="335" r="18" class="op-node op-search"/>
      <text x="70" y="335" class="node-text" font-size="11">?</text>
      <rect x="95" y="325" width="70" height="20" rx="4" fill="#e3f2fd" stroke="#2196f3"/>
      <text x="130" y="339" text-anchor="middle" class="detail" fill="#1565c0">Search</text>
    </g>
    
    <!-- Insert -->
    <g>
      <circle cx="180" cy="335" r="18" class="op-node op-insert"/>
      <text x="180" y="335" class="node-text" font-size="11">+</text>
      <rect x="205" y="325" width="70" height="20" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="240" y="339" text-anchor="middle" class="detail" fill="#e65100">Insert</text>
    </g>
    
    <!-- Delete -->
    <g>
      <circle cx="290" cy="335" r="18" class="op-node op-delete"/>
      <text x="290" y="335" class="node-text" font-size="11">×</text>
      <rect x="315" y="325" width="70" height="20" rx="4" fill="#ffebee" stroke="#f44336"/>
      <text x="350" y="339" text-anchor="middle" class="detail" fill="#c62828">Delete</text>
    </g>
  </g>
  
  <!-- Complexity Box -->
  <g class="slide-up" style="animation-delay: 2.1s" data-narration="Time complexity: O(h) where h is height. Best case O(log n) for balanced tree">
    <rect x="20" y="355" width="180" height="35" class="concept-box"/>
    <text x="110" y="372" text-anchor="middle" class="label" font-size="12">Time: O(h) | Best: O(log n)</text>
    <text x="110" y="385" text-anchor="middle" class="detail">h = height of tree</text>
  </g>
  
  <!-- Search Path Arrow -->
  <g class="fade-in" style="animation-delay: 2.4s" data-narration="Search path example: 50 → 20 → 30 (finding 30)">
    <path d="M 210 130 Q 180 160 150 175" fill="none" stroke="#2196f3" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="145,170 155,175 150,185" class="arrow"/>
    <text x="155" y="160" class="detail" fill="#1565c0" font-size="10">Search: 50→20→30</text>
  </g>
  
  <!-- Insert Arrow -->
  <g class="fade-in" style="animation-delay: 2.7s" data-narration="Insert operation: Find correct leaf position and add new node">
    <path d="M 70 355 Q 100 370 130 365" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="125,360 135,365 130,375" fill="#ff9800"/>
    <text x="80" y="380" class="detail" fill="#e65100" font-size="10">Insert: Add at leaf</text>
  </g>
  
  <!-- Delete Arrow -->
  <g class="fade-in" style="animation-delay: 3.0s" data-narration="Delete operation: Three cases - leaf, one child, two children (replace with successor)">
    <path d="M 180 355 Q 220 365 260 360" fill="none" stroke="#f44336" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="255,355 265,360 260,370" fill="#f44336"/>
    <text x="200" y="380" class="detail" fill="#c62828" font-size="10">Delete: 3 cases</text>
  </g>
  
  <!-- Delete Cases Box -->
  <g class="slide-right" style="animation-delay: 3.3s" data-narration="Delete cases: 1) Leaf node - remove directly 2) One child - replace with child 3) Two children - replace with inorder successor">
    <rect x="210" y="355" width="200" height="40" class="concept-box"/>
    <text x="310" y="368" text-anchor="middle" class="label" font-size="11" font-weight="bold">Delete Cases</text>
    <text x="310" y="382" text-anchor="middle" class="detail">1) Leaf  2) One child  3) Two children</text>
    <text x="310" y="392" text-anchor="middle" class="detail">(use inorder successor)</text>
  </g>
</svg>