<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="bst-time-complexity-analysis" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="50%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#fce4ec"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#4caf50"/>
    </linearGradient>
    <linearGradient id="nodeGradientSkewed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a65"/>
      <stop offset="100%" style="stop-color:#e64a19"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2e7d32; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #37474f; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #546e7a; }
    .complexity { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    .node { rx: 4; ry: 4; }
    .edge { stroke: #78909c; stroke-width: 2; fill: none; }
    .box { fill: #ffffff; stroke: #bdbdbd; stroke-width: 1; rx: 5; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">BST Time Complexity Analysis</text>
  
  <!-- Balanced BST Section -->
  <g transform="translate(20, 60)" data-narration="Balanced BST with height log(n), providing efficient O(log n) operations">
    <text x="90" y="0" text-anchor="middle" class="label anim-fade" style="animation-delay: 0.2s">Balanced BST</text>
    <!-- Edges -->
    <path d="M90 45 L50 90" class="edge anim-line" style="animation-delay: 0.5s"/>
    <path d="M90 45 L130 90" class="edge anim-line" style="animation-delay: 0.6s"/>
    <path d="M50 90 L30 135" class="edge anim-line" style="animation-delay: 0.7s"/>
    <path d="M50 90 L70 135" class="edge anim-line" style="animation-delay: 0.8s"/>
    <path d="M130 90 L110 135" class="edge anim-line" style="animation-delay: 0.9s"/>
    <path d="M130 90 L150 135" class="edge anim-line" style="animation-delay: 1s"/>
    <!-- Nodes -->
    <circle cx="90" cy="35" r="16" class="node anim-pulse" fill="url(#nodeGradient)" style="animation-delay: 0.3s"/>
    <text x="90" y="39" text-anchor="middle" fill="white" font-size="11" font-weight="bold">50</text>
    <circle cx="50" cy="80" r="14" class="node" fill="url(#nodeGradient)" style="animation-delay: 0.4s"/>
    <text x="50" y="84" text-anchor="middle" fill="white" font-size="10" font-weight="bold">25</text>
    <circle cx="130" cy="80" r="14" class="node" fill="url(#nodeGradient)" style="animation-delay: 0.4s"/>
    <text x="130" y="84" text-anchor="middle" fill="white" font-size="10" font-weight="bold">75</text>
    <circle cx="30" cy="125" r="12" class="node" fill="url(#nodeGradient)" style="animation-delay: 0.5s"/>
    <text x="30" y="129" text-anchor="middle" fill="white" font-size="9" font-weight="bold">10</text>
    <circle cx="70" cy="125" r="12" class="node" fill="url(#nodeGradient)" style="animation-delay: 0.5s"/>
    <text x="70" y="129" text-anchor="middle" fill="white" font-size="9" font-weight="bold">35</text>
    <circle cx="110" cy="125" r="12" class="node" fill="url(#nodeGradient)" style="animation-delay: 0.5s"/>
    <text x="110" y="129" text-anchor="middle" fill="white" font-size="9" font-weight="bold">60</text>
    <circle cx="150" cy="125" r="12" class="node" fill="url(#nodeGradient)" style="animation-delay: 0.5s"/>
    <text x="150" y="129" text-anchor="middle" fill="white" font-size="9" font-weight="bold">90</text>
    <!-- Height label -->
    <text x="90" y="155" text-anchor="middle" class="detail">Height = 3 (log₂7)</text>
    <text x="90" y="170" text-anchor="middle" class="complexity" fill="#2e7d32">O(log n)</text>
  </g>
  
  <!-- Skewed BST Section -->
  <g transform="translate(220, 60)" data-narration="Skewed BST forming a linked list with height n, resulting in O(n) time complexity">
    <text x="90" y="0" text-anchor="middle" class="label anim-fade" style="animation-delay: 0.2s">Skewed BST</text>
    <!-- Edges -->
    <path d="M90 45 L90 80" class="edge anim-line" style="animation-delay: 0.5s"/>
    <path d="M90 80 L90 115" class="edge anim-line" style="animation-delay: 0.6s"/>
    <path d="M90 115 L90 150" class="edge anim-line" style="animation-delay: 0.7s"/>
    <path d="M90 150 L90 185" class="edge anim-line" style="animation-delay: 0.8s"/>
    <path d="M90 185 L90 220" class="edge anim-line" style="animation-delay: 0.9s"/>
    <path d="M90 220 L90 255" class="edge anim-line" style="animation-delay: 1s"/>
    <!-- Nodes -->
    <circle cx="90" cy="35" r="16" class="node anim-pulse" fill="url(#nodeGradientSkewed)" style="animation-delay: 0.3s"/>
    <text x="90" y="39" text-anchor="middle" fill="white" font-size="11" font-weight="bold">50</text>
    <circle cx="90" cy="70" r="14" class="node" fill="url(#nodeGradientSkewed)" style="animation-delay: 0.4s"/>
    <text x="90" y="74" text-anchor="middle" fill="white" font-size="10" font-weight="bold">60</text>
    <circle cx="90" cy="105" r="12" class="node" fill="url(#nodeGradientSkewed)" style="animation-delay: 0.45s"/>
    <text x="90" y="109" text-anchor="middle" fill="white" font-size="9" font-weight="bold">70</text>
    <circle cx="90" cy="140" r="12" class="node" fill="url(#nodeGradientSkewed)" style="animation-delay: 0.5s"/>
    <text x="90" y="144" text-anchor="middle" fill="white" font-size="9" font-weight="bold">80</text>
    <circle cx="90" cy="175" r="12" class="node" fill="url(#nodeGradientSkewed)" style="animation-delay: 0.55s"/>
    <text x="90" y="179" text-anchor="middle" fill="white" font-size="9" font-weight="bold">90</text>
    <circle cx="90" cy="210" r="12" class="node" fill="url(#nodeGradientSkewed)" style="animation-delay: 0.6s"/>
    <text x="90" y="214" text-anchor="middle" fill="white" font-size="9" font-weight="bold">95</text>
    <circle cx="90" cy="245" r="12" class="node" fill="url(#nodeGradientSkewed)" style="animation-delay: 0.65s"/>
    <text x="90" y="249" text-anchor="middle" fill="white" font-size="9" font-weight="bold">99</text>
    <!-- Height label -->
    <text x="90" y="270" text-anchor="middle" class="detail">Height = 7 (= n)</text>
    <text x="90" y="285" text-anchor="middle" class="complexity" fill="#c62828">O(n)</text>
  </g>
  
  <!-- Comparison Arrow -->
  <g transform="translate(185, 180)" data-narration="Comparison showing the critical difference between balanced and unbalanced trees">
    <text x="0" y="0" text-anchor="middle" font-size="20" fill="#78909c">↔</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g transform="translate(20, 300)" data-narration="Key takeaway: Balance is essential for BST performance">
    <rect x="0" y="0" width="180" height="90" class="box anim-slide-left"/>
    <text x="90" y="20" text-anchor="middle" class="label" font-weight="bold" fill="#1565c0">Key Concepts</text>
    <text x="10" y="40" class="detail">• Average case: O(log n)</text>
    <text x="10" y="55" class="detail">• Worst case: O(n)</text>
    <text x="10" y="70" class="detail">• Height matters!</text>
    <text x="10" y="85" class="detail">• Use self-balancing trees</text>
  </g>
  
  <!-- Operations Box -->
  <g transform="translate(220, 300)" data-narration="Time complexity for basic BST operations">
    <rect x="0" y="0" width="180" height="90" class="box anim-slide-right"/>
    <text x="90" y="20" text-anchor="middle" class="label" font-weight="bold" fill="#1565c0">Operations</text>
    <text x="10" y="40" class="detail">Search: O(log n) / O(n)</text>
    <text x="10" y="55" class="detail">Insert: O(log n) / O(n)</text>
    <text x="10" y="70" class="detail">Delete: O(log n) / O(n)</text>
    <text x="10" y="85" class="detail">Traversal: O(n)</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="4" fill="#81c784" class="anim-pulse"/>
  <circle cx="390" cy="380" r="4" fill="#ff8a65" class="anim-pulse" style="animation-delay: 0.5s"/>
</svg>