<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="asymptotic-analysis">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="graphGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .complexity-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
    .box-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .box-text { font-family: Arial, sans-serif; font-size: 11px; fill: #f0f0f0; }
    .axis-label { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .legend-text { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-draw { stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawLine 2s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
    .delay-6 { animation-delay: 1.2s; opacity: 0; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Asymptotic Analysis</text>
  <text x="210" y="50" text-anchor="middle" class="label fade-in" style="font-size: 12px;">Complexity Growth Comparison</text>

  <!-- Graph Area -->
  <g transform="translate(50, 80)">
    <!-- Graph Background -->
    <rect x="0" y="0" width="280" height="200" fill="url(#graphGradient)" rx="5" filter="url(#shadow)" class="fade-in"/>
    
    <!-- Grid Lines -->
    <g class="fade-in delay-1">
      <line x1="0" y1="50" x2="280" y2="50" stroke="#ddd" stroke-width="0.5"/>
      <line x1="0" y1="100" x2="280" y2="100" stroke="#ddd" stroke-width="0.5"/>
      <line x1="0" y1="150" x2="280" y2="150" stroke="#ddd" stroke-width="0.5"/>
      <line x1="0" y1="200" x2="280" y2="200" stroke="#ddd" stroke-width="0.5"/>
    </g>
    
    <!-- Axes -->
    <line x1="0" y1="200" x2="280" y2="200" stroke="#333" stroke-width="1.5" class="fade-in delay-1"/>
    <line x1="0" y1="0" x2="0" y2="200" stroke="#333" stroke-width="1.5" class="fade-in delay-1"/>
    
    <!-- X-axis labels -->
    <text x="0" y="218" class="axis-label">0</text>
    <text x="70" y="218" class="axis-label">25</text>
    <text x="140" y="218" class="axis-label">50</text>
    <text x="210" y="218" class="axis-label">75</text>
    <text x="270" y="218" class="axis-label">100</text>
    <text x="140" y="238" class="axis-label" text-anchor="middle">Input Size (n)</text>
    
    <!-- Y-axis labels -->
    <text x="-8" y="200" class="axis-label" text-anchor="end">0</text>
    <text x="-8" y="150" class="axis-label" text-anchor="end">25</text>
    <text x="-8" y="100" class="axis-label" text-anchor="end">50</text>
    <text x="-8" y="50" class="axis-label" text-anchor="end">75</text>
    <text x="-8" y="10" class="axis-label" text-anchor="end">100</text>
    
    <!-- Complexity Curves -->
    <!-- O(1) - Constant -->
    <path d="M 0 30 L 280 30" stroke="#27ae60" stroke-width="3" fill="none" class="line-draw delay-1"/>
    
    <!-- O(log n) - Logarithmic -->
    <path d="M 0 200 Q 20 150, 50 120 Q 100 80, 150 60 Q 200 45, 280 35" stroke="#3498db" stroke-width="3" fill="none" class="line-draw delay-2"/>
    
    <!-- O(n) - Linear -->
    <path d="M 0 200 L 280 30" stroke="#9b59b6" stroke-width="3" fill="none" class="line-draw delay-3"/>
    
    <!-- O(n²) - Quadratic -->
    <path d="M 0 200 Q 50 195, 80 180 Q 120 150, 150 120 Q 180 80, 200 50 Q 220 20, 235 5" stroke="#e74c3c" stroke-width="3" fill="none" class="line-draw delay-4"/>
    
    <!-- O(2^n) - Exponential (shoots off chart) -->
    <path d="M 0 200 Q 20 199, 30 195 Q 40 180, 50 150 Q 60 80, 70 5" stroke="#f39c12" stroke-width="3" fill="none" class="line-draw delay-5"/>
  </g>

  <!-- Legend/Key -->
  <g transform="translate(340, 90)" class="slide-in delay-2">
    <rect x="0" y="0" width="75" height="160" fill="#2c3e50" rx="5" filter="url(#shadow)"/>
    <text x="37" y="20" text-anchor="middle" class="box-title">Complexities</text>
    
    <rect x="5" y="30" width="15" height="3" fill="#27ae60"/>
    <text x="25" y="35" class="legend-text">O(1)</text>
    
    <rect x="5" y="50" width="15" height="3" fill="#3498db"/>
    <text x="25" y="55" class="legend-text">O(log n)</text>
    
    <rect x="5" y="70" width="15" height="3" fill="#9b59b6"/>
    <text x="25" y="75" class="legend-text">O(n)</text>
    
    <rect x="5" y="90" width="15" height="3" fill="#e74c3c"/>
    <text x="25" y="95" class="legend-text">O(n²)</text>
    
    <rect x="5" y="110" width="15" height="3" fill="#f39c12"/>
    <text x="25" y="115" class="legend-text">O(2ⁿ)</text>
  </g>

  <!-- Complexity Explanation Boxes -->
  
  <!-- O(1) Box -->
  <g transform="translate(20, 295)" class="fade-in delay-3 slide-in" filter="url(#shadow)" data-narration="Constant Time O(1): The algorithm takes the same amount of time regardless of input size.">
    <rect width="85" height="45" fill="#27ae60" rx="4"/>
    <text x="42" y="18" text-anchor="middle" class="box-title" font-size="12">O(1)</text>
    <text x="42" y="32" text-anchor="middle" class="box-text">Constant</text>
    <text x="42" y="42" text-anchor="middle" class="box-text" font-size="9">Array access</text>
  </g>
  
  <!-- O(log n) Box -->
  <g transform="translate(115, 295)" class="fade-in delay-4 slide-in" filter="url(#shadow)" data-narration="Logarithmic Time O(log n): Time grows slowly as input increases. Common in binary search.">
    <rect width="85" height="45" fill="#3498db" rx="4"/>
    <text x="42" y="18" text-anchor="middle" class="box-title" font-size="12">O(log n)</text>
    <text x="42" y="32" text-anchor="middle" class="box-text">Logarithmic</text>
    <text x="42" y="42" text-anchor="middle" class="box-text" font-size="9">Binary search</text>
  </g>
  
  <!-- O(n) Box -->
  <g transform="translate(210, 295)" class="fade-in delay-5 slide-in" filter="url(#shadow)" data-narration="Linear Time O(n): Time grows directly proportional to input size. Common in simple loops.">
    <rect width="85" height="45" fill="#9b59b6" rx="4"/>
    <text x="42" y="18" text-anchor="middle" class="box-title" font-size="12">O(n)</text>
    <text x="42" y="32" text-anchor="middle" class="box-text">Linear</text>
    <text x="42" y="42" text-anchor="middle" class="box-text" font-size="9">Simple search</text>
  </g>
  
  <!-- O(n²) Box -->
  <g transform="translate(305, 295)" class="fade-in delay-6 slide-in" filter="url(#shadow)" data-narration="Quadratic Time O(n²): Time grows with square of input. Common in nested loops.">
    <rect width="85" height="45" fill="#e74c3c" rx="4"/>
    <text x="42" y="18" text-anchor="middle" class="box-title" font-size="12">O(n²)</text>
    <text x="42" y="32" text-anchor="middle" class="box-text">Quadratic</text>
    <text x="42" y="42" text-anchor="middle" class="box-text" font-size="9">Bubble sort</text>
  </g>

  <!-- Arrow indicating growth direction -->
  <g class="fade-in delay-6">
    <path d="M 355 280 L 355 260" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="355" y="250" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="bold">Slower → Faster</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <rect x="20" y="350" width="370" height="35" fill="#34495e" rx="4" class="fade-in delay-6"/>
  <text x="205" y="368" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="11">
    Choose algorithms with lower complexity for better scalability
  </text>
  <text x="205" y="382" text-anchor="middle" fill="#bdc3c7" font-family="Arial" font-size="10">
    As n → ∞, the difference between O(n) and O(n²) becomes significant
  </text>
</svg>