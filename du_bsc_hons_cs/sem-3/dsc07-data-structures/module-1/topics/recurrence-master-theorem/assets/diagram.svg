<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="recurrence-master-theorem" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { animation: fadeIn 0.8s ease-out forwards; }
    .formula-box { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .case-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .diamond { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out forwards; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; }
    .formula-text { font-family: 'Courier New', monospace; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text label-text" font-size="20" font-weight="bold" fill="#2c3e50">Master Theorem</text>
  <text x="210" y="50" text-anchor="middle" class="title-text label-text" font-size="12" fill="#5d6d7e">Recurrence Solution Guide</text>
  
  <!-- Recurrence Formula Box -->
  <g class="formula-box" data-narration="The general form of divide-and-conquer recurrence: a subproblems, b division factor, f(n) is combining cost">
    <rect x="60" y="65" width="300" height="45" rx="8" fill="#fff" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="85" text-anchor="middle" class="formula-text label-text" font-size="18" fill="#2c3e50">T(n) = aT(n/b) + f(n)</text>
    <text x="210" y="102" text-anchor="middle" class="label-text" font-size="11" fill="#7f8c8d">where a ≥ 1, b > 1</text>
  </g>
  
  <!-- Decision Diamond -->
  <g class="case-box" data-narration="Compare f(n) with n^log_b(a) to determine which case applies" style="animation-delay: 0.4s">
    <polygon points="210,130 250,160 210,190 170,160" fill="#f39c12" stroke="#e67e22" stroke-width="2" filter="url(#shadow)" class="diamond"/>
    <text x="210" y="155" text-anchor="middle" class="label-text" font-size="11" font-weight="bold" fill="#fff">Compare</text>
    <text x="210" y="168" text-anchor="middle" class="label-text" font-size="9" fill="#fff">f(n) vs</text>
    <text x="210" y="180" text-anchor="middle" class="label-text" font-size="9" fill="#fff">n^log↓b(a)</text>
  </g>
  
  <!-- Case 1 -->
  <g class="case-box" data-narration="Case 1: If f(n) = O(n^log_b(a-ε)) for ε>0, then T(n) = Θ(n^log_b(a))" style="animation-delay: 0.6s">
    <rect x="20" y="210" width="115" height="70" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2" filter="url(#shadow)"/>
    <text x="77" y="230" text-anchor="middle" class="label-text" font-size="13" font-weight="bold" fill="#fff">Case 1</text>
    <text x="77" y="248" text-anchor="middle" class="label-text" font-size="9" fill="#e8f8f5">f(n) &lt; n^log↓b(a)</text>
    <text x="77" y="265" text-anchor="middle" class="label-text" font-size="10" font-weight="bold" fill="#fff">Θ(n^log_b a)</text>
  </g>
  
  <!-- Case 2 -->
  <g class="case-box" data-narration="Case 2: If f(n) = Θ(n^log_b(a)), then T(n) = Θ(n^log_b(a) log n)" style="animation-delay: 0.8s">
    <rect x="152" y="210" width="115" height="70" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
    <text x="209" y="230" text-anchor="middle" class="label-text" font-size="13" font-weight="bold" fill="#fff">Case 2</text>
    <text x="209" y="248" text-anchor="middle" class="label-text" font-size="9" fill="#e8f8f5">f(n) ≈ n^log↓b(a)</text>
    <text x="209" y="265" text-anchor="middle" class="label-text" font-size="10" font-weight="bold" fill="#fff">Θ(n^log_b a · log n)</text>
  </g>
  
  <!-- Case 3 -->
  <g class="case-box" data-narration="Case 3: If f(n) = Ω(n^log_b(a+ε)) and regularity condition holds, then T(n) = Θ(f(n))" style="animation-delay: 1s">
    <rect x="285" y="210" width="115" height="70" rx="8" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
    <text x="342" y="230" text-anchor="middle" class="label-text" font-size="13" font-weight="bold" fill="#fff">Case 3</text>
    <text x="342" y="248" text-anchor="middle" class="label-text" font-size="9" fill="#f5eef8">f(n) > n^log↓b(a)</text>
    <text x="342" y="265" text-anchor="middle" class="label-text" font-size="10" font-weight="bold" fill="#fff">Θ(f(n))</text>
  </g>
  
  <!-- Arrows from diamond to cases -->
  <path d="M170,160 L135,210" stroke="#7f8c8d" stroke-width="2" fill="none" class="arrow-line" style="animation-delay: 0.5s"/>
  <path d="M210,190 L210,210" stroke="#7f8c8d" stroke-width="2" fill="none" class="arrow-line" style="animation-delay: 0.6s"/>
  <path d="M250,160 L295,210" stroke="#7f8c8d" stroke-width="2" fill="none" class="arrow-line" style="animation-delay: 0.7s"/>
  
  <!-- Comparison Labels -->
  <g class="case-box" data-narration="Polynomial difference parameter ε determines which case" style="animation-delay: 1.2s">
    <rect x="20" y="295" width="180" height="35" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1" opacity="0.9"/>
    <text x="110" y="312" text-anchor="middle" class="label-text" font-size="11" fill="#2c3e50">ε > 0 (polynomial difference)</text>
    <text x="110" y="326" text-anchor="middle" class="label-text" font-size="10" fill="#7f8c8d">for Cases 1 &amp; 3</text>
  </g>
  
  <!-- Example Box -->
  <g class="case-box" data-narration="Example: Merge Sort has T(n)=2T(n/2)+Θ(n), falls under Case 2 with Θ(n log n)" style="animation-delay: 1.4s">
    <rect x="215" y="295" width="185" height="35" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1" opacity="0.9"/>
    <text x="307" y="312" text-anchor="middle" class="label-text" font-size="11" fill="#2c3e50">Example: Merge Sort</text>
    <text x="307" y="326" text-anchor="middle" class="label-text" font-size="10" fill="#7f8c8d">T(n)=2T(n/2)+Θ(n) → Θ(n log n)</text>
  </g>
  
  <!-- Arrow from case 2 to example -->
  <path d="M209,280 L209,295" stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="370" r="15" fill="#3498db" opacity="0.2"/>
  <circle cx="390" cy="30" r="20" fill="#9b59b6" opacity="0.2"/>
  <circle cx="400" cy="380" r="25" fill="#27ae60" opacity="0.15"/>
</svg>