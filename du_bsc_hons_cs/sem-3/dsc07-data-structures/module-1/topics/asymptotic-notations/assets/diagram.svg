<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="asymptotic-notations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes drawLine { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: white; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #334155; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #64748b; }
    .axis-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #64748b; }
    .complexity-line { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    
    .anim-fade { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.5s ease-out forwards; opacity: 0; }
    .anim-draw { animation: drawLine 1.5s ease-out forwards; stroke-dasharray: 500; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .anim-float { animation: float 3s ease-in-out infinite; }
    
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Bar -->
  <rect x="0" y="0" width="420" height="42" fill="url(#titleGradient)"/>
  <text x="210" y="27" text-anchor="middle" class="title">Asymptotic Notations</text>
  
  <!-- Graph Area -->
  <g transform="translate(45, 55)">
    <!-- Grid -->
    <g stroke="#cbd5e1" stroke-width="0.5">
      <line x1="30" y1="20" x2="30" y2="200"/>
      <line x1="30" y1="200" x2="260" y2="200"/>
      <line x1="30" y1="160" x2="260" y2="160" stroke-dasharray="3,3"/>
      <line x1="30" y1="120" x2="260" y2="120" stroke-dasharray="3,3"/>
      <line x1="30" y1="80" x2="260" y2="80" stroke-dasharray="3,3"/>
      <line x1="30" y1="40" x2="260" y2="40" stroke-dasharray="3,3"/>
    </g>
    
    <!-- Complexity Curves -->
    <!-- O(1) - constant -->
    <path d="M30,30 L260,30" class="complexity-line anim-draw" stroke="#22c55e" style="animation-delay: 0.1s"/>
    
    <!-- O(log n) - logarithmic -->
    <path d="M30,200 Q50,150 80,120 T130,80 T180,55 T230,40 T260,32" class="complexity-line anim-draw" stroke="#3b82f6" style="animation-delay: 0.2s"/>
    
    <!-- O(n) - linear -->
    <path d="M30,200 L260,30" class="complexity-line anim-draw" stroke="#f97316" style="animation-delay: 0.3s"/>
    
    <!-- O(n log n) - linearithmic -->
    <path d="M30,200 Q80,180 130,140 T180,90 T230,50 T260,30" class="complexity-line anim-draw" stroke="#ec4899" style="animation-delay: 0.4s"/>
    
    <!-- O(n²) - quadratic -->
    <path d="M30,200 Q100,190 150,140 T200,60 T230,25" class="complexity-line anim-draw" stroke="#a855f7" style="animation-delay: 0.5s"/>
    
    <!-- O(2^n) - exponential -->
    <path d="M30,200 L60,195 L90,180 L120,150 L150,100 L180,50 L200,25 L220,10 L235,5" class="complexity-line anim-draw" stroke="#ef4444" style="animation-delay: 0.6s"/>
    
    <!-- Axis Labels -->
    <text x="145" y="220" text-anchor="middle" class="axis-label">Input Size (n)</text>
    <text x="12" y="115" text-anchor="middle" class="axis-label" transform="rotate(-90, 12, 115)">Time Complexity</text>
    
    <!-- X axis markers -->
    <text x="30" y="215" text-anchor="middle" class="detail">0</text>
    <text x="85" y="215" text-anchor="middle" class="detail">n/4</text>
    <text x="145" y="215" text-anchor="middle" class="detail">n/2</text>
    <text x="200" y="215" text-anchor="middle" class="detail">3n/4</text>
    <text x="260" y="215" text-anchor="middle" class="detail">n</text>
  </g>
  
  <!-- Legend Box -->
  <g transform="translate(20, 265)" class="anim-fade delay-3" data-narration="Legend showing growth rates from fastest to slowest">
    <rect x="0" y="0" width="250" height="70" rx="8" fill="white" filter="url(#shadow)"/>
    
    <!-- O(1) -->
    <rect x="10" y="10" width="10" height="10" rx="2" fill="#22c55e"/>
    <text x="25" y="19" class="label" font-weight="600">O(1)</text>
    <text x="55" y="19" class="detail">Constant</text>
    
    <!-- O(log n) -->
    <rect x="10" y="28" width="10" height="10" rx="2" fill="#3b82f6"/>
    <text x="25" y="37" class="label" font-weight="600">O(log n)</text>
    <text x="70" y="37" class="detail">Logarithmic</text>
    
    <!-- O(n) -->
    <rect x="10" y="46" width="10" height="10" rx="2" fill="#f97316"/>
    <text x="25" y="55" class="label" font-weight="600">O(n)</text>
    <text x="50" y="55" class="detail">Linear</text>
    
    <!-- O(n log n) -->
    <rect x="115" y="10" width="10" height="10" rx="2" fill="#ec4899"/>
    <text x="130" y="19" class="label" font-weight="600">O(n log n)</text>
    <text x="185" y="19" class="detail">Linearithmic</text>
    
    <!-- O(n²) -->
    <rect x="115" y="28" width="10" height="10" rx="2" fill="#a855f7"/>
    <text x="130" y="37" class="label" font-weight="600">O(n²)</text>
    <text x="160" y="37" class="detail">Quadratic</text>
    
    <!-- O(2^n) -->
    <rect x="115" y="46" width="10" height="10" rx="2" fill="#ef4444"/>
    <text x="130" y="55" class="label" font-weight="600">O(2ⁿ)</text>
    <text x="165" y="55" class="detail">Exponential</text>
  </g>
  
  <!-- Notation Summary Boxes -->
  <g transform="translate(280, 265)" data-narration="Big O provides upper bound - worst case scenario">
    <rect x="0" y="0" width="130" height="38" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1" class="anim-slide delay-4" filter="url(#shadow)"/>
    <text x="65" y="16" text-anchor="middle" class="label" font-weight="bold" fill="#c2410c">Big O</text>
    <text x="65" y="30" text-anchor="middle" class="detail">Upper Bound</text>
  </g>
  
  <g transform="translate(280, 310)" data-narration="Big Omega provides lower bound - best case scenario">
    <rect x="0" y="0" width="130" height="38" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" class="anim-slide delay-5" filter="url(#shadow)"/>
    <text x="65" y="16" text-anchor="middle" class="label" font-weight="bold" fill="#15803d">Ω Omega</text>
    <text x="65" y="30" text-anchor="middle" class="detail">Lower Bound</text>
  </g>
  
  <g transform="translate(280, 355)" data-narration="Big Theta provides tight bound - average case">
    <rect x="0" y="0" width="130" height="38" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" class="anim-slide delay-5" filter="url(#shadow)"/>
    <text x="65" y="16" text-anchor="middle" class="label" font-weight="bold" fill="#1d4ed8">Θ Theta</text>
    <text x="65" y="30" text-anchor="middle" class="detail">Tight Bound</text>
  </g>
  
  <!-- Arrow indicators -->
  <g transform="translate(255, 275)" class="anim-fade delay-5">
    <path d="M0,5 L10,5" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>