<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="binary-tree-traversals">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <g data-narration="Title introducing Binary Tree Traversals">
    <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#0369a1" class="fade-in">Binary Tree Traversals</text>
    <rect x="60" y="38" width="300" height="2" fill="#7dd3fc" class="fade-in delay-1"/>
  </g>
  
  <!-- Tree Structure Section -->
  <g data-narration="Binary tree with root 15, left child 10, right child 25, and their subtrees" class="slide-up">
    <!-- Tree edges -->
    <g stroke="#64748b" stroke-width="2">
      <line x1="210" y1="90" x2="150" y2="140" class="fade-in" style="stroke-dasharray:50;animation:drawLine 0.5s forwards;"/>
      <line x1="210" y1="90" x2="270" y2="140" class="fade-in" style="stroke-dasharray:50;animation:drawLine 0.5s forwards 0.1s;"/>
      <line x1="150" y1="140" x2="110" y2="190" class="fade-in" style="stroke-dasharray:50;animation:drawLine 0.5s forwards 0.2s;"/>
      <line x1="150" y1="140" x2="190" y2="190" class="fade-in" style="stroke-dasharray:50;animation:drawLine 0.5s forwards 0.3s;"/>
      <line x1="270" y1="140" x2="230" y2="190" class="fade-in" style="stroke-dasharray:50;animation:drawLine 0.5s forwards 0.4s;"/>
      <line x1="270" y1="140" x2="310" y2="190" class="fade-in" style="stroke-dasharray:50;animation:drawLine 0.5s forwards 0.5s;"/>
    </g>
    
    <!-- Tree nodes -->
    <g filter="url(#shadow)">
      <circle cx="210" cy="90" r="18" fill="url(#nodeGradient)" class="pulse"/>
      <text x="210" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="white">15</text>
      
      <circle cx="150" cy="140" r="16" fill="url(#nodeGradient)" class="fade-in delay-1"/>
      <text x="150" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="white">10</text>
      
      <circle cx="270" cy="140" r="16" fill="url(#nodeGradient)" class="fade-in delay-2"/>
      <text x="270" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="white">25</text>
      
      <circle cx="110" cy="190" r="14" fill="url(#nodeGradient)" class="fade-in delay-3"/>
      <text x="110" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="white">5</text>
      
      <circle cx="190" cy="190" r="14" fill="url(#nodeGradient)" class="fade-in delay-3"/>
      <text x="190" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="white">12</text>
      
      <circle cx="230" cy="190" r="14" fill="url(#nodeGradient)" class="fade-in delay-4"/>
      <text x="230" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="white">20</text>
      
      <circle cx="310" cy="190" r="14" fill="url(#nodeGradient)" class="fade-in delay-4"/>
      <text x="310" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="white">30</text>
    </g>
  </g>
  
  <!-- Inorder Traversal Box -->
  <g data-narration="Inorder: Left → Root → Right" class="slide-left">
    <rect x="10" y="230" width="125" height="70" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="72" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Inorder</text>
    <text x="72" y="270" text-anchor="middle" font-size="11" fill="#166534">Left → Root → Right</text>
    <text x="72" y="288" text-anchor="middle" font-size="10" fill="#15803d">5,10,12,15,20,25,30</text>
  </g>
  
  <!-- Preorder Traversal Box -->
  <g data-narration="Preorder: Root → Left → Right" class="slide-up delay-2">
    <rect x="147" y="230" width="125" height="70" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
    <text x="209" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Preorder</text>
    <text x="209" y="270" text-anchor="middle" font-size="11" fill="#92400e">Root → Left → Right</text>
    <text x="209" y="288" text-anchor="middle" font-size="10" fill="#b45309">15,10,5,12,25,20,30</text>
  </g>
  
  <!-- Postorder Traversal Box -->
  <g data-narration="Postorder: Left → Right → Root" class="slide-right">
    <rect x="284" y="230" width="125" height="70" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="2"/>
    <text x="346" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#9d174d">Postorder</text>
    <text x="346" y="270" text-anchor="middle" font-size="11" fill="#9d174d">Left → Right → Root</text>
    <text x="346" y="288" text-anchor="middle" font-size="10" fill="#db2777">5,12,10,20,30,25,15</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Time and Space Complexity information">
    <rect x="10" y="315" width="400" height="75" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" class="fade-in delay-5"/>
    
    <text x="210" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Key Concepts</text>
    
    <g class="fade-in delay-5">
      <circle cx="35" cy="358" r="4" fill="#7dd3fc"/>
      <text x="48" y="362" font-size="11" fill="#475569">Time: O(n) - visits each node once</text>
    </g>
    <g class="fade-in delay-5">
      <circle cx="35" cy="376" r="4" fill="#7dd3fc"/>
      <text x="48" y="380" font-size="11" fill="#475569">Space: O(h) - recursive stack depth (h = height)</text>
    </g>
    <g class="fade-in delay-5">
      <circle cx="220" cy="358" r="4" fill="#7dd3fc"/>
      <text x="233" y="362" font-size="11" fill="#475569">Recursive: simple but O(h) stack</text>
    </g>
    <g class="fade-in delay-5">
      <circle cx="220" cy="376" r="4" fill="#7dd3fc"/>
      <text x="233" y="380" font-size="11" fill="#475569">Iterative: uses explicit stack</text>
    </g>
  </g>
  
  <!-- Visual arrows showing traversal flow -->
  <g data-narration="Arrows indicating the three different traversal orderings" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6">
    <!-- Arrow from tree to boxes -->
    <path d="M 210 220 L 210 230" marker-end="url(#arrowhead)" class="fade-in delay-3"/>
  </g>
</svg>