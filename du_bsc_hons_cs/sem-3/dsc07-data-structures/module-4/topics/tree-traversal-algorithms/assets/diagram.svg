<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="tree-traversal-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8f0"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3748; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #4a5568; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: white; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .sequence { font-family: 'Consolas', monospace; font-size: 13px; fill: #2d3748; font-weight: bold; }
    .node-circle { fill: url(#nodeGradient); stroke: #5a67d8; stroke-width: 2; }
    .edge { stroke: #a0aec0; stroke-width: 2; fill: none; }
    .box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g data-narration="Main title explaining the topic of Tree Traversal Algorithms">
    <text x="210" y="30" text-anchor="middle" class="title anim-slide">Tree Traversal Algorithms</text>
    <line x1="80" y1="42" x2="340" y2="42" stroke="#cbd5e0" stroke-width="2"/>
  </g>
  
  <!-- Binary Tree Diagram -->
  <g data-narration="Binary tree structure with root A, children B and C, grandchildren D, E, F" transform="translate(60, 70)">
    <!-- Edges -->
    <line x1="150" y1="20" x2="75" y2="70" class="edge anim-fade" style="animation-delay: 0.2s"/>
    <line x1="150" y1="20" x2="225" y2="70" class="edge anim-fade" style="animation-delay: 0.3s"/>
    <line x1="75" y1="70" x2="40" y2="120" class="edge anim-fade" style="animation-delay: 0.4s"/>
    <line x1="75" y1="70" x2="110" y2="120" class="edge anim-fade" style="animation-delay: 0.5s"/>
    <line x1="225" y1="70" x2="190" y2="120" class="edge anim-fade" style="animation-delay: 0.6s"/>
    
    <!-- Nodes -->
    <circle cx="150" cy="20" r="18" class="node-circle anim-pulse" style="animation-delay: 0.7s"/>
    <text x="150" y="25" text-anchor="middle" class="label">A</text>
    
    <circle cx="75" cy="70" r="18" class="node-circle anim-pulse" style="animation-delay: 0.8s"/>
    <text x="75" y="75" text-anchor="middle" class="label">B</text>
    
    <circle cx="225" cy="70" r="18" class="node-circle anim-pulse" style="animation-delay: 0.9s"/>
    <text x="225" y="75" text-anchor="middle" class="label">C</text>
    
    <circle cx="40" cy="120" r="18" class="node-circle anim-pulse" style="animation-delay: 1s"/>
    <text x="40" y="125" text-anchor="middle" class="label">D</text>
    
    <circle cx="110" cy="120" r="18" class="node-circle anim-pulse" style="animation-delay: 1.1s"/>
    <text x="110" y="125" text-anchor="middle" class="label">E</text>
    
    <circle cx="190" cy="120" r="18" class="node-circle anim-pulse" style="animation-delay: 1.2s"/>
    <text x="190" y="125" text-anchor="middle" class="label">F</text>
  </g>
  
  <!-- Traversal Boxes -->
  <g data-narration="Preorder traversal: Visit root first, then left subtree, then right subtree">
    <rect x="10" y="205" width="95" height="55" rx="8" fill="url(#boxGradient1)" class="box anim-fade" style="animation-delay: 1.3s"/>
    <text x="57" y="222" text-anchor="middle" class="section-title">Preorder</text>
    <text x="57" y="240" text-anchor="middle" class="detail">Root → Left → Right</text>
    <text x="57" y="255" text-anchor="middle" class="sequence">A B D E C F</text>
  </g>
  
  <g data-narration="Inorder traversal: Visit left subtree first, then root, then right subtree">
    <rect x="110" y="205" width="95" height="55" rx="8" fill="url(#boxGradient2)" class="box anim-fade" style="animation-delay: 1.4s"/>
    <text x="157" y="222" text-anchor="middle" class="section-title">Inorder</text>
    <text x="157" y="240" text-anchor="middle" class="detail">Left → Root → Right</text>
    <text x="157" y="255" text-anchor="middle" class="sequence">D B E A F C</text>
  </g>
  
  <g data-narration="Postorder traversal: Visit left subtree first, then right subtree, then root">
    <rect x="210" y="205" width="95" height="55" rx="8" fill="url(#boxGradient3)" class="box anim-fade" style="animation-delay: 1.5s"/>
    <text x="257" y="222" text-anchor="middle" class="section-title">Postorder</text>
    <text x="257" y="240" text-anchor="middle" class="detail">Left → Right → Root</text>
    <text x="257" y="255" text-anchor="middle" class="sequence">D E B F C A</text>
  </g>
  
  <g data-narration="Level Order traversal: Visit nodes level by level from left to right">
    <rect x="310" y="205" width="95" height="55" rx="8" fill="url(#boxGradient4)" class="box anim-fade" style="animation-delay: 1.6s"/>
    <text x="357" y="222" text-anchor="middle" class="section-title">Level Order</text>
    <text x="357" y="240" text-anchor="middle" class="detail">Level by Level</text>
    <text x="357" y="255" text-anchor="middle" class="sequence">A B C D E F</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Key concepts: Depth-First Search uses recursion, Breadth-First Search uses queue">
    <rect x="10" y="275" width="195" height="55" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" class="box anim-fade" style="animation-delay: 1.7s"/>
    <text x="20" y="293" class="section-title">DFS (Depth-First)</text>
    <text x="20" y="310" class="detail">Preorder, Inorder, Postorder</text>
    <text x="20" y="325" class="detail" fill="#718096">Uses recursion, visits deep first</text>
  </g>
  
  <g data-narration="Breadth-First Search traverses level by level">
    <rect x="215" y="275" width="195" height="55" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" class="box anim-fade" style="animation-delay: 1.8s"/>
    <text x="225" y="293" class="section-title">BFS (Breadth-First)</text>
    <text x="225" y="310" class="detail">Level Order Traversal</text>
    <text x="225" y="325" class="detail" fill="#718096">Uses queue, visits by level</text>
  </g>
  
  <!-- Applications Section -->
  <g data-narration="Practical applications of tree traversals">
    <rect x="10" y="345" width="400" height="40" rx="8" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1" class="box anim-fade" style="animation-delay: 1.9s"/>
    <text x="210" y="365" text-anchor="middle" class="detail">
      <tspan fill="#4a5568" font-weight="bold">Applications:</tspan>
      <tspan fill="#718096"> Expression evaluation, File systems, Compiler syntax trees, DOM traversal</tspan>
    </text>
  </g>
  
  <!-- Decorative arrow -->
  <g data-narration="Arrow showing tree hierarchy flow">
    <path d="M 200 195 L 200 205" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrowhead)" class="anim-fade" style="animation-delay: 2s"/>
  </g>
</svg>