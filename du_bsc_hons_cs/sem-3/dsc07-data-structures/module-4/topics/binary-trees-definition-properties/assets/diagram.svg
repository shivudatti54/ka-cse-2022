<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="binary-trees-definition-properties">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e5f5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes nodeAppear {
      from { opacity: 0; transform: scale(0); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
    .node-appear { animation: nodeAppear 0.5s ease-out forwards; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1565c0; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2e7d32; }
    .node { fill: #4caf50; stroke: #2e7d32; stroke-width: 2; }
    .edge { stroke: #795548; stroke-width: 2; fill: none; }
    .arrow { fill: #ff5722; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title Section -->
  <g class="fade-in" data-narration="Introduction to Binary Trees - A fundamental data structure where each node has at most two children">
    <text x="210" y="28" text-anchor="middle" class="title">Binary Trees</text>
    <text x="210" y="46" text-anchor="middle" class="detail">Definition and Properties</text>
  </g>
  
  <!-- Definition Box -->
  <g class="slide-in" style="animation-delay: 0.3s" data-narration="Definition: A binary tree is a tree structure where each node has at most two children - left child and right child">
    <rect x="10" y="60" width="125" height="55" rx="5" fill="#fff" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
    <text x="20" y="78" class="box-title">Definition</text>
    <text x="20" y="94" class="detail">Each node has at most</text>
    <text x="20" y="108" class="detail">two children (left/right)</text>
  </g>
  
  <!-- Binary Tree Diagram -->
  <g class="fade-in" style="animation-delay: 0.5s" data-narration="Visual representation of a binary tree structure with root, branches and leaf nodes">
    <!-- Edges -->
    <line x1="210" y1="130" x2="140" y2="190" class="edge"/>
    <line x1="210" y1="130" x2="280" y2="190" class="edge"/>
    <line x1="140" y1="190" x2="100" y2="250" class="edge"/>
    <line x1="140" y1="190" x2="180" y2="250" class="edge"/>
    <line x1="280" y1="190" x2="240" y2="250" class="edge"/>
    <line x1="280" y1="190" x2="320" y2="250" class="edge"/>
    
    <!-- Nodes -->
    <circle cx="210" cy="130" r="20" class="node node-appear" style="animation-delay: 0.6s"/>
    <text x="210" y="135" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Root</text>
    
    <circle cx="140" cy="190" r="18" class="node node-appear" style="animation-delay: 0.8s"/>
    <text x="140" y="195" text-anchor="middle" fill="#fff" font-size="11">A</text>
    
    <circle cx="280" cy="190" r="18" class="node node-appear" style="animation-delay: 0.9s"/>
    <text x="280" y="195" text-anchor="middle" fill="#fff" font-size="11">B</text>
    
    <circle cx="100" cy="250" r="15" class="node node-appear" style="animation-delay: 1.0s"/>
    <text x="100" y="254" text-anchor="middle" fill="#fff" font-size="10">C</text>
    
    <circle cx="180" cy="250" r="15" class="node node-appear" style="animation-delay: 1.1s"/>
    <text x="180" y="254" text-anchor="middle" fill="#fff" font-size="10">D</text>
    
    <circle cx="240" cy="250" r="15" class="node node-appear" style="animation-delay: 1.2s"/>
    <text x="240" y="254" text-anchor="middle" fill="#fff" font-size="10">E</text>
    
    <circle cx="320" cy="250" r="15" class="node node-appear" style="animation-delay: 1.3s"/>
    <text x="320" y="254" text-anchor="middle" fill="#fff" font-size="10">F</text>
  </g>
  
  <!-- Types Box -->
  <g class="slide-in" style="animation-delay: 0.7s" data-narration="Types of Binary Trees: Full (every node has 2 children except leaves), Complete (levels filled left to right), Empty (no nodes)">
    <rect x="285" y="60" width="120" height="55" rx="5" fill="#fff" stroke="#9c27b0" stroke-width="2" filter="url(#shadow)"/>
    <text x="295" y="78" class="box-title" fill="#9c27b0">Types</text>
    <text x="295" y="94" class="detail">Full • Complete</text>
    <text x="295" y="108" class="detail">Empty</text>
  </g>
  
  <!-- Properties Box -->
  <g class="slide-in" style="animation-delay: 0.9s" data-narration="Key Properties: Height (edges from root to furthest leaf), Depth (edges from root to node), Level (depth + 1)">
    <rect x="10" y="280" width="130" height="60" rx="5" fill="#fff" stroke="#ff5722" stroke-width="2" filter="url(#shadow)"/>
    <text x="20" y="300" class="box-title" fill="#ff5722">Properties</text>
    <text x="20" y="318" class="detail">Height: root→leaf edges</text>
    <text x="20" y="334" class="detail">Depth: root→node edges</text>
  </g>
  
  <!-- Level Indicator -->
  <g class="fade-in" style="animation-delay: 1.4s" data-narration="Level 1 (Root), Level 2 (A, B), Level 3 (C, D, E, F) - showing tree hierarchy">
    <rect x="155" y="280" width="100" height="60" rx="5" fill="#fff" stroke="#2196f3" stroke-width="2" filter="url(#shadow)"/>
    <text x="165" y="300" class="box-title" fill="#2196f3">Levels</text>
    <text x="165" y="318" class="detail">Level 1: Root</text>
    <text x="165" y="334" class="detail">Level 2: A, B</text>
  </g>
  
  <!-- Applications Box -->
  <g class="slide-in" style="animation-delay: 1.1s" data-narration="Applications: File systems, database indexing, compiler design, Huffman coding, binary search trees">
    <rect x="270" y="280" width="135" height="60" rx="5" fill="#fff" stroke="#00bcd4" stroke-width="2" filter="url(#shadow)"/>
    <text x="280" y="300" class="box-title" fill="#00bcd4">Applications</text>
    <text x="280" y="318" class="detail">File systems, DB indexing</text>
    <text x="280" y="334" class="detail">Compilers, Huffman coding</text>
  </g>
  
  <!-- Arrow annotations -->
  <g class="fade-in" style="animation-delay: 1.5s" data-narration="Left child and Right child relationship shown by branches from each parent node">
    <polygon points="140,165 130,175 145,178" fill="#795548"/>
    <text x="85" y="175" class="detail" font-size="10">left</text>
    <polygon points="280,165 290,175 275,178" fill="#795548"/>
    <text x="295" y="175" class="detail" font-size="10">right</text>
  </g>
  
  <!-- Leaf nodes label -->
  <g class="fade-in" style="animation-delay: 1.6s" data-narration="Leaf nodes (C, D, E, F) are nodes with no children">
    <text x="210" y="275" text-anchor="middle" class="detail" font-style="italic">Leaf Nodes (no children)</text>
  </g>
  
  <!-- Height indicator -->
  <g class="pulse" style="animation-delay: 1.7s" data-narration="Height of this tree is 2 edges from root to furthest leaf">
    <line x1="380" y1="130" x2="380" y2="250" stroke="#ff5722" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="380,125 375,135 385,135" fill="#ff5722"/>
    <polygon points="380,255 375,245 385,245" fill="#ff5722"/>
    <text x="388" y="190" class="detail" fill="#ff5722" font-size="10">height</text>
  </g>
</svg>