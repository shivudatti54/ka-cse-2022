<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="tree-definitions-properties" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8f0f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#666" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInDown 0.6s ease-out 0.6s both; }
    .tree-node { animation: fadeIn 0.5s ease-out; }
    .tree-edge { animation: fadeIn 0.4s ease-out 0.8s both; }
    .label { animation: fadeIn 0.5s ease-out; }
    .key-box { animation: slideInLeft 0.5s ease-out; }
    .level-indicator { animation: bounce 2s ease-in-out infinite; }
    .highlight { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Tree Definitions &amp; Properties</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Main Tree Structure -->
  <g transform="translate(210, 80)">
    <!-- Edges -->
    <g class="tree-edge" stroke="#7f8c8d" stroke-width="2">
      <line x1="0" y1="0" x2="-60" y2="70"/>
      <line x1="0" y1="0" x2="60" y2="70"/>
      <line x1="-60" y1="70" x2="-90" y2="140"/>
      <line x1="-60" y1="70" x2="-30" y2="140"/>
      <line x1="60" y1="70" x2="30" y2="140"/>
      <line x1="60" y1="70" x2="90" y2="140"/>
    </g>
    
    <!-- Level Indicators -->
    <text x="-115" y="5" class="level-indicator" font-family="Arial" font-size="12" fill="#e74c3c">Level 1</text>
    <text x="-115" y="75" class="level-indicator" font-family="Arial" font-size="12" fill="#e74c3c">Level 2</text>
    <text x="-115" y="145" class="level-indicator" font-family="Arial" font-size="12" fill="#e74c3c">Level 3</text>
    
    <!-- Root Node A -->
    <g class="tree-node" filter="url(#shadow)">
      <circle cx="0" cy="0" r="22" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">A</text>
    </g>
    
    <!-- Level 1 - Parent Nodes B and C -->
    <g class="tree-node" filter="url(#shadow)">
      <circle cx="-60" cy="70" r="22" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
      <text x="-60" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">B</text>
    </g>
    <g class="tree-node" filter="url(#shadow)">
      <circle cx="60" cy="70" r="22" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
      <text x="60" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">C</text>
    </g>
    
    <!-- Level 2 - Leaf Nodes D, E, F, G -->
    <g class="tree-node highlight" filter="url(#shadow)">
      <circle cx="-90" cy="140" r="20" fill="#27ae60" stroke="#229954" stroke-width="2"/>
      <text x="-90" y="145" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">D</text>
    </g>
    <g class="tree-node highlight" filter="url(#shadow)">
      <circle cx="-30" cy="140" r="20" fill="#27ae60" stroke="#229954" stroke-width="2"/>
      <text x="-30" y="145" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">E</text>
    </g>
    <g class="tree-node highlight" filter="url(#shadow)">
      <circle cx="30" cy="140" r="20" fill="#27ae60" stroke="#229954" stroke-width="2"/>
      <text x="30" y="145" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">F</text>
    </g>
    <g class="tree-node highlight" filter="url(#shadow)">
      <circle cx="90" cy="140" r="20" fill="#27ae60" stroke="#229954" stroke-width="2"/>
      <text x="90" y="145" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">G</text>
    </g>
  </g>
  
  <!-- Labels and Annotations -->
  <g class="label">
    <!-- Root Label -->
    <rect x="280" y="70" width="120" height="22" fill="#3498db" rx="4" opacity="0.9"/>
    <text x="340" y="86" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">ROOT (A)</text>
    
    <!-- Parent Label -->
    <rect x="280" y="98" width="120" height="22" fill="#9b59b6" rx="4" opacity="0.9"/>
    <text x="340" y="114" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">PARENT (B, C)</text>
    
    <!-- Child Label -->
    <rect x="280" y="126" width="120" height="22" fill="#e67e22" rx="4" opacity="0.9"/>
    <text x="340" y="142" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">CHILD (D,E,F,G)</text>
    
    <!-- Leaf Label -->
    <rect x="280" y="154" width="120" height="22" fill="#27ae60" rx="4" opacity="0.9"/>
    <text x="340" y="170" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">LEAF (D,E,F,G)</text>
    
    <!-- Sibling Label -->
    <rect x="280" y="182" width="120" height="22" fill="#e74c3c" rx="4" opacity="0.9"/>
    <text x="340" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">SIBLINGS: D-E, F-G</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g data-narration="root-node-explains" class="section-1">
    <rect x="15" y="250" width="125" height="55" fill="white" stroke="#3498db" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="77" y="268" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#3498db">ROOT</text>
    <text x="77" y="284" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Topmost node</text>
    <text x="77" y="296" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">No parent</text>
  </g>
  
  <g data-narration="parent-child-explains" class="section-2">
    <rect x="150" y="250" width="125" height="55" fill="white" stroke="#9b59b6" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="212" y="268" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#9b59b6">PARENT/CHILD</text>
    <text x="212" y="284" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Has children = parent</text>
    <text x="212" y="296" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Has parent = child</text>
  </g>
  
  <g data-narration="leaf-sibling-explains" class="section-3">
    <rect x="285" y="250" width="120" height="55" fill="white" stroke="#27ae60" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="345" y="268" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#27ae60">LEAF/SIBLING</text>
    <text x="345" y="284" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">No children = leaf</text>
    <text x="345" y="296" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Same parent = siblings</text>
  </g>
  
  <!-- Additional Info Box -->
  <g data-narration="tree-properties">
    <rect x="15" y="315" width="390" height="75" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5" rx="5"/>
    <text x="210" y="335" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#d35400">KEY PROPERTIES</text>
    <text x="30" y="355" font-family="Arial" font-size="10" fill="#555">• Edge: Connection between two nodes</text>
    <text x="30" y="370" font-family="Arial" font-size="10" fill="#555">• Path: Sequence of edges from root to node</text>
    <text x="200" y="355" font-family="Arial" font-size="10" fill="#555">• Depth: Level number from root (root = 0)</text>
    <text x="200" y="370" font-family="Arial" font-size="10" fill="#555">• Height: Longest path from node to leaf</text>
    <text x="320" y="355" font-family="Arial" font-size="10" fill="#555">• Degree: Number of children</text>
    <text x="320" y="370" font-family="Arial" font-size="10" fill="#555">• Subtree: Node + all descendants</text>
  </g>
  
  <!-- Connection Arrows -->
  <g data-narration="relationship-arrows">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
      </marker>
    </defs>
    <line x1="195" y1="95" x2="235" y2="95" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="195" y1="123" x2="270" y2="123" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
</svg>