<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="time-complexity-analysis">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="chartBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideIn {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 500; }
        to { stroke-dashoffset: 0; }
      }
      .title { animation: fadeIn 0.8s ease-out; }
      .section-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
      .legend-item { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
      .complexity-line { stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawLine 2s ease-out forwards; }
      .pulse-anim { animation: pulse 2s infinite; }
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Time Complexity Analysis</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Chart Area -->
  <rect x="40" y="55" width="280" height="220" fill="url(#chartBg)" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  
  <!-- Chart Title -->
  <text x="180" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Growth of Time Complexities</text>
  
  <!-- Axes -->
  <line x1="50" y1="260" x2="300" y2="260" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="50" y1="260" x2="50" y2="70" stroke="#7f8c8d" stroke-width="1"/>
  
  <!-- Axis Labels -->
  <text x="175" y="282" text-anchor="middle" font-size="12" fill="#555">Input Size (n)</text>
  <text x="18" y="165" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90, 18, 165)">Time</text>
  
  <!-- X-axis ticks -->
  <text x="50" y="275" text-anchor="middle" font-size="9" fill="#777">0</text>
  <text x="112" y="275" text-anchor="middle" font-size="9" fill="#777">5</text>
  <text x="175" y="275" text-anchor="middle" font-size="9" fill="#777">10</text>
  <text x="237" y="275" text-anchor="middle" font-size="9" fill="#777">15</text>
  <text x="300" y="275" text-anchor="middle" font-size="9" fill="#777">20</text>
  
  <!-- Y-axis ticks -->
  <text x="42" y="260" text-anchor="end" font-size="9" fill="#777">0</text>
  <text x="42" y="207" text-anchor="end" font-size="9" fill="#777">10</text>
  <text x="42" y="155" text-anchor="end" font-size="9" fill="#777">20</text>
  <text x="42" y="103" text-anchor="end" font-size="9" fill="#777">30</text>
  <text x="42" y="70" text-anchor="end" font-size="9" fill="#777">40</text>
  
  <!-- Complexity Curves -->
  <!-- O(1) - flat line -->
  <line x1="50" y1="75" x2="300" y2="75" stroke="#27ae60" stroke-width="2.5" class="complexity-line" style="animation-delay: 0.2s"/>
  
  <!-- O(log n) - slow curve -->
  <path d="M50,260 Q80,180 120,130 Q160,100 200,85 Q240,75 300,65" stroke="#3498db" stroke-width="2.5" fill="none" class="complexity-line" style="animation-delay: 0.4s"/>
  
  <!-- O(n) - diagonal -->
  <line x1="50" y1="260" x2="300" y2="85" stroke="#9b59b6" stroke-width="2.5" class="complexity-line" style="animation-delay: 0.6s"/>
  
  <!-- O(n log n) - between linear and quadratic -->
  <path d="M50,260 Q100,200 150,150 Q200,115 250,90 300,70" stroke="#e67e22" stroke-width="2.5" fill="none" class="complexity-line" style="animation-delay: 0.8s"/>
  
  <!-- O(n²) - parabolic -->
  <path d="M50,260 Q125,230 175,180 Q225,120 300,70" stroke="#e74c3c" stroke-width="2.5" fill="none" class="complexity-line" style="animation-delay: 1s"/>
  
  <!-- O(2^n) - exponential (clipped) -->
  <path d="M50,260 Q60,255 70,245 Q80,225 85,200 Q88,160 90,130" stroke="#c0392b" stroke-width="2.5" fill="none" class="complexity-line" style="animation-delay: 1.2s"/>
  
  <!-- Legend Box -->
  <rect x="330" y="55" width="85" height="215" fill="#fff" stroke="#ddd" stroke-width="1" rx="5" data-narration="Legend showing color-coded complexity functions"/>
  
  <text x="372" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Legend</text>
  
  <!-- Legend items -->
  <g class="legend-item" style="animation-delay: 0.3s">
    <line x1="338" y1="85" x2="358" y2="85" stroke="#27ae60" stroke-width="2"/>
    <text x="363" y="89" font-size="11" fill="#333">O(1)</text>
  </g>
  <g class="legend-item" style="animation-delay: 0.5s">
    <line x1="338" y1="105" x2="358" y2="105" stroke="#3498db" stroke-width="2"/>
    <text x="363" y="109" font-size="11" fill="#333">O(log n)</text>
  </g>
  <g class="legend-item" style="animation-delay: 0.7s">
    <line x1="338" y1="125" x2="358" y2="125" stroke="#9b59b6" stroke-width="2"/>
    <text x="363" y="129" font-size="11" fill="#333">O(n)</text>
  </g>
  <g class="legend-item" style="animation-delay: 0.9s">
    <line x1="338" y1="145" x2="358" y2="145" stroke="#e67e22" stroke-width="2"/>
    <text x="363" y="149" font-size="11" fill="#333">O(n log n)</text>
  </g>
  <g class="legend-item" style="animation-delay: 1.1s">
    <line x1="338" y1="165" x2="358" y2="165" stroke="#e74c3c" stroke-width="2"/>
    <text x="363" y="169" font-size="11" fill="#333">O(n²)</text>
  </g>
  <g class="legend-item" style="animation-delay: 1.3s">
    <line x1="338" y1="185" x2="358" y2="185" stroke="#c0392b" stroke-width="2"/>
    <text x="363" y="189" font-size="11" fill="#333">O(2ⁿ)</text>
  </g>
  
  <!-- Key Concepts Boxes -->
  <!-- Box 1: Big-O -->
  <g class="section-box" style="animation-delay: 0.4s" data-narration="Big-O notation represents worst-case upper bound">
    <rect x="40" y="285" width="115" height="50" fill="#fff5f5" stroke="#e74c3c" stroke-width="1" rx="4"/>
    <text x="97" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Big-O (O)</text>
    <text x="97" y="315" text-anchor="middle" font-size="9" fill="#555">Upper Bound</text>
    <text x="97" y="327" text-anchor="middle" font-size="9" fill="#555">Worst Case</text>
  </g>
  
  <!-- Box 2: Big-Omega -->
  <g class="section-box" style="animation-delay: 0.6s" data-narration="Big-Omega notation represents best-case lower bound">
    <rect x="160" y="285" width="115" height="50" fill="#f0fff4" stroke="#27ae60" stroke-width="1" rx="4"/>
    <text x="217" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">Big-Ω (Omega)</text>
    <text x="217" y="315" text-anchor="middle" font-size="9" fill="#555">Lower Bound</text>
    <text x="217" y="327" text-anchor="middle" font-size="9" fill="#555">Best Case</text>
  </g>
  
  <!-- Box 3: Big-Theta -->
  <g class="section-box" style="animation-delay: 0.8s" data-narration="Big-Theta notation represents tight bound">
    <rect x="280" y="285" width="85" height="50" fill="#f5f0ff" stroke="#9b59b6" stroke-width="1" rx="4"/>
    <text x="322" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#9b59b6">Big-Θ (Theta)</text>
    <text x="322" y="315" text-anchor="middle" font-size="9" fill="#555">Tight Bound</text>
    <text x="322" y="327" text-anchor="middle" font-size="9" fill="#555">Average</text>
  </g>
  
  <!-- Arrow showing efficiency -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  <path d="M355,340 L355,370" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)" class="pulse-anim"/>
  <text x="355" y="385" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">More Efficient</text>
  <text x="355" y="350" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">Less Efficient</text>
  
  <!-- Decorative dots -->
  <circle cx="35" y="395" r="3" fill="#3498db" opacity="0.6"/>
  <circle cx="420" y="10" r="3" fill="#9b59b6" opacity="0.6"/>
  <circle cx="5" y="50" r="2" fill="#e67e22" opacity="0.6"/>
  <circle cx="400" y="395" r="2" fill="#27ae60" opacity="0.6"/>
</svg>