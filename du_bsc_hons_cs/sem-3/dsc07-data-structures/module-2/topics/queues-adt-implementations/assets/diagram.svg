<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="queues-adt-implementations" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="elementGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(20px); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #5d6d7e; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .concept-box { rx: 8; ry: 8; }
    .section1 { animation: fadeIn 0.8s ease-out forwards; }
    .section2 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section3 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section4 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />

  <!-- Title Section -->
  <g class="section1" data-narration="Title section introducing the Queue ADT topic">
    <text x="210" y="35" text-anchor="middle" class="title">Queues ADT Implementations</text>
    <text x="210" y="55" text-anchor="middle" class="subtitle">FIFO - First In First Out</text>
  </g>

  <!-- Array Visualization Section -->
  <g class="section2" data-narration="Array-based queue implementation showing indices 0-4">
    <text x="30" y="90" class="detail" font-weight="bold">Array Implementation</text>
    
    <!-- Array boxes -->
    <g filter="url(#shadow)">
      <rect x="40" y="105" width="55" height="35" fill="url(#arrayGradient)" rx="4" class="concept-box"/>
      <text x="67" y="128" text-anchor="middle" class="label">0</text>
      
      <rect x="100" y="105" width="55" height="35" fill="url(#arrayGradient)" rx="4" class="concept-box"/>
      <text x="127" y="128" text-anchor="middle" class="label">1</text>
      
      <rect x="160" y="105" width="55" height="35" fill="url(#arrayGradient)" rx="4" class="concept-box"/>
      <text x="187" y="128" text-anchor="middle" class="label">2</text>
      
      <rect x="220" y="105" width="55" height="35" fill="url(#arrayGradient)" rx="4" class="concept-box"/>
      <text x="247" y="128" text-anchor="middle" class="label">3</text>
      
      <rect x="280" y="105" width="55" height="35" fill="url(#arrayGradient)" rx="4" class="concept-box"/>
      <text x="307" y="128" text-anchor="middle" class="label">4</text>
    </g>

    <!-- Elements in queue -->
    <g class="element" filter="url(#shadow)">
      <rect x="105" y="108" width="45" height="29" fill="url(#elementGradient)" rx="4"/>
      <text x="127" y="128" text-anchor="middle" class="label" font-size="12">A</text>
      
      <rect x="165" y="108" width="45" height="29" fill="url(#elementGradient)" rx="4"/>
      <text x="187" y="128" text-anchor="middle" class="label" font-size="12">B</text>
    </g>

    <!-- Front and Rear Pointers -->
    <g class="section3" data-narration="Pointers showing front and rear of queue">
      <line x1="95" y1="150" x2="155" y2="150" stroke="#e74c3c" stroke-width="2" class="arrow"/>
      <polygon points="155,145 155,155 165,150" fill="#e74c3c"/>
      <text x="125" y="168" text-anchor="middle" class="detail" fill="#e74c3c" font-size="11">FRONT</text>
      
      <line x1="215" y1="150" x2="265" y2="150" stroke="#9b59b6" stroke-width="2" class="arrow"/>
      <polygon points="265,145 265,155 275,150" fill="#9b59b6"/>
      <text x="240" y="168" text-anchor="middle" class="detail" fill="#9b59b6" font-size="11">REAR</text>
    </g>
  </g>

  <!-- Operations Section -->
  <g class="section3" data-narration="Key queue operations: enqueue, dequeue, front, isEmpty">
    <text x="30" y="200" class="detail" font-weight="bold">Queue Operations</text>
    
    <!-- Enqueue Box -->
    <g filter="url(#shadow)">
      <rect x="25" y="215" width="110" height="40" fill="#ffffff" stroke="#5cb85c" stroke-width="2" rx="6" class="concept-box"/>
      <text x="80" y="235" text-anchor="middle" class="detail" font-weight="bold" fill="#5cb85c">enqueue(x)</text>
      <text x="80" y="250" text-anchor="middle" class="detail" font-size="10">Add at rear</text>
    </g>

    <!-- Dequeue Box -->
    <g filter="url(#shadow)">
      <rect x="145" y="215" width="110" height="40" fill="#ffffff" stroke="#e74c3c" stroke-width="2" rx="6" class="concept-box"/>
      <text x="200" y="235" text-anchor="middle" class="detail" font-weight="bold" fill="#e74c3c">dequeue()</text>
      <text x="200" y="250" text-anchor="middle" class="detail" font-size="10">Remove front</text>
    </g>

    <!-- Front/Peek Box -->
    <g filter="url(#shadow)">
      <rect x="265" y="215" width="110" height="40" fill="#ffffff" stroke="#3498db" stroke-width="2" rx="6" class="concept-box"/>
      <text x="320" y="235" text-anchor="middle" class="detail" font-weight="bold" fill="#3498db">front()</text>
      <text x="320" y="250" text-anchor="middle" class="detail" font-size="10">View front</text>
    </g>

    <!-- isEmpty Box -->
    <g filter="url(#shadow)">
      <rect x="85" y="265" width="110" height="40" fill="#ffffff" stroke="#f39c12" stroke-width="2" rx="6" class="concept-box"/>
      <text x="140" y="285" text-anchor="middle" class="detail" font-weight="bold" fill="#f39c12">isEmpty()</text>
      <text x="140" y="300" text-anchor="middle" class="detail" font-size="10">Check empty</text>
    </g>

    <!-- Size Box -->
    <g filter="url(#shadow)">
      <rect x="205" y="265" width="110" height="40" fill="#ffffff" stroke="#9b59b6" stroke-width="2" rx="6" class="concept-box"/>
      <text x="260" y="285" text-anchor="middle" class="detail" font-weight="bold" fill="#9b59b6">size()</text>
      <text x="260" y="300" text-anchor="middle" class="detail" font-size="10">Count elements</text>
    </g>
  </g>

  <!-- FIFO Principle Visualization -->
  <g class="section4" data-narration="Visual demonstration of FIFO principle with arrows">
    <text x="30" y="330" class="detail" font-weight="bold">FIFO Principle</text>
    
    <!-- Flow arrow -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
      </marker>
    </defs>
    
    <line x1="80" y1="350" x2="300" y2="350" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
    
    <!-- In/Out labels -->
    <rect x="40" y="340" width="50" height="22" fill="#5cb85c" rx="4"/>
    <text x="65" y="355" text-anchor="middle" class="label" font-size="11">IN</text>
    
    <rect x="310" y="340" width="50" height="22" fill="#e74c3c" rx="4"/>
    <text x="335" y="355" text-anchor="middle" class="label" font-size="11">OUT</text>
    
    <text x="180" y="375" text-anchor="middle" class="detail" font-size="11">First element in = First element out</text>
  </g>

  <!-- Key Concepts Summary -->
  <g class="section4" data-narration="Summary of key queue characteristics">
    <rect x="25" y="380" width="370" height="15" fill="#ecf0f1" rx="3"/>
    <text x="210" y="391" text-anchor="middle" class="detail" font-size="10">Linear • O(1) enqueue/dequeue • Used in BFS, scheduling, buffering</text>
  </g>
</svg>