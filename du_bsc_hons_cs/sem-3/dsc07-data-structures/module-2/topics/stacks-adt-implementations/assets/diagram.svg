<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="stacks-adt-implementations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="elementGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5e62;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowMove {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    @keyframes topIndicator {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .panel-1 { animation: slideInUp 0.6s ease-out 0.2s both; }
    .panel-2 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .panel-3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .label { animation: fadeIn 0.5s ease-out 0.8s both; }
    .concept-box { animation: fadeIn 0.6s ease-out 1s both; }
    .arrow { animation: arrowMove 2s ease-in-out infinite; }
    .element { animation: pulse 3s ease-in-out infinite; }
    .top-arrow { animation: topIndicator 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d5a6b" class="title">Stacks ADT Implementations</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a7a8a">Last-In-First-Out (LIFO) Principle</text>
  
  <!-- Panel 1: Empty Stack -->
  <g class="panel-1" data-narration="This shows an empty stack container ready for elements">
    <rect x="20" y="80" width="100" height="100" fill="none" stroke="#4a90a4" stroke-width="3" rx="5" ry="5"/>
    <text x="70" y="135" text-anchor="middle" font-family="Arial" font-size="14" fill="#4a90a4" font-weight="bold">Empty</text>
    <text x="70" y="155" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Stack</text>
    <line x1="15" y1="180" x2="125" y2="180" stroke="#4a90a4" stroke-width="3"/>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow">
    <path d="M 130 130 L 160 130" stroke="#ff9966" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="145" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff5e62">PUSH</text>
  </g>
  
  <!-- Panel 2: After Push(10, 20, 30) -->
  <g class="panel-2" data-narration="Elements 10, 20, 30 are pushed onto stack - TOP pointer moves up with each push">
    <rect x="170" y="80" width="100" height="140" fill="none" stroke="#4a90a4" stroke-width="3" rx="5" ry="5"/>
    <line x1="165" y1="220" x2="275" y2="220" stroke="#4a90a4" stroke-width="3"/>
    
    <!-- Stack elements -->
    <rect x="180" y="85" width="80" height="30" fill="url(#elementGradient)" rx="3" ry="3" class="element" filter="url(#shadow)"/>
    <text x="220" y="106" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">30</text>
    
    <rect x="180" y="120" width="80" height="30" fill="url(#elementGradient)" rx="3" ry="3" class="element" filter="url(#shadow)"/>
    <text x="220" y="141" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">20</text>
    
    <rect x="180" y="155" width="80" height="30" fill="url(#elementGradient)" rx="3" ry="3" class="element" filter="url(#shadow)"/>
    <text x="220" y="176" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">10</text>
    
    <!-- TOP pointer -->
    <g class="top-arrow">
      <polygon points="265,75 280,90 265,105" fill="#ff5e62"/>
      <line x1="272" y1="90" x2="272" y2="70" stroke="#ff5e62" stroke-width="2"/>
      <text x="285" y="85" font-family="Arial" font-size="10" fill="#ff5e62" font-weight="bold">TOP</text>
    </g>
    
    <text x="220" y="235" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90a4" font-weight="bold">After Push</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow">
    <path d="M 280 180 L 310 180" stroke="#ff9966" stroke-width="2" fill="none"/>
    <polygon points="315,180 305,175 305,185" fill="#ff9966"/>
    <text x="295" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff5e62">POP</text>
  </g>
  
  <!-- Panel 3: After Pop -->
  <g class="panel-3" data-narration="After popping once, element 30 is removed - TOP moves down to 20">
    <rect x="320" y="80" width="90" height="140" fill="none" stroke="#4a90a4" stroke-width="3" rx="5" ry="5"/>
    <line x1="315" y1="220" x2="415" y2="220" stroke="#4a90a4" stroke-width="3"/>
    
    <!-- Stack elements after pop -->
    <rect x="330" y="120" width="70" height="30" fill="url(#elementGradient)" rx="3" ry="3" class="element" filter="url(#shadow)"/>
    <text x="365" y="141" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">20</text>
    
    <rect x="330" y="155" width="70" height="30" fill="url(#elementGradient)" rx="3" ry="3" class="element" filter="url(#shadow)"/>
    <text x="365" y="176" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">10</text>
    
    <!-- TOP pointer after pop -->
    <g class="top-arrow">
      <polygon points="400,110 415,125 400,140" fill="#ff5e62"/>
      <line x1="407" y1="125" x2="407" y2="105" stroke="#ff5e62" stroke-width="2"/>
      <text x="420" y="120" font-family="Arial" font-size="10" fill="#ff5e62" font-weight="bold">TOP</text>
    </g>
    
    <text x="365" y="235" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a90a4" font-weight="bold">After Pop</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Stack ADT operations defined - push adds to top, pop removes from top">
    <rect x="20" y="255" width="380" height="80" fill="white" stroke="#4a90a4" stroke-width="2" rx="8" ry="8" filter="url(#shadow)"/>
    <rect x="20" y="255" width="380" height="22" fill="url(#stackGradient)" rx="8" ry="8"/>
    <text x="210" y="271" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">STACK OPERATIONS (ADT)</text>
    
    <text x="40" y="300" font-family="Arial" font-size="12" fill="#333">
      <tspan font-weight="bold" fill="#ff5e62">push(e)</tspan> <tspan>→ Add element to top</tspan>
    </text>
    <text x="40" y="320" font-family="Arial" font-size="12" fill="#333">
      <tspan font-weight="bold" fill="#ff5e62">pop()</tspan> <tspan>→ Remove &amp; return top element</tspan>
    </text>
    <text x="220" y="300" font-family="Arial" font-size="12" fill="#333">
      <tspan font-weight="bold" fill="#4a90a4">peek()/top()</tspan> <tspan>→ View top element</tspan>
    </text>
    <text x="220" y="320" font-family="Arial" font-size="12" fill="#333">
      <tspan font-weight="bold" fill="#4a90a4">isEmpty()</tspan> <tspan>→ Check if empty</tspan>
    </text>
  </g>
  
  <!-- LIFO Principle Arrow -->
  <g class="label" data-narration="Visual demonstration of LIFO - last element pushed is first to be popped">
    <rect x="150" y="345" width="120" height="25" fill="#ff9966" rx="12" ry="12" filter="url(#shadow)"/>
    <text x="210" y="362" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">LIFO: Last In First Out</text>
  </g>
  
  <!-- Time Complexity Labels -->
  <g class="label" data-narration="Both push and pop operations have O(1) constant time complexity">
    <text x="365" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">30 removed</text>
    <text x="365" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">(returned)</text>
  </g>
</svg>