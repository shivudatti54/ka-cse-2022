<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="singly-doubly-circular-linked-lists" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe4cc"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cceecc"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6f5"/>
      <stop offset="100%" style="stop-color:#e6cce6"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c44"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .section { opacity: 0; }
    .section:nth-child(1) { animation: fadeIn 0.8s ease-out 0.2s forwards; }
    .section:nth-child(2) { animation: fadeIn 0.8s ease-out 0.4s forwards; }
    .section:nth-child(3) { animation: fadeIn 0.8s ease-out 0.6s forwards; }
    .section:nth-child(4) { animation: fadeIn 0.8s ease-out 0.8s forwards; }
    text { font-family: Arial, sans-serif; }
    .title { font-size: 18px; font-weight: bold; fill: #333; }
    .label { font-size: 14px; font-weight: bold; fill: #444; }
    .detail { font-size: 11px; fill: #555; }
    .pointer-text { font-size: 10px; fill: #777; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title">Linked Lists: Singly, Doubly, Circular</text>
  <line x1="30" y1="35" x2="390" y2="35" stroke="#aaa" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Section 1: Singly Linked List -->
  <g class="section" data-narration="Singly Linked List: Each node contains data and a next pointer. Traversal is one-directional from head to null.">
    <rect x="15" y="50" width="120" height="115" rx="8" fill="#fff" stroke="#e6a85c" stroke-width="2"/>
    <text x="75" y="68" text-anchor="middle" class="label" fill="#c44">Singly Linked List</text>
    
    <!-- Node 1 -->
    <g class="float" style="animation-delay: 0.5s;">
      <rect x="25" y="80" width="35" height="30" fill="url(#nodeGrad)" stroke="#d4a05c" stroke-width="1"/>
      <text x="42.5" y="95" text-anchor="middle" font-size="10">DATA</text>
      <rect x="60" y="80" width="35" height="30" fill="#fff5e6" stroke="#d4a05c" stroke-width="1"/>
      <text x="77.5" y="95" text-anchor="middle" font-size="9">NEXT</text>
      <line x1="95" y1="110" x2="115" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Node 2 -->
    <g class="float" style="animation-delay: 1s;">
      <rect x="120" y="80" width="35" height="30" fill="url(#nodeGrad)" stroke="#d4a05c" stroke-width="1"/>
      <text x="137.5" y="95" text-anchor="middle" font-size="10">DATA</text>
      <rect x="155" y="80" width="35" height="30" fill="#fff5e6" stroke="#d4a05c" stroke-width="1"/>
      <text x="172.5" y="95" text-anchor="middle" font-size="9">NEXT</text>
      <line x1="190" y1="110" x2="210" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- NULL -->
    <text x="225" y="115" font-size="10" fill="#888">NULL</text>
    
    <!-- HEAD -->
    <text x="25" y="75" font-size="10" fill="#c44" font-weight="bold">HEAD</text>
    <line x1="30" y1="78" x2="30" y2="80" stroke="#c44" stroke-width="1"/>
    <line x1="30" y1="80" x2="50" y2="80" stroke="#c44" stroke-width="1.5" marker-end="url(#arrowheadRed)"/>
  </g>
  
  <!-- Section 2: Doubly Linked List -->
  <g class="section" data-narration="Doubly Linked List: Each node contains data, next pointer, and prev pointer enabling bidirectional traversal.">
    <rect x="150" y="50" width="120" height="115" rx="8" fill="#fff" stroke="#5ca85c" stroke-width="2"/>
    <text x="210" y="68" text-anchor="middle" class="label" fill="#3a7">Doubly Linked List</text>
    
    <!-- Node 1 -->
    <g class="float" style="animation-delay: 0.7s;">
      <rect x="155" y="80" width="22" height="30" fill="#e6f5e6" stroke="#5ca85c" stroke-width="1"/>
      <text x="166" y="95" text-anchor="middle" font-size="8">PREV</text>
      <rect x="177" y="80" width="22" height="30" fill="url(#nodeGrad2)" stroke="#5ca85c" stroke-width="1"/>
      <text x="188" y="95" text-anchor="middle" font-size="9">DATA</text>
      <rect x="199" y="80" width="22" height="30" fill="#e6f5e6" stroke="#5ca85c" stroke-width="1"/>
      <text x="210" y="95" text-anchor="middle" font-size="8">NEXT</text>
      <line x1="221" y1="110" x2="241" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <line x1="155" y1="110" x2="140" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Node 2 -->
    <g class="float" style="animation-delay: 1.2s;">
      <rect x="245" y="80" width="22" height="30" fill="#e6f5e6" stroke="#5ca85c" stroke-width="1"/>
      <text x="256" y="95" text-anchor="middle" font-size="8">PREV</text>
      <rect x="267" y="80" width="22" height="30" fill="url(#nodeGrad2)" stroke="#5ca85c" stroke-width="1"/>
      <text x="278" y="95" text-anchor="middle" font-size="9">DATA</text>
      <rect x="289" y="80" width="22" height="30" fill="#e6f5e6" stroke="#5ca85c" stroke-width="1"/>
      <text x="300" y="95" text-anchor="middle" font-size="8">NEXT</text>
      <line x1="289" y1="110" x2="309" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <line x1="245" y1="110" x2="230" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- HEAD -->
    <text x="155" y="75" font-size="10" fill="#3a7" font-weight="bold">HEAD</text>
    <line x1="160" y1="78" x2="160" y2="80" stroke="#3a7" stroke-width="1"/>
    <line x1="160" y1="80" x2="178" y2="80" stroke="#3a7" stroke-width="1.5" marker-end="url(#arrowheadRed)"/>
  </g>
  
  <!-- Section 3: Circular Linked List -->
  <g class="section" data-narration="Circular Linked List: The last node's next points back to the head, creating a closed loop with no null end.">
    <rect x="285" y="50" width="120" height="115" rx="8" fill="#fff" stroke="#8c5ca8" stroke-width="2"/>
    <text x="345" y="68" text-anchor="middle" class="label" fill="#7a3">Circular Linked List</text>
    
    <!-- Node 1 -->
    <g class="float" style="animation-delay: 0.9s;">
      <rect x="295" y="80" width="40" height="30" fill="url(#nodeGrad3)" stroke="#8c5ca8" stroke-width="1"/>
      <text x="315" y="95" text-anchor="middle" font-size="10">DATA</text>
      <rect x="335" y="80" width="40" height="30" fill="#f5e6f5" stroke="#8c5ca8" stroke-width="1"/>
      <text x="355" y="95" text-anchor="middle" font-size="9">NEXT</text>
    </g>
    
    <!-- Curved arrow from last to first -->
    <path d="M 380 95 Q 410 95 410 125 Q 410 155 345 155 Q 295 155 295 125 Q 295 105 305 100" stroke="#8c5ca8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="345" y="165" text-anchor="middle" font-size="9" fill="#7a3">points to HEAD</text>
    
    <!-- Node 2 -->
    <g class="float" style="animation-delay: 1.4s;">
      <rect x="330" y="120" width="30" height="25" fill="url(#nodeGrad3)" stroke="#8c5ca8" stroke-width="1"/>
      <text x="345" y="133" text-anchor="middle" font-size="8">DATA</text>
      <rect x="360" y="120" width="30" height="25" fill="#f5e6f5" stroke="#8c5ca8" stroke-width="1"/>
      <text x="375" y="133" text-anchor="middle" font-size="7">NEXT</text>
    </g>
  </g>
  
  <!-- Node Structure Diagram -->
  <g class="section" data-narration="Node Structure: Singly node has DATA + NEXT. Doubly node has PREV + DATA + NEXT.">
    <rect x="15" y="180" width="390" height="80" rx="8" fill="#fff" stroke="#999" stroke-width="1" stroke-dasharray="3"/>
    <text x="210" y="198" text-anchor="middle" class="label">Node Structure Comparison</text>
    
    <!-- Singly Node -->
    <rect x="30" y="210" width="100" height="40" rx="4" fill="url(#nodeGrad)" stroke="#d4a05c" stroke-width="1.5"/>
    <text x="50" y="230" font-size="12" fill="#333">DATA</text>
    <line x1="80" y1="215" x2="80" y2="245" stroke="#d4a05c" stroke-width="1"/>
    <text x="105" y="230" font-size="11" fill="#333">NEXT</text>
    <text x="80" y="262" text-anchor="middle" font-size="10" fill="#c44">struct Node {</text>
    <text x="80" y="275" text-anchor="middle" font-size="9" fill="#666">int data;</text>
    <text x="80" y="285" text-anchor="middle" font-size="9" fill="#666">Node* next;</text>
    <text x="80" y="295" text-anchor="middle" font-size="10" fill="#c44">};</text>
    
    <!-- Doubly Node -->
    <rect x="160" y="210" width="120" height="40" rx="4" fill="url(#nodeGrad2)" stroke="#5ca85c" stroke-width="1.5"/>
    <text x="180" y="230" font-size="10" fill="#333">PREV</text>
    <line x1="200" y1="215" x2="200" y2="245" stroke="#5ca85c" stroke-width="1"/>
    <text x="215" y="230" font-size="11" fill="#333">DATA</text>
    <line x1="235" y1="215" x2="235" y2="245" stroke="#5ca85c" stroke-width="1"/>
    <text x="255" y="230" font-size="10" fill="#333">NEXT</text>
    <text x="220" y="262" text-anchor="middle" font-size="10" fill="#3a7">struct DNode {</text>
    <text x="220" y="275" text-anchor="middle" font-size="9" fill="#666">int data;</text>
    <text x="220" y="285" text-anchor="middle" font-size="9" fill="#666">Node* prev;</text>
    <text x="220" y="295" text-anchor="middle" font-size="9" fill="#666">Node* next;</text>
    <text x="220" y="305" text-anchor="middle" font-size="10" fill="#3a7">};</text>
    
    <!-- Circular -->
    <rect x="300" y="210" width="90" height="40" rx="4" fill="url(#nodeGrad3)" stroke="#8c5ca8" stroke-width="1.5"/>
    <text x="325" y="225" font-size="10" fill="#333">DATA</text>
    <line x1="345" y1="215" x2="345" y2="245" stroke="#8c5ca8" stroke-width="1"/>
    <text x="365" y="230" font-size="10" fill="#333">NEXT</text>
    <text x="345" y="262" text-anchor="middle" font-size="10" fill="#7a3">Circular:</text>
    <text x="345" y="275" text-anchor="middle" font-size="9" fill="#666">last->next</text>
    <text x="345" y="285" text-anchor="middle" font-size="9" fill="#666">points to</text>
    <text x="345" y="295" text-anchor="middle" font-size="9" fill="#666">HEAD</text>
  </g>
  
  <!-- Key Operations -->
  <g class="section" data-narration="Key Operations: Insertion at head, tail, or middle. Deletion from head, tail, or by value. All operations O(1) at head, O(n) for search.">
    <rect x="15" y="270" width="390" height="60" rx="8" fill="#f9f9f9" stroke="#bbb" stroke-width="1"/>
    <text x="210" y="288" text-anchor="middle" class="label">Operations: Insert (Head/Tail/Middle), Delete, Search, Traverse</text>
    <text x="210" y="305" text-anchor="middle" font-size="10" fill="#555">Time Complexity: O(1) insert/delete at head • O(n) search • O(1) at tail with tail pointer</text>
    <text x="210" y="320" text-anchor="middle" font-size="10" fill="#555">Advantages: Dynamic size, no memory waste, efficient insert/delete • Disadvantages: No random access, extra memory for pointers</text>
  </g>
  
  <!-- Applications -->
  <g class="section" data-narration="Applications: Used in stacks, queues, graphs adjacency lists, browser history, music playlists, OS task scheduling.">
    <rect x="15" y="340" width="390" height="50" rx="8" fill="#fffef5" stroke="#cca" stroke-width="1"/>
    <text x="210" y="358" text-anchor="middle" class="label">Applications</text>
    <text x="210" y="375" text-anchor="middle" font-size="10" fill="#555">Stacks • Queues • Graph adjacency lists • Browser history • Music playlists • Task scheduling</text>
  </g>
  
  <!-- Animated decorative elements -->
  <circle cx="400" cy="385" r="8" fill="#e6f5e6" stroke="#5ca85c" stroke-width="1" class="pulse"/>
  <circle cx="20" cy="385" r="8" fill="#fff5e6" stroke="#e6a85c" stroke-width="1" class="pulse" style="animation-delay: 0.5s;"/>
  <circle cx="410" cy="50" r="6" fill="#f5e6f5" stroke="#8c5ca8" stroke-width="1" class="pulse" style="animation-delay: 1s;"/>
</svg>