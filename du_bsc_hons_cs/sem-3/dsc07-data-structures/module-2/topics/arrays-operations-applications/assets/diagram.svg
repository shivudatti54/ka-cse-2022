<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="arrays-operations-applications">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ecf8e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ab86c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; }
    .memory-box { animation: slideIn 0.8s ease-out backwards; }
    .op-box { animation: slideUp 0.6s ease-out backwards; }
    .pulse { animation: pulse 2s infinite; }
    .title-text { font-size: 22px; font-weight: bold; fill: #2c5282; }
    .section-title { font-size: 14px; font-weight: bold; fill: #2d3748; }
    .label { font-size: 13px; fill: #4a5568; }
    .detail { font-size: 11px; fill: #718096; }
    .value { font-size: 14px; font-weight: bold; fill: #fff; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <g class="title">
    <text x="210" y="28" text-anchor="middle" class="title-text">Arrays: Operations &amp; Applications</text>
    <line x1="60" y1="38" x2="360" y2="38" stroke="#4a90d9" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Memory Layout Section - Key Diagram -->
  <g transform="translate(20, 55)" data-narration="1D Array Memory Layout showing contiguous storage">
    <text x="0" y="0" class="section-title" data-narration="1D Array Memory Layout - Base Address 1000">1D Array Memory Layout</text>
    <text x="0" y="18" class="detail">Base Address: 1000 | Element Size: 4 bytes</text>
    
    <!-- Memory cells -->
    <g class="memory-box" style="animation-delay: 0.2s">
      <rect x="0" y="30" width="60" height="35" rx="4" fill="url(#memoryGradient)" filter="url(#shadow)"/>
      <text x="30" y="53" text-anchor="middle" class="value">10</text>
      <text x="30" y="78" text-anchor="middle" class="detail">Idx 0</text>
      <text x="30" y="90" text-anchor="middle" class="detail" fill="#2d3748">@1000</text>
    </g>
    
    <g class="memory-box" style="animation-delay: 0.4s">
      <rect x="70" y="30" width="60" height="35" rx="4" fill="url(#memoryGradient)" filter="url(#shadow)"/>
      <text x="100" y="53" text-anchor="middle" class="value">20</text>
      <text x="100" y="78" text-anchor="middle" class="detail">Idx 1</text>
      <text x="100" y="90" text-anchor="middle" class="detail" fill="#2d3748">@1004</text>
    </g>
    
    <g class="memory-box" style="animation-delay: 0.6s">
      <rect x="140" y="30" width="60" height="35" rx="4" fill="url(#memoryGradient)" filter="url(#shadow)"/>
      <text x="170" y="53" text-anchor="middle" class="value">30</text>
      <text x="170" y="78" text-anchor="middle" class="detail">Idx 2</text>
      <text x="170" y="90" text-anchor="middle" class="detail" fill="#2d3748">@1008</text>
    </g>
    
    <g class="memory-box" style="animation-delay: 0.8s">
      <rect x="210" y="30" width="60" height="35" rx="4" fill="url(#memoryGradient)" filter="url(#shadow)"/>
      <text x="240" y="53" text-anchor="middle" class="value">40</text>
      <text x="240" y="78" text-anchor="middle" class="detail">Idx 3</text>
      <text x="240" y="90" text-anchor="middle" class="detail" fill="#2d3748">@1012</text>
    </g>
    
    <g class="memory-box" style="animation-delay: 1s">
      <rect x="280" y="30" width="60" height="35" rx="4" fill="url(#memoryGradient)" filter="url(#shadow)"/>
      <text x="310" y="53" text-anchor="middle" class="value">50</text>
      <text x="310" y="78" text-anchor="middle" class="detail">Idx 4</text>
      <text x="310" y="90" text-anchor="middle" class="detail" fill="#2d3748">@1016</text>
    </g>
    
    <!-- Arrow showing memory progression -->
    <path d="M 340 47 L 355 47 L 350 43 M 355 47 L 350 51" stroke="#e53e3e" stroke-width="2" fill="none" class="pulse"/>
    <text x="352" y="42" class="detail" fill="#e53e3e" font-size="10">+4 bytes</text>
  </g>
  
  <!-- Operations Section -->
  <g transform="translate(20, 165)" data-narration="Core operations performed on arrays">
    <text x="0" y="0" class="section-title">Core Operations</text>
    
    <g class="op-box" style="animation-delay: 0.3s">
      <rect x="0" y="12" width="75" height="28" rx="4" fill="#9f7aea" opacity="0.85"/>
      <text x="37" y="31" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Traversal</text>
      <text x="77" y="27" class="detail">O(n)</text>
    </g>
    
    <g class="op-box" style="animation-delay: 0.5s">
      <rect x="85" y="12" width="75" height="28" rx="4" fill="#ed8936" opacity="0.85"/>
      <text x="122" y="31" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Insertion</text>
      <text x="162" y="27" class="detail">O(n)</text>
    </g>
    
    <g class="op-box" style="animation-delay: 0.7s">
      <rect x="170" y="12" width="70" height="28" rx="4" fill="#48bb78" opacity="0.85"/>
      <text x="205" y="31" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Deletion</text>
      <text x="242" y="27" class="detail">O(n)</text>
    </g>
    
    <g class="op-box" style="animation-delay: 0.9s">
      <rect x="0" y="48" width="75" height="28" rx="4" fill="#4299e1" opacity="0.85"/>
      <text x="37" y="67" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Search</text>
      <text x="77" y="63" class="detail">O(n)</text>
    </g>
    
    <g class="op-box" style="animation-delay: 1.1s">
      <rect x="85" y="48" width="75" height="28" rx="4" fill="#ed64a6" opacity="0.85"/>
      <text x="122" y="67" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Sorting</text>
      <text x="162" y="63" class="detail">O(n²)</text>
    </g>
    
    <g class="op-box" style="animation-delay: 1.3s">
      <rect x="170" y="48" width="70" height="28" rx="4" fill="#38b2ac" opacity="0.85"/>
      <text x="205" y="67" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Access</text>
      <text x="242" y="63" class="detail">O(1)</text>
    </g>
  </g>
  
  <!-- Key Characteristics Section -->
  <g transform="translate(250, 165)" data-narration="Key characteristics and features of arrays">
    <text x="0" y="0" class="section-title">Key Characteristics</text>
    
    <g class="op-box" style="animation-delay: 0.4s">
      <rect x="0" y="12" width="150" height="24" rx="4" fill="#feb2b2" opacity="0.9"/>
      <circle cx="12" cy="24" r="5" fill="#e53e3e"/>
      <text x="20" y="28" class="label" fill="#742a2a">Homogeneous Elements</text>
    </g>
    
    <g class="op-box" style="animation-delay: 0.6s">
      <rect x="0" y="42" width="150" height="24" rx="4" fill="#b2f5ea" opacity="0.9"/>
      <circle cx="12" cy="54" r="5" fill="#319795"/>
      <text x="20" y="58" class="label" fill="#234e52">Contiguous Memory</text>
    </g>
    
    <g class="op-box" style="animation-delay: 0.8s">
      <rect x="0" y="72" width="150" height="24" rx="4" fill="#bee3f8" opacity="0.9"/>
      <circle cx="12" cy="84" r="5" fill="#2b6cb0"/>
      <text x="20" y="88" class="label" fill="#2a4365">Fixed Size</text>
    </g>
    
    <g class="op-box" style="animation-delay: 1s">
      <rect x="0" y="102" width="150" height="24" rx="4" fill="#e9d8fd" opacity="0.9"/>
      <circle cx="12" cy="114" r="5" fill="#6b46c1"/>
      <text x="20" y="118" class="label" fill="#44337a">Random Access: O(1)</text>
    </g>
  </g>
  
  <!-- Applications Section -->
  <g transform="translate(20, 260)" data-narration="Real-world applications of arrays in computing">
    <text x="0" y="0" class="section-title">Applications</text>
    
    <g class="op-box" style="animation-delay: 0.3s">
      <rect x="0" y="12" width="110" height="30" rx="4" fill="url(#boxGradient)" filter="url(#shadow)"/>
      <text x="55" y="32" text-anchor="middle" fill="white" font-size="11">Stacks &amp; Queues</text>
    </g>
    
    <g class="op-box" style="animation-delay: 0.5s">
      <rect x="120" y="12" width="110" height="30" rx="4" fill="url(#boxGradient)" filter="url(#shadow)"/>
      <text x="175" y="32" text-anchor="middle" fill="white" font-size="11">Matrices</text>
    </g>
    
    <g class="op-box" style="animation-delay: 0.7s">
      <rect x="240" y="12" width="110" height="30" rx="4" fill="url(#boxGradient)" filter="url(#shadow)"/>
      <text x="295" y="32" text-anchor="middle" fill="white" font-size="11">Hash Tables</text>
    </g>
    
    <g class="op-box" style="animation-delay: 0.9s">
      <rect x="0" y="50" width="110" height="30" rx="4" fill="url(#boxGradient)" filter="url(#shadow)"/>
      <text x="55" y="70" text-anchor="middle" fill="white" font-size="11">Heap Sort</text>
    </g>
    
    <g class="op-box" style="animation-delay: 1.1s">
      <rect x="120" y="50" width="110" height="30" rx="4" fill="url(#boxGradient)" filter="url(#shadow)"/>
      <text x="175" y="70" text-anchor="middle" fill="white" font-size="11">Database Records</text>
    </g>
    
    <g class="op-box" style="animation-delay: 1.3s">
      <rect x="240" y="50" width="110" height="30" rx="4" fill="url(#boxGradient)" filter="url(#shadow)"/>
      <text x="295" y="70" text-anchor="middle" fill="white" font-size="11">Image Pixels</text>
    </g>
  </g>
  
  <!-- Multi-dimensional Note -->
  <g transform="translate(20, 320)" data-narration="Multi-dimensional arrays extend 1D concept">
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#fff5f5" stroke="#fc8181" stroke-width="1" opacity="0.9"/>
    <text x="90" y="16" text-anchor="middle" class="section-title" fill="#c53030">Multi-dimensional Arrays</text>
    <text x="90" y="30" text-anchor="middle" class="detail" fill="#742a2a">2D Arrays for matrices, 3D+ for complex data</text>
  </g>
  
  <!-- Time Complexity Reference -->
  <g transform="translate(220, 320)" data-narration="Time complexity comparison for array operations">
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#ebf8ff" stroke="#63b3ed" stroke-width="1" opacity="0.9"/>
    <text x="90" y="16" text-anchor="middle" class="section-title" fill="#2b6cb0">Time Complexity</text>
    <text x="90" y="30" text-anchor="middle" class="detail" fill="#2a4365">Access: O(1) | Search: O(n) | Sort: O(n log n)*</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(210, 385)">
    <text x="0" y="0" text-anchor="middle" class="detail" fill="#718096">*Using efficient sorting algorithms like Merge/Quick Sort</text>
  </g>
</svg>