<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="recursive-functions" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="callStackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe8cc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#888" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d8aa8"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes callPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #2c5282; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2d3748; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .code { font-family: 'Courier New', monospace; font-size: 11px; fill: #2d3748; }
    .highlight { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #c53030; }
    .base-case-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #276749; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .slide-in-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .call-stack-box { animation: callPulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title fade-in">Recursive Functions</text>
  
  <!-- Section 1: Base Case Box -->
  <g class="slide-in" style="animation-delay: 0.2s;">
    <rect x="20" y="55" width="115" height="50" rx="6" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#48bb78" stroke-width="2"/>
    <text x="77" y="72" text-anchor="middle" class="section-title">BASE CASE</text>
    <text x="77" y="88" text-anchor="middle" class="label">Stops recursion</text>
    <text x="77" y="100" text-anchor="middle" class="base-case-text">if (n == 0) return 1</text>
  </g>
  
  <!-- Section 2: Recursive Case Box -->
  <g class="slide-in" style="animation-delay: 0.4s;">
    <rect x="150" y="55" width="120" height="50" rx="6" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#ed8936" stroke-width="2"/>
    <text x="210" y="72" text-anchor="middle" class="section-title">RECURSIVE CASE</text>
    <text x="210" y="88" text-anchor="middle" class="label">Calls itself</text>
    <text x="210" y="100" text-anchor="middle" class="code">return n * f(n-1)</text>
  </g>
  
  <!-- Section 3: Call Stack Header -->
  <g class="fade-in" style="animation-delay: 0.6s;">
    <text x="320" y="75" text-anchor="middle" class="section-title">CALL STACK</text>
    <line x1="285" y1="82" x2="355" y2="82" stroke="#5d8aa8" stroke-width="2"/>
  </g>
  
  <!-- Call Stack Visualization - factorial(3) example -->
  <g class="slide-in-up" style="animation-delay: 0.8s;">
    <!-- Stack Frame 1: factorial(3) -->
    <rect x="285" y="90" width="120" height="28" rx="4" fill="#fed7d7" stroke="#e53e3e" stroke-width="2" class="call-stack-box"/>
    <text x="345" y="108" text-anchor="middle" class="code">factorial(3)</text>
    <text x="395" y="108" text-anchor="middle" class="label" fill="#c53030">→ 6</text>
    
    <!-- Arrow down -->
    <line x1="345" y1="118" x2="345" y2="130" stroke="#5d8aa8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Stack Frame 2: factorial(2) -->
    <rect x="285" y="132" width="120" height="28" rx="4" fill="#feebc8" stroke="#dd6b20" stroke-width="2" class="call-stack-box"/>
    <text x="345" y="150" text-anchor="middle" class="code">factorial(2)</text>
    <text x="395" y="150" text-anchor="middle" class="label" fill="#c05621">→ 2</text>
    
    <!-- Arrow down -->
    <line x1="345" y1="160" x2="345" y2="172" stroke="#5d8aa8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Stack Frame 3: factorial(1) -->
    <rect x="285" y="174" width="120" height="28" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="2" class="call-stack-box"/>
    <text x="345" y="192" text-anchor="middle" class="code">factorial(1)</text>
    <text x="395" y="192" text-anchor="middle" class="label" fill="#276749">→ 1</text>
    
    <!-- Arrow down -->
    <line x1="345" y1="202" x2="345" y2="214" stroke="#5d8aa8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Base Case: factorial(0) -->
    <rect x="285" y="216" width="120" height="28" rx="4" fill="#c3dafe" stroke="#3182ce" stroke-width="2" class="pulse"/>
    <text x="345" y="234" text-anchor="middle" class="code">factorial(0)</text>
    <text x="395" y="234" text-anchor="middle" class="highlight">= 1</text>
    <text x="345" y="250" text-anchor="middle" class="label" fill="#2b6cb0">BASE CASE!</text>
  </g>
  
  <!-- Section 4: Visual flow arrow from boxes to stack -->
  <g class="fade-in" style="animation-delay: 1s;">
    <path d="M 77 105 Q 77 130 120 130 L 275 130" stroke="#5d8aa8" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
    <text x="180" y="125" class="label" fill="#5d8aa8">Call Sequence</text>
  </g>
  
  <!-- Section 5: Return flow arrow -->
  <g class="fade-in" style="animation-delay: 1.2s;">
    <path d="M 345 252 L 345 270 Q 345 290 250 290 L 120 290" stroke="#48bb78" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
    <text x="200" y="285" class="label" fill="#48bb78">Return Sequence</text>
  </g>
  
  <!-- Section 6: Key explanation box -->
  <g class="slide-in-up" style="animation-delay: 1.4s;">
    <rect x="20" y="310" width="250" height="80" rx="6" fill="url(#callStackGradient)" filter="url(#shadow)" stroke="#805ad5" stroke-width="1.5"/>
    <text x="145" y="330" text-anchor="middle" class="section-title">How Recursion Works</text>
    <text x="30" y="350" class="label">1. Function calls itself with smaller problem</text>
    <text x="30" y="365" class="label">2. Continues until base case is reached</text>
    <text x="30" y="380" class="label">3. Returns results back up the call stack</text>
  </g>
  
  <!-- Recursion type labels -->
  <g class="fade-in" style="animation-delay: 1.6s;">
    <rect x="285" y="310" width="120" height="35" rx="4" fill="#e9d8fd" stroke="#805ad5" stroke-width="1.5"/>
    <text x="345" y="328" text-anchor="middle" class="section-title">Direct Recursion</text>
    <text x="345" y="340" text-anchor="middle" class="label">f() calls f()</text>
  </g>
  
  <!-- Narration attributes for accessibility -->
  <title data-narration="Introduction to recursive functions showing base case, recursive case, and call stack visualization">Recursive Functions Diagram</title>
  <desc data-narration="This diagram explains recursive functions with three key components: Base Case (stops recursion), Recursive Case (calls itself), and Call Stack showing factorial(3) example with 4 stack frames and return values">Educational Diagram</desc>
</svg>