<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="linear-and-binary-recursion">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="binaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-linear { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .section-binary { animation: slideInRight 0.8s ease-out 0.5s both; }
    .concept-box { animation: slideInDown 0.6s ease-out 0.7s both; }
    .call-box { animation: fadeIn 0.5s ease-out; }
    .base-case { animation: pulse 2s infinite; }
    .arrow-line { animation: arrowPulse 1.5s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Linear &amp; Binary Recursion</text>
  <line x1="80" y1="38" x2="340" y2="38" stroke="#4a90d9" stroke-width="2" class="title" />
  
  <!-- Linear Recursion Section -->
  <g class="section-linear" data-narration="Linear Recursion: Single recursive call creating a linear chain of function calls">
    <rect x="10" y="50" width="195" height="170" rx="8" fill="#fff" stroke="url(#linearGrad)" stroke-width="2" filter="url(#shadow)" />
    <text x="108" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#357abd">Linear Recursion</text>
    <text x="108" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">factorial(n)</text>
    
    <!-- Call Stack -->
    <g transform="translate(20, 92)">
      <rect x="0" y="0" width="85" height="20" rx="4" fill="#4a90d9" class="call-box" style="animation-delay: 0.1s" />
      <text x="42" y="14" text-anchor="middle" font-family="monospace" font-size="11" fill="white">factorial(5)</text>
      
      <rect x="0" y="24" width="85" height="20" rx="4" fill="#5a9fd9" class="call-box" style="animation-delay: 0.2s" />
      <text x="42" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="white">factorial(4)</text>
      
      <rect x="0" y="48" width="85" height="20" rx="4" fill="#6aaed9" class="call-box" style="animation-delay: 0.3s" />
      <text x="42" y="62" text-anchor="middle" font-family="monospace" font-size="11" fill="white">factorial(3)</text>
      
      <rect x="0" y="72" width="85" height="20" rx="4" fill="#7abed9" class="call-box" style="animation-delay: 0.4s" />
      <text x="42" y="86" text-anchor="middle" font-family="monospace" font-size="11" fill="white">factorial(2)</text>
      
      <rect x="0" y="96" width="85" height="20" rx="4" fill="#8acee0" class="call-box" style="animation-delay: 0.5s" />
      <text x="42" y="110" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">factorial(1)</text>
      
      <rect x="0" y="120" width="85" height="20" rx="4" fill="#2ecc71" class="call-box base-case" style="animation-delay: 0.6s" />
      <text x="42" y="134" text-anchor="middle" font-family="monospace" font-size="11" fill="white">BASE CASE</text>
    </g>
    
    <!-- Down Arrow -->
    <path d="M112 130 L112 150 L108 146 M112 150 L116 146" stroke="#4a90d9" stroke-width="2" fill="none" class="arrow-line" />
  </g>
  
  <!-- Binary Recursion Section -->
  <g class="section-binary" data-narration="Binary Recursion: Two recursive calls per function enabling divide-and-conquer strategy">
    <rect x="215" y="50" width="195" height="170" rx="8" fill="#fff" stroke="url(#binaryGrad)" stroke-width="2" filter="url(#shadow)" />
    <text x="312" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#449d44">Binary Recursion</text>
    <text x="312" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">fibonacci(n)</text>
    
    <!-- Tree Structure -->
    <g transform="translate(225, 95)">
      <rect x="70" y="0" width="80" height="20" rx="4" fill="#5cb85c" class="call-box" style="animation-delay: 0.2s" />
      <text x="110" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="white">fib(4)</text>
      
      <!-- Level 2 -->
      <rect x="20" y="35" width="60" height="18" rx="3" fill="#6dcc6d" class="call-box" style="animation-delay: 0.4s" />
      <text x="50" y="48" text-anchor="middle" font-family="monospace" font-size="9" fill="white">fib(3)</text>
      
      <rect x="100" y="35" width="60" height="18" rx="3" fill="#6dcc6d" class="call-box" style="animation-delay: 0.5s" />
      <text x="130" y="48" text-anchor="middle" font-family="monospace" font-size="9" fill="white">fib(2)</text>
      
      <!-- Level 3 -->
      <rect x="0" y="70" width="50" height="16" rx="3" fill="#8cdea0" class="call-box" style="animation-delay: 0.6s" />
      <text x="25" y="81" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">fib(2)</text>
      
      <rect x="55" y="70" width="50" height="16" rx="3" fill="#8cdea0" class="call-box" style="animation-delay: 0.7s" />
      <text x="80" y="81" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">fib(1)</text>
      
      <rect x="110" y="70" width="50" height="16" rx="3" fill="#8cdea0" class="call-box" style="animation-delay: 0.8s" />
      <text x="135" y="81" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">fib(1)</text>
      
      <rect x="165" y="70" width="50" height="16" rx="3" fill="#8cdea0" class="call-box" style="animation-delay: 0.9s" />
      <text x="190" y="81" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">fib(0)</text>
      
      <!-- Base Cases -->
      <rect x="0" y="95" width="40" height="14" rx="3" fill="#2ecc71" class="call-box base-case" style="animation-delay: 1s" />
      <text x="20" y="105" text-anchor="middle" font-family="monospace" font-size="8" fill="white">1</text>
      
      <rect x="55" y="95" width="40" height="14" rx="3" fill="#2ecc71" class="call-box base-case" style="animation-delay: 1.1s" />
      <text x="75" y="105" text-anchor="middle" font-family="monospace" font-size="8" fill="white">1</text>
      
      <rect x="110" y="95" width="40" height="14" rx="3" fill="#2ecc71" class="call-box base-case" style="animation-delay: 1.2s" />
      <text x="130" y="105" text-anchor="middle" font-family="monospace" font-size="8" fill="white">1</text>
      
      <rect x="165" y="95" width="40" height="14" rx="3" fill="#2ecc71" class="call-box base-case" style="animation-delay: 1.3s" />
      <text x="185" y="105" text-anchor="middle" font-family="monospace" font-size="8" fill="white">0</text>
      
      <!-- Connecting Lines -->
      <path d="M110 20 L50 35" stroke="#5cb85c" stroke-width="1" fill="none" class="arrow-line" />
      <path d="M110 20 L130 35" stroke="#5cb85c" stroke-width="1" fill="none" class="arrow-line" />
      <path d="M50 53 L25 70" stroke="#5cb85c" stroke-width="1" fill="none" class="arrow-line" />
      <path d="M50 53 L80 70" stroke="#5cb85c" stroke-width="1" fill="none" class="arrow-line" />
      <path d="M130 53 L135 70" stroke="#5cb85c" stroke-width="1" fill="none" class="arrow-line" />
      <path d="M130 53 L190 70" stroke="#5cb85c" stroke-width="1" fill="none" class="arrow-line" />
    </g>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key concepts: Base case stops recursion, recursive case makes the call smaller">
    <rect x="10" y="230" width="195" height="75" rx="8" fill="#fff9e6" stroke="#f0ad4e" stroke-width="1.5" filter="url(#shadow)" />
    <text x="20" y="248" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d9850e">Key Concepts</text>
    <text x="20" y="265" font-family="Arial, sans-serif" font-size="10" fill="#555">• Base Case: Condition that stops</text>
    <text x="20" y="278" font-family="Arial, sans-serif" font-size="10" fill="#555">  recursion (prevents infinite loop)</text>
    <text x="20" y="291" font-family="Arial, sans-serif" font-size="10" fill="#555">• Recursive Case: Function calls</text>
    <text x="20" y="304" font-family="Arial, sans-serif" font-size="10" fill="#555">  itself with smaller problem</text>
  </g>
  
  <!-- Differences Box -->
  <g class="concept-box" data-narration="Differences between linear and binary recursion patterns">
    <rect x="215" y="230" width="195" height="75" rx="8" fill="#e6f3ff" stroke="#5bc0de" stroke-width="1.5" filter="url(#shadow)" />
    <text x="225" y="248" font-family="Arial, sans-serif" font-size="12" font-weight="bold" color="#5bc0de" fill="#5bc0de">Key Differences</text>
    <text x="225" y="265" font-family="Arial, sans-serif" font-size="10" fill="#555">• Linear: 1 recursive call</text>
    <text x="225" y="278" font-family="Arial, sans-serif" font-size="10" fill="#555">  (factorial, sum, search)</text>
    <text x="225" y="291" font-family="Arial, sans-serif" font-size="10" fill="#555">• Binary: 2 recursive calls</text>
    <text x="225" y="304" font-family="Arial, sans-serif" font-size="10" fill="#555">  (fibonacci, mergesort)</text>
  </g>
  
  <!-- Applications Section -->
  <g class="concept-box" data-narration="Real-world applications of recursion in computing">
    <rect x="10" y="315" width="400" height="75" rx="8" fill="#fff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)" />
    <text x="210" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8e44ad">Applications</text>
    
    <g transform="translate(25, 350)">
      <circle cx="30" cy="8" r="6" fill="#9b59b6" />
      <text x="42" y="12" font-family="Arial, sans-serif" font-size="10" fill="#555">Trees &amp; Graphs</text>
      
      <circle cx="140" cy="8" r="6" fill="#e74c3c" />
      <text x="152" y="12" font-family="Arial, sans-serif" font-size="10" fill="#555">Sorting (Merge/Quick)</text>
      
      <circle cx="270" cy="8" r="6" fill="#3498db" />
      <text x="282" y="12" font-family="Arial, sans-serif" font-size="10" fill="#555">Dynamic Programming</text>
    </g>
    
    <g transform="translate(25, 372)">
      <circle cx="30" cy="8" r="6" fill="#f39c12" />
      <text x="42" y="12" font-family="Arial, sans-serif" font-size="10" fill="#555">File System Traversal</text>
      
      <circle cx="170" cy="8" r="6" fill="#1abc9c" />
      <text x="182" y="12" font-family="Arial, sans-serif" font-size="10" fill="#555">Backtracking Algorithms</text>
      
      <circle cx="320" cy="8" r="6" fill="#e67e22" />
      <text x="332" y="12" font-family="Arial, sans-serif" font-size="10" fill="#555">Mathematical Computations</text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.3">
    <circle cx="30" cy="380" r="8" fill="#4a90d9" />
    <circle cx="390" cy="380" r="8" fill="#5cb85c" />
    <circle cx="210" cy="380" r="6" fill="#9b59b6" />
  </g>
</svg>