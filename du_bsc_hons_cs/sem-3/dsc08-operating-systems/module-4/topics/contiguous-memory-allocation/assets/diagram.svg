<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="contiguous-memory-allocation" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e9f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="partitionGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8d5ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fb98e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="partitionGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7d9a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c275;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="partitionGradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="partitionGradient4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9b8e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b09bc7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateX(-30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes highlightPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .section-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .section-box:nth-child(4) { animation-delay: 0.8s; }
    .section-box:nth-child(5) { animation-delay: 1s; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #2d3748; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .highlight { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .waste-indicator { animation: highlightPulse 1.5s ease-in-out infinite; }
    .process-text { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #fff; }
    .waste-text { font-family: Arial, sans-serif; font-size: 9px; fill: #c53030; font-style: italic; }
    .arrow { stroke: #718096; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="8" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title">Contiguous Memory Allocation</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#4299e1" stroke-width="2" />
  
  <!-- Memory Layout Section -->
  <g class="section-box" data-narration="Memory divided into fixed-size partitions showing process allocation">
    <text x="20" y="58" class="label" style="font-weight:bold; font-size:12px;">Fixed Partitioning Memory Layout</text>
    
    <!-- Partition 1 -->
    <rect x="30" y="70" width="160" height="60" fill="url(#partitionGradient1)" rx="4" filter="url(#shadow)" />
    <text x="40" y="88" class="process-text">Process A</text>
    <text x="40" y="102" class="detail">15KB used</text>
    <rect x="30" y="115" width="160" height="15" fill="#c53030" fill-opacity="0.5" rx="0,0,4,4" class="waste-indicator" />
    <text x="40" y="126" class="waste-text">5KB wasted (internal fragmentation)</text>
    <text x="175" y="100" class="label" style="font-size:10px;">20KB</text>
  </g>
  
  <!-- Partition 2 -->
  <g class="section-box" data-narration="Process B occupying 18KB of 20KB partition with 2KB internal fragmentation">
    <rect x="210" y="70" width="160" height="60" fill="url(#partitionGradient2)" rx="4" filter="url(#shadow)" />
    <text x="220" y="88" class="process-text">Process B</text>
    <text x="220" y="102" class="detail">18KB used</text>
    <rect x="210" y="115" width="160" height="15" fill="#c53030" fill-opacity="0.5" rx="0,0,4,4" class="waste-indicator" />
    <text x="220" y="126" class="waste-text">2KB wasted</text>
    <text x="355" y="100" class="label" style="font-size:10px;">20KB</text>
  </g>
  
  <!-- Partition 3 - Empty -->
  <g class="section-box" data-narration="Empty partition available for new process allocation">
    <rect x="30" y="145" width="160" height="50" fill="url(#partitionGradient3)" rx="4" filter="url(#shadow)" />
    <text x="110" y="170" text-anchor="middle" class="label" style="fill:#718096;">Empty</text>
    <text x="175" y="170" class="label" style="font-size:10px;">30KB</text>
  </g>
  
  <!-- Partition 4 -->
  <g class="section-box" data-narration="Process C using 25KB of 30KB partition with 5KB wasted space">
    <rect x="210" y="145" width="160" height="50" fill="url(#partitionGradient4)" rx="4" filter="url(#shadow)" />
    <text x="220" y="163" class="process-text">Process C</text>
    <text x="220" y="177" class="detail">25KB used</text>
    <rect x="210" y="175" width="160" height="20" fill="#c53030" fill-opacity="0.5" rx="0,0,4,4" class="waste-indicator" />
    <text x="220" y="188" class="waste-text">5KB wasted</text>
    <text x="355" y="170" class="label" style="font-size:10px;">30KB</text>
  </g>
  
  <!-- Memory Table -->
  <g class="section-box" data-narration="Memory partition table showing allocation status">
    <text x="30" y="220" class="label" style="font-weight:bold; font-size:12px;">Memory Partition Table</text>
    <rect x="30" y="230" width="340" height="60" fill="#fff" stroke="#cbd5e0" stroke-width="1" rx="4" />
    
    <!-- Table Header -->
    <rect x="30" y="230" width="340" height="18" fill="#edf2f7" rx="4,4,0,0" />
    <text x="40" y="243" class="detail" style="font-weight:bold;">Partition</text>
    <text x="130" y="243" class="detail" style="font-weight:bold;">Size</text>
    <text x="200" y="243" class="detail" style="font-weight:bold;">Process</text>
    <text x="290" y="243" class="detail" style="font-weight:bold;">Status</text>
    
    <!-- Table Rows -->
    <text x="40" y="260" class="detail">P1</text>
    <text x="130" y="260" class="detail">20KB</text>
    <text x="200" y="260" class="detail">Process A</text>
    <text x="290" y="260" class="detail" style="fill:#38a169;">Allocated</text>
    
    <text x="40" y="278" class="detail">P2</text>
    <text x="130" y="278" class="detail">20KB</text>
    <text x="200" y="278" class="detail">Process B</text>
    <text x="290" y="278" class="detail" style="fill:#38a169;">Allocated</text>
    
    <text x="40" y="296" class="detail">P3</text>
    <text x="130" y="296" class="detail">30KB</text>
    <text x="200" y="296" class="detail">—</text>
    <text x="290" y="296" class="detail" style="fill:#e53e3e;">Free</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-box" data-narration="Key concepts: internal fragmentation, continuous allocation, memory protection">
    <text x="30" y="315" class="label" style="font-weight:bold; font-size:12px;">Key Concepts</text>
    <rect x="30" y="325" width="340" height="65" fill="#fffaf0" stroke="#f6ad55" stroke-width="1" rx="4" />
    
    <circle cx="45" cy="340" r="4" fill="#ed8936" />
    <text x="55" y="344" class="detail">Internal Fragmentation: Wasted space within allocated partitions</text>
    
    <circle cx="45" cy="355" r="4" fill="#ed8936" />
    <text x="55" y="359" class="detail">Continuous: Each process occupies single contiguous block</text>
    
    <circle cx="45" cy="370" r="4" fill="#ed8936" />
    <text x="55" y="374" class="detail">Memory Protection: Base &amp; Limit registers ensure isolation</text>
  </g>
  
  <!-- Arrow showing relationship -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718096" />
    </marker>
  </defs>
  
  <!-- Visual indicators -->
  <g class="highlight" style="transform-origin: 110px 145px;">
    <rect x="105" y="135" width="10" height="10" fill="#c53030" rx="2" />
    <text x="80" y="143" class="waste-text" style="font-size:8px;">Waste</text>
  </g>
</svg>