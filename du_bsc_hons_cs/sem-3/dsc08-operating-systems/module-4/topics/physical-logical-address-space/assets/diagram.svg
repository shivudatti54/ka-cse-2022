<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="physical-logical-address-space" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mmuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9bcfb0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6eb88a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ramGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c8a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a878;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ptGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a0d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a87eb8;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(60px); }
    }
    .section-cpu { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-mmu { animation: slideInUp 0.6s ease-out 0.5s both; }
    .section-pagetable { animation: slideInUp 0.6s ease-out 0.8s both; }
    .section-ram { animation: slideInRight 0.6s ease-out 1.1s both; }
    .title-anim { animation: fadeIn 0.8s ease-out 0s both; }
    .label-anim { animation: fadeIn 0.5s ease-out both; }
    .arrow-anim { animation: fadeIn 0.4s ease-out 1.3s both; }
    .concept-box { animation: slideInUp 0.5s ease-out both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .title { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 14px; font-weight: bold; fill: #fff; }
    .detail { font-size: 11px; fill: #555; }
    .address { font-size: 10px; font-family: monospace; fill: #333; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />

  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Physical &amp; Logical Address Space</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#7eb8da" stroke-width="2" class="title-anim" />

  <!-- CPU Section -->
  <g class="section-cpu" data-narration="CPU generates logical (virtual) addresses that programs use">
    <rect x="30" y="80" width="80" height="70" rx="8" fill="url(#cpuGradient)" filter="url(#shadow)" />
    <text x="70" y="105" text-anchor="middle" class="label">CPU</text>
    <text x="70" y="122" text-anchor="middle" class="detail" fill="#fff">Generates</text>
    <text x="70" y="138" text-anchor="middle" class="detail" fill="#fff">Logical Addr</text>
    <!-- Address output -->
    <rect x="40" y="155" width="60" height="22" rx="3" fill="#fff" stroke="#5a9bc4" stroke-width="1" />
    <text x="70" y="170" text-anchor="middle" class="address">0x0040A120</text>
  </g>

  <!-- Arrow from CPU to MMU -->
  <g class="arrow-anim">
    <line x1="115" y1="115" x2="150" y2="115" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="132" y="108" text-anchor="middle" class="detail" font-size="10">Logical Addr</text>
  </g>

  <!-- MMU Section -->
  <g class="section-mmu" data-narration="MMU (Memory Management Unit) translates logical addresses to physical addresses">
    <rect x="155" y="85" width="90" height="60" rx="8" fill="url(#mmuGradient)" filter="url(#shadow)" />
    <text x="200" y="107" text-anchor="middle" class="label">MMU</text>
    <text x="200" y="125" text-anchor="middle" class="detail" fill="#fff">Translation</text>
    <text x="200" y="138" text-anchor="middle" class="detail" fill="#fff">Unit</text>
  </g>

  <!-- Arrow from MMU to Page Table -->
  <g class="arrow-anim">
    <line x1="245" y1="175" x2="245" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="252" y="195" text-anchor="middle" class="detail" font-size="10">Lookup</text>
  </g>

  <!-- Page Table Section -->
  <g class="section-pagetable" data-narration="Page Table maps virtual page numbers to physical frame numbers">
    <rect x="180" y="215" width="130" height="55" rx="6" fill="url(#ptGradient)" filter="url(#shadow)" />
    <text x="245" y="232" text-anchor="middle" class="label" font-size="13">Page Table</text>
    <rect x="188" y="240" width="114" height="4" fill="#fff" opacity="0.5" />
    <text x="195" y="255" class="address" font-size="9">VPN: 0x0040 → PFN: 0x01A</text>
    <text x="195" y="268" class="address" font-size="9">VPN: 0x0041 → PFN: 0x03B</text>
  </g>

  <!-- Arrow from Page Table to RAM -->
  <g class="arrow-anim">
    <line x1="310" y1="115" x2="345" y2="115" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="328" y="108" text-anchor="middle" class="detail" font-size="10">Physical Addr</text>
  </g>

  <!-- Physical RAM Section -->
  <g class="section-ram" data-narration="Physical RAM contains actual data at physical memory locations">
    <rect x="350" y="70" width="60" height="90" rx="6" fill="url(#ramGradient)" filter="url(#shadow)" />
    <text x="380" y="92" text-anchor="middle" class="label">RAM</text>
    <text x="380" y="107" text-anchor="middle" class="detail" fill="#fff">Physical</text>
    <line x1="358" y1="115" x2="402" y2="115" stroke="#d4a878" stroke-width="1" />
    <rect x="358" y="120" width="44" height="10" fill="#fff" opacity="0.6" />
    <text x="380" y="128" class="address" font-size="8">0x01A000</text>
    <rect x="358" y="132" width="44" height="10" fill="#fff" opacity="0.6" />
    <text x="380" y="140" class="address" font-size="8">0x03B000</text>
    <rect x="358" y="144" width="44" height="10" fill="#fff" opacity="0.6" />
    <text x="380" y="152" class="address" font-size="8">...</text>
  </g>

  <!-- Address Flow Labels -->
  <g class="arrow-anim">
    <line x1="110" y1="195" x2="180" y2="195" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
    <text x="145" y="205" text-anchor="middle" class="detail" font-size="9">Logical: 0x0040A120</text>
    
    <line x1="310" y1="195" x2="350" y2="195" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
    <text x="330" y="205" text-anchor="middle" class="detail" font-size="9">Physical: 0x01A120</text>
  </g>

  <!-- Key Concept Boxes -->
  <g class="concept-box" data-narration="Logical Address Space: Range of addresses used by a program" style="animation-delay: 1.4s">
    <rect x="15" y="280" width="120" height="50" rx="5" fill="#fff" stroke="#7eb8da" stroke-width="1.5" />
    <text x="75" y="295" text-anchor="middle" class="label" fill="#5a9bc4" font-size="11">Logical Addr Space</text>
    <text x="75" y="312" text-anchor="middle" class="detail" font-size="9">Program's view of</text>
    <text x="75" y="324" text-anchor="middle" class="detail" font-size="9">memory (0 to max)</text>
  </g>

  <g class="concept-box" data-narration="Physical Address Space: Actual RAM locations" style="animation-delay: 1.6s">
    <rect x="145" y="280" width="120" height="50" rx="5" fill="#fff" stroke="#d4a878" stroke-width="1.5" />
    <text x="205" y="295" text-anchor="middle" class="label" fill="#b8864a" font-size="11">Physical Addr Space</text>
    <text x="205" y="312" text-anchor="middle" class="detail" font-size="9">Actual RAM locations</text>
    <text x="205" y="324" text-anchor="middle" class="detail" font-size="9">(hardware memory)</text>
  </g>

  <g class="concept-box" data-narration="MMU provides address translation enabling virtual memory" style="animation-delay: 1.8s">
    <rect x="275" y="280" width="120" height="50" rx="5" fill="#fff" stroke="#6eb88a" stroke-width="1.5" />
    <text x="335" y="295" text-anchor="middle" class="label" fill="#4a8a62" font-size="11">MMU Role</text>
    <text x="335" y="312" text-anchor="middle" class="detail" font-size="9">Translates virtual</text>
    <text x="335" y="324" text-anchor="middle" class="detail" font-size="9">to physical addresses</text>
  </g>

  <!-- Translation Formula Box -->
  <g class="concept-box" data-narration="Physical Address = Frame Number × Frame Size + Offset" style="animation-delay: 2.0s">
    <rect x="130" y="340" width="160" height="35" rx="5" fill="#2c3e50" />
    <text x="210" y="358" text-anchor="middle" class="label" fill="#fff" font-size="12">PA = (VPN × FrameSize) + Offset</text>
    <text x="210" y="372" text-anchor="middle" class="detail" fill="#aaa" font-size="9">Address Translation Formula</text>
  </g>
</svg>