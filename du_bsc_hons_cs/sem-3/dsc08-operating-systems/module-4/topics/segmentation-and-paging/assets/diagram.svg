<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="segmentation-and-paging">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="virtualGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2bec3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="physicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3436"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .virtual-box { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .table-box { animation: fadeIn 0.8s ease-out 0.5s both; }
    .physical-box { animation: slideInRight 0.8s ease-out 0.8s both; }
    .arrow-anim { animation: fadeIn 0.5s ease-out 1s both; }
    .concept-box { animation: fadeIn 0.6s ease-out 1.2s both; }
    .pulse:hover { animation: pulse 0.6s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3436" class="title">Segmentation and Paging</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#636e72" class="title">Virtual to Physical Address Translation</text>
  
  <!-- Virtual Address Section -->
  <g class="virtual-box" data-narration="Virtual Address: Generated by CPU, contains Virtual Page Number (VPN) and Offset">
    <rect x="20" y="80" width="100" height="120" fill="url(#virtualGradient)" rx="6" stroke="#e17055" stroke-width="2" class="pulse"/>
    <text x="70" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Virtual Address</text>
    <text x="70" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">Binary: 10110</text>
    <text x="70" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#636e72">(20-bit)</text>
    <line x1="20" y1="155" x2="120" y2="155" stroke="#2d3436" stroke-width="1" stroke-dasharray="4"/>
    <text x="70" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d63031">VPN: 10110</text>
    <text x="70" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d63031">Offset: 00100</text>
  </g>
  
  <!-- Arrow from Virtual to Page Table -->
  <g class="arrow-anim">
    <path d="M 130 140 L 165 140" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Page Table Section -->
  <g class="table-box" data-narration="Page Table: Maps Virtual Page Numbers to Physical Frame Numbers">
    <rect x="170" y="70" width="120" height="140" fill="url(#tableGradient)" rx="6" stroke="#636e72" stroke-width="2" class="pulse"/>
    <text x="230" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Page Table</text>
    <rect x="180" y="100" width="100" height="25" fill="#fff" rx="3" stroke="#b2bec3"/>
    <text x="195" y="117" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">VPN</text>
    <text x="245" y="117" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">PFN</text>
    <rect x="180" y="125" width="100" height="25" fill="#ffeaa7" rx="3" stroke="#fdcb6e"/>
    <text x="195" y="142" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">10110</text>
    <text x="245" y="142" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d63031">00101</text>
    <rect x="180" y="150" width="100" height="25" fill="#fff" rx="3" stroke="#b2bec3"/>
    <text x="195" y="167" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">00001</text>
    <text x="245" y="167" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">00010</text>
    <rect x="180" y="175" width="100" height="25" fill="#fff" rx="3" stroke="#b2bec3"/>
    <text x="195" y="192" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">00010</text>
    <text x="245" y="192" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">00111</text>
  </g>
  
  <!-- Arrow from Page Table to Physical -->
  <g class="arrow-anim">
    <path d="M 300 140 L 335 140" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Physical Address Section -->
  <g class="physical-box" data-narration="Physical Address: Generated using Frame Number from page table and same offset">
    <rect x="340" y="80" width="70" height="120" fill="url(#physicalGradient)" rx="6" stroke="#00b894" stroke-width="2" class="pulse"/>
    <text x="375" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Physical</text>
    <text x="375" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2d3436">Address</text>
    <text x="375" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#636e72">(15-bit)</text>
    <line x1="340" y1="150" x2="410" y2="150" stroke="#2d3436" stroke-width="1" stroke-dasharray="4"/>
    <text x="375" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d63031">PFN: 00101</text>
    <text x="375" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d63031">Offset: 00100</text>
  </g>
  
  <!-- Concept Boxes -->
  <g class="concept-box" data-narration="Key benefit of paging: eliminates external fragmentation">
    <rect x="20" y="220" width="180" height="55" fill="#fff" rx="5" stroke="#a29bfe" stroke-width="1.5"/>
    <text x="30" y="238" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6c5ce7">Paging Benefits</text>
    <text x="30" y="255" font-family="Arial, sans-serif" font-size="10" fill="#636e72">• Eliminates external</text>
    <text x="30" y="268" font-family="Arial, sans-serif" font-size="10" fill="#636e72">  fragmentation</text>
  </g>
  
  <g class="concept-box" data-narration="Segmentation provides logical view of memory">
    <rect x="210" y="220" width="190" height="55" fill="#fff" rx="5" stroke="#fd79a8" stroke-width="1.5"/>
    <text x="220" y="238" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e84393">Segmentation</text>
    <text x="220" y="255" font-family="Arial, sans-serif" font-size="10" fill="#636e72">• Logical memory view</text>
    <text x="220" y="268" font-family="Arial, sans-serif" font-size="10" fill="#636e72">• Code, Data, Stack, Heap</text>
  </g>
  
  <g class="concept-box" data-narration="Translation lookaside buffer (TLB) speeds up address translation">
    <rect x="115" y="285" width="190" height="55" fill="#fff" rx="5" stroke="#55efc4" stroke-width="1.5"/>
    <text x="125" y="303" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00b894">Address Translation</text>
    <text x="125" y="320" font-family="Arial, sans-serif" font-size="10" fill="#636e72">Virtual = VPN × PageSize + Offset</text>
    <text x="125" y="333" font-family="Arial, sans-serif" font-size="10" fill="#636e72">Physical = PFN × PageSize + Offset</text>
  </g>
  
  <!-- Footer -->
  <text x="210" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#636e72">CPU → MMU → Physical Memory</text>
</svg>