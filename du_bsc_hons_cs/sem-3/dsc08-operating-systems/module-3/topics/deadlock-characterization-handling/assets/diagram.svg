<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="deadlock-characterization-handling">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff"/>
      <stop offset="50%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#fff5f5"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="resourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#d6820a"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .label-bold { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .dashed-line {
      stroke-dasharray: 8,4;
      animation: dash 20s linear infinite;
    }
    .section-box {
      fill: #ffffff;
      stroke: #bdc3c7;
      stroke-width: 1.5;
      rx: 8;
    }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title slide-in">Deadlock: Characterization</text>
  <text x="210" y="50" text-anchor="middle" class="label slide-in" style="animation-delay: 0.2s">and Handling Methods</text>
  
  <!-- Section 1: Four Necessary Conditions -->
  <g data-narration="The four Coffman conditions that must all hold for deadlock to occur">
    <rect x="10" y="65" width="190" height="100" class="section-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.3s"/>
    <text x="105" y="80" text-anchor="middle" class="label-bold" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.4s">Four Necessary Conditions</text>
    <g style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.5s">
      <circle cx="25" cy="98" r="4" fill="#e74c3c"/>
      <text x="35" y="102" class="detail">Mutual Exclusion</text>
      <circle cx="25" cy="118" r="4" fill="#e74c3c"/>
      <text x="35" y="122" class="detail">Hold and Wait</text>
      <circle cx="25" cy="138" r="4" fill="#e74c3c"/>
      <text x="35" y="142" class="detail">No Preemption</text>
      <circle cx="25" cy="158" r="4" fill="#e74c3c"/>
      <text x="35" y="162" class="detail">Circular Wait</text>
    </g>
  </g>
  
  <!-- Section 2: Resource Allocation Graph -->
  <g data-narration="Resource Allocation Graph showing cyclic dependency - P1 holds R1 waits for R2, P2 holds R2 waits for R1">
    <rect x="210" y="65" width="200" height="130" class="section-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.4s"/>
    <text x="310" y="80" text-anchor="middle" class="label-bold" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.5s">Resource Allocation Graph</text>
    
    <!-- Process P1 -->
    <ellipse cx="260" cy="120" rx="25" ry="18" fill="url(#processGrad)" class="pulse" style="animation-delay: 0.6s"/>
    <text x="260" y="124" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">P1</text>
    
    <!-- Process P2 -->
    <ellipse cx="360" cy="120" rx="25" ry="18" fill="url(#processGrad)" class="pulse" style="animation-delay: 0.7s"/>
    <text x="360" y="124" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">P2</text>
    
    <!-- Resource R1 -->
    <rect x="280" y="155" width="30" height="25" rx="4" fill="url(#resourceGrad)"/>
    <text x="295" y="172" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">R1</text>
    
    <!-- Resource R2 -->
    <rect x="320" y="155" width="30" height="25" rx="4" fill="url(#resourceGrad)"/>
    <text x="335" y="172" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">R2</text>
    
    <!-- Assignment edges -->
    <line x1="260" y1="135" x2="288" y2="165" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.8s"/>
    <line x1="360" y1="135" x2="332" y2="165" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.9s"/>
    
    <!-- Request edges (dashed showing deadlock) -->
    <line x1="310" y1="148" x2="330" y2="165" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" class="dashed-line" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1s"/>
    <line x1="330" y1="148" x2="310" y2="165" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" class="dashed-line" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.1s"/>
    
    <text x="310" y="195" text-anchor="middle" class="detail" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.2s">Cyclic Wait = Deadlock!</text>
  </g>
  
  <!-- Section 3: Handling Methods -->
  <g data-narration="Three main strategies for handling deadlocks: Prevention, Avoidance, and Detection with Recovery">
    <rect x="10" y="175" width="190" height="95" class="section-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.6s"/>
    <text x="105" y="190" text-anchor="middle" class="label-bold" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.7s">Handling Methods</text>
    <g style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.8s">
      <rect x="20" y="200" width="50" height="20" rx="3" fill="#3498db"/>
      <text x="45" y="214" text-anchor="middle" fill="white" font-size="9" font-family="Arial">Prevent</text>
      <text x="75" y="214" class="detail">Ensure one condition fails</text>
      
      <rect x="20" y="225" width="50" height="20" rx="3" fill="#9b59b6"/>
      <text x="45" y="239" text-anchor="middle" fill="white" font-size="9" font-family="Arial">Avoid</text>
      <text x="75" y="239" class="detail">Banker's Algorithm</text>
      
      <rect x="20" y="250" width="50" height="20" rx="3" fill="#e67e22"/>
      <text x="45" y="264" text-anchor="middle" fill="white" font-size="9" font-family="Arial">Detect</text>
      <text x="75" y="264" class="detail">+ Recovery (kill/rollback)</text>
    </g>
  </g>
  
  <!-- Section 4: Classic Example -->
  <g data-narration="Real-world example: Two database transactions waiting on each other's locks">
    <rect x="210" y="205" width="200" height="85" class="section-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.8s"/>
    <text x="310" y="220" text-anchor="middle" class="label-bold" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.9s">Classic Database Example</text>
    <g style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1s">
      <rect x="225" y="232" width="170" height="50" rx="5" fill="#f8f9fa" stroke="#ecf0f1"/>
      <text x="310" y="250" text-anchor="middle" class="detail">Transaction A: Lock Table1 → Wait for Table2</text>
      <text x="310" y="268" text-anchor="middle" class="detail">Transaction B: Lock Table2 → Wait for Table1</text>
      <circle cx="310" y="282" r="6" fill="#e74c3c" class="pulse"/>
      <text x="324" y="286" class="detail" style="fill:#e74c3c">DEADLOCK!</text>
    </g>
  </g>
  
  <!-- Section 5: Key Concept Box -->
  <g data-narration="Key definition: Deadlock is a permanent blocking state where processes wait indefinitely">
    <rect x="10" y="280" width="190" height="50" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1s"/>
    <text x="105" y="300" text-anchor="middle" class="label-bold" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.1s">Key Definition</text>
    <text x="105" y="318" text-anchor="middle" class="detail" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.2s">Deadlock: Processes permanently blocked</text>
    <text x="105" y="332" text-anchor="middle" class="detail" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.3s">waiting for resources held by each other</text>
  </g>
  
  <!-- Section 6: Visual Legend -->
  <g data-narration="Legend explaining graph notation: circles for processes, rectangles for resources">
    <rect x="210" y="300" width="200" height="40" rx="6" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.2s"/>
    <text x="220" y="318" class="detail" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.3s">Legend:</text>
    <ellipse cx="260" cy="325" rx="8" ry="6" fill="#4a90d9"/>
    <text x="272" y="329" class="detail">Process</text>
    <rect x="310" y="318" width="14" height="12" rx="2" fill="#f5a623"/>
    <text x="328" y="329" class="detail">Resource</text>
    <line x1="350" y1="325" x2="365" y2="325" stroke="#27ae60" stroke-width="2"/>
    <text x="370" y1="329" class="detail">Hold</text>
    <line x1="395" y1="325" x2="405" y2="325" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Bottom info -->
  <text x="210" y="380" text-anchor="middle" class="detail" style="animation: fadeIn 1s ease-out forwards; animation-delay: 1.5s">DU OS Study Material - Deadlock Chapter</text>
</svg>