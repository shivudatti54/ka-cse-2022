<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="process-scheduling-algorithms" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#7bc9a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes ganttSlide {
      from { width: 0; }
      to { width: var(--target-width); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .sublabel { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .process-box { opacity: 0; animation: slideInUp 0.6s ease forwards; }
    .box-1 { animation-delay: 0.2s; }
    .box-2 { animation-delay: 0.4s; }
    .box-3 { animation-delay: 0.6s; }
    .box-4 { animation-delay: 0.8s; }
    .concept-box { opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .concept-1 { animation-delay: 0.3s; }
    .concept-2 { animation-delay: 0.5s; }
    .arrow { stroke: #3498db; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .highlight { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Process Scheduling Algorithms</text>
  <line x1="30" y1="42" x2="390" y2="42" stroke="#3498db" stroke-width="2"/>
  
  <!-- Gantt Chart Section -->
  <g data-narration="FCFS Gantt Chart showing sequential execution of processes P1, P2, P3, P4">
    <text x="30" y="65" class="section-title">FCFS Scheduling (Gantt Chart)</text>
    <!-- Time axis -->
    <line x1="50" y1="115" x2="380" y2="115" stroke="#7f8c8d" stroke-width="1"/>
    <text x="50" y="130" class="sublabel" style="font-size:10px">0</text>
    <text x="110" y="130" class="sublabel" style="font-size:10px">5</text>
    <text x="170" y="130" class="sublabel" style="font-size:10px">10</text>
    <text x="230" y="130" class="sublabel" style="font-size:10px">15</text>
    <text x="290" y="130" class="sublabel" style="font-size:10px">20</text>
    <text x="350" y="130" class="sublabel" style="font-size:10px">25</text>
    
    <!-- Process blocks -->
    <g class="process-box box-1">
      <rect x="50" y="75" width="60" height="35" fill="url(#processGradient)" rx="4" filter="url(#shadow)"/>
      <text x="80" y="92" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">P1</text>
      <text x="80" y="108" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Burst:5</text>
    </g>
    <g class="process-box box-2">
      <rect x="110" y="75" width="60" height="35" fill="#e74c3c" rx="4" filter="url(#shadow)"/>
      <text x="140" y="92" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">P2</text>
      <text x="140" y="108" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Burst:5</text>
    </g>
    <g class="process-box box-3">
      <rect x="170" y="75" width="90" height="35" fill="#9b59b6" rx="4" filter="url(#shadow)"/>
      <text x="215" y="92" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">P3</text>
      <text x="215" y="108" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Burst:9</text>
    </g>
    <g class="process-box box-4">
      <rect x="260" y="75" width="120" height="35" fill="#27ae60" rx="4" filter="url(#shadow)"/>
      <text x="320" y="92" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">P4</text>
      <text x="320" y="108" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Burst:12</text>
    </g>
    
    <!-- Completion times -->
    <g class="concept-box concept-1">
      <text x="105" y="145" class="sublabel" fill="#e74c3c">P1:5</text>
      <text x="165" y="145" class="sublabel" fill="#9b59b6">P2:10</text>
      <text x="215" y="145" class="sublabel" fill="#27ae60">P3:19</text>
      <text x="315" y="145" class="sublabel" fill="#34495e">P4:25</text>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="CPU Scheduler and Dispatcher concepts explaining how processes are selected">
    <text x="30" y="170" class="section-title">Key Components</text>
    
    <!-- CPU Scheduler Box -->
    <rect x="30" y="180" width="170" height="55" fill="white" stroke="#3498db" stroke-width="1.5" rx="6" filter="url(#shadow)" class="concept-box concept-1"/>
    <text x="40" y="198" class="label" font-weight="bold">CPU Scheduler</text>
    <text x="40" y="215" class="sublabel">Selects process from</text>
    <text x="40" y="228" class="sublabel">ready queue for CPU</text>
    
    <!-- Dispatcher Box -->
    <rect x="220" y="180" width="170" height="55" fill="white" stroke="#9b59b6" stroke-width="1.5" rx="6" filter="url(#shadow)" class="concept-box concept-2"/>
    <text x="230" y="198" class="label" font-weight="bold">Dispatcher</text>
    <text x="230" y="215" class="sublabel">Gives control of CPU</text>
    <text x="230" y="228" class="sublabel">to selected process</text>
    
    <!-- Arrow between boxes -->
    <path d="M200 207 L220 207" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- Algorithms Comparison -->
  <g data-narration="Four main scheduling algorithms: FCFS, SJF, Priority, and Round Robin">
    <text x="30" y="255" class="section-title">Scheduling Algorithms</text>
    
    <!-- Algorithm cards -->
    <rect x="30" y="265" width="85" height="40" fill="url(#highlightGradient)" rx="4" class="concept-box concept-1"/>
    <text x="72" y="283" text-anchor="middle" class="label" font-weight="bold">FCFS</text>
    <text x="72" y="298" text-anchor="middle" class="sublabel" style="font-size:10px">First Come First</text>
    
    <rect x="125" y="265" width="85" height="40" fill="#ffeaa7" rx="4" class="concept-box concept-2"/>
    <text x="167" y="283" text-anchor="middle" class="label" font-weight="bold">SJF</text>
    <text x="167" y="298" text-anchor="middle" class="sublabel" style="font-size:10px">Shortest Job First</text>
    
    <rect x="220" y="265" width="85" height="40" fill="#fab1a0" rx="4" class="concept-box concept-3"/>
    <text x="262" y="283" text-anchor="middle" class="label" font-weight="bold">Priority</text>
    <text x="262" y="298" text-anchor="middle" class="sublabel" style="font-size:10px">Priority Based</text>
    
    <rect x="315" y="265" width="75" height="40" fill="#74b9ff" rx="4" class="concept-box concept-4"/>
    <text x="352" y="283" text-anchor="middle" class="label" font-weight="bold">RR</text>
    <text x="352" y="298" text-anchor="middle" class="sublabel" style="font-size:10px">Round Robin</text>
  </g>
  
  <!-- Performance Metrics -->
  <g data-narration="Performance metrics used to evaluate scheduling algorithms">
    <text x="30" y="325" class="section-title">Performance Metrics</text>
    
    <rect x="30" y="335" width="175" height="30" fill="white" stroke="#e74c3c" stroke-width="1" rx="4" class="concept-box concept-2"/>
    <text x="45" y="352" class="label">Throughput</text>
    <text x="140" y="352" class="sublabel">Processes/unit time</text>
    
    <rect x="215" y="335" width="175" height="30" fill="white" stroke="#e74c3c" stroke-width="1" rx="4" class="concept-box concept-3"/>
    <text x="230" y="352" class="label">Turnaround Time</text>
    <text x="330" y="352" class="sublabel">Completion - Arrival</text>
    
    <rect x="30" y="375" width="175" height="20" fill="white" stroke="#27ae60" stroke-width="1" rx="4" class="concept-box concept-4"/>
    <text x="45" y="389" class="sublabel">CPU Utilization - % CPU busy</text>
    
    <rect x="215" y="375" width="175" height="20" fill="white" stroke="#27ae60" stroke-width="1" rx="4" class="concept-box concept-4"/>
    <text x="230" y="389" class="sublabel">Waiting Time - Time in ready queue</text>
  </g>
  
  <!-- Footer note -->
  <text x="210" y="398" text-anchor="middle" class="sublabel" style="font-size:10px">Linux uses CFS | Windows uses Multilevel Feedback Queue</text>
</svg>