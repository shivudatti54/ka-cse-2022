<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="threads-multicore-multithreading">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateReady" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateRunning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateBlocked" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateTerminated" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1565c0; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; font-weight: 600; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .state-box { filter: url(#shadow); }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5 { animation: slideInUp 0.6s ease-out 1s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Thread States &amp; Transitions</text>
  <text x="210" y="46" text-anchor="middle" class="detail" style="font-size:12px;">Thread Lifecycle in Multithreading</text>
  
  <!-- Thread State Diagram -->
  <!-- NEW State -->
  <g class="box1" data-narration="NEW/CREATED: Thread is being created but not yet started. Memory and resources are allocated.">
    <rect x="30" y="70" width="70" height="50" rx="8" fill="url(#stateNew)" stroke="#ff9800" stroke-width="2" class="state-box"/>
    <text x="65" y="92" text-anchor="middle" class="label" style="font-size:12px;">NEW</text>
    <text x="65" y="107" text-anchor="middle" class="detail">Created</text>
  </g>
  
  <!-- Arrow: New to Ready -->
  <path d="M 100 95 L 145 95" stroke="#666" stroke-width="2" fill="none" class="arrow-line"/>
  <polygon points="145,90 155,95 145,100" fill="#666"/>
  <text x="122" y="88" text-anchor="middle" class="detail" style="font-size:9px;">start()</text>
  
  <!-- READY State -->
  <g class="box2" data-narration="READY/RUNNABLE: Thread is waiting in the ready queue to be scheduled for execution by the CPU.">
    <rect x="150" y="70" width="80" height="50" rx="8" fill="url(#stateReady)" stroke="#2196f3" stroke-width="2" class="state-box"/>
    <text x="190" y="92" text-anchor="middle" class="label" style="font-size:12px;">READY</text>
    <text x="190" y="107" text-anchor="middle" class="detail">Runnable</text>
  </g>
  
  <!-- Arrow: Ready to Running -->
  <path d="M 230 95 L 275 95" stroke="#666" stroke-width="2" fill="none" class="arrow-line"/>
  <polygon points="275,90 285,95 275,100" fill="#666"/>
  <text x="252" y="88" text-anchor="middle" class="detail" style="font-size:9px;">scheduled</text>
  
  <!-- RUNNING State -->
  <g class="box3" data-narration="RUNNING/EXECUTING: Thread is actively executing instructions on the CPU. This is the only state where actual computation occurs.">
    <rect x="280" y="70" width="85" height="50" rx="8" fill="url(#stateRunning)" stroke="#4caf50" stroke-width="2" class="state-box"/>
    <text x="322" y="92" text-anchor="middle" class="label" style="font-size:12px;">RUNNING</text>
    <text x="322" y="107" text-anchor="middle" class="detail">Executing</text>
  </g>
  
  <!-- Arrow: Running to Ready (preempt) -->
  <path d="M 322 120 L 322 155 L 190 155 L 190 120" stroke="#666" stroke-width="2" fill="none" class="arrow-line"/>
  <polygon points="190,120 185,110 195,110" fill="#666"/>
  <text x="256" y="150" text-anchor="middle" class="detail" style="font-size:9px;">preempt</text>
  
  <!-- Arrow: Running to Blocked -->
  <path d="M 280 145 L 230 145 L 230 195" stroke="#666" stroke-width="2" fill="none" class="arrow-line"/>
  <polygon points="230,195 225,185 235,185" fill="#666"/>
  <text x="238" y="168" text-anchor="middle" class="detail" style="font-size:9px;">I/O wait</text>
  
  <!-- BLOCKED State -->
  <g class="box4" data-narration="BLOCKED/WAITING: Thread is waiting for I/O, a lock, or another resource. Cannot proceed until event occurs.">
    <rect x="150" y="200" width="80" height="50" rx="8" fill="url(#stateBlocked)" stroke="#e91e63" stroke-width="2" class="state-box"/>
    <text x="190" y="222" text-anchor="middle" class="label" style="font-size:12px;">BLOCKED</text>
    <text x="190" y="237" text-anchor="middle" class="detail">Waiting</text>
  </g>
  
  <!-- Arrow: Blocked to Ready -->
  <path d="M 150 225 L 105 225 L 105 95 L 145 95" stroke="#666" stroke-width="2" fill="none" class="arrow-line"/>
  <polygon points="145,90 135,95 145,100" fill="#666"/>
  <text x="80" y="200" text-anchor="middle" class="detail" style="font-size:9px;">I/O complete</text>
  
  <!-- Arrow: Running to Terminated -->
  <path d="M 322 170 L 322 220" stroke="#666" stroke-width="2" fill="none" class="arrow-line"/>
  <polygon points="322,225 317,215 327,215" fill="#666"/>
  <text x="330" y="198" text-anchor="middle" class="detail" style="font-size:9px;">exit()</text>
  
  <!-- TERMINATED State -->
  <g class="box5" data-narration="TERMINATED/FINISHED: Thread has completed execution or has been stopped. Resources may be reclaimed.">
    <rect x="270" y="230" width="100" height="50" rx="8" fill="url(#stateTerminated)" stroke="#9c27b0" stroke-width="2" class="state-box"/>
    <text x="320" y="252" text-anchor="middle" class="label" style="font-size:12px;">TERMINATED</text>
    <text x="320" y="267" text-anchor="middle" class="detail">Finished</text>
  </g>
  
  <!-- Key Concepts Box -->
  <rect x="15" y="295" width="390" height="90" rx="8" fill="white" stroke="#ddd" stroke-width="1" opacity="0.9"/>
  <text x="25" y="315" class="label" style="font-size:13px; fill:#1565c0;">Key Thread Characteristics:</text>
  <text x="25" y="335" class="detail">• Lightweight: Threads share code, data, and OS resources within a process</text>
  <text x="25" y="350" class="detail">• Parallelism: Multiple threads execute simultaneously on multicore CPUs</text>
  <text x="25" y="365" class="detail">• Responsiveness: UI threads stay responsive while processing runs in background</text>
  <text x="25" y="380" class="detail">• Efficient: Creating/switching threads is faster than processes</text>
  
  <!-- Visual indicator for shared resources -->
  <g transform="translate(360, 80)" class="pulse-anim">
    <circle cx="20" cy="20" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="20" y="24" text-anchor="middle" class="detail" style="font-size:10px;">CPU</text>
  </g>
  
  <!-- Multicore indicator -->
  <g transform="translate(360, 130)">
    <rect x="0" y="0" width="40" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
    <text x="20" y="18" text-anchor="middle" class="detail" style="font-size:9px;">Core</text>
    <text x="20" y="26" text-anchor="middle" class="detail" style="font-size:9px;">1</text>
  </g>
  <g transform="translate(360, 165)">
    <rect x="0" y="0" width="40" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
    <text x="20" y="18" text-anchor="middle" class="detail" style="font-size:9px;">Core</text>
    <text x="20" y="26" text-anchor="middle" class="detail" style="font-size:9px;">2</text>
  </g>
  <text x="380" y="205" text-anchor="middle" class="detail" style="font-size:8px;">Multicore</text>
</svg>