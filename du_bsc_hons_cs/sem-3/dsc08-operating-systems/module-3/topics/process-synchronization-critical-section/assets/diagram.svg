<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="process-synchronization-critical-section">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="entryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe69c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="criticalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d7da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c6cb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="exitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3e6cb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="remainderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1ecf1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bee5eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; }
    .section-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .section-box:nth-child(4) { animation-delay: 0.8s; }
    .arrow { animation: arrowPulse 2s infinite; }
    .process-cycle { animation: pulse 3s infinite; transform-origin: center; }
    .state-badge { animation: fadeIn 1s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c5282" class="title">Process Synchronization</text>
  <text x="210" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a5568" class="title">Critical Section Problem</text>
  
  <!-- Main Cycle Diagram -->
  <g class="process-cycle" transform="translate(210, 140)">
    <!-- Entry Section -->
    <g class="section-box" data-narration="Entry Section: Process requests permission to enter critical section, checking if resource is available">
      <ellipse cx="0" cy="-55" rx="50" ry="25" fill="url(#entryGradient)" stroke="#856404" stroke-width="2" filter="url(#shadow)"/>
      <text x="0" y="-50" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">ENTRY SECTION</text>
      <text x="0" y="-37" text-anchor="middle" font-size="8" fill="#856404">Request access</text>
    </g>
    
    <!-- Critical Section -->
    <g class="section-box" data-narration="Critical Section: Code that accesses shared resources - only one process allowed here">
      <ellipse cx="55" cy="0" rx="25" ry="50" fill="url(#criticalGradient)" stroke="#721c24" stroke-width="2" filter="url(#shadow)"/>
      <text x="55" y="-5" text-anchor="middle" font-size="11" font-weight="bold" fill="#721c24">CRITICAL</text>
      <text x="55" y="8" text-anchor="middle" font-size="11" font-weight="bold" fill="#721c24">SECTION</text>
      <text x="55" y="25" text-anchor="middle" font-size="7" fill="#721c24">Shared Resource</text>
    </g>
    
    <!-- Exit Section -->
    <g class="section-box" data-narration="Exit Section: Process releases the resource and notifies other waiting processes">
      <ellipse cx="0" cy="55" rx="50" ry="25" fill="url(#exitGradient)" stroke="#155724" stroke-width="2" filter="url(#shadow)"/>
      <text x="0" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">EXIT SECTION</text>
      <text x="0" y="63" text-anchor="middle" font-size="8" fill="#155724">Release resource</text>
    </g>
    
    <!-- Remainder Section -->
    <g class="section-box" data-narration="Remder Section: Non-critical code that doesn't access shared resources">
      <ellipse cx="-55" cy="0" rx="25" ry="50" fill="url(#remainderGradient)" stroke="#0c5460" stroke-width="2" filter="url(#shadow)"/>
      <text x="-55" y="-5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c5460">REMAINDER</text>
      <text x="-55" y="8" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c5460">SECTION</text>
      <text x="-55" y="25" text-anchor="middle" font-size="7" fill="#0c5460">Other work</text>
    </g>
    
    <!-- Arrows showing flow -->
    <path d="M -40 -55 Q -50 -80 0 -90 Q 50 -80 40 -55" fill="none" stroke="#666" stroke-width="2" class="arrow"/>
    <path d="M 55 -35 Q 90 -20 90 0 Q 90 20 55 35" fill="none" stroke="#666" stroke-width="2" class="arrow"/>
    <path d="M 40 55 Q 50 80 0 90 Q -50 80 -40 55" fill="none" stroke="#666" stroke-width="2" class="arrow"/>
    <path d="M -55 35 Q -90 20 -90 0 Q -90 -20 -55 -35" fill="none" stroke="#666" stroke-width="2" class="arrow"/>
    
    <!-- Process indicator in center -->
    <circle cx="0" cy="0" r="18" fill="#4a5568" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" font-weight="bold" fill="white">P</text>
  </g>
  
  <!-- Requirements Box -->
  <g class="section-box" data-narration="Three requirements: Mutual Exclusion (only one process in CS), Progress (空没阻塞), Bounded Waiting (finite turns)">
    <rect x="20" y="270" width="180" height="115" fill="white" stroke="#2c5282" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
    <text x="110" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c5282">Solution Requirements</text>
    <line x1="30" y1="295" x2="190" y2="295" stroke="#cbd5e0" stroke-width="1"/>
    
    <circle cx="35" cy="315" r="6" fill="#e53e3e"/>
    <text x="48" y="318" font-size="10" fill="#2d3748">Mutual Exclusion</text>
    
    <circle cx="35" cy="335" r="6" fill="#38a169"/>
    <text x="48" y="338" font-size="10" fill="#2d3748">Progress</text>
    
    <circle cx="35" cy="355" r="6" fill="#3182ce"/>
    <text x="48" y="358" font-size="10" fill="#2d3748">Bounded Waiting</text>
  </g>
  
  <!-- Process States Box -->
  <g class="section-box" data-narration="Process states: Running (executing in CS), Blocked (waiting for resource), Ready (waiting for CPU)">
    <rect x="220" y="270" width="180" height="115" fill="white" stroke="#2c5282" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
    <text x="310" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c5282">Process States</text>
    <line x1="230" y1="295" x2="390" y2="295" stroke="#cbd5e0" stroke-width="1"/>
    
    <!-- Running State -->
    <rect x="235" y="305" width="45" height="25" fill="#c6f6d5" stroke="#38a169" stroke-width="1" rx="4"/>
    <text x="257" y="321" text-anchor="middle" font-size="9" fill="#22543d">Running</text>
    
    <!-- Arrow -->
    <path d="M 285 317 L 305 317" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Blocked State -->
    <rect x="310" y="305" width="45" height="25" fill="#fed7d7" stroke="#e53e3e" stroke-width="1" rx="4"/>
    <text x="332" y="321" text-anchor="middle" font-size="9" fill="#742a2a">Blocked</text>
    
    <!-- Arrow down -->
    <path d="M 332 335 L 332 350" stroke="#666" stroke-width="1.5"/>
    <polygon points="332,355 328,348 336,348" fill="#666"/>
    
    <!-- Ready State -->
    <rect x="295" y="355" width="40" height="22" fill="#bee5eb" stroke="#3182ce" stroke-width="1" rx="4"/>
    <text x="315" y="369" text-anchor="middle" font-size="9" fill="#2c5282">Ready</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Bottom legend -->
  <g class="state-badge" data-narration="General structure: entry section → critical section → exit section → remainder section (repeats)">
    <text x="210" y="390" text-anchor="middle" font-size="9" fill="#718096">do { entry → critical → exit → remainder } while (TRUE)</text>
  </g>
</svg>