<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="process-concept-states-pcb">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7d9a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .state-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .state-box:nth-child(1) { animation-delay: 0.3s; }
    .state-box:nth-child(2) { animation-delay: 0.5s; }
    .state-box:nth-child(3) { animation-delay: 0.7s; }
    .state-box:nth-child(4) { animation-delay: 0.9s; }
    .state-box:nth-child(5) { animation-delay: 1.1s; }
    .pcb-section { animation: fadeIn 1s ease-out 1.2s forwards; opacity: 0; }
    .arrow { stroke-dasharray: 200; animation: drawLine 1s ease-out forwards; }
    .arrow-animated { animation: drawLine 1.5s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .highlight { fill: #4a90d9; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Process Concept, States &amp; PCB</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#5a7d9a" stroke-width="2" class="title"/>
  
  <!-- Process State Diagram - Five State Model -->
  <g data-narration="The five-state process model shows process lifecycle: New (created), Ready (waiting for CPU), Running (executing), Waiting (blocked), Terminated (finished)">
    <!-- State: NEW -->
    <g class="state-box" style="animation-delay: 0.3s">
      <rect x="30" y="70" width="70" height="35" rx="8" fill="#a8d5e5" stroke="#5ba3c0" stroke-width="2" filter="url(#shadow)"/>
      <text x="65" y="93" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c5282">NEW</text>
    </g>
    
    <!-- Arrow: New to Ready (Admit) -->
    <path d="M 100 87 L 140 87" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-animated" data-narration="Admit: Process moves from New to Ready when admitted by OS"/>
    <text x="120" y="80" text-anchor="middle" font-size="10" fill="#5a7d9a">Admit</text>
    
    <!-- State: READY -->
    <g class="state-box" style="animation-delay: 0.5s">
      <rect x="150" y="70" width="70" height="35" rx="8" fill="#9ae6b4" stroke="#48bb78" stroke-width="2" filter="url(#shadow)"/>
      <text x="185" y="93" text-anchor="middle" font-size="14" font-weight="bold" fill="#276749">READY</text>
    </g>
    
    <!-- Arrow: Ready to Running (Dispatch) -->
    <path d="M 220 87 L 260 87" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-animated"/>
    <text x="240" y="80" text-anchor="middle" font-size="10" fill="#5a7d9a">Dispatch</text>
    
    <!-- State: RUNNING -->
    <g class="state-box" style="animation-delay: 0.7s">
      <rect x="270" y="70" width="85" height="35" rx="8" fill="#fbd38d" stroke="#dd6b20" stroke-width="2" filter="url(#shadow)"/>
      <text x="312" y="93" text-anchor="middle" font-size="14" font-weight="bold" fill="#c05621">RUNNING</text>
    </g>
    
    <!-- Arrow: Running to Waiting (Interrupt/Wait) -->
    <path d="M 312 105 L 312 140" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-animated"/>
    <text x="325" y="128" text-anchor="middle" font-size="10" fill="#5a7d9a">Wait</text>
    
    <!-- State: WAITING -->
    <g class="state-box" style="animation-delay: 0.9s">
      <rect x="270" y="150" width="85" height="35" rx="8" fill="#e9d8fd" stroke="#9f7aea" stroke-width="2" filter="url(#shadow)"/>
      <text x="312" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b46c1">WAITING</text>
    </g>
    
    <!-- Arrow: Waiting to Ready (I/O Complete) -->
    <path d="M 270 167 L 220 167" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-animated"/>
    <text x="245" y="158" text-anchor="middle" font-size="10" fill="#5a7d9a">I/O Done</text>
    
    <!-- Arrow: Running to Ready (Preempt) -->
    <path d="M 270 105 L 220 87" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-animated"/>
    <text x="235" y="92" text-anchor="middle" font-size="9" fill="#5a7d9a">Preempt</text>
    
    <!-- Arrow: Ready to Waiting (not typical but shows relationship) -->
    <path d="M 185 105 L 185 150" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5" class="arrow-animated"/>
    <text x="178" y="130" text-anchor="middle" font-size="9" fill="#5a7d9a">Request</text>
    
    <!-- Arrow: Running to Terminated (Exit) -->
    <path d="M 312 105 L 312 190" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-animated"/>
    <text x="325" y="155" text-anchor="middle" font-size="10" fill="#5a7d9a">Exit</text>
    
    <!-- State: TERMINATED -->
    <g class="state-box" style="animation-delay: 1.1s">
      <rect x="270" y="200" width="85" height="35" rx="8" fill="#feb2b2" fill-opacity="0.7" stroke="#fc8181" stroke-width="2" filter="url(#shadow)"/>
      <text x="312" y="223" text-anchor="middle" font-size="14" font-weight="bold" fill="#c53030">TERMINATED</text>
    </g>
    
    <!-- Arrow: New to Terminated (rare but shows end) -->
    <path d="M 65 105 L 65 140 L 180 140 L 180 200 L 270 200" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead)" class="arrow-animated"/>
  </g>
  
  <!-- PCB Section -->
  <g class="pcb-section" data-narration="Process Control Block (PCB) is the kernel data structure containing all process information - PID, state, registers, memory pointers, I/O status, and scheduling info">
    <rect x="15" y="255" width="180" height="130" rx="8" fill="url(#boxGradient)" stroke="#4a5568" stroke-width="2" filter="url(#shadow)"/>
    <text x="105" y="275" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a202c">Process Control Block</text>
    
    <!-- PCB Contents -->
    <g font-size="11" fill="#2d3748">
      <text x="25" y="295">• PID (Process ID)</text>
      <text x="25" y="312">• Process State</text>
      <text x="25" y="329">• Program Counter</text>
      <text x="25" y="346">• CPU Registers</text>
      <text x="25" y="363">• Memory Management</text>
      <text x="25" y="380">• I/O Status Info</text>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="pcb-section" data-narration="Key distinction: Program is passive (stored on disk), Process is active (in execution with own context)">
    <rect x="205" y="255" width="200" height="130" rx="8" fill="#fffaf0" stroke="#ed8936" stroke-width="2" filter="url(#shadow)"/>
    <text x="305" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#c05621">Key Concepts</text>
    
    <g font-size="10" fill="#4a5568">
      <text x="215" y="295" font-weight="bold">Program vs Process:</text>
      <text x="215" y="310">Program: Static file on disk</text>
      <text x="215" y="325">Process: Active execution</text>
      <text x="215" y="340">Context: Memory, Registers,</text>
      <text x="215" y="352">Resources, Stack, Heap</text>
      <text x="215" y="370" font-weight="bold" fill="#2b6cb0">Multiprogramming enables</text>
      <text x="215" y="382">concurrent execution</text>
    </g>
  </g>
  
  <!-- Legend/Highlight Box -->
  <g class="pulse">
    <rect x="205" y="70" width="200" height="45" rx="5" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
    <text x="305" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c5282">Five-State Model</text>
    <text x="305" y="105" text-anchor="middle" font-size="10" fill="#4a5568">New → Ready → Running →</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="5" fill="#9ae6b4"/>
  <circle cx="50" cy="380" r="5" fill="#fbd38d"/>
  <circle cx="70" cy="380" r="5" fill="#e9d8fd"/>
  <circle cx="90" cy="380" r="5" fill="#feb2b2"/>
  
</svg>