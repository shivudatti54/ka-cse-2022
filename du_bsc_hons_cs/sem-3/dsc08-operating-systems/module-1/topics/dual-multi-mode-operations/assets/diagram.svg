<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dual-multi-mode-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kernelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hardwareGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2bec3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 3; }
      50% { stroke-width: 5; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .user-box { animation: slideIn 0.8s ease-out 0.2s both; }
    .kernel-box { animation: slideIn 0.8s ease-out 0.4s both; }
    .hardware-box { animation: fadeIn 1s ease-out 0.6s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .system-call { animation: pulse 2s infinite; }
    .label { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; }
    .key-point { animation: fadeIn 1s ease-out 0.8s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text" font-size="18" fill="#2d3436">Dual Multi Mode Operations</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#636e72" stroke-width="1" class="title" opacity="0.5"/>
  
  <!-- User Mode Box -->
  <g class="user-box" data-narration="User Mode (Ring 3) - Application execution with restricted privileges">
    <rect x="30" y="60" width="170" height="120" rx="10" fill="url(#userGradient)" filter="url(#shadow)"/>
    <text x="115" y="85" text-anchor="middle" class="title-text" font-size="16" fill="#2d3436">USER MODE</text>
    <text x="115" y="105" text-anchor="middle" class="label" font-size="12" fill="#2d3436">Ring 3</text>
    <rect x="45" y="115" width="140" height="2" fill="#d63031" opacity="0.5"/>
    <text x="115" y="135" text-anchor="middle" class="label" font-size="11" fill="#2d3436">User Applications</text>
    <text x="115" y="150" text-anchor="middle" class="label" font-size="11" fill="#2d3436">Restricted Privileges</text>
    <text x="115" y="165" text-anchor="middle" class="label" font-size="11" fill="#2d3436">No Hardware Access</text>
  </g>
  
  <!-- Kernel Mode Box -->
  <g class="kernel-box" data-narration="Kernel Mode (Ring 0) - OS kernel with full privileges and hardware control">
    <rect x="220" y="60" width="170" height="120" rx="10" fill="url(#kernelGradient)" filter="url(#shadow)"/>
    <text x="305" y="85" text-anchor="middle" class="title-text" font-size="16" fill="#2d3436">KERNEL MODE</text>
    <text x="305" y="105" text-anchor="middle" class="label" font-size="12" fill="#2d3436">Ring 0</text>
    <rect x="235" y="115" width="140" height="2" fill="#00b894" opacity="0.5"/>
    <text x="305" y="135" text-anchor="middle" class="label" font-size="11" fill="#2d3436">OS Kernel</text>
    <text x="305" y="150" text-anchor="middle" class="label" font-size="11" fill="#2d3436">Full Privileges</text>
    <text x="305" y="165" text-anchor="middle" class="label" font-size="11" fill="#2d3436">Hardware Control</text>
  </g>
  
  <!-- System Call Arrow -->
  <g class="arrow" data-narration="System Call - Transition from user to kernel mode for OS services">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e17055"/>
      </marker>
    </defs>
    <path d="M 115 180 L 115 210 L 305 210 L 305 195" fill="none" stroke="#e17055" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="145" y="200" width="130" height="25" rx="5" fill="#ffeaa7" stroke="#e17055" stroke-width="1" class="system-call"/>
    <text x="210" y="216" text-anchor="middle" class="label" font-size="12" fill="#2d3436" font-weight="bold">SYSTEM CALL</text>
  </g>
  
  <!-- Hardware Box -->
  <g class="hardware-box" data-narration="Hardware - Physical resources controlled by kernel mode">
    <rect x="80" y="240" width="260" height="50" rx="8" fill="url(#hardwareGradient)" filter="url(#shadow)"/>
    <text x="210" y="265" text-anchor="middle" class="title-text" font-size="14" fill="#2d3436">HARDWARE</text>
    <text x="210" y="280" text-anchor="middle" class="label" font-size="11" fill="#2d3436">CPU, Memory, I/O Devices</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="key-point" data-narration="Key concept: Dual-mode provides isolation between user applications and system kernel">
    <rect x="20" y="305" width="180" height="80" rx="5" fill="#fff" stroke="#a29bfe" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="325" text-anchor="middle" class="title-text" font-size="12" fill="#6c5ce7">DUAL-MODE</text>
    <text x="110" y="345" text-anchor="middle" class="label" font-size="10" fill="#2d3436">User Mode + Kernel Mode</text>
    <text x="110" y="360" text-anchor="middle" class="label" font-size="10" fill="#2d3436">System Call Interface</text>
    <text x="110" y="375" text-anchor="middle" class="label" font-size="10" fill="#2d3436">Privilege Separation</text>
  </g>
  
  <g class="key-point" data-narration="Key concept: Multi-mode extends with additional privilege levels for more granular control">
    <rect x="220" y="305" width="180" height="80" rx="5" fill="#fff" stroke="#74b9ff" stroke-width="2" filter="url(#shadow)"/>
    <text x="310" y="325" text-anchor="middle" class="title-text" font-size="12" fill="#0984e3">MULTI-MODE</text>
    <text x="310" y="345" text-anchor="middle" class="label" font-size="10" fill="#2d3436">Multiple Privilege Rings</text>
    <text x="310" y="360" text-anchor="middle" class="label" font-size="10" fill="#2d3436">Ring 0-3 Hierarchy</text>
    <text x="310" y="375" text-anchor="middle" class="label" font-size="10" fill="#2d3436">Fine-grained Protection</text>
  </g>
  
  <!-- Mode Transition Indicator -->
  <g data-narration="Mode transition happens via system calls and interrupts">
    <circle cx="210" cy="215" r="15" fill="#fd79a8" opacity="0.3" class="system-call">
      <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="210" y="220" text-anchor="middle" class="label" font-size="10" fill="#2d3436">Mode</text>
    <text x="210" y="232" text-anchor="middle" class="label" font-size="10" fill="#2d3436">Switch</text>
  </g>
</svg>