<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="os-as-resource-manager">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="osGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2c5aa0"/>
    </linearGradient>
    <linearGradient id="resourceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb9e8"/>
      <stop offset="100%" style="stop-color:#5a9bd4"/>
    </linearGradient>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90ee90"/>
      <stop offset="100%" style="stop-color:#7ccc7c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #333333; }
    .section-box { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .os-box { opacity: 0; animation: slideIn 0.6s ease-out forwards; }
    .resource-box { opacity: 0; animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.3s; }
    .process-box { opacity: 0; animation: slideIn 0.6s ease-out forwards; animation-delay: 0.5s; }
    .arrow-line { stroke: #4a90d9; stroke-width: 2; stroke-dasharray: 5,3; animation: arrowPulse 2s infinite; }
    .pulse-anim { animation: pulse 2s infinite; transform-origin: center; }
    .resource-rect { filter: url(#shadow); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text" data-narration="Main title: OS as Resource Manager">OS as Resource Manager</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4a90d9" stroke-width="2"/>
  
  <!-- Central OS Box -->
  <g class="os-box">
    <rect x="150" y="170" width="120" height="60" rx="10" fill="url(#osGradient)" filter="url(#shadow)"/>
    <text x="210" y="195" text-anchor="middle" class="label-text" font-size="15">Operating</text>
    <text x="210" y="215" text-anchor="middle" class="label-text" font-size="15">System</text>
  </g>
  
  <!-- Resource: CPU (Top) -->
  <g class="resource-box" data-narration="CPU Resource - The processor executes instructions">
    <rect x="155" y="60" width="110" height="45" rx="8" fill="url(#resourceGradient)" class="resource-rect"/>
    <text x="210" y="80" text-anchor="middle" class="label-text" font-size="13">CPU</text>
    <text x="210" y="96" text-anchor="middle" class="detail-text">Processor/Cores</text>
  </g>
  
  <!-- Resource: Memory (Bottom) -->
  <g class="resource-box" data-narration="Memory Resource - RAM for temporary data storage">
    <rect x="155" y="295" width="110" height="45" rx="8" fill="url(#resourceGradient)" class="resource-rect"/>
    <text x="210" y="315" text-anchor="middle" class="label-text" font-size="13">Memory</text>
    <text x="210" y="331" text-anchor="middle" class="detail-text">RAM Storage</text>
  </g>
  
  <!-- Resource: I/O Devices (Left) -->
  <g class="resource-box" data-narration="I/O Devices - Input/Output peripherals">
    <rect x="30" y="170" width="90" height="60" rx="8" fill="url(#resourceGradient)" class="resource-rect"/>
    <text x="75" y="195" text-anchor="middle" class="label-text" font-size="13">I/O</text>
    <text x="75" y="215" text-anchor="middle" class="detail-text">Keyboard</text>
    <text x="75" y="228" text-anchor="middle" class="detail-text">Mouse/Display</text>
  </g>
  
  <!-- Resource: Storage (Right) -->
  <g class="resource-box" data-narration="Secondary Storage - Persistent data storage">
    <rect x="300" y="170" width="90" height="60" rx="8" fill="url(#resourceGradient)" class="resource-rect"/>
    <text x="345" y="195" text-anchor="middle" class="label-text" font-size="13">Storage</text>
    <text x="345" y="215" text-anchor="middle" class="detail-text">HDD/SSD</text>
    <text x="345" y="228" text-anchor="middle" class="detail-text">Filesystem</text>
  </g>
  
  <!-- Arrows from Resources to OS -->
  <path d="M 210 105 L 210 170" class="arrow-line" data-narration="CPU connects to OS for scheduling"/>
  <path d="M 210 295 L 210 230" class="arrow-line" data-narration="Memory allocation path"/>
  <path d="M 120 200 L 150 200" class="arrow-line" data-narration="I/O request path"/>
  <path d="M 300 200 L 270 200" class="arrow-line" data-narration="Storage access path"/>
  
  <!-- Process Boxes -->
  <g class="process-box" data-narration="Multiple processes competing for resources">
    <rect x="60" y="280" width="70" height="35" rx="6" fill="url(#processGradient)" filter="url(#shadow)"/>
    <text x="95" y="302" text-anchor="middle" class="detail-text" font-weight="bold">Process 1</text>
  </g>
  
  <g class="process-box" data-narration="Process 2 requesting resources">
    <rect x="290" y="280" width="70" height="35" rx="6" fill="url(#processGradient)" filter="url(#shadow)"/>
    <text x="325" y="302" text-anchor="middle" class="detail-text" font-weight="bold">Process 2</text>
  </g>
  
  <g class="process-box" data-narration="Process 3 in ready queue">
    <rect x="60" y="85" width="70" height="35" rx="6" fill="url(#processGradient)" filter="url(#shadow)"/>
    <text x="95" y="107" text-anchor="middle" class="detail-text" font-weight="bold">Process 3</text>
  </g>
  
  <g class="process-box" data-narration="Process 4 waiting for I/O">
    <rect x="290" y="85" width="70" height="35" rx="6" fill="url(#processGradient)" filter="url(#shadow)"/>
    <text x="325" y="107" text-anchor="middle" class="detail-text" font-weight="bold">Process 4</text>
  </g>
  
  <!-- Arrows from Processes to Resources -->
  <path d="M 95 280 L 95 230 L 155 230 L 155 200" class="arrow-line" stroke="#7ccc7c"/>
  <path d="M 325 280 L 325 240 L 300 240" class="arrow-line" stroke="#7ccc7c"/>
  <path d="M 95 85 L 95 60 L 155 60 L 155 70" class="arrow-line" stroke="#7ccc7c"/>
  <path d="M 325 85 L 325 50 L 300 50 L 300 75" class="arrow-line" stroke="#7ccc7c"/>
  
  <!-- Resource Manager Label -->
  <g class="section-box" data-narration="Resource Manager role description">
    <rect x="140" y="245" width="140" height="25" rx="5" fill="#f8f8f8" stroke="#4a90d9" stroke-width="1"/>
    <text x="210" y="260" text-anchor="middle" class="detail-text" fill="#2c5aa0">Resource Manager</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-box" data-narration="Key concepts: Physical Resources include CPU, Memory, I/O, Storage">
    <rect x="10" y="345" width="400" height="45" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
    <text x="20" y="362" class="detail-text" font-weight="bold" fill="#2c3e50">Key Resources:</text>
    <text x="20" y="380" class="detail-text" fill="#555">CPU | Memory | I/O Devices | Secondary Storage</text>
    <text x="310" y="380" class="detail-text" fill="#4a90d9">Fair Allocation</text>
  </g>
</svg>