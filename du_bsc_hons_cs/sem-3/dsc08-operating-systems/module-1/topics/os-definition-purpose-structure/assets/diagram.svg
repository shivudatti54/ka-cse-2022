<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="os-definition-purpose-structure">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="hardwareGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78909c"/>
      <stop offset="100%" style="stop-color:#546e7a"/>
    </linearGradient>
    <linearGradient id="osGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#1e88e5"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <linearGradient id="interactionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d"/>
      <stop offset="100%" style="stop-color:#ffa726"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1565c0; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #e0e0e0; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #fff; }
    .box-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #333; }
    .box-text { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .layer { filter: url(#shadow); }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .hardware-anim { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .os-anim { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .user-anim { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .interaction-anim { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s infinite; }
    .pulse:hover { animation: pulse 1s infinite; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">OS: Definition, Purpose &amp; Structure</text>
  
  <!-- Hardware Layer -->
  <g class="layer hardware-anim" data-narration="Hardware Layer: The physical components including CPU, Memory, and I/O devices that the OS manages">
    <rect x="50" y="280" width="150" height="100" rx="8" fill="url(#hardwareGrad)"/>
    <text x="125" y="305" text-anchor="middle" class="label">HARDWARE</text>
    <text x="125" y="325" text-anchor="middle" class="sublabel">CPU | Memory | I/O</text>
    <rect x="65" y="340" width="110" height="25" rx="4" fill="#455a64"/>
    <text x="120" y="356" text-anchor="middle" class="detail">Physical Resources</text>
  </g>
  
  <!-- OS Layer (Central) -->
  <g class="layer os-anim" data-narration="Operating System Layer: System software that acts as intermediary, managing resources and providing services">
    <rect x="160" y="140" width="180" height="120" rx="8" fill="url(#osGrad)"/>
    <text x="250" y="165" text-anchor="middle" class="label" style="font-size:16px;">OPERATING SYSTEM</text>
    <rect x="175" y="180" width="150" height="35" rx="4" fill="#1976d2"/>
    <text x="250" y="198" text-anchor="middle" class="detail" style="font-size:11px;">Resource Manager</text>
    <text x="250" y="210" text-anchor="middle" class="detail" style="font-size:10px;">Extended Machine</text>
    <rect x="175" y="222" width="150" height="25" rx="4" fill="#1565c0"/>
    <text x="250" y="238" text-anchor="middle" class="detail" style="font-size:10px;">System Supervisor</text>
  </g>
  
  <!-- User Layer (Applications) -->
  <g class="layer user-anim" data-narration="User Layer: Applications and programs that users interact with, requesting OS services">
    <rect x="50" y="40" width="150" height="80" rx="8" fill="url(#userGrad)"/>
    <text x="125" y="65" text-anchor="middle" class="label" style="fill:#fff;font-size:13px;">APPLICATIONS</text>
    <rect x="60" y="75" width="130" height="35" rx="4" fill="#4caf50"/>
    <text x="125" y="92" text-anchor="middle" class="detail" style="font-size:10px;">Programs &amp; Software</text>
    <text x="125" y="106" text-anchor="middle" class="detail" style="font-size:9px;">Python, Games, Docs</text>
  </g>
  
  <!-- User Interaction Box -->
  <g class="layer interaction-anim" data-narration="User Interaction: Interface (GUI/CLI) through which users communicate with the system">
    <rect x="250" y="40" width="130" height="80" rx="8" fill="url(#interactionGrad)"/>
    <text x="315" y="62" text-anchor="middle" class="label" style="fill:#fff;font-size:12px;">USER INTERFACE</text>
    <rect x="260" y="72" width="110" height="40" rx="4" fill="#ff9800"/>
    <text x="315" y="88" text-anchor="middle" class="detail" style="font-size:10px;">GUI / CLI</text>
    <text x="315" y="102" text-anchor="middle" class="detail" style="font-size:9px;">Commands &amp; Clicks</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <!-- Arrow from User to OS -->
  <g class="arrow">
    <path d="M125 120 L180 145" stroke="#42a5f5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <!-- Arrow from OS to Hardware -->
  <g class="arrow">
    <path d="M250 260 L250 275" stroke="#78909c" stroke-width="2" fill="none"/>
    <polygon points="250,280 245,270 255,270" fill="#78909c"/>
  </g>
  <!-- Arrow from User Interaction to OS -->
  <g class="arrow">
    <path d="M250 120 L210 135" stroke="#ffb74d" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key roles of OS: Resource Manager (allocates CPU, memory, I/O), Extended Machine (abstracts hardware complexity), System Supervisor (ensures security and stability)">
    <rect x="5" y="360" width="410" height="35" rx="5" fill="#fff" stroke="#90caf9" stroke-width="1"/>
    <text x="15" y="375" class="box-title">Key Concepts:</text>
    <text x="15" y="388" class="box-text" style="font-size:9px;">Resource Manager • Extended Machine (Virtual Machine) • System Supervisor</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="315" cy="140" r="5" fill="#ffa726" class="pulse" style="cursor:pointer"/>
  <circle cx="125" cy="120" r="5" fill="#81c784" class="pulse" style="cursor:pointer"/>
  <circle cx="250" cy="260" r="5" fill="#42a5f5" class="pulse" style="cursor:pointer"/>
</svg>