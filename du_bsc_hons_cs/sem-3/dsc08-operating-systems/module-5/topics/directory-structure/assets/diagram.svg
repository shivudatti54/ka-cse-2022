<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="directory-structure">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8c9"/>
      <stop offset="100%" style="stop-color:#4a90a4"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5 { animation: slideIn 0.6s ease-out 1.0s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow { stroke-dasharray: 50; animation: drawLine 1s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d5a6b" class="title">Directory Structure</text>
  
  <!-- Single-Level Directory -->
  <g class="box1" data-narration="Single-Level: Basic structure with one directory containing all files">
    <rect x="15" y="60" width="70" height="90" fill="url(#boxGradient)" rx="5"/>
    <text x="50" y="80" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Root</text>
    <text x="50" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#cce8f0">File1</text>
    <text x="50" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#cce8f0">File2</text>
    <text x="50" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#cce8f0">File3</text>
  </g>
  
  <!-- Two-Level Directory -->
  <g class="box2" data-narration="Two-Level: MFD contains multiple UFDs (User File Directories)">
    <rect x="105" y="60" width="70" height="50" fill="url(#boxGradient)" rx="5"/>
    <text x="140" y="80" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">MFD</text>
    <rect x="110" y="95" width="60" height="55" fill="url(#accentGradient)" rx="4"/>
    <text x="140" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="white">User1</text>
    <text x="140" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#2d5a6b">Files</text>
    <rect x="110" y="135" width="60" height="15" fill="url(#accentGradient)" rx="4"/>
    <text x="140" y="146" text-anchor="middle" font-family="Arial" font-size="9" fill="white">User2</text>
  </g>
  
  <!-- Tree Directory -->
  <g class="box3" data-narration="Tree: Hierarchical structure with root branching to subdirectories">
    <rect x="195" y="60" width="50" height="30" fill="url(#boxGradient)" rx="5" class="pulse"/>
    <text x="220" y="80" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Root</text>
    <line x1="220" y1="90" x2="220" y2="110" stroke="#4a90a4" stroke-width="2" class="arrow"/>
    <rect x="195" y="110" width="50" height="40" fill="url(#accentGradient)" rx="4"/>
    <text x="220" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Dir A</text>
    <line x1="195" y1="130" x2="175" y2="145" stroke="#4a90a4" stroke-width="1.5" class="arrow"/>
    <line x1="245" y1="130" x2="265" y2="145" stroke="#4a90a4" stroke-width="1.5" class="arrow"/>
    <rect x="155" y="145" width="40" height="25" fill="#7eb8c9" rx="3"/>
    <text x="175" y="160" text-anchor="middle" font-family="Arial" font-size="8" fill="white">File1</text>
    <rect x="245" y="145" width="40" height="25" fill="#7eb8c9" rx="3"/>
    <text x="265" y="160" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Dir B</text>
  </g>
  
  <!-- Acyclic Directory -->
  <g class="box4" data-narration="Acyclic: Allows shared subdirectories without cycles">
    <rect x="310" y="60" width="50" height="30" fill="url(#boxGradient)" rx="5"/>
    <text x="335" y="80" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Root</text>
    <line x1="335" y1="90" x2="310" y2="110" stroke="#4a90a4" stroke-width="2" class="arrow"/>
    <line x1="335" y1="90" x2="360" y2="110" stroke="#4a90a4" stroke-width="2" class="arrow"/>
    <rect x="290" y="110" width="40" height="25" fill="url(#accentGradient)" rx="4"/>
    <text x="310" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Dir X</text>
    <rect x="350" y="110" width="40" height="25" fill="url(#accentGradient)" rx="4"/>
    <text x="370" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Dir Y</text>
    <line x1="310" y1="135" x2="370" y2="135" stroke="#7eb8c9" stroke-width="1.5" stroke-dasharray="3,2" class="arrow"/>
    <text x="340" y="142" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a90a4">shared</text>
  </g>
  
  <!-- Graph Directory -->
  <g class="box5" data-narration="Graph: Allows cycles with pointer/link structures">
    <rect x="15" y="200" width="60" height="35" fill="url(#boxGradient)" rx="5" class="pulse"/>
    <text x="45" y="220" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Root</text>
    <line x1="45" y1="235" x2="45" y2="260" stroke="#4a90a4" stroke-width="2" class="arrow"/>
    <rect x="20" y="260" width="50" height="35" fill="url(#accentGradient)" rx="4"/>
    <text x="45" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Dir A</text>
    <line x1="70" y1="277" x2="110" y2="277" stroke="#7eb8c9" stroke-width="2" class="arrow"/>
    <polygon points="105,277 115,274 115,280" fill="#7eb8c9"/>
    <rect x="110" y="260" width="50" height="35" fill="#7eb8c9" rx="4"/>
    <text x="135" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Dir B</text>
    <line x1="160" y1="235" x2="160" y2="260" stroke="#d4a574" stroke-width="2" stroke-dasharray="4,2" class="arrow"/>
    <text x="160" y="252" text-anchor="middle" font-family="Arial" font-size="8" fill="#8b6914">link</text>
    <rect x="135" y="200" width="50" height="35" fill="#d4a574" rx="4"/>
    <text x="160" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Shared</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="box2" data-narration="Key functions: namespace hierarchy, metadata management, file retrieval">
    <rect x="200" y="200" width="200" height="110" fill="white" stroke="#4a90a4" stroke-width="2" rx="8"/>
    <text x="300" y="222" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2d5a6b">Key Functions</text>
    <line x1="210" y1="230" x2="390" y2="230" stroke="#7eb8c9" stroke-width="1"/>
    <text x="210" y="250" font-family="Arial" font-size="10" fill="#2d5a6b">• Namespace hierarchy</text>
    <text x="210" y="268" font-family="Arial" font-size="10" fill="#2d5a6b">• Metadata management</text>
    <text x="210" y="286" font-family="Arial" font-size="10" fill="#2d5a6b">• File retrieval</text>
    <text x="210" y="304" font-family="Arial" font-size="10" fill="#2d5a6b">• Access control</text>
  </g>
  
  <!-- Evolution Arrow -->
  <g class="box3" data-narration="Evolution from simple to complex directory structures">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#4a90a4"/>
      </marker>
    </defs>
    <line x1="85" y1="105" x2="100" y2="105" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="175" y1="105" x2="190" y2="105" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="290" y1="105" x2="305" y2="105" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Labels -->
  <text x="50" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a90a4" font-weight="bold">Single-Level</text>
  <text x="140" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a90a4" font-weight="bold">Two-Level</text>
  <text x="220" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a90a4" font-weight="bold">Tree</text>
  <text x="335" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a90a4" font-weight="bold">Acyclic</text>
  <text x="160" y="325" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a90a4" font-weight="bold">Graph</text>
  
  <!-- Legend -->
  <rect x="200" y="320" width="200" height="70" fill="#f0f8fa" stroke="#7eb8c9" stroke-width="1" rx="5"/>
  <text x="300" y="340" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2d5a6b">Legend</text>
  <rect x="210" y="350" width="12" height="12" fill="#4a90a4" rx="2"/>
  <text x="228" y="360" font-family="Arial" font-size="9" fill="#2d5a6b">Directory</text>
  <rect x="280" y="350" width="12" height="12" fill="#7eb8c9" rx="2"/>
  <text x="298" y="360" font-family="Arial" font-size="9" fill="#2d5a6b">Subdirectory</text>
  <rect x="350" y="350" width="12" height="12" fill="#d4a574" rx="2"/>
  <text x="368" y="360" font-family="Arial" font-size="9" fill="#2d5a6b">Link</text>
</svg>