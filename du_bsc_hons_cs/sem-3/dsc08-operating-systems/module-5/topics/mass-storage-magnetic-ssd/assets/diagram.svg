<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="mass-storage-magnetic-ssd">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e9f7"/>
      <stop offset="100%" style="stop-color:#c2dff0"/>
    </linearGradient>
    <linearGradient id="platterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7b8c"/>
      <stop offset="50%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="ssdChipGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="armGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#a0aec0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .hdd-section { animation: slideInLeft 1s ease-out 0.3s both; }
    .ssd-section { animation: slideInRight 1s ease-out 0.5s both; }
    .concept-box { animation: fadeIn 1s ease-out 0.7s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .rotate-element { animation: spinSlow 8s linear infinite; transform-origin: center; }
    .track { stroke: #a0aec0; stroke-width: 0.5; fill: none; }
    .sector { stroke: #e2e8f0; stroke-width: 0.3; fill: none; }
    text { font-family: Arial, sans-serif; }
    .label { font-size: 12px; fill: #2d3748; }
    .title-text { font-size: 18px; font-weight: bold; fill: #1a365d; }
    .subtitle { font-size: 14px; fill: #4a5568; }
    .concept-title { font-size: 11px; font-weight: bold; fill: #2d3748; }
    .concept-text { font-size: 10px; fill: #4a5568; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-text">Mass Storage: Magnetic Disk &amp; SSD</text>
  
  <!-- HDD Section -->
  <g class="hdd-section" data-narration="Cross-sectional view of a magnetic hard disk drive showing internal components">
    <text x="90" y="55" text-anchor="middle" class="subtitle" style="font-weight:bold;">Magnetic Disk (HDD)</text>
    
    <!-- Disk platters (side view) -->
    <g class="rotate-element" transform="translate(90, 130)">
      <ellipse cx="0" cy="0" rx="55" ry="12" fill="url(#platterGradient)" stroke="#2d3748" stroke-width="1"/>
      <ellipse cx="0" cy="0" rx="45" ry="9" fill="none" stroke="#718096" stroke-width="0.5"/>
      <ellipse cx="0" cy="0" rx="35" ry="7" fill="none" stroke="#718096" stroke-width="0.5"/>
      <ellipse cx="0" cy="0" rx="25" ry="5" fill="none" stroke="#718096" stroke-width="0.5"/>
      <ellipse cx="0" cy="0" rx="15" ry="3" fill="none" stroke="#718096" stroke-width="0.5"/>
    </g>
    
    <!-- Spindle -->
    <rect x="85" y="115" width="10" height="30" fill="#4a5568" rx="2"/>
    <circle cx="90" cy="130" r="4" fill="#2d3748"/>
    
    <!-- Actuator arm -->
    <g filter="url(#shadow)">
      <path d="M90 130 Q90 90 140 85 L160 80" fill="none" stroke="url(#armGradient)" stroke-width="4" stroke-linecap="round"/>
      <circle cx="160" cy="80" r="5" fill="#718096" stroke="#4a5568" stroke-width="1"/>
      <rect x="155" y="75" width="12" height="10" fill="#a0aec0" rx="1"/>
    </g>
    
    <!-- Read/Write heads -->
    <line x1="160" y1="80" x2="145" y2="105" stroke="#cbd5e0" stroke-width="1.5"/>
    <line x1="160" y1="80" x2="135" y2="115" stroke="#cbd5e0" stroke-width="1.5"/>
    <circle cx="145" cy="105" r="2" fill="#e53e3e"/>
    <circle cx="135" cy="115" r="2" fill="#e53e3e"/>
    
    <!-- Track/Cylinder indicator -->
    <g transform="translate(90, 130)">
      <ellipse cx="0" cy="0" rx="35" ry="7" class="track" stroke-dasharray="3,2"/>
      <text x="40" y="0" class="label" font-size="9">Track</text>
    </g>
  </g>
  
  <!-- SSD Section -->
  <g class="ssd-section" data-narration="Solid State Drive showing flash memory chips and controller">
    <text x="330" y="55" text-anchor="middle" class="subtitle" style="font-weight:bold;">Solid State Drive (SSD)</text>
    
    <!-- SSD Package -->
    <rect x="280" y="70" width="100" height="90" fill="#e2e8f0" stroke="#4a5568" stroke-width="2" rx="3" filter="url(#shadow)"/>
    
    <!-- Flash memory chips -->
    <rect x="290" y="80" width="35" height="25" fill="url(#ssdChipGradient)" rx="2"/>
    <rect x="335" y="80" width="35" height="25" fill="url(#ssdChipGradient)" rx="2"/>
    <rect x="290" y="115" width="35" height="25" fill="url(#ssdChipGradient)" rx="2"/>
    <rect x="335" y="115" width="35" height="25" fill="url(#ssdChipGradient)" rx="2"/>
    
    <!-- Chip labels -->
    <text x="307" y="95" text-anchor="middle" fill="#a0aec0" font-size="8">NAND</text>
    <text x="352" y="95" text-anchor="middle" fill="#a0aec0" font-size="8">NAND</text>
    <text x="307" y="130" text-anchor="middle" fill="#a0aec0" font-size="8">NAND</text>
    <text x="352" y="130" text-anchor="middle" fill="#a0aec0" font-size="8">NAND</text>
    
    <!-- Controller chip -->
    <rect x="295" y="145" width="30" height="10" fill="#2d3748" rx="1"/>
    <text x="310" y="153" text-anchor="middle" fill="#a0aec0" font-size="6">CTRL</text>
    
    <!-- Connection pins -->
    <g fill="#718096">
      <rect x="285" y="158" width="5" height="4"/>
      <rect x="295" y="158" width="5" height="4"/>
      <rect x="305" y="158" width="5" height="4"/>
      <rect x="315" y="158" width="5" height="4"/>
      <rect x="325" y="158" width="5" height="4"/>
      <rect x="335" y="158" width="5" height="4"/>
      <rect x="345" y="158" width="5" height="4"/>
      <rect x="355" y="158" width="5" height="4"/>
      <rect x="365" y="158" width="5" height="4"/>
      <rect x="375" y="158" width="5" height="4"/>
    </g>
    
    <!-- Arrow comparing -->
    <path d="M170 130 L275 130" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="222" y="125" text-anchor="middle" class="label" font-size="9">No moving parts</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="concept-box" data-narration="Key storage concepts: tracks, sectors, cylinders, and SSD advantages">
    
    <!-- HDD Concepts -->
    <g transform="translate(20, 200)">
      <rect width="160" height="85" fill="white" stroke="#4299e1" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
      <rect width="160" height="18" fill="#4299e1" rx="5"/>
      <rect x="0" y="14" width="160" height="4" fill="#4299e1"/>
      <text x="80" y="12" text-anchor="middle" fill="white" class="concept-title">HDD Key Terms</text>
      
      <text x="10" y="35" class="concept-text"><tspan font-weight="bold">Track:</tspan> Concentric circle</text>
      <text x="10" y="48" class="concept-text"><tspan font-weight="bold">Sector:</tspan> Pie-shaped unit (512B/4KB)</text>
      <text x="10" y="61" class="concept-text"><tspan font-weight="bold">Cylinder:</tspan> Same track across surfaces</text>
      <text x="10" y="74" class="concept-text"><tspan font-weight="bold">Access:</tspan> Seek + Rotational delay</text>
    </g>
    
    <!-- SSD Concepts -->
    <g transform="translate(190, 200)">
      <rect width="160" height="85" fill="white" stroke="#48bb78" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
      <rect width="160" height="18" fill="#48bb78" rx="5"/>
      <rect x="0" y="14" width="160" height="4" fill="#48bb78"/>
      <text x="80" y="12" text-anchor="middle" fill="white" class="concept-title">SSD Key Terms</text>
      
      <text x="10" y="35" class="concept-text"><tspan font-weight="bold">NAND Flash:</tspan> Non-volatile memory</text>
      <text x="10" y="48" class="concept-text"><tspan font-weight="bold">Pages:</tspan> Smallest read unit (4KB)</text>
      <text x="10" y="61" class="concept-text"><tspan font-weight="bold">Blocks:</tspan> Erase unit (256KB)</text>
      <text x="10" y="74" class="concept-text"><tspan font-weight="bold">Access:</tspan> Direct electronic access</text>
    </g>
    
    <!-- Comparison Box -->
    <g transform="translate(55, 295)">
      <rect width="250" height="60" fill="white" stroke="#805ad5" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
      <rect width="250" height="16" fill="#805ad5" rx="5"/>
      <rect x="0" y="12" width="250" height="4" fill="#805ad5"/>
      <text x="125" y="11" text-anchor="middle" fill="white" class="concept-title">Performance Comparison</text>
      
      <text x="15" y="32" class="concept-text" fill="#e53e3e"><tspan font-weight="bold">HDD:</tspan> ~100 MB/s, latency ~5-10ms</text>
      <text x="15" y="45" class="concept-text" fill="#38a169"><tspan font-weight="bold">SSD:</tspan> ~500-3500 MB/s, latency ~0.1ms</text>
    </g>
    
  </g>
  
  <!-- Decorative elements -->
  <g class="pulse-element" transform="translate(210, 175)">
    <circle cx="0" cy="0" r="4" fill="#e53e3e" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#e53e3e"/>
  </g>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
</svg>