<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="disk-scheduling-algorithms" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d1e8e8"/>
    </linearGradient>
    <linearGradient id="diskGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="50%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#1a202c"/>
    </linearGradient>
    <linearGradient id="trackGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#68d391"/>
      <stop offset="100%" style="stop-color:#48bb78"/>
    </linearGradient>
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fc8181"/>
      <stop offset="100%" style="stop-color:#e53e3e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes headMove {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(40px); }
      50% { transform: translateX(80px); }
      75% { transform: translateX(40px); }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .spin { animation: spin 8s linear infinite; }
    .head-anim { animation: headMove 4s ease-in-out infinite; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3748; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #718096; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2d3748; }
    .algo-name { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c5282; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="slide-up" data-narration="Title section introducing the topic of Disk Scheduling Algorithms">
    <rect x="0" y="0" width="420" height="45" fill="#b8e0e0" rx="0"/>
    <text x="210" y="30" text-anchor="middle" class="title-text">Disk Scheduling Algorithms</text>
  </g>
  
  <!-- Disk Structure Visualization -->
  <g class="fade-in" transform="translate(110, 130)" data-narration="Visual representation of disk structure showing platters with tracks, sectors, and cylinder">
    <!-- Disk platter circles -->
    <circle cx="0" cy="0" r="90" fill="url(#diskGradient)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#4a5568" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#4a5568" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="#718096"/>
    
    <!-- Spindle in center -->
    <circle cx="0" cy="0" r="8" fill="#a0aec0"/>
    <circle cx="0" cy="0" r="3" fill="#4a5568"/>
    
    <!-- Tracks labels -->
    <text x="95" y="5" class="label-text" font-size="10">Track</text>
    <text x="-110" y="5" class="label-text" font-size="10">Track</text>
    
    <!-- Sector lines -->
    <line x1="0" y1="-90" x2="0" y2="-75" stroke="#68d391" stroke-width="1.5" transform="rotate(0)"/>
    <line x1="0" y1="-90" x2="0" y2="-75" stroke="#68d391" stroke-width="1.5" transform="rotate(45)"/>
    <line x1="0" y1="-90" x2="0" y2="-75" stroke="#68d391" stroke-width="1.5" transform="rotate(90)"/>
    <line x1="0" y1="-90" x2="0" y2="-75" stroke="#68d391" stroke-width="1.5" transform="rotate(135)"/>
    <line x1="0" y1="-90" x2="0" y2="-75" stroke="#68d391" stroke-width="1.5" transform="rotate(180)"/>
    <line x1="0" y1="-90" x2="0" y2="-75" stroke="#68d391" stroke-width="1.5" transform="rotate(225)"/>
    <line x1="0" y1="-90" x2="0" y2="-75" stroke="#68d391" stroke-width="1.5" transform="rotate(270)"/>
    <line x1="0" y1="-90" x2="0" y2="-75" stroke="#68d391" stroke-width="1.5" transform="rotate(315)"/>
    
    <!-- Cylinder indication (vertical) -->
    <line x1="-20" y1="-80" x2="20" y2="-80" stroke="#f6ad55" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="-20" y1="-50" x2="20" y2="-50" stroke="#f6ad55" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="25" y="-65" class="detail-text" fill="#c05621">Cylinder</text>
  </g>
  
  <!-- Read/Write Head -->
  <g class="head-anim" transform="translate(20, 130)" data-narration="The read/write head that moves across tracks to access data">
    <rect x="0" y="-5" width="35" height="10" fill="url(#headGradient)" rx="2"/>
    <rect x="30" y="-2" width="15" height="4" fill="#c53030"/>
    <text x="5" y="-12" class="detail-text" fill="#c53030">Head</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="slide-left" transform="translate(220, 120)" data-narration="Key performance metrics: seek time, rotational latency, and throughput">
    <rect x="0" y="0" width="180" height="130" fill="white" stroke="#b8e0e0" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="90" y="22" text-anchor="middle" class="section-title">Key Concepts</text>
    <line x1="10" y1="32" x2="170" y2="32" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Seek Time -->
    <circle cx="15" cy="50" r="5" fill="#68d391"/>
    <text x="28" y="54" class="label-text" font-weight="bold">Seek Time</text>
    <text x="15" y="68" class="detail-text">Head movement time</text>
    
    <!-- Rotational Latency -->
    <circle cx="15" cy="82" r="5" fill="#f6ad55"/>
    <text x="28" y="86" class="label-text" font-weight="bold">Rotational Latency</text>
    <text x="15" y="100" class="detail-text">Sector rotation wait</text>
    
    <!-- Throughput -->
    <circle cx="15" cy="114" r="5" fill="#fc8181"/>
    <text x="28" y="118" class="label-text" font-weight="bold">Throughput</text>
    <text x="15" y="128" class="detail-text">Requests/sec</text>
  </g>
  
  <!-- Algorithms Section -->
  <g class="slide-up" transform="translate(10, 280)" data-narration="Common disk scheduling algorithms: FCFS, SSTF, SCAN, and C-LOOK">
    <rect x="0" y="0" width="400" height="110" fill="white" stroke="#e2e8f0" stroke-width="1" rx="8"/>
    <text x="200" y="20" text-anchor="middle" class="section-title">Scheduling Algorithms</text>
    <line x1="10" y1="30" x2="390" y2="30" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Algorithm boxes -->
    <g class="pulse">
      <rect x="20" y="42" width="85" height="55" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.5" rx="5"/>
      <text x="62" y="62" text-anchor="middle" class="algo-name">FCFS</text>
      <text x="62" y="80" text-anchor="middle" class="detail-text">First Come</text>
      <text x="62" y="92" text-anchor="middle" class="detail-text">First Served</text>
    </g>
    
    <rect x="115" y="42" width="85" height="55" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5" rx="5"/>
    <text x="157" y="62" text-anchor="middle" class="algo-name">SSTF</text>
    <text x="157" y="80" text-anchor="middle" class="detail-text">Shortest Seek</text>
    <text x="157" y="92" text-anchor="middle" class="detail-text">Time First</text>
    
    <rect x="210" y="42" width="85" height="55" fill="#fffaf0" stroke="#ed8936" stroke-width="1.5" rx="5"/>
    <text x="252" y="62" text-anchor="middle" class="algo-name">SCAN</text>
    <text x="252" y="80" text-anchor="middle" class="detail-text">Elevator</text>
    <text x="252" y="92" text-anchor="middle" class="detail-text">Algorithm</text>
    
    <rect x="305" y="42" width="85" height="55" fill="#faf5ff" stroke="#9f7aea" stroke-width="1.5" rx="5"/>
    <text x="347" y="62" text-anchor="middle" class="algo-name">C-LOOK</text>
    <text x="347" y="80" text-anchor="middle" class="detail-text">Circular</text>
    <text x="347" y="92" text-anchor="middle" class="detail-text">LOOK</text>
  </g>
  
  <!-- Goal indicator -->
  <g class="fade-in" transform="translate(10, 250)" data-narration="Primary goal: minimize seek time for better performance">
    <rect x="0" y="0" width="400" height="25" fill="#c6f6d5" rx="4"/>
    <text x="200" y="17" text-anchor="middle" class="label-text" fill="#22543d" font-weight="bold">Goal: Minimize Seek Time • Maximize Throughput • Reduce Average Response Time</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g class="fade-in" data-narration="Arrow showing the relationship between disk head and requests">
    <path d="M 50 255 Q 30 200 45 170" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="395" r="15" fill="#b8e0e0" opacity="0.5"/>
  <circle cx="25" cy="395" r="10" fill="#d1e8e8" opacity="0.5"/>
  
  <!-- Labels for disk parts -->
  <g class="fade-in" data-narration="Label showing platter component">
    <text x="80" y="225" class="label-text" fill="#4a5568">Platter</text>
  </g>
  <g class="fade-in" data-narration="Label showing sector component">
    <text x="165" y="55" class="label-text" fill="#48bb78">Sector</text>
  </g>
</svg>