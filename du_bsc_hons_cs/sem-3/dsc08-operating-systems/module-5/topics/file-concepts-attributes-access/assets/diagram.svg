<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="file-concepts-attributes-access" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9fc5db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff176;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .section-box { rx: 8; ry: 8; stroke: #5d6d7e; stroke-width: 1; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-up { animation: slideUp 0.8s ease-out forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .arrow { marker-end: url(#arrowhead); stroke: #7f8c8d; stroke-width: 2; fill: none; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">File Concepts, Attributes &amp; Access</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#b8d4e8" stroke-width="2" class="anim-fade delay-1"/>
  
  <!-- File Concept Box -->
  <g class="anim-slide delay-1">
    <rect x="20" y="50" width="140" height="70" fill="url(#boxGradient1)" class="section-box" filter="url(#shadow)"/>
    <text x="90" y="70" text-anchor="middle" class="label">FILE</text>
    <text x="90" y="88" text-anchor="middle" class="detail">Named collection of</text>
    <text x="90" y="102" text-anchor="middle" class="detail">related information</text>
    <text x="90" y="116" text-anchor="middle" class="detail" font-size="10px">stored on secondary storage</text>
  </g>
  
  <!-- Arrow to FCB -->
  <path d="M165 85 L195 85" class="arrow"/>
  
  <!-- FCB/Inode Box -->
  <g class="anim-up delay-2">
    <rect x="200" y="50" width="200" height="150" fill="url(#boxGradient2)" class="section-box" filter="url(#shadow)"/>
    <text x="300" y="70" text-anchor="middle" class="label">File Control Block (FCB)</text>
    <text x="300" y="85" text-anchor="middle" class="detail">File Attributes / Metadata</text>
    
    <!-- Attributes list -->
    <g transform="translate(210, 95)">
      <rect x="0" y="0" width="180" height="22" rx="4" fill="#ffffff" opacity="0.5"/>
      <text x="10" y="15" class="detail" font-weight="bold">Name:</text>
      <text x="50" y="15" class="detail">document.txt</text>
      
      <rect x="0" y="25" width="180" height="22" rx="4" fill="#ffffff" opacity="0.5"/>
      <text x="10" y="40" class="detail" font-weight="bold">Identifier:</text>
      <text x="70" y="40" class="detail">inode #12345</text>
      
      <rect x="0" y="50" width="180" height="22" rx="4" fill="#ffffff" opacity="0.5"/>
      <text x="10" y="65" class="detail" font-weight="bold">Type:</text>
      <text x="50" y="65" class="detail">.txt, .exe, .doc</text>
      
      <rect x="0" y="75" width="180" height="22" rx="4" fill="#ffffff" opacity="0.5"/>
      <text x="10" y="90" class="detail" font-weight="bold">Location:</text>
      <text x="65" y="90" class="detail">Block ptrs: [10,11,12]</text>
      
      <rect x="0" y="100" width="180" height="22" rx="4" fill="#ffffff" opacity="0.5"/>
      <text x="10" y="115" class="detail" font-weight="bold">Size:</text>
      <text x="50" y="115" class="detail">4096 bytes</text>
      
      <rect x="0" y="125" width="180" height="22" rx="4" fill="#ffffff" opacity="0.5"/>
      <text x="10" y="140" class="detail" font-weight="bold">Permissions:</text>
      <text x="75" y="140" class="detail">rwx r-x r--</text>
    </g>
  </g>
  
  <!-- Arrow down to Access Methods -->
  <path d="M300 205 L300 230" class="arrow"/>
  
  <!-- Access Methods Section -->
  <g class="anim-up delay-3">
    <rect x="60" y="235" width="320" height="145" fill="url(#boxGradient3)" class="section-box" filter="url(#shadow)"/>
    <text x="220" y="255" text-anchor="middle" class="label">File Access Methods</text>
    
    <!-- Sequential Access -->
    <g transform="translate(75, 265)">
      <rect x="0" y="0" width="90" height="55" rx="6" fill="#ffffff" opacity="0.7" stroke="#e67e22" stroke-width="1"/>
      <text x="45" y="18" text-anchor="middle" class="label" font-size="12px">Sequential</text>
      <text x="45" y="32" text-anchor="middle" class="detail" font-size="10px">Read records</text>
      <text x="45" y="44" text-anchor="middle" class="detail" font-size="10px">one after another</text>
    </g>
    
    <!-- Arrow -->
    <path d="M175 292 L205 292" class="arrow"/>
    
    <!-- Direct Access -->
    <g transform="translate(215, 265)">
      <rect x="0" y="0" width="90" height="55" rx="6" fill="#ffffff" opacity="0.7" stroke="#27ae60" stroke-width="1"/>
      <text x="45" y="18" text-anchor="middle" class="label" font-size="12px">Direct</text>
      <text x="45" y="32" text-anchor="middle" class="detail" font-size="10px">Random access</text>
      <text x="45" y="44" text-anchor="middle" class="detail" font-size="10px">to any block</text>
    </g>
    
    <!-- Arrow -->
    <path d="M315 292 L345 292" class="arrow"/>
    
    <!-- Indexed Access -->
    <g transform="translate(355, 265)">
      <rect x="0" y="0" width="90" height="55" rx="6" fill="#ffffff" opacity="0.7" stroke="#8e44ad" stroke-width="1"/>
      <text x="45" y="18" text-anchor="middle" class="label" font-size="12px">Indexed</text>
      <text x="45" y="32" text-anchor="middle" class="detail" font-size="10px">Index block</text>
      <text x="45" y="44" text-anchor="middle" class="detail" font-size="10px">points to data</text>
    </g>
    
    <!-- Key points box -->
    <g transform="translate(75, 330)">
      <rect x="0" y="0" width="290" height="40" rx="4" fill="#ffffff" opacity="0.5"/>
      <text x="145" y="15" text-anchor="middle" class="detail" font-weight="bold">OS provides uniform interface, hiding physical storage details</text>
      <text x="145" y="30" text-anchor="middle" class="detail" font-size="10px">FCB contains all metadata; access methods determine data retrieval efficiency</text>
    </g>
  </g>
  
  <!-- Decorative icons -->
  <g class="anim-fade delay-4">
    <circle cx="40" cy="380" r="8" fill="#b8d4e8" opacity="0.6"/>
    <circle cx="380" cy="380" r="8" fill="#c8e6c9" opacity="0.6"/>
    <circle cx="40" cy="55" r="12" fill="#b8d4e8" opacity="0.4" class="anim-pulse"/>
  </g>
  
  <!-- Data narration attributes for accessibility -->
  <title>File Concepts, Attributes, and Access Methods Diagram</title>
  <desc data-narration="This diagram illustrates the concept of files in operating systems, showing the File Control Block (FCB) structure with metadata attributes including name, identifier, type, location, size, and permissions. It also depicts three main file access methods: sequential, direct, and indexed access."></desc>
</svg>