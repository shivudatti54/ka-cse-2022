<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="os-services-and-system-calls">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3e5fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81d4fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kernelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="callGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff59d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serviceGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#388e3c"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes slideRight { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .user-box { animation: slideRight 0.7s ease-out forwards; }
    .kernel-box { animation: slideRight 0.7s ease-out 0.2s forwards; opacity: 0; }
    .call-box { animation: slideUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .param-box { animation: slideUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .service-box { animation: slideUp 0.7s ease-out 0.7s forwards; opacity: 0; }
    .arrow-anim { animation: fadeIn 0.5s ease-out 0.9s forwards; opacity: 0; }
    .return-arrow { animation: slideRight 0.6s ease-out 1.2s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title { font-size: 20px; font-weight: bold; fill: #1565c0; }
    .section-title { font-size: 14px; font-weight: bold; fill: #333; }
    .label { font-size: 12px; fill: #555; }
    .detail { font-size: 11px; fill: #666; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="28" text-anchor="middle" class="title title-anim">System Call Execution Flow</text>
  
  <g class="user-box" data-narration="User Mode: Where applications run with limited privileges">
    <rect x="30" y="55" width="165" height="95" rx="10" fill="url(#userGradient)" stroke="#0288d1" stroke-width="2" filter="url(#shadow)"/>
    <text x="112" y="78" text-anchor="middle" class="section-title">USER MODE</text>
    <rect x="45" y="90" width="135" height="50" rx="6" fill="white" fill-opacity="0.5" stroke="#81d4fa" stroke-width="1"/>
    <text x="112" y="108" text-anchor="middle" class="label">User Program</text>
    <text x="112" y="124" text-anchor="middle" class="detail">make()</text>
    <text x="112" y="136" text-anchor="middle" class="detail">read() write()</text>
  </g>
  
  <g class="call-box" data-narration="System Call Interface: Translates API calls to kernel requests">
    <rect x="220" y="55" width="165" height="95" rx="10" fill="url(#kernelGradient)" stroke="#7b1fa2" stroke-width="2" filter="url(#shadow)"/>
    <text x="302" y="78" text-anchor="middle" class="section-title">KERNEL MODE</text>
    <rect x="235" y="90" width="135" height="50" rx="6" fill="white" fill-opacity="0.5" stroke="#ce93d8" stroke-width="1"/>
    <text x="302" y="108" text-anchor="middle" class="label">System Call Interface</text>
    <text x="302" y="124" text-anchor="middle" class="detail">sys_read, sys_write</text>
    <text x="302" y="136" text-anchor="middle" class="detail">sys_fork</text>
  </g>
  
  <g class="arrow-anim">
    <line x1="195" y1="102" x2="220" y2="102" stroke="#1976d2" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="207" y="95" text-anchor="middle" class="detail" fill="#1976d2">trap</text>
  </g>
  
  <g class="param-box" data-narration="System Call Number: Identifies which system call is requested">
    <rect x="100" y="165" width="220" height="38" rx="8" fill="url(#callGradient)" stroke="#f9a825" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="180" text-anchor="middle" class="label">System Call Number</text>
    <text x="210" y="195" text-anchor="middle" class="detail">e.g., #1 = exit, #2 = fork, #3 = read</text>
  </g>
  
  <g class="param-box" data-narration="Parameters: Data passed to the system call">
    <rect x="100" y="215" width="220" height="38" rx="8" fill="url(#callGradient)" stroke="#f9a825" stroke-width="1.5" filter="url(#shadow)" style="animation-delay: 0.6s;"/>
    <text x="210" y="230" text-anchor="middle" class="label">Parameters</text>
    <text x="210" y="245" text-anchor="middle" class="detail">file descriptor, buffer address, count</text>
  </g>
  
  <g class="arrow-anim" style="animation-delay: 1s;">
    <line x1="210" y1="253" x2="210" y2="275" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  </g>
  
  <g class="service-box" data-narration="Kernel Service Execution: Performs the actual operation">
    <rect x="85" y="280" width="250" height="70" rx="10" fill="url(#serviceGradient)" stroke="#388e3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="305" text-anchor="middle" class="section-title">KERNEL SERVICE EXECUTION</text>
    <text x="210" y="325" text-anchor="middle" class="label">Hardware Access • Resource Management</text>
    <text x="210" y="342" text-anchor="middle" class="detail">Memory allocation • I/O operations • Process scheduling</text>
  </g>
  
  <g class="return-arrow" data-narration="Return: Result sent back to user program">
    <line x1="85" y1="315" x2="40" y2="315" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="62" y="308" text-anchor="middle" class="label" fill="#388e3c">Return</text>
    <text x="62" y="322" text-anchor="middle" class="detail">status/data</text>
  </g>
  
  <g class="pulse-anim" style="transform-origin: 210px 200px;">
    <circle cx="210" cy="200" r="25" fill="none" stroke="#ff7043" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  
  <rect x="10" y="360" width="400" height="32" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="20" y="379" class="label" fill="#666">Key: Mode Switch occurs via trap/interrupt mechanism</text>
</svg>