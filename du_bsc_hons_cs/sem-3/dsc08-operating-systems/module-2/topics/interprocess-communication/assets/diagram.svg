<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="interprocess-communication" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fab1a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e17055;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rootGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; font-weight: bold; }
    .node { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .node-root { animation: pulse 3s ease-in-out infinite; }
    .connector { stroke: #636e72; stroke-width: 2; stroke-dasharray: 5,5; animation: drawLine 1s ease-out forwards; stroke-dashoffset: 100; }
    .subnode { animation: slideIn 0.5s ease-out forwards; opacity: 0; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #2d3436; }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; fill: #2d3436; font-weight: bold; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1.0s; }
    .delay-6 { animation-delay: 1.2s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text">Interprocess Communication</text>
  
  <!-- Root Node - IPC -->
  <g class="node node-root" data-narration="The central concept: IPC enables processes to exchange data">
    <rect x="160" y="45" width="100" height="35" rx="8" fill="url(#rootGradient)" filter="url(#shadow)"/>
    <text x="210" y="68" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2d3436">IPC</text>
  </g>
  
  <!-- Main Branch 1: Direct Communication -->
  <g class="node delay-1" data-narration="Direct Communication includes Message Passing and Pipes">
    <line x1="210" y1="80" x2="90" y2="130" class="connector"/>
    <rect x="30" y="130" width="120" height="30" rx="6" fill="url(#nodeGradient1)" filter="url(#shadow)"/>
    <text x="90" y="150" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Direct Comm.</text>
  </g>
  
  <!-- Subnodes for Direct Communication -->
  <g class="subnode delay-2" data-narration="Message Passing: Processes send messages directly to each other">
    <line x1="90" y1="160" x2="50" y2="185" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="15" y="185" width="70" height="24" rx="4" fill="#dfe6e9" stroke="#74b9ff" stroke-width="1.5"/>
    <text x="50" y="201" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Message Pass</text>
  </g>
  <g class="subnode delay-2" data-narration="Pipes: Unidirectional data channels connecting processes">
    <line x1="90" y1="160" x2="130" y2="185" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="105" y="185" width="55" height="24" rx="4" fill="#dfe6e9" stroke="#74b9ff" stroke-width="1.5"/>
    <text x="132" y="201" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Pipes</text>
  </g>
  
  <!-- Main Branch 2: Indirect Communication -->
  <g class="node delay-1" data-narration="Indirect Communication uses shared mailboxes or memory">
    <line x1="210" y1="80" x2="210" y2="130" class="connector"/>
    <rect x="150" y="130" width="120" height="30" rx="6" fill="url(#nodeGradient2)" filter="url(#shadow)"/>
    <text x="210" y="150" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Indirect Comm.</text>
  </g>
  
  <!-- Subnodes for Indirect Communication -->
  <g class="subnode delay-3" data-narration="Shared Memory: Multiple processes access common memory region">
    <line x1="210" y1="160" x2="170" y2="185" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="140" y="185" width="60" height="24" rx="4" fill="#dfe6e9" stroke="#a29bfe" stroke-width="1.5"/>
    <text x="170" y="201" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Shared Mem</text>
  </g>
  <g class="subnode delay-3" data-narration="Mailboxes: Messages stored in intermediate buffers">
    <line x1="210" y1="160" x2="250" y2="185" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="220" y="185" width="60" height="24" rx="4" fill="#dfe6e9" stroke="#a29bfe" stroke-width="1.5"/>
    <text x="250" y="201" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Mailboxes</text>
  </g>
  
  <!-- Main Branch 3: Sockets -->
  <g class="node delay-2" data-narration="Sockets provide network and local communication endpoints">
    <line x1="210" y1="80" x2="330" y2="130" class="connector"/>
    <rect x="270" y="130" width="100" height="30" rx="6" fill="url(#nodeGradient3)" filter="url(#shadow)"/>
    <text x="320" y="150" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Sockets</text>
  </g>
  
  <!-- Subnodes for Sockets -->
  <g class="subnode delay-4" data-narration="Network Sockets: TCP/UDP communication over networks">
    <line x1="320" y1="160" x2="290" y2="185" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="260" y="185" width="60" height="24" rx="4" fill="#dfe6e9" stroke="#55efc4" stroke-width="1.5"/>
    <text x="290" y="201" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Network</text>
  </g>
  <g class="subnode delay-4" data-narration="Unix Domain Sockets: Local inter-process communication">
    <line x1="320" y1="160" x2="350" y2="185" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="330" y="185" width="60" height="24" rx="4" fill="#dfe6e9" stroke="#55efc4" stroke-width="1.5"/>
    <text x="360" y="201" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Unix Dom.</text>
  </g>
  
  <!-- Main Branch 4: Synchronization -->
  <g class="node delay-3" data-narration="Synchronization primitives coordinate process execution">
    <line x1="210" y1="80" x2="60" y2="240" class="connector"/>
    <rect x="15" y="240" width="100" height="30" rx="6" fill="url(#nodeGradient4)" filter="url(#shadow)"/>
    <text x="65" y="260" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Synchronize</text>
  </g>
  
  <!-- Subnodes for Synchronization -->
  <g class="subnode delay-5" data-narration="Semaphores: Count-based synchronization primitives">
    <line x1="65" y1="270" x2="35" y2="300" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="5" y="300" width="65" height="24" rx="4" fill="#dfe6e9" stroke="#fab1a0" stroke-width="1.5"/>
    <text x="37" y="316" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Semaphore</text>
  </g>
  <g class="subnode delay-5" data-narration="Mutexes: Mutual exclusion locks for critical sections">
    <line x1="65" y1="270" x2="95" y2="300" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="65" y="300" width="60" height="24" rx="4" fill="#dfe6e9" stroke="#fab1a0" stroke-width="1.5"/>
    <text x="95" y="316" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Mutex</text>
  </g>
  <g class="subnode delay-6" data-narration="Signals: Asynchronous notifications between processes">
    <line x1="65" y1="270" x2="125" y2="295" class="connector" style="stroke-dasharray:3,3"/>
    <rect x="110" y="295" width="50" height="22" rx="4" fill="#dfe6e9" stroke="#fab1a0" stroke-width="1.5"/>
    <text x="135" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Signal</text>
  </g>
  
  <!-- Legend / Key -->
  <g class="node delay-6" data-narration="Understanding IPC mechanisms is essential for OS design">
    <rect x="250" y="320" width="160" height="65" rx="6" fill="white" stroke="#b2bec3" stroke-width="1" opacity="0.9"/>
    <text x="330" y="340" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2d3436">Key Insight</text>
    <text x="330" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#636e72">Processes need IPC to</text>
    <text x="330" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#636e72">share data &amp; synchronize</text>
    <text x="330" y="381" text-anchor="middle" font-family="Arial" font-size="9" fill="#636e72">execution safely</text>
  </g>
  
  <!-- Arrow indicator -->
  <g class="node delay-6">
    <polygon points="330,295 335,305 325,305" fill="#e17055"/>
  </g>
</svg>