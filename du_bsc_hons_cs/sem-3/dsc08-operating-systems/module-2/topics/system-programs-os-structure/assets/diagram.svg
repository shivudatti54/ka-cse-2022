<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="system-programs-os-structure" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="hardwareGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90c2"/>
    </linearGradient>
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a0dc"/>
      <stop offset="100%" style="stop-color:#9b59b6"/>
    </linearGradient>
    <linearGradient id="systemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#95d5b2"/>
      <stop offset="100%" style="stop-color:#52b788"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6a5"/>
      <stop offset="100%" style="stop-color:#ff9f43"/>
    </linearGradient>
    <linearGradient id="monolithicGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="layeredGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#2d9a8e"/>
    </linearGradient>
    <linearGradient id="microkernelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="hybridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8"/>
      <stop offset="100%" style="stop-color:#e84393"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .section-5 { animation: slideInLeft 0.6s ease-out 1s forwards; opacity: 0; }
    .layer { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .arch-box { animation: float 4s ease-in-out infinite; }
    .arch-box:nth-child(odd) { animation-delay: 0.5s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">System Programs &amp; OS Structure</text>
  
  <!-- Architecture Comparison Section -->
  <g class="section-1" data-narration="Four main OS architecture types: Monolithic, Layered, Microkernel, and Hybrid">
    <text x="30" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">OS Architectures:</text>
    
    <rect x="20" y="56" width="95" height="22" rx="4" fill="url(#monolithicGrad)" filter="url(#shadow)" class="arch-box"/>
    <text x="67" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Monolithic</text>
    
    <rect x="120" y="56" width="95" height="22" rx="4" fill="url(#layeredGrad)" filter="url(#shadow)" class="arch-box"/>
    <text x="167" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Layered</text>
    
    <rect x="220" y="56" width="95" height="22" rx="4" fill="url(#microkernelGrad)" filter="url(#shadow)" class="arch-box"/>
    <text x="267" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Microkernel</text>
    
    <rect x="320" y="56" width="85" height="22" rx="4" fill="url(#hybridGrad)" filter="url(#shadow)" class="arch-box"/>
    <text x="362" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Hybrid</text>
  </g>
  
  <!-- Layer Diagram -->
  <g class="section-2" data-narration="OS layer structure showing User Applications at top, System Programs, Kernel, and Hardware at bottom">
    <rect x="30" y="90" width="360" height="280" rx="6" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    
    <!-- User Applications Layer -->
    <rect x="50" y="100" width="320" height="45" rx="4" fill="url(#userGrad)" class="layer" filter="url(#shadow)"/>
    <text x="210" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">User Applications</text>
    <text x="210" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">(Word, Browser, Games)</text>
    
    <!-- Arrow up -->
    <line x1="210" y1="145" x2="210" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- System Programs Layer -->
    <rect x="50" y="155" width="320" height="45" rx="4" fill="url(#systemGrad)" class="layer" filter="url(#shadow)"/>
    <text x="210" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">System Programs</text>
    <text x="210" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">(File Manager, Shell, Utilities)</text>
    
    <!-- Arrow up -->
    <line x1="210" y1="200" x2="210" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Kernel/Core Layer -->
    <rect x="50" y="210" width="320" height="45" rx="4" fill="url(#kernelGrad)" class="layer" filter="url(#shadow)"/>
    <text x="210" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Kernel / Core</text>
    <text x="210" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">(Memory, Process, Device Management)</text>
    
    <!-- Arrow up -->
    <line x1="210" y1="255" x2="210" y2="265" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Hardware Layer -->
    <rect x="50" y="265" width="320" height="35" rx="4" fill="url(#hardwareGrad)" class="layer" filter="url(#shadow)"/>
    <text x="210" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Hardware</text>
    <text x="210" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">(CPU, Memory, I/O Devices)</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="section-3" data-narration="Key System Program categories include File Management, Process Management, Device Management, and User Interface programs">
    <rect x="295" y="295" width="110" height="45" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1" filter="url(#shadow)"/>
    <text x="300" y="310" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#856404">System Programs:</text>
    <text x="300" y="322" font-family="Arial, sans-serif" font-size="9" fill="#856404">• File Management</text>
    <text x="300" y="333" font-family="Arial, sans-serif" font-size="9" fill="#856404">• Process Management</text>
  </g>
  
  <g class="section-4" data-narration="Monolithic: All OS services in kernel | Layered: Organized in hierarchy | Microkernel: Minimal kernel, services in user space | Hybrid: Combines approaches">
    <rect x="20" y="330" width="270" height="55" rx="4" fill="#e8f4fc" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
    <text x="30" y="346" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">Architecture Differences:</text>
    <text x="30" y="360" font-family="Arial, sans-serif" font-size="9" fill="#555">• <tspan font-weight="bold">Monolithic:</tspan> All services in kernel</text>
    <text x="30" y="372" font-family="Arial, sans-serif" font-size="9" fill="#555">• <tspan font-weight="bold">Layered:</tspan> Hierarchical organization</text>
    <text x="155" y="360" font-family="Arial, sans-serif" font-size="9" fill="#555">• <tspan font-weight="bold">Microkernel:</tspan> Minimal kernel</text>
    <text x="155" y="372" font-family="Arial, sans-serif" font-size="9" fill="#555">• <tspan font-weight="bold">Hybrid:</tspan> Combined approach</text>
  </g>
  
  <!-- Communication arrows showing relationship -->
  <g class="section-5" data-narration="Communication flows bidirectionally - applications request services through system programs to kernel, which manages hardware">
    <path d="M 250 128 L 280 128 L 280 175 L 250 175" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
    <path d="M 250 180 L 280 180 L 280 227 L 250 227" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
    <path d="M 250 232 L 280 232 L 280 277 L 250 277" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
    <text x="285" y="205" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6" transform="rotate(90, 285, 205)">Service Calls</text>
  </g>
  
  <!-- Bottom label -->
  <g class="section-5">
    <text x="210" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#777">Operating System provides interface between Hardware and User Applications</text>
  </g>
</svg>