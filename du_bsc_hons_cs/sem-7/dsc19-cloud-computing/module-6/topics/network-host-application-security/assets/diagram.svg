<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="network-host-application-security">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4eaf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; font-family: 'Segoe UI', Arial, sans-serif; }
    .layer-box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .layer-box:nth-child(1) { animation-delay: 0.2s; }
    .layer-box:nth-child(2) { animation-delay: 0.4s; }
    .layer-box:nth-child(3) { animation-delay: 0.6s; }
    .layer-box:nth-child(4) { animation-delay: 0.8s; }
    .icon { animation: pulse 2s infinite; transform-origin: center; }
    .arrow { animation: fadeIn 1.5s ease-out; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: white; font-weight: 600; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: white; opacity: 0.9; }
    .legend { animation: fadeIn 1.2s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">Cloud Security Architecture</text>
  <text x="210" y="50" text-anchor="middle" class="title" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a5568">Network, Host &amp; Application Layers</text>
  
  <!-- Layer 1: Network Security (Bottom) -->
  <g class="layer-box" data-narration="Network Security layer protects data in transit using VPC, VPN, and Direct Connect technologies">
    <rect x="40" y="310" width="340" height="45" rx="8" fill="url(#layer1Grad)" filter="url(#shadow)"/>
    <text x="60" y="330" class="label-text">Network Security</text>
    <text x="60" y="345" class="detail-text">VPC | VPN | Direct Connect | Firewalls</text>
  </g>
  
  <!-- Arrow -->
  <g class="arrow">
    <path d="M210 305 L210 285" stroke="#667eea" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
    <polygon points="205,280 215,280 210,290" fill="#667eea"/>
  </g>
  
  <!-- Layer 2: Host Security -->
  <g class="layer-box" data-narration="Host Security protects virtual machines, containers, and operating systems through patching and hardening">
    <rect x="50" y="255" width="320" height="40" rx="8" fill="url(#layer2Grad)" filter="url(#shadow)"/>
    <text x="70" y="273" class="label-text">Host Security</text>
    <text x="70" y="287" class="detail-text">OS Hardening | Patches | VM Protection | Containers</text>
  </g>
  
  <!-- Arrow -->
  <g class="arrow">
    <path d="M210 248 L210 230" stroke="#11998e" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="205,225 215,225 210,235" fill="#11998e"/>
  </g>
  
  <!-- Layer 3: Application Security -->
  <g class="layer-box" data-narration="Application Security ensures software is developed and deployed without vulnerabilities using WAF and code review">
    <rect x="60" y="200" width="300" height="40" rx="8" fill="url(#layer3Grad)" filter="url(#shadow)"/>
    <text x="80" y="218" class="label-text">Application Security</text>
    <text x="80" y="232" class="detail-text">WAF | Code Review | SAST/DAST | Input Validation</text>
  </g>
  
  <!-- Arrow -->
  <g class="arrow">
    <path d="M210 193 L210 175" stroke="#f093fb" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="205,170 215,170 210,180" fill="#f093fb"/>
  </g>
  
  <!-- Layer 4: Identity & Data Security (Top) -->
  <g class="layer-box" data-narration="Identity and Data Security provide encryption, IAM, and MFA to protect access and data at rest">
    <rect x="70" y="145" width="280" height="40" rx="8" fill="url(#layer4Grad)" filter="url(#shadow)"/>
    <text x="90" y="163" class="label-text">Identity &amp; Data Security</text>
    <text x="90" y="177" class="detail-text">IAM | MFA | Encryption | Tokenization</text>
  </g>
  
  <!-- Shield Icon -->
  <g class="icon" transform="translate(360, 155)">
    <path d="M15 2 L26 8 L26 18 C26 27 20 33 15 36 C10 33 4 27 4 18 L4 8 Z" fill="#4facfe" stroke="#00f2fe" stroke-width="2" opacity="0.8"/>
    <path d="M12 15 L14 18 L19 12" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Legend -->
  <g class="legend" transform="translate(20, 70)">
    <rect width="130" height="60" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="10" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#718096" font-weight="bold">SHARED RESPONSIBILITY</text>
    <circle cx="20" cy="35" r="4" fill="#667eea"/>
    <text x="32" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#4a5568">CSP manages</text>
    <circle cx="20" cy="50" r="4" fill="#38ef7d"/>
    <text x="32" y="53" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#4a5568">Customer manages</text>
  </g>
  
  <!-- Key Stats -->
  <g class="legend" transform="translate(270, 70)">
    <rect width="130" height="60" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="10" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#718096" font-weight="bold">KEY THREATS (2023)</text>
    <text x="10" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#e53e3e">• Misconfiguration</text>
    <text x="10" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#e53e3e">• Identity issues</text>
    <text x="80" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#e53e3e">+ 6B records</text>
  </g>
</svg>