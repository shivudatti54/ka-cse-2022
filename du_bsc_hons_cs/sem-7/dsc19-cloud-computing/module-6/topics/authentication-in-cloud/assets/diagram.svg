<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="authentication-in-cloud">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e6e6fa"/>
    </linearGradient>
    <linearGradient id="factor1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="factor2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="factor3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9"/>
      <stop offset="100%" style="stop-color:#b2bec3"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes checkPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideIn 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideIn 0.8s ease-out 0.6s both; }
    .section-4 { animation: slideIn 0.8s ease-out 0.8s both; }
    .section-5 { animation: fadeIn 0.8s ease-out 1s both; }
    .user-icon { animation: float 3s ease-in-out infinite; }
    .cloud-icon { animation: float 3.5s ease-in-out infinite 0.5s; }
    .access-icon { animation: checkPulse 2s ease-in-out infinite; }
    .arrow { animation: fadeIn 0.5s ease-out 1.2s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" class="title">Authentication in Cloud</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#636e72" class="title">MFA Authentication Flow</text>
  
  <!-- User Section -->
  <g class="section-1" data-narration="User initiates authentication by entering credentials">
    <rect x="20" y="70" width="90" height="55" rx="8" fill="#fff" filter="url(#shadow)"/>
    <circle cx="65" cy="95" r="12" fill="#74b9ff"/>
    <text x="65" y="95" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">U</text>
    <text x="65" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">User</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow">
    <line x1="110" y1="97" x2="140" y2="97" stroke="#636e72" stroke-width="2"/>
    <polygon points="140,92 148,97 140,102" fill="#636e72"/>
  </g>
  
  <!-- Factor 1: Something You Know -->
  <g class="section-2" data-narration="First factor: Something you know - password/PIN">
    <rect x="145" y="70" width="100" height="55" rx="8" fill="url(#factor1Grad)" filter="url(#shadow)"/>
    <text x="195" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#2d3436" font-weight="bold">Factor 1</text>
    <text x="195" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#2d3436">You Know</text>
    <text x="195" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#2d3436">(Password)</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow">
    <line x1="245" y1="97" x2="275" y2="97" stroke="#636e72" stroke-width="2"/>
    <polygon points="275,92 283,97 275,102" fill="#636e72"/>
  </g>
  
  <!-- Factor 2: Something You Have -->
  <g class="section-3" data-narration="Second factor: Something you have - token/mobile device">
    <rect x="280" y="70" width="100" height="55" rx="8" fill="url(#factor2Grad)" filter="url(#shadow)"/>
    <text x="330" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#2d3436" font-weight="bold">Factor 2</text>
    <text x="330" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#2d3436">You Have</text>
    <text x="330" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#2d3436">(Token/OTP)</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="arrow">
    <line x1="330" y1="125" x2="330" y2="155" stroke="#636e72" stroke-width="2"/>
    <polygon points="325,155 330,163 335,155" fill="#636e72"/>
  </g>
  
  <!-- Factor 3: Something You Are -->
  <g class="section-4" data-narration="Third factor: Something you are - biometric verification">
    <rect x="280" y="160" width="100" height="55" rx="8" fill="url(#factor3Grad)" filter="url(#shadow)"/>
    <text x="330" y="178" text-anchor="middle" font-family="Arial" font-size="11" fill="#2d3436" font-weight="bold">Factor 3</text>
    <text x="330" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#2d3436">You Are</text>
    <text x="330" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#2d3436">(Biometric)</text>
  </g>
  
  <!-- Arrow down to cloud -->
  <g class="arrow">
    <line x1="250" y1="187" x2="250" y2="230" stroke="#636e72" stroke-width="2"/>
    <polygon points="245,230 250,238 255,230" fill="#636e72"/>
  </g>
  
  <!-- Cloud Validation -->
  <g class="section-5" data-narration="Cloud validates all factors and grants access">
    <rect x="180" y="240" width="140" height="50" rx="10" fill="url(#cloudGrad)" filter="url(#shadow)"/>
    <path d="M220 260 Q210 250 215 240 Q225 230 240 235 Q250 225 265 235 Q280 230 290 245 Q300 250 290 260 Z" fill="#fff" opacity="0.8"/>
    <text x="250" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" font-weight="bold">Cloud Validation</text>
  </g>
  
  <!-- Arrow to access -->
  <g class="arrow">
    <line x1="250" y1="290" x2="250" y2="320" stroke="#636e72" stroke-width="2"/>
    <polygon points="245,320 250,328 255,320" fill="#636e72"/>
  </g>
  
  <!-- Access Granted -->
  <g class="section-5" data-narration="Upon successful validation, access is granted to cloud resources">
    <rect x="200" y="330" width="100" height="40" rx="20" fill="#00b894" filter="url(#shadow)" class="access-icon"/>
    <text x="250" y="352" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">ACCESS GRANTED</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-5">
    <rect x="20" y="325" width="80" height="55" rx="5" fill="#fff" stroke="#dfe6e9" stroke-width="1"/>
    <text x="60" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#636e72" font-weight="bold">KEY POINTS</text>
    <text x="60" y="353" text-anchor="middle" font-family="Arial" font-size="7" fill="#2d3436">• Multi-Factor</text>
    <text x="60" y="363" text-anchor="middle" font-family="Arial" font-size="7" fill="#2d3436">• Shared Resp.</text>
    <text x="60" y="373" text-anchor="middle" font-family="Arial" font-size="7" fill="#2d3436">• Cloud Security</text>
  </g>
  
  <!-- Flow indicator -->
  <g class="arrow">
    <line x1="380" y1="97" x2="395" y2="97" stroke="#636e72" stroke-width="1" stroke-dasharray="3,2"/>
    <polygon points="395,92 403,97 395,102" fill="#636e72" transform="scale(0.7)"/>
  </g>
  
  <!-- Validation checkmarks -->
  <g class="section-5">
    <circle cx="195" cy="135" r="8" fill="#00b894" opacity="0.8"/>
    <text x="195" y="138" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">✓</text>
    
    <circle cx="330" cy="135" r="8" fill="#00b894" opacity="0.8"/>
    <text x="330" y="138" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">✓</text>
    
    <circle cx="330" cy="225" r="8" fill="#00b894" opacity="0.8"/>
    <text x="330" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">✓</text>
  </g>
</svg>