<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="data-privacy-jurisdictional-issues">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideInLeft {
      0% { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      0% { opacity: 0; transform: translateX(30px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1565c0; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .label-text { font-family: Arial, sans-serif; font-size: 12px; fill: #444; }
    .detail-text { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.1s; }
    .box2 { animation-delay: 0.2s; }
    .box3 { animation-delay: 0.3s; }
    .box4 { animation-delay: 0.4s; }
    .arrow { animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .icon-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text">Data Privacy &amp; Jurisdictional Issues</text>
  <text x="210" y="48" text-anchor="middle" class="label-text" fill="#666">in Cloud Computing</text>
  
  <!-- Section 1: Data Privacy Fundamentals -->
  <g class="box box1" data-narration="Data Privacy Fundamentals section explaining personal data, processing operations, and roles of data controller versus data processor">
    <rect x="10" y="60" width="125" height="90" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="72" y="78" text-anchor="middle" class="section-title">Data Privacy</text>
    <circle cx="72" cy="100" r="12" fill="#81c784" class="icon-pulse"/>
    <text x="72" y="104" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">P</text>
    <text x="72" y="120" text-anchor="middle" class="detail-text">Personal Data</text>
    <text x="72" y="132" text-anchor="middle" class="detail-text">Processing</text>
    <text x="72" y="144" text-anchor="middle" class="detail-text">Controller/Processor</text>
  </g>
  
  <!-- Section 2: Cloud Architecture - IaaS -->
  <g class="box box2" data-narration="Cloud Architecture showing Infrastructure as a Service layer with physical servers and virtual machines">
    <rect x="145" y="60" width="85" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="187" y="78" text-anchor="middle" class="section-title" font-size="11">IaaS</text>
    <text x="187" y="92" text-anchor="middle" class="detail-text">Infrastructure</text>
    <text x="187" y="104" text-anchor="middle" class="detail-text">as a Service</text>
  </g>
  
  <!-- Section 3: Cloud Architecture - PaaS -->
  <g class="box box2" data-narration="Platform as a Service layer providing development platforms and frameworks">
    <rect x="145" y="120" width="85" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="187" y="138" text-anchor="middle" class="section-title" font-size="11">PaaS</text>
    <text x="187" y="152" text-anchor="middle" class="detail-text">Platform</text>
    <text x="187" y="164" text-anchor="middle" class="detail-text">as a Service</text>
  </g>
  
  <!-- Section 4: Cloud Architecture - SaaS -->
  <g class="box box2" data-narration="Software as a Service layer delivering applications over the cloud">
    <rect x="145" y="180" width="85" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="187" y="198" text-anchor="middle" class="section-title" font-size="11">SaaS</text>
    <text x="187" y="212" text-anchor="middle" class="detail-text">Software</text>
    <text x="187" y="224" text-anchor="middle" class="detail-text">as a Service</text>
  </g>
  
  <!-- Section 5: Regulations - GDPR -->
  <g class="box box3" data-narration="GDPR regulation from European Union with key requirements for data protection">
    <rect x="240" y="60" width="85" height="50" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="282" y="80" text-anchor="middle" class="section-title" font-size="11">GDPR</text>
    <text x="282" y="95" text-anchor="middle" class="detail-text">EU Regulation</text>
  </g>
  
  <!-- Section 6: Regulations - IT Act -->
  <g class="box box3" data-narration="India's IT Act 2000 governing data protection and electronic commerce">
    <rect x="240" y="115" width="85" height="50" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="282" y="135" text-anchor="middle" class="section-title" font-size="11">IT Act 2000</text>
    <text x="282" y="150" text-anchor="middle" class="detail-text">India</text>
  </g>
  
  <!-- Section 7: Regulations - CCPA -->
  <g class="box box3" data-narration="California Consumer Privacy Act from the United States">
    <rect x="240" y="170" width="85" height="50" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="282" y="190" text-anchor="middle" class="section-title" font-size="11">CCPA</text>
    <text x="282" y="205" text-anchor="middle" class="detail-text">USA - California</text>
  </g>
  
  <!-- Cloud Icon -->
  <g class="float-anim" data-narration="Cloud icon representing cloud computing infrastructure where data is stored and processed">
    <ellipse cx="187" cy="255" rx="35" ry="18" fill="#90caf9" opacity="0.8"/>
    <ellipse cx="172" cy="252" rx="25" ry="15" fill="#bbdefb" opacity="0.8"/>
    <ellipse cx="200" cy="250" rx="20" ry="12" fill="#e3f2fd" opacity="0.8"/>
  </g>
  
  <!-- Arrows connecting sections -->
  <g class="arrow" data-narration="Arrow showing data flow from privacy fundamentals through cloud architecture to regulatory compliance">
    <path d="M135 105 L140 105" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <path d="M135 105 L143 105" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M230 95 L238 95" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M187 115 L187 118" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M187 175 L187 178" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Bottom: Jurisdictional Challenges -->
  <g class="box box4" data-narration="Jurisdictional challenges section showing the complexity of data crossing borders and facing multiple legal frameworks">
    <rect x="10" y="280" width="400" height="55" rx="8" fill="#f8bbd0" opacity="0.9" filter="url(#shadow)"/>
    <text x="210" y="300" text-anchor="middle" class="section-title">Jurisdictional Challenges</text>
    <text x="210" y="318" text-anchor="middle" class="detail-text">Data crosses borders → Multiple legal frameworks → Enforcement complexity</text>
    <text x="210" y="332" text-anchor="middle" class="detail-text">Penalty: Non-compliance fines up to €20M or 4% of global revenue (GDPR)</text>
  </g>
  
  <!-- Legend/Key -->
  <g class="box" data-narration="Key showing the color coding: Green for privacy concepts, Blue for cloud layers, Orange for regulations">
    <rect x="330" y="350" width="80" height="40" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <circle cx="345" cy="365" r="5" fill="#a5d6a7"/>
    <rect x="352" y="362" width="50" height="6" fill="#90caf9" rx="2"/>
    <rect x="352" y="375" width="50" height="6" fill="#ffcc80" rx="2"/>
    <text x="345" y="385" class="detail-text" font-size="8">Privacy</text>
  </g>
</svg>