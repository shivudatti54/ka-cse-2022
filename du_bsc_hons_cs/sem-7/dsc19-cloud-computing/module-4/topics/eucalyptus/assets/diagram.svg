<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="eucalyptus">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="storageGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342"/>
      <stop offset="100%" style="stop-color:#558b2f"/>
    </linearGradient>
    <linearGradient id="clusterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9c27b0"/>
      <stop offset="100%" style="stop-color:#6a1b9a"/>
    </linearGradient>
    <linearGradient id="hyperGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#607d8b"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideRight {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .box-1 { animation-delay: 0.2s; }
    .box-2 { animation-delay: 0.4s; }
    .box-3 { animation-delay: 0.6s; }
    .box-4 { animation-delay: 0.8s; }
    .box-5 { animation-delay: 1.0s; }
    .box-6 { animation-delay: 1.2s; }
    .arrow { animation: fadeIn 0.5s ease-out 1.5s forwards; opacity: 0; }
    .connector { animation: pulse 2s infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 22px; font-weight: bold; fill: #1a3a47; }
    .label { font-size: 14px; fill: white; font-weight: bold; }
    .detail { font-size: 11px; fill: rgba(255,255,255,0.9); }
    .section-label { font-size: 10px; fill: #555; font-weight: bold; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" class="title title-text">Eucalyptus Architecture</text>
  <text x="210" y="48" text-anchor="middle" font-size="12" fill="#4a6572">Open-Source Private Cloud Platform</text>
  
  <!-- Cloud Controller (CLC) - Top -->
  <g class="box box-1" filter="url(#shadow)">
    <rect x="140" y="65" width="140" height="55" rx="8" fill="url(#boxGradient)"/>
    <text x="210" y="88" text-anchor="middle" class="label">Cloud Controller</text>
    <text x="210" y="105" text-anchor="middle" class="detail">(CLC) - Entry Point</text>
  </g>
  <text x="80" y="92" class="section-label" data-narration="The Cloud Controller is the top-level component that provides the web services interface and manages the entire cloud.">TOP</text>
  
  <!-- Walrus - Storage (Right side) -->
  <g class="box box-2" filter="url(#shadow)">
    <rect x="300" y="65" width="100" height="55" rx="8" fill="url(#storageGradient)"/>
    <text x="350" y="88" text-anchor="middle" class="label">Walrus</text>
    <text x="350" y="105" text-anchor="middle" class="detail">S3-Compatible</text>
  </g>
  
  <!-- Arrow from CLC to Walrus -->
  <path d="M280 92 L295 92" stroke="#666" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Cluster Controller (CC) - Middle -->
  <g class="box box-3" filter="url(#shadow)">
    <rect x="140" y="150" width="140" height="55" rx="8" fill="url(#clusterGradient)"/>
    <text x="210" y="173" text-anchor="middle" class="label">Cluster Controller</text>
    <text x="210" y="190" text-anchor="middle" class="detail">(CC) - Multiple Instances</text>
  </g>
  <text x="40" y="178" class="section-label" data-narration="The Cluster Controller sits between the CLC and Node Controllers, managing resources and scheduling VM instances.">MIDDLE</text>
  
  <!-- Arrow from CLC to CC -->
  <path d="M210 120 L210 145" stroke="#666" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="210,145 205,138 215,138" fill="#666" class="arrow"/>
  
  <!-- Storage Controller (SC) - Below CC -->
  <g class="box box-4" filter="url(#shadow)">
    <rect x="300" y="150" width="100" height="55" rx="8" fill="url(#storageGradient)"/>
    <text x="350" y="173" text-anchor="middle" class="label">Storage Ctrl</text>
    <text x="350" y="190" text-anchor="middle" class="detail">Block Storage</text>
  </g>
  
  <!-- Arrow from CC to SC -->
  <path d="M280 177 L295 177" stroke="#666" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="295,177 288,172 288,182" fill="#666" class="arrow"/>
  
  <!-- Node Controller (NC) - Bottom -->
  <g class="box box-5" filter="url(#shadow)">
    <rect x="140" y="235" width="140" height="55" rx="8" fill="url(#nodeGradient)"/>
    <text x="210" y="258" text-anchor="middle" class="label">Node Controller</text>
    <text x="210" y="275" text-anchor="middle" class="detail">(NC) - Per Cluster</text>
  </g>
  <text x="50" y="263" class="section-label" data-narration="The Node Controller runs on each compute node, managing virtual machines and hypervisors.">BOTTOM</text>
  
  <!-- Arrow from CC to NC -->
  <path d="M210 205 L210 230" stroke="#666" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="210,230 205,223 215,223" fill="#666" class="arrow"/>
  
  <!-- Hypervisors - Bottom layer -->
  <g class="box box-6" filter="url(#shadow)">
    <rect x="140" y="310" width="140" height="55" rx="8" fill="url(#hyperGradient)"/>
    <text x="210" y="333" text-anchor="middle" class="label">Hypervisors</text>
    <text x="210" y="350" text-anchor="middle" class="detail">KVM | Xen | VMware</text>
  </g>
  <text x="55" y="338" class="section-label" data-narration="Eucalyptus supports multiple hypervisors including KVM, Xen, and VMware for virtualization.">VIRTUALIZATION</text>
  
  <!-- Arrow from NC to Hypervisors -->
  <path d="M210 290 L210 305" stroke="#666" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="210,305 205,298 215,298" fill="#666" class="arrow"/>
  
  <!-- Connection lines showing relationships -->
  <path d="M160 235 L160 310" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4,2" fill="none" opacity="0.5"/>
  <path d="M260 235 L260 310" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4,2" fill="none" opacity="0.5"/>
  
  <!-- Key Concept Box -->
  <rect x="10" y="350" width="120" height="40" rx="5" fill="rgba(74,144,164,0.15)" stroke="#4a90a4" stroke-width="1"/>
  <text x="20" y="368" font-size="10" fill="#2d5a6b" font-weight="bold">AWS Compatible API</text>
  <text x="20" y="382" font-size="9" fill="#4a6572">Seamless migration</text>
  
  <!-- Narration indicator -->
  <circle cx="405" cy="390" r="8" fill="#4a90a4" class="connector"/>
  <text x="405" y="393" text-anchor="middle" font-size="10" fill="white" font-weight="bold">i</text>
</svg>