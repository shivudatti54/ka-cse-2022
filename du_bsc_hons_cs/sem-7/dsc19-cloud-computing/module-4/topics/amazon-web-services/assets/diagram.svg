<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="amazon-web-services">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fef6e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcefe8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="globalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB84D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="regionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8C4FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A77BF3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="azGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1C9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4DC3E8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DD344C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E86A7F;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #232F3E; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    .label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .global-box { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .region-box { animation: slideInDown 0.6s ease-out 0.3s forwards; opacity: 0; }
    .az-box { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .edge-box { animation: fadeIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-anim { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="AWS Global Infrastructure - The hierarchical cloud architecture">AWS Global Infrastructure</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Global Level Box -->
  <g class="global-box" data-narration="Global Level - Includes Edge Locations for CDN and DNS services like Route 53 and CloudFront">
    <rect x="20" y="50" width="120" height="60" fill="url(#globalGrad)" class="box" filter="url(#shadow)"/>
    <text x="80" y="72" text-anchor="middle" class="section-title">GLOBAL LEVEL</text>
    <text x="80" y="90" text-anchor="middle" class="detail" fill="white">Edge Locations</text>
    <text x="80" y="102" text-anchor="middle" class="detail" fill="white">Route 53 • CloudFront</text>
  </g>
  
  <!-- Arrow from Global to Region -->
  <path d="M140 80 L200 80" class="arrow arrow-anim"/>
  
  <!-- Regions Box -->
  <g class="region-box" data-narration="Regions - 33 geographic areas worldwide where AWS operates data centers">
    <rect x="200" y="50" width="200" height="60" fill="url(#regionGrad)" class="box" filter="url(#shadow)"/>
    <text x="300" y="72" text-anchor="middle" class="section-title">REGIONS</text>
    <text x="300" y="90" text-anchor="middle" class="detail" fill="white">33 Regions Globally</text>
    <text x="300" y="102" text-anchor="middle" class="detail" fill="white">e.g., ap-south-1 (Mumbai)</text>
  </g>
  
  <!-- Arrow from Region to AZ -->
  <path d="M300 110 L300 145" class="arrow arrow-anim"/>
  
  <!-- Availability Zones Box -->
  <g class="az-box" data-narration="Availability Zones - 3+ isolated data centers per region for high availability">
    <rect x="150" y="145" width="300" height="70" fill="url(#azGrad)" class="box" filter="url(#shadow)"/>
    <text x="300" y="165" text-anchor="middle" class="section-title">AVAILABILITY ZONES (AZs)</text>
    <text x="230" y="190" text-anchor="middle" class="detail" fill="white">AZ-1</text>
    <text x="300" y="190" text-anchor="middle" class="detail" fill="white">AZ-2</text>
    <text x="370" y="190" text-anchor="middle" class="detail" fill="white">AZ-3</text>
    <text x="300" y="207" text-anchor="middle" class="detail" fill="white">3+ independent data centers per region</text>
  </g>
  
  <!-- Arrows from AZs to Edge Locations -->
  <path d="M230 215 L180 260" class="arrow arrow-anim" style="stroke-dasharray: 4;"/>
  <path d="M300 215 L300 260" class="arrow arrow-anim" style="stroke-dasharray: 4;"/>
  <path d="M370 215 L420 260" class="arrow arrow-anim" style="stroke-dasharray: 4;"/>
  
  <!-- Edge Locations -->
  <g class="edge-box" data-narration="Edge Locations - 400+ worldwide points for content delivery and lower latency">
    <rect x="30" y="260" width="100" height="55" fill="url(#edgeGrad)" class="box" filter="url(#shadow)"/>
    <text x="80" y="282" text-anchor="middle" class="section-title">EDGE</text>
    <text x="80" y="298" text-anchor="middle" class="detail" fill="white">Locations</text>
    <text x="80" y="310" text-anchor="middle" class="detail" fill="white">400+ Global</text>
  </g>
  
  <g class="edge-box" data-narration="Edge Locations deliver content closer to users for faster access">
    <rect x="250" y="260" width="100" height="55" fill="url(#edgeGrad)" class="box" filter="url(#shadow)"/>
    <text x="300" y="282" text-anchor="middle" class="section-title">CDN</text>
    <text x="300" y="298" text-anchor="middle" class="detail" fill="white">CloudFront</text>
    <text x="300" y="310" text-anchor="middle" class="detail" fill="white">Cache &amp; Deliver</text>
  </g>
  
  <g class="edge-box" data-narration="DNS service Route 53 routes users to the nearest infrastructure">
    <rect x="370" y="260" width="40" height="55" fill="url(#edgeGrad)" class="box pulse-element" filter="url(#shadow)" style="transform-origin: 390px 287px;"/>
    <text x="390" y="285" text-anchor="middle" class="section-title">53</text>
    <text x="390" y="305" text-anchor="middle" class="detail" fill="white">DNS</text>
  </g>
  
  <!-- Key Facts Box -->
  <g class="region-box" data-narration="Key AWS Infrastructure Facts - Understanding this hierarchy is essential for designing resilient cloud architectures">
    <rect x="20" y="330" width="380" height="55" rx="8" ry="8" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="35" y="350" class="label">Key Facts:</text>
    <text x="35" y="368" class="detail">• Regions: Geographic data center clusters</text>
    <text x="220" y="368" class="detail">• AZs: Isolated within same region</text>
    <text x="35" y="380" class="detail">• Edge: Low-latency content delivery</text>
  </g>
</svg>