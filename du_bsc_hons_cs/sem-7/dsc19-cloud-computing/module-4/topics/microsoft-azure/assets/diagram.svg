<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="microsoft-azure">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="50%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="tenantGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#005a9e"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00a1df"/>
      <stop offset="100%" style="stop-color:#0078d4"/>
    </linearGradient>
    <linearGradient id="rgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50e6ff"/>
      <stop offset="100%" style="stop-color:#00a1df"/>
    </linearGradient>
    <linearGradient id="resGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81d4fa"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: slideInDown 0.8s ease-out; }
    .tenant-box { animation: fadeIn 0.6s ease-out 0.2s both; }
    .sub-box { animation: fadeIn 0.6s ease-out 0.4s both; }
    .rg-box { animation: fadeIn 0.6s ease-out 0.6s both; }
    .res-box { animation: fadeIn 0.6s ease-out 0.8s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .pulse-anim { animation: pulse 3s infinite; }
    text { font-family: Arial, sans-serif; }
    .label { font-size: 14px; font-weight: bold; }
    .detail { font-size: 11px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" style="font-size:20px; font-weight:bold; fill:#0078d4;">
    Microsoft Azure
  </text>
  <text x="210" y="50" text-anchor="middle" style="font-size:12px; fill:#555;">
    Hierarchy Structure
  </text>
  
  <!-- Tenant Level -->
  <g class="tenant-box" data-narration="Tenant: The top-level organization in Azure AD. Represents your organization and owns all subscriptions.">
    <rect x="120" y="65" width="180" height="55" rx="8" fill="url(#tenantGrad)" class="pulse-anim"/>
    <text x="210" y="85" text-anchor="middle" fill="white" class="label">TENANT</text>
    <text x="210" y="102" text-anchor="middle" fill="#e3f2fd" class="detail">Organization / Azure AD</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M210 120 L210 140" stroke="#0078d4" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="210,145 205,135 215,135" fill="#0078d4" class="arrow"/>
  
  <!-- Subscription Level -->
  <g class="sub-box" data-narration="Subscriptions: Billing and access management boundaries. Each subscription defines resources and billing.">
    <rect x="90" y="145" width="240" height="55" rx="8" fill="url(#subGrad)" class="pulse-anim"/>
    <text x="210" y="165" text-anchor="middle" fill="white" class="label">SUBSCRIPTION</text>
    <text x="210" y="182" text-anchor="middle" fill="#e3f2fd" class="detail">Billing Boundary / Access Control</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M210 200 L210 220" stroke="#00a1df" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="210,225 205,215 215,215" fill="#00a1df" class="arrow"/>
  
  <!-- Resource Group Level -->
  <g class="rg-box" data-narration="Resource Groups: Logical containers that hold related resources for a project or application.">
    <rect x="60" y="225" width="300" height="55" rx="8" fill="url(#rgGrad)" class="pulse-anim"/>
    <text x="210" y="245" text-anchor="middle" fill="white" class="label">RESOURCE GROUP</text>
    <text x="210" y="262" text-anchor="middle" fill="#01579b" class="detail">Logical Container for Related Resources</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M210 280 L210 300" stroke="#00a1df" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="210,305 205,295 215,295" fill="#00a1df" class="arrow"/>
  
  <!-- Resources Level -->
  <g class="res-box" data-narration="Resources: Actual cloud services like VMs, Storage, Databases, and Apps deployed in Azure.">
    <rect x="30" y="305" width="360" height="55" rx="8" fill="url(#resGrad)" class="pulse-anim"/>
    <text x="210" y="325" text-anchor="middle" fill="#01579b" class="label">RESOURCES</text>
    <text x="210" y="342" text-anchor="middle" fill="#0277bd" class="detail">VMs • Storage • Databases • Web Apps • Networking</text>
  </g>
  
  <!-- Legend / Key Info -->
  <g data-narration="Azure provides 60+ global regions with high availability and disaster recovery options.">
    <rect x="10" y="365" width="400" height="28" rx="5" fill="rgba(255,255,255,0.7)"/>
    <text x="20" y="380" style="font-size:10px; fill:#333;">
      <tspan font-weight="bold">Key:</tspan> Tenant → Subscription → Resource Group → Resources
    </text>
  </g>
  
  <!-- Decorative Azure Logo Symbol -->
  <g transform="translate(375, 15)">
    <polygon points="0,0 8,0 4,7" fill="#0078d4"/>
    <polygon points="8,0 16,0 12,7" fill="#0078d4" opacity="0.7"/>
    <polygon points="4,7 12,7 8,14" fill="#0078d4" opacity="0.5"/>
  </g>
</svg>