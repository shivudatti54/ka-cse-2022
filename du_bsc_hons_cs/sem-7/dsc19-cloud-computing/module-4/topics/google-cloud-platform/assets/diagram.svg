<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="google-cloud-platform">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5ddf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d8f47;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbc04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9a825;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea4335;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d33828;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .subtitle { animation: fadeIn 1s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.4s; }
    .box2 { animation-delay: 0.6s; }
    .box3 { animation-delay: 0.8s; }
    .box4 { animation-delay: 1s; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .icon { animation: pulse 3s ease-in-out infinite; }
    .label-text { font-family: Arial, sans-serif; font-weight: bold; }
    .detail-text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Google Cloud Platform</text>
  <text x="210" y="50" text-anchor="middle" class="subtitle" font-family="Arial, sans-serif" font-size="14" fill="#5d6d7e">Compute Services Comparison</text>
  
  <!-- Cloud Icon at top -->
  <g class="icon" transform="translate(380, 25)">
    <path d="M10 20 Q0 20 0 10 Q0 0 10 0 Q15 0 18 3 Q20 0 25 0 Q35 0 35 10 Q35 20 25 20 Z" fill="#4285f4" opacity="0.8"/>
  </g>
  
  <!-- Main hierarchy box - IaaS -->
  <g class="box box1" data-narration="Compute Engine provides Infrastructure as a Service (IaaS) with full control over virtual machines and manual management capabilities">
    <rect x="20" y="70" width="180" height="85" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="110" y="90" text-anchor="middle" class="label-text" font-size="16" fill="white">Compute Engine</text>
    <text x="110" y="108" text-anchor="middle" class="detail-text" font-size="12" fill="#e8f4fc">IaaS</text>
    <text x="110" y="125" text-anchor="middle" class="detail-text" font-size="11" fill="#d4e8f7">Full control • Manual management</text>
  </g>
  
  <!-- Arrow down from IaaS -->
  <path class="arrow" d="M110 155 L110 175" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Middle level - PaaS -->
  <g class="box box2" data-narration="App Engine offers Platform as a Service (PaaS) with automatic management of infrastructure, allowing developers to focus on code">
    <rect x="20" y="180" width="180" height="85" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="110" y="200" text-anchor="middle" class="label-text" font-size="16" fill="white">App Engine</text>
    <text x="110" y="218" text-anchor="middle" class="detail-text" font-size="12" fill="#e8f4fc">PaaS</text>
    <text x="110" y="235" text-anchor="middle" class="detail-text" font-size="11" fill="#d4e8f7">Auto management • Developer focus</text>
  </g>
  
  <!-- Arrow split to FaaS and GKE -->
  <path class="arrow" d="M110 265 L110 280 L60 295" stroke="#666" stroke-width="2" fill="none"/>
  <path class="arrow" d="M110 280 L160 295" stroke="#666" stroke-width="2" fill="none"/>
  
  <!-- Left branch - Cloud Functions FaaS -->
  <g class="box box3" data-narration="Cloud Functions provides Function as a Service (FaaS) for serverless, event-driven computing with automatic scaling">
    <rect x="20" y="300" width="85" height="80" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="62" y="320" text-anchor="middle" class="label-text" font-size="13" fill="#5d4037">Cloud</text>
    <text x="62" y="335" text-anchor="middle" class="label-text" font-size="13" fill="#5d4037">Functions</text>
    <text x="62" y="350" text-anchor="middle" class="detail-text" font-size="10" fill="#5d4037">FaaS</text>
    <text x="62" y="365" text-anchor="middle" class="detail-text" font-size="9" fill="#5d4037">Serverless</text>
  </g>
  
  <!-- Right branch - GKE -->
  <g class="box box4" data-narration="Google Kubernetes Engine (GKE) provides container orchestration for managing containerized applications at scale">
    <rect x="115" y="300" width="85" height="80" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="158" y="320" text-anchor="middle" class="label-text" font-size="12" fill="white">GKE</text>
    <text x="158" y="335" text-anchor="middle" class="detail-text" font-size="10" fill="#ffcdd2">Kubernetes</text>
    <text x="158" y="350" text-anchor="middle" class="detail-text" font-size="10" fill="#ffcdd2">Container</text>
    <text x="158" y="365" text-anchor="middle" class="detail-text" font-size="9" fill="#ffcdd2">Orchestration</text>
  </g>
  
  <!-- Right side - Legend/Info box -->
  <g class="box" data-narration="The diagram shows the evolution from Infrastructure control to fully managed serverless computing">
    <rect x="215" y="70" width="190" height="310" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)" opacity="0.9"/>
    <text x="310" y="90" text-anchor="middle" class="label-text" font-size="14" fill="#2c3e50">Key Insights</text>
    
    <!-- Insight items -->
    <circle cx="230" cy="115" r="4" fill="#4a90d9"/>
    <text x="240" y="119" class="detail-text" font-size="11" fill="#2c3e50">IaaS: Maximum control</text>
    
    <circle cx="230" cy="140" r="4" fill="#34a853"/>
    <text x="240" y="144" class="detail-text" font-size="11" fill="#2c3e50">PaaS: Balanced approach</text>
    
    <circle cx="230" cy="165" r="4" fill="#fbbc04"/>
    <text x="240" y="169" class="detail-text" font-size="11" fill="#2c3e50">FaaS: Zero infrastructure</text>
    
    <circle cx="230" cy="190" r="4" fill="#ea4335"/>
    <text x="240" y="194" class="detail-text" font-size="11" fill="#2c3e50">Containers: Portable</text>
    
    <!-- Divider -->
    <line x1="225" y1="215" x2="395" y2="215" stroke="#ecf0f1" stroke-width="1"/>
    
    <!-- Benefits -->
    <text x="230" y="235" class="label-text" font-size="12" fill="#2c3e50">Benefits:</text>
    <text x="230" y="252" class="detail-text" font-size="10" fill="#5d6d7e">• Global infrastructure</text>
    <text x="230" y="267" class="detail-text" font-size="10" fill="#5d6d7e">• 100+ cloud services</text>
    <text x="230" y="282" class="detail-text" font-size="10" fill="#5d6d7e">• Low latency &amp; high availability</text>
    <text x="230" y="297" class="detail-text" font-size="10" fill="#5d6d7e">• Scalability &amp; cost-efficiency</text>
    
    <!-- Divider -->
    <line x1="225" y1="315" x2="395" y2="315" stroke="#ecf0f1" stroke-width="1"/>
    
    <!-- Launch info -->
    <text x="230" y="335" class="detail-text" font-size="10" fill="#5d6d7e">Launched: 2008</text>
    <text x="310" y="355" class="detail-text" font-size="10" fill="#5d6d7e">Regions: Multiple global</text>
    <text x="310" y="370" class="detail-text" font-size="10" fill="#5d6d7e">Zones: Independent data centers</text>
  </g>
  
  <!-- Decorative cloud shapes -->
  <g opacity="0.3">
    <ellipse cx="50" cy="380" rx="30" ry="12" fill="#4285f4"/>
    <ellipse cx="380" cy="370" rx="25" ry="10" fill="#34a853"/>
  </g>
</svg>