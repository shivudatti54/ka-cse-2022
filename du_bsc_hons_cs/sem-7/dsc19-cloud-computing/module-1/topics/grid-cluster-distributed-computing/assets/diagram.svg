<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="grid-cluster-distributed-computing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clusterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#98d8aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bc08a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="distGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c6d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5a3b8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .grid-anim { animation: slideInLeft 0.8s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .cluster-anim { animation: slideInRight 0.8s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .dist-anim { animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; animation-delay: 1s; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .node { transition: all 0.3s ease; }
    .node:hover { filter: brightness(1.1); }
    .arrow { stroke-dasharray: 5,5; animation: dash 20s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -100; } }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle" class="title-anim">Grid vs Cluster Computing</text>
  <text x="210" y="50" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" text-anchor="middle" class="title-anim">Distributed Computing Paradigms</text>
  
  <!-- Grid Computing Section -->
  <g class="grid-anim" data-narration="Grid Computing: Heterogeneous resources across multiple organizations connected via middleware">
    <rect x="15" y="70" width="180" height="150" rx="10" fill="url(#gridGradient)" filter="url(#shadow)" />
    <text x="105" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">GRID COMPUTING</text>
    
    <!-- Grid nodes (heterogeneous) -->
    <rect x="30" y="105" width="40" height="35" rx="5" fill="#fff" class="float-anim" style="animation-delay: 0.3s" />
    <text x="50" y="125" font-family="Arial, sans-serif" font-size="9" fill="#5ba3c6" text-anchor="middle">Server</text>
    
    <rect x="85" y="105" width="40" height="35" rx="5" fill="#fff" class="float-anim" style="animation-delay: 0.5s" />
    <text x="105" y="125" font-family="Arial, sans-serif" font-size="9" fill="#5ba3c6" text-anchor="middle">PC</text>
    
    <rect x="140" y="105" width="40" height="35" rx="5" fill="#fff" class="float-anim" style="animation-delay: 0.7s" />
    <text x="160" y="125" font-family="Arial, sans-serif" font-size="9" fill="#5ba3c6" text-anchor="middle">Laptop</text>
    
    <!-- Grid characteristics -->
    <text x="105" y="155" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Multiple Organizations</text>
    <text x="105" y="170" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Heterogeneous Resources</text>
    <text x="105" y="185" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Geographic Distribution</text>
    <text x="105" y="200" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Multiple Admin Domains</text>
    
    <!-- Middleware layer -->
    <rect x="50" y="208" width="110" height="20" rx="4" fill="#4a9fc4" />
    <text x="105" y="222" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle">Middleware</text>
  </g>
  
  <!-- Cluster Computing Section -->
  <g class="cluster-anim" data-narration="Cluster Computing: Homogeneous nodes in a single organization with local network">
    <rect x="225" y="70" width="180" height="150" rx="10" fill="url(#clusterGradient)" filter="url(#shadow)" />
    <text x="315" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">CLUSTER COMPUTING</text>
    
    <!-- Cluster nodes (homogeneous) -->
    <rect x="240" y="105" width="35" height="35" rx="5" fill="#fff" class="float-anim" style="animation-delay: 0.4s" />
    <rect x="280" y="105" width="35" height="35" rx="5" fill="#fff" class="float-anim" style="animation-delay: 0.6s" />
    <rect x="320" y="105" width="35" height="35" rx="5" fill="#fff" class="float-anim" style="animation-delay: 0.8s" />
    <rect x="360" y="105" width="35" height="35" rx="5" fill="#fff" class="float-anim" style="animation-delay: 1s" />
    
    <text x="257" y="125" font-family="Arial, sans-serif" font-size="8" fill="#6bc08a" text-anchor="middle">Node</text>
    <text x="297" y="125" font-family="Arial, sans-serif" font-size="8" fill="#6bc08a" text-anchor="middle">Node</text>
    <text x="337" y="125" font-family="Arial, sans-serif" font-size="8" fill="#6bc08a" text-anchor="middle">Node</text>
    <text x="377" y="125" font-family="Arial, sans-serif" font-size="8" fill="#6bc08a" text-anchor="middle">Node</text>
    
    <!-- Cluster characteristics -->
    <text x="315" y="160" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Single Organization</text>
    <text x="315" y="175" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Homogeneous Nodes</text>
    <text x="315" y="190" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Local Network</text>
    <text x="315" y="205" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Single Admin Domain</text>
    
    <!-- Management layer -->
    <rect x="260" y="208" width="110" height="20" rx="4" fill="#52a877" />
    <text x="315" y="222" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle">Unified Management</text>
  </g>
  
  <!-- Distributed Computing Section (bottom) -->
  <g class="dist-anim" data-narration="Distributed Computing: Broad paradigm where autonomous computers coordinate over network">
    <rect x="80" y="245" width="260" height="60" rx="10" fill="url(#distGradient)" filter="url(#shadow)" />
    <text x="210" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">DISTRIBUTED COMPUTING</text>
    
    <!-- Network connections -->
    <circle cx="120" cy="290" r="8" fill="#fff" class="pulse-anim" />
    <circle cx="210" cy="290" r="8" fill="#fff" class="pulse-anim" style="animation-delay: 0.3s" />
    <circle cx="300" cy="290" r="8" fill="#fff" class="pulse-anim" style="animation-delay: 0.6s" />
    
    <!-- Network lines -->
    <line x1="128" y1="290" x2="202" y2="290" stroke="#fff" stroke-width="2" class="arrow" />
    <line x1="218" y1="290" x2="292" y2="290" stroke="#fff" stroke-width="2" class="arrow" />
    
    <text x="120" y="308" font-family="Arial, sans-serif" font-size="9" fill="#e5a3b8" text-anchor="middle">Scalability</text>
    <text x="210" y="308" font-family="Arial, sans-serif" font-size="9" fill="#e5a3b8" text-anchor="middle">Fault Tolerance</text>
    <text x="300" y="308" font-family="Arial, sans-serif" font-size="9" fill="#e5a3b8" text-anchor="middle">Transparency</text>
  </g>
  
  <!-- Key Differences Box -->
  <g class="dist-anim" data-narration="Key differences summary: Grid spans organizations, Cluster is localized and homogeneous">
    <rect x="15" y="320" width="390" height="70" rx="8" fill="#fff" stroke="#b8c5d0" stroke-width="1" filter="url(#shadow)" />
    <text x="210" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">KEY DIFFERENCES</text>
    
    <text x="30" y="360" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">
      <tspan font-weight="bold">GRID:</tspan> Multi-org, heterogeneous, wide-area
    </text>
    <text x="30" y="378" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">
      <tspan font-weight="bold">CLUSTER:</tspan> Single-org, homogeneous, local network
    </text>
    <text x="230" y="360" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">
      <tspan font-weight="bold">DISTRIBUTED:</tspan> Autonomous nodes, network coordination
    </text>
    <text x="230" y="378" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">
      <tspan font-weight="bold">COMMON:</tspan> Resource aggregation, parallel processing
    </text>
  </g>
  
  <!-- Connecting arrows between sections -->
  <g class="dist-anim">
    <path d="M 105 235 Q 105 250 160 250 Q 210 250 210 245" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,2" />
    <path d="M 315 235 Q 315 250 260 250 Q 210 250 210 245" fill="none" stroke="#98d8aa" stroke-width="2" stroke-dasharray="4,2" />
  </g>
</svg>