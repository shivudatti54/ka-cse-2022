<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="utility-computing-cloud-computing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#666" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideUp 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideInRight 0.8s ease-out 0.6s both; }
    .layer { animation: slideUp 0.6s ease-out both; }
    .layer-1 { animation-delay: 0.3s; }
    .layer-2 { animation-delay: 0.5s; }
    .layer-3 { animation-delay: 0.7s; }
    .layer-4 { animation-delay: 0.9s; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Utility Computing &amp;</text>
  <text x="210" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Cloud Computing</text>
  
  <!-- Subtitle -->
  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e" class="title">Cloud Service Models Stack</text>
  
  <!-- Hardware Layer -->
  <g class="layer layer-1" data-narration="Physical infrastructure layer: servers, storage, and networking hardware managed by the cloud provider">
    <rect x="40" y="90" width="140" height="28" rx="4" fill="#7f8c8d" filter="url(#shadow)"/>
    <text x="110" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Hardware</text>
    <text x="185" y="109" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Provider Manages</text>
  </g>
  
  <!-- Virtualization Layer -->
  <g class="layer layer-2" data-narration="Virtualization layer creates virtual machines and abstracts physical resources">
    <rect x="40" y="122" width="140" height="28" rx="4" fill="url(#layerGradient1)" filter="url(#shadow)"/>
    <text x="110" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">Virtualization</text>
    <text x="185" y="141" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Provider Manages</text>
  </g>
  
  <!-- IaaS Layer -->
  <g class="layer layer-3" data-narration="Infrastructure as a Service: Provider manages hardware and virtualization; User manages OS, applications, and data">
    <rect x="40" y="154" width="340" height="40" rx="4" fill="url(#layerGradient2)" filter="url(#shadow)" stroke="#16a085" stroke-width="1.5"/>
    <text x="60" y="173" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a085">IaaS</text>
    <text x="60" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Infrastructure as a Service</text>
    <text x="210" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">Provider: Hardware + Virtualization</text>
    <text x="210" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">User: OS, Apps, Data</text>
    <text x="350" y="179" text-anchor="end" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a085">▼</text>
  </g>
  
  <!-- PaaS Layer -->
  <g class="layer layer-4" data-narration="Platform as a Service: Provider manages up to OS layer; User manages applications and data">
    <rect x="40" y="198" width="340" height="40" rx="4" fill="url(#layerGradient3)" filter="url(#shadow)" stroke="#8e44ad" stroke-width="1.5"/>
    <text x="60" y="217" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8e44ad">PaaS</text>
    <text x="60" y="232" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Platform as a Service</text>
    <text x="210" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">Provider: Hardware + Virt + OS</text>
    <text x="210" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">User: Apps + Data</text>
    <text x="350" y="223" text-anchor="end" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#8e44ad">▼</text>
  </g>
  
  <!-- SaaS Layer -->
  <g class="layer layer-1" data-narration="Software as a Service: Provider manages everything; User only accesses the application">
    <rect x="40" y="242" width="340" height="40" rx="4" fill="url(#layerGradient4)" filter="url(#shadow)" stroke="#2980b9" stroke-width="1.5"/>
    <text x="60" y="261" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2980b9">SaaS</text>
    <text x="60" y="276" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Software as a Service</text>
    <text x="210" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">Provider: Everything</text>
    <text x="210" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">User: Access App Only</text>
    <text x="350" y="267" text-anchor="end" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2980b9">✓</text>
  </g>
  
  <!-- Responsibility Arrow -->
  <g class="section-1" data-narration="User responsibility increases from bottom to top - key concept for understanding cloud service models">
    <text x="395" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c" font-weight="bold">User</text>
    <text x="395" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c" font-weight="bold">Responsibility</text>
    <text x="395" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c" font-weight="bold">↑</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-2" data-narration="Key utility computing concepts: on-demand resources, pay-as-you-go pricing, rapid scalability">
    <rect x="40" y="330" width="170" height="60" rx="5" fill="white" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="50" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    <text x="50" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#34495e">• On-demand resources</text>
    <text x="50" y="374" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#34495e">• Pay-as-you-go pricing</text>
    <text x="50" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#34495e">• Rapid scalability</text>
  </g>
  
  <!-- Evolution Box -->
  <g class="section-3" data-narration="Cloud computing is the modern evolution of utility computing principles">
    <rect x="220" y="330" width="160" height="60" rx="5" fill="white" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="230" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Cloud Evolution</text>
    <text x="230" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Utility Computing (1960s)</text>
    <text x="230" y="374" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#34495e">↓ Modernization</text>
    <text x="230" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Cloud Computing (2000s)</text>
  </g>
  
  <!-- Decorative Cloud Icon -->
  <g class="pulse-anim" transform="translate(340, 40)">
    <ellipse cx="20" cy="20" rx="18" ry="12" fill="#3498db" opacity="0.7"/>
    <ellipse cx="10" cy="18" rx="10" ry="8" fill="#3498db" opacity="0.7"/>
    <ellipse cx="30" cy="18" rx="10" ry="8" fill="#3498db" opacity="0.7"/>
    <ellipse cx="20" cy="25" rx="20" ry="10" fill="#3498db" opacity="0.7"/>
  </g>
  
  <!-- Arrow indicators -->
  <g class="section-2">
    <polygon points="210,90 210,115 205,110 215,110" fill="#7f8c8d"/>
  </g>
  <g class="section-3">
    <polygon points="210,122 210,148 205,143 215,143" fill="#e74c3c"/>
  </g>
</svg>