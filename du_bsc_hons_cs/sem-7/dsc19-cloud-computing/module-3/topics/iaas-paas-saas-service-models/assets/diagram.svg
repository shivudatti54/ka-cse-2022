<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="iaas-paas-saas-service-models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff3e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iaasGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paasGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="saasGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .box-iaas { animation: fadeIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-paas { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box-saas { animation: fadeIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .provider-label { animation: pulse 3s ease-in-out infinite; }
    .user-label { animation: pulse 3s ease-in-out infinite; animation-delay: 1.5s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565c0" class="title">Cloud Service Models</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555">IaaS • PaaS • SaaS</text>
  
  <!-- SaaS Box (Top) -->
  <g class="box-saas" data-narration="SaaS: Software as a Service - Full managed applications accessible via browser">
    <rect x="60" y="70" width="300" height="70" rx="8" fill="url(#saasGrad)" filter="url(#shadow)"/>
    <text x="210" y="92" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#e65100">SaaS</text>
    <text x="210" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Software as a Service</text>
    <rect x="70" y="118" width="90" height="16" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="115" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Applications</text>
    <rect x="165" y="118" width="90" height="16" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="210" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Data</text>
    <rect x="260" y="118" width="90" height="16" rx="3" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
    <text x="305" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Runtime</text>
  </g>
  
  <!-- Arrow Down -->
  <g class="arrow" data-narration="Arrow showing increasing abstraction from IaaS to SaaS">
    <polygon points="210,145 200,155 220,155" fill="#78909c"/>
    <rect x="202" y="145" width="16" height="15" fill="#78909c"/>
  </g>
  
  <!-- PaaS Box (Middle) -->
  <g class="box-paas" data-narration="PaaS: Platform as a Service - User manages apps and data, provider handles runtime and below">
    <rect x="60" y="165" width="300" height="85" rx="8" fill="url(#paasGrad)" filter="url(#shadow)"/>
    <text x="210" y="187" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2e7d32">PaaS</text>
    <text x="210" y="203" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Platform as a Service</text>
    <rect x="70" y="213" width="70" height="14" rx="3" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
    <text x="105" y="223" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Runtime</text>
    <rect x="145" y="213" width="70" height="14" rx="3" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
    <text x="180" y="223" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Data</text>
    <rect x="220" y="213" width="70" height="14" rx="3" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
    <text x="255" y="223" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Apps</text>
    <rect x="295" y="213" width="55" height="14" rx="3" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
    <text x="322" y="223" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">OS</text>
    <rect x="70" y="232" width="280" height="12" rx="3" fill="#81c784"/>
    <text x="210" y="241" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20" font-weight="bold">Provided by Cloud</text>
  </g>
  
  <!-- Arrow Down -->
  <g class="arrow" data-narration="Arrow showing increasing abstraction">
    <polygon points="210,255 200,265 220,265" fill="#78909c"/>
    <rect x="202" y="265" width="16" height="15" fill="#78909c"/>
  </g>
  
  <!-- IaaS Box (Bottom) -->
  <g class="box-iaas" data-narration="IaaS: Infrastructure as a Service - User manages OS, runtime, data, apps; provider handles physical infrastructure">
    <rect x="60" y="285" width="300" height="95" rx="8" fill="url(#iaasGrad)" filter="url(#shadow)"/>
    <text x="210" y="307" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">IaaS</text>
    <text x="210" y="323" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Infrastructure as a Service</text>
    <rect x="70" y="333" width="55" height="12" rx="3" fill="#90caf9" stroke="#1976d2" stroke-width="1"/>
    <text x="97" y="342" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Apps</text>
    <rect x="130" y="333" width="55" height="12" rx="3" fill="#90caf9" stroke="#1976d2" stroke-width="1"/>
    <text x="157" y="342" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Data</text>
    <rect x="190" y="333" width="55" height="12" rx="3" fill="#90caf9" stroke="#1976d2" stroke-width="1"/>
    <text x="217" y="342" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Runtime</text>
    <rect x="250" y="333" width="55" height="12" rx="3" fill="#90caf9" stroke="#1976d2" stroke-width="1"/>
    <text x="277" y="342" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">OS</text>
    <rect x="310" y="333" width="40" height="12" rx="3" fill="#90caf9" stroke="#1976d2" stroke-width="1"/>
    <text x="330" y="342" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">VM</text>
    <rect x="70" y="350" width="280" height="20" rx="3" fill="#64b5f6"/>
    <text x="210" y="363" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1" font-weight="bold">Provided by Cloud Provider</text>
    <text x="210" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">(Servers, Storage, Networking)</text>
  </g>
  
  <!-- Provider vs User Control Labels -->
  <g data-narration="Control spectrum: User has most control in IaaS, least in SaaS">
    <text x="35" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#666" class="user-label">User</text>
    <text x="35" y="347" text-anchor="middle" font-family="Arial" font-size="9" fill="#666" class="user-label">Controls</text>
    <text x="385" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#666" class="provider-label">Cloud</text>
    <text x="385" y="347" text-anchor="middle" font-family="Arial" font-size="9" fill="#666" class="provider-label">Provider</text>
  </g>
  
  <!-- Key Examples -->
  <g data-narration="Common examples: AWS/Azure/GCP for IaaS, Heroku/Cloud Foundry for PaaS, Gmail/Office 365 for SaaS">
    <rect x="280" y="60" width="70" height="40" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="315" y="72" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Examples:</text>
    <text x="315" y="84" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">SaaS: Gmail</text>
    <text x="315" y="94" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">PaaS: Heroku</text>
  </g>
</svg>