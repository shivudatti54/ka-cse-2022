<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="public-private-hybrid-community-cloud">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5e6f4"/>
    </linearGradient>
    <linearGradient id="publicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8ec5e8"/>
    </linearGradient>
    <linearGradient id="privateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
    <linearGradient id="hybridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ba68c8"/>
    </linearGradient>
    <linearGradient id="communityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffb74d"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .box-public { animation: fadeIn 0.6s ease-out forwards; }
    .box-private { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-hybrid { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-community { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .arrow-line { animation: slideInLeft 0.5s ease-out 0.8s forwards; opacity: 0; }
    .title-anim { animation: slideInUp 0.5s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Cloud Deployment Models</text>
  
  <!-- Public Cloud Box -->
  <g class="box-public" data-narration="Public Cloud: Shared resources available to all organizations over the internet">
    <rect x="20" y="50" width="90" height="85" rx="8" fill="url(#publicGrad)" stroke="#5a9fd4" stroke-width="2"/>
    <text x="65" y="70" text-anchor="middle" class="label">Public</text>
    <text x="65" y="88" text-anchor="middle" class="label">Cloud</text>
    <text x="65" y="108" text-anchor="middle" class="detail">Multi-tenant</text>
    <text x="65" y="122" text-anchor="middle" class="detail">Pay-as-you-go</text>
  </g>
  
  <!-- Private Cloud Box -->
  <g class="box-private" data-narration="Private Cloud: Dedicated infrastructure for single organization">
    <rect x="220" y="50" width="90" height="85" rx="8" fill="url(#privateGrad)" stroke="#66bb6a" stroke-width="2"/>
    <text x="265" y="70" text-anchor="middle" class="label">Private</text>
    <text x="265" y="88" text-anchor="middle" class="label">Cloud</text>
    <text x="265" y="108" text-anchor="middle" class="detail">Dedicated</text>
    <text x="265" y="122" text-anchor="middle" class="detail">Secure</text>
  </g>
  
  <!-- Arrow from Public to Hybrid -->
  <g class="arrow-line">
    <line x1="110" y1="120" x2="150" y2="120" stroke="#888" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="145,115 150,120 145,125" fill="#888"/>
  </g>
  
  <!-- Arrow from Private to Hybrid -->
  <g class="arrow-line">
    <line x1="220" y1="120" x2="180" y2="120" stroke="#888" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="185,115 180,120 185,125" fill="#888"/>
  </g>
  
  <!-- Hybrid Cloud Box -->
  <g class="box-hybrid" data-narration="Hybrid Cloud: Combines public and private cloud resources">
    <rect x="150" y="145" width="120" height="95" rx="10" fill="url(#hybridGrad)" stroke="#9c27b0" stroke-width="2"/>
    <text x="210" y="168" text-anchor="middle" class="label">Hybrid Cloud</text>
    <text x="210" y="190" text-anchor="middle" class="detail">Public + Private</text>
    <text x="210" y="208" text-anchor="middle" class="detail">Scalable &amp; Secure</text>
    <text x="210" y="226" text-anchor="middle" class="detail">Flexible</text>
  </g>
  
  <!-- Community Cloud Box -->
  <g class="box-community" data-narration="Community Cloud: Shared by organizations with common requirements">
    <rect x="20" y="260" width="120" height="90" rx="8" fill="url(#communityGrad)" stroke="#ff9800" stroke-width="2"/>
    <text x="80" y="285" text-anchor="middle" class="label">Community Cloud</text>
    <text x="80" y="308" text-anchor="middle" class="detail">Shared by</text>
    <text x="80" y="322" text-anchor="middle" class="detail">Common Needs</text>
    <text x="80" y="340" text-anchor="middle" class="detail">e.g. Government</text>
  </g>
  
  <!-- Arrow from Hybrid to Community -->
  <g class="arrow-line">
    <line x1="170" y1="295" x2="140" y2="295" stroke="#888" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="145,290 140,295 145,300" fill="#888"/>
  </g>
  
  <!-- Internet Symbol -->
  <g class="float-anim" transform="translate(330, 280)">
    <circle cx="25" cy="25" r="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="25" y="22" text-anchor="middle" font-size="10" fill="#1976d2">☁</text>
    <text x="25" y="35" text-anchor="middle" font-size="8" fill="#1976d2">Internet</text>
  </g>
  
  <!-- Connecting lines to internet -->
  <g class="arrow-line">
    <line x1="210" y1="240" x2="210" y2="260" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="3"/>
    <line x1="355" y1="280" x2="355" y2="260" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="3"/>
    <line x1="330" y1="303" x2="250" y2="303" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="3"/>
  </g>
  
  <!-- Key Legend -->
  <g class="box-hybrid" transform="translate(220, 260)">
    <rect x="0" y="0" width="90" height="90" rx="6" fill="#fff" stroke="#ccc" stroke-width="1" opacity="0.9"/>
    <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Key Points</text>
    <text x="10" y="38" font-size="9" fill="#555">• Multi-tenant</text>
    <text x="10" y="52" font-size="9" fill="#555">• Dedicated</text>
    <text x="10" y="66" font-size="9" fill="#555">• Combined</text>
    <text x="10" y="80" font-size="9" fill="#555">• Shared Needs</text>
  </g>
  
  <!-- Bottom legend -->
  <g class="pulse-anim">
    <circle cx="30" cy="370" r="5" fill="#8ec5e8"/>
    <text x="42" y="374" font-size="10" fill="#555">Public</text>
    <circle cx="100" cy="370" r="5" fill="#81c784"/>
    <text x="112" y="374" font-size="10" fill="#555">Private</text>
    <circle cx="180" cy="370" r="5" fill="#ba68c8"/>
    <text x="192" y="374" font-size="10" fill="#555">Hybrid</text>
    <circle cx="260" cy="370" r="5" fill="#ffb74d"/>
    <text x="272" y="374" font-size="10" fill="#555">Community</text>
  </g>
</svg>