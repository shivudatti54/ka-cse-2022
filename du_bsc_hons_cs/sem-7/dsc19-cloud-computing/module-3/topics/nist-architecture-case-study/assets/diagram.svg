<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="nist-architecture-case-study">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#7bc49b"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c87a"/>
      <stop offset="100%" style="stop-color:#d4b463"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; }
    .box { animation: slideIn 0.8s ease-out; }
    .pulse-box { animation: pulse 3s infinite; transform-origin: center; }
    .float { animation: float 4s ease-in-out infinite; }
    .arrow { stroke-dasharray: 100; animation: dash 2s linear infinite; }
    @keyframes dash {
      to { stroke-dashoffset: -100; }
    }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c5282" font-family="Arial">NIST Cloud Architecture</text>
  <text x="210" y="50" text-anchor="middle" class="title" font-size="12" fill="#4a5568" font-family="Arial">Case Study Overview</text>
  
  <!-- Cloud Icon and Architecture Core -->
  <g class="pulse-box" data-narration="The NIST Cloud Computing Reference Architecture centers on cloud actors and their interactions">
    <ellipse cx="210" cy="100" rx="50" ry="25" fill="#e2e8f0" stroke="#7eb8da" stroke-width="2"/>
    <path d="M180 100 Q180 60 210 60 Q240 60 240 100" fill="#c5dce8" stroke="#7eb8da" stroke-width="2"/>
    <text x="210" y="95" text-anchor="middle" font-size="11" fill="#2d3748" font-family="Arial">Cloud</text>
    <text x="210" y="108" text-anchor="middle" font-size="9" fill="#4a5568" font-family="Arial">Computing</text>
  </g>
  
  <!-- Cloud Actors Box -->
  <g class="box" data-narration="Cloud Actors: Consumer, Provider, Broker, Carrier, Auditor define the ecosystem">
    <rect x="20" y="130" width="100" height="70" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="70" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="Arial">Cloud Actors</text>
    <text x="70" y="162" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial">Consumer</text>
    <text x="70" y="174" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial">Provider</text>
    <text x="70" y="186" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial">Broker</text>
  </g>
  
  <!-- Service Models Box -->
  <g class="box" data-narration="NIST defines three service models: IaaS, PaaS, and SaaS">
    <rect x="130" y="130" width="130" height="70" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" style="animation-delay: 0.2s"/>
    <text x="195" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="Arial">Service Models</text>
    <text x="160" y="165" font-size="10" fill="#fff" font-family="Arial">• IaaS</text>
    <text x="160" y="178" font-size="10" fill="#fff" font-family="Arial">• PaaS</text>
    <text x="160" y="191" font-size="10" fill="#fff" font-family="Arial">• SaaS</text>
  </g>
  
  <!-- Deployment Models Box -->
  <g class="box" data-narration="Deployment models include Private, Public, Hybrid, and Community clouds">
    <rect x="270" y="130" width="130" height="70" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)" style="animation-delay: 0.4s"/>
    <text x="335" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="Arial">Deployment</text>
    <text x="300" y="165" font-size="10" fill="#fff" font-family="Arial">• Private</text>
    <text x="300" y="178" font-size="10" fill="#fff" font-family="Arial">• Public</text>
    <text x="300" y="191" font-size="10" fill="#fff" font-family="Arial">• Hybrid</text>
  </g>
  
  <!-- Essential Characteristics -->
  <g class="float" data-narration="Five essential characteristics: On-demand, Broad network access, Resource pooling, Elasticity, Measured service">
    <rect x="20" y="210" width="180" height="80" rx="8" fill="#fff" stroke="#9dd6b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3748" font-family="Arial">5 Essential Characteristics</text>
    <text x="30" y="245" font-size="9" fill="#4a5568" font-family="Arial">• On-demand self-service</text>
    <text x="30" y="258" font-size="9" fill="#4a5568" font-family="Arial">• Broad network access</text>
    <text x="30" y="271" font-size="9" fill="#4a5568" font-family="Arial">• Resource pooling</text>
    <text x="110" y="245" font-size="9" fill="#4a5568" font-family="Arial">• Rapid elasticity</text>
    <text x="110" y="258" font-size="9" fill="#4a5568" font-family="Arial">• Measured service</text>
    <text x="110" y="271" font-size="9" fill="#4a5568" font-family="Arial">(Pay-per-use)</text>
  </g>
  
  <!-- Key Benefits Box -->
  <g class="box" data-narration="NIST architecture provides standardization enabling industry compatibility with AWS, Azure, Google Cloud">
    <rect x="210" y="210" width="190" height="80" rx="8" fill="#fff" stroke="#e8c87a" stroke-width="2" filter="url(#shadow)" style="animation-delay: 0.3s"/>
    <text x="305" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3748" font-family="Arial">Industry Alignment</text>
    <text x="225" y="248" font-size="9" fill="#4a5568" font-family="Arial">AWS • Azure • Google Cloud</text>
    <text x="225" y="262" font-size="9" fill="#4a5568" font-family="Arial">All align with NIST definitions</text>
    <text x="225" y="276" font-size="9" fill="#4a5568" font-family="Arial">Ensures transferable knowledge</text>
  </g>
  
  <!-- Arrow connections -->
  <path d="M120 100 L130 130" stroke="#7eb8da" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M255 100 L270 130" stroke="#9dd6b8" stroke-width="2" fill="none" class="arrow"/>
  <path d="M290 100 L270 130" stroke="#e8c87a" stroke-width="2" fill="none" class="arrow"/>
  
  <!-- Bottom Reference -->
  <g data-narration="NIST SP 500-292 provides the official reference architecture framework">
    <rect x="100" y="300" width="220" height="35" rx="5" fill="#2c5282" filter="url(#shadow)"/>
    <text x="210" y="318" text-anchor="middle" font-size="10" fill="#fff" font-family="Arial">NIST SP 500-292</text>
    <text x="210" y="331" text-anchor="middle" font-size="9" fill="#a0aec0" font-family="Arial">Official Reference Architecture</text>
  </g>
  
  <!-- Footer -->
  <text x="210" y="385" text-anchor="middle" font-size="8" fill="#718096" font-family="Arial">Digital Transformation • Cloud Professionals</text>
</svg>