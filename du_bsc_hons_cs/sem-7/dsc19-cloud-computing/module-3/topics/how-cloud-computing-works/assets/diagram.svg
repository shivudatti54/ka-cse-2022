<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="how-cloud-computing-works" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="providerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43a047;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box-iaas { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .box-paas { animation: slideInUp 0.6s ease-out 0.4s both; }
    .box-saas { animation: slideInRight 0.6s ease-out 0.6s both; }
    .layer { animation: fadeIn 0.5s ease-out; }
    .arrow { animation: pulse 2s infinite; }
    .cloud-icon { animation: float 3s ease-in-out infinite; }
    .provider-box { animation: slideInLeft 0.5s ease-out 0.8s both; }
    .user-box { animation: slideInRight 0.5s ease-out 1s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Cloud Icon -->
  <g class="cloud-icon" data-narration="The cloud represents the internet-based delivery of computing services">
    <ellipse cx="380" cy="50" rx="25" ry="15" fill="#fff" opacity="0.8"/>
    <ellipse cx="365" cy="45" rx="18" ry="12" fill="#fff" opacity="0.9"/>
    <ellipse cx="395" cy="45" rx="15" ry="10" fill="#fff" opacity="0.9"/>
  </g>
  
  <!-- Title -->
  <text class="title" x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565c0">Cloud Service Models</text>
  <text class="title" x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1976d2">Responsibility Matrix</text>
  
  <!-- Column Headers -->
  <text class="box-iaas" x="70" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">IaaS</text>
  <text class="box-paas" x="210" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">PaaS</text>
  <text class="box-saas" x="350" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">SaaS</text>
  
  <!-- Subtitle -->
  <text x="210" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Infrastructure | Platform | Software</text>
  
  <!-- IaaS Column -->
  <g class="box-iaas" data-narration="IaaS: Provider manages Physical to Virtualization, User manages OS to Applications">
    <!-- Provider Responsibility -->
    <rect x="20" y="105" width="100" height="70" rx="5" fill="url(#providerGrad)" filter="url(#shadow)"/>
    <text x="70" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">PROVIDER</text>
    <text x="70" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Physical</text>
    <text x="70" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Virtualization</text>
    <text x="70" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Storage</text>
    <text x="70" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Networking</text>
    
    <!-- Arrow -->
    <line x1="70" y1="180" x2="70" y2="190" stroke="#0d47a1" stroke-width="2" class="arrow"/>
    <polygon points="65,185 70,195 75,185" fill="#0d47a1"/>
    
    <!-- User Responsibility -->
    <rect x="20" y="195" width="100" height="55" rx="5" fill="url(#userGrad)" filter="url(#shadow)"/>
    <text x="70" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">USER</text>
    <text x="70" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9">Operating System</text>
    <text x="70" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9">Middleware</text>
    <text x="70" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9">Applications</text>
  </g>
  
  <!-- PaaS Column -->
  <g class="box-paas" data-narration="PaaS: Provider manages Physical to Runtime, User manages Applications only">
    <!-- Provider Responsibility -->
    <rect x="160" y="105" width="100" height="95" rx="5" fill="url(#providerGrad)" filter="url(#shadow)"/>
    <text x="210" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">PROVIDER</text>
    <text x="210" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Physical</text>
    <text x="210" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Virtualization</text>
    <text x="210" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Storage</text>
    <text x="210" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Networking</text>
    <text x="210" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">OS</text>
    <text x="210" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Runtime</text>
    
    <!-- Arrow -->
    <line x1="210" y1="205" x2="210" y2="215" stroke="#0d47a1" stroke-width="2" class="arrow"/>
    <polygon points="205,210 210,220 215,210" fill="#0d47a1"/>
    
    <!-- User Responsibility -->
    <rect x="160" y="220" width="100" height="30" rx="5" fill="url(#userGrad)" filter="url(#shadow)"/>
    <text x="210" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">USER</text>
    <text x="210" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9">Applications</text>
  </g>
  
  <!-- SaaS Column -->
  <g class="box-saas" data-narration="SaaS: Provider manages everything, User just uses the application">
    <!-- Provider Responsibility (Full Stack) -->
    <rect x="300" y="105" width="100" height="145" rx="5" fill="url(#providerGrad)" filter="url(#shadow)"/>
    <text x="350" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">PROVIDER</text>
    <text x="350" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Physical</text>
    <text x="350" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Virtualization</text>
    <text x="350" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Storage</text>
    <text x="350" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Networking</text>
    <text x="350" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">OS</text>
    <text x="350" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Runtime</text>
    <text x="350" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Middleware</text>
    <text x="350" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">OS</text>
    <text x="350" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Applications</text>
    <text x="350" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e3f2fd">Data</text>
    
    <!-- Arrow -->
    <line x1="350" y1="255" x2="350" y2="265" stroke="#0d47a1" stroke-width="2" class="arrow"/>
    <polygon points="345,260 350,270 355,260" fill="#0d47a1"/>
    
    <!-- User Responsibility -->
    <rect x="300" y="270" width="100" height="25" rx="5" fill="url(#userGrad)" filter="url(#shadow)"/>
    <text x="350" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">USER</text>
    <text x="350" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9">Use App Only</text>
  </g>
  
  <!-- Legend -->
  <g class="provider-box" data-narration="Blue sections show what the cloud provider manages">
    <rect x="20" y="320" width="12" height="12" rx="2" fill="#42a5f5"/>
    <text x="38" y="330" font-family="Arial, sans-serif" font-size="10" fill="#333">Provider Manages</text>
  </g>
  <g class="user-box" data-narration="Green sections show what the user is responsible for">
    <rect x="150" y="320" width="12" height="12" rx="2" fill="#66bb6a"/>
    <text x="168" y="330" font-family="Arial, sans-serif" font-size="10" fill="#333">User Manages</text>
  </g>
  
  <!-- Bottom Info -->
  <g data-narration="On-demand resources via internet with pay-as-you-go pricing">
    <rect x="250" y="315" width="150" height="30" rx="5" fill="#fff" opacity="0.7"/>
    <text x="325" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1565c0">Pay-as-you-go</text>
    <text x="325" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">On-demand resources</text>
  </g>
  
  <!-- Example Labels -->
  <text x="70" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#777">e.g., AWS EC2</text>
  <text x="210" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#777">e.g., Heroku</text>
  <text x="350" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#777">e.g., Gmail</text>
  
  <!-- Connecting Lines -->
  <line x1="120" y1="175" x2="160" y2="175" stroke="#90caf9" stroke-width="1" stroke-dasharray="4"/>
  <line x1="260" y1="175" x2="300" y2="175" stroke="#90caf9" stroke-width="1" stroke-dasharray="4"/>
</svg>