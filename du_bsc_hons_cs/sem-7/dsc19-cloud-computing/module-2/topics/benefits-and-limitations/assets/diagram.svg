<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="benefits-and-limitations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8e8f8"/>
    </linearGradient>
    <linearGradient id="benefitGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="100%" style="stop-color:#b8e0c2"/>
    </linearGradient>
    <linearGradient id="limitGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4d6"/>
      <stop offset="100%" style="stop-color:#f5c6aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .benefit-col { animation: slideInLeft 0.7s ease-out 0.2s both; }
    .limit-col { animation: slideInRight 0.7s ease-out 0.4s both; }
    .benefit-box { animation: fadeIn 0.6s ease-out both; }
    .limit-box { animation: fadeIn 0.6s ease-out both; }
    .benefit-box:nth-child(1) { animation-delay: 0.3s; }
    .benefit-box:nth-child(2) { animation-delay: 0.4s; }
    .benefit-box:nth-child(3) { animation-delay: 0.5s; }
    .benefit-box:nth-child(4) { animation-delay: 0.6s; }
    .limit-box:nth-child(1) { animation-delay: 0.5s; }
    .limit-box:nth-child(2) { animation-delay: 0.6s; }
    .limit-box:nth-child(3) { animation-delay: 0.7s; }
    .limit-box:nth-child(4) { animation-delay: 0.8s; }
    .icon-pulse { animation: pulse 2s ease-in-out infinite; }
    .connector { animation: fadeIn 1s ease-out 0.9s both; }
    .subtitle { animation: fadeIn 0.5s ease-out 0.1s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title">Benefits &amp; Limitations</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a5568" class="subtitle">of Cloud Computing</text>
  
  <!-- Benefits Column -->
  <g class="benefit-col" data-narration="Benefits column showing advantages of cloud computing including cost efficiency, scalability, high availability, and automatic updates">
    <rect x="20" y="65" width="175" height="320" fill="url(#benefitGradient)" rx="8" filter="url(#shadow)"/>
    <text x="107" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22543d">✓ Benefits</text>
    <line x1="30" y1="95" x2="184" y2="95" stroke="#48bb78" stroke-width="2"/>
    
    <!-- Benefit boxes -->
    <g class="benefit-box">
      <rect x="28" y="105" width="159" height="36" fill="#fff" rx="5" stroke="#48bb78" stroke-width="1"/>
      <text x="107" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#22543d">Cost Efficiency</text>
      <text x="107" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">Pay-as-you-go model</text>
    </g>
    <g class="benefit-box">
      <rect x="28" y="148" width="159" height="36" fill="#fff" rx="5" stroke="#48bb78" stroke-width="1"/>
      <text x="107" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#22543d">Scalability</text>
      <text x="107" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">Easy resource scaling</text>
    </g>
    <g class="benefit-box">
      <rect x="28" y="191" width="159" height="36" fill="#fff" rx="5" stroke="#48bb78" stroke-width="1"/>
      <text x="107" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#22543d">High Availability</text>
      <text x="107" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">99.9% uptime SLA</text>
    </g>
    <g class="benefit-box">
      <rect x="28" y="234" width="159" height="36" fill="#fff" rx="5" stroke="#48bb78" stroke-width="1"/>
      <text x="107" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#22543d">Global Access</text>
      <text x="107" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">Access from anywhere</text>
    </g>
    <g class="benefit-box">
      <rect x="28" y="277" width="159" height="36" fill="#fff" rx="5" stroke="#48bb78" stroke-width="1"/>
      <text x="107" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#22543d">Auto Updates</text>
      <text x="107" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">Latest features/secur</text>
    </g>
    <g class="benefit-box">
      <rect x="28" y="320" width="159" height="36" fill="#fff" rx="5" stroke="#48bb78" stroke-width="1"/>
      <text x="107" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#22543d">Global Access</text>
      <text x="107" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">Worldwide presence</text>
    </g>
  </g>
  
  <!-- Limitations Column -->
  <g class="limit-col" data-narration="Limitations column showing disadvantages of cloud computing including security concerns, vendor lock-in, downtime risk, and limited control">
    <rect x="225" y="65" width="175" height="320" fill="url(#limitGradient)" rx="8" filter="url(#shadow)"/>
    <text x="312" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#742a2a">✗ Limitations</text>
    <line x1="235" y1="95" x2="389" y2="95" stroke="#e53e3e" stroke-width="2"/>
    
    <!-- Limitation boxes -->
    <g class="limit-box">
      <rect x="233" y="105" width="159" height="36" fill="#fff" rx="5" stroke="#e53e3e" stroke-width="1"/>
      <text x="312" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#742a2a">Security Concerns</text>
      <text x="312" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b2c2c">Data breach risks</text>
    </g>
    <g class="limit-box">
      <rect x="233" y="148" width="159" height="36" fill="#fff" rx="5" stroke="#e53e3e" stroke-width="1"/>
      <text x="312" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#742a2a">Vendor Lock-in</text>
      <text x="312" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b2c2c">Difficult migration</text>
    </g>
    <g class="limit-box">
      <rect x="233" y="191" width="159" height="36" fill="#fff" rx="5" stroke="#e53e3e" stroke-width="1"/>
      <text x="312" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#742a2a">Downtime Risk</text>
      <text x="312" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b2c2c">Service interruptions</text>
    </g>
    <g class="limit-box">
      <rect x="233" y="234" width="159" height="36" fill="#fff" rx="5" stroke="#e53e3e" stroke-width="1"/>
      <text x="312" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#742a2a">Limited Control</text>
      <text x="312" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b2c2c">Infrastructure access</text>
    </g>
    <g class="limit-box">
      <rect x="233" y="277" width="159" height="36" fill="#fff" rx="5" stroke="#e53e3e" stroke-width="1"/>
      <text x="312" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#742a2a">Performance Issues</text>
      <text x="312" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b2c2c">Latency problems</text>
    </g>
    <g class="limit-box">
      <rect x="233" y="320" width="159" height="36" fill="#fff" rx="5" stroke="#e53e3e" stroke-width="1"/>
      <text x="312" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#742a2a">Data Portability</text>
      <text x="312" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b2c2c">Transfer challenges</text>
    </g>
  </g>
  
  <!-- Center Connector -->
  <g class="connector" data-narration="Visual representation comparing benefits versus limitations in cloud computing">
    <circle cx="210" cy="225" r="25" fill="#fff" stroke="#718096" stroke-width="2" filter="url(#shadow)" class="icon-pulse"/>
    <text x="210" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4a5568">VS</text>
    <text x="210" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#718096">Cloud</text>
  </g>
  
  <!-- Bottom Labels -->
  <g class="connector">
    <rect x="85" y="370" width="100" height="18" fill="#48bb78" rx="4"/>
    <text x="135" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">Advantages</text>
    <rect x="235" y="370" width="100" height="18" fill="#e53e3e" rx="4"/>
    <text x="285" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">Disadvantages</text>
  </g>
</svg>