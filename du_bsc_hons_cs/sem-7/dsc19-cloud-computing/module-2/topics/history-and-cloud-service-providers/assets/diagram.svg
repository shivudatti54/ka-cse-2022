<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="history-and-cloud-service-providers">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e6e6fa"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="iaasGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="paasGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="saasGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .history-section { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .model-section { animation: slideInRight 0.8s ease-out 0.5s both; }
    .provider-section { animation: slideInUp 0.8s ease-out 0.7s both; }
    .iaas-box { animation: slideInUp 0.6s ease-out 0.8s both; }
    .paas-box { animation: slideInUp 0.6s ease-out 1.0s both; }
    .saas-box { animation: slideInUp 0.6s ease-out 1.2s both; }
    .timeline-dot { animation: pulse 2s infinite; }
    .section-label { font-family: Arial, sans-serif; font-weight: bold; }
    .box-title { font-family: Arial, sans-serif; font-weight: bold; font-size: 12px; }
    .box-text { font-family: Arial, sans-serif; font-size: 10px; }
    .history-text { font-family: Arial, sans-serif; font-size: 11px; }
    .provider-text { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" fill="#2c5282" font-family="Arial, sans-serif" font-size="18" font-weight="bold">History of Cloud Computing</text>
  <text x="210" y="45" text-anchor="middle" class="title" fill="#4a5568" font-family="Arial, sans-serif" font-size="12">Service Models &amp; Providers</text>
  
  <!-- History Timeline Section -->
  <g class="history-section" data-narration="The evolution began in the 1960s with mainframe computing and time-sharing, leading to modern cloud services">
    <rect x="15" y="60" width="140" height="130" rx="8" fill="#fff" filter="url(#shadow)" stroke="#4a90d9" stroke-width="1"/>
    <text x="85" y="78" text-anchor="middle" class="section-label" fill="#2c5282" font-size="13">Evolution Timeline</text>
    
    <!-- Timeline 1960s -->
    <circle cx="30" cy="100" r="5" fill="#4a90d9" class="timeline-dot"/>
    <text x="45" y="104" fill="#2c5282" font-size="11" font-weight="bold">1960s</text>
    <text x="45" y="118" fill="#4a5568" class="history-text">Mainframe Era</text>
    <text x="45" y="130" fill="#718096" class="history-text">Time-sharing</text>
    
    <!-- Timeline 1990s -->
    <circle cx="30" cy="150" r="5" fill="#68d391" class="timeline-dot"/>
    <text x="45" y="154" fill="#2c5282" font-size="11" font-weight="bold">1990s</text>
    <text x="45" y="168" fill="#4a5568" class="history-text">ISP Era</text>
    <text x="45" y="180" fill="#718096" class="history-text">ASP Model</text>
    
    <!-- Timeline 2000s -->
    <circle cx="30" cy="172" r="5" fill="#f6ad55" class="timeline-dot"/>
    <text x="45" y="176" fill="#2c5282" font-size="11" font-weight="bold">2000s</text>
    <text x="45" y="190" fill="#4a5568" class="history-text">Cloud Born</text>
  </g>
  
  <!-- Service Models Section -->
  <g class="model-section" data-narration="Cloud service models: IaaS provides infrastructure, PaaS provides platform, SaaS provides software">
    <text x="290" y="78" text-anchor="middle" class="section-label" fill="#2c5282" font-size="13">Service Models</text>
    
    <!-- SaaS Box (Top) -->
    <g class="saas-box">
      <rect x="200" y="88" width="200" height="45" rx="6" fill="url(#saasGradient)" filter="url(#shadow)"/>
      <text x="300" y="108" text-anchor="middle" class="box-title" fill="#6b46c1">Software as a Service (SaaS)</text>
      <text x="300" y="122" text-anchor="middle" class="box-text" fill="#553c9a">Provider: Apps, Data | User: Use only</text>
    </g>
    
    <!-- PaaS Box (Middle) -->
    <g class="paas-box">
      <rect x="200" y="138" width="200" height="45" rx="6" fill="url(#paasGradient)" filter="url(#shadow)"/>
      <text x="300" y="158" text-anchor="middle" class="box-title" fill="#285e61">Platform as a Service (PaaS)</text>
      <text x="300" y="172" text-anchor="middle" class="box-text" fill="#234e52">Provider: OS, Runtime | User: Apps, Data</text>
    </g>
    
    <!-- IaaS Box (Bottom) -->
    <g class="iaas-box">
      <rect x="200" y="188" width="200" height="45" rx="6" fill="url(#iaasGradient)" filter="url(#shadow)"/>
      <text x="300" y="208" text-anchor="middle" class="box-title" fill="#c53030">Infrastructure as a Service (IaaS)</text>
      <text x="300" y="222" text-anchor="middle" class="box-text" fill="#9b2c2c">Provider: Physical+Virtual | User: OS, Apps</text>
    </g>
    
    <!-- Arrows between boxes -->
    <path d="M300 133 L300 138" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M300 183 L300 188" stroke="#4a5568" stroke-width="2"/>
  </g>
  
  <!-- Provider Section -->
  <g class="provider-section" data-narration="Major cloud providers: AWS, Microsoft Azure, and Google Cloud Platform dominate the market">
    <rect x="15" y="200" width="385" height="90" rx="8" fill="#fff" filter="url(#shadow)" stroke="#9f7aea" stroke-width="1"/>
    <text x="207" y="218" text-anchor="middle" class="section-label" fill="#6b46c1" font-size="13">Major Cloud Service Providers</text>
    
    <!-- AWS -->
    <g>
      <circle cx="70" cy="250" r="22" fill="#ff9900" opacity="0.2"/>
      <text x="70" y="245" text-anchor="middle" class="provider-text" fill="#ff9900" font-size="16">AWS</text>
      <text x="70" y="262" text-anchor="middle" class="box-text" fill="#744210">Amazon</text>
      <text x="70" y="275" text-anchor="middle" class="box-text" fill="#9c4221" font-size="9">Web Services</text>
    </g>
    
    <!-- Azure -->
    <g>
      <circle cx="210" cy="250" r="22" fill="#0078d4" opacity="0.2"/>
      <text x="210" y="245" text-anchor="middle" class="provider-text" fill="#0078d4" font-size="14">Azure</text>
      <text x="210" y="262" text-anchor="middle" class="box-text" fill="#1a365d">Microsoft</text>
      <text x="210" y="275" text-anchor="middle" class="box-text" fill="#2c5282" font-size="9">Cloud Platform</text>
    </g>
    
    <!-- GCP -->
    <g>
      <circle cx="345" cy="250" r="22" fill="#4285f4" opacity="0.2"/>
      <text x="345" y="245" text-anchor="middle" class="provider-text" fill="#4285f4" font-size="14">GCP</text>
      <text x="345" y="262" text-anchor="middle" class="box-text" fill="#1a365d">Google</text>
      <text x="345" y="275" text-anchor="middle" class="box-text" fill="#2c5282" font-size="9">Cloud Platform</text>
    </g>
  </g>
  
  <!-- Bottom Legend -->
  <g class="history-section" data-narration="The provider manages底层 infrastructure while用户 manage their own resources">
    <rect x="15" y="300" width="385" height="85" rx="8" fill="#fff" filter="url(#shadow)" stroke="#48bb78" stroke-width="1"/>
    <text x="207" y="318" text-anchor="middle" class="section-label" fill="#276749" font-size="13">What Providers vs Users Manage</text>
    
    <!-- Provider Side -->
    <rect x="25" y="328" width="175" height="50" rx="4" fill="#ebf8ff" stroke="#4299e1"/>
    <text x="112" y="345" text-anchor="middle" class="box-title" fill="#2b6cb0">PROVIDER MANAGES</text>
    <text x="112" y="360" text-anchor="middle" class="box-text" fill="#2c5282">Physical Infrastructure</text>
    <text x="112" y="372" text-anchor="middle" class="box-text" fill="#2c5282">Virtualization, Storage, Network</text>
    
    <!-- User Side -->
    <rect x="220" y="328" width="175" height="50" rx="4" fill="#faf5ff" stroke="#9f7aea"/>
    <text x="307" y="345" text-anchor="middle" class="box-title" fill="#6b46c1">USER MANAGES</text>
    <text x="307" y="360" text-anchor="middle" class="box-text" fill="#553c9a">Applications, Data</text>
    <text x="307" y="372" text-anchor="middle" class="box-text" fill="#553c9a">OS (in IaaS), Runtime (in PaaS)</text>
  </g>
  
  <!-- Decorative cloud elements -->
  <g opacity="0.3">
    <ellipse cx="50" cy="380" rx="25" ry="10" fill="#e2e8f0"/>
    <ellipse cx="380" cy="55" rx="20" ry="8" fill="#e2e8f0"/>
  </g>
</svg>