<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="service-level-agreements">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7cb9e8;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9534f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes growWidth {
      from { width: 0; }
      to { width: var(--target-width); }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #2c3e50; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-box { fill: #fff; stroke: #ddd; stroke-width: 1; rx: 8; }
    .nines-badge { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #fff; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .bar-grow { animation: growWidth 1s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <g class="fade-in" data-narration="Title section: SLA Availability Nines Scale showing progression from basic to mission-critical cloud services">
    <text x="210" y="30" text-anchor="middle" class="title-text">SLA Availability Nines Scale</text>
    <line x1="60" y1="42" x2="360" y2="42" stroke="#5cb85c" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- 2 Nines - 99% -->
  <g class="slide-in" style="animation-delay: 0.2s" transform="translate(30, 65)" data-narration="99% availability (2 nines): 87.6 hours yearly downtime - Regular service level for basic applications">
    <rect class="section-box" x="0" y="0" width="170" height="70" filter="url(#shadow)"/>
    <rect x="0" y="0" width="170" height="24" fill="#7cb9e8" rx="8"/>
    <text x="85" y="17" text-anchor="middle" class="nines-badge">99% (2 Nines)</text>
    <text x="10" y="42" class="label-text">Regular</text>
    <text x="10" y="58" class="detail-text">87.6 hrs/year downtime</text>
    <circle cx="155" cy="50" r="10" fill="#7cb9e8" class="pulse"/>
    <text x="155" y="54" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">!</text>
  </g>
  
  <!-- 3 Nines - 99.9% -->
  <g class="slide-in" style="animation-delay: 0.4s" transform="translate(220, 65)" data-narration="99.9% availability (3 nines): 8.76 hours yearly downtime - High Availability for production systems">
    <rect class="section-box" x="0" y="0" width="170" height="70" filter="url(#shadow)"/>
    <rect x="0" y="0" width="170" height="24" fill="#5cb85c" rx="8"/>
    <text x="85" y="17" text-anchor="middle" class="nines-badge">99.9% (3 Nines)</text>
    <text x="10" y="42" class="label-text">High Availability</text>
    <text x="10" y="58" class="detail-text">8.76 hrs/year downtime</text>
    <circle cx="155" cy="50" r="10" fill="#5cb85c" class="pulse"/>
    <text x="155" y="54" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">✓</text>
  </g>
  
  <!-- 4 Nines - 99.99% -->
  <g class="slide-in" style="animation-delay: 0.6s" transform="translate(30, 150)" data-narration="99.99% availability (4 nines): 52 minutes yearly downtime - Very High Availability for critical systems">
    <rect class="section-box" x="0" y="0" width="170" height="70" filter="url(#shadow)"/>
    <rect x="0" y="0" width="170" height="24" fill="#f0ad4e" rx="8"/>
    <text x="85" y="17" text-anchor="middle" class="nines-badge">99.99% (4 Nines)</text>
    <text x="10" y="42" class="label-text">Very High Avail.</text>
    <text x="10" y="58" class="detail-text">52 min/year downtime</text>
    <circle cx="155" cy="50" r="10" fill="#f0ad4e" class="pulse"/>
    <text x="155" y="54" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">★</text>
  </g>
  
  <!-- 5 Nines - 99.999% -->
  <g class="slide-in" style="animation-delay: 0.8s" transform="translate(220, 150)" data-narration="99.999% availability (5 nines): 5.26 minutes yearly downtime - Ultra High Availability for mission-critical systems">
    <rect class="section-box" x="0" y="0" width="170" height="70" filter="url(#shadow)"/>
    <rect x="0" y="0" width="170" height="24" fill="#d9534f" rx="8"/>
    <text x="85" y="17" text-anchor="middle" class="nines-badge">99.999% (5 Nines)</text>
    <text x="10" y="42" class="label-text">Ultra High Avail.</text>
    <text x="10" y="58" class="detail-text">5.26 min/year downtime</text>
    <circle cx="155" cy="50" r="10" fill="#d9534f" class="pulse"/>
    <text x="155" y="54" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">♦</text>
  </g>
  
  <!-- Visual Scale Bar -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Progress bar showing availability scale from 99% to 99.999%">
    <text x="210" y="250" text-anchor="middle" class="label-text">Availability Progression</text>
    <rect x="40" y="260" width="340" height="16" fill="#eee" rx="8"/>
    <rect x="40" y="260" width="85" height="16" fill="#7cb9e8" rx="8" class="bar-grow" style="--target-width: 85px"/>
    <rect x="125" y="260" width="85" height="16" fill="#5cb85c" rx="8" class="bar-grow" style="--target-width: 85px; animation-delay: 0.3s"/>
    <rect x="210" y="260" width="85" height="16" fill="#f0ad4e" rx="8" class="bar-grow" style="--target-width: 85px; animation-delay: 0.6s"/>
    <rect x="295" y="260" width="85" height="16" fill="#d9534f" rx="8" class="bar-grow" style="--target-width: 85px; animation-delay: 0.9s"/>
    
    <text x="40" y="290" class="detail-text">99%</text>
    <text x="125" y="290" class="detail-text">99.9%</text>
    <text x="210" y="290" class="detail-text">99.99%</text>
    <text x="295" y="290" class="detail-text">99.999%</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Key concepts: SLA metrics define service quality, uptime guarantees, and remedies for failures">
    <rect x="40" y="310" width="340" height="75" fill="#fff9e6" stroke="#f0ad4e" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
    <text x="210" y="330" text-anchor="middle" class="label-text" fill="#d9534f">Key SLA Concepts</text>
    <text x="50" y="350" class="detail-text">• <tspan font-weight="600">Metrics:</tspan> Uptime %, Response time, Latency</text>
    <text x="50" y="365" class="detail-text">• <tspan font-weight="600">Remedies:</tspan> Credits, Refunds, SLA breaches</text>
    <text x="50" y="380" class="detail-text">• <tspan font-weight="600">Shared Responsibility:</tspan> Provider vs Customer duties</text>
  </g>
  
  <!-- Arrow indicators -->
  <g class="fade-in" style="animation-delay: 1.4s" data-narration="Arrows indicating higher availability requirements for mission-critical applications">
    <path d="M 180 295 L 180 310 L 175 305 M 180 310 L 185 305" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="210" y="300" text-anchor="middle" class="detail-text" fill="#666">↑ Higher Reliability</text>
  </g>
  
  <!-- Footer note -->
  <text x="210" y="395" text-anchor="middle" class="detail-text" fill="#777">Cloud SLA standards ensure accountability</text>
</svg>