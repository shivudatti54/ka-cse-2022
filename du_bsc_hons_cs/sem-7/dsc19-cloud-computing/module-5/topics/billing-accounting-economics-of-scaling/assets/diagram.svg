<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="billing-accounting-economics-of-scaling">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#eaf2e8"/>
      <stop offset="100%" style="stop-color:#f5e8f4"/>
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9e6"/>
      <stop offset="100%" style="stop-color:#fff3cc"/>
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f4ff"/>
      <stop offset="100%" style="stop-color:#cce5ff"/>
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6"/>
      <stop offset="100%" style="stop-color:#ccffcc"/>
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe6f4"/>
      <stop offset="100%" style="stop-color:#ffccdd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes barGrow {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    .title-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: bold;
      fill: #2c3e50;
    }
    .label-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      fill: #34495e;
    }
    .detail-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 10px;
      fill: #7f8c8d;
    }
    .discount-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      fill: #27ae60;
    }
    .card {
      filter: url(#shadow);
    }
    .title-group { animation: fadeIn 0.8s ease-out forwards; }
    .card-1 { animation: slideInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .card-2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .card-3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .card-4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .flex-bar { transform-origin: left center; animation: barGrow 1s ease-out forwards; }
    .pulse-icon { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: dash 1.5s ease-out 1s forwards; }
    @keyframes dash { to { stroke-dashoffset: 0; } }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="title-group">
    <text x="210" y="25" text-anchor="middle" class="title-text">Cloud Pricing Models</text>
    <text x="210" y="42" text-anchor="middle" class="detail-text">Discount vs Flexibility Comparison</text>
  </g>
  
  <!-- Card 1: Pay-as-you-go -->
  <g class="card-1" data-narration="Pay-as-you-go: No commitment required, highest flexibility, 0% discount">
    <rect x="15" y="55" width="185" height="150" rx="8" fill="url(#cardGradient1)" class="card"/>
    <text x="107" y="75" text-anchor="middle" class="label-text" font-weight="bold">Pay-as-you-go</text>
    <text x="107" y="90" text-anchor="middle" class="discount-text">0% Discount</text>
    <rect x="25" y="100" width="165" height="8" rx="4" fill="#ddd"/>
    <rect x="25" y="100" width="165" height="8" rx="4" fill="#f39c12" class="flex-bar" style="animation-delay: 0.5s"/>
    <text x="30" y="118" class="detail-text">Highest Flexibility</text>
    <text x="107" y="138" text-anchor="middle" class="detail-text">No commitment needed</text>
    <text x="107" y="152" text-anchor="middle" class="detail-text">On-demand pricing</text>
    <circle cx="107" cy="185" r="8" fill="#f39c12" class="pulse-icon"/>
  </g>
  
  <!-- Card 2: Reserved Instances -->
  <g class="card-2" data-narration="Reserved Instances: 1-3 year commitment, 60-70% discount, low flexibility">
    <rect x="220" y="55" width="185" height="150" rx="8" fill="url(#cardGradient2)" class="card"/>
    <text x="312" y="75" text-anchor="middle" class="label-text" font-weight="bold">Reserved Instances</text>
    <text x="312" y="90" text-anchor="middle" class="discount-text">60-70% Discount</text>
    <rect x="230" y="100" width="165" height="8" rx="4" fill="#ddd"/>
    <rect x="230" y="100" width="50" height="8" rx="4" fill="#3498db" class="flex-bar" style="animation-delay: 0.7s"/>
    <text x="235" y="118" class="detail-text">Low Flexibility</text>
    <text x="312" y="138" text-anchor="middle" class="detail-text">1-3 year commitment</text>
    <text x="312" y="152" text-anchor="middle" class="detail-text">Best for steady workloads</text>
    <circle cx="312" cy="185" r="8" fill="#3498db" class="pulse-icon"/>
  </g>
  
  <!-- Card 3: Savings Plans -->
  <g class="card-3" data-narration="Savings Plans: Flexible commitment, 50-60% discount, moderate flexibility">
    <rect x="15" y="215" width="185" height="150" rx="8" fill="url(#cardGradient3)" class="card"/>
    <text x="107" y="235" text-anchor="middle" class="label-text" font-weight="bold">Savings Plans</text>
    <text x="107" y="250" text-anchor="middle" class="discount-text">50-60% Discount</text>
    <rect x="25" y="260" width="165" height="8" rx="4" fill="#ddd"/>
    <rect x="25" y="260" width="100" height="8" rx="4" fill="#27ae60" class="flex-bar" style="animation-delay: 0.9s"/>
    <text x="30" y="278" class="detail-text">Moderate Flexibility</text>
    <text x="107" y="298" text-anchor="middle" class="detail-text">1-3 year commitment</text>
    <text x="107" y="312" text-anchor="middle" class="detail-text">Flexible usage allowance</text>
    <circle cx="107" cy="345" r="8" fill="#27ae60" class="pulse-icon"/>
  </g>
  
  <!-- Card 4: Spot Instances -->
  <g class="card-4" data-narration="Spot Instances: Can be interrupted, up to 90% discount, lowest flexibility">
    <rect x="220" y="215" width="185" height="150" rx="8" fill="url(#cardGradient4)" class="card"/>
    <text x="312" y="235" text-anchor="middle" class="label-text" font-weight="bold">Spot Instances</text>
    <text x="312" y="250" text-anchor="middle" class="discount-text">Up to 90% Discount</text>
    <rect x="230" y="260" width="165" height="8" rx="4" fill="#ddd"/>
    <rect x="230" y="260" width="30" height="8" rx="4" fill="#e74c3c" class="flex-bar" style="animation-delay: 1.1s"/>
    <text x="235" y="278" class="detail-text">Lowest Flexibility</text>
    <text x="312" y="298" text-anchor="middle" class="detail-text">Interruption possible</text>
    <text x="312" y="312" text-anchor="middle" class="detail-text">Best for batch jobs</text>
    <circle cx="312" cy="345" r="8" fill="#e74c3c" class="pulse-icon"/>
  </g>
  
  <!-- Relationship Arrows -->
  <g class="arrows">
    <line x1="200" y1="130" x2="220" y2="130" stroke="#95a5a6" stroke-width="2" stroke-dasharray="4" class="arrow-line"/>
    <line x1="107" y1="205" x2="107" y2="215" stroke="#95a5a6" stroke-width="2" stroke-dasharray="4"/>
    <line x1="312" y1="205" x2="312" y2="215" stroke="#95a5a6" stroke-width="2" stroke-dasharray="4"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(145, 375)">
    <text x="0" y="0" class="detail-text" font-size="9">↑ Discount</text>
    <text x="55" y="0" class="detail-text" font-size="9">→ Flexibility →</text>
  </g>
</svg>