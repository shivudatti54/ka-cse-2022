<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="transactions-and-acid-properties">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8e9"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c5282; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .state-box { rx: 8; ry: 8; filter: url(#shadow); }
    .acid-box { rx: 6; ry: 6; filter: url(#shadow); }
    .arrow { fill: none; stroke: #555; stroke-width: 2; marker-end: url(#arrowhead); }
    .arrow-line { stroke: #666; stroke-width: 2; fill: none; stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .title-anim { animation: slideIn 0.8s ease-out forwards; }
    .state-active { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .state-partial { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .state-committed { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .state-aborted { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .state-terminated { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .acid-anim { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Transactions &amp; ACID Properties</text>
  
  <!-- Transaction State Diagram -->
  <g data-narration="Transaction lifecycle showing 5 states: Active, Partially Committed, Committed, Aborted, and Terminated">
    <!-- Active State -->
    <g class="state-active">
      <rect x="30" y="70" width="90" height="45" class="state-box" fill="#90cdf4"/>
      <text x="75" y="88" text-anchor="middle" class="label" font-weight="bold">ACTIVE</text>
      <text x="75" y="103" text-anchor="middle" class="detail">Executing</text>
    </g>
    
    <!-- Arrow: Active to Partially Committed -->
    <path d="M120 92 L160 92" class="arrow-line" stroke="#555" stroke-width="2"/>
    
    <!-- Partially Committed State -->
    <g class="state-partial">
      <rect x="160" y="70" width="90" height="45" class="state-box" fill="#faf089"/>
      <text x="205" y="88" text-anchor="middle" class="label" font-weight="bold">PARTIAL</text>
      <text x="205" y="103" text-anchor="middle" class="detail">Ready to Commit</text>
    </g>
    
    <!-- Arrow: Partial to Committed -->
    <path d="M250 92 L290 92" class="arrow-line" stroke="#555" stroke-width="2"/>
    <text x="270" y="85" text-anchor="middle" class="detail" fill="#2d3748">COMMIT</text>
    
    <!-- Committed State -->
    <g class="state-committed">
      <rect x="290" y="70" width="90" height="45" class="state-box" fill="#9ae6b4"/>
      <text x="335" y="88" text-anchor="middle" class="label" font-weight="bold">COMMITTED</text>
      <text x="335" y="103" text-anchor="middle" class="detail">Complete</text>
    </g>
    
    <!-- Arrow: Active to Aborted -->
    <path d="M75 115 L75 155" class="arrow-line" stroke="#555" stroke-width="2"/>
    <text x="85" y="140" text-anchor="middle" class="detail" fill="#2d3748">ABORT</text>
    
    <!-- Aborted State -->
    <g class="state-aborted">
      <rect x="30" y="155" width="90" height="45" class="state-box" fill="#feb2b2"/>
      <text x="75" y="173" text-anchor="middle" class="label" font-weight="bold">ABORTED</text>
      <text x="75" y="188" text-anchor="middle" class="detail">Rollback</text>
    </g>
    
    <!-- Arrow: Partial to Aborted -->
    <path d="M205 115 L205 155" class="arrow-line" stroke="#555" stroke-width="2"/>
    
    <!-- Arrow: Committed to Terminated -->
    <path d="M335 115 L335 155" class="arrow-line" stroke="#555" stroke-width="2"/>
    
    <!-- Arrow: Aborted to Terminated -->
    <path d="M120 177 L290 177" class="arrow-line" stroke="#555" stroke-width="2"/>
    <text x="205" y="172" text-anchor="middle" class="detail" fill="#2d3748">ROLLBACK</text>
    
    <!-- Terminated State -->
    <g class="state-terminated">
      <rect x="290" y="155" width="90" height="45" class="state-box" fill="#c4b5fd"/>
      <text x="335" y="173" text-anchor="middle" class="label" font-weight="bold">TERMINATED</text>
      <text x="335" y="188" text-anchor="middle" class="detail">End</text>
    </g>
  </g>
  
  <!-- ACID Properties Section -->
  <g data-narration="ACID properties ensure reliable transaction processing: Atomicity, Consistency, Isolation, Durability">
    <text x="30" y="230" class="label" font-weight="bold" fill="#2c5282">ACID Properties:</text>
    
    <!-- Atomicity Box -->
    <g class="acid-anim" style="animation-delay: 0.3s">
      <rect x="30" y="240" width="85" height="42" class="acid-box" fill="#bee3f8" stroke="#63b3ed" stroke-width="1"/>
      <text x="72" y="256" text-anchor="middle" class="label" font-weight="bold" fill="#2c5282">Atomicity</text>
      <text x="72" y="271" text-anchor="middle" class="detail">All or Nothing</text>
    </g>
    
    <!-- Consistency Box -->
    <g class="acid-anim" style="animation-delay: 0.5s">
      <rect x="125" y="240" width="85" height="42" class="acid-box" fill="#c6f6d5" stroke="#68d391" stroke-width="1"/>
      <text x="167" y="256" text-anchor="middle" class="label" font-weight="bold" fill="#276749">Consistency</text>
      <text x="167" y="271" text-anchor="middle" class="detail">Valid State</text>
    </g>
    
    <!-- Isolation Box -->
    <g class="acid-anim" style="animation-delay: 0.7s">
      <rect x="220" y="240" width="85" height="42" class="acid-box" fill="#fefcbf" stroke="#f6e05e" stroke-width="1"/>
      <text x="262" y="256" text-anchor="middle" class="label" font-weight="bold" fill="#975a16">Isolation</text>
      <text x="262" y="271" text-anchor="middle" class="detail">Concurrent Safe</text>
    </g>
    
    <!-- Durability Box -->
    <g class="acid-anim" style="animation-delay: 0.9s">
      <rect x="315" y="240" width="85" height="42" class="acid-box" fill="#fed7e2" stroke="#f687b3" stroke-width="1"/>
      <text x="357" y="256" text-anchor="middle" class="label" font-weight="bold" fill="#9f7aea">Durability</text>
      <text x="357" y="271" text-anchor="middle" class="detail">Persistent</text>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Key transaction concepts: logical unit of work, database state transitions, COMMIT and ROLLBACK operations">
    <rect x="30" y="295" width="370" height="90" rx="8" ry="8" fill="url(#boxGradient)" stroke="#cbd5e0" stroke-width="1"/>
    
    <text x="45" y="318" class="label" font-weight="bold" fill="#2d3748">Transaction:</text>
    <text x="130" y="318" class="detail">Logical unit of work (all succeed or all fail)</text>
    
    <text x="45" y="340" class="label" font-weight="bold" fill="#2d3748">COMMIT:</text>
    <text x="115" y="340" class="detail">Makes changes permanent</text>
    
    <text x="45" y="362" class="label" font-weight="bold" fill="#2d3748">ROLLBACK:</text>
    <text x="130" y="362" class="detail">Reverts changes on failure</text>
    
    <text x="240" y="362" class="label" font-weight="bold" fill="#2d3748">DB State:</text>
    <text x="305" y="362" class="detail">Consistent → Consistent</text>
  </g>
  
  <!-- Arrow Marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>