<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="single-multi-level-indexing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="singleLevelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="multiLevelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb7b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9a8b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="interGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .single-level { animation: slideInLeft 0.6s ease-out; }
    .multi-level { animation: slideInRight 0.6s ease-out; }
    .box-anim { animation: slideInUp 0.5s ease-out; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: fadeIn 1s ease-out 0.5s both; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .sublabel { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .concept-box { font-family: Arial, sans-serif; font-size: 11px; fill: #444; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text">Single vs Multi-Level Indexing</text>
  
  <!-- Single Level Section -->
  <g class="single-level">
    <rect x="20" y="50" width="180" height="330" rx="8" fill="url(#singleLevelGrad)" filter="url(#shadow)"/>
    <rect x="20" y="50" width="180" height="30" rx="8" fill="#5cb85c"/>
    <rect x="20" y="70" width="180" height="10" fill="#5cb85c"/>
    <text x="110" y="70" text-anchor="middle" class="section-title">Single-Level Index</text>
    
    <!-- Single Level Index File -->
    <g class="box-anim" style="animation-delay: 0.2s">
      <rect x="35" y="95" width="150" height="25" rx="4" fill="#fff" stroke="#5cb85c" stroke-width="2"/>
      <text x="110" y="112" text-anchor="middle" class="label" data-narration="Index File (Sorted)">Index File</text>
      <text x="110" y="126" text-anchor="middle" class="sublabel" data-narration="Contains keys and pointers">[Key | Pointer]</text>
    </g>
    
    <!-- Arrow -->
    <path class="arrow" d="M 110 145 L 110 165" stroke="#5cb85c" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Data File -->
    <g class="box-anim" style="animation-delay: 0.4s">
      <rect x="35" y="170" width="150" height="70" rx="4" fill="#fff" stroke="#5cb85c" stroke-width="2"/>
      <text x="110" y="190" text-anchor="middle" class="label">Data File</text>
      <text x="110" y="208" text-anchor="middle" class="sublabel" data-narration="Records stored in order">R1 | R2 | R3 | R4...</text>
      <text x="110" y="225" text-anchor="middle" class="sublabel" data-narration="Sequential access required">Sequential Scan</text>
    </g>
    
    <!-- Key Concept Box -->
    <rect x="30" y="260" width="160" height="60" rx="4" fill="#fff" opacity="0.9"/>
    <text x="110" y="280" text-anchor="middle" class="concept-box" font-weight="bold">Key Concepts:</text>
    <text x="40" y="298" class="concept-box">• One index level</text>
    <text x="40" y="314" class="concept-box">• Linear search within level</text>
  </g>
  
  <!-- Multi Level Section -->
  <g class="multi-level">
    <rect x="220" y="50" width="180" height="330" rx="8" fill="url(#multiLevelGrad)" filter="url(#shadow)"/>
    <rect x="220" y="50" width="180" height="30" rx="8" fill="#d9534f"/>
    <rect x="220" y="70" width="180" height="10" fill="#d9534f"/>
    <text x="310" y="70" text-anchor="middle" class="section-title">Multi-Level Index</text>
    
    <!-- Root Level -->
    <g class="box-anim" style="animation-delay: 0.2s">
      <rect x="235" y="90" width="150" height="22" rx="4" fill="url(#rootGrad)"/>
      <text x="310" y="106" text-anchor="middle" class="label" fill="white">Root (Sparse Index)</text>
    </g>
    
    <!-- Arrow to intermediate -->
    <path class="arrow" d="M 310 115 L 310 135" stroke="#d9534f" stroke-width="2"/>
    
    <!-- Intermediate Level -->
    <g class="box-anim" style="animation-delay: 0.3s">
      <rect x="235" y="140" width="150" height="22" rx="4" fill="url(#interGrad)"/>
      <text x="310" y="156" text-anchor="middle" class="label" fill="white">Intermediate Level</text>
    </g>
    
    <!-- Arrows down -->
    <path class="arrow" d="M 265 165 L 265 185" stroke="#d9534f" stroke-width="2"/>
    <path class="arrow" d="M 355 165 L 355 185" stroke="#d9534f" stroke-width="2"/>
    
    <!-- Leaf Level -->
    <g class="box-anim" style="animation-delay: 0.4s">
      <rect x="235" y="190" width="150" height="22" rx="4" fill="url(#leafGrad)"/>
      <text x="310" y="206" text-anchor="middle" class="label" fill="white">Leaf (Dense Index)</text>
    </g>
    
    <!-- Arrow to data -->
    <path class="arrow" d="M 310 215 L 310 235" stroke="#d9534f" stroke-width="2"/>
    
    <!-- Data File -->
    <g class="box-anim" style="animation-delay: 0.5s">
      <rect x="235" y="240" width="150" height="55" rx="4" fill="#fff" stroke="#d9534f" stroke-width="2"/>
      <text x="310" y="260" text-anchor="middle" class="label">Data File</text>
      <text x="310" y="278" text-anchor="middle" class="sublabel" data-narration="Direct access via index">Direct Access</text>
      <text x="310" y="292" text-anchor="middle" class="sublabel">O(log n) efficiency</text>
    </g>
    
    <!-- Key Concept Box -->
    <rect x="230" y="305" width="160" height="60" rx="4" fill="#fff" opacity="0.9"/>
    <text x="310" y="325" text-anchor="middle" class="concept-box" font-weight="bold">Key Concepts:</text>
    <text x="240" y="343" class="concept-box">• Hierarchical structure</text>
    <text x="240" y="359" class="concept-box">• B-Tree / B+ Tree based</text>
  </g>
  
  <!-- Comparison indicator -->
  <g class="pulse-anim" style="transform-origin: 210px 380px;">
    <rect x="120" y="365" width="180" height="25" rx="12" fill="#2c3e50"/>
    <text x="210" y="382" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Multi-Level = Faster!</text>
  </g>
</svg>