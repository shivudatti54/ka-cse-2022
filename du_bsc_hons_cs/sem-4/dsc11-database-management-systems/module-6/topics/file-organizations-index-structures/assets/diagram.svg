<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="file-organizations-index-structures">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .node { animation: fadeIn 0.6s ease-out forwards; }
    .leaf { animation: fadeIn 0.8s ease-out forwards; }
    .arrow { animation: drawLine 1s ease-out forwards; stroke-dasharray: 100; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" style="font-size: 18px; font-weight: bold; fill: #2c5282;">
    B+ Tree Index Structure
  </text>
  <text x="210" y="48" text-anchor="middle" class="title" style="font-size: 11px; fill: #4a5568;">
    File Organizations &amp; Index Structures
  </text>
  
  <!-- Root Node -->
  <g class="node" data-narration="Root Node: Contains key values that guide navigation to child nodes">
    <rect x="170" y="65" width="80" height="28" rx="4" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="210" y="83" text-anchor="middle" fill="white" style="font-size: 14px; font-weight: bold;">25</text>
  </g>
  
  <!-- Arrows from Root -->
  <line x1="190" y1="93" x2="130" y2="125" stroke="#4a5568" stroke-width="1.5" class="arrow" data-narration="Pointer from root to left subtree"/>
  <line x1="230" y1="93" x2="290" y2="125" stroke="#4a5568" stroke-width="1.5" class="arrow" data-narration="Pointer from root to right subtree"/>
  
  <!-- Level 1 - Internal Nodes -->
  <g class="node" data-narration="Internal Nodes: Contain separator keys for directing search">
    <rect x="75" y="130" width="110" height="28" rx="4" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="130" y="148" text-anchor="middle" fill="white" style="font-size: 13px; font-weight: bold;">10</text>
    <text x="160" y="148" text-anchor="middle" fill="white" style="font-size: 13px; font-weight: bold;">15</text>
    
    <rect x="235" y="130" width="110" height="28" rx="4" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="290" y="148" text-anchor="middle" fill="white" style="font-size: 13px; font-weight: bold;">30</text>
    <text x="320" y="148" text-anchor="middle" fill="white" style="font-size: 13px; font-weight: bold;">40</text>
  </g>
  
  <!-- Arrows to Leaf Nodes -->
  <line x1="110" y1="158" x2="60" y2="190" stroke="#4a5568" stroke-width="1.5" class="arrow"/>
  <line x1="145" y1="158" x2="130" y2="190" stroke="#4a5568" stroke-width="1.5" class="arrow"/>
  <line x1="260" y1="158" x2="220" y2="190" stroke="#4a5568" stroke-width="1.5" class="arrow"/>
  <line x1="345" y1="158" x2="340" y2="190" stroke="#4a5568" stroke-width="1.5" class="arrow"/>
  
  <!-- Leaf Nodes -->
  <g class="leaf" data-narration="Leaf Nodes: Contain actual data pointers and are linked horizontally for range queries">
    <rect x="20" y="195" width="80" height="45" rx="4" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="60" y="215" text-anchor="middle" fill="white" style="font-size: 11px;">2</text>
    <text x="60" y="230" text-anchor="middle" fill="white" style="font-size: 9px;">→Rec1</text>
    
    <rect x="105" y="195" width="80" height="45" rx="4" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="145" y="215" text-anchor="middle" fill="white" style="font-size: 11px;">7</text>
    <text x="145" y="230" text-anchor="middle" fill="white" style="font-size: 9px;">→Rec2</text>
    
    <rect x="190" y="195" width="80" height="45" rx="4" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="230" y="215" text-anchor="middle" fill="white" style="font-size: 11px;">12</text>
    <text x="230" y="230" text-anchor="middle" fill="white" style="font-size: 9px;">→Rec3</text>
    
    <rect x="275" y="195" width="80" height="45" rx="4" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="315" y="215" text-anchor="middle" fill="white" style="font-size: 11px;">22</text>
    <text x="315" y="230" text-anchor="middle" fill="white" style="font-size: 9px;">→Rec4</text>
    
    <rect x="360" y="195" width="50" height="45" rx="4" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="385" y="215" text-anchor="middle" fill="white" style="font-size: 11px;">45</text>
    <text x="385" y="230" text-anchor="middle" fill="white" style="font-size: 9px;">→Rec5</text>
  </g>
  
  <!-- Horizontal Leaf Links -->
  <g data-narration="Leaf Node Links: Enable efficient range scans without traversing tree">
    <line x1="100" y1="217" x2="185" y2="217" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3" class="arrow"/>
    <line x1="185" y1="217" x2="270" y2="217" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3" class="arrow"/>
    <line x1="270" y1="217" x2="355" y2="217" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3" class="arrow"/>
    <polygon points="355,217 365,212 365,222" fill="#e53e3e"/>
  </g>
  
  <!-- Concept Boxes -->
  <g class="concept-box" data-narration="Key Concept 1: B+ Trees maintain sorted order for efficient search">
    <rect x="10" y="260" width="125" height="38" rx="4" fill="#fff5f5" stroke="#fc8181" stroke-width="1"/>
    <text x="72" y="275" text-anchor="middle" style="font-size: 10px; font-weight: bold; fill:#c53030;">Balanced Tree</text>
    <text x="72" y="288" text-anchor="middle" style="font-size: 9px; fill:#742a2a;">Height always</text>
    <text x="72" y="298" text-anchor="middle" style="font-size: 9px; fill:#742a2a;">same - O(log n)</text>
  </g>
  
  <g class="concept-box" data-narration="Key Concept 2: All data stored in leaf nodes">
    <rect x="145" y="260" width="130" height="38" rx="4" fill="#f0fff4" stroke="#68d391" stroke-width="1"/>
    <text x="210" y="275" text-anchor="middle" style="font-size: 10px; font-weight: bold; fill:#276749;">Leaf Nodes</text>
    <text x="210" y="288" text-anchor="middle" style="font-size: 9px; fill:#22543d;">Store actual</text>
    <text x="210" y="298" text-anchor="middle" style="font-size: 9px; fill:#22543d;">data pointers</text>
  </g>
  
  <g class="concept-box" data-narration="Key Concept 3: Linked leafs enable fast range queries">
    <rect x="285" y="260" width="125" height="38" rx="4" fill="#ebf8ff" stroke="#63b3ed" stroke-width="1"/>
    <text x="347" y="275" text-anchor="middle" style="font-size: 10px; font-weight: bold; fill:#2b6cb0;">Linked List</text>
    <text x="347" y="288" text-anchor="middle" style="font-size: 9px; fill:#2c5282;">Sequential</text>
    <text x="347" y="298" text-anchor="middle" style="font-size: 9px; fill:#2c5282;">access fast</text>
  </g>
  
  <!-- Additional Info Box -->
  <g class="concept-box" data-narration="B+ Trees are used in modern databases for index implementation">
    <rect x="10" y="305" width="400" height="30" rx="4" fill="#fef3c7" stroke="#f6ad55" stroke-width="1"/>
    <text x="210" y="320" text-anchor="middle" style="font-size: 10px; fill:#92400e;">
      Used in: MySQL, PostgreSQL, Oracle, SQL Server • Optimizes disk I/O • Supports range queries efficiently
    </text>
  </g>
  
  <!-- Legend -->
  <g data-narration="Visual legend explaining the diagram components">
    <circle cx="30" cy="350" r="5" fill="#4a90d9"/>
    <text x="42" y="354" style="font-size: 10px; fill:#4a5568;">Internal</text>
    <circle cx="90" cy="350" r="5" fill="#5cb85c"/>
    <text x="102" y="354" style="font-size: 10px; fill:#4a5568;">Leaf/Data</text>
    <line x1="150" y1="352" x2="180" y2="352" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="190" y="354" style="font-size: 10px; fill:#4a5568;">Leaf Link</text>
  </g>
</svg>