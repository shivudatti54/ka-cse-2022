<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="data-models-dbms-architecture">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#d4e9f7"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="conceptualGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6a5acd"/>
      <stop offset="100%" style="stop-color:#483d8b"/>
    </linearGradient>
    <linearGradient id="internalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2c5f6e"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideRight {
      from { transform: translateX(-10px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .arrow1, .arrow2 { animation: slideRight 0.5s ease-out 0.8s both; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; }
    .schema-box { transition: all 0.3s ease; }
    .schema-box:hover { filter: brightness(1.1); }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">ANSI/SPARC Three-Level Architecture</text>
  
  <!-- External Schema (Top) -->
  <g class="box1" data-narration="The External Level represents individual user views - how different users perceive the database based on their roles">
    <rect x="40" y="50" width="340" height="70" rx="8" fill="url(#externalGrad)" class="schema-box"/>
    <text x="210" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">External Schema</text>
    <text x="210" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#fff">User Level - Individual Views</text>
    <rect x="50" y="102" width="80" height="12" rx="3" fill="#fff" opacity="0.8"/>
    <text x="90" y="111" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#4a6fa5">User View 1</text>
    <rect x="140" y="102" width="80" height="12" rx="3" fill="#fff" opacity="0.8"/>
    <text x="180" y="111" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#4a6fa5">User View 2</text>
    <rect x="230" y="102" width="80" height="12" rx="3" fill="#fff" opacity="0.8"/>
    <text x="270" y="111" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#4a6fa5">User View N</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow1" data-narration="Mapping arrows show how external views connect to the conceptual schema">
    <line x1="210" y1="125" x2="210" y2="145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="260" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666">External/Conceptual Mapping</text>
  </g>
  
  <!-- Conceptual Schema (Middle) -->
  <g class="box2" data-narration="The Conceptual Level provides a unified view of the entire database, representing logical structure and relationships">
    <rect x="40" y="150" width="340" height="70" rx="8" fill="url(#conceptualGrad)" class="schema-box pulse-anim"/>
    <text x="210" y="172" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Conceptual Schema</text>
    <text x="210" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#fff">Logical Structure - Entire Database</text>
    <rect x="60" y="200" width="60" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="90" y="211" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6a5acd">Entities</text>
    <rect x="130" y="200" width="60" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="160" y="211" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6a5acd">Attributes</text>
    <rect x="200" y="200" width="60" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="230" y="211" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6a5acd">Relations</text>
    <rect x="270" y="200" width="60" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="300" y="211" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6a5acd">Constraints</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow2" data-narration="Mapping arrows show how the conceptual schema connects to physical storage">
    <line x1="210" y1="225" x2="210" y2="245" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="260" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#666">Conceptual/Internal Mapping</text>
  </g>
  
  <!-- Internal Schema (Bottom) -->
  <g class="box3" data-narration="The Internal Level describes how data is physically stored - file structures, indexing, storage allocation">
    <rect x="40" y="250" width="340" height="70" rx="8" fill="url(#internalGrad)" class="schema-box"/>
    <text x="210" y="272" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Internal Schema</text>
    <text x="210" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#fff">Physical Storage - Data Access</text>
    <rect x="60" y="300" width="55" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="87" y="311" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#2c5f6e">Storage</text>
    <rect x="125" y="300" width="55" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="152" y="311" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#2c5f6e">Indexes</text>
    <rect x="190" y="300" width="55" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="217" y="311" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#2c5f6e">Files</text>
    <rect x="255" y="300" width="55" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="282" y="311" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#2c5f6e">Records</text>
    <rect x="320" y="300" width="55" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <text x="347" y="311" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#2c5f6e">Paths</text>
  </g>
  
  <!-- Data Independence Box -->
  <g data-narration="Data Independence is the key benefit - changes at one level don't affect other levels">
    <rect x="270" y="330" width="140" height="30" rx="5" fill="#f8e8d0" stroke="#d4a574" stroke-width="1"/>
    <text x="340" y="345" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#8b4513">Data Independence</text>
    <text x="340" y="358" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b4513">Key DBMS Feature</text>
  </g>
  
  <!-- Key Concept Box -->
  <g data-narration="This three-schema architecture provides abstraction, enabling database independence and multiple user views">
    <rect x="10" y="330" width="120" height="30" rx="5" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
    <text x="70" y="342" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">ANSI/SPARC</text>
    <text x="70" y="355" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#2e7d32">1975 Framework</text>
  </g>
  
  <!-- DBMS Label -->
  <text x="210" y="385" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#555">Database Management System Architecture</text>
</svg>