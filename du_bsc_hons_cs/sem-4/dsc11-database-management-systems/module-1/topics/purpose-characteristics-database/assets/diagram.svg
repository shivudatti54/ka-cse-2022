<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="purpose-characteristics-database">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="conceptualGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="internalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="dbmsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fab1a0"/>
      <stop offset="100%" style="stop-color:#e17055"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9"/>
      <stop offset="100%" style="stop-color:#b2bec3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .external-box { animation: slideInUp 0.8s ease-out 0.2s both; }
    .conceptual-box { animation: slideInUp 0.8s ease-out 0.4s both; }
    .internal-box { animation: slideInUp 0.8s ease-out 0.6s both; }
    .dbms-box { animation: slideInDown 0.8s ease-out 0.8s both; }
    .database-box { animation: fadeIn 1s ease-out 1s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .label { animation: fadeIn 0.5s ease-out; }
    .detail-text { animation: fadeIn 0.5s ease-out; }
    .pulse:hover { animation: pulse 1s infinite; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" class="title">Three-Schema Database Architecture</text>
  <line x1="30" y1="42" x2="390" y2="42" stroke="#636e72" stroke-width="1" class="title"/>
  
  <!-- External Schema Box -->
  <g class="external-box" data-narration="External Schema represents the user view layer - how individual users or applications see the data">
    <rect x="30" y="60" width="110" height="70" rx="8" fill="url(#externalGrad)" filter="url(#shadow)"/>
    <text x="85" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">External</text>
    <text x="85" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">Schema</text>
    <text x="85" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">(User View)</text>
  </g>
  
  <!-- Conceptual Schema Box -->
  <g class="conceptual-box" data-narration="Conceptual Schema is the logical view - the global view of the entire database structure">
    <rect x="155" y="60" width="110" height="70" rx="8" fill="url(#conceptualGrad)" filter="url(#shadow)"/>
    <text x="210" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Conceptual</text>
    <text x="210" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Schema</text>
    <text x="210" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f0f0f0">(Logical View)</text>
  </g>
  
  <!-- Internal Schema Box -->
  <g class="internal-box" data-narration="Internal Schema is the physical view - how data is physically stored on computer systems">
    <rect x="280" y="60" width="110" height="70" rx="8" fill="url(#internalGrad)" filter="url(#shadow)"/>
    <text x="335" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Internal</text>
    <text x="335" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Schema</text>
    <text x="335" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f0f0f0">(Physical View)</text>
  </g>
  
  <!-- Arrows from schemas to DBMS -->
  <path d="M85 130 L85 165" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  <path d="M210 130 L210 165" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  <path d="M335 130 L335 165" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  
  <!-- DBMS Engine Box -->
  <g class="dbms-box" data-narration="DBMS Engine manages all interactions between user views and the physical database">
    <rect x="130" y="170" width="160" height="55" rx="8" fill="url(#dbmsGrad)" filter="url(#shadow)"/>
    <text x="210" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">DBMS Engine</text>
    <text x="210" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff5f5">Manages Data Operations</text>
  </g>
  
  <!-- Arrow from DBMS to Database -->
  <path d="M210 225 L210 255" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="205,250 210,260 215,250" fill="#636e72"/>
  
  <!-- Database Box -->
  <g class="database-box" data-narration="The Database contains the actual stored data - the physical collection of records">
    <rect x="130" y="260" width="160" height="55" rx="8" fill="url(#dataGrad)" filter="url(#shadow)"/>
    <text x="210" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Database</text>
    <text x="210" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#636e72">Stored Data Repository</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="label" data-narration="Key characteristics of database systems: data integration, independence, security, and efficiency">
    <rect x="20" y="325" width="380" height="65" rx="6" fill="#ffffff" stroke="#b2bec3" stroke-width="1" opacity="0.9"/>
    <text x="30" y="342" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">Key Database Characteristics:</text>
    <text x="30" y="358" font-family="Arial, sans-serif" font-size="10" fill="#636e72">• Data Integration • Data Independence</text>
    <text x="30" y="372" font-family="Arial, sans-serif" font-size="10" fill="#636e72">• Data Security • Efficient Data Access</text    <text x="200" y="358" font-family="Arial, sans-serif" font-size="10" fill="#636e72">• Data Integrity • Concurrent Access</text>
    <text x="200" y="372" font-family="Arial, sans-serif" font-size="10" fill="#636e72">• Centralized Management</text>
  </g>
  
  <!-- Purpose Labels -->
  <g class="label">
    <text x="42" y="145" font-family="Arial, sans-serif" font-size="9" fill="#636e72" text-anchor="middle">User Level</text>
    <text x="167" y="145" font-family="Arial, sans-serif" font-size="9" fill="#636e72" text-anchor="middle">Logical Level</text>
    <text x="292" y="145" font-family="Arial, sans-serif" font-size="9" fill="#636e72" text-anchor="middle">Physical Level</text>
  </g>
</svg>