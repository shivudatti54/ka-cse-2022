<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="three-schema-data-independence">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe4cc"/>
      <stop offset="100%" style="stop-color:#ffd9b3"/>
    </linearGradient>
    <linearGradient id="conceptualGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f1f9"/>
      <stop offset="100%" style="stop-color:#b8e4f0"/>
    </linearGradient>
    <linearGradient id="internalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e4ecd4"/>
      <stop offset="100%" style="stop-color:#d0e4be"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 15px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box { rx: 8; ry: 8; stroke: #7f8c8d; stroke-width: 1; }
    .arrow { stroke: #e74c3c; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-ani { animation: arrowPulse 2s ease-in-out infinite; }
    .title-ani { animation: fadeIn 0.8s ease-out forwards; }
    .ext-box { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .con-box { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .int-box { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .mapping { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .ind-box { animation: pulse 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-ani">Three-Schema Architecture</text>
  
  <!-- External Schema Layer (User View) -->
  <g class="ext-box" data-narration="External Schema - The highest level showing individual user views">
    <rect x="60" y="55" width="300" height="70" fill="url(#externalGrad)" class="box" filter="url(#shadow)"/>
    <text x="210" y="75" text-anchor="middle" class="label">External Schema</text>
    <text x="210" y="92" text-anchor="middle" class="detail">User View Level</text>
    <text x="210" y="108" text-anchor="middle" class="detail">Individual user perspectives</text>
  </g>
  
  <!-- Arrow down -->
  <g class="mapping">
    <line x1="210" y1="125" x2="210" y2="145" stroke="#e67e22" stroke-width="2"/>
    <polygon points="210,150 205,140 215,140" fill="#e67e22"/>
  </g>
  
  <!-- Conceptual Schema Layer (Logical) -->
  <g class="con-box" data-narration="Conceptual Schema - The middle level representing the entire database structure">
    <rect x="60" y="150" width="300" height="85" fill="url(#conceptualGrad)" class="box" filter="url(#shadow)"/>
    <text x="210" y="172" text-anchor="middle" class="label">Conceptual Schema</text>
    <text x="210" y="190" text-anchor="middle" class="detail">Logical Level - Community View</text>
    <text x="210" y="206" text-anchor="middle" class="detail">Whole database structure &amp; relationships</text>
    <text x="210" y="222" text-anchor="middle" class="detail">DBMS manages this level</text>
  </g>
  
  <!-- Arrow down -->
  <g class="mapping">
    <line x1="210" y1="235" x2="210" y2="255" stroke="#3498db" stroke-width="2"/>
    <polygon points="210,260 205,250 215,250" fill="#3498db"/>
  </g>
  
  <!-- Internal Schema Layer (Physical) -->
  <g class="int-box" data-narration="Internal Schema - The lowest level describing physical storage">
    <rect x="60" y="260" width="300" height="70" fill="url(#internalGrad)" class="box" filter="url(#shadow)"/>
    <text x="210" y="282" text-anchor="middle" class="label">Internal Schema</text>
    <text x="210" y="300" text-anchor="middle" class="detail">Physical Level - Storage View</text>
    <text x="210" y="316" text-anchor="middle" class="detail">File organization, indexing, access paths</text>
  </g>
  
  <!-- Mappings indicators -->
  <g class="mapping">
    <rect x="280" y="150" width="70" height="85" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-dasharray="4"/>
    <text x="315" y="175" text-anchor="middle" class="detail" font-size="9">External</text>
    <text x="315" y="188" text-anchor="middle" class="detail" font-size="9">Conceptual</text>
    <text x="315" y="201" text-anchor="middle" class="detail" font-size="9">Mapping</text>
    <text x="315" y="220" text-anchor="middle" class="detail" font-size="9">(E-C Mapping)</text>
  </g>
  
  <g class="mapping">
    <rect x="280" y="260" width="70" height="70" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-dasharray="4"/>
    <text x="315" y="285" text-anchor="middle" class="detail" font-size="9">Conceptual</text>
    <text x="315" y="298" text-anchor="middle" class="detail" font-size="9">Internal</text>
    <text x="315" y="311" text-anchor="middle" class="detail" font-size="9">Mapping</text>
    <text x="315" y="324" text-anchor="middle" class="detail" font-size="9">(C-I Mapping)</text>
  </g>
  
  <!-- Data Independence Box -->
  <g data-narration="Data Independence - Changes at lower levels don't affect higher levels">
    <rect x="15" y="340" width="180" height="50" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="2" class="ind-box"/>
    <text x="105" y="358" text-anchor="middle" class="label" font-size="13">Data Independence</text>
    <text x="105" y="375" text-anchor="middle" class="detail" font-size="9">Change schema at one level</text>
    <text x="105" y="386" text-anchor="middle" class="detail" font-size="9">without affecting higher levels</text>
  </g>
  
  <!-- Legend for independence types -->
  <g data-narration="Two types: Logical and Physical Data Independence">
    <rect x="210" y="340" width="195" height="50" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
    <text x="307" y="356" text-anchor="middle" class="label" font-size="11">Types of Independence</text>
    <text x="230" y="372" text-anchor="start" class="detail" font-size="9">• Logical: Conceptual ↔ External</text>
    <text x="310" y="372" text-anchor="start" class="detail" font-size="9">• Physical: Internal ↔ Conceptual</text>
  </g>
</svg>