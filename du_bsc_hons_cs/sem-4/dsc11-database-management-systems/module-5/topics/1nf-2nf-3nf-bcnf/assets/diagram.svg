<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="1nf-2nf-3nf-bcnf">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bcnfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tnfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#96fbc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9f586;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="onfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box-bcnf { animation: slideIn 0.6s ease-out 0.1s both; }
    .box-3nf { animation: slideIn 0.6s ease-out 0.2s both; }
    .box-2nf { animation: slideIn 0.6s ease-out 0.3s both; }
    .box-1nf { animation: slideIn 0.6s ease-out 0.4s both; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; transform-origin: center; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Database Normal Forms</text>
  
  <!-- BCNF Box -->
  <g class="box-bcnf" data-narration="BCNF: Boyce-Codd Normal Form - Every FD X→Y must have X as a superkey">
    <rect x="160" y="55" width="100" height="45" rx="8" fill="url(#bcnfGrad)" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">BCNF</text>
    <text x="210" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5a4a42">Superkey for all FDs</text>
  </g>
  
  <!-- Arrow from BCNF to 3NF -->
  <line x1="210" y1="100" x2="210" y2="125" stroke="#e74c3c" stroke-width="2" class="arrow"/>
  <polygon points="210,130 205,120 215,120" fill="#e74c3c"/>
  
  <!-- 3NF Box -->
  <g class="box-3nf" data-narration="3NF: Third Normal Form - No transitive dependencies; each non-key attribute must depend on the primary key">
    <rect x="130" y="130" width="160" height="50" rx="8" fill="url(#tnfGrad)" filter="url(#shadow)"/>
    <text x="210" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">3NF - Third Normal Form</text>
    <text x="210" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a5a5a">No transitive dependencies</text>
  </g>
  
  <!-- Arrow from 3NF to 2NF -->
  <line x1="210" y1="180" x2="210" y2="205" stroke="#e67e22" stroke-width="2" class="arrow"/>
  <polygon points="210,210 205,200 215,200" fill="#e67e22"/>
  
  <!-- 2NF Box -->
  <g class="box-2nf" data-narration="2NF: Second Normal Form - No partial dependencies; non-key attributes must fully depend on the primary key">
    <rect x="100" y="210" width="220" height="50" rx="8" fill="url(#nfGrad)" filter="url(#shadow)"/>
    <text x="210" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">2NF - Second Normal Form</text>
    <text x="210" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a5a5a">No partial dependencies</text>
  </g>
  
  <!-- Arrow from 2NF to 1NF -->
  <line x1="210" y1="260" x2="210" y2="285" stroke="#27ae60" stroke-width="2" class="arrow"/>
  <polygon points="210,290 205,280 215,280" fill="#27ae60"/>
  
  <!-- 1NF Box -->
  <g class="box-1nf" data-narration="1NF: First Normal Form - Atomic values only; no repeating groups or arrays">
    <rect x="70" y="290" width="280" height="50" rx="8" fill="url(#onfGrad)" filter="url(#shadow)"/>
    <text x="210" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">1NF - First Normal Form</text>
    <text x="210" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a5a5a">Atomic values only</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key Concepts: Functional Dependencies determine the normalization level required">
    <rect x="10" y="350" width="400" height="40" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="210" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">
      <tspan font-weight="bold">FD:</tspan> X → Y means X determines Y | 
      <tspan font-weight="bold">Key:</tspan> Minimal attribute set determining all others
    </text>
  </g>
  
  <!-- Inclusion arrow indicator -->
  <g>
    <text x="385" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" transform="rotate(90, 385, 175)">⊂ Inclusion</text>
  </g>
</svg>