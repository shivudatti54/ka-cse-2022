<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="er-to-relational-mapping" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="erGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#99ccff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="relGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8e6b8;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .er-section { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .rel-section { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .arrow-line { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .box1 { animation: slideUp 0.5s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .box2 { animation: slideUp 0.5s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .box3 { animation: slideUp 0.5s ease-out forwards; animation-delay: 0.7s; opacity: 0; }
    .pulse-element { animation: pulse 2s infinite; transform-origin: center; }
    .concept-label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c5282; }
    .subtitle-text { font-family: Arial, sans-serif; font-size: 14px; fill: #4a5568; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="8" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-text">ER-to-Relational Mapping</text>
  <text x="210" y="45" text-anchor="middle" class="title subtitle-text">Conceptual to Logical Design</text>
  
  <!-- ER Model Section (Left) -->
  <g class="er-section" data-narration="The ER Model contains entities, attributes, and relationships represented visually">
    <rect x="15" y="60" width="160" height="145" fill="url(#erGradient)" rx="6" stroke="#4a90d9" stroke-width="2"/>
    <text x="95" y="80" text-anchor="middle" class="concept-label" style="font-weight:bold; font-size:13px;">ER Model</text>
    <line x1="25" y1="88" x2="165" y2="88" stroke="#4a90d9" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Entity box -->
    <rect x="25" y="98" width="55" height="30" fill="#fff" rx="3" stroke="#2c5282" stroke-width="1.5"/>
    <text x="52" y="116" text-anchor="middle" class="concept-label" style="font-size:10px; font-weight:bold;">Entity</text>
    
    <!-- Attribute circle -->
    <ellipse cx="125" cy="113" rx="18" ry="12" fill="#fff" stroke="#805ad5" stroke-width="1.5"/>
    <text x="125" y="117" text-anchor="middle" class="concept-label" style="font-size:9px;">Attr</text>
    
    <!-- Relationship diamond -->
    <polygon points="52,155 75,165 52,175 29,165" fill="#fff" stroke="#d69e2e" stroke-width="1.5"/>
    <text x="52" y="168" text-anchor="middle" class="concept-label" style="font-size:8px;">Rel</text>
    
    <text x="95" y="190" text-anchor="middle" class="concept-label" style="font-size:10px; fill:#666;">High-Level Design</text>
  </g>
  
  <!-- Arrow -->
  <g class="arrow-line">
    <line x1="180" y1="130" x2="235" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="207" y="122" text-anchor="middle" class="concept-label" style="font-size:10px; fill:#666;">Mapping</text>
  </g>
  
  <!-- Relational Schema Section (Right) -->
  <g class="rel-section" data-narration="The Relational Schema uses tables with columns, primary keys, and foreign keys">
    <rect x="240" y="60" width="165" height="145" fill="url(#relGradient)" rx="6" stroke="#48bb78" stroke-width="2"/>
    <text x="322" y="80" text-anchor="middle" class="concept-label" style="font-weight:bold; font-size:13px;">Relational Schema</text>
    <line x1="250" y1="88" x2="395" y2="88" stroke="#48bb78" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Table representation -->
    <rect x="255" y="100" width="135" height="40" fill="#fff" rx="2" stroke="#22543d" stroke-width="1.5"/>
    <line x1="255" y1="118" x2="390" y2="118" stroke="#22543d" stroke-width="1"/>
    <text x="260" y="114" class="concept-label" style="font-size:9px; font-weight:bold;">STUDENT</text>
    <text x="260" y="132" class="concept-label" style="font-size:8px;">PK Student_ID</text>
    <text x="320" y="132" class="concept-label" style="font-size:8px;">Name</text>
    <text x="365" y="132" class="concept-label" style="font-size:8px;">Age</text>
    
    <!-- FK indicator -->
    <rect x="255" y="148" width="135" height="20" fill="#fff5f5" rx="2" stroke="#e53e3e" stroke-width="1"/>
    <text x="260" y="162" class="concept-label" style="font-size:9px;">Foreign Key (FK)</text>
    
    <text x="322" y="190" text-anchor="middle" class="concept-label" style="font-size:10px; fill:#666;">Table-Based Design</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="box1" data-narration="Regular entities map directly to tables with the primary key preserved">
    <rect x="15" y="215" width="120" height="50" fill="#fff" rx="4" stroke="#4a90d9" stroke-width="1.5"/>
    <text x="75" y="230" text-anchor="middle" class="concept-label" style="font-weight:bold; font-size:11px;">Regular Entity</text>
    <text x="75" y="245" text-anchor="middle" class="concept-label" style="font-size:10px;">→ Table + PK</text>
    <text x="75" y="258" text-anchor="middle" class="concept-label" style="font-size:9px; fill:#666;">STUDENT(ID, Name)</text>
  </g>
  
  <g class="box2" data-narration="Weak entities require a composite key combining owner PK with partial key">
    <rect x="145" y="215" width="130" height="50" fill="#fff" rx="4" stroke="#805ad5" stroke-width="1.5"/>
    <text x="210" y="230" text-anchor="middle" class="concept-label" style="font-weight:bold; font-size:11px;">Weak Entity</text>
    <text x="210" y="245" text-anchor="middle" class="concept-label" style="font-size:10px;">→ Table + Composite PK</text>
    <text x="210" y="258" text-anchor="middle" class="concept-label" style="font-size:9px; fill:#666;">DEP(empID, depID)</text>
  </g>
  
  <g class="box3" data-narration="Multi-valued attributes create separate tables with foreign keys">
    <rect x="285" y="215" width="120" height="50" fill="#fff" rx="4" stroke="#d69e2e" stroke-width="1.5"/>
    <text x="345" y="230" text-anchor="middle" class="concept-label" style="font-weight:bold; font-size:11px;">Multi-valued</text>
    <text x="345" y="245" text-anchor="middle" class="concept-label" style="font-size:10px;">→ Separate Table + FK</text>
    <text x="345" y="258" text-anchor="middle" class="concept-label" style="font-size:9px; fill:#666;">Phone(sid, phone)</text>
  </g>
  
  <!-- Bottom Rules Section -->
  <g class="box1" data-narration="Key mapping rules summary showing how each ER construct transforms">
    <rect x="15" y="275" width="390" height="110" fill="#fafafa" rx="5" stroke="#cbd5e0" stroke-width="1"/>
    <text x="210" y="292" text-anchor="middle" class="concept-label" style="font-weight:bold; font-size:12px;">Mapping Rules Summary</text>
    
    <line x1="25" y1="300" x2="405" y2="300" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Rule 1 -->
    <circle cx="35" cy="320" r="8" fill="#4a90d9"/>
    <text x="35" y="324" text-anchor="middle" fill="#fff" style="font-size:10px; font-weight:bold;">1</text>
    <text x="50" y="322" class="concept-label" style="font-size:10px;">Simple Attr → Column</text>
    
    <!-- Rule 2 -->
    <circle cx="35" cy="345" r="8" fill="#805ad5"/>
    <text x="35" y="349" text-anchor="middle" fill="#fff" style="font-size:10px; font-weight:bold;">2</text>
    <text x="50" y="347" class="concept-label" style="font-size:10px;">Composite → Component Columns</text>
    
    <!-- Rule 3 -->
    <circle cx="200" cy="320" r="8" fill="#48bb78"/>
    <text x="200" y="324" text-anchor="middle" fill="#fff" style="font-size:10px; font-weight:bold;">3</text>
    <text x="215" y="322" class="concept-label" style="font-size:10px;">1:1 → FK in any table</text>
    
    <!-- Rule 4 -->
    <circle cx="200" cy="345" r="8" fill="#ed8936"/>
    <text x="200" y="349" text-anchor="middle" fill="#fff" style="font-size:10px; font-weight:bold;">4</text>
    <text x="215" y="347" class="concept-label" style="font-size:10px;">1:N → FK on N-side</text>
    
    <!-- Rule 5 -->
    <circle cx="360" cy="332" r="8" fill="#e53e3e"/>
    <text x="360" y="336" text-anchor="middle" fill="#fff" style="font-size:10px; font-weight:bold;">5</text>
    <text x="375" y="334" class="concept-label" style="font-size:10px;">M:N → New Relation</text>
  </g>
</svg>