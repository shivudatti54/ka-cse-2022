<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="functional-dependencies">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5"/>
      <stop offset="100%" style="stop-color:#a7f3d0"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #1e3a5f; }
    .label { font-family: Arial, sans-serif; font-size: 16px; fill: #374151; }
    .sublabel { font-family: Arial, sans-serif; font-size: 12px; fill: #6b7280; }
    .definition { font-family: Arial, sans-serif; font-size: 13px; fill: #1f2937; }
    .box-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #1e3a5f; }
    .animate-fade { animation: fadeIn 1s ease-out forwards; }
    .animate-slide { animation: slideIn 0.8s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-up { animation: slideUp 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <text x="210" y="35" text-anchor="middle" class="title animate-fade">Functional Dependencies</text>
  <line x1="80" y1="50" x2="340" y2="50" stroke="#6366f1" stroke-width="2" stroke-linecap="round" class="animate-slide"/>
  
  <!-- Main Definition Box -->
  <g data-narration="Definition of Functional Dependency">
    <rect x="30" y="65" width="360" height="70" rx="8" fill="url(#boxGradient1)" stroke="#f59e0b" stroke-width="1" class="animate-up" style="animation-delay: 0.2s"/>
    <text x="45" y="82" class="box-title">Definition:</text>
    <text x="45" y="100" class="definition">A → B holds if t1[A] = t2[A] then t1[B] = t2[B]</text>
    <text x="45" y="118" class="sublabel">For every pair of tuples with same A values, B values must match</text>
  </g>
  
  <!-- Visual Representation Section -->
  <g data-narration="Visual representation of FD with X determining Y">
    <!-- Left Box - Determinant -->
    <rect x="50" y="150" width="100" height="60" rx="8" fill="url(#boxGradient2)" stroke="#3b82f6" stroke-width="2" class="animate-up" style="animation-delay: 0.4s"/>
    <text x="100" y="175" text-anchor="middle" class="label" font-weight="bold">X</text>
    <text x="100" y="192" text-anchor="middle" class="sublabel">(Determinant)</text>
    <text x="100" y="206" text-anchor="middle" class="sublabel">Left Side</text>
    
    <!-- Arrow -->
    <g class="animate-slide" style="animation-delay: 0.6s">
      <line x1="155" y1="180" x2="240" y2="180" stroke="url(#arrowGradient)" stroke-width="4" stroke-linecap="round"/>
      <polygon points="240,175 255,180 240,185" fill="#8b5cf6"/>
    </g>
    
    <!-- Right Box - Dependent -->
    <rect x="255" y="150" width="100" height="60" rx="8" fill="url(#boxGradient3)" stroke="#10b981" stroke-width="2" class="animate-up" style="animation-delay: 0.5s"/>
    <text x="305" y="175" text-anchor="middle" class="label" font-weight="bold">Y</text>
    <text x="305" y="192" text-anchor="middle" class="sublabel">(Dependent)</text>
    <text x="305" y="206" text-anchor="middle" class="sublabel">Right Side</text>
  </g>
  
  <!-- Example Section -->
  <g data-narration="Concrete example showing SSN determines Name">
    <rect x="30" y="225" width="360" height="55" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" class="animate-up" style="animation-delay: 0.7s"/>
    <text x="45" y="245" class="box-title">Example: SSN → Name</text>
    <text x="45" y="262" class="sublabel">If two people have the same SSN, they must have the same Name</text>
    <text x="290" y="262" class="sublabel animate-pulse" style="animation-delay: 1s">Key Identifier</text>
  </g>
  
  <!-- Tuple Visualization -->
  <g data-narration="Visual example of tuples showing FD in action">
    <rect x="30" y="290" width="175" height="90" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1" class="animate-up" style="animation-delay: 0.8s"/>
    <text x="45" y="310" class="label" font-size="12" font-weight="bold">Relation R</text>
    
    <!-- Table header -->
    <rect x="45" y="320" width="30" height="18" fill="#e0e7ff" rx="2"/>
    <rect x="77" y="320" width="50" height="18" fill="#e0e7ff" rx="2"/>
    <text x="60" y="333" text-anchor="middle" class="sublabel" font-size="10" font-weight="bold">SSN</text>
    <text x="102" y="333" text-anchor="middle" class="sublabel" font-size="10" font-weight="bold">Name</text>
    
    <!-- Tuple 1 -->
    <rect x="45" y="340" width="30" height="16" fill="#f3f4f6" rx="2"/>
    <rect x="77" y="340" width="50" height="16" fill="#f3f4f6" rx="2"/>
    <text x="60" y="352" text-anchor="middle" class="sublabel" font-size="10">123</text>
    <text x="102" y="352" text-anchor="middle" class="sublabel" font-size="10">Alice</text>
    
    <!-- Tuple 2 -->
    <rect x="45" y="358" width="30" height="16" fill="#f3f4f6" rx="2"/>
    <rect x="77" y="358" width="50" height="16" fill="#f3f4f6" rx="2"/>
    <text x="60" y="370" text-anchor="middle" class="sublabel" font-size="10">123</text>
    <text x="102" y="370" text-anchor="middle" class="sublabel" font-size="10">Alice</text>
  </g>
  
  <!-- Key Concept Box -->
  <g data-narration="Connection to normalization and database design">
    <rect x="215" y="290" width="175" height="90" rx="8" fill="url(#boxGradient2)" stroke="#3b82f6" stroke-width="1" class="animate-up" style="animation-delay: 0.9s"/>
    <text x="230" y="310" class="box-title">Why FDs Matter</text>
    <text x="230" y="328" class="sublabel">• Identifies primary keys</text>
    <text x="230" y="344" class="sublabel">• Guides decomposition</text>
    <text x="230" y="360" class="sublabel">• Prevents anomalies</text>
    <text x="230" y="376" class="sublabel">• Enables normalization</text>
  </g>
  
  <!-- Footer -->
  <text x="210" y="395" text-anchor="middle" class="sublabel" font-size="10">Foundation of Relational Database Design</text>
</svg>