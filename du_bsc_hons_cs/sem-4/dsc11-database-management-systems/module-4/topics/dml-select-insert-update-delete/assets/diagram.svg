<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dml-select-insert-update-delete">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0f2e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4472c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#548235;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e69a00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c55a11;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a4430c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInLeft 0.6s ease-out 0.35s forwards; opacity: 0; }
    .box3 { animation: slideInLeft 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box4 { animation: slideInLeft 0.6s ease-out 0.65s forwards; opacity: 0; }
    .flow-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .flow-box:nth-child(1) { animation-delay: 0.8s; }
    .flow-box:nth-child(2) { animation-delay: 1.0s; }
    .flow-box:nth-child(3) { animation-delay: 1.2s; }
    .flow-box:nth-child(4) { animation-delay: 1.4s; }
    .flow-box:nth-child(5) { animation-delay: 1.6s; }
    .flow-box:nth-child(6) { animation-delay: 1.8s; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; cursor: pointer; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">DML Operations</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e">SELECT, INSERT, UPDATE, DELETE</text>
  
  <!-- DML Operation Boxes - Left Side -->
  <g data-narration="SELECT: Retrieves data from database tables using FROM, WHERE, GROUP BY, HAVING, SELECT, ORDER BY clauses">
    <rect x="15" y="65" width="90" height="45" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)" class="box1 pulse"/>
    <text x="60" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">SELECT</text>
    <text x="60" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Retrieve Data</text>
  </g>
  
  <g data-narration="INSERT: Adds new rows of data into a database table">
    <rect x="15" y="120" width="90" height="45" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" class="box2 pulse"/>
    <text x="60" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">INSERT</text>
    <text x="60" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Add Data</text>
  </g>
  
  <g data-narration="UPDATE: Modifies existing data in database tables">
    <rect x="15" y="175" width="90" height="45" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)" class="box3 pulse"/>
    <text x="60" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">UPDATE</text>
    <text x="60" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Modify Data</text>
  </g>
  
  <g data-narration="DELETE: Removes existing rows from database tables">
    <rect x="15" y="230" width="90" height="45" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)" class="box4 pulse"/>
    <text x="60" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">DELETE</text>
    <text x="60" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Remove Data</text>
  </g>
  
  <!-- SELECT Execution Flow - Right Side -->
  <text x="220" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">SELECT Execution Flow</text>
  
  <!-- Flow boxes -->
  <g class="flow-box">
    <rect x="130" y="85" width="270" height="32" rx="5" fill="#d5e8f7" stroke="#5b9bd5" stroke-width="1"/>
    <text x="265" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">1. FROM - Source Table(s)</text>
  </g>
  
  <g class="flow-box">
    <rect x="130" y="125" width="270" height="32" rx="5" fill="#e8f5e9" stroke="#70ad47" stroke-width="1"/>
    <text x="265" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">2. WHERE - Filter Rows</text>
  </g>
  
  <g class="flow-box">
    <rect x="130" y="165" width="270" height="32" rx="5" fill="#fff8e1" stroke="#ffc000" stroke-width="1"/>
    <text x="265" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">3. GROUP BY - Group Results</text>
  </g>
  
  <g class="flow-box">
    <rect x="130" y="205" width="270" height="32" rx="5" fill="#fce4ec" stroke="#c55a11" stroke-width="1"/>
    <text x="265" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">4. HAVING - Filter Groups</text>
  </g>
  
  <g class="flow-box">
    <rect x="130" y="245" width="270" height="32" rx="5" fill="#e3f2fd" stroke="#4472c4" stroke-width="1"/>
    <text x="265" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">5. SELECT - Choose Columns</text>
  </g>
  
  <g class="flow-box">
    <rect x="130" y="285" width="270" height="32" rx="5" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1"/>
    <text x="265" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">6. ORDER BY - Sort Results</text>
  </g>
  
  <!-- Connecting Arrows -->
  <path d="M265 117 L265 125" stroke="#5d6d7e" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M265 157 L265 165" stroke="#5d6d7e" stroke-width="2" class="arrow"/>
  <path d="M265 197 L265 205" stroke="#5d6d7e" stroke-width="2" class="arrow"/>
  <path d="M265 237 L265 245" stroke="#5d6d7e" stroke-width="2" class="arrow"/>
  <path d="M265 277 L265 285" stroke="#5d6d7e" stroke-width="2" class="arrow"/>
  
  <!-- Key Syntax Box -->
  <g data-narration="Basic SQL syntax example showing SELECT statement structure">
    <rect x="15" y="290" width="90" height="40" rx="5" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="60" y="306" text-anchor="middle" font-family="monospace" font-size="9" fill="#27ae60">SELECT * FROM</text>
    <text x="60" y="320" text-anchor="middle" font-family="monospace" font-size="9" fill="#27ae60">table_name;</text>
  </g>
  
  <!-- Arrow from DML to Flow -->
  <path d="M105 87 L130 100" stroke="#3498db" stroke-width="2" stroke-dasharray="4,2" class="arrow"/>
  <polygon points="128,98 130,104 136,100" fill="#3498db"/>
  
  <!-- Bottom info -->
  <rect x="15" y="345" width="390" height="40" rx="5" fill="rgba(255,255,255,0.7)" stroke="#bdc3c7"/>
  <text x="210" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">Data Manipulation Language (DML) is used to manage</text>
  <text x="210" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">data in relational databases • Supported by MySQL, PostgreSQL, Oracle</text>
</svg>