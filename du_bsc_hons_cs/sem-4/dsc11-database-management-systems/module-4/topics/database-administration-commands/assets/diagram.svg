<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="database-administration-commands">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#449d44"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#ec971f"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9534f"/>
      <stop offset="100%" style="stop-color:#c9302c"/>
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-10deg) scale(0.8); opacity: 0; }
      to { transform: rotate(0) scale(1); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; }
    .box { animation: slideIn 0.6s ease-out backwards; }
    .box1 { animation-delay: 0.1s; }
    .box2 { animation-delay: 0.2s; }
    .box3 { animation-delay: 0.3s; }
    .box4 { animation-delay: 0.4s; }
    .box5 { animation-delay: 0.5s; }
    .arrow { animation: fadeIn 0.8s ease-out 0.6s backwards; }
    .pulse:hover { animation: pulse 1s infinite; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.3s backwards; }
    text { fill: #333; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" font-family="Arial, sans-serif" class="title" fill="#2c3e50">MySQL User Privilege</text>
  <text x="210" y="50" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" class="title" fill="#5a6c7d">Lifecycle</text>
  
  <!-- Box 1: CREATE USER -->
  <g class="box box1" data-narration="The CREATE USER command creates a new MySQL account with specified username and host">
    <rect x="30" y="80" width="100" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="80" y="100" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial, sans-serif" fill="white">CREATE USER</text>
    <text x="80" y="118" text-anchor="middle" font-size="9" font-family="Arial, sans-serif" fill="#e8f4fc">New account</text>
  </g>
  
  <!-- Arrow 1 -->
  <path class="arrow" d="M140 95 L175 95" stroke="#4a90d9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <polygon class="arrow" points="175,90 185,95 175,100" fill="#4a90d9"/>
  
  <!-- Box 2: GRANT -->
  <g class="box box2" data-narration="The GRANT command assigns specific privileges to the user at global, database, or table level">
    <rect x="185" y="80" width="100" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="235" y="100" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial, sans-serif" fill="white">GRANT</text>
    <text x="235" y="118" text-anchor="middle" font-size="9" font-family="Arial, sans-serif" fill="#e8f4fc">Assign privileges</text>
  </g>
  
  <!-- Arrow 2 -->
  <path class="arrow" d="M295 95 L330 95" stroke="#5cb85c" stroke-width="2" fill="none"/>
  <polygon class="arrow" points="330,90 340,95 330,100" fill="#5cb85c"/>
  
  <!-- Box 3: FLUSH PRIVILEGES -->
  <g class="box box3" data-narration="FLUSH PRIVILEGES reloads the grant tables from the mysql database to apply changes">
    <rect x="340" y="80" width="70" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="375" y="98" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial, sans-serif" fill="white">FLUSH</text>
    <text x="375" y="112" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial, sans-serif" fill="white">PRIVILEGES</text>
    <text x="375" y="126" text-anchor="middle" font-size="8" font-family="Arial, sans-serif" fill="#fff3cd">Reload</text>
  </g>
  
  <!-- Arrow 3 -->
  <path class="arrow" d="M375 135 L375 170" stroke="#f0ad4e" stroke-width="2" fill="none"/>
  <polygon class="arrow" points="370,170 375,180 380,170" fill="#f0ad4e"/>
  
  <!-- Box 4: REVOKE (Optional) -->
  <g class="box box4" data-narration="REVOKE removes specific privileges from a user without deleting the account">
    <rect x="320" y="180" width="110" height="55" rx="8" fill="url(#boxGradient5)" filter="url(#shadow)"/>
    <text x="375" y="200" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial, sans-serif" fill="white">REVOKE</text>
    <text x="375" y="218" text-anchor="middle" font-size="9" font-family="Arial, sans-serif" fill="#e8daef">Remove privileges</text>
  </g>
  
  <!-- Arrow 4 -->
  <path class="arrow" d="M320 195 L280 195 L280 230 L340 230" stroke="#9b59b6" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <polygon class="arrow" points="340,225 350,230 340,235" fill="#9b59b6"/>
  
  <!-- Box 5: DROP USER -->
  <g class="box box5" data-narration="DROP USER permanently deletes the user account and all associated privileges">
    <rect x="30" y="180" width="100" height="55" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="80" y="200" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial, sans-serif" fill="white">DROP USER</text>
    <text x="80" y="218" text-anchor="middle" font-size="9" font-family="Arial, sans-serif" fill="#f5cccc">Delete account</text>
  </g>
  
  <!-- Arrow 5 (loop back) -->
  <path class="arrow" d="M80 235 L80 280 L210 280 L210 310 L185 310 L195 300 L235 300 L245 310 L255 310 L255 295" stroke="#d9534f" stroke-width="2" fill="none"/>
  <polygon class="arrow" points="255,290 265,300 255,310" fill="#d9534f"/>
  
  <!-- Cycle indicator -->
  <circle cx="210" cy="330" r="25" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3" class="pulse"/>
  <text x="210" y="325" text-anchor="middle" font-size="11" font-family="Arial, sans-serif" fill="#3498db" font-weight="bold">CYCLE</text>
  <text x="210" y="340" text-anchor="middle" font-size="9" font-family="Arial, sans-serif" fill="#3498db">Complete</text>
  
  <!-- Host types info -->
  <g class="subtitle">
    <text x="210" y="370" text-anchor="middle" font-size="10" font-family="Arial, sans-serif" fill="#666">Host: 'localhost' | '%' | '192.168.1.100'</text>
  </g>
</svg>