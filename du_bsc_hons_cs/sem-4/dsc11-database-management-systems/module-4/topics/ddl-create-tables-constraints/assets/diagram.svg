<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="ddl-create-tables-constraints">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#449d44"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#ec971f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 2px #4a90d9); }
      50% { filter: drop-shadow(0 0 8px #4a90d9); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .section4 { animation: slideInUp 0.6s ease-out 0.8s both; }
    .constraint-box { animation: pulse 3s ease-in-out infinite; }
    .arrow { animation: pulseGlow 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle" class="title">DDL: CREATE TABLE</text>
  <text x="210" y="50" font-family="Arial, sans-serif" font-size="14" fill="#5a6c7d" text-anchor="middle" class="title">and Constraints</text>
  
  <!-- Main Syntax Box -->
  <g class="section1" data-narration="The CREATE TABLE statement structure showing all key components">
    <rect x="30" y="70" width="360" height="120" rx="8" fill="white" stroke="#b0c4de" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="88" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">SQL Syntax Structure</text>
    
    <!-- CREATE keyword -->
    <rect x="45" y="100" width="70" height="28" rx="4" fill="url(#boxGradient1)"/>
    <text x="80" y="119" font-family="monospace" font-size="12" fill="white" text-anchor="middle" font-weight="bold">CREATE</text>
    
    <!-- TABLE keyword -->
    <rect x="120" y="100" width="55" height="28" rx="4" fill="url(#boxGradient1)"/>
    <text x="147" y="119" font-family="monospace" font-size="12" fill="white" text-anchor="middle" font-weight="bold">TABLE</text>
    
    <!-- Table Name -->
    <rect x="180" y="100" width="80" height="28" rx="4" fill="url(#boxGradient2)"/>
    <text x="220" y="119" font-family="monospace" font-size="12" fill="white" text-anchor="middle" font-weight="bold">table_name</text>
    
    <!-- Opening Paren -->
    <text x="270" y="118" font-family="monospace" font-size="16" fill="#2c3e50" font-weight="bold">(</text>
    
    <!-- Column defs placeholder -->
    <rect x="290" y="102" width="85" height="24" rx="3" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="332" y="118" font-family="monospace" font-size="9" fill="#7f8c8d" text-anchor="middle">column defs...</text>
    
    <!-- Closing Paren -->
    <text x="55" y="148" font-family="monospace" font-size="16" fill="#2c3e50" font-weight="bold">);</text>
    
    <!-- Arrow indicating flow -->
    <path d="M 45 140 Q 45 155 80 160 Q 115 165 115 180" stroke="#4a90d9" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Column Definition Detail -->
  <g class="section2" data-narration="Column definition includes column name, data type, and optional constraints">
    <rect x="30" y="195" width="175" height="70" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="117" y="212" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" text-anchor="middle" font-weight="bold">Column Definition</text>
    <text x="117" y="230" font-family="monospace" font-size="10" fill="#2c3e50" text-anchor="middle">column_name</text>
    <text x="117" y="246" font-family="monospace" font-size="10" fill="#7f8c8d" text-anchor="middle">datatype</text>
    <text x="117" y="258" font-family="monospace" font-size="10" fill="#e74c3c" text-anchor="middle">constraint</text>
  </g>
  
  <!-- Data Types Box -->
  <g class="section3" data-narration="Common SQL data types include CHAR, VARCHAR, INT, and FLOAT">
    <rect x="215" y="195" width="175" height="70" rx="6" fill="white" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="302" y="212" font-family="Arial, sans-serif" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="bold">Data Types</text>
    <text x="302" y="232" font-family="monospace" font-size="9" fill="#2c3e50" text-anchor="middle">CHAR(n) — Fixed length</text>
    <text x="302" y="246" font-family="monospace" font-size="9" fill="#2c3e50" text-anchor="middle">VARCHAR(n) — Variable</text>
    <text x="302" y="258" font-family="monospace" font-size="9" fill="#2c3e50" text-anchor="middle">INT, FLOAT — Numbers</text>
  </g>
  
  <!-- Constraints Section -->
  <g class="section4" data-narration="Six primary constraints enforce data integrity: NOT NULL, UNIQUE, PRIMARY KEY, FOREIGN KEY, CHECK, and DEFAULT">
    <rect x="30" y="275" width="360" height="110" rx="8" fill="white" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="292" font-family="Arial, sans-serif" font-size="13" fill="#9b59b6" text-anchor="middle" font-weight="bold">SQL Constraints</text>
    
    <!-- Constraint boxes in a row -->
    <g class="constraint-box">
      <rect x="45" y="305" width="50" height="25" rx="3" fill="#e74c3c"/>
      <text x="70" y="321" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">NOT NULL</text>
    </g>
    
    <g class="constraint-box" style="animation-delay: 0.3s">
      <rect x="100" y="305" width="50" height="25" rx="3" fill="#3498db"/>
      <text x="125" y="321" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">UNIQUE</text>
    </g>
    
    <g class="constraint-box" style="animation-delay: 0.6s">
      <rect x="155" y="305" width="75" height="25" rx="3" fill="#2ecc71"/>
      <text x="192" y="321" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">PRIMARY KEY</text>
    </g>
    
    <g class="constraint-box" style="animation-delay: 0.9s">
      <rect x="235" y="305" width="75" height="25" rx="3" fill="#f39c12"/>
      <text x="272" y="321" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">FOREIGN KEY</text>
    </g>
    
    <g class="constraint-box" style="animation-delay: 1.2s">
      <rect x="315" y="305" width="60" height="25" rx="3" fill="#1abc9c"/>
      <text x="345" y="321" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">CHECK</text>
    </g>
    
    <!-- Second row -->
    <g class="constraint-box" style="animation-delay: 1.5s">
      <rect x="100" y="335" width="60" height="25" rx="3" fill="#9b59b6"/>
      <text x="130" y="351" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">DEFAULT</text>
    </g>
    
    <!-- Key indicator -->
    <circle cx="380" cy="375" r="8" fill="#27ae60"/>
    <text x="380" y="379" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">6</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="25" r="15" fill="#ecf0f1" opacity="0.5"/>
  <circle cx="25" cy="375" r="20" fill="#ecf0f1" opacity="0.4"/>
  <rect x="15" y="365" width="25" height="25" rx="4" fill="#b0c4de" opacity="0.3"/>
  
</svg>