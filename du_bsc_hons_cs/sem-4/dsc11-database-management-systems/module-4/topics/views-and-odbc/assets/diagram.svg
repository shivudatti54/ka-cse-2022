<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="views-and-odbc" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="viewGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fb8d4"/>
    </linearGradient>
    <linearGradient id="odbcGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8b8"/>
      <stop offset="100%" style="stop-color:#a8d48c"/>
    </linearGradient>
    <linearGradient id="driverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#d4a86c"/>
    </linearGradient>
    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e8"/>
      <stop offset="100%" style="stop-color:#a88cd4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .view-box { animation: slideInLeft 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .odbc-layer { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
    .layer-1 { animation-delay: 0.3s; }
    .layer-2 { animation-delay: 0.5s; }
    .layer-3 { animation-delay: 0.7s; }
    .layer-4 { animation-delay: 0.9s; }
    .connector { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; }
    .concept-box { animation: fadeIn 0.8s ease-out forwards; animation-delay: 1s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5aa0" class="title">Views and ODBC</text>
  
  <!-- Views Section (Left Side) -->
  <g class="view-box">
    <rect x="15" y="50" width="180" height="160" fill="url(#viewGradient)" rx="8" filter="url(#shadow)"/>
    <text x="105" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a3a5c">Views</text>
    <text x="25" y="90" font-family="Arial" font-size="11" fill="#2c5aa0">Virtual table based on</text>
    <text x="25" y="105" font-family="Arial" font-size="11" fill="#2c5aa0">SQL query result</text>
    
    <!-- Simple View Box -->
    <rect x="25" y="115" width="70" height="30" fill="#fff" rx="4" stroke="#5a9bc4"/>
    <text x="60" y="132" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a5c">Simple View</text>
    <text x="60" y="143" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1 table</text>
    
    <!-- Complex View Box -->
    <rect x="105" y="115" width="70" height="30" fill="#fff" rx="4" stroke="#5a9bc4"/>
    <text x="140" y="132" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a5c">Complex View</text>
    <text x="140" y="143" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Multiple tables/JOINs</text>
    
    <text x="25" y="175" font-family="Arial" font-size="10" fill="#2c5aa0">• No physical storage</text>
    <text x="25" y="190" font-family="Arial" font-size="10" fill="#2c5aa0">• Dynamic data access</text>
    <text x="25" y="205" font-family="Arial" font-size="10" fill="#2c5aa0">• Security abstraction</text>
  </g>
  
  <!-- ODBC Architecture (Right Side) -->
  <g data-narration="ODBC Architecture showing four layers from application to database">
    <text x="280" y="50" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c5aa0">ODBC Architecture</text>
    
    <!-- Layer 1: Application -->
    <rect x="220" y="65" width="180" height="50" fill="#fff" rx="6" filter="url(#shadow)" class="odbc-layer layer-1"/>
    <text x="310" y="82" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a3a5c">Application Program</text>
    <text x="310" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Makes API calls</text>
    
    <!-- Arrow 1 -->
    <path d="M310 115 L310 135" stroke="#4a7c4e" stroke-width="2" fill="none" class="connector"/>
    <polygon points="310,140 306,130 314,130" fill="#4a7c4e"/>
    
    <!-- Layer 2: Driver Manager -->
    <rect x="220" y="145" width="180" height="50" fill="url(#odbcGradient)" rx="6" filter="url(#shadow)" class="odbc-layer layer-2"/>
    <text x="310" y="162" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a3a5c">Driver Manager</text>
    <text x="310" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c5aa0">odbc32.dll</text>
    
    <!-- Arrow 2 -->
    <path d="M310 195 L310 215" stroke="#4a7c4e" stroke-width="2" fill="none" class="connector"/>
    <polygon points="310,220 306,210 314,210" fill="#4a7c4e"/>
    
    <!-- Layer 3: ODBC Driver -->
    <rect x="220" y="225" width="180" height="50" fill="url(#driverGradient)" rx="6" filter="url(#shadow)" class="odbc-layer layer-3"/>
    <text x="310" y="242" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a3a5c">ODBC Driver</text>
    <text x="310" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c5aa0">DBMS-specific</text>
    
    <!-- Arrow 3 -->
    <path d="M310 275 L310 295" stroke="#4a7c4e" stroke-width="2" fill="none" class="connector"/>
    <polygon points="310,300 306,290 314,290" fill="#4a7c4e"/>
    
    <!-- Layer 4: Data Source -->
    <rect x="220" y="305" width="180" height="50" fill="url(#dbGradient)" rx="6" filter="url(#shadow)" class="odbc-layer layer-4"/>
    <text x="310" y="322" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a3a5c">Data Source</text>
    <text x="310" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c5aa0">Database</text>
  </g>
  
  <!-- Key Concept Box at Bottom -->
  <g class="concept-box">
    <rect x="15" y="235" width="180" height="80" fill="#fff8e8" rx="6" stroke="#d4a86c" stroke-width="1"/>
    <text x="105" y="252" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#8b6914">Key Connection</text>
    <text x="25" y="270" font-family="Arial" font-size="10" fill="#5a4a1a">Views provide data</text>
    <text x="25" y="282" font-family="Arial" font-size="10" fill="#5a4a1a">abstraction without</text>
    <text x="25" y="294" font-family="Arial" font-size="10" fill="#5a4a1a">physical storage</text>
    <text x="25" y="306" font-family="Arial" font-size="10" fill="#5a4a1a">ODBC enables</text>
    <text x="25" y="318" font-family="Arial" font-size="10" fill="#5a4a1a">cross-platform access</text>
  </g>
  
  <!-- Legend/Info Box -->
  <g class="concept-box">
    <rect x="220" y="365" width="180" height="25" fill="#f0f8f0" rx="4" stroke="#90b890"/>
    <text x="310" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c5a2c">Client-Server Architecture</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="375" r="5" fill="#8fb8d4" class="pulse-anim"/>
  <circle cx="390" cy="375" r="5" fill="#a8d48c" class="pulse-anim"/>
</svg>