<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="aggregation-groupby-having" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#ffeef5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #3498db; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animate-slide { animation: slideIn 0.6s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { animation: flowPulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animate-fade">SQL: Aggregation, GROUP BY &amp; HAVING</text>
  
  <!-- SQL Processing Order Flow -->
  <g transform="translate(30, 60)">
    <!-- FROM -->
    <g class="animate-slide" style="animation-delay: 0.1s;">
      <rect x="0" y="0" width="55" height="35" fill="#a8e6cf" class="box" filter="url(#shadow)"/>
      <text x="27.5" y="22" text-anchor="middle" class="label" font-weight="bold">FROM</text>
      <text x="27.5" y="48" text-anchor="middle" class="detail">Data Source</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M55 17 L75 17" class="arrow flow-line"/>
    
    <!-- WHERE -->
    <g class="animate-slide" style="animation-delay: 0.2s;">
      <rect x="75" y="0" width="60" height="35" fill="#dcedc1" class="box" filter="url(#shadow)"/>
      <text x="105" y="22" text-anchor="middle" class="label" font-weight="bold">WHERE</text>
      <text x="105" y="48" text-anchor="middle" class="detail">Row Filter</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M135 17 L155 17" class="arrow flow-line"/>
    
    <!-- GROUP BY -->
    <g class="animate-slide" style="animation-delay: 0.3s;">
      <rect x="155" y="0" width="80" height="35" fill="#ffd3b6" class="box" filter="url(#shadow)"/>
      <text x="195" y="22" text-anchor="middle" class="label" font-weight="bold">GROUP BY</text>
      <text x="195" y="48" text-anchor="middle" class="detail">Group Formation</text>
    </g>
    
    <!-- Arrow 3 -->
    <path d="M235 17 L255 17" class="arrow flow-line"/>
    
    <!-- HAVING -->
    <g class="animate-slide" style="animation-delay: 0.4s;">
      <rect x="255" y="0" width="65" height="35" fill="#ffaaa5" class="box" filter="url(#shadow)"/>
      <text x="287.5" y="22" text-anchor="middle" class="label" font-weight="bold">HAVING</text>
      <text x="287.5" y="48" text-anchor="middle" class="detail">Group Filter</text>
    </g>
    
    <!-- Arrow 4 -->
    <path d="M320 17 L340 17" class="arrow flow-line"/>
    
    <!-- SELECT -->
    <g class="animate-slide" style="animation-delay: 0.5s;">
      <rect x="340" y="0" width="55" height="35" fill="#d4a5ff" class="box" filter="url(#shadow)"/>
      <text x="367.5" y="22" text-anchor="middle" class="label" font-weight="bold">SELECT</text>
      <text x="367.5" y="48" text-anchor="middle" class="detail">Column Select</text>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g transform="translate(20, 130)">
    <!-- Aggregate Functions Box -->
    <g class="animate-fade" style="animation-delay: 0.5s;" data-narration="Aggregate functions perform calculations on sets of rows: COUNT, SUM, AVG, MIN, MAX">
      <rect x="0" y="0" width="180" height="100" fill="#fff" stroke="#d4a5ff" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="90" y="20" text-anchor="middle" class="label" font-weight="bold" fill="#8e44ad">Aggregate Functions</text>
      <text x="10" y="42" class="detail">• COUNT(*) - Count rows</text>
      <text x="10" y="56" class="detail">• SUM(col) - Total values</text>
      <text x="10" y="70" class="detail">• AVG(col) - Mean value</text>
      <text x="10" y="84" class="detail">• MIN/MAX - Range limits</text>
    </g>
    
    <!-- GROUP BY Box -->
    <g class="animate-fade" style="animation-delay: 0.6s;" data-narration="GROUP BY organizes rows into groups based on column values">
      <rect x="190" y="0" width="100" height="70" fill="#fff" stroke="#ffd3b6" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="240" y="20" text-anchor="middle" class="label" font-weight="bold" fill="#e67e22">GROUP BY</text>
      <text x="200" y="42" class="detail">Groups rows by</text>
      <text x="200" y="56" class="detail">column values</text>
    </g>
    
    <!-- HAVING Box -->
    <g class="animate-fade" style="animation-delay: 0.7s;" data-narration="HAVING filters groups after aggregation, unlike WHERE which filters rows before">
      <rect x="300" y="0" width="100" height="70" fill="#fff" stroke="#ffaaa5" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="350" y="20" text-anchor="middle" class="label" font-weight="bold" fill="#e74c3c">HAVING</text>
      <text x="310" y="42" class="detail">Filters grouped</text>
      <text x="310" y="56" class="detail">results (post-agg)</text>
    </g>
    
    <!-- WHERE vs HAVING Comparison -->
    <g class="animate-fade" style="animation-delay: 0.8s;" data-narration="Key difference: WHERE filters rows BEFORE grouping, HAVING filters groups AFTER aggregation">
      <rect x="190" y="80" width="210" height="60" fill="#fff" stroke="#a8e6cf" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="295" y="100" text-anchor="middle" class="label" font-weight="bold" fill="#27ae60">WHERE vs HAVING</text>
      <text x="200" y="120" class="detail">WHERE → Filters rows (before GROUP BY)</text>
      <text x="200" y="134" class="detail">HAVING → Filters groups (after GROUP BY)</text>
    </g>
  </g>
  
  <!-- Example Query Section -->
  <g transform="translate(20, 300)">
    <g class="animate-pulse" data-narration="Example query finding departments with more than 50 first-class students">
      <rect x="0" y="0" width="380" height="85" fill="#2c3e50" rx="8" filter="url(#shadow)"/>
      <text x="15" y="22" class="label" fill="#ecf0f1" font-style="italic">Example Query:</text>
      <text x="15" y="42" class="detail" fill="#3498db" font-family="monospace" font-size="12">SELECT department, COUNT(*) AS total</text>
      <text x="15" y="58" class="detail" fill="#3498db" font-family="monospace" font-size="12">FROM students WHERE marks &gt;= 60</text>
      <text x="15" y="74" class="detail" fill="#3498db" font-family="monospace" font-size="12">GROUP BY department HAVING COUNT(*) &gt; 50;</text>
    </g>
  </g>
  
  <!-- Processing Arrow Animation -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Legend / Notes -->
  <g transform="translate(320, 290)">
    <text x="0" y="0" class="detail" font-size="10">Execution Order:</text>
    <text x="0" y="14" class="detail" font-size="10">1. FROM → 2. WHERE</text>
    <text x="0" y="26" class="detail" font-size="10">3. GROUP BY → 4. HAVING</text>
    <text x="0" y="38" class="detail" font-size="10">5. SELECT → 6. ORDER BY</text>
  </g>
</svg>