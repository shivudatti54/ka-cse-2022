<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="concept-of-relations-keys">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="superKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff8090"/>
    </linearGradient>
    <linearGradient id="candidateKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#90ee90"/>
    </linearGradient>
    <linearGradient id="primaryKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#7ec8ff"/>
    </linearGradient>
    <linearGradient id="alternateKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba"/>
      <stop offset="100%" style="stop-color:#ffeb7a"/>
    </linearGradient>
    <linearGradient id="foreignKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0bbff"/>
      <stop offset="100%" style="stop-color:#c490ff"/>
    </linearGradient>
    <linearGradient id="relationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box-super { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-candidate { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-primary { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box-alternate { animation: slideInUp 0.6s ease-out 0.7s forwards; opacity: 0; }
    .box-foreign { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box-relation { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .connector { animation: drawLine 1s ease-out 0.8s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Concept of Relations &amp; Keys</text>
  <line x1="60" y1="36" x2="360" y2="36" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Relation Basics Box -->
  <g class="box-relation" data-narration="A relation is a 2D table with rows (tuples) and columns (attributes)">
    <rect x="20" y="50" width="130" height="95" fill="url(#relationGrad)" rx="6" stroke="#adb5bd" stroke-width="1"/>
    <text x="30" y="68" font-size="12" font-weight="bold" fill="#495057">RELATION</text>
    <text x="30" y="85" font-size="10" fill="#6c757d">Table: STUDENT</text>
    <text x="30" y="100" font-size="9" fill="#6c757d">• Tuple = Row</text>
    <text x="30" y="113" font-size="9" fill="#6c757d">• Attribute = Column</text>
    <text x="30" y="126" font-size="9" fill="#6c757d">• Degree = #attrs</text>
    <text x="30" y="139" font-size="9" fill="#6c757d">• Cardinality = #rows</text>
  </g>
  
  <!-- Super Key -->
  <g class="box-super" data-narration="Super Key - A set of attributes that can uniquely identify any tuple">
    <rect x="165" y="50" width="110" height="45" fill="url(#superKeyGrad)" rx="6" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="220" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">Super Key</text>
    <text x="220" y="86" text-anchor="middle" font-size="9" fill="#922b21">{Roll_No, Name}</text>
  </g>
  
  <!-- Candidate Key -->
  <g class="box-candidate" data-narration="Candidate Key - Minimal super key with no redundant attributes">
    <rect x="165" y="105" width="110" height="45" fill="url(#candidateKeyGrad)" rx="6" stroke="#27ae60" stroke-width="1.5"/>
    <text x="220" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e8449">Candidate Key</text>
    <text x="220" y="141" text-anchor="middle" font-size="9" fill="#145a32">{Roll_No}</text>
  </g>
  
  <!-- Primary Key -->
  <g class="box-primary" data-narration="Primary Key - The chosen candidate key for unique identification">
    <rect x="165" y="160" width="110" height="45" fill="url(#primaryKeyGrad)" rx="6" stroke="#2980b9" stroke-width="2"/>
    <text x="220" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5276">Primary Key ★</text>
    <text x="220" y="196" text-anchor="middle" font-size="9" fill="#154360">Roll_No (Selected)</text>
  </g>
  
  <!-- Alternate Key -->
  <g class="box-alternate" data-narration="Alternate Key - Unselected candidate keys that can also identify uniquely">
    <rect x="165" y="215" width="110" height="45" fill="url(#alternateKeyGrad)" rx="6" stroke="#f39c12" stroke-width="1.5"/>
    <text x="220" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#b7950b">Alternate Key</text>
    <text x="220" y="251" text-anchor="middle" font-size="9" fill="#9a7d0a">{Email}</text>
  </g>
  
  <!-- Foreign Key -->
  <g class="box-foreign" data-narration="Foreign Key - References primary key in another table to create relationships">
    <rect x="290" y="160" width="110" height="55" fill="url(#foreignKeyGrad)" rx="6" stroke="#8e44ad" stroke-width="1.5"/>
    <text x="345" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#6c3483">Foreign Key</text>
    <text x="345" y="196" text-anchor="middle" font-size="9" fill="#5b2c6f">References PK</text>
    <text x="345" y="208" text-anchor="middle" font-size="9" fill="#5b2c6f">Links Tables</text>
  </g>
  
  <!-- Connectors -->
  <path d="M 220 95 L 220 105" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <path d="M 220 150 L 220 160" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <path d="M 275 182 L 290 182" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <path d="M 220 205 L 220 215" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  
  <!-- Hierarchy Arrow -->
  <text x="220" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Key Hierarchy</text>
  <path d="M 200 285 L 240 285" stroke="#2c3e50" stroke-width="1"/>
  <polygon points="240,285 235,280 235,290" fill="#2c3e50"/>
  
  <!-- Key Properties -->
  <g class="pulse-anim">
    <rect x="20" y="300" width="180" height="90" fill="#fff" rx="6" stroke="#3498db" stroke-width="1" opacity="0.9"/>
    <text x="30" y="320" font-size="11" font-weight="bold" fill="#2980b9">Key Properties</text>
    <text x="30" y="340" font-size="9" fill="#34495e">• Unique: No duplicates</text>
    <text x="30" y="355" font-size="9" fill="#34495e">• Not Null: Must have value</text>
    <text x="30" y="370" font-size="9" fill="#34495e">• Minimal (Candidate):</text>
    <text x="35" y="382" font-size="9" fill="#34495e">No proper subset</text>
  </g>
  
  <!-- Example Box -->
  <g class="pulse-anim">
    <rect x="210" y="300" width="190" height="90" fill="#fff" rx="6" stroke="#e74c3c" stroke-width="1" opacity="0.9"/>
    <text x="220" y="320" font-size="11" font-weight="bold" fill="#c0392b">Example: STUDENT</text>
    <text x="220" y="338" font-size="9" fill="#34495e">PK: Roll_No</text>
    <text x="220" y="352" font-size="9" fill="#34495e">Alt Key: Email</text>
    <text x="220" y="366" font-size="9" fill="#34495e">FK: Dept_ID → DEPT</text>
    <text x="220" y="380" font-size="9" fill="#34495e">Super: {Roll_No, Name}</text>
  </g>
  
  <!-- Bottom Note -->
  <text x="210" y="395" text-anchor="middle" font-size="8" fill="#7f8c8d">DBMS - University Curriculum</text>
</svg>