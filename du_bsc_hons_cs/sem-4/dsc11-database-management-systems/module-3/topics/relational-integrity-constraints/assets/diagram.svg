<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="relational-integrity-constraints">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="domainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd4c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="entityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4e4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="referGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5ffe9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4ffd4;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .sub-item { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .label-text { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .main-box { stroke: #888; stroke-width: 1.5; }
    .connector { stroke: #999; stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; }
    .title-anim { animation: slideIn 0.8s ease-out forwards; }
    .box-domain { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-entity { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-refer { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .sub-anim { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Main Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title-anim">Relational Integrity</text>
  <text x="210" y="46" text-anchor="middle" class="title-text title-anim" style="font-size:18px">Constraints</text>
  
  <!-- Domain Integrity Box -->
  <g class="box-domain" data-narration="Domain Constraints define permissible values for attributes including data types, check constraints, default values, and user-defined rules">
    <rect x="20" y="70" width="115" height="140" rx="8" fill="url(#domainGrad)" class="main-box pulse-anim"/>
    <text x="77" y="90" text-anchor="middle" class="section-title">Domain Integrity</text>
    <line x1="30" y1="100" x2="125" y2="100" stroke="#cc9980" stroke-width="1"/>
    <text x="30" y="118" class="sub-item">• Data Types</text>
    <text x="30" y="134" class="sub-item">• CHECK</text>
    <text x="30" y="150" class="sub-item">• DEFAULT</text>
    <text x="30" y="166" class="sub-item">• User-defined</text>
    <text x="30" y="182" class="sub-item">• NOT NULL</text>
    <text x="30" y="198" class="label-text">(Validates column values)</text>
  </g>
  
  <!-- Entity Integrity Box -->
  <g class="box-entity" data-narration="Entity Integrity ensures each table has a unique primary key and no null values in primary key columns">
    <rect x="152" y="70" width="115" height="140" rx="8" fill="url(#entityGrad)" class="main-box pulse-anim"/>
    <text x="209" y="90" text-anchor="middle" class="section-title">Entity Integrity</text>
    <line x1="162" y1="100" x2="257" y2="100" stroke="#80b3cc" stroke-width="1"/>
    <text x="162" y="118" class="sub-item">• Primary Key</text>
    <text x="162" y="134" class="sub-item">• UNIQUE</text>
    <text x="162" y="150" class="sub-item">• NOT NULL</text>
    <text x="162" y="166" class="sub-item">• Unique ID</text>
    <text x="162" y="182" class="label-text">(Row uniqueness)</text>
  </g>
  
  <!-- Referential Integrity Box -->
  <g class="box-refer" data-narration="Referential Integrity maintains relationships between tables using foreign keys with cascade actions">
    <rect x="285" y="70" width="115" height="140" rx="8" fill="url(#referGrad)" class="main-box pulse-anim"/>
    <text x="342" y="90" text-anchor="middle" class="section-title">Referential Integrity</text>
    <line x1="295" y1="100" x2="390" y2="100" stroke="#80cc99" stroke-width="1"/>
    <text x="295" y="118" class="sub-item">• FOREIGN KEY</text>
    <text x="295" y="134" class="sub-item">• CASCADE</text>
    <text x="295" y="150" class="sub-item">• SET NULL</text>
    <text x="295" y="166" class="sub-item">• RESTRICT</text>
    <text x="295" y="182" class="label-text">(Table relationships)</text>
  </g>
  
  <!-- Hierarchy Arrow - Top to Domain -->
  <path d="M77 55 L77 68" class="connector" marker-end="url(#arrowhead)" data-narration="Main integrity constraint types"/>
  <path d="M209 55 L209 68" class="connector" marker-end="url(#arrowhead)"/>
  <path d="M342 55 L342 68" class="connector" marker-end="url(#arrowhead)"/>
  
  <!-- Bottom Summary Box -->
  <g data-narration="These constraints work together to ensure data accuracy, consistency, and reliability in the database">
    <rect x="20" y="230" width="380" height="55" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="210" y="248" text-anchor="middle" class="section-title" style="font-size:12px">Why Integrity Constraints Matter</text>
    <text x="35" y="265" class="label-text">• Prevents invalid data entry</text>
    <text x="35" y="278" class="label-text">• Maintains consistency across tables</text>
    <text x="210" y="265" class="label-text">• Enforces business rules</text>
    <text x="210" y="278" class="label-text">• Protects data relationships</text>
  </g>
  
  <!-- Visual Hierarchy Lines -->
  <g data-narration="The three integrity types form a hierarchy from column-level to table-level to relationship-level constraints">
    <line x1="135" y1="140" x2="152" y2="140" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="267" y1="140" x2="285" y2="140" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Connection to Summary -->
  <path d="M210 210 L210 228" class="connector" marker-end="url(#arrowhead)" data-narration="All integrity types contribute to overall database quality"/>
  
  <!-- Bottom Data Flow Arrow -->
  <g data-narration="These constraints operate at different levels: domain (column), entity (row), and referential (table relationship)">
    <line x1="77" y1="230" x2="77" y2="235" stroke="#999" stroke-width="2"/>
    <line x1="342" y1="230" x2="342" y2="235" stroke="#999" stroke-width="2"/>
    <path d="M77 235 Q77 250 210 260 Q342 250 342 235" stroke="#bbb" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Decorative Icons/Icons representation -->
  <circle cx="77" cy="140" r="12" fill="#ffb088" opacity="0.6"/>
  <text x="77" y="144" text-anchor="middle" font-size="16">D</text>
  
  <circle cx="209" cy="140" r="12" fill="#88b8ff" opacity="0.6"/>
  <text x="209" y="144" text-anchor="middle" font-size="16">E</text>
  
  <circle cx="342" cy="140" r="12" fill="#88ffb0" opacity="0.6"/>
  <text x="342" y="144" text-anchor="middle" font-size="16">R</text>
</svg>