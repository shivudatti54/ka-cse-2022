<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="relational-algebra-operators">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe8cc"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cce8cc"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6ff"/>
      <stop offset="100%" style="stop-color:#ccccff"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe6e6"/>
      <stop offset="100%" style="stop-color:#ffcccc"/>
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffff"/>
      <stop offset="100%" style="stop-color:#ccffff"/>
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff"/>
      <stop offset="100%" style="stop-color:#e0ccff"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.35s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.65s forwards; opacity: 0; }
    .box5 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box6 { animation: slideIn 0.6s ease-out 0.95s forwards; opacity: 0; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.4s forwards; opacity: 0; }
    .legend { animation: slideInLeft 0.5s ease-out 1.1s forwards; opacity: 0; }
    .connector { animation: pulse 2s infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
    .operator-box { cursor: pointer; transition: filter 0.3s; }
    .operator-box:hover { filter: brightness(1.05); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Relational Algebra</text>
  <text x="210" y="48" text-anchor="middle" font-size="14" fill="#5d6d7e" class="subtitle">Fundamental Operators</text>
  
  <!-- Legend -->
  <g class="legend">
    <rect x="20" y="365" width="12" height="12" fill="#3498db" rx="2"/>
    <text x="38" y="375" font-size="11" fill="#2c3e50">Unary</text>
    <rect x="90" y="365" width="12" height="12" fill="#e74c3c" rx="2"/>
    <text x="108" y="375" font-size="11" fill="#2c3e50">Binary</text>
  </g>
  
  <!-- Operator Boxes Row 1 -->
  <g class="box1 operator-box" data-narration="Selection (σ) - A unary operator that filters horizontal rows based on a condition">
    <rect x="20" y="70" width="85" height="55" rx="8" fill="url(#boxGradient1)" stroke="#f39c12" stroke-width="2"/>
    <text x="62" y="90" text-anchor="middle" font-size="18" font-weight="bold" fill="#d35400">σ</text>
    <text x="62" y="108" text-anchor="middle" font-size="11" fill="#2c3e50">Selection</text>
    <text x="62" y="120" text-anchor="middle" font-size="9" fill="#7f8c8d">Unary</text>
  </g>
  
  <g class="box2 operator-box" data-narration="Projection (π) - A unary operator that selects vertical columns from a relation">
    <rect x="115" y="70" width="85" height="55" rx="8" fill="url(#boxGradient2)" stroke="#27ae60" stroke-width="2"/>
    <text x="157" y="90" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e8449">π</text>
    <text x="157" y="108" text-anchor="middle" font-size="11" fill="#2c3e50">Projection</text>
    <text x="157" y="120" text-anchor="middle" font-size="9" fill="#7f8c8d">Unary</text>
  </g>
  
  <g class="box3 operator-box" data-narration="Union (∪) - A binary operator that combines results from two relations (removes duplicates)">
    <rect x="210" y="70" width="85" height="55" rx="8" fill="url(#boxGradient3)" stroke="#9b59b6" stroke-width="2"/>
    <text x="252" y="90" text-anchor="middle" font-size="18" font-weight="bold" fill="#7d3c98">∪</text>
    <text x="252" y="108" text-anchor="middle" font-size="11" fill="#2c3e50">Union</text>
    <text x="252" y="120" text-anchor="middle" font-size="9" fill="#7f8c8d">Binary</text>
  </g>
  
  <g class="box4 operator-box" data-narration="Set Difference (−) - A binary operator that returns tuples in first relation but not in second">
    <rect x="305" y="70" width="85" height="55" rx="8" fill="url(#boxGradient4)" stroke="#e74c3c" stroke-width="2"/>
    <text x="347" y="90" text-anchor="middle" font-size="18" font-weight="bold" fill="#c0392b">−</text>
    <text x="347" y="108" text-anchor="middle" font-size="11" fill="#2c3e50">Difference</text>
    <text x="347" y="120" text-anchor="middle" font-size="9" fill="#7f8c8d">Binary</text>
  </g>
  
  <!-- Connector arrows between row 1 -->
  <path d="M105 97 L110 97" stroke="#bdc3c7" stroke-width="1.5" class="connector"/>
  <path d="M200 97 L205 97" stroke="#bdc3c7" stroke-width="1.5" class="connector"/>
  <path d="M295 97 L300 97" stroke="#bdc3c7" stroke-width="1.5" class="connector"/>
  
  <!-- Operator Boxes Row 2 -->
  <g class="box5 operator-box" data-narration="Cartesian Product (×) - A binary operator that combines all tuples from two relations">
    <rect x="55" y="145" width="95" height="55" rx="8" fill="url(#boxGradient5)" stroke="#16a085" stroke-width="2"/>
    <text x="102" y="165" text-anchor="middle" font-size="18" font-weight="bold" fill="#0e6655">×</text>
    <text x="102" y="183" text-anchor="middle" font-size="11" fill="#2c3e50">Cartesian</text>
    <text x="102" y="195" text-anchor="middle" font-size="11" fill="#2c3e50">Product</text>
    <text x="102" y="207" text-anchor="middle" font-size="9" fill="#7f8c8d">Binary</text>
  </g>
  
  <g class="box6 operator-box" data-narration="Rename (ρ) - A unary operator that changes the name of a relation or its attributes">
    <rect x="165" y="145" width="95" height="55" rx="8" fill="url(#boxGradient6)" stroke="#8e44ad" stroke-width="2"/>
    <text x="212" y="165" text-anchor="middle" font-size="18" font-weight="bold" fill="#6c3483">ρ</text>
    <text x="212" y="183" text-anchor="middle" font-size="11" fill="#2c3e50">Rename</text>
    <text x="212" y="195" text-anchor="middle" font-size="11" fill="#2c3e50">(Alias)</text>
    <text x="212" y="207" text-anchor="middle" font-size="9" fill="#7f8c8d">Unary</text>
  </g>
  
  <!-- Connection between rows -->
  <path d="M102 125 L102 140" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="3,3" class="connector"/>
  <path d="M212 125 L212 140" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="3,3" class="connector"/>
  
  <!-- Classification Box -->
  <rect x="280" y="145" width="130" height="55" rx="8" fill="#ffffff" stroke="#34495e" stroke-width="2" stroke-dasharray="5,3" class="box6"/>
  <text x="345" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">6 Fundamental</text>
  <text x="345" y="182" text-anchor="middle" font-size="10" fill="#2c3e50">Operators</text>
  <text x="345" y="195" text-anchor="middle" font-size="9" fill="#7f8c8d">(Primitive)</text>
  
  <!-- Key Concepts Section -->
  <rect x="20" y="220" width="380" height="130" rx="10" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" class="box6" data-narration="Key characteristics: Selection filters rows horizontally, Projection selects columns vertically. Union, Difference are set operations. Cartesian Product combines all attributes."/>
  
  <text x="30" y="242" font-size="12" font-weight="bold" fill="#2c3e50">Key Characteristics</text>
  
  <!-- Concept items with bullets -->
  <g>
    <circle cx="35" cy="258" r="3" fill="#3498db"/>
    <text x="45" y="262" font-size="10" fill="#2c3e50">Selection (σ): Filters <tspan fill="#e74c3c">HORIZONTAL</tspan> rows by condition</text>
  </g>
  <g>
    <circle cx="35" cy="275" r="3" fill="#27ae60"/>
    <text x="45" y="279" font-size="10" fill="#2c3e50">Projection (π): Selects <tspan fill="#e74c3c">VERTICAL</tspan> columns (removes duplicates)</text>
  </g>
  <g>
    <circle cx="35" cy="292" r="3" fill="#9b59b6"/>
    <text x="45" y="296" font-size="10" fill="#2c3e50">Union (∪): R₁ ∪ R₂ - All tuples, no duplicates</text>
  </g>
  <g>
    <circle cx="35" cy="309" r="3" fill="#e74c3c"/>
    <text x="45" y="313" font-size="10" fill="#2c3e50">Difference (−): R₁ − R₂ - In R₁ but NOT in R₂</text>
  </g>
  <g>
    <circle cx="35" cy="326" r="3" fill="#16a085"/>
    <text x="45" y="330" font-size="10" fill="#2c3e50">Cartesian (×): R₁ × R₂ - Cross product, n×m tuples</text>
  </g>
  <g>
    <circle cx="35" cy="343" r="3" fill="#8e44ad"/>
    <text x="45" y="347" font-size="10" fill="#2c3e50">Rename (ρ): Changes relation/attribute names</text>
  </g>
  
  <!-- Bottom note -->
  <rect x="20" y="355" width="380" height="25" rx="5" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" class="box6"/>
  <text x="210" y="371" text-anchor="middle" font-size="10" fill="#7f8c8d">Derived: Intersection, Join (θ, Natural), Division can be expressed using fundamental operators</text>
</svg>