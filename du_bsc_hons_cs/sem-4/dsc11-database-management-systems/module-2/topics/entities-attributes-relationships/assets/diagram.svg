<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="entities-attributes-relationships" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="entityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="attributeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="relationshipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .entity-box { animation: slideInLeft 0.6s ease-out forwards; }
    .attribute-box { animation: slideInUp 0.6s ease-out 0.2s forwards; }
    .relationship-box { animation: slideInRight 0.6s ease-out 0.4s forwards; }
    .legend { animation: fadeIn 0.8s ease-out 0.6s forwards; }
    .connector { animation: fadeIn 0.5s ease-out forwards; }
    .example-section { animation: slideInUp 0.5s ease-out forwards; }
    
    .entity-rect {
      fill: url(#entityGradient);
      stroke: #3b82f6;
      stroke-width: 2;
      rx: 5;
    }
    .attribute-ellipse {
      fill: url(#attributeGradient);
      stroke: #22c55e;
      stroke-width: 2;
    }
    .attribute-double {
      fill: url(#attributeGradient);
      stroke: #22c55e;
      stroke-width: 2;
      stroke-dasharray: 4,2;
    }
    .attribute-dashed {
      fill: url(#attributeGradient);
      stroke: #22c55e;
      stroke-width: 2;
      stroke-dasharray: 5,3;
    }
    .relationship-diamond {
      fill: url(#relationshipGradient);
      stroke: #f59e0b;
      stroke-width: 2;
    }
    .weak-rect {
      fill: url(#entityGradient);
      stroke: #3b82f6;
      stroke-width: 2;
      stroke-dasharray: 4,2;
      rx: 5;
    }
    .connector-line {
      stroke: #64748b;
      stroke-width: 1.5;
      fill: none;
    }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #1e293b; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #475569; }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #1e3a5f; }
    .section-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #334155; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title">Entities, Attributes &amp; Relationships</text>
  
  <!-- Section 1: Entity -->
  <g class="entity-box" data-narration="An Entity is a real-world object that can be uniquely identified, such as a Student, Book, or Employee.">
    <rect x="15" y="45" width="115" height="75" class="entity-rect"/>
    <text x="72" y="72" text-anchor="middle" class="label" font-weight="bold">ENTITY</text>
    <text x="72" y="90" text-anchor="middle" class="detail">Student</text>
    <text x="72" y="105" text-anchor="middle" class="detail">(Rectangle)</text>
  </g>
  
  <!-- Section 2: Attributes -->
  <g class="attribute-box" data-narration="Attributes describe properties of entities. Simple, composite, multi-valued, and derived attributes are the main types.">
    <ellipse cx="210" cy="70" rx="35" ry="22" class="attribute-ellipse"/>
    <text x="210" y="65" text-anchor="middle" class="label" font-size="12">Attribute</text>
    <text x="210" y="80" text-anchor="middle" class="detail">Name</text>
    
    <ellipse cx="210" cy="115" rx="35" ry="18" class="attribute-double"/>
    <text x="210" y="112" text-anchor="middle" class="detail">Multi-valued</text>
    <text x="210" y="125" text-anchor="middle" class="detail" font-size="9">(Double ellipse)</text>
    
    <ellipse cx="210" cy="155" rx="35" ry="18" class="attribute-dashed"/>
    <text x="210" y="152" text-anchor="middle" class="detail">Derived</text>
    <text x="210" y="165" text-anchor="middle" class="detail" font-size="9">(Dashed ellipse)</text>
  </g>
  
  <!-- Section 3: Relationship -->
  <g class="relationship-box" data-narration="Relationships describe associations between entities. They define how entities interact with each other.">
    <polygon points="355,70 390,90 355,110 320,90" class="relationship-diamond"/>
    <text x="355" y="92" text-anchor="middle" class="label" font-size="11">Relates</text>
    <text x="355" y="125" text-anchor="middle" class="detail">(Diamond)</text>
  </g>
  
  <!-- Connectors -->
  <g class="connector">
    <line x1="130" y1="82" x2="175" y2="70" class="connector-line"/>
    <line x1="245" y1="70" x2="320" y2="80" class="connector-line"/>
  </g>
  
  <!-- Example Section -->
  <g class="example-section" data-narration="Example ER Diagram showing Student entity with attributes and Enrolled relationship.">
    <text x="15" y="195" class="section-title">Chen's Notation Example</text>
    
    <!-- Student Entity -->
    <rect x="30" y="210" width="100" height="35" class="entity-rect"/>
    <text x="80" y="232" text-anchor="middle" class="label" font-size="13">Student</text>
    
    <!-- Student Attributes -->
    <ellipse cx="55" y="270" rx="28" ry="15" class="attribute-ellipse"/>
    <text x="55" y="266" text-anchor="middle" class="detail" font-size="10">Student_ID</text>
    
    <ellipse cx="105" y="270" rx="28" ry="15" class="attribute-ellipse"/>
    <text x="105" y="266" text-anchor="middle" class="detail" font-size="10">Name</text>
    
    <ellipse cx="80" y="300" rx="28" ry="15" class="attribute-ellipse"/>
    <text x="80" y="296" text-anchor="middle" class="detail" font-size="10">Age</text>
    
    <!-- Connectors -->
    <line x1="60" y1="245" x2="55" y2="255" class="connector-line"/>
    <line x1="100" y1="245" x2="105" y2="255" class="connector-line"/>
    <line x1="80" y1="245" x2="80" y2="285" class="connector-line"/>
    
    <!-- Course Entity -->
    <rect x="250" y="210" width="100" height="35" class="entity-rect"/>
    <text x="300" y="232" text-anchor="middle" class="label" font-size="13">Course</text>
    
    <!-- Relationship -->
    <polygon points="185,227 205,227 205,247 185,247" class="relationship-diamond"/>
    <text x="195" y="240" text-anchor="middle" class="detail" font-size="9">Enrolled</text>
    
    <!-- Relationship Connectors -->
    <line x1="130" y1="232" x2="185" y2="232" class="connector-line"/>
    <line x1="205" y1="232" x2="250" y2="232" class="connector-line"/>
    
    <!-- Weak Entity -->
    <rect x="250" y="280" width="100" height="35" class="weak-rect"/>
    <text x="300" y="302" text-anchor="middle" class="label" font-size="13">Enrollment</text>
    <text x="300" y="315" text-anchor="middle" class="detail" font-size="9">(Weak Entity)</text>
  </g>
  
  <!-- Legend -->
  <g class="legend" data-narration="Key: Rectangle = Entity, Ellipse = Attribute, Diamond = Relationship, Double lines = Weak Entity">
    <text x="15" y="365" class="section-title">Legend:</text>
    <rect x="70" y="355" width="15" height="12" class="entity-rect" style="stroke-width:1"/>
    <text x="90" y="365" class="detail" font-size="10">Entity</text>
    <ellipse cx="130" y="361" rx="10" ry="6" class="attribute-ellipse" style="stroke-width:1"/>
    <text x="148" y="365" class="detail" font-size="10">Attribute</text>
    <polygon points="185,355 195,361 185,367 175,361" class="relationship-diamond" style="stroke-width:1"/>
    <text x="200" y="365" class="detail" font-size="10">Relationship</text>
    <rect x="275" y="355" width="15" height="12" class="weak-rect" style="stroke-width:1"/>
    <text x="295" y="365" class="detail" font-size="10">Weak Entity</text>
  </g>
</svg>