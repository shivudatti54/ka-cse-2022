<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="constraints-on-relationships" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5e2ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box { filter: url(#shadow); }
    .constraint-box { opacity: 0; animation: fadeIn 0.6s ease-out forwards; }
    .constraint-box:nth-child(1) { animation-delay: 0.1s; }
    .constraint-box:nth-child(2) { animation-delay: 0.25s; }
    .constraint-box:nth-child(3) { animation-delay: 0.4s; }
    .constraint-box:nth-child(4) { animation-delay: 0.55s; }
    .notation-section { opacity: 0; animation: fadeIn 0.7s ease-out 0.7s forwards; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out 1s forwards; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; }
    text { pointer-events: none; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" class="title">Constraints On Relationships</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Constraint Box 1: Entity Integrity -->
  <g class="constraint-box" data-narration="Entity Integrity ensures each table has a unique primary key that cannot be NULL">
    <rect x="20" y="58" width="90" height="52" rx="6" fill="url(#boxGradient1)" class="box pulse"/>
    <text x="65" y="74" text-anchor="middle" class="label">Entity</text>
    <text x="65" y="88" text-anchor="middle" class="label">Integrity</text>
    <text x="65" y="102" text-anchor="middle" class="detail">PK ≠ NULL</text>
  </g>
  
  <!-- Constraint Box 2: Referential Integrity -->
  <g class="constraint-box" data-narration="Referential Integrity ensures foreign keys reference valid primary keys in related tables">
    <rect x="115" y="58" width="90" height="52" rx="6" fill="url(#boxGradient2)" class="box pulse"/>
    <text x="160" y="74" text-anchor="middle" class="label">Referential</text>
    <text x="160" y="88" text-anchor="middle" class="label">Integrity</text>
    <text x="160" y="102" text-anchor="middle" class="detail">FK → PK</text>
  </g>
  
  <!-- Constraint Box 3: Domain Constraints -->
  <g class="constraint-box" data-narration="Domain Constraints define valid values and data types for attributes">
    <rect x="210" y="58" width="90" height="52" rx="6" fill="url(#boxGradient3)" class="box pulse"/>
    <text x="255" y="74" text-anchor="middle" class="label">Domain</text>
    <text x="255" y="88" text-anchor="middle" class="label">Constraints</text>
    <text x="255" y="102" text-anchor="middle" class="detail">Data Types</text>
  </g>
  
  <!-- Constraint Box 4: Key Constraints -->
  <g class="constraint-box" data-narration="Key Constraints ensure unique values for primary and unique keys">
    <rect x="305" y="58" width="90" height="52" rx="6" fill="url(#boxGradient4)" class="box pulse"/>
    <text x="350" y="74" text-anchor="middle" class="label">Key</text>
    <text x="350" y="88" text-anchor="middle" class="label">Constraints</text>
    <text x="350" y="102" text-anchor="middle" class="detail">UNIQUE</text>
  </g>
  
  <!-- ERD Notation Section -->
  <g class="notation-section" data-narration="ERD Cardinality Notations: Crow's foot, Chen, and Min-max representations">
    <text x="210" y="132" text-anchor="middle" class="label" style="font-size:13px;">ERD Cardinality Notations</text>
    
    <!-- Crow's Foot Notation -->
    <g transform="translate(30, 145)">
      <text x="0" y="0" class="detail" style="font-size:10px;">Crow's Foot</text>
      <!-- One side -->
      <line x1="15" y1="15" x2="45" y2="15" stroke="#2c3e50" stroke-width="2" class="arrow-line"/>
      <line x1="45" y1="10" x2="55" y2="15" stroke="#2c3e50" stroke-width="2"/>
      <line x1="45" y1="20" x2="55" y2="15" stroke="#2c3e50" stroke-width="2"/>
      <!-- Many side -->
      <line x1="65" y1="15" x2="95" y2="15" stroke="#2c3e50" stroke-width="2" class="arrow-line"/>
      <path d="M95 10 L85 15 L95 20" fill="none" stroke="#2c3e50" stroke-width="2"/>
      <text x="30" y="32" class="detail">1</text>
      <text x="80" y="32" class="detail">N</text>
    </g>
    
    <!-- Chen Notation -->
    <g transform="translate(130, 145)">
      <text x="35" y="0" class="detail" style="font-size:10px;">Chen</text>
      <line x1="15" y1="15" x2="55" y2="15" stroke="#2c3e50" stroke-width="2"/>
      <text x="35" y="13" text-anchor="middle" class="detail" style="font-size:12px;">1</text>
      <line x1="65" y1="15" x2="105" y2="15" stroke="#2c3e50" stroke-width="2"/>
      <text x="85" y="13" text-anchor="middle" class="detail" style="font-size:12px;">N</text>
      <text x="30" y="32" class="detail">1</text>
      <text x="85" y="32" class="detail">N</text>
    </g>
    
    <!-- Min-Max Notation -->
    <g transform="translate(230, 145)">
      <text x="40" y="0" class="detail" style="font-size:10px;">Min-Max</text>
      <line x1="15" y1="15" x2="45" y2="15" stroke="#2c3e50" stroke-width="2"/>
      <text x="30" y="13" text-anchor="middle" class="detail" style="font-size:9px;">(1,1)</text>
      <line x1="55" y1="15" x2="95" y2="15" stroke="#2c3e50" stroke-width="2"/>
      <text x="75" y="13" text-anchor="middle" class="detail" style="font-size:9px;">(0,N)</text>
      <text x="30" y="32" class="detail">(1,1)</text>
      <text x="75" y="32" class="detail">(0,N)</text>
    </g>
    
    <!-- Participation Indicators -->
    <g transform="translate(330, 145)">
      <text x="30" y="0" class="detail" style="font-size:10px;">Participation</text>
      <!-- Total (double line) -->
      <line x1="10" y1="15" x2="30" y2="15" stroke="#2c3e50" stroke-width="2"/>
      <line x1="12" y1="18" x2="28" y2="18" stroke="#2c3e50" stroke-width="2"/>
      <text x="20" y="32" class="detail">Total</text>
      <!-- Partial (single line) -->
      <line x1="45" y1="15" x2="65" y2="15" stroke="#2c3e50" stroke-width="2"/>
      <text x="55" y="32" class="detail">Partial</text>
    </g>
  </g>
  
  <!-- Relationship Arrow Visualization -->
  <g class="notation-section">
    <text x="210" y="200" text-anchor="middle" class="label" style="font-size:12px;">Table Relationships</text>
    
    <!-- Student Table Box -->
    <rect x="40" y="215" width="80" height="55" rx="4" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <text x="80" y="232" text-anchor="middle" class="label" style="font-size:12px;">Student</text>
    <line x1="45" y1="238" x2="115" y2="238" stroke="#bdc3c7" stroke-width="1"/>
    <text x="50" y="250" class="detail">StudentID (PK)</text>
    <text x="50" y="262" class="detail">Name</text>
    
    <!-- Enrollment Table Box -->
    <rect x="165" y="215" width="80" height="55" rx="4" fill="#ecf0f1" stroke="#e74c3c" stroke-width="2"/>
    <text x="205" y="232" text-anchor="middle" class="label" style="font-size:12px;">Enrollment</text>
    <line x1="170" y1="238" x2="240" y2="238" stroke="#bdc3c7" stroke-width="1"/>
    <text x="175" y="250" class="detail">EnrollID (PK)</text>
    <text x="175" y="262" class="detail">StudentID (FK)</text>
    
    <!-- Course Table Box -->
    <rect x="290" y="215" width="80" height="55" rx="4" fill="#ecf0f1" stroke="#27ae60" stroke-width="2"/>
    <text x="330" y="232" text-anchor="middle" class="label" style="font-size:12px;">Course</text>
    <line x1="295" y1="238" x2="365" y2="238" stroke="#bdc3c7" stroke-width="1"/>
    <text x="300" y="250" class="detail">CourseID (PK)</text>
    <text x="300" y="262" class="detail">Name</text>
    
    <!-- Relationship Lines -->
    <line x1="120" y1="242" x2="165" y2="242" stroke="#9b59b6" stroke-width="2" class="arrow-line"/>
    <text x="142" y="235" text-anchor="middle" class="detail" style="font-size:9px;">1:N</text>
    
    <line x1="245" y1="242" x2="290" y2="242" stroke="#9b59b6" stroke-width="2" class="arrow-line"/>
    <text x="268" y="235" text-anchor="middle" class="detail" style="font-size:9px;">1:N</text>
  </g>
  
  <!-- Key Points Section -->
  <g class="notation-section">
    <rect x="20" y="290" width="180" height="45" rx="4" fill="#e8f4f8" stroke="#3498db" stroke-width="1" opacity="0.8"/>
    <text x="30" y="308" class="label" style="font-size:11px;">Primary Key Rules:</text>
    <text x="30" y="322" class="detail">• Unique value per row</text>
    <text x="120" y="322" class="detail">• Cannot be NULL</text>
    
    <rect x="205" y="290" width="180" height="45" rx="4" fill="#e8f5e9" stroke="#27ae60" stroke-width="1" opacity="0.8"/>
    <text x="215" y="308" class="label" style="font-size:11px;">Foreign Key Rules:</text>
    <text x="215" y="322" class="detail">• References valid PK</text>
    <text x="315" y="322" class="detail">• Enables relationship</text>
  </g>
  
  <!-- Footer Note -->
  <g class="notation-section">
    <rect x="20" y="345" width="375" height="35" rx="4" fill="#fff8e1" stroke="#f39c12" stroke-width="1" opacity="0.9"/>
    <text x="210" y="362" text-anchor="middle" class="detail" style="font-size:11px;">Database constraints maintain data integrity by enforcing rules at</text>
    <text x="210" y="374" text-anchor="middle" class="detail" style="font-size:11px;">table and relationship levels, preventing anomalies and ensuring consistency</text>
  </g>
</svg>