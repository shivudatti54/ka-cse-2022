<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="er-diagram-notation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="rectGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#4178b8"/>
    </linearGradient>
    <linearGradient id="ovalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92d050"/>
      <stop offset="100%" style="stop-color:#70b545"/>
    </linearGradient>
    <linearGradient id="diamondGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc000"/>
      <stop offset="100%" style="stop-color:#e5a800"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-box { fill: #fff; stroke: #b8d4e8; stroke-width: 1.5; rx: 8; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .rect-anim { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .oval-anim { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .double-anim { animation: slideIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .dash-anim { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .diamond-anim { animation: slideIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .line-anim { animation: fadeIn 0.5s ease-out 0.9s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">ER Diagram Notation</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#5b9bd5" stroke-width="2" class="title-anim"/>
  
  <!-- Section 1: Entity (Rectangle) -->
  <g class="rect-anim" data-narration="Entity sets are represented as rectangles">
    <rect x="20" y="60" width="80" height="45" fill="url(#rectGradient)" rx="4"/>
    <text x="60" y="82" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">ENTITY</text>
    <text x="110" y="78" class="label">Rectangle</text>
    <text x="110" y="93" class="detail">Entity Set</text>
  </g>
  
  <!-- Section 2: Attribute (Oval) -->
  <g class="oval-anim" data-narration="Attributes are shown as ovals connected to entities">
    <ellipse cx="250" cy="82" rx="35" ry="18" fill="url(#ovalGradient)"/>
    <text x="250" y="86" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">attr</text>
    <text x="300" y="78" class="label">Oval</text>
    <text x="300" y="93" class="detail">Attribute</text>
  </g>
  
  <!-- Section 3: Multi-valued (Double Oval) -->
  <g class="double-anim" data-narration="Multi-valued attributes have double ovals">
    <ellipse cx="60" y="155" rx="30" ry="16" fill="none" stroke="#70b545" stroke-width="3"/>
    <ellipse cx="60" y="155" rx="24" ry="12" fill="url(#ovalGradient)"/>
    <text x="60" y="158" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">multi</text>
    <text x="105" y="150" class="label">Double Oval</text>
    <text x="105" y="165" class="detail">Multi-valued</text>
  </g>
  
  <!-- Section 4: Derived (Dashed Oval) -->
  <g class="dash-anim" data-narration="Derived attributes use dashed lines">
    <ellipse cx="250" cy="155" rx="30" ry="16" fill="none" stroke="#70b545" stroke-width="2" stroke-dasharray="5,3"/>
    <ellipse cx="250" cy="155" rx="24" ry="12" fill="#e8f5e0" stroke="#70b545" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="250" y="158" text-anchor="middle" fill="#70b545" font-family="Arial" font-size="9" font-weight="bold">age</text>
    <text x="295" y="150" class="label">Dashed Oval</text>
    <text x="295" y="165" class="detail">Derived</text>
  </g>
  
  <!-- Section 5: Relationship (Diamond) -->
  <g class="diamond-anim" data-narration="Relationships are depicted as diamonds">
    <polygon points="60,230 90,250 60,270 30,250" fill="url(#diamondGradient)"/>
    <text x="60" y="253" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">REL</text>
    <text x="105" y="248" class="label">Diamond</text>
    <text x="105" y="263" class="detail">Relationship</text>
  </g>
  
  <!-- Section 6: Connection (Line) -->
  <g class="line-anim" data-narration="Lines connect entities to relationships and attributes">
    <line x1="200" y1="230" x2="200" y2="270" stroke="#555" stroke-width="2" class="pulse-anim"/>
    <circle cx="200" cy="230" r="4" fill="#5b9bd5"/>
    <circle cx="200" cy="270" r="4" fill="#ffc000"/>
    <text x="200" y="257" text-anchor="middle" class="detail" font-size="9">line</text>
    <text x="245" y="248" class="label">Line</text>
    <text x="245" y="263" class="detail">Connection</text>
  </g>
  
  <!-- Cardinality Notation Examples -->
  <g class="line-anim" data-narration="Cardinality shows relationship participation rules">
    <text x="300" y="230" class="label">Cardinality:</text>
    <text x="300" y="248" class="detail">1 - One</text>
    <text x="300" y="263" class="detail">N - Many</text>
    <text x="300" y="278" class="detail">M - Many</text>
  </g>
  
  <!-- Key box at bottom -->
  <rect x="20" y="305" width="180" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="30" y="325" class="label" font-size="12" fill="#2c3e50">Key Concepts:</text>
  <text x="30" y="345" class="detail" fill="#495057">• Entities: Real-world objects</text>
  <text x="30" y="360" class="detail" fill="#495057">• Attributes: Properties of entities</text>
  <text x="30" y="375" class="detail" fill="#495057">• Relationships: Associations between entities</text>
  
  <!-- Chen Notation label -->
  <rect x="215" y="305" width="180" height="80" fill="#fff8e8" stroke="#ffe0b2" stroke-width="1" rx="6"/>
  <text x="225" y="325" class="label" font-size="12" fill="#e65100">Chen Notation (1976)</text>
  <text x="225" y="345" class="detail" fill="#5d4037">Standard ER diagram symbols</text>
  <text x="225" y="360" class="detail" fill="#5d4037">used for conceptual design</text>
  <text x="225" y="375" class="detail" fill="#5d4037">of relational databases</text>
</svg>