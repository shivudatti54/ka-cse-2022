<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="collision-resolution-schemes">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linearGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9a9e" />
      <stop offset="100%" style="stop-color:#fecfef" />
    </linearGradient>
    <linearGradient id="quadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea" />
      <stop offset="100%" style="stop-color:#fed6e3" />
    </linearGradient>
    <linearGradient id="doubleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d299c2" />
      <stop offset="100%" style="stop-color:#fef9d7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes probeDot {
      0%, 100% { r: 6; opacity: 1; }
      50% { r: 8; opacity: 0.8; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-linear { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-quad { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section-double { animation: slideInRight 0.6s ease-out 0.6s both; }
    .concept-box { animation: fadeIn 0.5s ease-out 0.8s both; }
    .probe-path { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
    .probe-dot { animation: probeDot 2s ease-in-out infinite; }
    .arrow { animation: fadeIn 0.4s ease-out 1s both; }
    .cluster-warning { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Collision Resolution Schemes</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="title">Probing Methods Comparison</text>
  
  <!-- Divider -->
  <line x1="20" y1="56" x2="400" y2="56" stroke="#bdc3c7" stroke-width="1" class="title"/>
  
  <!-- Section 1: Linear Probing -->
  <g class="section-linear" data-narration="Linear probing uses formula h(k,i) = (h'(k) + i) mod m, probing consecutive slots">
    <rect x="15" y="70" width="120" height="140" rx="8" fill="url(#linearGrad)" filter="url(#shadow)"/>
    <text x="75" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c0392b">Linear Probing</text>
    <text x="75" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b241c">h(k,i) = (h' + i) mod m</text>
    
    <!-- Hash Table Visualization -->
    <g transform="translate(25, 120)">
      <rect x="0" y="0" width="20" height="16" fill="#fff" stroke="#e74c3c" stroke-width="1"/>
      <rect x="20" y="0" width="20" height="16" fill="#fff" stroke="#e74c3c" stroke-width="1"/>
      <rect x="40" y="0" width="20" height="16" fill="#fff" stroke="#e74c3c" stroke-width="1"/>
      <rect x="60" y="0" width="20" height="16" fill="#fff" stroke="#e74c3c" stroke-width="1"/>
      <rect x="80" y="0" width="20" height="16" fill="#fff" stroke="#e74c3c" stroke-width="1"/>
      <text x="10" y="12" text-anchor="middle" font-size="8" fill="#333">0</text>
      <text x="30" y="12" text-anchor="middle" font-size="8" fill="#333">1</text>
      <text x="50" y="12" text-anchor="middle" font-size="8" fill="#333">2</text>
      <text x="70" y="12" text-anchor="middle" font-size="8" fill="#333">3</text>
      <text x="90" y="12" text-anchor="middle" font-size="8" fill="#333">4</text>
      
      <!-- Data showing clustering -->
      <rect x="0" y="1" width="20" height="14" fill="#e74c3c" opacity="0.7"/>
      <text x="10" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">A</text>
      <rect x="40" y="1" width="20" height="14" fill="#e74c3c" opacity="0.7"/>
      <text x="50" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">B</text>
      <rect x="60" y="1" width="20" height="14" fill="#e74c3c" opacity="0.7"/>
      <text x="70" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">C</text>
      <rect x="80" y="1" width="20" height="14" fill="#e74c3c" opacity="0.5" class="cluster-warning"/>
      <text x="90" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">D</text>
    </g>
    
    <!-- Probe path arrow -->
    <path d="M 55 155 Q 75 145 95 155" fill="none" stroke="#c0392b" stroke-width="2" class="probe-path" marker-end="url(#arrowhead)"/>
    <circle cx="55" cy="155" r="4" fill="#c0392b" class="probe-dot"/>
    <circle cx="75" cy="148" r="4" fill="#c0392b" class="probe-dot" style="animation-delay: 0.3s"/>
    <circle cx="95" cy="155" r="4" fill="#c0392b" class="probe-dot" style="animation-delay: 0.6s"/>
  </g>
  
  <!-- Section 2: Quadratic Probing -->
  <g class="section-quad" data-narration="Quadratic probing uses h(k,i) = (h'(k) + c1*i + c2*i²) mod m to spread probes further apart">
    <rect x="150" y="70" width="120" height="140" rx="8" fill="url(#quadGrad)" filter="url(#shadow)"/>
    <text x="210" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#16a085">Quadratic Probing</text>
    <text x="210" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#0e6655">h(k,i) = (h' + i + i²) mod m</text>
    
    <!-- Hash Table Visualization -->
    <g transform="translate(160, 120)">
      <rect x="0" y="0" width="20" height="16" fill="#fff" stroke="#1abc9c" stroke-width="1"/>
      <rect x="20" y="0" width="20" height="16" fill="#fff" stroke="#1abc9c" stroke-width="1"/>
      <rect x="40" y="0" width="20" height="16" fill="#fff" stroke="#1abc9c" stroke-width="1"/>
      <rect x="60" y="0" width="20" height="16" fill="#fff" stroke="#1abc9c" stroke-width="1"/>
      <rect x="80" y="0" width="20" height="16" fill="#fff" stroke="#1abc9c" stroke-width="1"/>
      <text x="10" y="12" text-anchor="middle" font-size="8" fill="#333">0</text>
      <text x="30" y="12" text-anchor="middle" font-size="8" fill="#333">1</text>
      <text x="50" y="12" text-anchor="middle" font-size="8" fill="#333">2</text>
      <text x="70" y="12" text-anchor="middle" font-size="8" fill="#333">3</text>
      <text x="90" y="12" text-anchor="middle" font-size="8" fill="#333">4</text>
      
      <!-- Data showing better spread -->
      <rect x="0" y="1" width="20" height="14" fill="#1abc9c" opacity="0.7"/>
      <text x="10" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">A</text>
      <rect x="40" y="1" width="20" height="14" fill="#1abc9c" opacity="0.7"/>
      <text x="50" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">B</text>
      <rect x="80" y="1" width="20" height="14" fill="#1abc9c" opacity="0.7"/>
      <text x="90" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">C</text>
    </g>
    
    <!-- Probe path - wider spread -->
    <path d="M 170 155 L 180 145 L 200 145 L 210 155" fill="none" stroke="#16a085" stroke-width="2" class="probe-path" style="animation-delay: 0.3s"/>
    <circle cx="170" cy="155" r="4" fill="#16a085" class="probe-dot"/>
    <circle cx="190" cy="145" r="4" fill="#16a085" class="probe-dot" style="animation-delay: 0.3s"/>
    <circle cx="210" cy="155" r="4" fill="#16a085" class="probe-dot" style="animation-delay: 0.6s"/>
  </g>
  
  <!-- Section 3: Double Hashing -->
  <g class="section-double" data-narration="Double hashing uses two hash functions: h(k,i) = (h1(k) + i*h2(k)) mod m for independent probe sequences">
    <rect x="285" y="70" width="120" height="140" rx="8" fill="url(#doubleGrad)" filter="url(#shadow)"/>
    <text x="345" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#8e44ad">Double Hashing</text>
    <text x="345" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#6c3483">h(k,i) = (h1 + i×h2) mod m</text>
    
    <!-- Hash Table Visualization -->
    <g transform="translate(295, 120)">
      <rect x="0" y="0" width="20" height="16" fill="#fff" stroke="#9b59b6" stroke-width="1"/>
      <rect x="20" y="0" width="20" height="16" fill="#fff" stroke="#9b59b6" stroke-width="1"/>
      <rect x="40" y="0" width="20" height="16" fill="#fff" stroke="#9b59b6" stroke-width="1"/>
      <rect x="60" y="0" width="20" height="16" fill="#fff" stroke="#9b59b6" stroke-width="1"/>
      <rect x="80" y="0" width="20" height="16" fill="#fff" stroke="#9b59b6" stroke-width="1"/>
      <text x="10" y="12" text-anchor="middle" font-size="8" fill="#333">0</text>
      <text x="30" y="12" text-anchor="middle" font-size="8" fill="#333">1</text>
      <text x="50" y="12" text-anchor="middle" font-size="8" fill="#333">2</text>
      <text x="70" y="12" text-anchor="middle" font-size="8" fill="#333">3</text>
      <text x="90" y="12" text-anchor="middle" font-size="8" fill="#333">4</text>
      
      <!-- Data showing best spread -->
      <rect x="0" y="1" width="20" height="14" fill="#9b59b6" opacity="0.7"/>
      <text x="10" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">A</text>
      <rect x="20" y="1" width="20" height="14" fill="#9b59b6" opacity="0.7"/>
      <text x="30" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">B</text>
      <rect x="60" y="1" width="20" height="14" fill="#9b59b6" opacity="0.7"/>
      <text x="70" y="11" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">C</text>
    </g>
    
    <!-- Probe path - jump pattern -->
    <path d="M 305 155 L 325 155 L 335 145 L 355 155" fill="none" stroke="#8e44ad" stroke-width="2" class="probe-path" style="animation-delay: 0.5s"/>
    <circle cx="305" cy="155" r="4" fill="#8e44ad" class="probe-dot"/>
    <circle cx="325" cy="155" r="4" fill="#8e44ad" class="probe-dot" style="animation-delay: 0.2s"/>
    <circle cx="345" cy="145" r="4" fill="#8e44ad" class="probe-dot" style="animation-delay: 0.4s"/>
    <circle cx="365" cy="155" r="4" fill="#8e44ad" class="probe-dot" style="animation-delay: 0.6s"/>
  </g>
  
  <!-- Key Concept Box 1 -->
  <g class="concept-box" data-narration="Primary clustering occurs in linear probing when keys map to similar initial positions">
    <rect x="15" y="225" width="125" height="70" rx="6" fill="#fff9f0" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="77" y="243" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#d35400">Primary Clustering</text>
    <text x="77" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d4e37">Linear probing forms</text>
    <text x="77" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d4e37">large clusters → O(n)</text>
  </g>
  
  <!-- Key Concept Box 2 -->
  <g class="concept-box" data-narration="Secondary clustering occurs in quadratic probing but is less severe than primary clustering">
    <rect x="150" y="225" width="125" height="70" rx="6" fill="#f0f9f5" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="212" y="243" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1e8449">Secondary Clustering</text>
    <text x="212" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d6d7e">Keys with same hash</text>
    <text x="212" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d6d7e">probe same slots</text>
  </g>
  
  <!-- Key Concept Box 3 -->
  <g class="concept-box" data-narration="Double hashing eliminates clustering by using a second hash function for probe step size">
    <rect x="285" y="225" width="120" height="70" rx="6" fill="#f5f0fa" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="345" y="243" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#7d3c98">No Clustering</text>
    <text x="345" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d6d7e">Different keys get</text>
    <text x="345" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d6d7e">unique probe sequences</text>
  </g>
  
  <!-- Formula Comparison Section -->
  <g class="concept-box" data-narration="Comparison of probing formulas showing how each method calculates probe sequence">
    <rect x="15" y="305" width="390" height="80" rx="8" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="325" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50">Probe Sequence Formulas</text>
    
    <text x="45" y="350" font-family="Courier New" font-size="10" fill="#c0392b">Linear:</text>
    <text x="100" y="350" font-family="Courier New" font-size="10" fill="#333">(h' + i) mod m</text>
    
    <text x="175" y="350" font-family="Courier New" font-size="10" fill="#16a085">Quadratic:</text>
    <text x="250" y="350" font-family="Courier New" font-size="10" fill="#333">(h' + i + i²) mod m</text>
    
    <text x="45" y="370" font-family="Courier New" font-size="10" fill="#8e44ad">Double:</text>
    <text x="100" y="370" font-family="Courier New" font-size="10" fill="#333">(h₁ + i×h₂) mod m</text>
    
    <text x="175" y="370" font-family="Arial" font-size="9" fill="#5d6d7e">h₂(k) must be non-zero &</text>
    <text x="260" y="370" font-family="Arial" font-size="9" fill="#5d6d7e">relatively prime to m</text>
  </g>
  
  <!-- Arrow indicators -->
  <g class="arrow">
    <path d="M 140 140 L 148 140" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGrey)"/>
    <path d="M 275 140 L 283 140" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGrey)"/>
  </g>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b"/>
    </marker>
    <marker id="arrowGrey" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>