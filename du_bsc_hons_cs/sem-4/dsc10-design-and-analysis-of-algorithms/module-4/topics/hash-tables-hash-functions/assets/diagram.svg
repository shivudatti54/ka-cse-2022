<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="hash-tables-hash-functions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="bucketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b041"/>
      <stop offset="100%" style="stop-color:#d68910"/>
    </linearGradient>
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#af7ac5"/>
      <stop offset="100%" style="stop-color:#884ea0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 8; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #34495e; }
    .label-text { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
    .key-label { font-family: Arial, sans-serif; font-size: 10px; fill: #fff; font-weight: bold; }
    .bucket-label { font-family: Arial, sans-serif; font-size: 10px; fill: #fff; font-weight: bold; }
    .bucket { fill: url(#bucketGradient); stroke: #2471a3; stroke-width: 1.5; }
    .key-box { fill: url(#keyGradient); stroke: #9a7d0a; stroke-width: 1; }
    .chain-box { fill: url(#chainGradient); stroke: #6c3483; stroke-width: 1; }
    .arrow-line { fill: none; stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 6,3; }
    .connector-line { fill: none; stroke: #7f8c8d; stroke-width: 1.5; }
    .concept-box { fill: #fff; stroke: #bdc3c7; stroke-width: 1; rx: 4; }
    .divider { stroke: #bdc3c7; stroke-width: 1; stroke-dasharray: 4,2; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .left-anim { animation: slideInLeft 0.6s ease-out forwards; }
    .right-anim { animation: slideInRight 0.6s ease-out forwards; }
    .up-anim { animation: slideInUp 0.6s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-anim { animation: arrowPulse 1.5s linear infinite; }
  </style>
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  <text x="210" y="25" text-anchor="middle" class="title-text title-anim">Hash Tables &amp; Hash Functions</text>
  <line x1="10" y1="38" x2="410" y2="38" class="divider" style="opacity: 0.5;"/>
  <g class="left-anim" style="animation-delay: 0.2s;">
    <text x="30" y="58" class="section-title" data-narration="Hash Function Section">Hash Function</text>
    <rect x="25" y="65" width="120" height="50" rx="5" class="concept-box" filter="url(#shadow)"/>
    <text x="85" y="85" text-anchor="middle" class="label-text" font-size="12" font-weight="bold">h(k) = k mod m</text>
    <text x="85" y="102" text-anchor="middle" class="label-text" font-size="10">m = table size</text>
  </g>
  <g class="left-anim" style="animation-delay: 0.4s;">
    <text x="30" y="140" class="section-title" data-narration="Key to Hash Mapping">Key Input</text>
    <rect x="25" y="148" width="55" height="28" rx="4" class="key-box"/>
    <text x="52.5" y="167" text-anchor="middle" class="key-label">k=25</text>
    <path d="M80 162 L95 162" class="arrow-line arrow-anim"/>
    <text x="100" y="166" class="label-text">h(25)</text>
  </g>
  <g class="left-anim" style="animation-delay: 0.5s;">
    <rect x="25" y="190" width="55" height="28" rx="4" class="key-box"/>
    <text x="52.5" y="209" text-anchor="middle" class="key-label">k=42</text>
    <path d="M80 204 L95 204" class="arrow-line arrow-anim" style="animation-delay: 0.3s;"/>
    <text x="100" y="208" class="label-text">h(42)</text>
  </g>
  <g class="left-anim" style="animation-delay: 0.6s;">
    <rect x="25" y="232" width="55" height="28" rx="4" class="key-box"/>
    <text x="52.5" y="251" text-anchor="middle" class="key-label">k=58</text>
    <path d="M80 246 L95 246" class="arrow-line arrow-anim" style="animation-delay: 0.6s;"/>
    <text x="100" y="250" class="label-text">h(58)</text>
  </g>
  <g class="left-anim" style="animation-delay: 0.7s;">
    <text x="95" y="295" class="label-text" font-size="10" font-style="italic" data-narration="Explanation of hash calculation">All map to index 2</text>
    <text x="95" y="308" class="label-text" font-size="9">(25,42,58 mod 5 = 2)</text>
  </g>
  <g class="right-anim" style="animation-delay: 0.3s;">
    <text x="210" y="58" class="section-title" data-narration="Hash Table Array with Buckets">Hash Table (m=5)</text>
    <line x1="180" y1="65" x2="180" y2="350" class="divider"/>
  </g>
  <g class="right-anim" style="animation-delay: 0.4s;">
    <rect x="195" y="75" width="50" height="24" rx="3" class="bucket"/>
    <text x="220" y="91" text-anchor="middle" class="bucket-label">0</text>
    <rect x="195" y="102" width="50" height="24" rx="3" class="bucket"/>
    <text x="220" y="118" text-anchor="middle" class="bucket-label">1</text>
  </g>
  <g class="right-anim" style="animation-delay: 0.5s;">
    <rect x="195" y="129" width="50" height="24" rx="3" class="bucket" filter="url(#shadow)"/>
    <text x="220" y="145" text-anchor="middle" class="bucket-label">2</text>
    <text x="260" y="141" class="label-text" font-size="9" data-narration="Collision handling via chaining">Collision → Chain</text>
  </g>
  <g class="right-anim" style="animation-delay: 0.6s;">
    <rect x="195" y="156" width="50" height="24" rx="3" class="bucket"/>
    <text x="220" y="172" text-anchor="middle" class="bucket-label">3</text>
    <rect x="195" y="183" width="50" height="24" rx="3" class="bucket"/>
    <text x="220" y="199" text-anchor="middle" class="bucket-label">4</text>
  </g>
  <g class="up-anim" style="animation-delay: 0.7s;">
    <text x="220" y="240" class="section-title" data-narration="Separate Chaining for Collisions">Separate Chaining</text>
  </g>
  <g class="up-anim" style="animation-delay: 0.8s;">
    <rect x="195" y="250" width="40" height="22" rx="3" class="chain-box"/>
    <text x="215" y="265" text-anchor="middle" class="key-label" font-size="9">25</text>
    <path d="M195 272 L195 285" class="connector-line"/>
    <circle cx="195" cy="288" r="3" fill="#7f8c8d"/>
    <rect x="195" y="292" width="40" height="22" rx="3" class="chain-box" style="animation-delay: 1s;"/>
    <text x="215" y="307" text-anchor="middle" class="key-label" font-size="9">42</text>
    <path d="M195 314 L195 327" class="connector-line"/>
    <circle cx="195" cy="330" r="3" fill="#7f8c8d"/>
    <rect x="195" y="334" width="40" height="22" rx="3" class="chain-box"/>
    <text x="215" y="349" text-anchor="middle" class="key-label" font-size="9">58</text>
    <path d="M215 345 L245 335" class="connector-line"/>
    <text x="248" y="338" class="label-text" font-size="8">NULL</text>
  </g>
  <g class="up-anim" style="animation-delay: 1s;">
    <rect x="260" y="102" width="45" height="20" rx="3" class="key-box"/>
    <text x="282.5" y="116" text-anchor="middle" class="key-label" font-size="9">15</text>
    <rect x="260" y="183" width="45" height="20" rx="3" class="key-box"/>
    <text x="282.5" y="197" text-anchor="middle" class="key-label" font-size="9">33</text>
  </g>
  <g class="up-anim" style="animation-delay: 1.1s;">
    <rect x="280" y="265" width="35" height="16" rx="2" fill="none" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="297.5" y="276" text-anchor="middle" class="label-text" font-size="8">Linked List</text>
  </g>
  <g style="animation-delay: 1.2s;">
    <rect x="10" y="360" width="400" height="35" rx="4" fill="#f8f9fa" stroke="#e9ecef" stroke-width="1"/>
    <text x="20" y="376" class="label-text" font-size="10" data-narration="Key concept summary">Key Concepts:</text>
    <text x="20" y="388" class="label-text" font-size="9">• Hash function maps keys to bucket indices</text>
    <text x="210" y="388" class="label-text" font-size="9">• Chaining resolves collisions</text>
    <text x="340" y="388" class="label-text" font-size="9">• Avg. O(1) lookup</text>
  </g>
</svg>