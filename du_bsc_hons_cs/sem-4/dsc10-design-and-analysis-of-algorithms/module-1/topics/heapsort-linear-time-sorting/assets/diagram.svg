<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="heapsort-linear-time-sorting" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dde8"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ba3d9"/>
      <stop offset="100%" style="stop-color:#3d7ab8"/>
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7bc47f"/>
      <stop offset="100%" style="stop-color:#5a9e5c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c5a7c" class="slide-in">Heapsort: Max-Heap Structure</text>
  
  <!-- Tree Nodes -->
  <g filter="url(#shadow)">
    <!-- Level 1: Root -->
    <circle cx="210" cy="70" r="22" fill="url(#nodeGradient)" class="fade-in delay-1"/>
    <text x="210" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">50</text>
    
    <!-- Level 2 -->
    <circle cx="130" cy="130" r="20" fill="url(#nodeGradient)" class="fade-in delay-2"/>
    <text x="130" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">30</text>
    
    <circle cx="290" cy="130" r="20" fill="url(#nodeGradient)" class="fade-in delay-2"/>
    <text x="290" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">20</text>
    
    <!-- Level 3 -->
    <circle cx="80" cy="195" r="18" fill="url(#nodeGradient)" class="fade-in delay-3"/>
    <text x="80" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">15</text>
    
    <circle cx="160" cy="195" r="18" fill="url(#nodeGradient)" class="fade-in delay-3"/>
    <text x="160" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">10</text>
    
    <circle cx="240" cy="195" r="18" fill="url(#nodeGradient)" class="fade-in delay-3"/>
    <text x="240" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">8</text>
    
    <circle cx="320" cy="195" r="18" fill="url(#nodeGradient)" class="fade-in delay-3"/>
    <text x="320" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">3</text>
  </g>
  
  <!-- Tree Edges -->
  <g stroke="#5a9e5c" stroke-width="2" fill="none">
    <line x1="210" y1="70" x2="130" y2="130" class="draw-line delay-4"/>
    <line x1="210" y1="70" x2="290" y2="130" class="draw-line delay-4"/>
    <line x1="130" y1="130" x2="80" y2="195" class="draw-line delay-5"/>
    <line x1="130" y1="130" x2="160" y2="195" class="draw-line delay-5"/>
    <line x1="290" y1="130" x2="240" y2="195" class="draw-line delay-5"/>
    <line x1="290" y1="130" x2="320" y2="195" class="draw-line delay-5"/>
  </g>
  
  <!-- Array Representation -->
  <g class="slide-in delay-4">
    <text x="30" y="245" font-family="Arial, sans-serif" font-size="12" fill="#2c5a7c" font-weight="bold">Array:</text>
    <!-- Array cells -->
    <g>
      <rect x="30" y="255" width="40" height="28" fill="url(#arrayGradient)" rx="4" stroke="#4a8a4d" stroke-width="1"/>
      <text x="50" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">50</text>
      <text x="50" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">[0]</text>
    </g>
    <g>
      <rect x="75" y="255" width="40" height="28" fill="url(#arrayGradient)" rx="4" stroke="#4a8a4d" stroke-width="1"/>
      <text x="95" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">30</text>
      <text x="95" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">[1]</text>
    </g>
    <g>
      <rect x="120" y="255" width="40" height="28" fill="url(#arrayGradient)" rx="4" stroke="#4a8a4d" stroke-width="1"/>
      <text x="140" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">20</text>
      <text x="140" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">[2]</text>
    </g>
    <g>
      <rect x="165" y="255" width="40" height="28" fill="url(#arrayGradient)" rx="4" stroke="#4a8a4d" stroke-width="1"/>
      <text x="185" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">15</text>
      <text x="185" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">[3]</text>
    </g>
    <g>
      <rect x="210" y="255" width="40" height="28" fill="url(#arrayGradient)" rx="4" stroke="#4a8a4d" stroke-width="1"/>
      <text x="230" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">10</text>
      <text x="230" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">[4]</text>
    </g>
    <g>
      <rect x="255" y="255" width="40" height="28" fill="url(#arrayGradient)" rx="4" stroke="#4a8a4d" stroke-width="1"/>
      <text x="275" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">8</text>
      <text x="275" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">[5]</text>
    </g>
    <g>
      <rect x="300" y="255" width="40" height="28" fill="url(#arrayGradient)" rx="4" stroke="#4a8a4d" stroke-width="1"/>
      <text x="320" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">3</text>
      <text x="320" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">[6]</text>
    </g>
  </g>
  
  <!-- Connection Lines from Tree to Array -->
  <g stroke="#d97b5b" stroke-width="1.5" stroke-dasharray="4,2" fill="none" class="fade-in delay-5">
    <line x1="130" y1="130" x2="95" y2="255"/>
    <line x1="290" y1="130" x2="140" y2="255"/>
    <line x1="80" y1="195" x2="185" y2="255"/>
    <line x1="160" y1="195" x2="230" y2="255"/>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="fade-in delay-4">
    <!-- Box 1: Max-Heap Property -->
    <rect x="10" y="315" width="125" height="35" fill="#fff9e6" rx="5" stroke="#e6c200" stroke-width="1"/>
    <text x="15" y="330" font-family="Arial, sans-serif" font-size="10" fill="#664400" font-weight="bold">Max-Heap Property:</text>
    <text x="15" y="343" font-family="Arial, sans-serif" font-size="9" fill="#664400">Parent ≥ Children</text>
    
    <!-- Box 2: Parent Index Formula -->
    <rect x="145" y="315" width="130" height="35" fill="#e6f4ff" rx="5" stroke="#4a90d9" stroke-width="1"/>
    <text x="150" y="330" font-family="Arial, sans-serif" font-size="10" fill="#225588" font-weight="bold">Parent Index:</text>
    <text x="150" y="343" font-family="Arial, sans-serif" font-size="9" fill="#225588">⌊(i-1)/2⌋</text>
    
    <!-- Box 3: Child Index Formula -->
    <rect x="285" y="315" width="120" height="35" fill="#e6ffe6" rx="5" stroke="#4caf50" stroke-width="1"/>
    <text x="290" y="330" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" font-weight="bold">Child Indices:</text>
    <text x="290" y="343" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32">L: 2i+1, R: 2i+2</text>
  </g>
  
  <!-- Narration Labels -->
  <g data-narration="Binary tree representation of max-heap with root value 50">
    <title>Max-Heap Tree</title>
  </g>
  <g data-narration="Complete binary tree - all levels filled except possibly last">
    <title>Complete Binary Tree</title>
  </g>
  <g data-narration="Array representation allows O(1) parent/child access">
    <title>Array Representation</title>
  </g>
  <g data-narration="Heapify operation maintains max-heap property in O(log n)">
    <title>Heapify Operation</title>
  </g>
  
  <!-- Animated Pulse on Root Node -->
  <circle cx="210" cy="70" r="22" fill="none" stroke="#ff6b6b" stroke-width="2" class="pulse" style="animation-delay: 1.5s;"/>
</svg>