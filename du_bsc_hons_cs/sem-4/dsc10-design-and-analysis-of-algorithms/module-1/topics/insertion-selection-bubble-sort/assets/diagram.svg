<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="insertion-selection-bubble-sort">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bubble {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes highlight {
      0%, 100% { fill: #ff6b6b; }
      50% { fill: #4ecdc4; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
    .bubble-anim { animation: bubble 1.5s ease-in-out infinite; }
    .highlight-anim { animation: highlight 1s ease-in-out infinite; }
    .title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2980b9; }
    .box { fill: url(#boxGradient); stroke: #bdc3c7; stroke-width: 1; rx: 5; }
    .arrow { fill: none; stroke: #3498db; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in" data-narration="Title section introducing sorting algorithms">
    <text x="210" y="28" text-anchor="middle" class="title">Sorting Algorithms</text>
    <text x="210" y="46" text-anchor="middle" class="detail">Bubble, Selection &amp; Insertion Sort</text>
  </g>
  
  <!-- Bubble Sort Section -->
  <g class="slide-in" style="animation-delay: 0.2s" transform="translate(15, 70)" data-narration="Bubble Sort: Compare adjacent elements and swap if needed">
    <rect class="box" x="0" y="0" width="120" height="85" filter="url(#shadow)"/>
    <text x="60" y="18" text-anchor="middle" class="section-title">Bubble Sort</text>
    <text x="10" y="38" class="detail">Passes through list,</text>
    <text x="10" y="52" class="detail">swaps adjacent if wrong</text>
    <text x="10" y="66" class="detail">order. Small elements</text>
    <text x="10" y="78" class="detail">"bubble" to top.</text>
    <!-- Visual bars -->
    <g transform="translate(15, 88)">
      <rect x="0" y="15" width="12" height="20" fill="#3498db" rx="2"/>
      <rect x="16" y="8" width="12" height="27" fill="#3498db" rx="2"/>
      <rect x="32" y="0" width="12" height="35" fill="#e74c3c" rx="2" class="highlight-anim"/>
      <rect x="48" y="10" width="12" height="25" fill="#3498db" rx="2"/>
      <rect x="64" y="5" width="12" height="30" fill="#3498db" rx="2"/>
      <rect x="80" y="18" width="12" height="17" fill="#3498db" rx="2"/>
    </g>
    <text x="60" y="135" text-anchor="middle" class="detail">O(n²)</text>
  </g>
  
  <!-- Selection Sort Section -->
  <g class="slide-in" style="animation-delay: 0.4s" transform="translate(150, 70)" data-narration="Selection Sort: Finds minimum and places at beginning">
    <rect class="box" x="0" y="0" width="120" height="85" filter="url(#shadow)"/>
    <text x="60" y="18" text-anchor="middle" class="section-title">Selection Sort</text>
    <text x="10" y="38" class="detail">Finds minimum element</text>
    <text x="10" y="52" class="detail">in unsorted portion,</text>
    <text x="10" y="66" class="detail">swaps with first</text>
    <text x="10" y="78" class="detail">unsorted position.</text>
    <!-- Visual bars -->
    <g transform="translate(15, 88)">
      <rect x="0" y="0" width="12" height="35" fill="#27ae60" rx="2" class="pulse"/>
      <rect x="16" y="10" width="12" height="25" fill="#3498db" rx="2"/>
      <rect x="32" y="15" width="12" height="20" fill="#3498db" rx="2"/>
      <rect x="48" y="8" width="12" height="27" fill="#3498db" rx="2"/>
      <rect x="64" y="18" width="12" height="17" fill="#3498db" rx="2"/>
      <rect x="80" y="12" width="12" height="23" fill="#3498db" rx="2"/>
    </g>
    <text x="60" y="135" text-anchor="middle" class="detail">O(n²)</text>
  </g>
  
  <!-- Insertion Sort Section -->
  <g class="slide-in" style="animation-delay: 0.6s" transform="translate(285, 70)" data-narration="Insertion Sort: Builds sorted portion by inserting elements">
    <rect class="box" x="0" y="0" width="120" height="85" filter="url(#shadow)"/>
    <text x="60" y="18" text-anchor="middle" class="section-title">Insertion Sort</text>
    <text x="10" y="38" class="detail">Builds sorted portion</text>
    <text x="10" y="52" class="detail">left to right by</text>
    <text x="10" y="66" class="detail">inserting each element</text>
    <text x="10" y="78" class="detail">into correct position.</text>
    <!-- Visual bars -->
    <g transform="translate(15, 88)">
      <rect x="0" y="0" width="12" height="35" fill="#9b59b6" rx="2"/>
      <rect x="16" y="5" width="12" height="30" fill="#9b59b6" rx="2"/>
      <rect x="32" y="10" width="12" height="25" fill="#e74c3c" rx="2" class="highlight-anim"/>
      <rect x="48" y="15" width="12" height="20" fill="#3498db" rx="2"/>
      <rect x="64" y="8" width="12" height="27" fill="#3498db" rx="2"/>
      <rect x="80" y="18" width="12" height="17" fill="#3498db" rx="2"/>
    </g>
    <text x="60" y="135" text-anchor="middle" class="detail">O(n²)</text>
  </g>
  
  <!-- Comparison Box -->
  <g class="fade-in" style="animation-delay: 0.8s" transform="translate(15, 220)" data-narration="Comparison of time complexities and use cases">
    <rect class="box" x="0" y="0" width="390" height="75" filter="url(#shadow)"/>
    <text x="195" y="18" text-anchor="middle" class="section-title">Comparison Summary</text>
    <line x1="10" y1="28" x2="380" y2="28" stroke="#ecf0f1" stroke-width="1"/>
    
    <text x="20" y="45" class="label">Bubble:</text>
    <text x="80" y="45" class="detail">Simple, O(n²), stable</text>
    
    <text x="160" y="45" class="label">Selection:</text>
    <text x="230" y="45" class="detail">Min swaps, O(n²)</text>
    
    <text x="300" y="45" class="label">Insertion:</text>
    <text x="370" y="45" class="detail">Best for nearly sorted</text>
    
    <text x="20" y="63" class="label">Best Case:</text>
    <text x="90" y="63" class="detail">Bubble: O(n)</text>
    <text x="170" y="63" class="detail">Selection: O(n²)</text>
    <text x="270" y="63" class="detail">Insertion: O(n)</text>
  </g>
  
  <!-- Visual Process Arrows -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Visual process showing algorithm flow">
    <path d="M 75 160 Q 75 180 120 185" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M 210 160 Q 210 180 255 185" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M 345 160 Q 345 180 300 185" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,2"/>
    
    <polygon points="120,185 115,178 125,178" fill="#e67e22"/>
    <polygon points="255,185 250,178 260,178" fill="#e67e22"/>
    <polygon points="300,185 295,178 305,178" fill="#e67e22"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="fade-in" style="animation-delay: 1.2s" transform="translate(15, 305)" data-narration="Key educational points">
    <rect class="box" x="0" y="0" width="390" height="80" filter="url(#shadow)"/>
    <text x="195" y="18" text-anchor="middle" class="section-title">Key Concepts</text>
    <line x1="10" y1="28" x2="380" y2="28" stroke="#ecf0f1" stroke-width="1"/>
    
    <circle cx="25" cy="48" r="4" fill="#e74c3c"/>
    <text x="38" y="52" class="detail">All are in-place sorting algorithms</text>
    
    <circle cx="25" cy="64" r="4" fill="#27ae60"/>
    <text x="38" y="68" class="detail">All have O(n²) worst-case time complexity</text>
    
    <circle cx="200" cy="48" r="4" fill="#3498db"/>
    <text x="213" y="52" class="detail">Insertion Sort is adaptive</text>
    
    <circle cx="200" cy="64" r="4" fill="#9b59b6"/>
    <text x="213" y="68" class="detail">Selection Sort makes n-1 swaps</text>
  </g>
  
  <!-- Animated decorative elements -->
  <g class="bubble-anim" style="transform-origin: 30px 30px;">
    <circle cx="30" cy="30" r="8" fill="#3498db" opacity="0.3"/>
  </g>
  <g class="bubble-anim" style="animation-delay: 0.5s; transform-origin: 390px 370px;">
    <circle cx="390" cy="370" r="10" fill="#9b59b6" opacity="0.3"/>
  </g>
</svg>