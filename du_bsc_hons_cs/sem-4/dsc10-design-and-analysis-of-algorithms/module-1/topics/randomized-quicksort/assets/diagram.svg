<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="randomized_quicksort">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pivotGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdcb6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3436; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3436; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #636e72; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .complexity { font-family: monospace; font-size: 14px; fill: #2d3436; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-bounce { animation: bounce 1s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="anim-slide" data-narration="Title introducing Randomized Quicksort">
    <text x="210" y="28" text-anchor="middle" class="title">Randomized Quicksort</text>
    <line x1="80" y1="38" x2="340" y2="38" stroke="#74b9ff" stroke-width="2"/>
  </g>
  
  <!-- Root Array -->
  <g class="anim-fade" data-narration="Root array of n elements before sorting" style="animation-delay: 0.3s">
    <text x="30" y="60" class="label" font-weight="bold">Input Array (n elements)</text>
    <rect x="30" y="68" width="200" height="28" rx="4" fill="url(#arrayGradient)" filter="url(#shadow)"/>
    <text x="130" y="87" text-anchor="middle" fill="white" font-size="14" font-family="Arial">[ 5 | 2 | 8 | 1 | 9 | 3 | 7 | 4 | 6 ]</text>
  </g>
  
  <!-- Random Pivot Selection -->
  <g class="anim-fade" data-narration="Random pivot selection process" style="animation-delay: 0.6s">
    <text x="270" y="60" class="label" font-weight="bold">Random Pivot</text>
    <rect x="260" y="68" width="130" height="28" rx="4" fill="url(#pivotGradient)" filter="url(#shadow)"/>
    <text x="325" y="87" text-anchor="middle" fill="white" font-size="14" font-family="Arial" class="anim-pulse">Random Index</text>
    <path d="M250 82 L258 82" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Recursion Tree -->
  <g class="anim-fade" data-narration="Recursion tree showing array splits at each level" style="animation-delay: 0.9s">
    <text x="30" y="125" class="label" font-weight="bold">Recursion Tree</text>
    
    <!-- Root Node -->
    <rect x="165" y="135" width="70" height="30" rx="4" fill="url(#arrayGradient)" filter="url(#shadow)"/>
    <text x="200" y="155" text-anchor="middle" fill="white" font-size="11">n elements</text>
    
    <!-- Level 1 -->
    <line x1="200" y1="165" x2="140" y2="195" stroke="#636e72" stroke-width="1.5"/>
    <line x1="200" y1="165" x2="260" y2="195" stroke="#636e72" stroke-width="1.5"/>
    
    <rect x="95" y="198" width="65" height="28" rx="4" fill="url(#leftGradient)" filter="url(#shadow)"/>
    <text x="127" y="216" text-anchor="middle" fill="white" font-size="11">k elements</text>
    <text x="127" y="232" text-anchor="middle" class="detail">left</text>
    
    <rect x="240" y="198" width="65" height="28" rx="4" fill="url(#rightGradient)" filter="url(#shadow)"/>
    <text x="272" y="216" text-anchor="middle" fill="white" font-size="11">n-k-1</text>
    <text x="272" y="232" text-anchor="middle" class="detail">right</text>
    
    <!-- Level 2 (balanced example) -->
    <line x1="127" y1="226" x2="100" y2="255" stroke="#636e72" stroke-width="1"/>
    <line x1="127" y1="226" x2="154" y2="255" stroke="#636e72" stroke-width="1"/>
    <rect x="70" y="258" width="45" height="22" rx="3" fill="#81ecec" filter="url(#shadow)"/>
    <text x="92" y="273" text-anchor="middle" fill="white" font-size="9">~n/4</text>
    
    <rect x="115" y="258" width="45" height="22" rx="3" fill="#81ecec" filter="url(#shadow)"/>
    <text x="137" y="273" text-anchor="middle" fill="white" font-size="9">~n/4</text>
    
    <line x1="272" y1="226" x2="245" y2="255" stroke="#636e72" stroke-width="1"/>
    <line x1="272" y1="226" x2="299" y2="255" stroke="#636e72" stroke-width="1"/>
    <rect x="215" y="258" width="45" height="22" rx="3" fill="#a29bfe" filter="url(#shadow)"/>
    <text x="237" y="273" text-anchor="middle" fill="white" font-size="9">~n/4</text>
    
    <rect x="260" y="258" width="45" height="22" rx="3" fill="#a29bfe" filter="url(#shadow)"/>
    <text x="282" y="273" text-anchor="middle" fill="white" font-size="9">~n/4</text>
  </g>
  
  <!-- Cases Comparison -->
  <g class="anim-fade" data-narration="Average case vs Worst case comparison" style="animation-delay: 1.2s">
    <text x="30" y="310" class="label" font-weight="bold">Split Cases</text>
    
    <!-- Average Case Box -->
    <rect x="30" y="320" width="160" height="45" rx="5" fill="#00b894" filter="url(#shadow)"/>
    <text x="110" y="338" text-anchor="middle" class="box-title">Average Case</text>
    <text x="110" y="354" text-anchor="middle" fill="white" font-size="11">Balanced ~n/2 + n/2</text>
    <text x="110" y="366" text-anchor="middle" class="complexity">O(n log n)</text>
    
    <!-- Worst Case Box -->
    <rect x="210" y="320" width="160" height="45" rx="5" fill="#d63031" filter="url(#shadow)"/>
    <text x="290" y="338" text-anchor="middle" class="box-title">Worst Case</text>
    <text x="290" y="354" text-anchor="middle" fill="white" font-size="11">Unbalanced n-1 + 0</text>
    <text x="290" y="366" text-anchor="middle" class="complexity">O(n²)</text>
  </g>
  
  <!-- Key Points Box -->
  <g class="anim-fade" data-narration="Key advantages of randomized quicksort" style="animation-delay: 1.5s">
    <rect x="30" y="375" width="360" height="20" rx="3" fill="#f8f9fa" stroke="#dfe6e9" stroke-width="1"/>
    <text x="40" y="388" class="detail">✓ Expected O(n log n) &nbsp;✓ No worst-case vulnerability &nbsp;✓ Random selection prevents attack</text>
  </g>
  
  <!-- Animated arrow indicators -->
  <g class="anim-bounce" data-narration="Visual flow of the algorithm" style="animation-delay: 1.8s">
    <circle cx="370" cy="155" r="8" fill="#74b9ff"/>
    <path d="M370 162 L370 175" stroke="#74b9ff" stroke-width="2"/>
    <circle cx="370" cy="180" r="5" fill="#fdcb6e"/>
  </g>
</svg>