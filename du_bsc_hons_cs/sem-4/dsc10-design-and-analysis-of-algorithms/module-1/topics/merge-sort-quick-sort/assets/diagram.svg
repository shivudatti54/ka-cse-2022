<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="merge-sort-quick-sort">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mergeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="quickGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideDown {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-text { animation: slideIn 0.8s ease-out forwards; }
    .section-1 { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideDown 0.6s ease-out 0.8s forwards; opacity: 0; }
    .tree-node { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: slideIn 0.5s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="420" height="50" fill="url(#headerGradient)" rx="10"/>
  <text x="210" y="32" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold" class="title-text">Merge Sort &amp; Quick Sort</text>
  
  <!-- Section 1: Divide and Conquer -->
  <g class="section-1" data-narration="The divide-and-conquer paradigm has three steps: Divide the problem, Conquer subproblems recursively, Combine solutions">
    <rect x="10" y="60" width="125" height="75" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5" rx="5"/>
    <text x="72" y="78" text-anchor="middle" fill="#2c5282" font-family="Arial" font-size="14" font-weight="bold">Divide &amp; Conquer</text>
    <text x="72" y="95" text-anchor="middle" fill="#4a5568" font-family="Arial" font-size="10">1. Divide</text>
    <text x="72" y="108" text-anchor="middle" fill="#4a5568" font-family="Arial" font-size="10">2. Conquer</text>
    <text x="72" y="121" text-anchor="middle" fill="#4a5568" font-family="Arial" font-size="10">3. Combine</text>
  </g>
  
  <!-- Section 2: Merge Sort -->
  <g class="section-2" data-narration="Merge Sort divides array in half, sorts each half, then merges sorted subarrays">
    <rect x="145" y="60" width="130" height="75" fill="url(#mergeGradient)" stroke="#2d8a5e" stroke-width="1.5" rx="5"/>
    <text x="210" y="78" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="14" font-weight="bold">Merge Sort</text>
    <text x="210" y="95" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="10">O(n log n)</text>
    <text x="210" y="110" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="10">Stable</text>
    <text x="210" y="125" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="10">Divide → Merge</text>
  </g>
  
  <!-- Section 3: Quick Sort -->
  <g class="section-3" data-narration="Quick Sort selects a pivot, partitions around it, then sorts partitions recursively">
    <rect x="285" y="60" width="125" height="75" fill="url(#quickGradient)" stroke="#c05621" stroke-width="1.5" rx="5"/>
    <text x="347" y="78" text-anchor="middle" fill="#742a2a" font-family="Arial" font-size="14" font-weight="bold">Quick Sort</text>
    <text x="347" y="95" text-anchor="middle" fill="#742a2a" font-family="Arial" font-size="10">O(n log n) avg</text>
    <text x="347" y="110" text-anchor="middle" fill="#742a2a" font-family="Arial" font-size="10">Unstable</text>
    <text x="347" y="125" text-anchor="middle" fill="#742a2a" font-family="Arial" font-size="10">Pivot → Partition</text>
  </g>
  
  <!-- Section 4: Merge Sort Recursion Tree -->
  <g class="section-4" data-narration="Merge Sort recursion tree shows how the array is divided recursively until single elements, then merged back sorted">
    <rect x="10" y="145" width="400" height="240" fill="#faf5ff" stroke="#805ad5" stroke-width="1.5" rx="5"/>
    <text x="210" y="165" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="14" font-weight="bold">Merge Sort Recursion Tree</text>
    
    <!-- Tree Level 0 -->
    <rect x="175" y="180" width="70" height="25" fill="#667eea" rx="3" class="tree-node"/>
    <text x="210" y="197" text-anchor="middle" fill="white" font-family="Arial" font-size="11">[8,3,5,1,7,4,6,2]</text>
    
    <!-- Arrow down -->
    <line x1="210" y1="205" x2="145" y2="230" stroke="#805ad5" stroke-width="1.5" class="arrow-anim"/>
    <line x1="210" y1="205" x2="275" y2="230" stroke="#805ad5" stroke-width="1.5" class="arrow-anim"/>
    
    <!-- Tree Level 1 -->
    <rect x="110" y="235" width="65" height="22" fill="#43e97b" rx="3"/>
    <text x="142" y="250" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="10">[8,3,5,1]</text>
    <rect x="245" y="235" width="65" height="22" fill="#43e97b" rx="3"/>
    <text x="277" y="250" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="10">[7,4,6,2]</text>
    
    <!-- Arrow down -->
    <line x1="142" y1="257" x2="95" y2="280" stroke="#805ad5" stroke-width="1"/>
    <line x1="142" y1="257" x2="175" y2="280" stroke="#805ad5" stroke-width="1"/>
    <line x1="277" y1="257" x2="220" y2="280" stroke="#805ad5" stroke-width="1"/>
    <line x1="277" y1="257" x2="305" y2="280" stroke="#805ad5" stroke-width="1"/>
    
    <!-- Tree Level 2 -->
    <rect x="65" y="285" width="55" height="18" fill="#38f9d7" rx="3"/>
    <text x="92" y="297" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="9">[8,3]</text>
    <rect x="145" y="285" width="55" height="18" fill="#38f9d7" rx="3"/>
    <text x="172" y="297" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="9">[5,1]</text>
    <rect x="195" y="285" width="55" height="18" fill="#38f9d7" rx="3"/>
    <text x="222" y="297" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="9">[7,4]</text>
    <rect x="275" y="285" width="55" height="18" fill="#38f9d7" rx="3"/>
    <text x="302" y="297" text-anchor="middle" fill="#1a4731" font-family="Arial" font-size="9">[6,2]</text>
    
    <!-- Arrow down -->
    <line x1="92" y1="303" x2="75" y2="320" stroke="#805ad5" stroke-width="1"/>
    <line x1="92" y1="303" x2="110" y2="320" stroke="#805ad5" stroke-width="1"/>
    <line x1="172" y1="303" x2="155" y2="320" stroke="#805ad5" stroke-width="1"/>
    <line x1="172" y1="303" x2="190" y2="320" stroke="#805ad5" stroke-width="1"/>
    <line x1="222" y1="303" x2="205" y2="320" stroke="#805ad5" stroke-width="1"/>
    <line x1="222" y1="303" x2="240" y2="320" stroke="#805ad5" stroke-width="1"/>
    <line x1="302" y1="303" x2="285" y2="320" stroke="#805ad5" stroke-width="1"/>
    <line x1="302" y1="303" x2="320" y2="320" stroke="#805ad5" stroke-width="1"/>
    
    <!-- Tree Level 3 (Leaves) -->
    <rect x="60" y="325" width="30" height="14" fill="#faf5ff" stroke="#805ad5" stroke-width="1" rx="2"/>
    <text x="75" y="335" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="8">[8]</text>
    <rect x="95" y="325" width="30" height="14" fill="#faf5ff" stroke="#805ad5" stroke-width="1" rx="2"/>
    <text x="110" y="335" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="8">[3]</text>
    <rect x="140" y="325" width="30" height="14" fill="#faf5ff" stroke="#805ad5" stroke-width="1" rx="2"/>
    <text x="155" y="335" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="8">[5]</text>
    <rect x="175" y="325" width="30" height="14" fill="#faf5ff" stroke="#805ad5" stroke-width="1" rx="2"/>
    <text x="190" y="335" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="8">[1]</text>
    <rect x="190" y="325" width="30" height="14" fill="#faf5ff" stroke="#805ad5" stroke-width="1" rx="2"/>
    <text x="205" y="335" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="8">[7]</text>
    <rect x="225" y="325" width="30" height="14" fill="#faf5ff" stroke="#805ad5" stroke-width="1" rx="2"/>
    <text x="240" y="335" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="8">[4]</text>
    <rect x="270" y="325" width="30" height="14" fill="#faf5ff" stroke="#805ad5" stroke-width="1" rx="2"/>
    <text x="285" y="335" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="8">[6]</text>
    <rect x="305" y="325" width="30" height="14" fill="#faf5ff" stroke="#805ad5" stroke-width="1" rx="2"/>
    <text x="320" y="335" text-anchor="middle" fill="#553c9a" font-family="Arial" font-size="8">[2]</text>
    
    <!-- Merge arrows back up -->
    <path d="M 75 345 Q 92 355 110 345" stroke="#38f9d7" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 155 345 Q 172 355 190 345" stroke="#38f9d7" stroke-width="1.5" fill="none"/>
    <path d="M 205 345 Q 222 355 240 345" stroke="#38f9d7" stroke-width="1.5" fill="none"/>
    <path d="M 285 345 Q 302 355 320 345" stroke="#38f9d7" stroke-width="1.5" fill="none"/>
    
    <!-- Label for merge -->
    <text x="210" y="368" text-anchor="middle" fill="#805ad5" font-family="Arial" font-size="10" font-style="italic">Merge operations combine sorted subarrays</text>
  </g>
</svg>