<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="linear-binary-search" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeef0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="startGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decisionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    @keyframes checkPulse {
      0%, 100% { stroke: #667eea; stroke-width: 2; fill: #e8f4f8; }
      50% { stroke: #f5576c; stroke-width: 3; fill: #ffeaa7; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3436; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #2d3436; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #636e72; }
    .box { filter: url(#shadow); }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-pulse { animation: arrowPulse 1.5s ease-in-out infinite; }
    .arr-element { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in" data-narration="Title section introducing Linear Search algorithm">
    <text x="210" y="30" text-anchor="middle" class="title">Linear Search</text>
    <text x="210" y="50" text-anchor="middle" class="detail">Sequential Search Algorithm</text>
  </g>
  
  <!-- Flowchart Section -->
  <g transform="translate(30, 70)" data-narration="Flowchart showing the linear search algorithm steps">
    
    <!-- Start Box -->
    <g class="slide-in" style="animation-delay: 0.2s">
      <rect x="120" y="0" width="80" height="30" rx="15" fill="url(#startGradient)" class="box"/>
      <text x="160" y="20" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">START</text>
    </g>
    
    <!-- Arrow down -->
    <line x1="160" y1="30" x2="160" y2="45" stroke="#2d3436" stroke-width="2" class="arrow-pulse"/>
    
    <!-- Initialize i=0 -->
    <g class="slide-in" style="animation-delay: 0.4s">
      <rect x="90" y="45" width="140" height="28" rx="4" fill="white" stroke="#667eea" stroke-width="2" class="box"/>
      <text x="160" y="63" text-anchor="middle" class="label">i = 0</text>
    </g>
    
    <!-- Arrow down -->
    <line x1="160" y1="73" x2="160" y2="88" stroke="#2d3436" stroke-width="2" class="arrow-pulse"/>
    
    <!-- Decision Diamond - Is arr[i] == target? -->
    <g class="slide-in" style="animation-delay: 0.6s">
      <polygon points="160,88 220,118 160,148 100,118" fill="url(#decisionGradient)" class="box"/>
      <text x="160" y="114" text-anchor="middle" fill="white" font-family="Arial" font-size="10">arr[i] ==</text>
      <text x="160" y="128" text-anchor="middle" fill="white" font-family="Arial" font-size="10">target?</text>
    </g>
    
    <!-- Yes Arrow (right) -->
    <g class="slide-in" style="animation-delay: 0.8s">
      <line x1="220" y1="118" x2="260" y2="118" stroke="#38ef7d" stroke-width="2" class="arrow-pulse"/>
      <polygon points="260,114 250,118 260,122" fill="#38ef7d"/>
      <text x="245" y="108" class="detail" fill="#11998e" font-weight="bold">YES</text>
    </g>
    
    <!-- Return i Box -->
    <g class="slide-in" style="animation-delay: 1s">
      <rect x="260" y="103" width="80" height="30" rx="4" fill="#38ef7d" stroke="#11998e" stroke-width="2" class="box"/>
      <text x="300" y="122" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Return i</text>
    </g>
    
    <!-- No Arrow (down) -->
    <g class="slide-in" style="animation-delay: 1.2s">
      <line x1="160" y1="148" x2="160" y2="163" stroke="#f5576c" stroke-width="2" class="arrow-pulse"/>
      <polygon points="156,163 160,153 164,163" fill="#f5576c"/>
      <text x="175" y="158" class="detail" fill="#f5576c" font-weight="bold">NO</text>
    </g>
    
    <!-- Increment i -->
    <g class="slide-in" style="animation-delay: 1.4s">
      <rect x="100" y="163" width="120" height="28" rx="4" fill="white" stroke="#667eea" stroke-width="2" class="box"/>
      <text x="160" y="181" text-anchor="middle" class="label">i = i + 1</text>
    </g>
    
    <!-- Arrow down -->
    <line x1="160" y1="191" x2="160" y2="206" stroke="#2d3436" stroke-width="2" class="arrow-pulse"/>
    
    <!-- Decision Diamond - Is i < n? -->
    <g class="slide-in" style="animation-delay: 1.6s">
      <polygon points="160,206 210,231 160,256 110,231" fill="url(#decisionGradient)" class="box"/>
      <text x="160" y="227" text-anchor="middle" fill="white" font-family="Arial" font-size="10">i &lt; n?</text>
    </g>
    
    <!-- Yes Arrow (loop back) -->
    <g class="slide-in" style="animation-delay: 1.8s">
      <path d="M110,231 Q70,231 70,173 Q70,118 100,118" stroke="#f5576c" stroke-width="2" fill="none" stroke-dasharray="4" class="arrow-pulse"/>
      <polygon points="100,114 110,118 102,122" fill="#f5576c"/>
      <text x="50" y="150" class="detail" fill="#f5576c" font-weight="bold">YES</text>
    </g>
    
    <!-- No Arrow (right) -->
    <g class="slide-in" style="animation-delay: 2s">
      <line x1="210" y1="231" x2="250" y2="231" stroke="#f5576c" stroke-width="2" class="arrow-pulse"/>
      <polygon points="250,227 240,231 250,235" fill="#f5576c"/>
      <text x="235" y="220" class="detail" fill="#f5576c" font-weight="bold">NO</text>
    </g>
    
    <!-- Not Found Box -->
    <g class="slide-in" style="animation-delay: 2.2s">
      <rect x="250" y="216" width="90" height="30" rx="4" fill="#f5576c" stroke="#c44569" stroke-width="2" class="box"/>
      <text x="295" y="235" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Not Found</text>
    </g>
    
  </g>
  
  <!-- Array Visualization Section -->
  <g transform="translate(30, 300)" data-narration="Visual representation of array elements being searched sequentially">
    
    <!-- Array label -->
    <text x="10" y="15" class="label" font-weight="bold">Array:</text>
    <text x="70" y="15" class="arr-element" fill="#2d3436">[</text>
    
    <!-- Array elements -->
    <g class="pulse" style="animation-delay: 0.5s">
      <rect x="85" y="0" width="28" height="24" rx="3" fill="white" stroke="#667eea" stroke-width="1.5"/>
      <text x="99" y="16" text-anchor="middle" class="arr-element" fill="#667eea">5</text>
    </g>
    
    <g class="pulse" style="animation-delay: 0.7s">
      <rect x="117" y="0" width="28" height="24" rx="3" fill="white" stroke="#667eea" stroke-width="1.5"/>
      <text x="131" y="16" text-anchor="middle" class="arr-element" fill="#667eea">12</text>
    </g>
    
    <g class="pulse" style="animation-delay: 0.9s">
      <rect x="149" y="0" width="28" height="24" rx="3" fill="#ffeaa7" stroke="#f5576c" stroke-width="2"/>
      <text x="163" y="16" text-anchor="middle" class="arr-element" fill="#f5576c">23</text>
    </g>
    
    <g class="pulse" style="animation-delay: 1.1s">
      <rect x="181" y="0" width="28" height="24" rx="3" fill="white" stroke="#667eea" stroke-width="1.5"/>
      <text x="195" y="16" text-anchor="middle" class="arr-element" fill="#667eea">41</text>
    </g>
    
    <g class="pulse" style="animation-delay: 1.3s">
      <rect x="213" y="0" width="28" height="24" rx="3" fill="white" stroke="#667eea" stroke-width="1.5"/>
      <text x="227" y="16" text-anchor="middle" class="arr-element" fill="#667eea">58</text>
    </g>
    
    <g class="pulse" style="animation-delay: 1.5s">
      <rect x="245" y="0" width="28" height="24" rx="3" fill="white" stroke="#667eea" stroke-width="1.5"/>
      <text x="259" y="16" text-anchor="middle" class="arr-element" fill="#667eea">67</text>
    </g>
    
    <text x="277" y="15" class="arr-element" fill="#2d3436">]</text>
    
    <!-- Index indicators -->
    <g transform="translate(85, 28)">
      <text x="14" y="0" text-anchor="middle" class="detail">0</text>
    </g>
    <g transform="translate(117, 28)">
      <text x="14" y="0" text-anchor="middle" class="detail">1</text>
    </g>
    <g transform="translate(149, 28)">
      <text x="14" y="0" text-anchor="middle" class="detail">2</text>
    </g>
    <g transform="translate(181, 28)">
      <text x="14" y="0" text-anchor="middle" class="detail">3</text>
    </g>
    <g transform="translate(213, 28)">
      <text x="14" y="0" text-anchor="middle" class="detail">4</text>
    </g>
    <g transform="translate(245, 28)">
      <text x="14" y="0" text-anchor="middle" class="detail">5</text>
    </g>
    
    <!-- Search indicator -->
    <g class="slide-in" style="animation-delay: 2.5s">
      <rect x="85" y="45" width="188" height="22" rx="4" fill="url(#boxGradient)" class="box"/>
      <text x="179" y="60" text-anchor="middle" fill="white" font-family="Arial" font-size="11">Searching: 23 → Found at index 2!</text>
    </g>
    
  </g>
  
  <!-- Key Concept Box -->
  <g transform="translate(290, 290)" class="fade-in" style="animation-delay: 2.8s" data-narration="Key concept summary: Time complexity O(n)">
    <rect x="0" y="0" width="115" height="60" rx="5" fill="white" stroke="#764ba2" stroke-width="2" class="box"/>
    <text x="57" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#764ba2">Key Points</text>
    <text x="57" y="35" text-anchor="middle" class="detail">Time: O(n)</text>
    <text x="57" y="48" text-anchor="middle" class="detail">Space: O(1)</text>
  </g>
  
</svg>