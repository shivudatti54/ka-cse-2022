<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="divide-and-conquer-technique">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="divideGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ffcdc2"/>
    </linearGradient>
    <linearGradient id="conquerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#daffcf"/>
    </linearGradient>
    <linearGradient id="combineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#d4eaff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box-divide { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .box-conquer { animation: slideDown 0.8s ease-out 0.6s both; }
    .box-combine { animation: slideInRight 0.8s ease-out 0.9s both; }
    .arrow1 { animation: fadeIn 0.5s ease-out 1.2s both; }
    .arrow2 { animation: fadeIn 0.5s ease-out 1.5s both; }
    .subprob { animation: pulse 2s ease-in-out infinite; }
    .label { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; }
  </style>
  
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" class="title-text" font-size="20" fill="#2c3e50">Divide and Conquer</text>
  <text x="210" y="50" text-anchor="middle" font-size="12" fill="#5d6d7e" class="label">Algorithm Design Technique</text>
  
  <!-- Divide Box -->
  <g class="box-divide" data-narration="Divide: Break the problem into smaller subproblems of the same type">
    <rect x="20" y="70" width="110" height="70" rx="8" fill="url(#divideGrad)" filter="url(#shadow)"/>
    <text x="75" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b" class="label">DIVIDE</text>
    <text x="75" y="110" text-anchor="middle" font-size="10" fill="#922b21" class="label">Break problem</text>
    <text x="75" y="122" text-anchor="middle" font-size="10" fill="#922b21" class="label">into subproblems</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow1" data-narration="Arrow showing the flow from divide to conquer step">
    <path d="M140 105 L170 105" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="170,105 162,100 162,110" fill="#34495e"/>
  </g>
  
  <!-- Conquer Box -->
  <g class="box-conquer" data-narration="Conquer: Solve each subproblem recursively, or directly if small enough">
    <rect x="180" y="70" width="110" height="70" rx="8" fill="url(#conquerGrad)" filter="url(#shadow)"/>
    <text x="235" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#186a3b" class="label">CONQUER</text>
    <text x="235" y="110" text-anchor="middle" font-size="10" fill="#145a32" class="label">Solve subproblems</text>
    <text x="235" y="122" text-anchor="middle" font-size="10" fill="#145a32" class="label">recursively</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow2" data-narration="Arrow showing the flow from conquer to combine step">
    <path d="M300 105 L330 105" stroke="#34495e" stroke-width="2" fill="none"/>
    <polygon points="330,105 322,100 322,110" fill="#34495e"/>
  </g>
  
  <!-- Combine Box -->
  <g class="box-combine" data-narration="Combine: Merge solutions of subproblems to form the original solution">
    <rect x="340" y="70" width="70" height="70" rx="8" fill="url(#combineGrad)" filter="url(#shadow)"/>
    <text x="375" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5276" class="label">COMBINE</text>
    <text x="375" y="115" text-anchor="middle" font-size="10" fill="#154360" class="label">Merge</text>
    <text x="375" y="127" text-anchor="middle" font-size="10" fill="#154360" class="label">solutions</text>
  </g>
  
  <!-- Visual Example: Problem decomposition -->
  <g data-narration="Visual example showing how a problem is divided into smaller subproblems">
    <text x="210" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50" class="label">Example: Problem Decomposition</text>
    
    <!-- Original Problem -->
    <rect x="160" y="190" width="100" height="30" rx="5" fill="#f5b041" stroke="#d68910" stroke-width="2"/>
    <text x="210" y="210" text-anchor="middle" font-size="11" fill="#7d5209" class="label">Original Problem</text>
    
    <!-- Arrow down -->
    <path d="M210 225 L210 245" stroke="#34495e" stroke-width="1.5" fill="none"/>
    <polygon points="210,245 206,238 214,238" fill="#34495e"/>
    
    <!-- Divided Subproblems -->
    <rect x="85" y="250" width="65" height="25" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
    <text x="117" y="267" text-anchor="middle" font-size="9" fill="#fff" class="label">Sub1</text>
    
    <rect x="155" y="250" width="65" height="25" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
    <text x="187" y="267" text-anchor="middle" font-size="9" fill="#fff" class="label">Sub2</text>
    
    <rect x="225" y="250" width="65" height="25" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
    <text x="257" y="267" text-anchor="middle" font-size="9" fill="#fff" class="label">Sub3</text>
    
    <rect x="295" y="250" width="65" height="25" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
    <text x="327" y="267" text-anchor="middle" font-size="9" fill="#fff" class="label">Sub4</text>
    
    <!-- Arrows from subproblems to merge -->
    <path d="M117 280 L117 300 L210 300 L210 320" stroke="#34495e" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
    <path d="M187 280 L187 300" stroke="#34495e" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
    <path d="M257 280 L257 300 L210 300" stroke="#34495e" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
    <path d="M327 280 L327 300 L210 300" stroke="#34495e" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
    
    <!-- Combined Solution -->
    <rect x="160" y="330" width="100" height="28" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
    <text x="210" y="349" text-anchor="middle" font-size="11" fill="#fff" class="label">Final Solution</text>
  </g>
  
  <!-- Key Applications Box -->
  <g data-narration="Common applications of divide and conquer: sorting, searching, matrix multiplication">
    <rect x="15" y="365" width="180" height="25" rx="4" fill="#fdebd0" stroke="#f5cba7" stroke-width="1"/>
    <text x="25" y="380" font-size="9" fill="#9a7d0a" class="label">Applications: Merge Sort,</text>
    <text x="115" y="380" font-size="9" fill="#9a7d0a" class="label">Binary Search</text>
  </g>
  
  <!-- Recurrence Box -->
  <g data-narration="The time complexity follows the recurrence T(n) = aT(n/b) + f(n)">
    <rect x="205" y="365" width="200" height="25" rx="4" fill="#e8daef" stroke="#d2b4de" stroke-width="1"/>
    <text x="215" y="380" font-size="9" fill="#7d3c98" class="label">Recurrence: T(n) = aT(n/b) + f(n)</text>
  </g>
</svg>