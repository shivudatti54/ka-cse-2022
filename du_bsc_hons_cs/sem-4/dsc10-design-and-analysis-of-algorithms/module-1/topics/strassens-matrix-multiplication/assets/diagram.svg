<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="strassens-matrix-multiplication" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e5f7"/>
      <stop offset="100%" style="stop-color:#a8d4e6"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2d4f0"/>
      <stop offset="100%" style="stop-color:#c9b8e0"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f0e2"/>
      <stop offset="100%" style="stop-color:#a8e0c9"/>
    </linearGradient>
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e4d4"/>
      <stop offset="100%" style="stop-color:#e8d4b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title-text { font-family: Georgia, serif; font-size: 20px; fill: #2c3e50; font-weight: bold; }
    .label-text { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .formula-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #2c3e50; }
    .highlight-text { font-family: Arial, sans-serif; font-size: 13px; fill: #e74c3c; font-weight: bold; }
    .complexity-text { font-family: Arial, sans-serif; font-size: 14px; fill: #27ae60; font-weight: bold; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1.0s; opacity: 0; }
    .delay-6 { animation-delay: 1.2s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text fade-in">Strassen's Matrix Multiplication</text>
  <line x1="80" y1="38" x2="340" y2="38" stroke="#3498db" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: Standard Formula (Left side) -->
  <g class="slide-left delay-1" data-narration="Standard 2×2 matrix multiplication requires 8 scalar multiplications">
    <rect x="15" y="50" width="140" height="75" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="85" y="68" text-anchor="middle" class="label-text" style="font-weight:bold">Standard Method</text>
    <text x="25" y="88" class="formula-text">c11 = a11×b11 + a12×b21</text>
    <text x="25" y="102" class="formula-text">c12 = a11×b12 + a12×b22</text>
    <text x="25" y="116" class="formula-text">c21 = a21×b11 + a22×b21</text>
    <rect x="25" y="122" width="120" height="20" rx="3" fill="#fff5f5"/>
    <text x="85" y="136" text-anchor="middle" class="highlight-text">8 Multiplications</text>
  </g>
  
  <!-- Section 2: Strassen's 7 M formulas (Right side) -->
  <g class="slide-right delay-2" data-narration="Strassen reduces to 7 multiplications using 7 intermediate values M1-M7">
    <rect x="165" y="50" width="185" height="75" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="257" y="68" text-anchor="middle" class="label-text" style="font-weight:bold">Strassen's Method</text>
    <text x="175" y="88" class="formula-text">M1=(a11+a22)(b11+b22)</text>
    <text x="175" y="102" class="formula-text">M2=(a21+a22)b11</text>
    <text x="175" y="116" class="formula-text">M3=a11(b12-b22)</text>
    <rect x="175" y="122" width="165" height="20" rx="3" fill="#f5fff5"/>
    <text x="257" y="136" text-anchor="middle" class="complexity-text">7 Multiplications</text>
  </g>
  
  <!-- Arrow between methods -->
  <g class="fade-in delay-3">
    <path d="M160 87 L155 87 L150 87" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="155,87 150,82 150,92" fill="#7f8c8d"/>
  </g>
  
  <!-- More M formulas -->
  <g class="slide-up delay-3" data-narration="The remaining M4-M7 calculations complete the algorithm">
    <rect x="165" y="135" width="185" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)" style="opacity:0.9"/>
    <text x="257" y="152" class="formula-text">M4=a22(b21-b11)</text>
    <text x="257" y="167" class="formula-text">M5=(a11+a12)b22</text>
    <text x="257" y="182" class="formula-text">M6=(a21-a11)(b11+b12)</text>
  </g>
  
  <!-- Recursion Tree -->
  <g class="fade-in delay-4" data-narration="The divide-and-conquer recursion tree shows how matrices are subdivided">
    <rect x="15" y="200" width="140" height="90" rx="6" fill="url(#treeGradient)" filter="url(#shadow)"/>
    <text x="85" y="218" text-anchor="middle" class="label-text" style="font-weight:bold">Recursion Tree</text>
    
    <!-- Tree structure -->
    <line x1="85" y1="230" x2="85" y2="245" stroke="#8b4513" stroke-width="2"/>
    <circle cx="85" cy="228" r="4" fill="#e74c3c"/>
    
    <!-- Level 1 branches -->
    <line x1="85" y1="245" x2="50" y2="265" stroke="#8b4513" stroke-width="1.5"/>
    <line x1="85" y1="245" x2="85" y2="265" stroke="#8b4513" stroke-width="1.5"/>
    <line x1="85" y1="245" x2="120" y2="265" stroke="#8b4513" stroke-width="1.5"/>
    
    <!-- Level 2 branches -->
    <line x1="50" y1="265" x2="35" y2="280" stroke="#8b4513" stroke-width="1"/>
    <line x1="50" y1="265" x2="65" y2="280" stroke="#8b4513" stroke-width="1"/>
    <line x1="85" y1="265" x2="70" y2="280" stroke="#8b4513" stroke-width="1"/>
    <line x1="85" y1="265" x2="100" y2="280" stroke="#8b4513" stroke-width="1"/>
    <line x1="120" y1="265" x2="105" y2="280" stroke="#8b4513" stroke-width="1"/>
    <line x1="120" y1="265" x2="135" y2="280" stroke="#8b4513" stroke-width="1"/>
    
    <!-- Leaf nodes -->
    <circle cx="35" cy="280" r="3" fill="#27ae60"/>
    <circle cx="65" cy="280" r="3" fill="#27ae60"/>
    <circle cx="70" cy="280" r="3" fill="#27ae60"/>
    <circle cx="100" cy="280" r="3" fill="#27ae60"/>
    <circle cx="105" cy="280" r="3" fill="#27ae60"/>
    <circle cx="135" cy="280" r="3" fill="#27ae60"/>
    
    <text x="85" y="292" text-anchor="middle" class="label-text">7 recursions per level</text>
  </g>
  
  <!-- Complexity Comparison -->
  <g class="slide-up delay-5" data-narration="Time complexity comparison between naive O(n³) and Strassen O(n^2.807)">
    <rect x="165" y="200" width="185" height="90" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="257" y="218" text-anchor="middle" class="label-text" style="font-weight:bold">Complexity Comparison</text>
    
    <!-- Naive -->
    <text x="180" y="242" class="label-text">Naive:</text>
    <text x="240" y="242" class="complexity-text">O(n³)</text>
    <text x="180" y="258" class="label-text">8 mults + 4 adds</text>
    
    <!-- Strassen -->
    <text x="180" y="276" class="label-text">Strassen:</text>
    <text x="257" y="276" class="complexity-text" style="fill:#8e44ad">O(n^2.807)</text>
    <text x="180" y="292" class="label-text">7 mults + 18 adds</text>
    
    <!-- Improvement arrow -->
    <path d="M320 250 Q340 250 340 270 Q340 290 320 290" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="4,2" class="pulse"/>
    <text x="325" y="275" class="label-text" fill="#27ae60" transform="rotate(90,325,275)" style="font-size:10px">27% faster</text>
  </g>
  
  <!-- Base Case Box -->
  <g class="fade-in delay-6" data-narration="Base case: When matrices reach 1×1, direct multiplication is used">
    <rect x="260" y="300" width="90" height="30" rx="4" fill="#fff" stroke="#27ae60" stroke-width="2"/>
    <text x="305" y="320" text-anchor="middle" class="label-text" style="fill:#27ae60;font-weight:bold">Base: 1×1</text>
  </g>
  
  <!-- Connecting arrow to base -->
  <line x1="85" y1="295" x2="200" y2="315" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,3" class="fade-in" style="animation-delay:1.4s"/>
  <line x1="305" y1="300" x2="305" y2="290" stroke="#7f8c8d" stroke-width="1" class="fade-in" style="animation-delay:1.4s"/>
  
  <!-- Key insight box -->
  <g class="slide-up delay-5" data-narration="Key insight: Substituting intermediate values reduces one multiplication at the cost of more additions">
    <rect x="15" y="300" width="130" height="40" rx="4" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5"/>
    <text x="80" y="315" text-anchor="middle" class="label-text" style="font-weight:bold">Key Insight</text>
    <text x="80" y="332" text-anchor="middle" class="formula-text" style="font-size:10px">Trade 1 mult → 4 adds</text>
  </g>
  
  <!-- Bottom legend -->
  <g class="fade-in" style="animation-delay:1.5s">
    <circle cx="30" cy="365" r="4" fill="#e74c3c"/>
    <text x="40" y="369" class="label-text" style="font-size:10px">7 M-values</text>
    <circle cx="90" cy="365" r="4" fill="#27ae60"/>
    <text x="100" y="369" class="label-text" style="font-size:10px">Base cases</text>
    <circle cx="150" cy="365" r="4" fill="#3498db"/>
    <text x="160" y="369" class="label-text" style="font-size:10px">Additions</text>
  </g>
</svg>