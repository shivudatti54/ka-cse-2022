<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="subset-sum-problem">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cellGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7a8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28a745;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e7e34;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideIn {
        from { transform: translateY(-10px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
      .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #555; }
      .section-box { fill: #fff; stroke: #b8d4e3; stroke-width: 1.5; rx: 8; }
      .cell { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 0.5; }
      .cell-filled { fill: url(#cellGradient); }
      .cell-highlight { fill: url(#highlightGradient); animation: pulse 1.5s ease-in-out infinite; }
      .arrow { fill: none; stroke: #e74c3c; stroke-width: 1.5; marker-end: url(#arrowhead); }
      .legend-dot { r: 5; }
      .title-section { animation: fadeIn 0.8s ease-out; }
      .dp-table { animation: slideIn 0.6s ease-out 0.3s both; }
      .explanation { animation: fadeIn 0.6s ease-out 0.6s both; }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e74c3c" />
    </marker>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title Section -->
  <g class="title-section" data-narration="Title section introducing the Subset Sum Problem and DP approach">
    <text x="210" y="28" text-anchor="middle" class="title">Subset Sum Problem</text>
    <text x="210" y="46" text-anchor="middle" class="detail">Dynamic Programming Solution</text>
  </g>
  
  <!-- Problem Definition Box -->
  <g class="explanation" data-narration="Problem definition showing input set and target sum">
    <rect x="10" y="58" width="180" height="44" class="section-box" />
    <text x="20" y="74" class="label" font-weight="bold">Input:</text>
    <text x="20" y="90" class="detail">S = {3, 4, 5}, Target = 9</text>
  </g>
  
  <!-- DP Table Section -->
  <g class="dp-table" data-narration="Dynamic Programming table showing reachable sums with each element">
    <text x="210" y="118" text-anchor="middle" class="label" font-weight="bold">DP Table: dp[i][j] = reachable?</text>
    
    <!-- Column headers (sums 0-12) -->
    <g transform="translate(30, 135)">
      <text x="0" y="0" class="detail" font-weight="bold">j:</text>
      <text x="15" y="0" class="detail">0</text>
      <text x="35" y="0" class="detail">1</text>
      <text x="55" y="0" class="detail">2</text>
      <text x="75" y="0" class="detail">3</text>
      <text x="95" y="0" class="detail">4</text>
      <text x="115" y="0" class="detail">5</text>
      <text x="135" y="0" class="detail">6</text>
      <text x="155" y="0" class="detail">7</text>
      <text x="175" y="0" class="detail">8</text>
      <text x="195" y="0" class="detail">9</text>
      <text x="215" y="0" class="detail">10</text>
      <text x="235" y="0" class="detail">11</text>
      <text x="255" y="0" class="detail">12</text>
    </g>
    
    <!-- Row 0: Empty set -->
    <g transform="translate(30, 148)">
      <text x="-10" y="10" class="detail" font-weight="bold">{}</text>
      <rect x="12" y="0" width="20" height="20" class="cell-filled" />
      <rect x="32" y="0" width="20" height="20" class="cell" />
      <rect x="52" y="0" width="20" height="20" class="cell" />
      <rect x="72" y="0" width="20" height="20" class="cell" />
      <rect x="92" y="0" width="20" height="20" class="cell" />
      <rect x="112" y="0" width="20" height="20" class="cell" />
      <rect x="132" y="0" width="20" height="20" class="cell" />
      <rect x="152" y="0" width="20" height="20" class="cell" />
      <rect x="172" y="0" width="20" height="20" class="cell" />
      <rect x="192" y="0" width="20" height="20" class="cell" />
      <rect x="212" y="0" width="20" height="20" class="cell" />
      <rect x="232" y="0" width="20" height="20" class="cell" />
      <rect x="252" y="0" width="20" height="20" class="cell" />
    </g>
    
    <!-- Row 1: Using element 3 -->
    <g transform="translate(30, 170)">
      <text x="-10" y="10" class="detail" font-weight="bold">{3}</text>
      <rect x="12" y="0" width="20" height="20" class="cell-filled" />
      <rect x="32" y="0" width="20" height="20" class="cell" />
      <rect x="52" y="0" width="20" height="20" class="cell" />
      <rect x="72" y="0" width="20" height="20" class="cell-filled" />
      <rect x="92" y="0" width="20" height="20" class="cell" />
      <rect x="112" y="0" width="20" height="20" class="cell" />
      <rect x="132" y="0" width="20" height="20" class="cell" />
      <rect x="152" y="0" width="20" height="20" class="cell" />
      <rect x="172" y="0" width="20" height="20" class="cell" />
      <rect x="192" y="0" width="20" height="20" class="cell" />
      <rect x="212" y="0" width="20" height="20" class="cell" />
      <rect x="232" y="0" width="20" height="20" class="cell" />
      <rect x="252" y="0" width="20" height="20" class="cell" />
    </g>
    
    <!-- Row 2: Using elements 3,4 -->
    <g transform="translate(30, 192)">
      <text x="-10" y="10" class="detail" font-weight="bold">{3,4}</text>
      <rect x="12" y="0" width="20" height="20" class="cell-filled" />
      <rect x="32" y="0" width="20" height="20" class="cell" />
      <rect x="52" y="0" width="20" height="20" class="cell" />
      <rect x="72" y="0" width="20" height="20" class="cell-filled" />
      <rect x="92" y="0" width="20" height="20" class="cell-filled" />
      <rect x="112" y="0" width="20" height="20" class="cell" />
      <rect x="132" y="0" width="20" height="20" class="cell" />
      <rect x="152" y="0" width="20" height="20" class="cell-filled" />
      <rect x="172" y="0" width="20" height="20" class="cell" />
      <rect x="192" y="0" width="20" height="20" class="cell" />
      <rect x="212" y="0" width="20" height="20" class="cell" />
      <rect x="232" y="0" width="20" height="20" class="cell" />
      <rect x="252" y="0" width="20" height="20" class="cell" />
    </g>
    
    <!-- Row 3: Using elements 3,4,5 - Highlight target -->
    <g transform="translate(30, 214)">
      <text x="-10" y="10" class="detail" font-weight="bold">{3,4,5}</text>
      <rect x="12" y="0" width="20" height="20" class="cell-filled" />
      <rect x="32" y="0" width="20" height="20" class="cell" />
      <rect x="52" y="0" width="20" height="20" class="cell" />
      <rect x="72" y="0" width="20" height="20" class="cell-filled" />
      <rect x="92" y="0" width="20" height="20" class="cell-filled" />
      <rect x="112" y="0" width="20" height="20" class="cell-filled" />
      <rect x="132" y="0" width="20" height="20" class="cell" />
      <rect x="152" y="0" width="20" height="20" class="cell-filled" />
      <rect x="172" y="0" width="20" height="20" class="cell-filled" />
      <rect x="192" y="0" width="20" height="20" class="cell-highlight" />
      <rect x="212" y="0" width="20" height="20" class="cell" />
      <rect x="232" y="0" width="20" height="20" class="cell" />
      <rect x="252" y="0" width="20" height="20" class="cell-filled" />
    </g>
    
    <!-- Arrow showing recurrence -->
    <path d="M90,230 Q110,250 130,265" class="arrow" />
    <text x="100" y="252" class="detail" fill="#e74c3c">dp[i][j] = dp[i-1][j] OR dp[i-1][j-S[i]]</text>
  </g>
  
  <!-- Legend -->
  <g class="explanation" data-narration="Legend explaining the DP table colors and notation">
    <rect x="10" y="285" width="130" height="50" class="section-box" />
    <text x="20" y="302" class="label" font-weight="bold">Legend:</text>
    <circle cx="30" cy="320" class="legend-dot" fill="#4a90a4" />
    <text x="45" y="324" class="detail">Reachable (True)</text>
    <circle cx="30" cy="335" class="legend-dot" fill="#28a745" />
    <text x="45" y="339" class="detail">Target Found!</text>
  </g>
  
  <!-- Result Box -->
  <g class="explanation" data-narration="Final result showing that subset {4,5} sums to target 9">
    <rect x="210" y="285" width="200" height="50" class="section-box" />
    <text x="220" y="302" class="label" font-weight="bold">Result:</text>
    <text x="220" y="320" class="detail">Subset {4, 5} → 4 + 5 = 9</text>
    <text x="220" y="335" class="detail" fill="#28a745" font-weight="bold">✓ Solution Found!</text>
  </g>
  
  <!-- Formula Box -->
  <g class="explanation" data-narration="DP recurrence formula explanation">
    <rect x="10" y="345" width="400" height="45" class="section-box" />
    <text x="20" y="363" class="label" font-weight="bold">Recurrence:</text>
    <text x="20" y="382" class="detail">dp[i][j] = dp[i-1][j] (exclude S[i]) OR dp[i-1][j-S[i]] (include S[i])</text>
  </g>
</svg>