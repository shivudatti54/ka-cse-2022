<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dynamic-programming-approach">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="dpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="decisionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#F57C00"/>
    </linearGradient>
    <linearGradient id="greedyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0"/>
      <stop offset="100%" style="stop-color:#7B1FA2"/>
    </linearGradient>
    <linearGradient id="divideGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out forwards; font-family: 'Segoe UI', Arial, sans-serif; }
    .box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .box-1 { animation-delay: 0.2s; }
    .box-2 { animation-delay: 0.4s; }
    .box-3 { animation-delay: 0.6s; }
    .box-4 { animation-delay: 0.8s; }
    .box-5 { animation-delay: 1.0s; }
    .box-6 { animation-delay: 1.2s; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e" class="title">Dynamic Programming Approach</text>
  <text x="210" y="48" text-anchor="middle" font-size="11" fill="#455a64">Problem Identification Flowchart</text>
  
  <!-- Start Box -->
  <g class="box box-1" data-narration="Starting point: Identify the problem you need to solve">
    <rect x="155" y="60" width="110" height="30" rx="15" fill="#5C6BC0" filter="url(#shadow)"/>
    <text x="210" y="80" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Problem</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="210" y1="90" x2="210" y2="110" stroke="#37474f" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Decision 1: Optimal Substructure -->
  <g class="box box-2" data-narration="Step 1: Check if problem exhibits optimal substructure - can optimal solution be built from optimal subproblem solutions">
    <polygon points="210,115 280,145 210,175 140,145" fill="url(#decisionGradient)" filter="url(#shadow)"/>
    <text x="210" y="140" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Optimal</text>
    <text x="210" y="154" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Substructure?</text>
  </g>
  
  <!-- Yes/No arrows from Decision 1 -->
  <line x1="280" y1="145" x2="330" y2="145" stroke="#37474f" stroke-width="2" class="arrow"/>
  <text x="300" y="138" font-size="10" fill="#2e7d32" font-weight="bold">YES</text>
  
  <line x1="210" y1="175" x2="210" y2="195" stroke="#37474f" stroke-width="2" class="arrow"/>
  <text x="218" y="188" font-size="10" fill="#c62828" font-weight="bold">NO</text>
  
  <!-- Decision 2: Overlapping Subproblems (from YES) -->
  <g class="box box-3" data-narration="Step 2: If YES, check for overlapping subproblems - are same subproblems solved multiple times">
    <polygon points="330,145 400,175 330,205 260,175" fill="url(#decisionGradient)" filter="url(#shadow)"/>
    <text x="330" y="168" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Overlapping</text>
    <text x="330" y="182" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Subproblems?</text>
  </g>
  
  <!-- Arrows from Decision 2 -->
  <line x1="400" y1="175" x2="420" y2="175" stroke="#37474f" stroke-width="2" class="arrow"/>
  <text x="408" y="168" font-size="10" fill="#2e7d32" font-weight="bold">YES</text>
  
  <line x1="330" y1="205" x2="330" y2="225" stroke="#37474f" stroke-width="2" class="arrow"/>
  <text x="338" y="218" font-size="10" fill="#c62828" font-weight="bold">NO</text>
  
  <!-- DP Result Box -->
  <g class="box box-4 pulse" data-narration="Step 3: If both YES - Use Dynamic Programming to solve efficiently with memoization or tabulation">
    <rect x="295" y="250" width="110" height="45" rx="8" fill="url(#dpGradient)" filter="url(#shadow)"/>
    <text x="350" y="270" text-anchor="middle" font-size="13" fill="white" font-weight="bold">USE DP</text>
    <text x="350" y="285" text-anchor="middle" font-size="10" fill="white">(Memoize/Tabulate)</text>
  </g>
  
  <!-- Greedy Result Box -->
  <g class="box box-5" data-narration="Step 4: If only optimal substructure but NO overlapping subproblems - Consider Greedy approach">
    <rect x="145" y="260" width="110" height="40" rx="8" fill="url(#greedyGradient)" filter="url(#shadow)"/>
    <text x="200" y="280" text-anchor="middle" font-size="12" fill="white" font-weight="bold">USE GREEDY</text>
  </g>
  
  <!-- Divide and Conquer Box (from NO optimal substructure) -->
  <g class="box box-6" data-narration="Step 5: If NO optimal substructure but independent subproblems - Use Divide and Conquer approach">
    <rect x="145" y="300" width="110" height="40" rx="8" fill="url(#divideGradient)" filter="url(#shadow)"/>
    <text x="200" y="320" text-anchor="middle" font-size="12" fill="white" font-weight="bold">DIVIDE &amp;</text>
    <text x="200" y="334" text-anchor="middle" font-size="10" fill="white">CONQUER</text>
  </g>
  
  <!-- Arrows to Greedy and Divide -->
  <line x1="210" y1="195" x2="200" y2="260" stroke="#37474f" stroke-width="2" class="arrow"/>
  <line x1="330" y1="225" x2="200" y2="300" stroke="#37474f" stroke-width="2" class="arrow"/>
  
  <!-- Legend/Key at bottom -->
  <g class="box box-6">
    <rect x="10" y="355" width="400" height="35" rx="5" fill="rgba(255,255,255,0.7)"/>
    <circle cx="25" cy="372" r="6" fill="#FF9800"/>
    <text x="38" y="376" font-size="10" fill="#37474f">Decision</text>
    <rect x="85" y="366" width="12" height="12" rx="2" fill="#4CAF50"/>
    <text x="102" y="376" font-size="10" fill="#37474f">DP Solution</rect>
    <rect x="160" y="366" width="12" height="12" rx="2" fill="#9C27B0"/>
    <text x="177" y="376" font-size="10" fill="#37474f">Greedy</text>
    <rect x="235" y="366" width="12" height="12" rx="2" fill="#2196F3"/>
    <text x="252" y="376" font-size="10" fill="#37474f">Div&amp;Conq</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="15" fill="#e8f5e9" opacity="0.5"/>
  <circle cx="390" cy="370" r="20" fill="#e8f5e9" opacity="0.5"/>
</svg>