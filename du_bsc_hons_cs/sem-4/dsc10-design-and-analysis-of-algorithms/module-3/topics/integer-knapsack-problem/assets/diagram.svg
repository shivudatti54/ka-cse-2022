<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="integer-knapsack-problem">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0e8f8"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8f0f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; opacity: 0.7; }
      50% { stroke-width: 3; opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-anim { animation: arrowPulse 1.5s ease-in-out infinite; }
    .cell-anim { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Integer Knapsack Problem</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5d6d7e" class="title">(0/1 Knapsack with Dynamic Programming)</text>
  
  <!-- Section 1: Problem Definition -->
  <g class="box1" data-narration="The problem: Given n items with weights and profits, find max profit within capacity W">
    <rect x="12" y="58" width="190" height="130" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Problem Definition</text>
    <text x="22" y="100" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Items: n = 4</text>
    <text x="22" y="118" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Capacity: W = 8</text>
    
    <!-- Items Table Mini -->
    <rect x="22" y="128" width="170" height="52" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="32" y="145" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">Item</text>
    <text x="70" y="145" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">Weight</text>
    <text x="115" y="145" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">Profit</text>
    <line x1="22" y1="150" x2="192" y2="150" stroke="#bdc3c7" stroke-width="1"/>
    <text x="32" y="167" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">A</text>
    <text x="70" y="167" font-family="Arial, sans-serif" font-size="10" fill="#34495e">3</text>
    <text x="115" y="167" font-family="Arial, sans-serif" font-size="10" fill="#34495e">25</text>
    <text x="32" y="178" font-family="Arial, sans-serif" font-size="10" fill="#3498db">B</text>
    <text x="70" y="178" font-family="Arial, sans-serif" font-size="10" fill="#34495e">4</text>
    <text x="115" y="178" font-family="Arial, sans-serif" font-size="10" fill="#34495e">30</text>
  </g>
  
  <!-- Section 2: DP Table -->
  <g class="box2" data-narration="DP Table: Rows represent items, columns represent capacities 0 to W">
    <rect x="218" y="58" width="190" height="130" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="228" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">DP Table Structure</text>
    
    <!-- Simplified DP Table -->
    <rect x="228" y="88" width="170" height="90" rx="4" fill="#ecf0f1"/>
    <!-- Column headers -->
    <text x="238" y="103" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7f8c8d">w→</text>
    <text x="255" y="103" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="275" y="103" font-family="Arial, sans-serif" font-size="8" fill="#34495e">1</text>
    <text x="295" y="103" font-family="Arial, sans-serif" font-size="8" fill="#34495e">2</text>
    <text x="315" y="103" font-family="Arial, sans-serif" font-size="8" fill="#34495e">3</text>
    <text x="335" y="103" font-family="Arial, sans-serif" font-size="8" fill="#34495e">4</text>
    <text x="355" y="103" font-family="Arial, sans-serif" font-size="8" fill="#34495e">5</text>
    <text x="375" y="103" font-family="Arial, sans-serif" font-size="8" fill="#34495e">6</text>
    <text x="392" y="103" font-family="Arial, sans-serif" font-size="8" fill="#34495e">7</text>
    
    <!-- Row headers and data -->
    <text x="238" y="120" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7f8c8d">i=0</text>
    <rect x="250" y="112" width="148" height="14" fill="#fff3cd" class="cell-anim" style="animation-delay: 0.8s"/>
    <text x="255" y="122" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="275" y="122" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="295" y="122" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="315" y="122" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="335" y="122" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="355" y="122" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="375" y="122" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="392" y="122" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    
    <text x="238" y="136" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7f8c8d">i=1</text>
    <rect x="250" y="128" width="148" height="14" fill="#d4edda" class="cell-anim" style="animation-delay: 1s"/>
    <text x="255" y="138" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="315" y="138" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c" font-weight="bold">25</text>
    <text x="335" y="138" font-family="Arial, sans-serif" font-size="8" fill="#34495e">25</text>
    <text x="355" y="138" font-family="Arial, sans-serif" font-size="8" fill="#34495e">25</text>
    <text x="375" y="138" font-family="Arial, sans-serif" font-size="8" fill="#34495e">25</text>
    <text x="392" y="138" font-family="Arial, sans-serif" font-size="8" fill="#34495e">25</text>
    
    <text x="238" y="152" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7f8c8d">i=2</text>
    <rect x="250" y="144" width="148" height="14" fill="#cce5ff" class="cell-anim" style="animation-delay: 1.2s"/>
    <text x="255" y="154" font-family="Arial, sans-serif" font-size="8" fill="#34495e">0</text>
    <text x="315" y="154" font-family="Arial, sans-serif" font-size="8" fill="#34495e">25</text>
    <text x="335" y="154" font-family="Arial, sans-serif" font-size="8" fill="#3498db" font-weight="bold">55</text>
    <text x="355" y="154" font-family="Arial, sans-serif" font-size="8" fill="#34495e">55</text>
    <text x="375" y="154" font-family="Arial, sans-serif" font-size="8" fill="#34495e">55</text>
    <text x="392" y="154" font-family="Arial, sans-serif" font-size="8" fill="#34495e">55</text>
    
    <text x="238" y="168" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7f8c8d">i=n</text>
    <rect x="250" y="160" width="148" height="14" fill="#f8d7da" class="cell-anim" style="animation-delay: 1.4s"/>
    <text x="355" y="168" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6" font-weight="bold">MAX</text>
  </g>
  
  <!-- Arrows showing DP transition -->
  <g class="arrow-anim">
    <path d="M 107 195 Q 107 220 160 230" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 313 195 Q 313 220 260 230" stroke="#3498db" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Section 3: Recurrence Formula -->
  <g class="box3" data-narration="Recurrence: dp[i][w] = max(dp[i-1][w], dp[i-1][w-w[i]] + p[i])">
    <rect x="12" y="245" width="396" height="65" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="22" y="268" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Recurrence Relation</text>
    
    <!-- Formula -->
    <rect x="22" y="280" width="375" height="22" rx="4" fill="#2c3e50"/>
    <text x="35" y="295" font-family="Courier New, monospace" font-size="13" fill="#ecf0f1">
      <tspan class="pulse-anim">dp[i][w] = max(dp[i-1][w], </tspan>
      <tspan fill="#f39c12" class="pulse-anim">dp[i-1][w-w[i]] + p[i])</tspan>
    </text>
    
    <!-- Legend -->
    <circle cx="40" cy="258" r="4" fill="#ecf0f1"/>
    <text x="52" y="262" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Skip item</text>
    <circle cx="110" cy="258" r="4" fill="#f39c12"/>
    <text x="122" y="262" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Take item</text>
  </g>
  
  <!-- Section 4: Base Case -->
  <g class="box3" data-narration="Base Case: dp[0][w] = 0 for all capacities (no items = no profit)">
    <rect x="12" y="320" width="188" height="35" rx="8" fill="#fff3cd" filter="url(#shadow)" stroke="#ffc107"/>
    <text x="22" y="342" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#856404">Base Case: dp[0][w] = 0</text>
  </g>
  
  <!-- Section 5: Result -->
  <g class="box3" data-narration="Answer: dp[n][W] contains the maximum profit for capacity W">
    <rect x="218" y="320" width="188" height="35" rx="8" fill="#d4edda" filter="url(#shadow)" stroke="#28a745"/>
    <text x="228" y="342" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#155724">Answer: dp[n][W] = 55</text>
  </g>
  
  <!-- Visual Knapsack Icon -->
  <g transform="translate(355, 295)" class="pulse-anim">
    <path d="M 5 15 L 5 35 Q 5 45 15 45 L 45 45 Q 55 45 55 35 L 55 20 L 50 15 L 10 15 Z" fill="#8e44ad" opacity="0.7"/>
    <path d="M 10 15 L 10 8 Q 10 2 20 2 L 40 2 Q 50 2 50 8 L 50 15" fill="none" stroke="#8e44ad" stroke-width="3"/>
    <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">W</text>
  </g>
  
  <!-- Arrow pointing to knapsack -->
  <path d="M 330 305 L 350 310" stroke="#8e44ad" stroke-width="2" fill="none" class="arrow-anim" marker-end="url(#arrowhead2)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
  </defs>
</svg>