<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="weighted-interval-scheduling" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8e8f8"/>
    </linearGradient>
    <linearGradient id="intervalA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="intervalB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a962"/>
      <stop offset="100%" style="stop-color:#e8893a"/>
    </linearGradient>
    <linearGradient id="intervalC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd18c"/>
      <stop offset="100%" style="stop-color:#5cb86a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .section-4 { animation: slideInLeft 0.6s ease-out 0.8s both; }
    .interval-a { animation: fadeIn 0.5s ease-out 0.5s both; }
    .interval-b { animation: fadeIn 0.5s ease-out 0.7s both; }
    .interval-c { animation: fadeIn 0.5s ease-out 0.9s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .compatible { fill: #2e7d32; }
    .incompatible { fill: #c62828; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Weighted Interval Scheduling</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#7ec8e3" stroke-width="2" class="title"/>
  
  <!-- Section 1: Problem Definition Box -->
  <g class="section-1" data-narration="Problem Definition: Select non-overlapping intervals to maximize total weight">
    <rect x="10" y="50" width="400" height="55" rx="6" fill="white" filter="url(#shadow)"/>
    <text x="20" y="68" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Problem:</text>
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="11" fill="#555">Given intervals with start, finish time, and weight.</text>
    <text x="20" y="99" font-family="Arial, sans-serif" font-size="11" fill="#555">Goal: Select non-overlapping intervals with maximum total weight.</text>
  </g>
  
  <!-- Section 2: Timeline Visualization -->
  <g class="section-2" data-narration="Timeline showing three intervals A, B, C with their time ranges and weights">
    <rect x="10" y="115" width="400" height="130" rx="6" fill="white" filter="url(#shadow)"/>
    <text x="20" y="133" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Interval Compatibility Example:</text>
    
    <!-- Timeline axis -->
    <line x1="50" y1="220" x2="380" y2="220" stroke="#aaa" stroke-width="2"/>
    <text x="45" y="225" font-family="Arial, sans-serif" font-size="10" fill="#777">0</text>
    <text x="135" y="225" font-family="Arial, sans-serif" font-size="10" fill="#777">3</text>
    <text x="215" y="225" font-family="Arial, sans-serif" font-size="10" fill="#777">5</text>
    <text x="375" y="225" font-family="Arial, sans-serif" font-size="10" fill="#777">8</text>
    
    <!-- Interval A -->
    <g class="interval-a">
      <rect x="50" y="150" width="90" height="30" rx="4" fill="url(#intervalA)"/>
      <text x="95" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">A (w=5)</text>
      <text x="95" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">0-3</text>
    </g>
    
    <!-- Interval B -->
    <g class="interval-b">
      <rect x="110" y="180" width="90" height="30" rx="4" fill="url(#intervalB)"/>
      <text x="155" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">B (w=8)</text>
      <text x="155" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">2-5</text>
    </g>
    
    <!-- Interval C -->
    <g class="interval-c">
      <rect x="200" y="150" width="90" height="30" rx="4" fill="url(#intervalC)"/>
      <text x="245" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">C (w=6)</text>
      <text x="245" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">5-8</text>
    </g>
  </g>
  
  <!-- Section 3: Compatibility Labels -->
  <g class="section-3" data-narration="Shows which intervals are compatible or incompatible with Interval A">
    <!-- A-B Incompatible -->
    <line x1="125" y1="145" x2="125" y2="115" stroke="#c62828" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="125" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c62828" font-weight="bold">Incompatible</text>
    
    <!-- A-C Compatible -->
    <line x1="275" y1="145" x2="275" y2="115" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="275" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32" font-weight="bold">Compatible</text>
    
    <!-- B-C Compatible -->
    <line x1="290" y1="215" x2="290" y2="238" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="325" y="230" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32">B and C compatible</text>
  </g>
  
  <!-- Section 4: Dynamic Programming Approach -->
  <g class="section-4" data-narration="Dynamic Programming solution using memoization and predecessor finding">
    <rect x="10" y="255" width="400" height="135" rx="6" fill="white" filter="url(#shadow)"/>
    <text x="20" y="275" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Dynamic Programming Solution:</text>
    
    <!-- Formula Box -->
    <rect x="20" y="285" width="200" height="45" rx="4" fill="#f5f5f5" stroke="#ddd"/>
    <text x="30" y="302" font-family="Courier New, monospace" font-size="11" fill="#2c3e50">M[i] = max(M[i-1],</text>
    <text x="30" y="318" font-family="Courier New, monospace" font-size="11" fill="#2c3e50">w[i] + M[p(i)])</text>
    
    <!-- Key concepts -->
    <text x="235" y="295" font-family="Arial, sans-serif" font-size="10" fill="#555">• p(i) = last compatible interval before i</text>
    <text x="235" y="310" font-family="Arial, sans-serif" font-size="10" fill="#555">• M[i] = max weight up to interval i</text>
    <text x="235" y="325" font-family="Arial, sans-serif" font-size="10" fill="#555">• Binary search to find p(i)</text>
    <text x="235" y="340" font-family="Arial, sans-serif" font-size="10" fill="#555">• Time: O(n log n), Space: O(n)</text>
    
    <!-- Example result -->
    <rect x="20" y="335" width="180" height="40" rx="4" fill="#e8f5e9" stroke="#a5d6a7"/>
    <text x="30" y="352" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Optimal Solution:</text>
    <text x="30" y="368" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Intervals A + C = Weight 11</text>
  </g>
  
  <!-- Arrow showing relationship -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="210" y1="245" x2="210" y2="257" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Pulse highlight on optimal -->
  <g class="pulse-element">
    <rect x="220" y="355" width="30" height="18" rx="3" fill="none" stroke="#2e7d32" stroke-width="2"/>
  </g>
</svg>