<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="graph-traversals-connectivity">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f7fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bfsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b3e5fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81d4fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dfsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideInLeft {
      0% { transform: translateX(-30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      0% { transform: translateX(30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes drawLine {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1565c0; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .bfs-box { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .dfs-box { animation: slideInRight 0.6s ease-out 0.2s forwards; opacity: 0; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .graph-anim { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .node { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .queue-item { animation: slideInLeft 0.3s ease-out forwards; opacity: 0; }
    .stack-item { animation: slideInRight 0.3s ease-out forwards; opacity: 0; }
    .edge { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .pulse-anim { animation: pulse 2s infinite; transform-origin: center; transform-box: fill-box; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Graph Traversals &amp; Connectivity</text>
  
  <!-- BFS Section -->
  <g class="bfs-box" data-narration="BFS uses a Queue to explore level by level">
    <rect x="10" y="45" width="190" height="155" fill="url(#bfsGradient)" rx="6" filter="url(#shadow)"/>
    <text x="105" y="62" text-anchor="middle" class="section-title">BFS (Queue)</text>
    
    <!-- Mini Graph for BFS -->
    <g transform="translate(25, 75)">
      <line x1="30" y1="0" x2="10" y2="25" stroke="#1976d2" stroke-width="1.5" class="edge"/>
      <line x1="30" y1="0" x2="50" y2="25" stroke="#1976d2" stroke-width="1.5" class="edge"/>
      <line x1="10" y1="25" x2="5" y2="50" stroke="#1976d2" stroke-width="1.5" class="edge"/>
      <line x1="10" y1="25" x2="25" y2="50" stroke="#1976d2" stroke-width="1.5" class="edge"/>
      <line x1="50" y1="25" x2="35" y2="50" stroke="#1976d2" stroke-width="1.5" class="edge"/>
      <line x1="50" y1="25" x2="55" y2="50" stroke="#1976d2" stroke-width="1.5" class="edge"/>
      
      <circle cx="30" cy="0" r="10" fill="#1976d2" class="node pulse-anim"/>
      <text x="30" y="4" text-anchor="middle" fill="white" font-size="9" font-weight="bold">A</text>
      
      <circle cx="10" cy="25" r="9" fill="#42a5f5" class="node"/>
      <text x="10" y="29" text-anchor="middle" fill="white" font-size="8" font-weight="bold">B</text>
      <circle cx="50" cy="25" r="9" fill="#42a5f5" class="node"/>
      <text x="50" y="29" text-anchor="middle" fill="white" font-size="8" font-weight="bold">C</text>
      
      <circle cx="5" cy="50" r="8" fill="#90caf9" class="node"/>
      <text x="5" y="53" text-anchor="middle" fill="white" font-size="7" font-weight="bold">D</text>
      <circle cx="25" cy="50" r="8" fill="#90caf9" class="node"/>
      <text x="25" y="53" text-anchor="middle" fill="white" font-size="7" font-weight="bold">E</text>
      <circle cx="35" cy="50" r="8" fill="#90caf9" class="node"/>
      <text x="35" y="53" text-anchor="middle" fill="white" font-size="7" font-weight="bold">F</text>
      <circle cx="55" cy="50" r="8" fill="#90caf9" class="node"/>
      <text x="55" y="53" text-anchor="middle" fill="white" font-size="7" font-weight="bold">G</text>
    </g>
    
    <!-- Queue visualization -->
    <g transform="translate(15, 130)">
      <text x="0" y="0" class="label" font-size="10">Queue:</text>
      <rect x="35" y="-12" width="155" height="18" fill="white" stroke="#1976d2" rx="3" opacity="0.7"/>
      <text x="40" y="0" class="detail" fill="#1565c0">A → B,C → D,E,F,G</text>
    </g>
    <text x="105" y="190" text-anchor="middle" class="detail">Order: A, B, C, D, E, F, G</text>
  </g>
  
  <!-- DFS Section -->
  <g class="dfs-box" data-narration="DFS uses a Stack to explore deeply before backtracking">
    <rect x="220" y="45" width="190" height="155" fill="url(#dfsGradient)" rx="6" filter="url(#shadow)"/>
    <text x="315" y="62" text-anchor="middle" class="section-title">DFS (Stack)</text>
    
    <!-- Mini Graph for DFS -->
    <g transform="translate(235, 75)">
      <line x1="30" y1="0" x2="10" y2="25" stroke="#7b1fa2" stroke-width="1.5" class="edge"/>
      <line x1="30" y1="0" x2="50" y2="25" stroke="#7b1fa2" stroke-width="1.5" class="edge"/>
      <line x1="10" y1="25" x2="5" y2="50" stroke="#7b1fa2" stroke-width="1.5" class="edge"/>
      <line x1="10" y1="25" x2="25" y2="50" stroke="#7b1fa2" stroke-width="1.5" class="edge"/>
      <line x1="50" y1="25" x2="35" y2="50" stroke="#7b1fa2" stroke-width="1.5" class="edge"/>
      <line x1="50" y1="25" x2="55" y2="50" stroke="#7b1fa2" stroke-width="1.5" class="edge"/>
      
      <circle cx="30" cy="0" r="10" fill="#7b1fa2" class="node pulse-anim"/>
      <text x="30" y="4" text-anchor="middle" fill="white" font-size="9" font-weight="bold">A</text>
      
      <circle cx="10" cy="25" r="9" fill="#ab47bc" class="node"/>
      <text x="10" y="29" text-anchor="middle" fill="white" font-size="8" font-weight="bold">B</text>
      <circle cx="50" cy="25" r="9" fill="#ab47bc" class="node"/>
      <text x="50" y="29" text-anchor="middle" fill="white" font-size="8" font-weight="bold">C</text>
      
      <circle cx="5" cy="50" r="8" fill="#ce93d8" class="node"/>
      <text x="5" y="53" text-anchor="middle" fill="white" font-size="7" font-weight="bold">D</text>
      <circle cx="25" cy="50" r="8" fill="#ce93d8" class="node"/>
      <text x="25" y="53" text-anchor="middle" fill="white" font-size="7" font-weight="bold">E</text>
      <circle cx="35" cy="50" r="8" fill="#ce93d8" class="node"/>
      <text x="35" y="53" text-anchor="middle" fill="white" font-size="7" font-weight="bold">F</text>
      <circle cx="55" cy="50" r="8" fill="#ce93d8" class="node"/>
      <text x="55" y="53" text-anchor="middle" fill="white" font-size="7" font-weight="bold">G</text>
    </g>
    
    <!-- Stack visualization -->
    <g transform="translate(225, 130)">
      <text x="0" y="0" class="label" font-size="10">Stack:</text>
      <rect x="35" y="-12" width="155" height="18" fill="white" stroke="#7b1fa2" rx="3" opacity="0.7"/>
      <text x="40" y="0" class="detail" fill="#6a1b9a">A → B → D → E → C → F → G</text>
    </g>
    <text x="315" y="190" text-anchor="middle" class="detail">Order: A, B, D, E, C, F, G</text>
  </g>
  
  <!-- Graph Representations Section -->
  <g class="graph-anim" data-narration="Graphs can be represented using Adjacency Matrix or Adjacency List">
    <rect x="10" y="210" width="195" height="85" fill="#fff9c4" rx="6" filter="url(#shadow)" opacity="0.9"/>
    <text x="107" y="228" text-anchor="middle" class="section-title">Adjacency Matrix</text>
    <text x="20" y="248" class="detail">2D array: matrix[i][j]=1 if edge</text>
    <text x="20" y="263" class="detail">Space: O(V²) - Dense graphs</text>
    <text x="20" y="278" class="detail">Example: |0 1 1|</text>
    <text x="20" y="291" class="detail">         |1 0 0|</text>
  </g>
  
  <g class="graph-anim" data-narration="Adjacency List is more space-efficient for sparse graphs">
    <rect x="215" y="210" width="195" height="85" fill="#c8e6c9" rx="6" filter="url(#shadow)" opacity="0.9"/>
    <text x="312" y="228" text-anchor="middle" class="section-title">Adjacency List</text>
    <text x="225" y="248" class="detail">Array of lists per vertex</text>
    <text x="225" y="263" class="detail">Space: O(V + E) - Sparse graphs</text>
    <text x="225" y="278" class="detail">A: [B, C]  B: [A]  C: [A]</text>
    <text x="225" y="291" class="detail">D: []  E: []  F: []  G: []</text>
  </g>
  
  <!-- Connectivity Section -->
  <g class="graph-anim" data-narration="Connected components determine if all vertices are reachable from any vertex">
    <rect x="10" y="305" width="400" height="80" fill="#f3e5f5" rx="6" filter="url(#shadow)" opacity="0.9"/>
    <text x="210" y="325" text-anchor="middle" class="section-title">Graph Connectivity</text>
    
    <g transform="translate(30, 345)">
      <circle cx="0" cy="0" r="12" fill="#4caf50"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
      <line x1="12" y1="0" x2="35" y2="0" stroke="#4caf50" stroke-width="2"/>
      <circle cx="47" cy="0" r="12" fill="#4caf50"/>
      <text x="47" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
      <line x1="59" y1="0" x2="82" y2="0" stroke="#4caf50" stroke-width="2"/>
      <circle cx="94" cy="0" r="12" fill="#4caf50"/>
      <text x="94" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
      <text x="130" y="4" class="detail">Connected Component</text>
    </g>
    
    <g transform="translate(220, 345)">
      <circle cx="0" cy="0" r="12" fill="#f44336"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
      <line x1="12" y1="0" x2="35" y2="0" stroke="#f44336" stroke-width="2" stroke-dasharray="4"/>
      <circle cx="47" cy="0" r="12" fill="#bbb"/>
      <text x="47" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
      <text x="75" y="4" class="detail">Disconnected</text>
    </g>
    
    <text x="210" y="375" text-anchor="middle" class="detail" fill="#6a1b9a">Applications: Network design, Social networks, Transportation routes</text>
  </g>
  
  <!-- Arrow indicators -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <line x1="200" y1="70" x2="220" y2="70" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="130" x2="220" y2="130" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
</svg>