<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="greedy-algorithm-design">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4ecf4"/>
      <stop offset="100%" style="stop-color:#c2e0eb"/>
    </linearGradient>
    <linearGradient id="activityGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#2d9a8e"/>
    </linearGradient>
    <linearGradient id="selectedGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f7fa"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s both; }
    .activity-bar { animation: popIn 0.4s ease-out both; }
    .selected-bar { animation: pulse 1s ease-in-out infinite; }
    .guide-line { animation: drawLine 1s ease-out forwards; stroke-dasharray: 200; }
    .concept-box { animation: fadeIn 0.5s ease-out both; }
    .arrow { animation: fadeIn 0.3s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Greedy Algorithm Design</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4ecdc4" stroke-width="2" class="title"/>
  
  <!-- Section 1: Introduction Box -->
  <g class="section-1" data-narration="Greedy algorithms make locally optimal choices hoping for global optimum">
    <rect x="15" y="55" width="130" height="55" rx="5" fill="url(#boxGradient)" stroke="#4ecdc4" stroke-width="1.5"/>
    <text x="80" y="70" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Greedy Approach</text>
    <text x="80" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Make local optimal</text>
    <text x="80" y="97" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">choices at each step</text>
  </g>
  
  <!-- Section 2: Key Properties -->
  <g class="section-2" data-narration="Two essential properties: Greedy choice property and Optimal substructure">
    <rect x="155" y="55" width="250" height="55" rx="5" fill="url(#boxGradient)" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="280" y="70" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Key Properties</text>
    <rect x="165" y="78" width="105" height="26" rx="3" fill="#e8f8f5" stroke="#2d9a8e" stroke-width="1"/>
    <text x="217" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Greedy Choice</text>
    <text x="217" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Property</text>
    <rect x="275" y="78" width="105" height="26" rx="3" fill="#fef5e7" stroke="#f39c12" stroke-width="1"/>
    <text x="327" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Optimal</text>
    <text x="327" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Substructure</text>
  </g>
  
  <!-- Activity Selection Diagram Title -->
  <text x="210" y="125" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50" class="section-3" data-narration="Activity Selection: Classic greedy problem demonstration">Activity Selection Problem</text>
  
  <!-- Activity Timeline Container -->
  <g class="section-3" data-narration="Activities sorted by finish time, select non-overlapping activities">
    <!-- Timeline axis -->
    <line x1="40" y1="290" x2="380" y2="290" stroke="#aaa" stroke-width="1"/>
    <text x="40" y="305" font-family="Arial" font-size="10" fill="#666">0</text>
    <text x="140" y="305" font-family="Arial" font-size="10" fill="#666">2</text>
    <text x="240" y="305" font-family="Arial" font-size="10" fill="#666">4</text>
    <text x="340" y="305" font-family="Arial" font-size="10" fill="#666">6</text>
    <text x="380" y="305" font-family="Arial" font-size="10" fill="#666">8</text>
    
    <!-- Activity Bars -->
    <!-- Activity A: 1-3 -->
    <rect x="60" y="140" width="60" height="20" rx="3" fill="url(#activityGradient)" class="activity-bar" style="animation-delay: 0.8s"/>
    <text x="90" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">A</text>
    <text x="90" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(1-3)</text>
    
    <!-- Activity B: 2-5 -->
    <rect x="80" y="175" width="90" height="20" rx="3" fill="#ddd" class="activity-bar" style="animation-delay: 0.9s"/>
    <text x="125" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">B</text>
    <text x="125" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(2-5)</text>
    
    <!-- Activity C: 3-5 -->
    <rect x="100" y="210" width="60" height="20" rx="3" fill="#ddd" class="activity-bar" style="animation-delay: 1.0s"/>
    <text x="130" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">C</text>
    <text x="130" y="240" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(3-5)</text>
    
    <!-- Activity D: 4-6 -->
    <rect x="140" y="245" width="60" height="20" rx="3" fill="url(#selectedGradient)" class="activity-bar selected-bar" style="animation-delay: 1.1s"/>
    <text x="170" y="260" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">D</text>
    <text x="170" y="275" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(4-6)</text>
    
    <!-- Activity E: 5-7 -->
    <rect x="180" y="175" width="60" height="20" rx="3" fill="#ddd" class="activity-bar" style="animation-delay: 1.2s"/>
    <text x="210" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">E</text>
    <text x="210" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(5-7)</text>
    
    <!-- Activity F: 6-8 -->
    <rect x="220" y="210" width="60" height="20" rx="3" fill="url(#selectedGradient)" class="activity-bar selected-bar" style="animation-delay: 1.3s"/>
    <text x="250" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">F</text>
    <text x="250" y="240" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(6-8)</text>
    
    <!-- Activity G: 7-9 -->
    <rect x="260" y="140" width="60" height="20" rx="3" fill="#ddd" class="activity-bar" style="animation-delay: 1.4s"/>
    <text x="290" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">G</text>
    <text x="290" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(7-9)</text>
    
    <!-- Guide lines showing selection process -->
    <line x1="90" y1="135" x2="90" y2="290" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3" class="guide-line" style="animation-delay: 1.5s"/>
    <line x1="170" y1="240" x2="170" y2="290" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3" class="guide-line" style="animation-delay: 1.7s"/>
    <line x1="250" y1="205" x2="250" y2="290" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3" class="guide-line" style="animation-delay: 1.9s"/>
    
    <!-- Selection markers -->
    <circle cx="90" cy="295" r="5" fill="#ff6b6b" class="selected-bar" style="animation-delay: 1.6s"/>
    <circle cx="170" cy="295" r="5" fill="#ff6b6b" class="selected-bar" style="animation-delay: 1.8s"/>
    <circle cx="250" cy="295" r="5" fill="#ff6b6b" class="selected-bar" style="animation-delay: 2.0s"/>
  </g>
  
  <!-- Legend -->
  <g class="section-3" data-narration="Selected activities highlighted in red, unselected in gray">
    <rect x="320" y="310" width="90" height="40" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
    <rect x="328" y="318" width="12" height="8" rx="1" fill="url(#selectedGradient)"/>
    <text x="345" y="326" font-family="Arial" font-size="9" fill="#555">Selected</text>
    <rect x="328" y="332" width="12" height="8" rx="1" fill="#ddd"/>
    <text x="345" y="340" font-family="Arial" font-size="9" fill="#555">Skipped</text>
  </g>
  
  <!-- Section 3: Process explanation -->
  <g class="section-3" data-narration="Step 1: Sort by finish time, Step 2: Select first compatible activity, Step 3: Repeat">
    <rect x="15" y="355" width="195" height="35" rx="4" fill="url(#boxGradient)" stroke="#4ecdc4" stroke-width="1.5"/>
    <text x="112" y="368" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">Greedy Process</text>
    <text x="112" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">1. Sort by finish time</text>
  </g>
  
  <g class="section-3" data-narration="The algorithm selects the earliest finishing activity that doesn't conflict">
    <rect x="220" y="355" width="195" height="35" rx="4" fill="url(#boxGradient)" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="317" y="368" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">Selection Rule</text>
    <text x="317" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Select earliest finish</text>
  </g>
  
  <!-- Arrows/Connections -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ecdc4"/>
    </marker>
  </defs>
  <line x1="145" y1="82" x2="155" y2="82" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Decorative corner elements -->
  <circle cx="20" cy="20" r="4" fill="#4ecdc4" opacity="0.5"/>
  <circle cx="400" cy="20" r="4" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="20" cy="380" r="4" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="400" cy="380" r="4" fill="#4ecdc4" opacity="0.5"/>
</svg>