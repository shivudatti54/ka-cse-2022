<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="minimum-spanning-tree" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c5282; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #4a5568; }
    .small-label { font-family: Arial, sans-serif; font-size: 11px; fill: #718096; }
    .highlight { font-family: Arial, sans-serif; font-size: 12px; fill: #2d3748; font-weight: bold; }
    .edge-label { font-family: Arial, sans-serif; font-size: 10px; fill: #e53e3e; font-weight: bold; }
    .section-box { fill: #fff; stroke: #cbd5e0; stroke-width: 1; rx: 8; }
    .vertex { fill: #4299e1; stroke: #2b6cb0; stroke-width: 2; }
    .edge { stroke: #a0aec0; stroke-width: 2; fill: none; }
    .edge-mst { stroke: #48bb78; stroke-width: 3; fill: none; }
    .edge-discard { stroke: #feb2b2; stroke-width: 2; stroke-dasharray: 5,3; fill: none; }
    .weight-bg { fill: #fff; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; transform-origin: center; }
    .pop-in { animation: popIn 0.4s ease-out forwards; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Minimum Spanning Tree</text>
  <text x="210" y="46" text-anchor="middle" class="small-label slide-in" style="animation-delay: 0.3s">Kruskal's Algorithm Visualization</text>
  
  <!-- Main Graph Area -->
  <g transform="translate(30, 70)">
    <!-- Graph container -->
    <rect class="section-box fade-in" x="0" y="0" width="180" height="150" style="animation-delay: 0.4s"/>
    <text x="90" y="20" text-anchor="middle" class="label fade-in" style="animation-delay: 0.5s">Weighted Graph G</text>
    
    <!-- Edges -->
    <line x1="30" y1="110" x2="70" y2="50" class="edge pop-in" style="animation-delay: 0.6s" data-narration="Edge with weight 4"/>
    <line x1="70" y1="50" x2="130" y2="70" class="edge pop-in" style="animation-delay: 0.7s" data-narration="Edge with weight 8"/>
    <line x1="30" y1="110" x2="130" y2="110" class="edge pop-in" style="animation-delay: 0.8s" data-narration="Edge with weight 2"/>
    <line x1="130" y1="110" x2="150" y2="40" class="edge pop-in" style="animation-delay: 0.9s" data-narration="Edge with weight 6"/>
    <line x1="70" y1="50" x2="150" y2="40" class="edge pop-in" style="animation-delay: 1.0s" data-narration="Edge with weight 3"/>
    <line x1="30" y1="110" x2="90" y2="80" class="edge pop-in" style="animation-delay: 1.1s" data-narration="Edge with weight 1"/>
    <line x1="90" y1="80" x2="130" y2="110" class="edge pop-in" style="animation-delay: 1.2s" data-narration="Edge with weight 5"/>
    <line x1="90" y1="80" x2="150" y2="40" class="edge pop-in" style="animation-delay: 1.3s" data-narration="Edge with weight 7"/>
    
    <!-- Edge weights -->
    <g class="pop-in" style="animation-delay: 0.7s">
      <circle cx="50" cy="75" r="8" class="weight-bg"/>
      <text x="50" y="78" text-anchor="middle" class="edge-label">4</text>
    </g>
    <g class="pop-in" style="animation-delay: 0.8s">
      <circle cx="100" cy="55" r="8" class="weight-bg"/>
      <text x="100" y="58" text-anchor="middle" class="edge-label">8</text>
    </g>
    <g class="pop-in" style="animation-delay: 0.9s">
      <circle cx="80" cy="115" r="8" class="weight-bg"/>
      <text x="80" y="118" text-anchor="middle" class="edge-label">2</text>
    </g>
    <g class="pop-in" style="animation-delay: 1.0s">
      <circle cx="140" cy="70" r="8" class="weight-bg"/>
      <text x="140" y="73" text-anchor="middle" class="edge-label">6</text>
    </g>
    <g class="pop-in" style="animation-delay: 1.1s">
      <circle cx="110" cy="42" r="8" class="weight-bg"/>
      <text x="110" y="45" text-anchor="middle" class="edge-label">3</text>
    </g>
    <g class="pop-in" style="animation-delay: 1.2s">
      <circle cx="55" cy="95" r="8" class="weight-bg"/>
      <text x="55" y="98" text-anchor="middle" class="edge-label">1</text>
    </g>
    <g class="pop-in" style="animation-delay: 1.3s">
      <circle cx="110" cy="98" r="8" class="weight-bg"/>
      <text x="110" y="101" text-anchor="middle" class="edge-label">5</text>
    </g>
    <g class="pop-in" style="animation-delay: 1.4s">
      <circle cx="120" cy="55" r="8" class="weight-bg"/>
      <text x="120" y="58" text-anchor="middle" class="edge-label">7</text>
    </g>
    
    <!-- Vertices -->
    <circle cx="30" cy="110" r="12" class="vertex pop-in" style="animation-delay: 1.5s" data-narration="Vertex A"/>
    <circle cx="70" cy="50" r="12" class="vertex pop-in" style="animation-delay: 1.6s" data-narration="Vertex B"/>
    <circle cx="130" cy="110" r="12" class="vertex pop-in" style="animation-delay: 1.7s" data-narration="Vertex C"/>
    <circle cx="150" cy="40" r="12" class="vertex pop-in" style="animation-delay: 1.8s" data-narration="Vertex D"/>
    <circle cx="90" cy="80" r="12" class="vertex pop-in" style="animation-delay: 1.9s" data-narration="Vertex E"/>
    
    <!-- Vertex labels -->
    <text x="30" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="bold">A</text>
    <text x="70" y="54" text-anchor="middle" fill="white" font-size="11" font-weight="bold">B</text>
    <text x="130" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="bold">C</text>
    <text x="150" y="44" text-anchor="middle" fill="white" font-size="11" font-weight="bold">D</text>
    <text x="90" y="84" text-anchor="middle" fill="white" font-size="11" font-weight="bold">E</text>
  </g>
  
  <!-- Sorted Edge List Section -->
  <g transform="translate(220, 70)">
    <rect class="section-box fade-in" x="0" y="0" width="180" height="150" style="animation-delay: 1.0s"/>
    <text x="90" y="20" text-anchor="middle" class="label fade-in" style="animation-delay: 1.2s">Sorted Edges</text>
    
    <!-- Edge list -->
    <g class="slide-in" style="animation-delay: 1.4s">
      <rect x="10" y="30" width="160" height="16" fill="#c6f6d5" rx="3"/>
      <text x="20" y="42" class="small-label">A-E: weight 1 ✓</text>
    </g>
    <g class="slide-in" style="animation-delay: 1.6s">
      <rect x="10" y="50" width="160" height="16" fill="#c6f6d5" rx="3"/>
      <text x="20" y="62" class="small-label">A-C: weight 2 ✓</text>
    </g>
    <g class="slide-in" style="animation-delay: 1.8s">
      <rect x="10" y="70" width="160" height="16" fill="#c6f6d5" rx="3"/>
      <text x="20" y="82" class="small-label">B-D: weight 3 ✓</text>
    </g>
    <g class="slide-in" style="animation-delay: 2.0s">
      <rect x="10" y="90" width="160" height="16" fill="#c6f6d5" rx="3"/>
      <text x="20" y="102" class="small-label">A-B: weight 4 ✓</text>
    </g>
    <g class="slide-in" style="animation-delay: 2.2s">
      <rect x="10" y="110" width="160" height="16" fill="#fed7d7" rx="3"/>
      <text x="20" y="122" class="small-label">E-C: weight 5 ✗ cycle</text>
    </g>
    <g class="slide-in" style="animation-delay: 2.4s">
      <rect x="10" y="130" width="160" height="16" fill="#fed7d7" rx="3"/>
      <text x="20" y="142" class="small-label">D-C: weight 6 ✗ cycle</text>
    </g>
  </g>
  
  <!-- Union-Find Components Section -->
  <g transform="translate(30, 235)">
    <rect class="section-box fade-in" x="0" y="0" width="130" height="140" style="animation-delay: 2.0s"/>
    <text x="65" y="20" text-anchor="middle" class="label fade-in" style="animation-delay: 2.2s">Union-Find</text>
    
    <!-- Component visualization -->
    <g class="slide-in" style="animation-delay: 2.4s">
      <circle cx="35" cy="50" r="18" fill="#bee3f8" stroke="#4299e1" stroke-width="2"/>
      <text x="35" y="54" text-anchor="middle" class="small-label" fill="#2c5282">A,E</text>
      <text x="35" y="75" text-anchor="middle" class="small-label">Set 1</text>
    </g>
    <g class="slide-in" style="animation-delay: 2.6s">
      <circle cx="35" cy="105" r="18" fill="#bee3f8" stroke="#4299e1" stroke-width="2"/>
      <text x="35" y="109" text-anchor="middle" class="small-label" fill="#2c5282">B,D</text>
      <text x="35" y="130" text-anchor="middle" class="small-label">Set 2</text>
    </g>
    <g class="slide-in" style="animation-delay: 2.8s">
      <circle cx="95" cy="105" r="18" fill="#bee3f8" stroke="#4299e1" stroke-width="2"/>
      <text x="95" y="109" text-anchor="middle" class="small-label" fill="#2c5282">C</text>
      <text x="95" y="130" text-anchor="middle" class="small-label">Set 3</text>
    </g>
    
    <!-- Arrow showing merge -->
    <path d="M 55 50 Q 65 35 75 50" stroke="#48bb78" stroke-width="2" fill="none" marker-end="url(#arrow)" class="pulse" style="animation-delay: 3.0s"/>
  </g>
  
  <!-- Algorithm Steps Section -->
  <g transform="translate(170, 235)">
    <rect class="section-box fade-in" x="0" y="0" width="230" height="140" style="animation-delay: 2.5s"/>
    <text x="115" y="20" text-anchor="middle" class="label fade-in" style="animation-delay: 2.7s">Kruskal's Algorithm</text>
    
    <g class="slide-in" style="animation-delay: 2.9s">
      <circle cx="20" cy="45" r="12" fill="#48bb78" class="pulse" style="animation-delay: 3.2s"/>
      <text x="20" y="49" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
      <text x="40" y="48" class="small-label">Sort edges by weight</text>
    </g>
    <g class="slide-in" style="animation-delay: 3.1s">
      <circle cx="20" cy="75" r="12" fill="#48bb78" class="pulse" style="animation-delay: 3.4s"/>
      <text x="20" y="79" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
      <text x="40" y="78" class="small-label">Pick smallest edge</text>
    </g>
    <g class="slide-in" style="animation-delay: 3.3s">
      <circle cx="20" cy="105" r="12" fill="#48bb78" class="pulse" style="animation-delay: 3.6s"/>
      <text x="20" y="109" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
      <text x="40" y="108" class="small-label">Check: forms cycle?</text>
    </g>
    <g class="slide-in" style="animation-delay: 3.5s">
      <circle cx="140" cy="105" r="12" fill="#48bb78" class="pulse" style="animation-delay: 3.8s"/>
      <text x="140" y="109" text-anchor="middle" fill="white" font-size="10" font-weight="bold">4</text>
      <text x="160" y="108" class="small-label">Add to MST</text>
    </g>
  </g>
  
  <!-- Result Section -->
  <g transform="translate(30, 330)">
    <rect class="section-box fade-in" x="0" y="0" width="370" height="55" style="animation-delay: 3.5s"/>
    <text x="185" y="18" text-anchor="middle" class="label fade-in" style="animation-delay: 3.7s">Result: MST with 4 edges</text>
    <text x="185" y="38" text-anchor="middle" class="highlight fade-in" style="animation-delay: 3.9s">Total Weight: 1 + 2 + 3 + 4 = 10</text>
    
    <!-- Mini MST visualization -->
    <g class="pulse" style="animation-delay: 4.0s">
      <line x1="280" y1="15" x2="300" y2="35" stroke="#48bb78" stroke-width="2"/>
      <line x1="300" y1="15" x2="320" y2="35" stroke="#48bb78" stroke-width="2"/>
      <line x1="280" y1="15" x2="280" y2="35" stroke="#48bb78" stroke-width="2"/>
      <line x1="280" y1="15" x2="320" y2="15" stroke="#48bb78" stroke-width="2"/>
      <circle cx="280" cy="15" r="5" fill="#4299e1"/>
      <circle cx="300" cy="15" r="5" fill="#4299e1"/>
      <circle cx="320" cy="15" r="5" fill="#4299e1"/>
      <circle cx="280" cy="35" r="5" fill="#4299e1"/>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(310, 235)">
    <rect class="section-box fade-in" x="0" y="0" width="90" height="85" style="animation-delay: 3.8s"/>
    <text x="45" y="18" text-anchor="middle" class="small-label" font-weight="bold">Legend</text>
    <line x1="10" y1="30" x2="30" y2="30" stroke="#48bb78" stroke-width="3"/>
    <text x="40" y="33" class="small-label">MST Edge</text>
    <line x1="10" y1="50" x2="30" y2="50" stroke="#feb2b2" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="40" y="53" class="small-label">Cycle (skip)</text>
    <circle cx="20" cy="70" r="6" fill="#4299e1" stroke="#2b6cb0" stroke-width="1"/>
    <text x="40" y="73" class="small-label">Vertex</text>
  </g>
</svg>