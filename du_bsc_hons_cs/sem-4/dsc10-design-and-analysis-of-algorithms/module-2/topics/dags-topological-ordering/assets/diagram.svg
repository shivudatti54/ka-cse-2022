<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dags-topological-ordering">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0f4;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5c6bc0"/>
    </marker>
    <marker id="arrowheadHighlight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#42a5f5"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title-text { font-family: Georgia, serif; font-size: 22px; fill: #37474f; font-weight: bold; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #546e7a; }
    .vertex-label { font-family: Arial, sans-serif; font-size: 16px; fill: #ffffff; font-weight: bold; }
    .property-text { font-family: Arial, sans-serif; font-size: 11px; fill: #78909c; }
    .section-box { fill: #ffffff; stroke: #b0bec5; stroke-width: 1; rx: 8; }
    .highlight-box { fill: #e3f2fd; stroke: #42a5f5; stroke-width: 1.5; rx: 8; }
    .edge-line { stroke: #5c6bc0; stroke-width: 2; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 100; stroke-dashoffset: 100; }
    .vertex-circle { fill: #5c6bc0; stroke: #3949ab; stroke-width: 2; }
    .vertex-circle.source { fill: #66bb6a; stroke: #388e3c; }
    .vertex-circle.sink { fill: #ef5350; stroke: #d32f2f; }
    .animated { animation-duration: 0.6s; animation-timing-function: ease-out; animation-fill-mode: backwards; }
    .anim-fade-in { animation-name: fadeIn; }
    .anim-slide-left { animation-name: slideInLeft; }
    .anim-slide-up { animation-name: slideInUp; }
    .anim-pulse { animation: pulse 2s infinite; }
    .anim-bounce { animation: bounce 1.5s infinite; }
    .anim-draw { animation: drawLine 1s ease-out forwards; animation-delay: 0.5s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="animated anim-fade-in" data-narration="Title introducing DAG Topological Ordering">
    <text x="210" y="30" text-anchor="middle" class="title-text">DAG Topological Ordering</text>
    <line x1="60" y1="40" x2="360" y2="40" stroke="#90a4ae" stroke-width="1"/>
  </g>
  
  <!-- Main DAG Diagram -->
  <g class="animated anim-slide-up" data-narration="The Directed Acyclic Graph structure showing vertices A through E and their dependencies">
    <!-- Edges -->
    <path d="M120 120 L120 175" class="edge-line anim-draw"/>
    <path d="M120 120 L200 175" class="edge-line anim-draw"/>
    <path d="M120 230 L200 175" class="edge-line anim-draw"/>
    <path d="M200 230 L200 175" class="edge-line anim-draw"/>
    <path d="M200 230 L280 175" class="edge-line anim-draw"/>
    
    <!-- Vertex A - Source -->
    <circle cx="120" cy="100" r="22" class="vertex-circle source" filter="url(#shadow)"/>
    <text x="120" y="105" text-anchor="middle" class="vertex-label">A</text>
    
    <!-- Vertex B -->
    <circle cx="120" cy="210" r="22" class="vertex-circle" filter="url(#shadow)"/>
    <text x="120" y="215" text-anchor="middle" class="vertex-label">B</text>
    
    <!-- Vertex C -->
    <circle cx="200" cy="210" r="22" class="vertex-circle" filter="url(#shadow)"/>
    <text x="200" y="215" text-anchor="middle" class="vertex-label">C</text>
    
    <!-- Vertex D -->
    <circle cx="200" cy="150" r="22" class="vertex-circle" filter="url(#shadow)"/>
    <text x="200" y="155" text-anchor="middle" class="vertex-label">D</text>
    
    <!-- Vertex E -->
    <circle cx="280" cy="150" r="22" class="vertex-circle sink" filter="url(#shadow)"/>
    <text x="280" y="155" text-anchor="middle" class="vertex-label">E</text>
  </g>
  
  <!-- Vertex Labels -->
  <g class="animated anim-fade-in" data-narration="Vertex labels showing source A and sink E">
    <text x="120" y="75" text-anchor="middle" class="property-text">source</text>
    <text x="120" y="260" text-anchor="middle" class="property-text">in:1 out:1</text>
    <text x="200" y="260" text-anchor="middle" class="property-text">in:1 out:1</text>
    <text x="200" y="130" text-anchor="middle" class="property-text">in:2 out:1</text>
    <text x="280" y="130" text-anchor="middle" class="property-text">sink</text>
  </g>
  
  <!-- Key Properties Box -->
  <g class="animated anim-slide-left" data-narration="Key properties of this DAG showing in-degree and out-degree for each vertex" style="animation-delay: 0.3s">
    <rect x="310" y="220" width="100" height="75" class="section-box" filter="url(#shadow)"/>
    <text x="360" y="240" text-anchor="middle" class="label-text" style="font-size:12px;font-weight:bold;">Properties</text>
    <text x="320" y="258" class="property-text">• A: in=0, out=2</text>
    <text x="320" y="272" class="property-text">• D: in=2, out=1</text>
    <text x="320" y="286" class="property-text">• E: in=1, out=0</text>
  </g>
  
  <!-- Topological Order Box -->
  <g class="animated anim-slide-left" data-narration="One valid topological ordering of this DAG" style="animation-delay: 0.5s">
    <rect x="310" y="305" width="100" height="45" class="highlight-box" filter="url(#shadow)"/>
    <text x="360" y="325" text-anchor="middle" class="label-text" style="font-size:12px;font-weight:bold;">Topo Order</text>
    <text x="360" y="342" text-anchor="middle" class="property-text" style="font-size:13px;color:#1565c0;">A → C → B → D → E</text>
  </g>
  
  <!-- Arrow Flow Indicators -->
  <g class="animated anim-fade-in" data-narration="Dependency flow arrows showing the direction of relationships" style="animation-delay: 0.7s">
    <text x="85" y="150" class="property-text" style="font-size:10px;">depends</text>
    <text x="155" y="150" class="property-text" style="font-size:10px;">depends</text>
    <text x="165" y="195" class="property-text" style="font-size:10px;">depends</text>
    <text x="230" y="195" class="property-text" style="font-size:10px;">depends</text>
    <text x="245" y="165" class="property-text" style="font-size:10px;">depends</text>
  </g>
  
  <!-- Legend Box -->
  <g class="animated anim-slide-up" data-narration="Legend explaining the vertex colors and edge meanings" style="animation-delay: 0.4s">
    <rect x="15" y="310" width="130" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="80" y="330" text-anchor="middle" class="label-text" style="font-size:12px;font-weight:bold;">Legend</text>
    <circle cx="35" cy="350" r="6" class="vertex-circle source"/>
    <text x="50" y="353" class="property-text">Source (in=0)</text>
    <circle cx="35" cy="368" r="6" class="vertex-circle"/>
    <text x="50" y="371" class="property-text">Intermediate</text>
    <circle cx="100" cy="368" r="6" class="vertex-circle sink"/>
    <text x="115" y="371" class="property-text">Sink (out=0)</text>
  </g>
  
  <!-- Concept Explanation -->
  <g class="animated anim-fade-in" data-narration="Explanation of what topological ordering means for this graph" style="animation-delay: 0.6s">
    <rect x="155" y="310" width="145" height="70" class="highlight-box" filter="url(#shadow)"/>
    <text x="227" y="330" text-anchor="middle" class="label-text" style="font-size:12px;font-weight:bold;">Topological Sort</text>
    <text x="165" y="348" class="property-text">Linear order where all</text>
    <text x="165" y="362" class="property-text">edges go left to right:</text>
    <text x="165" y="376" class="property-text" style="color:#2e7d32;font-size:12px;">If A→B, then A before B</text>
  </g>
  
  <!-- Animated pulsing circles on key vertices -->
  <g class="anim-pulse" style="animation-delay: 1s; transform-origin: 120px 100px;">
    <circle cx="120" cy="100" r="28" fill="none" stroke="#66bb6a" stroke-width="2" opacity="0.5"/>
  </g>
  <g class="anim-pulse" style="animation-delay: 1.2s; transform-origin: 280px 150px;">
    <circle cx="280" cy="150" r="28" fill="none" stroke="#ef5350" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Edge arrows animated -->
  <g data-narration="Animated edges showing directed connections between vertices">
    <path d="M118 125 L118 170" stroke="#5c6bc0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M135 108 L190 165" stroke="#5c6bc0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M135 212 L185 212" stroke="#5c6bc0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M120 195 L120 185" stroke="#5c6bc0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M212 212 L270 178" stroke="#5c6bc0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
</svg>