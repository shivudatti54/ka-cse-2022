<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="shortest-path-dijkstra">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4ecf4"/>
      <stop offset="100%" style="stop-color:#c5e3f0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f7fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5ba3c0"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c5f7c; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #3a7a94; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #4a6a7a; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #6a8a9a; }
    .step-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #2c5f7c; }
    .highlight-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #d35400; }
    .box { fill: url(#boxGradient); stroke: #a8d4e6; stroke-width: 1; rx: 6; }
    .highlight-box { fill: #fff8e7; stroke: #f39c12; stroke-width: 2; rx: 6; }
    .node { fill: #5ba3c0; stroke: #3a7a94; stroke-width: 2; }
    .node-source { fill: #27ae60; stroke: #1e8449; stroke-width: 2; }
    .node-visited { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
    .edge { stroke: #8fb8c9; stroke-width: 2; }
    .edge-weight { font-family: 'Arial', sans-serif; font-size: 10px; fill: #c0392b; font-weight: bold; }
    .animated { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    .highlight-anim { animation: highlight 1s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="animated" data-narration="Title section introducing Dijkstra's Algorithm">
    <text x="210" y="28" text-anchor="middle" class="title">Dijkstra's Algorithm</text>
    <text x="210" y="45" text-anchor="middle" class="detail">Shortest Path in Weighted Graphs</text>
  </g>
  
  <!-- Problem Definition Box -->
  <g class="slide-in" style="animation-delay: 0.2s" transform="translate(10, 55)" data-narration="Problem definition: finding shortest path from source to all vertices">
    <rect class="box" width="195" height="60" filter="url(#shadow)"/>
    <text x="102" y="72" text-anchor="middle" class="section-title">Problem Definition</text>
    <text x="102" y="88" text-anchor="middle" class="detail">Find shortest path from</text>
    <text x="102" y="102" text-anchor="middle" class="detail">source s to all vertices v</text>
  </g>
  
  <!-- Key Conditions Box -->
  <g class="slide-in" style="animation-delay: 0.3s" transform="translate(215, 55)" data-narration="Key constraint: all edge weights must be non-negative">
    <rect class="box" width="195" height="60" filter="url(#shadow)"/>
    <text x="312" y="72" text-anchor="middle" class="section-title">Key Condition</text>
    <text x="312" y="88" text-anchor="middle" class="detail">Edge weights w(u,v) ≥ 0</text>
    <text x="312" y="102" text-anchor="middle" class="detail">(Non-negative only)</text>
  </g>
  
  <!-- Algorithm Steps -->
  <g class="animated" style="animation-delay: 0.4s" data-narration="Main algorithm workflow showing initialization, extraction, and relaxation steps">
    <text x="210" y="130" text-anchor="middle" class="section-title">Algorithm Workflow</text>
    
    <!-- Step 1 -->
    <g transform="translate(20, 140)">
      <rect class="box" width="115" height="50" filter="url(#shadow)"/>
      <text x="57" y="158" text-anchor="middle" class="step-text">1. Initialize</text>
      <text x="57" y="174" text-anchor="middle" class="detail">dist[s]=0, others=∞</text>
      <circle cx="100" cy="25" r="8" fill="#27ae60" class="pulse"/>
      <text x="100" y="29" text-anchor="middle" fill="white" font-size="10" font-weight="bold">S</text>
    </g>
    
    <!-- Arrow 1 -->
    <line x1="145" y1="165" x2="165" y2="165" stroke="#5ba3c0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 2 -->
    <g transform="translate(175, 140)">
      <rect class="box" width="115" height="50" filter="url(#shadow)"/>
      <text x="57" y="158" text-anchor="middle" class="step-text">2. Extract Min</text>
      <text x="57" y="174" text-anchor="middle" class="detail">Remove vertex with</text>
      <text x="57" y="186" text-anchor="middle" class="detail">min distance</text>
    </g>
    
    <!-- Arrow 2 -->
    <line x1="300" y1="165" x2="320" y2="165" stroke="#5ba3c0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 3 -->
    <g transform="translate(330, 140)">
      <rect class="box" width="80" height="50" filter="url(#shadow)"/>
      <text x="40" y="158" text-anchor="middle" class="step-text">3. Relax</text>
      <text x="40" y="174" text-anchor="middle" class="detail">Update neighbors</text>
    </g>
  </g>
  
  <!-- Data Structures Section -->
  <g class="animated" style="animation-delay: 0.5s" data-narration="Key data structures used: distance array and priority queue">
    <text x="80" y="210" text-anchor="middle" class="section-title">Data Structures</text>
    
    <!-- Dist Array -->
    <g transform="translate(15, 220)">
      <rect class="box" width="120" height="70" filter="url(#shadow)"/>
      <text x="60" y="238" text-anchor="middle" class="step-text">dist[] Array</text>
      <line x1="25" y1="248" x2="95" y2="248" stroke="#a8d4e6" stroke-width="1"/>
      <text x="30" y="262" class="detail">A:0</text>
      <text x="60" y="262" class="detail">B:∞</text>
      <text x="90" y="262" class="detail">C:∞</text>
      <text x="30" y="278" class="detail">D:∞</text>
      <text x="60" y="278" class="detail">E:∞</text>
    </g>
    
    <!-- Priority Queue -->
    <g transform="translate(145, 220)">
      <rect class="box" width="120" height="70" filter="url(#shadow)"/>
      <text x="60" y="238" text-anchor="middle" class="step-text">Priority Queue</text>
      <line x1="25" y1="248" x2="95" y2="248" stroke="#a8d4e6" stroke-width="1"/>
      <!-- Min heap representation -->
      <circle cx="60" cy="265" r="12" fill="#e8f8f0" stroke="#27ae60" stroke-width="1"/>
      <text x="60" y="269" text-anchor="middle" class="detail" fill="#27ae60" font-weight="bold">A</text>
      <text x="35" y="285" class="detail">(min)</text>
    </g>
  </g>
  
  <!-- Example Graph -->
  <g class="animated" style="animation-delay: 0.6s" data-narration="Example graph visualization with nodes and weighted edges">
    <text x="320" y="210" text-anchor="middle" class="section-title">Example Graph</text>
    
    <!-- Graph nodes -->
    <g transform="translate(280, 225)">
      <!-- Edges -->
      <line x1="15" y1="15" x2="55" y2="45" class="edge"/>
      <line x1="15" y1="15" x2="55" y2="75" class="edge"/>
      <line x1="55" y1="45" x2="95" y2="45" class="edge"/>
      <line x1="55" y1="45" x2="55" y2="75" class="edge"/>
      <line x1="55" y1="75" x2="95" y2="75" class="edge"/>
      
      <!-- Edge weights -->
      <text x="30" y="25" class="edge-weight">4</text>
      <text x="30" y="55" class="edge-weight">2</text>
      <text x="75" y="40" class="edge-weight">3</text>
      <text x="60" y="60" class="edge-weight">5</text>
      <text x="80" y="75" class="edge-weight">1</text>
      
      <!-- Nodes -->
      <circle cx="15" cy="15" r="12" class="node-source"/>
      <text x="15" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="bold">S</text>
      
      <circle cx="55" cy="45" r="10" class="node"/>
      <text x="55" y="49" text-anchor="middle" fill="white" font-size="9" font-weight="bold">B</text>
      
      <circle cx="95" cy="45" r="10" class="node"/>
      <text x="95" y="49" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C</text>
      
      <circle cx="55" cy="75" r="10" class="node"/>
      <text x="55" y="79" text-anchor="middle" fill="white" font-size="9" font-weight="bold">D</text>
      
      <circle cx="95" cy="75" r="10" class="node"/>
      <text x="95" y="79" text-anchor="middle" fill="white" font-size="9" font-weight="bold">E</text>
    </g>
  </g>
  
  <!-- Greedy Choice Property -->
  <g class="slide-in" style="animation-delay: 0.7s" transform="translate(10, 300)" data-narration="Why greedy works: minimum distance vertex is finalized">
    <rect class="highlight-box" width="195" height="55" filter="url(#shadow)"/>
    <text x="102" y="322" text-anchor="middle" class="section-title">Greedy Choice Property</text>
    <text x="102" y="340" text-anchor="middle" class="detail">Once vertex with min dist is extracted,</text>
    <text x="102" y="354" text-anchor="middle" class="highlight-text">its shortest path is finalized</text>
  </g>
  
  <!-- Time Complexity -->
  <g class="slide-in" style="animation-delay: 0.8s" transform="translate(215, 300)" data-narration="Time complexity depends on priority queue implementation">
    <rect class="box" width="195" height="55" filter="url(#shadow)"/>
    <text x="312" y="322" text-anchor="middle" class="section-title">Time Complexity</text>
    <text x="312" y="340" text-anchor="middle" class="detail">With Binary Heap: O((V+E) log V)</text>
    <text x="312" y="354" text-anchor="middle" class="detail">With Fibonacci Heap: O(E + V log V)</text>
  </g>
  
  <!-- Applications -->
  <g class="animated" style="animation-delay: 0.9s" transform="translate(10, 360)" data-narration="Real-world applications of Dijkstra's algorithm">
    <text x="210" y="375" text-anchor="middle" class="section-title">Applications: GPS Navigation • Network Routing • Flight Connections • Game Pathfinding</text>
  </g>
  
  <!-- Decorative elements -->
  <g class="animated" style="animation-delay: 1s" opacity="0.3">
    <circle cx="395" cy="30" r="15" fill="#a8d4e6"/>
    <circle cx="25" cy="395" r="10" fill="#8fb8c9"/>
    <circle cx="400" cy="390" r="8" fill="#7aa8b8"/>
  </g>
</svg>