<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="interval-scheduling-fractional-knapsack">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="selectedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="skippedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="knapsackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    .slide-in { animation: slideIn 0.5s ease-out forwards; }
    .slide-up { animation: slideInUp 0.5s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #1e3a5f; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #374151; }
    .sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #6b7280; }
    .concept-box { rx: 8; ry: 8; }
    .interval-bar { rx: 3; ry: 3; }
    .item-box { rx: 4; ry: 4; }
    .time-axis { stroke: #9ca3af; stroke-width: 2; }
    .arrow { fill: #6366f1; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in" style="animation-delay: 0.1s;">
    <text x="210" y="30" text-anchor="middle" class="title">Interval Scheduling</text>
    <text x="210" y="50" text-anchor="middle" class="label" style="font-size:12px;color:#4b5563;">Greedy Algorithm Visualization</text>
  </g>
  
  <!-- Interval Scheduling Section -->
  <g class="slide-in" data-narration="The time axis shows hours from 0-12. Each interval represents a task with start and finish times." style="animation-delay: 0.3s;">
    <text x="20" y="75" class="label" style="font-weight:bold;">Time Axis:</text>
    <!-- Time axis line -->
    <line x1="30" y1="95" x2="390" y2="95" class="time-axis"/>
    <!-- Time marks -->
    <g class="sublabel" style="font-size:10px;">
      <text x="30" y="115">0</text>
      <text x="90" y="115">2</text>
      <text x="150" y="115">4</text>
      <text x="210" y="115">6</text>
      <text x="270" y="115">8</text>
      <text x="330" y="115">10</text>
      <text x="390" y="115">12</text>
    </g>
  </g>
  
  <!-- Interval Bars -->
  <g class="slide-up" data-narration="Intervals A, B, C, D, E represent different tasks. We select non-overlapping intervals." style="animation-delay: 0.5s;">
    <!-- Interval E (skipped - overlaps) -->
    <rect x="300" y="130" width="70" height="18" fill="url(#skippedGrad)" class="interval-bar" opacity="0.6"/>
    <text x="335" y="143" text-anchor="middle" fill="white" font-size="10" font-family="Arial">E</text>
    <text x="335" y="160" text-anchor="middle" class="sublabel" style="font-size:9px;">(skipped)</text>
    
    <!-- Interval D (selected) -->
    <rect x="200" y="130" width="60" height="18" fill="url(#selectedGrad)" class="interval-bar pulse"/>
    <text x="230" y="143" text-anchor="middle" fill="white" font-size="10" font-family="Arial" font-weight="bold">D</text>
    <text x="230" y="160" text-anchor="middle" class="sublabel" style="font-size:9px;">selected</text>
    
    <!-- Interval C (skipped - overlaps) -->
    <rect x="140" y="175" width="80" height="18" fill="url(#skippedGrad)" class="interval-bar" opacity="0.6"/>
    <text x="180" y="188" text-anchor="middle" fill="white" font-size="10" font-family="Arial">C</text>
    <text x="180" y="205" text-anchor="middle" class="sublabel" style="font-size:9px;">(overlaps)</text>
    
    <!-- Interval B (selected) -->
    <rect x="70" y="175" width="50" height="18" fill="url(#selectedGrad)" class="interval-bar pulse"/>
    <text x="95" y="188" text-anchor="middle" fill="white" font-size="10" font-family="Arial" font-weight="bold">B</text>
    <text x="95" y="205" text-anchor="middle" class="sublabel" style="font-size:9px;">selected</text>
    
    <!-- Interval A (selected) -->
    <rect x="35" y="220" width="40" height="18" fill="url(#selectedGrad)" class="interval-bar pulse"/>
    <text x="55" y="233" text-anchor="middle" fill="white" font-size="10" font-family="Arial" font-weight="bold">A</text>
    <text x="55" y="250" text-anchor="middle" class="sublabel" style="font-size:9px;">selected</text>
  </g>
  
  <!-- Arrow showing selection order -->
  <g class="fade-in" data-narration="The greedy rule: always pick the interval with the earliest finish time that doesn't conflict." style="animation-delay: 0.8s;">
    <path d="M 55 265 L 95 220" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <polygon points="55,265 60,260 60,270" fill="#6366f1" transform="rotate(-35 55 265)"/>
    <text x="75" y="280" class="label" style="font-size:10px;fill:#6366f1;">Earliest finish</text>
    <text x="65" y="292" class="sublabel" style="font-size:9px;">first →</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="fade-in" data-narration="The optimal strategy selects intervals B, D maximizing the count to 3 intervals." style="animation-delay: 1s;">
    <rect x="230" y="210" width="170" height="70" fill="white" stroke="#e5e7eb" stroke-width="1" class="concept-box" filter="url(#shadow)"/>
    <text x="240" y="230" class="label" style="font-weight:bold;font-size:12px;">Greedy Rule:</text>
    <text x="240" y="248" class="sublabel" style="font-size:10px;">Sort by finish time,</text>
    <text x="240" y="262" class="sublabel" style="font-size:10px;">pick earliest compatible</text>
    <text x="240" y="276" class="label" style="font-size:11px;fill:#22c55e;">✓ Max: 3 intervals</text>
  </g>
  
  <!-- Fractional Knapsack Section -->
  <g class="slide-in" data-narration="Fractional knapsack allows taking portions of items to maximize value within weight limit." style="animation-delay: 1.2s;">
    <text x="20" y="310" class="label" style="font-weight:bold;font-size:14px;">Fractional Knapsack:</text>
    
    <!-- Knapsack container -->
    <rect x="30" y="325" width="100" height="60" fill="none" stroke="#f59e0b" stroke-width="3" rx="5"/>
    <text x="80" y="345" text-anchor="middle" class="sublabel" style="font-size:9px;">Knapsack</text>
    <text x="80" y="358" text-anchor="middle" class="sublabel" style="font-size:9px;">Capacity: 15</text>
    
    <!-- Items -->
    <g>
      <!-- Item 1: High value/weight ratio -->
      <rect x="150" y="325" width="45" height="25" fill="#8b5cf6" class="item-box" filter="url(#shadow)"/>
      <text x="172" y="340" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Item 1</text>
      <text x="172" y="360" text-anchor="middle" class="sublabel" style="font-size:8px;">v:60 w:5</text>
      <text x="172" y="370" text-anchor="middle" class="sublabel" style="font-size:8px;color:#8b5cf6;">ratio:12</text>
      
      <!-- Item 2 -->
      <rect x="205" y="325" width="45" height="25" fill="#06b6d4" class="item-box" filter="url(#shadow)"/>
      <text x="227" y="340" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Item 2</text>
      <text x="227" y="360" text-anchor="middle" class="sublabel" style="font-size:8px;">v:100 w:10</text>
      <text x="227" y="370" text-anchor="middle" class="sublabel" style="font-size:8px;color:#06b6d4;">ratio:10</text>
      
      <!-- Item 3: Low ratio, partial -->
      <rect x="260" y="325" width="45" height="25" fill="#f97316" class="item-box" filter="url(#shadow)"/>
      <text x="282" y="340" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Item 3</text>
      <text x="282" y="360" text-anchor="middle" class="sublabel" style="font-size:8px;">v:120 w:15</text>
      <text x="282" y="370" text-anchor="middle" class="sublabel" style="font-size:8px;color:#f97316;">ratio:8</text>
    </g>
    
    <!-- Fraction indicator -->
    <g class="pulse">
      <text x="315" y="340" class="label" style="font-size:11px;">→</text>
      <text x="330" y="340" class="sublabel" style="font-size:10px;">Take 100%</text>
      <text x="330" y="352" class="sublabel" style="font-size:10px;">Take fractional</text>
      <text x="330" y="364" class="sublabel" style="font-size:10px;">of Item 3</text>
    </g>
  </g>
  
  <!-- Solution Box -->
  <g class="fade-in" data-narration="Solution: Take all of items 1 and 2, then 0 of item 3 for max value 160 with weight 15." style="animation-delay: 1.4s;">
    <rect x="150" y="375" width="250" height="20" fill="#d1fae5" rx="4"/>
    <text x="160" y="389" class="label" style="font-size:11px;fill:#065f46;">Solution: Items 1+2 = 160 value (100% used capacity)</text>
  </g>
  
  <!-- Footer -->
  <g class="fade-in" style="animation-delay: 1.6s;">
    <line x1="20" y1="385" x2="400" y2="385" stroke="#d1d5db" stroke-width="1"/>
  </g>
</svg>