<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="ftp-smtp-telnet-www-http" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8f8f4"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideDown {
      from { transform: translateY(-15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes borderPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #fff; }
    .label-dark { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .box { rx: 6; ry: 6; }
    .client-anim { animation: slideIn 0.6s ease-out forwards; }
    .server-anim { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .proto-anim { animation: slideDown 0.5s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .border-anim { animation: borderPulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Application Layer Protocols</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#888" stroke-width="1" class="title-anim"/>
  
  <!-- Client (Left Side) -->
  <g class="client-anim">
    <rect x="30" y="90" width="90" height="70" rx="8" fill="url(#clientGrad)" filter="url(#shadow)"/>
    <text x="75" y="120" text-anchor="middle" class="label" font-size="13" font-weight="bold">CLIENT</text>
    <text x="75" y="140" text-anchor="middle" class="label" font-size="10">(Browser/App)</text>
  </g>
  
  <!-- Server (Right Side) -->
  <g class="server-anim">
    <rect x="300" y="90" width="90" height="70" rx="8" fill="url(#serverGrad)" filter="url(#shadow)"/>
    <text x="345" y="120" text-anchor="middle" class="label" font-size="13" font-weight="bold">SERVER</text>
    <text x="345" y="140" text-anchor="middle" class="label" font-size="10">(Web/Mail/FTP)</text>
  </g>
  
  <!-- Protocol Boxes on Left -->
  <g data-narration="HTTP protocol connects client to web servers on port 80/443 for web browsing">
    <rect x="15" y="180" width="80" height="38" rx="5" fill="#e74c3c" class="proto-anim" style="animation-delay: 0.3s"/>
    <text x="55" y="200" text-anchor="middle" class="label" font-weight="bold">HTTP</text>
    <text x="55" y="212" text-anchor="middle" class="label" font-size="9">Port: 80/443</text>
  </g>
  
  <g data-narration="FTP transfers files between client and server using ports 20/21">
    <rect x="15" y="223" width="80" height="38" rx="5" fill="#3498db" class="proto-anim" style="animation-delay: 0.4s"/>
    <text x="55" y="243" text-anchor="middle" class="label" font-weight="bold">FTP</text>
    <text x="55" y="255" text-anchor="middle" class="label" font-size="9">Port: 20, 21</text>
  </g>
  
  <g data-narration="SMTP sends emails from client to mail server on port 25">
    <rect x="15" y="266" width="80" height="38" rx="5" fill="#9b59b6" class="proto-anim" style="animation-delay: 0.5s"/>
    <text x="55" y="286" text-anchor="middle" class="label" font-weight="bold">SMTP</text>
    <text x="55" y="298" text-anchor="middle" class="label" font-size="9">Port: 25</text>
  </g>
  
  <!-- Protocol Boxes on Right -->
  <g data-narration="WWW is the distributed hypermedia system that delivers HTTP content">
    <rect x="325" y="180" width="80" height="38" rx="5" fill="#1abc9c" class="proto-anim" style="animation-delay: 0.3s"/>
    <text x="365" y="200" text-anchor="middle" class="label" font-weight="bold">WWW</text>
    <text x="365" y="212" text-anchor="middle" class="label" font-size="9">Port: 80</text>
  </g>
  
  <g data-narration="Telnet provides remote terminal access on port 23, less secure">
    <rect x="325" y="223" width="80" height="38" rx="5" fill="#e67e22" class="proto-anim" style="animation-delay: 0.4s"/>
    <text x="365" y="243" text-anchor="middle" class="label" font-weight="bold">Telnet</text>
    <text x="365" y="255" text-anchor="middle" class="label" font-size="9">Port: 23</text>
  </g>
  
  <!-- Connection Lines -->
  <g stroke="#666" stroke-width="1.5" fill="none">
    <path d="M120 125 Q210 125 300 125" marker-end="url(#arrowhead)" class="pulse"/>
    <path d="M120 195 Q210 195 325 199" marker-end="url(#arrowhead)" opacity="0.6"/>
    <path d="M120 238 Q210 238 325 238" marker-end="url(#arrowhead)" opacity="0.6"/>
    <path d="M120 281 Q210 281 325 281" marker-end="url(#arrowhead)" opacity="0.6"/>
    <path d="M120 315 Q210 315 300 320" marker-end="url(#arrowhead)" opacity="0.6"/>
  </g>
  
  <!-- Request/Response Model Box -->
  <g data-narration="HTTP operates as request-response model between client and server">
    <rect x="140" y="330" width="140" height="55" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)" class="border-anim"/>
    <text x="210" y="350" text-anchor="middle" class="label-dark" font-weight="bold" font-size="11">HTTP Request-Response</text>
    <text x="210" y="365" text-anchor="middle" class="detail">Client sends Request →</text>
    <text x="210" y="378" text-anchor="middle" class="detail">Server returns Response</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Application Layer provides network services to end users, using TCP/UDP for reliable transport">
    <rect x="145" y="55" width="130" height="30" rx="4" fill="#fff9e6" stroke="#f39c12" stroke-width="1"/>
    <text x="210" y="72" text-anchor="middle" class="label-dark" font-size="9">Application Layer: OSI Layer 7</text>
    <text x="210" y="82" text-anchor="middle" class="detail">Network services to end-users</text>
  </g>
  
  <!-- Arrows showing relationship -->
  <g fill="#555" font-size="10" font-family="Arial">
    <text x="185" y="123" class="proto-anim" style="animation-delay: 0.6s">Request</text>
    <text x="235" y="123" class="proto-anim" style="animation-delay: 0.7s">Response</text>
  </g>
</svg>