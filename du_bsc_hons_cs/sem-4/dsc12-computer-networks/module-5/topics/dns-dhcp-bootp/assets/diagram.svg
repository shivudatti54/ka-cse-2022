<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="dns-dhcp-bootp" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dnsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dhcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bootpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section { animation: fadeIn 0.8s ease-out; }
    .arrow { animation: slideInLeft 0.6s ease-out; }
    .arrow-right { animation: slideInRight 0.6s ease-out; }
    .pulse { animation: pulse 2s infinite; }
    .bounce { animation: bounce 1.5s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">DNS, DHCP &amp; BOOTP</text>
  
  <!-- DNS Section -->
  <g class="section" data-narration="DNS translates domain names to IP addresses using a hierarchical system">
    <rect x="10" y="50" width="120" height="85" rx="8" ry="8" fill="url(#dnsGrad)" stroke="#88d8d0" stroke-width="2"/>
    <text x="70" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">DNS</text>
    <text x="70" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">Domain Name</text>
    <text x="70" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">System</text>
    <text x="70" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">Resolves names to IPs</text>
    <text x="70" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">A, AAAA, CNAME, MX</text>
  </g>
  
  <!-- Arrow DNS to Root -->
  <g class="arrow" data-narration="Queries flow from resolver to root server, then TLD, then authoritative">
    <path d="M130 85 L155 85" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="155,85 148,82 148,88" fill="#e74c3c"/>
  </g>
  
  <!-- Root Server -->
  <g class="section" data-narration="Root server directs queries to appropriate TLD servers">
    <circle cx="180" cy="85" r="18" fill="#f39c12" class="bounce"/>
    <text x="180" y="90" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">ROOT</text>
  </g>
  
  <!-- Arrow Root to TLD -->
  <g class="arrow-right" data-narration="TLD server handles top-level domains like .in, .com">
    <path d="M198 85 L220 85" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <polygon points="220,85 213,82 213,88" fill="#e74c3c"/>
  </g>
  
  <!-- TLD Server -->
  <g class="section" data-narration="TLD server manages domain extensions">
    <circle cx="245" cy="85" r="18" fill="#9b59b6" class="bounce"/>
    <text x="245" y="90" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">.in</text>
  </g>
  
  <!-- Arrow TLD to Auth -->
  <g class="arrow-right" data-narration="Authoritative server provides the final IP address">
    <path d="M263 85 L285 85" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <polygon points="285,85 278,82 278,88" fill="#e74c3c"/>
  </g>
  
  <!-- Authoritative Server -->
  <g class="section" data-narration="Authoritative server returns the actual IP address">
    <circle cx="310" cy="85" r="18" fill="#27ae60" class="bounce"/>
    <text x="310" y="90" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">AUTH</text>
  </g>
  
  <!-- DHCP Section -->
  <g class="section" data-narration="DHCP uses DORA: Discover, Offer, Request, Acknowledgement to assign IPs">
    <rect x="10" y="155" width="125" height="90" rx="8" ry="8" fill="url(#dhcpGrad)" stroke="#c89dd4" stroke-width="2"/>
    <text x="72" y="175" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">DHCP</text>
    <text x="72" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">DORA Process</text>
    <text x="72" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">Discover → Offer</text>
    <text x="72" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">Request → Ack</text>
    <text x="72" y="238" text-anchor="middle" font-family="Arial" font-size="8" fill="#7f8c8d">Dynamic IP allocation</text>
  </g>
  
  <!-- DHCP Arrow -->
  <g class="arrow" data-narration="Client broadcasts discovery, server offers IP, client requests, server acknowledges">
    <path d="M72 245 L72 265" stroke="#3498db" stroke-width="2" fill="none"/>
    <polygon points="72,265 69,258 75,258" fill="#3498db"/>
  </g>
  
  <!-- DORA Steps -->
  <g class="section" data-narration="The four-step DORA process for IP lease">
    <rect x="25" y="270" width="95" height="50" rx="6" ry="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="72" y="288" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">DORA Steps</text>
    <text x="72" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#e74c3c">D - Discover</text>
    <text x="72" y="313" text-anchor="middle" font-family="Arial" font-size="8" fill="#27ae60">O - Offer</text>
    <text x="72" y="323" text-anchor="middle" font-family="Arial" font-size="8" fill="#f39c12">R - Request</text>
  </g>
  
  <!-- BOOTP Section -->
  <g class="section" data-narration="BOOTP provides static IP allocation for diskless workstations">
    <rect x="150" y="155" width="125" height="90" rx="8" ry="8" fill="url(#bootpGrad)" stroke="#6bb9f0" stroke-width="2"/>
    <text x="212" y="175" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">BOOTP</text>
    <text x="212" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">Bootstrap Protocol</text>
    <text x="212" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">Static IP assignment</text>
    <text x="212" y="224" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">MAC-based allocation</text>
    <text x="212" y="238" text-anchor="middle" font-family="Arial" font-size="8" fill="#7f8c8d">TFTP for boot image</text>
  </g>
  
  <!-- Comparison Box -->
  <g class="section" data-narration="Key comparison: DHCP is dynamic with leases, BOOTP is static, DNS resolves names">
    <rect x="290" y="155" width="115" height="90" rx="8" ry="8" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="2"/>
    <text x="347" y="172" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c3e50">Comparison</text>
    <line x1="295" y1="180" x2="402" y2="180" stroke="#ddd" stroke-width="1"/>
    <text x="300" y="195" font-family="Arial" font-size="8" fill="#34495e">DHCP: Dynamic</text>
    <text x="300" y="208" font-family="Arial" font-size="8" fill="#34495e">BOOTP: Static</text>
    <text x="300" y="221" font-family="Arial" font-size="8" fill="#34495e">DNS: Name Resolution</text>
    <text x="300" y="234" font-family="Arial" font-size="8" fill="#34495e">Lease: DHCP only</text>
    <text x="300" y="247" font-family="Arial" font-size="8" fill="#34495e">TFTP: BOOTP</text>
  </g>
  
  <!-- DNS Resolution Flow -->
  <g class="section" data-narration="DNS resolution example shows recursive and iterative queries">
    <rect x="10" y="335" width="180" height="55" rx="6" ry="6" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1"/>
    <text x="100" y="352" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">DNS Resolution Example</text>
    <text x="100" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#34495e">www.du.ac.in</text>
    <text x="100" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#7f8c8d">→ 103.25.195.50</text>
  </g>
  
  <!-- Key Protocols Box -->
  <g class="section" data-narration="Resource records: A (IPv4), AAAA (IPv6), CNAME (alias), MX (mail), NS (name server)">
    <rect x="200" y="335" width="205" height="55" rx="6" ry="6" fill="#81ecec" stroke="#00cec9" stroke-width="1"/>
    <text x="302" y="352" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">Key Records</text>
    <text x="210" y="368" font-family="Arial" font-size="8" fill="#34495e">A=IPv4</text>
    <text x="250" y="368" font-family="Arial" font-size="8" fill="#34495e">AAAA=IPv6</text>
    <text x="295" y="368" font-family="Arial" font-size="8" fill="#34495e">CNAME</text>
    <text x="340" y="368" font-family="Arial" font-size="8" fill="#34495e">MX</text>
    <text x="370" y="368" font-family="Arial" font-size="8" fill="#34495e">NS</text>
    <text x="210" y="382" font-family="Arial" font-size="8" fill="#7f8c8d">Recursive: Client→Resolver</text>
    <text x="320" y="382" font-family="Arial" font-size="8" fill="#7f8c8d">Iterative: Server→Server</text>
  </g>
  
  <!-- IPv6 Note -->
  <g class="pulse" data-narration="DHCPv6 handles IPv6 address allocation">
    <circle cx="380" cy="50" r="15" fill="#e056fd"/>
    <text x="380" y="55" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">IPv6</text>
  </g>
</svg>