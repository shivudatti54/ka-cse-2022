<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="udp-tcp-ip-flow-control">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="udpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="100%" style="stop-color:#c3e6cb"/>
    </linearGradient>
    <linearGradient id="tcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff"/>
      <stop offset="100%" style="stop-color:#b8daff"/>
    </linearGradient>
    <linearGradient id="ipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5d0"/>
      <stop offset="100%" style="stop-color:#ffd8b3"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e3e5"/>
      <stop offset="100%" style="stop-color:#d6d8db"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideDown {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: slideDown 0.8s ease-out forwards; }
    .udp-anim { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .tcp-anim { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .ip-anim { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .flow-anim { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .handshake-anim { animation: fadeIn 0.6s ease-out 1s forwards; opacity: 0; }
    .pulse { animation: pulse 2s infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#495057" class="title-anim">UDP, TCP &amp; IP Flow Control</text>
  
  <!-- Protocol Boxes -->
  <!-- UDP Box -->
  <g class="udp-anim" data-narration="UDP provides connectionless, unreliable datagram service with minimal overhead">
    <rect x="15" y="45" width="115" height="70" rx="6" fill="url(#udpGrad)" stroke="#28a745" stroke-width="1.5"/>
    <text x="72" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#155724">UDP</text>
    <text x="72" y="78" text-anchor="middle" font-size="10" fill="#155724">Connectionless</text>
    <text x="72" y="90" text-anchor="middle" font-size="10" fill="#155724">Unreliable</text>
    <text x="72" y="102" text-anchor="middle" font-size="9" fill="#155724">No Flow Control</text>
  </g>
  
  <!-- TCP Box -->
  <g class="tcp-anim" data-narration="TCP ensures reliable, ordered delivery with flow control and congestion control">
    <rect x="152" y="45" width="115" height="70" rx="6" fill="url(#tcpGrad)" stroke="#007bff" stroke-width="1.5"/>
    <text x="209" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#004085">TCP</text>
    <text x="209" y="78" text-anchor="middle" font-size="10" fill="#004085">Connection-Oriented</text>
    <text x="209" y="90" text-anchor="middle" font-size="10" fill="#004085">Reliable</text>
    <text x="209" y="102" text-anchor="middle" font-size="9" fill="#004085">Flow Control</text>
  </g>
  
  <!-- IP Box -->
  <g class="ip-anim" data-narration="IP operates at Network Layer for addressing and routing without flow control">
    <rect x="289" y="45" width="115" height="70" rx="6" fill="url(#ipGrad)" stroke="#fd7e14" stroke-width="1.5"/>
    <text x="346" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a4b08">IP</text>
    <text x="346" y="78" text-anchor="middle" font-size="10" fill="#8a4b08">Network Layer</text>
    <text x="346" y="90" text-anchor="middle" font-size="10" fill="#8a4b08">Addressing</text>
    <text x="346" y="102" text-anchor="middle" font-size="9" fill="#8a4b08">No Flow Control</text>
  </g>
  
  <!-- Flow Control Comparison -->
  <g class="flow-anim" data-narration="Flow control comparison: UDP has none, TCP uses sliding window, IP has none">
    <rect x="15" y="130" width="388" height="45" rx="5" fill="url(#flowGrad)" stroke="#6c757d" stroke-width="1"/>
    <text x="30" y="148" font-size="11" fill="#495057" font-weight="bold">Flow Control:</text>
    <text x="30" y="163" font-size="10" fill="#6c757d">UDP: None | TCP: Sliding Window | IP: None</text>
  </g>
  
  <!-- TCP 3-Way Handshake -->
  <g class="handshake-anim" data-narration="TCP 3-Way Handshake establishes connection with SYN, SYN-ACK, ACK">
    <text x="210" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#495057">TCP 3-Way Handshake</text>
    
    <!-- Client -->
    <rect x="40" y="205" width="55" height="30" rx="4" fill="#e2e6ea" stroke="#495057"/>
    <text x="67" y="223" text-anchor="middle" font-size="9" fill="#495057">Client</text>
    
    <!-- Server -->
    <rect x="325" y="205" width="55" height="30" rx="4" fill="#e2e6ea" stroke="#495057"/>
    <text x="352" y="223" text-anchor="middle" font-size="9" fill="#495057">Server</text>
    
    <!-- SYN Arrow -->
    <path d="M 80 230 Q 130 215 180 230" stroke="#dc3545" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
    <text x="120" y="218" text-anchor="middle" font-size="8" fill="#dc3545">SYN(seq=x)</text>
    
    <!-- SYN-ACK Arrow -->
    <path d="M 310 245 Q 260 260 210 245" stroke="#28a745" stroke-width="1.5" fill="none"/>
    <text x="245" y="258" text-anchor="middle" font-size="8" fill="#28a745">SYN-ACK</text>
    
    <!-- ACK Arrow -->
    <path d="M 95 260 Q 145 275 200 260" stroke="#007bff" stroke-width="1.5" fill="none"/>
    <text x="135" y="272" text-anchor="middle" font-size="8" fill="#007bff">ACK</text>
    
    <!-- ESTABLISHED -->
    <rect x="150" y="280" width="120" height="22" rx="4" fill="#d4edda" stroke="#28a745"/>
    <text x="210" y="294" text-anchor="middle" font-size="9" fill="#155724" font-weight="bold">ESTABLISHED</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="handshake-anim" data-narration="Key differences: UDP for real-time apps, TCP for reliable transmission">
    <rect x="15" y="315" width="388" height="75" rx="5" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1"/>
    <text x="25" y="332" font-size="11" font-weight="bold" fill="#343a40">Key Concepts:</text>
    <text x="25" y="348" font-size="9" fill="#495057">• UDP: Fast, minimal overhead, used for streaming, gaming</text>
    <text x="25" y="362" font-size="9" fill="#495057">• TCP: Reliable, ordered, flow/congestion control</text>
    <text x="25" y="376" font-size="9" fill="#495057">• IP: Routing, no delivery guarantees or flow control</text>
  </g>
  
  <!-- Arrows showing relationship -->
  <g class="flow-anim">
    <path d="M 130 80 L 152 80" stroke="#6c757d" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
    <path d="M 267 80 L 289 80" stroke="#6c757d" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6c757d"/>
    </marker>
  </defs>
</svg>