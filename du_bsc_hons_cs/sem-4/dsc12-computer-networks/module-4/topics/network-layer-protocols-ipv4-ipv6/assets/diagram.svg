<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-layer-protocols-ipv4-ipv6">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="ipv4Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fb8d8"/>
    </linearGradient>
    <linearGradient id="ipv6Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8"/>
      <stop offset="100%" style="stop-color:#98d898"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; }
    .detail-text { font-family: 'Consolas', monospace; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .ipv4-anim { animation: slideInLeft 0.6s ease-out forwards; }
    .ipv6-anim { animation: slideInRight 0.6s ease-out forwards; }
    .box-anim { animation: slideDown 0.5s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" font-size="20" fill="#2c3e50" data-narration="Title: Network Layer Protocols - IPv4 and IPv6">Network Layer Protocols</text>
  <text x="210" y="46" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#5d6d7e">IPv4 vs IPv6 Comparison</text>
  
  <!-- IPv4 Section -->
  <g class="ipv4-anim" data-narration="IPv4 Section: 32-bit addresses, 4.3 billion unique addresses">
    <rect x="15" y="65" width="185" height="150" rx="8" fill="url(#ipv4Gradient)" filter="url(#shadow)"/>
    <text x="108" y="85" text-anchor="middle" class="label-text" font-size="16" fill="#1a5276">IPv4</text>
    <text x="108" y="102" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#1a5276">32-bit Address</text>
    
    <!-- IPv4 Header Fields -->
    <rect x="25" y="115" width="165" height="18" rx="3" fill="#fff" stroke="#5dade2"/>
    <text x="32" y="128" font-family="Consolas, monospace" font-size="9" fill="#2c3e50">VER(4) IHL(4) TOS(8)</text>
    
    <rect x="25" y="136" width="165" height="18" rx="3" fill="#fff" stroke="#5dade2"/>
    <text x="32" y="149" font-family="Consolas, monospace" font-size="9" fill="#2c3e50">Total Length(16) ID(16)</text>
    
    <rect x="25" y="157" width="165" height="18" rx="3" fill="#fff" stroke="#5dade2"/>
    <text x="32" y="170" font-family="Consolas, monospace" font-size="9" fill="#2c3e50">Flags(3) FragOff(13)</text>
    
    <rect x="25" y="178" width="165" height="18" rx="3" fill="#fff" stroke="#5dade2"/>
    <text x="32" y="191" font-family="Consolas, monospace" font-size="9" fill="#2c3e50">TTL(8) Protocol(8) HDR</text>
    
    <text x="108" y="208" text-anchor="middle" font-family="Consolas, monospace" font-size="8" fill="#1a5276">Source Address (32-bit)</text>
  </g>
  
  <!-- IPv6 Section -->
  <g class="ipv6-anim" data-narration="IPv6 Section: 128-bit addresses, virtually unlimited address pool">
    <rect x="220" y="65" width="185" height="150" rx="8" fill="url(#ipv6Gradient)" filter="url(#shadow)"/>
    <text x="312" y="85" text-anchor="middle" class="label-text" font-size="16" fill="#1e8449">IPv6</text>
    <text x="312" y="102" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#1e8449">128-bit Address</text>
    
    <!-- IPv6 Header Fields -->
    <rect x="230" y="115" width="165" height="18" rx="3" fill="#fff" stroke="#52be80"/>
    <text x="237" y="128" font-family="Consolas, monospace" font-size="9" fill="#1e8449">Version(4) TrafficClass</text>
    
    <rect x="230" y="136" width="165" height="18" rx="3" fill="#fff" stroke="#52be80"/>
    <text x="237" y="149" font-family="Consolas, monospace" font-size="9" fill="#1e8449">Flow Label(20)</text>
    
    <rect x="230" y="157" width="165" height="18" rx="3" fill="#fff" stroke="#52be80"/>
    <text x="237" y="170" font-family="Consolas, monospace" font-size="9" fill="#1e8449">Payload Length(16) NextHdr</text>
    
    <rect x="230" y="178" width="165" height="18" rx="3" fill="#fff" stroke="#52be80"/>
    <text x="237" y="191" font-family="Consolas, monospace" font-size="9" fill="#1e8449">Hop Limit(8)</text>
    
    <text x="312" y="208" text-anchor="middle" font-family="Consolas, monospace" font-size="8" fill="#1e8449">Source Address (128-bit)</text>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g class="box-anim" data-narration="Key concept: IPv4 address exhaustion driving the transition to IPv6">
    <rect x="15" y="225" width="185" height="45" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="108" y="242" text-anchor="middle" class="label-text" font-size="12" fill="#c0392b">IPv4 Limitation</text>
    <text x="108" y="258" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#c0392b">~4.3 Billion Addresses</text>
    <text x="108" y="270" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#c0392b">Address Space Exhaustion</text>
  </g>
  
  <g class="box-anim" data-narration="Key concept: IPv6 advantages include expanded address space and enhanced security">
    <rect x="220" y="225" width="185" height="45" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
    <text x="312" y="242" text-anchor="middle" class="label-text" font-size="12" fill="#1e8449">IPv6 Advantages</text>
    <text x="312" y="258" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#1e8449">~340 Sextillion Addresses</text>
    <text x="312" y="270" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#1e8449">Enhanced Security Features</text>
  </g>
  
  <!-- Arrow showing transition -->
  <g class="pulse-anim" data-narration="Arrow indicating the global transition from IPv4 to IPv6">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
      </marker>
    </defs>
    <line x1="130" y1="285" x2="290" y2="285" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="210" y="280" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#7f8c8d" font-style="italic">Transition</text>
  </g>
  
  <!-- OSI Layer Indicator -->
  <g data-narration="Network Layer is Layer 3 of the OSI model">
    <rect x="15" y="300" width="390" height="40" rx="6" fill="#fdebd0" stroke="#f39c12" stroke-width="1.5"/>
    <text x="35" y="322" font-family="Segoe UI, Arial" font-size="11" fill="#d35400" font-weight="bold">OSI Layer 3:</text>
    <text x="100" y="322" font-family="Segoe UI, Arial" font-size="11" fill="#d35400">Network Layer</text>
    <text x="200" y="322" font-family="Segoe UI, Arial" font-size="10" fill="#b9770e">Logical Addressing • Routing • Forwarding</text>
  </g>
  
  <!-- Additional Info -->
  <g data-narration="Key concepts: Packet formats, addressing schemes, fragmentation, subnetting">
    <text x="210" y="355" text-anchor="middle" class="label-text" font-size="12" fill="#34495e">Core Concepts</text>
    <rect x="30" y="362" width="360" height="25" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="210" y="375" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#7f8c8d">Packet Format • Addressing • Fragmentation • Subnetting • Transition Mechanisms</text>
  </g>
  
  <!-- Decorative network icons -->
  <g data-narration="Visual representation of networked systems">
    <circle cx="380" y="55" r="8" fill="#3498db" opacity="0.6"/>
    <circle cx="395" y="40" r="5" fill="#9b59b6" opacity="0.6"/>
    <circle cx="365" y="42" r="6" fill="#1abc9c" opacity="0.6"/>
    <line x1="380" y1="55" x2="365" y2="42" stroke="#95a5a6" stroke-width="1" opacity="0.5"/>
    <line x1="380" y1="55" x2="395" y2="40" stroke="#95a5a6" stroke-width="1" opacity="0.5"/>
  </g>
</svg>