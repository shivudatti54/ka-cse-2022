<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="virtual-circuits-datagrams-addressing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hostGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="routerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="packetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateX(-20px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowPacket {
      0% { transform: translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(320px); opacity: 0; }
    }
    @keyframes highlightPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .label-large { font-family: Arial, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .section-box { fill: #fff; stroke: #ccc; stroke-width: 1; rx: 5; }
    .host { fill: url(#hostGradient); stroke: #2c5aa0; stroke-width: 2; }
    .router { fill: url(#routerGradient); stroke: #357a37; stroke-width: 2; rx: 3; }
    .packet { fill: url(#packetGradient); stroke: #c47f17; stroke-width: 1; }
    .vci-table { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
    .vci-header { fill: #6c757d; font-family: Arial, sans-serif; font-size: 9px; fill: #fff; }
    .vci-cell { fill: #fff; font-family: Arial, sans-serif; font-size: 9px; }
    .path-line { fill: none; stroke: #95a5a6; stroke-width: 2; stroke-dasharray: 5,3; }
    .concept-box { fill: #e8f4f8; stroke: #4a90d9; stroke-width: 1; rx: 4; }
    .animate-fade { animation: fadeIn 1s ease-out forwards; }
    .animate-slide { animation: slideIn 0.8s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-flow { animation: flowPacket 4s linear infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title animate-fade">Virtual Circuits: Datagrams Addressing</text>
  <line x1="30" y1="35" x2="390" y2="35" stroke="#4a90d9" stroke-width="2" class="animate-fade"/>
  
  <!-- Network Path Section -->
  <g data-narration="Virtual Circuit path from source to destination showing VCI value changes">
    <text x="30" y="55" class="label-large">Virtual Circuit Path</text>
    
    <!-- Connection Lines -->
    <path d="M 60 120 L 120 120" class="path-line"/>
    <path d="M 160 120 L 220 120" class="path-line"/>
    <path d="M 260 120 L 320 120" class="path-line"/>
    <path d="M 360 120 L 400 120" class="path-line"/>
    
    <!-- Animated Packet -->
    <g class="animate-flow" style="animation-delay: 0s;">
      <rect x="55" y="112" width="18" height="16" class="packet" rx="2"/>
      <text x="64" y="123" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">P</text>
    </g>
    <g class="animate-flow" style="animation-delay: 1.3s;">
      <rect x="55" y="112" width="18" height="16" class="packet" rx="2"/>
      <text x="64" y="123" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">P</text>
    </g>
    <g class="animate-flow" style="animation-delay: 2.6s;">
      <rect x="55" y="112" width="18" height="16" class="packet" rx="2"/>
      <text x="64" y="123" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">P</text>
    </g>
    
    <!-- Source Host -->
    <rect x="35" y="90" width="50" height="40" class="host" rx="4"/>
    <text x="60" y="110" text-anchor="middle" class="label" fill="#fff" font-weight="bold">Source</text>
    <text x="60" y="125" text-anchor="middle" class="detail" fill="#fff">Host</text>
    <text x="60" y="138" text-anchor="middle" class="detail" fill="#fff">192.168.1.1</text>
    
    <!-- Router A -->
    <rect x="125" y="100" width="35" height="30" class="router" rx="3"/>
    <text x="142" y="120" text-anchor="middle" class="label-large" fill="#fff" font-size="10">A</text>
    
    <!-- Router B -->
    <rect x="225" y="100" width="35" height="30" class="router" rx="3"/>
    <text x="242" y="120" text-anchor="middle" class="label-large" fill="#fff" font-size="10">B</text>
    
    <!-- Router C -->
    <rect x="325" y="100" width="35" height="30" class="router" rx="3"/>
    <text x="342" y="120" text-anchor="middle" class="label-large" fill="#fff" font-size="10">C</text>
    
    <!-- Destination Host -->
    <rect x="385" y="90" width="30" height="40" class="host" rx="4"/>
    <text x="400" y="110" text-anchor="middle" class="label" fill="#fff" font-weight="bold">Dest</text>
    <text x="400" y="125" text-anchor="middle" class="detail" fill="#fff">10.0.0.5</text>
  </g>
  
  <!-- VCI Tables Section -->
  <g data-narration="VCI (Virtual Circuit Identifier) tables at each router showing input and output VCI values">
    <text x="30" y="165" class="label-large">VCI Tables (Connection State)</text>
    
    <!-- Router A VCI Table -->
    <rect x="35" y="175" width="80" height="45" class="vci-table"/>
    <rect x="35" y="175" width="80" height="14" fill="#5cb85c"/>
    <text x="75" y="185" text-anchor="middle" class="vci-header">Router A</text>
    <text x="40" y="200" class="vci-cell">In: 10</text>
    <text x="40" y="212" class="vci-cell">Out: 20</text>
    <text x="75" y="200" class="vci-cell" text-anchor="end">Port 1</text>
    <text x="75" y="212" class="vci-cell" text-anchor="end">Port 2</text>
    
    <!-- Router B VCI Table -->
    <rect x="125" y="175" width="80" height="45" class="vci-table"/>
    <rect x="125" y="175" width="80" height="14" fill="#5cb85c"/>
    <text x="165" y="185" text-anchor="middle" class="vci-header">Router B</text>
    <text x="130" y="200" class="vci-cell">In: 20</text>
    <text x="130" y="212" class="vci-cell">Out: 30</text>
    <text x="195" y="200" class="vci-cell" text-anchor="end">Port 1</text>
    <text x="195" y="212" class="vci-cell" text-anchor="end">Port 2</text>
    
    <!-- Router C VCI Table -->
    <rect x="215" y="175" width="80" height="45" class="vci-table"/>
    <rect x="215" y="175" width="80" height="14" fill="#5cb85c"/>
    <text x="255" y="185" text-anchor="middle" class="vci-header">Router C</text>
    <text x="220" y="200" class="vci-cell">In: 30</text>
    <text x="220" y="212" class="vci-cell">Out: 40</text>
    <text x="285" y="200" class="vci-cell" text-anchor="end">Port 1</text>
    <text x="285" y="212" class="vci-cell" text-anchor="end">Port 2</text>
    
    <!-- Packet VCI Value Animation -->
    <g>
      <rect x="90" y="195" width="20" height="14" fill="#f0ad4e" rx="2" class="animate-pulse"/>
      <text x="100" y="205" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">VCI</text>
    </g>
    <text x="100" y="175" text-anchor="middle" class="detail">10→20</text>
    <text x="180" y="175" text-anchor="middle" class="detail">20→30</text>
    <text x="270" y="175" text-anchor="middle" class="detail">30→40</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Key concept: Virtual Circuit establishes connection first, then transmits data with VCI identifiers">
    <rect x="30" y="235" width="175" height="75" class="concept-box"/>
    <text x="40" y="252" class="label-large" fill="#2c5aa0">Virtual Circuit</text>
    <text x="40" y="268" class="detail">• Pre-established path before data</text>
    <text x="40" y="280" class="detail">• Uses VCI for identification</text>
    <text x="40" y="292" class="detail">• Each router maintains state</text>
    <text x="40" y="304" class="detail">• Example: Frame Relay, ATM</text>
  </g>
  
  <g data-narration="Key concept: Datagram switching sends packets independently with full destination addressing">
    <rect x="215" y="235" width="175" height="75" class="concept-box" style="stroke: #5cb85c;"/>
    <text x="225" y="252" class="label-large" fill="#357a37">Datagram</text>
    <text x="225" y="268" class="detail">• Each packet routed independently</text>
    <text x="225" y="280" class="detail">• Full IP address in each packet</text>
    <text x="225" y="292" class="detail">• No connection state needed</text>
    <text x="225" y="304" class="detail">• Example: Internet (IP)</text>
  </g>
  
  <!-- Addressing Comparison -->
  <g data-narration="Comparison of addressing in virtual circuits vs datagrams">
    <text x="30" y="330" class="label-large">Addressing Comparison</text>
    
    <!-- Virtual Circuit Addressing -->
    <rect x="30" y="340" width="175" height="50" fill="#e8f4f8" stroke="#4a90d9" stroke-width="1" rx="4"/>
    <text x="40" y="358" class="label" fill="#2c5aa0">VC Addressing:</text>
    <text x="40" y="374" class="detail">Header: VCI + Short ID</text>
    <text x="40" y="386" class="detail">Efficient, fixed overhead</text>
    
    <!-- Datagram Addressing -->
    <rect x="215" y="340" width="175" height="50" fill="#e8f8f0" stroke="#5cb85c" stroke-width="1" rx="4"/>
    <text x="225" y="358" class="label" fill="#357a37">IP Addressing:</text>
    <text x="225" y="374" class="detail">Header: 32-bit IP Dest + Source</text>
    <text x="225" y="386" class="detail">Flexible, larger overhead</text>
  </g>
  
  <!-- Legend -->
  <g data-narration="Diagram legend showing packet flow and VCI transformation">
    <rect x="305" y="225" width="90" height="60" fill="#fff" stroke="#dee2e6" stroke-width="1" rx="3"/>
    <text x="315" y="240" class="detail" font-weight="bold">Legend</text>
    <circle cx="322" cy="255" r="4" fill="#f0ad4e"/>
    <text x="332" y="258" class="detail">Packet</text>
    <path d="M 320 268 L 330 268" stroke="#95a5a6" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="332" y="271" class="detail">VC Path</text>
  </g>
  
</svg>