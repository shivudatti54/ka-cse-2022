<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="subnetting-routing-algorithms" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="boxGradientA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff9aa2"/>
    </linearGradient>
    <linearGradient id="boxGradientB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#98fb98"/>
    </linearGradient>
    <linearGradient id="boxGradientC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#87ceeb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes titleSlide {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: titleSlide 0.8s ease-out forwards; }
    .class-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .class-a { animation-delay: 0.2s; }
    .class-b { animation-delay: 0.4s; }
    .class-c { animation-delay: 0.6s; }
    .arrow { animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    .subtitle { animation: fadeIn 1s ease-out forwards; animation-delay: 0.3s; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Subnetting &amp; Routing</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5d6d7e" class="subtitle">Classful IP Address Structure</text>
  
  <!-- Class A Box -->
  <g class="class-box class-a" data-narration="Class A networks use 8 bits for network ID and 24 bits for host ID, supporting approximately 16 million hosts per network">
    <rect x="20" y="75" width="115" height="95" rx="8" fill="url(#boxGradientA)" filter="url(#shadow)"/>
    <text x="77" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#c0392b">Class A</text>
    <text x="77" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">N.H.H.H</text>
    <text x="77" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">8 Net / 24 Host</text>
    <text x="77" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">255.0.0.0</text>
  </g>
  
  <!-- Class B Box -->
  <g class="class-box class-b" data-narration="Class B networks use 16 bits for network ID and 16 bits for host ID, supporting about 65,000 hosts per network">
    <rect x="152" y="75" width="115" height="95" rx="8" fill="url(#boxGradientB)" filter="url(#shadow)"/>
    <text x="209" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">Class B</text>
    <text x="209" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">N.N.H.H</text>
    <text x="209" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">16 Net / 16 Host</text>
    <text x="209" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">255.255.0.0</text>
  </g>
  
  <!-- Class C Box -->
  <g class="class-box class-c" data-narration="Class C networks use 24 bits for network ID and only 8 bits for host ID, supporting 254 hosts per network">
    <rect x="284" y="75" width="115" height="95" rx="8" fill="url(#boxGradientC)" filter="url(#shadow)"/>
    <text x="341" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2980b9">Class C</text>
    <text x="341" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">N.N.N.H</text>
    <text x="341" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">24 Net / 8 Host</text>
    <text x="341" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">255.255.255.0</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="pulse" data-narration="The network portion identifies the specific network, while the host portion identifies individual devices within that network">
    <rect x="20" y="185" width="380" height="50" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
    <text x="210" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d68910">Key Concept: Network vs Host Bits</text>
    <text x="210" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e">Network bits identify the subnet • Host bits identify devices</text>
  </g>
  
  <!-- Subnetting Section -->
  <g data-narration="Subnetting divides a large network into smaller subnets for better management and security">
    <rect x="20" y="250" width="180" height="65" rx="8" fill="#e8daef" stroke="#8e44ad" stroke-width="2"/>
    <text x="110" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8e44ad">Subnetting</text>
    <text x="110" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">Divides IP networks into</text>
    <text x="110" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">smaller, manageable subnets</text>
  </g>
  
  <!-- Routing Section -->
  <g data-narration="Routing algorithms determine the optimal path for data packets across networks">
    <rect x="220" y="250" width="180" height="65" rx="8" fill="#d5f5e3" stroke="#1e8449" stroke-width="2"/>
    <text x="310" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e8449">Routing Algorithms</text>
    <text x="310" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">Find optimal paths for</text>
    <text x="310" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">packet delivery across networks</text>
  </g>
  
  <!-- Arrow connecting Subnetting and Routing -->
  <g class="arrow">
    <path d="M 110 315 Q 110 340 210 340 Q 310 340 310 315" stroke="#7f8c8d" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom Info Box -->
  <g data-narration="Understanding IP addressing fundamentals is essential for network configuration and troubleshooting">
    <rect x="20" y="330" width="380" height="55" rx="8" fill="#ebf5fb" stroke="#3498db" stroke-width="2"/>
    <text x="210" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">IP Address Structure: 32-bit logical address (dotted-decimal)</text>
    <text x="210" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">Example: 192.168.1.1 • Network ID + Host ID</text>
    <text x="210" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Subnet mask applies AND operation to determine network address</text>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="30" cy="30" r="8" fill="#ffb3ba" opacity="0.5"/>
  <circle cx="390" cy="370" r="10" fill="#bae1ff" opacity="0.5"/>
  <circle cx="400" cy="30" r="6" fill="#baffc9" opacity="0.5"/>
  <circle cx="25" cy="380" r="7" fill="#bae1ff" opacity="0.5"/>
</svg>