<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="error-detection-correction" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#d4e8f7"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlightError {
      0%, 100% { fill: #ff6b6b; }
      50% { fill: #ee4444; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c5282; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c5282; }
    .bit { font-family: monospace; font-size: 12px; fill: #1a365d; }
    .error-bit { font-family: monospace; font-size: 12px; font-weight: bold; }
    .parity { font-family: monospace; font-size: 12px; fill: #744210; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Error Detection &amp; Correction</text>
  
  <!-- Types of Errors Box -->
  <g class="slide-in" style="animation-delay: 0.2s;" data-narration="Types of errors: Single-bit errors affect one bit, while burst errors affect multiple consecutive bits">
    <rect x="10" y="45" width="120" height="75" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="20" y="62" class="section-title">Types of Errors</text>
    <text x="20" y="80" class="detail">• Single-Bit: 1 bit flipped</text>
    <text x="20" y="95" class="detail">• Burst: Multiple bits</text>
    <text x="20" y="110" class="detail">changed in sequence</text>
  </g>
  
  <!-- Error Detection Methods Box -->
  <g class="slide-in" style="animation-delay: 0.4s;" data-narration="Parity checking adds a bit to make the count of 1s even or odd">
    <rect x="140" y="45" width="130" height="75" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="150" y="62" class="section-title">Detection Methods</text>
    <text x="150" y="80" class="detail">• VRC: Vertical Redundancy</text>
    <text x="150" y="95" class="detail">• LRC: Longitudinal Redundancy</text>
    <text x="150" y="110" class="detail">• 2D Parity: Combined</text>
  </g>
  
  <!-- Two-Dimensional Parity Check Matrix -->
  <g class="fade-in" style="animation-delay: 0.6s;" data-narration="Two-dimensional parity check matrix organizes data in rows and columns with parity bits for both dimensions">
    <text x="285" y="135" text-anchor="middle" class="section-title">2D Parity Check</text>
    
    <!-- Matrix grid -->
    <rect x="220" y="145" width="180" height="130" rx="5" fill="#ffffff" stroke="#4299e1" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Data bits - Row 1 -->
    <text x="232" y="168" class="bit" text-anchor="middle">1</text>
    <text x="252" y="168" class="bit" text-anchor="middle">0</text>
    <text x="272" y="168" class="bit" text-anchor="middle">1</text>
    <text x="292" y="168" class="bit" text-anchor="middle">1</text>
    <text x="312" y="168" class="bit" text-anchor="middle">0</text>
    <text x="332" y="168" class="bit" text-anchor="middle">1</text>
    <!-- Row 1 parity -->
    <text x="360" y="168" class="parity" text-anchor="middle">0</text>
    
    <!-- Data bits - Row 2 -->
    <text x="232" y="193" class="bit" text-anchor="middle">0</text>
    <text x="252" y="193" class="bit" text-anchor="middle">1</text>
    <text x="272" y="193" class="bit" text-anchor="middle">0</text>
    <text x="292" y="193" class="bit" text-anchor="middle">0</text>
    <text x="312" y="193" class="bit" text-anchor="middle">1</text>
    <text x="332" y="193" class="bit" text-anchor="middle">1</text>
    <!-- Row 2 parity -->
    <text x="360" y="193" class="parity" text-anchor="middle">1</text>
    
    <!-- Data bits - Row 3 with ERROR -->
    <text x="232" y="218" class="bit" text-anchor="middle">1</text>
    <text x="252" y="218" class="bit" text-anchor="middle">1</text>
    <text x="272" y="218" class="bit" text-anchor="middle">0</text>
    <text x="292" y="218" class="bit error-bit pulse" style="animation-delay: 1s;">1</text>
    <text x="312" y="218" class="bit" text-anchor="middle">0</text>
    <text x="332" y="218" class="bit" text-anchor="middle">1</text>
    <!-- Row 3 parity -->
    <text x="360" y="218" class="parity" text-anchor="middle">0</text>
    
    <!-- Data bits - Row 4 -->
    <text x="232" y="243" class="bit" text-anchor="middle">0</text>
    <text x="252" y="243" class="bit" text-anchor="middle">0</text>
    <text x="272" y="243" class="bit" text-anchor="middle">1</text>
    <text x="292" y="243" class="bit" text-anchor="middle">1</text>
    <text x="312" y="243" class="bit" text-anchor="middle">0</text>
    <text x="332" y="243" class="bit" text-anchor="middle">0</text>
    <!-- Row 4 parity -->
    <text x="360" y="243" class="parity" text-anchor="middle">0</text>
    
    <!-- Column parity bits -->
    <text x="232" y="268" class="parity" text-anchor="middle">0</text>
    <text x="252" y="268" class="parity" text-anchor="middle">0</text>
    <text x="272" y="268" class="parity" text-anchor="middle">0</text>
    <text x="292" y="268" class="parity" text-anchor="middle">1</text>
    <text x="312" y="268" class="parity" text-anchor="middle">1</text>
    <text x="332" y="268" class="parity" text-anchor="middle">1</text>
    <text x="360" y="268" class="parity" text-anchor="middle">1</text>
    
    <!-- Labels -->
    <text x="225" y="160" class="detail" fill="#718096" font-size="10">D</text>
    <text x="225" y="185" class="detail" fill="#718096" font-size="10">D</text>
    <text x="225" y="210" class="detail" fill="#718096" font-size="10">D</text>
    <text x="225" y="235" class="detail" fill="#718096" font-size="10">D</text>
    <text x="225" y="275" class="detail" fill="#718096" font-size="10">L</text>
    
    <text x="370" y="160" class="detail" fill="#718096" font-size="10">V</text>
    <text x="370" y="185" class="detail" fill="#718096" font-size="10">V</text>
    <text x="370" y="210" class="detail" fill="#718096" font-size="10">V</text>
    <text x="370" y="235" class="detail" fill="#718096" font-size="10">V</text>
    <text x="370" y="275" class="detail" fill="#718096" font-size="10">V</text>
    
    <!-- Error location indicator -->
    <text x="295" y="295" text-anchor="middle" class="detail" fill="#c53030">Error at row 3, col 4</text>
    <path d="M295 285 L295 250" stroke="#c53030" stroke-width="1" marker-end="url(#arrowhead)" fill="none"/>
  </g>
  
  <!-- Arrow showing relationship -->
  <g class="fade-in" style="animation-delay: 0.8s;" data-narration="Error detection identifies errors while correction locates and fixes them">
    <line x1="70" y1="130" x2="70" y2="160" stroke="#4299e1" stroke-width="2"/>
    <polygon points="70,165 65,155 75,155" fill="#4299e1"/>
  </g>
  
  <!-- Correction Box -->
  <g class="slide-in" style="animation-delay: 1s;" data-narration="Error correction not only detects but also corrects the identified errors">
    <rect x="10" y="165" width="120" height="60" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="20" y="182" class="section-title">Correction</text>
    <text x="20" y="200" class="detail">Detect + Locate + Fix</text>
    <text x="20" y="215" class="detail">Ensures data integrity</text>
  </g>
  
  <!-- How it works -->
  <g class="fade-in" style="animation-delay: 1.2s;" data-narration="The intersection of row and column parity errors pinpoints the exact bit position">
    <rect x="10" y="235" width="190" height="45" rx="8" fill="#fff5f5" stroke="#fc8181" stroke-width="1"/>
    <text x="20" y="252" class="detail" fill="#c53030">How 2D Parity Works:</text>
    <text x="20" y="268" class="detail" fill="#742a2a">Check both row &amp; column to</text>
    <text x="20" y="280" class="detail" fill="#742a2a">locate exact error position</text>
  </g>
  
  <!-- Key concept highlight -->
  <g class="slide-in" style="animation-delay: 1.4s;" data-narration="Data Link Layer uses these techniques for reliable network communication">
    <rect x="210" y="305" width="190" height="40" rx="8" fill="#f0fff4" stroke="#68d391" stroke-width="1"/>
    <text x="220" y="325" class="detail" fill="#276749">Layer 2 (Data Link) handles</text>
    <text x="220" y="340" class="detail" fill="#276749">error detection &amp; correction</text>
  </g>
  
  <!-- Bottom reference -->
  <text x="210" y="380" text-anchor="middle" class="detail" fill="#718096">DU CS - Computer Networks</text>
</svg>