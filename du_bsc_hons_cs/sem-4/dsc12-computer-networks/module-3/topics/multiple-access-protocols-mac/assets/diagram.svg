<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="multiple-access-protocols-mac">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#f0f8e8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8bb8d8"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8"/>
      <stop offset="100%" style="stop-color:#98d888"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d8b8"/>
      <stop offset="100%" style="stop-color:#d8b888"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes waveSignal {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes collision {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-3px, -3px); }
      75% { transform: translate(3px, 3px); }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .wave { animation: waveSignal 1s linear infinite; }
    .blink { animation: blink 0.5s ease-in-out infinite; }
    .collision-anim { animation: collision 0.3s ease-in-out infinite; }
    
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c5282; }
    .label-text { font-family: Arial, sans-serif; font-size: 13px; fill: #2d3748; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .section-box { rx: 8; ry: 8; filter: url(#shadow); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text fade-in">Multiple Access Protocols (MAC)</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#4a90c2" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Protocol Classification Boxes -->
  <g class="fade-in" style="animation-delay: 0.5s">
    <!-- Random Access -->
    <rect x="20" y="55" width="115" height="55" fill="url(#boxGradient1)" class="section-box" data-narration="Random Access Protocols - Contention-based protocols where devices compete for channel access"/>
    <text x="77" y="72" text-anchor="middle" class="label-text" style="font-weight:bold">Random Access</text>
    <text x="77" y="87" text-anchor="middle" class="detail-text">(Contention-based)</text>
    
    <!-- Controlled Access -->
    <rect x="152" y="55" width="115" height="55" fill="url(#boxGradient2)" class="section-box" data-narration="Controlled Access Protocols - Reservation-based protocols where devices take turns transmitting"/>
    <text x="209" y="72" text-anchor="middle" class="label-text" style="font-weight:bold">Controlled Access</text>
    <text x="209" y="87" text-anchor="middle" class="detail-text">(Reservation-based)</text>
    
    <!-- Channelization -->
    <rect x="284" y="55" width="115" height="55" fill="url(#boxGradient3)" class="section-box" data-narration="Channelization Protocols - Divide channel into separate frequency/time slots for multiple devices"/>
    <text x="341" y="72" text-anchor="middle" class="label-text" style="font-weight:bold">Channelization</text>
    <text x="341" y="87" text-anchor="middle" class="detail-text">(FDMA/TDMA/CDMA)</text>
  </g>
  
  <!-- CSMA/CD Flow Diagram -->
  <g class="slide-in" style="animation-delay: 0.8s">
    <!-- Flow title -->
    <text x="210" y="130" text-anchor="middle" class="label-text" style="font-weight:bold; font-size:14px" data-narration="CSMA/CD Flow - Carrier Sense Multiple Access with Collision Detection process">CSMA/CD Process Flow</text>
    
    <!-- Device boxes representing nodes -->
    <rect x="40" y="145" width="60" height="40" fill="#e8b8b8" rx="4" class="section-box"/>
    <text x="70" y="162" text-anchor="middle" class="detail-text" style="font-weight:bold">Node A</text>
    <circle cx="70" cy="175" r="4" fill="#c53030" class="pulse"/>
    
    <rect x="320" y="145" width="60" height="40" fill="#e8b8b8" rx="4" class="section-box"/>
    <text x="350" y="162" text-anchor="middle" class="detail-text" style="font-weight:bold">Node B</text>
    <circle cx="350" cy="175" r="4" fill="#c53030" class="pulse" style="animation-delay:0.5s"/>
    
    <!-- Communication channel (bus) -->
    <line x1="70" y1="200" x2="350" y2="200" stroke="#718096" stroke-width="6" stroke-linecap="round"/>
    <line x1="70" y1="200" x2="350" y2="200" stroke="#a0aec0" stroke-width="2" stroke-dasharray="5,5" class="wave"/>
    <text x="210" y="205" text-anchor="middle" class="detail-text" fill="#4a5568">Shared Channel</text>
    
    <!-- Step 1: Carrier Sense -->
    <g class="fade-in" style="animation-delay: 1.2s">
      <ellipse cx="70" cy="200" rx="25" ry="12" fill="none" stroke="#48bb78" stroke-width="2" stroke-dasharray="4,2"/>
      <text x="45" y="230" class="detail-text" fill="#276749">1. Listen</text>
      <!-- Listening waves -->
      <path d="M 90 185 Q 100 175 110 185" fill="none" stroke="#48bb78" stroke-width="1.5" opacity="0.7" class="pulse"/>
    </g>
    
    <!-- Arrow to step 2 -->
    <path d="M 130 195 L 170 195" fill="none" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowhead)" class="slide-in" style="animation-delay: 1.5s"/>
    
    <!-- Step 2: Collision Detection -->
    <g class="fade-in" style="animation-delay: 1.6s">
      <rect x="180" y="180" width="60" height="30" fill="#fed7d7" rx="4"/>
      <text x="210" y="200" text-anchor="middle" class="detail-text" fill="#c53030" style="font-weight:bold">Collision!</text>
      <!-- Collision explosion -->
      <g class="collision-anim">
        <line x1="210" y1="175" x2="210" y2="165" stroke="#e53e3e" stroke-width="2"/>
        <line x1="200" y1="185" x2="190" y2="175" stroke="#e53e3e" stroke-width="2"/>
        <line x1="220" y1="185" x2="230" y2="175" stroke="#e53e3e" stroke-width2"/>
        <circle cx="210" cy="180" r="8" fill="none" stroke="#e53e3e" stroke-width="2"/>
      </g>
    </g>
    
    <!-- Arrow to step 3 -->
    <path d="M 250 195 L 280 195" fill="none" stroke="#4a5568" stroke-width="1.5" class="slide-in" style="animation-delay: 1.9s"/>
    
    <!-- Step 3: Jam Signal -->
    <g class="fade-in" style="animation-delay: 2.0s">
      <rect x="290" y="180" width="50" height="30" fill="#feebc8" rx="4" class="pulse"/>
      <text x="315" y="200" text-anchor="middle" class="detail-text" fill="#c05621" style="font-weight:bold">Jam</text>
      <!-- Jam signal wave -->
      <path d="M 295 195 L 305 195 L 310 185 L 315 205 L 320 195 L 330 195" fill="none" stroke="#dd6b20" stroke-width="1.5" class="blink"/>
    </g>
    
    <!-- Arrow down to step 4 -->
    <path d="M 315 215 L 315 245" fill="none" stroke="#4a5568" stroke-width="1.5" class="slide-in" style="animation-delay: 2.3s"/>
    
    <!-- Step 4: Backoff Timer -->
    <g class="fade-in" style="animation-delay: 2.4s">
      <rect x="270" y="250" width="90" height="35" fill="#e9d8fd" rx="4" class="section-box"/>
      <text x="315" y="268" text-anchor="middle" class="detail-text" fill="#6b46c1" style="font-weight:bold">Backoff Timer</text>
      <text x="315" y="280" text-anchor="middle" class="detail-text" fill="#553c9a">Wait &amp; Retry</text>
      <!-- Timer visualization -->
      <circle cx="295" cy="267" r="8" fill="none" stroke="#805ad5" stroke-width="2"/>
      <line x1="295" y1="267" x2="295" y2="260" stroke="#805ad5" stroke-width="1.5" class="pulse" style="transform-origin:295px 267px"/>
    </g>
    
    <!-- Success indicator -->
    <g class="fade-in" style="animation-delay: 2.8s">
      <circle cx="210" cy="330" r="25" fill="#c6f6d5" class="pulse"/>
      <path d="M 198 330 L 205 337 L 222 320" fill="none" stroke="#276749" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="210" y="365" text-anchor="middle" class="detail-text" fill="#22543d" data-narration="Successful transmission after backoff">Successful Transmission</text>
    </g>
  </g>
  
  <!-- Connection arrows showing flow -->
  <g class="fade-in" style="animation-delay: 1.0s">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#4a5568"/>
      </marker>
    </defs>
  </g>
  
  <!-- Legend/Key -->
  <g class="fade-in" style="animation-delay: 3.0s">
    <rect x="20" y="355" width="180" height="35" fill="white" rx="4" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="35" cy="367" r="5" fill="#48bb78"/>
    <text x="50" y="371" class="detail-text">Carrier Sense</text>
    <circle cx="115" cy="367" r="5" fill="#e53e3e"/>
    <text x="130" y="371" class="detail-text">Collision</text>
    <circle cx="35" cy="382" r="5" fill="#805ad5"/>
    <text x="50" y="386" class="detail-text">Backoff</text>
    <circle cx="115" cy="382" r="5" fill="#48bb78"/>
    <text x="130" y="386" class="detail-text">Success</text>
  </g>
  
  <!-- Ethernet/Wi-Fi labels -->
  <g class="fade-in" style="animation-delay: 3.2s">
    <text x="380" y="385" text-anchor="end" class="detail-text" fill="#718096">Ethernet: CSMA/CD</text>
    <text x="380" y="395" text-anchor="end" class="detail-text" fill="#718096">Wi-Fi: CSMA/CA</text>
  </g>
</svg>