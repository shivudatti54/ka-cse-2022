<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="error-recovery-protocols">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="senderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8" />
      <stop offset="100%" style="stop-color:#8fb8d4" />
    </linearGradient>
    <linearGradient id="receiverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8" />
      <stop offset="100%" style="stop-color:#98c878" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd9b3" />
      <stop offset="100%" style="stop-color:#ffb366" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(80px); }
    }
    .title { animation: slideDown 0.8s ease-out forwards; font-family: Arial, sans-serif; }
    .sender-box { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .receiver-box { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .frame { animation: slideIn 0.5s ease-out forwards; opacity: 0; }
    .frame-0 { animation-delay: 0.5s; }
    .frame-1 { animation-delay: 0.7s; }
    .frame-2 { animation-delay: 0.9s; }
    .frame-3 { animation-delay: 1.1s; }
    .frame-4 { animation-delay: 1.3s; }
    .ack { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    .ack-1 { animation-delay: 1.5s; }
    .ack-2 { animation-delay: 1.7s; }
    .ack-3 { animation-delay: 1.9s; }
    .error-frame { animation: pulse 1s ease-in-out infinite; }
    .concept-box { animation: fadeIn 0.7s ease-out forwards; opacity: 0; }
    .concept-1 { animation-delay: 0.3s; }
    .concept-2 { animation-delay: 0.5s; }
    .concept-3 { animation-delay: 0.7s; }
    .window-slot { transition: all 0.3s ease; }
    .window-slot:hover { transform: scale(1.1); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282">
    Go-Back-N ARQ Protocol
  </text>
  <text x="210" y="45" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="12" fill="#4a5568">
    Sender Window &amp; Sliding ACK Mechanism
  </text>
  
  <!-- Key Concepts -->
  <g class="concept-box concept-1" data-narration="Go-Back-N uses a sender window of size N to send multiple frames before receiving ACKs">
    <rect x="10" y="55" width="130" height="28" fill="#e2e8f0" rx="4" filter="url(#shadow)"/>
    <text x="75" y="73" text-anchor="middle" font-family="Arial" font-size="11" fill="#2d3748">Window Size: N=4</text>
  </g>
  
  <g class="concept-box concept-2" data-narration="Cumulative ACKs acknowledge all frames up to a sequence number">
    <rect x="145" y="55" width="130" height="28" fill="#e2e8f0" rx="4" filter="url(#shadow)"/>
    <text x="210" y="73" text-anchor="middle" font-family="Arial" font-size="11" fill="#2d3748">Cumulative ACK</text>
  </g>
  
  <g class="concept-box concept-3" data-narration="On timeout or error, sender retransmits all unacknowledged frames from the error point">
    <rect x="280" y="55" width="130" height="28" fill="#e2e8f0" rx="4" filter="url(#shadow)"/>
    <text x="345" y="73" text-anchor="middle" font-family="Arial" font-size="11" fill="#2d3748">Go-Back-N Retry</text>
  </g>
  
  <!-- Sender Side -->
  <g class="sender-box" data-narration="Sender maintains a window of frames 0-3 in flight">
    <rect x="20" y="95" width="180" height="120" fill="url(#senderGrad)" rx="8" filter="url(#shadow)"/>
    <text x="110" y="112" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a365d">SENDER</text>
    <text x="110" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c5282">Window: Frames 0-3</text>
    
    <!-- Window Slots -->
    <g transform="translate(30, 140)">
      <rect class="window-slot" x="0" y="0" width="35" height="25" fill="#fff" stroke="#2b6cb0" stroke-width="2" rx="3"/>
      <text x="17" y="17" text-anchor="middle" font-family="Arial" font-size="11" fill="#2b6cb0">0</text>
      <rect class="window-slot" x="38" y="0" width="35" height="25" fill="#fed7aa" stroke="#c05621" stroke-width="2" rx="3"/>
      <text x="55" y="17" text-anchor="middle" font-family="Arial" font-size="11" fill="#c05621">1</text>
      <rect class="window-slot" x="76" y="0" width="35" height="25" fill="#fed7aa" stroke="#c05621" stroke-width="2" rx="3"/>
      <text x="93" y="17" text-anchor="middle" font-family="Arial" font-size="11" fill="#c05621">2</text>
      <rect class="window-slot" x="114" y="0" width="35" height="25" fill="#fed7aa" stroke="#c05621" stroke-width="2" rx="3"/>
      <text x="131" y="17" text-anchor="middle" font-family="Arial" font-size="11" fill="#c05621">3</text>
    </g>
  </g>
  
  <!-- Receiver Side -->
  <g class="receiver-box" data-narration="Receiver sends ACK for correctly received frames in order">
    <rect x="220" y="95" width="180" height="120" fill="url(#receiverGrad)" rx="8" filter="url(#shadow)"/>
    <text x="310" y="112" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#22543d">RECEIVER</text>
    <text x="310" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#276749">Expecting: Frame 2</text>
    
    <!-- Receiver Slots -->
    <g transform="translate(230, 140)">
      <rect x="0" y="0" width="35" height="25" fill="#c6f6d5" stroke="#276749" stroke-width="2" rx="3"/>
      <text x="17" y="17" text-anchor="middle" font-family="Arial" font-size="11" fill="#276749">✓</text>
      <rect x="38" y="0" width="35" height="25" fill="#c6f6d5" stroke="#276749" stroke-width="2" rx="3"/>
      <text x="55" y="17" text-anchor="middle" font-family="Arial" font-size="11" fill="#276749">✓</text>
      <rect x="76" y="0" width="35" height="25" fill="#feb2b2" stroke="#c53030" stroke-width="2" rx="3"/>
      <text x="93" y="17" text-anchor="middle" font-family="Arial" font-size="11" fill="#c53030">?</text>
      <rect x="114" y="0" width="35" height="25" fill="#fff" stroke="#276749" stroke-width="2" rx="3"/>
      <text x="131" y="17" text-anchor="middle" font-family="Arial" font-size="11" fill="#276749">-</text>
    </g>
  </g>
  
  <!-- Frame Timeline -->
  <g data-narration="Frames 0 and 1 sent successfully, frame 2 lost/corrupted">
    <!-- Frame 0 arrow -->
    <g class="frame frame-0">
      <path d="M 80 230 L 180 230" stroke="#ff9f43" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
      <rect x="95" y="215" width="30" height="18" fill="url(#frameGrad)" rx="3"/>
      <text x="110" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#7c2d12">F0</text>
    </g>
    
    <!-- Frame 1 arrow -->
    <g class="frame frame-1">
      <path d="M 80 255 L 180 255" stroke="#ff9f43" stroke-width="3" fill="none"/>
      <rect x="95" y="240" width="30" height="18" fill="url(#frameGrad)" rx="3"/>
      <text x="110" y="253" text-anchor="middle" font-family="Arial" font-size="10" fill="#7c2d12">F1</text>
    </g>
    
    <!-- Frame 2 (error) arrow -->
    <g class="frame frame-2 error-frame">
      <path d="M 80 280 L 180 280" stroke="#e53e3e" stroke-width="3" fill="none" stroke-dasharray="5,3"/>
      <rect x="95" y="265" width="30" height="18" fill="#feb2b2" rx="3" stroke="#c53030" stroke-width="2"/>
      <text x="110" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#c53030" font-weight="bold">F2</text>
      <text x="130" y="260" font-family="Arial" font-size="9" fill="#c53030">ERROR</text>
    </g>
    
    <!-- Frame 3 arrow (will be discarded) -->
    <g class="frame frame-3">
      <path d="M 80 305 L 180 305" stroke="#e53e3e" stroke-width="3" fill="none" stroke-dasharray="5,3"/>
      <rect x="95" y="290" width="30" height="18" fill="#fed7d7" rx="3"/>
      <text x="110" y="303" text-anchor="middle" font-family="Arial" font-size="10" fill="#c53030">F3</text>
    </g>
  </g>
  
  <!-- ACK Timeline -->
  <g data-narration="Receiver sends ACKs, but frame 2 error causes sender timeout">
    <!-- ACK 1 arrow -->
    <g class="ack ack-1">
      <path d="M 320 240 L 220 240" stroke="#48bb78" stroke-width="3" fill="none"/>
      <rect x="250" y="225" width="32" height="18" fill="#c6f6d5" rx="3"/>
      <text x="266" y="238" text-anchor="middle" font-family="Arial" font-size="10" fill="#22543d">ACK1</text>
    </g>
    
    <!-- ACK 2 arrow -->
    <g class="ack ack-2">
      <path d="M 320 265 L 220 265" stroke="#48bb78" stroke-width="3" fill="none"/>
      <rect x="250" y="250" width="32" height="18" fill="#c6f6d5" rx="3"/>
      <text x="266" y="263" text-anchor="middle" font-family="Arial" font-size="10" fill="#22543d">ACK2</text>
    </g>
    
    <!-- No ACK for frame 2 - Timeout -->
    <g class="ack ack-3">
      <rect x="100" y="330" width="100" height="22" fill="#fed7d7" rx="4" stroke="#c53030" stroke-width="1"/>
      <text x="150" y="346" text-anchor="middle" font-family="Arial" font-size="10" fill="#c53030" font-weight="bold">TIMEOUT @ F2</text>
      <path d="M 150 355 L 150 370" stroke="#c53030" stroke-width="2" stroke-dasharray="3,2"/>
    </g>
  </g>
  
  <!-- Retransmission indicator -->
  <g data-narration="After timeout, sender retransmits all frames from frame 2">
    <g class="frame frame-4">
      <rect x="20" y="375" width="170" height="20" fill="#fff5f5" rx="3" stroke="#fc8181" stroke-width="1"/>
      <text x="105" y="389" text-anchor="middle" font-family="Arial" font-size="10" fill="#c53030">Retransmit: F2, F3, F4...</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(310, 340)">
    <rect x="0" y="0" width="80" height="50" fill="#fff" rx="4" stroke="#cbd5e0" stroke-width="1"/>
    <circle cx="12" cy="12" r="5" fill="#ff9f43"/>
    <text x="22" y="15" font-family="Arial" font-size="9" fill="#4a5568">Frame</text>
    <circle cx="12" cy="28" r="5" fill="#48bb78"/>
    <text x="22" y="31" font-family="Arial" font-size="9" fill="#4a5568">ACK</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9f43"/>
    </marker>
  </defs>
</svg>