<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="ethernet">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2e0f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#9ac5db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#a8d4e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7eb8da;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .frame-section { animation: slideInLeft 0.6s ease-out forwards; }
    .info-box { animation: slideInRight 0.7s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { animation: moveRight 1.5s ease-in-out infinite; }
    .byte-label { font-size: 10px; fill: #2c5282; }
    .field-label { font-size: 11px; fill: #fff; font-weight: bold; }
    .title-text { font-size: 22px; fill: #1a365d; font-weight: bold; }
    .subtitle-text { font-size: 12px; fill: #4a5568; }
    .box-title { font-size: 11px; fill: #2d3748; font-weight: bold; }
    .box-text { font-size: 10px; fill: #4a5568; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title Section -->
  <g class="title">
    <text x="210" y="35" text-anchor="middle" class="title-text">Ethernet Frame Structure</text>
    <text x="210" y="52" text-anchor="middle" class="subtitle-text">IEEE 802.3 - Data Link Layer</text>
    <line x1="60" y1="60" x2="360" y2="60" stroke="#7eb8da" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Main Ethernet Frame Bar -->
  <g class="frame-section" transform="translate(30, 100)">
    <!-- Frame container -->
    <rect x="0" y="0" width="360" height="90" fill="url(#frameGradient)" rx="5" ry="5" filter="url(#shadow)" class="pulse-anim"/>
    
    <!-- Preamble -->
    <rect x="4" y="4" width="50" height="82" fill="#e53e3e" rx="3"/>
    <text x="29" y="30" text-anchor="middle" class="field-label">PREAMBLE</text>
    <text x="29" y="50" text-anchor="middle" class="field-label" font-size="10">7 Bytes</text>
    <text x="29" y="70" text-anchor="middle" class="byte-label">Sync</text>
    
    <!-- SFD -->
    <rect x="58" y="4" width="20" height="82" fill="#dd6b20" rx="3"/>
    <text x="68" y="35" text-anchor="middle" class="field-label" font-size="9">SFD</text>
    <text x="68" y="52" text-anchor="middle" class="field-label" font-size="9">1 Byte</text>
    <text x="68" y="70" text-anchor="middle" class="byte-label">10101011</text>
    
    <!-- Destination MAC -->
    <rect x="82" y="4" width="60" height="82" fill="#d69e2e" rx="3"/>
    <text x="112" y="30" text-anchor="middle" class="field-label">DEST MAC</text>
    <text x="112" y="48" text-anchor="middle" class="field-label" font-size="10">6 Bytes</text>
    <text x="112" y="70" text-anchor="middle" class="byte-label">Address</text>
    
    <!-- Source MAC -->
    <rect x="146" y="4" width="60" height="82" fill="#38a169" rx="3"/>
    <text x="176" y="30" text-anchor="middle" class="field-label">SRC MAC</text>
    <text x="176" y="48" text-anchor="middle" class="field-label" font-size="10">6 Bytes</text>
    <text x="176" y="70" text-anchor="middle" class="byte-label">Address</text>
    
    <!-- Type/Length -->
    <rect x="210" y="4" width="40" height="82" fill="#3182ce" rx="3"/>
    <text x="230" y="30" text-anchor="middle" class="field-label">TYPE</text>
    <text x="230" y="48" text-anchor="middle" class="field-label" font-size="10">2 Bytes</text>
    <text x="230" y="70" text-anchor="middle" class="byte-label">0x0800</text>
    
    <!-- Data/Padding -->
    <rect x="254" y="4" width="80" height="82" fill="#805ad5" rx="3"/>
    <text x="294" y="25" text-anchor="middle" class="field-label">DATA</text>
    <text x="294" y="42" text-anchor="middle" class="field-label" font-size="10">46-1500B</text>
    <text x="294" y="60" text-anchor="middle" class="byte-label">Payload</text>
    <text x="294" y="75" text-anchor="middle" class="byte-label">+ Padding</text>
    
    <!-- FCS -->
    <rect x="338" y="4" width="18" height="82" fill="#e53e3e" rx="3"/>
    <text x="347" y="35" text-anchor="middle" class="field-label" font-size="8">FCS</text>
    <text x="347" y="52" text-anchor="middle" class="field-label" font-size="8">4B</text>
    <text x="347" y="70" text-anchor="middle" class="byte-label">CRC</text>
  </g>
  
  <!-- Info Boxes -->
  <g class="info-box" data-narration="Preamble and SFD provide synchronization between sender and receiver">
    <rect x="30" y="210" width="110" height="55" fill="#fff" rx="5" filter="url(#shadow)"/>
    <rect x="30" y="210" width="110" height="14" fill="#e53e3e" rx="5"/>
    <text x="85" y="222" text-anchor="middle" class="box-title" fill="#fff">Sync (8 Bytes)</text>
    <text x="40" y="245" class="box-text">Preamble (7B): Pattern 10101010 for clock sync</text>
    <text x="40" y="258" class="box-text">SFD (1B): 10101011 marks frame start</text>
  </g>
  
  <g class="info-box" data-narration="MAC addresses identify source and destination devices uniquely">
    <rect x="155" y="210" width="115" height="55" fill="#fff" rx="5" filter="url(#shadow)"/>
    <rect x="155" y="210" width="115" height="14" fill="#d69e2e" rx="5"/>
    <text x="212" y="222" text-anchor="middle" class="box-title" fill="#fff">MAC Addresses</text>
    <text x="165" y="245" class="box-text">Dest MAC: Receiver's</text>
    <text x="165" y="258" class="box-text">unique 48-bit address</text>
  </g>
  
  <g class="info-box" data-narration="Type field indicates the protocol, Data contains the actual payload">
    <rect x="280" y="210" width="110" height="55" fill="#fff" rx="5" filter="url(#shadow)"/>
    <rect x="280" y="210" width="110" height="14" fill="#805ad5" rx="5"/>
    <text x="335" y="222" text-anchor="middle" class="box-title" fill="#fff">Data + FCS</text>
    <text x="290" y="245" class="box-text">Data: 46-1500 bytes</text>
    <text x="290" y="258" class="box-text">FCS: 4B CRC error check</text>
  </g>
  
  <!-- Ethernet Stats Box -->
  <g class="info-box" data-narration="Ethernet dominates LAN market with 90% of networked connections">
    <rect x="30" y="280" width="170" height="50" fill="#fff" rx="5" filter="url(#shadow)"/>
    <rect x="30" y="280" width="170" height="14" fill="#3182ce" rx="5"/>
    <text x="115" y="292" text-anchor="middle" class="box-title" fill="#fff">Ethernet Key Facts</text>
    <text x="40" y="312" class="box-text">• Standard: IEEE 802.3</text>
    <text x="40" y="326" class="box-text">• Market Share: ~90% of LANs</text>
  </g>
  
  <!-- Speed Evolution Box -->
  <g class="info-box" data-narration="Ethernet has evolved from 10 Mbps to 800 Gbps over decades">
    <rect x="215" y="280" width="175" height="50" fill="#fff" rx="5" filter="url(#shadow)"/>
    <rect x="215" y="280" width="175" height="14" fill="#38a169" rx="5"/>
    <text x="302" y="292" text-anchor="middle" class="box-title" fill="#fff">Speed Evolution</text>
    <text x="225" y="312" class="box-text">10 Mbps → 100 Mbps → 1 Gbps</text>
    <text x="225" y="326" class="box-text">→ 10G → 40G → 100G → 400G/800G</text>
  </g>
  
  <!-- Arrow showing data flow -->
  <g class="arrow-line">
    <path d="M 100,340 L 100,355 L 110,350 L 100,340" fill="#4a5568"/>
    <path d="M 100,340 L 120,340" stroke="#4a5568" stroke-width="2"/>
    <text x="85" y="350" class="byte-label" fill="#4a5568">Min: 64B</text>
    <text x="135" y="350" class="byte-label" fill="#4a5568">Max: 1518B</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(30, 365)">
    <circle cx="10" cy="8" r="5" fill="#e53e3e"/>
    <text x="22" y="12" class="byte-label">Control</text>
    <circle cx="70" cy="8" r="5" fill="#d69e2e"/>
    <text x="82" y="12" class="byte-label">MAC Addr</text>
    <circle cx="140" cy="8" r="5" fill="#3182ce"/>
    <text x="152" y="12" class="byte-label">Type</text>
    <circle cx="190" cy="8" r="5" fill="#805ad5"/>
    <text x="202" y="12" class="byte-label">Data</text>
    <circle cx="250" cy="8" r="5" fill="#e53e3e"/>
    <text x="262" y="12" class="byte-label">FCS</text>
  </g>
</svg>