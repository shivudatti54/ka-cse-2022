<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="types-topologies-network-classifications">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="panGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe4e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb6c1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="canGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0ffe0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90ee90;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="manGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dda0dd;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes growUp {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-box { filter: url(#shadow); }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-grow { animation: growUp 0.5s ease-out forwards; transform-origin: bottom; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1.0s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Network Types by Scale</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#3498db" stroke-width="2" class="anim-fade delay-1"/>
  
  <!-- Network Types as horizontal bars with progression -->
  
  <!-- PAN -->
  <g class="anim-slide delay-1">
    <rect x="30" y="55" width="360" height="50" rx="8" fill="url(#panGrad)" class="section-box" data-narration="Personal Area Network (PAN) - Smallest network type, typically within 10 meters, connecting personal devices like smartphones, tablets, and Bluetooth devices"/>
    <text x="50" y="78" class="label">PAN</text>
    <text x="50" y="94" class="detail">Personal Area Network</text>
    <text x="200" y="86" class="detail" fill="#c71585" font-weight="bold">&lt; 10 meters</text>
  </g>
  
  <!-- Arrow -->
  <g class="anim-fade delay-2">
    <path d="M210 105 L210 115" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- CAN -->
  <g class="anim-slide delay-2">
    <rect x="30" y="120" width="360" height="50" rx="8" fill="url(#canGrad)" class="section-box" data-narration="Campus Area Network (CAN) - Spans 1-10 km, connects buildings within a university campus or corporate campus"/>
    <text x="50" y="143" class="label">CAN</text>
    <text x="50" y="159" class="detail">Campus Area Network</text>
    <text x="200" y="151" class="detail" fill="#1e90ff" font-weight="bold">1-10 km</text>
  </g>
  
  <!-- Arrow -->
  <g class="anim-fade delay-3">
    <path d="M210 170 L210 180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- LAN -->
  <g class="anim-slide delay-3">
    <rect x="30" y="185" width="360" height="50" rx="8" fill="url(#lanGrad)" class="section-box" data-narration="Local Area Network (LAN) - Confined to 1-2 km, typical in homes, offices, or buildings with high speed (100 Mbps to 10 Gbps)"/>
    <text x="50" y="208" class="label">LAN</text>
    <text x="50" y="224" class="detail">Local Area Network</text>
    <text x="200" y="216" class="detail" fill="#228b22" font-weight="bold">1-2 km</text>
  </g>
  
  <!-- Arrow -->
  <g class="anim-fade delay-4">
    <path d="M210 235 L210 245" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- MAN -->
  <g class="anim-slide delay-4">
    <rect x="30" y="250" width="360" height="50" rx="8" fill="url(#manGrad)" class="section-box" data-narration="Metropolitan Area Network (MAN) - Covers 10-50 km, connects multiple LANs within a city or metropolitan area"/>
    <text x="50" y="273" class="label">MAN</text>
    <text x="50" y="289" class="detail">Metropolitan Area Network</text>
    <text x="200" y="281" class="detail" fill="#ff8c00" font-weight="bold">10-50 km</text>
  </g>
  
  <!-- Arrow -->
  <g class="anim-fade delay-5">
    <path d="M210 300 L210 310" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- WAN -->
  <g class="anim-slide delay-5">
    <rect x="30" y="315" width="360" height="50" rx="8" fill="url(#wanGrad)" class="section-box" data-narration="Wide Area Network (WAN) - Unlimited coverage, spans cities, countries, or globally; includes the Internet"/>
    <text x="50" y="338" class="label">WAN</text>
    <text x="50" y="354" class="detail">Wide Area Network</text>
    <text x="200" y="346" class="detail" fill="#8b008b" font-weight="bold">Unlimited</text>
  </g>
  
  <!-- Legend/Key at bottom -->
  <g class="anim-fade delay-5">
    <text x="210" y="382" text-anchor="middle" class="detail" fill="#666">← Coverage increases as network scale grows →</text>
  </g>
  
  <!-- Marker definition for arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>