<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="transmission-modes-network-devices">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8f0f4"/>
    </linearGradient>
    <linearGradient id="simplexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="halfDuplexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fc79"/>
      <stop offset="100%" style="stop-color:#96e6a1"/>
    </linearGradient>
    <linearGradient id="fullDuplexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a1c4fd"/>
      <stop offset="100%" style="stop-color:#c2e9fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowMove {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 20; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .example { font-family: Arial, sans-serif; font-size: 11px; fill: #7f8c8d; font-style: italic; }
    .section-box { rx: 8; ry: 8; stroke-width: 2; }
    .arrow-line { fill: none; stroke-width: 3; stroke-linecap: round; }
    .arrow-head { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .simplex-anim { animation: slideInLeft 0.8s ease-out 0.3s forwards; opacity: 0; }
    .halfduplex-anim { animation: slideInRight 0.8s ease-out 0.5s forwards; opacity: 0; }
    .fullduplex-anim { animation: fadeIn 0.8s ease-out 0.7s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-anim { animation: arrowMove 1.5s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Transmission Modes</text>
  <text x="210" y="50" text-anchor="middle" class="detail" style="font-size: 12px;">Data Flow Between Network Devices</text>
  
  <!-- Simplex Section -->
  <g class="simplex-anim" data-narration="Simplex: Data flows in one direction only. One device transmits, the other only receives.">
    <rect x="20" y="65" width="120" height="110" fill="url(#simplexGrad)" class="section-box" stroke="#e17055" filter="url(#shadow)"/>
    <text x="80" y="85" text-anchor="middle" class="label">SIMPLEX</text>
    
    <!-- Simplex Arrow -->
    <g class="pulse">
      <line x1="45" y1="115" x2="115" y2="115" class="arrow-line" stroke="#d63031"/>
      <polygon points="115,110 125,115 115,120" fill="#d63031"/>
    </g>
    <text x="80" y="140" text-anchor="middle" class="detail">One Direction Only</text>
    <text x="80" y="158" text-anchor="middle" class="example">Examples:</text>
    <text x="80" y="172" text-anchor="middle" class="detail">⌨️ Keyboard</text>
  </g>
  
  <!-- Half-Duplex Section -->
  <g class="halfduplex-anim" data-narration="Half-Duplex: Data can flow in both directions but not simultaneously. Like a walkie-talkie.">
    <rect x="160" y="65" width="120" height="110" fill="url(#halfDuplexGrad)" class="section-box" stroke="#00b894" filter="url(#shadow)"/>
    <text x="220" y="85" text-anchor="middle" class="label">HALF-DUPLEX</text>
    
    <!-- Half-Duplex Arrows (alternating) -->
    <g class="pulse">
      <line x1="185" y1="115" x2="255" y2="115" class="arrow-line" stroke="#00b894" stroke-dasharray="5,3"/>
      <polygon points="255,110 265,115 255,120" fill="#00b894"/>
      <line x1="255" y1="130" x2="185" y2="130" class="arrow-line" stroke="#00b894" stroke-dasharray="5,3"/>
      <polygon points="185,125 175,130 185,135" fill="#00b894"/>
    </g>
    <text x="220" y="155" text-anchor="middle" class="detail">One Way at a Time</text>
    <text x="220" y="172" text-anchor="middle" class="detail">📻 Walkie-Talkie</text>
  </g>
  
  <!-- Full-Duplex Section -->
  <g class="fullduplex-anim" data-narration="Full-Duplex: Data flows in both directions simultaneously. Like a telephone conversation.">
    <rect x="80" y="190" width="260" height="80" fill="url(#fullDuplexGrad)" class="section-box" stroke="#0984e3" filter="url(#shadow)"/>
    <text x="210" y="215" text-anchor="middle" class="label">FULL-DUPLEX</text>
    
    <!-- Full-Duplex Parallel Arrows -->
    <g class="pulse">
      <line x1="120" y1="245" x2="175" y2="245" class="arrow-line" stroke="#0984e3"/>
      <polygon points="175,240 185,245 175,250" fill="#0984e3"/>
      <line x1="245" y1="245" x2="300" y2="245" class="arrow-line" stroke="#e84393"/>
      <polygon points="300,240 310,245 300,250" fill="#e84393"/>
    </g>
    <text x="210" y="248" text-anchor="middle" class="detail" style="font-size: 10px;">← Simultaneous Both Directions →</text>
    <text x="210" y="268" text-anchor="middle" class="detail">📞 Telephone</text>
  </g>
  
  <!-- Network Devices Section -->
  <g class="fullduplex-anim" data-narration="Network devices like NICs, hubs, switches, and routers enable these transmission modes in computer networks.">
    <rect x="80" y="285" width="260" height="50" fill="#f8f9fa" class="section-box" stroke="#6c5ce7" filter="url(#shadow)"/>
    <text x="210" y="305" text-anchor="middle" class="label" style="font-size: 13px;">Network Devices</text>
    <text x="210" y="322" text-anchor="middle" class="detail">NIC • Hub • Switch • Router</text>
    <text x="210" y="335" text-anchor="middle" class="detail" style="font-size: 10px;">Enable communication between devices</text>
  </g>
  
  <!-- Legend/Key -->
  <g class="fullduplex-anim">
    <circle cx="30" cy="350" r="4" fill="#e17055"/>
    <text x="40" y="354" class="detail" style="font-size: 10px;">Simplex</text>
    <circle cx="100" cy="350" r="4" fill="#00b894"/>
    <text x="110" y="354" class="detail" style="font-size: 10px;">Half-Duplex</text>
    <circle cx="180" cy="350" r="4" fill="#0984e3"/>
    <text x="190" y="354" class="detail" style="font-size: 10px;">Full-Duplex</text>
  </g>
  
  <!-- Direction indicators -->
  <g class="pulse">
    <text x="380" y="370" class="detail" style="font-size: 9px; fill: #95a5a6;">⬆️ Data Flow</text>
  </g>
</svg>