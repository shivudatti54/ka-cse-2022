<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="osi-and-tcp-ip-reference-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#d4ecf4"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="osiGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c9ed9"/>
      <stop offset="100%" style="stop-color:#3d7cc9"/>
    </linearGradient>
    <linearGradient id="tcpGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#4caf50"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .subtitle { animation: fadeIn 1s ease-out 0.3s both; font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .osi-box { animation: slideInLeft 0.6s ease-out 0.2s both; filter: url(#shadow); }
    .tcp-box { animation: slideInRight 0.6s ease-out 0.4s both; filter: url(#shadow); }
    .layer-label { font-family: Arial, sans-serif; font-size: 11px; fill: white; font-weight: bold; }
    .layer-detail { font-family: Arial, sans-serif; font-size: 9px; fill: rgba(255,255,255,0.9); }
    .mapping-line { stroke: #ff9800; stroke-width: 2; stroke-dasharray: 5,3; animation: drawArrow 1.5s ease-out 1s both; }
    .model-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .legend-text { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .section-box { animation: fadeIn 0.8s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="25" text-anchor="middle" class="title">OSI vs TCP/IP Reference Models</text>
  <text x="210" y="42" text-anchor="middle" class="subtitle">A Side-by-Side Comparison</text>
  
  <!-- OSI Model Section -->
  <g class="section-box" data-narration="The OSI Model has 7 layers providing a theoretical framework">
    <text x="55" y="65" text-anchor="middle" class="model-title" fill="#3d7cc9">OSI Model (7 Layers)</text>
    <!-- Application Layer -->
    <rect x="15" y="75" width="90" height="38" rx="4" fill="#e57373" class="osi-box"/>
    <text x="60" y="90" text-anchor="middle" class="layer-label">Application</text>
    <text x="60" y="103" text-anchor="middle" class="layer-detail">Layer 7</text>
    <!-- Presentation Layer -->
    <rect x="15" y="113" width="90" height="38" rx="4" fill="#ffb74d" class="osi-box"/>
    <text x="60" y="128" text-anchor="middle" class="layer-label">Presentation</text>
    <text x="60" y="141" text-anchor="middle" class="layer-detail">Layer 6</text>
    <!-- Session Layer -->
    <rect x="15" y="151" width="90" height="38" rx="4" fill="#fff176" class="osi-box"/>
    <text x="60" y="166" text-anchor="middle" class="layer-label">Session</text>
    <text x="60" y="179" text-anchor="middle" class="layer-detail">Layer 5</text>
    <!-- Transport Layer -->
    <rect x="15" y="189" width="90" height="38" rx="4" fill="#81c784" class="osi-box"/>
    <text x="60" y="204" text-anchor="middle" class="layer-label">Transport</text>
    <text x="60" y="217" text-anchor="middle" class="layer-detail">Layer 4</text>
    <!-- Network Layer -->
    <rect x="15" y="227" width="90" height="38" rx="4" fill="#4db6ac" class="osi-box"/>
    <text x="60" y="242" text-anchor="middle" class="layer-label">Network</text>
    <text x="60" y="255" text-anchor="middle" class="layer-detail">Layer 3</text>
    <!-- Data Link Layer -->
    <rect x="15" y="265" width="90" height="38" rx="4" fill="#64b5f6" class="osi-box"/>
    <text x="60" y="280" text-anchor="middle" class="layer-label">Data Link</text>
    <text x="60" y="293" text-anchor="middle" class="layer-detail">Layer 2</text>
    <!-- Physical Layer -->
    <rect x="15" y="303" width="90" height="38" rx="4" fill="#9575cd" class="osi-box"/>
    <text x="60" y="318" text-anchor="middle" class="layer-label">Physical</text>
    <text x="60" y="331" text-anchor="middle" class="layer-detail">Layer 1</text>
  </g>
  
  <!-- TCP/IP Model Section -->
  <g class="section-box" data-narration="The TCP/IP Model has 4 layers, the foundation of modern internet">
    <text x="360" y="65" text-anchor="middle" class="model-title" fill="#388e3c">TCP/IP Model (4 Layers)</text>
    <!-- Application Layer -->
    <rect x="315" y="75" width="90" height="70" rx="4" fill="#e57373" class="tcp-box"/>
    <text x="360" y="98" text-anchor="middle" class="layer-label">Application</text>
    <text x="360" y="112" text-anchor="middle" class="layer-detail">Layers 5,6,7</text>
    <text x="360" y="135" text-anchor="middle" class="layer-detail">(HTTP, FTP, SMTP)</text>
    <!-- Transport Layer -->
    <rect x="315" y="145" width="90" height="70" rx="4" fill="#81c784" class="tcp-box"/>
    <text x="360" y="168" text-anchor="middle" class="layer-label">Transport</text>
    <text x="360" y="182" text-anchor="middle" class="layer-detail">Layer 4</text>
    <text x="360" y="205" text-anchor="middle" class="layer-detail">(TCP, UDP)</text>
    <!-- Internet Layer -->
    <rect x="315" y="215" width="90" height="70" rx="4" fill="#4db6ac" class="tcp-box"/>
    <text x="360" y="238" text-anchor="middle" class="layer-label">Internet</text>
    <text x="360" y="252" text-anchor="middle" class="layer-detail">Layer 3</text>
    <text x="360" y="275" text-anchor="middle" class="layer-detail">(IP, ICMP)</text>
    <!-- Network Access Layer -->
    <rect x="315" y="285" width="90" height="70" rx="4" fill="#9575cd" class="tcp-box"/>
    <text x="360" y="308" text-anchor="middle" class="layer-label">Network Access</text>
    <text x="360" y="322" text-anchor="middle" class="layer-detail">Layers 1,2</text>
    <text x="360" y="345" text-anchor="middle" class="layer-detail">(Ethernet, Wi-Fi)</text>
  </g>
  
  <!-- Mapping Arrows -->
  <g class="section-box" data-narration="Mapping shows how OSI layers map to TCP/IP layers">
    <!-- Application mapping -->
    <path d="M 105 95 Q 150 95 180 95" fill="none" class="mapping-line" marker-end="url(#arrowhead)"/>
    <path d="M 180 95 Q 210 95 310 110" fill="none" class="mapping-line" marker-end="url(#arrowhead)"/>
    
    <!-- Session/Presentation/Application to Application -->
    <path d="M 105 130 Q 150 130 180 130" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
    <path d="M 180 130 Q 220 130 310 120" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- Transport to Transport -->
    <path d="M 105 208 Q 160 208 210 208" fill="none" stroke="#4caf50" stroke-width="3"/>
    <path d="M 210 208 Q 260 208 310 180" fill="none" stroke="#4caf50" stroke-width="3"/>
    <polygon points="310,175 315,185 305,185" fill="#4caf50"/>
    
    <!-- Network to Internet -->
    <path d="M 105 247 Q 160 247 210 247" fill="none" stroke="#00897b" stroke-width="3"/>
    <path d="M 210 247 Q 260 247 310 250" fill="none" stroke="#00897b" stroke-width="3"/>
    <polygon points="310,255 315,245 305,245" fill="#00897b"/>
    
    <!-- Data Link + Physical to Network Access -->
    <path d="M 105 300 Q 150 300 180 335" fill="none" stroke="#7e57c2" stroke-width="2" stroke-dasharray="5,3"/>
    <path d="M 180 335 Q 220 360 310 335" fill="none" stroke="#7e57c2" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="310,330 315,340 305,340" fill="#7e57c2"/>
  </g>
  
  <!-- Legend/Key -->
  <g class="section-box" data-narration="Color coding shows equivalent functional layers between models">
    <rect x="125" y="360" width="170" height="30" rx="3" fill="rgba(255,255,255,0.8)" stroke="#ccc"/>
    <circle cx="135" cy="375" r="5" fill="#e57373"/>
    <text x="145" y="378" class="legend-text">Application</text>
    <circle cx="185" cy="375" r="5" fill="#81c784"/>
    <text x="195" y="378" class="legend-text">Transport</text>
    <circle cx="240" cy="375" r="5" fill="#4db6ac"/>
    <text x="250" y="378" class="legend-text">Network</text>
    <circle cx="285" cy="375" r="5" fill="#9575cd"/>
    <text x="295" y="378" class="legend-text">Link</text>
  </g>
  
  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
</svg>