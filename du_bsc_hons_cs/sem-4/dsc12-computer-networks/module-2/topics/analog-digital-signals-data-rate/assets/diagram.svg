<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="analog-digital-signals-data-rate">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="analogGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9" />
      <stop offset="100%" style="stop-color:#7eb8ff" />
    </linearGradient>
    <linearGradient id="digitalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d94a8c" />
      <stop offset="100%" style="stop-color:#ff7eb8" />
    </linearGradient>
    <linearGradient id="formulaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c" />
      <stop offset="100%" style="stop-color:#8fd98f" />
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes wave {
        0% { transform: translateX(0); }
        100% { transform: translateX(-40px); }
      }
      @keyframes digitalPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      .title { animation: fadeIn 0.8s ease-out; }
      .analog-section { animation: slideInLeft 0.8s ease-out 0.2s both; }
      .digital-section { animation: slideInRight 0.8s ease-out 0.4s both; }
      .formula-section { animation: fadeIn 0.8s ease-out 0.6s both; }
      .wave-anim { animation: wave 2s linear infinite; }
      .pulse-anim { animation: pulse 2s ease-in-out infinite; }
      .digital-anim { animation: digitalPulse 1s ease-in-out infinite; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGrad)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" class="title">Analog vs Digital Signals</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666" class="title">Data Rate &amp; Transmission</text>
  
  <!-- Analog Signal Section -->
  <g class="analog-section" data-narration="Analog signals are continuous waves that vary smoothly over time, representing information with continuous changes in amplitude, frequency, or phase.">
    <rect x="15" y="70" width="180" height="150" fill="white" stroke="#4a90d9" stroke-width="2" rx="8"/>
    <text x="105" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4a90d9">ANALOG SIGNAL</text>
    <text x="105" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Continuous Wave</text>
    <g transform="translate(25, 140)">
      <path d="M0,25 Q10,5 20,25 T40,25 T60,25 T80,25 T100,25 T120,25 T140,25 T160,25" 
            fill="none" stroke="url(#analogGrad)" stroke-width="3" class="wave-anim"/>
    </g>
    <text x="105" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Any amplitude value</text>
    <text x="105" y="215" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">in range possible</text>
  </g>
  
  <!-- Digital Signal Section -->
  <g class="digital-section" data-narration="Digital signals are discrete, using binary levels (0s and 1s). They jump abruptly between defined levels, offering better noise immunity.">
    <rect x="225" y="70" width="180" height="150" fill="white" stroke="#d94a8c" stroke-width="2" rx="8"/>
    <text x="315" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#d94a8c">DIGITAL SIGNAL</text>
    <text x="315" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Discrete Pulses</text>
    <g transform="translate(235, 140)" class="digital-anim">
      <rect x="0" y="10" width="20" height="30" fill="#d94a8c"/>
      <rect x="20" y="40" width="20" height="0" fill="#d94a8c"/>
      <rect x="40" y="10" width="20" height="30" fill="#d94a8c"/>
      <rect x="60" y="40" width="20" height="0" fill="#d94a8c"/>
      <rect x="80" y="10" width="20" height="30" fill="#d94a8c"/>
      <rect x="100" y="40" width="20" height="0" fill="#d94a8c"/>
      <rect x="120" y="10" width="20" height="30" fill="#d94a8c"/>
      <rect x="140" y="40" width="20" height="0" fill="#d94a8c"/>
    </g>
    <text x="315" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Binary: 0 or 1</text>
    <text x="315" y="215" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Discrete levels only</text>
  </g>
  
  <!-- Formula Section -->
  <g class="formula-section" data-narration="Two fundamental theorems govern data transmission: Nyquist Theorem for noiseless channels and Shannon's Capacity Theorem for noisy channels.">
    <rect x="15" y="235" width="185" height="70" fill="white" stroke="#5cb85c" stroke-width="2" rx="8"/>
    <text x="107" y="255" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#5cb85c">Nyquist Theorem</text>
    <text x="107" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Data Rate = 2B × log₂M</text>
    <text x="107" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">B=bandwidth, M=signal levels</text>
  </g>
  
  <g class="formula-section" data-narration="Shannon's Capacity Theorem defines the maximum data rate for a noisy channel, considering both bandwidth and signal-to-noise ratio.">
    <rect x="220" y="235" width="185" height="70" fill="white" stroke="#f0ad4e" stroke-width="2" rx="8"/>
    <text x="312" y="255" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#f0ad4e">Shannon Capacity</text>
    <text x="312" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">C = B × log₂(1 + S/N)</text>
    <text x="312" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">S/N = signal-to-noise ratio</text>
  </g>
  
  <!-- Key Points -->
  <g class="formula-section" data-narration="Key takeaways: Digital signals provide better noise immunity and easier processing. The data rate is limited by bandwidth and noise levels.">
    <rect x="15" y="320" width="390" height="70" fill="#f8f9fa" stroke="#ddd" stroke-width="1" rx="8"/>
    <text x="210" y="345" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Key Concepts</text>
    <text x="210" y="365" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">• Digital = Better noise immunity • Sampling converts analog to digital</text>
    <text x="210" y="382" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">• Bandwidth limits max frequency • Shannon sets ultimate capacity limit</text>
  </g>
  
  <!-- Arrow between analog and digital -->
  <g class="pulse-anim">
    <path d="M200,145 L220,145" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="218,140 228,145 218,150" fill="#999"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(320, 380)">
    <circle cx="0" cy="0" r="4" fill="#4a90d9"/>
    <text x="8" y="4" font-family="Arial" font-size="9" fill="#666">Analog</text>
    <circle cx="50" cy="0" r="4" fill="#d94a8c"/>
    <text x="58" y="4" font-family="Arial" font-size="9" fill="#666">Digital</text>
  </g>
</svg>