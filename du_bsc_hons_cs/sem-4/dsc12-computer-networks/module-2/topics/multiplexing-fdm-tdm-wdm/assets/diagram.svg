<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="multiplexing-fdm-tdm-wdm" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="fdmGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="tdmGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#3dbdb5"/>
    </linearGradient>
    <linearGradient id="wdmGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#8c7ae6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes waveAnimation {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes slotPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-fdm { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-tdm { animation: fadeIn 0.6s ease-out 0.4s both; }
    .section-wdm { animation: slideInRight 0.6s ease-out 0.6s both; }
    .concept-box { animation: fadeIn 0.5s ease-out; }
    .fdm-band { animation: fadeIn 0.4s ease-out; animation-fill-mode: both; }
    .tdm-slot { animation: slotPulse 2s infinite; }
    .arrow { animation: pulse 2s infinite; }
    .label { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" font-size="18" fill="#2c3e50">Multiplexing Techniques</text>
  <text x="210" y="46" text-anchor="middle" class="label" font-size="12" fill="#7f8c8d">FDM • TDM • WDM</text>
  
  <!-- FDM Section -->
  <g class="section-fdm" data-narration="FDM divides bandwidth into frequency bands">
    <rect x="15" y="60" width="120" height="90" rx="6" fill="white" filter="url(#shadow)"/>
    <text x="75" y="78" text-anchor="middle" class="title-text" font-size="13" fill="#e74c3c">FDM</text>
    <text x="75" y="92" text-anchor="middle" class="label" font-size="9" fill="#7f8c8d">Frequency Division</text>
    <!-- Frequency bars -->
    <rect class="fdm-band" x="25" y="105" width="25" height="35" rx="2" fill="url(#fdmGradient)" style="animation-delay: 0.3s"/>
    <rect class="fdm-band" x="55" y="105" width="25" height="35" rx="2" fill="url(#fdmGradient)" style="animation-delay: 0.4s"/>
    <rect class="fdm-band" x="85" y="105" width="25" height="35" rx="2" fill="url(#fdmGradient)" style="animation-delay: 0.5s"/>
    <!-- Guard band markers -->
    <line x1="52" y1="105" x2="52" y2="140" stroke="#95a5a6" stroke-dasharray="3,2" stroke-width="1"/>
    <line x1="82" y1="105" x2="82" y2="140" stroke="#95a5a6" stroke-dasharray="3,2" stroke-width="1"/>
    <text x="75" y="153" text-anchor="middle" class="label" font-size="8" fill="#95a5a6">Guard Bands</text>
  </g>
  
  <!-- TDM Section -->
  <g class="section-tdm" data-narration="TDM divides time into slots">
    <rect x="150" y="60" width="120" height="90" rx="6" fill="white" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" class="title-text" font-size="13" fill="#16a085">TDM</text>
    <text x="210" y="92" text-anchor="middle" class="label" font-size="9" fill="#7f8c8d">Time Division</text>
    <!-- Time slots -->
    <rect class="tdm-slot" x="160" y="105" width="20" height="35" rx="2" fill="url(#tdmGradient)" style="animation-delay: 0s"/>
    <rect class="tdm-slot" x="185" y="105" width="20" height="35" rx="2" fill="url(#tdmGradient)" style="animation-delay: 0.3s"/>
    <rect class="tdm-slot" x="210" y="105" width="20" height="35" rx="2" fill="url(#tdmGradient)" style="animation-delay: 0.6s"/>
    <rect class="tdm-slot" x="235" y="105" width="20" height="35" rx="2" fill="url(#tdmGradient)" style="animation-delay: 0.9s"/>
    <!-- Time arrows -->
    <path d="M155 150 L260 150" stroke="#95a5a6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="210" y="162" text-anchor="middle" class="label" font-size="8" fill="#95a5a6">Time →</text>
  </g>
  
  <!-- WDM Section -->
  <g class="section-wdm" data-narration="WDM uses different light wavelengths">
    <rect x="285" y="60" width="120" height="90" rx="6" fill="white" filter="url(#shadow)"/>
    <text x="345" y="78" text-anchor="middle" class="title-text" font-size="13" fill="#8e44ad">WDM</text>
    <text x="345" y="92" text-anchor="middle" class="label" font-size="9" fill="#7f8c8d">Wavelength Division</text>
    <!-- Wavelength lines -->
    <line class="fdm-band" x1="295" y1="115" x2="345" y2="115" stroke="#e74c3c" stroke-width="3" style="animation-delay: 0.3s"/>
    <line class="fdm-band" x1="295" y1="125" x2="345" y2="125" stroke="#f39c12" stroke-width="3" style="animation-delay: 0.4s"/>
    <line class="fdm-band" x1="295" y1="135" x2="345" y2="135" stroke="#27ae60" stroke-width="3" style="animation-delay: 0.5s"/>
    <!-- Wavelength labels -->
    <text x="360" y="118" class="label" font-size="8" fill="#e74c3c">λ₁</text>
    <text x="360" y="128" class="label" font-size="8" fill="#f39c12">λ₂</text>
    <text x="360" y="138" class="label" font-size="8" fill="#27ae60">λ₃</text>
    <text x="345" y="153" text-anchor="middle" class="label" font-size="8" fill="#95a5a6">Fiber Optic</text>
  </g>
  
  <!-- Concept Boxes -->
  <g class="concept-box" data-narration="Key characteristics of each technique">
    <rect x="15" y="165" width="390" height="55" rx="5" fill="white" filter="url(#shadow)"/>
    <circle cx="35" cy="192" r="12" fill="#ff6b6b" opacity="0.2"/>
    <text x="35" y="196" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="#e74c3c">F</text>
    <text x="55" y="187" class="label" font-size="9" fill="#2c3e50">Analog signals</text>
    <text x="55" y="199" class="label" font-size="8" fill="#7f8c8d">Non-overlapping frequencies</text>
    
    <circle cx="145" cy="192" r="12" fill="#4ecdc4" opacity="0.2"/>
    <text x="145" y="196" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="#16a085">T</text>
    <text x="165" y="187" class="label" font-size="9" fill="#2c3e50">Digital signals</text>
    <text x="165" y="199" class="label" font-size="8" fill="#7f8c8d">Synchronized time slots</text>
    
    <circle cx="265" cy="192" r="12" fill="#a29bfe" opacity="0.2"/>
    <text x="265" y="196" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="#8e44ad">W</text>
    <text x="285" y="187" class="label" font-size="9" fill="#2c3e50">Light signals</text>
    <text x="285" y="199" class="label" font-size="8" fill="#7f8c8d">Different wavelengths</text>
    
    <circle cx="375" cy="192" r="12" fill="#f39c12" opacity="0.2"/>
    <text x="375" y="196" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="#f39c12">M</text>
    <text x="395" y="187" class="label" font-size="9" fill="#2c3e50">Multiplexer</text>
    <text x="395" y="199" class="label" font-size="8" fill="#7f8c8d">Combines signals</text>
  </g>
  
  <!-- Multiplexing Process Diagram -->
  <g class="section-fdm" data-narration="Shows how signals are combined and separated">
    <text x="210" y="238" text-anchor="middle" class="title-text" font-size="12" fill="#2c3e50">Signal Multiplexing Process</text>
    
    <!-- Input signals -->
    <rect x="30" y="250" width="30" height="12" rx="2" fill="#3498db"/>
    <rect x="30" y="265" width="30" height="12" rx="2" fill="#e74c3c"/>
    <rect x="30" y="280" width="30" height="12" rx="2" fill="#27ae60"/>
    <text x="25" y="305" class="label" font-size="8" fill="#7f8c8d">Input</text>
    
    <!-- Arrow to multiplexer -->
    <path d="M65 265 L95 265" stroke="#34495e" stroke-width="2" class="arrow"/>
    <polygon points="92,265 87,262 87,268" fill="#34495e"/>
    
    <!-- Multiplexer box -->
    <rect x="95" y="250" width="50" height="45" rx="4" fill="#9b59b6"/>
    <text x="120" y="278" text-anchor="middle" class="label" font-size="11" fill="white" font-weight="bold">MUX</text>
    
    <!-- Arrow to demultiplexer -->
    <path d="M150 265 L180 265" stroke="#34495e" stroke-width="2" class="arrow"/>
    <polygon points="177,265 172,262 172,268" fill="#34495e"/>
    
    <!-- Transmission medium -->
    <rect x="180" y="260" width="60" height="10" rx="2" fill="#34495e"/>
    <text x="210" y="285" text-anchor="middle" class="label" font-size="8" fill="#7f8c8d">Channel</text>
    
    <!-- Demultiplexer box -->
    <rect x="245" y="250" width="50" height="45" rx="4" fill="#e67e22"/>
    <text x="270" y="278" text-anchor="middle" class="label" font-size="11" fill="white" font-weight="bold">DEMUX</text>
    
    <!-- Arrow to outputs -->
    <path d="M300 265 L330 265" stroke="#34495e" stroke-width="2" class="arrow"/>
    <polygon points="327,265 322,262 322,268" fill="#34495e"/>
    
    <!-- Output signals -->
    <rect x="330" y="250" width="30" height="12" rx="2" fill="#3498db"/>
    <rect x="330" y="265" width="30" height="12" rx="2" fill="#e74c3c"/>
    <rect x="330" y="280" width="30" height="12" rx="2" fill="#27ae60"/>
    <text x="370" y="305" class="label" font-size="8" fill="#7f8c8d">Output</text>
  </g>
  
  <!-- Application Areas -->
  <g class="concept-box" data-narration="Practical applications of each technique">
    <rect x="15" y="315" width="390" height="75" rx="5" fill="white" filter="url(#shadow)"/>
    <text x="210" y="332" text-anchor="middle" class="title-text" font-size="11" fill="#2c3e50">Applications</text>
    
    <!-- FDM applications -->
    <rect x="25" y="342" width="115" height="40" rx="3" fill="#ff6b6b" opacity="0.1"/>
    <text x="82" y="355" text-anchor="middle" class="label" font-size="9" fill="#e74c3c" font-weight="bold">Radio Broadcasting</text>
    <text x="82" y="368" text-anchor="middle" class="label" font-size="8" fill="#7f8c8d">FM/AM radio</text>
    <text x="82" y="378" text-anchor="middle" class="label" font-size="8" fill="#7f8c8d">TV channels</text>
    
    <!-- TDM applications -->
    <rect x="152" y="342" width="115" height="40" rx="3" fill="#4ecdc4" opacity="0.1"/>
    <text x="210" y="355" text-anchor="middle" class="label" font-size="9" fill="#16a085" font-weight="bold">Telephone Networks</text>
    <text x="210" y="368" text-anchor="middle" class="label" font-size="8" fill="#7f8c8d">Digital telephony</text>
    <text x="210" y="378" text-anchor="middle" class="label" font-size="8" fill="#7f8c8d">SDH/SONET</text>
    
    <!-- WDM applications -->
    <rect x="280" y="342" width="115" height="40" rx="3" fill="#a29bfe" opacity="0.1"/>
    <text x="337" y="355" text-anchor="middle" class="label" font-size="9" fill="#8e44ad" font-weight="bold">Fiber Optics</text>
    <text x="337" y="368" text-anchor="middle" class="label" font-size="8" fill="#7f8c8d">High-speed internet</text>
    <text x="337" y="378" text-anchor="middle" class="label" font-size="8" fill="#7f8c8d">Data centers</text>
  </g>
  
  <!-- Legend/Key -->
  <g class="concept-box" data-narration="Summary and key takeaways">
    <rect x="15" y="165" width="390" height="220" rx="0" fill="none" stroke="#bdc3c7" stroke-width="0.5" stroke-dasharray="5,3" opacity="0"/>
  </g>
</svg>