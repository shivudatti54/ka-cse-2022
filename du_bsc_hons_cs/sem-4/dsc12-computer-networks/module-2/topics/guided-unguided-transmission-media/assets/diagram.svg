<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="guided-unguided-transmission-media">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e9f7"/>
      <stop offset="100%" style="stop-color:#c2dff0"/>
    </linearGradient>
    <linearGradient id="jacketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="bluePair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3182ce"/>
      <stop offset="100%" style="stop-color:#63b3ed"/>
    </linearGradient>
    <linearGradient id="orangePair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dd6b20"/>
      <stop offset="100%" style="stop-color:#f6ad55"/>
    </linearGradient>
    <linearGradient id="greenPair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38a169"/>
      <stop offset="100%" style="stop-color:#68d391"/>
    </linearGradient>
    <linearGradient id="brownPair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#975a16"/>
      <stop offset="100%" style="stop-color:#d69e2e"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes wave {
      0%, 100% { d: path("M 50 200 Q 75 180, 100 200 Q 125 220, 150 200"); }
      50% { d: path("M 50 200 Q 75 220, 100 200 Q 125 180, 150 200"); }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d3748; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .section-box { fill: #ffffff; stroke: #cbd5e0; stroke-width: 1; rx: 8; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text fade-in">Transmission Media</text>
  
  <!-- Category Labels -->
  <g class="slide-in delay-1">
    <text x="105" y="60" text-anchor="middle" class="label-text" font-weight="bold">Guided Media</text>
    <rect x="20" y="68" width="170" height="2" fill="#3182ce"/>
  </g>
  <g class="slide-in delay-2">
    <text x="315" y="60" text-anchor="middle" class="label-text" font-weight="bold">Unguided Media</text>
    <rect x="230" y="68" width="170" height="2" fill="#38a169"/>
  </g>
  
  <!-- Guided Media Section -->
  <g class="fade-in delay-1" data-narration="Guided media provides physical pathways for data transmission">
    <!-- Twisted Pair Box -->
    <rect x="25" y="80" width="160" height="85" class="section-box" fill="#ebf8ff"/>
    <text x="105" y="98" text-anchor="middle" class="label-text" font-size="12" font-weight="bold">Twisted Pair</text>
    <ellipse cx="70" cy="130" rx="18" ry="10" fill="url(#bluePair)" opacity="0.8"/>
    <ellipse cx="70" cy="150" rx="18" ry="10" fill="url(#orangePair)" opacity="0.8"/>
    <text x="95" y="133" class="detail-text">UTP/STP</text>
    <text x="95" y="153" class="detail-text">Cat5e/6</text>
  </g>
  
  <!-- Coaxial Box -->
  <g class="fade-in delay-2" data-narration="Coaxial cable provides better shielding than twisted pair">
    <rect x="25" y="170" width="160" height="85" class="section-box" fill="#fef3c7"/>
    <text x="105" y="188" text-anchor="middle" class="label-text" font-size="12" font-weight="bold">Coaxial</text>
    <circle cx="70" cy="220" r="15" fill="none" stroke="#92400e" stroke-width="3"/>
    <circle cx="70" cy="220" r="8" fill="#f6ad55"/>
    <text x="95" y="222" class="detail-text">BNC/RG-58</text>
  </g>
  
  <!-- Fiber Optic Box -->
  <g class="fade-in delay-3" data-narration="Fiber optic uses light signals for high-speed transmission">
    <rect x="25" y="260" width="160" height="85" class="section-box" fill="#e6fffa"/>
    <text x="105" y="278" text-anchor="middle" class="label-text" font-size="12" font-weight="bold">Fiber Optic</text>
    <line x1="50" y1="310" x2="160" y2="310" stroke="#38a169" stroke-width="4" stroke-dasharray="8,4" opacity="0.7"/>
    <circle cx="60" cy="310" r="4" fill="#68d391"/>
    <circle cx="150" cy="310" r="4" fill="#68d391" class="pulse"/>
    <text x="95" y="330" class="detail-text">Single/Multi-mode</text>
  </g>
  
  <!-- Unguided Media Section -->
  <g class="fade-in delay-2" data-narration="Unguided media transmits signals through air without physical cables">
    <!-- Radio Waves -->
    <rect x="235" y="80" width="160" height="60" class="section-box" fill="#f0fff4"/>
    <text x="315" y="98" text-anchor="middle" class="label-text" font-size="12" font-weight="bold">Radio Waves</text>
    <path d="M 260 115 Q 280 100, 300 115 Q 320 130, 340 115" fill="none" stroke="#38a169" stroke-width="2" class="pulse"/>
    <text x="350" y="118" class="detail-text">WiFi/Bluetooth</text>
  </g>
  
  <!-- Microwave -->
  <g class="fade-in delay-3" data-narration="Microwave signals for long-distance point-to-point communication">
    <rect x="235" y="145" width="160" height="55" class="section-box" fill="#fff5f5"/>
    <text x="315" y="163" text-anchor="middle" class="label-text" font-size="12" font-weight="bold">Microwave</text>
    <line x1="255" y1="180" x2="275" y2="180" stroke="#e53e3e" stroke-width="3"/>
    <line x1="280" y1="185" x2="280" y2="175" stroke="#e53e3e" stroke-width="2"/>
    <text x="295" y="183" class="detail-text">Terrestrial/Satellite</text>
  </g>
  
  <!-- Infrared -->
  <g class="fade-in delay-4" data-narration="Infrared uses light waves for short-range communication">
    <rect x="235" y="205" width="160" height="50" class="section-box" fill="#faf5ff"/>
    <text x="315" y="223" text-anchor="middle" class="label-text" font-size="12" font-weight="bold">Infrared</text>
    <line x1="255" y1="240" x2="320" y2="240" stroke="#805ad5" stroke-width="2" opacity="0.5"/>
    <circle cx="255" cy="240" r="3" fill="#805ad5"/>
    <text x="330" y="243" class="detail-text">TV Remotes</text>
  </g>
  
  <!-- Twisted Pair Detailed Cross-Section -->
  <g class="fade-in delay-4" transform="translate(235, 265)" data-narration="Twisted pair cable consists of 4 twisted wire pairs with color coding">
    <text x="80" y="12" text-anchor="middle" class="label-text" font-size="11" font-weight="bold">Twisted Pair Structure</text>
    
    <!-- Outer Jacket -->
    <rect x="15" y="20" width="130" height="85" rx="5" fill="url(#jacketGradient)"/>
    
    <!-- Shielding (STP) -->
    <rect x="20" y="25" width="120" height="75" rx="4" fill="none" stroke="#a0aec0" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="25" y="35" class="detail-text" fill="#e2e8f0">Shield</text>
    
    <!-- Blue Pair -->
    <ellipse cx="45" cy="45" rx="12" ry="6" fill="url(#bluePair)" class="pulse"/>
    <ellipse cx="45" cy="55" rx="12" ry="6" fill="url(#bluePair)"/>
    <text x="62" y="50" class="detail-text" fill="#fff">Blue/Wht-Bl</text>
    
    <!-- Orange Pair -->
    <ellipse cx="100" cy="45" rx="12" ry="6" fill="url(#orangePair)"/>
    <ellipse cx="100" cy="55" rx="12" ry="6" fill="url(#orangePair)"/>
    <text x="117" y="50" class="detail-text" fill="#fff">Org/Wht-Org</text>
    
    <!-- Green Pair -->
    <ellipse cx="45" cy="75" rx="12" ry="6" fill="url(#greenPair)"/>
    <ellipse cx="45" cy="85" rx="12" ry="6" fill="url(#greenPair)"/>
    <text x="62" y="80" class="detail-text" fill="#fff">Grn/Wht-Grn</text>
    
    <!-- Brown Pair -->
    <ellipse cx="100" cy="75" rx="12" ry="6" fill="url(#brownPair)"/>
    <ellipse cx="100" cy="85" rx="12" ry="6" fill="url(#brownPair)"/>
    <text x="117" y="80" class="detail-text" fill="#fff">Brn/Wht-Br</text>
  </g>
  
  <!-- Arrow connecting sections -->
  <g class="fade-in delay-3">
    <path d="M 195 200 L 225 200" stroke="#718096" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(25, 355)">
    <rect width="370" height="35" rx="5" fill="rgba(255,255,255,0.7)"/>
    <text x="10" y="18" class="detail-text" font-weight="bold">Key:</text>
    <circle cx="60" cy="15" r="4" fill="url(#bluePair)"/>
    <text x="70" y="18" class="detail-text">Data</text>
    <circle cx="110" cy="15" r="4" fill="url(#greenPair)" class="pulse"/>
    <text x="120" y="18" class="detail-text">Signal</text>
    <text x="160" y="18" class="detail-text">• Guided: Physical path</text>
    <text x="280" y="18" class="detail-text">• Unguided: Wireless</text>
  </g>
</svg>