<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="cloud-security-concepts-approaches" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e6f3ff"/>
    </linearGradient>
    <linearGradient id="providerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="customerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#7E57C2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideRight {
      from { transform: translateX(-15px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: slideIn 0.6s ease-out; }
    .box-iaas { animation: fadeIn 0.8s ease-out 0.2s both; }
    .box-paas { animation: fadeIn 0.8s ease-out 0.4s both; }
    .box-saas { animation: fadeIn 0.8s ease-out 0.6s both; }
    .layer { animation: slideIn 0.5s ease-out both; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .legend { animation: fadeIn 1s ease-out 0.8s both; }
    .narration { animation: fadeIn 0.6s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="420" height="50" fill="url(#headerGrad)" rx="8"/>
  <text x="210" y="32" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold" class="title">Cloud Security Concepts</text>
  
  <!-- Legend -->
  <g class="legend">
    <rect x="20" y="55" width="12" height="12" fill="url(#providerGrad)" rx="2"/>
    <text x="36" y="65" font-family="Arial, sans-serif" font-size="10" fill="#333">Provider</text>
    <rect x="90" y="55" width="12" height="12" fill="url(#customerGrad)" rx="2"/>
    <text x="106" y="65" font-family="Arial, sans-serif" font-size="10" fill="#333">Customer</text>
  </g>
  
  <!-- IaaS Column -->
  <g class="box-iaas" data-narration="IaaS: Customer manages OS, apps, data. Provider handles physical infra & virtualization.">
    <rect x="15" y="75" width="120" height="305" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="75" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">IaaS</text>
    <text x="75" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Infrastructure as a Service</text>
    
    <!-- IaaS Layers -->
    <g class="layer" style="animation-delay: 0.3s">
      <rect x="20" y="120" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="75" y="140" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Physical Infra</text>
    </g>
    <g class="layer" style="animation-delay: 0.4s">
      <rect x="20" y="155" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="75" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Virtualization</text>
    </g>
    <g class="layer" style="animation-delay: 0.5s">
      <rect x="20" y="190" width="110" height="30" fill="url(#customerGrad)" rx="4"/>
      <text x="75" y="210" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Operating System</text>
    </g>
    <g class="layer" style="animation-delay: 0.6s">
      <rect x="20" y="225" width="110" height="30" fill="url(#customerGrad)" rx="4"/>
      <text x="75" y="245" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Applications</text>
    </g>
    <g class="layer" style="animation-delay: 0.7s">
      <rect x="20" y="260" width="110" height="30" fill="url(#customerGrad)" rx="4"/>
      <text x="75" y="280" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Data</text>
    </g>
    <g class="layer" style="animation-delay: 0.8s">
      <rect x="20" y="295" width="110" height="30" fill="url(#customerGrad)" rx="4"/>
      <text x="75" y="315" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Network/Security</text>
    </g>
  </g>
  
  <!-- PaaS Column -->
  <g class="box-paas" data-narration="PaaS: Customer manages apps & data. Provider handles OS, middleware, runtime.">
    <rect x="150" y="75" width="120" height="305" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="210" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7B1FA2">PaaS</text>
    <text x="210" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Platform as a Service</text>
    
    <!-- PaaS Layers -->
    <g class="layer" style="animation-delay: 0.4s">
      <rect x="155" y="120" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="210" y="140" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Physical Infra</text>
    </g>
    <g class="layer" style="animation-delay: 0.5s">
      <rect x="155" y="155" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="210" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Virtualization</text>
    </g>
    <g class="layer" style="animation-delay: 0.6s">
      <rect x="155" y="190" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="210" y="210" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">OS / Middleware</text>
    </g>
    <g class="layer" style="animation-delay: 0.7s">
      <rect x="155" y="225" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="210" y="245" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Runtime</text>
    </g>
    <g class="layer" style="animation-delay: 0.8s">
      <rect x="155" y="260" width="110" height="30" fill="url(#customerGrad)" rx="4"/>
      <text x="210" y="280" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Applications</text>
    </g>
    <g class="layer" style="animation-delay: 0.9s">
      <rect x="155" y="295" width="110" height="30" fill="url(#customerGrad)" rx="4"/>
      <text x="210" y="315" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Data</text>
    </g>
  </g>
  
  <!-- SaaS Column -->
  <g class="box-saas" data-narration="SaaS: Provider manages everything except user access & data configuration.">
    <rect x="285" y="75" width="120" height="305" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="345" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00838F">SaaS</text>
    <text x="345" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Software as a Service</text>
    
    <!-- SaaS Layers -->
    <g class="layer" style="animation-delay: 0.5s">
      <rect x="290" y="120" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="345" y="140" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Physical Infra</text>
    </g>
    <g class="layer" style="animation-delay: 0.6s">
      <rect x="290" y="155" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="345" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Virtualization</text>
    </g>
    <g class="layer" style="animation-delay: 0.7s">
      <rect x="290" y="190" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="345" y="210" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">OS / Middleware</text>
    </g>
    <g class="layer" style="animation-delay: 0.8s">
      <rect x="290" y="225" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="345" y="245" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Runtime</text>
    </g>
    <g class="layer" style="animation-delay: 0.9s">
      <rect x="290" y="260" width="110" height="30" fill="url(#providerGrad)" rx="4"/>
      <text x="345" y="280" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Applications</text>
    </g>
    <g class="layer" style="animation-delay: 1.0s">
      <rect x="290" y="295" width="110" height="30" fill="url(#customerGrad)" rx="4"/>
      <text x="345" y="315" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Data / Access</text>
    </g>
  </g>
  
  <!-- Arrows showing responsibility shift -->
  <g class="arrow">
    <path d="M140 230 L145 230" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow">
    <path d="M275 230 L280 230" stroke="#666" stroke-width="2"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="narration" data-narration="Shared Responsibility: Security obligations vary by service model. Customer responsibility decreases from IaaS to SaaS.">
    <rect x="15" y="385" width="390" height="10" fill="#f5f5f5" rx="3"/>
    <text x="210" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Shared Responsibility Model - Customer responsibility decreases as you move from IaaS to SaaS</text>
  </g>
</svg>