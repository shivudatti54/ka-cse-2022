<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="wireless-mobile-device-security" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4ecf4"/>
      <stop offset="100%" style="stop-color:#b8dff0"/>
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="mobileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInTop {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInBottom {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1a3a4a; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .section-box { fill: #ffffff; stroke: #4a90a4; stroke-width: 2; rx: 8; }
    .main-title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideInTop 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideInRight 0.8s ease-out 0.6s both; }
    .section-4 { animation: slideInBottom 0.8s ease-out 0.8s both; }
    .mobile-icon { animation: pulse 3s ease-in-out infinite; }
    .shield-1 { animation: fadeIn 1s ease-out 0.5s both; }
    .shield-2 { animation: fadeIn 1s ease-out 0.7s both; }
    .shield-3 { animation: fadeIn 1s ease-out 0.9s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title main-title">Wireless Mobile Device Security</text>
  
  <!-- Central Mobile Device -->
  <g class="mobile-icon" data-narration="Central mobile device representing smartphones, tablets, and wearables that store sensitive data and connect to wireless networks">
    <rect x="175" y="100" width="70" height="120" rx="10" fill="url(#mobileGradient)" filter="url(#shadow)"/>
    <rect x="180" y="108" width="60" height="90" rx="3" fill="#34495e"/>
    <circle cx="210" cy="205" r="8" fill="#1abc9c"/>
    <rect x="195" y="96" width="30" height="4" rx="2" fill="#7f8c8d"/>
    <circle cx="210" cy="95" r="3" fill="#7f8c8d"/>
    <!-- Screen content -->
    <rect x="185" y="115" width="50" height="15" rx="2" fill="#3498db" opacity="0.7"/>
    <rect x="185" y="135" width="35" height="8" rx="1" fill="#95a5a6"/>
    <rect x="185" y="148" width="45" height="8" rx="1" fill="#95a5a6"/>
    <rect x="185" y="161" width="30" height="8" rx="1" fill="#95a5a6"/>
    <rect x="185" y="174" width="40" height="8" rx="1" fill="#95a5a6"/>
  </g>
  
  <!-- Encryption Section (Left) -->
  <g class="section-1" data-narration="Encryption converts data into coded format to prevent unauthorized access - includes AES, SSL/TLS, and end-to-end encryption">
    <rect x="20" y="130" width="120" height="70" class="section-box" filter="url(#shadow)"/>
    <path d="M80 140 L80 150 L70 160 L90 160 L80 150" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="80" y="185" text-anchor="middle" class="label">Encryption</text>
    <text x="80" y="198" text-anchor="middle" class="detail">Data Protection</text>
    <!-- Lock icon -->
    <rect x="73" y="145" width="14" height="10" rx="2" fill="#f39c12"/>
    <path d="M75 145 L75 142 Q80 138 85 142 L85 145" fill="none" stroke="#f39c12" stroke-width="2"/>
  </g>
  
  <!-- Firewalls Section (Top) -->
  <g class="section-2" data-narration="Firewalls monitor and control incoming/outgoing network traffic based on predetermined security rules">
    <rect x="150" y="235" width="120" height="70" class="section-box" filter="url(#shadow)"/>
    <!-- Wall/Barrier icon -->
    <rect x="195" y="250" width="30" height="35" fill="url(#shieldGradient)" rx="3"/>
    <line x1="200" y1="260" x2="220" y2="260" stroke="#fff" stroke-width="2"/>
    <line x1="200" y1="268" x2="220" y2="268" stroke="#fff" stroke-width="2"/>
    <line x1="200" y1="276" x2="220" y2="276" stroke="#fff" stroke-width="2"/>
    <line x1="200" y1="284" x2="220" y2="284" stroke="#fff" stroke-width="2"/>
    <text x="210" y="300" text-anchor="middle" class="label">Firewalls</text>
    <text x="210" y="313" text-anchor="middle" class="detail">Network Filter</text>
  </g>
  
  <!-- Antivirus Section (Right) -->
  <g class="section-3" data-narration="Antivirus software detects, prevents, and removes malicious software including malware, ransomware, and spyware">
    <rect x="280" y="130" width="120" height="70" class="section-box" filter="url(#shadow)"/>
    <!-- Shield with check -->
    <path d="M340 145 L355 150 L355 165 L340 175 L325 165 L325 150 Z" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
    <path d="M335 160 L338 163 L345 155" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="340" y="185" text-anchor="middle" class="label">Antivirus</text>
    <text x="340" y="198" text-anchor="middle" class="detail">Malware Defense</text>
  </g>
  
  <!-- Additional Security Section (Bottom) -->
  <g class="section-4" data-narration="Additional security measures include biometric authentication, VPN, regular updates, and secure app practices">
    <rect x="150" y="320" width="120" height="60" class="section-box" filter="url(#shadow)"/>
    <circle cx="185" cy="350" r="12" fill="#9b59b6" opacity="0.8"/>
    <path d="M182 350 L185 353 L190 347" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="210" cy="350" r="12" fill="#3498db" opacity="0.8"/>
    <rect x="207" y="345" width="6" height="10" fill="#fff"/>
    <rect x="210" y="348" width="6" height="4" fill="#fff"/>
    <circle cx="235" cy="350" r="12" fill="#e67e22" opacity="0.8"/>
    <circle cx="235" cy="350" r="5" fill="#fff"/>
    <text x="210" y="375" text-anchor="middle" class="label">Additional Security</text>
  </g>
  
  <!-- Connection Arrows -->
  <g stroke="#4a90a4" stroke-width="2" fill="none" opacity="0.6">
    <!-- Left to mobile -->
    <path d="M140 165 Q157 165 170 160" marker-end="url(#arrowhead)"/>
    <!-- Right to mobile -->
    <path d="M280 165 Q265 165 250 160"/>
    <!-- Bottom to mobile -->
    <path d="M210 315 Q210 280 210 225"/>
    <!-- Mobile to top (arrows to network) -->
    <path d="M210 100 Q210 85 210 75" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Threat indicators around mobile -->
  <g data-narration="Mobile devices face threats: malware, ransomware, data theft, network attacks, and physical theft">
    <circle cx="160" cy="90" r="6" fill="#e74c3c" opacity="0.7">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="90" r="6" fill="#e74c3c" opacity="0.7">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="160" cy="230" r="6" fill="#e74c3c" opacity="0.7">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="260" cy="230" r="6" fill="#e74c3c" opacity="0.7">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
  
  <!-- Key: Threat indicator legend -->
  <g transform="translate(10, 370)">
    <circle cx="8" cy="8" r="5" fill="#e74c3c" opacity="0.7"/>
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="12" class="detail">Threats</text>
  </g>
  
  <!-- Security layers concept -->
  <g transform="translate(280, 320)">
    <rect x="0" y="0" width="30" height="30" fill="none" stroke="#27ae60" stroke-width="1" rx="3" opacity="0.5"/>
    <rect x="3" y="3" width="24" height="24" fill="none" stroke="#3498db" stroke-width="1" rx="2" opacity="0.5"/>
    <rect x="6" y="6" width="18" height="18" fill="none" stroke="#9b59b6" stroke-width="1" rx="1" opacity="0.5"/>
  </g>
</svg>