<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="iot-security" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d1e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dd3c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5bc4a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7cb8dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9cc8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b8dd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c68b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a87c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4885c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#333" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .layer-box { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .layer-box-1 { animation-delay: 0.2s; }
    .layer-box-2 { animation-delay: 0.4s; }
    .layer-box-3 { animation-delay: 0.6s; }
    .layer-box-4 { animation-delay: 0.8s; }
    .arrow-anim { stroke-dasharray: 50; animation: drawArrow 0.5s ease-out forwards; }
    .icon-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .security-badge { animation: fadeIn 1s ease-out 1.2s forwards; opacity: 0; }
    .threat-text { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .threat-1 { animation-delay: 1.4s; }
    .threat-2 { animation-delay: 1.6s; }
    .threat-3 { animation-delay: 1.8s; }
    .threat-4 { animation-delay: 2.0s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title-anim">IoT Security Architecture</text>
  <line x1="80" y1="38" x2="340" y2="38" stroke="#4299e1" stroke-width="2" class="title-anim"/>
  
  <!-- Layer 4: Application Layer (Top) -->
  <g class="layer-box layer-box-4" data-narration="Application Layer: User interfaces and applications that interact with IoT data, including mobile apps, web dashboards, and control systems.">
    <rect x="50" y="50" width="320" height="60" rx="8" fill="url(#layer4Grad)" filter="url(#shadow)"/>
    <text x="70" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Application Layer</text>
    <text x="70" y="95" font-family="Arial, sans-serif" font-size="11" fill="white">User Interfaces, Dashboards, Mobile Apps</text>
    <g transform="translate(320, 70)" class="icon-pulse">
      <rect x="0" y="0" width="30" height="24" rx="3" fill="white" opacity="0.8"/>
      <rect x="5" y="5" width="20" height="8" rx="1" fill="#d4885c"/>
      <rect x="5" y="16" width="10" height="4" rx="1" fill="#d4885c"/>
    </g>
  </g>
  
  <!-- Arrow 3-4 -->
  <line x1="210" y1="110" x2="210" y2="125" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-anim" style="animation-delay: 0.9s"/>
  <polygon points="205,120 210,130 215,120" fill="#666" class="arrow-anim" style="animation-delay: 0.9s"/>
  
  <!-- Layer 3: Processing Layer -->
  <g class="layer-box layer-box-3" data-narration="Processing Layer: Cloud and edge computing infrastructure that stores, processes, and analyzes IoT data, providing scalability and intelligence.">
    <rect x="50" y="125" width="320" height="60" rx="8" fill="url(#layer3Grad)" filter="url(#shadow)"/>
    <text x="70" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Processing Layer</text>
    <text x="70" y="170" font-family="Arial, sans-serif" font-size="11" fill="white">Cloud/Edge Computing, Data Analytics</text>
    <g transform="translate(315, 145)" class="icon-pulse">
      <ellipse cx="18" cy="12" rx="14" ry="10" fill="white" opacity="0.8"/>
      <ellipse cx="18" cy="8" rx="8" ry="5" fill="white" opacity="0.6"/>
      <ellipse cx="18" cy="12" rx="3" ry="2" fill="#7c68b8"/>
    </g>
  </g>
  
  <!-- Arrow 2-3 -->
  <line x1="210" y1="185" x2="210" y2="200" stroke="#666" stroke-width="2" class="arrow-anim" style="animation-delay: 0.5s"/>
  <polygon points="205,195 210,205 215,195" fill="#666" class="arrow-anim" style="animation-delay: 0.5s"/>
  
  <!-- Layer 2: Network Layer -->
  <g class="layer-box layer-box-2" data-narration="Network Layer: Communication protocols (WiFi, Zigbee, MQTT, LoRa) that transmit data between devices and cloud services.">
    <rect x="50" y="200" width="320" height="60" rx="8" fill="url(#layer2Grad)" filter="url(#shadow)"/>
    <text x="70" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Network Layer</text>
    <text x="70" y="245" font-family="Arial, sans-serif" font-size="11" fill="white">WiFi, Zigbee, MQTT, LoRa, 5G</text>
    <g transform="translate(315, 220)" class="icon-pulse">
      <circle cx="15" cy="15" r="10" fill="white" opacity="0.8"/>
      <circle cx="15" cy="15" r="3" fill="#5a9cc8"/>
      <line x1="15" y1="5" x2="15" y2="0" stroke="#5a9cc8" stroke-width="1.5"/>
      <line x1="15" y1="25" x2="15" y2="30" stroke="#5a9cc8" stroke-width="1.5"/>
      <line x1="5" y1="15" x2="0" y2="15" stroke="#5a9cc8" stroke-width="1.5"/>
      <line x1="25" y1="15" x2="30" y2="15" stroke="#5a9cc8" stroke-width="1.5"/>
    </g>
  </g>
  
  <!-- Arrow 1-2 -->
  <line x1="210" y1="260" x2="210" y2="275" stroke="#666" stroke-width="2" class="arrow-anim" style="animation-delay: 0.3s"/>
  <polygon points="205,270 210,280 215,270" fill="#666" class="arrow-anim" style="animation-delay: 0.3s"/>
  
  <!-- Layer 1: Perception Layer (Bottom) -->
  <g class="layer-box layer-box-1" data-narration="Perception Layer: Physical sensors and actuators that collect data from the physical world and execute actions based on commands.">
    <rect x="50" y="275" width="320" height="60" rx="8" fill="url(#layer1Grad)" filter="url(#shadow)"/>
    <text x="70" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Perception Layer</text>
    <text x="70" y="320" font-family="Arial, sans-serif" font-size="11" fill="white">Sensors, Actuators, RFID, Embedded Devices</text>
    <g transform="translate(315, 295)" class="icon-pulse">
      <rect x="0" y="0" width="30" height="25" rx="4" fill="white" opacity="0.8"/>
      <circle cx="15" cy="12" r="6" fill="none" stroke="#5bc4a8" stroke-width="2"/>
      <circle cx="15" cy="12" r="2" fill="#5bc4a8"/>
    </g>
  </g>
  
  <!-- Security Threats (Right Side) -->
  <g data-narration="Common IoT security threats include device tampering, data interception, unauthorized access, and physical attacks on sensors.">
    <text x="380" y="285" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#c53030" transform="rotate(-90, 380, 285)" class="threat-text threat-1">THREATS</text>
  </g>
  
  <!-- Threat indicators -->
  <g class="threat-text threat-2" data-narration="Device Tampering: Physical attacks on IoT devices to extract credentials or install malware.">
    <circle cx="385" cy="310" r="4" fill="#e53e3e"/>
    <text x="375" y="325" font-family="Arial, sans-serif" font-size="8" fill="#c53030">Tampering</text>
  </g>
  
  <g class="threat-text threat-3" data-narration="Data Interception: Man-in-the-middle attacks on network communications to steal sensitive data.">
    <circle cx="385" cy="340" r="4" fill="#e53e3e"/>
    <text x="370" y="355" font-family="Arial, sans-serif" font-size="8" fill="#c53030">Eavesdrop</text>
  </g>
  
  <g class="threat-text threat-4" data-narration="Unauthorized Access: Exploiting weak authentication to gain control of IoT devices and systems.">
    <circle cx="385" cy="365" r="4" fill="#e53e3e"/>
    <text x="365" y="380" font-family="Arial, sans-serif" font-size="8" fill="#c53030">Unauthorized</text>
  </g>
  
  <!-- Security Solutions Box -->
  <g class="security-badge" data-narration="Key security measures: encryption, authentication, secure boot, regular updates, network segmentation, and anomaly detection.">
    <rect x="10" y="330" width="55" height="55" rx="5" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5"/>
    <text x="37" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#276749">SECURITY</text>
    <text x="37" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#276749">Measures:</text>
    <text x="37" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#2f855a">• Encryption</text>
    <text x="37" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#2f855a">• Auth</text>
    <text x="37" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#2f855a">• Updates</text>
  </g>
  
  <!-- Data flow indicator -->
  <g class="title-anim" style="animation-delay: 1s">
    <text x="225" y="395" font-family="Arial, sans-serif" font-size="9" fill="#4a5568" font-style="italic">Data Flow: Sensors → Network → Cloud → User</text>
  </g>
</svg>