<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="sql-injection-attacks" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#eef2f8"/>
      <stop offset="100%" style="stop-color:#e8e0f0"/>
    </linearGradient>
    <linearGradient id="dangerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .section { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .arrow { animation: slideIn 0.5s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
    .flow-line {
      stroke-dasharray: 5, 5;
      animation: dataFlow 1s linear infinite;
    }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" data-narration="SQL Injection Attack Flow">SQL Injection Attack Flow</text>
  
  <!-- Section 1: Attacker Input -->
  <g class="section section-1" data-narration="Attacker enters malicious SQL input into web form">
    <rect x="20" y="60" width="100" height="70" rx="8" fill="url(#dangerGradient)" filter="url(#shadow)"/>
    <text x="70" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">ATTACKER</text>
    <text x="70" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Input Field</text>
    <rect x="30" y="112" width="80" height="12" rx="3" fill="white"/>
    <text x="70" y="121" text-anchor="middle" font-family="monospace" font-size="8" fill="#c0392b">' OR '1'='1</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow" data-narration="Malicious input sent to web server">
    <path d="M125 95 L165 95" stroke="#e74c3c" stroke-width="2" fill="none" class="flow-line"/>
    <polygon points="165,90 175,95 165,100" fill="#e74c3c"/>
  </g>
  
  <!-- Section 2: Web Application Server -->
  <g class="section section-2" data-narration="Web application processes input without proper sanitization">
    <rect x="170" y="60" width="100" height="70" rx="8" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <text x="220" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Web Application</text>
    <text x="220" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Server</text>
    <text x="220" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="white">(No Validation)</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow" data-narration="Malicious SQL query forwarded to database">
    <path d="M275 95 L315 95" stroke="#e74c3c" stroke-width="2" fill="none" class="flow-line"/>
    <polygon points="315,90 325,95 315,100" fill="#e74c3c"/>
  </g>
  
  <!-- Section 3: Database Server -->
  <g class="section section-3" data-narration="Database executes malicious SQL statement">
    <rect x="320" y="60" width="90" height="70" rx="8" fill="url(#dbGradient)" filter="url(#shadow)"/>
    <text x="365" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Database</text>
    <text x="365" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Server</text>
    <circle cx="365" cy="118" r="6" fill="white" opacity="0.5"/>
    <circle cx="365" cy="118" r="3" fill="white"/>
  </g>
  
  <!-- Section 4: Unauthorized Access -->
  <g class="section section-4" data-narration="Attacker gains unauthorized access to sensitive data">
    <rect x="170" y="170" width="200" height="100" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="270" y="195" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c0392b">⚠ UNAUTHORIZED ACCESS</text>
    <rect x="185" y="210" width="170" height="50" rx="4" fill="#fef0f0"/>
    <text x="270" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c3e50">SELECT * FROM users</text>
    <text x="270" y="245" text-anchor="middle" font-family="monospace" font-size="9" fill="#2c3e50">WHERE password='' OR '1'='1'</text>
    <text x="270" y="262" text-anchor="middle" font-family="Arial" font-size="10" fill="#27ae60" font-weight="bold">✓ Data Exposed!</text>
  </g>
  
  <!-- Attack Indicators -->
  <g class="pulse" data-narration="Visual indicator of attack in progress">
    <circle cx="70" cy="70" r="15" fill="#e74c3c" opacity="0.3"/>
    <circle cx="220" cy="70" r="15" fill="#e74c3c" opacity="0.3"/>
    <circle cx="365" cy="70" r="15" fill="#e74c3c" opacity="0.3"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key security concepts to prevent SQL injection">
    <rect x="20" y="290" width="380" height="100" rx="8" fill="white" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
    <text x="30" y="315" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">🔒 Prevention Methods:</text>
    <text x="30" y="335" font-family="Arial" font-size="10" fill="#34495e">• Parameterized Queries (Prepared Statements)</text>
    <text x="30" y="352" font-family="Arial" font-size="10" fill="#34495e">• Input Validation &amp; Sanitization</text>
    <text x="30" y="369" font-family="Arial" font-size="10" fill="#34495e">• Principle of Least Privilege for DB Users</text>
    <text x="200" y="369" font-family="Arial" font-size="10" fill="#34495e">• Web Application Firewalls (WAF)</text>
  </g>
  
  <!-- Connection Lines to Results -->
  <path d="M365 130 L365 170" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" class="flow-line"/>
  <path d="M220 130 L270 170" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" class="flow-line"/>
  
</svg>