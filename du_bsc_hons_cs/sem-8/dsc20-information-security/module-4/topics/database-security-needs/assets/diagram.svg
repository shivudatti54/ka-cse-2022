<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="database-security-needs" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillarGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillarGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8b3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillarGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d48a1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c3483;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .box-anim-1 { animation: slideInUp 0.8s ease-out 0.2s forwards; opacity: 0; }
    .box-anim-2 { animation: slideInUp 0.8s ease-out 0.4s forwards; opacity: 0; }
    .box-anim-3 { animation: slideInUp 0.8s ease-out 0.6s forwards; opacity: 0; }
    .center-anim { animation: pulse 3s ease-in-out infinite; }
    .arrow-anim { animation: fadeIn 1s ease-out 0.8s forwards; opacity: 0; }
    .sub-anim { animation: slideInUp 0.6s ease-out 1s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title-anim">Database Security Needs</text>
  <line x1="60" y1="48" x2="360" y2="48" stroke="#4a90d9" stroke-width="2" class="title-anim"/>
  
  <!-- Central Database Icon -->
  <g class="center-anim" filter="url(#shadow)">
    <ellipse cx="210" cy="230" rx="55" ry="25" fill="url(#centerGradient)"/>
    <rect x="155" y="205" width="110" height="50" fill="url(#centerGradient)"/>
    <ellipse cx="210" cy="205" rx="55" ry="25" fill="#8e44ad"/>
    <ellipse cx="210" cy="255" rx="55" ry="25" fill="#6c3483"/>
    <line x1="165" y1="205" x2="165" y2="255" stroke="#5b2c6f" stroke-width="1"/>
    <line x1="255" y1="205" x2="255" y2="255" stroke="#5b2c6f" stroke-width="1"/>
    <!-- Lock icon on database -->
    <rect x="200" y="218" width="20" height="16" rx="2" fill="#f1c40f"/>
    <path d="M205 218 L205 212 A5 5 0 0 1 215 212 L215 218" fill="none" stroke="#f1c40f" stroke-width="3"/>
    <circle cx="210" cy="226" r="3" fill="#2c3e50"/>
  </g>
  
  <!-- CIA Triad - Top -->
  <g class="box-anim-1" filter="url(#shadow)">
    <rect x="130" y="75" width="160" height="45" rx="8" fill="white" stroke="url(#pillarGradient1)" stroke-width="2"/>
    <text x="210" y="95" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2d5a8a">CIA TRIAD</text>
    <text x="210" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Confidentiality • Integrity • Availability</text>
  </g>
  
  <!-- Authentication - Left -->
  <g class="box-anim-2" filter="url(#shadow)">
    <rect x="25" y="145" width="115" height="55" rx="8" fill="white" stroke="url(#pillarGradient2)" stroke-width="2"/>
    <circle cx="65" cy="168" r="12" fill="#5cb85c"/>
    <path d="M60 165 L60 171 M67 162 L67 174 M74 165 L74 171" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="95" y="162" font-family="Arial" font-size="13" font-weight="bold" fill="#3d8b3d">Authentication</text>
    <text x="95" y="178" font-family="Arial" font-size="10" fill="#666">Verify user identity</text>
    <text x="95" y="191" font-family="Arial" font-size="10" fill="#666">Multi-factor, SSO</text>
  </g>
  
  <!-- Access Control - Right -->
  <g class="box-anim-2" filter="url(#shadow)">
    <rect x="280" y="145" width="115" height="55" rx="8" fill="white" stroke="url(#pillarGradient3)" stroke-width="2"/>
    <circle cx="320" cy="168" r="12" fill="#f0ad4e"/>
    <rect x="314" y="164" width="12" height="16" rx="1" fill="white"/>
    <circle cx="320" cy="170" r="2" fill="#d48a1e"/>
    <text x="345" y="162" font-family="Arial" font-size="13" font-weight="bold" fill="#d48a1e">Access Control</text>
    <text x="345" y="178" font-family="Arial" font-size="10" fill="#666">RBAC, Permissions</text>
    <text x="345" y="191" font-family="Arial" font-size="10" fill="#666">Least Privilege</text>
  </g>
  
  <!-- Encryption - Bottom -->
  <g class="box-anim-3" filter="url(#shadow)">
    <rect x="145" y="295" width="130" height="55" rx="8" fill="white" stroke="#9b59b6" stroke-width="2"/>
    <rect x="160" y="308" width="20" height="20" fill="#9b59b6" rx="3"/>
    <path d="M165 318 L170 323 L178 312" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="195" y="318" font-family="Arial" font-size="13" font-weight="bold" fill="#6c3483">Encryption</text>
    <text x="195" y="334" font-family="Arial" font-size="10" fill="#666">TLS/SSL, At Rest</text>
    <text x="195" y="347" font-family="Arial" font-size="10" fill="#666">Data Masking</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow-anim">
    <path d="M82 200 L160 220" stroke="#4a90d9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M338 200 L260 220" stroke="#4a90d9" stroke-width="2" fill="none"/>
    <path d="M210 255 L210 295" stroke="#4a90d9" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Narration Boxes -->
  <g class="sub-anim">
    <rect x="15" y="360" width="390" height="30" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="25" y="378" font-family="Arial" font-size="11" fill="#7f8c8d">🔒 Database security protects data confidentiality, integrity, and availability through multiple layers</text>
  </g>
  
  <!-- Data narration attributes (invisible for screen readers) -->
  <title data-narration="The CIA Triad forms the foundation: Confidentiality ensures data is only accessible to authorized users; Integrity guarantees data remains accurate and unaltered; Availability ensures data is accessible when needed."></title>
  <desc data-narration="Authentication verifies user identities through methods like multi-factor authentication and single sign-on."></desc>
  <desc data-narration="Access Control implements role-based access and the principle of least privilege to limit data access."></desc>
  <desc data-narration="Encryption protects data in transit using TLS/SSL and at rest, plus data masking techniques."></desc>
</svg>