<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="database-access-control">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dacGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="macGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rbacGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="abacGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box-anim-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-anim-2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-anim-3 { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-anim-4 { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .connector-anim { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .legend-anim { animation: slideInUp 0.5s ease-out 0.6s forwards; opacity: 0; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #2c3e50; }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #34495e; }
    .box-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #546e7a; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #78909c; }
    .legend-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #455a64; }
    .pulse:hover { animation: pulse 1s infinite; cursor: pointer; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8" ry="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title-anim">Database Access Control Models</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#90a4ae" stroke-width="1" class="title-anim" stroke-dasharray="4,4"/>
  
  <!-- DAC Box -->
  <g class="box-anim-1 pulse" data-narration="DAC (Discretionary Access Control) - Owner-controlled access where data owners grant permissions to users">
    <rect x="20" y="55" width="90" height="110" rx="6" ry="6" fill="url(#dacGrad)" filter="url(#shadow)"/>
    <rect x="20" y="55" width="90" height="22" rx="6" ry="6" fill="#ffb74d" opacity="0.3"/>
    <text x="65" y="71" text-anchor="middle" class="box-title">DAC</text>
    <text x="65" y="90" text-anchor="middle" class="box-text" font-weight="600">Owner-</text>
    <text x="65" y="102" text-anchor="middle" class="box-text" font-weight="600">Controlled</text>
    <text x="65" y="117" text-anchor="middle" class="box-text">Flexible</text>
    <text x="65" y="129" text-anchor="middle" class="box-text">Medium Security</text>
    <text x="65" y="155" text-anchor="middle" class="label-text">Discretionary</text>
  </g>
  
  <!-- MAC Box -->
  <g class="box-anim-2 pulse" data-narration="MAC (Mandatory Access Control) - System-enforced access based on security labels and classifications">
    <rect x="165" y="55" width="90" height="110" rx="6" ry="6" fill="url(#macGrad)" filter="url(#shadow)"/>
    <rect x="165" y="55" width="90" height="22" rx="6" ry="6" fill="#f48fb1" opacity="0.3"/>
    <text x="210" y="71" text-anchor="middle" class="box-title">MAC</text>
    <text x="210" y="90" text-anchor="middle" class="box-text" font-weight="600">System-</text>
    <text x="210" y="102" text-anchor="middle" class="box-text" font-weight="600">Controlled</text>
    <text x="210" y="117" text-anchor="middle" class="box-text">Strict Classif.</text>
    <text x="210" y="129" text-anchor="middle" class="box-text">High Security</text>
    <text x="210" y="155" text-anchor="middle" class="label-text">Mandatory</text>
  </g>
  
  <!-- RBAC Box -->
  <g class="box-anim-3 pulse" data-narration="RBAC (Role-Based Access Control) - Access assigned based on organizational roles, scalable and supports least privilege principle">
    <rect x="310" y="55" width="90" height="110" rx="6" ry="6" fill="url(#rbacGrad)" filter="url(#shadow)"/>
    <rect x="310" y="55" width="90" height="22" rx="6" ry="6" fill="#81c784" opacity="0.3"/>
    <text x="355" y="71" text-anchor="middle" class="box-title">RBAC</text>
    <text x="355" y="90" text-anchor="middle" class="box-text" font-weight="600">Role-</text>
    <text x="355" y="102" text-anchor="middle" class="box-text" font-weight="600">Based</text>
    <text x="355" y="117" text-anchor="middle" class="box-text">Scalable</text>
    <text x="355" y="129" text-anchor="middle" class="box-text">Least Privilege</text>
    <text x="355" y="155" text-anchor="middle" class="label-text">Role-Based</text>
  </g>
  
  <!-- ABAC Box -->
  <g class="box-anim-4 pulse" data-narration="ABAC (Attribute-Based Access Control) - Granular access using user, resource, and environment attributes with dynamic policies">
    <rect x="20" y="190" width="90" height="110" rx="6" ry="6" fill="url(#abacGrad)" filter="url(#shadow)"/>
    <rect x="20" y="190" width="90" height="22" rx="6" ry="6" fill="#64b5f6" opacity="0.3"/>
    <text x="65" y="206" text-anchor="middle" class="box-title">ABAC</text>
    <text x="65" y="225" text-anchor="middle" class="box-text" font-weight="600">Attribute-</text>
    <text x="65" y="237" text-anchor="middle" class="box-text" font-weight="600">Based</text>
    <text x="65" y="252" text-anchor="middle" class="box-text">Highly Granular</text>
    <text x="65" y="264" text-anchor="middle" class="box-text">Dynamic</text>
    <text x="65" y="290" text-anchor="middle" class="label-text">Attribute-Based</text>
  </g>
  
  <!-- Flow Arrow 1: User Authentication -->
  <g class="connector-anim" data-narration="Authentication verifies user identity before authorization checks">
    <path d="M 65 175 L 65 185" stroke="#546e7a" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <rect x="25" y="310" width="80" height="20" rx="4" ry="4" fill="#eceff1" stroke="#b0bec5"/>
    <text x="65" y="324" text-anchor="middle" class="legend-text">1. Authentication</text>
  </g>
  
  <!-- Flow Arrow 2: Authorization -->
  <g class="connector-anim" data-narration="Authorization determines what permissions authenticated users receive">
    <path d="M 210 175 L 210 185" stroke="#546e7a" stroke-width="2" fill="none"/>
    <rect x="170" y="310" width="80" height="20" rx="4" ry="4" fill="#eceff1" stroke="#b0bec5"/>
    <text x="210" y="324" text-anchor="middle" class="legend-text">2. Authorization</text>
  </g>
  
  <!-- Flow Arrow 3: Access Decision -->
  <g class="connector-anim" data-narration="Access decision applies the appropriate model to grant or deny access">
    <path d="M 355 175 L 355 185" stroke="#546e7a" stroke-width="2" fill="none"/>
    <rect x="315" y="310" width="80" height="20" rx="4" ry="4" fill="#eceff1" stroke="#b0bec5"/>
    <text x="355" y="324" text-anchor="middle" class="legend-text">3. Access Decision</text>
  </g>
  
  <!-- Legend/Key -->
  <g class="legend-anim" data-narration="Key security concepts: Authentication → Authorization → Access Control Models">
    <rect x="120" y="345" width="180" height="40" rx="5" ry="5" fill="#ffffff" stroke="#cfd8dc" stroke-width="1" filter="url(#shadow)"/>
    <circle cx="135" cy="365" r="5" fill="#4caf50"/>
    <text x="145" y="368" class="legend-text">AuthN</text>
    <line x1="180" y1="365" x2="195" y2="365" stroke="#90a4ae" stroke-width="1.5"/>
    <circle cx="210" cy="365" r="5" fill="#2196f3"/>
    <text x="220" y="368" class="legend-text">AuthZ</text>
    <line x1="255" y1="365" x2="270" y2="365" stroke="#90a4ae" stroke-width="1.5"/>
    <circle cx="285" cy="365" r="5" fill="#ff9800"/>
    <text x="295" y="368" class="legend-text">Audit</text>
  </g>
  
  <!-- Decorative lock icon -->
  <g class="title-anim">
    <rect x="385" y="10" width="18" height="14" rx="2" ry="2" fill="#607d8b"/>
    <path d="M 388 10 L 388 6 Q 388 3 394 3 Q 400 3 400 6 L 400 10" stroke="#607d8b" stroke-width="2.5" fill="none"/>
  </g>
</svg>