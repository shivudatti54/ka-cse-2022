<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="viruses-worms-trojans-bots">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="virusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="wormGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#3dbdb5"/>
    </linearGradient>
    <linearGradient id="trojanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe66d"/>
      <stop offset="100%" style="stop-color:#ffd93d"/>
    </linearGradient>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#8c7ae6"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .virus-box { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .worm-box { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .trojan-box { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .bot-box { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .icon { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    .label { font-family: Arial, sans-serif; }
    .detail { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="label" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Viruses, Worms, Trojans &amp; Bots</text>
  <text x="210" y="48" text-anchor="middle" class="detail" font-size="11" fill="#7f8c8d">Malware Types Comparison</text>
  
  <!-- Virus Section -->
  <g class="virus-box" data-narration="Computer viruses require a host file and human action to spread. They attach to legitimate programs and replicate when the host is executed.">
    <rect x="15" y="65" width="90" height="85" rx="8" fill="url(#virusGrad)" stroke="#c0392b" stroke-width="2"/>
    <text x="60" y="82" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="white">VIRUS</text>
    <g class="icon" transform="translate(35, 95)">
      <circle cx="12" cy="12" r="10" fill="white" opacity="0.9"/>
      <circle cx="12" cy="12" r="5" fill="#ff6b6b"/>
      <circle cx="8" cy="8" r="2" fill="white"/>
      <circle cx="16" cy="8" r="2" fill="white"/>
      <circle cx="8" cy="16" r="2" fill="white"/>
      <circle cx="16" cy="16" r="2" fill="white"/>
    </g>
    <text x="60" y="138" text-anchor="middle" class="detail" font-size="9" fill="white" font-weight="bold">Requires Host</text>
    <text x="60" y="148" text-anchor="middle" class="detail" font-size="8" fill="white">Human action needed</text>
  </g>
  
  <!-- Worm Section -->
  <g class="worm-box" data-narration="Worms are self-replicating malware that spread autonomously via networks without requiring a host file or human intervention.">
    <rect x="115" y="65" width="90" height="85" rx="8" fill="url(#wormGrad)" stroke="#16a085" stroke-width="2"/>
    <text x="160" y="82" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="white">WORM</text>
    <g class="icon" transform="translate(135, 95)">
      <ellipse cx="15" cy="12" rx="12" ry="6" fill="white" opacity="0.9"/>
      <ellipse cx="8" cy="12" rx="4" ry="3" fill="#4ecdc4"/>
      <ellipse cx="15" cy="12" rx="4" ry="3" fill="#4ecdc4"/>
      <ellipse cx="22" cy="12" rx="4" ry="3" fill="#4ecdc4"/>
      <circle cx="5" cy="12" r="1.5" fill="#3dbdb5"/>
      <circle cx="28" cy="12" r="1.5" fill="#3dbdb5"/>
    </g>
    <text x="160" y="138" text-anchor="middle" class="detail" font-size="9" fill="white" font-weight="bold">Self-Replicating</text>
    <text x="160" y="148" text-anchor="middle" class="detail" font-size="8" fill="white">Spreads via network</text>
  </g>
  
  <!-- Trojan Section -->
  <g class="trojan-box" data-narration="Trojans disguise as legitimate software and create backdoors for attackers. They don't replicate but enable unauthorized access.">
    <rect x="215" y="65" width="90" height="85" rx="8" fill="url(#trojanGrad)" stroke="#f39c12" stroke-width="2"/>
    <text x="260" y="82" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="#5a4a00">TROJAN</text>
    <g class="icon" transform="translate(235, 93)">
      <rect x="5" y="8" width="24" height="20" rx="2" fill="white" opacity="0.9"/>
      <polygon points="17,2 26,12 8,12" fill="#ffe66d"/>
      <rect x="10" y="14" width="4" height="6" fill="#ffe66d"/>
      <rect x="20" y="14" width="4" height="6" fill="#ffe66d"/>
    </g>
    <text x="260" y="138" text-anchor="middle" class="detail" font-size="9" fill="#5a4a00" font-weight="bold">Disguised</text>
    <text x="260" y="148" text-anchor="middle" class="detail" font-size="8" fill="#5a4a00">Creates backdoor</text>
  </g>
  
  <!-- Bot Section -->
  <g class="bot-box" data-narration="Bots are compromised systems controlled remotely in a botnet, automated to execute commands from a command and control server.">
    <rect x="315" y="65" width="90" height="85" rx="8" fill="url(#botGrad)" stroke="#6c5ce7" stroke-width="2"/>
    <text x="360" y="82" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="white">BOT</text>
    <g class="icon" transform="translate(335, 95)">
      <rect x="8" y="2" width="18" height="22" rx="3" fill="white" opacity="0.9"/>
      <circle cx="17" cy="8" r="3" fill="#a29bfe"/>
      <circle cx="17" cy="20" r="4" fill="#8c7ae6"/>
      <line x1="17" y1="11" x2="17" y2="16" stroke="#a29bfe" stroke-width="2"/>
    </g>
    <text x="360" y="138" text-anchor="middle" class="detail" font-size="9" fill="white" font-weight="bold">Botnet Member</text>
    <text x="360" y="148" text-anchor="middle" class="detail" font-size="8" fill="white">Remote control</text>
  </g>
  
  <!-- Comparison Table -->
  <g data-narration="Comparison table showing propagation methods: Virus needs host file and human action, Worm self-replicates via network, Trojan disguises as legitimate, Bot is controlled remotely in botnet.">
    <rect x="15" y="165" width="390" height="100" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <text x="210" y="182" text-anchor="middle" class="label" font-size="12" font-weight="bold" fill="#2c3e50">KEY CHARACTERISTICS</text>
    
    <!-- Table Header -->
    <line x1="15" y1="195" x2="405" y2="195" stroke="#ecf0f1" stroke-width="1"/>
    <text x="60" y="210" text-anchor="middle" class="detail" font-size="10" font-weight="bold" fill="#2c3e50">Type</text>
    <text x="130" y="210" text-anchor="middle" class="detail" font-size="10" font-weight="bold" fill="#2c3e50">Host Needed</text>
    <text x="210" y="210" text-anchor="middle" class="detail" font-size="10" font-weight="bold" fill="#2c3e50">Replication</text>
    <text x="290" y="210" text-anchor="middle" class="detail" font-size="10" font-weight="bold" fill="#2c3e50">Spread Method</text>
    <text x="370" y="210" text-anchor="middle" class="detail" font-size="10" font-weight="bold" fill="#2c3e50">Purpose</text>
    
    <!-- Virus Row -->
    <line x1="15" y1="222" x2="405" y2="222" stroke="#ecf0f1" stroke-width="1"/>
    <text x="60" y="238" text-anchor="middle" class="detail" font-size="9" fill="#e74c3c">Virus</text>
    <text x="130" y="238" text-anchor="middle" class="detail" font-size="9" fill="#27ae60">Yes</text>
    <text x="210" y="238" text-anchor="middle" class="detail" font-size="9" fill="#e67e22">Yes</text>
    <text x="290" y="238" text-anchor="middle" class="detail" font-size="8" fill="#7f8c8d">User action</text>
    <text x="370" y="238" text-anchor="middle" class="detail" font-size="8" fill="#7f8c8d">Damage</text>
    
    <!-- Worm Row -->
    <line x1="15" y1="246" x2="405" y2="246" stroke="#ecf0f1" stroke-width="1"/>
    <text x="60" y="262" text-anchor="middle" class="detail" font-size="9" fill="#1abc9c">Worm</text>
    <text x="130" y="262" text-anchor="middle" class="detail" font-size="9" fill="#e74c3c">No</text>
    <text x="210" y="262" text-anchor="middle" class="detail" font-size="9" fill="#27ae60">Yes</text>
    <text x="290" y="262" text-anchor="middle" class="detail" font-size="8" fill="#7f8c8d">Network</text>
    <text x="370" y="262" text-anchor="middle" class="detail" font-size="8" fill="#7f8c8d">Network harm</text>
    
    <!-- Trojan Row -->
    <line x1="15" y1="270" x2="405" y2="270" stroke="#ecf0f1" stroke-width="1"/>
    <text x="60" y="286" text-anchor="middle" class="detail" font-size="9" fill="#f39c12">Trojan</text>
    <text x="130" y="286" text-anchor="middle" class="detail" font-size="9" fill="#27ae60">Yes</text>
    <text x="210" y="286" text-anchor="middle" class="detail" font-size="9" fill="#e74c3c">No</text>
    <text x="290" y="286" text-anchor="middle" class="detail" font-size="8" fill="#7f8c8d">Trickery</text>
    <text x="370" y="286" text-anchor="middle" class="detail" font-size="8" fill="#7f8c8d">Backdoor</text>
    
    <!-- Bot Row -->
    <text x="60" y="310" text-anchor="middle" class="detail" font-size="9" fill="#9b59b6">Bot</text>
    <text x="130" y="310" text-anchor="middle" class="detail" font-size="9" fill="#27ae60">Yes</text>
    <text x="210" y="310" text-anchor="middle" class="detail" font-size="9" fill="#e74c3c">No</text>
    <text x="290" y="310" text-anchor="middle" class="detail" font-size="8" fill="#7f8c8d">C&amp;C server</text>
    <text x="370" y="310" text-anchor="middle" class="detail" font-size="8" fill="#7f8c8d">Botnet</text>
  </g>
  
  <!-- Relationship Arrows -->
  <g class="arrow" data-narration="Arrows illustrate that while all are malware, they spread differently: viruses need hosts, worms spread autonomously, trojans deceive users, and bots receive commands.">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#95a5a6"/>
      </marker>
    </defs>
    <path d="M 110 108 L 108 108" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 210 108 L 208 108" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 310 108 L 308 108" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom Legend -->
  <g data-narration="Understanding these differences helps in implementing appropriate security controls and incident response strategies.">
    <rect x="15" y="280" width="390" height="110" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" opacity="0"/>
  </g>
  
  <!-- Key Takeaway Box -->
  <g class="virus-box" data-narration="Key takeaway: Viruses need hosts, worms self-replicate, trojans deceive, and bots are remotely controlled. Each requires different defense strategies.">
    <rect x="15" y="280" width="390" height="105" rx="8" fill="#2c3e50" stroke="#34495e" stroke-width="2"/>
    <text x="210" y="300" text-anchor="middle" class="label" font-size="12" font-weight="bold" fill="#ecf0f1">KEY TAKEAWAY</text>
    <text x="210" y="320" text-anchor="middle" class="detail" font-size="10" fill="#bdc3c7">All malware types cause harm but spread differently:</text>
    <text x="210" y="338" text-anchor="middle" class="detail" font-size="9" fill="#ecf0f1">• Virus = attaches to files, needs human help</text>
    <text x="210" y="352" text-anchor="middle" class="detail" font-size="9" fill="#ecf0f1">• Worm = autonomous network spread</text>
    <text x="210" y="366" text-anchor="middle" class="detail" font-size="9" fill="#ecf0f1">• Trojan = hidden in legitimate software</text>
    <text x="210" y="380" text-anchor="middle" class="detail" font-size="9" fill="#ecf0f1">• Bot = part of attacker-controlled network</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="30" cy="370" r="3" fill="#e74c3c" opacity="0.6"/>
  <circle cx="390" cy="60" r="3" fill="#3498db" opacity="0.6"/>
  <circle cx="50" cy="160" r="2" fill="#9b59b6" opacity="0.5"/>
  <circle cx="380" cy="150" r="2" fill="#1abc9c" opacity="0.5"/>
</svg>