<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="overflow-attacks-countermeasures">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="attackGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="defenseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#56ab2f"/>
      <stop offset="100%" style="stop-color:#a8e063"/>
    </linearGradient>
    <linearGradient id="canaryGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes overflowMove {
      0% { transform: translateX(0); }
      50% { transform: translateX(60px); }
      100% { transform: translateX(0); }
    }
    @keyframes shieldPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .label-large { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: white; }
    .section-1 { animation: fadeIn 0.8s ease-out forwards; }
    .section-2 { animation: slideIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideIn 0.8s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: fadeIn 0.8s ease-out 0.9s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s infinite; transform-origin: center; }
    .overflow-anim { animation: overflowMove 3s ease-in-out infinite; }
    .shield-anim { animation: shieldPulse 2s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Overflow Attacks Countermeasures</text>
  
  <!-- Stack Diagram Section -->
  <g class="section-1" data-narration="Stack memory layout showing vulnerable buffer placement">
    <text x="30" y="55" class="label-large">Stack Layout</text>
    
    <!-- Stack frames -->
    <rect x="30" y="65" width="140" height="22" rx="3" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="100" y="80" text-anchor="middle" class="box-title">Return Address</text>
    
    <rect x="30" y="87" width="140" height="22" rx="3" fill="#9b59b6" filter="url(#shadow)"/>
    <text x="100" y="102" text-anchor="middle" class="box-title">Saved Registers</text>
    
    <rect x="30" y="109" width="140" height="22" rx="3" fill="url(#canaryGradient)" filter="url(#shadow)"/>
    <text x="100" y="124" text-anchor="middle" class="box-title">Stack Canary</text>
    
    <rect x="30" y="131" width="140" height="22" rx="3" fill="#3498db" filter="url(#shadow)"/>
    <text x="100" y="146" text-anchor="middle" class="box-title">Local Buffer (8B)</text>
    
    <rect x="30" y="153" width="140" height="22" rx="3" fill="#1abc9c" filter="url(#shadow)"/>
    <text x="100" y="168" text-anchor="middle" class="box-title">Arguments</text>
    
    <!-- Arrow showing direction -->
    <text x="100" y="195" text-anchor="middle" class="detail">↓ Growing Down</text>
  </g>
  
  <!-- Attack Visualization -->
  <g class="section-2" data-narration="Buffer overflow attack showing malicious data overflowing into return address">
    <text x="280" y="55" class="label-large">Attack Vector</text>
    
    <!-- Overflow animation -->
    <g class="overflow-anim">
      <rect x="220" y="131" width="120" height="22" rx="3" fill="url(#attackGradient)" filter="url(#shadow)"/>
      <text x="280" y="146" text-anchor="middle" class="box-title" font-size="10">AAAA...</text>
    </g>
    
    <!-- Overflow arrows -->
    <path d="M 280 155 L 280 175 L 260 175" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 280 155 L 280 175 L 300 175" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <text x="280" y="190" text-anchor="middle" class="detail" fill="#e74c3c">Overflow!</text>
  </g>
  
  <!-- Countermeasures Section -->
  <g class="section-3" data-narration="Three main countermeasures: Stack Canaries, DEP/NX, and ASLR">
    <text x="30" y="225" class="label-large">Countermeasures</text>
    
    <!-- Stack Canary Box -->
    <rect x="30" y="240" width="110" height="50" rx="5" fill="url(#defenseGradient)" filter="url(#shadow)" class="pulse-anim"/>
    <text x="85" y="258" text-anchor="middle" class="box-title">Stack Canary</text>
    <text x="85" y="275" text-anchor="middle" class="detail" fill="white">Detect corruption</text>
    <text x="85" y="285" text-anchor="middle" class="detail" fill="white">before execution</text>
    
    <!-- DEP/NX Box -->
    <rect x="155" y="240" width="110" height="50" rx="5" fill="url(#defenseGradient)" filter="url(#shadow)" class="pulse-anim"/>
    <text x="210" y="258" text-anchor="middle" class="box-title">DEP / NX Bit</text>
    <text x="210" y="275" text-anchor="middle" class="detail" fill="white">Mark stack as</text>
    <text x="210" y="285" text-anchor="middle" class="detail" fill="white">non-executable</text>
    
    <!-- ASLR Box -->
    <rect x="280" y="240" width="110" height="50" rx="5" fill="url(#defenseGradient)" filter="url(#shadow)" class="pulse-anim"/>
    <text x="335" y="258" text-anchor="middle" class="box-title">ASLR</text>
    <text x="335" y="275" text-anchor="middle" class="detail" fill="white">Randomize memory</text>
    <text x="335" y="285" text-anchor="middle" class="detail" fill="white">addresses</text>
  </g>
  
  <!-- How It Works Section -->
  <g class="section-4" data-narration="Defense mechanisms working together to prevent exploitation">
    <text x="30" y="315" class="label-large">Defense in Depth</text>
    
    <!-- Shield icon -->
    <g class="shield-anim">
      <path d="M 85 330 L 130 330 L 130 360 L 107.5 380 L 85 360 Z" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
      <path d="M 95 345 L 95 360 M 107.5 340 L 107.5 365 M 120 345 L 120 360" stroke="white" stroke-width="2"/>
    </g>
    
    <!-- Flow diagram -->
    <text x="160" y="340" class="label">1. Input Validation</text>
    <text x="160" y="355" class="label">2. Bounds Checking</text>
    <text x="160" y="370" class="label">3. Safe Memory Access</text>
    <text x="160" y="385" class="label">4. Runtime Protection</text>
    
    <!-- Key takeaway box -->
    <rect x="270" y="325" width="130" height="60" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="335" y="342" text-anchor="middle" class="label-large" font-size="11">Best Practice</text>
    <text x="335" y="358" text-anchor="middle" class="detail">Use memory-safe</text>
    <text x="335" y="372" text-anchor="middle" class="detail">languages when</text>
    <text x="335" y="382" text-anchor="middle" class="detail">possible (Rust, Go)</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>