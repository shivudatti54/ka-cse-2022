<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="safe-program-coding">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e5f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196f3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-180deg) scale(0); opacity: 0; }
      to { transform: rotate(0) scale(1); opacity: 1; }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .section-box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .section-box:nth-child(4) { animation-delay: 0.8s; }
    .process-step { animation: pulse 2s ease-in-out infinite; }
    .process-step:nth-child(1) { animation-delay: 0s; }
    .process-step:nth-child(2) { animation-delay: 0.3s; }
    .process-step:nth-child(3) { animation-delay: 0.6s; }
    .process-step:nth-child(4) { animation-delay: 0.9s; }
    .process-step:nth-child(5) { animation-delay: 1.2s; }
    .process-step:nth-child(6) { animation-delay: 1.5s; }
    .arrow-line {
      stroke-dasharray: 200;
      animation: drawLine 2s ease-out forwards;
    }
    .vuln-item { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1565c0" class="title">Safe Program Coding</text>
  <text x="210" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Secure Development Lifecycle</text>
  
  <!-- Secure Coding Lifecycle Section -->
  <g class="section-box" data-narration="The Secure Coding Lifecycle shows the six stages of building secure software from planning to maintenance">
    <rect x="20" y="65" width="180" height="155" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="110" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Secure Coding Lifecycle</text>
    
    <!-- Process Steps in circular arrangement -->
    <g transform="translate(110, 145)">
      <!-- Step 1: Requirements -->
      <g class="process-step" style="animation-delay: 0s">
        <circle cx="0" cy="-45" r="12" fill="#4caf50"/>
        <text x="0" y="-45" text-anchor="middle" font-family="Arial" font-size="7" fill="white" dy="3">1</text>
        <text x="0" y="-28" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Requirements</text>
      </g>
      <!-- Step 2: Threat Modeling -->
      <g class="process-step" style="animation-delay: 0.2s">
        <circle cx="38" cy="-22" r="12" fill="#2196f3"/>
        <text x="38" y="-22" text-anchor="middle" font-family="Arial" font-size="7" fill="white" dy="3">2</text>
        <text x="38" y="-5" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Threat</text>
        <text x="38" y="6" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Modeling</text>
      </g>
      <!-- Step 3: Secure Design -->
      <g class="process-step" style="animation-delay: 0.4s">
        <circle cx="38" cy="22" r="12" fill="#9c27b0"/>
        <text x="38" y="22" text-anchor="middle" font-family="Arial" font-size="7" fill="white" dy="3">3</text>
        <text x="38" y="39" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Secure</text>
        <text x="38" y="50" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Design</text>
      </g>
      <!-- Step 4: Implementation -->
      <g class="process-step" style="animation-delay: 0.6s">
        <circle cx="0" cy="45" r="12" fill="#ff9800"/>
        <text x="0" y="45" text-anchor="middle" font-family="Arial" font-size="7" fill="white" dy="3">4</text>
        <text x="0" y="62" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Implementation</text>
      </g>
      <!-- Step 5: Testing -->
      <g class="process-step" style="animation-delay: 0.8s">
        <circle cx="-38" cy="22" r="12" fill="#f44336"/>
        <text x="-38" y="22" text-anchor="middle" font-family="Arial" font-size="7" fill="white" dy="3">5</text>
        <text x="-38" y="39" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Testing</text>
        <text x="-38" y="50" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">&amp; Review</text>
      </g>
      <!-- Step 6: Deployment -->
      <g class="process-step" style="animation-delay: 1s">
        <circle cx="-38" cy="-22" r="12" fill="#00bcd4"/>
        <text x="-38" y="-22" text-anchor="middle" font-family="Arial" font-size="7" fill="white" dy="3">6</text>
        <text x="-38" y="-5" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Deployment</text>
      </g>
    </g>
  </g>
  
  <!-- OWASP Top 10 Section -->
  <g class="section-box" data-narration="OWASP Top 10 lists the most critical web application security risks that developers must address">
    <rect x="210" y="65" width="190" height="155" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="305" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c62828">OWASP Top 10</text>
    <text x="305" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Key Vulnerabilities</text>
    
    <!-- Vulnerability items -->
    <g transform="translate(220, 108)">
      <g class="vuln-item" style="animation-delay: 0.3s">
        <circle cx="6" cy="6" r="4" fill="#e53935"/>
        <text x="16" y="9" font-family="Arial" font-size="9" fill="#333">Broken Access Control</text>
      </g>
      <g class="vuln-item" style="animation-delay: 0.4s">
        <circle cx="6" cy="24" r="4" fill="#fb8c00"/>
        <text x="16" y="27" font-family="Arial" font-size="9" fill="#333">Cryptographic Failures</text>
      </g>
      <g class="vuln-item" style="animation-delay: 0.5s">
        <circle cx="6" cy="42" r="4" fill="#43a047"/>
        <text x="16" y="45" font-family="Arial" font-size="9" fill="#333">Injection (SQL, NoSQL, CMD)</text>
      </g>
      <g class="vuln-item" style="animation-delay: 0.6s">
        <circle cx="6" cy="60" r="4" fill="#1e88e5"/>
        <text x="16" y="63" font-family="Arial" font-size="9" fill="#333">Insecure Design</text>
      </g>
      <g class="vuln-item" style="animation-delay: 0.7s">
        <circle cx="6" cy="78" r="4" fill="#8e24aa"/>
        <text x="16" y="81" font-family="Arial" font-size="9" fill="#333">Security Misconfiguration</text>
      </g>
      <g class="vuln-item" style="animation-delay: 0.8s">
        <circle cx="6" cy="96" r="4" fill="#00acc1"/>
        <text x="16" y="99" font-family="Arial" font-size="9" fill="#333">Vulnerable Components</text>
      </g>
    </g>
  </g>
  
  <!-- Best Practices Section -->
  <g class="section-box" data-narration="Follow these secure coding practices to prevent vulnerabilities and protect your applications">
    <rect x="20" y="230" width="180" height="155" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="110" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">Secure Coding Practices</text>
    
    <g transform="translate(30, 262)">
      <rect x="0" y="0" width="160" height="28" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
      <text x="80" y="12" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32" font-weight="bold">Input Validation</text>
      <text x="80" y="23" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Validate all user inputs</text>
      
      <rect x="0" y="35" width="160" height="28" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
      <text x="80" y="47" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0" font-weight="bold">Authentication</text>
      <text x="80" y="58" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Strong password policies</text>
      
      <rect x="0" y="70" width="160" height="28" rx="4" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
      <text x="80" y="82" text-anchor="middle" font-family="Arial" font-size="9" fill="#c2185b" font-weight="bold">Encryption</text>
      <text x="80" y="93" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Encrypt sensitive data</text>
      
      <rect x="0" y="105" width="160" height="28" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
      <text x="80" y="117" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100" font-weight="bold">Error Handling</text>
      <text x="80" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Avoid information leakage</text>
    </g>
  </g>
  
  <!-- Key Benefits Section -->
  <g class="section-box" data-narration="Implementing secure coding protects users, reduces costs, and ensures regulatory compliance">
    <rect x="210" y="230" width="190" height="155" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="305" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6a1b9a">Why Secure Coding Matters</text>
    
    <!-- Benefits with icons -->
    <g transform="translate(225, 262)">
      <g>
        <circle cx="12" cy="12" r="10" fill="#4caf50"/>
        <path d="M7 12 L11 16 L17 8" stroke="white" stroke-width="2" fill="none"/>
        <text x="28" y="16" font-family="Arial" font-size="10" fill="#333">Protect User Data</text>
      </g>
      <g transform="translate(0, 30)">
        <circle cx="12" cy="12" r="10" fill="#2196f3"/>
        <text x="8" y="16" font-family="Arial" font-size="12" fill="white" font-weight="bold">$</text>
        <text x="28" y="16" font-family="Arial" font-size="10" fill="#333">Reduce Breach Costs</text>
      </g>
      <g transform="translate(0, 60)">
        <circle cx="12" cy="12" r="10" fill="#ff9800"/>
        <path d="M12 5 L12 19 M5 12 L19 12" stroke="white" stroke-width="2"/>
        <text x="28" y="16" font-family="Arial" font-size="10" fill="#333">Regulatory Compliance</text>
      </g>
      <g transform="translate(0, 90)">
        <circle cx="12" cy="12" r="10" fill="#9c27b0"/>
        <text x="7" y="16" font-family="Arial" font-size="10" fill="white">★</text>
        <text x="28" y="16" font-family="Arial" font-size="10" fill="#333">Build Trust &amp; Reputation</text>
      </g>
    </g>
  </g>
  
  <!-- Decorative arrow between sections -->
  <g class="arrow-line">
    <path d="M200 115 L205 115" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Footer -->
  <rect x="20" y="385" width="380" height="1" fill="#ddd"/>
  <text x="210" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">NEP 2024 - Industry-Ready Skills</text>
</svg>