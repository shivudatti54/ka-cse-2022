<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="malicious-software-types" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rootGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc3545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c82333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch1Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fd7e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch2Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6f42c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a32a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch3Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#20c997;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#17a2b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch4Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28a745;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#218838;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch5Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056b3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-weight: bold; }
    .node { animation: slideIn 0.6s ease-out backwards; }
    .node-root { animation: slideIn 0.5s ease-out, pulse 3s infinite 1.5s; }
    .subnode { animation: fadeIn 0.8s ease-out backwards; }
    .connector { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .connector-delayed { stroke-dasharray: 100; animation: drawLine 1s ease-out 0.3s forwards; }
    .narration { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" fill="#333" font-weight="bold">Malicious Software Types</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#dc3545" stroke-width="2" opacity="0.5"/>
  
  <!-- Root Node: Malware -->
  <g class="node-root" filter="url(#shadow)">
    <rect x="155" y="50" width="110" height="35" rx="8" fill="url(#rootGradient)"/>
    <text x="210" y="73" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">MALWARE</text>
  </g>
  
  <!-- Connectors from Root -->
  <path class="connector" d="M210 85 L210 100" stroke="#dc3545" stroke-width="2" fill="none"/>
  <path class="connector" d="M210 100 L60 130" stroke="#dc3545" stroke-width="1.5" fill="none"/>
  <path class="connector" d="M210 100 L150 130" stroke="#dc3545" stroke-width="1.5" fill="none"/>
  <path class="connector" d="M210 100 L240 130" stroke="#dc3545" stroke-width="1.5" fill="none"/>
  <path class="connector" d="M210 100 L330 130" stroke="#dc3545" stroke-width="1.5" fill="none"/>
  
  <!-- Branch 1: Self-Replicating -->
  <g class="node" style="animation-delay: 0.1s" filter="url(#shadow)">
    <rect x="15" y="135" width="90" height="30" rx="6" fill="url(#branch1Gradient)"/>
    <text x="60" y="155" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">Self-Replicating</text>
  </g>
  <path class="connector-delayed" d="M60 165 L60 185" stroke="#fd7e14" stroke-width="1.5" fill="none"/>
  
  <!-- Subnodes Branch 1 -->
  <g class="subnode" style="animation-delay: 0.2s">
    <rect x="10" y="190" width="45" height="22" rx="4" fill="#ffe0b2"/>
    <text x="32" y="206" text-anchor="middle" fill="#d35400" font-size="9" font-family="Arial">Virus</text>
  </g>
  <g class="subnode" style="animation-delay: 0.3s">
    <rect x="65" y="190" width="45" height="22" rx="4" fill="#ffe0b2"/>
    <text x="87" y="206" text-anchor="middle" fill="#d35400" font-size="9" font-family="Arial">Worm</text>
  </g>
  <text x="60" y="222" text-anchor="middle" class="narration" data-narration="Malware that spreads automatically without user intervention">Requires host file</text>
  
  <!-- Branch 2: Disguised -->
  <g class="node" style="animation-delay: 0.15s" filter="url(#shadow)">
    <rect x="115" y="135" width="70" height="30" rx="6" fill="url(#branch2Gradient)"/>
    <text x="150" y="155" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">Disguised</text>
  </g>
  <path class="connector-delayed" d="M150 165 L150 185" stroke="#6f42c1" stroke-width="1.5" fill="none"/>
  
  <!-- Subnodes Branch 2 -->
  <g class="subnode" style="animation-delay: 0.25s">
    <rect x="115" y="190" width="32" height="22" rx="4" fill="#e1d5ff"/>
    <text x="131" y="206" text-anchor="middle" fill="#4a2c7a" font-size="9" font-family="Arial">Trojan</text>
  </g>
  <g class="subnode" style="animation-delay: 0.35s">
    <rect x="153" y="190" width="42" height="22" rx="4" fill="#e1d5ff"/>
    <text x="174" y="206" text-anchor="middle" fill="#4a2c7a" font-size="9" font-family="Arial">Rootkit</text>
  </g>
  <text x="150" y="222" text-anchor="middle" class="narration" data-narration="Malware that hides its true purpose from users">Hides true intent</text>
  
  <!-- Branch 3: Information Stealers -->
  <g class="node" style="animation-delay: 0.2s" filter="url(#shadow)">
    <rect x="205" y="135" width="70" height="30" rx="6" fill="url(#branch3Gradient)"/>
    <text x="240" y="155" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">Info Stealers</text>
  </g>
  <path class="connector-delayed" d="M240 165 L240 185" stroke="#20c997" stroke-width="1.5" fill="none"/>
  
  <!-- Subnodes Branch 3 -->
  <g class="subnode" style="animation-delay: 0.3s">
    <rect x="220" y="190" width="40" height="22" rx="4" fill="#b2dfdb"/>
    <text x="240" y="206" text-anchor="middle" fill="#00695c" font-size="9" font-family="Arial">Spyware</text>
  </g>
  <g class="subnode" style="animation-delay: 0.4s">
    <rect x="225" y="215" width="30" height="22" rx="4" fill="#b2dfdb"/>
    <text x="240" y="231" text-anchor="middle" fill="#00695c" font-size="9" font-family="Arial">Keylog</text>
  </g>
  <text x="240" y="245" text-anchor="middle" class="narration" data-narration="Steals sensitive data and user credentials">Exfiltrates data</text>
  
  <!-- Branch 4: Financial -->
  <g class="node" style="animation-delay: 0.25s" filter="url(#shadow)">
    <rect x="305" y="135" width="65" height="30" rx="6" fill="url(#branch4Gradient)"/>
    <text x="337" y="155" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">Financial</text>
  </g>
  <path class="connector-delayed" d="M337 165 L337 185" stroke="#28a745" stroke-width="1.5" fill="none"/>
  
  <!-- Subnodes Branch 4 -->
  <g class="subnode" style="animation-delay: 0.35s">
    <rect x="320" y="190" width="35" height="22" rx="4" fill="#c8e6c9"/>
    <text x="337" y="206" text-anchor="middle" fill="#1b5e20" font-size="9" font-family="Arial">Ransom</text>
  </g>
  <g class="subnode" style="animation-delay: 0.45s">
    <rect x="320" y="215" width="35" height="22" rx="4" fill="#c8e6c9"/>
    <text x="337" y="231" text-anchor="middle" fill="#1b5e20" font-size="9" font-family="Arial">Adware</text>
  </g>
  <text x="337" y="245" text-anchor="middle" class="narration" data-narration="Targets financial gain from victims">Monetary motive</text>
  
  <!-- Bottom Legend -->
  <g class="subnode" style="animation-delay: 0.6s">
    <rect x="30" y="300" width="360" height="85" rx="8" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="320" text-anchor="middle" fill="#333" font-size="12" font-weight="bold" font-family="Arial">Key Characteristics</text>
    
    <circle cx="55" cy="340" r="5" fill="#dc3545"/>
    <text x="70" y="344" fill="#555" font-size="9" font-family="Arial">Viruses: Attaches to files</text>
    
    <circle cx="55" cy="358" r="5" fill="#6f42c1"/>
    <text x="70" y="362" fill="#555" font-size="9" font-family="Arial">Trojans: Masquerades as legit</text>
    
    <circle cx="55" cy="376" r="5" fill="#28a745"/>
    <text x="70" y="380" fill="#555" font-size="9" font-family="Arial">Ransomware: Encrypts data</text>
    
    <text x="200" y="344" fill="#555" font-size="9" font-family="Arial">Worms: Self-propagating</text>
    <text x="200" y="358" fill="#555" font-size="9" font-family="Arial">Rootkits: Stealth access</text>
    <text x="200" y="372" fill="#555" font-size="9" font-family="Arial">Botnets: Network of infected</text>
  </g>
  
  <!-- Animated highlight -->
  <rect x="25" y="295" width="370" height="95" rx="10" fill="none" stroke="#007bff" stroke-width="2" opacity="0" style="animation: fadeIn 2s ease-out 1s forwards;">
    <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite" begin="1s"/>
  </rect>
</svg>