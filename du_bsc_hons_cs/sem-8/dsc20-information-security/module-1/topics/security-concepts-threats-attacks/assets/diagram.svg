<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="security-concepts-threats-attacks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="confidentialityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="integrityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <linearGradient id="availabilityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#d68a2a"/>
    </linearGradient>
    <linearGradient id="threatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9534f"/>
      <stop offset="100%" style="stop-color:#a33d3a"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .confidentiality { animation: slideInLeft 0.6s ease-out 0.2s both, pulse 3s ease-in-out 2s infinite; }
    .integrity { animation: fadeIn 0.6s ease-out 0.4s both, pulse 3s ease-in-out 2.5s infinite; }
    .availability { animation: slideInRight 0.6s ease-out 0.6s both, pulse 3s ease-in-out 3s infinite; }
    .threat-box { animation: fadeIn 0.8s ease-out 0.8s both; }
    .attack-box { animation: slideInLeft 0.6s ease-out 1s both; }
    .arrow { animation: fadeIn 0.5s ease-out 1.2s both; }
    .center-text { animation: fadeIn 0.8s ease-out 0.5s both; }
    .subtitle { animation: fadeIn 0.6s ease-out 0.3s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Security Concepts</text>
  <text x="210" y="46" text-anchor="middle" class="subtitle" font-family="Arial, sans-serif" font-size="13" fill="#5a6c7d">Threats, Attacks &amp; CIA Triad</text>
  
  <!-- CIA Triad Triangle -->
  <polygon points="210,100 130,200 290,200" fill="none" stroke="#34495e" stroke-width="2" class="center-text"/>
  
  <!-- Confidentiality (Top) -->
  <g class="confidentiality" data-narration="Confidentiality ensures information is accessible only to authorized individuals, protecting sensitive data like personal identification numbers, financial records, and trade secrets through access controls.">
    <circle cx="210" cy="100" r="35" fill="url(#confidentialityGrad)"/>
    <text x="210" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">C</text>
    <text x="210" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Confidentiality</text>
  </g>
  
  <!-- Integrity (Bottom Left) -->
  <g class="integrity" data-narration="Integrity ensures data accuracy and consistency, protecting information from unauthorized modification and ensuring it remains reliable and accurate.">
    <circle cx="130" cy="200" r="35" fill="url(#integrityGrad)"/>
    <text x="130" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">I</text>
    <text x="130" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Integrity</text>
  </g>
  
  <!-- Availability (Bottom Right) -->
  <g class="availability" data-narration="Availability ensures timely and reliable access to data for authorized users, protecting against system downtime and service disruptions.">
    <circle cx="290" cy="200" r="35" fill="url(#availabilityGrad)"/>
    <text x="290" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">A</text>
    <text x="290" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Availability</text>
  </g>
  
  <!-- Center label -->
  <text x="210" y="165" text-anchor="middle" class="center-text" font-family="Arial, sans-serif" font-size="9" fill="#34495e">CIA TRIAD</text>
  
  <!-- Arrows connecting elements -->
  <g class="arrow">
    <path d="M160 115 L175 130" stroke="#34495e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M260 115 L245 130" stroke="#34495e" stroke-width="1.5" fill="none"/>
    <path d="M155 185 L140 170" stroke="#34495e" stroke-width="1.5" fill="none"/>
    <path d="M265 185 L280 170" stroke="#34495e" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Threats Box -->
  <g class="threat-box" data-narration="Cyber threats include hackers, malware, phishing, ransomware, and state-sponsored attacks that aim to compromise systems for financial gain or espionage.">
    <rect x="15" y="260" width="130" height="60" rx="6" fill="#fef2f2" stroke="#d9534f" stroke-width="1.5"/>
    <text x="80" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d9534f">THREATS</text>
    <text x="80" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5a3d3b">Hackers, Malware,</text>
    <text x="80" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5a3d3b">Phishing, Ransomware</text>
  </g>
  
  <!-- Attack Vectors Box -->
  <g class="attack-box" data-narration="Attack vectors are methods used by malicious actors to gain unauthorized access to systems, including exploits, social engineering, and vulnerabilities.">
    <rect x="275" y="260" width="130" height="60" rx="6" fill="#fff8f0" stroke="#f0ad4e" stroke-width="1.5"/>
    <text x="340" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d68a2a">ATTACK VECTORS</text>
    <text x="340" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7d5a2a">Exploits, Social Eng.,</text>
    <text x="340" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7d5a2a">Vulnerabilities</text>
  </g>
  
  <!-- Security Practices Box -->
  <g class="center-text" data-narration="Security practices include access controls, encryption, firewalls, intrusion detection systems, and regular security audits to protect against threats.">
    <rect x="145" y="330" width="130" height="55" rx="6" fill="#f0f8f0" stroke="#5cb85c" stroke-width="1.5"/>
    <text x="210" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3d8b3d">SECURITY PRACTICES</text>
    <text x="210" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d6b2d">Encryption, Firewalls,</text>
    <text x="210" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d6b2d">Access Controls, IDS</text>
  </g>
  
  <!-- Connection arrows -->
  <path d="M80 260 L130 235" stroke="#d9534f" stroke-width="1" stroke-dasharray="3,2" fill="none" class="arrow"/>
  <path d="M340 260 L290 235" stroke="#f0ad4e" stroke-width="1" stroke-dasharray="3,2" fill="none" class="arrow"/>
  <path d="M210 330 L210 300" stroke="#5cb85c" stroke-width="1" stroke-dasharray="3,2" fill="none" class="arrow"/>
  
  <!-- Decorative shield icon -->
  <g class="center-text" style="animation: float 3s ease-in-out infinite;">
    <path d="M210 225 L200 225 L200 235 Q200 250 210 255 Q220 250 220 235 L220 225 Z" fill="#4a90d9" opacity="0.3"/>
  </g>
  
  <!-- Legend/Domain indicator -->
  <text x="210" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">NEP 2024 - University of Delhi Computer Science</text>
</svg>