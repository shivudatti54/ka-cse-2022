<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="security-functional-requirements">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fcf4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="confGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d4ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6eb3ff;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="intGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8f0b8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7dd87d;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="availGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0a8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffc870;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 2px #4a6fa5); }
      50% { filter: drop-shadow(0 0 8px #4a90d9); }
    }
    .title { animation: titleGlow 3s ease-in-out infinite; }
    .circle-anim { animation: pulse 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .fade-section { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-section { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c5282" class="title">Security Functional Requirements</text>
  
  <!-- CIA Triad Section - data-narration -->
  <g data-narration="The CIA Triad forms the foundation of security functional requirements with three core principles: Confidentiality, Integrity, and Availability">
    <!-- Confidentiality Circle -->
    <g class="circle-anim delay-1" style="transform-origin: 130px 200px;">
      <circle cx="130" cy="200" r="70" fill="url(#confGrad)" filter="url(#shadow)"/>
      <text x="130" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a4a7a">Confidentiality</text>
      <text x="130" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a4a7a">Prevent unauthorized</text>
      <text x="130" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a4a7a">disclosure</text>
      <rect x="95" y="240" width="70" height="18" rx="4" fill="#fff" opacity="0.7"/>
      <text x="130" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a4a7a">Access Control</text>
    </g>
    
    <!-- Integrity Circle -->
    <g class="circle-anim delay-2" style="transform-origin: 290px 200px;">
      <circle cx="290" cy="200" r="70" fill="url(#intGrad)" filter="url(#shadow)"/>
      <text x="290" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a6a1a">Integrity</text>
      <text x="290" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a6a1a">Prevent unauthorized</text>
      <text x="290" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a6a1a">modification</text>
      <rect x="255" y="240" width="70" height="18" rx="4" fill="#fff" opacity="0.7"/>
      <text x="290" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a6a1a">Checksums</text>
    </g>
    
    <!-- Availability Circle -->
    <g class="circle-anim delay-3" style="transform-origin: 210px 300px;">
      <circle cx="210" cy="300" r="70" fill="url(#availGrad)" filter="url(#shadow)"/>
      <text x="210" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7a4a1a">Availability</text>
      <text x="210" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7a4a1a">Ensure timely</text>
      <text x="210" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7a4a1a">access</text>
      <rect x="175" y="335" width="70" height="18" rx="4" fill="#fff" opacity="0.7"/>
      <text x="210" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7a4a1a">Redundancy</text>
    </g>
  </g>
  
  <!-- Arrows/Connections -->
  <g data-narration="These three requirements work together to provide comprehensive security coverage">
    <line x1="165" y1="175" x2="255" y2="175" stroke="#888" stroke-width="2" stroke-dasharray="4,2" class="slide-section delay-3"/>
    <line x1="245" y1="250" x2="175" y2="250" stroke="#888" stroke-width="2" stroke-dasharray="4,2" class="slide-section delay-4"/>
    <polygon points="260,170 250,178 255,185" fill="#888" class="slide-section delay-3"/>
    <polygon points="170,255 180,247 175,240" fill="#888" class="slide-section delay-4"/>
  </g>
  
  <!-- Key Concept Box -->
  <g data-narration="Security functional requirements provide a stable framework for designing and evaluating security solutions" class="fade-section delay-4">
    <rect x="20" y="370" width="380" height="22" rx="4" fill="#2c5282" opacity="0.1"/>
    <text x="210" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c5282">Foundation for security architecture, risk assessment &amp; compliance</text>
  </g>
  
  <!-- Center badge -->
  <g class="fade-section delay-2">
    <circle cx="210" cy="200" r="25" fill="#fff" stroke="#ddd" stroke-width="2"/>
    <text x="210" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#444">CIA</text>
    <text x="210" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Triad</text>
  </g>
  
  <!-- Legend indicators -->
  <g data-narration="Each component of the CIA triad addresses specific security concerns">
    <circle cx="35" cy="95" r="6" fill="#6eb3ff"/>
    <text x="48" y="99" font-family="Arial, sans-serif" font-size="10" fill="#444">Data Protection</text>
    <circle cx="35" cy="115" r="6" fill="#7dd87d"/>
    <text x="48" y="119" font-family="Arial, sans-serif" font-size="10" fill="#444">Data Accuracy</text>
    <circle cx="35" cy="135" r="6" fill="#ffc870"/>
    <text x="48" y="139" font-family="Arial, sans-serif" font-size="10" fill="#444">System Uptime</text>
  </g>
</svg>