<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="fundamental-security-design-principles" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4ecf4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fcce0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5e8c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9dd4a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e0b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8a0d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4b8a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8d8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0c0d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#6a8fa3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-weight: bold; fill: #2c5f7c; }
    .subtitle { animation: fadeIn 1s ease-out 0.3s both; font-family: Arial, sans-serif; fill: #4a7a94; }
    .principle-box { animation: slideIn 0.6s ease-out both; filter: url(#shadow); }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.35s; }
    .box3 { animation-delay: 0.5s; }
    .box4 { animation-delay: 0.65s; }
    .box5 { animation-delay: 0.8s; }
    .box6 { animation-delay: 0.95s; }
    .label { font-family: Arial, sans-serif; font-weight: bold; font-size: 14px; fill: #1a3a4a; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #3a5a6a; }
    .arrow { stroke: #7aa8c0; stroke-width: 2; fill: none; stroke-dasharray: 100; animation: drawLine 1.5s ease-out forwards; }
    .connector { stroke: #6a9ab8; stroke-width: 1.5; fill: none; }
    .pulse-element { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .center-icon { fill: #3d7a98; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20">Fundamental Security</text>
  <text x="210" y="52" text-anchor="middle" class="title" font-size="20">Design Principles</text>
  <text x="210" y="72" text-anchor="middle" class="subtitle" font-size="12">Core Concepts for Secure Systems</text>
  
  <!-- Central Hub -->
  <circle cx="210" cy="200" r="35" fill="#3d7a98" class="pulse-element"/>
  <text x="210" y="195" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Security</text>
  <text x="210" y="210" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Design</text>
  
  <!-- Top Row - First 3 principles -->
  <g class="principle-box box1" data-narration="Least Privilege ensures users get minimum necessary access rights to perform their tasks">
    <rect x="20" y="95" width="110" height="60" rx="8" fill="url(#boxGradient1)" stroke="#6ab0cc" stroke-width="1.5"/>
    <text x="75" y="115" text-anchor="middle" class="label">Least Privilege</text>
    <text x="75" y="135" text-anchor="middle" class="detail">Minimize access rights</text>
    <text x="75" y="148" text-anchor="middle" class="detail">for users</text>
  </g>
  
  <g class="principle-box box2" data-narration="Separation of Duties divides critical tasks among multiple parties to prevent fraud">
    <rect x="155" y="95" width="110" height="60" rx="8" fill="url(#boxGradient2)" stroke="#7ac88a" stroke-width="1.5"/>
    <text x="210" y="115" text-anchor="middle" class="label">Separation of Duties</text>
    <text x="210" y="135" text-anchor="middle" class="detail">Divide critical tasks</text>
    <text x="210" y="148" text-anchor="middle" class="detail">among parties</text>
  </g>
  
  <g class="principle-box box3" data-narration="Defense in Depth uses multiple layers of security controls throughout the system">
    <rect x="290" y="95" width="110" height="60" rx="8" fill="url(#boxGradient3)" stroke="#d4b070" stroke-width="1.5"/>
    <text x="345" y="115" text-anchor="middle" class="label">Defense in Depth</text>
    <text x="345" y="135" text-anchor="middle" class="detail">Multiple security</text>
    <text x="345" y="148" text-anchor="middle" class="detail">layers</text>
  </g>
  
  <!-- Bottom Row - Last 3 principles -->
  <g class="principle-box box4" data-narration="Fail-Safe ensures systems default to a secure state when errors occur">
    <rect x="20" y="255" width="110" height="60" rx="8" fill="url(#boxGradient4)" stroke="#b088c8" stroke-width="1.5"/>
    <text x="75" y="275" text-anchor="middle" class="label">Fail-Safe</text>
    <text x="75" y="295" text-anchor="middle" class="detail">Default to secure</text>
    <text x="75" y="308" text-anchor="middle" class="detail">state on error</text>
  </g>
  
  <g class="principle-box box5" data-narration="Economy of Mechanism advocates for simple, small, understandable security mechanisms">
    <rect x="155" y="255" width="110" height="60" rx="8" fill="url(#boxGradient5)" stroke="#c8a088" stroke-width="1.5"/>
    <text x="210" y="275" text-anchor="middle" class="label">Economy of</text>
    <text x="210" y="290" text-anchor="middle" class="label">Mechanism</text>
    <text x="210" y="308" text-anchor="middle" class="detail">Keep it simple</text>
  </g>
  
  <g class="principle-box box6" data-narration="Complete Mediation requires checking authorization for every access request">
    <rect x="290" y="255" width="110" height="60" rx="8" fill="url(#boxGradient6)" stroke="#88a8c8" stroke-width="1.5"/>
    <text x="345" y="275" text-anchor="middle" class="label">Complete Mediation</text>
    <text x="345" y="295" text-anchor="middle" class="detail">Check every</text>
    <text x="345" y="308" text-anchor="middle" class="detail">access request</text>
  </g>
  
  <!-- Connecting Lines from center to boxes -->
  <line x1="185" y1="175" x2="130" y2="125" class="connector"/>
  <line x1="200" y1="172" x2="200" y2="155" class="connector"/>
  <line x1="225" y1="175" x2="290" y2="125" class="connector"/>
  <line x1="185" y1="225" x2="130" y2="285" class="connector"/>
  <line x1="200" y1="228" x2="200" y2="315" class="connector"/>
  <line x1="225" y1="225" x2="290" y2="285" class="connector"/>
  
  <!-- Arrow heads -->
  <polygon points="130,125 138,120 136,132" fill="#6a9ab8"/>
  <polygon points="290,125 282,120 284,132" fill="#6a9ab8"/>
  <polygon points="130,285 138,280 136,292" fill="#6a9ab8"/>
  <polygon points="290,285 282,280 284,292" fill="#6a9ab8"/>
  
  <!-- Decorative shield icon -->
  <g transform="translate(10, 370)">
    <path d="M8 2 L20 5 L20 12 C20 17 14 21 14 21 C14 21 8 17 8 12 Z" fill="#3d7a98" opacity="0.6"/>
  </g>
  <text x="40" y="380" class="detail">Secure Design Framework</text>
</svg>