<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="firewalls-characteristics-types">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d1e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="firewallGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="trustGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="untrustGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff8b94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes movePacket {
      0% { transform: translateX(0); opacity: 1; }
      50% { opacity: 0.8; }
      100% { transform: translateX(180px); opacity: 1; }
    }
    @keyframes movePacketBlocked {
      0% { transform: translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(-40px) rotate(20deg); opacity: 0.3; }
    }
    .section { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.3s; }
    .section-3 { animation-delay: 0.5s; }
    .section-4 { animation-delay: 0.7s; }
    .firewall-box { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .packet-allow { animation: movePacket 2.5s ease-in-out infinite; }
    .packet-block { animation: movePacketBlocked 2.5s ease-in-out infinite; animation-delay: 0.8s; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="section section-1" data-narration="Title section introducing the firewall topic">
    <text x="210" y="30" text-anchor="middle" class="title" font-size="20" fill="#2d5a6b">Firewalls</text>
    <text x="210" y="50" text-anchor="middle" class="title" font-size="16" fill="#4a90a4">Characteristics &amp; Types</text>
  </g>
  
  <!-- Trusted Network (Left) -->
  <g class="section section-2" data-narration="Trusted internal network segment" transform="translate(20, 90)">
    <rect x="0" y="0" width="90" height="280" rx="8" fill="url(#trustGradient)" filter="url(#shadow)"/>
    <text x="45" y="25" text-anchor="middle" class="label" font-size="13" fill="#2d5a6b" font-weight="bold">Trusted</text>
    <text x="45" y="42" text-anchor="middle" class="label" font-size="12" fill="#2d5a6b">Internal</text>
    <text x="45" y="60" text-anchor="middle" class="label" font-size="11" fill="#2d5a6b">Network</text>
    
    <!-- Internal devices -->
    <rect x="25" y="80" width="40" height="25" rx="3" fill="#fff" stroke="#88d8b0" stroke-width="2"/>
    <text x="45" y="96" text-anchor="middle" class="detail" font-size="9" fill="#2d5a6b">Server</text>
    
    <rect x="25" y="120" width="40" height="25" rx="3" fill="#fff" stroke="#88d8b0" stroke-width="2"/>
    <text x="45" y="136" text-anchor="middle" class="detail" font-size="9" fill="#2d5a6b">PC</text>
    
    <rect x="25" y="160" width="40" height="25" rx="3" fill="#fff" stroke="#88d8b0" stroke-width="2"/>
    <text x="45" y="176" text-anchor="middle" class="detail" font-size="9" fill="#2d5a6b">Database</text>
  </g>
  
  <!-- Firewall (Center) -->
  <g class="section section-2" data-narration="The firewall acts as a barrier between trusted and untrusted networks" transform="translate(115, 130)">
    <rect class="firewall-box" x="0" y="0" width="60" height="140" rx="5" fill="url(#firewallGradient)" filter="url(#shadow)"/>
    <text x="30" y="50" text-anchor="middle" class="label" font-size="14" fill="#fff" font-weight="bold">FIREWALL</text>
    <text x="30" y="70" text-anchor="middle" class="detail" font-size="9" fill="#e8f4f8">Packet</text>
    <text x="30" y="82" text-anchor="middle" class="detail" font-size="9" fill="#e8f4f8">Filtering</text>
    <rect x="10" y="95" width="40" height="6" rx="2" fill="#e8f4f8" opacity="0.7"/>
    <rect x="10" y="108" width="40" height="6" rx="2" fill="#e8f4f8" opacity="0.7"/>
    <rect x="10" y="121" width="40" height="6" rx="2" fill="#e8f4f8" opacity="0.7"/>
  </g>
  
  <!-- Untrusted Network (Right) -->
  <g class="section section-3" data-narration="Untrusted external network (Internet)" transform="translate(310, 90)">
    <rect x="0" y="0" width="90" height="280" rx="8" fill="url(#untrustGradient)" filter="url(#shadow)"/>
    <text x="45" y="25" text-anchor="middle" class="label" font-size="13" fill="#8b3a3a" font-weight="bold">Untrusted</text>
    <text x="45" y="42" text-anchor="middle" class="label" font-size="12" fill="#8b3a3a">External</text>
    <text x="45" y="60" text-anchor="middle" class="label" font-size="11" fill="#8b3a3a">(Internet)</text>
    
    <!-- External threats -->
    <circle cx="45" cy="100" r="15" fill="#ff6b6b" opacity="0.8"/>
    <text x="45" y="104" text-anchor="middle" class="detail" font-size="10" fill="#fff">⚠</text>
    <text x="45" y="125" text-anchor="middle" class="detail" font-size="8" fill="#8b3a3a">Threat</text>
    
    <circle cx="45" cy="160" r="15" fill="#ff6b6b" opacity="0.8"/>
    <text x="45" y="164" text-anchor="middle" class="detail" font-size="10" fill="#fff">⚠</text>
    <text x="45" y="185" text-anchor="middle" class="detail" font-size="8" fill="#8b3a3a">Malware</text>
    
    <circle cx="45" cy="220" r="15" fill="#ff6b6b" opacity="0.8"/>
    <text x="45" y="224" text-anchor="middle" class="detail" font-size="10" fill="#fff">⚠</text>
    <text x="45" y="245" text-anchor="middle" class="detail" font-size="8" fill="#8b3a3a">Hacker</text>
  </g>
  
  <!-- Traffic Animation -->
  <g class="section section-3" data-narration="Network packets being filtered - allowed packets pass through, blocked packets are stopped">
    <!-- Allowed packet -->
    <g class="packet-allow">
      <rect x="130" y="180" width="20" height="12" rx="2" fill="#a8e6cf" stroke="#88d8b0"/>
      <text x="140" y="189" text-anchor="middle" class="detail" font-size="7" fill="#2d5a6b">✓</text>
    </g>
    <!-- Blocked packet -->
    <g class="packet-block">
      <rect x="130" y="210" width="20" height="12" rx="2" fill="#ffb3ba" stroke="#ff8b94"/>
      <text x="140" y="219" text-anchor="middle" class="detail" font-size="7" fill="#8b3a3a">✗</text>
    </g>
  </g>
  
  <!-- Arrow Labels -->
  <g class="section section-4" data-narration="Arrows showing traffic flow direction and filtering decisions">
    <path d="M175 186 L250 186" stroke="#88d8b0" stroke-width="2" fill="none" marker-end="url(#arrowAllow)"/>
    <text x="200" y="178" class="detail" font-size="9" fill="#2d5a6b">ALLOW</text>
    
    <path d="M175 216 L220 216" stroke="#ff8b94" stroke-width="2" fill="none"/>
    <text x="180" y="232" class="detail" font-size="9" fill="#8b3a3a">BLOCK</text>
  </g>
  
  <!-- Firewall Types Box -->
  <g class="section section-4" data-narration="Four main types of firewalls explained">
    <rect x="20" y="300" width="180" height="90" rx="6" fill="#fff" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="318" text-anchor="middle" class="label" font-size="12" fill="#2d5a6b" font-weight="bold">Firewall Types</text>
    
    <line x1="30" y1="328" x2="190" y2="328" stroke="#d1e8f0" stroke-width="1"/>
    
    <text x="30" y="345" class="detail" font-size="9" fill="#2d5a6b">• Packet Filter</text>
    <text x="30" y="360" class="detail" font-size="9" fill="#2d5a6b">• Stateful Inspection</text>
    <text x="110" y="345" class="detail" font-size="9" fill="#2d5a6b">• Proxy</text>
    <text x="110" y="360" class="detail" font-size="9" fill="#2d5a6b">• Next-Gen</text>
  </g>
  
  <!-- Characteristics Box -->
  <g class="section section-4" data-narration="Key characteristics of effective firewalls">
    <rect x="210" y="300" width="190" height="90" rx="6" fill="#fff" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)"/>
    <text x="305" y="318" text-anchor="middle" class="label" font-size="12" fill="#2d5a6b" font-weight="bold">Key Characteristics</text>
    
    <line x1="220" y1="328" x2="390" y2="328" stroke="#d1e8f0" stroke-width="1"/>
    
    <text x="220" y="345" class="detail" font-size="9" fill="#2d5a6b">• Access Control</text>
    <text x="220" y="360" class="detail" font-size="9" fill="#2d5a6b">• Traffic Filtering</text>
    <text x="310" y="345" class="detail" font-size="9" fill="#2d5a6b">• Logging</text>
    <text x="310" y="360" class="detail" font-size="9" fill="#2d5a6b">• Authentication</text>
    <text x="350" y="375" class="detail" font-size="8" fill="#4a90a4">• NAT Support</text>
  </g>
  
  <!-- Definition Box -->
  <g class="section section-1" data-narration="Definition of a firewall from study material">
    <rect x="70" y="75" width="280" height="40" rx="5" fill="#fff" opacity="0.9"/>
    <text x="210" y="92" text-anchor="middle" class="detail" font-size="10" fill="#2d5a6b" font-style="italic">"A network security device that monitors and controls</text>
    <text x="210" y="107" text-anchor="middle" class="detail" font-size="10" fill="#2d5a6b" font-style="italic">incoming/outgoing traffic based on security rules"</text>
  </g>
</svg>