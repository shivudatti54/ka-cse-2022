<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="public-key-infrastructure">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="caGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ab8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="raGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="repoGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="entityGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9585bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a5ba8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crlGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d9534f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9302c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ocspGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5bc0de;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#31b0d5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateY(-20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #fff; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; stroke-dasharray: 100; animation: drawArrow 1.5s ease forwards; }
    .box { rx: 8; ry: 8; animation: slideIn 0.8s ease forwards; }
    .ca-box { animation-delay: 0.1s; }
    .ra-box { animation-delay: 0.2s; }
    .repo-box { animation-delay: 0.3s; }
    .entity-box { animation-delay: 0.4s; }
    .crl-box { animation-delay: 0.5s; }
    .ocsp-box { animation-delay: 0.6s; }
    .title-anim { animation: fadeIn 1s ease forwards; }
    .pulse { animation: pulse 2s infinite; transform-origin: center; transform-box: fill-box; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Public Key Infrastructure</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">PKI Architecture &amp; Components</text>
  
  <!-- Certificate Authority (Top) -->
  <g class="ca-box">
    <rect x="155" y="65" width="110" height="55" fill="url(#caGradient)" class="box pulse" data-narration="Certificate Authority (CA) - The trusted root that issues and manages digital certificates" />
    <text x="210" y="85" text-anchor="middle" class="label">Certificate Authority</text>
    <text x="210" y="102" text-anchor="middle" class="detail">Root Trust Anchor</text>
  </g>
  
  <!-- Arrow from CA to RA -->
  <path d="M210 120 L210 150" class="arrow" />
  
  <!-- Registration Authority -->
  <g class="ra-box">
    <rect x="155" y="155" width="110" height="50" fill="url(#raGradient)" class="box" data-narration="Registration Authority (RA) - Verifies identity before certificate issuance" />
    <text x="210" y="175" text-anchor="middle" class="label">Registration Authority</text>
    <text x="210" y="192" text-anchor="middle" class="detail">Identity Verification</text>
  </g>
  
  <!-- Arrow from RA to CA (for certificate request) -->
  <path d="M180 155 L180 140 L190 140 L190 120" class="arrow" style="animation-delay: 0.3s" />
  
  <!-- Certificate Repository -->
  <g class="repo-box">
    <rect x="280" y="155" width="115" height="50" fill="url(#repoGradient)" class="box" data-narration="Certificate Repository - Stores valid certificates for public access" />
    <text x="337" y="175" text-anchor="middle" class="label">Certificate Repository</text>
    <text x="337" y="192" text-anchor="middle" class="detail">Stores Certificates</text>
  </g>
  
  <!-- Arrow from RA to Repository -->
  <path d="M265 180 L280 180" class="arrow" />
  
  <!-- CRL and OCSP -->
  <g class="crl-box">
    <rect x="280" y="220" width="115" height="45" fill="url(#crlGradient)" class="box" data-narration="Certificate Revocation List (CRL) - Lists revoked certificates" />
    <text x="337" y="238" text-anchor="middle" class="label">CRL</text>
    <text x="337" y="253" text-anchor="middle" class="detail">Revoked Certificates</text>
  </g>
  
  <g class="ocsp-box">
    <rect x="280" y="280" width="115" height="45" fill="url(#ocspGradient)" class="box" data-narration="OCSP Responder - Real-time certificate status verification" />
    <text x="337" y="298" text-anchor="middle" class="label">OCSP Responder</text>
    <text x="337" y="313" text-anchor="middle" class="detail">Real-time Checking</text>
  </g>
  
  <!-- End Entities -->
  <g class="entity-box">
    <rect x="30" y="220" width="115" height="60" fill="url(#entityGradient)" class="box" data-narration="End Entities - Users, servers, and devices that receive and use certificates" />
    <text x="87" y="245" text-anchor="middle" class="label">End Entities</text>
    <text x="87" y="262" text-anchor="middle" class="detail">Users / Servers / Devices</text>
    <text x="87" y="275" text-anchor="middle" class="detail">receive certificates</text>
  </g>
  
  <!-- Arrows to End Entities -->
  <path d="M155 180 L100 180 L100 220" class="arrow" style="animation-delay: 0.5s" />
  
  <!-- Arrow from CA to End Entities (direct trust) -->
  <path d="M155 92 L100 92 L100 220" class="arrow" style="animation-delay: 0.4s" />
  
  <!-- Arrow from Repository to End Entities -->
  <path d="M280 180 L145 180 L145 220" class="arrow" style="animation-delay: 0.6s" />
  
  <!-- Arrow from CRL/OCSP to End Entities (status check) -->
  <path d="M280 242 L200 242 L200 220" class="arrow" style="animation-delay: 0.7s" />
  <path d="M280 302 L180 302 L180 280" class="arrow" style="animation-delay: 0.8s" />
  
  <!-- Legend / Flow indicator -->
  <g transform="translate(20, 350)">
    <rect width="380" height="35" rx="5" fill="rgba(255,255,255,0.7)" stroke="#aaa" />
    <text x="15" y="22" font-family="Arial" font-size="11" fill="#555" font-weight="bold">Flow:</text>
    <text x="60" y="22" font-family="Arial" font-size="10" fill="#555">Request → Verify → Issue → Store → Use</text>
  </g>
</svg>