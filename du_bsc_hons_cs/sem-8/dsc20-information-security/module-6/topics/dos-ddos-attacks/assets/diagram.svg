<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dos-ddos-attacks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dangerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d8a6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="botGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9ed69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f08a5d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .component { animation: fadeIn 0.8s ease-out both; }
    .attacker { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .cnc { animation: fadeIn 0.8s ease-out 0.4s both; }
    .bots { animation: slideInRight 0.8s ease-out 0.6s both; }
    .target { animation: slideInRight 0.8s ease-out 0.8s both; }
    .arrow-flow { animation: flowRight 1s linear infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .blink { animation: blink 1s ease-in-out infinite; }
    .text-label { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; }
    .text-detail { font-family: Arial, sans-serif; font-size: 11px; fill: #cccccc; }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #ffffff; }
    .section-box { fill: #232342; stroke: #4ecca3; stroke-width: 1; rx: 8; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title-text title">DDoS Attack Architecture</text>
  
  <!-- Internet Cloud -->
  <g class="component" data-narration="The Internet represents the network infrastructure through which attack traffic flows">
    <ellipse cx="210" cy="85" rx="90" ry="30" fill="#3d5a80" opacity="0.7"/>
    <text x="210" y="90" text-anchor="middle" class="text-label" font-size="12">INTERNET</text>
  </g>
  
  <!-- Botmaster/Attacker Section -->
  <g class="attacker" data-narration="The Botmaster is the attacker who coordinates the attack from a single source">
    <rect x="20" y="130" width="90" height="70" rx="8" fill="#e94560" filter="url(#glow)"/>
    <text x="65" y="160" text-anchor="middle" class="text-label" font-weight="bold">BOTMASTER</text>
    <text x="65" y="180" text-anchor="middle" class="text-detail">Attacker</text>
    <!-- Skull icon -->
    <circle cx="65" cy="148" r="10" fill="#1a1a2e"/>
    <circle cx="61" y="146" r="2" fill="#e94560"/>
    <circle cx="69" y="146" r="2" fill="#e94560"/>
    <rect x="62" y="152" width="6" height="3" fill="#e94560"/>
  </g>
  
  <!-- Command & Control Server -->
  <g class="cnc" data-narration="The C2 server receives commands from the botmaster and relays them to the botnet">
    <rect x="130" y="130" width="100" height="70" rx="8" fill="url(#serverGradient)" filter="url(#glow)"/>
    <text x="180" y="155" text-anchor="middle" class="text-label" font-weight="bold">C2 SERVER</text>
    <text x="180" y="175" text-anchor="middle" class="text-detail">Command &amp; Control</text>
    <!-- Server icon -->
    <rect x="165" y="135" width="30" height="4" rx="1" fill="#1a1a2e"/>
    <rect x="165" y="142" width="30" height="4" rx="1" fill="#1a1a2e"/>
  </g>
  
  <!-- Botnets/Zombies -->
  <g class="bots" data-narration="Botnets are networks of compromised computers (zombies) that simultaneously attack the target">
    <rect x="250" y="130" width="150" height="120" rx="8" fill="#232342" stroke="#f9ed69" stroke-width="2"/>
    <text x="325" y="150" text-anchor="middle" class="text-label" font-weight="bold" fill="#f9ed69">BOTNET / ZOMBIES</text>
    
    <!-- Multiple zombie computers -->
    <g class="pulse">
      <rect x="265" y="160" width="35" height="30" rx="4" fill="url(#botGradient)"/>
      <rect x="275" y="165" width="15" height="10" rx="2" fill="#1a1a2e"/>
      <text x="282" y="200" text-anchor="middle" class="text-detail">PC 1</text>
    </g>
    <g class="pulse" style="animation-delay: 0.3s">
      <rect x="307" y="160" width="35" height="30" rx="4" fill="url(#botGradient)"/>
      <rect x="317" y="165" width="15" height="10" rx="2" fill="#1a1a2e"/>
      <text x="324" y="200" text-anchor="middle" class="text-detail">PC 2</text>
    </g>
    <g class="pulse" style="animation-delay: 0.6s">
      <rect x="265" y="205" width="35" height="30" rx="4" fill="url(#botGradient)"/>
      <rect x="275" y="210" width="15" height="10" rx="2" fill="#1a1a2e"/>
      <text x="282" y="245" text-anchor="middle" class="text-detail">PC 3</text>
    </g>
    <g class="pulse" style="animation-delay: 0.9s">
      <rect x="307" y="205" width="35" height="30" rx="4" fill="url(#botGradient)"/>
      <rect x="317" y="210" width="15" height="10" rx="2" fill="#1a1a2e"/>
      <text x="324" y="245" text-anchor="middle" class="text-detail">PC n</text>
    </g>
  </g>
  
  <!-- Target Server/Victim -->
  <g class="target" data-narration="The target server becomes overwhelmed by the massive traffic flood, causing service denial">
    <rect x="250" y="270" width="150" height="60" rx="8" fill="url(#dangerGradient)" filter="url(#glow)"/>
    <text x="325" y="295" text-anchor="middle" class="text-label" font-weight="bold">TARGET SERVER</text>
    <text x="325" y="315" text-anchor="middle" class="text-detail">Victim - Service Down!</text>
    <!-- Warning icon -->
    <path d="M325 275 L330 285 H320 Z" fill="#1a1a2e"/>
    <circle cx="325" cy="290" r="1.5" fill="#1a1a2e"/>
  </g>
  
  <!-- Traffic Flow Arrows -->
  <!-- Attacker to C2 -->
  <path d="M110 165 L130 165" stroke="#e94560" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-flow"/>
  <line x1="110" y1="165" x2="130" y2="165" stroke="#e94560" stroke-width="2">
    <animate attributeName="stroke-dasharray" values="0,20;20,0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="128,162 138,165 128,168" fill="#e94560"/>
  <text x="120" y="155" class="text-detail" fill="#e94560">Commands</text>
  
  <!-- C2 to Botnets -->
  <path d="M230 165 L250 165" stroke="#4ecca3" stroke-width="2" fill="none"/>
  <polygon points="248,162 258,165 248,168" fill="#4ecca3"/>
  <text x="235" y="155" class="text-detail" fill="#4ecca3">Instructions</text>
  
  <!-- Botnets to Target -->
  <path d="M325 250 L325 270" stroke="#ff6b6b" stroke-width="2" fill="none" class="arrow-flow"/>
  <polygon points="322,268 328,268 325,258" fill="#ff6b6b" class="blink"/>
  <text x="335" y="265" class="text-detail" fill="#ff6b6b">Traffic Flood</text>
  
  <!-- Key Concept Box -->
  <g class="component" data-narration="DDoS attacks use multiple compromised systems to overwhelm a single target">
    <rect x="10" y="345" width="400" height="45" rx="8" fill="#232342" stroke="#4ecca3" stroke-width="1"/>
    <text x="20" y="365" class="text-label" font-size="13" fill="#4ecca3">Key Concept:</text>
    <text x="20" y="382" class="text-detail" font-size="11">DDoS uses botnets to flood targets, making mitigation harder than single-source DoS attacks.</text>
  </g>
  
  <!-- Animated dots for attack visualization -->
  <circle r="3" fill="#e94560">
    <animateMotion dur="2s" repeatCount="indefinite" path="M65,170 Q180,140 280,180"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#e94560">
    <animateMotion dur="2s" repeatCount="indefinite" path="M65,170 Q180,190 325,300"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
</svg>