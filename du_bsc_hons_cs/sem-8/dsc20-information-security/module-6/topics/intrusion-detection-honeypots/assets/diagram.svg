<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="intrusion-detection-honeypots">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="firewallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="nidsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#44a08d"/>
    </linearGradient>
    <linearGradient id="honeypotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9d56e"/>
      <stop offset="100%" style="stop-color:#f5b041"/>
    </linearGradient>
    <linearGradient id="networkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowPulse {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 10, 5; animation: flowPulse 1s linear infinite; }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
    .box-title { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: white; }
    .legend { font-family: Arial, sans-serif; font-size: 9px; fill: #555; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title fade-in">Intrusion Detection &amp; Honeypots</text>
  
  <!-- Internet Section -->
  <g class="slide-in" style="animation-delay: 0.1s" data-narration="Internet connection - external network where threats originate">
    <rect x="10" y="50" width="60" height="30" rx="4" fill="#95a5a6" filter="url(#shadow)"/>
    <text x="40" y="70" text-anchor="middle" class="box-title">Internet</text>
  </g>
  
  <!-- Arrow from Internet -->
  <path d="M70 65 L95 65" stroke="#e74c3c" stroke-width="2" class="flow-line"/>
  
  <!-- External Firewall -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="External Firewall - first line of defense filtering incoming traffic">
    <rect x="95" y="50" width="50" height="30" rx="4" fill="url(#firewallGrad)" filter="url(#shadow)"/>
    <text x="120" y="70" text-anchor="middle" class="box-title">Ext FW</text>
  </g>
  
  <!-- Arrow -->
  <path d="M145 65 L165 65" stroke="#e74c3c" stroke-width="2" class="flow-line"/>
  
  <!-- DMZ Section -->
  <g class="slide-in" style="animation-delay: 0.3s" data-narration="DMZ segment - demilitarized zone with public-facing services">
    <rect x="165" y="50" width="70" height="50" rx="4" fill="url(#networkGrad)" filter="url(#shadow)"/>
    <text x="200" y="68" text-anchor="middle" class="label" style="font-weight:bold">DMZ</text>
    <text x="200" y="82" text-anchor="middle" class="detail">Web Server</text>
    <text x="200" y="94" text-anchor="middle" class="detail">Mail Server</text>
  </g>
  
  <!-- NIDS Sensor in DMZ -->
  <g class="pulse" style="animation-delay: 0.4s" data-narration="NIDS sensor in DMZ monitors external traffic for threats">
    <circle cx="235" y="115" r="15" fill="url(#nidsGrad)" filter="url(#shadow)"/>
    <text x="235" y="112" text-anchor="middle" class="box-title" style="font-size:9px">NIDS</text>
    <text x="235" y="121" text-anchor="middle" class="box-title" style="font-size:9px">DMZ</text>
  </g>
  
  <!-- Arrow from DMZ to Internal Firewall -->
  <path d="M200 100 L200 135" stroke="#e74c3c" stroke-width="2" class="flow-line"/>
  
  <!-- Internal Firewall -->
  <g class="slide-in" style="animation-delay: 0.5s" data-narration="Internal Firewall - protects internal network from DMZ threats">
    <rect x="165" y="135" width="70" height="30" rx="4" fill="url(#firewallGrad)" filter="url(#shadow)"/>
    <text x="200" y="155" text-anchor="middle" class="box-title">Int FW</text>
  </g>
  
  <!-- Arrow -->
  <path d="M235 150 L255 150" stroke="#e74c3c" stroke-width="2" class="flow-line"/>
  
  <!-- Internal Network -->
  <g class="slide-in" style="animation-delay: 0.6s" data-narration="Internal network segment - contains critical business systems">
    <rect x="255" y="120" width="90" height="60" rx="4" fill="url(#networkGrad)" filter="url(#shadow)"/>
    <text x="300" y="140" text-anchor="middle" class="label" style="font-weight:bold">Internal Network</text>
    <text x="300" y="155" text-anchor="middle" class="detail">File Server</text>
    <text x="300" y="168" text-anchor="middle" class="detail">Workstations</text>
    <text x="300" y="181" text-anchor="middle" class="detail">Database</text>
  </g>
  
  <!-- NIDS Sensor in Internal -->
  <g class="pulse" style="animation-delay: 0.7s" data-narration="Internal NIDS monitors lateral movement and internal threats">
    <circle cx="300" y="105" r="15" fill="url(#nidsGrad)" filter="url(#shadow)"/>
    <text x="300" y="102" text-anchor="middle" class="box-title" style="font-size:9px">NIDS</text>
    <text x="300" y="111" text-anchor="middle" class="box-title" style="font-size:9px">INT</text>
  </g>
  
  <!-- Arrow from Internal Firewall to Internal -->
  <path d="M235 150 L255 135" stroke="#e74c3c" stroke-width="2" class="flow-line"/>
  
  <!-- Honeypot -->
  <g class="slide-in" style="animation-delay: 0.8s" data-narration="Honeypot - decoy system to attract and study attackers">
    <rect x="255" y="195" width="90" height="45" rx="4" fill="url(#honeypotGrad)" filter="url(#shadow)"/>
    <text x="300" y="212" text-anchor="middle" class="label" style="font-weight:bold">Honeypot</text>
    <text x="300" y="226" text-anchor="middle" class="detail">Decoy System</text>
    <text x="300" y="238" text-anchor="middle" class="detail">Attracts Attackers</text>
  </g>
  
  <!-- Connection from Internal to Honeypot -->
  <path d="M300 180 L300 195" stroke="#9b59b6" stroke-width="2" class="flow-line"/>
  
  <!-- Alert Lines -->
  <g class="fade-in" style="animation-delay: 1s">
    <path d="M250 65 Q230 45 210 65" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <path d="M350 105 Q370 85 390 105" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <text x="200" y="45" class="detail" fill="#e74c3c">Alert!</text>
    <text x="340" y="95" class="detail" fill="#e74c3c">Alert!</text>
  </g>
  
  <!-- Legend -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Legend showing diagram components">
    <rect x="10" y="260" width="400" height="130" rx="5" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <text x="20" y="280" class="label" style="font-weight:bold">Key Concepts:</text>
    
    <circle cx="35" cy="300" r="8" fill="url(#firewallGrad)"/>
    <text x="50" y="304" class="legend">Firewall - Filters traffic based on rules</text>
    
    <circle cx="35" cy="320" r="8" fill="url(#nidsGrad)"/>
    <text x="50" y="324" class="legend">NIDS - Network Intrusion Detection System</text>
    
    <circle cx="35" cy="340" r="8" fill="url(#honeypotGrad)"/>
    <text x="50" y="344" class="legend">Honeypot - Decoy to detect/study attackers</text>
    
    <path d="M35 360 L55 360" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="60" y="364" class="legend">Malicious Traffic Flow</text>
    
    <path d="M220 360 L240 360" stroke="#9b59b6" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="245" y="364" class="legend">Decoy Traffic</text>
  </g>
  
  <!-- IDS Types Box -->
  <g class="fade-in" style="animation-delay: 1.4s" data-narration="Types of IDS explained">
    <rect x="280" y="260" width="120" height="60" rx="4" fill="#ecf0f1" stroke="#3498db" stroke-width="1"/>
    <text x="340" y="276" text-anchor="middle" class="label" style="font-weight:bold;font-size:11px">IDS Types</text>
    <text x="340" y="290" text-anchor="middle" class="legend">NIDS - Network-based</text>
    <text x="340" y="302" text-anchor="middle" class="legend">HIDS - Host-based</text>
    <text x="340" y="314" text-anchor="middle" class="legend">Honeypot - Decoy</text>
  </g>
</svg>