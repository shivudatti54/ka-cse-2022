<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="message-authentication-hash-functions" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f0e8f8"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="padGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8f7"/>
      <stop offset="100%" style="stop-color:#b0d4ed"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4f0"/>
      <stop offset="100%" style="stop-color:#d0b8e0"/>
    </linearGradient>
    <linearGradient id="compGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7e4d4"/>
      <stop offset="100%" style="stop-color:#edc9a8"/>
    </linearGradient>
    <linearGradient id="hashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d4d4"/>
      <stop offset="100%" style="stop-color:#e0b0b0"/>
    </linearGradient>
    <linearGradient id="macGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f0e8"/>
      <stop offset="100%" style="stop-color:#a8e0d0"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flow {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .box { rx: 6; ry: 6; stroke: #444; stroke-width: 1.5; }
    .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-flow { animation: flow 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title anim-fade">Message Authentication Hash Functions</text>
  
  <!-- Input Message Section -->
  <g class="anim-slide" style="animation-delay: 0.2s;">
    <rect x="20" y="45" width="100" height="35" fill="url(#inputGrad)" class="box" data-narration="The input message of any length is the original data to be authenticated"/>
    <text x="70" y="58" text-anchor="middle" class="label" font-weight="bold">Input Message</text>
    <text x="70" y="72" text-anchor="middle" class="detail">any length</text>
    <line x1="120" y1="62" x2="145" y2="62" class="arrow anim-flow"/>
  </g>
  
  <!-- Padding Section -->
  <g class="anim-slide" style="animation-delay: 0.4s;">
    <rect x="150" y="45" width="95" height="35" fill="url(#padGrad)" class="box" data-narration="Padding adds bits to make the message length a multiple of the block size (512 bits)"/>
    <text x="197" y="58" text-anchor="middle" class="label" font-weight="bold">Padding</text>
    <text x="197" y="72" text-anchor="middle" class="detail">block alignment</text>
    <line x1="245" y1="62" x2="270" y2="62" class="arrow anim-flow"/>
  </g>
  
  <!-- Message Blocks -->
  <g class="anim-slide" style="animation-delay: 0.6s;">
    <rect x="275" y="45" width="130" height="35" fill="url(#blockGrad)" class="box" data-narration="The padded message is divided into 512-bit blocks for processing"/>
    <text x="295" y="55" text-anchor="middle" class="label" font-weight="bold">Message Blocks</text>
    <text x="340" y="70" text-anchor="middle" class="detail">512 bits each</text>
    <line x1="340" y1="80" x2="340" y2="105" class="arrow anim-flow"/>
  </g>
  
  <!-- Compression Function -->
  <g class="anim-slide" style="animation-delay: 0.8s;">
    <rect x="255" y="110" width="170" height="45" fill="url(#compGrad)" class="box anim-pulse" data-narration="The compression function is iterated over each block, mixing the current block with the running hash value"/>
    <text x="340" y="130" text-anchor="middle" class="label" font-weight="bold">Compression Function</text>
    <text x="340" y="145" text-anchor="middle" class="detail">Iterated (f) for each block</text>
    <line x1="340" y1="155" x2="340" y2="175" class="arrow anim-flow"/>
  </g>
  
  <!-- Hash Output -->
  <g class="anim-slide" style="animation-delay: 1s;">
    <rect x="270" y="180" width="140" height="40" fill="url(#hashGrad)" class="box anim-pulse" data-narration="The final hash output is a fixed-size digest (128/160/256/512 bits) that uniquely represents the message"/>
    <text x="340" y="198" text-anchor="middle" class="label" font-weight="bold">Hash Output</text>
    <text x="340" y="212" text-anchor="middle" class="detail">Fixed: 128/160/256/512 bits</text>
  </g>
  
  <!-- Key Concepts Box - MAC -->
  <g class="anim-fade" style="animation-delay: 1.2s;">
    <rect x="15" y="240" width="190" height="70" fill="url(#macGrad)" class="box" rx="8" data-narration="MAC (Message Authentication Code) uses a secret key combined with the hash function to provide both integrity and authentication"/>
    <text x="110" y="258" text-anchor="middle" class="label" font-weight="bold">MAC</text>
    <text x="110" y="273" text-anchor="middle" class="detail">Message Authentication Code</text>
    <text x="110" y="288" text-anchor="middle" class="detail">Key + Hash = MAC</text>
    <text x="110" y="302" text-anchor="middle" class="detail" font-size="9">Integrity + Authenticity</text>
  </g>
  
  <!-- Key Concepts Box - Properties -->
  <g class="anim-fade" style="animation-delay: 1.4s;">
    <rect x="215" y="240" width="190" height="70" fill="#f7f0d4" class="box" rx="8" data-narration="Cryptographic hash functions must be one-way, collision-resistant, and provide avalanche effect"/>
    <text x="310" y="258" text-anchor="middle" class="label" font-weight="bold">Hash Properties</text>
    <text x="310" y="275" text-anchor="middle" class="detail">• One-way function</text>
    <text x="310" y="288" text-anchor="middle" class="detail">• Collision resistant</text>
    <text x="310" y="301" text-anchor="middle" class="detail">• Avalanche effect</text>
  </g>
  
  <!-- Process Flow Arrow from blocks to left -->
  <g class="anim-fade" style="animation-delay: 1.3s;">
    <path d="M 275 62 L 260 62 L 260 130 L 255 130" class="arrow" stroke-dasharray="3,2" data-narration="Each block is fed into the compression function iteratively"/>
    <text x="250" y="95" class="detail" font-size="9" transform="rotate(-90, 250, 95)">feeds into</text>
  </g>
  
  <!-- Security Applications -->
  <g class="anim-fade" style="animation-delay: 1.6s;">
    <rect x="15" y="320" width="390" height="70" fill="#e8f0f8" class="box" rx="8" data-narration="Applications include digital signatures, blockchain, SSL/TLS, password storage, and software verification"/>
    <text x="210" y="342" text-anchor="middle" class="label" font-weight="bold">Applications</text>
    <text x="60" y="362" text-anchor="middle" class="detail">Digital Signatures</text>
    <text x="130" y="362" text-anchor="middle" class="detail">Blockchain</text>
    <text x="195" y="362" text-anchor="middle" class="detail">SSL/TLS</text>
    <text x="255" y="362" text-anchor="middle" class="detail">Password Storage</text>
    <text x="325" y="362" text-anchor="middle" class="detail">Software Updates</text>
    <text x="385" y="362" text-anchor="middle" class="detail">File Integrity</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="70" cy="370" r="3" fill="#888" class="anim-pulse"/>
  <circle cx="85" cy="370" r="3" fill="#888" class="anim-pulse" style="animation-delay: 0.3s"/>
  <circle cx="100" cy="370" r="3" fill="#888" class="anim-pulse" style="animation-delay: 0.6s"/>
</svg>