<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="symmetric-encryption-confidentiality">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357a8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="xorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b041;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cipherGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#af7ac5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#884ea0;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: fadeIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInRight 0.6s ease-out 0.6s both; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.8s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 5,5; animation: flowDash 1s linear infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title">CBC Mode Encryption</text>
  <text x="210" y="45" text-anchor="middle" font-size="11" fill="#5d6d7e" class="title">Symmetric Encryption for Confidentiality</text>
  
  <!-- Legend/Key Concepts Box -->
  <g class="section-1" data-narration="The Initialization Vector (IV) provides randomness for the first block, ensuring identical plaintexts produce different ciphertexts">
    <rect x="10" y="55" width="400" height="35" fill="white" stroke="#bdc3c7" rx="5" filter="url(#shadow)"/>
    <text x="20" y="72" font-size="11" fill="#2c3e50"><b>Key:</b> P=Plaintext | C=Ciphertext | E(K,.)=Encryption with Key K | ⊕=XOR</text>
  </g>
  
  <!-- IV Section -->
  <g class="section-2" data-narration="The Initialization Vector IV is the starting random value, XORed with the first plaintext block">
    <rect x="20" y="105" width="55" height="25" fill="#3498db" rx="4" filter="url(#shadow)"/>
    <text x="47" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="white">IV</text>
    <path d="M75 117 L100 117" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- XOR 1 -->
  <g class="section-2" data-narration="First XOR operation: IV is combined with plaintext block P1">
    <circle cx="115" cy="117" r="12" fill="url(#xorGradient)" filter="url(#shadow)"/>
    <text x="115" y="121" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⊕</text>
  </g>
  
  <!-- P1 Block -->
  <g class="section-2" data-narration="Plaintext block P1 is the first segment of the original message">
    <rect x="135" y="105" width="40" height="25" fill="#27ae60" rx="4" filter="url(#shadow)"/>
    <text x="155" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="white">P1</text>
    <path d="M175 117 L195 117" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- Encryption Box 1 -->
  <g class="section-2" data-narration="The encryption function E(K,.) uses the symmetric key K to transform the XOR result into ciphertext">
    <rect x="200" y="100" width="50" height="35" fill="url(#boxGradient)" rx="4" filter="url(#shadow)"/>
    <text x="225" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="white">E(K,.)</text>
    <text x="225" y="128" text-anchor="middle" font-size="9" fill="#d5f5e3">Encrypt</text>
    <path d="M250 117 L270 117" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- C1 Output -->
  <g class="section-2" data-narration="C1 is the first ciphertext block, output from encrypting the XOR of IV and P1">
    <rect x="275" y="105" width="40" height="25" fill="url(#cipherGradient)" rx="4" filter="url(#shadow)"/>
    <text x="295" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="white">C1</text>
  </g>
  
  <!-- Feedback path from C1 to XOR2 -->
  <g class="section-3" data-narration="The ciphertext C1 is fed back to be XORed with the next plaintext block">
    <path d="M295 130 L295 160 L165 160 L165 167" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
    <polygon points="160,167 165,162 170,167" fill="#e74c3c"/>
    <text x="230" y="175" font-size="9" fill="#e74c3c">feedback</text>
  </g>
  
  <!-- Row 2: P2 -->
  <g class="section-3" data-narration="Plaintext block P2 is the second segment, which will be combined with C1 before encryption">
    <rect x="135" y="185" width="40" height="25" fill="#27ae60" rx="4" filter="url(#shadow)"/>
    <text x="155" y="202" text-anchor="middle" font-size="11" font-weight="bold" fill="white">P2</text>
    <path d="M175 197 L195 197" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- XOR 2 -->
  <g class="section-3" data-narration="Second XOR: C1 (previous ciphertext) is combined with P2 for chaining">
    <circle cx="115" cy="197" r="12" fill="url(#xorGradient)" filter="url(#shadow)" class="pulse"/>
    <text x="115" y="201" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⊕</text>
    <text x="47" y="197" font-size="9" fill="#5d6d7e">C1</text>
    <path d="M75 197 L100 197" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- Encryption Box 2 -->
  <g class="section-3" data-narration="The same encryption function E(K,.) with the same key K encrypts the XOR result">
    <rect x="200" y="180" width="50" height="35" fill="url(#boxGradient)" rx="4" filter="url(#shadow)"/>
    <text x="225" y="195" text-anchor="middle" font-size="10" font-weight="bold" fill="white">E(K,.)</text>
    <text x="225" y="208" text-anchor="middle" font-size="9" fill="#d5f5e3">Encrypt</text>
    <path d="M250 197 L270 197" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- C2 Output -->
  <g class="section-3" data-narration="C2 is the second ciphertext block, depending on both P2 and C1">
    <rect x="275" y="185" width="40" height="25" fill="url(#cipherGradient)" rx="4" filter="url(#shadow)"/>
    <text x="295" y="202" text-anchor="middle" font-size="11" font-weight="bold" fill="white">C2</text>
  </g>
  
  <!-- Feedback C2 to XOR3 -->
  <g class="section-4" data-narration="This chaining continues: each ciphertext block depends on all previous blocks">
    <path d="M295 210 L295 240 L165 240 L165 247" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
    <polygon points="160,247 165,242 170,247" fill="#e74c3c"/>
  </g>
  
  <!-- Row 3: P3 -->
  <g class="section-4" data-narration="Plaintext block P3 represents the third and final segment in this example">
    <rect x="135" y="265" width="40" height="25" fill="#27ae60" rx="4" filter="url(#shadow)"/>
    <text x="155" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="white">P3</text>
    <path d="M175 277 L195 277" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- XOR 3 -->
  <g class="section-4" data-narration="Third XOR: C2 is combined with P3, continuing the CBC chaining mechanism">
    <circle cx="115" cy="277" r="12" fill="url(#xorGradient)" filter="url(#shadow)" class="pulse"/>
    <text x="115" y="281" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⊕</text>
    <text x="47" y="277" font-size="9" fill="#5d6d7e">C2</text>
    <path d="M75 277 L100 277" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- Encryption Box 3 -->
  <g class="section-4" data-narration="This produces the final ciphertext block C3, completing the CBC encryption chain">
    <rect x="200" y="260" width="50" height="35" fill="url(#boxGradient)" rx="4" filter="url(#shadow)"/>
    <text x="225" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="white">E(K,.)</text>
    <text x="225" y="288" text-anchor="middle" font-size="9" fill="#d5f5e3">Encrypt</text>
    <path d="M250 277 L270 277" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
  </g>
  
  <!-- C3 Output -->
  <g class="section-4" data-narration="C3 is the final ciphertext block - decryption requires knowing all previous blocks">
    <rect x="275" y="265" width="40" height="25" fill="url(#cipherGradient)" rx="4" filter="url(#shadow)"/>
    <text x="295" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="white">C3</text>
  </g>
  
  <!-- Key concept box -->
  <g class="section-4" data-narration="CBC Mode ensures that modifying any ciphertext block corrupts that block and all subsequent blocks, providing both confidentiality and integrity awareness">
    <rect x="325" y="100" width="80" height="190" fill="#fef9e7" stroke="#f39c12" rx="5" filter="url(#shadow)"/>
    <text x="365" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">Confidentiality</text>
    <text x="365" y="135" text-anchor="middle" font-size="9" fill="#5d6d7e" width="70">Each C depends</text>
    <text x="365" y="148" text-anchor="middle" font-size="9" fill="#5d6d7e" width="70">on all previous</text>
    <text x="365" y="161" text-anchor="middle" font-size="9" fill="#5d6d7e" width="70">blocks - provides</text>
    <text x="365" y="174" text-anchor="middle" font-size="9" fill="#5d6d7e" width="70">chaining effect</text>
    <text x="365" y="195" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">Same Key K</text>
    <text x="365" y="207" text-anchor="middle" font-size="9" fill="#5d6d7e">for encryption</text>
    <text x="365" y="227" text-anchor="middle" font-size="9" fill="#e74c3c">Unique IV</text>
    <text x="365" y="239" text-anchor="middle" font-size="9" fill="#5d6d7e">for each message</text>
    <text x="365" y="260" text-anchor="middle" font-size="8" fill="#5d6d7e">Prevents pattern</text>
    <text x="365" y="273" text-anchor="middle" font-size="8" fill="#5d6d7e">exposure</text>
  </g>
  
  <!-- Bottom note -->
  <g class="section-4">
    <rect x="10" y="320" width="400" height="70" fill="white" stroke="#bdc3c7" rx="5" filter="url(#shadow)"/>
    <text x="20" y="340" font-size="11" font-weight="bold" fill="#2c3e50">CBC (Cipher Block Chaining) Mode:</text>
    <text x="20" y="358" font-size="10" fill="#5d6d7e">• Each plaintext block is XORed with previous ciphertext before encryption</text>
    <text x="20" y="373" font-size="10" fill="#5d6d7e">• Creates dependency chain - changing one bit affects all subsequent blocks</text>
    <text x="20" y="388" font-size="10" fill="#5d6d7e">• Requires unique IV per message to ensure ciphertext uniqueness</text>
  </g>
</svg>