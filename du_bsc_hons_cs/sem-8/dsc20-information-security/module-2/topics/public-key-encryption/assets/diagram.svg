<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="public-key-encryption">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#6db890"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5c9"/>
      <stop offset="100%" style="stop-color:#b87fa8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c5aa0; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .key-text { font-family: Courier, monospace; font-size: 13px; fill: #fff; font-weight: bold; }
    .box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .anim-delay-1 { animation-delay: 0.2s; }
    .anim-delay-2 { animation-delay: 0.4s; }
    .anim-delay-3 { animation-delay: 0.6s; }
    .anim-delay-4 { animation-delay: 0.8s; }
    .anim-delay-5 { animation-delay: 1s; }
    .arrow { stroke: #888; stroke-width: 2; fill: none; stroke-dasharray: 5,3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Public Key Encryption</text>
  <text x="210" y="50" text-anchor="middle" class="detail anim-fade anim-delay-1">RSA Key Generation Process</text>
  
  <!-- Step 1: Select Primes -->
  <g class="anim-slide anim-delay-1" data-narration="Step 1: Two large prime numbers p and q are selected randomly">
    <rect x="20" y="65" width="120" height="45" rx="6" fill="url(#boxGrad1)" class="box"/>
    <text x="80" y="82" text-anchor="middle" class="label" fill="white">Step 1</text>
    <text x="80" y="98" text-anchor="middle" class="detail" fill="white">Select Primes</text>
    <text x="80" y="112" text-anchor="middle" class="detail" fill="#e8f4f8">p, q</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M80 110 L80 130" class="arrow anim-fade anim-delay-2"/>
  <polygon points="80,135 75,125 85,125" fill="#888" class="anim-fade anim-delay-2"/>
  
  <!-- Step 2: Calculate n and φ(n) -->
  <g class="anim-slide anim-delay-2" data-narration="Step 2: Calculate modulus n = p × q and Euler's totient φ(n) = (p-1)(q-1)">
    <rect x="20" y="135" width="120" height="55" rx="6" fill="url(#boxGrad2)" class="box"/>
    <text x="80" y="152" text-anchor="middle" class="label" fill="white">Step 2</text>
    <text x="80" y="168" text-anchor="middle" class="detail" fill="white">Calculate n &amp; φ(n)</text>
    <text x="80" y="183" text-anchor="middle" class="detail" fill="#e8f4f8">n = p×q</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M80 190 L80 210" class="arrow anim-fade anim-delay-3"/>
  <polygon points="80,215 75,205 85,205" fill="#888" class="anim-fade anim-delay-3"/>
  
  <!-- Step 3: Choose e and Calculate d -->
  <g class="anim-slide anim-delay-3" data-narration="Step 3: Choose public exponent e and calculate private exponent d such that e×d ≡ 1 (mod φ(n))">
    <rect x="20" y="215" width="120" height="55" rx="6" fill="url(#boxGrad3)" class="box"/>
    <text x="80" y="232" text-anchor="middle" class="label" fill="white">Step 3</text>
    <text x="80" y="248" text-anchor="middle" class="detail" fill="white">Choose e, calc d</text>
    <text x="80" y="263" text-anchor="middle" class="detail" fill="#e8f4f8">d = e⁻¹ mod φ(n)</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M80 270 L80 290" class="arrow anim-fade anim-delay-4"/>
  <polygon points="80,295 75,285 85,285" fill="#888" class="anim-fade anim-delay-4"/>
  
  <!-- Output Keys -->
  <g class="anim-slide anim-delay-4" data-narration="Final output: Public Key (e, n) for encryption and Private Key (d, n) for decryption">
    <rect x="20" y="295" width="180" height="90" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="2" class="box"/>
    <text x="110" y="318" text-anchor="middle" class="label" fill="#333">Generated Key Pair</text>
    
    <!-- Public Key Box -->
    <rect x="30" y="328" width="75" height="50" rx="5" fill="#5a9bc4" class="anim-pulse"/>
    <text x="67" y="345" text-anchor="middle" class="key-text">Public Key</text>
    <text x="67" y="362" text-anchor="middle" class="key-text" font-size="11">(e, n)</text>
    
    <!-- Private Key Box -->
    <rect x="115" y="328" width="75" height="50" rx="5" fill="#b87fa8" class="anim-pulse"/>
    <text x="152" y="345" text-anchor="middle" class="key-text">Private Key</text>
    <text x="152" y="362" text-anchor="middle" class="key-text" font-size="11">(d, n)</text>
  </g>
  
  <!-- Right side: Concept boxes -->
  <g class="anim-fade anim-delay-3" data-narration="Public key encrypts, private key decrypts - this is the fundamental asymmetric property">
    <rect x="210" y="65" width="195" height="60" rx="6" fill="#fff" stroke="#7eb8da" stroke-width="2" class="box"/>
    <text x="307" y="82" text-anchor="middle" class="label" fill="#2c5aa0">How It Works</text>
    <text x="307" y="100" text-anchor="middle" class="detail">Public Key encrypts</text>
    <text x="307" y="115" text-anchor="middle" class="detail" fill="#555">Private Key decrypts</text>
  </g>
  
  <g class="anim-fade anim-delay-4" data-narration="The security relies on the mathematical difficulty of factoring large prime numbers">
    <rect x="210" y="135" width="195" height="55" rx="6" fill="#fff" stroke="#6db890" stroke-width="2" class="box"/>
    <text x="307" y="152" text-anchor="middle" class="label" fill="#2c5aa0">Security Basis</text>
    <text x="307" y="170" text-anchor="middle" class="detail">Factoring n = p×q is</text>
    <text x="307" y="185" text-anchor="middle" class="detail" fill="#555">computationally hard</text>
  </g>
  
  <g class="anim-fade anim-delay-5" data-narration="Applications include HTTPS, SSH, VPNs, and digital signatures">
    <rect x="210" y="200" width="195" height="50" rx="6" fill="#fff" stroke="#b87fa8" stroke-width="2" class="box"/>
    <text x="307" y="218" text-anchor="middle" class="label" fill="#2c5aa0">Applications</text>
    <text x="307" y="235" text-anchor="middle" class="detail">HTTPS, SSH, VPN, Digital Signatures</text>
  </g>
  
  <!-- Formula box -->
  <g class="anim-fade anim-delay-5" data-narration="The RSA encryption and decryption formulas">
    <rect x="210" y="260" width="195" height="125" rx="6" fill="#f0f8ff" stroke="#2c5aa0" stroke-width="1" class="box"/>
    <text x="307" y="280" text-anchor="middle" class="label" fill="#2c5aa0">RSA Formulas</text>
    <text x="307" y="305" text-anchor="middle" class="detail" font-family="Georgia, serif">Encryption:</text>
    <text x="307" y="322" text-anchor="middle" class="detail" font-family="Courier, monospace" font-size="12">C = Mᵉ mod n</text>
    <text x="307" y="345" text-anchor="middle" class="detail" font-family="Georgia, serif">Decryption:</text>
    <text x="307" y="362" text-anchor="middle" class="detail" font-family="Courier, monospace" font-size="12">M = Cᵈ mod n</text>
    <text x="307" y="380" text-anchor="middle" class="detail" font-size="10" fill="#777">where e×d ≡ 1 (mod φ(n))</text>
  </g>
</svg>