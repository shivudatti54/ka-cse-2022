<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="digital-signatures-key-management">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#449d44"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9534f"/>
      <stop offset="100%" style="stop-color:#c9302c"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#ec971f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: 'Segoe UI', Arial, sans-serif; }
    .box { animation: slideInUp 0.6s ease-out backwards; filter: url(#shadow); }
    .box-1 { animation-delay: 0.2s; }
    .box-2 { animation-delay: 0.4s; }
    .box-3 { animation-delay: 0.6s; }
    .box-4 { animation-delay: 0.8s; }
    .box-5 { animation-delay: 1.0s; }
    .arrow { animation: fadeIn 1s ease-out 1.2s backwards, arrowPulse 2s ease-in-out infinite 2s; }
    .label { animation: fadeIn 0.5s ease-out; font-family: 'Segoe UI', Arial, sans-serif; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .key-icon { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">
    Digital Signature Generation
  </text>
  <text x="210" y="50" text-anchor="middle" class="title" font-size="12" fill="#5d6d7e" font-family="Segoe UI, Arial, sans-serif">
    Process Overview
  </text>
  
  <!-- Section 1: Original Message -->
  <g class="box box-1" data-narration="The process begins with the original message or document that the sender wants to sign digitally.">
    <rect x="30" y="70" width="100" height="50" rx="8" fill="url(#boxGradient1)"/>
    <text x="80" y="90" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Original</text>
    <text x="80" y="107" text-anchor="middle" fill="white" font-size="12" font-family="Segoe UI, Arial, sans-serif">Message</text>
  </g>
  
  <!-- Arrow 1 -->
  <path class="arrow" d="M140 95 L180 95" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
  
  <!-- Section 2: Hash Function -->
  <g class="box box-2" data-narration="A cryptographic hash function (SHA-256) creates a fixed-size digest of the message content.">
    <rect x="190" y="70" width="90" height="50" rx="8" fill="url(#boxGradient2)"/>
    <text x="235" y="90" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Hash Function</text>
    <text x="235" y="107" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI, Arial, sans-serif">(SHA-256)</text>
  </g>
  
  <!-- Arrow 2 -->
  <path class="arrow" d="M290 95 L330 95" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Section 3: Message Digest/Hash -->
  <g class="box box-3" data-narration="The hash function produces a unique message digest - a fixed-size representation of the original message.">
    <rect x="340" y="70" width="70" height="50" rx="8" fill="url(#boxGradient3)"/>
    <text x="375" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Message</text>
    <text x="375" y="107" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI, Arial, sans-serif">Digest</text>
  </g>
  
  <!-- Vertical Arrow Down -->
  <path class="arrow" d="M375 130 L375 170" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Section 4: Private Key -->
  <g class="box box-4" data-narration="The sender's private key is used to encrypt the message digest, creating the digital signature.">
    <rect x="150" y="180" width="100" height="55" rx="8" fill="url(#keyGradient)" class="key-icon"/>
    <text x="200" y="200" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Sender's</text>
    <text x="200" y="218" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Private Key</text>
    <text x="200" y="232" text-anchor="middle" fill="#fff" font-size="9" font-family="Segoe UI, Arial, sans-serif" opacity="0.9">(RSA/ECDSA)</text>
  </g>
  
  <!-- Arrow to Encryption -->
  <path class="arrow" d="M260 207 L310 207" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Section 5: Encryption Process -->
  <g class="box box-5" data-narration="The message digest is encrypted using the sender's private key through asymmetric encryption.">
    <rect x="320" y="180" width="80" height="55" rx="8" fill="#6c5ce7"/>
    <text x="360" y="200" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Encrypt</text>
    <text x="360" y="218" text-anchor="middle" fill="white" font-size="10" font-family="Segoe UI, Arial, sans-serif">with Private</text>
    <text x="360" y="232" text-anchor="middle" fill="white" font-size="10" font-family="Segoe UI, Arial, sans-serif">Key</text>
  </g>
  
  <!-- Arrow Down from Encryption -->
  <path class="arrow" d="M360 245 L360 280" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Section 6: Digital Signature Output -->
  <g class="box" data-narration="The final output is the digital signature - an encrypted hash that provides authenticity and non-repudiation.">
    <rect x="140" y="290" width="140" height="60" rx="10" fill="url(#boxGradient4)" class="pulse-element"/>
    <text x="210" y="315" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Digital Signature</text>
    <text x="210" y="335" text-anchor="middle" fill="#e8daef" font-size="10" font-family="Segoe UI, Arial, sans-serif">Final Output</text>
  </g>
  
  <!-- Key Concept Box -->
  <g data-narration="Key point: The private key must be kept secret, while the public key is shared for signature verification.">
    <rect x="10" y="360" width="400" height="30" rx="5" fill="#34495e" opacity="0.9"/>
    <text x="210" y="378" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI, Arial, sans-serif">
      <tspan font-weight="bold">Key Concept:</tspan> Private key signs • Public key verifies • Ensures authenticity &amp; non-repudiation
    </text>
  </g>
  
  <!-- Lock Icon Representation -->
  <g transform="translate(55, 185)">
    <rect x="0" y="5" width="16" height="12" rx="2" fill="#f39c12"/>
    <path d="M3 5 V2 A5 5 0 0 1 13 2 V5" stroke="#f39c12" stroke-width="2" fill="none"/>
    <circle cx="8" cy="11" r="1.5" fill="#f39c12"/>
    <circle cx="8" cy="15" r="1.5" fill="#f39c12"/>
  </g>
  
</svg>