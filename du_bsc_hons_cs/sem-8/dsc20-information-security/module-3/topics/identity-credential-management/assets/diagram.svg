<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="identity-credential-management">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="actorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357a8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab04c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#539a3a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowPulse {
      0%, 100% { stroke-width: 2; opacity: 0.8; }
      50% { stroke-width: 3; opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; font-weight: bold; fill: #2c3e50; }
    .actor { animation: slideIn 0.6s ease-out; }
    .actor-box { animation: pulse 3s ease-in-out infinite; }
    .flow-arrow { animation: flowPulse 2s ease-in-out infinite; }
    .step-label { animation: fadeIn 0.5s ease-out; font-family: Arial, sans-serif; }
    .concept-box { animation: fadeIn 1s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="18" class="title">OAuth 2.0 Authorization Code Flow</text>
  <text x="210" y="50" text-anchor="middle" font-size="11" fill="#666" font-family="Arial, sans-serif">Identity Credential Management</text>
  
  <!-- Step Labels -->
  <g class="step-label" data-narration="The flow begins when the user initiates authentication">
    <text x="75" y="280" font-size="9" fill="#666" font-family="Arial, sans-serif">1. Request</text>
    <text x="75" y="292" font-size="9" fill="#666" font-family="Arial, sans-serif">Authorization</text>
  </g>
  <g class="step-label" data-narration="Authorization server prompts user for consent">
    <text x="200" y="95" font-size="9" fill="#666" font-family="Arial, sans-serif">2. User</text>
    <text x="200" y="107" font-size="9" fill="#666" font-family="Arial, sans-serif">Consent</text>
  </g>
  <g class="step-label" data-narration="Authorization code is returned to client">
    <text x="340" y="280" font-size="9" fill="#666" font-family="Arial, sans-serif">3. Authorization</text>
    <text x="340" y="292" font-size="9" fill="#666" font-family="Arial, sans-serif">Code</text>
  </g>
  <g class="step-label" data-narration="Client exchanges code for access token">
    <text x="250" y="170" font-size="9" fill="#666" font-family="Arial, sans-serif">4. Exchange</text>
    <text x="250" y="182" font-size="9" fill="#666" font-family="Arial, sans-serif">Token</text>
  </g>
  <g class="step-label" data-narration="Access token used to request protected resources">
    <text x="95" y="170" font-size="9" fill="#666" font-family="Arial, sans-serif">5. Access</text>
    <text x="95" y="182" font-size="9" fill="#666" font-family="Arial, sans-serif">Resource</text>
  </g>
  
  <!-- Actors -->
  
  <!-- Resource Owner -->
  <g class="actor" data-narration="Resource Owner: The user who owns the identity and grants access">
    <rect x="20" y="300" width="110" height="70" rx="8" fill="url(#actorGradient)" filter="url(#shadow)"/>
    <circle cx="75" cy="330" r="15" fill="#fff" opacity="0.9"/>
    <text x="75" y="335" text-anchor="middle" font-size="14" fill="#4a90a4" font-weight="bold">User</text>
    <text x="75" y="355" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial, sans-serif">Resource Owner</text>
  </g>
  
  <!-- Client Application -->
  <g class="actor" data-narration="Client Application: The app requesting access to user resources">
    <rect x="290" y="300" width="110" height="70" rx="8" fill="url(#actorGradient)" filter="url(#shadow)"/>
    <rect x="320" y="325" width="50" height="30" rx="4" fill="#fff" opacity="0.9"/>
    <text x="345" y="345" text-anchor="middle" font-size="10" fill="#4a90a4">App</text>
    <text x="345" y="355" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial, sans-serif">Client</text>
  </g>
  
  <!-- Authorization Server -->
  <g class="actor" data-narration="Authorization Server: Validates credentials and issues tokens">
    <rect x="290" y="30" width="110" height="70" rx="8" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <ellipse cx="345" cy="60" rx="20" ry="12" fill="#fff" opacity="0.9"/>
    <text x="345" y="64" text-anchor="middle" font-size="10" fill="#6ab04c" font-weight="bold">Auth</text>
    <text x="345" y="85" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial, sans-serif">Authorization Server</text>
  </g>
  
  <!-- Resource Server -->
  <g class="actor" data-narration="Resource Server: Hosts protected resources and validates tokens">
    <rect x="20" y="30" width="110" height="70" rx="8" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <rect x="55" y="50" width="40" height="25" rx="3" fill="#fff" opacity="0.9"/>
    <line x1="60" y1="55" x2="90" y2="55" stroke="#6ab04c" stroke-width="2"/>
    <line x1="60" y1="60" x2="85" y2="60" stroke="#6ab04c" stroke-width="2"/>
    <line x1="60" y1="65" x2="80" y2="65" stroke="#6ab04c" stroke-width="2"/>
    <text x="75" y="85" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial, sans-serif">Resource Server</text>
  </g>
  
  <!-- Flow Arrows -->
  
  <!-- Arrow 1: User to Client -->
  <path d="M 130 335 L 280 335" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow-arrow"/>
  
  <!-- Arrow 2: Client to Auth Server -->
  <path d="M 345 110 L 345 220 Q 345 250 380 250 L 390 250" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow-arrow"/>
  
  <!-- Arrow 3: Auth Server back to User (consent) -->
  <path d="M 300 60 L 180 60 Q 130 60 130 150 L 130 250" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow-arrow"/>
  
  <!-- Arrow 4: Auth Server to Client (auth code) -->
  <path d="M 345 110 L 345 220 Q 345 250 310 250 L 290 250" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow-arrow"/>
  
  <!-- Arrow 5: Client to Auth Server (token exchange) -->
  <path d="M 300 150 L 350 150 L 350 110" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow-arrow"/>
  
  <!-- Arrow 6: Client to Resource Server (access) -->
  <path d="M 290 150 L 140 150 L 140 110" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow-arrow"/>
  
  <!-- Arrow 7: Resource Server to Client (data) -->
  <path d="M 140 110 L 140 150 L 200 150 L 280 150" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow-arrow"/>
  
  <!-- Concept Boxes -->
  <g class="concept-box" data-narration="Key concept: Authorization Code provides secure token exchange">
    <rect x="150" y="355" width="130" height="35" rx="5" fill="#fff" stroke="#4a90a4" stroke-width="1" opacity="0.9"/>
    <text x="165" y="370" font-size="10" fill="#333" font-family="Arial, sans-serif" font-weight="bold">Authorization Code</text>
    <text x="165" y="382" font-size="8" fill="#666" font-family="Arial, sans-serif">Secure token exchange</text>
  </g>
  
  <g class="concept-box" data-narration="Key concept: Access Token enables resource access">
    <rect x="150" y="200" width="120" height="35" rx="5" fill="#fff" stroke="#6ab04c" stroke-width="1" opacity="0.9"/>
    <text x="160" y="215" font-size="10" fill="#333" font-family="Arial, sans-serif" font-weight="bold">Access Token</text>
    <text x="160" y="227" font-size="8" fill="#666" font-family="Arial, sans-serif">Bearer token for API</text>
  </g>

  <!-- Legend/Key -->
  <g class="concept-box" data-narration="Understanding the OAuth 2.0 flow components">
    <rect x="270" y="365" width="140" height="25" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <circle cx="282" cy="377" r="5" fill="#4a90a4"/>
    <text x="292" y="381" font-size="9" fill="#333" font-family="Arial, sans-serif">Actors</text>
    <circle cx="330" cy="377" r="5" fill="#6ab04c"/>
    <text x="340" y="381" font-size="9" fill="#333" font-family="Arial, sans-serif">Servers</text>
  </g>
</svg>