<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="discretionary-role-based-access-control">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#e8e8f4"/>
      <stop offset="100%" style="stop-color:#f4e8f8"/>
    </linearGradient>
    <linearGradient id="permissionsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e6b8"/>
      <stop offset="100%" style="stop-color:#90c890"/>
    </linearGradient>
    <linearGradient id="rolesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8ab4d8"/>
    </linearGradient>
    <linearGradient id="usersGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#d8b890"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .box-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .box-slide { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .arrow-anim { animation: slideIn 0.5s ease-out forwards, arrowPulse 2s infinite; opacity: 0; }
    .pulse-anim { animation: pulse 2s infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>

  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" data-narration="Title: Discretionary Role-Based Access Control (DRBAC)">Discretionary Role-Based Access Control</text>
  <line x1="40" y1="38" x2="380" y2="38" stroke="#8899aa" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Permissions Box (Top) -->
  <g class="box-slide delay-1" data-narration="Permissions: Authorizations to perform operations on system resources">
    <rect x="120" y="55" width="180" height="60" rx="8" fill="url(#permissionsGrad)" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" class="label-text">PERMISSIONS</text>
    <text x="210" y="95" text-anchor="middle" class="detail-text">Authorizations to perform operations</text>
    <text x="210" y="108" text-anchor="middle" class="detail-text">Read, Write, Execute, Delete</text>
  </g>

  <!-- Role-Permission Arrow (RPA) -->
  <g class="arrow-anim delay-2" data-narration="RPA: Role-Permission Assignment links roles to their authorized permissions">
    <line x1="210" y1="115" x2="210" y2="145" stroke="#667788" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="205,140 215,140 210,150" fill="#667788"/>
    <rect x="150" y="118" width="120" height="18" rx="4" fill="#c8d8e8" opacity="0.9"/>
    <text x="210" y="131" text-anchor="middle" class="detail-text" style="font-size:11px">RPA (Role→Permissions)</text>
  </g>

  <!-- Roles Box (Middle) -->
  <g class="box-slide delay-2" data-narration="Roles: Job functions and responsibilities assigned to users">
    <rect x="120" y="145" width="180" height="70" rx="8" fill="url(#rolesGrad)" filter="url(#shadow)"/>
    <text x="210" y="170" text-anchor="middle" class="label-text">ROLES</text>
    <text x="210" y="188" text-anchor="middle" class="detail-text">Job functions/responsibilities</text>
    <text x="210" y="203" text-anchor="middle" class="detail-text">Admin, Manager, Employee, Guest</text>
  </g>

  <!-- User-Role Arrow (URA) -->
  <g class="arrow-anim delay-3" data-narration="URA: User-Role Assignment assigns roles to individual users">
    <line x1="210" y1="215" x2="210" y2="245" stroke="#667788" stroke-width="2"/>
    <polygon points="205,240 215,240 210,250" fill="#667788"/>
    <rect x="150" y="218" width="120" height="18" rx="4" fill="#c8d8e8" opacity="0.9"/>
    <text x="210" y="231" text-anchor="middle" class="detail-text" style="font-size:11px">URA (User→Roles)</text>
  </g>

  <!-- Users Box (Bottom) -->
  <g class="box-slide delay-3" data-narration="Users: Individuals who access the system with assigned roles">
    <rect x="120" y="245" width="180" height="60" rx="8" fill="url(#usersGrad)" filter="url(#shadow)"/>
    <text x="210" y="268" text-anchor="middle" class="label-text">USERS</text>
    <text x="210" y="285" text-anchor="middle" class="detail-text">Individuals accessing the system</text>
    <text x="210" y="298" text-anchor="middle" class="detail-text">John, Sarah, Mike, Alice</text>
  </g>

  <!-- Key Concept Boxes -->
  <!-- Discretionary Element -->
  <g class="box-fade delay-4" data-narration="Discretionary element: Owners can grant permissions to roles">
    <rect x="10" y="130" width="95" height="55" rx="5" fill="#f8e8e8" stroke="#d88888" stroke-width="1"/>
    <text x="57" y="148" text-anchor="middle" class="detail-text" style="font-weight:bold; fill:#a55">DISCRETIONARY</text>
    <text x="57" y="163" text-anchor="middle" class="detail-text" style="font-size:10px">Owner can grant</text>
    <text x="57" y="176" text-anchor="middle" class="detail-text" style="font-size:10px">permissions</text>
  </g>

  <!-- Principle of Least Privilege -->
  <g class="box-fade delay-4" data-narration="Principle of Least Privilege: Users get minimum permissions needed">
    <rect x="315" y="160" width="100" height="50" rx="5" fill="#e8f8e8" stroke="#88c888" stroke-width="1"/>
    <text x="365" y="178" text-anchor="middle" class="detail-text" style="font-weight:bold; fill:#285628">LEAST PRIVILEGE</text>
    <text x="365" y="195" text-anchor="middle" class="detail-text" style="font-size:10px">Minimum access</text>
    <text x="365" y="207" text-anchor="middle" class="detail-text" style="font-size:10px">needed for role</text>
  </g>

  <!-- Hybrid Model Box -->
  <g class="box-fade delay-5" data-narration="Hybrid Model: Combines RBAC efficiency with DAC flexibility">
    <rect x="315" y="55" width="100" height="45" rx="5" fill="#e8e8f8" stroke="#8888d8" stroke-width="1"/>
    <text x="365" y="72" text-anchor="middle" class="detail-text" style="font-weight:bold; fill:#4848a8">HYBRID MODEL</text>
    <text x="365" y="89" text-anchor="middle" class="detail-text" style="font-size:10px">RBAC + DAC</text>
  </g>

  <!-- Dynamic Delegation -->
  <g class="box-fade delay-5" data-narration="Dynamic Delegation: Roles can be granted temporarily">
    <rect x="10" y="220" width="95" height="50" rx="5" fill="#e8f0f8" stroke="#88a8d8" stroke-width="1"/>
    <text x="57" y="240" text-anchor="middle" class="detail-text" style="font-weight:bold; fill:#2848a8">DYNAMIC</text>
    <text x="57" y="257" text-anchor="middle" class="detail-text" style="font-size:10px">Role delegation</text>
    <text x="57" y="269" text-anchor="middle" class="detail-text" style="font-size:10px">&amp; temporary access</text>
  </g>

  <!-- Bottom Note -->
  <g class="box-fade delay-5" data-narration="Real-world applications: Healthcare (HIPAA), Banking, University systems">
    <rect x="40" y="320" width="340" height="35" rx="5" fill="#f8f8e8" stroke="#c8c888" stroke-width="1"/>
    <text x="210" y="335" text-anchor="middle" class="detail-text" style="font-size:11px">Applications: Healthcare (HIPAA), Banking, University Administration, Cloud ERP</text>
    <text x="210" y="348" text-anchor="middle" class="detail-text" style="font-size:10px; font-style:italic">Balances security with operational flexibility</text>
  </g>

  <!-- Decorative icons -->
  <g class="pulse-anim" style="transform-origin: 210px 85px;">
    <circle cx="210" cy="85" r="25" fill="none" stroke="#90c890" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
  </g>
</svg>