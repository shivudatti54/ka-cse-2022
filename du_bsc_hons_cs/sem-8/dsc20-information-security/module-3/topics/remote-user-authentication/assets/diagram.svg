<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="remote-user-authentication">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="asGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2691e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tgsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98d8aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5cb85c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dda0dd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ba55d3;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-weight: bold; font-size: 20px; fill: #2c3e50; }
    .entity-box { animation: slideInLeft 0.8s ease-out; }
    .entity-box-right { animation: slideInRight 0.8s ease-out; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #fff; font-weight: bold; }
    .sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #f0f0f0; }
    .step-box { animation: fadeIn 1.2s ease-out; }
    .arrow-line { stroke: #555; stroke-width: 2; fill: none; stroke-dasharray: 5,5; animation: dash 1s linear infinite; }
    .arrow-line-reverse { stroke: #555; stroke-width: 2; fill: none; stroke-dasharray: 5,5; }
    .flow-text { font-family: Arial, sans-serif; font-size: 10px; fill: #333; }
    .concept-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .concept-text { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .legend-box { animation: fadeIn 1.5s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Kerberos Authentication Flow</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Remote User Authentication Protocol</text>
  
  <!-- Entities -->
  <!-- Client -->
  <g class="entity-box" data-narration="Client: The user seeking authentication to access remote services">
    <rect x="30" y="90" width="80" height="60" rx="8" fill="url(#clientGrad)" stroke="#4a90a4" stroke-width="2"/>
    <text x="70" y="115" text-anchor="middle" class="label">Client</text>
    <text x="70" y="132" text-anchor="middle" class="sublabel">(User)</text>
  </g>
  
  <!-- Authentication Server (AS) -->
  <g class="entity-box-right" data-narration="AS: Verifies user credentials and issues Ticket Granting Ticket">
    <rect x="170" y="90" width="80" height="60" rx="8" fill="url(#asGrad)" stroke="#a0522d" stroke-width="2"/>
    <text x="210" y="115" text-anchor="middle" class="label">AS</text>
    <text x="210" y="132" text-anchor="middle" class="sublabel">Auth Server</text>
  </g>
  
  <!-- Ticket Granting Server (TGS) -->
  <g class="entity-box" data-narration="TGS: Issues service tickets to authenticated clients">
    <rect x="170" y="200" width="80" height="60" rx="8" fill="url(#tgsGrad)" stroke="#3d8b3d" stroke-width="2"/>
    <text x="210" y="225" text-anchor="middle" class="label">TGS</text>
    <text x="210" y="242" text-anchor="middle" class="sublabel">Ticket Granting</text>
  </g>
  
  <!-- Service/Server -->
  <g class="entity-box-right" data-narration="Service: The target resource the client wants to access">
    <rect x="310" y="200" width="80" height="60" rx="8" fill="url(#serviceGrad)" stroke="#8b4789" stroke-width="2"/>
    <text x="350" y="225" text-anchor="middle" class="label">Service</text>
    <text x="350" y="242" text-anchor="middle" class="sublabel">(File/Print)</text>
  </g>
  
  <!-- Flow Arrows -->
  <!-- Step 1: Client -> AS (Request TGT) -->
  <line x1="110" y1="120" x2="165" y2="120" class="arrow-line" marker-end="url(#arrowhead)" data-narration="Step 1: Client requests Ticket Granting Ticket from AS"/>
  <text x="140" y="110" text-anchor="middle" class="flow-text">1. Request TGT</text>
  
  <!-- Step 2: AS -> Client (Issue TGT) -->
  <line x1="165" y1="150" x2="110" y2="150" class="arrow-line-reverse" marker-end="url(#arrowhead)" data-narration="Step 2: AS verifies and issues TGT to client"/>
  <text x="140" y="165" text-anchor="middle" class="flow-text">2. Issue TGT</text>
  
  <!-- Step 3: Client -> TGS (Request Service Ticket) -->
  <line x1="110" y1="200" x2="165" y2="230" class="arrow-line" marker-end="url(#arrowhead)" data-narration="Step 3: Client uses TGT to request service ticket from TGS"/>
  <text x="145" y="200" text-anchor="middle" class="flow-text">3. Service</text>
  <text x="145" y="212" text-anchor="middle" class="flow-text">Request</text>
  
  <!-- Step 4: TGS -> Client (Issue Service Ticket) -->
  <line x1="165" y1="260" x2="110" y2="230" class="arrow-line-reverse" marker-end="url(#arrowhead)" data-narration="Step 4: TGS issues service ticket to client"/>
  <text x="145" y="255" text-anchor="middle" class="flow-text">4. Service</text>
  <text x="145" y="267" text-anchor="middle" class="flow-text">Ticket</text>
  
  <!-- Step 5: Client -> Service (Access) -->
  <line x1="250" y1="230" x2="305" y2="230" class="arrow-line" marker-end="url(#arrowhead)" data-narration="Step 5: Client presents service ticket to access the resource"/>
  <text x="280" y="220" text-anchor="middle" class="flow-text">5. Access</text>
  
  <!-- Step 6: Service -> Client (Grant Access) -->
  <line x1="305" y1="250" x2="250" y2="250" class="arrow-line-reverse" marker-end="url(#arrowhead)" data-narration="Step 6: Service verifies ticket and grants access"/>
  <text x="280" y="265" text-anchor="middle" class="flow-text">6. Granted</text>
  
  <!-- Key Concepts Box -->
  <g class="legend-box" data-narration="Key Authentication Factors: Something You Know, Have, or Are">
    <rect x="15" y="300" width="390" height="90" rx="5" fill="#fff" stroke="#ccc" stroke-width="1" opacity="0.9"/>
    <text x="25" y="320" class="concept-title">Key Concepts</text>
    <text x="25" y="338" class="concept-text">• <tspan font-weight="bold">TGT</tspan>: Ticket Granting Ticket - credentials from AS</text>
    <text x="25" y="352" class="concept-text">• <tspan font-weight="bold">TGS</tspan>: Issues tickets for specific services</text>
    <text x="25" y="366" class="concept-text">• <tspan font-weight="bold">Session Keys</tspan>: Secure encrypted communication</text>
    <text x="25" y="380" class="concept-text">• <tspan font-weight="bold">Timestamps</tspan>: Prevent replay attacks</text>
  </g>
</svg>