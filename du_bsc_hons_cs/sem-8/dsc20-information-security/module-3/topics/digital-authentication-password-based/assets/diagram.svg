<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="digital-authentication-password-based">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f2"/>
      <stop offset="100%" style="stop-color:#c5dbf0"/>
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="resultGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56ab2f"/>
      <stop offset="100%" style="stop-color:#a8e063"/>
    </linearGradient>
    <linearGradient id="rejectGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eb3349"/>
      <stop offset="100%" style="stop-color:#f45c43"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideDown {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
    .section-box { rx: 8; ry: 8; stroke: #bdc3c7; stroke-width: 1; }
    .arrow { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .section-1 { animation: slideInLeft 0.5s ease-out forwards; }
    .section-2 { animation: slideInRight 0.5s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: fadeIn 0.5s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideDown 0.5s ease-out 0.9s forwards; opacity: 0; }
    .section-5 { animation: pulse 1s ease-in-out 1.2s forwards; }
    .section-title { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #fff; }
    .pulse-anim { animation: pulse 2s infinite; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title" data-narration="Title: Digital Authentication - Password Based">Digital Authentication: Password-Based</text>
  
  <!-- Section 1: User/Client -->
  <g class="section-1" data-narration="Step 1: User enters username and password on the client side">
    <rect x="15" y="45" width="100" height="80" fill="url(#clientGradient)" class="section-box"/>
    <text x="65" y="62" text-anchor="middle" class="section-title">CLIENT</text>
    <text x="65" y="82" text-anchor="middle" class="label">User Login</text>
    <text x="65" y="96" text-anchor="middle" class="detail">Username</text>
    <text x="65" y="110" text-anchor="middle" class="detail">Password</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="115" y1="85" x2="145" y2="85" class="arrow"/>
  
  <!-- Section 2: Server -->
  <g class="section-2" data-narration="Step 2: Server receives credentials and processes them">
    <rect x="145" y="45" width="120" height="100" fill="url(#serverGradient)" class="section-box"/>
    <text x="205" y="62" text-anchor="middle" class="section-title">AUTH SERVER</text>
    <text x="205" y="80" text-anchor="middle" class="label">Process Login</text>
    <text x="205" y="95" text-anchor="middle" class="detail">1. Retrieve hash</text>
    <text x="205" y="108" text-anchor="middle" class="detail">2. Hash input</text>
    <text x="205" y="121" text-anchor="middle" class="detail">3. Compare hash</text>
  </g>
  
  <!-- Arrow to DB -->
  <line x1="205" y1="145" x2="205" y2="175" class="arrow"/>
  
  <!-- Section 3: Database -->
  <g class="section-3" data-narration="Step 3: Server retrieves stored password hash and salt from database">
    <rect x="145" y="175" width="120" height="70" fill="url(#dbGradient)" class="section-box"/>
    <text x="205" y="195" text-anchor="middle" class="section-title">PASSWORD STORE</text>
    <text x="205" y="215" text-anchor="middle" class="detail" fill="#fff">Hash: a7b3c2...</text>
    <text x="205" y="230" text-anchor="middle" class="detail" fill="#fff">Salt: x9@#s4</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="205" y1="245" x2="205" y2="265" class="arrow"/>
  
  <!-- Section 4: Comparison -->
  <g class="section-4" data-narration="Step 4: Server compares computed hash with stored hash">
    <rect x="145" y="265" width="120" height="45" fill="#9b59b6" class="section-box"/>
    <text x="205" y="283" text-anchor="middle" class="label" fill="#fff">Hash Comparison</text>
    <text x="205" y="298" text-anchor="middle" class="detail" fill="#fff">Match?</text>
  </g>
  
  <!-- Arrows to results -->
  <line x1="205" y1="310" x2="170" y2="330" class="arrow"/>
  <line x1="205" y1="310" x2="240" y2="330" class="arrow"/>
  
  <!-- Section 5: Results -->
  <g class="section-5" data-narration="Step 5: Access granted if hash matches, rejected otherwise">
    <rect x="115" y="335" width="60" height="35" fill="url(#resultGradient)" class="section-box" rx="5"/>
    <text x="145" y="355" text-anchor="middle" class="label" fill="#fff" font-size="10">ACCESS</text>
    <text x="145" y="365" text-anchor="middle" class="detail" fill="#fff" font-size="8">GRANTED</text>
    
    <rect x="245" y="335" width="60" height="35" fill="url(#rejectGradient)" class="section-box" rx="5"/>
    <text x="275" y="355" text-anchor="middle" class="label" fill="#fff" font-size="10">ACCESS</text>
    <text x="275" y="365" text-anchor="middle" class="detail" fill="#fff" font-size="8">DENIED</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key Concepts: Three authentication factors - Something you know, have, or are">
    <rect x="290" y="45" width="115" height="90" fill="#fff" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="347" y="60" text-anchor="middle" class="label" font-weight="bold" font-size="11">Key Concepts</text>
    <text x="347" y="78" text-anchor="middle" class="detail" font-size="9">Auth Factors:</text>
    <text x="347" y="92" text-anchor="middle" class="detail" font-size="8">• Something you know</text>
    <text x="347" y="104" text-anchor="middle" class="detail" font-size="8">• Something you have</text>
    <text x="347" y="116" text-anchor="middle" class="detail" font-size="8">• Something you are</text>
    <text x="347" y="128" text-anchor="middle" class="detail" font-size="8">MFA = 2+ factors</text>
  </g>
  
  <!-- Process Flow Legend -->
  <g data-narration="Password flow: Plain password is never stored, only salted hash">
    <rect x="290" y="145" width="115" height="60" fill="#fff" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="347" y="160" text-anchor="middle" class="label" font-weight="bold" font-size="10">Security Note</text>
    <text x="347" y="178" text-anchor="middle" class="detail" font-size="8">Passwords stored</text>
    <text x="347" y="190" text-anchor="middle" class="detail" font-size="8">as salted hashes</text>
    <text x="347" y="202" text-anchor="middle" class="detail" font-size="8">Never plain text!</text>
  </g>
  
  <!-- Step indicators -->
  <g class="pulse-anim">
    <circle cx="65" cy="70" r="5" fill="#27ae60" opacity="0.8"/>
    <circle cx="205" cy="70" r="5" fill="#e67e22" opacity="0.8"/>
    <circle cx="205" cy="210" r="5" fill="#9b59b6" opacity="0.8"/>
    <circle cx="145" cy="355" r="4" fill="#27ae60" opacity="0.8"/>
    <circle cx="275" cy="355" r="4" fill="#c0392b" opacity="0.8"/>
  </g>
</svg>