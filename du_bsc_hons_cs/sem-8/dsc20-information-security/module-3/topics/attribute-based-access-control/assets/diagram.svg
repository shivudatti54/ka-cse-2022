<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="attribute-based-access-control">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357a8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab0c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90a4;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90a4" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: bold; fill: #2c5f6e; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #ffffff; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #e8f4f8; }
    .section-box { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.1s; }
    .section-box:nth-child(2) { animation-delay: 0.3s; }
    .section-box:nth-child(3) { animation-delay: 0.5s; }
    .section-box:nth-child(4) { animation-delay: 0.7s; }
    .section-box:nth-child(5) { animation-delay: 0.9s; }
    .title-anim { animation: slideIn 0.6s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .flow-line { stroke: #4a90a4; stroke-width: 2; stroke-dasharray: 5,5; animation: flowDash 1s linear infinite; }
    .attr-box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">ABAC Architecture</text>
  <text x="210" y="50" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#5a8a9a">Attribute-Based Access Control</text>
  
  <!-- Subject/User -->
  <g class="section-box" data-narration="The Subject (User) initiates an access request to a protected resource">
    <rect x="20" y="70" width="80" height="55" rx="6" fill="url(#boxGrad)" filter="url(#shadow)" />
    <text x="60" y="92" text-anchor="middle" class="label">Subject</text>
    <text x="60" y="108" text-anchor="middle" class="detail">(User)</text>
    <circle cx="60" cy="85" r="12" fill="#6ab0c7" />
    <path d="M55 82 Q60 75 65 82" stroke="#fff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- PEP -->
  <g class="section-box" data-narration="PEP intercepts the request and forwards it to PDP">
    <rect x="130" y="70" width="70" height="55" rx="6" fill="url(#accentGrad)" filter="url(#shadow)" />
    <text x="165" y="92" text-anchor="middle" class="label">PEP</text>
    <text x="165" y="108" text-anchor="middle" class="detail">Enforcement</text>
  </g>
  
  <!-- PIP -->
  <g class="section-box" data-narration="PIP retrieves attributes from attribute sources like LDAP or databases">
    <rect x="230" y="70" width="70" height="55" rx="6" fill="url(#boxGrad)" filter="url(#shadow)" />
    <text x="265" y="92" text-anchor="middle" class="label">PIP</text>
    <text x="265" y="108" text-anchor="middle" class="detail">Information</text>
  </g>
  
  <!-- PDP -->
  <g class="section-box" data-narration="PDP evaluates policies against attributes and makes access decision">
    <rect x="330" y="70" width="75" height="55" rx="6" fill="url(#accentGrad)" filter="url(#shadow)" />
    <text x="367" y="92" text-anchor="middle" class="label">PDP</text>
    <text x="367" y="108" text-anchor="middle" class="detail">Decision</text>
  </g>
  
  <!-- Arrows connecting main components -->
  <path d="M100 97 L125 97" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowHead)" />
  <path d="M200 97 L225 97" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowHead)" />
  <path d="M300 97 L325 97" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowHead)" />
  
  <!-- Attribute Sources -->
  <g class="attr-box" data-narration="Attribute sources provide subject, resource, and environment attributes">
    <rect x="15" y="160" width="120" height="70" rx="6" fill="#f0f8fa" stroke="#4a90a4" stroke-width="1.5" />
    <text x="75" y="180" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2c5f6e">Attribute Sources</text>
    <text x="75" y="200" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#5a8a9a">LDAP</text>
    <text x="75" y="215" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#5a8a9a">Database</text>
    <text x="75" y="230" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#5a8a9a">Active Directory</text>
  </g>
  
  <!-- PIP to Attribute Sources arrow -->
  <path d="M150 160 L150 145 Q150 140 165 140 L190 140" stroke="#4a90a4" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrowHead)" />
  
  <!-- PAP -->
  <g class="attr-box" data-narration="PAP manages and stores access control policies">
    <rect x="170" y="250" width="80" height="60" rx="6" fill="url(#boxGrad)" filter="url(#shadow)" />
    <text x="210" y="275" text-anchor="middle" class="label">PAP</text>
    <text x="210" y="292" text-anchor="middle" class="detail">Administration</text>
    <text x="210" y="305" text-anchor="middle" class="detail">(Policies)</text>
  </g>
  
  <!-- PDP to PAP arrow -->
  <path d="M330 125 L330 150 Q330 160 310 165 L270 180 Q255 183 250 195" stroke="#4a90a4" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrowHead)" />
  
  <!-- PDP to PEP (Decision response) -->
  <path d="M330 125 L280 125 Q260 125 250 115" stroke="#c75a5a" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrowHead)" />
  
  <!-- Decision arrow label -->
  <text x="295" y="118" font-family="Segoe UI, sans-serif" font-size="9" fill="#c75a5a">Decision</text>
  
  <!-- Policy arrow label -->
  <text x="280" y="195" font-family="Segoe UI, sans-serif" font-size="9" fill="#5a8a9a">Policy</text>
  
  <!-- Legend / Key -->
  <g class="attr-box">
    <rect x="280" y="250" width="125" height="65" rx="6" fill="#f0f8fa" stroke="#4a90a4" stroke-width="1.5" />
    <text x="342" y="268" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2c5f6e">Key Attributes</text>
    <text x="342" y="285" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a8a9a">Subject</text>
    <text x="342" y="298" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a8a9a">Resource</text>
    <text x="342" y="311" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a8a9a">Environment</text>
  </g>
  
  <!-- ABAC Flow label -->
  <text x="265" y="145" font-family="Segoe UI, sans-serif" font-size="10" font-style="italic" fill="#5a8a9a">Attributes → Evaluate → Decision</text>
  
  <!-- Decorative elements -->
  <circle cx="40" cy="370" r="4" fill="#6ab0c7" opacity="0.6" />
  <circle cx="380" cy="370" r="4" fill="#6ab0c7" opacity="0.6" />
  <circle cx="60" cy="360" r="3" fill="#4a90a4" opacity="0.5" />
  <circle cx="360" cy="360" r="3" fill="#4a90a4" opacity="0.5" />
</svg>