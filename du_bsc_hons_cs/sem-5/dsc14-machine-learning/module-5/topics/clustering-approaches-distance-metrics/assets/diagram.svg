<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="clustering-approaches-distance-metrics" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9bc4e2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .section1 { animation: fadeIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section2 { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section3 { animation: fadeIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .section4 { animation: fadeIn 0.6s ease-out 0.9s forwards; opacity: 0; }
    .dendrogram { animation: fadeIn 0.8s ease-out 1.1s forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .line-anim { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out 1.2s forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12" ry="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Clustering Approaches</text>
  <text x="210" y="52" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="14" fill="#5d6d7e">Distance Metrics Overview</text>
  
  <!-- Section 1: Hierarchical Clustering -->
  <g class="section1" data-narration="Hierarchical Clustering builds a tree-like structure of clusters through successive merging (agglomerative) or splitting (divisive) of data points.">
    <rect x="20" y="70" width="130" height="75" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="85" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">Hierarchical</text>
    <text x="85" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565c0">Clustering</text>
    <text x="85" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">Dendrogram</text>
    <!-- Mini dendrogram icon -->
    <line x1="55" y1="135" x2="55" y2="155" stroke="#1565c0" stroke-width="1.5"/>
    <line x1="55" y1="145" x2="75" y2="145" stroke="#1565c0" stroke-width="1.5"/>
    <line x1="55" y1="145" x2="95" y2="145" stroke="#1565c0" stroke-width="1.5"/>
    <line x1="75" y1="135" x2="75" y2="155" stroke="#1565c0" stroke-width="1.5"/>
    <line x1="95" y1="135" x2="95" y2="155" stroke="#1565c0" stroke-width="1.5"/>
  </g>
  
  <!-- Section 2: Non-Hierarchical Clustering -->
  <g class="section2" data-narration="Non-Hierarchical Clustering like K-Means partitions data into K clusters by iteratively updating cluster centers based on distance.">
    <rect x="165" y="70" width="130" height="75" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="230" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">Non-Hierarchical</text>
    <text x="230" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">K-Means</text>
    <text x="230" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">Partitioning</text>
    <!-- K-Means icon -->
    <circle cx="210" cy="145" r="8" fill="#2e7d32" opacity="0.7"/>
    <circle cx="250" cy="145" r="8" fill="#2e7d32" opacity="0.7"/>
    <line x1="218" y1="145" x2="242" y2="145" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Arrow between clustering types -->
  <g class="line-anim">
    <path d="M150 107 L165 107" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Section 3: Distance Metrics -->
  <g class="section3" data-narration="Distance metrics quantify similarity between points. Euclidean measures straight-line distance, Manhattan uses grid-based paths, and Minkowski generalizes both.">
    <rect x="20" y="160" width="275" height="85" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="157" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">Distance Metrics</text>
    
    <!-- Euclidean -->
    <text x="55" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#bf360c">Euclidean</text>
    <text x="55" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bf360c">√(x₂-x₁)² + (y₂-y₁)²</text>
    <line x1="40" y1="228" x2="70" y2="228" stroke="#bf360c" stroke-width="1.5" class="pulse-element"/>
    
    <!-- Manhattan -->
    <text x="157" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#bf360c">Manhattan</text>
    <text x="157" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bf360c">|x₂-x₁| + |y₂-y₁|</text>
    <path d="M142 228 L147 228 L147 233 L157 233 L157 238 L167 238" stroke="#bf360c" stroke-width="1.5" fill="none"/>
    
    <!-- Minkowski -->
    <text x="245" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#bf360c">Minkowski</text>
    <text x="245" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bf360c">(Σ|xᵢ-уᵢ|ᵖ)^1/p</text>
    <text x="245" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bf360c">p=1→Manhattan</text>
  </g>
  
  <!-- Section 4: Agglomerative vs Divisive -->
  <g class="section4" data-narration="Agglomerative clustering starts with individual points and merges them. Divisive starts with one cluster and recursively splits it.">
    <rect x="310" y="70" width="95" height="75" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="357" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6a1b9a">Agglomerative</text>
    <text x="357" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">Bottom-up</text>
    <text x="357" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">Merge →</text>
    
    <rect x="310" y="155" width="95" height="75" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="357" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6a1b9a">Divisive</text>
    <text x="357" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">Top-down</text>
    <text x="357" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">← Split</text>
  </g>
  
  <!-- Dendrogram Visualization -->
  <g class="dendrogram" data-narration="The dendrogram shows the hierarchical clustering process with merge distances on the vertical axis and data points on the horizontal axis.">
    <rect x="20" y="260" width="380" height="130" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
    <text x="210" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Hierarchical Clustering Dendrogram</text>
    
    <!-- Y-axis -->
    <line x1="50" y1="370" x2="50" y2="300" stroke="#666" stroke-width="1"/>
    <text x="40" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666" transform="rotate(-90,40,335)">Distance</text>
    
    <!-- X-axis labels -->
    <text x="80" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">A</text>
    <text x="130" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">B</text>
    <text x="180" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">C</text>
    <text x="230" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">D</text>
    <text x="280" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">E</text>
    <text x="330" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">F</text>
    
    <!-- Dendrogram lines -->
    <!-- Level 1: A-B merge at distance 1 -->
    <line x1="80" y1="370" x2="80" y2="355" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="130" y1="370" x2="130" y2="355" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="80" y1="355" x2="130" y2="355" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="105" y1="355" x2="105" y2="340" stroke="#1976d2" stroke-width="1.5"/>
    
    <!-- Level 2: C-D merge at distance 1.5 -->
    <line x1="180" y1="370" x2="180" y2="345" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="230" y1="370" x2="230" y2="345" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="180" y1="345" x2="230" y2="345" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="205" y1="345" x2="205" y2="330" stroke="#388e3c" stroke-width="1.5"/>
    
    <!-- Level 3: E-F merge at distance 2 -->
    <line x1="280" y1="370" x2="280" y2="340" stroke="#f57c00" stroke-width="1.5"/>
    <line x1="330" y1="370" x2="330" y2="340" stroke="#f57c00" stroke-width="1.5"/>
    <line x1="280" y1="340" x2="330" y2="340" stroke="#f57c00" stroke-width="1.5"/>
    <line x1="305" y1="340" x2="305" y2="320" stroke="#f57c00" stroke-width="1.5"/>
    
    <!-- Level 4: Merge AB with CD at distance 2.5 -->
    <line x1="105" y1="340" x2="105" y2="320" stroke="#7b1fa2" stroke-width="1.5"/>
    <line x1="205" y1="330" x2="205" y2="320" stroke="#7b1fa2" stroke-width="1.5"/>
    <line x1="105" y1="320" x2="205" y2="320" stroke="#7b1fa2" stroke-width="1.5"/>
    <line x1="155" y1="320" x2="155" y2="305" stroke="#7b1fa2" stroke-width="1.5"/>
    
    <!-- Level 5: Merge all at distance 3.5 -->
    <line x1="155" y1="305" x2="155" y2="300" stroke="#c62828" stroke-width="2"/>
    <line x1="305" y1="320" x2="305" y2="300" stroke="#c62828" stroke-width="2"/>
    <line x1="155" y1="300" x2="305" y2="300" stroke="#c62828" stroke-width="2"/>
    
    <!-- Distance markers -->
    <line x1="45" y1="370" x2="50" y2="370" stroke="#666" stroke-width="1"/>
    <text x="38" y="373" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">0</text>
    <line x1="45" y1="340" x2="50" y2="340" stroke="#666" stroke-width="1"/>
    <text x="38" y="343" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">1</text>
    <line x1="45" y1="320" x2="50" y2="320" stroke="#666" stroke-width="1"/>
    <text x="38" y="323" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">2</text>
    <line x1="45" y1="300" x2="50" y2="300" stroke="#666" stroke-width="1"/>
    <text x="38" y="303" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#666">3</text>
  </g>
</svg>