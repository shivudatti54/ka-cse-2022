<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="hierarchical-clustering">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5e6f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agglomGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="divisGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9aa2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .dendrogram { animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .tree-line { stroke-dasharray: 200; animation: drawLine 1.5s ease-out forwards; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text">Hierarchical Clustering</text>
  
  <!-- Agglomerative Section -->
  <g class="section-box section-1" data-narration="Agglomerative clustering starts with each point as a separate cluster and merges them bottom-up">
    <rect x="15" y="280" width="90" height="70" rx="8" fill="url(#agglomGradient)" filter="url(#shadow)"/>
    <text x="60" y="300" text-anchor="middle" class="label" font-weight="bold">Agglomerative</text>
    <text x="60" y="318" text-anchor="middle" class="detail">Bottom-up</text>
    <text x="60" y="334" text-anchor="middle" class="detail" font-size="10">Merge clusters</text>
  </g>
  
  <!-- Divisive Section -->
  <g class="section-box section-2" data-narration="Divisive clustering starts with all points in one cluster and splits them top-down">
    <rect x="315" y="280" width="90" height="70" rx="8" fill="url(#divisGradient)" filter="url(#shadow)"/>
    <text x="360" y="300" text-anchor="middle" class="label" font-weight="bold">Divisive</text>
    <text x="360" y="318" text-anchor="middle" class="detail">Top-down</text>
    <text x="360" y="334" text-anchor="middle" class="detail" font-size="10">Split clusters</text>
  </g>
  
  <!-- Dendrogram Section -->
  <g class="dendrogram" data-narration="The dendrogram shows the hierarchical structure with leaf nodes at bottom and root at top">
    <rect x="110" y="55" width="200" height="210" rx="8" fill="white" filter="url(#shadow)" stroke="#ddd"/>
    <text x="210" y="75" text-anchor="middle" class="label" font-weight="bold">Dendrogram</text>
    
    <!-- Tree structure -->
    <g class="tree-line">
      <!-- Root -->
      <line x1="210" y1="95" x2="210" y2="110" stroke="#555" stroke-width="2"/>
      <circle cx="210" cy="95" r="4" fill="#e74c3c" class="pulse-element"/>
      
      <!-- Level 2 branches -->
      <line x1="210" y1="110" x2="160" y2="130" stroke="#555" stroke-width="2"/>
      <line x1="210" y1="110" x2="260" y2="130" stroke="#555" stroke-width="2"/>
      <circle cx="160" cy="130" r="4" fill="#3498db" class="pulse-element"/>
      <circle cx="260" cy="130" r="4" fill="#3498db" class="pulse-element"/>
      
      <!-- Level 3 branches -->
      <line x1="160" y1="130" x2="130" y2="155" stroke="#555" stroke-width="2"/>
      <line x1="160" y1="130" x2="190" y2="155" stroke="#555" stroke-width="2"/>
      <line x1="260" y1="130" x2="230" y2="155" stroke="#555" stroke-width="2"/>
      <line x1="260" y1="130" x2="290" y2="155" stroke="#555" stroke-width="2"/>
      <circle cx="130" cy="155" r="4" fill="#2ecc71" class="pulse-element"/>
      <circle cx="190" cy="155" r="4" fill="#2ecc71" class="pulse-element"/>
      <circle cx="230" cy="155" r="4" fill="#2ecc71" class="pulse-element"/>
      <circle cx="290" cy="155" r="4" fill="#2ecc71" class="pulse-element"/>
      
      <!-- Level 4 - Leaf nodes -->
      <line x1="130" y1="155" x2="110" y2="180" stroke="#555" stroke-width="2"/>
      <line x1="130" y1="155" x2="150" y2="180" stroke="#555" stroke-width="2"/>
      <line x1="190" y1="155" x2="170" y2="180" stroke="#555" stroke-width="2"/>
      <line x1="190" y1="155" x2="210" y2="180" stroke="#555" stroke-width="2"/>
      <line x1="230" y1="155" x2="220" y2="180" stroke="#555" stroke-width="2"/>
      <line x1="230" y1="155" x2="240" y2="180" stroke="#555" stroke-width="2"/>
      <line x1="290" y1="155" x2="270" y2="180" stroke="#555" stroke-width="2"/>
      <line x1="290" y1="155" x2="310" y2="180" stroke="#555" stroke-width="2"/>
      
      <!-- Leaves -->
      <circle cx="110" cy="185" r="5" fill="#9b59b6" class="pulse-element"/>
      <circle cx="150" cy="185" r="5" fill="#9b59b6" class="pulse-element"/>
      <circle cx="170" cy="185" r="5" fill="#9b59b6" class="pulse-element"/>
      <circle cx="210" cy="185" r="5" fill="#9b59b6" class="pulse-element"/>
      <circle cx="220" cy="185" r="5" fill="#9b59b6" class="pulse-element"/>
      <circle cx="240" cy="185" r="5" fill="#9b59b6" class="pulse-element"/>
      <circle cx="270" cy="185" r="5" fill="#9b59b6" class="pulse-element"/>
      <circle cx="310" cy="185" r="5" fill="#9b59b6" class="pulse-element"/>
      
      <!-- Labels -->
      <text x="110" y="200" text-anchor="middle" class="detail" font-size="9">A</text>
      <text x="150" y="200" text-anchor="middle" class="detail" font-size="9">B</text>
      <text x="170" y="200" text-anchor="middle" class="detail" font-size="9">C</text>
      <text x="210" y="200" text-anchor="middle" class="detail" font-size="9">D</text>
      <text x="220" y="200" text-anchor="middle" class="detail" font-size="9">E</text>
      <text x="240" y="200" text-anchor="middle" class="detail" font-size="9">F</text>
      <text x="270" y="200" text-anchor="middle" class="detail" font-size="9">G</text>
      <text x="310" y="200" text-anchor="middle" class="detail" font-size="9">H</text>
      
      <!-- Axis labels -->
      <text x="210" y="220" text-anchor="middle" class="detail" font-size="10">Leaf Nodes (Data Points)</text>
      <text x="95" y="150" text-anchor="middle" class="detail" font-size="9" transform="rotate(-90, 95, 150)">Distance</text>
    </g>
  </g>
  
  <!-- Linkage Criteria Section -->
  <g class="section-box section-3" data-narration="Linkage criteria define how to measure distance between clusters: single uses minimum distance, complete uses maximum distance">
    <rect x="15" y="140" width="85" height="50" rx="8" fill="#fff3e0" filter="url(#shadow)"/>
    <text x="57" y="158" text-anchor="middle" class="label" font-size="12" font-weight="bold">Linkage</text>
    <text x="57" y="174" text-anchor="middle" class="detail" font-size="10">Single / Complete</text>
  </g>
  
  <!-- Distance Metrics Section -->
  <g class="section-box section-4" data-narration="Distance metrics measure similarity: Euclidean is straight-line, Manhattan is sum of differences, Cosine is angle-based">
    <rect x="320" y="140" width="85" height="50" rx="8" fill="#e8f5e9" filter="url(#shadow)"/>
    <text x="362" y="158" text-anchor="middle" class="label" font-size="12" font-weight="bold">Distance</text>
    <text x="362" y="174" text-anchor="middle" class="detail" font-size="10">Euclidean / Cosine</text>
  </g>
  
  <!-- Arrows showing flow -->
  <g class="section-box section-2">
    <path d="M 60 275 L 60 240" stroke="#88d8b0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="55,235 65,235 60,228" fill="#88d8b0"/>
  </g>
  
  <g class="section-box section-3">
    <path d="M 360 275 L 360 240" stroke="#ff9aa2" stroke-width="2" fill="none"/>
    <polygon points="355,235 365,235 360,228" fill="#ff9aa2"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-box section-4" data-narration="Key elements: Root node at top represents all data, leaf nodes at bottom are individual data points, edges show merge/split operations">
    <rect x="120" y="275" width="180" height="55" rx="8" fill="#fce4ec" filter="url(#shadow)"/>
    <text x="210" y="292" text-anchor="middle" class="label" font-size="12" font-weight="bold">Key Elements</text>
    <text x="150" y="310" text-anchor="start" class="detail" font-size="10">• Root: All data merged</text>
    <text x="270" y="310" text-anchor="start" class="detail" font-size="10">• Leaves: Points</text>
    <text x="210" y="322" text-anchor="middle" class="detail" font-size="10">• Edges: Merge/split operations</text>
  </g>
  
  <!-- Small arrows for hierarchy -->
  <g opacity="0.7">
    <text x="130" y="90" class="detail" font-size="10">Root</text>
    <text x="130" y="145" class="detail" font-size="10">Clusters</text>
    <text x="145" y="195" class="detail" font-size="10">Points</text>
  </g>
</svg>