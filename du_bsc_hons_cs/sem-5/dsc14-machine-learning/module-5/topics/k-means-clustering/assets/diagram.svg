<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="k-means-clustering" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cluster1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cluster2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#70db8f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cluster3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6eb5ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes moveCentroid {
      0% { transform: translate(0, 0); }
      50% { transform: translate(10px, 15px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .step-box { fill: white; filter: url(#shadow); rx: 8; }
    .data-point { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .centroid { animation: pulse 2s ease-in-out infinite; }
    .animation-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animation-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animation-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .animation-slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .arrow-line { stroke: #95a5a6; stroke-width: 2; stroke-dasharray: 5, 5; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="animation-fade">
    <text x="210" y="30" text-anchor="middle" class="title-text">K-Means Clustering</text>
    <line x1="80" y1="40" x2="340" y2="40" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Step 1: Initialization -->
  <g class="animation-slide-left" data-narration="Step 1: Initialize K centroids randomly">
    <rect x="10" y="55" width="120" height="75" class="step-box"/>
    <text x="70" y="72" text-anchor="middle" class="section-title">1. Initialize</text>
    <text x="70" y="90" text-anchor="middle" class="detail-text">Random centroids</text>
    <text x="70" y="105" text-anchor="middle" class="detail-text">placed in space</text>
    <!-- Initial centroids -->
    <rect x="55" y="115" width="10" height="10" fill="#e74c3c" class="centroid" rx="2"/>
    <rect x="85" y="115" width="10" height="10" fill="#27ae60" class="centroid" rx="2"/>
  </g>
  
  <!-- Arrow -->
  <line x1="135" y1="92" x2="155" y2="92" class="arrow-line"/>
  
  <!-- Step 2: Assignment -->
  <g class="animation-slide-up" data-narration="Step 2: Assign each point to nearest centroid using Euclidean distance">
    <rect x="160" y="55" width="130" height="75" class="step-box"/>
    <text x="225" y="72" text-anchor="middle" class="section-title">2. Assignment</text>
    <text x="225" y="90" text-anchor="middle" class="detail-text">Points → nearest</text>
    <text x="225" y="105" text-anchor="middle" class="detail-text">centroid (distance)</text>
  </g>
  
  <!-- Arrow -->
  <line x1="295" y1="92" x2="315" y2="92" class="arrow-line"/>
  
  <!-- Step 3: Update -->
  <g class="animation-slide-right" data-narration="Step 3: Update centroids to the mean position of assigned points">
    <rect x="320" y="55" width="90" height="75" class="step-box"/>
    <text x="365" y="72" text-anchor="middle" class="section-title">3. Update</text>
    <text x="365" y="90" text-anchor="middle" class="detail-text">Recalculate</text>
    <text x="365" y="105" text-anchor="middle" class="detail-text">centroids</text>
  </g>
  
  <!-- Visualization Area -->
  <g transform="translate(30, 145)">
    <!-- Cluster boundaries (circles) -->
    <circle cx="80" cy="100" r="55" fill="url(#cluster1Grad)" opacity="0.15" class="animation-fade"/>
    <circle cx="240" cy="80" r="50" fill="url(#cluster2Grad)" opacity="0.15" class="animation-fade" style="animation-delay: 0.2s"/>
    <circle cx="160" cy="180" r="45" fill="url(#cluster3Grad)" opacity="0.15" class="animation-fade" style="animation-delay: 0.4s"/>
    
    <!-- Data Points - Cluster 1 (Red/Pink) -->
    <circle cx="60" cy="80" r="5" fill="#ff8080" class="data-point" style="animation-delay: 0.5s"/>
    <circle cx="75" cy="90" r="5" fill="#ff8080" class="data-point" style="animation-delay: 0.6s"/>
    <circle cx="90" cy="70" r="5" fill="#ff8080" class="data-point" style="animation-delay: 0.7s"/>
    <circle cx="55" cy="110" r="5" fill="#ff8080" class="data-point" style="animation-delay: 0.8s"/>
    <circle cx="100" cy="100" r="5" fill="#ff8080" class="data-point" style="animation-delay: 0.9s"/>
    <circle cx="70" cy="120" r="5" fill="#ff8080" class="data-point" style="animation-delay: 1.0s"/>
    <circle cx="85" cy="115" r="5" fill="#ff8080" class="data-point" style="animation-delay: 1.1s"/>
    
    <!-- Data Points - Cluster 2 (Green) -->
    <circle cx="230" cy="60" r="5" fill="#27ae60" class="data-point" style="animation-delay: 0.6s"/>
    <circle cx="250" cy="70" r="5" fill="#27ae60" class="data-point" style="animation-delay: 0.7s"/>
    <circle cx="235" cy="85" r="5" fill="#27ae60" class="data-point" style="animation-delay: 0.8s"/>
    <circle cx="255" cy="90" r="5" fill="#27ae60" class="data-point" style="animation-delay: 0.9s"/>
    <circle cx="220" cy="95" r="5" fill="#27ae60" class="data-point" style="animation-delay: 1.0s"/>
    <circle cx="245" cy="100" r="5" fill="#27ae60" class="data-point" style="animation-delay: 1.1s"/>
    <circle cx="265" cy="75" r="5" fill="#27ae60" class="data-point" style="animation-delay: 1.2s"/>
    
    <!-- Data Points - Cluster 3 (Blue) -->
    <circle cx="140" cy="160" r="5" fill="#3498db" class="data-point" style="animation-delay: 0.7s"/>
    <circle cx="160" cy="150" r="5" fill="#3498db" class="data-point" style="animation-delay: 0.8s"/>
    <circle cx="175" cy="165" r="5" fill="#3498db" class="data-point" style="animation-delay: 0.9s"/>
    <circle cx="150" cy="180" r="5" fill="#3498db" class="data-point" style="animation-delay: 1.0s"/>
    <circle cx="180" cy="190" r="5" fill="#3498db" class="data-point" style="animation-delay: 1.1s"/>
    <circle cx="165" cy="200" r="5" fill="#3498db" class="data-point" style="animation-delay: 1.2s"/>
    <circle cx="145" cy="195" r="5" fill="#3498db" class="data-point" style="animation-delay: 1.3s"/>
    
    <!-- Centroids -->
    <rect x="76" y="96" width="10" height="10" fill="#c0392b" rx="2" class="centroid" filter="url(#shadow)"/>
    <rect x="236" y="76" width="10" height="10" fill="#1e8449" rx="2" class="centroid" filter="url(#shadow)" style="animation-delay: 0.3s"/>
    <rect x="156" y="176" width="10" height="10" fill="#2980b9" rx="2" class="centroid" filter="url(#shadow)" style="animation-delay: 0.6s"/>
    
    <!-- Legend -->
    <g transform="translate(290, 10)">
      <rect x="0" y="0" width="80" height="60" fill="white" rx="5" filter="url(#shadow)"/>
      <rect x="10" y="12" width="8" height="8" fill="#c0392b" rx="1"/>
      <text x="25" y="19" class="detail-text">Centroid</text>
      <circle cx="14" cy="32" r="4" fill="#ff8080"/>
      <text x="25" y="36" class="detail-text">Data Point</text>
      <circle cx="14" cy="47" r="4" fill="none" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="2,2"/>
      <text x="25" y="51" class="detail-text">Cluster</text>
    </g>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="animation-fade" data-narration="Key concepts: Euclidean distance, Elbow method for choosing K, iterative convergence">
    <rect x="10" y="330" width="400" height="60" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="20" y="350" class="section-title">Key Concepts:</text>
    <text x="20" y="368" class="detail-text">• Distance: Euclidean • K selection: Elbow Method • Iterate until</text>
    <text x="20" y="382" class="detail-text">convergence</text>
    
    <!-- K value indicator -->
    <rect x="280" y="340" width="120" height="40" fill="#ecf0f1" rx="5"/>
    <text x="340" y="358" text-anchor="middle" class="label-text">K = 3 clusters</text>
    <text x="340" y="373" text-anchor="middle" class="detail-text">(example shown)</text>
  </g>
  
  <!-- Iteration indicator -->
  <g class="animation-fade" data-narration="The algorithm repeats assignment and update steps until centroids converge">
    <text x="210" y="315" text-anchor="middle" class="detail-text" fill="#7f8c8d">↻ Repeat Steps 2-3 until convergence</text>
  </g>
</svg>