<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="neural-networks-backpropagation" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neuronGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ba3d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90c2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hiddenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b7ed9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c5fc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dd39e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3cb371;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backpropGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes flow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .neuron { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .neuron:nth-child(odd) { animation-delay: 0.3s; }
    .neuron:nth-child(even) { animation-delay: 0.6s; }
    .connection { animation: flow 1s linear infinite; }
    .backprop-arrow { animation: flow 0.8s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Neural Networks: Backpropagation</text>
  
  <!-- Network Architecture Section -->
  <g class="section-1" data-narration="Neural Network Architecture showing Input, Hidden, and Output layers">
    <rect x="20" y="55" width="180" height="150" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="110" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Network Architecture</text>
    
    <!-- Input Layer -->
    <text x="45" y="95" font-family="Arial" font-size="11" fill="#4a5568">Input</text>
    <circle cx="45" cy="115" r="10" fill="url(#neuronGradient)" class="neuron"/>
    <circle cx="45" cy="140" r="10" fill="url(#neuronGradient)" class="neuron"/>
    <circle cx="45" cy="165" r="10" fill="url(#neuronGradient)" class="neuron"/>
    
    <!-- Hidden Layer -->
    <text x="110" y="95" font-family="Arial" font-size="11" fill="#4a5568">Hidden</text>
    <circle cx="110" cy="115" r="12" fill="url(#hiddenGradient)" class="neuron"/>
    <circle cx="110" cy="145" r="12" fill="url(#hiddenGradient)" class="neuron"/>
    <circle cx="110" cy="175" r="12" fill="url(#hiddenGradient)" class="neuron"/>
    
    <!-- Output Layer -->
    <text x="165" y="95" font-family="Arial" font-size="11" fill="#4a5568">Output</text>
    <circle cx="165" cy="125" r="12" fill="url(#outputGradient)" class="neuron"/>
    <circle cx="165" cy="160" r="12" fill="url(#outputGradient)" class="neuron"/>
    
    <!-- Connections (forward) -->
    <g stroke="#94a3b8" stroke-width="1" fill="none" class="connection" stroke-dasharray="5,3">
      <line x1="55" y1="115" x2="98" y2="115"/>
      <line x1="55" y1="115" x2="98" y2="145"/>
      <line x1="55" y1="140" x2="98" y2="115"/>
      <line x1="55" y1="140" x2="98" y2="145"/>
      <line x1="55" y1="165" x2="98" y2="145"/>
      <line x1="55" y1="165" x2="98" y2="175"/>
      <line x1="122" y1="115" x2="153" y2="125"/>
      <line x1="122" y1="145" x2="153" y2="125"/>
      <line x1="122" y1="145" x2="153" y2="160"/>
      <line x1="122" y1="175" x2="153" y2="160"/>
    </g>
  </g>
  
  <!-- Forward & Backward Propagation -->
  <g class="section-2" data-narration="Forward propagation moves left-to-right, backpropagation moves right-to-left">
    <rect x="210" y="55" width="190" height="150" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="305" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Propagation Flow</text>
    
    <!-- Forward Arrow -->
    <g class="section-2" data-narration="Forward propagation passes input through network">
      <line x1="245" y1="100" x2="305" y2="100" stroke="#5dd39e" stroke-width="3"/>
      <polygon points="300,95 310,100 300,105" fill="#5dd39e"/>
      <text x="275" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#3cb371" font-weight="bold">Forward</text>
      <text x="275" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a5568">Input → Output</text>
    </g>
    
    <!-- Backprop Arrow -->
    <g class="backprop-arrow" data-narration="Backpropagation sends gradient errors backward through network">
      <line x1="365" y1="130" x2="305" y2="130" stroke="url(#backpropGradient)" stroke-width="3" stroke-dasharray="8,4"/>
      <polygon points="310,125 300,130 310,135" fill="#ee5a5a"/>
      <text x="335" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="#d64545" font-weight="bold">Backprop</text>
      <text x="335" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a5568">∂L/∂weights</text>
    </g>
    
    <!-- Process boxes -->
    <rect x="235" y="155" width="80" height="35" fill="#fef3c7" rx="4"/>
    <text x="275" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="#92400e" font-weight="bold">Linear Transform</text>
    <text x="275" y="182" text-anchor="middle" font-family="Arial" font-size="9" fill="#92400e">z = Wx + b</text>
    
    <rect x="325" y="155" width="65" height="35" fill="#dbeafe" rx="4"/>
    <text x="357" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="#1e40af" font-weight="bold">Activation</text>
    <text x="357" y="182" text-anchor="middle" font-family="Arial" font-size="9" fill="#1e40af">σ(z)</text>
  </g>
  
  <!-- Loss Function Section -->
  <g class="section-3" data-narration="Loss function measures prediction error, guides optimization">
    <rect x="20" y="215" width="180" height="80" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="110" y="232" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Loss Function</text>
    <text x="30" y="255" font-family="Arial" font-size="11" fill="#4a5568">• MSE: (y - ŷ)²</text>
    <text x="30" y="272" font-family="Arial" font-size="11" fill="#4a5568">• Cross-Entropy</text>
    <text x="110" y="285" text-anchor="middle" font-family="Arial" font-size="10" fill="#6b7280" font-style="italic">Minimize to train</text>
  </g>
  
  <!-- Gradient Descent -->
  <g class="section-3" data-narration="Gradient descent updates weights to minimize loss">
    <rect x="210" y="215" width="190" height="80" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="305" y="232" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Weight Update</text>
    <text x="230" y="258" font-family="Arial" font-size="11" fill="#4a5568">w_new = w_old - η × ∂L/∂w</text>
    <text x="230" y="275" font-family="Arial" font-size="11" fill="#4a5568">η = learning rate</text>
    <circle cx="355" cy="265" r="15" fill="#fcd34d" class="neuron"/>
    <text x="355" y="270" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#92400e">η</text>
  </g>
  
  <!-- Key Concepts Footer -->
  <g class="section-4" data-narration="Key concepts: Chain rule, gradient flow, error minimization">
    <rect x="20" y="305" width="380" height="80" fill="#f8fafc" rx="8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="210" y="325" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    
    <!-- Concept boxes -->
    <rect x="30" y="335" width="110" height="40" fill="#e0f2fe" rx="4"/>
    <text x="85" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#0369a1" font-weight="bold">Chain Rule</text>
    <text x="85" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#0369a1">∂L/∂w = ∂L/∂ŷ × ∂ŷ/∂z × ∂z/∂w</text>
    
    <rect x="150" y="335" width="110" height="40" fill="#f0fdf4" rx="4"/>
    <text x="205" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#15803d" font-weight="bold">Gradient Flow</text>
    <text x="205" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#15803d">Errors flow backward</text>
    
    <rect x="270" y="335" width="120" height="40" fill="#fef2f2" rx="4"/>
    <text x="330" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#b91c1c" font-weight="bold">Error Signal</text>
    <text x="330" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#b91c1c">Predicted - Actual</text>
  </g>
</svg>