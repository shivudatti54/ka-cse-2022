<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="decision-trees">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2e7d32; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #1b5e20; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #33691e; }
    .node-root { fill: #4caf50; stroke: #2e7d32; stroke-width: 2; }
    .node-internal { fill: #81c784; stroke: #388e3c; stroke-width: 2; }
    .node-leaf { fill: #c8e6c9; stroke: #4caf50; stroke-width: 2; }
    .arrow { stroke: #558b2f; stroke-width: 2; fill: none; stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .box { fill: #f1f8e9; stroke: #8bc34a; stroke-width: 1; rx: 5; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Decision Trees</text>
  
  <!-- Legend Box -->
  <g class="anim-slide delay-1">
    <rect x="10" y="45" width="120" height="70" class="box" />
    <circle cx="25" cy="60" r="8" class="node-root" />
    <text x="40" y="64" class="detail">Root Node</text>
    <circle cx="25" cy="80" r="8" class="node-internal" />
    <text x="40" y="84" class="detail">Internal Node</text>
    <circle cx="25" cy="100" r="8" class="node-leaf" />
    <text x="40" y="104" class="detail">Leaf Node</text>
  </g>
  
  <!-- Root Node -->
  <g class="anim-fade delay-2" data-narration="Root Node: The topmost node representing the entire dataset">
    <circle cx="210" cy="150" r="25" class="node-root anim-pulse" filter="url(#shadow)" />
    <text x="210" y="145" text-anchor="middle" class="label" fill="white">Root</text>
    <text x="210" y="160" text-anchor="middle" class="detail" fill="white">Income?</text>
  </g>
  
  <!-- Arrows from Root -->
  <path d="M190 170 Q150 200 120 220" class="arrow" />
  <path d="M230 170 Q270 200 300 220" class="arrow" />
  <text x="135" y="200" class="detail" transform="rotate(-30 135 200)">Low</text>
  <text x="280" y="200" class="detail" transform="rotate(30 280 200)">High</text>
  
  <!-- Left Internal Node -->
  <g class="anim-fade delay-3" data-narration="Internal Node: Splits data based on feature values">
    <circle cx="120" cy="250" r="22" class="node-internal" filter="url(#shadow)" />
    <text x="120" y="246" text-anchor="middle" class="label">Credit?</text>
    <text x="120" y="260" text-anchor="middle" class="detail">Good</text>
  </g>
  
  <!-- Right Internal Node -->
  <g class="anim-fade delay-3" data-narration="Internal Node: Further splits data into subsets">
    <circle cx="300" cy="250" r="22" class="node-internal" filter="url(#shadow)" />
    <text x="300" y="246" text-anchor="middle" class="label">Credit?</text>
    <text x="300" y="260" text-anchor="middle" class="detail">Bad</text>
  </g>
  
  <!-- Arrows from Left Node -->
  <path d="M100 268 Q70 290 60 320" class="arrow" />
  <path d="M140 268 Q170 290 180 320" class="arrow" />
  
  <!-- Arrows from Right Node -->
  <path d="M280 268 Q250 290 240 320" class="arrow" />
  <path d="M320 268 Q350 290 360 320" class="arrow" />
  
  <!-- Left Leaf Node -->
  <g class="anim-fade delay-4" data-narration="Leaf Node: Terminal node representing class prediction">
    <circle cx="60" cy="340" r="18" class="node-leaf" filter="url(#shadow)" />
    <text x="60" y="344" text-anchor="middle" class="label" font-size="12">Approve</text>
  </g>
  
  <!-- Left-Center Leaf Node -->
  <g class="anim-fade delay-4" data-narration="Leaf Node: Final decision based on all splits">
    <circle cx="180" cy="340" r="18" class="node-leaf" filter="url(#shadow)" />
    <text x="180" y="344" text-anchor="middle" class="label" font-size="12">Deny</text>
  </g>
  
  <!-- Right-Center Leaf Node -->
  <g class="anim-fade delay-5" data-narration="Leaf Node: Classification result">
    <circle cx="240" cy="340" r="18" class="node-leaf" filter="url(#shadow)" />
    <text x="240" y="344" text-anchor="middle" class="label" font-size="12">Approve</text>
  </g>
  
  <!-- Right Leaf Node -->
  <g class="anim-fade delay-5" data-narration="Leaf Node: Final prediction value">
    <circle cx="360" cy="340" r="18" class="node-leaf" filter="url(#shadow)" />
    <text x="360" y="344" text-anchor="middle" class="label" font-size="12">Deny</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="anim-slide delay-3">
    <rect x="270" y="45" width="140" height="50" class="box" />
    <text x="280" y="62" class="label" font-size="11">Key Concepts:</text>
    <text x="280" y="78" class="detail" font-size="10">• Recursive partitioning</text>
    <text x="280" y="90" class="detail" font-size="10">• Gini/Entropy criterion</text>
  </g>
  
  <!-- Edge Labels -->
  <text x="155" y="195" class="detail" font-size="10" fill="#558b2f">&lt;40K</text>
  <text x="250" y="195" class="detail" font-size="10" fill="#558b2f">≥40K</text>
</svg>