<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="classification-evaluation-metrics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f7fa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .subtitle { animation: fadeIn 1s ease-out 0.2s forwards; opacity: 0; }
    .confusion-matrix { animation: slideInLeft 0.8s ease-out 0.3s forwards; opacity: 0; }
    .formula-card { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .formula-card-1 { animation: slideInRight 0.8s ease-out 0.4s forwards; opacity: 0; }
    .formula-card-2 { animation: slideInRight 0.8s ease-out 0.5s forwards; opacity: 0; }
    .formula-card-3 { animation: slideInRight 0.8s ease-out 0.6s forwards; opacity: 0; }
    .roc-section { animation: slideInUp 0.8s ease-out 0.7s forwards; opacity: 0; }
    .cell-tp { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out 1s forwards; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c5282" class="title">Classification Evaluation</text>
  <text x="210" y="46" text-anchor="middle" font-size="14" fill="#4a5568" class="subtitle">Metrics</text>
  
  <!-- Confusion Matrix Section -->
  <g class="confusion-matrix" transform="translate(30, 70)" data-narration="The Confusion Matrix shows all prediction outcomes: True Positives (correctly predicted positive), False Positives (incorrectly predicted positive), True Negatives (correctly predicted negative), and False Negatives (missed positive cases).">
    <rect x="0" y="0" width="140" height="120" rx="8" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3748">Confusion Matrix</text>
    
    <!-- Matrix header -->
    <text x="35" y="40" text-anchor="middle" font-size="9" fill="#718096">Predicted</text>
    <text x="35" y="52" text-anchor="middle" font-size="9" fill="#718096">Positive</text>
    <text x="105" y="40" text-anchor="middle" font-size="9" fill="#718096">Predicted</text>
    <text x="105" y="52" text-anchor="middle" font-size="9" fill="#718096">Negative</text>
    
    <!-- Matrix rows -->
    <text x="12" y="75" text-anchor="start" font-size="9" fill="#718096">Actual Pos</text>
    <text x="12" y="105" text-anchor="start" font-size="9" fill="#718096">Actual Neg</text>
    
    <!-- Matrix cells -->
    <rect x="30" y="58" width="45" height="35" rx="4" fill="#c6f6d5" stroke="#48bb78" stroke-width="1.5"/>
    <text x="52" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#276749">TP</text>
    
    <rect x="85" y="58" width="45" height="35" rx="4" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
    <text x="107" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#c53030">FN</text>
    
    <rect x="30" y="98" width="45" height="35" rx="4" fill="#feebc8" stroke="#f6ad55" stroke-width="1.5"/>
    <text x="52" y="122" text-anchor="middle" font-size="16" font-weight="bold" fill="#c05621">FP</text>
    
    <rect x="85" y="98" width="45" height="35" rx="4" fill="#e2e8f0" stroke="#a0aec0" stroke-width="1.5"/>
    <text x="107" y="122" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a5568">TN</text>
  </g>
  
  <!-- Formula Cards -->
  <g class="formula-card formula-card-1" transform="translate(185, 75)" data-narration="Accuracy measures the overall correctness: the ratio of correct predictions to total predictions.">
    <rect x="0" y="0" width="110" height="52" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="55" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6cb0">Accuracy</text>
    <text x="55" y="34" text-anchor="middle" font-size="10" fill="#4a5568">(TP+TN)/Total</text>
    <text x="55" y="46" text-anchor="middle" font-size="9" fill="#718096">Correct predictions</text>
  </g>
  
  <g class="formula-card formula-card-2" transform="translate(185, 135)" data-narration="Precision measures how many of the positive predictions were actually correct - the ratio of true positives to all predicted positives.">
    <rect x="0" y="0" width="110" height="52" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="55" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f855a">Precision</text>
    <text x="55" y="34" text-anchor="middle" font-size="10" fill="#4a5568">TP/(TP+FP)</text>
    <text x="55" y="46" text-anchor="middle" font-size="9" fill="#718096">Positive accuracy</text>
  </g>
  
  <g class="formula-card formula-card-3" transform="translate(185, 195)" data-narration="Recall (Sensitivity) measures how many actual positive cases were correctly identified - the ratio of true positives to all actual positives.">
    <rect x="0" y="0" width="110" height="52" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="55" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#9f7aea">Recall</text>
    <text x="55" y="34" text-anchor="middle" font-size="10" fill="#4a5568">TP/(TP+FN)</text>
    <text x="55" y="46" text-anchor="middle" font-size="9" fill="#718096">Find all positives</text>
  </g>
  
  <g class="formula-card" transform="translate(310, 75)" data-narration="F1-Score is the harmonic mean of Precision and Recall, providing a balanced measure when there's an uneven class distribution.">
    <rect x="0" y="0" width="100" height="52" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="50" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#dd6b20">F1-Score</text>
    <text x="50" y="34" text-anchor="middle" font-size="10" fill="#4a5568">2×P×R/(P+R)</text>
    <text x="50" y="46" text-anchor="middle" font-size="9" fill="#718096">Balanced measure</text>
  </g>
  
  <g class="formula-card" transform="translate(310, 135)" data-narration="ROC-AUC plots the True Positive Rate against the False Positive Rate at various thresholds. Higher AUC indicates better model discrimination.">
    <rect x="0" y="0" width="100" height="52" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="50" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#d69e2e">ROC-AUC</text>
    <text x="50" y="34" text-anchor="middle" font-size="10" fill="#4a5568">TPR vs FPR</text>
    <text x="50" y="46" text-anchor="middle" font-size="9" fill="#718096">Area under curve</text>
  </g>
  
  <!-- ROC Curve Visualization -->
  <g class="roc-section" transform="translate(185, 255)" data-narration="This ROC curve demonstrates the trade-off between True Positive Rate (Recall) and False Positive Rate. The diagonal line represents random guessing, curves above indicate better performance.">
    <rect x="0" y="0" width="225" height="120" rx="8" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="112" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3748">ROC Curve Visualization</text>
    
    <!-- Axes -->
    <line x1="25" y1="95" x2="205" y2="95" stroke="#a0aec0" stroke-width="1.5"/>
    <line x1="25" y1="95" x2="25" y2="25" stroke="#a0aec0" stroke-width="1.5"/>
    
    <!-- Axis labels -->
    <text x="115" y="110" text-anchor="middle" font-size="9" fill="#718096">False Positive Rate</text>
    <text x="12" y="62" text-anchor="middle" font-size="9" fill="#718096" transform="rotate(-90, 12, 62)">True Positive Rate</text>
    
    <!-- Diagonal (random) -->
    <line x1="25" y1="95" x2="205" y2="25" stroke="#cbd5e0" stroke-width="1.5" stroke-dasharray="4"/>
    
    <!-- ROC curve (good model) -->
    <path d="M 25 95 Q 60 95 100 70 Q 140 45 180 30 Q 205 20 205 20" fill="none" stroke="#4299e1" stroke-width="2.5"/>
    
    <!-- AUC area -->
    <path d="M 25 95 Q 60 95 100 70 Q 140 45 180 30 Q 205 20 205 20 L 205 95 Z" fill="#4299e1" fill-opacity="0.15"/>
    
    <!-- AUC label -->
    <text x="160" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6cb0">AUC = 0.85</text>
    
    <!-- Point labels -->
    <circle cx="25" cy="95" r="3" fill="#718096"/>
    <text x="25" y="108" text-anchor="middle" font-size="8" fill="#718096">0</text>
    <circle cx="205" cy="25" r="3" fill="#718096"/>
    <text x="205" y="20" text-anchor="middle" font-size="8" fill="#718096">1</text>
  </g>
  
  <!-- Connection Arrows -->
  <g class="arrow-line">
    <path d="M 170 120 L 185 100" stroke="#4299e1" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4299e1"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <g transform="translate(30, 310)">
    <rect x="0" y="0" width="140" height="75" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="70" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3748">Key Definitions</text>
    <text x="10" y="32" font-size="9" fill="#276749">● TP: Correct positive</text>
    <text x="10" y="46" font-size="9" fill="#c05621">● FP: Wrong positive</text>
    <text x="10" y="60" font-size="9" fill="#4a5568">● TN: Correct negative</text>
  </g>
</svg>