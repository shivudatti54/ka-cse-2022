<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="logistic-regression" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2c5aa0"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <linearGradient id="formulaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#7d3c98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .input-layer { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .hidden-layer { animation: fadeIn 0.6s ease-out 0.4s both; }
    .output-layer { animation: slideInRight 0.6s ease-out 0.6s both; }
    .formula-box { animation: fadeIn 0.5s ease-out 0.8s both; }
    .pulse-anim { animation: pulse 2s infinite; }
    .connection { stroke-dasharray: 5,5; animation: drawLine 1s linear 1s forwards; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-size: 14px; fill: #34495e; }
    .detail-text { font-size: 11px; fill: #5d6d7e; }
    .formula-text { font-size: 12px; fill: white; font-family: 'Courier New', monospace; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text">Logistic Regression</text>
  <line x1="120" y1="40" x2="300" y2="40" stroke="#4a90d9" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- Input Layer Section -->
  <g class="input-layer" data-narration="Input features (X1, X2, Xn) representing independent variables">
    <rect x="20" y="70" width="100" height="130" rx="8" fill="#f8f9fa" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="90" text-anchor="middle" class="label-text" font-weight="bold">Input Layer</text>
    <circle cx="70" cy="115" r="12" fill="url(#nodeGradient)" class="pulse-anim"/>
    <text x="70" y="119" text-anchor="middle" fill="white" font-size="10" font-weight="bold">X1</text>
    <circle cx="70" cy="150" r="12" fill="url(#nodeGradient)" class="pulse-anim" style="animation-delay: 0.3s"/>
    <text x="70" y="154" text-anchor="middle" fill="white" font-size="10" font-weight="bold">X2</text>
    <circle cx="70" cy="185" r="10" fill="url(#nodeGradient)" class="pulse-anim" style="animation-delay: 0.6s"/>
    <text x="70" y="189" text-anchor="middle" fill="white" font-size="9" font-weight="bold">...</text>
  </g>
  
  <!-- Arrow from Input to Hidden -->
  <path d="M125 120 L175 120" stroke="#4a90d9" stroke-width="2" class="connection"/>
  <polygon points="175,120 168,115 168,125" fill="#4a90d9"/>
  
  <!-- Hidden Layer (Sigmoid Processing) -->
  <g class="hidden-layer" data-narration="Hidden layer applies the sigmoid function: f(x) = 1/(1+e^-x)">
    <rect x="180" y="70" width="120" height="130" rx="8" fill="#f8f9fa" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="240" y="90" text-anchor="middle" class="label-text" font-weight="bold">Hidden Layer</text>
    
    <!-- Sigmoid curve visualization -->
    <path d="M195 160 Q215 160 220 140 Q225 120 240 115 Q255 110 260 130 Q265 150 285 160" fill="none" stroke="#9b59b6" stroke-width="2" class="float-anim"/>
    <text x="240" y="175" text-anchor="middle" class="detail-text">σ(z) = 1/(1+e⁻ᶻ)</text>
    <text x="240" y="190" text-anchor="middle" class="detail-text" font-size="10">Sigmoid Function</text>
  </g>
  
  <!-- Arrow from Hidden to Output -->
  <path d="M305 135 L345 135" stroke="#5cb85c" stroke-width="2" class="connection"/>
  <polygon points="345,135 338,130 338,140" fill="#5cb85c"/>
  
  <!-- Output Layer -->
  <g class="output-layer" data-narration="Output layer produces probability between 0 and 1">
    <rect x="350" y="100" width="60" height="70" rx="8" fill="#f8f9fa" stroke="#5cb85c" stroke-width="2" filter="url(#shadow)"/>
    <text x="380" y="120" text-anchor="middle" class="label-text" font-weight="bold">Output</text>
    <circle cx="380" cy="150" r="15" fill="url(#outputGradient)" class="pulse-anim"/>
    <text x="380" y="155" text-anchor="middle" fill="white" font-size="11" font-weight="bold">P</text>
  </g>
  
  <!-- Formula Boxes at Bottom -->
  <g class="formula-box" data-narration="Key formulas: Sigmoid function, Odds Ratio, and Maximum Likelihood Estimation">
    <!-- Sigmoid Formula -->
    <rect x="15" y="220" width="120" height="50" rx="6" fill="url(#formulaGradient)" filter="url(#shadow)"/>
    <text x="75" y="240" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Sigmoid</text>
    <text x="75" y="258" text-anchor="middle" class="formula-text" font-size="10">f(x)=1/(1+e⁻ˣ)</text>
    
    <!-- Odds Ratio -->
    <rect x="145" y="220" width="120" height="50" rx="6" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="205" y="240" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Odds Ratio</text>
    <text x="205" y="258" text-anchor="middle" class="formula-text" font-size="10">OR = p/(1-p)</text>
    
    <!-- MLE -->
    <rect x="275" y="220" width="120" height="50" rx="6" fill="#f39c12" filter="url(#shadow)"/>
    <text x="335" y="240" text-anchor="middle" fill="white" font-size="11" font-weight="bold">MLE</text>
    <text x="335" y="258" text-anchor="middle" class="formula-text" font-size="9">L(β)=∏pʸ(1-p)¹⁻ʸ</text>
  </g>
  
  <!-- Cost Function Section -->
  <g class="formula-box" data-narration="Cost function measures prediction error using log loss">
    <rect x="115" y="285" width="190" height="45" rx="6" fill="#34495e" filter="url(#shadow)"/>
    <text x="210" y="305" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Cost Function (Log Loss)</text>
    <text x="210" y="322" text-anchor="middle" class="formula-text" font-size="10">J(θ) = -1/m Σ[y·log(h)+(1-y)·log(1-h)]</text>
  </g>
  
  <!-- Decision Boundary Note -->
  <g class="formula-box" data-narration="Final prediction uses threshold (typically 0.5) to classify">
    <rect x="130" y="345" width="160" height="40" rx="6" fill="#1abc9c" filter="url(#shadow)"/>
    <text x="210" y="365" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Decision Boundary: P ≥ 0.5 → Class 1</text>
    <text x="210" y="380" text-anchor="middle" fill="#e8f8f5" font-size="9">P &lt; 0.5 → Class 0</text>
  </g>
  
  <!-- Flow indicators -->
  <text x="70" y="210" text-anchor="middle" class="detail-text">Features</text>
  <text x="240" y="210" text-anchor="middle" class="detail-text">Weighted Sum + Bias</text>
  <text x="380" y="200" text-anchor="middle" class="detail-text">Probability</text>
</svg>