<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="naive-bayes-classifier">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="featureGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe4e1"/>
      <stop offset="100%" style="stop-color:#ffccd5"/>
    </linearGradient>
    <linearGradient id="classGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .feature-box { animation: slideInLeft 0.6s ease-out backwards; }
    .class-box { animation: slideInRight 0.6s ease-out backwards; }
    .formula-box { animation: fadeIn 0.8s ease-out 0.3s backwards; }
    .arrow-line { animation: slideUp 0.5s ease-out backwards; }
    .concept-box { animation: slideUp 0.6s ease-out backwards; }
    .pulse-element { animation: pulse 2s infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Naive Bayes Classifier</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Bayes Theorem Formula Box -->
  <g class="formula-box" data-narration="Bayes' Theorem: The mathematical foundation of Naive Bayes">
    <rect x="110" y="55" width="200" height="45" rx="8" fill="url(#boxGradient)" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="75" text-anchor="middle" font-size="14" fill="#2c3e50" font-weight="bold">P(A|B) = P(B|A) × P(A) / P(B)</text>
    <text x="210" y="92" text-anchor="middle" font-size="11" fill="#7f8c8d">Posterior = Likelihood × Prior / Evidence</text>
  </g>
  
  <!-- Feature Inputs -->
  <g class="feature-box" data-narration="Input features are treated as independent variables">
    <rect x="20" y="120" width="90" height="70" rx="8" fill="url(#featureGradient)" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="142" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">Feature 1</text>
    <text x="65" y="158" text-anchor="middle" font-size="10" fill="#7f8c8d">x₁</text>
    <text x="65" y="178" text-anchor="middle" font-size="10" fill="#e74c3c">Independent</text>
  </g>
  
  <g class="feature-box" data-narration="Multiple features are processed simultaneously" style="animation-delay: 0.15s">
    <rect x="20" y="200" width="90" height="70" rx="8" fill="url(#featureGradient)" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="222" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">Feature 2</text>
    <text x="65" y="238" text-anchor="middle" font-size="10" fill="#7f8c8d">x₂</text>
    <text x="65" y="258" text-anchor="middle" font-size="10" fill="#e74c3c">Independent</text>
  </g>
  
  <g class="feature-box" data-narration="Features continue to flow into the classifier" style="animation-delay: 0.3s">
    <rect x="20" y="280" width="90" height="70" rx="8" fill="url(#featureGradient)" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="302" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">Feature N</text>
    <text x="65" y="318" text-anchor="middle" font-size="10" fill="#7f8c8d">xₙ</text>
    <text x="65" y="338" text-anchor="middle" font-size="10" fill="#e74c3c">Assumption</text>
  </g>
  
  <!-- Arrow from features to classifier -->
  <g class="arrow-line" data-narration="Features are combined to calculate probabilities">
    <path d="M115 155 L170 155" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M115 235 L170 235" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M115 315 L170 315" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Naive Bayes Classifier Box -->
  <g class="concept-box" data-narration="The classifier calculates posterior probability for each class" style="animation-delay: 0.4s">
    <rect x="165" y="130" width="120" height="100" rx="10" fill="#ffffff" stroke="#9b59b6" stroke-width="3" filter="url(#shadow)"/>
    <text x="225" y="155" text-anchor="middle" font-size="14" fill="#8e44ad" font-weight="bold">Naive Bayes</text>
    <text x="225" y="175" text-anchor="middle" font-size="11" fill="#7f8c8d">Classifier</text>
    <rect x="175" y="185" width="100" height="2" fill="#9b59b6"/>
    <text x="225" y="205" text-anchor="middle" font-size="10" fill="#2c3e50">P(C|F₁...Fₙ)</text>
  </g>
  
  <!-- Probability Calculation -->
  <g class="concept-box" data-narration="Probability is calculated using the naive independence assumption" style="animation-delay: 0.5s">
    <rect x="180" y="240" width="90" height="35" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="225" y="258" text-anchor="middle" font-size="10" fill="#2c3e50">∝ P(F₁|C)×...×P(Fₙ|C)×P(C)</text>
  </g>
  
  <!-- Arrow from classifier to classes -->
  <g class="arrow-line" data-narration="The class with highest posterior probability is selected">
    <path d="M285 180 L330 180" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  </g>
  
  <!-- Class Outputs -->
  <g class="class-box" data-narration="Output classes represent the predicted category">
    <rect x="320" y="120" width="85" height="55" rx="8" fill="url(#classGradient)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="362" y="145" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">Class A</text>
    <text x="362" y="162" text-anchor="middle" font-size="10" fill="#27ae60">P = 0.75</text>
  </g>
  
  <g class="class-box" data-narration="Multiple classes are evaluated" style="animation-delay: 0.2s">
    <rect x="320" y="185" width="85" height="55" rx="8" fill="url(#classGradient)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="362" y="210" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">Class B</text>
    <text x="362" y="227" text-anchor="middle" font-size="10" fill="#27ae60">P = 0.25</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key assumptions: features are independent and equally important" style="animation-delay: 0.6s">
    <rect x="15" y="360" width="390" height="32" rx="6" fill="url(#boxGradient)" stroke="#3498db" stroke-width="1"/>
    <text x="30" y="376" font-size="11" fill="#2c3e50">
      <tspan font-weight="bold">Key:</tspan>
      <tspan> Independence assumption </tspan>
      <tspan fill="#e74c3c">●</tspan>
      <tspan> | </tspan>
      <tspan>Max posterior </tspan>
      <tspan fill="#27ae60">●</tspan>
    </text>
  </g>
  
  <!-- Independence visualization -->
  <g class="pulse-element" data-narration="The naive independence assumption simplifies calculation">
    <circle cx="160" cy="155" r="8" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3"/>
    <circle cx="160" cy="235" r="8" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="168" y1="155" x2="152" y2="235" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
    <line x1="152" y1="155" x2="168" y2="235" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  </g>
  
  <!-- Winner indicator -->
  <g data-narration="The highest probability class is selected as prediction">
    <polygon points="350,105 370,115 350,125" fill="#f39c12"/>
    <text x="362" y="115" text-anchor="middle" font-size="8" fill="white" font-weight="bold">★</text>
  </g>
</svg>