<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="knn-classifier">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9daf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classAGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classBGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3dbdb5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classCGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c800;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 22px;
      font-weight: bold;
      fill: #2c3e50;
    }
    .section-title {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      fill: #34495e;
    }
    .label-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      fill: #5d6d7e;
    }
    .detail-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      fill: #7f8c8d;
    }
    .box-anim { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title Section -->
  <g class="box-anim" data-narration="Title section introducing KNN Classifier">
    <text x="210" y="30" text-anchor="middle" class="title-text">K-Nearest Neighbors (KNN)</text>
    <text x="210" y="50" text-anchor="middle" class="detail-text">Classification Algorithm</text>
  </g>
  
  <!-- Section 1: Data Points Visualization -->
  <g class="slide-left delay-1" data-narration="Visual representation of training data points from different classes">
    <rect x="15" y="65" width="180" height="150" fill="white" rx="8" ry="8" filter="url(#shadow)" opacity="0.9"/>
    <text x="25" y="82" class="section-title">Training Data</text>
    
    <!-- Class A points -->
    <circle cx="45" cy="110" r="8" fill="url(#classAGradient)" class="float-anim"/>
    <circle cx="70" cy="135" r="8" fill="url(#classAGradient)" class="float-anim" style="animation-delay: 0.3s"/>
    <circle cx="55" cy="165" r="8" fill="url(#classAGradient)" class="float-anim" style="animation-delay: 0.6s"/>
    <circle cx="90" cy="100" r="8" fill="url(#classAGradient)" class="float-anim" style="animation-delay: 0.9s"/>
    
    <!-- Class B points -->
    <circle cx="130" cy="115" r="8" fill="url(#classBGradient)" class="float-anim" style="animation-delay: 0.2s"/>
    <circle cx="155" cy="145" r="8" fill="url(#classBGradient)" class="float-anim" style="animation-delay: 0.5s"/>
    <circle cx="140" cy="180" r="8" fill="url(#classBGradient)" class="float-anim" style="animation-delay: 0.8s"/>
    <circle cx="175" cy="125" r="8" fill="url(#classBGradient)" class="float-anim" style="animation-delay: 1.1s"/>
    
    <text x="25" y="202" class="label-text">● Class A (Red)</text>
    <text x="25" y="218" class="label-text">● Class B (Teal)</text>
  </g>
  
  <!-- Section 2: Query Point & KNN -->
  <g class="slide-right delay-2" data-narration="Query point being classified based on nearest neighbors">
    <rect x="225" y="65" width="180" height="150" fill="white" rx="8" ry="8" filter="url(#shadow)" opacity="0.9"/>
    <text x="235" y="82" class="section-title">KNN Prediction (K=3)</text>
    
    <!-- Data points (smaller) -->
    <circle cx="250" cy="120" r="6" fill="url(#classAGradient)"/>
    <circle cx="270" cy="140" r="6" fill="url(#classAGradient)"/>
    <circle cx="255" cy="170" r="6" fill="url(#classAGradient)"/>
    <circle cx="300" cy="130" r="6" fill="url(#classBGradient)"/>
    <circle cx="320" cy="160" r="6" fill="url(#classBGradient)"/>
    <circle cx="290" cy="185" r="6" fill="url(#classBGradient)"/>
    <circle cx="350" cy="145" r="6" fill="url(#classBGradient)"/>
    <circle cx="365" cy="120" r="6" fill="url(#classBGradient)"/>
    <circle cx="380" cy="175" r="6" fill="url(#classBGradient)"/>
    
    <!-- Query point -->
    <circle cx="315" cy="105" r="12" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" class="pulse-anim"/>
    <text x="315" y="85" text-anchor="middle" class="label-text" fill="#9b59b6">Query</text>
    
    <!-- Connection lines to nearest neighbors -->
    <line x1="315" y1="105" x2="300" y2="130" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" opacity="0.8">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1s" fill="freeze" repeatCount="indefinite"/>
    </line>
    <line x1="315" y1="105" x2="270" y2="140" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
    <line x1="315" y1="105" x2="320" y2="160" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
    
    <!-- Nearest neighbors circles -->
    <circle cx="300" cy="130" r="10" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" opacity="0.7"/>
    <circle cx="270" cy="140" r="10" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" opacity="0.7"/>
    <circle cx="320" cy="160" r="10" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" opacity="0.7"/>
    
    <text x="235" y="202" class="label-text">2 Class A + 1 Class B</text>
    <text x="235" y="218" class="label-text" fill="#e74c3c">→ Predict: Class A</text>
  </g>
  
  <!-- Section 3: Distance Metrics -->
  <g class="slide-left delay-3" data-narration="Distance metrics used to measure similarity between points">
    <rect x="15" y="230" width="190" height="75" fill="white" rx="8" ry="8" filter="url(#shadow)" opacity="0.9"/>
    <text x="25" y="248" class="section-title">Distance Metrics</text>
    
    <text x="25" y="268" class="label-text">• Euclidean: √((x₂-x₁)² + (y₂-y₁)²)</text>
    <text x="25" y="286" class="label-text">• Manhattan: |x₂-x₁| + |y₂-y₁|</text>
    <text x="25" y="302" class="label-text">• Minkowski: (Σ|xi-yi|^p)^(1/p)</text>
  </g>
  
  <!-- Section 4: K-Value Selection -->
  <g class="slide-right delay-4" data-narration="K-value selection and its impact on model performance">
    <rect x="225" y="230" width="180" height="75" fill="white" rx="8" ry="8" filter="url(#shadow)" opacity="0.9"/>
    <text x="235" y="248" class="section-title">K-Value Selection</text>
    
    <!-- K value indicators -->
    <circle cx="260" cy="275" r="15" fill="#3498db" opacity="0.7"/>
    <text x="260" y="280" text-anchor="middle" fill="white" font-size="14" font-weight="bold">K=3</text>
    <text x="260" y="298" text-anchor="middle" class="detail-text">Optimal</text>
    
    <circle cx="310" cy="275" r="10" fill="#95a5a6" opacity="0.7"/>
    <text x="310" y="280" text-anchor="middle" fill="white" font-size="11" font-weight="bold">K=1</text>
    <text x="310" y="295" text-anchor="middle" class="detail-text">Overfit</text>
    
    <circle cx="360" cy="275" r="20" fill="#95a5a6" opacity="0.5"/>
    <text x="360" y="280" text-anchor="middle" fill="white" font-size="11" font-weight="bold">K=15</text>
    <text x="360" y="298" text-anchor="middle" class="detail-text">Underfit</text>
  </g>
  
  <!-- Section 5: Key Concept Box -->
  <g class="box-anim delay-5" data-narration="Summary of key KNN characteristics">
    <rect x="15" y="320" width="390" height="65" fill="linear-gradient(135deg, #667eea 0%, #764ba2 100%)" rx="8" ry="8" filter="url(#shadow)"/>
    <text x="25" y="342" class="section-title" fill="white">Key Concepts:</text>
    <text x="25" y="360" class="label-text" fill="white">• Instance-based learning (lazy)</text>
    <text x="165" y="360" class="label-text" fill="white">• Non-parametric method</text>
    <text x="25" y="378" class="label-text" fill="white">• Uses majority vote for classification</text>
    <text x="230" y="378" class="label-text" fill="white">• Sensitive to feature scaling</text>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="400" cy="20" r="40" fill="#3498db" opacity="0.2"/>
    <circle cx="10" cy="380" r="30" fill="#e74c3c" opacity="0.2"/>
  </g>
</svg>