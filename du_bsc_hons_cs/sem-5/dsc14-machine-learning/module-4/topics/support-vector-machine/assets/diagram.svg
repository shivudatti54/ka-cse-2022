<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="support-vector-machine" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8e4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f0f7f4;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1.5s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5f7c" text-anchor="middle" class="fade-in">Support Vector Machine</text>
  
  <!-- Diagram Area - Left side -->
  <g transform="translate(20, 50)">
    <!-- Coordinate system / Grid -->
    <g class="fade-in delay-1">
      <line x1="0" y1="150" x2="180" y2="150" stroke="#b8c9c4" stroke-width="1"/>
      <line x1="90" y1="0" x2="90" y2="300" stroke="#b8c9c4" stroke-width="1"/>
    </g>
    
    <!-- Class 2 points (Blue circles) -->
    <g class="fade-in delay-2">
      <circle cx="40" cy="60" r="6" fill="#5b9bd5" opacity="0.8"/>
      <circle cx="60" cy="90" r="6" fill="#5b9bd5" opacity="0.8"/>
      <circle cx="35" cy="120" r="6" fill="#5b9bd5" opacity="0.8"/>
      <circle cx="55" cy="140" r="6" fill="#5b9bd5" opacity="0.8"/>
      <circle cx="70" cy="45" r="6" fill="#5b9bd5" opacity="0.8"/>
    </g>
    
    <!-- Class 1 points (Red squares) -->
    <g class="fade-in delay-2">
      <rect x="114" y="50" width="12" height="12" fill="#ed7d31" opacity="0.8" rx="1"/>
      <rect x="130" y="80" width="12" height="12" fill="#ed7d31" opacity="0.8" rx="1"/>
      <rect x="120" y="110" width="12" height="12" fill="#ed7d31" opacity="0.8" rx="1"/>
      <rect x="140" y="130" width="12" height="12" fill="#ed7d31" opacity="0.8" rx="1"/>
      <rect x="135" y="55" width="12" height="12" fill="#ed7d31" opacity="0.8" rx="1"/>
    </g>
    
    <!-- Margin lines (dashed) -->
    <line x1="20" y1="95" x2="160" y2="95" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" class="draw delay-3"/>
    <line x1="20" y1="185" x2="160" y2="185" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" class="draw delay-3"/>
    
    <!-- Hyperplane (decision boundary) -->
    <line x1="15" y1="140" x2="175" y2="140" stroke="#2c5f7c" stroke-width="3" class="draw delay-3"/>
    
    <!-- Support Vectors - highlighted -->
    <circle cx="55" cy="140" r="9" fill="none" stroke="#ed7d31" stroke-width="2" class="pulse delay-4"/>
    <circle cx="130" cy="80" r="9" fill="none" stroke="#ed7d31" stroke-width="2" class="pulse delay-4"/>
    <circle cx="70" cy="45" r="9" fill="none" stroke="#5b9bd5" stroke-width="2" class="pulse delay-4"/>
    <circle cx="140" cy="130" r="9" fill="none" stroke="#5b9bd5" stroke-width="2" class="pulse delay-4"/>
    
    <!-- Margin arrow -->
    <line x1="145" y1="95" x2="145" y2="185" stroke="#666" stroke-width="1" class="fade-in delay-4"/>
    <polygon points="145,90 140,98 150,98" fill="#666" class="fade-in delay-4"/>
    <polygon points="145,190 140,182 150,182" fill="#666" class="fade-in delay-4"/>
    <text x="152" y="145" font-family="Arial" font-size="10" fill="#555" class="fade-in delay-4">Margin</text>
  </g>
  
  <!-- Labels for main diagram -->
  <g class="slide-in delay-3">
    <text x="100" y="205" font-family="Arial" font-size="11" fill="#2c5f7c" text-anchor="middle">Hyperplane</text>
    <line x1="95" y1="188" x2="95" y2="197" stroke="#2c5f7c" stroke-width="1"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(210, 60)" class="fade-in delay-2">
    <rect x="0" y="0" width="190" height="90" fill="url(#boxGradient)" rx="5" filter="url(#shadow)"/>
    <circle cx="20" cy="25" r="5" fill="#5b9bd5"/>
    <text x="35" y="29" font-family="Arial" font-size="11" fill="#333">Class A</text>
    <rect x="12" y="40" width="10" height="10" fill="#ed7d31" rx="1"/>
    <text x="35" y="49" font-family="Arial" font-size="11" fill="#333">Class B</text>
    <line x1="15" y1="68" x2="25" y2="68" stroke="#2c5f7c" stroke-width="2"/>
    <text x="35" y="72" font-family="Arial" font-size="11" fill="#333">Hyperplane</text>
    <circle cx="20" cy="82" r="5" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="35" y="86" font-family="Arial" font-size="11" fill="#333">Support Vectors</text>
  </g>
  
  <!-- Concept Box 1: Hyperplane -->
  <g transform="translate(210, 165)" class="slide-in delay-3" data-narration="The hyperplane is the decision boundary that separates different classes in the feature space">
    <rect x="0" y="0" width="190" height="45" fill="url(#boxGradient)" rx="5" filter="url(#shadow)"/>
    <text x="10" y="18" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5f7c">Hyperplane</text>
    <text x="10" y="35" font-family="Arial" font-size="10" fill="#555">Linear separator maximizing</text>
    <text x="10" y="43" font-family="Arial" font-size="10" fill="#555">margin between classes</text>
  </g>
  
  <!-- Concept Box 2: Support Vectors -->
  <g transform="translate(210, 220)" class="slide-in delay-4" data-narration="Support vectors are the critical data points that lie closest to the hyperplane and define the margin">
    <rect x="0" y="0" width="190" height="45" fill="url(#boxGradient)" rx="5" filter="url(#shadow)"/>
    <text x="10" y="18" font-family="Arial" font-size="12" font-weight="bold" fill="#ed7d31">Support Vectors</text>
    <text x="10" y="35" font-family="Arial" font-size="10" fill="#555">Data points nearest to</text>
    <text x="10" y="43" font-family="Arial" font-size="10" fill="#555">hyperplane; define the margin</text>
  </g>
  
  <!-- Concept Box 3: Margin -->
  <g transform="translate(210, 275)" class="slide-in delay-5" data-narration="The margin is the distance between the hyperplane and the support vectors. SVM aims to maximize this margin">
    <rect x="0" y="0" width="190" height="45" fill="url(#boxGradient)" rx="5" filter="url(#shadow)"/>
    <text x="10" y="18" font-family="Arial" font-size="12" font-weight="bold" fill="#5b9bd5">Margin</text>
    <text x="10" y="35" font-family="Arial" font-size="10" fill="#555">Distance from hyperplane</text>
    <text x="10" y="43" font-family="Arial" font-size="10" fill="#555">to support vectors</text>
  </g>
  
  <!-- Kernel Functions Visual -->
  <g transform="translate(20, 310)" class="fade-in delay-5" data-narration="Kernel functions transform data to higher dimensions for non-linear separation">
    <rect x="0" y="0" width="180" height="80" fill="url(#boxGradient)" rx="5" filter="url(#shadow)"/>
    <text x="90" y="18" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5f7c" text-anchor="middle">Kernel Functions</text>
    
    <!-- Kernel types with icons -->
    <g transform="translate(15, 30)">
      <rect x="0" y="0" width="40" height="35" fill="#e8f4f8" rx="3" stroke="#5b9bd5" stroke-width="1"/>
      <text x="20" y="22" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Linear</text>
    </g>
    <g transform="translate(65, 30)">
      <rect x="0" y="0" width="40" height="35" fill="#fef3e2" rx="3" stroke="#ed7d31" stroke-width="1"/>
      <text x="20" y="22" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Polynomial</text>
    </g>
    <g transform="translate(115, 30)">
      <rect x="0" y="0" width="40" height="35" fill="#e8f4f8" rx="3" stroke="#70ad47" stroke-width="1"/>
      <text x="20" y="22" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">RBF</text>
    </g>
    
    <!-- Arrow showing transformation -->
    <path d="M175 50 Q 185 50 195 50" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom highlight box -->
  <g transform="translate(210, 310)" class="fade-in delay-5">
    <rect x="0" y="0" width="190" height="80" fill="#2c5f7c" rx="5" opacity="0.9"/>
    <text x="95" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">SVM Goal</text>
    <text x="95" y="40" font-family="Arial" font-size="10" fill="#e8f4f8" text-anchor="middle">Find optimal hyperplane that</text>
    <text x="95" y="55" font-family="Arial" font-size="10" fill="#e8f4f8" text-anchor="middle">maximizes margin while</text>
    <text x="95" y="70" font-family="Arial" font-size="10" fill="#e8f4f8" text-anchor="middle">minimizing classification error</text>
  </g>
  
  <!-- Arrow from diagram to concept boxes -->
  <g class="fade-in delay-4">
    <path d="M200 190 L 210 190" stroke="#888" stroke-width="1" fill="none"/>
    <polygon points="205,187 210,190 205,193" fill="#888"/>
  </g>
</svg>