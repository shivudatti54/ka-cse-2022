<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="class-balancing-outlier-detection" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5e6f4"/>
      <stop offset="100%" style="stop-color:#e6f4f0"/>
    </linearGradient>
    <linearGradient id="majorBarGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#4472c4"/>
    </linearGradient>
    <linearGradient id="minorBarGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed7d31"/>
      <stop offset="100%" style="stop-color:#d35f2d"/>
    </linearGradient>
    <linearGradient id="outlierGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#c92a2a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes growBar {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .bar-major { animation: growBar 0.8s ease-out 0.3s forwards; transform-origin: bottom; }
    .bar-minor { animation: growBar 0.8s ease-out 0.5s forwards; transform-origin: bottom; }
    .arrow-oversample { animation: drawArrow 1s ease-out 0.8s forwards; stroke-dasharray: 100; }
    .arrow-undersample { animation: drawArrow 1s ease-out 1s forwards; stroke-dasharray: 100; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title Section -->
  <g class="title">
    <text x="210" y="30" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Class Balancing &amp; Outlier Detection</text>
    <line x1="100" y1="42" x2="320" y2="42" stroke="#5b9bd5" stroke-width="2"/>
  </g>
  
  <!-- Section 1: Class Imbalance Bar Chart -->
  <g class="section-1" data-narration="Bar chart showing imbalanced class distribution with majority class significantly taller than minority class">
    <text x="30" y="65" font-size="13" font-weight="bold" fill="#2c3e50">Class Imbalance</text>
    
    <!-- Majority Bar -->
    <rect class="bar-major" x="45" y="90" width="50" height="120" fill="url(#majorBarGradient)" rx="4" filter="url(#shadow)"/>
    <text x="70" y="225" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">1000</text>
    <text x="70" y="240" font-size="11" fill="#4472c4" text-anchor="middle">Majority</text>
    
    <!-- Minority Bar -->
    <rect class="bar-minor" x="115" y="180" width="50" height="30" fill="url(#minorBarGradient)" rx="4" filter="url(#shadow)"/>
    <text x="140" y="225" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">10</text>
    <text x="140" y="240" font-size="11" fill="#d35f2d" text-anchor="middle">Minority</text>
    
    <!-- Ratio Label -->
    <rect x="40" y="250" width="120" height="24" fill="#fff" rx="4" stroke="#ddd" stroke-width="1"/>
    <text x="100" y="267" font-size="12" fill="#2c3e50" text-anchor="middle" font-weight="bold">Ratio: 100:1</text>
  </g>
  
  <!-- Section 2: Oversampling & Undersampling -->
  <g class="section-2" data-narration="Visual representation of oversampling (increasing minority) and undersampling (decreasing majority) techniques">
    <text x="240" y="65" font-size="13" font-weight="bold" fill="#2c3e50">Balancing Techniques</text>
    
    <!-- Oversampling Box -->
    <rect x="220" y="80" width="90" height="60" fill="#d4edda" rx="6" stroke="#28a745" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="265" y="100" font-size="12" fill="#155724" text-anchor="middle" font-weight="bold">Oversampling</text>
    <text x="265" y="118" font-size="10" fill="#155724" text-anchor="middle">Add minority</text>
    <text x="265" y="132" font-size="10" fill="#155724" text-anchor="middle">samples</text>
    
    <!-- Undersampling Box -->
    <rect x="320" y="80" width="90" height="60" fill="#f8d7da" rx="6" stroke="#dc3545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="365" y="100" font-size="12" fill="#721c24" text-anchor="middle" font-weight="bold">Undersampling</text>
    <text x="365" y="118" font-size="10" fill="#721c24" text-anchor="middle">Remove majority</text>
    <text x="365" y="132" font-size="10" fill="#721c24" text-anchor="middle">samples</text>
    
    <!-- Arrows showing direction -->
    <path class="arrow-oversample" d="M 265 145 Q 265 165 265 175" stroke="#28a745" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    <path class="arrow-undersample" d="M 365 145 Q 365 165 365 175" stroke="#dc3545" stroke-width="2" fill="none"/>
    
    <!-- Balanced Result -->
    <rect x="260" y="180" width="100" height="45" fill="#cce5ff" rx="6" stroke="#5b9bd5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="310" y="202" font-size="12" fill="#004085" text-anchor="middle" font-weight="bold">Balanced Classes</text>
    <text x="310" y="218" font-size="10" fill="#004085" text-anchor="middle">50:50 or 60:40</text>
  </g>
  
  <!-- Section 3: Outlier Detection -->
  <g class="section-3" data-narration="Scatter plot showing normal data points and highlighted outliers">
    <text x="30" y="295" font-size="13" font-weight="bold" fill="#2c3e50">Outlier Detection</text>
    
    <!-- Simple scatter plot -->
    <rect x="25" y="310" width="180" height="80" fill="#fff" rx="4" stroke="#ddd" stroke-width="1"/>
    
    <!-- Normal points -->
    <circle cx="50" cy="365" r="4" fill="#5b9bd5" class="pulse-anim"/>
    <circle cx="70" cy="355" r="4" fill="#5b9bd5"/>
    <circle cx="90" cy="370" r="4" fill="#5b9bd5" class="pulse-anim"/>
    <circle cx="110" cy="360" r="4" fill="#5b9bd5"/>
    <circle cx="130" cy="375" r="4" fill="#5b9bd5" class="pulse-anim"/>
    <circle cx="150" cy="350" r="4" fill="#5b9bd5"/>
    <circle cx="170" cy="365" r="4" fill="#5b9bd5" class="pulse-anim"/>
    <circle cx="85" cy="340" r="4" fill="#5b9bd5"/>
    <circle cx="120" cy="330" r="4" fill="#5b9bd5" class="pulse-anim"/>
    <circle cx="155" cy="335" r="4" fill="#5b9bd5"/>
    
    <!-- Outliers -->
    <circle cx="45" cy="330" r="5" fill="url(#outlierGradient)" stroke="#fff" stroke-width="1"/>
    <circle cx="175" cy="345" r="5" fill="url(#outlierGradient)" stroke="#fff" stroke-width="1"/>
    <circle cx="60" cy="375" r="5" fill="url(#outlierGradient)" stroke="#fff" stroke-width="1"/>
    
    <!-- Legend -->
    <circle cx="40" y="300" r="3" fill="#5b9bd5"/>
    <text x="50" y="303" font-size="9" fill="#555">Normal</text>
    <circle cx="90" y="300" r="3" fill="#ff6b6b"/>
    <text x="100" y="303" font-size="9" fill="#555">Outlier</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key concepts summary: balanced accuracy, anomaly detection, SMOTE, and Isolation Forest">
    <rect x="215" y="235" width="195" height="150" fill="#fff" rx="6" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
    <text x="312" y="255" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">Key Concepts</text>
    
    <line x1="225" y1="262" x2="400" y2="262" stroke="#eee" stroke-width="1"/>
    
    <!-- Concept 1 -->
    <circle cx="230" cy="280" r="5" fill="#5b9bd5"/>
    <text x="242" y="284" font-size="10" fill="#333">Balanced Accuracy</text>
    <text x="230" y="295" font-size="9" fill="#777">Accounts for class bias</text>
    
    <!-- Concept 2 -->
    <circle cx="230" cy="310" r="5" fill="#ed7d31"/>
    <text x="242" y="314" font-size="10" fill="#333">SMOTE</text>
    <text x="230" y="325" font-size="9" fill="#777">Synthetic oversampling</text>
    
    <!-- Concept 3 -->
    <circle cx="230" cy="340" r="5" fill="#70ad47"/>
    <text x="242" y="344" font-size="10" fill="#333">Isolation Forest</text>
    <text x="230" y="355" font-size="9" fill="#777">Tree-based anomaly det.</text>
    
    <!-- Concept 4 -->
    <circle cx="230" cy="368" r="5" fill="#ff6b6b"/>
    <text x="242" y="372" font-size="10" fill="#333">Z-Score / IQR</text>
    <text x="230" y="383" font-size="9" fill="#777">Statistical outlier methods</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#28a745"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#dc3545"/>
    </marker>
  </defs>
</svg>