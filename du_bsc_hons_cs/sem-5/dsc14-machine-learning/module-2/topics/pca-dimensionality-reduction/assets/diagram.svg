<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pca-dimensionality-reduction">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e84393;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3436" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateX(-20px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .box5 { animation: slideIn 0.6s ease-out 1.0s both; }
    .box6 { animation: slideIn 0.6s ease-out 1.2s both; }
    .arrow { animation: fadeIn 0.5s ease-out 1.4s both; }
    .label { animation: pulse 2s ease-in-out infinite; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.5s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2d3436" class="title">PCA Dimensionality Reduction</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#636e72" class="subtitle">Workflow Pipeline</text>
  
  <!-- Box 1: Raw Data Input -->
  <g class="box1" data-narration="Step 1: Original high-dimensional data is loaded into the system. This data contains multiple correlated features that need reduction.">
    <rect x="20" y="60" width="100" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)" />
    <text x="70" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3436">Raw Data</text>
    <text x="70" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">Input</text>
    <rect x="28" y="105" width="84" height="4" rx="2" fill="#dfe6e9" />
    <rect x="28" y="105" width="50" height="4" rx="2" fill="#f39c12" />
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow">
    <line x1="125" y1="87" x2="145" y2="87" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Box 2: Standardization -->
  <g class="box2" data-narration="Step 2: Data is standardized to have zero mean and unit variance using z-score normalization. This ensures all features contribute equally.">
    <rect x="150" y="60" width="110" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" />
    <text x="205" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3436">Standardization</text>
    <text x="205" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">(x - μ) / σ</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow">
    <line x1="265" y1="87" x2="285" y2="87" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Box 3: Covariance Matrix -->
  <g class="box3" data-narration="Step 3: Compute the covariance matrix to understand how features vary together. This captures the relationships between all feature pairs.">
    <rect x="290" y="60" width="110" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)" />
    <text x="345" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Covariance</text>
    <text x="345" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Matrix Σ</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="arrow">
    <line x1="345" y1="120" x2="345" y2="145" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Box 4: Eigen Decomposition -->
  <g class="box4" data-narration="Step 4: Perform eigen decomposition on the covariance matrix to find eigenvalues and eigenvectors. Eigenvectors indicate directions of maximum variance.">
    <rect x="290" y="150" width="110" height="55" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)" />
    <text x="345" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Eigen</text>
    <text x="345" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Decomposition</text>
    <text x="345" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fab1a0">λ₁, λ₂, v₁, v₂...</text>
  </g>
  
  <!-- Arrow 4 -->
  <g class="arrow">
    <line x1="290" y1="177" x2="240" y2="177" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Box 5: Select Top k Components -->
  <g class="box5" data-narration="Step 5: Use scree plot or variance threshold to select top k principal components that retain most information (typically 95%+ variance).">
    <rect x="130" y="150" width="115" height="55" rx="8" fill="url(#boxGradient5)" filter="url(#shadow)" />
    <text x="187" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">Select Top k</text>
    <text x="187" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d3436">Components</text>
    <rect x="145" y="195" width="85" height="3" rx="1.5" fill="#00b894" class="label" />
  </g>
  
  <!-- Arrow 5 -->
  <g class="arrow">
    <line x1="130" y1="177" x2="100" y2="177" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Box 6: Project to New Space -->
  <g class="box6" data-narration="Step 6: Transform original data onto the selected principal components, resulting in reduced-dimensionality data ready for analysis.">
    <rect x="20" y="150" width="85" height="55" rx="8" fill="url(#boxGradient6)" filter="url(#shadow)" />
    <text x="62" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Project</text>
    <text x="62" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">to New</text>
    <text x="62" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dfe6e9">Space</text>
  </g>
  
  <!-- Down arrow from Box 5 -->
  <g class="arrow">
    <line x1="187" y1="210" x2="187" y2="230" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Key Concepts Box -->
  <g class="box6" data-narration="Key outcomes: Uncorrelated features, reduced dimensionality, maximum variance retention, computational efficiency.">
    <rect x="87" y="235" width="200" height="50" rx="8" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1" />
    <text x="187" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3436">Key Outcomes</text>
    <text x="187" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#636e72">• Uncorrelated variables</text>
    <text x="187" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#636e72">• Reduced dimensions (k ≪ original)</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="4" fill="#fab1a0" opacity="0.6" />
  <circle cx="390" cy="380" r="4" fill="#a29bfe" opacity="0.6" />
  <circle cx="390" cy="55" r="4" fill="#55efc4" opacity="0.6" />
  <circle cx="30" cy="55" r="4" fill="#81ecec" opacity="0.6" />
  
  <!-- Variance explanation visual -->
  <g class="box4">
    <rect x="320" y="215" width="85" height="35" rx="5" fill="#ffeaa7" stroke="#f39c12" stroke-width="1" opacity="0.8" />
    <text x="362" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d3436" font-weight="bold">Variance</text>
    <text x="362" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2d3436">Explained: 95%+</text>
  </g>
</svg>