<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="supervised-unsupervised-learning" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f0f6"/>
    </linearGradient>
    <linearGradient id="supervisedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="unsupervisedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0"/>
      <stop offset="100%" style="stop-color:#b895c4"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9d56e"/>
      <stop offset="100%" style="stop-color:#f5c04a"/>
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8ec5fc"/>
      <stop offset="100%" style="stop-color:#6bb3f5"/>
    </linearGradient>
    <linearGradient id="outputGradS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#85ffbd"/>
      <stop offset="100%" style="stop-color:#5fd396"/>
    </linearGradient>
    <linearGradient id="outputGradU" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#ffb199"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-box { animation: slideInLeft 0.8s ease-out; }
    .section-box-u { animation: slideInRight 0.8s ease-out; }
    .data-box { animation: slideInUp 0.6s ease-out 0.2s both; }
    .model-box { animation: slideInUp 0.6s ease-out 0.4s both; }
    .output-box { animation: slideInUp 0.6s ease-out 0.6s both; }
    .arrow-line { stroke-dasharray: 200; animation: drawLine 1s ease-out 0.8s forwards; stroke-dashoffset: 200; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .connector { animation: fadeIn 0.5s ease-out 1s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Supervised vs Unsupervised</text>
  <text x="210" y="48" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5d6d7e" class="title">Machine Learning Paradigms</text>
  
  <!-- Supervised Learning Section (Left) -->
  <g data-narration="Supervised Learning workflow showing labeled data flowing through training to produce predictions">
    <rect x="15" y="65" width="185" height="310" fill="url(#supervisedGrad)" rx="10" filter="url(#shadow)" class="section-box"/>
    <text x="107" y="85" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a5f4a">Supervised Learning</text>
    <text x="107" y="100" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#145240">Labeled Data</text>
    
    <!-- Labeled Data Box -->
    <g class="data-box">
      <rect x="30" y="115" width="155" height="45" fill="url(#dataGrad)" rx="6" filter="url(#shadow)"/>
      <text x="107" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#5a4a00">Labeled Data</text>
      <text x="107" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#5a4a00">(Input + Correct Output)</text>
    </g>
    
    <!-- Arrow 1 -->
    <line x1="107" y1="165" x2="107" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
    
    <!-- Training Box -->
    <g class="model-box">
      <rect x="30" y="185" width="155" height="40" fill="#c8e6c9" rx="6" filter="url(#shadow)"/>
      <text x="107" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e5a2e">Training Process</text>
      <text x="107" y="218" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#2e5a2e">Learns mapping function</text>
    </g>
    
    <!-- Arrow 2 -->
    <line x1="107" y1="230" x2="107" y2="245" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
    
    <!-- Model Box -->
    <g class="model-box">
      <rect x="30" y="250" width="155" height="40" fill="url(#modelGrad)" rx="6" filter="url(#shadow)"/>
      <text x="107" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a3a5c">Trained Model</text>
      <text x="107" y="283" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#1a3a5c">Ready for predictions</text>
    </g>
    
    <!-- Arrow 3 -->
    <line x1="107" y1="295" x2="107" y2="310" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
    
    <!-- Output Box -->
    <g class="output-box">
      <rect x="30" y="315" width="155" height="45" fill="url(#outputGradS)" rx="6" filter="url(#shadow)" class="pulse-anim"/>
      <text x="107" y="335" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a4a2e">Predictions</text>
      <text x="107" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a4a2e">Classification / Regression</text>
    </g>
  </g>
  
  <!-- Unsupervised Learning Section (Right) -->
  <g data-narration="Unsupervised Learning workflow showing unlabeled data flowing through training to discover patterns and groups">
    <rect x="220" y="65" width="185" height="310" fill="url(#unsupervisedGrad)" rx="10" filter="url(#shadow)" class="section-box-u"/>
    <text x="312" y="85" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#4a1a5f">Unsupervised Learning</text>
    <text x="312" y="100" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a1a5f">Unlabeled Data</text>
    
    <!-- Unlabeled Data Box -->
    <g class="data-box">
      <rect x="235" y="115" width="155" height="45" fill="url(#dataGrad)" rx="6" filter="url(#shadow)"/>
      <text x="312" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#5a4a00">Unlabeled Data</text>
      <text x="312" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#5a4a00">(Input only - no labels)</text>
    </g>
    
    <!-- Arrow 1 -->
    <line x1="312" y1="165" x2="312" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
    
    <!-- Training Box -->
    <g class="model-box">
      <rect x="235" y="185" width="155" height="40" fill="#e1bee7" rx="6" filter="url(#shadow)"/>
      <text x="312" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a1a5f">Training Process</text>
      <text x="312" y="218" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#4a1a5f">Finds hidden patterns</text>
    </g>
    
    <!-- Arrow 2 -->
    <line x1="312" y1="230" x2="312" y2="245" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
    
    <!-- Model Box -->
    <g class="model-box">
      <rect x="235" y="250" width="155" height="40" fill="url(#modelGrad)" rx="6" filter="url(#shadow)"/>
      <text x="312" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a3a5c">Trained Model</text>
      <text x="312" y="283" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#1a3a5c">Pattern discovery</text>
    </g>
    
    <!-- Arrow 3 -->
    <line x1="312" y1="295" x2="312" y2="310" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="connector"/>
    
    <!-- Output Box -->
    <g class="output-box">
      <rect x="235" y="315" width="155" height="45" fill="url(#outputGradU)" rx="6" filter="url(#shadow)" class="pulse-anim"/>
      <text x="312" y="335" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#5a2a1a">Patterns / Groups</text>
      <text x="312" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#5a2a1a">Clustering / Dimensionality</text>
    </g>
  </g>
  
  <!-- Key Differences Section -->
  <g data-narration="Key differences between supervised and unsupervised learning highlighted in bottom section">
    <rect x="15" y="380" width="390" height="15" fill="#f5f5f5" rx="3" opacity="0.5"/>
    <text x="210" y="391" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      <tspan font-weight="bold">Supervised:</tspan> Has labels • 
      <tspan font-weight="bold">Unsupervised:</tspan> No labels • 
      <tspan font-weight="bold">Output:</tspan> Predictions vs Patterns
    </text>
  </g>
</svg>