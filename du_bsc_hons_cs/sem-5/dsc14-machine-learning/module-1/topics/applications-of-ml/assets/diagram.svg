<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="applications-of-ml">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="supervisedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="unsupervisedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb7b2"/>
      <stop offset="100%" style="stop-color:#ff9e99"/>
    </linearGradient>
    <linearGradient id="reinforcementGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b5c7f0"/>
      <stop offset="100%" style="stop-color:#9bb0e0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .main-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .sub-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .connector { stroke-dasharray: 100; animation: drawLine 0.8s ease-out forwards; }
    .category { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .main-box:nth-child(1) { animation-delay: 0.1s; }
    .main-box:nth-child(2) { animation-delay: 0.2s; }
    .main-box:nth-child(3) { animation-delay: 0.3s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Main title showing the topic: Types of Machine Learning">Types of Machine Learning</text>
  
  <!-- Central Hub -->
  <circle cx="210" cy="80" r="25" fill="#3498db" filter="url(#shadow)"/>
  <text x="210" y="85" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">ML</text>
  
  <!-- Connecting Lines -->
  <line x1="210" y1="105" x2="100" y2="160" stroke="#7f8c8d" stroke-width="2" class="connector" data-narration="Arrow connecting ML to Supervised Learning"/>
  <line x1="210" y1="105" x2="210" y2="160" stroke="#7f8c8d" stroke-width="2" class="connector" data-narration="Arrow connecting ML to Unsupervised Learning"/>
  <line x1="210" y1="105" x2="320" y2="160" stroke="#7f8c8d" stroke-width="2" class="connector" data-narration="Arrow connecting ML to Reinforcement Learning"/>
  
  <!-- Supervised Learning Branch -->
  <g class="main-box">
    <rect x="40" y="165" width="120" height="70" rx="8" fill="url(#supervisedGrad)" filter="url(#shadow)" data-narration="Supervised Learning box - learning from labeled data"/>
    <text x="100" y="185" text-anchor="middle" class="category">Supervised</text>
    <text x="100" y="200" text-anchor="middle" class="category">Learning</text>
    <text x="100" y="222" text-anchor="middle" class="detail">Uses labeled data</text>
  </g>
  
  <!-- Sub-branches for Supervised -->
  <line x1="70" y1="235" x2="55" y2="275" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <rect x="10" y="280" width="55" height="35" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1" data-narration="Classification subcategory - categorizing data into classes">
    <text x="37" y="302" text-anchor="middle" class="detail" font-size="10">Classif.</text>
  </rect>
  
  <line x1="130" y1="235" x2="145" y2="275" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <rect x="115" y="280" width="55" height="35" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1" data-narration="Regression subcategory - predicting continuous values">
    <text x="142" y="302" text-anchor="middle" class="detail" font-size="10">Regression</text>
  </rect>
  
  <!-- Unsupervised Learning Branch -->
  <g class="main-box">
    <rect x="150" y="165" width="120" height="70" rx="8" fill="url(#unsupervisedGrad)" filter="url(#shadow)" data-narration="Unsupervised Learning box - learning from unlabeled data"/>
    <text x="210" y="185" text-anchor="middle" class="category">Unsupervised</text>
    <text x="210" y="200" text-anchor="middle" class="category">Learning</text>
    <text x="210" y="222" text-anchor="middle" class="detail">Finds hidden patterns</text>
  </g>
  
  <!-- Sub-branches for Unsupervised -->
  <line x1="180" y1="235" x2="165" y2="275" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <rect x="120" y="280" width="55" height="35" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" data-narration="Clustering subcategory - grouping similar data points">
    <text x="147" y="302" text-anchor="middle" class="detail" font-size="10">Clustering</text>
  </rect>
  
  <line x1="240" y1="235" x2="255" y2="275" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <rect x="225" y="280" width="65" height="35" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" data-narration="Dimensionality Reduction - reducing features while preserving structure">
    <text x="257" y="302" text-anchor="middle" class="detail" font-size="9">Dim. Reduction</text>
  </rect>
  
  <!-- Reinforcement Learning Branch -->
  <g class="main-box">
    <rect x="260" y="165" width="120" height="70" rx="8" fill="url(#reinforcementGrad)" filter="url(#shadow)" data-narration="Reinforcement Learning box - learning through rewards and penalties"/>
    <text x="320" y="185" text-anchor="middle" class="category">Reinforcement</text>
    <text x="320" y="200" text-anchor="middle" class="category">Learning</text>
    <text x="320" y="222" text-anchor="middle" class="detail">Learn via rewards</text>
  </g>
  
  <!-- Sub-branches for Reinforcement -->
  <line x1="290" y1="235" x2="275" y2="275" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <rect x="230" y="280" width="55" height="35" rx="4" fill="#d6eaf8" stroke="#3498db" stroke-width="1" data-narration="Model-based RL - uses environment model">
    <text x="257" y="302" text-anchor="middle" class="detail" font-size="10">Model-based</text>
  </rect>
  
  <line x1="350" y1="235" x2="365" y2="275" stroke="#7f8c8d" stroke-width="1.5" class="connector"/>
  <rect x="335" y="280" width="55" height="35" rx="4" fill="#d6eaf8" stroke="#3498db" stroke-width="1" data-narration="Model-free RL - learns directly from experience">
    <text x="362" y="302" text-anchor="middle" class="detail" font-size="10">Model-free</text>
  </rect>
  
  <!-- Legend / Info Box -->
  <rect x="10" y="340" width="400" height="50" rx="5" fill="white" stroke="#bdc3c7" stroke-width="1" opacity="0.9" data-narration="Key applications summary box"/>
  <text x="210" y="358" text-anchor="middle" class="detail" font-size="11">ML powers healthcare diagnostics, fraud detection, recommendations, autonomous systems, and more</text>
  <circle cx="25" cy="365" r="5" fill="#3498db" class="sub-box" style="animation-delay: 0.8s"/>
  <circle cx="395" cy="365" r="5" fill="#3498db" class="sub-box" style="animation-delay: 0.9s"/>
</svg>