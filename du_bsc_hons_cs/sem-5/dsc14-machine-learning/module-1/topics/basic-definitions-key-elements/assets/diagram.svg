<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="basic-definitions-key-elements">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f0f6"/>
    </linearGradient>
    <linearGradient id="supervisedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="unsupervisedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0"/>
      <stop offset="100%" style="stop-color:#b89cc9"/>
    </linearGradient>
    <linearGradient id="reinforcementGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0d4b8"/>
      <stop offset="100%" style="stop-color:#c9b895"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .main-box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .sub-box { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    .sub-box-right { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
    .connector { animation: drawLine 1s ease-out forwards; stroke-dasharray: 100; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
    .delay-6 { animation-delay: 1.2s; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title" data-narration="Title: Basic Definitions and Key Elements of Machine Learning">Basic Definitions &amp; Key Elements</text>
  <text x="210" y="50" text-anchor="middle" font-size="12" fill="#5d6d7e" class="title" data-narration="Subtitle showing the three main categories">Types of Machine Learning</text>
  
  <!-- Central Hub -->
  <circle cx="210" cy="140" r="35" fill="#3498db" filter="url(#shadow)" class="main-box delay-1" data-narration="Machine Learning central concept - algorithms that improve through experience"/>
  <text x="210" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Machine</text>
  <text x="210" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Learning</text>
  
  <!-- Arrow to Supervised -->
  <path d="M175 140 L120 100" stroke="#3498db" stroke-width="2" fill="none" class="connector" data-narration="Arrow showing supervised learning is a type of ML"/>
  
  <!-- Arrow to Unsupervised -->
  <path d="M210 105 L210 70" stroke="#3498db" stroke-width="2" fill="none" class="connector" data-narration="Arrow showing unsupervised learning is a type of ML"/>
  
  <!-- Arrow to Reinforcement -->
  <path d="M245 140 L300 100" stroke="#3498db" stroke-width="2" fill="none" class="connector" data-narration="Arrow showing reinforcement learning is a type of ML"/>
  
  <!-- Supervised Learning Box -->
  <rect x="30" y="170" width="110" height="80" rx="8" fill="url(#supervisedGradient)" filter="url(#shadow)" class="sub-box delay-2" data-narration="Supervised Learning - learns from labeled data"/>
  <text x="85" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Supervised</text>
  <text x="85" y="205" text-anchor="middle" font-size="10" fill="#5d6d7e">Learning</text>
  <text x="85" y="235" text-anchor="middle" font-size="9" fill="#34495e">• Classification</text>
  <text x="85" y="245" text-anchor="middle" font-size="9" fill="#34495e">• Regression</text>
  
  <!-- Unsupervised Learning Box -->
  <rect x="155" y="170" width="110" height="80" rx="8" fill="url(#unsupervisedGradient)" filter="url(#shadow)" class="sub-box delay-3" data-narration="Unsupervised Learning - learns from unlabeled data"/>
  <text x="210" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Unsupervised</text>
  <text x="210" y="205" text-anchor="middle" font-size="10" fill="#5d6d7e">Learning</text>
  <text x="210" y="235" text-anchor="middle" font-size="9" fill="#34495e">• Clustering</text>
  <text x="210" y="245" text-anchor="middle" font-size="9" fill="#34495e">• Dimensionality</text>
  
  <!-- Reinforcement Learning Box -->
  <rect x="280" y="170" width="110" height="80" rx="8" fill="url(#reinforcementGradient)" filter="url(#shadow)" class="sub-box-right delay-2" data-narration="Reinforcement Learning - learns through rewards and penalties"/>
  <text x="335" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Reinforcement</text>
  <text x="335" y="205" text-anchor="middle" font-size="10" fill="#5d6d7e">Learning</text>
  <text x="335" y="235" text-anchor="middle" font-size="9" fill="#34495e">• Policy-based</text>
  <text x="335" y="245" text-anchor="middle" font-size="9" fill="#34495e">• Value-based</text>
  
  <!-- Definition Box -->
  <rect x="60" y="275" width="300" height="55" rx="8" fill="white" filter="url(#shadow)" class="sub-box delay-4" data-narration="Tom Mitchell's formal definition of Machine Learning"/>
  <text x="210" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">"A program learns from Experience (E)"</text>
  <text x="210" y="305" text-anchor="middle" font-size="9" fill="#5d6d7e">to improve Performance (P) on Task (T)</text>
  <text x="210" y="320" text-anchor="middle" font-size="8" fill="#7f8c8d">— Tom M. Mitchell</text>
  
  <!-- Key Elements -->
  <rect x="60" y="340" width="300" height="45" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" class="sub-box delay-5" data-narration="Key elements: Task, Experience, Performance measure"/>
  <text x="210" y="358" text-anchor="middle" font-size="9" fill="#2c3e50">Key Elements: <tspan font-weight="bold">T</tspan>ask · <tspan font-weight="bold">E</tspan>xperience · <tspan font-weight="bold">P</tspan>erformance</text>
  <text x="210" y="375" text-anchor="middle" font-size="8" fill="#7f8c8d">Essential components for measuring ML success</text>
  
  <!-- Pulsing dots for visual interest -->
  <circle cx="30" cy="30" r="4" fill="#3498db" class="pulse-anim delay-1"/>
  <circle cx="390" cy="370" r="4" fill="#9b59b6" class="pulse-anim delay-3"/>
  <circle cx="390" cy="30" r="4" fill="#e74c3c" class="pulse-anim delay-5"/>
  <circle cx="30" cy="370" r="4" fill="#27ae60" class="pulse-anim delay-2"/>
</svg>