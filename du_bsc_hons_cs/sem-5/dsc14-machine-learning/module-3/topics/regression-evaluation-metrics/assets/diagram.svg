<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="regression-evaluation-metrics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e6fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9fc5d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9e4ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d5a2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d5e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b4c8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0d4f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9b8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e0d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c9a8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#888" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .card { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .card-1 { animation-delay: 0.2s; }
    .card-2 { animation-delay: 0.35s; }
    .card-3 { animation-delay: 0.5s; }
    .card-4 { animation-delay: 0.65s; }
    .card-5 { animation-delay: 0.8s; }
    .card:hover { animation: pulse 0.5s ease-in-out; cursor: pointer; }
    .arrow { stroke-dasharray: 5,3; animation: drawArrow 1s ease-out forwards; }
    .connector { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
    .formula { font-family: 'Georgia', serif; font-style: italic; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">
    Regression Evaluation Metrics
  </text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- Metric Cards -->
  <!-- MSE Card -->
  <g class="card card-1" data-narration="Mean Squared Error calculates average squared difference between predicted and actual values. Higher weight to larger errors." filter="url(#shadow)">
    <rect x="15" y="60" width="75" height="95" rx="8" fill="url(#cardGradient1)"/>
    <text x="52" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">MSE</text>
    <text x="52" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Mean Squared</text>
    <text x="52" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Error</text>
    <text x="52" y="132" text-anchor="middle" class="formula" font-size="10" fill="#1a5276">MSE = (1/n)Σ(y-ŷ)²</text>
    <text x="52" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">Penalizes large</text>
    <text x="52" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">errors heavily</text>
  </g>
  
  <!-- MAE Card -->
  <g class="card card-2" data-narration="Mean Absolute Error calculates average absolute difference. More robust to outliers than MSE." filter="url(#shadow)">
    <rect x="105" y="60" width="75" height="95" rx="8" fill="url(#cardGradient2)"/>
    <text x="142" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">MAE</text>
    <text x="142" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Mean Absolute</text>
    <text x="142" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Error</text>
    <text x="142" y="132" text-anchor="middle" class="formula" font-size="10" fill="#1e8449">MAE = (1/n)Σ|y-ŷ|</text>
    <text x="142" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">Robust to</text>
    <text x="142" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">outliers</text>
  </g>
  
  <!-- RMSE Card -->
  <g class="card card-3" data-narration="Root Mean Squared Error is the square root of MSE. Returns error to original units making it more interpretable." filter="url(#shadow)">
    <rect x="195" y="60" width="75" height="95" rx="8" fill="url(#cardGradient3)"/>
    <text x="232" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">RMSE</text>
    <text x="232" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Root Mean</text>
    <text x="232" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Squared Error</text>
    <text x="232" y="132" text-anchor="middle" class="formula" font-size="10" fill="#922b21">RMSE = √MSE</text>
    <text x="232" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">Same units as</text>
    <text x="232" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">target variable</text>
  </g>
  
  <!-- R-squared Card -->
  <g class="card card-4" data-narration="R-squared measures proportion of variance explained by the model. Values range from 0 to 1, higher is better." filter="url(#shadow)">
    <rect x="285" y="60" width="75" height="95" rx="8" fill="url(#cardGradient4)"/>
    <text x="322" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">R²</text>
    <text x="322" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Coefficient of</text>
    <text x="322" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Determination</text>
    <text x="322" y="132" text-anchor="middle" class="formula" font-size="10" fill="#6c3483">R² = 1 - SSres/SStot</text>
    <text x="322" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">0 to 1 scale</text>
    <text x="322" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">Higher is better</text>
  </g>
  
  <!-- MAPE Card -->
  <g class="card card-5" data-narration="Mean Absolute Percentage Error expresses error as percentage. Useful for understanding relative error magnitude." filter="url(#shadow)">
    <rect x="330" y="170" width="75" height="95" rx="8" fill="url(#cardGradient5)"/>
    <text x="367" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">MAPE</text>
    <text x="367" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Mean Absolute</text>
    <text x="367" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Percentage Error</text>
    <text x="367" y="242" text-anchor="middle" class="formula" font-size="10" fill="#935116">MAPE = (100/n)Σ|y-ŷ|/|y|</text>
    <text x="367" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">Error as % of</text>
    <text x="367" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">actual value</text>
  </g>
  
  <!-- Relationship Arrows -->
  <g class="connector" data-narration="Visualization shows how metrics relate: RMSE is derived from MSE by taking square root">
    <path d="M 232 155 L 232 175" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
  </g>
  
  <!-- Central Hub -->
  <g class="connector" data-narration="The central concept: all metrics measure the difference between actual and predicted values">
    <circle cx="210" cy="240" r="35" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Prediction</text>
    <text x="210" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Error</text>
    <text x="210" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">(y - ŷ)</text>
  </g>
  
  <!-- Connection Lines -->
  <g class="connector" data-narration="Each metric connects to the prediction error concept">
    <line x1="90" y1="155" x2="160" y2="210" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    <line x1="180" y1="155" x2="185" y2="210" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    <line x1="270" y1="155" x2="235" y2="210" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    <line x1="322" y1="155" x2="275" y2="195" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    <line x1="367" y1="265" x2="270" y2="255" stroke="#d35400" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
  </g>
  
  <!-- Bottom Labels -->
  <g class="connector" data-narration="Lower MSE/MAE/RMSE/MAPE values indicate better models. Higher R² indicates better fit.">
    <rect x="15" y="300" width="390" height="85" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
    <text x="210" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Key Insights</text>
    <text x="210" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• MSE, MAE, RMSE: Lower values = Better model</text>
    <text x="210" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• R²: Higher values = Better variance explanation (0 to 1)</text>
    <text x="210" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• MAPE: Lower % = Better (expressed as percentage)</text>
  </g>
  
  <!-- Legend dots -->
  <circle cx="30" y="240" r="4" fill="#3498db"/>
  <circle cx="30" y="255" r="4" fill="#27ae60"/>
  <circle cx="30" y="270" r="4" fill="#e74c3c"/>
  <circle cx="30" y="285" r="4" fill="#9b59b6"/>
  <circle cx="30" y="300" r="4" fill="#d35400"/>
  
  <text x="40" y="243" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Squared Error</text>
  <text x="40" y="258" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Absolute Error</text>
  <text x="40" y="273" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Root of MSE</text>
  <text x="40" y="288" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Variance Explained</text>
  <text x="40" y="303" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Percentage Error</text>
</svg>