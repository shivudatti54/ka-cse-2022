<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="regularization-lasso-ridge" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4eaf0"/>
    </linearGradient>
    <linearGradient id="lassoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="ridgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .section-title { font-family: Georgia, serif; font-size: 16px; fill: #34495e; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #555; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #777; }
    .formula { font-family: 'Courier New', monospace; font-size: 12px; fill: #2c3e50; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .animated-box { opacity: 0; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Regularization: Lasso vs Ridge</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Left Panel - Lasso -->
  <g class="slide-left delay-1" data-narration="Lasso uses L1 penalty (absolute value), creating a diamond-shaped constraint that tends to produce sparse solutions with some coefficients exactly zero.">
    <rect x="20" y="60" width="180" height="310" rx="10" fill="url(#lassoGradient)" filter="url(#shadow)"/>
    <text x="110" y="85" text-anchor="middle" class="section-title">Lasso (L1)</text>
    <text x="110" y="105" text-anchor="middle" class="detail">Least Absolute Shrinkage</text>
    
    <!-- Formula Box -->
    <rect x="35" y="120" width="150" height="50" rx="5" fill="white" stroke="#e91e63" stroke-width="1.5"/>
    <text x="110" y="145" text-anchor="middle" class="formula">Loss = (y-Xw)² + α|w|</text>
    <text x="110" y="162" text-anchor="middle" class="detail" fill="#e91e63">L1 Penalty</text>
    
    <!-- Diamond constraint visualization -->
    <polygon points="110,220 150,250 110,280 70,250" fill="none" stroke="#e91e63" stroke-width="2" stroke-dasharray="5,3" class="pulse"/>
    <text x="110" y="205" text-anchor="middle" class="label">Diamond Constraint</text>
    
    <!-- Coefficient arrows -->
    <line x1="90" y1="260" x2="70" y2="240" stroke="#e91e63" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="130" y1="260" x2="150" y2="240" stroke="#e91e63" stroke-width="2"/>
    <text x="110" y="300" text-anchor="middle" class="label">Coefficients → Zero</text>
    <text x="110" y="318" text-anchor="middle" class="detail">(Feature Selection)</text>
    
    <!-- Key property box -->
    <rect x="35" y="335" width="150" height="25" rx="4" fill="#fce4ec"/>
    <text x="110" y="352" text-anchor="middle" class="detail" fill="#c2185b">Sparse solution</text>
  </g>
  
  <!-- Right Panel - Ridge -->
  <g class="slide-right delay-2" data-narration="Ridge uses L2 penalty (squared value), creating a circular constraint that shrinks coefficients toward zero but rarely makes them exactly zero.">
    <rect x="220" y="60" width="180" height="310" rx="10" fill="url(#ridgeGradient)" filter="url(#shadow)"/>
    <text x="310" y="85" text-anchor="middle" class="section-title">Ridge (L2)</text>
    <text x="310" y="105" text-anchor="middle" class="detail">L2 Regularization</text>
    
    <!-- Formula Box -->
    <rect x="235" y="120" width="150" height="50" rx="5" fill="white" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="310" y="145" text-anchor="middle" class="formula">Loss = (y-Xw)² + αw²</text>
    <text x="310" y="162" text-anchor="middle" class="detail" fill="#9c27b0">L2 Penalty</text>
    
    <!-- Circle constraint visualization -->
    <ellipse cx="310" cy="250" rx="35" ry="35" fill="none" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5,3" class="pulse"/>
    <text x="310" y="205" text-anchor="middle" class="label">Circular Constraint</text>
    
    <!-- Coefficient arrows -->
    <line x1="290" y1="250" x2="275" y2="250" stroke="#9c27b0" stroke-width="2"/>
    <line x1="330" y1="250" x2="345" y2="250" stroke="#9c27b0" stroke-width="2"/>
    <text x="310" y="300" text-anchor="middle" class="label">Coefficients → Small</text>
    <text x="310" y="318" text-anchor="middle" class="detail">(Shrinkage only)</text>
    
    <!-- Key property box -->
    <rect x="235" y="335" width="150" height="25" rx="4" fill="#f3e5f5"/>
    <text x="310" y="352" text-anchor="middle" class="detail" fill="#7b1fa2">All features retained</text>
  </g>
  
  <!-- Center comparison arrows -->
  <g class="fade-in delay-3" data-narration="The key difference: Lasso performs feature selection by setting coefficients to zero, while Ridge keeps all features but shrinks their magnitudes.">
    <path d="M 205 180 Q 210 160 210 140 Q 210 120 230 110" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,2" class="slide-up"/>
    <path d="M 215 180 Q 210 160 210 140 Q 210 120 190 110" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,2" class="slide-up"/>
  </g>
  
  <!-- Bottom comparison bar -->
  <g class="slide-up delay-4" data-narration="Choose Lasso when you suspect many irrelevant features; use Ridge when all features may be relevant.">
    <rect x="30" y="365" width="360" height="25" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="110" y="381" text-anchor="middle" class="detail" fill="#e74c3c">Lasso: |w| penalty</text>
    <text x="310" y="381" text-anchor="middle" class="detail" fill="#9c27b0">Ridge: w² penalty</text>
  </g>
  
  <!-- Visual coefficient comparison -->
  <g class="fade-in delay-5" data-narration="Visual representation: Lasso coefficients (top) can become exactly zero (diamond touches axis), while Ridge coefficients (bottom) approach but rarely reach zero (circle).">
    <!-- Lasso coefficient bars -->
    <text x="210" y="190" text-anchor="middle" class="label" font-size="10">Coefficient Comparison</text>
    <rect x="175" y="195" width="30" height="6" fill="#e91e63" rx="2"/>
    <rect x="210" y="195" width="30" height="6" fill="#e91e63" rx="2" opacity="0.3"/>
    <rect x="245" y="195" width="30" height="6" fill="#e91e63" rx="2"/>
    <text x="210" y="210" text-anchor="middle" class="detail" font-size="9">Lasso: Some = 0</text>
    
    <!-- Ridge coefficient bars -->
    <rect x="175" y="225" width="30" height="6" fill="#9c27b0" rx="2" opacity="0.7"/>
    <rect x="210" y="225" width="30" height="6" fill="#9c27b0" rx="2" opacity="0.6"/>
    <rect x="245" y="225" width="30" height="6" fill="#9c27b0" rx="2" opacity="0.8"/>
    <text x="210" y="240" text-anchor="middle" class="detail" font-size="9">Ridge: All shrunk</text>
  </g>
</svg>