<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="multiple-linear-regression">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="predictorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ec8e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outcomeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa71;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coeffGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c1e1c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#98d4a5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .predictor-box { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .outcome-box { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .coeff-box { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .equation-box { animation: fadeIn 0.8s ease-out 0.8s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; }
    .sublabel { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .equation-text { font-family: Arial, sans-serif; font-size: 16px; fill: #34495e; }
    .var-label { font-family: Arial, sans-serif; font-size: 13px; fill: #fff; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text title">Multiple Linear Regression</text>
  
  <!-- Predictor Variables Box -->
  <g class="predictor-box" filter="url(#shadow)">
    <rect x="20" y="60" width="120" height="130" rx="8" fill="url(#predictorGradient)" stroke="#5dade2" stroke-width="2" />
    <text x="80" y="85" text-anchor="middle" class="var-label">Predictor Variables</text>
    <rect x="30" y="100" width="100" height="30" rx="5" fill="#fff" stroke="#5dade2" />
    <text x="80" y="120" text-anchor="middle" class="label">X₁</text>
    <rect x="30" y="135" width="100" height="30" rx="5" fill="#fff" stroke="#5dade2" />
    <text x="80" y="155" text-anchor="middle" class="label">X₂</text>
    <rect x="30" y="170" width="100" height="15" rx="3" fill="#fff" stroke="#5dade2" />
    <text x="80" y="181" text-anchor="middle" class="sublabel">...</text>
  </g>
  
  <!-- Coefficients Box -->
  <g class="coeff-box" filter="url(#shadow)" data-narration="Coefficients (β) represent the change in Y for a one-unit change in each predictor, holding others constant.">
    <rect x="145" y="60" width="130" height="80" rx="8" fill="url(#coeffGradient)" stroke="#7dcea0" stroke-width="2" />
    <text x="210" y="85" text-anchor="middle" class="var-label">Coefficients</text>
    <text x="160" y="110" class="label">β₁ = effect of X₁</text>
    <text x="160" y="128" class="label">β₂ = effect of X₂</text>
  </g>
  
  <!-- Intercept Box -->
  <g class="coeff-box" filter="url(#shadow)" data-narration="Intercept (α or β₀) is the value of Y when all predictors are zero.">
    <rect x="145" y="145" width="130" height="45" rx="8" fill="#f9e79f" stroke="#f4d03f" stroke-width="2" />
    <text x="210" y="168" text-anchor="middle" class="label">Intercept: β₀</text>
    <text x="210" y="182" text-anchor="middle" class="sublabel">(α when X=0)</text>
  </g>
  
  <!-- Outcome Variable Box -->
  <g class="outcome-box" filter="url(#shadow)" data-narration="Outcome variable (Y) is the dependent variable we want to predict.">
    <rect x="290" y="100" width="110" height="90" rx="8" fill="url(#outcomeGradient)" stroke="#e59866" stroke-width="2" />
    <text x="345" y="130" text-anchor="middle" class="var-label">Outcome (Y)</text>
    <text x="345" y="160" text-anchor="middle" class="label">Dependent</text>
    <text x="345" y="178" text-anchor="middle" class="sublabel">Variable</text>
  </g>
  
  <!-- Arrows connecting predictors to outcome -->
  <g class="arrow">
    <path d="M 140 115 Q 215 115 290 130" fill="none" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)" />
    <path d="M 140 145 Q 215 160 290 155" fill="none" stroke="#3498db" stroke-width="2" />
  </g>
  
  <!-- Equation Box -->
  <g class="equation-box" filter="url(#shadow)" data-narration="The MLR equation: Y = β₀ + β₁X₁ + β₂X₂ + β₃X₃ + ... + ε">
    <rect x="30" y="210" width="360" height="60" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" />
    <text x="210" y="235" text-anchor="middle" class="equation-text" font-style="italic">Y = β₀ + β₁X₁ + β₂X₂ + β₃X₃ + ε</text>
    <text x="210" y="258" text-anchor="middle" class="sublabel">Ordinary Least Squares (OLS) Estimation</text>
  </g>
  
  <!-- Assumptions Section -->
  <g class="equation-box" data-narration="MLR Assumptions: Linearity, Independence, Homoscedasticity, Normality, No Multicollinearity">
    <rect x="30" y="280" width="360" height="105" rx="8" fill="#fdebd0" stroke="#edbb99" stroke-width="2" />
    <text x="210" y="305" text-anchor="middle" class="label" font-weight="bold">MLR Assumptions</text>
    <text x="50" y="330" class="sublabel">1. Linearity</text>
    <text x="150" y="330" class="sublabel">2. Independence</text>
    <text x="250" y="330" class="sublabel">3. Homoscedasticity</text>
    <text x="50" y="355" class="sublabel">4. Normality</text>
    <text x="150" y="355" class="sublabel">5. No Multicollinearity</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db" />
    </marker>
  </defs>
  
  <!-- Interactive highlight on outcome -->
  <g class="pulse-element">
    <circle cx="345" cy="145" r="25" fill="none" stroke="#e59866" stroke-width="2" opacity="0.5" />
  </g>
</svg>