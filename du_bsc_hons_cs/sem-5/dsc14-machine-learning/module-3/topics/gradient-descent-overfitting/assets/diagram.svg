<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="gradient-descent-overfitting">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="lossGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="goodGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#45b7aa"/>
    </linearGradient>
    <linearGradient id="overfitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffa502"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .bounce { animation: bounce 1.5s ease-in-out infinite; }
    .draw { 
      stroke-dasharray: 200; 
      stroke-dashoffset: 200; 
      animation: drawLine 1.5s ease-out forwards;
    }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in">
    <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50">
      Gradient Descent &amp; Overfitting
    </text>
    <line x1="100" y1="38" x2="320" y2="38" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Left Panel: Gradient Descent -->
  <g class="slide-left delay-1" data-narration="The loss curve shows how gradient descent minimizes the error. The optimal path (green) converges to the minimum, while overshooting (red) diverges due to high learning rate.">
    <rect x="15" y="55" width="185" height="150" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="107" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Gradient Descent</text>
    
    <!-- Loss Curve -->
    <path d="M 30 180 Q 60 50, 107 100 Q 140 140, 180 170" fill="none" stroke="#ddd" stroke-width="2"/>
    <path d="M 30 180 Q 60 50, 107 100 Q 140 140, 180 170" fill="none" stroke="#3498db" stroke-width="3" class="draw"/>
    
    <!-- Optimal Path -->
    <circle cx="107" cy="100" r="5" fill="#27ae60" class="pulse"/>
    <path d="M 80 60 Q 95 80, 107 100" fill="none" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="4,2"/>
    <text x="115" y="95" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">Optimal</text>
    
    <!-- Overshooting Path -->
    <path d="M 60 50 Q 80 120, 50 140 Q 30 160, 60 180" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="35" y="145" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">Overshoot</text>
    
    <!-- Slow Convergence -->
    <path d="M 45 160 Q 70 150, 90 130 Q 100 115, 107 100" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="40" y="165" font-family="Arial, sans-serif" font-size="9" fill="#9b59b6">Slow</text>
    
    <!-- Minimum marker -->
    <line x1="100" y1="180" x2="114" y2="180" stroke="#2c3e50" stroke-width="1"/>
    <text x="107" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">min</text>
  </g>
  
  <!-- Right Panel: Overfitting -->
  <g class="slide-right delay-2" data-narration="Overfitting occurs when a model fits training data too closely but fails on new data. The green curve shows good generalization while orange overfits to noise.">
    <rect x="220" y="55" width="185" height="150" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="312" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Overfitting</text>
    
    <!-- Data points -->
    <circle cx="245" cy="140" r="4" fill="#3498db"/>
    <circle cx="270" cy="120" r="4" fill="#3498db"/>
    <circle cx="295" cy="145" r="4" fill="#3498db"/>
    <circle cx="320" cy="110" r="4" fill="#3498db"/>
    <circle cx="345" cy="135" r="4" fill="#3498db"/>
    <circle cx="370" cy="125" r="4" fill="#3498db"/>
    <circle cx="385" cy="150" r="4" fill="#3498db"/>
    
    <!-- Underfit -->
    <path d="M 240 150 L 390 130" fill="none" stroke="#95a5a6" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="395" y="132" font-family="Arial, sans-serif" font-size="8" fill="#95a5a6">Under</text>
    
    <!-- Good fit -->
    <path d="M 240 145 Q 280 100, 320 115 Q 360 130, 390 140" fill="none" stroke="#27ae60" stroke-width="2.5"/>
    <text x="395" y="145" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">Good</text>
    
    <!-- Overfit -->
    <path d="M 240 145 Q 255 80, 270 120 Q 285 60, 295 145 Q 305 70, 320 110 Q 335 50, 345 135 Q 355 80, 370 125 Q 380 90, 390 140" fill="none" stroke="#e67e22" stroke-width="2.5"/>
    <text x="395" y="158" font-family="Arial, sans-serif" font-size="8" fill="#e67e22">Overfit</text>
  </g>
  
  <!-- Learning Rate Comparison -->
  <g class="fade-in delay-3" data-narration="Learning rate controls step size. Too small (0.001) converges slowly, optimal (0.1) reaches minimum quickly, too large (1.0) oscillates or diverges.">
    <rect x="15" y="220" width="185" height="75" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="107" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Learning Rate (α)</text>
    
    <!-- Small -->
    <rect x="30" y="250" width="45" height="30" rx="4" fill="#ecf0f1" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="52" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b59b6">Small</text>
    <text x="52" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">α=0.001</text>
    
    <!-- Optimal -->
    <rect x="85" y="250" width="45" height="30" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
    <text x="107" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">Optimal</text>
    <text x="107" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">α=0.1</text>
    <text x="107" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#27ae60" class="bounce">✓</text>
    
    <!-- Large -->
    <rect x="140" y="250" width="45" height="30" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="162" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">Large</text>
    <text x="162" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">α=1.0</text>
  </g>
  
  <!-- Training vs Validation Loss -->
  <g class="fade-in delay-4" data-narration="Training loss decreases steadily while validation loss may increase, indicating overfitting. The gap between them shows generalization error.">
    <rect x="220" y="220" width="185" height="75" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="312" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Train vs Validation</text>
    
    <!-- Axes -->
    <line x1="235" y1="280" x2="235" y2="255" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="235" y1="280" x2="395" y2="280" stroke="#bdc3c7" stroke-width="1"/>
    
    <!-- Training Loss -->
    <path d="M 240 265 Q 280 260, 320 255 Q 360 252, 390 250" fill="none" stroke="#3498db" stroke-width="2.5"/>
    <circle cx="390" cy="250" r="3" fill="#3498db"/>
    <text x="395" y="253" font-family="Arial, sans-serif" font-size="8" fill="#3498db">Train</text>
    
    <!-- Validation Loss -->
    <path d="M 240 265 Q 280 268, 320 275 Q 350 285, 390 290" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
    <circle cx="390" cy="290" r="3" fill="#e74c3c"/>
    <text x="395" y="293" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c">Valid</text>
    
    <!-- Gap indicator -->
    <line x1="380" y1="252" x2="380" y2="288" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="355" y="273" font-family="Arial, sans-serif" font-size="8" fill="#e67e22">Gap</text>
  </g>
  
  <!-- Formula Box -->
  <g class="slide-up delay-3" data-narration="The gradient descent update rule: parameters are adjusted by the learning rate multiplied by the gradient of the loss function.">
    <rect x="100" y="310" width="220" height="40" rx="6" fill="white" filter="url(#shadow)"/>
    <text x="210" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2c3e50">
      θ := θ - α × ∂J(θ)/∂θ
    </text>
    <text x="210" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Parameter Update Rule</text>
  </g>
  
  <!-- Key Points -->
  <g class="slide-up delay-4" data-narration="Key takeaways: Use appropriate learning rates, monitor validation loss, and apply regularization to prevent overfitting.">
    <rect x="15" y="360" width="390" height="32" rx="5" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
    <circle cx="35" cy="376" r="4" fill="#3498db"/>
    <text x="48" y="379" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">GD: Find minimum of loss function</text>
    <circle cx="210" cy="376" r="4" fill="#e67e22"/>
    <text x="223" y="379" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Overfitting: Model memorizes training data</text>
    <circle cx="385" cy="376" r="4" fill="#27ae60"/>
    <text x="275" y="379" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Regularize to generalize</text>
  </g>
  
  <!-- Decorative elements -->
  <g class="fade-in" opacity="0.6">
    <circle cx="395" cy="15" r="8" fill="#e8f4f8" stroke="#3498db" stroke-width="1"/>
    <text x="395" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">ML</text>
  </g>
</svg>