<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="linear-regression-one-variable" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4ecf7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d3748; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .formula { font-family: 'Courier New', monospace; font-size: 14px; fill: #2d3748; font-weight: bold; }
    .point { animation: pulse 2s infinite; transform-origin: center; transform-box: fill-box; }
    .fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .residual-line { stroke: #e53e3e; stroke-width: 1; stroke-dasharray: 4,2; }
    .regression-line { stroke: url(#lineGradient); stroke-width: 3; stroke-dasharray: 300; animation: drawLine 2s ease-out forwards; }
    .axis { stroke: #a0aec0; stroke-width: 1; }
    .grid { stroke: #e2e8f0; stroke-width: 0.5; }
    .concept-box { fill: #fff; stroke: #cbd5e0; stroke-width: 1; rx: 6; }
    .highlight { fill: #667eea; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Linear Regression: One Variable</text>

  <!-- Scatter Plot Area -->
  <g transform="translate(40, 70)">
    <!-- Grid lines -->
    <line x1="0" y1="200" x2="200" y2="200" class="grid"/>
    <line x1="0" y1="150" x2="200" y2="150" class="grid"/>
    <line x1="0" y1="100" x2="200" y2="100" class="grid"/>
    <line x1="0" y1="50" x2="200" y2="50" class="grid"/>
    <line x1="50" y1="0" x2="50" y2="200" class="grid"/>
    <line x1="100" y1="0" x2="100" y2="200" class="grid"/>
    <line x1="150" y1="0" x2="150" y2="200" class="grid"/>

    <!-- Axes -->
    <line x1="0" y1="200" x2="200" y2="200" class="axis"/>
    <line x1="0" y1="0" x2="0" y2="200" class="axis"/>

    <!-- Axis Labels -->
    <text x="100" y="220" text-anchor="middle" class="label">Feature (x)</text>
    <text x="-15" y="100" text-anchor="middle" class="label" transform="rotate(-90, -15, 100)">Target (y)</text>

    <!-- Data Points with Residuals -->
    <g data-narration="Data points representing training examples with x (input) and y (target) values">
      <!-- Residual lines and points -->
      <line x1="30" y1="185" x2="30" y2="140" class="residual-line slide-in" style="animation-delay: 0.5s"/>
      <circle cx="30" cy="185" r="5" fill="#4299e1" class="point" style="animation-delay: 0.1s"/>

      <line x1="60" y1="165" x2="60" y2="120" class="residual-line slide-in" style="animation-delay: 0.7s"/>
      <circle cx="60" cy="165" r="5" fill="#4299e1" class="point" style="animation-delay: 0.2s"/>

      <line x1="90" y1="140" x2="90" y2="95" class="residual-line slide-in" style="animation-delay: 0.9s"/>
      <circle cx="90" cy="140" r="5" fill="#4299e1" class="point" style="animation-delay: 0.3s"/>

      <line x1="120" y1="110" x2="120" y2="75" class="residual-line slide-in" style="animation-delay: 1.1s"/>
      <circle cx="120" cy="110" r="5" fill="#4299e1" class="point" style="animation-delay: 0.4s"/>

      <line x1="150" y1="85" x2="150" y2="55" class="residual-line slide-in" style="animation-delay: 1.3s"/>
      <circle cx="150" cy="85" r="5" fill="#4299e1" class="point" style="animation-delay: 0.5s"/>

      <line x1="180" y1="55" x2="180" y2="40" class="residual-line slide-in" style="animation-delay: 1.5s"/>
      <circle cx="180" cy="55" r="5" fill="#4299e1" class="point" style="animation-delay: 0.6s"/>
    </g>

    <!-- Regression Line -->
    <line x1="20" y1="175" x2="190" y2="30" class="regression-line" data-narration="Best fit line that minimizes the sum of squared residuals"/>
  </g>

  <!-- Right side - Key Concepts -->
  <g transform="translate(260, 70)">
    <!-- Hypothesis Function Box -->
    <g class="slide-in" style="animation-delay: 0.3s" data-narration="Hypothesis function: predicted y value based on x input">
      <rect x="0" y="0" width="140" height="55" class="concept-box"/>
      <text x="10" y="18" class="label" font-weight="bold">Hypothesis</text>
      <text x="10" y="40" class="formula">hθ(x) = θ₀ + θ₁x</text>
    </g>

    <!-- Parameters Box -->
    <g class="slide-in" style="animation-delay: 0.5s" data-narration="Model parameters: θ₀ is the y-intercept (bias), θ₁ is the slope coefficient">
      <rect x="0" y="65" width="140" height="55" class="concept-box"/>
      <text x="10" y="83" class="label" font-weight="bold">Parameters</text>
      <text x="10" y="105" class="label">θ₀ = intercept</text>
      <text x="80" y="105" class="label">θ₁ = slope</text>
    </g>

    <!-- Cost Function Box -->
    <g class="slide-in" style="animation-delay: 0.7s" data-narration="Cost function measures how well the line fits the data - we minimize the Mean Squared Error">
      <rect x="0" y="130" width="140" height="55" class="concept-box"/>
      <text x="10" y="148" class="label" font-weight="bold">Cost Function</text>
      <text x="10" y="170" class="label">Minimize: MSE</text>
      <text x="80" y="170" class="label">(Mean Sq Error)</text>
    </g>

    <!-- Goal Box -->
    <g class="slide-in" style="animation-delay: 0.9s" data-narration="Goal: Find the line that best represents the relationship between x and y">
      <rect x="0" y="195" width="140" height="50" class="concept-box" style="stroke: #667eea"/>
      <text x="10" y="215" class="label" font-weight="bold">Goal</text>
      <text x="10" y="235" class="label">Find best θ₀, θ₁</text>
    </g>
  </g>

  <!-- Residual Explanation at bottom -->
  <g transform="translate(40, 290)" data-narration="Residuals (red dashed lines) represent prediction errors - the vertical distance between actual y and predicted y on the regression line">
    <text x="0" y="0" class="label" font-weight="bold" fill="#e53e3e">Residuals:</text>
    <text x="70" y="0" class="label">Difference between actual and predicted y</text>
    <line x1="0" y1="10" x2="30" y2="10" class="residual-line"/>
    <circle cx="5" cy="10" r="3" fill="#e53e3e"/>
  </g>

  <!-- Arrow showing θ₀ (intercept) -->
  <g transform="translate(45, 230)" class="fade-in" style="animation-delay: 1.8s">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#764ba2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="20" y="-5" class="label" fill="#764ba2">θ₀</text>
  </g>

  <!-- Arrow showing slope θ₁ -->
  <g transform="translate(140, 180)" class="fade-in" style="animation-delay: 2s">
    <line x1="0" y1="0" x2="30" y2="-30" stroke="#764ba2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="20" y="-20" class="label" fill="#764ba2">θ₁</text>
  </g>

  <!-- Gradient Descent hint -->
  <g transform="translate(260, 295)" class="fade-in" style="animation-delay: 2.2s" data-narration="Gradient descent is the optimization algorithm used to find optimal θ values">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="url(#lineGradient)" opacity="0.9"/>
    <text x="70" y="25" text-anchor="middle" fill="white" font-family="Segoe UI, Arial" font-size="12" font-weight="bold">Gradient Descent ↓</text>
  </g>
</svg>