<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="function-point-metrics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ufpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c8b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c08585;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5c4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#85a8ba;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .ufp-box { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .vaf-box { animation: slideInRight 0.6s ease-out 0.4s both; }
    .fp-box { animation: slideInUp 0.6s ease-out 0.6s both; }
    .formula { animation: fadeIn 0.8s ease-out 0.3s both; }
    .concept-box { animation: fadeIn 0.6s ease-out both; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .label { animation: fadeIn 0.5s ease-out; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c5282" class="title">Function Point Metrics</text>
  
  <!-- UFP Box -->
  <g class="ufp-box" data-narration="Unadjusted Function Points (UFP) - The base count of functional requirements before adjustment">
    <rect x="30" y="80" width="100" height="70" rx="8" fill="url(#ufpGradient)" filter="url(#shadow)" />
    <text x="80" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#276749">UFP</text>
    <text x="80" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#276749">Unadjusted</text>
    <text x="80" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#276749">Function Points</text>
  </g>
  
  <!-- VAF Box -->
  <g class="vaf-box" data-narration="Value Adjustment Factor (VAF) - Derived from 14 General System Characteristics (GSCs)">
    <rect x="290" y="80" width="100" height="70" rx="8" fill="url(#vafGradient)" filter="url(#shadow)" />
    <text x="340" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9b2c2c">VAF</text>
    <text x="340" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9b2c2c">Value Adjustment</text>
    <text x="340" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9b2c2c">Factor (0.65-1.35)</text>
  </g>
  
  <!-- Multiplication Symbol -->
  <text x="210" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#4a5568" class="formula">×</text>
  
  <!-- Equals Symbol -->
  <text x="210" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#4a5568" class="formula">=</text>
  
  <!-- FP Result Box -->
  <g class="fp-box" data-narration="Function Points (FP) - Final adjusted count representing software size and complexity">
    <rect x="155" y="200" width="110" height="75" rx="8" fill="url(#fpGradient)" filter="url(#shadow)" />
    <text x="210" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c5282">FP</text>
    <text x="210" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c5282">Function Points</text>
    <text x="210" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c5282">FP = UFP × VAF</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow">
    <path d="M 130 115 L 185 115" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 235 115 L 160 115" stroke="#4a5568" stroke-width="2" fill="none" />
    <path d="M 210 275 L 210 295 L 170 320" stroke="#4a5568" stroke-width="2" fill="none" />
    <path d="M 210 275 L 210 295 L 250 320" stroke="#4a5568" stroke-width="2" fill="none" />
  </g>
  
  <!-- GSC Box -->
  <g class="concept-box" data-narration="14 General System Characteristics (GSCs) used to calculate VAF" style="animation-delay: 0.8s">
    <rect x="20" y="310" width="130" height="80" rx="6" fill="#fff5f5" stroke="#fc8181" stroke-width="1.5" />
    <text x="85" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c53030">GSCs (14 items)</text>
    <text x="85" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#742a2a">Data communications,</text>
    <text x="85" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#742a2a">Distributed processing,</text>
    <text x="85" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#742a2a">Performance, etc.</text>
    <text x="85" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b2c2c">VAF = (ΣGSC × 0.01) + 0.65</text>
  </g>
  
  <!-- FPA Box -->
  <g class="concept-box" data-narration="Function Point Analysis (FPA) - The process of counting function points" style="animation-delay: 1s">
    <rect x="270" y="310" width="130" height="80" rx="6" fill="#f0fff4" stroke="#68d391" stroke-width="1.5" />
    <text x="335" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#276749">Function Point</text>
    <text x="335" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#276749">Analysis (FPA)</text>
    <text x="335" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22543d">Counting rules</text>
    <text x="335" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22543d">for ILF, EIF, EI,</text>
    <text x="335" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22543d">EO, EQ</text>
  </g>
  
  <!-- Arrow from UFP to formula -->
  <path d="M 80 150 L 80 170 L 190 175" stroke="#276749" stroke-width="1.5" fill="none" stroke-dasharray="4,2" />
  
  <!-- Arrow from VAF to formula -->
  <path d="M 340 150 L 340 170 L 230 175" stroke="#9b2c2c" stroke-width="1.5" fill="none" stroke-dasharray="4,2" />
  
  <!-- Bottom label -->
  <text x="210" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">Introduced by Allan Albrecht (1979)</text>
</svg>