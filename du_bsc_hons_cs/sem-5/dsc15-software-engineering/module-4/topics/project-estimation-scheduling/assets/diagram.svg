<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="project-estimation-scheduling">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95d5b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b4b4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5c4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fb8cf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b5a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a690;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .box-1 { animation-delay: 0.2s; }
    .box-2 { animation-delay: 0.4s; }
    .box-3 { animation-delay: 0.6s; }
    .box-4 { animation-delay: 0.8s; }
    .box-5 { animation-delay: 1.0s; }
    .box-6 { animation-delay: 1.2s; }
    .connector { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; animation-delay: 1.5s; opacity: 0; }
    .pulse-item { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .pulse-item:hover { cursor: pointer; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Project Estimation &amp; Scheduling</text>
  <line x1="100" y1="45" x2="320" y2="45" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Estimation Methods Section -->
  <text x="30" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" data-narration="Main category: Project Estimation Methods">Estimation Methods</text>
  
  <!-- Expert Judgment Box -->
  <g class="section-box box-1 pulse-item" data-narration="Expert Judgment: Uses experience and expertise of team members">
    <rect x="20" y="85" width="85" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="62" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a4a3a">Expert</text>
    <text x="62" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a4a3a">Judgment</text>
    <text x="62" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a4a3a">Experience-based</text>
  </g>
  
  <!-- Three-Point Estimation Box -->
  <g class="section-box box-2 pulse-item" data-narration="Three-Point Estimation: Uses optimistic, pessimistic, and most likely estimates">
    <rect x="115" y="85" width="90" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="160" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a1a1a">Three-Point</text>
    <text x="160" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a1a1a">Estimation</text>
    <text x="160" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a1a1a">Min/Max/Avg</text>
  </g>
  
  <!-- Parametric Estimation Box -->
  <g class="section-box box-3 pulse-item" data-narration="Parametric Estimation: Uses historical data and mathematical formulas">
    <rect x="215" y="85" width="90" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="260" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a3a4a">Parametric</text>
    <text x="260" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a3a4a">Estimation</text>
    <text x="260" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a3a4a">Formula-based</text>
  </g>
  
  <!-- Bottom-Up Estimation Box -->
  <g class="section-box box-4 pulse-item" data-narration="Bottom-Up Estimation: Breaks project into smaller tasks">
    <rect x="315" y="85" width="85" height="55" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="357" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3a2a1a">Bottom-Up</text>
    <text x="357" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3a2a1a">Estimation</text>
    <text x="357" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3a2a1a">Task-based</text>
  </g>
  
  <!-- Scheduling Algorithms Section -->
  <text x="30" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" data-narration="Main category: Scheduling Algorithms">Scheduling Algorithms</text>
  
  <!-- CPM Box -->
  <g class="section-box box-5 pulse-item" data-narration="CPM: Critical Path Method identifies critical tasks">
    <rect x="50" y="190" width="130" height="50" rx="8" fill="#c9e4ca" filter="url(#shadow)"/>
    <text x="115" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e5631">CPM</text>
    <text x="115" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e5631">Critical Path Method</text>
  </g>
  
  <!-- PERT Box -->
  <g class="section-box box-6 pulse-item" data-narration="PERT: Program Evaluation and Review Technique uses probabilistic approach">
    <rect x="210" y="190" width="130" height="50" rx="8" fill="#fadbd8" filter="url(#shadow)"/>
    <text x="275" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7b241c">PERT</text>
    <text x="275" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7b241c">Probabilistic Estimation</text>
  </g>
  
  <!-- Relationship Arrows -->
  <path d="M 115 140 L 115 160 L 275 160 L 275 190" fill="none" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5,3" class="connector" data-narration="Shows how estimation feeds into scheduling"/>
  <path d="M 62 140 L 62 155 L 275 155 L 275 190" fill="none" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5,3" class="connector" data-narration="All estimation methods contribute to project scheduling"/>
  
  <!-- Key Concept Box -->
  <g class="section-box box-6" data-narration="Key takeaway: Accurate estimation enables effective scheduling">
    <rect x="20" y="265" width="380" height="55" rx="8" fill="#fff9e6" stroke="#f39c12" stroke-width="2"/>
    <text x="210" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d35400">Key Insight</text>
    <text x="210" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d4e37">Accurate estimation + effective scheduling =</text>
    <text x="210" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">On-time, within-budget project delivery</text>
  </g>
  
  <!-- Legend/Key -->
  <g class="section-box box-6">
    <rect x="20" y="335" width="180" height="50" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <circle cx="35" cy="350" r="5" fill="#95d5b2"/>
    <text x="48" y="354" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Estimation Methods</text>
    <circle cx="35" cy="368" r="5" fill="#c9e4ca"/>
    <text x="48" y="372" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Scheduling Algorithms</text>
  </g>
  
  <!-- Process Flow Arrow -->
  <g class="connector" data-narration="The estimation-to-scheduling workflow">
    <path d="M 250 355 L 270 355 L 265 350 M 270 355 L 265 360" stroke="#3498db" stroke-width="2" fill="none"/>
    <text x="250" y="345" font-family="Arial, sans-serif" font-size="10" fill="#3498db">Estimation → Scheduling</text>
  </g>
  
  <!-- Bottom Footer -->
  <text x="210" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Figure: Project Estimation and Scheduling Overview</text>
</svg>