<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="software-quality-metrics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="productGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95d5b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e4f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8c5e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="projectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8b897;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a8db;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3748; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #2d3748; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .box-group { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .box-group:nth-child(1) { animation-delay: 0.3s; }
    .box-group:nth-child(2) { animation-delay: 0.5s; }
    .box-group:nth-child(3) { animation-delay: 0.7s; }
    .box-group:nth-child(4) { animation-delay: 0.9s; }
    .title-anim { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .center-icon { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .connector { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; animation-delay: 1s; opacity: 0; }
    .sub-item { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    .sub-item-right { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title-text title-anim">Software Quality Metrics</text>
  <line x1="100" y1="48" x2="320" y2="48" stroke="#c9a8db" stroke-width="2" class="title-anim" style="animation-delay: 0.2s"/>
  
  <!-- Central Hub -->
  <g class="box-group" data-narration="Central hub showing the three main categories of software quality metrics">
    <circle cx="210" cy="95" r="22" fill="url(#centerGrad)" filter="url(#shadow)"/>
    <text x="210" y="90" text-anchor="middle" class="label-text" font-size="10">Quality</text>
    <text x="210" y="102" text-anchor="middle" class="label-text" font-size="10">Metrics</text>
  </g>
  
  <!-- Product Metrics Box -->
  <g class="box-group" filter="url(#shadow)" data-narration="Product Metrics measure the software product itself - lines of code, complexity, defect density">
    <rect x="20" y="135" width="115" height="100" rx="8" fill="url(#productGrad)"/>
    <rect x="20" y="135" width="115" height="22" rx="8" fill="#7fcd91" opacity="0.5"/>
    <text x="77" y="150" text-anchor="middle" class="label-text" font-size="13">Product</text>
    <g class="sub-item" style="animation-delay: 0.6s">
      <circle cx="35" cy="170" r="3" fill="#2d3748"/>
      <text x="42" y="173" class="detail-text">Lines of Code</text>
    </g>
    <g class="sub-item" style="animation-delay: 0.7s">
      <circle cx="35" cy="185" r="3" fill="#2d3748"/>
      <text x="42" y="188" class="detail-text">Cyclomatic</text>
    </g>
    <g class="sub-item" style="animation-delay: 0.8s">
      <circle cx="35" cy="200" r="3" fill="#2d3748"/>
      <text x="42" y="203" class="detail-text">Defect Density</text>
    </g>
    <g class="sub-item" style="animation-delay: 0.9s">
      <circle cx="35" cy="215" r="3" fill="#2d3748"/>
      <text x="42" y="218" class="detail-text">Code Coverage</text>
    </g>
  </g>
  
  <!-- Process Metrics Box -->
  <g class="box-group" filter="url(#shadow)" data-narration="Process Metrics measure the development process - defect removal, testing efficiency, cycle time">
    <rect x="152" y="135" width="115" height="100" rx="8" fill="url(#processGrad)"/>
    <rect x="152" y="135" width="115" height="22" rx="8" fill="#8fb4e8" opacity="0.5"/>
    <text x="209" y="150" text-anchor="middle" class="label-text" font-size="13">Process</text>
    <g class="sub-item" style="animation-delay: 0.6s">
      <circle cx="167" cy="170" r="3" fill="#2d3748"/>
      <text x="174" y="173" class="detail-text">Defects Found</text>
    </g>
    <g class="sub-item" style="animation-delay: 0.7s">
      <circle cx="167" cy="185" r="3" fill="#2d3748"/>
      <text x="174" y="188" class="detail-text">Fix Time</text>
    </g>
    <g class="sub-item" style="animation-delay: 0.8s">
      <circle cx="167" cy="200" r="3" fill="#2d3748"/>
      <text x="174" y="203" class="detail-text">Test Coverage</text>
    </g>
    <g class="sub-item" style="animation-delay: 0.9s">
      <circle cx="167" cy="215" r="3" fill="#2d3748"/>
      <text x="174" y="218" class="detail-text">Cycle Time</text>
    </g>
  </g>
  
  <!-- Project Metrics Box -->
  <g class="box-group" filter="url(#shadow)" data-narration="Project Metrics measure project aspects - schedule variance, budget variance, resource utilization">
    <rect x="285" y="135" width="115" height="100" rx="8" fill="url(#projectGrad)"/>
    <rect x="285" y="135" width="115" height="22" rx="8" fill="#f5a86f" opacity="0.5"/>
    <text x="342" y="150" text-anchor="middle" class="label-text" font-size="13">Project</text>
    <g class="sub-item-right" style="animation-delay: 0.6s">
      <circle cx="300" cy="170" r="3" fill="#2d3748"/>
      <text x="307" y="173" class="detail-text">Schedule Var.</text>
    </g>
    <g class="sub-item-right" style="animation-delay: 0.7s">
      <circle cx="300" cy="185" r="3" fill="#2d3748"/>
      <text x="307" y="188" class="detail-text">Budget Var.</text>
    </g>
    <g class="sub-item-right" style="animation-delay: 0.8s">
      <circle cx="300" cy="200" r="3" fill="#2d3748"/>
      <text x="307" y="203" class="detail-text">Resources</text>
    </g>
    <g class="sub-item-right" style="animation-delay: 0.9s">
      <circle cx="300" cy="215" r="3" fill="#2d3748"/>
      <text x="307" y="218" class="detail-text">Team Size</text>
    </g>
  </g>
  
  <!-- Connecting Lines -->
  <g class="connector" data-narration="Arrows showing how all three metric types connect to quality assessment">
    <path d="M195 95 L135 140" stroke="#7fcd91" stroke-width="2" fill="none"/>
    <path d="M225 95 L285 140" stroke="#f5a86f" stroke-width="2" fill="none"/>
    <path d="M210 117 L210 135" stroke="#8fb4e8" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Reliability Metrics Section -->
  <g class="box-group" data-narration="Reliability Metrics measure software reliability - Mean Time to Failure and Mean Time to Repair">
    <rect x="20" y="255" width="180" height="75" rx="8" fill="#fff" stroke="#c9a8db" stroke-width="2"/>
    <text x="110" y="272" text-anchor="middle" class="label-text" font-size="13" fill="#7c3aed">Reliability Metrics</text>
    <g class="sub-item" style="animation-delay: 1.1s">
      <rect x="30" y="280" width="75" height="40" rx="5" fill="#e8d5f2"/>
      <text x="67" y="295" text-anchor="middle" class="detail-text" font-weight="600">MTTF</text>
      <text x="67" y="308" text-anchor="middle" class="detail-text" font-size="9">Mean Time to</text>
      <text x="67" y="318" text-anchor="middle" class="detail-text" font-size="9">Failure</text>
    </g>
    <g class="sub-item-right" style="animation-delay: 1.2s">
      <rect x="115" y="280" width="75" height="40" rx="5" fill="#e8d5f2"/>
      <text x="152" y="295" text-anchor="middle" class="detail-text" font-weight="600">MTTR</text>
      <text x="152" y="308" text-anchor="middle" class="detail-text" font-size="9">Mean Time to</text>
      <text x="152" y="318" text-anchor="middle" class="detail-text" font-size="9">Repair</text>
    </g>
  </g>
  
  <!-- Benefits Section -->
  <g class="box-group" data-narration="Key benefits of using software quality metrics in development">
    <rect x="215" y="255" width="185" height="75" rx="8" fill="#fff" stroke="#95d5b2" stroke-width="2"/>
    <text x="307" y="272" text-anchor="middle" class="label-text" font-size="13" fill="#2d8a5e">Key Benefits</text>
    <g class="sub-item-right" style="animation-delay: 1.1s">
      <circle cx="230" cy="290" r="3" fill="#2d8a5e"/>
      <text x="240" y="293" class="detail-text">Early defect detection</text>
    </g>
    <g class="sub-item-right" style="animation-delay: 1.2s">
      <circle cx="230" cy="305" r="3" fill="#2d8a5e"/>
      <text x="240" y="308" class="detail-text">Data-driven decisions</text>
    </g>
    <g class="sub-item-right" style="animation-delay: 1.3s">
      <circle cx="230" cy="320" r="3" fill="#2d8a5e"/>
      <text x="240" y="323" class="detail-text">Continuous improvement</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="210" y="385" text-anchor="middle" class="detail-text" fill="#718096">Software Quality Metrics Diagram</text>
</svg>