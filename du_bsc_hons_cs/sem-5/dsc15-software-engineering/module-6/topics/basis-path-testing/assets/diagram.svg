<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="basis-path-testing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decisionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c987;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0a850;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw-line {
      stroke-dasharray: 100;
      animation: drawLine 1s ease-out forwards;
    }
    .title-text { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .concept-box { fill: #fff; stroke: #b8d4e8; stroke-width: 2; rx: 8; }
    .node-circle { fill: url(#nodeGradient); stroke: #4a7fa8; stroke-width: 2; }
    .decision-diamond { fill: url(#decisionGradient); stroke: #c9922e; stroke-width: 2; }
    .arrow-line { stroke: #7f8c8d; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .branch-label { font-family: Arial, sans-serif; font-size: 11px; fill: #e74c3c; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <title>Basis Path Testing - Educational Diagram</title>
  
  <!-- Title Section -->
  <g class="fade-in" style="animation-delay: 0.1s;">
    <text x="210" y="30" text-anchor="middle" class="title-text">Basis Path Testing</text>
    <rect x="60" y="42" width="300" height="2" fill="#7eb8da" />
  </g>
  
  <!-- Key Concepts Box -->
  <g class="slide-left" style="animation-delay: 0.3s;" data-narration="Key Concepts: Cyclomatic Complexity measures path complexity, Control Flow Graph represents program flow, Basis Paths are minimum paths to cover all scenarios.">
    <rect x="15" y="55" width="130" height="145" class="concept-box" filter="url(#shadow)" />
    <text x="80" y="72" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    <line x1="25" y1="80" x2="135" y2="80" stroke="#b8d4e8" stroke-width="1" />
    
    <circle cx="28" cy="95" r="4" fill="#7eb8da" />
    <text x="38" y="99" class="detail-text">Cyclomatic</text>
    <text x="38" y="111" class="detail-text">Complexity</text>
    
    <circle cx="28" cy="125" r="4" fill="#f0c987" />
    <text x="38" y="129" class="detail-text">Control Flow</text>
    <text x="38" y="141" class="detail-text">Graph (CFG)</text>
    
    <circle cx="28" cy="155" r="4" fill="#a8d4a8" />
    <text x="38" y="159" class="detail-text">Basis Paths</text>
    <text x="38" y="171" class="detail-text">(Independent)</text>
    
    <circle cx="28" cy="185" r="4" fill="#d4a8d4" />
    <text x="38" y="189" class="detail-text">Path Testing</text>
  </g>
  
  <!-- Control Flow Graph Visualization -->
  <g class="slide-up" style="animation-delay: 0.5s;" data-narration="Control Flow Graph shows: Entry Node (Start), Decision Node (if condition), True/False branches, Statement Nodes, and Exit Node.">
    <!-- Graph Title -->
    <text x="280" y="70" text-anchor="middle" class="label-text" font-weight="bold">Control Flow Graph</text>
    
    <!-- Entry Node -->
    <circle cx="280" cy="100" r="18" class="node-circle pulse" filter="url(#shadow)" />
    <text x="280" y="104" text-anchor="middle" fill="white" font-size="10" font-family="Arial">START</text>
    
    <!-- Arrow from Entry to Decision -->
    <line x1="280" y1="118" x2="280" y2="145" class="arrow-line" />
    
    <!-- Decision Node (Diamond) -->
    <polygon points="280,150 310,175 280,200 250,175" class="decision-diamond pulse" style="animation-delay: 1s;" filter="url(#shadow)" />
    <text x="280" y="178" text-anchor="middle" fill="#2c3e50" font-size="11" font-family="Arial">x&gt;0?</text>
    
    <!-- True Branch (left) -->
    <line x1="250" y1="175" x2="200" y2="175" class="arrow-line" />
    <text x="222" y="168" class="branch-label">TRUE</text>
    
    <!-- True Branch Statement -->
    <rect x="155" y="190" width="90" height="30" rx="5" class="node-circle" />
    <text x="200" y="210" text-anchor="middle" fill="white" font-size="10" font-family="Arial">y=x*2</text>
    
    <!-- Arrow from True to Merge -->
    <line x1="200" y1="220" x2="200" y2="260" class="arrow-line" />
    <line x1="200" y1="260" x2="280" y2="260" class="arrow-line" />
    
    <!-- False Branch (right) -->
    <line x1="310" y1="175" x2="360" y2="175" class="arrow-line" />
    <text x="338" y="168" class="branch-label">FALSE</text>
    
    <!-- False Branch Statement -->
    <rect x="315" y="190" width="90" height="30" rx="5" class="node-circle" />
    <text x="360" y="210" text-anchor="middle" fill="white" font-size="10" font-family="Arial">y=x/2</text>
    
    <!-- Arrow from False to Merge -->
    <line x1="360" y1="220" x2="360" y2="260" class="arrow-line" />
    <line x1="360" y1="260" x2="310" y2="260" class="arrow-line" />
    
    <!-- Merge Point to Exit -->
    <line x1="280" y1="260" x2="280" y2="285" class="arrow-line" />
    
    <!-- Exit Node -->
    <circle cx="280" cy="305" r="18" class="node-circle pulse" style="animation-delay: 1.5s;" filter="url(#shadow)" />
    <text x="280" y="309" text-anchor="middle" fill="white" font-size="10" font-family="Arial">END</text>
  </g>
  
  <!-- Cyclomatic Complexity Calculation -->
  <g class="fade-in" style="animation-delay: 0.7s;" data-narration="Cyclomatic Complexity = Edges - Nodes + 2 = 6 - 5 + 2 = 3. This means 3 independent paths exist.">
    <rect x="15" y="210" width="130" height="70" class="concept-box" filter="url(#shadow)" />
    <text x="80" y="228" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Complexity</text>
    <line x1="25" y1="235" x2="135" y2="235" stroke="#b8d4e8" stroke-width="1" />
    <text x="25" y="252" class="detail-text" fill="#34495e">Edges: 6</text>
    <text x="25" y="266" class="detail-text" fill="#34495e">Nodes: 5</text>
    <text x="25" y="280" class="detail-text" font-weight="bold" fill="#e74c3c">CC = 6-5+2 = 3</text>
  </g>
  
  <!-- Basis Paths Section -->
  <g class="slide-up" style="animation-delay: 0.9s;" data-narration="Three basis paths: 1) START → x>0=TRUE → y=x*2 → END, 2) START → x>0=FALSE → y=x/2 → END, 3) Additional path covering both branches.">
    <rect x="160" y="235" width="145" height="45" class="concept-box" filter="url(#shadow)" />
    <text x="232" y="252" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Basis Paths</text>
    <line x1="170" y1="260" x2="295" y2="260" stroke="#b8d4e8" stroke-width="1" />
    <text x="175" y="274" class="detail-text" fill="#34495e">Path 1: Start→True→End</text>
    <text x="255" y="274" class="detail-text" fill="#e74c3c">Path 2: Start→False→End</text>
  </g>
  
  <!-- Formula Box -->
  <g class="fade-in" style="animation-delay: 1.1s;">
    <rect x="315" y="235" width="90" height="45" class="concept-box" fill="#f9f3e8" filter="url(#shadow)" />
    <text x="360" y="252" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Formula</text>
    <line x1="325" y1="260" x2="395" y2="260" stroke="#f0c987" stroke-width="1" />
    <text x="360" y="276" text-anchor="middle" class="detail-text" fill="#34495e">M = E - N + 2P</text>
  </g>
  
  <!-- Example Code Section -->
  <g class="fade-in" style="animation-delay: 1.3s;" data-narration="Example code: if (x > 0) { y = x * 2; } else { y = x / 2; } - This simple if-else has 2 paths but cyclomatic complexity of 2.">
    <rect x="15" y="290" width="390" height="45" class="concept-box" filter="url(#shadow)" />
    <text x="210" y="308" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Example Program</text>
    <text x="210" y="326" text-anchor="middle" class="detail-text" fill="#5d6d7e" font-family="Courier New, monospace">if (x &gt; 0) { y = x * 2; } else { y = x / 2; }</text>
  </g>
  
  <!-- Legend -->
  <g class="fade-in" style="animation-delay: 1.5s;">
    <circle cx="35" cy="350" r="6" fill="#7eb8da" stroke="#4a7fa8" stroke-width="1" />
    <text x="48" y="354" class="detail-text">Statement</text>
    
    <polygon points="55,365 61,372 55,379 49,372" fill="#f0c987" stroke="#c9922e" stroke-width="1" />
    <text x="68" y="374" class="detail-text">Decision</text>
    
    <line x1="115" y1="370" x2="135" y2="370" stroke="#7f8c8d" stroke-width="2" />
    <polygon points="135,370 128,367 128,373" fill="#7f8c8d" />
    <text x="142" y="374" class="detail-text">Flow</text>
  </g>
  
  <!-- Animated Elements -->
  <g class="pulse" style="transform-origin: 280px 175px;">
  </g>
  
</svg>