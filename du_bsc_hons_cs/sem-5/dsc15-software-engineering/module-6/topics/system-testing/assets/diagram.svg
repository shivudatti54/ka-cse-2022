<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="system-testing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5"/>
      <stop offset="100%" style="stop-color:#c48793"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcd6f7"/>
      <stop offset="100%" style="stop-color:#b8b5e3"/>
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#357a8c"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .box2 { animation: slideInRight 0.6s ease-out 0.3s both; }
    .box3 { animation: slideInLeft 0.6s ease-out 0.4s both; }
    .box4 { animation: slideInRight 0.6s ease-out 0.5s both; }
    .center-box { animation: fadeIn 0.8s ease-out 0.6s both; }
    .technique-box { animation: slideInUp 0.5s ease-out both; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s both; }
    .center-circle { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c5f6f" class="title">System Testing</text>
  
  <!-- Central System Testing Box -->
  <g class="center-box">
    <circle cx="210" cy="180" r="50" fill="url(#centerGradient)" stroke="#2c5f6f" stroke-width="2"/>
    <text x="210" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">SYSTEM</text>
    <text x="210" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">TESTING</text>
  </g>
  
  <!-- Top Left: Functional Testing -->
  <g class="box1" data-narration="Functional Testing verifies that the system performs its intended functions correctly according to specifications.">
    <rect x="20" y="70" width="90" height="55" rx="8" fill="url(#boxGradient1)" stroke="#5a9ab8" stroke-width="1.5"/>
    <text x="65" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5f6f">Functional</text>
    <text x="65" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3d6a7a">Testing</text>
  </g>
  
  <!-- Top Right: Performance Testing -->
  <g class="box2" data-narration="Performance Testing evaluates the system's performance under various conditions like heavy loads and stress.">
    <rect x="310" y="70" width="90" height="55" rx="8" fill="url(#boxGradient2)" stroke="#5a9a7a" stroke-width="1.5"/>
    <text x="355" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5f6f">Performance</text>
    <text x="355" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3d6a5a">Testing</text>
  </g>
  
  <!-- Bottom Left: Security Testing -->
  <g class="box3" data-narration="Security Testing identifies vulnerabilities and ensures the system is secure against unauthorized access and attacks.">
    <rect x="20" y="270" width="90" height="55" rx="8" fill="url(#boxGradient3)" stroke="#a86a6a" stroke-width="1.5"/>
    <text x="65" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#5f2c2c">Security</text>
    <text x="65" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7a3d3d">Testing</text>
  </g>
  
  <!-- Bottom Right: Usability Testing -->
  <g class="box4" data-narration="Usability Testing evaluates the user interface to ensure it is user-friendly and easy to navigate.">
    <rect x="310" y="270" width="90" height="55" rx="8" fill="url(#boxGradient4)" stroke="#7a6aa3" stroke-width="1.5"/>
    <text x="355" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3d2c5f">Usability</text>
    <text x="355" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d4c8a">Testing</text>
  </g>
  
  <!-- Arrows connecting boxes to center -->
  <line x1="110" y1="97" x2="165" y2="145" stroke="#5a9ab8" stroke-width="2" class="arrow"/>
  <polygon points="165,145 158,138 160,145" fill="#5a9ab8" class="arrow"/>
  
  <line x1="310" y1="97" x2="255" y2="145" stroke="#5a9a7a" stroke-width="2" class="arrow"/>
  <polygon points="255,145 262,138 260,145" fill="#5a9a7a" class="arrow"/>
  
  <line x1="110" y1="297" x2="165" y2="220" stroke="#a86a6a" stroke-width="2" class="arrow"/>
  <polygon points="165,220 158,227 160,220" fill="#a86a6a" class="arrow"/>
  
  <line x1="310" y1="297" x2="255" y2="220" stroke="#7a6aa3" stroke-width="2" class="arrow"/>
  <polygon points="255,220 262,227 260,220" fill="#7a6aa3" class="arrow"/>
  
  <!-- Testing Techniques Section at bottom center -->
  <g class="technique-box" data-narration="System Testing uses Black Box (input/output only), White Box (internal logic), and Gray Box (partial internal knowledge) testing techniques.">
    <rect x="125" y="340" width="170" height="45" rx="6" fill="#f0f0f0" stroke="#888" stroke-width="1"/>
    <text x="210" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#444">Testing Techniques</text>
    <text x="210" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Black ● White ● Gray Box</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="140" cy="350" r="3" fill="#4a90a4" class="arrow"/>
  <circle cx="210" cy="350" r="3" fill="#4a90a4" class="arrow"/>
  <circle cx="280" cy="350" r="3" fill="#4a90a4" class="arrow"/>
</svg>