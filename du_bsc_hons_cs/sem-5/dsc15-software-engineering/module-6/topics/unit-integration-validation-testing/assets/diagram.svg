<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="unit-integration-validation-testing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="unitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="intGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="valGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes checkPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .unit-icon { animation: pulse 2s infinite; transform-origin: center; }
    .check-icon { animation: checkPulse 1.5s infinite; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .label { animation: fadeIn 0.6s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#334155" class="title">Unit, Integration &amp; Validation Testing</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" class="title"/>
  
  <!-- Unit Testing Section -->
  <g class="section-box" data-narration="Unit Testing focuses on testing individual units of code in isolation">
    <rect x="15" y="55" width="115" height="140" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="15" y="55" width="115" height="28" rx="8" fill="url(#unitGrad)"/>
    <text x="72" y="73" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#166534">Unit Testing</text>
    
    <!-- Code Units -->
    <rect x="28" y="95" width="35" height="25" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="45" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#166534">fn()</text>
    <rect x="68" y="95" width="35" height="25" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="85" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#166534">cls</text>
    
    <rect x="28" y="128" width="35" height="25" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="45" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#166534">mod</text>
    <rect x="68" y="128" width="35" height="25" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="85" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#166534">var</text>
    
    <!-- Test Case -->
    <rect x="23" y="160" width="99" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
    <text x="72" y="177" text-anchor="middle" font-family="Arial" font-size="9" fill="#166534">Test Case</text>
  </g>
  
  <!-- Integration Testing Section -->
  <g class="section-box" data-narration="Integration Testing verifies that multiple units work together correctly">
    <rect x="152" y="55" width="115" height="140" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="152" y="55" width="115" height="28" rx="8" fill="url(#intGrad)"/>
    <text x="209" y="73" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1e40af">Integration</text>
    
    <!-- Connected Units -->
    <rect x="165" y="95" width="35" height="25" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="182" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e40af">Unit</text>
    <rect x="218" y="95" width="35" height="25" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="235" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e40af">Unit</text>
    
    <!-- Connection Line -->
    <line x1="200" y1="107" x2="218" y2="107" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,2"/>
    <polygon points="215,107 218,103 218,111" fill="#3b82f6"/>
    
    <rect x="165" y="128" width="35" height="25" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="182" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e40af">Unit</text>
    <rect x="218" y="128" width="35" height="25" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="235" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e40af">Unit</text>
    
    <line x1="200" y1="140" x2="218" y2="140" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,2"/>
    <polygon points="215,140 218,136 218,144" fill="#3b82f6"/>
    
    <!-- Interface Label -->
    <rect x="175" y="160" width="70" height="25" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="210" y="177" text-anchor="middle" font-family="Arial" font-size="9" fill="#1e40af">Interface</text>
  </g>
  
  <!-- Validation Testing Section -->
  <g class="section-box" data-narration="Validation Testing ensures the software meets user requirements and expectations">
    <rect x="289" y="55" width="115" height="140" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="289" y="55" width="115" height="28" rx="8" fill="url(#valGrad)"/>
    <text x="346" y="73" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#5b21b6">Validation</text>
    
    <!-- Complete System -->
    <rect x="302" y="90" width="90" height="50" rx="5" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="347" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#5b21b6" font-weight="bold">Complete</text>
    <text x="347" y="130" text-anchor="middle" font-family="Arial" font-size="11" fill="#5b21b6" font-weight="bold">System</text>
    
    <!-- Check Marks -->
    <g class="check-icon">
      <circle cx="320" cy="155" r="8" fill="#22c55e"/>
      <path d="M316 155 L319 158 L324 152" stroke="white" stroke-width="2" fill="none"/>
    </g>
    <g class="check-icon" style="animation-delay: 0.3s">
      <circle cx="347" cy="155" r="8" fill="#22c55e"/>
      <path d="M343 155 L346 158 L351 152" stroke="white" stroke-width="2" fill="none"/>
    </g>
    <g class="check-icon" style="animation-delay: 0.6s">
      <circle cx="374" cy="155" r="8" fill="#22c55e"/>
      <path d="M370 155 L373 158 L378 152" stroke="white" stroke-width="2" fill="none"/>
    </g>
    
    <text x="347" y="178" text-anchor="middle" font-family="Arial" font-size="8" fill="#5b21b6">Spec Met</text>
  </g>
  
  <!-- Flow Arrow 1 -->
  <g class="arrow" style="animation-delay: 0.8s">
    <line x1="130" y1="125" x2="150" y2="125" stroke="#64748b" stroke-width="2"/>
    <polygon points="148,125 144,122 144,128" fill="#64748b"/>
    <text x="140" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">combine</text>
  </g>
  
  <!-- Flow Arrow 2 -->
  <g class="arrow" style="animation-delay: 1s">
    <line x1="267" y1="125" x2="287" y2="125" stroke="#64748b" stroke-width="2"/>
    <polygon points="285,125 281,122 281,128" fill="#64748b"/>
    <text x="277" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">integrate</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-box" data-narration="Key concepts include test isolation, interface testing, and requirement verification">
    <rect x="15" y="210" width="390" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="15" y="210" width="390" height="22" rx="8" fill="#f1f5f9"/>
    <text x="210" y="225" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#334155">Key Concepts</text>
    
    <!-- Concept Items -->
    <rect x="25" y="242" width="120" height="42" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="85" y="256" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#334155">Test Isolation</text>
    <text x="85" y="270" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">Test units independently</text>
    <text x="85" y="280" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">from dependencies</text>
    
    <rect x="150" y="242" width="120" height="42" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="210" y="256" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#334155">Interface Testing</text>
    <text x="210" y="270" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">Verify component</text>
    <text x="210" y="280" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">interactions</text>
    
    <rect x="275" y="242" width="120" height="42" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="335" y="256" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#334155">Requirement Check</text>
    <text x="335" y="270" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">Ensure software</text>
    <text x="335" y="280" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">meets specifications</text>
  </g>
  
  <!-- Bottom Legend -->
  <g class="section-box" data-narration="Testing progresses from unit level to integration and finally validation">
    <rect x="15" y="305" width="390" height="80" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="210" y="322" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#334155">Testing Progression &amp; Best Practices</text>
    
    <!-- Timeline -->
    <rect x="30" y="335" width="90" height="18" rx="4" fill="url(#unitGrad)"/>
    <text x="75" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#166534">Unit →</text>
    
    <rect x="125" y="335" width="90" height="18" rx="4" fill="url(#intGrad)"/>
    <text x="170" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#1e40af">Integration →</text>
    
    <rect x="220" y="335" width="90" height="18" rx="4" fill="url(#valGrad)"/>
    <text x="265" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#5b21b6">Validation →</text>
    
    <rect x="315" y="335" width="80" height="18" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="355" y="348" text-anchor="middle" font-family="Arial" font-size="8" fill="#64748b">Deploy</text>
    
    <!-- Arrow flow -->
    <line x1="120" y1="344" x2="125" y2="344" stroke="#94a3b8" stroke-width="2"/>
    <line x1="215" y1="344" x2="220" y2="344" stroke="#94a3b8" stroke-width="2"/>
    <line x1="310" y1="344" x2="315" y2="344" stroke="#94a3b8" stroke-width="2"/>
    
    <!-- Best Practice Note -->
    <text x="210" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">Best Practice: Test early, test often, automate where possible</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="30" cy="30" r="4" fill="#86efac" opacity="0.6"/>
  <circle cx="390" cy="370" r="5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="50" cy="380" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="370" cy="50" r="3" fill="#fca5a5" opacity="0.5"/>
</svg>