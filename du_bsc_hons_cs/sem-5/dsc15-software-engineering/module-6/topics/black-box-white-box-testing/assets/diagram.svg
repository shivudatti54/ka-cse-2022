<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="black-box-white-box-testing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blackBoxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whiteBoxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fda085;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box-anim { animation: slideInLeft 0.6s ease-out forwards; }
    .box-anim-right { animation: slideInRight 0.6s ease-out forwards; }
    .item-anim { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .pulse-anim { animation: pulse 2s infinite; }
    .comparison-anim { animation: slideUp 0.6s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title-anim">Black Box &amp; White Box Testing</text>
  
  <!-- Black Box Testing Section -->
  <g class="box-anim" data-narration="Black Box Testing - Tester views software as a closed box, knowing only inputs and expected outputs without knowledge of internal code">
    <rect x="20" y="50" width="180" height="160" rx="10" fill="url(#blackBoxGrad)" stroke="#2c3e50" stroke-width="1.5" />
    <text x="110" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a5f5a">Black Box Testing</text>
    <text x="30" y="90" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Functional Testing</text>
    
    <!-- Input Box -->
    <rect x="30" y="100" width="50" height="35" rx="5" fill="url(#inputGrad)" />
    <text x="55" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">INPUT</text>
    
    <!-- Software Box -->
    <rect x="85" y="100" width="70" height="35" rx="5" fill="#ecf0f1" stroke="#34495e" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="120" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Software</text>
    <text x="120" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#7f8c8d">(Black Box)</text>
    
    <!-- Arrow -->
    <path d="M80 117 L85 117" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)" />
    
    <!-- Output Box -->
    <rect x="160" y="100" width="35" height="35" rx="5" fill="url(#outputGrad)" />
    <text x="177" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">OUT</text>
    
    <!-- Key Points -->
    <g class="item-anim">
      <circle cx="35" cy="150" r="4" fill="#e74c3c" />
      <text x="45" y="154" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">No code knowledge needed</text>
    </g>
    <g class="item-anim" style="animation-delay: 0.5s">
      <circle cx="35" cy="168" r="4" fill="#e74c3c" />
      <text x="45" y="172" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Tests behavior only</text>
    </g>
    <g class="item-anim" style="animation-delay: 0.7s">
      <circle cx="35" cy="186" r="4" fill="#e74c3c" />
      <text x="45" y="190" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Input-Output based</text>
    </g>
  </g>
  
  <!-- White Box Testing Section -->
  <g class="box-anim-right" data-narration="White Box Testing - Tester has full knowledge of internal code structure and tests internal pathways">
    <rect x="220" y="50" width="180" height="160" rx="10" fill="url(#whiteBoxGrad)" stroke="#2c3e50" stroke-width="1.5" />
    <text x="310" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#6b3a6b">White Box Testing</text>
    <text x="230" y="90" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Structural Testing</text>
    
    <!-- Code visualization -->
    <rect x="230" y="100" width="160" height="60" rx="5" fill="#2c3e50" />
    <text x="240" y="115" font-family="monospace" font-size="8" fill="#00ff00">function login(u,p){</text>
    <text x="250" y="127" font-family="monospace" font-size="8" fill="#00ff00">if(valid(u,p))</text>
    <text x="260" y="139" font-family="monospace" font-size="8" fill="#00ff00">return true;</text>
    <text x="250" y="151" font-family="monospace" font-size="8" fill="#ff6b6b">// path testing</text>
    
    <!-- Arrow to show internal view -->
    <path d="M310 170 L310 190" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,2" />
    <circle cx="310" cy="175" r="3" fill="#e74c3c" class="pulse-anim" />
    <text x="310" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Code visible</text>
    
    <!-- Key Points -->
    <g class="item-anim" style="animation-delay: 0.4s">
      <circle cx="235" cy="175" r="4" fill="#3498db" />
      <text x="245" y="179" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Code knowledge required</text>
    </g>
    <g class="item-anim" style="animation-delay: 0.6s">
      <circle cx="235" cy="193" r="4" fill="#3498db" />
      <text x="245" y="197" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Tests internal structure</text>
    </g>
    <g class="item-anim" style="animation-delay: 0.8s">
      <circle cx="235" cy="211" r="4" fill="#3498db" />
      <text x="245" y="215" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Path &amp; statement coverage</text>
    </g>
  </g>
  
  <!-- Comparison Section -->
  <g class="comparison-anim" data-narration="Comparison table showing key differences between Black Box and White Box testing approaches" style="animation-delay: 0.5s">
    <rect x="20" y="225" width="380" height="160" rx="8" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" />
    <text x="210" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Comparison</text>
    
    <!-- Table Header -->
    <rect x="30" y="255" width="100" height="20" fill="#3498db" rx="3" />
    <text x="80" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">Aspect</text>
    
    <rect x="130" y="255" width="130" height="20" fill="#27ae60" rx="3" />
    <text x="195" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">Black Box</text>
    
    <rect x="260" y="255" width="130" height="20" fill="#9b59b6" rx="3" />
    <text x="325" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">White Box</text>
    
    <!-- Row 1 -->
    <text x="80" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Knowledge</text>
    <text x="195" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">Not required</text>
    <text x="325" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">Required</text>
    <line x1="30" y1="297" x2="390" y2="297" stroke="#ecf0f1" stroke-width="1" />
    
    <!-- Row 2 -->
    <text x="80" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Focus</text>
    <text x="195" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">Functionality</text>
    <text x="325" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">Structure</text>
    <line x1="30" y1="319" x2="390" y2="319" stroke="#ecf0f1" stroke-width="1" />
    
    <!-- Row 3 -->
    <text x="80" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Level</text>
    <text x="195" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">High-level</text>
    <text x="325" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">Low-level</text>
    <line x1="30" y1="341" x2="390" y2="341" stroke="#ecf0f1" stroke-width="1" />
    
    <!-- Row 4 -->
    <text x="80" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Time</text>
    <text x="195" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">Less</text>
    <text x="325" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">More</text>
    <line x1="30" y1="363" x2="390" y2="363" stroke="#ecf0f1" stroke-width="1" />
    
    <!-- Row 5 -->
    <text x="80" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Technique</text>
    <text x="195" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">Behavioral</text>
    <text x="325" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">Code Coverage</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="30" cy="380" r="6" fill="#a8edea" class="pulse-anim" />
  <circle cx="390" cy="380" r="6" fill="#d299c2" class="pulse-anim" style="animation-delay: 0.5s" />
</svg>