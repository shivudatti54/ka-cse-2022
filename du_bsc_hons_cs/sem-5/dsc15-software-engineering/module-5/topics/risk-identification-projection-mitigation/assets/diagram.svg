<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="risk-identification-projection-mitigation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#5cb85c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-3 { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .matrix-section { animation: fadeIn 0.8s ease-out 0.5s forwards; opacity: 0; }
    .arrow { stroke-dasharray: 100; animation: drawLine 1s ease-out 0.8s forwards; stroke-dashoffset: 100; }
    .pulse-item { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .risk-cell { transition: all 0.3s ease; }
    .risk-cell:hover { transform: scale(1.1); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Risk Identification, Projection</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">&amp; Mitigation</text>
  
  <!-- Three Main Process Boxes -->
  <!-- Box 1: Identification -->
  <g class="box-1" data-narration="Risk Identification - The first step involves recognizing and documenting potential risks through techniques like brainstorming and SWOT analysis">
    <rect x="20" y="70" width="110" height="55" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="20" y="70" width="110" height="18" rx="8" fill="#64b5f6"/>
    <rect x="20" y="80" width="110" height="8" fill="#64b5f6"/>
    <text x="75" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">IDENTIFICATION</text>
    <text x="75" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#455a64">Brainstorming</text>
    <text x="75" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#455a64">SWOT Analysis</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M145 97 L175 97" stroke="#78909c" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="175,97 168,93 168,101" fill="#78909c"/>
  
  <!-- Box 2: Projection -->
  <g class="box-2" data-narration="Risk Projection - Estimating the likelihood and potential impact of identified risks using the risk matrix">
    <rect x="190" y="70" width="110" height="55" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="190" y="70" width="110" height="18" rx="8" fill="#ffb74d"/>
    <rect x="190" y="80" width="110" height="8" fill="#ffb74d"/>
    <text x="245" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">PROJECTION</text>
    <text x="245" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#455a64">Likelihood</text>
    <text x="245" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#455a64">Impact Assessment</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M315 97 L345 97" stroke="#78909c" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="345,97 338,93 338,101" fill="#78909c"/>
  
  <!-- Box 3: Mitigation -->
  <g class="box-3" data-narration="Risk Mitigation - Strategies and actions taken to reduce or eliminate the impact of identified risks">
    <rect x="360" y="70" width="55" height="55" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="360" y="70" width="55" height="18" rx="8" fill="#81c784"/>
    <rect x="360" y="80" width="55" height="8" fill="#81c784"/>
    <text x="387" y="85" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">MITIGATION</text>
    <text x="387" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#455a64">Reduce</text>
    <text x="387" y="117" text-anchor="middle" font-family="Arial" font-size="9" fill="#455a64">Transfer</text>
  </g>
  
  <!-- Risk Matrix Section -->
  <g class="matrix-section" data-narration="Risk Matrix - A visual tool with Likelihood on Y-axis and Impact on X-axis to prioritize risks into Low, Medium, and High categories">
    <text x="210" y="148" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#37474f">Risk Matrix</text>
    
    <!-- Y-axis label -->
    <text x="45" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#546e7a" transform="rotate(-90,45,195)">Likelihood</text>
    
    <!-- X-axis label -->
    <text x="280" y="262" text-anchor="middle" font-family="Arial" font-size="10" fill="#546e7a">Impact</text>
    
    <!-- Matrix Grid -->
    <rect x="65" y="160" width="210" height="90" fill="#fff" stroke="#cfd8dc" stroke-width="1" rx="4"/>
    
    <!-- High Risk (Red) -->
    <rect x="185" y="160" width="45" height="30" fill="#ffcdd2" class="risk-cell" rx="2"/>
    <text x="207" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828" font-weight="bold">HIGH</text>
    
    <!-- Medium Risk (Orange) -->
    <rect x="140" y="160" width="45" height="30" fill="#ffe0b2" class="risk-cell" rx="2"/>
    <text x="162" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#ef6c00" font-weight="bold">MED</text>
    
    <rect x="185" y="190" width="45" height="30" fill="#ffe0b2" class="risk-cell" rx="2"/>
    <text x="207" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#ef6c00" font-weight="bold">MED</text>
    
    <!-- Low Risk (Green) -->
    <rect x="65" y="160" width="75" height="60" fill="#c8e6c9" class="risk-cell" rx="2"/>
    <text x="102" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32" font-weight="bold">LOW</text>
    
    <rect x="140" y="220" width="45" height="30" fill="#c8e6c9" class="risk-cell" rx="2"/>
    <text x="162" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32" font-weight="bold">LOW</text>
    
    <!-- Axis lines -->
    <line x1="65" y1="250" x2="275" y2="250" stroke="#90a4ae" stroke-width="1"/>
    <line x1="65" y1="160" x2="65" y2="250" stroke="#90a4ae" stroke-width="1"/>
    
    <!-- Axis arrows -->
    <polygon points="275,250 270,246 270,254" fill="#90a4ae"/>
    <polygon points="65,160 61,165 69,165" fill="#90a4ae"/>
  </g>
  
  <!-- Types of Risks Section -->
  <g class="box-2" data-narration="Types of Software Risks - Technical, Schedule, Budget, and Operational risks affect project success" style="animation-delay: 0.7s; opacity: 0;">
    <rect x="290" y="270" width="115" height="115" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="290" y="270" width="115" height="18" rx="8" fill="url(#headerGradient)"/>
    <text x="347" y="284" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Types of Risks</text>
    
    <!-- Risk types list -->
    <circle cx="302" cy="302" r="4" fill="#64b5f6"/>
    <text x="312" y="306" font-family="Arial" font-size="9" fill="#37474f">Technical</text>
    
    <circle cx="302" cy="318" r="4" fill="#ffb74d"/>
    <text x="312" y="322" font-family="Arial" font-size="9" fill="#37474f">Schedule</text>
    
    <circle cx="302" cy="334" r="4" fill="#ba68c8"/>
    <text x="312" y="338" font-family="Arial" font-size="9" fill="#37474f">Budget</text>
    
    <circle cx="302" cy="350" r="4" fill="#81c784"/>
    <text x="312" y="354" font-family="Arial" font-size="9" fill="#37474f">Operational</text>
  </g>
  
  <!-- Process Flow Arrow -->
  <g class="box-3" data-narration="The cyclical risk management process flows from identification through projection to mitigation and repeats" style="animation-delay: 1s; opacity: 0;">
    <path d="M100 135 Q210 155 320 135" stroke="#78909c" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <text x="210" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#78909c">Continuous Process</text>
  </g>
  
  <!-- Key concept box -->
  <g class="pulse-item" style="transform-origin: 65px 335px;">
    <rect x="15" y="295" width="85" height="50" rx="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5"/>
    <text x="57" y="310" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Key Concept</text>
    <text x="57" y="325" text-anchor="middle" font-family="Arial" font-size="8" fill="#455a64">Risk Management</text>
    <text x="57" y="338" text-anchor="middle" font-family="Arial" font-size="8" fill="#455a64">is Essential for</text>
    <text x="57" y="350" text-anchor="middle" font-family="Arial" font-size="8" fill="#455a64">Project Success</text>
  </g>
  
  <!-- Legend -->
  <g class="box-1" style="animation-delay: 0.9s; opacity: 0;">
    <rect x="290" y="385" width="115" height="10" rx="2" fill="#f5f5f5"/>
    <rect x="292" y="387" width="15" height="6" fill="#c8e6c9" rx="1"/>
    <text x="312" y="393" font-family="Arial" font-size="7" fill="#546e7a">Low</text>
    <rect x="340" y="387" width="15" height="6" fill="#ffe0b2" rx="1"/>
    <text x="360" y="393" font-family="Arial" font-size="7" fill="#546e7a">Medium</text>
    <rect x="380" y="387" width="15" height="6" fill="#ffcdd2" rx="1"/>
    <text x="400" y="393" font-family="Arial" font-size="7" fill="#546e7a">High</text>
  </g>
</svg>