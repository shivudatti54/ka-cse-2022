<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="quality-control-and-assurance">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4ecf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bde0ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9534f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9302c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: Arial, sans-serif; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .box5 { animation: slideIn 0.6s ease-out 1s both; }
    .arrow { animation: drawLine 1s ease-out 1.2s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .pulse-delay { animation: pulse 2s ease-in-out infinite 0.5s; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
    .label { font-size: 14px; font-weight: bold; fill: white; }
    .detail { font-size: 11px; fill: white; }
    .title-text { font-size: 22px; font-weight: bold; fill: #2c5aa0; }
    .subtitle { font-size: 12px; fill: #555; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <g class="title">
    <text x="210" y="35" text-anchor="middle" class="title-text">Quality Control Process</text>
    <text x="210" y="52" text-anchor="middle" class="subtitle">Software Engineering</text>
  </g>
  
  <!-- Quality Control Main Box -->
  <g class="box1" filter="url(#shadow)">
    <rect x="140" y="70" width="140" height="50" rx="8" fill="url(#boxGradient1)"/>
    <text x="210" y="100" text-anchor="middle" class="label">Quality Control</text>
  </g>
  
  <!-- Testing Box -->
  <g class="box2" filter="url(#shadow)">
    <rect x="30" y="160" width="100" height="60" rx="8" fill="url(#boxGradient2)"/>
    <text x="80" y="185" text-anchor="middle" class="label">Testing</text>
    <text x="80" y="202" text-anchor="middle" class="detail">Unit, Integration,</text>
    <text x="80" y="214" text-anchor="middle" class="detail">System, Acceptance</text>
  </g>
  
  <!-- Quality Metric Box -->
  <g class="box3" filter="url(#shadow)">
    <rect x="160" y="160" width="100" height="60" rx="8" fill="url(#boxGradient3)"/>
    <text x="210" y="185" text-anchor="middle" class="label">Quality Metric</text>
    <text x="210" y="202" text-anchor="middle" class="detail">Defect Density,</text>
    <text x="210" y="214" text-anchor="middle" class="detail">Code Coverage</text>
  </g>
  
  <!-- Corrective Action Box -->
  <g class="box4" filter="url(#shadow)">
    <rect x="290" y="160" width="100" height="60" rx="8" fill="url(#boxGradient4)"/>
    <text x="340" y="185" text-anchor="middle" class="label">Corrective</text>
    <text x="340" y="202" text-anchor="middle" class="detail">Action</text>
    <text x="340" y="214" text-anchor="middle" class="detail">Bug Fixes</text>
  </g>
  
  <!-- Additional Process Box -->
  <g class="box5" filter="url(#shadow)">
    <rect x="160" y="260" width="100" height="50" rx="8" fill="url(#boxGradient1)"/>
    <text x="210" y="290" text-anchor="middle" class="label">Verification</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrows">
    <!-- Arrow from QC to Testing -->
    <path d="M180 120 L80 155" stroke="#4a90d9" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
    <!-- Arrow from QC to Quality Metric -->
    <path d="M210 120 L210 155" stroke="#f0ad4e" stroke-width="2" fill="none" class="arrow"/>
    <!-- Arrow from QC to Corrective Action -->
    <path d="M240 120 L340 155" stroke="#d9534f" stroke-width="2" fill="none" class="arrow"/>
    <!-- Arrow from Testing to Verification -->
    <path d="M80 225 L140 255" stroke="#5cb85c" stroke-width="2" fill="none" class="arrow"/>
    <!-- Arrow from Quality Metric to Verification -->
    <path d="M210 225 L210 255" stroke="#f0ad4e" stroke-width="2" fill="none" class="arrow"/>
    <!-- Arrow from Corrective Action to Verification -->
    <path d="M340 225 L280 255" stroke="#d9534f" stroke-width="2" fill="none" class="arrow"/>
    <!-- Feedback arrow from Verification back to QC -->
    <path d="M210 315 L210 340 L170 340 L170 125" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="5,3" class="arrow"/>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
  </defs>
  
  <!-- Narration labels at bottom -->
  <g class="narration" transform="translate(10, 365)">
    <rect x="0" y="0" width="400" height="25" rx="5" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="10" y="16" font-size="10" fill="#555" data-narration="Quality Control coordinates testing, metrics, and corrective actions to ensure software quality.">Process Flow: QC → Testing/Metrics → Corrective Action → Verification → Feedback</text>
  </g>
  
  <!-- Legend/Key -->
  <g transform="translate(20, 320)">
    <circle cx="5" cy="5" r="4" fill="#5cb85c" class="pulse"/>
    <text x="15" y="9" font-size="9" fill="#333">Testing</text>
    <circle cx="80" cy="5" r="4" fill="#f0ad4e" class="pulse-delay"/>
    <text x="90" y="9" font-size="9" fill="#333">Metrics</text>
    <circle cx="150" cy="5" r="4" fill="#d9534f" class="pulse"/>
    <text x="160" y="9" font-size="9" fill="#333">Fixes</text>
  </g>
</svg>