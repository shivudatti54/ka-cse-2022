<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="waterfall-incremental-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="waterfallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5B9BD5"/>
      <stop offset="100%" style="stop-color:#4472C4"/>
    </linearGradient>
    <linearGradient id="incrementalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70AD47"/>
      <stop offset="100%" style="stop-color:#548235"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInDown 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInDown 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideInDown 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideInDown 0.6s ease-out 0.8s forwards; opacity: 0; }
    .section-5 { animation: slideInLeft 0.6s ease-out 1s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .box-pulse { animation: pulse 3s ease-in-out infinite; }
    .subtitle { animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2E4057">Waterfall Model</text>
  <text x="210" y="46" text-anchor="middle" class="subtitle" font-size="13" fill="#5D6D7E">Linear Sequential Approach</text>
  
  <!-- Waterfall Model Phases -->
  <g class="section-1" data-narration="Requirements Gathering - First phase where stakeholders' needs are collected">
    <rect x="40" y="60" width="160" height="40" rx="6" fill="url(#waterfallGrad)" filter="url(#shadow)"/>
    <text x="120" y="78" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Requirements</text>
    <text x="120" y="92" text-anchor="middle" fill="white" font-size="10">Gathering</text>
    <path class="arrow" d="M120 100 L120 112" stroke="#4472C4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <g class="section-2" data-narration="Analysis - Requirements are analyzed for feasibility and project scope">
    <rect x="40" y="115" width="160" height="40" rx="6" fill="url(#waterfallGrad)" filter="url(#shadow)"/>
    <text x="120" y="133" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Analysis</text>
    <text x="120" y="147" text-anchor="middle" fill="white" font-size="10">&amp; Planning</text>
    <path class="arrow" d="M120 155 L120 167" stroke="#4472C4" stroke-width="2" fill="none"/>
  </g>
  
  <g class="section-3" data-narration="Design - Software architecture and design based on requirements">
    <rect x="40" y="170" width="160" height="40" rx="6" fill="url(#waterfallGrad)" filter="url(#shadow)"/>
    <text x="120" y="188" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Design</text>
    <text x="120" y="202" text-anchor="middle" fill="white" font-size="10">&amp; Architecture</text>
    <path class="arrow" d="M120 210 L120 222" stroke="#4472C4" stroke-width="2" fill="none"/>
  </g>
  
  <g class="section-4" data-narration="Implementation - Code is written based on the design">
    <rect x="40" y="225" width="160" height="40" rx="6" fill="url(#waterfallGrad)" filter="url(#shadow)"/>
    <text x="120" y="243" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Implementation</text>
    <text x="120" y="257" text-anchor="middle" fill="white" font-size="10">Coding</text>
    <path class="arrow" d="M120 265 L120 277" stroke="#4472C4" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Final Phases Combined -->
  <g class="section-5" data-narration="Testing, Deployment, and Maintenance - Final phases ensuring quality and delivery">
    <rect x="40" y="280" width="160" height="40" rx="6" fill="url(#waterfallGrad)" filter="url(#shadow)"/>
    <text x="120" y="298" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Testing, Deploy</text>
    <text x="120" y="312" text-anchor="middle" fill="white" font-size="10">&amp; Maintenance</text>
  </g>
  
  <!-- Key Characteristics Box -->
  <g class="box-pulse" data-narration="Key characteristics: Sequential, linear, each phase completes before next begins">
    <rect x="220" y="60" width="180" height="130" rx="8" fill="#FDEBD0" stroke="#F39C12" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="310" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#B7950B">Key Characteristics</text>
    <line x1="230" y1="85" x2="390" y2="85" stroke="#F39C12" stroke-width="0.5"/>
    <circle cx="235" cy="100" r="3" fill="#E67E22"/>
    <text x="245" y="104" font-size="11" fill="#5D6D7E">Sequential phases</text>
    <circle cx="235" cy="118" r="3" fill="#E67E22"/>
    <text x="245" y="122" font-size="11" fill="#5D6D7E">Linear flow</text>
    <circle cx="235" cy="136" r="3" fill="#E67E22"/>
    <text x="245" y="140" font-size="11" fill="#5D6D7E">One-way direction</text>
    <circle cx="235" cy="154" r="3" fill="#E67E22"/>
    <text x="245" y="158" font-size="11" fill="#5D6D7E">Documentation focused</text>
    <circle cx="235" cy="172" r="3" fill="#E67E22"/>
    <text x="245" y="176" font-size="11" fill="#5D6D7E">Easy to understand</text>
  </g>
  
  <!-- Limitation Box -->
  <g class="section-5" data-narration="Limitations: Inflexible to changes, high risk if requirements change">
    <rect x="220" y="200" width="180" height="75" rx="8" fill="#FADBD8" fill-opacity="0.8" stroke="#E74C3C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="310" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#C0392B">Limitations</text>
    <text x="230" y="235" font-size="10" fill="#7B241C">• Inflexible to changes</text>
    <text x="230" y="250" font-size="10" fill="#7B241C">• Testing late in cycle</text>
    <text x="230" y="265" font-size="10" fill="#7B241C">• High risk if requirements shift</text>
  </g>
  
  <!-- Comparison Arrow -->
  <g class="section-5" data-narration="Comparison with Incremental Model - Iterative approach with smaller increments">
    <rect x="220" y="285" width="180" height="50" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="310" y="302" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E8449">vs Incremental Model</text>
    <text x="310" y="320" text-anchor="middle" font-size="10" fill="#1E8449">Iterative • Flexible •</text>
    <text x="310" y="332" text-anchor="middle" font-size="10" fill="#1E8449">Deliver in increments</text>
  </g>
  
  <!-- Flow indicator -->
  <g data-narration="The waterfall flows downward through each completed phase">
    <path d="M20 80 L30 80 L25 75 M20 80 L30 80 L25 85" stroke="#5D6D7E" stroke-width="1.5" fill="none"/>
    <text x="12" y="84" font-size="9" fill="#5D6D7E" transform="rotate(-90, 12, 84)">Flow →</text>
  </g>
  
  <!-- Bottom label -->
  <text x="210" y="385" text-anchor="middle" font-size="11" fill="#7F8C8D" font-style="italic">Classic Life Cycle Model (Royce, 1970)</text>
</svg>