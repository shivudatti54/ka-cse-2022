<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="software-process-framework">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccebd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4d4e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6d4e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ab8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInTop {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInBottom {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-10deg) scale(0.8); opacity: 0; }
      to { transform: rotate(0) scale(1); opacity: 1; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2d3748; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .center-text { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #ffffff; }
    .section-box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-top { animation: slideInTop 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-bottom { animation: slideInBottom 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .anim-rotate { animation: rotateIn 0.7s ease-out forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text anim-fade">Software Process Framework</text>
  
  <!-- Central Hub -->
  <g class="anim-rotate delay-2">
    <circle cx="210" cy="200" r="55" fill="url(#centerGradient)" filter="url(#shadow)"/>
    <text x="210" y="195" text-anchor="middle" class="center-text" font-size="13">SOFTWARE</text>
    <text x="210" y="212" text-anchor="middle" class="center-text" font-size="13">PROCESS</text>
    <text x="210" y="229" text-anchor="middle" class="center-text" font-size="13">FRAMEWORK</text>
  </g>
  
  <!-- Top: SDLC Card -->
  <g class="anim-slide-top delay-1 section-box" data-narration="The Software Development Life Cycle (SDLC) is a series of phases from planning to deployment">
    <rect x="30" y="55" width="100" height="70" rx="8" fill="url(#cardGradient1)"/>
    <text x="80" y="75" text-anchor="middle" class="label-text" font-size="12">SDLC</text>
    <text x="80" y="92" text-anchor="middle" class="detail-text">Planning to</text>
    <text x="80" y="105" text-anchor="middle" class="detail-text">Deployment</text>
    <!-- Arrow to center -->
    <path d="M 80 125 L 80 150 L 85 145 M 80 150 L 75 145" stroke="#e6a35c" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Right: Methodology Card -->
  <g class="anim-slide-right delay-2 section-box" data-narration="Methodology provides systematic approaches with principles, practices and procedures">
    <rect x="290" y="100" width="105" height="75" rx="8" fill="url(#cardGradient2)"/>
    <text x="342" y="120" text-anchor="middle" class="label-text" font-size="12">Methodology</text>
    <text x="342" y="138" text-anchor="middle" class="detail-text">Principles,</text>
    <text x="342" y="152" text-anchor="middle" class="detail-text">Practices, Procedures</text>
    <!-- Arrow to center -->
    <path d="M 290 137 L 270 137 L 270 175 L 265 170 M 270 175 L 275 170" stroke="#5a9a5a" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Bottom: Process Model Card -->
  <g class="anim-slide-bottom delay-3 section-box" data-narration="Process Model is a graphical representation showing relationships between activities">
    <rect x="145" y="300" width="130" height="75" rx="8" fill="url(#cardGradient3)"/>
    <text x="210" y="322" text-anchor="middle" class="label-text" font-size="12">Process Model</text>
    <text x="210" y="342" text-anchor="middle" class="detail-text">Graphical representation</text>
    <text x="210" y="356" text-anchor="middle" class="detail-text">of activities &amp; tasks</text>
    <!-- Arrow to center -->
    <path d="M 210 300 L 210 260 L 205 265 M 210 260 L 215 265" stroke="#6a6aaa" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Left: Software Process Card -->
  <g class="anim-slide-left delay-2 section-box" data-narration="Software Process consists of activities, tasks and procedures for developing and maintaining software">
    <rect x="25" y="165" width="110" height="80" rx="8" fill="url(#cardGradient4)"/>
    <text x="80" y="188" text-anchor="middle" class="label-text" font-size="12">Software Process</text>
    <text x="80" y="208" text-anchor="middle" class="detail-text">Activities,</text>
    <text x="80" y="222" text-anchor="middle" class="detail-text">Tasks,</text>
    <text x="80" y="236" text-anchor="middle" class="detail-text">Procedures</text>
    <!-- Arrow to center -->
    <path d="M 135 205 L 160 205 L 160 195 L 155 200 M 160 195 L 165 190" stroke="#9a5a9a" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Connecting Arrows between cards -->
  <g class="anim-fade delay-4">
    <!-- Curved arrow from SDLC to Process Model -->
    <path d="M 80 95 Q 60 200 145 280" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>
    <!-- Curved arrow from Methodology to SDLC -->
    <path d="M 330 100 Q 380 60 130 70" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Key Concepts Legend -->
  <g class="anim-fade delay-5">
    <rect x="275" y="290" width="120" height="85" rx="6" fill="#ffffff" stroke="#ddd" stroke-width="1" opacity="0.9"/>
    <text x="335" y="310" text-anchor="middle" class="label-text" font-size="11" fill="#2d3748">Key Concepts</text>
    <line x1="285" y1="318" x2="385" y2="318" stroke="#eee" stroke-width="1"/>
    <text x="285" y1="335" class="detail-text" fill="#4a5568">• Structured approach</text>
    <text x="285" y1="350" class="detail-text" fill="#4a5568">• Guidelines &amp; tools</text>
    <text x="285" y1="365" class="detail-text" fill="#4a5568">• Quality assurance</text>
  </g>
  
  <!-- Animated pulsing circles on connections -->
  <circle cx="210" cy="140" r="4" fill="#e6a35c" class="anim-pulse delay-3"/>
  <circle cx="260" cy="175" r="4" fill="#9a5a9a" class="anim-pulse delay-4"/>
  <circle cx="210" cy="260" r="4" fill="#6a6aaa" class="anim-pulse delay-5"/>
  <circle cx="165" cy="175" r="4" fill="#5a9a5a" class="anim-pulse delay-4"/>
</svg>