<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="evolutionary-process-prototyping-spiral">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eaf5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spiralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b8a9c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#98d4bb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes drawSpiral {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    .spiral-path { fill: none; stroke: url(#spiralGradient); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 1000; animation: drawSpiral 3s ease-out forwards; }
    .arrow { fill: none; stroke: #7f8c8d; stroke-width: 1.5; marker-end: url(#arrowhead); }
    .animate-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .animate-slide-left { animation: slideInLeft 0.8s ease-out forwards; opacity: 0; }
    .animate-slide-right { animation: slideInRight 0.8s ease-out forwards; opacity: 0; }
    .animate-slide-up { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animate-fade">Evolutionary Process &amp; Prototyping</text>
  <text x="210" y="50" text-anchor="middle" class="detail animate-fade delay-1">Software Development Life Cycle</text>
  
  <!-- Spiral Model Visualization -->
  <g transform="translate(210, 200)" class="animate-fade delay-2">
    <path d="M0,0 Q60,-20 80,30 Q100,80 40,90 Q-20,100 -60,50 Q-90,-10 -30,-60 Q30,-100 90,-60" 
          class="spiral-path" fill="none" stroke-width="5"/>
    
    <!-- Spiral center point -->
    <circle cx="0" cy="0" r="8" fill="#e74c3c" class="animate-pulse"/>
    <text x="0" y="3" text-anchor="middle" fill="white" font-size="8" font-weight="bold">★</text>
  </g>
  
  <!-- SDLC Phases arranged around spiral -->
  <!-- Planning -->
  <g transform="translate(60, 130)" class="animate-slide-left delay-3">
    <rect x="0" y="0" width="70" height="45" class="section-box" filter="url(#shadow)"/>
    <text x="35" y="18" text-anchor="middle" class="label">Planning</text>
    <text x="35" y="32" text-anchor="middle" class="detail">Project setup</text>
  </g>
  
  <!-- Analysis -->
  <g transform="translate(280, 130)" class="animate-slide-right delay-3">
    <rect x="0" y="0" width="70" height="45" class="section-box" filter="url(#shadow)"/>
    <text x="35" y="18" text-anchor="middle" class="label">Analysis</text>
    <text x="35" y="32" text-anchor="middle" class="detail">Requirements</text>
  </g>
  
  <!-- Design -->
  <g transform="translate(300, 280)" class="animate-slide-right delay-4">
    <rect x="0" y="0" width="70" height="45" class="section-box" filter="url(#shadow)"/>
    <text x="35" y="18" text-anchor="middle" class="label">Design</text>
    <text x="35" y="32" text-anchor="middle" class="detail">Architecture</text>
  </g>
  
  <!-- Implementation -->
  <g transform="translate(60, 280)" class="animate-slide-left delay-4">
    <rect x="0" y="0" width="90" height="45" class="section-box" filter="url(#shadow)"/>
    <text x="45" y="18" text-anchor="middle" class="label">Implementation</text>
    <text x="45" y="32" text-anchor="middle" class="detail">Coding phase</text>
  </g>
  
  <!-- Testing -->
  <g transform="translate(140, 340)" class="animate-slide-up delay-5">
    <rect x="0" y="0" width="65" height="45" class="section-box" filter="url(#shadow)"/>
    <text x="32" y="18" text-anchor="middle" class="label">Testing</text>
    <text x="32" y="32" text-anchor="middle" class="detail">QA checks</text>
  </g>
  
  <!-- Deployment -->
  <g transform="translate(210, 340)" class="animate-slide-up delay-5">
    <rect x="0" y="0" width="75" height="45" class="section-box" filter="url(#shadow)"/>
    <text x="37" y="18" text-anchor="middle" class="label">Deployment</text>
    <text x="37" y="32" text-anchor="middle" class="detail">Release</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g transform="translate(130, 65)" class="animate-fade delay-3">
    <rect x="0" y="0" width="160" height="50" fill="#fef3e2" stroke="#f5b041" stroke-width="1" rx="5"/>
    <text x="80" y="18" text-anchor="middle" class="label" fill="#d35400">Spiral Model</text>
    <text x="80" y="35" text-anchor="middle" class="detail">Risk Management Focus</text>
  </g>
  
  <!-- Evolutionary Process Box -->
  <g transform="translate(10, 200)" class="animate-slide-left delay-4">
    <rect x="0" y="0" width="110" height="60" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="55" y="18" text-anchor="middle" class="label" fill="#16a085">Evolutionary</text>
    <text x="55" y="35" text-anchor="middle" class="detail">Iterative &amp; Incremental</text>
    <text x="55" y="48" text-anchor="middle" class="detail">Continuous improvement</text>
  </g>
  
  <!-- Prototyping Box -->
  <g transform="translate(300, 200)" class="animate-slide-right delay-4">
    <rect x="0" y="0" width="110" height="60" fill="#f5eef8" stroke="#9b59b6" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="55" y="18" text-anchor="middle" class="label" fill="#8e44ad">Prototyping</text>
    <text x="55" y="35" text-anchor="middle" class="detail">Small-scale version</text>
    <text x="55" y="48" text-anchor="middle" class="detail">Iterative refinement</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g class="animate-fade delay-5">
    <path d="M95,160 Q140,180 145,175" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4"/>
    <path d="M325,160 Q280,180 275,175" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4"/>
    <path d="M115,260 Q130,290 155,330" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4"/>
    <path d="M305,260 Q290,290 265,330" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4"/>
  </g>
  
  <!-- Legend/Key -->
  <g transform="translate(150, 380)">
    <text x="60" y="10" text-anchor="middle" class="detail" fill="#7f8c8d">Iterative Cycles →</text>
  </g>
  
  <!-- Data narration elements (invisible for screen readers) -->
  <rect x="-10" y="-10" width="1" height="1" fill="transparent" data-narration="Evolutionary Process: Iterative and incremental development with continuous improvement through small changes"/>
  <rect x="-10" y="-10" width="1" height="1" fill="transparent" data-narration="Prototyping: Creating small-scale versions to test and refine functionality"/>
  <rect x="-10" y="-10" width="1" height="1" fill="transparent" data-narration="Spiral Model: Combines waterfall and prototyping with risk management focus"/>
  <rect x="-10" y="-10" width="1" height="1" fill="transparent" data-narration="SDLC Phases: Planning, Analysis, Design, Implementation, Testing, Deployment shown in spiral arrangement"/>
  <rect x="-10" y="-10" width="1" height="1" fill="transparent" data-narration="The spiral represents the iterative nature of all three development approaches"/>
</svg>