<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="agile-model-scrum" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roleGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81d4fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roleGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5d6a7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roleGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ab47bc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sprintGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffca28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backlogGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .rotate { animation: rotate 20s linear infinite; transform-origin: center; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1565c0; }
    .role-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .role-desc { font-family: Arial, sans-serif; font-size: 10px; fill: #fff; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #424242; }
    .detail { font-family: Arial, sans-serif; font-size: 9px; fill: #616161; }
    .box { opacity: 0; }
    .delay-1 { animation: fadeIn 0.6s ease-out 0.3s forwards; }
    .delay-2 { animation: fadeIn 0.6s ease-out 0.6s forwards; }
    .delay-3 { animation: fadeIn 0.6s ease-out 0.9s forwards; }
    .delay-4 { animation: slideIn 0.6s ease-out 1.2s forwards; }
    .delay-5 { animation: fadeIn 0.6s ease-out 1.5s forwards; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title slide-in">Scrum Framework</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#90caf9" stroke-width="2" class="fade-in delay-1"/>

  <!-- Product Backlog -->
  <g class="box delay-1" data-narration="Product Backlog: Prioritized list of features and requirements">
    <rect x="30" y="60" width="70" height="55" rx="6" fill="url(#backlogGradient)" filter="url(#shadow)"/>
    <text x="65" y="78" text-anchor="middle" class="label" style="font-weight:bold;">Product</text>
    <text x="65" y="90" text-anchor="middle" class="label" style="font-weight:bold;">Backlog</text>
    <text x="65" y="105" text-anchor="middle" class="detail">User Stories</text>
  </g>

  <!-- Arrow from Backlog to Product Owner -->
  <path d="M100 87 L135 87" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="fade-in delay-2"/>

  <!-- Product Owner -->
  <g class="box delay-2" data-narration="Product Owner: Defines features, prioritizes backlog, represents stakeholder interests">
    <rect x="135" y="55" width="85" height="70" rx="8" fill="url(#roleGradient1)" filter="url(#shadow)"/>
    <circle cx="177" cy="78" r="14" fill="#fff" opacity="0.9"/>
    <text x="177" y="82" text-anchor="middle" class="role-title" style="font-size:16px;">PO</text>
    <text x="177" y="100" text-anchor="middle" class="role-desc">Product Owner</text>
    <text x="177" y="112" text-anchor="middle" class="detail">Prioritizes</text>
    <text x="177" y="122" text-anchor="middle" class="detail">Backlog</text>
  </g>

  <!-- Arrow from PO to Sprint -->
  <path d="M220 90 L220 130 L260 130" stroke="#4fc3f7" stroke-width="2" fill="none" class="fade-in delay-3"/>

  <!-- Sprint Box -->
  <g class="box delay-3" data-narration="Sprint: 2-4 week iteration where potentially shippable product is created">
    <rect x="260" y="105" width="100" height="55" rx="8" fill="url(#sprintGradient)" filter="url(#shadow)"/>
    <text x="310" y="125" text-anchor="middle" class="label" style="font-weight:bold; font-size:13px;">SPRINT</text>
    <text x="310" y="140" text-anchor="middle" class="detail">2-4 Weeks</text>
    <text x="310" y="152" text-anchor="middle" class="detail">Time-boxed</text>
  </g>

  <!-- Development Team -->
  <g class="box delay-4" data-narration="Development Team: Cross-functional group that delivers potentially shippable product">
    <rect x="275" y="180" width="75" height="65" rx="8" fill="url(#roleGradient3)" filter="url(#shadow)"/>
    <circle cx="312" cy="200" r="12" fill="#fff" opacity="0.9"/>
    <text x="312" y="204" text-anchor="middle" class="role-title" style="font-size:14px; fill:#7b1fa2;">DEV</text>
    <text x="312" y="218" text-anchor="middle" class="role-desc" style="font-size:9px;">Dev Team</text>
    <text x="312" y="230" text-anchor="middle" class="detail">3-9 members</text>
    <text x="312" y="241" text-anchor="middle" class="detail">Cross-functional</text>
  </g>

  <!-- Scrum Master -->
  <g class="box delay-2" data-narration="Scrum Master: Facilitates process, removes impediments, coaches the team">
    <rect x="130" y="180" width="80" height="65" rx="8" fill="url(#roleGradient2)" filter="url(#shadow)"/>
    <circle cx="170" cy="200" r="12" fill="#fff" opacity="0.9"/>
    <text x="170" y="204" text-anchor="middle" class="role-title" style="font-size:14px; fill:#2e7d32;">SM</text>
    <text x="170" y="218" text-anchor="middle" class="role-desc" style="font-size:9px;">Scrum Master</text>
    <text x="170" y="230" text-anchor="middle" class="detail">Facilitator</text>
    <text x="170" y="241" text-anchor="middle" class="detail">Coach</text>
  </g>

  <!-- Daily Scrum -->
  <g class="box delay-5" data-narration="Daily Scrum: 15-minute daily meeting for team synchronization">
    <rect x="40" y="280" width="85" height="45" rx="6" fill="#b3e5fc" filter="url(#shadow)"/>
    <text x="82" y="298" text-anchor="middle" class="label" style="font-size:11px; font-weight:bold;">Daily Scrum</text>
    <text x="82" y="312" text-anchor="middle" class="detail">15 min daily</text>
  </g>

  <!-- Sprint Review -->
  <g class="box delay-5" data-narration="Sprint Review: Meeting at end of sprint to demonstrate completed work">
    <rect x="145" y="280" width="85" height="45" rx="6" fill="#c8e6c9" filter="url(#shadow)"/>
    <text x="187" y="298" text-anchor="middle" class="label" style="font-size:11px; font-weight:bold;">Sprint Review</text>
    <text x="187" y="312" text-anchor="middle" class="detail">Demo work</text>
  </g>

  <!-- Sprint Retrospective -->
  <g class="box delay-5" data-narration="Sprint Retrospective: Team reflects on sprint to improve process">
    <rect x="250" y="280" width="85" height="45" rx="6" fill="#e1bee7" filter="url(#shadow)"/>
    <text x="292" y="298" text-anchor="middle" class="label" style="font-size:11px; font-weight:bold;">Retrospective</text>
    <text x="292" y="312" text-anchor="middle" class="detail">Improve process</text>
  </g>

  <!-- Circular arrows showing sprint cycle -->
  <g class="pulse" style="transform-origin: 310px 130px;">
    <path d="M365 130 A55 55 0 0 1 310 185" stroke="#ffca28" stroke-width="3" fill="none" stroke-dasharray="5,3"/>
    <path d="M310 185 A55 55 0 0 1 255 130" stroke="#ffca28" stroke-width="3" fill="none" stroke-dasharray="5,3"/>
    <path d="M255 130 A55 55 0 0 1 310 75" stroke="#ffca28" stroke-width="3" fill="none" stroke-dasharray="5,3"/>
    <path d="M310 75 A55 55 0 0 1 365 130" stroke="#ffca28" stroke-width="3" fill="none" stroke-dasharray="5,3"/>
  </g>

  <!-- Arrow from Sprint to Meetings -->
  <path d="M310 160 L310 220 L82 220 L82 275" stroke="#78909c" stroke-width="1.5" fill="none" stroke-dasharray="4,2" class="fade-in delay-5"/>
  <path d="M187 160 L187 220 L187 275" stroke="#78909c" stroke-width="1.5" fill="none" stroke-dasharray="4,2" class="fade-in delay-5"/>
  <path d="M292 160 L292 220 L292 275" stroke="#78909c" stroke-width="1.5" fill="none" stroke-dasharray="4,2" class="fade-in delay-5"/>

  <!-- Back to backlog arrow -->
  <path d="M40 320 L40 350 L65 350" stroke="#78909c" stroke-width="1" fill="none" stroke-dasharray="3,2" class="fade-in delay-5"/>
  <text x="35" y="365" class="detail" style="font-size:8px;">Continuous</text>
  <text x="35" y="375" class="detail" style="font-size:8px;">Improvement</text>

  <!-- Key Principles -->
  <g class="box delay-4" data-narration="Four Agile Principles: Individuals over processes, Working software over docs, Customer collaboration, Responding to change">
    <rect x="330" y="330" width="80" height="60" rx="5" fill="#fff9c4" stroke="#fff176" stroke-width="1" filter="url(#shadow)"/>
    <text x="370" y="345" text-anchor="middle" class="label" style="font-size:9px; font-weight:bold;">Agile Values</text>
    <text x="370" y="357" text-anchor="middle" class="detail" style="font-size:7px;">Individuals &gt; Process</text>
    <text x="370" y="367" text-anchor="middle" class="detail" style="font-size:7px;">Working Software</text>
    <text x="370" y="377" text-anchor="middle" class="detail" style="font-size:7px;">Collaboration</text>
    <text x="370" y="387" text-anchor="middle" class="detail" style="font-size:7px;">Respond to Change</text>
  </g>

</svg>