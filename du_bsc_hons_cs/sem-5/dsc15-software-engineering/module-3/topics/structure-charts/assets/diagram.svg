<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="structure-charts">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c5282; }
    .module-box { fill: url(#boxGradient); stroke: #4299e1; stroke-width: 2; rx: 8; }
    .submodule-box { fill: url(#boxGradient); stroke: #48bb78; stroke-width: 1.5; rx: 6; }
    .concept-box { fill: #fffaf0; stroke: #ed8936; stroke-width: 1.5; rx: 5; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .module-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; font-weight: 600; fill: #2d3748; }
    .arrow { stroke: #718096; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .title-anim { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .box-anim { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .arrow-anim { animation: drawLine 0.8s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .concept-anim { animation: fadeIn 0.7s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#718096" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Structure Charts</text>
  
  <!-- Main Module -->
  <g class="box-anim delay-1" data-narration="The main module represents the top-level control of the system">
    <rect x="145" y="50" width="130" height="35" class="module-box" filter="url(#shadow)" />
    <text x="210" y="72" text-anchor="middle" class="module-label">Banking System</text>
  </g>
  
  <!-- Arrow from Main to Auth -->
  <line x1="175" y1="85" x2="175" y2="115" class="arrow arrow-anim delay-2" />
  <line x1="160" y1="115" x2="190" y2="115" class="arrow arrow-anim delay-2" />
  <line x1="175" y1="115" x2="175" y2="125" class="arrow arrow-anim delay-2" />
  
  <!-- Arrow from Main to Account -->
  <line x1="210" y1="85" x2="210" y2="115" class="arrow arrow-anim delay-2" />
  <line x1="210" y1="115" x2="210" y2="125" class="arrow arrow-anim delay-2" />
  
  <!-- Arrow from Main to Transaction -->
  <line x1="245" y1="85" x2="245" y2="115" class="arrow arrow-anim delay-2" />
  <line x1="230" y1="115" x2="260" y2="115" class="arrow arrow-anim delay-2" />
  <line x1="245" y1="115" x2="245" y2="125" class="arrow arrow-anim delay-2" />
  
  <!-- Level 1 Modules -->
  <g class="box-anim delay-2" data-narration="Level 1 modules show the main functional areas: Authentication, Account Management, and Transaction Processing">
    <rect x="100" y="125" width="70" height="30" class="submodule-box" filter="url(#shadow)" />
    <text x="135" y="145" text-anchor="middle" class="module-label">Auth</text>
  </g>
  
  <g class="box-anim delay-2" data-narration="Account Management handles all account-related operations">
    <rect x="175" y="125" width="70" height="30" class="submodule-box" filter="url(#shadow)" />
    <text x="210" y="145" text-anchor="middle" class="module-label">Account</text>
  </g>
  
  <g class="box-anim delay-2" data-narration="Transaction Processing handles deposits, withdrawals, and transfers">
    <rect x="250" y="125" width="70" height="30" class="submodule-box" filter="url(#shadow)" />
    <text x="285" y="145" text-anchor="middle" class="module-label">Transactions</text>
  </g>
  
  <!-- Arrows to Level 2 -->
  <line x1="135" y1="155" x2="135" y2="170" class="arrow arrow-anim delay-3" />
  <line x1="120" y1="170" x2="150" y2="170" class="arrow arrow-anim delay-3" />
  <line x1="135" y1="170" x2="135" y2="180" class="arrow arrow-anim delay-3" />
  
  <line x1="285" y1="155" x2="285" y2="170" class="arrow arrow-anim delay-3" />
  <line x1="270" y1="170" x2="300" y2="170" class="arrow arrow-anim delay-3" />
  <line x1="285" y1="170" x2="285" y2="180" class="arrow arrow-anim delay-3" />
  
  <!-- Level 2 Modules -->
  <g class="box-anim delay-3" data-narration="Sub-modules show detailed functionality within each main module">
    <rect x="100" y="180" width="70" height="25" class="submodule-box" filter="url(#shadow)" />
    <text x="135" y="196" text-anchor="middle" class="module-label">Validate</text>
  </g>
  
  <g class="box-anim delay-3" data-narration="Validate User checks credentials">
    <rect x="100" y="205" width="70" height="25" class="submodule-box" filter="url(#shadow)" />
    <text x="135" y="221" text-anchor="middle" class="module-label">Check Pwd</text>
  </g>
  
  <g class="box-anim delay-3" data-narration="Withdraw and Deposit are transaction operations">
    <rect x="250" y="180" width="70" height="25" class="submodule-box" filter="url(#shadow)" />
    <text x="285" y="196" text-anchor="middle" class="module-label">Withdraw</text>
  </g>
  
  <g class="box-anim delay-3" data-narration="Deposit handles adding funds to accounts">
    <rect x="250" y="205" width="70" height="25" class="submodule-box" filter="url(#shadow)" />
    <text x="285" y="221" text-anchor="middle" class="module-label">Deposit</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="concept-anim delay-4" data-narration="Key Concepts: Module, Control Flow, Data Flow, Coupling, Cohesion">
    <rect x="15" y="260" width="390" height="130" class="concept-box" filter="url(#shadow)" />
    <text x="210" y="280" text-anchor="middle" class="module-label" style="font-size: 12px; fill: #c05621;">Key Concepts</text>
    
    <!-- Concept 1: Module -->
    <rect x="25" y="290" width="115" height="22" fill="#fff" stroke="#ecc94b" rx="3" />
    <text x="35" y="303" class="label" style="font-size: 10px; font-weight: bold;">Module:</text>
    <text x="35" y="308" class="label" style="font-size: 9px;">Self-contained unit</text>
    
    <!-- Concept 2: Control Flow -->
    <rect x="145" y="290" width="125" height="22" fill="#fff" stroke="#ecc94b" rx="3" />
    <text x="155" y="303" class="label" style="font-size: 10px; font-weight: bold;">Control Flow:</text>
    <text x="155" y="308" class="label" style="font-size: 9px;">Execution order</text>
    
    <!-- Concept 3: Data Flow -->
    <rect x="275" y="290" width="120" height="22" fill="#fff" stroke="#ecc94b" rx="3" />
    <text x="285" y="303" class="label" style="font-size: 10px; font-weight: bold;">Data Flow:</text>
    <text x="285" y="308" class="label" style="font-size: 9px;">Data between modules</text>
    
    <!-- Concept 4: Coupling -->
    <rect x="25" y="318" width="115" height="22" fill="#fff" stroke="#9ae6b4" rx="3" />
    <text x="35" y="331" class="label" style="font-size: 10px; font-weight: bold;">Coupling:</text>
    <text x="35" y="336" class="label" style="font-size: 9px;">Module dependence</text>
    
    <!-- Concept 5: Cohesion -->
    <rect x="145" y="318" width="125" height="22" fill="#fff" stroke="#9ae6b4" rx="3" />
    <text x="155" y="331" class="label" style="font-size: 10px; font-weight: bold;">Cohesion:</text>
    <text x="155" y="336" class="label" style="font-size: 9px;">Single responsibility</text>
    
    <!-- Concept 6: Hierarchy -->
    <rect x="275" y="318" width="120" height="22" fill="#fff" stroke="#9ae6b4" rx="3" />
    <text x="285" y="331" class="label" style="font-size: 10px; font-weight: bold;">Hierarchy:</text>
    <text x="285" y="336" class="label" style="font-size: 9px;">Top-down structure</text>
  </g>
  
  <!-- Legend/Notation Guide -->
  <g class="concept-anim delay-4">
    <text x="210" y="255" text-anchor="middle" class="label" style="font-size: 10px; fill: #718096;">■ Main Module  ■ Sub-Module  ■ Child Module</text>
  </g>
</svg>