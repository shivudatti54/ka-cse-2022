<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="requirements-to-design-model" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#7bc49a"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c89e"/>
      <stop offset="100%" style="stop-color:#d4b07a"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b8e9f"/>
      <stop offset="100%" style="stop-color:#8aaab8"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .box2 { animation: slideInUp 0.8s ease-out 0.4s both; }
    .box3 { animation: slideInRight 0.8s ease-out 0.6s both; }
    .box4 { animation: slideInLeft 0.8s ease-out 0.8s both; }
    .concept-box { animation: fadeIn 1s ease-out 1s both; }
    .arrow { animation: drawLine 1.5s ease-out 1.2s both; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3a5a70" class="title">Requirements to Design Model</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#7eb8da" stroke-width="2" class="title"/>
  
  <!-- Main Flow Boxes -->
  <!-- Requirements Box -->
  <g class="box1" data-narration="Requirements are gathered from stakeholders to define what the software should do">
    <rect x="20" y="55" width="95" height="50" rx="8" fill="url(#boxGradient1)" stroke="#4a7a94" stroke-width="1.5"/>
    <text x="67" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Requirements</text>
    <text x="67" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Gathering</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="115" y1="80" x2="145" y2="80" stroke="url(#arrowGradient)" stroke-width="2" class="arrow"/>
  <polygon points="145,75 155,80 145,85" fill="#8aaab8"/>
  
  <!-- Analysis Box -->
  <g class="box2" data-narration="Requirements Analysis identifies functional and non-functional requirements, inconsistencies, and priorities">
    <rect x="155" y="55" width="95" height="50" rx="8" fill="url(#boxGradient2)" stroke="#5a9c7a" stroke-width="1.5"/>
    <text x="202" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Analysis</text>
    <text x="202" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Prioritization</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="250" y1="80" x2="280" y2="80" stroke="url(#arrowGradient)" stroke-width="2" class="arrow"/>
  <polygon points="280,75 290,80 280,85" fill="#8aaab8"/>
  
  <!-- Design Principles Box -->
  <g class="box3" data-narration="Design Principles guide the design: Separation of Concerns, Abstraction, Modularity">
    <rect x="290" y="55" width="110" height="50" rx="8" fill="url(#boxGradient3)" stroke="#b8956a" stroke-width="1.5"/>
    <text x="345" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Design</text>
    <text x="345" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Principles</text>
  </g>
  
  <!-- Functional vs Non-Functional Box -->
  <g class="box4" data-narration="Functional requirements define what the system does; Non-functional define how it performs">
    <rect x="20" y="120" width="180" height="45" rx="6" fill="#f5f5f5" stroke="#aaa" stroke-width="1"/>
    <text x="110" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a5a6a">Functional vs Non-Functional</text>
    <text x="110" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">What it does | How it performs</text>
  </g>
  
  <!-- Design Patterns Box -->
  <g class="box1" data-narration="Design Patterns provide reusable solutions: Creational, Structural, and Behavioral patterns">
    <rect x="220" y="120" width="180" height="45" rx="6" fill="#f5f5f5" stroke="#aaa" stroke-width="1"/>
    <text x="310" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a5a6a">Design Patterns</text>
    <text x="310" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Creational | Structural | Behavioral</text>
  </g>
  
  <!-- Key Concept Boxes - Design Principles Detail -->
  <g class="concept-box" data-narration="Separation of Concerns divides software into distinct modules for better maintainability">
    <rect x="20" y="180" width="120" height="38" rx="5" fill="#d4e8f0" stroke="#7eb8da" stroke-width="1"/>
    <text x="80" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3a5a70">SoC</text>
    <text x="80" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a7a8a">Separation of Concerns</text>
  </g>
  
  <g class="concept-box" data-narration="Abstraction hides implementation details to improve simplicity and flexibility">
    <rect x="150" y="180" width="120" height="38" rx="5" fill="#d4e8f0" stroke="#7eb8da" stroke-width="1"/>
    <text x="210" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3a5a70">Abstraction</text>
    <text x="210" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a7a8a">Hide Implementation</text>
  </g>
  
  <g class="concept-box" data-narration="Modularity breaks software into smaller modules for reusability and maintainability">
    <rect x="280" y="180" width="120" height="38" rx="5" fill="#d4e8f0" stroke="#7eb8da" stroke-width="1"/>
    <text x="340" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3a5a70">Modularity</text>
    <text x="340" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a7a8a">Break into Modules</text>
  </g>
  
  <!-- Output Section -->
  <g class="box2" data-narration="The output is a detailed design ready for implementation">
    <rect x="130" y="235" width="160" height="40" rx="8" fill="url(#boxGradient1)" stroke="#4a7a94" stroke-width="1.5" class="pulse-element"/>
    <text x="210" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Design Output</text>
    <text x="210" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Ready for Implementation</text>
  </g>
  
  <!-- Stakeholders Role -->
  <g class="box3" data-narration="Stakeholders provide requirements and feedback throughout the design phase">
    <rect x="20" y="290" width="130" height="40" rx="6" fill="#e8d8c0" stroke="#b8956a" stroke-width="1"/>
    <text x="85" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6a5a4a">Stakeholders</text>
    <text x="85" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7a6a5a">Provide Feedback</text>
  </g>
  
  <!-- Goal -->
  <g class="box4" data-narration="The main goal is to transform requirements into a detailed, feasible design">
    <rect x="270" y="290" width="130" height="40" rx="6" fill="#d8e8d8" stroke="#7aba7a" stroke-width="1"/>
    <text x="335" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a6a4a">Main Goal</text>
    <text x="335" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a7a5a">Detailed Design</text>
  </g>
  
  <!-- Bottom SDLC Elements -->
  <g class="concept-box" data-narration="Software Development Life Cycle phases shown for context">
    <rect x="20" y="345" width="380" height="40" rx="5" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="50" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4a7a94">Requirements</text>
    <text x="120" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#6a9a74">Design</text>
    <text x="190" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#9a8a6a">Implementation</text>
    <text x="275" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#8a6a8a">Testing</text>
    <text x="355" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#6a7a8a">Maintenance</text>
    <!-- Phase arrows -->
    <line x1="75" y1="360" x2="105" y2="360" stroke="#aaa" stroke-width="1"/>
    <line x1="145" y1="360" x2="175" y2="360" stroke="#aaa" stroke-width="1"/>
    <line x1="215" y1="360" x2="255" y2="360" stroke="#aaa" stroke-width="1"/>
    <line x1="295" y1="360" x2="335" y2="360" stroke="#aaa" stroke-width="1"/>
    <circle cx="50" cy="360" r="6" fill="#4a7a94"/>
    <circle cx="120" cy="360" r="6" fill="#6a9a74"/>
    <circle cx="190" cy="360" r="6" fill="#9a8a6a"/>
    <circle cx="275" cy="360" r="6" fill="#8a6a8a"/>
    <circle cx="355" cy="360" r="6" fill="#6a7a8a"/>
  </g>
</svg>