<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="abstraction-modularity-independence">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e8f8f0"/>
      <stop offset="100%" style="stop-color:#f5e8fc"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fb8d4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8c8"/>
      <stop offset="100%" style="stop-color:#8fd48f"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c8e8"/>
      <stop offset="100%" style="stop-color:#a88fd4"/>
    </linearGradient>
    <linearGradient id="layerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e8f0"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .box { rx: 8; ry: 8; stroke: #555; stroke-width: 1.5; }
    .layer { rx: 4; ry: 4; stroke: #888; stroke-width: 1; }
    .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .connection { stroke: #888; stroke-width: 1; stroke-dasharray: 4,2; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .anim-slide-up { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; opacity: 0; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Abstraction, Modularity &amp; Independence</text>
  
  <!-- ABSTRACTION Section (Left) -->
  <g transform="translate(20, 55)" data-narration="Abstraction hides complex details behind simple interfaces">
    <rect x="0" y="0" width="115" height="145" fill="url(#boxGradient1)" class="box anim-slide-up" style="animation-delay: 0.2s"/>
    <text x="57" y="20" text-anchor="middle" class="label">ABSTRACTION</text>
    
    <!-- Abstraction Layers -->
    <rect x="15" y="35" width="85" height="22" fill="url(#layerGradient)" class="layer anim-slide-up" style="animation-delay: 0.4s"/>
    <text x="57" y="50" text-anchor="middle" class="detail" style="font-weight:bold">Interface</text>
    
    <rect x="15" y="62" width="85" height="22" fill="url(#layerGradient)" class="layer anim-slide-up" style="animation-delay: 0.5s"/>
    <text x="57" y="77" text-anchor="middle" class="detail">Abstract Class</text>
    
    <rect x="15" y="89" width="85" height="22" fill="url(#layerGradient)" class="layer anim-slide-up" style="animation-delay: 0.6s"/>
    <text x="57" y="104" text-anchor="middle" class="detail">Implementation</text>
    
    <!-- Down arrow -->
    <line x1="57" y1="115" x2="57" y2="128" class="arrow" style="stroke-dasharray: 100; animation: drawLine 0.5s ease-out forwards; animation-delay: 0.8s"/>
  </g>
  
  <!-- MODULARITY Section (Center) -->
  <g transform="translate(150, 55)" data-narration="Modularity divides system into independent reusable components">
    <rect x="0" y="0" width="115" height="145" fill="url(#boxGradient2)" class="box anim-slide-up" style="animation-delay: 0.3s"/>
    <text x="57" y="20" text-anchor="middle" class="label">MODULARITY</text>
    
    <!-- Module boxes -->
    <rect x="10" y="35" width="40" height="30" fill="#fff" stroke="#5a8f5a" stroke-width="1.5" rx="3" class="anim-slide-left" style="animation-delay: 0.5s"/>
    <text x="30" y="52" text-anchor="middle" class="detail">Module A</text>
    
    <rect x="65" y="35" width="40" height="30" fill="#fff" stroke="#5a8f5a" stroke-width="1.5" rx="3" class="anim-slide-right" style="animation-delay: 0.5s"/>
    <text x="85" y="52" text-anchor="middle" class="detail">Module B</text>
    
    <rect x="10" y="75" width="40" height="30" fill="#fff" stroke="#5a8f5a" stroke-width="1.5" rx="3" class="anim-slide-left" style="animation-delay: 0.6s"/>
    <text x="30" y="92" text-anchor="middle" class="detail">Module C</text>
    
    <rect x="65" y="75" width="40" height="30" fill="#fff" stroke="#5a8f5a" stroke-width="1.5" rx="3" class="anim-slide-right" style="animation-delay: 0.6s"/>
    <text x="85" y="92" text-anchor="middle" class="detail">Module D</text>
    
    <!-- Connection lines -->
    <path d="M 55 50 L 60 50 L 60 90 L 55 90" class="connection anim-fade" style="animation-delay: 0.8s"/>
  </g>
  
  <!-- INDEPENDENCE Section (Right) -->
  <g transform="translate(280, 55)" data-narration="Independence ensures components work standalone without dependencies">
    <rect x="0" y="0" width="115" height="145" fill="url(#boxGradient3)" class="box anim-slide-up" style="animation-delay: 0.4s"/>
    <text x="57" y="20" text-anchor="middle" class="label">INDEPENDENCE</text>
    
    <!-- Independent components -->
    <circle cx="35" cy="55" r="18" fill="#fff" stroke="#7a5fa8" stroke-width="1.5" class="anim-pulse" style="animation-delay: 0.6s"/>
    <text x="35" y="59" text-anchor="middle" class="detail">A</text>
    
    <circle cx="80" cy="55" r="18" fill="#fff" stroke="#7a5fa8" stroke-width="1.5" class="anim-pulse" style="animation-delay: 0.7s"/>
    <text x="80" y="59" text-anchor="middle" class="detail">B</text>
    
    <circle cx="35" cy="100" r="18" fill="#fff" stroke="#7a5fa8" stroke-width="1.5" class="anim-pulse" style="animation-delay: 0.8s"/>
    <text x="35" y="104" text-anchor="middle" class="detail">C</text>
    
    <circle cx="80" cy="100" r="18" fill="#fff" stroke="#7a5fa8" stroke-width="1.5" class="anim-pulse" style="animation-delay: 0.9s"/>
    <text x="80" y="104" text-anchor="middle" class="detail">D</text>
    
    <!-- X marks showing no coupling -->
    <text x="57" y="128" text-anchor="middle" class="detail" style="font-style:italic">No coupling</text>
  </g>
  
  <!-- Connecting arrows between sections -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Arrow from Abstraction to Modularity -->
  <path d="M 138 127 Q 170 127 147 127" class="arrow" style="stroke-dasharray: 100; animation: drawLine 0.5s ease-out forwards; animation-delay: 1s"/>
  
  <!-- Arrow from Modularity to Independence -->
  <path d="M 268 127 Q 295 127 273 127" class="arrow" style="stroke-dasharray: 100; animation: drawLine 0.5s ease-out forwards; animation-delay: 1.1s"/>
  
  <!-- Bottom concept boxes -->
  <g transform="translate(20, 215)" data-narration="Key benefits: reduced complexity, improved maintainability, enhanced reusability">
    <rect x="0" y="0" width="375" height="60" fill="#fff" stroke="#aaa" stroke-width="1" rx="5" class="anim-fade" style="animation-delay: 1.2s"/>
    <text x="187" y="18" text-anchor="middle" class="label" style="font-size:13px">Key Benefits</text>
    <text x="30" y="38" class="detail">• Reduce Complexity</text>
    <text x="150" y="38" class="detail">• Improve Maintainability</text>
    <text x="280" y="38" class="detail">• Enhance Reusability</text>
  </g>
  
  <!-- Inheritance visualization -->
  <g transform="translate(80, 290)" data-narration="Inheritance allows abstract classes to define interfaces that concrete classes implement">
    <rect x="0" y="0" width="260" height="95" fill="none" stroke="#ccc" stroke-width="1" rx="5" class="anim-fade" style="animation-delay: 1.4s"/>
    <text x="130" y="18" text-anchor="middle" class="label" style="font-size:12px">Inheritance &amp; Implementation</text>
    
    <!-- Class hierarchy -->
    <rect x="20" y="30" width="60" height="20" fill="#d4e8f5" stroke="#5a9fd4" rx="3" class="anim-slide-up" style="animation-delay: 1.5s"/>
    <text x="50" y="44" text-anchor="middle" class="detail" style="font-size:10px">Animal</text>
    
    <rect x="100" y="30" width="60" height="20" fill="#d4e8f5" stroke="#5a9fd4" rx="3" class="anim-slide-up" style="animation-delay: 1.6s"/>
    <text x="130" y="44" text-anchor="middle" class="detail" style="font-size:10px">Dog</text>
    
    <rect x="180" y="30" width="60" height="20" fill="#d4e8f5" stroke="#5a9fd4" rx="3" class="anim-slide-up" style="animation-delay: 1.7s"/>
    <text x="210" y="44" text-anchor="middle" class="detail" style="font-size:10px">Cat</text>
    
    <!-- Inheritance arrows -->
    <line x1="50" y1="50" x2="130" y2="50" class="arrow" style="stroke-width:1; animation-delay: 1.8s"/>
    <line x1="50" y1="50" x2="210" y2="50" class="arrow" style="stroke-width:1; animation-delay: 1.9s"/>
    
    <text x="130" y="75" text-anchor="middle" class="detail" style="font-size:9px">extends</text>
    
    <!-- Interface -->
    <rect x="30" y="68" width="50" height="18" fill="#e8d4f5" stroke="#9d6fd4" rx="3" class="anim-slide-up" style="animation-delay: 2s"/>
    <text x="55" y="80" text-anchor="middle" class="detail" style="font-size:9px">interface</text>
    
    <rect x="90" y="68" width="50" height="18" fill="#e8d4f5" stroke="#9d6fd4" rx="3" class="anim-slide-up" style="animation-delay: 2.1s"/>
    <text x="115" y="80" text-anchor="middle" class="detail" style="font-size:9px">implements</text>
  </g>
</svg>