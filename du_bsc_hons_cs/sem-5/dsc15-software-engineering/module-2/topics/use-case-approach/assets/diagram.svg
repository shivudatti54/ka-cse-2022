<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="use-case-approach">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="actorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a9cc7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="useCaseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#98d4bb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5cb89a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box3 { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box4 { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .diagram-area { animation: fadeIn 0.8s ease-out 0.6s forwards; opacity: 0; }
    .actor { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .connection { stroke-dasharray: 8,4; animation: dash 1s linear forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5aa0" class="title">Use Case Approach</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#4a9cc7" stroke-width="2" class="title"/>
  
  <!-- Key Concept Boxes -->
  <!-- Box 1: Actors -->
  <g class="box1" data-narration="Actors are users or entities that interact with the system">
    <rect x="10" y="55" width="95" height="50" rx="6" ry="6" fill="url(#boxGradient)" stroke="#7eb8da" stroke-width="2" filter="url(#shadow)"/>
    <text x="57" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c5aa0">ACTORS</text>
    <text x="57" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Users/Systems</text>
  </g>
  
  <!-- Box 2: Use Cases -->
  <g class="box2" data-narration="Use Cases describe specific ways users interact with the system">
    <rect x="315" y="55" width="95" height="50" rx="6" ry="6" fill="url(#boxGradient)" stroke="#5cb89a" stroke-width="2" filter="url(#shadow)"/>
    <text x="362" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c5aa0">USE CASES</text>
    <text x="362" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">System Functions</text>
  </g>
  
  <!-- Box 3: Use Case Diagram -->
  <g class="box3" data-narration="Use Case Diagrams visualize relationships between actors and use cases">
    <rect x="10" y="115" width="95" height="50" rx="6" ry="6" fill="url(#boxGradient)" stroke="#b8a4d4" stroke-width="2" filter="url(#shadow)"/>
    <text x="57" y="132" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5aa0">USE CASE</text>
    <text x="57" y="147" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c5aa0">DIAGRAM</text>
  </g>
  
  <!-- Box 4: Use Case Description -->
  <g class="box4" data-narration="Use Case Descriptions detail goals, events, and conditions">
    <rect x="315" y="115" width="95" height="50" rx="6" ry="6" fill="url(#boxGradient)" stroke="#e8a4b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="362" y="132" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c5aa0">USE CASE</text>
    <text x="362" y="147" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c5aa0">DESCRIPTION</text>
  </g>
  
  <!-- Use Case Diagram Area -->
  <g class="diagram-area" data-narration="This diagram shows an actor interacting with use cases to achieve system goals">
    <rect x="105" y="170" width="210" height="210" rx="8" ry="8" fill="#ffffff" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
    
    <!-- Actor (Customer) -->
    <g class="actor" transform="translate(130, 200)">
      <ellipse cx="20" cy="12" rx="12" ry="14" fill="url(#actorGradient)"/>
      <line x1="20" y1="26" x2="20" y2="55" stroke="#4a9cc7" stroke-width="3"/>
      <line x1="20" y1="32" x2="5" y2="45" stroke="#4a9cc7" stroke-width="3"/>
      <line x1="20" y1="32" x2="35" y2="45" stroke="#4a9cc7" stroke-width="3"/>
      <line x1="20" y1="55" x2="8" y2="80" stroke="#4a9cc7" stroke-width="3"/>
      <line x1="20" y1="55" x2="32" y2="80" stroke="#4a9cc7" stroke-width="3"/>
      <text x="20" y="95" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c5aa0">Customer</text>
    </g>
    
    <!-- Actor (System) -->
    <g class="actor" transform="translate(260, 200)">
      <ellipse cx="20" cy="12" rx="12" ry="14" fill="url(#actorGradient)"/>
      <line x1="20" y1="26" x2="20" y2="55" stroke="#4a9cc7" stroke-width="3"/>
      <line x1="20" y1="32" x2="5" y2="45" stroke="#4a9cc7" stroke-width="3"/>
      <line x1="20" y1="32" x2="35" y2="45" stroke="#4a9cc7" stroke-width="3"/>
      <line x1="20" y1="55" x2="8" y2="80" stroke="#4a9cc7" stroke-width="3"/>
      <line x1="20" y1="55" x2="32" y2="80" stroke="#4a9cc7" stroke-width="3"/>
      <text x="20" y="95" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c5aa0">System</text>
    </g>
    
    <!-- Use Case Ovals -->
    <!-- Use Case 1: Browse Products -->
    <ellipse cx="170" cy="220" rx="45" ry="20" fill="url(#useCaseGradient)" stroke="#3d9a7a" stroke-width="2" filter="url(#shadow)"/>
    <text x="170" y="224" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Browse</text>
    <text x="170" y="236" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Products</text>
    
    <!-- Use Case 2: Add to Cart -->
    <ellipse cx="210" cy="275" rx="45" ry="20" fill="url(#useCaseGradient)" stroke="#3d9a7a" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="279" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Add to</text>
    <text x="210" y="291" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Cart</text>
    
    <!-- Use Case 3: Checkout -->
    <ellipse cx="170" cy="330" rx="45" ry="20" fill="url(#useCaseGradient)" stroke="#3d9a7a" stroke-width="2" filter="url(#shadow)"/>
    <text x="170" y="334" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Checkout</text>
    
    <!-- Connection Lines -->
    <line x1="150" y1="230" x2="170" y2="225" stroke="#888" stroke-width="2" class="connection" stroke-dasharray="5,3"/>
    <line x1="190" y1="240" x2="190" y2="260" stroke="#888" stroke-width="2" class="connection" stroke-dasharray="5,3"/>
    <line x1="185" y1="280" x2="165" y2="315" stroke="#888" stroke-width="2" class="connection" stroke-dasharray="5,3"/>
    <line x1="280" y1="230" x2="215" y2="225" stroke="#888" stroke-width="2" class="connection" stroke-dasharray="5,3"/>
    
    <!-- Relationship Arrows -->
    <polygon points="170,200 175,210 165,210" fill="#555"/>
    <line x1="170" y1="190" x2="170" y2="200" stroke="#555" stroke-width="2"/>
    
    <polygon points="215,275 220,285 210,285" fill="#555"/>
    <line x1="215" y1="265" x2="215" y2="275" stroke="#555" stroke-width="2"/>
  </g>
  
  <!-- Legend -->
  <g class="diagram-area">
    <text x="320" y="355" font-family="Arial" font-size="8" fill="#666">Oval = Use Case</text>
    <rect x="315" y="345" width="12" height="12" rx="2" fill="#98d4bb" stroke="#3d9a7a"/>
    
    <text x="220" y="390" font-family="Arial" font-size="8" fill="#666">Stick Figure = Actor</text>
  </g>
  
  <!-- Arrow indicators between concept boxes -->
  <g class="box2">
    <path d="M 110 80 L 305 80" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Info at bottom -->
  <text x="210" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#777" class="diagram-area">Introduced by Ivar Jacobson, 1980s</text>
</svg>