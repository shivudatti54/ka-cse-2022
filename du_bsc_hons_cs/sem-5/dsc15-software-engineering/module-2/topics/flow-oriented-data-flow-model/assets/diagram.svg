<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="flow-oriented-data-flow-model">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2dce4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="entityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5a2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7cb878;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="storeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d5a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c378;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateX(-20px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .section-box { fill: rgba(255,255,255,0.85); stroke: #a0aec0; stroke-width: 1; rx: 8; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .data-flow { stroke: #666; stroke-width: 2; fill: none; stroke-dasharray: 8,4; animation: flowDash 1s linear infinite; }
    .process { fill: url(#processGradient); stroke: #4a7fa8; stroke-width: 2; cursor: pointer; }
    .entity { fill: url(#entityGradient); stroke: #5a9656; stroke-width: 2; }
    .store { fill: url(#storeGradient); stroke: #c49a48; stroke-width: 2; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Flow-Oriented Data Flow Model</text>
  
  <!-- External Entity: Customer -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="External Entity: Customer - The source of data entering the system">
    <rect x="30" y="80" width="70" height="45" class="entity" rx="4" />
    <text x="65" y="95" text-anchor="middle" class="label">Customer</text>
    <text x="65" y="115" text-anchor="middle" class="detail">External Entity</text>
  </g>
  
  <!-- Process 1: Receive Order -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="Process 1: Receive Order - Transforms customer input into order data">
    <ellipse cx="150" cy="102" rx="45" ry="30" class="process pulse" />
    <text x="150" y="98" text-anchor="middle" class="label">Receive</text>
    <text x="150" y="113" text-anchor="middle" class="label">Order</text>
    <text x="150" y="128" text-anchor="middle" class="detail">Process</text>
  </g>
  
  <!-- Data Store: Order Database -->
  <g class="slide-in" style="animation-delay: 0.6s" data-narration="Data Store: Order Database - Stores order information within the system">
    <rect x="240" y="70" width="80" height="50" class="store" />
    <line x1="245" y1="70" x2="245" y2="120" stroke="#c49a48" stroke-width="2" />
    <line x1="315" y1="70" x2="315" y2="120" stroke="#c49a48" stroke-width="2" />
    <text x="280" y="95" text-anchor="middle" class="label">Order</text>
    <text x="280" y="110" text-anchor="middle" class="label">Database</text>
    <text x="280" y="125" text-anchor="middle" class="detail">Data Store</text>
  </g>
  
  <!-- Process 2: Process Payment -->
  <g class="slide-in" style="animation-delay: 0.8s" data-narration="Process 2: Process Payment - Validates and processes payment information">
    <ellipse cx="150" y="200" rx="45" ry="30" class="process pulse" style="animation-delay: 1s" />
    <text x="150" y="196" text-anchor="middle" class="label">Process</text>
    <text x="150" y="211" text-anchor="middle" class="label">Payment</text>
    <text x="150" y="226" text-anchor="middle" class="detail">Process</text>
  </g>
  
  <!-- External Entity: Bank -->
  <g class="slide-in" style="animation-delay: 1s" data-narration="External Entity: Bank - External system for payment verification">
    <rect x="290" y="180" width="70" height="45" class="entity" rx="4" />
    <text x="325" y="195" text-anchor="middle" class="label">Bank</text>
    <text x="325" y="215" text-anchor="middle" class="detail">External Entity</text>
  </g>
  
  <!-- Process 3: Ship Product -->
  <g class="slide-in" style="animation-delay: 1.2s" data-narration="Process 3: Ship Product - Prepares and ships the ordered product">
    <ellipse cx="150" cy="300" rx="45" ry="30" class="process pulse" style="animation-delay: 1.5s" />
    <text x="150" y="296" text-anchor="middle" class="label">Ship</text>
    <text x="150" y="311" text-anchor="middle" class="label">Product</text>
    <text x="150" y="326" text-anchor="middle" class="detail">Process</text>
  </g>
  
  <!-- External Entity: Shipping Co -->
  <g class="slide-in" style="animation-delay: 1.4s" data-narration="External Entity: Shipping Company - Delivers products to customers">
    <rect x="290" y="280" width="70" height="45" class="entity" rx="4" />
    <text x="325" y="295" text-anchor="middle" class="label">Shipping</text>
    <text x="325" y="315" text-anchor="middle" class="label">Co.</text>
  </g>
  
  <!-- Data Flows (Arrows) -->
  <g class="fade-in" style="animation-delay: 1.6s" data-narration="Data Flow arrows show how data moves between elements">
    <line x1="100" y1="102" x2="110" y2="102" class="data-flow" marker-end="url(#arrowhead)" />
    <line x1="190" y1="102" x2="240" y2="95" class="data-flow" marker-end="url(#arrowhead)" />
    <line x1="195" y1="102" x2="195" y2="170" class="data-flow" marker-end="url(#arrowhead)" />
    <line x1="195" y1="200" x2="290" y2="202" class="data-flow" marker-end="url(#arrowhead)" />
    <line x1="350" y1="202" x2="195" y2="202" class="data-flow" marker-end="url(#arrowhead)" />
    <line x1="195" y1="230" x2="195" y2="270" class="data-flow" marker-end="url(#arrowhead)" />
    <line x1="195" y1="300" x2="290" y2="302" class="data-flow" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Legend Box -->
  <g class="fade-in" style="animation-delay: 1.8s" data-narration="Legend explains the four key DFD symbols">
    <rect x="10" y="340" width="400" height="50" class="section-box" />
    <rect x="20" y="350" width="18" height="12" rx="2" class="entity" />
    <text x="45" y="360" class="detail">Entity</text>
    <ellipse cx="90" cy="356" rx="12" ry="7" class="process" />
    <text x="110" y="360" class="detail">Process</text>
    <line x1="160" y1="350" x2="175" y2="365" stroke="#666" stroke-width="2" />
    <text x="185" y="360" class="detail">Data Flow</text>
    <rect x="250" y="350" width="18" height="12" class="store" />
    <line x1="250" y1="350" x2="268" y2="350" stroke="#c49a48" stroke-width="2" />
    <text x="275" y="360" class="detail">Data Store</text>
    <text x="350" y="360" class="detail" fill="#666">4 Elements</text>
  </g>
  
  <!-- Key Concepts Summary -->
  <g class="fade-in" style="animation-delay: 2s" data-narration="Key concepts: Processes transform data, Data Flows move data, Data Stores hold data, Entities are sources/sinks">
    <rect x="10" y="160" width="115" height="50" class="section-box" />
    <text x="67" y="175" text-anchor="middle" class="detail" font-weight="bold">Key Concepts</text>
    <text x="67" y="190" text-anchor="middle" class="detail">DFD shows data flow</text>
    <text x="67" y="203" text-anchor="middle" class="detail">through a system</text>
  </g>
</svg>