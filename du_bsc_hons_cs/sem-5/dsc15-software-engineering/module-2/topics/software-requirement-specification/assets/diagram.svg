<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="software-requirement-specification">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fb8d4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8"/>
      <stop offset="100%" style="stop-color:#9cc88b"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#d4b88f"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e8"/>
      <stop offset="100%" style="stop-color:#b88fc8"/>
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e8d4"/>
      <stop offset="100%" style="stop-color:#8fc8a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#666" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.4s; }
    .box3 { animation-delay: 0.6s; }
    .box4 { animation-delay: 0.8s; }
    .box5 { animation-delay: 1s; }
    .connector { stroke-dasharray: 5,5; animation: drawLine 1.5s linear forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c5282" class="title">SRS Document Structure</text>
  <text x="210" y="55" text-anchor="middle" font-size="12" fill="#4a5568" class="title">Software Requirement Specification</text>
  
  <!-- SRS Container -->
  <rect x="60" y="70" width="300" height="310" fill="#fff" stroke="#4a5568" stroke-width="2" rx="8" opacity="0.9"/>
  <text x="210" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d3748">SRS Document</text>
  
  <!-- Section Boxes -->
  <!-- Introduction -->
  <g class="box box1">
    <rect x="80" y="105" width="100" height="50" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="130" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c5282">Introduction</text>
    <text x="130" y="145" text-anchor="middle" font-size="10" fill="#4a5568">Purpose &amp; Scope</text>
  </g>
  
  <!-- Functional Requirements -->
  <g class="box box2">
    <rect x="240" y="105" width="100" height="50" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="290" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#276749">Functional</text>
    <text x="290" y="145" text-anchor="middle" font-size="10" fill="#4a5568">Requirements</text>
  </g>
  
  <!-- Non-Functional Requirements -->
  <g class="box box3">
    <rect x="80" y="175" width="100" height="50" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="130" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#744210">Non-Functional</text>
    <text x="130" y="215" text-anchor="middle" font-size="10" fill="#4a5568">Requirements</text>
  </g>
  
  <!-- User Interface Requirements -->
  <g class="box box4">
    <rect x="240" y="175" width="100" height="50" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="290" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b46c1">User Interface</text>
    <text x="290" y="215" text-anchor="middle" font-size="10" fill="#4a5568">Requirements</text>
  </g>
  
  <!-- System Constraints -->
  <g class="box box5">
    <rect x="160" y="245" width="100" height="50" rx="6" fill="url(#boxGradient5)" filter="url(#shadow)"/>
    <text x="210" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#234e52">System</text>
    <text x="210" y="285" text-anchor="middle" font-size="10" fill="#4a5568">Constraints</text>
  </g>
  
  <!-- Connectors -->
  <path d="M130 155 L130 175" stroke="#4a5568" stroke-width="2" class="connector" data-narration="Introduction leads to requirements"/>
  <path d="M290 155 L290 175" stroke="#4a5568" stroke-width="2" class="connector"/>
  <path d="M130 225 L130 245" stroke="#4a5568" stroke-width="2" class="connector"/>
  <path d="M290 225 L290 245" stroke="#4a5568" stroke-width="2" class="connector"/>
  <path d="M180 270 L240 270" stroke="#4a5568" stroke-width="2" class="connector"/>
  
  <!-- Arrows showing flow -->
  <polygon points="210,320 200,310 220,310" fill="#2d3748" class="pulse"/>
  <text x="210" y="340" text-anchor="middle" font-size="11" fill="#4a5568">Requirements Flow</text>
  <text x="210" y="355" text-anchor="middle" font-size="10" fill="#718096">Testing &amp; Validation</text>
  
  <!-- Legend / Key Concepts -->
  <g class="box box5">
    <rect x="70" y="365" width="280" height="25" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
    <text x="210" y="380" text-anchor="middle" font-size="10" fill="#4a5568">
      <tspan fill="#2c5282" font-weight="bold">Key:</tspan> 
      <tspan>Functional (What) • Non-Functional (How) • UI (Interaction) • Constraints (Limits)</tspan>
    </text>
  </g>
  
  <!-- Data narration attributes (for accessibility) -->
  <title data-narration="Software Requirement Specification document structure showing 5 main sections connected in a hierarchical flow">SRS Diagram</title>
</svg>