<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ford-fulkerson-max-flow">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="50%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#f3e5f5"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="sourceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7043"/>
      <stop offset="100%" style="stop-color:#d84315"/>
    </linearGradient>
    <linearGradient id="sinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawPath {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .section-1 { animation: fadeIn 0.8s ease-out forwards; }
    .section-2 { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-4 { animation: slideInRight 0.6s ease-out 0.7s forwards; opacity: 0; }
    .section-5 { animation: slideInLeft 0.6s ease-out 0.9s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .path-anim { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawPath 1.5s ease-out 1.2s forwards; }
    .node { font-family: Arial, sans-serif; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a237e; }
    .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #424242; }
    .concept-box { fill: #fff; stroke: #bdbdbd; stroke-width: 1; rx: 5; }
    .concept-title { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #2e7d32; }
    .concept-text { font-family: Arial, sans-serif; font-size: 10px; fill: #616161; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <g class="section-1">
    <text x="210" y="30" text-anchor="middle" class="title">Ford-Fulkerson Max Flow</text>
    <text x="210" y="50" text-anchor="middle" class="subtitle">Maximum Flow Algorithm Visualization</text>
    <line x1="100" y1="60" x2="320" y2="60" stroke="#81c784" stroke-width="2"/>
  </g>
  
  <!-- Network Diagram Section -->
  <g class="section-2" data-narration="Flow Network: A directed graph with source (s), sink (t), and intermediate vertices (A, B). Each edge has a capacity representing maximum flow.">
    <!-- Edges with capacities -->
    <line x1="80" y1="150" x2="180" y2="150" stroke="#78909c" stroke-width="3"/>
    <text x="130" y="140" text-anchor="middle" class="label" fill="#d84315" font-weight="bold">10</text>
    <text x="130" y="175" text-anchor="middle" class="label" fill="#424242" font-size="10">(capacity)</text>
    
    <line x1="80" y1="150" x2="180" y2="280" stroke="#78909c" stroke-width="3"/>
    <text x="115" y="230" text-anchor="middle" class="label" fill="#d84315" font-weight="bold">5</text>
    
    <line x1="180" y1="150" x2="260" y2="215" stroke="#78909c" stroke-width="3"/>
    <text x="230" y="175" text-anchor="middle" class="label" fill="#d84315" font-weight="bold">3</text>
    
    <line x1="180" y1="150" x2="180" y2="280" stroke="#78909c" stroke-width="3"/>
    <text x="195" y="220" text-anchor="middle" class="label" fill="#d84315" font-weight="bold">8</text>
    
    <line x1="260" y1="215" x2="340" y2="215" stroke="#78909c" stroke-width="3"/>
    <text x="305" y="205" text-anchor="middle" class="label" fill="#d84315" font-weight="bold">6</text>
    
    <!-- Augmented Path Animation -->
    <g class="path-anim">
      <line x1="80" y1="150" x2="180" y2="150" stroke="#ff5722" stroke-width="5" opacity="0.7"/>
      <line x1="180" y1="150" x2="180" y2="280" stroke="#ff5722" stroke-width="5" opacity="0.7"/>
      <line x1="180" y1="280" x2="340" y2="215" stroke="#ff5722" stroke-width="5" opacity="0.7"/>
    </g>
    
    <!-- Nodes -->
    <!-- Source s -->
    <circle cx="80" cy="150" r="25" fill="url(#sourceGradient)" class="pulse-anim"/>
    <text x="80" y="155" text-anchor="middle" class="node" fill="white" font-size="18">s</text>
    
    <!-- Intermediate A -->
    <circle cx="180" cy="150" r="22" fill="url(#nodeGradient)"/>
    <text x="180" y="155" text-anchor="middle" class="node" fill="white" font-size="16">A</text>
    
    <!-- Intermediate B -->
    <circle cx="180" cy="280" r="22" fill="url(#nodeGradient)"/>
    <text x="180" y="285" text-anchor="middle" class="node" fill="white" font-size="16">B</text>
    
    <!-- Sink t -->
    <circle cx="340" cy="215" r="25" fill="url(#sinkGradient)" class="pulse-anim"/>
    <text x="340" y="220" text-anchor="middle" class="node" fill="white" font-size="18">t</text>
  </g>
  
  <!-- Key Concept 1: Flow Network -->
  <g class="section-3" data-narration="Flow Network: Directed graph G=(V,E) with source s, sink t, and capacity function c(u,v) on each edge." transform="translate(20, 310)">
    <rect x="0" y="0" width="110" height="70" class="concept-box"/>
    <text x="55" y="18" text-anchor="middle" class="concept-title">Flow Network</text>
    <text x="5" y="35" class="concept-text">• Directed graph G=(V,E)</text>
    <text x="5" y="48" class="concept-text">• Source s, Sink t</text>
    <text x="5" y="61" class="concept-text">• Capacity c(u,v) ≥ 0</text>
  </g>
  
  <!-- Key Concept 2: Capacity Constraint -->
  <g class="section-4" data-narration="Capacity Constraint: For every edge, flow f(u,v) must satisfy 0 ≤ f(u,v) ≤ c(u,v)." transform="translate(150, 310)">
    <rect x="0" y="0" width="110" height="70" class="concept-box"/>
    <text x="55" y="18" text-anchor="middle" class="concept-title">Capacity Constraint</text>
    <text x="5" y="35" class="concept-text">• 0 ≤ f(u,v) ≤ c(u,v)</text>
    <text x="5" y="48" class="concept-text">• Flow cannot exceed</text>
    <text x="5" y="61" class="concept-text">• edge capacity</text>
  </g>
  
  <!-- Key Concept 3: Augmenting Path -->
  <g class="section-5" data-narration="Augmenting Path: A path from s to t in residual graph where additional flow can be sent." transform="translate(280, 310)">
    <rect x="0" y="0" width="120" height="70" class="concept-box"/>
    <text x="60" y="18" text-anchor="middle" class="concept-title">Augmenting Path</text>
    <text x="5" y="35" class="concept-text">• Path s→A→B→t</text>
    <text x="5" y="48" class="concept-text">• Min capacity = 3</text>
    <text x="5" y="61" class="concept-text">• Increase flow by 3</text>
  </g>
  
  <!-- Bottom Section: Max-Flow Min-Cut Theorem -->
  <g class="section-1" data-narration="Max-Flow Min-Cut Theorem: Maximum flow value equals minimum cut capacity. The algorithm terminates when no augmenting path exists." transform="translate(80, 375)">
    <rect x="0" y="0" width="260" height="22" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" rx="3"/>
    <text x="130" y="15" text-anchor="middle" class="concept-title" fill="#1b5e20">Max-Flow Min-Cut Theorem: Value of max flow = capacity of min cut</text>
  </g>
</svg>