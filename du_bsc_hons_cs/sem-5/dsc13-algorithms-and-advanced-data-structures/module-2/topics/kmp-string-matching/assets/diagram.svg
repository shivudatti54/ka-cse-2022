<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="kmp-string-matching" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5e6d3"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d6eaf8"/>
      <stop offset="100%" style="stop-color:#aed6f1"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fadbd8"/>
      <stop offset="100%" style="stop-color:#f5b7b1"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes flowArrow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #555; }
    .time-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #666; }
    .box { rx: 8; ry: 8; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">KMP String Matching Algorithm</text>
  
  <!-- Phase 1: Preprocessing Box -->
  <g class="anim-slide" style="animation-delay: 0.2s;">
    <rect x="20" y="50" width="180" height="130" fill="url(#boxGradient1)" class="box" stroke="#7f8c8d" stroke-width="1"/>
    <text x="110" y="72" text-anchor="middle" class="label">Phase 1: Preprocessing</text>
    <text x="110" y="95" text-anchor="middle" class="detail">Build LPS Array</text>
    <text x="110" y="115" text-anchor="middle" class="detail">LPS = Longest Proper</text>
    <text x="110" y="130" text-anchor="middle" class="detail">Prefix which is also Suffix</text>
    <text x="110" y="165" text-anchor="middle" class="time-label" fill="#27ae60">Time: O(m)</text>
    <rect x="30" y="148" width="160" height="22" fill="#ecf0f1" rx="4"/>
    <text x="110" y="163" text-anchor="middle" class="detail">Pattern P[0...m-1]</text>
  </g>
  
  <!-- Phase 2: Searching Box -->
  <g class="anim-slide" style="animation-delay: 0.4s;">
    <rect x="220" y="50" width="180" height="130" fill="url(#boxGradient2)" class="box" stroke="#7f8c8d" stroke-width="1"/>
    <text x="310" y="72" text-anchor="middle" class="label">Phase 2: Searching</text>
    <text x="310" y="95" text-anchor="middle" class="detail">Scan Text for Pattern</text>
    <text x="310" y="115" text-anchor="middle" class="detail">Using LPS to skip</text>
    <text x="310" y="130" text-anchor="middle" class="detail">characters on mismatch</text>
    <text x="310" y="165" text-anchor="middle" class="time-label" fill="#2980b9">Time: O(n)</text>
    <rect x="230" y="148" width="160" height="22" fill="#ecf0f1" rx="4"/>
    <text x="310" y="163" text-anchor="middle" class="detail">Text T[0...n-1]</text>
  </g>
  
  <!-- Arrow connecting phases -->
  <g class="anim-fade" style="animation-delay: 0.6s;">
    <path d="M 205 115 L 215 115" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
      </marker>
    </defs>
  </g>
  
  <!-- LPS Array Visualization -->
  <g class="anim-fade" style="animation-delay: 0.8s;">
    <rect x="20" y="195" width="180" height="80" fill="url(#boxGradient3)" class="box anim-pulse" stroke="#7f8c8d" stroke-width="1"/>
    <text x="110" y="215" text-anchor="middle" class="label">LPS Array</text>
    <text x="110" y="235" text-anchor="middle" class="detail">Example: P = "ABABAC"</text>
    <g transform="translate(35, 245)">
      <rect x="0" y="0" width="20" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
      <text x="10" y="13" text-anchor="middle" font-size="10">0</text>
      <rect x="20" y="0" width="20" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
      <text x="30" y="13" text-anchor="middle" font-size="10">1</text>
      <rect x="40" y="0" width="20" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
      <text x="50" y="13" text-anchor="middle" font-size="10">2</text>
      <rect x="60" y="0" width="20" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
      <text x="70" y="13" text-anchor="middle" font-size="10">3</text>
      <rect x="80" y="0" width="20" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
      <text x="90" y="13" text-anchor="middle" font-size="10">4</text>
      <rect x="100" y="0" width="20" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
      <text x="110" y="13" text-anchor="middle" font-size="10">5</text>
      <rect x="0" y="18" width="20" height="18" fill="#e8daef" stroke="#333" stroke-width="1"/>
      <text x="10" y="31" text-anchor="middle" font-size="10">0</text>
      <rect x="20" y="18" width="20" height="18" fill="#e8daef" stroke="#333" stroke-width="1"/>
      <text x="30" y="31" text-anchor="middle" font-size="10">0</text>
      <rect x="40" y="18" width="20" height="18" fill="#e8daef" stroke="#333" stroke-width="1"/>
      <text x="50" y="31" text-anchor="middle" font-size="10">1</text>
      <rect x="60" y="18" width="20" height="18" fill="#e8daef" stroke="#333" stroke-width="1"/>
      <text x="70" y="31" text-anchor="middle" font-size="10">2</text>
      <rect x="80" y="18" width="20" height="18" fill="#e8daef" stroke="#333" stroke-width="1"/>
      <text x="90" y="31" text-anchor="middle" font-size="10">3</text>
      <rect x="100" y="18" width="20" height="18" fill="#e8daef" stroke="#333" stroke-width="1"/>
      <text x="110" y="31" text-anchor="middle" font-size="10">0</text>
    </g>
  </g>
  
  <!-- Time Complexity Box -->
  <g class="anim-fade" style="animation-delay: 1s;">
    <rect x="220" y="195" width="180" height="80" fill="#fef9e7" class="box anim-pulse" stroke="#f39c12" stroke-width="1"/>
    <text x="310" y="215" text-anchor="middle" class="label">Total Complexity</text>
    <text x="310" y="240" text-anchor="middle" class="detail" font-size="16" fill="#e74c3c">O(n + m)</text>
    <text x="310" y="260" text-anchor="middle" class="detail">vs Brute Force O(n×m)</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="anim-fade" style="animation-delay: 1.2s;">
    <rect x="20" y="290" width="380" height="100" fill="#f8f9fa" rx="6" stroke="#bdc3c7" stroke-width="1"/>
    <text x="210" y="310" text-anchor="middle" class="label">Key Concepts</text>
    <g transform="translate(35, 325)">
      <circle cx="5" cy="5" r="4" fill="#3498db"/>
      <text x="18" y="9" class="detail">Brute Force: Shift by 1 on mismatch</text>
      <circle cx="5" cy="25" r="4" fill="#27ae60"/>
      <text x="18" y="29" class="detail">KMP: Use LPS to skip characters</text>
      <circle cx="5" cy="45" r="4" fill="#e74c3c"/>
      <text x="18" y="49" class="detail">Failure Function: Precompute prefix-suffix matches</text>
      <circle cx="5" cy="65" r="4" fill="#9b59b6"/>
      <text x="18" y="69" class="detail">No backtracking through text required</text>
    </g>
  </g>
  
  <!-- Data narration attributes (hidden, for accessibility) -->
  <desc data-narration="KMP algorithm has two phases: preprocessing builds the LPS array in O(m) time, then searching scans the text in O(n) time, giving total O(n+m) complexity."/>
</svg>