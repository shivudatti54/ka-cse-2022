<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="tries-standard-compressed-suffix">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compressedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d3748; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #4a5568; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #718096; }
    .node { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    .edge-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #2d3748; }
    .section-box { rx: 8; ry: 8; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Tries: Standard vs Compressed</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#cbd5e0" stroke-width="2" class="anim-fade" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: Standard Trie -->
  <g class="anim-slide" style="animation-delay: 0.4s">
    <rect x="20" y="55" width="180" height="160" class="section-box" fill="#edf2f7" stroke="#cbd5e0" stroke-width="1"/>
    <text x="110" y="75" text-anchor="middle" class="label" font-weight="bold">Standard Trie</text>
    
    <!-- Standard Trie Tree -->
    <g transform="translate(30, 85)">
      <!-- Root -->
      <circle cx="75" cy="30" r="15" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="75" y="35" text-anchor="middle" class="node">●</text>
      
      <!-- Edge to t -->
      <line x1="85" y1="35" x2="105" y2="60" stroke="#4a5568" stroke-width="2"/>
      <text x="98" y="52" class="edge-label">t</text>
      
      <!-- Node t -->
      <circle cx="115" cy="65" r="14" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="115" y="70" text-anchor="middle" class="node">t</text>
      
      <!-- Edge to e -->
      <line x1="125" y1="72" x2="145" y2="100" stroke="#4a5568" stroke-width="2"/>
      <text x="138" y="90" class="edge-label">e</text>
      
      <!-- Node e -->
      <circle cx="155" cy="105" r="14" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="155" y="110" text-anchor="middle" class="node">e</text>
      
      <!-- Branch for 'test' -->
      <line x1="165" y1="108" x2="165" y2="135" stroke="#4a5568" stroke-width="2"/>
      <text x="170" y="125" class="edge-label">s</text>
      <circle cx="165" cy="140" r="12" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="165" y="145" text-anchor="middle" class="node">s</text>
      
      <!-- Edge to end for test -->
      <line x1="170" y1="148" x2="170" y2="165" stroke="#4a5568" stroke-width="2"/>
      <text x="175" y="160" class="edge-label">t</text>
      <circle cx="170" cy="170" r="10" fill="url(#nodeGradient)" filter="url(#shadow)" class="anim-pulse"/>
      <text x="170" y="174" text-anchor="middle" class="node" font-size="10">$</text>
      
      <!-- Branch for 'team' -->
      <line x1="155" y1="112" x2="130" y2="135" stroke="#4a5568" stroke-width="2"/>
      <text x="138" y="128" class="edge-label">a</text>
      <circle cx="125" cy="140" r="12" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="125" y="145" text-anchor="middle" class="node">a</text>
      
      <!-- Edge to end for team -->
      <line x1="125" y1="148" x2="125" y2="165" stroke="#4a5568" stroke-width="2"/>
      <text x="130" y="160" class="edge-label">m</text>
      <circle cx="125" cy="170" r="10" fill="url(#nodeGradient)" filter="url(#shadow)" class="anim-pulse"/>
      <text x="125" y="174" text-anchor="middle" class="node" font-size="10">$</text>
    </g>
  </g>
  
  <!-- Section 2: Compressed Trie -->
  <g class="anim-slide" style="animation-delay: 0.6s">
    <rect x="220" y="55" width="180" height="160" class="section-box" fill="#e6fffa" stroke="#38b2ac" stroke-width="1"/>
    <text x="310" y="75" text-anchor="middle" class="label" font-weight="bold">Compressed Trie</text>
    
    <!-- Compressed Trie Tree -->
    <g transform="translate(250, 85)">
      <!-- Root -->
      <circle cx="60" cy="30" r="15" fill="url(#compressedGradient)" filter="url(#shadow)"/>
      <text x="60" y="35" text-anchor="middle" class="node">●</text>
      
      <!-- Compressed edge 'te' -->
      <line x1="70" y1="35" x2="100" y2="60" stroke="#38b2ac" stroke-width="3"/>
      <rect x="78" y="42" width="26" height="14" rx="3" fill="white" stroke="#38b2ac"/>
      <text x="91" y="53" text-anchor="middle" class="edge-label" font-weight="bold">te</text>
      
      <!-- Node te -->
      <circle cx="110" cy="65" r="14" fill="url(#compressedGradient)" filter="url(#shadow)"/>
      <text x="110" y="70" text-anchor="middle" class="node">te</text>
      
      <!-- Branch for 'test' - compressed 'st' -->
      <line x1="118" y1="72" x2="118" y2="100" stroke="#38b2ac" stroke-width="3"/>
      <rect x="108" y="82" width="20" height="14" rx="3" fill="white" stroke="#38b2ac"/>
      <text x="118" y="93" text-anchor="middle" class="edge-label" font-weight="bold">st</text>
      
      <!-- End node test -->
      <circle cx="118" cy="110" r="10" fill="url(#compressedGradient)" filter="url(#shadow)" class="anim-pulse"/>
      <text x="118" y="114" text-anchor="middle" class="node" font-size="10">$</text>
      
      <!-- Branch for 'team' - compressed 'am' -->
      <line x1="110" y1="72" x2="85" y2="100" stroke="#38b2ac" stroke-width="3"/>
      <rect x="85" y="82" width="20" height="14" rx="3" fill="white" stroke="#38b2ac"/>
      <text x="95" y="93" text-anchor="middle" class="edge-label" font-weight="bold">am</text>
      
      <!-- End node team -->
      <circle cx="85" cy="110" r="10" fill="url(#compressedGradient)" filter="url(#shadow)" class="anim-pulse"/>
      <text x="85" y="114" text-anchor="middle" class="node" font-size="10">$</text>
    </g>
  </g>
  
  <!-- Arrow comparison -->
  <g class="anim-fade" style="animation-delay: 1s">
    <path d="M 205 135 L 215 135" stroke="#e53e3e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="210" y="125" text-anchor="middle" class="detail" fill="#e53e3e" font-size="11">compress</text>
  </g>
  
  <!-- Section 3: Key Concepts -->
  <g class="anim-fade" style="animation-delay: 1.2s">
    <rect x="20" y="230" width="180" height="75" class="section-box" fill="#fef3c7" stroke="#f6ad55" stroke-width="1"/>
    <text x="110" y="250" text-anchor="middle" class="label" font-weight="bold">Standard Trie</text>
    <text x="30" y="270" class="detail">• Each node = 1 character</text>
    <text x="30" y="288" class="detail">• More nodes, more memory</text>
    <text x="30" y="302" class="detail">• Simple insertion</text>
  </g>
  
  <g class="anim-fade" style="animation-delay: 1.4s">
    <rect x="220" y="230" width="180" height="75" class="section-box" fill="#c6f6d5" stroke="#48bb78" stroke-width="1"/>
    <text x="310" y="250" text-anchor="middle" class="label" font-weight="bold">Compressed Trie</text>
    <text x="230" y="270" class="detail">• Edge labels = substrings</text>
    <text x="230" y="288" class="detail">• Path compression applied</text>
    <text x="230" y="302" class="detail">• Space-efficient</text>
  </g>
  
  <!-- Section 4: Algorithm Box -->
  <g class="anim-fade" style="animation-delay: 1.6s">
    <rect x="100" y="320" width="220" height="60" class="section-box" fill="#e9d8fd" stroke="#9f7aea" stroke-width="1"/>
    <text x="210" y="345" text-anchor="middle" class="label" font-weight="bold">Path Compression</text>
    <text x="210" y="365" text-anchor="middle" class="detail">Merge single-child nodes into single edge</text>
  </g>
  
  <!-- Narration elements -->
  <g data-narration="The standard trie stores each character in separate nodes along the path from root to leaf">
    <rect x="20" y="55" width="180" height="160" fill="transparent"/>
  </g>
  <g data-narration="Compressed trie merges consecutive single-child nodes, reducing space complexity">
    <rect x="220" y="55" width="180" height="160" fill="transparent"/>
  </g>
  <g data-narration="Both test and team share the prefix te, which becomes a single edge in compression">
    <rect x="20" y="230" width="380" height="150" fill="transparent"/>
  </g>
</svg>