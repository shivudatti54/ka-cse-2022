<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="union-find-data-structures" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
    <linearGradient id="rootGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58d68d"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e79f"/>
      <stop offset="100%" style="stop-color:#f7dc6f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #2c3e50; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #566573; }
    .section-box { fill: white; stroke: #aed6f1; stroke-width: 1.5; rx: 8; }
    .node { fill: url(#nodeGradient); filter: url(#shadow); }
    .root-node { fill: url(#rootGradient); filter: url(#shadow); }
    .highlight-node { fill: url(#highlightGradient); filter: url(#shadow); }
    .arrow { stroke: #e74c3c; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .connector { stroke: #7f8c8d; stroke-width: 1.5; fill: none; }
    .parent-link { stroke: #9b59b6; stroke-width: 2; stroke-dasharray: 5,3; }
    .animated { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 50; animation: drawLine 1s ease-out forwards; }
    .box-1 { animation: fadeIn 0.5s ease-out 0.2s both; }
    .box-2 { animation: fadeIn 0.5s ease-out 0.4s both; }
    .box-3 { animation: fadeIn 0.5s ease-out 0.6s both; }
    .box-4 { animation: fadeIn 0.5s ease-out 0.8s both; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animated">Union-Find Data Structure</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2" class="line-anim"/>
  
  <!-- Section 1: Initial State -->
  <g class="box-1">
    <rect x="10" y="55" width="125" height="75" class="section-box"/>
    <text x="20" y="72" class="label" font-weight="bold">1. Initial Sets</text>
    <text x="20" y="90" class="detail">{1} {2} {3} {4}</text>
    <text x="20" y="108" class="detail">Each element is</text>
    <text x="20" y="122" class="detail">its own set</text>
  </g>
  
  <!-- Section 2: Find Operation -->
  <g class="box-2">
    <rect x="145" y="55" width="125" height="75" class="section-box"/>
    <text x="155" y="72" class="label" font-weight="bold">2. Find(x)</text>
    <text x="155" y="90" class="detail">Find root/representative</text>
    <text x="155" y="108" class="detail">of element x</text>
    <text x="155" y="122" class="detail">Path compression</text>
  </g>
  
  <!-- Section 3: Union Operation -->
  <g class="box-3">
    <rect x="280" y="55" width="130" height="75" class="section-box"/>
    <text x="290" y="72" class="label" font-weight="bold">3. Union(x,y)</text>
    <text x="290" y="90" class="detail">Merge sets containing</text>
    <text x="290" y="108" class="detail">x and y</text>
    <text x="290" y="122" class="detail">Union by rank</text>
  </g>
  
  <!-- Section 4: Tree Structure -->
  <g class="box-4">
    <rect x="10" y="140" width="400" height="80" class="section-box"/>
    <text x="20" y="158" class="label" font-weight="bold">Tree Structure with Parent Pointers</text>
    
    <!-- Tree visualization -->
    <line x1="60" y1="190" x2="100" y2="200" class="connector"/>
    <line x1="140" y1="190" x2="100" y2="200" class="connector"/>
    <line x1="100" y1="200" x2="180" y2="205" class="parent-link"/>
    <line x1="220" y1="190" x2="180" y2="205" class="connector"/>
    <line x1="300" y1="190" x2="260" y2="200" class="connector"/>
    <line x1="260" y1="200" x2="340" y2="205" class="parent-link"/>
    
    <!-- Nodes -->
    <circle cx="60" cy="185" r="14" class="node"/>
    <text x="60" y="189" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI">1</text>
    
    <circle cx="140" cy="185" r="14" class="node"/>
    <text x="140" y="189" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI">2</text>
    
    <circle cx="220" cy="185" r="14" class="node"/>
    <text x="220" y="189" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI">3</text>
    
    <circle cx="300" cy="185" r="14" class="node"/>
    <text x="300" y="189" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI">4</text>
    
    <!-- Root nodes -->
    <circle cx="100" cy="200" r="18" class="root-node pulse"/>
    <text x="100" y="205" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Segoe UI">A</text>
    
    <circle cx="260" cy="200" r="18" class="root-node pulse"/>
    <text x="260" y="205" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Segoe UI">B</text>
    
    <circle cx="340" cy="205" r="20" class="root-node pulse"/>
    <text x="340" y="210" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Segoe UI">C</text>
  </g>
  
  <!-- Parent Array Representation -->
  <g>
    <rect x="10" y="230" width="400" height="50" class="section-box"/>
    <text x="20" y="250" class="label" font-weight="bold">Parent Array: </text>
    <text x="120" y="250" class="detail">index:  </text>
    <text x="160" y="250" class="detail" font-weight="bold">0  1  2  3  4  5  6  7</text>
    <text x="120" y="268" class="detail">parent: </text>
    <text x="160" y="268" class="detail" fill="#9b59b6" font-weight="bold">A  0  A  2  B  B  C  6</text>
  </g>
  
  <!-- Find Operation Visualization -->
  <g>
    <rect x="10" y="290" width="195" height="100" class="section-box" data-narration="Find operation traces parent pointers to root"/>
    <text x="20" y="310" class="label" font-weight="bold">Find(7) = C</text>
    <text x="20" y="330" class="detail">Trace: 7→6→C</text>
    <text x="20" y="350" class="detail">Time: O(α(n)) amortized</text>
    <text x="20" y="370" class="detail">α = inverse Ackermann</text>
    
    <!-- Small tree for Find -->
    <circle cx="160" cy="320" r="10" class="highlight-node"/>
    <text x="160" y="324" text-anchor="middle" fill="#2c3e50" font-size="9" font-family="Segoe UI">7</text>
    <line x1="160" y1="330" x2="145" y2="345" class="parent-link"/>
    <circle cx="145" cy="350" r="10" class="highlight-node"/>
    <text x="145" y="354" text-anchor="middle" fill="#2c3e50" font-size="9" font-family="Segoe UI">6</text>
    <line x1="145" y1="360" x2="180" y2="375" class="parent-link"/>
    <circle cx="180" cy="380" r="12" class="root-node pulse"/>
    <text x="180" y="384" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Segoe UI">C</text>
  </g>
  
  <!-- Union Operation Visualization -->
  <g>
    <rect x="215" y="290" width="195" height="100" class="section-box" data-narration="Union makes one root point to another"/>
    <text x="225" y="310" class="label" font-weight="bold">Union(A, B)</text>
    <text x="225" y="330" class="detail">Merge set A into set B</text>
    <text x="225" y="350" class="detail">Root of A → points to Root of B</text>
    <text x="225" y="370" class="detail">parent[rootA] = rootB</text>
    
    <!-- Union arrow -->
    <line x1="320" y1="330" x2="360" y2="330" class="arrow" stroke="#27ae60"/>
    <polygon points="355,325 365,330 355,335" fill="#27ae60"/>
  </g>
  
  <!-- Legend -->
  <g>
    <rect x="10" y="360" width="400" height="35" fill="rgba(255,255,255,0.7)" rx="5"/>
    <circle cx="30" cy="378" r="8" class="root-node"/>
    <text x="45" y="382" class="detail">Root (Representative)</text>
    <line x1="140" y1="378" x2="170" y2="378" class="parent-link"/>
    <text x="180" y="382" class="detail">Parent Pointer</text>
    <rect x="270" y="370" width="15" height="15" fill="none" stroke="#e74c3c" stroke-width="2" rx="2"/>
    <text x="292" y="382" class="detail">Find Path</text>
  </g>
  
  <!-- Animated highlight on title -->
  <circle cx="210" cy="22" r="3" fill="#e74c3c" class="pulse"/>
</svg>