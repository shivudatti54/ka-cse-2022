<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="bellman-ford-algorithm">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c9daf0"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#4472c4"/>
    </linearGradient>
    <linearGradient id="actionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47"/>
      <stop offset="100%" style="stop-color:#558b2f"/>
    </linearGradient>
    <linearGradient id="decisionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="endGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#7d3c98"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowFlow {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #fff; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #fff; }
    .box-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .narration { font-family: Arial, sans-serif; font-size: 10px; fill: #555; font-style: italic; }
    .node { rx: 8; ry: 8; }
    .arrow { fill: none; stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
    .dashed-arrow { stroke-dasharray: 5,3; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Bellman-Ford Algorithm</text>
  
  <!-- Start Node -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="Algorithm begins here">
    <rect x="165" y="50" width="90" height="30" rx="15" fill="url(#nodeGradient)" class="node"/>
    <text x="210" y="70" text-anchor="middle" class="label">START</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="210" y1="80" x2="210" y2="95" class="arrow"/>
  
  <!-- Initialize Distances -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="Initialize distances: source=0, others=∞">
    <rect x="120" y="95" width="180" height="45" rx="6" fill="#f0f8e8" stroke="#70ad47" stroke-width="2"/>
    <text x="210" y="112" text-anchor="middle" class="box-title">Initialize Distances</text>
    <text x="210" y="128" text-anchor="middle" class="detail" fill="#333">source = 0, others = ∞</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="210" y1="140" x2="210" y2="155" class="arrow"/>
  
  <!-- Set Iteration Count -->
  <g class="slide-in" style="animation-delay: 0.6s" data-narration="Set iteration counter to 1">
    <rect x="130" y="155" width="160" height="35" rx="6" fill="#fff8e8" stroke="#ffb347" stroke-width="2"/>
    <text x="210" y="173" text-anchor="middle" class="box-title">Set i = 1</text>
    <text x="210" y="188" text-anchor="middle" class="detail" fill="#333">(|V|-1 iterations)</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="210" y1="190" x2="210" y2="205" class="arrow"/>
  
  <!-- Relax All Edges -->
  <g class="slide-in" style="animation-delay: 0.8s" data-narration="Relax all edges: if d[u]+w &lt; d[v], update d[v]">
    <rect x="110" y="205" width="200" height="40" rx="6" fill="url(#actionGradient)" class="node"/>
    <text x="210" y="223" text-anchor="middle" class="label">Relax All Edges</text>
    <text x="210" y="238" text-anchor="middle" class="detail">d[v] = min(d[v], d[u] + w)</text>
  </g>
  
  <!-- Arrow 4 -->
  <line x1="210" y1="245" x2="210" y2="260" class="arrow"/>
  
  <!-- Decision Diamond: i &lt;= V-1? -->
  <g class="slide-in" style="animation-delay: 1s" data-narration="Check if more iterations needed">
    <polygon points="210,260 280,285 210,310 140,285" fill="url(#decisionGradient)"/>
    <text x="210" y="282" text-anchor="middle" class="label" font-size="12">i ≤ V-1?</text>
  </g>
  
  <!-- Yes Branch -->
  <path d="M280,285 L330,285 L330,220 L320,220" class="arrow dashed-arrow"/>
  <text x="305" y="270" class="detail" fill="#333">Yes</text>
  
  <!-- Increment i -->
  <g class="slide-in" style="animation-delay: 1.2s" data-narration="Increment iteration counter and repeat">
    <rect x="305" y="195" width="80" height="30" rx="6" fill="#e8e8f8" stroke="#9b59b6" stroke-width="2"/>
    <text x="345" y="215" text-anchor="middle" class="box-title">i = i + 1</text>
  </g>
  
  <!-- Arrow back from increment to relax -->
  <path d="M345,225 L345,245 L210,245" class="arrow" style="stroke-dasharray: 5,3;"/>
  
  <!-- No Branch (to negative cycle check) -->
  <line x1="210" y1="310" x2="210" y2="325" class="arrow"/>
  <text x="225" y="320" class="detail" fill="#333">No</text>
  
  <!-- Negative Cycle Check -->
  <g class="slide-in" style="animation-delay: 1.4s" data-narration="Check for negative weight cycles">
    <rect x="115" y="325" width="190" height="40" rx="6" fill="#fce8e8" stroke="#c0392b" stroke-width="2"/>
    <text x="210" y="343" text-anchor="middle" class="box-title">Check Negative Cycle</text>
    <text x="210" y="358" text-anchor="middle" class="detail" fill="#333">Relax once more; if update → cycle exists</text>
  </g>
  
  <!-- Arrow to End -->
  <line x1="210" y1="365" x2="210" y2="380" class="arrow"/>
  
  <!-- End Node -->
  <g class="pulse" style="animation-delay: 1.6s" data-narration="Algorithm completes with shortest paths or detects negative cycle">
    <rect x="165" y="375" width="90" height="25" rx="12" fill="url(#endGradient)" class="node"/>
    <text x="210" y="392" text-anchor="middle" class="label" font-size="12">END</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Legend/Key Concepts Box -->
  <g class="fade-in" style="animation-delay: 1.8s" data-narration="Key concepts: V=vertices, E=edges, d=distance, w=weight">
    <rect x="5" y="340" width="105" height="55" rx="4" fill="rgba(255,255,255,0.8)" stroke="#ccc" stroke-width="1"/>
    <text x="57" y="355" text-anchor="middle" class="box-title" font-size="10">Key Concepts</text>
    <text x="57" y="368" text-anchor="middle" class="detail" fill="#333" font-size="9">V = |Vertices|</text>
    <text x="57" y="380" text-anchor="middle" class="detail" fill="#333" font-size="9">d[u] = distance to u</text>
    <text x="57" y="392" text-anchor="middle" class="detail" fill="#333" font-size="9">w(u,v) = edge weight</text>
  </g>
</svg>