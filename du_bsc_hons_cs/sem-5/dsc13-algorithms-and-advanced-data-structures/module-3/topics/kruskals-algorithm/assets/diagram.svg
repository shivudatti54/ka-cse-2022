<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="kruskals-algorithm">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="50%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#f3e5f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 30; }
      to { stroke-dashoffset: 0; }
    }
    .box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .box-1 { animation-delay: 0.1s; }
    .box-2 { animation-delay: 0.2s; }
    .box-3 { animation-delay: 0.3s; }
    .box-4 { animation-delay: 0.4s; }
    .box-5 { animation-delay: 0.5s; }
    .box-6 { animation-delay: 0.6s; }
    .arrow { animation: slideIn 0.4s ease-out forwards; stroke-dasharray: 30; stroke-dashoffset: 30; animation-delay: 0.7s; }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .key-concept { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#37474f" class="title">Kruskal's Algorithm</text>
  <text x="210" y="48" text-anchor="middle" font-size="12" fill="#546e7a" class="title">Minimum Spanning Tree</text>
  
  <!-- Flowchart Boxes -->
  <!-- Start -->
  <g class="box box-1" data-narration="Algorithm starts with unsorted edges">
    <rect x="160" y="60" width="100" height="35" rx="17" fill="#b2dfdb" filter="url(#shadow)"/>
    <text x="210" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#00695c">START</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M210,95 L210,115" stroke="#78909c" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="210,120 205,110 215,110" fill="#78909c"/>
  
  <!-- Sort Edges -->
  <g class="box box-2" data-narration="Sort all edges by weight in non-decreasing order">
    <rect x="135" y="120" width="150" height="35" rx="5" fill="#ffccbc" filter="url(#shadow)"/>
    <text x="210" y="143" text-anchor="middle" font-size="14" font-weight="bold" fill="#bf360c">Sort Edges</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M210,155 L210,175" stroke="#78909c" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="210,180 205,170 215,170" fill="#78909c"/>
  
  <!-- Initialize Union-Find -->
  <g class="box box-3" data-narration="Initialize each vertex as separate set in Union-Find">
    <rect x="115" y="180" width="190" height="35" rx="5" fill="#c5cae9" filter="url(#shadow)"/>
    <text x="210" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#303f9f">Initialize Union-Find</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M210,215 L210,235" stroke="#78909c" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="210,240 205,230 215,230" fill="#78909c"/>
  
  <!-- Pick Minimum Edge -->
  <g class="box box-4" data-narration="Pick the minimum weight edge from sorted list">
    <rect x="130" y="245" width="160" height="35" rx="5" fill="#b3e5fc" filter="url(#shadow)"/>
    <text x="210" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#01579b">Pick Min Edge</text>
  </g>
  
  <!-- Branch arrows from Pick Min Edge -->
  <path d="M290,262 L340,262 L340,290 L310,290" stroke="#78909c" stroke-width="2" fill="none" class="arrow"/>
  <path d="M210,280 L160,280 L160,300 L120,300" stroke="#78909c" stroke-width="2" fill="none" class="arrow"/>
  
  <!-- Cycle Check - Yes branch -->
  <g class="box box-5" data-narration="Check if edge creates cycle using Union-Find">
    <rect x="315" y="295" width="50" height="30" rx="4" fill="#e1bee7" filter="url(#shadow)"/>
    <text x="340" y="315" text-anchor="middle" font-size="11" fill="#6a1b9a">No Cycle?</text>
  </g>
  
  <!-- Add to MST (Yes) -->
  <path d="M365,310 L385,310 L385,340 L310,340" stroke="#4caf50" stroke-width="2" fill="none" class="arrow"/>
  <g class="box key-concept" data-narration="Add edge to MST if no cycle formed">
    <rect x="175" y="305" width="130" height="35" rx="5" fill="#a5d6a7" filter="url(#shadow)"/>
    <text x="240" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Add to MST</text>
  </g>
  
  <!-- Union Sets -->
  <path d="M240,340 L240,360" stroke="#78909c" stroke-width="2" fill="none" class="arrow"/>
  <g class="box box-6" data-narration="Union the sets of connected vertices">
    <rect x="170" y="365" width="140" height="30" rx="5" fill="#fff9c4" filter="url(#shadow)"/>
    <text x="240" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">Union Sets</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g transform="translate(10, 320)">
    <rect width="120" height="70" rx="5" fill="white" fill-opacity="0.8" stroke="#90a4ae" stroke-width="1"/>
    <text x="10" y="18" font-size="11" font-weight="bold" fill="#37474f">Key Concepts:</text>
    <text x="10" y="35" font-size="9" fill="#546e7a">• Greedy Approach</text>
    <text x="10" y="48" font-size="9" fill="#546e7a">• Union-Find Data</text>
    <text x="10" y="61" font-size="9" fill="#546e7a">• Cycle Detection</text>
  </g>
  
  <!-- MST Result indicator -->
  <g transform="translate(300, 355)">
    <rect width="110" height="35" rx="5" fill="#c8e6c9" stroke="#4caf50" stroke-width="1"/>
    <text x="55" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">MST Complete</text>
  </g>
  
  <!-- Decision No (Cycle) arrow -->
  <path d="M315,325 L315,350 L250,350" stroke="#f44336" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="270" y="345" font-size="9" fill="#c62828">Yes (No Cycle)</text>
  
</svg>