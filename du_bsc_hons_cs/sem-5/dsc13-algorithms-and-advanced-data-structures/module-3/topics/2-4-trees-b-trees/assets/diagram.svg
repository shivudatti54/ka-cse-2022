<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="2-4-trees-b-trees">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="nodeGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="nodeGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b3d9ff"/>
      <stop offset="100%" style="stop-color:#8ecae6"/>
    </linearGradient>
    <linearGradient id="nodeGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3b6"/>
      <stop offset="100%" style="stop-color:#ffaa71"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .key-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .child-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .section-box { rx: 8; ry: 8; }
    .node { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g data-narration="Title introducing the topic of 2-4 Trees and B-Trees">
    <text x="210" y="30" text-anchor="middle" class="title anim-fade">2-4 Trees &amp; B-Trees</text>
    <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2" class="anim-fade" style="animation-delay: 0.3s"/>
  </g>
  
  <!-- Section 1: 2-4 Tree Node Types (Left Side) -->
  <g data-narration="Three types of nodes in 2-4 trees: 2-node (1 key, 2 children), 3-node (2 keys, 3 children), 4-node (3 keys, 4 children)">
    <text x="30" y="70" class="label anim-slide" style="animation-delay: 0.5s">2-4 Tree Node Types</text>
    
    <!-- 2-Node -->
    <g class="node anim-slide" style="animation-delay: 0.6s">
      <rect x="20" y="85" width="100" height="35" fill="url(#nodeGradient1)" class="section-box"/>
      <text x="70" y="108" text-anchor="middle" class="key-text">k1</text>
      <text x="70" y="140" text-anchor="middle" class="detail">2-Node</text>
      <text x="70" y="152" text-anchor="middle" class="detail">1 key, 2 children</text>
      <!-- Child indicators -->
      <text x="30" y="135" class="child-label">C0</text>
      <text x="110" y="135" class="child-label">C1</text>
    </g>
    
    <!-- 3-Node -->
    <g class="node anim-slide" style="animation-delay: 0.8s">
      <rect x="20" y="170" width="100" height="35" fill="url(#nodeGradient2)" class="section-box"/>
      <text x="55" y="193" text-anchor="middle" class="key-text">k1</text>
      <text x="85" y="193" text-anchor="middle" class="key-text">k2</text>
      <text x="70" y="225" text-anchor="middle" class="detail">3-Node</text>
      <text x="70" y="237" text-anchor="middle" class="detail">2 keys, 3 children</text>
      <text x="20" y="220" class="child-label">C0</text>
      <text x="70" y="220" class="child-label">C1</text>
      <text x="120" y="220" class="child-label">C2</text>
    </g>
    
    <!-- 4-Node -->
    <g class="node anim-slide" style="animation-delay: 1s">
      <rect x="20" y="255" width="100" height="35" fill="url(#nodeGradient3)" class="section-box"/>
      <text x="45" y="278" text-anchor="middle" class="key-text">k1</text>
      <text x="70" y="278" text-anchor="middle" class="key-text">k2</text>
      <text x="95" y="278" text-anchor="middle" class="key-text">k3</text>
      <text x="70" y="310" text-anchor="middle" class="detail">4-Node</text>
      <text x="70" y="322" text-anchor="middle" class="detail">3 keys, 4 children</text>
      <text x="10" y="305" class="child-label">C0</text>
      <text x="50" y="305" class="child-label">C1</text>
      <text x="90" y="305" class="child-label">C2</text>
      <text x="130" y="305" class="child-label">C3</text>
    </g>
  </g>
  
  <!-- Section 2: B-Tree Node Structure (Right Side) -->
  <g data-narration="B-Tree node structure showing keys k1, k2, k3 and child pointers C0-C3 with their key ranges">
    <text x="270" y="70" class="label anim-slide" style="animation-delay: 0.5s">B-Tree Node Structure</text>
    
    <!-- Main B-Tree Node -->
    <g class="node anim-pulse" style="animation-delay: 1.2s">
      <rect x="200" y="85" width="180" height="50" fill="#fff" stroke="#9b59b6" stroke-width="2" rx="5" ry="5"/>
      
      <!-- Keys in the node -->
      <rect x="230" y="95" width="35" height="30" fill="#9b59b6" rx="3"/>
      <text x="247" y="115" text-anchor="middle" class="key-text">k1</text>
      
      <rect x="282" y="95" width="35" height="30" fill="#9b59b6" rx="3"/>
      <text x="300" y="115" text-anchor="middle" class="key-text">k2</text>
      
      <rect x="335" y="95" width="35" height="30" fill="#9b59b6" rx="3"/>
      <text x="352" y="115" text-anchor="middle" class="key-text">k3</text>
    </g>
    
    <!-- Child Pointers -->
    <g class="anim-slide" style="animation-delay: 1.4s">
      <rect x="195" y="145" width="190" height="30" fill="#ecf0f1" stroke="#bdc3c7" rx="3"/>
      
      <text x="220" y="165" text-anchor="middle" class="child-label">C0</text>
      <text x="262" y="165" text-anchor="middle" class="child-label">C1</text>
      <text x="305" y="165" text-anchor="middle" class="child-label">C2</text>
      <text x="347" y="165" text-anchor="middle" class="child-label">C3</text>
    </g>
    
    <!-- Key Range Labels -->
    <g class="anim-slide" style="animation-delay: 1.6s">
      <text x="220" y="195" text-anchor="middle" class="detail">&lt; k1</text>
      <text x="262" y="195" text-anchor="middle" class="detail">k1-k2</text>
      <text x="305" y="195" text-anchor="middle" class="detail">k2-k3</text>
      <text x="347" y="195" text-anchor="middle" class="detail">&gt; k3</text>
    </g>
    
    <!-- Arrow lines showing relationships -->
    <g class="anim-fade" style="animation-delay: 1.8s">
      <line x1="220" y1="138" x2="220" y2="145" stroke="#7f8c8d" stroke-width="1"/>
      <line x1="262" y1="138" x2="262" y2="145" stroke="#7f8c8d" stroke-width="1"/>
      <line x1="305" y1="138" x2="305" y2="145" stroke="#7f8c8d" stroke-width="1"/>
      <line x1="347" y1="138" x2="347" y2="145" stroke="#7f8c8d" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Section 3: Key Properties -->
  <g data-narration="Key properties of 2-4 trees: balanced height, search property, and split operation">
    <text x="30" y="355" class="label anim-slide" style="animation-delay: 1.8s">Key Properties</text>
    
    <g class="anim-slide" style="animation-delay: 2s">
      <rect x="25" y="365" width="120" height="28" fill="#d5f5e3" stroke="#27ae60" stroke-width="1" rx="4"/>
      <text x="85" y="382" text-anchor="middle" class="detail" fill="#1e8449">Balanced Height</text>
    </g>
    
    <g class="anim-slide" style="animation-delay: 2.2s">
      <rect x="150" y="365" width="100" height="28" fill="#d4e6f1" stroke="#2980b9" stroke-width="1" rx="4"/>
      <text x="200" y="382" text-anchor="middle" class="detail" fill="#1a5276">O(log n)</text>
    </g>
    
    <g class="anim-slide" style="animation-delay: 2.4s">
      <rect x="255" y="365" width="130" height="28" fill="#fce4d6" stroke="#e74c3c" stroke-width="1" rx="4"/>
      <text x="320" y="382" text-anchor="middle" class="detail" fill="#c0392b">Split Operation</text>
    </g>
  </g>
  
  <!-- Section 4: B-Tree Usage -->
  <g data-narration="Applications of B-Trees in databases and file systems">
    <text x="270" y="230" class="label anim-slide" style="animation-delay: 1.8s">B-Tree Applications</text>
    
    <g class="anim-slide" style="animation-delay: 2s">
      <rect x="220" y="245" width="85" height="22" fill="#e8daef" stroke="#8e44ad" stroke-width="1" rx="4"/>
      <text x="262" y="260" text-anchor="middle" class="detail" fill="#6c3483">Database</text>
    </g>
    
    <g class="anim-slide" style="animation-delay: 2.2s">
      <rect x="310" y="245" width="85" height="22" fill="#e8daef" stroke="#8e44ad" stroke-width="1" rx="4"/>
      <text x="352" y="260" text-anchor="middle" class="detail" fill="#6c3483">File Systems</text>
    </g>
    
    <g class="anim-slide" style="animation-delay: 2.4s">
      <rect x="265" y="272" width="90" height="22" fill="#e8daef" stroke="#8e44ad" stroke-width="1" rx="4"/>
      <text x="310" y="287" text-anchor="middle" class="detail" fill="#6c3483">Indexing</text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g class="anim-fade" style="animation-delay: 2.5s">
    <circle cx="15" cy="15" r="4" fill="#3498db" opacity="0.5"/>
    <circle cx="405" cy="385" r="4" fill="#9b59b6" opacity="0.5"/>
    <circle cx="15" cy="385" r="4" fill="#27ae60" opacity="0.5"/>
    <circle cx="405" cy="15" r="4" fill="#e74c3c" opacity="0.5"/>
  </g>
</svg>