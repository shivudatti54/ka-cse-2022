<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="randomized-select" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8f0f8"/>
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="pivotGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56"/>
      <stop offset="100%" style="stop-color:#ff7f3f"/>
    </linearGradient>
    <linearGradient id="lessGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#56d9a5"/>
      <stop offset="100%" style="stop-color:#3cb87a"/>
    </linearGradient>
    <linearGradient id="greaterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d973d9"/>
      <stop offset="100%" style="stop-color:#b754b7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes highlight {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .section4 { animation: fadeIn 0.6s ease-out 0.8s both; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    .bounce { animation: bounce 1s ease-in-out infinite; }
    .highlight { animation: highlight 1s ease-in-out infinite; }
    .concept-box { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Randomized Select Algorithm</text>
  
  <!-- Section 1: Problem Statement -->
  <g class="section1" data-narration="The Selection Problem: Find the k-th smallest element without full sorting">
    <rect x="15" y="50" width="190" height="55" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="25" y="68" font-family="Arial" font-size="13" font-weight="bold" fill="#e74c3c">Selection Problem</text>
    <text x="25" y="85" font-family="Arial" font-size="11" fill="#555">Find k-th smallest in</text>
    <text x="25" y="100" font-family="Arial" font-size="11" fill="#555">unsorted array (k=1 to n)</text>
  </g>
  
  <!-- Section 2: Key Stats -->
  <g class="section2" data-narration="Time Complexity: O(n) expected, much faster than sorting O(n log n)">
    <rect x="215" y="50" width="190" height="55" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="225" y="68" font-family="Arial" font-size="13" font-weight="bold" fill="#27ae60">Time Complexity</text>
    <text x="225" y="85" font-family="Arial" font-size="11" fill="#555">Expected: O(n) — Fast!</text>
    <text x="225" y="100" font-family="Arial" font-size="11" fill="#555">Worst: O(n²) — Rare with random pivot</text>
  </g>
  
  <!-- Section 3: Original Array -->
  <g class="section3" data-narration="Original array: 7, 2, 9, 3, 5, 1, 8 - We want to find order statistics">
    <text x="210" y="125" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Original Array</text>
    <g transform="translate(60, 135)">
      <rect class="bounce" x="0" y="0" width="40" height="35" rx="5" fill="url(#arrayGradient)" stroke="#2c5aa0" stroke-width="1.5"/>
      <text x="20" y="23" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">7</text>
      <rect class="bounce" x="45" y="0" width="40" height="35" rx="5" fill="url(#arrayGradient)" stroke="#2c5aa0" stroke-width="1.5"/>
      <text x="65" y="23" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">2</text>
      <rect class="bounce" x="90" y="0" width="40" height="35" rx="5" fill="url(#arrayGradient)" stroke="#2c5aa0" stroke-width="1.5"/>
      <text x="110" y="23" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">9</text>
      <rect class="bounce" x="135" y="0" width="40" height="35" rx="5" fill="url(#arrayGradient)" stroke="#2c5aa0" stroke-width="1.5"/>
      <text x="155" y="23" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">3</text>
      <rect class="bounce" x="180" y="0" width="40" height="35" rx="5" fill="url(#arrayGradient)" stroke="#2c5aa0" stroke-width="1.5"/>
      <text x="200" y="23" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">5</text>
      <rect class="bounce" x="225" y="0" width="40" height="35" rx="5" fill="url(#arrayGradient)" stroke="#2c5aa0" stroke-width="1.5"/>
      <text x="245" y="23" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">1</text>
      <rect class="bounce" x="270" y="0" width="40" height="35" rx="5" fill="url(#arrayGradient)" stroke="#2c5aa0" stroke-width="1.5"/>
      <text x="290" y="23" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">8</text>
    </g>
  </g>
  
  <!-- Arrow down -->
  <path d="M210 178 L210 188" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <polygon points="210,193 205,185 215,185" fill="#999"/>
  
  <!-- Section 4: Pivot Selection -->
  <g class="section4" data-narration="Random pivot selection: Choose element 5 as pivot using random index">
    <rect x="85" y="195" width="250" height="30" rx="15" fill="#fff3e0" stroke="#ff9a56" stroke-width="2" class="highlight"/>
    <text x="210" y="215" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Step 1: Random Pivot Selection → pivot = 5</text>
  </g>
  
  <!-- Arrow down -->
  <path d="M210 233 L210 243" stroke="#999" stroke-width="2"/>
  <polygon points="210,248 205,240 215,240" fill="#999"/>
  
  <!-- Section 5: Partitioning Result -->
  <g class="section4" data-narration="Partitioning: Elements less than 5 on left, greater than 5 on right, pivot in final position">
    <text x="210" y="262" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Partitioning Result</text>
    
    <!-- Less than pivot -->
    <g transform="translate(30, 275)">
      <text x="50" y="0" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60" font-weight="bold">&lt; 5 (Left)</text>
      <rect x="0" y="8" width="32" height="30" rx="4" fill="url(#lessGradient)" stroke="#1e8449" stroke-width="1.5"/>
      <text x="16" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">2</text>
      <rect x="36" y="8" width="32" height="30" rx="4" fill="url(#lessGradient)" stroke="#1e8449" stroke-width="1.5"/>
      <text x="52" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">3</text>
      <rect x="72" y="8" width="32" height="30" rx="4" fill="url(#lessGradient)" stroke="#1e8449" stroke-width="1.5"/>
      <text x="88" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">1</text>
    </g>
    
    <!-- Pivot -->
    <g transform="translate(170, 275)">
      <rect class="pulse" x="0" y="8" width="32" height="30" rx="4" fill="url(#pivotGradient)" stroke="#d35400" stroke-width="2"/>
      <text x="16" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">5</text>
      <text x="16" y="-5" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">pivot</text>
    </g>
    
    <!-- Greater than pivot -->
    <g transform="translate(220, 275)">
      <text x="45" y="0" text-anchor="middle" font-family="Arial" font-size="11" fill="#8e44ad" font-weight="bold">&gt; 5 (Right)</text>
      <rect x="0" y="8" width="32" height="30" rx="4" fill="url(#greaterGradient)" stroke="#7d3c98" stroke-width="1.5"/>
      <text x="16" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">7</text>
      <rect x="36" y="8" width="32" height="30" rx="4" fill="url(#greaterGradient)" stroke="#7d3c98" stroke-width="1.5"/>
      <text x="52" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">9</text>
      <rect x="72" y="8" width="32" height="30" rx="4" fill="url(#greaterGradient)" stroke="#7d3c98" stroke-width="1.5"/>
      <text x="88" y="28" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">8</text>
    </g>
  </g>
  
  <!-- Section 6: Conclusion -->
  <g class="section4" data-narration="After partition: Pivot 5 is in position 4. If k=4, return 5. Otherwise, recurse on appropriate partition.">
    <rect x="15" y="335" width="390" height="50" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="25" y="352" font-family="Arial" font-size="12" font-weight="bold" fill="#2980b9">Result: pivot in correct position</text>
    <text x="25" y="368" font-family="Arial" font-size="10" fill="#555">If k = 4, return 5 | If k &lt; 4, search left | If k &gt; 4, search right</text>
    <circle cx="385" cy="360" r="15" fill="#27ae60" class="pulse"/>
    <text x="385" y="365" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">✓</text>
  </g>
  
  <!-- Arrow showing recursion -->
  <path d="M380 335 Q380 320 350 315" stroke="#27ae60" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
</svg>