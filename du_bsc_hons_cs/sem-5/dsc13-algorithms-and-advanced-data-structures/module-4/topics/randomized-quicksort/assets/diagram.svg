<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="randomized-quicksort">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5e6d3"/>
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <linearGradient id="pivotGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7675"/>
      <stop offset="100%" style="stop-color:#d63031"/>
    </linearGradient>
    <linearGradient id="balancedGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { fill: #ff7675; }
      50% { fill: #d63031; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d3436; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3436; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #636e72; }
    .box { fill: white; filter: url(#shadow); rx: 8; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2d3436; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Randomized Quicksort</text>
  
  <!-- Section 1: Standard Quicksort Problem -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="Standard quicksort has O(n²) worst-case when pivot is first/last element on sorted array">
    <rect x="10" y="45" width="195" height="85" class="box"/>
    <text x="20" y="62" class="section-title">Standard Quicksort (Worst Case)</text>
    <text x="20" y="80" class="detail">Input: [1, 2, 3, 4, 5, 6]</text>
    <text x="20" y="96" class="detail">Pivot: 1 (first element)</text>
    <text x="20" y="112" class="detail">Partition: [ ] [2,3,4,5,6]</text>
    <text x="20" y="122" class="detail" style="fill:#d63031">Unbalanced! O(n²)</text>
  </g>
  
  <!-- Section 2: Randomized Quicksort Solution -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="Randomized quicksort randomly selects pivot, achieving O(n log n) expected time">
    <rect x="215" y="45" width="195" height="85" class="box"/>
    <text x="225" y="62" class="section-title">Randomized Quicksort</text>
    <text x="225" y="80" class="detail">Input: [1, 2, 3, 4, 5, 6]</text>
    <text x="225" y="96" class="detail">Pivot: Random (e.g., 4)</text>
    <text x="225" y="112" class="detail">Partition: [1,2,3] [4] [5,6]</text>
    <text x="225" y="122" class="detail" style="fill:#00b894">Balanced! O(n log n)</text>
  </g>
  
  <!-- Section 3: Array Visualization -->
  <g class="fade-in" style="animation-delay: 0.6s" data-narration="Visual representation of array elements with pivot highlighted">
    <rect x="10" y="140" width="400" height="60" class="box"/>
    <text x="20" y="158" class="section-title">Array Partition Visualization</text>
    
    <!-- Array elements -->
    <g transform="translate(20, 175)">
      <rect x="0" y="0" width="25" height="25" fill="url(#arrayGradient)" rx="3"/>
      <text x="12.5" y="17" text-anchor="middle" fill="white" font-size="11">1</text>
      
      <rect x="30" y="0" width="25" height="25" fill="url(#arrayGradient)" rx="3"/>
      <text x="42.5" y="17" text-anchor="middle" fill="white" font-size="11">2</text>
      
      <rect x="60" y="0" width="25" height="25" fill="url(#arrayGradient)" rx="3"/>
      <text x="72.5" y="17" text-anchor="middle" fill="white" font-size="11">3</text>
      
      <!-- Pivot -->
      <rect x="90" y="0" width="25" height="25" fill="url(#pivotGradient)" rx="3" class="pulse"/>
      <text x="102.5" y="17" text-anchor="middle" fill="white" font-size="11" font-weight="bold">4</text>
      
      <rect x="120" y="0" width="25" height="25" fill="url(#arrayGradient)" rx="3"/>
      <text x="132.5" y="17" text-anchor="middle" fill="white" font-size="11">5</text>
      
      <rect x="150" y="0" width="25" height="25" fill="url(#arrayGradient)" rx="3"/>
      <text x="162.5" y="17" text-anchor="middle" fill="white" font-size="11">6</text>
      
      <!-- Labels -->
      <text x="102.5" y="40" text-anchor="middle" class="detail" font-size="10">pivot</text>
      <text x="45" y="40" text-anchor="middle" class="detail" font-size="10">&lt; pivot</text>
      <text x="135" y="40" text-anchor="middle" class="detail" font-size="10">&gt; pivot</text>
    </g>
  </g>
  
  <!-- Section 4: Recursion Tree Comparison -->
  <g class="fade-in" style="animation-delay: 0.8s" data-narration="Comparison of recursion tree depth: unbalanced vs balanced partitions">
    <rect x="10" y="210" width="195" height="90" class="box"/>
    <text x="20" y="228" class="section-title">Standard: Unbalanced Tree</text>
    
    <!-- Unbalanced tree -->
    <g transform="translate(25, 245)">
      <circle cx="80" cy="0" r="8" fill="#ff7675"/>
      <text x="80" y="3" text-anchor="middle" fill="white" font-size="8">n</text>
      <line x1="80" y1="8" x2="50" y2="25" stroke="#636e72" stroke-width="1"/>
      <line x1="80" y1="8" x2="110" y2="25" stroke="#636e72" stroke-width="1"/>
      <circle cx="50" cy="25" r="6" fill="#ff7675" opacity="0.7"/>
      <text x="50" y="28" text-anchor="middle" fill="white" font-size="7">n-1</text>
      <circle cx="110" cy="25" r="4" fill="#74b9ff" opacity="0.5"/>
      <line x1="50" y1="31" x2="35" y2="42" stroke="#636e72" stroke-width="1"/>
      <circle cx="35" cy="42" r="5" fill="#ff7675" opacity="0.6"/>
    </g>
    <text x="20" y="290" class="detail" style="fill:#d63031">Depth: O(n)</text>
  </g>
  
  <g class="fade-in" style="animation-delay: 1s" data-narration="Randomized quicksort creates balanced recursion tree">
    <rect x="215" y="210" width="195" height="90" class="box"/>
    <text x="225" y="228" class="section-title">Randomized: Balanced Tree</text>
    
    <!-- Balanced tree -->
    <g transform="translate(230, 245)">
      <circle cx="80" cy="0" r="8" fill="#55efc4"/>
      <text x="80" y="3" text-anchor="middle" fill="white" font-size="8">n</text>
      <line x1="80" y1="8" x2="50" y2="25" stroke="#636e72" stroke-width="1"/>
      <line x1="80" y1="8" x2="110" y2="25" stroke="#636e72" stroke-width="1"/>
      <circle cx="50" cy="25" r="7" fill="#55efc4" opacity="0.8"/>
      <text x="50" y="28" text-anchor="middle" fill="white" font-size="7">n/2</text>
      <circle cx="110" cy="25" r="7" fill="#55efc4" opacity="0.8"/>
      <text x="110" y="28" text-anchor="middle" fill="white" font-size="7">n/2</text>
      <line x1="50" y1="32" x2="35" y2="42" stroke="#636e72" stroke-width="1"/>
      <line x1="50" y1="32" x2="65" y2="42" stroke="#636e72" stroke-width="1"/>
      <line x1="110" y1="32" x2="95" y2="42" stroke="#636e72" stroke-width="1"/>
      <line x1="110" y1="32" x2="125" y2="42" stroke="#636e72" stroke-width="1"/>
      <circle cx="35" cy="42" r="5" fill="#55efc4" opacity="0.7"/>
      <circle cx="65" cy="42" r="5" fill="#55efc4" opacity="0.7"/>
      <circle cx="95" cy="42" r="5" fill="#55efc4" opacity="0.7"/>
      <circle cx="125" cy="42" r="5" fill="#55efc4" opacity="0.7"/>
    </g>
    <text x="225" y="290" class="detail" style="fill:#00b894">Depth: O(log n)</text>
  </g>
  
  <!-- Section 5: Key Concept Box -->
  <g class="slide-in" style="animation-delay: 1.2s" data-narration="Key takeaway: randomization ensures expected O(n log n) regardless of input">
    <rect x="10" y="310" width="400" height="80" fill="#dfe6e9" rx="8" stroke="#b2bec3" stroke-width="1"/>
    <text x="20" y="332" class="section-title" style="fill:#2d3436">Key Concepts</text>
    <text x="20" y="352" class="detail">• Random pivot selection breaks worst-case input dependency</text>
    <text x="20" y="368" class="detail">• Expected time: O(n log n) | Worst-case: O(n²) remains</text>
    <text x="20" y="384" class="detail">• Probability of unbalanced partition: 1/n (very small for large n)</text>
  </g>
  
  <!-- Arrow indicators -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/>
    </marker>
  </defs>
  <line x1="205" y1="88" x2="215" y2="88" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
</svg>