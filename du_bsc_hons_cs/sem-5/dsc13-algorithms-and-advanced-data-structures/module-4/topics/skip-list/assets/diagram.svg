<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="skip-list">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ba3d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7fb5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8e6ac2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b4fa3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .concept-box { rx: 8; ry: 8; }
    .animated { animation-fill-mode: both; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #3498db; stroke-width: 2; stroke-dasharray: 5,3; }
    .node-line { stroke: #2980b9; stroke-width: 1.5; fill: none; }
    .node { filter: url(#shadow); }
    .header-node { filter: url(#shadow); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animated fade-in">Skip List Data Structure</text>
  <text x="210" y="48" text-anchor="middle" class="detail animated fade-in" style="animation-delay: 0.2s">Probabilistic O(log n) Search, Insert &amp; Delete</text>
  
  <!-- Level Labels (Left side) -->
  <g class="animated slide-in" style="animation-delay: 0.3s">
    <text x="15" y="100" class="label" style="fill:#8e6ac2;font-weight:bold">Level 3</text>
    <text x="15" y="140" class="label" style="fill:#7b68b6;font-weight:bold">Level 2</text>
    <text x="15" y="180" class="label" style="fill:#6b5cb8;font-weight:bold">Level 1</text>
    <text x="15" y="220" class="label" style="fill:#5b4eba;font-weight:bold">Level 0</text>
  </g>
  
  <!-- Skip List Nodes and Connections -->
  <g class="animated slide-in" style="animation-delay: 0.5s">
    <!-- Level 3 connections -->
    <line x1="80" y1="95" x2="200" y2="95" class="node-line" stroke-dasharray="4,2"/>
    <line x1="200" y1="95" x2="350" y2="95" class="node-line" stroke-dasharray="4,2"/>
    
    <!-- Level 2 connections -->
    <line x1="80" y1="135" x2="130" y2="135" class="node-line" stroke-dasharray="4,2"/>
    <line x1="130" y1="135" x2="200" y2="135" class="node-line" stroke-dasharray="4,2"/>
    <line x1="200" y1="135" x2="280" y2="135" class="node-line" stroke-dasharray="4,2"/>
    <line x1="280" y1="135" x2="350" y2="135" class="node-line" stroke-dasharray="4,2"/>
    
    <!-- Level 1 connections -->
    <line x1="80" y1="175" x2="130" y2="175" class="node-line"/>
    <line x1="130" y1="175" x2="170" y2="175" class="node-line"/>
    <line x1="170" y1="175" x2="200" y2="175" class="node-line"/>
    <line x1="200" y1="175" x2="240" y2="175" class="node-line"/>
    <line x1="240" y1="175" x2="280" y2="175" class="node-line"/>
    <line x1="280" y1="175" x2="320" y2="175" class="node-line"/>
    <line x1="320" y1="175" x2="350" y2="175" class="node-line"/>
    
    <!-- Level 0 connections (base layer - complete list) -->
    <line x1="80" y1="215" x2="110" y2="215" class="node-line"/>
    <line x1="110" y1="215" x2="130" y2="215" class="node-line"/>
    <line x1="130" y1="215" x2="150" y2="215" class="node-line"/>
    <line x1="150" y1="215" x2="170" y2="215" class="node-line"/>
    <line x1="170" y1="215" x2="190" y2="215" class="node-line"/>
    <line x1="190" y1="215" x2="210" y2="215" class="node-line"/>
    <line x1="210" y1="215" x2="230" y2="215" class="node-line"/>
    <line x1="230" y1="215" x2="250" y2="215" class="node-line"/>
    <line x1="250" y1="215" x2="270" y2="215" class="node-line"/>
    <line x1="270" y1="215" x2="290" y2="215" class="node-line"/>
    <line x1="290" y1="215" x2="310" y2="215" class="node-line"/>
    <line x1="310" y1="215" x2="330" y2="215" class="node-line"/>
    <line x1="330" y1="215" x2="350" y2="215" class="node-line"/>
    
    <!-- Header Node -->
    <rect x="55" y="75" width="30" height="150" rx="4" class="header-node" fill="url(#headerGradient)"/>
    <text x="70" y="130" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">HEAD</text>
    <line x1="85" y1="95" x2="200" y2="95" stroke="#6b4fa3" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="85" y1="135" x2="350" y2="135" stroke="#6b4fa3" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="85" y1="175" x2="350" y2="175" stroke="#6b4fa3" stroke-width="1"/>
    <line x1="85" y1="215" x2="350" y2="215" stroke="#6b4fa3" stroke-width="1"/>
  </g>
  
  <!-- Data Nodes -->
  <g class="animated fade-in" style="animation-delay: 0.7s">
    <!-- Node at 12 (4 levels - appears at all levels) -->
    <rect x="100" y="205" width="24" height="18" rx="3" class="node" fill="url(#nodeGradient)"/>
    <text x="112" y="217" text-anchor="middle" fill="white" font-family="Arial" font-size="9">12</text>
    <rect x="103" y="165" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="112" y="175" text-anchor="middle" fill="white" font-family="Arial" font-size="8">12</text>
    <rect x="103" y="125" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="112" y="135" text-anchor="middle" fill="white" font-family="Arial" font-size="8">12</text>
    <rect x="103" y="85" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="112" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="8">12</text>
    
    <!-- Node at 25 (3 levels) -->
    <rect x="140" y="205" width="24" height="18" rx="3" class="node" fill="url(#nodeGradient)"/>
    <text x="152" y="217" text-anchor="middle" fill="white" font-family="Arial" font-size="9">25</text>
    <rect x="143" y="165" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="152" y="175" text-anchor="middle" fill="white" font-family="Arial" font-size="8">25</text>
    <rect x="143" y="125" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="152" y="135" text-anchor="middle" fill="white" font-family="Arial" font-size="8">25</text>
    
    <!-- Node at 37 (2 levels) -->
    <rect x="180" y="205" width="24" height="18" rx="3" class="node" fill="url(#nodeGradient)"/>
    <text x="192" y="217" text-anchor="middle" fill="white" font-family="Arial" font-size="9">37</text>
    <rect x="183" y="165" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="192" y="175" text-anchor="middle" fill="white" font-family="Arial" font-size="8">37</text>
    
    <!-- Node at 50 (4 levels) -->
    <rect x="220" y="205" width="24" height="18" rx="3" class="node pulse" fill="url(#nodeGradient)"/>
    <text x="232" y="217" text-anchor="middle" fill="white" font-family="Arial" font-size="9">50</text>
    <rect x="223" y="165" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="232" y="175" text-anchor="middle" fill="white" font-family="Arial" font-size="8">50</text>
    <rect x="223" y="125" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="232" y="135" text-anchor="middle" fill="white" font-family="Arial" font-size="8">50</text>
    <rect x="223" y="85" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="232" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="8">50</text>
    
    <!-- Node at 68 (2 levels) -->
    <rect x="260" y="205" width="24" height="18" rx="3" class="node" fill="url(#nodeGradient)"/>
    <text x="272" y="217" text-anchor="middle" fill="white" font-family="Arial" font-size="9">68</text>
    <rect x="263" y="165" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="272" y="175" text-anchor="middle" fill="white" font-family="Arial" font-size="8">68</text>
    
    <!-- Node at 82 (3 levels) -->
    <rect x="300" y="205" width="24" height="18" rx="3" class="node" fill="url(#nodeGradient)"/>
    <text x="312" y="217" text-anchor="middle" fill="white" font-family="Arial" font-size="9">82</text>
    <rect x="303" y="165" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="312" y="175" text-anchor="middle" fill="white" font-family="Arial" font-size="8">82</text>
    <rect x="303" y="125" width="18" height="14" rx="2" class="node" fill="url(#nodeGradient)"/>
    <text x="312" y="135" text-anchor="middle" fill="white" font-family="Arial" font-size="8">82</text>
    
    <!-- Node at 95 (1 level - base only) -->
    <rect x="340" y="205" width="24" height="18" rx="3" class="node" fill="url(#nodeGradient)"/>
    <text x="352" y="217" text-anchor="middle" fill="white" font-family="Arial" font-size="9">95</text>
  </g>
  
  <!-- Arrows and Annotations -->
  <g class="animated fade-in" style="animation-delay: 1s">
    <!-- Express Lane Arrow -->
    <path d="M 270 60 Q 320 50 350 70" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="300" y="45" class="detail" style="fill:#e74c3c;font-style:italic">Express Lane</text>
    
    <!-- Base Layer Arrow -->
    <path d="M 380 230 Q 400 250 380 270" stroke="#27ae60" stroke-width="2" fill="none"/>
    <text x="360" y="295" class="detail" style="fill:#27ae60">Base Layer: All sorted elements</text>
  </g>
  
  <!-- Concept Boxes -->
  <g class="animated slide-in" style="animation-delay: 1.2s">
    <!-- Box 1: Structure -->
    <rect x="10" y="320" width="125" height="70" class="concept-box" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5" data-narration="Skip lists use multiple layers of linked lists where higher levels contain a subset of elements"/>
    <text x="22" y="338" class="label" style="font-weight:bold">Multi-Level Structure</text>
    <text x="22" y="355" class="detail">Higher layers skip</text>
    <text x="22" y="368" class="detail">over many elements</text>
    <text x="22" y="381" class="detail">O(log n) search</text>
    
    <!-- Box 2: Probabilistic -->
    <rect x="145" y="320" width="130" height="70" class="concept-box" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1.5" data-narration="The height of each node is determined randomly using a coin flip probability, typically 50% chance of extending to next level"/>
    <text x="157" y="338" class="label" style="font-weight:bold">Random Height</text>
    <text x="157" y="355" class="detail">Coin flip (p=0.5)</text>
    <text x="157" y="368" class="detail">determines node</text>
    <text x="157" y="381" class="detail">levels in structure</text>
    
    <!-- Box 3: Advantages -->
    <rect x="285" y="320" width="120" height="70" class="concept-box" fill="#f5eef8" stroke="#9b59b6" stroke-width="1.5" data-narration="Skip lists provide O(log n) average case performance for search, insert, and delete while being simpler to implement than balanced BSTs"/>
    <text x="297" y="338" class="label" style="font-weight:bold">Why Skip Lists?</text>
    <text x="297" y="355" class="detail">Simpler than AVL</text>
    <text x="297" y="368" class="detail">O(log n) avg case</text>
    <text x="297" y="381" class="detail">Easy to implement</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="30" r="12" fill="#3498db" opacity="0.3" class="animated pulse"/>
  <circle cx="25" cy="380" r="8" fill="#e74c3c" opacity="0.3" class="animated pulse" style="animation-delay: 0.5s"/>
  <circle cx="400" cy="370" r="10" fill="#27ae60" opacity="0.3" class="animated pulse" style="animation-delay: 1s"/>
</svg>