<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="np-np-hard-np-complete-classes">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="npGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#96fbc4;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#f9f586;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="hardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .p-circle { animation: slideInLeft 0.6s ease-out forwards; }
    .np-circle { animation: slideInRight 0.6s ease-out forwards; }
    .hard-circle { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .complete-intersect { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .label { animation: slideInUp 0.5s ease-out forwards; }
    .box { animation: fadeIn 0.6s ease-out forwards; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">NP, NP-Hard &amp; NP-Complete</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">Complexity Classes Relationship</text>
  
  <!-- P Circle -->
  <g data-narration="Class P contains problems solvable in polynomial time">
    <ellipse cx="140" cy="200" rx="65" ry="70" fill="url(#pGradient)" stroke="#2ecc71" stroke-width="2" class="p-circle" filter="url(#shadow)"/>
    <text x="140" y="195" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#27ae60" class="label">P</text>
    <text x="140" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#1e8449">Polynomial Time</text>
    <text x="140" y="250" text-anchor="middle" font-family="Arial" font-size="8" fill="#145a32">Solvable in</text>
    <text x="140" y="262" text-anchor="middle" font-family="Arial" font-size="8" fill="#145a32">O(n^k) time</text>
  </g>
  
  <!-- NP Circle -->
  <g data-narration="Class NP contains problems verifiable in polynomial time">
    <ellipse cx="280" cy="200" rx="80" ry="85" fill="url(#npGradient)" stroke="#f39c12" stroke-width="2" class="np-circle" filter="url(#shadow)"/>
    <text x="280" y="190" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#d68910">NP</text>
    <text x="280" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c640c">Nondeterministic</text>
    <text x="280" y="222" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c640c">Polynomial Time</text>
    <text x="280" y="260" text-anchor="middle" font-family="Arial" font-size="8" fill="#7d5108">Verifiable in</text>
    <text x="280" y="272" text-anchor="middle" font-family="Arial" font-size="8" fill="#7d5108">polynomial time</text>
  </g>
  
  <!-- NP-Hard Circle -->
  <g data-narration="NP-Hard problems are at least as hard as the hardest problems in NP">
    <ellipse cx="320" cy="280" rx="75" ry="55" fill="url(#hardGradient)" stroke="#e74c3c" stroke-width="2" class="hard-circle" filter="url(#shadow)"/>
    <text x="320" y="275" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c0392b">NP-Hard</text>
    <text x="320" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#922b21">"As hard as"</text>
    <text x="320" y="307" text-anchor="middle" font-family="Arial" font-size="8" fill="#922b21">NP problems</text>
  </g>
  
  <!-- NP-Complete Intersection -->
  <g data-narration="NP-Complete is the intersection of NP and NP-Hard">
    <ellipse cx="210" cy="250" rx="45" ry="35" fill="#e8daef" stroke="#8e44ad" stroke-width="2" class="complete-intersect" filter="url(#shadow)"/>
    <text x="210" y="247" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6c3483">NP-Complete</text>
    <text x="210" y="262" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a235a">NP ∩ NP-Hard</text>
  </g>
  
  <!-- Arrows and Labels -->
  <g data-narration="P is a subset of NP - all P problems are also NP problems">
    <!-- Arrow from P to NP -->
    <path d="M 200 180 Q 220 140 230 150" stroke="#34495e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
    <text x="225" y="130" font-family="Arial" font-size="8" fill="#34495e">P ⊂ NP</text>
  </g>
  
  <g data-narration="NP-Complete problems are in NP and are NP-Hard">
    <!-- Arrow showing NP-Complete relationship -->
    <path d="M 210 285 L 210 310" stroke="#8e44ad" stroke-width="1.5" fill="none" class="arrow"/>
    <text x="215" y="300" font-family="Arial" font-size="7" fill="#8e44ad">NP-Complete</text>
  </g>
  
  <g data-narration="NP-Hard contains NP-Complete">
    <path d="M 265 270 Q 290 260 300 270" stroke="#e74c3c" stroke-width="1" fill="none" stroke-dasharray="3,2" class="arrow"/>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g data-narration="Key examples of each class">
    <rect x="10" y="320" width="125" height="70" rx="5" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" class="box" filter="url(#shadow)"/>
    <text x="72" y="335" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">P Examples</text>
    <text x="20" y="350" font-family="Arial" font-size="8" fill="#5d6d7e">• Sorting</text>
    <text x="20" y="362" font-family="Arial" font-size="8" fill="#5d6d7e">• Shortest Path</text>
    <text x="20" y="374" font-family="Arial" font-size="8" fill="#5d6d7e">• Primality Test</text>
    <text x="20" y="386" font-family="Arial" font-size="8" fill="#5d6d7e">• Matrix Mult.</text>
  </g>
  
  <g data-narration="Key NP-Complete and NP-Hard examples">
    <rect x="145" y="320" width="130" height="70" rx="5" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" class="box" filter="url(#shadow)"/>
    <text x="210" y="335" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">NP-Complete</text>
    <text x="155" y="350" font-family="Arial" font-size="8" fill="#5d6d7e">• SAT</text>
    <text x="155" y="362" font-family="Arial" font-size="8" fill="#5d6d7e">• Hamiltonian Path</text>
    <text x="155" y="374" font-family="Arial" font-size="8" fill="#5d6d7e">• Vertex Cover</text>
    <text x="155" y="386" font-family="Arial" font-size="8" fill="#5d6d7e">• Knapsack</text>
  </g>
  
  <g data-narration="NP-Hard examples include optimization versions">
    <rect x="285" y="320" width="120" height="70" rx="5" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" class="box" filter="url(#shadow)"/>
    <text x="345" y="335" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">NP-Hard</text>
    <text x="295" y="350" font-family="Arial" font-size="8" fill="#5d6d7e">• Travelling Salesman</text>
    <text x="295" y="362" font-family="Arial" font-size="8" fill="#5d6d7e">• Halting Problem</text>
    <text x="295" y="374" font-family="Arial" font-size="8" fill="#5d6d7e">• Max Cut</text>
    <text x="295" y="386" font-family="Arial" font-size="8" fill="#5d6d7e">• Integer Programming</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
  
  <!-- Question Mark for P vs NP -->
  <g data-narration="The P vs NP problem asks whether P equals NP">
    <text x="210" y="145" text-anchor="middle" font-family="Arial" font-size="24" fill="#e74c3c" font-weight="bold" class="pulse">?</text>
    <text x="210" y="160" text-anchor="middle" font-family="Arial" font-size="7" fill="#c0392b">P = NP ?</text>
  </g>
</svg>