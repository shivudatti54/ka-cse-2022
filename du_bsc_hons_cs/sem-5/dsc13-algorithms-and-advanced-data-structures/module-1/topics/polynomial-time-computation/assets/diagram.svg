<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="polynomial-time-computation" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8f0"/>
    </linearGradient>
    <linearGradient id="pGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="npGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcd6f7"/>
      <stop offset="100%" style="stop-color:#a6b1e1"/>
    </linearGradient>
    <linearGradient id="npCompleteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="npHardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="undecidableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cfd9df"/>
      <stop offset="100%" style="stop-color:#e2ebf0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .complexity-text { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #333; }
    .section { opacity: 0; }
    .section-1 { animation: slideIn 0.5s ease-out 0.2s forwards; }
    .section-2 { animation: fadeIn 0.6s ease-out 0.4s forwards; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s forwards; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.8s forwards; }
    .section-5 { animation: fadeIn 0.6s ease-out 1.0s forwards; }
    .section-6 { animation: fadeIn 0.6s ease-out 1.2s forwards; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out 1.5s forwards; stroke-dashoffset: 100; }
    .p-circle { animation: pulse 3s ease-in-out infinite; transform-origin: 180px 220px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title section section-1">Polynomial Time Computation</text>
  <text x="210" y="50" text-anchor="middle" class="detail section section-1">Complexity Class Hierarchy</text>
  
  <!-- NP-Hard (largest, outer) -->
  <ellipse cx="230" cy="240" rx="160" ry="120" fill="url(#npHardGradient)" filter="url(#shadow)" class="section section-2" data-narration="NP-Hard: Problems at least as hard as NP-Complete problems. Not all are in NP."/>
  <text x="340" y="200" class="label" fill="#8b4557">NP-Hard</text>
  <text x="340" y="215" class="detail">All NP-Complete ⊂ NP-Hard</text>
  
  <!-- NP (middle) -->
  <ellipse cx="200" cy="240" rx="110" ry="85" fill="url(#npGradient)" filter="url(#shadow)" class="section section-3" data-narration="NP: Nondeterministic Polynomial time - solutions verifiable in polynomial time"/>
  <text x="200" y="210" class="label" fill="#5a4a8a">NP</text>
  <text x="200" y="225" class="detail">Verifiable in poly-time</text>
  
  <!-- NP-Complete (subset of NP) -->
  <ellipse cx="200" cy="260" rx="50" ry="40" fill="url(#npCompleteGradient)" filter="url(#shadow)" class="section section-4" data-narration="NP-Complete: Hardest problems in NP. If one can be solved in poly-time, all NP problems can be."/>
  <text x="200" y="255" class="label" fill="#a0522d">NP-Complete</text>
  <text x="200" y="270" class="detail">"Hardest" in NP</text>
  
  <!-- P (subset of NP, inside NP-Complete visually for representation) -->
  <circle cx="160" cy="280" r="35" fill="url(#pGradient)" filter="url(#shadow)" class="section section-5 p-circle" data-narration="P: Polynomial time - efficiently solvable problems. Includes sorting, searching, shortest path."/>
  <text x="160" y="278" class="label" fill="#2d5a4a">P</text>
  <text x="160" y="293" class="detail">O(nᵏ) solvable</text>
  
  <!-- Undecidable (outside) -->
  <rect x="300" y="320" width="100" height="45" rx="8" fill="url(#undecidableGradient)" filter="url(#shadow)" class="section section-6" data-narration="Undecidable: Problems with no algorithm to solve them. Example: Halting Problem."/>
  <text x="350" y="340" text-anchor="middle" class="label" fill="#666">Undecidable</text>
  <text x="350" y="355" text-anchor="middle" class="detail">No algorithm exists</text>
  
  <!-- Arrow from P to NP -->
  <line x1="190" y1="270" x2="210" y2="250" stroke="#666" stroke-width="1.5" class="arrow-line" marker-end="url(#arrowhead)"/>
  <text x="205" y="258" class="detail" transform="rotate(-45 205 258)">P ⊂ NP</text>
  
  <!-- Arrow from NP to NP-Hard -->
  <line x1="290" y1="220" x2="320" y2="210" stroke="#666" stroke-width="1.5" class="arrow-line"/>
  <text x="302" y="205" class="detail">NP ⊂ NP-Hard?</text>
  
  <!-- Key Concepts Box -->
  <rect x="10" y="55" width="130" height="100" rx="6" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="20" y="75" class="label" fill="#2c3e50" font-size="12">Key Concepts</text>
  <text x="20" y="92" class="detail">• P = Poly-time solvable</text>
  <text x="20" y="107" class="detail">• NP = Poly-time verifiable</text>
  <text x="20" y="122" class="detail">• NP-Complete = NP-hard ∩ NP</text>
  <text x="20" y="137" class="detail">• P vs NP: Million $ prize</text>
  <text x="20" y="152" class="detail">• O(nᵏ) = polynomial</text>
  
  <!-- Examples Box -->
  <rect x="10" y="165" width="130" height="70" rx="6" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="20" y="185" class="label" fill="#2c3e50" font-size="12">P Examples</text>
  <text x="20" y="202" class="detail">• Sorting: O(n log n)</text>
  <text x="20" y="217" class="detail">• Shortest Path: O(V²)</text>
  <text x="20" y="232" class="detail">• Matrix Multiplication</text>
  
  <!-- Arrows showing relationships -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Arrow P ⊂ NP -->
  <line x1="130" y1="290" x2="155" y2="265" stroke="#666" stroke-width="1.5" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow NP-Complete subset of NP -->
  <line x1="160" y1="255" x2="170" y2="230" stroke="#666" stroke-width="1.5" class="arrow-line" marker-end="url(#arrowhead)"/>
  <text x="145" y="275" class="detail" font-size="10">P ⊂ NP ⊂ NP-Hard</text>
  
  <!-- P vs NP question mark -->
  <text x="280" y="290" class="complexity-text" font-size="16" fill="#e74c3c">P ≠ NP ?</text>
</svg>