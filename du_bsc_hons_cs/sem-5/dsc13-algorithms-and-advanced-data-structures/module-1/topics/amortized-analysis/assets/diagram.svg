<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="amortized-analysis" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="fullArrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="newArrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#1e8449"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes copyMove {
      0% { transform: translate(0, 0); opacity: 1; }
      100% { transform: translate(60px, 30px); opacity: 0.8; }
    }
    @keyframes fillBar {
      from { width: 0; }
      to { width: var(--fill-width); }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .slide-in-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .highlight { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #e74c3c; }
    .concept-box { fill: #fff; stroke: #3498db; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
    .array-cell { stroke: #fff; stroke-width: 1; }
    .arrow { fill: none; stroke: #95a5a6; stroke-width: 2; marker-end: url(#arrowhead); }
    .bar-bg { fill: #ecf0f1; rx: 4; }
    .bar-fill { fill: url(#arrayGradient); rx: 4; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title fade-in">Amortized Analysis</text>
  <text x="210" y="55" text-anchor="middle" class="detail slide-in" style="animation-delay: 0.2s">Dynamic Array Doubling</text>
  
  <!-- Section 1: Initial Array State -->
  <g class="slide-in-up" style="animation-delay: 0.3s" data-narration="Shows a small initial array with 4 slots, representing the starting state before any insertions">
    <rect x="30" y="80" width="150" height="70" class="concept-box"/>
    <text x="105" y="98" text-anchor="middle" class="label" font-weight="bold">Initial Array</text>
    <rect x="40" y="110" width="30" height="25" fill="url(#arrayGradient)" class="array-cell"/>
    <rect x="75" y="110" width="30" height="25" fill="url(#arrayGradient)" class="array-cell"/>
    <rect x="110" y="110" width="30" height="25" fill="#bdc3c7" class="array-cell"/>
    <rect x="145" y="110" width="30" height="25" fill="#bdc3c7" class="array-cell"/>
    <text x="55" y="150" text-anchor="middle" class="detail">A</text>
    <text x="90" y="150" text-anchor="middle" class="detail">B</text>
    <text x="125" y="150" text-anchor="middle" class="detail">-</text>
    <text x="160" y="150" text-anchor="middle" class="detail">-</text>
  </g>
  
  <!-- Section 2: Array Filling -->
  <g class="slide-in-up" style="animation-delay: 0.5s" data-narration="As elements are inserted, the array fills up. Each insertion costs O(1) in this phase">
    <rect x="240" y="80" width="150" height="70" class="concept-box"/>
    <text x="315" y="98" text-anchor="middle" class="label" font-weight="bold">Array Filling</text>
    <rect x="250" y="110" width="30" height="25" fill="url(#arrayGradient)" class="array-cell"/>
    <rect x="285" y="110" width="30" height="25" fill="url(#arrayGradient)" class="array-cell"/>
    <rect x="320" y="110" width="30" height="25" fill="url(#arrayGradient)" class="array-cell"/>
    <rect x="355" y="110" width="30" height="25" fill="#bdc3c7" class="array-cell"/>
    <text x="265" y="150" text-anchor="middle" class="detail">A</text>
    <text x="300" y="150" text-anchor="middle" class="detail">B</text>
    <text x="335" y="150" text-anchor="middle" class="detail">C</text>
    <text x="370" y="150" text-anchor="middle" class="detail">-</text>
  </g>
  
  <!-- Arrow between sections -->
  <path d="M185 115 L235 115" class="arrow" stroke-dasharray="4,2"/>
  
  <!-- Section 3: Full State -->
  <g class="slide-in-up" style="animation-delay: 0.7s" data-narration="When array reaches full capacity, next insertion triggers expensive resize operation">
    <rect x="30" y="175" width="150" height="80" class="concept-box"/>
    <text x="105" y="195" text-anchor="middle" class="label" font-weight="bold">Array Full</text>
    <rect x="40" y="210" width="30" height="25" fill="url(#fullArrayGradient)" class="array-cell pulse"/>
    <rect x="75" y="210" width="30" height="25" fill="url(#fullArrayGradient)" class="array-cell pulse"/>
    <rect x="110" y="210" width="30" height="25" fill="url(#fullArrayGradient)" class="array-cell pulse"/>
    <rect x="145" y="210" width="30" height="25" fill="url(#fullArrayGradient)" class="array-cell pulse"/>
    <text x="55" y="250" text-anchor="middle" class="detail">A</text>
    <text x="90" y="250" text-anchor="middle" class="detail">B</text>
    <text x="125" y="250" text-anchor="middle" class="detail">C</text>
    <text x="160" y="250" text-anchor="middle" class="detail">D</text>
    <text x="105" y="268" text-anchor="middle" class="highlight">FULL!</text>
  </g>
  
  <!-- Section 4: Expansion -->
  <g class="slide-in-up" style="animation-delay: 0.9s" data-narration="The array doubles in size. This resize operation copies all elements but happens infrequently">
    <rect x="240" y="175" width="150" height="80" class="concept-box"/>
    <text x="315" y="195" text-anchor="middle" class="label" font-weight="bold" fill="#27ae60">Resize: 2×</text>
    <!-- Old array fading -->
    <rect x="250" y="210" width="30" height="25" fill="url(#fullArrayGradient)" class="array-cell" opacity="0.5"/>
    <rect x="285" y="210" width="30" height="25" fill="url(#fullArrayGradient)" class="array-cell" opacity="0.5"/>
    <rect x="320" y="210" width="30" height="25" fill="url(#fullArrayGradient)" class="array-cell" opacity="0.5"/>
    <rect x="355" y="210" width="30" height="25" fill="url(#fullArrayGradient)" class="array-cell" opacity="0.5"/>
    <!-- New doubled array -->
    <rect x="248" y="230" width="135" height="28" fill="url(#newArrayGradient)" rx="3" class="slide-in" style="animation-delay: 1.1s"/>
    <text x="315" y="250" text-anchor="middle" class="detail" fill="#fff" style="animation-delay: 1.2s">New 8-slot Array</text>
  </g>
  
  <!-- Arrow -->
  <path d="M185 215 L235 215" class="arrow" stroke-dasharray="4,2"/>
  
  <!-- Section 5: Cost Visualization -->
  <g class="slide-in-up" style="animation-delay: 1.1s" data-narration="Shows how expensive operations are amortized over many cheap operations">
    <rect x="30" y="280" width="175" height="100" class="concept-box"/>
    <text x="117" y="300" text-anchor="middle" class="label" font-weight="bold">Cost Amortization</text>
    
    <!-- Cost bar chart -->
    <rect x="45" y="315" width="20" height="40" class="bar-bg"/>
    <rect x="45" y="335" width="20" height="20" class="bar-fill" style="--fill-width: 20px"/>
    <text x="55" y="370" text-anchor="middle" class="detail" font-size="10">n</text>
    <text x="55" y="382" text-anchor="middle" class="detail" font-size="9">ops</text>
    
    <rect x="75" y="315" width="20" height="40" class="bar-bg"/>
    <rect x="75" y="335" width="20" height="20" class="bar-fill" style="--fill-width: 20px"/>
    <text x="85" y="370" text-anchor="middle" class="detail" font-size="10">n</text>
    <text x="85" y="382" text-anchor="middle" class="detail" font-size="9">ops</text>
    
    <rect x="105" y="315" width="20" height="40" class="bar-bg"/>
    <rect x="105" y="315" width="20" height="40" class="bar-fill" style="--fill-width: 20px"/>
    <text x="115" y="370" text-anchor="middle" class="detail" font-size="10">1</text>
    <text x="115" y="382" text-anchor="middle" class="detail" font-size="9">resize</text>
    
    <line x1="135" y1="355" x2="170" y2="355" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="160" y="348" text-anchor="middle" class="highlight" font-size="11">Total: 2n+1</text>
    <text x="160" y="378" text-anchor="middle" class="detail" font-size="11">= O(n)</text>
  </g>
  
  <!-- Section 6: Key Result -->
  <g class="slide-in-up" style="animation-delay: 1.3s" data-narration="The amortized cost per operation is constant O(1), proving the effectiveness of the technique">
    <rect x="220" y="280" width="170" height="100" class="concept-box" style="stroke: #27ae60"/>
    <text x="305" y="300" text-anchor="middle" class="label" font-weight="bold" fill="#27ae60">Result</text>
    <text x="305" y="325" text-anchor="middle" class="detail">Total cost: O(n)</text>
    <text x="305" y="345" text-anchor="middle" class="detail">Operations: n+1</text>
    <line x1="245" y1="355" x2="365" y2="355" stroke="#bdc3c7" stroke-width="1"/>
    <text x="305" y="372" text-anchor="middle" class="highlight" font-size="16">Amortized: O(1)</text>
  </g>
  
  <!-- Decorative element -->
  <circle cx="400" cy="30" r="15" fill="#3498db" opacity="0.1" class="pulse"/>
  <circle cx="20" cy="380" r="20" fill="#e74c3c" opacity="0.08"/>
</svg>