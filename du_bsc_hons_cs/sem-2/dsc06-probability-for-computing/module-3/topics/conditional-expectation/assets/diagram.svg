<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="conditional-expectation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8fcf5"/>
    </linearGradient>
    <linearGradient id="partition1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5d9"/>
      <stop offset="100%" style="stop-color:#ffcdb2"/>
    </linearGradient>
    <linearGradient id="partition2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9e4ff"/>
      <stop offset="100%" style="stop-color:#b3c9ff"/>
    </linearGradient>
    <linearGradient id="partition3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f5e9"/>
      <stop offset="100%" style="stop-color:#a8e6cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .partition { animation: slideInUp 0.8s ease-out backwards; }
    .partition:nth-child(1) { animation-delay: 0.2s; }
    .partition:nth-child(2) { animation-delay: 0.4s; }
    .partition:nth-child(3) { animation-delay: 0.6s; }
    .formula-box { animation: slideInRight 0.8s ease-out 0.8s backwards; }
    .label { animation: fadeIn 0.6s ease-out 1s backwards; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: fadeIn 0.5s ease-out 1.2s backwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Conditional Expectation</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="title">E[X | Y = y]</text>
  
  <!-- Sample Space Partition Visualization -->
  <g transform="translate(30, 80)" data-narration="The sample space Ω is partitioned by different values of Y">
    <text x="85" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">Sample Space Ω</text>
    
    <!-- Partition 1: Y = y1 -->
    <g class="partition" data-narration="First partition represents Y=y1 with its conditional expectation value">
      <rect x="0" y="0" width="70" height="90" fill="url(#partition1)" rx="5" filter="url(#shadow)"/>
      <text x="35" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">Y = y₁</text>
      <line x1="10" y1="30" x2="60" y2="30" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="35" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">P(Y=y₁)</text>
      <text x="35" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">= 0.3</text>
      <line x1="10" y1="70" x2="60" y2="70" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="35" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c0392b" font-weight="bold">E[X|Y=y₁]</text>
      <text x="35" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">= 2.5</text>
    </g>
    
    <!-- Partition 2: Y = y2 -->
    <g class="partition" data-narration="Second partition represents Y=y2 with a different expectation value">
      <rect x="80" y="0" width="70" height="90" fill="url(#partition2)" rx="5" filter="url(#shadow)"/>
      <text x="115" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">Y = y₂</text>
      <line x1="90" y1="30" x2="140" y2="30" stroke="#2980b9" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="115" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">P(Y=y₂)</text>
      <text x="115" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">= 0.5</text>
      <line x1="90" y1="70" x2="140" y2="70" stroke="#2980b9" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="115" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9" font-weight="bold">E[X|Y=y₂]</text>
      <text x="115" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">= 5.8</text>
    </g>
    
    <!-- Partition 3: Y = y3 -->
    <g class="partition" data-narration="Third partition represents Y=y3">
      <rect x="160" y="0" width="70" height="90" fill="url(#partition3)" rx="5" filter="url(#shadow)"/>
      <text x="195" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a085">Y = y₃</text>
      <line x1="170" y1="30" x2="220" y2="30" stroke="#16a085" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="195" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">P(Y=y₃)</text>
      <text x="195" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">= 0.2</text>
      <line x1="170" y1="70" x2="220" y2="70" stroke="#16a085" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="195" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#16a085" font-weight="bold">E[X|Y=y₃]</text>
      <text x="195" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">= 8.1</text>
    </g>
  </g>
  
  <!-- Formula Box -->
  <g class="formula-box" data-narration="The mathematical definition of conditional expectation for discrete random variables" transform="translate(280, 85)">
    <rect x="0" y="0" width="130" height="120" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Definition</text>
    <line x1="10" y1="28" x2="120" y2="28" stroke="#ecf0f1" stroke-width="1"/>
    <text x="65" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2c3e50">E[X | Y = y]</text>
    <text x="65" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">=</text>
    <text x="65" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#34495e">∑ x · P(X=x | Y=y)</text>
    <text x="65" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#95a5a6">discrete case</text>
  </g>
  
  <!-- Relationship Arrow -->
  <g class="arrow" data-narration="Shows how conditional expectation weights by probability">
    <path d="M 260 165 L 270 150 L 280 165" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <text x="270" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">weighted</text>
  </g>
  
  <!-- Expectation Calculation Box -->
  <g class="formula-box" data-narration="The total expectation equals the weighted average of conditional expectations" transform="translate(280, 220)">
    <rect x="0" y="0" width="130" height="70" fill="#fef9e7" rx="8" filter="url(#shadow)"/>
    <text x="65" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#b7950b">Total Expectation</text>
    <line x1="10" y1="26" x2="120" y2="26" stroke="#f39c12" stroke-width="1"/>
    <text x="65" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">E[X] = Σ E[X|Y=y]</text>
    <text x="65" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">× P(Y=y)</text>
  </g>
  
  <!-- Key Insight Box -->
  <g transform="translate(30, 190)" data-narration="Key insight: conditional expectation is a random variable that depends on Y">
    <rect x="0" y="0" width="240" height="50" fill="#f8f9fa" rx="6" stroke="#dee2e6" stroke-width="1"/>
    <text x="120" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Key Insight</text>
    <text x="120" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">E[X|Y] is a random variable - a function of Y</text>
    <text x="120" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#95a5a6">it takes value E[X|Y=y] when Y=y</text>
  </g>
  
  <!-- Visual Timeline showing conditional nature -->
  <g transform="translate(30, 255)" data-narration="Process flow showing how information about Y refines the expectation of X">
    <text x="10" y="15" text-anchor="start" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">Process Flow:</text>
    
    <!-- Step 1 -->
    <rect x="10" y="30" width="70" height="40" fill="#e8daef" rx="5"/>
    <text x="45" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6c3483">Observe</text>
    <text x="45" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6c3483">Y = y</text>
    
    <!-- Arrow 1 -->
    <path d="M 85 50 L 105 50" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <polygon points="105,50 95,45 95,55" fill="#9b59b6"/>
    
    <!-- Step 2 -->
    <rect x="115" y="30" width="80" height="40" fill="#d5f5e3" rx="5"/>
    <text x="155" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e8449">Compute</text>
    <text x="155" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e8449">E[X|Y=y]</text>
    
    <!-- Arrow 2 -->
    <path d="M 200 50 L 220 50" fill="none" stroke="#27ae60" stroke-width="2"/>
    <polygon points="220,50 210,45 210,55" fill="#27ae60"/>
    
    <!-- Step 3 -->
    <rect x="230" y="30" width="70" height="40" fill="#fadbd8" rx="5"/>
    <text x="265" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c0392b">Refined</text>
    <text x="265" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">Prediction</text>
  </g>
  
  <!-- Application Note -->
  <g transform="translate(30, 320)" data-narration="Applications in computing and algorithm analysis">
    <text x="10" y="15" text-anchor="start" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#34495e">Applications:</text>
    <text x="10" y="32" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">• Randomized algorithm analysis</text>
    <text x="10" y="45" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">• Markov chains &amp; martingales</text>
    <text x="10" y="58" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">• Bayesian machine learning</text>
  </g>
  
  <!-- Probability Weights Visual -->
  <g transform="translate(300, 300)" data-narration="Visual representation of probability weights for each partition">
    <text x="0" y="10" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#34495e">Weights:</text>
    <rect x="0" y="20" width="20" height="12" fill="#ffcdb2"/>
    <text x="25" y="30" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">0.3</text>
    <rect x="0" y="36" width="30" height="12" fill="#b3c9ff"/>
    <text x="35" y="46" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">0.5</text>
    <rect x="0" y="52" width="12" height="12" fill="#a8e6cf"/>
    <text x="17" y="62" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">0.2</text>
  </g>
  
  <!-- Highlighted expectation value example -->
  <g class="highlight" transform="translate(160, 130)" data-narration="Example: when Y=y2, the expected value of X is 5.8">
    <circle cx="115" cy="30" r="18" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="115" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">example</text>
  </g>
</svg>