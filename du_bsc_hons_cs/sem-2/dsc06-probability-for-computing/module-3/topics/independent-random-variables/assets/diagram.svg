<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="independent-random-variables">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4eef5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="surfaceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7fb3d5;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#5499c7;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="xAxisGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76d7c4;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#48c9b0;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="yAxisGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b041;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.9" />
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #2c3e50; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula-text { font-family: 'Times New Roman', serif; font-size: 14px; fill: #1a5276; font-style: italic; }
    .section-box { animation: fadeIn 0.8s ease-out forwards; }
    .anim-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-up { animation: slideInUp 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .dashed-line { stroke-dasharray: 5,5; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="section-box" data-narration="Title introducing the topic of Independent Random Variables">
    <text x="210" y="30" text-anchor="middle" class="title-text">Independent Random Variables</text>
    <line x1="100" y1="42" x2="320" y2="42" stroke="#5499c7" stroke-width="2"/>
  </g>
  
  <!-- Definition Box -->
  <g class="anim-up" data-narration="The mathematical definition of independence between two random variables">
    <rect x="20" y="55" width="180" height="60" rx="6" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="30" y="72" class="label-text" font-weight="600">Definition</text>
    <text x="30" y="90" class="formula-text">P(X=x, Y=y) =</text>
    <text x="30" y="107" class="detail-text">P(X=x) × P(Y=y)</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="anim-up" data-narration="Key insight: knowing one variable tells us nothing about the other">
    <rect x="220" y="55" width="180" height="60" rx="6" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="230" y="72" class="label-text" font-weight="600">Key Insight</text>
    <text x="230" y="92" class="detail-text">Knowing X tells us</text>
    <text x="230" y="107" class="detail-text">nothing about Y</text>
  </g>
  
  <!-- Unit Square Visualization Area -->
  <g transform="translate(50, 130)" data-narration="Visual representation of joint density of two independent Uniform(0,1) variables forming a rectangular region">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="0" y2="150" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="0" y1="150" x2="150" y2="150" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="150" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="0" y1="0" x2="150" y2="0" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,4"/>
    
    <!-- Unit square filled -->
    <rect x="0" y="0" width="150" height="150" fill="url(#surfaceGradient)" class="anim-pulse" opacity="0.7"/>
    
    <!-- Axis labels -->
    <text x="75" y="170" text-anchor="middle" class="label-text" font-weight="600">X ~ Uniform(0,1)</text>
    <text x="-75" y="75" text-anchor="middle" class="label-text" font-weight="600" transform="rotate(-90,-75,75)">Y ~ Uniform(0,1)</text>
    
    <!-- X marginal (top) -->
    <rect x="0" y="-25" width="150" height="20" fill="url(#xAxisGradient)" rx="3"/>
    <text x="75" y="-10" text-anchor="middle" class="detail-text" fill="#fff">f_X(x) = 1</text>
    
    <!-- Y marginal (left) -->
    <rect x="-25" y="0" width="20" height="150" fill="url(#yAxisGradient)" rx="3"/>
    <text x="-18" y="78" text-anchor="middle" class="detail-text" fill="#fff" transform="rotate(-90,-18,78)">f_Y(y) = 1</text>
    
    <!-- Point indicators -->
    <circle cx="45" cy="100" r="6" fill="#e74c3c" class="anim-pulse"/>
    <circle cx="120" cy="40" r="6" fill="#27ae60" class="anim-pulse"/>
    <text x="45" y="118" text-anchor="middle" class="detail-text">(x₁,y₁)</text>
    <text x="120" y="30" text-anchor="middle" class="detail-text">(x₂,y₂)</text>
    
    <!-- Independence indicator -->
    <text x="75" y="75" text-anchor="middle" class="label-text" fill="#fff" font-size="16" font-weight="600">f(x,y)=1×1=1</text>
  </g>
  
  <!-- Arrows showing independence relationship -->
  <g class="anim-left" data-narration="Arrow showing that joint equals product of marginals">
    <path d="M 210 200 L 260 200" stroke="#5499c7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Formula expansion box -->
  <g class="anim-right" data-narration="Formula showing independence condition for continuous variables">
    <rect x="270" y="185" width="130" height="50" rx="6" fill="#fff" filter="url(#shadow)"/>
    <text x="280" y="205" class="formula-text" font-size="13">f(x,y) = f_X(x) × f_Y(y)</text>
    <text x="280" y="225" class="detail-text">for ALL x, y in [0,1]</text>
  </g>
  
  <!-- Bottom section - Properties -->
  <g transform="translate(0, 290)" data-narration="Properties of independent random variables">
    <!-- Property 1 -->
    <g class="anim-up">
      <rect x="20" y="0" width="115" height="40" rx="5" fill="#fff" filter="url(#shadow)"/>
      <text x="30" y="18" class="label-text" font-size="12" font-weight="600">Covariance</text>
      <text x="30" y="32" class="detail-text">Cov(X,Y) = 0</text>
    </g>
    
    <!-- Property 2 -->
    <g class="anim-up" style="animation-delay: 0.2s">
      <rect x="145" y="0" width="115" height="40" rx="5" fill="#fff" filter="url(#shadow)"/>
      <text x="155" y="18" class="label-text" font-size="12" font-weight="600">E[XY]</text>
      <text x="155" y="32" class="detail-text">= E[X] × E[Y]</text>
    </g>
    
    <!-- Property 3 -->
    <g class="anim-up" style="animation-delay: 0.4s">
      <rect x="270" y="0" width="130" height="40" rx="5" fill="#fff" filter="url(#shadow)"/>
      <text x="280" y="18" class="label-text" font-size="12" font-weight="600">Conditional</text>
      <text x="280" y="32" class="detail-text">P(Y|X)=P(Y)</text>
    </g>
  </g>
  
  <!-- Visual example box -->
  <g transform="translate(20, 345)" data-narration="Example showing probability calculation under independence">
    <rect x="0" y="0" width="380" height="45" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="15" y="20" class="label-text" font-weight="600" fill="#2c3e50">Example:</text>
    <text x="85" y="20" class="detail-text" fill="#34495e">P(X&lt;0.5, Y&lt;0.3) =</text>
    <text x="225" y="20" class="formula-text" fill="#1a5276">0.5 × 0.3 = 0.15</text>
    <path d="M 85 30 L 175 30" stroke="#27ae60" stroke-width="2" class="dashed-line"/>
  </g>
  
  <!-- Annotation arrows -->
  <g>
    <line x1="130" y1="250" x2="100" y2="270" stroke="#7fb3d5" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="95" y="265" class="detail-text" fill="#5499c7">Joint = Product</text>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7fb3d5"/>
    </marker>
  </defs>
</svg>