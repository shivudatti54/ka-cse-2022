<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="covariance-correlation-coefficients">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8fcf4"/>
    </linearGradient>
    <linearGradient id="positiveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#7eb8ff"/>
    </linearGradient>
    <linearGradient id="negativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d94a4a"/>
      <stop offset="100%" style="stop-color:#ff7e7e"/>
    </linearGradient>
    <linearGradient id="neutralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#888"/>
      <stop offset="100%" style="stop-color:#bbb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pointAppear {
      from { r: 0; opacity: 0; }
      to { r: 4; opacity: 1; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .small-label { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c3e50; }
    .box-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .box-content { font-family: Arial, sans-serif; font-size: 11px; fill: #fff; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1.5s ease-out forwards; animation-delay: 0.5s; }
    .point-anim { animation: pointAppear 0.4s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title Section -->
  <g class="fade-in" data-narration="Title section introducing covariance and correlation coefficients">
    <text x="210" y="30" text-anchor="middle" class="title">Covariance &amp; Correlation</text>
    <text x="210" y="48" text-anchor="middle" class="small-label">Understanding Variable Relationships</text>
  </g>
  
  <!-- Covariance Box -->
  <g class="slide-left" transform="translate(20, 70)" data-narration="Covariance box explaining joint variability of two random variables">
    <rect width="180" height="120" rx="8" fill="url(#positiveGrad)" filter="url(#shadow)"/>
    <text x="90" y="22" text-anchor="middle" class="box-title">Covariance</text>
    <text x="90" y="42" text-anchor="middle" class="box-content">Measures joint variability</text>
    <text x="10" y="65" class="formula">Cov(X,Y) = E[(X-μx)(Y-μy)]</text>
    <text x="10" y="82" class="small-label" fill="#fff">• Positive: variables increase together</text>
    <text x="10" y="97" class="small-label" fill="#fff">• Negative: inverse relationship</text>
    <text x="10" y="112" class="small-label" fill="#fff">• Scale-dependent limitation</text>
  </g>
  
  <!-- Correlation Box -->
  <g class="slide-right" transform="translate(220, 70)" data-narration="Correlation coefficient box showing normalized measure">
    <rect width="180" height="120" rx="8" fill="url(#negativeGrad)" filter="url(#shadow)"/>
    <text x="90" y="22" text-anchor="middle" class="box-title">Correlation (r)</text>
    <text x="90" y="42" text-anchor="middle" class="box-content">Normalized covariance</text>
    <text x="10" y="65" class="formula">r = Cov(X,Y) / (σx × σy)</text>
    <text x="10" y="82" class="small-label" fill="#fff">• Range: -1 to +1</text>
    <text x="10" y="97" class="small-label" fill="#fff">• Dimensionless comparison</text>
    <text x="10" y="112" class="small-label" fill="#fff">• Independent of scale</text>
  </g>
  
  <!-- Arrow between boxes -->
  <g class="pulse" data-narration="Arrow showing transformation from covariance to correlation">
    <path d="M 195 130 L 225 130" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="210" y="125" text-anchor="middle" class="small-label" fill="#3498db">normalization</text>
  </g>
  
  <!-- Scatter Plot Examples -->
  <g transform="translate(20, 210)" data-narration="Three scatter plots showing positive, negative, and zero correlation">
    <!-- Positive Correlation -->
    <g class="slide-up" data-narration="Positive correlation scatter plot with upward trending data points">
      <rect width="120" height="110" rx="6" fill="#fff" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="60" y="16" text-anchor="middle" class="label" fill="#4a90d9" font-weight="bold">Positive (r &gt; 0)</text>
      <line x1="15" y1="90" x2="105" y2="25" stroke="#4a90d9" stroke-width="2" class="line-anim"/>
      <circle cx="25" cy="82" r="3" fill="#4a90d9" class="point-anim" style="animation-delay: 0.1s"/>
      <circle cx="40" cy="70" r="3" fill="#4a90d9" class="point-anim" style="animation-delay: 0.2s"/>
      <circle cx="55" cy="58" r="3" fill="#4a90d9" class="point-anim" style="animation-delay: 0.3s"/>
      <circle cx="70" cy="48" r="3" fill="#4a90d9" class="point-anim" style="animation-delay: 0.4s"/>
      <circle cx="85" cy="35" r="3" fill="#4a90d9" class="point-anim" style="animation-delay: 0.5s"/>
      <circle cx="95" cy="28" r="3" fill="#4a90d9" class="point-anim" style="animation-delay: 0.6s"/>
      <text x="60" y="100" text-anchor="middle" class="small-label">Upward trend →</text>
    </g>
    
    <!-- Negative Correlation -->
    <g class="slide-up" transform="translate(130, 0)" data-narration="Negative correlation scatter plot with downward trending data points" style="animation-delay: 0.2s">
      <rect width="120" height="110" rx="6" fill="#fff" stroke="#d94a4a" stroke-width="1.5"/>
      <text x="60" y="16" text-anchor="middle" class="label" fill="#d94a4a" font-weight="bold">Negative (r &lt; 0)</text>
      <line x1="15" y1="25" x2="105" y2="90" stroke="#d94a4a" stroke-width="2" class="line-anim"/>
      <circle cx="25" cy="32" r="3" fill="#d94a4a" class="point-anim" style="animation-delay: 0.3s"/>
      <circle cx="40" cy="48" r="3" fill="#d94a4a" class="point-anim" style="animation-delay: 0.4s"/>
      <circle cx="55" cy="60" r="3" fill="#d94a4a" class="point-anim" style="animation-delay: 0.5s"/>
      <circle cx="70" cy="72" r="3" fill="#d94a4a" class="point-anim" style="animation-delay: 0.6s"/>
      <circle cx="85" cy="82" r="3" fill="#d94a4a" class="point-anim" style="animation-delay: 0.7s"/>
      <circle cx="98" cy="90" r="3" fill="#d94a4a" class="point-anim" style="animation-delay: 0.8s"/>
      <text x="60" y="100" text-anchor="middle" class="small-label">Downward trend →</text>
    </g>
    
    <!-- Zero Correlation -->
    <g class="slide-up" transform="translate(260, 0)" data-narration="Zero correlation scatter plot showing no apparent relationship" style="animation-delay: 0.4s">
      <rect width="120" height="110" rx="6" fill="#fff" stroke="#888" stroke-width="1.5"/>
      <text x="60" y="16" text-anchor="middle" class="label" fill="#666" font-weight="bold">Zero (r ≈ 0)</text>
      <circle cx="25" cy="45" r="3" fill="#888" class="point-anim" style="animation-delay: 0.5s"/>
      <circle cx="40" cy="75" r="3" fill="#888" class="point-anim" style="animation-delay: 0.6s"/>
      <circle cx="55" cy="30" r="3" fill="#888" class="point-anim" style="animation-delay: 0.7s"/>
      <circle cx="70" cy="55" r="3" fill="#888" class="point-anim" style="animation-delay: 0.8s"/>
      <circle cx="85" cy="85" r="3" fill="#888" class="point-anim" style="animation-delay: 0.9s"/>
      <circle cx="30" cy="90" r="3" fill="#888" class="point-anim" style="animation-delay: 1.0s"/>
      <circle cx="95" cy="40" r="3" fill="#888" class="point-anim" style="animation-delay: 1.1s"/>
      <text x="60" y="100" text-anchor="middle" class="small-label">No pattern →</text>
    </g>
  </g>
  
  <!-- Key Insight Box -->
  <g class="fade-in" transform="translate(20, 335)" data-narration="Key insight about correlation being normalized covariance" style="animation-delay: 0.8s">
    <rect width="380" height="50" rx="6" fill="#2c3e50" opacity="0.9"/>
    <text x="190" y="22" text-anchor="middle" class="label" fill="#fff" font-weight="bold">Key Insight</text>
    <text x="190" y="40" text-anchor="middle" class="box-content" fill="#ddd">Correlation = Covariance normalized by standard deviations</text>
  </g>
  
  <!-- Range Indicator -->
  <g transform="translate(20, 395)" data-narration="Correlation coefficient range indicator showing -1 to +1 scale">
    <line x1="0" y1="0" x2="380" y2="0" stroke="#34495e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#d94a4a"/>
    <circle cx="190" cy="0" r="5" fill="#888"/>
    <circle cx="380" cy="0" r="5" fill="#4a90d9"/>
    <text x="0" y="15" text-anchor="middle" class="small-label" fill="#d94a4a">-1</text>
    <text x="190" y="15" text-anchor="middle" class="small-label" fill="#888">0</text>
    <text x="380" y="15" text-anchor="middle" class="small-label" fill="#4a90d9">+1</text>
  </g>
</svg>