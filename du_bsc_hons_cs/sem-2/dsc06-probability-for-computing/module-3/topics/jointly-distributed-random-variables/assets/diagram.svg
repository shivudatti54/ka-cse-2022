<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="jointly-distributed-random-variables">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="surfaceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6fa8dc"/>
      <stop offset="50%" style="stop-color:#4a86e8"/>
      <stop offset="100%" style="stop-color:#2b5aa0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes surfaceRise {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .surface-anim { animation: surfaceRise 1.5s ease-out forwards; transform-origin: bottom; }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .sublabel { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: 'Times New Roman', serif; font-size: 16px; fill: #1a5276; font-style: italic; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .prop-item { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .axis-label { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Jointly Distributed Random Variables</text>
  
  <!-- Section 1: Definition Box -->
  <g class="slide-in" style="animation-delay: 0.3s" data-narration="The joint CDF defines probability that both X and Y fall within specified ranges">
    <rect x="15" y="45" width="180" height="55" rx="5" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="25" y="60" class="box-title">Joint CDF Definition</text>
    <text x="25" y="80" class="formula">F&lt;sub&gt;X,Y&lt;/sub&gt;(x,y) = P(X ≤ x, Y ≤ y)</text>
  </g>
  
  <!-- Section 2: Joint PDF Surface 3D Representation -->
  <g class="fade-in" style="animation-delay: 0.6s" data-narration="3D visualization showing probability density surface over the X-Y plane">
    <rect x="210" y="45" width="195" height="120" rx="5" fill="#fff" filter="url(#shadow)"/>
    <text x="308" y="62" text-anchor="middle" class="box-title">Joint PDF Surface</text>
    
    <!-- 3D Grid Base -->
    <path d="M225 145 L290 130 L360 130 L295 145 Z" fill="#e0e0e0" stroke="#ccc"/>
    <path d="M225 145 L225 155 L295 155 L295 145 Z" fill="#d0d0d0" stroke="#ccc"/>
    <path d="M295 145 L295 155 L360 155 L360 130 Z" fill="#c8c8c8" stroke="#bbb"/>
    
    <!-- Surface Mesh with Animation -->
    <g class="surface-anim">
      <polygon points="235,140 255,135 285,138 265,142" fill="#6fa8dc" opacity="0.8"/>
      <polygon points="255,135 275,128 305,132 285,138" fill="#5a9cd4" opacity="0.85"/>
      <polygon points="275,128 295,125 330,128 305,132" fill="#4a8ecc" opacity="0.9"/>
      <polygon points="265,142 285,138 305,132 285,145" fill="#7ab8ec" opacity="0.75"/>
      <polygon points="285,138 305,132 330,128 310,140" fill="#6aa8dc" opacity="0.8"/>
      <polygon points="285,145 305,132 310,140 290,148" fill="#5d9acc" opacity="0.85"/>
    </g>
    
    <!-- Axis Labels -->
    <text x="230" y="160" class="axis-label">X</text>
    <text x="365" y="130" class="axis-label">Y</text>
    <text x="310" y="115" class="axis-label">f(x,y)</text>
    
    <!-- Height indicator -->
    <line x1="275" y1="128" x2="275" y2="118" stroke="#2b5aa0" stroke-width="1.5"/>
    <polygon points="275,115 272,120 278,120" fill="#2b5aa0"/>
  </g>
  
  <!-- Section 3: Properties -->
  <g class="slide-in" style="animation-delay: 0.9s" data-narration="Key properties of joint CDF including boundaries and monotonicity">
    <rect x="15" y="110" width="180" height="85" rx="5" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="25" y="125" class="box-title">Properties of Joint CDF</text>
    <text x="20" y="142" class="prop-item">• F(-∞,y) = 0, F(x,-∞) = 0</text>
    <text x="20" y="156" class="prop-item">• F(∞,∞) = 1</text>
    <text x="20" y="170" class="prop-item">• Non-decreasing in both args</text>
    <text x="20" y="184" class="prop-item">• Right-continuous</text>
  </g>
  
  <!-- Section 4: Marginal Distributions -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Marginal distributions derived by summing or integrating over the other variable">
    <rect x="210" y="175" width="95" height="70" rx="5" fill="#e8f5e9" filter="url(#shadow)"/>
    <text x="257" y="192" text-anchor="middle" class="box-title" fill="#2e7d32">Marginal Distributions</text>
    <text x="220" y="212" class="prop-item" fill="#2e7d32">f&lt;sub&gt;X&lt;/sub&gt;(x) = ∫f(x,y)dy</text>
    <text x="220" y="228" class="prop-item" fill="#2e7d32">f&lt;sub&gt;Y&lt;/sub&gt;(y) = ∫f(x,y)dx</text>
  </g>
  
  <!-- Section 5: Conditional Distribution -->
  <g class="fade-in" style="animation-delay: 1.4s" data-narration="Conditional distribution shows behavior of one variable given a specific value of another">
    <rect x="310" y="175" width="95" height="70" rx="5" fill="#fff3e0" filter="url(#shadow)"/>
    <text x="357" y="192" text-anchor="middle" class="box-title" fill="#e65100">Conditional</text>
    <text x="320" y="212" class="prop-item" fill="#e65100">f&lt;sub&gt;X|Y&lt;/sub&gt;(x|y)</text>
    <text x="320" y="228" class="prop-item" fill="#e65100">= f(x,y)/f&lt;sub&gt;Y&lt;/sub&gt;(y)</text>
  </g>
  
  <!-- Section 6: Relationship Arrow Diagram -->
  <g class="pulse" style="animation-delay: 1.6s" data-narration="Arrows showing relationships between joint, marginal and conditional distributions">
    <!-- Main joint box -->
    <rect x="55" y="210" width="100" height="50" rx="8" fill="#bbdefb" filter="url(#shadow)"/>
    <text x="105" y="230" text-anchor="middle" class="label" font-weight="bold">Joint f&lt;sub&gt;X,Y&lt;/sub&gt;</text>
    <text x="105" y="248" text-anchor="middle" class="sublabel">(x,y)</text>
    
    <!-- Arrow to Marginal X -->
    <path d="M105 260 L105 280 L60 310" stroke="#5a9cd4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <rect x="20" y="305" width="80" height="40" rx="5" fill="#c8e6c9" filter="url(#shadow)"/>
    <text x="60" y="322" text-anchor="middle" class="prop-item" fill="#2e7d32">Marginal f&lt;sub&gt;X&lt;/sub&gt;(x)</text>
    
    <!-- Arrow to Marginal Y -->
    <path d="M105 260 L150 310" stroke="#5a9cd4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <rect x="120" y="305" width="80" height="40" rx="5" fill="#c8e6c9" filter="url(#shadow)"/>
    <text x="160" y="322" text-anchor="middle" class="prop-item" fill="#2e7d32">Marginal f&lt;sub&gt;Y&lt;/sub&gt;(y)</text>
    
    <!-- Arrow to Conditional -->
    <path d="M155 235 L200 235" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowheadOrange)"/>
    <rect x="205" y="215" width="95" height="45" rx="5" fill="#ffe0b2" filter="url(#shadow)"/>
    <text x="252" y="232" text-anchor="middle" class="prop-item" fill="#e65100">Conditional</text>
    <text x="252" y="248" text-anchor="middle" class="prop-item" fill="#e65100">f&lt;sub&gt;X|Y&lt;/sub&gt;(x|y)</text>
  </g>
  
  <!-- Section 7: Key Applications -->
  <g class="slide-in" style="animation-delay: 1.8s" data-narration="Real-world applications in computing including Bayesian inference and performance modeling">
    <rect x="15" y="330" width="390" height="60" rx="5" fill="#f3e5f5" filter="url(#shadow)"/>
    <text x="25" y="348" class="box-title" fill="#6a1b9a">Applications in Computing</text>
    <text x="25" y="366" class="prop-item" fill="#6a1b9a">• Bayesian inference in AI • Performance modeling • Correlated failure analysis</text>
    <text x="25" y="380" class="prop-item" fill="#6a1b9a">• Feature dependencies in ML • Distributed systems analysis • Risk assessment</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a9cd4"/>
    </marker>
    <marker id="arrowheadOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff9800"/>
    </marker>
  </defs>
  
  <!-- Decorative corner element -->
  <path d="M0 0 L50 0 L0 50 Z" fill="#a8d5e5" opacity="0.5"/>
  <path d="M420 400 L370 400 L420 350 Z" fill="#a8d5e5" opacity="0.5"/>
</svg>