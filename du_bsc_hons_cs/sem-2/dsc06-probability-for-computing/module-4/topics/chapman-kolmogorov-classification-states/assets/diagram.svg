<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="chapman-kolmogorov-classification-states">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideRight {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title-text { animation: fadeIn 0.8s ease-out forwards; }
    .section-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { animation: slideRight 0.5s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .equation { animation: fadeIn 1s ease-out 0.3s forwards; opacity: 0; }
    .label-text { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .section1 { animation-delay: 0.1s; }
    .section2 { animation-delay: 0.2s; }
    .section3 { animation-delay: 0.3s; }
    .section4 { animation-delay: 0.4s; }
    .section5 { animation-delay: 0.5s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1e3a5f" class="title-text">Chapman-Kolmogorov</text>
  <text x="210" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2c5282" class="title-text">Classification of States</text>
  
  <!-- Section 1: Equation Box -->
  <g class="section-box section1" data-narration="The Chapman-Kolmogorov equation shows how to compute n-step transition probabilities by summing over intermediate states">
    <rect x="10" y="70" width="180" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="100" y="88" text-anchor="middle" font-family="Cambria, serif" font-size="14" fill="#92400e">Chapman-Kolmogorov</text>
    <text x="100" y="108" text-anchor="middle" font-family="Cambria, serif" font-size="11" fill="#b45309">p⁽ⁿ⁺ᵐ⁾(i,j) = Σₖ p⁽ⁿ⁾(i,k) · p⁽ᵐ⁾(k,j)</text>
  </g>
  
  <!-- Section 2: Classification Types -->
  <g class="section-box section2" data-narration="States can be classified as Transient (may not return) or Recurrent (will return with probability 1)">
    <rect x="200" y="70" width="210" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="305" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534" font-weight="bold">State Classification</text>
    <text x="305" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#15803d">Transient ↔ Recurrent</text>
    <text x="305" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Periodic ↔ Aperiodic</text>
  </g>
  
  <!-- Section 3: Transition Diagram -->
  <g class="section-box section3" data-narration="State transition diagram showing communicating classes - states that can reach each other">
    <rect x="10" y="135" width="400" height="130" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#334155" font-weight="bold">State Transition Graph - Communicating Classes</text>
    
    <!-- Class 1: Transient states -->
    <circle cx="70" cy="220" r="18" fill="#fecaca" stroke="#ef4444" stroke-width="2" class="node"/>
    <text x="70" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#991b1b" font-weight="bold">1</text>
    <text x="70" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f1d1d">Transient</text>
    
    <circle cx="130" cy="220" r="18" fill="#fecaca" stroke="#ef4444" stroke-width="2" class="node"/>
    <text x="130" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#991b1b" font-weight="bold">2</text>
    
    <path d="M88 220 Q110 195 112 220" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Arrow from 1 to 2 -->
    <line x1="85" y1="218" x2="112" y2="218" stroke="#64748b" stroke-width="1.5" class="arrow-line"/>
    <polygon points="112,218 107,215 107,221" fill="#64748b"/>
    
    <!-- Arrow from 2 to 1 -->
    <line x1="118" y1="218" x2="88" y2="218" stroke="#64748b" stroke-width="1.5" class="arrow-line"/>
    <polygon points="88,218 93,215 93,221" fill="#64748b"/>
    
    <!-- Arrow from class 1 to class 2 -->
    <line x1="148" y1="220" x2="180" y2="220" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="180,220 175,217 175,223" fill="#64748b"/>
    <text x="164" y="212" font-family="Arial, sans-serif" font-size="8" fill="#64748b">0.3</text>
    
    <!-- Class 2: Recurrent aperiodic -->
    <circle cx="240" cy="220" r="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="2" class="node"/>
    <text x="240" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534" font-weight="bold">3</text>
    <text x="240" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#14532d">Recurrent</text>
    
    <circle cx="300" cy="220" r="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="2" class="node"/>
    <text x="300" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534" font-weight="bold">4</text>
    
    <line x1="258" y1="220" x2="282" y2="220" stroke="#22c55e" stroke-width="1.5"/>
    <polygon points="282,220 277,217 277,223" fill="#22c55e"/>
    <line x1="282" y1="220" x2="258" y2="220" stroke="#22c55e" stroke-width="1.5"/>
    <polygon points="258,220 263,217 263,223" fill="#22c55e"/>
    
    <!-- Class 3: Periodic -->
    <circle cx="360" cy="220" r="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2" class="node" style="animation-delay: 0.5s"/>
    <text x="360" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e40af" font-weight="bold">5</text>
    <text x="360" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e3a8a">Periodic</text>
    
    <circle cx="360" cy="180" r="14" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2" class="node" style="animation-delay: 0.7s"/>
    <text x="360" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e40af" font-weight="bold">6</text>
    
    <line x1="360" y1="206" x2="360" y2="194" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="360,194 357,199 363,199" fill="#3b82f6"/>
    <line x1="360" y1="194" x2="360" y2="206" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="360,206 357,201 363,201" fill="#3b82f6"/>
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g class="section-box section4" data-narration="Communicating states: Two states i and j communicate if each is reachable from the other">
    <rect x="10" y="275" width="125" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="72" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9d174d" font-weight="bold">Communicating</text>
    <text x="72" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#be185d">i ↔ j</text>
    <text x="72" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#db2777">i→j and j→i</text>
  </g>
  
  <g class="section-box section5" data-narration="Absorbing state: A state that cannot be left once entered">
    <rect x="145" y="275" width="125" height="55" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="207" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3730a3" font-weight="bold">Absorbing State</text>
    <text x="207" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4f46e5">pᵢᵢ = 1</text>
    <text x="207" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6366f1">Cannot exit</text>
  </g>
  
  <g class="section-box section5" data-narration="Ergodic: A state that is both recurrent and aperiodic">
    <rect x="280" y="275" width="130" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="345" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534" font-weight="bold">Ergodic State</text>
    <text x="345" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Recurrent +</text>
    <text x="345" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">Aperiodic</text>
  </g>
  
  <!-- Bottom note -->
  <g class="section-box section5" data-narration="Applications in computing: Queueing theory, network protocols, algorithm analysis">
    <rect x="10" y="340" width="400" height="45" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569" font-weight="bold">Applications in Computing</text>
    <text x="210" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Network traffic • Caching algorithms • Queueing systems • Database optimization</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="8" fill="#bfdbfe" opacity="0.6"/>
  <circle cx="390" cy="370" r="6" fill="#fbcfe8" opacity="0.6"/>
  <circle cx="400" cy="40" r="5" fill="#bbf7d0" opacity="0.5"/>
</svg>