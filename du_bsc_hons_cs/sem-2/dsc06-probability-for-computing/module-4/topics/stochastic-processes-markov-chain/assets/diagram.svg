<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="stochastic-processes-markov-chain">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="stateGradient0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="stateGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="stateGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill:#3b82f6"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1.0s; }
    .title-text { font-family: Georgia, serif; font-size: 20px; fill: #1e3a5f; font-weight: bold; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #334155; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #64748b; }
    .prob-text { font-family: Arial, sans-serif; font-size: 11px; fill: #1e293b; font-weight: bold; }
    .concept-box { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1; }
    .arrow-line { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out forwards; }
    .arrow-line-green { stroke: #22c55e; stroke-width: 2; fill: none; stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out 0.5s forwards; }
    .arrow-line-blue { stroke: #3b82f6; stroke-width: 2; fill: none; stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out 0.8s forwards; }
    .state-circle { filter: url(#shadow); cursor: pointer; transition: transform 0.3s; }
    .state-circle:hover { transform: scale(1.08); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in">
    <text x="210" y="30" text-anchor="middle" class="title-text">Stochastic Processes: Markov Chain</text>
  </g>
  
  <!-- Key Concept Box 1: Definition -->
  <g class="slide-in delay-1" data-narration="A stochastic process is a collection of random variables indexed by time, describing evolution of a random system.">
    <rect x="10" y="45" width="180" height="50" rx="5" class="concept-box"/>
    <text x="20" y="60" class="label-text" font-weight="bold">Stochastic Process</text>
    <text x="20" y="78" class="detail-text">{X(t) : t ∈ T}</text>
    <text x="20" y="90" class="detail-text">Random variables indexed by time</text>
  </g>
  
  <!-- Key Concept Box 2: Markov Property -->
  <g class="slide-in delay-2" data-narration="The Markov property states that future state depends only on current state, not on history (memoryless property).">
    <rect x="210" y="45" width="200" height="50" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="220" y="60" class="label-text" font-weight="bold">Markov Property</text>
    <text x="220" y="78" class="detail-text">P(Xₙ₊₁=j | Xₙ=i) = P(Xₙ₊₁=j | X₀...Xₙ)</text>
    <text x="220" y="90" class="detail-text">Future depends only on present</text>
  </g>
  
  <!-- State 0: Start -->
  <g class="slide-in delay-2" data-narration="State 0 is the initial state with a 0.3 probability of remaining in itself (self-loop).">
    <circle cx="80" cy="180" r="35" fill="url(#stateGradient0)" class="state-circle pulse"/>
    <text x="80" y="175" text-anchor="middle" class="label-text" fill="white" font-weight="bold" font-size="16">S₀</text>
    <text x="80" y="192" text-anchor="middle" class="detail-text" fill="white" font-size="10">Start</text>
  </g>
  
  <!-- State 1: Middle -->
  <g class="slide-in delay-3" data-narration="State 1 is a transition state with probabilities: 0.4 to S₀, 0.4 to S₂, and 0.2 self-loop.">
    <circle cx="210" cy="280" r="35" fill="url(#stateGradient1)" class="state-circle pulse"/>
    <text x="210" y="275" text-anchor="middle" class="label-text" fill="white" font-weight="bold" font-size="16">S₁</text>
    <text x="210" y="292" text-anchor="middle" class="detail-text" fill="white" font-size="10">Transition</text>
  </g>
  
  <!-- State 2: End/Absorbing -->
  <g class="slide-in delay-4" data-narration="State 2 is an absorbing/end state with probability 1.0 of remaining in itself.">
    <circle cx="340" cy="180" r="35" fill="url(#stateGradient2)" class="state-circle pulse"/>
    <text x="340" y="175" text-anchor="middle" class="label-text" fill="white" font-weight="bold" font-size="16">S₂</text>
    <text x="340" y="192" text-anchor="middle" class="detail-text" fill="white" font-size="10">End/Absorbing</text>
  </g>
  
  <!-- Transition Arrows -->
  <!-- S0 self-loop 0.3 -->
  <g class="delay-3" data-narration="Self-loop from S₀ to S₀ with probability 0.3">
    <path d="M 50 160 Q 30 130 80 145" class="arrow-line-green" marker-end="url(#arrowheadGreen)"/>
    <rect x="20" y="115" width="30" height="16" rx="3" fill="#dcfce7" stroke="#22c55e"/>
    <text x="35" y="127" text-anchor="middle" class="prob-text">0.3</text>
  </g>
  
  <!-- S0 to S1: 0.7 -->
  <g class="delay-3" data-narration="Transition from S₀ to S₁ with probability 0.7">
    <line x1="115" y1="180" x2="175" y2="250" class="arrow-line" marker-end="url(#arrowhead)"/>
    <rect x="125" y="200" width="30" height="16" rx="3" fill="#e0f2fe" stroke="#3b82f6"/>
    <text x="140" y="212" text-anchor="middle" class="prob-text">0.7</text>
  </g>
  
  <!-- S1 to S0: 0.4 -->
  <g class="delay-4" data-narration="Transition from S₁ back to S₀ with probability 0.4">
    <line x1="175" y1="250" x2="115" y2="200" class="arrow-line-blue" marker-end="url(#arrowheadBlue)"/>
    <rect x="125" y="235" width="30" height="16" rx="3" fill="#e0f2fe" stroke="#3b82f6"/>
    <text x="140" y="247" text-anchor="middle" class="prob-text">0.4</text>
  </g>
  
  <!-- S1 self-loop 0.2 -->
  <g class="delay-4" data-narration="Self-loop on S₁ with probability 0.2">
    <path d="M 180 315 Q 210 340 240 315" class="arrow-line" marker-end="url(#arrowhead)"/>
    <rect x="195" y="325" width="30" height="16" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="210" y="337" text-anchor="middle" class="prob-text">0.2</text>
  </g>
  
  <!-- S1 to S2: 0.4 -->
  <g class="delay-4" data-narration="Transition from S₁ to S₂ (end state) with probability 0.4">
    <line x1="230" y1="260" x2="305" y2="200" class="arrow-line-blue" marker-end="url(#arrowheadBlue)"/>
    <rect x="255" y="240" width="30" height="16" rx="3" fill="#e0f2fe" stroke="#3b82f6"/>
    <text x="270" y="252" text-anchor="middle" class="prob-text">0.4</text>
  </g>
  
  <!-- S2 self-loop 1.0 (absorbing) -->
  <g class="delay-5" data-narration="Self-loop on S₂ with probability 1.0, making it an absorbing state.">
    <path d="M 305 160 Q 340 120 375 160" class="arrow-line-green" marker-end="url(#arrowheadGreen)"/>
    <rect x="320" y="105" width="35" height="16" rx="3" fill="#dcfce7" stroke="#22c55e"/>
    <text x="337" y="117" text-anchor="middle" class="prob-text">1.0</text>
  </g>
  
  <!-- Transition Matrix Box -->
  <g class="slide-in delay-5" data-narration="Transition probability matrix showing probabilities between states">
    <rect x="10" y="310" width="150" height="80" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="85" y="330" text-anchor="middle" class="label-text" font-weight="bold" font-size="12">Transition Matrix P</text>
    <text x="20" y="352" class="detail-text" font-family="Courier New" font-size="10">┌ 0.3  0.7  0 ┐</text>
    <text x="20" y="365" class="detail-text" font-family="Courier New" font-size="10">│ 0.4  0.2  0.4│</text>
    <text x="20" y="378" class="detail-text" font-family="Courier New" font-size="10">└ 0    0    1 ┘</text>
  </g>
  
  <!-- Memoryless Property Box -->
  <g class="slide-in delay-5" data-narration="Memoryless property: the next state depends only on current state, not past history">
    <rect x="180" y="310" width="230" height="80" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="295" y="330" text-anchor="middle" class="label-text" font-weight="bold" font-size="12">Memoryless Property</text>
    <text x="195" y="352" class="detail-text" font-size="11">P(Xₙ₊₁=j | Xₙ=i) = Pᵢⱼ</text>
    <text x="195" y="368" class="detail-text" font-size="11">"Future depends only on present state"</text>
    <text x="195" y="382" class="detail-text" font-size="11">not on how we arrived at that state</text>
  </g>
  
</svg>