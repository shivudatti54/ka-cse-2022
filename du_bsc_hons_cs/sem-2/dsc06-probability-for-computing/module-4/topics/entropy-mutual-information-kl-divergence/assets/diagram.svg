<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="entropy-mutual-information-kl-divergence">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e8eef5"/>
    </linearGradient>
    <linearGradient id="circleXGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#4a9eb8"/>
    </linearGradient>
    <linearGradient id="circleYGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a4a4"/>
      <stop offset="100%" style="stop-color:#d97b7b"/>
    </linearGradient>
    <linearGradient id="intersectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a4e3"/>
      <stop offset="100%" style="stop-color:#8b6fc0"/>
    </linearGradient>
    <linearGradient id="klGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#56ab91"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .formula { font-family: 'Times New Roman', serif; font-size: 13px; font-style: italic; fill: #2c3e50; }
    .box { rx: 8; ry: 8; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Entropy, Mutual Info &amp; KL Divergence</text>
  
  <!-- Entropy Venn Diagram Section -->
  <g transform="translate(30, 60)">
    <text x="90" y="0" text-anchor="middle" class="section-title slide-left">Information Theory Venn Diagram</text>
    
    <!-- Circle X -->
    <circle cx="70" cy="80" r="50" fill="url(#circleXGrad)" opacity="0.7" stroke="#3a7a94" stroke-width="2" class="fade-in delay-1"/>
    <text x="70" y="65" text-anchor="middle" class="label" font-weight="bold" fill="#fff">H(X)</text>
    <text x="70" y="80" text-anchor="middle" class="detail" fill="#fff">Entropy X</text>
    
    <!-- Circle Y -->
    <circle cx="130" cy="80" r="50" fill="url(#circleYGrad)" opacity="0.7" stroke="#b85555" stroke-width="2" class="fade-in delay-2"/>
    <text x="130" y="65" text-anchor="middle" class="label" font-weight="bold" fill="#fff">H(Y)</text>
    <text x="130" y="80" text-anchor="middle" class="detail" fill="#fff">Entropy Y</text>
    
    <!-- Intersection (Mutual Information) -->
    <path d="M 85 45 A 50 50 0 0 1 115 45 L 100 80 L 85 45" fill="url(#intersectGrad)" opacity="0.85" stroke="#6a4a90" stroke-width="2" class="fade-in delay-3"/>
    <text x="100" y="50" text-anchor="middle" class="label" font-weight="bold" fill="#fff" font-size="11">I(X;Y)</text>
    <text x="100" y="63" text-anchor="middle" class="detail" fill="#fff" font-size="9">Mutual Info</text>
    
    <!-- X only (Conditional Entropy) -->
    <text x="45" y="105" text-anchor="middle" class="label" fill="#3a7a94" font-size="10">H(X|Y)</text>
    <text x="45" y="118" text-anchor="middle" class="detail" fill="#5d6d7e" font-size="9">X|Y</text>
    
    <!-- Y only (Conditional Entropy) -->
    <text x="155" y="105" text-anchor="middle" class="label" fill="#b85555" font-size="10">H(Y|X)</text>
    <text x="155" y="118" text-anchor="middle" class="detail" fill="#5d6d7e" font-size="9">Y|X</text>
    
    <!-- Union label -->
    <text x="100" y="145" text-anchor="middle" class="detail" font-size="10">H(X,Y) = H(X) + H(Y) - I</text>
  </g>
  
  <!-- Key Formula Box - Entropy -->
  <g transform="translate(230, 65)" class="slide-left delay-2">
    <rect class="box" width="175" height="55" fill="#fff" stroke="#7ec8e3" stroke-width="2"/>
    <text x="87" y="18" text-anchor="middle" class="section-title" font-size="12">Shannon Entropy</text>
    <text x="87" y="38" text-anchor="middle" class="formula">H(X) = -Σ pᵢ log₂(pᵢ)</text>
    <text x="87" y="50" text-anchor="middle" class="detail" font-size="9">Measures uncertainty in bits</text>
  </g>
  
  <!-- Key Formula Box - Mutual Information -->
  <g transform="translate(230, 130)" class="slide-left delay-3">
    <rect class="box" width="175" height="55" fill="#fff" stroke="#b8a4e3" stroke-width="2"/>
    <text x="87" y="18" text-anchor="middle" class="section-title" font-size="12">Mutual Information</text>
    <text x="87" y="38" text-anchor="middle" class="formula">I(X;Y) = H(X) - H(X|Y)</text>
    <text x="87" y="50" text-anchor="middle" class="detail" font-size="9">Shared info between X and Y</text>
  </g>
  
  <!-- KL Divergence Section -->
  <g transform="translate(30, 230)" class="slide-up delay-3">
    <rect class="box" width="180" height="75" fill="url(#klGrad)" stroke="#3d8b6e" stroke-width="2"/>
    <text x="90" y="18" text-anchor="middle" class="section-title" fill="#fff">KL Divergence</text>
    <text x="90" y="38" text-anchor="middle" class="formula" fill="#fff" font-size="12">D<sub>KL</sub>(P || Q) = Σ P(x) log(P(x)/Q(x))</text>
    <text x="90" y="55" text-anchor="middle" class="detail" fill="#fff" font-size="9">Measures distribution difference</text>
    <text x="90" y="67" text-anchor="middle" class="detail" fill="#fff" font-size="9">Non-negative, asymmetric</text>
  </g>
  
  <!-- Relationships/Arrows -->
  <g class="fade-in delay-4">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#5d6d7e"/>
      </marker>
    </defs>
    <!-- Arrow from Entropy to Mutual Info concept -->
    <path d="M 180 160 Q 200 175 220 175" stroke="#5d6d7e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Applications Box -->
  <g transform="translate(230, 200)" class="slide-up delay-4">
    <rect class="box" width="175" height="105" fill="#fff9e6" stroke="#f4d03f" stroke-width="2"/>
    <text x="87" y="18" text-anchor="middle" class="section-title" font-size="12">Applications</text>
    <text x="10" y="38" class="detail" font-size="10">• Decision Trees (ML)</text>
    <text x="10" y="52" class="detail" font-size="10">• Feature Engineering</text>
    <text x="10" y="66" class="detail" font-size="10">• Variational Inference</text>
    <text x="10" y="80" class="detail" font-size="10">• Generative AI Models</text>
    <text x="10" y="94" class="detail" font-size="10">• Data Compression</text>
  </g>
  
  <!-- Bottom relationship diagram -->
  <g transform="translate(60, 320)" class="fade-in delay-5">
    <!-- Arrow relationships -->
    <line x1="30" y1="15" x2="70" y2="15" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="110" y1="15" x2="150" y2="15" stroke="#b8a4e3" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="70" y1="30" x2="110" y2="30" stroke="#f4a4a4" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- Circles representation -->
    <circle cx="30" cy="15" r="12" fill="#7ec8e3" opacity="0.8"/>
    <text x="30" y="19" text-anchor="middle" class="label" fill="#fff" font-size="9">H(X)</text>
    
    <circle cx="110" cy="15" r="12" fill="#b8a4e3" opacity="0.8"/>
    <text x="110" y="19" text-anchor="middle" class="label" fill="#fff" font-size="9">I</text>
    
    <circle cx="150" cy="15" r="12" fill="#f4a4a4" opacity="0.8"/>
    <text x="150" y="19" text-anchor="middle" class="label" fill="#fff" font-size="9">H(Y)</text>
    
    <rect x="70" y="35" width="80" height="25" rx="4" fill="#a8e6cf" stroke="#56ab91" stroke-width="1"/>
    <text x="110" y="52" text-anchor="middle" class="label" font-size="10">KL(P||Q)</text>
  </g>
  
  <!-- Data narration attributes (for accessibility) -->
  <desc data-narration="title">Entropy, Mutual Information, and KL Divergence - Information Theory Fundamentals</desc>
  <desc data-narration="venn-diagram">Venn diagram showing relationship between H(X), H(Y), H(X,Y), and I(X;Y). Intersection represents mutual information, individual regions represent conditional entropies.</desc>
  <desc data-narration="entropy-formula">Shannon Entropy formula: H(X) = -Σ pᵢ log₂(pᵢ), measures uncertainty in bits</desc>
  <desc data-narration="mutual-info-formula">Mutual Information: I(X;Y) = H(X) - H(X|Y), quantifies shared information between variables</desc>
  <desc data-narration="kl-divergence">KL Divergence: D_KL(P || Q) = Σ P(x) log(P(x)/Q(x)), measures how distribution P differs from Q</desc>
  <desc data-narration="applications">Key applications include decision trees in ML, feature engineering, variational inference, and generative AI</desc>
</svg>