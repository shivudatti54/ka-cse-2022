<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="random-number-generation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5e0f0"/>
    </linearGradient>
    <linearGradient id="prngGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b0"/>
    </linearGradient>
    <linearGradient id="trngGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c8d4"/>
      <stop offset="100%" style="stop-color:#c9a5b8"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 2px #4a90a4); }
      50% { filter: drop-shadow(0 0 8px #4a90a4); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #555; }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .glow { animation: glow 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Random Number Generation</text>
  <line x1="80" y1="42" x2="340" y2="42" stroke="#4a90a4" stroke-width="2" class="fade-in"/>
  
  <!-- PRNG Section (Left) -->
  <g class="slide-left" style="animation-delay: 0.2s;">
    <rect x="20" y="55" width="180" height="155" fill="url(#prngGradient)" rx="8" stroke="#7aa894" stroke-width="2"/>
    <text x="110" y="75" text-anchor="middle" class="box-title" fill="#2d5a45">PRNG</text>
    <text x="110" y="88" text-anchor="middle" class="detail" fill="#2d5a45">Pseudo-Random Number Generator</text>
    
    <!-- PRNG Flow -->
    <rect x="35" y="100" width="60" height="28" fill="#fff" rx="4" stroke="#7aa894" stroke-width="1" data-narration="PRNG starts with a seed value that initializes the algorithm"/>
    <text x="65" y="118" text-anchor="middle" class="detail">Seed</text>
    
    <line x1="95" y1="114" x2="120" y2="114" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="120" y="100" width="60" height="28" fill="#fff" rx="4" stroke="#7aa894" stroke-width="1" data-narration="A mathematical algorithm processes the seed to generate pseudo-random numbers"/>
    <text x="150" y="118" text-anchor="middle" class="detail">Algorithm</text>
    
    <line x1="180" y1="114" x2="195" y2="114" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="35" y="145" width="150" height="28" fill="#fff" rx="4" stroke="#7aa894" stroke-width="1" data-narration="Output is a deterministic sequence - same seed produces same sequence"/>
    <text x="110" y="163" text-anchor="middle" class="detail">Deterministic Sequence</text>
  </g>
  
  <!-- TRNG Section (Right) -->
  <g class="slide-right" style="animation-delay: 0.4s;">
    <rect x="220" y="55" width="180" height="155" fill="url(#trngGradient)" rx="8" stroke="#a87d94" stroke-width="2"/>
    <text x="310" y="75" text-anchor="middle" class="box-title" fill="#6b3a52">TRNG</text>
    <text x="310" y="88" text-anchor="middle" class="detail" fill="#6b3a52">True Random Number Generator</text>
    
    <!-- TRNG Flow -->
    <rect x="235" y="100" width="60" height="28" fill="#fff" rx="4" stroke="#a87d94" stroke-width="1" data-narration="TRNG uses physical phenomena like thermal noise, radioactive decay, or atmospheric noise"/>
    <text x="265" y="118" text-anchor="middle" class="detail">Physical</text>
    <text x="265" y="130" text-anchor="middle" class="detail" font-size="10">Source</text>
    
    <line x1="295" y1="114" x2="310" y2="114" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="315" y="100" width="60" height="28" fill="#fff" rx="4" stroke="#a87d94" stroke-width="1" data-narration="Entropy from physical source is measured and converted to digital form"/>
    <text x="345" y="118" text-anchor="middle" class="detail">Entropy</text>
    
    <line x1="375" y1="114" x2="390" y2="114" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="235" y="145" width="150" height="28" fill="#fff" rx="4" stroke="#a87d94" stroke-width="1" data-narration="Output is truly random - unpredictable and non-reproducible"/>
    <text x="310" y="163" text-anchor="middle" class="detail">Random Sequence</text>
  </g>
  
  <!-- Comparison Box -->
  <g class="slide-up" style="animation-delay: 0.6s;">
    <rect x="20" y="220" width="180" height="80" fill="#fff" rx="6" stroke="#b8e0d2" stroke-width="2" class="pulse"/>
    <text x="110" y="242" text-anchor="middle" class="label" fill="#2d5a45">PRNG Characteristics</text>
    <text x="30" y="262" class="detail">• Fast generation</text>
    <text x="30" y="277" class="detail">• Reproducible (same seed)</text>
    <text x="30" y="292" class="detail">• Deterministic</text>
  </g>
  
  <g class="slide-up" style="animation-delay: 0.7s;">
    <rect x="220" y="220" width="180" height="80" fill="#fff" rx="6" stroke="#e0c8d4" stroke-width="2" class="pulse"/>
    <text x="310" y="242" text-anchor="middle" class="label" fill="#6b3a52">TRNG Characteristics</text>
    <text x="230" y="262" class="detail">• Slow generation</text>
    <text x="230" y="277" class="detail">• Non-deterministic</text>
    <text x="230" y="292" class="detail">• Requires hardware</text>
  </g>
  
  <!-- Use Cases Section -->
  <g class="slide-up" style="animation-delay: 0.8s;">
    <rect x="20" y="310" width="380" height="80" fill="#f8f9fa" rx="8" stroke="#ddd" stroke-width="1" data-narration="Applications: Monte Carlo simulations, cryptography, machine learning, statistical sampling"/>
    <text x="210" y="332" text-anchor="middle" class="label" fill="#2c3e50">Applications &amp; Use Cases</text>
    
    <g class="glow">
      <circle cx="60" cy="360" r="8" fill="#b8e0d2" stroke="#7aa894" stroke-width="1"/>
      <text x="60" y="364" text-anchor="middle" class="detail" font-size="9" fill="#2d5a45">Simulations</text>
    </g>
    
    <g class="glow" style="animation-delay: 0.3s;">
      <circle cx="130" cy="360" r="8" fill="#e0c8d4" stroke="#a87d94" stroke-width="1"/>
      <text x="130" y="364" text-anchor="middle" class="detail" font-size="9" fill="#6b3a52">Cryptography</text>
    </g>
    
    <g class="glow" style="animation-delay: 0.5s;">
      <circle cx="210" cy="360" r="8" fill="#c5e0f0" stroke="#7aa8c4" stroke-width="1"/>
      <text x="210" y="364" text-anchor="middle" class="detail" font-size="9" fill="#3a6a8a">ML / AI</text>
    </g>
    
    <g class="glow" style="animation-delay: 0.7s;">
      <circle cx="290" cy="360" r="8" fill="#f0e0c8" stroke="#c4a87d" stroke-width="1"/>
      <text x="290" y="364" text-anchor="middle" class="detail" font-size="9" fill="#7a6030">Statistics</text>
    </g>
    
    <g class="glow" style="animation-delay: 0.9s;">
      <circle cx="360" cy="360" r="8" fill="#e0d4f0" stroke="#a87dc4" stroke-width="1"/>
      <text x="360" y="364" text-anchor="middle" class="detail" font-size="9" fill="#6a3a8a">Gaming</text>
    </g>
  </g>
</svg>