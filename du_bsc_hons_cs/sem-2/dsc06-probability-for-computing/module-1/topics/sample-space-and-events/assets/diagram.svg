<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="sample-space-and-events" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5e6f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f4f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccffcc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .small-text { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .box { filter: url(#shadow); }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .pop-in { animation: popIn 0.6s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Sample Space and Events</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#3498db" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: Random Experiment -->
  <g class="slide-in delay-1" data-narration="Random Experiment: A procedure with multiple possible outcomes that cannot be predicted with certainty">
    <rect x="15" y="55" width="120" height="75" rx="8" fill="url(#boxGradient1)" class="box"/>
    <text x="75" y="72" text-anchor="middle" class="label">Random Experiment</text>
    <text x="75" y="90" text-anchor="middle" class="detail">Computing Examples:</text>
    <text x="75" y="105" text-anchor="middle" class="small-text">• Random number gen.</text>
    <text x="75" y="118" text-anchor="middle" class="small-text">• Algorithm execution time</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M145 92 L175 92" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="fade-in" style="animation-delay: 0.5s"/>
  
  <!-- Section 2: Sample Space -->
  <g class="pop-in delay-2" data-narration="Sample Space (S): The complete set of all possible outcomes of the experiment">
    <rect x="185" y="55" width="145" height="75" rx="8" fill="url(#boxGradient2)" class="box"/>
    <text x="257" y="72" text-anchor="middle" class="label">Sample Space (S)</text>
    <rect x="195" y="82" width="125" height="40" rx="4" fill="#fff" stroke="#3498db" stroke-width="1"/>
    <text x="257" y="96" text-anchor="middle" class="small-text">All Possible Outcomes:</text>
    <text x="257" y="112" text-anchor="middle" class="small-text" style="font-size:12px">S = {1, 2, 3, 4, 5, 6}</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M340 92 L370 92" stroke="#e74c3c" stroke-width="2" fill="none" class="fade-in" style="animation-delay: 0.7s"/>
  <polygon points="370,87 380,92 370,97" fill="#e74c3c"/>
  
  <!-- Section 3: Events -->
  <g class="slide-in delay-3" data-narration="Events: Subsets of the sample space that we are interested in analyzing">
    <rect x="380" y="55" width="35" height="75" rx="8" fill="url(#boxGradient3)" class="box"/>
    <text x="397" y="72" text-anchor="middle" class="label" style="font-size:11px">Events</text>
    <text x="397" y="88" text-anchor="middle" class="small-text">E ⊆ S</text>
    <text x="397" y="102" text-anchor="middle" class="small-text">Event A:</text>
    <text x="397" y="116" text-anchor="middle" class="small-text" style="font-size:10px">{2,4,6}</text>
  </g>
  
  <!-- Divider Line -->
  <line x1="20" y1="145" x2="400" y2="145" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="5,5" class="fade-in" style="animation-delay: 0.9s"/>
  
  <!-- Visual Representation: Venn Diagram Style -->
  <g class="pop-in delay-3" data-narration="Visual representation of sample space containing events as subsets">
    <!-- Sample Space Box -->
    <rect x="30" y="160" width="200" height="130" rx="10" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2" class="pulse"/>
    <text x="130" y="180" text-anchor="middle" class="label" style="font-size:12px">Sample Space S</text>
    
    <!-- Outcomes in Sample Space -->
    <circle cx="70" cy="230" r="12" fill="#3498db" class="pop-in" style="animation-delay: 1s"/>
    <text x="70" y="234" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
    
    <circle cx="100" cy="210" r="12" fill="#3498db" class="pop-in" style="animation-delay: 1.1s"/>
    <text x="100" y="214" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
    
    <circle cx="100" cy="250" r="12" fill="#3498db" class="pop-in" style="animation-delay: 1.2s"/>
    <text x="100" y="254" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
    
    <circle cx="140" cy="210" r="12" fill="#3498db" class="pop-in" style="animation-delay: 1.3s"/>
    <text x="140" y="214" text-anchor="middle" fill="white" font-size="10" font-weight="bold">4</text>
    
    <circle cx="140" cy="250" r="12" fill="#3498db" class="pop-in" style="animation-delay: 1.4s"/>
    <text x="140" y="254" text-anchor="middle" fill="white" font-size="10" font-weight="bold">5</text>
    
    <circle cx="170" cy="230" r="12" fill="#3498db" class="pop-in" style="animation-delay: 1.5s"/>
    <text x="170" y="234" text-anchor="middle" fill="white" font-size="10" font-weight="bold">6</text>
    
    <!-- Event A: Even Numbers -->
    <ellipse x="95" y="230" rx="55" ry="40" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" class="fade-in" style="animation-delay: 1.6s"/>
    <text x="95" y="275" text-anchor="middle" class="small-text" style="fill:#e74c3c">Event A (Even)</text>
    
    <!-- Event B highlight -->
    <circle cx="100" cy="250" r="15" fill="none" stroke="#27ae60" stroke-width="2" class="fade-in" style="animation-delay: 1.8s"/>
    <text x="155" y="200" text-anchor="middle" class="small-text" style="fill:#27ae60">Event B: {3}</text>
  </g>
  
  <!-- Network State Space Example -->
  <g class="slide-in delay-4" data-narration="Network State Space: Shows all possible node failure combinations in a computing network">
    <rect x="250" y="160" width="155" height="130" rx="8" fill="white" stroke="#9b59b6" stroke-width="2" class="box"/>
    <text x="327" y="180" text-anchor="middle" class="label" style="fill:#9b59b6">Network State Space</text>
    <text x="327" y="198" text-anchor="middle" class="small-text">Node Failure Combinations</text>
    
    <!-- Network nodes visualization -->
    <g transform="translate(270, 210)">
      <!-- Node 1 -->
      <circle cx="10" cy="10" r="8" fill="#2ecc71" stroke="#27ae60" stroke-width="1"/>
      <text x="10" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">1</text>
      <!-- Node 2 -->
      <circle cx="35" cy="10" r="8" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
      <text x="35" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">2</text>
      <!-- Node 3 -->
      <circle cx="22" cy="30" r="8" fill="#2ecc71" stroke="#27ae60" stroke-width="1"/>
      <text x="22" y="33" text-anchor="middle" fill="white" font-size="7" font-weight="bold">3</text>
      <!-- Connection lines -->
      <line x1="10" y1="10" x2="35" y2="10" stroke="#7f8c8d" stroke-width="1"/>
      <line x1="10" y1="10" x2="22" y2="30" stroke="#7f8c8d" stroke-width="1"/>
      <line x1="35" y1="10" x2="22" y2="30" stroke="#7f8c8d" stroke-width="1"/>
    </g>
    
    <text x="327" y="262" text-anchor="middle" class="small-text">States: {All OK,</text>
    <text x="327" y="274" text-anchor="middle" class="small-text">Node1 fail, Node2 fail, ...}</text>
  </g>
  
  <!-- Key Formulas Box -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Key probability relationship: P(A) = |A|/|S|">
    <rect x="30" y="305" width="175" height="50" rx="8" fill="url(#boxGradient2)" class="box"/>
    <text x="117" y="322" text-anchor="middle" class="label" style="font-size:12px">Probability Formula</text>
    <text x="117" y="342" text-anchor="middle" class="detail" style="font-size:13px">P(A) = |A| / |S|</text>
  </g>
  
  <!-- Types of Events -->
  <g class="fade-in" style="animation-delay: 1.4s" data-narration="Types of Events: Certain, Impossible, Simple, and Compound events">
    <rect x="220" y="305" width="185" height="50" rx="8" fill="url(#boxGradient3)" class="box"/>
    <text x="312" y="322" text-anchor="middle" class="label" style="font-size:12px">Types of Events</text>
    <text x="312" y="340" text-anchor="middle" class="small-text">Simple • Compound • Certain • Impossible</text>
  </g>
  
  <!-- Legend/Key -->
  <g class="fade-in" style="animation-delay: 1.6s">
    <circle cx="50" cy="370" r="5" fill="#3498db"/>
    <text x="62" y="374" class="small-text">Outcome</text>
    <ellipse cx="110" cy="370" rx="12" ry="5" fill="none" stroke="#e74c3c" stroke-dasharray="3,2"/>
    <text x="128" y="374" class="small-text">Event (subset)</text>
    <circle cx="190" cy="370" r="5" fill="#2ecc71"/>
    <text x="202" y="374" class="small-text">Elementary</text>
  </g>
</svg>