<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="conditional-probability-independent-events">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#f0e8f4"/>
    </linearGradient>
    <linearGradient id="circleGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81d4fa"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="circleGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5d6a7"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8"/>
      <stop offset="100%" style="stop-color:#ab47bc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box { animation: fadeIn 0.6s ease-out forwards; }
    .arrow { animation: slideIn 0.5s ease-out forwards; }
    .node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .label { animation: fadeIn 0.7s ease-out forwards; }
    .formula { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37474f" class="title">Conditional Probability</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#546e7a">&amp; Independent Events</text>
  
  <!-- Section 1: Venn Diagram - Sample Space -->
  <g data-narration="The Venn diagram shows the sample space with events A and B intersecting">
    <ellipse cx="110" cy="130" rx="45" ry="40" fill="url(#circleGradient1)" opacity="0.7" stroke="#0288d1" stroke-width="2" class="box"/>
    <ellipse cx="160" cy="150" rx="45" ry="40" fill="url(#circleGradient2)" opacity="0.7" stroke="#388e3c" stroke-width="2" class="box"/>
    <rect x="60" y="80" width="160" height="130" fill="none" stroke="#78909c" stroke-width="1" stroke-dasharray="4" rx="5" class="box"/>
    <text x="95" y="130" text-anchor="middle" font-family="Arial" font-size="14" fill="#01579b" font-weight="bold" class="label">A</text>
    <text x="175" y="150" text-anchor="middle" font-family="Arial" font-size="14" fill="#1b5e20" font-weight="bold" class="label">B</text>
    <text x="130" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" font-weight="bold" class="label">A∩B</text>
    <text x="140" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#546e7a" class="label">Sample Space</text>
  </g>
  
  <!-- Section 2: Conditional Probability Formula -->
  <g data-narration="The formula P(A|B) = P(A∩B) / P(B) shows how to compute conditional probability" transform="translate(240, 90)">
    <rect x="0" y="0" width="165" height="80" fill="#fff9c4" stroke="#f9a825" stroke-width="2" rx="8" filter="url(#shadow)" class="box"/>
    <text x="82" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="#37474f" font-weight="bold" class="label">Conditional Prob.</text>
    <text x="82" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#e65100" font-weight="bold" class="formula">P(A|B) =</text>
    <text x="82" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#37474f" class="label">P(A∩B) / P(B)</text>
  </g>
  
  <!-- Arrow from Venn to Formula -->
  <path d="M200 130 L240 130" stroke="#78909c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
  <polygon points="237,127 242,130 237,133" fill="#78909c"/>
  
  <!-- Section 3: Bayesian Network -->
  <g data-narration="A simple Bayesian network showing conditional dependencies between three events">
    <text x="290" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#546e7a" font-weight="bold" class="label">Bayesian Network</text>
    <!-- Node A (root) -->
    <circle cx="300" cy="250" r="22" fill="url(#nodeGradient)" stroke="#7b1fa2" stroke-width="2" class="node" filter="url(#shadow)"/>
    <text x="300" y="255" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">A</text>
    <!-- Node B (depends on A) -->
    <circle cx="360" cy="310" r="22" fill="#81d4fa" stroke="#0288d1" stroke-width="2" class="node" filter="url(#shadow)"/>
    <text x="360" y="315" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">B</text>
    <!-- Node C (depends on A) -->
    <circle cx="240" cy="310" r="22" fill="#a5d6a7" stroke="#388e3c" stroke-width="2" class="node" filter="url(#shadow)"/>
    <text x="240" y="315" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">C</text>
    <!-- Arrows -->
    <path d="M310 272 L335 295" stroke="#7b1fa2" stroke-width="2" fill="none" class="arrow"/>
    <path d="M290 272 L265 295" stroke="#7b1fa2" stroke-width="2" fill="none" class="arrow"/>
    <!-- Arrow heads -->
    <polygon points="332,292 338,298 330,298" fill="#7b1fa2"/>
    <polygon points="268,292 262,298 270,298" fill="#7b1fa2"/>
  </g>
  
  <!-- Section 4: Independent Events -->
  <g data-narration="For independent events, P(A∩B) = P(A) × P(B), meaning they do not influence each other">
    <rect x="10" y="280" width="200" height="55" fill="#e8f5e9" stroke="#43a047" stroke-width="2" rx="8" filter="url(#shadow)" class="box"/>
    <text x="110" y="300" text-anchor="middle" font-family="Arial" font-size="13" fill="#1b5e20" font-weight="bold" class="label">Independent Events</text>
    <text x="110" y="320" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" class="label">P(A∩B) = P(A) × P(B)</text>
  </g>
  
  <!-- Section 5: Key Points Box -->
  <g data-narration="Key learning points: conditional probability updates based on known information">
    <rect x="220" y="280" width="185" height="55" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8" filter="url(#shadow)" class="box"/>
    <text x="312" y="300" text-anchor="middle" font-family="Arial" font-size="12" fill="#880e4f" font-weight="bold" class="label">Key Insight</text>
    <text x="312" y="320" text-anchor="middle" font-family="Arial" font-size="10" fill="#ad1457" class="label">P(A|B) ≠ P(A) if dependent</text>
  </g>
  
  <!-- Section 6: CPT Table Representation -->
  <g data-narration="Conditional Probability Table showing P(B|A) for different scenarios">
    <rect x="15" y="345" width="120" height="45" fill="#fff" stroke="#607d8b" stroke-width="1" rx="4" class="box"/>
    <text x="75" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#37474f" font-weight="bold">P(B|A)</text>
    <text x="25" y="378" font-family="Arial" font-size="8" fill="#546e7a">True:</text>
    <text x="55" y="378" font-family="Arial" font-size="8" fill="#2e7d32" font-weight="bold">0.8</text>
    <text x="85" y="378" font-family="Arial" font-size="8" fill="#546e7a">False:</text>
    <text x="115" y="378" font-family="Arial" font-size="8" fill="#c62828" font-weight="bold">0.2</text>
  </g>
  
  <!-- Connection indicator -->
  <g data-narration="Visual indicator of probability flow">
    <circle cx="380" cy="365" r="12" fill="#ffcc80" stroke="#ef6c00" stroke-width="2" class="node"/>
    <text x="380" y="370" text-anchor="middle" font-family="Arial" font-size="16" fill="#e65100" font-weight="bold">?</text>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="8" fill="#b39ddb" opacity="0.5"/>
  <circle cx="390" cy="370" r="8" fill="#b39ddb" opacity="0.5"/>
</svg>