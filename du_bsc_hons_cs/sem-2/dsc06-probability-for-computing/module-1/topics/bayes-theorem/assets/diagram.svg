<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="bayes-theorem" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbf7d0"/>
      <stop offset="100%" style="stop-color:#86efac"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbcfe8"/>
      <stop offset="100%" style="stop-color:#f9a8d4"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fed7aa"/>
      <stop offset="100%" style="stop-color:#fdba74"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .box2 { animation: slideInRight 0.6s ease-out 0.3s both; }
    .box3 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .box4 { animation: slideInUp 0.6s ease-out 0.5s both; }
    .network { animation: fadeIn 0.8s ease-out 0.6s both; }
    .node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .edge { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out 1s forwards; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-size: 22px; font-weight: bold; fill: #1e3a5f; }
    .label-text { font-size: 14px; fill: #334155; }
    .detail-text { font-size: 12px; fill: #475569; }
    .formula-text { font-size: 15px; font-family: 'Times New Roman', serif; fill: #1e293b; }
    .highlight { font-weight: bold; fill: #1d4ed8; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text">Bayes' Theorem</text>
  
  <!-- Box 1: Conditional Probability -->
  <g class="box1" data-narration="Conditional probability P(A|B) represents the probability of event A occurring given that event B has already occurred">
    <rect x="15" y="50" width="120" height="85" rx="8" fill="url(#boxGradient1)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="75" y="68" text-anchor="middle" class="label-text" style="font-weight:bold;">Conditional Prob.</text>
    <text x="75" y="88" text-anchor="middle" class="formula-text">P(A|B) =</text>
    <text x="75" y="105" text-anchor="middle" class="formula-text" style="font-size:13px;">P(A ∩ B)</text>
    <text x="75" y="118" text-anchor="middle" class="formula-text" style="font-size:11px;">───────────</text>
    <text x="75" y="132" text-anchor="middle" class="formula-text" style="font-size:12px;">P(B)</text>
  </g>
  
  <!-- Arrow from Box 1 to Formula -->
  <line x1="135" y1="95" x2="165" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)" class="edge"/>
  
  <!-- Box 2: Bayes' Theorem Formula -->
  <g class="box2" data-narration="Bayes' Theorem formula: P(A|B) equals P(B|A) times P(A) divided by P(B), allowing us to calculate inverse probability">
    <rect x="165" y="55" width="130" height="95" rx="8" fill="url(#boxGradient2)" stroke="#4ade80" stroke-width="1.5"/>
    <text x="230" y="75" text-anchor="middle" class="label-text" style="font-weight:bold;">Bayes' Theorem</text>
    <text x="230" y="98" text-anchor="middle" class="formula-text">P(A|B) =</text>
    <text x="230" y="115" text-anchor="middle" class="formula-text" style="font-size:12px;">P(B|A) × P(A)</text>
    <text x="230" y="126" text-anchor="middle" class="formula-text" style="font-size:10px;">──────────────</text>
    <text x="230" y="140" text-anchor="middle" class="formula-text" style="font-size:12px;">P(B)</text>
  </g>
  
  <!-- Box 3: Bayesian Network -->
  <g class="box3" data-narration="Bayesian Decision Network showing nodes (variables) with directional edges representing conditional dependencies">
    <rect x="15" y="150" width="180" height="110" rx="8" fill="url(#boxGradient3)" stroke="#f472b6" stroke-width="1.5"/>
    <text x="105" y="170" text-anchor="middle" class="label-text" style="font-weight:bold;">Bayesian Network</text>
    
    <!-- Network Nodes -->
    <circle cx="55" cy="205" r="18" fill="#fdf2f8" stroke="#ec4899" stroke-width="2" class="node"/>
    <text x="55" y="210" text-anchor="middle" class="detail-text" style="font-size:11px;">Cause</text>
    
    <circle cx="105" cy="235" r="20" fill="#fdf2f8" stroke="#ec4899" stroke-width="2" class="node"/>
    <text x="105" y="240" text-anchor="middle" class="detail-text" style="font-size:11px;">Effect</text>
    
    <circle cx="155" cy="205" r="18" fill="#fdf2f8" stroke="#ec4899" stroke-width="2" class="node"/>
    <text x="155" y="210" text-anchor="middle" class="detail-text" style="font-size:11px;">P(E|A)</text>
    
    <!-- Edges -->
    <line x1="55" y1="205" x2="85" y2="220" stroke="#be185d" stroke-width="2" class="edge"/>
    <line x1="105" y1="215" x2="137" y2="205" stroke="#be185d" stroke-width="2" class="edge"/>
  </g>
  
  <!-- Box 4: Applications -->
  <g class="box4" data-narration="Real-world applications include spam filtering, medical diagnosis, and machine learning - calculating the probability of a cause given observed effects">
    <rect x="210" y="165" width="195" height="130" rx="8" fill="url(#boxGradient4)" stroke="#fb923c" stroke-width="1.5"/>
    <text x="307" y="185" text-anchor="middle" class="label-text" style="font-weight:bold;">Applications</text>
    
    <!-- Application items -->
    <circle cx="235" cy="210" r="4" fill="#ea580c"/>
    <text x="245" y="214" class="detail-text">Spam Filtering</text>
    
    <circle cx="235" cy="230" r="4" fill="#ea580c"/>
    <text x="245" y="234" class="detail-text">Medical Diagnosis</text>
    
    <circle cx="235" cy="250" r="4" fill="#ea580c"/>
    <text x="245" y="254" class="detail-text">Machine Learning</text>
    
    <circle cx="235" cy="270" r="4" fill="#ea580c"/>
    <text x="245" y="274" class="detail-text">AI &amp; Robotics</text>
    
    <circle cx="235" cy="290" r="4" fill="#ea580c"/>
    <text x="245" y="294" class="detail-text">Autocorrect</text>
  </g>
  
  <!-- Bottom Section: Inverse Probability -->
  <g class="box4" data-narration="Bayes' Theorem solves the inverse probability problem - determining the probability of a cause given an observed effect">
    <rect x="15" y="275" width="180" height="55" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="105" y="295" text-anchor="middle" class="label-text" style="font-weight:bold;">Inverse Probability</text>
    <text x="105" y="315" text-anchor="middle" class="detail-text">Find P(Cause | Effect)</text>
  </g>
  
  <!-- Arrows showing relationship -->
  <line x1="195" y1="220" x2="205" y2="220" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)" class="edge"/>
  <line x1="75" y1="145" x2="75" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)" class="edge"/>
  
  <!-- Legend/Key -->
  <g class="network" data-narration="Legend showing the three types of nodes in Bayesian decision networks: chance nodes, decision nodes, and utility nodes">
    <rect x="305" y="305" width="100" height="85" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="355" y="322" text-anchor="middle" class="detail-text" style="font-weight:bold; font-size:11px;">Network Nodes</text>
    <circle cx="320" cy="340" r="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="335" y="344" class="detail-text" style="font-size:10px;">Chance</text>
    <circle cx="320" cy="360" r="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="335" y="364" class="detail-text" style="font-size:10px;">Decision</text>
    <circle cx="320" cy="380" r="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <text x="335" y="384" class="detail-text" style="font-size:10px;">Utility</text>
  </g>
</svg>