<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="probability-defined-on-events">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff8080;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#80ff80;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="gradIntersect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffeb3b;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Georgia', serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Arial', sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c3e50; font-weight: bold; }
    .box { rx: 8; ry: 8; }
    .animated-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animated-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animated-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .animated-slide-up { animation: slideInUp 0.7s ease-out forwards; }
    .animated-pulse { animation: pulse 3s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
    .arrow-line { stroke: #7f8c8d; stroke-width: 2; stroke-dasharray: 5,3; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animated-fade">Probability Defined on Events</text>

  <!-- Sample Space Box -->
  <g class="animated-fade delay-1">
    <rect x="15" y="50" width="80" height="30" class="box" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="55" y="70" text-anchor="middle" class="label" font-weight="bold">Sample Space Ω</text>
  </g>

  <!-- Event A Circle -->
  <g class="animated-slide-left delay-2">
    <ellipse cx="150" cy="180" rx="75" ry="70" fill="url(#gradA)" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="175" text-anchor="middle" class="label" font-weight="bold" fill="#c0392b">Event A</text>
  </g>

  <!-- Event B Circle -->
  <g class="animated-slide-right delay-2">
    <ellipse cx="260" cy="180" rx="75" ry="70" fill="url(#gradB)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="310" y="175" text-anchor="middle" class="label" font-weight="bold" fill="#1e8449">Event B</text>
  </g>

  <!-- Intersection Area -->
  <g class="animated-fade delay-3">
    <ellipse cx="205" cy="180" rx="35" ry="40" fill="url(#gradIntersect)" stroke="#f39c12" stroke-width="2"/>
    <text x="205" y="183" text-anchor="middle" class="label" font-weight="bold" fill="#d68910">A ∩ B</text>
  </g>

  <!-- Union Arrow and Label -->
  <g class="animated-fade delay-4">
    <path d="M 150 270 Q 205 290 260 270" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="205" y="295" text-anchor="middle" class="formula" fill="#8e44ad">A ∪ B</text>
    <text x="205" y="310" text-anchor="middle" class="detail">(Union - either A or B or both)</text>
  </g>

  <!-- Intersection Arrow -->
  <g class="animated-fade delay-4">
    <line x1="205" y1="140" x2="205" y2="155" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="205" y="135" text-anchor="middle" class="detail" fill="#d68910">Intersection</text>
  </g>

  <!-- Key Concept Boxes -->
  <!-- Box 1: Definition -->
  <g class="animated-slide-up delay-3">
    <rect x="20" y="330" width="180" height="55" class="box" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="348" class="label" font-weight="bold">Sample Space (Ω)</text>
    <text x="30" y="365" class="detail">Set of all possible outcomes</text>
    <text x="30" y="378" class="detail">e.g., S = {HH, HT, TH, TT}</text>
  </g>

  <!-- Box 2: Event -->
  <g class="animated-slide-up delay-4">
    <rect x="210" y="330" width="190" height="55" class="box" fill="#e6f9e6" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="220" y="348" class="label" font-weight="bold">Event (A, B)</text>
    <text x="220" y="365" class="detail">A subset of the sample space</text>
    <text x="220" y="378" class="detail">A = {HH, HT} for "at least one H"</text>
  </g>

  <!-- Probability Measure annotation -->
  <g class="animated-fade delay-5">
    <rect x="320" y="50" width="90" height="25" class="box" fill="#f5eef8" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="365" y="68" text-anchor="middle" class="label" font-size="12" fill="#7d3c98">P: Events → [0,1]</text>
  </g>

  <!-- Axioms labels -->
  <g class="animated-fade delay-5">
    <text x="30" y="320" class="detail" font-style="italic" fill="#7f8c8d">Axioms: P(A) ≥ 0, P(Ω) = 1</text>
  </g>

  <!-- Narration elements (hidden but accessible) -->
  <desc data-narration="Sample Space Ω contains all possible outcomes of a random experiment">Sample Space</desc>
  <desc data-narration="Event A is a subset of the sample space represented by the left circle">Event A</desc>
  <desc data-narration="Event B is another subset of the sample space represented by the right circle">Event B</desc>
  <desc data-narration="The intersection A∩B represents outcomes that are in both events A and B">Intersection A∩B</desc>
  <desc data-narration="The union A∪B represents outcomes that are in either A or B or both">Union A∪B</desc>
  <desc data-narration="Probability measure P assigns a number between 0 and 1 to each event">Probability Measure</desc>

  <!-- Outside region label -->
  <g class="animated-fade delay-4">
    <text x="360" y="230" class="detail" fill="#95a5a6">Not A or B</text>
    <text x="360" y="245" class="detail" fill="#95a5a6">(Complement)</text>
  </g>

  <!-- Connecting line from Sample Space to Venn -->
  <g class="animated-fade delay-3">
    <line x1="95" y1="80" x2="110" y2="120" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>
</svg>