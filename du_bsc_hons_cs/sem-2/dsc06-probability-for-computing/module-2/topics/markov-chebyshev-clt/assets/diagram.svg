<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="markov-chebyshev-clt">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8eeff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="markovGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="chebyshevGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="cltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#84fab0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8fd3f4;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #5d6d7e; }
    .formula { font-family: 'Times New Roman', serif; font-size: 13px; fill: #2c3e50; font-style: italic; }
    .section-box { rx: 8; ry: 8; stroke-width: 2; }
    .animate-fade { animation: fadeIn 1s ease-out forwards; }
    .animate-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow { stroke: #7f8c8d; stroke-width: 1.5; fill: none; }
    .dashed-line { stroke: #95a5a6; stroke-width: 1; stroke-dasharray: 4,3; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="28" text-anchor="middle" class="title animate-fade">Markov • Chebyshev • CLT</text>
  
  <!-- Markov Section -->
  <g class="animate-slide-left" data-narration="Markov's Inequality provides an upper bound for non-negative random variables using only the mean">
    <rect x="15" y="50" width="115" height="145" fill="url(#markovGrad)" class="section-box" stroke="#ff6b6b"/>
    <text x="72" y="70" text-anchor="middle" class="label" font-weight="bold">Markov's</text>
    <text x="72" y="85" text-anchor="middle" class="label" font-weight="bold">Inequality</text>
    <text x="72" y="108" text-anchor="middle" class="formula">P(X ≥ a) ≤ μ/a</text>
    <text x="72" y="128" text-anchor="middle" class="detail">For X ≥ 0, a > 0</text>
    <text x="72" y="145" text-anchor="middle" class="detail">Uses: Mean only</text>
    <text x="72" y="162" text-anchor="middle" class="detail" fill="#c0392b">Loose bound</text>
  </g>
  
  <!-- Chebyshev Section -->
  <g class="animate-fade" data-narration="Chebyshev's Inequality uses both mean and variance to create tighter bounds showing probability within k standard deviations">
    <rect x="152" y="50" width="115" height="145" fill="url(#chebyshevGrad)" class="section-box" stroke="#9b59b6"/>
    <text x="209" y="70" text-anchor="middle" class="label" font-weight="bold">Chebyshev's</text>
    <text x="209" y="85" text-anchor="middle" class="label" font-weight="bold">Inequality</text>
    <text x="209" y="108" text-anchor="middle" class="formula">P(|X-μ|≥kσ) ≤ 1/k²</text>
    <text x="209" y="128" text-anchor="middle" class="detail">Uses: Mean + Variance</text>
    <text x="209" y="145" text-anchor="middle" class="detail">Tighter than Markov</text>
    <text x="209" y="162" text-anchor="middle" class="detail">kσ coverage</text>
  </g>
  
  <!-- CLT Section -->
  <g class="animate-slide-right" data-narration="The Central Limit Theorem shows that sums of i.i.d. random variables converge to a normal distribution regardless of original distribution">
    <rect x="290" y="50" width="115" height="145" fill="url(#cltGrad)" class="section-box" stroke="#27ae60"/>
    <text x="347" y="70" text-anchor="middle" class="label" font-weight="bold">Central Limit</text>
    <text x="347" y="85" text-anchor="middle" class="label" font-weight="bold">Theorem</text>
    <text x="347" y="108" text-anchor="middle" class="formula">ΣXᵢ → N(nμ, nσ²)</text>
    <text x="347" y="128" text-anchor="middle" class="detail">i.i.d. variables</text>
    <text x="347" y="145" text-anchor="middle" class="detail">Large n → Normal</text>
    <text x="347" y="162" text-anchor="middle" class="detail" fill="#27ae60">Most powerful!</text>
  </g>
  
  <!-- Arrow from Markov to Chebyshev -->
  <path d="M130 120 L152 120" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="150,117 152,120 150,123" fill="#7f8c8d"/>
  
  <!-- Arrow from Chebyshev to CLT -->
  <path d="M267 120 L290 120" class="arrow"/>
  <polygon points="288,117 290,120 288,123" fill="#7f8c8d"/>
  
  <!-- Bell Curve Visualization - Chebyshev Coverage -->
  <g class="animate-fade" data-narration="Visual representation of Chebyshev showing probability mass within k standard deviations of the mean" style="animation-delay: 0.5s">
    <rect x="15" y="210" width="390" height="175" fill="white" fill-opacity="0.5" rx="8" ry="8" stroke="#bdc3c7" stroke-width="1"/>
    
    <!-- Bell Curve -->
    <path d="M40 340 Q 90 250 140 340 Q 190 230 210 280 Q 230 230 280 340 Q 330 250 380 340" 
          fill="none" stroke="#3498db" stroke-width="2"/>
    
    <!-- Center line (mean) -->
    <line x1="210" y1="250" x2="210" y2="340" stroke="#e74c3c" stroke-width="2" class="animate-pulse"/>
    <text x="210" y="245" text-anchor="middle" class="detail" fill="#e74c3c">μ</text>
    
    <!-- k=1 region -->
    <path d="M155 340 Q 182 310 210 280 Q 238 310 265 340 Z" fill="#9b59b6" fill-opacity="0.3"/>
    <line x1="155" y1="260" x2="155" y2="340" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="265" y1="260" x2="265" y2="340" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="155" y="255" text-anchor="middle" class="detail" fill="#9b59b6">-σ</text>
    <text x="265" y="255" text-anchor="middle" class="detail" fill="#9b59b6">+σ</text>
    
    <!-- k=2 region -->
    <path d="M100 340 Q 155 320 210 280 Q 265 320 320 340 Z" fill="#3498db" fill-opacity="0.2"/>
    <line x1="100" y1="270" x2="100" y2="340" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="320" y1="270" x2="320" y2="340" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="100" y="265" text-anchor="middle" class="detail" fill="#3498db">-2σ</text>
    <text x="320" y="265" text-anchor="middle" class="detail" fill="#3498db">+2σ</text>
    
    <!-- Probability labels -->
    <text x="210" y="320" text-anchor="middle" class="label" fill="#2c3e50">≥68%</text>
    <text x="210" y="360" text-anchor="middle" class="label" fill="#2c3e50">k=1: P ≤ 1</text>
    <text x="130" y="360" text-anchor="middle" class="detail" fill="#7f8c8d">k=2: P ≤ 1/4</text>
    <text x="300" y="360" text-anchor="middle" class="detail" fill="#7f8c8d">k=3: P ≤ 1/9</text>
    
    <!-- Key insight box -->
    <rect x="145" y="370" width="130" height="20" fill="#ecf0f1" rx="4" ry="4"/>
    <text x="210" y="384" text-anchor="middle" class="detail" font-weight="bold">Chebyshev: 1/k² bound</text>
  </g>
  
  <!-- Bottom relationship arrow -->
  <g class="animate-fade" style="animation-delay: 1s">
    <path d="M72 205 L72 195 L347 195 L347 205" fill="none" stroke="#95a5a6" stroke-width="1" stroke-dasharray="4,3"/>
    <polygon points="347,200 352,205 347,210" fill="#95a5a6"/>
    <text x="210" y="190" text-anchor="middle" class="detail" fill="#7f8c8d">Progressive refinement →</text>
  </g>
</svg>