<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="discrete-random-variables">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb3cc"/>
      <stop offset="100%" style="stop-color:#3a8fa8"/>
    </linearGradient>
    <linearGradient id="cdfGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dbf85"/>
      <stop offset="100%" style="stop-color:#4a9a5b"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes growBar {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c5f7c; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .section-box { fill: #fff; stroke: #5cb3cc; stroke-width: 2; rx: 8; }
    .bar { transform-origin: bottom; animation: growBar 0.8s ease-out forwards; }
    .pmf-label { animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0; }
    .cdf-line { animation: slideIn 1s ease-out 0.3s forwards; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box-anim { animation: slideIn 0.6s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text title-anim">Discrete Random Variables</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#5cb3cc" stroke-width="2" class="title-anim" style="animation-delay: 0.2s"/>
  
  <!-- Section 1: Definition Box -->
  <g class="box-anim" data-narration="Definition of Discrete Random Variable">
    <rect x="20" y="55" width="180" height="70" class="section-box"/>
    <text x="30" y="70" class="label-text" style="font-weight: bold;">Definition</text>
    <text x="30" y="88" class="detail-text">A discrete random variable X</text>
    <text x="30" y="102" class="detail-text">maps outcomes to real numbers.</text>
    <text x="30" y="116" class="detail-text">Values are finite or countably</text>
    <text x="30" y="130" class="detail-text" style="font-style: italic;">infinite, separated by gaps.</text>
  </g>
  
  <!-- Section 2: PMF Properties -->
  <g class="box-anim" data-narration="Probability Mass Function properties" style="animation-delay: 0.2s">
    <rect x="220" y="55" width="180" height="70" class="section-box" style="stroke: #7dbf85"/>
    <text x="230" y="70" class="label-text" style="font-weight: bold;">PMF Properties</text>
    <text x="230" y="88" class="detail-text">1. Non-negativity: pX(x) ≥ 0</text>
    <text x="230" y="105" class="detail-text">2. Normalization: ΣpX(x) = 1</text>
    <circle cx="380" cy="115" r="15" fill="#7dbf85" class="pulse-anim"/>
    <text x="380" y="120" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Σ</text>
  </g>
  
  <!-- PMF Chart Label -->
  <text x="70" y="160" class="label-text" style="font-weight: bold;" data-narration="Probability Mass Function visualization for dice roll">PMF: P(X = x)</text>
  
  <!-- PMF Bars -->
  <g transform="translate(30, 175)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="80" x2="180" y2="80" stroke="#333" stroke-width="1"/>
    
    <!-- Bar 1 -->
    <rect class="bar" x="10" y="80-53" width="20" height="53" fill="url(#barGradient)" style="animation-delay: 0.3s; transform-origin: 10px 80px;"/>
    <text class="pmf-label" x="20" y="155" text-anchor="middle" class="detail-text">1</text>
    <text class="pmf-label" x="20" y="168" text-anchor="middle" class="detail-text" style="font-size:10px">1/6</text>
    
    <!-- Bar 2 -->
    <rect class="bar" x="35" y="80-53" width="20" height="53" fill="url(#barGradient)" style="animation-delay: 0.4s; transform-origin: 35px 80px;"/>
    <text class="pmf-label" x="45" y="155" text-anchor="middle" class="detail-text">2</text>
    <text class="pmf-label" x="45" y="168" text-anchor="middle" class="detail-text" style="font-size:10px">1/6</text>
    
    <!-- Bar 3 -->
    <rect class="bar" x="60" y="80-53" width="20" height="53" fill="url(#barGradient)" style="animation-delay: 0.5s; transform-origin: 60px 80px;"/>
    <text class="pmf-label" x="70" y="155" text-anchor="middle" class="detail-text">3</text>
    <text class="pmf-label" x="70" y="168" text-anchor="middle" class="detail-text" style="font-size:10px">1/6</text>
    
    <!-- Bar 4 -->
    <rect class="bar" x="85" y="80-53" width="20" height="53" fill="url(#barGradient)" style="animation-delay: 0.6s; transform-origin: 85px 80px;"/>
    <text class="pmf-label" x="95" y="155" text-anchor="middle" class="detail-text">4</text>
    <text class="pmf-label" x="95" y="168" text-anchor="middle" class="detail-text" style="font-size:10px">1/6</text>
    
    <!-- Bar 5 -->
    <rect class="bar" x="110" y="80-53" width="20" height="53" fill="url(#barGradient)" style="animation-delay: 0.7s; transform-origin: 110px 80px;"/>
    <text class="pmf-label" x="120" y="155" text-anchor="middle" class="detail-text">5</text>
    <text class="pmf-label" x="120" y="168" text-anchor="middle" class="detail-text" style="font-size:10px">1/6</text>
    
    <!-- Bar 6 -->
    <rect class="bar" x="135" y="80-53" width="20" height="53" fill="url(#barGradient)" style="animation-delay: 0.8s; transform-origin: 135px 80px;"/>
    <text class="pmf-label" x="145" y="155" text-anchor="middle" class="detail-text">6</text>
    <text class="pmf-label" x="145" y="168" text-anchor="middle" class="detail-text" style="font-size:10px">1/6</text>
  </g>
  
  <!-- CDF Chart -->
  <text x="280" y="160" class="label-text" style="font-weight: bold;" data-narration="Cumulative Distribution Function as step function">CDF: F(x) = P(X ≤ x)</text>
  
  <g transform="translate(220, 175)" class="cdf-line">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="80" x2="180" y2="80" stroke="#333" stroke-width="1"/>
    
    <!-- Step function CDF -->
    <polyline points="0,80 10,80 10,67 30,67 30,53 50,53 50,40 70,40 70,27 90,27 90,13 110,13 110,0 180,0" 
              fill="none" stroke="url(#cdfGradient)" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Dots at jumps -->
    <circle cx="10" cy="67" r="3" fill="#4a9a5b"/>
    <circle cx="30" cy="53" r="3" fill="#4a9a5b"/>
    <circle cx="50" cy="40" r="3" fill="#4a9a5b"/>
    <circle cx="70" cy="27" r="3" fill="#4a9a5b"/>
    <circle cx="90" cy="13" r="3" fill="#4a9a5b"/>
    <circle cx="110" cy="0" r="3" fill="#4a9a5b"/>
    
    <!-- Labels -->
    <text x="10" y="95" text-anchor="middle" class="detail-text" style="font-size:10px">1/6</text>
    <text x="30" y="95" text-anchor="middle" class="detail-text" style="font-size:10px">2/6</text>
    <text x="50" y="95" text-anchor="middle" class="detail-text" style="font-size:10px">3/6</text>
    <text x="70" y="95" text-anchor="middle" class="detail-text" style="font-size:10px">4/6</text>
    <text x="90" y="95" text-anchor="middle" class="detail-text" style="font-size:10px">5/6</text>
    <text x="110" y="95" text-anchor="middle" class="detail-text" style="font-size:10px">1</text>
  </g>
  
  <!-- Arrow connecting PMF to CDF -->
  <g data-narration="Relationship between PMF and CDF">
    <path d="M 190 240 Q 210 260 230 240" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
      </marker>
    </defs>
  </g>
  
  <!-- Section 3: Key Characteristics -->
  <g class="box-anim" data-narration="Key characteristics of discrete variables" style="animation-delay: 0.4s">
    <rect x="20" y="260" width="180" height="60" class="section-box" style="stroke:#d4a574"/>
    <text x="30" y="278" class="label-text" style="font-weight: bold;">Key Characteristics</text>
    <text x="30" y="295" class="detail-text">• Distinct, separate values</text>
    <text x="30" y="310" class="detail-text">• Countable outcomes</text>
    <text x="30" y="325" class="detail-text">• Gaps between values</text>
  </g>
  
  <!-- Section 4: Applications -->
  <g class="box-anim" data-narration="Applications in computer science" style="animation-delay: 0.5s">
    <rect x="220" y="260" width="180" height="60" class="section-box" style="stroke:#9b7ed9"/>
    <text x="230" y="278" class="label-text" style="font-weight: bold;">CS Applications</text>
    <text x="230" y="295" class="detail-text">• Algorithm analysis</text>
    <text x="230" y="310" class="detail-text">• Network communications</text>
    <text x="230" y="325" class="detail-text">• Machine learning</text>
  </g>
  
  <!-- Dice icon representation -->
  <g transform="translate(350, 320)" data-narration="Visual example: dice roll">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#f5e6d3" stroke="#c4a77d" stroke-width="2"/>
    <circle cx="15" cy="15" r="4" fill="#333"/>
    <circle cx="35" cy="15" r="4" fill="#333"/>
    <circle cx="25" cy="25" r="4" fill="#333"/>
    <circle cx="15" cy="35" r="4" fill="#333"/>
    <circle cx="35" cy="35" r="4" fill="#333"/>
  </g>
  
  <!-- Footer note -->
  <text x="210" y="385" text-anchor="middle" class="detail-text" style="fill:#666;">Dice Roll Example: Uniform Distribution</text>
</svg>