<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="continuous-random-variables" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#f0e8f8"/>
    </linearGradient>
    <linearGradient id="curveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="area1Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9999;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff6666;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="area2Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#99ccff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#6699cc;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="area3Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#99ff99;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#66cc66;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Georgia', serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Arial', sans-serif; font-size: 12px; fill: #5d6d7e; }
    .highlight { font-family: 'Arial', sans-serif; font-size: 13px; fill: #1a5276; font-weight: bold; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 2s ease-out forwards; }
    .box { fill: #ffffff; stroke: #bdc3c7; stroke-width: 1; rx: 5; }
    .arrow { marker-end: url(#arrowhead); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Continuous Random Variables</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#4a90d9" stroke-width="2" class="line-anim"/>
  
  <!-- Axis -->
  <line x1="40" y1="320" x2="380" y2="320" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="40" y1="320" x2="40" y2="50" stroke="#7f8c8d" stroke-width="2"/>
  
  <!-- Bell Curve Areas (99.7% region first - behind) -->
  <path d="M60,320 Q120,80 210,320 L60,320" fill="url(#area3Gradient)" class="fade-in" style="animation-delay: 0.5s"/>
  <!-- 95% region -->
  <path d="M90,320 Q130,120 210,320 L90,320" fill="url(#area2Gradient)" class="fade-in" style="animation-delay: 0.7s"/>
  <!-- 68% region -->
  <path d="M120,320 Q145,180 210,320 L120,320" fill="url(#area1Gradient)" class="fade-in" style="animation-delay: 0.9s"/>
  
  <!-- Bell Curve -->
  <path d="M40,320 Q80,40 150,150 Q190,220 210,260 Q230,220 270,150 Q340,40 380,320" 
        fill="none" stroke="url(#curveGradient)" stroke-width="3" class="line-anim"/>
  
  <!-- Center line (mean) -->
  <line x1="210" y1="320" x2="210" y2="100" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5" class="fade-in" style="animation-delay: 1.2s"/>
  
  <!-- Sigma markers -->
  <line x1="120" y1="320" x2="120" y2="280" stroke="#27ae60" stroke-width="2" class="fade-in" style="animation-delay: 1.3s"/>
  <line x1="300" y1="320" x2="300" y2="280" stroke="#27ae60" stroke-width="2" class="fade-in" style="animation-delay: 1.3s"/>
  <line x1="90" y1="320" x2="90" y2="300" stroke="#8e44ad" stroke-width="2" class="fade-in" style="animation-delay: 1.4s"/>
  <line x1="330" y1="320" x2="330" y2="300" stroke="#8e44ad" stroke-width="2" class="fade-in" style="animation-delay: 1.4s"/>
  
  <!-- Axis Labels -->
  <text x="210" y="340" text-anchor="middle" class="label fade-in" style="animation-delay: 1.5s">x</text>
  <text x="25" y="180" text-anchor="middle" class="label fade-in" style="animation-delay: 1.5s" transform="rotate(-90, 25, 180)">f(x)</text>
  
  <!-- Mean label -->
  <text x="210" y="90" text-anchor="middle" class="highlight pulse" style="animation-delay: 1.6s">μ</text>
  
  <!-- Sigma labels -->
  <text x="165" y="265" text-anchor="middle" class="detail" style="animation-delay: 1.7s">−σ</text>
  <text x="255" y="265" text-anchor="middle" class="detail" style="animation-delay: 1.7s">+σ</text>
  <text x="150" y="295" text-anchor="middle" class="detail" style="animation-delay: 1.8s">−2σ</text>
  <text x="270" y="295" text-anchor="middle" class="detail" style="animation-delay: 1.8s">+2σ</text>
  
  <!-- Key Concept Box 1 - 68% -->
  <g class="slide-in" style="animation-delay: 1.9s">
    <rect x="40" y="345" width="90" height="24" class="box" fill="#ffcccc"/>
    <text x="85" y="360" text-anchor="middle" class="detail" fill="#c0392b">68%</text>
    <text x="85" y="372" text-anchor="middle" class="detail">μ±1σ</text>
  </g>
  
  <!-- Key Concept Box 2 - 95% -->
  <g class="slide-in" style="animation-delay: 2.1s">
    <rect x="140" y="345" width="90" height="24" class="box" fill="#cce5ff"/>
    <text x="185" y="360" text-anchor="middle" class="detail" fill="#2962ff">95%</text>
    <text x="185" y="372" text-anchor="middle" class="detail">μ±2σ</text>
  </g>
  
  <!-- Key Concept Box 3 - 99.7% -->
  <g class="slide-in" style="animation-delay: 2.3s">
    <rect x="240" y="345" width="90" height="24" class="box" fill="#ccffcc"/>
    <text x="285" y="360" text-anchor="middle" class="detail" fill="#27ae60">99.7%</text>
    <text x="285" y="372" text-anchor="middle" class="detail">μ±3σ</text>
  </g>
  
  <!-- Formula Box -->
  <g class="fade-in" style="animation-delay: 2.5s">
    <rect x="270" y="130" width="140" height="50" class="box" fill="#fef9e7"/>
    <text x="340" y="150" text-anchor="middle" class="label" font-size="12">PDF: f(x)</text>
    <text x="340" y="168" text-anchor="middle" class="detail">P(a≤X≤b)=</text>
    <text x="355" y="182" text-anchor="middle" class="detail">∫f(x)dx</text>
  </g>
  
  <!-- Arrow from formula to curve -->
  <path d="M310,160 Q280,200 250,220" fill="none" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowhead)" class="fade-in" style="animation-delay: 2.7s"/>
  
  <!-- Zero probability note -->
  <g class="fade-in" style="animation-delay: 2.9s">
    <rect x="295" y="55" width="110" height="28" class="box" fill="#f5eef8"/>
    <text x="350" y="68" text-anchor="middle" class="detail" font-size="11">P(X=a)=0</text>
    <text x="350" y="80" text-anchor="middle" class="detail" font-size="10">Exact value</text>
  </g>
  
  <!-- Data narration areas -->
  <rect x="0" y="0" width="420" height="400" fill="transparent" data-narration="Introduction to continuous random variables showing the Normal Distribution as the key PDF visualization"/>
  <rect x="40" y="345" width="90" height="24" fill="transparent" data-narration="68% of data within 1 standard deviation from mean"/>
  <rect x="140" y="345" width="90" height="24" fill="transparent" data-narration="95% of data within 2 standard deviations from mean"/>
  <rect x="240" y="345" width="90" height="24" fill="transparent" data-narration="99.7% of data within 3 standard deviations from mean"/>
  <rect x="270" y="130" width="140" height="50" fill="transparent" data-narration="Probability Density Function defines the distribution, area under curve equals 1"/>
  <rect x="295" y="55" width="110" height="28" fill="transparent" data-narration="Key property: probability of any exact value is zero, probabilities are assigned to intervals"/>
</svg>