<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pmf-pdf-cdf">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5e6d3"/>
    </linearGradient>
    <linearGradient id="pmfGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90b8"/>
    </linearGradient>
    <linearGradient id="pdfGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a962"/>
      <stop offset="100%" style="stop-color:#d4823a"/>
    </linearGradient>
    <linearGradient id="cdfGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8dd9a7"/>
      <stop offset="100%" style="stop-color:#4ab87a"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes growBar {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .grow-bar { transform-origin: bottom; animation: growBar 0.6s ease-out forwards; }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .box { fill: white; stroke: #bdc3c7; stroke-width: 1; rx: 8; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; fill: white; font-weight: bold; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="30" text-anchor="middle" class="title fade-in">PMF, PDF &amp; CDF</text>
  <text x="210" y="50" text-anchor="middle" class="detail slide-in">Probability Distribution Functions</text>
  
  <!-- PMF Section -->
  <g transform="translate(20, 75)" data-narration="PMF: Probability Mass Function for discrete random variables">
    <rect class="box" x="0" y="0" width="120" height="140"/>
    <rect x="0" y="0" width="120" height="22" fill="url(#pmfGradient)" rx="8"/>
    <text x="60" y="16" text-anchor="middle" class="section-title">PMF</text>
    <text x="10" y="35" class="label">Discrete</text>
    <rect x="15" y="50" width="12" height="30" fill="#5dade2" class="grow-bar" style="animation-delay: 0.3s"/>
    <rect x="35" y="40" width="12" height="40" fill="#3498db" class="grow-bar" style="animation-delay: 0.5s"/>
    <rect x="55" y="55" width="12" height="25" fill="#2980b9" class="grow-bar" style="animation-delay: 0.7s"/>
    <rect x="75" y="45" width="12" height="35" fill="#1f618d" class="grow-bar" style="animation-delay: 0.9s"/>
    <rect x="95" y="58" width="12" height="22" fill="#154360" class="grow-bar" style="animation-delay: 1.1s"/>
    <line x1="10" y1="90" x2="110" y2="90" stroke="#bdc3c7" stroke-width="1"/>
    <text x="10" y="105" class="detail">P(X = x)</text>
    <text x="10" y="120" class="detail">Sum = 1</text>
    <circle cx="100" cy="125" r="8" fill="url(#pmfGradient)" class="pulse"/>
    <text x="100" y="128" text-anchor="middle" font-size="10" fill="white">?</text>
  </g>
  
  <!-- PDF Section -->
  <g transform="translate(150, 75)" data-narration="PDF: Probability Density Function for continuous random variables">
    <rect class="box" x="0" y="0" width="120" height="140"/>
    <rect x="0" y="0" width="120" height="22" fill="url(#pdfGradient)" rx="8"/>
    <text x="60" y="16" text-anchor="middle" class="section-title">PDF</text>
    <text x="10" y="35" class="label">Continuous</text>
    <path d="M15,80 Q30,30 45,55 Q60,75 75,40 Q90,20 105,50" fill="none" stroke="#e67e22" stroke-width="2.5" class="fade-in" style="animation-delay: 0.5s"/>
    <path d="M15,80 Q30,30 45,55 Q60,75 75,40 Q90,20 105,50 L105,80 L15,80 Z" fill="#f5b041" opacity="0.4" class="fade-in" style="animation-delay: 0.8s"/>
    <line x1="10" y1="80" x2="110" y2="80" stroke="#bdc3c7" stroke-width="1"/>
    <text x="10" y="95" class="detail">∫ f(x)dx = 1</text>
    <text x="10" y="110" class="detail">Area under curve</text>
    <circle cx="100" cy="125" r="8" fill="url(#pdfGradient)" class="pulse"/>
    <text x="100" y="128" text-anchor="middle" font-size="10" fill="white">∫</text>
  </g>
  
  <!-- CDF Section -->
  <g transform="translate(280, 75)" data-narration="CDF: Cumulative Distribution Function shows probability up to value x">
    <rect class="box" x="0" y="0" width="120" height="140"/>
    <rect x="0" y="0" width="120" height="22" fill="url(#cdfGradient)" rx="8"/>
    <text x="60" y="16" text-anchor="middle" class="section-title">CDF</text>
    <text x="10" y="35" class="label">Both Types</text>
    <polyline points="15,80 30,75 45,65 60,50 75,35 90,20 105,10" fill="none" stroke="#27ae60" stroke-width="2.5" class="fade-in" style="animation-delay: 0.5s"/>
    <line x1="10" y1="80" x2="110" y2="80" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="15" y1="80" x2="15" y2="10" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="15" y1="80" x2="110" y2="80" stroke="#27ae60" stroke-width="1"/>
    <text x="10" y="95" class="detail">F(x) = P(X ≤ x)</text>
    <text x="10" y="110" class="detail">0 to 1 range</text>
    <circle cx="100" cy="125" r="8" fill="url(#cdfGradient)" class="pulse"/>
    <text x="100" y="129" text-anchor="middle" font-size="14" fill="white">Σ</text>
  </g>
  
  <!-- Relationship Arrow -->
  <g transform="translate(130, 225)" data-narration="CDF is the integral of PDF and sum of PMF">
    <path d="M0,0 L80,0" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,3" class="fade-in" style="animation-delay: 1.2s"/>
    <polygon points="80,0 72,-5 72,5" fill="#9b59b6"/>
    <text x="40" y="-8" text-anchor="middle" class="detail" fill="#9b59b6">Integration</text>
  </g>
  
  <!-- Key Formulas Box -->
  <g transform="translate(20, 240)" data-narration="Key formulas for each distribution type">
    <rect class="box" x="0" y="0" width="380" height="70"/>
    <text x="10" y="20" class="label">Key Formulas:</text>
    <text x="10" y="40" class="detail">PMF: Σ P(x) = 1</text>
    <text x="130" y="40" class="detail">PDF: ∫ f(x)dx = 1</text>
    <text x="250" y="40" class="detail">CDF: F(x) = ∫/Σ f(t)dt</text>
    <text x="10" y="58" class="detail" fill="#e74c3c">Discrete: countable values</text>
    <text x="160" y="58" class="detail" fill="#e67e22">Continuous: uncountable</text>
    <text x="290" y="58" class="detail" fill="#27ae60">P(X ≤ x)</text>
  </g>
  
  <!-- Applications Section -->
  <g transform="translate(20, 320)" data-narration="Practical applications in computing">
    <rect class="box" x="0" y="0" width="380" height="70"/>
    <text x="10" y="20" class="label">Computing Applications:</text>
    <rect x="10" y="30" width="80" height="30" fill="#ecf0f1" rx="4"/>
    <text x="50" y="48" text-anchor="middle" class="detail">Algorithm</text>
    <text x="50" y="58" text-anchor="middle" class="detail" font-size="10">Analysis</text>
    <rect x="100" y="30" width="80" height="30" fill="#ecf0f1" rx="4"/>
    <text x="140" y="48" text-anchor="middle" class="detail">Machine</text>
    <text x="140" y="58" text-anchor="middle" class="detail" font-size="10">Learning</text>
    <rect x="190" y="30" width="80" height="30" fill="#ecf0f1" rx="4"/>
    <text x="230" y="48" text-anchor="middle" class="detail">Queueing</text>
    <text x="230" y="58" text-anchor="middle" class="detail" font-size="10">Theory</text>
    <rect x="280" y="30" width="80" height="30" fill="#ecf0f1" rx="4"/>
    <text x="320" y="48" text-anchor="middle" class="detail">Data</text>
    <text x="320" y="58" text-anchor="middle" class="detail" font-size="10">Science</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(330, 365)">
    <circle cx="5" cy="5" r="4" fill="#3498db"/>
    <text x="15" y="9" class="detail" font-size="10">Discrete</text>
    <circle cx="5" cy="20" r="4" fill="#e67e22"/>
    <text x="15" y="24" class="detail" font-size="10">Continuous</text>
  </g>
</svg>