<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="expectation-variance">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f6f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="meanLineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90a4" />
      <stop offset="100%" style="stop-color:#2d5a6b" />
    </linearGradient>
    <linearGradient id="pointGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7e5f" />
      <stop offset="100%" style="stop-color:#feb47b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes scaleIn {
      from { transform: scale(0); transform-origin: center; }
      to { transform: scale(1); transform-origin: center; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: 'Times New Roman', serif; font-size: 15px; fill: #2c3e50; font-style: italic; }
    .section-box { fill: #ffffff; stroke: #b8c9d9; stroke-width: 1.5; rx: 8; }
    .mean-line { stroke: url(#meanLineGradient); stroke-width: 3; stroke-dasharray: 200; animation: drawLine 1.5s ease-out forwards; }
    .data-point { fill: url(#pointGradient); animation: pulse 2s ease-in-out infinite; }
    .sq-box { fill: #ffeaa7; stroke: #f39c12; stroke-width: 1; opacity: 0.8; }
    .arrow { stroke: #7f8c8d; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .scale-in { animation: scaleIn 0.6s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title" data-narration="Title: Expectation and Variance">Expectation &amp; Variance</text>
  <line x1="60" y1="48" x2="360" y2="48" stroke="#b8c9d9" stroke-width="1"/>
  
  <!-- Section 1: Expectation Definition Box -->
  <g class="slide-in" style="animation-delay: 0.2s;">
    <rect x="20" y="60" width="180" height="70" class="section-box" filter="url(#shadow)" data-narration="Definition of Expected Value"/>
    <text x="30" y="80" class="label" font-weight="bold">Expected Value E[X]</text>
    <text x="30" y="100" class="detail">Discrete:</text>
    <text x="90" y="100" class="formula">Σ xᵢ · pᵢ</text>
    <text x="30" y="118" class="detail">Continuous:</text>
    <text x="110" y="118" class="formula">∫ x·f(x)dx</text>
  </g>
  
  <!-- Section 2: Variance Definition Box -->
  <g class="slide-in" style="animation-delay: 0.4s;">
    <rect x="220" y="60" width="180" height="70" class="section-box" filter="url(#shadow)" data-narration="Definition of Variance"/>
    <text x="230" y="80" class="label" font-weight="bold">Variance Var(X)</text>
    <text x="230" y="100" class="detail">Measure of spread:</text>
    <text x="280" y="118" class="formula">E[(X-μ)²]</text>
  </g>
  
  <!-- Arrow between boxes -->
  <path d="M200 95 Q210 95 220 95" stroke="#7f8c8d" stroke-width="1.5" fill="none" data-narration="Relationship between expectation and variance"/>
  <polygon points="217,92 224,95 217,98" fill="#7f8c8d"/>
  
  <!-- Main Visual: Variance as Spread Around Mean -->
  <g transform="translate(30, 150)" data-narration="Visual demonstration: Mean line at center with data points scattered around, showing how variance measures spread">
    <!-- Axis -->
    <line x1="0" y1="120" x2="360" y2="120" stroke="#b8c9d9" stroke-width="1"/>
    
    <!-- Mean Line -->
    <line x1="180" y1="10" x2="180" y2="130" class="mean-line" data-narration="Mean line (μ) at center"/>
    <text x="180" y="145" text-anchor="middle" class="label" fill="#4a90a4" font-weight="bold">μ (Mean)</text>
    
    <!-- Data Points with Squared Distance Squares -->
    <!-- Point 1: Left side -->
    <g class="scale-in" style="animation-delay: 0.6s;">
      <rect x="100" y="70" width="80" height="50" class="sq-box"/>
      <circle cx="100" cy="120" r="8" class="data-point" style="animation-delay: 0.8s;"/>
      <line x1="100" y1="112" x2="180" y2="112" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
      <text x="140" y="100" text-anchor="middle" class="detail">(x-μ)²</text>
    </g>
    
    <!-- Point 2: Left-center -->
    <g class="scale-in" style="animation-delay: 0.8s;">
      <rect x="130" y="85" width="50" height="35" class="sq-box"/>
      <circle cx="130" cy="120" r="8" class="data-point" style="animation-delay: 1s;"/>
      <line x1="130" y1="112" x2="180" y2="112" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
    </g>
    
    <!-- Point 3: Right-center -->
    <g class="scale-in" style="animation-delay: 1s;">
      <rect x="200" y="90" width="40" height="30" class="sq-box"/>
      <circle cx="240" cy="120" r="8" class="data-point" style="animation-delay: 1.2s;"/>
      <line x1="180" y1="112" x2="240" y2="112" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
    </g>
    
    <!-- Point 4: Right side (far) -->
    <g class="scale-in" style="animation-delay: 1.2s;">
      <rect x="220" y="50" width="100" height="70" class="sq-box"/>
      <circle cx="320" cy="120" r="8" class="data-point" style="animation-delay: 1.4s;"/>
      <line x1="180" y1="112" x2="320" y2="112" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
      <text x="270" y="90" text-anchor="middle" class="detail">Larger (x-μ)²</text>
    </g>
    
    <!-- Labels -->
    <text x="60" y="125" class="detail">Data Points</text>
    <text x="60" y="65" class="detail">Squared Distances</text>
    <text x="60" y="85" class="detail">(Area = Variance)</text>
  </g>
  
  <!-- Key Properties Section -->
  <g transform="translate(20, 295)" data-narration="Key properties: Linearity of expectation and variance formula">
    <rect x="0" y="0" width="380" height="90" class="section-box" filter="url(#shadow)"/>
    
    <!-- Property 1 -->
    <g class="fade-in" style="animation-delay: 1.5s;">
      <text x="15" y="25" class="label" font-weight="bold" fill="#27ae60">Linearity of Expectation</text>
      <text x="15" y="45" class="detail">E[aX + bY] = aE[X] + bE[Y]</text>
      <rect x="10" y="52" width="165" height="30" fill="#e8f8f5" rx="4"/>
      <text x="18" y="70" class="detail" fill="#1e8449">Useful for complex random variables</text>
    </g>
    
    <!-- Property 2 -->
    <g class="fade-in" style="animation-delay: 1.7s;">
      <text x="195" y="25" class="label" font-weight="bold" fill="#8e44ad">Variance Formula</text>
      <text x="195" y="45" class="detail">Var(X) = E[X²] - (E[X])²</text>
      <rect x="190" y="52" width="180" height="30" fill="#f5eef8" rx="4"/>
      <text x="198" y="70" class="detail" fill="#6c3483">Often easier to compute</text>
    </g>
  </g>
  
  <!-- Applications note -->
  <g class="fade-in" style="animation-delay: 1.9s;">
    <rect x="20" y="350" width="380" height="40" fill="#fef9e7" rx="6" stroke="#f39c12" stroke-width="1"/>
    <text x="30" y="368" class="detail">Applications: Algorithm analysis • Machine Learning • Data Science • Performance evaluation</text>
    <text x="370" y="382" class="detail" fill="#f39c12" font-size="10">▼</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(330, 280)" class="fade-in" style="animation-delay: 2.1s;">
    <circle cx="5" cy="5" r="5" fill="url(#pointGradient)"/>
    <text x="18" y="9" class="detail">Data Point</text>
    <rect x="0" y="15" width="12" height="12" fill="#ffeaa7" stroke="#f39c12"/>
    <text x="18" y="26" class="detail">Squared Dist</text>
    <line x1="2" y1="38" x2="14" y2="38" stroke="url(#meanLineGradient)" stroke-width="2"/>
    <text x="18" y="42" class="detail">Mean μ</text>
  </g>
</svg>