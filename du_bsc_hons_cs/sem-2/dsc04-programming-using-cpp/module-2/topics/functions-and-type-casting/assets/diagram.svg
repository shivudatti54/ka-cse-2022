<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="functions-and-type-casting">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plateGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="declGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#56ab91;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="defGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9a76;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="callGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b6dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="castGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcab0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e07a5f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes stackPush {
      0% { transform: translateY(-50px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .box-decl { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .box-def { animation: slideInRight 0.8s ease-out 0.4s both; }
    .box-call { animation: slideInUp 0.8s ease-out 0.6s both; }
    .box-stack { animation: fadeIn 1s ease-out 0.8s both; }
    .box-cast { animation: slideInRight 0.8s ease-out 1s both; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .stack-plate-1 { animation: stackPush 0.5s ease-out 1.2s both; }
    .stack-plate-2 { animation: stackPush 0.5s ease-out 1.4s both; }
    .stack-plate-3 { animation: stackPush 0.5s ease-out 1.6s both; }
    text { font-family: Arial, sans-serif; }
    .title { font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 14px; font-weight: bold; fill: #34495e; }
    .code { font-size: 11px; font-family: 'Courier New', monospace; fill: #2c3e50; }
    .detail { font-size: 12px; fill: #5d6d7e; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Functions &amp; Type Casting</text>
  <line x1="20" y1="38" x2="400" y2="38" stroke="#7eb8da" stroke-width="2" class="title-anim"/>
  
  <!-- Function Declaration Box -->
  <g class="box-decl" data-narration="Function Declaration: A prototype that specifies function name, return type, and parameters">
    <rect x="20" y="50" width="120" height="70" rx="6" fill="url(#declGradient)" filter="url(#shadow)"/>
    <text x="80" y="68" text-anchor="middle" class="label">Declaration</text>
    <text x="80" y="86" text-anchor="middle" class="code">int add(int x, int y);</text>
    <text x="80" y="108" text-anchor="middle" class="detail">Prototype</text>
  </g>
  
  <!-- Arrow from Declaration to Definition -->
  <path d="M140 85 L170 85" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)" class="box-decl"/>
  
  <!-- Function Definition Box -->
  <g class="box-def" data-narration="Function Definition: The actual implementation with return type, name, parameters, and body">
    <rect x="170" y="50" width="150" height="70" rx="6" fill="url(#defGradient)" filter="url(#shadow)"/>
    <text x="245" y="68" text-anchor="middle" class="label">Definition</text>
    <text x="245" y="86" text-anchor="middle" class="code">int add(int x, int y) {</text>
    <text x="245" y="100" text-anchor="middle" class="code">return x + y;</text>
    <text x="245" y="112" text-anchor="middle" class="code">}</text>
  </g>
  
  <!-- Arrow to Function Call -->
  <path d="M320 85 L350 85" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)" class="box-def"/>
  
  <!-- Function Call Box -->
  <g class="box-call" data-narration="Function Call: Invoking the function with arguments to execute its code">
    <rect x="350" y="65" width="60" height="40" rx="6" fill="url(#callGradient)" filter="url(#shadow)"/>
    <text x="380" y="82" text-anchor="middle" class="label" font-size="12">Call</text>
    <text x="380" y="97" text-anchor="middle" class="code" font-size="10">add(2,3)</text>
  </g>
  
  <!-- Stack Visualization -->
  <g class="box-stack" data-narration="Call Stack: Functions stack like plates - each call pushes a new frame, returns pop it off">
    <rect x="20" y="140" width="180" height="150" rx="8" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="2"/>
    <text x="110" y="158" text-anchor="middle" class="label">Call Stack</text>
    
    <!-- Stack plates -->
    <g class="stack-plate-1">
      <ellipse cx="110" cy="250" rx="70" ry="12" fill="url(#plateGradient)" filter="url(#shadow)"/>
      <rect x="45" y="205" width="130" height="45" rx="4" fill="url(#plateGradient)"/>
      <text x="110" y="225" text-anchor="middle" class="label" fill="white" font-size="12">main()</text>
    </g>
    <g class="stack-plate-2">
      <ellipse cx="110" cy="220" rx="60" ry="10" fill="#9bcdf0" filter="url(#shadow)"/>
      <rect x="55" y="185" width="110" height="35" rx="3" fill="#9bcdf0"/>
      <text x="110" y="200" text-anchor="middle" class="label" fill="white" font-size="11">add(a,b)</text>
    </g>
    <g class="stack-plate-3">
      <ellipse cx="110" cy="195" rx="50" ry="8" fill="#6baed6" filter="url(#shadow)"/>
      <rect x="65" y="170" width="90" height="25" rx="2" fill="#6baed6"/>
      <text x="110" y="185" text-anchor="middle" class="label" fill="white" font-size="10">return</text>
    </g>
    
    <text x="110" y="278" text-anchor="middle" class="detail" font-size="10">Push ↓ Pop ↑</text>
  </g>
  
  <!-- Type Casting Section -->
  <g class="box-cast" data-narration="Type Casting: Convert between data types - Implicit (automatic) or Explicit (manual with cast operator)">
    <rect x="220" y="140" width="180" height="150" rx="8" fill="#f8f9fa" stroke="#e07a5f" stroke-width="2"/>
    <text x="310" y="158" text-anchor="middle" class="label" fill="#c0392b">Type Casting</text>
    
    <!-- Implicit -->
    <rect x="230" y="168" width="160" height="45" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
    <text x="310" y="183" text-anchor="middle" class="label" fill="#1e8449" font-size="11">Implicit</text>
    <text x="310" y="198" text-anchor="middle" class="code" font-size="10">int x = 5;</text>
    <text x="310" y="210" text-anchor="middle" class="code" font-size="10">double y = x; // auto</text>
    
    <!-- Explicit -->
    <rect x="230" y="220" width="160" height="60" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
    <text x="310" y="237" text-anchor="middle" class="label" fill="#c0392b" font-size="11">Explicit</text>
    <text x="310" y="252" text-anchor="middle" class="code" font-size="10">double a = 3.14;</text>
    <text x="310" y="265" text-anchor="middle" class="code" font-size="10">int b = (int)a; // cast</text>
    <text x="310" y="276" text-anchor="middle" class="code" font-size="10">int c = static_cast&lt;int&gt;(a);</text>
  </g>
  
  <!-- Bottom summary -->
  <g class="box-stack" data-narration="Key Takeaway: Functions organize code for reuse, while type casting enables conversion between different data types when needed">
    <rect x="20" y="305" width="380" height="80" rx="8" fill="white" stroke="#7eb8da" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="325" text-anchor="middle" class="label">Key Concepts Summary</text>
    <text x="210" y="345" text-anchor="middle" class="detail" font-size="11">• Functions: Declaration → Definition → Call</text>
    <text x="210" y="360" text-anchor="middle" class="detail" font-size="11">• Stack: LIFO - Last In, First Out memory management</text>
    <text x="210" y="375" text-anchor="middle" class="detail" font-size="11">• Type Casting: Implicit (compiler) or Explicit (programmer)</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d6d7e"/>
    </marker>
  </defs>
</svg>