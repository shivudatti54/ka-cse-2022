<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="command-line-arguments">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8ed"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f7fa"/>
    </linearGradient>
    <linearGradient id="argcGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="argvGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .main-box { animation: slideInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .argc-box { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .argv-box { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .example-box { animation: fadeIn 0.8s ease-out 0.6s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse { animation: pulse 3s ease-in-out infinite; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #37474f; }
    .detail { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; fill: #546e7a; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #263238; }
    .keyword { font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; fill: #880e4f; font-weight: bold; }
    .string { font-family: 'Consolas', 'Monaco', monospace; font-size: 11px; fill: #2e7d32; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title-text title">Command Line Arguments</text>
  <line x1="100" y1="45" x2="320" y2="45" stroke="#78909c" stroke-width="1" class="title"/>
  
  <!-- Main Function Box -->
  <g class="main-box" data-narration="The main function is the entry point. It receives argc and argv as parameters.">
    <rect x="110" y="60" width="200" height="50" rx="8" fill="url(#mainGradient)" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" class="label" style="font-weight:600;">main Function</text>
    <text x="210" y="98" text-anchor="middle" class="detail">int main(int argc, char* argv[])</text>
  </g>
  
  <!-- Arrow from main to argc -->
  <path d="M 150 110 L 130 145" stroke="#ff9800" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="125,145 132,140 132,150" fill="#ff9800"/>
  
  <!-- Arrow from main to argv -->
  <path d="M 270 110 L 290 145" stroke="#4caf50" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="295,145 288,140 288,150" fill="#4caf50"/>
  
  <!-- Argc Box -->
  <g class="argc-box" data-narration="argc contains the count of arguments including the program name.">
    <rect x="30" y="150" width="120" height="80" rx="8" fill="url(#argcGradient)" filter="url(#shadow)"/>
    <text x="90" y="175" text-anchor="middle" class="label" style="font-weight:600; font-size:16px;">argc</text>
    <text x="90" y="195" text-anchor="middle" class="detail">Argument Count</text>
    <text x="90" y="215" text-anchor="middle" class="detail" style="font-size:11px;">(integer)</text>
  </g>
  
  <!-- Argv Box -->
  <g class="argv-box" data-narration="argv is an array of strings containing all command line arguments.">
    <rect x="270" y="150" width="130" height="120" rx="8" fill="url(#argvGradient)" filter="url(#shadow)"/>
    <text x="335" y="175" text-anchor="middle" class="label" style="font-weight:600; font-size:16px;">argv</text>
    <text x="335" y="195" text-anchor="middle" class="detail">Argument Vector</text>
    <text x="335" y="210" text-anchor="middle" class="detail" style="font-size:11px;">(char* array)</text>
    <line x1="280" y1="220" x2="390" y2="220" stroke="#81c784" stroke-width="1"/>
    <text x="335" y="240" text-anchor="middle" class="string" style="font-size:10px;">argv[0] = "./program"</text>
    <text x="335" y="255" text-anchor="middle" class="string" style="font-size:10px;">argv[1] = "hello"</text>
    <text x="335" y="270" text-anchor="middle" class="string" style="font-size:10px;">argv[2] = "world"</text>
  </g>
  
  <!-- Center arrow showing relationship -->
  <g class="pulse">
    <path d="M 210 130 L 210 145" stroke="#5c6bc0" stroke-width="2" fill="none"/>
    <polygon points="205,145 210,152 215,145" fill="#5c6bc0"/>
  </g>
  
  <!-- Example Box -->
  <g class="example-box" data-narration="Example: Running './program hello world' passes 3 arguments.">
    <rect x="50" y="295" width="320" height="90" rx="8" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="210" y="320" text-anchor="middle" class="label" style="font-weight:600; font-size:15px;">Example Usage</text>
    <text x="210" y="342" text-anchor="middle" class="detail">Command: <tspan class="keyword">./program</tspan> <tspan class="string">hello</tspan> <tspan class="string">world</tspan></text>
    <line x1="70" y1="352" x2="350" y2="352" stroke="#b0bec5" stroke-width="1"/>
    <text x="90" y="370" class="detail">argc = 3</text>
    <text x="90" y="385" class="detail">argv[0]: "./program"</text>
    <text x="210" y="370" class="detail">argv[1]: "hello"</text>
    <text x="210" y="385" class="detail">argv[2]: "world"</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="20" cy="20" r="4" fill="#b0bec5" opacity="0.5"/>
  <circle cx="400" cy="20" r="4" fill="#b0bec5" opacity="0.5"/>
  <circle cx="20" cy="380" r="4" fill="#b0bec5" opacity="0.5"/>
  <circle cx="400" cy="380" r="4" fill="#b0bec5" opacity="0.5"/>
</svg>