<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="arrays-and-expressions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="arrayBoxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fed7aa"/>
      <stop offset="100%" style="stop-color:#fdba74"/>
    </linearGradient>
    <linearGradient id="exprGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbf7d0"/>
      <stop offset="100%" style="stop-color:#86efac"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-5 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .highlight { animation: blink 1s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-size: 22px; font-weight: bold; fill: #1e3a5f; }
    .label { font-size: 14px; fill: #334155; }
    .code { font-size: 12px; font-family: 'Consolas', monospace; fill: #1e293b; }
    .small-text { font-size: 11px; fill: #64748b; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text">Arrays And Expressions</text>
  <text x="210" y="50" text-anchor="middle" class="title small-text" fill="#64748b">Memory Layout &amp; Element Access in C++</text>
  
  <!-- Section 1: Array Declaration -->
  <g class="section-1" data-narration="Array declaration syntax showing data type, array name, and size">
    <rect x="10" y="65" width="195" height="55" rx="8" fill="url(#arrayBoxGradient)" filter="url(#shadow)"/>
    <text x="20" y="82" class="label" fill="#0c4a6e" font-weight="bold">Declaring Arrays</text>
    <text x="20" y="100" class="code">int scores[10];</text>
    <text x="20" y="113" class="small-text">data_type name[size]</text>
  </g>
  
  <!-- Section 2: Array Initialization -->
  <g class="section-2" data-narration="Array initialization with a list of values in curly braces">
    <rect x="215" y="65" width="195" height="55" rx="8" fill="url(#exprGradient)" filter="url(#shadow)"/>
    <text x="225" y="82" class="label" fill="#14532d" font-weight="bold">Initializing Arrays</text>
    <text x="225" y="100" class="code">int arr[5] = {10,20,30,40,50};</text>
    <text x="225" y="113" class="small-text">Values in {...} separated by commas</text>
  </g>
  
  <!-- Section 3: Memory Layout Diagram -->
  <g class="section-3" data-narration="Memory layout showing array elements stored in consecutive memory locations with indices 0-4">
    <rect x="10" y="130" width="400" height="130" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="150" text-anchor="middle" class="label" fill="#1e3a5f" font-weight="bold">Array Memory Layout</text>
    
    <!-- Memory location headers -->
    <text x="45" y="172" class="small-text" text-anchor="middle">Index</text>
    <text x="95" y="172" class="small-text" text-anchor="middle">0</text>
    <text x="145" y="172" class="small-text" text-anchor="middle">1</text>
    <text x="195" y="172" class="small-text" text-anchor="middle">2</text>
    <text x="245" y="172" class="small-text" text-anchor="middle">3</text>
    <text x="295" y="172" class="small-text" text-anchor="middle">4</text>
    
    <!-- Memory location boxes -->
    <rect x="30" y="180" width="60" height="40" rx="4" fill="url(#memoryGradient)" stroke="#ea580c" stroke-width="1.5" class="element"/>
    <text x="60" y="205" text-anchor="middle" class="code" fill="#7c2d12">10</text>
    
    <rect x="100" y="180" width="60" height="40" rx="4" fill="url(#memoryGradient)" stroke="#ea580c" stroke-width="1.5"/>
    <text x="130" y="205" text-anchor="middle" class="code" fill="#7c2d12">20</text>
    
    <rect x="170" y="180" width="60" height="40" rx="4" fill="url(#memoryGradient)" stroke="#ea580c" stroke-width="1.5"/>
    <text x="200" y="205" text-anchor="middle" class="code" fill="#7c2d12">30</text>
    
    <rect x="240" y="180" width="60" height="40" rx="4" fill="url(#memoryGradient)" stroke="#ea580c" stroke-width="1.5"/>
    <text x="270" y="205" text-anchor="middle" class="code" fill="#7c2d12">40</text>
    
    <rect x="310" y="180" width="60" height="40" rx="4" fill="url(#memoryGradient)" stroke="#ea580c" stroke-width="1.5" class="element"/>
    <text x="340" y="205" text-anchor="middle" class="code" fill="#7c2d12">50</text>
    
    <!-- Memory address indicators -->
    <text x="60" y="235" text-anchor="middle" class="small-text" fill="#94a3b8">0x0010</text>
    <text x="130" y="235" text-anchor="middle" class="small-text" fill="#94a3b8">0x0014</text>
    <text x="200" y="235" text-anchor="middle" class="small-text" fill="#94a3b8">0x0018</text>
    <text x="270" y="235" text-anchor="middle" class="small-text" fill="#94a3b8">0x001C</text>
    <text x="340" y="235" text-anchor="middle" class="small-text" fill="#94a3b8">0x0020</text>
  </g>
  
  <!-- Section 4: Element Access -->
  <g class="section-4" data-narration="Accessing array elements using index notation, showing how to read and write values">
    <rect x="10" y="270" width="195" height="60" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="2" filter="url(#shadow)"/>
    <text x="20" y="290" class="label" fill="#134e4a" font-weight="bold">Reading Elements</text>
    <text x="20" y="310" class="code">x = arr[2];  // x = 30</text>
    <text x="20" y="325" class="small-text">Use index to access element</text>
  </g>
  
  <!-- Section 5: Element Modification -->
  <g class="section-5" data-narration="Modifying array elements by assigning new values using the index">
    <rect x="215" y="270" width="195" height="60" rx="8" fill="#fdf4ff" stroke="#f0abfc" stroke-width="2" filter="url(#shadow)"/>
    <text x="225" y="290" class="label" fill="#86198f" font-weight="bold">Writing Elements</text>
    <text x="225" y="310" class="code">arr[0] = 99;  // Update value</text>
    <text x="225" y="325" class="small-text">Assign new value by index</text>
  </g>
  
  <!-- Arrow showing index relationship -->
  <g class="section-5">
    <path d="M 360 230 L 360 250 L 370 250 L 360 265 L 350 250 L 360 250" fill="#8b5cf6" opacity="0.7"/>
    <text x="375" y="255" class="small-text" fill="#7c3aed">+4 bytes</text>
    <text x="375" y="268" class="small-text" fill="#7c3aed">per int</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="section-5" data-narration="Key concept: Arrays use zero-based indexing in C++">
    <rect x="10" y="340" width="400" height="45" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
    <text x="20" y="358" class="label" fill="#92400e" font-weight="bold">⚡ Key Concept:</text>
    <text x="20" y="375" class="small-text" fill="#b45309">Arrays store elements in contiguous memory. Index starts at 0. Each int occupies 4 bytes.</text>
  </g>
</svg>