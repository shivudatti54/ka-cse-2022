<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="data-types-variables-operators">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5e6f3"/>
      <stop offset="100%" style="stop-color:#e6f3ff"/>
    </linearGradient>
    <linearGradient id="intGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff758c"/>
    </linearGradient>
    <linearGradient id="floatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#6bcf7f"/>
    </linearGradient>
    <linearGradient id="doubleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#5cb3ff"/>
    </linearGradient>
    <linearGradient id="charGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba"/>
      <stop offset="100%" style="stop-color:#ffe066"/>
    </linearGradient>
    <linearGradient id="boolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0bbff"/>
      <stop offset="100%" style="stop-color:#9d4edd"/>
    </linearGradient>
    <linearGradient id="varGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f1f4"/>
      <stop offset="100%" style="stop-color:#75e6da"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-title { animation: slideInLeft 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .type-box { animation: slideInUp 0.5s ease-out forwards; opacity: 0; }
    .type-box-1 { animation-delay: 0.3s; }
    .type-box-2 { animation-delay: 0.4s; }
    .type-box-3 { animation-delay: 0.5s; }
    .type-box-4 { animation-delay: 0.6s; }
    .type-box-5 { animation-delay: 0.7s; }
    .var-box { animation: slideInUp 0.5s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    .operator-box { animation: pulse 2s ease-in-out infinite; animation-delay: 1.2s; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1s; opacity: 0; }
    .desc { animation: fadeIn 0.4s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Data Types, Variables &amp; Operators</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="title">C++ Fundamentals</text>
  
  <!-- Data Types Section - Left Side -->
  <g data-narration="Data Types: Classification of data defining format, size, and possible values">
    <text x="25" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" class="section-title">DATA TYPES</text>
    
    <!-- int box -->
    <g class="type-box type-box-1" filter="url(#shadow)">
      <rect x="15" y="85" width="55" height="35" rx="5" fill="url(#intGrad)"/>
      <text x="42" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">int</text>
      <text x="42" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">whole numbers</text>
    </g>
    
    <!-- float box -->
    <g class="type-box type-box-2" filter="url(#shadow)">
      <rect x="80" y="85" width="55" height="35" rx="5" fill="url(#floatGrad)"/>
      <text x="107" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">float</text>
      <text x="107" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">decimal</text>
    </g>
    
    <!-- double box -->
    <g class="type-box type-box-3" filter="url(#shadow)">
      <rect x="145" y="85" width="55" height="35" rx="5" fill="url(#doubleGrad)"/>
      <text x="172" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">double</text>
      <text x="172" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">precise decimal</text>
    </g>
    
    <!-- char box -->
    <g class="type-box type-box-4" filter="url(#shadow)">
      <rect x="15" y="140" width="55" height="35" rx="5" fill="url(#charGrad)"/>
      <text x="42" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">char</text>
      <text x="42" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">single char</text>
    </g>
    
    <!-- bool box -->
    <g class="type-box type-box-5" filter="url(#shadow)">
      <rect x="80" y="140" width="55" height="35" rx="5" fill="url(#boolGrad)"/>
      <text x="107" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">bool</text>
      <text x="107" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">true/false</text>
    </g>
  </g>
  
  <!-- Variables Section - Middle -->
  <g data-narration="Variables: Named memory locations storing values with type, name, value, and scope">
    <text x="290" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" class="section-title">VARIABLE</text>
    
    <g class="var-box" filter="url(#shadow)">
      <rect x="250" y="85" width="130" height="80" rx="8" fill="url(#varGrad)" stroke="#2c3e50" stroke-width="1"/>
      <text x="315" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">int age = 25;</text>
      <line x1="260" y1="115" x2="370" y2="115" stroke="#2c3e50" stroke-width="0.5"/>
      <text x="265" y="132" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">name: age</text>
      <text x="265" y="147" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">type: int</text>
      <text x="335" y="132" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">value: 25</text>
      <text x="335" y="147" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">scope: local</text>
    </g>
    
    <!-- Arrow showing variable assignment -->
    <g class="arrow">
      <path d="M315 165 L315 180" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Memory representation -->
    <g class="var-box">
      <rect x="280" y="180" width="70" height="30" rx="4" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1"/>
      <text x="315" y="200" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="#2c3e50">0x0042: 25</text>
      <text x="315" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Memory Location</text>
    </g>
  </g>
  
  <!-- Operators Section - Bottom -->
  <g data-narration="Operators: Symbols that perform operations on variables and values">
    <text x="130" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" class="section-title">OPERATORS</text>
    
    <!-- Operator boxes -->
    <g class="operator-box" filter="url(#shadow)">
      <rect x="30" y="280" width="50" height="28" rx="4" fill="#ffb3ba"/>
      <text x="55" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">+ - * /</text>
    </g>
    
    <g class="operator-box" filter="url(#shadow)" style="animation-delay: 1.4s;">
      <rect x="90" y="280" width="50" height="28" rx="4" fill="#bae1ff"/>
      <text x="115" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">== !=</text>
    </g>
    
    <g class="operator-box" filter="url(#shadow)" style="animation-delay: 1.6s;">
      <rect x="150" y="280" width="50" height="28" rx="4" fill="#baffc9"/>
      <text x="175" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">&amp;&amp; ||</text>
    </g>
    
    <g class="operator-box" filter="url(#shadow)" style="animation-delay: 1.8s;">
      <rect x="210" y="280" width="50" height="28" rx="4" fill="#ffffba"/>
      <text x="235" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">= ++ --</text>
    </g>
    
    <!-- Labels -->
    <text x="55" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Arithmetic</text>
    <text x="115" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Comparison</text>
    <text x="175" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Logical</text>
    <text x="235" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Assignment</text>
  </g>
  
  <!-- Code Example - Bottom Right -->
  <g data-narration="Example: Declaring and using variables with operators in C++">
    <rect x="270" y="265" width="130" height="60" rx="6" fill="#2c3e50"/>
    <text x="280" y="285" font-family="Courier, monospace" font-size="10" fill="#98d8c8">int x = 10;</text>
    <text x="280" y="300" font-family="Courier, monospace" font-size="10" fill="#98d8c8">int y = 20;</text>
    <text x="280" y="315" font-family="Courier, monospace" font-size="10" fill="#f7dc6f">int z = x + y;</text>
    <text x="280" y="330" font-family="Courier, monospace" font-size="10" fill="#f8a5c2">// z = 30</text>
  </g>
  
  <!-- Connection arrows -->
  <g class="arrow">
    <path d="M200 90 L250 110" stroke="#9b59b6" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <polygon points="248,108 250,115 243,113" fill="#9b59b6"/>
  </g>
  
  <g class="arrow" style="animation-delay: 1.2s;">
    <path d="M200 130 L250 150" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <polygon points="248,148 250,155 243,153" fill="#e74c3c"/>
  </g>
  
  <!-- Legend/Key concepts -->
  <g data-narration="Key: C++ is statically-typed meaning variable types are known at compile time">
    <rect x="15" y="350" width="390" height="35" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="25" y="368" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">✓ C++ is statically-typed: types known at compile time</text>
    <text x="25" y="380" font-family="Arial, sans-serif" font-size="10" fill="#666">✓ Variables store data in memory locations with unique addresses</text>
  </g>
  
  <!-- Marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>
</svg>