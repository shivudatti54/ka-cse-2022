<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="decision-making-iteration">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="decisionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347"/>
      <stop offset="100%" style="stop-color:#ffcc33"/>
    </linearGradient>
    <linearGradient id="trueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#77dd77"/>
      <stop offset="100%" style="stop-color:#98fb98"/>
    </linearGradient>
    <linearGradient id="falseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6961"/>
      <stop offset="100%" style="stop-color:#ffb3ba"/>
    </linearGradient>
    <linearGradient id="loopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89cff0"/>
      <stop offset="100%" style="stop-color:#b0e0e6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .decision-diamond { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { animation: arrowPulse 1.5s ease-in-out infinite; }
    .code-box { animation: fadeIn 0.5s ease-out 0.8s both; }
    .loop-box { animation: fadeIn 0.5s ease-out 1s both; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4a5568" class="title">Decision Making &amp; Iteration</text>
  
  <!-- Section 1: If-Else Flowchart -->
  <g class="section-1" data-narration="The if-else statement checks a condition. If true, executes the if-block; otherwise, executes the else-block.">
    <text x="30" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a5568">If-Else Flowchart</text>
    
    <!-- Decision Diamond -->
    <polygon points="90,95 130,120 90,145 50,120" fill="url(#decisionGradient)" filter="url(#shadow)" class="decision-diamond"/>
    <text x="90" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">condition?</text>
    
    <!-- True Arrow and Block -->
    <path d="M90 95 L90 70 L160 70 L160 90" fill="none" stroke="#2e7d32" stroke-width="2" class="arrow-line"/>
    <text x="75" y="82" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" font-weight="bold">True</text>
    <rect x="130" y="55" width="60" height="30" rx="5" fill="url(#trueGradient)" filter="url(#shadow)"/>
    <text x="160" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1b5e20" font-weight="bold">if block</text>
    
    <!-- False Arrow and Block -->
    <path d="M130 120 L160 120 L160 145" fill="none" stroke="#c62828" stroke-width="2" class="arrow-line"/>
    <text x="145" y="135" font-family="Arial, sans-serif" font-size="10" fill="#c62828" font-weight="bold">False</text>
    <rect x="130" y="150" width="60" height="30" rx="5" fill="url(#falseGradient)" filter="url(#shadow)"/>
    <text x="160" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b71c1c" font-weight="bold">else block</text>
    
    <!-- Merge Arrow -->
    <path d="M160 185 L190 185 L190 210" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,2" class="arrow-line"/>
    <text x="175" y="203" font-family="Arial, sans-serif" font-size="9" fill="#666">merge</text>
  </g>
  
  <!-- Section 2: Switch Statement -->
  <g class="section-2" data-narration="Switch statements evaluate a variable against multiple case values and execute matching code blocks.">
    <text x="280" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a5568">Switch Statement</text>
    <rect x="250" y="75" width="150" height="85" rx="8" fill="#fff" stroke="#9c27b0" stroke-width="2" filter="url(#shadow)" class="code-box"/>
    <text x="260" y="95" font-family="Courier New, monospace" font-size="10" fill="#333">
      <tspan x="260" dy="0">switch(var) {</tspan>
      <tspan x="270" dy="14">case 1:</tspan>
      <tspan x="280" dy="12">break;</tspan>
      <tspan x="270" dy="14">case 2:</tspan>
      <tspan x="280" dy="12">break;</tspan>
      <tspan x="270" dy="14">default:</tspan>
    </text>
    <circle cx="325" cy="145" r="8" fill="#9c27b0"/>
    <text cx="325" cy="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Execute matching case</text>
  </g>
  
  <!-- Section 3: Iteration Loops -->
  <g class="section-3" data-narration="Iteration loops (for, while, do-while) repeat code blocks until conditions are met.">
    <text x="30" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a5568">Iteration Loops</text>
    
    <!-- For Loop Box -->
    <rect x="25" y="240" width="110" height="50" rx="6" fill="url(#loopGradient)" filter="url(#shadow)" class="loop-box"/>
    <text x="80" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0277bd">for loop</text>
    <text x="80" y="275" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#01579b">for(int i=0; i&lt;n; i++)</text>
    
    <!-- While Loop Box -->
    <rect x="145" y="240" width="110" height="50" rx="6" fill="url(#loopGradient)" filter="url(#shadow)" class="loop-box"/>
    <text x="200" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0277bd">while loop</text>
    <text x="200" y="275" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#01579b">while(condition)</text>
    
    <!-- Do-While Loop Box -->
    <rect x="85" y="300" width="120" height="50" rx="6" fill="url(#loopGradient)" filter="url(#shadow)" class="loop-box"/>
    <text x="145" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0277bd">do-while loop</text>
    <text x="145" y="335" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#01579b">do { } while(cond);</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key takeaway: Decision making controls program flow based on conditions; iteration repeats code execution.">
    <rect x="265" y="220" width="135" height="130" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="2" filter="url(#shadow)"/>
    <text x="332" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f57f17">Key Concepts</text>
    <text x="275" y="260" font-family="Arial, sans-serif" font-size="10" fill="#333">
      <tspan x="275" dy="0">• if-else: binary choice</tspan>
      <tspan x="275" dy="14">• switch: multi-way</tspan>
      <tspan x="275" dy="14">• for: known iterations</tspan>
      <tspan x="275" dy="14">• while: condition-first</tspan>
      <tspan x="275" dy="14">• do-while: execute-first</tspan>
      <tspan x="275" dy="14">• break/continue: control</tspan>
    </text>
  </g>
  
  <!-- Flow Indicator Animation -->
  <g data-narration="The program flow moves from decision to action, creating dynamic behavior.">
    <circle cx="90" cy="120" r="5" fill="#ff5722">
      <animate attributeName="cy" values="95;120;120;95" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="210" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78909c" font-style="italic">C++ Control Flow Fundamentals</text>
  </g>
</svg>