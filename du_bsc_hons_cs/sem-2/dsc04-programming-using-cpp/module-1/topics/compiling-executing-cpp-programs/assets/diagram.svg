<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="compiling-executing-cpp-programs">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccffcc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd9cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9ccff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .box5 { animation: slideIn 0.6s ease-out 1s both; }
    .arrow { animation: fadeIn 0.5s ease-out 1.2s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .bounce { animation: bounce 1.5s ease-in-out infinite; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .section-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #444; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title">C++ Compilation Process</text>
  
  <!-- Stage 1: Source Code -->
  <g class="box1" data-narration="The process begins with C++ source code files (.cpp) containing the programmer's code with includes, macros, and declarations">
    <rect x="20" y="50" width="70" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="55" y="72" text-anchor="middle" class="label">Source</text>
    <text x="55" y="88" text-anchor="middle" class="label">Code</text>
    <text x="55" y="100" text-anchor="middle" class="detail">.cpp</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="90" y1="77" x2="110" y2="77" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Stage 2: Preprocessing -->
  <g class="box2" data-narration="Preprocessing: The preprocessor expands macros, includes header files, and removes comments before compilation">
    <rect x="115" y="50" width="75" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="152" y="72" text-anchor="middle" class="label">Pre-</text>
    <text x="152" y="88" text-anchor="middle" class="label">processor</text>
    <text x="152" y="100" text-anchor="middle" class="detail">Macros</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="190" y1="77" x2="210" y2="77" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Stage 3: Compilation -->
  <g class="box3" data-narration="Compilation: The compiler translates preprocessed code into assembly code, checking for syntax and semantic errors">
    <rect x="215" y="50" width="75" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="252" y="72" text-anchor="middle" class="label">Compiler</text>
    <text x="252" y="88" text-anchor="middle" class="label"></text>
    <text x="252" y="100" text-anchor="middle" class="detail">Assembly</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="290" y1="77" x2="310" y2="77" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Stage 4: Assembly -->
  <g class="box4" data-narration="Assembly: The assembler converts assembly code into machine code (object files .o or .obj)">
    <rect x="315" y="50" width="75" height="55" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="352" y="72" text-anchor="middle" class="label">Assembler</text>
    <text x="352" y="88" text-anchor="middle" class="label"></text>
    <text x="352" y="100" text-anchor="middle" class="detail">.o file</text>
  </g>
  
  <!-- Stage 5: Linking -->
  <g class="box5" data-narration="Linking: The linker combines object files and resolves external references to create an executable">
    <rect x="145" y="150" width="130" height="50" rx="8" fill="url(#boxGradient5)" filter="url(#shadow)" class="pulse"/>
    <text x="210" y="172" text-anchor="middle" class="label">Linker</text>
    <text x="210" y="190" text-anchor="middle" class="detail">Combines .o files + libraries</text>
  </g>
  
  <!-- Vertical arrow from Assembly to Linker -->
  <path d="M352 105 L352 120 L352 130 L210 130 L210 150" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Stage 6: Executable -->
  <g class="box1" data-narration="Loading: The OS loader loads the executable into memory and runs the program">
    <rect x="145" y="240" width="130" height="50" rx="8" fill="#4a90a4" filter="url(#shadow)" class="bounce"/>
    <text x="210" y="262" text-anchor="middle" class="label" fill="white">Executable</text>
    <text x="210" y="280" text-anchor="middle" class="detail" fill="#e0e0e0">Ready to Run</text>
  </g>
  
  <!-- Arrow from Linker to Executable -->
  <line x1="210" y1="200" x2="210" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Key Concepts Box -->
  <g class="box2">
    <rect x="20" y="310" width="380" height="80" rx="8" fill="white" filter="url(#shadow)" opacity="0.9"/>
    <text x="35" y="330" class="section-label">Key Concepts:</text>
    <text x="35" y="348" class="detail">• Preprocessing: Macro expansion, header inclusion</text>
    <text x="35" y="363" class="detail">• Compilation: Syntax checking, generates assembly</text>
    <text x="35" y="378" class="detail">• Assembly: Converts to machine code (.obj)</text>
    <text x="210" y="378" class="detail">• Linking: Creates final executable</text>
  </g>
</svg>