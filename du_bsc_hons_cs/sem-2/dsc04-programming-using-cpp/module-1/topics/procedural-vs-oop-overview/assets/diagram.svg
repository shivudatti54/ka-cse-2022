<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="procedural-vs-oop-overview">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="proceduralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce6cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccccff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-box { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .section-box-oop { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 50; animation: drawLine 1s ease-out forwards; }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .float-element { animation: float 3s ease-in-out infinite; }
    .stagger-1 { animation-delay: 0.2s; }
    .stagger-2 { animation-delay: 0.4s; }
    .stagger-3 { animation-delay: 0.6s; }
    .stagger-4 { animation-delay: 0.8s; }
    .stagger-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c4a6e" class="title">Procedural vs OOP</text>
  <text x="210" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a7a9a">Overview</text>
  
  <!-- Procedural Section -->
  <g class="section-box stagger-1">
    <rect x="15" y="70" width="180" height="145" rx="8" fill="url(#proceduralGradient)" filter="url(#shadow)"/>
    <rect x="15" y="70" width="180" height="22" rx="8" fill="#e6b366" opacity="0.4"/>
    <text x="105" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b5a00">Procedural</text>
    
    <!-- Function Icons -->
    <g transform="translate(30, 100)">
      <rect x="0" y="0" width="30" height="20" rx="3" fill="#d4a574" stroke="#8b5a00" stroke-width="1"/>
      <text x="15" y="14" text-anchor="middle" font-family="Arial" font-size="8" fill="#5a3a00">fn()</text>
    </g>
    <g transform="translate(70, 100)">
      <rect x="0" y="0" width="30" height="20" rx="3" fill="#d4a574" stroke="#8b5a00" stroke-width="1"/>
      <text x="15" y="14" text-anchor="middle" font-family="Arial" font-size="8" fill="#5a3a00">fn()</text>
    </g>
    <g transform="translate(110, 100)">
      <rect x="0" y="0" width="30" height="20" rx="3" fill="#d4a574" stroke="#8b5a00" stroke-width="1"/>
      <text x="15" y="14" text-anchor="middle" font-family="Arial" font-size="8" fill="#5a3a00">fn()</text>
    </g>
    
    <!-- Arrows showing data flow -->
    <g class="float-element">
      <line x1="45" y1="130" x2="85" y2="130" stroke="#8b5a00" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <line x1="85" y1="130" x2="125" y2="130" stroke="#8b5a00" stroke-width="1.5"/>
    </g>
    
    <text x="105" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#6b4f00">Data passes through</text>
    <text x="105" y="168" text-anchor="middle" font-family="Arial" font-size="10" fill="#6b4f00">parameters</text>
    
    <!-- Concept Box 1 -->
    <g class="concept-box stagger-3">
      <rect x="25" y="180" width="160" height="25" rx="4" fill="#fff" stroke="#d4a574" stroke-width="1"/>
      <text x="105" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a3a00" data-narration="Procedural focuses on functions and procedures that operate on data">Focus: Functions</text>
    </g>
  </g>
  
  <!-- OOP Section -->
  <g class="section-box-oop stagger-2">
    <rect x="225" y="70" width="180" height="145" rx="8" fill="url(#oopGradient)" filter="url(#shadow)"/>
    <rect x="225" y="70" width="180" height="22" rx="8" fill="#66b366" opacity="0.4"/>
    <text x="315" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#006600">Object-Oriented</text>
    
    <!-- Class/Object Icons -->
    <g transform="translate(240, 100)">
      <rect x="0" y="0" width="50" height="35" rx="4" fill="#a6d6a6" stroke="#2e7d32" stroke-width="1.5"/>
      <text x="25" y="12" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Class</text>
      <text x="25" y="24" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">+ data</text>
    </g>
    <g transform="translate(300, 100)" class="pulse-element">
      <rect x="0" y="0" width="50" height="35" rx="4" fill="#81c784" stroke="#2e7d32" stroke-width="1.5"/>
      <text x="25" y="12" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Object</text>
      <text x="25" y="24" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">instance</text>
    </g>
    
    <!-- Encapsulation indicator -->
    <g class="float-element">
      <circle cx="295" cy="150" r="12" fill="none" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="295" y="153" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">capsule</text>
    </g>
    
    <!-- Concept Box 2 -->
    <g class="concept-box stagger-4">
      <rect x="235" y="180" width="160" height="25" rx="4" fill="#fff" stroke="#81c784" stroke-width="1"/>
      <text x="315" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20" data-narration="OOP encapsulates data and methods together in objects">Focus: Objects</text>
    </g>
  </g>
  
  <!-- Class-Object Relationship Diagram -->
  <g class="concept-box stagger-3">
    <text x="210" y="235" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3d5a80">Class to Object Relationship</text>
    
    <!-- Class Box -->
    <g transform="translate(150, 250)">
      <rect x="0" y="0" width="120" height="45" rx="5" fill="url(#classGradient)" stroke="#5b5bb5" stroke-width="1.5"/>
      <text x="60" y="15" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#3d3d8c">CLASS: Animal</text>
      <line x1="10" y1="22" x2="110" y2="22" stroke="#5b5bb5" stroke-width="0.5"/>
      <text x="60" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a4a8c">+ name: string</text>
      <text x="60" y="41" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a4a8c">+ speak(): void</text>
    </g>
    
    <!-- Arrow -->
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#5b5bb5"/>
      </marker>
    </defs>
    <line x1="270" y1="272" x2="310" y2="272" stroke="#5b5bb5" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="290" y="265" text-anchor="middle" font-family="Arial" font-size="8" fill="#5b5bb5">instantiate</text>
    
    <!-- Object Box -->
    <g transform="translate(320, 250)" class="pulse-element">
      <rect x="0" y="0" width="70" height="45" rx="5" fill="#b3b3e6" stroke="#5b5bb5" stroke-width="1.5"/>
      <text x="35" y="15" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#3d3d8c">Object</text>
      <line x1="10" y1="22" x2="60" y2="22" stroke="#5b5bb5" stroke-width="0.5"/>
      <text x="35" y="33" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a4a8c">name = "Dog"</text>
      <text x="35" y="41" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a4a8c">speak() → "Woof"</text>
    </g>
  </g>
  
  <!-- Inheritance Section -->
  <g class="concept-box stagger-5">
    <text x="210" y="315" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3d5a80">Inheritance</text>
    
    <!-- Parent Class -->
    <g transform="translate(140, 325)">
      <rect x="0" y="0" width="70" height="30" rx="4" fill="#e6b3e6" stroke="#8b4d8b" stroke-width="1"/>
      <text x="35" y="18" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6b2d6b">Parent</text>
    </g>
    
    <!-- Inheritance Arrow -->
    <line x1="175" y1="355" x2="175" y2="380" stroke="#8b4d8b" stroke-width="1.5" marker-end="url(#arrowheadInh)"/>
    <defs>
      <marker id="arrowheadInh" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#8b4d8b"/>
      </marker>
    </defs>
    <text x="195" y="372" font-family="Arial" font-size="7" fill="#8b4d8b">inherits</text>
    
    <!-- Child Classes -->
    <g transform="translate(115, 385)">
      <rect x="0" y="0" width="50" height="25" rx="4" fill="#d4a6d4" stroke="#8b4d8b" stroke-width="1"/>
      <text x="25" y="15" text-anchor="middle" font-family="Arial" font-size="7" fill="#6b2d6b">Child 1</text>
    </g>
    <g transform="translate(175, 385)">
      <rect x="0" y="0" width="50" height="25" rx="4" fill="#d4a6d4" stroke="#8b4d8b" stroke-width="1"/>
      <text x="25" y="15" text-anchor="middle" font-family="Arial" font-size="7" fill="#6b2d6b">Child 2</text>
    </g>
    <g transform="translate(235, 385)">
      <rect x="0" y="0" width="50" height="25" rx="4" fill="#d4a6d4" stroke="#8b4d8b" stroke-width="1"/>
      <text x="25" y="15" text-anchor="middle" font-family="Arial" font-size="7" fill="#6b2d6b">Child 3</text>
    </g>
  </g>
  
  <!-- Legend / Key -->
  <g class="concept-box stagger-5">
    <rect x="10" y="360" width="100" height="30" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
    <circle cx="25" cy="375" r="5" fill="#d4a574" stroke="#8b5a00"/>
    <text x="38" y="378" font-family="Arial" font-size="8" fill="#333">Procedural</text>
    
    <rect x="115" y="365" width="100" height="30" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
    <rect x="125" y="372" width="10" height="8" fill="#81c784" stroke="#2e7d32"/>
    <text x="140" y="378" font-family="Arial" font-size="8" fill="#333">Object-Oriented</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="3" fill="#ccc" opacity="0.5"/>
  <circle cx="390" cy="380" r="3" fill="#ccc" opacity="0.5"/>
  <circle cx="30" cy="20" r="3" fill="#ccc" opacity="0.5"/>
  <circle cx="390" cy="20" r="3" fill="#ccc" opacity="0.5"/>
</svg>