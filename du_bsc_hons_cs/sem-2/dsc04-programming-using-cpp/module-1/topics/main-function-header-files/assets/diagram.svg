<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="main-function-header-files">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fbcd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5c7c8a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box-header { animation: slideInLeft 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .box-source { animation: slideInRight 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .box-main { animation: slideInUp 0.6s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    .concept { animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; animation-delay: 1s; }
    .float { animation: float 3s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Main Function &amp; Header Files</text>
  <text x="210" y="48" text-anchor="middle" font-size="11" fill="#5c7c8a" class="title">C++ Program Structure</text>
  
  <!-- Header File Box -->
  <g class="box-header" data-narration="Header files (.h) contain declarations - function prototypes, class definitions, and constants that tell the compiler what exists in the code.">
    <rect x="240" y="70" width="150" height="90" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
    <text x="315" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Header File</text>
    <text x="315" y="108" text-anchor="middle" font-size="12" fill="#1a5276">myheader.h</text>
    <rect x="250" y="118" width="130" height="32" rx="4" fill="#fff" fill-opacity="0.5"/>
    <text x="315" y="132" text-anchor="middle" font-size="10" fill="#2c3e50">int add(int a, int b);</text>
    <text x="315" y="146" text-anchor="middle" font-size="10" fill="#2c3e50">// declaration</text>
  </g>
  
  <!-- Source File Box -->
  <g class="box-source" data-narration="Source files (.cpp) contain definitions - the actual implementation of functions declared in headers. They #include header files to access declarations.">
    <rect x="240" y="230" width="150" height="90" rx="8" fill="url(#sourceGrad)" filter="url(#shadow)"/>
    <text x="315" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Source File</text>
    <text x="315" y="268" text-anchor="middle" font-size="12" fill="#1b5e20">main.cpp</text>
    <rect x="250" y="278" width="130" height="32" rx="4" fill="#fff" fill-opacity="0.5"/>
    <text x="315" y="292" text-anchor="middle" font-size="10" fill="#2c3e50">int add(int a, int b) {</text>
    <text x="315" y="306" text-anchor="middle" font-size="10" fill="#2c3e50">  return a + b; }</text>
  </g>
  
  <!-- Main Function Box -->
  <g class="box-main" data-narration="The main() function is the entry point of every C++ program. It returns an int and may accept argc/argv parameters for command-line arguments.">
    <rect x="30" y="140" width="180" height="130" rx="8" fill="url(#mainGrad)" filter="url(#shadow)"/>
    <text x="120" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">main() Function</text>
    <text x="120" y="185" text-anchor="middle" font-size="12" fill="#e65100">Entry Point</text>
    <rect x="40" y="195" width="160" height="65" rx="4" fill="#fff" fill-opacity="0.6"/>
    <text x="120" y="215" text-anchor="middle" font-size="10" fill="#2c3e50">int main(int argc, char* argv[])</text>
    <text x="120" y="230" text-anchor="middle" font-size="10" fill="#2c3e50">{</text>
    <text x="120" y="245" text-anchor="middle" font-size="10" fill="#2c3e50">  // program code</text>
    <text x="120" y="258" text-anchor="middle" font-size="10" fill="#2c3e50">  return 0;</text>
    <text x="120" y="270" text-anchor="middle" font-size="10" fill="#2c3e50">}</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow">
    <path d="M180 180 L235 100" stroke="#5c7c8a" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="195" y="145" font-size="9" fill="#5c7c8a">#include</text>
    
    <path d="M210 270 L235 260" stroke="#5c7c8a" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="215" y="280" font-size="9" fill="#5c7c8a">#include</text>
    
    <path d="M300 160 L300 225" stroke="#5c7c8a" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="305" y="198" font-size="9" fill="#5c7c8a">uses</text>
  </g>
  
  <!-- Key Concepts -->
  <g class="concept" data-narration="Key concepts: Declarations tell the compiler what exists, definitions provide actual code, and #include brings headers into source files.">
    <rect x="15" y="320" width="390" height="70" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="25" y="342" font-size="12" font-weight="bold" fill="#2c3e50">Key Concepts:</text>
    <text x="25" y="360" font-size="10" fill="#5c7c8a">• <tspan font-weight="bold">Declaration:</tspan> Tells compiler what exists (function prototype)</text>
    <text x="25" y="375" font-size="10" fill="#5c7c8a">• <tspan font-weight="bold">Definition:</tspan> Actual implementation code</text>
    <text x="210" y="360" font-size="10" fill="#5c7c8a">• <tspan font-weight="bold">#include:</tspan> Brings header into source</text>
    <text x="210" y="375" font-size="10" fill="#5c7c8a">• <tspan font-weight="bold">main():</tspan> Program entry point</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="4" fill="#5c7c8a" class="pulse"/>
  <circle cx="390" cy="115" r="3" fill="#8fbcd4" class="float"/>
  <circle cx="390" cy="275" r="3" fill="#a5d6a7" class="float" style="animation-delay: 1.5s;"/>
</svg>