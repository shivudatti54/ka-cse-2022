<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="try-catch-throw-exceptions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8f7c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8e6a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="throwGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcfcf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaaaa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="catchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
    .code { font-family: 'Consolas', 'Monaco', monospace; font-size: 11px; fill: #444; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-try { animation: slideInLeft 0.6s ease-out forwards; }
    .section-throw { animation: fadeIn 0.5s ease-out 0.3s forwards; opacity: 0; }
    .section-catch { animation: slideInRight 0.6s ease-out 0.2s forwards; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .flow-arrow { animation: drawLine 1s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .keyword { font-weight: bold; }
    .try-keyword { fill: #2e7d32; }
    .throw-keyword { fill: #c62828; }
    .catch-keyword { fill: #1565c0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Exception Handling in C++</text>
  <text x="210" y="50" text-anchor="middle" class="detail title-anim" style="animation-delay: 0.2s">try - throw - catch</text>
  
  <!-- Try Block Section -->
  <g class="section-try" data-narration="The try block contains code that might throw an exception">
    <rect x="20" y="80" width="110" height="130" rx="8" fill="url(#tryGradient)" filter="url(#shadow)"/>
    <text x="75" y="100" text-anchor="middle" class="label">TRY BLOCK</text>
    <rect x="30" y="115" width="90" height="85" rx="4" fill="white" stroke="#a8e6a8" stroke-width="1"/>
    <text x="75" y="130" text-anchor="middle" class="code"><tspan class="keyword try-keyword">try</tspan> {</text>
    <text x="40" y="148" class="code">// Risky code</text>
    <text x="40" y="162" class="code">int x = 10/zero;</text>
    <text x="40" y="176" class="code">// File open</text>
    <text x="75" y="194" text-anchor="middle" class="code">}</text>
  </g>
  
  <!-- Arrow 1: Try to Throw -->
  <line x1="130" y1="145" x2="165" y2="145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
  
  <!-- Throw Section -->
  <g class="section-throw" data-narration="throw keyword signals an exception when an error occurs">
    <polygon points="195,115 220,145 195,175 170,145" fill="url(#throwGradient)" filter="url(#shadow)" class="pulse-element"/>
    <text x="195" y="150" text-anchor="middle" class="label">THROW</text>
    <text x="195" y="190" text-anchor="middle" class="detail">throws exception</text>
    <text x="195" y="205" text-anchor="middle" class="detail">object</text>
    
    <!-- throw code -->
    <rect x="165" y="215" width="60" height="30" rx="4" fill="white" stroke="#ffaaaa" stroke-width="1"/>
    <text x="195" y="232" text-anchor="middle" class="code"><tspan class="keyword throw-keyword">throw</tspan> value;</text>
  </g>
  
  <!-- Arrow 2: Throw to Catch -->
  <line x1="220" y1="145" x2="255" y2="145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow" style="animation-delay: 0.5s"/>
  
  <!-- Catch Block Section -->
  <g class="section-catch" data-narration="The catch block handles the exception and recovers from error">
    <rect x="260" y="80" width="120" height="130" rx="8" fill="url(#catchGradient)" filter="url(#shadow)"/>
    <text x="320" y="100" text-anchor="middle" class="label">CATCH BLOCK</text>
    <rect x="270" y="115" width="100" height="85" rx="4" fill="white" stroke="#a8d4ff" stroke-width="1"/>
    <text x="320" y="132" text-anchor="middle" class="code"><tspan class="keyword catch-keyword">catch</tspan>(type e) {</text>
    <text x="280" y="150" class="code">// Handle error</text>
    <text x="280" y="164" class="code">cout &lt;&lt; e.what();</text>
    <text x="280" y="178" class="code">// Recover</text>
    <text x="320" y="194" text-anchor="middle" class="code">}</text>
  </g>
  
  <!-- Stack Unwinding Visual -->
  <g class="section-throw" data-narration="Stack unwinding moves up the call stack to find appropriate catch block">
    <text x="210" y="265" text-anchor="middle" class="label" fill="#5d4c85">Stack Unwinding</text>
    <rect x="100" y="275" width="220" height="35" rx="4" fill="none" stroke="#9b8cc7" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="210" y="292" text-anchor="middle" class="detail">Control searches for matching catch</text>
    <text x="210" y="306" text-anchor="middle" class="detail">through call stack</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-throw" data-narration="Key concepts: try identifies risky code, throw creates exception, catch handles it">
    <rect x="30" y="330" width="360" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="45" y="350" class="label" fill="#333">try:</text>
    <text x="75" y="350" class="detail">Identifies exception-prone code</text>
    <text x="45" y="368" class="label" fill="#333">throw:</text>
    <text x="90" y="368" class="detail">Signals error condition</text>
    <text x="175" y="350" class="label" fill="#333">catch:</text>
    <text x="215" y="350" class="detail">Handles the exception</text>
    <text x="175" y="368" class="detail">Recovers gracefully</text>
  </g>
  
  <!-- Flow indicator arrows -->
  <g class="title-anim" style="animation-delay: 0.8s">
    <path d="M75 75 Q75 60 120 60 Q165 60 165 75" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
    <text x="120" y="55" text-anchor="middle" class="detail">Normal flow</text>
  </g>
</svg>