<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="file-io-basics-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6fa"/>
      <stop offset="100%" style="stop-color:#e6f4ea"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a8a"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#6c3483"/>
    </linearGradient>
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#95a5a6"/>
      <stop offset="100%" style="stop-color:#7f8c8d"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box5 { animation: slideInLeft 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box6 { animation: slideInRight 0.6s ease-out 0.8s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    .label { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">File I/O Basics in C++</text>
  
  <!-- Base Class Section -->
  <g data-narration="Base classes: ios is the fundamental base class providing common functionality for all stream types">
    <rect x="155" y="55" width="110" height="28" rx="4" fill="url(#baseGradient)" class="box1"/>
    <text x="210" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ios (base)</text>
  </g>
  
  <!-- Arrows from ios -->
  <g class="arrow">
    <path d="M175 83 L175 105 L130 105 L130 130" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <path d="M245 83 L245 105 L290 105 L290 130" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <polygon points="175,140 130,130 180,130" fill="#7f8c8d"/>
    <polygon points="245,140 290,130 240,130" fill="#7f8c8d"/>
  </g>
  
  <!-- istream and ostream -->
  <g data-narration="istream provides input operations, ostream provides output operations">
    <rect x="55" y="140" width="100" height="28" rx="4" fill="url(#boxGradient1)" class="box2"/>
    <text x="105" y="159" text-anchor="middle" font-size="14" font-weight="bold" fill="white">istream</text>
    
    <rect x="265" y="140" width="100" height="28" rx="4" fill="url(#boxGradient2)" class="box3"/>
    <text x="315" y="159" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ostream</text>
  </g>
  
  <!-- Arrows from istream/ostream -->
  <g class="arrow">
    <path d="M105 168 L105 190 L155 190 L155 210" stroke="#4a90d9" stroke-width="2" fill="none"/>
    <path d="M315 168 L315 190 L265 190 L265 210" stroke="#5cb85c" stroke-width="2" fill="none"/>
    <polygon points="155,215 155,210 205,210" fill="#4a90d9"/>
    <polygon points="265,215 265,210 215,210" fill="#5cb85c"/>
  </g>
  
  <!-- File Stream Classes -->
  <g data-narration="ifstream: Input file stream for reading from files">
    <rect x="60" y="220" width="110" height="35" rx="4" fill="url(#boxGradient1)" class="box4"/>
    <text x="115" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ifstream</text>
    <text x="115" y="255" text-anchor="middle" font-size="10" fill="white">Read from file</text>
  </g>
  
  <g data-narration="ofstream: Output file stream for writing to files">
    <rect x="250" y="220" width="110" height="35" rx="4" fill="url(#boxGradient2)" class="box5"/>
    <text x="305" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ofstream</text>
    <text x="305" y="255" text-anchor="middle" font-size="10" fill="white">Write to file</text>
  </g>
  
  <!-- fstream in middle -->
  <g data-narration="fstream: Full file stream for both reading and writing">
    <rect x="155" y="270" width="110" height="35" rx="4" fill="url(#boxGradient3)" class="box6 pulse-anim"/>
    <text x="210" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="white">fstream</text>
    <text x="210" y="305" text-anchor="middle" font-size="10" fill="white">Read &amp; Write</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key concepts: Include fstream header, open file with open(), use >> for reading, << for writing, close() when done">
    <rect x="20" y="320" width="380" height="70" rx="6" fill="white" stroke="#bdc3c7" stroke-width="2" class="label"/>
    <text x="210" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Key Operations</text>
    <text x="35" y="358" font-size="11" fill="#34495e">• Include: #include &lt;fstream&gt;</text>
    <text x="35" y="374" font-size="11" fill="#34495e">• Open: file.open("data.txt")</text>
    <text x="210" y="358" font-size="11" fill="#34495e">• Read: infile >> var</text>
    <text x="210" y="374" font-size="11" fill="#34495e">• Write: outfile &lt;&lt; data</text>
    <text x="340" y="366" font-size="11" fill="#e74c3c" font-weight="bold">• Close: file.close()</text>
  </g>
  
  <!-- Connection hint -->
  <g class="label">
    <text x="210" y="52" text-anchor="middle" font-size="9" fill="#7f8c8d">inheritance</text>
  </g>
</svg>