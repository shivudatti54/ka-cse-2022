<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="nested-try-user-defined-exceptions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="outerTryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3"/>
      <stop offset="100%" style="stop-color:#8fb8d1"/>
    </linearGradient>
    <linearGradient id="innerTryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8b8"/>
      <stop offset="100%" style="stop-color:#a8d178"/>
    </linearGradient>
    <linearGradient id="exceptionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8b8b8"/>
      <stop offset="100%" style="stop-color:#e87878"/>
    </linearGradient>
    <linearGradient id="userDefGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4f8"/>
      <stop offset="100%" style="stop-color:#c878e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowArrow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-arrow { stroke-dasharray: 5,5; animation: flowArrow 1s linear infinite; }
    
    .title { font-family: Georgia, serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .keyword { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .code-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #2c3e50; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Nested Try Blocks &amp; User-Defined Exceptions</text>
  
  <!-- Outer Try Block -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="The outer try block contains the entire exception handling structure">
    <rect x="40" y="55" width="340" height="140" rx="8" fill="url(#outerTryGradient)" filter="url(#shadow)"/>
    <text x="55" y="75" class="keyword">try { // Outer Try</text>
    <rect x="60" y="85" width="300" height="95" rx="5" fill="#ffffff" stroke="#8fb8d1" stroke-width="1" stroke-dasharray="4,2"/>
    
    <!-- Inner Try Block -->
    <g data-narration="The inner try block handles exceptions at a more granular level">
      <rect x="75" y="90" width="270" height="80" rx="6" fill="url(#innerTryGradient)" filter="url(#shadow)"/>
      <text x="90" y="110" class="keyword">try { // Inner Try</text>
      <text x="105" y="128" class="code-text">throw MyException("Error!");</text>
      <text x="90" y="155" class="keyword">} catch (MyException&amp; e) {</text>
      <text x="105" y="170" class="code-text">// Handle at inner level</text>
    </g>
    
    <!-- Outer Catch -->
    <text x="55" y="185" class="keyword">} catch (std::exception&amp; e) {</text>
    <text x="70" y="200" class="code-text">// Outer handler</text>
  </g>
  
  <!-- User Defined Exception Class -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="User-defined exceptions allow creating custom error types">
    <rect x="40" y="210" width="340" height="85" rx="8" fill="url(#userDefGradient)" filter="url(#shadow)"/>
    <text x="55" y="230" class="keyword">class MyException : public std::exception {</text>
    <text x="70" y="248" class="code-text">private:</text>
    <text x="85" y="263" class="code-text">    std::string msg;</text>
    <text x="70" y="278" class="code-text">public:</text>
    <text x="85" y="293" class="code-text">    MyException(const std::string&amp; m) : msg(m) {}</text>
  </g>
  
  <!-- Exception Flow Arrow -->
  <g class="pulse" data-narration="Exception propagation: inner catch checked first, then outer if not caught">
    <path d="M 200 178 L 200 195" stroke="#e87878" stroke-width="3" fill="none" class="flow-arrow" marker-end="url(#arrowhead)"/>
    <polygon points="200,200 195,190 205,190" fill="#e87878"/>
    <text x="210" y="190" class="detail" fill="#c0392b">Exception propagates</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fade-in" style="animation-delay: 0.6s" data-narration="Key points to remember about nested try blocks">
    <rect x="40" y="305" width="170" height="85" rx="6" fill="#fff3cd" stroke="#f0c36d" stroke-width="1"/>
    <text x="50" y="325" class="label" font-weight="bold">Key Points:</text>
    <text x="50" y="343" class="detail">• Inner catch checked first</text>
    <text x="50" y="358" class="detail">• Outer catches if unhandled</text>
    <text x="50" y="373" class="detail">• Hierarchical handling</text>
  </g>
  
  <!-- User Defined Benefits Box -->
  <g class="fade-in" style="animation-delay: 0.8s" data-narration="Benefits of user-defined exceptions">
    <rect x="220" y="305" width="160" height="85" rx="6" fill="#d4edda" stroke="#7dcea0" stroke-width="1"/>
    <text x="230" y="325" class="label" font-weight="bold">User-Defined Benefits:</text>
    <text x="230" y="343" class="detail">• Custom error types</text>
    <text x="230" y="358" class="detail">• Application-specific</text>
    <text x="230" y="373" class="detail">• Rich error information</text>
  </g>
  
  <!-- Flow indicator at bottom -->
  <g class="fade-in" style="animation-delay: 1s">
    <text x="210" y="390" text-anchor="middle" class="detail" fill="#7f8c8d">Exception flows from Inner → Outer if not caught</text>
  </g>
</svg>