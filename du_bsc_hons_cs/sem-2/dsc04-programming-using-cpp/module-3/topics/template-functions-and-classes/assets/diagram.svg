<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="template-functions-and-classes">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3b6"/>
      <stop offset="100%" style="stop-color:#ffaa71"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9e4de"/>
      <stop offset="100%" style="stop-color:#98d4bb"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c5d3"/>
      <stop offset="100%" style="stop-color:#d4a5b9"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Consolas', monospace; font-size: 11px; fill: #2c3e50; }
    .code { font-family: 'Consolas', monospace; font-size: 10px; fill: #2980b9; }
    .box { rx: 8; ry: 8; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Template Functions &amp; Classes</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#5d9cad" stroke-width="2" class="anim-fade"/>
  
  <!-- Box 1: Template Definition -->
  <g class="anim-slide" style="animation-delay: 0.2s">
    <rect x="20" y="55" width="100" height="90" fill="url(#boxGradient1)" class="box" stroke="#5d9cad" stroke-width="2"/>
    <text x="70" y="72" text-anchor="middle" class="label">Template</text>
    <text x="70" y="73" text-anchor="middle" class="label" fill="white">Definition</text>
    <text x="70" y="95" text-anchor="middle" class="detail" fill="#2980b9">Generic Blueprint</text>
    <text x="70" y="110" text-anchor="middle" class="code">template&lt;typename T&gt;</text>
    <text x="70" y="125" text-anchor="middle" class="code">T max(T a, T b)</text>
    <text x="70" y="137" text-anchor="middle" class="code">{ return a>b?a:b; }</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="anim-fade" style="animation-delay: 0.5s">
    <path d="M130 100 L155 100" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs>
    <text x="140" y="95" text-anchor="middle" class="detail" fill="#e74c3c" font-size="9">Instantiate</text>
  </g>
  
  <!-- Box 2: Template Instantiation -->
  <g class="anim-slide" style="animation-delay: 0.4s">
    <rect x="165" y="55" width="110" height="90" fill="url(#boxGradient2)" class="box" stroke="#e67e22" stroke-width="2"/>
    <text x="220" y="72" text-anchor="middle" class="label">Instantiation</text>
    <text x="220" y="88" text-anchor="middle" class="detail">With Specific Type</text>
    <text x="220" y="105" text-anchor="middle" class="code">max&lt;int&gt;(5, 10)</text>
    <text x="220" y="118" text-anchor="middle" class="code">max&lt;double&gt;(3.2, 7.8)</text>
    <text x="220" y="131" text-anchor="middle" class="code">max&lt;char&gt;('A','Z')</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="anim-fade" style="animation-delay: 0.7s">
    <path d="M285 100 L310 100" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
    <defs><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs>
    <text x="295" y="95" text-anchor="middle" class="detail" fill="#e74c3c" font-size="9">Compile</text>
  </g>
  
  <!-- Box 3: Compiler Generates Code -->
  <g class="anim-slide" style="animation-delay: 0.6s">
    <rect x="320" y="55" width="90" height="90" fill="url(#boxGradient3)" class="box" stroke="#27ae60" stroke-width="2"/>
    <text x="365" y="72" text-anchor="middle" class="label">Generated</text>
    <text x="365" y="88" text-anchor="middle" class="detail">Concrete Code</text>
    <text x="365" y="105" text-anchor="middle" class="code">int max(int a,</text>
    <text x="365" y="117" text-anchor="middle" class="code">  int b){...}</text>
    <text x="365" y="132" text-anchor="middle" class="code">double max(...)</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="anim-fade" style="animation-delay: 0.9s">
    <path d="M365 145 L365 170" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead3)"/>
    <defs><marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs>
    <text x="375" y="162" text-anchor="middle" class="detail" fill="#e74c3c" font-size="9">Link</text>
  </g>
  
  <!-- Box 4: Object/Function Created -->
  <g class="anim-slide" style="animation-delay: 0.8s">
    <rect x="290" y="175" width="120" height="60" fill="url(#boxGradient4)" class="box anim-pulse" stroke="#9b59b6" stroke-width="2"/>
    <text x="350" y="195" text-anchor="middle" class="label">Runtime</text>
    <text x="350" y="212" text-anchor="middle" class="detail">Object/Function</text>
    <text x="350" y="228" text-anchor="middle" class="code">max(5, 10) = 10</text>
  </g>
  
  <!-- Divider Line -->
  <line x1="20" y1="250" x2="400" y2="250" stroke="#b8c6db" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Bottom Section: Template Class -->
  <g class="anim-fade" style="animation-delay: 1s">
    <rect x="20" y="265" width="180" height="55" fill="url(#boxGradient1)" class="box" stroke="#5d9cad" stroke-width="2"/>
    <text x="110" y="282" text-anchor="middle" class="label">Template Class</text>
    <text x="110" y="298" text-anchor="middle" class="detail">Generic Class Definition</text>
    <text x="110" y="312" text-anchor="middle" class="code">template&lt;typename T&gt; class Box {</text>
  </g>
  
  <g class="anim-fade" style="animation-delay: 1.1s">
    <rect x="210" y="265" width="190" height="55" fill="url(#boxGradient2)" class="box" stroke="#e67e22" stroke-width="2"/>
    <text x="305" y="282" text-anchor="middle" class="label">Class Instantiation</text>
    <text x="305" y="298" text-anchor="middle" class="detail">Creating Objects</text>
    <text x="305" y="312" text-anchor="middle" class="code">Box&lt;int&gt; intBox; Box&lt;string&gt; strBox;</text>
  </g>
  
  <!-- Key Points Section -->
  <g class="anim-fade" style="animation-delay: 1.2s">
    <rect x="20" y="330" width="380" height="55" rx="6" ry="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
    <text x="30" y="348" class="label" fill="#d35400">Key Points:</text>
    <text x="30" y="365" class="detail" fill="#2c3e50">• Compile-time polymorphism • Zero runtime overhead</text>
    <text x="250" y="365" class="detail" fill="#2c3e50">• Type-safe code • Foundation of STL</text>
  </g>
  
  <!-- Narration labels (hidden but available for accessibility) -->
  <desc data-narration="Template Definition: Generic blueprint using template&lt;typename T&gt; syntax that works for any data type"></desc>
  <desc data-narration="Template Instantiation: Compiler creates specific versions when max&lt;int&gt;, max&lt;double&gt; are called"></desc>
  <desc data-narration="Compiler generates: Concrete function implementations for each type used"></desc>
  <desc data-narration="Runtime: Actual function calls and object creation in the program"></desc>
  <desc data-narration="Template Classes: Similar process for generic classes like STL containers"></desc>
  <desc data-narration="Key Points: Compile-time polymorphism, zero runtime overhead, type-safety, foundation of STL"></desc>
</svg>