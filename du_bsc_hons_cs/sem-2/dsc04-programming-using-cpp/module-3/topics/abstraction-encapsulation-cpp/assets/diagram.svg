<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="abstraction-encapsulation-cpp">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="abstractionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8eb8d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="encapsulationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8b888;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .abstraction-box { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .encapsulation-box { animation: slideInRight 0.8s ease-out 0.4s both; }
    .class-box { animation: slideInUp 0.8s ease-out 0.6s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .pulse-element { animation: pulse 2s infinite; }
    .detail-text { animation: fadeIn 1s ease-out 1s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c5282" class="title">Abstraction vs Encapsulation</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" class="title">In C++</text>
  
  <!-- Abstraction Box (Left) -->
  <g class="abstraction-box" data-narration="Abstraction hides implementation details, showing only the essential features to the user">
    <rect x="20" y="80" width="140" height="130" rx="8" fill="url(#abstractionGrad)" filter="url(#shadow)"/>
    <text x="90" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">ABSTRACTION</text>
    <rect x="30" y="115" width="120" height="30" rx="4" fill="#fff" stroke="#5a9fd4"/>
    <text x="90" y="133" text-anchor="middle" font-family="monospace" font-size="11" fill="#2c5282">public: printDetails()</text>
    <text x="90" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">"What it does"</text>
    <text x="90" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Hides HOW</text>
  </g>
  
  <!-- Encapsulation Box (Right) -->
  <g class="encapsulation-box" data-narration="Encapsulation bundles data and methods together, restricting direct access to some components">
    <rect x="260" y="80" width="140" height="130" rx="8" fill="url(#encapsulationGrad)" filter="url(#shadow)"/>
    <text x="330" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#276749">ENCAPSULATION</text>
    <rect x="270" y="115" width="50" height="30" rx="4" fill="#fff" stroke="#68d391" opacity="0.9"/>
    <text x="295" y="133" text-anchor="middle" font-family="monospace" font-size="9" fill="#22543d">private:</text>
    <rect x="325" y="115" width="50" height="30" rx="4" fill="#fff" stroke="#68d391" opacity="0.9"/>
    <text x="350" y="133" text-anchor="middle" font-family="monospace" font-size="9" fill="#22543d">public:</text>
    <text x="330" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">"Bundles Data"</text>
    <text x="330" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">+ Methods</text>
  </g>
  
  <!-- Central Class Box -->
  <g class="class-box" data-narration="A C++ class demonstrates both abstraction and encapsulation through access specifiers">
    <rect x="110" y="230" width="200" height="140" rx="8" fill="url(#classGrad)" filter="url(#shadow)"/>
    <text x="210" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#744210">C++ Class: Car</text>
    
    <!-- Private section -->
    <rect x="125" y="265" width="170" height="35" rx="4" fill="#fff" stroke="#c05621" stroke-dasharray="4,2"/>
    <text x="135" y="280" font-family="monospace" font-size="10" fill="#9c4221">private:</text>
    <text x="135" y="293" font-family="monospace" font-size="9" fill="#744210">brand, model, year</text>
    
    <!-- Public section -->
    <rect x="125" y="305" width="170" height="55" rx="4" fill="#fff" stroke="#c05621"/>
    <text x="135" y="320" font-family="monospace" font-size="10" fill="#9c4221">public:</text>
    <text x="135" y="334" font-family="monospace" font-size="9" fill="#744210">setBrand(), setModel()</text>
    <text x="135" y="347" font-family="monospace" font-size="9" fill="#744210">setYear(), printDetails()</text>
  </g>
  
  <!-- Connection Arrows -->
  <g class="arrow" data-narration="Arrows show how abstraction and encapsulation work together in a class">
    <path d="M90 210 L90 230 L160 230 L160 230" fill="none" stroke="#5a9fd4" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M330 210 L330 230 L260 230" fill="none" stroke="#68d391" stroke-width="2"/>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a9fd4"/>
    </marker>
  </defs>
  
  <!-- Access Specifiers Legend -->
  <g class="detail-text" data-narration="Access specifiers control visibility: public (accessible everywhere), private (class only), protected (inheritance)">
    <text x="210" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Access: public | private | protected</text>
  </g>
  
  <!-- Key Labels -->
  <g class="pulse-element" data-narration="Data hiding is the practice of restricting access to certain data within a class">
    <rect x="175" y="155" width="70" height="22" rx="11" fill="#e53e3e" opacity="0.9"/>
    <text x="210" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">Data Hiding</text>
  </g>
  
  <!-- Code indicator -->
  <g class="detail-text" data-narration="The class keyword in C++ defines the blueprint for creating objects with encapsulated data and abstracted interfaces">
    <rect x="175" y="100" width="70" height="18" rx="4" fill="#805ad5"/>
    <text x="210" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">class Car</text>
  </g>
</svg>