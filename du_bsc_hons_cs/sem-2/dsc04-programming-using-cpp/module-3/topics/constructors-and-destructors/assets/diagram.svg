<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="constructors-and-destructors">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0e8fc"/>
      <stop offset="100%" style="stop-color:#e8fcf4"/>
    </linearGradient>
    <linearGradient id="constructorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="destructorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e38d8d"/>
      <stop offset="100%" style="stop-color:#c65d5d"/>
    </linearGradient>
    <linearGradient id="objectGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b0"/>
      <stop offset="100%" style="stop-color:#6cb882"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #fff; font-weight: 600; }
    .detail { font-family: 'Consolas', monospace; font-size: 11px; fill: #333; }
    .detail-white { font-family: 'Consolas', monospace; font-size: 11px; fill: #f5f5f5; }
    .box { filter: url(#shadow); }
    .constructor-box { animation: fadeIn 0.6s ease-out, pulse 3s ease-in-out 2s infinite; transform-origin: center; }
    .destructor-box { animation: fadeIn 0.6s ease-out 0.2s both; }
    .object-box { animation: fadeIn 0.6s ease-out 0.4s both, pulse 3s ease-in-out 2.5s infinite; transform-origin: center; }
    .section-title { animation: slideInLeft 0.5s ease-out; }
    .section-title-right { animation: slideInRight 0.5s ease-out; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out 0.8s forwards; }
    .constructor-type { animation: fadeIn 0.5s ease-out; }
    .constructor-type:nth-child(1) { animation-delay: 0.3s; }
    .constructor-type:nth-child(2) { animation-delay: 0.4s; }
    .constructor-type:nth-child(3) { animation-delay: 0.5s; }
    .constructor-type:nth-child(4) { animation-delay: 0.6s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Constructors &amp; Destructors</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#5ba3c6" stroke-width="2"/>
  
  <!-- Constructor Section -->
  <g class="section-title" data-narration="Constructors are special member functions called when an object is created. They initialize the object's data members.">
    <rect x="15" y="55" width="180" height="145" rx="10" fill="url(#constructorGradient)" class="box constructor-box"/>
    <text x="105" y="75" text-anchor="middle" class="label" font-size="16">CONSTRUCTORS</text>
    <line x1="30" y1="85" x2="180" y2="85" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    
    <g class="constructor-type">
      <circle cx="35" cy="105" r="4" fill="#fff"/>
      <text x="48" y="109" class="detail-white">Default</text>
    </g>
    <g class="constructor-type">
      <circle cx="35" cy="125" r="4" fill="#fff"/>
      <text x="48" y="129" class="detail-white">Parameterized</text>
    </g>
    <g class="constructor-type">
      <circle cx="35" cy="145" r="4" fill="#fff"/>
      <text x="48" y="149" class="detail-white">Copy</text>
    </g>
    <g class="constructor-type">
      <circle cx="35" cy="165" r="4" fill="#fff"/>
      <text x="48" y="169" class="detail-white">Move</text>
    </g>
    
    <text x="105" y="190" text-anchor="middle" class="detail-white" font-size="10">Same name as class</text>
  </g>
  
  <!-- Destructor Section -->
  <g class="section-title-right" data-narration="Destructors are called when an object is about to be destroyed. They release resources acquired by the object.">
    <rect x="225" y="55" width="180" height="145" rx="10" fill="url(#destructorGradient)" class="box destructor-box"/>
    <text x="315" y="75" text-anchor="middle" class="label" font-size="16">DESTRUCTOR</text>
    <line x1="240" y1="85" x2="390" y2="85" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    
    <g>
      <circle cx="245" cy="110" r="5" fill="#fff"/>
      <text x="260" y="115" class="detail-white" font-size="12">~ClassName()</text>
    </g>
    <g>
      <circle cx="245" cy="135" r="5" fill="#fff"/>
      <text x="260" y="140" class="detail-white" font-size="12">No return type</text>
    </g>
    <g>
      <circle cx="245" cy="160" r="5" fill="#fff"/>
      <text x="260" y="165" class="detail-white" font-size="12">No arguments</text>
    </g>
    
    <text x="315" y="190" text-anchor="middle" class="detail-white" font-size="10">Tilde (~) before name</text>
  </g>
  
  <!-- Object Lifecycle Section -->
  <g data-narration="The object lifecycle shows how constructors create and initialize an object, and destructors clean up when the object is destroyed.">
    <rect x="70" y="215" width="280" height="80" rx="10" fill="url(#objectGradient)" class="box object-box"/>
    <text x="210" y="235" text-anchor="middle" class="label" font-size="15">OBJECT LIFECYCLE</text>
    <line x1="90" y1="248" x2="330" y2="248" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    
    <!-- Arrow: Constructor to Object -->
    <line x1="105" y1="270" x2="145" y2="270" stroke="#2c3e50" stroke-width="2" class="arrow-line"/>
    <polygon points="145,270 138,265 138,275" fill="#2c3e50"/>
    <text x="125" y="262" text-anchor="middle" class="detail">new</text>
    
    <!-- Object Circle -->
    <circle cx="210" cy="270" r="22" fill="#fff" stroke="#6cb882" stroke-width="2"/>
    <text x="210" y="274" text-anchor="middle" class="detail" font-weight="bold">Object</text>
    
    <!-- Arrow: Object to Destructor -->
    <line x1="232" y1="270" x2="275" y2="270" stroke="#2c3e50" stroke-width="2" class="arrow-line"/>
    <polygon points="275,270 268,265 268,275" fill="#2c3e50"/>
    <text x="253" y="262" text-anchor="middle" class="detail">delete</text>
    
    <!-- End -->
    <text x="315" y="274" text-anchor="middle" class="detail" font-size="10">destroyed</text>
  </g>
  
  <!-- Bottom Code Example -->
  <g data-narration="This code example shows the syntax for constructors and a destructor in a C++ class.">
    <rect x="30" y="310" width="360" height="80" rx="8" fill="#2c3e50" class="box"/>
    <text x="45" y="330" class="detail-white" font-size="11">
      <tspan x="45" dy="0">class MyClass {</tspan>
      <tspan x="55" dy="16">public:</tspan>
      <tspan x="55" dy="16">  MyClass() { }      // Constructor</tspan>
      <tspan x="55" dy="16">  ~MyClass() { }     // Destructor</tspan>
      <tspan x="45" dy="16">};</tspan>
    </text>
  </g>
  
  <!-- Legend/Key -->
  <g transform="translate(15, 365)">
    <circle cx="8" cy="8" r="5" fill="#7ec8e3"/>
    <text x="20" y="12" class="detail" font-size="10">Creates Object</text>
    <circle cx="110" cy="8" r="5" fill="#e38d8d"/>
    <text x="122" y="12" class="detail" font-size="10">Destroys Object</text>
  </g>
</svg>