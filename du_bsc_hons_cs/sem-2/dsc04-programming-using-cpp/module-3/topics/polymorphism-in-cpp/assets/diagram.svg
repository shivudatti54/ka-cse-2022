<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="polymorphism-in-cpp" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5e6d3"/>
    </linearGradient>
    <linearGradient id="compileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d6e5fa"/>
      <stop offset="100%" style="stop-color:#b3c9e8"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a85b6"/>
      <stop offset="100%" style="stop-color:#bac8e0"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title-text { animation: fadeIn 0.8s ease-out forwards; }
    .box-compile { animation: slideInLeft 0.6s ease-out forwards; }
    .box-runtime { animation: slideInRight 0.6s ease-out forwards; }
    .sub-box { animation: fadeIn 0.8s ease-out forwards; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .float-element { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <g class="title-text">
    <rect x="20" y="15" width="380" height="45" rx="8" fill="url(#titleGrad)"/>
    <text x="210" y="43" text-anchor="middle" fill="#2d3748" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Polymorphism in C++</text>
  </g>
  
  <!-- Main Classification: Two Types -->
  <g data-narration="Two main types of polymorphism: Compile-time and Runtime">
    <!-- Compile-Time Box -->
    <g class="box-compile" data-narration="Compile-time polymorphism resolved at compile time through overloading">
      <rect x="30" y="80" width="160" height="120" rx="10" fill="url(#compileGrad)" stroke="#5a9a7a" stroke-width="2"/>
      <text x="110" y="105" text-anchor="middle" fill="#1a3d2e" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Compile-Time</text>
      <text x="110" y="122" text-anchor="middle" fill="#2d5a40" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Polymorphism</text>
      <text x="110" y="145" text-anchor="middle" fill="#3d6a50" font-family="Arial, sans-serif" font-size="11">(Static Binding)</text>
    </g>
    
    <!-- Runtime Box -->
    <g class="box-runtime" data-narration="Runtime polymorphism achieved during execution using virtual functions">
      <rect x="230" y="80" width="160" height="120" rx="10" fill="url(#runtimeGrad)" stroke="#6b8fc3" stroke-width="2"/>
      <text x="310" y="105" text-anchor="middle" fill="#1a2d4a" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Runtime</text>
      <text x="310" y="122" text-anchor="middle" fill="#2d4a6b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Polymorphism</text>
      <text x="310" y="145" text-anchor="middle" fill="#3d5a7b" font-family="Arial, sans-serif" font-size="11">(Dynamic Binding)</text>
    </g>
  </g>
  
  <!-- Sub-concepts: Compile-Time -->
  <g class="sub-box" data-narration="Function Overloading: Multiple functions with same name, different parameters">
    <rect x="15" y="210" width="90" height="70" rx="8" fill="#d4edda" stroke="#7bc99e" stroke-width="1.5"/>
    <text x="60" y="232" text-anchor="middle" fill="#1e5631" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Function</text>
    <text x="60" y="246" text-anchor="middle" fill="#1e5631" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Overloading</text>
    <text x="60" y="265" text-anchor="middle" fill="#2d7a47" font-family="Arial, sans-serif" font-size="9">same name</text>
  </g>
  
  <g class="sub-box" data-narration="Operator Overloading: Redefining operators for user-defined types">
    <rect x="115" y="210" width="90" height="70" rx="8" fill="#d4edda" stroke="#7bc99e" stroke-width="1.5"/>
    <text x="160" y="232" text-anchor="middle" fill="#1e5631" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Operator</text>
    <text x="160" y="246" text-anchor="middle" fill="#1e5631" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Overloading</text>
    <text x="160" y="265" text-anchor="middle" fill="#2d7a47" font-family="Arial, sans-serif" font-size="9">+ - * /</text>
  </g>
  
  <!-- Sub-concepts: Runtime -->
  <g class="sub-box" data-narration="Virtual Functions: Functions overridden in derived classes">
    <rect x="215" y="210" width="90" height="70" rx="8" fill="#cce5ff" stroke="#8bb8e8" stroke-width="1.5"/>
    <text x="260" y="232" text-anchor="middle" fill="#1a3d6e" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Virtual</text>
    <text x="260" y="246" text-anchor="middle" fill="#1a3d6e" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Functions</text>
    <text x="260" y="265" text-anchor="middle" fill="#2d5a8e" font-family="Arial, sans-serif" font-size="9">override</text>
  </g>
  
  <g class="sub-box" data-narration="Inheritance: Base class pointers referencing derived objects">
    <rect x="315" y="210" width="90" height="70" rx="8" fill="#cce5ff" stroke="#8bb8e8" stroke-width="1.5"/>
    <text x="360" y="232" text-anchor="middle" fill="#1a3d6e" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Inheritance</text>
    <text x="360" y="248" text-anchor="middle" fill="#1a3d6e" font-family="Arial, sans-serif" font-size="11" font-weight="bold">&amp; Pointers</text>
    <text x="360" y="265" text-anchor="middle" fill="#2d5a8e" font-family="Arial, sans-serif" font-size="9">base*</text>
  </g>
  
  <!-- Connecting Arrows -->
  <g class="arrow">
    <path d="M110 200 L60 210" stroke="#5a9a7a" stroke-width="2" fill="none" marker-end="url(#arrowhead1)"/>
    <path d="M160 200 L160 210" stroke="#5a9a7a" stroke-width="2" fill="none"/>
    <path d="M310 200 L260 210" stroke="#6b8fc3" stroke-width="2" fill="none"/>
    <path d="M360 200 L360 210" stroke="#6b8fc3" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Key Points Box -->
  <g class="float-element" data-narration="Key point: Compile-time resolved at compilation, runtime resolved during execution">
    <rect x="30" y="300" width="360" height="85" rx="8" fill="#fff9e6" stroke="#f0c987" stroke-width="1.5"/>
    <text x="210" y="322" text-anchor="middle" fill="#5a4a00" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Key Differences</text>
    <text x="45" y="345" fill="#6b5a00" font-family="Arial, sans-serif" font-size="10">• Compile-Time: Fast, early binding</text>
    <text x="45" y="360" fill="#6b5a00" font-family="Arial, sans-serif" font-size="10">• Function/Operator Overloading</text>
    <text x="210" y="345" fill="#6b5a00" font-family="Arial, sans-serif" font-size="10">• Runtime: Flexible, late binding</text>
    <text x="210" y="360" fill="#6b5a00" font-family="Arial, sans-serif" font-size="10">• Virtual Functions + Inheritance</text>
  </g>
  
  <!-- Decorative Elements -->
  <g class="pulse-element">
    <circle cx="210" cy="65" r="8" fill="#6a85b6" opacity="0.6"/>
  </g>
</svg>