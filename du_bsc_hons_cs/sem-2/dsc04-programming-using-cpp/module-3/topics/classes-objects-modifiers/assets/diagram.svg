<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="classes-objects-modifiers">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dced;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="publicGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd87d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="protectedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6c200;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="privateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb6c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5a0ac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bb8db;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-rect { rx: 8; ry: 8; stroke: #555; stroke-width: 1.5; }
    .class-box { rx: 10; ry: 10; stroke: #2c3e50; stroke-width: 2; }
    .object-box { rx: 6; ry: 6; stroke: #2c3e50; stroke-width: 1.5; }
    .arrow { stroke: #e74c3c; stroke-width: 2; fill: none; stroke-dasharray: 5,3; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-arrow { animation: drawArrow 1s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Classes, Objects &amp; Modifiers</text>
  <text x="210" y="50" text-anchor="middle" class="detail anim-fade" style="animation-delay: 0.2s;">C++ Object-Oriented Programming</text>

  <!-- Main Class Box -->
  <g transform="translate(20, 65)" class="anim-slide-left">
    <rect width="160" height="280" fill="url(#classGrad)" class="class-box" />
    <text x="80" y="22" text-anchor="middle" class="label" fill="#fff">CLASS</text>
    <line x1="10" y1="30" x2="150" y2="30" stroke="#fff" stroke-width="1" opacity="0.5" />
  </g>

  <!-- Public Section -->
  <g transform="translate(25, 100)" class="anim-fade" style="animation-delay: 0.3s;" data-narration="Public section - accessible from anywhere, defines the interface">
    <rect width="150" height="70" fill="url(#publicGrad)" class="section-rect" />
    <text x="75" y="18" text-anchor="middle" class="label" fill="#228B22">+ PUBLIC</text>
    <text x="10" y="38" class="detail">setData()</text>
    <text x="10" y="52" class="detail">getData()</text>
    <text x="10" y="66" class="detail">display()</text>
  </g>

  <!-- Protected Section -->
  <g transform="translate(25, 180)" class="anim-fade" style="animation-delay: 0.5s;" data-narration="Protected section - accessible within class and derived classes, used for inheritance">
    <rect width="150" height="50" fill="url(#protectedGrad)" class="section-rect" />
    <text x="75" y="18" text-anchor="middle" class="label" fill="#B8860B"># PROTECTED</text>
    <text x="10" y="38" class="detail">calcValue() - inheritance</text>
  </g>

  <!-- Private Section -->
  <g transform="translate(25, 240)" class="anim-fade" style="animation-delay: 0.7s;" data-narration="Private section - hidden data, only accessible within the class itself">
    <rect width="150" height="60" fill="url(#privateGrad)" class="section-rect" />
    <text x="75" y="18" text-anchor="middle" class="label" fill="#C71585">- PRIVATE</text>
    <text x="10" y="38" class="detail">- data1: int</text>
    <text x="10" y="52" class="detail">- data2: string</text>
  </g>

  <!-- Arrow to Objects -->
  <g class="anim-arrow" style="animation-delay: 0.9s;">
    <path d="M 185 205 Q 220 205 240 205" class="arrow" />
    <polygon points="235,200 245,205 235,210" fill="#e74c3c" />
  </g>

  <!-- Objects Section -->
  <g transform="translate(250, 65)" class="anim-slide-right">
    <text x="75" y="15" text-anchor="middle" class="label">OBJECTS</text>
    <text x="75" y="30" text-anchor="middle" class="detail">(Instances)</text>
  </g>

  <!-- Object 1 -->
  <g transform="translate(250, 100)" class="anim-fade" style="animation-delay: 1.1s;" data-narration="Object 1 - Instance of class with its own data values">
    <rect width="150" height="55" fill="#fff" class="object-box" filter="url(#shadow)" />
    <text x="75" y="18" text-anchor="middle" class="label" fill="#4682B4">obj1</text>
    <text x="10" y="38" class="detail">data1 = 10</text>
    <text x="10" y="50" class="detail">data2 = "Hello"</text>
  </g>

  <!-- Object 2 -->
  <g transform="translate(250, 165)" class="anim-fade" style="animation-delay: 1.3s;" data-narration="Object 2 - Another instance with different data values">
    <rect width="150" height="55" fill="#fff" class="object-box" filter="url(#shadow)" />
    <text x="75" y="18" text-anchor="middle" class="label" fill="#4682B4">obj2</text>
    <text x="10" y="38" class="detail">data1 = 25</text>
    <text x="10" y="50" class="detail">data2 = "World"</text>
  </g>

  <!-- Object 3 -->
  <g transform="translate(250, 230)" class="anim-fade" style="animation-delay: 1.5s;" data-narration="Object 3 - Third instance showing each object has independent data">
    <rect width="150" height="55" fill="#fff" class="object-box" filter="url(#shadow)" />
    <text x="75" y="18" text-anchor="middle" class="label" fill="#4682B4">obj3</text>
    <text x="10" y="38" class="detail">data1 = 42</text>
    <text x="10" y="50" class="detail">data2 = "C++"</text>
  </g>

  <!-- Modifiers Legend -->
  <g transform="translate(20, 355)" class="anim-fade" style="animation-delay: 1.7s;" data-narration="Access modifiers legend: + public, # protected, - private">
    <circle cx="10" cy="10" r="5" fill="#90EE90" stroke="#228B22" />
    <text x="22" y="14" class="detail">Public</text>
    <circle cx="80" cy="10" r="5" fill="#ffd700" stroke="#B8860B" />
    <text x="92" y="14" class="detail">Protected</text>
    <circle cx="170" cy="10" r="5" fill="#ffb6c1" stroke="#C71585" />
    <text x="182" y="14" class="detail">Private</text>
  </g>

  <!-- Animated pulse on class box -->
  <rect x="22" y="67" width="156" height="276" fill="none" stroke="none" class="anim-pulse" style="animation-delay: 2s; transform-origin: 100px 205px;" />
</svg>