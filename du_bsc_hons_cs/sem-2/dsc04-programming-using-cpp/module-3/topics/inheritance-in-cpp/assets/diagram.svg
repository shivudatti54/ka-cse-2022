<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="inheritance-in-cpp">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="derivedGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#449d44"/>
    </linearGradient>
    <linearGradient id="multiGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#ec971f"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d9534f"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #fff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #eee; }
    .section-label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; font-weight: bold; }
    .code-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .box-base { animation: fadeIn 0.5s ease-out 0.2s both, pulse 3s ease-in-out 2s infinite; }
    .box-derived { animation: fadeIn 0.5s ease-out 0.4s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-slide">Inheritance In C++</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#4a90d9" stroke-width="2" class="anim-fade"/>
  
  <!-- Section 1: Base Class -->
  <g data-narration="Base Class: The parent class that provides attributes and methods to derived classes">
    <rect x="20" y="55" width="120" height="70" rx="5" fill="url(#boxGradient)" class="box-base"/>
    <text x="80" y="75" text-anchor="middle" class="label">Base Class</text>
    <text x="80" y="92" text-anchor="middle" class="detail">Animal</text>
    <line x1="30" y1="100" x2="130" y2="100" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <text x="80" y="112" text-anchor="middle" class="detail">+ name: string</text>
    <text x="80" y="122" text-anchor="middle" class="detail">+ eat(): void</text>
  </g>
  
  <!-- Inheritance Arrow -->
  <line x1="140" y1="90" x2="180" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="line-anim"/>
  <text x="155" y="85" class="section-label" fill="#666" font-size="10">inherits</text>
  
  <!-- Section 2: Single Inheritance -->
  <g data-narration="Single Inheritance: Dog class inherits from Animal using : public syntax">
    <rect x="190" y="55" width="130" height="70" rx="5" fill="url(#derivedGradient)" class="box-derived"/>
    <text x="255" y="75" text-anchor="middle" class="label">Derived Class</text>
    <text x="255" y="92" text-anchor="middle" class="detail">Dog</text>
    <line x1="200" y1="100" x2="310" y2="100" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <text x="255" y="112" text-anchor="middle" class="detail">+ bark(): void</text>
    <text x="255" y="122" text-anchor="middle" class="detail">+ breed: string</text>
  </g>
  
  <!-- Section 3: Syntax Box -->
  <g data-narration="Inheritance syntax in C++ uses the colon operator with access specifier">
    <rect x="20" y="140" width="180" height="55" rx="5" fill="#f8f9fa" stroke="#ddd" stroke-width="1" class="anim-fade"/>
    <text x="30" y="158" class="section-label" fill="#333">Syntax:</text>
    <text x="30" y="175" class="code-text">class Dog : public Animal {</text>
    <text x="40" y="188" class="code-text">// members</text>
    <text x="30" y="201" class="code-text">};</text>
  </g>
  
  <!-- Section 4: Access Modifiers -->
  <g data-narration="Access Specifiers: Public, Protected, and Private control inheritance visibility">
    <rect x="210" y="140" width="190" height="55" rx="5" fill="#fff5f5" stroke="#f5c6cb" stroke-width="1" class="anim-fade"/>
    <text x="220" y="158" class="section-label" fill="#333">Access Specifiers:</text>
    <circle cx="235" cy="172" r="4" fill="#5cb85c"/>
    <text x="245" y="175" class="detail" fill="#333" font-size="10">Public</text>
    <circle cx="290" cy="172" r="4" fill="#f0ad4e"/>
    <text x="300" y="175" class="detail" fill="#333" font-size="10">Protected</text>
    <circle cx="355" cy="172" r="4" fill="#d9534f"/>
    <text x="365" y="175" class="detail" fill="#333" font-size="10">Private</text>
  </g>
  
  <!-- Section 5: Multiple Inheritance -->
  <g data-narration="Multiple Inheritance: A class can inherit from multiple base classes">
    <rect x="20" y="210" width="120" height="60" rx="5" fill="url(#multiGradient)" class="anim-fade"/>
    <text x="80" y="228" text-anchor="middle" class="label">Base Class 1</text>
    <text x="80" y="245" text-anchor="middle" class="detail">Walking</text>
    <line x1="30" y1="252" x2="130" y2="252" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <text x="80" y="264" text-anchor="middle" class="detail">+ walk(): void</text>
  </g>
  
  <rect x="150" y="210" width="120" height="60" rx="5" fill="url(#multiGradient)" class="anim-fade"/>
  <text x="210" y="228" text-anchor="middle" class="label">Base Class 2</text>
  <text x="210" y="245" text-anchor="middle" class="detail">Flying</text>
  <line x1="160" y1="252" x2="260" y2="252" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <text x="210" y="264" text-anchor="middle" class="detail">+ fly(): void</text>
  
  <line x1="80" y1="270" x2="130" y2="300" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="line-anim"/>
  <line x1="210" y1="270" x2="160" y2="300" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="line-anim"/>
  
  <rect x="90" y="305" width="100" height="50" rx="5" fill="#9b59b6" class="anim-fade"/>
  <text x="140" y="325" text-anchor="middle" class="label">Derived</text>
  <text x="140" y="342" text-anchor="middle" class="detail">FlyingDog</text>
  <text x="140" y="355" text-anchor="middle" class="detail" font-size="9">Multi-Inherit</text>
  
  <!-- Section 6: Constructor/Destructor Order -->
  <g data-narration="Constructor and Destructor call order: Base constructor → Derived constructor → Derived destructor → Base destructor">
    <rect x="210" y="210" width="190" height="90" rx="5" fill="#e8f4f8" stroke="#b8daff" stroke-width="1" class="anim-fade"/>
    <text x="220" y="228" class="section-label" fill="#333">Constructor/Destructor Order:</text>
    <text x="220" y="248" class="detail" fill="#28a745" font-size="11">1. Base Constructor</text>
    <text x="220" y="263" class="detail" fill="#28a745" font-size="11">2. Derived Constructor</text>
    <text x="220" y="278" class="detail" fill="#dc3545" font-size="11">3. Derived Destructor</text>
    <text x="220" y="293" class="detail" fill="#dc3545" font-size="11">4. Base Destructor</text>
  </g>
  
  <!-- Section 7: Types Summary -->
  <g data-narration="Types of Inheritance: Single, Multiple, Multilevel, Hierarchical, Hybrid">
    <rect x="20" y="365" width="380" height="28" rx="5" fill="#fff" stroke="#ddd" stroke-width="1" class="anim-fade"/>
    <text x="30" y="380" class="section-label" fill="#333">Inheritance Types:</text>
    <text x="120" y="380" class="detail" fill="#666" font-size="10">Single</text>
    <text x="170" y="380" class="detail" fill="#666" font-size="10">Multiple</text>
    <text x="230" y="380" class="detail" fill="#666" font-size="10">Multilevel</text>
    <text x="295" y="380" class="detail" fill="#666" font-size="10">Hierarchical</text>
    <text x="360" y="380" class="detail" fill="#666" font-size="10">Hybrid</text>
  </g>
</svg>