<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="static-dynamic-memory-allocation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heapGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fc79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#96e6a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8ec5fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes growArrow {
      0% { stroke-dashoffset: 50; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-code { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-data { animation: slideInLeft 0.6s ease-out 0.35s forwards; opacity: 0; }
    .section-heap { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-stack { animation: slideInRight 0.6s ease-out 0.65s forwards; opacity: 0; }
    .section-env { animation: slideInUp 0.5s ease-out 0.8s forwards; opacity: 0; }
    .concept-box { animation: fadeIn 0.6s ease-out 1s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Memory Layout in C++</text>
  
  <!-- Code Segment -->
  <g class="section-code" data-narration="Code Segment - Contains compiled machine code of the program, read-only">
    <rect x="30" y="50" width="130" height="50" rx="6" fill="url(#codeGradient)" filter="url(#shadow)"/>
    <text x="95" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4a235a">Code Segment</text>
    <text x="95" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#5b2c6f">(.text)</text>
  </g>
  
  <!-- Data Segment -->
  <g class="section-data" data-narration="Data Segment - Stores global and static variables, initialized at compile time">
    <rect x="30" y="105" width="130" height="50" rx="6" fill="url(#dataGradient)" filter="url(#shadow)"/>
    <text x="95" y="127" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a5276">Data Segment</text>
    <text x="95" y="143" text-anchor="middle" font-family="Arial" font-size="11" fill="#2874a6">(.data, .bss)</text>
  </g>
  
  <!-- Heap (Dynamic) -->
  <g class="section-heap" data-narration="Heap - Dynamic memory allocated at runtime using new/delete, grows upward">
    <rect x="260" y="50" width="130" height="100" rx="6" fill="url(#heapGradient)" filter="url(#shadow)"/>
    <text x="325" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#935116">HEAP</text>
    <text x="325" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#9c640c">Dynamic Allocation</text>
    <text x="325" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="#7d4900">new / malloc</text>
    <path d="M 310 145 L 310 155" stroke="#d35400" stroke-width="2" marker-end="url(#arrowUp)" class="pulse-anim"/>
    <text x="340" y="152" font-family="Arial" font-size="10" fill="#d35400" class="pulse-anim">↑ grows up</text>
  </g>
  
  <!-- Stack (Static/Automatic) -->
  <g class="section-stack" data-narration="Stack - Automatic memory for local variables, function calls, grows downward">
    <rect x="260" y="155" width="130" height="100" rx="6" fill="url(#stackGradient)" filter="url(#shadow)"/>
    <text x="325" y="177" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1e8449">STACK</text>
    <text x="325" y="193" text-anchor="middle" font-family="Arial" font-size="11" fill="#196f3d">Static/Automatic</text>
    <text x="325" y="208" text-anchor="middle" font-family="Arial" font-size="10" fill="#145a32">local variables</text>
    <path d="M 310 250 L 310 260" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowDown)" class="pulse-anim"/>
    <text x="340" y="258" font-family="Arial" font-size="10" fill="#27ae60" class="pulse-anim">↓ grows down</text>
  </g>
  
  <!-- Environment/Args -->
  <g class="section-env" data-narration="Environment - Command line arguments and environment variables">
    <rect x="30" y="160" width="130" height="40" rx="6" fill="#fdebd0" stroke="#f5b041" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="95" y="182" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#7d4900">Environment/Args</text>
  </g>
  
  <!-- Arrows connecting sections -->
  <defs>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,10 L5,0 L10,10" fill="#d35400"/>
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L5,10 L10,0" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Key Concept Boxes -->
  <g class="concept-box" data-narration="Key Concept: Static allocation happens at compile time on the stack">
    <rect x="30" y="280" width="170" height="50" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
    <text x="40" y="298" font-family="Arial" font-size="11" font-weight="bold" fill="#145a32">STATIC</text>
    <text x="40" y="315" font-family="Arial" font-size="10" fill="#196f3d">Compile time</text>
    <text x="115" y="315" font-family="Arial" font-size="10" fill="#145a32">Stack memory</text>
  </g>
  
  <g class="concept-box" data-narration="Key Concept: Dynamic allocation happens at runtime on the heap using new/malloc">
    <rect x="220" y="280" width="170" height="50" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="230" y="298" font-family="Arial" font-size="11" font-weight="bold" fill="#78281f">DYNAMIC</text>
    <text x="230" y="315" font-family="Arial" font-size="10" fill="#922b21">Runtime</text>
    <text x="295" y="315" font-family="Arial" font-size="10" fill="#78281f">Heap memory</text>
  </g>
  
  <!-- Memory Address Indicator -->
  <g>
    <text x="20" y="60" font-family="Arial" font-size="9" fill="#7f8c8d">High</text>
    <text x="20" y="245" font-family="Arial" font-size="9" fill="#7f8c8d">Low</text>
    <line x1="25" y1="55" x2="25" y2="250" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(30, 340)">
    <rect width="360" height="45" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <circle cx="20" cy="15" r="5" fill="#a8edea"/>
    <text x="32" y="18" font-family="Arial" font-size="10" fill="#2c3e50">Static (Stack)</text>
    <circle cx="110" cy="15" r="5" fill="#fcb69f"/>
    <text x="122" y="18" font-family="Arial" font-size="10" fill="#2c3e50">Dynamic (Heap)</text>
    <text x="32" y="35" font-family="Arial" font-size="9" fill="#7f8c8d">Auto allocation/deallocation</text>
    <text x="165" y="35" font-family="Arial" font-size="9" fill="#7f8c8d">Manual control (new/delete)</text>
  </g>
</svg>