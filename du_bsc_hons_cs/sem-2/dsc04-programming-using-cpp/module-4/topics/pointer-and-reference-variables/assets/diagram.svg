<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pointer-and-reference-variables">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fce8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveArrow {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 20; }
    }
    .title { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Arial', sans-serif; font-size: 12px; fill: #7f8c8d; }
    .code { font-family: 'Courier New', monospace; font-size: 13px; fill: #2980b9; }
    .highlight { font-family: 'Arial', sans-serif; font-size: 14px; font-weight: bold; fill: #8e44ad; }
    .box { fill: #ffffff; stroke: #bdc3c7; stroke-width: 2; rx: 8; }
    .mem-cell { fill: #ecf0f1; stroke: #3498db; stroke-width: 2; rx: 4; }
    .mem-cell-alt { fill: #ecf0f1; stroke: #9b59b6; stroke-width: 2; rx: 4; }
    .pointer-box { fill: #d5f4e6; stroke: #27ae60; stroke-width: 2; rx: 6; }
    .ref-box { fill: #f4e8d1; stroke: #e67e22; stroke-width: 2; rx: 6; }
    .arrow { stroke: #e74c3c; stroke-width: 2; fill: none; stroke-dasharray: 8,4; }
    .arrow-alt { stroke: #8e44ad; stroke-width: 2; fill: none; stroke-dasharray: 8,4; }
    .section-title { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    
    .fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    
    .s1 { animation-delay: 0.2s; }
    .s2 { animation-delay: 0.4s; }
    .s3 { animation-delay: 0.6s; }
    .s4 { animation-delay: 0.8s; }
    .s5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in s1">Pointer &amp; Reference Variables</text>
  <text x="210" y="50" text-anchor="middle" class="detail fade-in s2">Understanding Memory Addresses in C++</text>
  
  <!-- Memory Cells Section -->
  <g class="slide-in s2" data-narration="Memory cells represent locations where variables are stored. Each cell has a unique address (like 0x1000, 0x1004).">
    <text x="30" y="80" class="section-title">Memory Layout</text>
    
    <!-- Memory cells -->
    <rect x="30" y="95" width="70" height="30" class="mem-cell"/>
    <text x="65" y="115" text-anchor="middle" class="detail">0x1000</text>
    <text x="65" y="128" text-anchor="middle" class="code">10</text>
    
    <rect x="105" y="95" width="70" height="30" class="mem-cell"/>
    <text x="140" y="115" text-anchor="middle" class="detail">0x1004</text>
    <text x="140" y="128" text-anchor="middle" class="code">20</text>
    
    <rect x="180" y="95" width="70" height="30" class="mem-cell"/>
    <text x="215" y="115" text-anchor="middle" class="detail">0x1008</text>
    <text x="215" y="128" text-anchor="middle" class="code">30</text>
    
    <rect x="255" y="95" width="70" height="30" class="mem-cell"/>
    <text x="290" y="115" text-anchor="middle" class="detail">0x100C</text>
    <text x="290" y="128" text-anchor="middle" class="code">40</text>
    
    <!-- Address labels -->
    <text x="30" y="140" class="detail" style="font-size:10px;">int x=10</text>
    <text x="105" y="140" class="detail" style="font-size:10px;">int y=20</text>
    <text x="180" y="140" class="detail" style="font-size:10px;">int z=30</text>
    <text x="255" y="140" class="detail" style="font-size:10px;">int w=40</text>
  </g>
  
  <!-- Pointer Variable Section -->
  <g class="slide-in s3" data-narration="A pointer stores a memory address. The asterisk (*) declares it as a pointer type.">
    <rect x="20" y="160" width="180" height="100" class="pointer-box" filter="url(#shadow)"/>
    <text x="30" y="180" class="highlight" fill="#27ae60">Pointer Variable</text>
    
    <text x="30" y="205" class="code">int x = 10;</text>
    <text x="30" y="225" class="code">int *ptr = &amp;x;</text>
    <text x="30" y="245" class="detail">ptr stores: 0x1000</text>
    <text x="30" y="262" class="detail">*ptr dereferences to: 10</text>
    
    <!-- Arrow from pointer to memory -->
    <path d="M 160 210 L 90 120" class="arrow" style="animation: moveArrow 2s linear infinite;" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Reference Variable Section -->
  <g class="slide-in s4" data-narration="A reference is an alias for another variable. The ampersand (&amp;) declares it as a reference type. It must be initialized when declared.">
    <rect x="220" y="160" width="180" height="100" class="ref-box" filter="url(#shadow)"/>
    <text x="230" y="180" class="highlight" fill="#e67e22">Reference Variable</text>
    
    <text x="230" y="205" class="code">int x = 10;</text>
    <text x="230" y="225" class="code">int &amp;ref = x;</text>
    <text x="230" y="245" class="detail">ref IS x (alias)</text>
    <text x="230" y="262" class="detail">Both share: 0x1000</text>
    
    <!-- Arrow from ref to memory -->
    <path d="M 280 210 L 90 120" class="arrow-alt" style="animation: moveArrow 2s linear infinite; animation-delay: 1s;" marker-end="url(#arrowhead2)"/>
  </g>
  
  <!-- Pointer Arithmetic Section -->
  <g class="slide-in s5" data-narration="Pointer arithmetic: incrementing a pointer moves it to the next memory location. For int*, each +1 adds 4 bytes (sizeof(int)).">
    <rect x="20" y="275" width="380" height="60" class="box" filter="url(#shadow)"/>
    <text x="35" y="295" class="highlight" fill="#8e44ad">Pointer Arithmetic</text>
    
    <text x="35" y="318" class="code">int *ptr = &amp;x;    // ptr = 0x1000</text>
    <text x="240" y="318" class="detail">→</text>
    <text x="260" y="318" class="code">ptr++    // ptr = 0x1004</text>
    <text x="35" y="335" class="detail" style="font-size:11px;">(increments by sizeof(int) = 4 bytes)</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fade-in s5" data-narration="Key differences: Pointers can be re-assigned, can be null, use * to dereference. References must be initialized, cannot be null, are aliases.">
    <rect x="20" y="345" width="380" height="45" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="35" y="362" class="detail" style="font-size:12px;"><tspan class="highlight" fill="#e74c3c">Pointer:</tspan> *ptr, &amp;x | <tspan class="highlight" fill="#e74c3c">Reference:</tspan> ref=x</text>
    <text x="35" y="380" class="detail" style="font-size:11px;">Use pointers for dynamic memory | Use references for function parameters</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
  </defs>
  
  <!-- Visual indicators - small animated dots -->
  <circle cx="65" cy="115" r="4" fill="#3498db" class="pulse" style="animation-delay: 1.2s;"/>
  <circle cx="140" cy="115" r="4" fill="#3498db" class="pulse" style="animation-delay: 1.4s;"/>
  <circle cx="215" cy="115" r="4" fill="#3498db" class="pulse" style="animation-delay: 1.6s;"/>
  <circle cx="290" cy="115" r="4" fill="#3498db" class="pulse" style="animation-delay: 1.8s;"/>
</svg>