<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="binomial-coefficients">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#f0f8e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideIn {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes rowAppear {
        from { opacity: 0; transform: translateX(-30px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
      .formula { font-family: 'Times New Roman', serif; font-size: 13px; fill: #2c3e50; font-style: italic; }
      .number { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .section-box { fill: rgba(255,255,255,0.85); stroke: #b8c9d9; stroke-width: 1; rx: 8; }
      .triangle-cell { fill: #fff; stroke: #7f8c8d; stroke-width: 1; }
      .triangle-cell-highlight { fill: #ffeaa7; stroke: #f39c12; stroke-width: 2; }
      .arrow { fill: none; stroke: #3498db; stroke-width: 1.5; marker-end: url(#arrowhead); }
      .highlight-text { fill: #e74c3c; font-weight: bold; }
      
      .title-anim { animation: fadeIn 1s ease-out forwards; }
      .row0 { animation: rowAppear 0.5s ease-out 0.2s forwards; opacity: 0; }
      .row1 { animation: rowAppear 0.5s ease-out 0.4s forwards; opacity: 0; }
      .row2 { animation: rowAppear 0.5s ease-out 0.6s forwards; opacity: 0; }
      .row3 { animation: rowAppear 0.5s ease-out 0.8s forwards; opacity: 0; }
      .row4 { animation: rowAppear 0.5s ease-out 1.0s forwards; opacity: 0; }
      .row5 { animation: rowAppear 0.5s ease-out 1.2s forwards; opacity: 0; }
      .row6 { animation: rowAppear 0.5s ease-out 1.4s forwards; opacity: 0; }
      .box-anim { animation: fadeIn 0.8s ease-out 1.5s forwards; opacity: 0; }
      .formula-anim { animation: slideIn 0.6s ease-out 1.8s forwards; opacity: 0; }
      .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Binomial Coefficients</text>
  <line x1="80" y1="38" x2="340" y2="38" stroke="#b8c9d9" stroke-width="1" class="title-anim"/>
  
  <!-- Pascal's Triangle Section -->
  <g data-narration="Pascal's Triangle displays binomial coefficients in a triangular arrangement where each number is the sum of the two numbers directly above it.">
    <!-- Row 0 -->
    <g class="row0">
      <circle cx="210" cy="70" r="14" class="triangle-cell"/>
      <text x="210" y="75" text-anchor="middle" class="number">1</text>
    </g>
    
    <!-- Row 1 -->
    <g class="row1">
      <circle cx="185" cy="100" r="14" class="triangle-cell"/>
      <text x="185" y="105" text-anchor="middle" class="number">1</text>
      <circle cx="235" cy="100" r="14" class="triangle-cell"/>
      <text x="235" y="105" text-anchor="middle" class="number">1</text>
    </g>
    
    <!-- Row 2 -->
    <g class="row2">
      <circle cx="160" cy="130" r="14" class="triangle-cell"/>
      <text x="160" y="135" text-anchor="middle" class="number">1</text>
      <circle cx="210" cy="130" r="14" class="triangle-cell"/>
      <text x="210" y="135" text-anchor="middle" class="number">2</text>
      <circle cx="260" cy="130" r="14" class="triangle-cell"/>
      <text x="260" y="135" text-anchor="middle" class="number">1</text>
    </g>
    
    <!-- Row 3 -->
    <g class="row3">
      <circle cx="135" cy="160" r="14" class="triangle-cell"/>
      <text x="135" y="165" text-anchor="middle" class="number">1</text>
      <circle cx="185" cy="160" r="14" class="triangle-cell"/>
      <text x="185" y="165" text-anchor="middle" class="number">3</text>
      <circle cx="235" cy="160" r="14" class="triangle-cell pulse-anim"/>
      <text x="235" y="165" text-anchor="middle" class="number highlight-text">3</text>
      <circle cx="285" cy="160" r="14" class="triangle-cell"/>
      <text x="285" y="165" text-anchor="middle" class="number">1</text>
    </g>
    
    <!-- Row 4 -->
    <g class="row4">
      <circle cx="110" cy="190" r="14" class="triangle-cell"/>
      <text x="110" y="195" text-anchor="middle" class="number">1</text>
      <circle cx="160" cy="190" r="14" class="triangle-cell"/>
      <text x="160" y="195" text-anchor="middle" class="number">4</text>
      <circle cx="210" cy="190" r="14" class="triangle-cell-highlight pulse-anim"/>
      <text x="210" y="195" text-anchor="middle" class="number">6</text>
      <circle cx="260" cy="190" r="14" class="triangle-cell"/>
      <text x="260" y="195" text-anchor="middle" class="number">4</text>
      <circle cx="310" cy="190" r="14" class="triangle-cell"/>
      <text x="310" y="195" text-anchor="middle" class="number">1</text>
    </g>
    
    <!-- Row 5 -->
    <g class="row5">
      <circle cx="85" cy="220" r="14" class="triangle-cell"/>
      <text x="85" y="225" text-anchor="middle" class="number">1</text>
      <circle cx="135" cy="220" r="14" class="triangle-cell"/>
      <text x="135" y="225" text-anchor="middle" class="number">5</text>
      <circle cx="185" cy="220" r="14" class="triangle-cell"/>
      <text x="185" y="225" text-anchor="middle" class="number">10</text>
      <circle cx="235" cy="220" r="14" class="triangle-cell pulse-anim"/>
      <text x="235" y="225" text-anchor="middle" class="number highlight-text">10</text>
      <circle cx="285" cy="220" r="14" class="triangle-cell"/>
      <text x="285" y="225" text-anchor="middle" class="number">5</text>
      <circle cx="335" cy="220" r="14" class="triangle-cell"/>
      <text x="335" y="225" text-anchor="middle" class="number">1</text>
    </g>
    
    <!-- Row 6 -->
    <g class="row6">
      <circle cx="60" cy="250" r="14" class="triangle-cell"/>
      <text x="60" y="255" text-anchor="middle" class="number">1</text>
      <circle cx="110" cy="250" r="14" class="triangle-cell"/>
      <text x="110" y="255" text-anchor="middle" class="number">6</text>
      <circle cx="160" cy="250" r="14" class="triangle-cell"/>
      <text x="160" y="255" text-anchor="middle" class="number">15</text>
      <circle cx="210" cy="250" r="14" class="triangle-cell"/>
      <text x="210" y="255" text-anchor="middle" class="number">20</text>
      <circle cx="260" cy="250" r="14" class="triangle-cell"/>
      <text x="260" y="255" text-anchor="middle" class="number">15</text>
      <circle cx="310" cy="250" r="14" class="triangle-cell"/>
      <text x="310" y="255" text-anchor="middle" class="number">6</text>
      <circle cx="360" cy="250" r="14" class="triangle-cell"/>
      <text x="360" y="255" text-anchor="middle" class="number">1</text>
    </g>
  </g>
  
  <!-- Row Labels -->
  <g data-narration="Each row n represents the binomial coefficients for (a+b)^n, where the k-th entry is C(n,k).">
    <text x="25" y="75" class="label" font-size="11" fill="#7f8c8d">n=0</text>
    <text x="25" y="105" class="label" font-size="11" fill="#7f8c8d">n=1</text>
    <text x="25" y="135" class="label" font-size="11" fill="#7f8c8d">n=2</text>
    <text x="25" y="165" class="label" font-size="11" fill="#7f8c8d">n=3</text>
    <text x="25" y="195" class="label" font-size="11" fill="#7f8c8d">n=4</text>
    <text x="25" y="225" class="label" font-size="11" fill="#7f8c8d">n=5</text>
    <text x="25" y="255" class="label" font-size="11" fill="#7f8c8d">n=6</text>
  </g>
  
  <!-- Definition Box -->
  <g class="box-anim" data-narration="The binomial coefficient C(n,k) counts ways to choose k elements from n elements.">
    <rect x="280" y="280" width="130" height="50" class="section-box" filter="url(#shadow)"/>
    <text x="290" y="298" class="label" font-size="12" font-weight="bold">Definition:</text>
    <text x="290" y="318" class="formula">C(n,k) = n! / (k!(n-k)!)</text>
  </g>
  
  <!-- Properties Box -->
  <g class="box-anim" data-narration="Key properties: symmetry C(n,k)=C(n,n-k), and each entry is sum of two above it.">
    <rect x="10" y="280" width="130" height="50" class="section-box" filter="url(#shadow)"/>
    <text x="20" y="298" class="label" font-size="12" font-weight="bold">Properties:</text>
    <text x="20" y="315" class="label" font-size="10">C(n,k) = C(n,n-k)</text>
    <text x="20" y="328" class="label" font-size="10">C(n,k) = C(n-1,k-1)+C(n-1,k)</text>
  </g>
  
  <!-- Example Box -->
  <g class="formula-anim" data-narration="Example: (a+b)^4 = a^4 + 4a^3b + 6a^2b^2 + 4ab^3 + b^4">
    <rect x="145" y="340" width="130" height="40" class="section-box" filter="url(#shadow)"/>
    <text x="155" y="358" class="label" font-size="11" font-weight="bold">Binomial Theorem:</text>
    <text x="155" y="373" class="formula" font-size="10">(a+b)⁴ = 1+4+6+4+1</text>
  </g>
  
  <!-- Arrow showing relationship -->
  <g class="box-anim">
    <path d="M 175 130 Q 195 145 185 160" class="arrow" stroke-dasharray="3,2"/>
    <path d="M 245 130 Q 225 145 235 160" class="arrow" stroke-dasharray="3,2"/>
    <text x="210" y="150" class="label" font-size="9" fill="#3498db" text-anchor="middle">1+2=3</text>
  </g>
  
  <!-- Notation explanation -->
  <g class="formula-anim" data-narration="The notation C(n,k) or (n choose k) represents the number of combinations.">
    <text x="210" y="395" class="label" font-size="11" fill="#7f8c8d" text-anchor="middle">Also written as: (n choose k) or C(n,k)</text>
  </g>
</svg>