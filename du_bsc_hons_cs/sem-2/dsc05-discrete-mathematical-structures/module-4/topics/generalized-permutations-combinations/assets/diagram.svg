<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="generalized-permutations-combinations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a3c4dc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes starPulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(10deg); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .formula-box { animation: fadeIn 0.5s ease-out 1s forwards; }
    .star { animation: starPulse 2s ease-in-out infinite; transform-origin: center; }
    .star:nth-child(2) { animation-delay: 0.2s; }
    .star:nth-child(3) { animation-delay: 0.4s; }
    .star:nth-child(4) { animation-delay: 0.6s; }
    .star:nth-child(5) { animation-delay: 0.8s; }
    .star:nth-child(6) { animation-delay: 1s; }
    .star:nth-child(7) { animation-delay: 1.2s; }
    .pulse-element { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title" data-narration="Main title: Generalized Permutations and Combinations">
    Generalized Permutations
  </text>
  <text x="210" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50" class="title">
    and Combinations
  </text>
  
  <!-- Section 1: Permutations with Repetition -->
  <g class="section1" data-narration="Permutations with repetition formula: n! divided by the product of factorials of identical objects">
    <rect x="15" y="75" width="185" height="95" rx="8" ry="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="25" y="95" font-size="14" font-weight="bold" fill="#1565c0">Permutations w/ Repetition</text>
    <text x="25" y="118" font-size="12" fill="#333">Multi-set: n objects with</text>
    <text x="25" y="133" font-size="12" fill="#333">r₁, r₂, ... rₖ identical</text>
    <text x="25" y="155" font-size="14" font-weight="bold" fill="#c62828">Formula:</text>
    <text x="25" y="172" font-size="13" fill="#333">n! / (r₁! × r₂! × ... × rₖ!)</text>
  </g>
  
  <!-- Section 2: Combinations with Repetition -->
  <g class="section2" data-narration="Combinations with repetition formula: choosing k items from n types with unlimited supply">
    <rect x="220" y="75" width="185" height="95" rx="8" ry="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="230" y="95" font-size="14" font-weight="bold" fill="#2e7d32">Combinations w/ Repetition</text>
    <text x="230" y="118" font-size="12" fill="#333">Choose k items from</text>
    <text x="230" y="133" font-size="12" fill="#333">n types (unlimited)</text>
    <text x="230" y="155" font-size="14" font-weight="bold" fill="#c62828">Formula:</text>
    <text x="230" y="172" font-size="13" fill="#333">(n + k - 1)! / (k! × (n-1)!)</text>
  </g>
  
  <!-- Arrow connecting sections -->
  <g class="pulse-element" data-narration="Arrow showing the relationship between permutations and combinations">
    <path d="M195 115 L220 115" stroke="#78909c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="217,110 230,115 217,120" fill="#78909c"/>
  </g>
  
  <!-- Section 3: Stars and Bars -->
  <g class="section3" data-narration="Stars and Bars technique: 7 stars and 2 bars create 3 groups">
    <rect x="15" y="185" width="185" height="100" rx="8" ry="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="25" y="205" font-size="14" font-weight="bold" fill="#e65100">Stars and Bars</text>
    <text x="25" y="225" font-size="12" fill="#333">Distribute 7 identical items</text>
    <text x="25" y="240" font-size="12" fill="#333">into 3 groups</text>
    
    <!-- Stars visualization -->
    <g transform="translate(25, 255)">
      <text class="star" x="0" y="0" font-size="18" fill="#ff9800">★</text>
      <text class="star" x="18" y="0" font-size="18" fill="#ff9800">★</text>
      <text x="36" y="0" font-size="14" fill="#555">|</text>
      <text class="star" x="50" y="0" font-size="18" fill="#ff9800">★</text>
      <text class="star" x="68" y="0" font-size="18" fill="#ff9800">★</text>
      <text class="star" x="86" y="0" font-size="18" fill="#ff9800">★</text>
      <text x="104" y="0" font-size="14" fill="#555">|</text>
      <text class="star" x="118" y="0" font-size="18" fill="#ff9800">★</text>
      <text class="star" x="136" y="0" font-size="18" fill="#ff9800">★</text>
    </g>
    <text x="25" y="285" font-size="11" fill="#666">★★ | ★★★ | ★★</text>
  </g>
  
  <!-- Section 4: Circular Permutations -->
  <g class="section4" data-narration="Circular permutations: arrangements around a circle where rotation doesn't create new arrangements">
    <rect x="220" y="185" width="185" height="100" rx="8" ry="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="230" y="205" font-size="14" font-weight="bold" fill="#1565c0">Circular Permutations</text>
    <text x="230" y="225" font-size="12" fill="#333">Arrange n distinct objects</text>
    <text x="230" y="240" font-size="12" fill="#333">around a circle</text>
    <text x="230" y="260" font-size="14" font-weight="bold" fill="#c62828">Formula:</text>
    <text x="230" y="278" font-size="13" fill="#333">(n - 1)! = (n-1) × (n-2) × ... × 1</text>
    
    <!-- Circle visualization -->
    <circle cx="355" cy="255" r="18" fill="none" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,2" class="pulse-element"/>
    <circle cx="355" cy="255" r="5" fill="#1976d2"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="formula-box" data-narration="Key applications: algorithm analysis, probability theory, cryptography">
    <rect x="15" y="300" width="390" height="85" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="25" y="320" font-size="14" font-weight="bold" fill="#495057">Key Applications</text>
    <text x="25" y="340" font-size="12" fill="#666">• Algorithm analysis &amp; time complexity</text>
    <text x="25" y="358" font-size="12" fill="#666">• Probability theory &amp; combinatorics</text>
    <text x="25" y="376" font-size="12" fill="#666">• Competitive coding &amp; technical interviews</text>
    
    <!-- Decorative elements -->
    <circle cx="380" cy="342" r="15" fill="#e3f2fd" class="pulse-element"/>
    <text x="380" y="347" text-anchor="middle" font-size="16" fill="#1976d2">∑</text>
  </g>
  
</svg>