<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pigeonhole-principle">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <radialGradient id="holeGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#5a7a9a"/>
      <stop offset="100%" style="stop-color:#2d4a6a"/>
    </radialGradient>
    <linearGradient id="pigeonGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#7eb5d6"/>
      <stop offset="100%" style="stop-color:#4a90b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes flyIn {
      from { transform: translate(0, -50px); opacity: 0; }
      to { transform: translate(0, 0); opacity: 1; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .subtitle { animation: fadeIn 1s ease-out 0.3s forwards; opacity: 0; }
    .hole { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .hole-1 { animation-delay: 0.2s; }
    .hole-2 { animation-delay: 0.3s; }
    .hole-3 { animation-delay: 0.4s; }
    .hole-4 { animation-delay: 0.5s; }
    .hole-5 { animation-delay: 0.6s; }
    .pigeon { animation: flyIn 0.6s ease-out forwards; opacity: 0; }
    .pigeon-1 { animation-delay: 0.7s; }
    .pigeon-2 { animation-delay: 0.9s; }
    .pigeon-3 { animation-delay: 1.1s; }
    .pigeon-4 { animation-delay: 1.3s; }
    .pigeon-5 { animation-delay: 1.5s; }
    .pigeon-6 { animation-delay: 1.7s; }
    .arrow { animation: pulse 2s infinite; }
    .concept-box { animation: slideIn 0.8s ease-out 1s forwards; opacity: 0; }
    .label { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .overflow-highlight { animation: pulse 1.5s infinite; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title" data-narration="Title introducing the Pigeonhole Principle">
    <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2d4a6a">Pigeonhole Principle</text>
  </g>
  <g class="subtitle" data-narration="Subtitle showing the mathematical concept">
    <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a7a9a">If n items → m containers, where n &gt; m</text>
    <text x="210" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a7a9a">Then at least one container holds 2+ items</text>
  </g>
  
  <!-- Main Visualization Area -->
  <g data-narration="5 holes (containers) arranged horizontally">
    <!-- Holes -->
    <ellipse class="hole hole-1" cx="60" cy="180" rx="35" ry="20" fill="url(#holeGradient)" filter="url(#shadow)"/>
    <ellipse class="hole hole-2" cx="150" cy="180" rx="35" ry="20" fill="url(#holeGradient)" filter="url(#shadow)"/>
    <ellipse class="hole hole-3" cx="240" cy="180" rx="35" ry="20" fill="url(#holeGradient)" filter="url(#shadow)"/>
    <ellipse class="hole hole-4" cx="330" cy="180" rx="35" ry="20" fill="url(#holeGradient)" filter="url(#shadow)"/>
    <ellipse class="hole hole-5" cx="60" cy="280" rx="35" ry="20" fill="url(#holeGradient)" filter="url(#shadow)"/>
    
    <!-- Pigeons in holes -->
    <!-- First 5 pigeons in first 5 holes -->
    <g class="pigeon pigeon-1" data-narration="Pigeon 1 enters first hole">
      <ellipse cx="60" cy="175" rx="18" ry="14" fill="url(#pigeonGradient)"/>
      <circle cx="55" cy="172" r="3" fill="#2d4a6a"/>
      <polygon points="78,175 72,170 72,180" fill="#4a90b8"/>
      <path d="M50 178 Q45 185 50 188" stroke="#4a90b8" stroke-width="2" fill="none"/>
    </g>
    <g class="pigeon pigeon-2" data-narration="Pigeon 2 enters second hole">
      <ellipse cx="150" cy="175" rx="18" ry="14" fill="url(#pigeonGradient)"/>
      <circle cx="145" cy="172" r="3" fill="#2d4a6a"/>
      <polygon points="168,175 162,170 162,180" fill="#4a90b8"/>
      <path d="M140 178 Q135 185 140 188" stroke="#4a90b8" stroke-width="2" fill="none"/>
    </g>
    <g class="pigeon pigeon-3" data-narration="Pigeon 3 enters third hole">
      <ellipse cx="240" cy="175" rx="18" ry="14" fill="url(#pigeonGradient)"/>
      <circle cx="235" cy="172" r="3" fill="#2d4a6a"/>
      <polygon points="258,175 252,170 252,180" fill="#4a90b8"/>
      <path d="M230 178 Q225 185 230 188" stroke="#4a90b8" stroke-width="2" fill="none"/>
    </g>
    <g class="pigeon pigeon-4" data-narration="Pigeon 4 enters fourth hole">
      <ellipse cx="330" cy="175" rx="18" ry="14" fill="url(#pigeonGradient)"/>
      <circle cx="325" cy="172" r="3" fill="#2d4a6a"/>
      <polygon points="348,175 342,170 342,180" fill="#4a90b8"/>
      <path d="M320 178 Q315 185 320 188" stroke="#4a90b8" stroke-width="2" fill="none"/>
    </g>
    <g class="pigeon pigeon-5" data-narration="Pigeon 5 enters fifth hole (first in second row)">
      <ellipse cx="60" cy="275" rx="18" ry="14" fill="url(#pigeonGradient)"/>
      <circle cx="55" cy="272" r="3" fill="#2d4a6a"/>
      <polygon points="78,275 72,270 72,280" fill="#4a90b8"/>
      <path d="M50 278 Q45 285 50 288" stroke="#4a90b8" stroke-width="2" fill="none"/>
    </g>
    
    <!-- The 6th pigeon - overflow to first hole -->
    <g class="pigeon pigeon-6" data-narration="Pigeon 6 has nowhere to go - must share a hole">
      <ellipse cx="60" cy="158" rx="18" ry="14" fill="url(#pigeonGradient)"/>
      <circle cx="55" cy="155" r="3" fill="#2d4a6a"/>
      <polygon points="78,158 72,153 72,163" fill="#4a90b8"/>
      <path d="M50 161 Q45 168 50 171" stroke="#4a90b8" stroke-width="2" fill="none"/>
    </g>
  </g>
  
  <!-- Arrow showing overflow -->
  <g class="arrow" data-narration="Arrow indicates the overflow pigeon">
    <path d="M90 130 L90 145" stroke="#d35f5f" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
    <polygon points="90,150 85,140 95,140" fill="#d35f5f"/>
  </g>
  
  <!-- Labels -->
  <g class="label" data-narration="Labels showing n=6 and m=5">
    <text x="60" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a7a9a">m=5</text>
    <text x="150" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a7a9a">holes</text>
    <text x="240" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a7a9a">(containers)</text>
    
    <text x="60" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d4a6a">n = 6</text>
    <text x="60" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d4a6a">pigeons</text>
    
    <text x="330" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d35f5f">6 &gt; 5</text>
    <text x="330" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d35f5f">OVERFLOW!</text>
  </g>
  
  <!-- Overflow highlight circle -->
  <circle class="overflow-highlight" cx="60" cy="170" r="28" stroke="#d35f5f" stroke-width="2" fill="none" stroke-dasharray="5,3" data-narration="Highlighted circle shows the hole with 2 pigeons"/>
  
  <!-- Concept Box -->
  <g class="concept-box" data-narration="Key concept box summarizing the principle">
    <rect x="130" y="340" width="280" height="45" rx="5" fill="white" stroke="#4a90b8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="145" y="358" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d4a6a">Conclusion:</text>
    <text x="145" y="373" font-family="Arial, sans-serif" font-size="10" fill="#5a7a9a">Since 6 pigeons → 5 holes</text>
    <text x="145" y="386" font-family="Arial, sans-serif" font-size="10" fill="#d35f5f">At least one hole has 2 pigeons!</text>
  </g>
  
  <!-- Decorative elements -->
  <g data-narration="Mathematical notation">
    <text x="360" y="30" font-family="Arial, sans-serif" font-size="20" fill="#c9a0dc">n &gt; m</text>
  </g>
  
  <!-- Small pigeon icons decoration -->
  <g data-narration="Decorative pigeon icons">
    <g transform="translate(380, 365) scale(0.4)">
      <ellipse cx="0" cy="0" rx="18" ry="14" fill="#7eb5d6" opacity="0.5"/>
      <circle cx="-5" cy="-3" r="3" fill="#2d4a6a" opacity="0.5"/>
    </g>
    <g transform="translate(20, 365) scale(0.4)">
      <ellipse cx="0" cy="0" rx="18" ry="14" fill="#7eb5d6" opacity="0.5"/>
      <circle cx="-5" cy="-3" r="3" fill="#2d4a6a" opacity="0.5"/>
    </g>
  </g>
</svg>