<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="permutations-and-combinations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5ddf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccebd9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .triangle-cell { animation: fadeIn 0.5s ease-out; animation-fill-mode: both; }
    .concept-box { animation: slideIn 0.8s ease-out; animation-fill-mode: both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { animation: slideInLeft 0.6s ease-out; animation-fill-mode: both; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle" class="title">Permutations &amp; Combinations</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Pascal's Triangle -->
  <g data-narration="Pascal's Triangle showing binomial coefficients C(n,r) for n=0 to 6" class="triangle-cell" style="animation-delay: 0.2s">
    <text x="210" y="55" font-family="Arial" font-size="12" fill="#555" text-anchor="middle">Pascal's Triangle (Binomial Coefficients)</text>
    <!-- Row 0 -->
    <rect x="198" y="62" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="210" y="77" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    
    <!-- Row 1 -->
    <rect x="174" y="86" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="222" y="86" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="186" y="101" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    <text x="234" y="101" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    
    <!-- Row 2 -->
    <rect x="150" y="110" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="198" y="110" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="246" y="110" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="162" y="125" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    <text x="210" y="125" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle" class="pulse-element">2</text>
    <text x="258" y="125" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    
    <!-- Row 3 -->
    <rect x="126" y="134" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="174" y="134" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="222" y="134" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="270" y="134" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="138" y="149" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    <text x="186" y="149" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle" class="pulse-element">3</text>
    <text x="234" y="149" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle" class="pulse-element">3</text>
    <text x="282" y="149" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    
    <!-- Row 4 -->
    <rect x="102" y="158" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="150" y="158" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="198" y="158" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="246" y="158" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="294" y="158" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="114" y="173" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    <text x="162" y="173" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">4</text>
    <text x="210" y="173" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle" class="pulse-element">6</text>
    <text x="258" y="173" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">4</text>
    <text x="306" y="173" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    
    <!-- Row 5 -->
    <rect x="78" y="182" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="126" y="182" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="174" y="182" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="222" y="182" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="270" y="182" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="318" y="182" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="90" y="197" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    <text x="138" y="197" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">5</text>
    <text x="186" y="197" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">10</text>
    <text x="234" y="197" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">10</text>
    <text x="282" y="197" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">5</text>
    <text x="330" y="197" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    
    <!-- Row 6 -->
    <rect x="54" y="206" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="102" y="206" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="150" y="206" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="198" y="206" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="246" y="206" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="294" y="206" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <rect x="342" y="206" width="24" height="20" fill="#fff" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="66" y="221" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
    <text x="114" y="221" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">6</text>
    <text x="162" y="221" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">15</text>
    <text x="210" y="221" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">20</text>
    <text x="258" y="221" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">15</text>
    <text x="306" y="221" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">6</text>
    <text x="354" y="221" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">1</text>
  </g>
  
  <!-- Permutations Box -->
  <g data-narration="Permutations: Order matters. Formula P(n,r) = n!/(n-r)!" class="concept-box" style="animation-delay: 0.5s">
    <rect x="10" y="240" width="190" height="75" fill="url(#boxGradient1)" stroke="#e67e22" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="105" y="258" font-family="Arial" font-size="14" font-weight="bold" fill="#d35400" text-anchor="middle">PERMUTATIONS</text>
    <text x="105" y="276" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">Order Matters!</text>
    <text x="105" y="292" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">P(n,r) = n!/(n-r)!</text>
    <text x="105" y="306" font-family="Arial" font-size="9" fill="#777" text-anchor="middle">Example: 3! = 6 arrangements</text>
  </g>
  
  <!-- Combinations Box -->
  <g data-narration="Combinations: Order doesn't matter. Formula C(n,r) = n!/(r!(n-r)!)" class="concept-box" style="animation-delay: 0.7s">
    <rect x="220" y="240" width="190" height="75" fill="url(#boxGradient2)" stroke="#27ae60" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="315" y="258" font-family="Arial" font-size="14" font-weight="bold" fill="#1e8449" text-anchor="middle">COMBINATIONS</text>
    <text x="315" y="276" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">Order Doesn't Matter!</text>
    <text x="315" y="292" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">C(n,r) = n!/(r!(n-r)!)</text>
    <text x="315" y="306" font-family="Arial" font-size="9" fill="#777" text-anchor="middle">Example: C(3,1) = 3 choices</text>
  </g>
  
  <!-- Arrow and Relationship -->
  <g data-narration="The relationship between permutations and combinations: P(n,r) = C(n,r) × r!" class="arrow-line" style="animation-delay: 0.9s">
    <text x="210" y="335" font-family="Arial" font-size="11" fill="#34495e" text-anchor="middle" font-style="italic">Relationship:</text>
    <text x="210" y="350" font-family="Arial" font-size="11" fill="#34495e" text-anchor="middle">P(n,r) = C(n,r) × r!</text>
    <text x="210" y="365" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">Dividing by r! removes order</text>
  </g>
  
  <!-- Bottom Formula Reference -->
  <g data-narration="Fundamental Principle of Counting: If m ways for task 1 and n ways for task 2, then m × n ways for both" class="triangle-cell" style="animation-delay: 1.1s">
    <rect x="80" y="375" width="260" height="20" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="210" y="389" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Fundamental Counting: m ways × n ways = m × n ways</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="30" cy="380" r="3" fill="#3498db" opacity="0.5"/>
  <circle cx="390" cy="380" r="3" fill="#e74c3c" opacity="0.5"/>
  <circle cx="30" cy="50" r="3" fill="#9b59b6" opacity="0.5"/>
  <circle cx="390" cy="50" r="3" fill="#27ae60" opacity="0.5"/>
</svg>