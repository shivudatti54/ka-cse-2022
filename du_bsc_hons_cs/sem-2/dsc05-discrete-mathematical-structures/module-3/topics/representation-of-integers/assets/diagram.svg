<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="representation-of-integers">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-180deg) scale(0.5); opacity: 0; }
      to { transform: rotate(0deg) scale(1); opacity: 1; }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: rotateIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .arrow { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text" font-size="20" fill="#2d3748" data-narration="Title: Representation of Integers">Representation of Integers</text>
  
  <!-- Section 1: Positional Number Systems -->
  <g class="section-1" filter="url(#shadow)" data-narration="Positional Number Systems: Binary, Octal, Hexadecimal bases">
    <rect x="10" y="50" width="120" height="75" rx="8" fill="#fff" stroke="#cbd5e0" stroke-width="1.5"/>
    <text x="70" y="68" text-anchor="middle" class="title-text" font-size="13" fill="#4a5568">Positional Systems</text>
    <text x="20" y="88" class="label" font-size="11" fill="#718096">Binary (base-2): 0,1</text>
    <text x="20" y="103" class="label" font-size="11" fill="#718096">Octal (base-8): 0-7</text>
    <text x="20" y="118" class="label" font-size="11" fill="#718096">Hex (base-16): 0-F</text>
  </g>
  
  <!-- Arrow from Section 1 to 2 -->
  <path class="arrow" d="M135 87 L165 87" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- Section 2: Signed Representations -->
  <g class="section-2" filter="url(#shadow)" data-narration="Signed Number Representations: Sign-Magnitude, One's Complement, Two's Complement">
    <rect x="165" y="50" width="130" height="75" rx="8" fill="#fff" stroke="#cbd5e0" stroke-width="1.5"/>
    <text x="230" y="68" text-anchor="middle" class="title-text" font-size="13" fill="#4a5568">Signed Numbers</text>
    <text x="175" y="88" class="label" font-size="11" fill="#718096">Sign-Magnitude</text>
    <text x="175" y="103" class="label" font-size="11" fill="#718096">One's Complement</text>
    <text x="175" y="118" class="label" font-size="11" fill="#718096">Two's Complement</text>
  </g>
  
  <!-- Section 3: Formula -->
  <g class="section-3" filter="url(#shadow)" data-narration="General positional notation formula">
    <rect x="305" y="50" width="105" height="75" rx="8" fill="#fff" stroke="#cbd5e0" stroke-width="1.5"/>
    <text x="357" y="68" text-anchor="middle" class="title-text" font-size="12" fill="#4a5568">General Form</text>
    <text x="315" y="90" class="label" font-size="10" fill="#718096">dₙ₋₁ × rⁿ⁻¹ +</text>
    <text x="315" y="105" class="label" font-size="10" fill="#718096">... + d₀ × r⁰</text>
    <text x="315" y="120" class="label" font-size="10" fill="#718096">0 ≤ dᵢ ≤ r-1</text>
  </g>
  
  <!-- Section 4: Two's Complement Circle -->
  <g class="section-4" data-narration="Two's Complement Circle showing 0-127 positive and -128 to -1 negative with wrap-around">
    <circle cx="210" cy="270" r="90" fill="url(#circleGradient)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="210" cy="270" r="65" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    
    <!-- Positive numbers 0-127 -->
    <text x="210" y="225" text-anchor="middle" class="label pulse-anim" font-size="11" fill="#fff" font-weight="bold">0 to 127</text>
    <text x="210" y="238" text-anchor="middle" class="label" font-size="10" fill="#e2e8f0">Positive</text>
    
    <!-- Negative numbers -128 to -1 -->
    <text x="210" y="325" text-anchor="middle" class="label pulse-anim" font-size="11" fill="#fff" font-weight="bold">-128 to -1</text>
    <text x="210" y="338" text-anchor="middle" class="label" font-size="10" fill="#e2e8f0">Negative</text>
    
    <!-- Arrow showing wrap-around -->
    <path d="M270 230 Q310 200 310 270 Q310 340 270 320" stroke="#fbd38d" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
    <defs>
      <marker id="arrowhead2" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0, 8 2.5, 0 5" fill="#fbd38d"/>
      </marker>
    </defs>
    <text x="295" y="275" class="label" font-size="9" fill="#fbd38d" transform="rotate(90, 295, 275)">Wrap</text>
    
    <!-- Center indicator -->
    <circle cx="210" cy="270" r="8" fill="#fff" opacity="0.3"/>
    <text x="210" y="274" text-anchor="middle" class="label" font-size="10" fill="#4a5568">8-bit</text>
    
    <!-- Key values -->
    <circle cx="155" cy="240" r="4" fill="#fbd38d"/>
    <text x="140" y="244" class="label" font-size="8" fill="#fff">+127</text>
    <circle cx="265" cy="240" r="4" fill="#fbd38d"/>
    <text x="270" y="244" class="label" font-size="8" fill="#fff">-128</text>
  </g>
  
  <!-- Legend / Key -->
  <g class="section-4" data-narration="Visual legend showing binary digit weights">
    <rect x="10" y="340" width="400" height="50" rx="6" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="210" y="358" text-anchor="middle" class="title-text" font-size="12" fill="#4a5568">Key Concept</text>
    <text x="30" y="378" class="label" font-size="10" fill="#718096">Two's complement enables:</text>
    <text x="200" y="378" class="label" font-size="10" fill="#718096">Single arithmetic unit for</text>
    <text x="350" y="378" class="label" font-size="10" fill="#718096">No dual zero problem</text>
    
    <!-- Small icons -->
    <circle cx="18" cy="375" r="3" fill="#667eea"/>
    <circle cx="188" cy="375" r="3" fill="#667eea"/>
    <circle cx="338" cy="375" r="3" fill="#667eea"/>
  </g>
</svg>