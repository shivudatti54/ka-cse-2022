<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="division-integers-primes-gcd" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8f0f4"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe0cc"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cce6cc"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6f5"/>
      <stop offset="100%" style="stop-color:#ccccdd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section2 { animation: slideInUp 0.8s ease-out 0.4s both; }
    .section3 { animation: slideInRight 0.8s ease-out 0.6s both; }
    .section4 { animation: slideInLeft 0.8s ease-out 0.8s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .box { filter: url(#shadow); }
    .highlight { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Division, Primes &amp; GCD</text>
  <line x1="60" y1="48" x2="360" y2="48" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Division Algorithm Section -->
  <g class="section1" data-narration="The Division Algorithm shows a = bq + r">
    <rect x="20" y="65" width="170" height="95" rx="8" fill="url(#boxGradient1)" stroke="#e67e22" stroke-width="2" class="box"/>
    <text x="105" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#d35400">Division Algorithm</text>
    <text x="105" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2c3e50">a = bq + r</text>
    <text x="105" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">0 ≤ r &lt; b</text>
  </g>
  
  <!-- Visual Block Representation -->
  <g class="section2" data-narration="Visual: 67 = 12 × 5 + 7">
    <rect x="30" y="175" width="150" height="60" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <!-- Quotient blocks (5 groups of 12) -->
    <rect x="35" y="180" width="20" height="50" rx="3" fill="#3498db" opacity="0.8" class="pulse"/>
    <rect x="58" y="180" width="20" height="50" rx="3" fill="#3498db" opacity="0.8"/>
    <rect x="81" y="180" width="20" height="50" rx="3" fill="#3498db" opacity="0.8"/>
    <rect x="104" y="180" width="20" height="50" rx="3" fill="#3498db" opacity="0.8"/>
    <rect x="127" y="180" width="20" height="50" rx="3" fill="#3498db" opacity="0.8"/>
    <!-- Remainder block -->
    <rect x="152" y="200" width="20" height="30" rx="3" fill="#e74c3c" opacity="0.8"/>
    <text x="105" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">5 × 12 + 7</text>
  </g>
  
  <!-- Values Box -->
  <g class="section3" data-narration="Values: a=67, b=12, q=5, r=7">
    <rect x="200" y="65" width="200" height="95" rx="8" fill="url(#boxGradient2)" stroke="#27ae60" stroke-width="2" class="box"/>
    <text x="300" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1e8449">Example Values</text>
    <line x1="215" y1="100" x2="385" y2="100" stroke="#27ae60" stroke-width="1" opacity="0.5"/>
    <text x="220" y="120" font-family="Georgia, serif" font-size="13" fill="#2c3e50">Dividend (a): <tspan font-weight="bold">67</tspan></text>
    <text x="220" y="140" font-family="Georgia, serif" font-size="13" fill="#2c3e50">Divisor (b): <tspan font-weight="bold">12</tspan></text>
    <text x="320" y="120" font-family="Georgia, serif" font-size="13" fill="#2c3e50">Quotient (q): <tspan font-weight="bold">5</tspan></text>
    <text x="320" y="140" font-family="Georgia, serif" font-size="13" fill="#2c3e50">Remainder (r): <tspan font-weight="bold">7</tspan></text>
  </g>
  
  <!-- Prime Numbers Section -->
  <g class="section4" data-narration="Prime numbers have exactly two divisors">
    <rect x="20" y="270" width="115" height="110" rx="8" fill="url(#boxGradient3)" stroke="#8e44ad" stroke-width="2" class="box"/>
    <text x="77" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#6c3483">Prime Numbers</text>
    <line x1="30" y1="300" x2="124" y2="300" stroke="#8e44ad" stroke-width="1" opacity="0.5"/>
    <text x="77" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">Integers &gt; 1</text>
    <text x="77" y="338" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">Only divisible</text>
    <text x="77" y="353" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">by 1 and itself</text>
    <text x="77" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#8e44ad" class="highlight">2, 3, 5, 7, 11...</text>
  </g>
  
  <!-- GCD Section -->
  <g class="section3" data-narration="GCD is the largest common divisor">
    <rect x="145" y="270" width="145" height="110" rx="8" fill="url(#boxGradient1)" stroke="#c0392b" stroke-width="2" class="box"/>
    <text x="217" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#922b21">Greatest Common Divisor</text>
    <line x1="160" y1="300" x2="275" y2="300" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
    <text x="217" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">Largest integer that</text>
    <text x="217" y="336" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">divides both without</text>
    <text x="217" y="352" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">remainder</text>
    <text x="217" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#c0392b">gcd(a, b)</text>
  </g>
  
  <!-- Arrow from Division to GCD -->
  <g class="section2" data-narration="Euclidean algorithm connects division and GCD">
    <path d="M295 270 L295 260 L310 260 L310 250 L320 250 L320 270" fill="none" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="310" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7f8c8d">Euclidean Algorithm</text>
  </g>
  
  <!-- Example GCD -->
  <g class="section1" data-narration="Example: gcd(48, 18) = 6">
    <rect x="300" y="270" width="105" height="110" rx="8" fill="url(#boxGradient2)" stroke="#16a085" stroke-width="2" class="box"/>
    <text x="352" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#0e6655">GCD Example</text>
    <line x1="310" y1="300" x2="395" y2="300" stroke="#16a085" stroke-width="1" opacity="0.5"/>
    <text x="352" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">gcd(48, 18)</text>
    <text x="352" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#16a085">=</text>
    <text x="352" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#16a085">6</text>
  </g>
  
  <!-- Bottom note -->
  <text x="210" y="392" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7f8c8d" class="section4">Foundation of Number Theory &amp; Cryptography</text>
</svg>