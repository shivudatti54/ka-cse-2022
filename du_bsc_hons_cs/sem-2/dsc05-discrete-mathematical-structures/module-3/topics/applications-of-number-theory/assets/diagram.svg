<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="applications-of-number-theory">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ec8e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95d5b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c49090;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcc9f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4a4d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c485;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5c4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#85a9b8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5 { animation: slideIn 0.6s ease-out 1.0s forwards; opacity: 0; }
    .box6 { animation: slideInUp 0.6s ease-out 1.2s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .title-box { animation: pulse 3s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .label { font-size: 12px; fill: #2c3e50; }
    .detail { font-size: 11px; fill: #5a6c7d; }
    .math { font-size: 12px; fill: #1a252f; font-style: italic; }
    .key-text { font-size: 10px; fill: #34495e; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <g class="title">
    <rect x="10" y="10" width="400" height="45" rx="8" fill="#34495e" filter="url(#shadow)" />
    <text x="210" y="35" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Applications of Number Theory</text>
    <text x="210" y="48" text-anchor="middle" fill="#bdc3c7" font-size="11">RSA Key Generation Flow</text>
  </g>
  
  <!-- Step 1: Prime Selection -->
  <g class="box1" data-narration="Step 1: Select two large prime numbers p and q. These primes should be randomly chosen and have similar magnitude for security.">
    <rect x="20" y="70" width="115" height="55" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)" />
    <text x="77" y="88" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Step 1</text>
    <text x="77" y="104" text-anchor="middle" fill="#1a252f" font-size="11">Select Primes</text>
    <text x="77" y="118" text-anchor="middle" fill="#34495e" font-size="10">p, q (large)</text>
  </g>
  
  <!-- Arrow 1 -->
  <path class="arrow" d="M145 97 L165 97" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  
  <!-- Step 2: Compute n -->
  <g class="box2" data-narration="Step 2: Compute n = p × q. This is the RSA modulus, used in both public and private keys.">
    <rect x="175" y="70" width="115" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)" />
    <text x="232" y="88" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Step 2</text>
    <text x="232" y="104" text-anchor="middle" fill="#1a252f" font-size="11">Compute n</text>
    <text x="232" y="118" text-anchor="middle" fill="#34495e" font-size="10">n = p × q</text>
  </g>
  
  <!-- Arrow 2 -->
  <path class="arrow" d="M300 97 L320 97" stroke="#7f8c8d" stroke-width="2" fill="none" />
  
  <!-- Step 3: Calculate φ(n) -->
  <g class="box3" data-narration="Step 3: Calculate Euler's totient φ(n) = (p-1)(q-1). This counts integers less than n that are coprime to n.">
    <rect x="330" y="70" width="80" height="55" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)" />
    <text x="370" y="88" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Step 3</text>
    <text x="370" y="104" text-anchor="middle" fill="#1a252f" font-size="11">φ(n)</text>
    <text x="370" y="118" text-anchor="middle" fill="#34495e" font-size="10">(p-1)(q-1)</text>
  </g>
  
  <!-- Vertical Arrow from Step 2 -->
  <path class="arrow" d="M232 125 L232 155" stroke="#7f8c8d" stroke-width="2" fill="none" />
  
  <!-- Step 4: Choose e -->
  <g class="box4" data-narration="Step 4: Choose public exponent e such that 1 &lt; e &lt; φ(n) and gcd(e, φ(n)) = 1. Commonly e = 65537.">
    <rect x="175" y="165" width="115" height="55" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)" />
    <text x="232" y="183" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Step 4</text>
    <text x="232" y="199" text-anchor="middle" fill="#1a252f" font-size="11">Choose e</text>
    <text x="232" y="213" text-anchor="middle" fill="#34495e" font-size="10">gcd(e,φ(n))=1</text>
  </g>
  
  <!-- Arrow to Step 5 -->
  <path class="arrow" d="M232 220 L232 250" stroke="#7f8c8d" stroke-width="2" fill="none" />
  
  <!-- Step 5: Compute d -->
  <g class="box5" data-narration="Step 5: Compute private exponent d such that d × e ≡ 1 (mod φ(n)). This is done using the Extended Euclidean Algorithm.">
    <rect x="175" y="260" width="115" height="55" rx="6" fill="url(#boxGradient5)" filter="url(#shadow)" />
    <text x="232" y="278" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Step 5</text>
    <text x="232" y="294" text-anchor="middle" fill="#1a252f" font-size="11">Compute d</text>
    <text x="232" y="308" text-anchor="middle" fill="#34495e" font-size="10">d·e ≡ 1 (mod φ)</text>
  </g>
  
  <!-- Horizontal Arrow to keys -->
  <path class="arrow" d="M300 287 L340 287" stroke="#7f8c8d" stroke-width="2" fill="none" />
  
  <!-- Step 6: Keys -->
  <g class="box6" data-narration="Step 6: The RSA key pair is complete. Public key (n, e) for encryption, Private key (n, d) for decryption.">
    <rect x="320" y="250" width="90" height="75" rx="6" fill="url(#boxGradient6)" filter="url(#shadow)" />
    <text x="365" y="268" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Keys</text>
    <line x1="330" y1="275" x2="400" y2="275" stroke="#7f8c8d" stroke-width="1" />
    <text x="365" y="288" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="bold">Public Key</text>
    <text x="365" y="300" text-anchor="middle" fill="#34495e" font-size="9">(n, e)</text>
    <text x="365" y="312" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="bold">Private Key</text>
    <text x="365" y="324" text-anchor="middle" fill="#34495e" font-size="9">(n, d)</text>
  </g>
  
  <!-- Modular Arithmetic Concept Box -->
  <g data-narration="Modular arithmetic is the foundation of RSA. The security relies on the difficulty of factoring large numbers.">
    <rect x="20" y="330" width="130" height="60" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" />
    <text x="85" y="347" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Key Concept</text>
    <text x="85" y="362" text-anchor="middle" fill="#34495e" font-size="9">Modular Arithmetic</text>
    <text x="85" y="376" text-anchor="middle" fill="#7f8c8d" font-size="8">a ≡ b (mod n)</text>
    <text x="85" y="386" text-anchor="middle" fill="#7f8c8d" font-size="8">if n | (a - b)</text>
  </g>
  
  <!-- Discrete Log Concept Box -->
  <g data-narration="Discrete Logarithm problem: Given g, h, and n, find x such that g^x ≡ h (mod n). This is computationally hard.">
    <rect x="160" y="330" width="150" height="60" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" />
    <text x="235" y="347" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Security Basis</text>
    <text x="235" y="362" text-anchor="middle" fill="#34495e" font-size="9">Discrete Logarithm</text>
    <text x="235" y="376" text-anchor="middle" fill="#7f8c8d" font-size="8">Find x: g^x ≡ h (mod n)</text>
    <text x="235" y="386" text-anchor="middle" fill="#e74c3c" font-size="8">Computationally Hard</text>
  </g>
  
  <!-- Arrowheads marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d" />
    </marker>
  </defs>
</svg>