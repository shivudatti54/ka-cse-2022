<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="modular-exponentiation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5ddf0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#888" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c5282; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .math { font-family: 'Courier New', monospace; font-size: 15px; fill: #1a365d; font-weight: bold; }
    .box { fill: #fff; stroke: #4299e1; stroke-width: 2; rx: 8; }
    .arrow { stroke: #e53e3e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .highlight { fill: #48bb78; }
    .section-1 { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
    .section-2 { animation: fadeInUp 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: fadeInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: fadeInUp 0.6s ease-out 0.9s forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Modular Exponentiation</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#4299e1" stroke-width="2"/>
  
  <!-- Section 1: Definition Box -->
  <g class="section-1" data-narration="Definition of modular exponentiation: computing a^b mod n">
    <rect x="20" y="55" width="180" height="55" class="box" filter="url(#shadow)"/>
    <text x="30" y="75" class="label" font-weight="bold">Definition:</text>
    <text x="30" y="95" class="math">a<tspan baseline-shift="super" font-size="10">b</tspan> mod n = remainder</text>
  </g>
  
  <!-- Section 2: Example Box -->
  <g class="section-2" data-narration="Example: computing 3^13 mod 5 using binary exponentiation">
    <rect x="220" y="55" width="180" height="55" class="box" filter="url(#shadow)"/>
    <text x="230" y="75" class="label" font-weight="bold">Example: 3<tspan baseline-shift="super" font-size="10">13</tspan> mod 5</text>
    <text x="230" y="95" class="detail">13 = 8 + 4 + 1 (binary: 1101)</text>
  </g>
  
  <!-- Binary Decomposition -->
  <g class="section-2" data-narration="Binary representation of exponent 13: 1101">
    <rect x="220" y="120" width="180" height="45" fill="#faf5ff" stroke="#9f7aea" stroke-width="2" rx="6"/>
    <text x="230" y="142" class="label">Binary: 1 1 0 1</text>
    <text x="230" y="158" class="detail">13 = 8 + 4 + 0 + 1</text>
  </g>
  
  <!-- Section 3: Square and Multiply Flow -->
  <g class="section-3" data-narration="Square and multiply algorithm: for each bit, square the result, multiply if bit is 1">
    <rect x="20" y="120" width="180" height="90" class="box" filter="url(#shadow)"/>
    <text x="30" y="142" class="label" font-weight="bold">Exponentiation by Squaring</text>
    <text x="30" y="160" class="detail">For each binary digit:</text>
    <text x="30" y="178" class="detail">• Square: result = result<tspan baseline-shift="super" font-size="9">2</tspan> mod n</text>
    <text x="30" y="196" class="detail">• Multiply if bit = 1</text>
    <text x="30" y="208" class="detail">  result = result × base mod n</text>
  </g>
  
  <!-- Tree Structure for 13 -->
  <g class="section-3" data-narration="Binary tree showing the decomposition of exponent 13">
    <line x1="110" y1="220" x2="70" y2="250" stroke="#e53e3e" stroke-width="1.5"/>
    <line x1="110" y1="220" x2="150" y2="250" stroke="#e53e3e" stroke-width="1.5"/>
    <circle cx="110" cy="215" r="4" class="pulse-element" fill="#e53e3e"/>
    <text x="100" y="230" class="detail" fill="#e53e3e">13</text>
    
    <line x1="70" y1="255" x2="55" y2="285" stroke="#3182ce" stroke-width="1.5"/>
    <line x1="70" y1="255" x2="85" y2="285" stroke="#3182ce" stroke-width="1.5"/>
    <circle cx="70" cy="250" r="4" fill="#3182ce"/>
    <text x="62" y="268" class="detail" fill="#3182ce">6</text>
    
    <line x1="150" y1="255" x2="135" y2="285" stroke="#38a169" stroke-width="1.5"/>
    <line x1="150" y1="255" x2="165" y2="285" stroke="#38a169" stroke-width="1.5"/>
    <circle cx="150" cy="250" r="4" fill="#38a169"/>
    <text x="142" y="268" class="detail" fill="#38a169">3</text>
    
    <text x="45" y="300" class="detail" fill="#805ad5">6 = 2×3</text>
    <text x="125" y="300" class="detail" fill="#805ad5">3 = 2×1+1</text>
    
    <text x="25" y="320" class="detail" fill="#718096">Bit pattern: 1 1 0 1</text>
    <text x="25" y="335" class="detail" fill="#718096">Start: r=1, base=3</text>
  </g>
  
  <!-- Section 4: Calculation Steps -->
  <g class="section-4" data-narration="Step by step calculation showing the square and multiply operations">
    <rect x="200" y="175" width="200" height="95" fill="#f0fff4" stroke="#48bb78" stroke-width="2" rx="6"/>
    <text x="210" y="195" class="label" font-weight="bold">Calculation Steps:</text>
    <text x="210" y="215" class="detail">1. Bit 1 (1): r=1×3 mod 5=<tspan class="math" fill="#c53030">3</tspan></text>
    <text x="210" y="232" class="detail">2. Bit 1 (1): r=3<tspan baseline-shift="super" font-size="9">2</tspan> mod 5=<tspan class="math" fill="#c53030">4</tspan></text>
    <text x="210" y="249" class="detail">3. Bit 0 (0): r=4<tspan baseline-shift="super" font-size="9">2</tspan> mod 5=<tspan class="math" fill="#c53030">1</tspan></text>
    <text x="210" y="266" class="detail">4. Bit 1 (1): r=1×3 mod 5=<tspan class="math" fill="#c53030">3</tspan></text>
  </g>
  
  <!-- Final Result Box -->
  <g class="section-4" data-narration="Final result of the modular exponentiation">
    <rect x="200" y="280" width="200" height="45" fill="#fff5f5" stroke="#c53030" stroke-width="2" rx="6"/>
    <text x="210" y="305" class="label" font-weight="bold">Result: 3<tspan baseline-shift="super" font-size="10">13</tspan> mod 5 = </text>
    <text x="320" y="305" class="math" fill="#c53030" font-size="20">3</text>
  </g>
  
  <!-- Euler's Theorem Note -->
  <g class="section-4" data-narration="Euler's theorem provides the mathematical foundation for modular exponentiation">
    <rect x="20" y="280" width="170" height="50" fill="#fef3c7" stroke="#d69e2e" stroke-width="2" rx="6"/>
    <text x="30" y="300" class="label" font-weight="bold">Euler's Theorem:</text>
    <text x="30" y="318" class="detail">a<tspan baseline-shift="super" font-size="9">φ(n)</tspan> ≡ 1 (mod n)</text>
    <text x="30" y="333" class="detail" fill="#744210">when gcd(a,n)=1</text>
  </g>
  
  <!-- Arrows showing flow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e"/>
    </marker>
  </defs>
  
  <!-- Decorative arrows -->
  <path d="M 115 115 Q 115 100 175 90" stroke="#a0aec0" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  <path d="M 205 90 Q 250 85 215 120" stroke="#a0aec0" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
</svg>