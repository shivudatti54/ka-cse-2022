<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="quantifiers-rules-of-inference" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="universalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="existentialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inferenceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="modusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .symbol { font-family: 'Times New Roman', serif; font-size: 28px; font-style: italic; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #3498db; stroke-width: 2; fill: none; stroke-dasharray: 100; animation: drawArrow 1s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-4 { animation: fadeIn 0.8s ease-out 0.6s forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Quantifiers &amp; Rules of Inference</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Section 1: Universal Quantifier -->
  <g class="section-1" data-narration="Universal Quantifier (∀) states that a property holds for ALL elements in the domain">
    <rect x="20" y="55" width="120" height="90" fill="url(#universalGrad)" class="box" filter="url(#shadow)"/>
    <text x="80" y="75" text-anchor="middle" class="label">Universal</text>
    <text x="80" y="100" text-anchor="middle" class="symbol">∀x</text>
    <text x="80" y="118" text-anchor="middle" class="detail">"For All x"</text>
    <text x="80" y="135" text-anchor="middle" class="detail">P(x) is true</text>
  </g>
  
  <!-- Section 2: Existential Quantifier -->
  <g class="section-2" data-narration="Existential Quantifier (∃) states that there EXISTS at least one element with the property">
    <rect x="280" y="55" width="120" height="90" fill="url(#existentialGrad)" class="box" filter="url(#shadow)"/>
    <text x="340" y="75" text-anchor="middle" class="label">Existential</text>
    <text x="340" y="100" text-anchor="middle" class="symbol">∃x</text>
    <text x="340" y="118" text-anchor="middle" class="detail">"There exists x"</text>
    <text x="340" y="135" text-anchor="middle" class="detail">P(x) is true</text>
  </g>
  
  <!-- Arrow connecting quantifiers -->
  <path d="M150 100 Q 210 100 270 100" class="arrow" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="210" y="95" text-anchor="middle" class="detail" fill="#9b59b6">Quantifiers</text>
  
  <!-- Section 3: Modus Ponens (Key Rule of Inference) -->
  <g class="section-3" data-narration="Modus Ponens: If P→Q is true and P is true, then Q must be true">
    <rect x="20" y="160" width="180" height="110" fill="url(#inferenceGrad)" class="box" filter="url(#shadow)"/>
    <text x="110" y="182" text-anchor="middle" class="label">Modus Ponens</text>
    
    <!-- Premises and Conclusion -->
    <rect x="30" y="195" width="160" height="25" fill="white" fill-opacity="0.5" rx="4"/>
    <text x="110" y="212" text-anchor="middle" class="detail">Premise 1: P → Q</text>
    
    <rect x="30" y="225" width="160" height="25" fill="white" fill-opacity="0.5" rx="4"/>
    <text x="110" y="242" text-anchor="middle" class="detail">Premise 2: P</text>
    
    <line x1="40" y1="258" x2="180" y2="258" stroke="#3498db" stroke-width="1"/>
    <text x="110" y="275" text-anchor="middle" class="label">∴ Conclusion: Q</text>
  </g>
  
  <!-- Section 4: Modus Tollens -->
  <g class="section-4" data-narration="Modus Tollens: If P→Q is true and Q is false, then P must be false">
    <rect x="220" y="160" width="180" height="110" fill="url(#modusGrad)" class="box" filter="url(#shadow)"/>
    <text x="310" y="182" text-anchor="middle" class="label" fill="white">Modus Tollens</text>
    
    <rect x="230" y="195" width="160" height="25" fill="white" fill-opacity="0.4" rx="4"/>
    <text x="310" y="212" text-anchor="middle" class="detail">Premise 1: P → Q</text>
    
    <rect x="230" y="225" width="160" height="25" fill="white" fill-opacity="0.4" rx="4"/>
    <text x="310" y="242" text-anchor="middle" class="detail">Premise 2: ¬Q</text>
    
    <line x1="240" y1="258" x2="380" y2="258" stroke="white" stroke-width="1"/>
    <text x="310" y="275" text-anchor="middle" class="label" fill="white">∴ Conclusion: ¬P</text>
  </g>
  
  <!-- Arrow from quantifiers to inference -->
  <path d="M80 145 Q 80 155 80 160" class="arrow" stroke="#3498db" stroke-width="2"/>
  <path d="M340 145 Q 340 155 340 160" class="arrow" stroke="#3498db" stroke-width="2"/>
  
  <!-- Section 5: Quantifier Negation Rules -->
  <g class="section-4" data-narration="Negation rules: ¬∀xP(x) ≡ ∃x¬P(x) and ¬∃xP(x) ≡ ∀x¬P(x)">
    <rect x="20" y="285" width="250" height="55" fill="#fff3e0" class="box" filter="url(#shadow)"/>
    <text x="145" y="305" text-anchor="middle" class="label" fill="#e67e22">Quantifier Negation</text>
    <text x="145" y="325" text-anchor="middle" class="detail">¬∀x P(x) ≡ ∃x ¬P(x)</text>
    <text x="145" y="338" text-anchor="middle" class="detail">¬∃x P(x) ≡ ∀x ¬P(x)</text>
  </g>
  
  <!-- Section 6: Universal Instantiation & Generalization -->
  <g class="section-4" data-narration="Universal Instantiation allows deriving P(c) from ∀x P(x). Universal Generalization allows ∀x P(x) from P(c) for arbitrary c">
    <rect x="280" y="285" width="120" height="55" fill="#e8f5e9" class="box" filter="url(#shadow)"/>
    <text x="340" y="305" text-anchor="middle" class="label" fill="#27ae60">Inference Rules</text>
    <text x="340" y="322" text-anchor="middle" class="detail">∀x P(x) ⊢ P(c)</text>
    <text x="340" y="335" text-anchor="middle" class="detail">P(c) ⊢ ∀x P(x)*</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="5" fill="#3498db" class="pulse-element"/>
  <circle cx="50" cy="380" r="3" fill="#9b59b6"/>
  <circle cx="70" cy="380" r="4" fill="#e74c3c"/>
  <circle cx="90" cy="380" r="3" fill="#f39c12"/>
  
  <!-- Arrow to show flow -->
  <path d="M110 275 L 110 285" class="arrow" stroke="#9b59b6" stroke-width="2"/>
  <text x="110" y="300" text-anchor="middle" class="detail" fill="#9b59b6" font-size="10">Apply to</text>
  <text x="110" y="312" text-anchor="middle" class="detail" fill="#9b59b6" font-size="10">predicates</text>
</svg>