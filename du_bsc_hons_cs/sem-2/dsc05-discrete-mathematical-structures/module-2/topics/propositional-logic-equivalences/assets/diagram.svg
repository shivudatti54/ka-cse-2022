<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="propositional-logic-equivalences" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #777; }
    .example { font-family: 'Courier New', monospace; font-size: 11px; fill: #2c3e50; }
    .box { rx: 8; ry: 8; filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .circuit-line { stroke: #34495e; stroke-width: 2; fill: none; }
    .gate { stroke: #2c3e50; stroke-width: 2; fill: #ecf0f1; }
    .dot { fill: #e74c3c; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="anim-fade" data-narration="Title introducing propositional logic equivalences">
    <text x="210" y="30" text-anchor="middle" class="title">Propositional Logic</text>
    <text x="210" y="50" text-anchor="middle" class="title" style="font-size: 18px; color: #7f8c8d;">Equivalences</text>
  </g>
  
  <!-- Section 1: Tautology -->
  <g class="anim-slide" style="animation-delay: 0.2s" data-narration="Tautology - a proposition always true">
    <rect x="10" y="65" width="120" height="75" class="box" fill="url(#boxGradient1)"/>
    <text x="70" y="82" text-anchor="middle" class="section-title">Tautology (T)</text>
    <text x="70" y="100" text-anchor="middle" class="detail">Always True</text>
    <text x="20" y="120" class="example">p ∨ ¬p</text>
    <circle cx="70" cy="130" r="15" class="anim-pulse" fill="#27ae60"/>
    <text x="70" y="135" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TRUE</text>
  </g>
  
  <!-- Section 2: Contradiction -->
  <g class="anim-slide" style="animation-delay: 0.4s" data-narration="Contradiction - a proposition always false">
    <rect x="150" y="65" width="120" height="75" class="box" fill="url(#boxGradient2)"/>
    <text x="210" y="82" text-anchor="middle" class="section-title">Contradiction (F)</text>
    <text x="210" y="100" text-anchor="middle" class="detail">Always False</text>
    <text x="160" y="120" class="example">p ∧ ¬p</text>
    <circle cx="210" cy="130" r="15" fill="#e74c3c"/>
    <text x="210" y="135" text-anchor="middle" fill="white" font-size="10" font-weight="bold">FALSE</text>
  </g>
  
  <!-- Section 3: Contingency -->
  <g class="anim-slide" style="animation-delay: 0.6s" data-narration="Contingency - truth depends on component values">
    <rect x="290" y="65" width="120" height="75" class="box" fill="url(#boxGradient3)"/>
    <text x="350" y="82" text-anchor="middle" class="section-title">Contingency</text>
    <text x="350" y="100" text-anchor="middle" class="detail">Varies with p, q</text>
    <text x="300" y="120" class="example">p → q</text>
    <rect x="335" y="122" width="30" height="16" rx="3" fill="#3498db"/>
    <text x="350" y="133" text-anchor="middle" fill="white" font-size="9">VARIES</text>
  </g>
  
  <!-- De Morgan's Law Visualization -->
  <g class="anim-fade" style="animation-delay: 0.8s" data-narration="De Morgans Law - AND gate with negation equals OR with inverted inputs">
    <text x="210" y="160" text-anchor="middle" class="section-title" style="font-size: 12px;">De Morgan's Law Visualization</text>
    
    <!-- Original Circuit: NOT (A AND B) -->
    <g transform="translate(30, 175)">
      <text x="50" y="0" text-anchor="middle" class="detail" style="font-size: 10px;">NOT (A ∧ B)</text>
      <!-- Input A -->
      <line x1="10" y1="30" x2="50" y2="30" class="circuit-line"/>
      <text x="5" y="34" class="label" style="font-size: 10px;">A</text>
      <!-- Input B -->
      <line x1="10" y1="50" x2="50" y2="50" class="circuit-line"/>
      <text x="5" y="54" class="label" style="font-size: 10px;">B</text>
      <!-- AND Gate -->
      <path d="M50 25 L70 25 L90 40 L70 55 L50 55 Z" class="gate"/>
      <text x="65" y="43" class="label" style="font-size: 9px; fill: #2c3e50;">∧</text>
      <!-- Output to NOT -->
      <line x1="90" y1="40" x2="110" y2="40" class="circuit-line"/>
      <!-- NOT Gate -->
      <circle cx="118" cy="40" r="8" class="gate"/>
      <text x="118" y="44" class="label" style="font-size: 10px;">¬</text>
      <line x1="126" y1="40" x2="140" y2="40" class="circuit-line"/>
      <circle cx="140" cy="40" r="3" class="dot"/>
    </g>
    
    <!-- Arrow -->
    <path d="M185 220 L205 220 L200 215 M205 220 L200 225" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <text x="195" y="215" text-anchor="middle" class="detail" style="font-size: 9px;">=</text>
    
    <!-- Equivalent Circuit: NOT A OR NOT B -->
    <g transform="translate(220, 175)">
      <text x="50" y="0" text-anchor="middle" class="detail" style="font-size: 10px;">(¬A) ∨ (¬B)</text>
      <!-- NOT A -->
      <line x1="10" y1="25" x2="25" y2="25" class="circuit-line"/>
      <circle cx="32" cy="25" r="6" class="gate"/>
      <text x="32" y="28" class="label" style="font-size: 8px;">¬</text>
      <text x="5" y="29" class="label" style="font-size: 10px;">A</text>
      <!-- NOT B -->
      <line x1="10" y1="55" x2="25" y2="55" class="circuit-line"/>
      <circle cx="32" cy="55" r="6" class="gate"/>
      <text x="32" y="58" class="label" style="font-size: 8px;">¬</text>
      <text x="5" y="59" class="label" style="font-size: 10px;">B</text>
      <!-- OR Gate -->
      <path d="M45 20 L60 20 Q75 40 60 60 L45 60 Z" class="gate"/>
      <text x="55" y="43" class="label" style="font-size: 9px; fill: #2c3e50;">∨</text>
      <!-- Connections -->
      <line x1="38" y1="25" x2="45" y2="25" class="circuit-line"/>
      <line x1="38" y1="55" x2="45" y2="55" class="circuit-line"/>
      <!-- Output -->
      <line x1="75" y1="40" x2="95" y2="40" class="circuit-line"/>
      <circle cx="95" cy="40" r="3" class="dot"/>
    </g>
  </g>
  
  <!-- Key Equivalences Box -->
  <g class="anim-slide" style="animation-delay: 1s" data-narration="Key logical equivalence laws">
    <rect x="10" y="265" width="195" height="120" class="box" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
    <text x="107" y="285" text-anchor="middle" class="section-title" style="font-size: 12px;">Key Equivalences</text>
    
    <text x="20" y="305" class="label" style="font-size: 11px;">• De Morgan's:</text>
    <text x="25" y="320" class="example" style="font-size: 10px;">¬(p ∧ q) ≡ ¬p ∨ ¬q</text>
    
    <text x="20" y="340" class="label" style="font-size: 11px;">• Implication:</text>
    <text x="25" y="355" class="example" style="font-size: 10px;">p → q ≡ ¬p ∨ q</text>
    
    <text x="20" y="375" class="label" style="font-size: 11px;">• Distributive:</text>
    <text x="25" y="388" class="example" style="font-size: 10px;">p ∧ (q ∨ r) ≡ (p∧q) ∨ (p∧r)</text>
  </g>
  
  <!-- Applications Box -->
  <g class="anim-slide" style="animation-delay: 1.2s" data-narration="Practical applications of logical equivalences">
    <rect x="215" y="265" width="195" height="120" class="box" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
    <text x="312" y="285" text-anchor="middle" class="section-title" style="font-size: 12px;">Applications</text>
    
    <circle cx="235" cy="310" r="8" fill="#3498db" class="anim-pulse"/>
    <text x="250" y="314" class="label" style="font-size: 11px;">Digital Circuits</text>
    <text x="235" y="328" class="detail" style="font-size: 9px;">Gate minimization</text>
    
    <circle cx="235" cy="350" r="8" fill="#9b59b6" class="anim-pulse"/>
    <text x="250" y="354" class="label" style="font-size: 11px;">Programming</text>
    <text x="235" y="368" class="detail" style="font-size: 9px;">Code optimization</text>
    
    <circle cx="235" cy="370" r="8" fill="#e67e22" class="anim-pulse"/>
    <text x="250" y="374" class="label" style="font-size: 11px;">Database</text>
    <text x="235" y="388" class="detail" style="font-size: 9px;">Query optimization</text>
  </g>
  
  <!-- Truth Table Summary -->
  <g class="anim-fade" style="animation-delay: 1.4s" data-narration="Summary of proposition categories based on truth values">
    <rect x="10" y="325" width="85" height="60" rx="5" fill="#2c3e50" opacity="0.1"/>
    <text x="52" y="345" text-anchor="middle" class="detail" style="font-size: 10px; fill: #2c3e50;">Category Summary</text>
    <text x="20" y="362" class="detail" style="font-size: 9px; fill: #2c3e50;">Tautology: All True</text>
    <text x="20" y="375" class="detail" style="font-size: 9px; fill: #2c3e50;">Contradiction: All False</text>
    <text x="20" y="388" class="detail" style="font-size: 9px; fill: #2c3e50;">Contingency: Mixed</text>
  </g>
</svg>