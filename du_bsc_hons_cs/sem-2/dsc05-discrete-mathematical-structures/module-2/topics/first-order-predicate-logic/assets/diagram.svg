<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="first-order-predicate-logic">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8fcf4"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff"/>
      <stop offset="100%" style="stop-color:#99ccff"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2d5f1"/>
      <stop offset="100%" style="stop-color:#c4a8dc"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d5f5e8"/>
      <stop offset="100%" style="stop-color:#a8dcb8"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9999"/>
      <stop offset="100%" style="stop-color:#ff6666"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: 'Segoe UI', Arial, sans-serif; }
    .box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.4s; }
    .box3 { animation-delay: 0.6s; }
    .rule-box { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .arrow1 { animation-delay: 0.8s; }
    .arrow2 { animation-delay: 1s; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c5282" font-family="Segoe UI, Arial, sans-serif">
    First-Order Predicate Logic
  </text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4299e1" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- Predicate Box -->
  <g class="box box1" data-narration="Predicates are functions that return true or false, like P(x) representing 'x is prime'">
    <rect x="20" y="55" width="115" height="70" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="77" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c5282" class="label">Predicates</text>
    <text x="77" y="92" text-anchor="middle" font-size="11" fill="#2c5282" class="label">P(x), Q(x,y)</text>
    <text x="77" y="107" text-anchor="middle" font-size="10" fill="#4a5568" class="label">Propositional</text>
    <text x="77" y="118" text-anchor="middle" font-size="10" fill="#4a5568" class="label">Functions</text>
  </g>
  
  <!-- Variables Box -->
  <g class="box box2" data-narration="Variables are placeholders that can be replaced by domain elements">
    <rect x="152" y="55" width="115" height="70" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="209" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#553c9a" class="label">Variables</text>
    <text x="209" y="92" text-anchor="middle" font-size="11" fill="#553c9a" class="label">x, y, z</text>
    <text x="209" y="107" text-anchor="middle" font-size="10" fill="#4a5568" class="label">Placeholders for</text>
    <text x="209" y="118" text-anchor="middle" font-size="10" fill="#4a5568" class="label">domain values</text>
  </g>
  
  <!-- Constants Box -->
  <g class="box box3" data-narration="Constants are fixed values from the domain">
    <rect x="284" y="55" width="115" height="70" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="341" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#276749" class="label">Constants</text>
    <text x="341" y="92" text-anchor="middle" font-size="11" fill="#276749" class="label">a, b, c</text>
    <text x="341" y="107" text-anchor="middle" font-size="10" fill="#4a5568" class="label">Fixed values</text>
    <text x="341" y="118" text-anchor="middle" font-size="10" fill="#4a5568" class="label">from domain</text>
  </g>
  
  <!-- Quantifier Negation Rules Section -->
  <text x="210" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d3748" font-family="Segoe UI, Arial, sans-serif" class="title" style="animation-delay: 0.5s">
    Quantifier Negation Rules
  </text>
  
  <!-- Rule 1: ¬∀x P(x) → ∃x ¬P(x) -->
  <g class="box rule-box" data-narration="Negation of universal quantifier transforms to existential with negated predicate">
    <rect x="30" y="165" width="170" height="55" rx="6" fill="#fff5f5" stroke="#fc8181" stroke-width="2" filter="url(#shadow)"/>
    <text x="115" y="182" text-anchor="middle" font-size="12" fill="#c53030" class="label" font-weight="bold">Negated Universal</text>
    <text x="115" y="200" text-anchor="middle" font-size="13" fill="#2d3748" class="label">¬∀x P(x) ⟶ ∃x ¬P(x)</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow arrow1" data-narration="Transformation rule: NOT FOR ALL becomes EXISTS NOT">
    <path d="M 210 180 L 210 195" stroke="#e53e3e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e"/>
      </marker>
    </defs>
  </g>
  
  <!-- Rule 2: ¬∃x P(x) → ∀x ¬P(x) -->
  <g class="box rule-box" data-narration="Negation of existential quantifier transforms to universal with negated predicate" style="animation-delay: 0.7s">
    <rect x="220" y="165" width="170" height="55" rx="6" fill="#fff5f5" stroke="#fc8181" stroke-width="2" filter="url(#shadow)"/>
    <text x="305" y="182" text-anchor="middle" font-size="12" fill="#c53030" class="label" font-weight="bold">Negated Existential</text>
    <text x="305" y="200" text-anchor="middle" font-size="13" fill="#2d3748" class="label">¬∃x P(x) ⟶ ∀x ¬P(x)</text>
  </g>
  
  <!-- Connectors -->
  <g class="arrow arrow2" data-narration="Both rules show how quantifiers and negation interact">
    <line x1="115" y1="220" x2="115" y2="250" stroke="#4a5568" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="305" y1="220" x2="305" y2="250" stroke="#4a5568" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="115" y1="250" x2="305" y2="250" stroke="#4a5568" stroke-width="2"/>
    <polygon points="305,250 295,245 295,255" fill="#4a5568"/>
  </g>
  
  <!-- Applications Section -->
  <g class="box" data-narration="Applications in Computer Science: Databases, AI, Formal Verification" style="animation-delay: 1s">
    <rect x="20" y="260" width="380" height="60" rx="8" fill="#faf5ff" stroke="#b794f4" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b46c1" class="label">Applications</text>
    <text x="210" y="298" text-anchor="middle" font-size="11" fill="#4a5568" class="label">SQL Queries • Prolog • Automated Theorem Proving • Formal Specification</text>
  </g>
  
  <!-- Example Section -->
  <g class="box" data-narration="Example showing predicate logic translation" style="animation-delay: 1.2s">
    <rect x="20" y="330" width="380" height="55" rx="8" fill="#f0fff4" stroke="#68d391" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749" class="label">Example</text>
    <text x="210" y="368" text-anchor="middle" font-size="11" fill="#2d3748" class="label">P(x): "x is prime" → ∀x(P(x) → x≥2) | ∃x P(x) = "There exists a prime number"</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="40" cy="370" r="4" fill="#4299e1" opacity="0.5"/>
  <circle cx="380" cy="30" r="6" fill="#9f7aea" opacity="0.4"/>
  <circle cx="15" cy="45" r="3" fill="#48bb78" opacity="0.5"/>
  <circle cx="400" cy="370" r="5" fill="#ed8936" opacity="0.4"/>
</svg>