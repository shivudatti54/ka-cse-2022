<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="proof-methods-mathematical-induction">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8" />
      <stop offset="100%" style="stop-color:#8bb8d8" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8" />
      <stop offset="100%" style="stop-color:#98c888" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8" />
      <stop offset="100%" style="stop-color:#d8b888" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes dominoFall {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(30deg); }
      100% { transform: rotate(45deg); }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .formula { font-family: 'Times New Roman', serif; font-size: 14px; fill: #333; font-style: italic; }
    .box { filter: url(#shadow); }
    .base-case { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .ind-hyp { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .ind-step { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .domino-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    .conclusion { animation: fadeIn 0.6s ease-out 1.2s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Mathematical Induction</text>
  
  <!-- Base Case Box -->
  <g class="base-case" data-narration="The base case establishes that P(1) is true, proving the statement holds for the initial value.">
    <rect class="box" x="15" y="55" width="110" height="75" rx="8" fill="url(#boxGradient1)" stroke="#6a9ab8" stroke-width="2"/>
    <text x="70" y="75" text-anchor="middle" class="label">Base Case</text>
    <text x="70" y="95" text-anchor="middle" class="detail">Prove P(1) is true</text>
    <text x="70" y="115" text-anchor="middle" class="formula">P(1) = ✓</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow-anim" data-narration="Arrow showing the logical flow from base case to inductive hypothesis.">
    <path d="M130 92 L155 92" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Inductive Hypothesis Box -->
  <g class="ind-hyp" data-narration="The inductive hypothesis assumes that P(k) is true for some arbitrary value k.">
    <rect class="box" x="160" y="55" width="110" height="75" rx="8" fill="url(#boxGradient2)" stroke="#7a9a68" stroke-width="2"/>
    <text x="215" y="75" text-anchor="middle" class="label">Inductive</text>
    <text x="215" y="90" text-anchor="middle" class="label">Hypothesis</text>
    <text x="215" y="110" text-anchor="middle" class="formula">Assume P(k) = ✓</text>
    <text x="215" y="125" text-anchor="middle" class="detail">(k ≥ 1)</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow-anim" data-narration="Arrow showing the logical flow from hypothesis to proving the inductive step.">
    <path d="M275 92 L300 92" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Inductive Step Box -->
  <g class="ind-step" data-narration="The inductive step proves that if P(k) is true, then P(k+1) must also be true.">
    <rect class="box" x="305" y="55" width="110" height="75" rx="8" fill="url(#boxGradient3)" stroke="#b89868" stroke-width="2"/>
    <text x="360" y="75" text-anchor="middle" class="label">Inductive Step</text>
    <text x="360" y="95" text-anchor="middle" class="formula">Prove P(k) → P(k+1)</text>
    <text x="360" y="115" text-anchor="middle" class="detail">Show P(k+1) = ✓</text>
  </g>
  
  <!-- Domino Effect Visualization -->
  <g class="domino-anim" data-narration="The domino effect visualizes how proving each step creates a chain reaction, establishing truth for all natural numbers.">
    <rect x="30" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="55" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="80" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="105" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="130" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="155" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="180" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="205" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="230" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="255" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="280" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="305" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="330" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="355" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
    <rect x="380" y="165" width="20" height="50" rx="2" fill="#5a8aa8" stroke="#3a6a88" stroke-width="1.5"/>
  </g>
  
  <!-- Domino Label -->
  <text x="210" y="235" text-anchor="middle" class="detail" style="font-size: 13px;">Domino Effect: P(1) → P(2) → P(3) → ... → P(n)</text>
  
  <!-- Conclusion Box -->
  <g class="conclusion" data-narration="Conclusion: By mathematical induction, P(n) is true for all natural numbers n ≥ 1.">
    <rect class="box" x="100" y="255" width="220" height="50" rx="8" fill="#f8f4e8" stroke="#b8a868" stroke-width="2"/>
    <text x="210" y="278" text-anchor="middle" class="label" style="font-size: 13px;">Conclusion</text>
    <text x="210" y="295" text-anchor="middle" class="detail">P(n) is true for all n ≥ 1</text>
  </g>
  
  <!-- Formula Box -->
  <g class="conclusion" data-narration="The formal principle of mathematical induction combining base case and inductive step.">
    <rect class="box" x="60" y="320" width="300" height="55" rx="8" fill="#f0f8ff" stroke="#7899aa" stroke-width="2"/>
    <text x="210" y="345" text-anchor="middle" class="formula" style="font-size: 15px;">[P(1) ∧ ∀k(P(k) → P(k+1))] → ∀n P(n)</text>
  </g>
  
  <!-- Step Indicators -->
  <circle cx="70" cy="145" r="12" fill="#5a8aa8" class="base-case"/>
  <text x="70" y="149" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">1</text>
  
  <circle cx="215" cy="145" r="12" fill="#6a9a68" class="ind-hyp"/>
  <text x="215" y="149" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">2</text>
  
  <circle cx="360" cy="145" r="12" fill="#b89858" class="ind-step"/>
  <text x="360" y="149" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">3</text>
  
</svg>