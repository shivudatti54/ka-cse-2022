<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="generating-functions">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8f0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 24px; font-weight: bold; fill: #2d3748; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #4a5568; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #718096; }
    .equation { font-family: 'Times New Roman', serif; font-size: 16px; fill: #2d3748; }
    .section-box { fill: #fff; stroke: #e2e8f0; stroke-width: 1.5; rx: 8; }
    .accent-box { fill: #fff; stroke: url(#accentGrad); stroke-width: 2; rx: 8; }
    .arrow { stroke: #667eea; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .animated { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .seq-term { font-family: 'Courier New', monospace; font-size: 13px; fill: #667eea; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title Section -->
  <g data-narration="Title introducing the topic of Generating Functions">
    <text x="210" y="35" text-anchor="middle" class="title animated">Generating Functions</text>
    <line x1="100" y1="45" x2="320" y2="45" stroke="url(#accentGrad)" stroke-width="2" class="animated" style="animation-delay: 0.3s"/>
  </g>
  
  <!-- Definition Box -->
  <g data-narration="Definition of Ordinary Generating Function with formula" transform="translate(20, 60)" class="slide-in" style="animation-delay: 0.2s">
    <rect class="accent-box" width="380" height="60" filter="url(#shadow)"/>
    <text x="190" y="22" text-anchor="middle" class="label" style="font-weight: 600; fill: #667eea;">Ordinary Generating Function</text>
    <text x="190" y="48" text-anchor="middle" class="equation">G(x) = Σ aₙxⁿ = a₀ + a₁x + a₂x² + ...</text>
  </g>
  
  <!-- Sequence Representation -->
  <g data-narration="Visual representation of sequence terms as polynomial coefficients" transform="translate(20, 140)" class="slide-in" style="animation-delay: 0.4s">
    <rect class="section-box" width="180" height="70" filter="url(#shadow)"/>
    <text x="15" y="20" class="label" style="font-weight: 600;">Sequence {aₙ}</text>
    <text x="15" y="40" class="seq-term">a₀, a₁, a₂, a₃, a₄, ...</text>
    <text x="15" y="58" class="detail">Encoded as coefficients</text>
  </g>
  
  <!-- Arrow to GF -->
  <g transform="translate(215, 165)">
    <path d="M0,0 L25,0" class="arrow" style="stroke-dasharray: 100; animation: drawLine 0.8s ease-out forwards; animation-delay: 0.6s"/>
  </g>
  
  <!-- GF Representation -->
  <g data-narration="The generating function encodes sequence as polynomial" transform="translate(255, 140)" class="slide-in" style="animation-delay: 0.5s">
    <rect class="section-box" width="145" height="70" filter="url(#shadow)"/>
    <text x="15" y="20" class="label" style="font-weight: 600;">G(x)</text>
    <text x="15" y="40" class="seq-term">a₀ + a₁x + a₂x² + ...</text>
    <text x="15" y="58" class="detail">Formal power series</text>
  </g>
  
  <!-- Fibonacci Example Title -->
  <g data-narration="Fibonacci sequence example demonstrating recurrence to algebraic equation" transform="translate(20, 230)" class="slide-in" style="animation-delay: 0.7s">
    <text x="15" y="15" class="label" style="font-weight: 600; fill: #764ba2;">Example: Fibonacci Sequence</text>
    <line x1="15" y1="22" x2="120" y2="22" stroke="#764ba2" stroke-width="1.5"/>
  </g>
  
  <!-- Recurrence Box -->
  <g data-narration="Fibonacci recurrence relation: F(n) = F(n-1) + F(n-2)" transform="translate(20, 255)" class="slide-in" style="animation-delay: 0.8s">
    <rect class="section-box" width="185" height="50" filter="url(#shadow)"/>
    <text x="15" y="18" class="detail">Recurrence:</text>
    <text x="15" y="38" class="equation" style="font-size: 14px;">Fₙ = Fₙ₋₁ + Fₙ₋₂</text>
    <text x="15" y="48" class="detail">with F₀=0, F₁=1</text>
  </g>
  
  <!-- Arrow to equation -->
  <g transform="translate(220, 280)">
    <path d="M0,0 L20,0" class="arrow" style="stroke-dasharray: 100; animation: drawLine 0.8s ease-out forwards; animation-delay: 1s"/>
  </g>
  
  <!-- GF Equation Box -->
  <g data-narration="The generating function equation derived from recurrence" transform="translate(255, 255)" class="pulse" style="animation-delay: 1.2s">
    <rect class="accent-box" width="145" height="50" filter="url(#shadow)"/>
    <text x="15" y="20" class="detail">GF Equation:</text>
    <text x="15" y="38" class="equation" style="font-size: 14px;">G(x) = x + xG(x) + x²G(x)</text>
  </g>
  
  <!-- Solution Arrow -->
  <g transform="translate(215, 320)">
    <path d="M0,0 L25,15" class="arrow" style="stroke-dasharray: 100; animation: drawLine 0.8s ease-out forwards; animation-delay: 1.4s"/>
  </g>
  
  <!-- Solution Box -->
  <g data-narration="Solving gives the closed form generating function" transform="translate(20, 345)" class="slide-in" style="animation-delay: 1.3s">
    <rect class="section-box" width="380" height="45" filter="url(#shadow)"/>
    <text x="15" y="18" class="detail">Solving:</text>
    <text x="15" y="35" class="equation">G(x) = x / (1 - x - x²) = Σ Fₙxⁿ</text>
    <text x="280" y="35" class="detail" style="fill: #667eea;">Coefficients give Fibonacci!</text>
  </g>
  
  <!-- Decorative dots representing sequence -->
  <g transform="translate(30, 175)" class="animated" style="animation-delay: 1.5s">
    <circle cx="0" cy="0" r="4" fill="#667eea" opacity="0.6"/>
    <circle cx="15" cy="0" r="4" fill="#764ba2" opacity="0.6"/>
    <circle cx="30" cy="0" r="4" fill="#667eea" opacity="0.6"/>
    <circle cx="45" cy="0" r="4" fill="#764ba2" opacity="0.6"/>
    <circle cx="60" cy="0" r="4" fill="#667eea" opacity="0.6"/>
  </g>
</svg>