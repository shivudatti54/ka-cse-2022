<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="recurrence-relations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8d4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes treeGrow {
      from { transform: scaleY(0); opacity: 0; }
      to { transform: scaleY(1); opacity: 1; }
    }
    @keyframes arrowDraw {
      from { stroke-dashoffset: 30; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: 'Times New Roman', serif; font-size: 15px; fill: #2c3e50; font-style: italic; }
    .section-box { rx: 8; ry: 8; filter: url(#shadow); }
    .node { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
    .arrow { stroke: #e74c3c; stroke-width: 2; fill: none; stroke-dasharray: 5,3; }
    .title-anim { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .box1-anim { animation: fadeIn 0.8s ease-out 0.2s forwards; opacity: 0; }
    .box2-anim { animation: fadeIn 0.8s ease-out 0.4s forwards; opacity: 0; }
    .box3-anim { animation: fadeIn 0.8s ease-out 0.6s forwards; opacity: 0; }
    .tree-anim { animation: treeGrow 0.8s ease-out 0.8s forwards; transform-origin: center bottom; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Recurrence Relations</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#3498db" stroke-width="2" class="title-anim"/>
  
  <!-- Section 1: Definition -->
  <g class="box1-anim" data-narration="Definition of recurrence relations and general form">
    <rect x="15" y="55" width="185" y="80" height="75" class="section-box" fill="url(#boxGradient1)"/>
    <rect x="15" y="55" width="185" height="75" rx="8" ry="8" fill="url(#boxGradient1)" stroke="#3498db" stroke-width="1"/>
    <text x="25" y="72" class="label">Definition</text>
    <text x="25" y="90" class="detail">Sequence defined recursively:</text>
    <text x="25" y="108" class="formula">aₙ = f(aₙ₋₁, aₙ₋₂, ..., aₙ₋ₖ)</text>
    <text x="25" y="122" class="detail">k = order, needs k base cases</text>
  </g>
  
  <!-- Section 2: Fibonacci Example -->
  <g class="box2-anim" data-narration="Fibonacci sequence as classic example">
    <rect x="220" y="55" width="185" height="75" rx="8" ry="8" class="section-box" fill="url(#boxGradient2)"/>
    <rect x="220" y="55" width="185" height="75" rx="8" ry="8" fill="url(#boxGradient2)" stroke="#27ae60" stroke-width="1"/>
    <text x="230" y="72" class="label">Fibonacci Sequence</text>
    <text x="230" y="90" class="formula">Fₙ = Fₙ₋₁ + Fₙ₋₂</text>
    <text x="230" y="108" class="detail">Base: F₀ = 0, F₁ = 1</text>
    <text x="230" y="122" class="detail">Order: 2 (linear homogeneous)</text>
  </g>
  
  <!-- Section 3: Types -->
  <g class="box3-anim" data-narration="Types of recurrence relations">
    <rect x="15" y="145" width="390" height="55" rx="8" ry="8" class="section-box" fill="url(#boxGradient3)"/>
    <rect x="15" y="145" width="390" height="55" rx="8" ry="8" fill="url(#boxGradient3)" stroke="#f39c12" stroke-width="1"/>
    <text x="25" y="162" class="label">Key Types:</text>
    <text x="110" y="162" class="detail">Linear vs Non-Linear</text>
    <text x="110" y="178" class="detail">Homogeneous vs Non-Homogeneous</text>
    <text x="280" y="162" class="detail">Constant vs Variable Coeff.</text>
    <text x="280" y="178" class="detail">Order (k)</text>
  </g>
  
  <!-- Section 4: Merge Sort Recurrence Tree -->
  <g class="tree-anim" data-narration="Merge Sort recurrence tree showing divide and conquer">
    <text x="210" y="215" text-anchor="middle" class="label">Merge Sort Recurrence Tree</text>
    
    <!-- Root node -->
    <g transform="translate(210, 240)" class="pulse-anim">
      <circle r="22" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
      <text y="5" text-anchor="middle" fill="white" font-size="11" font-weight="bold">n</text>
    </g>
    
    <!-- Level 1 -->
    <g>
      <line x1="210" y1="262" x2="145" y2="295" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="210" y1="262" x2="275" y2="295" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
      <circle cx="145" cy="310" r="18" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
      <text x="145" y="314" text-anchor="middle" fill="white" font-size="10" font-weight="bold">n/2</text>
      <circle cx="275" cy="310" r="18" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
      <text x="275" y="314" text-anchor="middle" fill="white" font-size="10" font-weight="bold">n/2</text>
    </g>
    
    <!-- Level 2 -->
    <g>
      <line x1="145" y1="328" x2="105" y2="355" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="145" y1="328" x2="185" y2="355" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="275" y1="328" x2="235" y2="355" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="275" y1="328" x2="315" y2="355" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
      <circle cx="105" cy="368" r="14" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
      <text x="105" y="371" text-anchor="middle" fill="white" font-size="9">n/4</text>
      <circle cx="185" cy="368" r="14" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
      <text x="185" y="371" text-anchor="middle" fill="white" font-size="9">n/4</text>
      <circle cx="235" cy="368" r="14" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
      <text x="235" y="371" text-anchor="middle" fill="white" font-size="9">n/4</text>
      <circle cx="315" cy="368" r="14" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
      <text x="315" y="371" text-anchor="middle" fill="white" font-size="9">n/4</text>
    </g>
    
    <!-- Cost labels -->
    <text x="345" y="250" class="detail" fill="#e74c3c">Cost: n</text>
    <text x="345" y="310" class="detail" fill="#e74c3c">Cost: n</text>
    <text x="345" y="368" class="detail" fill="#e74c3c">Cost: n</text>
    
    <!-- Base case indicator -->
    <rect x="85" y="385" width="250" height="12" rx="4" ry="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="210" y="394" text-anchor="middle" class="detail">Base Case: T(1) = Θ(1)</text>
  </g>
  
  <!-- Arrow showing recurrence relationship -->
  <g class="box3-anim">
    <path d="M 55 205 Q 55 225 55 235" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key insight box -->
  <g class="tree-anim">
    <rect x="15" y="305" width="60" height="30" rx="4" ry="4" fill="#e74c3c" opacity="0.9"/>
    <text x="45" y="320" text-anchor="middle" fill="white" font-size="10" font-weight="bold">T(n) = 2T(n/2) + Θ(n)</text>
    <text x="45" y="352" text-anchor="middle" class="detail" fill="#7f8c8d">Divide → Conquer → Combine</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="400" cy="30" r="8" fill="#3498db" opacity="0.3"/>
  <circle cx="20" cy="380" r="12" fill="#9b59b6" opacity="0.2"/>
  <circle cx="380" cy="380" r="15" fill="#27ae60" opacity="0.2"/>
  
</svg>