<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="linear-recurrence-constant-coefficients" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe0cc"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cceacc"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6eaf5"/>
      <stop offset="100%" style="stop-color:#ccd4e8"/>
    </linearGradient>
    <linearGradient id="treeNodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5fa8d3"/>
      <stop offset="100%" style="stop-color:#3d7ebf"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes growDown {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .equation { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c3e50; }
    .term { font-family: 'Courier New', monospace; font-size: 11px; fill: #555; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .tree-edge { stroke: #888; stroke-width: 1.5; transform-origin: top; }
    .box { rx: 8; ry: 8; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Linear Recurrence</text>
  <text x="210" y="46" text-anchor="middle" class="title fade-in" style="font-size: 18px;">Constant Coefficients</text>
  
  <!-- Section 1: Definition Box -->
  <g class="slide-in" style="animation-delay: 0.3s;">
    <rect x="10" y="60" width="125" height="75" fill="url(#boxGradient1)" class="box"/>
    <text x="20" y="78" class="section-title">Definition</text>
    <text x="20" y="95" class="term">a_n = c₁aₙ₋₁ + c₂aₙ₋₂</text>
    <text x="20" y="110" class="term">+ ... + cₖaₙ₋ₖ + f(n)</text>
    <text x="20" y="125" class="label" style="font-size:10px;">Linear with constants</text>
  </g>
  
  <!-- Section 2: Order -->
  <g class="slide-in" style="animation-delay: 0.5s;">
    <rect x="145" y="60" width="125" height="75" fill="url(#boxGradient2)" class="box"/>
    <text x="155" y="78" class="section-title">Order = k</text>
    <text x="155" y="95" class="term">Fibonacci: k=2</text>
    <text x="155" y="110" class="term">aₙ = aₙ₋₁ + aₙ₋₂</text>
    <text x="155" y="125" class="label" style="font-size:10px;"># of previous terms</text>
  </g>
  
  <!-- Section 3: Types -->
  <g class="slide-in" style="animation-delay: 0.7s;">
    <rect x="280" y="60" width="130" height="75" fill="url(#boxGradient3)" class="box"/>
    <text x="290" y="78" class="section-title">Types</text>
    <text x="290" y="95" class="term">Homogeneous: f(n)=0</text>
    <text x="290" y="110" class="term">Non-homogeneous: f(n)≠0</text>
    <text x="290" y="125" class="label" style="font-size:10px;">Based on f(n)</text>
  </g>
  
  <!-- Section 4: Fibonacci Recursion Tree -->
  <g class="fade-in" style="animation-delay: 0.9s;">
    <text x="210" y="155" text-anchor="middle" class="section-title">Fibonacci Recursion Tree</text>
    
    <!-- Root -->
    <circle cx="210" cy="175" r="16" fill="url(#treeNodeGradient)" class="pulse"/>
    <text x="210" y="179" text-anchor="middle" fill="white" font-size="10" font-weight="bold">F(n)</text>
    
    <!-- Level 1 edges and nodes -->
    <line x1="210" y1="191" x2="170" y2="220" stroke="#888" stroke-width="1.5"/>
    <line x1="210" y1="191" x2="250" y2="220" stroke="#888" stroke-width="1.5"/>
    
    <circle cx="170" cy="225" r="14" fill="#5fa8d3"/>
    <text x="170" y="229" text-anchor="middle" fill="white" font-size="9" font-weight="bold">F(n-1)</text>
    
    <circle cx="250" cy="225" r="14" fill="#5fa8d3"/>
    <text x="250" y="229" text-anchor="middle" fill="white" font-size="9" font-weight="bold">F(n-2)</text>
    
    <!-- Level 2 edges and nodes -->
    <line x1="170" y1="239" x2="145" y2="265" stroke="#888" stroke-width="1.5"/>
    <line x1="170" y1="239" x2="195" y2="265" stroke="#888" stroke-width="1.5"/>
    
    <line x1="250" y1="239" x2="225" y2="265" stroke="#888" stroke-width="1.5"/>
    <line x1="250" y1="239" x2="275" y2="265" stroke="#888" stroke-width="1.5"/>
    
    <circle cx="145" cy="270" r="11" fill="#7ab8e8"/>
    <text x="145" y="273" text-anchor="middle" fill="white" font-size="8">F(n-2)</text>
    
    <circle cx="195" cy="270" r="11" fill="#7ab8e8"/>
    <text x="195" y="273" text-anchor="middle" fill="white" font-size="8">F(n-3)</text>
    
    <circle cx="225" cy="270" r="11" fill="#7ab8e8"/>
    <text x="225" y="273" text-anchor="middle" fill="white" font-size="8">F(n-3)</text>
    
    <circle cx="275" cy="270" r="11" fill="#7ab8e8"/>
    <text x="275" y="273" text-anchor="middle" fill="white" font-size="8">F(n-4)</text>
    
    <!-- Level 3 (leaves) -->
    <circle cx="130" cy="290" r="9" fill="#a0cceb"/>
    <text x="130" y="293" text-anchor="middle" fill="white" font-size="7">...</text>
    <circle cx="160" cy="290" r="9" fill="#a0cceb"/>
    <text x="160" y="293" text-anchor="middle" fill="white" font-size="7">...</text>
    <circle cx="210" cy="290" r="9" fill="#a0cceb"/>
    <text x="210" y="293" text-anchor="middle" fill="white" font-size="7">...</text>
    <circle cx="260" cy="290" r="9" fill="#a0cceb"/>
    <text x="260" y="293" text-anchor="middle" fill="white" font-size="7">...</text>
    <circle cx="290" cy="290" r="9" fill="#a0cceb"/>
    <text x="290" y="293" text-anchor="middle" fill="white" font-size="7">...</text>
    
    <line x1="145" y1="281" x2="130" y2="282" stroke="#888" stroke-width="1"/>
    <line x1="145" y1="281" x2="160" y2="282" stroke="#888" stroke-width="1"/>
    <line x1="195" y1="281" x2="210" y2="282" stroke="#888" stroke-width="1"/>
    <line x1="225" y1="281" x2="260" y2="282" stroke="#888" stroke-width="1"/>
    <line x1="275" y1="281" x2="290" y2="282" stroke="#888" stroke-width="1"/>
    
    <!-- Exponential growth annotation -->
    <rect x="305" y="175" width="105" height="55" fill="#fff5e6" rx="5" stroke="#e6a366" stroke-width="1"/>
    <text x="357" y="190" text-anchor="middle" class="label" style="font-weight:bold; font-size:11px;">Exponential</text>
    <text x="357" y="205" text-anchor="middle" class="label" style="font-size:10px;">Growth!</text>
    <text x="357" y="220" text-anchor="middle" class="term" style="font-size:9px;">O(2ⁿ) calls</text>
  </g>
  
  <!-- Section 5: Key Formula -->
  <g class="slide-in" style="animation-delay: 1.1s;">
    <rect x="10" y="310" width="190" height="80" fill="#f5f5f5" rx="5" stroke="#ccc" stroke-width="1"/>
    <text x="20" y="330" class="section-title">Characteristic Equation</text>
    <text x="20" y="350" class="equation">r^k = c₁r^(k-1) + c₂r^(k-2)</text>
    <text x="20" y="365" class="equation">+ ... + cₖ₋₁r + cₖ</text>
    <text x="20" y="382" class="label">Solve for roots to get closed form</text>
  </g>
  
  <!-- Section 6: Solution Method -->
  <g class="slide-in" style="animation-delay: 1.3s;">
    <rect x="210" y="310" width="200" height="80" fill="#e6f5e6" rx="5" stroke="#7cb87c" stroke-width="1"/>
    <text x="220" y="330" class="section-title">Solution Steps</text>
    <text x="220" y="348" class="term">1. Find characteristic eq.</text>
    <text x="220" y="362" class="term">2. Solve for roots r₁,r₂,...</text>
    <text x="220" y="376" class="term">3. Build general solution</text>
    <text x="220" y="388" class="term">4. Apply initial conditions</text>
  </g>
  
  <!-- Narration labels -->
  <text x="210" y="398" text-anchor="middle" class="label" style="font-size:10px; fill:#888;" data-narration="Diagram shows the structure of linear recurrences and the exponential nature of recursive computation">Linear recurrences model sequences where each term depends on previous terms</text>
</svg>