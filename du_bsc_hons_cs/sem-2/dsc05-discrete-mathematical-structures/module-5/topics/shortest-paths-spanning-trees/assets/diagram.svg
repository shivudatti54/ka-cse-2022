<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="shortest-paths-spanning-trees" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4472c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sourceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#548235;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="visitedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ed7d31;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .slide-down { animation: slideDown 0.8s ease-out forwards; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.3s; }
    .delay-2 { animation-delay: 0.6s; }
    .delay-3 { animation-delay: 0.9s; }
    .delay-4 { animation-delay: 1.2s; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #2c3e50; }
    .small-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #555; }
    .concept-box { rx: 8; ry: 8; }
    .edge-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #c55a11; }
    .node-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    .dist-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #333; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title Section -->
  <g class="slide-down">
    <text x="210" y="30" text-anchor="middle" class="title">Shortest Paths &amp; Spanning Trees</text>
    <text x="210" y="50" text-anchor="middle" class="small-label">Dijkstra's Algorithm Visualization</text>
  </g>
  
  <!-- Section 1: Graph Representation -->
  <g class="fade-in delay-1" data-narration="A weighted graph with 6 vertices (S, A, B, C, D, T) and directed edges showing weights">
    <text x="30" y="75" class="label" font-weight="bold">Graph G(V,E)</text>
    
    <!-- Edges -->
    <line x1="80" y1="130" x2="140" y2="100" stroke="#999" stroke-width="2" />
    <line x1="140" y1="100" x2="200" y2="80" stroke="#999" stroke-width="2" />
    <line x1="80" y1="130" x2="140" y2="160" stroke="#999" stroke-width="2" />
    <line x1="140" y1="160" x2="200" y2="140" stroke="#999" stroke-width="2" />
    <line x1="140" y1="100" x2="200" y2="160" stroke="#999" stroke-width="2" />
    <line x1="200" y1="80" x2="280" y2="100" stroke="#999" stroke-width="2" />
    <line x1="200" y1="140" x2="280" y2="160" stroke="#999" stroke-width="2" />
    <line x1="280" y1="100" x2="320" y2="140" stroke="#999" stroke-width="2" />
    <line x1="280" y1="160" x2="320" y2="140" stroke="#999" stroke-width="2" />
    
    <!-- Edge weights -->
    <rect x="100" y="105" width="20" height="16" fill="white" rx="3" />
    <text x="110" y="117" text-anchor="middle" class="edge-label">4</text>
    
    <rect x="160" y="82" width="20" height="16" fill="white" rx="3" />
    <text x="170" y="94" text-anchor="middle" class="edge-label">2</text>
    
    <rect x="100" y="138" width="20" height="16" fill="white" rx="3" />
    <text x="110" y="150" text-anchor="middle" class="edge-label">3</text>
    
    <rect x="160" y="142" width="20" height="16" fill="white" rx="3" />
    <text x="170" y="154" text-anchor="middle" class="edge-label">5</text>
    
    <rect x="175" y="115" width="20" height="16" fill="white" rx="3" />
    <text x="185" y="127" text-anchor="middle" class="edge-label">7</text>
    
    <rect x="230" y="82" width="20" height="16" fill="white" rx="3" />
    <text x="240" y="94" text-anchor="middle" class="edge-label">4</text>
    
    <rect x="230" y="142" width="20" height="16" fill="white" rx="3" />
    <text x="240" y="154" text-anchor="middle" class="edge-label">3</text>
    
    <rect x="295" y="115" width="20" height="16" fill="white" rx="3" />
    <text x="305" y="127" text-anchor="middle" class="edge-label">6</text>
    
    <rect x="295" y="155" width="20" height="16" fill="white" rx="3" />
    <text x="305" y="167" text-anchor="middle" class="edge-label">2</text>
    
    <!-- Nodes -->
    <circle cx="80" cy="130" r="20" fill="url(#sourceGradient)" filter="url(#shadow)" />
    <text x="80" y="135" text-anchor="middle" class="node-text">S</text>
    
    <circle cx="140" cy="100" r="18" fill="url(#nodeGradient)" filter="url(#shadow)" />
    <text x="140" y="105" text-anchor="middle" class="node-text">A</text>
    
    <circle cx="140" cy="160" r="18" fill="url(#nodeGradient)" filter="url(#shadow)" />
    <text x="140" y="165" text-anchor="middle" class="node-text">B</text>
    
    <circle cx="200" cy="80" r="18" fill="url(#nodeGradient)" filter="url(#shadow)" />
    <text x="200" y="85" text-anchor="middle" class="node-text">C</text>
    
    <circle cx="200" cy="140" r="18" fill="url(#nodeGradient)" filter="url(#shadow)" />
    <text x="200" y="145" text-anchor="middle" class="node-text">D</text>
    
    <circle cx="320" cy="140" r="20" fill="url(#nodeGradient)" filter="url(#shadow)" />
    <text x="320" y="145" text-anchor="middle" class="node-text">T</text>
  </g>
  
  <!-- Section 2: Priority Queue / Distance Table -->
  <g class="fade-in delay-2" data-narration="Priority queue showing vertices with their current shortest distance from source S">
    <text x="30" y="220" class="label" font-weight="bold">Distance Table</text>
    
    <rect x="30" y="235" width="150" height="90" fill="white" stroke="#5b9bd5" stroke-width="2" rx="5" />
    
    <line x1="30" y1="260" x2="180" y2="260" stroke="#5b9bd5" stroke-width="1" />
    <line x1="80" y1="235" x2="80" y2="325" stroke="#5b9bd5" stroke-width="1" />
    
    <text x="50" y="252" class="small-label" font-weight="bold">Vertex</text>
    <text x="115" y="252" class="small-label" font-weight="bold">Distance</text>
    
    <text x="50" y="280" class="small-label">S</text>
    <text x="115" y="280" class="small-label">0</text>
    
    <text x="50" y="300" class="small-label">A</text>
    <text x="115" y="300" class="small-label">4</text>
    
    <text x="50" y="320" class="small-label">B</text>
    <text x="115" y="320" class="small-label">3</text>
  </g>
  
  <!-- Section 3: Algorithm Steps -->
  <g class="fade-in delay-3" data-narration="Step-by-step execution showing relaxation of edges and vertex finalization">
    <text x="220" y="220" class="label" font-weight="bold">Algorithm Steps</text>
    
    <rect x="220" y="235" width="180" height="130" fill="white" stroke="#70ad47" stroke-width="2" rx="5" />
    
    <text x="235" y="255" class="small-label">1. Initialize: dist[S]=0, others=∞</text>
    <text x="235" y="275" class="small-label">2. Extract S from PQ → Visit A,B</text>
    <text x="235" y="295" class="small-label">3. Extract A (dist=4) → Relax C</text>
    <text x="235" y="315" class="small-label">4. Extract B (dist=3) → Relax D</text>
    <text x="235" y="335" class="small-label">5. Extract T → Shortest path found!</text>
    <text x="235" y="355" class="small-label">Path: S→B→D→T = 8</text>
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g class="slide-in delay-4" data-narration="Key algorithmic concepts: relaxation operation and greedy choice property">
    <rect x="30" y="340" width="170" height="50" class="concept-box" fill="#fce4d6" stroke="#ed7d31" stroke-width="1" />
    <text x="40" y="358" class="small-label" font-weight="bold">Relaxation:</text>
    <text x="40" y="378" class="small-label">if d[u]+w(u,v) &lt; d[v]</text>
    
    <rect x="220" y="375" width="180" height="20" class="concept-box" fill="#e2efda" stroke="#70ad47" stroke-width="1" />
    <text x="230" y="390" class="small-label">Greedy: Always pick minimum distance vertex</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g class="fade-in delay-3">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#5b9bd5" />
      </marker>
    </defs>
    <line x1="185" y1="280" x2="215" y2="280" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Highlight animation for source node -->
  <circle cx="80" cy="130" r="24" fill="none" stroke="#70ad47" stroke-width="2" class="pulse" opacity="0.6" />
  
</svg>