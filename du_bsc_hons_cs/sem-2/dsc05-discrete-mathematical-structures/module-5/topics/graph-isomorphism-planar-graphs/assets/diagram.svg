<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="graph-isomorphism-planar-graphs">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="sectionGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e6f0"/>
    </linearGradient>
    <linearGradient id="sectionGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e8f4"/>
      <stop offset="100%" style="stop-color:#e4d4f0"/>
    </linearGradient>
    <linearGradient id="sectionGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4e8"/>
      <stop offset="100%" style="stop-color:#e4f0d4"/>
    </linearGradient>
    <linearGradient id="sectionGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4e8e8"/>
      <stop offset="100%" style="stop-color:#f0d4d4"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .subtitle { font-family: Georgia, serif; font-size: 12px; fill: #5d6d7e; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1.5s ease-out forwards; }
    .node { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
    .node-alt { fill: #9b59b6; stroke: #8e44ad; stroke-width: 2; }
    .edge { stroke: #7f8c8d; stroke-width: 2; fill: none; }
    .arrow { fill: #e74c3c; }
    .box { fill: white; stroke: #bdc3c7; stroke-width: 1; rx: 5; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="slide-in" data-narration="Main title showing the topic: Graph Isomorphism and Planar Graphs">
    <text x="210" y="30" text-anchor="middle" class="title">Graph Isomorphism</text>
    <text x="210" y="50" text-anchor="middle" class="title">&amp; Planar Graphs</text>
    <text x="210" y="70" text-anchor="middle" class="subtitle">DSC05 - Module 5</text>
  </g>
  
  <!-- Section 1: Graph Isomorphism Definition -->
  <g class="fade-in" data-narration="Definition of Graph Isomorphism: Two graphs are isomorphic if there exists a bijection preserving adjacency">
    <rect x="10" y="85" width="125" height="85" fill="url(#sectionGradient1)" rx="5"/>
    <text x="20" y="100" class="section-title">Graph Isomorphism</text>
    <text x="20" y="118" class="label">Two graphs G₁ and G₂ are</text>
    <text x="20" y="132" class="label">isomorphic if ∃ bijection</text>
    <text x="20" y="146" class="label">f: V₁ → V₂ preserving</text>
    <text x="20" y="160" class="label">adjacency</text>
    <text x="20" y="172" class="detail">Same vertices, edges, degree</text>
  </g>
  
  <!-- Section 2: Isomorphic Graphs Visual -->
  <g class="fade-in" data-narration="Visual example of two isomorphic graphs with different layouts">
    <rect x="145" y="85" width="130" height="85" fill="url(#sectionGradient2)" rx="5"/>
    <text x="155" y="100" class="section-title">Isomorphic Graphs</text>
    <!-- Graph 1 (left in section) -->
    <circle cx="175" cy="130" r="8" class="node pulse"/>
    <circle cx="195" cy="130" r="8" class="node pulse"/>
    <circle cx="175" cy="155" r="8" class="node pulse"/>
    <circle cx="195" cy="155" r="8" class="node pulse"/>
    <line x1="175" y1="130" x2="195" y2="130" class="edge"/>
    <line x1="175" y1="130" x2="175" y2="155" class="edge"/>
    <line x1="195" y1="130" x2="195" y2="155" class="edge"/>
    <line x1="175" y1="155" x2="195" y2="155" class="edge"/>
    <line x1="175" y1="130" x2="195" y2="155" class="edge"/>
    <line x1="195" y1="130" x2="175" y2="155" class="edge"/>
    <!-- Arrow -->
    <path d="M215 142 L235 142" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="225" y="135" class="detail" text-anchor="middle">f</text>
    <!-- Graph 2 (right in section - different layout) -->
    <circle cx="255" cy="120" r="8" class="node-alt pulse"/>
    <circle cx="255" cy="160" r="8" class="node-alt pulse"/>
    <circle cx="230" cy="140" r="8" class="node-alt pulse"/>
    <circle cx="280" cy="140" r="8" class="node-alt pulse"/>
    <line x1="255" y1="120" x2="230" y2="140" class="edge"/>
    <line x1="255" y1="120" x2="280" y2="140" class="edge"/>
    <line x1="255" y1="160" x2="230" y2="140" class="edge"/>
    <line x1="255" y1="160" x2="280" y2="140" class="edge"/>
    <line x1="230" y1="140" x2="280" y2="140" class="edge"/>
  </g>
  
  <!-- Section 3: Planar Graph Definition -->
  <g class="fade-in" data-narration="Definition of Planar Graph: Can be drawn without edge crossings">
    <rect x="285" y="85" width="125" height="85" fill="url(#sectionGradient3)" rx="5"/>
    <text x="295" y="100" class="section-title">Planar Graphs</text>
    <text x="295" y="118" class="label">A graph is planar if it</text>
    <text x="295" y="132" class="label">can be drawn on a plane</text>
    <text x="295" y="146" class="label">without any edges</text>
    <text x="295" y="160" class="label">crossing</text>
    <text x="295" y="174" class="detail">K₅ &amp; K₃,₃ are non-planar</text>
  </g>
  
  <!-- Section 4: K5 Non-Planar Example -->
  <g class="fade-in" data-narration="K5 Complete Graph on 5 vertices - one of two fundamental non-planar graphs">
    <rect x="10" y="180" width="195" height="100" fill="url(#sectionGradient4)" rx="5"/>
    <text x="20" y="198" class="section-title">K₅ - Complete Graph (Non-Planar)</text>
    <!-- K5 Graph -->
    <circle cx="60" cy="250" r="10" class="node"/>
    <circle cx="100" cy="225" r="10" class="node"/>
    <circle cx="140" cy="250" r="10" class="node"/>
    <circle cx="80" cy="270" r="10" class="node"/>
    <circle cx="120" cy="270" r="10" class="node"/>
    <!-- Edges - all possible pairs -->
    <line x1="60" y1="250" x2="100" y2="225" class="edge draw"/>
    <line x1="60" y1="250" x2="140" y2="250" class="edge draw"/>
    <line x1="60" y1="250" x2="80" y2="270" class="edge draw"/>
    <line x1="60" y1="250" x2="120" y2="270" class="edge draw"/>
    <line x1="100" y1="225" x2="140" y2="250" class="edge draw"/>
    <line x1="100" y1="225" x2="80" y2="270" class="edge draw"/>
    <line x1="100" y1="225" x2="120" y2="270" class="edge draw"/>
    <line x1="140" y1="250" x2="80" y2="270" class="edge draw"/>
    <line x1="140" y1="250" x2="120" y2="270" class="edge draw"/>
    <line x1="80" y1="270" x2="120" y2="270" class="edge draw"/>
    <text x="165" y="200" class="label">5 vertices</text>
    <text x="165" y="215" class="label">10 edges</text>
    <text x="165" y="230" class="label">All degree 4</text>
    <text x="165" y="245" class="detail">Every pair connected</text>
  </g>
  
  <!-- Section 5: Properties Box -->
  <g class="fade-in" data-narration="Key properties of isomorphic and planar graphs">
    <rect x="215" y="180" width="195" height="100" fill="white" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="225" y="198" class="section-title">Key Properties</text>
    <circle cx="235" cy="220" r="4" fill="#3498db"/>
    <text x="245" y="223" class="label">Same vertex count</text>
    <circle cx="235" cy="235" r="4" fill="#3498db"/>
    <text x="245" y="238" class="label">Same edge count</text>
    <circle cx="235" cy="250" r="4" fill="#3498db"/>
    <text x="245" y="253" class="label">Same degree sequence</text>
    <circle cx="235" cy="265" r="4" fill="#e74c3c"/>
    <text x="245" y="268" class="label">Euler's formula: v-e+f=2</text>
  </g>
  
  <!-- Section 6: Applications -->
  <g class="fade-in" data-narration="Practical applications of graph isomorphism and planar graphs">
    <rect x="10" y="290" width="400" height="100" fill="url(#sectionGradient1)" rx="5"/>
    <text x="20" y="310" class="section-title">Applications</text>
    <!-- Application items with icons -->
    <g transform="translate(20, 330)">
      <rect x="0" y="0" width="90" height="50" fill="white" rx="3" stroke="#3498db" stroke-width="1"/>
      <text x="45" y="22" class="label" text-anchor="middle">Chemistry</text>
      <text x="45" y="38" class="detail" text-anchor="middle">Molecule matching</text>
    </g>
    <g transform="translate(120, 330)">
      <rect x="0" y="0" width="90" height="50" fill="white" rx="3" stroke="#9b59b6" stroke-width="1"/>
      <text x="45" y="22" class="label" text-anchor="middle">VLSI Design</text>
      <text x="45" y="38" class="detail" text-anchor="middle">Circuit layout</text>
    </g>
    <g transform="translate(220, 330)">
      <rect x="0" y="0" width="90" height="50" fill="white" rx="3" stroke="#27ae60" stroke-width="1"/>
      <text x="45" y="22" class="label" text-anchor="middle">Networks</text>
      <text x="45" y="38" class="detail" text-anchor="middle">Road/Transport</text>
    </g>
    <g transform="translate(320, 330)">
      <rect x="0" y="0" width="90" height="50" fill="white" rx="3" stroke="#e67e22" stroke-width="1"/>
      <text x="45" y="22" class="label" text-anchor="middle">Algorithms</text>
      <text x="45" y="38" class="detail" text-anchor="middle">Optimization</text>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="390" r="3" fill="#bdc3c7" class="pulse"/>
  <circle cx="390" cy="390" r="3" fill="#bdc3c7" class="pulse"/>
  <circle cx="210" cy="390" r="3" fill="#bdc3c7" class="pulse"/>
</svg>