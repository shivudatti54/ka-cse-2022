<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="graph-terminology-weighted-graphs">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="vertexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#41719c"/>
    </linearGradient>
    <linearGradient id="edgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7ac943"/>
      <stop offset="100%" style="stop-color:#5a9e31"/>
    </linearGradient>
    <linearGradient id="weightedEdgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#d4881a"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .sublabel { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .concept-box { fill: #ffffff; stroke: #b8d4e8; stroke-width: 1; rx: 5; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2980b9; }
    .vertex { fill: url(#vertexGradient); }
    .edge { stroke: url(#edgeGradient); stroke-width: 2; fill: none; }
    .weighted-edge { stroke: url(#weightedEdgeGradient); stroke-width: 2; fill: none; }
    .weight-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #d4881a; }
    .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animate-slide { animation: slideIn 0.6s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-draw { stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="animate-fade">
    <text x="210" y="28" text-anchor="middle" class="title">Graph Terminology</text>
    <text x="210" y="48" text-anchor="middle" class="label" style="font-size:14px;">&amp; Weighted Graphs</text>
  </g>
  
  <!-- Section 1: Basic Definitions -->
  <g class="animate-slide" data-narration="Basic graph components: vertices (nodes) and edges (connections)" style="animation-delay: 0.2s">
    <rect x="10" y="60" width="125" height="55" class="concept-box"/>
    <text x="20" y="78" class="section-title">Basic Terms</text>
    <text x="20" y="95" class="label">• Vertex (V): Node/point</text>
    <text x="20" y="108" class="label">• Edge (E): Connection</text>
  </g>
  
  <!-- Section 2: Graph Types -->
  <g class="animate-slide" data-narration="A simple graph has no loops or parallel edges" style="animation-delay: 0.4s">
    <rect x="145" y="60" width="125" height="55" class="concept-box"/>
    <text x="155" y="78" class="section-title">Simple Graph</text>
    <text x="155" y="95" class="label">No loops, no parallel</text>
    <text x="155" y="108" class="label">edges</text>
  </g>
  
  <!-- Section 3: Complete Graph -->
  <g class="animate-slide" data-narration="Complete graph K5: every pair of vertices is connected" style="animation-delay: 0.6s">
    <rect x="280" y="60" width="130" height="55" class="concept-box"/>
    <text x="290" y="78" class="section-title">Complete Graph K5</text>
    <text x="290" y="95" class="label">5 vertices, 10 edges</text>
    <text x="290" y="108" class="label">Degree = 4 each</text>
  </g>
  
  <!-- K5 Graph Visualization -->
  <g transform="translate(100, 200)" data-narration="K5 visualization showing all 10 edges connecting 5 vertices in a pentagon arrangement">
    <!-- Edges -->
    <g class="animate-draw" style="animation-delay: 0.8s">
      <line x1="0" y1="-70" x2="66" y2="-22" class="edge"/>
      <line x1="66" y1="-22" x2="41" y2="56" class="edge"/>
      <line x1="41" y1="56" x2="-41" y2="56" class="edge"/>
      <line x1="-41" y1="56" x2="-66" y2="-22" class="edge"/>
      <line x1="-66" y1="-22" x2="0" y2="-70" class="edge"/>
      <line x1="0" y1="-70" x2="41" y2="56" class="edge"/>
      <line x1="66" y1="-22" x2="-41" y2="56" class="edge"/>
      <line x1="41" y1="56" x2="-66" y2="-22" class="edge"/>
      <line x1="-41" y1="56" x2="0" y2="-70" class="edge"/>
      <line x1="-66" y1="-22" x2="66" y2="-22" class="edge"/>
    </g>
    
    <!-- Vertices -->
    <g class="animate-pulse" style="animation-delay: 1.2s">
      <circle cx="0" cy="-70" r="12" class="vertex"/>
      <text x="0" y="-73" text-anchor="middle" fill="white" font-size="10" font-family="Arial">v1</text>
    </g>
    <g class="animate-pulse" style="animation-delay: 1.3s">
      <circle cx="66" cy="-22" r="12" class="vertex"/>
      <text x="66" y="-19" text-anchor="middle" fill="white" font-size="10" font-family="Arial">v2</text>
    </g>
    <g class="animate-pulse" style="animation-delay: 1.4s">
      <circle cx="41" cy="56" r="12" class="vertex"/>
      <text x="41" y="59" text-anchor="middle" fill="white" font-size="10" font-family="Arial">v3</text>
    </g>
    <g class="animate-pulse" style="animation-delay: 1.5s">
      <circle cx="-41" cy="56" r="12" class="vertex"/>
      <text x="-41" y="59" text-anchor="middle" fill="white" font-size="10" font-family="Arial">v4</text>
    </g>
    <g class="animate-pulse" style="animation-delay: 1.6s">
      <circle cx="-66" cy="-22" r="12" class="vertex"/>
      <text x="-66" y="-19" text-anchor="middle" fill="white" font-size="10" font-family="Arial">v5</text>
    </g>
  </g>
  
  <!-- Weighted Graph Section -->
  <g class="animate-fade" data-narration="Weighted graphs assign numerical values to edges representing costs, distances, or capacities" style="animation-delay: 1.8s">
    <rect x="280" y="165" width="130" height="90" class="concept-box"/>
    <text x="290" y="185" class="section-title">Weighted Graph</text>
    <text x="290" y="205" class="label">Edge weight = cost,</text>
    <text x="290" y="220" class="label">distance, or capacity</text>
    <text x="290" y="240" class="label">Used in: Dijkstra's,</text>
    <text x="290" y="252" class="label">Kruskal's algorithms</text>
  </g>
  
  <!-- Small Weighted Graph Example -->
  <g transform="translate(295, 235)" data-narration="Example: weighted edges showing distance/cost values">
    <line x1="0" y1="0" x2="35" y2="25" class="weighted-edge"/>
    <line x1="35" y1="25" x2="35" y2="-25" class="weighted-edge"/>
    <line x1="35" y1="-25" x2="0" y2="0" class="weighted-edge"/>
    <circle cx="0" cy="0" r="6" class="vertex"/>
    <circle cx="35" cy="25" r="6" class="vertex"/>
    <circle cx="35" cy="-25" r="6" class="vertex"/>
    <text x="22" y="10" class="weight-label">5</text>
    <text x="40" y="5" class="weight-label">3</text>
    <text x="12" y="-18" class="weight-label">7</text>
  </g>
  
  <!-- Formula Section -->
  <g class="animate-slide" data-narration="Mathematical notation: G = (V, E) where V is vertices and E is edges" style="animation-delay: 1s">
    <rect x="10" y="125" width="180" height="35" class="concept-box"/>
    <text x="20" y="145" class="label" style="font-size:13px;">Graph: <tspan font-style="italic">G</tspan> = (<tspan font-style="italic">V</tspan>, <tspan font-style="italic">E</tspan>)</text>
    <text x="130" y="145" class="sublabel">|V| = 5, |E| = 10</text>
  </g>
  
  <!-- Key Properties -->
  <g class="animate-fade" data-narration="Handshaking lemma: sum of all vertex degrees equals twice the number of edges" style="animation-delay: 2s">
    <rect x="10" y="280" width="200" height="50" class="concept-box"/>
    <text x="20" y="300" class="section-title">Properties</text>
    <text x="20" y="320" class="label">Sum of degrees = 2|E| = 20</text>
    <text x="20" y="333" class="sublabel">Each vertex degree = 4 in K5</text>
  </g>
  
  <!-- Arrow relationships -->
  <g class="animate-fade" style="animation-delay: 2.2s">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#b8d4e8"/>
      </marker>
    </defs>
    <line x1="200" y1="195" x2="270" y2="195" stroke="#b8d4e8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="220" y="190" class="sublabel" text-anchor="middle">weighted</text>
  </g>
  
  <!-- Application Box -->
  <g class="animate-fade" data-narration="Real-world applications include navigation, network design, and optimization problems" style="animation-delay: 2.4s">
    <rect x="220" y="280" width="190" height="50" class="concept-box"/>
    <text x="230" y="300" class="section-title">Applications</text>
    <text x="230" y="320" class="label">GPS Navigation, Social Networks,</text>
    <text x="230" y="333" class="label">Circuit Design, Airline Schedules</text>
  </g>
</svg>