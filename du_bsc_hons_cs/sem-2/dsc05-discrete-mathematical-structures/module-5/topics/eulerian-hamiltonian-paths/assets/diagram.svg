<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="eulerian-hamiltonian-paths">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sectionGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sectionGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e8f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d1e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sectionGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e8d0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Georgia, serif; }
    .section-box { animation: fadeIn 0.6s ease-out; }
    .section1 { animation: slideInLeft 0.7s ease-out; }
    .section2 { animation: slideInRight 0.7s ease-out 0.2s both; }
    .section3 { animation: slideInLeft 0.7s ease-out 0.4s both; }
    .vertex { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .path-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
    .label { font-family: Arial, sans-serif; }
    .key-term { font-family: Georgia, serif; font-style: italic; }
    .highlight { font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title" data-narration="Title: Eulerian and Hamiltonian Paths - comparing two fundamental graph theory concepts">
    <text x="210" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Eulerian vs Hamiltonian Paths</text>
    <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Section 1: Eulerian Path Diagram -->
  <g class="section1" data-narration="Eulerian Path: traverses each edge exactly once, starts and ends at different vertices with odd degree">
    <rect x="20" y="55" width="180" height="140" rx="8" fill="url(#sectionGradient1)" filter="url(#shadow)"/>
    <text x="110" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">Eulerian Path</text>
    <text x="110" y="90" text-anchor="middle" font-size="11" fill="#555">Traverses EACH EDGE once</text>
    
    <!-- Graph: A-B-C triangle with extra edge -->
    <g transform="translate(60, 120)">
      <!-- Edges -->
      <line x1="0" y1="0" x2="60" y2="50" stroke="#e74c3c" stroke-width="2.5" class="path-line" style="animation-delay: 0.3s"/>
      <line x1="60" y1="50" x2="80" y2="0" stroke="#e74c3c" stroke-width="2.5" class="path-line" style="animation-delay: 0.6s"/>
      <line x1="80" y1="0" x2="0" y2="0" stroke="#e74c3c" stroke-width="2.5" class="path-line" style="animation-delay: 0.9s"/>
      <line x1="0" y1="0" x2="80" y2="0" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,2"/>
      
      <!-- Vertices -->
      <circle cx="0" cy="0" r="10" fill="#e74c3c" class="vertex" style="animation-delay: 1.2s"/>
      <circle cx="60" cy="50" r="10" fill="#3498db" class="vertex" style="animation-delay: 1.4s"/>
      <circle cx="80" cy="0" r="10" fill="#27ae60" class="vertex" style="animation-delay: 1.6s"/>
      
      <!-- Labels -->
      <text x="0" y="-18" text-anchor="middle" font-size="12" fill="#333" class="label">A (odd)</text>
      <text x="60" y="70" text-anchor="middle" font-size="12" fill="#333" class="label">B (even)</text>
      <text x="80" y="-18" text-anchor="middle" font-size="12" fill="#333" class="label">C (odd)</text>
    </g>
    
    <!-- Path indicator -->
    <text x="110" y="185" text-anchor="middle" font-size="10" fill="#666">Start: A → End: C</text>
  </g>
  
  <!-- Section 2: Eulerian Circuit Diagram -->
  <g class="section2" data-narration="Eulerian Circuit: same as path but returns to start vertex, all vertices have even degree">
    <rect x="220" y="55" width="180" height="140" rx="8" fill="url(#sectionGradient2)" filter="url(#shadow)"/>
    <text x="310" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#8e44ad">Eulerian Circuit</text>
    <text x="310" y="90" text-anchor="middle" font-size="11" fill="#555">Returns to START vertex</text>
    
    <!-- Graph: A-B-C-A circuit -->
    <g transform="translate(260, 120)">
      <!-- Edges -->
      <line x1="20" y1="30" x2="70" y2="30" stroke="#9b59b6" stroke-width="2.5" class="path-line" style="animation-delay: 0.3s"/>
      <line x1="70" y1="30" x2="45" y2="70" stroke="#9b59b6" stroke-width="2.5" class="path-line" style="animation-delay: 0.6s"/>
      <line x1="45" y1="70" x2="20" y2="30" stroke="#9b59b6" stroke-width="2.5" class="path-line" style="animation-delay: 0.9s"/>
      
      <!-- Vertices -->
      <circle cx="20" cy="30" r="10" fill="#9b59b6" class="vertex" style="animation-delay: 1.2s"/>
      <circle cx="70" cy="30" r="10" fill="#9b59b6" class="vertex" style="animation-delay: 1.4s"/>
      <circle cx="45" cy="70" r="10" fill="#9b59b6" class="vertex" style="animation-delay: 1.6s"/>
      
      <!-- Labels -->
      <text x="20" y="15" text-anchor="middle" font-size="11" fill="#333" class="label">A</text>
      <text x="70" y="15" text-anchor="middle" font-size="11" fill="#333" class="label">B</text>
      <text x="45" y="92" text-anchor="middle" font-size="11" fill="#333" class="label">C</text>
    </g>
    
    <text x="310" y="185" text-anchor="middle" font-size="10" fill="#666">All vertices even degree</text>
  </g>
  
  <!-- Section 3: Hamiltonian Path -->
  <g class="section3" data-narration="Hamiltonian Path: visits each vertex exactly once, focuses on vertices not edges">
    <rect x="20" y="205" width="180" height="130" rx="8" fill="url(#sectionGradient3)" filter="url(#shadow)"/>
    <text x="110" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">Hamiltonian Path</text>
    <text x="110" y="240" text-anchor="middle" font-size="11" fill="#555">Visits EACH VERTEX once</text>
    
    <!-- Graph: Simple path graph -->
    <g transform="translate(45, 260)">
      <!-- Edges -->
      <line x1="20" y1="20" x2="60" y2="20" stroke="#27ae60" stroke-width="2.5" class="path-line" style="animation-delay: 0.3s"/>
      <line x1="60" y1="20" x2="100" y2="20" stroke="#27ae60" stroke-width="2.5" class="path-line" style="animation-delay: 0.6s"/>
      <line x1="100" y1="20" x2="130" y2="50" stroke="#27ae60" stroke-width="2.5" class="path-line" style="animation-delay: 0.9s"/>
      
      <!-- Vertices -->
      <circle cx="20" cy="20" r="9" fill="#2ecc71" class="vertex" style="animation-delay: 1.2s"/>
      <circle cx="60" cy="20" r="9" fill="#2ecc71" class="vertex" style="animation-delay: 1.4s"/>
      <circle cx="100" cy="20" r="9" fill="#2ecc71" class="vertex" style="animation-delay: 1.6s"/>
      <circle cx="130" cy="50" r="9" fill="#2ecc71" class="vertex" style="animation-delay: 1.8s"/>
      
      <!-- Labels -->
      <text x="20" y="42" text-anchor="middle" font-size="10" fill="#333" class="label">1</text>
      <text x="60" y="42" text-anchor="middle" font-size="10" fill="#333" class="label">2</text>
      <text x="100" y="42" text-anchor="middle" font-size="10" fill="#333" class="label">3</text>
      <text x="130" y="72" text-anchor="middle" font-size="10" fill="#333" class="label">4</text>
    </g>
    
    <text x="110" y="325" text-anchor="middle" font-size="10" fill="#666">Path: 1 → 2 → 3 → 4</text>
  </g>
  
  <!-- Key Differences Box -->
  <g data-narration="Key differences: Eulerian deals with edges, Hamiltonian deals with vertices">
    <rect x="220" y="205" width="180" height="130" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="310" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#d68910" class="key-term">Key Differences</text>
    
    <g transform="translate(230, 240)">
      <text x="5" y="0" font-size="11" fill="#333" class="label">
        <tspan x="5" dy="0">• <tspan class="highlight" fill="#e74c3c">Eulerian</tspan>: edges (once)</tspan>
        <tspan x="5" dy="18">• <tspan class="highlight" fill="#27ae60">Hamiltonian</tspan>: vertices (once)</tspan>
        <tspan x="5" dy="18">• Euler: O(V+E) solvable</tspan>
        <tspan x="5" dy="18">• Hamilton: NP-Complete</tspan>
      </text>
    </g>
  </g>
  
  <!-- Arrow comparison -->
  <g data-narration="Visual relationship between Eulerian and Hamiltonian paths">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
      </marker>
    </defs>
    <path d="M 110 345 Q 210 365 310 345" stroke="#7f8c8d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
    <text x="210" y="360" text-anchor="middle" font-size="10" fill="#7f8c8d" font-style="italic">Edge-focused → Vertex-focused</text>
  </g>
  
  <!-- Legend/Footer -->
  <g data-narration="Color legend for the diagram">
    <rect x="80" y="370" width="260" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <circle cx="100" cy="381" r="5" fill="#e74c3c"/>
    <text x="112" y="385" font-size="10" fill="#333" class="label">Odd Degree</text>
    <circle cx="175" cy="381" r="5" fill="#3498db"/>
    <text x="187" y="385" font-size="10" fill="#333" class="label">Even Degree</text>
    <circle cx="255" cy="381" r="5" fill="#27ae60"/>
    <text x="267" y="385" font-size="10" fill="#333" class="label">Hamiltonian</text>
    <circle cx="330" cy="381" r="5" fill="#9b59b6"/>
    <text x="342" y="385" font-size="10" fill="#333" class="label">Circuit</text>
  </g>
</svg>