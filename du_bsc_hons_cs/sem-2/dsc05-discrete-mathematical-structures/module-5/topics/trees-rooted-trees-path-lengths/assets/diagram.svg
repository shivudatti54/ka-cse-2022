<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="trees-rooted-trees-path-lengths" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: bold; fill: #1b5e20; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #1b5e20; font-weight: 600; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #2e7d32; }
    .section-box { rx: 8; ry: 8; stroke: #4caf50; stroke-width: 1.5; }
    .tree-node { cursor: pointer; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .slide-down { animation: slideInDown 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .edge { stroke: #558b2f; stroke-width: 2; stroke-dasharray: 5,3; }
    .depth-line { stroke: #ff9800; stroke-width: 1; stroke-dasharray: 3,3; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Trees, Rooted Trees &amp; Path Lengths</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#4caf50" stroke-width="2" class="fade-in delay-1"/>
  
  <!-- Main Tree Diagram -->
  <g transform="translate(210, 90)">
    <!-- Edges with animation -->
    <line x1="0" y1="0" x2="-70" y2="60" class="edge slide-down" style="animation: fadeIn 0.5s ease-out forwards; stroke-dashoffset: 50;"/>
    <line x1="0" y1="0" x2="70" y2="60" class="edge slide-down" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.1s; stroke-dashoffset: 50;"/>
    <line x1="-70" y1="60" x2="-100" y2="120" class="edge slide-down" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.2s; stroke-dashoffset: 50;"/>
    <line x1="-70" y1="60" x2="-40" y2="120" class="edge slide-down" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.3s; stroke-dashoffset: 50;"/>
    <line x1="70" y1="60" x2="40" y2="120" class="edge slide-down" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.4s; stroke-dashoffset: 50;"/>
    <line x1="70" y1="60" x2="100" y2="120" class="edge slide-down" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.5s; stroke-dashoffset: 50;"/>
    
    <!-- Root Node A -->
    <circle cx="0" cy="0" r="22" fill="url(#nodeGradient)" filter="url(#shadow)" class="pulse" data-narration="Root Node: The topmost node in a rooted tree. It has no parent."/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">A</text>
    <text x="0" y="-30" text-anchor="middle" class="detail">Root (Level 0)</text>
    
    <!-- Internal Node B -->
    <circle cx="-70" cy="60" r="20" fill="url(#nodeGradient)" filter="url(#shadow)" data-narration="Internal Node: A node with at least one child. B is an internal node with children D and E."/>
    <text x="-70" y="65" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="13" font-weight="bold">B</text>
    <text x="-70" y="40" text-anchor="middle" class="detail">Level 1</text>
    
    <!-- Internal Node C -->
    <circle cx="70" cy="60" r="20" fill="url(#nodeGradient)" filter="url(#shadow)" data-narration="Internal Node: C is also an internal node with children F and G."/>
    <text x="70" y="65" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="13" font-weight="bold">C</text>
    <text x="70" y="40" text-anchor="middle" class="detail">Level 1</text>
    
    <!-- Leaf Nodes D, E, F, G -->
    <circle cx="-100" cy="120" r="18" fill="url(#leafGradient)" filter="url(#shadow)" data-narration="Leaf Node: A node with no children. D, E, F, G are leaf nodes at the deepest level."/>
    <text x="-100" y="125" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">D</text>
    <text x="-100" y="148" text-anchor="middle" class="detail">Leaf (Lvl 2)</text>
    
    <circle cx="-40" cy="120" r="18" fill="url(#leafGradient)" filter="url(#shadow)" data-narration="Leaf Node: E is a leaf node. The height of this tree is 2 (max depth)."/>
    <text x="-40" y="125" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">E</text>
    <text x="-40" y="148" text-anchor="middle" class="detail">Leaf (Lvl 2)</text>
    
    <circle cx="40" cy="120" r="18" fill="url(#leafGradient)" filter="url(#shadow)" data-narration="Leaf Node: F is at level 2. Path from A to F has length 2."/>
    <text x="40" y="125" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">F</text>
    <text x="40" y="148" text-anchor="middle" class="detail">Leaf (Lvl 2)</text>
    
    <circle cx="100" cy="120" r="18" fill="url(#leafGradient)" filter="url(#shadow)" data-narration="Leaf Node: G is the last leaf. Depth of all leaves = 2, Height = 2."/>
    <text x="100" y="125" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">G</text>
    <text x="100" y="148" text-anchor="middle" class="detail">Leaf (Lvl 2)</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <!-- Box 1: Tree Definition -->
  <g transform="translate(10, 220)" class="slide-left">
    <rect class="section-box" x="0" y="0" width="125" height="52" fill="#fff9c4" data-narration="Tree Definition: A connected acyclic graph with n vertices and n-1 edges."/>
    <text x="10" y="18" class="label" font-size="12">Tree Definition</text>
    <text x="10" y="34" class="detail">Connected + Acyclic</text>
    <text x="10" y="46" class="detail">|V| - 1 edges</text>
  </g>
  
  <!-- Box 2: Root -->
  <g transform="translate(145, 220)" class="slide-left delay-1">
    <rect class="section-box" x="0" y="0" width="125" height="52" fill="#e1f5fe" data-narration="Root: The distinguished topmost node with no parent. In this tree, A is the root."/>
    <text x="10" y="18" class="label" font-size="12">Root Node</text>
    <text x="10" y="34" class="detail">Topmost node</text>
    <text x="10" y="46" class="detail">No parent</text>
  </g>
  
  <!-- Box 3: Height & Depth -->
  <g transform="translate(280, 220)" class="slide-left delay-2">
    <rect class="section-box" x="0" y="0" width="125" height="52" fill="#fce4ec" data-narration="Height & Depth: Height is max distance from root to leaf (2). Depth is distance from root to node."/>
    <text x="10" y="18" class="label" font-size="12">Height &amp; Depth</text>
    <text x="10" y="34" class="detail">Height = 2 (max)</text>
    <text x="10" y="46" class="detail">Depth(A)=0, D=2</text>
  </g>
  
  <!-- Box 4: Path Length -->
  <g transform="translate(10, 280)" class="slide-left delay-3">
    <rect class="section-box" x="0" y="0" width="125" height="52" fill="#e8eaf6" data-narration="Path Length: Number of edges in a path. Path A-D has length 2."/>
    <text x="10" y="18" class="label" font-size="12">Path Length</text>
    <text x="10" y="34" class="detail"># of edges</text>
    <text x="10" y="46" class="detail">A to D = 2</text>
  </g>
  
  <!-- Box 5: Nodes -->
  <g transform="translate(145, 280)" class="slide-left delay-4">
    <rect class="section-box" x="0" y="0" width="125" height="52" fill="#fff3e0" data-narration="Node Types: Internal nodes (B,C) have children. Leaf nodes (D,E,F,G) have no children."/>
    <text x="10" y="18" class="label" font-size="12">Node Types</text>
    <text x="10" y="34" class="detail">Internal: B, C</text>
    <text x="10" y="46" class="detail">Leaves: D, E, F, G</text>
  </g>
  
  <!-- Box 6: Properties -->
  <g transform="translate(280, 280)" class="slide-left delay-4">
    <rect class="section-box" x="0" y="0" width="125" height="52" fill="#f1f8e9" data-narration="Tree Properties: Unique path between any two nodes. Removing any edge disconnects the tree."/>
    <text x="10" y="18" class="label" font-size="12">Properties</text>
    <text x="10" y="34" class="detail">Unique path</text>
    <text x="10" y="46" class="detail">Edge = bridge</text>
  </g>
  
  <!-- Tree Formula -->
  <g transform="translate(105, 355)" class="fade-in delay-4">
    <rect x="0" y="0" width="210" height="30" rx="5" fill="#263238" opacity="0.9"/>
    <text x="105" y="20" text-anchor="middle" fill="#fff" font-family="Segoe UI" font-size="13" data-narration="Formula: For any tree with n vertices, edges = n - 1">For tree: |E| = |V| - 1</text>
  </g>
</svg>