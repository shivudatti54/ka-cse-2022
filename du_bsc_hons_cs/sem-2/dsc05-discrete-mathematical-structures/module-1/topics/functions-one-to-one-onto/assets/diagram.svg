<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="functions-one-to-one-onto">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6" />
      <stop offset="100%" style="stop-color:#ffe0cc" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6" />
      <stop offset="100%" style="stop-color:#cce6cc" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6ff" />
      <stop offset="100%" style="stop-color:#ccccff" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
    .sublabel { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .element { font-family: Arial, sans-serif; font-size: 16px; fill: #222; font-weight: bold; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 100; animation: drawArrow 1s ease-out forwards; }
    .section-box { rx: 8; ry: 8; stroke: #999; stroke-width: 1; }
    .set-box { rx: 5; ry: 5; stroke: #666; stroke-width: 2; }
    .concept-text { font-family: Arial, sans-serif; font-size: 11px; fill: #444; }
    .type-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    
    .section1 { animation: slideIn 0.5s ease-out forwards; opacity: 0; }
    .section2 { animation: slideIn 0.5s ease-out 0.3s forwards; opacity: 0; }
    .section3 { animation: slideIn 0.5s ease-out 0.6s forwards; opacity: 0; }
    
    .element-circle { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Functions: One-to-One &amp; Onto</text>
  
  <!-- Section 1: One-to-One (Injective) -->
  <g class="section1" data-narration="One-to-One (Injective): Each element in Domain A maps to a unique element in Codomain B. No two different inputs share the same output.">
    <rect x="10" y="50" width="125" height="130" fill="url(#boxGradient1)" class="section-box" />
    <text x="72" y="68" text-anchor="middle" class="type-label" fill="#cc6600">ONE-TO-ONE</text>
    <text x="72" y="82" text-anchor="middle" class="sublabel">(Injective)</text>
    
    <!-- Domain A -->
    <rect x="20" y="95" width="35" height="75" fill="#fff" class="set-box" stroke="#cc6600" />
    <text x="37" y="112" text-anchor="middle" class="label" fill="#cc6600">A</text>
    <text x="37" y="135" text-anchor="middle" class="element">1</text>
    <text x="37" y="155" text-anchor="middle" class="element">2</text>
    <text x="37" y="175" text-anchor="middle" class="element">3</text>
    
    <!-- Codomain B -->
    <rect x="90" y="95" width="35" height="75" fill="#fff" class="set-box" stroke="#cc6600" />
    <text x="107" y="112" text-anchor="middle" class="label" fill="#cc6600">B</text>
    <text x="107" y="135" text-anchor="middle" class="element">a</text>
    <text x="107" y="155" text-anchor="middle" class="element">b</text>
    <text x="107" y="175" text-anchor="middle" class="element" fill="#ccc">c</text>
    
    <!-- Arrows -->
    <line x1="55" y1="135" x2="85" y2="135" class="arrow" style="animation-delay: 0.5s" />
    <line x1="55" y1="155" x2="85" y2="155" class="arrow" style="animation-delay: 0.7s" />
    <line x1="55" y1="175" x2="85" y2="175" class="arrow" style="animation-delay: 0.9s" />
  </g>
  
  <!-- Section 2: Onto (Surjective) -->
  <g class="section2" data-narration="Onto (Surjective): Every element in Codomain B is the image of at least one element from Domain A. All outputs are 'hit'.">
    <rect x="147" y="50" width="125" height="130" fill="url(#boxGradient2)" class="section-box" />
    <text x="209" y="68" text-anchor="middle" class="type-label" fill="#006600">ONTO</text>
    <text x="209" y="82" text-anchor="middle" class="sublabel">(Surjective)</text>
    
    <!-- Domain A -->
    <rect x="157" y="95" width="35" height="75" fill="#fff" class="set-box" stroke="#006600" />
    <text x="174" y="112" text-anchor="middle" class="label" fill="#006600">A</text>
    <text x="174" y="135" text-anchor="middle" class="element">1</text>
    <text x="174" y="155" text-anchor="middle" class="element">2</text>
    <text x="174" y="175" text-anchor="middle" class="element">3</text>
    
    <!-- Codomain B -->
    <rect x="227" y="95" width="35" height="75" fill="#fff" class="set-box" stroke="#006600" />
    <text x="244" y="112" text-anchor="middle" class="label" fill="#006600">B</text>
    <text x="244" y="135" text-anchor="middle" class="element">a</text>
    <text x="244" y="155" text-anchor="middle" class="element">b</text>
    <text x="244" y="175" text-anchor="middle" class="element">c</text>
    
    <!-- Arrows -->
    <line x1="192" y1="135" x2="222" y2="135" class="arrow" style="animation-delay: 1.1s" />
    <line x1="192" y1="155" x2="222" y2="155" class="arrow" style="animation-delay: 1.3s" />
    <line x1="192" y1="175" x2="222" y2="175" class="arrow" style="animation-delay: 1.5s" />
  </g>
  
  <!-- Section 3: Bijective (One-to-One AND Onto) -->
  <g class="section3" data-narration="Bijective: A function that is both One-to-One and Onto. Perfect matching - each input maps to a unique output, and all outputs are used.">
    <rect x="284" y="50" width="125" height="130" fill="url(#boxGradient3)" class="section-box" />
    <text x="346" y="68" text-anchor="middle" class="type-label" fill="#3333cc">BIJECTIVE</text>
    <text x="346" y="82" text-anchor="middle" class="sublabel">(1-1 &amp; Onto)</text>
    
    <!-- Domain A -->
    <rect x="294" y="95" width="35" height="75" fill="#fff" class="set-box" stroke="#3333cc" />
    <text x="311" y="112" text-anchor="middle" class="label" fill="#3333cc">A</text>
    <text x="311" y="135" text-anchor="middle" class="element">1</text>
    <text x="311" y="155" text-anchor="middle" class="element">2</text>
    <text x="311" y="175" text-anchor="middle" class="element">3</text>
    
    <!-- Codomain B -->
    <rect x="364" y="95" width="35" height="75" fill="#fff" class="set-box" stroke="#3333cc" />
    <text x="381" y="112" text-anchor="middle" class="label" fill="#3333cc">B</text>
    <text x="381" y="135" text-anchor="middle" class="element">a</text>
    <text x="381" y="155" text-anchor="middle" class="element">b</text>
    <text x="381" y="175" text-anchor="middle" class="element">c</text>
    
    <!-- Arrows -->
    <line x1="329" y1="135" x2="359" y2="135" class="arrow" style="animation-delay: 1.7s" />
    <line x1="329" y1="155" x2="359" y2="155" class="arrow" style="animation-delay: 1.9s" />
    <line x1="329" y1="175" x2="359" y2="175" class="arrow" style="animation-delay: 2.1s" />
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key definitions: Domain is the input set, Codomain is the possible output set, Range is the actual output set produced by the function.">
    <rect x="10" y="195" width="400" height="90" fill="#fff" rx="8" ry="8" stroke="#888" stroke-width="1" />
    <text x="20" y="215" class="label" fill="#333">Key Definitions:</text>
    <text x="20" y="235" class="concept-text">• <tspan font-weight="bold">Domain (A)</tspan>: Set of all possible inputs</text>
    <text x="20" y="252" class="concept-text">• <tspan font-weight="bold">Codomain (B)</tspan>: Set of all possible outputs (defined range)</text>
    <text x="20" y="269" class="concept-text">• <tspan font-weight="bold">Range f(A)</tspan>: Actual outputs produced (subset of codomain)</text>
    <text x="220" y="235" class="concept-text">• <tspan font-weight="bold">One-to-One</tspan>: f(a₁)=f(a₂) ⇒ a₁=a₂</text>
    <text x="220" y="252" class="concept-text">• <tspan font-weight="bold">Onto</tspan>: ∀b∈B, ∃a∈A such that f(a)=b</text>
    <text x="220" y="269" class="concept-text">• <tspan font-weight="bold">Bijective</tspan>: Both one-to-one AND onto</text>
  </g>
  
  <!-- Properties Summary -->
  <g data-narration="Summary: One-to-one functions preserve distinctness. Onto functions cover all possibilities. Bijective functions can be inverted (have an inverse).">
    <rect x="10" y="295" width="400" height="95" fill="#f9f9f9" rx="8" ry="8" stroke="#aaa" stroke-width="1" />
    <text x="20" y="315" class="label" fill="#333">Why It Matters:</text>
    <text x="20" y="335" class="concept-text">• <tspan font-weight="bold" fill="#cc6600">One-to-One</tspan>: In CS - hash functions, no data collision</text>
    <text x="20" y="352" class="concept-text">• <tspan font-weight="bold" fill="#006600">Onto</tspan>: Every state reachable, complete function coverage</text>
    <text x="20" y="369" class="concept-text">• <tspan font-weight="bold" fill="#3333cc">Bijective</tspan>: Invertible, perfect pairing, used in encryption</text>
    <text x="210" y="335" class="concept-text">• f: A→B means ∀a∈A, f(a)∈B</text>
    <text x="210" y="352" class="concept-text">• |A| = |B| for bijective between finite sets</text>
    <text x="210" y="369" class="concept-text">• Inverse f⁻¹ exists iff f is bijective</text>
  </g>
  
  <!-- Visual legend -->
  <g data-narration="Color legend showing mapping types">
    <circle cx="30" y="390" r="5" fill="#cc6600" />
    <text x="42" y="394" class="sublabel">1-1 only</text>
    <circle cx="110" y="390" r="5" fill="#006600" />
    <text x="122" y="394" class="sublabel">Onto only</text>
    <circle cx="190" y="390" r="5" fill="#3333cc" />
    <text x="202" y="394" class="sublabel">Bijective</text>
    <text x="280" y="394" class="sublabel" fill="#666">Domain A = {1,2,3}</text>
    <text x="380" y="394" class="sublabel" fill="#666">Codomain B = {a,b,c}</text>
  </g>
</svg>