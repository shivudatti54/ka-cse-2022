<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="set-operations-computer-representation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <linearGradient id="bitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1e3a5f; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #374151; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #6b7280; }
    .bit { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #1e40af; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #1f2937; }
    .card { rx: 8; ry: 8; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .section-anim { animation: slideUp 0.6s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; marker-end: url(#arrowhead); }
    .highlight { fill: #fbbf24; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title-anim">
    <text x="210" y="30" text-anchor="middle" class="title">Set Operations &amp; Computer Representation</text>
    <text x="210" y="50" text-anchor="middle" class="detail">Bit Vector Implementation</text>
  </g>
  
  <!-- Section 1: Operation Definitions -->
  <g class="section-anim" style="animation-delay: 0.2s" data-narration="Four fundamental set operations: Union, Intersection, Difference, and Complement">
    <rect x="10" y="65" width="130" height="70" fill="url(#cardGradient1)" class="card"/>
    <text x="20" y="80" class="section-title">UNION (∪)</text>
    <text x="20" y="95" class="detail">A ∪ B = {x | x∈A or x∈B}</text>
    <text x="20" y="110" class="detail">Elements in A or B</text>
    <text x="20" y="125" class="detail">or both</text>
  </g>
  
  <g class="section-anim" style="animation-delay: 0.3s" data-narration="Intersection contains only elements common to both sets">
    <rect x="145" y="65" width="130" height="70" fill="url(#cardGradient2)" class="card"/>
    <text x="155" y="80" class="section-title">INTERSECTION (∩)</text>
    <text x="155" y="95" class="detail">A ∩ B = {x | x∈A and x∈B}</text>
    <text x="155" y="110" class="detail">Elements in both</text>
    <text x="155" y="125" class="detail">A and B</text>
  </g>
  
  <g class="section-anim" style="animation-delay: 0.4s" data-narration="Difference contains elements in A but not in B">
    <rect x="280" y="65" width="130" height="70" fill="url(#cardGradient3)" class="card"/>
    <text x="290" y="80" class="section-title">DIFFERENCE (−)</text>
    <text x="290" y="95" class="detail">A − B = {x | x∈A and x∉B}</text>
    <text x="290" y="110" class="detail">Elements in A</text>
    <text x="290" y="125" class="detail">but not in B</text>
  </g>
  
  <g class="section-anim" style="animation-delay: 0.5s" data-narration="Complement contains all elements not in A, relative to universal set">
    <rect x="145" y="140" width="130" height="55" fill="url(#cardGradient4)" class="card"/>
    <text x="155" y="158" class="section-title">COMPLEMENT (Ā)</text>
    <text x="155" y="173" class="detail">Ā = {x ∈ U | x ∉ A}</text>
    <text x="155" y="188" class="detail">Not in A</text>
  </g>
  
  <!-- Section 2: Bit Vector Demonstration -->
  <g class="section-anim" style="animation-delay: 0.6s" data-narration="Bit vector representation allows efficient set operations using binary arithmetic">
    <text x="210" y="220" text-anchor="middle" class="section-title">BIT VECTOR UNION</text>
    <text x="210" y="238" text-anchor="middle" class="detail">OR Operation: 1∪1=1, 1∪0=1, 0∪0=0</text>
  </g>
  
  <!-- Set A -->
  <g class="section-anim" style="animation-delay: 0.7s">
    <rect x="20" y="255" width="180" height="50" fill="#dbeafe" rx="6" ry="6" stroke="#3b82f6" stroke-width="1"/>
    <text x="30" y="272" class="label" font-weight="bold">Set A:</text>
    <text x="30" y="295" class="bit">1 0 1 0</text>
    <text x="130" y="295" class="detail">(position 1,3)</text>
  </g>
  
  <!-- Set B -->
  <g class="section-anim" style="animation-delay: 0.8s">
    <rect x="220" y="255" width="180" height="50" fill="#dbeafe" rx="6" ry="6" stroke="#3b82f6" stroke-width="1"/>
    <text x="230" y="272" class="label" font-weight="bold">Set B:</text>
    <text x="230" y="295" class="bit">1 1 0 0</text>
    <text x="330" y="295" class="detail">(position 1,2)</text>
  </g>
  
  <!-- Arrow -->
  <g class="section-anim" style="animation-delay: 0.9s">
    <line x1="120" y1="305" x2="120" y2="330" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="120" y1="330" x2="300" y2="330" stroke="#6366f1" stroke-width="2"/>
    <line x1="300" y1="330" x2="300" y2="305" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="210" y="325" text-anchor="middle" class="detail">OR (∪)</text>
  </g>
  
  <!-- Result A ∪ B -->
  <g class="section-anim pulse-anim" style="animation-delay: 1s">
    <rect x="100" y="340" width="220" height="45" fill="url(#bitGradient)" rx="6" ry="6"/>
    <text x="120" y="362" class="label" fill="white" font-weight="bold">A ∪ B:</text>
    <text x="180" y="370" class="bit" fill="white">1 1 1 0</text>
    <text x="280" y="370" class="detail" fill="white">(position 1,2,3)</text>
  </g>
  
  <!-- Position Labels -->
  <g class="section-anim" style="animation-delay: 1.1s" data-narration="Each bit position represents an element, 1 means present, 0 means absent">
    <text x="35" y="320" class="detail">Position:</text>
    <text x="35" y="332" class="detail" font-weight="bold">1  2  3  4</text>
  </g>
  
  <!-- Footer -->
  <g class="section-anim" style="animation-delay: 1.2s">
    <line x1="10" y1="380" x2="410" y2="380" stroke="#94a3b8" stroke-width="1"/>
    <text x="210" y="395" text-anchor="middle" class="detail">Efficient: O(n) bitwise operations replace O(n²) element comparisons</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
</svg>