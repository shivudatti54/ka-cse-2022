<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="sequences-summations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c9b4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b894c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sigmaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0d878;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .sigma-box { animation: slideInUp 0.7s ease-out 0.5s both; }
    .term { animation: pulse 2s ease-in-out infinite; }
    .index { animation: fadeIn 0.5s ease-out 0.8s both; }
    .result { animation: pulse 1.5s ease-in-out 1s infinite; }
    .arrow { animation: drawLine 0.5s ease-out forwards; stroke-dasharray: 100; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Sequences &amp; Summations</text>
  <line x1="100" y1="45" x2="320" y2="45" stroke="#5d9cec" stroke-width="2" class="title" />
  
  <!-- Section 1: Sequence Definition -->
  <g class="section1" data-narration="A sequence is an ordered list of elements following a specific pattern, denoted as {aₙ} where aₙ represents the n-th term.">
    <rect x="15" y="60" width="185" height="95" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)" />
    <text x="25" y="80" font-size="14" font-weight="bold" fill="#2c5f4f">Sequence Definition</text>
    <text x="25" y="100" font-size="12" fill="#3a6b5a">A sequence {aₙ} is a function</text>
    <text x="25" y="118" font-size="12" fill="#3a6b5a">f: ℕ → ℝ where each term</text>
    <text x="25" y="136" font-size="12" fill="#3a6b5a">aₙ = f(n) has a position.</text>
  </g>
  
  <!-- Section 2: Arithmetic Sequence -->
  <g class="section2" data-narration="An arithmetic sequence has a constant difference between consecutive terms, like 2, 4, 6, 8...">
    <rect x="220" y="60" width="185" height="95" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" />
    <text x="230" y="80" font-size="14" font-weight="bold" fill="#5f4f6b">Arithmetic Sequence</text>
    <text x="230" y="100" font-size="12" fill="#6b5a7a">Constant difference (d)</text>
    <text x="230" y="118" font-size="12" fill="#6b5a7a">between consecutive terms:</text>
    <text x="230" y="138" font-size="13" font-weight="bold" fill="#7b6a8a">aₙ = a₁ + (n-1)d</text>
  </g>
  
  <!-- Section 3: Sigma Notation Breakdown -->
  <g class="sigma-box" data-narration="Sigma notation ∑_{k=1}^5 2k represents summing the term 2k for k from 1 to 5, equaling 30.">
    <rect x="15" y="170" width="390" height="130" rx="10" fill="url(#sigmaGradient)" filter="url(#shadow)" />
    <text x="25" y="195" font-size="15" font-weight="bold" fill="#6b5a30">Sigma Notation: ∑_{k=1}^5 2k</text>
    
    <!-- Components -->
    <text x="30" y="225" font-size="12" fill="#5a4a20">Index: k = 1 to 5</text>
    <text x="30" y="245" font-size="12" fill="#5a4a20">Term: 2k</text>
    
    <!-- Calculation -->
    <text x="150" y="225" font-size="12" fill="#5a4a20">= 2(1) + 2(2) + 2(3) + 2(4) + 2(5)</text>
    <text x="150" y="245" font-size="12" fill="#5a4a20">= 2 + 4 + 6 + 8 + 10</text>
    
    <!-- Arrow and Result -->
    <line x1="280" y1="255" x2="340" y2="255" stroke="#6b5a30" stroke-width="2" class="arrow" />
    <polygon points="340,255 330,250 330,260" fill="#6b5a30" />
    
    <rect x="345" y="235" width="50" height="30" rx="5" fill="#e74c3c" class="result" />
    <text x="370" y="256" text-anchor="middle" font-size="16" font-weight="bold" fill="white" class="result">30</text>
  </g>
  
  <!-- Visual Terms -->
  <g class="section1" data-narration="Each term is calculated by substituting k values into the expression 2k">
    <rect x="15" y="315" width="60" height="35" rx="5" fill="#a8d5e2" />
    <text x="45" y="335" text-anchor="middle" font-size="14" fill="#2c5f6f">k=1: 2</text>
    
    <rect x="85" y="315" width="60" height="35" rx="5" fill="#a8d5e2" />
    <text x="115" y="335" text-anchor="middle" font-size="14" fill="#2c5f6f">k=2: 4</text>
    
    <rect x="155" y="315" width="60" height="35" rx="5" fill="#a8d5e2" />
    <text x="185" y="335" text-anchor="middle" font-size="14" fill="#2c5f6f">k=3: 6</text>
  </g>
  
  <g class="section2" data-narration="Continuing the substitution for k=4 and k=5 gives the remaining terms 8 and 10">
    <rect x="225" y="315" width="60" height="35" rx="5" fill="#a8d5e2" />
    <text x="255" y="335" text-anchor="middle" font-size="14" fill="#2c5f6f">k=4: 8</text>
    
    <rect x="295" y="315" width="60" height="35" rx="5" fill="#a8d5e2" />
    <text x="325" y="335" text-anchor="middle" font-size="14" fill="#2c5f6f">k=5: 10</text>
  </g>
  
  <!-- Bottom Note -->
  <text x="210" y="375" text-anchor="middle" font-size="11" fill="#7f8c8d" class="sigma-box">Summation adds all terms from the sequence to compute aggregate values</text>
</svg>