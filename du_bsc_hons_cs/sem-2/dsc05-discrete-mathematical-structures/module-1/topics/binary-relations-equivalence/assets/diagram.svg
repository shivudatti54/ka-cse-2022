<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="binary-relations-equivalence" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fbcd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b88fcf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e8d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fcfb0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .label-small { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .concept-box { animation: fadeIn 0.8s ease-out forwards; }
    .circle-group { animation: slideInUp 0.6s ease-out forwards; }
    .prop-box { animation: slideInLeft 0.5s ease-out forwards; }
    .arrow-line { stroke-dasharray: 100; animation: drawArrow 1s ease-out forwards; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
    .title-anim { animation: slideInUp 0.7s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Binary Relations &amp; Equivalence</text>
  
  <!-- Definition Box -->
  <g class="concept-box" data-narration="A binary relation R from set A to B is a subset of A×B. When (a,b)∈R, we write aRb.">
    <rect x="20" y="50" width="180" height="45" rx="5" fill="#fff" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="65" class="label" font-weight="bold">Binary Relation</text>
    <text x="30" y="82" class="label-small">R ⊆ A×B, aRb means (a,b)∈R</text>
  </g>
  
  <!-- Equivalence Properties Box -->
  <g class="prop-box" data-narration="An equivalence relation must be reflexive, symmetric, and transitive.">
    <rect x="220" y="50" width="180" height="45" rx="5" fill="#fff" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="230" y="65" class="label" font-weight="bold">Equivalence Relation</text>
    <text x="230" y="82" class="label-small">Reflexive ∧ Symmetric ∧ Transitive</text>
  </g>
  
  <!-- Equivalence Classes - Modulo 3 -->
  <g class="circle-group" data-narration="Modulo 3 creates three equivalence classes: [0], [1], [2] containing numbers congruent mod 3.">
    <!-- Class [0] -->
    <g transform="translate(70, 180)">
      <ellipse cx="0" cy="0" rx="55" ry="50" fill="url(#circleGrad1)" stroke="#5dade2" stroke-width="2"/>
      <text x="0" y="-30" text-anchor="middle" class="label" font-weight="bold" fill="#2980b9">[0]</text>
      <text x="0" y="-10" text-anchor="middle" class="label-small">...-6,-3,0,</text>
      <text x="0" y="8" text-anchor="middle" class="label-small">3,6,9...</text>
    </g>
    
    <!-- Class [1] -->
    <g transform="translate(210, 180)">
      <ellipse cx="0" cy="0" rx="55" ry="50" fill="url(#circleGrad2)" stroke="#af7ac5" stroke-width="2"/>
      <text x="0" y="-30" text-anchor="middle" class="label" font-weight="bold" fill="#7d3c98">[1]</text>
      <text x="0" y="-10" text-anchor="middle" class="label-small">...-5,-2,1,</text>
      <text x="0" y="8" text-anchor="middle" class="label-small">4,7,10...</text>
    </g>
    
    <!-- Class [2] -->
    <g transform="translate(350, 180)">
      <ellipse cx="0" cy="0" rx="55" ry="50" fill="url(#circleGrad3)" stroke="#52be80" stroke-width="2"/>
      <text x="0" y="-30" text-anchor="middle" class="label" font-weight="bold" fill="#1e8449">[2]</text>
      <text x="0" y="-10" text-anchor="middle" class="label-small">...-4,-1,2,</text>
      <text x="0" y="8" text-anchor="middle" class="label-small">5,8,11...</text>
    </g>
  </g>
  
  <!-- Partition Arrow -->
  <g data-narration="The equivalence relation partitions set Z into disjoint equivalence classes.">
    <text x="210" y="245" text-anchor="middle" class="label-small" fill="#7f8c8d">Partition of ℤ by modulo 3</text>
    <path d="M130 250 Q210 270 290 250" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" class="arrow-line"/>
    <polygon points="290,245 295,255 285,255" fill="#e74c3c"/>
  </g>
  
  <!-- Properties Detail Boxes -->
  <g class="prop-box" data-narration="Reflexive: aRa for all a∈A. Every element relates to itself." style="animation-delay: 0.2s;">
    <rect x="20" y="275" width="120" height="40" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
    <text x="30" y="292" class="label-small" font-weight="bold">Reflexive</text>
    <text x="30" y="307" class="label-small" fill="#5d6d7e">aRa ∀a∈A</text>
  </g>
  
  <g class="prop-box" data-narration="Symmetric: if aRb then bRa. Order doesn't matter." style="animation-delay: 0.4s;">
    <rect x="150" y="275" width="120" height="40" rx="4" fill="#f5eef8" stroke="#9b59b6" stroke-width="1"/>
    <text x="160" y="292" class="label-small" font-weight="bold">Symmetric</text>
    <text x="160" y="307" class="label-small" fill="#5d6d7e">aRb ⇒ bRa</text>
  </g>
  
  <g class="prop-box" data-narration="Transitive: if aRb and bRc then aRc. Chains preserve relation." style="animation-delay: 0.6s;">
    <rect x="280" y="275" width="120" height="40" rx="4" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
    <text x="290" y="292" class="label-small" font-weight="bold">Transitive</text>
    <text x="290" y="307" class="label-small" fill="#5d6d7e">aRb ∧ bRc ⇒ aRc</text>
  </g>
  
  <!-- Bottom note -->
  <g data-narration="Equivalence classes form a partition - they're disjoint and cover the entire set.">
    <rect x="100" y="330" width="220" height="30" rx="4" fill="#fef9e7" stroke="#f1c40f" stroke-width="1"/>
    <text x="210" y="350" text-anchor="middle" class="label-small" fill="#7d6608">Classes are disjoint &amp; cover ℤ</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="370" r="4" fill="#bdc3c7"/>
  <circle cx="390" cy="30" r="4" fill="#bdc3c7"/>
  <circle cx="410" cy="380" r="3" fill="#bdc3c7"/>
</svg>