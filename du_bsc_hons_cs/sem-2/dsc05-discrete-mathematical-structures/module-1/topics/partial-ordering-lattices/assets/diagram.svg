<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="partial-ordering-lattices">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2d3748; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #4a5568; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #718096; }
    .node-circle { fill: url(#nodeGradient); stroke: #553c9a; stroke-width: 2; }
    .edge { stroke: #a0aec0; stroke-width: 2; fill: none; }
    .concept-box { fill: #fff; stroke: #cbd5e0; stroke-width: 1; rx: 8; }
    .highlight { fill: #ed8936; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g data-narration="title">
    <text x="210" y="30" text-anchor="middle" class="title slide-in">Partial Ordering Lattices</text>
    <text x="210" y="50" text-anchor="middle" class="detail slide-in">Divisor Lattice of 30</text>
  </g>
  
  <!-- Definition Box -->
  <g data-narration="definition" transform="translate(10, 60)" class="fade-in">
    <rect x="0" y="0" width="130" height="70" class="concept-box"/>
    <text x="10" y="18" class="label" font-weight="bold">Poset (P, ≤)</text>
    <text x="10" y="35" class="detail">• Reflexivity</text>
    <text x="10" y="48" class="detail">• Antisymmetry</text>
    <text x="10" y="61" class="detail">• Transitivity</text>
  </g>
  
  <!-- Lattice Concept Box -->
  <g data-narration="lattice-def" transform="translate(280, 60)" class="fade-in">
    <rect x="0" y="0" width="130" height="55" class="concept-box"/>
    <text x="10" y="18" class="label" font-weight="bold">Lattice</text>
    <text x="10" y="35" class="detail">Every pair has:</text>
    <text x="10" y="48" class="detail">• LUB (join) &amp; GLB (meet)</text>
  </g>
  
  <!-- Hasse Diagram - Edges -->
  <g data-narration="edges">
    <!-- Bottom to middle -->
    <line x1="210" y1="340" x2="130" y2="260" class="edge fade-in"/>
    <line x1="210" y1="340" x2="210" y2="260" class="edge fade-in"/>
    <line x1="210" y1="340" x2="290" y2="260" class="edge fade-in"/>
    <!-- Middle to upper -->
    <line x1="130" y1="260" x2="130" y2="180" class="edge fade-in"/>
    <line x1="130" y1="260" x2="210" y2="180" class="edge fade-in"/>
    <line x1="210" y1="260" x2="130" y2="180" class="edge fade-in"/>
    <line x1="210" y1="260" x2="290" y2="180" class="edge fade-in"/>
    <line x1="290" y1="260" x2="210" y2="180" class="edge fade-in"/>
    <line x1="290" y1="260" x2="290" y2="180" class="edge fade-in"/>
    <!-- Upper to top -->
    <line x1="130" y1="180" x2="210" y2="100" class="edge fade-in"/>
    <line x1="210" y1="180" x2="210" y2="100" class="edge fade-in"/>
    <line x1="290" y1="180" x2="210" y2="100" class="edge fade-in"/>
  </g>
  
  <!-- Nodes -->
  <g data-narration="nodes" class="fade-in">
    <!-- Bottom node: 1 -->
    <circle cx="210" cy="340" r="20" class="node-circle pulse" filter="url(#shadow)"/>
    <text x="210" y="345" text-anchor="middle" fill="white" font-weight="bold">1</text>
    
    <!-- Middle layer: 2, 3, 5 -->
    <circle cx="130" cy="260" r="20" class="node-circle pulse" filter="url(#shadow)"/>
    <text x="130" y="265" text-anchor="middle" fill="white" font-weight="bold">2</text>
    
    <circle cx="210" cy="260" r="20" class="node-circle pulse" filter="url(#shadow)"/>
    <text x="210" y="265" text-anchor="middle" fill="white" font-weight="bold">3</text>
    
    <circle cx="290" cy="260" r="20" class="node-circle pulse" filter="url(#shadow)"/>
    <text x="290" y="265" text-anchor="middle" fill="white" font-weight="bold">5</text>
    
    <!-- Upper layer: 6, 10, 15 -->
    <circle cx="130" cy="180" r="20" class="node-circle pulse" filter="url(#shadow)"/>
    <text x="130" y="185" text-anchor="middle" fill="white" font-weight="bold">6</text>
    
    <circle cx="210" cy="180" r="20" class="node-circle pulse" filter="url(#shadow)"/>
    <text x="210" y="185" text-anchor="middle" fill="white" font-weight="bold">10</text>
    
    <circle cx="290" cy="180" r="20" class="node-circle pulse" filter="url(#shadow)"/>
    <text x="290" y="185" text-anchor="middle" fill="white" font-weight="bold">15</text>
    
    <!-- Top node: 30 -->
    <circle cx="210" cy="100" r="22" class="node-circle pulse" filter="url(#shadow)"/>
    <text x="210" y="106" text-anchor="middle" fill="white" font-weight="bold">30</text>
  </g>
  
  <!-- Relationship Arrows and Labels -->
  <g data-narration="relationships">
    <text x="165" y="305" class="detail">divisible</text>
    <path d="M 175 300 L 195 310" stroke="#a0aec0" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    
    <text x="250" y="225" class="detail">a|b means</text>
    <text x="250" y="238" class="detail">a divides b</text>
  </g>
  
  <!-- Bottom Info Box -->
  <g data-narration="info" transform="translate(10, 320)" class="fade-in">
    <rect x="0" y="0" width="180" height="60" class="concept-box"/>
    <text x="10" y="18" class="label" font-weight="bold">Example: {a,b,c}</text>
    <text x="10" y="35" class="detail">P({a,b,c}), ordered by ⊆</text>
    <text x="10" y="50" class="detail">Forms a lattice</text>
  </g>
  
  <!-- Properties Box -->
  <g data-narration="properties" transform="translate(230, 320)" class="fade-in">
    <rect x="0" y="0" width="180" height="60" class="concept-box"/>
    <text x="10" y="18" class="label" font-weight="bold">Key Properties</text>
    <text x="10" y="35" class="detail">Incomparability allowed</text>
    <text x="10" y="50" class="detail">2 ⊄ 3, 3 ⊄ 2</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#a0aec0"/>
    </marker>
  </defs>
</svg>