<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="vector-algebra-dot-cross-product">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="dotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="crossGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3748; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #4a5568; }
    .formula-text { font-family: 'Consolas', monospace; font-size: 13px; fill: #2d3748; }
    .prop-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #718096; }
    .section-box { rx: 8; ry: 8; stroke-width: 2; }
    .vector-line { stroke-width: 3; stroke-linecap: round; }
    .dashed-line { stroke-dasharray: 5,5; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="slide-up" data-narration="Title introducing Vector Algebra Dot and Cross Product">
    <text x="210" y="30" text-anchor="middle" class="title-text">Vector Algebra</text>
    <text x="210" y="55" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#667eea" font-weight="bold">Dot &amp; Cross Product</text>
    <line x1="100" y1="70" x2="320" y2="70" stroke="#cbd5e0" stroke-width="2"/>
  </g>
  
  <!-- Dot Product Section -->
  <g class="fade-in" data-narration="Dot Product section showing scalar result" style="animation-delay: 0.3s">
    <rect x="15" y="85" width="185" height="140" fill="url(#dotGradient)" class="section-box" stroke="#76b7b5" opacity="0.9"/>
    <text x="108" y="108" text-anchor="middle" class="label-text" font-weight="bold" fill="#2d3748">DOT PRODUCT</text>
    <text x="108" y="128" text-anchor="middle" class="prop-text">Scalar Result</text>
    
    <!-- Vector visualization -->
    <line x1="40" y1="170" x2="90" y2="145" stroke="#e53e3e" class="vector-line"/>
    <text x="95" y="143" class="label-text" fill="#e53e3e">a</text>
    
    <line x1="40" y1="170" x2="90" y2="195" stroke="#3182ce" class="vector-line"/>
    <text x="95" y="198" class="label-text" fill="#3182ce">b</text>
    
    <circle cx="40" cy="170" r="3" fill="#2d3748"/>
    
    <!-- Angle arc -->
    <path d="M 55 170 Q 65 160 70 170" fill="none" stroke="#718096" stroke-width="1.5"/>
    <text x="72" y="165" class="prop-text">θ</text>
    
    <!-- Formula -->
    <text x="108" y="200" text-anchor="middle" class="formula-text">a · b = |a||b| cos(θ)</text>
    <text x="108" y="218" text-anchor="middle" class="prop-text">Commutative</text>
  </g>
  
  <!-- Cross Product Section -->
  <g class="fade-in" data-narration="Cross Product section showing vector result perpendicular to both input vectors" style="animation-delay: 0.5s">
    <rect x="220" y="85" width="185" height="140" fill="url(#crossGradient)" class="section-box" stroke="#9f7aea" opacity="0.9"/>
    <text x="312" y="108" text-anchor="middle" class="label-text" font-weight="bold" fill="#2d3748">CROSS PRODUCT</text>
    <text x="312" y="128" text-anchor="middle" class="prop-text">Vector Result</text>
    
    <!-- 3D-like vector visualization -->
    <line x1="245" y1="170" x2="285" y2="155" stroke="#e53e3e" class="vector-line"/>
    <text x="290" y="153" class="label-text" fill="#e53e3e">a</text>
    
    <line x1="245" y1="170" x2="285" y2="185" stroke="#3182ce" class="vector-line"/>
    <text x="290" y="188" class="label-text" fill="#3182ce">b</text>
    
    <!-- Result vector pointing out -->
    <line x1="245" y1="170" x2="245" y2="130" stroke="#38a169" class="vector-line"/>
    <circle cx="245" cy="125" r="4" fill="#38a169"/>
    <text x="255" y="135" class="label-text" fill="#38a169">a×b</text>
    
    <circle cx="245" cy="170" r="3" fill="#2d3748"/>
    
    <!-- Formula -->
    <text x="312" y="200" text-anchor="middle" class="formula-text">a × b = |a||b| sin(θ) n</text>
    <text x="312" y="218" text-anchor="middle" class="prop-text">Anti-commutative</text>
  </g>
  
  <!-- Properties Comparison -->
  <g class="slide-up" data-narration="Key properties comparison between dot and cross products" style="animation-delay: 0.7s">
    <rect x="15" y="240" width="390" height="70" fill="#fff" stroke="#e2e8f0" rx="6" opacity="0.95"/>
    
    <!-- Dot Product Properties -->
    <text x="30" y="262" class="label-text" font-weight="bold" fill="#76b7b5">Dot Product:</text>
    <text x="30" y="280" class="prop-text">a · b = b · a</text>
    <text x="30" y="296" class="prop-text">a · (b + c) = a·b + a·c</text>
    
    <!-- Arrow between -->
    <line x1="175" y1="275" x2="205" y2="275" stroke="#cbd5e0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Cross Product Properties -->
    <text x="220" y="262" class="label-text" font-weight="bold" fill="#9f7aea">Cross Product:</text>
    <text x="220" y="280" class="prop-text">a × b = -b × a</text>
    <text x="220" y="296" class="prop-text">a × (b + c) = a×b + a×c</text>
  </g>
  
  <!-- Applications Box -->
  <g class="fade-in" data-narration="Applications of dot and cross products in physics and engineering" style="animation-delay: 0.9s">
    <rect x="15" y="320" width="390" height="65" fill="linear-gradient(90deg, #e9d8fd, #feebc8)" stroke="#d69e2e" rx="6" opacity="0.9" style="fill: #faf5ff"/>
    <text x="210" y="345" text-anchor="middle" class="label-text" font-weight="bold" fill="#744210">Applications</text>
    <text x="210" y="365" text-anchor="middle" class="prop-text">Physics: Work, Torque, Electromagnetism</text>
    <text x="210" y="380" text-anchor="middle" class="prop-text">CS: Graphics, Games, Robotics</text>
  </g>
  
  <!-- Animated arrows connecting sections -->
  <g class="pulse" style="animation-delay: 1.2s" data-narration="Visual relationship indicator">
    <circle cx="210" cy="235" r="6" fill="#667eea" opacity="0.7"/>
    <line x1="210" y1="225" x2="210" y2="240" stroke="#667eea" stroke-width="2"/>
  </g>
</svg>