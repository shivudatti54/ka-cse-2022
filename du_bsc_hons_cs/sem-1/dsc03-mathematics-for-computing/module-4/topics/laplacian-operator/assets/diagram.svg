<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="laplacian-operator">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e6e6fa"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f5f5"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#9b7bb8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: 'Times New Roman', serif; font-size: 18px; fill: #2c3e50; font-style: italic; }
    .formula-small { font-family: 'Times New Roman', serif; font-size: 14px; fill: #34495e; }
    .section-box { fill: url(#boxGradient); stroke: #c5d9e8; stroke-width: 1.5; rx: 8; }
    .accent-box { fill: url(#accentGradient); rx: 6; opacity: 0.9; }
    .grid-line { stroke: #d0d0d0; stroke-width: 1; }
    .highlight { fill: #e74c3c; }
    .arrow { stroke: #7eb8da; stroke-width: 2; marker-end: url(#arrowhead); }
    .animate-fade { animation: fadeIn 1s ease-out forwards; }
    .animate-slide { animation: slideIn 0.8s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>

  <!-- Title Section -->
  <g data-narration="The Laplacian Operator is a second-order differential operator named after Pierre-Simon Laplace">
    <text x="210" y="35" text-anchor="middle" class="title animate-slide">The Laplacian Operator</text>
    <text x="210" y="55" text-anchor="middle" class="detail animate-fade">âˆ‡Â² (Del Squared)</text>
  </g>

  <!-- Definition Box -->
  <g data-narration="The Laplacian is defined as the sum of second partial derivatives">
    <rect x="20" y="70" width="180" height="55" class="section-box" filter="url(#shadow)"/>
    <text x="30" y="88" class="label" style="font-weight:bold;">Definition:</text>
    <text x="30" y="108" class="formula">âˆ‡Â²f = âˆ‚Â²f/âˆ‚xÂ² + âˆ‚Â²f/âˆ‚yÂ²</text>
    <text x="30" y="122" class="detail">(2D Cartesian form)</text>
  </g>

  <!-- Visual Grid Representation -->
  <g data-narration="Visual representation showing how Laplacian measures curvature at each point">
    <rect x="210" y="70" width="190" height="100" class="section-box" filter="url(#shadow)"/>
    <text x="220" y="88" class="label" style="font-weight:bold;">Grid Visualization</text>
    <!-- Grid lines -->
    <line x1="230" y1="105" x2="230" y2="160" class="grid-line"/>
    <line x1="260" y1="105" x2="260" y2="160" class="grid-line"/>
    <line x1="290" y1="105" x2="290" y2="160" class="grid-line"/>
    <line x1="320" y1="105" x2="320" y2="160" class="grid-line"/>
    <line x1="350" y1="105" x2="350" y2="160" class="grid-line"/>
    <line x1="230" y1="105" x2="380" y2="105" class="grid-line"/>
    <line x1="230" y1="120" x2="380" y2="120" class="grid-line"/>
    <line x1="230" y1="135" x2="380" y2="135" class="grid-line"/>
    <line x1="230" y1="150" x2="380" y2="150" class="grid-line"/>
    <line x1="230" y1="165" x2="380" y2="165" class="grid-line"/>
    <!-- Center point highlighted -->
    <circle cx="305" cy="135" r="8" fill="#e74c3c" class="animate-pulse" opacity="0.8"/>
    <text x="305" y="138" text-anchor="middle" fill="white" font-size="10" font-weight="bold">f</text>
    <!-- Labels -->
    <text x="280" y="180" class="detail">âˆ‚Â²f/âˆ‚xÂ² + âˆ‚Â²f/âˆ‚yÂ²</text>
    <text x="280" y="193" class="detail">= Curvature measure</text>
  </g>

  <!-- Property Boxes -->
  <g data-narration="Three key properties: Linearity, Translation Invariance, and Rotation Invariance">
    <!-- Linearity -->
    <rect x="20" y="135" width="115" height="50" class="section-box" filter="url(#shadow)"/>
    <rect x="20" y="135" width="115" height="12" fill="#7eb8da" rx="8"/>
    <text x="77" y="147" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Linearity</text>
    <text x="30" y="165" class="detail">âˆ‡Â²(f+g) = âˆ‡Â²f + âˆ‡Â²g</text>
    <text x="30" y="180" class="detail">âˆ‡Â²(cf) = câˆ‡Â²f</text>

    <!-- Translation Invariance -->
    <rect x="145" y="135" width="115" height="50" class="section-box" filter="url(#shadow)"/>
    <rect x="145" y="135" width="115" height="12" fill="#9b7bb8" rx="6"/>
    <text x="202" y="147" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Translation Inv.</text>
    <text x="155" y="165" class="detail">Unchanged under</text>
    <text x="155" y="180" class="detail">shifts (xâ†’x+a)</text>

    <!-- Rotation Invariance -->
    <rect x="270" y="135" width="130" height="50" class="section-box" filter="url(#shadow)"/>
    <rect x="270" y="135" width="130" height="12" fill="#6bb89d" rx="6"/>
    <text x="335" y="147" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Rotation Inv.</text>
    <text x="280" y="165" class="detail">Unchanged under</text>
    <text x="280" y="180" class="detail">coordinate rotation</text>
  </g>

  <!-- Extended Definition (3D) -->
  <g data-narration="In three dimensions, the Laplacian includes the z-component">
    <rect x="20" y="195" width="180" height="45" class="section-box" filter="url(#shadow)"/>
    <text x="30" y="215" class="label" style="font-weight:bold;">3D Form:</text>
    <text x="30" y="235" class="formula-small">âˆ‡Â²f = âˆ‚Â²f/âˆ‚xÂ² + âˆ‚Â²f/âˆ‚yÂ² + âˆ‚Â²f/âˆ‚zÂ²</text>
  </g>

  <!-- Applications Section -->
  <g data-narration="Key applications in computer science include edge detection, image segmentation, and machine learning">
    <rect x="210" y="180" width="190" height="90" class="section-box" filter="url(#shadow)"/>
    <rect x="210" y="180" width="190" height="15" fill="url(#accentGradient)" rx="8"/>
    <text x="305" y="192" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Applications</text>
    
    <circle cx="230" cy="215" r="5" fill="#e74c3c" class="animate-pulse"/>
    <text x="245" y="218" class="detail">Edge Detection</text>
    
    <circle cx="230" cy="235" r="5" fill="#3498db" class="animate-pulse"/>
    <text x="245" y="238" class="detail">Image Segmentation</text>
    
    <circle cx="230" cy="255" r="5" fill="#2ecc71" class="animate-pulse"/>
    <text x="245" y="258" class="detail">Object Recognition</text>
    
    <!-- Connection arrows -->
    <path d="M320 225 Q340 225 350 240" stroke="#7eb8da" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
    <path d="M370 225 Q385 225 380 250" stroke="#7eb8da" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  </g>

  <!-- Key Concept: Laplacian as divergence of gradient -->
  <g data-narration="Mathematically, the Laplacian equals the divergence of the gradient (âˆ‡Â·âˆ‡f)">
    <rect x="20" y="250" width="180" height="50" class="section-box" filter="url(#shadow)"/>
    <text x="30" y="270" class="label" style="font-weight:bold;">Alternative Form:</text>
    <text x="30" y="290" class="formula-small">âˆ‡Â²f = âˆ‡ Â· âˆ‡f = div(grad f)</text>
    <text x="30" y="305" class="detail">(Divergence of Gradient)</text>
  </g>

  <!-- Kernel Representation -->
  <g data-narration="In image processing, the Laplacian is implemented as a convolution kernel">
    <rect x="210" y="280" width="190" height="55" class="section-box" filter="url(#shadow)"/>
    <rect x="210" y="280" width="190" height="15" fill="#e67e22" rx="8"/>
    <text x="305" y="292" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Laplacian Kernel</text>
    
    <!-- 3x3 Kernel -->
    <g transform="translate(250, 305)">
      <rect x="0" y="0" width="21" height="18" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="21" y="0" width="21" height="18" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="42" y="0" width="21" height="18" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="0" y="18" width="21" height="18" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="21" y="18" width="21" height="18" fill="#e74c3c" stroke="#c0392b"/>
      <rect x="42" y="18" width="21" height="18" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="0" y="36" width="21" height="18" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="21" y="36" width="21" height="18" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="42" y="36" width="21" height="18" fill="#ecf0f1" stroke="#bdc3c7"/>
      
      <text x="10.5" y="13" text-anchor="middle" font-size="9" fill="#34495e">0</text>
      <text x="31.5" y="13" text-anchor="middle" font-size="9" fill="#34495e">1</text>
      <text x="52.5" y="13" text-anchor="middle" font-size="9" fill="#34495e">0</text>
      <text x="10.5" y="31" text-anchor="middle" font-size="9" fill="#34495e">1</text>
      <text x="31.5" y="31" text-anchor="middle" font-size="9" fill="white" font-weight="bold">-4</text>
      <text x="52.5" y="31" text-anchor="middle" font-size="9" fill="#34495e">1</text>
      <text x="10.5" y="49" text-anchor="middle" font-size="9" fill="#34495e">0</text>
      <text x="31.5" y="49" text-anchor="middle" font-size="9" fill="#34495e">1</text>
      <text x="52.5" y="49" text-anchor="middle" font-size="9" fill="#34495e">0</text>
    </g>
  </g>

  <!-- Bottom info -->
  <g data-narration="Named after French mathematician Pierre-Simon Laplace (1749-1827)">
    <text x="210" y="360" text-anchor="middle" class="detail" fill="#7f8c8d">Pierre-Simon Laplace (1749â€“1827)</text>
    <text x="210" y="378" text-anchor="middle" class="detail" fill="#95a5a6">French mathematician &amp; astronomer</text>
  </g>

  <!-- Decorative corner elements -->
  <path d="M10 10 L30 10 L30 12 L12 12 L12 30 L10 30 Z" fill="#7eb8da" opacity="0.5"/>
  <path d="M410 390 L390 390 L390 388 L408 388 L408 370 L410 370 Z" fill="#9b7bb8" opacity="0.5"/>

</svg>