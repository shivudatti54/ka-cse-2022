<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="scalar-vector-fields">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    
    <linearGradient id="scalarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="50%" style="stop-color:#fed6e3"/>
      <stop offset="100%" style="stop-color:#ffecd2"/>
    </linearGradient>
    
    <linearGradient id="vectorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    
    <linearGradient id="gradientArrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .scalar-box { animation: slideInLeft 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .vector-box { animation: slideInRight 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .gradient-box { animation: slideInUp 0.6s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; animation-delay: 1s; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .label-anim { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    .detail-anim { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title-anim">Scalar &amp; Vector Fields</text>
  <text x="210" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5d6d7e" class="title-anim">Understanding Fields in Mathematics &amp; Physics</text>
  
  <!-- Scalar Field Section -->
  <g class="scalar-box" data-narration="Scalar Field: Assigns a single value (magnitude only) to each point in space. Examples: temperature, density, electric potential.">
    <rect x="20" y="75" width="160" height="130" rx="10" fill="url(#scalarGradient)" filter="url(#shadow)"/>
    <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Scalar Field</text>
    <text x="100" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">f(x,y) → magnitude</text>
    
    <!-- Heat map representation -->
    <rect x="35" y="120" width="50" height="50" fill="#ff6b6b" opacity="0.9"/>
    <rect x="85" y="120" width="50" height="50" fill="#ffa502" opacity="0.9"/>
    <rect x="35" y="170" width="50" height="50" fill="#7bed9f" opacity="0.9"/>
    <rect x="85" y="170" width="50" height="50" fill="#70a1ff" opacity="0.9"/>
    
    <!-- Labels -->
    <text x="60" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">T=90°</text>
    <text x="110" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">T=60°</text>
    <text x="60" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">T=30°</text>
    <text x="110" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">T=15°</text>
    
    <text x="100" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Temperature Map</text>
  </g>
  
  <!-- Vector Field Section -->
  <g class="vector-box" data-narration="Vector Field: Assigns a vector (magnitude + direction) to each point. Examples: force, velocity, electric field.">
    <rect x="240" y="75" width="160" height="130" rx="10" fill="url(#vectorGradient)" filter="url(#shadow)"/>
    <text x="320" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Vector Field</text>
    <text x="320" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">F(x,y) → magnitude + direction</text>
    
    <!-- Arrow field representation -->
    <g class="float-anim">
      <line x1="260" y1="140" x2="290" y2="130" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="300" y1="135" x2="330" y2="125" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowhead)"/>
      <line x1="340" y1="130" x2="370" y2="120" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
    </g>
    <g class="float-anim" style="animation-delay: 0.5s;">
      <line x1="255" y1="165" x2="285" y2="160" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="295" y1="162" x2="325" y2="157" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowhead)"/>
      <line x1="335" y1="159" x2="365" y2="154" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
    </g>
    <g class="float-anim" style="animation-delay: 1s;">
      <line x1="260" y1="190" x2="290" y2="190" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="300" y1="192" x2="330" y2="192" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowhead)"/>
      <line x1="340" y1="195" x2="370" y2="195" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
    </g>
    
    <text x="320" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Velocity Field</text>
  </g>
  
  <!-- Arrow between scalar and vector -->
  <g class="label-anim" data-narration="The gradient operator ∇ transforms a scalar field into a vector field pointing in the direction of maximum increase.">
    <path d="M 185 140 L 235 140" stroke="#9b59b6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="210" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9b59b6" font-weight="bold">∇ (gradient)</text>
  </g>
  
  <!-- Gradient Section -->
  <g class="gradient-box" data-narration="Gradient (∇f): Points in direction of steepest ascent. Magnitude = rate of change. Perpendicular to contour lines.">
    <rect x="85" y="245" width="250" height="120" rx="10" fill="url(#gradientArrow)" filter="url(#shadow)"/>
    <text x="210" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Gradient: ∇f (del operator)</text>
    <text x="210" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">Points in direction of greatest rate of increase</text>
    
    <!-- Contour lines -->
    <ellipse cx="150" cy="325" rx="30" ry="15" fill="none" stroke="#2c3e50" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="210" cy="325" rx="40" ry="20" fill="none" stroke="#2c3e50" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="270" cy="325" rx="50" ry="25" fill="none" stroke="#2c3e50" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Gradient arrows pointing outward from center -->
    <g class="pulse-anim">
      <line x1="210" y1="325" x2="210" y2="295" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
    </g>
    <g class="pulse-anim" style="animation-delay: 0.3s;">
      <line x1="210" y1="325" x2="235" y2="300" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    </g>
    <g class="pulse-anim" style="animation-delay: 0.6s;">
      <line x1="210" y1="325" x2="185" y2="300" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Labels -->
    <text x="210" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50" font-style="italic">∇f = (∂f/∂x, ∂f/∂y)</text>
    <text x="210" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Perpendicular to contour lines</text>
  </g>
  
  <!-- Key concept labels -->
  <g class="detail-anim">
    <circle cx="30" cy="330" r="5" fill="#70a1ff"/>
    <text x="45" y="334" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Magnitude only</text>
    
    <circle cx="30" cy="350" r="5" fill="#ff6b6b"/>
    <text x="45" y="354" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Magnitude + Direction</text>
    
    <circle cx="30" cy="370" r="5" fill="#9b59b6"/>
    <text x="45" y="374" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Steepest ascent</text>
  </g>
  
  <!-- Bottom equation box -->
  <g class="detail-anim" data-narration="Mathematical representation: Scalar f(x,y), Vector field F(x,y) = &lt;P,Q&gt;, Gradient ∇f = (∂f/∂x, ∂f/∂y)">
    <rect x="280" y="340" width="130" height="40" rx="5" fill="white" opacity="0.8"/>
    <text x="345" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2c3e50">∇f = (∂f/∂x)i + (∂f/∂y)j</text>
    <text x="345" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5d6d7e">Gradient operator</text>
  </g>
</svg>