<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="partial-derivatives-del-operator">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce6cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccccff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd9cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out 1s forwards; stroke-dashoffset: 100; }
    .pulse-element { animation: pulse 2s ease-in-out 1.5s infinite; transform-origin: center; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title-text" font-size="22" fill="#2c5aa0">Partial Derivatives</text>
  <text x="210" y="55" text-anchor="middle" class="title-text" font-size="18" fill="#4a7c59">and Del Operator</text>
  
  <!-- Main Function Box -->
  <g class="pulse-element">
    <rect x="140" y="70" width="140" height="45" rx="8" fill="#f0f8ff" stroke="#4a90c2" stroke-width="2"/>
    <text x="210" y="90" text-anchor="middle" class="label" font-size="16" fill="#2c5aa0" font-weight="bold">f(x, y)</text>
    <text x="210" y="108" text-anchor="middle" class="label" font-size="12" fill="#666">Function of multiple variables</text>
  </g>
  
  <!-- Partial Derivative X Box -->
  <g class="box1" data-narration="Partial derivative with respect to x treats y as constant">
    <rect x="20" y="140" width="130" height="70" rx="8" fill="url(#boxGradient1)" stroke="#d4883a" stroke-width="2"/>
    <text x="85" y="162" text-anchor="middle" class="label" font-size="15" fill="#8b4513" font-weight="bold">∂f/∂x</text>
    <text x="85" y="182" text-anchor="middle" class="label" font-size="11" fill="#666">w.r.t. x</text>
    <text x="85" y="196" text-anchor="middle" class="label" font-size="10" fill="#888">y is constant</text>
  </g>
  
  <!-- Partial Derivative Y Box -->
  <g class="box2" data-narration="Partial derivative with respect to y treats x as constant">
    <rect x="270" y="140" width="130" height="70" rx="8" fill="url(#boxGradient2)" stroke="#3a8a3a" stroke-width="2"/>
    <text x="335" y="162" text-anchor="middle" class="label" font-size="15" fill="#2d5a2d" font-weight="bold">∂f/∂y</text>
    <text x="335" y="182" text-anchor="middle" class="label" font-size="11" fill="#666">w.r.t. y</text>
    <text x="335" y="196" text-anchor="middle" class="label" font-size="10" fill="#888">x is constant</text>
  </g>
  
  <!-- Arrows from function to partials -->
  <path d="M140 142 L95 145" stroke="#888" stroke-width="2" fill="none" class="arrow-line" marker-end="url(#arrowhead)"/>
  <path d="M280 142 L325 145" stroke="#888" stroke-width="2" fill="none" class="arrow-line" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
  
  <!-- Del Operator Box -->
  <g class="box3" data-narration="The del operator (nabla) is a vector of partial derivatives">
    <rect x="120" y="230" width="90" height="60" rx="8" fill="url(#boxGradient3)" stroke="#6a5acd" stroke-width="2"/>
    <text x="165" y="255" text-anchor="middle" class="label" font-size="22" fill="#483d8b" font-weight="bold">∇</text>
    <text x="165" y="278" text-anchor="middle" class="label" font-size="11" fill="#666">Del Operator</text>
  </g>
  
  <!-- Gradient Box -->
  <g class="box4" data-narration="The gradient is the vector of partial derivatives pointing in direction of maximum increase">
    <rect x="230" y="230" width="160" height="60" rx="8" fill="url(#boxGradient4)" stroke="#c45a3a" stroke-width="2"/>
    <text x="310" y="255" text-anchor="middle" class="label" font-size="14" fill="#8b4513" font-weight="bold">∇f = (∂f/∂x, ∂f/∂y)</text>
    <text x="310" y="275" text-anchor="middle" class="label" font-size="11" fill="#666">Gradient Vector</text>
    <text x="310" y="287" text-anchor="middle" class="label" font-size="10" fill="#888">Direction of max increase</text>
  </g>
  
  <!-- Arrow from partials to del -->
  <path d="M85 215 L130 235" stroke="#888" stroke-width="2" fill="none" class="arrow-line"/>
  <path d="M335 215 L290 235" stroke="#888" stroke-width="2" fill="none" class="arrow-line"/>
  
  <!-- Arrow from del to gradient -->
  <path d="M215 260 L225 260" stroke="#888" stroke-width="2" fill="none" class="arrow-line"/>
  
  <!-- Rate of Change Indicator -->
  <g class="box1" data-narration="Partial derivatives measure the rate of change in each variable direction">
    <rect x="20" y="310" width="180" height="40" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
    <text x="110" y="330" text-anchor="middle" class="label" font-size="12" fill="#555">Rate of Change</text>
    <text x="110" y="344" text-anchor="middle" class="label" font-size="10" fill="#777">dx, dy → df</text>
  </g>
  
  <!-- Applications Box -->
  <g class="box2" data-narration="Applications include edge detection in computer vision and gradient descent in machine learning">
    <rect x="220" y="310" width="180" height="40" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
    <text x="310" y="330" text-anchor="middle" class="label" font-size="12" fill="#555">CS Applications</text>
    <text x="310" y="344" text-anchor="middle" class="label" font-size="10" fill="#777">ML, Computer Vision</text>
  </g>
  
  <!-- Bottom decorative line -->
  <line x1="20" y1="365" x2="400" y2="365" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>
</svg>