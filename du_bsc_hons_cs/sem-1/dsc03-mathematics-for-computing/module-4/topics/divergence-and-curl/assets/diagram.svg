<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="divergence-and-curl">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e8e8f4"/>
      <stop offset="100%" style="stop-color:#f4e8fc"/>
    </linearGradient>
    <linearGradient id="sourceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="curlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#44a08d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box-divergence { animation: slideInRight 0.6s ease-out 0.2s both; }
    .box-curl { animation: slideInRight 0.6s ease-out 0.4s both; }
    .box-formula { animation: fadeIn 0.6s ease-out 0.5s both; }
    .source-point { animation: pulse 2s infinite; transform-origin: center; }
    .curl-arrow { animation: rotate 3s linear infinite; transform-origin: 300px 200px; }
    .div-arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
    .formula-text { font-family: 'Courier New', monospace; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#2c3e50" class="title">Divergence and Curl</text>
  <line x1="100" y1="45" x2="320" y2="45" stroke="#3498db" stroke-width="2" class="title" style="animation: fadeIn 0.8s ease-out 0.3s both"/>
  
  <!-- Divergence Section - Left Side -->
  <g class="box-divergence">
    <rect x="15" y="60" width="185" height="145" rx="10" fill="white" filter="url(#shadow)" stroke="#ff6b6b" stroke-width="2"/>
    <text x="107" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#e74c3c">DIVERGENCE</text>
    
    <!-- Coordinate axes for divergence -->
    <line x1="70" y1="160" x2="150" y2="160" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="110" y1="120" x2="110" y2="195" stroke="#7f8c8d" stroke-width="1"/>
    <text x="155" y="163" font-family="Arial" font-size="10" fill="#7f8c8d">x</text>
    <text x="105" y="118" font-family="Arial" font-size="10" fill="#7f8c8d">y</text>
    
    <!-- Source point -->
    <circle cx="110" cy="160" r="8" fill="url(#sourceGradient)" class="source-point"/>
    <text x="110" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#c0392b">Source</text>
    
    <!-- Diverging arrows -->
    <g class="div-arrow" style="animation-delay: 0.6s">
      <line x1="115" y1="155" x2="135" y2="140" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="118" y1="162" x2="145" y2="165" stroke="#e74c3c" stroke-width="2"/>
      <line x1="115" y1="168" x2="135" y2="185" stroke="#e74c3c" stroke-width="2"/>
      <line x1="105" y1="155" x2="80" y2="138" stroke="#e74c3c" stroke-width="2"/>
      <line x1="102" y1="162" x2="70" y2="165" stroke="#e74c3c" stroke-width="2"/>
      <line x1="105" y1="170" x2="80" y2="188" stroke="#e74c3c" stroke-width="2"/>
    </g>
    
    <text x="107" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c" font-weight="bold">Positive = Source</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#e74c3c"/>
    </marker>
    <marker id="arrowheadBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Curl Section - Right Side -->
  <g class="box-curl">
    <rect x="220" y="60" width="185" height="145" rx="10" fill="white" filter="url(#shadow)" stroke="#4ecdc4" stroke-width="2"/>
    <text x="312" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#16a085">CURL</text>
    
    <!-- Rotational field visualization -->
    <g class="curl-arrow">
      <path d="M 280 130 Q 310 115 340 130" fill="none" stroke="#3498db" stroke-width="2.5" marker-end="url(#arrowheadBlue)"/>
      <path d="M 340 170 Q 310 185 280 170" fill="none" stroke="#3498db" stroke-width="2.5" marker-end="url(#arrowheadBlue)"/>
      <path d="M 250 150 Q 265 120 250 90" fill="none" stroke="#3498db" stroke-width="2.5" marker-end="url(#arrowheadBlue)"/>
      <path d="M 370 150 Q 355 180 370 210" fill="none" stroke="#3498db" stroke-width="2.5" marker-end="url(#arrowheadBlue)"/>
    </g>
    
    <!-- Center point -->
    <circle cx="312" cy="150" r="6" fill="url(#curlGradient)"/>
    <text x="312" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#16a085" font-weight="bold">Rotation</text>
    
    <text x="312" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#16a085" font-weight="bold">≠ 0</text>
  </g>
  
  <!-- Formula Box -->
  <g class="box-formula">
    <rect x="15" y="215" width="185" height="80" rx="8" fill="#fef9e7" filter="url(#shadow)" stroke="#f39c12" stroke-width="1.5"/>
    <text x="107" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#d35400">Divergence Formula</text>
    <text x="107" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#2c3e50">∇·F = ∂F_x/∂x</text>
    <text x="107" y="275" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#2c3e50">     + ∂F_y/∂y</text>
    <text x="107" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#2c3e50">     + ∂F_z/∂z</text>
  </g>
  
  <!-- Curl Formula Box -->
  <g class="box-formula" style="animation-delay: 0.6s">
    <rect x="220" y="215" width="185" height="80" rx="8" fill="#e8f8f5" filter="url(#shadow)" stroke="#1abc9c" stroke-width="1.5"/>
    <text x="312" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#16a085">Curl Formula</text>
    <text x="312" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#2c3e50">∇×F = (∂F_z/∂y - ∂F_y/∂z)</text>
    <text x="312" y="275" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#2c3e50">i + (∂F_x/∂z - ∂F_z/∂x)j</text>
    <text x="312" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#2c3e50">  + (∂F_y/∂x - ∂F_x/∂y)k</text>
  </g>
  
  <!-- Properties Section -->
  <g class="box-formula" style="animation-delay: 0.7s">
    <rect x="15" y="305" width="390" height="85" rx="8" fill="white" filter="url(#shadow)" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="210" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#8e44ad">Key Properties</text>
    
    <!-- Property bullets -->
    <circle cx="35" cy="345" r="4" fill="#9b59b6"/>
    <text x="48" y="349" font-family="Arial" font-size="11" fill="#2c3e50">Divergence of curl = 0</text>
    
    <circle cx="35" cy="365" r="4" fill="#9b59b6"/>
    <text x="48" y="369" font-family="Arial" font-size="11" fill="#2c3e50">Curl of gradient = 0</text>
    
    <circle cx="210" cy="345" r="4" fill="#9b59b6"/>
    <text x="223" y="349" font-family="Arial" font-size="11" fill="#2c3e50">Divergence → Scalar</text>
    
    <circle cx="210" cy="365" r="4" fill="#9b59b6"/>
    <text x="223" y="369" font-family="Arial" font-size="11" fill="#2c3e50">Curl → Vector</text>
    
    <circle cx="350" cy="345" r="4" fill="#9b59b6"/>
    <text x="363" y="349" font-family="Arial" font-size="11" fill="#2c3e50">Source (+div)</text>
    
    <circle cx="350" cy="365" r="4" fill="#9b59b6"/>
    <text x="363" y="369" font-family="Arial" font-size="11" fill="#2c3e50">Sink (−div)</text>
  </g>
  
  <!-- Data narration attributes (hidden, for accessibility) -->
  <title data-narration="Introduction to divergence and curl in vector calculus">Title Section</title>
  <desc data-narration="Divergence measures source-ness or sink-ness of a vector field">Divergence Section</desc>
  <desc data-narration="Curl measures rotation or circulation in a vector field">Curl Section</desc>
  <desc data-narration="Formula showing divergence as partial derivatives">Divergence Formula</desc>
  <desc data-narration="Formula showing curl as cross product operator">Curl Formula</desc>
  <desc data-narration="Key properties including divergence of curl equals zero and curl of gradient equals zero">Properties Section</desc>
</svg>