<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="gradient-directional-derivative">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="surfaceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="50%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c9"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c5aa0"/>
    </marker>
    <marker id="gradArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
    .title-text { font-family: Georgia, serif; font-size: 22px; fill: #2c5aa0; font-weight: bold; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .formula-text { font-family: 'Times New Roman', serif; font-size: 14px; fill: #1a1a2e; font-style: italic; }
    .box { fill: #fff; stroke: #b8d4e8; stroke-width: 1; rx: 5; }
    .level-curve { fill: none; stroke: #7faac4; stroke-width: 1.5; }
    .gradient-arrow { stroke: #e74c3c; stroke-width: 3; fill: none; marker-end: url(#gradArrow); }
    .direction-arrow { stroke: #27ae60; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .contour-fill { fill: url(#surfaceGradient); opacity: 0.3; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="slide-in" style="animation-delay: 0.1s;">
    <text x="210" y="35" text-anchor="middle" class="title-text">Gradient &amp; Directional Derivative</text>
  </g>

  <!-- Section 1: Function Surface with Contour Lines -->
  <g data-narration="The contour plot represents level curves of a function f(x,y), showing where the function has constant values" class="fade-in" style="animation-delay: 0.3s;">
    <ellipse cx="120" cy="140" rx="70" ry="50" class="contour-fill"/>
    <ellipse cx="120" cy="140" rx="50" ry="35" class="level-curve"/>
    <ellipse cx="120" cy="140" rx="35" ry="25" class="level-curve"/>
    <ellipse cx="120" cy="140" rx="20" ry="14" class="level-curve"/>
    <ellipse cx="120" cy="140" rx="8" ry="6" class="level-curve"/>
    <text x="120" y="200" text-anchor="middle" class="detail-text">f(x,y) = x² + y²</text>
  </g>

  <!-- Section 2: Gradient Vector -->
  <g data-narration="The gradient ∇f points in the direction of steepest increase, shown here as a red arrow from point (x,y)" class="fade-in" style="animation-delay: 0.5s;">
    <circle cx="85" cy="130" r="5" fill="#e74c3c" class="pulse"/>
    <line x1="85" y1="130" x2="130" y2="95" class="gradient-arrow"/>
    <text x="115" y="108" class="label-text" fill="#e74c3c" font-weight="bold">∇f</text>
    <text x="85" y="150" text-anchor="middle" class="detail-text" fill="#e74c3c">(∂f/∂x, ∂f/∂y)</text>
  </g>

  <!-- Section 3: Direction of Unit Vector u -->
  <g data-narration="The directional derivative measures the rate of change in any direction u, shown here as a green arrow" class="fade-in" style="animation-delay: 0.7s;">
    <line x1="85" y1="130" x2="55" y2="165" class="direction-arrow"/>
    <text x="55" y="180" class="label-text" fill="#27ae60" font-weight="bold">u</text>
    <text x="145" y="160" class="detail-text" fill="#27ae60">Direction of u</text>
  </g>

  <!-- Section 4: Perpendicular Relationship -->
  <g data-narration="The gradient is always perpendicular to level curves, indicating the direction of maximum change" class="fade-in" style="animation-delay: 0.9s;">
    <path d="M 120 140 Q 130 125 145 130" stroke="#9b59b6" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
    <text x="150" y="125" class="detail-text" fill="#9b59b6">⊥ to level curves</text>
  </g>

  <!-- Key Formulas Box -->
  <g class="fade-in" style="animation-delay: 1.1s;">
    <rect x="200" y="95" width="200" height="120" class="box"/>
    <text x="210" y="118" class="label-text" font-weight="bold">Key Formulas</text>
    <text x="210" y="140" class="formula-text">∇f = (∂f/∂x, ∂f/∂y)</text>
    <text x="210" y="158" class="formula-text">Dᵤf = ∇f · u</text>
    <text x="210" y="180" class="detail-text">Max rate of change = |∇f|</text>
    <text x="210" y="198" class="detail-text">Min rate of change = -|∇f|</text>
  </g>

  <!-- Properties Box -->
  <g class="fade-in" style="animation-delay: 1.3s;">
    <rect x="200" y="230" width="200" height="80" class="box"/>
    <text x="210" y="253" class="label-text" font-weight="bold">Properties</text>
    <circle cx="210" cy="270" r="3" fill="#27ae60"/>
    <text x="220" y="274" class="detail-text">∇f ⟂ level curves</text>
    <circle cx="210" cy="290" r="3" fill="#27ae60"/>
    <text x="220" y="294" class="detail-text">Max Dᵤf in ∇f direction</text>
    <circle cx="210" cy="308" r="3" fill="#27ae60"/>
    <text x="220" y="312" class="detail-text">Min Dᵤf opposite ∇f</text>
  </g>

  <!-- Example Box -->
  <g class="fade-in" style="animation-delay: 1.5s;">
    <rect x="200" y="320" width="200" height="65" class="box"/>
    <text x="210" y="343" class="label-text" font-weight="bold">Example: f = x² + y²</text>
    <text x="210" y="365" class="formula-text">∇f = (2x, 2y) at point (1,1)</text>
    <text x="210" y="382" class="detail-text">∇f = (2, 2) pointing NE</text>
  </g>

  <!-- Animated connection lines -->
  <g class="fade-in" style="animation-delay: 1.7s;">
    <line x1="185" y1="140" x2="200" y2="140" stroke="#b8d4e8" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Bottom label -->
  <g class="fade-in" style="animation-delay: 1.9s;">
    <text x="210" y="395" text-anchor="middle" class="detail-text" fill="#666">Gradient points uphill • Directional derivative measures slope in any direction</text>
  </g>
</svg>