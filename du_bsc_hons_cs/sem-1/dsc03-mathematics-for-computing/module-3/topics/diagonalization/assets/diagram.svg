<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="diagonalization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e8fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8eb8d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b88ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e8d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8ed8b8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .formula { animation: pulse 3s ease-in-out infinite; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .eigen-value { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    .eigen-vec { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Diagonalization</text>
  <line x1="100" y1="48" x2="320" y2="48" stroke="#5d7e99" stroke-width="2" class="title" style="animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0"/>
  
  <!-- Matrix A Box -->
  <g class="box1" data-narration="The original square matrix A that we want to diagonalize">
    <rect x="30" y="70" width="90" height="70" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="75" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#2c3e50">Matrix A</text>
    <text x="75" y="115" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#34495e">[2  1]</text>
    <text x="75" y="132" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#34495e">[1  1]</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M130 105 L165 105" stroke="#5d7e99" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d7e99"/>
    </marker>
  </defs>
  
  <!-- Eigenvalues Box -->
  <g class="eigen-value" data-narration="Eigenvalues found by solving det(A - λI) = 0">
    <rect x="175" y="70" width="95" height="70" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="222" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2c3e50">Eigenvalues</text>
    <text x="222" y="115" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#34495e">λ₁ = 2.618</text>
    <text x="222" y="132" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#34495e">λ₂ = 0.382</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M280 105 L315 105" stroke="#5d7e99" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Eigenvectors Box -->
  <g class="eigen-vec" data-narration="Corresponding eigenvectors form the matrix P">
    <rect x="325" y="70" width="80" height="70" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="365" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2c3e50">Eigenvecs</text>
    <text x="365" y="115" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#34495e">v₁ = [0.85]</text>
    <text x="365" y="130" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#34495e">v₂ = [-0.53]</text>
    <text x="365" y="145" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#34495e">  0.53]</text>
  </g>
  
  <!-- P Matrix Box -->
  <g class="box2" data-narration="Matrix P contains eigenvectors as columns">
    <rect x="30" y="170" width="80" height="70" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="70" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#2c3e50">Matrix P</text>
    <text x="70" y="215" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#34495e">[0.85 -0.53]</text>
    <text x="70" y="232" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#34495e">[0.53  0.85]</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M120 205 L150 205" stroke="#5d7e99" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- P inverse Box -->
  <g class="box3" data-narration="P⁻¹ is the inverse of eigenvector matrix">
    <rect x="160" y="170" width="80" height="70" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="200" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#2c3e50">Matrix P⁻¹</text>
    <text x="200" y="215" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#34495e">[0.85  0.53]</text>
    <text x="200" y="230" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#34495e">[-0.53  0.85]</text>
    <text x="200" y="245" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#7f8c8d">(inverse)</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M250 205 L280 205" stroke="#5d7e99" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- D Matrix Box -->
  <g class="box4" data-narration="Diagonal matrix D contains eigenvalues on diagonal">
    <rect x="290" y="170" width="80" height="70" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="330" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#2c3e50">Matrix D</text>
    <text x="330" y="218" text-anchor="middle" font-family="Courier New, monospace" font-size="16" fill="#34495e">[2.618  0   ]</text>
    <text x="330" y="238" text-anchor="middle" font-family="Courier New, monospace" font-size="16" fill="#34495e">[0      0.382]</text>
  </g>
  
  <!-- Formula Box -->
  <g class="box4" data-narration="Diagonalization formula: A = PDP⁻¹">
    <rect x="80" y="270" width="260" height="50" rx="10" fill="#f8f9fa" stroke="#5d7e99" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c3e50" class="formula">A = P D P⁻¹</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="box4" data-narration="Key concepts: Eigenvalues, eigenvectors, diagonalizable matrices, and orthogonal diagonalization">
    <rect x="30" y="335" width="360" height="55" rx="8" fill="white" stroke="#b8d4e8" stroke-width="1"/>
    <text x="210" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#34495e">Key Concepts</text>
    <text x="50" y="372" font-family="Arial, sans-serif" font-size="10" fill="#5d7e99">• Eigenvalue: Ax = λx</text>
    <text x="160" y="372" font-family="Arial, sans-serif" font-size="10" fill="#5d7e99">• Diagonalizable: A = PDP⁻¹</text>
    <text x="280" y="372" font-family="Arial, sans-serif" font-size="10" fill="#5d7e99">• Orthogonal: A = PDPᵀ</text>
  </g>
</svg>