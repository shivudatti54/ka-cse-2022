<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="positive-definite-matrices-markov">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pdGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4f5e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6d4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="connGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffe4b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff4e0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .box { rx: 8; ry: 8; filter: url(#shadow); }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out forwards 0.5s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Positive Definite Matrices &amp; Markov Chains</text>
  <line x1="50" y1="42" x2="370" y2="42" stroke="#b8e6cf" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Left Section: Positive Definite Matrix -->
  <g class="slide-left" style="animation-delay: 0.4s" data-narration="Positive definite matrices are symmetric with all positive eigenvalues, ensuring xᵀAx &gt; 0 for any non-zero vector x">
    <rect x="20" y="60" width="170" height="150" fill="url(#pdGradient)" class="box"/>
    <text x="105" y="85" text-anchor="middle" class="label">Positive Definite</text>
    <text x="105" y="85" text-anchor="middle" class="label" style="font-size: 16px;">Matrix (A)</text>
    
    <!-- Matrix visualization -->
    <g transform="translate(45, 100)">
      <rect x="0" y="0" width="50" height="40" fill="white" stroke="#27ae60" stroke-width="1.5" rx="3"/>
      <text x="25" y="18" text-anchor="middle" class="detail" fill="#27ae60">a₁₁</text>
      <text x="25" y="32" text-anchor="middle" class="detail" fill="#27ae60">a₂₂</text>
      <text x="8" y="27" text-anchor="middle" class="detail" fill="#27ae60">A =</text>
    </g>
    
    <!-- Properties -->
    <g transform="translate(100, 145)">
      <circle cx="0" cy="0" r="4" fill="#27ae60"/>
      <text x="10" y="4" class="detail">λ &gt; 0 (eigenvalues)</text>
    </g>
    <g transform="translate(100, 163)">
      <circle cx="0" cy="0" r="4" fill="#27ae60"/>
      <text x="10" y="4" class="detail">det(A) &gt; 0</text>
    </g>
    <g transform="translate(100, 181)">
      <circle cx="0" cy="0" r="4" fill="#27ae60"/>
      <text x="10" y="4" class="detail">xᵀAx &gt; 0</text>
    </g>
  </g>
  
  <!-- Right Section: Markov Chain -->
  <g class="slide-right" style="animation-delay: 0.5s" data-narration="A Markov chain models state transitions with a stochastic matrix where each row sums to 1, representing transition probabilities">
    <rect x="230" y="60" width="170" height="150" fill="url(#mcGradient)" class="box"/>
    <text x="315" y="85" text-anchor="middle" class="label" style="color:#6c3483;">Markov Chain</text>
    
    <!-- State diagram -->
    <g transform="translate(265, 105)">
      <circle cx="20" cy="30" r="18" fill="#9b59b6" class="pulse" style="animation-delay: 1s"/>
      <text x="20" y="34" text-anchor="middle" fill="white" font-size="11" font-weight="bold">S₁</text>
      <circle cx="70" cy="30" r="18" fill="#8e44ad" class="pulse" style="animation-delay: 1.2s"/>
      <text x="70" y="34" text-anchor="middle" fill="white" font-size="11" font-weight="bold">S₂</text>
      <!-- Arrow -->
      <line x1="38" y1="30" x2="52" y2="30" stroke="#6c3483" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Transition matrix -->
    <g transform="translate(250, 155)">
      <text x="10" y="0" class="detail" style="fill:#6c3483;">P =</text>
      <rect x="30" y="-8" width="55" height="30" fill="white" stroke="#9b59b6" stroke-width="1" rx="2"/>
      <text x="42" y="8" text-anchor="middle" class="detail">0.7</text>
      <text x="57" y="8" text-anchor="middle" class="detail">0.3</text>
      <text x="42" y="18" text-anchor="middle" class="detail">0.4</text>
      <text x="57" y="18" text-anchor="middle" class="detail">0.6</text>
    </g>
    <g transform="translate(300, 192)">
      <text x="0" y="0" class="detail" style="fill:#6c3483;">Rows sum to 1</text>
    </g>
  </g>
  
  <!-- Connection Section -->
  <g class="slide-up" style="animation-delay: 0.7s" data-narration="The connection lies in the covariance matrix for Markov chains being positive definite, and in analyzing convergence through eigenvalues">
    <rect x="60" y="230" width="300" height="60" fill="url(#connGradient)" class="box"/>
    <text x="210" y="255" text-anchor="middle" class="label" style="font-size: 13px; fill:#e67e22;">Connection Point</text>
    <text x="210" y="275" text-anchor="middle" class="detail">Covariance matrix in Markov = Positive Definite</text>
  </g>
  
  <!-- Arrow from PD to Connection -->
  <g class="line-anim">
    <line x1="105" y1="210" x2="105" y2="235" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow from MC to Connection -->
  <g class="line-anim">
    <line x1="315" y1="210" x2="315" y2="235" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom: Applications -->
  <g class="slide-up" style="animation-delay: 0.9s" data-narration="These concepts apply to statistics (multivariate normal distributions), machine learning (optimization), and modeling random processes">
    <rect x="20" y="305" width="380" height="80" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="8"/>
    <text x="210" y="330" text-anchor="middle" class="label" style="font-size: 13px;">Applications</text>
    
    <g transform="translate(50, 350)">
      <rect x="0" y="0" width="100" height="25" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1" rx="4"/>
      <text x="50" y="16" text-anchor="middle" class="detail" fill="#16a085">Statistics</text>
    </g>
    <g transform="translate(160, 350)">
      <rect x="0" y="0" width="100" height="25" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="4"/>
      <text x="50" y="16" text-anchor="middle" class="detail" fill="#d68910">Machine Learning</text>
    </g>
    <g transform="translate(270, 350)">
      <rect x="0" y="0" width="100" height="25" fill="#ebf5fb" stroke="#3498db" stroke-width="1" rx="4"/>
      <text x="50" y="16" text-anchor="middle" class="detail" fill="#2980b9">Signal Processing</text>
    </g>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="195" y="260" r="3" fill="#e67e22" class="pulse" style="animation-delay: 1.5s"/>
  <circle cx="225" y="260" r="3" fill="#e67e22" class="pulse" style="animation-delay: 1.7s"/>
</svg>