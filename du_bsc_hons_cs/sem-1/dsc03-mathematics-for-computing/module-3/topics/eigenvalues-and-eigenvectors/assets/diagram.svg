<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="eigenvalues-and-eigenvectors">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e8fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b8dd9" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes growArrow {
      from { stroke-dashoffset: 60; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3748; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #4a5568; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #718096; }
    .formula { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #2c5282; }
    .highlight { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .section-1 { animation: fadeIn 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s both; }
    .section-4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .grid-line { stroke: #cbd5e0; stroke-width: 1; }
    .axis { stroke: #a0aec0; stroke-width: 2; }
    .vector-original { stroke: #e53e3e; stroke-width: 3; fill: none; stroke-dasharray: 200; animation: drawLine 1s ease-out forwards; }
    .vector-transformed { stroke: #38a169; stroke-width: 3; fill: none; stroke-dasharray: 200; animation: drawLine 1s ease-out 0.5s forwards; }
    .eigenvector-line { stroke: #805ad5; stroke-width: 4; stroke-dasharray: 60; animation: growArrow 1s ease-out forwards; }
    .arrow-connector { stroke: #5b8dd9; stroke-width: 2; fill: none; stroke-dasharray: 60; animation: growArrow 0.8s ease-out 0.3s forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <g class="section-1">
    <text x="210" y="30" text-anchor="middle" class="title">Eigenvalues &amp; Eigenvectors</text>
    <line x1="60" y1="42" x2="360" y2="42" stroke="#5b8dd9" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Main Visualization Area -->
  <g class="section-2" transform="translate(30, 70)">
    <!-- Coordinate Grid -->
    <g class="grid">
      <line x1="0" y1="50" x2="160" y2="50" class="grid-line"/>
      <line x1="0" y1="100" x2="160" y2="100" class="grid-line"/>
      <line x1="0" y1="150" x2="160" y2="150" class="grid-line"/>
      <line x1="0" y1="200" x2="160" y2="200" class="grid-line"/>
      <line x1="50" y1="0" x2="50" y2="250" class="grid-line"/>
      <line x1="100" y1="0" x2="100" y2="250" class="grid-line"/>
      <line x1="150" y1="0" x2="150" y2="250" class="grid-line"/>
    </g>
    
    <!-- Axes -->
    <line x1="20" y1="250" x2="170" y2="250" class="axis"/>
    <line x1="20" y1="250" x2="20" y2="20" class="axis"/>
    <text x="165" y="260" class="detail">x</text>
    <text x="12" y="25" class="detail">y</text>
    
    <!-- Original Vector v -->
    <line x1="20" y1="250" x2="60" y2="210" class="vector-original"/>
    <polygon points="56,212 60,206 64,214" fill="#e53e3e" transform="rotate(-45 60 210)"/>
    <text x="45" y="235" class="detail" fill="#e53e3e">v</text>
    
    <!-- Transformation Arrow -->
    <path d="M 90 230 Q 110 200 130 180" class="arrow-connector" marker-end="url(#arrowhead)"/>
    
    <!-- Transformed Vector λv -->
    <line x1="20" y1="250" x2="120" y2="130" class="vector-transformed"/>
    <polygon points="116,132 120,126 124,134" fill="#38a169" transform="rotate(-45 120 130)"/>
    <text x="80" y="190" class="detail" fill="#38a169">λv</text>
    
    <!-- Eigenvector Line (unchanged direction) -->
    <line x1="20" y1="250" x2="160" y2="110" class="eigenvector-line"/>
    <text x="170" y="105" class="label" fill="#805ad5" data-narration="The eigenvector direction remains unchanged under the transformation">Eigenvector</text>
  </g>
  
  <!-- Definition Box -->
  <g class="section-3" transform="translate(200, 70)">
    <rect x="0" y="0" width="190" height="85" fill="white" rx="8" filter="url(#shadow)"/>
    <rect x="0" y="0" width="190" height="85" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="95" y="22" text-anchor="middle" class="highlight" fill="#2d3748" data-narration="The fundamental equation defining eigenvalues and eigenvectors">Definition</text>
    <text x="95" y="50" text-anchor="middle" class="formula" data-narration="Matrix A times vector v equals eigenvalue λ times vector v">A × v = λ × v</text>
    <text x="95" y="72" text-anchor="middle" class="detail" data-narration="Where A is a square matrix, v is the eigenvector, and λ is the eigenvalue">A = matrix, v = eigenvector, λ = eigenvalue</text>
  </g>
  
  <!-- Eigenvalue Indicator -->
  <g class="section-3" transform="translate(220, 165)">
    <rect x="0" y="0" width="150" height="45" fill="#f0fff4" rx="6" stroke="#48bb78" stroke-width="1.5"/>
    <text x="75" y="18" text-anchor="middle" class="highlight" fill="#276749" data-narration="The eigenvalue represents how much the eigenvector is scaled">Eigenvalue (λ)</text>
    <text x="75" y="38" text-anchor="middle" class="label" fill="#2f855a" data-narration="In this example, λ = 2 meaning the vector is stretched by factor of 2">λ = 2 (stretches by 2×)</text>
  </g>
  
  <!-- Properties Section -->
  <g class="section-4" transform="translate(200, 220)">
    <rect x="0" y="0" width="190" height="100" fill="white" rx="8" filter="url(#shadow)"/>
    <rect x="0" y="0" width="190" height="100" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="95" y="20" text-anchor="middle" class="highlight" fill="#2d3748" data-narration="Key properties of eigenvalues and eigenvectors">Key Properties</text>
    <g transform="translate(10, 35)">
      <circle cx="5" cy="5" r="4" fill="#805ad5"/>
      <text x="18" y="9" class="detail" data-narration="Eigenvectors for different eigenvalues are perpendicular">Distinct λ → Orthogonal v</text>
    </g>
    <g transform="translate(10, 55)">
      <circle cx="5" cy="5" r="4" fill="#38a169"/>
      <text x="18" y="9" class="detail" data-narration="Eigenvalue decomposition factors a matrix into its eigenvalues and eigenvectors">Eigen-Decomposition</text>
    </g>
    <g transform="translate(10, 75)">
      <circle cx="5" cy="5" r="4" fill="#e53e3e"/>
      <text x="18" y="9" class="detail" data-narration="All eigenvectors for the same eigenvalue form an eigenspace">Eigenspace = span{v}</text>
    </g>
  </g>
  
  <!-- Geometric Interpretation Box -->
  <g class="section-4" transform="translate(30, 330)">
    <rect x="0" y="0" width="160" height="55" fill="#fef3c7" rx="6" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="80" y="18" text-anchor="middle" class="highlight" fill="#92400e" data-narration="Geometric interpretation of the transformation">Geometric Meaning</text>
    <text x="80" y="38" text-anchor="middle" class="detail" fill="#b45309" data-narration="The eigenvector doesn't change direction - it only gets scaled">"Direction unchanged, only scaled"</text>
  </g>
  
  <!-- Animated Highlight Circle on Eigenvector -->
  <circle cx="150" cy="180" r="25" fill="none" stroke="#805ad5" stroke-width="2" class="pulse-anim" opacity="0.6"/>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b8dd9"/>
    </marker>
  </defs>
</svg>