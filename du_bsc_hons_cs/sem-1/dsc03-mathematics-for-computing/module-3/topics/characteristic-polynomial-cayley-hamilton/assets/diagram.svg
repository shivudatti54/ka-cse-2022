<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="characteristic-polynomial-cayley-hamilton">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3e6cb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1ecf1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bee5eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeeba;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e3f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d6d8db;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c3e50; }
    .box { stroke: #bdc3c7; stroke-width: 1; rx: 8; }
    .arrow { stroke: #7f8c8d; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .section { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .animate-slide-up { animation: slideInUp 0.8s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="section section-1">
    <text x="210" y="30" text-anchor="middle" class="title">Characteristic Polynomial &amp;</text>
    <text x="210" y="55" text-anchor="middle" class="title" style="font-size:18px;">Cayley-Hamilton Theorem</text>
  </g>
  
  <!-- Section 1: Characteristic Polynomial Definition -->
  <g class="section section-2" data-narration="The characteristic polynomial is defined as pA(x) = det(xI - A), where I is the identity matrix">
    <rect x="15" y="75" width="180" height="85" fill="url(#greenGradient)" class="box"/>
    <text x="25" y="92" class="label" style="font-weight:bold;">Characteristic Polynomial</text>
    <text x="25" y="112" class="label">Definition:</text>
    <text x="25" y="130" class="formula">pA(x) = det(xI - A)</text>
    <text x="25" y="148" class="detail">where I is identity matrix</text>
  </g>
  
  <!-- Section 2: Cayley-Hamilton Theorem -->
  <g class="section section-2" data-narration="The Cayley-Hamilton theorem states that every square matrix satisfies its own characteristic polynomial: pA(A) = 0">
    <rect x="225" y="75" width="180" height="85" fill="url(#blueGradient)" class="box"/>
    <text x="235" y="92" class="label" style="font-weight:bold;">Cayley-Hamilton Theorem</text>
    <text x="235" y="112" class="label">Theorem:</text>
    <text x="235" y="132" class="formula">pA(A) = 0</text>
    <text x="235" y="150" class="detail">Matrix satisfies its own polynomial</text>
  </g>
  
  <!-- Connection Arrow -->
  <g class="section section-3">
    <path d="M 200 115 Q 210 115 220 115" stroke="#95a5a6" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
    <polygon points="218,112 225,115 218,118" fill="#95a5a6"/>
  </g>
  
  <!-- Section 3: Example Matrix -->
  <g class="section section-3" data-narration="Example: For matrix A = [[2,1],[1,3]], we compute the characteristic polynomial">
    <rect x="15" y="170" width="130" height="100" fill="url(#orangeGradient)" class="box"/>
    <text x="25" y="190" class="label" style="font-weight:bold;">Example Matrix A</text>
    <text x="25" y="215" class="formula">A = | 2  1 |</text>
    <text x="25" y="235" class="formula">    | 1  3 |</text>
    <text x="25" y="255" class="detail">2×2 square matrix</text>
  </g>
  
  <!-- Section 4: Characteristic Polynomial Calculation -->
  <g class="section section-3" data-narration="Computing det(xI - A) gives us x² - 5x + 5">
    <rect x="155" y="170" width="130" height="100" fill="url(#purpleGradient)" class="box"/>
    <text x="165" y="190" class="label" style="font-weight:bold;">Computation</text>
    <text x="165" y="215" class="formula">det(xI - A) =</text>
    <text x="165" y="235" class="formula">(x-2)(x-3) - 1</text>
    <text x="165" y="255" class="detail">= x² - 5x + 5</text>
  </g>
  
  <!-- Section 5: Eigenvalues -->
  <g class="section section-4" data-narration="The roots of the characteristic polynomial are the eigenvalues of the matrix">
    <rect x="295" y="170" width="110" height="100" fill="url(#blueGradient)" class="box"/>
    <text x="305" y="190" class="label" style="font-weight:bold;">Eigenvalues</text>
    <text x="305" y="220" class="formula" style="font-size:12px;">λ₁ = (5+√5)/2</text>
    <text x="305" y="240" class="formula" style="font-size:12px;">λ₂ = (5-√5)/2</text>
    <text x="305" y="260" class="detail">Roots of pA(x)</text>
  </g>
  
  <!-- Verification Box -->
  <g class="section section-4" data-narration="Verifying Cayley-Hamilton: substituting A into the polynomial gives the zero matrix">
    <rect x="15" y="280" width="390" height="105" fill="url(#greenGradient)" class="box"/>
    <text x="25" y="305" class="label" style="font-weight:bold;">Cayley-Hamilton Verification</text>
    <text x="25" y="330" class="formula">pA(A) = A² - 5A + 5I = 0</text>
    <text x="25" y="350" class="detail">Substituting matrix A into polynomial:</text>
    <text x="25" y="370" class="detail">|4+5 2+3| - |10 5| + |5 0| = |0 0|</text>
    <text x="200" y="370" class="detail" style="font-weight:bold; fill:#27ae60;">✓ Zero Matrix Confirmed</text>
    <text x="280" y="370" class="detail">|2+3 1+3| - |5 3| + |0 5| = |0 0|</text>
  </g>
  
  <!-- Animated highlight pulse on eigenvalues -->
  <g class="animate-pulse" style="transform-origin: 350px 230px;">
    <circle cx="350" cy="230" r="8" fill="#3498db" opacity="0.3"/>
  </g>
  
  <!-- Relationship arrows -->
  <g class="section section-4">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
      </marker>
    </defs>
  </g>
</svg>