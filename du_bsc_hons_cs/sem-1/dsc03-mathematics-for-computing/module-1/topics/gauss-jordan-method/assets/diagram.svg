<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="gauss-jordan-method" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8fce8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <linearGradient id="matrixBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbe6"/>
      <stop offset="100%" style="stop-color:#fff5cc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlightPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .matrix-num { font-family: 'Courier New', monospace; font-size: 14px; fill: #2c3e50; }
    .highlight { font-weight: bold; fill: #e74c3c; }
    .concept-box { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .slide-item { opacity: 0; animation: slideIn 0.5s ease-out forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { stroke: #3498db; stroke-width: 2; fill: none; }
    .pivot-box { fill: none; stroke: #e74c3c; stroke-width: 2; animation: highlightPulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Gauss-Jordan Method</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#3498db" stroke-width="2"/>
  
  <!-- Section 1: Augmented Matrix -->
  <g class="concept-box section-1" data-narration="The augmented matrix combines coefficients and constants">
    <rect x="20" y="55" width="180" height="45" rx="5" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="30" y="72" class="label" font-weight="bold">1. Augmented Matrix</text>
    <text x="30" y="88" class="detail">Combine coefficients + constants</text>
    <!-- Matrix example -->
    <g transform="translate(100, 75)">
      <rect x="0" y="0" width="80" height="50" fill="url(#matrixBg)" rx="3" stroke="#ccc"/>
      <text x="10" y="18" class="matrix-num">2  3 -1 | 5</text>
      <text x="10" y="33" class="matrix-num">1 -2  4 |-2</text>
      <text x="10" y="48" class="matrix-num">3  1  2 | 7</text>
    </g>
  </g>
  
  <!-- Section 2: Row Operations -->
  <g class="concept-box section-2" data-narration="Three row operations transform the matrix">
    <rect x="220" y="55" width="180" height="45" rx="5" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="230" y="72" class="label" font-weight="bold">2. Row Operations</text>
    <text x="230" y="88" class="detail">Swap • Scale • Add rows</text>
    <!-- Operation symbols -->
    <g transform="translate(280, 78)">
      <circle cx="0" cy="0" r="10" fill="#3498db" opacity="0.8"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="12">R</text>
      <text x="18" y="4" class="detail">↔</text>
      <circle cx="40" cy="0" r="10" fill="#27ae60" opacity="0.8"/>
      <text x="40" y="4" text-anchor="middle" fill="white" font-size="12">kR</text>
      <text x="58" y="4" class="detail">+</text>
      <circle cx="80" cy="0" r="10" fill="#9b59b6" opacity="0.8"/>
      <text x="80" y="4" text-anchor="middle" fill="white" font-size="10">R</text>
    </g>
  </g>
  
  <!-- Section 3: Pivot Element -->
  <g class="concept-box section-3" data-narration="The pivot element is the leading entry used for elimination">
    <rect x="20" y="115" width="180" height="45" rx="5" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="30" y="132" class="label" font-weight="bold">3. Pivot Element</text>
    <text x="30" y="148" class="detail">Leading entry in each row</text>
    <!-- Pivot visualization -->
    <g transform="translate(100, 135)">
      <rect x="0" y="0" width="80" height="40" fill="url(#matrixBg)" rx="3" stroke="#ccc"/>
      <rect x="2" y="2" width="20" height="12" class="pivot-box"/>
      <text x="8" y="11" class="matrix-num highlight">2</text>
      <text x="30" y="11" class="matrix-num">3</text>
      <text x="55" y="11" class="matrix-num">-1</text>
      <text x="68" y="11" class="matrix-num">|5</text>
      <text x="8" y="28" class="matrix-num">1</text>
      <text x="30" y="28" class="matrix-num">-2</text>
    </g>
    <text x="125" y="170" class="detail" fill="#e74c3c">Pivot</text>
    <path d="M120 175 L110 145" stroke="#e74c3c" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Section 4: RREF -->
  <g class="concept-box section-4" data-narration="Final reduced row echelon form reveals the solution">
    <rect x="220" y="115" width="180" height="45" rx="5" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="230" y="132" class="label" font-weight="bold">4. Reduced RREF</text>
    <text x="230" y="148" class="detail">Identity matrix form</text>
    <!-- RREF Matrix -->
    <g transform="translate(280, 135)">
      <rect x="0" y="0" width="80" height="40" fill="#e8f8f5" rx="3" stroke="#27ae60"/>
      <rect x="2" y="2" width="18" height="12" fill="#27ae60" opacity="0.3"/>
      <text x="8" y="11" class="matrix-num" fill="#27ae60" font-weight="bold">1</text>
      <text x="30" y="11" class="matrix-num">0</text>
      <text x="55" y="11" class="matrix-num">0</text>
      <text x="68" y="11" class="matrix-num">|2</text>
      <text x="8" y="28" class="matrix-num">0</text>
      <text x="30" y="28" class="matrix-num" fill="#27ae60" font-weight="bold">1</text>
    </g>
  </g>
  
  <!-- Matrix Transformation Diagram -->
  <g transform="translate(30, 175)">
    <text x="80" y="0" text-anchor="middle" class="label" font-weight="bold">Matrix Transformation Process</text>
    
    <!-- Step 1: Original -->
    <g class="slide-item" style="animation-delay: 1s;">
      <rect x="0" y="15" width="100" height="60" fill="url(#matrixBg)" rx="4" stroke="#ccc"/>
      <text x="35" y="30" class="detail">Original</text>
      <text x="10" y="50" class="matrix-num" font-size="12">2  3 -1 | 5</text>
      <text x="10" y="65" class="matrix-num" font-size="12">1 -2  4 |-2</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M110 45 L140 45" class="arrow-line" marker-end="url(#arrowhead)"/>
    <text x="125" y="40" class="detail" text-anchor="middle">Eliminate</text>
    
    <!-- Step 2: Upper Triangular -->
    <g class="slide-item" style="animation-delay: 1.5s;">
      <rect x="150" y="15" width="100" height="60" fill="#fff5e6" rx="4" stroke="#f39c12"/>
      <text x="185" y="30" class="detail">Upper Triangular</text>
      <text x="160" y="50" class="matrix-num" font-size="12">2  3 -1 | 5</text>
      <text x="160" y="65" class="matrix-num" font-size="12">0 -7  9 |-9</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M260 45 L290 45" class="arrow-line" marker-end="url(#arrowhead)"/>
    <text x="275" y="40" class="detail" text-anchor="middle">Back-Subst</text>
    
    <!-- Step 3: RREF -->
    <g class="slide-item" style="animation-delay: 2s;">
      <rect x="300" y="15" width="100" height="60" fill="#e8f8f5" rx="4" stroke="#27ae60"/>
      <text x="335" y="30" class="detail" fill="#27ae60">RREF</text>
      <text x="310" y="50" class="matrix-num" font-size="12">1  0  0 | 2</text>
      <text x="310" y="65" class="matrix-num" font-size="12">0  1  0 | 1</text>
    </g>
    
    <!-- Solution box -->
    <g class="slide-item" style="animation-delay: 2.5s;">
      <rect x="280" y="90" width="140" height="35" fill="#d5f4e6" rx="4" stroke="#27ae60"/>
      <text x="350" y="107" text-anchor="middle" class="label" fill="#27ae60" font-weight="bold">x=2, y=1, z=-1</text>
      <text x="350" y="120" text-anchor="middle" class="detail">Solution!</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 340)">
    <rect x="0" y="0" width="380" height="50" fill="white" rx="5" stroke="#ddd"/>
    <text x="15" y="18" class="label" font-weight="bold" font-size="12">Key Concepts:</text>
    
    <!-- Legend items -->
    <g transform="translate(15, 28)">
      <circle cx="0" cy="0" r="5" fill="#e74c3c"/>
      <text x="10" y="4" class="detail">Pivot</text>
      
      <circle cx="60" cy="0" r="5" fill="#3498db"/>
      <text x="70" y="4" class="detail">Row Swap</text>
      
      <circle cx="130" cy="0" r="5" fill="#27ae60"/>
      <text x="140" y="4" class="detail">Scale Row</text>
      
      <circle cx="200" cy="0" r="5" fill="#9b59b6"/>
      <text x="210" y="4" class="detail">Add Rows</text>
      
      <rect x="260" y="-5" width="15" height="10" fill="#e8f8f5" stroke="#27ae60"/>
      <text x="280" y="4" class="detail">RREF</text>
    </g>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
</svg>