<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="echelon-form-rank-determinant">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e5f7"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e3f2fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
      .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
      .matrix-bracket { stroke: #2c3e50; stroke-width: 3; fill: none; }
      .pivot { fill: #e74c3c; }
      .zero { fill: #95a5a6; }
      .nonzero { fill: #3498db; }
      .section-box { fill: url(#boxGradient); stroke: #bdc3c7; stroke-width: 1; rx: 8; }
      .arrow { stroke: #e67e22; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight-box { fill: #fff9e6; stroke: #f39c12; stroke-width: 2; rx: 6; }
      .pulse-anim { animation: pulse 2s ease-in-out infinite; }
      .fade-in { animation: fadeIn 1s ease-out forwards; }
      .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
      .slide-right { animation: slideInRight 0.8s ease-out forwards; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Echelon Form, Rank &amp; Determinant</text>
  
  <!-- Section 1: Original Matrix -->
  <g class="slide-left" data-narration="The original 3x3 matrix before transformation to echelon form">
    <rect x="20" y="50" width="110" height="90" class="section-box" filter="url(#shadow)"/>
    <text x="75" y="68" text-anchor="middle" class="label" font-weight="bold">Original Matrix</text>
    <line x1="35" y1="75" x2="115" y2="75" stroke="#bdc3c7" stroke-width="1"/>
    <!-- Matrix content -->
    <text x="45" y="95" class="label nonzero">2</text>
    <text x="65" y="95" class="label nonzero">1</text>
    <text x="85" y="95" class="label nonzero">3</text>
    <text x="45" y="115" class="label nonzero">4</text>
    <text x="65" y="115" class="label nonzero">1</text>
    <text x="85" y="115" class="label nonzero">2</text>
    <text x="45" y="135" class="label nonzero">6</text>
    <text x="65" y="135" class="label nonzero">3</text>
    <text x="85" y="135" class="label nonzero">4</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="fade-in" style="animation-delay: 0.3s">
    <path d="M140 95 L170 95" class="arrow"/>
  </g>
  
  <!-- Section 2: Echelon Form -->
  <g class="slide-right" data-narration="After row operations, we get echelon form with leading entries forming a staircase pattern">
    <rect x="180" y="50" width="110" height="90" class="section-box" filter="url(#shadow)"/>
    <text x="235" y="68" text-anchor="middle" class="label" font-weight="bold">Echelon Form</text>
    <line x1="195" y1="75" x2="275" y2="75" stroke="#bdc3c7" stroke-width="1"/>
    <!-- Matrix content with staircase -->
    <text x="195" y="95" class="label nonzero" font-weight="bold">2</text>
    <text x="215" y="95" class="label nonzero">1</text>
    <text x="235" y="95" class="label nonzero">3</text>
    <text x="195" y="115" class="label zero">0</text>
    <text x="215" y="115" class="label nonzero" font-weight="bold">-1</text>
    <text x="235" y="115" class="label nonzero">-4</text>
    <text x="195" y="135" class="label zero">0</text>
    <text x="215" y="135" class="label zero">0</text>
    <text x="235" y="135" class="label nonzero" font-weight="bold">2</text>
    <!-- Staircase line -->
    <polyline points="200,98 200,130 230,130" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" class="pulse-anim" style="animation-delay: 1s"/>
  </g>
  
  <!-- Section 3: Rank -->
  <g class="fade-in" data-narration="Rank equals the number of non-zero pivots (leading entries), here 3 pivot elements">
    <rect x="310" y="50" width="95" height="90" class="section-box" filter="url(#shadow)"/>
    <text x="357" y="68" text-anchor="middle" class="label" font-weight="bold">Rank = 3</text>
    <line x1="320" y1="75" x2="395" y2="75" stroke="#bdc3c7" stroke-width="1"/>
    <!-- Pivot indicators -->
    <circle cx="335" cy="95" r="5" class="pivot"/>
    <circle cx="335" cy="115" r="5" class="pivot"/>
    <circle cx="355" cy="135" r="5" class="pivot"/>
    <text x="350" y="95" class="detail">Pivot 1</text>
    <text x="350" y="115" class="detail">Pivot 2</text>
    <text x="350" y="135" class="detail">Pivot 3</text>
  </g>
  
  <!-- Arrow down -->
  <g class="fade-in" style="animation-delay: 0.6s">
    <path d="M75 150 L75 180" class="arrow"/>
    <path d="M235 150 L235 180" class="arrow"/>
  </g>
  
  <!-- Section 4: Determinant Box -->
  <g class="fade-in" data-narration="For triangular matrices, determinant is the product of diagonal entries: 2 × (-1) × 2 = -4">
    <rect x="20" y="190" width="175" height="70" class="highlight-box" filter="url(#shadow)"/>
    <text x="107" y="212" text-anchor="middle" class="label" font-weight="bold">Determinant</text>
    <text x="107" y="232" text-anchor="middle" class="detail">det = 2 × (-1) × 2 = -4</text>
    <text x="107" y="248" text-anchor="middle" class="detail" fill="#27ae60">(Product of pivots in triangular form)</text>
  </g>
  
  <!-- Section 5: Rank Properties -->
  <g class="fade-in" data-narration="Rank properties: rank ≤ min(rows, columns). If det ≠ 0, full rank (invertible matrix)">
    <rect x="210" y="190" width="195" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="307" y="212" text-anchor="middle" class="label" font-weight="bold">Rank Properties</text>
    <text x="220" y="232" class="detail">• Full rank → Invertible (det ≠ 0)</text>
    <text x="220" y="248" class="detail">• rank ≤ min(m, n) for m×n matrix</text>
  </g>
  
  <!-- Section 6: Staircase Visual -->
  <g class="fade-in" data-narration="The staircase pattern visualizes echelon form: each pivot must be to the right of the pivot above it">
    <rect x="20" y="275" width="385" height="110" class="section-box" filter="url(#shadow)"/>
    <text x="212" y="295" text-anchor="middle" class="label" font-weight="bold">Echelon Form Staircase Pattern</text>
    
    <!-- Staircase visualization -->
    <rect x="50" y="305" width="30" height="25" fill="#3498db" rx="2"/>
    <rect x="90" y="305" width="30" height="25" fill="#3498db" rx="2"/>
    <rect x="130" y="305" width="30" height="25" fill="#3498db" rx="2"/>
    
    <rect x="90" y="340" width="30" height="25" fill="#3498db" rx="2"/>
    <rect x="130" y="340" width="30" height="25" fill="#3498db" rx="2"/>
    
    <rect x="130" y="365" width="30" height="25" fill="#3498db" rx="2"/>
    
    <!-- Zero blocks -->
    <rect x="50" y="340" width="30" height="25" fill="#ecf0f1" rx="2"/>
    <rect x="50" y="365" width="30" height="25" fill="#ecf0f1" rx="2"/>
    <rect x="90" y="365" width="30" height="25" fill="#ecf0f1" rx="2"/>
    
    <!-- Staircase line -->
    <polyline points="55,305 55,365 155,365" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- Labels -->
    <text x="212" y="320" text-anchor="middle" class="detail">Leading entries (pivots)</text>
    <text x="212" y="380" text-anchor="middle" class="detail">Zero entries below staircase</text>
    
    <!-- Legend -->
    <circle cx="280" cy="330" r="6" fill="#3498db"/>
    <text x="295" y="334" class="detail">Pivot</text>
    <circle cx="280" cy="350" r="6" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="295" y="354" class="detail">Zero</text>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="400" cy="20" r="8" fill="#e74c3c" opacity="0.3"/>
  <circle cx="20" cy="380" r="8" fill="#3498db" opacity="0.3"/>
</svg>