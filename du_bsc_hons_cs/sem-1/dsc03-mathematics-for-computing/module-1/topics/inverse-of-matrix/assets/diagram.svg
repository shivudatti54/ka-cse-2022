<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="inverse-of-matrix">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.7s forwards; opacity: 0; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.9s forwards; opacity: 0; }
    .formula-box { animation: pulse 3s ease-in-out infinite 1.2s; transform-origin: center; }
    .arrow-anim { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2d3748" class="title">Inverse of a Matrix</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" class="title">2×2 Matrix Formula</text>
  
  <!-- Section 1: Original Matrix -->
  <g class="section-1" data-narration="The original 2x2 matrix A with elements a, b, c, d">
    <rect x="20" y="75" width="100" height="70" fill="white" stroke="#cbd5e0" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="70" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4a5568" font-weight="bold">Matrix A</text>
    <text x="70" y="118" text-anchor="middle" font-family="Courier New, monospace" font-size="16" fill="#2d3748">a    b</text>
    <text x="70" y="136" text-anchor="middle" font-family="Courier New, monospace" font-size="16" fill="#2d3748">c    d</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow-anim">
    <path d="M135 110 L170 110" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
      </marker>
    </defs>
  </g>
  
  <!-- Section 2: Swap & Negate -->
  <g class="section-2" data-narration="Step 1: Swap diagonal elements (a↔d), negate off-diagonal (b→-b, c→-c)">
    <rect x="185" y="75" width="130" height="70" fill="white" stroke="#cbd5e0" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="250" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4a5568" font-weight="bold">Swap &amp; Negate</text>
    <text x="250" y="115" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#e53e3e">d    <tspan fill="#2d3748">-b</tspan></text>
    <text x="250" y="135" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#e53e3e"><tspan fill="#2d3748">-c</tspan>    a</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow-anim" style="animation-delay: 1.2s">
    <path d="M330 110 L365 110" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
    <defs>
      <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
      </marker>
    </defs>
  </g>
  
  <!-- Section 3: Determinator -->
  <g class="section-3" data-narration="Step 2: Calculate determinant (ad - bc)">
    <rect x="380" y="90" width="35" height="40" fill="white" stroke="#cbd5e0" stroke-width="2" rx="4"/>
    <text x="397" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568">det</text>
    <text x="397" y="122" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#2d3748">ad-bc</text>
  </g>
  
  <!-- Divider -->
  <line x1="20" y1="165" x2="400" y2="165" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5" class="section-4"/>
  
  <!-- Section 4: Final Formula -->
  <g class="section-4" data-narration="Final inverse formula: A⁻¹ = (1/det) × [d, -b; -c, a]">
    <rect x="60" y="185" width="300" height="50" fill="url(#accentGradient)" rx="8" filter="url(#shadow)" class="formula-box"/>
    <text x="210" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="white" font-weight="bold">A⁻¹ = 1/(ad - bc) ×</text>
    <text x="210" y="232" text-anchor="middle" font-family="Courier New, monospace" font-size="16" fill="white">[ d  -b ]</text>
  </g>
  
  <!-- Section 5: Key Points -->
  <g class="section-4" data-narration="Key requirement: determinant must be non-zero for matrix to be invertible">
    <rect x="20" y="255" width="380" height="60" fill="white" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="35" y="275" font-family="Arial, sans-serif" font-size="13" fill="#4a5568" font-weight="bold">⚠ Key Condition:</text>
    <text x="35" y="295" font-family="Arial, sans-serif" font-size="12" fill="#718096">Matrix is invertible only if det ≠ 0</text>
    <text x="35" y="310" font-family="Arial, sans-serif" font-size="12" fill="#718096">If det = 0, matrix is singular (no inverse exists)</text>
  </g>
  
  <!-- Section 6: Example -->
  <g class="section-4" data-narration="Example: For A = [[2,1],[4,3]], det = 2×3 - 1×4 = 2, A⁻¹ = 1/2 × [[3,-1],[-4,2]]">
    <rect x="20" y="325" width="380" height="65" fill="white" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="35" y="345" font-family="Arial, sans-serif" font-size="13" fill="#4a5568" font-weight="bold">📝 Example: A = [[2,1],[4,3]]</text>
    <text x="35" y="365" font-family="Courier New, monospace" font-size="12" fill="#2d3748">det = 2×3 - 1×4 = 2</text>
    <text x="35" y="382" font-family="Courier New, monospace" font-size="12" fill="#2d3748">A⁻¹ = 1/2 × [[3,-1],[-4,2]] = [[1.5,-0.5],[-2,1]]</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="8" fill="#667eea" opacity="0.2"/>
  <circle cx="390" cy="370" r="12" fill="#764ba2" opacity="0.15"/>
  <circle cx="50" cy="370" r="6" fill="#667eea" opacity="0.2"/>
</svg>