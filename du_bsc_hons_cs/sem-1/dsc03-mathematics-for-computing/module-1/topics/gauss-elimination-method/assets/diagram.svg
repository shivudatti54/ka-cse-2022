<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="gauss-elimination-method">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e8fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fcf4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="matrixGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8f0ff;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    @keyframes highlight {
      0%, 100% { fill: #4a5568; }
      50% { fill: #2d3748; }
    }
    
    .title { animation: fadeIn 1s ease-out; }
    .section1 { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .section2 { animation: fadeIn 0.8s ease-out 0.6s both; }
    .section3 { animation: slideInRight 0.8s ease-out 0.9s both; }
    .section4 { animation: slideInUp 0.8s ease-out 1.2s both; }
    .box { animation: fadeIn 0.6s ease-out both; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .highlight-text { animation: pulse 2s ease-in-out infinite; }
    
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .matrix-bracket { fill: none; stroke: #2d3748; stroke-width: 3; stroke-linecap: round; }
    .matrix-cell { font-size: 14px; fill: #2d3748; }
    .label { font-size: 12px; fill: #718096; }
    .title-text { font-size: 22px; font-weight: bold; fill: #1a365d; }
    .concept-title { font-size: 14px; font-weight: bold; fill: #2d3748; }
    .concept-text { font-size: 11px; fill: #4a5568; }
    .arrow-line { stroke: #4299e1; stroke-width: 2; fill: none; }
    .arrow-head { fill: #4299e1; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text title">Gauss Elimination Method</text>
  
  <!-- Section 1: Augmented Matrix -->
  <g class="section1" data-narration="The augmented matrix combines coefficients and constants">
    <rect x="20" y="50" width="140" height="100" rx="8" fill="url(#matrixGradient)" filter="url(#shadow)" />
    <text x="90" y="68" text-anchor="middle" class="concept-title">Augmented Matrix</text>
    <!-- Matrix bracket -->
    <path d="M40 85 L35 85 L35 140 L40 140" class="matrix-bracket" />
    <path d="M140 85 L145 85 L145 140 L140 140" class="matrix-bracket" />
    <!-- Matrix content -->
    <text x="55" y="105" class="matrix-cell">2</text>
    <text x="80" y="105" class="matrix-cell">3</text>
    <text x="110" y="105" class="matrix-cell">7</text>
    <text x="55" y="130" class="matrix-cell">1</text>
    <text x="80" y="130" class="matrix-cell">-2</text>
    <text x="110" y="130" class="matrix-cell">-3</text>
    <!-- Vertical divider -->
    <line x1="100" y1="85" x2="100" y2="140" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="3,3" />
    <text x="90" y="155" text-anchor="middle" class="label">System: 2x+3y=7, x-2y=-3</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow" data-narration="Elementary row operations transform the matrix">
    <line x1="170" y1="100" x2="200" y2="100" class="arrow-line" />
    <polygon points="195,95 205,100 195,105" class="arrow-head" />
  </g>
  
  <!-- Section 2: Row Operations -->
  <g class="section2" data-narration="Three elementary row operations are used">
    <rect x="210" y="50" width="120" height="100" rx="8" fill="url(#matrixGradient)" filter="url(#shadow)" />
    <text x="270" y="68" text-anchor="middle" class="concept-title">Row Operations</text>
    <text x="225" y="90" class="concept-text">1. Swap rows</text>
    <text x="225" y="108" class="concept-text">2. Multiply by constant</text>
    <text x="225" y="126" class="concept-text">3. Add multiple of row</text>
    <circle cx="270" cy="138" r="6" fill="#48bb78" />
    <text x="282" y="142" class="concept-text" fill="#48bb78">→ Upper triangular</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow" data-narration="The matrix is transformed to upper triangular form">
    <line x1="340" y1="100" x2="370" y2="100" class="arrow-line" />
    <polygon points="365,95 375,100 365,105" class="arrow-head" />
  </g>
  
  <!-- Section 3: Upper Triangular Form -->
  <g class="section3" data-narration="Upper triangular form has zeros below the main diagonal">
    <rect x="30" y="180" width="140" height="95" rx="8" fill="url(#matrixGradient)" filter="url(#shadow)" />
    <text x="100" y="198" text-anchor="middle" class="concept-title">Upper Triangular</text>
    <!-- Matrix bracket -->
    <path d="M45 210 L40 210 L40 265 L45 265" class="matrix-bracket" />
    <path d="M155" y1="210" L160 210 L160 265 L155 265" class="matrix-bracket" />
    <!-- Matrix content -->
    <text x="60" y="230" class="matrix-cell highlight-text" fill="#2d3748">1</text>
    <text x="85" y="230" class="matrix-cell">-2</text>
    <text x="115" y="230" class="matrix-cell">-3</text>
    <text x="85" y="255" class="matrix-cell">0</text>
    <text x="115" y="255" class="matrix-cell">7</text>
    <text x="140" y="255" class="matrix-cell">13</text>
    <!-- Highlight zeros below diagonal -->
    <text x="60" y="255" class="matrix-cell" fill="#e53e3e">0</text>
    <!-- Vertical divider -->
    <line x1="110" y1="210" x2="110" y2="265" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="3,3" />
    <text x="100" y="282" text-anchor="middle" class="label">Zeros below diagonal</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="arrow" data-narration="Back-substitution solves for variables from bottom to top">
    <line x1="180" y1="227" x2="210" y2="227" class="arrow-line" />
    <polygon points="205,222 215,227 205,232" class="arrow-head" />
  </g>
  
  <!-- Section 4: Back-Substitution -->
  <g class="section4" data-narration="Solve for y first, then substitute to find x">
    <rect x="220" y="180" width="130" height="95" rx="8" fill="url(#matrixGradient)" filter="url(#shadow)" />
    <text x="285" y="198" text-anchor="middle" class="concept-title">Back-Substitution</text>
    <text x="235" y="225" class="concept-text">From row 2:</text>
    <text x="235" y="242" class="concept-text" fill="#2b6cb0">7y = 13</text>
    <text x="235" y="256" class="concept-text" fill="#2b6cb0">y = 13/7</text>
    <text x="235" y="270" class="concept-text">From row 1:</text>
    <text x="235" y="284" class="concept-text" fill="#38a169">x = 17/7</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="box" data-narration="Key concepts summary">
    <rect x="20" y="295" width="380" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)" />
    <text x="210" y="315" text-anchor="middle" class="concept-title">Key Concepts</text>
    
    <!-- Concept items with icons -->
    <circle cx="45" cy="335" r="10" fill="#4299e1" />
    <text x="45" y="339" text-anchor="middle" fill="white" font-size="10" font-weight="bold">A</text>
    <text x="60" y="339" class="concept-text">Augmented Matrix</text>
    
    <circle cx="160" cy="335" r="10" fill="#48bb78" />
    <text x="160" y="339" text-anchor="middle" fill="white" font-size="10" font-weight="bold">R</text>
    <text x="175" y="339" class="concept-text">Row Operations</text>
    
    <circle cx="285" cy="335" r="10" fill="#ed8936" />
    <text x="285" y="339" text-anchor="middle" fill="white" font-size="10" font-weight="bold">U</text>
    <text x="300" y="339" class="concept-text">Upper Triangular</text>
    
    <circle cx="55" cy="360" r="10" fill="#9f7aea" />
    <text x="55" y="364" text-anchor="middle" fill="white" font-size="10" font-weight="bold">B</text>
    <text x="70" y="364" class="concept-text">Back-Substitution</text>
    
    <text x="160" y="364" class="concept-text">Final: x = 17/7, y = 13/7</text>
  </g>
  
  <!-- Animated decorative elements -->
  <circle cx="400" cy="50" r="8" fill="#4299e1" opacity="0.3">
    <animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="30" cy="380" r="6" fill="#ed8936" opacity="0.3">
    <animate attributeName="r" values="6;10;6" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2.5s" repeatCount="indefinite" />
  </circle>
</svg>