<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="linear-transformation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e0f2e9"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a5acd"/>
      <stop offset="100%" style="stop-color:#9370db"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6a5acd"/>
    </marker>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes rotateGrid {
        from { transform: rotate(0deg); }
        to { transform: rotate(30deg); }
      }
      @keyframes stretch {
        from { transform: scaleX(1); }
        to { transform: scaleX(1.5); }
      }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #5d6d7e; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: 600; }
      .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
      .formula { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c3e50; }
      .section-box { fill: #ffffff; stroke: #b8c9d9; stroke-width: 1; rx: 8; }
      .section-box-accent { fill: #f0f4f8; stroke: #6a5acd; stroke-width: 1.5; rx: 8; }
      .grid-line { stroke: #cbd5e1; stroke-width: 0.5; }
      .grid-line-major { stroke: #94a3b8; stroke-width: 1; }
      .vector { stroke-width: 2.5; marker-end: url(#arrowhead); }
      .highlight { fill: #6a5acd; }
      .fade-in { animation: fadeIn 0.8s ease-out forwards; }
      .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
      .slide-right { animation: slideInRight 0.6s ease-out forwards; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in">
    <text x="210" y="35" text-anchor="middle" class="title">Linear Transformation</text>
    <text x="210" y="55" text-anchor="middle" class="subtitle">Vector Space to Vector Space Mapping</text>
  </g>
  
  <!-- Definition Box -->
  <g class="slide-left" data-narration="The definition shows two key properties: additivity (T(u+v)=T(u)+T(v)) and homogeneity (T(cu)=cT(u))">
    <rect x="10" y="70" width="180" height="75" class="section-box-accent"/>
    <text x="20" y="88" class="label">Definition</text>
    <text x="20" y="108" class="formula">T(u + v) = T(u) + T(v)</text>
    <text x="20" y="128" class="formula">T(cu) = c · T(u)</text>
  </g>
  
  <!-- Types Box -->
  <g class="slide-right" data-narration="Three important types: Isomorphism (bijective), Endomorphism (to itself), Automorphism (bijective to itself)">
    <rect x="200" y="70" width="210" height="75" class="section-box"/>
    <text x="210" y="88" class="label">Types</text>
    <text x="210" y="108" class="detail">• Isomorphism: bijective</text>
    <text x="210" y="125" class="detail">• Endomorphism: V → V</text>
    <text x="320" y="125" class="detail">• Automorphism</text>
  </g>
  
  <!-- Input Vector Space (Left Grid) -->
  <g class="fade-in" data-narration="The input vector space shows original vectors before transformation">
    <rect x="20" y="160" width="160" height="160" class="section-box"/>
    <text x="100" y="180" text-anchor="middle" class="label">Input Space (V)</text>
    
    <!-- Grid -->
    <g transform="translate(45, 250)">
      <!-- Minor grid lines -->
      <line x1="0" y1="0" x2="0" y2="-110" class="grid-line"/>
      <line x1="20" y1="0" x2="20" y2="-110" class="grid-line"/>
      <line x1="40" y1="0" x2="40" y2="-110" class="grid-line"/>
      <line x1="60" y1="0" x2="60" y2="-110" class="grid-line"/>
      <line x1="80" y1="0" x2="80" y2="-110" class="grid-line"/>
      <line x1="100" y1="0" x2="100" y2="-110" class="grid-line"/>
      <line x1="0" y1="0" x2="110" y2="0" class="grid-line"/>
      <line x1="0" y1="-20" x2="110" y2="-20" class="grid-line"/>
      <line x1="0" y1="-40" x2="110" y2="-40" class="grid-line"/>
      <line x1="0" y1="-60" x2="110" y2="-60" class="grid-line"/>
      <line x1="0" y1="-80" x2="110" y2="-80" class="grid-line"/>
      <line x1="0" y1="-100" x2="110" y2="-100" class="grid-line"/>
      
      <!-- Major axes -->
      <line x1="0" y1="0" x2="0" y2="-100" class="grid-line-major"/>
      <line x1="0" y1="0" x2="100" y2="0" class="grid-line-major"/>
      
      <!-- Original vector -->
      <line x1="0" y1="0" x2="60" y2="-50" class="vector" stroke="#e74c3c" style="animation: pulse 2s infinite;"/>
    </g>
  </g>
  
  <!-- Transformation Arrow -->
  <g class="pulse" data-narration="The transformation T maps vectors from V to W, preserving linear structure">
    <defs>
      <path id="curvedArrow" d="M 195 240 Q 210 240 225 240" stroke="url(#arrowGradient)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    </defs>
    <path d="M 195 240 Q 210 240 225 240" stroke="url(#arrowGradient)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="210" y="230" text-anchor="middle" class="label" style="font-size:12px;">T</text>
    <text x="210" y="260" text-anchor="middle" class="detail">Transform</text>
  </g>
  
  <!-- Output Vector Space (Right Grid - Transformed) -->
  <g class="fade-in" data-narration="The output shows the transformed grid - here rotated 30 degrees and stretched horizontally">
    <rect x="240" y="160" width="160" height="160" class="section-box"/>
    <text x="320" y="180" text-anchor="middle" class="label">Output Space (W)</text>
    
    <!-- Transformed Grid -->
    <g transform="translate(265, 250)">
      <!-- Transformed grid lines (rotated 30deg and stretched) -->
      <g style="transform-origin: 0 0; animation: rotateGrid 1.5s ease-out forwards;">
        <line x1="0" y1="0" x2="0" y2="-100" class="grid-line" style="animation: stretch 1.5s ease-out forwards;"/>
        <line x1="20" y1="0" x2="20" y2="-100" class="grid-line" style="animation: stretch 1.5s ease-out forwards;"/>
        <line x1="40" y1="0" x2="40" y2="-100" class="grid-line" style="animation: stretch 1.5s ease-out forwards;"/>
        <line x1="60" y1="0" x2="60" y2="-100" class="grid-line" style="animation: stretch 1.5s ease-out forwards;"/>
        <line x1="80" y1="0" x2="80" y2="-100" class="grid-line" style="animation: stretch 1.5s ease-out forwards;"/>
        <line x1="100" y1="0" x2="100" y2="-100" class="grid-line" style="animation: stretch 1.5s ease-out forwards;"/>
        <line x1="0" y1="0" x2="100" y2="0" class="grid-line"/>
        <line x1="0" y1="-20" x2="100" y2="-20" class="grid-line"/>
        <line x1="0" y1="-40" x2="100" y2="-40" class="grid-line"/>
        <line x1="0" y1="-60" x2="100" y2="-60" class="grid-line"/>
        <line x1="0" y1="-80" x2="100" y2="-80" class="grid-line"/>
        <line x1="0" y1="-100" x2="100" y2="-100" class="grid-line"/>
        
        <!-- Major axes -->
        <line x1="0" y1="0" x2="0" y2="-100" class="grid-line-major"/>
        <line x1="0" y1="0" x2="100" y2="0" class="grid-line-major"/>
      </g>
      
      <!-- Transformed vector -->
      <line x1="0" y1="0" x2="75" y2="-35" class="vector" stroke="#27ae60" style="animation: pulse 2s infinite; animation-delay: 0.5s;"/>
    </g>
  </g>
  
  <!-- Matrix Representation Box -->
  <g class="slide-left" data-narration="Every linear transformation can be represented by a matrix that performs the mapping">
    <rect x="10" y="330" width="400" height="55" class="section-box-accent"/>
    <text x="20" y="350" class="label">Matrix Representation</text>
    <text x="20" y="370" class="detail">For T: ℝ² → ℝ², matrix A = </text>
    <rect x="165" y="355" width="60" height="22" fill="none" stroke="#6a5acd" stroke-width="1.5" rx="3"/>
    <text x="175" y="368" class="formula" style="font-size:11px;">cosθ -sinθ</text>
    <text x="175" y="380" class="formula" style="font-size:11px;">sinθ  cosθ</text>
    <text x="235" y="370" class="detail"> (rotation by θ)</text>
  </g>
  
  <!-- Visual Legend -->
  <g class="fade-in" data-narration="Red vector in input becomes green vector in output after transformation">
    <circle cx="350" cy="355" r="5" fill="#e74c3c"/>
    <text x="362" y="359" class="detail">Original v</text>
    <circle cx="350" cy="372" r="5" fill="#27ae60"/>
    <text x="362" y="376" class="detail">Transformed T(v)</text>
  </g>
</svg>