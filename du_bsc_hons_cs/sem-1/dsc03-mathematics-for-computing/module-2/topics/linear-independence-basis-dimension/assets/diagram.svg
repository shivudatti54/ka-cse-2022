<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="linear-independence-basis-dimension">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c4dce8"/>
    </linearGradient>
    <linearGradient id="vecGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="vecGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e07a5f"/>
      <stop offset="100%" style="stop-color:#b85a48"/>
    </linearGradient>
    <linearGradient id="depGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#81b29a"/>
      <stop offset="100%" style="stop-color:#5a8a72"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .title-text { font-family: Georgia, serif; font-size: 20px; fill: #2c3e50; font-weight: bold; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .label-text { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .concept-box { fill: #fff; stroke: #b8c6d4; stroke-width: 1; rx: 6; }
    .vector { stroke-width: 3; stroke-linecap: round; }
    .axis { stroke: #888; stroke-width: 1; stroke-dasharray: 4,4; }
    .anim-fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-in { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-draw { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out forwards; }
    .anim-fade-up { animation: fadeInUp 0.5s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g data-narration="Title: Linear Independence, Basis, and Dimension - the three fundamental concepts of vector spaces">
    <text x="210" y="28" text-anchor="middle" class="title-text anim-fade-in">Linear Independence,</text>
    <text x="210" y="48" text-anchor="middle" class="title-text anim-fade-in" style="font-size: 16px;">Basis &amp; Dimension</text>
  </g>
  
  <!-- Section 1: Linear Independence -->
  <g data-narration="Linear Independence: Vectors that cannot be expressed as combinations of each other">
    <rect x="20" y="65" width="120" height="70" class="concept-box anim-fade-up" style="animation-delay: 0.3s; opacity: 0;"/>
    <text x="80" y="80" text-anchor="middle" class="section-title anim-fade-up" style="animation-delay: 0.4s; opacity: 0;">Linear Independence</text>
    <text x="80" y="98" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 0.5s; opacity: 0;">a₁v₁ + a₂v₂ = 0</text>
    <text x="80" y="112" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 0.6s; opacity: 0;">only trivial solution</text>
    <text x="80" y="126" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 0.7s; opacity: 0;">a₁=a₂=0</text>
  </g>
  
  <!-- Visual: Independent Vectors -->
  <g data-narration="Visual example: Two vectors pointing in different directions form a linearly independent set in R²">
    <text x="35" y="155" class="label-text" style="opacity: 0; animation: fadeIn 0.5s ease-out 0.5s forwards;">Independent Set</text>
    <line x1="50" y1="200" x2="150" y2="200" class="axis"/>
    <line x1="50" y1="170" x2="50" y2="230" class="axis"/>
    <!-- Vector v1 -->
    <line x1="50" y1="200" x2="120" y2="170" stroke="url(#vecGradient1)" class="vector anim-draw" style="animation-delay: 0.8s;"/>
    <polygon points="120,170 114,173 116,166" fill="#2d5a87" transform="rotate(-18, 120, 170)"/>
    <text x="130" y="168" class="label-text" style="fill: #2d5a87;">v₁</text>
    <!-- Vector v2 -->
    <line x1="50" y1="200" x2="90" y2="155" stroke="url(#vecGradient2)" class="vector anim-draw" style="animation-delay: 1s;"/>
    <polygon points="90,155 84,160 86,152" fill="#b85a48" transform="rotate(-52, 90, 155)"/>
    <text x="85" y="145" class="label-text" style="fill: #b85a48;">v₂</text>
    <!-- Checkmark -->
    <text x="135" y="205" fill="#27ae60" font-size="16" style="opacity: 0; animation: fadeIn 0.3s ease-out 1.5s forwards;">✓</text>
  </g>
  
  <!-- Section 2: Linear Dependence -->
  <g data-narration="Linear Dependence: One vector can be written as a multiple of another">
    <rect x="160" y="65" width="120" height="70" class="concept-box anim-fade-up" style="animation-delay: 0.9s; opacity: 0;"/>
    <text x="220" y="80" text-anchor="middle" class="section-title anim-fade-up" style="animation-delay: 1s; opacity: 0;">Linear Dependence</text>
    <text x="220" y="98" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 1.1s; opacity: 0;">v₂ = 2 × v₁</text>
    <text x="220" y="112" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 1.2s; opacity: 0;">Not independent!</text>
    <text x="220" y="126" text-anchor="middle" class="detail-text" style="fill: #c0392b; font-size: 14px; opacity: 0; animation: fadeIn 0.3s ease-out 1.5s forwards;">✗</text>
  </g>
  
  <!-- Visual: Dependent Vectors -->
  <g data-narration="Visual example: When v2 is a multiple of v1, they are linearly dependent">
    <text x="175" y="155" class="label-text" style="opacity: 0; animation: fadeIn 0.5s ease-out 1.3s forwards;">Dependent Set</text>
    <line x1="190" y1="200" x2="280" y2="200" class="axis"/>
    <line x1="190" y1="170" x2="190" y2="230" class="axis"/>
    <!-- Vector v1 -->
    <line x1="190" y1="200" x2="250" y2="175" stroke="url(#vecGradient1)" class="vector anim-draw" style="animation-delay: 1.5s;"/>
    <polygon points="250,175 244,178 246,171" fill="#2d5a87" transform="rotate(-17, 250, 175)"/>
    <text x="258" y="172" class="label-text" style="fill: #2d5a87;">v₁</text>
    <!-- Vector v2 (dependent = 2*v1) -->
    <line x1="190" y1="200" x2="270" y2="150" stroke="url(#vecGradient2)" class="vector anim-draw" style="animation-delay: 1.7s;"/>
    <polygon points="270,150 262,156 266,147" fill="#b85a48" transform="rotate(-41, 270, 150)"/>
    <text x="278" y="142" class="label-text" style="fill: #b85a48;">v₂ = 2v₁</text>
  </g>
  
  <!-- Section 3: Basis -->
  <g data-narration="Basis: A set of linearly independent vectors that spans the entire vector space">
    <rect x="300" y="65" width="105" height="70" class="concept-box anim-fade-up" style="animation-delay: 1.8s; opacity: 0;"/>
    <text x="352" y="80" text-anchor="middle" class="section-title anim-fade-up" style="animation-delay: 1.9s; opacity: 0;">Basis</text>
    <text x="352" y="98" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 2s; opacity: 0;">Spans the space</text>
    <text x="352" y="112" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 2.1s; opacity: 0;">&amp; linearly</text>
    <text x="352" y="126" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 2.2s; opacity: 0;">independent</text>
  </g>
  
  <!-- Visual: Basis for R² -->
  <g data-narration="The standard basis for R² consists of e1=(1,0) and e2=(0,1)">
    <text x="35" y="255" class="label-text" style="opacity: 0; animation: fadeIn 0.5s ease-out 2.3s forwards;">Basis for ℝ²</text>
    <line x1="50" y1="320" x2="150" y2="320" class="axis"/>
    <line x1="50" y1="290" x2="50" y2="350" class="axis"/>
    <!-- e1 vector -->
    <line x1="50" y1="320" x2="120" y2="320" stroke="url(#vecGradient1)" class="vector anim-draw" style="animation-delay: 2.5s;"/>
    <polygon points="120,320 114,317 114,323" fill="#2d5a87"/>
    <text x="128" y="324" class="label-text" style="fill: #2d5a87;">e₁</text>
    <!-- e2 vector -->
    <line x1="50" y1="320" x2="50" y2="270" stroke="url(#vecGradient2)" class="vector anim-draw" style="animation-delay: 2.7s;"/>
    <polygon points="50,270 47,276 53,276" fill="#b85a48"/>
    <text x="35" y="268" class="label-text" style="fill: #b85a48;">e₂</text>
    <!-- Any vector as combination -->
    <line x1="50" y1="320" x2="100" y2="285" stroke="#81b29a" stroke-width="2" stroke-dasharray="4,2" class="anim-draw" style="animation-delay: 2.9s;"/>
    <text x="108" y="282" class="label-text" style="fill: #5a8a72;">v = ae₁+ae₂</text>
  </g>
  
  <!-- Section 4: Dimension -->
  <g data-narration="Dimension: The number of vectors in any basis for the vector space">
    <rect x="160" y="250" width="120" height="60" class="concept-box anim-fade-up" style="animation-delay: 2.8s; opacity: 0;"/>
    <text x="220" y="270" text-anchor="middle" class="section-title anim-fade-up" style="animation-delay: 2.9s; opacity: 0;">Dimension</text>
    <text x="220" y="290" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 3s; opacity: 0;">dim(ℝ²) = 2</text>
    <text x="220" y="305" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 3.1s; opacity: 0;">(two basis vectors)</text>
  </g>
  
  <!-- Dimension Visual -->
  <g data-narration="R² has dimension 2, R³ has dimension 3, etc.">
    <rect x="300" y="250" width="105" height="60" class="concept-box anim-fade-up" style="animation-delay: 3.2s; opacity: 0;"/>
    <text x="352" y="270" text-anchor="middle" class="section-title anim-fade-up" style="animation-delay: 3.3s; opacity: 0;">Examples</text>
    <text x="352" y="290" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 3.4s; opacity: 0;">dim(ℝ³) = 3</text>
    <text x="352" y="305" text-anchor="middle" class="detail-text anim-fade-up" style="animation-delay: 3.5s; opacity: 0;">dim(P₂) = 3</text>
  </g>
  
  <!-- Relationship Arrows -->
  <g data-narration="Arrows showing conceptual relationships between the three concepts">
    <!-- Arrow from Independence to Basis -->
    <line x1="140" y1="100" x2="155" y2="100" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="148" y="95" font-size="9" fill="#7f8c8d">+span</text>
    
    <!-- Arrow from Basis to Dimension -->
    <line x1="280" y1="130" x2="295" y2="130" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="283" y="125" font-size="9" fill="#7f8c8d">count</text>
    
    <!-- Arrow connecting left visual to right -->
    <line x1="150" y1="230" x2="150" y2="245" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="280" y1="230" x2="280" y2="245" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Footer/Key takeaway -->
  <g data-narration="Key takeaway: These three concepts are interconnected and form the foundation of linear algebra">
    <rect x="20" y="345" width="380" height="40" fill="#f8f9fa" stroke="#dfe6e9" stroke-width="1" rx="4"/>
    <text x="210" y="362" text-anchor="middle" class="detail-text" style="font-size: 12px;">Key: A basis provides a coordinate system • Dimension = # of basis vectors</text>
    <text x="210" y="378" text-anchor="middle" class="detail-text" style="font-size: 11px; fill: #7f8c8d;">All bases for a space have the same number of vectors</text>
  </g>
</svg>