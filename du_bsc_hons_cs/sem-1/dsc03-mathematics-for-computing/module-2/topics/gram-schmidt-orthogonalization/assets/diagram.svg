<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="gram-schmidt-orthogonalization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe0cc"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cce6cc"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff"/>
      <stop offset="100%" style="stop-color:#e0ccff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; opacity: 0.8; }
      50% { stroke-width: 3; opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section2 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section3 { animation: slideInRight 0.6s ease-out 0.6s both; }
    .section4 { animation: slideInUp 0.6s ease-out 0.8s both; }
    .formula-box { animation: fadeIn 0.5s ease-out 1s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .pulse-element { animation: pulse 2s infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Gram-Schmidt Orthogonalization</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Section 1: Input Vectors -->
  <g class="section1" data-narration="Starting with a set of linearly independent vectors">
    <rect x="15" y="55" width="110" height="85" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="70" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#d35400">Input Vectors</text>
    <text x="70" y="92" text-anchor="middle" font-size="12" fill="#5a4a00">{v₁, v₂, v₃}</text>
    <text x="70" y="108" text-anchor="middle" font-size="11" fill="#7a6a00">Linearly</text>
    <text x="70" y="122" text-anchor="middle" font-size="11" fill="#7a6a00">Independent</text>
    <!-- Vector representation -->
    <line x1="35" y1="128" x2="55" y2="108" stroke="#e67e22" stroke-width="2" class="pulse-element"/>
    <line x1="35" y1="128" x2="85" y2="118" stroke="#e67e22" stroke-width="2" class="pulse-element"/>
    <line x1="35" y1="128" x2="65" y2="138" stroke="#e67e22" stroke-width="2" class="pulse-element"/>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M135 97 L170 97" stroke="#3498db" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="170,97 160,92 160,102" fill="#3498db" class="arrow"/>
  
  <!-- Section 2: Formula/Process -->
  <g class="section2" data-narration="Apply the Gram-Schmidt formula to orthogonalize">
    <rect x="180" y="55" width="145" height="140" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="252" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">Gram-Schmidt Process</text>
    
    <!-- Formula 1 -->
    <text x="195" y="95" font-size="11" fill="#1a5a1a">u₁ = v₁</text>
    
    <!-- Formula 2 -->
    <text x="195" y="115" font-size="10" fill="#1a5a1a">u₂ = v₂ -</text>
    <text x="240" y="115" font-size="10" fill="#c0392b">(v₂·u₁)</text>
    <text x="280" y="115" font-size="10" fill="#1a5a1a">/</text>
    <text x="292" y="115" font-size="10" fill="#1a5a1a">(u₁·u₁)</text>
    <text x="315" y="115" font-size="10" fill="#1a5a1a">u₁</text>
    
    <!-- Formula 3 -->
    <text x="195" y="135" font-size="10" fill="#1a5a1a">u₃ = v₃ -</text>
    <text x="240" y="135" font-size="10" fill="#c0392b">proj</text>
    <text x="260" y="135" font-size="10" fill="#1a5a1a">u₁(v₃)</text>
    <text x="295" y="135" font-size="10" fill="#1a5a1a">-</text>
    <text x="305" y="135" font-size="10" fill="#c0392b">proj</text>
    <text x="325" y="135" font-size="10" fill="#1a5a1a">u₂(v₃)</text>
    
    <!-- Key concept -->
    <text x="252" y="160" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Subtract Projections</text>
    <text x="252" y="175" text-anchor="middle" font-size="9" fill="#1a5a1a">Remove components</text>
    <text x="252" y="187" text-anchor="middle" font-size="9" fill="#1a5a1a">along previous vectors</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M335 97 L370 97" stroke="#3498db" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="370,97 360,92 360,102" fill="#3498db" class="arrow"/>
  
  <!-- Section 3: Orthogonal Vectors -->
  <g class="section3" data-narration="Resulting orthogonal vectors">
    <rect x="380" y="55" width="35" height="85" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="397" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#6c3483">Ortho</text>
    <text x="397" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#6c3483">Vectors</text>
    <text x="397" y="105" text-anchor="middle" font-size="11" fill="#4a235a">u₁</text>
    <text x="397" y="120" text-anchor="middle" font-size="11" fill="#4a235a">u₂</text>
    <text x="397" y="135" text-anchor="middle" font-size="11" fill="#4a235a">u₃</text>
  </g>
  
  <!-- Down arrow to normalized -->
  <path d="M210 205 L210 230" stroke="#e74c3c" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="210,230 205,220 215,220" fill="#e74c3c" class="arrow"/>
  
  <!-- Section 4: Normalization -->
  <g class="section4" data-narration="Normalize to get orthonormal basis">
    <rect x="135" y="240" width="150" height="95" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="210" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#d35400">Normalization</text>
    
    <!-- Normalization formula -->
    <text x="145" y="280" font-size="10" fill="#5a4a00">e₁ = u₁ / ||u₁||</text>
    <text x="145" y="298" font-size="10" fill="#5a4a00">e₂ = u₂ / ||u₂||</text>
    <text x="145" y="316" font-size="10" fill="#5a4a00">e₃ = u₃ / ||u₃||</text>
    
    <!-- Result indicator -->
    <rect x="240" y="285" width="35" height="30" rx="5" fill="#27ae60" opacity="0.8" class="pulse-element"/>
    <text x="257" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="white">ONB</text>
  </g>
  
  <!-- Section 5: Final Result -->
  <g class="section4" data-narration="Orthonormal basis complete">
    <rect x="135" y="345" width="150" height="40" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="210" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a235a">Orthonormal Basis {e₁, e₂, e₃}</text>
    <text x="210" y="380" text-anchor="middle" font-size="9" fill="#6c3483">||eᵢ|| = 1, eᵢ·eⱼ = 0 (i ≠ j)</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="formula-box" data-narration="Key definitions">
    <rect x="15" y="240" width="110" height="80" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <text x="70" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    <line x1="20" y1="262" x2="120" y2="262" stroke="#ecf0f1" stroke-width="1"/>
    <text x="22" y="278" font-size="9" fill="#34495e">• Inner Product</text>
    <text x="22" y="292" font-size="9" fill="#34495e">• Orthogonal</text>
    <text x="22" y="306" font-size="9" fill="#34495e">• Orthonormal</text>
    <text x="22" y="318" font-size="9" fill="#34495e">• Projection</text>
  </g>
  
  <!-- Application Box -->
  <g class="formula-box" data-narration="Applications in computing">
    <rect x="295" y="240" width="110" height="80" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <text x="350" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Applications</text>
    <line x1="300" y1="262" x2="400" y2="262" stroke="#ecf0f1" stroke-width="1"/>
    <text x="302" y="278" font-size="9" fill="#34495e">• QR Decomposition</text>
    <text x="302" y="292" font-size="9" fill="#34495e">• Solving Linear</text>
    <text x="302" y="304" font-size="9" fill="#34495e">  Equations</text>
    <text x="302" y="318" font-size="9" fill="#34495e">• Linear Regression</text>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="25" cy="25" r="8" fill="#3498db" opacity="0.3"/>
  <circle cx="395" cy="375" r="8" fill="#e74c3c" opacity="0.3"/>
  <circle cx="395" cy="25" r="6" fill="#27ae60" opacity="0.3"/>
  <circle cx="25" cy="375" r="6" fill="#9b59b6" opacity="0.3"/>
</svg>