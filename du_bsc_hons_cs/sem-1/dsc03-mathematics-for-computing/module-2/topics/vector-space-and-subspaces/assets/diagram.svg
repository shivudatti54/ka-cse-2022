<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="vector-space-and-subspaces">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f7fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#448aff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #1a237e; font-weight: bold; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; fill: #3949ab; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #546e7a; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #78909c; }
    .prop-text { font-family: Arial, sans-serif; font-size: 10px; fill: #455a64; }
    .box { fill: url(#boxGradient); stroke: #cfd8dc; stroke-width: 1; rx: 8; }
    .highlight-box { fill: url(#highlightGradient); rx: 8; }
    .highlight-text { font-family: Arial, sans-serif; font-size: 12px; fill: #ffffff; font-weight: bold; }
    .vector { stroke-width: 2; stroke-linecap: round; }
    .vector-origin { fill: #37474f; }
    .grid-line { stroke: #eceff1; stroke-width: 1; }
    .axis { stroke: #90a4ae; stroke-width: 1.5; }
    .arrow { fill: #7c4dff; }
    .animated { animation-duration: 0.8s; animation-fill-mode: both; }
    .fade-in { animation-name: fadeIn; }
    .slide-in { animation-name: slideIn; }
    .slide-up { animation-name: slideInUp; }
    .pulse { animation-name: pulse; animation-duration: 2s; animation-iteration-count: infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animated fade-in">Vector Space &amp; Subspaces</text>
  
  <!-- Section 1: Definition Box -->
  <g class="animated slide-in delay-1" data-narration="A vector space is a set of vectors with two operations: vector addition and scalar multiplication">
    <rect x="10" y="45" width="180" height="55" class="box" filter="url(#shadow)"/>
    <text x="20" y="60" class="section-title">Definition</text>
    <text x="20" y="78" class="label">Vector Space V with operations:</text>
    <text x="20" y="92" class="detail">• Addition: V × V → V</text>
  </g>
  
  <!-- Section 2: Operations -->
  <g class="animated slide-in delay-2" data-narration="The two fundamental operations are vector addition and scalar multiplication">
    <rect x="200" y="45" width="210" height="55" class="box" filter="url(#shadow)"/>
    <text x="210" y="60" class="section-title">Operations</text>
    <text x="210" y="78" class="detail">Scalar × Vector → Vector (scaling)</text>
    <text x="210" y="92" class="detail">Vector + Vector → Vector (addition)</text>
  </g>
  
  <!-- Section 3: Visual Representation - 2D Plane -->
  <g class="animated slide-up delay-2" data-narration="The 2D plane R2 is a classic example of a vector space">
    <rect x="10" y="110" width="150" height="120" class="box" filter="url(#shadow)"/>
    <text x="20" y="125" class="section-title">R² - 2D Vector Space</text>
    
    <!-- Grid -->
    <line x1="30" y1="180" x2="130" y2="180" class="axis"/>
    <line x1="80" y1="130" x2="80" y2="220" class="axis"/>
    
    <!-- Vector u -->
    <line x1="80" y1="180" x2="110" y2="155" class="vector" stroke="#e91e63" marker-end="url(#arrowhead)"/>
    <circle cx="110" cy="155" r="3" fill="#e91e63"/>
    <text x="115" y="150" class="label" fill="#e91e63">u</text>
    
    <!-- Vector v -->
    <line x1="80" y1="180" x2="115" y2="190" class="vector" stroke="#00bcd4" marker-end="url(#arrowhead)"/>
    <circle cx="115" cy="190" r="3" fill="#00bcd4"/>
    <text x="120" y="195" class="label" fill="#00bcd4">v</text>
    
    <!-- Result vector u+v -->
    <line x1="80" y1="180" x2="135" y2="145" class="vector" stroke="#4caf50" stroke-dasharray="4,2" marker-end="url(#arrowhead2)"/>
    <circle cx="135" cy="145" r="3" fill="#4caf50"/>
    <text x="140" y="140" class="label" fill="#4caf50">u+v</text>
  </g>
  
  <!-- Section 4: Properties List -->
  <g class="animated slide-in delay-3" data-narration="Vector spaces must satisfy 8 key properties">
    <rect x="170" y="110" width="240" height="120" class="box" filter="url(#shadow)"/>
    <text x="180" y="125" class="section-title">8 Properties</text>
    <text x="180" y="142" class="prop-text">1. u + v = v + u (Commutativity)</text>
    <text x="180" y="155" class="prop-text">2. (u+v)+w = u+(v+w) (Associativity)</text>
    <text x="180" y="168" class="prop-text">3. ∃ 0: u + 0 = u (Identity)</text>
    <text x="180" y="181" class="prop-text">4. ∃ -u: u + (-u) = 0 (Inverse)</text>
    <text x="180" y="194" class="prop-text">5. a(u+v) = au + av (Distributive)</text>
    <text x="180" y="207" class="prop-text">6-8. More properties →</text>
    <text x="180" y="220" class="prop-text">7. (ab)u = a(bu) | 8. 1u = u</text>
  </g>
  
  <!-- Section 5: Examples -->
  <g class="animated slide-up delay-3" data-narration="Common examples of vector spaces include R, R2, R3, and polynomials">
    <rect x="10" y="240" width="130" height="60" class="box" filter="url(#shadow)"/>
    <text x="20" y="255" class="section-title">Examples</text>
    <text x="20" y="272" class="detail">ℝ - 1D line</text>
    <text x="20" y="287" class="detail">ℝ² - 2D plane</text>
    <text x="90" y="272" class="detail">ℝ³ - 3D space</text>
    <text x="90" y="287" class="detail">Polynomials</text>
  </g>
  
  <!-- Section 6: Subspace -->
  <g class="animated slide-in delay-4" data-narration="A subspace is a subset of a vector space that is itself a vector space">
    <rect x="150" y="240" width="260" height="60" class="box" filter="url(#shadow)"/>
    <text x="160" y="255" class="section-title">Subspace</text>
    <text x="160" y="272" class="detail">A subspace W ⊆ V is itself a vector space if it contains:</text>
    <text x="160" y="290" class="detail">• The zero vector • Closed under addition • Closed under scalar multiplication</text>
  </g>
  
  <!-- Section 7: Subspace Visual -->
  <g class="animated fade-in delay-4" data-narration="A line through the origin in R2 is a subspace of R2">
    <rect x="280" y="110" width="130" height="120" class="box" filter="url(#shadow)"/>
    <text x="290" y="125" class="section-title">Subspace Example</text>
    <text x="290" y="140" class="detail">Line through origin</text>
    
    <!-- Subspace line -->
    <line x1="290" y1="210" x2="400" y2="130" stroke="#ff9800" stroke-width="3"/>
    
    <!-- Origin point -->
    <circle cx="310" cy="200" r="4" fill="#ff9800"/>
    <text x="315" y="205" class="label" fill="#ff9800">0</text>
    
    <!-- Points on subspace -->
    <circle cx="330" cy="185" r="3" fill="#ff9800"/>
    <circle cx="360" cy="160" r="3" fill="#ff9800"/>
    <circle cx="380" cy="145" r="3" fill="#ff9800"/>
    
    <text x="295" y="220" class="detail">W = {t(1,1) | t ∈ ℝ}</text>
    <text x="295" y="235" class="detail" fill="#ff9800">W ⊂ ℝ² is a subspace</text>
  </g>
  
  <!-- Key Concept Highlight Box -->
  <g class="animated pulse delay-1" transform="translate(140, 310)">
    <rect width="140" height="35" class="highlight-box" filter="url(#shadow)"/>
    <text x="70" y="22" text-anchor="middle" class="highlight-text">Key: V must satisfy</text>
  </g>
  
  <!-- Arrow from key to properties -->
  <path d="M 210 327 L 200 310" stroke="#7c4dff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Applications -->
  <g class="animated fade-in delay-4" data-narration="Vector spaces are used in machine learning, computer graphics, and physics">
    <rect x="150" y="355" width="260" height="35" class="box" filter="url(#shadow)"/>
    <text x="160" y="370" class="section-title">Applications:</text>
    <text x="160" y="382" class="detail">Machine Learning • Computer Graphics • Physics • Data Science</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="385" r="15" fill="#e8f5e9" opacity="0.5"/>
  <circle cx="25" cy="385" r="12" fill="#fce4ec" opacity="0.5"/>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#e91e63"/>
    </marker>
    <marker id="arrowhead2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#4caf50"/>
    </marker>
    <marker id="arrowhead3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#7c4dff"/>
    </marker>
  </defs>
</svg>