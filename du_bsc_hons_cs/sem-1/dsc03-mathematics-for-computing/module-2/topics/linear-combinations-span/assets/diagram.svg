<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="linear-combinations-span">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vectorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b9bd5" />
      <stop offset="100%" style="stop-color:#4472c4" />
    </linearGradient>
    <linearGradient id="spanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#70ad47;stop-opacity:0.6" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .sublabel { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #666; }
    .concept-box { fill: #fff; stroke: #ddd; stroke-width: 1; rx: 8; }
    .concept-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .equation { font-family: 'Courier New', monospace; font-size: 13px; fill: #444; }
    .vector-line { stroke-width: 3; stroke-linecap: round; }
    .dashed-line { stroke-width: 1.5; stroke-dasharray: 5,3; }
    
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .anim-draw { stroke-dasharray: 200; animation: drawLine 1s ease-out forwards; }
    
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title anim-fade">Linear Combinations &amp; Span</text>
  
  <!-- Section 1: Linear Combination Definition -->
  <g class="anim-slide delay-1" data-narration="A linear combination multiplies vectors by scalars and adds them together">
    <rect x="20" y="55" width="180" height="70" class="concept-box" />
    <text x="30" y="72" class="concept-title">Linear Combination</text>
    <text x="30" y="90" class="sublabel">v = a₁u + a₂u + ... + aₙuₙ</text>
    <text x="30" y="108" class="sublabel">Scalar multiples summed</text>
    <!-- Arrow -->
    <line x1="200" y1="90" x2="230" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Section 2: Vector Representation -->
  <g class="anim-fade delay-2" data-narration="Two vectors u and v shown as arrows from origin">
    <rect x="240" y="55" width="170" height="70" class="concept-box" />
    <text x="250" y="72" class="concept-title">Example Vectors</text>
    <text x="250" y="90" class="equation">u = [1, 2]</text>
    <text x="250" y="108" class="equation">v = [3, 4]</text>
  </g>
  
  <!-- Coordinate System / Graph Area -->
  <g transform="translate(60, 170)">
    <!-- Grid -->
    <line x1="0" y1="150" x2="300" y2="150" stroke="#ccc" stroke-width="1" />
    <line x1="150" y1="0" x2="150" y2="150" stroke="#ccc" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="150" stroke="#ccc" stroke-width="1" />
    <line x1="0" y1="150" x2="300" y2="150" stroke="#ccc" stroke-width="1" />
    <line x1="300" y1="0" x2="300" y2="150" stroke="#ccc" stroke-width="1" />
    <line x1="0" y1="0" x2="300" y2="0" stroke="#ccc" stroke-width="1" />
    
    <!-- Origin label -->
    <text x="145" y="168" class="sublabel">(0,0)</text>
    
    <!-- Span Plane Representation -->
    <polygon points="150,150 280,30 300,50 170,170" fill="url(#spanGradient)" class="anim-fade delay-2" />
    <text x="200" y="80" class="sublabel anim-fade delay-3" fill="#2d5a27">Span(u,v)</text>
    
    <!-- Vector u = [1, 2] scaled -->
    <line x1="150" y1="150" x2="180" y2="120" stroke="#5b9bd5" stroke-width="3" class="anim-draw" />
    <circle cx="180" cy="120" r="4" fill="#4472c4" class="anim-pulse delay-3" />
    <text x="185" y="115" class="label" fill="#4472c4" font-weight="bold">u</text>
    
    <!-- Vector v = [3, 4] scaled -->
    <line x1="150" y1="150" x2="240" y2="90" stroke="#e74c3c" stroke-width="3" class="anim-draw" />
    <circle cx="240" cy="90" r="4" fill="#c0392b" class="anim-pulse delay-4" />
    <text x="245" y="85" class="label" fill="#c0392b" font-weight="bold">v</text>
    
    <!-- Linear combination w = 2u + 3v -->
    <line x1="150" y1="150" x2="280" y2="30" stroke="#70ad47" stroke-width="3" class="anim-draw" />
    <circle cx="280" cy="30" r="5" fill="#5a8f3a" class="anim-pulse" />
    <text x="285" y="25" class="label" fill="#5a8f3a" font-weight="bold">w</text>
    
    <!-- Dashed lines showing combination -->
    <line x1="180" y1="120" x2="280" y2="30" stroke="#999" stroke-width="1" stroke-dasharray="4,3" class="anim-fade delay-4" />
    <line x1="240" y1="90" x2="280" y2="30" stroke="#999" stroke-width="1" stroke-dasharray="4,3" class="anim-fade delay-4" />
  </g>
  
  <!-- Section 3: Span Definition -->
  <g class="anim-slide-up delay-3" data-narration="Span is all possible linear combinations creating a plane">
    <rect x="20" y="330" width="160" height="55" class="concept-box" />
    <text x="30" y="350" class="concept-title">Span Definition</text>
    <text x="30" y="368" class="sublabel">All linear combinations of</text>
    <text x="30" y="382" class="sublabel">vectors form their span</text>
  </g>
  
  <!-- Section 4: Key Concept -->
  <g class="anim-slide-up delay-4" data-narration="If span covers all directions, vectors form a basis">
    <rect x="240" y="330" width="160" height="55" class="concept-box" />
    <text x="250" y="350" class="concept-title">Key Insight</text>
    <text x="250" y="368" class="sublabel">Span covers entire plane =</text>
    <text x="250" y="382" class="sublabel">basis for ℝ²</text>
  </g>
  
  <!-- Equation Box -->
  <g class="anim-fade delay-4" data-narration="The resulting vector w equals 11, 16">
    <rect x="100" y="340" width="130" height="35" fill="#f0f7e6" stroke="#70ad47" stroke-width="1.5" rx="5" />
    <text x="165" y="358" text-anchor="middle" class="equation" fill="#2d5a27">w = 2u + 3v</text>
    <text x="165" y="372" text-anchor="middle" class="sublabel" fill="#2d5a27">= [11, 16]</text>
  </g>
  
  <!-- Decorative arrows between concepts -->
  <g class="anim-fade delay-3">
    <path d="M 110 130 Q 165 130 165 160" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
  </g>
</svg>