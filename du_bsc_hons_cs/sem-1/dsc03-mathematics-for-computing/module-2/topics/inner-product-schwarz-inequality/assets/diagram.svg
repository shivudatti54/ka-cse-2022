<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="inner-product-schwarz-inequality">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6f5"/>
      <stop offset="100%" style="stop-color:#ffe6f0"/>
    </linearGradient>
    <linearGradient id="vectorU" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5aa0"/>
    </linearGradient>
    <linearGradient id="vectorV" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c8c"/>
      <stop offset="100%" style="stop-color:#c0396b"/>
    </linearGradient>
    <marker id="arrowU" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrowV" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c8c"/>
    </marker>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .formula { font-family: 'Times New Roman', serif; font-size: 16px; fill: #2c3e50; font-style: italic; }
    .sub-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .section-box { fill: rgba(255,255,255,0.85); stroke: #bdc3c7; stroke-width: 1; rx: 8; }
    .vector-u { stroke: url(#vectorU); stroke-width: 3; fill: none; marker-end: url(#arrowU); }
    .vector-v { stroke: url(#vectorV); stroke-width: 3; fill: none; marker-end: url(#arrowV); }
    .dashed-line { stroke: #95a5a6; stroke-width: 1.5; stroke-dasharray: 5,3; }
    .highlight { fill: #f39c12; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-draw { animation: drawLine 1.5s ease-out forwards; stroke-dasharray: 200; stroke-dashoffset: 200; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title anim-fade">Inner Product &amp; Schwarz Inequality</text>
  
  <!-- Section 1: Vector Diagram -->
  <g class="anim-slide-left" data-narration="Two vectors u and v originating from origin O, with angle θ between them">
    <rect x="20" y="55" width="180" height="130" class="section-box"/>
    <text x="30" y="70" class="label" font-weight="bold">Vectors u and v</text>
    
    <!-- Coordinate system -->
    <line x1="30" y1="160" x2="180" y2="160" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="70" y1="175" x2="70" y2="60" stroke="#bdc3c7" stroke-width="1"/>
    <text x="175" y="170" class="sub-label">x</text>
    <text x="60" y="65" class="sub-label">y</text>
    
    <!-- Vector v -->
    <line x1="70" y1="160" x2="160" y2="100" class="vector-v anim-draw"/>
    <text x="165" y="95" class="label" fill="#e74c8c">v</text>
    
    <!-- Vector u -->
    <line x1="70" y1="160" x2="150" y2="130" class="vector-u anim-draw" style="animation-delay: 0.3s"/>
    <text x="155" y="125" class="label" fill="#4a90d9">u</text>
    
    <!-- Angle arc -->
    <path d="M 130 145 A 25 25 0 0 1 145 115" fill="none" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="142" y="135" class="sub-label" fill="#9b59b6">θ</text>
  </g>
  
  <!-- Section 2: Inner Product Definition -->
  <g class="anim-slide-up" data-narration="Inner product formula: u·v = ||u|| ||v|| cos(θ)" style="animation-delay: 0.2s">
    <rect x="210" y="55" width="190" height="130" class="section-box"/>
    <text x="220" y="70" class="label" font-weight="bold">Inner Product</text>
    <text x="220" y="95" class="formula">&lt;u, v&gt; = ||u|| ||v|| cos(θ)</text>
    <text x="220" y="115" class="sub-label">In R²: u·v = u₁v₁ + u₂v₂</text>
    <text x="220" y="135" class="sub-label">Properties:</text>
    <text x="225" y="150" class="sub-label">• Linearity</text>
    <text x="225" y="162" class="sub-label">• Positive Definite</text>
    <text x="225" y="174" class="sub-label">• Symmetric</text>
  </g>
  
  <!-- Section 3: Vector Norms -->
  <g class="anim-slide-left" data-narration="Norm (length) of a vector is the square root of inner product with itself" style="animation-delay: 0.4s">
    <rect x="20" y="195" width="180" height="95" class="section-box"/>
    <text x="30" y="210" class="label" font-weight="bold">Vector Norms</text>
    <text x="30" y="235" class="formula">||u|| = √&lt;u, u&gt;</text>
    <text x="30" y="255" class="formula">||v|| = √&lt;v, v&gt;</text>
    <text x="30" y="275" class="sub-label">Length of each vector</text>
  </g>
  
  <!-- Section 4: Schwarz Inequality -->
  <g class="anim-slide-up" data-narration="Schwarz inequality states that absolute value of inner product is less than or equal to product of norms" style="animation-delay: 0.6s">
    <rect x="210" y="195" width="190" height="95" class="section-box"/>
    <text x="220" y="210" class="label" font-weight="bold">Schwarz Inequality</text>
    <text x="220" y="240" class="formula" font-size="18">|&lt;u, v&gt;| ≤ ||u|| ||v||</text>
    <text x="220" y="265" class="sub-label">Equality when u = λv (parallel)</text>
  </g>
  
  <!-- Section 5: Proof Key -->
  <g class="anim-fade" data-narration="Proof uses the expression (u - λv)² ≥ 0 and optimizes λ" style="animation-delay: 0.8s">
    <rect x="20" y="300" width="180" height="85" class="section-box"/>
    <text x="30" y="315" class="label" font-weight="bold">Proof: Choose λ</text>
    <text x="30" y="340" class="formula">0 ≤ ||u - λv||²</text>
    <text x="30" y="360" class="formula">λ = &lt;u, v&gt; / &lt;v, v&gt;</text>
    <text x="30" y="375" class="sub-label">Substitute and simplify →</text>
  </g>
  
  <!-- Section 6: Final Result -->
  <g class="anim-fade" data-narration="Result after optimization: |u·v|² ≤ (u·u)(v·v)" style="animation-delay: 1s">
    <rect x="210" y="300" width="190" height="85" class="section-box"/>
    <text x="220" y="315" class="label" font-weight="bold">Final Result</text>
    <text x="220" y="345" class="formula" font-size="16">&lt;u, v&gt;² ≤ &lt;u, u&gt; &lt;v, v&gt;</text>
    <text x="220" y="370" class="sub-label">Take square root → Schwarz!</text>
  </g>
  
  <!-- Connecting arrows -->
  <g class="anim-fade" style="animation-delay: 1.2s">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 z" fill="#7f8c8d"/>
      </marker>
    </defs>
    <line x1="200" y1="120" x2="205" y2="120" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="250" x2="205" y2="250" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="20" y1="290" x2="20" y2="290" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="anim-pulse" style="animation-delay: 1.5s; transform-origin: 305px 50px;">
    <rect x="230" y="50" width="150" height="30" fill="#fff3cd" stroke="#f39c12" stroke-width="1.5" rx="5"/>
    <text x="305" y="70" text-anchor="middle" class="sub-label" fill="#d35400">Fundamental Inequality!</text>
  </g>
</svg>