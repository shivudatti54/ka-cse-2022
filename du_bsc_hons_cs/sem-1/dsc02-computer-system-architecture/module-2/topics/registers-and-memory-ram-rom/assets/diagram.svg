<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="registers-and-memory-ram-rom">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="regGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cacheGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ramGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="romGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbc2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6c1ee;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .anim-arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" class="title anim-slide">Registers and Memory</text>
  
  <!-- CPU Section -->
  <g class="section" data-narration="CPU - Central Processing Unit, the brain of the computer that executes instructions">
    <rect x="160" y="50" width="100" height="35" rx="5" fill="url(#cpuGrad)" stroke="#e74c3c" stroke-width="2" class="anim-pulse"/>
    <text x="210" y="72" text-anchor="middle" class="label">CPU</text>
  </g>
  
  <!-- Arrow from CPU to Registers -->
  <line x1="210" y1="85" x2="210" y2="105" stroke="#e74c3c" stroke-width="2" class="anim-arrow" data-narration="Arrow showing data flow between CPU and Registers"/>
  
  <!-- Registers Section -->
  <g class="section" data-narration="Registers - High-speed memory locations inside CPU for temporary data storage">
    <rect x="140" y="105" width="140" height="45" rx="5" fill="url(#regGrad)" stroke="#27ae60" stroke-width="2" class="anim-fade"/>
    <text x="210" y="122" text-anchor="middle" class="label">Registers</text>
    <text x="210" y="138" text-anchor="middle" class="detail">ACC, PC, SP, Index</text>
  </g>
  
  <!-- Arrow -->
  <line x1="210" y1="150" x2="210" y2="170" stroke="#27ae60" stroke-width="2" class="anim-arrow"/>
  
  <!-- Cache Section -->
  <g class="section" data-narration="Cache - Fast memory between CPU and RAM for quick data access">
    <rect x="120" y="170" width="180" height="45" rx="5" fill="url(#cacheGrad)" stroke="#9b59b6" stroke-width="2" class="anim-fade" style="animation-delay: 0.2s"/>
    <text x="210" y="187" text-anchor="middle" class="label">Cache (L1, L2, L3)</text>
    <text x="210" y="203" text-anchor="middle" class="detail">Fast access, small capacity</text>
  </g>
  
  <!-- Arrow -->
  <line x1="210" y1="215" x2="210" y2="235" stroke="#9b59b6" stroke-width="2" class="anim-arrow"/>
  
  <!-- RAM Section -->
  <g class="section" data-narration="RAM (Random Access Memory) - Volatile main memory for programs and data">
    <rect x="100" y="235" width="220" height="50" rx="5" fill="url(#ramGrad)" stroke="#3498db" stroke-width="2" class="anim-fade" style="animation-delay: 0.4s"/>
    <text x="210" y="255" text-anchor="middle" class="label">Main Memory (RAM)</text>
    <text x="210" y="272" text-anchor="middle" class="detail">Random Access, Volatile, Read/Write</text>
  </g>
  
  <!-- Arrow -->
  <line x1="210" y1="285" x2="210" y2="305" stroke="#3498db" stroke-width="2" class="anim-arrow"/>
  
  <!-- ROM Section -->
  <g class="section" data-narration="ROM (Read-Only Memory) - Non-volatile memory for permanent data storage">
    <rect x="80" y="305" width="260" height="50" rx="5" fill="url(#romGrad)" stroke="#e67e22" stroke-width="2" class="anim-fade" style="animation-delay: 0.6s"/>
    <text x="210" y="325" text-anchor="middle" class="label">Secondary Memory (ROM/Disk)</text>
    <text x="210" y="342" text-anchor="middle" class="detail">Non-Volatile, Permanent Storage, Slow</text>
  </g>
  
  <!-- Speed indicator -->
  <g data-narration="Memory speed and capacity trade-off - faster memory is smaller and more expensive">
    <text x="355" y="80" text-anchor="middle" class="detail" transform="rotate(90, 355, 80)" style="font-size: 10px; fill: #888;">SPEED ↓</text>
    <text x="355" y="280" text-anchor="middle" class="detail" transform="rotate(90, 355, 280)" style="font-size: 10px; fill: #888;">CAPACITY ↑</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="anim-fade" style="animation-delay: 0.8s" data-narration="Key Concept: Registers are fastest but smallest, while secondary memory is slowest but largest in capacity">
    <rect x="10" y="360" width="140" height="30" rx="3" fill="#fff9e6" stroke="#f39c12" stroke-width="1"/>
    <text x="15" y="375" class="detail" style="font-size: 10px; fill: #555;">⚡ Registers = Fastest</text>
    <text x="15" y="386" class="detail" style="font-size: 10px; fill: #555;">💾 ROM = Largest</text>
  </g>
</svg>