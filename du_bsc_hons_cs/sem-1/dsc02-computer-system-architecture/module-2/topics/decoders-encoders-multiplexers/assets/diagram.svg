<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="decoders-encoders-multiplexers">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="decoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fbcd4"/>
    </linearGradient>
    <linearGradient id="encoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8"/>
      <stop offset="100%" style="stop-color:#9cd48a"/>
    </linearGradient>
    <linearGradient id="muxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c8d8"/>
      <stop offset="100%" style="stop-color:#d4a0b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .box { rx: 8; ry: 8; filter: url(#shadow); }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-anim { stroke: #3498db; stroke-width: 2; fill: none; animation: arrowPulse 1.5s infinite; }
    .title-anim { animation: fadeIn 0.8s ease-out; }
    .decoder-anim { animation: slideIn 0.6s ease-out 0.2s both; }
    .encoder-anim { animation: slideIn 0.6s ease-out 0.4s both; }
    .mux-anim { animation: slideIn 0.6s ease-out 0.6s both; }
    .pulse-anim { animation: pulse 2s infinite; transform-origin: center; transform-box: fill-box; }
    .io-dot { r: 5; }
    .io-dot-in { fill: #3498db; }
    .io-dot-out { fill: #e74c3c; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Decoders, Encoders &amp; Multiplexers</text>
  <line x1="40" y1="38" x2="380" y2="38" stroke="#3498db" stroke-width="1" class="title-anim" style="animation-delay: 0.3s"/>
  
  <!-- DECODER Section -->
  <g class="decoder-anim" data-narration="Decoder: Converts binary code into decimal/hexadecimal output. Takes n inputs and produces 2^n outputs, activating one specific output line.">
    <rect x="20" y="55" width="115" height="130" fill="url(#decoderGrad)" class="box"/>
    <text x="77" y="72" text-anchor="middle" class="section-title">DECODER</text>
    <!-- Input side -->
    <line x1="25" y1="100" x2="45" y2="100" stroke="#3498db" stroke-width="2"/>
    <circle cx="25" cy="100" r="4" class="io-dot io-dot-in"/>
    <text x="15" y="104" text-anchor="middle" class="label">In</text>
    <text x="35" y="95" text-anchor="middle" class="detail">n bits</text>
    <!-- Output side -->
    <line x1="110" y1="90" x2="135" y2="90" stroke="#e74c3c" stroke-width="2"/>
    <line x1="110" y1="105" x2="135" y2="105" stroke="#e74c3c" stroke-width="2"/>
    <line x1="110" y1="120" x2="135" y2="120" stroke="#e74c3c" stroke-width="2"/>
    <line x1="110" y1="135" x2="135" y2="135" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="135" cy="90" r="3" class="io-dot io-dot-out"/>
    <circle cx="135" cy="105" r="3" class="io-dot io-dot-out"/>
    <circle cx="135" cy="120" r="3" class="io-dot io-dot-out"/>
    <circle cx="135" cy="135" r="3" class="io-dot io-dot-out"/>
    <text x="142" y="115" text-anchor="middle" class="label">2^n Out</text>
    <!-- Types -->
    <text x="77" y="160" text-anchor="middle" class="detail">Binary / BCD</text>
  </g>
  
  <!-- Arrow from Decoder to Encoder -->
  <path d="M 145 120 L 165 120" class="arrow-anim" marker-end="url(#arrowhead)"/>
  
  <!-- ENCODER Section -->
  <g class="encoder-anim" data-narration="Encoder: Performs inverse operation of decoder. Converts decimal/hexadecimal input into binary output. Priority encoder handles multiple active inputs.">
    <rect x="175" y="55" width="115" height="130" fill="url(#encoderGrad)" class="box"/>
    <text x="232" y="72" text-anchor="middle" class="section-title">ENCODER</text>
    <!-- Input side -->
    <line x1="180" y1="90" x2="200" y2="90" stroke="#3498db" stroke-width="2"/>
    <line x1="180" y1="105" x2="200" y2="105" stroke="#3498db" stroke-width="2"/>
    <line x1="180" y1="120" x2="200" y2="120" stroke="#3498db" stroke-width="2"/>
    line x1="180" y1="135" x2="200" y2="135" stroke="#3498db" stroke-width="2"/>
    <circle cx="180" cy="90" r="3" class="io-dot io-dot-in"/>
    <circle cx="180" cy="105" r="3" class="io-dot io-dot-in"/>
    <circle cx="180" cy="120" r="3" class="io-dot io-dot-in"/>
    <circle cx="180" cy="135" r="3" class="io-dot io-dot-in"/>
    <text x="170" y="115" text-anchor="middle" class="label">2^n In</text>
    <!-- Output side -->
    <line x1="265" y1="100" x2="290" y2="100" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="290" cy="100" r="4" class="io-dot io-dot-out"/>
    <text x="300" y="104" text-anchor="middle" class="label">Out</text>
    <text x="280" y="92" text-anchor="middle" class="detail">n bits</text>
    <!-- Types -->
    <text x="232" y="160" text-anchor="middle" class="detail">Binary / Priority</text>
  </g>
  
  <!-- Arrow from Encoder to Multiplexer -->
  <path d="M 300 120 L 320 120" class="arrow-anim" marker-end="url(#arrowhead)"/>
  
  <!-- MULTIPLEXER Section -->
  <g class="mux-anim" data-narration="Multiplexer (MUX): Selects one of many input signals and forwards it to a single output line. Uses selection lines to choose which input to pass through.">
    <rect x="330" y="55" width="75" height="130" fill="url(#muxGrad)" class="box"/>
    <text x="367" y="72" text-anchor="middle" class="section-title">MUX</text>
    <!-- Data inputs -->
    <line x1="335" y1="90" x2="350" y2="90" stroke="#3498db" stroke-width="2"/>
    <line x1="335" y1="105" x2="350" y2="105" stroke="#3498db" stroke-width="2"/>
    <line x1="335" y1="120" x2="350" y2="120" stroke="#3498db" stroke-width="2"/>
    <line x1="335" y1="135" x2="350" y2="135" stroke="#3498db" stroke-width="2"/>
    <circle cx="335" cy="90" r="2.5" class="io-dot io-dot-in"/>
    <circle cx="335" cy="105" r="2.5" class="io-dot io-dot-in"/>
    <circle cx="335" cy="120" r="2.5" class="io-dot io-dot-in"/>
    <circle cx="335" cy="135" r="2.5" class="io-dot io-dot-in"/>
    <text x="328" y="115" text-anchor="end" class="label" style="font-size:9px">Data</text>
    <!-- Selection lines -->
    <line x1="355" y1="75" x2="365" y2="75" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="355" y1="82" x2="365" y2="82" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="355" cy="75" r="2" fill="#9b59b6"/>
    <circle cx="355" cy="82" r="2" fill="#9b59b6"/>
    <text x="360" y="70" text-anchor="middle" class="detail" style="font-size:8px">Sel</text>
    <!-- Output -->
    <line x1="380" y1="105" x2="405" y2="105" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="405" cy="105" r="4" class="io-dot io-dot-out"/>
    <text x="415" y="109" text-anchor="middle" class="label">Y</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key Concepts: Decoders convert binary to one-hot output (n-to-2^n). Encoders do reverse (2^n-to-n). Multiplexers select one input based on selection bits.">
    <rect x="20" y="200" width="380" height="75" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5" ry="5"/>
    <text x="35" y="220" class="section-title" style="font-size:12px;">Key Concepts</text>
    <text x="35" y="238" class="detail">• Decoder: n inputs → 2^n outputs (one-hot)</text>
    <text x="35" y="253" class="detail">• Encoder: 2^n inputs → n outputs (binary)</text>
    <text x="35" y="268" class="detail">• MUX: 2^n data inputs + n select → 1 output</text>
  </g>
  
  <!-- Applications Box -->
  <g data-narration="Applications: Used in memory addressing, data routing, communication systems, and digital display control.">
    <rect x="20" y="285" width="380" height="50" fill="#eaf2f8" stroke="#3498db" stroke-width="1" rx="5" ry="5"/>
    <text x="35" y="305" class="section-title" style="font-size:12px;">Applications</text>
    <text x="35" y="323" class="detail">Memory addressing • Data routing • Communication systems • Display decoders</text>
  </g>
  
  <!-- Animated flow indicators -->
  <g class="pulse-anim" style="transform-origin: 77px 120px;">
    <circle cx="77" cy="120" r="25" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  </g>
  <g class="pulse-anim" style="transform-origin: 232px 120px; animation-delay: 0.5s;">
    <circle cx="232" cy="120" r="25" fill="none" stroke="#27ae60" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  </g>
  <g class="pulse-anim" style="transform-origin: 367px 105px; animation-delay: 1s;">
    <circle cx="367" cy="105" r="20" fill="none" stroke="#e74c3c" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>