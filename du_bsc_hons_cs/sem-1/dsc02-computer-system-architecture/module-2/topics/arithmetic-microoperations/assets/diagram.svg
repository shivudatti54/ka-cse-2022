<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="arithmetic-microoperations" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e0f2e9"/>
      <stop offset="100%" style="stop-color:#f0e8f4"/>
    </linearGradient>
    <linearGradient id="aluGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7bc47f"/>
      <stop offset="100%" style="stop-color:#4a9f5c"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a962"/>
      <stop offset="100%" style="stop-color:#d4803a"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b7fd9"/>
      <stop offset="100%" style="stop-color:#6b4fa8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d5a87; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .section-box { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .title-anim { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .alu-box { animation: fadeIn 1s ease-out forwards, pulse 3s ease-in-out 2s infinite; transform-origin: center; }
    .connector { stroke-dasharray: 5, 5; animation: drawLine 1.5s ease-out forwards; }
    .arrow-head { fill: #666; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title-text title-anim">Arithmetic Microoperations</text>
  <line x1="60" y1="45" x2="360" y2="45" stroke="#4a90d9" stroke-width="2" class="title-anim" style="animation-delay: 0.3s"/>
  
  <!-- ALU Main Box -->
  <g class="alu-box" filter="url(#shadow)">
    <rect x="120" y="60" width="180" height="70" rx="8" fill="url(#aluGradient)" stroke="#1e3d5c" stroke-width="2"/>
    <text x="210" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="16" font-weight="bold">ALU</text>
    <text x="210" y="110" text-anchor="middle" fill="#cce4f7" font-family="Arial" font-size="11">Arithmetic Logic Unit</text>
  </g>
  
  <!-- Input Labels -->
  <g class="section-box">
    <text x="40" y="85" class="label-text" fill="#2d5a87" font-weight="bold">Inputs</text>
    <rect x="25" y="95" width="50" height="25" rx="3" fill="#e8f4fc" stroke="#4a90d9" stroke-width="1"/>
    <text x="50" y="112" text-anchor="middle" class="detail-text">A</text>
    <rect x="80" y="95" width="50" height="25" rx="3" fill="#e8f4fc" stroke="#4a90d9" stroke-width="1"/>
    <text x="105" y="112" text-anchor="middle" class="detail-text">B</text>
  </g>
  
  <!-- Output Label -->
  <g class="section-box">
    <text x="350" y="85" class="label-text" fill="#2d5a87" font-weight="bold">Output</text>
    <rect x="345" y="95" width="50" height="25" rx="3" fill="#e8f4fc" stroke="#4a90d9" stroke-width="1"/>
    <text x="370" y="112" text-anchor="middle" class="detail-text">Result</text>
  </g>
  
  <!-- Connection Lines -->
  <path d="M75 107 L120 95" stroke="#666" stroke-width="1.5" class="connector"/>
  <path d="M300 95 L345 107" stroke="#666" stroke-width="1.5" class="connector"/>
  
  <!-- Operation Types Box -->
  <g class="section-box" filter="url(#shadow)">
    <rect x="20" y="145" width="130" height="140" rx="6" fill="url(#boxGradient1)" stroke="#3a7a47" stroke-width="1.5"/>
    <text x="85" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Basic Operations</text>
    <line x1="30" y1="172" x2="140" y2="172" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="30" y="192" class="detail-text" fill="white">1. Addition (+)</text>
    <text x="30" y="210" class="detail-text" fill="white">2. Subtraction (-)</text>
    <text x="30" y="228" class="detail-text" fill="white">3. Multiplication (×)</text>
    <text x="30" y="246" class="detail-text" fill="white">4. Division (÷)</text>
    <text x="30" y="264" class="detail-text" fill="white">5. Increment (n+1)</text>
    <text x="30" y="280" class="detail-text" fill="white">6. Decrement (n-1)</text>
  </g>
  
  <!-- Implementation Methods Box -->
  <g class="section-box" filter="url(#shadow)">
    <rect x="160" y="145" width="130" height="140" rx="6" fill="url(#boxGradient2)" stroke="#b35a1f" stroke-width="1.5"/>
    <text x="225" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Implementation</text>
    <line x1="170" y1="172" x2="280" y2="172" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="170" y="195" class="detail-text" fill="white" font-weight="bold">Digital Circuits:</text>
    <text x="170" y="215" class="detail-text" fill="white">• Ripple Carry Adder</text>
    <text x="170" y="233" class="detail-text" fill="white">• Carry Lookahead</text>
    <text x="170" y="251" class="detail-text" fill="white">• Logic Gates</text>
    <text x="170" y="269" class="detail-text" fill="white">• Flip-Flops</text>
    <text x="170" y="287" class="detail-text" fill="white">• Multiplexers</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-box" filter="url(#shadow)">
    <rect x="300" y="145" width="110" height="100" rx="6" fill="url(#boxGradient3)" stroke="#4a3575" stroke-width="1.5"/>
    <text x="355" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Key Concepts</text>
    <line x1="310" y1="172" x2="400" y2="172" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="310" y="195" class="detail-text" fill="white">• Fundamental</text>
    <text x="310" y="210" class="detail-text" fill="white">  building blocks</text>
    <text x="310" y="228" class="detail-text" fill="white">• Combined for</text>
    <text x="310" y="243" class="detail-text" fill="white">  complex ops</text>
  </g>
  
  <!-- Flow Arrow from Operations to Implementation -->
  <path d="M150 215 Q155 215 160 215" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <polygon points="158,212 165,215 158,218" fill="#666"/>
  
  <!-- Bottom Info Section -->
  <g class="section-box">
    <rect x="20" y="300" width="380" height="85" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
    <text x="30" y="322" class="label-text" fill="#2d5a87" font-weight="bold">Exam Tips:</text>
    <text x="30" y="342" class="detail-text">• ALU performs arithmetic and logical operations</text>
    <text x="30" y="358" class="detail-text">• Arithmetic microoperations include: add, subtract, multiply, divide</text>
    <text x="30" y="374" class="detail-text">• Implementation uses adders, gates, and flip-flops</text>
  </g>
  
  <!-- Narration Elements (invisible but for accessibility) -->
  <title data-narration="ALU - The Arithmetic Logic Unit is the core component that performs arithmetic microoperations"></title>
  <desc data-narration="Six basic arithmetic operations: Addition, Subtraction, Multiplication, Division, Increment, and Decrement"></desc>
  <desc data-narration="Implementation methods: Ripple Carry Adder, Carry Lookahead Adder, Logic Gates, Flip-Flops"></desc>
</svg>