<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="binary-adder-subtractor">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="sectionBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="sectionBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="sectionBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="sectionBg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1565c0; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .gate { stroke: #333; stroke-width: 1.5; fill: #fff; }
    .wire { stroke: #1565c0; stroke-width: 1.5; fill: none; }
    .arrow { fill: #1565c0; }
    .section-box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title anim-fade">Binary Adder-Subtractor</text>
  
  <!-- Section 1: Half Adder -->
  <g class="section-box" data-narration="Half Adder: Adds two 1-bit numbers. Produces Sum and Carry outputs using XOR and AND gates.">
    <rect x="10" y="40" width="125" height="90" rx="8" fill="url(#sectionBg1)" stroke="#64b5f6" stroke-width="1"/>
    <text x="72" y="58" text-anchor="middle" class="section-title">Half Adder</text>
    <!-- XOR Gate -->
    <path d="M30 85 Q45 75, 60 75 Q75 75, 90 85 Q75 95, 60 95 Q45 95, 30 85" class="gate" fill="#fff3e0"/>
    <text x="60" y="82" text-anchor="middle" class="label" font-size="9" font-weight="bold">XOR</text>
    <!-- AND Gate -->
    <path d="M30 105 Q45 98, 60 98 Q75 98, 90 105 Q75 112, 60 112 Q45 112, 30 105" class="gate" fill="#ffcdd2"/>
    <text x="60" y="107" text-anchor="middle" class="label" font-size="9" font-weight="bold">AND</text>
    <!-- Inputs -->
    <line x1="15" y1="80" x2="30" y2="85" class="wire anim-slide-left" style="animation-delay: 0.2s"/>
    <line x1="15" y1="80" x2="30" y2="105" class="wire anim-slide-left" style="animation-delay: 0.3s"/>
    <text x="12" y="75" class="label">A</text>
    <line x1="15" y1="95" x2="30" y2="85" class="wire anim-slide-left" style="animation-delay: 0.4s"/>
    <line x1="15" y1="95" x2="30" y2="105" class="wire anim-slide-left" style="animation-delay: 0.5s"/>
    <text x="12" y="90" class="label">B</text>
    <!-- Outputs -->
    <line x1="90" y1="85" x2="105" y2="85" class="wire anim-slide-right" style="animation-delay: 0.6s"/>
    <text x="112" y="82" class="label">Sum</text>
    <line x1="90" y1="105" x2="105" y2="105" class="wire anim-slide-right" style="animation-delay: 0.7s"/>
    <text x="112" y="102" class="label">Carry</text>
  </g>
  
  <!-- Section 2: Full Adder -->
  <g class="section-box" data-narration="Full Adder: Adds three 1-bit numbers (A, B, Cin). Uses two half adders and an OR gate to produce Sum and Carry outputs.">
    <rect x="145" y="40" width="130" height="90" rx="8" fill="url(#sectionBg2)" stroke="#81c784" stroke-width="1"/>
    <text x="210" y="58" text-anchor="middle" class="section-title">Full Adder</text>
    <!-- First XOR -->
    <path d="M160 75 Q170 68, 180 68 Q190 68, 200 75 Q190 82, 180 82 Q170 82, 160 75" class="gate" fill="#fff3e0"/>
    <text x="180" y="75" text-anchor="middle" class="label" font-size="8" font-weight="bold">XOR</text>
    <!-- Second XOR -->
    <path d="M205 85 Q215 78, 225 78 Q235 78, 245 85 Q235 92, 225 92 Q215 92, 205 85" class="gate" fill="#fff3e0"/>
    <text x="225" y="85" text-anchor="middle" class="label" font-size="8" font-weight="bold">XOR</text>
    <!-- AND Gate -->
    <path d="M205 100 Q215 93, 225 93 Q235 93, 245 100 Q235 107, 225 107 Q215 107, 205 100" class="gate" fill="#ffcdd2"/>
    <text x="225" y="100" text-anchor="middle" class="label" font-size="8" font-weight="bold">AND</text>
    <!-- OR Gate -->
    <path d="M250 105 Q260 100, 265 100 Q270 100, 270 107 Q270 114, 265 114 Q260 114, 250 109 Z" class="gate" fill="#c8e6c9"/>
    <text x="262" y="110" text-anchor="middle" class="label" font-size="7" font-weight="bold">OR</text>
    <!-- Labels -->
    <text x="152" y="70" class="label">A</text>
    <text x="152" y="85" class="label">B</text>
    <text x="195" y="70" class="label">Cin</text>
    <text x="252" y="80" class="label">Sum</text>
    <text x="272" y="105" class="label">Cout</text>
  </g>
  
  <!-- Section 3: Binary Adder -->
  <g class="section-box" data-narration="Binary Adder: Cascades multiple full adders to add multi-bit binary numbers. Each bit position adds with carry from previous position.">
    <rect x="10" y="145" width="195" height="100" rx="8" fill="url(#sectionBg3)" stroke="#ffb74d" stroke-width="1"/>
    <text x="107" y="163" text-anchor="middle" class="section-title">Binary Adder (2-bit)</text>
    <!-- FA 1 -->
    <rect x="30" y="175" width="60" height="50" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="60" y="195" text-anchor="middle" class="label" font-weight="bold">FA</text>
    <text x="60" y="208" text-anchor="middle" class="detail">Bit 0</text>
    <!-- FA 2 -->
    <rect x="110" y="175" width="60" height="50" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="140" y="195" text-anchor="middle" class="label" font-weight="bold">FA</text>
    <text x="140" y="208" text-anchor="middle" class="detail">Bit 1</text>
    <!-- Inputs -->
    <text x="15" y="185" class="label">A0</text>
    <text x="15" y="205" class="label">B0</text>
    <text x="95" y="185" class="label">A1</text>
    <text x="95" y="205" class="label">B1</text>
    <!-- Carry connection -->
    <path d="M90 200 Q100 200, 110 200" class="wire" stroke="#e65100" stroke-width="2"/>
    <text x="100" y="195" text-anchor="middle" class="detail">C</text>
    <!-- Outputs -->
    <text x="175" y="185" class="label">S0</text>
    <text x="175" y="205" class="label">S1</text>
    <text x="175" y="225" class="label">Cout</text>
    <!-- Arrows -->
    <polygon points="25,195 30,192 30,198" class="arrow"/>
    <polygon points="25,215 30,212 30,218" class="arrow"/>
    <polygon points="85,195 90,192 90,198" class="arrow"/>
    <polygon points="85,215 90,212 90,218" class="arrow"/>
  </g>
  
  <!-- Section 4: Binary Subtractor -->
  <g class="section-box" data-narration="Binary Subtractor: Uses two's complement method. Inverts B bits using XOR gates (with M=1) then adds 1 through carry-in to compute A-B.">
    <rect x="215" y="145" width="195" height="100" rx="8" fill="url(#sectionBg4)" stroke="#ba68c8" stroke-width="1"/>
    <text x="312" y="163" text-anchor="middle" class="section-title">Binary Subtractor</text>
    <!-- XOR gates for inversion -->
    <rect x="235" y="180" width="25" height="18" rx="3" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="247" y="192" text-anchor="middle" class="detail" font-size="8">XOR</text>
    <rect x="235" y="205" width="25" height="18" rx="3" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="247" y="217" text-anchor="middle" class="detail" font-size="8">XOR</text>
    <!-- FA -->
    <rect x="280" y="180" width="60" height="50" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="310" y="200" text-anchor="middle" class="label" font-weight="bold">FA</text>
    <text x="310" y="213" text-anchor="middle" class="detail">+1</text>
    <!-- Labels -->
    <text x="225" y="185" class="label">B0</text>
    <text x="225" y="210" class="label">B1</text>
    <text x="258" y="172" class="label" font-size="9">M (mode)</text>
    <text x="355" y="195" class="label">Diff0</text>
    <text x="355" y="220" class="label">Diff1</text>
    <text x="355" y="238" class="label">Borrow</text>
    <!-- Control input -->
    <line x1="258" y1="172" x2="258" y2="185" class="wire" style="stroke-dasharray: 3"/>
    <line x1="258" y1="195" x2="258" y2="205" class="wire" style="stroke-dasharray: 3"/>
    <!-- M=1 inverts B -->
    <text x="265" y="189" class="detail" fill="#9c27b0">¬B0</text>
    <text x="265" y="214" class="detail" fill="#9c27b0">¬B1</text>
    <!-- Arrows -->
    <polygon points="260,185 265,182 265,188" class="arrow" fill="#9c27b0"/>
    <polygon points="260,210 265,207 265,213" class="arrow" fill="#9c27b0"/>
  </g>
  
  <!-- Section 5: Two's Complement Info -->
  <g class="section-box" data-narration="Two's Complement: To represent negative numbers, invert all bits and add 1. This allows subtraction using addition circuitry.">
    <rect x="10" y="255" width="195" height="60" rx="8" fill="url(#sectionBg1)" stroke="#64b5f6" stroke-width="1"/>
    <text x="107" y="273" text-anchor="middle" class="section-title">Two's Complement</text>
    <text x="20" y="292" class="detail">Example: -5 = 1011 (for 4-bit)</text>
    <text x="20" y="305" class="detail">Invert bits: 1010 → Add 1: 1011</text>
  </g>
  
  <!-- Section 6: Key Relationships -->
  <g class="section-box" data-narration="Key Relationship: XOR gate is essential for both adder and subtractor - it performs addition in adder mode and controlled inversion in subtractor mode.">
    <rect x="215" y="255" width="195" height="60" rx="8" fill="url(#sectionBg2)" stroke="#81c784" stroke-width="1"/>
    <text x="312" y="273" text-anchor="middle" class="section-title">Key Relationship</text>
    <text x="225" y="292" class="detail">XOR = Addition (A⊕B) + Controlled Inversion</text>
    <text x="225" y="305" class="detail">AND = Carry Generation, OR = Carry Propagation</text>
  </g>
  
  <!-- Animated connection lines -->
  <g class="anim-fade" style="animation-delay: 0.8s">
    <line x1="135" y1="85" x2="145" y2="85" class="wire line-anim"/>
    <line x1="275" y1="205" x2="280" y2="205" class="wire line-anim"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="anim-pulse" style="animation-delay: 1s">
    <rect x="145" y="325" width="130" height="50" rx="8" fill="#fff9c4" stroke="#ffd54f" stroke-width="2"/>
    <text x="210" y="345" text-anchor="middle" class="section-title" fill="#f57f17">Circuit Summary</text>
    <text x="210" y="362" text-anchor="middle" class="detail">Full Adder = 2 Half Adders + OR</text>
    <text x="210" y="375" text-anchor="middle" class="detail">Subtractor = Adder + XOR (invert)</text>
  </g>
</svg>