<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="half-adder-full-adder">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="andGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b8e23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a6b1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd853f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5a2b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideUp 0.6s ease-out 0.6s both; }
    .gate { animation: pulse 3s ease-in-out infinite; }
    .label { font-family: Arial, sans-serif; }
    .key-box { animation: fadeIn 0.8s ease-out 0.8s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="label" font-size="20" font-weight="bold" fill="#2d5a6b" style="animation: fadeIn 1s ease-out;">Half Adder &amp; Full Adder</text>
  
  <!-- Half Adder Section -->
  <g class="section-1" data-narration="Half Adder: Adds two 1-bit numbers using XOR for Sum and AND for Carry">
    <rect x="20" y="50" width="180" height="140" fill="#fff" stroke="#4a90a4" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="110" y="70" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="#2d5a6b">HALF ADDER</text>
    
    <!-- Input A -->
    <text x="35" y="95" class="label" font-size="12" fill="#333">A</text>
    <line x1="45" y1="92" x2="85" y2="92" stroke="#333" stroke-width="2"/>
    <circle cx="85" cy="92" r="3" fill="#4a90a4"/>
    
    <!-- Input B -->
    <text x="35" y="120" class="label" font-size="12" fill="#333">B</text>
    <line x1="45" y1="117" x2="85" y2="117" stroke="#333" stroke-width="2"/>
    <circle cx="85" cy="117" r="3" fill="#4a90a4"/>
    
    <!-- XOR Gate -->
    <path d="M85,85 Q105,92 105,100 Q105,108 85,115 L85,85" fill="url(#gateGradient)" stroke="#2d5a6b" stroke-width="1.5" class="gate"/>
    <text x="95" y="93" class="label" font-size="8" fill="#fff" font-weight="bold">≥1</text>
    
    <!-- AND Gate -->
    <path d="M105,100 L115,100 L120,85 L120,115 L115,100" fill="url(#andGradient)" stroke="#4a6b1a" stroke-width="1.5" class="gate"/>
    <text x="113" y="93" class="label" font-size="8" fill="#fff" font-weight="bold">&amp;</text>
    
    <!-- Sum output -->
    <line x1="105" y1="92" x2="130" y2="92" stroke="#333" stroke-width="2"/>
    <text x="150" y="96" class="label" font-size="12" font-weight="bold" fill="#2d5a6b">S (Sum)</text>
    
    <!-- Carry output -->
    <line x1="120" y1="100" x2="140" y2="100" stroke="#333" stroke-width="2"/>
    <line x1="140" y1="100" x2="140" y2="130" stroke="#333" stroke-width="2"/>
    <line x1="140" y1="130" x2="155" y2="130" stroke="#333" stroke-width="2"/>
    <text x="160" y="134" class="label" font-size="12" font-weight="bold" fill="#4a6b1a">C (Carry)</text>
    
    <!-- Connection lines -->
    <line x1="85" y1="115" x2="85" y2="130" stroke="#333" stroke-width="2"/>
    <line x1="85" y1="130" x2="105" y2="130" stroke="#333" stroke-width="2"/>
    <line x1="105" y1="130" x2="105" y2="117" stroke="#333" stroke-width="2"/>
  </g>
  
  <!-- Full Adder Section -->
  <g class="section-2" data-narration="Full Adder: Adds three 1-bit numbers (including carry-in) using two half adders and an OR gate">
    <rect x="220" y="50" width="180" height="140" fill="#fff" stroke="#cd853f" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="310" y="70" text-anchor="middle" class="label" font-size="14" font-weight="bold" fill="#8b5a2b">FULL ADDER</text>
    
    <!-- Inputs -->
    <text x="235" y="95" class="label" font-size="12" fill="#333">A</text>
    <line x1="245" y1="92" x2="265" y2="92" stroke="#333" stroke-width="2"/>
    
    <text x="235" y="115" class="label" font-size="12" fill="#333">B</text>
    <line x1="245" y1="112" x2="265" y2="112" stroke="#333" stroke-width="2"/>
    
    <text x="235" y="138" class="label" font-size="12" fill="#333">Cin</text>
    <line x1="265" y1="135" x2="280" y2="135" stroke="#333" stroke-width="2"/>
    
    <!-- First XOR -->
    <path d="M265,85 Q280,92 280,100 Q280,108 265,115 L265,85" fill="url(#gateGradient)" stroke="#2d5a6b" stroke-width="1.5" class="gate"/>
    <text x="273" y="93" class="label" font-size="8" fill="#fff" font-weight="bold">≥1</text>
    
    <!-- Second XOR (Sum) -->
    <path d="M295,85 Q310,92 310,100 Q310,108 295,115 L295,85" fill="url(#gateGradient)" stroke="#2d5a6b" stroke-width="1.5" class="gate"/>
    <text x="303" y="93" class="label" font-size="8" fill="#fff" font-weight="bold">≥1</text>
    
    <!-- First AND -->
    <path d="M295,115 L305,115 L310,100 L310,130 L305,115" fill="url(#andGradient)" stroke="#4a6b1a" stroke-width="1.5" class="gate"/>
    <text x="303" y="118" class="label" font-size="8" fill="#fff" font-weight="bold">&amp;</text>
    
    <!-- Second AND -->
    <path d="M280,130 L290,130 L295,115 L295,145 L290,130" fill="url(#andGradient)" stroke="#4a6b1a" stroke-width="1.5" class="gate"/>
    <text x="288" y="133" class="label" font-size="8" fill="#fff" font-weight="bold">&amp;</text>
    
    <!-- OR Gate (Carry Out) -->
    <path d="M310,120 Q325,127 325,135 Q325,143 310,150 L310,120" fill="url(#orGradient)" stroke="#8b5a2b" stroke-width="1.5" class="gate"/>
    <text x="316" y="138" class="label" font-size="8" fill="#fff" font-weight="bold">≥1</text>
    
    <!-- Outputs -->
    <line x1="310" y1="92" x2="340" y2="92" stroke="#333" stroke-width="2"/>
    <text x="350" y="96" class="label" font-size="12" font-weight="bold" fill="#2d5a6b">S</text>
    
    <line x1="325" y1="135" x2="345" y2="135" stroke="#333" stroke-width="2"/>
    <text x="355" y="139" class="label" font-size="12" font-weight="bold" fill="#8b5a2b">Cout</text>
    
    <!-- Internal connections -->
    <line x1="265" y1="112" x2="280" y2="112" stroke="#333" stroke-width="1.5"/>
    <line x1="280" y1="112" x2="280" y2="135" stroke="#333" stroke-width="1.5"/>
    <line x1="280" y1="112" x2="295" y2="112" stroke="#333" stroke-width="1.5"/>
    <line x1="280" y1="115" x2="295" y2="115" stroke="#333" stroke-width="1.5"/>
  </g>
  
  <!-- Truth Tables Section -->
  <g class="section-3" data-narration="Truth tables showing input-output relationships for both adders">
    <!-- Half Adder Truth Table -->
    <rect x="20" y="205" width="130" height="100" fill="#fff" stroke="#4a90a4" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
    <text x="85" y="222" text-anchor="middle" class="label" font-size="11" font-weight="bold" fill="#2d5a6b">Half Adder</text>
    <text x="35" y="240" class="label" font-size="9" fill="#333">A B | S C</text>
    <line x1="30" y1="245" x2="115" y2="245" stroke="#ccc" stroke-width="1"/>
    <text x="35" y="260" class="label" font-size="9" fill="#333">0 0 | 0 0</text>
    <text x="35" y="275" class="label" font-size="9" fill="#333">0 1 | 1 0</text>
    <text x="35" y="290" class="label" font-size="9" fill="#333">1 0 | 1 0</text>
    <text x="85" y="260" class="label" font-size="9" fill="#333">1 1 | 0 1</text>
    
    <!-- Full Adder Truth Table -->
    <rect x="160" y="205" width="130" height="100" fill="#fff" stroke="#cd853f" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
    <text x="225" y="222" text-anchor="middle" class="label" font-size="11" font-weight="bold" fill="#8b5a2b">Full Adder</text>
    <text x="170" y="240" class="label" font-size="9" fill="#333">A B Cin | S Cout</text>
    <line x1="165" y1="245" x2="280" y2="245" stroke="#ccc" stroke-width="1"/>
    <text x="170" y="260" class="label" font-size="9" fill="#333">0 0 0 | 0 0</text>
    <text x="170" y="275" class="label" font-size="9" fill="#333">0 1 0 | 1 0</text>
    <text x="170" y="290" class="label" font-size="9" fill="#333">1 0 0 | 1 0</text>
    <text x="225" y="260" class="label" font-size="9" fill="#333">1 1 0 | 0 1</text>
    <text x="225" y="275" class="label" font-size="9" fill="#333">0 0 1 | 1 0</text>
    <text x="225" y="290" class="label" font-size="9" fill="#333">0 1 1 | 0 1</text>
    
    <!-- Key Concepts Box -->
    <rect x="300" y="205" width="100" height="100" fill="#e8f5e9" stroke="#6b8e23" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
    <text x="350" y="222" text-anchor="middle" class="label" font-size="11" font-weight="bold" fill="#4a6b1a">Key Points</text>
    <text x="310" y="240" class="label" font-size="9" fill="#333">• XOR = Sum</text>
    <text x="310" y="258" class="label" font-size="9" fill="#333">• AND = Carry</text>
    <text x="310" y="276" class="label" font-size="9" fill="#333">• Full = 2 HA + OR</text>
    <text x="310" y="294" class="label" font-size="9" fill="#333">• HA: 2 inputs</text>
    <text x="310" y="308" class="label" font-size="9" fill="#333">• FA: 3 inputs</text>
  </g>
  
  <!-- Application Note -->
  <g class="key-box" data-narration="Adders are fundamental building blocks in ALUs, calculators, and digital computers">
    <rect x="20" y="315" width="380" height="70" fill="#fff8e1" stroke="#ffa000" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
    <text x="210" y="335" text-anchor="middle" class="label" font-size="12" font-weight="bold" fill="#f57c00">Applications</text>
    <text x="35" y="355" class="label" font-size="10" fill="#333">• Arithmetic Logic Unit (ALU) in CPUs</text>
    <text x="35" y="372" class="label" font-size="10" fill="#333">• Digital calculators and computers • Cascade multiple full adders for multi-bit addition</text>
  </g>
  
  <!-- Decorative arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90a4"/>
    </marker>
  </defs>
  <line x1="200" y1="120" x2="220" y2="120" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Connection indicator -->
  <circle cx="210" cy="120" r="4" fill="#4a90a4" style="animation: pulse 2s infinite"/>
</svg>