<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="instruction-codes-and-format" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8d4e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="opcodeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="operandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="addressingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paddingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideDown {
      from { transform: translateY(-15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-box { animation: slideIn 0.6s ease-out forwards; }
    .instruction-bar { animation: slideDown 0.7s ease-out forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .legend-item { animation: fadeIn 0.5s ease-out forwards; }
    .arrow { animation: fadeIn 0.8s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Instruction Codes &amp; Format</text>
  
  <!-- Main Instruction Format Bar -->
  <g class="instruction-bar" data-narration="The instruction format shows how bits are allocated in a machine instruction">
    <rect x="40" y="60" width="340" height="45" fill="#34495e" rx="5" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" font-family="Arial" font-size="11" fill="#ecf0f1">Instruction Word (16-bit example)</text>
  </g>
  
  <!-- Opcode Section -->
  <g class="section-box delay-1" data-narration="Opcode specifies the operation to be performed (e.g., ADD, SUB, LOAD)">
    <rect x="45" y="115" width="70" height="70" fill="url(#opcodeGrad)" rx="6" filter="url(#shadow)"/>
    <text x="80" y="140" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">OPCODE</text>
    <text x="80" y="160" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Operation Code</text>
    <text x="80" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#e8d5f2">6 bits</text>
  </g>
  
  <!-- Operands Section -->
  <g class="section-box delay-2" data-narration="Operands contain the data or addresses needed by the instruction">
    <rect x="125" y="115" width="90" height="70" fill="url(#operandGrad)" rx="6" filter="url(#shadow)"/>
    <text x="170" y="140" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">OPERANDS</text>
    <text x="170" y="160" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Source/Dest</text>
    <text x="170" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#fad0c4">6 bits</text>
  </g>
  
  <!-- Addressing Mode Section -->
  <g class="section-box delay-3" data-narration="Addressing mode specifies how to interpret the operand (immediate, direct, indirect)">
    <rect x="225" y="115" width="80" height="70" fill="url(#addressingGrad)" rx="6" filter="url(#shadow)"/>
    <text x="265" y="140" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">ADDR</text>
    <text x="265" y="160" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Addressing</text>
    <text x="265" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4e4fe">2 bits</text>
  </g>
  
  <!-- Padding Section -->
  <g class="section-box delay-4" data-narration="Padding unused bits for alignment and future extensions">
    <rect x="315" y="115" width="60" height="70" fill="url(#paddingGrad)" rx="6" filter="url(#shadow)"/>
    <text x="345" y="140" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#5a6c7d">PAD</text>
    <text x="345" y="160" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a6c7d">Padding</text>
    <text x="345" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#8faab5">2 bits</text>
  </g>
  
  <!-- Connecting Arrows -->
  <g class="arrow">
    <path d="M 80 195 L 80 215" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 170 195 L 170 215" stroke="#f5576c" stroke-width="2" fill="none"/>
    <path d="M 265 195 L 265 215" stroke="#4facfe" stroke-width="2" fill="none"/>
    <path d="M 345 195 L 345 215" stroke="#a8edea" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Instruction Types Box -->
  <g class="pulse-element" data-narration="Different categories of instructions that the processor can execute">
    <rect x="40" y="230" width="170" height="140" fill="white" rx="8" stroke="#e0e0e0" stroke-width="2" filter="url(#shadow)"/>
    <text x="125" y="255" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Instruction Types</text>
    <circle cx="60" cy="280" r="4" fill="#667eea"/>
    <text x="75" y="284" font-family="Arial" font-size="11" fill="#34495e">Arithmetic (ADD, SUB)</text>
    <circle cx="60" cy="305" r="4" fill="#f5576c"/>
    <text x="75" y="309" font-family="Arial" font-size="11" fill="#34495e">Logical (AND, OR, NOT)</text>
    <circle cx="60" cy="330" r="4" fill="#4facfe"/>
    <text x="75" y="334" font-family="Arial" font-size="11" fill="#34495e">Load/Store (MEM ops)</text>
    <circle cx="60" cy="355" r="4" fill="#764ba2"/>
    <text x="75" y="359" font-family="Arial" font-size="11" fill="#34495e">Control (JMP, Branch)</text>
  </g>
  
  <!-- Example Binary Instruction -->
  <g data-narration="Example: 101010 001100 01 00 - how a real instruction is encoded">
    <rect x="220" y="230" width="160" height="140" fill="#2c3e50" rx="8" filter="url(#shadow)"/>
    <text x="300" y="255" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ecf0f1">Binary Example</text>
    
    <!-- Bits visualization -->
    <rect x="235" y="270" width="25" height="20" fill="#667eea" rx="3"/>
    <text x="247" y="284" text-anchor="middle" font-family="monospace" font-size="10" fill="white">101010</text>
    
    <rect x="265" y="270" width="35" height="20" fill="#f5576c" rx="3"/>
    <text x="282" y="284" text-anchor="middle" font-family="monospace" font-size="10" fill="white">001100</text>
    
    <rect x="305" y="270" width="20" height="20" fill="#4facfe" rx="3"/>
    <text x="315" y="284" text-anchor="middle" font-family="monospace" font-size="10" fill="white">01</text>
    
    <rect x="330" y="270" width="20" height="20" fill="#a8edea" rx="3"/>
    <text x="340" y="284" text-anchor="middle" font-family="monospace" font-size="10" fill="#34495e">00</text>
    
    <!-- Labels below -->
    <text x="247" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#a0aec0">Opcode</text>
    <text x="282" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#a0aec0">Operands</text>
    <text x="315" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#a0aec0">Addr</text>
    <text x="340" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#a0aec0">Pad</text>
    
    <text x="300" y="335" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0aec0">Instruction:</text>
    <text x="300" y="352" text-anchor="middle" font-family="monospace" font-size="10" fill="#4facfe">ADD R1, R2, R3</text>
  </g>
  
  <!-- Key insight box -->
  <g data-narration="Good instruction format design improves execution efficiency and reduces memory usage">
    <rect x="40" y="375" width="340" height="20" fill="#fff3cd" rx="4" stroke="#ffc107" stroke-width="1"/>
    <text x="210" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#856404">💡 Well-designed formats improve performance &amp; reduce memory usage</text>
  </g>
</svg>