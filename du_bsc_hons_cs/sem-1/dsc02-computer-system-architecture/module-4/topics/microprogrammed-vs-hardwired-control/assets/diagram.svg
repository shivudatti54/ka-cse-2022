<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="microprogrammed-vs-hardwired-control">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="microGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3d9ff"/>
      <stop offset="100%" style="stop-color:#80b3ff"/>
    </linearGradient>
    <linearGradient id="hardwireGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffdbb3"/>
      <stop offset="100%" style="stop-color:#ffb380"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .box { rx: 8; ry: 8; stroke-width: 2; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease forwards; }
    .fade-in { animation: fadeIn 1s ease forwards; opacity: 0; }
    .slide-left { animation: slideInLeft 0.8s ease forwards; opacity: 0; }
    .slide-right { animation: slideInRight 0.8s ease forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Microprogrammed vs Hardwired</text>
  <text x="210" y="46" text-anchor="middle" class="label fade-in delay-1">Control Unit Design</text>
  
  <!-- Microprogrammed Section (Left) -->
  <g class="slide-left delay-2">
    <rect x="15" y="65" width="185" height="160" fill="url(#microGradient)" class="box" filter="url(#shadow)"/>
    <text x="108" y="82" text-anchor="middle" class="section-title">Microprogrammed</text>
    
    <!-- Control Memory Box -->
    <rect x="30" y="95" width="155" height="40" rx="5" fill="#fff" stroke="#6699cc" stroke-width="1.5"/>
    <text x="108" y="112" text-anchor="middle" class="label" font-weight="bold">Control Memory</text>
    <text x="108" y="126" text-anchor="middle" class="detail">Stores Microprogram</text>
    
    <!-- Microprogram Box -->
    <rect x="30" y="145" width="70" height="35" rx="5" fill="#e6f2ff" stroke="#6699cc" stroke-width="1.5"/>
    <text x="65" y="160" text-anchor="middle" class="label">Microprogram</text>
    <text x="65" y="173" text-anchor="middle" class="detail">Microinstructions</text>
    
    <!-- ALU -->
    <rect x="110" y="145" width="75" height="35" rx="5" fill="#e6f2ff" stroke="#6699cc" stroke-width="1.5"/>
    <text x="148" y="160" text-anchor="middle" class="label">ALU</text>
    <text x="148" y="173" text-anchor="middle" class="detail">Executes Ops</text>
    
    <!-- Arrows -->
    <path d="M65 180 L65 195 L108 195 L108 207" stroke="#4477aa" stroke-width="2" fill="none" class="arrow-anim"/>
    <path d="M148 180 L148 195 L175 195 L175 220 L108 220" stroke="#4477aa" stroke-width="2" fill="none" class="arrow-anim"/>
  </g>
  
  <!-- Hardwired Section (Right) -->
  <g class="slide-right delay-2">
    <rect x="220" y="65" width="185" height="160" fill="url(#hardwireGradient)" class="box" filter="url(#shadow)"/>
    <text x="312" y="82" text-anchor="middle" class="section-title">Hardwired</text>
    
    <!-- Logic Circuit Box -->
    <rect x="235" y="95" width="155" height="40" rx="5" fill="#fff" stroke="#cc8844" stroke-width="1.5"/>
    <text x="312" y="112" text-anchor="middle" class="label" font-weight="bold">Logic Circuit</text>
    <text x="312" y="126" text-anchor="middle" class="detail">Fixed Hardware</text>
    
    <!-- Control Signals -->
    <rect x="235" y="145" width="70" height="35" rx="5" fill="#fff5e6" stroke="#cc8844" stroke-width="1.5"/>
    <text x="270" y="160" text-anchor="middle" class="label">Control</text>
    <text x="270" y="173" text-anchor="middle" class="label">Signals</text>
    
    <!-- FSM/State Machine -->
    <rect x="315" y="145" width="75" height="35" rx="5" fill="#fff5e6" stroke="#cc8844" stroke-width="1.5"/>
    <text x="352" y="160" text-anchor="middle" class="label">FSM/</text>
    <text x="352" y="173" text-anchor="middle" class="label">State Machine</text>
    
    <!-- Arrows -->
    <path d="M270 180 L270 195 L312 195 L312 207" stroke="#cc6600" stroke-width="2" fill="none" class="arrow-anim"/>
    <path d="M352 180 L352 195 L380 195 L380 220 L312 220" stroke="#cc6600" stroke-width="2" fill="none" class="arrow-anim"/>
  </g>
  
  <!-- Key Concepts Section (Bottom) -->
  <g class="fade-in delay-3">
    <rect x="15" y="240" width="185" height="70" rx="6" fill="#fff" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
    <text x="108" y="258" text-anchor="middle" class="section-title" font-size="13">Microprogrammed</text>
    <text x="25" y="276" class="detail">✓ Flexible, easy to modify</text>
    <text x="25" y="290" class="detail">✗ Slower, more overhead</text>
    <text x="108" y="304" text-anchor="middle" class="detail" font-style="italic">Used in CISC (e.g., x86)</text>
  </g>
  
  <g class="fade-in delay-3">
    <rect x="220" y="240" width="185" height="70" rx="6" fill="#fff" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
    <text x="312" y="258" text-anchor="middle" class="section-title" font-size="13">Hardwired</text>
    <text x="230" y="276" class="detail">✓ Fast, efficient</text>
    <text x="230" y="290" class="detail">✗ Inflexible, complex design</text>
    <text x="312" y="304" text-anchor="middle" class="detail" font-style="italic">Used in RISC (e.g., MIPS)</text>
  </g>
  
  <!-- Comparison Arrow in Middle -->
  <g class="pulse">
    <circle cx="210" cy="275" r="15" fill="#666" opacity="0.8"/>
    <text x="210" y="280" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">VS</text>
  </g>
  
  <!-- Bottom Info Bar -->
  <g class="fade-in delay-4">
    <rect x="15" y="320" width="390" height="65" rx="8" fill="#f8f8f8" stroke="#aaa" stroke-width="1"/>
    <text x="210" y="342" text-anchor="middle" class="section-title" font-size="14">Key Takeaway</text>
    <text x="210" y="360" text-anchor="middle" class="detail">Choose <tspan font-weight="bold">microprogrammed</tspan> for flexibility,</text>
    <text x="210" y="375" text-anchor="middle" class="detail"><tspan font-weight="bold">hardwired</tspan> for speed in modern processors</text>
  </g>
  
  <!-- Data Narration Elements (invisible but present for accessibility) -->
  <rect x="0" y="0" width="420" height="400" fill="transparent" data-narration="Overview of Microprogrammed vs Hardwired Control Unit design approaches in computer architecture"/>
  <rect x="15" y="65" width="185" height="160" fill="transparent" data-narration="Microprogrammed Control: Uses stored microinstructions in control memory, providing flexibility and ease of modification but with slower execution due to overhead"/>
  <rect x="220" y="65" width="185" height="160" fill="transparent" data-narration="Hardwired Control: Uses fixed logic circuits and state machines, providing faster execution but with less flexibility and more complex design"/>
  <rect x="15" y="240" width="185" height="70" fill="transparent" data-narration="Microprogrammed advantages include easy updates, disadvantages include slower speed"/>
  <rect x="220" y="240" width="185" height="70" fill="transparent" data-narration="Hardwired advantages include speed and efficiency, disadvantages include inflexibility"/>
  <rect x="15" y="320" width="390" height="65" fill="transparent" data-narration="Key takeaway: Choose microprogrammed for flexibility, hardwired for speed in modern processor design"/>
</svg>