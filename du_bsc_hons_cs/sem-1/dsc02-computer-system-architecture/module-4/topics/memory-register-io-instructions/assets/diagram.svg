<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="memory-register-io-instructions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f0e8f8"/>
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff8080"/>
    </linearGradient>
    <linearGradient id="cacheGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#80ff9f"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#80b3ff"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba"/>
      <stop offset="100%" style="stop-color:#ffe680"/>
    </linearGradient>
    <linearGradient id="ioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc"/>
      <stop offset="100%" style="stop-color:#b366ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideIn 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideIn 0.8s ease-out 0.6s both; }
    .section-4 { animation: slideIn 0.8s ease-out 0.8s both; }
    .pyramid { animation: fadeIn 1s ease-out 0.3s both; }
    .io-box { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#444" class="title">Memory, Register &amp; I/O Instructions</text>
  
  <!-- Memory Hierarchy Pyramid -->
  <g class="pyramid" filter="url(#shadow)">
    <!-- Secondary Storage (bottom) -->
    <polygon points="70,220 350,220 310,280 110,280" fill="url(#storageGrad)" stroke="#ccb366" stroke-width="1"/>
    <text x="210" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#666">Secondary Storage</text>
    
    <!-- Main Memory -->
    <polygon points="100,160 320,160 290,220 130,220" fill="url(#memGrad)" stroke="#6680cc" stroke-width="1"/>
    <text x="210" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#444">Main Memory</text>
    
    <!-- Cache -->
    <polygon points="140,110 280,110 260,160 160,160" fill="url(#cacheGrad)" stroke="#4d9952" stroke-width="1"/>
    <text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#366">Cache</text>
    
    <!-- CPU (top) -->
    <polygon points="170,70 250,70 240,110 180,110" fill="url(#cpuGrad)" stroke="#cc4040" stroke-width="1"/>
    <text x="210" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#644">CPU</text>
  </g>
  
  <!-- Arrows showing data flow -->
  <g class="arrow" stroke="#888" fill="none">
    <path d="M210,280 L210,310" marker-end="url(#arrowhead)"/>
    <path d="M210,110 L210,60" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#888"/>
    </marker>
  </defs>
  
  <!-- Memory Instructions Box -->
  <g class="section-1" filter="url(#shadow)">
    <rect x="10" y="310" width="120" height="85" fill="#fff" stroke="#80b3ff" stroke-width="2" rx="5"/>
    <text x="70" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#446">Memory</text>
    <text x="70" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">LOAD</text>
    <text x="70" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">STORE</text>
    <text x="70" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">MOVE</text>
    <text x="70" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">Memory↔Register</text>
  </g>
  
  <!-- Register Instructions Box -->
  <g class="section-2" filter="url(#shadow)">
    <rect x="150" y="310" width="120" height="85" fill="#fff" stroke="#4d9952" stroke-width="2" rx="5"/>
    <text x="210" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#363">Register</text>
    <text x="210" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">ADD/SUB</text>
    <text x="210" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">MUL/DIV</text>
    <text x="210" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">AND/OR/NOT</text>
    <text x="210" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">Register Operations</text>
  </g>
  
  <!-- I/O Instructions Box -->
  <g class="section-3" filter="url(#shadow)">
    <rect x="290" y="310" width="120" height="85" fill="#fff" stroke="#b366ff" stroke-width="2" rx="5"/>
    <text x="350" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#636">I/O</text>
    <text x="350" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">IN</text>
    <text x="350" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">OUT</text>
    <text x="350" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">READ/WRITE</text>
    <text x="350" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">CPU↔Devices</text>
  </g>
  
  <!-- Connection arrows between sections -->
  <g stroke="#aaa" stroke-width="1.5" fill="none" class="arrow">
    <path d="M130,352 L150,352"/>
    <path d="M270,352 L290,352"/>
  </g>
  
  <!-- CPU to Memory arrow -->
  <g stroke="#cc4040" stroke-width="2" fill="none" class="arrow">
    <path d="M210,70 L210,50 L70,310" stroke-dasharray="4,2"/>
    <path d="M210,70 L210,50 L350,310" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Key concept highlight -->
  <g class="section-4" filter="url(#shadow)">
    <rect x="10" y="370" width="400" height="25" fill="#fffbe6" stroke="#ffe680" stroke-width="1" rx="3"/>
    <text x="20" y="385" font-family="Arial, sans-serif" font-size="10" fill="#887">Data flows through hierarchy: CPU → Cache → Memory → Storage</text>
  </g>
  
  <!-- Labels with data-narration attributes -->
  <g data-narration="Memory hierarchy shows the storage levels from fastest/smallest (CPU) to slowest/largest (Secondary Storage)">
  </g>
  <g data-narration="Memory instructions transfer data between registers and main memory">
  </g>
  <g data-narration="Register instructions perform arithmetic and logical operations on data in CPU registers">
  </g>
  <g data-narration="I/O instructions enable communication between CPU and external devices like keyboard, display">
  </g>
</svg>