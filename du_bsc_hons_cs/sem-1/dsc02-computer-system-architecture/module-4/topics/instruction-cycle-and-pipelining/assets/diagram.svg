<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="instruction-cycle-and-pipelining" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fetchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffdfba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffbf80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="execGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80ff80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80bfff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowArrow {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: Arial, sans-serif; }
    .stage-box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .stage-box:nth-child(1) { animation-delay: 0.2s; }
    .stage-box:nth-child(2) { animation-delay: 0.35s; }
    .stage-box:nth-child(3) { animation-delay: 0.5s; }
    .stage-box:nth-child(4) { animation-delay: 0.65s; }
    .stage-box:nth-child(5) { animation-delay: 0.8s; }
    .pipeline-row { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    .pipeline-row:nth-of-type(1) { animation-delay: 0.4s; }
    .pipeline-row:nth-of-type(2) { animation-delay: 0.6s; }
    .pipeline-row:nth-of-type(3) { animation-delay: 0.8s; }
    .pipeline-row:nth-of-type(4) { animation-delay: 1s; }
    .concept-box { animation: fadeIn 0.7s ease-out forwards; opacity: 0; }
    .arrow-line { animation: flowArrow 2s linear infinite; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title" data-narration="Title: Instruction Cycle and Pipelining - the fundamental process of how computers execute instructions">Instruction Cycle &amp; Pipelining</text>
  
  <!-- Left Section: Instruction Cycle Stages -->
  <g data-narration="The five stages of the instruction cycle: Fetch, Decode, Execute, Memory Access, and Write Back">
    <text x="130" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#34495e" data-narration="Instruction Cycle label">Instruction Cycle</text>
    
    <!-- Stage boxes -->
    <g class="stage-box" filter="url(#shadow)">
      <rect x="55" y="70" width="70" height="45" rx="8" fill="url(#fetchGrad)" stroke="#e74c3c" stroke-width="1.5"/>
      <text x="90" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Fetch</text>
      <text x="90" y="103" text-anchor="middle" font-size="9" fill="#c0392b">Instruction</text>
    </g>
    
    <g class="stage-box" filter="url(#shadow)">
      <rect x="145" y="70" width="70" height="45" rx="8" fill="url(#decodeGrad)" stroke="#e67e22" stroke-width="1.5"/>
      <text x="180" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#d35400">Decode</text>
      <text x="180" y="103" text-anchor="middle" font-size="9" fill="#d35400">Interpret</text>
    </g>
    
    <g class="stage-box" filter="url(#shadow)">
      <rect x="55" y="130" width="70" height="45" rx="8" fill="url(#execGrad)" stroke="#f1c40f" stroke-width="1.5"/>
      <text x="90" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a7d0a">Execute</text>
      <text x="90" y="163" text-anchor="middle" font-size="9" fill="#9a7d0a">ALU Ops</text>
    </g>
    
    <g class="stage-box" filter="url(#shadow)">
      <rect x="145" y="130" width="70" height="45" rx="8" fill="url(#memGrad)" stroke="#27ae60" stroke-width="1.5"/>
      <text x="180" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">Mem Access</text>
      <text x="180" y="163" text-anchor="middle" font-size="9" fill="#1e8449">Load/Store</text>
    </g>
    
    <g class="stage-box" filter="url(#shadow)">
      <rect x="100" y="190" width="70" height="45" rx="8" fill="url(#wbGrad)" stroke="#3498db" stroke-width="1.5"/>
      <text x="135" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">Write Back</text>
      <text x="135" y="223" text-anchor="middle" font-size="9" fill="#2980b9">Update Reg</text>
    </g>
    
    <!-- Arrows between stages -->
    <path d="M125 85 L145 85" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
    <path d="M125 115 L125 130" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
    <path d="M125 175 L145 175" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
    <path d="M180 115 L180 130" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
    <path d="M135 235 L135 250 L100 250 L100 235" stroke="#7f8c8d" stroke-width="1.5" fill="none" class="arrow-line"/>
    <path d="M135 235 L135 250 L170 250 L170 235" stroke="#7f8c8d" stroke-width="1.5" fill="none" class="arrow-line"/>
    
    <!-- Arrow marker -->
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
      </marker>
    </defs>
  </g>
  
  <!-- Right Section: Pipelining -->
  <g data-narration="Pipelining visualization showing how multiple instructions execute simultaneously in different stages">
    <text x="320" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#34495e" data-narration="Pipelining label">Pipelining</text>
    <text x="320" y="73" text-anchor="middle" font-size="9" fill="#7f8c8d" data-narration="Concurrent execution">Concurrent Stages</text>
    
    <!-- Pipeline header -->
    <rect x="245" y="82" width="150" height="18" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="260" y="95" font-size="9" fill="#7f8c8d">F</text>
    <text x="285" y="95" font-size="9" fill="#7f8c8d">D</text>
    <text x="310" y="95" font-size="9" fill="#7f8c8d">E</text>
    <text x="335" y="95" font-size="9" fill="#7f8c8d">M</text>
    <text x="360" y="95" font-size="9" fill="#7f8c8d">W</text>
    
    <!-- Pipeline rows -->
    <g class="pipeline-row" filter="url(#shadow)">
      <text x="248" y="113" font-size="9" font-weight="bold" fill="#c0392b">I1</text>
      <rect x="260" y="103" width="22" height="14" rx="3" fill="url(#fetchGrad)"/>
      <rect x="283" y="103" width="22" height="14" rx="3" fill="url(#decodeGrad)"/>
      <rect x="306" y="103" width="22" height="14" rx="3" fill="url(#execGrad)"/>
      <rect x="329" y="103" width="22" height="14" rx="3" fill="url(#memGrad)"/>
      <rect x="352" y="103" width="22" height="14" rx="3" fill="url(#wbGrad)"/>
    </g>
    
    <g class="pipeline-row" filter="url(#shadow)">
      <text x="248" y="133" font-size="9" font-weight="bold" fill="#c0392b">I2</text>
      <rect x="260" y="123" width="22" height="14" rx="3" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="283" y="123" width="22" height="14" rx="3" fill="url(#fetchGrad)"/>
      <rect x="306" y="123" width="22" height="14" rx="3" fill="url(#decodeGrad)"/>
      <rect x="329" y="123" width="22" height="14" rx="3" fill="url(#execGrad)"/>
      <rect x="352" y="123" width="22" height="14" rx="3" fill="url(#memGrad)"/>
    </g>
    
    <g class="pipeline-row" filter="url(#shadow)">
      <text x="248" y="153" font-size="9" font-weight="bold" fill="#c0392b">I3</text>
      <rect x="260" y="143" width="22" height="14" rx="3" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="283" y="143" width="22" height="14" rx="3" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="306" y="143" width="22" height="14" rx="3" fill="url(#fetchGrad)"/>
      <rect x="329" y="143" width="22" height="14" rx="3" fill="url(#decodeGrad)"/>
      <rect x="352" y="143" width="22" height="14" rx="3" fill="url(#execGrad)"/>
    </g>
    
    <g class="pipeline-row" filter="url(#shadow)">
      <text x="248" y="173" font-size="9" font-weight="bold" fill="#c0392b">I4</text>
      <rect x="260" y="163" width="22" height="14" rx="3" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="283" y="163" width="22" height="14" rx="3" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="306" y="163" width="22" height="14" rx="3" fill="#ecf0f1" stroke="#bdc3c7"/>
      <rect x="329" y="163" width="22" height="14" rx="3" fill="url(#fetchGrad)"/>
      <rect x="352" y="163" width="22" height="14" rx="3" fill="url(#decodeGrad)"/>
    </g>
  </g>
  
  <!-- Key Concept Box -->
  <g class="concept-box" data-narration="Key benefit of pipelining: improved throughput - completing one instruction per clock cycle after pipeline is full" style="animation-delay: 1.2s;">
    <rect x="245" y="195" width="150" height="55" rx="8" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="320" y="212" text-anchor="middle" font-size="11" font-weight="bold" fill="#d68910">Key Benefit</text>
    <text x="255" y="228" font-size="10" fill="#7d6608">• Improved Performance</text>
    <text x="255" y="241" font-size="10" fill="#7d6608">• Higher Throughput</text>
  </g>
  
  <!-- Connection arrow between sections -->
  <path d="M225 200 L245 200" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" fill="none" class="arrow-line" data-narration="Arrow showing how pipelining improves the cycle"/>
  <polygon points="240,195 250,200 240,205" fill="#e74c3c"/>
  
  <!-- Bottom info section -->
  <g class="concept-box" data-narration="Summary: The instruction cycle has 5 stages, and pipelining allows overlapping execution for better performance" style="animation-delay: 1.4s;">
    <rect x="30" y="260" width="360" height="50" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Instruction Cycle = Fetch → Decode → Execute → Mem → Write Back</text>
    <text x="210" y="297" text-anchor="middle" font-size="11" fill="#5d6d7e">Pipelining: Multiple instructions in different stages simultaneously</text>
  </g>
  
  <!-- Legend -->
  <g class="concept-box" style="animation-delay: 1.6s;">
    <rect x="300" y="320" width="100" height="70" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <text x="350" y="337" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Legend</text>
    <circle cx="315" cy="352" r="5" fill="#ffb3ba" stroke="#ff8080"/>
    <text x="325" y="356" font-size="9" fill="#34495e">Fetch</text>
    <circle cx="315" cy="368" r="5" fill="#ffffba" stroke="#ffff80"/>
    <text x="325" y="372" font-size="9" fill="#34495e">Execute</text>
    <circle cx="315" cy="380" r="5" fill="#bae1ff" stroke="#80bfff"/>
    <text x="325" y="384" font-size="9" fill="#34495e">W-Back</text>
  </g>
  
  <!-- Pulsing highlight on pipeline -->
  <rect x="260" y="103" width="114" height="14" rx="3" fill="none" stroke="#e74c3c" stroke-width="2" class="pulse-anim" style="animation-delay: 2s;" data-narration="Animation showing continuous pipeline flow"/>
</svg>