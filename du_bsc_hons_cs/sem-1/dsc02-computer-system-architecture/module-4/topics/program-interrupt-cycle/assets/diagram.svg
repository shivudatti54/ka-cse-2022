<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="program-interrupt-cycle" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e6fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ec5db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5e8b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d890;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbbf9e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c49edb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8eb8d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowDraw {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideInDown 0.6s ease-out forwards; font-family: Arial, sans-serif; font-weight: bold; fill: #2c3e50; }
    .box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .box1 { animation: fadeIn 0.5s ease-out 0.3s forwards; opacity: 0; }
    .box2 { animation: fadeIn 0.5s ease-out 0.6s forwards; opacity: 0; }
    .box3 { animation: fadeIn 0.5s ease-out 0.9s forwards; opacity: 0; }
    .box4 { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
    .box5 { animation: fadeIn 0.5s ease-out 1.5s forwards; opacity: 0; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; stroke-dasharray: 5,5; animation: arrowDraw 0.5s linear forwards; }
    .connector { animation: fadeIn 0.3s ease-out forwards; opacity: 0; }
    .pulse:hover { animation: pulse 0.6s ease-in-out infinite; cursor: pointer; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20">Program Interrupt Cycle</text>
  <text x="210" y="50" text-anchor="middle" class="subtitle">CPU Interrupt Handling Flow</text>
  
  <!-- Step 1: Interrupt Detection -->
  <g class="box1" data-narration="The CPU detects an interrupt signal from a device or exception, temporarily suspending the current instruction execution.">
    <rect x="40" y="70" width="150" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)" class="pulse"/>
    <text x="115" y="88" text-anchor="middle" class="label">1. Interrupt Detection</text>
    <text x="115" y="108" text-anchor="middle" class="detail">CPU detects interrupt</text>
    <text x="115" y="120" text-anchor="middle" class="detail">signal or exception</text>
  </g>
  
  <!-- Arrow -->
  <line x1="115" y1="125" x2="115" y2="145" class="arrow" data-narration=""/>
  
  <!-- Step 2: Context Switching -->
  <g class="box2" data-narration="The CPU saves the current program state including registers, program counter, and status flags to the stack or control registers.">
    <rect x="40" y="150" width="150" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" class="pulse"/>
    <text x="115" y="168" text-anchor="middle" class="label">2. Context Switching</text>
    <text x="115" y="188" text-anchor="middle" class="detail">Save registers &amp; PC</text>
    <text x="115" y="200" text-anchor="middle" class="detail">to stack/memory</text>
  </g>
  
  <!-- Arrow -->
  <line x1="115" y1="205" x2="115" y2="225" class="arrow" data-narration=""/>
  
  <!-- Step 3: ISR Execution -->
  <g class="box3" data-narration="The CPU executes the Interrupt Service Routine (ISR), a specialized handler that addresses the specific interrupt type.">
    <rect x="40" y="230" width="150" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)" class="pulse"/>
    <text x="115" y="248" text-anchor="middle" class="label">3. ISR Execution</text>
    <text x="115" y="268" text-anchor="middle" class="detail">Execute Interrupt</text>
    <text x="115" y="280" text-anchor="middle" class="detail">Service Routine (ISR)</text>
  </g>
  
  <!-- Arrow -->
  <line x1="115" y1="285" x2="115" y2="305" class="arrow" data-narration=""/>
  
  <!-- Step 4: Context Restoration -->
  <g class="box4" data-narration="After ISR completes, the CPU restores the previously saved program state from memory.">
    <rect x="40" y="310" width="150" height="55" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)" class="pulse"/>
    <text x="115" y="328" text-anchor="middle" class="label">4. Context Restoration</text>
    <text x="115" y="348" text-anchor="middle" class="detail">Restore saved state</text>
    <text x="115" y="360" text-anchor="middle" class="detail">from stack/memory</text>
  </g>
  
  <!-- Right side: Key Concepts -->
  <g class="box5" data-narration="The interrupted program resumes execution from exactly where it was paused.">
    <rect x="210" y="70" width="180" height="55" rx="8" fill="url(#boxGradient5)" filter="url(#shadow)" class="pulse"/>
    <text x="300" y="88" text-anchor="middle" class="label">5. Return to Program</text>
    <text x="300" y="108" text-anchor="middle" class="detail">Resume execution</text>
    <text x="300" y="120" text-anchor="middle" class="detail">from interruption point</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="box" data-narration="Interrupts can be maskable (can be ignored) or non-maskable (must be handled). Exceptions include division by zero and page faults.">
    <rect x="210" y="140" width="180" height="90" rx="8" fill="#f8f8f8" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
    <text x="300" y="158" text-anchor="middle" class="label" font-size="13">Key Concepts</text>
    <line x1="220" y1="165" x2="380" y2="165" stroke="#ddd" stroke-width="1"/>
    <text x="220" y="182" class="detail" font-size="11">• Maskable: Can be disabled</text>
    <text x="220" y="196" class="detail" font-size="11">• Non-Maskable: Must handle</text>
    <text x="220" y="210" class="detail" font-size="11">• Exceptions: CPU internal</text>
    <text x="220" y="224" class="detail" font-size="11">• ISR: Interrupt Service Routine</text>
  </g>
  
  <!-- Flow indicator arrow from right box -->
  <path d="M190 97 L205 97" stroke="#666" stroke-width="2" fill="none" class="connector" style="animation-delay: 1.8s"/>
  <polygon points="205,97 198,93 198,101" fill="#666" class="connector" style="animation-delay: 1.8s"/>
  
  <!-- Bottom indicator -->
  <g class="box" style="animation-delay: 2s" data-narration="This cycle ensures the CPU can respond to time-sensitive events while maintaining program state integrity.">
    <rect x="210" y="245" width="180" height="50" rx="8" fill="#fff5e6" stroke="#e6c9a8" stroke-width="1" filter="url(#shadow)"/>
    <text x="300" y="262" text-anchor="middle" class="label" font-size="12">Why It Matters</text>
    <text x="300" y="278" text-anchor="middle" class="detail" font-size="10">Enables responsive systems</text>
    <text x="300" y="290" text-anchor="middle" class="detail" font-size="10">while preserving program state</text>
  </g>
  
  <!-- Circular indicator showing cycle -->
  <g class="box" style="animation-delay: 2.2s" data-narration="The interrupt cycle forms a continuous loop as the CPU handles multiple interrupts over time.">
    <circle cx="300" cy="330" r="35" fill="#e8f4f8" stroke="#b8d4e3" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="300" y="325" text-anchor="middle" class="label" font-size="11">Interrupt</text>
    <text x="300" y="340" text-anchor="middle" class="label" font-size="11">Cycle</text>
    <path d="M300 360 L300 365 L310 355" stroke="#666" stroke-width="2" fill="none" transform="rotate(45, 300, 355)"/>
  </g>
  
  <!-- Legend/Type indicators -->
  <g class="box" style="animation-delay: 2.4s">
    <rect x="40" y="365" width="120" height="25" rx="4" fill="#e8f8e8" stroke="#b8d890" stroke-width="1"/>
    <text x="50" y="380" class="detail" font-size="10">Hardware Interrupt</text>
    <rect x="170" y="365" width="120" height="25" rx="4" fill="#fff8e8" stroke="#e8d890" stroke-width="1"/>
    <text x="180" y="380" class="detail" font-size="10">Software Exception</text>
  </g>
</svg>