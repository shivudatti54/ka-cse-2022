<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="bus-organization" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="busGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6bb3f0"/>
      <stop offset="100%" style="stop-color:#4a90d9"/>
    </linearGradient>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3a0"/>
      <stop offset="100%" style="stop-color:#4caf7d"/>
    </linearGradient>
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0b775"/>
      <stop offset="100%" style="stop-color:#e09a4d"/>
    </linearGradient>
    <linearGradient id="ioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a5d4"/>
      <stop offset="100%" style="stop-color:#d47eb3"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a9bd4"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes busPulse {
      0%, 100% { stroke-width: 4; }
      50% { stroke-width: 6; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c5aa0; }
    .section-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #3d6a99; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .concept-box { fill: #fff; stroke: #b8d4e8; stroke-width: 1; rx: 8; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .bus-anim { animation: busPulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Bus Organization</text>
  
  <!-- Main Bus Diagram Section -->
  <g class="slide-up" style="animation-delay: 0.2s;">
    <!-- Bus Line -->
    <line x1="60" y1="180" x2="360" y2="180" stroke="url(#busGradient)" stroke-width="5" class="bus-anim" stroke-linecap="round"/>
    
    <!-- CPU -->
    <g class="pulse" style="animation-delay: 0.5s;">
      <rect x="70" y="90" width="70" height="50" rx="8" fill="url(#cpuGradient)" stroke="#3d9d6a" stroke-width="2"/>
      <text x="105" y="118" text-anchor="middle" class="label" fill="#fff" font-weight="bold">CPU</text>
    </g>
    
    <!-- Memory -->
    <g class="pulse" style="animation-delay: 0.7s;">
      <rect x="175" y="90" width="70" height="50" rx="8" fill="url(#memoryGradient)" stroke="#c8832d" stroke-width="2"/>
      <text x="210" y="118" text-anchor="middle" class="label" fill="#fff" font-weight="bold">Memory</text>
    </g>
    
    <!-- I/O Devices -->
    <g class="pulse" style="animation-delay: 0.9s;">
      <rect x="280" y="90" width="70" height="50" rx="8" fill="url(#ioGradient)" stroke="#b85a94" stroke-width="2"/>
      <text x="315" y="113" text-anchor="middle" class="label" fill="#fff" font-weight="bold">I/O</text>
      <text x="315" y="127" text-anchor="middle" class="detail" fill="#fff" font-size="10">Devices</text>
    </g>
    
    <!-- Vertical connections to bus -->
    <line x1="105" y1="140" x2="105" y2="175" stroke="#5a9bd4" stroke-width="2"/>
    <line x1="210" y1="140" x2="210" y2="175" stroke="#5a9bd4" stroke-width="2"/>
    <line x1="315" y1="140" x2="315" y2="175" stroke="#5a9bd4" stroke-width="2"/>
    
    <!-- Data flow arrows -->
    <g class="fade-in" style="animation-delay: 1.2s;">
      <path d="M 130 165 L 180 165" stroke="#5a9bd4" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
      <path d="M 230 165 L 280 165" stroke="#5a9bd4" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
    </g>
  </g>
  
  <!-- Bus Types Section -->
  <g class="slide-left" style="animation-delay: 0.4s;" data-narration="Three main bus organization types: Single Bus (shared pathway), Multiple Bus (parallel pathways), Hierarchical Bus (tiered structure)">
    <text x="30" y="230" class="section-title">Bus Types</text>
    
    <!-- Single Bus -->
    <rect x="30" y="245" width="110" height="35" rx="5" class="concept-box"/>
    <text x="85" y="260" text-anchor="middle" class="label" font-weight="bold">Single Bus</text>
    <text x="85" y="272" text-anchor="middle" class="detail">One shared path</text>
    <line x1="45" y1="285" x2="125" y2="285" stroke="#6bb3f0" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Multiple Bus -->
    <rect x="155" y="245" width="110" height="35" rx="5" class="concept-box"/>
    <text x="210" y="260" text-anchor="middle" class="label" font-weight="bold">Multiple Bus</text>
    <text x="210" y="272" text-anchor="middle" class="detail">Parallel paths</text>
    <line x1="170" y1="282" x2="195" y2="282" stroke="#6bb3f0" stroke-width="2"/>
    <line x1="225" y1="282" x2="250" y2="282" stroke="#6bb3f0" stroke-width="2"/>
    
    <!-- Hierarchical Bus -->
    <rect x="280" y="245" width="110" height="35" rx="5" class="concept-box"/>
    <text x="335" y="260" text-anchor="middle" class="label" font-weight="bold">Hierarchical</text>
    <text x="335" y="272" text-anchor="middle" class="detail">Tiered structure</text>
    <line x1="335" y1="280" x2="335" y2="295" stroke="#6bb3f0" stroke-width="2"/>
    <line x1="300" y1="295" x2="370" y2="295" stroke="#6bb3f0" stroke-width="2"/>
  </g>
  
  <!-- Bus Arbitration Section -->
  <g class="slide-right" style="animation-delay: 0.6s;" data-narration="Bus Arbitration resolves conflicts when multiple components access the bus simultaneously">
    <text x="30" y="315" class="section-title">Bus Arbitration</text>
    
    <!-- Centralized -->
    <rect x="30" y="330" width="170" height="45" rx="6" class="concept-box"/>
    <text x="115" y="348" text-anchor="middle" class="label" font-weight="bold">Centralized</text>
    <text x="115" y="362" text-anchor="middle" class="detail">One arbiter controls bus</text>
    <circle cx="115" cy="365" r="8" fill="#e8a5d4" stroke="#b85a94" stroke-width="1.5"/>
    <text x="115" y="369" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">A</text>
    
    <!-- Distributed -->
    <rect x="220" y="330" width="170" height="45" rx="6" class="concept-box"/>
    <text x="305" y="348" text-anchor="middle" class="label" font-weight="bold">Distributed</text>
    <text x="305" y="362" text-anchor="middle" class="detail">Multiple arbiters share control</text>
    <circle cx="280" cy="365" r="6" fill="#7dd3a0" stroke="#4caf7d" stroke-width="1.5"/>
    <circle cx="305" cy="365" r="6" fill="#7dd3a0" stroke="#4caf7d" stroke-width="1.5"/>
    <circle cx="330" cy="365" r="6" fill="#7dd3a0" stroke="#4caf7d" stroke-width="1.5"/>
  </g>
  
  <!-- Key Concepts Summary -->
  <g class="fade-in" style="animation-delay: 0.8s;" data-narration="Key elements: Data bus (transfers data), Address bus (specifies locations), Control bus (manages operations)">
    <text x="30" y="385" class="section-title">Bus Signals</text>
    
    <rect x="100" y="370" width="90" height="22" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
    <text x="145" y="384" text-anchor="middle" class="detail" font-weight="bold">Data Bus</text>
    
    <rect x="200" y="370" width="90" height="22" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
    <text x="245" y="384" text-anchor="middle" class="detail" font-weight="bold">Address Bus</text>
    
    <rect x="300" y="370" width="90" height="22" rx="4" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
    <text x="345" y="384" text-anchor="middle" class="detail" font-weight="bold">Control Bus</text>
  </g>
</svg>