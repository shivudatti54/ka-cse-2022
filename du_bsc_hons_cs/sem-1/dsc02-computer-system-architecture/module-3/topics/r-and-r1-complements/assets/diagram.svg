<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="r-and-r1-complements">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8e8f8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe0cc"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f7ff"/>
      <stop offset="100%" style="stop-color:#cceeff"/>
    </linearGradient>
    <linearGradient id="exampleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fff0"/>
      <stop offset="100%" style="stop-color:#d4f0d4"/>
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes arrowPulse {
        0%, 100% { stroke-width: 2; }
        50% { stroke-width: 3; }
      }
      .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
      .label-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #444; }
      .detail-text { font-family: Arial, sans-serif; font-size: 13px; fill: #555; }
      .binary-text { font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #222; }
      .formula-text { font-family: 'Courier New', monospace; font-size: 14px; fill: #333; }
      .box-rect { rx: 8; ry: 8; stroke: #aaa; stroke-width: 1; }
      .section-box { animation: fadeIn 0.8s ease-out forwards; }
      .title-anim { animation: slideInUp 0.6s ease-out forwards; }
      .box1-anim { animation: slideInLeft 0.7s ease-out 0.2s forwards; opacity: 0; }
      .box2-anim { animation: slideInRight 0.7s ease-out 0.4s forwards; opacity: 0; }
      .example-anim { animation: slideInUp 0.7s ease-out 0.6s forwards; opacity: 0; }
      .arrow-anim { animation: arrowPulse 2s ease-in-out infinite; }
      .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
      .highlight { fill: #ff6b6b; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="title-anim" data-narration="Title section introducing R and R-1 complements topic">
    <text x="210" y="30" text-anchor="middle" class="title-text">R and R-1 Complements</text>
    <line x1="60" y1="42" x2="360" y2="42" stroke="#888" stroke-width="1"/>
  </g>
  
  <!-- Box 1: R's Complement -->
  <g class="box1-anim" data-narration="R's complement definition: flip all bits then add 1">
    <rect x="20" y="60" width="180" height="120" fill="url(#boxGradient1)" class="box-rect"/>
    <text x="110" y="82" text-anchor="middle" class="label-text">R's Complement</text>
    <text x="30" y="105" class="detail-text">Formula:</text>
    <text x="30" y="122" class="formula-text">(NOT x) + 1</text>
    <text x="30" y="145" class="detail-text">Steps:</text>
    <text x="30" y="162" class="detail-text">1. Flip all bits (0↔1)</text>
    <text x="30" y="176" class="detail-text">2. Add 1 to result</text>
  </g>
  
  <!-- Box 2: (R-1)'s Complement -->
  <g class="box2-anim" data-narration="R-1 complement definition: just flip all bits">
    <rect x="220" y="60" width="180" height="120" fill="url(#boxGradient2)" class="box-rect"/>
    <text x="310" y="82" text-anchor="middle" class="label-text">(R-1)'s Complement</text>
    <text x="230" y="105" class="detail-text">Formula:</text>
    <text x="230" y="122" class="formula-text">NOT x</text>
    <text x="230" y="145" class="detail-text">Steps:</text>
    <text x="230" y="162" class="detail-text">1. Flip all bits (0↔1)</text>
    <text x="230" y="176" class="detail-text">2. No addition needed</text>
  </g>
  
  <!-- Arrow between boxes -->
  <g class="arrow-anim">
    <path d="M 200 120 L 220 120" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Example Section -->
  <g class="example-anim" data-narration="Example: Finding R's complement of binary 1010">
    <rect x="20" y="195" width="380" height="190" fill="url(#exampleGradient)" class="box-rect"/>
    <text x="210" y="218" text-anchor="middle" class="label-text">Example: R's Complement of 1010</text>
    
    <!-- Step 1 -->
    <text x="40" y="248" class="detail-text" style="font-weight:bold;">Step 1: Flip bits</text>
    <text x="40" y="275" class="binary-text">Original: </text>
    <text x="130" y="275" class="binary-text highlight">1 0 1 0</text>
    
    <!-- Arrow down -->
    <path d="M 150 285 L 150 305" stroke="#444" stroke-width="1.5" fill="none"/>
    <polygon points="145,300 150,310 155,300" fill="#444"/>
    
    <!-- Flipped -->
    <text x="40" y="320" class="binary-text">Flipped : </text>
    <text x="130" y="320" class="binary-text">0 1 0 1</text>
    
    <!-- Step 2 -->
    <text x="240" y="248" class="detail-text" style="font-weight:bold;">Step 2: Add 1</text>
    <text x="240" y="275" class="binary-text">  0 1 0 1</text>
    <text x="240" y="290" class="binary-text">+    1</text>
    <line x1="240" y1="295" x2="290" y2="295" stroke="#222" stroke-width="1"/>
    <text x="240" y="315" class="binary-text">  0 1 1 0</text>
    
    <!-- Result Box -->
    <rect x="150" y="335" width="120" height="35" fill="#ff9999" rx="5" ry="5" class="pulse-element"/>
    <text x="210" y="357" text-anchor="middle" class="label-text" style="font-size:15px;">Result: 0110</text>
  </g>
  
  <!-- Visual bit representation -->
  <g class="box1-anim" data-narration="Visual representation of bit flipping">
    <text x="210" y="388" text-anchor="middle" class="detail-text" style="font-size:11px;">Binary digits: 0 and 1 only | R's = Two's Complement for base-2</text>
  </g>
</svg>