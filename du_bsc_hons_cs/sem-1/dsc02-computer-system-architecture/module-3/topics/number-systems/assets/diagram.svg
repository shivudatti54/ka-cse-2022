<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="number-systems">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="binaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e6b8"/>
      <stop offset="100%" style="stop-color:#90c890"/>
    </linearGradient>
    <linearGradient id="octalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#88b8d8"/>
    </linearGradient>
    <linearGradient id="decimalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e6b8"/>
      <stop offset="100%" style="stop-color:#d8d088"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e8"/>
      <stop offset="100%" style="stop-color:#b888d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out forwards; }
    .box-binary { animation: slideInUp 0.8s ease-out 0.2s forwards; opacity: 0; }
    .box-octal { animation: slideInUp 0.8s ease-out 0.4s forwards; opacity: 0; }
    .box-decimal { animation: slideInUp 0.8s ease-out 0.6s forwards; opacity: 0; }
    .box-hex { animation: slideInUp 0.8s ease-out 0.8s forwards; opacity: 0; }
    .arrow { animation: fadeIn 1s ease-out 1s forwards; opacity: 0; }
    .digit { animation: pulse 2s ease-in-out infinite; }
    .digit:nth-child(odd) { animation-delay: 0.5s; }
    .base-label { animation: float 3s ease-in-out infinite; }
    .legend { animation: slideInLeft 0.8s ease-out 1.2s forwards; opacity: 0; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Number Systems</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="title">Foundations of Computer Science</text>

  <!-- Binary Section -->
  <g class="box-binary" data-narration="Binary (Base-2): Uses digits 0 and 1, fundamental to all digital systems">
    <rect x="20" y="70" width="85" height="130" rx="8" fill="url(#binaryGrad)" filter="url(#shadow)"/>
    <text x="62" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a4d1a">BINARY</text>
    <text x="62" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a4d1a">Base-2</text>
    <text x="62" y="145" text-anchor="middle" font-family="Courier New, monospace" font-size="20" font-weight="bold" fill="#1a5d1a" class="digit">0</text>
    <text x="62" y="175" text-anchor="middle" font-family="Courier New, monospace" font-size="20" font-weight="bold" fill="#1a5d1a" class="digit">1</text>
    <text x="62" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d5a2d">bits</text>
  </g>

  <!-- Octal Section -->
  <g class="box-octal" data-narration="Octal (Base-8): Uses digits 0-7, easy conversion from binary">
    <rect x="115" y="70" width="85" height="130" rx="8" fill="url(#octalGrad)" filter="url(#shadow)"/>
    <text x="157" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a3d5c">OCTAL</text>
    <text x="157" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a3d5c">Base-8</text>
    <text x="157" y="145" text-anchor="middle" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1a4d6d" class="digit">0 1 2 3</text>
    <text x="157" y="168" text-anchor="middle" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#1a4d6d" class="digit">4 5 6 7</text>
    <text x="157" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d5a7d">8 digits</text>
  </g>

  <!-- Decimal Section -->
  <g class="box-decimal" data-narration="Decimal (Base-10): Uses digits 0-9, our everyday number system">
    <rect x="210" y="70" width="85" height="130" rx="8" fill="url(#decimalGrad)" filter="url(#shadow)"/>
    <text x="252" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4d4d1a">DECIMAL</text>
    <text x="252" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4d4d1a">Base-10</text>
    <text x="252" y="140" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#5d5d1a" class="digit">0 1 2 3 4</text>
    <text x="252" y="158" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#5d5d1a" class="digit">5 6 7 8 9</text>
    <text x="252" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6d6d2a">10 digits</text>
  </g>

  <!-- Hexadecimal Section -->
  <g class="box-hex" data-narration="Hexadecimal (Base-16): Uses 0-9 and A-F, compact binary representation">
    <rect x="305" y="70" width="85" height="130" rx="8" fill="url(#hexGrad)" filter="url(#shadow)"/>
    <text x="347" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3d1a5c">HEX</text>
    <text x="347" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3d1a5c">Base-16</text>
    <text x="347" y="140" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#4d2d6d" class="digit">0-9</text>
    <text x="347" y="160" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#4d2d6d" class="digit">A B C D</text>
    <text x="347" y="178" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#4d2d6d" class="digit">E F</text>
  </g>

  <!-- Relationship Arrows -->
  <g class="arrow" data-narration="Arrows show conversion relationships between number systems">
    <path d="M105 135 L115 135" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M200 135 L210 135" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <path d="M295 135 L305 135" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <text x="160" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Conversions</text>
  </g>

  <!-- Example Box -->
  <g class="legend" data-narration="Example showing number 10 in all four number systems">
    <rect x="20" y="215" width="370" height="70" rx="8" fill="#ffffff" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="205" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Number 10 in Each System</text>
    
    <text x="55" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a4d1a">Binary</text>
    <text x="55" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1a5d1a">1010</text>
    
    <text x="127" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a3d5c">Octal</text>
    <text x="127" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1a4d6d">12</text>
    
    <text x="205" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4d4d1a">Decimal</text>
    <text x="205" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#5d5d1a">10</text>
    
    <text x="285" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3d1a5c">Hex</text>
    <text x="285" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#4d2d6d">A</text>
    
    <text x="355" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Base</text>
    <text x="355" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#7f8c8d">2ⁱ</text>
  </g>

  <!-- Base Powers Visualization -->
  <g class="legend" data-narration="Each digit position represents a power of the base">
    <rect x="20" y="295" width="370" height="45" rx="8" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <text x="205" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Position Values (Powers)</text>
    <text x="205" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">Binary: 2³ 2² 2¹ 2⁰ | Octal: 8³ 8² 8¹ 8⁰ | Decimal: 10³ 10² 10¹ 10⁰ | Hex: 16³ 16² 16¹ 16⁰</text>
  </g>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Decorative base labels with animation -->
  <text x="62" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60" class="base-label">base-2</text>
  <text x="157" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2980b9" class="base-label">base-8</text>
  <text x="252" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d4ac0d" class="base-label">base-10</text>
  <text x="347" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8e44ad" class="base-label">base-16</text>
</svg>