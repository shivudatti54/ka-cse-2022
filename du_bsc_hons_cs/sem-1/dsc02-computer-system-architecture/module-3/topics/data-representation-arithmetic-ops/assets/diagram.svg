<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="data-representation-arithmetic-ops">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="binaryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="numberGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa71;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="intGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b388ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="opGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8b94;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bitPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-box { animation: slideInUp 0.6s ease-out forwards; }
    .binary-section { animation: slideInLeft 0.7s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .number-section { animation: slideInRight 0.7s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .int-section { animation: slideInLeft 0.7s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .op-section { animation: slideInRight 0.7s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    .bit { animation: bitPulse 1.5s ease-in-out infinite; }
    .bit:nth-child(2) { animation-delay: 0.2s; }
    .bit:nth-child(3) { animation-delay: 0.4s; }
    .bit:nth-child(4) { animation-delay: 0.6s; }
    .symbol { animation: pulse 2s ease-in-out infinite; }
    .symbol:nth-child(2) { animation-delay: 0.3s; }
    .symbol:nth-child(3) { animation-delay: 0.6s; }
    .symbol:nth-child(4) { animation-delay: 0.9s; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Data Representation &amp; Arithmetic Ops</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#3498db" stroke-width="2" class="title" style="animation-delay: 0.3s" />
  
  <!-- Binary Number System Section -->
  <g class="binary-section" data-narration="The binary number system uses only two digits: 0 and 1, representing the on/off states of electronic switches in computers">
    <rect x="20" y="55" width="180" height="85" rx="8" fill="url(#binaryGradient)" filter="url(#shadow)" />
    <text x="110" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a5c3a">Binary System (Base-2)</text>
    <text x="30" y="92" font-family="Arial, sans-serif" font-size="12" fill="#1a5c3a">Digits: 0, 1</text>
    <text x="30" y="108" font-family="Arial, sans-serif" font-size="12" fill="#1a5c3a">Used in: computer circuits</text>
    <rect x="100" y="118" width="70" height="15" rx="3" fill="#1a5c3a" />
    <text class="bit" x="108" y="130" font-family="monospace" font-size="14" font-weight="bold" fill="white">1</text>
    <text class="bit" x="122" y="130" font-family="monospace" font-size="14" font-weight="bold" fill="#1a5c3a">0</text>
    <text class="bit" x="136" y="130" font-family="monospace" font-size="14" font-weight="bold" fill="#1a5c3a">1</text>
    <text class="bit" x="150" y="130" font-family="monospace" font-size="14" font-weight="bold" fill="#1a5c3a">0</text>
  </g>
  
  <!-- Number Systems Comparison -->
  <g class="number-section" data-narration="Three number systems are commonly used in computing: Binary (base-2), Octal (base-8), and Hexadecimal (base-16) for efficient binary data representation">
    <rect x="220" y="55" width="180" height="85" rx="8" fill="url(#numberGradient)" filter="url(#shadow)" />
    <text x="310" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b4513">Number Systems</text>
    <text x="230" y="92" font-family="Arial, sans-serif" font-size="12" fill="#8b4513">Binary: 0, 1</text>
    <text x="230" y="108" font-family="Arial, sans-serif" font-size="12" fill="#8b4513">Octal: 0-7</text>
    <text x="230" y="124" font-family="Arial, sans-serif" font-size="12" fill="#8b4513">Hex: 0-9, A-F</text>
    <text x="330" y="110" font-family="monospace" font-size="16" font-weight="bold" fill="#8b4513">1010₂</text>
    <text x="330" y="126" font-family="monospace" font-size="16" font-weight="bold" fill="#8b4513">12₈</text>
    <text x="360" y="126" font-family="monospace" font-size="16" font-weight="bold" fill="#8b4513">A₁₆</text>
  </g>
  
  <!-- Integer Representation Section -->
  <g class="int-section" data-narration="Integers can be represented using signed magnitude (sign bit + magnitude) or two's complement (allows efficient arithmetic operations)">
    <rect x="20" y="155" width="180" height="100" rx="8" fill="url(#intGradient)" filter="url(#shadow)" />
    <text x="110" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a148c">Integer Representation</text>
    <text x="30" y="192" font-family="Arial, sans-serif" font-size="11" fill="#4a148c">Signed Magnitude:</text>
    <text x="30" y="207" font-family="monospace" font-size="11" fill="#4a148c">[Sign][Magnitude]</text>
    <text x="30" y="222" font-family="monospace" font-size="11" fill="#4a148c">Example: 0101 = +5</text>
    <text x="30" y="240" font-family="Arial, sans-serif" font-size="11" fill="#4a148c">Two's Complement:</text>
    <text x="30" y="255" font-family="monospace" font-size="11" fill="#4a148c">Negation: invert + add 1</text>
  </g>
  
  <!-- Arithmetic Operations Section -->
  <g class="op-section" data-narration="The four fundamental arithmetic operations performed by computers: addition, subtraction, multiplication, and division">
    <rect x="220" y="155" width="180" height="100" rx="8" fill="url(#opGradient)" filter="url(#shadow)" />
    <text x="310" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#721c24">Arithmetic Operations</text>
    <g class="symbol">
      <circle cx="260" cy="200" r="12" fill="#721c24" />
      <text x="260" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">+</text>
    </g>
    <g class="symbol">
      <circle cx="295" cy="200" r="12" fill="#721c24" />
      <text x="295" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">−</text>
    </g>
    <g class="symbol">
      <circle cx="330" cy="200" r="12" fill="#721c24" />
      <text x="330" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">×</text>
    </g>
    <g class="symbol">
      <circle cx="365" cy="200" r="12" fill="#721c24" />
      <text x="365" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">÷</text>
    </g>
    <text x="310" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#721c24">Performed on binary data</text>
    <text x="310" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#721c24">in ALU (Arithmetic Logic Unit)</text>
  </g>
  
  <!-- Key Relationships Arrow Section -->
  <g data-narration="The diagram shows the flow from binary representation through number systems to arithmetic operations performed by the CPU">
    <rect x="20" y="270" width="380" height="50" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" />
    <text x="210" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Key Concepts Relationship</text>
    <text x="210" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Binary Data → Number Systems → Integer Formats → Arithmetic Operations</text>
    <!-- Arrow indicators -->
    <polygon points="80,305 90,300 90,310" fill="#3498db" />
    <polygon points="160,305 170,300 170,310" fill="#3498db" />
    <polygon points="250,305 260,300 260,310" fill="#3498db" />
    <polygon points="340,305 350,300 350,310" fill="#3498db" />
  </g>
  
  <!-- Bottom Info Box -->
  <g data-narration="Understanding these fundamental concepts is essential for computer programming and low-level system development">
    <rect x="20" y="335" width="380" height="50" rx="8" fill="#fff9e6" stroke="#f39c12" stroke-width="1" />
    <text x="210" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d68910">Educational Note</text>
    <text x="210" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7d6608">Data representation enables computers to store &amp; process numbers, characters, and other data types efficiently.</text>
  </g>
</svg>