<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="logic-gates-truth-tables">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b68ee;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: Arial, sans-serif; }
    .gate-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .gate-box:nth-child(1) { animation-delay: 0.2s; }
    .gate-box:nth-child(2) { animation-delay: 0.4s; }
    .gate-box:nth-child(3) { animation-delay: 0.6s; }
    .gate-box:nth-child(4) { animation-delay: 0.8s; }
    .gate-box:nth-child(5) { animation-delay: 1.0s; }
    .gate-box:nth-child(6) { animation-delay: 1.2s; }
    .gate-box:nth-child(7) { animation-delay: 1.4s; }
    .truth-table { animation: slideUp 0.5s ease-out forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#333">
    Logic Gates &amp; Truth Tables
  </text>
  
  <!-- AND Gate Section -->
  <g class="gate-box" data-narration="AND Gate: Output is 1 only when ALL inputs are 1">
    <rect x="10" y="50" width="120" height="55" rx="5" fill="#fff" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">AND</text>
    <text x="70" y="90" text-anchor="middle" font-size="10" fill="#666">A · B</text>
    <!-- Input lines -->
    <line x1="20" y1="65" x2="35" y2="65" stroke="#333" stroke-width="2"/>
    <line x1="20" y1="90" x2="35" y2="90" stroke="#333" stroke-width="2"/>
    <text x="15" y="68" font-size="10" fill="#666">A</text>
    <text x="15" y="93" font-size="10" fill="#666">B</text>
    <!-- Output line -->
    <line x1="105" y1="77" x2="120" y2="77" stroke="#333" stroke-width="2"/>
    <text x="125" y="80" font-size="10" fill="#666">Y</text>
  </g>
  
  <!-- OR Gate Section -->
  <g class="gate-box" data-narration="OR Gate: Output is 1 when ANY input is 1">
    <rect x="150" y="50" width="120" height="55" rx="5" fill="#fff" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
    <text x="220" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">OR</text>
    <text x="220" y="90" text-anchor="middle" font-size="10" fill="#666">A + B</text>
    <line x1="160" y1="65" x2="175" y2="65" stroke="#333" stroke-width="2"/>
    <line x1="160" y1="90" x2="175" y2="90" stroke="#333" stroke-width="2"/>
    <text x="155" y="68" font-size="10" fill="#666">A</text>
    <text x="155" y="93" font-size="10" fill="#666">B</text>
    <line x1="245" y1="77" x2="260" y2="77" stroke="#333" stroke-width="2"/>
    <text x="265" y="80" font-size="10" fill="#666">Y</text>
  </g>
  
  <!-- NOT Gate Section -->
  <g class="gate-box" data-narration="NOT Gate: Inverts the input signal">
    <rect x="290" y="50" width="120" height="55" rx="5" fill="#fff" stroke="#FF5722" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#D84315">NOT</text>
    <text x="350" y="90" text-anchor="middle" font-size="10" fill="#666">Ā</text>
    <line x1="300" y1="77" x2="315" y2="77" stroke="#333" stroke-width="2"/>
    <text x="295" y="80" font-size="10" fill="#666">A</text>
    <line x1="385" y1="77" x2="400" y2="77" stroke="#333" stroke-width="2"/>
    <circle cx="390" cy="77" r="3" fill="#FF5722"/>
    <text x="405" y="80" font-size="10" fill="#666">Y</text>
  </g>
  
  <!-- XOR Gate Section -->
  <g class="gate-box" data-narration="XOR Gate: Output is 1 when inputs are DIFFERENT">
    <rect x="10" y="115" width="120" height="55" rx="5" fill="#fff" stroke="#9C27B0" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="137" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">XOR</text>
    <text x="70" y="155" text-anchor="middle" font-size="10" fill="#666">A ⊕ B</text>
    <line x1="20" y1="130" x2="35" y2="130" stroke="#333" stroke-width="2"/>
    <line x1="20" y1="155" x2="35" y2="155" stroke="#333" stroke-width="2"/>
    <text x="15" y="133" font-size="10" fill="#666">A</text>
    <text x="15" y="158" font-size="10" fill="#666">B</text>
    <line x1="105" y1="142" x2="120" y2="142" stroke="#333" stroke-width="2"/>
    <text x="125" y="145" font-size="10" fill="#666">Y</text>
  </g>
  
  <!-- NAND Gate Section -->
  <g class="gate-box" data-narration="NAND Gate: Output is 0 only when ALL inputs are 1">
    <rect x="150" y="115" width="120" height="55" rx="5" fill="#fff" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="137" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">NAND</text>
    <text x="210" y="155" text-anchor="middle" font-size="10" fill="#666">A · B</text>
    <line x1="160" y1="130" x2="175" y2="130" stroke="#333" stroke-width="2"/>
    <line x1="160" y1="155" x2="175" y2="155" stroke="#333" stroke-width="2"/>
    <text x="155" y="133" font-size="10" fill="#666">A</text>
    <text x="155" y="158" font-size="10" fill="#666">B</text>
    <line x1="245" y1="142" x2="255" y2="142" stroke="#333" stroke-width="2"/>
    <circle cx="260" cy="142" r="3" fill="#FF9800"/>
    <text x="268" y="145" font-size="10" fill="#666">Y</text>
  </g>
  
  <!-- NOR Gate Section -->
  <g class="gate-box" data-narration="NOR Gate: Output is 1 only when ALL inputs are 0">
    <rect x="290" y="115" width="120" height="55" rx="5" fill="#fff" stroke="#00BCD4" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="137" text-anchor="middle" font-size="14" font-weight="bold" fill="#00838F">NOR</text>
    <text x="350" y="155" text-anchor="middle" font-size="10" fill="#666">A + B</text>
    <line x1="300" y1="130" x2="315" y2="130" stroke="#333" stroke-width="2"/>
    <line x1="300" y1="155" x2="315" y2="155" stroke="#333" stroke-width="2"/>
    <text x="295" y="133" font-size="10" fill="#666">A</text>
    <text x="295" y="158" font-size="10" fill="#666">B</text>
    <line x1="385" y1="142" x2="395" y2="142" stroke="#333" stroke-width="2"/>
    <circle cx="400" cy="142" r="3" fill="#00BCD4"/>
    <text x="405" y="145" font-size="10" fill="#666">Y</text>
  </g>
  
  <!-- XNOR Gate Section -->
  <g class="gate-box" data-narration="XNOR Gate: Output is 1 when inputs are THE SAME">
    <rect x="150" y="180" width="120" height="55" rx="5" fill="#fff" stroke="#795548" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="202" text-anchor="middle" font-size="14" font-weight="bold" fill="#4E342E">XNOR</text>
    <text x="210" y="220" text-anchor="middle" font-size="10" fill="#666">A ⊙ B</text>
    <line x1="160" y1="195" x2="175" y2="195" stroke="#333" stroke-width="2"/>
    <line x1="160" y1="220" x2="175" y2="220" stroke="#333" stroke-width="2"/>
    <text x="155" y="198" font-size="10" fill="#666">A</text>
    <text x="155" y="223" font-size="10" fill="#666">B</text>
    <line x1="245" y1="207" x2="255" y2="207" stroke="#333" stroke-width="2"/>
    <circle cx="260" cy="207" r="3" fill="#795548"/>
    <text x="268" y="210" font-size="10" fill="#666">Y</text>
  </g>
  
  <!-- Truth Tables Section -->
  <g class="truth-table" data-narration="Truth tables show all possible input combinations and their outputs" style="animation-delay: 1.6s">
    <rect x="10" y="250" width="195" height="130" rx="5" fill="#fff" stroke="#333" stroke-width="1" filter="url(#shadow)"/>
    <text x="107" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">AND Truth Table</text>
    
    <!-- Table header -->
    <line x1="15" y1="275" x2="200" y2="275" stroke="#333" stroke-width="1"/>
    <text x="50" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">A</text>
    <text x="107" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">B</text>
    <text x="160" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Y</text>
    <line x1="15" y1="295" x2="200" y2="295" stroke="#333" stroke-width="1"/>
    
    <!-- Table rows -->
    <text x="50" y="312" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="107" y="312" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="160" y="312" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">0</text>
    
    <text x="50" y="332" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="107" y="332" text-anchor="middle" font-size="10" fill="#333">1</text>
    <text x="160" y="332" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">0</text>
    
    <text x="50" y="352" text-anchor="middle" font-size="10" fill="#333">1</text>
    <text x="107" y="352" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="160" y="352" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">0</text>
    
    <text x="50" y="372" text-anchor="middle" font-size="10" fill="#333">1</text>
    <text x="107" y="372" text-anchor="middle" font-size="10" fill="#333">1</text>
    <text x="160" y="372" text-anchor="middle" font-size="10" fill="#43a047" font-weight="bold">1</text>
  </g>
  
  <!-- XOR Truth Table -->
  <g class="truth-table" data-narration="XOR produces 1 when inputs differ" style="animation-delay: 1.8s">
    <rect x="215" y="250" width="195" height="130" rx="5" fill="#fff" stroke="#333" stroke-width="1" filter="url(#shadow)"/>
    <text x="312" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">XOR Truth Table</text>
    
    <line x1="220" y1="275" x2="405" y2="275" stroke="#333" stroke-width="1"/>
    <text x="255" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">A</text>
    <text x="312" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">B</text>
    <text x="365" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Y</text>
    <line x1="220" y1="295" x2="405" y2="295" stroke="#333" stroke-width="1"/>
    
    <text x="255" y="312" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="312" y="312" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="365" y="312" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">0</text>
    
    <text x="255" y="332" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="312" y="332" text-anchor="middle" font-size="10" fill="#333">1</text>
    <text x="365" y="332" text-anchor="middle" font-size="10" fill="#43a047" font-weight="bold">1</text>
    
    <text x="255" y="352" text-anchor="middle" font-size="10" fill="#333">1</text>
    <text x="312" y="352" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="365" y="352" text-anchor="middle" font-size="10" fill="#43a047" font-weight="bold">1</text>
    
    <text x="255" y="372" text-anchor="middle" font-size="10" fill="#333">1</text>
    <text x="312" y="372" text-anchor="middle" font-size="10" fill="#333">1</text>
    <text x="365" y="372" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">0</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="pulse-element" data-narration="Key concept: Logic gates are the building blocks of digital circuits">
    <rect x="10" y="355" width="400" height="35" rx="5" fill="url(#headerGradient)" opacity="0.9"/>
    <text x="210" y="375" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">
      Digital circuits use combinations of these gates to perform complex operations
    </text>
  </g>
  
  <!-- Decorative arrows -->
  <g data-narration="Arrows show the flow of data from inputs through gates to outputs">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
      </marker>
    </defs>
  </g>
</svg>