<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="boolean-algebra-digital-circuits" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-4 { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-5 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .gate-symbol { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .truth-table { animation: fadeIn 0.5s ease-out; }
    .connector { animation: blink 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Boolean Algebra &amp; Digital Circuits</text>
  <line x1="80" y1="38" x2="340" y2="38" stroke="#3498db" stroke-width="2" class="title" />
  
  <!-- Section 1: AND Gate -->
  <g class="section-1" data-narration="AND Gate: Output is 1 only when ALL inputs are 1">
    <rect x="15" y="55" width="85" height="75" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="5" filter="url(#shadow)" />
    <text x="57" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#d35400">AND Gate</text>
    <path d="M30 85 L45 85 L55 80 L55 120 L45 115 L30 115 Z" fill="none" stroke="#e67e22" stroke-width="2" class="gate-symbol" />
    <line x1="22" y1="90" x2="30" y2="90" stroke="#e67e22" stroke-width="2" />
    <line x1="22" y1="110" x2="30" y2="110" stroke="#e67e22" stroke-width="2" />
    <line x1="55" y1="100" x2="65" y2="100" stroke="#e67e22" stroke-width="2" />
    <!-- Truth Table -->
    <g transform="translate(25, 130)">
      <text x="30" y="0" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">A B | Y</text>
      <text x="30" y="14" text-anchor="middle" font-family="Courier" font-size="10" fill="#27ae60">0 0 | 0</text>
      <text x="30" y="26" text-anchor="middle" font-family="Courier" font-size="10" fill="#27ae60">0 1 | 0</text>
      <text x="30" y="38" text-anchor="middle" font-family="Courier" font-size="10" fill="#27ae60">1 0 | 0</text>
      <text x="30" y="50" text-anchor="middle" font-family="Courier" font-size="10" font-weight="bold" fill="#e74c3c">1 1 | 1</text>
    </g>
  </g>
  
  <!-- Section 2: OR Gate -->
  <g class="section-2" data-narration="OR Gate: Output is 1 when ANY input is 1">
    <rect x="115" y="55" width="85" height="75" fill="#e6f9ff" stroke="#3498db" stroke-width="2" rx="5" filter="url(#shadow)" />
    <text x="157" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2980b9">OR Gate</text>
    <path d="M130 85 Q145 90 145 100 Q145 110 130 115 L125 115 L125 85 Z" fill="none" stroke="#3498db" stroke-width="2" class="gate-symbol" />
    <line x1="122" y1="90" x2="130" y2="90" stroke="#3498db" stroke-width="2" />
    <line x1="122" y1="110" x2="130" y2="110" stroke="#3498db" stroke-width="2" />
    <line x1="145" y1="100" x2="155" y2="100" stroke="#3498db" stroke-width="2" />
    <!-- Truth Table -->
    <g transform="translate(125, 130)">
      <text x="30" y="0" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">A B | Y</text>
      <text x="30" y="14" text-anchor="middle" font-family="Courier" font-size="10" fill="#27ae60">0 0 | 0</text>
      <text x="30" y="26" text-anchor="middle" font-family="Courier" font-size="10" font-weight="bold" fill="#e74c3c">0 1 | 1</text>
      <text x="30" y="38" text-anchor="middle" font-family="Courier" font-size="10" font-weight="bold" fill="#e74c3c">1 0 | 1</text>
      <text x="30" y="50" text-anchor="middle" font-family="Courier" font-size="10" font-weight="bold" fill="#e74c3c">1 1 | 1</text>
    </g>
  </g>
  
  <!-- Section 3: NOT Gate -->
  <g class="section-3" data-narration="NOT Gate: Inverts the input value">
    <rect x="215" y="55" width="85" height="75" fill="#ffe6e6" stroke="#e74c3c" stroke-width="2" rx="5" filter="url(#shadow)" />
    <text x="257" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c0392b">NOT Gate</text>
    <path d="M235 88 L250 100 L235 112 Z" fill="none" stroke="#e74c3c" stroke-width="2" class="gate-symbol" />
    <circle cx="253" cy="100" r="3" fill="none" stroke="#e74c3c" stroke-width="2" />
    <line x1="225" y1="100" x2="235" y2="100" stroke="#e74c3c" stroke-width="2" />
    <line x1="256" y1="100" x2="270" y2="100" stroke="#e74c3c" stroke-width="2" />
    <!-- Truth Table -->
    <g transform="translate(225, 130)">
      <text x="30" y="0" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">A | Y</text>
      <text x="30" y="14" text-anchor="middle" font-family="Courier" font-size="10" font-weight="bold" fill="#e74c3c">0 | 1</text>
      <text x="30" y="26" text-anchor="middle" font-family="Courier" font-size="10" fill="#27ae60">1 | 0</text>
    </g>
  </g>
  
  <!-- Section 4: XOR Gate -->
  <g class="section-4" data-narration="XOR Gate: Output is 1 when ONLY ONE input is 1">
    <rect x="315" y="55" width="85" height="75" fill="#f0e6ff" stroke="#9b59b6" stroke-width="2" rx="5" filter="url(#shadow)" />
    <text x="357" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#8e44ad">XOR Gate</text>
    <path d="M335 88 L350 100 L335 112 Z" fill="none" stroke="#9b59b6" stroke-width="2" />
    <path d="M330 83 L345 95" fill="none" stroke="#9b59b6" stroke-width="2" class="gate-symbol" />
    <circle cx="353" cy="100" r="3" fill="none" stroke="#9b59b6" stroke-width="2" />
    <line x1="325" y1="90" x2="335" y2="90" stroke="#9b59b6" stroke-width="2" />
    <line x1="325" y1="110" x2="335" y2="110" stroke="#9b59b6" stroke-width="2" />
    <line x1="356" y1="100" x2="370" y2="100" stroke="#9b59b6" stroke-width="2" />
    <!-- Truth Table -->
    <g transform="translate(325, 130)">
      <text x="30" y="0" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">A B | Y</text>
      <text x="30" y="14" text-anchor="middle" font-family="Courier" font-size="10" fill="#27ae60">0 0 | 0</text>
      <text x="30" y="26" text-anchor="middle" font-family="Courier" font-size="10" font-weight="bold" fill="#e74c3c">0 1 | 1</text>
      <text x="30" y="38" text-anchor="middle" font-family="Courier" font-size="10" font-weight="bold" fill="#e74c3c">1 0 | 1</text>
      <text x="30" y="50" text-anchor="middle" font-family="Courier" font-size="10" fill="#27ae60">1 1 | 0</text>
    </g>
  </g>
  
  <!-- Section 5: Boolean Laws -->
  <g class="section-5" data-narration="Key Boolean Laws: Commutative, Associative, Distributive, and De Morgan's Laws">
    <rect x="15" y="200" width="390" height="80" fill="#ffffff" stroke="#16a085" stroke-width="2" rx="5" filter="url(#shadow)" />
    <text x="210" y="220" text-anchor="middle" font-family="Georgia" font-size="14" font-weight="bold" fill="#16a085">Boolean Laws &amp; Theorems</text>
    <g transform="translate(25, 238)">
      <text x="0" y="0" font-family="Arial" font-size="11" fill="#2c3e50">
        <tspan x="0" dy="0">• Commutative: A∧B = B∧A, A∨B = B∨A</tspan>
        <tspan x="0" dy="14">• Associative: (A∧B)∧C = A∧(B∧C)</tspan>
        <tspan x="0" y="0" dy="14">• Distributive: A∧(B∨C) = (A∧B)∨(A∧C)</tspan>
      </text>
      <text x="220" y="0" font-family="Arial" font-size="11" fill="#2c3e50">
        <tspan x="0" dy="0">• De Morgan's:</tspan>
        <tspan x="0" dy="14">¬(A∧B) = ¬A ∨ ¬B</tspan>
        <tspan x="0" y="0" dy="14">¬(A∨B) = ¬A ∧ ¬B</tspan>
      </text>
    </g>
  </g>
  
  <!-- Section 6: Operations Summary -->
  <g class="section-5" data-narration="Basic Boolean Operations: AND, OR, NOT, XOR with their symbols">
    <rect x="15" y="290" width="390" height="50" fill="#fef9e7" stroke="#f1c40f" stroke-width="2" rx="5" filter="url(#shadow)" />
    <text x="210" y="310" text-anchor="middle" font-family="Georgia" font-size="13" font-weight="bold" fill="#f39c12">Boolean Operations</text>
    <text x="210" y="330" text-anchor="middle" font-family="Arial" font-size="11" fill="#7f8c8d">
      <tspan>AND (∧) · OR (∨) · NOT (¬) · XOR (⊕)</tspan>
    </text>
  </g>
  
  <!-- Decorative connector dots -->
  <circle cx="105" cy="92" r="3" fill="#95a5a6" class="connector" />
  <circle cx="205" cy="92" r="3" fill="#95a5a6" class="connector" />
  <circle cx="305" cy="92" r="3" fill="#95a5a6" class="connector" />
  
  <!-- Flow arrows -->
  <path d="M50 185 Q50 195 210 195 Q370 195 370 185" fill="none" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,2" class="connector" />
  <polygon points="370,185 365,190 365,180" fill="#bdc3c7" />
</svg>