<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="flip-flops-characteristic-tables">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6f5"/>
      <stop offset="100%" style="stop-color:#e6f5f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="tableHeaderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c9cd6"/>
      <stop offset="100%" style="stop-color:#3d7ab8"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.3s both; }
    .section-3 { animation: slideInLeft 0.6s ease-out 0.4s both; }
    .section-4 { animation: slideInRight 0.6s ease-out 0.5s both; }
    .circuit-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: blink 1.5s ease-in-out infinite; }
    .table-row { animation: fadeIn 0.4s ease-out both; }
    .table-row:nth-child(1) { animation-delay: 0.6s; }
    .table-row:nth-child(2) { animation-delay: 0.7s; }
    .table-row:nth-child(3) { animation-delay: 0.8s; }
    .table-row:nth-child(4) { animation-delay: 0.9s; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c5282">Flip-Flops &amp; Characteristic Tables</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#5c9cd6" stroke-width="2" class="title" opacity="0.5"/>
  
  <!-- Section 1: SR Flip-Flop -->
  <g class="section-1" data-narration="SR Flip-Flop: The most basic type with Set (S) and Reset (R) inputs">
    <rect x="15" y="55" width="95" height="130" fill="white" rx="6" filter="url(#shadow)"/>
    <rect x="15" y="55" width="95" height="22" fill="url(#tableHeaderGrad)" rx="6"/>
    <text x="62" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SR Flip-Flop</text>
    <rect x="15" y="77" width="95" height="1" fill="#3d7ab8"/>
    <text x="23" y="95" font-size="9" fill="#4a5568">Q</text>
    <text x="45" y="95" font-size="9" fill="#4a5568">S</text>
    <text x="67" y="95" font-size="9" fill="#4a5568">R</text>
    <text x="90" y="95" font-size="9" fill="#4a5568">Q+</text>
    <g class="table-row">
      <text x="23" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="45" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="67" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="90" y="112" font-size="8" fill="#2d3748">0</text>
    </g>
    <g class="table-row">
      <text x="23" y="127" font-size="8" fill="#2d3748">0</text>
      <text x="45" y="127" font-size="8" fill="#2d3748">0</text>
      <text x="67" y="127" font-size="8" fill="#2d3748">1</text>
      <text x="90" y="127" font-size="8" fill="#2d3748">0</text>
    </g>
    <g class="table-row">
      <text x="23" y="142" font-size="8" fill="#2d3748">0</text>
      <text x="45" y="142" font-size="8" fill="#2d3748">1</text>
      <text x="67" y="142" font-size="8" fill="#2d3748">0</text>
      <text x="90" y="142" font-size="8" fill="#2d3748">1</text>
    </g>
    <g class="table-row">
      <text x="23" y="157" font-size="8" fill="#2d3748">1</text>
      <text x="45" y="157" font-size="8" fill="#2d3748">0</text>
      <text x="67" y="157" font-size="8" fill="#2d3748">0</text>
      <text x="90" y="157" font-size="8" fill="#2d3748">1</text>
    </g>
    <g class="table-row">
      <text x="23" y="172" font-size="8" fill="#2d3748">1</text>
      <text x="45" y="172" font-size="8" fill="#2d3748">0</text>
      <text x="67" y="172" font-size="8" fill="#2d3748">1</text>
      <text x="90" y="172" font-size="8" fill="#c53030">0*</text>
    </g>
  </g>
  
  <!-- Section 2: D Flip-Flop -->
  <g class="section-2" data-narration="D Flip-Flop: Data flip-flop with single D input, used for data storage">
    <rect x="120" y="55" width="95" height="130" fill="white" rx="6" filter="url(#shadow)"/>
    <rect x="120" y="55" width="95" height="22" fill="url(#tableHeaderGrad)" rx="6"/>
    <text x="167" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="white">D Flip-Flop</text>
    <rect x="120" y="77" width="95" height="1" fill="#3d7ab8"/>
    <text x="130" y="95" font-size="9" fill="#4a5568">Q</text>
    <text x="155" y="95" font-size="9" fill="#4a5568">D</text>
    <text x="180" y="95" font-size="9" fill="#4a5568">Q+</text>
    <g class="table-row">
      <text x="130" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="155" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="180" y="112" font-size="8" fill="#2d3748">0</text>
    </g>
    <g class="table-row">
      <text x="130" y="127" font-size="8" fill="#2d3748">0</text>
      <text x="155" y="127" font-size="8" fill="#2d3748">1</text>
      <text x="180" y="127" font-size="8" fill="#2d3748">1</text>
    </g>
    <g class="table-row">
      <text x="130" y="142" font-size="8" fill="#2d3748">1</text>
      <text x="155" y="142" font-size="8" fill="#2d3748">0</text>
      <text x="180" y="142" font-size="8" fill="#2d3748">0</text>
    </g>
    <g class="table-row">
      <text x="130" y="157" font-size="8" fill="#2d3748">1</text>
      <text x="155" y="157" font-size="8" fill="#2d3748">1</text>
      <text x="180" y="157" font-size="8" fill="#2d3748">1</text>
    </g>
    <text x="167" y="178" text-anchor="middle" font-size="7" fill="#718096">Q+ = D</text>
  </g>
  
  <!-- Section 3: JK Flip-Flop -->
  <g class="section-3" data-narration="JK Flip-Flop: Enhanced SR flip-flop with J and K inputs, eliminates invalid state">
    <rect x="225" y="55" width="95" height="130" fill="white" rx="6" filter="url(#shadow)"/>
    <rect x="225" y="55" width="95" height="22" fill="url(#tableHeaderGrad)" rx="6"/>
    <text x="272" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="white">JK Flip-Flop</text>
    <rect x="225" y="77" width="95" height="1" fill="#3d7ab8"/>
    <text x="235" y="95" font-size="9" fill="#4a5568">Q</text>
    <text x="255" y="95" font-size="9" fill="#4a5568">J</text>
    <text x="275" y="95" font-size="9" fill="#4a5568">K</text>
    <text x="300" y="95" font-size="9" fill="#4a5568">Q+</text>
    <g class="table-row">
      <text x="235" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="255" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="275" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="300" y="112" font-size="8" fill="#2d3748">0</text>
    </g>
    <g class="table-row">
      <text x="235" y="127" font-size="8" fill="#2d3748">0</text>
      <text x="255" y="127" font-size="8" fill="#2d3748">1</text>
      <text x="275" y="127" font-size="8" fill="#2d3748">0</text>
      <text x="300" y="127" font-size="8" fill="#2d3748">1</text>
    </g>
    <g class="table-row">
      <text x="235" y="142" font-size="8" fill="#2d3748">0</text>
      <text x="255" y="142" font-size="8" fill="#2d3748">0</text>
      <text x="275" y="142" font-size="8" fill="#2d3748">1</text>
      <text x="300" y="142" font-size="8" fill="#2d3748">0</text>
    </g>
    <g class="table-row">
      <text x="235" y="157" font-size="8" fill="#2d3748">1</text>
      <text x="255" y="157" font-size="8" fill="#2d3748">1</text>
      <text x="275" y="157" font-size="8" fill="#2d3748">1</text>
      <text x="300" y="157" font-size="8" fill="#2d3748">0</text>
    </g>
    <g class="table-row">
      <text x="235" y="172" font-size="8" fill="#2d3748">1</text>
      <text x="255" y="172" font-size="8" fill="#2d3748">1</text>
      <text x="275" y="172" font-size="8" fill="#2d3748">0</text>
      <text x="300" y="172" font-size="8" fill="#2d3748">1</text>
    </g>
  </g>
  
  <!-- Section 4: T Flip-Flop -->
  <g class="section-4" data-narration="T Flip-Flop: Toggle flip-flop with single T input, used in counters">
    <rect x="330" y="55" width="75" height="130" fill="white" rx="6" filter="url(#shadow)"/>
    <rect x="330" y="55" width="75" height="22" fill="url(#tableHeaderGrad)" rx="6"/>
    <text x="367" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="white">T Flip-Flop</text>
    <rect x="330" y="77" width="75" height="1" fill="#3d7ab8"/>
    <text x="342" y="95" font-size="9" fill="#4a5568">Q</text>
    <text x="365" y="95" font-size="9" fill="#4a5568">T</text>
    <text x="388" y="95" font-size="9" fill="#4a5568">Q+</text>
    <g class="table-row">
      <text x="342" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="365" y="112" font-size="8" fill="#2d3748">0</text>
      <text x="388" y="112" font-size="8" fill="#2d3748">0</text>
    </g>
    <g class="table-row">
      <text x="342" y="127" font-size="8" fill="#2d3748">0</text>
      <text x="365" y="127" font-size="8" fill="#2d3748">1</text>
      <text x="388" y="127" font-size="8" fill="#2d3748">1</text>
    </g>
    <g class="table-row">
      <text x="342" y="142" font-size="8" fill="#2d3748">1</text>
      <text x="365" y="142" font-size="8" fill="#2d3748">0</text>
      <text x="388" y="142" font-size="8" fill="#2d3748">1</text>
    </g>
    <g class="table-row">
      <text x="342" y="157" font-size="8" fill="#2d3748">1</text>
      <text x="365" y="157" font-size="8" fill="#2d3748">1</text>
      <text x="388" y="157" font-size="8" fill="#2d3748">0</text>
    </g>
    <text x="367" y="178" text-anchor="middle" font-size="7" fill="#718096">Q+ = Q⊕T</text>
  </g>
  
  <!-- Flip-Flop Symbol Diagram -->
  <g class="circuit-anim" data-narration="Basic flip-flop symbol showing inputs and complementary outputs Q and Q'">
    <rect x="100" y="200" width="220" height="120" fill="white" rx="8" filter="url(#shadow)" stroke="#5c9cd6" stroke-width="2"/>
    <text x="210" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c5282">Flip-Flop Block Diagram</text>
    
    <!-- Inputs -->
    <line x1="80" y1="250" x2="115" y2="250" stroke="#e53e3e" stroke-width="2"/>
    <text x="70" y="254" font-size="11" fill="#e53e3e" font-weight="bold">S/J/D/T</text>
    
    <line x1="80" y1="275" x2="115" y2="275" stroke="#e53e3e" stroke-width="2"/>
    <text x="60" y="279" font-size="11" fill="#e53e3e" font-weight="bold">R/K</text>
    
    <line x1="80" y1="300" x2="115" y2="300" stroke="#2d3748" stroke-width="2"/>
    <text x="50" y="304" font-size="11" fill="#2d3748" font-weight="bold">CLK</text>
    
    <!-- Flip-flop body -->
    <rect x="115" y="235" width="190" height="90" fill="#ebf8ff" rx="4" stroke="#4299e1" stroke-width="1"/>
    <text x="210" y="285" text-anchor="middle" font-size="24" font-weight="bold" fill="#2b6cb0">FF</text>
    
    <!-- Outputs -->
    <line x1="305" y1="250" x2="340" y2="250" stroke="#38a169" stroke-width="2"/>
    <text x="350" y="254" font-size="12" fill="#38a169" font-weight="bold">Q</text>
    
    <line x1="305" y1="300" x2="340" y2="300" stroke="#38a169" stroke-width="2"/>
    <text x="350" y="304" font-size="12" fill="#38a169" font-weight="bold">Q'</text>
    
    <!-- Small bubbles for complement -->
    <circle cx="343" cy="250" r="3" fill="#38a169"/>
    <circle cx="343" cy="300" r="3" fill="#38a169"/>
  </g>
  
  <!-- Arrow and Key Concept Box -->
  <g data-narration="Characteristic tables define the next state Q+ based on current state Q and inputs">
    <path d="M 60 335 Q 90 355 120 345" fill="none" stroke="#805ad5" stroke-width="2" class="arrow-anim" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#805ad5"/>
      </marker>
    </defs>
    <rect x="130" y="325" width="260" height="60" fill="white" rx="6" filter="url(#shadow)" stroke="#805ad5" stroke-width="1.5"/>
    <text x="260" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b46c1">Key Concept: Characteristic Tables</text>
    <text x="260" y="362" text-anchor="middle" font-size="10" fill="#4a5568">Define Q<sup>+</sup> (next state) from Q (current) and inputs</text>
    <text x="260" y="377" text-anchor="middle" font-size="9" fill="#718096">Used for flip-flop excitation and circuit design</text>
  </g>
  
  <!-- Legend/Applications -->
  <g data-narration="Flip-flops are used in counters, registers, and memory units">
    <rect x="15" y="330" width="105" height="55" fill="#faf5ff" rx="4" stroke="#d6bcfa" stroke-width="1"/>
    <text x="67" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="#6b46c1">Applications</text>
    <text x="67" y="358" text-anchor="middle" font-size="8" fill="#553c9a">• Counters</text>
    <text x="67" y="370" text-anchor="middle" font-size="8" fill="#553c9a">• Registers</text>
    <text x="67" y="382" text-anchor="middle" font-size="8" fill="#553c9a">• Memory</text>
  </g>
</svg>