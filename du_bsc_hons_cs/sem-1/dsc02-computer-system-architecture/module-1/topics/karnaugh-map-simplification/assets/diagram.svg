<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="karnaugh-map-simplification">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4ecf5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cellGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cellGradient0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcdb2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb4a2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: Arial, sans-serif; }
    .kmap-section { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawArrow 0.8s ease-out forwards; animation-delay: 1s; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .group-rect { fill: none; stroke: #e74c3c; stroke-width: 3; stroke-dasharray: 8,4; animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">Karnaugh Map Simplification</text>
  <line x1="100" y1="45" x2="320" y2="45" stroke="#3498db" stroke-width="2" class="title" style="animation-delay: 0.2s"/>
  
  <!-- K-map Section -->
  <g class="kmap-section" data-narration="K-map grid showing 2x2 arrangement for variables x and y">
    <!-- K-map title -->
    <text x="210" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">2-Variable K-Map for F(x,y) = x'y + xy'</text>
    
    <!-- Column headers (y) -->
    <text x="160" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">y'</text>
    <text x="240" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">y</text>
    
    <!-- Row headers (x) -->
    <text x="100" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">x'</text>
    <text x="100" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">x</text>
    
    <!-- K-map cells -->
    <!-- Cell x'y' = 1 -->
    <rect x="135" y="125" width="50" height="40" rx="5" fill="url(#cellGradient1)" filter="url(#shadow)"/>
    <text x="160" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a5c3a">1</text>
    <text x="160" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a5c3a">x'y'</text>
    
    <!-- Cell xy' = 0 -->
    <rect x="215" y="125" width="50" height="40" rx="5" fill="url(#cellGradient0)" filter="url(#shadow)"/>
    <text x="240" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b3a2f">0</text>
    <text x="240" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b3a2f">xy'</text>
    
    <!-- Cell x'y = 0 -->
    <rect x="135" y="185" width="50" height="40" rx="5" fill="url(#cellGradient0)" filter="url(#shadow)"/>
    <text x="160" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b3a2f">0</text>
    <text x="160" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b3a2f">x'y</text>
    
    <!-- Cell xy = 1 -->
    <rect x="215" y="185" width="50" height="40" rx="5" fill="url(#cellGradient1)" filter="url(#shadow)"/>
    <text x="240" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a5c3a">1</text>
    <text x="240" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a5c3a">xy</text>
    
    <!-- Grouping rectangles -->
    <rect x="130" y="120" width="60" height="50" rx="8" class="group-rect" style="animation-delay: 1.5s"/>
    <rect x="210" y="180" width="60" height="50" rx="8" class="group-rect" style="animation-delay: 1.8s"/>
  </g>
  
  <!-- Grouping explanation -->
  <g class="concept-box" data-narration="Groups of adjacent 1s can be combined to simplify the expression">
    <rect x="290" y="120" width="115" height="45" rx="5" fill="#fff9e6" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
    <text x="347" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d68910">Grouping</text>
    <text x="347" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7d6608">Combine adjacent 1s</text>
  </g>
  
  <!-- Minterms box -->
  <g class="concept-box" data-narration="Minterms are the individual product terms in the Boolean expression">
    <rect x="15" y="250" width="120" height="50" rx="5" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1" filter="url(#shadow)"/>
    <text x="75" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a085">Minterms</text>
    <text x="75" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0e6655">x'y' and xy</text>
  </g>
  
  <!-- Simplified result box -->
  <g class="concept-box" data-narration="The simplified Boolean expression after K-map simplification">
    <rect x="150" y="250" width="140" height="50" rx="5" fill="#eaf2f8" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
    <text x="220" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">Simplified Result</text>
    <text x="220" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a5276">F = x ⊕ y</text>
  </g>
  
  <!-- Adjacent cells explanation -->
  <g class="concept-box" data-narration="Shows how opposite edges of K-map are also adjacent (wrapping)">
    <rect x="305" y="250" width="105" height="50" rx="5" fill="#f5eef8" stroke="#9b59b6" stroke-width="1" filter="url(#shadow)"/>
    <text x="357" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8e44ad">Adjacency</text>
    <text x="357" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6c3483">Wraps around edges</text>
  </g>
  
  <!-- Arrows -->
  <line x1="75" y1="240" x2="75" y2="175" stroke="#1abc9c" stroke-width="2" class="arrow-line" marker-end="url(#arrowhead)"/>
  <line x1="220" y1="240" x2="220" y2="195" stroke="#3498db" stroke-width="2" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>
  
  <!-- Result arrow pointing to simplified expression -->
  <line x1="347" y1="165" x2="220" y2="230" stroke="#f39c12" stroke-width="2" class="arrow-line"/>
  
  <!-- K-map concept note -->
  <text x="210" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" class="pulse-element">K-map groups = largest powers of 2</text>
  
  <!-- Footer -->
  <text x="210" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Digital Logic • Boolean Algebra</text>
  
  <!-- Key elements labels -->
  <g class="concept-box" data-narration="Variable labels indicate which row/column each cell represents">
    <circle cx="160" cy="100" r="4" fill="#e74c3c" class="pulse-element"/>
    <circle cx="100" cy="150" r="4" fill="#e74c3c" class="pulse-element" style="animation-delay: 0.3s"/>
  </g>
</svg>