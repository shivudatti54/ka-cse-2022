<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="combinational-sequential-circuits">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e8f8f0"/>
      <stop offset="100%" style="stop-color:#f0e8f4"/>
    </linearGradient>
    <linearGradient id="comboGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8cb8d8"/>
    </linearGradient>
    <linearGradient id="seqGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8"/>
      <stop offset="100%" style="stop-color:#98d898"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .combo-section { animation: slideInLeft 0.8s ease-out; }
    .seq-section { animation: slideInRight 0.8s ease-out; }
    .concept-box { animation: fadeIn 1.2s ease-out; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1.5s ease-out forwards; }
    .pulse-element { animation: pulse 2s infinite; transform-origin: center; transform-box: fill-box; }
    .gate { animation: fadeIn 1s ease-out; }
    .flipflop { animation: fadeIn 1s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5aa0" class="title">Combinational vs Sequential</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555" class="title">Digital Circuits</text>
  
  <!-- Combinational Circuit Section -->
  <g class="combo-section" data-narration="Combinational circuits produce output based solely on current inputs without memory">
    <rect x="15" y="60" width="180" height="150" fill="url(#comboGradient)" rx="8" filter="url(#shadow)"/>
    <text x="105" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a3a5c">COMBINATIONAL</text>
    <text x="105" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2a4a6c">No Memory</text>
    
    <!-- Input labels -->
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="10" fill="#333">A</text>
    <text x="30" y="135" font-family="Arial, sans-serif" font-size="10" fill="#333">B</text>
    <line x1="35" y1="112" x2="60" y2="112" stroke="#333" stroke-width="1.5"/>
    <line x1="35" y1="132" x2="60" y2="132" stroke="#333" stroke-width="1.5"/>
    
    <!-- AND Gate -->
    <path d="M60,105 L75,105 Q85,100 85,112 Q85,124 75,119 L60,119 Z" fill="none" stroke="#333" stroke-width="1.5" class="gate"/>
    <line x1="85" y1="112" x2="100" y2="112" stroke="#333" stroke-width="1.5"/>
    
    <!-- OR Gate -->
    <path d="M100,105 L110,105 L120,98 L130,112 L120,126 L110,119 L100,119 Z" fill="none" stroke="#333" stroke-width="1.5" class="gate"/>
    <line x1="130" y1="112" x2="145" y2="112" stroke="#333" stroke-width="1.5"/>
    
    <!-- Output -->
    <text x="175" y="117" font-family="Arial, sans-serif" font-size="10" fill="#333">Y</text>
    <line x1="145" y1="112" x2="168" y2="112" stroke="#333" stroke-width="1.5"/>
    
    <text x="105" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Output = f(Input)</text>
  </g>
  
  <!-- Sequential Circuit Section -->
  <g class="seq-section" data-narration="Sequential circuits have memory elements and output depends on current inputs and stored data">
    <rect x="225" y="60" width="180" height="150" fill="url(#seqGradient)" rx="8" filter="url(#shadow)"/>
    <text x="315" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a4a1c">SEQUENTIAL</text>
    <text x="315" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2a6a2c">Has Memory</text>
    
    <!-- Flip-Flop Symbol -->
    <rect x="270" y="100" width="60" height="40" fill="none" stroke="#1a4a1c" stroke-width="2" rx="3" class="flipflop"/>
    <text x="300" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a4a1c">FF</text>
    
    <!-- Inputs -->
    <text x="245" y="110" font-family="Arial, sans-serif" font-size="10" fill="#333">D</text>
    <text x="245" y="135" font-family="Arial, sans-serif" font-size="10" fill="#333">CLK</text>
    <line x1="250" y1="107" x2="270" y2="107" stroke="#333" stroke-width="1.5"/>
    <line x1="250" y1="132" x2="270" y2="132" stroke="#333" stroke-width="1.5"/>
    
    <!-- Clock pulse symbol -->
    <polyline points="255,138 260,132 260,138 265,132" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Outputs -->
    <text x="350" y="115" font-family="Arial, sans-serif" font-size="10" fill="#333">Q</text>
    <text x="350" y="135" font-family="Arial, sans-serif" font-size="10" fill="#333">Q̄</text>
    <line x1="330" y1="112" x2="343" y2="112" stroke="#333" stroke-width="1.5"/>
    <line x1="330" y1="132" x2="343" y2="132" stroke="#333" stroke-width="1.5"/>
    
    <!-- Feedback loop arrow -->
    <path d="M330,145 Q330,160 315,160 Q300,160 300,145" fill="none" stroke="#2a6a2c" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="298,145 305,148 300,155" fill="#2a6a2c"/>
    
    <text x="315" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Output = f(Input, Memory)</text>
  </g>
  
  <!-- Arrow connecting sections -->
  <g data-narration="The key difference is memory: combinational has none, sequential uses flip-flops">
    <line x1="195" y1="135" x2="225" y2="135" stroke="#666" stroke-width="2" class="arrow-line"/>
    <polygon points="220,130 230,135 220,140" fill="#666" class="pulse-element"/>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g class="concept-box" data-narration="Key examples: adders, decoders, multiplexers for combinational; counters, registers, FSMs for sequential">
    <rect x="15" y="220" width="185" height="75" fill="#fff" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="25" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c5aa0">Combinational Examples:</text>
    <text x="25" y="257" font-family="Arial, sans-serif" font-size="10" fill="#444">• Adders, Subtractors</text>
    <text x="25" y="272" font-family="Arial, sans-serif" font-size="10" fill="#444">• Decoders, Multiplexers</text>
    <text x="25" y="287" font-family="Arial, sans-serif" font-size="10" fill="#444">• Encoders</text>
  </g>
  
  <g class="concept-box" data-narration="Flip-flops are the basic memory elements: SR, D, JK, and T types">
    <rect x="220" y="220" width="185" height="75" fill="#fff" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="230" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2a7a2a">Sequential Examples:</text>
    <text x="230" y="257" font-family="Arial, sans-serif" font-size="10" fill="#444">• Counters, Registers</text>
    <text x="230" y="272" font-family="Arial, sans-serif" font-size="10" fill="#444">• Finite State Machines</text>
    <text x="230" y="287" font-family="Arial, sans-serif" font-size="10" fill="#444">• Memory Units</text>
  </g>
  
  <!-- Flip-Flop Types Section -->
  <g class="concept-box" data-narration="Four main flip-flop types: SR (Set-Reset), D (Data/Delay), JK, and T (Toggle)">
    <rect x="15" y="300" width="390" height="45" fill="#fef9e7" stroke="#f0e0a0" stroke-width="1" rx="5"/>
    <text x="25" y="320" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7a6018">Flip-Flop Types:</text>
    <text x="110" y="320" font-family="Arial, sans-serif" font-size="10" fill="#444">SR</text>
    <text x="155" y="320" font-family="Arial, sans-serif" font-size="10" fill="#444">D</text>
    <text x="200" y="320" font-family="Arial, sans-serif" font-size="10" fill="#444">JK</text>
    <text x="250" y="320" font-family="Arial, sans-serif" font-size="10" fill="#444">T</text>
    <text x="280" y="320" font-family="Arial, sans-serif" font-size="9" fill="#666">(Set-Reset) (Data) (Toggle)</text>
  </g>
  
  <!-- Bottom comparison arrow -->
  <g data-narration="Understanding both types is essential for digital system design">
    <line x1="210" y1="355" x2="210" y2="385" stroke="#999" stroke-width="1.5" class="arrow-line"/>
    <polygon points="205,380 210,390 215,380" fill="#999"/>
  </g>
  
  <!-- Memory indicator -->
  <g class="pulse-element" data-narration="Memory is the distinguishing feature that separates sequential from combinational circuits">
    <rect x="280" y="150" width="25" height="15" fill="#90c090" stroke="#2a6a2c" stroke-width="1" rx="2"/>
    <text x="292.5" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fff">MEM</text>
  </g>
</svg>