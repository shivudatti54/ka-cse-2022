<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="memory-hierarchy-cache-auxiliary">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="l1Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="l2Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="l3Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mmGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3cfe2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .section-5 { animation-delay: 1.0s; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; animation: arrowPulse 2s infinite; }
    .box { stroke: #444; stroke-width: 1; rx: 5; ry: 5; }
    .mapping-box { animation: fadeIn 1s ease-out forwards; animation-delay: 1.2s; opacity: 0; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; cursor: pointer; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title">Memory Hierarchy</text>
  <text x="210" y="46" text-anchor="middle" class="detail">Cache and Auxiliary Memory</text>
  
  <!-- L1 Cache -->
  <g class="section section-1" data-narration="L1 Cache: Level 1 cache is the fastest and smallest, directly integrated with CPU core">
    <rect x="160" y="60" width="100" height="35" fill="url(#l1Gradient)" class="box pulse" />
    <text x="210" y="75" text-anchor="middle" class="label">L1 Cache</text>
    <text x="210" y="88" text-anchor="middle" class="detail">32KB | Fastest</text>
  </g>
  
  <!-- Arrow down -->
  <path d="M210 95 L210 115" class="arrow" />
  <polygon points="210,120 205,110 215,110" fill="#666" />
  
  <!-- L2 Cache -->
  <g class="section section-2" data-narration="L2 Cache: Level 2 cache is larger but slower than L1, serves as secondary buffer">
    <rect x="145" y="125" width="130" height="35" fill="url(#l2Gradient)" class="box pulse" />
    <text x="210" y="140" text-anchor="middle" class="label">L2 Cache</text>
    <text x="210" y="153" text-anchor="middle" class="detail">256KB | Medium Speed</text>
  </g>
  
  <!-- Arrow down -->
  <path d="M210 160 L210 180" class="arrow" />
  <polygon points="210,185 205,175 215,175" fill="#666" />
  
  <!-- L3 Cache -->
  <g class="section section-3" data-narration="L3 Cache: Level 3 cache is shared among cores, largest but slowest cache level">
    <rect x="130" y="190" width="160" height="35" fill="url(#l3Gradient)" class="box pulse" />
    <text x="210" y="205" text-anchor="middle" class="label">L3 Cache</text>
    <text x="210" y="218" text-anchor="middle" class="detail">8MB | Shared</text>
  </g>
  
  <!-- Arrow down -->
  <path d="M210 225 L210 245" class="arrow" />
  <polygon points="210,250 205,240 215,240" fill="#666" />
  
  <!-- Main Memory -->
  <g class="section section-4" data-narration="Main Memory: RAM provides large storage capacity but slower than cache memory">
    <rect x="110" y="255" width="200" height="40" fill="url(#mmGradient)" class="box pulse" />
    <text x="210" y="272" text-anchor="middle" class="label">Main Memory (RAM)</text>
    <text x="210" y="287" text-anchor="middle" class="detail">8-32GB | Slower Access</text>
  </g>
  
  <!-- Arrow down -->
  <path d="M210 295 L210 315" class="arrow" />
  <polygon points="210,320 205,310 215,310" fill="#666" />
  
  <!-- Auxiliary Memory -->
  <g class="section section-5" data-narration="Auxiliary Memory: Storage devices like HDD/SSD provide persistent, large capacity storage">
    <rect x="85" y="325" width="250" height="40" fill="url(#auxGradient)" class="box pulse" />
    <text x="210" y="342" text-anchor="middle" class="label">Auxiliary Memory (HDD/SSD)</text>
    <text x="210" y="357" text-anchor="middle" class="detail">512GB-2TB | Persistent Storage</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="mapping-box">
    <rect x="10" y="325" width="70" height="50" fill="#fff" stroke="#888" rx="3" ry="3" />
    <text x="45" y="338" text-anchor="middle" class="label" style="font-size:10px">Cache Mapping</text>
    <text x="45" y="352" text-anchor="middle" class="detail" style="font-size:9px">Direct</text>
    <text x="45" y="364" text-anchor="middle" class="detail" style="font-size:9px">Associative</text>
  </g>
  
  <g class="mapping-box">
    <rect x="340" y="325" width="70" height="50" fill="#fff" stroke="#888" rx="3" ry="3" />
    <text x="375" y="338" text-anchor="middle" class="label" style="font-size:10px">Speed</text>
    <text x="375" y="352" text-anchor="middle" class="detail" style="font-size:9px">Fast → Slow</text>
    <text x="375" y="364" text-anchor="middle" class="detail" style="font-size:9px">Size: ↑</text>
  </g>
  
  <!-- Direction indicator -->
  <text x="395" y="200" text-anchor="middle" class="label" style="font-size:12px; writing-mode: tb;">Speed ↑</text>
  <text x="395" y="215" text-anchor="middle" class="detail" style="font-size:10px">Cost ↑</text>
</svg>