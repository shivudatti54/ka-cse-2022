<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="input-output-interface">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90c2"/>
    </linearGradient>
    <linearGradient id="controllerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9bcfb4"/>
      <stop offset="100%" style="stop-color:#5cb88a"/>
    </linearGradient>
    <linearGradient id="deviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5c9"/>
      <stop offset="100%" style="stop-color:#b57ba8"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e67e22"/>
      <stop offset="100%" style="stop-color:#d35400"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 3; }
      50% { stroke-width: 5; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .cpu-box { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .controller-box { animation: fadeIn 0.6s ease-out 0.4s both; }
    .device-box { animation: slideInRight 0.6s ease-out 0.6s both; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .type-box { animation: slideInUp 0.5s ease-out both; }
    .label { animation: fadeIn 0.5s ease-out; }
    .cpu-box:hover, .controller-box:hover, .device-box:hover { animation: pulse 0.3s ease-out; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Input-Output Interface</text>
  
  <!-- CPU Block -->
  <g class="cpu-box" data-narration="Central Processing Unit - The main processor that controls data processing and manages I/O operations">
    <rect x="30" y="90" width="100" height="70" rx="8" fill="url(#cpuGradient)" stroke="#3a7ca5" stroke-width="2"/>
    <text x="80" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">CPU</text>
    <text x="80" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Processor</text>
  </g>
  
  <!-- I/O Controller Block -->
  <g class="controller-box" data-narration="I/O Controller - Hardware component that manages data transfer between CPU and external devices">
    <rect x="160" y="90" width="100" height="70" rx="8" fill="url(#controllerGradient)" stroke="#3d9970" stroke-width="2"/>
    <text x="210" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">I/O</text>
    <text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Controller</text>
  </g>
  
  <!-- External Devices Block -->
  <g class="device-box" data-narration="External Devices - Keyboards, displays, storage devices that communicate through the I/O interface">
    <rect x="290" y="90" width="100" height="70" rx="8" fill="url(#deviceGradient)" stroke="#8e4d7a" stroke-width="2"/>
    <text x="340" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">External</text>
    <text x="340" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Devices</text>
  </g>
  
  <!-- Data Flow Arrows -->
  <g class="arrow">
    <path d="M135 125 L155 125" stroke="url(#arrowGradient)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M265 125 L285 125" stroke="url(#arrowGradient)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d35400"/>
    </marker>
  </defs>
  
  <!-- Data Labels -->
  <text x="145" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">Data</text>
  <text x="145" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">Control</text>
  <text x="275" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">Data</text>
  <text x="275" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">Control</text>
  
  <!-- Type Boxes -->
  <g class="type-box" style="animation-delay: 0.8s" data-narration="Parallel Interface - Transfers multiple bits simultaneously using multiple wires">
    <rect x="30" y="190" width="110" height="45" rx="5" fill="#fff" stroke="#7eb8da" stroke-width="1.5"/>
    <text x="85" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Parallel</text>
    <text x="85" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Multiple bits</text>
  </g>
  
  <g class="type-box" style="animation-delay: 1s" data-narration="Serial Interface - Transfers one bit at a time through a single wire">
    <rect x="155" y="190" width="110" height="45" rx="5" fill="#fff" stroke="#9bcfb4" stroke-width="1.5"/>
    <text x="210" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Serial</text>
    <text x="210" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">One bit at a time</text>
  </g>
  
  <g class="type-box" style="animation-delay: 1.2s" data-narration="Bus Interface - Allows multiple devices to share a common communication path">
    <rect x="280" y="190" width="110" height="45" rx="5" fill="#fff" stroke="#d4a5c9" stroke-width="1.5"/>
    <text x="335" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Bus</text>
    <text x="335" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Shared path</text>
  </g>
  
  <!-- Examples Box -->
  <g class="type-box" style="animation-delay: 1.4s" data-narration="Common examples: USB, SATA, PCI, PCIe interfaces">
    <rect x="30" y="250" width="360" height="55" rx="5" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
    <text x="210" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Examples</text>
    <text x="210" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">USB • SATA • PATA • PCI • PCIe • IEEE 1284</text>
  </g>
  
  <!-- Key Functions Box -->
  <g class="type-box" style="animation-delay: 1.6s" data-narration="Key functions: Data transfer, error minimization, performance optimization">
    <rect x="30" y="320" width="360" height="60" rx="5" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>
    <text x="210" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Key Functions</text>
    <text x="210" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Bridge between CPU and external devices</text>
    <text x="210" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Ensures efficient data transfer and error handling</text>
  </g>
  
  <!-- Legend indicators -->
  <circle cx="50" cy="180" r="4" fill="#7eb8da"/>
  <circle cx="175" cy="180" r="4" fill="#9bcfb4"/>
  <circle cx="300" cy="180" r="4" fill="#d4a5c9"/>
</svg>