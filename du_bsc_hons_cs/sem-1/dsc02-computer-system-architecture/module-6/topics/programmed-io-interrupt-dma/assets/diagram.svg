<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="programmed-io-interrupt-dma" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dmaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #777; }
    .box { rx: 8; ry: 8; stroke: #ddd; stroke-width: 2; }
    .cpu-box { fill: url(#cpuGradient); }
    .device-box { fill: url(#deviceGradient); }
    .memory-box { fill: url(#memoryGradient); }
    .dma-box { fill: url(#dmaGradient); }
    .section-bg { fill: #fff; rx: 10; ry: 10; stroke: #e0e0e0; stroke-width: 1; }
    .flow-line { fill: none; stroke: #666; stroke-width: 2; stroke-dasharray: 5,3; animation: flow 1s linear infinite; }
    .animate-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .animate-slide { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animate-fade">Programmed I/O, Interrupt &amp; DMA</text>
  
  <!-- Section 1: Programmed I/O -->
  <g class="animate-slide delay-1" data-narration="Programmed I/O: CPU directly controls data transfer, continuously polling or waiting for device readiness">
    <rect x="10" y="50" width="125" height="160" class="section-bg" />
    <text x="72" y="70" text-anchor="middle" class="section-title">Programmed I/O</text>
    <!-- CPU -->
    <rect x="30" y="85" width="50" height="35" class="box cpu-box" />
    <text x="55" y="107" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CPU</text>
    <!-- Device -->
    <rect x="30" y="155" width="50" height="35" class="box device-box" />
    <text x="55" y="177" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Device</text>
    <!-- Arrows -->
    <path d="M55 120 L55 155" class="flow-line" marker-end="url(#arrowhead)" />
    <path d="M55 190 L55 120" class="flow-line" marker-end="url(#arrowhead)" style="animation-direction: reverse;" />
    <!-- Polling label -->
    <text x="95" y="175" class="detail">Polling/Wait</text>
  </g>
  
  <!-- Section 2: Interrupt -->
  <g class="animate-slide delay-2" data-narration="Interrupt: Device sends interrupt signal to CPU, CPU pauses and executes ISR to handle the request">
    <rect x="148" y="50" width="125" height="160" class="section-bg" />
    <text x="210" y="70" text-anchor="middle" class="section-title">Interrupt</text>
    <!-- CPU -->
    <rect x="168" y="85" width="50" height="35" class="box cpu-box" />
    <text x="193" y="107" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CPU</text>
    <!-- Device -->
    <rect x="168" y="155" width="50" height="35" class="box device-box" />
    <text x="193" y="177" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Device</text>
    <!-- Interrupt signal -->
    <path d="M193 120 L193 130 L230 130 L230 155" class="flow-line" marker-end="url(#arrowhead)" stroke="#e74c3c" />
    <circle cx="230" cy="130" r="4" fill="#e74c3c" class="animate-pulse" />
    <text x="238" y="133" class="detail" fill="#e74c3c">INT!</text>
    <!-- ISR label -->
    <text x="233" y="185" class="detail">ISR</text>
  </g>
  
  <!-- Section 3: DMA -->
  <g class="animate-slide delay-3" data-narration="DMA: Device transfers data directly to/from memory using DMA controller, CPU is free for other tasks">
    <rect x="286" y="50" width="125" height="160" class="section-bg" />
    <text x="348" y="70" text-anchor="middle" class="section-title">DMA</text>
    <!-- CPU -->
    <rect x="306" y="85" width="40" height="30" class="box cpu-box" />
    <text x="326" y="105" text-anchor="middle" fill="white" font-size="10" font-weight="bold">CPU</text>
    <!-- DMA Controller -->
    <rect x="356" y="85" width="40" height="30" class="box dma-box" />
    <text x="376" y="105" text-anchor="middle" fill="white" font-size="9" font-weight="bold">DMA</text>
    <!-- Memory -->
    <rect x="306" y="155" width="40" height="30" class="box memory-box" />
    <text x="326" y="175" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Mem</text>
    <!-- Device -->
    <rect x="356" y="155" width="40" height="30" class="box device-box" />
    <text x="376" y="175" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Dev</text>
    <!-- Direct data path -->
    <path d="M376 130 L376 155" class="flow-line" marker-end="url(#arrowhead)" stroke="#27ae60" />
    <path d="M326 130 L326 155" class="flow-line" marker-end="url(#arrowhead)" />
    <path d="M326 130 L376 130" class="flow-line" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Key Concepts Box -->
  <g class="animate-fade delay-4" data-narration="Key differences: Programmed I/O uses CPU for entire transfer; Interrupt saves CPU time; DMA offloads transfer completely">
    <rect x="10" y="225" width="400" height="70" class="section-bg" fill="#fafafa" />
    <text x="210" y="245" text-anchor="middle" class="section-title" font-size="12">Key Concepts</text>
    <text x="20" y="265" class="label">• <tspan font-weight="bold">Programmed I/O:</tspan> CPU busy-waits, polls device status</text>
    <text x="20" y="280" class="label">• <tspan font-weight="bold">Interrupt:</tspan> Device notifies CPU, ISR handles I/O</text>
    <text x="20" y="295" class="label">• <tspan font-weight="bold">DMA:</tspan> Direct memory transfer, no CPU involvement</text>
  </g>
  
  <!-- Comparison Visual -->
  <g class="animate-slide delay-4" data-narration="CPU utilization comparison: Highest in Programmed I/O, Medium in Interrupt, Lowest in DMA">
    <rect x="10" y="305" width="400" height="85" class="section-bg" />
    <text x="210" y="325" text-anchor="middle" class="section-title" font-size="12">CPU Utilization Comparison</text>
    
    <!-- Bar labels -->
    <text x="30" y="350" class="detail">Prog. I/O</text>
    <text x="130" y="350" class="detail">Interrupt</text>
    <text x="230" y="350" class="detail">DMA</text>
    
    <!-- Bars showing CPU load -->
    <rect x="25" y="355" width="50" height="25" fill="#e74c3c" rx="3" />
    <text x="50" y="372" text-anchor="middle" fill="white" font-size="9">High</text>
    
    <rect x="125" y="365" width="50" height="15" fill="#f39c12" rx="3" />
    <text x="150" y="377" text-anchor="middle" fill="white" font-size="9">Med</text>
    
    <rect x="225" y="370" width="50" height="10" fill="#27ae60" rx="3" />
    <text x="250" y="377" text-anchor="middle" fill="white" font-size="9">Low</text>
    
    <!-- Legend -->
    <text x="300" y="345" class="detail" fill="#555">CPU Involvement:</text>
    <circle cx="315" cy="358" r="4" fill="#e74c3c" />
    <text x="322" y="362" class="detail">Full</text>
    <circle cx="355" cy="358" r="4" fill="#f39c12" />
    <text x="362" y="362" class="detail">Partial</text>
    <circle cx="395" cy="358" r="4" fill="#27ae60" />
    <text x="402" y="362" class="detail">None</text>
  </g>
</svg>