<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="general-register-stack-organization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8bb8d8"/>
    </linearGradient>
    <linearGradient id="registerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8b8"/>
      <stop offset="100%" style="stop-color:#a8d898"/>
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#d8b898"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5aa0; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .section-box { rx: 8; ry: 8; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text fade-in">General Register Stack Organization</text>
  
  <!-- General Registers Section -->
  <g class="slide-left" style="animation-delay: 0.2s;">
    <rect x="30" y="60" width="120" height="150" class="section-box" fill="url(#registerGradient)" filter="url(#shadow)"/>
    <text x="90" y="80" text-anchor="middle" class="label-text" font-weight="bold">General Registers</text>
    <line x1="40" y1="90" x2="140" y2="90" stroke="#888" stroke-width="1"/>
    
    <g class="pulse" style="animation-delay: 1s;">
      <rect x="40" y="100" width="100" height="18" fill="#fff" stroke="#6a8"/>
      <text x="90" y="113" text-anchor="middle" class="detail-text">R0</text>
    </g>
    <rect x="40" y="122" width="100" height="18" fill="#fff" stroke="#6a8"/>
    <text x="90" y="135" text-anchor="middle" class="detail-text">R1</text>
    <rect x="40" y="144" width="100" height="18" fill="#fff" stroke="#6a8"/>
    <text x="90" y="157" text-anchor="middle" class="detail-text">R2</text>
    <rect x="40" y="166" width="100" height="18" fill="#fff" stroke="#6a8"/>
    <text x="90" y="179" text-anchor="middle" class="detail-text">R3</text>
  </g>
  
  <!-- Stack Section -->
  <g class="slide-right" style="animation-delay: 0.4s;">
    <rect x="200" y="60" width="120" height="180" class="section-box" fill="url(#stackGradient)" filter="url(#shadow)"/>
    <text x="260" y="80" text-anchor="middle" class="label-text" font-weight="bold">Stack Memory</text>
    <line x1="210" y1="90" x2="310" y2="90" stroke="#888" stroke-width="1"/>
    
    <!-- Stack cells -->
    <g class="pulse" style="animation-delay: 1.2s;">
      <rect x="210" y="100" width="100" height="20" fill="#fff" stroke="#68a" rx="3"/>
      <text x="260" y="114" text-anchor="middle" class="detail-text">Data 4 (TOP)</text>
    </g>
    <rect x="210" y="124" width="100" height="20" fill="#fff" stroke="#68a" rx="3"/>
    <text x="260" y="138" text-anchor="middle" class="detail-text">Data 3</text>
    <rect x="210" y="148" width="100" height="20" fill="#fff" stroke="#68a" rx="3"/>
    <text x="260" y="162" text-anchor="middle" class="detail-text">Data 2</text>
    <rect x="210" y="172" width="100" height="20" fill="#fff" stroke="#68a" rx="3"/>
    <text x="260" y="186" text-anchor="middle" class="detail-text">Data 1</text>
    <rect x="210" y="196" width="100" height="20" fill="#fff" stroke="#68a" rx="3"/>
    <text x="260" y="210" text-anchor="middle" class="detail-text">Base</text>
  </g>
  
  <!-- Stack Pointer Section -->
  <g class="slide-up" style="animation-delay: 0.6s;">
    <rect x="340" y="100" width="70" height="50" class="section-box" fill="#f8e8d8" stroke="#c8a878" filter="url(#shadow)"/>
    <text x="375" y="118" text-anchor="middle" class="label-text" font-weight="bold">SP</text>
    <text x="375" y="138" text-anchor="middle" class="detail-text">→ Data 4</text>
  </g>
  
  <!-- Stack Frame Section -->
  <g class="slide-up" style="animation-delay: 0.8s;">
    <rect x="200" y="260" width="120" height="40" class="section-box" fill="url(#frameGradient)" filter="url(#shadow)"/>
    <text x="260" y="280" text-anchor="middle" class="label-text" font-weight="bold">Stack Frame</text>
    <text x="260" y="295" text-anchor="middle" class="detail-text">Local variables, Return addr</text>
  </g>
  
  <!-- Push/Pop Arrows -->
  <g class="arrow-anim">
    <!-- Push arrow (up) -->
    <path d="M90 220 L90 250 L260 250 L260 230" fill="none" stroke="#5a8" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="175" y="245" class="detail-text" fill="#5a8">PUSH</text>
    
    <!-- Pop arrow (down) -->
    <path d="M260 95 L260 70 L90 70 L90 90" fill="none" stroke="#d88" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="145" y="65" class="detail-text" fill="#d88">POP</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Connection arrows -->
  <g class="fade-in" style="animation-delay: 1s;">
    <!-- Register to Stack -->
    <path d="M150 130 L195 130" stroke="#668" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="190,125 200,130 190,135" fill="#668"/>
    
    <!-- SP to Stack top -->
    <path d="M335 125 L310 110" stroke="#a88" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="312,107 320,112 315,118" fill="#a88"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fade-in" style="animation-delay: 1.2s;">
    <rect x="30" y="315" width="360" height="70" fill="#f8f8f8" stroke="#ccc" rx="5"/>
    <text x="40" y="335" class="label-text" font-weight="bold">Key Concepts:</text>
    <text x="40" y="355" class="detail-text">• LIFO: Last-In-First-Out principle</text>
    <text x="40" y="370" class="detail-text">• SP tracks top of stack • Push adds, Pop removes</text>
    <text x="220" y="370" class="detail-text">• Stack frame: memory block</text>
  </g>
  
  <!-- Narration elements (hidden but accessible) -->
  <title data-narration="title">General Register Stack Organization - Shows how registers interact with stack memory using push/pop operations</title>
  <desc data-narration="registers">General Registers R0-R3: Temporary storage for data being processed by CPU</desc>
  <desc data-narration="stack">Stack Memory: LIFO data structure growing downward</desc>
  <desc data-narration="sp">Stack Pointer (SP): Register pointing to current top of stack</desc>
  <desc data-narration="frame">Stack Frame: Memory block for function calls containing local variables and return addresses</desc>
  <desc data-narration="pushpop">Push/Pop Operations: Transfer data between registers and stack memory</desc>
</svg>