<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="addressing-modes" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#dfe9f3"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fab1a0"/>
      <stop offset="100%" style="stop-color:#e17055"/>
    </linearGradient>
    <linearGradient id="boxGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d3436; }
    .label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2d3436; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #636e72; }
    .code { font-family: monospace; font-size: 9px; fill: #2d3436; font-weight: bold; }
    .section-box { rx: 6; ry: 6; stroke: #b2bec3; stroke-width: 1; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2.5s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1.0s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Addressing Modes</text>
  
  <g class="anim-pulse" data-narration="CPU processes instructions using various addressing modes">
    <rect x="170" y="40" width="80" height="30" rx="4" fill="#74b9ff" stroke="#0984e3" stroke-width="1.5"/>
    <text x="210" y="60" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">CPU</text>
  </g>
  
  <!-- Memory visualization -->
  <g class="anim-fade delay-2" data-narration="Memory stores data at specific addresses">
    <rect x="40" y="100" width="40" height="180" rx="3" fill="#dfe6e9" stroke="#636e72" stroke-width="1"/>
    <text x="60" y="115" text-anchor="middle" class="detail" font-weight="bold">MEM</text>
    <line x1="45" y1="125" x2="75" y2="125" stroke="#b2bec3" stroke-width="1"/>
    <line x1="45" y1="145" x2="75" y2="145" stroke="#b2bec3" stroke-width="1"/>
    <line x1="45" y1="165" x2="75" y2="165" stroke="#b2bec3" stroke-width="1"/>
    <line x1="45" y1="185" x2="75" y2="185" stroke="#b2bec3" stroke-width="1"/>
    <line x1="45" y1="205" x2="75" y2="205" stroke="#b2bec3" stroke-width="1"/>
    <line x1="45" y1="225" x2="75" y2="225" stroke="#b2bec3" stroke-width="1"/>
    <line x1="45" y1="245" x2="75" y2="245" stroke="#b2bec3" stroke-width="1"/>
    <line x1="45" y1="265" x2="75" y2="265" stroke="#b2bec3" stroke-width="1"/>
    <text x="60" y="248" text-anchor="middle" class="detail">1000</text>
    <text x="60" y="208" text-anchor="middle" class="detail">2000</text>
  </g>
  
  <!-- Register visualization -->
  <g class="anim-fade delay-2" data-narration="Registers are fast internal storage locations">
    <rect x="340" y="100" width="60" height="140" rx="3" fill="#dfe6e9" stroke="#636e72" stroke-width="1"/>
    <text x="370" y="115" text-anchor="middle" class="detail" font-weight="bold">REGISTERS</text>
    <rect x="348" y="125" width="44" height="16" rx="2" fill="#ffeaa7" stroke="#fdcb6e"/>
    <text x="370" y="136" text-anchor="middle" class="detail">AX</text>
    <rect x="348" y="145" width="44" height="16" rx="2" fill="#ffeaa7" stroke="#fdcb6e"/>
    <text x="370" y="156" text-anchor="middle" class="detail">BX</text>
    <rect x="348" y="165" width="44" height="16" rx="2" fill="#ffeaa7" stroke="#fdcb6e"/>
    <text x="370" y="176" text-anchor="middle" class="detail">CX</text>
    <rect x="348" y="185" width="44" height="16" rx="2" fill="#ffeaa7" stroke="#fdcb6e"/>
    <text x="370" y="196" text-anchor="middle" class="detail">DX</text>
  </g>
  
  <!-- Immediate Addressing -->
  <g class="anim-slide-left delay-1" data-narration="Immediate: Operand value is directly in the instruction">
    <rect x="100" y="100" width="110" height="55" rx="5" fill="url(#boxGrad1)" class="section-box"/>
    <text x="155" y="118" text-anchor="middle" class="label">Immediate</text>
    <text x="155" y="133" text-anchor="middle" class="code">MOV AX, 10</text>
    <text x="155" y="147" text-anchor="middle" class="detail">Value 10 in instruction</text>
  </g>
  
  <!-- Direct Addressing -->
  <g class="anim-slide-left delay-2" data-narration="Direct: Address is specified in instruction">
    <rect x="100" y="165" width="110" height="55" rx="5" fill="url(#boxGrad2)" class="section-box"/>
    <text x="155" y="183" text-anchor="middle" class="label">Direct</text>
    <text x="155" y="198" text-anchor="middle" class="code">MOV AX, [1000]</text>
    <text x="155" y="212" text-anchor="middle" class="detail">Address 1000 in memory</text>
  </g>
  
  <!-- Indirect Addressing -->
  <g class="anim-slide-left delay-3" data-narration="Indirect: Register points to memory address">
    <rect x="100" y="230" width="110" height="55" rx="5" fill="url(#boxGrad3)" class="section-box"/>
    <text x="155" y="248" text-anchor="middle" class="label">Indirect</text>
    <text x="155" y="263" text-anchor="middle" class="code">MOV AX, [BX]</text>
    <text x="155" y="277" text-anchor="middle" class="detail">BX holds address</text>
  </g>
  
  <!-- Register Addressing -->
  <g class="anim-slide-right delay-3" data-narration="Register: Operand is in a register">
    <rect x="250" y="100" width="110" height="55" rx="5" fill="url(#boxGrad4)" class="section-box"/>
    <text x="305" y="118" text-anchor="middle" class="label">Register</text>
    <text x="305" y="133" text-anchor="middle" class="code">MOV AX, BX</text>
    <text x="305" y="147" text-anchor="middle" class="detail">Copy BX to AX</text>
  </g>
  
  <!-- Indexed Addressing -->
  <g class="anim-slide-right delay-4" data-narration="Indexed: Base address plus index register">
    <rect x="250" y="165" width="110" height="55" rx="5" fill="url(#boxGrad5)" class="section-box"/>
    <text x="305" y="183" text-anchor="middle" class="label">Indexed</text>
    <text x="305" y="198" text-anchor="middle" class="code">MOV AX, [BX+SI]</text>
    <text x="305" y="212" text-anchor="middle" class="detail">Base + Index offset</text>
  </g>
  
  <!-- Arrow connections -->
  <g class="anim-fade delay-5" data-narration="Arrows show data flow between CPU, memory and registers">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 L0,0" fill="#636e72"/>
      </marker>
    </defs>
    <!-- CPU to Immediate box -->
    <line x1="210" y1="70" x2="155" y2="100" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,2"/>
    <!-- CPU to Direct box -->
    <line x1="190" y1="85" x2="80" y2="145" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,2"/>
    <!-- CPU to Indirect box -->
    <line x1="190" y1="85" x2="80" y2="210" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,2"/>
    <!-- CPU to Register box -->
    <line x1="250" y1="55" x2="340" y2="85" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,2"/>
    <!-- CPU to Indexed box -->
    <line x1="250" y1="70" x2="300" y2="100" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Legend -->
  <g class="anim-slide-up delay-5" data-narration="Five main addressing modes for data access">
    <rect x="140" y="300" width="140" height="85" rx="5" fill="white" stroke="#b2bec3" stroke-width="1" opacity="0.9"/>
    <text x="210" y="318" text-anchor="middle" class="label" font-size="11">Key Concepts</text>
    <circle cx="155" cy="335" r="4" fill="#fdcb6e"/>
    <text x="165" y="338" class="detail">Immediate: Constant in instruction</text>
    <circle cx="155" cy="350" r="4" fill="#00cec9"/>
    <text x="165" y="353" class="detail">Direct: Address in memory</text>
    <circle cx="155" cy="365" r="4" fill="#6c5ce7"/>
    <text x="165" y="368" class="detail">Indirect: Pointer to address</text>
    <circle cx="155" cy="380" r="4" fill="#e17055"/>
    <text x="165" y="383" class="detail">Register: Data in CPU register</text>
  </g>
</svg>