<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="risc-vs-cisc" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="riscGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1"/>
</linearGradient>
<linearGradient id="ciscGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1"/>
</linearGradient>
<linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" style="stop-color:#fafafa;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#eceff1;stop-opacity:1"/>
</linearGradient>
</defs>
<style>
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(-15px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.fade-in{animation:fadeIn 1s ease-out forwards}
.slide-in{animation:slideIn 0.7s ease-out forwards}
.pulse{animation:pulse 2s ease-in-out infinite;transform-origin:center}
.title{font-family:Arial,Helvetica,sans-serif;font-weight:bold}
.label{font-family:Arial,Helvetica,sans-serif}
</style>
<rect width="420" height="400" fill="url(#bgGradient)"/>
<text x="210" y="28" text-anchor="middle" class="title" font-size="20" fill="#37474f" data-narration="Title: RISC vs CISC Architectures">RISC vs CISC</text>
<line x1="20" y1="38" x2="400" y2="38" stroke="#90a4ae" stroke-width="1"/>
<g data-narration="RISC Architecture - Simplified instruction set with pipelining">
<rect x="20" y="50" width="175" height="155" fill="url(#riscGradient)" rx="8" stroke="#81c784" stroke-width="1"/>
<text x="107" y="70" text-anchor="middle" class="title" font-size="16" fill="#2e7d32">RISC</text>
<text x="107" y="85" text-anchor="middle" class="label" font-size="10" fill="#388e3c">Reduced Instruction Set</text>
<g class="slide-in" style="animation-delay:0.2s">
<circle cx="32" cy="105" r="4" fill="#43a047"/>
<text x="42" y="109" class="label" font-size="11" fill="#333">Simplified instruction set</text>
</g>
<g class="slide-in" style="animation-delay:0.35s">
<circle cx="32" cy="125" r="4" fill="#43a047"/>
<text x="42" y="129" class="label" font-size="11" fill="#333">Load/Store architecture</text>
</g>
<g class="slide-in" style="animation-delay:0.5s">
<circle cx="32" cy="145" r="4" fill="#43a047"/>
<text x="42" y="149" class="label" font-size="11" fill="#333">Pipelining for performance</text>
</g>
<g class="slide-in" style="animation-delay:0.65s">
<circle cx="32" cy="165" r="4" fill="#43a047"/>
<text x="42" y="169" class="label" font-size="11" fill="#333">Power efficient design</text>
</g>
<text x="107" y="192" text-anchor="middle" class="label" font-size="10" fill="#2e7d32" font-weight="bold">Ex: ARM, PowerPC, SPARC</text>
</g>
<g data-narration="CISC Architecture - Complex instruction set with microcode">
<rect x="205" y="50" width="175" height="155" fill="url(#ciscGradient)" rx="8" stroke="#ffb74d" stroke-width="1"/>
<text x="292" y="70" text-anchor="middle" class="title" font-size="16" fill="#e65100">CISC</text>
<text x="292" y="85" text-anchor="middle" class="label" font-size="10" fill="#ef6c00">Complex Instruction Set</text>
<g class="slide-in" style="animation-delay:0.25s">
<circle cx="217" cy="105" r="4" fill="#fb8c00"/>
<text x="227" y="109" class="label" font-size="11" fill="#333">Large instruction set</text>
</g>
<g class="slide-in" style="animation-delay:0.4s">
<circle cx="217" cy="125" r="4" fill="#fb8c00"/>
<text x="227" y="129" class="label" font-size="11" fill="#333">Microcode-based approach</text>
</g>
<g class="slide-in" style="animation-delay:0.55s">
<circle cx="217" cy="145" r="4" fill="#fb8c00"/>
<text x="227" y="149" class="label" font-size="11" fill="#333">Multi-task instructions</text>
</g>
<g class="slide-in" style="animation-delay:0.7s">
<circle cx="217" cy="165" r="4" fill="#fb8c00"/>
<text x="227" y="169" class="label" font-size="11" fill="#333">Complex tasks efficient</text>
</g>
<text x="292" y="192" text-anchor="middle" class="label" font-size="10" fill="#e65100" font-weight="bold">Ex: x86, x64</text>
</g>
<g data-narration="RISC Pipeline - Three stage pipeline showing instruction flow">
<rect x="20" y="215" width="175" height="90" fill="#e3f2fd" rx="8" stroke="#64b5f6" stroke-width="1"/>
<text x="107" y="233" text-anchor="middle" class="title" font-size="12" fill="#1565c0">RISC Pipeline</text>
<g class="fade-in" style="animation-delay:0.8s">
<rect x="30" y="242" width="40" height="22" fill="#42a5f5" rx="3" class="pulse"/>
<text x="50" y="257" text-anchor="middle" class="label" font-size="9" fill="white">IF</text>
<text x="50" y="273" text-anchor="middle" class="label" font-size="8" fill="#1976d2">Fetch</text>
</g>
<g class="fade-in" style="animation-delay:1s">
<rect x="77" y="242" width="40" height="22" fill="#42a5f5" rx="3" class="pulse"/>
<text x="97" y="257" text-anchor="middle" class="label" font-size="9" fill="white">ID</text>
<text x="97" y="273" text-anchor="middle" class="label" font-size="8" fill="#1976d2">Decode</text>
</g>
<g class="fade-in" style="animation-delay:1.2s">
<rect x="124" y="242" width="40" height="22" fill="#42a5f5" rx="3" class="pulse"/>
<text x="144" y="257" text-anchor="middle" class="label" font-size="9" fill="white">EX</text>
<text x="144" y="273" text-anchor="middle" class="label" font-size="8" fill="#1976d2">Execute</text>
</g>
<path d="M70 253 L77 253" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
<path d="M117 253 L124 253" stroke="#64b5f6" stroke-width="2" fill="none"/>
</g>
<g data-narration="CISC Execution - Complex instruction broken into micro-operations">
<rect x="205" y="215" width="175" height="90" fill="#fce4ec" rx="8" stroke="#f48fb1" stroke-width="1"/>
<text x="292" y="233" text-anchor="middle" class="title" font-size="12" fill="#c62828">CISC Execution</text>
<g class="fade-in" style="animation-delay:0.9s">
<rect x="220" y="245" width="80" height="28" fill="#ec407a" rx="4"/>
<text x="260" y="263" text-anchor="middle" class="label" font-size="10" fill="white">Complex Inst</text>
</g>
<g class="fade-in" style="animation-delay:1.1s">
<path d="M260 273 L260 290" stroke="#f48fb1" stroke-width="2" stroke-dasharray="3,2"/>
<polygon points="260,295 255,285 265,285" fill="#f48fb1"/>
</g>
<g class="fade-in" style="animation-delay:1.3s">
<rect x="225" y="300" width="30" height="18" fill="#ba68c8" rx="2"/>
<text x="240" y="313" text-anchor="middle" class="label" font-size="8" fill="white">µop1</text>
<rect x="260" y="300" width="30" height="18" fill="#ba68c8" rx="2"/>
<text x="275" y="313" text-anchor="middle" class="label" font-size="8" fill="white">µop2</text>
<rect x="295" y="300" width="30" height="18" fill="#ba68c8" rx="2"/>
<text x="310" y="313" text-anchor="middle" class="label" font-size="8" fill="white">µop3</text>
</g>
</g>
<g data-narration="Comparison Summary - Key differences between RISC and CISC">
<rect x="20" y="315" width="360" height="75" fill="white" rx="8" stroke="#cfd8dc" stroke-width="1"/>
<text x="200" y="335" text-anchor="middle" class="title" font-size="13" fill="#37474f">Comparison Summary</text>
<g class="fade-in" style="animation-delay:1.4s">
<rect x="30" y="348" width="80" height="32" fill="#c8e6c9" rx="4"/>
<text x="70" y="362" text-anchor="middle" class="label" font-size="10" fill="#2e7d32" font-weight="bold">RISC</text>
<text x="70" y="374" text-anchor="middle" class="label" font-size="9" fill="#333">Fast clock, efficient</text>
</g>
<g class="fade-in" style="animation-delay:1.5s">
<rect x="160" y="348" width="80" height="32" fill="#ffe0b2" rx="4"/>
<text x="200" y="362" text-anchor="middle" class="label" font-size="10" fill="#e65100" font-weight="bold">CISC</text>
<text x="200" y="374" text-anchor="middle" class="label" font-size="9" fill="#333">More functionality</text>
</g>
<g class="fade-in" style="animation-delay:1.6s">
<rect x="290" y="348" width="80" height="32" fill="#e1bee7" rx="4"/>
<text x="330" y="362" text-anchor="middle" class="label" font-size="10" fill="#6a1b9a" font-weight="bold">Usage</text>
<text x="330" y="374" text-anchor="middle" class="label" font-size="9" fill="#333">Mobile vs Desktop</text>
</g>
</g>
</svg>