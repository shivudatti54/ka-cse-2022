<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="multicore-processor-and-gpu">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
    <linearGradient id="cacheGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e79f"/>
      <stop offset="100%" style="stop-color:#f7dc6f"/>
    </linearGradient>
    <linearGradient id="sharedCacheGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#abebc6"/>
      <stop offset="100%" style="stop-color:#58d68d"/>
    </linearGradient>
    <linearGradient id="busGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e59866"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .section-5 { animation: slideIn 0.6s ease-out 1.0s forwards; opacity: 0; }
    .core { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .core:hover { cursor: pointer; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Multicore Processor Architecture</text>
  <text x="210" y="50" text-anchor="middle" font-size="12" fill="#5d6d7e" class="title">Quad-Core with Shared L3 Cache</text>
  
  <!-- CPU Cores Section -->
  <g class="section-1" data-narration="Four independent CPU cores, each with private L1 and L2 caches">
    <!-- Core 1 -->
    <rect x="30" y="75" width="85" height="70" rx="8" fill="url(#coreGradient)" stroke="#2980b9" stroke-width="2"/>
    <text x="72" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Core 0</text>
    <rect x="38" y="108" width="32" height="18" rx="3" fill="#f9e79f"/>
    <text x="54" y="121" text-anchor="middle" font-size="9" fill="#7d6608">L1</text>
    <rect x="75" y="108" width="32" height="18" rx="3" fill="#f7dc6f"/>
    <text x="91" y="121" text-anchor="middle" font-size="9" fill="#7d6608">L2</text>
    
    <!-- Core 2 -->
    <rect x="125" y="75" width="85" height="70" rx="8" fill="url(#coreGradient)" stroke="#2980b9" stroke-width="2"/>
    <text x="167" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Core 1</text>
    <rect x="133" y="108" width="32" height="18" rx="3" fill="#f9e79f"/>
    <text x="149" y="121" text-anchor="middle" font-size="9" fill="#7d6608">L1</text>
    <rect x="170" y="108" width="32" height="18" rx="3" fill="#f7dc6f"/>
    <text x="186" y="121" text-anchor="middle" font-size="9" fill="#7d6608">L2</text>
    
    <!-- Core 3 -->
    <rect x="220" y="75" width="85" height="70" rx="8" fill="url(#coreGradient)" stroke="#2980b9" stroke-width="2"/>
    <text x="262" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Core 2</text>
    <rect x="228" y="108" width="32" height="18" rx="3" fill="#f9e79f"/>
    <text x="244" y="121" text-anchor="middle" font-size="9" fill="#7d6608">L1</text>
    <rect x="265" y="108" width="32" height="18" rx="3" fill="#f7dc6f"/>
    <text x="281" y="121" text-anchor="middle" font-size="9" fill="#7d6608">L2</text>
    
    <!-- Core 4 -->
    <rect x="315" y="75" width="85" height="70" rx="8" fill="url(#coreGradient)" stroke="#2980b9" stroke-width="2"/>
    <text x="357" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Core 3</text>
    <rect x="323" y="108" width="32" height="18" rx="3" fill="#f9e79f"/>
    <text x="339" y="121" text-anchor="middle" font-size="9" fill="#7d6608">L1</text>
    <rect x="360" y="108" width="32" height="18" rx="3" fill="#f7dc6f"/>
    <text x="376" y="121" text-anchor="middle" font-size="9" fill="#7d6608">L2</text>
  </g>
  
  <!-- Shared L3 Cache -->
  <g class="section-2" data-narration="Shared L3 cache accessible by all cores for efficient data sharing">
    <rect x="145" y="160" width="140" height="45" rx="8" fill="url(#sharedCacheGradient)" stroke="#1e8449" stroke-width="2"/>
    <text x="215" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#145a32">Shared L3 Cache</text>
  </g>
  
  <!-- Interconnect/Bus -->
  <g class="section-3" data-narration="System bus connecting cores to memory and I/O controllers">
    <rect x="145" y="220" width="140" height="25" rx="5" fill="url(#busGradient)" stroke="#a04000" stroke-width="1.5"/>
    <text x="215" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="white">System Interconnect</text>
    
    <!-- Connection lines -->
    <line x1="72" y1="145" x2="72" y2="220" stroke="#e67e22" stroke-width="2" stroke-dasharray="4"/>
    <line x1="167" y1="145" x2="167" y2="220" stroke="#e67e22" stroke-width="2" stroke-dasharray="4"/>
    <line x1="262" y1="145" x2="262" y2="220" stroke="#e67e22" stroke-width="2" stroke-dasharray="4"/>
    <line x1="357" y1="145" x2="357" y2="220" stroke="#e67e22" stroke-width="2" stroke-dasharray="4"/>
    <line x1="215" y1="205" x2="215" y2="220" stroke="#e67e22" stroke-width="2" stroke-dasharray="4"/>
  </g>
  
  <!-- Memory Controller -->
  <g class="section-4" data-narration="Memory controller managing data flow between cores and RAM">
    <rect x="30" y="260" width="85" height="45" rx="8" fill="#a569bd" stroke="#6c3483" stroke-width="2"/>
    <text x="72" y="283" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Memory</text>
    <text x="72" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Controller</text>
    
    <!-- I/O Controller -->
    <rect x="125" y="260" width="85" height="45" rx="8" fill="#e74c3c" stroke="#922b21" stroke-width="2"/>
    <text x="167" y="283" text-anchor="middle" font-size="12" font-weight="bold" fill="white">I/O</text>
    <text x="167" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Controller</text>
    
    <!-- Main Memory -->
    <rect x="220" y="260" width="100" height="45" rx="8" fill="#85c1e9" stroke="#2471a3" stroke-width="2"/>
    <text x="270" y="283" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">System RAM</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-5" data-narration="Key architectural features: SMP architecture, cache hierarchy, parallel processing">
    <rect x="15" y="320" width="195" height="70" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1.5" opacity="0.9"/>
    <text x="22" y="340" font-size="12" font-weight="bold" fill="#2c3e50">Key Concepts:</text>
    <text x="22" y="358" font-size="10" fill="#34495e">• Symmetric Multiprocessing (SMP)</text>
    <text x="22" y="374" font-size="10" fill="#34495e">• Cache Hierarchy: L1/L2 private,</text>
    <text x="30" y="386" font-size="10" fill="#34495e">L3 shared</text>
    
    <!-- Performance Arrow -->
    <g>
      <path d="M 230 340 Q 280 340 310 350 Q 340 360 380 355" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
      <text x="310" y="330" font-size="11" font-weight="bold" fill="#27ae60">Parallel</text>
      <text x="310" y="342" font-size="11" font-weight="bold" fill="#27ae60">Processing</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g>
    <rect x="300" y="320" width="110" height="70" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1" opacity="0.85"/>
    <text x="355" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Legend</text>
    <rect x="308" y="343" width="12" height="12" fill="#5dade2"/>
    <text x="324" y="353" font-size="9" fill="#34495e">CPU Core</text>
    <rect x="308" y="358" width="12" height="12" fill="#f9e79f"/>
    <text x="324" y="368" font-size="9" fill="#34495e">L1/L2 Cache</text>
    <rect x="308" y="373" width="12" height="12" fill="#abebc6"/>
    <text x="324" y="383" font-size="9" fill="#34495e">Shared L3</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
</svg>