<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="polymorphism-overloading">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="operatorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .slide-left { animation: slideInLeft 0.7s ease-out forwards; }
    .title { font-family: 'Segoe UI', sans-serif; font-weight: bold; }
    .label { font-family: 'Segoe UI', sans-serif; font-weight: 600; }
    .detail { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Main Title -->
  <g class="slide-in" style="animation-delay: 0.1s;">
    <rect x="10" y="10" width="400" height="45" rx="8" fill="url(#mainGrad)" filter="url(#shadow)"/>
    <text x="210" y="42" text-anchor="middle" fill="white" font-size="22" class="title">Polymorphism Overloading</text>
  </g>
  
  <!-- Polymorphism Main Box -->
  <g class="fade-in" style="animation-delay: 0.3s;">
    <rect x="140" y="70" width="140" height="35" rx="6" fill="#2d3436" filter="url(#shadow)"/>
    <text x="210" y="93" text-anchor="middle" fill="white" font-size="16" class="title">POLYMORPHISM</text>
    <text x="210" y="118" text-anchor="middle" fill="#636e72" font-size="11">Ability to take multiple forms</text>
  </g>
  
  <!-- Arrow down from Polymorphism -->
  <g class="fade-in" style="animation-delay: 0.5s;">
    <path d="M210 125 L210 145" stroke="#2d3436" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="210,150 205,140 215,140" fill="#2d3436"/>
  </g>
  
  <!-- Classification Types -->
  <g class="slide-in" style="animation-delay: 0.6s;">
    <rect x="10" y="155" width="185" height="55" rx="6" fill="url(#compileGrad)" filter="url(#shadow)" data-narration="Compile-time (Static) Polymorphism - Method Overloading achieved through default arguments and variable-length arguments"/>
    <text x="102" y="175" text-anchor="middle" fill="#2d3436" font-size="14" class="label">Compile-Time (Static)</text>
    <text x="102" y="192" text-anchor="middle" fill="#2d3436" font-size="11">Method Overloading</text>
    <text x="102" y="205" text-anchor="middle" fill="#5a4a00" font-size="10" class="detail">def add(a, b=0, c=0)</text>
  </g>
  
  <g class="slide-left" style="animation-delay: 0.7s;">
    <rect x="225" y="155" width="185" height="55" rx="6" fill="url(#runtimeGrad)" filter="url(#shadow)" data-narration="Runtime (Dynamic) Polymorphism - Method Overriding and Duck Typing in Python"/>
    <text x="317" y="175" text-anchor="middle" fill="#2d3436" font-size="14" class="label">Runtime (Dynamic)</text>
    <text x="317" y="192" text-anchor="middle" fill="#2d3436" font-size="11">Method Overriding</text>
    <text x="317" y="205" text-anchor="middle" fill="#005554" font-size="10" class="detail">class Child(Parent)</text>
  </g>
  
  <!-- Sub-details boxes -->
  <g class="fade-in" style="animation-delay: 0.9s;">
    <rect x="10" y="220" width="90" height="50" rx="5" fill="#fff3cd" stroke="#fdcb6e" stroke-width="1" data-narration="Default Arguments - Provide default values for optional parameters"/>
    <text x="55" y="238" text-anchor="middle" fill="#6c5a00" font-size="11" class="label">Default Args</text>
    <text x="55" y="255" text-anchor="middle" fill="#5a4a00" font-size="9" class="detail">def f(a=1)</text>
  </g>
  
  <g class="fade-in" style="animation-delay: 1.0s;">
    <rect x="110" y="220" width="90" height="50" rx="5" fill="#d1ecf1" stroke="#00cec9" stroke-width="1" data-narration="Variable-Length Arguments - *args and **kwargs for flexible parameter lists"/>
    <text x="155" y="238" text-anchor="middle" fill="#004d4d" font-size="11" class="label">*args</text>
    <text x="155" y="255" text-anchor="middle" fill="#005554" font-size="9" class="detail">def f(*args)</text>
  </g>
  
  <g class="fade-in" style="animation-delay: 1.1s;">
    <rect x="225" y="220" width="90" height="50" rx="5" fill="#e8daef" stroke="#a29bfe" stroke-width="1" data-narration="Duck Typing - If it walks like a duck..."/>
    <text x="270" y="238" text-anchor="middle" fill="#4a2c7a" font-size="11" class="label">Duck Typing</text>
    <text x="270" y="255" text-anchor="middle" fill="#3d2566" font-size="9" class="detail">"If it quacks..."</text>
  </g>
  
  <g class="fade-in" style="animation-delay: 1.2s;">
    <rect x="325" y="220" width="85" height="50" rx="5" fill="#f5c6cb" stroke="#e17055" stroke-width="1" data-narration="Method Overriding - Subclass provides specific implementation of parent method"/>
    <text x="367" y="238" text-anchor="middle" fill="#7f2a2a" font-size="10" class="label">Override</text>
    <text x="367" y="255" text-anchor="middle" fill="#6b2222" font-size="9" class="detail">def method()</text>
  </g>
  
  <!-- Operator Overloading Section -->
  <g class="pulse" style="animation-delay: 1.3s;">
    <rect x="85" y="285" width="250" height="40" rx="6" fill="url(#operatorGrad)" filter="url(#shadow)" data-narration="Operator Overloading - Custom behavior for operators using dunder methods like __add__, __mul__"/>
    <text x="210" y="307" text-anchor="middle" fill="white" font-size="14" class="label">Operator Overloading</text>
    <text x="210" y="321" text-anchor="middle" fill="#f0f0f0" font-size="10" class="detail">__add__, __mul__, __str__ ... (Dunder Methods)</text>
  </g>
  
  <!-- Python Note -->
  <g class="fade-in" style="animation-delay: 1.5s;">
    <rect x="20" y="335" width="380" height="50" rx="6" fill="#fff" stroke="#b2bec3" stroke-width="1" stroke-dasharray="4,2" data-narration="Python Note - Python uses dynamic typing and achieves overloading through these techniques rather than traditional compile-time overloading"/>
    <text x="210" y="355" text-anchor="middle" fill="#2d3436" font-size="12" class="label">Python Note:</text>
    <text x="210" y="372" text-anchor="middle" fill="#636e72" font-size="10">Dynamic typing enables polymorphism via duck typing, overriding,</text>
    <text x="210" y="382" text-anchor="middle" fill="#636e72" font-size="10">default args, and dunder methods</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="200" cy="125" r="4" fill="#0984e3" class="pulse" style="animation-delay: 1.4s;"/>
  <circle cx="220" cy="125" r="4" fill="#0984e3" class="pulse" style="animation-delay: 1.6s;"/>
</svg>