<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="constructors-and-methods">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="classBoxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="methodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="constructorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="objectGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .class-box { animation: slideInUp 0.6s ease-out; }
    .method-box { animation: slideIn 0.7s ease-out 0.2s both; }
    .constructor-box { animation: slideIn 0.7s ease-out 0.3s both; }
    .object-box { animation: slideIn 0.7s ease-out 0.4s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .pulse-element { animation: pulse 3s infinite; }
    .key-concept { animation: fadeIn 0.5s ease-out; }
    .key-concept:nth-child(1) { animation-delay: 0.5s; }
    .key-concept:nth-child(2) { animation-delay: 0.7s; }
    .key-concept:nth-child(3) { animation-delay: 0.9s; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b" class="title">Constructors &amp; Methods</text>
  <text x="210" y="50" text-anchor="middle" font-size="12" fill="#64748b" class="title">Python OOP Fundamentals</text>
  
  <!-- Class Diagram Box -->
  <g class="class-box" filter="url(#shadow)">
    <rect x="20" y="70" width="180" height="160" rx="8" fill="url(#classBoxGradient)"/>
    <text x="110" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Person</text>
    <line x1="20" y1="100" x2="200" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Constructor Section -->
    <g class="constructor-box">
      <rect x="25" y="105" width="170" height="35" rx="4" fill="url(#constructorGradient)"/>
      <text x="30" y="120" font-size="11" fill="white" font-family="monospace">def __init__(self, name, age):</text>
      <text x="30" y="133" font-size="10" fill="#fecaca" font-family="monospace">self.name = name</text>
    </g>
    
    <!-- Methods Section -->
    <g class="method-box">
      <rect x="25" y="145" width="170" height="30" rx="4" fill="url(#methodGradient)"/>
      <text x="30" y="160" font-size="11" fill="white" font-family="monospace">def greet(self):</text>
      <text x="30" y="172" font-size="10" fill="#a7f3d0" font-family="monospace">return f"Hello, {self.name}"</text>
    </g>
  </g>
  
  <!-- Arrow to Object -->
  <g class="arrow">
    <path d="M 210 150 L 270 150" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="265,145 275,150 265,155" fill="#64748b"/>
  </g>
  
  <!-- Object Instance -->
  <g class="object-box" filter="url(#shadow)">
    <rect x="280" y="110" width="120" height="80" rx="8" fill="url(#objectGradient)"/>
    <text x="340" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">person1</text>
    <line x1="280" y1="140" x2="400" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="290" y="158" font-size="10" fill="white" font-family="monospace">name: "Alice"</text>
    <text x="290" y="173" font-size="10" fill="white" font-family="monospace">age: 25</text>
  </g>
  
  <!-- Method Types Legend -->
  <g transform="translate(20, 250)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#334155">Method Types:</text>
    
    <!-- Instance Method -->
    <g class="key-concept">
      <rect x="0" y="15" width="110" height="28" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
      <circle cx="15" cy="29" r="6" fill="#6366f1"/>
      <text x="25" y="33" font-size="10" fill="#3730a3">Instance</text>
    </g>
    
    <!-- Class Method -->
    <g class="key-concept">
      <rect x="120" y="15" width="110" height="28" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
      <circle cx="135" cy="29" r="6" fill="#22c55e"/>
      <text x="145" y="33" font-size="10" fill="#166534">@classmethod</text>
    </g>
    
    <!-- Static Method -->
    <g class="key-concept">
      <rect x="240" y="15" width="110" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <circle cx="255" cy="29" r="6" fill="#f59e0b"/>
      <text x="265" y="33" font-size="10" fill="#92400e">@staticmethod</text>
    </g>
  </g>
  
  <!-- Code Example Box -->
  <g transform="translate(20, 310)" class="key-concept">
    <rect width="380" height="75" rx="6" fill="#1e293b" filter="url(#shadow)"/>
    <text x="15" y="20" font-size="11" font-weight="bold" fill="#94a3b8">Creating Objects:</text>
    <text x="15" y="38" font-size="10" fill="#4ade80" font-family="monospace">person1 = Person("Alice", 25)</text>
    <text x="15" y="52" font-size="10" fill="#60a5fa" font-family="monospace">person1.greet()  # Returns: "Hello, Alice"</text>
    <text x="15" y="66" font-size="10" fill="#fbbf24" font-family="monospace"># __init__ called automatically</text>
  </g>
  
  <!-- Narration overlays -->
  <g data-narration="class-structure" opacity="0">
    <desc>Class structure showing the Person class with constructor and method</desc>
  </g>
  <g data-narration="constructor-explanation" opacity="0">
    <desc>Constructor __init__ initializes object attributes</desc>
  </g>
  <g data-narration="method-types" opacity="0">
    <desc>Three types of methods in Python</desc>
  </g>
  <g data-narration="object-creation" opacity="0">
    <desc>Objects are instances of a class created with constructor</desc>
  </g>
</svg>