<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="abstract-classes-interfaces">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="abstractGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="interfaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="concreteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L1,4 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L1,4 Z" fill="#22c55e"/>
    </marker>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-25px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-25px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(25px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 60; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1e293b; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #1e293b; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #334155; }
    .code-text { font-family: 'Consolas', 'Monaco', monospace; font-size: 9px; fill: #f1f5f9; }
    .keyword { fill: #fbbf24; }
    .method { fill: #86efac; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #64748b; }
    .animated-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animated-slide-down { animation: slideInDown 0.7s ease-out forwards; }
    .animated-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animated-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .box-group { cursor: pointer; transition: transform 0.2s; }
    .box-group:hover { transform: scale(1.02); }
    .connector { stroke-dasharray: 60; stroke-dashoffset: 60; animation: drawLine 0.8s ease-out forwards; animation-delay: 0.5s; }
    .connector-delay { stroke-dasharray: 60; stroke-dashoffset: 60; animation: drawLine 0.8s ease-out forwards; animation-delay: 0.8s; }
  </style>
  
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <text x="210" y="28" text-anchor="middle" class="title animated-slide-down" data-narration="Title introducing the topic: Abstract Classes and Interfaces in Python">Abstract Classes &amp; Interfaces</text>
  
  <!-- Abstract Class Box -->
  <g class="box-group animated-slide-left" style="animation-delay: 0.1s" data-narration="Abstract Class section: A blueprint that cannot be instantiated, uses ABC and @abstractmethod">
    <rect x="15" y="50" width="125" height="145" rx="10" fill="url(#abstractGrad)" filter="url(#shadow)"/>
    <text x="77" y="72" text-anchor="middle" class="section-title">Abstract Class</text>
    <rect x="23" y="82" width="109" height="105" rx="5" fill="url(#codeGrad)"/>
    <text x="30" y="98" class="code-text"><tspan class="keyword">from</tspan> abc <tspan class="keyword">import</tspan> ABC</text>
    <text x="30" y="112" class="code-text"><tspan class="keyword">from</tspan> abc <tspan class="keyword">import</tspan> abstractmethod</text>
    <text x="30" y="130" class="code-text"><tspan class="keyword">class</tspan> <tspan class="method">Shape</tspan>(ABC):</text>
    <text x="40" y="144" class="code-text">@abstractmethod</text>
    <text x="40" y="156" class="code-text"><tspan class="keyword">def</tspan> <tspan class="method">area</span>(self):</text>
    <text x="50" y="168" class="code-text"><tspan class="keyword">pass</tspan></text>
    <text x="30" y="182" class="code-text">@abstractmethod</text>
    <text x="40" y="194" class="code-text"><tspan class="keyword">def</tspan> <tspan class="method">perimeter</span>(self):</text>
  </g>
  
  <!-- Arrow to Interface -->
  <path d="M155 120 L185 120" stroke="#3b82f6" stroke-width="2" class="connector" marker-end="url(#arrowBlue)"/>
  
  <!-- Interface Box -->
  <g class="box-group animated-fade" style="animation-delay: 0.3s" data-narration="Interface section: A pure contract defining method signatures, implemented via abstract class">
    <rect x="195" y="50" width="125" height="145" rx="10" fill="url(#interfaceGrad)" filter="url(#shadow)"/>
    <text x="257" y="72" text-anchor="middle" class="section-title">Interface</text>
    <rect x="203" y="82" width="109" height="105" rx="5" fill="url(#codeGrad)"/>
    <text x="210" y="100" class="code-text"><tspan class="keyword"># Interface in Python</tspan></text>
    <text x="210" y="116" class="code-text"><tspan class="keyword">class</tspan> <tspan class="method">Drawable</tspan>(ABC):</text>
    <text x="220" y="132" class="code-text"><tspan class="keyword">@abstractmethod</tspan></text>
    <text x="220" y="146" class="code-text"><tspan class="keyword">def</tspan> <tspan class="method">draw</span>(self):</text>
    <text x="230" y="158" class="code-text"><tspan class="keyword">pass</tspan></text>
    <text x="220" y="174" class="code-text"><tspan class="keyword">@abstractmethod</tspan></text>
    <text x="220" y="188" class="code-text"><tspan class="keyword">def</span> <tspan class="method">get_info</span>():</text>
    <text x="230" y="200" class="code-text"><tspan class="keyword">pass</tspan></text>
  </g>
  
  <!-- Arrow to Concrete -->
  <path d="M335 120 L365 120" stroke="#22c55e" stroke-width="2" class="connector-delay" marker-end="url(#arrowGreen)"/>
  
  <!-- Concrete Class Box -->
  <g class="box-group animated-slide-right" style="animation-delay: 0.4s" data-narration="Concrete Class section: Implements abstract methods, can be instantiated">
    <rect x="375" y="50" width="30" height="145" rx="10" fill="url(#concreteGrad)" filter="url(#shadow)"/>
    <rect x="375" y="50" width="30" height="145" rx="10" fill="url(#concreteGrad)" filter="url(#shadow)"/>
    <rect x="375" y="50" width="30" height="145" rx="10" fill="url(#concreteGrad)" filter="url(#shadow)"/>
    <rect x="375" y="50" width="30" height="145" rx="10" fill="url(#concreteGrad)" filter="url(#shadow)"/>
    <rect x="375" y="50" width="30" height="145" rx="10" fill="url(#concreteGrad)" filter="url(#shadow)"/>
    <rect x="375" y="50" width="30" height="145" rx="10" fill="url(#concreteGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- Concrete Class - Correct positioning -->
  <g class="box-group animated-slide-right" style="animation-delay: 0.5s" data-narration="Concrete Class section: Implements abstract methods, can be instantiated">
    <rect x="370" y="50" width="45" height="145" rx="10" fill="url(#concreteGrad)" filter="url(#shadow)"/>
    <text x="392" y="72" text-anchor="middle" class="section-title">Concrete</text>
    <rect x="378" y="82" width="29" height="105" rx="3" fill="url(#codeGrad)"/>
    <text x="383" y="95" class="code-text"><tspan class="keyword">class</tspan></text>
    <text x="383" y="107" class="code-text"><tspan class="method">Circle</tspan>:</text>
    <text x="388" y="119" class="code-text"><tspan class="keyword">def</tspan></text>
    <text x="388" y="131" class="code-text"><tspan class="method">area</span>():</text>
    <text x="395" y="143" class="code-text">π*r²</text>
    <text x="388" y="155" class="code-text"><tspan class="keyword">def</tspan></text>
    <text x="388" y="167" class="code-text"><tspan class="method">perim</span>():</text>
    <text x="395" y="179" class="code-text">2*π*r</text>
  </g>
  
  <!-- Inheritance Arrow from Abstract to Concrete -->
  <path d="M195 195 Q150 240 50 250" stroke="#6366f1" stroke-width="2" fill="none" class="connector-delay" marker-end="url(#arrowBlue)" style="stroke-dasharray:100;stroke-dashoffset:100;animation:drawLine 1s ease-out forwards;animation-delay:1s"/>
  
  <!-- Bottom Info Section -->
  <g class="animated-fade" style="animation-delay: 0.8s" data-narration="Key differences summary: Abstract classes can have implementation, interfaces are pure contracts">
    <rect x="15" y="210" width="390" height="85" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="25" y="232" class="label">Key Differences:</text>
    <text x="25" y="250" class="detail">• Abstract Class: Can have concrete methods + abstract methods</text>
    <text x="25" y="266" class="detail">• Interface: Only abstract methods (contract only)</text>
    <text x="25" y="282" class="detail">• Both require @abstractmethod for method definitions</text>
    <text x="230" y="250" class="detail">• Use ABC from abc module</text>
    <text x="230" y="266" class="detail">• Subclasses must implement all</text>
    <text x="230" y="282" class="detail">  abstract methods to be instantiable</text>
  </g>
  
  <!-- Python keyword note -->
  <g class="animated-fade" style="animation-delay: 1s" data-narration="Python uses ABC module for abstraction">
    <rect x="15" y="305" width="390" height="45" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
    <text x="210" y="328" text-anchor="middle" class="label" fill="#0369a1">from abc import ABC, abstractmethod</text>
    <text x="210" y="345" text-anchor="middle" class="detail">Python achieves abstraction through the abc module</text>
  </g>
  
  <!-- Legend -->
  <g class="animated-fade" style="animation-delay: 1.2s">
    <rect x="15" y="358" width="390" height="35" rx="5" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
    <circle cx="35" cy="376" r="6" fill="#93c5fd"/>
    <text x="50" y="380" class="detail">Abstract</text>
    <circle cx="110" cy="376" r="6" fill="#86efac"/>
    <text x="125" y="380" class="detail">Interface</text>
    <circle cx="190" cy="376" r="6" fill="#fcd34d"/>
    <text x="205" y="380" class="detail">Concrete</text>
  </g>
</svg>