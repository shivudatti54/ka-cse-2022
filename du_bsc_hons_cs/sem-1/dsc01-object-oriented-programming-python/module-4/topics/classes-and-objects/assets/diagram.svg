<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="classes-and-objects" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8eb8d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="objectGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#98d498;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inheritanceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4b888;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 3; }
      50% { stroke-width: 5; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .class-box { animation: slideInLeft 0.8s ease-out; }
    .object-box { animation: slideInRight 0.8s ease-out 0.3s both; }
    .inheritance-box { animation: slideInUp 0.8s ease-out 0.6s both; }
    .concept-box { animation: fadeIn 1s ease-out 0.5s both; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 22px; font-weight: bold; fill: #2c5282; }
    .label-text { font-size: 16px; font-weight: bold; fill: #2d3748; }
    .detail-text { font-size: 12px; fill: #4a5568; }
    .code-text { font-size: 11px; font-family: 'Courier New', monospace; fill: #2d3748; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text">Classes and Objects</text>
  <line x1="100" y1="42" x2="320" y2="42" stroke="#8eb8d4" stroke-width="2" class="title"/>
  
  <!-- Class Box (Blueprint) -->
  <g class="class-box" data-narration="The Class is a blueprint/template that defines properties and behavior">
    <rect x="30" y="70" width="150" height="160" rx="8" fill="url(#classGradient)" filter="url(#shadow)"/>
    <rect x="30" y="70" width="150" height="25" rx="8" fill="#6ba3c7"/>
    <text x="105" y="88" text-anchor="middle" class="label-text" fill="white">CLASS</text>
    <text x="40" y="110" class="detail-text" fill="#2c5282">class Dog:</text>
    <text x="45" y="128" class="code-text">def __init__(self, name):</text>
    <text x="55" y="142" class="code-text">self.name = name</text>
    <text x="45" y="160" class="code-text">def bark(self):</text>
    <text x="55" y="174" class="code-text">print("Woof!")</text>
    <text x="105" y="215" text-anchor="middle" class="detail-text" fill="#4a5568">Blueprint</text>
  </g>
  
  <!-- Arrow between Class and Object -->
  <g class="arrow">
    <line x1="190" y1="150" x2="230" y2="150" stroke="#d4a574" stroke-width="3"/>
    <polygon points="225,145 235,150 225,155" fill="#d4a574"/>
  </g>
  
  <!-- Object Box (Instance) -->
  <g class="object-box" data-narration="The Object is an instance of a class with actual values">
    <rect x="240" y="70" width="150" height="160" rx="8" fill="url(#objectGradient)" filter="url(#shadow)"/>
    <rect x="240" y="70" width="150" height="25" rx="8" fill="#6bb87c"/>
    <text x="315" y="88" text-anchor="middle" class="label-text" fill="white">OBJECT</text>
    <text x="250" y="110" class="detail-text" fill="#276749">my_dog = Dog("Buddy")</text>
    <text x="250" y="130" class="detail-text" fill="#276749">my_dog.name = "Buddy"</text>
    <text x="250" y="150" class="detail-text" fill="#276749">my_dog.bark() → "Woof!"</text>
    <circle cx="315" cy="185" r="15" fill="#4a7c59" class="pulse-element"/>
    <text x="315" y="190" text-anchor="middle" fill="white" font-size="16">🐕</text>
    <text x="315" y="215" text-anchor="middle" class="detail-text" fill="#276749">Instance</text>
  </g>
  
  <!-- Constructor Concept Box -->
  <g class="concept-box" data-narration="The constructor __init__ initializes the object when created">
    <rect x="30" y="250" width="100" height="60" rx="5" fill="#f7e8d0" stroke="#d4a574" stroke-width="1.5"/>
    <text x="80" y="268" text-anchor="middle" class="label-text" font-size="13" fill="#744210">Constructor</text>
    <text x="80" y="285" text-anchor="middle" class="code-text" font-size="10">__init__</text>
    <text x="80" y="300" text-anchor="middle" class="detail-text" font-size="10">Initializes object</text>
  </g>
  
  <!-- Attributes Concept Box -->
  <g class="concept-box" data-narration="Attributes are data members that store object state">
    <rect x="140" y="250" width="100" height="60" rx="5" fill="#e8d4f0" stroke="#b894c4" stroke-width="1.5"/>
    <text x="190" y="268" text-anchor="middle" class="label-text" font-size="13" fill="#6b46a0">Attributes</text>
    <text x="190" y="285" text-anchor="middle" class="code-text" font-size="10">self.name</text>
    <text x="190" y="300" text-anchor="middle" class="detail-text" font-size="10">Data members</text>
  </g>
  
  <!-- Methods Concept Box -->
  <g class="concept-box" data-narration="Methods are functions that define object behavior">
    <rect x="250" y="250" width="100" height="60" rx="5" fill="#d4e8f0" stroke="#8eb8d4" stroke-width="1.5"/>
    <text x="300" y="268" text-anchor="middle" class="label-text" font-size="13" fill="#2c5282">Methods</text>
    <text x="300" y="285" text-anchor="middle" class="code-text" font-size="10">def bark(self)</text>
    <text x="300" y="300" text-anchor="middle" class="detail-text" font-size="10">Functions</text>
  </g>
  
  <!-- Inheritance Box -->
  <g class="inheritance-box" data-narration="Inheritance allows a class to inherit properties from another class">
    <rect x="130" y="325" width="160" height="50" rx="5" fill="url(#inheritanceGradient)" filter="url(#shadow)"/>
    <text x="210" y="345" text-anchor="middle" class="label-text" font-size="14" fill="#744210">Inheritance</text>
    <text x="210" y="362" text-anchor="middle" class="detail-text" font-size="11">Child class inherits from parent</text>
    <text x="210" y="375" text-anchor="middle" class="code-text" font-size="10">class Puppy(Dog):</text>
  </g>
  
  <!-- Relationship Labels -->
  <g class="pulse-element">
    <text x="210" y="148" text-anchor="middle" class="detail-text" font-size="10" fill="#744210">instantiate</text>
  </g>
</svg>