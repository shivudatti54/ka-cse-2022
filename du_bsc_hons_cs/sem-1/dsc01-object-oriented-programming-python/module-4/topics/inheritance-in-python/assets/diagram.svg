<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="inheritance-in-python" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c1dce8"/>
    </linearGradient>
    <linearGradient id="superClassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="subClassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 3; }
      50% { stroke-width: 5; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .superclass-box { animation: slideInDown 0.6s ease-out 0.2s both; }
    .subclass-box { animation: slideInUp 0.6s ease-out 0.4s both; }
    .arrow-group { animation: fadeIn 0.5s ease-out 0.6s both; }
    .type-box { animation: fadeIn 0.5s ease-out 0.8s both; }
    .code-box { animation: slideInUp 0.6s ease-out 1s both; }
    .concept-label { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .inherit-arrow { animation: arrowPulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Inheritance In Python</text>
  <line x1="60" y1="48" x2="360" y2="48" stroke="#5ba3c6" stroke-width="2" class="title"/>
  
  <!-- Superclass (Parent Class) -->
  <g class="superclass-box" data-narration="Superclass: The parent class that provides attributes and methods to be inherited">
    <rect x="100" y="65" width="220" height="80" rx="8" fill="url(#superClassGradient)" filter="url(#shadow)"/>
    <text x="210" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Superclass (Parent)</text>
    <rect x="115" y="95" width="190" height="40" rx="4" fill="rgba(255,255,255,0.3)"/>
    <text x="210" y="110" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#fff">attributes: name, age</text>
    <text x="210" y="125" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#fff">methods: greet(), display()</text>
  </g>
  
  <!-- Inheritance Arrow -->
  <g class="arrow-group" data-narration="Inheritance relationship: Arrow showing that subclass inherits from superclass">
    <path d="M210 150 L210 180" stroke="#e74c3c" stroke-width="3" class="inherit-arrow"/>
    <polygon points="210,190 205,180 215,180" fill="#e74c3c"/>
    <text x="225" class="concept-label" y="175" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">inherits</text>
  </g>
  
  <!-- Subclass (Child Class) -->
  <g class="subclass-box" data-narration="Subclass: The child class that inherits from parent and can add new features">
    <rect x="100" y="195" width="220" height="80" rx="8" fill="url(#subClassGradient)" filter="url(#shadow)"/>
    <text x="210" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Subclass (Child)</text>
    <rect x="115" y="225" width="190" height="40" rx="4" fill="rgba(255,255,255,0.3)"/>
    <text x="210" y="240" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#fff">+ attribute: student_id</text>
    <text x="210" y="255" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#fff">+ method: study()</text>
  </g>
  
  <!-- Types of Inheritance -->
  <g class="type-box" data-narration="Types of inheritance: Single, Multiple, Multilevel, Hierarchical, Hybrid">
    <rect x="15" y="290" width="180" height="95" rx="6" fill="rgba(255,255,255,0.7)" stroke="#b0bec5" stroke-width="1"/>
    <text x="105" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#37474f">Types of Inheritance</text>
    <text x="25" y="328" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">• Single (1 parent)</text>
    <text x="25" y="342" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">• Multiple (2+ parents)</text>
    <text x="25" y="356" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">• Multilevel (chain)</text>
    <text x="25" y="370" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">• Hierarchical (many children)</text>
    <text x="25" y="384" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">• Hybrid (combined)</text>
  </g>
  
  <!-- Syntax Example -->
  <g class="code-box" data-narration="Python syntax: class ChildClass(ParentClass) to create inheritance">
    <rect x="205" y="290" width="200" height="95" rx="6" fill="#263238" stroke="#455a64" stroke-width="1"/>
    <text x="215" y="308" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#80cbc4">Syntax</text>
    <text x="215" y="328" font-family="Consolas, monospace" font-size="10" fill="#fff">class Child(Parent):</text>
    <text x="230" y="344" font-family="Consolas, monospace" font-size="10" fill="#ffcc80"># inherits all</text>
    <text x="230" y="358" font-family="Consolas, monospace" font-size="10" fill="#a5d6a7"># parent members</text>
    <text x="215" y="375" font-family="Consolas, monospace" font-size="9" fill="#90caf9">super().__init__()</text>
  </g>
  
  <!-- Key Concepts Labels -->
  <g data-narration="Key benefit: Code reusability - child classes reuse parent class code">
    <circle cx="395" cy="70" r="15" fill="#ffb74d"/>
    <text x="395" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">R</text>
  </g>
  <g data-narration="Polymorphism: Child classes can override parent methods">
    <circle cx="395" cy="110" r="15" fill="#ba68c8"/>
    <text x="395" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">P</text>
  </g>
</svg>