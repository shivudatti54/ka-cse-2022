<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="abstraction-and-encapsulation" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="abstractionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95d5b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="encapsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0b8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8a4d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .abs-section { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .enc-section { animation: slideInRight 0.8s ease-out 0.5s both; }
    .layer-box { animation: pulse 3s ease-in-out infinite; }
    .detail-item { animation: fadeIn 0.6s ease-out both; }
    .feature-item { animation: slideUp 0.6s ease-out both; }
    .arrow-anim { animation: fadeIn 0.5s ease-out 1s both; }
    .concept-box { animation: fadeIn 0.7s ease-out both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2d3748">Abstraction &amp; Encapsulation</text>
  <text x="210" y="50" text-anchor="middle" class="title" font-family="Arial, sans-serif" font-size="12" fill="#4a5568">Core OOP Concepts in Python</text>
  
  <!-- ABSTRACTION SECTION -->
  <g class="abs-section" data-narration="Abstraction hides complex implementation details, showing only essential features">
    <rect x="20" y="70" width="170" height="150" rx="10" fill="url(#abstractionGrad)" filter="url(#shadow)"/>
    <text x="105" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a5a3a">ABSTRACTION</text>
    
    <!-- Complex Details -->
    <g class="detail-item" style="animation-delay: 0.6s">
      <rect x="30" y="100" width="150" height="30" rx="5" fill="#ffffffcc"/>
      <text x="105" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Complex Details</text>
      <circle cx="45" cy="115" r="4" fill="#e53e3e"/>
      <circle cx="60" cy="115" r="4" fill="#ecc94b"/>
      <circle cx="75" cy="115" r="4" fill="#48bb78"/>
    </g>
    
    <!-- Abstraction Layer -->
    <g class="layer-box">
      <rect x="40" y="140" width="130" height="25" rx="5" fill="url(#layerGrad)"/>
      <text x="105" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Abstraction Layer</text>
    </g>
    
    <!-- Essential Features -->
    <g class="feature-item" style="animation-delay: 0.8s">
      <rect x="50" y="175" width="110" height="30" rx="5" fill="#ffffffcc"/>
      <text x="105" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3748">Essential Features</text>
      <circle cx="70" cy="190" r="5" fill="#4299e1"/>
      <circle cx="105" cy="190" r="5" fill="#4299e1"/>
      <circle cx="140" cy="190" r="5" fill="#4299e1"/>
    </g>
    
    <!-- Arrows -->
    <g class="arrow-anim">
      <path d="M105,130 L105,140" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
      <path d="M105,165 L105,175" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    </g>
  </g>
  
  <!-- ENCAPSULATION SECTION -->
  <g class="enc-section" data-narration="Encapsulation bundles data and methods together into a single unit">
    <rect x="230" y="70" width="170" height="150" rx="10" fill="url(#encapsGrad)" filter="url(#shadow)"/>
    <text x="315" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4a2c6a">ENCAPSULATION</text>
    
    <!-- Data -->
    <g class="detail-item" style="animation-delay: 0.7s">
      <rect x="245" y="105" width="140" height="35" rx="5" fill="#fffaf0" stroke="#ed8936" stroke-width="2"/>
      <text x="315" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c05621">DATA (Attributes)</text>
      <text x="315" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#744210">name, age, _balance</text>
    </g>
    
    <!-- Methods -->
    <g class="feature-item" style="animation-delay: 0.9s">
      <rect x="245" y="150" width="140" height="35" rx="5" fill="#fffaf0" stroke="#48bb78" stroke-width="2"/>
      <text x="315" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#276749">METHODS (Functions)</text>
      <text x="315" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22543d">get_name(), set_age()</text>
    </g>
    
    <!-- Capsule wrapper -->
    <rect x="240" y="100" width="150" height="95" rx="8" fill="none" stroke="#805ad5" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="315" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b46c1" font-style="italic">Single Unit (Class)</text>
  </g>
  
  <!-- ARROW BETWEEN SECTIONS -->
  <g class="arrow-anim">
    <path d="M195,145 L225,145" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#718096"/>
      </marker>
    </defs>
  </g>
  
  <!-- PYTHON CLASS EXAMPLE -->
  <g class="concept-box" style="animation-delay: 1.2s" data-narration="Example Python class showing both abstraction and encapsulation">
    <rect x="60" y="235" width="300" height="130" rx="10" fill="#2d3748" filter="url(#shadow)"/>
    <text x="210" y="255" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#68d391">Python Class Example</text>
    
    <!-- Code lines -->
    <text x="75" y="278" font-family="Courier New, monospace" font-size="10" fill="#fc8181">class</text>
    <text x="105" y="278" font-family="Courier New, monospace" font-size="10" fill="#f6ad55">BankAccount</text>
    <text x="175" y="278" font-family="Courier New, monospace" font-size="10" fill="#cbd5e0">:</text>
    
    <text x="85" y="295" font-family="Courier New, monospace" font-size="10" fill="#63b3ed">def</text>
    <text x="110" y="295" font-family="Courier New, monospace" font-size="10" fill="#f6ad55">__init__</text>
    <text x="145" y="295" font-family="Courier New, monospace" font-size="10" fill="#cbd5e0">(self, name):</text>
    
    <text x="95" y="312" font-family="Courier New, monospace" font-size="10" fill="#fbb6ce">self</text>
    <text x="115" y="312" font-family="Courier New, monospace" font-size="10" fill="#cbd5e0">.name = name</text>
    <text x="165" y="312" font-family="Courier New, monospace" font-size="10" fill="#a0aec0"># Encapsulated</text>
    
    <text x="85" y="329" font-family="Courier New, monospace" font-size="10" fill="#63b3ed">def</text>
    <text x="110" y="329" font-family="Courier New, monospace" font-size="10" fill="#f6ad55">get_balance</text>
    <text x="165" y="329" font-family="Courier New, monospace" font-size="10" fill="#cbd5e0">(self):</text>
    
    <text x="95" y="346" font-family="Courier New, monospace" font-size="10" fill="#cbd5e0">return</text>
    <text x="130" y="346" font-family="Courier New, monospace" font-size="10" fill="#a0aec0">self._balance</text>
    <text x="185" y="346" font-family="Courier New, monospace" font-size="10" fill="#a0aec0"># Abstraction</text>
    
    <text x="85" y="358" font-family="Courier New, monospace" font-size="9" fill="#a0aec0"># _ indicates private (encapsulation)</text>
  </g>
  
  <!-- LABELS -->
  <g class="concept-box" style="animation-delay: 1.4s">
    <text x="105" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d7a5f">Hides complexity</text>
    <text x="315" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b46c1">Bundles data + methods</text>
  </g>
</svg>