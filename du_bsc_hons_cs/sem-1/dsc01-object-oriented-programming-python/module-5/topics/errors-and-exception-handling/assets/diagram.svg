<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="errors-and-exception-handling">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f4eb"/>
    </linearGradient>
    <linearGradient id="tryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fb8d4"/>
    </linearGradient>
    <linearGradient id="exceptGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c8c8"/>
      <stop offset="100%" style="stop-color:#d49898"/>
    </linearGradient>
    <linearGradient id="finallyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e8d4"/>
      <stop offset="100%" style="stop-color:#98d4a8"/>
    </linearGradient>
    <linearGradient id="errorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4c8"/>
      <stop offset="100%" style="stop-color:#d4a898"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box-try { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .box-except { animation: slideInRight 0.6s ease-out 0.4s both; }
    .box-finally { animation: slideInDown 0.6s ease-out 0.6s both; }
    .box-error { animation: slideInLeft 0.6s ease-out 0.3s both; }
    .box-syntax { animation: slideInRight 0.6s ease-out 0.5s both; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s both; }
    .label { animation: fadeIn 0.5s ease-out 1s both; }
    .pulse:hover { animation: pulse 0.6s ease-in-out; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" class="title">Errors &amp; Exception Handling</text>
  
  <!-- Types of Errors Section -->
  <g data-narration="Two main types of errors in Python: Syntax Errors and Runtime Errors">
    <rect x="10" y="48" width="130" height="45" rx="6" fill="url(#errorGradient)" stroke="#c49a8a" stroke-width="1.5" class="pulse"/>
    <text x="75" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#444">Syntax Errors</text>
    <text x="75" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Before execution</text>
  </g>
  
  <g data-narration="Runtime errors occur during code execution, like division by zero">
    <rect x="280" y="48" width="130" height="45" rx="6" fill="url(#errorGradient)" stroke="#c49a8a" stroke-width="1.5" class="pulse"/>
    <text x="345" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#444">Runtime Errors</text>
    <text x="345" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">During execution</text>
  </g>
  
  <!-- Try Block -->
  <g data-narration="The try block contains code that might raise an exception">
    <rect x="30" y="120" width="100" height="70" rx="8" fill="url(#tryGradient)" stroke="#6a9cb8" stroke-width="2" class="box-try"/>
    <text x="80" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">try:</text>
    <text x="80" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444">Code that</text>
    <text x="80" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444">may fail</text>
  </g>
  
  <!-- Arrow from try to except -->
  <line x1="130" y1="155" x2="170" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow"/>
  <text x="148" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Error?</text>
  
  <!-- Except Block -->
  <g data-narration="The except block catches and handles the exception">
    <rect x="175" y="120" width="100" height="70" rx="8" fill="url(#exceptGradient)" stroke="#b87070" stroke-width="2" class="box-except"/>
    <text x="225" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">except:</text>
    <text x="225" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444">Handle the</text>
    <text x="225" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444">exception</text>
  </g>
  
  <!-- Arrow from try down -->
  <line x1="80" y1="190" x2="80" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Finally Block -->
  <g data-narration="The finally block always executes, regardless of exceptions">
    <rect x="30" y="235" width="100" height="60" rx="8" fill="url(#finallyGradient)" stroke="#70b888" stroke-width="2" class="box-finally"/>
    <text x="80" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">finally:</text>
    <text x="80" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444">Always runs</text>
  </g>
  
  <!-- Arrow from except to finally -->
  <line x1="225" y1="190" x2="225" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Success path arrow -->
  <line x1="80" y1="120" x2="80" y2="95" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow"/>
  <text x="65" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">No error</text>
  
  <!-- Exception Hierarchy Box -->
  <g data-narration="Python exception hierarchy: BaseException → Exception → specific exceptions">
    <rect x="295" y="120" width="110" height="120" rx="6" fill="#fff" stroke="#aaa" stroke-width="1.5" class="box-syntax"/>
    <text x="350" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Exception</text>
    <text x="350" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Hierarchy</text>
    <line x1="305" y1="162" x2="395" y2="162" stroke="#ddd" stroke-width="1"/>
    <text x="350" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">• ZeroDivisionError</text>
    <text x="350" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">• ValueError</text>
    <text x="350" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">• TypeError</text>
    <text x="350" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">• FileNotFoundError</text>
    <text x="350" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">• ...and more</text>
  </g>
  
  <!-- Arrow from except to hierarchy -->
  <line x1="275" y1="155" x2="295" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Code Example Box -->
  <g data-narration="Practical example showing try-except-finally structure">
    <rect x="10" y="310" width="195" height="80" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1.5" class="box-syntax"/>
    <text x="20" y="332" text-anchor="start" font-family="Consolas, monospace" font-size="11" fill="#98c379">try:</text>
    <text x="30" y="348" text-anchor="start" font-family="Consolas, monospace" font-size="10" fill="#abb2bf">    result = 10/0</text>
    <text x="20" y="364" text-anchor="start" font-family="Consolas, monospace" font-size="11" fill="#e06c75">except:</text>
    <text x="30" y="378" text-anchor="start" font-family="Consolas, monospace" font-size="10" fill="#abb2bf">    print("Error!")</text>
  </g>
  
  <!-- Key Points Box -->
  <g data-narration="Key takeaways: Syntax errors prevent execution, runtime errors raise exceptions, try-except handles errors gracefully">
    <rect x="215" y="310" width="195" height="80" rx="6" fill="#fff9e6" stroke="#e6c966" stroke-width="1.5" class="box-syntax"/>
    <text x="312" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#665500">Key Points</text>
    <line x1="225" y1="342" x2="400" y2="342" stroke="#e6c966" stroke-width="1"/>
    <text x="225" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#665500">• Syntax = before execution</text>
    <text x="225" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#665500">• Exceptions = during execution</text>
    <text x="225" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#665500">• try-except = graceful handling</text>
  </g>
</svg>