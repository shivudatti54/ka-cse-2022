<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="file-handling-libraries" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f8e9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInUp 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.8s both; }
    .process-box { animation: fadeIn 0.5s ease-out 1s both; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .lib-card { animation: pulse 3s ease-in-out infinite; }
    .lib-card:hover { transform: scale(1.02); }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2e7d32" class="title">File Handling Libraries</text>
  <text x="210" y="52" text-anchor="middle" font-size="12" fill="#558b2f" class="title">in Python</text>
  
  <!-- Section 1: File Handling Process Flow -->
  <g class="section-1" data-narration="The core file handling process involves four main operations: opening a file, reading or writing data, and closing the file to ensure data is saved properly.">
    <rect x="20" y="70" width="380" height="70" fill="url(#cardGradient)" rx="8" filter="url(#shadow)" />
    <text x="30" y="88" font-size="14" font-weight="bold" fill="#1b5e20">File Handling Process</text>
    
    <!-- Process boxes -->
    <rect x="40" y="100" width="60" height="30" fill="#4caf50" rx="5" class="process-box">
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" />
    </rect>
    <text x="70" y="120" text-anchor="middle" font-size="11" fill="white" font-weight="bold">File</text>
    
    <!-- Arrow 1 -->
    <path d="M105 115 L135 115" stroke="#388e3c" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)" />
    <polygon points="140,115 135,110 135,120" fill="#388e3c" />
    
    <!-- Open box -->
    <rect x="140" y="100" width="60" height="30" fill="#81c784" rx="5" class="process-box">
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" />
    </rect>
    <text x="170" y="120" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Open</text>
    
    <!-- Arrow 2 -->
    <path d="M205 115 L235 115" stroke="#388e3c" stroke-width="2" fill="none" class="arrow" />
    <polygon points="240,115 235,110 235,120" fill="#388e3c" />
    
    <!-- Read/Write box -->
    <rect x="240" y="100" width="80" height="30" fill="#a5d6a7" rx="5" class="process-box">
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" />
    </rect>
    <text x="280" y="120" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Read/Write</text>
    
    <!-- Arrow 3 -->
    <path d="M325 115 L355 115" stroke="#388e3c" stroke-width="2" fill="none" class="arrow" />
    <polygon points="360,115 355,110 355,120" fill="#388e3c" />
    
    <!-- Close box -->
    <rect x="360" y="100" width="60" height="30" fill="#c8e6c9" rx="5" stroke="#2e7d32" stroke-width="1" class="process-box">
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" />
    </rect>
    <text x="390" y="120" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Close</text>
  </g>
  
  <!-- Section 2: Built-in Functions -->
  <g class="section-2" data-narration="Python provides built-in functions for file operations: open() to access files, read() to retrieve content, write() to save data, and close() to release file resources.">
    <rect x="20" y="150" width="180" height="100" fill="url(#cardGradient)" rx="8" filter="url(#shadow)" />
    <text x="30" y="168" font-size="13" font-weight="bold" fill="#1b5e20">Built-in Functions</text>
    
    <rect x="30" y="178" width="35" height="20" fill="#66bb6a" rx="3" />
    <text x="47" y="193" text-anchor="middle" font-size="10" fill="white" font-weight="bold">open()</text>
    
    <rect x="70" y="178" width="35" height="20" fill="#66bb6a" rx="3" />
    <text x="87" y="193" text-anchor="middle" font-size="10" fill="white" font-weight="bold">read()</text>
    
    <rect x="110" y="178" width="40" height="20" fill="#66bb6a" rx="3" />
    <text x="130" y="193" text-anchor="middle" font-size="10" fill="white" font-weight="bold">write()</text>
    
    <rect x="155" y="178" width="35" height="20" fill="#66bb6a" rx="3" />
    <text x="172" y="193" text-anchor="middle" font-size="10" fill="white" font-weight="bold">close()</text>
    
    <rect x="30" y="205" width="35" height="20" fill="#81c784" rx="3" />
    <text x="47" y="220" text-anchor="middle" font-size="10" fill="white" font-weight="bold">append()</text>
    
    <rect x="70" y="205" width="35" height="20" fill="#81c784" rx="3" />
    <text x="87" y="220" text-anchor="middle" font-size="10" fill="white" font-weight="bold">seek()</text>
    
    <rect x="110" y="205" width="40" height="20" fill="#81c784" rx="3" />
    <text x="130" y="220" text-anchor="middle" font-size="10" fill="white" font-weight="bold">tell()</text>
    
    <rect x="155" y="205" width="35" height="20" fill="#81c784" rx="3" />
    <text x="172" y="220" text-anchor="middle" font-size="10" fill="white" font-weight="bold">readline()</text>
  </g>
  
  <!-- Section 3: File Modes -->
  <g class="section-3" data-narration="File modes determine how a file is accessed: 'r' for reading, 'w' for writing (overwrites), 'a' for appending, and 'x' for exclusive creation.">
    <rect x="210" y="150" width="190" height="65" fill="url(#cardGradient)" rx="8" filter="url(#shadow)" />
    <text x="220" y="168" font-size="13" font-weight="bold" fill="#1b5e20">File Modes</text>
    
    <rect x="220" y="178" width="30" height="28" fill="#43a047" rx="4" class="lib-card" />
    <text x="235" y="193" text-anchor="middle" font-size="12" fill="white" font-weight="bold">r</text>
    <text x="235" y="202" text-anchor="middle" font-size="8" fill="#e8f5e9">read</text>
    
    <rect x="255" y="178" width="30" height="28" fill="#43a047" rx="4" class="lib-card" />
    <text x="270" y="193" text-anchor="middle" font-size="12" fill="white" font-weight="bold">w</text>
    <text x="270" y="202" text-anchor="middle" font-size="8" fill="#e8f5e9">write</text>
    
    <rect x="290" y="178" width="30" height="28" fill="#43a047" rx="4" class="lib-card" />
    <text x="305" y="193" text-anchor="middle" font-size="12" fill="white" font-weight="bold">a</text>
    <text x="305" y="202" text-anchor="middle" font-size="8" fill="#e8f5e9">append</text>
    
    <rect x="325" y="178" width="30" height="28" fill="#43a047" rx="4" class="lib-card" />
    <text x="340" y="193" text-anchor="middle" font-size="12" fill="white" font-weight="bold">x</text>
    <text x="340" y="202" text-anchor="middle" font-size="8" fill="#e8f5e9">create</text>
    
    <rect x="360" y="178" width="30" height="28" fill="#66bb6a" rx="4" class="lib-card" />
    <text x="375" y="193" text-anchor="middle" font-size="12" fill="white" font-weight="bold">b</text>
    <text x="375" y="202" text-anchor="middle" font-size="8" fill="#e8f5e9">binary</text>
    
    <rect x="220" y="208" width="30" height="28" fill="#66bb6a" rx="4" class="lib-card" />
    <text x="235" y="223" text-anchor="middle" font-size="12" fill="white" font-weight="bold">+</text>
    <text x="235" y="232" text-anchor="middle" font-size="8" fill="#e8f5e9">read/write</text>
    
    <rect x="255" y="208" width="30" height="28" fill="#66bb6a" rx="4" class="lib-card" />
    <text x="270" y="223" text-anchor="middle" font-size="12" fill="white" font-weight="bold">t</text>
    <text x="270" y="232" text-anchor="middle" font-size="8" fill="#e8f5e9">text</text>
  </g>
  
  <!-- Section 4: Libraries -->
  <g class="section-4" data-narration="Python's standard library includes specialized modules for file operations: os for system calls, shutil for high-level operations, glob for pattern matching, and pathlib for object-oriented paths.">
    <rect x="20" y="260" width="380" height="70" fill="url(#cardGradient)" rx="8" filter="url(#shadow)" />
    <text x="30" y="278" font-size="13" font-weight="bold" fill="#1b5e20">Key Libraries</text>
    
    <!-- os -->
    <rect x="30" y="288" width="85" height="35" fill="#2e7d32" rx="5" class="lib-card" />
    <text x="72" y="305" text-anchor="middle" font-size="12" fill="white" font-weight="bold">os</text>
    <text x="72" y="318" text-anchor="middle" font-size="9" fill="#c8e6c9">OS operations</text>
    
    <!-- shutil -->
    <rect x="125" y="288" width="85" height="35" fill="#388e3c" rx="5" class="lib-card" />
    <text x="167" y="305" text-anchor="middle" font-size="12" fill="white" font-weight="bold">shutil</text>
    <text x="167" y="318" text-anchor="middle" font-size="9" fill="#c8e6c9">Copy, move files</text>
    
    <!-- glob -->
    <rect x="220" y="288" width="85" height="35" fill="#43a047" rx="5" class="lib-card" />
    <text x="262" y="305" text-anchor="middle" font-size="12" fill="white" font-weight="bold">glob</text>
    <text x="262" y="318" text-anchor="middle" font-size="9" fill="#c8e6c9">File patterns</text>
    
    <!-- pathlib -->
    <rect x="315" y="288" width="85" height="35" fill="#4caf50" rx="5" class="lib-card" />
    <text x="357" y="305" text-anchor="middle" font-size="12" fill="white" font-weight="bold">pathlib</text>
    <text x="357" y="318" text-anchor="middle" font-size="9" fill="#c8e6c9">Object paths</text>
  </g>
  
  <!-- Section 5: CSV Handling -->
  <g class="section-4" data-narration="CSV (Comma Separated Values) files are commonly used for data storage. Python provides the csv module and pandas library for efficient reading and writing of tabular data.">
    <rect x="20" y="340" width="180" height="45" fill="url(#cardGradient)" rx="8" filter="url(#shadow)" />
    <text x="30" y="358" font-size="13" font-weight="bold" fill="#1b5e20">CSV Handling</text>
    
    <rect x="30" y="368" width="40" height="12" fill="#81c784" rx="2" />
    <text x="50" y="377" text-anchor="middle" font-size="9" fill="white" font-weight="bold">csv</text>
    
    <rect x="75" y="368" width="50" height="12" fill="#81c784" rx="2" />
    <text x="100" y="377" text-anchor="middle" font-size="9" fill="white" font-weight="bold">pandas</text>
    
    <rect x="130" y="368" width="60" height="12" fill="#a5d6a7" rx="2" />
    <text x="160" y="377" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="bold">read_csv()</text>
  </g>
  
  <!-- Section 6: Example Code -->
  <g class="section-4" data-narration="A practical example showing how to open a file in read mode, read its contents, and properly close the file using a with statement for automatic resource management.">
    <rect x="210" y="340" width="190" height="45" fill="#263238" rx="8" filter="url(#shadow)" />
    <text x="220" y="358" font-size="11" font-weight="bold" fill="#81c784">Example</text>
    <text x="220" y="375" font-size="9" fill="#a5d6a7" font-family="monospace">with open("file.txt","r") as f:</text>
    <text x="235" y="385" font-size="9" fill="#a5d6a7" font-family="monospace">data = f.read()</text>
  </g>
</svg>