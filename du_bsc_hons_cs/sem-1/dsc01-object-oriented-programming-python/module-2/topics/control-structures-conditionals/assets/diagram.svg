<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="control-structures-conditionals">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d9534f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9302c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #333; }
    .operator { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #fff; }
    .code-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #fff; }
    .highlight { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #666; }
    
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.7s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { animation: flowPulse 1.5s ease-in-out infinite; }
    
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.3s; }
    .section-3 { animation-delay: 0.5s; }
    .section-4 { animation-delay: 0.7s; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Control Structures: Conditionals</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4a90d9" stroke-width="2" class="fade-in" style="animation-delay: 0.2s"/>
  
  <!-- Section 1: If Statement Box -->
  <g class="slide-in section-1" data-narration="The if statement is the foundation of conditional logic. It checks a condition and executes code only when the condition is True.">
    <rect x="30" y="55" width="85" height="35" rx="5" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="72" y="78" text-anchor="middle" class="section-title">if</text>
  </g>
  
  <!-- Arrow from if -->
  <path d="M115 72 L145 72" stroke="#555" stroke-width="2" fill="none" class="flow-line"/>
  
  <!-- Section 2: Elif Statement Box -->
  <g class="slide-in section-2" data-narration="The elif (else if) statement checks additional conditions if previous conditions were False. Multiple elif can chain together.">
    <rect x="145" y="55" width="85" height="35" rx="5" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="187" y="78" text-anchor="middle" class="section-title">elif</text>
  </g>
  
  <!-- Arrow from elif -->
  <path d="M230 72 L260 72" stroke="#555" stroke-width="2" fill="none" class="flow-line"/>
  
  <!-- Section 3: Else Statement Box -->
  <g class="slide-in section-3" data-narration="The else statement provides a default action when all previous conditions are False. It catches all remaining cases.">
    <rect x="260" y="55" width="85" height="35" rx="5" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="302" y="78" text-anchor="middle" class="section-title">else</text>
  </g>
  
  <!-- Decision Diamond -->
  <g class="pulse" data-narration="The diamond shape represents decision points where conditions are evaluated to determine program flow.">
    <polygon points="187,130 247,155 187,180 127,155" fill="#e74c3c" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
    <text x="187" y="160" text-anchor="middle" fill="#fff" font-family="Segoe UI" font-size="12" font-weight="bold">condition?</text>
  </g>
  
  <!-- Flow arrows from diamond -->
  <path d="M187 130 L187 110" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow-line"/>
  <path d="M247 155 L290 155" stroke="#555" stroke-width="2" fill="none" class="flow-line"/>
  <path d="M127 155 L80 155" stroke="#555" stroke-width="2" fill="none" class="flow-line"/>
  
  <!-- True/False Labels -->
  <text x="200" y="145" class="label" fill="#27ae60" font-weight="bold">True</text>
  <text x="255" y="150" class="label" fill="#c0392b" font-weight="bold">False</text>
  
  <!-- Comparison Operators Section -->
  <g class="slide-up section-4" data-narration="Comparison operators return Boolean values (True/False) and form the conditions used in if statements.">
    <rect x="30" y="200" width="360" height="70" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="45" y="222" class="label" font-weight="bold" font-size="13">Comparison Operators:</text>
    
    <!-- Operators Row 1 -->
    <rect x="45" y="235" width="45" height="24" rx="4" fill="#3498db"/>
    <text x="67" y="252" text-anchor="middle" class="operator">==</text>
    <text x="100" y="252" class="label">equal</text>
    
    <rect x="150" y="235" width="45" height="24" rx="4" fill="#3498db"/>
    <text x="172" y="252" text-anchor="middle" class="operator">!=</text>
    <text x="205" y="252" class="label">not equal</text>
    
    <rect x="255" y="235" width="45" height="24" rx="4" fill="#3498db"/>
    <text x="277" y="252" text-anchor="middle" class="operator">&gt;</text>
    <text x="310" y="252" class="label">greater</text>
    
    <!-- Operators Row 2 -->
    <rect x="45" y="265" width="45" height="24" rx="4" fill="#3498db"/>
    <text x="67" y="282" text-anchor="middle" class="operator">&lt;</text>
    <text x="100" y="282" class="label">less</text>
    
    <rect x="150" y="265" width="50" height="24" rx="4" fill="#3498db"/>
    <text x="175" y="282" text-anchor="middle" class="operator">&gt;=</text>
    <text x="210" y="282" class="label">≥</text>
    
    <rect x="255" y="265" width="50" height="24" rx="4" fill="#3498db"/>
    <text x="280" y="282" text-anchor="middle" class="operator">&lt;=</text>
    <text x="315" y="282" class="label">≤</text>
  </g>
  
  <!-- Code Example Box -->
  <g class="slide-up" style="animation-delay: 0.9s" data-narration="Example code showing how if-elif-else statements work together to make decisions based on conditions.">
    <rect x="30" y="285" width="360" height="100" rx="8" fill="#2c3e50" stroke="#1a252f" stroke-width="2" filter="url(#shadow)"/>
    <text x="45" y="305" fill="#f39c12" font-family="Segoe UI" font-size="12" font-weight="bold">Python Code Example:</text>
    
    <text x="45" y="330" class="code-text" fill="#e74c3c">score = 85</text>
    <text x="45" y="348" class="code-text" fill="#5cb85c">if score &gt;= 90:</text>
    <text x="65" y="363" class="code-text" fill="#fff">print("Grade: A")</text>
    <text x="45" y="378" class="code-text" fill="#5cb85c">elif score &gt;= 80:</text>
    <text x="65" y="393" class="code-text" fill="#fff">print("Grade: B")</text>
  </g>
  
  <!-- Start/End indicators -->
  <g>
    <circle cx="187" cy="105" r="8" fill="#9b59b6" class="pulse"/>
    <text x="187" y="108" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">▶</text>
  </g>
  
  <g>
    <circle cx="320" cy="175" r="8" fill="#9b59b6" class="pulse"/>
    <text x="320" y="178" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">■</text>
  </g>
  
  <!-- End label -->
  <text x="335" y="178" class="label" font-size="11">End</text>
  
</svg>