<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="loop-control-break-continue">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="breakGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3b3"/>
      <stop offset="100%" style="stop-color:#ff8080"/>
    </linearGradient>
    <linearGradient id="continueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3d9ff"/>
      <stop offset="100%" style="stop-color:#80b3ff"/>
    </linearGradient>
    <linearGradient id="loopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3ffb3"/>
      <stop offset="100%" style="stop-color:#80ff80"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .code-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #444; }
    .section-box { rx: 8; ry: 8; stroke: #888; stroke-width: 1; }
    .break-box { fill: url(#breakGradient); }
    .continue-box { fill: url(#continueGradient); }
    .loop-box { fill: url(#loopGradient); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-bounce { animation: bounce 1s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="anim-fade">
    <text x="210" y="30" text-anchor="middle" class="title-text">Loop Control: Break &amp; Continue</text>
    <line x1="100" y1="42" x2="320" y2="42" stroke="#666" stroke-width="2"/>
  </g>
  
  <!-- Break Statement Section - Flowchart -->
  <g class="anim-fade delay-1" data-narration="The break statement exits the loop prematurely when condition is met">
    <rect x="20" y="55" width="180" height="150" class="section-box break-box" filter="url(#shadow)"/>
    <text x="110" y="75" text-anchor="middle" class="label-text" style="font-weight:bold;">BREAK STATEMENT</text>
    
    <!-- Flowchart nodes -->
    <rect x="40" y="90" width="60" height="25" fill="#fff" stroke="#ff6b6b" stroke-width="2" rx="4"/>
    <text x="70" y="107" text-anchor="middle" class="label-text" style="font-size:12px;">Start Loop</text>
    
    <line x1="70" y1="115" x2="70" y2="135" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="35" y="135" width="70" height="30" fill="#fff" stroke="#ff6b6b" stroke-width="2" rx="4"/>
    <text x="70" y="152" text-anchor="middle" class="label-text" style="font-size:11px;">Condition</text>
    <text x="70" y="165" text-anchor="middle" class="code-text">(i == 5?)</text>
    
    <line x1="105" y1="150" x2="140" y2="150" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="122" y="145" class="label-text" style="font-size:10px;fill:#666;">Yes</text>
    
    <!-- Exit node -->
    <rect x="140" y="135" width="50" height="30" fill="#ffcccc" stroke="#ff0000" stroke-width="2" rx="4"/>
    <text x="165" y="155" text-anchor="middle" class="label-text" style="font-size:11px;font-weight:bold;">EXIT</text>
    
    <line x1="70" y1="165" x2="70" y2="185" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="85" y="178" class="label-text" style="font-size:10px;fill:#666;">No</text>
    
    <rect x="40" y="185" width="60" height="20" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
    <text x="70" y="199" text-anchor="middle" class="label-text" style="font-size:10px;">Process</text>
  </g>
  
  <!-- Continue Statement Section -->
  <g class="anim-fade delay-2" data-narration="The continue statement skips current iteration and moves to next">
    <rect x="210" y="55" width="190" height="150" class="section-box continue-box" filter="url(#shadow)"/>
    <text x="305" y="75" text-anchor="middle" class="label-text" style="font-weight:bold;">CONTINUE STATEMENT</text>
    
    <!-- Flow diagram for continue -->
    <rect x="230" y="90" width="60" height="25" fill="#fff" stroke="#4d88ff" stroke-width="2" rx="4"/>
    <text x="260" y="107" text-anchor="middle" class="label-text" style="font-size:12px;">Start Loop</text>
    
    <line x1="260" y1="115" x2="260" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="225" y="130" width="70" height="30" fill="#fff" stroke="#4d88ff" stroke-width="2" rx="4"/>
    <text x="260" y="147" text-anchor="middle" class="label-text" style="font-size:11px;">Condition</text>
    <text x="260" y="160" text-anchor="middle" class="code-text">(skip?)</text>
    
    <!-- Skip path -->
    <path d="M295 145 Q330 145 330 120 Q330 95 295 95" fill="none" stroke="#4d88ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
    <text x="320" y="115" class="label-text" style="font-size:10px;fill:#4d88ff;">Skip iteration</text>
    
    <!-- Continue path -->
    <line x1="260" y1="160" x2="260" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="275" y="173" class="label-text" style="font-size:10px;fill:#666;">No</text>
    
    <rect x="230" y="180" width="60" height="25" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
    <text x="260" y="197" text-anchor="middle" class="label-text" style="font-size:10px;">Process</text>
  </g>
  
  <!-- Code Example Section -->
  <g class="anim-fade delay-3" data-narration="Example: Loop prints 0-4 then breaks when i equals 5">
    <rect x="20" y="215" width="180" height="85" class="section-box loop-box" filter="url(#shadow)"/>
    <text x="110" y="232" text-anchor="middle" class="label-text" style="font-weight:bold;">Break Example</text>
    <text x="30" y="252" class="code-text">for i in range(10):</text>
    <text x="40" y="267" class="code-text">if i == 5:</text>
    <text x="50" y="282" class="code-text" style="fill:#cc0000;">break</text>
    <text x="40" y="297" class="code-text">print(i)</text>
    
    <!-- Output indicators -->
    <rect x="130" y="245" width="60" height="50" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
    <text x="160" y="260" text-anchor="middle" class="label-text" style="font-size:11px;">Output:</text>
    <text x="160" y="275" text-anchor="middle" class="code-text" style="font-size:10px;">0 1 2 3 4</text>
    <circle cx="160" cy="290" r="8" fill="#ff6b6b" class="anim-pulse"/>
    <text x="160" y="294" text-anchor="middle" class="label-text" style="font-size:9px;fill:#fff;">STOP</text>
  </g>
  
  <!-- Continue Example Section -->
  <g class="anim-fade delay-4" data-narration="Example: Continue skips even numbers, prints only odd">
    <rect x="210" y="215" width="190" height="85" class="section-box" fill="#e6f2ff" filter="url(#shadow)"/>
    <text x="305" y="232" text-anchor="middle" class="label-text" style="font-weight:bold;">Continue Example</text>
    <text x="220" y="252" class="code-text">for i in range(5):</text>
    <text x="230" y="267" class="code-text">if i % 2 == 0:</text>
    <text x="240" y="282" class="code-text" style="fill:#0066cc;">continue</text>
    <text x="230" y="297" class="code-text">print(i)</text>
    
    <!-- Output indicators -->
    <rect x="320" y="245" width="70" height="50" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
    <text x="355" y="260" text-anchor="middle" class="label-text" style="font-size:11px;">Output:</text>
    <text x="355" y="275" text-anchor="middle" class="code-text" style="font-size:10px;">1   3</text>
    <text x="355" y="290" text-anchor="middle" class="label-text" style="font-size:8px;fill:#888;">(odd only)</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="anim-fade delay-5" data-narration="Key differences: break exits loop entirely, continue skips one iteration">
    <rect x="20" y="310" width="380" height="80" fill="#fff9e6" stroke="#ffcc00" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="210" y="330" text-anchor="middle" class="label-text" style="font-weight:bold;">Key Concepts</text>
    
    <!-- Concept 1 -->
    <circle cx="60" cy="355" r="15" fill="#ffb3b3" class="anim-bounce"/>
    <text x="60" y="360" text-anchor="middle" class="label-text" style="font-size:16px;font-weight:bold;color:#cc0000;">B</text>
    <text x="85" y="358" class="label-text" style="font-size:12px;">Break:</text>
    <text x="85" y="372" class="label-text" style="font-size:11px;">Exits loop completely</text>
    
    <!-- Concept 2 -->
    <circle cx="210" cy="355" r="15" fill="#b3d9ff" class="anim-bounce"/>
    <text x="210" y="360" text-anchor="middle" class="label-text" style="font-size:16px;font-weight:bold;color:#0066cc;">C</text>
    <text x="235" y="358" class="label-text" style="font-size:12px;">Continue:</text>
    <text x="235" y="372" class="label-text" style="font-size:11px;">Skips to next iteration</text>
    
    <!-- Arrow between concepts -->
    <path d="M120 355 Q165 355 185 355" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <text x="152" y="348" text-anchor="middle" class="label-text" style="font-size:9px;">Control Flow</text>
  </g>
  
  <!-- Decorative elements -->
  <g class="anim-fade delay-2">
    <circle cx="400" cy="20" r="12" fill="#ffcc00" opacity="0.3"/>
    <circle cx="380" cy="380" r="8" fill="#ff9999" opacity="0.3"/>
    <circle cx="30" cy="380" r="10" fill="#99ccff" opacity="0.3"/>
  </g>
</svg>