<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="input-output-statements">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#d4f1e8"/>
      <stop offset="100%" style="stop-color:#f0e8f4"/>
    </linearGradient>
    <linearGradient id="inputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98d8aa"/>
      <stop offset="100%" style="stop-color:#6ec08b"/>
    </linearGradient>
    <linearGradient id="fileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b1ff"/>
      <stop offset="100%" style="stop-color:#a88bdb"/>
    </linearGradient>
    <linearGradient id="computerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6a5"/>
      <stop offset="100%" style="stop-color:#ffb347"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .user-box { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .computer-box { animation: slideInDown 0.6s ease-out 0.4s both; }
    .input-box { animation: slideInLeft 0.6s ease-out 0.3s both; }
    .output-box { animation: slideInRight 0.6s ease-out 0.5s both; }
    .file-box { animation: slideInRight 0.6s ease-out 0.6s both; }
    .arrow { animation: fadeIn 0.5s ease-out 0.7s both; }
    .label { animation: fadeIn 0.5s ease-out 0.8s both; }
    .pulse-anim { animation: pulse 2s infinite; }
    .bounce-anim { animation: bounce 1.5s infinite; }
    .user-icon { animation: bounce 1.5s infinite 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="15"/>
  
  <!-- Title -->
  <text x="210" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle" class="title">Input/Output Statements</text>
  <text x="210" y="50" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" text-anchor="middle" class="title">in Python</text>
  
  <!-- User Section -->
  <g class="user-box" data-narration="The user provides input data to the program through input devices like keyboard">
    <rect x="20" y="90" width="80" height="60" rx="8" fill="url(#computerGradient)" stroke="#e67e22" stroke-width="2"/>
    <text x="60" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">USER</text>
    <text x="60" y="135" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">(Keyboard)</text>
    <circle cx="60" cy="108" r="12" fill="#fff" opacity="0.3" class="bounce-anim"/>
  </g>
  
  <!-- Input Box -->
  <g class="input-box" data-narration="The input() function reads data from the user as a string">
    <rect x="130" y="90" width="100" height="60" rx="8" fill="url(#inputGradient)" stroke="#3498db" stroke-width="2"/>
    <text x="180" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">INPUT</text>
    <text x="180" y="135" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">input()</text>
  </g>
  
  <!-- Arrow: User to Input -->
  <g class="arrow">
    <line x1="100" y1="120" x2="130" y2="120" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="125,115 135,120 125,125" fill="#3498db"/>
  </g>
  
  <!-- Computer Section -->
  <g class="computer-box" data-narration="The computer processes the input and generates output">
    <rect x="155" y="170" width="110" height="50" rx="8" fill="url(#computerGradient)" stroke="#e67e22" stroke-width="2"/>
    <text x="210" y="195" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">COMPUTER</text>
    <text x="210" y="210" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Processing</text>
  </g>
  
  <!-- Arrow: Input to Computer -->
  <g class="arrow">
    <line x1="180" y1="150" x2="180" y2="170" stroke="#3498db" stroke-width="2"/>
    <polygon points="175,165 185,170 175,175" fill="#3498db"/>
  </g>
  
  <!-- Arrow: Computer to Output -->
  <g class="arrow">
    <line x1="240" y1="170" x2="240" y2="150" stroke="#27ae60" stroke-width="2"/>
    <polygon points="235,155 245,150 235,145" fill="#27ae60"/>
  </g>
  
  <!-- Output Box -->
  <g class="output-box" data-narration="The print() function displays output to the user">
    <rect x="260" y="90" width="100" height="60" rx="8" fill="url(#outputGradient)" stroke="#27ae60" stroke-width="2"/>
    <text x="310" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">OUTPUT</text>
    <text x="310" y="135" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">print()</text>
  </g>
  
  <!-- Arrow: Output to User -->
  <g class="arrow">
    <line x1="260" y1="120" x2="100" y2="120" stroke="#27ae60" stroke-width="2"/>
    <polygon points="105,125 95,120 105,115" fill="#27ae60"/>
  </g>
  
  <!-- File I/O Section -->
  <g class="file-box" data-narration="File I/O allows reading from and writing to files using open(), read(), and write() functions">
    <rect x="260" y="240" width="130" height="70" rx="8" fill="url(#fileGradient)" stroke="#9b59b6" stroke-width="2"/>
    <text x="325" y="265" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">FILE I/O</text>
    <text x="325" y="285" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">open() read() write()</text>
    <text x="325" y="300" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">example.txt</text>
  </g>
  
  <!-- Arrow: Computer to File -->
  <g class="arrow">
    <line x1="210" y1="220" x2="260" y2="255" stroke="#9b59b6" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="255,250 265,255 255,260" fill="#9b59b6"/>
  </g>
  
  <!-- Key Concepts -->
  <g class="label">
    <rect x="15" y="330" width="185" height="55" rx="5" fill="#fff" stroke="#bdc3c7" stroke-width="1" opacity="0.9"/>
    <text x="25" y="350" font-family="Arial" font-size="11" font-weight="bold" fill="#2c3e50">Input: input() → string</text>
    <text x="25" y="365" font-family="Arial" font-size="10" fill="#5d6d7e">name = input("Enter name:")</text>
    <text x="25" y="378" font-family="Arial" font-size="10" fill="#5d6d7e">age = int(input("Age:"))</text>
  </g>
  
  <g class="label">
    <rect x="210" y="330" width="185" height="55" rx="5" fill="#fff" stroke="#bdc3c7" stroke-width="1" opacity="0.9"/>
    <text x="220" y="350" font-family="Arial" font-size="11" font-weight="bold" fill="#2c3e50">Output: print() → display</text>
    <text x="220" y="365" font-family="Arial" font-size="10" fill="#5d6d7e">print("Hello", name)</text>
    <text x="220" y="378" font-family="Arial" font-size="10" fill="#5d6d7e">print("Age: {}".format(age))</text>
  </g>
  
  <!-- Flow indicators -->
  <g class="pulse-anim">
    <circle cx="180" cy="120" r="5" fill="#3498db" opacity="0.7"/>
  </g>
  <g class="pulse-anim">
    <circle cx="310" cy="120" r="5" fill="#27ae60" opacity="0.7" style="animation-delay: 0.5s"/>
  </g>
</svg>