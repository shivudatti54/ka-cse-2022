<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="defining-functions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e0f0e8"/>
    </linearGradient>
    <linearGradient id="defGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c9cb5"/>
      <stop offset="100%" style="stop-color:#5a7a94"/>
    </linearGradient>
    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8eb88e"/>
      <stop offset="100%" style="stop-color:#6a9a6c"/>
    </linearGradient>
    <linearGradient id="paramGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4a35a"/>
      <stop offset="100%" style="stop-color:#a68540"/>
    </linearGradient>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b89595"/>
      <stop offset="100%" style="stop-color:#9c7575"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideIn 0.6s ease-out forwards; }
    .syntax-box { animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .part-def { animation: slideInLeft 0.5s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .part-name { animation: slideInLeft 0.5s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .part-params { animation: slideInLeft 0.5s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    .part-body { animation: slideInLeft 0.5s ease-out forwards; animation-delay: 1s; opacity: 0; }
    .label { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.2s; opacity: 0; }
    .arrow { animation: drawArrow 0.5s ease-out forwards; stroke-dasharray: 100; animation-delay: 1.3s; }
    .concept-box { animation: fadeIn 0.6s ease-out forwards; animation-delay: 1.4s; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#3d5a73" class="title">Defining Functions in Python</text>
  
  <!-- Main Syntax Box -->
  <g class="syntax-box">
    <rect x="60" y="60" width="300" height="100" fill="#f8f8f8" stroke="#ccc" stroke-width="2" rx="8"/>
    <text x="70" y="82" font-family="Consolas, monospace" font-size="16" fill="#333">
      <tspan class="part-def" fill="#5a7a94" font-weight="bold">def</tspan>
      <tspan class="part-name" fill="#4a7a4a" font-weight="bold"> function_name</tspan>
      <tspan class="part-params" fill="#a68540">(</tspan>
      <tspan class="part-params" fill="#a68540">parameters</tspan>
      <tspan class="part-params" fill="#a68540">):</tspan>
    </text>
    <text x="90" y="110" font-family="Consolas, monospace" font-size="14" fill="#666" class="part-body"># function body</text>
    <text x="90" y="130" font-family="Consolas, monospace" font-size="14" fill="#666" class="part-body">    ...</text>
  </g>
  
  <!-- Arrow Labels -->
  <g class="label">
    <path d="M 85 55 L 85 45 L 95 45" stroke="#5a7a94" stroke-width="2" fill="none" class="arrow"/>
    <rect x="95" y="32" width="50" height="22" fill="#e8f0f5" rx="4" stroke="#5a7a94" stroke-width="1"/>
    <text x="120" y="47" text-anchor="middle" font-family="Arial" font-size="11" fill="#3d5a73">def keyword</text>
    
    <path d="M 160 55 L 160 45 L 170 45" stroke="#4a7a4a" stroke-width="2" fill="none" class="arrow"/>
    <rect x="170" y="32" width="95" height="22" fill="#e8f5ec" rx="4" stroke="#4a7a4a" stroke-width="1"/>
    <text x="217" y="47" text-anchor="middle" font-family="Arial" font-size="11" fill="#3d5a73">function_name</text>
    
    <path d="M 230 55 L 230 45 L 240 45" stroke="#a68540" stroke-width="2" fill="none" class="arrow"/>
    <rect x="240" y="32" width="75" height="22" fill="#f5f0e0" rx="4" stroke="#a68540" stroke-width="1"/>
    <text x="277" y="47" text-anchor="middle" font-family="Arial" font-size="11" fill="#3d5a73">parameters</text>
    
    <path d="M 270 165 L 270 175 L 280 175" stroke="#9c7575" stroke-width="2" fill="none" class="arrow"/>
    <rect x="280" y="172" width="95" height="22" fill="#f5e8e8" rx="4" stroke="#9c7575" stroke-width="1"/>
    <text x="327" y="187" text-anchor="middle" font-family="Arial" font-size="11" fill="#3d5a73">function body</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="concept-box" data-narration="The def keyword initiates function definition">
    <rect x="20" y="200" width="115" height="55" fill="url(#defGradient)" rx="6"/>
    <text x="77" y="218" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">def</text>
    <text x="77" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8e8e8">Keyword to define</text>
    <text x="77" y="247" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8e8e8">a function</text>
  </g>
  
  <g class="concept-box" data-narration="Function name follows def, should be descriptive">
    <rect x="150" y="200" width="125" height="55" fill="url(#nameGradient)" rx="6"/>
    <text x="212" y="218" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">function_name</text>
    <text x="212" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8e8e8">Identifier for</text>
    <text x="212" y="247" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8e8e8">the function</text>
  </g>
  
  <g class="concept-box" data-narration="Parameters are inputs passed to the function">
    <rect x="290" y="200" width="110" height="55" fill="url(#paramGradient)" rx="6"/>
    <text x="345" y="218" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">(parameters)</text>
    <text x="345" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8e8e8">Input values</text>
    <text x="345" y="247" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8e8e8">passed in</text>
  </g>
  
  <g class="concept-box" data-narration="Function body contains the code to execute">
    <rect x="150" y="270" width="125" height="55" fill="url(#bodyGradient)" rx="6" class="pulse"/>
    <text x="212" y="288" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">: # body</text>
    <text x="212" y="305" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8e8e8">Code to execute</text>
    <text x="212" y="317" text-anchor="middle" font-family="Arial" font-size="10" fill="#e8e8e8">indented block</text>
  </g>
  
  <!-- Example annotation -->
  <g class="concept-box" data-narration="Example showing greet function with name parameter">
    <rect x="20" y="340" width="380" height="50" fill="#fff" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="210" y="360" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#555">def greet(name):</text>
    <text x="210" y="378" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#888">    print(f"Hello, {name}!")</text>
  </g>
</svg>