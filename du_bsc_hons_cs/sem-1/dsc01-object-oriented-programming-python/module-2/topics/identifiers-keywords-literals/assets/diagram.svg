<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="identifiers-keywords-literals">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="identifierGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e6b8"/>
      <stop offset="100%" style="stop-color:#90d890"/>
    </linearGradient>
    <linearGradient id="keywordGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d8f0"/>
      <stop offset="100%" style="stop-color:#80b8e0"/>
    </linearGradient>
    <linearGradient id="literalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6b8"/>
      <stop offset="100%" style="stop-color:#e0c880"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: 'Arial', sans-serif; font-size: 12px; fill: #4a5568; }
    .code { font-family: 'Courier New', monospace; font-size: 11px; fill: #6c5ce7; }
    .section { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .title-anim { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .box-anim { animation: pulse 3s ease-in-out infinite; }
    .arrow-anim { animation: fadeIn 0.5s ease-out forwards; opacity: 0; animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title title-anim" data-narration="Main title showing the three fundamental concepts in Python: Identifiers, Keywords, and Literals">Identifiers, Keywords &amp; Literals</text>
  <text x="210" y="55" text-anchor="middle" class="detail" data-narration="Python programming basics">in Python</text>
  
  <!-- Identifiers Box -->
  <g class="section section-1" data-narration="Identifiers are names given to variables, functions, classes, and modules in Python">
    <rect x="20" y="75" width="110" height="120" rx="10" fill="url(#identifierGrad)" filter="url(#shadow)"/>
    <text x="75" y="95" text-anchor="middle" class="label">Identifiers</text>
    <line x1="30" y1="105" x2="120" y2="105" stroke="#6c9" stroke-width="1"/>
    <text x="75" y="125" text-anchor="middle" class="detail">Names for:</text>
    <text x="75" y="140" text-anchor="middle" class="detail">• Variables</text>
    <text x="75" y="155" text-anchor="middle" class="detail">• Functions</text>
    <text x="75" y="170" text-anchor="middle" class="detail">• Classes</text>
    <text x="75" y="185" text-anchor="middle" class="code">my_var</text>
  </g>
  
  <!-- Keywords Box -->
  <g class="section section-2" data-narration="Keywords are reserved words in Python that have special meaning and cannot be used as identifiers">
    <rect x="155" y="75" width="110" height="120" rx="10" fill="url(#keywordGrad)" filter="url(#shadow)"/>
    <text x="210" y="95" text-anchor="middle" class="label">Keywords</text>
    <line x1="165" y1="105" x2="255" y2="105" stroke="#69c" stroke-width="1"/>
    <text x="210" y="125" text-anchor="middle" class="detail">Reserved words:</text>
    <text x="210" y="140" text-anchor="middle" class="code">if else for while</text>
    <text x="210" y="155" text-anchor="middle" class="code">def class import</text>
    <text x="210" y="175" text-anchor="middle" class="detail" style="font-size:10px;">Cannot use as names</text>
  </g>
  
  <!-- Literals Box -->
  <g class="section section-3" data-narration="Literals are constant values written directly in the code - numbers, strings, booleans">
    <rect x="290" y="75" width="110" height="120" rx="10" fill="url(#literalGrad)" filter="url(#shadow)"/>
    <text x="345" y="95" text-anchor="middle" class="label">Literals</text>
    <line x1="300" y1="105" x2="390" y2="105" stroke="#c96" stroke-width="1"/>
    <text x="345" y="125" text-anchor="middle" class="detail">Constant values:</text>
    <text x="345" y="145" text-anchor="middle" class="code">42 3.14 True</text>
    <text x="345" y="160" text-anchor="middle" class="code">"hello" None</text>
    <text x="345" y="180" text-anchor="middle" class="detail" style="font-size:10px;">Numeric, String, Bool</text>
  </g>
  
  <!-- Arrows connecting boxes -->
  <g class="arrow-anim" data-narration="Arrows showing the conceptual relationship between these three concepts">
    <!-- Arrow from Identifiers to Keywords -->
    <path d="M 130 135 L 150 135" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- Arrow from Keywords to Literals -->
    <path d="M 265 135 L 285 135" stroke="#888" stroke-width="2" fill="none"/>
    <!-- Curved arrow showing cycle/relationship -->
    <path d="M 345 195 Q 210 220 75 195" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Example Section -->
  <g class="section" style="animation-delay: 0.9s;" data-narration="Code examples showing identifiers, keywords, and literals in actual Python code">
    <rect x="20" y="210" width="380" height="85" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="230" text-anchor="middle" class="label" style="font-size:14px;">Code Examples</text>
    
    <!-- Code line 1 -->
    <text x="35" y="252" class="code">age = 25</text>
    <text x="300" y="252" class="detail" style="fill:#888;">age = identifier, 25 = integer literal</text>
    
    <!-- Code line 2 -->
    <text x="35" y="272" class="code">if age &gt; 18:</text>
    <text x="300" y="272" class="detail" style="fill:#888;">if = keyword, age = identifier</text>
    
    <!-- Code line 3 -->
    <text x="55" y="292" class="code">name = "Alice"</text>
    <text x="300" y="292" class="detail" style="fill:#888;">name = identifier, "Alice" = string literal</text>
  </g>
  
  <!-- Rules Summary -->
  <g class="section" style="animation-delay: 1.1s;" data-narration="Key rules summary: identifiers start with letter/underscore, keywords are reserved, literals are values">
    <rect x="20" y="305" width="380" height="80" rx="8" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="210" y="325" text-anchor="middle" class="label" style="font-size:14px;">Key Rules</text>
    
    <g transform="translate(30, 345)">
      <circle cx="8" cy="0" r="4" fill="#6c9"/>
      <text x="20" y="4" class="detail">Identifiers: start with letter/underscore, case-sensitive</text>
    </g>
    <g transform="translate(30, 365)">
      <circle cx="8" cy="0" r="4" fill="#69c"/>
      <text x="20" y="4" class="detail">Keywords: reserved words, lowercase only</text>
    </g>
    <g transform="translate(30, 385)">
      <circle cx="8" cy="0" r="4" fill="#c96"/>
      <text x="20" y="4" class="detail">Literals: numeric, string, boolean, or None values</text>
    </g>
  </g>
  
  <!-- Animated decorative elements -->
  <circle cx="50" cy="370" r="8" fill="#b8e6b8" opacity="0.5" style="animation: pulse 2s infinite;"/>
  <circle cx="370" cy="60" r="12" fill="#b8d8f0" opacity="0.4" style="animation: pulse 2.5s infinite;"/>
  <circle cx="400" cy="380" r="6" fill="#f0e6b8" opacity="0.5" style="animation: pulse 1.8s infinite;"/>
</svg>