<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="default-arguments" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c0"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#98d8aa"/>
      <stop offset="100%" style="stop-color:#7ac189"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7d794"/>
      <stop offset="100%" style="stop-color:#f5c76b"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb7b2"/>
      <stop offset="100%" style="stop-color:#ff9e99"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideRight {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.9s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 1.2s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out 1.5s forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .code-text { font-family: 'Courier New', monospace; }
    .label { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c5f7c" class="title">Default Arguments in Python</text>
  
  <!-- Section 1: Function Definition -->
  <g class="box1" data-narration="Function definition showing default argument syntax with = operator">
    <rect x="20" y="55" width="180" height="85" rx="10" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="110" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Function Definition</text>
    <text x="30" y="98" font-size="12" fill="#fff" class="code-text">def greet(name="World"):</text>
    <text x="30" y="115" font-size="12" fill="#fff" class="code-text">print(f"Hello, {name}!")</text>
    <circle cx="165" cy="125" r="15" fill="#5ba3c0" class="pulse-element"/>
    <text x="165" y="130" text-anchor="middle" font-size="18" fill="#fff">=</text>
  </g>
  
  <!-- Section 2: Default Value -->
  <g class="box2" data-narration="Default value assigned using = operator in function signature">
    <rect x="220" y="55" width="180" height="85" rx="10" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="310" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Default Value</text>
    <text x="230" y="98" font-size="12" fill="#fff" class="code-text">name = "World"</text>
    <text x="230" y="115" font-size="12" fill="#fff" class="code-text">↑ Default Value</text>
    <rect x="225" y="105" width="50" height="2" fill="#fff" opacity="0.6"/>
  </g>
  
  <!-- Arrow between def and default -->
  <path d="M200 85 L220 85" stroke="#555" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <polygon points="218,82 220,85 218,88" fill="#555" class="arrow"/>
  
  <!-- Section 3: Function Calls -->
  <g class="box3" data-narration="Function can be called with or without arguments">
    <rect x="20" y="160" width="180" height="110" rx="10" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="110" y="182" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b5a2d">Function Calls</text>
    <text x="30" y="205" font-size="12" fill="#6b5a2d" class="code-text">greet()</text>
    <text x="30" y="220" font-size="12" fill="#8b7355" class="code-text"># → Hello, World!</text>
    <text x="30" y="245" font-size="12" fill="#6b5a2d" class="code-text">greet("Alice")</text>
    <text x="30" y="260" font-size="12" fill="#8b7355" class="code-text"># → Hello, Alice!</text>
  </g>
  
  <!-- Section 4: Mutability Warning -->
  <g class="box4" data-narration="Mutable default arguments are evaluated once - shared across calls">
    <rect x="220" y="160" width="180" height="110" rx="10" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="310" y="182" text-anchor="middle" font-size="14" font-weight="bold" fill="#8b3a3a">⚠ Mutability Warning</text>
    <text x="230" y="205" font-size="12" fill="#8b3a3a" class="code-text">def append(x, lst=[]):</text>
    <text x="230" y="220" font-size="12" fill="#8b3a3a" class="code-text">lst.append(x)</text>
    <text x="230" y="240" font-size="11" fill="#a85555" class="code-text"># lst is SHARED!</text>
    <text x="230" y="255" font-size="11" fill="#a85555" class="code-text">append(1) → [1]</text>
    <text x="230" y="268" font-size="11" fill="#a85555" class="code-text">append(2) → [1,2] ❌</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="box1" data-narration="Key takeaway: Use None as default for mutable arguments">
    <rect x="20" y="285" width="380" height="50" rx="8" fill="#fff" stroke="#7ec8e3" stroke-width="2"/>
    <text x="35" y="305" font-size="13" font-weight="bold" fill="#2c5f7c">💡 Best Practice:</text>
    <text x="35" y="323" font-size="12" fill="#555">Use </text>
    <text x="55" y="323" font-size="12" fill="#c94c4c" class="code-text">None</text>
    <text x="85" y="323" font-size="12" fill="#555"> as default for mutable types:</text>
    <text x="265" y="323" font-size="11" fill="#555" class="code-text">def f(lst=None):</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="30" cy="30" r="8" fill="#7ec8e3" opacity="0.5"/>
  <circle cx="390" cy="370" r="12" fill="#98d8aa" opacity="0.5"/>
  <circle cx="50" cy="370" r="6" fill="#f7d794" opacity="0.5"/>
  
  <!-- Interactive hint -->
  <text x="210" y="385" text-anchor="middle" font-size="11" fill="#888" font-style="italic">Functions with optional parameters made simple!</text>
</svg>