<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="operators-and-expressions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#ffeef5"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0"/>
      <stop offset="100%" style="stop-color:#b894c7"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#94b8cc"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0d4b8"/>
      <stop offset="100%" style="stop-color:#c7b894"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box1-anim { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2-anim { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3-anim { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4-anim { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .number-line-anim { animation: slideUp 0.8s ease-out 0.5s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .operator-text { font-family: 'Courier New', monospace; font-weight: bold; }
    .section-title { font-family: Arial, sans-serif; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="section-title" font-size="22" fill="#4a4a6a" font-weight="bold">Operators And Expressions</text>
  <text x="210" y="50" text-anchor="middle" font-size="12" fill="#6a6a8a">Python Fundamentals</text>
  
  <!-- Section 1: Arithmetic Operators -->
  <g class="box1-anim" data-narration="Arithmetic operators perform mathematical calculations: addition, subtraction, multiplication, division, exponentiation, modulus, and floor division.">
    <rect x="10" y="65" width="95" height="75" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="57" y="82" text-anchor="middle" class="section-title" font-size="13" fill="#2d5a47">Arithmetic</text>
    <text x="57" y="100" text-anchor="middle" class="operator-text" font-size="11" fill="#1a3a2a">+ - * /</text>
    <text x="57" y="115" text-anchor="middle" class="operator-text" font-size="11" fill="#1a3a2a">** % //</text>
  </g>
  
  <!-- Section 2: Comparison Operators -->
  <g class="box2-anim" data-narration="Comparison operators compare values and return True or False: equal to, not equal to, greater than, less than, and their equal variants.">
    <rect x="115" y="65" width="95" height="75" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="162" y="82" text-anchor="middle" class="section-title" font-size="13" fill="#5a2d6a">Comparison</text>
    <text x="162" y="100" text-anchor="middle" class="operator-text" font-size="11" fill="#3a1a4a">== !=</text>
    <text x="162" y="115" text-anchor="middle" class="operator-text" font-size="11" fill="#3a1a4a">&lt; &gt; &lt;= &gt;=</text>
  </g>
  
  <!-- Section 3: Logical Operators -->
  <g class="box3-anim" data-narration="Logical operators combine boolean values: and returns True if both are true, or returns True if either is true, not inverts the value.">
    <rect x="220" y="65" width="95" height="75" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="267" y="82" text-anchor="middle" class="section-title" font-size="13" fill="#2d4a6a">Logical</text>
    <text x="267" y="100" text-anchor="middle" class="operator-text" font-size="11" fill="#1a2a4a">and or not</text>
    <text x="267" y="118" text-anchor="middle" font-size="9" fill="#3a5a7a">Boolean Logic</text>
  </g>
  
  <!-- Section 4: Assignment Operators -->
  <g class="box4-anim" data-narration="Assignment operators assign values to variables, including compound assignments that combine arithmetic with assignment.">
    <rect x="325" y="65" width="85" height="75" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="367" y="82" text-anchor="middle" class="section-title" font-size="13" fill="#5a4a2d">Assignment</text>
    <text x="367" y="100" text-anchor="middle" class="operator-text" font-size="11" fill="#3a2a1a">= += -=</text>
    <text x="367" y="115" text-anchor="middle" class="operator-text" font-size="11" fill="#3a2a1a">*= /=</text>
  </g>
  
  <!-- Number Line Visualization -->
  <g class="number-line-anim" data-narration="The number line visualizes comparison operators: less than points left, greater than points right, with filled circles showing inclusive comparisons.">
    <text x="210" y="175" text-anchor="middle" class="section-title" font-size="14" fill="#4a4a6a">Number Line - Comparison</text>
    
    <!-- Main number line -->
    <line x1="30" y1="230" x2="390" y2="230" stroke="#666" stroke-width="2"/>
    
    <!-- Tick marks and numbers -->
    <g font-size="11" fill="#444" text-anchor="middle">
      <line x1="60" y1="225" x2="60" y2="235" stroke="#666" stroke-width="1"/>
      <text x="60" y="250" font-size="12">-5</text>
      
      <line x1="130" y1="225" x2="130" y2="235" stroke="#666" stroke-width="1"/>
      <text x="130" y="250" font-size="12">-2</text>
      
      <line x1="200" y1="225" x2="200" y2="235" stroke="#666" stroke-width="1"/>
      <text x="200" y="250" font-size="12">0</text>
      
      <line x1="270" y1="225" x2="270" y2="235" stroke="#666" stroke-width="1"/>
      <text x="270" y="250" font-size="12">2</text>
      
      <line x1="340" y1="225" x2="340" y2="235" stroke="#666" stroke-width="1"/>
      <text x="340" y="250" font-size="12">5</text>
    </g>
    
    <!-- x < 2 representation -->
    <circle cx="270" cy="195" r="5" fill="#e07474" class="pulse-anim"/>
    <line x1="50" y1="195" x2="260" y2="195" stroke="#e07474" stroke-width="2"/>
    <polygon points="260,190 260,200 270,195" fill="#e07474"/>
    <text x="40" y="198" font-size="12" fill="#c44" font-weight="bold">x &lt; 2</text>
    
    <!-- x > 0 representation -->
    <circle cx="200" cy="265" r="5" fill="#74a1e0" class="pulse-anim"/>
    <line x1="210" y1="265" x2="380" y2="265" stroke="#74a1e0" stroke-width="2"/>
    <polygon points="380,260 380,270 390,265" fill="#74a1e0"/>
    <text x="320" y="278" font-size="12" fill="#4477bb" font-weight="bold">x &gt; 0</text>
    
    <!-- x >= -2 representation (filled circle) -->
    <circle cx="130" cy="195" r="5" fill="#4a8"/>
    <line x1="140" y1="195" x2="380" y2="195" stroke="#4a8" stroke-width="2"/>
    <polygon points="380,190 380,200 390,195" fill="#4a8"/>
    <text x="75" y="198" font-size="12" fill="#285" font-weight="bold">x &gt;= -2</text>
    
    <!-- x <= 5 representation (filled circle) -->
    <circle cx="340" cy="265" r="5" fill="#a874e0" class="pulse-anim"/>
    <line x1="50" y1="265" x2="330" y2="265" stroke="#a874e0" stroke-width="2"/>
    <polygon points="50,260 50,270 60,265" fill="#a874e0"/>
    <text x="280" y="278" font-size="12" fill="#7544a8" font-weight="bold">x &lt;= 5</text>
  </g>
  
  <!-- Expression Example Box -->
  <g class="number-line-anim" data-narration="Expressions combine operators with values. For example: result = (5 + 3) * 2 evaluates to 16.">
    <rect x="80" y="300" width="260" height="40" rx="6" fill="#f8f4e8" stroke="#d4c4a8" stroke-width="1"/>
    <text x="210" y="318" text-anchor="middle" font-size="11" fill="#5a5a4a">Expression: result = (5 + 3) * 2</text>
    <text x="210" y="332" text-anchor="middle" font-size="11" fill="#7a7a6a">→ Evaluates to: 16</text>
    
    <!-- Arrow from expression to number line area -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
      </marker>
    </defs>
    <line x1="210" y1="300" x2="210" y2="285" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Legend for number line -->
  <g class="number-line-anim" data-narration="Legend: Open circle means exclusive (less than or greater than), filled circle means inclusive (less than or equal, greater than or equal).">
    <text x="210" y="355" text-anchor="middle" font-size="10" fill="#666">
      <tspan fill="#e07474">○</tspan> Exclusive | <tspan fill="#4a8">●</tspan> Inclusive
    </text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="25" cy="380" r="4" fill="#b8e0d2" opacity="0.6"/>
  <circle cx="400" cy="25" r="6" fill="#d4b8e0" opacity="0.6"/>
  <circle cx="15" cy="25" r="3" fill="#b8d4e8" opacity="0.5"/>
  <circle cx="395" cy="380" r="4" fill="#e0d4b8" opacity="0.6"/>
</svg>