<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="tuples-sets-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tupleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fd4a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="setGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb3a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="unionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="intersectionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2bec3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="differenceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideInLeft {
      0% { transform: translateX(-30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      0% { transform: translateX(30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .tuple-box { animation: slideInLeft 0.6s ease-out forwards; }
    .set-box { animation: slideInRight 0.6s ease-out forwards; }
    .op-box { animation: slideInUp 0.5s ease-out forwards; }
    .label { animation: fadeIn 0.4s ease-out forwards; }
    .arrow { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2d3436" class="title">Tuples &amp; Sets Operations</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#636e72" stroke-width="1" stroke-dasharray="4" class="title"/>

  <!-- Tuple Section -->
  <g class="tuple-box" data-narration="Tuples are ordered, immutable collections defined with parentheses. Elements are accessed by index.">
    <rect x="20" y="55" width="170" height="100" rx="10" fill="url(#tupleGradient)" filter="url(#shadow)"/>
    <text x="105" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1e8449">TUPLE</text>
    <text x="105" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#145a32">(1, 2, 3, 4)</text>
    <text x="30" y="118" font-family="Arial, sans-serif" font-size="11" fill="#1e8449">✓ Ordered</text>
    <text x="30" y="133" font-family="Arial, sans-serif" font-size="11" fill="#1e8449">✓ Immutable</text>
    <text x="30" y="148" font-family="Arial, sans-serif" font-size="11" fill="#1e8449">✓ Indexed</text>
    <!-- Index indicators -->
    <g transform="translate(40, 115)">
      <text x="0" y="40" font-family="monospace" font-size="9" fill="#0e6655">[0]: 1</text>
      <text x="50" y="40" font-family="monospace" font-size="9" fill="#0e6655">[1]: 2</text>
    </g>
  </g>

  <!-- Set Section -->
  <g class="set-box" data-narration="Sets are unordered, mutable collections of unique values. Duplicates are automatically removed.">
    <rect x="230" y="55" width="170" height="100" rx="10" fill="url(#setGradient)" filter="url(#shadow)"/>
    <text x="315" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#c0392b">SET</text>
    <text x="315" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#922b21">{3, 1, 4, 2}</text>
    <text x="240" y="118" font-family="Arial, sans-serif" font-size="11" fill="#c0392b">✓ Unordered</text>
    <text x="240" y="133" font-family="Arial, sans-serif" font-size="11" fill="#c0392b">✓ Mutable</text>
    <text x="240" y="148" font-family="Arial, sans-serif" font-size="11" fill="#c0392b">✓ Unique only</text>
  </g>

  <!-- Connection arrows -->
  <path d="M195 105 L230 105" stroke="#636e72" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/>
    </marker>
  </defs>

  <!-- Operations Section -->
  <text x="210" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2d3436" class="label" data-narration="Set operations allow combining and comparing sets in different ways.">Set Operations</text>

  <!-- Union Operation -->
  <g class="op-box" data-narration="Union combines all elements from both sets, removing duplicates.">
    <rect x="20" y="190" width="115" height="55" rx="8" fill="url(#unionGradient)" filter="url(#shadow)"/>
    <text x="77" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#9a7d0a">UNION</text>
    <text x="77" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="#7d6608">A | B</text>
    <text x="77" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9a7d0a">All elements</text>
  </g>

  <!-- Intersection Operation -->
  <g class="op-box" data-narration="Intersection returns only elements that exist in both sets." style="animation-delay: 0.1s;">
    <rect x="152" y="190" width="115" height="55" rx="8" fill="url(#intersectionGradient)" filter="url(#shadow)"/>
    <text x="209" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2c3e50">INTERSECTION</text>
    <text x="209" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a252f">A &amp; B</text>
    <text x="209" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Common elements</text>
  </g>

  <!-- Difference Operation -->
  <g class="op-box" data-narration="Difference returns elements in the first set but not in the second." style="animation-delay: 0.2s;">
    <rect x="285" y="190" width="115" height="55" rx="8" fill="url(#differenceGradient)" filter="url(#shadow)"/>
    <text x="342" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#fff">DIFFERENCE</text>
    <text x="342" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="#e8e8e8">A - B</text>
    <text x="342" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e8e8e8">A only</text>
  </g>

  <!-- Visual representation of operations -->
  <g class="pulse-element" data-narration="Visual Venn diagram showing the three set operations.">
    <!-- Set A circle -->
    <circle cx="150" cy="310" r="50" fill="#ff7675" fill-opacity="0.3" stroke="#d63031" stroke-width="2"/>
    <text x="125" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">A</text>
    <text x="125" y="325" text-anchor="middle" font-family="monospace" font-size="9" fill="#922b21">{1,2,3,4}</text>
    
    <!-- Set B circle -->
    <circle cx="270" cy="310" r="50" fill="#74b9ff" fill-opacity="0.3" stroke="#0984e3" stroke-width="2"/>
    <text x="295" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0984e3">B</text>
    <text x="295" y="325" text-anchor="middle" font-family="monospace" font-size="9" fill="#0652DD">{3,4,5,6}</text>
    
    <!-- Intersection area -->
    <ellipse cx="210" cy="310" rx="25" ry="35" fill="#a29bfe" fill-opacity="0.5"/>
    <text x="210" y="312" text-anchor="middle" font-family="monospace" font-size="9" fill="#2d3436">{3,4}</text>
    
    <!-- Labels for regions -->
    <text x="210" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#636e72">Intersection</text>
  </g>

  <!-- Operation Result Box -->
  <g class="op-box" data-narration="Example results showing how each operation works with sample data." style="animation-delay: 0.3s;">
    <rect x="335" y="270" width="75" height="90" rx="6" fill="#fff" stroke="#b2bec3" stroke-width="1" filter="url(#shadow)"/>
    <text x="372" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#636e72">Results</text>
    <line x1="340" y1="295" x2="407" y2="295" stroke="#dfe6e9" stroke-width="1"/>
    <text x="372" y="310" text-anchor="middle" font-family="monospace" font-size="8" fill="#2d3436">A|B: {1,2,3,4,5,6}</text>
    <text x="372" y="325" text-anchor="middle" font-family="monospace" font-size="8" fill="#2d3436">A&amp;B: {3,4}</text>
    <text x="372" y="340" text-anchor="middle" font-family="monospace" font-size="8" fill="#2d3436">A-B: {1,2}</text>
    <text x="372" y="355" text-anchor="middle" font-family="monospace" font-size="8" fill="#2d3436">B-A: {5,6}</text>
  </g>

  <!-- Key takeaway -->
  <g data-narration="Key takeaway: Tuples for fixed data, Sets for unique collections with mathematical operations.">
    <rect x="10" y="365" width="400" height="25" rx="5" fill="#dfe6e9" opacity="0.8"/>
    <text x="210" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">Tuples: immutable records • Sets: unique collections with |, &amp;, - operations</text>
  </g>
</svg>