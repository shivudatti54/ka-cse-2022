<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="lists-creation-slicing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="listBoxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="elementGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fc1d8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { fill: #ff9a3c; }
      50% { fill: #ffb366; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c5aa0; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: 'Consolas', monospace; font-size: 12px; fill: #444; }
    .code { font-family: 'Consolas', monospace; font-size: 13px; fill: #1a5276; }
    .section-box { fill: #fff; stroke: #7ec8e3; stroke-width: 2; rx: 8; }
    .list-element { fill: url(#elementGradient); stroke: #5ba3c0; stroke-width: 1; rx: 4; }
    .arrow { fill: none; stroke: #e74c3c; stroke-width: 2; marker-end: url(#arrowhead); }
    .highlight-box { fill: #fff3cd; stroke: #ffc107; stroke-width: 1; rx: 4; }
    .section-1 { animation: fadeIn 0.6s ease-out forwards; }
    .section-2 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .highlight-anim { animation: highlight 1.5s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Lists: Creation &amp; Slicing</text>
  <line x1="30" y1="42" x2="390" y2="42" stroke="#7ec8e3" stroke-width="2"/>
  
  <!-- Section 1: Creating Lists -->
  <g class="section-1" data-narration="Three ways to create lists in Python: square brackets, list() function, and list literals">
    <rect x="15" y="55" width="190" height="100" class="section-box" filter="url(#shadow)"/>
    <text x="25" y="75" class="label" font-weight="bold">Creating Lists</text>
    
    <text x="25" y="95" class="code">my_list = []</text>
    <text x="25" y="110" class="detail">Empty list</text>
    
    <text x="25" y="128" class="code">my_list = [1,2,3]</text>
    <text x="25" y="143" class="detail">List literal</text>
  </g>
  
  <!-- Section 2: list() function -->
  <g class="section-2" data-narration="The list() function converts other iterables into lists">
    <rect x="215" y="55" width="190" height="100" class="section-box" filter="url(#shadow)"/>
    <text x="225" y="75" class="label" font-weight="bold">Using list()</text>
    
    <text x="225" y="95" class="code">list("abc")</text>
    <text x="225" y="110" class="detail">→ ['a','b','c']</text>
    
    <text x="225" y="128" class="code">list(range(3))</text>
    <text x="225" y="143" class="detail">→ [0,1,2]</text>
  </g>
  
  <!-- Section 3: List Indexing Diagram -->
  <g class="section-3" data-narration="List indexing: positive indices from 0, negative indices from -1">
    <rect x="15" y="165" width="390" height="120" class="section-box" filter="url(#shadow)"/>
    <text x="25" y="185" class="label" font-weight="bold">List Indexing</text>
    
    <!-- List visualization -->
    <rect x="60" y="200" width="280" height="35" fill="url(#listBoxGradient)" rx="5"/>
    
    <!-- Elements -->
    <g transform="translate(65, 205)">
      <rect width="35" height="25" class="list-element"/>
      <text x="17" y="17" text-anchor="middle" class="detail" fill="#fff">0</text>
    </g>
    <g transform="translate(105, 205)">
      <rect width="35" height="25" class="list-element"/>
      <text x="17" y="17" text-anchor="middle" class="detail" fill="#fff">1</text>
    </g>
    <g transform="translate(145, 205)">
      <rect width="35" height="25" class="list-element"/>
      <text x="17" y="17" text-anchor="middle" class="detail" fill="#fff">2</text>
    </g>
    <g transform="translate(185, 205)">
      <rect width="35" height="25" class="list-element"/>
      <text x="17" y="17" text-anchor="middle" class="detail" fill="#fff">3</text>
    </g>
    <g transform="translate(225, 205)">
      <rect width="35" height="25" class="list-element"/>
      <text x="17" y="17" text-anchor="middle" class="detail" fill="#fff">4</text>
    </g>
    <g transform="translate(265, 205)">
      <rect width="35" height="25" class="list-element" style="fill:#ffb366"/>
      <text x="17" y="17" text-anchor="middle" class="detail" fill="#fff">5</text>
    </g>
    
    <!-- Positive indices -->
    <text x="82" y="245" text-anchor="middle" class="detail" fill="#2c5aa0">0</text>
    <text x="122" y="245" text-anchor="middle" class="detail" fill="#2c5aa0">1</text>
    <text x="162" y="245" text-anchor="middle" class="detail" fill="#2c5aa0">2</text>
    <text x="202" y="245" text-anchor="middle" class="detail" fill="#2c5aa0">3</text>
    <text x="242" y="245" text-anchor="middle" class="detail" fill="#2c5aa0">4</text>
    <text x="282" y="245" text-anchor="middle" class="detail" fill="#e74c3c" font-weight="bold">5</text>
    
    <!-- Negative indices -->
    <text x="82" y="265" text-anchor="middle" class="detail" fill="#666">-6</text>
    <text x="122" y="265" text-anchor="middle" class="detail" fill="#666">-5</text>
    <text x="162" y="265" text-anchor="middle" class="detail" fill="#666">-4</text>
    <text x="202" y="265" text-anchor="middle" class="detail" fill="#666">-3</text>
    <text x="242" y="265" text-anchor="middle" class="detail" fill="#666">-2</text>
    <text x="282" y="265" text-anchor="middle" class="detail" fill="#e74c3c" font-weight="bold">-1</text>
    
    <!-- Arrow for indexing -->
    <path d="M295 212 L330 212" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="340" y="217" class="detail" fill="#e74c3c">list[5]</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Section 4: Slicing Examples -->
  <g class="section-4" data-narration="Slicing syntax: list[start:stop:step] - extract portions of a list">
    <rect x="15" y="295" width="390" height="95" class="section-box" filter="url(#shadow)"/>
    <text x="25" y="315" class="label" font-weight="bold">Slicing: list[start:stop:step]</text>
    
    <!-- Slice example 1 -->
    <g>
      <text x="25" y="340" class="code">my_list[1:3]</text>
      <text x="25" y="355" class="detail">→ [2, 3]</text>
      <rect x="100" y="330" width="50" height="20" fill="#ffeaa7" stroke="#fdcb6e" rx="3"/>
      <text x="125" y="345" text-anchor="middle" class="detail">slice</text>
    </g>
    
    <!-- Slice example 2 -->
    <g>
      <text x="180" y="340" class="code">my_list[1:]</text>
      <text x="180" y="355" class="detail">→ [2,3,4,5]</text>
    </g>
    
    <!-- Slice example 3 -->
    <g>
      <text x="280" y="340" class="code">my_list[::2]</text>
      <text x="280" y="355" class="detail">→ [1,3,5]</text>
      <path d="M330 360 L360 360" stroke="#3498db" stroke-width="2" marker-end="url(#arrowheadBlue)" stroke-dasharray="4"/>
      <text x="370" y="365" class="detail" fill="#3498db">step=2</text>
    </g>
    
    <!-- Slice example 4 -->
    <g>
      <text x="25" y="378" class="code">my_list[-2:]</text>
      <text x="25" y="385" class="detail">→ [4, 5]  (last 2)</text>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="400" cy="20" r="8" fill="#7ec8e3" opacity="0.5"/>
  <circle cx="20" cy="380" r="6" fill="#e74c3c" opacity="0.3"/>
  
  <!-- Key concept highlight -->
  <rect x="320" y="295" width="80" height="30" class="highlight-box" opacity="0.8"/>
  <text x="360" y="314" text-anchor="middle" class="detail" fill="#856404">Mutable!</text>
</svg>