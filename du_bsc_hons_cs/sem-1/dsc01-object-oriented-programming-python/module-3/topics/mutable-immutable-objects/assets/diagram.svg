<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="mutable-immutable-objects">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="mutableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="immutableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fc79"/>
      <stop offset="100%" style="stop-color:#96e6a1"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .mutable-box { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .immutable-box { animation: slideInRight 0.8s ease-out 0.5s both; }
    .example-item { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .example-item:nth-child(1) { animation-delay: 0.6s; }
    .example-item:nth-child(2) { animation-delay: 0.8s; }
    .example-item:nth-child(3) { animation-delay: 1s; }
    .example-item:nth-child(4) { animation-delay: 1.2s; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .bounce-anim { animation: bounce 1.5s ease-in-out infinite; }
    .arrow-line {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawLine 1s ease-out 1.5s forwards;
    }
    .mut-icon { animation: pulse 2s ease-in-out infinite; animation-delay: 1s; }
    .immut-icon { animation: pulse 2s ease-in-out infinite; animation-delay: 1.2s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title-anim">Mutable vs Immutable</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d" class="title-anim">Objects in Python</text>
  
  <!-- Mutable Objects Section -->
  <g class="mutable-box">
    <rect x="20" y="80" width="170" height="280" rx="12" fill="url(#mutableGradient)" filter="url(#shadow)"/>
    <text x="105" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#c0392b">Mutable Objects</text>
    <text x="105" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#922b21">Can be modified after creation</text>
    
    <!-- Examples -->
    <g transform="translate(35, 140)">
      <rect class="example-item" x="0" y="0" width="140" height="35" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
      <text class="example-item" x="70" y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#c0392b" font-weight="bold">list</text>
    </g>
    <g transform="translate(35, 185)">
      <rect class="example-item" x="0" y="0" width="140" height="35" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
      <text class="example-item" x="70" y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#c0392b" font-weight="bold">dict</text>
    </g>
    <g transform="translate(35, 230)">
      <rect class="example-item" x="0" y="0" width="140" height="35" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
      <text class="example-item" x="70" y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#c0392b" font-weight="bold">set</text>
    </g>
    <g transform="translate(35, 275)">
      <rect class="example-item" x="0" y="0" width="140" height="35" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
      <text class="example-item" x="70" y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#c0392b" font-weight="bold">class (custom)</text>
    </g>
    
    <!-- Mutability indicator -->
    <g transform="translate(65, 320)" class="mut-icon">
      <circle cx="15" cy="15" r="12" fill="#e74c3c"/>
      <text x="15" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">✎</text>
    </g>
    <text x="105" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#922b21">Can Be Modified</text>
  </g>
  
  <!-- Immutable Objects Section -->
  <g class="immutable-box">
    <rect x="230" y="80" width="170" height="280" rx="12" fill="url(#immutableGradient)" filter="url(#shadow)"/>
    <text x="315" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e8449">Immutable Objects</text>
    <text x="315" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#145a32">Cannot be changed after creation</text>
    
    <!-- Examples -->
    <g transform="translate(245, 140)">
      <rect class="example-item" x="0" y="0" width="140" height="35" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
      <text class="example-item" x="70" y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#1e8449" font-weight="bold">int, float</text>
    </g>
    <g transform="translate(245, 185)">
      <rect class="example-item" x="0" y="0" width="140" height="35" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
      <text class="example-item" x="70" y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#1e8449" font-weight="bold">str</text>
    </g>
    <g transform="translate(245, 230)">
      <rect class="example-item" x="0" y="0" width="140" height="35" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
      <text class="example-item" x="70" y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#1e8449" font-weight="bold">tuple</text>
    </g>
    <g transform="translate(245, 275)">
      <rect class="example-item" x="0" y="0" width="140" height="35" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
      <text class="example-item" x="70" y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#1e8449" font-weight="bold">frozenset</text>
    </g>
    
    <!-- Immutability indicator -->
    <g transform="translate(275, 320)" class="immut-icon">
      <circle cx="15" cy="15" r="12" fill="#27ae60"/>
      <text x="15" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">🔒</text>
    </g>
    <text x="315" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#145a32">Cannot Be Modified</text>
  </g>
  
  <!-- Center Arrow/Connection -->
  <g>
    <line x1="195" y1="200" x2="225" y2="200" stroke="url(#arrowGradient)" stroke-width="3" stroke-linecap="round" class="arrow-line"/>
    <polygon points="220,195 230,200 220,205" fill="#764ba2"/>
  </g>
  
  <!-- Key Insight Box at bottom -->
  <rect x="60" y="370" width="300" height="25" rx="5" fill="#34495e" opacity="0.9"/>
  <text x="210" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Everything in Python is an object!</text>
  
  <!-- Narration data attributes (invisible for screen readers) -->
  <desc data-narration="Title section: Mutable vs Immutable Objects in Python - the fundamental distinction between objects that can be modified after creation and those that cannot."></desc>
  <desc data-narration="Mutable Objects section: Lists, Dictionaries, Sets, and custom classes can be modified in place after creation. This allows for efficient memory usage when changes are needed."></desc>
  <desc data-narration="Immutable Objects section: Integers, Floats, Strings, Tuples, and Frozensets cannot be changed after creation. Any operation that seems to modify them actually creates a new object."></desc>
  <desc data-narration="Visual comparison: The pencil icon indicates mutability (can be edited) while the lock icon indicates immutability (cannot be changed)."></desc>
  <desc data-narration="Key insight: Understanding mutability is crucial for writing efficient Python code, especially when dealing with function arguments and shared references."></desc>
</svg>