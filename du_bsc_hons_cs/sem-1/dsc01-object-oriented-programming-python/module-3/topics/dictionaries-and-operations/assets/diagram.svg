<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dictionaries-and-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="valueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#7bc49a"/>
    </linearGradient>
    <linearGradient id="opGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c6cb"/>
      <stop offset="100%" style="stop-color:#e8a0a8"/>
    </linearGradient>
    <linearGradient id="methodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c5b9e8"/>
      <stop offset="100%" style="stop-color:#a694d4"/>
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes arrowPulse {
        0%, 100% { stroke-width: 2; }
        50% { stroke-width: 3; }
      }
      .title { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #34495e; }
      .code { font-family: 'Courier New', monospace; font-size: 12px; fill: #2c3e50; }
      .small-label { font-family: 'Arial', sans-serif; font-size: 11px; fill: #5d6d7e; }
      .section-title { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
      .fade-in { animation: fadeIn 0.8s ease-out forwards; }
      .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
      .slide-right { animation: slideInRight 0.6s ease-out forwards; }
      .slide-up { animation: slideInUp 0.6s ease-out forwards; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .arrow-pulse { animation: arrowPulse 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Dictionaries and Operations</text>
  <text x="210" y="50" text-anchor="middle" class="small-label slide-up" style="animation-delay: 0.2s">Python Key-Value Data Structure</text>
  
  <!-- Dictionary Structure Visualization -->
  <g transform="translate(60, 70)" data-narration="The dictionary structure showing key-value pairs">
    <rect x="0" y="0" width="300" height="120" rx="8" fill="#fff" stroke="#7eb8da" stroke-width="2" opacity="0.9"/>
    <text x="150" y="20" text-anchor="middle" class="section-title">Dictionary Structure</text>
    
    <!-- Key-Value Pair 1 -->
    <rect x="20" y="35" width="60" height="25" rx="4" fill="url(#keyGradient)" class="slide-left" style="animation-delay: 0.3s"/>
    <text x="50" y="52" text-anchor="middle" class="code" fill="#fff">"name"</text>
    <text x="150" y="52" text-anchor="middle" class="label">:</text>
    <rect x="165" y="35" width="70" height="25" rx="4" fill="url(#valueGradient)" class="slide-right" style="animation-delay: 0.4s"/>
    <text x="200" y="52" text-anchor="middle" class="code" fill="#fff">"John"</text>
    
    <!-- Arrow -->
    <path d="M90 47 L160 47" stroke="#e8a0a8" stroke-width="2" class="arrow-pulse" marker-end="url(#arrowhead)"/>
    
    <!-- Key-Value Pair 2 -->
    <rect x="20" y="70" width="60" height="25" rx="4" fill="url(#keyGradient)" class="slide-left" style="animation-delay: 0.5s"/>
    <text x="50" y="87" text-anchor="middle" class="code" fill="#fff">"age"</text>
    <text x="150" y="87" text-anchor="middle" class="label">:</text>
    <rect x="165" y="70" width="50" height="25" rx="4" fill="url(#valueGradient)" class="slide-right" style="animation-delay: 0.6s"/>
    <text x="190" y="87" text-anchor="middle" class="code" fill="#fff">30</text>
    
    <!-- Arrow -->
    <path d="M90 82 L160 82" stroke="#e8a0a8" stroke-width="2" class="arrow-pulse" style="animation-delay: 0.2s"/>
    
    <!-- Key-Value Pair 3 -->
    <rect x="20" y="105" width="60" height="25" rx="4" fill="url(#keyGradient)" class="slide-left" style="animation-delay: 0.7s"/>
    <text x="50" y="122" text-anchor="middle" class="code" fill="#fff">"city"</text>
    <text x="150" y="122" text-anchor="middle" class="label">:</text>
    <rect x="165" y="105" width="80" height="25" rx="4" fill="url(#valueGradient)" class="slide-right" style="animation-delay: 0.8s"/>
    <text x="205" y="122" text-anchor="middle" class="code" fill="#fff">"NYC"</text>
    
    <!-- Arrow -->
    <path d="M90 117 L160 117" stroke="#e8a0a8" stroke-width="2" class="arrow-pulse" style="animation-delay: 0.4s"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(370, 75)" class="fade-in" style="animation-delay: 0.5s">
    <rect x="0" y="0" width="40" height="18" rx="3" fill="url(#keyGradient)"/>
    <text x="20" y="13" text-anchor="middle" class="small-label" fill="#fff" font-size="9">Key</text>
    <rect x="0" y="25" width="40" height="18" rx="3" fill="url(#valueGradient)"/>
    <text x="20" y="38" text-anchor="middle" class="small-label" fill="#fff" font-size="9">Value</text>
  </g>
  
  <!-- Operations Section -->
  <g transform="translate(20, 205)" data-narration="Four main dictionary operations: Insertion, Deletion, Update, Lookup">
    <text x="5" y="0" class="section-title">Operations</text>
    
    <!-- Insertion -->
    <g transform="translate(0, 15)" class="slide-up" style="animation-delay: 0.6s">
      <rect x="0" y="0" width="85" height="45" rx="5" fill="url(#opGradient)"/>
      <text x="42.5" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#722f37">Insertion</text>
      <text x="42.5" y="35" text-anchor="middle" class="small-label" fill="#722f37">dict[key]=value</text>
    </g>
    
    <!-- Deletion -->
    <g transform="translate(95, 15)" class="slide-up" style="animation-delay: 0.7s">
      <rect x="0" y="0" width="85" height="45" rx="5" fill="url(#opGradient)"/>
      <text x="42.5" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#722f37">Deletion</text>
      <text x="42.5" y="35" text-anchor="middle" class="small-label" fill="#722f37">del dict[key]</text>
    </g>
    
    <!-- Update -->
    <g transform="translate(190, 15)" class="slide-up" style="animation-delay: 0.8s">
      <rect x="0" y="0" width="85" height="45" rx="5" fill="url(#opGradient)"/>
      <text x="42.5" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#722f37">Update</text>
      <text x="42.5" y="35" text-anchor="middle" class="small-label" fill="#722f37">dict[key]=new</text>
    </g>
    
    <!-- Lookup -->
    <g transform="translate(285, 15)" class="slide-up" style="animation-delay: 0.9s">
      <rect x="0" y="0" width="85" height="45" rx="5" fill="url(#opGradient)"/>
      <text x="42.5" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#722f37">Lookup</text>
      <text x="42.5" y="35" text-anchor="middle" class="small-label" fill="#722f37">dict[key]</text>
    </g>
  </g>
  
  <!-- Methods Section -->
  <g transform="translate(20, 280)" data-narration="Dictionary methods: keys, values, items">
    <text x="5" y="0" class="section-title">Methods</text>
    
    <!-- keys() -->
    <g transform="translate(0, 15)" class="slide-up" style="animation-delay: 1s">
      <rect x="0" y="0" width="120" height="50" rx="5" fill="url(#methodGradient)"/>
      <text x="60" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#4a3867">keys()</text>
      <text x="60" y="35" text-anchor="middle" class="small-label" fill="#4a3867">Returns all keys</text>
      <text x="60" y="45" text-anchor="middle" class="code" fill="#4a3867" font-size="10">['name','age','city']</text>
    </g>
    
    <!-- values() -->
    <g transform="translate(130, 15)" class="slide-up" style="animation-delay: 1.1s">
      <rect x="0" y="0" width="120" height="50" rx="5" fill="url(#methodGradient)"/>
      <text x="60" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#4a3867">values()</text>
      <text x="60" y="35" text-anchor="middle" class="small-label" fill="#4a3867">Returns all values</text>
      <text x="60" y="45" text-anchor="middle" class="code" fill="#4a3867" font-size="10">['John',30,'NYC']</text>
    </g>
    
    <!-- items() -->
    <g transform="translate(260, 15)" class="slide-up" style="animation-delay: 1.2s">
      <rect x="0" y="0" width="120" height="50" rx="5" fill="url(#methodGradient)"/>
      <text x="60" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#4a3867">items()</text>
      <text x="60" y="35" text-anchor="middle" class="small-label" fill="#4a3867">Returns key-value pairs</text>
      <text x="60" y="45" text-anchor="middle" class="code" fill="#4a3867" font-size="10">[('name','John'),...]</text>
    </g>
  </g>
  
  <!-- Code Example Box -->
  <g transform="translate(20, 345)" data-narration="Example code showing dictionary creation and operations">
    <rect x="0" y="0" width="380" height="45" rx="5" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <text x="10" y="18" class="code" fill="#27ae60">my_dict = {"name": "John", "age": 30}</text>
    <text x="10" y="38" class="code" fill="#2980b9">my_dict["city"] = "NYC"  # Insert</text>
    <text x="210" y="38" class="code" fill="#8e44ad">print(my_dict["name"])  # Lookup</text>
  </g>
  
  <!-- Decorative Elements -->
  <g class="pulse" transform="translate(395, 385)">
    <circle cx="0" cy="0" r="5" fill="#7eb8da"/>
  </g>
  <g class="pulse" transform="translate(25, 385)" style="animation-delay: 0.5s">
    <circle cx="0" cy="0" r="5" fill="#9dd6b8"/>
  </g>
</svg>