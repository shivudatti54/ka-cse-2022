<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="strings-operations-traversal">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbcfe8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateY(-20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes charPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .box1 { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .char { animation: charPulse 2s ease-in-out infinite; transform-origin: center; }
    .index-label { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e40af" class="title">String Operations &amp; Traversal</text>
  
  <!-- Main String Indexing Diagram -->
  <g transform="translate(60, 55)">
    <rect x="0" y="0" width="300" height="70" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="150" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b" data-narration="This diagram shows string indexing in Python, where each character has an index starting from 0">String: "Hello World"</text>
    
    <!-- Characters -->
    <g class="char" style="animation-delay: 0.1s;">
      <rect x="10" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="23" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">H</text>
      <text x="23" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">0</text>
    </g>
    <g class="char" style="animation-delay: 0.2s;">
      <rect x="38" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="51" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">e</text>
      <text x="51" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">1</text>
    </g>
    <g class="char" style="animation-delay: 0.3s;">
      <rect x="66" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="79" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">l</text>
      <text x="79" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">2</text>
    </g>
    <g class="char" style="animation-delay: 0.4s;">
      <rect x="94" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="107" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">l</text>
      <text x="107" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">3</text>
    </g>
    <g class="char" style="animation-delay: 0.5s;">
      <rect x="122" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="135" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">o</text>
      <text x="135" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">4</text>
    </g>
    <g class="char" style="animation-delay: 0.6s;">
      <rect x="150" y="30" width="26" height="30" rx="4" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
      <text x="163" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#be185d">␣</text>
      <text x="163" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">5</text>
    </g>
    <g class="char" style="animation-delay: 0.7s;">
      <rect x="178" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="191" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">W</text>
      <text x="191" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">6</text>
    </g>
    <g class="char" style="animation-delay: 0.8s;">
      <rect x="206" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="219" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">o</text>
      <text x="219" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">7</text>
    </g>
    <g class="char" style="animation-delay: 0.9s;">
      <rect x="234" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="247" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">r</text>
      <text x="247" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">8</text>
    </g>
    <g class="char" style="animation-delay: 1.0s;">
      <rect x="262" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="275" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">l</text>
      <text x="275" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">9</text>
    </g>
    <g class="char" style="animation-delay: 1.1s;">
      <rect x="264" y="30" width="26" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="277" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">d</text>
      <text x="277" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b" class="index-label">10</text>
    </g>
  </g>
  
  <!-- Operation Boxes -->
  <!-- Box 1: Concatenation -->
  <g class="box1" data-narration="Concatenation joins strings using the + operator">
    <rect x="10" y="145" width="95" height="60" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="57" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Concatenation</text>
    <text x="57" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">"Hello" + "World"</text>
    <text x="57" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">→ "HelloWorld"</text>
  </g>
  
  <!-- Box 2: Repetition -->
  <g class="box2" data-narration="Repetition repeats strings using the * operator">
    <rect x="110" y="145" width="95" height="60" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="157" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Repetition</text>
    <text x="157" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">"Hi" * 3</text>
    <text x="157" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">→ "HiHiHi"</text>
  </g>
  
  <!-- Box 3: Indexing -->
  <g class="box3" data-narration="Indexing accesses individual characters using square brackets">
    <rect x="210" y="145" width="95" height="60" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="257" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9d174d">Indexing</text>
    <text x="257" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">s[0] gets 'H'</text>
    <text x="257" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">s[-1] gets 'd'</text>
  </g>
  
  <!-- Box 4: Slicing -->
  <g class="box4" data-narration="Slicing extracts substrings using start:stop:step">
    <rect x="310" y="145" width="95" height="60" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="357" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Slicing</text>
    <text x="357" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">s[0:5] = "Hello"</text>
    <text x="357" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">s[::2]="HloWrd"</text>
  </g>
  
  <!-- Traversal Section -->
  <g transform="translate(10, 220)">
    <text x="200" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af" data-narration="Three ways to traverse strings in Python">String Traversal Methods</text>
    
    <!-- Traversal Box 1: For Loop -->
    <rect x="5" y="30" width="125" height="50" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="67" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">For Loop</text>
    <text x="67" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">for c in s:</text>
    <text x="67" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">  print(c)</text>
    
    <!-- Arrow 1 -->
    <path d="M135 55 L155 55" stroke="#64748b" stroke-width="2" fill="none" class="arrow"/>
    
    <!-- Traversal Box 2: Enumerate -->
    <rect x="160" y="30" width="125" height="50" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <text x="222" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">Enumerate</text>
    <text x="222" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">for i,c in enumerate(s):</text>
    <text x="222" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">  print(i,c)</text>
    
    <!-- Arrow 2 -->
    <path d="M290 55 L310 55" stroke="#64748b" stroke-width="2" fill="none" class="arrow"/>
    
    <!-- Traversal Box 3: Range -->
    <rect x="315" y="30" width="95" height="50" rx="6" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="362" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Range</text>
    <text x="362" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">for i in range(len(s)):</text>
    <text x="362" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">  print(s[i])</text>
  </g>
  
  <!-- Code Example Section -->
  <g transform="translate(20, 300)">
    <rect x="0" y="0" width="380" height="85" rx="8" fill="#1e293b" filter="url(#shadow)"/>
    <text x="15" y="20" font-family="Courier New, monospace" font-size="11" fill="#94a3b8" font-weight="bold">Python Code Example:</text>
    <text x="15" y="40" font-family="Courier New, monospace" font-size="10" fill="#a5f3fc">s = "Python"</text>
    <text x="15" y="55" font-family="Courier New, monospace" font-size="10" fill="#86efac"># Concatenation</text>
    <text x="15" y="68" font-family="Courier New, monospace" font-size="10" fill="#fde047">print(s[0])   # P (indexing)</text>
    <text x="200" y="68" font-family="Courier New, monospace" font-size="10" fill="#fca5a5">print(s[1:4]) # yth (slicing)</text>
    <text x="15" y="80" font-family="Courier New, monospace" font-size="10" fill="#c4b5fd">for ch in s: print(ch) # traversal</text>
  </g>
  
  <!-- Zero-based label -->
  <g transform="translate(150, 135)">
    <circle cx="0" cy="0" r="12" fill="#3b82f6" class="arrow"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">0</text>
    <text x="0" y="-18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Zero-based</text>
  </g>
</svg>