<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="executing-simple-programs">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e9f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6ffe6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccffcc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateX(-30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .box5 { animation: slideIn 0.6s ease-out 1.0s both; }
    .arrow1 { animation: fadeIn 0.5s ease-out 0.8s both; }
    .arrow2 { animation: fadeIn 0.5s ease-out 1.0s both; }
    .arrow3 { animation: fadeIn 0.5s ease-out 1.2s both; }
    .arrow4 { animation: fadeIn 0.5s ease-out 1.4s both; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.3s both; }
    .legend { animation: fadeIn 0.6s ease-out 1.5s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Python Program Execution Flow</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="subtitle">How Python Code Becomes Output</text>
  
  <!-- Box 1: Source Code -->
  <g class="box1" data-narration="The process begins with a .py source file containing Python code written by the programmer">
    <rect x="30" y="70" width="80" height="50" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="70" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e67e22">Source Code</text>
    <text x="70" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d35400">(.py file)</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow1">
    <path d="M115 95 L145 95" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3498db"/></marker></defs>
  </g>
  
  <!-- Box 2: Python Compiler -->
  <g class="box2" data-narration="The Python compiler translates source code into an intermediate bytecode format">
    <rect x="150" y="70" width="90" height="50" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="195" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">Python</text>
    <text x="195" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a5276">Compiler</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow2">
    <path d="M245 95 L275 95" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Box 3: Bytecode -->
  <g class="box3" data-narration="The compiler produces bytecode (.pyc files), a platform-independent intermediate representation">
    <rect x="280" y="70" width="80" height="50" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="320" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">Bytecode</text>
    <text x="320" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e8449">(.pyc file)</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="arrow3">
    <path d="M200 125 L200 175" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
    <defs><marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3498db"/></marker></defs>
  </g>
  
  <!-- Box 4: PVM -->
  <g class="box4" data-narration="The Python Virtual Machine executes bytecode line by line">
    <rect x="150" y="180" width="100" height="55" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8e44ad">Python VM</text>
    <text x="200" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c3483">(PVM)</text>
  </g>
  
  <!-- Arrow 4 -->
  <g class="arrow4">
    <path d="M255 207 L295 207" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Box 5: Output -->
  <g class="box5" data-narration="The PVM produces the final output or result of the program execution">
    <rect x="300" y="180" width="85" height="55" rx="8" fill="url(#boxGradient5)" filter="url(#shadow)"/>
    <text x="342" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5b5bb5">Output</text>
    <text x="342" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3d3d8c">/Result</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="legend">
    <rect x="30" y="260" width="360" height="120" rx="10" fill="white" fill-opacity="0.7" stroke="#bdc3c7" stroke-width="1"/>
    <text x="45" y="282" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Key Concepts:</text>
    <text x="45" y="302" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• Interpreter: Reads and executes code line by line</text>
    <text x="45" y="320" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• Bytecode: Platform-independent intermediate code</text>
    <text x="45" y="338" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• PVM: Executes bytecode, produces output</text>
    <text x="45" y="356" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• .pyc: Compiled Python file (cached bytecode)</text>
    <text x="230" y="302" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• High-level: Human-readable syntax</text>
    <text x="230" y="320" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• Interpreted: No separate compilation step</text>
  </g>
  
  <!-- Animated highlight on PVM -->
  <rect x="150" y="180" width="100" height="55" rx="8" fill="none" stroke="#9b59b6" stroke-width="2" class="pulse-element" opacity="0.6"/>
</svg>