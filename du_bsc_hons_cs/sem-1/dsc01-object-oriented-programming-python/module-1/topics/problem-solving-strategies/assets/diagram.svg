<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="problem-solving-strategies">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6f4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.4s; }
    .box3 { animation-delay: 0.6s; }
    .box4 { animation-delay: 0.8s; }
    .title { animation: fadeIn 0.8s ease-out; }
    .diagram { animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .class-box { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-size: 12px; font-weight: bold; fill: #34495e; }
    .section-desc { font-size: 10px; fill: #5d6d7e; }
    .class-name { font-size: 11px; font-weight: bold; fill: #fff; }
    .class-detail { font-size: 9px; fill: #e8e8e8; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-text">Problem Solving Strategies</text>
  <text x="210" y="44" text-anchor="middle" font-size="11" fill="#7f8c8d">OOP with Python</text>
  
  <!-- Strategy Boxes -->
  <g class="box box1" data-narration="Decomposition breaks complex systems into manageable classes and methods">
    <rect x="15" y="60" width="90" height="70" rx="6" fill="#a8d5ba" filter="url(#shadow)"/>
    <text x="60" y="78" text-anchor="middle" class="section-title">Decomposition</text>
    <text x="60" y="92" text-anchor="middle" class="section-desc">Break into</text>
    <text x="60" y="104" text-anchor="middle" class="section-desc">classes/modules</text>
    <text x="60" y="120" text-anchor="middle" font-size="9" fill="#2d5a3d">Single Responsibility</text>
  </g>
  
  <g class="box box2" data-narration="Pattern Recognition identifies reusable solutions like Factory, Observer, and Strategy patterns">
    <rect x="115" y="60" width="90" height="70" rx="6" fill="#f7d794" filter="url(#shadow)"/>
    <text x="160" y="78" text-anchor="middle" class="section-title">Pattern</text>
    <text x="160" y="92" text-anchor="middle" class="section-desc">Recognize</text>
    <text x="160" y="104" text-anchor="middle" class="section-desc">recurring solutions</text>
    <text x="160" y="120" text-anchor="middle" font-size="9" fill="#7d6608">Factory | Observer</text>
  </g>
  
  <g class="box box3" data-narration="Abstraction and Encapsulation hide implementation details using private attributes and abstract classes">
    <rect x="215" y="60" width="90" height="70" rx="6" fill="#a29bfe" filter="url(#shadow)"/>
    <text x="260" y="78" text-anchor="middle" class="section-title">Abstraction</text>
    <text x="260" y="92" text-anchor="middle" class="section-desc">Hide details</text>
    <text x="260" y="104" text-anchor="middle" class="section-desc">with interfaces</text>
    <text x="260" y="120" text-anchor="middle" font-size="9" fill="#4a3b8c">abc module</text>
  </g>
  
  <g class="box box4" data-narration="Algorithmic Thinking focuses on efficiency, runtime performance, and scalable solutions">
    <rect x="315" y="60" width="90" height="70" rx="6" fill="#ffb3ba" filter="url(#shadow)"/>
    <text x="360" y="78" text-anchor="middle" class="section-title">Algorithmic</text>
    <text x="360" y="92" text-anchor="middle" class="section-desc">Optimize</text>
    <text x="360" y="104" text-anchor="middle" class="section-desc">efficiency &amp; scale</text>
    <text x="360" y="120" text-anchor="middle" font-size="9" fill="#8b4049">O(n) analysis</text>
  </g>
  
  <!-- Class Diagram Section -->
  <g class="diagram" data-narration="Bank Account class diagram showing inheritance from base Account to Savings and Checking">
    <text x="210" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Class Diagram: Bank Account</text>
    
    <!-- Base Class Account -->
    <g class="class-box">
      <rect x="155" y="165" width="110" height="55" rx="4" fill="#3498db" filter="url(#shadow)"/>
      <rect x="155" y="165" width="110" height="16" rx="4" fill="#2980b9"/>
      <text x="210" y="177" text-anchor="middle" class="class-name">Account</text>
      <text x="160" y="195" class="class-detail">- balance: float</text>
      <text x="160" y="207" class="class-detail">- account_id: str</text>
      <text x="160" y="219" class="class-detail">+ deposit()</text>
    </g>
    
    <!-- SavingsAccount -->
    <g class="class-box">
      <rect x="40" y="255" width="100" height="50" rx="4" fill="#27ae60" filter="url(#shadow)"/>
      <rect x="40" y="255" width="100" height="16" rx="4" fill="#1e8449"/>
      <text x="90" y="267" text-anchor="middle" class="class-name">SavingsAccount</text>
      <text x="45" y="285" class="class-detail">- interest_rate</text>
      <text x="45" y="297" class="class-detail">+ calc_interest()</text>
    </g>
    
    <!-- CheckingAccount -->
    <g class="class-box">
      <rect x="280" y="255" width="100" height="50" rx="4" fill="#e74c3c" filter="url(#shadow)"/>
      <rect x="280" y="255" width="100" height="16" rx="4" fill="#c0392b"/>
      <text x="330" y="267" text-anchor="middle" class="class-name">CheckingAccount</text>
      <text x="285" y="285" class="class-detail">- overdraft_limit</text>
      <text x="285" y="297" class="class-detail">+ withdraw()</text>
    </g>
    
    <!-- Transactions -->
    <g class="class-box">
      <rect x="160" y="255" width="100" height="50" rx="4" fill="#9b59b6" filter="url(#shadow)"/>
      <rect x="160" y="255" width="100" height="16" rx="4" fill="#8e44ad"/>
      <text x="210" y="267" text-anchor="middle" class="class-name">Transaction</text>
      <text x="165" y="285" class="class-detail">- amount: float</text>
      <text x="165" y="297" class="class-detail">- timestamp</text>
    </g>
    
    <!-- Inheritance Arrows -->
    <line x1="210" y1="220" x2="90" y2="255" stroke="#7f8c8d" stroke-width="2" class="arrow-line" marker-end="url(#arrowhead)"/>
    <line x1="210" y1="220" x2="330" y2="255" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
    <polygon points="90,255 96,248 96,262" fill="#7f8c8d"/>
    <polygon points="330,255 324,248 324,262" fill="#7f8c8d"/>
    
    <!-- Association -->
    <line x1="210" y1="305" x2="210" y2="320" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="210" y="335" text-anchor="middle" font-size="9" fill="#7f8c8d">has many</text>
    <text x="210" y="347" text-anchor="middle" font-size="9" fill="#7f8c8d">transactions</text>
  </g>
  
  <!-- Connection Lines -->
  <g data-narration="Arrows show inheritance relationship from Account to specialized account types">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
      </marker>
    </defs>
  </g>
  
  <!-- Key Points -->
  <g data-narration="Key takeaways: These strategies form the foundation of effective OOP problem solving">
    <rect x="15" y="365" width="390" height="28" rx="4" fill="rgba(255,255,255,0.7)"/>
    <text x="25" y="378" font-size="10" fill="#2c3e50">✓ Decompose • Recognize Patterns • Abstract Complexity • Optimize Algorithms</text>
    <text x="340" y="378" font-size="9" fill="#7f8c8d">DU CS</text>
  </g>
</svg>