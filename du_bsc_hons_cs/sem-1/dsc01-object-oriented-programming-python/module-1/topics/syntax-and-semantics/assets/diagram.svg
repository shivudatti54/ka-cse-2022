<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="syntax-and-semantics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="syntaxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fbcd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="semanticsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="operatorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff59d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .syntax-anim { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .semantics-anim { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .operator-anim { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-anim { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .arrow-anim { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; }
    .detail-text { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text" font-size="20" fill="#2c3e50" data-narration="Title: Syntax and Semantics in Python - The foundation of programming">Syntax and Semantics</text>
  <text x="210" y="48" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#5d6d7e">in Python</text>
  
  <!-- Syntax Section -->
  <g class="syntax-anim">
    <rect x="20" y="65" width="175" height="120" rx="8" ry="8" fill="url(#syntaxGrad)" filter="url(#shadow)"/>
    <text x="108" y="85" text-anchor="middle" class="label-text" font-size="16" fill="#1565c0" data-narration="Syntax: The rules governing valid Python code structure">SYNTAX</text>
    <rect x="30" y="95" width="155" height="3" fill="#5c9dc9" rx="1"/>
    <text x="35" y="115" class="detail-text" fill="#0d47a1" data-narration="Indentation defines code blocks - unique to Python">
      <tspan x="35" dy="0">• Indentation</tspan>
      <tspan x="35" dy="14">  defines blocks</tspan>
      <tspan x="35" dy="14">• Rules of valid</tspan>
      <tspan x="35" dy="14">  symbols &amp; structure</tspan>
      <tspan x="35" dy="14">• If/else/loops</tspan>
      <tspan x="35" dy="14">  syntax patterns</tspan>
    </text>
    <!-- Small code example -->
    <rect x="100" y="145" width="85" height="30" rx="4" fill="#fff" stroke="#5c9dc9" stroke-width="1"/>
    <text x="105" y="160" class="detail-text" fill="#1565c0">if x:</text>
    <text x="120" y="172" class="detail-text" fill="#1565c0">print(x)</text>
  </g>
  
  <!-- VS Circle -->
  <circle cx="210" cy="125" r="18" fill="#e74c3c" class="pulse-anim"/>
  <text x="210" y="130" text-anchor="middle" font-family="Arial Black" font-size="14" fill="white" font-weight="bold">VS</text>
  
  <!-- Semantics Section -->
  <g class="semantics-anim">
    <rect x="225" y="65" width="175" height="120" rx="8" ry="8" fill="url(#semanticsGrad)" filter="url(#shadow)"/>
    <text x="312" y="85" text-anchor="middle" class="label-text" font-size="16" fill="#2e7d32" data-narration="Semantics: The meaning behind syntactically correct code">SEMANTICS</text>
    <rect x="235" y="95" width="155" height="3" fill="#66bb6a" rx="1"/>
    <text x="240" y="115" class="detail-text" fill="#1b5e20">
      <tspan x="240" dy="0">• Meaning of code</tspan>
      <tspan x="240" dy="14">• What program does</tspan>
      <tspan x="240" dy="14">• Variable values</tspan>
      <tspan x="240" dy="14">• Execution flow</tspan>
      <tspan x="240" dy="14">• Logic &amp; outcomes</tspan>
    </text>
    <!-- Arrow connecting -->
    <path d="M195 125 L225 125" stroke="#e74c3c" stroke-width="2" class="arrow-anim" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Operator Precedence Section -->
  <g class="operator-anim">
    <rect x="20" y="200" width="380" height="185" rx="8" ry="8" fill="url(#operatorGrad)" filter="url(#shadow)"/>
    <text x="210" y="222" text-anchor="middle" class="label-text" font-size="14" fill="#f57f17" data-narration="Operator Precedence: Hierarchy determining evaluation order">Operator Precedence Hierarchy</text>
    <rect x="30" y="232" width="360" height="2" fill="#fbc02d" rx="1"/>
    
    <!-- Precedence Levels -->
    <g class="box-anim" style="animation-delay: 0.5s">
      <rect x="40" y="242" width="100" height="22" rx="4" fill="#ef9a9a" stroke="#e57373" stroke-width="1"/>
      <text x="90" y="257" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">1. Parentheses</text>
      <text x="90" y="257" text-anchor="middle" font-size="9" fill="#c62828">()</text>
    </g>
    <g class="box-anim" style="animation-delay: 0.6s">
      <rect x="150" y="242" width="100" height="22" rx="4" fill="#ffcc80" stroke="#ffb74d" stroke-width="1"/>
      <text x="200" y="257" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">2. Exponent</text>
      <text x="200" y="257" text-anchor="middle" font-size="9" fill="#e65100">**</text>
    </g>
    <g class="box-anim" style="animation-delay: 0.7s">
      <rect x="260" y="242" width="100" height="22" rx="4" fill="#fff59d" stroke="#ffee58" stroke-width="1"/>
      <text x="310" y="257" text-anchor="middle" font-size="11" fill="#f9a825" font-weight="bold">3. Unary</text>
      <text x="310" y="257" text-anchor="middle" font-size="9" fill="#f9a825">+ - ~</text>
    </g>
    
    <g class="box-anim" style="animation-delay: 0.8s">
      <rect x="40" y="272" width="100" height="22" rx="4" fill="#c5e1a5" stroke="#aed581" stroke-width="1"/>
      <text x="90" y="287" text-anchor="middle" font-size="11" fill="#558b2f" font-weight="bold">4. */ // %</text>
    </g>
    <g class="box-anim" style="animation-delay: 0.9s">
      <rect x="150" y="272" width="100" height="22" rx="4" fill="#b3e5fc" stroke="#81d4fa" stroke-width="1"/>
      <text x="200" y="287" text-anchor="middle" font-size="11" fill="#0277bd" font-weight="bold">5. + -</text>
    </g>
    <g class="box-anim" style="animation-delay: 1.0s">
      <rect x="260" y="272" width="100" height="22" rx="4" fill="#d1c4e9" stroke="#b39ddb" stroke-width="1"/>
      <text x="310" y="287" text-anchor="middle" font-size="11" fill="#4527a0" font-weight="bold">6. Comparisons</text>
    </g>
    
    <g class="box-anim" style="animation-delay: 1.1s">
      <rect x="95" y="302" width="230" height="22" rx="4" fill="#f8bbd9" stroke="#f48fb1" stroke-width="1"/>
      <text x="210" y="317" text-anchor="middle" font-size="11" fill="#ad1457" font-weight="bold">== != &lt; &gt; &lt;= &gt;= (in/ not in/ is/ not is)</text>
    </g>
    
    <g class="box-anim" style="animation-delay: 1.2s">
      <rect x="95" y="332" width="230" height="22" rx="4" fill="#b0bec5" stroke="#90a4ae" stroke-width="1"/>
      <text x="210" y="347" text-anchor="middle" font-size="11" fill="#37474f" font-weight="bold">Logical: not → and → or (lowest precedence)</text>
    </g>
    
    <!-- Down arrow -->
    <path d="M210" y1="198" y2="210" stroke="#f57f17" stroke-width="2" class="arrow-anim" fill="none"/>
    <text x="420" y="395" text-anchor="end" font-size="9" fill="#78909c" font-style="italic">Higher precedence evaluates first ↑</text>
  </g>
  
  <!-- Connecting arrows between sections -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>