<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="structure-of-python-program">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="sectionGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="sectionGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="sectionGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="sectionGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
    <linearGradient id="sectionGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fddb92"/>
      <stop offset="100%" style="stop-color:#d1fdff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .section-5 { animation-delay: 1s; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Structure of Python Program</text>
  
  <!-- Docstring Section -->
  <g class="section section-1" data-narration="The module docstring provides documentation about the file purpose, appearing at the very top after optional encoding declarations.">
    <rect x="30" y="50" width="160" height="45" rx="8" fill="url(#sectionGrad1)" filter="url(#shadow)"/>
    <text x="110" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5a4a42">Docstring</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4a42">"""Module description"""</text>
  </g>
  
  <!-- Import Statements Section -->
  <g class="section section-2" data-narration="Import statements load external modules and libraries, typically placed at the beginning for dependency clarity.">
    <rect x="230" y="50" width="160" height="45" rx="8" fill="url(#sectionGrad2)" filter="url(#shadow)"/>
    <text x="310" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3d5a5a">Import Statements</text>
    <text x="310" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3d5a5a">import os, sys</text>
  </g>
  
  <!-- Arrow down from docstring -->
  <line x1="110" y1="95" x2="110" y2="120" stroke="#888" stroke-width="2" class="arrow"/>
  <polygon points="105,115 110,125 115,115" fill="#888"/>
  
  <!-- Arrow down from imports -->
  <line x1="310" y1="95" x2="310" y2="120" stroke="#888" stroke-width="2" class="arrow"/>
  <polygon points="305,115 310,125 315,115" fill="#888"/>
  
  <!-- Global Variables Section -->
  <g class="section section-3" data-narration="Global variables are defined at module level and accessible throughout the file, used for configuration and state.">
    <rect x="30" y="125" width="160" height="45" rx="8" fill="url(#sectionGrad3)" filter="url(#shadow)"/>
    <text x="110" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5a4a6a">Global Variables</text>
    <text x="110" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4a6a">COUNT = 0</text>
  </g>
  
  <!-- Function Definitions Section -->
  <g class="section section-4" data-narration="Function definitions encapsulate reusable code blocks, promoting modularity and code reuse in Python programs.">
    <rect x="230" y="125" width="160" height="45" rx="8" fill="url(#sectionGrad4)" filter="url(#shadow)"/>
    <text x="310" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2a4a6a">Function Defs</text>
    <text x="310" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2a4a6a">def main():</text>
  </g>
  
  <!-- Arrow down from global variables -->
  <line x1="110" y1="170" x2="110" y2="195" stroke="#888" stroke-width="2" class="arrow"/>
  <polygon points="105,190 110,200 115,190" fill="#888"/>
  
  <!-- Arrow down from function defs -->
  <line x1="310" y1="170" x2="310" y2="195" stroke="#888" stroke-width="2" class="arrow"/>
  <polygon points="305,190 310,200 315,190" fill="#888"/>
  
  <!-- Main Block Section -->
  <g class="section section-5" data-narration="The __name__ == '__main__' block ensures code only runs when script is executed directly, not when imported as module.">
    <rect x="30" y="200" width="360" height="55" rx="8" fill="url(#sectionGrad5)" filter="url(#shadow)" class="pulse"/>
    <text x="210" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a5a5a">Main Block</text>
    <text x="210" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5a5a">if __name__ == '__main__':</text>
  </g>
  
  <!-- Execution Flow Arrow -->
  <line x1="210" y1="265" x2="210" y2="285" stroke="#666" stroke-width="2" stroke-dasharray="4"/>
  <polygon points="205,280 210,290 215,280" fill="#666"/>
  
  <!-- Interpreter Box -->
  <g data-narration="The Python interpreter reads and executes code line by line from top to bottom, compiling to bytecode first.">
    <rect x="80" y="290" width="260" height="40" rx="8" fill="#f8f9fa" stroke="#3498db" stroke-width="2"/>
    <text x="210" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">Python Interpreter Execution</text>
    <text x="210" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Top-to-Bottom Line-by-Line</text>
  </g>
  
  <!-- Key concept box -->
  <g data-narration="Python uses indentation (whitespace) to define code blocks, unlike braces in other languages.">
    <rect x="280" y="335" width="120" height="50" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
    <text x="340" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#856404">Key Concept</text>
    <text x="340" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#856404">Indentation defines</text>
    <text x="340" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#856404">code blocks!</text>
  </g>
  
  <!-- Line numbers indicator -->
  <g>
    <text x="15" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">1-2</text>
    <text x="15" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">11-20</text>
    <text x="15" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">51+</text>
  </g>
</svg>