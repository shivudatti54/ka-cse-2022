<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="autoencoders">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2d8e8"/>
    </linearGradient>
    <linearGradient id="encoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90c2"/>
    </linearGradient>
    <linearGradient id="bottleneckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e07b7b"/>
      <stop offset="100%" style="stop-color:#c24a4a"/>
    </linearGradient>
    <linearGradient id="decoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90c2"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#5cb88a"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a4d6"/>
      <stop offset="100%" style="stop-color:#8b6cb8"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #fff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-box { rx: 8; ry: 8; }
    .flow-arrow { stroke: #666; stroke-width: 2; fill: none; stroke-dasharray: 5,3; animation: flowPulse 1.5s infinite; }
    .node { stroke: #fff; stroke-width: 1; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Autoencoders</text>
  
  <!-- Input Layer -->
  <g data-narration="Input Layer: Raw data entering the autoencoder (e.g., 784 nodes for 28x28 image)">
    <rect x="20" y="80" width="50" height="180" rx="6" fill="url(#inputGrad)" class="section-box anim-slide-left"/>
    <text x="45" y="175" text-anchor="middle" class="label" transform="rotate(-90, 45, 175)">INPUT</text>
    <text x="45" y="280" text-anchor="middle" class="detail">784 nodes</text>
  </g>
  
  <!-- Encoder Arrow -->
  <path d="M 75 170 L 105 170" class="flow-arrow"/>
  
  <!-- Encoder Layers -->
  <g data-narration="Encoder: Compresses input into a smaller representation through multiple layers">
    <rect x="110" y="100" width="45" height="140" rx="5" fill="url(#encoderGrad)" class="section-box anim-fade"/>
    <text x="132" y="175" text-anchor="middle" class="label" font-size="11">Encoder</text>
    <text x="132" y="255" text-anchor="middle" class="detail">256 nodes</text>
  </g>
  
  <!-- Encoder Arrow -->
  <path d="M 160 170 L 185 170" class="flow-arrow"/>
  
  <!-- Second Encoder Layer -->
  <g class="anim-fade" style="animation-delay: 0.2s">
    <rect x="190" y="130" width="40" height="80" rx="4" fill="url(#encoderGrad)" class="section-box"/>
    <text x="210" y="175" text-anchor="middle" class="label" font-size="10">Enc</text>
    <text x="210" y="220" text-anchor="middle" class="detail">64 nodes</text>
  </g>
  
  <!-- Encoder to Bottleneck Arrow -->
  <path d="M 235 170 L 255 170" class="flow-arrow"/>
  
  <!-- Bottleneck/Latent Space -->
  <g data-narration="Bottleneck (Latent Space): Compressed representation holding essential features (e.g., 2-32 nodes)">
    <rect x="260" y="150" width="40" height="40" rx="20" fill="url(#bottleneckGrad)" class="section-box anim-pulse"/>
    <text x="280" y="175" text-anchor="middle" class="label" font-size="10">Latent</text>
  </g>
  
  <!-- Bottleneck to Decoder Arrow -->
  <path d="M 305 170 L 325 170" class="flow-arrow"/>
  
  <!-- Decoder Layers -->
  <g data-narration="Decoder: Reconstructs data from compressed representation back to original dimensions">
    <rect x="330" y="130" width="40" height="80" rx="4" fill="url(#decoderGrad)" class="section-box anim-fade" style="animation-delay: 0.3s"/>
    <text x="350" y="175" text-anchor="middle" class="label" font-size="10">Dec</text>
    <text x="350" y="220" text-anchor="middle" class="detail">64 nodes</text>
  </g>
  
  <!-- Decoder Arrow -->
  <path d="M 375 170 L 395 170" class="flow-arrow"/>
  
  <!-- Second Decoder -->
  <g class="anim-fade" style="animation-delay: 0.4s">
    <rect x="400" y="100" width="45" height="140" rx="5" fill="url(#decoderGrad)" class="section-box"/>
    <text x="422" y="175" text-anchor="middle" class="label" font-size="11">Decoder</text>
    <text x="422" y="255" text-anchor="middle" class="detail">256 nodes</text>
  </g>
  
  <!-- Output Layer -->
  <g data-narration="Output: Reconstructed input (aims to match original input through loss function)">
    <rect x="450" y="80" width="50" height="180" rx="6" fill="url(#outputGrad)" class="section-box anim-slide-right"/>
    <text x="475" y="175" text-anchor="middle" class="label" transform="rotate(-90, 475, 175)">OUTPUT</text>
    <text x="475" y="280" text-anchor="middle" class="detail">784 nodes</text>
  </g>
  
  <!-- Data Flow Labels -->
  <g class="anim-fade" style="animation-delay: 0.5s">
    <text x="210" y="55" text-anchor="middle" class="detail" font-size="10" fill="#666">Compression</text>
    <text x="210" y="320" text-anchor="middle" class="detail" font-size="10" fill="#666">Reconstruction</text>
    <path d="M 210 60 L 210 75" stroke="#999" stroke-width="1"/>
    <path d="M 210 300 L 210 285" stroke="#999" stroke-width="1"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key Concept: Autoencoders learn by minimizing reconstruction error between input and output">
    <rect x="10" y="330" width="400" height="55" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
    <text x="20" y="350" class="detail" font-weight="bold" font-size="12" fill="#333">Key Concepts:</text>
    <text x="20" y="365" class="detail" font-size="10" fill="#555">• Encoder f(x) → h: compresses input to latent code</text>
    <text x="20" y="378" class="detail" font-size="10" fill="#555">• Decoder g(h) → r: reconstructs output from latent space</text>
  </g>
  
  <!-- Reconstruction Arrow indicator -->
  <g class="anim-fade" style="animation-delay: 0.8s">
    <text x="280" y="210" text-anchor="middle" class="detail" font-size="9" fill="#c24a4a">h = f(x)</text>
    <text x="280" y="225" text-anchor="middle" class="detail" font-size="9" fill="#c24a4a">r = g(h)</text>
  </g>
</svg>