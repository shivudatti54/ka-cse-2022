<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="bidirectional-rnn">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4eaf5"/>
    </linearGradient>
    <linearGradient id="forwardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="backwardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes flowLeft {
      0% { stroke-dashoffset: -20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #34495e; }
    .sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .section-box { rx: 8; ry: 8; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-arrow { stroke-dasharray: 5,5; animation: flowRight 1s linear infinite; }
    .flow-arrow-back { stroke-dasharray: 5,5; animation: flowLeft 1s linear infinite; }
    .node { transition: all 0.3s ease; }
    .node:hover { filter: url(#shadow); }
    .hidden-state { font-family: Arial, sans-serif; font-size: 10px; fill: #c0392b; font-style: italic; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Bidirectional RNN</text>
  <line x1="100" y1="42" x2="320" y2="42" stroke="#3498db" stroke-width="2" class="anim-fade" style="animation-delay: 0.3s"/>
  
  <!-- Input Sequence Section -->
  <g data-narration="Input sequence x = [x₁, x₂, x₃, x₄] processed from both directions">
    <rect x="30" y="60" width="360" height="50" fill="white" stroke="#bdc3c7" stroke-width="1" rx="5" class="anim-slide-up" style="animation-delay: 0.2s"/>
    <text x="45" y="80" class="label" style="font-weight: bold;">Input Sequence x:</text>
    <g class="anim-pulse" style="animation-delay: 0.5s">
      <rect x="150" y="68" width="28" height="28" fill="#ecf0f1" stroke="#3498db" stroke-width="1.5" rx="4"/>
      <text x="164" y="87" text-anchor="middle" class="label">x₁</text>
      <rect x="185" y="68" width="28" height="28" fill="#ecf0f1" stroke="#3498db" stroke-width="1.5" rx="4"/>
      <text x="199" y="87" text-anchor="middle" class="label">x₂</text>
      <rect x="220" y="68" width="28" height="28" fill="#ecf0f1" stroke="#3498db" stroke-width="1.5" rx="4"/>
      <text x="234" y="87" text-anchor="middle" class="label">x₃</text>
      <rect x="255" y="68" width="28" height="28" fill="#ecf0f1" stroke="#3498db" stroke-width="1.5" rx="4"/>
      <text x="269" y="87" text-anchor="middle" class="label">x₄</text>
    </g>
    <text x="295" y="87" class="sublabel">t=1 to 4</text>
  </g>
  
  <!-- Forward RNN Layer -->
  <g data-narration="Forward Hidden Layer: Processes input from left to right, producing hidden states h⃗_t">
    <rect x="30" y="125" width="360" height="85" fill="url(#forwardGrad)" stroke="#27ae60" stroke-width="1.5" rx="8" class="section-box anim-slide-left" style="animation-delay: 0.4s"/>
    <text x="45" y="145" class="label" style="fill: #1e8449; font-weight: bold;">Forward RNN (→h⃗_t)</text>
    <text x="45" y="162" class="sublabel">Processes: x₁ → x₂ → x₃ → x₄</text>
    
    <!-- Forward RNN cells -->
    <g class="anim-pulse" style="animation-delay: 0.8s">
      <rect x="90" y="165" width="36" height="36" fill="#27ae60" rx="4" class="node"/>
      <text x="108" y="185" text-anchor="middle" fill="white" font-size="11">h⃗₁</text>
    </g>
    <line x1="126" y1="183" x2="145" y2="183" stroke="#27ae60" stroke-width="2" class="flow-arrow"/>
    <g class="anim-pulse" style="animation-delay: 1s">
      <rect x="150" y="165" width="36" height="36" fill="#27ae60" rx="4" class="node"/>
      <text x="168" y="185" text-anchor="middle" fill="white" font-size="11">h⃗₂</text>
    </g>
    <line x1="186" y1="183" x2="205" y2="183" stroke="#27ae60" stroke-width="2" class="flow-arrow"/>
    <g class="anim-pulse" style="animation-delay: 1.2s">
      <rect x="210" y="165" width="36" height="36" fill="#27ae60" rx="4" class="node"/>
      <text x="228" y="185" text-anchor="middle" fill="white" font-size="11">h⃗₃</text>
    </g>
    <line x1="246" y1="183" x2="265" y2="183" stroke="#27ae60" stroke-width="2" class="flow-arrow"/>
    <g class="anim-pulse" style="animation-delay: 1.4s">
      <rect x="270" y="165" width="36" height="36" fill="#27ae60" rx="4" class="node"/>
      <text x="288" y="185" text-anchor="middle" fill="white" font-size="11">h⃗₄</text>
    </g>
    <text x="320" y="185" class="sublabel">Forward pass</text>
  </g>
  
  <!-- Backward RNN Layer -->
  <g data-narration="Backward Hidden Layer: Processes input from right to left, producing hidden states h⃖_t">
    <rect x="30" y="220" width="360" height="85" fill="url(#backwardGrad)" stroke="#8e44ad" stroke-width="1.5" rx="8" class="section-box anim-slide-right" style="animation-delay: 0.5s"/>
    <text x="45" y="240" class="label" style="fill: #6c3483; font-weight: bold;">Backward RNN (←h⃖_t)</text>
    <text x="45" y="257" class="sublabel">Processes: x₄ → x₃ → x₂ → x₁</text>
    
    <!-- Backward RNN cells (reversed) -->
    <g class="anim-pulse" style="animation-delay: 0.9s">
      <rect x="270" y="260" width="36" height="36" fill="#8e44ad" rx="4" class="node"/>
      <text x="288" y="280" text-anchor="middle" fill="white" font-size="11">h⃖₁</text>
    </g>
    <line x1="265" y1="278" x2="245" y2="278" stroke="#8e44ad" stroke-width="2" class="flow-arrow-back"/>
    <g class="anim-pulse" style="animation-delay: 1.1s">
      <rect x="210" y="260" width="36" height="36" fill="#8e44ad" rx="4" class="node"/>
      <text x="228" y="280" text-anchor="middle" fill="white" font-size="11">h⃖₂</text>
    </g>
    <line x1="205" y1="278" x2="185" y2="278" stroke="#8e44ad" stroke-width="2" class="flow-arrow-back"/>
    <g class="anim-pulse" style="animation-delay: 1.3s">
      <rect x="150" y="260" width="36" height="36" fill="#8e44ad" rx="4" class="node"/>
      <text x="168" y="280" text-anchor="middle" fill="white" font-size="11">h⃖₃</text>
    </g>
    <line x1="145" y1="278" x2="125" y2="278" stroke="#8e44ad" stroke-width="2" class="flow-arrow-back"/>
    <g class="anim-pulse" style="animation-delay: 1.5s">
      <rect x="90" y="260" width="36" height="36" fill="#8e44ad" rx="4" class="node"/>
      <text x="108" y="280" text-anchor="middle" fill="white" font-size="11">h⃖₄</text>
    </g>
    <text x="70" y="280" class="sublabel">Backward pass</text>
  </g>
  
  <!-- Output Layer -->
  <g data-narration="Output Layer: Combines forward and backward hidden states at each time step to produce final output y_t">
    <rect x="30" y="315" width="360" height="70" fill="url(#outputGrad)" stroke="#e74c3c" stroke-width="1.5" rx="8" class="section-box anim-slide-up" style="animation-delay: 0.6s"/>
    <text x="45" y="335" class="label" style="fill: #c0392b; font-weight: bold;">Output Layer: y_t = f(h⃗_t, h⃖_t)</text>
    <text x="45" y="352" class="sublabel">Combines forward + backward states at each timestep</text>
    
    <!-- Output nodes -->
    <g class="anim-pulse" style="animation-delay: 1s">
      <rect x="130" y="340" width="30" height="30" fill="#e74c3c" rx="4" class="node"/>
      <text x="145" y="360" text-anchor="middle" fill="white" font-size="10">y₁</text>
    </g>
    <g class="anim-pulse" style="animation-delay: 1.2s">
      <rect x="170" y="340" width="30" height="30" fill="#e74c3c" rx="4" class="node"/>
      <text x="185" y="360" text-anchor="middle" fill="white" font-size="10">y₂</text>
    </g>
    <g class="anim-pulse" style="animation-delay: 1.4s">
      <rect x="210" y="340" width="30" height="30" fill="#e74c3c" rx="4" class="node"/>
      <text x="225" y="360" text-anchor="middle" fill="white" font-size="10">y₃</text>
    </g>
    <g class="anim-pulse" style="animation-delay: 1.6s">
      <rect x="250" y="340" width="30" height="30" fill="#e74c3c" rx="4" class="node"/>
      <text x="265" y="360" text-anchor="middle" fill="white" font-size="10">y₄</text>
    </g>
  </g>
  
  <!-- Connection arrows showing data flow -->
  <g data-narration="Connection lines showing how forward and backward states connect to outputs">
    <!-- Arrows from forward layer to output -->
    <line x1="108" y1="201" x2="108" y2="315" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="168" y1="201" x2="168" y2="315" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="228" y1="201" x2="228" y2="315" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="288" y1="201" x2="288" y2="315" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    
    <!-- Arrows from backward layer to output -->
    <line x1="108" y1="296" x2="108" y2="315" stroke="#8e44ad" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="168" y1="296" x2="168" y2="315" stroke="#8e44ad" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="228" y1="296" x2="228" y2="315" stroke="#8e44ad" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="288" y1="296" x2="288" y2="315" stroke="#8e44ad" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  </g>
  
  <!-- Legend -->
  <g data-narration="Color legend: Green for forward pass, Purple for backward pass, Red for combined output">
    <circle cx="350" cy="55" r="5" fill="#27ae60"/>
    <text x="340" y="59" class="sublabel" text-anchor="start">Forward</text>
    <circle cx="350" cy="70" r="5" fill="#8e44ad"/>
    <text x="340" y="74" class="sublabel" text-anchor="start">Backward</text>
  </g>
</svg>