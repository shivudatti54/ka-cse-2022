<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="sequence-modeling-rnn">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4eef5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hiddenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcedc1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5e1a5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaaa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8b94;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea" />
    </marker>
    <marker id="arrowheadGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3748; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #4a5568; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #718096; }
    .weight { font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; fill: #5a67d8; }
    .section-box { animation: fadeIn 0.6s ease-out forwards; }
    .anim-left { animation: slideInLeft 0.5s ease-out forwards; }
    .anim-up { animation: slideInUp 0.5s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 5, 5; animation: flowDash 1s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />

  <!-- Title Section -->
  <g class="section-box" data-narration="Title section showing the topic name">
    <text x="210" y="28" text-anchor="middle" class="title">Sequence Modeling with RNN</text>
    <line x1="60" y1="38" x2="360" y2="38" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Time Step Labels -->
  <g class="anim-left" data-narration="Time step indicators showing sequential nature">
    <text x="70" y="68" class="label" fill="#718096">t-1</text>
    <text x="150" y="68" class="label" fill="#718096">t</text>
    <text x="230" y="68" class="label" fill="#718096">t+1</text>
    <text x="310" y="68" class="label" fill="#718096">t+2</text>
  </g>

  <!-- Unfolded RNN Structure -->
  <g class="anim-up" data-narration="Unfolded RNN showing three time steps with inputs, hidden states, and outputs">
    <!-- Time Step t-1 -->
    <rect x="45" y="85" width="70" height="90" rx="8" fill="url(#boxGradient)" stroke="#cbd5e0" stroke-width="1" filter="url(#shadow)"/>
    <rect x="52" y="95" width="56" height="22" rx="4" fill="url(#inputGradient)"/>
    <text x="80" y="110" text-anchor="middle" class="label" fill="#2d3748">x&lt;sub&gt;t-1&lt;/sub&gt;</text>
    <rect x="52" y="125" width="56" height="22" rx="4" fill="url(#hiddenGradient)"/>
    <text x="80" y="140" text-anchor="middle" class="label" fill="#2d3748">h&lt;sub&gt;t-1&lt;/sub&gt;</text>
    <rect x="52" y="155" width="56" height="14" rx="3" fill="url(#outputGradient)"/>
    <text x="80" y="165" text-anchor="middle" class="detail" fill="#2d3748">y&lt;sub&gt;t-1&lt;/sub&gt;</text>
    
    <!-- Arrow from t-1 to t -->
    <path d="M115 140 L145 140" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="128" y="132" class="detail" fill="#667eea">recurrent</text>

    <!-- Time Step t -->
    <rect x="125" y="85" width="70" height="90" rx="8" fill="url(#boxGradient)" stroke="#cbd5e0" stroke-width="1" filter="url(#shadow)"/>
    <rect x="132" y="95" width="56" height="22" rx="4" fill="url(#inputGradient)"/>
    <text x="160" y="110" text-anchor="middle" class="label" fill="#2d3748">x&lt;sub&gt;t&lt;/sub&gt;</text>
    <rect x="132" y="125" width="56" height="22" rx="4" fill="url(#hiddenGradient)" class="pulse"/>
    <text x="160" y="140" text-anchor="middle" class="label" fill="#2d3748">h&lt;sub&gt;t&lt;/sub&gt;</text>
    <rect x="132" y="155" width="56" height="14" rx="3" fill="url(#outputGradient)"/>
    <text x="160" y="165" text-anchor="middle" class="detail" fill="#2d3748">y&lt;sub&gt;t&lt;/sub&gt;</text>

    <!-- Arrow from t to t+1 -->
    <path d="M195 140 L225 140" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="208" y="132" class="detail" fill="#667eea">recurrent</text>

    <!-- Time Step t+1 -->
    <rect x="205" y="85" width="70" height="90" rx="8" fill="url(#boxGradient)" stroke="#cbd5e0" stroke-width="1" filter="url(#shadow)"/>
    <rect x="212" y="95" width="56" height="22" rx="4" fill="url(#inputGradient)"/>
    <text x="240" y="110" text-anchor="middle" class="label" fill="#2d3748">x&lt;sub&gt;t+1&lt;/sub&gt;</text>
    <rect x="212" y="125" width="56" height="22" rx="4" fill="url(#hiddenGradient)"/>
    <text x="240" y="140" text-anchor="middle" class="label" fill="#2d3748">h&lt;sub&gt;t+1&lt;/sub&gt;</text>
    <rect x="212" y="155" width="56" height="14" rx="3" fill="url(#outputGradient)"/>
    <text x="240" y="165" text-anchor="middle" class="detail" fill="#2d3748">y&lt;sub&gt;t+1&lt;/sub&gt;</text>

    <!-- Arrow from t+1 to t+2 -->
    <path d="M275 140 L305 140" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Time Step t+2 (partial) -->
    <rect x="285" y="85" width="70" height="90" rx="8" fill="url(#boxGradient)" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="4,4" filter="url(#shadow)"/>
    <rect x="292" y="95" width="56" height="22" rx="4" fill="url(#inputGradient)" opacity="0.6"/>
    <text x="320" y="110" text-anchor="middle" class="detail" fill="#2d3748">x&lt;sub&gt;t+2&lt;/sub&gt;</text>
    <rect x="292" y="125" width="56" height="22" rx="4" fill="url(#hiddenGradient)" opacity="0.6"/>
    <text x="320" y="140" text-anchor="middle" class="detail" fill="#2d3748">h&lt;sub&gt;t+2&lt;/sub&gt;</text>
    <rect x="292" y="155" width="56" height="14" rx="3" fill="url(#outputGradient)" opacity="0.6"/>
    <text x="320" y="165" text-anchor="middle" class="detail" fill="#2d3748">y&lt;sub&gt;t+2&lt;/sub&gt;</text>
  </g>

  <!-- Single Time Step Detail View -->
  <g class="section-box" data-narration="Detailed view of a single RNN cell showing weight matrices and computations" style="animation-delay: 0.3s">
    <rect x="310" y="195" width="100" height="80" rx="6" fill="url(#boxGradient)" stroke="#9f7aea" stroke-width="2" filter="url(#shadow)"/>
    <text x="360" y="212" text-anchor="middle" class="label" fill="#553c9a">RNN Cell</text>
    <text x="360" y="228" text-anchor="middle" class="detail" fill="#6b46c1">h&lt;sub&gt;t&lt;/sub&gt; = tanh(W&lt;sub&gt;xh&lt;/sub&gt;x&lt;sub&gt;t&lt;/sub&gt; + W&lt;sub&gt;hh&lt;/sub&gt;h&lt;sub&gt;t-1&lt;/sub&gt;)</text>
    <text x="360" y="245" text-anchor="middle" class="detail" fill="#6b46c1">y&lt;sub&gt;t&lt;/sub&gt; = W&lt;sub&gt;why&lt;/sub&gt;h&lt;sub&gt;t&lt;/sub&gt;</text>
  </g>

  <!-- Weight Matrices Explanation -->
  <g class="anim-left" data-narration="Explanation of the three weight matrices in RNN" style="animation-delay: 0.4s">
    <rect x="10" y="290" width="195" height="100" rx="8" fill="url(#boxGradient)" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="107" y="308" text-anchor="middle" class="label" fill="#2d3748">Weight Matrices</text>
    
    <g transform="translate(20, 318)">
      <circle cx="8" cy="8" r="6" fill="#a8e6cf"/>
      <text x="22" y="12" class="detail" fill="#2d3748"><tspan font-weight="bold">W_xh</tspan>: Input to Hidden</text>
    </g>
    <g transform="translate(20, 340)">
      <circle cx="8" cy="8" r="6" fill="#dcedc1"/>
      <text x="22" y="12" class="detail" fill="#2d3748"><tspan font-weight="bold">W_hh</tspan>: Hidden to Hidden (recurrent)</text>
    </g>
    <g transform="translate(20, 362)">
      <circle cx="8" cy="8" r="6" fill="#ffaaa5"/>
      <text x="22" y="12" class="detail" fill="#2d3748"><tspan font-weight="bold">W_why</tspan>: Hidden to Output</text>
    </g>
  </g>

  <!-- Key Concepts Box -->
  <g class="anim-up" data-narration="Key concepts of RNN including hidden state and temporal dependencies" style="animation-delay: 0.5s">
    <rect x="215" y="290" width="195" height="100" rx="8" fill="url(#boxGradient)" stroke="#667eea" stroke-width="1" filter="url(#shadow)"/>
    <text x="312" y="308" text-anchor="middle" class="label" fill="#2d3748">Key Concepts</text>
    
    <g transform="translate(225, 320)">
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#667eea"/>
      <text x="14" y="8" class="detail" fill="#4a5568">Hidden state captures memory</text>
    </g>
    <g transform="translate(225, 340)">
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#667eea"/>
      <text x="14" y="8" class="detail" fill="#4a5568">Recurrent connections pass info</text>
    </g>
    <g transform="translate(225, 360)">
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#667eea"/>
      <text x="14" y="8" class="detail" fill="#4a5568">Handles variable-length sequences</text>
    </g>
    <g transform="translate(225, 380)">
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#667eea"/>
      <text x="14" y="8" class="detail" fill="#4a5568">Foundational for LSTM/GRU</text>
    </g>
  </g>

  <!-- Connection arrows between sections -->
  <g class="section-box" data-narration="Visual connection showing the flow from unfolded view to single cell detail" style="animation-delay: 0.6s">
    <path d="M160 185 L360 195" stroke="#9f7aea" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrowhead)"/>
    <text x="250" y="187" class="detail" fill="#9f7aea">unfolded view</text>
  </g>

  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="30" cy="30" r="15" fill="#a8e6cf"/>
    <circle cx="390" cy="370" r="20" fill="#ffaaa5"/>
    <circle cx="400" cy="50" r="10" fill="#dcedc1"/>
  </g>
</svg>