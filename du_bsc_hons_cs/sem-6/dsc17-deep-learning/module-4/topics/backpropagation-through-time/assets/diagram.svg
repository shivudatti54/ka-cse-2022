<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="backpropagation-through-time">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#4472c4"/>
    </linearGradient>
    <linearGradient id="hiddenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47"/>
      <stop offset="100%" style="stop-color:#548235"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ed7d31"/>
      <stop offset="100%" style="stop-color:#c55a11"/>
    </linearGradient>
    <marker id="arrowForward" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <marker id="arrowBackward" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dashFlow {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    .node { rx: 8; ry: 8; }
    .forward-line { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowForward); }
    .backward-line { stroke: #e74c3c; stroke-width: 2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowBackward); animation: dashFlow 1s linear infinite; }
    .weight-label { font-family: Arial, sans-serif; font-size: 11px; fill: #555; font-weight: bold; }
    .section-box { fill: white; stroke: #ccc; stroke-width: 1; rx: 5; }
    .time-step-label { font-family: Arial, sans-serif; font-size: 12px; fill: #888; font-weight: bold; }
    .title-group { animation: fadeIn 0.8s ease-out; }
    .diagram-group { animation: fadeIn 1s ease-out 0.3s both; }
    .concept-box { animation: slideInLeft 0.6s ease-out 0.6s both; }
    .node-anim { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="title-group">
    <text x="210" y="30" text-anchor="middle" class="title">Backpropagation Through Time</text>
    <text x="210" y="50" text-anchor="middle" class="detail">Unrolling RNN Across Time Steps</text>
  </g>
  
  <!-- Main Diagram - Unrolled RNN -->
  <g class="diagram-group" data-narration="Unrolled RNN structure showing 3 time steps with shared weights">
    
    <!-- Time Step Labels -->
    <text x="70" y="95" text-anchor="middle" class="time-step-label">t=0</text>
    <text x="175" y="95" text-anchor="middle" class="time-step-label">t=1</text>
    <text x="280" y="95" text-anchor="middle" class="time-step-label">t=2</text>
    
    <!-- Input Nodes -->
    <g class="node-anim">
      <rect x="45" y="110" width="50" height="30" class="node" fill="url(#nodeGradient)" data-narration="Input at time step 0"/>
      <text x="70" y="130" text-anchor="middle" fill="white" font-size="12" font-family="Arial">x₀</text>
    </g>
    <g class="node-anim" style="animation-delay: 0.2s">
      <rect x="150" y="110" width="50" height="30" class="node" fill="url(#nodeGradient)" data-narration="Input at time step 1"/>
      <text x="175" y="130" text-anchor="middle" fill="white" font-size="12" font-family="Arial">x₁</text>
    </g>
    <g class="node-anim" style="animation-delay: 0.4s">
      <rect x="255" y="110" width="50" height="30" class="node" fill="url(#nodeGradient)" data-narration="Input at time step 2"/>
      <text x="280" y="130" text-anchor="middle" fill="white" font-size="12" font-family="Arial">x₂</text>
    </g>
    
    <!-- Hidden State Nodes -->
    <g class="node-anim" style="animation-delay: 0.3s">
      <rect x="55" y="170" width="50" height="30" class="node" fill="url(#hiddenGradient)" data-narration="Hidden state at t=0"/>
      <text x="80" y="190" text-anchor="middle" fill="white" font-size="12" font-family="Arial">h₀</text>
    </g>
    <g class="node-anim" style="animation-delay: 0.5s">
      <rect x="160" y="170" width="50" height="30" class="node" fill="url(#hiddenGradient)" data-narration="Hidden state at t=1"/>
      <text x="185" y="190" text-anchor="middle" fill="white" font-size="12" font-family="Arial">h₁</text>
    </g>
    <g class="node-anim" style="animation-delay: 0.7s">
      <rect x="265" y="170" width="50" height="30" class="node" fill="url(#hiddenGradient)" data-narration="Hidden state at t=2"/>
      <text x="290" y="190" text-anchor="middle" fill="white" font-size="12" font-family="Arial">h₂</text>
    </g>
    
    <!-- Output Nodes -->
    <g class="node-anim" style="animation-delay: 0.6s">
      <rect x="55" y="240" width="50" height="30" class="node" fill="url(#outputGradient)" data-narration="Output at time step 0"/>
      <text x="80" y="260" text-anchor="middle" fill="white" font-size="12" font-family="Arial">y₀</text>
    </g>
    <g class="node-anim" style="animation-delay: 0.8s">
      <rect x="160" y="240" width="50" height="30" class="node" fill="url(#outputGradient)" data-narration="Output at time step 1"/>
      <text x="185" y="260" text-anchor="middle" fill="white" font-size="12" font-family="Arial">y₁</text>
    </g>
    <g class="node-anim" style="animation-delay: 1s">
      <rect x="265" y="240" width="50" height="30" class="node" fill="url(#outputGradient)" data-narration="Output at time step 2"/>
      <text x="290" y="260" text-anchor="middle" fill="white" font-size="12" font-family="Arial">y₂</text>
    </g>
    
    <!-- Forward Flow Arrows (Solid) -->
    <path d="M95 125 L95 170" class="forward-line" data-narration="Forward pass: input to hidden"/>
    <path d="M105 185 L150 185" class="forward-line" data-narration="Recurrent connection: hidden to hidden"/>
    <path d="M200 185 L255 185" class="forward-line" data-narration="Recurrent connection to next time step"/>
    <path d="M105 125 L105 170" class="forward-line"/>
    <path d="M210 125 L210 170" class="forward-line"/>
    <path d="M315 125 L315 170" class="forward-line"/>
    <path d="M80 200 L80 240" class="forward-line" data-narration="Forward pass: hidden to output"/>
    <path d="M185 200 L185 240" class="forward-line"/>
    <path d="M290 200 L290 240" class="forward-line"/>
    
    <!-- Backward Flow Arrows (Dashed - Gradient Flow) -->
    <path d="M80 270 L80 285 L80 290" class="backward-line" data-narration="Gradient flows backward from output"/>
    <path d="M185 270 L185 285 L185 290" class="backward-line"/>
    <path d="M290 270 L290 285 L290 290" class="backward-line"/>
    <path d="M80 230 L80 215 L110 215 L110 185" class="backward-line" data-narration="Gradient flows back through hidden states"/>
    <path d="M185 230 L185 215 L215 215 L215 185" class="backward-line"/>
    <path d="M290 230 L290 215 L320 215 L320 185" class="backward-line"/>
    <path d="M155 185 L110 185 L110 170" class="backward-line" data-narration="Gradient flows through recurrent connections"/>
    <path d="M260 185 L215 185 L215 170" class="backward-line"/>
    
    <!-- Weight Labels -->
    <rect x="108" y="108" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="128" y="120" text-anchor="middle" class="weight-label">W_xh</text>
    
    <rect x="108" y="153" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="128" y="165" text-anchor="middle" class="weight-label">W_hh</text>
    
    <rect x="213" y="108" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="233" y="120" text-anchor="middle" class="weight-label">W_xh</text>
    
    <rect x="213" y="153" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="233" y="165" text-anchor="middle" class="weight-label">W_hh</text>
    
    <rect x="318" y="108" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="338" y="120" text-anchor="middle" class="weight-label">W_xh</text>
    
    <rect x="318" y="153" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="338" y="165" text-anchor="middle" class="weight-label">W_hh</text>
    
    <rect x="108" y="218" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="128" y="230" text-anchor="middle" class="weight-label">W_hy</text>
    
    <rect x="213" y="218" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="233" y="230" text-anchor="middle" class="weight-label">W_hy</text>
    
    <rect x="318" y="218" width="40" height="16" fill="#fff8dc" stroke="#deb887" rx="3"/>
    <text x="338" y="230" text-anchor="middle" class="weight-label">W_hy</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key concepts: shared weights and gradient accumulation">
    <rect x="10" y="300" width="400" height="90" class="section-box"/>
    <text x="20" y="320" class="label" font-weight="bold" fill="#2c3e50">Key Concepts:</text>
    <text x="20" y="340" class="detail">• <tspan font-weight="bold">Temporal Unrolling:</tspan> RNN unfolded into deep feedforward network</text>
    <text x="20" y="358" class="detail">• <tspan font-weight="bold">Shared Weights:</tspan> W_xh, W_hh, W_hy identical across all time steps</text>
    <text x="20" y="376" class="detail">• <tspan font-weight="bold">Gradient Flow:</tspan> Dashed red arrows show backpropagation through time</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(320, 295)">
    <line x1="0" y1="0" x2="25" y2="0" class="forward-line"/>
    <text x="30" y="4" class="detail">Forward</text>
    <line x1="0" y1="15" x2="25" y2="15" class="backward-line"/>
    <text x="30" y="19" class="detail">Backward</text>
  </g>
</svg>