<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="lstm-long-short-term-memory">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="cellStateGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7cb3d0"/>
      <stop offset="100%" style="stop-color:#5a9bb8"/>
    </linearGradient>
    <linearGradient id="hiddenStateGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8d4a8"/>
      <stop offset="100%" style="stop-color:#8bc48b"/>
    </linearGradient>
    <linearGradient id="gateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c987"/>
      <stop offset="100%" style="stop-color:#e0b060"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowAnimation {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.8s both; }
    .section-5 { animation: fadeIn 0.6s ease-out 1s both; }
    .gate-box { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .flow-line { stroke-dasharray: 8, 4; animation: flowAnimation 1s linear infinite; }
    .cell-state-line { stroke-dasharray: 12, 4; animation: flowAnimation 1.5s linear infinite; }
    .hidden-state-line { stroke-dasharray: 8, 4; animation: flowAnimation 1.2s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5f7c" class="title">LSTM: Long Short-Term Memory</text>
  
  <!-- Cell State Line (top horizontal) -->
  <g class="section-1">
    <line x1="50" y1="70" x2="370" y2="70" stroke="url(#cellStateGradient)" stroke-width="4" class="cell-state-line" filter="url(#shadow)"/>
    <text x="45" y="75" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a7a94">C(t)</text>
    <text x="375" y="75" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#4a7a94">C(t+1)</text>
    <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a9bb8" font-style="italic">Cell State (Memory)</text>
    <!-- Cell state operations -->
    <rect x="155" y="55" width="30" height="30" rx="4" fill="#d4e8f0" stroke="#7cb3d0" stroke-width="1.5" class="gate-box"/>
    <text x="170" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5a9bb8">×</text>
  </g>
  
  <!-- Input -->
  <g class="section-2" data-narration="Input vector x(t) enters the LSTM cell">
    <rect x="20" y="145" width="45" height="50" rx="6" fill="#e8d4c4" stroke="#c4a484" stroke-width="2" filter="url(#shadow)"/>
    <text x="42" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b6b4a">x(t)</text>
    <text x="42" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b6b4a">Input</text>
  </g>
  
  <!-- Hidden State -->
  <g class="section-3" data-narration="Hidden state h(t) carries output information">
    <line x1="65" y1="220" x2="370" y2="220" stroke="url(#hiddenStateGradient)" stroke-width="3" class="hidden-state-line"/>
    <text x="45" y="225" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5a8a5a">h(t)</text>
    <text x="375" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#5a8a5a">h(t+1)</text>
    <text x="210" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6ba86b" font-style="italic">Hidden State</text>
  </g>
  
  <!-- Forget Gate -->
  <g class="section-2" data-narration="Forget gate determines what to discard from cell state">
    <rect x="100" y="120" width="70" height="50" rx="8" fill="url(#gateGradient)" filter="url(#shadow)"/>
    <text x="135" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6b5030">Forget</text>
    <text x="135" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b5030">Gate</text>
    <text x="135" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7a6035">f(t)</text>
    <!-- Connections -->
    <line x1="65" y1="170" x2="100" y2="145" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="135" y1="120" x2="135" y2="85" stroke="#c4a060" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Input Gate -->
  <g class="section-3" data-narration="Input gate decides what new information to store">
    <rect x="200" y="120" width="70" height="50" rx="8" fill="url(#gateGradient)" filter="url(#shadow)"/>
    <text x="235" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6b5030">Input</text>
    <text x="235" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b5030">Gate</text>
    <text x="235" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7a6035">i(t)</text>
    <!-- Connections -->
    <line x1="65" y1="170" x2="200" y2="145" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="235" y1="120" x2="235" y2="85" stroke="#c4a060" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Output Gate -->
  <g class="section-4" data-narration="Output gate controls what to output based on cell state">
    <rect x="300" y="120" width="70" height="50" rx="8" fill="url(#gateGradient)" filter="url(#shadow)"/>
    <text x="335" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6b5030">Output</text>
    <text x="335" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b5030">Gate</text>
    <text x="335" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7a6035">o(t)</text>
    <!-- Connections -->
    <line x1="65" y1="170" x2="300" y2="145" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="335" y1="120" x2="335" y2="95" stroke="#c4a060" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <line x1="335" y1="170" x2="335" y2="205" stroke="#8bc48b" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Cell State Operations -->
  <g class="section-4" data-narration="Cell state operations: multiply, add, tanh">
    <!-- C(t-1) to C(t+1) -->
    <line x1="50" y1="70" x2="155" y2="70" stroke="#7cb3d0" stroke-width="2" stroke-dasharray="6,3"/>
    <line x1="185" y1="70" x2="320" y2="70" stroke="#7cb3d0" stroke-width="2" stroke-dasharray="6,3"/>
    <line x1="320" y1="70" x2="370" y2="70" stroke="#7cb3d0" stroke-width="2" stroke-dasharray="6,3"/>
    
    <!-- New cell state calculation -->
    <rect x="240" y="280" width="60" height="40" rx="5" fill="#d4e8f0" stroke="#7cb3d0" stroke-width="1.5"/>
    <text x="270" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a7a94">C_new</text>
    <text x="270" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Update Cell</text>
    
    <!-- Connection from input gate -->
    <line x1="235" y1="170" x2="235" y2="200" stroke="#c4a060" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="235" y1="200" x2="270" y2="200" stroke="#c4a060" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="235" y1="200" x2="205" y2="200" stroke="#c4a060" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Hidden state output -->
  <g class="section-5" data-narration="Final hidden state output combines cell state and output gate">
    <rect x="280" y="250" width="50" height="40" rx="5" fill="#d4eed4" stroke="#8bc48b" stroke-width="1.5"/>
    <text x="305" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a8a5a">h(t+1)</text>
    <text x="305" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Hidden Output</text>
    <line x1="335" y1="220" x2="335" y2="250" stroke="#8bc48b" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Tanh blocks -->
  <g class="section-5">
    <rect x="100" y="270" width="45" height="30" rx="4" fill="#e8e0d4" stroke="#b8a888" stroke-width="1.5"/>
    <text x="122" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7a6b50">tanh</text>
    
    <rect x="200" y="270" width="45" height="30" rx="4" fill="#e8e0d4" stroke="#b8a888" stroke-width="1.5"/>
    <text x="222" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7a6b50">tanh</text>
    
    <rect x="300" y="270" width="45" height="30" rx="4" fill="#e8e0d4" stroke="#b8a888" stroke-width="1.5"/>
    <text x="322" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7a6b50">σ</text>
  </g>
  
  <!-- Sigmoid gate symbol -->
  <text x="45" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">σ = sigmoid</text>
  <text x="45" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">tanh = tanh</text>
  
  <!-- Key Concepts Box -->
  <g class="section-5">
    <rect x="10" y="350" width="130" height="40" rx="5" fill="rgba(255,255,255,0.7)" stroke="#7cb3d0" stroke-width="1"/>
    <text x="75" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a7a94">Key Innovation:</text>
    <text x="75" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Gated cell state preserves</text>
    <text x="75" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">long-term dependencies</text>
  </g>
  
  <!-- Vanishing Gradient Explanation -->
  <g class="section-5">
    <rect x="150" y="355" width="140" height="38" rx="5" fill="rgba(255,245,230,0.8)" stroke="#d4a060" stroke-width="1"/>
    <text x="220" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#7a6035">Solves Vanishing Gradient</text>
    <text x="220" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Gradients flow unchanged</text>
    <text x="220" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">through cell state</text>
  </g>
  
  <!-- Applications -->
  <g class="section-5">
    <rect x="300" y="355" width="110" height="38" rx="5" fill="rgba(230,255,230,0.8)" stroke="#8bc48b" stroke-width="1"/>
    <text x="355" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#5a8a5a">Applications:</text>
    <text x="355" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">NLP, Translation,</text>
    <text x="355" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Speech, Time Series</text>
  </g>
  
  <!-- Flow arrows for data -->
  <g opacity="0.6">
    <path d="M 30 170 Q 30 100 80 85" stroke="#666" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
  </g>
</svg>