<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="speech-recognition-nlp">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f4e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ba68c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b1fa2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4db6ac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00796b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f06292;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2185b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes waveAnim {
      0% { d: path("M0,20 Q5,10 10,20 T20,20"); }
      50% { d: path("M0,20 Q5,30 10,20 T20,20"); }
      100% { d: path("M0,20 Q5,10 10,20 T20,20"); }
    }
    @keyframes arrowFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5 { animation: slideIn 0.6s ease-out 1.0s forwards; opacity: 0; }
    .box6 { animation: slideIn 0.6s ease-out 1.2s forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-animated { stroke-dasharray: 10, 5; animation: arrowFlow 1s linear infinite; }
    text { font-family: Arial, sans-serif; }
    .label { font-size: 14px; font-weight: bold; }
    .detail { font-size: 11px; }
    .title-text { font-size: 18px; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" fill="#37474f">Speech Recognition Pipeline</text>
  <text x="210" y="45" text-anchor="middle" class="detail" fill="#546e7a">Traditional ASR System Flow</text>
  
  <!-- Input Section -->
  <g class="box1" data-narration="Audio input captured via microphone converts analog sound waves to digital signal">
    <rect x="20" y="60" width="60" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="50" y="82" text-anchor="middle" fill="white" class="label">Input</text>
    <text x="50" y="98" text-anchor="middle" fill="white" class="detail">Microphone</text>
    <!-- Sound wave icon -->
    <path d="M35,108 Q40,102 45,108 T55,108" stroke="white" stroke-width="2" fill="none" class="pulse-element"/>
    <path d="M38,112 Q43,106 48,112 T58,112" stroke="white" stroke-width="2" fill="none" class="pulse-element"/>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="85" y1="87" x2="105" y2="87" stroke="#546e7a" stroke-width="2" class="arrow-animated"/>
  
  <!-- Preprocessing Section -->
  <g class="box2" data-narration="Preprocessing stage: Analog-to-digital conversion and noise reduction to clean the signal">
    <rect x="110" y="60" width="70" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="145" y="82" text-anchor="middle" fill="white" class="label">Preprocess</text>
    <text x="145" y="98" text-anchor="middle" fill="white" class="detail">A/D + Noise</text>
    <!-- Processing icon -->
    <circle cx="145" cy="108" r="5" fill="white" opacity="0.7"/>
    <circle cx="160" cy="108" r="3" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="185" y1="87" x2="205" y2="87" stroke="#546e7a" stroke-width="2" class="arrow-animated"/>
  
  <!-- Feature Extraction Section -->
  <g class="box3" data-narration="Feature extraction converts audio to spectral features using MFCC or filterbank analysis">
    <rect x="210" y="60" width="80" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="250" y="82" text-anchor="middle" fill="white" class="label">Feature</text>
    <text x="250" y="98" text-anchor="middle" fill="white" class="detail">MFCC/Filter</text>
    <!-- Feature bars -->
    <rect x="235" y="105" width="4" height="12" fill="white" opacity="0.8"/>
    <rect x="242" y="102" width="4" height="15" fill="white" opacity="0.8"/>
    <rect x="249" y="108" width="4" height="9" fill="white" opacity="0.8"/>
    <rect x="256" y="104" width="4" height="13" fill="white" opacity="0.8"/>
    <rect x="263" y="106" width="4" height="11" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="295" y1="87" x2="315" y2="87" stroke="#546e7a" stroke-width="2" class="arrow-animated"/>
  
  <!-- Acoustic Model Section -->
  <g class="box4" data-narration="Acoustic model using DNN or GMM-HMM maps features to phonemes">
    <rect x="320" y="60" width="85" height="55" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="362" y="82" text-anchor="middle" fill="white" class="label">Acoustic</text>
    <text x="362" y="98" text-anchor="middle" fill="white" class="detail">DNN/GMM-HMM</text>
    <!-- Neural icon -->
    <circle cx="350" cy="105" r="4" fill="white"/>
    <circle cx="362" cy="105" r="4" fill="white"/>
    <circle cx="374" cy="105" r="4" fill="white"/>
    <line x1="354" y1="105" x2="358" y2="105" stroke="white" stroke-width="1.5"/>
    <line x1="366" y1="105" x2="370" y2="105" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Divider Line -->
  <line x1="20" y1="135" x2="400" y2="135" stroke="#b0bec5" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Bottom Section Labels -->
  <text x="105" y="155" text-anchor="middle" class="label" fill="#37474f">Pronunciation</text>
  <text x="105" y="168" text-anchor="middle" class="detail" fill="#546e7a">Lexicon</text>
  
  <text x="210" y="155" text-anchor="middle" class="label" fill="#37474f">Language</text>
  <text x="210" y="168" text-anchor="middle" class="detail" fill="#546e7a">Model</text>
  
  <text x="320" y="155" text-anchor="middle" class="label" fill="#37474f">Output</text>
  <text x="320" y="168" text-anchor="middle" class="detail" fill="#546e7a">Text</text>
  
  <!-- Pronunciation Lexicon Box -->
  <g class="box5" data-narration="Pronunciation lexicon maps words to their phonetic representations">
    <rect x="55" y="175" width="100" height="50" rx="8" fill="url(#boxGradient5)" filter="url(#shadow)"/>
    <text x="105" y="200" text-anchor="middle" fill="white" class="detail">Word → Phonemes</text>
    <text x="105" y="215" text-anchor="middle" fill="white" class="detail">Dictionary</text>
    <!-- Book icon -->
    <rect x="93" y="220" width="24" height="3" rx="1" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Arrow to Language Model -->
  <path d="M160,200 Q185,200 185,200" stroke="#546e7a" stroke-width="2" fill="none" class="arrow-animated"/>
  
  <!-- Language Model Box -->
  <g class="box6" data-narration="Language model uses N-gram or neural networks to predict likely word sequences">
    <rect x="190" y="175" width="100" height="50" rx="8" fill="url(#boxGradient6)" filter="url(#shadow)"/>
    <text x="240" y="200" text-anchor="middle" fill="white" class="detail">N-gram / NN</text>
    <text x="240" y="215" text-anchor="middle" fill="white" class="detail">P(word|context)</text>
    <!-- Graph icon -->
    <polyline points="225,218 230,212 235,215 240,208 245,210 250,205 255,208" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
  </g>
  
  <!-- Arrow to Output -->
  <path d="M295,200 Q305,200 305,200" stroke="#546e7a" stroke-width="2" fill="none" class="arrow-animated"/>
  
  <!-- Output Box -->
  <g class="box6" data-narration="Final text output generated by decoding acoustic and language model probabilities">
    <rect x="305" y="175" width="100" height="50" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="355" y="200" text-anchor="middle" fill="white" class="detail">"Hello World"</text>
    <text x="355" y="215" text-anchor="middle" fill="white" class="detail">Text Output</text>
    <!-- Text icon -->
    <line x1="340" y1="218" x2="370" y2="218" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- Key Concepts Box -->
  <rect x="20" y="250" width="380" height="135" rx="10" fill="white" stroke="#cfd8dc" stroke-width="2"/>
  <text x="210" y="270" text-anchor="middle" class="title-text" fill="#37474f">Key Concepts</text>
  
  <!-- Concept 1 -->
  <circle cx="45" cy="295" r="6" fill="#64b5f6"/>
  <text x="58" y="298" class="detail" fill="#37474f">MFCC: Mel-Frequency</text>
  <text x="58" y="310" class="detail" fill="#546e7a">Cepstral Coefficients</text>
  
  <!-- Concept 2 -->
  <circle cx="210" cy="295" r="6" fill="#81c784"/>
  <text x="223" y="298" class="detail" fill="#37474f">GMM-HMM: Gaussian</text>
  <text x="223" y="310" class="detail" fill="#546e7a">Mixture Hidden Markov</text>
  
  <!-- Concept 3 -->
  <circle cx="375" cy="295" r="6" fill="#ba68c8"/>
  <text x="45" cy="330" class="detail" fill="#37474f">DNN: Deep Neural</text>
  <text x="45" y="342" class="detail" fill="#546e7a">Networks for ASR</text>
  
  <!-- Concept 4 -->
  <circle cx="210" cy="330" r="6" fill="#ffb74d"/>
  <text x="223" y="333" class="detail" fill="#37474f">N-gram: Probability</text>
  <text x="223" y="345" class="detail" fill="#546e7a">of word sequences</text>
  
  <!-- Concept 5 -->
  <circle cx="375" cy="330" r="6" fill="#4db6ac"/>
  <text x="45" y="365" class="detail" fill="#37474f">ASR: Automatic</text>
  <text x="45" y="377" class="detail" fill="#546e7a">Speech Recognition</text>
</svg>