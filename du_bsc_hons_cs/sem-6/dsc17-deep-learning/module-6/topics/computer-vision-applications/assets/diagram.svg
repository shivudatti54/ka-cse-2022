<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="computer-vision-applications" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6f4"/>
      <stop offset="100%" style="stop-color:#e6f4f0"/>
    </linearGradient>
    <linearGradient id="convGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fbcd4"/>
    </linearGradient>
    <linearGradient id="poolGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8b8"/>
      <stop offset="100%" style="stop-color:#b8d48f"/>
    </linearGradient>
    <linearGradient id="fcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#d4b88f"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e8"/>
      <stop offset="100%" style="stop-color:#b88fd4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-box { filter: url(#shadow); }
    .input-img { animation: pulse 3s ease-in-out infinite; }
    .arrow-line { stroke: #7f8c8d; stroke-width: 2; stroke-dasharray: 5,3; animation: drawArrow 1s linear forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">CNN Architecture Overview</text>
  <text x="210" y="50" text-anchor="middle" class="detail">Computer Vision • Image Classification</text>
  
  <!-- Input Image Section -->
  <g class="section-box" data-narration="Input: Raw image data fed into the CNN for processing">
    <rect x="20" y="70" width="70" height="70" rx="8" fill="#c8e6c9" stroke="#4caf50" stroke-width="2"/>
    <rect x="28" y="78" width="12" height="12" fill="#81c784"/>
    <rect x="44" y="78" width="12" height="12" fill="#66bb6a"/>
    <rect x="60" y="78" width="12" height="12" fill="#a5d6a7"/>
    <rect x="28" y="94" width="12" height="12" fill="#66bb6a"/>
    <rect x="44" y="94" width="12" height="12" fill="#4caf50"/>
    <rect x="60" y="94" width="12" height="12" fill="#81c784"/>
    <rect x="28" y="110" width="12" height="12" fill="#a5d6a7"/>
    <rect x="44" y="110" width="12" height="12" fill="#81c784"/>
    <rect x="60" y="110" width="12" height="12" fill="#66bb6a"/>
    <text x="55" y="160" text-anchor="middle" class="label">Input Image</text>
    <text x="55" y="175" text-anchor="middle" class="detail">227×227×3</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="95" y1="105" x2="125" y2="105" class="arrow-line"/>
  <polygon points="120,100 130,105 120,110" fill="#7f8c8d"/>
  
  <!-- Convolutional Layer Section -->
  <g class="section-box" data-narration="Conv Layer: Feature extraction using filters/kernels that detect edges, textures, patterns">
    <rect x="130" y="70" width="75" height="70" rx="8" fill="url(#convGradient)" stroke="#3498db" stroke-width="2"/>
    <line x1="140" y1="85" x2="195" y2="85" stroke="#2980b9" stroke-width="2"/>
    <line x1="140" y1="105" x2="195" y2="105" stroke="#2980b9" stroke-width="2"/>
    <line x1="140" y1="125" x2="195" y2="125" stroke="#2980b9" stroke-width="2"/>
    <line x1="155" y1="75" x2="155" y2="135" stroke="#2980b9" stroke-width="2"/>
    <line x1="175" y1="75" x2="175" y2="135" stroke="#2980b9" stroke-width="2"/>
    <text x="167" y="160" text-anchor="middle" class="label">Conv Layer</text>
    <text x="167" y="175" text-anchor="middle" class="detail">Feature Maps</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="210" y1="105" x2="240" y2="105" class="arrow-line"/>
  <polygon points="235,100 245,105 235,110" fill="#7f8c8d"/>
  
  <!-- ReLU Activation -->
  <g class="section-box" data-narration="ReLU: Non-linear activation function that introduces sparsity">
    <rect x="245" y="80" width="40" height="50" rx="6" fill="#ffcdd2" stroke="#e57373" stroke-width="2"/>
    <text x="265" y="108" text-anchor="middle" class="label" font-size="16">ReLU</text>
    <text x="265" y="145" text-anchor="middle" class="detail">max(0,x)</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="290" y1="105" x2="320" y2="105" class="arrow-line"/>
  <polygon points="315,100 325,105 315,110" fill="#7f8c8d"/>
  
  <!-- Pooling Layer Section -->
  <g class="section-box" data-narration="Pooling: Downsampling that reduces spatial dimensions while retaining important features">
    <rect x="325" y="70" width="70" height="70" rx="8" fill="url(#poolGradient)" stroke="#7cb342" stroke-width="2"/>
    <rect x="335" y="80" width="20" height="20" fill="#9ccc65" stroke="#7cb342"/>
    <rect x="365" y="80" width="20" height="20" fill="#9ccc65" stroke="#7cb342"/>
    <rect x="335" y="110" width="20" height="20" fill="#9ccc65" stroke="#7cb342"/>
    <rect x="365" y="110" width="20" height="20" fill="#9ccc65" stroke="#7cb342"/>
    <text x="360" y="160" text-anchor="middle" class="label">Pooling</text>
    <text x="360" y="175" text-anchor="middle" class="detail">2×2 max</text>
  </g>
  
  <!-- Arrow 4 -->
  <line x1="400" y1="105" x2="420" y2="105" class="arrow-line" stroke-dasharray="3,3"/>
  
  <!-- Bottom Section: Fully Connected -->
  <g class="section-box" data-narration="Fully Connected: Learns global patterns and performs classification">
    <rect x="130" y="200" width="75" height="60" rx="8" fill="url(#fcGradient)" stroke="#d4a359" stroke-width="2"/>
    <circle cx="150" cy="225" r="4" fill="#b8860b"/>
    <circle cx="167" cy="225" r="4" fill="#b8860b"/>
    <circle cx="184" cy="225" r="4" fill="#b8860b"/>
    <circle cx="150" cy="242" r="4" fill="#b8860b"/>
    <circle cx="167" cy="242" r="4" fill="#b8860b"/>
    <circle cx="184" cy="242" r="4" fill="#b8860b"/>
    <line x1="154" y1="225" x2="180" y2="225" stroke="#8b7355" stroke-width="1"/>
    <line x1="154" y1="242" x2="180" y2="242" stroke="#8b7355" stroke-width="1"/>
    <line x1="167" y1="229" x2="167" y2="238" stroke="#8b7355" stroke-width="1"/>
    <text x="167" y="280" text-anchor="middle" class="label">Fully Connected</text>
    <text x="167" y="295" text-anchor="middle" class="detail">256 neurons</text>
  </g>
  
  <!-- Arrow to Output -->
  <line x1="210" y1="230" x2="245" y2="230" class="arrow-line"/>
  <polygon points="240,225 250,230 240,235" fill="#7f8c8d"/>
  
  <!-- Output Section -->
  <g class="section-box" data-narration="Output: Class probabilities from softmax layer">
    <rect x="250" y="200" width="80" height="60" rx="8" fill="url(#outputGradient)" stroke="#9c59b6" stroke-width="2"/>
    <text x="290" y="222" text-anchor="middle" class="label" font-size="12">Class 1: 0.85</text>
    <text x="290" y="240" text-anchor="middle" class="label" font-size="12">Class 2: 0.12</text>
    <text x="290" y="258" text-anchor="middle" class="label" font-size="12">Class 3: 0.03</text>
    <text x="290" y="280" text-anchor="middle" class="label" style="fill:#9c59b6">Output</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key takeaway: CNNs process images through hierarchical layers, learning increasingly abstract features">
    <rect x="20" y="320" width="380" height="70" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="35" y="342" class="label" fill="#2c3e50">Key Concepts:</text>
    <text x="35" y="360" class="detail">• Conv layers extract local features (edges, textures)</text>
    <text x="35" y="376" class="detail">• ReLU introduces non-linearity for complex patterns</text>
    <text x="200" y="376" class="detail">• Pooling reduces dimensions &amp; controls overfitting</text>
    <text x="230" y="360" class="detail">• FC layer performs final classification</text>
  </g>
  
  <!-- Legend/Indicator -->
  <circle cx="395" cy="385" r="6" fill="#4caf50">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="380" y="388" class="detail" font-size="10">CNN</text>
</svg>