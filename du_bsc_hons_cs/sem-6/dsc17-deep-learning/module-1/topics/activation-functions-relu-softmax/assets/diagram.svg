<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="activation-functions-relu-softmax">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f2"/>
    </linearGradient>
    <linearGradient id="reluGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="softmaxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a237e; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .box { fill: #fff; stroke: #ddd; stroke-width: 1; rx: 5; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .axis { stroke: #333; stroke-width: 1; }
    .grid { stroke: #eee; stroke-width: 0.5; }
    .relu-line { stroke: #4CAF50; stroke-width: 3; fill: none; }
    .softmax-bar { fill: #2196F3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Activation Functions: ReLU &amp; Softmax</text>
  
  <!-- ReLU Graph Section -->
  <g transform="translate(20, 50)" data-narration="ReLU function graph showing f(x) = max(0,x)">
    <text x="80" y="0" text-anchor="middle" class="label" style="font-weight:bold;">ReLU: f(x) = max(0, x)</text>
    
    <!-- Grid -->
    <line x1="30" y1="120" x2="150" y2="120" class="grid"/>
    <line x1="90" y1="20" x2="90" y2="120" class="grid"/>
    
    <!-- Axes -->
    <line x1="30" y1="120" x2="150" y2="120" class="axis"/>
    <line x1="90" y1="20" x2="90" y2="120" class="axis"/>
    
    <!-- Axis Labels -->
    <text x="150" y="135" class="detail">x</text>
    <text x="95" y="20" class="detail">y</text>
    
    <!-- ReLU Line - animated -->
    <path d="M 30 120 L 90 120 L 150 60" class="relu-line" stroke-dasharray="200" stroke-dashoffset="200" style="animation: drawLine 1.5s ease-out forwards 0.5s;"/>
    
    <!-- Origin point -->
    <circle cx="90" cy="120" r="4" fill="#4CAF50" class="pulse" style="animation-delay: 1.5s;"/>
    
    <!-- Labels -->
    <text x="50" y="135" class="detail">-ve</text>
    <text x="130" y="100" class="detail">y=x</text>
    <text x="45" y="105" class="detail" fill="#4CAF50">0</text>
  </g>
  
  <!-- Key Points Box - ReLU -->
  <g transform="translate(180, 60)" class="slide-in" data-narration="Key properties of ReLU activation function">
    <rect x="0" y="0" width="130" height="90" class="box" fill="#e8f5e9"/>
    <text x="10" y="20" class="label" style="font-size:13px;font-weight:bold;fill:#2E7D32;">ReLU Properties</text>
    <text x="10" y="38" class="detail">• Output: [0, ∞)</text>
    <text x="10" y="52" class="detail">• Computes f(x)=max(0,x)</text>
    <text x="10" y="66" class="detail">• Solves vanishing gradient</text>
    <text x="10" y="80" class="detail">• Used in hidden layers</text>
  </g>
  
  <!-- Softmax Section -->
  <g transform="translate(20, 200)" data-narration="Softmax function converts logits to probabilities">
    <text x="80" y="0" text-anchor="middle" class="label" style="font-weight:bold;">Softmax: Probability Distribution</text>
    <text x="80" y="18" text-anchor="middle" class="detail">σ(zᵢ) = e^zᵢ / Σe^zⱼ</text>
    
    <!-- Input values -->
    <text x="30" y="50" class="detail">Inputs:</text>
    <text x="75" y="50" class="detail" fill="#E91E63">z = [2.0, 1.0, 0.1]</text>
    
    <!-- Softmax calculation visualization -->
    <g transform="translate(20, 70)">
      <text x="0" y="15" class="detail">Step 1: e^z = [7.39, 2.72, 1.11]</text>
      <text x="0" y="35" class="detail">Step 2: Sum = 11.22</text>
      
      <!-- Probability bars -->
      <rect x="10" y="50" width="40" height="20" fill="url(#softmaxGradient)" rx="2"/>
      <text x="60" y="64" class="detail">65.8%</text>
      
      <rect x="10" y="75" width="20" height="20" fill="#64B5F6" rx="2"/>
      <text x="60" y="89" class="detail">24.2%</text>
      
      <rect x="10" y="100" width="8" height="20" fill="#90CAF9" rx="2"/>
      <text x="60" y="114" class="detail">9.9%</text>
    </g>
  </g>
  
  <!-- Softmax Properties Box -->
  <g transform="translate(180, 210)" class="slide-in" data-narration="Key properties of Softmax activation function" style="animation-delay: 0.3s;">
    <rect x="0" y="0" width="130" height="85" class="box" fill="#e3f2fd"/>
    <text x="10" y="20" class="label" style="font-size:13px;font-weight:bold;fill:#1565C0;">Softmax Properties</text>
    <text x="10" y="38" class="detail">• Output: [0, 1], sums to 1</text>
    <text x="10" y="52" class="detail">• Multi-class classification</text>
    <text x="10" y="66" class="detail">• Used in output layer</text>
    <text x="10" y="80" class="detail">• Probabilities sum to 100%</text>
  </g>
  
  <!-- Relationship Arrow -->
  <g transform="translate(315, 120)" data-narration="Arrow showing flow from ReLU to Softmax in neural network">
    <line x1="0" y1="30" x2="0" y2="70" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="10" y="55" class="detail" style="font-size:11px;">Hidden</text>
    <text x="10" y="68" class="detail" style="font-size:11px;">→ Output</text>
  </g>
  
  <!-- Non-Linearity Note -->
  <g transform="translate(20, 340)" class="fade-in" data-narration="Why activation functions are needed" style="animation-delay: 0.8s;">
    <rect x="0" y="0" width="380" height="50" class="box" fill="#fffde7"/>
    <text x="190" y="18" text-anchor="middle" class="label" style="font-size:13px;font-weight:bold;fill:#F57F17;">Why Non-Linearity?</text>
    <text x="190" y="35" text-anchor="middle" class="detail">Without activation: Network = Linear (WX+b) | With ReLU/Softmax: Learns complex patterns</text>
  </g>
</svg>