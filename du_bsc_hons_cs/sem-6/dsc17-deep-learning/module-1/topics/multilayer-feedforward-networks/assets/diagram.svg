<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="multilayer-feedforward-networks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e0e8f5"/>
      <stop offset="100%" style="stop-color:#d8e4f0"/>
    </linearGradient>
    <linearGradient id="neuronGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#4472c4"/>
    </linearGradient>
    <linearGradient id="hiddenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#1e8449"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes connectionDraw {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .concept-box { fill: white; stroke: #ddd; stroke-width: 1; rx: 5; }
    .neuron { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .connection { stroke: #aab7c4; stroke-width: 1; fill: none; }
    .connection-animated { stroke-dasharray: 200; animation: connectionDraw 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title">Multilayer Feedforward Networks</text>
  <line x1="50" y1="35" x2="370" y2="35" stroke="#5b9bd5" stroke-width="2"/>
  
  <!-- Input Layer Section -->
  <g data-narration="The input layer receives raw features from data (e.g., pixel values, sensor readings)">
    <rect x="20" y="50" width="100" height="310" fill="rgba(91,155,213,0.1)" rx="8" stroke="rgba(91,155,213,0.3)" stroke-width="1"/>
    <text x="70" y="70" text-anchor="middle" class="section-title">Input Layer</text>
    <text x="70" y="85" text-anchor="middle" class="detail">(3 neurons)</text>
    
    <!-- Input neurons -->
    <circle cx="70" cy="120" r="18" fill="url(#neuronGradient)" filter="url(#shadow)" class="neuron"/>
    <text x="70" y="124" text-anchor="middle" fill="white" font-size="10" font-weight="bold">x₁</text>
    
    <circle cx="70" cy="180" r="18" fill="url(#neuronGradient)" filter="url(#shadow)" class="neuron" style="animation-delay: 0.2s"/>
    <text x="70" y="184" text-anchor="middle" fill="white" font-size="10" font-weight="bold">x₂</text>
    
    <circle cx="70" cy="240" r="18" fill="url(#neuronGradient)" filter="url(#shadow)" class="neuron" style="animation-delay: 0.4s"/>
    <text x="70" y="244" text-anchor="middle" fill="white" font-size="10" font-weight="bold">x₃</text>
  </g>
  
  <!-- Hidden Layer Section -->
  <g data-narration="Hidden layers transform inputs through weighted connections and activation functions, learning hierarchical representations">
    <rect x="160" y="50" width="100" height="310" fill="rgba(155,89,182,0.1)" rx="8" stroke="rgba(155,89,182,0.3)" stroke-width="1"/>
    <text x="210" y="70" text-anchor="middle" class="section-title">Hidden Layer</text>
    <text x="210" y="85" text-anchor="middle" class="detail">(4 neurons)</text>
    
    <!-- Hidden neurons -->
    <circle cx="210" cy="100" r="18" fill="url(#hiddenGradient)" filter="url(#shadow)" class="neuron" style="animation-delay: 0.3s"/>
    <text x="210" y="104" text-anchor="middle" fill="white" font-size="10" font-weight="bold">h₁</text>
    
    <circle cx="210" cy="160" r="18" fill="url(#hiddenGradient)" filter="url(#shadow)" class="neuron" style="animation-delay: 0.5s"/>
    <text x="210" y="164" text-anchor="middle" fill="white" font-size="10" font-weight="bold">h₂</text>
    
    <circle cx="210" cy="220" r="18" fill="url(#hiddenGradient)" filter="url(#shadow)" class="neuron" style="animation-delay: 0.7s"/>
    <text x="210" y="224" text-anchor="middle" fill="white" font-size="10" font-weight="bold">h₃</text>
    
    <circle cx="210" cy="280" r="18" fill="url(#hiddenGradient)" filter="url(#shadow)" class="neuron" style="animation-delay: 0.9s"/>
    <text x="210" y="284" text-anchor="middle" fill="white" font-size="10" font-weight="bold">h₄</text>
    
    <!-- Bias for hidden layer -->
    <circle cx="210" cy="55" r="10" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="210" y="59" text-anchor="middle" fill="white" font-size="8" font-weight="bold">b₁</text>
    <text x="230" y="58" class="detail">bias</text>
  </g>
  
  <!-- Output Layer Section -->
  <g data-narration="The output layer produces final predictions (e.g., class probabilities, regression values)">
    <rect x="300" y="50" width="100" height="310" fill="rgba(39,174,96,0.1)" rx="8" stroke="rgba(39,174,96,0.3)" stroke-width="1"/>
    <text x="350" y="70" text-anchor="middle" class="section-title">Output Layer</text>
    <text x="350" y="85" text-anchor="middle" class="detail">(2 neurons)</text>
    
    <!-- Output neurons -->
    <circle cx="350" cy="140" r="18" fill="url(#outputGradient)" filter="url(#shadow)" class="neuron" style="animation-delay: 0.6s"/>
    <text x="350" y="144" text-anchor="middle" fill="white" font-size="10" font-weight="bold">y₁</text>
    
    <circle cx="350" cy="240" r="18" fill="url(#outputGradient)" filter="url(#shadow)" class="neuron" style="animation-delay: 0.8s"/>
    <text x="350" y="244" text-anchor="middle" fill="white" font-size="10" font-weight="bold">y₂</text>
    
    <!-- Bias for output layer -->
    <circle cx="350" cy="55" r="10" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="350" y="59" text-anchor="middle" fill="white" font-size="8" font-weight="bold">b₂</text>
    <text x="370" y="58" class="detail">bias</text>
  </g>
  
  <!-- Connections from Input to Hidden -->
  <g data-narration="Weighted connections (w) connect every neuron between layers; values flow forward (feedforward)">
    <!-- Input x1 to hidden -->
    <line x1="88" y1="120" x2="192" y2="100" class="connection connection-animated" style="animation-delay: 0.1s"/>
    <line x1="88" y1="120" x2="192" y2="160" class="connection connection-animated" style="animation-delay: 0.15s"/>
    <line x1="88" y1="120" x2="192" y2="220" class="connection connection-animated" style="animation-delay: 0.2s"/>
    <line x1="88" y1="120" x2="192" y2="280" class="connection connection-animated" style="animation-delay: 0.25s"/>
    
    <!-- Input x2 to hidden -->
    <line x1="88" y1="180" x2="192" y2="100" class="connection connection-animated" style="animation-delay: 0.3s"/>
    <line x1="88" y1="180" x2="192" y2="160" class="connection connection-animated" style="animation-delay: 0.35s"/>
    <line x1="88" y1="180" x2="192" y2="220" class="connection connection-animated" style="animation-delay: 0.4s"/>
    <line x1="88" y1="180" x2="192" y2="280" class="connection connection-animated" style="animation-delay: 0.45s"/>
    
    <!-- Input x3 to hidden -->
    <line x1="88" y1="240" x2="192" y2="100" class="connection connection-animated" style="animation-delay: 0.5s"/>
    <line x1="88" y1="240" x2="192" y2="160" class="connection connection-animated" style="animation-delay: 0.55s"/>
    <line x1="88" y1="240" x2="192" y2="220" class="connection connection-animated" style="animation-delay: 0.6s"/>
    <line x1="88" y1="240" x2="192" y2="280" class="connection connection-animated" style="animation-delay: 0.65s"/>
    
    <!-- Bias to hidden -->
    <line x1="220" y1="65" x2="210" y2="82" class="connection connection-animated" style="animation-delay: 0.7s"/>
  </g>
  
  <!-- Connections from Hidden to Output -->
  <g data-narration="Fully connected architecture ensures each neuron connects to all neurons in adjacent layers">
    <!-- Hidden to Output y1 -->
    <line x1="228" y1="100" x2="332" y2="140" class="connection connection-animated" style="animation-delay: 0.75s"/>
    <line x1="228" y1="160" x2="332" y2="140" class="connection connection-animated" style="animation-delay: 0.8s"/>
    <line x1="228" y1="220" x2="332" y2="140" class="connection connection-animated" style="animation-delay: 0.85s"/>
    <line x1="228" y1="280" x2="332" y2="140" class="connection connection-animated" style="animation-delay: 0.9s"/>
    
    <!-- Hidden to Output y2 -->
    <line x1="228" y1="100" x2="332" y2="240" class="connection connection-animated" style="animation-delay: 0.95s"/>
    <line x1="228" y1="160" x2="332" y2="240" class="connection connection-animated" style="animation-delay: 1.0s"/>
    <line x1="228" y1="220" x2="332" y2="240" class="connection connection-animated" style="animation-delay: 1.05s"/>
    <line x1="228" y1="280" x2="332" y2="240" class="connection connection-animated" style="animation-delay: 1.1s"/>
    
    <!-- Bias to output -->
    <line x1="360" y1="65" x2="350" y2="82" class="connection connection-animated" style="animation-delay: 1.15s"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Universal Approximation Theorem: MLPs can approximate any continuous function with enough hidden neurons">
    <rect x="25" y="325" width="180" height="60" class="concept-box" fill="rgba(255,248,220,0.95)"/>
    <text x="35" y="342" class="section-title" font-size="11">Key Concept:</text>
    <text x="35" y="358" class="detail">Universal Approximation</text>
    <text x="35" y="372" class="detail">Theorem</text>
    <text x="35" y="382" class="detail" font-size="10">f(x) ≈ any continuous function</text>
  </g>
  
  <!-- Architecture Info Box -->
  <g data-narration="Each neuron applies an activation function (ReLU, Sigmoid, Tanh) to introduce non-linearity">
    <rect x="215" y="325" width="180" height="60" class="concept-box" fill="rgba(255,248,220,0.95)"/>
    <text x="225" y="342" class="section-title" font-size="11">Activation Function:</text>
    <text x="225" y="358" class="detail">σ(z) = activation(Σw·x + b)</text>
    <text x="225" y="372" class="detail">ReLU, Sigmoid, Tanh</text>
    <text x="225" y="382" class="detail" font-size="10">Introduces non-linearity</text>
  </g>
  
  <!-- Flow Arrow -->
  <g data-narration="Information flows forward from input through hidden to output layers">
    <path d="M140 195 L155 195" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="147" y="188" text-anchor="middle" class="detail" font-size="9">forward</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(310, 330)">
    <circle cx="8" cy="8" r="5" fill="#e74c3c"/>
    <text x="18" y="11" class="detail" font-size="9">Bias</text>
    <line x1="0" y1="20" x2="15" y2="20" stroke="#aab7c4" stroke-width="1"/>
    <text x="18" y="23" class="detail" font-size="9">Weights</text>
  </g>
</svg>