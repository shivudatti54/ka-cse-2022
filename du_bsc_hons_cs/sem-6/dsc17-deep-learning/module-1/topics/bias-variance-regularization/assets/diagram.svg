<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="bias-variance-regularization" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="biasGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="varianceGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="totalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: 'Segoe UI', Arial, sans-serif; }
    .chart-area { animation: fadeIn 1s ease-out 0.3s forwards; opacity: 0; }
    .curve-bias { animation: slideInLeft 1s ease-out 0.5s forwards; stroke-dasharray: 500; stroke-dashoffset: 500; }
    .curve-variance { animation: slideInRight 1s ease-out 0.7s forwards; stroke-dasharray: 500; stroke-dashoffset: 500; }
    .curve-total { animation: drawLine 1.5s ease-out 0.9s forwards; stroke-dasharray: 500; stroke-dashoffset: 500; }
    .axis-label { animation: fadeIn 1s ease-out 1.2s forwards; opacity: 0; }
    .legend { animation: slideInUp 0.8s ease-out 1.4s forwards; opacity: 0; }
    .concept-box { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .arrow-indicator { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .axis-line { animation: drawLine 1s ease-out forwards; stroke-dasharray: 300; stroke-dashoffset: 300; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-size="18" font-weight="bold" fill="#2c3e50">Bias-Variance Tradeoff</text>
  <text x="210" y="46" text-anchor="middle" class="title" font-size="13" fill="#5d6d7e" style="animation-delay: 0.2s">and Regularization</text>
  
  <!-- Chart Area -->
  <g class="chart-area" transform="translate(50, 70)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="0" y2="220" stroke="#bdc3c7" stroke-width="1" class="axis-line"/>
    <line x1="0" y1="220" x2="320" y2="220" stroke="#bdc3c7" stroke-width="1" class="axis-line" style="animation-delay: 0.3s"/>
    <line x1="80" y1="10" x2="80" y2="210" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4"/>
    <line x1="160" y1="10" x2="160" y2="210" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4"/>
    <line x1="240" y1="10" x2="240" y2="210" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4"/>
    
    <!-- Y-axis labels -->
    <text x="-8" y="15" class="axis-label" font-size="10" fill="#7f8c8d">Error</text>
    <text x="-8" y="220" class="axis-label" font-size="10" fill="#7f8c8d">0</text>
    <text x="-8" y="115" class="axis-label" font-size="10" fill="#7f8c8d">Mid</text>
    
    <!-- X-axis labels -->
    <text x="160" y="240" class="axis-label" text-anchor="middle" font-size="11" fill="#7f8c8d">Model Complexity</text>
    <text x="0" y="235" class="axis-label" font-size="9" fill="#7f8c8d">Simple</text>
    <text x="320" y="235" class="axis-label" font-size="9" fill="#7f8c8d">Complex</text>
    
    <!-- Bias² Curve (decreasing) -->
    <path d="M 0 30 Q 80 60, 160 120 Q 240 180, 320 200" 
          fill="none" stroke="url(#biasGradient)" stroke-width="3" class="curve-bias"/>
    
    <!-- Variance Curve (increasing) -->
    <path d="M 0 200 Q 80 180, 160 120 Q 240 60, 320 40" 
          fill="none" stroke="url(#varianceGradient)" stroke-width="3" class="curve-variance"/>
    
    <!-- Total Error Curve (U-shaped) -->
    <path d="M 0 100 Q 60 85, 120 70 Q 160 65, 200 70 Q 260 90, 320 150" 
          fill="none" stroke="url(#totalGradient)" stroke-width="4" class="curve-total"/>
    
    <!-- Optimal point marker -->
    <circle cx="160" cy="65" r="8" fill="#f39c12" class="arrow-indicator" style="animation-delay: 2s"/>
    <text x="160" y="55" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">Optimal</text>
    
    <!-- Underfitting region -->
    <rect x="-5" y="0" width="80" height="220" fill="#2ecc71" opacity="0.08" rx="4"/>
    <text x="35" y="260" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">UNDERFITTING</text>
    <text x="35" y="273" text-anchor="middle" font-size="8" fill="#27ae60">(High Bias)</text>
    
    <!-- Overfitting region -->
    <rect x="245" y="0" width="80" height="220" fill="#e74c3c" opacity="0.08" rx="4"/>
    <text x="285" y="260" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">OVERFITTING</text>
    <text x="285" y="273" text-anchor="middle" font-size="8" fill="#c0392b">(High Variance)</text>
  </g>
  
  <!-- Legend -->
  <g class="legend" transform="translate(260, 75)">
    <rect width="145" height="75" fill="white" opacity="0.9" rx="6" filter="url(#shadow)"/>
    <rect x="10" y="12" width="20" height="3" fill="#27ae60"/>
    <text x="38" y="16" font-size="10" fill="#2c3e50">Bias²</text>
    <rect x="10" y="27" width="20" height="3" fill="#c0392b"/>
    <text x="38" y="31" font-size="10" fill="#2c3e50">Variance</text>
    <rect x="10" y="42" width="20" height="3" fill="#8e44ad"/>
    <text x="38" y="46" font-size="10" fill="#2c3e50">Total Error</text>
    <circle cx="20" cy="58" r="5" fill="#f39c12"/>
    <text x="38" y="62" font-size="10" fill="#2c3e50" font-weight="bold">Optimal</text>
  </g>
  
  <!-- Concept Boxes with data-narration -->
  <g class="concept-box" transform="translate(10, 300)" data-narration="bias-definition">
    <rect width="125" height="55" fill="white" opacity="0.95" rx="5" filter="url(#shadow)"/>
    <rect x="5" y="5" width="3" height="45" fill="#27ae60" rx="1"/>
    <text x="12" y="18" font-size="11" font-weight="bold" fill="#27ae60">Bias</text>
    <text x="12" y="33" font-size="9" fill="#34495e">Error from oversimplified assumptions</text>
    <text x="12" y="45" font-size="8" fill="#7f8c8d">→ Underfitting</text>
  </g>
  
  <g class="concept-box" transform="translate(145, 300)" style="animation-delay: 0.3s" data-narration="variance-definition">
    <rect width="125" height="55" fill="white" opacity="0.95" rx="5" filter="url(#shadow)"/>
    <rect x="5" y="5" width="3" height="45" fill="#c0392b" rx="1"/>
    <text x="12" y="18" font-size="11" font-weight="bold" fill="#c0392b">Variance</text>
    <text x="12" y="33" font-size="9" fill="#34495e">Error from model sensitivity to data noise</text>
    <text x="12" y="45" font-size="8" fill="#7f8c8d">→ Overfitting</text>
  </g>
  
  <g class="concept-box" transform="translate(280, 300)" style="animation-delay: 0.6s" data-narration="regularization-purpose">
    <rect width="125" height="55" fill="white" opacity="0.95" rx="5" filter="url(#shadow)"/>
    <rect x="5" y="5" width="3" height="45" fill="#9b59b6" rx="1"/>
    <text x="12" y="18" font-size="11" font-weight="bold" fill="#9b59b6">Regularization</text>
    <text x="12" y="33" font-size="9" fill="#34495e">Penalizes complexity to reduce variance</text>
    <text x="12" y="45" font-size="8" fill="#7f8c8d">→ Better Generalization</text>
  </g>
  
  <!-- Arrow showing regularization effect -->
  <g transform="translate(295, 260)" class="arrow-indicator">
    <path d="M 0 0 L 20 25" stroke="#9b59b6" stroke-width="2" stroke-dasharray="4" fill="none"/>
    <polygon points="18,25 22,32 14,30" fill="#9b59b6"/>
  </g>
  <text x="318" y="275" font-size="8" fill="#9b59b6" transform="rotate(-35 318 275)">Regularization</text>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="15" fill="#3498db" opacity="0.1"/>
  <circle cx="390" cy="20" r="20" fill="#9b59b6" opacity="0.1"/>
  <circle cx="400" cy="380" r="12" fill="#e74c3c" opacity="0.1"/>
</svg>