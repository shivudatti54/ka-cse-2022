<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="artificial-neurons-perceptron" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a87;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6bbd99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8b6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a87c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c67d4d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="actGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b19cd9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b5ba8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c78500;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowAnimation {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: fadeIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s both; }
    .section-4 { animation: slideInRight 0.6s ease-out 0.8s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 5,5; animation: flowAnimation 1s linear infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2d5a87" class="title">Artificial Neuron: Perceptron</text>
  <text x="210" y="46" text-anchor="middle" font-size="12" fill="#5a7a9a">Single Neuron Architecture</text>
  
  <!-- Input Section -->
  <g class="section-1" data-narration="Input signals (x₁, x₂, ..., xₙ) represent data features fed into the perceptron">
    <rect x="15" y="85" width="85" height="70" fill="url(#inputGradient)" rx="8" filter="url(#shadow)"/>
    <text x="57" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Inputs</text>
    <text x="57" y="130" text-anchor="middle" font-size="11" fill="white">x₁, x₂, ..., xₙ</text>
  </g>
  
  <!-- Weights Section -->
  <g class="section-1" data-narration="Weights (w₁, w₂, ..., wₙ) determine the importance of each input signal">
    <rect x="15" y="180" width="85" height="55" fill="#7ab8d4" rx="8" filter="url(#shadow)"/>
    <text x="57" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Weights</text>
    <text x="57" y="220" text-anchor="middle" font-size="11" fill="white">w₁, w₂, ..., wₙ</text>
  </g>
  
  <!-- Bias Section -->
  <g class="section-2" data-narration="Bias (b) is an additional learnable parameter that shifts the activation function">
    <rect x="15" y="260" width="85" height="40" fill="#9ec5db" rx="8" filter="url(#shadow)"/>
    <text x="57" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Bias</text>
    <text x="57" y="297" text-anchor="middle" font-size="11" fill="white">b</text>
  </g>
  
  <!-- Weight Connections Lines -->
  <line x1="100" y1="105" x2="165" y2="155" stroke="#5a9fd4" stroke-width="2" class="flow-line"/>
  <line x1="100" y1="120" x2="165" y2="175" stroke="#5a9fd4" stroke-width="2" class="flow-line"/>
  <line x1="100" y1="135" x2="165" y2="195" stroke="#5a9fd4" stroke-width="2" class="flow-line"/>
  <line x1="57" y1="295" x2="165" y2="195" stroke="#5a9fd4" stroke-width="2" stroke-dasharray="4,4" class="flow-line"/>
  
  <!-- Summation Section -->
  <g class="section-2" data-narration="Summation (Σ) computes the weighted sum: z = Σ(wᵢ × xᵢ) + b">
    <circle cx="190" cy="175" r="30" fill="url(#sumGradient)" filter="url(#shadow)"/>
    <text x="190" y="172" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Σ</text>
    <text x="190" y="190" text-anchor="middle" font-size="10" fill="white">Sum</text>
  </g>
  
  <!-- Arrow to Activation -->
  <path d="M 220 175 L 265 175" stroke="#7b5ba8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Activation Function Section -->
  <g class="section-3" data-narration="Activation function introduces non-linearity: Step, Sigmoid, ReLU, or Tanh">
    <rect x="270" y="145" width="80" height="60" fill="url(#actGradient)" rx="8" filter="url(#shadow)"/>
    <text x="310" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Activation</text>
    <text x="310" y="188" text-anchor="middle" font-size="10" fill="white">f(z)</text>
  </g>
  
  <!-- Arrow to Output -->
  <path d="M 350 175 L 380 175" stroke="#c78500" stroke-width="2"/>
  <polygon points="380,175 373,172 373,178" fill="#c78500"/>
  
  <!-- Output Section -->
  <g class="section-4" data-narration="Output (y) is the final prediction: 0 or 1 for binary classification">
    <ellipse cx="400" cy="175" rx="18" ry="25" fill="url(#outputGradient)" filter="url(#shadow)" class="pulse"/>
    <text x="400" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="white">y</text>
    <text x="400" y="187" text-anchor="middle" font-size="8" fill="white">output</text>
  </g>
  
  <!-- Formula Box -->
  <g class="section-3" data-narration="The perceptron formula combines inputs, weights, and bias through weighted summation">
    <rect x="125" y="320" width="170" height="45" fill="white" rx="6" stroke="#4a90d9" stroke-width="1.5"/>
    <text x="210" y="342" text-anchor="middle" font-size="12" fill="#2d5a87" font-style="italic">z = Σ(wᵢ × xᵢ) + b</text>
    <text x="210" y="358" text-anchor="middle" font-size="11" fill="#5a7a9a">y = f(z)</text>
  </g>
  
  <!-- Key Concept Labels -->
  <g class="section-4">
    <circle cx="57" cy="365" r="5" fill="#6bbd99"/>
    <text x="70" y="369" font-size="10" fill="#2d5a87">Inputs</text>
    
    <circle cx="130" cy="365" r="5" fill="#e8a87c"/>
    <text x="143" y="369" font-size="10" fill="#2d5a87">Sum</text>
    
    <circle cx="190" cy="365" r="5" fill="#b19cd9"/>
    <text x="203" y="369" font-size="10" fill="#2d5a87">Activation</text>
    
    <circle cx="275" cy="365" r="5" fill="#f0a500"/>
    <text x="288" y="369" font-size="10" fill="#2d5a87">Output</text>
  </g>
  
  <!-- Rosenblatt attribution -->
  <text x="210" y="388" text-anchor="middle" font-size="9" fill="#7a9aad">Frank Rosenblatt, 1958</text>
</svg>