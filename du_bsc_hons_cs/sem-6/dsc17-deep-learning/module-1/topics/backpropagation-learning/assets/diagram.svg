<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="backpropagation-learning" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="forwardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backwardGrad" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E57373;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .node { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
    .node-hidden { fill: #9b59b6; stroke: #8e44ad; stroke-width: 2; }
    .node-output { fill: #e67e22; stroke: #d35400; stroke-width: 2; }
    .box { fill: #ffffff; stroke: #bdc3c7; stroke-width: 1; rx: 8; }
    .forward-arrow { stroke: #4CAF50; stroke-width: 2; fill: none; stroke-dasharray: 5,3; animation: flowDash 1s linear infinite; }
    .backward-arrow { stroke: #f44336; stroke-width: 2; fill: none; stroke-dasharray: 5,3; animation: flowDash 1s linear infinite; }
    .arrow-head { fill: #4CAF50; }
    .arrow-head-back { fill: #f44336; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Backpropagation Learning</text>
  
  <!-- Neural Network Structure -->
  <g filter="url(#shadow)">
    <!-- Input Layer -->
    <g class="anim-fade" style="animation-delay: 0.2s; opacity: 0;">
      <circle cx="60" cy="120" r="12" class="node" />
      <circle cx="60" cy="160" r="12" class="node" />
      <circle cx="60" cy="200" r="12" class="node" />
      <circle cx="60" cy="240" r="12" class="node" />
      <text x="60" y="275" text-anchor="middle" class="label" style="font-size: 12px;">Input</text>
    </g>
    
    <!-- Hidden Layer -->
    <g class="anim-fade" style="animation-delay: 0.4s; opacity: 0;">
      <circle cx="180" cy="120" r="12" class="node-hidden anim-pulse" style="animation-delay: 1s;" />
      <circle cx="180" cy="160" r="12" class="node-hidden anim-pulse" style="animation-delay: 1.2s;" />
      <circle cx="180" cy="200" r="12" class="node-hidden anim-pulse" style="animation-delay: 1.4s;" />
      <circle cx="180" cy="240" r="12" class="node-hidden anim-pulse" style="animation-delay: 1.6s;" />
      <text x="180" y="275" text-anchor="middle" class="label" style="font-size: 12px;">Hidden</text>
    </g>
    
    <!-- Output Layer -->
    <g class="anim-fade" style="animation-delay: 0.6s; opacity: 0;">
      <circle cx="300" cy="160" r="12" class="node-output" />
      <circle cx="300" cy="200" r="12" class="node-output" />
      <text x="300" y="240" text-anchor="middle" class="label" style="font-size: 12px;">Output</text>
    </g>
  </g>
  
  <!-- Connections -->
  <g class="anim-fade" style="animation-delay: 0.3s; opacity: 0;">
    <!-- Input to Hidden -->
    <line x1="72" y1="120" x2="168" y2="120" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="120" x2="168" y2="160" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="120" x2="168" y2="200" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="120" x2="168" y2="240" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="160" x2="168" y2="120" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="160" x2="168" y2="160" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="160" x2="168" y2="200" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="160" x2="168" y2="240" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="200" x2="168" y2="120" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="200" x2="168" y2="160" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="200" x2="168" y2="200" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="200" x2="168" y2="240" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="240" x2="168" y2="120" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="240" x2="168" y2="160" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="240" x2="168" y2="200" stroke="#bdc3c7" stroke-width="1" />
    <line x1="72" y1="240" x2="168" y2="240" stroke="#bdc3c7" stroke-width="1" />
    
    <!-- Hidden to Output -->
    <line x1="192" y1="120" x2="288" y2="160" stroke="#bdc3c7" stroke-width="1" />
    <line x1="192" y1="120" x2="288" y2="200" stroke="#bdc3c7" stroke-width="1" />
    <line x1="192" y1="160" x2="288" y2="160" stroke="#bdc3c7" stroke-width="1" />
    <line x1="192" y1="160" x2="288" y2="200" stroke="#bdc3c7" stroke-width="1" />
    <line x1="192" y1="200" x2="288" y2="160" stroke="#bdc3c7" stroke-width="1" />
    <line x1="192" y1="200" x2="288" y2="200" stroke="#bdc3c7" stroke-width="1" />
    <line x1="192" y1="240" x2="288" y2="160" stroke="#bdc3c7" stroke-width="1" />
    <line x1="192" y1="240" x2="288" y2="200" stroke="#bdc3c7" stroke-width="1" />
  </g>
  
  <!-- Forward Pass Arrow -->
  <g class="anim-slide-left" style="animation-delay: 0.8s; opacity: 0;">
    <path d="M 90 310 Q 150 300, 170 310" class="forward-arrow" />
    <polygon points="170,305 178,310 170,315" class="arrow-head" />
    <text x="130" y="325" text-anchor="middle" class="label" style="fill: #4CAF50; font-size: 11px;">Forward Pass</text>
  </g>
  
  <!-- Backward Pass Arrow -->
  <g class="anim-slide-right" style="animation-delay: 1s; opacity: 0;">
    <path d="M 270 310 Q 250 300, 230 310" class="backward-arrow" />
    <polygon points="230,305 222,310 230,315" class="arrow-head-back" />
    <text x="265" y="325" text-anchor="middle" class="label" style="fill: #f44336; font-size: 11px;">Backward Pass</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <!-- Forward Propagation Box -->
  <g class="anim-fade" style="animation-delay: 0.5s; opacity: 0;">
    <rect x="330" y="85" width="80" height="55" class="box" />
    <text x="370" y="100" text-anchor="middle" class="label" style="font-size: 11px;">1. Forward Pass</text>
    <text x="370" y="115" text-anchor="middle" class="detail">Input → Hidden</text>
    <text x="370" y="128" text-anchor="middle" class="detail">Calculate output</text>
    <rect x="370" y="132" width="40" height="2" fill="#4CAF50" />
  </g>
  
  <!-- Error Calculation Box -->
  <g class="anim-fade" style="animation-delay: 0.7s; opacity: 0;">
    <rect x="330" y="145" width="80" height="55" class="box" />
    <text x="370" y="160" text-anchor="middle" class="label" style="font-size: 11px;">2. Error Calc</text>
    <text x="370" y="175" text-anchor="middle" class="detail">Compare output</text>
    <text x="370" y="188" text-anchor="middle" class="detail">with target</text>
    <rect x="370" y="192" width="40" height="2" fill="#e67e22" />
  </g>
  
  <!-- Backpropagation Box -->
  <g class="anim-fade" style="animation-delay: 0.9s; opacity: 0;">
    <rect x="330" y="205" width="80" height="55" class="box" />
    <text x="370" y="220" text-anchor="middle" class="label" style="font-size: 11px;">3. Backprop</text>
    <text x="370" y="235" text-anchor="middle" class="detail">Chain rule</text>
    <text x="370" y="248" text-anchor="middle" class="detail">gradients</text>
    <rect x="370" y="252" width="40" height="2" fill="#f44336" />
  </g>
  
  <!-- Weight Update Box -->
  <g class="anim-fade" style="animation-delay: 1.1s; opacity: 0;">
    <rect x="330" y="265" width="80" height="55" class="box" />
    <text x="370" y="280" text-anchor="middle" class="label" style="font-size: 11px;">4. Update Weights</text>
    <text x="370" y="295" text-anchor="middle" class="detail">W = W - η×∂L/∂W</text>
    <text x="370" y="308" text-anchor="middle" class="detail">Learning rate η</text>
    <rect x="370" y="312" width="40" height="2" fill="#9b59b6" />
  </g>
  
  <!-- Loss Function Indicator -->
  <g class="anim-fade" style="animation-delay: 1.3s; opacity: 0;">
    <rect x="10" y="310" width="55" height="40" class="box" />
    <text x="37" y="325" text-anchor="middle" class="label" style="font-size: 10px;">Loss</text>
    <text x="37" y="340" text-anchor="middle" class="detail" style="font-size: 9px;">MSE or</text>
    <text x="37" y="352" text-anchor="middle" class="detail" style="font-size: 9px;">Cross-Entropy</text>
  </g>
  
  <!-- Weight Update Symbol -->
  <g class="anim-pulse" style="animation-delay: 1.5s;">
    <text x="385" y="370" text-anchor="middle" class="detail" style="font-size: 10px;">⊖ = minus</text>
  </g>
  
  <!-- Data Narration Elements -->
  <g data-narration="The input layer receives raw data features that feed into the network for processing">
    <title>Input Layer: Receives raw data features</title>
  </g>
  <g data-narration="Hidden layers apply transformations through weighted connections and activation functions">
    <title>Hidden Layers: Apply transformations</title>
  </g>
  <g data-narration="Output layer produces the final prediction or classification result">
    <title>Output Layer: Produces predictions</title>
  </g>
  <g data-narration="Forward pass computes network output by propagating inputs through layers">
    <title>Forward Pass: Computes output</title>
  </g>
  <g data-narration="Backward pass calculates gradients using chain rule to measure error contribution">
    <title>Backward Pass: Calculates gradients</title>
  </g>
  <g data-narration="Weight update adjusts parameters in direction that reduces loss using learning rate">
    <title>Weight Update: Adjusts parameters</title>
  </g>
</svg>