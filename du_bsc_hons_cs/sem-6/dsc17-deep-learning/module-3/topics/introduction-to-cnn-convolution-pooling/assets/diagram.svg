<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="introduction-to-cnn-convolution-pooling">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#d4e9f7"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="layerGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff8080"/>
    </linearGradient>
    <linearGradient id="layerGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#7dcea0"/>
    </linearGradient>
    <linearGradient id="layerGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="layerGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba"/>
      <stop offset="100%" style="stop-color:#f9d56e"/>
    </linearGradient>
    <linearGradient id="layerGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0b3ff"/>
      <stop offset="100%" style="stop-color:#a569bd"/>
    </linearGradient>
    <linearGradient id="layerGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd9b3"/>
      <stop offset="100%" style="stop-color:#ff9f43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .box { rx: 8; ry: 8; stroke: #666; stroke-width: 1; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 5,3; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box1-anim { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2-anim { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3-anim { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4-anim { animation: slideInRight 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5-anim { animation: slideInRight 0.6s ease-out 1.0s forwards; opacity: 0; }
    .box6-anim { animation: slideInRight 0.6s ease-out 1.2s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">CNN Architecture</text>
  <text x="210" y="50" text-anchor="middle" class="detail title-anim">Convolution &amp; Pooling Overview</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Box 1: Input Image -->
  <g class="box1-anim" data-narration="Input Image: The CNN receives a 3-channel image (e.g., 224×224×3 for RGB) as the initial input. Each pixel contains color intensity values.">
    <rect x="20" y="70" width="70" height="70" fill="url(#layerGradient1)" class="box pulse-anim" filter="url(#shadow)"/>
    <rect x="28" y="78" width="18" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect x="48" y="78" width="18" height="18" fill="#ddd" stroke="#333" stroke-width="1"/>
    <rect x="68" y="78" width="18" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect x="28" y="98" width="18" height="18" fill="#ddd" stroke="#333" stroke-width="1"/>
    <rect x="48" y="98" width="18" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect x="68" y="98" width="18" height="18" fill="#ddd" stroke="#333" stroke-width="1"/>
    <rect x="28" y="118" width="18" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect x="48" y="118" width="18" height="18" fill="#ddd" stroke="#333" stroke-width="1"/>
    <rect x="68" y="118" width="18" height="18" fill="#fff" stroke="#333" stroke-width="1"/>
    <text x="55" y="160" text-anchor="middle" class="label">Input</text>
    <text x="55" y="172" text-anchor="middle" class="detail">224×224×3</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="95" y1="105" x2="125" y2="105" class="arrow" style="animation: drawArrow 0.5s ease-out 0.8s forwards; stroke-dasharray: 50; stroke-dashoffset: 50;"/>
  
  <!-- Box 2: Convolutional Layer -->
  <g class="box2-anim" data-narration="Convolutional Layer: Filters (kernels) slide over the input to detect local features like edges, textures, and patterns. Creates feature maps through convolution operation.">
    <rect x="130" y="70" width="70" height="70" fill="url(#layerGradient2)" class="box" filter="url(#shadow)"/>
    <line x1="140" y1="85" x2="190" y2="85" stroke="#2e7d32" stroke-width="2"/>
    <line x1="140" y1="95" x2="190" y2="95" stroke="#2e7d32" stroke-width="2"/>
    <line x1="140" y1="105" x2="190" y2="105" stroke="#2e7d32" stroke-width="2"/>
    <line x1="140" y1="115" x2="190" y2="115" stroke="#2e7d32" stroke-width="2"/>
    <line x1="140" y1="125" x2="190" y2="125" stroke="#2e7d32" stroke-width="2"/>
    <line x1="155" y1="75" x2="155" y2="135" stroke="#2e7d32" stroke-width="2"/>
    <line x1="165" y1="75" x2="165" y2="135" stroke="#2e7d32" stroke-width="2"/>
    <line x1="175" y1="75" x2="175" y2="135" stroke="#2e7d32" stroke-width="2"/>
    <text x="165" y="160" text-anchor="middle" class="label">Conv</text>
    <text x="165" y="172" text-anchor="middle" class="detail">Feature Maps</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="205" y1="105" x2="235" y2="105" class="arrow" style="animation: drawArrow 0.5s ease-out 1.0s forwards; stroke-dasharray: 50; stroke-dashoffset: 50;"/>
  
  <!-- Box 3: ReLU Activation -->
  <g class="box3-anim" data-narration="ReLU Activation: Applies the Rectified Linear Unit function f(x) = max(0,x) to introduce non-linearity, helping the network learn complex patterns.">
    <rect x="240" y="70" width="60" height="70" fill="url(#layerGradient3)" class="box" filter="url(#shadow)"/>
    <text x="270" y="100" text-anchor="middle" class="label" font-size="14">f(x)</text>
    <text x="270" y="115" text-anchor="middle" class="detail">max(0,x)</text>
    <path d="M255 130 Q270 145 285 130" fill="none" stroke="#2980b9" stroke-width="2"/>
    <text x="270" y="160" text-anchor="middle" class="label">ReLU</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="305" y1="105" x2="335" y2="105" class="arrow" style="animation: drawArrow 0.5s ease-out 1.2s forwards; stroke-dasharray: 50; stroke-dashoffset: 50;"/>
  
  <!-- Box 4: Pooling Layer -->
  <g class="box4-anim" data-narration="Pooling Layer: Reduces spatial dimensions (width, height) while retaining important features. Max pooling takes the maximum value in each window.">
    <rect x="340" y="70" width="70" height="70" fill="url(#layerGradient4)" class="box" filter="url(#shadow)"/>
    <rect x="350" y="80" width="20" height="20" fill="#f4d03f" stroke="#d4ac0d" stroke-width="1"/>
    <text x="360" y="93" text-anchor="middle" class="detail" font-size="9">9</text>
    <rect x="375" y="80" width="20" height="20" fill="#f4d03f" stroke="#d4ac0d" stroke-width="1"/>
    <text x="385" y="93" text-anchor="middle" class="detail" font-size="9">3</text>
    <rect x="350" y="105" width="20" height="20" fill="#f4d03f" stroke="#d4ac0d" stroke-width="1"/>
    <text x="360" y="118" text-anchor="middle" class="detail" font-size="9">5</text>
    <rect x="375" y="105" width="20" height="20" fill="#f4d03f" stroke="#d4ac0d" stroke-width="1"/>
    <text x="385" y="118" text-anchor="middle" class="detail" font-size="9">2</text>
    <text x="375" y="160" text-anchor="middle" class="label">Pooling</text>
    <text x="375" y="172" text-anchor="middle" class="detail">Max/Average</text>
  </g>
  
  <!-- Arrow 4 (down) -->
  <line x1="375" y1="145" x2="375" y2="185" class="arrow" style="animation: drawArrow 0.5s ease-out 1.4s forwards; stroke-dasharray: 50; stroke-dashoffset: 50;"/>
  
  <!-- Box 5: Fully Connected -->
  <g class="box5-anim" data-narration="Fully Connected Layer: Flattens features and connects every neuron to the previous layer. Combines features for final classification.">
    <rect x="320" y="190" width="110" height="50" fill="url(#layerGradient5)" class="box" filter="url(#shadow)"/>
    <circle cx="345" cy="215" r="8" fill="#8e44ad"/>
    <circle cx="375" cy="215" r="8" fill="#9b59b6"/>
    <circle cx="405" cy="215" r="8" fill="#8e44ad"/>
    <line x1="353" y1="215" x2="367" y2="215" stroke="#666" stroke-width="1"/>
    <line x1="383" y1="215" x2="397" y2="215" stroke="#666" stroke-width="1"/>
    <text x="375" y="260" text-anchor="middle" class="label">Fully Connected</text>
  </g>
  
  <!-- Arrow 5 -->
  <line x1="375" y1="245" x2="375" y2="275" class="arrow" style="animation: drawArrow 0.5s ease-out 1.6s forwards; stroke-dasharray: 50; stroke-dashoffset: 50;"/>
  
  <!-- Box 6: Output -->
  <g class="box6-anim" data-narration="Output Layer: Produces class scores (probabilities) for classification. Typically uses softmax for multi-class problems.">
    <rect x="320" y="280" width="110" height="50" fill="url(#layerGradient6)" class="box pulse-anim" filter="url(#shadow)"/>
    <rect x="330" y="295" width="30" height="20" fill="#fff" stroke="#e67e22" stroke-width="1"/>
    <text x="345" y="308" text-anchor="middle" class="detail">0.85</text>
    <rect x="365" y="295" width="30" height="20" fill="#fff" stroke="#e67e22" stroke-width="1"/>
    <text x="380" y="308" text-anchor="middle" class="detail">0.12</text>
    <rect x="400" y="295" width="20" height="20" fill="#fff" stroke="#e67e22" stroke-width="1"/>
    <text x="410" y="308" text-anchor="middle" class="detail">0.03</text>
    <text x="375" y="345" text-anchor="middle" class="label">Output</text>
    <text x="375" y="357" text-anchor="middle" class="detail">Class Scores</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key concepts: Convolution detects local patterns with shared weights. Pooling reduces dimensions while preserving important features. Together they enable efficient hierarchical feature learning.">
    <rect x="20" y="345" width="130" height="45" fill="#fff" stroke="#aaa" stroke-width="1" rx="5"/>
    <text x="85" y="360" text-anchor="middle" class="label" font-size="11">Key Concepts</text>
    <text x="85" y="375" text-anchor="middle" class="detail">• Conv: Local patterns</text>
    <text x="85" y="385" text-anchor="middle" class="detail">• Pooling: Reduce size</text>
  </g>
  
  <!-- Process arrows indication -->
  <g opacity="0.7">
    <path d="M20 55 Q210 45 400 55" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="210" y="48" text-anchor="middle" class="detail" font-size="9">Spatial Feature Learning →</text>
  </g>
</svg>