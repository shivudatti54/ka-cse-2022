<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="training-cnns-hyperparameter-optimization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#6cb890"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b8d4"/>
      <stop offset="100%" style="stop-color:#d48aaf"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a9bc4"/>
      <stop offset="100%" style="stop-color:#6cb890"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .box2 { animation: slideInRight 0.6s ease-out 0.3s both; }
    .box3 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .formula { animation: fadeIn 0.8s ease-out 0.5s both; }
    .arrow-anim { animation: pulse 2s ease-in-out infinite; }
    .pulse-box { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 14px; font-weight: bold; fill: #fff; }
    .detail { font-size: 12px; fill: #fff; }
    .formula-text { font-size: 11px; fill: #2c3e50; font-family: 'Courier New', monospace; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text">Training CNNs &amp; Hyperparameter</text>
  <text x="210" y="50" text-anchor="middle" class="title title-text" style="font-size:16px">Optimization</text>
  
  <!-- Section 1: Training Process -->
  <g class="box1">
    <rect x="15" y="70" width="130" height="130" rx="8" fill="url(#boxGradient1)" class="pulse-box" data-narration="Training CNNs involves forward propagation where input images pass through layers, producing predictions that are compared with ground truth using loss functions"/>
    <text x="80" y="90" text-anchor="middle" class="label">Training CNNs</text>
    <text x="80" y="110" text-anchor="middle" class="detail">Forward Pass</text>
    <text x="80" y="128" text-anchor="middle" class="detail">↓</text>
    <text x="80" y="145" text-anchor="middle" class="detail">Loss Calculation</text>
    <text x="80" y="163" text-anchor="middle" class="detail">↓</text>
    <text x="80" y="180" text-anchor="middle" class="detail">Backpropagation</text>
    <text x="80" y="195" text-anchor="middle" class="detail">→ Weight Update</text>
  </g>
  
  <!-- Section 2: Hyperparameter Optimization Methods -->
  <g class="box2">
    <rect x="155" y="70" width="130" height="130" rx="8" fill="url(#boxGradient2)" class="pulse-box" data-narration="Hyperparameter optimization includes Grid Search (exhaustive search), Random Search (random sampling), and Bayesian Optimization (probabilistic model-based)"/>
    <text x="220" y="90" text-anchor="middle" class="label">Hyperparameter</text>
    <text x="220" y="108" text-anchor="middle" class="label">Optimization</text>
    <text x="220" y="130" text-anchor="middle" class="detail" fill="#2c5a35">• Grid Search</text>
    <text x="220" y="150" text-anchor="middle" class="detail" fill="#2c5a35">• Random Search</text>
    <text x="220" y="170" text-anchor="middle" class="detail" fill="#2c5a35">• Bayesian Opt.</text>
    <text x="220" y="190" text-anchor="middle" class="detail" fill="#2c5a35">→ Better Model</text>
  </g>
  
  <!-- Section 3: Formulas -->
  <g class="formula">
    <rect x="15" y="210" width="185" height="85" rx="8" fill="#fff" stroke="#7eb8da" stroke-width="2" data-narration="Key formulas: Cross-entropy loss for classification and gradient descent weight update rule"/>
    <text x="108" y="230" text-anchor="middle" style="font-size:13px;font-weight:bold;fill:#2c3e50">Loss Function</text>
    <text x="108" y="252" text-anchor="middle" class="formula-text">L = -Σ(y_true × log(y_pred))</text>
    <text x="108" y="272" text-anchor="middle" style="font-size:13px;font-weight:bold;fill:#2c3e50">Weight Update</text>
    <text x="108" y="290" text-anchor="middle" class="formula-text">w(t+1) = w(t) - η × ∂L/∂w</text>
  </g>
  
  <!-- Section 4: Optimization Algorithms -->
  <g class="box3">
    <rect x="210" y="210" width="185" height="85" rx="8" fill="url(#boxGradient3)" data-narration="SGD updates parameters using mini-batches, introducing noise that helps escape local minima for better convergence"/>
    <text x="302" y="230" text-anchor="middle" class="label">Optimization</text>
    <text x="302" y="252" text-anchor="middle" class="detail">SGD (Stochastic</text>
    <text x="302" y="270" text-anchor="middle" class="detail">Gradient Descent)</text>
    <text x="302" y="290" text-anchor="middle" class="detail">Mini-batches + Noise</text>
  </g>
  
  <!-- Connection Arrow between Training and Hyperparameter -->
  <g class="arrow-anim">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#5a9bc4"/>
      </marker>
    </defs>
    <line x1="145" y1="135" x2="155" y2="135" stroke="#5a9bc4" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Circular relationship arrow -->
  <g>
    <path d="M 80 205 Q 80 220 108 225 Q 220 225 220 205" fill="none" stroke="#d48aaf" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="150" y="222" text-anchor="middle" style="font-size:10px;fill:#d48aaf">Iterative Process</text>
  </g>
  
  <!-- Bottom section: Key Learning Points -->
  <g class="formula">
    <rect x="15" y="305" width="380" height="80" rx="8" fill="#fff" stroke="#c2dce8" stroke-width="2" data-narration="Essential concepts: CNNs learn through backpropagation to minimize prediction errors, while hyperparameter tuning ensures optimal model performance without overfitting"/>
    <text x="205" y="325" text-anchor="middle" style="font-size:13px;font-weight:bold;fill:#2c3e50">Key Learning Points</text>
    <text x="25" y="345" style="font-size:11px;fill:#34495e">• CNN training uses backpropagation with gradient descent</text>
    <text x="25" y="362" style="font-size:11px;fill:#34495e">• Learning rate (η) controls weight update magnitude</text>
    <text x="25" y="379" style="font-size:11px;fill:#34495e">• Hyperparameter optimization prevents overfitting</text>
  </g>
</svg>