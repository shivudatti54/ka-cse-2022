<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="deep-cnns-lenet-alexnet">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="layerGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="layerGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8fd4"/>
      <stop offset="100%" style="stop-color:#7a6bb8"/>
    </linearGradient>
    <linearGradient id="layerGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd4a0"/>
      <stop offset="100%" style="stop-color:#5ab882"/>
    </linearGradient>
    <linearGradient id="fcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a87a"/>
      <stop offset="100%" style="stop-color:#d88a5a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { font-family: 'Arial', sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .subtitle { font-family: 'Arial', sans-serif; font-size: 12px; fill: #5d6d7e; }
    .layer-label { font-family: 'Arial', sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; }
    .dim-label { font-family: 'Arial', sans-serif; font-size: 9px; fill: #333; }
    .concept-box { font-family: 'Arial', sans-serif; font-size: 10px; fill: #34495e; }
    .arrow { stroke: #5d6d7e; stroke-width: 2; fill: none; stroke-dasharray: 8,4; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .layer1-anim { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .layer2-anim { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .layer3-anim { animation: slideInLeft 0.6s ease-out 0.6s forwards; opacity: 0; }
    .layer4-anim { animation: slideInLeft 0.6s ease-out 0.8s forwards; opacity: 0; }
    .layer5-anim { animation: slideInLeft 0.6s ease-out 1.0s forwards; opacity: 0; }
    .layer6-anim { animation: slideInLeft 0.6s ease-out 1.2s forwards; opacity: 0; }
    .layer7-anim { animation: slideInLeft 0.6s ease-out 1.4s forwards; opacity: 0; }
    .concept-anim { animation: fadeIn 0.8s ease-out 1.6s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .title-container { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title-container" data-narration="Introduction to Deep CNNs: LeNet and AlexNet foundational architectures">
    <text x="210" y="28" text-anchor="middle" class="title">Deep CNNs: LeNet-5 &amp; AlexNet</text>
    <text x="210" y="44" text-anchor="middle" class="subtitle">Foundational Architectures in Computer Vision</text>
    <line x1="80" y1="52" x2="340" y2="52" stroke="#7eb8da" stroke-width="2"/>
  </g>
  
  <!-- LeNet-5 Architecture Diagram -->
  <g transform="translate(20, 70)" data-narration="LeNet-5 Architecture: 7 layers from input to output">
    
    <!-- Input Layer -->
    <g class="layer1-anim" data-narration="Input layer: 32x32 grayscale image">
      <rect x="0" y="0" width="55" height="55" rx="4" fill="#a8d4e6" stroke="#5a9bc4" stroke-width="2" filter="url(#shadow)"/>
      <text x="27.5" y="20" text-anchor="middle" class="layer-label" fill="#2c3e50">INPUT</text>
      <text x="27.5" y="38" text-anchor="middle" class="dim-label">32×32×1</text>
    </g>
    
    <!-- Arrow 1 -->
    <g class="pulse-anim">
      <path d="M 65 27 L 85 27" class="arrow"/>
      <polygon points="85,22 95,27 85,32" fill="#5d6d7e"/>
    </g>
    
    <!-- Conv1 Layer -->
    <g class="layer2-anim" data-narration="Convolutional Layer 1: 6 filters of 5x5, output 28x28x6">
      <rect x="95" y="0" width="55" height="55" rx="4" fill="url(#layerGradient1)" filter="url(#shadow)"/>
      <text x="122.5" y="20" text-anchor="middle" class="layer-label">CONV1</text>
      <text x="122.5" y="36" text-anchor="middle" class="dim-label" fill="#fff">6 filters</text>
      <text x="122.5" y="46" text-anchor="middle" class="dim-label" fill="#e8f4f8">5×5</text>
      <text x="122.5" y="52" text-anchor="middle" class="dim-label">28×28×6</text>
    </g>
    
    <!-- Arrow 2 -->
    <g class="pulse-anim">
      <path d="M 160 27 L 180 27" class="arrow"/>
      <polygon points="180,22 190,27 180,32" fill="#5d6d7e"/>
    </g>
    
    <!-- AvgPool1 Layer -->
    <g class="layer3-anim" data-narration="Average Pooling 1: 2x2 stride 2, reduces spatial dimensions">
      <rect x="190" y="0" width="55" height="55" rx="4" fill="url(#layerGradient2)" filter="url(#shadow)"/>
      <text x="217.5" y="20" text-anchor="middle" class="layer-label">AVGPOOL1</text>
      <text x="217.5" y="36" text-anchor="middle" class="dim-label" fill="#fff">2×2</text>
      <text x="217.5" y="46" text-anchor="middle" class="dim-label" fill="#e8f4f8">stride 2</text>
      <text x="217.5" y="54" text-anchor="middle" class="dim-label">14×14×6</text>
    </g>
    
    <!-- Arrow 3 -->
    <g class="pulse-anim">
      <path d="M 255 27 L 275 27" class="arrow"/>
      <polygon points="275,22 285,27 275,32" fill="#5d6d7e"/>
    </g>
    
    <!-- Conv2 Layer -->
    <g class="layer4-anim" data-narration="Convolutional Layer 2: 16 filters of 5x5, output 10x10x16">
      <rect x="285" y="0" width="55" height="55" rx="4" fill="url(#layerGradient1)" filter="url(#shadow)"/>
      <text x="312.5" y="20" text-anchor="middle" class="layer-label">CONV2</text>
      <text x="312.5" y="36" text-anchor="middle" class="dim-label" fill="#fff">16 filters</text>
      <text x="312.5" y="46" text-anchor="middle" class="dim-label" fill="#e8f4f8">5×5</text>
      <text x="312.5" y="54" text-anchor="middle" class="dim-label">10×10×16</text>
    </g>
    
    <!-- Arrow 4 -->
    <g class="pulse-anim">
      <path d="M 350 27 L 370 27" class="arrow"/>
      <polygon points="370,22 380,27 370,32" fill="#5d6d7e"/>
    </g>
    
    <!-- AvgPool2 Layer -->
    <g class="layer5-anim" data-narration="Average Pooling 2: 2x2 stride 2, output 5x5x16">
      <rect x="20" y="75" width="55" height="55" rx="4" fill="url(#layerGradient2)" filter="url(#shadow)"/>
      <text x="47.5" y="95" text-anchor="middle" class="layer-label">AVGPOOL2</text>
      <text x="47.5" y="111" text-anchor="middle" class="dim-label" fill="#fff">2×2</text>
      <text x="47.5" y="121" text-anchor="middle" class="dim-label" fill="#e8f4f8">stride 2</text>
      <text x="47.5" y="130" text-anchor="middle" class="dim-label">5×5×16</text>
    </g>
    
    <!-- Arrow 5 -->
    <g class="pulse-anim">
      <path d="M 85 102 L 105 102" class="arrow"/>
      <polygon points="105,97 115,102 105,107" fill="#5d6d7e"/>
    </g>
    
    <!-- FC1 Layer -->
    <g class="layer6-anim" data-narration="Fully Connected Layer 1: Flattens to 400 neurons, outputs 120">
      <rect x="115" y="75" width="55" height="55" rx="4" fill="url(#fcGradient)" filter="url(#shadow)"/>
      <text x="142.5" y="95" text-anchor="middle" class="layer-label">FC1</text>
      <text x="142.5" y="111" text-anchor="middle" class="dim-label" fill="#fff">400→120</text>
      <text x="142.5" y="125" text-anchor="middle" class="dim-label">neurons</text>
    </g>
    
    <!-- Arrow 6 -->
    <g class="pulse-anim">
      <path d="M 180 102 L 200 102" class="arrow"/>
      <polygon points="200,97 210,102 200,107" fill="#5d6d7e"/>
    </g>
    
    <!-- FC2/Output Layer -->
    <g class="layer7-anim" data-narration="Output Layer: Fully connected to 10 classes (digits 0-9)">
      <rect x="210" y="75" width="55" height="55" rx="4" fill="url(#layerGradient3)" filter="url(#shadow)"/>
      <text x="237.5" y="95" text-anchor="middle" class="layer-label">OUTPUT</text>
      <text x="237.5" y="111" text-anchor="middle" class="dim-label" fill="#fff">120→10</text>
      <text x="237.5" y="125" text-anchor="middle" class="dim-label">classes</text>
    </g>
    
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-anim" data-narration="Key CNN concepts: Convolution extracts features, Pooling reduces dimensions, FC combines features for classification">
    <rect x="15" y="230" width="390" height="75" rx="6" fill="#ffffff" stroke="#b8c5d0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="250" class="concept-box" font-weight="bold">Key Concepts:</text>
    <text x="30" y="268" class="concept-box">• Convolution: Extracts local features using learnable filters</text>
    <text x="30" y="283" class="concept-box">• Pooling: Reduces spatial size, adds translation invariance</text>
    <text x="30" y="298" class="concept-box">• FC Layers: Combines features for classification (softmax)</text>
  </g>
  
  <!-- Comparison Box: AlexNet -->
  <g class="concept-anim" data-narration="AlexNet (2012): Larger scale with 8 layers, ReLU activation, GPU training, won ImageNet 2012">
    <rect x="15" y="315" width="180" height="75" rx="6" fill="#fef3e2" stroke="#f0a87a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="335" class="concept-box" font-weight="bold" fill="#d88a5a">AlexNet (2012)</text>
    <text x="30" y="352" class="concept-box">8 layers, ReLU activation</text>
    <text x="30" y="367" class="concept-box">GPU training, ImageNet winner</text>
    <text x="30" y="382" class="concept-box">60M params vs LeNet's 60K</text>
  </g>
  
  <!-- Year/Origin Box -->
  <g class="concept-anim" data-narration="LeNet-5: Developed by Yann LeCun at Bell Labs in 1998 for handwritten digit recognition">
    <rect x="210" y="315" width="195" height="75" rx="6" fill="#e8f8f0" stroke="#7dd4a0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="335" class="concept-box" font-weight="bold" fill="#5ab882">LeNet-5 (1998)</text>
    <text x="225" y="352" class="concept-box">Yann LeCun, Bell Labs</text>
    <text x="225" y="367" class="concept-box">Handwritten digit recognition</text>
    <text x="225" y="382" class="concept-box">~60K parameters</text>
  </g>
  
</svg>