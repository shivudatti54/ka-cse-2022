<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="transfer-learning-pretrained-models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e8ff"/>
      <stop offset="100%" style="stop-color:#e8f0ff"/>
    </linearGradient>
    <linearGradient id="sourceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="targetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342"/>
      <stop offset="100%" style="stop-color:#558b2f"/>
    </linearGradient>
    <linearGradient id="modelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ab47bc"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .source-box { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .target-box { animation: slideInRight 0.6s ease-out 0.4s both; }
    .model-box { animation: fadeIn 0.8s ease-out 0.6s both; }
    .arrow-line { stroke-dasharray: 100; animation: drawArrow 1s ease-out 0.8s forwards; }
    .arrow-head { animation: fadeIn 0.3s ease-out 1s both; }
    .label { animation: fadeIn 0.5s ease-out; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" class="title">Transfer Learning</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666" class="title">Pretrained Models</text>
  
  <!-- Source Domain Box -->
  <g class="source-box" data-narration="Source Domain: Large dataset (e.g., ImageNet with millions of images) used to train the initial model">
    <rect x="20" y="80" width="120" height="100" rx="10" fill="url(#sourceGradient)" filter="url(#shadow)"/>
    <text x="80" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">SOURCE</text>
    <text x="80" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="white">DOMAIN</text>
    <rect x="35" y="140" width="90" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="35" y="152" width="70" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="35" y="164" width="80" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Pretrained Model Box -->
  <g class="model-box" data-narration="Pretrained Model: Neural network like VGG, ResNet, or BERT trained on source data">
    <rect x="150" y="95" width="120" height="70" rx="10" fill="url(#modelGradient)" filter="url(#shadow)"/>
    <text x="210" y="120" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">PRETRAINED</text>
    <text x="210" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="white">MODEL</text>
    <text x="210" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)">VGG16 | ResNet | BERT</text>
  </g>
  
  <!-- Target Domain Box -->
  <g class="target-box" data-narration="Target Domain: Smaller dataset specific to the new task (e.g., medical images, specific object detection)">
    <rect x="280" y="80" width="120" height="100" rx="10" fill="url(#targetGradient)" filter="url(#shadow)"/>
    <text x="340" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">TARGET</text>
    <text x="340" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="white">DOMAIN</text>
    <rect x="295" y="140" width="90" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="295" y="152" width="60" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
    <text x="340" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)">Limited Data</text>
  </g>
  
  <!-- Arrow from Source to Model -->
  <line x1="140" y1="130" x2="150" y2="130" stroke="#4a90d9" stroke-width="3" class="arrow-line"/>
  <polygon points="150,125 150,135 158,130" fill="#4a90d9" class="arrow-head"/>
  
  <!-- Arrow from Model to Target -->
  <line x1="270" y1="130" x2="280" y2="130" stroke="#7cb342" stroke-width="3" class="arrow-line"/>
  <polygon points="280,125 280,135 288,130" fill="#7cb342" class="arrow-head"/>
  
  <!-- Transfer Process Label -->
  <g class="label">
    <rect x="160" y="175" width="100" height="25" rx="5" fill="#ff9800" opacity="0.9"/>
    <text x="210" y="192" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">TRANSFER</text>
  </g>
  
  <!-- Knowledge Arrow with pulse -->
  <g class="pulse-anim float-anim">
    <path d="M 80 190 Q 80 230 150 250 Q 210 265 270 250 Q 340 230 340 190" fill="none" stroke="#e91e63" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="210" y="270" text-anchor="middle" font-family="Arial" font-size="10" fill="#e91e63" font-style="italic">Knowledge Transfer</text>
  </g>
  
  <!-- Fine-tuned Model Output -->
  <g class="model-box" data-narration="Fine-tuned Model: Adapted model achieving high performance on target task with less data and training time">
    <rect x="120" y="290" width="180" height="60" rx="10" fill="url(#modelGradient)" filter="url(#shadow)"/>
    <text x="210" y="315" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">FINE-TUNED MODEL</text>
    <text x="210" y="335" text-anchor="middle" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.9)">High Performance</text>
  </g>
  
  <!-- Benefits Box -->
  <g class="label" data-narration="Benefits: Faster training, less data needed, better performance on limited resources">
    <rect x="310" y="295" width="100" height="50" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
    <text x="360" y="315" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">BENEFITS</text>
    <text x="360" y="330" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">• Less Data</text>
    <text x="360" y="342" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">• Faster Training</text>
  </g>
  
  <!-- Connection line to output -->
  <line x1="210" y1="250" x2="210" y2="290" stroke="#ab47bc" stroke-width="2" stroke-dasharray="4,2" class="arrow-line"/>
  <polygon points="205,285 215,285 210,295" fill="#ab47bc" class="arrow-head"/>
  
  <!-- Legend/Key Concepts -->
  <g class="label">
    <rect x="20" y="355" width="380" height="35" rx="5" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="30" y="370" font-family="Arial" font-size="10" fill="#666">Key:</text>
    <circle cx="60" cy="367" r="4" fill="#4a90d9"/>
    <text x="68" y="370" font-family="Arial" font-size="9" fill="#555">Source</text>
    <circle cx="110" cy="367" r="4" fill="#ab47bc"/>
    <text x="118" y="370" font-family="Arial" font-size="9" fill="#555">Model</text>
    <circle cx="160" cy="367" r="4" fill="#7cb342"/>
    <text x="168" y="370" font-family="Arial" font-size="9" fill="#555">Target</text>
    <text x="210" y="370" font-family="Arial" font-size="9" fill="#e91e63" font-style="italic">→ Transfer Knowledge</text>
  </g>
</svg>