<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="difficulty-of-training-dnns">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c4dce8"/>
    </linearGradient>
    <linearGradient id="layerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9fd4"/>
      <stop offset="100%" style="stop-color:#3d7ab3"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes shrinkArrow {
      from { stroke-width: 6; }
      to { stroke-width: 2; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #34495e; }
    .small-label { font-family: Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .concept-box { fill: #fff; stroke: #b8d4e8; stroke-width: 2; rx: 8; }
    .concept-title { font-family: Arial, sans-serif; font-size: 14px; fill: #2980b9; font-weight: bold; }
    .concept-text { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .layer { fill: url(#layerGradient); rx: 6; }
    .arrow-backprop { stroke: #e74c3c; fill: none; stroke-linecap: round; }
    .gradient-label { font-family: Arial, sans-serif; font-size: 10px; fill: #c0392b; font-weight: bold; }
    
    .section-1 { animation: fadeIn 0.8s ease-out forwards; }
    .section-2 { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.7s forwards; opacity: 0; }
    .section-5 { animation: fadeIn 0.6s ease-out 0.9s forwards; opacity: 0; }
    
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-anim-1 { animation: fadeIn 0.5s ease-out 0.8s forwards, shrinkArrow 0.5s ease-out 0.8s forwards; opacity: 0; }
    .arrow-anim-2 { animation: fadeIn 0.5s ease-out 1.0s forwards; opacity: 0; }
    .arrow-anim-3 { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
    .arrow-anim-4 { animation: fadeIn 0.5s ease-out 1.4s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title section-1">Difficulty of Training DNNs</text>
  <text x="210" y="50" text-anchor="middle" class="label section-1" style="animation-delay: 0.2s">Vanishing Gradient Problem</text>
  
  <!-- Network Layers -->
  <g class="section-2">
    <!-- Input Layer -->
    <rect x="50" y="120" width="50" height="70" class="layer" filter="url(#shadow)"/>
    <text x="75" y="145" text-anchor="middle" class="label" fill="white" font-size="11">Input</text>
    <text x="75" y="160" text-anchor="middle" class="label" fill="white" font-size="11">Layer</text>
    
    <!-- Hidden Layer 1 -->
    <rect x="120" y="100" width="50" height="110" class="layer" filter="url(#shadow)"/>
    <text x="145" y="140" text-anchor="middle" class="label" fill="white" font-size="11">Hidden</text>
    <text x="145" y="155" text-anchor="middle" class="label" fill="white" font-size="11">Layer 1</text>
    
    <!-- Hidden Layer 2 -->
    <rect x="190" y="90" width="50" height="130" class="layer" filter="url(#shadow)"/>
    <text x="215" y="140" text-anchor="middle" class="label" fill="white" font-size="11">Hidden</text>
    <text x="215" y="155" text-anchor="middle" class="label" fill="white" font-size="11">Layer 2</text>
    
    <!-- Hidden Layer 3 -->
    <rect x="260" y="80" width="50" height="150" class="layer" filter="url(#shadow)"/>
    <text x="285" y="140" text-anchor="middle" class="label" fill="white" font-size="11">Hidden</text>
    <text x="285" y="155" text-anchor="middle" class="label" fill="white" font-size="11">Layer n</text>
    
    <!-- Output Layer -->
    <rect x="330" y="110" width="50" height="90" class="layer" filter="url(#shadow)"/>
    <text x="355" y="145" text-anchor="middle" class="label" fill="white" font-size="11">Output</text>
    <text x="355" y="160" text-anchor="middle" class="label" fill="white" font-size="11">Layer</text>
  </g>
  
  <!-- Forward Pass Arrows (top) -->
  <g class="section-2" style="animation-delay: 0.4s">
    <path d="M100 115 L120 115" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    <path d="M170 105 L190 105" stroke="#27ae60" stroke-width="2" fill="none"/>
    <path d="M240 95 L260 95" stroke="#27ae60" stroke-width="2" fill="none"/>
    <path d="M310 105 L330 105" stroke="#27ae60" stroke-width="2" fill="none"/>
    <text x="155" y="95" class="small-label" fill="#27ae60">Forward Pass →</text>
  </g>
  
  <!-- Backpropagation Arrows (decreasing size) -->
  <g class="section-3">
    <!-- Large arrow from output to hidden 3 -->
    <path d="M340 160 Q300 160 285 160" class="arrow-backprop arrow-anim-1" stroke-width="5" stroke-dasharray="100"/>
    <text x="300" y="175" class="gradient-label">∂L/∂ = 1.0</text>
    
    <!-- Smaller arrow from hidden 3 to hidden 2 -->
    <path d="M265 160 Q240 160 225 160" class="arrow-backprop arrow-anim-2" stroke-width="4"/>
    <text x="235" y="175" class="gradient-label">∂L/∂ = 0.5</text>
    
    <!-- Even smaller arrow from hidden 2 to hidden 1 -->
    <path d="M195 155 Q170 155 155 155" class="arrow-backprop arrow-anim-3" stroke-width="3"/>
    <text x="165" y="170" class="gradient-label">∂L/∂ = 0.25</text>
    
    <!-- Very small arrow from hidden 1 to input -->
    <path d="M125 150 Q100 150 90 150" class="arrow-backprop arrow-anim-4" stroke-width="2"/>
    <text x="100" y="165" class="gradient-label">∂L/∂ = 0.06</text>
    
    <text x="365" y="185" class="small-label" fill="#c0392b" font-weight="bold">Backprop →</text>
  </g>
  
  <!-- Key Concept Box 1 -->
  <g class="section-4" data-narration="vanishing-gradient-definition">
    <rect x="20" y="230" width="180" height="75" class="concept-box" filter="url(#shadow)"/>
    <text x="30" y="250" class="concept-title">Vanishing Gradient</text>
    <text x="30" y="268" class="concept-text">Gradient diminishes</text>
    <text x="30" y="282" class="concept-text">exponentially through</text>
    <text x="30" y="296" class="concept-text">layers during backprop.</text>
  </g>
  
  <!-- Key Concept Box 2 -->
  <g class="section-4" data-narration="impact-on-training" style="animation-delay: 0.2s">
    <rect x="210" y="230" width="180" height="75" class="concept-box" filter="url(#shadow)"/>
    <text x="220" y="250" class="concept-title">Impact on Training</text>
    <text x="220" y="268" class="concept-text">Early layers learn very</text>
    <text x="220" y="282" class="concept-text">slowly, limiting network</text>
    <text x="220" y="296" class="concept-text">depth effectiveness.</text>
  </g>
  
  <!-- Key Concept Box 3 -->
  <g class="section-5" data-narration="solutions">
    <rect x="80" y="315" width="260" height="50" class="concept-box" filter="url(#shadow)"/>
    <text x="210" y="335" class="concept-title" text-anchor="middle">Solutions: Proper Initialization, Batch Norm, ReLU Activation</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="370" r="4" fill="#b8d4e8" class="pulse-anim"/>
  <circle cx="370" cy="370" r="4" fill="#b8d4e8" class="pulse-anim" style="animation-delay: 0.5s"/>
  
  <!-- Formula representation -->
  <g class="section-5" style="animation-delay: 0.3s">
    <text x="210" y="380" text-anchor="middle" class="small-label" fill="#7f8c8d">Gradient signal: δⁿ ≈ σ'·W·δⁿ⁺¹ (multiplied through n layers)</text>
  </g>
</svg>