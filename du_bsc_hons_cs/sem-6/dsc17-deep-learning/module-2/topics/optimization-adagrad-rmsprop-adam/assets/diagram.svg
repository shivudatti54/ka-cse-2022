<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="optimization-adagrad-rmsprop-adam">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="contourGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2d5a6b;stop-opacity:0.1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    @keyframes pathSGD {
      0% { stroke-dashoffset: 300; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pathMomentum {
      0% { stroke-dashoffset: 300; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pathAdaGrad {
      0% { stroke-dashoffset: 300; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pathAdam {
      0% { stroke-dashoffset: 300; }
      100% { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .path-sgd { stroke-dasharray: 300; animation: pathSGD 3s linear forwards; }
    .path-momentum { stroke-dasharray: 300; animation: pathMomentum 3s ease-in-out 0.5s forwards; }
    .path-adagrad { stroke-dasharray: 300; animation: pathAdaGrad 3s ease-out 1s forwards; }
    .path-adam { stroke-dasharray: 300; animation: pathAdam 3s ease-out 1.5s forwards; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #2c3e50; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Adaptive Optimization Algorithms</text>
  <text x="210" y="46" text-anchor="middle" class="label fade-in" style="animation-delay: 0.2s">AdaGrad • RMSProp • Adam</text>
  
  <!-- Loss Landscape Contour -->
  <g class="landscape" transform="translate(30, 70)">
    <ellipse cx="150" cy="120" rx="130" ry="100" fill="url(#contourGradient)" stroke="#4a90a4" stroke-width="1" stroke-dasharray="4,2"/>
    <ellipse cx="150" cy="120" rx="100" ry="75" fill="none" stroke="#4a90a4" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    <ellipse cx="150" cy="120" rx="70" ry="50" fill="none" stroke="#4a90a4" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
    <ellipse cx="150" cy="120" rx="40" ry="30" fill="none" stroke="#4a90a4" stroke-width="1.5" opacity="0.4"/>
    <!-- Saddle point indicator -->
    <circle cx="80" cy="80" r="4" fill="#e74c3c" opacity="0.6"/>
    <text x="68" y="68" class="detail">saddle</text>
    <!-- Minimum -->
    <circle cx="150" cy="120" r="6" fill="#27ae60" class="pulse"/>
    <text x="158" y="124" class="detail">min</text>
  </g>
  
  <!-- Optimizer Paths -->
  <g transform="translate(30, 70)">
    <!-- SGD Path - oscillating -->
    <path d="M 30 30 Q 60 50 50 70 Q 40 90 70 100 Q 100 110 110 100 Q 120 90 130 110" 
          fill="none" stroke="#e67e22" stroke-width="2.5" stroke-linecap="round" class="path-sgd"/>
    
    <!-- Momentum Path - overshooting -->
    <path d="M 30 30 Q 80 20 120 50 Q 160 80 140 100 Q 120 120 145 115" 
          fill="none" stroke="#9b59b6" stroke-width="2.5" stroke-linecap="round" class="path-momentum"/>
    
    <!-- AdaGrad Path - fast start, slowing -->
    <path d="M 30 30 Q 70 60 100 85 Q 120 100 135 108 Q 142 114 146 117" 
          fill="none" stroke="#3498db" stroke-width="2.5" stroke-linecap="round" class="path-adagrad"/>
    
    <!-- Adam Path - adaptive, efficient -->
    <path d="M 30 30 Q 60 45 90 70 Q 115 95 135 108 Q 145 115 150 120" 
          fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round" class="path-adam"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(270, 80)" class="slide-in" style="animation-delay: 0.3s" data-narration="Legend showing color-coded optimizer paths">
    <rect x="0" y="0" width="130" height="130" rx="8" fill="white" filter="url(#shadow)" opacity="0.9"/>
    <text x="65" y="18" text-anchor="middle" class="box-title">Convergence Paths</text>
    <line x1="10" y1="35" x2="40" y2="35" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>
    <text x="50" y="39" class="label">SGD</text>
    <line x1="10" y1="55" x2="40" y2="55" stroke="#9b59b6" stroke-width="3" stroke-linecap="round"/>
    <text x="50" y="59" class="label">Momentum</text>
    <line x1="10" y1="75" x2="40" y2="75" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
    <text x="50" y="79" class="label">AdaGrad</text>
    <line x1="10" y1="95" x2="40" y2="95" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
    <text x="50" y="99" class="label">Adam</text>
  </g>
  
  <!-- Optimizer Info Boxes -->
  <g transform="translate(10, 200)" data-narration="AdaGrad algorithm explanation with decaying learning rate mechanism">
    <rect x="0" y="0" width="125" height="75" rx="6" fill="#d4e6f1" filter="url(#shadow)" class="slide-in" style="animation-delay: 0.4s"/>
    <text x="10" y="18" class="box-title" fill="#2980b9">AdaGrad</text>
    <text x="10" y="34" class="detail">Accumulates squared</text>
    <text x="10" y="46" class="detail">gradients → decaying LR</text>
    <text x="10" y="58" class="detail">Good for sparse</text>
    <text x="10" y="68" class="detail">features</text>
  </g>
  
  <g transform="translate(145, 200)" data-narration="RMSProp algorithm explanation with exponential moving average">
    <rect x="0" y="0" width="125" height="75" rx="6" fill="#e8daef" filter="url(#shadow)" class="slide-in" style="animation-delay: 0.5s"/>
    <text x="10" y="18" class="box-title" fill="#8e44ad">RMSProp</text>
    <text x="10" y="34" class="detail">Exponential moving</text>
    <text x="10" y="46" class="detail">average of squared</text>
    <text x="10" y="58" class="detail">gradients</text>
    <text x="10" y="68" class="detail">Adapts to gradient scale</text>
  </g>
  
  <g transform="translate(280, 200)" data-narration="Adam algorithm explanation combining momentum and adaptive learning rates">
    <rect x="0" y="0" width="125" height="75" rx="6" fill="#fadbd8" filter="url(#shadow)" class="slide-in" style="animation-delay: 0.6s"/>
    <text x="10" y="18" class="box-title" fill="#c0392b">Adam</text>
    <text x="10" y="34" class="detail">Momentum + adaptive</text>
    <text x="10" y="46" class="detail">learning rates</text>
    <text x="10" y="58" class="detail">Bias correction</text>
    <text x="10" y="68" class="detail">Most popular choice</text>
  </g>
  
  <!-- Key insight box -->
  <g transform="translate(10, 285)" data-narration="Key insight about adaptive learning rates">
    <rect x="0" y="0" width="395" height="50" rx="6" fill="#fff9e6" filter="url(#shadow)" class="slide-in" style="animation-delay: 0.7s"/>
    <text x="15" y="18" class="box-title" fill="#f39c12">Key Insight</text>
    <text x="15" y="34" class="detail">Adaptive methods adjust learning rates per-parameter based on gradient history,</text>
    <text x="15" y="46" class="detail">enabling faster convergence on ill-conditioned problems.</text>
  </g>
  
  <!-- Arrow relationships -->
  <g class="arrows" opacity="0.7">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#7f8c8d"/>
      </marker>
    </defs>
    <line x1="130" y1="275" x2="180" y2="275" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="265" y1="275" x2="315" y2="275" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Feature comparison -->
  <g transform="translate(150, 345)" data-narration="Feature comparison table of optimizers">
    <rect x="0" y="0" width="120" height="45" rx="4" fill="white" filter="url(#shadow)" opacity="0.85" class="slide-in" style="animation-delay: 0.8s"/>
    <text x="60" y="14" text-anchor="middle" class="label" font-weight="bold">Feature</text>
    <text x="20" y="28" class="detail">Adaptive LR</text>
    <text x="90" y="28" class="detail">Momentum</text>
    <line x1="60" y1="8" x2="60" y2="40" stroke="#ddd" stroke-width="1"/>
    <line x1="10" y1="20" x2="110" y2="20" stroke="#ddd" stroke-width="1"/>
  </g>
  
  <g transform="translate(280, 345)" class="slide-in" style="animation-delay: 0.9s">
    <rect x="0" y="0" width="120" height="45" rx="4" fill="white" filter="url(#shadow)" opacity="0.85"/>
    <text x="60" y="14" text-anchor="middle" class="label" font-weight="bold">Use Case</text>
    <text x="20" y="28" class="detail">NLP, Sparse data</text>
    <text x="90" y="28" class="detail">Deep networks</text>
    <line x1="60" y1="8" x2="60" y2="40" stroke="#ddd" stroke-width="1"/>
    <line x1="10" y1="20" x2="110" y2="20" stroke="#ddd" stroke-width="1"/>
  </g>
  
  <!-- Start point marker -->
  <g transform="translate(30, 70)">
    <circle cx="30" cy="30" r="5" fill="#2c3e50" class="pulse" style="animation-delay: 0s"/>
    <text x="30" y="18" text-anchor="middle" class="detail">start</text>
  </g>
</svg>