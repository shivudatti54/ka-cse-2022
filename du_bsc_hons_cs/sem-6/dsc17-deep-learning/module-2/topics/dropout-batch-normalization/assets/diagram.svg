<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dropout-batch-normalization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6f5"/>
      <stop offset="100%" style="stop-color:#e6f0f5"/>
    </linearGradient>
    <linearGradient id="neuronGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90c2"/>
    </linearGradient>
    <linearGradient id="droppedNeuronGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e57373"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <linearGradient id="outputNeuronGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dropPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .title { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Arial', sans-serif; font-size: 11px; fill: #555; }
    .concept-label { font-family: 'Arial', sans-serif; font-size: 10px; fill: #fff; }
    .neuron { animation: fadeIn 0.5s ease-out forwards; }
    .connection { animation: fadeIn 0.8s ease-out forwards; }
    .dropped { animation: dropPulse 1.5s ease-in-out infinite; }
    .section-box { animation: slideIn 0.6s ease-out forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Dropout &amp; Batch Normalization</text>
  
  <!-- Section 1: Standard Network -->
  <g data-narration="Standard neural network without dropout showing fully connected layers">
    <rect x="10" y="50" width="190" height="150" fill="#fff" stroke="#b0bec5" stroke-width="1" rx="5" filter="url(#shadow)" class="section-box"/>
    <text x="105" y="68" text-anchor="middle" class="label" style="font-weight:bold;font-size:12px;">Standard Network</text>
    
    <!-- Input Layer -->
    <g class="neuron" style="animation-delay: 0.1s">
      <circle cx="40" cy="90" r="8" fill="url(#neuronGradient)"/>
      <circle cx="40" cy="115" r="8" fill="url(#neuronGradient)"/>
      <circle cx="40" cy="140" r="8" fill="url(#neuronGradient)"/>
      <circle cx="40" cy="165" r="8" fill="url(#neuronGradient)"/>
    </g>
    
    <!-- Hidden Layer 1 -->
    <g class="neuron" style="animation-delay: 0.2s">
      <circle cx="100" cy="85" r="8" fill="url(#neuronGradient)"/>
      <circle cx="100" cy="105" r="8" fill="url(#neuronGradient)"/>
      <circle cx="100" cy="125" r="8" fill="url(#neuronGradient)"/>
      <circle cx="100" cy="145" r="8" fill="url(#neuronGradient)"/>
      <circle cx="100" cy="165" r="8" fill="url(#neuronGradient)"/>
    </g>
    
    <!-- Hidden Layer 2 -->
    <g class="neuron" style="animation-delay: 0.3s">
      <circle cx="155" cy="95" r="8" fill="url(#neuronGradient)"/>
      <circle cx="155" cy="120" r="8" fill="url(#neuronGradient)"/>
      <circle cx="155" cy="145" r="8" fill="url(#neuronGradient)"/>
      <circle cx="155" cy="170" r="8" fill="url(#neuronGradient)"/>
    </g>
    
    <!-- Output Layer -->
    <g class="neuron" style="animation-delay: 0.4s">
      <circle cx="185" cy="110" r="8" fill="url(#outputNeuronGradient)"/>
      <circle cx="185" cy="150" r="8" fill="url(#outputNeuronGradient)"/>
    </g>
    
    <!-- Connections -->
    <g class="connection" style="animation-delay: 0.3s">
      <line x1="48" y1="90" x2="92" y2="85" stroke="#b0bec5" stroke-width="1"/>
      <line x1="48" y1="90" x2="92" y2="105" stroke="#b0bec5" stroke-width="1"/>
      <line x1="48" y1="90" x2="92" y2="125" stroke="#b0bec5" stroke-width="1"/>
      <line x1="48" y1="115" x2="92" y2="85" stroke="#b0bec5" stroke-width="1"/>
      <line x1="48" y1="115" x2="92" y2="145" stroke="#b0bec5" stroke-width="1"/>
      <line x1="48" y1="140" x2="92" y2="105" stroke="#b0bec5" stroke-width="1"/>
      <line x1="48" y1="165" x2="92" y2="165" stroke="#b0bec5" stroke-width="1"/>
      <line x1="108" y1="85" x2="147" y2="95" stroke="#b0bec5" stroke-width="1"/>
      <line x1="108" y1="105" x2="147" y2="120" stroke="#b0bec5" stroke-width="1"/>
      <line x1="108" y1="125" x2="147" y2="145" stroke="#b0bec5" stroke-width="1"/>
      <line x1="108" y1="145" x2="147" y2="170" stroke="#b0bec5" stroke-width="1"/>
      <line x1="108" y1="165" x2="147" y2="95" stroke="#b0bec5" stroke-width="1"/>
      <line x1="163" y1="95" x2="177" y2="110" stroke="#b0bec5" stroke-width="1"/>
      <line x1="163" y1="120" x2="177" y2="110" stroke="#b0bec5" stroke-width="1"/>
      <line x1="163" y1="145" x2="177" y2="110" stroke="#b0bec5" stroke-width="1"/>
      <line x1="163" y1="95" x2="177" y2="150" stroke="#b0bec5" stroke-width="1"/>
      <line x1="163" y1="120" x2="177" y2="150" stroke="#b0bec5" stroke-width="1"/>
      <line x1="163" y1="170" x2="177" y2="150" stroke="#b0bec5" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Section 2: Network with Dropout -->
  <g data-narration="Network with dropout showing randomly dropped neurons (red) and broken connections">
    <rect x="215" y="50" width="195" height="150" fill="#fff" stroke="#b0bec5" stroke-width="1" rx="5" filter="url(#shadow)" class="section-box" style="animation-delay:0.2s"/>
    <text x="312" y="68" text-anchor="middle" class="label" style="font-weight:bold;font-size:12px;">With Dropout (p=0.5)</text>
    
    <!-- Input Layer -->
    <g class="neuron" style="animation-delay: 0.5s">
      <circle cx="250" cy="90" r="8" fill="url(#neuronGradient)"/>
      <circle cx="250" cy="115" r="8" fill="url(#droppedNeuronGradient)" class="dropped"/>
      <circle cx="250" cy="140" r="8" fill="url(#neuronGradient)"/>
      <circle cx="250" cy="165" r="8" fill="url(#droppedNeuronGradient)" class="dropped"/>
    </g>
    
    <!-- Hidden Layer 1 -->
    <g class="neuron" style="animation-delay: 0.6s">
      <circle cx="310" cy="85" r="8" fill="url(#droppedNeuronGradient)" class="dropped"/>
      <circle cx="310" cy="105" r="8" fill="url(#neuronGradient)"/>
      <circle cx="310" cy="125" r="8" fill="url(#droppedNeuronGradient)" class="dropped"/>
      <circle cx="310" cy="145" r="8" fill="url(#neuronGradient)"/>
      <circle cx="310" cy="165" r="8" fill="url(#neuronGradient)"/>
    </g>
    
    <!-- Hidden Layer 2 -->
    <g class="neuron" style="animation-delay: 0.7s">
      <circle cx="365" cy="95" r="8" fill="url(#neuronGradient)"/>
      <circle cx="365" cy="120" r="8" fill="url(#droppedNeuronGradient)" class="dropped"/>
      <circle cx="365" cy="145" r="8" fill="url(#neuronGradient)"/>
      <circle cx="365" cy="170" r="8" fill="url(#droppedNeuronGradient)" class="dropped"/>
    </g>
    
    <!-- Output Layer -->
    <g class="neuron" style="animation-delay: 0.8s">
      <circle cx="395" cy="110" r="8" fill="url(#outputNeuronGradient)"/>
      <circle cx="395" cy="150" r="8" fill="url(#outputNeuronGradient)"/>
    </g>
    
    <!-- Active Connections -->
    <g class="connection" style="animation-delay: 0.6s">
      <line x1="258" y1="90" x2="302" y2="105" stroke="#81c784" stroke-width="1"/>
      <line x1="258" y1="90" x2="302" y2="145" stroke="#81c784" stroke-width="1"/>
      <line x1="258" y1="90" x2="302" y2="165" stroke="#81c784" stroke-width="1"/>
      <line x1="258" y1="140" x2="302" y2="105" stroke="#81c784" stroke-width="1"/>
      <line x1="258" y1="140" x2="302" y2="145" stroke="#81c784" stroke-width="1"/>
      <line x1="258" y1="140" x2="302" y2="165" stroke="#81c784" stroke-width="1"/>
      <line x1="318" y1="105" x2="357" y2="95" stroke="#81c784" stroke-width="1"/>
      <line x1="318" y1="105" x2="357" y2="145" stroke="#81c784" stroke-width="1"/>
      <line x1="318" y1="145" x2="357" y2="95" stroke="#81c784" stroke-width="1"/>
      <line x1="318" y1="145" x2="357" y2="145" stroke="#81c784" stroke-width="1"/>
      <line x1="318" y1="165" x2="357" y2="95" stroke="#81c784" stroke-width="1"/>
      <line x1="318" y1="165" x2="357" y2="145" stroke="#81c784" stroke-width="1"/>
      <line x1="373" y1="95" x2="387" y2="110" stroke="#81c784" stroke-width="1"/>
      <line x1="373" y1="145" x2="387" y2="110" stroke="#81c784" stroke-width="1"/>
      <line x1="373" y1="95" x2="387" y2="150" stroke="#81c784" stroke-width="1"/>
      <line x1="373" y1="145" x2="387" y2="150" stroke="#81c784" stroke-width="1"/>
    </g>
    
    <!-- Dropped Connection Lines (crossed out) -->
    <g style="animation-delay: 0.7s">
      <line x1="258" y1="115" x2="302" y2="85" stroke="#e57373" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="258" y1="115" x2="302" y2="125" stroke="#e57373" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="258" y1="115" x2="302" y2="165" stroke="#e57373" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="258" y1="165" x2="302" y2="85" stroke="#e57373" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="258" y1="165" x2="302" y2="125" stroke="#e57373" stroke-width="1" stroke-dasharray="3,2"/>
    </g>
  </g>
  
  <!-- Key Concepts Box 1: Dropout -->
  <g data-narration="Key concept: Dropout randomly drops neurons during training to prevent overfitting">
    <rect x="10" y="215" width="195" height="55" fill="#5c6bc0" rx="5" filter="url(#shadow)" class="section-box" style="animation-delay:0.4s"/>
    <text x="20" y="232" class="concept-label" style="font-weight:bold;font-size:12px;">DROPOUT</text>
    <text x="20" y="248" class="concept-label" style="font-size:10px;">Randomly drops neurons (probability p)</text>
    <text x="20" y="260" class="concept-label" style="font-size:10px;">Prevents co-adaptation, reduces overfitting</text>
  </g>
  
  <!-- Key Concepts Box 2: Batch Norm -->
  <g data-narration="Key concept: Batch Normalization normalizes inputs to each layer">
    <rect x="215" y="215" width="195" height="55" fill="#26a69a" rx="5" filter="url(#shadow)" class="section-box" style="animation-delay:0.5s"/>
    <text x="225" y="232" class="concept-label" style="font-weight:bold;font-size:12px;">BATCH NORMALIZATION</text>
    <text x="225" y="248" class="concept-label" style="font-size:10px;">Normalizes layer inputs (μ=0, σ=1)</text>
    <text x="225" y="260" class="concept-label" style="font-size:10px;">Reduces internal covariate shift</text>
  </g>
  
  <!-- Batch Norm Visualization -->
  <g data-narration="Visual representation of batch normalization process">
    <rect x="10" y="280" width="195" height="110" fill="#fff" stroke="#b0bec5" stroke-width="1" rx="5" filter="url(#shadow)" class="section-box" style="animation-delay:0.6s"/>
    <text x="107" y="298" text-anchor="middle" class="label" style="font-weight:bold;font-size:12px;">Batch Normalization Process</text>
    
    <!-- Before normalization -->
    <g class="pulse-element">
      <circle cx="50" cy="330" r="12" fill="#ffcc80"/>
      <circle cx="80" cy="345" r="12" fill="#ffab91"/>
      <circle cx="65" cy="360" r="12" fill="#ffcc80"/>
      <text x="65" y="305" text-anchor="middle" class="label" style="font-size:10px;">Raw Inputs</text>
    </g>
    
    <!-- Arrow -->
    <path d="M 100 345 L 125 345" stroke="#78909c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="125,345 120,340 120,350" fill="#78909c"/>
    
    <!-- After normalization -->
    <g class="pulse-element" style="animation-delay: 0.5s">
      <circle cx="155" cy="330" r="10" fill="#81c784"/>
      <circle cx="175" cy="342" r="10" fill="#81c784"/>
      <circle cx="165" cy="358" r="10" fill="#81c784"/>
      <text x="165" y="305" text-anchor="middle" class="label" style="font-size:10px;">Normalized</text>
    </g>
    
    <!-- Formula -->
    <text x="107" y="378" text-anchor="middle" class="label" style="font-size:9px;font-style:italic;">x̂ = (x - μ) / √(σ² + ε)</text>
    <text x="107" y="388" text-anchor="middle" class="label" style="font-size:9px;">y = γx̂ + β (learnable params)</text>
  </g>
  
  <!-- Dropout Benefits -->
  <g data-narration="Benefits of using dropout in neural networks">
    <rect x="215" y="280" width="195" height="110" fill="#fff" stroke="#b0bec5" stroke-width="1" rx="5" filter="url(#shadow)" class="section-box" style="animation-delay:0.7s"/>
    <text x="312" y="298" text-anchor="middle" class="label" style="font-weight:bold;font-size:12px;">Why Use These Techniques?</text>
    
    <g style="animation-delay: 0.8s">
      <circle cx="235" cy="325" r="4" fill="#5c6bc0"/>
      <text x="245" y="328" class="label" style="font-size:10px;">Prevents overfitting</text>
      
      <circle cx="235" cy="345" r="4" fill="#5c6bc0"/>
      <text x="245" y="348" class="label" style="font-size:10px;">Faster training convergence</text>
      
      <circle cx="235" cy="365" r="4" fill="#26a69a"/>
      <text x="245" y="368" class="label" style="font-size:10px;">Allows higher learning rates</text>
      
      <circle cx="235" cy="385" r="4" fill="#26a69a"/>
      <text x="245" y="388" class="label" style="font-size:10px;">Acts as implicit ensemble</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g data-narration="Legend showing color coding for neurons and dropout">
    <rect x="310" y="50" width="100" height="35" fill="#fff" stroke="#e0e0e0" rx="3" opacity="0.9"/>
    <circle cx="320" cy="62" r="5" fill="url(#neuronGradient)"/>
    <text x="330" y="65" class="label" style="font-size:9px;">Active</text>
    <circle cx="320" cy="78" r="5" fill="url(#droppedNeuronGradient)"/>
    <text x="330" y="81" class="label" style="font-size:9px;">Dropped</text>
  </g>
</svg>