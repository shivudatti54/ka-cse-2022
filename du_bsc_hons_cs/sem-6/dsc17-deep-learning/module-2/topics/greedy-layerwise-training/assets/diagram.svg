<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="greedy-layerwise-training">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fineTuneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ab47bc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideInLeft 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideInRight 0.6s ease-out 0.8s forwards; opacity: 0; }
    .layer-block { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .layer-1 { animation: fadeIn 0.5s ease-out 0.3s forwards; opacity: 0; }
    .layer-2 { animation: fadeIn 0.5s ease-out 0.6s forwards; opacity: 0; }
    .layer-3 { animation: fadeIn 0.5s ease-out 0.9s forwards; opacity: 0; }
    .arrow-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawArrow 0.8s ease-out forwards; }
    .pulse-anim { transform-origin: center; animation: pulse 2s ease-in-out infinite; }
    .glow-anim { animation: glow 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Greedy Layerwise Training</text>
  
  <!-- Section 1: Input Data -->
  <g class="section-1" data-narration="The process begins with raw input data that needs to be processed through multiple layers">
    <rect x="20" y="60" width="100" height="35" rx="5" fill="#a8d5e5" stroke="#5c9cb8" stroke-width="1.5"/>
    <text x="70" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Input Data</text>
    <rect x="25" y="68" width="8" height="8" rx="1" fill="#5c9cb8" opacity="0.6"/>
    <rect x="37" y="68" width="8" height="8" rx="1" fill="#5c9cb8" opacity="0.6"/>
    <rect x="49" y="68" width="8" height="8" rx="1" fill="#5c9cb8" opacity="0.6"/>
    <rect x="61" y="68" width="8" height="8" rx="1" fill="#5c9cb8" opacity="0.6"/>
    <rect x="73" y="68" width="8" height="8" rx="1" fill="#5c9cb8" opacity="0.6"/>
    <rect x="85" y="68" width="8" height="8" rx="1" fill="#5c9cb8" opacity="0.6"/>
  </g>
  
  <!-- Arrow from input -->
  <line x1="120" y1="77" x2="145" y2="77" stroke="#5c9cb8" stroke-width="2" class="arrow-anim"/>
  <polygon points="140,77 145,74 145,80" fill="#5c9cb8"/>
  
  <!-- Layer 1: First Layer Training -->
  <g class="layer-1" data-narration="Layer 1 is trained first using unsupervised learning, treating it as an autoencoder">
    <rect x="145" y="55" width="80" height="45" rx="6" fill="url(#layerGradient1)" filter="url(#shadow)"/>
    <text x="185" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Layer 1</text>
    <text x="185" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" opacity="0.9">Unsupervised</text>
    <circle cx="185" cy="78" r="12" fill="none" stroke="#fff" stroke-width="1.5" class="pulse-anim"/>
  </g>
  
  <!-- Arrow between layers -->
  <line x1="225" y1="77" x2="250" y2="77" stroke="#5ba3c6" stroke-width="2" class="arrow-anim" style="animation-delay: 0.3s"/>
  <polygon points="245,77 250,74 250,80" fill="#5ba3c6"/>
  
  <!-- Layer 2: Second Layer Training -->
  <g class="layer-2" data-narration="Layer 2 is trained next, using the output of layer 1 as its input, continuing the greedy approach">
    <rect x="250" y="55" width="80" height="45" rx="6" fill="url(#layerGradient2)" filter="url(#shadow)"/>
    <text x="290" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Layer 2</text>
    <text x="290" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" opacity="0.9">Unsupervised</text>
    <circle cx="290" cy="78" r="12" fill="none" stroke="#fff" stroke-width="1.5" class="pulse-anim" style="animation-delay: 0.5s"/>
  </g>
  
  <!-- Arrow between layers -->
  <line x1="330" y1="77" x2="355" y2="77" stroke="#66bb6a" stroke-width="2" class="arrow-anim" style="animation-delay: 0.5s"/>
  <polygon points="350,77 355,74 355,80" fill="#66bb6a"/>
  
  <!-- Layer 3: Third Layer Training -->
  <g class="layer-3" data-narration="Layer 3 is trained similarly, building increasingly abstract representations">
    <rect x="355" y="55" width="55" height="45" rx="6" fill="url(#layerGradient3)" filter="url(#shadow)"/>
    <text x="382" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Layer 3</text>
    <text x="382" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" opacity="0.9">Unsupervised</text>
  </g>
  
  <!-- Key Concept Box: Greedy -->
  <g class="section-2" data-narration="The greedy approach means each layer is trained independently before combining them">
    <rect x="20" y="120" width="180" height="50" rx="5" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5" opacity="0.9"/>
    <text x="110" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f57f17">GREEDY APPROACH</text>
    <text x="110" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d4037">Train each layer separately</text>
    <text x="110" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d4037">before combining</text>
  </g>
  
  <!-- Arrow showing stacking -->
  <path d="M 110 170 Q 110 190 185 200" stroke="#78909c" stroke-width="2" fill="none" stroke-dasharray="5,3" class="arrow-anim" style="animation-delay: 0.6s"/>
  <polygon points="180,197 185,203 178,206" fill="#78909c"/>
  
  <!-- Stacked Layers Representation -->
  <g class="section-3" data-narration="After unsupervised pretraining, all layers are stacked together forming a deep network">
    <rect x="145" y="195" width="130" height="90" rx="4" fill="#eceff1" stroke="#b0bec5" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="210" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#546e7a">Stacked Network</text>
    
    <!-- Visual representation of stacked layers -->
    <rect x="155" y="222" width="110" height="15" rx="2" fill="#7ec8e3" opacity="0.8"/>
    <rect x="155" y="240" width="110" height="15" rx="2" fill="#81c784" opacity="0.8"/>
    <rect x="155" y="258" width="110" height="15" rx="2" fill="#ffb74d" opacity="0.8"/>
    <text x="210" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Layer 1</text>
    <text x="210" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Layer 2</text>
    <text x="210" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Layer 3</text>
  </g>
  
  <!-- Arrow to fine-tuning -->
  <path d="M 275 240 Q 310 240 330 250" stroke="#ab47bc" stroke-width="2" fill="none" class="arrow-anim" style="animation-delay: 0.8s"/>
  <polygon points="325,247 332,252 323,255" fill="#ab47bc"/>
  
  <!-- Fine-tuning Section -->
  <g class="section-4" data-narration="Finally, fine-tuning uses backpropagation to optimize all layers together">
    <rect x="330" y="245" width="80" height="55" rx="6" fill="url(#fineTuneGradient)" filter="url(#shadow)"/>
    <text x="370" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Fine-tuning</text>
    <text x="370" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" opacity="0.9">Backprop</text>
    <path d="M 355 295 L 370 285 L 385 295" stroke="#fff" stroke-width="1.5" fill="none" class="pulse-anim"/>
  </g>
  
  <!-- Key Concept Box: Unsupervised Learning -->
  <g class="section-3" data-narration="Each layer is trained using unsupervised learning, typically as an autoencoder">
    <rect x="20" y="300" width="120" height="45" rx="5" fill="#c8e6c9" stroke="#4caf50" stroke-width="1.5" opacity="0.9"/>
    <text x="80" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Unsupervised</text>
    <text x="80" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1b5e20">Pretraining</text>
  </g>
  
  <!-- Key Concept Box: Fine-tuning -->
  <g class="section-4" data-narration="Fine-tuning refines the entire network using supervised backpropagation">
    <rect x="155" y="300" width="120" height="45" rx="5" fill="#e1bee7" stroke="#8e24aa" stroke-width="1.5" opacity="0.9"/>
    <text x="215" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6a1b9a">Fine-tuning</text>
    <text x="215" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a148c">Supervised</text>
  </g>
  
  <!-- Arrow showing backprop direction -->
  <path d="M 195 345 L 195 365 L 370 365 L 370 310" stroke="#ab47bc" stroke-width="1.5" fill="none" stroke-dasharray="4,2" opacity="0.5"/>
  <polygon points="365,305 370,300 375,305" fill="#ab47bc" opacity="0.5"/>
  
  <!-- Output -->
  <g class="section-4" data-narration="The result is a well-initialized deep network that can be effectively trained">
    <rect x="290" y="315" width="100" height="35" rx="5" fill="#b39ddb" stroke="#7e57c2" stroke-width="1.5"/>
    <text x="340" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Output</text>
  </g>
  
  <!-- Step numbers -->
  <circle cx="185" cy="50" r="10" fill="#5c9cb8" class="glow-anim"/>
  <text x="185" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">1</text>
  
  <circle cx="290" cy="50" r="10" fill="#66bb6a" class="glow-anim" style="animation-delay: 0.3s"/>
  <text x="290" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">2</text>
  
  <circle cx="382" cy="50" r="10" fill="#ff9800" class="glow-anim" style="animation-delay: 0.6s"/>
  <text x="382" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">3</text>
  
  <!-- Legend -->
  <rect x="290" y="355" width="120" height="35" rx="3" fill="#fff" stroke="#cfd8dc" stroke-width="1" opacity="0.8"/>
  <text x="350" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#607d8b">Hinton et al., 2006</text>
  <text x="350" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#90a4ae">Deep Belief Networks</text>
</svg>