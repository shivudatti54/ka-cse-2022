<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="polygon-filling-algorithms" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="polygonFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="scanLineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0.8" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    @keyframes scanMove {
      0% { transform: translateY(0); opacity: 0.3; }
      50% { opacity: 1; }
      100% { transform: translateY(280px); opacity: 0.3; }
    }
    @keyframes fillInterval {
      from { width: 0; }
      to { width: var(--fill-width); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d3436; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #2d3436; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #636e72; }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2d3436; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    .scan-line-anim { animation: scanMove 8s linear infinite; }
    .section-box { fill: #ffffff; stroke: #dfe6e9; stroke-width: 1; rx: 8; }
    .polygon-edge { fill: none; stroke: #2d3436; stroke-width: 2; stroke-linejoin: round; }
    .scan-line { stroke: #00b894; stroke-width: 2; stroke-dasharray: 5,3; }
    .intersection { fill: #d63031; }
    .filled-interval { fill: #74b9ff; opacity: 0.5; }
    .aet-row { fill: #f8f9fa; }
    .highlight { fill: #fdcb6e; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Polygon Filling Algorithms</text>
  <text x="210" y="45" text-anchor="middle" class="detail slide-in" style="animation-delay: 0.3s">Scan-Line Algorithm Visualization</text>
  
  <!-- Main Diagram Area -->
  <g transform="translate(30, 60)">
    <!-- Section: Polygon with Scan Lines -->
    <rect class="section-box" x="0" y="0" width="180" height="180" />
    <text class="box-title" x="10" y="20">Scan-Line Process</text>
    
    <!-- Polygon (concave shape) -->
    <polygon class="polygon-edge" points="90,10 150,40 140,100 100,80 60,100 40,40"
             style="animation: fadeIn 1.5s ease-out forwards; opacity: 0;" />
    <polygon points="90,10 150,40 140,100 100,80 60,100 40,40"
             fill="url(#polygonFill)" style="animation: fadeIn 1.5s ease-out forwards; opacity: 0;" />
    
    <!-- Scan Lines -->
    <line class="scan-line scan-line-anim" x1="20" y1="0" x2="170" y2="0" style="animation-delay: 0s;" />
    <line class="scan-line" x1="20" y1="30" x2="170" y2="30" />
    <line class="scan-line" x1="20" y1="60" x2="170" y2="60" />
    <line class="scan-line" x1="20" y1="90" x2="170" y2="90" />
    <line class="scan-line" x1="20" y1="120" x2="170" y2="120" />
    <line class="scan-line" x1="20" y1="150" x2="170" y2="150" />
    
    <!-- Y-axis labels -->
    <text class="detail" x="5" y="5" style="font-size:10px;">y=0</text>
    <text class="detail" x="5" y="35" style="font-size:10px;">y=1</text>
    <text class="detail" x="5" y="65" style="font-size:10px;">y=2</text>
    <text class="detail" x="5" y="95" style="font-size:10px;">y=3</text>
    <text class="detail" x="5" y="125" style="font-size:10px;">y=4</text>
    <text class="detail" x="5" y="155" style="font-size:10px;">y=5</text>
    
    <!-- Intersection Points -->
    <circle class="intersection pulse" cx="95" cy="30" r="4" style="animation-delay: 0.5s;" />
    <circle class="intersection pulse" cx="135" cy="30" r="4" style="animation-delay: 0.5s;" />
    <circle class="intersection pulse" cx="120" cy="60" r="4" style="animation-delay: 1s;" />
    <circle class="intersection pulse" cx="60" cy="60" r="4" style="animation-delay: 1s;" />
    <circle class="intersection pulse" cx="90" cy="90" r="4" style="animation-delay: 1.5s;" />
    <circle class="intersection pulse" cx="110" cy="90" r="4" style="animation-delay: 1.5s;" />
    
    <!-- Filled Intervals -->
    <rect class="filled-interval" x="95" y="27" width="40" height="6" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.6s; opacity: 0;" />
    <rect class="filled-interval" x="60" y="57" width="60" height="6" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.1s; opacity: 0;" />
    <rect class="filled-interval" x="90" y="87" width="20" height="6" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.6s; opacity: 0;" />
  </g>
  
  <!-- AET Table -->
  <g transform="translate(220, 60)">
    <rect class="section-box" x="0" y="0" width="180" height="180" />
    <text class="box-title" x="10" y="20">Active Edge Table (AET)</text>
    
    <!-- Table Header -->
    <rect class="aet-row" x="5" y="30" width="170" height="18" />
    <text class="detail" x="10" y="43" style="font-weight:bold;">Edge</text>
    <text class="detail" x="60" y="43" style="font-weight:bold;">y_max</text>
    <text class="detail" x="100" y="43" style="font-weight:bold;">1/m</text>
    <text class="detail" x="140" y="43" style="font-weight:bold;">x</text>
    
    <!-- Table Rows - Static display -->
    <rect class="aet-row" x="5" y="50" width="170" height="16" />
    <text class="detail" x="10" y="62">E1</text>
    <text class="detail" x="60" y="62">80</text>
    <text class="detail" x="100" y="62">0.5</text>
    <text class="detail" x="140" y="62">90</text>
    
    <rect class="aet-row" x="5" y="68" width="170" height="16" />
    <text class="detail" x="10" y="80">E2</text>
    <text class="detail" x="60" y="80">100</text>
    <text class="detail" x="100" y="80">-0.25</text>
    <text class="detail" x="140" y="80">150</text>
    
    <rect class="aet-row" x="5" y="86" width="170" height="16" />
    <text class="detail" x="10" y="98">E3</text>
    <text class="detail" x="60" y="98">100</text>
    <text class="detail" x="100" y="98">0.2</text>
    <text class="detail" x="140" y="98">60</text>
    
    <rect class="aet-row" x="5" y="104" width="170" height="16" />
    <text class="detail" x="10" y="116">E4</text>
    <text class="detail" x="60" y="116">80</text>
    <text class="detail" x="100" y="116">-0.5</text>
    <text class="detail" x="140" y="116">40</text>
    
    <rect class="aet-row" x="5" y="122" width="170" height="16" />
    <text class="detail" x="10" y="134">E5</text>
    <text class="detail" x="60" y="134">80</text>
    <text class="detail" x="100" y="134">1.0</text>
    <text class="detail" x="140" y="134">100</text>
    
    <rect class="aet-row" x="5" y="140" width="170" height="16" />
    <text class="detail" x="10" y="152">E6</text>
    <text class="detail" x="60" y="152">100</text>
    <text class="detail" x="100" y="152">-1.0</text>
    <text class="detail" x="140" y="152">140</text>
    
    <!-- Legend -->
    <text class="detail" x="10" y="172" style="fill:#636e72;">y_max: max Y coordinate</text>
    <text class="detail" x="10" y="185" style="fill:#636e72;">1/m: inverse slope</text>
  </g>
  
  <!-- Process Steps -->
  <g transform="translate(30, 255)">
    <rect class="section-box" x="0" y="0" width="370" height="80" />
    <text class="box-title" x="10" y="18">Algorithm Steps</text>
    
    <!-- Step 1 -->
    <g data-narration="step1">
      <circle cx="20" cy="38" r="10" fill="#74b9ff" />
      <text x="20" y="42" text-anchor="middle" fill="white" style="font-size:12px;font-weight:bold;">1</text>
      <text class="detail" x="38" y="35">Find intersections</text>
      <text class="detail" x="38" y="48">with polygon edges</text>
    </g>
    
    <!-- Arrow 1 -->
    <line x1="100" y1="38" x2="120" y2="38" stroke="#636e72" stroke-width="1" marker-end="url(#arrowhead)" />
    
    <!-- Step 2 -->
    <g data-narration="step2">
      <circle cx="145" cy="38" r="10" fill="#00b894" />
      <text x="145" y="42" text-anchor="middle" fill="white" style="font-size:12px;font-weight:bold;">2</text>
      <text class="detail" x="163" y="35">Sort by X</text>
      <text class="detail" x="163" y="48">(left to right)</text>
    </g>
    
    <!-- Arrow 2 -->
    <line x1="225" y1="38" x2="245" y2="38" stroke="#636e72" stroke-width="1" marker-end="url(#arrowhead)" />
    
    <!-- Step 3 -->
    <g data-narration="step3">
      <circle cx="270" cy="38" r="10" fill="#fdcb6e" />
      <text x="270" y="42" text-anchor="middle" fill="white" style="font-size:12px;font-weight:bold;">3</text>
      <text class="detail" x="288" y="35">Fill between</text>
      <text class="detail" x="288" y="48">odd-even pairs</text>
    </g>
    
    <!-- Arrow 3 -->
    <line x1="320" y1="38" x2="340" y2="38" stroke="#636e72" stroke-width="1" marker-end="url(#arrowhead)" />
    
    <!-- Step 4 -->
    <g data-narration="step4">
      <circle cx="355" cy="38" r="10" fill="#e17055" />
      <text x="355" y="42" text-anchor="middle" fill="white" style="font-size:12px;font-weight:bold;">4</text>
      <text class="detail" x="355" y="62" text-anchor="middle">Next line</text>
    </g>
  </g>
  
  <!-- Key Concepts -->
  <g transform="translate(220, 250)">
    <rect class="section-box" x="0" y="0" width="180" height="85" />
    <text class="box-title" x="10" y="18">Key Concepts</text>
    
    <g data-narration="concept1">
      <rect x="8" y="28" width="12" height="12" fill="#74b9ff" rx="2" />
      <text class="detail" x="25" y="38">Scan Line</text>
    </g>
    
    <g data-narration="concept2">
      <circle cx="14" cy="56" r="5" fill="#d63031" />
      <text class="detail" x="25" y="58">Intersection Point</text>
    </g>
    
    <g data-narration="concept3">
      <rect x="8" y="70" width="12" height="8" fill="#74b9ff" rx="1" opacity="0.5" />
      <text class="detail" y="77">Filled Interval</text>
    </g>
  </g>
  
  <!-- Narration Box -->
  <g data-narration="main">
    <rect x="30" y="345" width="360" height="45" fill="#fff" stroke="#dfe6e9" rx="8" />
    <text class="label" x="45" y="365">Scan-line algorithm processes one horizontal line at a time, filling intervals between</text>
    <text class="label" x="45" y="380">sorted intersection pairs using the odd-even rule.</text>
  </g>
</svg>