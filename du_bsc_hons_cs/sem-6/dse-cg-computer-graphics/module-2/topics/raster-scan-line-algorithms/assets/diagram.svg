<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="raster-scan-line-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD"/>
      <stop offset="50%" style="stop-color:#F0F7EC"/>
      <stop offset="100%" style="stop-color:#FEF0F5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; fill: #2C3E50; }
    .section-title { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #34495E; }
    .label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #5D6D7E; }
    .detail { font-family: 'Arial', sans-serif; font-size: 11px; fill: #7F8C8D; }
    .highlight { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; fill: #E74C3C; }
    .box { rx: 8; ry: 8; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .grid-line { stroke: #BDC3C7; stroke-width: 0.5; }
    .pixel { rx: 2; ry: 2; }
    .true-line { stroke: #3498DB; stroke-width: 2; stroke-dasharray: 200; stroke-dashoffset: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g data-narration="Title: Raster Scan Line Algorithms - Core computer graphics rendering techniques">
    <text x="210" y="30" text-anchor="middle" class="title-text anim-fade">Raster Scan Line Algorithms</text>
    <line x1="60" y1="40" x2="360" y2="40" stroke="#3498DB" stroke-width="2" class="anim-fade"/>
  </g>
  
  <!-- Section 1: DDA Algorithm -->
  <g data-narration="DDA Algorithm: Digital Differential Analyzer - incremental line drawing using floating point calculations">
    <rect x="15" y="55" width="95" height="55" class="box" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="62" y="72" text-anchor="middle" class="section-title">DDA Algorithm</text>
    <text x="62" y="88" text-anchor="middle" class="label">Digital Differential</text>
    <text x="62" y="100" text-anchor="middle" class="label">Analyzer</text>
  </g>
  
  <!-- Section 2: Bresenham's Algorithm (Main Focus) -->
  <g data-narration="Bresenham's Line Algorithm: Optimized integer-based line drawing with decision parameter P">
    <rect x="120" y="55" width="195" height="55" class="box" fill="#E8F5E9" stroke="#81C784" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="217" y="72" text-anchor="middle" class="section-title">Bresenham's Line Algorithm</text>
    <text x="217" y="88" text-anchor="middle" class="label">Decision Parameter: P</text>
    <text x="217" y="100" text-anchor="middle" class="label">Optimized integer arithmetic</text>
  </g>
  
  <!-- Section 3: Midpoint Circle Algorithm -->
  <g data-narration="Midpoint Circle Algorithm: Generates circles using decision parameter at midpoint">
    <rect x="325" y="55" width="80" height="55" class="box" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="365" y="72" text-anchor="middle" class="section-title">Midpoint</text>
    <text x="365" y="88" text-anchor="middle" class="label">Circle</text>
    <text x="365" y="100" text-anchor="middle" class="label">Algorithm</text>
  </g>
  
  <!-- Section 4: Scan-line Polygon Fill -->
  <g data-narration="Scan-line Polygon Fill: Fills polygon interior by scanning horizontal lines">
    <rect x="220" y="115" width="90" height="40" class="box" fill="#FFFDE7" stroke="#FFD54F" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="265" y="133" text-anchor="middle" class="section-title">Scan-line Fill</text>
  </g>
  
  <!-- Main Diagram: Bresenham's Decision Process -->
  <g data-narration="Bresenham Decision: Compare midpoint M with true line to choose between lower or upper pixel">
    <rect x="15" y="165" width="200" height="210" class="box" fill="#FFFFFF" stroke="#34495E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="115" y="185" text-anchor="middle" class="section-title">Bresenham Decision Process</text>
    
    <!-- Pixel Grid -->
    <g class="grid">
      <line x1="35" y1="230" x2="205" y2="230" class="grid-line"/>
      <line x1="35" y1="255" x2="205" y2="255" class="grid-line"/>
      <line x1="35" y1="280" x2="205" y2="280" class="grid-line"/>
      <line x1="35" y1="305" x2="205" y2="305" class="grid-line"/>
      <line x1="35" y1="330" x2="205" y2="330" class="grid-line"/>
      <line x1="35" y1="355" x2="205" y2="355" class="grid-line"/>
      
      <line x1="70" y1="220" x2="70" y2="370" class="grid-line"/>
      <line x1="100" y1="220" x2="100" y2="370" class="grid-line"/>
      <line x1="130" y1="220" x2="130" y2="370" class="grid-line"/>
      <line x1="160" y1="220" x2="160" y2="370" class="grid-line"/>
      <line x1="190" y1="220" x2="190" y2="370" class="grid-line"/>
    </g>
    
    <!-- True Line (Diagonal) -->
    <line x1="70" y1="355" x2="190" y2="230" class="true-line" stroke="#3498DB" stroke-width="2.5"/>
    
    <!-- Current Pixel -->
    <rect x="95" y="300" width="10" height="10" class="pixel" fill="#2ECC71" stroke="#27AE60" stroke-width="1"/>
    <text x="100" y="327" text-anchor="middle" class="detail" fill="#27AE60">Current</text>
    <text x="100" y="338" text-anchor="middle" class="detail" fill="#27AE60">(x,y)</text>
    
    <!-- Candidate Pixel 1: (x+1, y) -->
    <rect x="125" y="300" width="10" height="10" class="pixel" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
    <text x="130" y="327" text-anchor="middle" class="detail" fill="#C0392B">E</text>
    <text x="130" y="338" text-anchor="middle" class="detail" fill="#C0392B">(x+1,y)</text>
    
    <!-- Candidate Pixel 2: (x+1, y+1) -->
    <rect x="125" y="275" width="10" height="10" class="pixel" fill="#9B59B6" stroke="#8E44AD" stroke-width="1"/>
    <text x="130" y="268" text-anchor="middle" class="detail" fill="#8E44AD">NE</text>
    <text x="130" y="258" text-anchor="middle" class="detail" fill="#8E44AD">(x+1,y+1)</text>
    
    <!-- Midpoint M -->
    <circle cx="130" cy="287.5" r="5" fill="#F39C12" stroke="#E67E22" stroke-width="1.5"/>
    <text x="150" y="290" class="highlight">M</text>
    <text x="150" y="302" class="detail">Midpoint</text>
    
    <!-- Decision Parameter Box -->
    <rect x="30" y="215" width="60" height="18" fill="#FDF2E9" stroke="#E59866" rx="3"/>
    <text x="60" y="227" text-anchor="middle" class="label" font-weight="bold">P = 2Δy - Δx</text>
    
    <!-- Decision arrows and text -->
    <text x="165" y="288" class="detail">Line passes</text>
    <text x="165" y="298" class="detail">above M?</text>
    
    <path d="M 160 282 L 145 285" stroke="#34495E" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Right Side: Algorithm Comparison -->
  <g data-narration="Algorithm Comparison: DDA uses floating point, Bresenham uses only integers - faster and more accurate">
    <rect x="225" y="165" width="180" height="140" class="box" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="315" y="182" text-anchor="middle" class="section-title">Algorithm Comparison</text>
    
    <!-- Comparison Table -->
    <line x1="235" y1="195" x2="395" y2="195" stroke="#CE93D8" stroke-width="1"/>
    
    <text x="240" y="212" class="detail" font-weight="bold">DDA:</text>
    <text x="285" y="212" class="detail">Floating point ops</text>
    <text x="240" y="225" class="detail" font-weight="bold">Bresenham:</text>
    <text x="295" y="225" class="detail">Integer only</text>
    <text x="240" y="238" class="detail" font-weight="bold">Speed:</text>
    <text x="285" y="238" class="detail">Bresenham faster</text>
    <text x="240" y="251" class="detail" font-weight="bold">Accuracy:</text>
    <text x="290" y="251" class="detail">Both precise</text>
    <text x="240" y="264" class="detail" font-weight="bold">Use case:</text>
    <text x="290" y="264" class="detail">Real-time graphics</text>
    
    <!-- Key Insight Box -->
    <rect x="235" y="275" width="160" height="22" fill="#E8F5E9" stroke="#81C784" rx="4"/>
    <text x="315" y="290" text-anchor="middle" class="label" font-weight="bold" fill="#2E7D32">P &lt; 0: Choose E</text>
  </g>
  
  <!-- Bottom: Process Flow -->
  <g data-narration="Bresenham Process Flow: Initialize P, at each step decide based on P value, update accordingly">
    <rect x="15" y="315" width="390" height="70" class="box" fill="#E8EAF6" stroke="#7986CB" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="200" y="332" text-anchor="middle" class="section-title">Bresenham Line Drawing Process</text>
    
    <!-- Process Steps -->
    <g class="anim-pulse">
      <rect x="35" y="345" width="75" height="30" rx="4" fill="#BBDEFB" stroke="#64B5F6"/>
      <text x="72" y="363" text-anchor="middle" class="label" font-weight="bold">1. Init P</text>
      <text x="72" y="375" text-anchor="middle" class="detail">P = 2Δy - Δx</text>
    </g>
    
    <text x="120" y="363" class="detail">→</text>
    
    <g class="anim-pulse" style="animation-delay: 0.3s">
      <rect x="130" y="345" width="75" height="30" rx="4" fill="#C8E6C9" stroke="#81C784"/>
      <text x="167" y="363" text-anchor="middle" class="label" font-weight="bold">2. Decision</text>
      <text x="167" y="375" text-anchor="middle" class="detail">Check P &lt; 0</text>
    </g>
    
    <text x="215" y="363" class="detail">→</text>
    
    <g class="anim-pulse" style="animation-delay: 0.6s">
      <rect x="225" y="345" width="75" height="30" rx="4" fill="#F8BBD9" stroke="#F48FB1"/>
      <text x="262" y="363" text-anchor="middle" class="label" font-weight="bold">3. Plot Pixel</text>
      <text x="262" y="375" text-anchor="middle" class="detail">Choose E or NE</text>
    </g>
    
    <text x="310" y="363" class="detail">→</text>
    
    <g class="anim-pulse" style="animation-delay: 0.9s">
      <rect x="320" y="345" width="75" height="30" rx="4" fill="#FFE0B2" stroke="#FFB74D"/>
      <text x="357" y="363" text-anchor="middle" class="label" font-weight="bold">4. Update P</text>
      <text x="357" y="375" text-anchor="middle" class="detail">P += 2Δy or...</text>
    </g>
  </g>
  
  <!-- Arrow Indicators -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34495E"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <g data-narration="Color legend: Green=Current pixel, Red=East pixel, Purple=NorthEast pixel, Orange=Midpoint">
    <rect x="325" y="320" width="80" height="55" class="box" fill="#FAFAFA" stroke="#E0E0E0" rx="4"/>
    <text x="365" y="335" text-anchor="middle" class="detail" font-weight="bold">Legend</text>
    
    <rect x="332" y="343" width="8" height="8" fill="#2ECC71"/>
    <text x="345" y="351" class="detail">Current</text>
    
    <rect x="332" y="355" width="8" height="8" fill="#E74C3C"/>
    <text x="345" y="363" class="detail">E (East)</text>
    
    <rect x="332" y="367" width="8" height="8" fill="#9B59B6"/>
    <text x="345" y="375" class="detail">NE (NorthE)</text>
  </g>
</svg>