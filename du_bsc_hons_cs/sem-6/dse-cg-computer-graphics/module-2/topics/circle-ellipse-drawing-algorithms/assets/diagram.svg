<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="circle-ellipse-drawing-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="pixelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArc {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    .slide-in { animation: slideIn 0.5s ease-out forwards; }
    .slide-in-up { animation: slideInUp 0.5s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <g class="slide-in" data-narration="Title section introducing the topic of circle and ellipse drawing algorithms">
    <text x="210" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e3a5f" text-anchor="middle">Circle &amp; Ellipse</text>
    <text x="210" y="50" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Drawing Algorithms</text>
  </g>
  
  <!-- Section 1: Circle Equation -->
  <g class="fade-in delay-1" data-narration="The circle equation x² + y² = r² defines the relationship between x, y coordinates and radius">
    <rect x="10" y="65" width="130" height="55" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="20" y="82" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8">Circle Equation</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="11" fill="#334155">x² + y² = r²</text>
    <text x="20" y="114" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Center (0,0), Radius r</text>
  </g>
  
  <!-- Section 2: Symmetry -->
  <g class="fade-in delay-2" data-narration="Eight-way symmetry for circles means only 1/8 of the circle needs to be calculated">
    <rect x="150" y="65" width="130" height="55" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="160" y="82" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8">Eight-Way Symmetry</text>
    <text x="160" y="100" font-family="Arial, sans-serif" font-size="11" fill="#334155">8 points from 1 calculation</text>
    <text x="160" y="114" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Efficiency boost</text>
  </g>
  
  <!-- Section 3: Midpoint Concept -->
  <g class="fade-in delay-3" data-narration="The midpoint algorithm avoids expensive square root calculations by testing a midpoint">
    <rect x="290" y="65" width="120" height="55" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="300" y="82" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8">Midpoint Test</text>
    <text x="300" y="100" font-family="Arial, sans-serif" font-size="11" fill="#334155">Avoids √ computation</text>
    <text x="300" y="114" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Incremental decision</text>
  </g>
  
  <!-- Main Visualization: Pixel Selection -->
  <g class="slide-in-up delay-2" data-narration="The main diagram showing how the algorithm chooses between two candidate pixels based on the midpoint position">
    <!-- Grid background -->
    <rect x="20" y="130" width="180" height="180" fill="#f8fafc" stroke="#e2e8f0" rx="4"/>
    
    <!-- Grid lines -->
    <g stroke="#e2e8f0" stroke-width="0.5">
      <line x1="20" y1="160" x2="200" y2="160"/>
      <line x1="20" y1="190" x2="200" y2="190"/>
      <line x1="20" y1="220" x2="200" y2="220"/>
      <line x1="20" y1="250" x2="200" y2="250"/>
      <line x1="20" y1="280" x2="200" y2="280"/>
      <line x1="20" y1="310" x2="200" y2="310"/>
      <line x1="50" y1="130" x2="50" y2="310"/>
      <line x1="80" y1="130" x2="80" y2="310"/>
      <line x1="110" y1="130" x2="110" y2="310"/>
      <line x1="140" y1="130" x2="140" y2="310"/>
      <line x1="170" y1="130" x2="170" y2="310"/>
      <line x1="200" y1="130" x2="200" y2="310"/>
    </g>
    
    <!-- True circle arc -->
    <path d="M 150 220 A 80 80 0 0 1 110 148" fill="none" stroke="url(#circleGradient)" stroke-width="2" stroke-dasharray="4,2" class="pulse"/>
    
    <!-- Circle center point -->
    <circle cx="110" cy="220" r="3" fill="#3b82f6"/>
    <text x="110" y="238" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">(0,0)</text>
    
    <!-- Current point -->
    <rect x="108" y="188" width="4" height="4" fill="#3b82f6"/>
    <text x="125" y="192" font-family="Arial, sans-serif" font-size="9" fill="#334155">Current (x,y)</text>
    
    <!-- P1 candidate pixel -->
    <rect x="138" y="188" width="8" height="8" fill="url(#pixelGradient)" stroke="#059669" stroke-width="1" rx="1"/>
    <text x="175" y="194" font-family="Arial, sans-serif" font-size="9" fill="#059669">P1(x+1,y)</text>
    
    <!-- P2 candidate pixel -->
    <rect x="138" y="168" width="8" height="8" fill="url(#pixelGradient)" stroke="#059669" stroke-width="1" rx="1" opacity="0.6"/>
    <text x="175" y="174" font-family="Arial, sans-serif" font-size="9" fill="#64748b">P2(x+1,y-1)</text>
    
    <!-- Midpoint M -->
    <circle cx="142" cy="178" r="3" fill="url(#highlightGradient)" class="pulse"/>
    <text x="160" y="182" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#d97706">M</text>
    <text x="142" y="170" font-family="Arial, sans-serif" font-size="8" fill="#d97706" text-anchor="middle">(x+1,y-0.5)</text>
    
    <!-- Decision arrow -->
    <path d="M 60 270 Q 110 260 130 230" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
    <text x="70" y="285" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">If M inside: choose P1</text>
    <text x="70" y="297" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">If M outside: choose P2</text>
  </g>
  
  <!-- Algorithm Steps -->
  <g class="fade-in delay-3" data-narration="The algorithm step-by-step process with decision parameter">
    <rect x="210" y="130" width="200" height="100" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="220" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8">Algorithm Steps</text>
    <text x="220" y="168" font-family="Arial, sans-serif" font-size="10" fill="#334155">1. Start at (r, 0)</text>
    <text x="220" y="182" font-family="Arial, sans-serif" font-size="10" fill="#334155">2. Calculate midpoint M</text>
    <text x="220" y="196" font-family="Arial, sans-serif" font-size="10" fill="#334155">3. Test: F(x,y) = x² + y² - r²</text>
    <text x="220" y="210" font-family="Arial, sans-serif" font-size="10" fill="#334155">4. If F(M) &lt; 0: inside → P1</text>
    <text x="220" y="224" font-family="Arial, sans-serif" font-size="10" fill="#334155">5. If F(M) ≥ 0: outside → P2</text>
  </g>
  
  <!-- Decision Parameter Box -->
  <g class="fade-in delay-4" data-narration="The decision parameter p determines which pixel is closer to the true circle">
    <rect x="210" y="240" width="200" height="60" fill="#fef3c7" rx="6" stroke="#f59e0b" stroke-width="1"/>
    <text x="220" y="258" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b45309">Decision Parameter p</text>
    <text x="220" y="275" font-family="Arial, sans-serif" font-size="11" fill="#92400e">p = F(M) = (x+1)² + (y-0.5)² - r²</text>
    <text x="220" y="291" font-family="Arial, sans-serif" font-size="10" fill="#b45309">p &lt; 0 → choose P1 | p ≥ 0 → choose P2</text>
  </g>
  
  <!-- Ellipse Section -->
  <g class="slide-in-up delay-5" data-narration="Ellipse uses four-way symmetry and two regions for drawing">
    <rect x="20" y="320" width="185" height="70" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="30" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7c3aed">Ellipse Algorithm</text>
    <text x="30" y="356" font-family="Arial, sans-serif" font-size="10" fill="#334155">Equation: x²/a² + y²/b² = 1</text>
    <text x="30" y="370" font-family="Arial, sans-serif" font-size="10" fill="#334155">Four-way symmetry only</text>
    <text x="30" y="384" font-family="Arial, sans-serif" font-size="10" fill="#334155">Two regions: region 1 &amp; region 2</text>
  </g>
  
  <!-- Visual ellipse representation -->
  <g class="pulse delay-5" opacity="0.8">
    <ellipse cx="155" cy="355" rx="35" ry="25" fill="none" stroke="url(#circleGradient)" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="155" y="335" font-family="Arial, sans-serif" font-size="9" fill="#7c3aed" text-anchor="middle">a, b = semi-axes</text>
  </g>
  
  <!-- Legend -->
  <g class="fade-in delay-5" data-narration="Color legend explaining the visual elements">
    <rect x="290" y="310" width="120" height="80" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="300" y="328" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#334155">Legend</text>
    <rect x="300" y="336" width="10" height="10" fill="#10b981" rx="2"/>
    <text x="316" y="345" font-family="Arial, sans-serif" font-size="9" fill="#334155">Candidate Pixels</text>
    <rect x="300" y="352" width="10" height="10" fill="#f59e0b" rx="2"/>
    <text x="316" y="361" font-family="Arial, sans-serif" font-size="9" fill="#334155">Midpoint M</text>
    <line x1="300" y1="372" x2="310" y2="372" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="316" y="375" font-family="Arial, sans-serif" font-size="9" fill="#334155">True Circle</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
</svg>