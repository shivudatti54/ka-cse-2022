<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="line-polygon-clipping-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#e8f8f5"/>
    </linearGradient>
    <linearGradient id="clipWindowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9e6"/>
      <stop offset="100%" style="stop-color:#ffeeba"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7d9a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5a6d7a; }
    .box-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .section-box { fill: white; stroke: #b8c9d9; stroke-width: 1.5; rx: 8; }
    .clip-window { fill: url(#clipWindowGradient); stroke: #d4a843; stroke-width: 2; rx: 3; }
    .line-visible { stroke: #27ae60; stroke-width: 3; stroke-linecap: round; }
    .line-clipped { stroke: #c0392b; stroke-width: 2; stroke-dasharray: 5,3; stroke-linecap: round; }
    .region-code { font-family: monospace; font-size: 10px; fill: #7f8c8d; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.7s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-draw { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1.5s ease-out forwards; }
    .visible-text { fill: #27ae60; font-weight: bold; }
    .clipped-text { fill: #c0392b; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Line &amp; Polygon Clipping</text>
  <text x="210" y="48" text-anchor="middle" class="detail anim-fade" style="animation-delay: 0.2s">Algorithms Overview</text>
  
  <!-- Section 1: Clipping Window -->
  <g class="anim-slide-left" style="animation-delay: 0.3s" data-narration="The clipping window defines the visible rectangular region in world coordinates">
    <rect x="30" y="70" width="130" height="100" class="section-box" filter="url(#shadow)"/>
    <text x="40" y="88" class="box-title">Clipping Window</text>
    <text x="40" y="105" class="detail">Rectangular region in</text>
    <text x="40" y="118" class="detail">world coordinates that</text>
    <text x="40" y="131" class="detail">defines visible area</text>
    <rect x="45" y="145" width="110" height="18" fill="#ecf0f1" rx="3"/>
    <text x="100" y="158" text-anchor="middle" class="detail" font-size="10">World Coordinates</text>
  </g>
  
  <!-- Section 2: Viewport -->
  <g class="anim-slide-right" style="animation-delay: 0.4s" data-narration="The viewport displays the clipped result in screen coordinates">
    <rect x="260" y="70" width="130" height="100" class="section-box" filter="url(#shadow)"/>
    <text x="270" y="88" class="box-title">Viewport</text>
    <text x="270" y="105" class="detail">Screen region where</text>
    <text x="270" y="118" class="detail">clipped result is</text>
    <text x="270" y="131" class="detail">displayed</text>
    <rect x="275" y="145" width="110" height="18" fill="#d5dbdb" rx="3"/>
    <text x="330" y="158" text-anchor="middle" class="detail" font-size="10">Screen Coordinates</text>
  </g>
  
  <!-- Arrow between window and viewport -->
  <g class="anim-fade" style="animation-delay: 0.6s">
    <line x1="165" y1="120" x2="255" y2="120" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="210" y="115" text-anchor="middle" class="detail">Transform</text>
  </g>
  
  <!-- Section 3: Cohen-Sutherland Algorithm -->
  <g class="anim-slide-up" style="animation-delay: 0.7s" data-narration="Cohen-Sutherland uses 4-bit region codes to efficiently clip lines">
    <rect x="30" y="185" width="175" height="85" class="section-box" filter="url(#shadow)"/>
    <text x="40" y="203" class="box-title">Cohen-Sutherland</text>
    <text x="40" y="220" class="detail">• Uses 4-bit region codes</text>
    <text x="40" y="235" class="detail">• Tests endpoints first</text>
    <text x="40" y="250" class="detail">• Rejects obviously</text>
    <text x="50" y="262" class="detail" style="font-style:italic">outside lines quickly</text>
    
    <!-- Region code visualization -->
    <g transform="translate(120, 210)">
      <rect x="0" y="0" width="70" height="50" fill="#f8f9fa" stroke="#dee2e6" rx="3"/>
      <text x="35" y="15" text-anchor="middle" class="region-code">1001</text>
      <text x="35" y="30" text-anchor="middle" class="region-code">0101</text>
      <text x="35" y="42" text-anchor="middle" class="region-code" font-size="8">Top|Left|Right|Bottom</text>
    </g>
  </g>
  
  <!-- Section 4: Line Clipping Example -->
  <g class="anim-slide-up" style="animation-delay: 0.8s" data-narration="Line clipping retains only the visible portion within the clipping window">
    <rect x="220" y="185" width="170" height="85" class="section-box" filter="url(#shadow)"/>
    <text x="230" y="203" class="box-title">Line Clipping</text>
    
    <!-- Mini clip window -->
    <rect x="250" y="210" width="60" height="50" class="clip-window"/>
    
    <!-- Original line (outside) -->
    <line x1="245" y1="225" x2="375" y2="270" class="line-clipped anim-draw" style="animation-delay: 1s"/>
    
    <!-- Clipped visible portion -->
    <line x1="255" y1="228" x2="310" y2="260" class="line-visible anim-draw" style="animation-delay: 1.2s"/>
    
    <text x="320" y="225" class="clipped-text" font-size="10">Clipped</text>
    <text x="340" y="240" class="visible-text" font-size="10">Visible</text>
  </g>
  
  <!-- Section 5: Polygon Clipping -->
  <g class="anim-slide-left" style="animation-delay: 0.9s" data-narration="Polygon clipping removes portions outside the convex clipping region">
    <rect x="30" y="280" width="175" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="40" y="298" class="box-title">Polygon Clipping</text>
    <text x="40" y="315" class="detail">• Clips polygon against</text>
    <text x="40" y="330" class="detail">  convex clipping region</text>
    <text x="40" y="342" class="detail">• Sutherland-Hodgman</text>
    <text x="52" y="354" class="detail" style="font-style:italic">  algorithm commonly used</text>
  </g>
  
  <!-- Section 6: Applications -->
  <g class="anim-slide-right" style="animation-delay: 1s" data-narration="Clipping is essential for rendering efficiency in CAD, GUIs, games, and visualization">
    <rect x="220" y="280" width="170" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="230" y="298" class="box-title">Applications</text>
    <text x="230" y="315" class="detail">• CAD Systems</text>
    <text x="230" y="328" class="detail">• GUI Windowing</text>
    <text x="230" y="341" class="detail">• Game Development</text>
    <text x="230" y="354" class="detail">• Visualization Software</text>
  </g>
  
  <!-- Visual relationship arrows -->
  <g class="anim-fade" style="animation-delay: 1.3s">
    <!-- Arrow from top sections to line clipping -->
    <path d="M95 175 Q95 185 95 185" stroke="#3498db" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Arrow from line to polygon -->
    <path d="M205 230 Q180 255 117 280" stroke="#9b59b6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Key highlight box -->
  <g class="anim-pulse" style="animation-delay: 1.5s">
    <rect x="140" y="360" width="140" height="25" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1.5" rx="5"/>
    <text x="210" y="377" text-anchor="middle" class="label" fill="#16a085">Efficient Rendering</text>
  </g>
</svg>