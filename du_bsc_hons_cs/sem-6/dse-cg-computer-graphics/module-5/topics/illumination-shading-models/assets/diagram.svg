<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="illumination-shading-models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0e8fc"/>
      <stop offset="100%" style="stop-color:#e8f0fc"/>
    </linearGradient>
    <linearGradient id="sphereGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="diffuseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="specularGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff1eb"/>
      <stop offset="100%" style="stop-color:#ace0f9"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .section-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .formula { font-family: Times New Roman, serif; font-size: 13px; font-style: italic; fill: #555; }
    .vector-label { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #c0392b; }
    
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-glow { animation: glow 1.5s ease-in-out infinite; }
    .anim-float { animation: float 3s ease-in-out infinite; }
    
    .section-box { stroke: #bdc3c7; stroke-width: 1; rx: 8; }
    .light-ray { stroke: #f39c12; stroke-width: 2; opacity: 0.8; }
    .ambient-ray { stroke: #9b59b6; stroke-width: 1.5; stroke-dasharray: 4,2; opacity: 0.6; }
    .vector-line { stroke-width: 2; marker-end: url(#arrowhead); }
    .highlight { fill: #fff; opacity: 0.9; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Illumination &amp; Shading Models</text>
  <text x="210" y="50" text-anchor="middle" class="detail anim-fade">Phong Reflection Model Components</text>
  
  <!-- Section 1: Ambient Illumination -->
  <g class="anim-slide" style="animation-delay: 0.2s">
    <rect x="20" y="70" width="115" height="100" fill="#f8e8f8" class="section-box" data-narration="Ambient illumination provides uniform base lighting across the entire surface, simulating light that has bounced around the environment"/>
    <text x="78" y="90" text-anchor="middle" class="section-title">Ambient</text>
    <!-- Sphere with ambient only -->
    <circle cx="78" cy="135" r="25" fill="url(#sphereGradient)" opacity="0.7"/>
    <!-- Ambient rays from all directions -->
    <line x1="45" y1="110" x2="65" y2="125" class="ambient-ray"/>
    <line x1="111" y1="110" x2="91" y2="125" class="ambient-ray"/>
    <line x1="30" y1="145" x2="55" y2="145" class="ambient-ray"/>
    <line x1="126" y1="145" x2="101" y2="145" class="ambient-ray"/>
    <line x1="50" y1="165" x2="68" y2="152" class="ambient-ray"/>
    <line x1="106" y1="165" x2="88" y2="152" class="ambient-ray"/>
    <text x="78" y="182" text-anchor="middle" class="detail">I = ka × Ia</text>
  </g>
  
  <!-- Section 2: Diffuse Reflection -->
  <g class="anim-slide" style="animation-delay: 0.4s">
    <rect x="152" y="70" width="115" height="100" fill="#e8f8f0" class="section-box" data-narration="Diffuse (Lambertian) reflection depends on the angle between light direction and surface normal - light scatters equally in all directions"/>
    <text x="210" y="90" text-anchor="middle" class="section-title">Diffuse</text>
    <!-- Sphere with diffuse -->
    <circle cx="210" cy="135" r="25" fill="url(#diffuseGradient)" opacity="0.8"/>
    <!-- Light source -->
    <circle cx="240" y1="95" cy="95" r="6" fill="#f39c12" class="anim-pulse"/>
    <!-- Light ray to surface -->
    <line x1="240" y1="95" x2="225" y2="120" class="light-ray"/>
    <!-- Normal vector -->
    <line x1="210" y1="135" x2="210" y2="108" stroke="#e74c3c" stroke-width="2" class="vector-line"/>
    <text x="215" y="115" class="vector-label">N</text>
    <!-- Light direction -->
    <line x1="210" y1="135" x2="235" y2="120" stroke="#27ae60" stroke-width="2" class="vector-line"/>
    <text x="230" y="122" class="vector-label" fill="#27ae60">L</text>
    <!-- Diffuse scattered rays -->
    <line x1="200" y1="140" x2="185" y2="145" stroke="#27ae60" stroke-width="1" opacity="0.5"/>
    <line x1="195" y1="130" x2="178" y2="125" stroke="#27ae60" stroke-width="1" opacity="0.5"/>
    <line x1="220" y1="155" x2="235" y2="165" stroke="#27ae60" stroke-width="1" opacity="0.5"/>
    <text x="210" y="182" text-anchor="middle" class="detail">Id = kd × Ip × (N·L)</text>
  </g>
  
  <!-- Section 3: Specular Reflection -->
  <g class="anim-slide" style="animation-delay: 0.6s">
    <rect x="284" y="70" width="115" height="100" fill="#e8f0f8" class="section-box" data-narration="Specular reflection creates shiny highlights that change based on viewing angle, simulating polished surfaces"/>
    <text x="342" y="90" text-anchor="middle" class="section-title">Specular</text>
    <!-- Sphere with specular highlight -->
    <circle cx="342" cy="135" r="25" fill="url(#specularGradient)" opacity="0.85"/>
    <!-- Specular highlight -->
    <ellipse cx="335" cy="128" rx="6" ry="4" fill="white" class="highlight anim-glow"/>
    <!-- Light source -->
    <circle cx="372" y1="95" cy="95" r="6" fill="#f39c12" class="anim-pulse"/>
    <!-- Light ray -->
    <line x1="372" y1="95" x2="352" y2="118" class="light-ray"/>
    <!-- Normal -->
    <line x1="342" y1="135" x2="342" y2="108" stroke="#e74c3c" stroke-width="2" class="vector-line"/>
    <text x="347" y="115" class="vector-label">N</text>
    <!-- Reflection vector -->
    <line x1="342" y1="135" x2="365" y2="115" stroke="#3498db" stroke-width="2" class="vector-line"/>
    <text x="358" y="118" class="vector-label" fill="#3498db">R</text>
    <!-- View direction -->
    <line x1="342" y1="135" x2="315" y2="145" stroke="#9b59b6" stroke-width="2" class="vector-line"/>
    <text x="318" y="148" class="vector-label" fill="#9b59b6">V</text>
    <text x="342" y="182" text-anchor="middle" class="detail">Is = ks × Ip × (R·V)^n</text>
  </g>
  
  <!-- Vector Legend -->
  <g class="anim-fade" style="animation-delay: 0.8s">
    <rect x="20" y="185" width="380" height="50" fill="white" opacity="0.6" rx="5"/>
    <text x="35" y="205" class="label" font-weight="bold">Vectors:</text>
    <line x1="80" y1="200" x2="100" y2="200" stroke="#e74c3c" stroke-width="2"/>
    <text x="105" y="204" class="detail">N = Normal</text>
    <line x1="160" y1="200" x2="180" y2="200" stroke="#27ae60" stroke-width="2"/>
    <text x="185" y="204" class="detail">L = Light Dir</text>
    <line x1="240" y1="200" x2="260" y2="200" stroke="#3498db" stroke-width="2"/>
    <text x="265" y="204" class="detail">R = Reflection</text>
    <line x1="320" y1="200" x2="340" y2="200" stroke="#9b59b6" stroke-width="2"/>
    <text x="345" y="204" class="detail">V = View Dir</text>
  </g>
  
  <!-- Key Formulas Box -->
  <g class="anim-fade" style="animation-delay: 1s">
    <rect x="20" y="245" width="380" height="80" fill="white" opacity="0.8" rx="8" stroke="#bdc3c7"/>
    <text x="210" y="268" text-anchor="middle" class="section-title">Phong Reflection Model</text>
    <text x="210" y="290" text-anchor="middle" class="formula">I_total = kₐIₐ + kdIp(N·L) + ksIp(R·V)^n</text>
    <text x="210" y="310" text-anchor="middle" class="detail">ka, kd, ks = ambient, diffuse, specular coefficients (0-1)</text>
    <text x="210" y="325" text-anchor="middle" class="detail">n = shininess exponent (higher = smaller highlight)</text>
  </g>
  
  <!-- Shading Models Comparison -->
  <g class="anim-fade" style="animation-delay: 1.2s">
    <rect x="20" y="335" width="380" height="55" fill="white" opacity="0.8" rx="8" stroke="#bdc3c7"/>
    <text x="210" y="355" text-anchor="middle" class="section-title">Shading Approaches</text>
    <text x="60" y="378" class="detail">Flat: 1 color/polygon</text>
    <text x="160" y="378" class="detail">Gouraud: interpolate vertex colors</text>
    <text x="310" y="378" class="detail">Phong: interpolate normals</text>
  </g>
  
  <!-- Animated floating light source indicators -->
  <circle cx="240" cy="95" r="8" fill="#f39c12" opacity="0.3" class="anim-float" style="animation-delay: 0s"/>
  <circle cx="372" cy="95" r="8" fill="#f39c12" opacity="0.3" class="anim-float" style="animation-delay: 1s"/>
</svg>