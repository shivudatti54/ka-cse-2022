<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="z-buffer-list-priority-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="zBufferGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2c5f6e"/>
    </linearGradient>
    <linearGradient id="listGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ba05b"/>
      <stop offset="100%" style="stop-color:#4a6b3a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-zbuffer { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-list { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .concept-box { animation: slideInUp 0.5s ease-out 0.7s forwards; opacity: 0; }
    .grid-cell { animation: fadeIn 0.3s ease-out forwards; opacity: 0; }
    .list-item { animation: slideInLeft 0.4s ease-out forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out 1s forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Georgia, serif; font-size: 16px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .step { font-family: Arial, sans-serif; font-size: 10px; fill: #ffffff; }
    .highlight { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Title: Z-Buffer and List Priority Algorithms">Z-Buffer &amp; List Priority</text>
  <text x="210" y="50" text-anchor="middle" class="label" style="font-size: 12px;">Visibility Algorithms in 3D Graphics</text>
  
  <!-- Z-Buffer Section -->
  <g class="section-zbuffer" data-narration="Z-Buffer Algorithm section showing pixel grid with depth values">
    <rect x="20" y="70" width="180" height="150" fill="url(#zBufferGradient)" rx="6" filter="url(#shadow)"/>
    <text x="110" y="88" text-anchor="middle" class="section-title" fill="white">Z-Buffer Algorithm</text>
    
    <!-- Pixel Grid -->
    <g transform="translate(35, 100)">
      <rect class="grid-cell" x="0" y="0" width="30" height="25" fill="#e8f4f8" stroke="#3498db" stroke-width="1" style="animation-delay: 0.8s"/>
      <text class="grid-cell detail" x="15" y="16" text-anchor="middle" style="animation-delay: 0.9s">Z:1.0</text>
      
      <rect class="grid-cell" x="35" y="0" width="30" height="25" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" style="animation-delay: 0.85s"/>
      <text class="grid-cell detail" x="50" y="16" text-anchor="middle" style="animation-delay: 0.95s">Z:0.3</text>
      
      <rect class="grid-cell" x="70" y="0" width="30" height="25" fill="#e8f4f8" stroke="#3498db" stroke-width="1" style="animation-delay: 0.9s"/>
      <text class="grid-cell detail" x="85" y="16" text-anchor="middle" style="animation-delay: 1.0s">Z:0.8</text>
      
      <rect class="grid-cell" x="105" y="0" width="30" height="25" fill="#e8f4f8" stroke="#3498db" stroke-width="1" style="animation-delay: 0.95s"/>
      <text class="grid-cell detail" x="120" y="16" text-anchor="middle" style="animation-delay: 1.05s">Z:0.5</text>
      
      <rect class="grid-cell" x="0" y="30" width="30" height="25" fill="#e8f4f8" stroke="#3498db" stroke-width="1" style="animation-delay: 1.0s"/>
      <text class="grid-cell detail" x="15" y="46" text-anchor="middle" style="animation-delay: 1.1s">Z:0.9</text>
      
      <rect class="grid-cell pulse-element" x="35" y="30" width="30" height="25" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" style="animation-delay: 1.05s"/>
      <text class="grid-cell highlight" x="50" y="46" text-anchor="middle" fill="#27ae60" style="animation-delay: 1.15s">Z:0.2</text>
      
      <rect class="grid-cell" x="70" y="30" width="30" height="25" fill="#e8f4f8" stroke="#3498db" stroke-width="1" style="animation-delay: 1.1s"/>
      <text class="grid-cell detail" x="85" y="46" text-anchor="middle" style="animation-delay: 1.2s">Z:0.6</text>
      
      <rect class="grid-cell" x="105" y="30" width="30" height="25" fill="#e8f4f8" stroke="#3498db" stroke-width="1" style="animation-delay: 1.15s"/>
      <text class="grid-cell detail" x="120" y="46" text-anchor="middle" style="animation-delay: 1.25s">Z:0.4</text>
    </g>
    
    <text x="110" y="200" text-anchor="middle" class="label">Min Z = Closest Pixel</text>
  </g>
  
  <!-- List Priority Section -->
  <g class="section-list" data-narration="List Priority Algorithm section showing sorted objects by distance">
    <rect x="220" y="70" width="180" height="150" fill="url(#listGradient)" rx="6" filter="url(#shadow)"/>
    <text x="310" y="88" text-anchor="middle" class="section-title" fill="white">List Priority Algorithm</text>
    
    <!-- Sorted Object List -->
    <g transform="translate(235, 100)">
      <rect class="list-item" x="0" y="0" width="150" height="28" fill="#d5f5e3" rx="4" style="animation-delay: 1.2s"/>
      <text class="list-item highlight" x="10" y="18" fill="#27ae60" style="animation-delay: 1.3s">1. Near (Z=0.2)</text>
      <circle class="list-item" cx="140" cy="14" r="8" fill="#27ae60" style="animation-delay: 1.35s"/>
      <text class="list-item step" x="140" y="17" text-anchor="middle" style="animation-delay: 1.4s">1</text>
      
      <rect class="list-item" x="0" y="33" width="150" height="28" fill="#fdebd0" rx="4" style="animation-delay: 1.4s"/>
      <text class="list-item highlight" x="10" y="51" fill="#d68910" style="animation-delay: 1.5s">2. Mid (Z=0.5)</text>
      <circle class="list-item" cx="140" cy="47" r="8" fill="#d68910" style="animation-delay: 1.55s"/>
      <text class="list-item step" x="140" y="50" text-anchor="middle" style="animation-delay: 1.6s">2</text>
      
      <rect class="list-item" x="0" y="66" width="150" height="28" fill="#fadbd8" rx="4" style="animation-delay: 1.6s"/>
      <text class="list-item highlight" x="10" y="84" fill="#c0392b" style="animation-delay: 1.7s">3. Far (Z=0.9)</text>
      <circle class="list-item" cx="140" cy="80" r="8" fill="#c0392b" style="animation-delay: 1.75s"/>
      <text class="list-item step" x="140" y="83" text-anchor="middle" style="animation-delay: 1.8s">3</text>
    </g>
    
    <text x="310" y="200" text-anchor="middle" class="label">Sorted by Distance</text>
  </g>
  
  <!-- Arrow between sections -->
  <g data-narration="Arrow showing flow from List Priority to Z-Buffer processing">
    <path class="arrow-line" d="M 200 145 L 218 145" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="100" stroke-dashoffset="100"/>
    <polygon points="218,140 225,145 218,150" fill="#e74c3c"/>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="concept-box" data-narration="Key concept: Z-Buffer stores depth for each pixel">
    <rect x="20" y="240" width="180" height="70" fill="#ffffff" stroke="#3498db" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="110" y="258" text-anchor="middle" class="highlight" fill="#3498db" style="font-size: 12px;">Z-Buffer Key Concept</text>
    <text x="30" y="276" class="detail">• Initialize buffer with max depth</text>
    <text x="30" y="290" class="detail">• Compare: if new Z &lt; stored Z</text>
    <text x="30" y="304" class="detail">• Update buffer &amp; render pixel</text>
  </g>
  
  <g class="concept-box" data-narration="Key concept: List Priority sorts objects before rendering">
    <rect x="220" y="240" width="180" height="70" fill="#ffffff" stroke="#27ae60" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="310" y="258" text-anchor="middle" class="highlight" fill="#27ae60" style="font-size: 12px;">List Priority Key Concept</text>
    <text x="230" y="276" class="detail">• Sort objects by distance</text>
    <text x="230" y="290" class="detail">• Render closest first (painter's)</text>
    <text x="230" y="304" class="detail">• Use Z-Buffer for same-depth</text>
  </g>
  
  <!-- Process Flow -->
  <g class="concept-box" data-narration="Complete process showing both algorithms working together">
    <rect x="80" y="325" width="260" height="55" fill="#fef9e7" stroke="#f39c12" stroke-width="2" rx="6"/>
    <text x="210" y="345" text-anchor="middle" class="highlight" fill="#d68910" style="font-size: 12px;">Combined Process Flow</text>
    <g transform="translate(95, 355)">
      <rect x="0" y="0" width="60" height="18" fill="#fadbd8" rx="3"/>
      <text x="30" y="13" text-anchor="middle" class="detail" style="font-size: 9px;">Sort Objects</text>
      <path d="M 60 9 L 70 9" stroke="#7f8c8d" stroke-width="1.5" fill="none"/>
      <polygon points="70,9 65,6 65,12" fill="#7f8c8d"/>
      <rect x="75" y="0" width="60" height="18" fill="#d5f5e3" rx="3"/>
      <text x="105" y="13" text-anchor="middle" class="detail" style="font-size: 9px;">Z-Buffer Check</text>
      <path d="M 135 9 L 145 9" stroke="#7f8c8d" stroke-width="1.5" fill="none"/>
      <polygon points="145,9 140,6 140,12" fill="#7f8c8d"/>
      <rect x="150" y="0" width="60" height="18" fill="#d4e8f0" rx="3"/>
      <text x="180" y="13" text-anchor="middle" class="detail" style="font-size: 9px;">Render Pixel</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 385)">
    <circle cx="5" cy="5" r="4" fill="#27ae60"/>
    <text x="15" y="9" class="detail">Near</text>
    <circle cx="55" cy="5" r="4" fill="#d68910"/>
    <text x="65" y="9" class="detail">Mid</text>
    <circle cx="105" cy="5" r="4" fill="#c0392b"/>
    <text x="115" y="9" class="detail">Far</text>
  </g>
</svg>