<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="rgb-color-model-animation-basics" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f4ff"/>
      <stop offset="50%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#fff8e8"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000"/>
      <stop offset="100%" style="stop-color:#ff3333"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000"/>
      <stop offset="100%" style="stop-color:#33ff33"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000"/>
      <stop offset="100%" style="stop-color:#3333ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes colorCycle {
      0% { fill: #ff0000; }
      33% { fill: #00ff00; }
      66% { fill: #0000ff; }
      100% { fill: #ff0000; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title-text { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.8s ease-out 0.4s both; }
    .section-3 { animation: fadeIn 1s ease-out 0.6s both; }
    .section-4 { animation: slideInLeft 0.8s ease-out 0.8s both; }
    .section-5 { animation: fadeIn 1s ease-out 1s both; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .color-dot { animation: colorCycle 4s linear infinite; }
    .title { font-family: Georgia, serif; font-weight: bold; }
    .label { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title-text">
    <text x="210" y="30" text-anchor="middle" class="title" font-size="20" fill="#2c3e50">RGB Color Model</text>
    <text x="210" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="#5d6d7e">Animation Basics</text>
  </g>
  
  <!-- Section 1: RGB Cube Overview -->
  <g class="section-1" data-narration="The RGB color cube is a 3D representation showing all possible colors formed by combining Red, Green, and Blue values from 0 to 255">
    <rect x="15" y="70" width="180" height="130" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="25" y="88" font-family="Arial" font-size="13" font-weight="bold" fill="#333">RGB Color Cube</text>
    
    <!-- Simplified 3D Cube -->
    <g transform="translate(40, 100)">
      <!-- Cube vertices -->
      <polygon points="0,60 60,45 60,105 0,120" fill="#000" opacity="0.8"/>
      <polygon points="0,60 60,15 120,30 60,45" fill="#333"/>
      <polygon points="60,45 120,30 120,90 60,105" fill="#666"/>
      
      <!-- Color points -->
      <circle cx="0" cy="120" r="5" fill="#000" class="float-anim"/>
      <circle cx="120" cy="30" r="5" fill="#fff" stroke="#999"/>
      <circle cx="0" cy="60" r="4" fill="#f00" class="pulse-anim"/>
      <circle cx="60" cy="15" r="4" fill="#0f0" class="pulse-anim"/>
      <circle cx="120" cy="90" r="4" fill="#00f" class="pulse-anim"/>
      <circle cx="60" cy="105" r="4" fill="#0ff" class="pulse-anim"/>
      
      <!-- Axis labels -->
      <text x="-5" y="125" font-family="Arial" font-size="10" fill="#f00">R</text>
      <text x="125" y="35" font-family="Arial" font-size="10" fill="#0f0">G</text>
      <text x="60" y="10" font-family="Arial" font-size="10" fill="#00f">B</text>
    </g>
    
    <text x="130" y="175" font-family="Arial" font-size="9" fill="#666">Black (0,0,0)</text>
    <text x="130" y="185" font-family="Arial" font-size="9" fill="#666">White (255,255,255)</text>
  </g>
  
  <!-- Section 2: Color Mixing Diagram -->
  <g class="section-2" data-narration="RGB is additive: combining all three primary colors at full intensity produces white, while combining two produces cyan, magenta, or yellow">
    <rect x="225" y="70" width="180" height="130" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="235" y="88" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Additive Mixing</text>
    
    <!-- Color circles -->
    <circle cx="270" cy="125" r="20" fill="url(#redGrad)" opacity="0.9"/>
    <circle cx="315" cy="125" r="20" fill="url(#greenGrad)" opacity="0.9"/>
    <circle cx="360" cy="125" r="20" fill="url(#blueGrad)" opacity="0.9"/>
    
    <!-- Result colors -->
    <g transform="translate(280, 160)">
      <circle cx="0" cy="0" r="12" fill="#ff00ff" class="pulse-anim"/>
      <text x="20" y="4" font-family="Arial" font-size="9" fill="#666">Magenta</text>
    </g>
    <g transform="translate(315, 160)">
      <circle cx="0" cy="0" r="12" fill="#ffff00" class="pulse-anim"/>
      <text x="20" y="4" font-family="Arial" font-size="9" fill="#666">Yellow</text>
    </g>
    <g transform="translate(350, 160)">
      <circle cx="0" cy="0" r="12" fill="#00ffff" class="pulse-anim"/>
      <text x="20" y="4" font-family="Arial" font-size="9" fill="#666">Cyan</text>
    </g>
    
    <text x="315" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" class="float-anim">+ = White</text>
  </g>
  
  <!-- Section 3: Bit Depth Visualization -->
  <g class="section-3" data-narration="Each color channel uses 8 bits, allowing 256 intensity levels per channel, resulting in over 16.7 million possible colors">
    <rect x="15" y="215" width="180" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="25" y="233" font-family="Arial" font-size="13" font-weight="bold" fill="#333">8-Bit per Channel</text>
    
    <!-- Gradient bars -->
    <rect x="25" y="245" width="160" height="12" rx="3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <defs>
      <linearGradient id="rGrad">
        <stop offset="0%" stop-color="#000"/>
        <stop offset="100%" stop-color="#f00"/>
      </linearGradient>
      <linearGradient id="gGrad">
        <stop offset="0%" stop-color="#000"/>
        <stop offset="100%" stop-color="#0f0"/>
      </linearGradient>
      <linearGradient id="bGrad">
        <stop offset="0%" stop-color="#000"/>
        <stop offset="100%" stop-color="#00f"/>
      </linearGradient>
    </defs>
    <rect x="25" y="245" width="160" height="12" rx="3" fill="url(#rGrad)"/>
    <rect x="25" y="262" width="160" height="12" rx="3" fill="url(#gGrad)"/>
    <rect x="25" y="279" width="160" height="12" rx="3" fill="url(#bGrad)"/>
    
    <text x="30" y="256" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">R</text>
    <text x="30" y="273" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">G</text>
    <text x="30" y="290" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">B</text>
    
    <text x="105" y="302" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">0-255 levels each</text>
  </g>
  
  <!-- Section 4: Animation Concepts -->
  <g class="section-4" data-narration="Animation fundamentals include keyframes, interpolation, and timing. In SVG, CSS animations create smooth visual effects">
    <rect x="225" y="215" width="180" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="235" y="233" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Animation Basics</text>
    
    <!-- Timeline representation -->
    <line x1="240" y1="265" x2="390" y2="265" stroke="#ccc" stroke-width="2"/>
    <circle cx="255" cy="265" r="5" fill="#e74c3c" class="pulse-anim"/>
    <circle cx="315" cy="265" r="5" fill="#f39c12" class="pulse-anim" style="animation-delay:0.3s"/>
    <circle cx="375" cy="265" r="5" fill="#3498db" class="pulse-anim" style="animation-delay:0.6s"/>
    
    <text x="255" y="280" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Start</text>
    <text x="315" y="280" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Tween</text>
    <text x="375" y="280" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">End</text>
    
    <text x="315" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Interpolation</text>
  </g>
  
  <!-- Section 5: Key Formula -->
  <g class="section-5" data-narration="The total number of colors is calculated as 256³ or 16,777,216 possible combinations">
    <rect x="15" y="310" width="390" height="70" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="25" y="328" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Key Formula</text>
    
    <g transform="translate(25, 345)">
      <text x="0" y="0" font-family="Arial" font-size="11" fill="#555">Total Colors = 256³ =</text>
      <text x="120" y="0" font-family="Arial" font-size="14" fill="#e74c3c" font-weight="bold">16,777,216</text>
      <text x="0" y="18" font-family="Arial" font-size="10" fill="#888">RGB(255,255,255) = White | RGB(0,0,0) = Black</text>
    </g>
    
    <!-- Animated color demo -->
    <circle cx="350" cy="345" r="15" fill="#808080" class="color-dot"/>
  </g>
  
  <!-- Arrows/Connectors -->
  <g class="section-5" opacity="0.6">
    <path d="M195 140 Q210 140 225 140" stroke="#3498db" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <path d="M195 255 Q210 255 225 255" stroke="#3498db" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Footer -->
  <text x="210" y="395" text-anchor="middle" font-family="Arial" font-size="9" fill="#aaa">DU Computer Science - Graphics Fundamentals</text>
</svg>