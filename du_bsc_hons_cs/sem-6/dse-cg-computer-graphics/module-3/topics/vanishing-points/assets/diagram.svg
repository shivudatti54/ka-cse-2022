<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="vanishing-points">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#B0E0E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trackGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A3728;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6B4423;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A3728;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }
    @keyframes pulseGlow {
      0%, 100% { r: 8; opacity: 0.8; }
      50% { r: 12; opacity: 0.4; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .section-2 { animation: slideInRight 0.8s ease-out 0.5s both; }
    .section-3 { animation: slideInUp 0.8s ease-out 0.7s both; }
    .section-4 { animation: fadeIn 0.8s ease-out 0.9s both; }
    .section-5 { animation: slideInLeft 0.8s ease-out 1.1s both; }
    .section-6 { animation: slideInRight 0.8s ease-out 1.3s both; }
    .vp-pulse { animation: pulseGlow 2s ease-in-out infinite; }
    .vp-core { animation: pulse 2s ease-in-out infinite; }
    .track { animation: fadeIn 1.5s ease-out; }
    .sleeper { animation: fadeIn 1.2s ease-out; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="200" fill="url(#skyGradient)" />
  <rect x="0" y="200" width="420" height="200" fill="url(#groundGradient)" />
  
  <!-- Horizon Line -->
  <line x1="0" y1="200" x2="420" y2="200" stroke="#2F4F4F" stroke-width="2" class="section-1" />
  
  <!-- Ground Plane Grid Lines (perspective) -->
  <g class="section-1" opacity="0.3">
    <line x1="210" y1="200" x2="0" y2="400" stroke="#2F4F4F" stroke-width="1" />
    <line x1="210" y1="200" x2="70" y2="400" stroke="#2F4F4F" stroke-width="1" />
    <line x1="210" y1="200" x2="140" y2="400" stroke="#2F4F4F" stroke-width="1" />
    <line x1="210" y1="200" x2="210" y2="400" stroke="#2F4F4F" stroke-width="1" />
    <line x1="210" y1="200" x2="280" y2="400" stroke="#2F4F4F" stroke-width="1" />
    <line x1="210" y1="200" x2="350" y2="400" stroke="#2F4F4F" stroke-width="1" />
    <line x1="210" y1="200" x2="420" y2="400" stroke="#2F4F4F" stroke-width="1" />
  </g>
  
  <!-- Railway Tracks -->
  <g class="track">
    <!-- Left Rail -->
    <polygon points="210,200 100,400 120,400 210,200" fill="#5D4037" />
    <polygon points="210,200 100,400 120,400" fill="none" stroke="#3E2723" stroke-width="1"/>
    <!-- Right Rail -->
    <polygon points="210,200 320,400 300,400 210,200" fill="#5D4037" />
    <polygon points="210,200 320,400 300,400" fill="none" stroke="#3E2723" stroke-width="1"/>
    <!-- Rail tops highlight -->
    <line x1="110" y1="395" x2="125" y2="395" stroke="#8D6E63" stroke-width="3" />
    <line x1="295" y1="395" x2="310" y2="395" stroke="#8D6E63" stroke-width="3" />
  </g>
  
  <!-- Sleepers (wooden ties) -->
  <g class="sleeper">
    <rect x="85" y="380" width="70" height="12" fill="#6D4C41" rx="2" />
    <rect x="100" y="350" width="50" height="10" fill="#6D4C41" rx="2" />
    <rect x="115" y="325" width="35" height="8" fill="#6D4C41" rx="2" />
    <rect x="128" y="305" width="25" height="6" fill="#6D4C41" rx="1" />
    <rect x="138" y="290" width="18" height="5" fill="#6D4C41" rx="1" />
    <rect x="145" y="278" width="14" height="4" fill="#6D4C41" rx="1" />
    <rect x="150" y="268" width="12" height="3" fill="#6D4C41" rx="1" />
    <rect x="154" y="260" width="10" height="3" fill="#6D4C41" rx="1" />
    <rect x="157" y="254" width="8" height="2" fill="#6D4C41" rx="1" />
    <rect x="159" y="249" width="6" height="2" fill="#6D4C41" rx="1" />
    <rect x="160" y="245" width="5" height="2" fill="#6D4C41" rx="1" />
    <rect x="161" y="242" width="4" height="2" fill="#6D4C41" rx="1" />
    <rect x="162" y="240" width="3" height="2" fill="#6D4C41" rx="1" />
  </g>
  
  <!-- Vanishing Point -->
  <g class="section-2">
    <circle cx="210" cy="200" r="15" fill="#FF6B6B" class="vp-pulse" />
    <circle cx="210" cy="200" r="6" fill="#FF0000" class="vp-core" />
  </g>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#2F4F4F" class="title">Vanishing Points</text>
  <text x="210" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#4A4A4A" class="title">1-Point Perspective: Railway Track</text>
  
  <!-- Labels with Arrows -->
  
  <!-- Horizon Line Label -->
  <g class="section-3">
    <line x1="50" y1="200" x2="90" y2="200" stroke="#2F4F4F" stroke-width="1.5" />
    <polygon points="90,200 82,196 82,204" fill="#2F4F4F" />
    <rect x="5" y="185" width="50" height="30" fill="white" rx="4" filter="url(#shadow)" opacity="0.9"/>
    <text x="30" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F4F4F" font-weight="bold">Horizon</text>
    <text x="30" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4A4A4A">Line</text>
  </g>
  
  <!-- Vanishing Point Label -->
  <g class="section-4">
    <line x1="270" y1="165" x2="235" y2="185" stroke="#2F4F4F" stroke-width="1.5" />
    <polygon points="235,185 230,178 242,180" fill="#2F4F4F" />
    <rect x="265" y="135" width="70" height="35" fill="white" rx="4" filter="url(#shadow)" opacity="0.9"/>
    <text x="300" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F4F4F" font-weight="bold">Vanishing</text>
    <text x="300" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F4F4F" font-weight="bold">Point</text>
  </g>
  
  <!-- Parallel Tracks Label -->
  <g class="section-5">
    <line x1="50" y1="370" x2="130" y2="370" stroke="#2F4F4F" stroke-width="1.5" />
    <polygon points="130,370 123,364 123,376" fill="#2F4F4F" />
    <rect x="5" y="355" width="55" height="30" fill="white" rx="4" filter="url(#shadow)" opacity="0.9"/>
    <text x="32" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F" font-weight="bold">Parallel</text>
    <text x="32" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F" font-weight="bold">Tracks</text>
  </g>
  
  <!-- Sleepers Label -->
  <g class="section-6">
    <line x1="380" y1="380" x2="320" y2="375" stroke="#2F4F4F" stroke-width="1.5" />
    <polygon points="320,375 326,368 328,380" fill="#2F4F4F" />
    <rect x="350" y="355" width="60" height="30" fill="white" rx="4" filter="url(#shadow)" opacity="0.9"/>
    <text x="380" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F" font-weight="bold">Wooden</text>
    <text x="380" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F" font-weight="bold">Sleepers</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-3">
    <rect x="10" y="85" width="130" height="55" fill="#FFFACD" rx="5" stroke="#DAA520" stroke-width="1.5" filter="url(#shadow)" />
    <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B4513" font-weight="bold">Key Concept:</text>
    <text x="75" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4A4A4A">Parallel lines converge</text>
    <text x="75" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4A4A4A">at vanishing point</text>
    <text x="75" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">on horizon line</text>
  </g>
  
  <!-- Depth Indicator -->
  <g class="section-4">
    <rect x="280" y="85" width="130" height="55" fill="#E6E6FA" rx="5" stroke="#9370DB" stroke-width="1.5" filter="url(#shadow)" />
    <text x="345" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4B0082" font-weight="bold">Perspective Effect:</text>
    <text x="345" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4A4A4A">Objects appear smaller</text>
    <text x="345" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4A4A4A">as distance increases</text>
    <text x="345" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">(3D to 2D projection)</text>
  </g>
  
  <!-- Data narration attributes for accessibility -->
  <title data-narration="Vanishing Points: A diagram showing 1-point perspective with railway tracks converging to a single vanishing point on the horizon line">Title</title>
  <desc data-narration="The horizon line divides the sky from the ground. Two parallel railway tracks converge at a vanishing point on the horizon. Wooden sleepers between the tracks show perspective scaling.">Description</desc>
</svg>