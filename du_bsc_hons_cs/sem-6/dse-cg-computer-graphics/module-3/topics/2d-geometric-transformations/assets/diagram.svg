<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="2d-geometric-transformations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8eeff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(80px); }
    }
    @keyframes rotateAnim {
      from { transform: rotate(0deg); }
      to { transform: rotate(45deg); }
    }
    @keyframes scaleAnim {
      from { transform: scale(1); }
      to { transform: scale(1.5); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: white; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .sublabel { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #666; }
    .matrix-text { font-family: 'Courier New', monospace; font-size: 13px; fill: #444; }
    .section-box { animation: fadeIn 1s ease-out; }
    .section-title { animation: slideIn 0.8s ease-out; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #667eea; stroke-width: 2; }
    .grid-line { stroke: #ddd; stroke-width: 0.5; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="420" height="50" fill="url(#headerGradient)" rx="0"/>
  <text x="210" y="32" text-anchor="middle" class="title">2D Geometric Transformations</text>
  
  <!-- Section 1: Homogeneous Coordinates -->
  <g class="section-box" data-narration="Homogeneous coordinates add a third coordinate (w=1) to 2D points, enabling unified matrix representation of all transformations including translation.">
    <rect x="10" y="65" width="130" height="85" fill="url(#boxGradient)" rx="8" filter="url(#shadow)"/>
    <text x="20" y="82" class="label" font-weight="bold">Homogeneous Coords</text>
    <text x="20" y="105" class="matrix-text">P(x,y) → P'(x,y,1)</text>
    <text x="20" y="125" class="sublabel">3×1 column vector</text>
    <text x="20" y="140" class="sublabel">Enables matrix form</text>
  </g>
  
  <!-- Section 2: Translation -->
  <g class="section-box" data-narration="Translation moves an object from one position to another using a translation vector (dx, dy). The matrix shows how points shift in homogeneous coordinates.">
    <rect x="155" y="65" width="140" height="85" fill="url(#boxGradient)" rx="8" filter="url(#shadow)"/>
    <text x="165" y="82" class="label" font-weight="bold">Translation</text>
    <text x="165" y="102" class="matrix-text">T = | 1  0  tx |</text>
    <text x="165" y="117" class="matrix-text">    | 0  1  ty |</text>
    <text x="165" y="132" class="matrix-text">    | 0  0   1 |</text>
  </g>
  
  <!-- Section 3: Rotation -->
  <g class="section-box" data-narration="Rotation rotates an object around the origin by angle θ. The rotation matrix uses cosine and sine functions to compute new coordinates.">
    <rect x="310" y="65" width="100" height="85" fill="url(#boxGradient)" rx="8" filter="url(#shadow)"/>
    <text x="320" y="82" class="label" font-weight="bold">Rotation</text>
    <text x="320" y="102" class="matrix-text">R = | cosθ -sinθ 0 |</text>
    <text x="320" y="117" class="matrix-text">    | sinθ  cosθ 0 |</text>
    <text x="320" y="132" class="matrix-text">    |  0     0   1 |</text>
  </g>
  
  <!-- Section 4: Scaling -->
  <g class="section-box" data-narration="Scaling enlarges or shrinks an object using scale factors sx and sy. Values greater than 1 enlarge, values between 0 and 1 shrink the object.">
    <rect x="10" y="160" width="130" height="70" fill="url(#boxGradient)" rx="8" filter="url(#shadow)"/>
    <text x="20" y="177" class="label" font-weight="bold">Scaling</text>
    <text x="20" y="197" class="matrix-text">S = | sx  0  0 |</text>
    <text x="20" y="212" class="matrix-text">    |  0 sy  0 |</text>
    <text x="20" y="227" class="matrix-text">    |  0  0  1 |</text>
  </g>
  
  <!-- Visual: Translation Diagram -->
  <g class="section-box" data-narration="This diagram visualizes translation: the original object (blue square) moves to a new position (purple square) along the translation vector shown in green.">
    <rect x="155" y="160" width="255" height="150" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="165" y="178" class="label" font-weight="bold">Translation Visualization</text>
    
    <!-- Grid -->
    <line x1="180" y1="280" x2="390" y2="280" class="grid-line"/>
    <line x1="180" y1="250" x2="390" y2="250" class="grid-line"/>
    <line x1="180" y1="220" x2="390" y2="220" class="grid-line"/>
    <line x1="180" y1="190" x2="390" y2="190" class="grid-line"/>
    <line x1="210" y1="300" x2="210" y2="180" class="grid-line"/>
    <line x1="260" y1="300" x2="260" y2="180" class="grid-line"/>
    <line x1="310" y1="300" x2="310" y2="180" class="grid-line"/>
    <line x1="360" y1="300" x2="360" y2="180" class="grid-line"/>
    
    <!-- Original Object -->
    <g class="anim-pulse" style="transform-origin: 220px 260px;">
      <rect x="200" y="240" width="40" height="40" fill="#667eea" rx="4" opacity="0.8">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="205" y="295" class="sublabel" fill="#667eea">Original</text>
    
    <!-- Arrow showing translation -->
    <line x1="220" y1="260" x2="300" y2="260" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowhead)"/>
    <polygon points="300,260 290,255 290,265" fill="#22c55e"/>
    <text x="250" y="250" class="sublabel" fill="#22c55e">(tx, 0)</text>
    
    <!-- Translated Object -->
    <g style="transform-origin: 300px 260px;">
      <rect x="280" y="240" width="40" height="40" fill="#764ba2" rx="4" opacity="0.9">
        <animate attributeName="x" from="200" to="280" dur="1.5s" fill="freeze" begin="0.5s"/>
      </rect>
    </g>
    <text x="285" y="295" class="sublabel" fill="#764ba2">Translated</text>
    
    <!-- Vertical translation arrow -->
    <line x1="320" y1="260" x2="320" y2="200" stroke="#22c55e" stroke-width="3"/>
    <polygon points="320,200 315,210 325,210" fill="#22c55e"/>
    <text x="330" y="235" class="sublabel" fill="#22c55e">(0, ty)</text>
    
    <!-- Final position -->
    <rect x="280" y="180" width="40" height="40" fill="#9f7aea" rx="4" opacity="0.9"/>
    <text x="285" y="235" class="sublabel" fill="#9f7aea">Final</text>
  </g>
  
  <!-- Key Points Box -->
  <g class="section-box" data-narration="Key points to remember: Homogeneous coordinates enable unified transformation matrices, and all basic transformations (translation, rotation, scaling) can be combined using matrix multiplication.">
    <rect x="10" y="320" width="400" height="70" fill="#fef3c7" rx="8" filter="url(#shadow)"/>
    <text x="20" y="340" class="label" font-weight="bold" fill="#92400e">Key Concepts</text>
    <text x="20" y="360" class="sublabel" fill="#78350f">• All transformations use 3×3 matrices in homogeneous coordinates</text>
    <text x="20" y="378" class="sublabel" fill="#78350f">• Matrix multiplication composes multiple transformations</text>
    <text x="210" y="378" class="sublabel" fill="#78350f">• Order matters: T × R ≠ R × T</text>
  </g>
  
  <!-- Axis labels -->
  <text x="405" y="295" class="sublabel" fill="#888">X</text>
  <text x="205" y="175" class="sublabel" fill="#888">Y</text>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="8" fill="#fcd34d" opacity="0.5"/>
  <circle cx="390" cy="370" r="12" fill="#93c5fd" opacity="0.4"/>
  <circle cx="50" cy="380" r="6" fill="#c4b5fd" opacity="0.4"/>
</svg>