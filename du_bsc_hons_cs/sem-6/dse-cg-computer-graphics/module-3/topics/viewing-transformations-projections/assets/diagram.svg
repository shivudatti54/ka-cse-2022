<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="viewing-transformations-projections">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8bb8d8"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffb74d"/>
    </linearGradient>
    <linearGradient id="matrixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ba68c8"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw-line { stroke-dasharray: 100; animation: drawLine 1.5s ease-out forwards; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .matrix-cell { font-family: monospace; font-size: 11px; fill: #fff; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Viewing Transformations</text>
  <text x="210" y="50" text-anchor="middle" class="label slide-in" style="animation-delay: 0.2s">&amp; Projections</text>
  
  <!-- Pipeline Section -->
  <g class="slide-in" style="animation-delay: 0.3s">
    <rect x="15" y="70" width="390" height="100" rx="8" fill="white" stroke="#3498db" stroke-width="2" data-narration="The viewing pipeline converts 3D coordinates to 2D screen coordinates through 5 stages"/>
    <text x="25" y="88" class="label" style="font-weight: bold;">Viewing Pipeline</text>
    
    <!-- Pipeline Stages -->
    <g transform="translate(30, 105)">
      <rect x="0" y="0" width="55" height="35" rx="4" fill="url(#boxGradient1)" data-narration="Object Coordinates - Local coordinate system of the 3D model"/>
      <text x="27" y="22" text-anchor="middle" class="detail" fill="#fff">Object</text>
    </g>
    
    <g transform="translate(95, 105)">
      <rect x="0" y="0" width="55" height="35" rx="4" fill="url(#boxGradient2)" data-narration="World Coordinates - Scene's global coordinate system after placement"/>
      <text x="27" y="22" text-anchor="middle" class="detail" fill="#fff">World</text>
    </g>
    
    <g transform="translate(160, 105)">
      <rect x="0" y="0" width="55" height="35" rx="4" fill="url(#boxGradient3)" data-narration="View Coordinates - Camera's local coordinate system"/>
      <text x="27" y="22" text-anchor="middle" class="detail" fill="#fff">View</text>
    </g>
    
    <g transform="translate(225, 105)">
      <rect x="0" y="0" width="55" height="35" rx="4" fill="url(#boxGradient1)" data-narration="Normalized Device Coordinates - Device-independent coordinate system"/>
      <text x="27" y="22" text-anchor="middle" class="detail" fill="#fff">NDC</text>
    </g>
    
    <g transform="translate(290, 105)">
      <rect x="0" y="0" width="55" height="35" rx="4" fill="url(#boxGradient2)" data-narration="Screen Coordinates - Final 2D pixel positions on display"/>
      <text x="27" y="22" text-anchor="middle" class="detail" fill="#fff">Screen</text>
    </g>
    
    <!-- Arrows -->
    <path d="M85 122 L95 122" stroke="#e74c3c" stroke-width="2" class="draw-line"/>
    <path d="M150 122 L160 122" stroke="#e74c3c" stroke-width="2" class="draw-line" style="animation-delay: 0.2s"/>
    <path d="M215 122 L225 122" stroke="#e74c3c" stroke-width="2" class="draw-line" style="animation-delay: 0.4s"/>
    <path d="M280 122 L290 122" stroke="#e74c3c" stroke-width="2" class="draw-line" style="animation-delay: 0.6s"/>
  </g>
  
  <!-- Matrix Section -->
  <g class="fade-in" style="animation-delay: 0.5s">
    <rect x="15" y="180" width="180" height="90" rx="8" fill="white" stroke="#9b59b6" stroke-width="2" data-narration="The 4x4 Viewing Transformation Matrix combines translation, rotation, and scaling"/>
    <text x="25" y="198" class="label" style="font-weight: bold;">Viewing Matrix (4x4)</text>
    
    <g transform="translate(30, 210)">
      <rect x="0" y="0" width="150" height="55" rx="4" fill="url(#matrixGradient)"/>
      <text x="10" y="15" class="matrix-cell">| 1  0  0  0 |</text>
      <text x="10" y="28" class="matrix-cell">| 0  1  0  0 |  =  R × T × S</text>
      <text x="10" y="41" class="matrix-cell">| 0  0  1  0 |</text>
      <text x="10" y="54" class="matrix-cell">| tx ty tz 1 |</text>
    </g>
  </g>
  
  <!-- Transformations Section -->
  <g class="slide-in" style="animation-delay: 0.6s">
    <rect x="205" y="180" width="200" height="90" rx="8" fill="white" stroke="#27ae60" stroke-width="2" data-narration="Three fundamental transformations: Translation moves objects, Rotation turns them, Scaling changes size"/>
    <text x="215" y="198" class="label" style="font-weight: bold;">Transformations</text>
    
    <g transform="translate(220, 210)">
      <circle cx="20" cy="25" r="15" fill="#3498db" class="pulse" data-narration="Translation - Shifts object position by (tx, ty, tz)"/>
      <text x="20" y="29" text-anchor="middle" class="detail" fill="#fff" font-size="10">T</text>
      <text x="50" y="28" class="detail">Translation</text>
    </g>
    
    <g transform="translate(220, 245)">
      <circle cx="20" cy="15" r="15" fill="#e74c3c" class="pulse" style="animation-delay: 0.5s" data-narration="Rotation - Rotates object around axes by angle θ"/>
      <text x="20" y="19" text-anchor="middle" class="detail" fill="#fff" font-size="10">R</text>
      <text x="50" y="18" class="detail">Rotation</text>
    </g>
    
    <g transform="translate(305, 245)">
      <circle cx="20" cy="15" r="15" fill="#f39c12" class="pulse" style="animation-delay: 1s" data-narration="Scaling - Uniform or non-uniform size change by factors sx, sy, sz"/>
      <text x="20" y="19" text-anchor="middle" class="detail" fill="#fff" font-size="10">S</text>
      <text x="50" y="18" class="detail">Scaling</text>
    </g>
  </g>
  
  <!-- Projections Section -->
  <g class="fade-in" style="animation-delay: 0.7s">
    <rect x="15" y="280" width="390" height="110" rx="8" fill="white" stroke="#e67e22" stroke-width="2" data-narration="Projection transformations map 3D coordinates to 2D - perspective shows depth, orthographic keeps parallel lines"/>
    <text x="25" y="298" class="label" style="font-weight: bold;">Projection Types</text>
    
    <!-- Perspective Projection -->
    <g transform="translate(30, 315)">
      <polygon points="30,0 60,30 60,60 0,60" fill="#3498db" opacity="0.7" data-narration="Perspective Projection - Objects shrink with distance, parallel lines converge"/>
      <text x="30" y="75" text-anchor="middle" class="detail">Perspective</text>
      <text x="30" y="88" text-anchor="middle" class="detail" font-size="10">Depth illusion</text>
      <!-- Vanishing point lines -->
      <line x1="15" y1="45" x2="45" y2="30" stroke="#2c3e50" stroke-width="1" stroke-dasharray="3"/>
      <line x1="45" y1="45" x2="45" y2="30" stroke="#2c3e50" stroke-width="1" stroke-dasharray="3"/>
    </g>
    
    <!-- Orthographic Projection -->
    <g transform="translate(130, 315)">
      <rect x="15" y="15" width="30" height="30" fill="#27ae60" opacity="0.7" data-narration="Orthographic Projection - No depth distortion, parallel lines remain parallel"/>
      <text x="30" y="75" text-anchor="middle" class="detail">Orthographic</text>
      <text x="30" y="88" text-anchor="middle" class="detail" font-size="10">True size</text>
      <line x1="15" y1="15" x2="45" y2="15" stroke="#2c3e50" stroke-width="1"/>
      <line x1="15" y1="45" x2="45" y2="45" stroke="#2c3e50" stroke-width="1"/>
    </g>
    
    <!-- Top View -->
    <g transform="translate(240, 315)">
      <ellipse cx="30" cy="30" rx="20" ry="10" fill="#9b59b6" opacity="0.5"/>
      <text x="30" y="75" text-anchor="middle" class="detail">Top View</text>
      <text x="30" y="88" text-anchor="middle" class="detail" font-size="10">XY plane</text>
    </g>
    
    <!-- Front View -->
    <g transform="translate(330, 315)">
      <rect x="15" y="15" width="30" height="30" fill="#e74c3c" opacity="0.5"/>
      <text x="30" y="75" text-anchor="middle" class="detail">Front View</text>
      <text x="30" y="88" text-anchor="middle" class="detail" font-size="10">XZ plane</text>
    </g>
  </g>
  
  <!-- Arrow showing flow to projection -->
  <path d="M210 270 L210 280" stroke="#e74c3c" stroke-width="2" class="draw-line"/>
</svg>