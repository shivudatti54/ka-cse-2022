<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="3d-geometric-transformations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8e4f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c9b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b894c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94b5c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="matrixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d4bc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate3D {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box1-anim { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2-anim { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3-anim { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .matrix-anim { animation: fadeIn 0.8s ease-out 0.5s forwards; opacity: 0; }
    .coords-anim { animation: slideInUp 0.6s ease-out 0.3s forwards; opacity: 0; }
    .arrow-anim { animation: pulse 2s ease-in-out infinite; }
    .pipeline-anim { animation: fadeIn 0.8s ease-out 0.7s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title-anim">3D Geometric Transformations</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#5d7ea1" stroke-width="2" class="title-anim" />
  
  <!-- 3D Coordinate System -->
  <g class="coords-anim" data-narration="The 3D coordinate system uses X, Y, and Z axes. Points are represented as (x, y, z) and extended to homogeneous coordinates (x, y, z, 1) for matrix operations.">
    <text x="365" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">3D Space</text>
    <!-- X axis -->
    <line x1="345" y1="95" x2="385" y2="95" stroke="#e74c3c" stroke-width="2" />
    <polygon points="388,95 383,92 383,98" fill="#e74c3c" />
    <text x="390" y="99" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">X</text>
    <!-- Y axis -->
    <line x1="365" y1="95" x2="365" y2="55" stroke="#27ae60" stroke-width="2" />
    <polygon points="365,52 362,57 368,57" fill="#27ae60" />
    <text x="370" y="55" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">Y</text>
    <!-- Z axis (perspective) -->
    <line x1="365" y1="95" x2="390" y2="115" stroke="#3498db" stroke-width="2" />
    <polygon points="393,115 388,112 388,118" fill="#3498db" />
    <text x="393" y="122" font-family="Arial, sans-serif" font-size="12" fill="#3498db">Z</text>
    <!-- Origin point -->
    <circle cx="365" cy="95" r="4" fill="#2c3e50" />
    <!-- Sample point -->
    <circle cx="378" cy="70" r="4" fill="#8e44ad" />
    <line x1="365" y1="95" x2="378" y2="70" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="382" y="65" font-family="Arial, sans-serif" font-size="11" fill="#8e44ad">P(x,y,z)</text>
  </g>
  
  <!-- Transformation Box 1: Translation -->
  <g class="box1-anim" data-narration="Translation moves an object along the X, Y, and Z axes by adding translation values (tx, ty, tz) to each coordinate point.">
    <rect x="20" y="130" width="110" height="70" rx="8" fill="url(#boxGradient1)" stroke="#6a9e87" stroke-width="1.5" />
    <text x="75" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a4a3a">Translation</text>
    <text x="75" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c5e4f">T(tx, ty, tz)</text>
    <text x="75" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3d7a64">Shifts position</text>
  </g>
  
  <!-- Transformation Box 2: Rotation -->
  <g class="box2-anim" data-narration="Rotation rotates an object around the X, Y, or Z axis by a specified angle. Each axis rotation uses different formulas based on trigonometric functions.">
    <rect x="155" y="130" width="110" height="70" rx="8" fill="url(#boxGradient2)" stroke="#9b7ba8" stroke-width="1.5" />
    <text x="210" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a2a6a">Rotation</text>
    <text x="210" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5e3a7a">R(θx, θy, θz)</text>
    <text x="210" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#704a8a">Rotates around axes</text>
  </g>
  
  <!-- Transformation Box 3: Scaling -->
  <g class="box3-anim" data-narration="Scaling changes an object's size along each dimension using scale factors (sx, sy, sz). Values greater than 1 enlarge, values less than 1 shrink.">
    <rect x="290" y="130" width="110" height="70" rx="8" fill="url(#boxGradient3)" stroke="#6a8fa8" stroke-width="1.5" />
    <text x="345" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2a4a5a">Scaling</text>
    <text x="345" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3a5a6a">S(sx, sy, sz)</text>
    <text x="345" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a6a7a">Changes size</text>
  </g>
  
  <!-- Arrows between boxes -->
  <g class="arrow-anim">
    <path d="M130 165 L150 165" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
    <path d="M265 165 L285 165" stroke="#7f8c8d" stroke-width="2" fill="none" />
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d" />
    </marker>
  </defs>
  
  <!-- Homogeneous Coordinates Matrix -->
  <g class="matrix-anim" data-narration="Homogeneous coordinates use a 4×4 matrix to represent all transformations in a unified form. This allows combining multiple transformations through matrix multiplication.">
    <text x="75" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5d4e37">4×4 Homogeneous Matrix</text>
    <rect x="25" y="232" width="100" height="55" rx="4" fill="url(#matrixGradient)" stroke="#b89a72" stroke-width="1" />
    <!-- Matrix grid -->
    <g transform="translate(30, 240)">
      <line x1="0" y1="13" x2="90" y2="13" stroke="#8b7355" stroke-width="0.5" />
      <line x1="0" y1="26" x2="90" y2="26" stroke="#8b7355" stroke-width="0.5" />
      <line x1="0" y1="39" x2="90" y2="39" stroke="#8b7355" stroke-width="0.5" />
      <line x1="22" y1="0" x2="22" y2="52" stroke="#8b7355" stroke-width="0.5" />
      <line x1="45" y1="0" x2="45" y2="52" stroke="#8b7355" stroke-width="0.5" />
      <line x1="67" y1="0" x2="67" y2="52" stroke="#8b7355" stroke-width="0.5" />
      <!-- Matrix values -->
      <text x="11" y="10" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">R</text>
      <text x="33" y="10" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">00</text>
      <text x="56" y="10" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">0</text>
      <text x="79" y="10" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">Tx</text>
      <text x="11" y="23" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">0</text>
      <text x="33" y="23" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">R</text>
      <text x="56" y="23" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">0</text>
      <text x="79" y="23" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">Ty</text>
      <text x="11" y="36" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">0</text>
      <text x="33" y="36" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">0</text>
      <text x="56" y="36" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">R</text>
      <text x="79" y="36" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">Tz</text>
      <text x="11" y="49" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">0</text>
      <text x="33" y="49" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">0</text>
      <text x="56" y="49" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">0</text>
      <text x="79" y="49" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#5d4e37">1</text>
    </g>
  </g>
  
  <!-- Pipeline Concept -->
  <g class="pipeline-anim" data-narration="The transformation pipeline applies transformations in sequence: Model → World → View → Screen coordinates. Matrix multiplication combines these operations efficiently.">
    <text x="290" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Transformation Pipeline</text>
    <!-- Pipeline boxes -->
    <rect x="230" y="232" width="55" height="20" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" />
    <text x="257" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Model</text>
    
    <rect x="295" y="232" width="55" height="20" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" />
    <text x="322" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">World</text>
    
    <rect x="360" y="232" width="55" height="20" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" />
    <text x="387" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">View</text>
    
    <!-- Arrows in pipeline -->
    <line x1="285" y1="242" x2="290" y2="242" stroke="#7f8c8d" stroke-width="1.5" />
    <line x1="350" y1="242" x2="355" y2="242" stroke="#7f8c8d" stroke-width="1.5" />
  </g>
  
  <!-- Key Formulas -->
  <g class="matrix-anim" data-narration="The combined transformation matrix allows a single matrix multiplication to apply translation, rotation, and scaling simultaneously to any 3D point.">
    <text x="75" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Point Transformation</text>
    <rect x="25" y="318" width="100" height="35" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1" />
    <text x="75" y="335" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#2c3e50">[x' y' z' 1] = [x y z 1] × M</text>
    <text x="75" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">Combined 4×4 matrix</text>
  </g>
  
  <!-- Application Areas -->
  <g class="pipeline-anim" data-narration="3D transformations are fundamental to computer graphics applications including video games, CAD systems, scientific visualization, virtual reality, and animation films.">
    <text x="290" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Applications</text>
    <rect x="230" y="318" width="185" height="35" rx="4" fill="#eaf2f8" stroke="#5d7ea1" stroke-width="1" />
    <text x="322" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Games • CAD • VR • Animation</text>
    <text x="322" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">Scientific Visualization</text>
  </g>
  
  <!-- Bottom note -->
  <text x="210" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d7ea1" font-style="italic">Foundation of Computer Graphics Pipeline</text>
  <line x1="80" y1="382" x2="340" y2="382" stroke="#bdc3c7" stroke-width="1" />
  
  <!-- Animated cube representation -->
  <g transform="translate(380, 340)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 15 15" to="360 15 15" dur="8s" repeatCount="indefinite" />
      <polygon points="0,0 30,0 30,30 0,30" fill="none" stroke="#3498db" stroke-width="1" opacity="0.5" />
      <polygon points="5,5 25,5 25,25 5,25" fill="#a9d4e5" stroke="#3498db" stroke-width="1.5" opacity="0.7" />
    </g>
  </g>
</svg>