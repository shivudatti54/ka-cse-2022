<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="polygon-mesh-representation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90c2"/>
    </linearGradient>
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7cc0d6"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.3s; opacity: 0; }
    .delay-2 { animation-delay: 0.6s; opacity: 0; }
    .delay-3 { animation-delay: 0.9s; opacity: 0; }
    .delay-4 { animation-delay: 1.2s; opacity: 0; }
    .delay-5 { animation-delay: 1.5s; opacity: 0; }
    .vertex-point { animation: pulse 2s ease-in-out infinite; }
    .edge-line {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawLine 0.5s ease-out forwards;
    }
    .edge-line-delay1 { animation-delay: 0.4s; }
    .edge-line-delay2 { animation-delay: 0.6s; }
    .edge-line-delay3 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c5282" class="fade-in">
    Polygon Mesh Representation
  </text>
  
  <!-- Subtitle -->
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" class="fade-in delay-1">
    Basic Components of a 3D Mesh
  </text>
  
  <!-- 3D Cube Diagram -->
  <g transform="translate(60, 100)">
    <!-- Back face (hidden, shown as dashed) -->
    <polygon points="80,30 200,30 200,130 80,130" fill="#c5ddf0" stroke="#888" stroke-width="1" stroke-dasharray="5,3" opacity="0.5" class="fade-in delay-1"/>
    
    <!-- Connecting lines for depth -->
    <line x1="80" y1="30" x2="40" y2="60" stroke="#4a90c2" stroke-width="2" class="edge-line"/>
    <line x1="200" y1="30" x2="240" y2="60" stroke="#4a90c2" stroke-width="2" class="edge-line edge-line-delay1"/>
    <line x1="200" y1="130" x2="240" y2="100" stroke="#4a90c2" stroke-width="2" class="edge-line edge-line-delay2"/>
    <line x1="80" y1="130" x2="40" y2="100" stroke="#4a90c2" stroke-width="2" class="edge-line edge-line-delay3"/>
    
    <!-- Front face -->
    <polygon points="40,60 240,60 240,100 40,100" fill="url(#faceGradient)" stroke="#2c5282" stroke-width="2" class="fade-in delay-2"/>
    
    <!-- Edges -->
    <line x1="40" y1="60" x2="80" y2="30" stroke="#2c5282" stroke-width="2" class="edge-line"/>
    <line x1="80" y1="30" x2="200" y2="30" stroke="#2c5282" stroke-width="2" class="edge-line edge-line-delay1"/>
    <line x1="200" y1="30" x2="240" y2="60" stroke="#2c5282" stroke-width="2" class="edge-line edge-line-delay2"/>
    <line x1="240" y1="60" x2="240" y2="100" stroke="#2c5282" stroke-width="2" class="edge-line edge-line-delay3"/>
    <line x1="240" y1="100" x2="200" y2="130" stroke="#2c5282" stroke-width="2" class="edge-line"/>
    <line x1="200" y1="130" x2="80" y2="130" stroke="#2c5282" stroke-width="2" class="edge-line edge-line-delay1"/>
    <line x1="80" y1="130" x2="40" y2="100" stroke="#2c5282" stroke-width="2" class="edge-line edge-line-delay2"/>
    <line x1="40" y1="100" x2="40" y2="60" stroke="#2c5282" stroke-width="2" class="edge-line edge-line-delay3"/>
    
    <!-- Vertices (corners) -->
    <circle cx="40" cy="60" r="6" fill="#e53e3e" stroke="#c53030" stroke-width="2" class="vertex-point fade-in delay-3"/>
    <circle cx="240" cy="60" r="6" fill="#e53e3e" stroke="#c53030" stroke-width="2" class="vertex-point fade-in delay-3"/>
    <circle cx="240" cy="100" r="6" fill="#e53e3e" stroke="#c53030" stroke-width="2" class="vertex-point fade-in delay-3"/>
    <circle cx="40" cy="100" r="6" fill="#e53e3e" stroke="#c53030" stroke-width="2" class="vertex-point fade-in delay-3"/>
    <circle cx="80" cy="30" r="5" fill="#e53e3e" stroke="#c53030" stroke-width="2" class="vertex-point fade-in delay-3"/>
    <circle cx="200" cy="30" r="5" fill="#e53e3e" stroke="#c53030" stroke-width="2" class="vertex-point fade-in delay-3"/>
    <circle cx="200" cy="130" r="5" fill="#e53e3e" stroke="#c53030" stroke-width="2" class="vertex-point fade-in delay-3"/>
    <circle cx="80" cy="130" r="5" fill="#e53e3e" stroke="#c53030" stroke-width="2" class="vertex-point fade-in delay-3"/>
  </g>
  
  <!-- Labels for cube -->
  <text x="140" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c5282" font-weight="bold" class="slide-in delay-4">
    6 Faces (Squares)
  </text>
  <text x="300" y="95" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#c53030" class="slide-in delay-4">
    ● Vertices (8)
  </text>
  <text x="300" y="115" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#2c5282" class="slide-in delay-4">
    — Edges (12)
  </text>
  <text x="300" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#2c5282" class="slide-in delay-4">
    ▣ Faces (6)
  </text>
  
  <!-- Key Concept Boxes -->
  <g class="fade-in delay-4" data-narration="Vertices are points in 3D space defined by x, y, z coordinates">
    <rect x="20" y="170" width="115" height="55" rx="5" fill="#fff5f5" stroke="#fc8181" stroke-width="1"/>
    <text x="77" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c53030">Vertices</text>
    <text x="77" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#742a2a">Points in 3D space</text>
    <text x="77" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#742a2a">(x, y, z) coordinates</text>
  </g>
  
  <g class="fade-in delay-4" data-narration="Edges are line segments connecting two vertices">
    <rect x="145" y="170" width="115" height="55" rx="5" fill="#ebf8ff" stroke="#63b3ed" stroke-width="1"/>
    <text x="202" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2b6cb0">Edges</text>
    <text x="202" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c5282">Line segments</text>
    <text x="202" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c5282">Connect 2 vertices</text>
  </g>
  
  <g class="fade-in delay-4" data-narration="Faces are flat polygonal surfaces bounded by edges">
    <rect x="270" y="170" width="115" height="55" rx="5" fill="#f0fff4" stroke="#68d391" stroke-width="1"/>
    <text x="327" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#276749">Faces</text>
    <text x="327" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#22543d">Polygonal surfaces</text>
    <text x="327" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#22543d">Bounded by edges</text>
  </g>
  
  <!-- Euler's Formula -->
  <g class="slide-in delay-5" data-narration="Euler's formula relates vertices, edges, and faces: V - E + F = 2">
    <rect x="100" y="235" width="220" height="40" rx="5" fill="#fffaf0" stroke="#f6ad55" stroke-width="1"/>
    <text x="210" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c05621">Euler's Formula</text>
    <text x="210" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7b341e">V - E + F = 2 &nbsp;&nbsp;(8 - 12 + 6 = 2)</text>
  </g>
  
  <!-- Applications -->
  <g class="fade-in delay-5" data-narration="Polygon meshes are used in video games, animated films, CAD, and scientific visualization">
    <rect x="20" y="285" width="380" height="35" rx="5" fill="#faf5ff" stroke="#b794f4" stroke-width="1"/>
    <text x="210" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6b46c1">Applications:</text>
    <text x="210" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">Video Games • Animated Films • CAD • Scientific Visualization</text>
  </g>
  
  <!-- Arrow indicator -->
  <g class="pulse">
    <circle cx="210" y="350" r="15" fill="#4a90c2" opacity="0.8"/>
    <text x="210" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">V</text>
  </g>
  
  <!-- Formula breakdown -->
  <text x="210" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a5568" class="slide-in delay-5">
    V=8 (vertices) &nbsp;|&nbsp; E=12 (edges) &nbsp;|&nbsp; F=6 (faces)
  </text>
</svg>