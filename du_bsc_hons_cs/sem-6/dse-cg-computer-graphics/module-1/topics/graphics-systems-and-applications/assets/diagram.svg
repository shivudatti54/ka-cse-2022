<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="graphics-systems-and-applications">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5ce0"/>
      <stop offset="100%" style="stop-color:#5b3db8"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#26a69a"/>
      <stop offset="100%" style="stop-color:#00897b"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350"/>
      <stop offset="100%" style="stop-color:#d32f2f"/>
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d"/>
      <stop offset="100%" style="stop-color:#f57c00"/>
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInUp 0.6s ease-out 0.3s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.5s both; }
    .section-5 { animation: slideInRight 0.6s ease-out 0.6s both; }
    .section-6 { animation: slideInRight 0.6s ease-out 0.7s both; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-size: 11px; font-weight: bold; fill: white; }
    .detail-text { font-size: 9px; fill: rgba(255,255,255,0.9); }
    .arrow-text { font-size: 9px; fill: #555; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title title-text">Graphics Systems Architecture</text>
  <line x1="80" y1="35" x2="340" y2="35" stroke="#4a90d9" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- Input Devices Section -->
  <g class="section-1" data-narration="Input devices like keyboard, mouse, and graphics tablets allow users to interact with and control graphical applications">
    <rect x="15" y="55" width="70" height="80" rx="8" fill="url(#boxGradient1)"/>
    <text x="50" y="72" text-anchor="middle" class="label-text">INPUT</text>
    <text x="50" y="90" text-anchor="middle" class="detail-text">Devices</text>
    <text x="50" y="105" text-anchor="middle" class="detail-text">Keyboard</text>
    <text x="50" y="118" text-anchor="middle" class="detail-text">Mouse</text>
  </g>
  
  <!-- Arrow from Input to CPU -->
  <path d="M 90 95 L 120 95" stroke="#555" stroke-width="2" fill="none" class="arrow"/>
  <text x="102" y="88" text-anchor="middle" class="arrow-text">Data</text>
  
  <!-- CPU / Graphics Software Section -->
  <g class="section-2" data-narration="The CPU executes graphics software commands, performing calculations for geometric transformations and rendering instructions">
    <rect x="125" y="55" width="80" height="80" rx="8" fill="url(#boxGradient2)"/>
    <text x="165" y="75" text-anchor="middle" class="label-text">CPU</text>
    <text x="165" y="92" text-anchor="middle" class="detail-text">Graphics</text>
    <text x="165" y="105" text-anchor="middle" class="detail-text">Software</text>
    <text x="165" y="120" text-anchor="middle" class="detail-text">Processing</text>
  </g>
  
  <!-- Arrow from CPU to Video Controller -->
  <path d="M 210 95 L 235 95" stroke="#555" stroke-width="2" fill="none" class="arrow"/>
  <text x="220" y="88" text-anchor="middle" class="arrow-text">Cmd</text>
  
  <!-- Video Controller Section -->
  <g class="section-3" data-narration="The video controller manages the display pipeline, converting graphics commands into signals the display can render">
    <rect x="240" y="55" width="80" height="80" rx="8" fill="url(#boxGradient3)" class="pulse-anim"/>
    <text x="280" y="75" text-anchor="middle" class="label-text">VIDEO</text>
    <text x="280" y="92" text-anchor="middle" class="detail-text">Controller</text>
    <text x="280" y="108" text-anchor="middle" class="detail-text">Display</text>
    <text x="280" y="120" text-anchor="middle" class="detail-text">Pipeline</text>
  </g>
  
  <!-- Arrow from Video Controller to Frame Buffer -->
  <path d="M 325 95 L 350 95" stroke="#555" stroke-width="2" fill="none" class="arrow"/>
  <text x="335" y="88" text-anchor="middle" class="arrow-text">Signal</text>
  
  <!-- Frame Buffer Section -->
  <g class="section-4" data-narration="The frame buffer stores pixel data temporarily, holding the complete image before it's displayed on the screen">
    <rect x="355" y="55" width="55" height="80" rx="8" fill="url(#boxGradient4)"/>
    <text x="382" y="75" text-anchor="middle" class="label-text">FRAME</text>
    <text x="382" y="92" text-anchor="middle" class="detail-text">BUFFER</text>
    <text x="382" y="108" text-anchor="middle" class="detail-text">Pixel</text>
    <text x="382" y="120" text-anchor="middle" class="detail-text">Memory</text>
  </g>
  
  <!-- Vertical connection from Frame Buffer to Display -->
  <path d="M 382 140 L 382 180" stroke="#555" stroke-width="2" fill="none" class="arrow"/>
  
  <!-- Display Device Section -->
  <g class="section-5" data-narration="The display device outputs the final visual output, whether CRT, LCD, LED, or modern display technologies">
    <rect x="320" y="185" width="125" height="60" rx="8" fill="url(#boxGradient5)"/>
    <text x="382" y="210" text-anchor="middle" class="label-text">DISPLAY DEVICE</text>
    <text x="382" y="228" text-anchor="middle" class="detail-text">Monitor / Screen</text>
    <text x="382" y="238" text-anchor="middle" class="detail-text">Output</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-6" data-narration="Key concepts: raster graphics, vector graphics, color models, resolution, refresh rate, and pixel depth form the foundation of graphics systems">
    <rect x="15" y="270" width="390" height="115" rx="10" fill="white" stroke="#ddd" stroke-width="2"/>
    <text x="210" y="292" text-anchor="middle" class="title-text" style="font-size:14px; fill:#2c3e50;">KEY CONCEPTS</text>
    
    <rect x="25" y="305" width="90" height="35" rx="5" fill="#e3f2fd"/>
    <text x="70" y="322" text-anchor="middle" style="font-size:10px; fill:#1565c0; font-weight:bold;">Raster Graphics</text>
    <text x="70" y="334" text-anchor="middle" style="font-size:8px; fill:#555;">Pixel-based images</text>
    
    <rect x="125" y="305" width="90" height="35" rx="5" fill="#f3e5f5"/>
    <text x="170" y="322" text-anchor="middle" style="font-size:10px; fill:#7b1fa2; font-weight:bold;">Vector Graphics</text>
    <text x="170" y="334" text-anchor="middle" style="font-size:8px; fill:#555;">Math-based shapes</text>
    
    <rect x="225" y="305" width="90" height="35" rx="5" fill="#e8f5e9"/>
    <text x="270" y="322" text-anchor="middle" style="font-size:10px; fill:#2e7d32; font-weight:bold;">Color Models</text>
    <text x="270" y="334" text-anchor="middle" style="font-size:8px; fill:#555;">RGB, CMYK, HSL</text>
    
    <rect x="325" y="305" width="70" height="35" rx="5" fill="#fff3e0"/>
    <text x="360" y="322" text-anchor="middle" style="font-size:10px; fill:#e65100; font-weight:bold;">Resolution</text>
    <text x="360" y="334" text-anchor="middle" style="font-size:8px; fill:#555;">Pixel density</text>
    
    <rect x="25" y="345" width="90" height="30" rx="5" fill="#fce4ec"/>
    <text x="70" y="362" text-anchor="middle" style="font-size:10px; fill:#c2185b; font-weight:bold;">Refresh Rate</text>
    <text x="70" y="372" text-anchor="middle" style="font-size:8px; fill:#555;">Hz (60/120/144)</text>
    
    <rect x="125" y="345" width="90" height="30" rx="5" fill="#e0f7fa"/>
    <text x="170" y="362" text-anchor="middle" style="font-size:10px; fill:#00838f; font-weight:bold;">Pixel Depth</text>
    <text x="170" y="372" text-anchor="middle" style="font-size:8px; fill:#555;">Bits per pixel</text>
    
    <rect x="225" y="345" width="170" height="30" rx="5" fill="#f1f8e9"/>
    <text x="310" y="362" text-anchor="middle" style="font-size:10px; fill:#558b2f; font-weight:bold;">Applications</text>
    <text x="310" y="372" text-anchor="middle" style="font-size:8px; fill:#555;">Gaming, UI, CAD, Medical Imaging, VR</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="382" cy="160" r="8" fill="#ef5350" class="pulse-anim" style="animation-delay: 1s"/>
  <circle cx="382" cy="160" r="4" fill="white"/>
</svg>