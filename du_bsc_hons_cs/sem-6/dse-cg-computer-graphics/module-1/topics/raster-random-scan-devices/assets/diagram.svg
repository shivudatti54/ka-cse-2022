<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="raster-random-scan-devices" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="crtGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7a8a"/>
      <stop offset="100%" style="stop-color:#3a4a5a"/>
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes scanLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes beamPulse {
      0%, 100% { r: 6; opacity: 1; }
      50% { r: 8; opacity: 0.8; }
    }
    @keyframes verticalScan {
      from { transform: translateY(-70px); }
      to { transform: translateY(70px); }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .scan-anim { animation: scanLine 0.5s linear infinite; }
    .beam-anim { animation: beamPulse 0.3s ease-in-out infinite; }
    
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #1a252f; }
    .box-text { font-family: Arial, sans-serif; font-size: 10px; fill: #2c3e50; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Raster Scan Display Devices</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#3498db" stroke-width="2" class="fade-in"/>
  
  <!-- CRT Tube Structure -->
  <g class="slide-in" style="animation-delay: 0.2s">
    <!-- Electron Gun Assembly -->
    <rect x="40" y="90" width="60" height="30" rx="3" fill="#7f8c8d" stroke="#2c3e50" stroke-width="1.5"/>
    <rect x="30" y="95" width="15" height="20" rx="2" fill="#95a5a6" stroke="#2c3e50" stroke-width="1"/>
    <text x="70" y="78" text-anchor="middle" class="label" data-narration="Electron Gun: Emits and accelerates electron beam">Electron Gun</text>
    <text x="70" y="130" text-anchor="middle" class="detail">Cathode + Anode</text>
    
    <!-- Deflection Coils -->
    <rect x="110" y="95" width="40" height="20" rx="2" fill="#8e44ad" stroke="#2c3e50" stroke-width="1.5"/>
    <rect x="110" y="105" width="40" height="20" rx="2" fill="#9b59b6" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="130" y="88" text-anchor="middle" class="label" data-narration="Deflection Coils: Magnetic field controls beam direction">Deflection Coils</text>
    
    <!-- CRT Neck and Funnel -->
    <path d="M100 100 L160 130 L160 180 L100 200 Z" fill="url(#crtGradient)" stroke="#2c3e50" stroke-width="1.5"/>
    <path d="M160 130 L280 80 L280 240 L160 180 Z" fill="#4a5a6a" stroke="#2c3e50" stroke-width="1.5" opacity="0.8"/>
    
    <!-- Phosphor Screen -->
    <rect x="280" y="80" width="15" height="160" rx="3" fill="#f39c12" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="287" y="75" text-anchor="middle" class="label" data-narration="Phosphor Screen: Emits light when struck by electrons">Phosphor Screen</text>
    <text x="287" y="250" text-anchor="middle" class="detail">Phosphor dots</text>
  </g>
  
  <!-- Display Screen with Scan Pattern -->
  <g transform="translate(310, 100)" class="fade-in" style="animation-delay: 0.4s">
    <rect x="0" y="0" width="90" height="120" rx="4" fill="url(#screenGradient)" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Scan Lines -->
    <g stroke="#00ff00" stroke-width="1.5" fill="none" opacity="0.8">
      <path d="M5 10 L85 10" class="scan-anim" style="animation-delay: 0s"/>
      <path d="M5 25 L85 25" class="scan-anim" style="animation-delay: 0.1s"/>
      <path d="M5 40 L85 40" class="scan-anim" style="animation-delay: 0.2s"/>
      <path d="M5 55 L85 55" class="scan-anim" style="animation-delay: 0.3s"/>
      <path d="M5 70 L85 70" class="scan-anim" style="animation-delay: 0.4s"/>
      <path d="M5 85 L85 85" class="scan-anim" style="animation-delay: 0.5s"/>
      <path d="M5 100 L85 100" class="scan-anim" style="animation-delay: 0.6s"/>
    </g>
    
    <!-- Electron Beam Spot -->
    <circle cx="45" cy="10" r="5" fill="#00ff00" filter="url(#glow)" class="beam-anim" data-narration="Electron beam scans in horizontal lines from left to right"/>
    
    <!-- Arrow showing scan direction -->
    <path d="M20 115 L70 115" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
    <text x="45" y="130" text-anchor="middle" class="detail" fill="#e74c3c">Left → Right</text>
  </g>
  
  <!-- Scan Pattern Explanation -->
  <g transform="translate(20, 280)" class="fade-in" style="animation-delay: 0.6s">
    <!-- Horizontal Retracing Box -->
    <rect x="0" y="0" width="180" height="50" rx="4" fill="#ecf0f1" stroke="#3498db" stroke-width="1.5"/>
    <text x="90" y="18" text-anchor="middle" class="box-title" data-narration="Horizontal Retracing: Beam returns to start of next line">Horizontal Retracing</text>
    <text x="90" y="35" text-anchor="middle" class="box-text">Beam returns rapidly to</text>
    <text x="90" y="45" text-anchor="middle" class="box-text">start of next scan line</text>
    
    <!-- Vertical Retracing Box -->
    <rect x="200" y="0" width="180" height="50" rx="4" fill="#ecf0f1" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="290" y="18" text-anchor="middle" class="box-title" data-narration="Vertical Retracing: Frame complete, beam returns to top">Vertical Retracing</text>
    <text x="290" y="35" text-anchor="middle" class="box-text">Frame complete, beam</text>
    <text x="290" y="45" text-anchor="middle" class="box-text">returns to top-left</text>
  </g>
  
  <!-- Raster Scan Pattern Arrows -->
  <g class="pulse" style="animation-delay: 1s">
    <!-- Downward arrow showing vertical scan -->
    <path d="M355 90 L355 230" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
    <polygon points="350,230 360,230 355,240" fill="#e74c3c"/>
    <text x="365" y="160" class="detail" fill="#e74c3c" transform="rotate(90, 365, 160)">Vertical Scan Direction</text>
  </g>
  
  <!-- Key Features Box -->
  <g transform="translate(20, 340)" class="fade-in" style="animation-delay: 0.8s">
    <rect x="0" y="0" width="380" height="50" rx="4" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5"/>
    <text x="190" y="15" text-anchor="middle" class="box-title" data-narration="Raster Scan displays use line-by-line scanning pattern similar to television">Key Characteristic</text>
    <text x="190" y="32" text-anchor="middle" class="box-text">Uses horizontal line-by-line scanning (like TV). Each frame consists of</text>
    <text x="190" y="43" text-anchor="middle" class="box-text">multiple scan lines refreshed at 60+ Hz for flicker-free display</text>
  </g>
  
  <!-- Number labels on components -->
  <g class="fade-in" style="animation-delay: 1.2s">
    <circle cx="45" cy="105" r="8" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
    <text x="45" y="108" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
    
    <circle cx="130" cy="110" r="8" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
    <text x="130" y="113" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
    
    <circle cx="287" cy="160" r="8" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
    <text x="287" y="163" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
  </g>
</svg>