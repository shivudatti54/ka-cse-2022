<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="input-output-devices">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="inputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e0f8"/>
      <stop offset="100%" style="stop-color:#b0c4e8"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8e0d4"/>
      <stop offset="100%" style="stop-color:#e8c4a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7a9a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .input-box { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .process-box { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .output-box { animation: slideInRight 0.6s ease-out 0.2s forwards; opacity: 0; }
    .arrow { animation: dataFlow 1s linear infinite; }
    .device { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .device-1 { animation-delay: 0.5s; }
    .device-2 { animation-delay: 0.7s; }
    .device-3 { animation-delay: 0.9s; }
    .device-4 { animation-delay: 1.1s; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .concept-box { animation: slideInUp 0.5s ease-out forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c4a6e" class="title">Input-Output Devices</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a7a9a" class="title">Data Flow in Computer Graphics</text>
  
  <!-- Input Devices Section -->
  <g class="input-box" data-narration="Input devices capture data from users and send it to the computer for processing">
    <rect x="15" y="70" width="120" height="140" fill="url(#inputGradient)" rx="8" filter="url(#shadow)"/>
    <text x="75" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d6b54">INPUT</text>
    <text x="75" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d6b54">DEVICES</text>
    
    <!-- Mouse -->
    <g class="device device-1">
      <ellipse cx="75" cy="115" rx="18" ry="12" fill="#ffffff" stroke="#2d6b54" stroke-width="2"/>
      <line x1="75" y1="103" x2="75" y2="112" stroke="#2d6b54" stroke-width="2"/>
      <text x="75" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d6b54">Mouse</text>
    </g>
    <!-- Keyboard -->
    <g class="device device-2">
      <rect x="50" y="148" width="50" height="18" fill="#ffffff" stroke="#2d6b54" stroke-width="2" rx="2"/>
      <line x1="55" y1="155" x2="70" y2="155" stroke="#2d6b54" stroke-width="1"/>
      <line x1="72" y1="155" x2="80" y2="155" stroke="#2d6b54" stroke-width="1"/>
      <text x="75" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2d6b54">Keyboard</text>
    </g>
  </g>
  
  <!-- Processing Unit -->
  <g class="process-box" data-narration="The computer processes input data and prepares output information">
    <rect x="155" y="100" width="110" height="100" fill="url(#processGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3a4a8a">COMPUTER</text>
    <g class="pulse-anim">
      <rect x="170" y="140" width="80" height="45" fill="#ffffff" stroke="#3a4a8a" stroke-width="2" rx="3"/>
      <text x="210" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3a4a8a">Processing</text>
      <text x="210" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3a4a8a">&amp; Control</text>
    </g>
  </g>
  
  <!-- Output Devices Section -->
  <g class="output-box" data-narration="Output devices display or print the processed information for users">
    <rect x="285" y="70" width="120" height="140" fill="url(#outputGradient)" rx="8" filter="url(#shadow)"/>
    <text x="345" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b5a3c">OUTPUT</text>
    <text x="345" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b5a3c">DEVICES</text>
    
    <!-- Monitor -->
    <g class="device device-3">
      <rect x="310" y="108" width="70" height="45" fill="#ffffff" stroke="#8b5a3c" stroke-width="2" rx="2"/>
      <rect x="315" y="113" width="60" height="35" fill="#c4e8f0" stroke="none"/>
      <rect x="340" y="153" width="10" height="8" fill="#8b5a3c"/>
      <rect x="335" y="161" width="20" height="4" fill="#8b5a3c" rx="1"/>
      <text x="345" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b5a3c">Monitor</text>
    </g>
    <!-- Printer -->
    <g class="device device-4">
      <rect x="320" y="175" width="50" height="12" fill="#ffffff" stroke="#8b5a3c" stroke-width="2" rx="2"/>
      <rect x="325" y="168" width="40" height="8" fill="#ffffff" stroke="#8b5a3c" stroke-width="2" rx="1"/>
      <text x="345" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b5a3c">Printer</text>
    </g>
  </g>
  
  <!-- Arrows -->
  <g class="arrow">
    <line x1="135" y1="150" x2="155" y2="150" stroke="#5a7a9a" stroke-width="3" marker-end="url(#arrowHead)"/>
    <line x1="265" y1="150" x2="285" y2="150" stroke="#5a7a9a" stroke-width="3" marker-end="url(#arrowHead)"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key concepts: Input devices convert user actions to digital data, the computer processes this data, and output devices present the results" style="animation-delay: 1.3s;">
    <rect x="15" y="230" width="390" height="60" fill="#ffffff" stroke="#b8c4d4" stroke-width="1" rx="5"/>
    <text x="25" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a5a7a">Key Concepts:</text>
    <text x="25" y="268" font-family="Arial, sans-serif" font-size="10" fill="#5a6a8a">• Input: Mouse, Keyboard, Scanner, Tablet</text>
    <text x="25" y="282" font-family="Arial, sans-serif" font-size="10" fill="#5a6a8a">• Output: Monitor, Printer, Projector, Speaker</text>
  </g>
  
  <!-- Data Flow Labels -->
  <g class="concept-box" data-narration="The bidirectional flow enables user interaction with graphics applications" style="animation-delay: 1.5s;">
    <rect x="155" y="305" width="110" height="30" fill="#e8f0f8" stroke="#b8c4d4" stroke-width="1" rx="5"/>
    <text x="210" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5a7a">Bidirectional</text>
    <text x="210" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5a7a">Data Flow</text>
  </g>
  
  <!-- Relationship Arrows -->
  <g class="arrow" style="animation-delay: 1.7s;">
    <path d="M 180 230 Q 210 220 240 230" stroke="#7a9aba" stroke-width="2" fill="none" marker-end="url(#arrowHead)"/>
    <path d="M 180 280 Q 210 290 240 280" stroke="#7a9aba" stroke-width="2" fill="none" marker-end="url(#arrowHead)"/>
  </g>
  
  <!-- Summary Box -->
  <g class="concept-box" data-narration="Understanding device capabilities helps optimize graphics applications for better user experience" style="animation-delay: 1.9s;">
    <rect x="280" y="305" width="125" height="30" fill="#f0f8e8" stroke="#b8d4b8" stroke-width="1" rx="5"/>
    <text x="342" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a7a4a">Essential for</text>
    <text x="342" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a7a4a">Graphics Work</text>
  </g>
</svg>