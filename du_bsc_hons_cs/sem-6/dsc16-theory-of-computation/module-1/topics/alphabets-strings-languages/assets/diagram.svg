<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="alphabets-strings-languages">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ba68c8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .example { animation: pulse 2s ease-in-out infinite; }
    .example-box { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333" class="title">Alphabets, Strings &amp; Languages</text>
  <line x1="80" y1="45" x2="340" y2="45" stroke="#888" stroke-width="1" class="title"/>
  
  <!-- Alphabet Box -->
  <g class="box1" data-narration="An alphabet is a finite set of symbols, denoted by Σ (sigma). Examples include {a,b,c} for lowercase letters or {0,1} for binary.">
    <rect x="30" y="70" width="110" height="120" rx="10" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="85" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">ALPHABET</text>
    <text x="85" y="115" text-anchor="middle" font-size="12" fill="#333">Symbol set Σ</text>
    <rect x="40" y="125" width="90" height="55" rx="5" fill="#fff" stroke="#64b5f6" stroke-width="1"/>
    <text x="85" y="142" text-anchor="middle" font-size="11" fill="#333">Σ = {a, b, c}</text>
    <text x="85" y="158" text-anchor="middle" font-size="10" fill="#666">or Σ = {0, 1}</text>
    <text x="85" y="178" text-anchor="middle" font-size="9" fill="#888">Binary alphabet</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow">
    <line x1="140" y1="130" x2="170" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- String Box -->
  <g class="box2" data-narration="A string is a finite sequence of symbols from an alphabet. The length of a string is the number of symbols it contains.">
    <rect x="170" y="70" width="110" height="120" rx="10" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="225" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">STRING</text>
    <text x="225" y="115" text-anchor="middle" font-size="12" fill="#333">Sequence of symbols</text>
    <rect x="180" y="125" width="90" height="55" rx="5" fill="#fff" stroke="#81c784" stroke-width="1"/>
    <text x="225" y="145" text-anchor="middle" font-size="13" fill="#333" class="example">"abca"</text>
    <text x="225" y="165" text-anchor="middle" font-size="10" fill="#666">Length = 4</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow">
    <line x1="280" y1="130" x2="310" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Language Box -->
  <g class="box3" data-narration="A language is a set of strings formed from an alphabet. It can be finite or infinite.">
    <rect x="310" y="70" width="90" height="120" rx="10" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="355" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#6a1b9a">LANGUAGE</text>
    <text x="355" y="115" text-anchor="middle" font-size="12" fill="#333">Set of strings</text>
    <rect x="320" y="125" width="70" height="55" rx="5" fill="#fff" stroke="#ce93d8" stroke-width="1"/>
    <text x="355" y="142" text-anchor="middle" font-size="9" fill="#333">L = {"a", "ab",</text>
    <text x="355" y="155" text-anchor="middle" font-size="9" fill="#333">"abc", "abca"}</text>
  </g>
  
  <!-- Operations Section -->
  <g class="example-box" data-narration="Common string operations include concatenation (joining strings) and reversal (reading backwards).">
    <text x="210" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">String Operations</text>
    
    <!-- Concatenation -->
    <rect x="30" y="230" width="170" height="70" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1"/>
    <text x="115" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Concatenation</text>
    <text x="115" y="268" text-anchor="middle" font-size="11" fill="#555">"hello" + "world"</text>
    <text x="115" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">→ "helloworld"</text>
    
    <!-- Reversal -->
    <rect x="220" y="230" width="170" height="70" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1"/>
    <text x="305" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Reversal</text>
    <text x="305" y="268" text-anchor="middle" font-size="11" fill="#555">reverse("hello")</text>
    <text x="305" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">→ "olleh"</text>
  </g>
  
  <!-- Relationship Diagram -->
  <g class="example-box" data-narration="The relationship flows from Alphabet (the building blocks) to String (combinations) to Language (the set of valid combinations).">
    <text x="210" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Relationship Flow</text>
    
    <!-- Flow boxes -->
    <rect x="50" y="335" width="70" height="30" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="85" y="355" text-anchor="middle" font-size="10" fill="#0d47a1">Alphabet Σ</text>
    
    <rect x="140" y="335" width="70" height="30" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="175" y="355" text-anchor="middle" font-size="10" fill="#1b5e20">String w</text>
    
    <rect x="230" y="335" width="70" height="30" rx="5" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1"/>
    <text x="265" y="355" text-anchor="middle" font-size="10" fill="#4a148c">Language L</text>
    
    <rect x="320" y="335" width="60" height="30" rx="5" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
    <text x="350" y="355" text-anchor="middle" font-size="9" fill="#f57f17">w ∈ L</text>
    
    <!-- Arrows for flow -->
    <line x1="120" y1="350" x2="135" y2="350" stroke="#555" stroke-width="1.5"/>
    <polygon points="133,347 140,350 133,353" fill="#555"/>
    <line x1="210" y1="350" x2="225" y2="350" stroke="#555" stroke-width="1.5"/>
    <polygon points="223,347 230,350 223,353" fill="#555"/>
    <line x1="300" y1="350" x2="315" y2="350" stroke="#555" stroke-width="1.5"/>
    <polygon points="313,347 320,350 313,353" fill="#555"/>
  </g>
  
  <!-- Footer -->
  <text x="210" y="390" text-anchor="middle" font-size="9" fill="#888">Foundation of Theory of Computation</text>
</svg>