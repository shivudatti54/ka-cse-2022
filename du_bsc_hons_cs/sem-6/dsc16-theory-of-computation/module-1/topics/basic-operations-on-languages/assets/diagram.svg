<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="basic-operations-on-languages">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="set1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="set2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fc79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#96e6a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="unionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(60px); }
    }
    @keyframes appear {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .title-text { animation: fadeIn 0.8s ease-out forwards; }
    .set-box { animation: slideInLeft 0.6s ease-out forwards; }
    .set-box-2 { animation: slideInRight 0.6s ease-out forwards; }
    .union-box { animation: slideInUp 0.7s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .arrow { animation: pulse 2s ease-in-out infinite; animation-delay: 1s; }
    .string-item { animation: appear 0.4s ease-out forwards; opacity: 0; }
    .string-item:nth-child(1) { animation-delay: 0.2s; }
    .string-item:nth-child(2) { animation-delay: 0.3s; }
    .string-item:nth-child(3) { animation-delay: 0.4s; }
    .string-item:nth-child(4) { animation-delay: 0.5s; }
    .concept-box { animation: fadeIn 0.6s ease-out forwards; }
    .operation-symbol { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title-text">Basic Operations on Languages</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#3498db" stroke-width="2" class="title-text"/>
  
  <!-- L1 Set Section -->
  <g class="set-box" data-narration="L1 represents the first language containing strings 'a' and 'b'">
    <rect x="30" y="60" width="130" height="90" rx="8" ry="8" fill="url(#set1Gradient)" filter="url(#shadow)"/>
    <text x="95" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c0392b">Language L1</text>
    <text x="95" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d4037">L1 = {'a', 'b'}</text>
    <circle cx="70" cy="125" r="12" fill="#fff" stroke="#c0392b" stroke-width="2" class="string-item"/>
    <text x="70" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c0392b" class="string-item">a</text>
    <circle cx="120" cy="125" r="12" fill="#fff" stroke="#c0392b" stroke-width="2" class="string-item"/>
    <text x="120" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c0392b" class="string-item">b</text>
  </g>
  
  <!-- Union Symbol -->
  <g class="operation-symbol" data-narration="The union operation (∪) combines all strings from both languages">
    <text x="185" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#9b59b6">∪</text>
  </g>
  
  <!-- L2 Set Section -->
  <g class="set-box-2" data-narration="L2 represents the second language containing strings 'b' and 'c'">
    <rect x="240" y="60" width="130" height="90" rx="8" ry="8" fill="url(#set2Gradient)" filter="url(#shadow)"/>
    <text x="305" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">Language L2</text>
    <text x="305" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e8449">L2 = {'b', 'c'}</text>
    <circle cx="280" cy="125" r="12" fill="#fff" stroke="#27ae60" stroke-width="2" class="string-item"/>
    <text x="280" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" class="string-item">b</text>
    <circle cx="330" cy="125" r="12" fill="#fff" stroke="#27ae60" stroke-width="2" class="string-item"/>
    <text x="330" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" class="string-item">c</text>
  </g>
  
  <!-- Arrow down -->
  <g class="arrow" data-narration="The arrow shows the operation result">
    <path d="M210 155 L210 175" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="210,180 205,170 215,170" fill="#34495e"/>
  </g>
  
  <!-- Union Result -->
  <g class="union-box" data-narration="The union L1 ∪ L2 contains all unique strings: 'a', 'b', 'c'">
    <rect x="120" y="190" width="180" height="80" rx="10" ry="10" fill="url(#unionGradient)" filter="url(#shadow)"/>
    <text x="210" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8e44ad">L1 ∪ L2</text>
    <text x="210" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6c3483">{'a', 'b', 'c'}</text>
    <circle cx="165" cy="255" r="10" fill="#fff" stroke="#8e44ad" stroke-width="2" class="string-item"/>
    <text x="165" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8e44ad" class="string-item">a</text>
    <circle cx="210" cy="255" r="10" fill="#fff" stroke="#8e44ad" stroke-width="2" class="string-item"/>
    <text x="210" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8e44ad" class="string-item">b</text>
    <circle cx="255" cy="255" r="10" fill="#fff" stroke="#8e44ad" stroke-width="2" class="string-item"/>
    <text x="255" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8e44ad" class="string-item">c</text>
  </g>
  
  <!-- Formula Box -->
  <g class="concept-box" data-narration="The mathematical definition of union operation">
    <rect x="20" y="290" width="380" height="50" rx="6" ry="6" fill="#fff" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="310" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Definition:</text>
    <text x="30" y="328" font-family="Arial, sans-serif" font-size="11" fill="#34495e">L1 ∪ L2 = {x | x ∈ L1 or x ∈ L2}</text>
    <text x="280" y="328" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">Example: {'a','b'}∪{'b','c'}= {'a','b','c'}</text>
  </g>
  
  <!-- Other Operations Quick Reference -->
  <g class="concept-box" data-narration="Quick reference for other language operations: Intersection, Concatenation, and Kleene Closure">
    <rect x="20" y="350" width="380" height="40" rx="6" ry="6" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1"/>
    <text x="35" y="368" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Other Ops:</text>
    <text x="90" y="368" font-family="Arial, sans-serif" font-size="10" fill="#34495e">∩ (Intersection): {x | x∈L1 and x∈L2}</text>
    <text x="270" y="368" font-family="Arial, sans-serif" font-size="10" fill="#34495e">· (Concat): {xy|x∈L1, y∈L2}</text>
    <text x="90" y="382" font-family="Arial, sans-serif" font-size="10" fill="#34495e">* (Kleene): {x1...xn | n≥0, xi∈L}</text>
  </g>
</svg>