<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="chomsky-normal-form">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffccbc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffab91;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3e5fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81d4fa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .slide-in-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#2c3e50" class="fade-in">Chomsky Normal Form</text>
  <line x1="60" y1="45" x2="360" y2="45" stroke="#3498db" stroke-width="2" class="fade-in delay-1"/>
  
  <!-- Section 1: Terminal Production -->
  <g class="slide-in delay-1" filter="url(#shadow)" data-narration="The first CNF rule: Terminal productions generate a single terminal symbol">
    <rect x="30" y="70" width="160" height="100" rx="10" fill="url(#boxGradient1)" stroke="#27ae60" stroke-width="2"/>
    <text x="110" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e8449">Terminal Production</text>
    <text x="110" y="115" font-family="Georgia, serif" font-size="16" text-anchor="middle" fill="#2c3e50">A → a</text>
    <text x="110" y="138" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#555">(single terminal)</text>
    <text x="110" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">A = non-terminal</text>
    <text x="110" y="167" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">a = terminal symbol</text>
  </g>
  
  <!-- Section 2: Binary Production -->
  <g class="slide-in delay-2" filter="url(#shadow)" data-narration="The second CNF rule: Binary productions generate exactly two non-terminals">
    <rect x="230" y="70" width="160" height="100" rx="10" fill="url(#boxGradient2)" stroke="#e74c3c" stroke-width="2"/>
    <text x="310" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#c0392b">Binary Production</text>
    <text x="310" y="118" font-family="Georgia, serif" font-size="16" text-anchor="middle" fill="#2c3e50">A → B C</text>
    <text x="310" y="138" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#555">(two variables)</text>
    <text x="310" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">B, C are non-terminals</text>
    <text x="310" y="167" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">B, C ≠ Start Symbol</text>
  </g>
  
  <!-- Visual representation of A → a -->
  <g class="slide-in-up delay-3" data-narration="Visual example: Non-terminal A produces terminal 'a'">
    <ellipse cx="80" cy="220" rx="35" ry="20" fill="#a8e6cf" stroke="#27ae60" stroke-width="2"/>
    <text x="80" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e8449">A</text>
    <path d="M 110 220 L 150 220" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="155,220 145,215 145,225" fill="#2c3e50"/>
    <rect x="160" y="205" width="30" height="30" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
    <text x="175" y="225" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">a</text>
    <text x="175" y="250" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Terminal</text>
  </g>
  
  <!-- Visual representation of A → BC -->
  <g class="slide-in-up delay-3" data-narration="Visual example: Non-terminal A produces two non-terminals B and C">
    <ellipse cx="280" cy="220" rx="35" ry="20" fill="#ffccbc" stroke="#e74c3c" stroke-width="2"/>
    <text x="280" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#c0392b">A</text>
    <path d="M 310 220 L 350 195" stroke="#2c3e50" stroke-width="2"/>
    <path d="M 310 220 L 350 245" stroke="#2c3e50" stroke-width="2"/>
    <polygon points="353,192 343,195 348,202" fill="#2c3e50"/>
    <polygon points="353,248 343,245 348,238" fill="#2c3e50"/>
    <ellipse cx="375" cy="190" rx="30" ry="18" fill="#b3e5fc" stroke="#3498db" stroke-width="2"/>
    <text x="375" y="195" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2980b9">B</text>
    <ellipse cx="375" cy="250" rx="30" ry="18" fill="#b3e5fc" stroke="#3498db" stroke-width="2"/>
    <text x="375" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2980b9">C</text>
    <text x="345" y="270" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Non-terminals</text>
  </g>
  
  <!-- Optional: Start symbol with ε -->
  <g class="slide-in-up delay-4" filter="url(#shadow)" data-narration="Optional: Start symbol may produce empty string (ε) in some definitions">
    <rect x="120" y="300" width="180" height="50" rx="8" fill="url(#boxGradient3)" stroke="#2980b9" stroke-width="2"/>
    <text x="210" y="325" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#2c3e50">S → ε (optional)</text>
    <text x="210" y="342" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">for start symbol only</text>
  </g>
  
  <!-- Bottom info box -->
  <g class="fade-in delay-5" data-narration="CNF is essential for CYK parsing algorithm and proving NP-completeness">
    <rect x="30" y="360" width="360" height="30" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="210" y="378" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#7f8c8d">Used in CYK Parsing &amp; NP-Completeness Proofs</text>
  </g>
  
  <!-- Animated decorative elements -->
  <circle cx="20" cy="20" r="5" fill="#a8e6cf" class="pulse" style="animation-delay: 0.5s"/>
  <circle cx="400" cy="380" r="5" fill="#ffccbc" class="pulse" style="animation-delay: 1s"/>
  <circle cx="400" cy="20" r="5" fill="#b3e5fc" class="pulse" style="animation-delay: 1.5s"/>
  <circle cx="20" cy="380" r="5" fill="#d4e8f0" class="pulse" style="animation-delay: 2s"/>
</svg>