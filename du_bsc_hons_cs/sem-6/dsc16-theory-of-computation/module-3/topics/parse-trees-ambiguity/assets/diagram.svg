<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="parse-trees-ambiguity">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e8e8f5"/>
      <stop offset="100%" style="stop-color:#f5e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Georgia, serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .node { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .terminal { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #fff; }
    .grammar { font-family: 'Courier New', monospace; font-size: 11px; fill: #333; }
    .box { fill: #fff; stroke: #ccc; stroke-width: 1.5; rx: 6; }
    .highlight-box { fill: #fff9e6; stroke: #f39c12; stroke-width: 2; rx: 6; }
    .edge { stroke: #7f8c8d; stroke-width: 1.5; }
    .node-bg { fill: #3498db; rx: 4; }
    .node-bg-alt { fill: #9b59b6; rx: 4; }
    .node-bg-amb1 { fill: #e74c3c; rx: 4; }
    .node-bg-amb2 { fill: #27ae60; rx: 4; }
    .arrow { fill: #7f8c8d; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
    .delay-6 { animation-delay: 1.2s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Parse Trees &amp; Ambiguity</text>
  
  <!-- Section 1: Grammar Definition -->
  <g class="anim-slide-left delay-1" data-narration="The grammar defines production rules for non-terminal symbols. Here E represents Expression, T represents Term, and F represents Factor.">
    <rect x="10" y="45" width="180" height="55" class="box" filter="url(#shadow)"/>
    <text x="20" y="60" class="section-title">Grammar (Ambiguous)</text>
    <text x="20" y="78" class="grammar">E → E + E | E * E | id</text>
    <text x="20" y="92" class="label">Two operators, no precedence</text>
  </g>
  
  <!-- Section 2: Input String -->
  <g class="anim-slide-up delay-2" data-narration="The input string 'id + id * id' can be parsed in multiple ways due to operator precedence ambiguity.">
    <rect x="210" y="45" width="200" height="55" class="box" filter="url(#shadow)"/>
    <text x="220" y="60" class="section-title">Input String</text>
    <text x="220" y="82" class="label" style="font-size: 16px; font-family: 'Courier New', monospace;">"id + id * id"</text>
  </g>
  
  <!-- Parse Tree 1 - Left Associative -->
  <g class="anim-slide-left delay-3" data-narration="First parse tree: 'id + id' is grouped first, then '* id' - left associative reading.">
    <text x="30" y="115" class="section-title">Parse 1: (id + id) * id</text>
    <line x1="80" y1="125" x2="80" y2="145" class="edge"/>
    <line x1="80" y1="145" x2="50" y2="170" class="edge"/>
    <line x1="80" y1="145" x2="110" y2="170" class="edge"/>
    <rect x="65" y="125" width="30" height="18" class="node-bg-amb1"/>
    <text x="80" y="138" text-anchor="middle" class="node">E</text>
    <rect x="35" y="145" width="30" height="18" class="node-bg-amb1"/>
    <text x="50" y="158" text-anchor="middle" class="node">E</text>
    <rect x="95" y="145" width="30" height="18" class="node-bg-amb2"/>
    <text x="110" y="158" text-anchor="middle" class="node">E</text>
    
    <!-- Left subtree -->
    <line x1="50" y1="163" x2="35" y2="185" class="edge"/>
    <line x1="50" y1="163" x2="65" y2="185" class="edge"/>
    <rect x="20" y="185" width="30" height="18" class="node-bg-amb1"/>
    <text x="35" y="198" text-anchor="middle" class="node">E</text>
    <rect x="50" y="185" width="30" height="18" class="node-bg"/>
    <text x="65" y="198" text-anchor="middle" class="terminal">id</text>
    <line x1="35" y1="203" x2="25" y2="225" class="edge"/>
    <line x1="35" y1="203" x2="45" y2="225" class="edge"/>
    <rect x="10" y="225" width="30" height="18" class="node-bg"/>
    <text x="25" y="238" text-anchor="middle" class="terminal">id</text>
    <rect x="30" y="225" width="30" height="18" class="node-bg"/>
    <text x="45" y="238" text-anchor="middle" class="terminal">+</text>
    
    <!-- Right subtree -->
    <line x1="110" y1="163" x2="100" y2="185" class="edge"/>
    <line x1="110" y1="163" x2="120" y2="185" class="edge"/>
    <rect x="85" y="185" width="30" height="18" class="node-bg"/>
    <text x="100" y="198" text-anchor="middle" class="terminal">id</text>
    <rect x="105" y="185" width="30" height="18" class="node-bg"/>
    <text x="120" y="198" text-anchor="middle" class="terminal">*</text>
  </g>
  
  <!-- Parse Tree 2 - Right Associative -->
  <g class="anim-slide-right delay-4" data-narration="Second parse tree: 'id * id' is grouped first, then 'id + (result)' - right associative reading.">
    <text x="240" y="115" class="section-title">Parse 2: id + (id * id)</text>
    <line x1="300" y1="125" x2="300" y2="145" class="edge"/>
    <line x1="300" y1="145" x2="270" y2="170" class="edge"/>
    <line x1="300" y1="145" x2="330" y2="170" class="edge"/>
    <rect x="285" y="125" width="30" height="18" class="node-bg-amb2"/>
    <text x="300" y="138" text-anchor="middle" class="node">E</text>
    <rect x="255" y="145" width="30" height="18" class="node-bg"/>
    <text x="270" y="158" text-anchor="middle" class="terminal">id</text>
    <rect x="315" y="145" width="30" height="18" class="node-bg-amb1"/>
    <text x="330" y="158" text-anchor="middle" class="node">E</text>
    
    <!-- Left subtree -->
    <line x1="330" y1="163" x2="315" y2="185" class="edge"/>
    <line x1="330" y1="163" x2="345" y2="185" class="edge"/>
    <rect x="300" y="185" width="30" height="18" class="node-bg"/>
    <text x="315" y="198" text-anchor="middle" class="terminal">+</text>
    <rect x="330" y="185" width="30" height="18" class="node-bg-amb2"/>
    <text x="345" y="198" text-anchor="middle" class="node">E</text>
    <line x1="345" y1="203" x2="330" y2="225" class="edge"/>
    <line x1="345" y1="203" x2="360" y2="225" class="edge"/>
    <rect x="315" y="225" width="30" height="18" class="node-bg"/>
    <text x="330" y="238" text-anchor="middle" class="terminal">id</text>
    <rect x="345" y="225" width="30" height="18" class="node-bg"/>
    <text x="360" y="238" text-anchor="middle" class="terminal">*</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="anim-fade delay-5" data-narration="Key concept: A grammar is ambiguous if a single string has multiple valid parse trees. This causes problems in compilers as the meaning becomes unclear.">
    <rect x="10" y="260" width="400" height="60" class="highlight-box" filter="url(#shadow)"/>
    <text x="20" y="280" class="section-title">⚠ Ambiguity Definition</text>
    <text x="20" y="300" class="label">A grammar is ambiguous if there exists a string with</text>
    <text x="20" y="315" class="label">multiple valid parse trees.</text>
  </g>
  
  <!-- Solution Box -->
  <g class="anim-slide-up delay-6" data-narration="To resolve ambiguity, we can use separate non-terminals for operators with different precedence levels.">
    <rect x="10" y="330" width="400" height="55" class="box" filter="url(#shadow)"/>
    <text x="20" y="350" class="section-title" style="fill:#27ae60;">✓ Solution: Unambiguous Grammar</text>
    <text x="20" y="370" class="grammar">E → T (+ T)* | T    T → F (* F)* | F    F → (E) | id</text>
    <text x="300" y="375" class="label" style="font-size:11px;">Precedence: F → T → E</text>
  </g>
  
  <!-- Arrow showing difference -->
  <g class="anim-pulse">
    <path d="M 200 160 L 230 160" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#95a5a6"/>
    </marker>
  </defs>
</svg>