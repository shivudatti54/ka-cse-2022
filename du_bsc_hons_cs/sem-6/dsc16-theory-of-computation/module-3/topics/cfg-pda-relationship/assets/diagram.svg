<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="cfg-pda-relationship">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4dcf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cfgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fcfad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pdaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8a0dd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="langGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d4a8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideInLeft {
      0% { transform: translateX(-30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      0% { transform: translateX(30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 3; }
      50% { stroke-width: 5; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .cfg-box { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .pda-box { animation: slideInRight 0.8s ease-out 0.4s both; }
    .lang-box { animation: slideInUp 0.8s ease-out 0.6s both; }
    .arrow-left { animation: fadeIn 0.5s ease-out 0.8s both; }
    .arrow-right { animation: fadeIn 0.5s ease-out 1s both; }
    .arrow-label { animation: fadeIn 0.5s ease-out 1.2s both; }
    .eq-symbol { animation: pulse 2s ease-in-out infinite 1.5s; }
    .subtitle { animation: fadeIn 1s ease-out 0.3s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c5282" class="title">CFG-PDA Relationship</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a5568" class="subtitle">Context-Free Grammars ↔ Pushdown Automata</text>
  
  <!-- CFG Box (Left) -->
  <g class="cfg-box" filter="url(#shadow)" data-narration="CFG: A generative device with V (variables), Σ (terminals), R (productions), S (start symbol)">
    <rect x="20" y="80" width="150" height="140" rx="8" fill="url(#cfgGradient)" stroke="#2d8a5e" stroke-width="2"/>
    <text x="95" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1a5e3a">CFG</text>
    <text x="95" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a5e3a">Context-Free</text>
    <text x="95" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a5e3a">Grammar</text>
    <text x="30" y="160" font-family="Arial, sans-serif" font-size="9" fill="#1a5e3a">G = (V, Σ, R, S)</text>
    <text x="30" y="178" font-family="Arial, sans-serif" font-size="8" fill="#1a5e3a">Generates strings</text>
    <text x="30" y="190" font-family="Arial, sans-serif" font-size="8" fill="#1a5e3a">via productions</text>
    <text x="30" y="208" font-family="Arial, sans-serif" font-size="8" fill="#1a5e3a">A → α</text>
  </g>
  
  <!-- PDA Box (Right) -->
  <g class="pda-box" filter="url(#shadow)" data-narration="PDA: A recognition device using a stack as auxiliary memory to accept/reject input strings">
    <rect x="250" y="80" width="150" height="140" rx="8" fill="url(#pdaGradient)" stroke="#6b46a8" stroke-width="2"/>
    <text x="325" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4a2c8c">PDA</text>
    <text x="325" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a2c8c">Pushdown</text>
    <text x="325" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a2c8c">Automaton</text>
    <text x="260" y="160" font-family="Arial, sans-serif" font-size="9" fill="#4a2c8c">M = (Q, Σ, Γ, δ)</text>
    <text x="260" y="178" font-family="Arial, sans-serif" font-size="8" fill="#4a2c8c">Uses stack memory</text>
    <text x="260" y="190" font-family="Arial, sans-serif" font-size="8" fill="#4a2c8c">Push/Pop states</text>
    <text x="260" y="208" font-family="Arial, sans-serif" font-size="8" fill="#4a2c8c">Accepts by final</text>
  </g>
  
  <!-- Language Box (Center-Bottom) -->
  <g class="lang-box" filter="url(#shadow)" data-narration="Language L: A language is context-free if and only if some PDA recognizes it (Chomsky-Schützenberger, 1960s)">
    <rect x="130" y="260" width="160" height="100" rx="8" fill="url(#langGradient)" stroke="#b8860b" stroke-width="2"/>
    <text x="210" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#6b5210">Context-Free</text>
    <text x="210" y="302" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#6b5210">Language L</text>
    <text x="210" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b5210">L is CFG-generated</text>
    <text x="210" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b5210">⇔</text>
    <text x="210" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b5210">L is PDA-accepted</text>
  </g>
  
  <!-- Arrows and Labels -->
  <g class="arrow-left" data-narration="Every CFG generates a language that can be recognized by some PDA">
    <line x1="170" y1="150" x2="245" y2="150" stroke="#e53e3e" stroke-width="3" marker-end="url(#arrowhead)"/>
    <polygon points="245,145 255,150 245,155" fill="#e53e3e"/>
    <text x="207" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c53030" font-weight="bold">generates</text>
  </g>
  
  <g class="arrow-right" data-narration="Every PDA recognizes a language that can be generated by some CFG">
    <line x1="245" y1="230" x2="175" y2="230" stroke="#2b6cb0" stroke-width="3"/>
    <polygon points="175,225 165,230 175,235" fill="#2b6cb0"/>
    <text x="210" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b6cb0" font-weight="bold">recognizes</text>
  </g>
  
  <g class="arrow-label" data-narration="The bidirectional arrows represent the 'if and only if' equivalence relationship">
    <line x1="95" y1="225" x2="95" y2="255" stroke="#4a5568" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="325" y1="225" x2="325" y2="255" stroke="#4a5568" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="95" y1="255" x2="325" y2="255" stroke="#4a5568" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="210" cy="255" r="18" fill="#f7fafc" stroke="#4a5568" stroke-width="2"/>
    <text x="210" y="252" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2d3748">⇔</text>
    <text x="210" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4a5568">Equivalence</text>
  </g>
  
  <!-- Bottom note -->
  <text x="210" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#718096">Chomsky &amp; Schützenberger (1960s)</text>
</svg>