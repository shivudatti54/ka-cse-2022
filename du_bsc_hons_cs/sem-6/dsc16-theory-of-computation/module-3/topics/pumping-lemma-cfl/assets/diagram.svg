<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="pumping-lemma-cfl" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#e3f2fd"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f5f5"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlightPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title-text { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #1565c0; }
    .label-text { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #424242; }
    .detail-text { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #616161; }
    .formula-text { font-family: 'Courier New', monospace; font-size: 16px; fill: #2e7d32; font-weight: bold; }
    .section-box { fill: url(#boxGradient); stroke: #90caf9; stroke-width: 1.5; rx: 8; }
    .string-box { fill: #c8e6c9; stroke: #4caf50; stroke-width: 2; rx: 4; }
    .highlight-box { fill: #fff9c4; stroke: #fbc02d; stroke-width: 2; rx: 4; }
    .arrow { stroke: #1976d2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in">
    <text x="210" y="35" text-anchor="middle" class="title-text">Pumping Lemma for CFL</text>
    <line x1="60" y1="48" x2="360" y2="48" stroke="#90caf9" stroke-width="2"/>
  </g>
  
  <!-- Section 1: Statement Box -->
  <g class="slide-in delay-1" data-narration="The Pumping Lemma states that for any CFL L, there exists a pumping length p such that any string s in L with |s| >= p can be decomposed into uvwxy.">
    <rect x="20" y="65" width="380" height="70" class="section-box"/>
    <text x="30" y="82" class="label-text" font-weight="bold">Statement:</text>
    <text x="30" y="102" class="detail-text">If L is CFL, exists constant p (pumping length). For any s ∈ L with |s| ≥ p:</text>
    <text x="30" y="122" class="formula-text">s = uvwxy</text>
  </g>
  
  <!-- Section 2: String Decomposition Visual -->
  <g class="fade-in delay-2" data-narration="The string is divided into 5 parts: u, v, w, x, y. The middle portion vwx has bounded length <= p, and vx must be non-empty.">
    <rect x="20" y="150" width="380" height="80" class="section-box"/>
    <text x="30" y="170" class="label-text" font-weight="bold">String Decomposition: s = u v w x y</text>
    
    <!-- String boxes -->
    <rect x="50" y="190" width="50" height="30" class="string-box"/>
    <text x="75" y="210" text-anchor="middle" class="label-text" fill="white">u</text>
    
    <rect x="102" y="190" width="40" height="30" class="highlight-box"/>
    <text x="122" y="210" text-anchor="middle" class="label-text">v</text>
    
    <rect x="144" y="190" width="60" height="30" class="string-box"/>
    <text x="174" y="210" text-anchor="middle" class="label-text" fill="white">w</text>
    
    <rect x="206" y="190" width="40" height="30" class="highlight-box"/>
    <text x="226" y="210" text-anchor="middle" class="label-text">x</text>
    
    <rect x="248" y="190" width="50" height="30" class="string-box"/>
    <text x="273" y="210" text-anchor="middle" class="label-text" fill="white">y</text>
    
    <!-- Labels below -->
    <text x="75" y="240" text-anchor="middle" class="detail-text">prefix</text>
    <text x="122" y="240" text-anchor="middle" class="detail-text" fill="#f9a825">pumped</text>
    <text x="174" y="240" text-anchor="middle" class="detail-text">middle</text>
    <text x="226" y="240" text-anchor="middle" class="detail-text" fill="#f9a825">pumped</text>
    <text x="273" y="240" text-anchor="middle" class="detail-text">suffix</text>
  </g>
  
  <!-- Section 3: Conditions -->
  <g class="slide-in delay-3" data-narration="Three conditions must be satisfied: bounded middle, non-empty pumped portion, and pumpability for all iterations.">
    <rect x="20" y="245" width="380" height="100" class="section-box"/>
    <text x="30" y="265" class="label-text" font-weight="bold">Three Conditions:</text>
    
    <!-- Condition 1 -->
    <circle cx="45" cy="285" r="12" fill="#bbdefb"/>
    <text x="45" y="289" text-anchor="middle" class="detail-text" font-weight="bold">1</text>
    <text x="65" y="288" class="detail-text">|vwx| ≤ p (bounded)</text>
    
    <!-- Condition 2 -->
    <circle cx="45" cy="310" r="12" fill="#c8e6c9"/>
    <text x="45" y="314" text-anchor="middle" class="detail-text" font-weight="bold">2</text>
    <text x="65" y="313" class="detail-text">|vx| ≥ 1 (non-empty)</text>
    
    <!-- Condition 3 -->
    <circle cx="45" cy="335" r="12" fill="#ffe0b2"/>
    <text x="45" y="339" text-anchor="middle" class="detail-text" font-weight="bold">3</text>
    <text x="65" y="338" class="detail-text">uvⁱwxⁱy ∈ L for all i ≥ 0</text>
  </g>
  
  <!-- Section 4: Application Note -->
  <g class="fade-in delay-4" data-narration="To prove a language is not CFL, assume it is context-free and derive a contradiction by showing one of these conditions fails.">
    <rect x="20" y="355" width="380" height="35" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1" rx="4"/>
    <text x="30" y="373" class="detail-text" font-style="italic">Use: Assume CFL → show contradiction → NOT CFL</text>
    <text x="310" y="373" class="detail-text" fill="#7b1fa2">1961: Bar-Hillel, Peri, Shamir</text>
  </g>
  
  <!-- Animated highlight on key formula -->
  <g class="pulse" style="transform-origin: 174px 210px;">
    <rect x="144" y="190" width="60" height="30" fill="none" stroke="#4caf50" stroke-width="3" rx="4" opacity="0.7"/>
  </g>
</svg>