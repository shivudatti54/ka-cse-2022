<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="pushdown-automata" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="controlGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tapeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(30px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.6s both; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.8s both; }
    .pulse { animation: pulse 2s infinite; }
    .arrow-anim { animation: moveRight 2s infinite alternate; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3436" text-anchor="middle" class="title">Pushdown Automata (PDA)</text>
  
  <!-- Input Tape Section -->
  <g class="section-1" data-narration="The Input Tape contains the string to be processed. The tape is read by the finite control, moving left to right.">
    <rect x="20" y="60" width="120" height="70" fill="url(#tapeGradient)" rx="5" stroke="#00b894" stroke-width="2" />
    <text x="80" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#006266" text-anchor="middle">INPUT TAPE</text>
    <rect x="30" y="90" width="20" height="30" fill="white" stroke="#00b894" />
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#006266" text-anchor="middle">a</text>
    <rect x="52" y="90" width="20" height="30" fill="white" stroke="#00b894" />
    <text x="62" y="110" font-family="Arial" font-size="10" fill="#006266" text-anchor="middle">b</text>
    <rect x="74" y="90" width="20" height="30" fill="white" stroke="#00b894" />
    <text x="84" y="110" font-family="Arial" font-size="10" fill="#006266" text-anchor="middle">a</text>
    <rect x="96" y="90" width="20" height="30" fill="#ffeaa7" stroke="#00b894" stroke-dasharray="4" />
    <text x="106" y="110" font-family="Arial" font-size="10" fill="#006266" text-anchor="middle">▼</text>
  </g>
  
  <!-- Arrow from tape to control -->
  <path d="M150 95 L190 95" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-anim" />
  
  <!-- Finite Control Section -->
  <g class="section-2" data-narration="The Finite Control is the brain of the PDA. It manages states and decides stack operations based on input and current stack symbol.">
    <rect x="190" y="55" width="100" height="80" fill="url(#controlGradient)" rx="5" stroke="#4834d4" stroke-width="2" />
    <text x="240" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">FINITE</text>
    <text x="240" y="90" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">CONTROL</text>
    <circle cx="240" cy="115" r="8" fill="white" stroke="#4834d4" stroke-width="2" class="pulse" />
    <text x="240" y="118" font-family="Arial" font-size="10" fill="#4834d4" text-anchor="middle">q</text>
  </g>
  
  <!-- Arrow from control to stack -->
  <path d="M240 145 L240 195" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-anim" />
  
  <!-- Stack Section -->
  <g class="section-3" data-narration="The Stack is unbounded memory that stores symbols. The PDA can push (add) or pop (remove) symbols. Z₀ marks the bottom of the stack.">
    <rect x="195" y="195" width="90" height="130" fill="none" stroke="#e17055" stroke-width="3" rx="3" />
    <text x="240" y="210" font-family="Arial" font-size="11" font-weight="bold" fill="#d63031" text-anchor="middle">STACK</text>
    <rect x="205" y="220" width="70" height="20" fill="url(#stackGradient)" stroke="#e17055" />
    <text x="240" y="234" font-family="Arial" font-size="10" fill="#2d3436" text-anchor="middle">X</text>
    <rect x="205" y="242" width="70" height="20" fill="url(#stackGradient)" stroke="#e17055" />
    <text x="240" y="256" font-family="Arial" font-size="10" fill="#2d3436" text-anchor="middle">Y</text>
    <rect x="205" y="264" width="70" height="20" fill="url(#stackGradient)" stroke="#e17055" />
    <text x="240" y="278" font-family="Arial" font-size="10" fill="#2d3436" text-anchor="middle">Z₀</text>
    <line x1="205" y1="290" x2="275" y2="290" stroke="#e17055" stroke-width="2" />
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-4" data-narration="A PDA is defined as a 7-tuple M=(Q, Σ, Γ, δ, q₀, Z₀, F) where Q is states, Σ is input alphabet, Γ is stack alphabet, δ is transition function, q₀ is start state, Z₀ is initial stack symbol, and F is accepting states.">
    <rect x="15" y="340" width="390" height="50" fill="white" rx="5" stroke="#74b9ff" stroke-width="2" opacity="0.9" />
    <text x="25" y="358" font-family="Arial" font-size="11" font-weight="bold" fill="#0984e3">PDA = (Q, Σ, Γ, δ, q₀, Z₀, F)</text>
    <text x="25" y="378" font-family="Arial" font-size="9" fill="#636e72">Q: states | Σ: input alphabet | Γ: stack alphabet | δ: transitions | q₀: start | Z₀: bottom | F: final</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72" />
    </marker>
  </defs>
  
  <!-- Operation Labels -->
  <g class="section-4">
    <text x="180" y="100" font-family="Arial" font-size="8" fill="#636e72">reads</text>
    <text x="295" y="95" font-family="Arial" font-size="8" fill="#636e72">push/pop</text>
    <text x="310" y="245" font-family="Arial" font-size="9" fill="#00b894">PUSH: add symbol</text>
    <text x="310" y="260" font-family="Arial" font-size="9" fill="#e17055">POP: remove symbol</text>
    <text x="310" y="275" font-family="Arial" font-size="9" fill="#6c5ce7">TOP: peek symbol</text>
  </g>
  
  <!-- Decoration circles -->
  <circle cx="30" y="40" r="15" fill="#fd79a8" opacity="0.3" />
  <circle cx="400" y="370" r="20" fill="#a29bfe" opacity="0.3" />
  <circle cx="10" y="200" r="10" fill="#00cec9" opacity="0.2" />
</svg>