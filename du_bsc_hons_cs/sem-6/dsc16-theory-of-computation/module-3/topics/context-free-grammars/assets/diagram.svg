<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="context-free-grammars" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4eaf5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e0ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e8f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4d4ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ece0d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .card1 { animation: slideInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .card2 { animation: slideInUp 0.6s ease-out 0.35s forwards; opacity: 0; }
    .card3 { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .card4 { animation: slideInUp 0.6s ease-out 0.65s forwards; opacity: 0; }
    .formula { animation: fadeIn 0.8s ease-out 0.8s forwards; opacity: 0; }
    .arrow { animation: drawLine 1s ease-out 1s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .label { font-size: 14px; font-weight: 600; }
    .detail { font-size: 12px; }
    .title-text { font-size: 20px; font-weight: bold; }
    .formula-text { font-size: 16px; font-weight: 500; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-text" fill="#2c3e50">Context-Free Grammars</text>
  <text x="210" y="50" text-anchor="middle" class="title detail" fill="#5d6d7e" style="font-size: 12px;">G = (V, Σ, R, S)</text>
  
  <!-- Card 1: Variables (V) -->
  <g class="card1" data-narration="V represents the finite set of variables (non-terminals) that denote syntactic categories">
    <rect x="20" y="70" width="90" height="70" rx="8" fill="url(#cardGradient1)" filter="url(#shadow)"/>
    <text x="65" y="90" text-anchor="middle" class="label" fill="#2980b9">V</text>
    <text x="65" y="108" text-anchor="middle" class="detail" fill="#34495e">Variables</text>
    <text x="65" y="124" text-anchor="middle" class="detail" fill="#7f8c8d" style="font-size: 11px;">{S, A, B, ...}</text>
  </g>
  
  <!-- Card 2: Terminals (Σ) -->
  <g class="card2" data-narration="Σ is the alphabet of terminal symbols - these are the actual tokens in the language">
    <rect x="125" y="70" width="90" height="70" rx="8" fill="url(#cardGradient2)" filter="url(#shadow)"/>
    <text x="170" y="90" text-anchor="middle" class="label" fill="#27ae60">Σ</text>
    <text x="170" y="108" text-anchor="middle" class="detail" fill="#34495e">Terminals</text>
    <text x="170" y="124" text-anchor="middle" class="detail" fill="#7f8c8d" style="font-size: 11px;">{a, b, c, ...}</text>
  </g>
  
  <!-- Card 3: Productions (R) -->
  <g class="card3" data-narration="R contains production rules in the form A → α where A is a non-terminal">
    <rect x="230" y="70" width="90" height="70" rx="8" fill="url(#cardGradient3)" filter="url(#shadow)"/>
    <text x="275" y="90" text-anchor="middle" class="label" fill="#8e44ad">R</text>
    <text x="275" y="108" text-anchor="middle" class="detail" fill="#34495e">Productions</text>
    <text x="275" y="124" text-anchor="middle" class="detail" fill="#7f8c8d" style="font-size: 11px;">S→aSb|ε</text>
  </g>
  
  <!-- Card 4: Start Symbol (S) -->
  <g class="card4" data-narration="S is the start symbol, the distinguished variable where derivations begin">
    <rect x="335" y="70" width="70" height="70" rx="8" fill="url(#cardGradient4)" filter="url(#shadow)"/>
    <text x="370" y="90" text-anchor="middle" class="label" fill="#e67e22">S</text>
    <text x="370" y="108" text-anchor="middle" class="detail" fill="#34495e">Start</text>
    <text x="370" y="124" text-anchor="middle" class="detail" fill="#7f8c8d" style="font-size: 11px;">Symbol</text>
  </g>
  
  <!-- Derivation Example Box -->
  <g class="formula" data-narration="A derivation shows step-by-step transformation from start symbol to terminal string">
    <rect x="20" y="160" width="380" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="210" y="182" text-anchor="middle" class="label" fill="#2c3e50">Derivation Process</text>
    <text x="210" y="205" text-anchor="middle" class="detail" fill="#34495e">S → AB → aAB → aA b → a b</text>
    <line x1="40" y1="220" x2="380" y2="220" stroke="#ecf0f1" stroke-width="1"/>
    <text x="30" y="245" class="detail" fill="#7f8c8d" style="font-size: 11px;">Production Rules:</text>
    <text x="30" y="262" class="detail" fill="#34495e" style="font-size: 11px;">S → AB</text>
    <text x="110" y="262" class="detail" fill="#34495e" style="font-size: 11px;">A → aA | ε</text>
    <text x="200" y="262" class="detail" fill="#34495e" style="font-size: 11px;">B → b</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="formula" data-narration="Context-free means the left-hand side of each rule is a single non-terminal, independent of context">
    <rect x="20" y="275" width="380" height="55" rx="8" fill="#fef9e7" filter="url(#shadow)"/>
    <text x="210" y="295" text-anchor="middle" class="label" fill="#9b59b6">Key Concept: Context-Free</text>
    <text x="210" y="315" text-anchor="middle" class="detail" fill="#34495e">A → α where A ∈ V and α ∈ (V ∪ Σ)*</text>
  </g>
  
  <!-- Applications Box -->
  <g class="formula" data-narration="CFGs are fundamental in programming languages, compilers, and parsing algorithms">
    <rect x="20" y="345" width="380" height="40" rx="8" fill="#e8f8f5" filter="url(#shadow)"/>
    <text x="210" y="367" text-anchor="middle" class="detail" fill="#16a085" style="font-size: 12px;">Applications: Programming Language Syntax • Parser Generation • BNF Notation</text>
  </g>
</svg>