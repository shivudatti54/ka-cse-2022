<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="regular-expressions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Georgia, serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .highlight { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #e74c3c; }
    .operator { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #8e44ad; }
    .fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; opacity: 0; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; opacity: 0; }
    .slide-up { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #3498db; stroke-width: 2; stroke-dasharray: 5,3; animation: drawLine 1.5s ease-out forwards; stroke-dashoffset: 100; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
    .box { fill: white; stroke: #bdc3c7; stroke-width: 1; rx: 8; }
    .accent-box { fill: #ecf0f1; stroke: #3498db; stroke-width: 2; rx: 8; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Regular Expressions</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="fade-in delay-1"/>
  
  <!-- Section 1: Basic Operators -->
  <g class="slide-left delay-1" data-narration="The three fundamental regex operators: Union (|), Concatenation (·), and Kleene Star (*)">
    <rect x="15" y="50" width="125" height="145" class="box" filter="url(#shadow)"/>
    <text x="77" y="68" text-anchor="middle" class="section-title">Basic Operators</text>
    
    <!-- Union -->
    <text x="25" y="92" class="detail">Union:</text>
    <text x="80" y="92" class="operator">R1 | R2</text>
    <text x="25" y="108" class="detail" font-size="10">matches R1 or R2</text>
    
    <!-- Concatenation -->
    <text x="25" y="130" class="detail">Concat:</text>
    <text x="90" y="130" class="operator">R1R2</text>
    <text x="25" y="146" class="detail" font-size="10">R1 followed by R2</text>
    
    <!-- Kleene Star -->
    <text x="25" y="168" class="detail">Kleene:</text>
    <text x="85" y="168" class="operator">R*</text>
    <text x="25" y="184" class="detail" font-size="10">0+ repetitions</text>
  </g>
  
  <!-- Section 2: Formal Definition -->
  <g class="slide-up delay-2" data-narration="Formal definition includes base cases: empty set, empty string, and single symbols from the alphabet">
    <rect x="150" y="50" width="135" height="95" class="box" filter="url(#shadow)"/>
    <text x="217" y="68" text-anchor="middle" class="section-title">Formal Definition</text>
    
    <text x="160" y="88" class="detail">Base Cases:</text>
    <text x="160" y="104" class="label">∅ = empty set</text>
    <text x="160" y="120" class="label">ε = empty string</text>
    <text x="160" y="136" class="label">a ∈ Σ (symbol)</text>
  </g>
  
  <!-- Section 3: Equivalence -->
  <g class="slide-right delay-3" data-narration="Kleene's Theorem proves regex equivalence to finite automata, essential for compilers">
    <rect x="150" y="155" width="135" height="40" class="accent-box" filter="url(#shadow)"/>
    <text x="217" y="175" text-anchor="middle" class="detail" font-weight="bold">Regex ≡ NFA ≡ DFA</text>
    <text x="217" y="188" text-anchor="middle" class="detail" font-size="10">Kleene's Theorem</text>
  </g>
  
  <!-- Section 4: NFA Diagram for (a|b)*ab -->
  <g class="slide-up delay-4" data-narration="NFA for pattern (a|b)*ab - three states with loops and final 'ab' transition">
    <rect x="15" y="205" width="390" height="180" class="box" filter="url(#shadow)"/>
    <text x="210" y="225" text-anchor="middle" class="section-title">NFA for (a|b)*ab</text>
    
    <!-- State q0 -->
    <circle cx="70" cy="310" r="25" fill="white" stroke="#2c3e50" stroke-width="2"/>
    <text x="70" y="315" text-anchor="middle" class="label" font-weight="bold">q₀</text>
    <text x="70" y="350" text-anchor="middle" class="detail" font-size="10">Start</text>
    
    <!-- Arrow for start -->
    <path d="M20 310 L45 310" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="45,305 55,310 45,315" fill="#2c3e50"/>
    
    <!-- Self loops on q0 -->
    <path d="M45 285 Q70 250 95 285" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <text x="70" y="268" text-anchor="middle" class="label" fill="#e74c3c">a,b</text>
    
    <!-- Arrow q0 to q1 -->
    <path d="M95 310 L145 310" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <polygon points="145,305 155,310 145,315" fill="#2c3e50"/>
    
    <!-- State q1 -->
    <circle cx="190" cy="310" r="25" fill="white" stroke="#2c3e50" stroke-width="2"/>
    <text x="190" y="315" text-anchor="middle" class="label" font-weight="bold">q₁</text>
    
    <!-- Arrow q1 to q2 (b) -->
    <path d="M215 310 L265 310" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <text x="240" y="300" text-anchor="middle" class="label" fill="#e74c3c">b</text>
    <polygon points="265,305 275,310 265,315" fill="#e74c3c"/>
    
    <!-- State q2 (accept) -->
    <circle cx="320" cy="310" r="25" fill="white" stroke="#27ae60" stroke-width="3"/>
    <circle cx="320" cy="310" r="20" fill="none" stroke="#27ae60" stroke-width="1"/>
    <text x="320" y="315" text-anchor="middle" class="label" font-weight="bold">q₂</text>
    <text x="320" y="350" text-anchor="middle" class="detail" font-size="10" fill="#27ae60">Accept</text>
    
    <!-- Legend -->
    <text x="210" y="370" text-anchor="middle" class="detail" font-size="10">Pattern: (a|b)*ab matches strings ending in "ab"</text>
  </g>
  
  <!-- Section 5: Example Regex -->
  <g class="slide-right delay-5" data-narration="Example: Binary numbers with even pairs of zeros represented as regex">
    <rect x="295" y="50" width="110" height="95" class="box" filter="url(#shadow)"/>
    <text x="350" y="68" text-anchor="middle" class="section-title">Example</text>
    
    <text x="305" y="90" class="detail">Binary with</text>
    <text x="305" y="104" class="detail">even 0s:</text>
    <text x="305" y="125" class="highlight">1*(01*01*)*</text>
    <text x="305" y="140" class="detail" font-size="10">| ε (empty)</text>
  </g>
  
  <!-- Arrows connecting sections -->
  <g class="fade-in delay-4">
    <path d="M140 100 L150 100" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="148,96 155,100 148,104" fill="#3498db"/>
  </g>
  
  <g class="fade-in delay-5">
    <path d="M285 97 L295 97" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="293,93 300,97 293,101" fill="#3498db"/>
  </g>
  
  <!-- Animated pulse on NFA -->
  <circle cx="70" cy="310" r="28" fill="none" stroke="#3498db" stroke-width="2" opacity="0" class="pulse" style="animation-delay: 1.5s;"/>
  <circle cx="190" cy="310" r="28" fill="none" stroke="#3498db" stroke-width="2" opacity="0" class="pulse" style="animation-delay: 2s;"/>
  <circle cx="320" cy="310" r="28" fill="none" stroke="#27ae60" stroke-width="2" opacity="0" class="pulse" style="animation-delay: 2.5s;"/>
</svg>