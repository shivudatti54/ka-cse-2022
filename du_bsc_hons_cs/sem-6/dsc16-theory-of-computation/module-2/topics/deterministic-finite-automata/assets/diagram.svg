<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="deterministic-finite-automata">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4472c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="acceptGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#548235;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#548235"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawArrow 1s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2e4057" class="fade-in">Deterministic Finite Automata</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5b6d7e" class="fade-in delay-1">DFA for Strings Ending in "ab"</text>
  
  <!-- State Diagram Section -->
  <g transform="translate(20, 70)" data-narration="State diagram showing the 3-state DFA that accepts strings ending with 'ab'">
    <!-- State q0 -->
    <circle cx="50" cy="80" r="28" fill="url(#stateGradient)" stroke="#2e4057" stroke-width="2" class="slide-in delay-1"/>
    <text x="50" y="85" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">q0</text>
    <text x="50" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e4057">start</text>
    
    <!-- State q1 -->
    <circle cx="180" cy="80" r="28" fill="url(#stateGradient)" stroke="#2e4057" stroke-width="2" class="slide-in delay-2"/>
    <text x="180" y="85" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">q1</text>
    
    <!-- State q2 (accepting) -->
    <circle cx="320" cy="80" r="28" fill="url(#acceptGradient)" stroke="#2e4057" stroke-width="2" class="slide-in delay-3 pulse"/>
    <text x="320" y="85" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">q2</text>
    <text x="320" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#548235">accept</text>
    <!-- Double circle for accepting -->
    <circle cx="320" cy="80" r="22" fill="none" stroke="#548235" stroke-width="2" class="slide-in delay-3"/>
    
    <!-- Transitions -->
    <!-- q0 -> q1 (a) -->
    <path d="M 75 65 Q 110 30 145 65" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-anim"/>
    <text x="115" y="38" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">a</text>
    
    <!-- q0 -> q0 (b) - loop below -->
    <path d="M 30 100 Q 10 130 50 130 Q 90 130 70 100" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-anim" style="animation-delay: 0.3s"/>
    <text x="50" y="148" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">b</text>
    
    <!-- q1 -> q1 (a) - loop above -->
    <path d="M 155 65 Q 180 30 205 65" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-anim" style="animation-delay: 0.4s"/>
    <text x="180" y="40" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">a</text>
    
    <!-- q1 -> q2 (b) -->
    <path d="M 205 80 L 290 80" fill="none" stroke="#548235" stroke-width="2" marker-end="url(#arrowheadGreen)" class="arrow-anim" style="animation-delay: 0.5s"/>
    <text x="248" y="72" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">b</text>
    
    <!-- q2 -> q1 (a) -->
    <path d="M 305 55 Q 250 10 195 55" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-anim" style="animation-delay: 0.6s"/>
    <text x="250" y="28" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">a</text>
    
    <!-- q2 -> q0 (b) -->
    <path d="M 305 100 Q 250 150 100 130" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-anim" style="animation-delay: 0.7s"/>
    <text x="200" y="155" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">b</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g transform="translate(10, 210)" data-narration="The 5-tuple definition of a DFA: (Q, Σ, δ, q0, F)">
    <rect x="0" y="0" width="200" height="85" fill="white" stroke="#bdc3c7" stroke-width="1" rx="5" class="slide-in delay-2"/>
    <text x="10" y="20" font-family="Arial" font-size="13" font-weight="bold" fill="#2e4057">DFA Definition (5-tuple)</text>
    <text x="10" y="40" font-family="Arial" font-size="11" fill="#555">Q = {q0, q1, q2}  states</text>
    <text x="10" y="55" font-family="Arial" font-size="11" fill="#555">Σ = {a, b}  alphabet</text>
    <text x="10" y="70" font-family="Arial" font-size="11" fill="#555">δ: Q × Σ → Q  transition</text>
    <text x="100" y="70" font-family="Arial" font-size="11" fill="#555">q0 = initial</text>
    <text x="10" y="85" font-family="Arial" font-size="11" fill="#555">F = {q2}  accepting</text>
  </g>
  
  <!-- Transition Table -->
  <g transform="translate(220, 210)" data-narration="Transition function table showing next state for each state and input symbol">
    <rect x="0" y="0" width="190" height="85" fill="white" stroke="#bdc3c7" stroke-width="1" rx="5" class="slide-in delay-3"/>
    <text x="95" y="18" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2e4057">Transition δ</text>
    <!-- Table header -->
    <line x1="10" y1="28" x2="180" y2="28" stroke="#bdc3c7"/>
    <text x="30" y="23" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">δ</text>
    <text x="75" y="23" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">a</text>
    <text x="130" y="23" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">b</text>
    <!-- Table rows -->
    <text x="30" y="45" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q0</text>
    <text x="75" y="45" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q1</text>
    <text x="130" y="45" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q0</text>
    <line x1="10" y1="52" x2="180" y2="52" stroke="#eee"/>
    <text x="30" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q1</text>
    <text x="75" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q1</text>
    <text x="130" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q2</text>
    <line x1="10" y1="72" x2="180" y2="72" stroke="#eee"/>
    <text x="30" y="85" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q2</text>
    <text x="75" y="85" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q1</text>
    <text x="130" y="85" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">q0</text>
  </g>
  
  <!-- Explanation Box -->
  <g transform="translate(10, 305)" data-narration="How the DFA processes input strings to determine acceptance">
    <rect x="0" y="0" width="400" height="80" fill="white" stroke="#bdc3c7" stroke-width="1" rx="5" class="slide-in delay-4"/>
    <text x="15" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#2e4057">How It Works:</text>
    <text x="15" y="38" font-family="Arial" font-size="11" fill="#555">• q0: No relevant suffix | q1: Last symbol was 'a' | q2: Ends with "ab" (accepting)</text>
    <text x="15" y="55" font-family="Arial" font-size="11" fill="#555">• Read input left-to-right, follow arrows. If end in q2 → ACCEPT, else REJECT.</text>
    <text x="15" y="72" font-family="Arial" font-size="11" fill="#555">• Examples: "ab" → accept, "aab" → accept, "ba" → reject, "a" → reject</text>
  </g>
  
  <!-- Arrow from definition to table -->
  <path d="M 215 252 L 218 252" stroke="#888" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
</svg>