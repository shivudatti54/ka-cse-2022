<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pumping-lemma-kleene-theorem">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#e8f8f4"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff"/>
      <stop offset="100%" style="stop-color:#b8d4f0"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d5f5e3"/>
      <stop offset="100%" style="stop-color:#abebc6"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out forwards; }
    .section1 { animation: slideIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .section2 { animation: slideIn 0.8s ease-out 0.5s forwards; opacity: 0; }
    .section3 { animation: slideIn 0.8s ease-out 0.7s forwards; opacity: 0; }
    .section4 { animation: slideUp 0.8s ease-out 0.9s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .string-anim { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Pumping Lemma &amp;</text>
  <text x="210" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Kleene's Theorem</text>
  
  <!-- Section 1: Pumping Lemma Box -->
  <g class="section1" data-narration="The Pumping Lemma shows that for regular languages, any long enough string can be divided into xyz where y can be pumped.">
    <rect x="15" y="75" width="185" height="130" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="108" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a5276">Pumping Lemma</text>
    
    <!-- String representation -->
    <g class="string-anim">
      <rect x="30" y="110" width="40" height="22" rx="3" fill="#85c1e9" stroke="#2980b9" stroke-width="1"/>
      <text x="50" y="126" text-anchor="middle" font-family="monospace" font-size="12" fill="#154360">x</text>
      <rect x="70" y="110" width="40" height="22" rx="3" fill="#f5b041" stroke="#d68910" stroke-width="1"/>
      <text x="90" y="126" text-anchor="middle" font-family="monospace" font-size="12" fill="#7d5100">y</text>
      <rect x="110" y="110" width="40" height="22" rx="3" fill="#85c1e9" stroke="#2980b9" stroke-width="1"/>
      <text x="130" y="126" text-anchor="middle" font-family="monospace" font-size="12" fill="#154360">z</text>
    </g>
    
    <text x="108" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">w = xyz, |y| ≥ 1</text>
    <text x="108" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">xyⁱz ∈ L for all i ≥ 0</text>
    <text x="108" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">Used to prove non-regularity</text>
  </g>
  
  <!-- Section 2: Kleene's Theorem Box -->
  <g class="section2" data-narration="Kleene's Theorem establishes the equivalence between Regular Expressions and Finite Automata.">
    <rect x="220" y="75" width="185" height="130" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="312" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e8449">Kleene's Theorem</text>
    
    <!-- FA to RE diagram -->
    <circle cx="265" cy="130" r="18" fill="#82e0aa" stroke="#27ae60" stroke-width="2"/>
    <text x="265" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#145a32">FA</text>
    
    <circle cx="360" cy="130" r="18" fill="#82e0aa" stroke="#27ae60" stroke-width="2"/>
    <text x="360" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#145a32">RE</text>
    
    <path d="M283 130 Q312 110 340 130" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <path d="M340 145 Q312 165 283 145" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,2"/>
    
    <text x="312" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e8449">Convert</text>
    <text x="312" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Regular ⇔ FA-recognizable</text>
  </g>
  
  <!-- Section 3: Finite Automaton Visual -->
  <g class="section3" data-narration="A finite automaton consists of states and transitions, accepting strings that match patterns.">
    <rect x="15" y="220" width="185" height="100" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="108" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#7b241c">Finite Automaton</text>
    
    <!-- Simple FA diagram -->
    <circle cx="55" cy="280" r="15" fill="#fadbd8" stroke="#c0392b" stroke-width="2"/>
    <text x="55" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7b241c">q₀</text>
    
    <circle cx="130" cy="280" r="15" fill="#fadbd8" stroke="#c0392b" stroke-width="2"/>
    <circle cx="130" cy="280" r="11" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="130" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7b241c">q₁</text>
    
    <path d="M70 280 L115 280" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="92" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#922b21">a</text>
    <text x="92" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#922b21">b</text>
    
    <text x="108" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7b241c">Accepting state</text>
  </g>
  
  <!-- Section 4: Key Conditions -->
  <g class="section4" data-narration="Key conditions and applications of both theorems in determining language regularity.">
    <rect x="220" y="220" width="185" height="100" rx="8" fill="#f0e68c" filter="url(#shadow)" opacity="0.9"/>
    <text x="312" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#7d6608">Key Points</text>
    
    <text x="230" y="265" font-family="Arial, sans-serif" font-size="11" fill="#5d4d00">• Regular language ⇔ FA/RE</text>
    <text x="230" y="282" font-family="Arial, sans-serif" font-size="11" fill="#5d4d00">• Pumping length p exists</text>
    <text x="230" y="299" font-family="Arial, sans-serif" font-size="11" fill="#5d4d00">• |xy| ≤ p, |y| ≥ 1</text>
    <text x="230" y="316" font-family="Arial, sans-serif" font-size="11" fill="#c0392b">• Counterexample: aⁿbⁿ</text>
  </g>
  
  <!-- Decorative arrow between sections -->
  <g class="pulse">
    <path d="M200 140 L215 140" fill="none" stroke="#3498db" stroke-width="2"/>
    <polygon points="215,135 225,140 215,145" fill="#3498db"/>
  </g>
  
  <!-- Bottom note -->
  <text x="210" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" font-style="italic">Regular Languages: Closed under operations, recognizable by FA</text>
</svg>