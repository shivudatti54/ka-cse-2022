<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="properties-of-regular-languages">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#f0e8f4"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4e8"/>
      <stop offset="100%" style="stop-color:#b8a4d4"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4c4"/>
      <stop offset="100%" style="stop-color:#d4b8a4"/>
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4d4e8"/>
      <stop offset="100%" style="stop-color:#a4b8d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .state-circle { fill: #fff; stroke: #3498db; stroke-width: 2; }
    .state-inner { fill: #3498db; }
    .transition-line { fill: none; stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .box-rect { rx: 8; ry: 8; filter: url(#shadow); }
    .section-1 { animation: slideInLeft 0.8s ease-out forwards; }
    .section-2 { animation: slideInRight 0.8s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .section-3 { animation: slideInUp 0.8s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .section-4 { animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .center-diagram { animation: pulse 3s ease-in-out infinite; transform-origin: 210px 200px; }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Properties of Regular Languages</text>
  
  <!-- Finite Automaton Diagram (Center) -->
  <g class="center-diagram">
    <circle cx="210" cy="200" r="45" class="state-circle"/>
    <circle cx="210" cy="200" r="12" class="state-inner"/>
    <text x="210" y="204" text-anchor="middle" fill="white" font-size="10" font-family="Arial">q0</text>
    
    <circle cx="170" cy="170" r="30" class="state-circle" style="animation-delay: 0.3s"/>
    <circle cx="170" cy="170" r="8" class="state-inner" style="animation-delay: 0.3s"/>
    <text x="170" y="174" text-anchor="middle" fill="white" font-size="9" font-family="Arial">q1</text>
    
    <circle cx="250" cy="170" r="30" class="state-circle" style="animation-delay: 0.5s"/>
    <circle cx="250" cy="170" r="8" class="state-inner" style="animation-delay: 0.5s"/>
    <text x="250" y="174" text-anchor="middle" fill="white" font-size="9" font-family="Arial">q2</text>
    
    <!-- Transitions -->
    <path d="M195 185 Q210 160 225 185" class="transition-line" style="animation-delay: 0.2s"/>
    <text x="220" y="165" class="detail" text-anchor="middle">a</text>
    
    <path d="M185 175 Q170 150 180 140" class="transition-line" style="animation-delay: 0.4s"/>
    <text x="165" y="138" class="detail" text-anchor="middle">b</text>
    
    <path d="M235 175 Q250 150 240 140" class="transition-line" style="animation-delay: 0.6s"/>
    <text x="255" y="138" class="detail" text-anchor="middle">a</text>
    
    <text x="210" y="265" class="label" text-anchor="middle">Finite Automaton</text>
    <text x="210" y="280" class="detail" text-anchor="middle">States &amp; Transitions</text>
  </g>
  
  <!-- Section 1: Closure Properties (Top-Left) -->
  <g class="section-1" data-narration="Closure properties show that regular languages are closed under union, intersection, concatenation, and Kleene star operations.">
    <rect x="10" y="60" width="130" height="110" fill="url(#boxGrad1)" class="box-rect"/>
    <text x="75" y="80" text-anchor="middle" class="label" fill="#2c5e4a">Closure Properties</text>
    <line x1="20" y1="90" x2="130" y2="90" stroke="#7fb396" stroke-width="1"/>
    <text x="20" y="108" class="detail">• Union</text>
    <text x="20" y="122" class="detail">• Intersection</text>
    <text x="20" y="136" class="detail">• Concatenation</text>
    <text x="20" y="150" class="detail">• Kleene Star</text>
    <text x="75" y="165" class="detail" text-anchor="middle" fill="#2c5e4a">L1 ∪ L2 = Regular</text>
  </g>
  
  <!-- Section 2: Decidability (Top-Right) -->
  <g class="section-2" data-narration="Regular languages are decidable - we can algorithmically determine if a string belongs to the language.">
    <rect x="280" y="60" width="130" height="110" fill="url(#boxGrad2)" class="box-rect"/>
    <text x="345" y="80" text-anchor="middle" class="label" fill="#4a2c6e">Decidability</text>
    <line x1="290" y1="90" x2="400" y2="90" stroke="#a984d4" stroke-width="1"/>
    <text x="290" y="108" class="detail">• Membership Test</text>
    <text x="290" y="122" class="detail">• Emptiness Check</text>
    <text x="290" y="136" class="detail">• Finiteness Test</text>
    <text x="290" y="150" class="detail">• Equivalence Test</text>
    <text x="345" y="165" class="detail" text-anchor="middle" fill="#4a2c6e">Algorithm exists!</text>
  </g>
  
  <!-- Section 3: Operations (Bottom-Left) -->
  <g class="section-3" data-narration="The four main operations preserve regularity - building complex languages from simpler ones.">
    <rect x="10" y="300" width="130" height="85" fill="url(#boxGrad3)" class="box-rect"/>
    <text x="75" y="320" text-anchor="middle" class="label" fill="#6e4a2c">Operations</text>
    <line x1="20" y1="330" x2="130" y2="330" stroke="#d4a784" stroke-width="1"/>
    <text x="20" y="348" class="detail">L1 ∪ L2</text>
    <text x="70" y="348" class="detail" fill="#c0392b">Union</text>
    <text x="20" y="363" class="detail">L1 ∩ L2</text>
    <text x="70" y="363" class="detail" fill="#c0392b">Intersect</text>
    <text x="20" y="378" class="detail">L1·L2</text>
    <text x="70" y="378" class="detail" fill="#c0392b">Concat</text>
  </g>
  
  <!-- Section 4: Minimization (Bottom-Right) -->
  <g class="section-4" data-narration="Minimization finds the smallest DFA recognizing a regular language - useful for efficiency.">
    <rect x="280" y="300" width="130" height="85" fill="url(#boxGrad4)" class="box-rect"/>
    <text x="345" y="320" text-anchor="middle" class="label" fill="#2c3e6e">Minimization</text>
    <line x1="290" y1="330" x2="400" y2="330" stroke="#8494c4" stroke-width="1"/>
    <text x="290" y="350" class="detail">• Reduce states</text>
    <text x="290" y="365" class="detail">• Remove equivalent</text>
    <text x="290" y="380" class="detail">• Optimize DFA</text>
  </g>
  
  <!-- Connection Arrows -->
  <g stroke="#7f8c8d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#7f8c8d"/>
      </marker>
    </defs>
    <path d="M140 115 Q210 115 275 115" style="animation: fadeIn 1s ease-out forwards; animation-delay: 0.8s; opacity: 0"/>
    <path d="M145 350 Q210 350 275 350" style="animation: fadeIn 1s ease-out forwards; animation-delay: 1s; opacity: 0"/>
    <path d="M75 170 Q75 185 75 200" style="animation: fadeIn 1s ease-out forwards; animation-delay: 1.2s; opacity: 0"/>
    <path d="M345 170 Q345 185 345 200" style="animation: fadeIn 1s ease-out forwards; animation-delay: 1.4s; opacity: 0"/>
  </g>
  
  <!-- Key Concept Labels -->
  <g class="section-4" data-narration="Key elements: States represent the memory of the automaton, transitions define how the machine moves, and input is processed step by step.">
    <rect x="155" y="320" width="110" height="40" fill="rgba(255,255,255,0.7)" rx="5" ry="5"/>
    <text x="210" y="338" text-anchor="middle" class="label" fill="#2c3e50" font-size="12">Key Concepts</text>
    <text x="210" y="352" text-anchor="middle" class="detail">States • Transitions • Input</text>
  </g>
</svg>