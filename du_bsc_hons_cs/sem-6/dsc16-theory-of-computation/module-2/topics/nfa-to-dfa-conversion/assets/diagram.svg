<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="nfa-to-dfa-conversion">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="nfaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="dfaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1f2eb"/>
      <stop offset="100%" style="stop-color:#76d7c4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowMove {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 20; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .concept-box { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #2c3e50; }
    .nfa-state { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #d35400; }
    .dfa-state { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #16a085; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #3498db; stroke-width: 3; stroke-dasharray: 10,5; animation: arrowMove 2s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">NFA to DFA Conversion</text>
  <text x="210" y="50" text-anchor="middle" class="detail slide-up" style="animation-delay: 0.3s">Subset Construction Algorithm</text>
  
  <!-- NFA Section -->
  <g class="slide-left" style="animation-delay: 0.5s" data-narration="The NFA section shows a nondeterministic finite automaton with states A, B, C, D and epsilon transitions">
    <rect x="20" y="70" width="160" height="150" fill="url(#nfaGradient)" rx="8" filter="url(#shadow)"/>
    <text x="100" y="90" text-anchor="middle" class="section-title">NFA</text>
    
    <!-- NFA States -->
    <circle cx="60" cy="130" r="18" fill="#fff" stroke="#e67e22" stroke-width="2"/>
    <text x="60" y="135" text-anchor="middle" class="nfa-state">A</text>
    
    <circle cx="130" cy="130" r="18" fill="#fff" stroke="#e67e22" stroke-width="2"/>
    <text x="130" y="135" text-anchor="middle" class="nfa-state">B</text>
    
    <circle cx="60" cy="190" r="18" fill="#fff" stroke="#e67e22" stroke-width="2"/>
    <text x="60" y="195" text-anchor="middle" class="nfa-state">C</text>
    
    <circle cx="130" cy="190" r="18" fill="#fff" stroke="#e67e22" stroke-width="2" stroke-dasharray="4"/>
    <text x="130" y="195" text-anchor="middle" class="nfa-state">D*</text>
    
    <!-- NFA Transitions -->
    <path d="M75 145 Q100 115 115 145" fill="none" stroke="#d35400" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="100" y="120" text-anchor="middle" class="detail">0</text>
    
    <path d="M95 190 L115 190" fill="none" stroke="#d35400" stroke-width="1.5"/>
    <text x="108" y="185" text-anchor="middle" class="detail">1</text>
    
    <path d="M42 145 L42 172" fill="none" stroke="#d35400" stroke-width="1.5"/>
    <text x="36" y="162" text-anchor="middle" class="detail">ε</text>
    
    <path d="M60 208 Q60 220 80 215 Q95 210 110 215" fill="none" stroke="#d35400" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="95" y="230" text-anchor="middle" class="detail">ε</text>
    
    <text x="100" y="205" text-anchor="middle" class="detail" style="font-size:10px">ε</text>
    <path d="M85 190 L105 190" fill="none" stroke="#d35400" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Arrow and Process -->
  <g data-narration="The conversion uses epsilon closure to compute reachable states for each input symbol">
    <path d="M185 145 L235 145" class="arrow-line"/>
    <polygon points="230,140 245,145 230,150" fill="#3498db"/>
    
    <text x="210" y="135" text-anchor="middle" class="detail pulse" style="animation-delay: 1s">Subset</text>
    <text x="210" y="150" text-anchor="middle" class="detail pulse" style="animation-delay: 1.2s">Construction</text>
  </g>
  
  <!-- DFA Section -->
  <g class="slide-right" style="animation-delay: 0.8s" data-narration="The DFA section shows the converted deterministic states using power set of NFA states">
    <rect x="245" y="70" width="160" height="150" fill="url(#dfaGradient)" rx="8" filter="url(#shadow)"/>
    <text x="325" y="90" text-anchor="middle" class="section-title">DFA</text>
    
    <!-- DFA States -->
    <rect x="275" y="120" width="100" height="30" rx="5" fill="#fff" stroke="#1abc9c" stroke-width="2"/>
    <text x="325" y="140" text-anchor="middle" class="dfa-state">{A,C,D}</text>
    
    <rect x="275" y="165" width="100" height="30" rx="5" fill="#fff" stroke="#1abc9c" stroke-width="2"/>
    <text x="325" y="185" text-anchor="middle" class="dfa-state">{B,D}</text>
    
    <rect x="275" y="210" width="100" height="30" rx="5" fill="#fff" stroke="#1abc9c" stroke-width="2" stroke-dasharray="4"/>
    <text x="325" y="230" text-anchor="middle" class="dfa-state">{D}*</text>
    
    <!-- DFA Transitions -->
    <path d="M325 150 L325 162" fill="none" stroke="#16a085" stroke-width="2"/>
    <polygon points="320,157 325,167 330,157" fill="#16a085"/>
    <text x="340" y="160" text-anchor="middle" class="detail">0</text>
    
    <path d="M325 195 L325 207" fill="none" stroke="#16a085" stroke-width="2"/>
    <polygon points="320,202 325,212 330,202" fill="#16a085"/>
    <text x="340" y="205" text-anchor="middle" class="detail">1</text>
    
    <path d="M325 195 Q360 195 360 220 L330 220" fill="none" stroke="#16a085" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="355" y="210" text-anchor="middle" class="detail">0</text>
  </g>
  
  <!-- Key Concepts -->
  <g class="slide-up" style="animation-delay: 1.2s" data-narration="Key concepts include epsilon closure, power set construction, and the transition function mapping">
    <rect x="20" y="235" width="115" height="50" fill="#fff" rx="5" stroke="#9b59b6" stroke-width="1.5" opacity="0.9"/>
    <text x="77" y="250" text-anchor="middle" class="concept-box" style="font-weight:bold">ε-Closure</text>
    <text x="77" y="265" text-anchor="middle" class="concept-box" style="font-size:10px">States reachable via ε</text>
    <text x="77" y="278" text-anchor="middle" class="concept-box" style="font-size:10px">transitions</text>
    
    <rect x="150" y="235" width="115" height="50" fill="#fff" rx="5" stroke="#9b59b6" stroke-width="1.5" opacity="0.9"/>
    <text x="207" y="250" text-anchor="middle" class="concept-box" style="font-weight:bold">Power Set</text>
    <text x="207" y="265" text-anchor="middle" class="concept-box" style="font-size:10px">All possible subsets</text>
    <text x="207" y="278" text-anchor="middle" class="concept-box" style="font-size:10px">of NFA states</text>
    
    <rect x="280" y="235" width="125" height="50" fill="#fff" rx="5" stroke="#9b59b6" stroke-width="1.5" opacity="0.9"/>
    <text x="342" y="250" text-anchor="middle" class="concept-box" style="font-weight:bold">Transition Function</text>
    <text x="342" y="265" text-anchor="middle" class="concept-box" style="font-size:10px">δ(s, a) = ε-closure</text>
    <text x="342" y="278" text-anchor="middle" class="concept-box" style="font-size:10px">(NFA states reached)</text>
  </g>
  
  <!-- Bottom Legend -->
  <g class="fade-in" style="animation-delay: 1.5s" data-narration="Accepting states are marked with asterisk and double circles in the automata">
    <circle cx="60" cy="315" r="10" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="3"/>
    <text x="80" y="319" class="detail">Accepting in NFA</text>
    
    <rect x="200" y="305" width="40" height="20" rx="3" fill="none" stroke="#1abc9c" stroke-width="2" stroke-dasharray="3"/>
    <text x="250" y="319" class="detail">Accepting in DFA</text>
  </g>
  
  <!-- Algorithm Steps -->
  <g class="fade-in" style="animation-delay: 1.8s" data-narration="The algorithm creates an initial DFA state from epsilon closure of NFA initial state">
    <rect x="20" y="335" width="385" height="50" fill="#fff" rx="5" stroke="#3498db" stroke-width="1.5" opacity="0.95"/>
    <text x="210" y="352" text-anchor="middle" class="concept-box" style="font-weight:bold">Algorithm Steps:</text>
    <text x="210" y="368" text-anchor="middle" class="concept-box" style="font-size:10px">1. Start with ε-closure(initial NFA state) → 2. For each symbol, compute next DFA state → 3. Mark accepting if contains NFA accepting</text>
  </g>
</svg>