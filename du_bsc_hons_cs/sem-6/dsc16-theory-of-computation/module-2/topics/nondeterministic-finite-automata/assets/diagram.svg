<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="nondeterministic-finite-automata">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nfaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dfaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3436"/>
    </marker>
    <marker id="arrowheadNFA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e17055"/>
    </marker>
    <marker id="arrowheadDFA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c5ce7"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-nfa { animation: slideIn 0.6s ease-out 0.2s both; }
    .section-dfa { animation: slideIn 0.6s ease-out 0.4s both; }
    .section-key { animation: slideInUp 0.6s ease-out 0.6s both; }
    .concept-box { animation: fadeIn 0.5s ease-out; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .transition-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: dash 1s ease-out forwards; }
    .epsilon-line { stroke-dasharray: 50; stroke-dashoffset: 50; animation: dash 0.8s ease-out forwards; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2d3436" class="title">Nondeterministic Finite Automata</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#636e72" stroke-width="1" class="title"/>
  
  <!-- NFA Section -->
  <g class="section-nfa" data-narration="NFA: Multiple possible next states for an input symbol">
    <rect x="15" y="55" width="185" height="140" fill="url(#nfaGradient)" rx="8" stroke="#e17055" stroke-width="2"/>
    <text x="108" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d3436">NFA (Nondeterministic)</text>
    
    <!-- NFA States -->
    <circle cx="55" cy="115" r="12" fill="#fff" stroke="#e17055" stroke-width="2"/>
    <text x="55" y="119" text-anchor="middle" font-size="10" fill="#2d3436">q₀</text>
    
    <circle cx="105" cy="115" r="12" fill="#fff" stroke="#e17055" stroke-width="2"/>
    <text x="105" y="119" text-anchor="middle" font-size="10" fill="#2d3436">q₁</text>
    
    <circle cx="155" cy="115" r="12" fill="#fff" stroke="#e17055" stroke-width="2"/>
    <text x="155" y="119" text-anchor="middle" font-size="10" fill="#2d3436">q₂</text>
    
    <circle cx="155" cy="115" r="16" fill="none" stroke="#e17055" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- NFA Transitions -->
    <path d="M67 115 Q85 95 93 115" fill="none" stroke="#e17055" stroke-width="1.5" marker-end="url(#arrowheadNFA)" class="transition-line" style="animation-delay: 0.3s"/>
    <text x="78" y="100" font-size="9" fill="#d63031">a</text>
    
    <path d="M117 115 L143 115" fill="none" stroke="#e17055" stroke-width="1.5" marker-end="url(#arrowheadNFA)" class="transition-line" style="animation-delay: 0.5s"/>
    <text x="127" y="108" font-size="9" fill="#d63031">b</text>
    
    <!-- Branching transition (NFA characteristic) -->
    <path d="M117 127 Q140 150 143 135" fill="none" stroke="#e17055" stroke-width="1.5" marker-end="url(#arrowheadNFA)" class="transition-line" style="animation-delay: 0.7s"/>
    <text x="138" y="145" font-size="8" fill="#d63031">ε</text>
    
    <text x="108" y="175" text-anchor="middle" font-size="9" fill="#636e72">Multiple paths possible</text>
  </g>
  
  <!-- DFA Section -->
  <g class="section-dfa" data-narration="DFA: Exactly one next state for each input symbol">
    <rect x="220" y="55" width="185" height="140" fill="url(#dfaGradient)" rx="8" stroke="#6c5ce7" stroke-width="2"/>
    <text x="312" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">DFA (Deterministic)</text>
    
    <!-- DFA States -->
    <circle cx="260" cy="115" r="12" fill="#fff" stroke="#6c5ce7" stroke-width="2"/>
    <text x="260" y="119" text-anchor="middle" font-size="10" fill="#2d3436">p₀</text>
    
    <circle cx="312" cy="115" r="12" fill="#fff" stroke="#6c5ce7" stroke-width="2"/>
    <text x="312" y="119" text-anchor="middle" font-size="10" fill="#2d3436">p₁</text>
    
    <circle cx="364" cy="115" r="12" fill="#fff" stroke="#6c5ce7" stroke-width="2"/>
    <text x="364" y="119" text-anchor="middle" font-size="10" fill="#2d3436">p₂</text>
    
    <circle cx="364" cy="115" r="16" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- DFA Transitions (single path) -->
    <path d="M272 115 L298 115" fill="none" stroke="#6c5ce7" stroke-width="1.5" marker-end="url(#arrowheadDFA)" class="transition-line" style="animation-delay: 0.4s"/>
    <text x="283" y="108" font-size="9" fill="#a29bfe">a</text>
    
    <path d="M324 115 L350 115" fill="none" stroke="#6c5ce7" stroke-width="1.5" marker-end="url(#arrowheadDFA)" class="transition-line" style="animation-delay: 0.6s"/>
    <text x="335" y="108" font-size="9" fill="#a29bfe">b</text>
    
    <text x="312" y="175" text-anchor="middle" font-size="9" fill="#636e72">Exactly one path</text>
  </g>
  
  <!-- Equivalence Arrow -->
  <g data-narration="NFA and DFA are equivalent in expressive power">
    <path d="M200 125 L220 125" stroke="#2d3436" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="210" y="115" text-anchor="middle" font-size="10" fill="#636e72" class="pulse">Equivalent</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="section-key" data-narration="Key components: 5-tuple (Q, Σ, δ, q₀, F)">
    <rect x="15" y="205" width="390" height="85" fill="url(#keyGradient)" rx="8" stroke="#00cec9" stroke-width="2"/>
    <text x="210" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d3436">5-Tuple Definition: M = (Q, Σ, δ, q₀, F)</text>
    
    <text x="30" y="245" font-size="11" fill="#2d3436">• <tspan font-weight="bold">Q</tspan>: Finite set of states</text>
    <text x="150" y="245" font-size="11" fill="#2d3436">• <tspan font-weight="bold">Σ</tspan>: Input alphabet</text>
    <text x="260" y="245" font-size="11" fill="#2d3436">• <tspan font-weight="bold">δ</tspan>: Transition function</text>
    <text x="30" y="265" font-size="11" fill="#2d3436">• <tspan font-weight="bold">q₀</tspan>: Initial state</text>
    <text x="150" y="265" font-size="11" fill="#2d3436">• <tspan font-weight="bold">F</tspan>: Accepting states</text>
    <text x="260" y="265" font-size="11" fill="#2d3436">Accepts if ∃ path to F</text>
  </g>
  
  <!-- Epsilon Transition Box -->
  <g data-narration="Epsilon (ε) transitions allow state changes without consuming input">
    <rect x="290" y="300" width="115" height="55" fill="#ffeaa7" rx="6" stroke="#fdcb6e" stroke-width="2"/>
    <text x="347" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3436">ε-Transition</text>
    <text x="347" y="335" text-anchor="middle" font-size="10" fill="#636e72">Jump states</text>
    <text x="347" y="347" text-anchor="middle" font-size="9" fill="#636e72">without input</text>
  </g>
  
  <!-- Acceptance Concept -->
  <g data-narration="String acceptance: There exists at least one valid path from start to accept state">
    <rect x="15" y="300" width="180" height="55" fill="#e8daef" rx="6" stroke="#a29bfe" stroke-width="2"/>
    <text x="105" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3436">String Acceptance</text>
    <text x="105" y="335" text-anchor="middle" font-size="10" fill="#636e72">Accepts if ∃ sequence</text>
    <text x="105" y="347" text-anchor="middle" font-size="9" fill="#636e72">to accepting state</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(330, 365)">
    <circle cx="0" cy="0" r="5" fill="none" stroke="#e17055" stroke-width="1.5" stroke-dasharray="2,1"/>
    <text x="12" y="4" font-size="8" fill="#636e72">Accept</text>
  </g>
  <g transform="translate(330, 378)">
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#d63031" stroke-width="1"/>
    <text x="12" y="4" font-size="8" fill="#636e72">ε-transition</text>
  </g>
</svg>