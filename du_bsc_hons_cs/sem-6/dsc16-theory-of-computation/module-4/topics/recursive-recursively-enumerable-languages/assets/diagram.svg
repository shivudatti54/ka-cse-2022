<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="recursive-recursively-enumerable-languages" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="regularGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cflGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="recursiveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="reGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbc2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6c1ee;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box-1 { animation: slideIn 0.8s ease-out 0.2s both; }
    .box-2 { animation: slideIn 0.8s ease-out 0.4s both; }
    .box-3 { animation: slideIn 0.8s ease-out 0.6s both; }
    .box-4 { animation: slideIn 0.8s ease-out 0.8s both; }
    .re-oval { animation: fadeIn 1s ease-out 0.3s both; }
    .recursive-oval { animation: fadeIn 1s ease-out 0.5s both; }
    .cfl-oval { animation: fadeIn 1s ease-out 0.7s both; }
    .regular-oval { animation: fadeIn 1s ease-out 0.9s both; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawArrow 1s ease-out 1.2s forwards; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Recursive &amp; RE Languages</text>
  
  <!-- Main Hierarchy Diagram - Concentric Ovals -->
  <g transform="translate(150, 180)">
    <!-- RE (outermost) -->
    <ellipse cx="0" cy="0" rx="130" ry="90" fill="url(#reGrad)" stroke="#9b59b6" stroke-width="2" class="re-oval" filter="url(#shadow)"/>
    <text x="0" y="-70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6c3483">Recursively Enumerable</text>
    <text x="0" y="-55" text-anchor="middle" font-family="Arial" font-size="10" fill="#6c3483">(Turing-Recognizable)</text>
    
    <!-- Recursive (middle) -->
    <ellipse cx="0" cy="0" rx="95" ry="65" fill="url(#recursiveGrad)" stroke="#3498db" stroke-width="2" class="recursive-oval"/>
    <text x="0" y="-45" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a5276">Recursive</text>
    <text x="0" y="-30" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a5276">(Decidable)</text>
    
    <!-- CFL (inner) -->
    <ellipse cx="0" cy="0" rx="60" ry="40" fill="url(#cflGrad)" stroke="#e17055" stroke-width="2" class="cfl-oval"/>
    <text x="0" y="-20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#a04000">Context-Free</text>
    
    <!-- Regular (innermost) -->
    <ellipse cx="0" cy="0" rx="28" ry="18" fill="url(#regularGrad)" stroke="#27ae60" stroke-width="2" class="regular-oval"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1e8449">Regular</text>
  </g>
  
  <!-- Containment Arrows -->
  <g class="pulse-anim">
    <line x1="250" y1="160" x2="290" y2="130" stroke="#2c3e50" stroke-width="1.5" class="arrow-line" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>
  
  <!-- Key Concept Boxes on Right Side -->
  <g transform="translate(290, 100)">
    <rect x="0" y="0" width="120" height="55" rx="5" fill="#fff" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)" class="box-1"/>
    <text x="10" y="18" font-family="Arial" font-size="11" font-weight="bold" fill="#c0392b" data-narration="RE Definition">RE Language:</text>
    <text x="10" y="35" font-family="Arial" font-size="9" fill="#2c3e50">TM accepts strings</text>
    <text x="10" y="47" font-family="Arial" font-size="9" fill="#2c3e50">in L, may loop</text>
    
    <rect x="0" y="65" width="120" height="55" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)" class="box-2"/>
    <text x="10" y="83" font-family="Arial" font-size="11" font-weight="bold" fill="#1e8449" data-narration="Recursive Definition">Recursive:</text>
    <text x="10" y="100" font-family="Arial" font-size="9" fill="#2c3e50">TM always halts</text>
    <text x="10" y="112" font-family="Arial" font-size="9" fill="#2c3e50">accepts/rejects</text>
    
    <rect x="0" y="130" width="120" height="45" rx="5" fill="#fff" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)" class="box-3"/>
    <text x="10" y="148" font-family="Arial" font-size="11" font-weight="bold" fill="#2874a6" data-narration="Key Property">Key Property:</text>
    <text x="10" y="165" font-family="Arial" font-size="9" fill="#2c3e50">RE ⊃ Recursive</text>
    
    <rect x="0" y="185" width="120" height="45" rx="5" fill="#fff" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)" class="box-4"/>
    <text x="10" y="203" font-family="Arial" font-size="11" font-weight="bold" fill="#7d3c98" data-narration="Closure Properties">Closure:</text>
    <text x="10" y="220" font-family="Arial" font-size="9" fill="#2c3e50">RE closed under</text>
    <text x="10" y="232" font-family="Arial" font-size="9" fill="#2c3e50">∪, ∩, ∘</text>
  </g>
  
  <!-- Bottom Labels -->
  <g transform="translate(20, 360)">
    <text x="0" y="0" font-family="Arial" font-size="10" fill="#7f8c8d" data-narration="Regular subset of CFL">Regular ⊂ CFL</text>
    <text x="80" y="0" font-family="Arial" font-size="10" fill="#7f8c8d" data-narration="CFL subset of Recursive">CFL ⊂ Recursive</text>
    <text x="170" y="0" font-family="Arial" font-size="10" fill="#7f8c8d" data-narration="Recursive subset of RE">Recursive ⊂ RE</text>
  </g>
  
  <!-- Subset symbols -->
  <text x="95" y="280" font-family="Arial" font-size="16" fill="#e74c3c" font-weight="bold">⊂</text>
  <text x="180" y="270" font-family="Arial" font-size="16" fill="#e74c3c" font-weight="bold">⊂</text>
</svg>