<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="church-turing-thesis" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9fc5d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8d99c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3c9b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8b89c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b8d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b89cc9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e3d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9cd8b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e68c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#daa520;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title-text { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .center-text { font-family: Georgia, serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .card-box { rx: 8; ry: 8; stroke: #666; stroke-width: 1; }
    .center-box { rx: 12; ry: 12; stroke: #b8860b; stroke-width: 2; }
    .arrow-line { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .card1-anim { animation: slideInLeft 0.8s ease-out 0.2s forwards; opacity: 0; }
    .card2-anim { animation: slideInRight 0.8s ease-out 0.3s forwards; opacity: 0; }
    .card3-anim { animation: slideInLeft 0.8s ease-out 0.4s forwards; opacity: 0; }
    .card4-anim { animation: slideInRight 0.8s ease-out 0.5s forwards; opacity: 0; }
    .card5-anim { animation: slideInUp 0.8s ease-out 0.6s forwards; opacity: 0; }
    .center-anim { animation: pulse 2s ease-in-out infinite; }
    .connector-anim { animation: fadeIn 1s ease-out 0.8s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text title-anim">Church-Turing Thesis</text>
  <text x="210" y="50" text-anchor="middle" class="detail-text" style="animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0;">Equivalent Models of Computation</text>
  
  <!-- Top Cards Row -->
  <!-- Turing Machine -->
  <g class="card1-anim" data-narration="Turing Machine (1936): Alan Turing's abstract model using a tape-based mechanism with read/write head">
    <rect x="20" y="70" width="100" height="55" fill="url(#cardGradient1)" class="card-box" />
    <text x="70" y="88" text-anchor="middle" class="label-text">Turing Machine</text>
    <text x="70" y="105" text-anchor="middle" class="detail-text">Turing, 1936</text>
  </g>
  
  <!-- Lambda Calculus -->
  <g class="card2-anim" data-narration="Lambda Calculus (1936): Alonzo Church's functional abstraction model using lambda expressions">
    <rect x="300" y="70" width="100" height="55" fill="url(#cardGradient2)" class="card-box" />
    <text x="350" y="88" text-anchor="middle" class="label-text">Lambda Calculus</text>
    <text x="350" y="105" text-anchor="middle" class="detail-text">Church, 1936</text>
  </g>
  
  <!-- Middle Left Card -->
  <!-- Recursive Functions -->
  <g class="card3-anim" data-narration="Recursive Functions: Gödel-Kleene's mathematical approach using primitive recursive functions">
    <rect x="25" y="175" width="95" height="55" fill="url(#cardGradient3)" class="card-box" />
    <text x="72" y="193" text-anchor="middle" class="label-text">Recursive Functions</text>
    <text x="72" y="210" text-anchor="middle" class="detail-text">Gödel-Kleene</text>
  </g>
  
  <!-- Middle Right Card -->
  <!-- Unrestricted Grammars -->
  <g class="card4-anim" data-narration="Unrestricted Grammars: Chomsky Type-0 grammars generating recursively enumerable languages">
    <rect x="300" y="175" width="95" height="55" fill="url(#cardGradient4)" class="card-box" />
    <text x="347" y="193" text-anchor="middle" class="label-text">Unrestricted</text>
    <text x="347" y="210" text-anchor="middle" class="label-text">Grammars</text>
  </g>
  
  <!-- Bottom Center Card -->
  <!-- Post Systems -->
  <g class="card5-anim" data-narration="Post Systems: Emil Post's production rule-based computational model">
    <rect x="150" y="265" width="120" height="50" fill="url(#cardGradient5)" class="card-box" />
    <text x="210" y="285" text-anchor="middle" class="label-text">Post Systems</text>
    <text x="210" y="302" text-anchor="middle" class="detail-text">Emil Post</text>
  </g>
  
  <!-- Center - Church-Turing Thesis -->
  <g class="center-anim" data-narration="Church-Turing Thesis: All these models compute exactly the same class of functions - the computable functions">
    <circle cx="210" cy="175" r="55" fill="url(#centerGradient)" class="center-box" />
    <text x="210" y="160" text-anchor="middle" class="center-text" font-size="12">Church-Turing</text>
    <text x="210" y="178" text-anchor="middle" class="center-text" font-size="14">Thesis</text>
    <text x="210" y="198" text-anchor="middle" class="center-text" font-size="9">All Equivalent!</text>
  </g>
  
  <!-- Connectors with arrows -->
  <g class="connector-anim">
    <!-- Turing to Center -->
    <path d="M120 97 L165 140" class="arrow-line" />
    <!-- Lambda to Center -->
    <path d="M300 97 L255 140" class="arrow-line" />
    <!-- Recursive to Center -->
    <path d="M120 205 L170 150" class="arrow-line" />
    <!-- Unrestricted to Center -->
    <path d="M300 205 L250 150" class="arrow-line" />
    <!-- Post to Center -->
    <path d="M210 265 L210 230" class="arrow-line" />
  </g>
  
  <!-- Bottom Result Box -->
  <g style="animation: slideInUp 0.8s ease-out 0.7s forwards; opacity: 0;" data-narration="Conclusion: The class of Turing-computable functions equals the class of intuitively computable functions">
    <rect x="80" y="335" width="260" height="45" rx="5" ry="5" fill="#f8f8f0" stroke="#daa520" stroke-width="2" />
    <text x="210" y="352" text-anchor="middle" class="label-text" fill="#2c3e50">Computable Functions</text>
    <text x="210" y="368" text-anchor="middle" class="detail-text">All models compute the same class!</text>
  </g>
</svg>