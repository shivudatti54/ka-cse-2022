<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="decidability-halting-problem" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e8e8f5"/>
      <stop offset="100%" style="stop-color:#f5e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffccbc"/>
      <stop offset="100%" style="stop-color:#ffab91"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3e5fc"/>
      <stop offset="100%" style="stop-color:#81d4fa"/>
    </linearGradient>
    <linearGradient id="outerBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .highlight-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #c0392b; }
    .section-box { stroke: #bdc3c7; stroke-width: 1; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text fade-in">Decidability &amp; Halting Problem</text>
  
  <!-- Outer container - All Languages -->
  <rect x="30" y="55" width="360" height="320" rx="10" fill="url(#outerBox)" class="section-box slide-in" style="animation-delay: 0.2s" filter="url(#shadow)" data-narration="The outermost level represents all possible languages, which is the most general set containing every possible formal language."/>
  <text x="45" y="72" class="label-text" style="font-weight: bold;">All Languages</text>
  
  <!-- Recursively Enumerable -->
  <rect x="55" y="85" width="310" height="90" rx="8" fill="#d4e6f1" class="section-box slide-in" style="animation-delay: 0.4s" data-narration="Recursively Enumerable (RE) languages can be recognized by a Turing machine - if the input belongs to the language, the machine will eventually accept."/>
  <text x="65" y="102" class="label-text" style="font-weight: bold;">Recursively Enumerable</text>
  <text x="65" y="118" class="detail-text">Recognizable / Semi-decidable</text>
  <text x="65" y="133" class="detail-text">TM can say YES if in language</text>
  <text x="65" y="148" class="detail-text">May run forever if not in language</text>
  <text x="280" y="160" class="highlight-text pulse" style="animation-delay: 1s">Undecidable</text>
  
  <!-- Decidable / Recursive -->
  <rect x="70" y="195" width="280" height="80" rx="8" fill="url(#boxGradient3)" class="section-box slide-in" style="animation-delay: 0.6s" data-narration="Decidable (Recursive) languages are those for which a Turing machine can always give a YES or NO answer and halt on any input."/>
  <text x="80" y="212" class="label-text" style="font-weight: bold;">Decidable (Recursive)</text>
  <text x="80" y="228" class="detail-text">Algorithm always halts with answer</text>
  <text x="80" y="243" class="detail-text">Turing machine always halts</text>
  <text x="280" y="260" class="label-text pulse" style="animation-delay: 1.2s; fill: #27ae60;">✓ Decidable</text>
  
  <!-- Context-Free -->
  <rect x="100" y="290" width="220" height="60" rx="8" fill="url(#boxGradient1)" class="section-box slide-in" style="animation-delay: 0.8s" data-narration="Context-Free Languages are a proper subset of decidable languages, recognized by pushdown automata. Many programming languages are context-free."/>
  <text x="110" y="307" class="label-text" style="font-weight: bold;">Context-Free Languages</text>
  <text x="110" y="325" class="detail-text">Pushdown Automata</text>
  <text x="240" y="325" class="detail-text">Parser-friendly</text>
  
  <!-- Regular Languages -->
  <rect x="130" y="330" width="160" height="30" rx="6" fill="url(#boxGradient2)" class="section-box slide-in" style="animation-delay: 1s" data-narration="Regular Languages are the most restrictive class, recognized by finite automata. They can be described by regular expressions."/>
  <text x="140" y="349" class="label-text" style="font-size: 12px; font-weight: bold;">Regular Languages</text>
  <text x="250" y="349" class="detail-text">Finite Automata</text>
  
  <!-- Arrows showing subset relationship -->
  <g stroke="#7f8c8d" stroke-width="1.5" fill="none" stroke-dasharray="4,2">
    <line x1="200" y1="55" x2="200" y2="85" class="fade-in" style="animation-delay: 1.2s"/>
    <line x1="200" y1="175" x2="200" y2="195" class="fade-in" style="animation-delay: 1.4s"/>
    <line x1="200" y1="275" x2="200" y2="290" class="fade-in" style="animation-delay: 1.6s"/>
  </g>
  
  <!-- Halting Problem Box -->
  <rect x="310" y="95" width="95" height="55" rx="5" fill="#ffcdd2" stroke="#e57373" stroke-width="1" class="pulse" style="animation-delay: 1.5s" data-narration="The Halting Problem asks: given a program and input, will it halt? This is undecidable - no algorithm can solve it for all cases."/>
  <text x="318" y="110" class="label-text" style="font-size: 11px; font-weight: bold; fill: #c62828;">HALTING PROBLEM</text>
  <text x="318" y="124" class="detail-text" style="font-size: 10px;">Undecidable!</text>
  <text x="318" y="138" class="detail-text" style="font-size: 9px;">No algorithm can</text>
  
  <!-- Church-Turing Note -->
  <text x="45" y="380" class="detail-text fade-in" style="animation-delay: 1.8s; fill: #7f8c8d;">Church-Turing Thesis: Algorithm = Turing Machine</text>
</svg>