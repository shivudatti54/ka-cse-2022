<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="turing-machine-model">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e6fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tapeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe4b5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#98fb98;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90ee90;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="controlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dda0dd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#da70d6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveHead {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Georgia, serif; }
    .tape-cell { animation: slideIn 0.5s ease-out; }
    .control-box { animation: fadeIn 1s ease-out; }
    .arrow-line { stroke-dasharray: 100; animation: fadeIn 0.8s ease-out; }
    .pulse-element { animation: pulse 2s infinite; transform-origin: center; }
    .state-box { animation: fadeIn 0.8s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#4a4a6a" font-family="Georgia, serif">Turing Machine Model</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#da70d6" stroke-width="2" class="title" opacity="0.5"/>
  
  <!-- Tape Section (data-narration) -->
  <g data-narration="The infinite tape is divided into cells, each holding a symbol from the tape alphabet Γ. The tape can be extended infinitely in both directions.">
    <rect x="30" y="280" width="360" height="80" fill="url(#tapeGradient)" rx="5" filter="url(#shadow)"/>
    <text x="40" y="300" font-size="14" font-weight="bold" fill="#8b4513">Tape (Infinite)</text>
    <text x="40" y="318" font-size="11" fill="#a0522d">Γ = {0, 1, ␣}</text>
    
    <!-- Tape Cells -->
    <g class="tape-cell" style="animation-delay: 0.2s">
      <rect x="50" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="65" y="342" text-anchor="middle" font-size="12" fill="#333">1</text>
    </g>
    <g class="tape-cell" style="animation-delay: 0.3s">
      <rect x="80" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="95" y="342" text-anchor="middle" font-size="12" fill="#333">0</text>
    </g>
    <g class="tape-cell" style="animation-delay: 0.4s">
      <rect x="110" y="325" width="30" height="25" fill="#98fb98" stroke="#8b4513" stroke-width="2"/>
      <text x="125" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">1</text>
    </g>
    <g class="tape-cell" style="animation-delay: 0.5s">
      <rect x="140" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="155" y="342" text-anchor="middle" font-size="12" fill="#333">␣</text>
    </g>
    <g class="tape-cell" style="animation-delay: 0.6s">
      <rect x="170" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="185" y="342" text-anchor="middle" font-size="12" fill="#333">0</text>
    </g>
    <g class="tape-cell" style="animation-delay: 0.7s">
      <rect x="200" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="215" y="342" text-anchor="middle" font-size="12" fill="#333">1</text>
    </g>
    <g class="tape-cell" style="animation-delay: 0.8s">
      <rect x="230" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="245" y="342" text-anchor="middle" font-size="12" fill="#333">␣</text>
    </g>
    <g class="tape-cell" style="animation-delay: 0.9s">
      <rect x="260" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="275" y="342" text-anchor="middle" font-size="12" fill="#333">␣</text>
    </g>
    <g class="tape-cell" style="animation-delay: 1.0s">
      <rect x="290" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="305" y="342" text-anchor="middle" font-size="12" fill="#333">␣</text>
    </g>
    <g class="tape-cell" style="animation-delay: 1.1s">
      <rect x="320" y="325" width="30" height="25" fill="#fff" stroke="#8b4513" stroke-width="1"/>
      <text x="335" y="342" text-anchor="middle" font-size="12" fill="#333">␣</text>
    </g>
  </g>
  
  <!-- Read-Write Head -->
  <g data-narration="The Read-Write Head reads symbols from the tape and can write new symbols. It moves left (L), right (R), or stays stationary (S).">
    <polygon points="125,250 110,275 140,275" fill="url(#headGradient)" stroke="#228b22" stroke-width="2" filter="url(#shadow)" class="pulse-element"/>
    <text x="125" y="245" text-anchor="middle" font-size="11" fill="#228b22" font-weight="bold">HEAD</text>
    <line x1="125" y1="275" x2="125" y2="320" stroke="#228b22" stroke-width="2" stroke-dasharray="4"/>
  </g>
  
  <!-- Control Unit Section (data-narration) -->
  <g data-narration="The Control Unit contains the finite state set Q and implements the transition function δ: Q × Γ → Q × Γ × {L,R}.">
    <rect x="60" y="55" width="300" height="170" fill="url(#controlGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a004a">Control Unit</text>
    
    <!-- States -->
    <g class="state-box" style="animation-delay: 0.3s">
      <circle cx="120" cy="115" r="25" fill="#fff" stroke="#9932cc" stroke-width="2"/>
      <text x="120" y="110" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">q₀</text>
      <text x="120" y="125" text-anchor="middle" font-size="9" fill="#666">Start</text>
    </g>
    
    <g class="state-box" style="animation-delay: 0.5s">
      <circle cx="210" cy="115" r="25" fill="#98fb98" stroke="#228b22" stroke-width="2"/>
      <text x="210" y="110" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">q_accept</text>
      <text x="210" y="125" text-anchor="middle" font-size="9" fill="#666">Accept</text>
    </g>
    
    <g class="state-box" style="animation-delay: 0.7s">
      <circle cx="300" cy="115" r="25" fill="#ffb6c1" stroke="#cd5c5c" stroke-width="2"/>
      <text x="300" y="110" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">q_reject</text>
      <text x="300" y="125" text-anchor="middle" font-size="9" fill="#666">Reject</text>
    </g>
    
    <!-- Transition Function Box -->
    <g class="control-box" style="animation-delay: 0.9s">
      <rect x="100" y="155" width="220" height="55" fill="#fff" stroke="#9932cc" stroke-width="1" rx="3"/>
      <text x="210" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a004a">Transition Function δ</text>
      <text x="210" y="188" text-anchor="middle" font-size="10" fill="#333">δ(q, X) = (p, Y, D)</text>
      <text x="210" y="202" text-anchor="middle" font-size="9" fill="#666">State, Write, Direction</text>
    </g>
    
    <!-- Arrows between states -->
    <path d="M145,115 Q165,90 185,115" fill="none" stroke="#9932cc" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <path d="M235,115 Q265,90 285,115" fill="none" stroke="#9932cc" stroke-width="1.5"/>
  </g>
  
  <!-- Key Concepts Section (data-narration) -->
  <g data-narration="The 7-tuple definition: M = (Q, Σ, Γ, δ, q₀, q_accept, q_reject) formalizes all components.">
    <rect x="10" y="370" width="400" height="25" fill="rgba(255,255,255,0.7)" rx="3"/>
    <text x="210" y="387" text-anchor="middle" font-size="11" fill="#333">M = (Q, Σ, Γ, δ, q₀, q_accept, q_reject)</text>
  </g>
  
  <!-- Arrow from Control to Head -->
  <g data-narration="The control unit sends commands to the head to write symbols and move the tape.">
    <line x1="210" y1="225" x2="210" y2="250" stroke="#9932cc" stroke-width="2" class="arrow-line"/>
    <polygon points="205,240 215,240 210,250" fill="#9932cc"/>
  </g>
  
  <!-- Data flow labels -->
  <text x="345" y="290" font-size="9" fill="#666" transform="rotate(90, 345, 290)">Read/Write</text>
  <text x="220" y="240" font-size="8" fill="#9932cc">Control</text>
</svg>