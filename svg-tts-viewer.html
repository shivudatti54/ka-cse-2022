<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG + TTS Narration Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #16213e, #0f3460);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 2px solid #e94560;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    flex: 1;
  }

  .badge {
    background: #e94560;
    color: #fff;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    height: calc(100vh - 56px);
  }

  /* Left: SVG panel */
  .svg-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .svg-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: #16213e;
    border-bottom: 1px solid #2a2a4a;
    flex-wrap: wrap;
  }

  .svg-toolbar label {
    font-size: 12px;
    color: #aaa;
  }

  .btn {
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #2a2a4a;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { background: #1a4a7a; border-color: #4a6a9a; }
  .btn.primary { background: #e94560; border-color: #e94560; color: #fff; }
  .btn.primary:hover { background: #d63850; }
  .btn.active { background: #00b4d8; border-color: #00b4d8; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .svg-viewport {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: repeating-conic-gradient(#22223b 0% 25%, #1a1a2e 0% 50%) 50%/20px 20px;
    position: relative;
  }

  .svg-viewport.drag-over {
    outline: 3px dashed #e94560;
    outline-offset: -8px;
  }

  .drop-hint {
    text-align: center;
    color: #888;
    pointer-events: none;
  }

  .drop-hint .icon { font-size: 48px; margin-bottom: 12px; }
  .drop-hint p { font-size: 14px; margin-bottom: 4px; }
  .drop-hint small { font-size: 11px; color: #666; }

  #svgContainer {
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  #svgContainer svg {
    width: 100%;
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* Highlight active group */
  #svgContainer svg g.narration-active {
    outline: 2px solid #00b4d8;
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* Right: Narration panel */
  .narration-panel {
    background: #16213e;
    border-left: 1px solid #2a2a4a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .narration-header {
    padding: 14px 16px;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .narration-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }

  .controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls select {
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #2a2a4a;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 11px;
    max-width: 160px;
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .speed-control input[type="range"] {
    width: 70px;
    accent-color: #e94560;
  }

  .speed-label {
    font-size: 11px;
    color: #aaa;
    min-width: 32px;
  }

  .narration-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .narration-item {
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .narration-item:hover { background: #1a3a5c; }

  .narration-item.active {
    background: #0d2847;
    border-color: #00b4d8;
  }

  .narration-item.done {
    opacity: 0.6;
  }

  .narration-item .step-num {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    border-radius: 50%;
    background: #2a2a4a;
    color: #aaa;
    font-size: 11px;
    font-weight: 600;
    margin-right: 8px;
    vertical-align: middle;
  }

  .narration-item.active .step-num {
    background: #00b4d8;
    color: #fff;
  }

  .narration-item .begin-time {
    font-size: 10px;
    color: #666;
    float: right;
    margin-top: 2px;
  }

  .narration-item .narration-text {
    font-size: 12px;
    color: #ccc;
    margin-top: 6px;
    line-height: 1.5;
  }

  .narration-item.active .narration-text { color: #fff; }

  .status-bar {
    padding: 8px 16px;
    background: #0f3460;
    border-top: 1px solid #2a2a4a;
    font-size: 11px;
    color: #888;
    display: flex;
    justify-content: space-between;
  }

  .folder-browser {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 8px 16px;
    background: #0d1b30;
    border-bottom: 1px solid #2a2a4a;
    overflow-x: auto;
    white-space: nowrap;
  }

  .folder-browser .file-chip {
    background: #1a3a5c;
    border: 1px solid #2a4a6c;
    color: #ccc;
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .folder-browser .file-chip:hover { background: #2a4a7c; color: #fff; }
  .folder-browser .file-chip.active { background: #e94560; border-color: #e94560; color: #fff; }

  @media (max-width: 800px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }
    .narration-panel { border-left: none; border-top: 1px solid #2a2a4a; }
  }
</style>
</head>
<body>

<header>
  <h1>SVG + TTS Narration Viewer</h1>
  <span class="badge">Web Speech API</span>
</header>

<div class="main">
  <div class="svg-panel">
    <div class="svg-toolbar">
      <button class="btn primary" id="btnOpen">Open SVG File</button>
      <button class="btn" id="btnOpenFolder">Open Folder</button>
      <input type="file" id="fileInput" accept=".svg" hidden>
      <input type="file" id="folderInput" webkitdirectory hidden>
      <span style="flex:1"></span>
      <label>Zoom:</label>
      <button class="btn" id="btnZoomOut">-</button>
      <span id="zoomLevel" style="font-size:12px;min-width:36px;text-align:center">100%</span>
      <button class="btn" id="btnZoomIn">+</button>
      <button class="btn" id="btnZoomFit">Fit</button>
    </div>
    <div id="folderBar" class="folder-browser" style="display:none"></div>
    <div class="svg-viewport" id="svgViewport">
      <div id="svgContainer">
        <div class="drop-hint">
          <div class="icon">&#128444;</div>
          <p>Drop an SVG file here</p>
          <small>or click "Open SVG File" above</small>
        </div>
      </div>
    </div>
  </div>

  <div class="narration-panel">
    <div class="narration-header">
      <h2>Narration Steps</h2>
      <div class="controls">
        <button class="btn primary" id="btnPlay" disabled>&#9654; Play All</button>
        <button class="btn" id="btnPause" disabled>&#10074;&#10074; Pause</button>
        <button class="btn" id="btnStop" disabled>&#9632; Stop</button>
        <button class="btn" id="btnRestart" disabled>&#8634; Restart</button>
      </div>
      <div class="controls">
        <label style="font-size:11px;color:#aaa">Voice:</label>
        <select id="voiceSelect"></select>
        <div class="speed-control">
          <label class="speed-label" style="font-size:11px;color:#aaa">Rate:</label>
          <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
          <span class="speed-label" id="rateLabel">1.0x</span>
        </div>
      </div>
    </div>
    <div class="narration-list" id="narrationList">
      <p style="padding:20px;color:#666;text-align:center;font-size:13px">
        Load an SVG to see narration steps
      </p>
    </div>
    <div class="status-bar">
      <span id="statusText">Ready</span>
      <span id="topicId">-</span>
    </div>
  </div>
</div>

<script>
(function() {
  // State
  let narrationSteps = [];
  let currentStep = -1;
  let isPlaying = false;
  let isPaused = false;
  let zoom = 1;
  let svgElement = null;
  let folderFiles = [];

  // DOM refs
  const $ = id => document.getElementById(id);
  const svgContainer = $('svgContainer');
  const svgViewport = $('svgViewport');
  const narrationList = $('narrationList');
  const voiceSelect = $('voiceSelect');
  const rateSlider = $('rateSlider');
  const rateLabel = $('rateLabel');
  const statusText = $('statusText');
  const topicIdEl = $('topicId');
  const btnPlay = $('btnPlay');
  const btnPause = $('btnPause');
  const btnStop = $('btnStop');
  const btnRestart = $('btnRestart');
  const fileInput = $('fileInput');
  const folderInput = $('folderInput');
  const folderBar = $('folderBar');

  // Voices
  function loadVoices() {
    const voices = speechSynthesis.getVoices();
    voiceSelect.innerHTML = '';
    const preferred = ['Samantha', 'Alex', 'Google', 'Microsoft', 'Daniel', 'Karen'];
    const sorted = [...voices].sort((a, b) => {
      const aP = preferred.some(p => a.name.includes(p)) ? 0 : 1;
      const bP = preferred.some(p => b.name.includes(p)) ? 0 : 1;
      return aP - bP || a.name.localeCompare(b.name);
    });
    sorted.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      opt.dataset.voiceIndex = voices.indexOf(v);
      voiceSelect.appendChild(opt);
    });
  }

  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  rateSlider.addEventListener('input', () => {
    rateLabel.textContent = parseFloat(rateSlider.value).toFixed(1) + 'x';
  });

  // File open
  $('btnOpen').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadSVGFile(e.target.files[0]);
  });

  $('btnOpenFolder').addEventListener('click', () => folderInput.click());
  folderInput.addEventListener('change', e => {
    const files = Array.from(e.target.files)
      .filter(f => f.name.endsWith('.svg'))
      .sort((a, b) => a.webkitRelativePath.localeCompare(b.webkitRelativePath));
    if (files.length === 0) { alert('No SVG files found in folder'); return; }
    folderFiles = files;
    renderFolderBar();
    loadSVGFile(files[0]);
  });

  function renderFolderBar() {
    folderBar.style.display = 'flex';
    folderBar.innerHTML = '';
    folderFiles.forEach((f, i) => {
      const chip = document.createElement('span');
      chip.className = 'file-chip';
      chip.textContent = f.name.replace('.svg', '');
      chip.title = f.webkitRelativePath;
      chip.addEventListener('click', () => {
        loadSVGFile(f);
        document.querySelectorAll('.file-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
      if (i === 0) chip.classList.add('active');
      folderBar.appendChild(chip);
    });
  }

  // Drag and drop
  svgViewport.addEventListener('dragover', e => { e.preventDefault(); svgViewport.classList.add('drag-over'); });
  svgViewport.addEventListener('dragleave', () => svgViewport.classList.remove('drag-over'));
  svgViewport.addEventListener('drop', e => {
    e.preventDefault();
    svgViewport.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.svg')) loadSVGFile(file);
  });

  // Load SVG
  function loadSVGFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      stopNarration();
      svgContainer.innerHTML = e.target.result;
      svgElement = svgContainer.querySelector('svg');
      if (!svgElement) { statusText.textContent = 'Error: No SVG found'; return; }

      const tid = svgElement.getAttribute('data-topic-id') || '-';
      topicIdEl.textContent = 'Topic: ' + tid;

      // Reset all animated groups to visible (browser may not play SMIL on file:// load)
      resetAnimations();

      // Parse narration steps
      parseNarrationSteps();
      renderNarrationList();
      updateButtons();

      zoom = 1;
      applyZoom();
      statusText.textContent = `Loaded: ${file.name} (${narrationSteps.length} steps)`;
    };
    reader.readAsText(file);
  }

  function resetAnimations() {
    if (!svgElement) return;
    // Make all groups visible and remove SMIL-driven opacity for manual control
    const groups = svgElement.querySelectorAll('g[data-narration]');
    groups.forEach(g => {
      g.setAttribute('opacity', '1');
    });
  }

  function hideAllGroups() {
    if (!svgElement) return;
    const groups = svgElement.querySelectorAll('g[data-narration]');
    groups.forEach(g => g.setAttribute('opacity', '0'));
  }

  function showGroupUpTo(index) {
    if (!svgElement) return;
    const groups = svgElement.querySelectorAll('g[data-narration]');
    groups.forEach((g, i) => {
      g.setAttribute('opacity', i <= index ? '1' : '0');
      g.classList.toggle('narration-active', i === index);
    });
  }

  function parseNarrationSteps() {
    narrationSteps = [];
    if (!svgElement) return;
    const groups = svgElement.querySelectorAll('g[data-narration]');
    groups.forEach((g, i) => {
      const text = g.getAttribute('data-narration') || '';
      const anim = g.querySelector('animate');
      let begin = '?';
      if (anim) begin = anim.getAttribute('begin') || '?';
      narrationSteps.push({ index: i, text, begin, element: g });
    });
  }

  function renderNarrationList() {
    narrationList.innerHTML = '';
    if (narrationSteps.length === 0) {
      narrationList.innerHTML = '<p style="padding:20px;color:#666;text-align:center;font-size:13px">No narration groups found</p>';
      return;
    }
    narrationSteps.forEach((step, i) => {
      const div = document.createElement('div');
      div.className = 'narration-item';
      div.innerHTML = `
        <span class="begin-time">${step.begin}</span>
        <span class="step-num">${i + 1}</span>
        <strong style="font-size:12px">Step ${i + 1}</strong>
        <div class="narration-text">${escapeHtml(step.text)}</div>
      `;
      div.addEventListener('click', () => playSingleStep(i));
      narrationList.appendChild(div);
    });
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlightStep(index) {
    currentStep = index;
    const items = narrationList.querySelectorAll('.narration-item');
    items.forEach((item, i) => {
      item.classList.toggle('active', i === index);
      item.classList.toggle('done', i < index);
    });
    if (items[index]) items[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showGroupUpTo(index);
  }

  // TTS
  function speak(text) {
    return new Promise((resolve, reject) => {
      if (!text.trim()) { resolve(); return; }
      const utterance = new SpeechSynthesisUtterance(text);
      const voices = speechSynthesis.getVoices();
      const selectedOpt = voiceSelect.selectedOptions[0];
      if (selectedOpt) {
        const vi = parseInt(selectedOpt.dataset.voiceIndex);
        if (voices[vi]) utterance.voice = voices[vi];
      }
      utterance.rate = parseFloat(rateSlider.value);
      utterance.pitch = 1;
      utterance.onend = resolve;
      utterance.onerror = e => {
        if (e.error === 'interrupted' || e.error === 'canceled') resolve();
        else reject(e);
      };
      speechSynthesis.speak(utterance);
    });
  }

  async function playAll() {
    if (narrationSteps.length === 0) return;
    isPlaying = true;
    isPaused = false;
    updateButtons();
    hideAllGroups();

    const startFrom = currentStep >= 0 ? currentStep : 0;

    for (let i = startFrom; i < narrationSteps.length; i++) {
      if (!isPlaying) break;
      highlightStep(i);
      statusText.textContent = `Speaking step ${i + 1} of ${narrationSteps.length}...`;
      try {
        await speak(narrationSteps[i].text);
      } catch (e) {
        console.error('TTS error:', e);
      }
      if (!isPlaying) break;
      // Small pause between steps
      await new Promise(r => setTimeout(r, 400));
    }

    if (isPlaying) {
      statusText.textContent = 'Narration complete';
      isPlaying = false;
      currentStep = -1;
      resetAnimations();
      // Clear active highlights
      narrationList.querySelectorAll('.narration-item').forEach(item => {
        item.classList.remove('active');
        item.classList.add('done');
      });
    }
    updateButtons();
  }

  function playSingleStep(index) {
    stopNarration();
    highlightStep(index);
    statusText.textContent = `Speaking step ${index + 1}...`;
    speak(narrationSteps[index].text).then(() => {
      statusText.textContent = `Step ${index + 1} done`;
    });
  }

  function pauseNarration() {
    if (speechSynthesis.speaking) {
      speechSynthesis.pause();
      isPaused = true;
      statusText.textContent = 'Paused';
      updateButtons();
    }
  }

  function resumeNarration() {
    if (isPaused) {
      speechSynthesis.resume();
      isPaused = false;
      statusText.textContent = 'Resumed';
      updateButtons();
    }
  }

  function stopNarration() {
    isPlaying = false;
    isPaused = false;
    speechSynthesis.cancel();
    currentStep = -1;
    updateButtons();
  }

  function restartNarration() {
    stopNarration();
    currentStep = 0;
    playAll();
  }

  function updateButtons() {
    const hasSteps = narrationSteps.length > 0;
    btnPlay.disabled = !hasSteps || (isPlaying && !isPaused);
    btnPause.disabled = !isPlaying || isPaused;
    btnStop.disabled = !isPlaying;
    btnRestart.disabled = !hasSteps;

    btnPlay.innerHTML = isPaused ? '&#9654; Resume' : '&#9654; Play All';
  }

  btnPlay.addEventListener('click', () => {
    if (isPaused) resumeNarration();
    else playAll();
  });
  btnPause.addEventListener('click', pauseNarration);
  btnStop.addEventListener('click', () => {
    stopNarration();
    resetAnimations();
    narrationList.querySelectorAll('.narration-item').forEach(i => {
      i.classList.remove('active', 'done');
    });
    statusText.textContent = 'Stopped';
  });
  btnRestart.addEventListener('click', restartNarration);

  // Zoom
  function applyZoom() {
    if (svgElement) {
      svgElement.style.transform = `scale(${zoom})`;
      svgElement.style.transformOrigin = 'center center';
    }
    $('zoomLevel').textContent = Math.round(zoom * 100) + '%';
  }

  $('btnZoomIn').addEventListener('click', () => { zoom = Math.min(zoom + 0.25, 4); applyZoom(); });
  $('btnZoomOut').addEventListener('click', () => { zoom = Math.max(zoom - 0.25, 0.25); applyZoom(); });
  $('btnZoomFit').addEventListener('click', () => { zoom = 1; applyZoom(); });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    switch(e.key) {
      case ' ':
        e.preventDefault();
        if (isPlaying && !isPaused) pauseNarration();
        else if (isPaused) resumeNarration();
        else if (narrationSteps.length > 0) playAll();
        break;
      case 'Escape':
        stopNarration();
        resetAnimations();
        narrationList.querySelectorAll('.narration-item').forEach(i => i.classList.remove('active', 'done'));
        statusText.textContent = 'Stopped';
        break;
      case 'ArrowRight':
        if (narrationSteps.length > 0) {
          const next = Math.min((currentStep < 0 ? 0 : currentStep + 1), narrationSteps.length - 1);
          playSingleStep(next);
        }
        break;
      case 'ArrowLeft':
        if (narrationSteps.length > 0) {
          const prev = Math.max((currentStep < 0 ? 0 : currentStep - 1), 0);
          playSingleStep(prev);
        }
        break;
      case '+': case '=':
        zoom = Math.min(zoom + 0.25, 4); applyZoom(); break;
      case '-':
        zoom = Math.max(zoom - 0.25, 0.25); applyZoom(); break;
    }
  });
})();
</script>
</body>
</html>
