<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="lexical-resources">
    <title>Lexical Resources: WordNet, FrameNet, Stemmers, Parts-of-Speech Tagger, Research Corpora</title>
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
            <stop offset="100%" stop-color="#0097A7" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
    <text x="20" y="50" font-size="24" font-family="Arial" fill="#000000">Lexical Resources</text>
    <section data-narration="WordNet">
        <rect x="10" y="100" width="400" height="120" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="2"/>
        <text x="20" y="110" font-size="18" font-family="Arial" fill="#000000">WordNet</text>
        <animateTransform attributeName="transform" type="translate" from="0,100" to="0,150" dur="1000" begin="0s"/>
        <text x="20" y="150" font-size="18" font-family="Arial" fill="#000000">WordNet is a large lexical database of English words, developed at Princeton University.</text>
        <animateTransform attributeName="transform" type="translate" from="0,150" to="0,180" dur="1000" begin="1000s"/>
    </section>
    <section data-narration="FrameNet">
        <rect x="10" y="220" width="400" height="120" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="2"/>
        <text x="20" y="230" font-size="18" font-family="Arial" fill="#000000">FrameNet</text>
        <animateTransform attributeName="transform" type="translate" from="0,220" to="0,270" dur="1000" begin="1500s"/>
        <text x="20" y="270" font-size="18" font-family="Arial" fill="#000000">FrameNet is a lexical database that represents the meaning of words in terms of frames, which are structured representations of concepts.</text>
        <animateTransform attributeName="transform" type="translate" from="0,270" to="0,300" dur="1000" begin="2500s"/>
    </section>
    <section data-narration="Stemmers">
        <rect x="10" y="320" width="400" height="120" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="2"/>
        <text x="20" y="330" font-size="18" font-family="Arial" fill="#000000">Stemmers</text>
        <animateTransform attributeName="transform" type="translate" from="0,320" to="0,360" dur="1000" begin="3000s"/>
        <text x="20" y="360" font-size="18" font-family="Arial" fill="#000000">Stemmers are algorithms that reduce words to their base form, known as stems.</text>
        <animateTransform attributeName="transform" type="translate" from="0,360" to="0,390" dur="1000" begin="3500s"/>
    </section>
    <section data-narration="Parts-of-Speech Tagger">
        <rect x="10" y="400" width="400" height="120" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="2"/>
        <text x="20" y="410" font-size="18" font-family="Arial" fill="#000000">Parts-of-Speech Tagger</text>
        <animateTransform attributeName="transform" type="translate" from="0,400" to="0,440" dur="1000" begin="4000s"/>
        <text x="20" y="440" font-size="18" font-family="Arial" fill="#000000">The Parts-of-Speech Tagger is a tool used to identify the part of speech of each word in a sentence.</text>
        <animateTransform attributeName="transform" type="translate" from="0,440" to="0,460" dur="1000" begin="4500s"/>
    </section>
    <section data-narration="Research Corpora">
        <rect x="10" y="500" width="400" height="120" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="2"/>
        <text x="20" y="510" font-size="18" font-family="Arial" fill="#000000">Research Corpora</text>
        <animateTransform attributeName="transform" type="translate" from="0,500" to="0,540" dur="1000" begin="5000s"/>
        <text x="20" y="540" font-size="18" font-family="Arial" fill="#000000">Research Corpora are databases that contain a large amount of text data, which can be used for research and analysis.</text>
        <animateTransform attributeName="transform" type="translate" from="0,540" to="0,560" dur="1000" begin="5500s"/>
    </section>
    <footer data-topic-id="lexical-resources">End of lexical resources</footer>
</svg>