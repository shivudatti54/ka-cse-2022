<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:lang="en" style="color: #333; font-family: Arial, sans-serif; font-size: 14px;">

  <title>Textbook 1: Ch</title>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id=" gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#88B3FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect xmlns="http://www.w3.org/2000/svg" x="0" y="0" width="420" height="400" fill="url(# gradient-background)"/>

  <!-- Section 1: Introduction -->
  <g transform="translate(20, 100)">
    <rect width="100" height="20" rx="5" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 120" dur="1s"/>
    <text x="10" y="8" font-size="16" font-family="Arial" fill="#333">Introduction</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#666">Information Retrieval is the process of searching, retrieving, and extracting relevant information from large collections of documents.</text>
  </g>

  <!-- Section 2: Indexing -->
  <g transform="translate(20, 160)">
    <rect width="100" height="20" rx="5" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 160" to="0 180" dur="1s"/>
    <text x="10" y="8" font-size="16" font-family="Arial" fill="#333">Indexing</text>
    <text data-narration="Inverted indexing maps keywords to documents, not documents to keywords." x="10" y="40" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Native indexing maps keywords to documents, just like the original index." x="10" y="70" font-size="14" font-family="Arial" fill="#666"/>
    <rect x="10" y="100" width="80" height="20" rx="5" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="10 100" to="10 120" dur="1s"/>
  </g>

  <!-- Section 3: Query Processing -->
  <g transform="translate(20, 220)">
    <rect width="100" height="20" rx="5" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="0 240" dur="1s"/>
    <text x="10" y="8" font-size="16" font-family="Arial" fill="#333">Query Processing</text>
    <text data-narration="Query processing is the process of evaluating a query to retrieve relevant documents from the collection." x="10" y="40" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Exact matching matches the query keywords exactly with the document keywords." x="10" y="70" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Fuzzy matching allows for some degree of variation between the query keywords and the document keywords." x="10" y="100" font-size="14" font-family="Arial" fill="#666"/>
    <rect x="10" y="120" width="80" height="20" rx="5" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="10 120" to="10 140" dur="1s"/>
  </g>

  <!-- Section 4: Types of Indexing -->
  <g transform="translate(20, 280)">
    <rect width="100" height="20" rx="5" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 280" to="0 300" dur="1s"/>
    <text x="10" y="8" font-size="16" font-family="Arial" fill="#333">Types of Indexing</text>
    <text data-narration="Inverted indexing maps keywords to documents, not documents to keywords." x="10" y="40" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Native indexing maps keywords to documents, just like the original index." x="10" y="70" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Other types of indexing include nested indexing and hierarchical indexing." x="10" y="100" font-size="14" font-family="Arial" fill="#666"/>
  </g>

  <!-- Section 5: Query Processing -->
  <g transform="translate(20, 360)">
    <rect width="100" height="20" rx="5" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 360" to="0 380" dur="1s"/>
    <text x="10" y="8" font-size="16" font-family="Arial" fill="#333">Query Processing</text>
    <text data-narration="Query processing is the process of evaluating a query to retrieve relevant documents from the collection." x="10" y="40" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Exact matching matches the query keywords exactly with the document keywords." x="10" y="70" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Fuzzy matching allows for some degree of variation between the query keywords and the document keywords." x="10" y="100" font-size="14" font-family="Arial" fill="#666"/>
  </g>

  <!-- Section 6: Query Processing -->
  <g transform="translate(20, 400)">
    <rect width="100" height="20" rx="5" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 400" to="0 420" dur="1s"/>
    <text x="10" y="8" font-size="16" font-family="Arial" fill="#333">Query Processing</text>
    <text data-narration="Query processing is the process of evaluating a query to retrieve relevant documents from the collection." x="10" y="40" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Exact matching matches the query keywords exactly with the document keywords." x="10" y="70" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Fuzzy matching allows for some degree of variation between the query keywords and the document keywords." x="10" y="100" font-size="14" font-family="Arial" fill="#666"/>
    <text data-narration="Other query processing techniques include ranking and filtering." x="10" y="130" font-size="14" font-family="Arial" fill="#666"/>
  </g>

  <!-- Arrows -->
  <line x1="150" y1="80" x2="150" y2="120" stroke="#666" stroke-width="2" />
  <line x1="250" y1="80" x2="250" y2="120" stroke="#666" stroke-width="2" />
  <line x1="350" y1="80" x2="350" y2="120" stroke="#666" stroke-width="2" />

  <!-- Footer -->
  <text x="10" y="430" font-size="12" font-family="Arial" fill="#666">Textbook 1: Ch</text>

</svg>