<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64A0FF" stop-opacity="1" />
      <stop offset="0.5" stop-color="#33CCFF" stop-opacity="1" />
      <stop offset="1" stop-color="#33CCFF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <!-- Title -->
  <text x="10" y="50" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start">
    Language Modeling: Statistical Language Model
  </text>
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="100" width="400" height="80" fill="#F7F7F7" rx="10" />
    <text x="20" y="120" font-size="18" font-family="Arial" text-anchor="start">
      Language modeling is a fundamental concept in Natural Language Processing (NLP) that involves predicting the next word in a sequence of text based on the context of the previous words.
    </text>
    <animate duration="1000" begin="1000ms" from="100%" to="0%" fill="freeze" />
  </section>
  <!-- Section 2: Statistical Language Model -->
  <section data-narration="Statistical Language Model">
    <rect x="10" y="190" width="400" height="80" fill="#F7F7F7" rx="10" />
    <text x="20" y="210" font-size="18" font-family="Arial" text-anchor="start">
      A Statistical Language Model (SLM) is a probabilistic model that generates text by predicting the next word based on the context of the previous words.
    </text>
    <animate duration="1000" begin="2000ms" from="100%" to="0%" fill="freeze" />
  </section>
  <!-- Section 3: N-gram Model -->
  <section data-narration="N-gram Model">
    <rect x="10" y="280" width="400" height="80" fill="#F7F7F7" rx="10" />
    <text x="20" y="300" font-size="18" font-family="Arial" text-anchor="start">
      An N-gram model predicts the next word based on the frequency of each sequence of N consecutive words in the language.
    </text>
    <animate duration="1000" begin="3000ms" from="100%" to="0%" fill="freeze" />
  </section>
  <!-- Section 4: Unigram Model -->
  <section data-narration="Unigram Model">
    <rect x="10" y="370" width="400" height="80" fill="#F7F7F7" rx="10" />
    <text x="20" y="390" font-size="18" font-family="Arial" text-anchor="start">
      A unigram model predicts the next word based on the frequency of each word in the language.
    </text>
    <animate duration="1000" begin="4000ms" from="100%" to="0%" fill="freeze" />
  </section>
  <!-- Section 5: Bigram Model -->
  <section data-narration="Bigram Model">
    <rect x="10" y="450" width="400" height="80" fill="#F7F7F7" rx="10" />
    <text x="20" y="470" font-size="18" font-family="Arial" text-anchor="start">
      A bigram model predicts the next word based on the frequency of each pair of consecutive words in the language.
    </text>
    <animate duration="1000" begin="5000ms" from="100%" to="0%" fill="freeze" />
  </section>
  <!-- Section 6: N-gram vs Unigram vs Bigram -->
  <section data-narration="N-gram vs Unigram vs Bigram">
    <rect x="10" y="530" width="400" height="80" fill="#F7F7F7" rx="10" />
    <text x="20" y="550" font-size="18" font-family="Arial" text-anchor="start">
      N-gram models can be used to model both unigrams and bigrams, and can capture context-dependent relationships between words.
    </text>
    <animate duration="1000" begin="6000ms" from="100%" to="0%" fill="freeze" />
  </section>
  <!-- Footer -->
  <text x="10" y="390" font-size="18" font-family="Arial" text-anchor="start">
    Educational Materials
  </text>
</svg>