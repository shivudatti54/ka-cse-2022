<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6579f5" stop-opacity="1"/>
            <stop offset="25%" stop-color="#6c5ce7" stop-opacity="1"/>
            <stop offset="50%" stop-color="#8e24aa" stop-opacity="1"/>
            <stop offset="75%" stop-color="#c7007f" stop-opacity="1"/>
            <stop offset="100%" stop-color="#d0007f" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Natural Language Processing (NLP) Study Material</title>
    <footer>Subtitle</footer>
    <rect x="10" y="10" width="400" height="340" fill="url(#grad)" rx="10"/>
    <text x="15" y="20" font-size="24" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Knowledge The Challenges Of NLP Language And Gramm</text>
    <g id="knowledge-representation">
        <rect x="50" y="50" width="320" height="150" fill="#fff" rx="10" data-narration="Knowledge Representation is a fundamental concept in NLP that deals with the way data is structured and represented in a computer. In NLP, knowledge is represented as a set of facts, rules, and relationships that are used to reason about the meaning of text.">
            <animate attributeName="opacity" from="1" to="0" dur="2000" begin="0s" delay="0s"/>
            <animate attributeName="x" from="50" to="70" dur="1000" begin="0s" delay="0s"/>
            <animate attributeName="y" from="50" to="70" dur="1000" begin="0s" delay="0s"/>
        </rect>
        <text x="65" y="80" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Declarative Knowledge</text>
        <text x="65" y="110" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Procedural Knowledge</text>
    </g>
    <g id="challenges-of-nlp">
        <rect x="50" y="220" width="320" height="150" fill="#fff" rx="10" data-narration="Ambiguity and Uncertainty is a key challenge in NLP as human language is inherently ambiguous and uncertain, making it difficult for computers to accurately understand its meaning.">
            <animate attributeName="opacity" from="1" to="0" dur="2000" begin="2000s" delay="0s"/>
        </rect>
        <text x="65" y="250" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Paradigm Shift</text>
        <text x="65" y="280" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Data Quality</text>
    </g>
    <g id="types-of-knowledge">
        <rect x="50" y="350" width="320" height="150" fill="#fff" rx="10" data-narration="Declarative Knowledge is used to express facts and rules that are used to reason about the meaning of text. Procedural Knowledge is used to express procedures and algorithms that are used to process text.">
            <animate attributeName="opacity" from="1" to="0" dur="2000" begin="4000s" delay="0s"/>
        </rect>
        <text x="65" y="380" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Facts</text>
        <text x="65" y="410" font-size="18" font-family="Arial, sans-serif" fill="#333" text-anchor="start">Rules</text>
    </g>
</svg>