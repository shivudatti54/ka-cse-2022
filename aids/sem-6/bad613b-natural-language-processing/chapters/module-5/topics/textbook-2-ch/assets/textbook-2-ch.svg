<svg
  width="420"
  height="400"
  viewBox="0 0 420 400"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  data-topic-id="Textbook-2-Ch"
  data-narration="Machine Translation: Language Divergences and Typology"
  viewBox="0 0 420 400"
>
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.8" />
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="32" font-family="Arial, sans-serif" text-anchor="middle" fill="#1A1D23">
    Machine Translation: Language Divergences and Typology
  </text>
  
  <!-- Section 1: Introduction -->
  <rect x="20" y="80" width="380" height="100" fill="#F7F7F7" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 210 170" to="360 210 170" dur="6s" begin="0s" />
  <text x="210" y="120" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#1A1D23" data-narration="Introduction">
    Language divergences and typology in the context of machine translation
  </text>
  
  <!-- Section 2: Language Divergences -->
  <rect x="20" y="200" width="380" height="100" fill="#F7F7F7" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 210 170" to="360 210 170" dur="6s" begin="1s" />
  <text x="210" y="220" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#1A1D23" data-narration="Language Divergences">
    Differences in vocabulary, sentence structure, and sound systems
  </text>
  <line x1="190" y1="210" x2="230" y2="210" stroke="#2196F3" stroke-width="2" />
  <animate x1="190" y1="210" x2="230" y2="210" attributeName="x" type="linear" from="190" to="230" dur="2s" begin="1.5s" />
  <animate y1="210" x2="210" y2="230" attributeName="y" type="linear" from="210" to="230" dur="2s" begin="1.5s" />
  
  <!-- Section 3: Typology -->
  <rect x="20" y="300" width="380" height="100" fill="#F7F7F7" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 210 170" to="360 210 170" dur="6s" begin="2.5s" />
  <text x="210" y="320" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#1A1D23" data-narration="Typology">
    Structural properties of languages, including phonology and syntax
  </text>
  <line x1="190" y1="310" x2="230" y2="310" stroke="#2196F3" stroke-width="2" />
  <animate x1="190" y1="310" x2="230" y2="310" attributeName="x" type="linear" from="190" to="230" dur="2s" begin="2.5s" />
  <animate y1="310" x2="210" y2="230" attributeName="y" type="linear" from="310" to="230" dur="2s" begin="2.5s" />
  
  <!-- Section 4: Machine Translation Challenges -->
  <rect x="20" y="380" width="380" height="100" fill="#F7F7F7" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 210 170" to="360 210 170" dur="6s" begin="3.5s" />
  <text x="210" y="400" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#1A1D23" data-narration="Machine Translation Challenges">
    Challenges in machine translation, including language pair complexity and domain specificity
  </text>
  <line x1="190" y1="410" x2="230" y2="410" stroke="#2196F3" stroke-width="2" />
  <animate x1="190" y1="410" x2="230" y2="410" attributeName="x" type="linear" from="190" to="230" dur="2s" begin="3.5s" />
  <animate y1="410" x2="210" y2="430" attributeName="y" type="linear" from="410" to="430" dur="2s" begin="3.5s" />
  
  <!-- Footer -->
  <text x="50%" y="400" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#1A1D23">
    Created with love for education
  </text>
</svg>