<svg width="420" height="400" data-topic-id="encoder-decoder" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve" style="background: linear-gradient(to bottom, #7A8DBF, #8BC34A);">
  <!-- Title -->
  <text x="10" y="30" font-size="24" font-family="Arial Black" text-anchor="left" fill="#2EC4B5">Encoder-Decoder Model</text>
  
  <!-- Gradient Background -->
  <linearGradient id="gradient-background" x1="0" y1="0" x2="0" y2="1" spreadMethod="pad">
    <stop offset="0" stop-color="#8BC34A"/>
    <stop offset="1" stop-color="#7A8DBF"/>
  </linearGradient>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient-background)"/>
  
  <!-- Section 1: Encoder Introduction -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="The encoder is responsible for mapping the input sentence to a continuous representation, often called a vector or embedding." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 100 0 100; 200 100 200 100" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2EC4B5">Encoder Introduction</text>
  </g>
  
  <!-- Section 2: Encoder Key Components -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="Word embeddings are used to represent words as vectors in a high-dimensional space. These vectors capture the semantic meaning of words, such as their context, synonyms, and antonyms." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 220 0 220; 200 220 200 220" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="Encoder layers are used to process the input sequence and generate a continuous representation. Each layer typically consists of two sub-layers: an attention mechanism and a feed-forward network (FFN)." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 220 0 220; 200 220 200 220" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2EC4B5">Encoder Key Components</text>
    <line x1="150" y1="100" x2="150" y2="220" stroke="#2EC4B5" stroke-width="2" stroke-linecap="round" data-narration="The encoder is responsible for mapping the input sentence to a continuous representation, often called a vector or embedding." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 100 0 100; 150 100 150 100" repeatCount="indefinite"/>
    </line>
    <line x1="150" y1="180" x2="150" y2="220" stroke="#2EC4B5" stroke-width="2" stroke-linecap="round" data-narration="Encoder layers are used to process the input sequence and generate a continuous representation. Each layer typically consists of two sub-layers: an attention mechanism and a feed-forward network (FFN)." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 220 0 220; 150 220 150 220" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Section 3: Decoder Introduction -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="The decoder is responsible for generating the translated text based on the output of the encoder. The decoder takes in the continuous representation generated by the encoder and generates a sequence of words." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 340 0 340; 200 340 200 340" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2EC4B5">Decoder Introduction</text>
  </g>
  
  <!-- Section 4: Decoder Key Components -->
  <g transform="translate(50, 460)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="Decoder layers are similar to encoder layers but are used to generate the output sequence. Each layer typically consists of two sub-layers: an attention mechanism and a FFN." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 460 0 460; 200 460 200 460" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="Beam search is an optimization technique used to generate the most likely output sequence. It works by selecting the top-k most likely words at each time step and expanding them to generate more possibilities." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 460 0 460; 200 460 200 460" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2EC4B5">Decoder Key Components</text>
    <line x1="150" y1="400" x2="150" y2="460" stroke="#2EC4B5" stroke-width="2" stroke-linecap="round" data-narration="The decoder is responsible for generating the translated text based on the output of the encoder. The decoder takes in the continuous representation generated by the encoder and generates a sequence of words." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 400 0 400; 150 400 150 400" repeatCount="indefinite"/>
    </line>
    <line x1="150" y1="420" x2="150" y2="460" stroke="#2EC4B5" stroke-width="2" stroke-linecap="round" data-narration="Decoder layers are similar to encoder layers but are used to generate the output sequence. Each layer typically consists of two sub-layers: an attention mechanism and a FFN." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 460 0 460; 150 460 150 460" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Section 5: Beam Search -->
  <g transform="translate(50, 580)">
    <rect x="0" y="0" width="200" height="100" fill="#F7F7F7" rx="10" data-narration="Beam search is an optimization technique used to generate the most likely output sequence. It works by selecting the top-k most likely words at each time step and expanding them to generate more possibilities." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 580 0 580; 200 580 200 580" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#2EC4B5">Beam Search</text>
    <line x1="150" y1="570" x2="150" y2="580" stroke="#2EC4B5" stroke-width="2" stroke-linecap="round" data-narration="Beam search is an optimization technique used to generate the most likely output sequence. It works by selecting the top-k most likely words at each time step and expanding them to generate more possibilities." style="opacity: 0; animation: fade-in 2s forwards;">
      <animateTransform begin="0s" dur="2s" type="translate" attributeName="transform" values="0 570 0 570; 150 570 150 570" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Footer -->
  <rect x="0" y="390" width="420" height="10" fill="#F7F7F7"/>
  <text x="10" y="400" font-size="18" font-family="Arial" text-anchor="left" fill="#2EC4B5">Created by [Your Name]</text>
</svg>