<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="words-and-word-classes" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E5F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  
  <!-- Title at top -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" fill="#2E4053">
    Words And Word Classes
  </text>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="60" width="400" height="40" fill="#F7F7F7"/>
    <text x="50%" y="70" text-anchor="middle" font-size="18" fill="#2E4053">
      In Natural Language Processing (NLP), understanding the structure and classification of words is crucial for analyzing and generating human language.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Defining Word Classes -->
  <section data-narration="Defining Word Classes">
    <rect x="10" y="130" width="400" height="40" fill="#F7F7F7"/>
    <text x="50%" y="140" text-anchor="middle" font-size="18" fill="#2E4053">
      Word classes, also known as POS tags, are used to categorize words into different grammatical categories.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Nouns -->
  <section data-narration="Nouns">
    <rect x="10" y="210" width="400" height="40" fill="#F7F7F7"/>
    <text x="50%" y="220" text-anchor="middle" font-size="18" fill="#2E4053">
      Nouns (NN, NNS, NNPS, NNSP): Words that refer to people, places, things, or ideas.
    </text>
    <text x="50%" y="230" text-anchor="middle" font-size="16" fill="#2E4053">
      Example: The noun "dog" is a word class member (NN).
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: Verbs -->
  <section data-narration="Verbs">
    <rect x="10" y="310" width="400" height="40" fill="#F7F7F7"/>
    <text x="50%" y="320" text-anchor="middle" font-size="18" fill="#2E4053">
      Verbs (VB, VBD, VBG, VBN, VBP, VBZ): Words that express actions, events, or states.
    </text>
    <text x="50%" y="330" text-anchor="middle" font-size="16" fill="#2E4053">
      Example: The verb "run" is a word class member (VB).
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: Adjectives -->
  <section data-narration="Adjectives">
    <rect x="10" y="410" width="400" height="40" fill="#F7F7F7"/>
    <text x="50%" y="420" text-anchor="middle" font-size="18" fill="#2E4053">
      Adjectives (JJ, JJR, JJS): Words that modify or describe nouns or pronouns.
    </text>
    <text x="50%" y="430" text-anchor="middle" font-size="16" fill="#2E4053">
      Example: The adjective "happy" is a word class member (JJ).
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 6: Adverbs -->
  <section data-narration="Adverbs">
    <rect x="10" y="510" width="400" height="40" fill="#F7F7F7"/>
    <text x="50%" y="520" text-anchor="middle" font-size="18" fill="#2E4053">
      Adverbs (RB, RBR, RBS): Words that modify or describe verbs, adjectives, or other adverbs.
    </text>
    <text x="50%" y="530" text-anchor="middle" font-size="16" fill="#2E4053">
      Example: The adverb "quickly" is a word class member (RB).
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footnote at bottom -->
  <text x="50%" y="390" text-anchor="middle" font-size="18" fill="#2E4053">
    Learn more about words and word classes at <a href="#">your favorite resource</a>.
  </text>
</svg>