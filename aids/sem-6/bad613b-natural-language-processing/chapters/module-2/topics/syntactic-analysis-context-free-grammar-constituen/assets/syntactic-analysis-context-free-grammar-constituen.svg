<svg width="420" height="400" data-topic-id="syntactic-analysis-context-free-grammar-constituency"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xmlns:dc="http://purl.org/dc/elements/1.1/"
     viewBox="0 0 420 400" data-narration="Context-Free Grammar">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E5F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  <title>Context-Free Grammar and Constituency</title>
  <g id="grammar-structure">
    <g id="top-down-parsing" data-narration="Top-Down Parsing">
      <circle cx="150" cy="50" r="30" fill="#3498db" stroke="#3498db" stroke-width="2"/>
      <text x="150" y="60" font-size="24" font-family="Arial" fill="#fff">Start Symbol</text>
      <animateTransform attribute="transform" type="rotate" begin="0s" dur="2s" repeatCount="indefinite" values="0 150 50 360 0"/>
      <g id="production-rules">
        <path d="M 120,70 L 220,70" stroke="#3498db" stroke-width="4" fill="none"/>
        <text x="200" y="70" font-size="18" font-family="Arial" fill="#fff">LHS (Left-Hand Side)</text>
        <text x="120" y="90" font-size="18" font-family="Arial" fill="#fff">RHS (Right-Hand Side)</text>
        <text x="220" y="90" font-size="18" font-family="Arial" fill="#fff">Terminal Symbols</text>
      </g>
    </g>
    <g id="context-free-grammar">
      <rect x="20" y="20" width="80" height="40" fill="#f1c40f" stroke="#f1c40f" stroke-width="2"/>
      <text x="30" y="25" font-size="18" font-family="Arial" fill="#fff">Context-Free Grammar</text>
      <animateTransform attribute="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" values="-20 20 0 0"/>
      <g id="non-terminal-symbols">
        <rect x="40" y="40" width="30" height="30" fill="#ff9900" stroke="#ff9900" stroke-width="2"/>
        <text x="50" y="45" font-size="18" font-family="Arial" fill="#fff">S</text>
        <rect x="80" y="40" width="30" height="30" fill="#99ff99" stroke="#99ff99" stroke-width="2"/>
        <text x="90" y="45" font-size="18" font-family="Arial" fill="#fff">NP</text>
        <rect x="120" y="40" width="30" height="30" fill="#cc99ff" stroke="#cc99ff" stroke-width="2"/>
        <text x="130" y="45" font-size="18" font-family="Arial" fill="#fff">VP</text>
      </g>
    </g>
    <g id="constituency">
      <rect x="20" y="120" width="80" height="40" fill="#f1c40f" stroke="#f1c40f" stroke-width="2"/>
      <text x="30" y="125" font-size="18" font-family="Arial" fill="#fff">Constituency</text>
      <animateTransform attribute="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" values="-20 120 0 0"/>
      <g id="semantic-constituency">
        <path d="M 120,140 L 220,140" stroke="#3498db" stroke-width="4" fill="none"/>
        <text x="200" y="150" font-size="18" font-family="Arial" fill="#fff">Semantic Constituency</text>
      </g>
      <g id="syntactic-constituency">
        <path d="M 120,160 L 220,160" stroke="#3498db" stroke-width="4" fill="none"/>
        <text x="200" y="170" font-size="18" font-family="Arial" fill="#fff">Syntactic Constituency</text>
      </g>
    </g>
  </g>
  <g id="bottom-up-parsing">
    <rect x="20" y="200" width="80" height="40" fill="#f1c40f" stroke="#f1c40f" stroke-width="2"/>
    <text x="30" y="205" font-size="18" font-family="Arial" fill="#fff">Bottom-Up Parsing</text>
    <animateTransform attribute="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" values="-20 200 0 0"/>
    <g id="production-rules-bottom-up">
      <path d="M 120,210 L 220,210" stroke="#3498db" stroke-width="4" fill="none"/>
      <text x="200" y="220" font-size="18" font-family="Arial" fill="#fff">LHS (Left-Hand Side)</text>
      <text x="120" y="230" font-size="18" font-family="Arial" fill="#fff">RHS (Right-Hand Side)</text>
      <text x="220" y="230" font-size="18" font-family="Arial" fill="#fff">Terminal Symbols</text>
    </g>
  </g>
  <footer>
    <g id="cyk-parsing">
      <rect x="20" y="280" width="80" height="40" fill="#f1c40f" stroke="#f1c40f" stroke-width="2"/>
      <text x="30" y="285" font-size="18" font-family="Arial" fill="#fff">CYK Parsing</text>
      <animateTransform attribute="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" values="-20 280 0 0"/>
      <g id="production-rules-cyk">
        <path d="M 120,290 L 220,290" stroke="#3498db" stroke-width="4" fill="none"/>
        <text x="200" y="300" font-size="18" font-family="Arial" fill="#fff">LHS (Left-Hand Side)</text>
        <text x="120" y="310" font-size="18" font-family="Arial" fill="#fff">RHS (Right-Hand Side)</text>
        <text x="220" y="310" font-size="18" font-family="Arial" fill="#fff">Terminal Symbols</text>
      </g>
    </g>
  </footer>
</svg>