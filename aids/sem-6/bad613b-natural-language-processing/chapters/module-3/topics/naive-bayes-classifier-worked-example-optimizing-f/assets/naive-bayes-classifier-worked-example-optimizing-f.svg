<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:animate="http://www.w3.org/2000/svg">
  <title>Naive Bayes Classifier Worked Example Optimizing for Sentiment Analysis</title>
  <defs><linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#C7B8EA"/>
    <stop offset="100%" stop-color="#C2E4F4"/>
  </linearGradient></defs>
  <text x="15" y="10" font-size="24" font-family="Arial" text-anchor="start" fill="#2E4053">Naive Bayes Classifier</text>
  <rect x="10" y="50" width="400" height="50" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 60)">
    <rect x="0" y="0" width="200" height="150" fill="#C7B8EA"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Prior Probabilities</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Class Labels: Positive, Negative</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">P(Sentiment = Positive) = 0.5</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">P(Sentiment = Negative) = 0.5</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 -150" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 210)">
    <rect x="0" y="0" width="200" height="150" fill="#C7B8EA"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Conditional Probabilities</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Word Frequency | Conditional Probability</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Feature 1 | 0.3</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Feature 2 | 0.4</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 -150" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 270)">
    <rect x="0" y="0" width="200" height="150" fill="#C7B8EA"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Likelihoods</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Feature 1 | Feature 2 | Likelihood</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">0.3 | 0.4 | 0.7</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">0.4 | 0.3 | 0.8</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 -150" begin="4s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 330)">
    <rect x="0" y="0" width="200" height="150" fill="#C7B8EA"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Posterior Probabilities</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Class Labels: Positive, Negative | Posterior Probability</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Positive | 0.6</text>
    <text x="10" y="80" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Negative | 0.4</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 -150" begin="6s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 390)">
    <rect x="0" y="0" width="200" height="150" fill="#C7B8EA"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Classification</text>
    <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Positive Sentiment</text>
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Negative Sentiment</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 -150" begin="8s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 450)">
    <rect x="0" y="0" width="200" height="50" fill="#C2E4F4"/>
    <text x="10" y="10" font-size="24" font-family="Arial" text-anchor="start" fill="#2E4053">Example</text>
    <text x="10" y="30" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Text: "I love this product!"</text>
    <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Topic: Sentiment Analysis</text>
    <text x="10" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">Topic-ID: topic-sentiment-analysis</text>
  </g>
  <g transform="translate(10, 510)">
    <rect x="0" y="0" width="200" height="50" fill="#C7B8EA"/>
    <text x="10" y="10" font-size="24" font-family="Arial" text-anchor="start" fill="#2E4053">References</text>
    <text x="10" y="30" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">[1]</text>
  </g>
</svg>