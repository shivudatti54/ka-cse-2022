<svg width="420" height="400" data-topic-id="android-ecosystem" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start">Android Ecosystem</text>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%".colorbar="#f7f7f7">
      <stop offset="0%" stop-color="#c7e6f5"/>
      <stop offset="100%" stop-color="#e1f6f9"/>
    </linearGradient>
  </defs>
  <rect x="10" y="40" width="400" height="300" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Android Versions -->
  <g transform="translate(10, 50)">
    <rect width="200" height="30" fill="#f7f7f7" rx="5"/>
    <animate transformation="translate(0, -10)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start">Android Versions</text>
    <text x="10" y="35" font-size="14" font-family="Arial" text-anchor="start" data-narration="Android has undergone numerous revisions and updates since its initial release in 2008." style="opacity: 0; animation: opacity 2s 1s infinite forwards"></text>
  </g>
  
  <!-- Section 2: Hardware -->
  <g transform="translate(220, 50)">
    <rect width="200" height="30" fill="#f7f7f7" rx="5"/>
    <animate transformation="translate(0, -10)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start">Hardware</text>
    <text x="10" y="35" font-size="14" font-family="Arial" text-anchor="start" data-narration="Android devices can be powered by a wide range of hardware configurations, including processors, memory, and storage." style="opacity: 0; animation: opacity 2s 1s infinite forwards"></text>
    <line x1="45" y1="15" x2="55" y2="25" stroke="#03A9F4" stroke-width="2"/>
    <line x1="45" y1="15" x2="55" y2="25" stroke="#03A9F4" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Section 3: Software -->
  <g transform="translate(220, 100)">
    <rect width="200" height="30" fill="#f7f7f7" rx="5"/>
    <animate transformation="translate(0, -10)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start">Software</text>
    <text x="10" y="35" font-size="14" font-family="Arial" text-anchor="start" data-narration="Android OS provides a robust set of APIs and frameworks that enable developers to create apps, games, and other software applications." style="opacity: 0; animation: opacity 2s 1s infinite forwards"></text>
    <line x1="45" y1="15" x2="55" y2="25" stroke="#03A9F4" stroke-width="2"/>
    <line x1="45" y1="15" x2="55" y2="25" stroke="#03A9F4" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Section 4: Services -->
  <g transform="translate(220, 150)">
    <rect width="200" height="30" fill="#f7f7f7" rx="5"/>
    <animate transformation="translate(0, -10)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="15" font-size="18" font-family="Arial" text-anchor="start">Services</text>
    <text x="10" y="35" font-size="14" font-family="Arial" text-anchor="start" data-narration="Android provides various services, such as Google Play Store, Google Maps, and Google Search, that provide users with a rich set of features and functionality." style="opacity: 0; animation: opacity 2s 1s infinite forwards"></text>
    <line x1="45" y1="15" x2="55" y2="25" stroke="#03A9F4" stroke-width="2"/>
    <line x1="45" y1="15" x2="55" y2="25" stroke="#03A9F4" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Animation -->
  <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" begin="2s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 150" begin="4s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="24" font-family="Arial" text-anchor="start">Android Ecosystem</text>
</svg>