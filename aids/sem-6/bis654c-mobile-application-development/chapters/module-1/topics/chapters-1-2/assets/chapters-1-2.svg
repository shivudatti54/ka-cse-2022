<svg width="420" height="400" data-topic-id="android-chapters-1-2" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#3498db">Chapters 1-2</text>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a1c9f2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="30" width="400" height="340" fill="url(#pastel-gradient)"/>

  <!-- Section 1: Introduction to Android -->
  <section id="section-1" data-narration="Introduction to Android">
    <rect x="20" y="50" width="360" height="100" fill="#fff" rx="10"/>
    <animate transform="rotate(0 200 150)" begin="1100ms" dur="5000ms" repeatCount="indefinite"/>
    <text x="50" y="80" font-size="16" font-family="Arial" fill="#3498db">What is Android?</text>
    <text x="50" y="120" font-size="16" font-family="Arial" fill="#3498db">Android is an open-source mobile operating system (OS) used by a wide range of devices.</text>
    <line x1="200" y1="150" x2="200" y2="250" stroke="#3498db" stroke-width="2" effect="stroke"/>
    <text x="50" y="280" font-size="16" font-family="Arial" fill="#3498db">Learn more</text>
  </section>

  <!-- Section 2: History of Android -->
  <section id="section-2" data-narration="History of Android">
    <rect x="20" y="50" width="360" height="100" fill="#fff" rx="10"/>
    <animate transform="rotate(180 200 150)" begin="1200ms" dur="5000ms" repeatCount="indefinite"/>
    <text x="50" y="80" font-size="16" font-family="Arial" fill="#3498db">The first version of Android was released in 2008.</text>
    <text x="50" y="120" font-size="16" font-family="Arial" fill="#3498db">Read more about the history of Android</text>
    <line x1="200" y1="150" x2="200" y2="250" stroke="#3498db" stroke-width="2" effect="stroke"/>
    <text x="50" y="280" font-size="16" font-family="Arial" fill="#3498db">Learn more</text>
  </section>

  <!-- Section 3: Key Features of Android -->
  <section id="section-3" data-narration="Key Features of Android">
    <rect x="20" y="50" width="360" height="100" fill="#fff" rx="10"/>
    <animate transform="rotate(0 200 150)" begin="1300ms" dur="5000ms" repeatCount="indefinite"/>
    <text x="50" y="80" font-size="16" font-family="Arial" fill="#3498db">Open-source and customizable</text>
    <text x="50" y="120" font-size="16" font-family="Arial" fill="#3498db">Multi-touch gestures and app store</text>
    <circle cx="200" cy="200" r="30" fill="#3498db" stroke="#3498db" stroke-width="2"/>
    <line x1="200" y1="200" x2="250" y2="200" stroke="#3498db" stroke-width="2" effect="stroke"/>
    <text x="50" y="280" font-size="16" font-family="Arial" fill="#3498db">Learn more</text>
  </section>

  <!-- Section 4: Android Versions -->
  <section id="section-4" data-narration="Android Versions">
    <rect x="20" y="50" width="360" height="100" fill="#fff" rx="10"/>
    <animate transform="rotate(180 200 150)" begin="1400ms" dur="5000ms" repeatCount="indefinite"/>
    <text x="50" y="80" font-size="16" font-family="Arial" fill="#3498db">Notable Android versions include:</text>
    <text x="50" y="120" font-size="16" font-family="Arial" fill="#3498db">Android 1.0, Android 2.3, Android 4.0, and Android 5.0.</text>
    <line x1="200" y1="150" x2="200" y2="250" stroke="#3498db" stroke-width="2" effect="stroke"/>
    <text x="50" y="280" font-size="16" font-family="Arial" fill="#3498db">Learn more</text>
  </section>

  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#3498db">Android Chapters 1-2</text>
</svg>