<svg width="420" height="400" data-topic-id="Layout-Relative-Layout-Table-Layout" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-factor="1"/>
      <stop offset="50%" stop-color="#4682B4" stop-factor="0.5"/>
      <stop offset="100%" stop-color="#4682B4" stop-factor="1"/>
    </linearGradient>
  </defs>
  <g transform="translate(0, 20)">
    <rect x="0" y="0" width="100%" height="80%" fill="url(#backgroundGradient)"/>
    <text x="10" y="10" font-size="24" text-anchor="middle" fill="#fff">Layout Relative Layout and Table Layout</text>
  </g>
  <g transform="translate(0, 90)">
    <rect x="0" y="0" width="100%" height="80%" fill="url(#backgroundGradient)"/>
    <text x="10" y="10" font-size="18" text-anchor="middle" fill="#fff">Layout Relative Layout</text>
    <g>
      <rect x="0" y="0" width="50%" height="20" fill="#fff"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="500" begin="0s"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#666">What is Layout Relative Layout?</text>
      <text x="60" y="10" font-size="14" text-anchor="middle" fill="#666">Layout Relative Layout is a type of layout where elements can be arranged relative to each other.</text>
    </g>
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="50%" height="20" fill="#fff"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="500" begin="500ms"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#666">How Does it Work?</text>
      <text x="60" y="10" font-size="14" text-anchor="middle" fill="#666">Elements are arranged relative to each other using the following attributes:</text>
      <ul>
        <li>
          <text x="10" y="40" font-size="12" text-anchor="middle" fill="#666">android:layout_width</text>
          <text x="150" y="40" font-size="12" text-anchor="middle" fill="#666">android:layout_height</text>
          <text x="250" y="40" font-size="12" text-anchor="middle" fill="#666">android:layout_toLeftOf</text>
          <text x="350" y="40" font-size="12" text-anchor="middle" fill="#666">android:layout_toRightOf</text>
        </li>
        <li>
          <text x="10" y="60" font-size="12" text-anchor="middle" fill="#666">android:layout_above</text>
          <text x="150" y="60" font-size="12" text-anchor="middle" fill="#666">android:layout_below</text>
        </li>
      </ul>
    </g>
  </g>
  <g transform="translate(0, 190)">
    <rect x="0" y="0" width="100%" height="80%" fill="url(#backgroundGradient)"/>
    <text x="10" y="10" font-size="18" text-anchor="middle" fill="#fff">Table Layout</text>
    <g>
      <rect x="0" y="0" width="50%" height="20" fill="#fff"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="500" begin="1000ms"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#666">What is Table Layout?</text>
      <text x="60" y="10" font-size="14" text-anchor="middle" fill="#666">Table Layout is a type of layout that consists of rows and columns.</text>
    </g>
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="50%" height="20" fill="#fff"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="500" begin="1500ms"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#666">How Does it Work?</text>
      <text x="60" y="10" font-size="14" text-anchor="middle" fill="#666">Elements are arranged in a table-like structure using the following attributes:</text>
      <ul>
        <li>
          <text x="10" y="40" font-size="12" text-anchor="middle" fill="#666">android:layout_row</text>
          <text x="150" y="40" font-size="12" text-anchor="middle" fill="#666">android:layout_column</text>
        </li>
      </ul>
    </g>
  </g>
  <g transform="translate(0, 220)">
    <rect x="0" y="0" width="100%" height="80%" fill="url(#backgroundGradient)"/>
    <text x="10" y="10" font-size="18" text-anchor="middle" fill="#fff">Example: Simple Layout Relative Layout</text>
    <g>
      <rect x="0" y="0" width="50%" height="80%" fill="#fff"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="500" begin="2000ms"/>
      <text x="10" y="10" font-size="14" text-anchor="middle" fill="#666">Here is an example of a simple Layout Relative Layout:</text>
      <text x="10" y="50" font-size="14" text-anchor="middle" fill="#666">```xml</text>
      <text x="10" y="70" font-size="14" text-anchor="middle" fill="#666"><LinearLayout</text>
      <text x="10" y="90" font-size="14" text-anchor="middle" fill="#666">xmlns:android="http://schemas.android.com/apk/res/android"</text>
      <text x="10" y="110" font-size="14" text-anchor="middle" fill="#666">android:layout_width="match_parent"</text>
      <text x="10" y="130" font-size="14" text-anchor="middle" fill="#666">android:layout_height="match_parent"</text>
      <text x="10" y="150" font-size="14" text-anchor="middle" fill="#666">android:orientation="vertical"</text>
      <text x="10" y="170" font-size="14" text-anchor="middle" fill="#666">/></LinearLayout></text>
    </g>
  </g>
</svg>