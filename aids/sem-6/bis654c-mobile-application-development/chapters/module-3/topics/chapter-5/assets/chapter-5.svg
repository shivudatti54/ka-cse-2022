<svg width="420" height="400" data-topic-id="Chapter-5" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <def focus="url(#pastel-gradient)"></def>
  <!-- Gradient definition -->
  <clipPath id="pastel-gradient">
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-colors)"></rect>
  </clipPath>
  <defs>
    <linearGradient id="pastel-colors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#c2c5f5" stop-opacity="1"></stop>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"></rect>

  <!-- Title section -->
  <section data-narration="Introduction">
    <g transform="translate(30, 20)">
      <text font-size="24" font-family="Arial" font-weight="bold">User Interface (UI) Design</text>
      <animate duration="1000" begin="0s" attributeName="opacity">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="30 20" by="30 20" begin="0s" duration="1000" repeatCount="1" />
      </animate>
      <animate duration="1000" begin="1s" attributeName="opacity">
        <animateTransform attributeName="transform" type="translate" from="30 20" to="0 0" by="-30 -20" begin="1s" duration="1000" repeatCount="1" />
      </animate>
    </g>
  </section>

  <!-- Key Concepts section -->
  <section data-narration="Key Concepts">
    <g transform="translate(30, 80)">
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Visual Hierarchy">
        <animate duration="500" begin="0s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="0s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="0.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="0.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Typography">
        <animate duration="500" begin="1s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="1s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="1.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="1.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Color Scheme">
        <animate duration="500" begin="2s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="2s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="2.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="2.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Iconography">
        <animate duration="500" begin="3s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="3s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="3.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="3.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
    </g>
  </section>

  <!-- UI Design Principles section -->
  <section data-narration="UI Design Principles">
    <g transform="translate(30, 150)">
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Keep it Simple and Intuitive">
        <animate duration="500" begin="0s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="0s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="0.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="0.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Use Consistent Design Elements">
        <animate duration="500" begin="1s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="1s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="1.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="1.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Make it Responsive">
        <animate duration="500" begin="2s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="2s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="2.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="2.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Test and Iterate">
        <animate duration="500" begin="3s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="3s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="3.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="3.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
    </g>
  </section>

  <!-- UI Design Elements section -->
  <section data-narration="UI Design Elements">
    <g transform="translate(30, 210)">
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Buttons">
        <animate duration="500" begin="0s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="0s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="0.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="0.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Labels">
        <animate duration="500" begin="1s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="1s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="1.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="1.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Text Fields">
        <animate duration="500" begin="2s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="2s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="2.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="2.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="ImageViews">
        <animate duration="500" begin="3s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="3s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="3.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="3.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Tables">
        <animate duration="500" begin="4s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="4s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="4.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="4.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
    </g>
  </section>

  <!-- Tools and Techniques section -->
  <section data-narration="Tools and Techniques">
    <g transform="translate(30, 270)">
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Sketching">
        <animate duration="500" begin="0s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="0s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="0.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="0.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Wireframing">
        <animate duration="500" begin="1s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="1s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="1.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="1.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
      <rect width="100" height="30" fill="#fff" rx="5" data-narration="Prototyping">
        <animate duration="500" begin="2s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="100 30" by="100 30" begin="2s" duration="500" repeatCount="1" />
        </animate>
        <animate duration="500" begin="2.5s" attributeName="opacity">
          <animateTransform attributeName="transform" type="translate" from="100 30" to="0 0" by="-100 -30" begin="2.5s" duration="500" repeatCount="1" />
        </animate>
      </rect>
    </g>
  </section>

  <!-- Footer section -->
  <footer data-narration="Footer">
    <rect x="0" y="350" width="420" height="50" fill="#fff" rx="5">
      <animate duration="500" begin="0s" attributeName="opacity">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" by="0 50" begin="0s" duration="500" repeatCount="1" />
      </animate>
      <animate duration="500" begin="0.5s" attributeName="opacity">
        <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" by="0 -50" begin="0.5s" duration="500" repeatCount="1" />
      </animate>
    </rect>
  </footer>
</svg>