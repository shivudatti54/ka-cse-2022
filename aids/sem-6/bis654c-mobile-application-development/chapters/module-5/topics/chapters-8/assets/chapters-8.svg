<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="chapter-8" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>SQLite Database in Android: Creation and Connection of the Database</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a288a"/>
      <stop offset="50%" stop-color="#44a0e6"/>
      <stop offset="100%" stop-color="#c7c5b8"/>
    </linearGradient>
  </defs>
  <rect x="10" y="20" width="400" height="300" fill="url(#gradient)"/>
  <g transform="translate(10, 20)">
    <text font-size="24" font-family="Arial" font-weight="bold">SQLite Database in Android</text>
    <rect x="10" y="50" width="300" height="30" fill="#f7f7f7"/>
    <text x="15" y="60" font-size="18" font-family="Arial">What is SQLite?</text>
    <g data-narration="introduction">
      <rect x="10" y="100" width="200" height="50" fill="#e0e0e0"/>
      <text x="15" y="110" font-size="16" font-family="Arial">SQLite is a lightweight, self-contained, zero-configuration database that is well-suited for use in mobile applications.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="0s" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" begin="2s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="key-features">
      <rect x="10" y="220" width="200" height="50" fill="#e0e0e0"/>
      <text x="15" y="230" font-size="16" font-family="Arial">Key Features:</text>
      <g>
        <rect x="10" y="280" width="100" height="30" fill="#44a0e6"/>
        <text x="15" y="290" font-size="16" font-family="Arial">Self-contained</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="120" y="280" width="100" height="30" fill="#44a0e6"/>
        <text x="125" y="290" font-size="16" font-family="Arial">Zero-configuration</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="220" y="280" width="100" height="30" fill="#44a0e6"/>
        <text x="225" y="290" font-size="16" font-family="Arial">Embedded</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
    </g>
    <g data-narration="creating-database">
      <rect x="10" y="380" width="200" height="50" fill="#e0e0e0"/>
      <text x="15" y="390" font-size="16" font-family="Arial">Creating a SQLite Database</text>
      <g>
        <rect x="10" y="440" width="300" height="30" fill="#f7f7f7"/>
        <text x="15" y="450" font-size="18" font-family="Arial">Using SQLiteOpenHelper</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,90" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
    </g>
    <g data-narration="requirements">
      <rect x="10" y="460" width="200" height="50" fill="#e0e0e0"/>
      <text x="15" y="470" font-size="16" font-family="Arial">Requirements:</text>
      <g>
        <rect x="10" y="520" width="100" height="30" fill="#44a0e6"/>
        <text x="15" y="530" font-size="16" font-family="Arial">1. SVG dimensions</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="120" y="520" width="100" height="30" fill="#44a0e6"/>
        <text x="125" y="530" font-size="16" font-family="Arial">2. Include data-topic-id attribute</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="220" y="520" width="100" height="30" fill="#44a0e6"/>
        <text x="225" y="530" font-size="16" font-family="Arial">3. Use gradient background with pastel colors</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
    </g>
    <g data-narration="final-diagram">
      <rect x="10" y="550" width="400" height="90" fill="#f7f7f7"/>
      <text x="15" y="560" font-size="18" font-family="Arial">Final Diagram:</text>
      <g>
        <rect x="10" y="610" width="300" height="30" fill="#44a0e6"/>
        <text x="15" y="620" font-size="16" font-family="Arial">Chapters 8</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="320" y="610" width="100" height="30" fill="#44a0e6"/>
        <text x="325" y="620" font-size="16" font-family="Arial">Database</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>
  <g transform="translate(10, 360)">
    <text font-size="18" font-family="Arial">Arrow markers for connections</text>
    <rect x="10" y="400" width="100" height="30" fill="#44a0e6"/>
    <text x="15" y="410" font-size="16" font-family="Arial">→</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(360, 360)">
    <text font-size="18" font-family="Arial">Clear labels and annotations</text>
    <rect x="10" y="400" width="100" height="30" fill="#44a0e6"/>
    <text x="15" y="410" font-size="16" font-family="Arial">→</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(720, 360)">
    <text font-size="18" font-family="Arial">Footer at bottom</text>
    <rect x="10" y="400" width="100" height="30" fill="#44a0e6"/>
    <text x="15" y="410" font-size="16" font-family="Arial">→</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
</svg>