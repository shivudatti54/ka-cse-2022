<svg width="420" height="400" data-topic-id="case-study-sms-telephony-and-location-based-services" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c8ebf" stop-opacity="1" />
            <stop offset="100%" stop-color="#8f97c5" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start" opacity="0.8">Case Study: SMS Telephony and Location-Based Services</text>
    <rect x="10" y="60" width="400" height="100" fill="#fff" rx="10" />
    <g transform="translate(10, 70)">
        <text data-narration="What is SMS Telephony?" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">SMS Telephony</text>
        <rect x="10" y="40" width="150" height="30" fill="#fff" rx="5" />
        <text x="10" y="50" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Short Message Length: 160 characters, Text-Based Communication, Simplified Messaging</text>
        <animate transform="translateX(150)" begin="0s" dur="2s" fill="freeze" />
        <text x="10" y="60" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Example: Send a text message to a friend</text>
        <rect x="10" y="80" width="150" height="30" fill="#fff" rx="5" />
        <text x="10" y="90" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Benefits: Easy communication, Simple messaging, Wide coverage</text>
    </g>
    <g transform="translate(10, 190)">
        <text data-narration="What are Location-Based Services (LBS)?" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Location-Based Services (LBS)</text>
        <rect x="10" y="40" width="150" height="30" fill="#fff" rx="5" />
        <text x="10" y="50" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Geocoding: Converts coordinates to human-readable addresses, Reverse Geocoding: Converts addresses to coordinates</text>
        <animate transform="translateX(150)" begin="0s" dur="2s" fill="freeze" />
        <text x="10" y="60" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Example: Find nearby restaurants using GPS</text>
        <rect x="10" y="80" width="150" height="30" fill="#fff" rx="5" />
        <text x="10" y="90" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Benefits: Personalized services, Improved navigation, Location-based information</text>
    </g>
    <g transform="translate(10, 290)">
        <text data-narration="Applications of SMS Telephony" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Applications of SMS Telephony</text>
        <rect x="10" y="40" width="150" height="30" fill="#fff" rx="5" />
        <text x="10" y="50" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Messaging, Email, Multimedia messaging</text>
        <animate transform="translateX(150)" begin="0s" dur="2s" fill="freeze" />
        <text x="10" y="60" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Example: Send a group message to friends</text>
        <rect x="10" y="80" width="150" height="30" fill="#fff" rx="5" />
        <text x="10" y="90" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Benefits: Easy communication, Wide coverage, Simple messaging</text>
    </g>
    <g transform="translate(10, 370)">
        <text data-narration="Applications of LBS" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Applications of LBS</text>
        <rect x="10" y="40" width="150" height="30" fill="#fff" rx="5" />
        <text x="10" y="50" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Navigation, Location-based information, Personalized services</text>
        <animate transform="translateX(150)" begin="0s" dur="2s" fill="freeze" />
        <text x="10" y="60" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Example: Find nearby restaurants using GPS</text>
        <rect x="10" y="80" width="150" height="30" fill="#fff" rx="5" />
        <text x="10" y="90" font-size="14" font-family="Arial, sans-serif" fill="#1a1d23" text-anchor="start">Benefits: Improved navigation, Location-based information, Personalized services</text>
    </g>
    <rect x="10" y="400" width="400" height="10" fill="#1a1d23" rx="5" />
    <text x="20" y="410" font-size="14" font-family="Arial, sans-serif" fill="#fff" text-anchor="start">Case Study: SMS Telephony and Location-Based Services</text>
</svg>