<svg width="420" height="400" data-topic-id="transactions">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  
  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="30" fill="#3498DB" rx="10" />
  <text x="20" y="30" fill="#FFFFFF" font-size="24" font-weight="bold">Transactions</text>
  
  <!-- Section 1: Introduction to Transactions -->
  <rect x="10" y="60" width="400" height="120" fill="#F9D3DF" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" begin="0s" />
  <text x="20" y="80" fill="#666666" font-size="18" font-weight="normal">A transaction is a logical unit of work that consists of one or more database operations that should be executed as a single atomic unit.</text>
  
  <!-- Section 2: ACID Properties -->
  <rect x="10" y="200" width="400" height="120" fill="#F7DC6F" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" begin="0s" />
  <text x="20" y="220" fill="#666666" font-size="18" font-weight="normal">The ACID properties ensure that transactions are processed reliably and securely.</text>
  <text x="20" y="240" fill="#666666" font-size="18" font-weight="normal">Atomicity: All operations in a transaction succeed or all fail</text>
  <text x="20" y="260" fill="#666666" font-size="18" font-weight="normal">Consistency: Database remains consistent before and after transaction</text>
  <text x="20" y="280" fill="#666666" font-size="18" font-weight="normal">Isolation: Transactions don't interfere with each other</text>
  <text x="20" y="300" fill="#666666" font-size="18" font-weight="normal">Durability: Once committed, changes persist even after system failure</text>
  
  <!-- Section 3: JDBC Transaction Management -->
  <rect x="10" y="320" width="400" height="120" fill="#E74C3C" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" begin="0s" />
  <text x="20" y="340" fill="#FFFFFF" font-size="18" font-weight="normal">JDBC provides transaction management to group multiple SQL statements into a single transaction.</text>
  <text x="20" y="360" fill="#FFFFFF" font-size="18" font-weight="normal">Auto-commit mode: Each SQL statement is treated as an individual transaction that is automatically committed after execution.</text>
  <text x="20" y="380" fill="#FFFFFF" font-size="18" font-weight="normal">Manual transaction control: Disable auto-commit mode, execute SQL statements, commit or rollback the transaction.</text>
  
  <!-- Section 4: Transaction Isolation Levels -->
  <rect x="10" y="400" width="400" height="120" fill="#2ECC71" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" begin="0s" />
  <text x="20" y="420" fill="#000000" font-size="18" font-weight="normal">JDBC supports different isolation levels that control how transactions interact with each other.</text>
  <text x="20" y="440" fill="#000000" font-size="18" font-weight="normal">Isolation levels: SERIALIZABLE, REPEATABLE READ, READ COMMITTED, READ UNCOMMITTED</text>
  <text x="20" y="460" fill="#000000" font-size="18" font-weight="normal">Each isolation level has its own set of requirements and characteristics.</text>
  
  <!-- Footer at bottom -->
  <rect x="10" y="420" width="400" height="30" fill="#3498DB" rx="10" />
  <text x="20" y="430" fill="#FFFFFF" font-size="18" font-weight="bold">Transactions</text>
</svg>