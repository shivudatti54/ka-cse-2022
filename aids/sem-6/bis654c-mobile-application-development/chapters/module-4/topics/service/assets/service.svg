<svg width="420" height="400" data-topic-id="service" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#E0E0E0" width="100%" height="100%" />
  <rect fill="#C7B8EA" x="0" y="0" width="100%" height="20" />
  <text x="15" y="10" font-size="16" font-family="Arial" fill="#000" text-anchor="start">Service</text>
  <text x="15" y="30" font-size="12" font-family="Arial" fill="#000" text-anchor="start">Operating System Services</text>
  <rect fill="#C7B8EA" x="0" y="50" width="100%" height="20" />
  <text x="15" y="60" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Program Execution</text>
  <animateTransform attributeName="transform" type="translate" from="0 60" to="0 80" dur="2s" begin="0s" />
  <path d="M 15,60 L 45,80" stroke="#007bff" stroke-width="2" fill="none" />
  <text x="15" y="80" font-size="12" font-family="Arial" fill="#000" text-anchor="start">The OS loads programs into memory and executes them.</text>
  <rect fill="#C7B8EA" x="0" y="110" width="100%" height="20" />
  <text x="15" y="120" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Input/Output Operations</text>
  <animateTransform attributeName="transform" type="translate" from="0 120" to="0 140" dur="2s" begin="2s" />
  <path d="M 15,120 L 45,140" stroke="#007bff" stroke-width="2" fill="none" />
  <text x="15" y="140" font-size="12" font-family="Arial" fill="#000" text-anchor="start">The OS provides standardized interfaces for reading from input devices and writing to output devices.</text>
  <rect fill="#C7B8EA" x="0" y="170" width="100%" height="20" />
  <text x="15" y="180" font-size="14" font-family="Arial" fill="#000" text-anchor="start">File System Manipulation</text>
  <animateTransform attributeName="transform" type="translate" from="0 180" to="0 200" dur="2s" begin="4s" />
  <path d="M 15,180 L 45,200" stroke="#007bff" stroke-width="2" fill="none" />
  <text x="15" y="200" font-size="12" font-family="Arial" fill="#000" text-anchor="start">The OS manages files and directories through services.</text>
  <rect fill="#C7B8EA" x="0" y="230" width="100%" height="20" />
  <text x="15" y="240" font-size="14" font-family="Arial" fill="#000" text-anchor="start">Communication Services</text>
  <animateTransform attributeName="transform" type="translate" from="0 240" to="0 260" dur="2s" begin="6s" />
  <path d="M 15,240 L 45,260" stroke="#007bff" stroke-width="2" fill="none" />
  <text x="15" y="260" font-size="12" font-family="Arial" fill="#000" text-anchor="start">Modern OSs provide mechanisms for processes to communicate with each other.</text>
  <rect fill="#E0E0E0" x="0" y="290" width="100%" height="10" />
  <text x="15" y="300" font-size="12" font-family="Arial" fill="#000" text-anchor="start">Footer</text>
</svg>