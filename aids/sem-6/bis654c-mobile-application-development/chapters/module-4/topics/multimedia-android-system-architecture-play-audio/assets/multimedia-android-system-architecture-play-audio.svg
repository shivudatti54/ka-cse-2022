<svg width="420" height="400" data-topic-id="Multimedia-Android-System-Architecture-Play-Audio" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <!--Title Section-->
  <rect x="200" y="0" width="120" height="40" fill="#3498db" rx="10"/>
  <text x="310" y="20" font-size="24" font-family="Arial" fill="#ffffff">Multimedia Android System Architecture</text>

  <!--Background Gradient Section-->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e5e5e5"/>
      <stop offset="100%" stop-color="#c7c5b8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="40" width="420" height="320" fill="url(#pastel-gradient)"/>

  <!--Audio Playback Section-->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="60" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="15" font-size="18" font-family="Arial" fill="#ffffff">Audio Playback</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="0s" dur="1.5s" repeatCount="indefinite"/>
    <ellipse cx="30" cy="25" rx="10" ry="10" fill="#ffffff" stroke="#3498db" stroke-width="2"/>
    <text x="20" y="45" font-size="16" font-family="Arial" fill="#3498db">MediaPlayer(context, Uri)</text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#3498db">setAudioStreamType(int)</text>
    <text x="20" y="75" font-size="16" font-family="Arial" fill="#3498db">setDataSource(Uri)</text>
    <text x="20" y="90" font-size="16" font-family="Arial" fill="#3498db">start()</text>
    <text x="20" y="105" font-size="16" font-family="Arial" fill="#3498db">pause()</text>
    <text x="20" y="120" font-size="16" font-family="Arial" fill="#3498db">stop()</text>
  </g>

  <!--Video Playback Section-->
  <g transform="translate(150, 60)">
    <rect x="0" y="0" width="60" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="15" font-size="18" font-family="Arial" fill="#ffffff">Video Playback</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="1.5s" dur="1.5s" repeatCount="indefinite"/>
    <ellipse cx="30" cy="25" rx="10" ry="10" fill="#ffffff" stroke="#3498db" stroke-width="2"/>
    <text x="20" y="45" font-size="16" font-family="Arial" fill="#3498db">SurfaceView</text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#3498db">SurfaceHolder</text>
    <text x="20" y="75" font-size="16" font-family="Arial" fill="#3498db">setSurfaceCreated(SurfaceHolder)</text>
    <text x="20" y="90" font-size="16" font-family="Arial" fill="#3498db">start()</text>
  </g>

  <!--Text-to-Speech (TTS) Functionality Section-->
  <g transform="translate(290, 60)">
    <rect x="0" y="0" width="60" height="40" fill="#3498db" rx="10"/>
    <text x="15" y="15" font-size="18" font-family="Arial" fill="#ffffff">Text-to-Speech (TTS) Functionality</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="2.5s" dur="1.5s" repeatCount="indefinite"/>
    <ellipse cx="30" cy="25" rx="10" ry="10" fill="#ffffff" stroke="#3498db" stroke-width="2"/>
    <text x="20" y="45" font-size="16" font-family="Arial" fill="#3498db">TextToSpeech(context, Handler)</text>
    <text x="20" y="60" font-size="16" font-family="Arial" fill="#3498db">speak()</text>
  </g>

  <!--Footer Section-->
  <rect x="0" y="340" width="420" height="20" fill="#3498db" rx="10"/>
  <text x="10" y="350" font-size="18" font-family="Arial" fill="#ffffff">Multimedia Android System Architecture</text>
</svg>