<svg width="420" height="400" data-topic-id="mobile-application-development-chapters-67" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Gradient background styles */
    .grad {
      filter: progid:DXImageTransform.Microsoft.gradient(
        startColorstr='#CCFFCC',
        endColorstr='#C7F4FF'
      );
    }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CCFFCC"/>
      <stop offset="100%" stop-color="#C7F4FF"/>
    </linearGradient>
  </defs>
  <!-- Title -->
  <rect x="10" y="10" width="400" height="30" fill="none" rx="10"/>
  <text x="10" y="25" font-size="24" font-weight="bold">Mobile Application Development</text>
  <!-- Gradient background -->
  <rect x="0" y="40" width="420" height="300" fill="url(#grad)"/>
  <!-- Section 1: Introduction to Activities -->
  <rect x="10" y="40" width="400" height="50" fill="none" rx="10" style="background-color: #F7F7F7"/>
  <animateTransform attributeName="transform" type="translateX" from="-20" to="0" dur="1s" begin="-0.5s"/>
  <text x="10" y="60" font-size="18" font-weight="bold" data-narration="Introduction to Activities">Introduction to Activities</text>
  <animate style="opacity" from="1" to="0.5" dur="1s" begin="-0.5s"/>
  <!-- Section 2: Intent -->
  <rect x="10" y="110" width="400" height="50" fill="none" rx="10" style="background-color: #F7F7F7"/>
  <animateTransform attributeName="transform" type="translateX" from="20" to="0" dur="1s" begin="-0.5s"/>
  <text x="10" y="130" font-size="18" font-weight="bold" data-narration="Intent">Intent</text>
  <animate style="opacity" from="0.5" to="1" dur="1s" begin="-0.5s"/>
  <line x1="10" y1="160" x2="220" y2="160" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="10" y1="160" x2="220" y2="160" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  <!-- Section 3: Intent Filters -->
  <rect x="10" y="210" width="400" height="50" fill="none" rx="10" style="background-color: #F7F7F7"/>
  <animateTransform attributeName="transform" type="translateX" from="20" to="0" dur="1s" begin="-0.5s"/>
  <text x="10" y="230" font-size="18" font-weight="bold" data-narration="Intent Filters">Intent Filters</text>
  <animate style="opacity" from="0.5" to="1" dur="1s" begin="-0.5s"/>
  <line x1="10" y1="270" x2="220" y2="270" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="10" y1="270" x2="220" y2="270" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  <!-- Section 4: Activity Life Cycle -->
  <rect x="10" y="310" width="400" height="50" fill="none" rx="10" style="background-color: #F7F7F7"/>
  <animateTransform attributeName="transform" type="translateX" from="20" to="0" dur="1s" begin="-0.5s"/>
  <text x="10" y="330" font-size="18" font-weight="bold" data-narration="Activity Life Cycle">Activity Life Cycle</text>
  <animate style="opacity" from="0.5" to="1" dur="1s" begin="-0.5s"/>
  <line x1="10" y1="380" x2="220" y2="380" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="10" y1="380" x2="220" y2="380" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
  <!-- Footer -->
  <rect x="10" y="380" width="400" height="30" fill="none" rx="10"/>
  <text x="10" y="395" font-size="18" font-weight="normal">Mobile Application Development</text>
  <line x1="10" y1="420" x2="10" y2="450" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
</svg>