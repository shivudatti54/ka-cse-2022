<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="artificial-intelligence-game-playing-natural-language-processing">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title at top -->
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#2F4F7F" text-anchor="start">Game Playing</text>
  
  <!-- Section 1: Definition -->
  <section id="section1" data-narration="Definition of Game Playing">
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Game Playing</text>
    <rect x="20" y="100" width="380" height="50" fill="#C7B8EA" rx="5"/>
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">refers to the ability of computers to play games that require strategy, decision-making, and problem-solving.</text>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="20" y="120" width="380" height="50" fill="#A1C9F2" rx="5"/>
  </animate>
  
  <!-- Section 2: Types of Games -->
  <section id="section2" data-narration="Types of Games">
    <text x="20" y="200" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Types of Games</text>
    <rect x="20" y="220" width="380" height="50" fill="#C7B8EA" rx="5"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Turn-based games, Real-time games, Multiplayer games.</text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
      <rect x="20" y="240" width="380" height="50" fill="#A1C9F2" rx="5"/>
    </animate>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="20" y="240" width="380" height="50" fill="#C7B8EA" rx="5"/>
  </animate>
  
  <!-- Section 3: Key Concepts -->
  <section id="section3" data-narration="Key Concepts">
    <text x="20" y="320" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Key Concepts</text>
    <rect x="20" y="340" width="380" height="50" fill="#C7B8EA" rx="5"/>
    <text x="20" y="360" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Game tree, Heuristic search, Minimax algorithm.</text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
      <rect x="20" y="360" width="380" height="50" fill="#A1C9F2" rx="5"/>
    </animate>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="20" y="360" width="380" height="50" fill="#C7B8EA" rx="5"/>
  </animate>
  
  <!-- Examples -->
  <section id="section4" data-narration="Examples">
    <text x="20" y="400" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Examples</text>
    <rect x="20" y="420" width="380" height="50" fill="#C7B8EA" rx="5"/>
    <text x="20" y="440" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Tic-Tac-Toe, Chess.</text>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="20" y="440" width="380" height="50" fill="#A1C9F2" rx="5"/>
  </animate>
  
  <!-- Footer -->
  <text x="20" y="460" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Game Playing</text>
</svg>