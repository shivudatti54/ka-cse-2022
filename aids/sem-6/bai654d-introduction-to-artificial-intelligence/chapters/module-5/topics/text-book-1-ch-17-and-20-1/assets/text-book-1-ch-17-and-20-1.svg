<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="introduction-to-artificial-intelligence-learning-and-expert-systems-chapter-17-and-20">
  <style>
    /* Styles for the SVG */
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }
    
    /* Gradient background */
    .gradient {
      background-image: linear-gradient(to bottom right, #5b6bc0, #0097a7);
      background-size: 100% 100%;
      background-position: 0% 0%;
      height: 100%;
      width: 100%;
    }
  </style>
  <rect x="0" y="0" width="420" height="400" class="gradient"></rect>
  
  <!-- Title Section -->
  <section data-narration="Section 1: Introduction to Learning">
    <g transform="translate(10, 20)">
      <text x="0" y="0" font-size="24" font-family="Arial" fill="#000">Learning</text>
      <animate attributeName="x" from="0" to="10" dur="2s" begin="0s" repeatCount="indefinite"></animate>
    </g>
  </section>
  
  <!-- Supervised Learning Section -->
  <section data-narration="Section 2: Supervised Learning">
    <g transform="translate(100, 50)">
      <rect x="0" y="0" width="20" height="20" fill="#0f0"></rect>
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#000">Supervised Learning</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"></animate>
    </g>
    <g transform="translate(150, 150)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#0f0">Trained on labeled data</text>
      <animate attributeName="x" from="0" to="20" dur="2s" begin="1s" repeatCount="indefinite"></animate>
    </g>
  </section>
  
  <!-- Unsupervised Learning Section -->
  <section data-narration="Section 3: Unsupervised Learning">
    <g transform="translate(250, 50)">
      <rect x="0" y="0" width="20" height="20" fill="#f0f"></rect>
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#f00">Unsupervised Learning</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"></animate>
    </g>
    <g transform="translate(300, 150)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#f00">Must find patterns and structure</text>
      <animate attributeName="x" from="0" to="20" dur="2s" begin="1s" repeatCount="indefinite"></animate>
    </g>
  </section>
  
  <!-- Reinforcement Learning Section -->
  <section data-narration="Section 4: Reinforcement Learning">
    <g transform="translate(350, 50)">
      <rect x="0" y="0" width="20" height="20" fill="#66f"></rect>
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#f66">Reinforcement Learning</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"></animate>
    </g>
    <g transform="translate(400, 150)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#66f">Learns through trial and error</text>
      <animate attributeName="x" from="0" to="20" dur="2s" begin="1s" repeatCount="indefinite"></animate>
    </g>
  </section>
  
  <!-- Machine Learning Algorithms Section -->
  <section data-narration="Section 5: Machine Learning Algorithms">
    <g transform="translate(50, 250)">
      <rect x="0" y="0" width="20" height="20" fill="#0f0"></rect>
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#000">Linear Regression</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"></animate>
    </g>
    <g transform="translate(120, 250)">
      <rect x="0" y="0" width="20" height="20" fill="#66f"></rect>
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#f66">Decision Trees</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"></animate>
    </g>
    <g transform="translate(200, 250)">
      <rect x="0" y="0" width="20" height="20" fill="#f0f"></rect>
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#0f0">Neural Networks</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"></animate>
    </g>
  </section>
  
  <!-- Expert Systems Section -->
  <section data-narration="Section 6: Expert Systems">
    <g transform="translate(300, 250)">
      <rect x="0" y="0" width="20" height="20" fill="#66f"></rect>
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#f66">Expert Systems</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"></animate>
    </g>
    <g transform="translate(350, 300)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#66f">Mimics human expert decision-making</text>
      <animate attributeName="x" from="0" to="20" dur="2s" begin="1s" repeatCount="indefinite"></animate>
    </g>
  </section>
  
  <!-- Medical Diagnosis Section -->
  <section data-narration="Section 7: Medical Diagnosis">
    <g transform="translate(70, 350)">
      <rect x="0" y="0" width="20" height="20" fill="#66f"></rect>
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#f66">Medical Diagnosis</text>
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"></animate>
    </g>
    <g transform="translate(120, 400)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#66f">Expert system can diagnose diseases</text>
      <animate attributeName="x" from="0" to="20" dur="2s" begin="1s" repeatCount="indefinite"></animate>
    </g>
  </section>
  
  <!-- Footer -->
  <text x="0" y="380" font-size="18" font-family="Arial" fill="#000">End of Chapter 17 and 20</text>
</svg>