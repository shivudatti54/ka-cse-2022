<svg width="420" height="400" data-topic-id="Introduction-to-Artificial-Intelligence-Chapter-1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  <title>Text Book 1 Ch 1</title>
  <g id="section-1">
    <rect x="10" y="50" width="300" height="150" fill="white" rx="10" />
    <text x="15" y="20" font-size="24" font-family="Arial" fill="#4CAF50">What is Artificial Intelligence?</text>
    <text x="15" y="60" font-size="18" font-family="Arial" fill="#666666">Artificial Intelligence (AI) refers to the development of computer systems that can perform tasks that typically require human intelligence, such as learning, problem-solving, and language understanding.</text>
    <animate-transform attributeName="transform" type="rotate" from="0 300 150" to="360 300 150" dur="5s" begin="2s" repeatCount="indefinite" />
  </g>
  <g id="section-2">
    <rect x="10" y="220" width="300" height="150" fill="white" rx="10" />
    <text x="15" y="190" font-size="24" font-family="Arial" fill="#4CAF50">Definition of AI</text>
    <text x="15" y="220" font-size="18" font-family="Arial" fill="#666666">Artificial Intelligence can be defined as the science and engineering of creating intelligent machines that can think and learn like humans.</text>
    <animate-transform attributeName="transform" type="rotate" from="0 300 220" to="360 300 220" dur="5s" begin="4s" repeatCount="indefinite" />
  </g>
  <g id="section-3">
    <rect x="10" y="390" width="300" height="150" fill="white" rx="10" />
    <text x="15" y="360" font-size="24" font-family="Arial" fill="#4CAF50">History of AI</text>
    <text x="15" y="380" font-size="18" font-family="Arial" fill="#666666">The concept of AI dates back to ancient Greece, where myths told of artificial beings created to serve human-like purposes. In the 20th century, AI research began in earnest with the development of the first AI program, Logical Theorist, in 1956.</text>
    <animate-transform attributeName="transform" type="rotate" from="0 300 390" to="360 300 390" dur="5s" begin="6s" repeatCount="indefinite" />
  </g>
  <g id="section-4">
    <rect x="10" y="170" width="300" height="150" fill="white" rx="10" />
    <text x="15" y="140" font-size="24" font-family="Arial" fill="#4CAF50">Types of AI</text>
    <text x="15" y="160" font-size="18" font-family="Arial" fill="#666666">There are several types of AI, including Narrow or Weak AI, General or Strong AI, and Superintelligence.</text>
    <animate-transform attributeName="transform" type="rotate" from="0 300 170" to="360 300 170" dur="5s" begin="8s" repeatCount="indefinite" />
  </g>
  <g id="section-5">
    <rect x="10" y="110" width="300" height="150" fill="white" rx="10" />
    <text x="15" y="80" font-size="24" font-family="Arial" fill="#4CAF50">Problem Spaces and Search Algorithms</text>
    <text x="15" y="100" font-size="18" font-family="Arial" fill="#666666">A problem space is a set of possible solutions to a problem. Search algorithms are used to find the best solution from the problem space.</text>
    <animate-transform attributeName="transform" type="rotate" from="0 300 110" to="360 300 110" dur="5s" begin="10s" repeatCount="indefinite" />
  </g>
  <g id="section-6">
    <rect x="10" y="50" width="300" height="150" fill="white" rx="10" />
    <text x="15" y="20" font-size="24" font-family="Arial" fill="#4CAF50">Example: The 8-Puzzle Problem</text>
    <text x="15" y="60" font-size="18" font-family="Arial" fill="#666666">The 8-puzzle problem is a classic example of a problem that requires AI to solve. The problem consists of a 3x3 grid with 8 tiles, one of which is missing. The goal is to move the missing tile to its correct position.</text>
    <animate-transform attributeName="transform" type="rotate" from="0 300 50" to="360 300 50" dur="5s" begin="12s" repeatCount="indefinite" />
  </g>
  <g id="footer">
    <text x="15" y="400" font-size="24" font-family="Arial" fill="#4CAF50">Powered by SVG.js</text>
  </g>
</svg>