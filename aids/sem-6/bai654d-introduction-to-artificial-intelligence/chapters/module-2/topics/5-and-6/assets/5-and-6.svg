<svg width="420" height="400" data-topic-id="5-and-6" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>5 and 6: Knowledge Representation Using Predicate Logic</title>
  <rect x="10" y="20" width="400" height="350" fill="url(#pastelGradient)"/>
  <g transform="translate(20, 50)">
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Introduction</text>
    <rect x="10" y="50" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Propositional Logic is a branch of logic that deals with statements that can be either true or false. It is used to represent simple statements and relationships between them.">Propositional Logic</text>
    <rect x="10" y="100" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Atomic propositions are simple statements that can be either true or false, such as &quot;It is sunny&quot; or &quot;The cat is happy&quot;.">Atomic Propositions</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="1s" dur="1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 150" begin="2s" dur="1s"/>
    <rect x="10" y="150" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="160" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Logical operators such as AND, OR, and NOT combine atomic propositions to form more complex statements.">Logical Operators</text>
  </g>
  <g transform="translate(20, 250)">
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Predicate Logic</text>
    <rect x="10" y="50" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Predicate logic is an extension of propositional logic that allows us to represent more complex statements and relationships between objects.">Predicate Logic</text>
    <rect x="10" y="100" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Predicates are functions that take arguments and return a value, such as &quot;x is a cat&quot; or &quot;x is an animal&quot;."">Predicates</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" begin="1s" dur="1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 250" begin="2s" dur="1s"/>
    <rect x="10" y="200" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="210" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Example: ∀x (Cat(x) → Animal(x)) represents the statement &quot;All cats are animals&quot; using predicate logic.">Example</text>
  </g>
  <g transform="translate(20, 350)">
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Key Concepts</text>
    <rect x="10" y="50" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Predicates are functions that take arguments and return a value, such as &quot;x is a cat&quot; or &quot;x is an animal&quot;." data-topic-id="5-and-6">Predicates</text>
    <rect x="10" y="100" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="110" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Logical equivalences are relationships between logical expressions that can be used to simplify or prove the validity of a statement." data-topic-id="5-and-6">Logical Equivalences</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 250" begin="1s" dur="1s"/>
    <rect x="10" y="250" width="100" height="30" fill="#87CEEB" rx="5"/>
    <text x="120" y="260" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="The title is &quot;5 and 6: Knowledge Representation Using Predicate Logic&quot; and the footer is &quot;Educational Visualizations&quot;." data-topic-id="5-and-6">Footer</text>
  </g>
  <rect x="10" y="360" width="400" height="40" fill="#87CEEB" rx="5"/>
  <text x="10" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Footer</text>
  <rect x="10" y="400" width="400" height="50" fill="#87CEEB" rx="5"/>
  <text x="10" y="410" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-topic-id="5-and-6">Footer</text>
  <rect x="10" y="460" width="400" height="40" fill="#87CEEB" rx="5"/>
  <text x="10" y="470" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Educational Visualizations</text>
</svg>