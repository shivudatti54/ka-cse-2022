<svg
    width="420"
    height="400"
    viewBox="0 0 420 400"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    data-topic-id="ch4-knowledge-representation"
    xml:space="preserve"
    style="background-color: #C7E5F5; background-image: linear-gradient(to bottom, #C7E5F5, #87CEEB);">
  <title>Data Topic 1 Ch 4</title>
  <rect x="10" y="10" width="400" height="50" fill="#87CEEB" rx="10" />
  <g transform="translate(10, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#FFC499" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Introduction to Artificial Intelligence: Ch 4 Knowledge Representation Issues</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(120, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">4.1 What is Knowledge Representation?</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="0.5s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(240, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">4.2 Why is Knowledge Representation Important?</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="1s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(360, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">4.3 Types of Knowledge Representation</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="1.5s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(10, 220)">
    <rect x="0" y="0" width="100" height="50" fill="#FFC499" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Predicate Logic</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="2s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(120, 220)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Predicates</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="2.5s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(240, 220)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Variables</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="3s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(360, 220)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Quantifiers</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="3.5s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(10, 310)">
    <rect x="0" y="0" width="100" height="50" fill="#FFC499" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Example: Predicate Logic</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="4s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(120, 310)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Predicates P(x) and Q(x, y)</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="4.5s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(240, 310)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Variable x</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="5s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(360, 310)">
    <rect x="0" y="0" width="100" height="50" fill="#87CEEB" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Quantifier "for all"</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" begin="5.5s" dur="2s" repeatCount="indefinite" />
  </g>
  <rect x="10" y="380" width="400" height="20" fill="#87CEEB" rx="10" />
  <text x="10" y="390" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#000">Footer</text>
</svg>