<svg width="420" height="400" data-topic-id="implement-a-word-count-program-in-hadoop-and-spark" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <style>
    /* Gradient background */
    .background {
      background-image: linear-gradient(to bottom, #4a6cc9, #6495ed);
      background-size: 100% 100%;
      background-position: 0% 0%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>

  <!-- Background gradient -->
  <rect class="background" x="0" y="0" width="420" height="400" rx="10" fill="none" opacity="0.7" />
  
  <!-- Header section -->
  <g data-narration="Header">
    <rect x="10" y="20" width="400" height="40" fill="#4a6cc9" rx="10" />
    <text x="20" y="25" font-size="24" font-weight="bold" text-anchor="left" fill="#ffffff">
      Implementing a Word Count Program in Hadoop and Spark
    </text>
  </g>

  <!-- MapReduce Architecture section -->
  <g data-narration="MapReduce_Architecture">
    <rect x="10" y="60" width="400" height="80" fill="#6495ed" rx="10" />
    <text x="20" y="65" font-size="18" font-weight="bold" text-anchor="left" fill="#000000">
      MapReduce Architecture
    </text>
    <path d="M 60,70 L 80,70" stroke="#000000" stroke-width="2" fill="none" />
    <g transform="translate(80,70)">
      <circle cx="0" cy="0" r="10" fill="#000000" />
      <text x="10" y="0" font-size="14" text-anchor="middle" fill="#000000">
        Mapper
      </text>
      <path d="M 50,0 L 70,0" stroke="#000000" stroke-width="2" fill="none" />
      <g transform="translate(70,0)">
        <circle cx="0" cy="0" r="10" fill="#000000" />
        <text x="10" y="0" font-size="14" text-anchor="middle" fill="#000000">
          Reducer
        </text>
      </g>
    </g>
  </g>

  <!-- Hadoop Word Count Program Example section -->
  <g data-narration="Hadoop_World_Count_Program_Example">
    <rect x="10" y="150" width="400" height="80" fill="#6495ed" rx="10" />
    <text x="20" y="155" font-size="18" font-weight="bold" text-anchor="left" fill="#000000">
      Hadoop Word Count Program Example
    </text>
    <code>
      <pre>
        <code class="java">
          public class WordCountMapper extends Mapper<Object, Text, Text, IntWritable> {
            public void map(Object key, Text value, Context context) throws IOException, InterruptedException {
              String word = value.toString();
              IntWritable count = new IntWritable(1);
              context.write(word, count);
            }
          }

          public class WordCountReducer extends Reducer<Text, IntWritable, Text, IntWritable> {
            public void reduce(Text key, Iterable<IntWritable> values, Context context) throws IOException, InterruptedException {
              int sum = 0;
              for (IntWritable value : values) {
                sum += value.get();
              }
              context.write(key, new IntWritable(sum));
            }
          }
        </code>
      </pre>
    </code>
  </g>

  <!-- Spark Word Count Program section -->
  <g data-narration="Spark_World_Count_Program">
    <rect x="10" y="230" width="400" height="80" fill="#6495ed" rx="10" />
    <text x="20" y="235" font-size="18" font-weight="bold" text-anchor="left" fill="#000000">
      Spark Word Count Program
    </text>
    <path d="M 60,70 L 80,70" stroke="#000000" stroke-width="2" fill="none" />
    <g transform="translate(80,70)">
      <circle cx="0" cy="0" r="10" fill="#000000" />
      <text x="10" y="0" font-size="14" text-anchor="middle" fill="#000000">
        Spark Word Count Program
      </text>
      <path d="M 50,0 L 70,0" stroke="#000000" stroke-width="2" fill="none" />
      <g transform="translate(70,0)">
        <circle cx="0" cy="0" r="10" fill="#000000" />
        <text x="10" y="0" font-size="14" text-anchor="middle" fill="#000000">
          Spark Word Count Program
        </text>
      </g>
    </g>
  </g>

  <!-- Animation section -->
  <g data-narration="Animation">
    <rect x="10" y="320" width="400" height="60" fill="#4a6cc9" rx="10" />
    <text x="20" y="325" font-size="18" font-weight="bold" text-anchor="left" fill="#000000">
      Animation
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite" begin="0s" />
  </g>

  <!-- Footer section -->
  <g data-narration="Footer">
    <rect x="10" y="380" width="400" height="20" fill="#4a6cc9" rx="10" />
    <text x="20" y="385" font-size="14" text-anchor="left" fill="#000000">
      &copy; 2023
    </text>
  </g>

</svg>