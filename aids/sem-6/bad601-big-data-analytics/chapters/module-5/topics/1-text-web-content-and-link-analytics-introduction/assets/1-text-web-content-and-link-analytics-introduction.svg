<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400"
     xmlns:a="http://www.w3.org/1999/xlink" style="text-anchor: middle;
     font-family: Arial, sans-serif; font-size: 18px; color: #2f4f7f;">
  <title>Text, Web Content and Link Analytics Introduction</title>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4682b4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)"/>
  <text x="20" y="20" text-anchor="middle" fill="#fff" data-narration="Text, Web Content and Link Analytics Introduction">
    <tspan>Text, Web Content and Link Analytics</tspan>
  </text>
  <g id="title">
    <rect x="10" y="60" width="100" height="20" fill="#2f4f7f"/>
    <text x="10" y="80" text-anchor="middle" fill="#fff" font-size="24px">Text Mining</text>
  </g>
  <g id="text-mining">
    <rect x="120" y="60" width="200" height="20" fill="#2f4f7f"/>
    <text x="120" y="80" text-anchor="middle" fill="#fff" font-size="18px">Named Entity Recognition (NER)</text>
    <animateTransform attribute="transform" type="translateX" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="ner">
    <rect x="120" y="100" width="200" height="20" fill="#2f4f7f"/>
    <animateTransform attribute="transform" type="translateX" begin="0.2s" dur="2s" repeatCount="indefinite"/>
    <text x="120" y="120" text-anchor="middle" fill="#fff" font-size="18px">Named Entity Recognition (NER)</text>
    <animateTransform attribute="transform" type="translateX" begin="0.4s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="postag">
    <rect x="120" y="140" width="200" height="20" fill="#2f4f7f"/>
    <animateTransform attribute="transform" type="translateX" begin="0.6s" dur="2s" repeatCount="indefinite"/>
    <text x="120" y="160" text-anchor="middle" fill="#fff" font-size="18px">Part-of-Speech Tagging (POSTag)</text>
    <animateTransform attribute="transform" type="translateX" begin="0.8s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="sentiment-analysis">
    <rect x="120" y="160" width="200" height="20" fill="#2f4f7f"/>
    <animateTransform attribute="transform" type="translateX" begin="1s" dur="2s" repeatCount="indefinite"/>
    <text x="120" y="180" text-anchor="middle" fill="#fff" font-size="18px">Sentiment Analysis</text>
    <animateTransform attribute="transform" type="translateX" begin="1.2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="topic-modeling">
    <rect x="120" y="200" width="200" height="20" fill="#2f4f7f"/>
    <animateTransform attribute="transform" type="translateX" begin="1.4s" dur="2s" repeatCount="indefinite"/>
    <text x="120" y="220" text-anchor="middle" fill="#fff" font-size="18px">Topic Modeling</text>
    <animateTransform attribute="transform" type="translateX" begin="1.6s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="web-content-analysis">
    <rect x="320" y="60" width="100" height="20" fill="#2f4f7f"/>
    <text x="320" y="80" text-anchor="middle" fill="#fff" font-size="24px">Web Content Analysis</text>
  </g>
  <g id="web-usage-analysis">
    <rect x="320" y="100" width="100" height="20" fill="#2f4f7f"/>
    <text x="320" y="120" text-anchor="middle" fill="#fff" font-size="18px">Web Usage Analysis</text>
    <animateTransform attribute="transform" type="translateX" begin="1.8s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="page-rank">
    <rect x="320" y="140" width="100" height="20" fill="#2f4f7f"/>
    <text x="320" y="160" text-anchor="middle" fill="#fff" font-size="18px">Page Rank</text>
    <animateTransform attribute="transform" type="translateX" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="web-structure-analysis">
    <rect x="320" y="180" width="100" height="20" fill="#2f4f7f"/>
    <text x="320" y="200" text-anchor="middle" fill="#fff" font-size="18px">Web Structure Analysis</text>
    <animateTransform attribute="transform" type="translateX" begin="2.2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g id="footer">
    <rect x="10" y="380" width="400" height="20" fill="#2f4f7f"/>
    <text x="10" y="400" text-anchor="middle" fill="#fff" font-size="18px">Text, Web Content and Link Analytics Introduction</text>
  </g>
  <g id="arrow-markers">
    <line x1="360" y1="60" x2="360" y2="120" stroke="#fff" stroke-width="2"/>
    <line x1="360" y1="140" x2="360" y2="200" stroke="#fff" stroke-width="2"/>
    <line x1="360" y1="160" x2="360" y2="220" stroke="#fff" stroke-width="2"/>
    <line x1="360" y1="200" x2="360" y2="260" stroke="#fff" stroke-width="2"/>
    <line x1="360" y1="220" x2="360" y2="280" stroke="#fff" stroke-width="2"/>
    <line x1="360" y1="240" x2="360" y2="300" stroke="#fff" stroke-width="2"/>
  </g>
</svg>