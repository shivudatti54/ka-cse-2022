<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" data-topic-id="5-Implement-Functions-Count-Sort-Limit-Skip-Aggregate" xml:space="preserve">
  <!-- Title -->
  <title>5 Implement Functions: Count, Sort, Limit, Skip, Aggregate</title>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4C7EF2" stop-opacity="1"/>
      <stop offset="50%" stop-color="#2196F3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F7F2C4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#grad)"/>
  
  <!-- Section 1: Count Function -->
  <section data-narration="Count Function">
    <rect x="10" y="20" width="100" height="30" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="35" font-size="18" font-family="Arial, sans-serif" font-weight="bold">Count Function</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 10" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <text x="15" y="50" font-size="12" font-family="Arial, sans-serif">Counts the number of documents that match a specific condition.</text>
    <animateTransform attributeName="transform" type="translate" from="0 30" to="0 40" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="10" y="55" width="100" height="20" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="70" font-size="12" font-family="Arial, sans-serif">Example: <span style="text-decoration: underline;">db.customers.countDocuments({ country: "USA" })</span></text>
  </section>
  
  <!-- Section 2: Sort Function -->
  <section data-narration="Sort Function">
    <rect x="10" y="20" width="100" height="30" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="35" font-size="18" font-family="Arial, sans-serif" font-weight="bold">Sort Function</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 10" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <text x="15" y="50" font-size="12" font-family="Arial, sans-serif">Sorts the documents in a collection based on specific fields.</text>
    <animateTransform attributeName="transform" type="translate" from="0 30" to="0 40" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="10" y="55" width="100" height="20" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="70" font-size="12" font-family="Arial, sans-serif">Example: <span style="text-decoration: underline;">db.customers.sort({ name: 1 })</span></text>
  </section>
  
  <!-- Section 3: Limit Function -->
  <section data-narration="Limit Function">
    <rect x="10" y="20" width="100" height="30" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="35" font-size="18" font-family="Arial, sans-serif" font-weight="bold">Limit Function</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 10" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <text x="15" y="50" font-size="12" font-family="Arial, sans-serif">Limits the number of documents returned.</text>
    <animateTransform attributeName="transform" type="translate" from="0 30" to="0 40" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="10" y="55" width="100" height="20" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="70" font-size="12" font-family="Arial, sans-serif">Example: <span style="text-decoration: underline;">db.customers.limit(10)</span></text>
  </section>
  
  <!-- Section 4: Skip Function -->
  <section data-narration="Skip Function">
    <rect x="10" y="20" width="100" height="30" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="35" font-size="18" font-family="Arial, sans-serif" font-weight="bold">Skip Function</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 10" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <text x="15" y="50" font-size="12" font-family="Arial, sans-serif">Skips a specified number of documents.</text>
    <animateTransform attributeName="transform" type="translate" from="0 30" to="0 40" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="10" y="55" width="100" height="20" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="70" font-size="12" font-family="Arial, sans-serif">Example: <span style="text-decoration: underline;">db.customers.skip(10)</span></text>
  </section>
  
  <!-- Section 5: Aggregate Function -->
  <section data-narration="Aggregate Function">
    <rect x="10" y="20" width="100" height="30" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="35" font-size="18" font-family="Arial, sans-serif" font-weight="bold">Aggregate Function</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 10" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <text x="15" y="50" font-size="12" font-family="Arial, sans-serif">Performs complex data transformations.</text>
    <animateTransform attributeName="transform" type="translate" from="0 30" to="0 40" begin="-0.5s" dur="1s" repeatCount="indefinite"/>
    <rect x="10" y="55" width="100" height="20" style="fill:none; stroke:#000; stroke-width:2"/>
    <text x="15" y="70" font-size="12" font-family="Arial, sans-serif">Example: <span style="text-decoration: underline;">db.customers.aggregate({ $group: { _id: "$country", count: { $sum: 1 } } })</span></text>
  </section>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="12" font-family="Arial, sans-serif">5 Implement Functions: Count, Sort, Limit, Skip, Aggregate</text>
</svg>