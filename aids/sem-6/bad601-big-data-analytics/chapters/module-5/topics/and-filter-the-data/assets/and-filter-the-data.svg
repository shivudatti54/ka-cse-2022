<svg width="420" height="400" data-topic-id="And-Filter-The-Data" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <text x="50%" y="20" font-size="24" font-family="Open Sans" text-anchor="middle" fill="#2196F3">
    <tspan data-narration="Introduction">And Filter The Data</tspan>
  </text>
  
  <!-- Section 1: Introduction -->
  <rect x="50%" y="60" width="300" height="100" fill="#FFFFFF" rx="10" data-narration="Introduction">
    <animateTransform attributeName="transform" type="translate" from="-50% -100%" to="0 0" dur="2s" begin="-1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-50% -100%" dur="2s" begin="0s"/>
    <text x="50%" y="70" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">In big data analytics, data filtering is a crucial step in the data processing pipeline.</text>
  </rect>
  
  <!-- Section 2: What is Data Filtering? -->
  <rect x="50%" y="170" width="300" height="100" fill="#FFFFFF" rx="10" data-narration="What-is-Data-Filtration">
    <animateTransform attributeName="transform" type="translate" from="-50% -100%" to="0 0" dur="2s" begin="-1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-50% -100%" dur="2s" begin="0s"/>
    <text x="50%" y="80" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">Data filtering is the process of selecting data points from a larger dataset based on specific conditions or criteria.</text>
  </rect>
  
  <!-- Section 3: Types of Filters -->
  <rect x="50%" y="280" width="300" height="100" fill="#FFFFFF" rx="10" data-narration="Types-of-Filters">
    <animateTransform attributeName="transform" type="translate" from="-50% -100%" to="0 0" dur="2s" begin="-1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-50% -100%" dur="2s" begin="0s"/>
    <text x="50%" y="90" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">There are several types of filters that can be used in data filtering, including:</text>
    <text x="50%" y="110" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">Equality Filter, Range Filter, Like Filter, and Null Filter.</text>
  </rect>
  
  <!-- Section 4: Filtering Data in Spark -->
  <rect x="50%" y="380" width="300" height="100" fill="#FFFFFF" rx="10" data-narration="Filtering-Data-in-Spark">
    <animateTransform attributeName="transform" type="translate" from="-50% -100%" to="0 0" dur="2s" begin="-1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-50% -100%" dur="2s" begin="0s"/>
    <text x="50%" y="90" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">Spark provides several ways to filter data, including the Filter function, Where function, and filtering with conditions.</text>
  </rect>
  
  <!-- Section 5: Example - Filtering Data in Spark -->
  <rect x="50%" y="480" width="300" height="100" fill="#FFFFFF" rx="10" data-narration="Example-Filtering-Data-in-Spark">
    <animateTransform attributeName="transform" type="translate" from="-50% -100%" to="0 0" dur="2s" begin="-1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-50% -100%" dur="2s" begin="0s"/>
    <text x="50%" y="90" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">Here is an example of how to filter data in Spark using the Filter function:</text>
    <text x="50%" y="110" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">val data = Seq((1, "John", 25), (2, "Jane", 30), (3, "Bob", 20), (4, "Alice", 35))</text>
    <text x="50%" y="130" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">val filteredData = data.filter(_._2 > 30)</text>
    <text x="50%" y="150" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">filteredData.foreach(println)</text>
  </rect>
  
  <!-- Footer -->
  <rect x="50%" y="580" width="300" height="50" fill="#FFFFFF" rx="10" data-narration="Footer">
    <animateTransform attributeName="transform" type="translate" from="-50% -100%" to="0 0" dur="2s" begin="-1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-50% -100%" dur="2s" begin="0s"/>
    <text x="50%" y="40" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#2196F3">And Filter The Data</text>
  </rect>
</svg>