<svg width="420" height="400">
  <metadata>
    <title>Develop A Mapreduce Program To Find The Tags Ass</title>
    <description>Animated educational SVG diagram for MapReduce program</description>
  </metadata>
  <defs>
    <style>
      .pastel {
        background-color: #C9E4CA;
        color: #2ECC71;
      }
      .indigo {
        background-color: #3B3F54;
        color: #87CEEB;
      }
      .teal {
        background-color: #0097A7;
        color: #32CD32;
      }
    </style>
  </defs>
  <text x="10" y="20" font-size="24" font-family="Arial" data-topic-id="MapReduce" data-slugified-topic-name="MapReduce">MapReduce</text>
  <rect x="10" y="50" width="400" height="300" style="fill:linear-gradient(to bottom, #C9E4CA, #87CEEB)"/>
  <section x="10" y="120" width="400" height="100" data-narration="What is MapReduce?">
    <text x="10" y="150" font-size="18" font-family="Arial">MapReduce is a programming model used for processing large data sets in parallel across a cluster of computers.</text>
    <rect x="10" y="180" width="400" height="50" style="fill:linear-gradient(to bottom, #87CEEB, #32CD32)"/>
  </section>
  <section x="10" y="280" width="400" height="100" data-narration="Movie Lens Data">
    <text x="10" y="300" font-size="18" font-family="Arial">The Movie Lens dataset is a large dataset containing information about movie ratings from a community of users.</text>
    <rect x="10" y="340" width="400" height="50" style="fill:linear-gradient(to bottom, #32CD32, #0097A7)"/>
  </section>
  <section x="10" y="380" width="400" height="100" data-narration="Task">
    <text x="10" y="400" font-size="18" font-family="Arial">Develop a MapReduce program to find the tags associated with each movie by analyzing the Movie Lens dataset.</text>
    <rect x="10" y="440" width="400" height="50" style="fill:linear-gradient(to bottom, #0097A7, #3B3F54)"/>
  </section>
  <section x="10" y="520" width="400" height="100" data-narration="Step 1: Data Preprocessing">
    <text x="10" y="540" font-size="18" font-family="Arial">Before developing the MapReduce program, we need to preprocess the data.</text>
    <rect x="10" y="580" width="400" height="50" style="fill:linear-gradient(to bottom, #3B3F54, #2ECC71)"/>
  </section>
  <section x="10" y="620" width="400" height="100" data-narration="Programming Model">
    <text x="10" y="640" font-size="18" font-family="Arial">MapReduce consists of two main phases: Map and Reduce.</text>
    <rect x="10" y="680" width="400" height="50" style="fill:linear-gradient(to bottom, #2ECC71, #87CEEB)"/>
  </section>
  <section x="10" y="760" width="400" height="100" data-narration="Final Output">
    <text x="10" y="780" font-size="18" font-family="Arial">The program should output a file containing the movieID and tags associated with each movie.</text>
    <rect x="10" y="820" width="400" height="50" style="fill:linear-gradient(to bottom, #87CEEB, #3B3F54)"/>
  </section>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze">
    <rect x="10" y="50" width="400" height="300" style="fill:linear-gradient(to bottom, #C9E4CA, #87CEEB)"/>
    <rect x="10" y="180" width="400" height="50" style="fill:linear-gradient(to bottom, #87CEEB, #32CD32)"/>
    <rect x="10" y="340" width="400" height="50" style="fill:linear-gradient(to bottom, #32CD32, #0097A7)"/>
    <rect x="10" y="440" width="400" height="50" style="fill:linear-gradient(to bottom, #0097A7, #3B3F54)"/>
    <rect x="10" y="580" width="400" height="50" style="fill:linear-gradient(to bottom, #3B3F54, #2ECC71)"/>
    <rect x="10" y="680" width="400" height="50" style="fill:linear-gradient(to bottom, #2ECC71, #87CEEB)"/>
    <rect x="10" y="820" width="400" height="50" style="fill:linear-gradient(to bottom, #87CEEB, #3B3F54)"/>
  </animate>
  <text x="10" y="10" font-size="32" font-family="Arial" text-anchor="start">MapReduce</text>
  <text x="10" y="390" font-size="24" font-family="Arial" text-anchor="start">Develop A Mapreduce Program To Find The Tags Ass</text>
  <text x="10" y="390" font-size="24" font-family="Arial" text-anchor="end">Animated educational SVG diagram for MapReduce program</text>
</svg>