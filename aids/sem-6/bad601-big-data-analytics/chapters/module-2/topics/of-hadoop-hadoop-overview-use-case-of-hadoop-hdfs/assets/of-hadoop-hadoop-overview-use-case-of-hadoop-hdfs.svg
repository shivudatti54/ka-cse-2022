<svg width="420" height="400" data-topic-id="hadoop-hadoop-overview-use-case-of-hadoop-hdfs" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-hind" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7D5E3"/>
      <stop offset="100%" stop-color="#A4D7E3"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-hind)"/>
  <g transform="translate(0, 50)">
    <path d="M 10 10 L 130 10" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 10 70 L 130 70" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 10 130 L 130 130" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 10 190 L 130 190" stroke="#3498db" stroke-width="2" fill="none"/>
    <circle cx="65" cy="50" r="30" fill="#3498db"/>
  </g>
  <g transform="translate(140, 50)">
    <path d="M 10 10 L 130 10" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M 10 70 L 130 70" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M 10 130 L 130 130" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M 10 190 L 130 190" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <circle cx="65" cy="50" r="30" fill="#e74c3c"/>
  </g>
  <g transform="translate(60, 50)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#2ecc71">What is Hadoop?</text>
    <text x="10" y="70" font-size="18" font-family="Arial" fill="#2ecc71">Hadoop is an open-source, distributed computing framework that enables the processing and analysis of large data sets across a cluster of computers.</text>
    <text x="10" y="130" font-size="18" font-family="Arial" fill="#2ecc71">It was created by Doug Cutting and Mike Cafarella and is now maintained by the Apache Software Foundation.</text>
    <text x="10" y="190" font-size="18" font-family="Arial" fill="#2ecc71">Hadoop is used for big data processing due to its ability to handle massive amounts of data and scale horizontally.</text>
  </g>
  <g transform="translate(260, 50)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#e74c3c">Hadoop Overview</text>
    <text x="10" y="70" font-size="18" font-family="Arial" fill="#e74c3c">Key Components:</text>
    <text x="10" y="130" font-size="18" font-family="Arial" fill="#e74c3c">Node: A single computer in the cluster</text>
    <text x="10" y="190" font-size="18" font-family="Arial" fill="#e74c3c">Cluster: A group of nodes working together</text>
  </g>
  <g transform="translate(170, 50)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#2ecc71">Use Case of Hadoop</text>
    <text x="10" y="130" font-size="18" font-family="Arial" fill="#2ecc71">Hadoop is particularly useful for processing unstructured and semi-structured data, such as logs, images, and videos.</text>
  </g>
  <g transform="translate(140, 50)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#3498db">HDFS (Hadoop Distributed File System)</text>
    <text x="10" y="130" font-size="18" font-family="Arial" fill="#3498db">Stores data in a distributed file system, allowing for scalability and flexibility.</text>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" from="0 50" to="0 100"/>
    <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" from="0 100" to="0 150"/>
    <animateTransform attributeName="transform" type="translate" begin="4s" dur="2s" from="0 150" to="0 200"/>
    <animateTransform attributeName="transform" type="translate" begin="6s" dur="2s" from="0 200" to="0 250"/>
    <animateTransform attributeName="transform" type="translate" begin="8s" dur="2s" from="0 250" to="0 300"/>
  </g>
  <g transform="translate(260, 50)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#e74c3c">HDFS Architecture</text>
    <text x="10" y="130" font-size="18" font-family="Arial" fill="#e74c3c">Node: A single computer in the cluster</text>
    <circle cx="65" cy="50" r="30" fill="#e74c3c"/>
  </g>
  <g transform="translate(170, 50)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#2ecc71">Processing Data with Hadoop</text>
    <text x="10" y="130" font-size="18" font-family="Arial" fill="#2ecc71">Hadoop is used for big data processing due to its ability to handle massive amounts of data and scale horizontally.</text>
  </g>
  <g transform="translate(140, 50)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#3498db">Managing Resources and Applications</text>
    <text x="10" y="130" font-size="18" font-family="Arial" fill="#3498db">Hadoop provides a flexible and scalable way to manage resources and applications.</text>
  </g>
  <g transform="translate(60, 250)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#2ecc71">Hadoop Architecture</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2ecc71">Node: A single computer in the cluster</text>
    <text x="10" y="90" font-size="18" font-family="Arial" fill="#2ecc71">Cluster: A group of nodes working together</text>
  </g>
  <g transform="translate(260, 250)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#e74c3c">HDFS Architecture</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#e74c3c">Node: A single computer in the cluster</text>
    <text x="10" y="90" font-size="18" font-family="Arial" fill="#e74c3c">Cluster: A group of nodes working together</text>
  </g>
  <g transform="translate(170, 250)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#2ecc71">Processing Data with Hadoop</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2ecc71">Hadoop is used for big data processing due to its ability to handle massive amounts of data and scale horizontally.</text>
  </g>
  <g transform="translate(140, 250)">
    <text x="10" y="10" font-size="20" font-family="Arial" fill="#3498db">Managing Resources and Applications</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#3498db">Hadoop provides a flexible and scalable way to manage resources and applications.</text>
  </g>
  <text x="210" y="390" font-size="20" font-family="Arial" fill="#2ecc71">Footer</text>
</svg>