<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="big-data-hadoop" xmlns="http://www.w3.org/2000/svg">
  <title>Big Data and Hadoop</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <rect width="100" height="50" rx="10" fill="#3498DB" data-narration="Big Data Definition"/>
    <rect x="120" width="100" height="50" rx="10" fill="#1ABC9C" data-narration="Big Data Characteristics"/>
    <rect x="240" width="100" height="50" rx="10" fill="#F1C40F" data-narration="Hadoop Definition"/>
    <rect x="360" width="100" height="50" rx="10" fill="#E74C3C" data-narration="Hadoop Key Features"/>
    <rect x="10" width="100" height="50" rx="10" fill="#2EC4B0" data-narration="Hadoop Components"/>
    <rect x="120" width="100" height="50" rx="10" fill="#F7DC6F" data-narration="Real-World Examples"/>
    <rect x="240" width="100" height="50" rx="10" fill="#E74C3C" data-narration="Why Hadoop?"/>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 380" dur="10s" begin="0s" repeatCount="indefinite"/>
  <text x="215" y="20" fill="#FFFFFF" font-size="18" text-anchor="middle">Big Data and Hadoop</text>
  <text x="10" y="390" fill="#FFFFFF" font-size="14" text-anchor="left">Footer</text>
  <g id="arrow-markers">
    <path d="M 20 100 L 100 20" fill="#2EC4B0" stroke="#2EC4B0" stroke-width="2"/>
    <path d="M 20 100 L 100 20" fill="#3498DB" stroke="#3498DB" stroke-width="2"/>
    <path d="M 20 100 L 100 20" fill="#1ABC9C" stroke="#1ABC9C" stroke-width="2"/>
