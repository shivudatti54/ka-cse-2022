    <path d="M 20 100 L 100 20" fill="#E74C3C" stroke="#E74C3C" stroke-width="2"/>
    <path d="M 120 100 L 200 20" fill="#2EC4B0" stroke="#2EC4B0" stroke-width="2"/>
    <path d="M 120 100 L 200 20" fill="#3498DB" stroke="#3498DB" stroke-width="2"/>
    <path d="M 120 100 L 200 20" fill="#1ABC9C" stroke="#1ABC9C" stroke-width="2"/>
    <path d="M 120 100 L 200 20" fill="#F1C40F" stroke="#F1C40F" stroke-width="2"/>
