<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="introduction-to-map-reduce-programming">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a67fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="380" height="360" fill="url(#gradient)"/>
  
  <g transform="translate(20, 30)">
    <rect x="0" y="0" width="100" height="20" fill="#f9f9f9" rx="5"/>
    <g id="title">
      <text x="50" y="10" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f" opacity="0.9">
        Introduction to Map Reduce Programming
      </text>
    </g>
    <g id="map-reduce-model">
      <text x="50" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
        Map Reduce Model
      </text>
      <rect x="0" y="0" width="100" height="20" fill="#f9f9f9" rx="5"/>
      <animateTransform attributeName="transform" type="rotate" from="0 50 20" to="60 50 20" dur="2s" begin="0s" repeatCount="indefinite"/>
      <g id="mapper">
        <rect x="0" y="0" width="50" height="20" fill="#f9f9f9" rx="5"/>
        <text x="10" y="5" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
          Mapper
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="2s" begin="0s" repeatCount="indefinite"/>
      </g>
      <g id="reducer">
        <rect x="0" y="0" width="50" height="20" fill="#f9f9f9" rx="5"/>
        <text x="10" y="5" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
          Reducer
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 60" dur="2s" begin="2s" repeatCount="indefinite"/>
      </g>
      <g id="combiner">
        <rect x="0" y="0" width="50" height="20" fill="#f9f9f9" rx="5"/>
        <text x="10" y="5" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
          Combiner
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 90" dur="2s" begin="4s" repeatCount="indefinite"/>
      </g>
      <g id="partitioner">
        <rect x="0" y="0" width="50" height="20" fill="#f9f9f9" rx="5"/>
        <text x="10" y="5" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f">
          Partitioner
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 120" dur="2s" begin="6s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>
  <g transform="translate(20, 370)">
    <rect x="0" y="0" width="380" height="30" fill="#f9f9f9" rx="5"/>
    <text x="50" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2f4f7f" opacity="0.9">
      Footer
    </text>
  </g>
</svg>