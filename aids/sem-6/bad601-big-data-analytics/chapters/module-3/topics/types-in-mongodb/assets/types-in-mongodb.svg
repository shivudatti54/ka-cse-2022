<svg width="420" height="400" data-topic-id="mongodb-types">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2A9C7" stop-opacity="1" />
      <stop offset="100%" stop-color="#8E9BC6" stop-opacity="1" />
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
        padding: 20px;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }
      .section:after {
        content: "";
        position: absolute;
        top: 10px;
        left: 10px;
        width: calc(100% - 20px);
        height: 1px;
        background-color: #ccc;
        transform: scaleX(0);
        transform-origin: bottom center;
        transition: transform 0.3s ease-in-out;
      }
      .section:hover:after {
        transform: scaleX(1);
      }
      .arrow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 10px;
        height: 20px;
        fill: #337ab7;
        pointer-events: none;
      }
      .arrow::before {
        content: "\25BC";
        font-size: 16px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(45deg);
      }
    </style>
  </defs>
  <title>MongoDB Types</title>
  <g transform="translate(10, 10)">
    <rect fill="url(#pastel-gradient)" width="400" height="370" />
    <rect x="10" y="10" width="100%" height="40" rx="10" fill="#337ab7" />
    <text x="50%" y="45%" font-size="24" font-weight="bold" text-anchor="middle" fill="#fff">MongoDB Types</text>
    <rect x="10" y="60" width="100%" height="30" rx="10" fill="#337ab7" />
    <text x="50%" y="75%" font-size="18" font-weight="normal" text-anchor="middle" fill="#fff">
      <tspan data-narration="Introduction">In MongoDB, a document is a JSON-like object that represents a single record or row in a database.</tspan>
      <tspan data-narration="Types of Data">Each document can contain various types of data, including strings, numbers, booleans, arrays, and more.</tspan>
    </text>
    <rect x="10" y="100" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(0deg)" begin="0s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Strings</text>
      <tspan data-narration="Definition">A sequence of characters enclosed in double quotes.</tspan>
      <tspan data-narration="Example">`"Hello, World!"`</tspan>
      <tspan data-narration="Usage">Strings are used to store text data.</tspan>
      <tspan data-narration="Types">Strings can be of different types, such as:</tspan>
      <tspan data-narration="Unicode strings">Unicode strings</tspan>
      <tspan data-narration="Binary strings">Binary strings</tspan>
      <tspan data-narration="UTF-8 strings">UTF-8 strings</tspan>
    </rect>
    <rect x="10" y="260" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(90deg)" begin="2s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Integers</text>
      <tspan data-narration="Definition">Whole numbers without decimal points.</tspan>
      <tspan data-narration="Example">`42`</tspan>
      <tspan data-narration="Usage">Integers are used to store whole numbers.</tspan>
      <tspan data-narration="Types">Integers can be of different types, such as:</tspan>
      <tspan data-narration="32-bit integers">32-bit integers</tspan>
      <tspan data-narration="64-bit integers">64-bit integers</tspan>
    </rect>
    <rect x="10" y="420" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(180deg)" begin="4s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Floats</text>
      <tspan data-narration="Definition">Numbers with decimal points.</tspan>
      <tspan data-narration="Example">`3.14`</tspan>
      <tspan data-narration="Usage">Floats are used to store decimal numbers.</tspan>
      <tspan data-narration="Types">Floats can be of different types, such as:</tspan>
      <tspan data-narration="Single-precision floats">Single-precision floats</tspan>
      <tspan data-narration="Double-precision floats">Double-precision floats</tspan>
    </rect>
    <rect x="10" y="490" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(270deg)" begin="6s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Booleans</text>
      <tspan data-narration="Definition">True or false values.</tspan>
      <tspan data-narration="Example">`true`</tspan>
      <tspan data-narration="Usage">Booleans are used to store true or false values.</tspan>
    </rect>
    <rect x="10" y="560" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(0deg)" begin="8s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Arrays</text>
      <tspan data-narration="Definition">Ordered collections of values.</tspan>
      <tspan data-narration="Example">`[1, 2, 3, 4, 5]`</tspan>
      <tspan data-narration="Usage">Arrays are used to store collections of values.</tspan>
      <tspan data-narration="Types">Arrays can be of different types, such as:</tspan>
      <tspan data-narration="Embedded arrays">Embedded arrays</tspan>
      <tspan data-narration="Referenced arrays">Referenced arrays</tspan>
    </rect>
    <rect x="10" y="620" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(90deg)" begin="10s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Null</text>
      <tspan data-narration="Definition">An empty value.</tspan>
      <tspan data-narration="Example">`null`</tspan>
      <tspan data-narration="Usage">Null is used to represent empty or missing values.</tspan>
    </rect>
    <rect x="10" y="690" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(180deg)" begin="12s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Date</text>
      <tspan data-narration="Definition">A value representing a date.</tspan>
      <tspan data-narration="Example">`ISODate("2022-01-01T00:00:00.000Z")`</tspan>
      <tspan data-narration="Usage">Dates are used to store dates and timestamps.</tspan>
    </rect>
    <rect x="10" y="760" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(270deg)" begin="14s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Binary Data</text>
      <tspan data-narration="Definition">Binary data, such as images or audio files.</tspan>
      <tspan data-narration="Example">`binary data`</tspan>
      <tspan data-narration="Usage">Binary data is used to store binary data.</tspan>
    </rect>
    <rect x="10" y="830" width="100%" height="150" rx="10" fill="#fff" class="section">
      <animate transform="rotate(0deg)" begin="16s" dur="2s" repeatCount="indefinite" />
      <text x="50%" y="80%" font-size="18" font-weight="normal" text-anchor="middle" fill="#337ab7">Embedded Documents</text>
      <tspan data-narration="Definition">Documents embedded within other documents.</tspan>
      <tspan data-narration="Example">`{ name: "John", age: 30 }`</tspan>
      <tspan data-narration="Usage">Embedded documents are used to store complex data structures.</tspan>
    </rect>
    <g>
      <text x="10" y="10" font-size="12" font-weight="normal" text-anchor="bottom" fill="#337ab7">Data Topic ID: mongodb-types</text>
      <text x="10" y="10" font-size="12" font-weight="normal" text-anchor="bottom" fill="#337ab7">Version: 1</text>
    </g>
    <g>
      <text x="10" y="380" font-size="12" font-weight="normal" text-anchor="bottom" fill="#337ab7">Powered by Logo</text>
    </g>
  </g>
</svg>