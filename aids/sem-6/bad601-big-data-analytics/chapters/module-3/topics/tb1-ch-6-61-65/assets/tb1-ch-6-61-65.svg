<svg width="420" height="400" data-topic-id="Tb1-Ch-6-61-65" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#65aca9"/>
      <stop offset="100%" stop-color="#83e2ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)"/>
  <g id=" scene">
    <rect x="0" y="50" width="420" height="300" fill="#fff" rx="10"/>
    <g id="title">
      <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="left" fill="#2f4f7f">Big Data Analytics: Introduction to MongoDB</text>
    </g>
    <g id="sections">
      <g id="section-61">
        <rect x="0" y="150" width="420" height="100" fill="#fff" rx="10"/>
        <rect x="0" y="150" width="420" height="100" transform="rotate(90 210 150)"/>
        <g id="section-61-data-narration">
          < animate xmlns="http://www.w3.org/2000/svg" begin="0s" duration="2s" repeat-count="indefinite">
            <text x="20" y="200" font-size="16" font-family="Arial" text-anchor="left" fill="#2f4f7f">MongoDB is a NoSQL, document-based database management system.</text>
            <text x="20" y="220" font-size="16" font-family="Arial" text-anchor="left" fill="#2f4f7f">It was created by Hammer and co-founders in 2009 and is now a part of the MongoDB, Inc. company.</text>
          </animate>
        </g>
        <g id="section-61-terms">
          <rect x="0" y="250" width="420" height="50" fill="#fff" rx="10"/>
          <g id="rdbms-terms">
            <rect x="0" y="250" width="80" height="40" fill="#fff" rx="5" transform="rotate(0 40 250)"/>
            <animate xmlns="http://www.w3.org/2000/svg" begin="0s" duration="2s" repeat-count="indefinite">
              <text x="10" y="280" font-size="14" font-family="Arial" text-anchor="left" fill="#2f4f7f">Schema: A predefined structure for data storage.</text>
              <text x="10" y="300" font-size="14" font-family="Arial" text-anchor="left" fill="#2f4f7f">Table: A collection of related data stored in rows and columns.</text>
            </animate>
          </g>
          <g id="mongodb-terms">
            <rect x="120" y="250" width="80" height="40" fill="#fff" rx="5" transform="rotate(0 120 250)"/>
            <animate xmlns="http://www.w3.org/2000/svg" begin="0s" duration="2s" repeat-count="indefinite">
              <text x="130" y="280" font-size="14" font-family="Arial" text-anchor="left" fill="#2f4f7f">Collection: Similar to a table in RDBMS, but MongoDB uses the term "collection" instead.</text>
              <text x="130" y="300" font-size="14" font-family="Arial" text-anchor="left" fill="#2f4f7f">Document: A single unit of data.</text>
            </animate>
          </g>
        </g>
        <g id="section-61-benefits">
          <rect x="0" y="350" width="420" height="50" fill="#fff" rx="10"/>
          <animate xmlns="http://www.w3.org/2000/svg" begin="0s" duration="2s" repeat-count="indefinite">
            <text x="20" y="380" font-size="16" font-family="Arial" text-anchor="left" fill="#2f4f7f">Improved data flexibility: MongoDB's flexible data model allows for easy adaptation to changing data requirements.</text>
            <text x="20" y="400" font-size="16" font-family="Arial" text-anchor="left" fill="#2f4f7f">Increased scalability: MongoDB's horizontal scaling capability allows for easy handling of large amounts of data.</text>
          </animate>
        </g>
      </g>
      <g id="section-62">
        <rect x="0" y="150" width="420" height="100" fill="#fff" rx="10"/>
        <rect x="0" y="150" width="420" height="100" transform="rotate(90 210 150)"/>
        <g id="section-62-data-narration">
          <animate xmlns="http://www.w3.org/2000/svg" begin="0s" duration="2s" repeat-count="indefinite">
            <text x="20" y="200" font-size="16" font-family="Arial" text-anchor="left" fill="#2f4f7f">MongoDB is chosen for several reasons:</text>
            <text x="20" y="220" font-size="16" font-family="Arial" text-anchor="left" fill="#2f4f7f">Handling large amounts of data: MongoDB is designed to handle large amounts of data and scale horizontally.</text>
          </animate>
        </g>
        <g id="section-62-terms">
          <rect x="0" y="250" width="420" height="50" fill="#fff" rx="10"/>
          <g id="rdbms-terms">
