<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="typical-data-warehouse-and-hadoop-environment" data-slugified-topic-name="Typical Data Warehouse and Hadoop Environment">
  <style>
    /* Add gradient background with pastel colors */
    body {
      background-color: #C7E8F5;
      background-image: linear-gradient(to bottom, #87CEEB, #ADD8E6);
    }
  </style>
  
  <!-- Create a title at the top -->
  <rect x="10" y="10" width="400" height="30" fill="#87CEEB" rx="10"></rect>
  <text x="15" y="25" text-anchor="start" font-size="16" fill="#000" font-family="Arial">Typical Data Warehouse and Hadoop Environment</text>
  
  <!-- Section 1: Data Warehouse -->
  <rect x="10" y="50" width="400" height="100" fill="#ADD8E6" rx="10"></rect>
  <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0" repeatCount="indefinite"></animate>
  <text x="15" y="60" text-anchor="start" font-size="14" fill="#000" font-family="Arial">Data Warehouse</text>
  <text x="15" y="80" text-anchor="start" font-size="12" fill="#000" font-family="Arial" data-narration> Centralized, Integrated, Time-variant, Non-volatile</text>
  <rect x="15" y="90" width="50" height="20" fill="#000" rx="5"></rect>
  <text x="65" y="90" text-anchor="start" font-size="12" fill="#000" font-family="Arial" text-decoration="underline">Oracle Exadata, Microsoft SQL Server Analysis Services, IBM Cognos</text>
  
  <!-- Section 2: Hadoop Environment -->
  <rect x="10" y="170" width="400" height="100" fill="#87CEEB" rx="10"></rect>
  <animate attributeName="opacity" begin="2s" dur="2s" from="0" to="1" repeatCount="indefinite"></animate>
  <text x="15" y="180" text-anchor="start" font-size="14" fill="#000" font-family="Arial">Hadoop Environment</text>
  <text x="15" y="200" text-anchor="start" font-size="12" fill="#000" font-family="Arial" data-narration> Distributed, Big Data, Parallel Processing, Flexible</text>
  <rect x="15" y="210" width="50" height="20" fill="#000" rx="5"></rect>
  <text x="65" y="210" text-anchor="start" font-size="12" fill="#000" font-family="Arial" text-decoration="underline">Hadoop Distributed File System (HDFS), Apache HBase, Apache Spark</text>
  
  <!-- Section 3: Comparison -->
  <rect x="10" y="290" width="400" height="100" fill="#ADD8E6" rx="10"></rect>
  <animate attributeName="opacity" begin="4s" dur="2s" from="0" to="1" repeatCount="indefinite"></animate>
  <text x="15" y="300" text-anchor="start" font-size="14" fill="#000" font-family="Arial">Comparison</text>
  <rect x="15" y="310" width="50" height="20" fill="#000" rx="5"></rect>
  <text x="65" y="310" text-anchor="start" font-size="12" fill="#000" font-family="Arial" text-decoration="underline">
    |                      | Data Warehouse             | Hadoop Environment                                                          |
  | --------------------------------------- | -------------------------------- | ---------------------------------------------- |
  | Characteristics                | Centralized, Integrated, Time-variant, Non-volatile | Distributed, Big Data, Parallel Processing, Flexible |
  | Examples                       | Oracle Exadata, Microsoft SQL Server Analysis Services, IBM Cognos | Hadoop Distributed File System (HDFS), Apache HBase, Apache Spark |
  </text>
  
  <!-- Section 4: Benefits -->
  <rect x="10" y="400" width="400" height="100" fill="#87CEEB" rx="10"></rect>
  <animate attributeName="opacity" begin="6s" dur="2s" from="0" to="1" repeatCount="indefinite"></animate>
  <text x="15" y="410" text-anchor="start" font-size="14" fill="#000" font-family="Arial">Benefits</text>
  <text x="15" y="430" text-anchor="start" font-size="12" fill="#000" font-family="Arial" data-narration> Improved data management, Enhanced analytics, Increased scalability</text>
  <rect x="15" y="440" width="50" height="20" fill="#000" rx="5"></rect>
  <text x="65" y="440" text-anchor="start" font-size="12" fill="#000" font-family="Arial" text-decoration="underline">Data integration, Data warehousing, Business intelligence</text>
  
  <!-- Footer at the bottom -->
  <rect x="10" y="490" width="400" height="30" fill="#ADD8E6" rx="10"></rect>
  <text x="15" y="500" text-anchor="start" font-size="14" fill="#000" font-family="Arial">Data-Science-101.com</text>
</svg>