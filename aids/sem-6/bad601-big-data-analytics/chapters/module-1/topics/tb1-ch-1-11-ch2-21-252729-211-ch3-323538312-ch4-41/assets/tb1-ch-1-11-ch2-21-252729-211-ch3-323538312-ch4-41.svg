<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient">
      <stop offset="0%" stop-color="#C7D2F2"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="20" y="20" font-size="24" font-family="Open Sans" text-anchor="start">
    Big Data Analytics
  </text>
  
  <!-- Section 1: Characteristics of Big Data -->
  <rect x="10" y="60" width="200" height="60" fill="#F7F7F7" rx="10"/>
  <animateTransform attributeName="transform" type="translate" from="0,60" to="0,70" dur="2s" begin="0s"/>
  <text x="20" y="70" font-size="18" font-family="Open Sans" text-anchor="start" data-narration="Characteristics of Big Data">
    Volume, Velocity, Variety, Veracity, Value
  </text>
  <line x1="20" y1="80" x2="200" y2="80" stroke="#3498DB" stroke-width="2"/>
  <line x1="20" y1="80" x2="20" y2="120" stroke="#3498DB" stroke-width="2"/>
  <text x="20" y="120" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Volume: Large amount of data, Velocity: High speed of data generation and consumption, Variety: Different types of data, Veracity: Uncertainty and variability in data quality, Value: Potential to extract valuable insights"/>
  
  <!-- Section 2: Classification of Big Data -->
  <rect x="230" y="60" width="200" height="60" fill="#F7F7F7" rx="10"/>
  <animateTransform attributeName="transform" type="translate" from="0,60" to="0,70" dur="2s" begin="2s"/>
  <text x="240" y="70" font-size="18" font-family="Open Sans" text-anchor="start" data-narration="Classification of Big Data">
    Structured, Semi-Structured, Unstructured, Sensed, Social
  </text>
  <line x1="240" y1="80" x2="440" y2="80" stroke="#3498DB" stroke-width="2"/>
  <line x1="240" y1="80" x2="240" y2="120" stroke="#3498DB" stroke-width="2"/>
  <line x1="240" y1="80" x2="280" y2="120" stroke="#3498DB" stroke-width="2"/>
  <text x="240" y="120" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Structured Data: Organized and formatted data, Semi-Structured Data: Partially organized data, Unstructured Data: Unorganized and unformatted data, Sensed Data: Data from sensors and IoT devices, Social Data: Data from social media and online interactions"/>
  <text x="20" y="140" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Types of Big Data: Relational, Document-Oriented, Key-Value, Column-Oriented, Graph Data"/>
  
  <!-- Section 3: Big Data Sources -->
  <rect x="10" y="200" width="400" height="120" fill="#F7F7F7" rx="10"/>
  <animateTransform attributeName="transform" type="translate" from="0,200" to="0,220" dur="2s" begin="4s"/>
  <text x="20" y="210" font-size="18" font-family="Open Sans" text-anchor="start" data-narration="Big Data Sources">
    Log Files, Sensor Data, Social Media, Transactional Data, IoT Data
  </text>
  <line x1="20" y1="220" x2="400" y2="220" stroke="#3498DB" stroke-width="2"/>
  <line x1="20" y1="220" x2="20" y2="260" stroke="#3498DB" stroke-width="2"/>
  <line x1="20" y1="220" x2="280" y2="260" stroke="#3498DB" stroke-width="2"/>
  <text x="20" y="260" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Log Files: Data from application logs, server logs, and network logs, Sensor Data: Data from sensors, IoT devices, and wearables, Social Media: Data from social media platforms, online interactions, and community forums, Transactional Data: Data from e-commerce websites, online stores, and financial transactions, IoT Data: Data from Internet of Things devices, smart homes, and smart cities"/>
  
  <!-- Section 4: Big Data Venues -->
  <rect x="10" y="340" width="400" height="60" fill="#F7F7F7" rx="10"/>
  <animateTransform attributeName="transform" type="translate" from="0,340" to="0,360" dur="2s" begin="6s"/>
  <text x="20" y="350" font-size="18" font-family="Open Sans" text-anchor="start" data-narration="Big Data Venues">
    Big Data Platforms, Data Warehousing, NoSQL Databases, Cloud Storage
  </text>
  <line x1="20" y1="360" x2="400" y2="360" stroke="#3498DB" stroke-width="2"/>
  <line x1="20" y1="360" x2="20" y2="400" stroke="#3498DB" stroke-width="2"/>
  <text x="20" y="400" font-size="16" font-family="Open Sans" text-anchor="start" data-narration="Big Data Platforms: Tools and technologies used to process, store, and analyze big data, Data Warehousing: A centralized repository for storing and managing data, NoSQL Databases: Database systems designed to handle large amounts of unstructured data, Cloud Storage: Online storage services used to store and manage data in the cloud"/>
  
  <!-- Arrow markers -->
  <path d="M 200 80 L 240 80 L 240 120 L 200 120 Z" stroke="#3498DB" stroke-width="2"/>
  <path d="M 240 80 L 280 80 L 280 120 L 240 120 Z" stroke="#3498DB" stroke-width="2"/>
  <path d="M 20 120 L 20 200 L 240 200 L 240 120 Z" stroke="#3498DB" stroke-width="2"/>
  <path d="M 280 120 L 320 120 L 320 200 L 280 200 Z" stroke="#3498DB" stroke-width="2"/>
</svg>