<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="150%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="200%" stop-color="#FFA07A" stop-opacity="1"/>
      <stop offset="250%" stop-color="#FFA07A" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="350" fill="url(#pastel-gradient)"/>
  <text x="10" y="10" font-size="24" font-family="Arial" fill="#000000">Topic Title</text>
  <text x="10" y="50" font-size="18" font-family="Arial" fill="#000000">Data Topic ID: [slugified topic name]</text>
  <g id="section-1">
    <rect x="50" y="100" width="200" height="50" fill="#FFA07A" rx="10" />
    <text x="70" y="120" font-size="18" font-family="Arial" fill="#000000">Section 1 Title</text>
    <text x="70" y="140" font-size="14" font-family="Arial" fill="#000000">Section 1 Description</text>
  </g>
  <g id="section-2">
    <rect x="280" y="100" width="200" height="50" fill="#87CEEB" rx="10" />
    <text x="290" y="120" font-size="18" font-family="Arial" fill="#000000">Section 2 Title</text>
    <text x="290" y="140" font-size="14" font-family="Arial" fill="#000000">Section 2 Description</text>
  </g>
  <g id="section-3">
    <rect x="50" y="250" width="200" height="50" fill="#C7B8EA" rx="10" />
    <text x="70" y="270" font-size="18" font-family="Arial" fill="#000000">Section 3 Title</text>
    <text x="70" y="290" font-size="14" font-family="Arial" fill="#000000">Section 3 Description</text>
  </g>
  <g id="section-4">
    <rect x="280" y="250" width="200" height="50" fill="#C7B8EA" rx="10" />
    <text x="290" y="270" font-size="18" font-family="Arial" fill="#000000">Section 4 Title</text>
    <text x="290" y="290" font-size="14" font-family="Arial" fill="#000000">Section 4 Description</text>
  </g>
  <g id="section-5">
    <rect x="50" y="350" width="200" height="50" fill="#87CEEB" rx="10" />
    <text x="70" y="370" font-size="18" font-family="Arial" fill="#000000">Section 5 Title</text>
    <text x="70" y="390" font-size="14" font-family="Arial" fill="#000000">Section 5 Description</text>
  </g>
  <g id="section-6">
    <rect x="280" y="350" width="200" height="50" fill="#87CEEB" rx="10" />
    <text x="290" y="370" font-size="18" font-family="Arial" fill="#000000">Section 6 Title</text>
    <text x="290" y="390" font-size="14" font-family="Arial" fill="#000000">Section 6 Description</text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="400 0" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" repeatCount="indefinite"/>
  <text x="10" y="400" font-size="24" font-family="Arial" fill="#000000">Narration</text>
  <text x="10" y="420" font-size="18" font-family="Arial" fill="#000000">Data Topic ID: [slugified topic name]</text>
  <circle cx="400" cy="350" r="20" fill="#FFA07A" />
  <line x1="400" y1="350" x2="420" y2="370" stroke="#FFA07A" stroke-width="2" />
  <line x1="400" y1="370" x2="420" y2="350" stroke="#FFA07A" stroke-width="2" />
  <title>Topic Title</title>
  <footer>Footer</footer>
</svg>