<svg width="420" height="400" data-topic-id="ch10-101-1015" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a288a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c8abc" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Chapter 10: Introduction to Hive</title>
  <rect x="10" y="10" width="400" height="350" fill="url(#gradient)"/>
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" begin="0s" dur="2s" from="1" to="0"/>
  <g id="metastore" transform="translate(10, 50)">
    <rect x="0" y="0" width="200" height="50" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate transform="rotate(0 100 100)" attributeName="transform" begin="0s" dur="2s" from="rotate(0 100 100)" to="rotate(360 100 100)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#333">Hive Metastore</text>
    <animate attributeName="opacity" begin="0.5s" dur="1s" from="1" to="0"/>
    <text x="120" y="15" font-size="16" font-family="Arial" fill="#333">Responsible for storing and managing metadata about Hadoop data</text>
    <animate attributeName="opacity" begin="1.5s" dur="1s" from="1" to="0"/>
  </g>
  <g id="query-compiler" transform="translate(10, 70)">
    <rect x="0" y="0" width="200" height="50" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate transform="rotate(0 100 100)" attributeName="transform" begin="0s" dur="2s" from="rotate(0 100 100)" to="rotate(360 100 100)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#333">Hive Query Compiler</text>
    <animate attributeName="opacity" begin="0.5s" dur="1s" from="1" to="0"/>
    <text x="120" y="15" font-size="16" font-family="Arial" fill="#333">Compiles HiveQL queries into MapReduce jobs</text>
    <animate attributeName="opacity" begin="1.5s" dur="1s" from="1" to="0"/>
  </g>
  <g id="execution-engine" transform="translate(10, 130)">
    <rect x="0" y="0" width="200" height="50" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate transform="rotate(0 100 100)" attributeName="transform" begin="0s" dur="2s" from="rotate(0 100 100)" to="rotate(360 100 100)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#333">Hive Execution Engine</text>
    <animate attributeName="opacity" begin="0.5s" dur="1s" from="1" to="0"/>
    <text x="120" y="15" font-size="16" font-family="Arial" fill="#333">Executes MapReduce jobs and manages data processing</text>
    <animate attributeName="opacity" begin="1.5s" dur="1s" from="1" to="0"/>
  </g>
  <g id="client" transform="translate(10, 180)">
    <rect x="0" y="0" width="200" height="50" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate transform="rotate(0 100 100)" attributeName="transform" begin="0s" dur="2s" from="rotate(0 100 100)" to="rotate(360 100 100)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#333">Hive Client</text>
    <animate attributeName="opacity" begin="0.5s" dur="1s" from="1" to="0"/>
    <text x="120" y="15" font-size="16" font-family="Arial" fill="#333">Provides a user interface for interacting with Hive</text>
    <animate attributeName="opacity" begin="1.5s" dur="1s" from="1" to="0"/>
  </g>
  <g id="data-types">
    <rect x="10" y="10" width="200" height="40" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate transform="translate(10, 60)" attributeName="transform" begin="0s" dur="2s" from="translate(10, 60)" to="translate(10, 100)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#333">Hive Data Types</text>
    <animate attributeName="opacity" begin="0.5s" dur="1s" from="1" to="0"/>
    <rect x="10" y="30" width="100" height="15" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate attributeName="opacity" begin="0.5s" dur="0.5s" from="1" to="0"/>
    <text x="120" y="30" font-size="16" font-family="Arial" fill="#333">Int: integer type</text>
    <animate attributeName="opacity" begin="1s" dur="0.5s" from="1" to="0"/>
    <rect x="220" y="30" width="100" height="15" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate attributeName="opacity" begin="1.5s" dur="0.5s" from="1" to="0"/>
    <text x="320" y="30" font-size="16" font-family="Arial" fill="#333">Array: array type</text>
    <animate attributeName="opacity" begin="2s" dur="0.5s" from="1" to="0"/>
  </g>
  <g id="file-formats">
    <rect x="10" y="60" width="200" height="40" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate transform="translate(10, 110)" attributeName="transform" begin="0s" dur="2s" from="translate(10, 110)" to="translate(10, 150)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#333">Hive File Formats</text>
    <animate attributeName="opacity" begin="0.5s" dur="1s" from="1" to="0"/>
    <rect x="10" y="30" width="100" height="15" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate attributeName="opacity" begin="0.5s" dur="0.5s" from="1" to="0"/>
    <text x="120" y="30" font-size="16" font-family="Arial" fill="#333">Text: plain text files</text>
    <animate attributeName="opacity" begin="1s" dur="0.5s" from="1" to="0"/>
    <rect x="220" y="30" width="100" height="15" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate attributeName="opacity" begin="1.5s" dur="0.5s" from="1" to="0"/>
    <text x="320" y="30" font-size="16" font-family="Arial" fill="#333">Parquet: columnar storage format</text>
    <animate attributeName="opacity" begin="2s" dur="0.5s" from="1" to="0"/>
  </g>
  <g id="query-language">
    <rect x="10" y="110" width="200" height="40" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate transform="translate(10, 160)" attributeName="transform" begin="0s" dur="2s" from="translate(10, 160)" to="translate(10, 200)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#333">Hive Query Language (HiveQL)</text>
    <animate attributeName="opacity" begin="0.5s" dur="1s" from="1" to="0"/>
    <rect x="10" y="30" width="100" height="15" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate attributeName="opacity" begin="0.5s" dur="0.5s" from="1" to="0"/>
    <text x="120" y="30" font-size="16" font-family="Arial" fill="#333">SELECT: retrieves data from a table</text>
    <animate attributeName="opacity" begin="1s" dur="0.5s" from="1" to="0"/>
    <rect x="220" y="30" width="100" height="15" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <animate attributeName="opacity" begin="1.5s" dur="0.5s" from="1" to="0"/>
    <text x="320" y="30" font-size="16" font-family="Arial" fill="#333">INSERT: inserts data into a table</text>
    <animate attributeName="opacity" begin="2s" dur="0.5s" from="1" to="0"/>
  </g>
  <g id="footer">
    <rect x="10" y="330" width="400" height="50" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
    <text x="10" y="35" font-size="16" font-family="Arial" fill="#333">Chapter 10: Introduction to Hive</text>
  </g>
</svg>