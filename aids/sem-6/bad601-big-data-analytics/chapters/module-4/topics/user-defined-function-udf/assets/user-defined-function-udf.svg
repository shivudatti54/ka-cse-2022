      filter: progid:DXImageTransform.Microsoft.Gradient(StartColor='#C9E4CA', EndColor='#ADD8E6');
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <body>
    <!-- Title -->
    <text x="50%" y="50%" text-anchor="middle" font-size="24" class="title">User Defined Function (UDF)</text>
    <rect x="20%" y="20%" width="60%" height="10%" class="gradient" />
    <animate transform="rotate(360 50% 50%)" begin="0s" dur="10s" repeatCount="indefinite" />
    <!-- Introduction -->
    <section data-narration="Introduction">
      <rect x="20%" y="60%" width="60%" height="100%" class="gradient" />
      <animate transform="rotate(360 50% 50%" begin="0s" dur="10s" repeatCount="indefinite" />
      <text x="50%" y="40%" text-anchor="middle" font-size="18" class="subheading">In Hive, a User Defined Function (UDF) is a custom function that can be used to perform a specific task or operation on data.</text>
      <text x="50%" y="70%" text-anchor="middle" font-size="18" class="subheading">UDFs are defined by users and can be used to extend the functionality of Hive.</text>
    </section>
    <!-- How to Create a UDF -->
    <section data-narration="How to Create a UDF">
      <rect x="20%" y="120%" width="60%" height="100%" class="gradient" />
      <animate transform="rotate(360 50% 50%" begin="0s" dur="10s" repeatCount="indefinite" />
      <text x="50%" y="90%" text-anchor="middle" font-size="18" class="subheading">To create a UDF in Hive, you need to write a Java class that implements the `org.apache.hadoop.hive.ql.exec.UDF` interface.</text>
      <text x="50%" y="110%" text-anchor="middle" font-size="18" class="subheading">The class should have a single method that takes one or more input parameters and returns a single output value.</text>
    </section>
    <!-- Example of a Simple UDF -->
    <section data-narration="Example of a Simple UDF">
      <rect x="20%" y="180%" width="60%" height="100%" class="gradient" />
      <animate transform="rotate(360 50% 50%" begin="0s" dur="10s" repeatCount="indefinite" />
      <text x="50%" y="150%" text-anchor="middle" font-size="18" class="subheading">```java
import org.apache.hadoop.hive.ql.exec.UDF;
import org.apache.hadoop.io.StringByteynomials;

public class HelloWorldUDF extends UDF {
    public String evaluate(String str) throws IOException {
        return "Hello, " + str;
    }
}
```
      <text x="50%" y="170%" text-anchor="middle" font-size="18" class="subheading">To register this UDF in Hive, you need to create a `hive-site.xml` file with the following content:</text>
      <text x="50%" y="190%" text-anchor="middle" font-size="18" class="subheading">```xml
<property>
    <name>hive.user-defined.function.java.scripts</name>
    <value>path/to/HelloWorldUDF.class</value>
</property>
```
    </section>
    <!-- Types of UDFs -->
    <section data-narration="Types of UDFs">
      <rect x="20%" y="240%" width="60%" height="100%" class="gradient" />
      <animate transform="rotate(360 50% 50%" begin="0s" dur="10s" repeatCount="indefinite" />
      <text x="50%" y="210%" text-anchor="middle" font-size="18" class="subheading">There are two types of UDFs in Hive:</text>
      <text x="50%" y="230%" text-anchor="middle" font-size="18" class="subheading">- **Standard UDFs**: These are the basic UDFs that are registered with Hive and can be used in queries.</text>
      <text x="50%" y="240%" text-anchor="middle" font-size="18" class="subheading">- **Custom UDFs**: These are UDFs that are defined by users and can be registered with Hive.</text>
    </section>
    <!-- UDF Registration -->
    <section data-narration="UDF Registration">
      <rect x="20%" y="300%" width="60%" height="100%" class="gradient" />
      <animate transform="rotate(360 50% 50%" begin="0s" dur="10s" repeatCount="indefinite" />
      <text x="50%" y="270%" text-anchor="middle" font-size="18" class="subheading">To register a UDF with Hive, you need to create a `hive-site.xml` file with the following content:</text>
      <text x="50%" y="290%" text-anchor="middle" font-size="18" class="subheading">```xml
<property>
    <name>hive.user-defined.function.java.scripts</name>
    <value>path/to/HelloWorldUDF.class</value>
</property>
```
    </section>
    <!-- Using UDFs in Hive Queries -->
    <section data-narration="Using UDFs in Hive Queries">
      <rect x="20%" y="360%" width="60%" height="100%" class="gradient" />
      <animate transform="rotate(360 50% 50%" begin="0s" dur="10s" repeatCount="indefinite" />
      <text x="50%" y="330%" text-anchor="middle" font-size="18" class="subheading">Once a UDF is registered with Hive, it can be used in Hive queries.</text>
      <text x="50%" y="340%" text-anchor="middle" font-size="18" class="subheading">The UDF is invoked by surround</text>
    </section>
    <!-- Footer -->
    <text x="50%" y="400%" text-anchor="middle" font-size="18" class="footer">User Defined Function (UDF)</text>
  </body>
</svg>