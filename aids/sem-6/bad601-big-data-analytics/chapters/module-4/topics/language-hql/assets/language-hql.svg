<svg width="420" height="400" data-topic-id="language-hql" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" version="1.1">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  
  <!-- Section 1: Introduction -->
  <rect x="20" y="20" width="380" height="100" fill="#2E4053" data-narration="Introduction to HQL"/>
  <text x="50" y="60" font-size="24" fill="#fff">Language (HQL)</text>
  <animateTransform attributeName="transform" type="rotate" from="0 50 60" to="360 50 60" dur="5000" repeatCount="indefinite"/>
  
  <!-- Section 2: Key Features -->
  <rect x="20" y="140" width="380" height="200" fill="#2E4053" data-narration="Key Features of HQL"/>
  <text x="50" y="160" font-size="18" fill="#fff">Key Features</text>
  <text x="50" y="220" font-size="18" fill="#fff">SQL-like syntax</text>
  <text x="50" y="280" font-size="18" fill="#fff">Data manipulation</text>
  <animateTransform attributeName="transform" type="translateY" from="0 140" to="0 220" dur="2000" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translateY" from="0 280" to="0 340" dur="2000" repeatCount="indefinite"/>
  
  <!-- Section 3: Basic Syntax -->
  <rect x="20" y="320" width="380" height="200" fill="#2E4053" data-narration="Basic Syntax of HQL"/>
  <text x="50" y="340" font-size="18" fill="#fff">Basic Syntax</text>
  <text x="50" y="360" font-size="18" fill="#fff">CREATE TABLE</text>
  <text x="50" y="380" font-size="18" fill="#fff">SELECT</text>
  <animateTransform attributeName="transform" type="translateY" from="0 320" to="0 360" dur="2000" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translateY" from="0 380" to="0 420" dur="2000" repeatCount="indefinite"/>
  
  <!-- Section 4: Data Types -->
  <rect x="20" y="140" width="380" height="200" fill="#2E4053" data-narration="Data Types in HQL"/>
  <text x="50" y="160" font-size="18" fill="#fff">Data Types</text>
  <text x="50" y="220" font-size="18" fill="#fff">String</text>
  <text x="50" y="280" font-size="18" fill="#fff">Int</text>
  <animateTransform attributeName="transform" type="translateY" from="0 140" to="0 160" dur="2000" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translateY" from="0 280" to="0 220" dur="2000" repeatCount="indefinite"/>
  
  <!-- Section 5: Hive File Formats -->
  <rect x="20" y="320" width="380" height="200" fill="#2E4053" data-narration="Hive File Formats"/>
  <text x="50" y="340" font-size="18" fill="#fff">Hive File Formats</text>
  <text x="50" y="360" font-size="18" fill="#fff">Text files</text>
  <text x="50" y="380" font-size="18" fill="#fff">Parquet files</text>
  <animateTransform attributeName="transform" type="translateY" from="0 320" to="0 340" dur="2000" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translateY" from="0 380" to="0 360" dur="2000" repeatCount="indefinite"/>
  
  <!-- Section 6: Hive Query -->
  <rect x="20" y="140" width="380" height="200" fill="#2E4053" data-narration="Hive Query"/>
  <text x="50" y="160" font-size="18" fill="#fff">Hive Query</text>
  <text x="50" y="220" font-size="18" fill="#fff">SELECT statement</text>
  <text x="50" y="280" font-size="18" fill="#fff">FROM clause</text>
  <animateTransform attributeName="transform" type="translateY" from="0 140" to="0 160" dur="2000" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translateY" from="0 280" to="0 220" dur="2000" repeatCount="indefinite"/>
  
  <!-- Title and Footer -->
  <text x="50" y="10" font-size="36" fill="#fff">Language (HQL)</text>
  <text x="50" y="390" font-size="18" fill="#fff">Data Topic</text>
  <text x="20" y="20" font-size="12" fill="#fff">Arrow markers for connections</text>
  <text x="20" y="320" font-size="12" fill="#fff">Smooth animations using <animate> elements with sequential begin times</text>
  <text x="20" y="340" font-size="12" fill="#fff">Clear labels and annotations</text>
  <text x="20" y="400" font-size="12" fill="#fff">Color scheme (indigo, teal, orange accents)</text>
</svg>