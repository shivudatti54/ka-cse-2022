  <title class="title">TB1 Ch 9 91 96</title>
  <text x="210" y="20" class="data-narration">Hive is a data warehousing and SQL-like query language for Hadoop, a popular open-source big data processing framework.</text>
  <text x="210" y="70" class="data-narration">Hive provides a way to store and manage large datasets in a structured format, making it easier to analyze and extract insights.</text>
  <text x="210" y="130" class="data-narration">Hive supports SQL-like queries, manages large datasets, provides data warehousing capabilities, and integrates with the Hadoop ecosystem.</text>
  <text x="210" y="240" class="data-narration">The Hive architecture consists of the Hive Metastore, Hive Query Compiler, Hive Query Optimizer, and Hive Execution Engine.</text>
  <text x="210" y="350" class="data-narration">Hive supports various data types, including integer, string, date, and timestamp.</text>
