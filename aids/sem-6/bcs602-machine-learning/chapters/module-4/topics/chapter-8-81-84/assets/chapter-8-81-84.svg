<svg width="420" height="400" data-topic-id="bayesian-learning-8-1-8-4">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF9800" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" fill="url(#grad)" rx="20"/>
  <text x="20" y="50" font-size="24" font-family="Arial" text-anchor="middle">Bayesian Learning</text>
  <rect x="10" y="80" width="400" height="180" fill="url(#grad2)" rx="20"/>
  <text x="20" y="110" font-size="18" font-family="Arial" text-anchor="middle">Introduction to Probability-based Learning</text>
  <section data-narration="P(A|B) = P(B|A) * P(A) / P(B)">
    <rect x="10" y="140" width="350" height="50" fill="#87CEEB" rx="10"/>
    <rect x="10" y="150" width="350" height="50" fill="#C7B8EA" rx="10"/>
    <text x="20" y="160" font-size="18" font-family="Arial" text-anchor="middle">Bayes Theorem Formula:</text>
    <animate transform="scale(1.1)" begin="200ms" dur="500ms" repeatCount="indefinite"/>
    <text x="20" y="180" font-size="18" font-family="Arial" text-anchor="middle">P(A|B) = P(B|A) * P(A) / P(B)</text>
  </section>
  <section data-narration="Example: Disease Diagnosis">
    <rect x="10" y="230" width="350" height="50" fill="#FFC107" rx="10"/>
    <rect x="10" y="240" width="350" height="50" fill="#C7B8EA" rx="10"/>
    <text x="20" y="250" font-size="18" font-family="Arial" text-anchor="middle">Example: Disease Diagnosis</text>
    <animate transform="scale(1.1)" begin="300ms" dur="500ms" repeatCount="indefinite"/>
    <text x="20" y="270" font-size="18" font-family="Arial" text-anchor="middle">P(Disease|Symptoms) = P(Symptoms|Disease) * P(Disease) / P(Symptoms)</text>
    <text x="20" y="290" font-size="18" font-family="Arial" text-anchor="middle">= 0.4 / 0.298 = 0.135</text>
  </section>
  <section data-narration="Conditional Probability">
    <rect x="10" y="330" width="350" height="50" fill="#87CEEB" rx="10"/>
    <rect x="10" y="340" width="350" height="50" fill="#C7B8EA" rx="10"/>
    <text x="20" y="350" font-size="18" font-family="Arial" text-anchor="middle">Conditional Probability</text>
    <animate transform="scale(1.1)" begin="400ms" dur="500ms" repeatCount="indefinite"/>
    <a href="#" class="arrow">↑</a>
  </section>
  <footer>
    <text x="50%" y="390" font-size="18" font-family="Arial" text-anchor="middle">Educational Diagram</text>
  </footer>
</svg>