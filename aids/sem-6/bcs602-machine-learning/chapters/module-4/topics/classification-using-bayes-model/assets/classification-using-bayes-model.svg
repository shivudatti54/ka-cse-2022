<svg width="420" height="400" data-topic-id="classification-using-bayes-model">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#ACC1FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient)" />
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2E4053">
    Classification Using Bayes Model
  </text>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Introduction
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,80" dur="2s" begin="0s" />
  </g>
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Classification is a fundamental task in machine learning, where the goal is to assign a label or category to new, unseen data points.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,80" to="0,80" dur="2s" begin="0s" />
  </g>
  
  <!-- Section 2: Bayes' Theorem -->
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Bayes' Theorem
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,120" to="0,140" dur="2s" begin="0s" />
  </g>
  <g transform="translate(20, 140)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      P(H|E) = P(E|H) \* P(H) / P(E)
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,140" to="0,140" dur="2s" begin="0.5s" />
  </g>
  
  <!-- Section 3: Prior Probability, Likelihood, and Posterior Probability -->
  <g transform="translate(20, 180)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Prior Probability, Likelihood, and Posterior Probability
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,180" to="0,200" dur="2s" begin="0s" />
  </g>
  <g transform="translate(20, 200)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      P(H) is the probability of a class before observing any data points.
      P(E|H) is the probability of observing data points given a class.
      P(H|E) is the probability of a class given some observed data points.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,200" to="0,200" dur="2s" begin="0.5s" />
  </g>
  
  <!-- Section 4: Bayes Factor -->
  <g transform="translate(20, 240)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Bayes Factor
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,240" to="0,260" dur="2s" begin="0s" />
  </g>
  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      The ratio of the posterior probability to the prior probability.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,260" to="0,260" dur="2s" begin="0.5s" />
  </g>
  
  <!-- Section 5: Classification Using the Bayes Model -->
  <g transform="translate(20, 300)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Classification Using the Bayes Model
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,300" to="0,320" dur="2s" begin="0s" />
  </g>
  <g transform="translate(20, 320)">
    <rect x="0" y="0" width="100%" height="20" style="fill: #F7F7F7" />
    <text x="10%" y="10%" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
      Assign a class label to a new data point based on the probabilities of the data point belonging to each class.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,320" to="0,320" dur="2s" begin="0.5s" />
  </g>
  
  <!-- Footer -->
  <text x="50%" y="390%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2E4053">
    Classification Using Bayes Model
  </text>
</svg>