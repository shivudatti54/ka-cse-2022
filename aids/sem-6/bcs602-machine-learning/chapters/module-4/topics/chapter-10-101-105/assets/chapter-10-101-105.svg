<svg width="420" height="400" data-topic-id="chapter-10-bayesian-learning">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="50%" y="20" font-size="24" font-weight="bold" text-anchor="middle" fill="#3498DB">
    Chapter 10: Bayesian Learning
  </text>
  
  <!-- Section 1: Introduction to Bayesian Learning -->
  <rect x="50" y="70" width="320" height="150" fill="#F9F4F7" rx="10" />
  <text x="50%" y="90" font-size="18" font-weight="normal" text-anchor="middle" fill="#666" data-narration="Introduction to Bayesian Learning">
    Bayesian learning is a type of machine learning that uses Bayes' theorem to update the probability of a hypothesis based on new evidence.
  </text>
  <animate transform="translate(50,100) rotate(45)" begin="100ms" dur="2000" repeat-count="indefinite" />
  
  <!-- Section 2: Key Concepts -->
  <rect x="50" y="220" width="320" height="150" fill="#F9F4F7" rx="10" />
  <text x="50%" y="240" font-size="18" font-weight="normal" text-anchor="middle" fill="#666" data-narration="Key Concepts">
    <tspan>Probability:</tspan> A measure of the likelihood of an event occurring.
    <tspan>Bayes' Theorem:</tspan> An equation that updates the probability of a hypothesis based on new evidence.
    <tspan>Prior Distribution:</tspan> The probability distribution of the hypothesis before new evidence is observed.
    <tspan>Likelihood Function:</tspan> The probability of observing new evidence given the hypothesis.
    <tspan>Posterior Distribution:</tspan> The updated probability distribution of the hypothesis after new evidence is observed.
  </text>
  <animate transform="translate(50,280) rotate(45)" begin="300ms" dur="2000" repeat-count="indefinite" />
  
  <!-- Section 3: Fundamentals of Bayes Theorem -->
  <rect x="50" y="370" width="320" height="150" fill="#F9F4F7" rx="10" />
  <text x="50%" y="390" font-size="18" font-weight="normal" text-anchor="middle" fill="#666" data-narration="Fundamentals of Bayes Theorem">
    Bayes' theorem is a mathematical formula that updates the probability of a hypothesis based on new evidence. The formula is as follows:
    <tspan>P(H|E) = P(E|H) \* P(H) / P(E)</tspan>
  </text>
  <animate transform="translate(50,440) rotate(45)" begin="500ms" dur="2000" repeat-count="indefinite" />
  
  <!-- Section 4: Example -->
  <rect x="50" y="510" width="320" height="150" fill="#F9F4F7" rx="10" />
  <text x="50%" y="530" font-size="18" font-weight="normal" text-anchor="middle" fill="#666" data-narration="Example">
    Suppose we have a hypothesis that a person will wear a hat (H) or not (no hat). We want to update the probability of the hypothesis based on new evidence.
  </text>
  <animate transform="translate(50,580) rotate(45)" begin="700ms" dur="2000" repeat-count="indefinite" />
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="18" font-weight="normal" text-anchor="middle" fill="#666">
    Developed by [Your Name]
  </text>
</svg>