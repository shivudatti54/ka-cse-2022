<svg width="420" height="400" data-topic-id="similarity-based-learning-nearest-neighbor-learning" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7A8BD5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
        </linearGradient>
        <style>
            .title {
                font-size: 24px;
                font-weight: bold;
                color: #7A8BD5;
                text-align: center;
                margin-top: 20px;
            }
            .footer {
                font-size: 14px;
                color: #666;
                text-align: center;
                margin-bottom: 20px;
            }
            .section {
                margin-bottom: 20px;
            }
        </style>
    </defs>
    <title>Similarity-Based Learning: Nearest-Neighbor Learning, Weighted K-Nearest-Neighbor Algorithm, Nearest Centroid Classifier, Locally Weighted</title>
    <g id="root">
        <!-- Gradient background -->
        <rect x="0" y="0" width="420" height="400" style="fill: url(#gradient)"/>
        
        <!-- Title -->
        <text class="title" x="50%" y="20%" text-anchor="middle" font-size="24px" font-weight="bold">Similarity-Based Learning</text>
        
        <!-- Section 1: Nearest-Neighbor Learning -->
        <g transform="translate(50, 100)">
            <rect x="0" y="0" width="200" height="40" style="fill: #7A8BD5; stroke: #fff; stroke-width: 2"/>
            <text x="50%" y="15%" text-anchor="middle" font-size="16px" font-weight="bold">Nearest-Neighbor Learning</text>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="-1s"/>
            <text x="50%" y="50%" text-anchor="middle" font-size="14px" fill="#fff">How it works:</text>
            <text x="50%" y="70%" text-anchor="middle" font-size="14px" fill="#fff">1. Calculate the distance between the sample and all other samples in the training data.</text>
            <text x="50%" y="90%" text-anchor="middle" font-size="14px" fill="#fff">2. Select the k samples with the smallest distances (nearest neighbors).</text>
            <text x="50%" y="110%" text-anchor="middle" font-size="14px" fill="#fff">3. Calculate the majority vote of the nearest neighbors.</text>
            <text x="50%" y="130%" text-anchor="middle" font-size="14px" fill="#fff">4. Assign the predicted class label based on the majority vote.</text>
        </g>
        
        <!-- Section 2: Weighted K-Nearest-Neighbor Algorithm -->
        <g transform="translate(50, 150)">
            <rect x="0" y="0" width="200" height="40" style="fill: #7A8BD5; stroke: #fff; stroke-width: 2"/>
            <text x="50%" y="15%" text-anchor="middle" font-size="16px" font-weight="bold">Weighted K-Nearest-Neighbor Algorithm</text>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="-1s"/>
            <text x="50%" y="50%" text-anchor="middle" font-size="14px" fill="#fff">How it works:</text>
            <text x="50%" y="70%" text-anchor="middle" font-size="14px" fill="#fff">1. Calculate the distance between the sample and all other samples in the training data.</text>
            <text x="50%" y="90%" text-anchor="middle" font-size="14px" fill="#fff">2. Assign weights to the nearest neighbors based on their distance from the sample.</text>
            <text x="50%" y="110%" text-anchor="middle" font-size="14px" fill="#fff">3. Calculate the weighted sum of the nearest neighbors.</text>
            <text x="50%" y="130%" text-anchor="middle" font-size="14px" fill="#fff">4. Assign the predicted class label based on the weighted sum.</text>
        </g>
        
        <!-- Section 3: Nearest Centroid Classifier -->
        <g transform="translate(50, 200)">
            <rect x="0" y="0" width="200" height="40" style="fill: #7A8BD5; stroke: #fff; stroke-width: 2"/>
            <text x="50%" y="15%" text-anchor="middle" font-size="16px" font-weight="bold">Nearest Centroid Classifier</text>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="-1s"/>
            <text x="50%" y="50%" text-anchor="middle" font-size="14px" fill="#fff">How it works:</text>
            <text x="50%" y="70%" text-anchor="middle" font-size="14px" fill="#fff">1. Calculate the distance between the sample and all other samples in the training data.</text>
            <text x="50%" y="90%" text-anchor="middle" font-size="14px" fill="#fff">2. Select the k samples with the smallest distances (nearest neighbors).</text>
            <text x="50%" y="110%" text-anchor="middle" font-size="14px" fill="#fff">3. Calculate the centroid of the nearest neighbors.</text>
            <text x="50%" y="130%" text-anchor="middle" font-size="14px" fill="#fff">4. Assign the predicted class label based on the centroid.</text>
        </g>
        
        <!-- Section 4: Locally Weighted -->
        <g transform="translate(50, 250)">
            <rect x="0" y="0" width="200" height="40" style="fill: #7A8BD5; stroke: #fff; stroke-width: 2"/>
            <text x="50%" y="15%" text-anchor="middle" font-size="16px" font-weight="bold">Locally Weighted</text>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="-1s"/>
            <text x="50%" y="50%" text-anchor="middle" font-size="14px" fill="#fff">How it works:</text>
            <text x="50%" y="70%" text-anchor="middle" font-size="14px" fill="#fff">1. Calculate the distance between the sample and all other samples in the training data.</text>
            <text x="50%" y="90%" text-anchor="middle" font-size="14px" fill="#fff">2. Assign weights to the nearest neighbors based on their distance from the sample.</text>
            <text x="50%" y="110%" text-anchor="middle" font-size="14px" fill="#fff">3. Calculate the weighted sum of the nearest neighbors.</text>
            <text x="50%" y="130%" text-anchor="middle" font-size="14px" fill="#fff">4. Assign the predicted class label based on the weighted sum.</text>
        </g>
        
        <!-- Footer -->
        <text class="footer" x="50%" y="380%" text-anchor="middle" font-size="14px" fill="#666">Similarity-Based Learning: Nearest-Neighbor Learning, Weighted K-Nearest-Neighbor Algorithm, Nearest Centroid Classifier, Locally Weighted</text>
    </g>
</svg>