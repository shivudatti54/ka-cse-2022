<svg width="420" height="400" data-topic-id="chapter-4-supervised-learning">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="50%" stop-color="#66CCCC" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#44A0E6" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" rx="10" />
  <title>Chapter 4: Supervised Learning</title>

  <section data-narration="Linear Regression is a type of Supervised Learning algorithm that predicts a continuous output variable based on one or more input features.">
    <rect x="20" y="20" width="300" height="150" fill="#FFFFFF" rx="10" />
    <path d="M 20 20 L 320 20" stroke="#444444" stroke-width="2" fill="none" />
    <text x="50" y="60" font-size="16" font-family="Arial, sans-serif" fill="#000000">y = β0 + β1*x1 + β2*x2 + … + βn*xn</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="320 0" dur="2000" begin="0s" repeatCount="indefinite" />
  </section>

  <section data-narration="Logistic Regression is a type of Supervised Learning algorithm that predicts a binary output variable based on one or more input features.">
    <rect x="20" y="200" width="300" height="150" fill="#FFFFFF" rx="10" />
    <path d="M 20 20 L 320 20" stroke="#444444" stroke-width="2" fill="none" />
    <text x="50" y="80" font-size="16" font-family="Arial, sans-serif" fill="#000000">p = 1 / (1 + e^(-z))</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="320 0" dur="2000" begin="2000s" repeatCount="indefinite" />
  </section>

  <section data-narration="Least Squares Method is used to minimize the sum of the squared errors between the predicted and actual values.">
    <rect x="20" y="80" width="300" height="150" fill="#FFFFFF" rx="10" />
    <path d="M 20 20 L 320 20" stroke="#444444" stroke-width="2" fill="none" />
    <text x="50" y="110" font-size="16" font-family="Arial, sans-serif" fill="#000000">Coefficient Estimation</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="320 0" dur="2000" begin="4000s" repeatCount="indefinite" />
  </section>

  <section data-narration="Residual analysis is used to check for any non-linear relationships between the variables.">
    <rect x="20" y="280" width="300" height="150" fill="#FFFFFF" rx="10" />
    <path d="M 20 20 L 320 20" stroke="#444444" stroke-width="2" fill="none" />
    <text x="50" y="310" font-size="16" font-family="Arial, sans-serif" fill="#000000">Residual Analysis</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="320 0" dur="2000" begin="6000s" repeatCount="indefinite" />
  </section>

  <section data-narration="The coefficients (β0, β1, …, βn) are estimated using the Least Squares Method.">
    <rect x="20" y="60" width="300" height="150" fill="#FFFFFF" rx="10" />
    <path d="M 20 20 L 320 20" stroke="#444444" stroke-width="2" fill="none" />
    <text x="50" y="90" font-size="16" font-family="Arial, sans-serif" fill="#000000">Coefficient Estimation</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="320 0" dur="2000" begin="8000s" repeatCount="indefinite" />
  </section>

  <footer>Chapter 4: Supervised Learning</footer>
</svg>