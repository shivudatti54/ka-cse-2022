<svg width="420" height="400" data-topic-id="regression-introduction-to-regression" xmlns="http://www.w3.org/2000/svg">
  <desc>Regression Analysis: Introduction to Regression</desc>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="50%" stop-color="#45A0E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Regression Analysis: Introduction to Regression</title>
  <rect x="10" y="10" width="400" height="30" fill="url(#gradient)"/>
  <text x="15" y="40" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">Regression Analysis: Introduction to Regression</text>
  <section data-narration="What is regression analysis?">
    <rect x="10" y="60" width="400" height="120" fill="#F7F7F7"/>
    <text x="15" y="70" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Regression analysis is a statistical method used to establish a relationship between a dependent variable and one or more independent variables.</text>
    <text x="15" y="110" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">The goal of regression analysis is to create a mathematical model that can predict the value of the dependent variable based on the values of the independent variables.</text>
  </section>
  <section data-narration="Types of regression analysis">
    <rect x="10" y="190" width="400" height="120" fill="#F7F7F7"/>
    <text x="15" y="200" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">There are several types of regression analysis, including:</text>
    <text x="15" y="230" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Linear Regression, Multiple Linear Regression, Polynomial Regression, and Logistic Regression.</text>
  </section>
  <section data-narration="Linear Regression">
    <rect x="10" y="310" width="400" height="120" fill="#F7F7F7"/>
    <text x="15" y="320" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Linear regression is a type of regression analysis that establishes a linear relationship between the dependent and independent variables.</text>
    <text x="15" y="350" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">The general equation for linear regression is: y = β0 + β1x + ε</text>
  </section>
  <section data-narration="Key concepts of Linear Regression">
    <rect x="10" y="410" width="400" height="120" fill="#F7F7F7"/>
    <text x="15" y="420" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Key concepts of linear regression include:</text>
    <text x="15" y="450" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Linearity, Assumptions, Coefficients, and Residuals.</text>
  </section>
  <footer>
    <rect x="10" y="470" width="400" height="30" fill="#7A288A"/>
    <text x="15" y="490" font-size="18" font-family="Arial, sans-serif" fill="#F7F7F7">Copyright 2023. All rights reserved.</text>
  </footer>
  <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="10s" begin="1s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 200" dur="5s" begin="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="scale" from="1 1" to="2 2" dur="3s" begin="3s" repeatCount="indefinite"/>
</svg>