<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>Decision Tree Induction Algorithms</title>
    <style>
        /* Add some basic styling to the SVG */
        svg {
            background: linear-gradient(to bottom, #f2f2f2, #f2f2f2);
            padding: 20px;
        }

        /* Style the sections */
        .section {
            margin-bottom: 20px;
        }

        /* Style the text */
        text {
            font-size: 16px;
        }
    </style>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#E5F5EA" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Section 1: Introduction to Decision Trees -->
    <rect x="10" y="10" width="400" height="80" style="fill: #f2f2f2;"/>
    <text x="15" y="15" text-anchor="start" fill="#333" font-size="24px" data-narration="Introduction to Decision Trees">
        Decision Trees
    </text>
    <rect x="10" y="40" width="400" height="60" style="fill: rgba(239, 228, 202, 0.5);"/>
    <animate attributeName="opacity" from="0.5" to="1" dur="2s" begin="calc(100% + 2s)" calcMode="spline" repeatCount="indefinite"/>
    <text x="15" y="55" text-anchor="start" fill="#333" font-size="16px" data-narration="A supervised learning algorithm used for both classification and regression tasks. It models decisions and their possible consequences as a tree-like structure, comprising nodes, branches, and leaves. The model learns simple decision rules inferred from the data features to predict the value of a target variable.">
        Decision Tree
    </text>

    <!-- Section 2: Key Components of a Decision Tree -->
    <rect x="10" y="110" width="400" height="80" style="fill: #f2f2f2;"/>
    <text x="15" y="115" text-anchor="start" fill="#333" font-size="24px" data-narration="Key Components of a Decision Tree">
        Key Components
    </text>
    <rect x="10" y="140" width="400" height="60" style="fill: rgba(239, 228, 202, 0.5);"/>
    <animate attributeName="opacity" from="0.5" to="1" dur="2s" begin="calc(100% + 4s)" calcMode="spline" repeatCount="indefinite"/>
    <text x="15" y="155" text-anchor="start" fill="#333" font-size="16px" data-narration="Root Node: Represents the entire dataset, which is then split. Internal/Decision Nodes: A sub-node that splits into further sub-nodes based on a condition. Leaf/Terminal Node: The final node that represents a class label (in classification) or a continuous value (in regression). Branches/Edges: The outcome of a split, connecting one node to another.">
        Root Node
    </text>

    <!-- Section 3: The Need for Tree Induction Algorithms -->
    <rect x="10" y="210" width="400" height="80" style="fill: #f2f2f2;"/>
    <text x="15" y="215" text-anchor="start" fill="#333" font-size="24px" data-narration="The Need for Tree Induction Algorithms">
        The Need
    </text>
    <rect x="10" y="240" width="400" height="60" style="fill: rgba(239, 228, 202, 0.5);"/>
    <animate attributeName="opacity" from="0.5" to="1" dur="2s" begin="calc(100% + 6s)" calcMode="spline" repeatCount="indefinite"/>
    <text x="15" y="255" text-anchor="start" fill="#333" font-size="16px" data-narration="Building a decision tree manually for a dataset with many features and instances is infeasible. An algorithm is needed to automatically select which feature to split on at each node, determine the optimal split point/value for that feature, and decide when to stop splitting and create a leaf node. These algorithms systematically navigate the vast space of possible trees to find a model that is both accurate and generalizable.">
        Algorithm
    </text>

    <!-- Section 4: Core Concepts in Tree Induction -->
    <rect x="10" y="310" width="400" height="80" style="fill: #f2f2f2;"/>
    <text x="15" y="315" text-anchor="start" fill="#333" font-size="24px" data-narration="Core Concepts in Tree Induction">
        Concepts
    </text>
    <rect x="10" y="340" width="400" height="60" style="fill: rgba(239, 228, 202, 0.5);"/>
    <animate attributeName="opacity" from="0.5" to="1" dur="2s" begin="calc(100% + 8s)" calcMode="spline" repeatCount="indefinite"/>
    <text x="15" y="355" text-anchor="start" fill="#333" font-size="16px" data-narration="Splitting Criteria (Attribute Selection Measures) The algorithm needs a metric to evaluate and compare the goodness of potential splits. The goal is to select the split that creates the purest subsets (for classification) or the most homogeneous subsets (for regression).">
        Criteria
    </text>

    <!-- Section 5: Splitting Criteria (Attribute Selection Measures) -->
    <rect x="10" y="410" width="400" height="80" style="fill: #f2f2f2;"/>
    <text x="15" y="415" text-anchor="start" fill="#333" font-size="24px" data-narration="Splitting Criteria (Attribute Selection Measures)">
        Criteria
    </text>
    <rect x="10" y="440" width="400" height="60" style="fill: rgba(239, 228, 202, 0.5);"/>
    <animate attributeName="opacity" from="0.5" to="1" dur="2s" begin="calc(100% + 10s)" calcMode="spline" repeatCount="indefinite"/>
    <text x="15" y="455" text-anchor="start" fill="#333" font-size="16px" data-narration="Information Gain (IG) Based on Claude Shannon's information theory and the concept of entropy. Entropy measures the amount of uncertainty in a dataset. The algorithm selects the split that creates the minimum entropy (or maximum information gain).">
        Information Gain
    </text>

    <!-- Section 6: Conclusion -->
    <rect x="10" y="530" width="400" height="80" style="fill: #f2f2f2;"/>
    <text x="15" y="535" text-anchor="start" fill="#333" font-size="24px" data-narration="Conclusion">
        Conclusion
    </text>
    <rect x="10" y="560" width="400" height="60" style="fill: rgba(239, 228, 202, 0.5);"/>
    <animate attributeName="opacity" from="0.5" to="1" dur="2s" begin="calc(100% + 12s)" calcMode="spline" repeatCount="indefinite"/>
    <text x="15" y="575" text-anchor="start" fill="#333" font-size="16px" data-narration="In conclusion, decision tree induction algorithms are a fundamental part of machine learning. They enable us to create models that are accurate and generalizable, even with large datasets. By understanding the key components and concepts involved, we can design and optimize decision trees for a wide range of applications.">
        Conclusion
    </text>

    <g id="arrow markers">
        <line x1="15" y1="100" x2="20" y2="100" stroke="#333" stroke-width="2"/>
        <line x1="15" y1="120" x2="10" y2="120" stroke="#333" stroke-width="2"/>
        <line x1="15" y1="140" x2="20" y2="140" stroke="#333" stroke-width="2"/>
        <line x1="15" y1="160" x2="10" y2="160" stroke="#333" stroke-width="2"/>
        <line x1="15" y1="180" x2="20" y2="180" stroke="#333" stroke-width="2"/>
        <line x1="15" y1="200" x2="10" y2="200" stroke="#333" stroke-width="2"/>
    </g>

    <rect x="10" y="100" width="400" height="30" style="fill: #f2f2f2;"/>
    <text x="15" y="105" text-anchor="start" fill="#333" font-size="16px" data-topic-id="Introduction to Decision Trees">
        Introduction to Decision Trees
    </text>

    <rect x="10" y="130" width="400" height="30" style="fill: #f2f2f2;"/>
    <text x="15" y="135" text-anchor="start" fill="#333" font-size="16px" data-topic-id="Key Components of a Decision Tree">
        Key Components
    </text>

    <rect x="10" y="160" width="400" height="30" style="fill: #f2f2f2;"/>
    <text x="15" y="165" text-anchor="start" fill="#333" font-size="16px" data-topic-id="The Need for Tree Induction Algorithms">
        The Need
    </text>

    <rect x="10" y="190" width="400" height="30" style="fill: #f2f2f2;"/>
    <text x="15" y="195" text-anchor="start" fill="#333" font-size="16px" data-topic-id="Core Concepts in Tree Induction">
        Concepts
    </text>

    <rect x="10" y="220" width="400" height="30" style="fill: #f2f2f2;"/>
    <text x="15" y="225" text-anchor="start" fill="#333" font-size="16px" data-topic-id="Splitting Criteria (Attribute Selection Measures)">
        Criteria
    </text>

    <rect x="10" y="250" width="400" height="30" style="fill: #f2f2f2;"/>
    <text x="15" y="255" text-anchor="start" fill="#333" font-size="16px" data-topic-id="Information Gain (IG)">
        Information Gain
    </text>
</svg>