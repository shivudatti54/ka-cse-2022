<svg width="420" height="400" data-topic-id="Chapter-2-26-28">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8CFA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Chapter 2: Understanding Data – Bivariate Data and Multivariate Data</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100" height="200" fill="#C6E2B5" rx="10"/>
    <text x="10" y="15" font-size="18" text-anchor="start">Bivariate Data</text>
    <text x="10" y="30" font-size="18" text-anchor="start">Definition</text>
    <section data-narration="Bivariate Data Definition">
      <rect x="0" y="60" width="100" height="100" fill="#C6E2B5" rx="10"/>
      <text x="10" y="75" font-size="16" text-anchor="start">Bivariate data refers to data that consists of two variables.</text>
    </section>
    <section data-narration="Types of Bivariate Data">
      <rect x="0" y="170" width="100" height="100" fill="#C6E2B5" rx="10"/>
      <text x="10" y="185" font-size="16" text-anchor="start">Linear Relationship: The relationship can be modeled using a straight line.</text>
      <text x="10" y="200" font-size="16" text-anchor="start">Non-Linear Relationship: The relationship cannot be modeled using a straight line.</text>
    </section>
    <section data-narration="Example">
      <rect x="0" y="280" width="100" height="100" fill="#C6E2B5" rx="10"/>
      <text x="10" y="295" font-size="16" text-anchor="start">Suppose we want to study the relationship between the amount of ice cream sold and the temperature outside.</text>
    </section>
    <section data-narration="Key Concepts">
      <rect x="0" y="380" width="100" height="100" fill="#C6E2B5" rx="10"/>
      <text x="10" y="395" font-size="16" text-anchor="start">Correlation Coefficient: Measures the strength and direction of the linear relationship.</text>
      <text x="10" y="410" font-size="16" text-anchor="start">Regression Analysis: A statistical technique used to study the relationship and predict values.</text>
    </section>
    <g transform="translate(200, 10)">
      <rect x="0" y="0" width="100" height="200" fill="#87CEEB" rx="10"/>
      <text x="10" y="15" font-size="18" text-anchor="start">Multivariate Data</text>
      <text x="10" y="30" font-size="18" text-anchor="start">Definition</text>
      <section data-narration="Multivariate Data Definition">
        <rect x="0" y="60" width="100" height="100" fill="#87CEEB" rx="10"/>
        <text x="10" y="75" font-size="16" text-anchor="start">Multivariate data refers to data that consists of three or more variables.</text>
      </section>
      <section data-narration="Key Concepts">
        <rect x="0" y="170" width="100" height="100" fill="#87CEEB" rx="10"/>
        <text x="10" y="185" font-size="16" text-anchor="start">Correlation Coefficient: Measures the strength and direction of the linear relationship between multiple variables.</text>
        <text x="10" y="200" font-size="16" text-anchor="start">Regression Analysis: A statistical technique used to study the relationship and predict values between multiple variables.</text>
      </section>
    </g>
    <g transform="translate(400, 10)">
      <rect x="0" y="0" width="100" height="200" fill="#C6E2B5" rx="10"/>
      <text x="10" y="15" font-size="18" text-anchor="start">Footer</text>
    </g>
  </g>
  <animate xmlns="http://www.w3.org/2000/svg" dur="10s" repeatCount="indefinite">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" begin="-10s" delay="10s"/>
    <animateTransform attributeName="transform" type="translate" from="200 0" to="200 200" begin="-10s" delay="20s"/>
    <animateTransform attributeName="transform" type="translate" from="400 0" to="400 200" begin="-10s" delay="30s"/>
  </animate>
</svg>