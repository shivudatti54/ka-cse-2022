<svg width="420" height="400" data-topic-id="introduction-to-concept-of-learning">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10" />
  <g transform="translate(20, 20)">
    <g data-narration="Introduction to Algorithm Analysis">
      <text x="0" y="0" font-size="24" font-family="Arial, sans-serif">What is Algorithm Analysis?</text>
    </g>
    <g data-narration="Algorithms are a set of instructions for solving a problem or performing a task.">
      <rect x="0" y="30" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="40" font-size="18" font-family="Arial, sans-serif">What is an algorithm?</text>
    </g>
    <g data-narration="An algorithm is a well-defined procedure that takes some input and produces a corresponding output.">
      <rect x="0" y="70" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="80" font-size="18" font-family="Arial, sans-serif">Input and Output</text>
    </g>
    <g data-narration="Algorithm analysis is the process of evaluating an algorithm's efficiency in terms of time and space requirements.">
      <rect x="0" y="110" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="120" font-size="18" font-family="Arial, sans-serif">Algorithm Analysis</text>
    </g>
    <g data-narration="It helps compare different algorithms for solving the same problem.">
      <rect x="0" y="150" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="160" font-size="18" font-family="Arial, sans-serif">Comparison</text>
    </g>
    <g data-narration="Algorithm analysis answers the question: 'How does the performance of an algorithm scale as the input size increases?'">
      <rect x="0" y="190" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="200" font-size="18" font-family="Arial, sans-serif">Performance Prediction</text>
    </g>
    <g data-narration="Time complexity measures the amount of time an algorithm takes to complete as a function of the input size.">
      <rect x="0" y="230" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="240" font-size="18" font-family="Arial, sans-serif">Time Complexity</text>
    </g>
    <g data-narration="Space complexity measures the amount of memory an algorithm requires as a function of the input size.">
      <rect x="0" y="270" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="280" font-size="18" font-family="Arial, sans-serif">Space Complexity</text>
    </g>
    <g data-narration="Key concepts in algorithm analysis include input size, time complexity, and space complexity.">
      <rect x="0" y="310" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="320" font-size="18" font-family="Arial, sans-serif">Key Concepts</text>
    </g>
    <g data-narration="Input size represents the amount of data the algorithm needs to process.">
      <rect x="0" y="350" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="360" font-size="18" font-family="Arial, sans-serif">Input Size</text>
    </g>
    <g data-narration="Time complexity measures the amount of time an algorithm takes to complete as a function of the input size.">
      <rect x="0" y="390" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="400" font-size="18" font-family="Arial, sans-serif">Time Complexity</text>
    </g>
    <g data-narration="Space complexity measures the amount of memory an algorithm requires as a function of the input size.">
      <rect x="0" y="430" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="440" font-size="18" font-family="Arial, sans-serif">Space Complexity</text>
    </g>
    <g data-narration="Linear search is an example of a time complexity of O(n).">
      <rect x="0" y="470" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="480" font-size="18" font-family="Arial, sans-serif">Linear Search</text>
    </g>
    <g data-narration="Reversing an array is an example of a space complexity of O(n).">
      <rect x="0" y="510" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="520" font-size="18" font-family="Arial, sans-serif">Reversing Array</text>
    </g>
    <g data-narration="Conclusion: Algorithm analysis is essential for predicting performance, comparing algorithms, and optimizing code.">
      <rect x="0" y="550" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="560" font-size="18" font-family="Arial, sans-serif">Conclusion</text>
    </g>
    <g data-narration="References:">
      <rect x="0" y="590" width="100" height="20" rx="5" fill="#87CEEB" />
      <text x="5" y="600" font-size="18" font-family="Arial, sans-serif">References</text>
    </g>
  </g>
  <animate attributeName="opacity" from="1" to="0" dur="5s" begin="1s" repeatCount="indefinite" />
  <animate attributeName="opacity" from="0" to="1" dur="5s" begin="5s" repeatCount="indefinite" />
</svg>