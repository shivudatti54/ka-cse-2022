<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="Feature-Engineering-and-Dimensionality-Reduction">
  <!-- Header Section -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A7CD3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  <text x="50%" y="10%" font-size="24" font-family="Arial" text-anchor="middle">
    <tspan data-narration="Introduction">Feature Engineering and Dimensionality Reduction T</tspan>
  </text>
  <!-- Section 1: Feature Engineering -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="200" height="80" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start">
      <tspan data-narration="Types of Features">Types of Features</tspan>
    </text>
    <rect x="20" y="40" width="150" height="20" fill="#E5E5EA" rx="5"/>
    <text x="35" y="50" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Numerical Features">Numerical Features</tspan>
    </text>
    <rect x="35" y="60" width="150" height="20" fill="#C9E4CA" rx="5"/>
    <text x="35" y="70" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Categorical Features">Categorical Features</tspan>
    </text>
    <rect x="35" y="80" width="150" height="20" fill="#FFC5C5" rx="5"/>
    <text x="35" y="90" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Text Features">Text Features</tspan>
    </text>
    <rect x="35" y="100" width="150" height="20" fill="#F2C464" rx="5"/>
    <text x="35" y="110" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Binary Features">Binary Features</tspan>
    </text>
  </g>
  <!-- Section 2: Feature Engineering Techniques -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="200" height="80" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start">
      <tspan data-narration="Feature Engineering Techniques">Feature Engineering Techniques</tspan>
    </text>
    <rect x="20" y="40" width="150" height="20" fill="#E5E5EA" rx="5"/>
    <text x="35" y="50" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Data Transformation">Data Transformation</tspan>
    </text>
    <rect x="35" y="60" width="150" height="20" fill="#C9E4CA" rx="5"/>
    <text x="35" y="70" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Feature Extraction">Feature Extraction</tspan>
    </text>
    <rect x="35" y="80" width="150" height="20" fill="#FFC5C5" rx="5"/>
    <text x="35" y="90" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Feature Selection">Feature Selection</tspan>
    </text>
    <rect x="35" y="100" width="150" height="20" fill="#F2C464" rx="5"/>
    <text x="35" y="110" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Feature Creation">Feature Creation</tspan>
    </text>
  </g>
  <!-- Section 3: Dimensionality Reduction -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="200" height="80" fill="#F7F7F7" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start">
      <tspan data-narration="Dimensionality Reduction">Dimensionality Reduction</tspan>
    </text>
    <rect x="20" y="40" width="150" height="20" fill="#E5E5EA" rx="5"/>
    <text x="35" y="50" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Types of Dimensionality Reduction">Types of Dimensionality Reduction</tspan>
    </text>
    <rect x="35" y="60" width="150" height="20" fill="#C9E4CA" rx="5"/>
    <text x="35" y="70" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Principal Component Analysis (PCA)">Principal Component Analysis (PCA)</tspan>
    </text>
    <rect x="35" y="80" width="150" height="20" fill="#FFC5C5" rx="5"/>
    <text x="35" y="90" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="t-Distributed Stochastic Neighbor Embedding (t-SNE)">t-Distributed Stochastic Neighbor Embedding (t-SNE)</tspan>
    </text>
    <rect x="35" y="100" width="150" height="20" fill="#F2C464" rx="5"/>
    <text x="35" y="110" font-size="14" font-family="Arial" text-anchor="start">
      <tspan data-narration="Linear Discriminant Analysis (LDA)">Linear Discriminant Analysis (LDA)</tspan>
    </text>
  </g>
  <!-- Footer Section -->
  <rect x="0" y="300" width="420" height="100" fill="#F7F7F7"/>
  <text x="50%" y="310%" font-size="18" font-family="Arial" text-anchor="middle">
    <tspan data-narration="Feature Engineering and Dimensionality Reduction T">Feature Engineering and Dimensionality Reduction T</tspan>
  </text>
  <g transform="scale(0.5)">
    <rect x="0" y="0" width="420" height="400" fill="#F7F7F7"/>
  </g>
  <animateTransform attributeName="transform" type="scale" from="1 1" to="0.5 0.5" dur="5s" repeatCount="indefinite"/>
</svg>