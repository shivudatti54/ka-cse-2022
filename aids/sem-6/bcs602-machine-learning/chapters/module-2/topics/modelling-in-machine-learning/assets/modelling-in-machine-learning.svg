<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <title>Modelling In Machine Learning</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10"/>
  <g id="section-1" transform="translate(20, 50)">
    <text data-narration="What are Types of Machine Learning?" x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Types of Machine Learning</text>
    <line x1="20" y1="60" x2="20" y2="100" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <line x1="20" y1="100" x2="20" y2="140" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <animate xlink:href="#section-1" begin="0s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
  </g>
  <g id="section-2" transform="translate(20, 150)">
    <text data-narration="Supervised Learning" x="10" y="30" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Supervised Learning</text>
    <line x1="20" y1="60" x2="20" y2="100" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <line x1="20" y1="100" x2="20" y2="140" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <animate xlink:href="#section-2" begin="0.5s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
  </g>
  <g id="section-3" transform="translate(20, 250)">
    <text data-narration="Unsupervised Learning" x="10" y="30" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Unsupervised Learning</text>
    <line x1="20" y1="60" x2="20" y2="100" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <line x1="20" y1="100" x2="20" y2="140" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <animate xlink:href="#section-3" begin="1s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
  </g>
  <g id="section-4" transform="translate(20, 350)">
    <text data-narration="Reinforcement Learning" x="10" y="30" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Reinforcement Learning</text>
    <line x1="20" y1="60" x2="20" y2="100" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <line x1="20" y1="100" x2="20" y2="140" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <animate xlink:href="#section-4" begin="1.5s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
  </g>
  <g id="section-5" transform="translate(20, 50)">
    <text data-narration="Key Concepts" x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Key Concepts</text>
    <line x1="20" y1="60" x2="20" y2="100" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <line x1="20" y1="100" x2="20" y2="140" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <animate xlink:href="#section-5" begin="2s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
  </g>
  <g id="section-6" transform="translate(20, 150)">
    <text data-narration="How It Works" x="10" y="30" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">How It Works</text>
    <line x1="20" y1="60" x2="20" y2="100" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <line x1="20" y1="100" x2="20" y2="140" stroke="#2F4F7F" stroke-width="2" arrowhead="none"/>
    <animate xlink:href="#section-6" begin="2.5s" dur="2s" attributeName="opacity" from="1" to="0" repeatCount="indefinite"/>
  </g>
  <g id="footer">
    <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Modeling in Machine Learning</text>
  </g>
</svg>