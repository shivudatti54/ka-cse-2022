<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="Chapter_13_136">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%" color-stop="0%" color="#7A9BAD" color-stop="50%" color="#4C7A9F" color-stop="100%" color="#3A63A6"/>
  </defs>
  <rect fill="url(#grad)" width="420" height="400" rx="10"/>

  <!-- Title section -->
  <section id="title" data-narration="Introduction to Clustering Algorithms">
    <rect x="10" y="10" width="400" height="40" fill="#F7F7F7" rx="10"/>
    <text x="20" y="20" font-size="24" font-family="Open Sans" fill="#4C7A9F" text-anchor="middle">Chapter 13: Clustering Algorithms</text>
    <animate-transform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="1000" repeatCount="indefinite"/>
  </section>

  <!-- Section 1: Types of Clustering -->
  <section id="section1" data-narration="Types of Clustering">
    <rect x="20" y="60" width="380" height="200" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="80" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="50" y="90" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">Hierarchical Clustering</text>
    <text x="120" y="90" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">Density-Based Clustering</text>
    <text x="200" y="90" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">Distributed Clustering</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="1000" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Proximity Measures -->
  <section id="section2" data-narration="Proximity Measures">
    <rect x="20" y="260" width="380" height="200" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="280" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="50" y="290" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">Euclidean Distance</text>
    <text x="120" y="290" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">Manhattan Distance</text>
    <text x="200" y="290" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">Minkowski Distance</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="1000" repeatCount="indefinite"/>
  </section>

  <!-- Section 3: Hierarchical Clustering -->
  <section id="section3" data-narration="Hierarchical Clustering">
    <rect x="20" y="320" width="380" height="200" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="340" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="50" y="350" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">Agglomerative Clustering</text>
    <text x="120" y="350" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">Divisive Clustering</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="1000" repeatCount="indefinite"/>
  </section>

  <!-- Section 4: Distance-Based Clustering -->
  <section id="section4" data-narration="Distance-Based Clustering">
    <rect x="20" y="380" width="380" height="200" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="400" width="300" height="30" fill="#F7F7F7" rx="5"/>
    <text x="50" y="410" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">K-Means Clustering</text>
    <text x="120" y="410" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle">DBSCAN</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="1000" repeatCount="indefinite"/>
  </section>

  <!-- Footers -->
  <text x="20" y="410" font-size="18" font-family="Open Sans" fill="#343A40" text-anchor="middle" font-weight="bold">Chapter 13: Clustering Algorithms</text>
