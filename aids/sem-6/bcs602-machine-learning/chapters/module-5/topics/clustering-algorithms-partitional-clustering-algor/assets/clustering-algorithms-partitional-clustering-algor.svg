<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" 
     style="background-color: #66CCCC; background-image: linear-gradient(to bottom, #ADD8E6, #F2C4F7);">
    <!-- Header Section -->
    <rect x="10" y="10" width="400" height="30" style="background-color: #2F4F7F;"/>
    <text x="20" y="30" style="font-size:24px; color: #F7F7F7; font-family: Arial Black;" text-anchor="start">Clustering Algorithms: Partitional Clustering Algor</text>
    <text x="20" y="60" style="font-size:18px; color: #F7F7F7; font-family: Arial Black;" text-anchor="start">Partitional Clustering Algorithm</text>

    <!-- Section 1: Introduction to Clustering Algorithms -->
    <rect x="10" y="90" width="400" height="60" style="background-color: #66CCCC;"/>
    <text x="10" y="110" style="font-size:18px; color: #F7F7F7; font-family: Arial Black;" text-anchor="start" data-narration="Introduction to Clustering Algorithms">Clustering Algorithms are a type of unsupervised machine learning algorithm used to group similar data points into clusters.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="x" begin="0.5s"dur="2s" repeatCount="indefinite" />
    <animate attributeName="y" begin="1s" dur="2s" repeatCount="indefinite" />

    <!-- Section 2: Types of Partitional Clustering Algorithms -->
    <rect x="10" y="170" width="400" height="60" style="background-color: #66CCCC;"/>
    <text x="10" y="190" style="font-size:18px; color: #F7F7F7; font-family: Arial Black;" text-anchor="start" data-narration="Types of Partitional Clustering Algorithms">Types of Partitional Clustering Algorithms: K-Means Clustering and Hierarchical Clustering Algorithm.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="x" begin="0.5s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="y" begin="1s" dur="2s" repeatCount="indefinite" />

    <!-- Section 3: K-Means Clustering Algorithm -->
    <rect x="10" y="250" width="400" height="60" style="background-color: #66CCCC;"/>
    <text x="10" y="270" style="font-size:18px; color: #F7F7F7; font-family: Arial Black;" text-anchor="start" data-narration="K-Means Clustering Algorithm">K-Means Clustering Algorithm: K-Means Clustering works as follows: 1. Initialize K centroids randomly. 2. Assign each data point to the closest centroid. 3. Update the centroids by calculating the mean of all data points assigned to each centroid. 4. Repeat steps 2-3 until convergence.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="x" begin="0.5s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="y" begin="1s" dur="2s" repeatCount="indefinite" />
    <circle cx="200" cy="300" r="10" style="fill: #E6DAC3; opacity: 0;"/>
    <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="cx" begin="2s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="cy" begin="2s" dur="2s" repeatCount="indefinite" />

    <!-- Section 4: Hierarchical Clustering Algorithm -->
    <rect x="10" y="330" width="400" height="60" style="background-color: #66CCCC;"/>
    <text x="10" y="350" style="font-size:18px; color: #F7F7F7; font-family: Arial Black;" text-anchor="start" data-narration="Hierarchical Clustering Algorithm">Hierarchical Clustering Algorithm: Hierarchical Clustering builds a hierarchy of clusters by merging or splitting existing clusters.</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="x" begin="0.5s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="y" begin="1s" dur="2s" repeatCount="indefinite" />
    <line x1="200" y1="300" x2="200" y2="350" style="stroke: #66CCCC; stroke-width: 2;"/>
    <animate attributeName="x1" begin="2s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="y1" begin="2s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="x2" begin="2s" dur="2s" repeatCount="indefinite" />
    <animate attributeName="y2" begin="2s" dur="2s" repeatCount="indefinite" />

    <!-- Footer Section -->
    <rect x="10" y="380" width="400" height="30" style="background-color: #2F4F7F;"/>
    <text x="20" y="400" style="font-size:24px; color: #F7F7F7; font-family: Arial Black;" text-anchor="start">Topic: Clustering Algorithms, Partitional Clustering Algorithm, Density-based Methods, Grid-based Approach</text>
</svg>