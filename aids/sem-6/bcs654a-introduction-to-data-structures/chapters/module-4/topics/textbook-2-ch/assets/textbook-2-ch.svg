<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="introduction-to-trees-2-ch" xmlns:xlink="http://www.w3.org/1999/xlink" data-slug="introduction-to-trees-2-ch">
  <style>
    /* Gradient background */
    .background {
      fill: #66CCCC;
      stroke: #4CAF50;
      stroke-width: 2;
    }
    /* Node styles */
    .node {
      fill: #87CEEB;
      stroke: #4CAF50;
      stroke-width: 2;
    }
    .leaf {
      fill: #B1FFC2;
      stroke: #4CAF50;
      stroke-width: 2;
    }
    /* Animation styles */
    .animate {
      fill: #87CEEB;
      stroke: #4CAF50;
      stroke-width: 2;
      transition: stroke-width 1s;
    }
  </style>
  <rect class="background" x="0" y="0" width="420" height="400"/>
  <text x="50" y="30" font-size="24" font-family="Arial" text-anchor="middle" fill="#4CAF50">Introduction to Trees</text>
  <g id="tree-1">
    <rect class="node" x="100" y="100" width="20" height="20"/>
    <text x="110" y="120" font-size="16" font-family="Arial" text-anchor="middle" fill="#4CAF50">1</text>
    <line x1="100" y1="80" x2="100" y2="120" stroke="#4CAF50" stroke-width="2"/>
    <line x1="100" y1="100" x2="140" y2="100" stroke="#4CAF50" stroke-width="2"/>
    <line x1="100" y1="100" x2="80" y2="100" stroke="#4CAF50" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="100 100" begin="-0.5s" dur="1s"/>
  </g>
  <g id="tree-2">
    <rect class="node" x="200" y="100" width="20" height="20"/>
    <text x="210" y="120" font-size="16" font-family="Arial" text-anchor="middle" fill="#4CAF50">2</text>
    <line x1="200" y1="80" x2="200" y2="120" stroke="#4CAF50" stroke-width="2"/>
    <line x1="200" y1="100" x2="240" y2="100" stroke="#4CAF50" stroke-width="2"/>
    <line x1="200" y1="100" x2="160" y2="100" stroke="#4CAF50" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="200 100" begin="-0.5s" dur="1s"/>
  </g>
  <g id="tree-3">
    <rect class="node" x="300" y="100" width="20" height="20"/>
    <text x="310" y="120" font-size="16" font-family="Arial" text-anchor="middle" fill="#4CAF50">3</text>
    <line x1="300" y1="80" x2="300" y2="120" stroke="#4CAF50" stroke-width="2"/>
    <line x1="300" y1="100" x2="340" y2="100" stroke="#4CAF50" stroke-width="2"/>
    <line x1="300" y1="100" x2="260" y2="100" stroke="#4CAF50" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="300 100" begin="-0.5s" dur="1s"/>
  </g>
  <g id="tree-4">
    <rect class="leaf" x="50" y="220" width="20" height="20"/>
    <rect class="leaf" x="150" y="220" width="20" height="20"/>
    <rect class="leaf" x="250" y="220" width="20" height="20"/>
    <annotate> 
      <text x="55" y="240" font-size="16" font-family="Arial" text-anchor="middle" fill="#4CAF50">Leaf Node</text>
      <path d="M 55 250 L 55 220" stroke="#4CAF50" stroke-width="2"/>
      <line x1="55" y1="250" x2="55" y2="220" stroke="#4CAF50" stroke-width="2"/>
    </annotate>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="50 220" begin="-0.5s" dur="1s"/>
  </g>
  <g id="tree-5">
    <rect class="leaf" x="140" y="220" width="20" height="20"/>
    <rect class="leaf" x="240" y="220" width="20" height="20"/>
    <annotate> 
      <text x="145" y="240" font-size="16" font-family="Arial" text-anchor="middle" fill="#4CAF50">Leaf Node</text>
      <path d="M 145 250 L 145 220" stroke="#4CAF50" stroke-width="2"/>
      <line x1="145" y1="250" x2="145" y2="220" stroke="#4CAF50" stroke-width="2"/>
    </annotate>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="140 220" begin="-0.5s" dur="1s"/>
  </g>
  <g id="tree-6">
    <rect class="leaf" x="240" y="220" width="20" height="20"/>
    <annotate> 
      <text x="245" y="240" font-size="16" font-family="Arial" text-anchor="middle" fill="#4CAF50">Leaf Node</text>
      <path d="M 245 250 L 245 220" stroke="#4CAF50" stroke-width="2"/>
      <line x1="245" y1="250" x2="245" y2="220" stroke="#4CAF50" stroke-width="2"/>
    </annotate>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="240 220" begin="-0.5s" dur="1s"/>
  </g>
  <g id="tree-7">
    <rect class="leaf" x="340" y="220" width="20" height="20"/>
    <annotate> 
      <text x="345" y="240" font-size="16" font-family="Arial" text-anchor="middle" fill="#4CAF50">Leaf Node</text>
      <path d="M 345 250 L 345 220" stroke="#4CAF50" stroke-width="2"/>
      <line x1="345" y1="250" x2="345" y2="220" stroke="#4CAF50" stroke-width="2"/>
    </annotate>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="340 220" begin="-0.5s" dur="1s"/>
  </g>
  <text x="10" y="380" font-size="24" font-family="Arial" text-anchor="middle" fill="#4CAF50">Representation of Binary Trees</text>
  <text x="10" y="420" font-size="18" font-family="Arial" text-anchor="middle" fill="#4CAF50">Data Structures - Computer Science</text>
</svg>