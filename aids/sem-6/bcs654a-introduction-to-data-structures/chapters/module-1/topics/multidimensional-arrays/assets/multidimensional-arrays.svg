<svg width="420" height="400" data-topic-id="multidimensional-arrays">
    <style>
        /* Gradient background */
        .gradient {
            background-image: linear-gradient(to bottom, #6c5ce7, #2196f3, #f7f7f7);
            background-size: 100% 100%;
            height: 100%;
        }
        
        /* Section styles */
        .section {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        /* Animation styles */
        .animate {
            animation: anim 2s;
        }
        
        @keyframes anim {
            0% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(10px);
            }
            100% {
                transform: translateX(0);
            }
        }
    </style>
    
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1" />
            <stop offset="100%" stop-color="#2196f3" stop-opacity="1" />
            <stop offset="100%" stop-color="#f7f7f7" stop-opacity="1" />
        </linearGradient>
    </defs>
    
    <rect class="gradient" x="0" y="0" width="100%" height="100%" />
    
    <text x="20" y="20" font-size="24" font-weight="bold">Multidimensional Arrays</text>
    
    <section class="section" data-narration="Introduction to Multidimensional Arrays">
        <h2>Introduction to Multidimensional Arrays</h2>
        <p>A multidimensional array is an array of arrays. While one-dimensional arrays represent linear sequences of elements, multidimensional arrays extend this concept to represent data in multiple dimensions, such as tables (2D), cubes (3D), or higher-dimensional structures.</p>
    </section>
    
    <section class="section" data-narration="Two-Dimensional Arrays">
        <h2>Two-Dimensional Arrays</h2>
        <p>A two-dimensional array is the most common type of multidimensional array. It can be visualized as a table with rows and columns.</p>
        <svg width="100" height="100">
            <circle cx="50" cy="50" r="40" fill="#ccc" />
            <text x="50" y="60" font-size="18">Rows</text>
            <text x="50" y="80" font-size="18">Columns</text>
        </svg>