<svg width="420" height="400" data-topic-id="21-23" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F7D2C4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <!-- Title at top -->
  <text x="50%" y="10%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2E4053">
    Arrays in Programming
  </text>
  <!-- Section 1: Introduction to Arrays -->
  <section data-narration="Introduction to Arrays">
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="200" height="50" fill="#F7D2C4" rx="5"/>
      <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Arrays
      </text>
      <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        A collection of elements of the same data type
      </text>
      <animate transform="rotate(360 20 20)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <!-- Section 2: One-Dimensional Arrays -->
  <section data-narration="One-Dimensional Arrays">
    <g transform="translate(220, 50)">
      <rect x="0" y="0" width="200" height="50" fill="#46A5E9" rx="5"/>
      <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        One-Dimensional Arrays
      </text>
      <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Storing elements in a single row or column
      </text>
      <animate transform="rotate(360 25 25)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <!-- Section 3: Operations on One-Dimensional Arrays -->
  <section data-narration="Operations on One-Dimensional Arrays">
    <g transform="translate(220, 110)">
      <rect x="0" y="0" width="200" height="50" fill="#F7D2C4" rx="5"/>
      <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Indexing
      </text>
      <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Accessing elements using their index
      </text>
      <animate transform="rotate(360 25 25)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="10" y="60" width="50" height="50" fill="#46A5E9" rx="5"/>
      <text x="15" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Assigning values
      </text>
      <text x="15" y="90" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Assigning a new value to an element using its index
      </text>
      <animate transform="rotate(360 30 30)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <!-- Section 4: Two-Dimensional Arrays -->
  <section data-narration="Two-Dimensional Arrays">
    <g transform="translate(220, 190)">
      <rect x="0" y="0" width="200" height="50" fill="#46A5E9" rx="5"/>
      <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Two-Dimensional Arrays
      </text>
      <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Storing elements in a matrix
      </text>
      <animate transform="rotate(360 25 25)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <!-- Section 5: Importance of Arrays -->
  <section data-narration="Importance of Arrays">
    <g transform="translate(220, 250)">
      <rect x="0" y="0" width="200" height="50" fill="#F7D2C4" rx="5"/>
      <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Importance of Arrays
      </text>
      <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Storing data in a spreadsheet or table
      </text>
      <animate transform="rotate(360 25 25)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion">
    <g transform="translate(220, 310)">
      <rect x="0" y="0" width="200" height="50" fill="#46A5E9" rx="5"/>
      <text x="10" y="20" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Conclusion
      </text>
      <text x="10" y="40" font-size="18" font-family="Arial" text-anchor="start" fill="#2E4053">
        Arrays are a fundamental data structure in programming
      </text>
      <animate transform="rotate(360 25 25)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
  </section>
  <!-- Footer -->
  <g transform="translate(0, 380)">
    <rect x="0" y="0" width="420" height="20" fill="#2E4053" rx="5"/>
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="start" fill="#F7D2C4">
      Created by [Your Name]
    </text>
  </g>
</svg>