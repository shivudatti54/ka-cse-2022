<svg width="420" height="400" data-topic-id="123-128" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" style="overflow: visible;">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="30" fill="#3498db" rx="5" style="stroke: #fff; stroke-width: 2;" />
  <text x="20" y="25" font-size="24" font-family="Arial Black" text-anchor="left" fill="#fff" style="opacity: 0.8;">Data Structure: Arrays (121-128)</text>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="1" />
      <stop offset="100%" stop-color="#4682b4" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="40" width="420" height="320" fill="url(#gradient)" rx="5" style="stroke: #fff; stroke-width: 2;" />
  
  <!-- Section 1: Introduction to Arrays -->
  <rect x="10" y="50" width="400" height="50" fill="#f9f9f9" rx="5" style="stroke: #ccc; stroke-width: 1;" />
  <text x="20" y="70" font-size="18" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.8;">Introduction to Arrays</text>
  <text x="20" y="100" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">Definition</text>
  <text x="20" y="130" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">Array is a collection of elements of the same data type stored in contiguous memory locations</text>
  <text x="20" y="160" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">It is a fundamental data structure in programming, allowing for efficient storage and manipulation of data</text>
  <animate transform="rotate(360 20 170)" begin="0s" dur="2s" fill="freeze" repeatCount="indefinite" />
  
  <!-- Section 2: Characteristics of Arrays -->
  <rect x="10" y="220" width="400" height="50" fill="#f9f9f9" rx="5" style="stroke: #ccc; stroke-width: 1;" />
  <text x="20" y="250" font-size="18" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.8;">Characteristics</text>
  <text x="20" y="280" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- A collection of elements of the same data type</text>
  <text x="20" y="310" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Elements are stored in contiguous memory locations</text>
  <text x="20" y="340" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Array indices are used to access and manipulate elements</text>
  <animate transform="rotate(72 20 280)" begin="1s" dur="2s" fill="freeze" repeatCount="indefinite" />
  
  <!-- Section 3: Types of Arrays -->
  <rect x="10" y="390" width="400" height="50" fill="#f9f9f9" rx="5" style="stroke: #ccc; stroke-width: 1;" />
  <text x="20" y="420" font-size="18" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.8;">Types of Arrays</text>
  <text x="20" y="450" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- One-Dimensional Arrays</text>
  <text x="20" y="480" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Two-Dimensional Arrays</text>
  <animate transform="rotate(144 20 480)" begin="2s" dur="2s" fill="freeze" repeatCount="indefinite" />
  
  <!-- Section 4: Benefits of Arrays -->
  <rect x="10" y="520" width="400" height="50" fill="#f9f9f9" rx="5" style="stroke: #ccc; stroke-width: 1;" />
  <text x="20" y="550" font-size="18" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.8;">Benefits</text>
  <text x="20" y="590" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Efficient storage and manipulation of data</text>
  <text x="20" y="620" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Fast access and modification of elements</text>
  <text x="20" y="650" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Allow for dynamic memory allocation</text>
  <animate transform="rotate(216 20 650)" begin="3s" dur="2s" fill="freeze" repeatCount="indefinite" />
  
  <!-- Section 5: Initializing an Array -->
  <rect x="10" y="710" width="400" height="50" fill="#f9f9f9" rx="5" style="stroke: #ccc; stroke-width: 1;" />
  <text x="20" y="740" font-size="18" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.8;">Initializing an Array</text>
  <text x="20" y="790" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Direct Initialization</text>
  <text x="20" y="820" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Elements are initialized directly when the array is declared</text>
  <text x="20" y="850" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Indirect Initialization</text>
  <text x="20" y="880" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Elements are initialized using an array of initial values</text>
  <animate transform="rotate(288 20 880)" begin="4s" dur="2s" fill="freeze" repeatCount="indefinite" />
  
  <!-- Section 6: Working with One-Dimensional Arrays -->
  <rect x="10" y="950" width="400" height="50" fill="#f9f9f9" rx="5" style="stroke: #ccc; stroke-width: 1;" />
  <text x="20" y="980" font-size="18" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.8;">Working with One-Dimensional Arrays</text>
  <text x="20" y="1030" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Indexing</text>
  <text x="20" y="1060" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Array operations</text>
  <text x="20" y="1090" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Operations can be performed on arrays, such as adding or multiplying elements</text>
  <animate transform="rotate(360 20 1090)" begin="5s" dur="2s" fill="freeze" repeatCount="indefinite" />
  
  <!-- Section 7: Working with Two-Dimensional Arrays -->
  <rect x="10" y="1110" width="400" height="50" fill="#f9f9f9" rx="5" style="stroke: #ccc; stroke-width: 1;" />
  <text x="20" y="1140" font-size="18" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.8;">Working with Two-Dimensional Arrays</text>
  <text x="20" y="1190" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Accessing Elements</text>
  <text x="20" y="1220" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Indexing is used to access elements</text>
  <text x="20" y="1250" font-size="14" font-family="Arial" text-anchor="left" fill="#666" style="opacity: 0.6;">- Array operations can be performed on 2D arrays</text>
  <animate transform="rotate(432 20 1250)" begin="6s" dur="2s" fill="freeze" repeatCount="indefinite" />
  
  <!-- Footer -->
  <rect x="10" y="3540" width="400" height="30" fill="#3498db" rx="5" style="stroke: #fff; stroke-width: 2;" />
  <text x="20" y="3555" font-size="18" font-family="Arial Black" text-anchor="left" fill="#fff" style="opacity: 0.8;">Data Structure: Arrays (121-128)</text>
</svg>