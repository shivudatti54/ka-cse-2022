<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="textbook-2-ch" version="1.1">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
        </linearGradient>
        <style>
            .array-rect {
                fill: url(#pastel-gradient);
                transition: fill 0.5s ease-in-out;
            }
            .array-text {
                font-size: 14px;
                font-weight: bold;
                text-anchor: middle;
                fill: #2F4F7F;
            }
            .array-description {
                fill: #2F4F7F;
                font-size: 12px;
                text-anchor: middle;
            }
            .arrow {
                stroke: #FF9900;
                stroke-width: 2;
                fill: none;
            }
        </style>
    </defs>
    <rect x="10" y="10" width="400" height="380" class="array-rect"/>
    <g class="array-section" data-narration="Introduction to Arrays">
        <rect x="10" y="50" width="90" height="30" rx="5" class="array-rect"/>
        <text x="50" y="60" class="array-text">Definition:</text>
        <text x="50" y="80" class="array-text">An array is a collection of elements of the same data type stored in contiguous memory locations.</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2s" begin="0s"/>
    </g>
    <g class="array-section" data-narration="Characteristics">
        <rect x="120" y="50" width="90" height="30" rx="5" class="array-rect"/>
        <text x="150" y="60" class="array-text">Ordered collections of elements:</text>
        <text x="150" y="80" class="array-text">Arrays are ordered collections of elements.</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="220,0" dur="2s" begin="0s"/>
    </g>
    <g class="array-section" data-narration="Types of Arrays">
        <rect x="10" y="150" width="90" height="30" rx="5" class="array-rect"/>
        <text x="50" y="160" class="array-text">One-Dimensional Arrays:</text>
        <rect x="50" y="170" width="20" height="10" rx="2.5" class="array-rect"/>
        <text x="70" y="180" class="array-text">Example: int arr[] = {1, 2, 3, 4, 5};</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="120,0" dur="2s" begin="0s"/>
        <rect x="120" y="150" width="90" height="30" rx="5" class="array-rect"/>
        <text x="150" y="160" class="array-text">Two-Dimensional Arrays:</text>
        <rect x="150" y="170" width="20" height="10" rx="2.5" class="array-rect"/>
        <text x="170" y="180" class="array-text">Example: int arr[2][3] = {{1, 2, 3}, {4, 5, 6}};</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="220,0" dur="2s" begin="1s"/>
    </g>
    <g class="array-section" data-narration="Initializing Arrays">
        <rect x="10" y="300" width="90" height="30" rx="5" class="array-rect"/>
        <text x="50" y="310" class="array-text">Initializing One-Dimensional Arrays:</text>
        <text x="50" y="330" class="array-text">datatype arr[size];</text>
        <text x="50" y="350" class="array-text">Example: int arr[5];</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2s" begin="2s"/>
    </g>
    <g class="array-section" data-narration="Accessing Elements in a One-Dimensional Array">
        <rect x="120" y="300" width="90" height="30" rx="5" class="array-rect"/>
        <text x="150" y="310" class="array-text">Accessing Elements:</text>
        <text x="150" y="330" class="array-text">arr[i] = element at index i</text>
        <text x="150" y="350" class="array-text">Example: arr[0] = 10;</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="220,0" dur="2s" begin="3s"/>
    </g>
    <g class="array-description">
        <rect x="10" y="380" width="400" height="20" class="array-rect"/>
        <text x="50" y="390" class="array-description">Note: Arrays are mutable, meaning their elements can be modified after creation.</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="2s" begin="4s"/>
    </g>
    <g class="arrow" transform="rotate(45 210 360)">
        <line x1="210" y1="360" x2="210" y2="360"/>
        <line x1="210" y1="360" x2="210" y2="360"/>
    </g>
    <g class="arrow" transform="rotate(45 210 180)">
        <line x1="210" y1="180" x2="210" y2="180"/>
        <line x1="210" y1="180" x2="210" y2="180"/>
    </g>
    <g class="arrow" transform="rotate(45 210 0)">
        <line x1="210" y1="0" x2="210" y2="0"/>
        <line x1="210" y1="0" x2="210" y2="0"/>
    </g>
    <g class="footer">
        <text x="50" y="400" class="array-text">Textbook 2 Ch</text>
    </g>
</svg>