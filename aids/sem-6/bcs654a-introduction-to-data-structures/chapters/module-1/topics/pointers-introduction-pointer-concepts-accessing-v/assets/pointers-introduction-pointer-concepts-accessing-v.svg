<svg 
  width="420" 
  height="400" 
  data-topic-id="pointers-introduction-pointer-concepts-accessing-v" 
  xmlns="http://www.w3.org/2000/svg" 
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 420 400"
  style="overflow: hidden;">
  <defs>
    <linearGradient id="pastel-color" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6"/>
      <stop offset="100%" stop-color="#C9E4CA"/>
    </linearGradient>
  </defs>
  <title>Pointers Introduction Pointer Concepts Accessing V</title>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-color)"/>
  <g transform="translate(10, 20)">
    <text x="10" y="70" font-size="24" fill="#2F4F7F" font-family="Arial, sans-serif">Introduction to Pointers</text>
    <rect x="10" y="100" width="400" height="150" fill="#F7F7F7" rx="5" />
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0,100" 
      to="0,120" 
      dur="2s" 
      begin="-1s" 
      repeatCount="indefinite" 
      style="display:none"/>
    <g id="section1">
      <rect x="10" y="150" width="400" height="50" fill="#F7F7F7" rx="5" />
      <rect x="10" y="160" width="400" height="45" fill="#F7F7F7" rx="5" />
      <text x="10" y="190" font-size="18" fill="#2F4F7F" font-family="Arial, sans-serif" data-narration="Definition: A pointer is a variable that stores the memory address of another variable.">
        <tspan x="10" y="190" font-size="18" fill="#2F4F7F">Definition:</tspan>
        <tspan x="10" y="210" font-size="18" fill="#2F4F7F" x-foreign-object-x="10" y-foreign-object-y="190">A pointer is a variable that stores the memory address of another variable.</tspan>
      </text>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,160" 
        to="0,180" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
    </g>
    <g id="section2">
      <rect x="10" y="220" width="400" height="50" fill="#F7F7F7" rx="5" />
      <rect x="10" y="230" width="400" height="45" fill="#F7F7F7" rx="5" />
      <text x="10" y="270" font-size="18" fill="#2F4F7F" font-family="Arial, sans-serif" data-narration="Purpose of Pointers: Pointers enable the manipulation of variables without directly accessing their memory locations.">
        <tspan x="10" y="270" font-size="18" fill="#2F4F7F">Purpose of Pointers:</tspan>
        <tspan x="10" y="290" font-size="18" fill="#2F4F7F" x-foreign-object-x="10" y-foreign-object-y="270">Pointers enable the manipulation of variables without directly accessing their memory locations.</tspan>
      </text>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,230" 
        to="0,250" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
    </g>
    <g id="section3">
      <rect x="10" y="300" width="400" height="50" fill="#F7F7F7" rx="5" />
      <rect x="10" y="310" width="400" height="45" fill="#F7F7F7" rx="5" />
      <text x="10" y="350" font-size="18" fill="#2F4F7F" font-family="Arial, sans-serif" data-narration="Key Characteristics of Pointers: Pointers can be dereferenced to access the value stored at the memory address, and they can be incremented and decremented to change the memory address.">
        <tspan x="10" y="350" font-size="18" fill="#2F4F7F">Key Characteristics of Pointers:</tspan>
        <tspan x="10" y="370" font-size="18" fill="#2F4F7F" x-foreign-object-x="10" y-foreign-object-y="350">Pointers can be dereferenced to access the value stored at the memory address, and they can be incremented and decremented to change the memory address.</tspan>
      </text>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,310" 
        to="0,330" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
    </g>
    <g id="section4">
      <rect x="10" y="400" width="400" height="50" fill="#F7F7F7" rx="5" />
      <rect x="10" y="410" width="400" height="45" fill="#F7F7F7" rx="5" />
      <text x="10" y="450" font-size="18" fill="#2F4F7F" font-family="Arial, sans-serif" data-narration="Types of Pointers: There are three types of pointers: dereferenced pointers, indirect pointers, and null pointers.">
        <tspan x="10" y="450" font-size="18" fill="#2F4F7F">Types of Pointers:</tspan>
        <tspan x="10" y="470" font-size="18" fill="#2F4F7F" x-foreign-object-x="10" y-foreign-object-y="450">There are three types of pointers: dereferenced pointers, indirect pointers, and null pointers.</tspan>
      </text>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,410" 
        to="0,430" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
    </g>
    <g id="section5">
      <rect x="10" y="500" width="400" height="50" fill="#F7F7F7" rx="5" />
      <rect x="10" y="510" width="400" height="45" fill="#F7F7F7" rx="5" />
      <text x="10" y="550" font-size="18" fill="#2F4F7F" font-family="Arial, sans-serif" data-narration="Pointer Operations: Pointers can be assigned a value, and they can be incremented and decremented to change the memory address.">
        <tspan x="10" y="550" font-size="18" fill="#2F4F7F">Pointer Operations:</tspan>
        <tspan x="10" y="570" font-size="18" fill="#2F4F7F" x-foreign-object-x="10" y-foreign-object-y="550">Pointers can be assigned a value, and they can be incremented and decremented to change the memory address.</tspan>
      </text>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,510" 
        to="0,530" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
    </g>
    <g id="section6">
      <rect x="10" y="600" width="400" height="50" fill="#F7F7F7" rx="5" />
      <rect x="10" y="610" width="400" height="45" fill="#F7F7F7" rx="5" />
      <text x="10" y="650" font-size="18" fill="#2F4F7F" font-family="Arial, sans-serif" data-narration="Pointer Applications: Pointers are used in various applications, including dynamic memory allocation, array indexing, and function passing.">
        <tspan x="10" y="650" font-size="18" fill="#2F4F7F">Pointer Applications:</tspan>
        <tspan x="10" y="670" font-size="18" fill="#2F4F7F" x-foreign-object-x="10" y-foreign-object-y="650">Pointers are used in various applications, including dynamic memory allocation, array indexing, and function passing.</tspan>
      </text>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,610" 
        to="0,630" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
    </g>
    <g id="section7">
      <rect x="10" y="700" width="400" height="50" fill="#F7F7F7" rx="5" />
      <rect x="10" y="710" width="400" height="45" fill="#F7F7F7" rx="5" />
      <text x="10" y="750" font-size="18" fill="#2F4F7F" font-family="Arial, sans-serif" data-narration="Dynamic Memory Allocation Functions: Pointers are used in dynamic memory allocation functions, such as malloc and free, to manage memory allocation and deallocation.">
        <tspan x="10" y="750" font-size="18" fill="#2F4F7F">Dynamic Memory Allocation Functions:</tspan>
        <tspan x="10" y="770" font-size="18" fill="#2F4F7F" x-foreign-object-x="10" y-foreign-object-y="750">Pointers are used in dynamic memory allocation functions, such as malloc and free, to manage memory allocation and deallocation.</tspan>
      </text>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,710" 
        to="0,730" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
    </g>
    <g id="footer">
      <rect x="10" y="830" width="400" height="50" fill="#F7F7F7" rx="5" />
      <text x="10" y="870" font-size="18" fill="#2F4F7F" font-family="Arial, sans-serif">Author: [Your Name]</text>
    </g>
    <g id="arrow-markers">
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,0" 
        to="0,10" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="10,0" 
        to="20,0" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0,10" 
        to="10,20" 
        dur="2s" 
        begin="-1s" 
        repeatCount="indefinite" 
        style="display:none"/>
    </g>
  </g>
</svg>