<svg width="420" height="400" data-topic-id="textbook-1-ch" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C0B9E7" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <title>Textbook 1 Ch</title>

    <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>

    <section id="introduction-to-arrays" data-narration="Introduction to Arrays">
        <rect x="60" y="50" width="300" height="50" fill="#F7D2C4" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,50" to="60,50" dur="2s" begin="0s"/>
        <text x="150" y="70" font-size="24" fill="#F7D2C4" text-anchor="middle">An array is a collection of elements of the same data type stored in contiguous memory locations.</text>
        <animateTransform attributeName="transform" type="translate" from="60,70" to="60,50" dur="2s" begin="2s"/>
    </section>

    <section id="characteristics-of-arrays" data-narration="Characteristics of Arrays">
        <rect x="60" y="150" width="300" height="50" fill="#F7D2C4" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,150" to="60,150" dur="2s" begin="4s"/>
        <text x="150" y="170" font-size="24" fill="#F7D2C4" text-anchor="middle">Arrays provide efficient means of storing and accessing large amounts of data.</text>
        <animateTransform attributeName="transform" type="translate" from="60,170" to="60,150" dur="2s" begin="6s"/>
        <line x1="120" y1="180" x2="240" y2="180" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
    </section>

    <section id="types-of-arrays" data-narration="Types of Arrays">
        <rect x="60" y="220" width="300" height="50" fill="#F7D2C4" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,220" to="60,220" dur="2s" begin="8s"/>
        <text x="150" y="240" font-size="24" fill="#F7D2C4" text-anchor="middle">One-dimensional arrays store elements in a single row or column.</text>
        <animateTransform attributeName="transform" type="translate" from="60,240" to="60,220" dur="2s" begin="10s"/>
        <line x1="120" y1="250" x2="240" y2="250" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
        <line x1="120" y1="280" x2="240" y2="280" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
    </section>

    <section id="one-dimensional-arrays" data-narration="One-Dimensional Arrays">
        <rect x="60" y="300" width="300" height="50" fill="#F7D2C4" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,300" to="60,300" dur="2s" begin="12s"/>
        <text x="150" y="320" font-size="24" fill="#F7D2C4" text-anchor="middle">Each element is identified by an index that corresponds to its position in the array.</text>
        <animateTransform attributeName="transform" type="translate" from="60,320" to="60,300" dur="2s" begin="14s"/>
        <line x1="120" y1="350" x2="240" y2="350" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
    </section>

    <section id="two-dimensional-arrays" data-narration="Two-Dimensional Arrays">
        <rect x="60" y="380" width="300" height="50" fill="#F7D2C4" rx="10"/>
        <animateTransform attributeName="transform" type="translate" from="0,380" to="60,380" dur="2s" begin="16s"/>
        <text x="150" y="400" font-size="24" fill="#F7D2C4" text-anchor="middle">Two-dimensional arrays store elements in multiple rows and columns.</text>
        <animateTransform attributeName="transform" type="translate" from="60,400" to="60,380" dur="2s" begin="18s"/>
        <line x1="120" y1="410" x2="240" y2="410" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
        <line x1="120" y1="450" x2="240" y2="450" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
    </section>

    <footer>
        <ellipse cx="210" cy="410" rx="30" ry="10" fill="#87CEEB" stroke="#87CEEB" stroke-width="2"/>
        <text x="210" y="420" font-size="24" fill="#87CEEB" text-anchor="middle">Textbook 1 Ch</text>
    </footer>
</svg>