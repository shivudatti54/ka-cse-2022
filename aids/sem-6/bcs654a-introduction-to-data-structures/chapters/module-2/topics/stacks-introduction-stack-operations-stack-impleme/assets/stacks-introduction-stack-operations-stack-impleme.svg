  <!-- Section 1: Introduction to Stacks -->
  <rect x="10" y="50" width="400" height="100" fill="#F7D2C4" rx="10" />
  <text x="20" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#7A288A" data-narration="A stack is a linear data structure that follows the Last-In-First-Out (LIFO) principle. This means that the last element added to the stack will be the first one to be removed. Stacks are named after the concept of a stack of plates, where plates are added and removed from the top of the stack.">
    Introduction to Stacks
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 70" to="0 210 160" dur="3000" begin="0s" />
  
  <!-- Section 2: Stack Operations -->
  <rect x="10" y="170" width="400" height="100" fill="#F7D2C4" rx="10" />
  <rect x="10" y="270" width="400" height="100" fill="#F7D2C4" rx="10" />
  <text x="20" y="290" font-size="18" font-family="Arial" text-anchor="start" fill="#7A288A" data-narration="Stacks support the following operations:
    <ul>
      <li>Push: Adds an element to the top of the stack.</li>
      <li>Pop: Removes the top element from the stack.</li>
      <li>Peek: Returns the top element from the stack without removing it.</li>
      <li>IsEmpty: Checks if the stack is empty.</li>
      <li>Size: Returns the number of elements in the stack.</li>
    </ul>
    ">
    Stack Operations
  </text>
  <text x="20" y="290" font-size="18" font-family="Arial" text-anchor="start" fill="#4682B4" data-narration="Here is an example implementation of a stack using an array in Python:
    ```python
class Stack:
    def __init__(self, max_size):
        self.max_size = max_size
        self.stack = [None] * max_size

    def push(self, element):
        if self.is_full():
            print("Stack is full. Cannot push element.")
        else:
            self.stack.append(element)

    def pop(self):
        if self.is_empty():
            print("Stack is empty. Cannot pop element.")
        else:
            return self.stack.pop()

    def peek(self):
        if self.is_empty():
            print("Stack is empty. Cannot peek element.")
        else:
            return self.stack[-1]

    def is_empty(self):
        return self.stack[0] is None

    def is_full(self):
        return self.stack[-1] is not None

    def size(self):
        return len(self.stack) - 1
```
    ">
    Python Implementation
  </text>
