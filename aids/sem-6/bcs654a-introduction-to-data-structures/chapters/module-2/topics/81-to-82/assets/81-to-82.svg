<svg width="420" height="400" data-topic-id="81-to-82-linked-lists-and-8-2-stacks-and-queues">
  <!-- Title -->
  <title>Linked Lists and Stacks and Queues</title>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10"/>

  <!-- Container -->
  <g transform="translate(20, 20)">
    <!-- Section 1: Definition -->
    <section data-narration="Definition of Linked Lists">
      <rect x="0" y="0" width="360" height="100" fill="#87CEEB" rx="10"/>
      <text x="10" y="30" font-size="24" font-family="Arial" fill="#000" text-anchor="start">Linked Lists</text>
      <text x="10" y="50" font-size="18" font-family="Arial" fill="#000" text-anchor="start">A linear collection of data elements whose order is not given by their physical placement in memory.</text>
    </section>

    <!-- Section 2: Characteristics -->
    <section data-narration="Characteristics of Linked Lists">
      <rect x="0" y="150" width="360" height="100" fill="#C7B8EA" rx="10"/>
      <text x="10" y="170" font-size="24" font-family="Arial" fill="#000" text-anchor="start">Types of Linked Lists</text>
      <text x="10" y="190" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Singly Linked List: Each node only points to the next node in the sequence.</text>
      <text x="10" y="210" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Doubly Linked List: Each node points to both the next and previous nodes in the sequence.</text>
    </section>

    <!-- Section 3: Operations -->
    <section data-narration="Operations on Linked Lists">
      <rect x="0" y="300" width="360" height="100" fill="#FFC107" rx="10"/>
      <text x="10" y="320" font-size="24" font-family="Arial" fill="#000" text-anchor="start">Insertion</text>
      <text x="10" y="340" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Deletion</text>
      <text x="10" y="360" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Traversal</text>
    </section>

    <!-- Section 4: Example -->
    <section data-narration="Example of a Linked List">
      <rect x="0" y="400" width="360" height="100" fill="#8BC34A" rx="10"/>
      <text x="10" y="420" font-size="24" font-family="Arial" fill="#000" text-anchor="start">Example Code</text>
      <text x="10" y="440" font-size="18" font-family="Arial" fill="#000" text-anchor="start">
        <animateTransform attributeName="x" from="10" to="60" dur="2s" begin="0s" repeatCount="indefinite"/>
        <animateTransform attributeName="y" from="420" to="460" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        <text x="60" y="450" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Node</text>
        <text x="120" y="450" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Next Node</text>
      </text>
    </section>

    <!-- Section 5: Animation -->
    <section data-narration="Animation of Linked List">
      <rect x="0" y="500" width="360" height="100" fill="#2196F3" rx="10"/>
      <text x="10" y="520" font-size="24" font-family="Arial" fill="#000" text-anchor="start">Traversal Animation</text>
      <animateTransform attributeName="x" from="10" to="340" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="y" from="520" to="580" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      <line x1="10" y1="540" x2="340" y2="580" stroke="#000" stroke-width="2" stroke-dasharray="3,3"/>
    </section>

    <!-- Section 6: Arrow Markers -->
    <section data-narration="Arrow Markers for Linked List">
      <rect x="0" y="600" width="360" height="100" fill="#FF9801" rx="10"/>
      <text x="10" y="620" font-size="24" font-family="Arial" fill="#000" text-anchor="start">Arrow Markers</text>
      <line x1="20" y1="650" x2="120" y2="700" stroke="#000" stroke-width="2" stroke-dasharray="3,3"/>
      <line x1="200" y1="650" x2="300" y2="700" stroke="#000" stroke-width="2" stroke-dasharray="3,3"/>
    </section>

    <!-- Footer -->
    <footer>
      <text x="10" y="620" font-size="18" font-family="Arial" fill="#000" text-anchor="start">Linked Lists and Stacks and Queues</text>
    </footer>
  </g>
</svg>