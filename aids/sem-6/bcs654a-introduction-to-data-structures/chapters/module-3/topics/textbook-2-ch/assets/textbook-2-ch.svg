<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="introduction-to-linked-lists" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap");

    .container {
      max-width: 420px;
      margin: 40px auto;
      background-color: #3B95C5;
      background-image: linear-gradient(to top, #6d85c7, #e6e6e6);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .section-definition {
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    .data-topic-id {
      font-weight: 700;
      font-size: 18px;
      color: #333;
      margin-bottom: 10px;
    }

    .animation {
      fill: #5C7F9F;
      transition: fill 0.5s ease-in-out;
    }

    .animation.animate {
      fill: #0A80E6;
    }
  </style>

  <g id="linked-list-diagram">
    <rect width="100%" height="100%" fill="#3B95C5" rx="10" />
    <rect x="10" y="10" width="400" height="380" fill="#e6e6e6" rx="10" />
    <g id="header">
      <text x="50%" y="20" text-anchor="middle" font-size="24" font-weight="600" fill="#333">Introduction to Linked Lists</text>
    </g>
    <g id="footer">
      <text x="50%" y="380" text-anchor="middle" font-size="18" fill="#333">Version 2.0</text>
    </g>
    <g id="data-topic-id">
      <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#333" class="data-topic-id">introduction-to-linked-lists</text>
    </g>
    <g id="/node-list">
      <path id="node-1" d="M 30 100 L 50 130" fill="#5C7F9F" class="animation" />
      <path id="node-2" d="M 50 130 L 70 150" fill="#5C7F9F" class="animation" />
      <path id="node-3" d="M 70 150 L 90 170" fill="#5C7F9F" class="animation" />
      <path id="node-4" d="M 90 170 L 110 190" fill="#5C7F9F" class="animation" />
      <path id="node-5" d="M 110 190 L 130 210" fill="#5C7F9F" class="animation" />
    </g>
    <g id="section-1">
      <rect x="10" y="60" width="380" height="30" fill="#fff" rx="5" />
      <text x="20" y="15" text-anchor="start" font-size="16" font-weight="400" fill="#333" class="section-definition">What is a Linked List?</text>
      <animate attributeName="fill" from="#5C7F9F" to="#0A80E6" begin="0s" dur="2s" />
    </g>
    <g id="section-2">
      <rect x="10" y="120" width="380" height="30" fill="#fff" rx="5" />
      <text x="20" y="15" text-anchor="start" font-size="16" font-weight="400" fill="#333" class="section-definition">Dynamic Memory Allocation</text>
      <animate attributeName="fill" from="#5C7F9F" to="#0A80E6" begin="2s" dur="2s" />
    </g>
    <g id="section-3">
      <rect x="10" y="180" width="380" height="30" fill="#fff" rx="5" />
      <text x="20" y="15" text-anchor="start" font-size="16" font-weight="400" fill="#333" class="section-definition">Efficient Insertion and Deletion</text>
      <animate attributeName="fill" from="#5C7F9F" to="#0A80E6" begin="4s" dur="2s" />
    </g>
    <g id="section-4">
      <rect x="10" y="240" width="380" height="30" fill="#fff" rx="5" />
      <text x="20" y="15" text-anchor="start" font-size="16" font-weight="400" fill="#333" class="section-definition">Types of Linked Lists</text>
      <animate attributeName="fill" from="#5C7F9F" to="#0A80E6" begin="6s" dur="2s" />
    </g>
    <g id="section-5">
      <rect x="10" y="300" width="380" height="30" fill="#fff" rx="5" />
      <text x="20" y="15" text-anchor="start" font-size="16" font-weight="400" fill="#333" class="section-definition">Singly Linked List</text>
      <animate attributeName="fill" from="#5C7F9F" to="#0A80E6" begin="8s" dur="2s" />
    </g>
    <g id="section-6">
      <rect x="10" y="360" width="380" height="30" fill="#fff" rx="5" />
      <text x="20" y="15" text-anchor="start" font-size="16" font-weight="400" fill="#333" class="section-definition">Doubly Linked List</text>
      <animate attributeName="fill" from="#5C7F9F" to="#0A80E6" begin="10s" dur="2s" />
    </g>
  </g>

  <g id="node-1-connection">
    <path d="M 30 100 L 50 130" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>
  <g id="node-2-connection">
    <path d="M 50 130 L 70 150" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>
  <g id="node-3-connection">
    <path d="M 70 150 L 90 170" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>
  <g id="node-4-connection">
    <path d="M 90 170 L 110 190" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>
  <g id="node-5-connection">
    <path d="M 110 190 L 130 210" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>

  <g id="node-1-arrow">
    <path d="M 50 130 L 70 150" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>
  <g id="node-2-arrow">
    <path d="M 90 170 L 110 190" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>
  <g id="node-3-arrow">
    <path d="M 130 210 L 150 230" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>
  <g id="node-4-arrow">
    <path d="M 150 230 L 170 250" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>
  <g id="node-5-arrow">
    <path d="M 170 250 L 190 270" fill="#333" stroke="#5C7F9F" stroke-width="2" />
  </g>

  <g id="title">
    <text x="50%" y="10%" text-anchor="middle" font-size="36" font-weight="700" fill="#333">Introduction to Linked Lists</text>
  </g>
  <g id="footer-text">
    <text x="50%" y="90%" text-anchor="middle" font-size="18" fill="#333">Version 2.0</text>
  </g>
</svg>