<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" data-topic-id="linked-lists-91-to-92-93">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CCFFCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2FF FC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9F5F5" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        height: 150px;
        display: inline-block;
        margin: 20px;
        border: 1px solid #C9E4CA;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        background: linear-gradient(to bottom, var(--pastel-gradient) 50%, #C9F5F5);
        padding: 20px;
        transition: background 0.5s ease;
      }
      .section:hover {
        background: linear-gradient(to bottom, var(--pastel-gradient) 10%, #C9F5F5);
      }
      .arrow {
        fill: #03A9F4;
        stroke: #03A9F4;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <!-- Title -->
  <rect x="10" y="10" width="400" height="30" fill="#E9E9EA"/>
  <text x="20" y="25" font-size="24" font-family="Arial" fill="#333333" text-anchor="begin">Introduction to Linked Lists</text>

  <!-- Section 1: Introduction to Linked Lists -->
  <div class="section" data-narration="Introduction to Linked Lists">
    <rect x="10" y="60" width="400" height="80" fill="#E9E9EA"/>
    <text x="20" y="75" font-size="18" font-family="Arial" fill="#333333" text-anchor="begin">A linked list is a linear data structure where elements are linked together using pointers.</text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 120" begin="0s" dur="2s"/>
  </div>

  <!-- Section 2: Key Characteristics of Linked Lists -->
  <div class="section" data-narration="Key Characteristics of Linked Lists">
    <rect x="10" y="150" width="400" height="80" fill="#E9E9EA"/>
    <text x="20" y="165" font-size="18" font-family="Arial" fill="#333333" text-anchor="begin">Dynamic memory allocation, efficient insertion and deletion, and variable size.</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 210" begin="2s" dur="2s"/>
  </div>

  <!-- Section 3: Singly Linked List -->
  <div class="section" data-narration="Singly Linked List">
    <rect x="10" y="240" width="400" height="80" fill="#E9E9EA"/>
    <text x="20" y="255" font-size="18" font-family="Arial" fill="#333333" text-anchor="begin">Each node only points to the next node in the sequence.</text>
    <animateTransform attributeName="transform" type="translate" from="0 240" to="0 300" begin="4s" dur="2s"/>
  </div>

  <!-- Section 4: Insertion and Deletion -->
  <div class="section" data-narration="Insertion and Deletion">
    <rect x="10" y="330" width="400" height="80" fill="#E9E9EA"/>
    <text x="20" y="345" font-size="18" font-family="Arial" fill="#333333" text-anchor="begin">Insertion and deletion can be performed at any position.</text>
    <animateTransform attributeName="transform" type="translate" from="0 330" to="0 390" begin="6s" dur="2s"/>
  </div>

  <!-- Section 5: Traversal -->
  <div class="section" data-narration="Traversal">
    <rect x="10" y="420" width="400" height="80" fill="#E9E9EA"/>
    <text x="20" y="435" font-size="18" font-family="Arial" fill="#333333" text-anchor="begin">Visit each element in the list.</text>
    <animateTransform attributeName="transform" type="translate" from="0 420" to="0 480" begin="8s" dur="2s"/>
  </div>

  <!-- Footer -->
  <rect x="10" y="500" width="400" height="30" fill="#E9E9EA"/>
  <text x="20" y="515" font-size="18" font-family="Arial" fill="#333333" text-anchor="begin">Linked List Tutorial</text>
</svg>