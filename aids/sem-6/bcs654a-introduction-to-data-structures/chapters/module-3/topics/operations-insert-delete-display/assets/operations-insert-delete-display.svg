<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="operations-insert-delete-display">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" fill="url(#gradient)"/>
  <title>Operations Insert Delete Display</title>

  <!-- Introduction Section -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#ADD8E6" rx="10"/>
    <text x="20" y="25" font-size="24" font-family="Arial" font-weight="bold">Linked Lists Operations</text>
    <text x="20" y="35" font-size="18" font-family="Arial">Insert, Delete, Display</text>
  </section>

  <!-- Insert Operation Section -->
  <section data-narration="Insert Operation">
    <rect x="10" y="70" width="400" height="50" fill="#C7B8EA" rx="10"/>
    <rect x="10" y="70" width="150" height="30" fill="#ADD8E6" rx="10" transform="translate(10,70)">
      <text x="20" y="25" font-size="18" font-family="Arial">Insert at the beginning</text>
      <animateTransform attributeName="transform" type="translate" from="translate(10,70)" to="translate(170,70)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="170" y="70" width="30" height="30" fill="#C7B8EA" rx="10"/>
      <text x="180" y="95" font-size="18" font-family="Arial">Update head to point to new node</text>
      <animateTransform attributeName="transform" type="translate" from="translate(180,95)" to="translate(230,95)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
      <rect x="230" y="95" width="20" height="20" fill="#ADD8E6" rx="10"/>
      <text x="240" y="120" font-size="18" font-family="Arial">Update next pointer</text>
      <animateTransform attributeName="transform" type="translate" from="translate(240,120)" to="translate(280,120)" begin="1s" dur="2s" repeatCount="indefinite"/>
    </section>

  <!-- Insertion at the beginning Code Example Section -->
  <section data-narration="Insertion at the beginning Code Example">
    <rect x="10" y="120" width="400" height="50" fill="#C7B8EA" rx="10"/>
    <rect x="10" y="120" width="150" height="30" fill="#ADD8E6" rx="10" transform="translate(10,120)">
      <text x="20" y="25" font-size="18" font-family="Arial">Python Implementation</text>
      <code>
        class Node:
          def __init__(self, data=None):
            self.data = data
            self.next = None

        class LinkedList:
          def __init__(self):
            self.head = None

          def insert(self, data):
            new_node = Node(data)
            if self.head is None:
              self.head = new_node
      </code>
      <rect x="10" y="150" width="100" height="50" fill="#ADD8E6" rx="10"/>
      <text x="20" y="165" font-size="18" font-family="Arial">Output: 5 -> 1 -> 2 -> 3 -> 4</text>
  </section>

  <!-- Delete Operation Section -->
  <section data-narration="Delete Operation">
    <rect x="10" y="200" width="400" height="50" fill="#C7B8EA" rx="10"/>
    <rect x="10" y="200" width="150" height="30" fill="#ADD8E6" rx="10" transform="translate(10,200)">
      <text x="20" y="25" font-size="18" font-family="Arial">Delete at the beginning</text>
      <animateTransform attributeName="transform" type="translate" from="translate(10,200)" to="translate(170,200)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="170" y="200" width="30" height="30" fill="#C7B8EA" rx="10"/>
      <text x="180" y="225" font-size="18" font-family="Arial">Update head to point to next node</text>
      <animateTransform attributeName="transform" type="translate" from="translate(180,225)" to="translate(230,225)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
      <rect x="230" y="225" width="20" height="20" fill="#ADD8E6" rx="10"/>
      <text x="240" y="240" font-size="18" font-family="Arial">Update next pointer</text>
      <animateTransform attributeName="transform" type="translate" from="translate(240,240)" to="translate(280,240)" begin="1s" dur="2s" repeatCount="indefinite"/>
    </section>

  <!-- Insertion at the middle Code Example Section -->
  <section data-narration="Insertion at the middle Code Example">
    <rect x="10" y="260" width="400" height="50" fill="#C7B8EA" rx="10"/>
    <rect x="10" y="260" width="150" height="30" fill="#ADD8E6" rx="10" transform="translate(10,260)">
      <text x="20" y="25" font-size="18" font-family="Arial">Python Implementation</text>
      <code>
        class Node:
          def __init__(self, data=None):
            self.data = data
            self.next = None

        class LinkedList:
          def __init__(self):
            self.head = None

          def insert(self, data):
            new_node = Node(data)
            if self.head is None:
              self.head = new_node
            else:
              current = self.head
              while current.next != None:
                current = current.next
              current.next = new_node
      </code>
      <rect x="10" y="290" width="100" height="50" fill="#ADD8E6" rx="10"/>
      <text x="20" y="305" font-size="18" font-family="Arial">Output: 1 -> 2 -> 3 -> 4 -> 5</text>
  </section>

  <!-- Display Operation Section -->
  <section data-narration="Display Operation">
    <rect x="10" y="340" width="400" height="50" fill="#C7B8EA" rx="10"/>
    <rect x="10" y="340" width="150" height="30" fill="#ADD8E6" rx="10" transform="translate(10,340)">
      <text x="20" y="25" font-size="18" font-family="Arial">Display Linked List</text>
      <animateTransform attributeName="transform" type="translate" from="translate(10,340)" to="translate(140,340)" begin="0s" dur="2s" repeatCount="indefinite"/>
      <rect x="140" y="340" width="100" height="30" fill="#ADD8E6" rx="10"/>
      <text x="150" y="365" font-size="18" font-family="Arial">Output: 1 -> 2 -> 3 -> 4 -> 5</text>
  </section>

  <!-- Footer Section -->
  <footer>
    <rect x="10" y="390" width="400" height="50" fill="#ADD8E6" rx="10"/>
    <text x="20" y="405" font-size="18" font-family="Arial">Operations Insert Delete Display</text>
  </footer>
</svg>