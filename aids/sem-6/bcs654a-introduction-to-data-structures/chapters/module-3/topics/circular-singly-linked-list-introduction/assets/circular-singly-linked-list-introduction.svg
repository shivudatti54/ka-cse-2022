<svg width="420" height="400" data-topic-id="circular-singly-linked-list-introduction" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

    <!-- Title -->
    <g transform="translate(50,20)">
        <text x="0" y="40" font-size="24" font-family="Arial" fill="#3498DB">Circular Singly Linked List Introduction</text>
    </g>

    <!-- Section 1: What is a Linked List? -->
    <g transform="translate(50,100)">
        <rect x="0" y="0" width="300" height="50" fill="#F9F9F9" rx="10">
            <text x="10" y="15" font-size="18" font-family="Arial" fill="#2ECC71">What is a Linked List?</text>
        </rect>
        <g transform="translate(10,50)">
            <circle cx="50" cy="50" r="30" fill="#F7DC6F"/>
            <text x="50" y="70" font-size="16" font-family="Arial" fill="#2ECC71">A linked list is a linear data structure where elements are stored in a non-contiguous manner, unlike arrays.</text>
        </g>
        <g transform="translate(10,100)">
            <rect x="0" y="0" width="300" height="50" fill="#F9F9F9" rx="10">
                <text x="10" y="15" font-size="18" font-family="Arial" fill="#2ECC71">Each element, called a node, contains two parts:</text>
            </rect>
            <g transform="translate(10,50)">
                <rect x="0" y="0" width="50" height="30" fill="#F7DC6F"/>
                <text x="10" y="15" font-size="16" font-family="Arial" fill="#2ECC71">Data - The actual value or information</text>
                <text x="70" y="15" font-size="16" font-family="Arial" fill="#2ECC71">Pointer/Reference - A link to the next node in the sequence</text>
            </g>
        </g>
        <animate transform="rotate(360 50 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Section 2: Why Linked Lists Over Arrays? -->
    <g transform="translate(50,250)">
        <rect x="0" y="0" width="300" height="50" fill="#F9F9F9" rx="10">
            <text x="10" y="15" font-size="18" font-family="Arial" fill="#2ECC71">Why Linked Lists Over Arrays?</text>
        </rect>
        <g transform="translate(10,50)">
            <rect x="0" y="0" width="300" height="50" fill="#F9F9F9" rx="10">
                <text x="10" y="15" font-size="18" font-family="Arial" fill="#2ECC71">Memory Allocation - Static (compile-time) vs Dynamic (run-time)</text>
            </rect>
            <g transform="translate(10,70)">
                <rect x="0" y="0" width="100" height="20" fill="#F7DC6F"/>
                <text x="10" y="15" font-size="16" font-family="Arial" fill="#2ECC71">Memory Efficiency - Linked Lists are more efficient as they only allocate memory when needed</text>
            </g>
            <g transform="translate(10,100)">
                <rect x="0" y="0" width="100" height="20" fill="#F7DC6F"/>
                <text x="10" y="15" font-size="16" font-family="Arial" fill="#2ECC71">Insertion/Deletion - Linked Lists are more efficient as they only require pointer manipulation</text>
            </g>
        </g>
        <animate transform="rotate(360 50 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Section 3: Self-Referential Structures -->
    <g transform="translate(50,400)">
        <rect x="0" y="0" width="300" height="50" fill="#F9F9F9" rx="10">
            <text x="10" y="15" font-size="18" font-family="Arial" fill="#2ECC71">Self-Referential Structures</text>
        </rect>
        <g transform="translate(10,50)">
            <rect x="0" y="0" width="50" height="30" fill="#F7DC6F"/>
            <text x="10" y="15" font-size="16" font-family="Arial" fill="#2ECC71">In C, linked lists are implemented using self-referential structures - structures that contain pointers to instances of themselves</text>
        </g>
        <g transform="translate(10,100)">
            <rect x="0" y="0" width="50" height="30" fill="#F7DC6F"/>
            <text x="10" y="15" font-size="16" font-family="Arial" fill="#2ECC71">This structure contains: Data - The actual value, Pointer/Reference - A link to another structure of the same type</text>
        </g>
        <animate transform="rotate(360 50 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Section 4: Types of Linked Lists -->
    <g transform="translate(50,450)">
        <rect x="0" y="0" width="300" height="50" fill="#F9F9F9" rx="10">
            <text x="10" y="15" font-size="18" font-family="Arial" fill="#2ECC71">Types of Linked Lists</text>
        </rect>
        <g transform="translate(10,50)">
            <rect x="0" y="0" width="100" height="20" fill="#F7DC6F"/>
            <text x="10" y="15" font-size="16" font-family="Arial" fill="#2ECC71">Singly Linked List: Each node points only to the next node</text>
        </g>
        <g transform="translate(10,70)">
            <rect x="0" y="0" width="100" height="20" fill="#F7DC6F"/>
            <text x="10" y="15" font-size="16" font-family="Arial" fill="#2ECC71">Doubly Linked List: Each node points to both next and previous nodes</text>
        </g>
        <g transform="translate(10,100)">
            <rect x="0" y="0" width="100" height="20" fill="#F7DC6F"/>
            <text x="10" y="15" font-size="16" font-family="Arial" fill="#2ECC71">Circular Linked List: The last node points to the first node</text>
        </g>
        <animate transform="rotate(360 50 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>

    <!-- Footer -->
    <g transform="translate(50,500)">
        <rect x="0" y="0" width="300" height="50" fill="#F9F9F9" rx="10">
            <text x="10" y="15" font-size="18" font-family="Arial" fill="#3498DB">Circular Singly Linked List Introduction</text>
        </rect>
    </g>
</svg>