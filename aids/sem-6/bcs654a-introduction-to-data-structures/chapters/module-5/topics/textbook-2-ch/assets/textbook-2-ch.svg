<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="textbook-2-ch">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#F7DC6F" stop-opacity="1"/>
            <stop offset="100%" stop-color="#FFA07A" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Textbook 2 Ch</title>
    <style>
        .section {
            margin-bottom: 20px;
        }
        .section:last-child {
            margin-bottom: 0;
        }
        .section-title {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            color: #2E4053;
        }
        .section-description {
            font-size: 14px;
            color: #656565;
        }
        .animation {
            animation: fade-out 2s infinite;
        }
        @keyframes fade-out {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
    </style>
    <rect fill="url(#gradient)" width="100%" height="100%"/>
    <rect fill="#87CEEB" width="100%" height="100px" y="100px"/>
    <rect fill="#C5E1F5" width="100%" height="100px" y="200px"/>
    <rect fill="#FAF0E6" width="100%" height="100px" y="300px"/>
    <rect fill="#F7DC6F" width="100%" height="100px" y="400px"/>
    <path d="M 50,50 L 300,50 L 300,300 L 50,300 Z"/>
    <g id="bubble-sort">
        <path class="animation" d="M 50,50 L 300,50 L 300,300 L 50,300 Z"/>
        <text class="section-title" x="50%" y="80%" text-anchor="middle">Bubble Sort</text>
        <text class="section-description" x="50%" y="120%" text-anchor="middle">A simple sorting algorithm that works by repeatedly swapping adjacent elements if they are in the wrong order.</text>
        <animateTransform attributeName="transform" type="translate" from="50,50" to="300,50" dur="2s" begin="0s" repeatCount="indefinite"/>
    </g>
    <g id="selection-sort">
        <rect class="animation" width="100%" height="100px" y="100px"/>
        <text class="section-title" x="50%" y="150%" text-anchor="middle">Selection Sort</text>
        <text class="section-description" x="50%" y="200%" text-anchor="middle">A sorting algorithm that works by selecting the smallest (or largest) element from the unsorted portion of the array and swapping it with the first element of the unsorted portion.</text>
        <animateTransform attributeName="transform" type="translate" from="50,50" to="300,50" dur="2s" begin="2s" repeatCount="indefinite"/>
    </g>
    <g id="insertion-sort">
        <rect class="animation" width="100%" height="100px" y="200px"/>
        <text class="section-title" x="50%" y="250%" text-anchor="middle">Insertion Sort</text>
        <text class="section-description" x="50%" y="300%" text-anchor="middle">A sorting algorithm that works by iterating through the array one element at a time, inserting each element into its proper position in the sorted portion of the array.</text>
        <animateTransform attributeName="transform" type="translate" from="50,50" to="300,50" dur="2s" begin="4s" repeatCount="indefinite"/>
    </g>
    <g id="order">
        <path class="animation" d="M 50,50 L 300,50 L 300,300 L 50,300 Z"/>
        <text class="section-title" x="50%" y="80%" text-anchor="middle">Order</text>
        <text class="section-description" x="50%" y="120%" text-anchor="middle">The arrangement of elements in a specific sequence.</text>
        <animateTransform attributeName="transform" type="translate" from="50,50" to="300,50" dur="2s" begin="6s" repeatCount="indefinite"/>
    </g>
    <g id="unsorted">
        <rect width="100%" height="100px" y="100px"/>
        <text class="section-title" x="50%" y="150%" text-anchor="middle">Unsorted</text>
        <text class="section-description" x="50%" y="200%" text-anchor="middle">An array or data set that has not been rearranged in a specific order.</text>
        <animateTransform attributeName="transform" type="translate" from="50,50" to="300,50" dur="2s" begin="8s" repeatCount="indefinite"/>
    </g>
    <g id="sorted">
        <rect width="100%" height="100px" y="200px"/>
        <text class="section-title" x="50%" y="250%" text-anchor="middle">Sorted</text>
        <text class="section-description" x="50%" y="300%" text-anchor="middle">An array or data set that has been rearranged in a specific order.</text>
        <animateTransform attributeName="transform" type="translate" from="50,50" to="300,50" dur="2s" begin="10s" repeatCount="indefinite"/>
    </g>
    <footer>Textbook 2 Ch</footer>
</svg>