    <!-- Bubble Sort Section -->
    <section data-narration="Bubble Sort">
        <h2>Bubble Sort</h2>
        <div class="arrow arrow-left"></div>
        <div class="arrow arrow-right"></div>
        <p>Bubble sort is a simple sorting algorithm that works by repeatedly iterating through a data structure and swapping adjacent elements if they are in the wrong order.</p>
        <p>Here's a simple example of how bubble sort works:</p>
        <pre>
            arr = [5, 2, 8, 3, 1, 4, 6]
            for i in range(len(arr) - 1):
                for j in range(len(arr) - i - 1):
                    if arr[j] > arr[j + 1]:
                        arr[j], arr[j + 1] = arr[j + 1], arr[j]
        </pre>
        <p>Time complexity: O(n^2)</p>
    </section>

    <!-- Comparison Sort Section -->
    <section data-narration="Comparison Sort">
        <h2>Comparison Sort</h2>
        <div class="arrow arrow-left"></div>
        <div class="arrow arrow-right"></div>
        <p>This type of sorting involves comparing elements to determine their order.</p>
        <p>Examples of comparison sorts include quicksort and mergesort.</p>
        <p>Time complexity: O(n log n)</p>
    </section>

    <!-- Non-Comparison Sort Section -->
    <section data-narration="Non-Comparison Sort">
        <h2>Non-Comparison Sort</h2>
        <div class="arrow arrow-left"></div>
        <div class="arrow arrow-right"></div>
        <p>This type of sorting involves grouping elements based on their properties.</p>
        <p>Examples of non-comparison sorts include counting sort and bucket sort.</p>
        <p>Time complexity: O(n + k)</p>
    </section>

    <!-- Why is Sorting Important Section -->
    <section data-narration="Why is Sorting Important">
        <h2>Why is Sorting Important?</h2>
        <div class="arrow arrow-left"></div>
        <div class="arrow arrow-right"></div>
        <p>Sorting is essential in various applications, such as database management systems, data analysis, and algorithm design.</p>
        <p>It's used to arrange data in a specific order, making it easier to analyze and understand.</p>
    </section>

