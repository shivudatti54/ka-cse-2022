<svg 
  width="420" 
  height="400" 
  viewBox="0 0 420 400" 
  xmlns="http://www.w3.org/2000/svg" 
  data-topic-id="binary-search"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  xmlns:animate="http://www.w3.org/2000/svg animate"
  style="background-image: url('binary_search_background.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
  <!-- Title -->
  <rect 
    x="10" 
    y="10" 
    width="400" 
    height="50" 
    style="fill: indigo; opacity: 0.7;" 
    data-narration="Binary Search Introduction" 
    transform="rotate(45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="binary-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect 
    x="10" 
    y="60" 
    width="400" 
    height="250" 
    style="fill: url(#binary-gradient); opacity: 0.7;" 
    data-narration="Sorted List" 
    transform="rotate(-45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="-45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <!-- Section 1: Start with a sorted list -->
  <rect 
    x="10" 
    y="310" 
    width="400" 
    height="50" 
    style="fill: indigo; opacity: 0.7;" 
    data-narration="Start with a sorted list" 
    transform="rotate(45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <path 
    d="M 20 320 L 40 320 L 40 350 L 20 350" 
    stroke="#8BC34A" 
    stroke-width="2" 
    stroke-linecap="round" 
    data-narration="Find the middle element" 
    transform="rotate(-45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="-45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </path>
  <!-- Section 2: Compare the target element with the middle element -->
  <rect 
    x="10" 
    y="360" 
    width="400" 
    height="50" 
    style="fill: indigo; opacity: 0.7;" 
    data-narration="Compare the target element with the middle element" 
    transform="rotate(45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <path 
    d="M 20 370 L 40 370 L 40 390 L 20 390" 
    stroke="#8BC34A" 
    stroke-width="2" 
    stroke-linecap="round" 
    data-narration="If equal, return the index" 
    transform="rotate(-45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="-45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </path>
  <!-- Section 3: If the target element is less than the middle element -->
  <rect 
    x="10" 
    y="400" 
    width="400" 
    height="50" 
    style="fill: indigo; opacity: 0.7;" 
    data-narration="If the target element is less than the middle element" 
    transform="rotate(45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <path 
    d="M 20 410 L 40 410 L 40 430 L 20 430" 
    stroke="#8BC34A" 
    stroke-width="2" 
    stroke-linecap="round" 
    data-narration="Repeat the process with the left half" 
    transform="rotate(-45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="-45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </path>
  <!-- Section 4: If the target element is greater than the middle element -->
  <rect 
    x="10" 
    y="450" 
    width="400" 
    height="50" 
    style="fill: indigo; opacity: 0.7;" 
    data-narration="If the target element is greater than the middle element" 
    transform="rotate(45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <path 
    d="M 20 460 L 40 460 L 40 470 L 20 470" 
    stroke="#8BC34A" 
    stroke-width="2" 
    stroke-linecap="round" 
    data-narration="Repeat the process with the right half" 
    transform="rotate(-45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="-45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </path>
  <!-- Section 5: Repeat the process until the target element is found -->
  <rect 
    x="10" 
    y="510" 
    width="400" 
    height="50" 
    style="fill: indigo; opacity: 0.7;" 
    data-narration="Repeat the process until the target element is found" 
    transform="rotate(45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <path 
    d="M 20 520 L 40 520 L 40 530 L 20 530" 
    stroke="#8BC34A" 
    stroke-width="2" 
    stroke-linecap="round" 
    data-narration="Time complexity is O(log n)" 
    transform="rotate(-45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="-45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </path>
  <!-- Section 6: Time complexity of Binary Search -->
  <rect 
    x="10" 
    y="570" 
    width="400" 
    height="50" 
    style="fill: indigo; opacity: 0.7;" 
    data-narration="Example of Binary Search" 
    transform="rotate(45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <path 
    d="M 20 580 L 40 580 L 40 590 L 20 590" 
    stroke="#8BC34A" 
    stroke-width="2" 
    stroke-linecap="round" 
    data-narration="Find the index of the element 5" 
    transform="rotate(-45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="-45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </path>
  <!-- Footer -->
  <rect 
    x="10" 
    y="620" 
    width="400" 
    height="40" 
    style="fill: indigo; opacity: 0.7;" 
    transform="rotate(45 20 20)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 20 20" 
      to="45 20 20" 
      dur="5s" 
      begin="#0s" 
      repeatCount="indefinite" />
  </rect>
  <text 
    x="20" 
    y="640" 
    font-size="18" 
    font-family="Arial" 
    fill="#FFFFFF">
    Binary Search
  </text>
</svg>