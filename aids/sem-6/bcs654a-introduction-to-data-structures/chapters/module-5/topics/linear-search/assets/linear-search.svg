<svg width="420" height="400" data-topic-id="linear-search" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b2fffc" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  <g transform="translate(10, 20)">
    <rect width="100%" height="100%" fill="#fff"/>
    <g id="title">
      <text x="50%" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">Linear Search</text>
    </g>
    <g id="footer">
      <text x="50%" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" transform="rotate(270, 50%, 100%)">Linear Search</text>
    </g>
    <g id="search">
      <rect width="100%" height="200" fill="#fff" rx="10" />
      <text x="50%" y="50" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Array: [10, 23, 45, 72, 86, 91, 105]</text>
      <text x="50%" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Target: 86</text>
      <circle cx="50%" cy="50%" r="10" fill="#f1c40f" stroke="#ff9800" stroke-width="2"/>
      <animate transform="translate(0, 20)" begin="0s" dur="3s" repeatCount="indefinite"/>
    </g>
    <g id="iteration-1">
      <rect width="100%" height="100%" fill="#fff" rx="10" />
      <text x="50%" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Iteration 1</text>
      <text x="50%" y="70" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Compare 10 with 86 → No match</text>
      <path d="M 50, 50 L 70, 70" stroke="#ff9800" stroke-width="2"/>
      <animate transform="translate(0, 30)" begin="0s" dur="1s" repeatCount="indefinite"/>
    </g>
    <g id="iteration-2">
      <rect width="100%" height="100%" fill="#fff" rx="10" />
      <text x="50%" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Iteration 2</text>
      <text x="50%" y="70" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Compare 23 with 86 → No match</text>
      <path d="M 50, 70 L 70, 80" stroke="#ff9800" stroke-width="2"/>
      <animate transform="translate(0, 30)" begin="1s" dur="1s" repeatCount="indefinite"/>
    </g>
    <g id="iteration-3">
      <rect width="100%" height="100%" fill="#fff" rx="10" />
      <text x="50%" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Iteration 3</text>
      <text x="50%" y="70" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Compare 45 with 86 → No match</text>
      <path d="M 50, 80 L 70, 90" stroke="#ff9800" stroke-width="2"/>
      <animate transform="translate(0, 30)" begin="2s" dur="1s" repeatCount="indefinite"/>
    </g>
    <g id="iteration-4">
      <rect width="100%" height="100%" fill="#fff" rx="10" />
      <text x="50%" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Iteration 4</text>
      <text x="50%" y="70" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Compare 72 with 86 → No match</text>
      <path d="M 50, 90 L 70, 100" stroke="#ff9800" stroke-width="2"/>
      <animate transform="translate(0, 30)" begin="3s" dur="1s" repeatCount="indefinite"/>
    </g>
    <g id="iteration-5">
      <rect width="100%" height="100%" fill="#fff" rx="10" />
      <text x="50%" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Iteration 5</text>
      <text x="50%" y="70" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#e74c3c">Compare 86 with 86 → Match found at index 4!</text>
      <path d="M 50, 100 L 70, 110" stroke="#ff9800" stroke-width="2"/>
      <animate transform="translate(0, 30)" begin="4s" dur="1s" repeatCount="indefinite"/>
    </g>
  </g>
  <g id="footer">
    <text x="50%" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#666" transform="rotate(270, 50%, 100%)">Linear Search</text>
  </g>
</svg>