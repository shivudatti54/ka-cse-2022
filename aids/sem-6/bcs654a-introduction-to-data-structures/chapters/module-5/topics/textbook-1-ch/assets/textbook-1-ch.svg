<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="textbook-1-ch">
    <rect fill="url(#grad1)" x="0" y="0" width="420" height="400"/>
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6c5ce7"/>
            <stop offset="100%" stop-color="#6495ed"/>
        </linearGradient>
    </defs>
    <title>Textbook 1: Ch</title>
    <text x="100" y="20" font-size="24" font-family="Arial, sans-serif" fill="#fff">Textbook 1: Ch</text>
    <g id="bubble-sort">
        <rect x="50" y="50" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="60" y="65" font-size="18" font-family="Arial, sans-serif" fill="#000">Bubble Sort</text>
        <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" dur="2s" begin="0s"/>
        <rect x="50" y="50" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <animate attribute="opacity" from="1" to="0" dur="2s" begin="0s"/>
    </g>
    <g id="selection-sort">
        <rect x="300" y="50" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="310" y="65" font-size="18" font-family="Arial, sans-serif" fill="#000">Selection Sort</text>
        <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" dur="2s" begin="2s"/>
        <rect x="300" y="50" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <animate attribute="opacity" from="1" to="0" dur="2s" begin="2s"/>
    </g>
    <g id="insertion-sort">
        <rect x="550" y="50" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="560" y="65" font-size="18" font-family="Arial, sans-serif" fill="#000">Insertion Sort</text>
        <animateTransform attributeName="transform" type="translate" from="0 50" to="0 100" dur="2s" begin="4s"/>
        <rect x="550" y="50" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <animate attribute="opacity" from="1" to="0" dur="2s" begin="4s"/>
    </g>
    <g id="time-complexity">
        <rect x="100" y="200" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="110" y="215" font-size="18" font-family="Arial, sans-serif" fill="#000">Time Complexity</text>
        <animateTransform attributeName="transform" type="translate" from="0 200" to="0 250" dur="2s" begin="0s"/>
        <rect x="100" y="200" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <animate attribute="opacity" from="1" to="0" dur="2s" begin="0s"/>
    </g>
    <g id="space-complexity">
        <rect x="400" y="200" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <text x="410" y="215" font-size="18" font-family="Arial, sans-serif" fill="#000">Space Complexity</text>
        <animateTransform attributeName="transform" type="translate" from="0 200" to="0 250" dur="2s" begin="2s"/>
        <rect x="400" y="200" width="200" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
        <animate attribute="opacity" from="1" to="0" dur="2s" begin="2s"/>
    </g>
    <rect x="100" y="350" width="420" height="50" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="110" y="365" font-size="24" font-family="Arial, sans-serif" fill="#000">Footer</text>
</svg>