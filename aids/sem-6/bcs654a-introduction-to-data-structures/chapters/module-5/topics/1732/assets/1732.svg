<svg width="420" height="400" data-topic-id="17.3.2-insertion-sort">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Insertion Sort</text>
  
  <!-- Section 1: Introduction -->
  <rect x="10" y="60" width="400" height="80" fill="#FFF" rx="10" data-narration="Introduce the concept of Insertion Sort"/>
  <animate transform="rotate(0 20 20)" begin="100ms" dur="2000" repeatCount="indefinite"/>
  <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">A simple sorting algorithm that works by dividing the input into a sorted and an unsorted region.</text>
  
  <!-- Section 2: How Insertion Sort Works -->
  <rect x="10" y="150" width="400" height="80" fill="#FFF" rx="10" data-narration="Describe the two parts of Insertion Sort"/>
  <animate transform="rotate(360 20 20)" begin="300ms" dur="2000" repeatCount="indefinite"/>
  <text x="20" y="160" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Start with the first element of the input array as the sorted region.</text>
  <text x="20" y="180" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">The remaining elements are initially considered part of the unsorted region.</text>
  
  <!-- Section 3: Step 1 - Initialize the sorted region -->
  <rect x="10" y="240" width="400" height="80" fill="#FFF" rx="10" data-narration="Show the first step of Insertion Sort"/>
  <animate transform="rotate(720 20 20)" begin="500ms" dur="2000" repeatCount="indefinite"/>
  <text x="20" y="250" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Start with the first element of the input array as the sorted region.</text>
  <text x="20" y="270" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">The remaining elements are initially considered part of the unsorted region.</text>
  <text x="20" y="290" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Compare 2 with the first element of the sorted region (5).</text>
  
  <!-- Section 4: Step 2 - Iterate through the unsorted region -->
  <rect x="10" y="330" width="400" height="80" fill="#FFF" rx="10" data-narration="Show the second step of Insertion Sort"/>
  <animate transform="rotate(1080 20 20)" begin="700ms" dur="2000" repeatCount="indefinite"/>
  <text x="20" y="340" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Compare 8 with the first element of the sorted region (5).</text>
  <text x="20" y="360" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Compare 3 with the first element of the sorted region (5).</text>
  <text x="20" y="380" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Compare 1 with the first element of the sorted region (5).</text>
  
  <!-- Section 5: Example Walkthrough -->
  <rect x="10" y="410" width="400" height="80" fill="#FFF" rx="10" data-narration="Show the example walkthrough of Insertion Sort"/>
  <animate transform="rotate(1296 20 20)" begin="900ms" dur="2000" repeatCount="indefinite"/>
  <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">The final sorted array is [1, 2, 3, 5, 8].</text>
  
  <!-- Footer -->
  <text x="10" y="430" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Insertion Sort</text>
</svg>