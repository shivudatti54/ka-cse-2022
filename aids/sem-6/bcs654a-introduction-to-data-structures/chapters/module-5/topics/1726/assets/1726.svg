<svg width="420" height="400" data-topic-id="insertion-sort" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A2FF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B3F54" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2F4F7F" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" x="0" y="0" width="420" height="400"/>
  <rect fill="#fff" x="0" y="50" width="420" height="300"/>
  <g transform="translate(10 60)">
    <rect fill="#fff" width="400" height="30"/>
    <text x="10" y="10" font-size="24" font-family="Arial, sans-serif" fill="#333">Insertion Sort</text>
    <text x="10" y="40" font-size="18" font-family="Arial, sans-serif" fill="#666">A Simple Sorting Algorithm</text>
  </g>
  <g transform="translate(10 90)">
    <rect fill="#fff" width="400" height="100"/>
    <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" fill="#333">How Insertion Sort Works</text>
    <animateTransform attributeName="transform" type="translate" from="translate(10 90)" to="translate(10 90)" dur="3s" begin="0s" repeatCount="indefinite"/>
    <section data-narration="How Insertion Sort Works">
      <rect fill="#fff" width="400" height="80"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#666">1. Start with the first element, which is already sorted.</text>
      <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" fill="#666">2. Iterate through the remaining elements, comparing each element to the previous elements in the sorted region.</text>
      <text x="10" y="70" font-size="16" font-family="Arial, sans-serif" fill="#666">3. For each element, find its correct position in the sorted region by shifting elements to make room for it.</text>
      <text x="10" y="100" font-size="16" font-family="Arial, sans-serif" fill="#666">4. Insert the element into its correct position in the sorted region.</text>
      <text x="10" y="130" font-size="16" font-family="Arial, sans-serif" fill="#666">5. Repeat steps 2-4 until the entire list is sorted.</text>
    </section>
    <g transform="translate(10 220)">
      <rect fill="#fff" width="400" height="100"/>
      <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" fill="#333">Algorithm Steps</text>
      <animateTransform attributeName="transform" type="translate" from="translate(10 220)" to="translate(10 220)" dur="3s" begin="4s" repeatCount="indefinite"/>
      <section data-narration="Algorithm Steps">
        <rect fill="#fff" width="400" height="80"/>
        <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#666">1. Initialize the sorted region with the first element.</text>
        <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" fill="#666">2. Iterate through the remaining elements.</text>
        <text x="10" y="70" font-size="16" font-family="Arial, sans-serif" fill="#666">3. For each element, find its correct position in the sorted region.</text>
        <text x="10" y="100" font-size="16" font-family="Arial, sans-serif" fill="#666">4. Shift elements to make room for the element.</text>
        <text x="10" y="130" font-size="16" font-family="Arial, sans-serif" fill="#666">5. Insert the element into its correct position.</text>
        <text x="10" y="160" font-size="16" font-family="Arial, sans-serif" fill="#666">6. Repeat steps 2-5 until the entire list is sorted.</text>
      </section>
      <g transform="translate(10 350)">
        <rect fill="#fff" width="400" height="100"/>
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" fill="#333">Example Implementation</text>
        <animateTransform attributeName="transform" type="translate" from="translate(10 350)" to="translate(10 350)" dur="3s" begin="7s" repeatCount="indefinite"/>
        <section data-narration="Example Implementation">
          <rect fill="#fff" width="400" height="80"/>
          <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#666">Here's an example implementation of insertion sort in Python:</text>
          <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" fill="#666">```</text>
          <text x="10" y="60" font-size="16" font-family="Arial, sans-serif" fill="#666">def insertion_sort(arr):</text>
          <text x="10" y="80" font-size="16" font-family="Arial, sans-serif" fill="#666">for i in range(1, len(arr)):</text>
          <text x="10" y="100" font-size="16" font-family="Arial, sans-serif" fill="#666">key = arr[i]</text>
          <text x="10" y="120" font-size="16" font-family="Arial, sans-serif" fill="#666">j = i - 1</text>
          <text x="10" y="140" font-size="16" font-family="Arial, sans-serif" fill="#666">while j >= 0 and arr[j] > key:</text>
          <text x="10" y="160" font-size="16" font-family="Arial, sans-serif" fill="#666">arr[j + 1] = arr[j]</text>
          <text x="10" y="180" font-size="16" font-family="Arial, sans-serif" fill="#666">j -= 1</text>
          <text x="10" y="200" font-size="16" font-family="Arial, sans-serif" fill="#666">arr[j + 1] = key</text>
          <text x="10" y="220" font-size="16" font-family="Arial, sans-serif" fill="#666">```</text>
        </section>
        <g transform="translate(10 450)">
          <rect fill="#fff" width="400" height="100"/>
          <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" fill="#333">Time and Space Complexity</text>
          <animateTransform attributeName="transform" type="translate" from="translate(10 450)" to="translate(10 450)" dur="3s" begin="10s" repeatCount="indefinite"/>
          <section data-narration="Time and Space Complexity">
            <rect fill="#fff" width="400" height="80"/>
            <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#666">Insertion sort has a time complexity of O(n^2) and a space complexity of O(1).</text>
          </section>
          <g transform="translate(10 550)">
            <rect fill="#fff" width="400" height="100"/>
            <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" fill="#333">Advantages and Disadvantages</text>
            <animateTransform attributeName="transform" type="translate" from="translate(10 550)" to="translate(10 550)" dur="3s" begin="13s" repeatCount="indefinite"/>
            <section data-narration="Advantages and Disadvantages">
              <rect fill="#fff" width="400" height="80"/>
              <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#666">Advantages:</text>
              <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" fill="#666">- Simple to implement</text>
              <text x="10" y="60" font-size="16" font-family="Arial, sans-serif" fill="#666">- Stable sorting algorithm</text>
              <text x="10" y="80" font-size="16" font-family="Arial, sans-serif" fill="#666">Disadvantages:</text>
              <text x="10" y="110" font-size="16" font-family="Arial, sans-serif" fill="#666">- Time complexity is O(n^2) for large datasets</text>
              <text x="10" y="130" font-size="16" font-family="Arial, sans-serif" fill="#666">- Not suitable for large datasets</text>
            </section>
          </g>
          <g transform="translate(10 650)">
            <rect fill="#fff" width="400" height="100"/>
            <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" fill="#333">Conclusion</text>
            <animateTransform attributeName="transform" type="translate" from="translate(10 650)" to="translate(10 650)" dur="3s" begin="16s" repeatCount="indefinite"/>
            <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" fill="#666">Insertion sort is a simple sorting algorithm that works by dividing the input list into a sorted and an unsorted region.</text>
          </g>
          <footer>
            <rect fill="#fff" width="400" height="50"/>
            <text x="10" y="10" font-size="18" font-family="Arial, sans-serif" fill="#666">Data visualization created using SVG</text>
          </footer>
        </section>
      </g>
    </g>
  </svg>