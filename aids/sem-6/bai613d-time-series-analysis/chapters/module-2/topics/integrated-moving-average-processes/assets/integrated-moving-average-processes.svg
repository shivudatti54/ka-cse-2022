<svg width="420" height="400" data-topic-id="integrated-moving-average-processes">
  <title>Integrated Moving Average Processes</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <section data-narration="Introduction">
    <rect x="0" y="50" width="420" height="50" fill="#66CCCC" rx="10"/>
    <text x="20" y="70" font-size="18" font-family="Arial" fill="#333333">Integrated Moving Average Processes</text>
    <text x="20" y="90" font-size="14" font-family="Arial" fill="#666666">In time series analysis, Integrated Moving Average (IMA) processes are a type of linear nonstationary model that combines elements of autoregressive (AR) and moving average (MA) processes.</text>
  </section>
  
  <section data-narration="Definition">
    <rect x="0" y="120" width="420" height="50" fill="#66CCCC" rx="10"/>
    <text x="20" y="140" font-size="18" font-family="Arial" fill="#333333">Y_t = μ + φ_t + ψ_t - φ_t-1 + ψ_t-1</text>
    <text x="20" y="160" font-size="14" font-family="Arial" fill="#666666">where:</text>
    <text x="20" y="180" font-size="14" font-family="Arial" fill="#666666">Y_t is the value of the time series at time t</text>
    <text x="20" y="200" font-size="14" font-family="Arial" fill="#666666">μ is the mean of the time series</text>
    <text x="20" y="220" font-size="14" font-family="Arial" fill="#666666">φ_t is an autoregressive component</text>
    <text x="20" y="240" font-size="14" font-family="Arial" fill="#666666">ψ_t is a moving average component</text>
    <text x="20" y="260" font-size="14" font-family="Arial" fill="#666666">φ_t-1 and ψ_t-1 are lagged versions of φ_t and ψ_t, respectively</text>
  </section>
  
  <section data-narration="Stationarity">
    <rect x="0" y="270" width="420" height="50" fill="#66CCCC" rx="10"/>
    <text x="20" y="290" font-size="18" font-family="Arial" fill="#333333">IMA processes are nonstationary because the mean and variance of the time series are not constant over time.</text>
    <text x="20" y="310" font-size="14" font-family="Arial" fill="#666666">To make an IMA process stationary, it must be differenced once, which removes the trend component and makes the process stationary.</text>
  </section>
  
  <section data-narration="Differencing">
    <rect x="0" y="340" width="420" height="50" fill="#66CCCC" rx="10"/>
    <text x="20" y="360" font-size="18" font-family="Arial" fill="#333333">ΔY_t = Y_t - Y_t-1</text>
    <text x="20" y="380" font-size="14" font-family="Arial" fill="#666666">where ΔY_t is the differenced process</text>
  </section>
  
  <section data-narration="IMA Process in Stationary Form">
    <rect x="0" y="410" width="420" height="50" fill="#66CCCC" rx="10"/>
    <text x="20" y="430" font-size="18" font-family="Arial" fill="#333333">ΔY_t = φ_t + ψ_t - ψ_t-1</text>
    <text x="20" y="450" font-size="14" font-family="Arial" fill="#666666">where φ_t and ψ_t are the autoregressive and moving average components, respectively.</text>
  </section>
  
  <section data-narration="Key Concepts">
    <rect x="0" y="470" width="420" height="50" fill="#66CCCC" rx="10"/>
    <text x="20" y="490" font-size="18" font-family="Arial" fill="#333333">Integration, Autoregressive (AR), Moving Average (MA), Differencing, Stationarity</text>
  </section>
  
  <footer>
    <rect x="0" y="520" width="420" height="50" fill="#66CCCC" rx="10"/>
    <text x="20" y="540" font-size="14" font-family="Arial" fill="#333333">Integrated Moving Average Processes</text>
  </footer>
</svg>