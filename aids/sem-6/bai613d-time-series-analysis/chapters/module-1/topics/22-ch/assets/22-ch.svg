<svg width="420" height="400" data-topic-id="22-ch-autocorrelation-function-and-spectrum">
  <title>Autocorrelation Function and Spectrum</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
    <marker markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
      <rect fill="#000000" rx="0.5"/>
    </marker>
  </defs>
  <rect x="10" y="20" width="400" height="350" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="200" height="180" fill="#FFFFFF" rx="10"/>
    <g transform="rotate(45 100 100)">
      <rect x="0" y="0" width="20" height="20" fill="#3498DB" rx="5"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">ρ(h)</text>
      <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Autocorrelation Coefficient</text>
    </g>
    <g transform="rotate(45 220 100)">
      <rect x="0" y="0" width="20" height="20" fill="#E74C3C" rx="5"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Time Lag (h)</text>
      <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Time Lag (h)</text>
    </g>
    <g transform="rotate(45 330 100)">
      <rect x="0" y="0" width="20" height="20" fill="#2ECC71" rx="5"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">x[t]</text>
      <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">x[t - h]</text>
    </g>
    <g transform="rotate(45 440 100)">
      <rect x="0" y="0" width="20" height="20" fill="#F1C40F" rx="5"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">∑(x[t] \* x[t - h])</text>
      <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">∑x[t]^2</text>
    </g>
    <g transform="rotate(45 550 100)">
      <rect x="0" y="0" width="20" height="20" fill="#F7DC6F" rx="5"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">ρ(h)</text>
      <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Autocorrelation Coefficient</text>
    </g>
    <g transform="rotate(45 660 100)">
      <rect x="0" y="0" width="20" height="20" fill="#8E44AD" rx="5"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">θ</text>
      <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Mean of Time Series</text>
    </g>
    <g transform="rotate(45 770 100)">
      <rect x="0" y="0" width="20" height="20" fill="#E74C3C" rx="5"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">ACF</text>
      <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Autocorrelation Function</text>
    </g>
    <g transform="rotate(45 880 100)">
      <rect x="0" y="0" width="20" height="20" fill="#2ECC71" rx="5"/>
      <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Stationary</text>
      <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Non-Stationary</text>
    </g>
  </g>
  <g transform="rotate(0 200 20)">
    <animateTransform attributeName="transform" type="rotate" from="0 200 20" to="360 200 20" dur="10s" repeatCount="indefinite"/>
    <rect x="150" y="50" width="20" height="20" fill="#3498DB" rx="5"/>
    <text x="160" y="60" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Autocorrelation Function</text>
    <text x="160" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Decays to Zero</text>
  </g>
  <g transform="rotate(0 320 20)">
    <animateTransform attributeName="transform" type="rotate" from="0 320 20" to="360 320 20" dur="10s" repeatCount="indefinite"/>
    <rect x="250" y="50" width="20" height="20" fill="#E74C3C" rx="5"/>
    <text x="260" y="60" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Non-Stationary</text>
    <text x="260" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Depends on Past Values</text>
  </g>
  <g transform="rotate(0 440 20)">
    <animateTransform attributeName="transform" type="rotate" from="0 440 20" to="360 440 20" dur="10s" repeatCount="indefinite"/>
    <rect x="330" y="50" width="20" height="20" fill="#F1C40F" rx="5"/>
    <text x="340" y="60" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">ACF</text>
    <text x="340" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Interpreted from Autocorrelation Coefficient</text>
  </g>
  <g transform="rotate(0 560 20)">
    <animateTransform attributeName="transform" type="rotate" from="0 560 20" to="360 560 20" dur="10s" repeatCount="indefinite"/>
    <rect x="450" y="50" width="20" height="20" fill="#8E44AD" rx="5"/>
    <text x="460" y="60" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Calculation</text>
    <text x="460" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Steps 1-4</text>
  </g>
  <g transform="rotate(0 680 20)">
    <animateTransform attributeName="transform" type="rotate" from="0 680 20" to="360 680 20" dur="10s" repeatCount="indefinite"/>
    <rect x="570" y="50" width="20" height="20" fill="#2ECC71" rx="5"/>
    <text x="580" y="60" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Mean and ACF</text>
    <text x="580" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Relationship</text>
  </g>
  <g transform="rotate(0 800 20)">
    <animateTransform attributeName="transform" type="rotate" from="0 800 20" to="360 800 20" dur="10s" repeatCount="indefinite"/>
    <rect x="690" y="50" width="20" height="20" fill="#F7DC6F" rx="5"/>
    <text x="700" y="60" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">ACF</text>
    <text x="700" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Graphical Representation</text>
  </g>
  <footidate>2023</footidate>
</svg>