<svg width="420" height="400" data-topic-id="64-ch-identification">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B3E5FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title section -->
  <section data-narration="Introduction to Identification">
    <rect x="50" y="50" width="320" height="50" fill="#2E4053" rx="10"/>
    <text x="60" y="70" font-size="24" font-family="Arial, sans-serif" fill="#FFFFFF">
      64 Ch: Objectives of Identification
    </text>
  </section>

  <!-- Pattern Recognition section -->
  <section data-narration="Pattern Recognition">
    <rect x="50" y="120" width="320" height="50" fill="#2E4053" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" begin="-1s"/>
    <path d="M 50 120 Q 150 150 250 120" fill="#3BC9DB" stroke="#2E4053" stroke-width="2" stroke-dasharray="5,5"/>
    <animate attributeName="fill" from="#3BC9DB" to="#4BC0C0" dur="2s" begin="-1s"/>
  </section>

  <!-- Trend Estimation section -->
  <section data-narration="Trend Estimation">
    <rect x="50" y="190" width="320" height="50" fill="#2E4053" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="50 190" to="50 200" dur="2s" begin="-1s"/>
    <line x1="200" y1="190" x2="200" y2="200" stroke="#4BC0C0" stroke-width="2"/>
    <animate attributeName="stroke" from="#4BC0C0" to="#8BC34A" dur="2s" begin="-1s"/>
  </section>

  <!-- Seasonality Estimation section -->
  <section data-narration="Seasonality Estimation">
    <rect x="50" y="260" width="320" height="50" fill="#2E4053" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 260" to="360 50 260" dur="2s" begin="-1s"/>
    <path d="M 50 260 Q 150 290 250 260" fill="#8BC34A" stroke="#2E4053" stroke-width="2" stroke-dasharray="5,5"/>
    <animate attributeName="fill" from="#8BC34A" to="#FFC107" dur="2s" begin="-1s"/>
  </section>

  <!-- Cycles Estimation section -->
  <section data-narration="Cycles Estimation">
    <rect x="50" y="330" width="320" height="50" fill="#2E4053" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 330" to="360 50 330" dur="2s" begin="-1s"/>
    <path d="M 50 330 Q 150 350 250 330" fill="#FFC107" stroke="#2E4053" stroke-width="2" stroke-dasharray="5,5"/>
    <animate attributeName="fill" from="#FFC107" to="#FF9800" dur="2s" begin="-1s"/>
  </section>

  <!-- Arrow markers for connections -->
  <line x1="20" y1="100" x2="80" y2="220" stroke="#4BC0C0" stroke-width="2"/>
  <line x1="220" y1="100" x2="80" y2="220" stroke="#4BC0C0" stroke-width="2"/>
  <line x1="20" y1="220" x2="80" y2="100" stroke="#4BC0C0" stroke-width="2"/>
  <line x1="220" y1="220" x2="80" y2="100" stroke="#4BC0C0" stroke-width="2"/>

  <!-- Footer section -->
  <text x="50" y="380" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
    Created with love
  </text>
</svg>