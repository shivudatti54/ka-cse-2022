<svg width="420" height="400" data-topic-id="two-dimensional-human-centred-ai-framework-design-guid">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Section 1: Human-Centred Design -->
  <section data-narration="Dimension 1: Human-Centred Design">
    <div style="background-color: #87ceeb; padding: 20px; border-radius: 10px;">
      <h2>Empathy</h2>
      <p>Understanding human needs, values, and emotions.</p>
    </div>
    <div style="background-color: #ADD8E6; padding: 20px; border-radius: 10px;">
      <h2>Co-design</h2>
      <p>Collaborating with humans in the design process.</p>
    </div>
    <div style="background-color: #87ceeb; padding: 20px; border-radius: 10px;">
      <h2>Explainability</h2>
      <p>Providing transparent and understandable AI decision-making processes.</p>
    </div>
  </section>
  
  <!-- Section 2: Technology-Centred Design -->
  <section data-narration="Dimension 2: Technology-Centred Design">
    <div style="background-color: #ADD8E6; padding: 20px; border-radius: 10px;">
      <h2>Technical Feasibility</h2>
      <p>Ensuring the technical capabilities of the AI system.</p>
    </div>
    <div style="background-color: #87ceeb; padding: 20px; border-radius: 10px;">
      <h2>Robustness</h2>
      <p>Ensuring the AI system's reliability and performance in various scenarios.</p>
    </div>
    <div style="background-color: #ADD8E6; padding: 20px; border-radius: 10px;">
      <h2>Security</h2>
      <p>Ensuring the AI system's security and protection of sensitive data.</p>
    </div>
  </section>
  
  <!-- Connections between sections -->
  <path data-connect="section1-to-section2" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" />
  
  <!-- Title and footer -->
  <h1 style="position: absolute; top: 10px; left: 10px;">Two-Dimensional Human-Centred AI Framework Design Guid</h1>
  <footer style="position: absolute; bottom: 10px; left: 10px;">&copy; 2023</footer>
  
  <!-- Animations -->
  <animate xlink:href="#section1-to-section2" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate xlink:href="#section2-to-section1" begin="2s" dur="2s" repeatCount="indefinite" />
</svg>