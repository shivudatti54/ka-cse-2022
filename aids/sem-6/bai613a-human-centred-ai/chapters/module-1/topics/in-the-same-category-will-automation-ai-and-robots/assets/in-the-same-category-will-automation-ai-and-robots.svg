<svg width="420" height="400" data-topic-id="automation-ai-robots">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFC5C5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" x="0" y="0" width="420" height="400"/>
  <g id="title">
    <text x="50%" y="10%" font-size="36" font-family="Arial" fill="#2E4053">In the Same Category? Will Automation, AI, and Robots</text>
  </g>
  <g id="section1">
    <rect x="0" y="50" width="420" height="100" fill="#FFFFFF"/>
    <text x="20" y="70" font-size="24" font-family="Arial" fill="#2E4053" data-narration="Automation refers to the use of technology, such as machines and algorithms, to perform tasks that would normally require human intelligence and dexterity." data-topic-id="automation">Automation</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" delay="0s"/>
  </g>
  <g id="section2">
    <rect x="0" y="170" width="420" height="100" fill="#FFFFFF"/>
    <text x="20" y="190" font-size="24" font-family="Arial" fill="#2E4053" data-narration="There are three types of automation: mechanization, computerization, and automation of complex tasks." data-topic-id="automation-types">Automation Types</text>
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,270" dur="2s" begin="0.5s" delay="0s"/>
  </g>
  <g id="section3">
    <rect x="0" y="290" width="420" height="100" fill="#FFFFFF"/>
    <text x="20" y="310" font-size="24" font-family="Arial" fill="#2E4053" data-narration="Artificial intelligence (AI) refers to the development of computer systems that can perform tasks that typically require human intelligence." data-topic-id="artificial-intelligence">Artificial Intelligence (AI)</text>
    <animateTransform attributeName="transform" type="translate" from="0,290" to="0,390" dur="2s" begin="1s" delay="0s"/>
  </g>
  <g id="section4">
    <rect x="0" y="410" width="420" height="100" fill="#FFFFFF"/>
    <text x="20" y="430" font-size="24" font-family="Arial" fill="#2E4053" data-narration="AI has numerous applications, including virtual assistants, image recognition, and natural language processing." data-topic-id="ai-applications">AI Applications</text>
    <animateTransform attributeName="transform" type="translate" from="0,410" to="0,510" dur="2s" begin="1.5s" delay="0s"/>
  </g>
  <g id="section5">
    <rect x="0" y="50" width="420" height="100" fill="#FFFFFF"/>
    <text x="20" y="70" font-size="24" font-family="Arial" fill="#2E4053" data-narration="Robots are machines that can perform tasks that require human intelligence, such as decision-making and problem-solving." data-topic-id="robots">Robots</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="2s" delay="0s"/>
  </g>
  <g id="section6">
    <rect x="0" y="170" width="420" height="100" fill="#FFFFFF"/>
    <text x="20" y="190" font-size="24" font-family="Arial" fill="#2E4053" data-narration="While automation, AI, and robots may lead to job displacement, they also have the potential to create new job opportunities." data-topic-id="robots-jobs">Job Opportunities</text>
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,270" dur="2s" begin="2.5s" delay="0s"/>
  </g>
  <g id="footer">
    <text x="50%" y="380%" font-size="24" font-family="Arial" fill="#2E4053" transform="rotate(180 210 390)">Learn More</text>
  </g>
</svg>