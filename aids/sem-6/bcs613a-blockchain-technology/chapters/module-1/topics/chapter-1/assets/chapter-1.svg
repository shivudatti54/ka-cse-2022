<svg width="420" height="400" data-topic-id="chapter-1-introduction-to-blockchain-technology" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="80" y="50" width="200" height="300" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="100" height="30" fill="#3498DB" rx="5"/>
    <text x="15" y="10" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Chapter 1: Introduction to Blockchain Technology</text>
  </g>
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="100" height="30" fill="#2EC4B0" rx="5"/>
    <text x="15" y="10" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">What is Blockchain Technology?</text>
  </g>
  <section data-narration="1.1-what-is-blockchain-technology">
    <rect x="0" y="40" width="200" height="250" fill="#E5E5EA"/>
    <rect x="10" y="10" width="180" height="20" fill="#87CEEB" rx="5"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">
      Blockchain technology is a decentralized, digital ledger that records transactions across a network of computers in a secure and transparent manner.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section data-narration="1.2-history-of-blockchain">
    <rect x="0" y="40" width="200" height="250" fill="#E5E5EA"/>
    <rect x="10" y="10" width="180" height="20" fill="#2EC4B0" rx="5"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">
      The concept of blockchain technology has its roots in the 1980s, when computer scientist David Chaum proposed the idea of a decentralized, digital cash system.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" begin="2s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section data-narration="1.3-distributed-systems">
    <rect x="0" y="40" width="200" height="250" fill="#E5E5EA"/>
    <rect x="10" y="10" width="180" height="20" fill="#3498DB" rx="5"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">
      A distributed system is a network of computers that work together to achieve a common goal.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" begin="4s" dur="2s" repeatCount="indefinite"/>
  </section>
  <section data-narration="1.4-cap-theorem">
    <rect x="0" y="40" width="200" height="250" fill="#E5E5EA"/>
    <rect x="10" y="10" width="180" height="20" fill="#2EC4B0" rx="5"/>
    <text x="15" y="25" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">
      The CAP theorem states that it is impossible for a distributed system to simultaneously guarantee consistency, availability, and partition tolerance.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" begin="6s" dur="2s" repeatCount="indefinite"/>
  </section>
  <g transform="translate(20, 350)">
    <rect x="0" y="0" width="100" height="30" fill="#E5E5EA" rx="5"/>
    <text x="15" y="10" font-size="18" font-family="Arial" fill="#000000" text-anchor="start">References</text>
  </g>
</svg>