  <title>Chapter 7: Ethereum Blockchain</title>
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA" rx="10" />
  <path d="M 20 20 L 400 20" stroke="#3498DB" stroke-width="2" />
  <path d="M 20 200 L 400 200" stroke="#3498DB" stroke-width="2" />
  <g id="section-1">
    <rect x="50" y="50" width="300" height="150" fill="#F7F7F7" rx="10" data-narration="Ethereum blockchain is a decentralized, distributed ledger technology that allows for the creation and management of smart contracts and decentralized applications (dApps)." />
    <text x="50" y="100" font-size="18" font-family="Arial" fill="#2E4053">What is Ethereum Blockchain?</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="2s" begin="0s" />
  </g>
  <g id="section-2">
    <rect x="50" y="250" width="300" height="150" fill="#F7F7F7" rx="10" data-narration="A blockchain is a decentralized, digital ledger that records transactions across a network of computers. It is a chain of blocks, each of which contains a set of transactions, linked together through cryptography." />
    <text x="50" y="300" font-size="18" font-family="Arial" fill="#2E4053">What is a Blockchain?</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 350" dur="2s" begin="0s" />
    <path d="M 150 200 L 250 250" stroke="#3498DB" stroke-width="2" fill="none" />
  </g>
  <g id="section-3">
    <rect x="50" y="150" width="300" height="150" fill="#F7F7F7" rx="10" data-narration="Ethereum blockchain works by using a combination of open-source software and a decentralized network of computers. The network is composed of miners, validators, and nodes." />
    <text x="50" y="200" font-size="18" font-family="Arial" fill="#2E4053">How Does Ethereum Blockchain Work?</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 250" dur="2s" begin="0s" />
    <path d="M 200 150 L 300 200" stroke="#3498DB" stroke-width="2" fill="none" />
  </g>
  <g id="section-4">
    <rect x="50" y="350" width="300" height="150" fill="#F7F7F7" rx="10" data-narration="Smart contracts are self-executing contracts with the terms of the agreement written directly into lines of code. They are stored and replicated on the blockchain, allowing for the automation of various processes." />
    <text x="50" y="400" font-size="18" font-family="Arial" fill="#2E4053">Smart Contracts</text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 450" dur="2s" begin="0s" />
