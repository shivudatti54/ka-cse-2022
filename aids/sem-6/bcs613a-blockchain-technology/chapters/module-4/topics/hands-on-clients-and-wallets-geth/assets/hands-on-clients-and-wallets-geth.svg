<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="clients-and-wallets">
  <title>Hands-On: Clients and Wallets – Geth</title>
  <style>
    /* Set up styles */
    * {
      fill: #45a0e6;
      font-family: Arial, sans-serif;
      font-size: 12px;
    }
    .section {
      margin-bottom: 20px;
    }
    .section[data-narration] {
      padding: 20px;
    }
    .section[data-narration]:first-child {
      border-bottom: 1px solid #ccc;
    }
    .connection {
      stroke: #f1c40f;
      stroke-width: 2;
      fill: none;
    }
    .connection path {
      stroke-linecap: round;
    }
  </style>
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff99cc" />
      <stop offset="50%" stop-color="#c9e4ca" />
      <stop offset="100%" stop-color="#f7d2c4" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <g data-narration>
    <rect x="20" y="20" width="380" height="340" rx="10" fill="#fff" />
    <text x="20" y="50" font-size="24" text-anchor="start">Introducing Geth</text>
    <animateTransform attributeName="transform" type="translateY" begin="0s" dur="2s" delay="0s" />
  </g>
  <g data-narration data-narration="What is an Ethereum Client?">
    <rect x="20" y="20" width="380" height="340" rx="10" fill="#fff" />
    <rect x="20" y="70" width="340" height="270" rx="10" fill="#fff" />
    <circle cx="210" cy="150" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,150 L 220,170 L 200,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,150 L 190,170 L 220,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <text x="20" y="110" font-size="18" text-anchor="start">A full node client stores a complete copy of the blockchain and verifies transactions on the network.</text>
    <text x="20" y="140" font-size="18" text-anchor="start">Lightweight and easy to configure, Geth is the perfect choice for developers and users alike.</text>
  </g>
  <g data-narration data-narration="Types of Ethereum Clients">
    <rect x="20" y="20" width="380" height="340" rx="10" fill="#fff" />
    <rect x="20" y="70" width="340" height="270" rx="10" fill="#fff" />
    <rect x="20" y="170" width="340" height="270" rx="10" fill="#fff" />
    <circle cx="210" cy="150" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,150 L 220,170 L 200,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,150 L 190,170 L 220,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <circle cx="210" cy="220" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,220 L 220,240 L 200,230" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,220 L 190,240 L 220,230" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <text x="20" y="110" font-size="18" text-anchor="start">Full nodes store a complete copy of the blockchain and verify transactions on the network.</text>
    <text x="20" y="140" font-size="18" text-anchor="start">Light nodes rely on other full nodes for verification.</text>
    <text x="20" y="170" font-size="18" text-anchor="start">Wallet software is a type of client that allows users to interact with the blockchain and manage their Ether (ETH) and ERC-20 tokens.</text>
  </g>
  <g data-narration data-narration="Geth: The Official Ethereum Client">
    <rect x="20" y="20" width="380" height="340" rx="10" fill="#fff" />
    <rect x="20" y="70" width="340" height="270" rx="10" fill="#fff" />
    <circle cx="210" cy="150" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,150 L 220,170 L 200,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,150 L 190,170 L 220,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <circle cx="210" cy="220" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,220 L 220,240 L 200,230" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,220 L 190,240 L 220,230" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <text x="20" y="110" font-size="18" text-anchor="start">Geth is the official Ethereum client, developed by the Ethereum Foundation.</text>
    <text x="20" y="140" font-size="18" text-anchor="start">As a full node client, Geth stores a complete copy of the blockchain and verifies transactions on the network.</text>
    <text x="20" y="170" font-size="18" text-anchor="start">Geth is relatively lightweight and easy to configure, making it a popular choice for developers and users alike.</text>
  </g>
  <g data-narration data-narration="Key Features of Geth">
    <rect x="20" y="20" width="380" height="340" rx="10" fill="#fff" />
    <rect x="20" y="70" width="340" height="270" rx="10" fill="#fff" />
    <circle cx="210" cy="150" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,150 L 220,170 L 200,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,150 L 190,170 L 220,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <circle cx="210" cy="220" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,220 L 220,240 L 200,230" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,220 L 190,240 L 220,230" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <text x="20" y="110" font-size="18" text-anchor="start">Geth is a full node client that stores a complete copy of the blockchain and verifies transactions on the network.</text>
    <text x="20" y="140" font-size="18" text-anchor="start">Geth is relatively lightweight and easy to configure, making it a popular choice for developers and users alike.</text>
    <text x="20" y="170" font-size="18" text-anchor="start">The Geth client also includes Go-Ethereum, the Ethereum protocol implemented in Go, used by Geth to connect to the blockchain.</text>
  </g>
  <g data-narration data-narration="Geth Components">
    <rect x="20" y="20" width="380" height="340" rx="10" fill="#fff" />
    <rect x="20" y="70" width="340" height="270" rx="10" fill="#fff" />
    <circle cx="210" cy="150" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,150 L 220,170 L 200,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,150 L 190,170 L 220,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <circle cx="210" cy="220" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,220 L 220,240 L 200,230" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,220 L 190,240 L 220,230" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <text x="20" y="110" font-size="18" text-anchor="start">Geth includes Web3.js, a JavaScript library that allows developers to interact with the Ethereum blockchain.</text>
    <text x="20" y="140" font-size="18" text-anchor="start">Geth also includes Gethui, a graphical user interface (GUI) for Geth that allows users to manage their node and interact with the blockchain.</text>
    <text x="20" y="170" font-size="18" text-anchor="start">The Geth client also includes Go-Ethereum, the Ethereum protocol implemented in Go, used by Geth to connect to the blockchain.</text>
  </g>
  <g data-narration data-narration="Hands-on Exercise: Setting up Geth">
    <rect x="20" y="20" width="380" height="340" rx="10" fill="#fff" />
    <rect x="20" y="70" width="340" height="270" rx="10" fill="#fff" />
    <circle cx="210" cy="150" r="30" fill="#f1c40f" class="connection" />
    <path d="M 210,150 L 220,170 L 200,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <path d="M 210,150 L 190,170 L 220,180" stroke="#f1c40f" stroke-width="2" fill="none" class="connection" />
    <text x="20" y="110" font-size="18" text-anchor="start">To set up Geth, download and install the Geth client from the official Ethereum website.</text>
    <text x="20" y="140" font-size="18" text-anchor="start">Run the Geth client and follow the prompts to configure your node.</text>
    <text x="20" y="170" font-size="18" text-anchor="start">Use the Gethui GUI to manage your node and interact with the blockchain.</text>
  </g>
  <g data-topic-id="clients-and-wallets">
    <rect x="10" y="10" width="400" height="380" rx="10" fill="#fff" />
    <rect x="10" y="380" width="400" height="20" rx="10" fill="#ff99cc" />
    <text x="10" y="390" font-size="18" text-anchor="start">Clients and Wallets – Geth</text>
  </g>
</svg>