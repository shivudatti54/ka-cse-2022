<svg width="420" height="400" data-topic-id="ethereum-101-blockchain-technology">
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA" rx="10"/>
  <rect x="0" y="0" width="420" height="40" fill="#CD95E9" rx="10"/>
  <text x="50%" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">Ethereum Blockchain Technology</text>
  <rect x="0" y="50" width="420" height="300" fill="#A1C9F2" rx="10"/>
  
  <section data-narration="Introduction to Blockchain Technology">
    <rect x="0" y="50" width="420" height="150" fill="#C7B8EA" rx="10"/>
    <animate transform="translate(0, 20)" begin="0s" duration="2s" repeatCount="indefinite"/>
    <text x="50%" y="120" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F">Decentralized, distributed ledger</text>
    <arrow marker-end="url(#arrow)" marker-start="M 20 20 30 30" marker-width="5" x="230" y="120" fill="#2F4F7F"/>
  </section>
  
  <section data-narration="Key Components of Blockchain">
    <rect x="0" y="210" width="420" height="150" fill="#C7B8EA" rx="10"/>
    <animate transform="translate(0, 60)" begin="0.2s" duration="2s" repeatCount="indefinite"/>
    <text x="50%" y="280" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F">Decentralized network, distributed ledger, cryptography</text>
    <arrow marker-end="url(#arrow)" marker-start="M 20 20 30 30" marker-width="5" x="230" y="280" fill="#2F4F7F"/>
  </section>
  
  <section data-narration="Ethereum Clients and Releases">
    <rect x="0" y="370" width="420" height="150" fill="#A1C9F2" rx="10"/>
    <animate transform="translate(0, 90)" begin="0.4s" duration="2s" repeatCount="indefinite"/>
    <text x="50%" y="440" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F">Ganache, Parity, Geth</text>
    <arrow marker-end="url(#arrow)" marker-start="M 20 20 30 30" marker-width="5" x="230" y="440" fill="#2F4F7F"/>
  </section>
  
  <section data-narration="Ethereum Releases">
    <rect x="0" y="230" width="420" height="150" fill="#C7B8EA" rx="10"/>
    <animate transform="translate(0, 80)" begin="0.6s" duration="2s" repeatCount="indefinite"/>
    <text x="50%" y="300" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F">Hard forks, soft forks</text>
    <arrow marker-end="url(#arrow)" marker-start="M 20 20 30 30" marker-width="5" x="230" y="300" fill="#2F4F7F"/>
  </section>
  
  <section data-narration="The Ethereum Stack">
    <rect x="0" y="190" width="420" height="150" fill="#A1C9F2" rx="10"/>
    <animate transform="translate(0, 70)" begin="0.8s" duration="2s" repeatCount="indefinite"/>
    <text x="50%" y="250" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F">EVM, gas, block</text>
    <arrow marker-end="url(#arrow)" marker-start="M 20 20 30 30" marker-width="5" x="230" y="250" fill="#2F4F7F"/>
  </section>
  
  <rect x="0" y="0" width="420" height="40" fill="#2F4F7F" rx="10"/>
  <text x="50%" y="10" font-size="24" font-family="Arial" text-anchor="middle" fill="#FFC107">Ethereum Blockchain Technology</text>
  <g id="arrow">
    <path d="M 20 20 h 10 v 10 h -10 z"/>
  </g>
  <g id="shape-gradient">
    <clipPath id="clip">
      <rect x="0" y="0" width="100%" height="100%" rx="10"/>
    </clipPath>
    <rect x="0" y="0" width="100%" height="100%" fill="url(#linear-gradient(#C7B8EA, #A1C9F2))"/>
  </g>
  <defs>
    <linearGradient id="linear-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="100%" stop-color="#A1C9F2"/>
    </linearGradient>
  </defs>
</svg>