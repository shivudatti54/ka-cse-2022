<svg width="420" height="400" data-topic-id="chapter-4-distributed-ledger-technology-dlt">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#73A9F4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0A936E" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  <g>
    <rect x="50" y="50" width="200" height="100" fill="#FFFFFF" rx="10"/>
    <g transform="translate(60,60)">
      <title>Chapter 4: Distributed Ledger Technology (DLT)</title>
      <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
      <g transform="translate(10,10)">
        <text x="0" y="0" fill="#333333" font-size="24">Introduction</text>
        <text x="0" y="50" fill="#333333" font-size="18" data-narration="Distributed ledger technology (DLT) is a type of technology that enables multiple parties to record transactions on a public or private ledger without the need for a central authority." transform="rotate(45 50 50)">Decentralized</text>
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(20,140)">
        <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
        <g transform="translate(10,10)">
          <text x="0" y="0" fill="#333333" font-size="24">Characteristics</text>
          <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
          <g transform="translate(10,10)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="DLT is decentralized, meaning that no single entity controls the ledger or has sole access to it." transform="rotate(45 50 50)">Decentralized</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
          <g transform="translate(0,100)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="DLT uses a consensus mechanism to validate transactions and ensure that all nodes on the network agree on the state of the ledger." transform="rotate(45 50 50)">Consensus Mechanism</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
        </g>
      </g>
      <g transform="translate(70,50)">
        <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
        <g transform="translate(10,10)">
          <text x="0" y="0" fill="#333333" font-size="24">Types</text>
          <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
          <g transform="translate(10,10)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="Public blockchains, such as Bitcoin and Ethereum, are open to anyone who wants to use them. All transactions are visible to anyone on the network, and anyone can join the network and start mining new blocks." transform="rotate(45 50 50)">Public Blockchains</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
          <g transform="translate(0,100)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="Private blockchains, on the other hand, are restricted to a specific group of users. Only authorized parties can access the network, and transactions are not visible to the public." transform="rotate(45 50 50)">Private Blockchains</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
        </g>
      </g>
      <g transform="translate(100,50)">
        <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
        <g transform="translate(10,10)">
          <text x="0" y="0" fill="#333333" font-size="24">Consensus Mechanisms</text>
          <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
          <g transform="translate(10,10)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="Proof of Work (PoW) is the most common consensus mechanism used in public blockchains. It requires miners to solve complex mathematical problems to validate transactions and create new blocks." transform="rotate(45 50 50)">Proof of Work (PoW)</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
          <g transform="translate(0,100)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="Proof of Stake (PoS) is a consensus mechanism used in some private blockchains. It requires validators to &quot;stake&quot; their own cryptocurrency to participate in the validation process." transform="rotate(45 50 50)">Proof of Stake (PoS)</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
          <g transform="translate(0,150)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="Delegated Proof of Stake (DPoS) is a variation of PoS that allows users to vote for validators to participate in the validation process." transform="rotate(45 50 50)">Delegated Proof of Stake (DPoS)</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
        </g>
      </g>
      <g transform="translate(200,50)">
        <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
        <g transform="translate(10,10)">
          <text x="0" y="0" fill="#333333" font-size="24">Advantages</text>
          <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
          <g transform="translate(10,10)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="DLT is transparent, meaning that all transactions are visible to anyone on the network." transform="rotate(45 50 50)">Transparency</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
          <g transform="translate(0,100)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="DLT is immutable, meaning that once a transaction is recorded, it cannot be altered or deleted." transform="rotate(45 50 50)">Immutability</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
        </g>
      </g>
      <g transform="translate(250,50)">
        <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
        <g transform="translate(10,10)">
          <text x="0" y="0" fill="#333333" font-size="24">Conclusion</text>
          <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
          <g transform="translate(10,10)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="In conclusion, DLT is a powerful technology that enables multiple parties to record transactions on a public or private ledger without the need for a central authority." transform="rotate(45 50 50)">Conclusion</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
        </g>
      </g>
      <g transform="translate(340,50)">
        <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
        <g transform="translate(10,10)">
          <text x="0" y="0" fill="#333333" font-size="24">References</text>
          <rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF" rx="10"/>
          <g transform="translate(10,10)">
            <text x="0" y="0" fill="#333333" font-size="18" data-narration="For more information on DLT and its applications, please refer to the references section." transform="rotate(45 50 50)">References</text>
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
          </g>
        </g>
      </g>
    </g>
    <g>
      <g transform="translate(50,180)">
        <text x="0" y="0" fill="#333333" font-size="18" data-narration="Decentralized, meaning that no single entity controls the ledger or has sole access to it." transform="rotate(45 50 50)">Decentralized</text>
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
        <g transform="translate(0,0)">
          <line x1="0" y1="0" x2="50" y2="0" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" transform="rotate(45 50 50)"/>
        </g>
      </g>
      <g transform="translate(150,180)">
        <text x="0" y="0" fill="#333333" font-size="18" data-narration="Consensus mechanism, meaning that all nodes on the network agree on the state of the ledger." transform="rotate(45 50 50)">Consensus Mechanism</text>
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
        <g transform="translate(0,0)">
          <line x1="0" y1="0" x2="50" y2="0" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" transform="rotate(45 50 50)"/>
        </g>
      </g>
      <g transform="translate(250,180)">
        <text x="0" y="0" fill="#333333" font-size="18" data-narration="Immutable, meaning that once a transaction is recorded, it cannot be altered or deleted." transform="rotate(45 50 50)">Immutability</text>
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" begin="0s" repeatCount="indefinite"/>
        <g transform="translate(0,0)">
          <line x1="0" y1="0" x2="50" y2="0" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" transform="rotate(45 50 50)"/>
        </g>
      </g>
    </g>
    <defs>
      <symbol id="arrow" width="10" height="10">
        <path d="M 0 0 L 10 10 Z"/>
      </symbol>
    </defs>
  </g>
</svg>