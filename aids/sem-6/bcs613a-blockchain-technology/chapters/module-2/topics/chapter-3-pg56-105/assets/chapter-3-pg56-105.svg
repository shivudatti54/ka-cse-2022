<svg width="420" height="400" data-topic-id="chapter-3-decentralization-using-blockchain" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%" rx="10" />
  
  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="36" font-family="Arial, sans-serif" fill="#2F4F7F">
    Chapter 3: Decentralization using Blockchain
  </text>
  
  <!-- Section 1: Definition of Decentralization -->
  <section id="section-1" data-narration="Definition of Decentralization">
    <rect x="20" y="80" width="380" height="150" rx="10" fill="#F7F7F7" />
    <text x="50%" y="120" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">
      Decentralization is a system where no single entity has control over the data or network.
    </text>
    <text x="50%" y="150" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666666">
      It is a distributed system where multiple nodes or computers are connected to share and verify data.
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeat="forever" attributeName="opacity">
      <targetElement opacity="0" />
      <targetElement opacity="1" />
    </animate>
  </section>
  
  <!-- Section 2: Importance of Decentralization -->
  <section id="section-2" data-narration="Importance of Decentralization">
    <rect x="20" y="240" width="380" height="150" rx="10" fill="#F7F7F7" />
    <text x="50%" y="290" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">
      Decentralization ensures security by spreading data across multiple nodes.
    </text>
    <text x="50%" y="320" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666666">
      It also provides transparency and promotes trust among participants.
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="2s" dur="2s" repeat="forever" attributeName="opacity">
      <targetElement opacity="0" />
      <targetElement opacity="1" />
    </animate>
  </section>
  
  <!-- Section 3: Methods of Decentralization -->
  <section id="section-3" data-narration="Methods of Decentralization">
    <rect x="20" y="400" width="380" height="150" rx="10" fill="#F7F7F7" />
    <text x="50%" y="450" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">
      Distributed Ledger Technology (DLT) enables decentralization in blockchain.
    </text>
    <text x="50%" y="480" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666666">
      Consensus mechanisms also play a crucial role in decentralization.
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="4s" dur="2s" repeat="forever" attributeName="opacity">
      <targetElement opacity="0" />
      <targetElement opacity="1" />
    </animate>
  </section>
  
  <!-- Section 4: Cryptography -->
  <section id="section-4" data-narration="Cryptography">
    <rect x="20" y="560" width="380" height="150" rx="10" fill="#F7F7F7" />
    <text x="50%" y="610" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">
      Cryptography secures data transmitted on a decentralized network.
    </text>
    <text x="50%" y="640" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666666">
      It uses various algorithms to ensure data integrity.
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="6s" dur="2s" repeat="forever" attributeName="opacity">
      <targetElement opacity="0" />
      <targetElement opacity="1" />
    </animate>
  </section>
  
  <!-- Section 5: Blockchain and Full Ecosystem -->
  <section id="section-5" data-narration="Blockchain and Full Ecosystem">
    <rect x="20" y="720" width="380" height="150" rx="10" fill="#F7F7F7" />
    <text x="50%" y="770" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">
      A blockchain network consists of multiple nodes connected through a decentralized architecture.
    </text>
    <text x="50%" y="800" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666666">
      This network ensures the security, transparency, and trust among participants.
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="8s" dur="2s" repeat="forever" attributeName="opacity">
      <targetElement opacity="0" />
      <targetElement opacity="1" />
    </animate>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="850" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#666666">
    Chapter 3: Decentralization using Blockchain
  </text>
</svg>