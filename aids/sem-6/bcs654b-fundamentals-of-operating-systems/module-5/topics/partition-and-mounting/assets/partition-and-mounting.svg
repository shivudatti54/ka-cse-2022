<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Partition and Mounting</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Disk partitioning divides a physical disk into logical sections. Mounting makes a file system accessible at a specific directory location in the existing directory tree.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Dividing disks into partitions and attaching file systems to directory tree</text>
  </g>
  <g id="step1" class="step" data-narration="A partition is a contiguous section of a disk. Raw partition has no file system, used for swap space. Cooked partition contains a formatted file system. Partition table records layout.">
    <rect x="50" y="80" width="700" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Disk Partitioning</text>
    <rect x="80" y="115" width="140" height="30" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="150" y="134" text-anchor="middle" font-size="10" fill="#1976d2">Partition 1 (ext4)</text>
    <rect x="230" y="115" width="140" height="30" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="300" y="134" text-anchor="middle" font-size="10" fill="#388e3c">Partition 2 (swap)</text>
    <rect x="380" y="115" width="140" height="30" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="450" y="134" text-anchor="middle" font-size="10" fill="#ff9800">Partition 3 (NTFS)</text>
    <rect x="530" y="115" width="140" height="30" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="600" y="134" text-anchor="middle" font-size="10" fill="#9c27b0">Free Space</text>
  </g>
  <g id="step2" class="step" data-narration="Boot partition contains the OS kernel and boot loader. BIOS reads boot block from boot partition. Boot loader loads kernel into memory. Root partition contains the root file system.">
    <rect x="50" y="175" width="340" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Boot and Root Partitions</text>
    <text x="70" y="215" font-size="11" fill="#424242">Boot: kernel + boot loader</text>
    <text x="70" y="232" font-size="11" fill="#424242">Root: contains / file system</text>
    <text x="70" y="249" font-size="11" fill="#388e3c">BIOS -> boot block -> kernel</text>
  </g>
  <g id="step3" class="step" data-narration="Mounting attaches a file system to a mount point in the directory tree. Mount point is an empty directory. After mounting, accessing the directory accesses the mounted file system.">
    <rect x="420" y="175" width="340" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Mounting Process</text>
    <text x="440" y="215" font-size="11" fill="#424242">mount /dev/sdb1 /mnt/usb</text>
    <text x="440" y="232" font-size="11" fill="#424242">Mount point: empty directory</text>
    <text x="440" y="249" font-size="11" fill="#ff9800">FS becomes part of directory tree</text>
  </g>
  <g id="step4" class="step" data-narration="Mount table maintained by OS tracks all mounted file systems. Each entry stores device, mount point, file system type, and options. Used to resolve file paths across mount points.">
    <rect x="50" y="270" width="340" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Mount Table</text>
    <text x="70" y="310" font-size="10" fill="#424242">/dev/sda1  /       ext4   rw</text>
    <text x="70" y="327" font-size="10" fill="#424242">/dev/sdb1  /mnt    ntfs   ro</text>
    <text x="70" y="342" font-size="10" fill="#9c27b0">/dev/sdc1  /home   ext4   rw</text>
  </g>
  <g id="step5" class="step" data-narration="OS verifies file system consistency during mount. Checks superblock, metadata integrity. If inconsistent, runs fsck or chkdsk to repair before mounting. Journaling prevents most issues.">
    <rect x="420" y="270" width="340" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Consistency Check</text>
    <text x="440" y="310" font-size="11" fill="#424242">Verify superblock and metadata</text>
    <text x="440" y="327" font-size="11" fill="#424242">fsck / chkdsk for repair</text>
    <text x="440" y="344" font-size="11" fill="#f44336">Journaling prevents corruption</text>
  </g>
  <g id="step6" class="step" data-narration="Virtual file systems provide uniform interface for different file system types. VFS abstracts ext4, NTFS, NFS behind common API. Applications use same calls regardless of underlying file system.">
    <rect x="50" y="365" width="700" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Virtual File System (VFS)</text>
    <text x="70" y="405" font-size="11" fill="#424242">Uniform API across ext4, NTFS, NFS, FAT - same open/read/write/close calls</text>
  </g>
  <g id="step7" class="step" data-narration="Partitioning divides disks logically. Mounting integrates file systems into the directory tree. VFS provides a uniform interface across different file system types.">
    <rect x="50" y="435" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Partition + Format + Mount + VFS = Unified File System Access</text>
  </g>
</svg>
