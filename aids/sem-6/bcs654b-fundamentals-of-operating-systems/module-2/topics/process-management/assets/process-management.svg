<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="22" fill="#2563eb" text-anchor="middle" font-weight="bold">Process Management</text>
  <g id="step0" class="step" data-narration="Introduction to Process Management">
    <text x="400" y="80" font-size="18" fill="#6b7280" text-anchor="middle">A crucial function of an Operating System</text>
    <rect x="300" y="120" width="200" height="80" fill="#10b981" rx="5"/>
    <text x="400" y="155" font-size="18" fill="#ffffff" text-anchor="middle">Process</text>
    <text x="400" y="180" font-size="14" fill="#ffffff" text-anchor="middle">Program in execution</text>
  </g>
  <g id="step1" class="step" data-narration="Definition of a Process">
    <rect x="50" y="60" width="700" height="100" fill="#8b5cf6" rx="5"/>
    <text x="400" y="95" font-size="18" fill="#ffffff" text-anchor="middle">Definition: A process is an instance of a program in execution</text>
    <text x="400" y="125" font-size="14" fill="#ffffff" text-anchor="middle">Contains: Program Counter, Registers, Variables, Stack, Heap</text>
  </g>
  <g id="step2" class="step" data-narration="Process vs Program">
    <rect x="50" y="60" width="330" height="120" fill="#2563eb" rx="5"/>
    <text x="215" y="95" font-size="18" fill="#ffffff" text-anchor="middle">Program</text>
    <text x="215" y="125" font-size="14" fill="#ffffff" text-anchor="middle">Passive, Static</text>
    <text x="215" y="150" font-size="14" fill="#ffffff" text-anchor="middle">File on disk</text>
    <rect x="420" y="60" width="330" height="120" fill="#10b981" rx="5"/>
    <text x="585" y="95" font-size="18" fill="#ffffff" text-anchor="middle">Process</text>
    <text x="585" y="125" font-size="14" fill="#ffffff" text-anchor="middle">Active, Dynamic</text>
    <text x="585" y="150" font-size="14" fill="#ffffff" text-anchor="middle">Running in memory</text>
  </g>
  <g id="step3" class="step" data-narration="Process States">
    <rect x="50" y="60" width="700" height="180" fill="#ffffff" stroke="#10b981" stroke-width="2" rx="5"/>
    <text x="60" y="85" font-size="18" fill="#10b981">Process States</text>
    <circle cx="150" cy="130" r="25" fill="#f59e0b"/>
    <text x="150" y="135" font-size="14" fill="#ffffff" text-anchor="middle">New</text>
    <circle cx="280" cy="130" r="25" fill="#f59e0b"/>
    <text x="280" y="135" font-size="14" fill="#ffffff" text-anchor="middle">Ready</text>
    <circle cx="410" cy="130" r="25" fill="#2563eb"/>
    <text x="410" y="135" font-size="14" fill="#ffffff" text-anchor="middle">Running</text>
    <circle cx="540" cy="130" r="25" fill="#8b5cf6"/>
    <text x="540" y="135" font-size="14" fill="#ffffff" text-anchor="middle">Waiting</text>
    <circle cx="670" cy="130" r="25" fill="#10b981"/>
    <text x="670" y="135" font-size="12" fill="#ffffff" text-anchor="middle">Terminated</text>
  </g>
  <g id="step4" class="step" data-narration="Process Control Block (PCB)">
    <rect x="50" y="60" width="700" height="150" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" rx="5"/>
    <text x="60" y="90" font-size="18" fill="#8b5cf6">Process Control Block (PCB)</text>
    <text x="60" y="120" font-size="14" fill="#6b7280">• Process State</text>
    <text x="60" y="145" font-size="14" fill="#6b7280">• Program Counter</text>
    <text x="60" y="170" font-size="14" fill="#6b7280">• CPU Registers</text>
    <text x="300" y="120" font-size="14" fill="#6b7280">• Memory Management Info</text>
    <text x="300" y="145" font-size="14" fill="#6b7280">• Accounting Information</text>
    <text x="300" y="170" font-size="14" fill="#6b7280">• I/O Status Information</text>
  </g>
  <g id="step5" class="step" data-narration="Process Scheduling">
    <rect x="50" y="60" width="700" height="150" fill="#ffffff" stroke="#2563eb" stroke-width="2" rx="5"/>
    <text x="60" y="90" font-size="18" fill="#2563eb">Process Scheduling</text>
    <text x="60" y="120" font-size="14" fill="#6b7280">Determines which process runs next on the CPU</text>
    <rect x="100" y="140" width="250" height="50" fill="#10b981" rx="5"/>
    <text x="225" y="170" font-size="14" fill="#ffffff" text-anchor="middle">Long-term Scheduler</text>
    <rect x="400" y="140" width="250" height="50" fill="#f59e0b" rx="5"/>
    <text x="525" y="170" font-size="14" fill="#ffffff" text-anchor="middle">Short-term Scheduler</text>
  </g>
  <g id="step6" class="step" data-narration="Scheduling Queues">
    <rect x="50" y="60" width="700" height="150" fill="#ffffff" stroke="#10b981" stroke-width="2" rx="5"/>
    <text x="60" y="90" font-size="18" fill="#10b981">Scheduling Queues</text>
    <rect x="100" y="110" width="180" height="50" fill="#8b5cf6" rx="5"/>
    <text x="190" y="140" font-size="14" fill="#ffffff" text-anchor="middle">Job Queue</text>
    <rect x="310" y="110" width="180" height="50" fill="#2563eb" rx="5"/>
    <text x="400" y="140" font-size="14" fill="#ffffff" text-anchor="middle">Ready Queue</text>
    <rect x="520" y="110" width="180" height="50" fill="#f59e0b" rx="5"/>
    <text x="610" y="140" font-size="14" fill="#ffffff" text-anchor="middle">Device Queues</text>
  </g>
  <g id="step7" class="step" data-narration="Types of Schedulers">
    <rect x="50" y="60" width="330" height="120" fill="#f59e0b" rx="5"/>
    <text x="215" y="95" font-size="18" fill="#ffffff" text-anchor="middle">Long-term Scheduler</text>
    <text x="215" y="125" font-size="14" fill="#ffffff" text-anchor="middle">Selects processes from job pool</text>
    <text x="215" y="150" font-size="12" fill="#ffffff" text-anchor="middle">Controls degree of multiprogramming</text>
    <rect x="420" y="60" width="330" height="120" fill="#2563eb" rx="5"/>
    <text x="585" y="95" font-size="18" fill="#ffffff" text-anchor="middle">Short-term Scheduler</text>
    <text x="585" y="125" font-size="14" fill="#ffffff" text-anchor="middle">Selects from ready queue</text>
    <text x="585" y="150" font-size="12" fill="#ffffff" text-anchor="middle">Invoked frequently (milliseconds)</text>
  </g>
</svg>
