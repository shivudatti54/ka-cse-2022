<svg width="420" height="400" data-topic-id="Contiguous-Memory-Allocation">
  <title>Contiguous Memory Allocation</title>
  <footer>Learn about Dynamic Memory Allocation</footer>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <section data-narration="Introduction to Dynamic Memory Allocation">
    <div style="position: absolute; top: 20px; left: 10px;">
      <animate transform="rotate(360 10 10)" begin="0s" dur="10s" repeatCount="indefinite"/>
    </div>
    <h2>Dynamic Memory Allocation</h2>
    <p>Allocates memory at runtime</p>
  </section>
  <section data-narration="Functions for Dynamic Memory Allocation">
    <div style="position: absolute; top: 50px; left: 10px;">
      <animate transform="rotate(720 10 10)" begin="0s" dur="10s" repeatCount="indefinite"/>
    </div>
    <h2>Malloc</h2>
    <p>Allocates a block of memory</p>
    <ul>
      <li>void *malloc(size_t size);</li>
      <li>Example: int *ptr = (int *)malloc(5 * sizeof(int));</li>
    </ul>
  </section>
  <section data-narration="calloc Function for Dynamic Memory Allocation">
    <div style="position: absolute; top: 90px; left: 10px;">
      <animate transform="rotate(1080 10 10)" begin="0s" dur="10s" repeatCount="indefinite"/>
    </div>
    <h2>Calloc</h2>
    <p>Allocates multiple blocks of memory</p>
    <ul>
      <li>void *calloc(size_t num, size_t size);</li>
      <li>Example: int *ptr = (int *)calloc(5, sizeof(int));</li>
    </ul>
  </section>
  <section data-narration="realloc Function for Dynamic Memory Allocation">
    <div style="position: absolute; top: 130px; left: 10px;">
      <animate transform="rotate(1296 10 10)" begin="0s" dur="10s" repeatCount="indefinite"/>
    </div>
    <h2>Realloc</h2>
    <p>Changes the size of previously allocated memory</p>
    <ul>
      <li>void *realloc(void *ptr, size_t new_size);</li>
      <li>Example: ptr = realloc(ptr, 10 * sizeof(int));</li>
    </ul>
  </section>
  <section data-narration="free Function for Dynamic Memory Allocation">
    <div style="position: absolute; top: 170px; left: 10px;">
      <animate transform="rotate(1440 10 10)" begin="0s" dur="10s" repeatCount="indefinite"/>
    </div>
    <h2>Free</h2>
    <p>Deallocates previously allocated memory</p>
    <ul>
      <li>void free(void *ptr);</li>
      <li>Example: free(ptr); ptr = NULL;</li>
    </ul>
  </section>
  <section data-narration="Differences between Static and Dynamic Memory Allocation">
    <div style="position: absolute; top: 210px; left: 10px;">
      <animate transform="rotate(1568 10 10)" begin="0s" dur="10s" repeatCount="indefinite"/>
    </div>
    <table>
      <tr>
        <th>Feature</th>
        <th>Static Allocation</th>
        <th>Dynamic Allocation</th>
      </tr>
      <tr>
        <td>Memory Size</td>
        <td>Fixed at compile time</td>
        <td>Determined at runtime</td>
      </tr>
      <tr>
        <td>Lifetime</td>
        <td>Entire program execution</td>
        <td>Until explicitly freed</td>
      </tr>
      <tr>
        <td>Flexibility</td>
        <td>Limited</td>
        <td>High</td>
      </tr>
    </table>
  </section>
  <section data-narration="Conclusion">
    <div style="position: absolute; top: 250px; left: 10px;">
      <animate transform="rotate(1728 10 10)" begin="0s" dur="10s" repeatCount="indefinite"/>
    </div>
    <h2>Conclusion</h2>
    <p>Dynamic memory allocation is essential for programs that require flexibility and scalability.</p>
  </section>
</svg>