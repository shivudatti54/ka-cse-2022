<svg width="420" height="400" data-topic-id="structure-of-page-table-textbook-1-chapter-8-81-88">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64B3FF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E8F4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="180" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#3498DB">
    Structure of Page Table
  </text>

  <!-- Section 1: Introduction -->
  <section data-narration="What is a Page Table?">
    <rect x="10" y="50" width="400" height="60" fill="#F9F9F9" rx="10"/>
    <text x="20" y="70" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
      A page table is a data structure that maps a set of virtual addresses to a set of physical addresses.
    </text>
    <animate duration="1000" begin="100ms" from="M10 70" to="M10 70 20 20" fill="freeze"/>
  </section>

  <!-- Section 2: Page Table Structure -->
  <section data-narration="Page Table Structure">
    <rect x="10" y="120" width="400" height="60" fill="#F9F9F9" rx="10"/>
    <text x="20" y="140" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
      A page table typically consists of the following components:
    </text>
    <animate duration="1000" begin="200ms" from="M10 140" to="M10 140 20 20" fill="freeze"/>
  </section>

  <!-- Section 3: Virtual Page Number (VPN) -->
  <section data-narration="Virtual Page Number (VPN)">
    <rect x="10" y="170" width="400" height="60" fill="#F9F9F9" rx="10"/>
    <text x="20" y="190" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
      A 32-bit (or 64-bit) value that represents the virtual page number.
    </text>
    <animate duration="1000" begin="300ms" from="M10 190" to="M10 190 20 20" fill="freeze"/>
  </section>

  <!-- Section 4: Page Table Entry (PTE) -->
  <section data-narration="Page Table Entry (PTE)">
    <rect x="10" y="220" width="400" height="60" fill="#F9F9F9" rx="10"/>
    <text x="20" y="240" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
      A 64-bit (or 32-bit) value that represents the physical address of a page.
    </text>
    <text x="20" y="260" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
      Typically consists of three fields:
      <ul>
        <li><text x="40" y="280" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Base Address</text></li>
        <li><text x="40" y="300" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Page Size</text></li>
        <li><text x="40" y="320" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Present</text></li>
      </ul>
    </text>
    <animate duration="1000" begin="400ms" from="M10 260" to="M10 260 20 20" fill="freeze"/>
  </section>

  <!-- Section 5: Page Directory Entry (PDE) -->
  <section data-narration="Page Directory Entry (PDE)">
    <rect x="10" y="270" width="400" height="60" fill="#F9F9F9" rx="10"/>
    <text x="20" y="290" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
      A 32-bit (or 64-bit) value that represents the address of a page table.
    </text>
    <text x="20" y="310" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
      Typically consists of four fields:
      <ul>
        <li><text x="40" y="330" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Page Frame Number</text></li>
        <li><text x="40" y="350" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Page Table Offset</text></li>
        <li><text x="40" y="370" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Page Table Type</text></li>
        <li><text x="40" y="390" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Present</text></li>
      </ul>
    </text>
    <animate duration="1000" begin="500ms" from="M10 310" to="M10 310 20 20" fill="freeze"/>
  </section>

  <!-- Section 6: Page Table Types -->
  <section data-narration="Page Table Types">
    <rect x="10" y="320" width="400" height="60" fill="#F9F9F9" rx="10"/>
    <text x="20" y="340" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
      There are several types of page tables, including:
    </text>
    <ul>
      <li><text x="40" y="360" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Unified Page Table</text></li>
      <li><text x="40" y="380" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Indexed Page Table</text></li>
      <li><text x="40" y="400" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">Split Page Table</text></li>
    </ul>
  </section>

  <!-- Footer -->
  <text x="180" y="380" font-size="18" font-family="Arial" text-anchor="middle" fill="#3498DB">
    Designed by <a href="#">Your Name</a>
  </text>
</svg>