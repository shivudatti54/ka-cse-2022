<svg width="420" height="400" data-topic-id="Deadlock-Detection-And-Recovery-From-Deadlock" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65C5F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4DB9E3" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <g transform="translate(10, 20)">
      <text x="0" y="30" font-size="24" font-family="Arial" text-anchor="middle">Deadlock Detection and Recovery From Deadlock</text>
    </g>
  </section>
  
  <!-- Image Section -->
  <section data-narration="What is Deadlock">
    <g transform="translate(10, 60)">
      <path d="M 50 100 C 70 120 90 140 110 160"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M 70 100 C 90 120 110 140 130 160"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M 90 100 C 110 120 130 140 150 160"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M 110 100 C 130 120 150 140 170 160"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M 130 100 C 150 120 170 140 190 160"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
    </g>
  </section>
  
  <!-- Characteristics Section -->
  <section data-narration="Characteristics of Deadlocks">
    <g transform="translate(10, 120)">
      <rect x="0" y="0" width="200" height="30" fill="#4DB9E3" rx="10"/>
      <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="middle">Hold and Wait</text>
      <rect x="220" y="0" width="200" height="30" fill="#4DB9E3" rx="10"/>
      <text x="230" y="10" font-size="18" font-family="Arial" text-anchor="middle">No Preemption</text>
      <rect x="0" y="40" width="200" height="30" fill="#4DB9E3" rx="10"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="middle">Circular Wait</text>
    </g>
  </section>
  
  <!-- Methods Section -->
  <section data-narration="Methods for Handling Deadlocks">
    <g transform="translate(10, 180)">
      <rect x="0" y="0" width="200" height="30" fill="#C0392B" rx="10"/>
      <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="middle">Avoid Deadlock</text>
      <rect x="220" y="0" width="200" height="30" fill="#C0392B" rx="10"/>
      <text x="230" y="10" font-size="18" font-family="Arial" text-anchor="middle">Detect Deadlock</text>
      <rect x="0" y="40" width="200" height="30" fill="#C0392B" rx="10"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="middle">Recover from Deadlock</text>
    </g>
  </section>
  
  <!-- Detect Deadlock Section -->
  <section data-narration="Detect Deadlock">
    <g transform="translate(10, 240)">
      <rect x="0" y="0" width="200" height="30" fill="#2ecc71" rx="10"/>
      <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="middle">Banker's Algorithm</text>
      <rect x="220" y="0" width="200" height="30" fill="#2ecc71" rx="10"/>
      <text x="230" y="10" font-size="18" font-family="Arial" text-anchor="middle">Wait-For Graph</text>
      <rect x="0" y="40" width="200" height="30" fill="#2ecc71" rx="10"/>
      <text x="10" y="50" font-size="18" font-family="Arial" text-anchor="middle">Idle Monitor</text>
    </g>
  </section>
  
  <!-- Recover from Deadlock Section -->
  <section data-narration="Recover from Deadlock">
    <g transform="translate(10, 300)">
      <rect x="0" y="0" width="200" height="30" fill="#e74c3c" rx="10"/>
      <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="middle">Resource Preemption</text>
      <rect x="220" y="0" width="200" height="30" fill="#e74c3c" rx="10"/>
      <text x="230" y="10" font-size="18" font-family="Arial" text-anchor="middle">Resource Optimization</text>
    </g>
  </section>
  
  <!-- Footer Section -->
  <footer>
    <g transform="translate(10, 380)">
      <path d="M 50 390 C 70 410 90 430 110 450"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M 70 390 C 90 410 110 430 130 450"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M 90 390 C 110 410 130 430 150 450"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M 110 390 C 130 410 150 430 170 450"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M 130 390 C 150 410 170 430 190 450"
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.5"/>
    </g>
  </footer>
</svg>