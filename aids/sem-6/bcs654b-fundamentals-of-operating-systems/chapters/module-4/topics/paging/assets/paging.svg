<svg
  width="420"
  height="400"
  data-topic-id="paging"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 420 400"
  style="background-image: linear-gradient(to bottom, #7A8DFF 0%, #B3E5FC 100%); border-radius: 10px; border: 1px solid #3498DB;"
>

  <!-- Title -->
  <rect
    x="10"
    y="10"
    width="400"
    height="30"
    fill="#3498DB"
    rx="5"
  >
    <text
      x="20"
      y="15"
      text-anchor="middle"
      font-size="18"
      fill="#FFFFFF"
    >
      Paging
    </text>
  </rect>

  <!-- Section: Concept -->
  <section
    id="concept"
    style="background-color: #F7F7F7; padding: 20px; border: 1px solid #E5E5E5;"
    data-narration="Physical memory divided into fixed-size blocks called frames, Logical memory divided into same-size blocks called pages"
  >
    <h2>Concept</h2>
    <p>
      Physical memory divided into fixed-size blocks called <span style="font-weight: bold;">frames</span>,
      Logical memory divided into same-size blocks called <span style="font-weight: bold;">pages</span>.
    </p>
  </section>

  <!-- Section: Address Translation -->
  <section
    id="address-translation"
    style="background-color: #F7F7F7; padding: 20px; border: 1px solid #E5E5E5;"
    data-narration="Page size = Frame size (typically 4KB), Eliminates external fragmentation"
  >
    <h2>Address Translation</h2>
    <div style="display: flex; flex-direction: column; align-items: center;">
      <div
        style="background-color: #C9E4CA; padding: 20px; border-radius: 10px; width: 100px; height: 100px; margin-bottom: 20px;"
      >
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="50%" text-anchor="middle" font-size="24" fill="#3498DB">
            Page Size = Frame Size
          </text>
        </div>
      </div>
      <div
        style="background-color: #C9E4CA; padding: 20px; border-radius: 10px; width: 100px; height: 100px;"
      >
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="50%" text-anchor="middle" font-size="24" fill="#3498DB">
            Eliminates External Fragmentation
          </text>
        </div>
      </div>
    </div>
  </section>

  <!-- Section: Address Translation (continued) -->
  <section
    id="address-translation-continued"
    style="background-color: #F7F7F7; padding: 20px; border: 1px solid #E5E5E5;"
    data-narration="Page Number = Logical Address / Page Size, Offset = Logical Address % Page Size"
  >
    <h2>Address Translation (continued)</h2>
    <div style="display: flex; flex-direction: column; align-items: center;">
      <div
        style="background-color: #C9E4CA; padding: 20px; border-radius: 10px; width: 200px; height: 100px; margin-bottom: 20px;"
      >
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="50%" text-anchor="middle" font-size="24" fill="#3498DB">
            Page Number = Logical Address / Page Size
          </text>
        </div>
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="70%" text-anchor="middle" font-size="24" fill="#3498DB">
            Offset = Logical Address % Page Size
          </text>
        </div>
      </div>
    </div>
  </section>

  <!-- Section: Page Table -->
  <section
    id="page-table"
    style="background-color: #F7F7F7; padding: 20px; border: 1px solid #E5E5E5;"
    data-narration="Page Table Entry (PTE) contains: Frame number, Valid/Invalid bit, Protection bits, Dirty bit, Reference bit"
  >
    <h2>Page Table</h2>
    <div style="display: flex; flex-direction: column; align-items: center;">
      <div
        style="background-color: #C9E4CA; padding: 20px; border-radius: 10px; width: 200px; height: 100px; margin-bottom: 20px;"
      >
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="50%" text-anchor="middle" font-size="24" fill="#3498DB">
            Page Table Entry (PTE)
          </text>
        </div>
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="70%" text-anchor="middle" font-size="24" fill="#3498DB">
            Frame number, Valid/Invalid bit, Protection bits, Dirty bit, Reference bit
          </text>
        </div>
      </div>
    </div>
  </section>

  <!-- Section: Multi-Level Paging -->
  <section
    id="multi-level-paging"
    style="background-color: #F7F7F7; padding: 20px; border: 1px solid #E5E5E5;"
    data-narration="Two-Level Paging: Outer page table points to inner tables, Inner tables point to frames"
  >
    <h2>Multi-Level Paging</h2>
    <div style="display: flex; flex-direction: column; align-items: center;">
      <div
        style="background-color: #C9E4CA; padding: 20px; border-radius: 10px; width: 200px; height: 100px; margin-bottom: 20px;"
      >
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="50%" text-anchor="middle" font-size="24" fill="#3498DB">
            Two-Level Paging
          </text>
        </div>
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="70%" text-anchor="middle" font-size="24" fill="#3498DB">
            Outer page table points to inner tables, Inner tables point to frames
          </text>
        </div>
      </div>
    </div>
  </section>

  <!-- Section: Inverted Page Table -->
  <section
    id="inverted-page-table"
    style="background-color: #F7F7F7; padding: 20px; border: 1px solid #E5E5E5;"
    data-narration="Inverted Page Table: One entry per frame (not per page), Entry contains: Process ID + page number"
  >
    <h2>Inverted Page Table</h2>
    <div style="display: flex; flex-direction: column; align-items: center;">
      <div
        style="background-color: #C9E4CA; padding: 20px; border-radius: 10px; width: 200px; height: 100px; margin-bottom: 20px;"
      >
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="50%" text-anchor="middle" font-size="24" fill="#3498DB">
            Inverted Page Table
          </text>
        </div>
        <div style="background-color: #F7F7F7; padding: 10px; border-radius: 5px;">
          <text x="50%" y="70%" text-anchor="middle" font-size="24" fill="#3498DB">
            One entry per frame (not per page), Entry contains: Process ID + page number
          </text>
        </div>
      </div>
    </div>
  </section>

  <!-- Animation: TLB -->
  <animate
    xlink:href="#tlb"
    begin="100ms"
    duration="2000ms"
    repeatCount="indefinite"
    style="fill-opacity: 0; transform: rotate(360deg)"
  />

  <!-- Animation: TLB (continued) -->
  <animate
    xlink:href="#tlb-continued"
    begin="550ms"
    duration="2000ms"
    repeatCount="indefinite"
    style="fill-opacity: 0; transform: rotate(360deg)"
  />

  <!-- Footer -->
  <rect
    x="10"
    y="380"
    width="400"
    height="30"
    fill="#3498DB"
    rx="5"
  >
    <text
      x="20"
      y="385"
      text-anchor="middle"
      font-size="18"
      fill="#FFFFFF"
    >
      Paging
    </text>
  </rect>

  <!-- TLB -->
  <g id="tlb" transform="rotate(0) scale(1) translate(200, 150)">
    <rect
      x="0"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="20"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="40"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="60"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="80"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="100"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="120"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="140"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
  </g>

  <!-- TLB (continued) -->
  <g id="tlb-continued" transform="rotate(0) scale(1) translate(300, 150)">
    <rect
      x="0"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="20"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="40"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="60"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="80"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="100"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="120"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
    <rect
      x="140"
      y="0"
      width="20"
      height="20"
      fill="#C9E4CA"
      rx="5"
    />
  </g>

</svg>