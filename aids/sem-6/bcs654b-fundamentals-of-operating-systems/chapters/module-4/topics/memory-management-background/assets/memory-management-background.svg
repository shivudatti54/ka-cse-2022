<svg width="420" height="400" data-topic-id="memory-management-background">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="memory-management-background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63A9F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#9FDBFF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#memory-management-background-gradient)" />
  
  <!-- Section 1: Introduction to Key Management -->
  <section data-narration="What is Key Management?">
    <rect x="0" y="50" width="420" height="100" style="fill: #F7F7F7; border: 1px solid #E5E5E5; border-radius: 10px; padding: 20px;" />
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#666666">What is Key Management?</text>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" fill="#666666">Key management encompasses the comprehensive set of processes and mechanisms for the generation, creation, distribution, storage, use, rotation, and eventual destruction of cryptographic keys.</text>
  </section>
  
  <!-- Section 2: Why is Key Management So Crucial? -->
  <section data-narration="Why is Key Management So Crucial?">
    <rect x="0" y="170" width="420" height="100" style="fill: #F7F7F7; border: 1px solid #E5E5E5; border-radius: 10px; padding: 20px;" />
    <text x="20" y="150" font-size="24" font-family="Arial, sans-serif" fill="#666666">Why is key management so crucial?</text>
    <text x="20" y="180" font-size="18" font-family="Arial, sans-serif" fill="#666666">
      Consider these analogies:
      <text x="20" y="210" font-size="18" font-family="Arial, sans-serif" fill="#666666">- A fortess with impenetrable walls is useless if the keys to the main gate are left under the doormat.</text>
      <text x="20" y="240" font-size="18" font-family="Arial, sans-serif" fill="#666666">- A bank vault with a complex lock is insecure if the combination is written on a post-it note stuck to the door.</text>
    </text>
  </section>
  
  <!-- Section 3: The Critical Importance of Key Management -->
  <section data-narration="The Critical Importance of Key Management">
    <rect x="0" y="300" width="420" height="100" style="fill: #F7F7F7; border: 1px solid #E5E5E5; border-radius: 10px; padding: 20px;" />
    <text x="20" y="290" font-size="24" font-family="Arial, sans-serif" fill="#666666">The Critical Importance of Key Management</text>
    <text x="20" y="320" font-size="18" font-family="Arial, sans-serif" fill="#666666">
      Proper key management ensures that only authorized entities can access encrypted data. Non-repudiation, system integrity, and compliance are all dependent on robust key management practices.</text>
  </section>
  
  <!-- Section 4: The Key Lifecycle -->
  <section data-narration="The Key Lifecycle: A Comprehensive Overview">
    <rect x="0" y="450" width="420" height="100" style="fill: #F7F7F7; border: 1px solid #E5E5E5; border-radius: 10px; padding: 20px;" />
    <text x="20" y="440" font-size="24" font-family="Arial, sans-serif" fill="#666666">The Key Lifecycle</text>
    <text x="20" y="470" font-size="18" font-family="Arial, sans-serif" fill="#666666">
      A cryptographic key is not a static entity; it has a lifespan. Key management governs this entire lifecycle, which can be broken down into the following phases:
      <text x="20" y="510" font-size="18" font-family="Arial, sans-serif" fill="#666666">- Key Generation</text>
      <text x="20" y="550" font-size="18" font-family="Arial, sans-serif" fill="#666666">- Storage</text>
      <text x="20" y="590" font-size="18" font-family="Arial, sans-serif" fill="#666666">- Use</text>
      <text x="20" y="630" font-size="18" font-family="Arial, sans-serif" fill="#666666">- Rotation</text>
      <text x="20" y="670" font-size="18" font-family="Arial, sans-serif" fill="#666666">- Destruction</text>
    </text>
  </section>
  
  <!-- Animations -->
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2s" begin="0s" delay="0s" repeatCount="indefinite" />
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="0" to="1" dur="2s" begin="0s" delay="0s" repeatCount="indefinite" />
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="x" from="0" to="420" dur="2s" begin="0s" delay="0s" repeatCount="indefinite" />
  <animate xmlns="http://www.w3.org/2000/svg" attributeName="x" from="420" to="0" dur="2s" begin="0s" delay="0s" repeatCount="indefinite" />
  
  <!-- Title and Footer -->
  <text x="20" y="20" font-size="36" font-family="Arial, sans-serif" fill="#666666" text-anchor="middle">Memory Management Background</text>
  <text x="20" y="380" font-size="18" font-family="Arial, sans-serif" fill="#666666" text-anchor="middle">Learn more about memory management practices and their importance in cryptography.</text>
</svg>