<svg width="420" height="400" data-topic-id="deadlock-prevention" viewBox="0 0 420 400"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="overflow:visible;">
    <defs>
        <linearGradient id="parallax-background" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8f1acc" stop-opacity="1" />
            <stop offset="100%" stop-color="#6c5ce7" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="parallax-text-background" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4f79ff" stop-opacity="1" />
            <stop offset="100%" stop-color="#3e8eef" stop-opacity="1" />
        </linearGradient>
    </defs>

    <rect x="0" y="0" width="420" height="400" fill="url(#parallax-background)" rx="10" />
    <text x="10" y="30" font-size="24" font-family="Open Sans" fill="#fff" text-anchor="start" opacity="0.8"
          style="font-weight: bold;" data-narration="Title: Deadlock Prevention">
        Deadlock Prevention
    </text>

    <g data-narration="Section 1: Mutual Exclusion" transform="translate(50, 100)">
        <rect x="0" y="0" width="200" height="50" fill="#fff" rx="10" />
        <circle cx="100" cy="25" r="10" fill="#4f79ff" />
        <text x="100" y="40" font-size="18" font-family="Open Sans" fill="#333" text-anchor="middle"
              style="font-weight: bold;" data-narration="Mutual Exclusion: Spooling">
            Spooling
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 100" to="50 100"
                           begin="1s" dur="1s" repeatCount="1" />
    </g>

    <g data-narration="Section 2: Hold and Wait">
        <rect x="50" y="150" width="200" height="50" fill="#fff" rx="10" />
        <rect x="120" y="30" width="50" height="20" fill="#4f79ff" rx="5" />
        <rect x="80" y="30" width="50" height="20" fill="#4f79ff" rx="5" />
        <text x="100" y="60" font-size="18" font-family="Open Sans" fill="#333" text-anchor="middle"
              style="font-weight: bold;" data-narration="Hold and Wait: Request all at once">
            Request all at once
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 150" to="50 150"
                           begin="2s" dur="1s" repeatCount="1" />
    </g>

    <g data-narration="Section 3: No Preemption">
        <rect x="50" y="250" width="200" height="50" fill="#fff" rx="10" />
        <rect x="120" y="40" width="50" height="20" fill="#4f79ff" rx="5" />
        <rect x="80" y="40" width="50" height="20" fill="#4f79ff" rx="5" />
        <text x="100" y="70" font-size="18" font-family="Open Sans" fill="#333" text-anchor="middle"
              style="font-weight: bold;" data-narration="No Preemption: Release if denied">
            Release if denied
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 250" to="50 250"
                           begin="3s" dur="1s" repeatCount="1" />
    </g>

    <g data-narration="Section 4: Circular Wait">
        <rect x="50" y="350" width="200" height="50" fill="#fff" rx="10" />
        <rect x="120" y="60" width="50" height="20" fill="#4f79ff" rx="5" />
        <rect x="80" y="60" width="50" height="20" fill="#4f79ff" rx="5" />
        <text x="100" y="80" font-size="18" font-family="Open Sans" fill="#333" text-anchor="middle"
              style="font-weight: bold;" data-narration="Circular Wait: Resource ordering">
            Resource ordering
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 350" to="50 350"
                           begin="4s" dur="1s" repeatCount="1" />
    </g>

    <g data-narration="Conclusion">
        <rect x="50" y="400" width="200" height="50" fill="#fff" rx="10" />
        <text x="100" y="420" font-size="24" font-family="Open Sans" fill="#333" text-anchor="middle"
              style="font-weight: bold;" data-narration="Conclusion">
            Conclusion
        </text>
        <animateTransform attributeName="transform" type="translate" from="0 400" to="50 400"
                           begin="5s" dur="1s" repeatCount="1" />
    </g>

    <rect x="50" y="0" width="320" height="10" fill="#8f1acc" rx="5" />
    <rect x="50" y="370" width="320" height="10" fill="#8f1acc" rx="5" />
</svg>