<svg width="420" height="400" data-topic-id="multithreading-models" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="15" y="20" font-family="Arial" font-size="18" fill="#1A1D23" text-anchor="start" data-narration="Title">
    Multithreading Models
  </text>
  
  <!-- Section 1: Introduction -->
  <section x="15" y="50" width="350" height="150" fill="#F7F7F7" rx="10">
    <rect x="0" y="0" width="350" height="150" fill="#F7F7F7" rx="10" />
    <text x="10" y="20" font-family="Arial" font-size="14" fill="#666" text-anchor="start" data-narration="Introduce multithreading">
      Multithreading is a fundamental concept in modern operating systems that allows a single process to execute multiple threads concurrently.
    </text>
    <text x="10" y="80" font-family="Arial" font-size="14" fill="#666" text-anchor="start" data-narration="Key benefits">
      Key benefits: responsiveness, resource sharing, economy, and scalability.
    </text>
  </section>
  
  <!-- Section 2: User Threads vs Kernel Threads -->
  <section x="15" y="210" width="350" height="200" fill="#F7F7F7" rx="10">
    <rect x="0" y="0" width="350" height="200" fill="#F7F7F7" rx="10" />
    <text x="10" y="20" font-family="Arial" font-size="14" fill="#666" text-anchor="start" data-narration="User Threads">
      User Threads: managed entirely by user-level libraries without kernel support.
    </text>
    <line x1="150" y1="60" x2="150" y2="120" stroke="#666" stroke-width="2" data-narration="Comparison table">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="150,0" begin="0s" dur="2s" repeatCount="indefinite" />
    </line>
    <text x="10" y="160" font-family="Arial" font-size="14" fill="#666" text-anchor="start" data-narration="Kernel Threads">
      Kernel Threads: supported and managed directly by the operating system kernel.
    </text>
  </section>
  
  <!-- Section 3: Comparison Table -->
  <section x="15" y="410" width="350" height="100" fill="#F7F7F7" rx="10">
    <rect x="0" y="0" width="350" height="100" fill="#F7F7F7" rx="10" />
    <rect x="10" y="10" width="100" height="80" fill="#F7F7F7" rx="10" />
    <text x="120" y="30" font-family="Arial" font-size="14" fill="#666" text-anchor="start">
      <tspan>Aspect</tspan>
      <tspan> </tspan>
      <tspan>User Threads</tspan>
      <tspan> </tspan>
      <tspan>Kernel Threads</tspan>
    </text>
    <text x="10" y="50" font-family="Arial" font-size="14" fill="#666" text-anchor="start" data-narration="Management">
      Management: user-level library
    </text>
    <text x="10" y="80" font-family="Arial" font-size="14" fill="#666" text-anchor="start" data-narration="Speed">
      Speed: fast creation/context switching
    </text>
    <line x1="150" y1="60" x2="150" y2="120" stroke="#666" stroke-width="2" data-narration="Comparison table">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="150,0" begin="0s" dur="2s" repeatCount="indefinite" />
    </line>
  </section>
  
  <!-- Section 4: Conclusion -->
  <section x="15" y="520" width="350" height="150" fill="#F7F7F7" rx="10">
    <rect x="0" y="0" width="350" height="150" fill="#F7F7F7" rx="10" />
    <text x="10" y="20" font-family="Arial" font-size="14" fill="#666" text-anchor="start" data-narration="Conclusion">
      Multithreading is a powerful concept that allows for efficient use of resources and improves application responsiveness.
    </text>
  </section>
  
  <!-- Footer at bottom -->
  <text x="15" y="380" font-family="Arial" font-size="14" fill="#666" text-anchor="start" data-narration="Footer">
    This diagram illustrates the key concepts of multithreading models.
  </text>
</svg>