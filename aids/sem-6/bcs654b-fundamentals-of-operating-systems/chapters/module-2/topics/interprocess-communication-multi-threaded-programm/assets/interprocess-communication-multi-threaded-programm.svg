<svg width="420" height="400" data-topic-id="interprocess-communication-multi-threaded-programming" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <title>Interprocess Communication Multi-threaded Programming</title>
  <rect x="0" y="0" width="420" height="40" fill="#66CCCC" rx="10" />
  <text x="20" y="20" text-anchor="start" font-size="18" font-family="Arial" fill="#666666">Interprocess Communication</text>
  <rect x="0" y="50" width="420" height="300" fill="url(#gradient1)" />
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="60" width="400" height="200" fill="#FFFFFF" rx="10" />
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="80" height="20" fill="#64BFFF" rx="5" />
    <text x="10" y="5" text-anchor="start" font-size="14" font-family="Arial" fill="#000000">Definition</text>
    <text x="10" y="25" text-anchor="start" font-size="14" font-family="Arial" fill="#666666">Interprocess Communication is the ability of two or more programs to communicate with each other.</text>
    <animate transform="translateX(50)" begin="0s" dur="2s" fill="freeze" />
  </g>
  <g transform="translate(20, 230)">
    <rect x="0" y="0" width="80" height="20" fill="#C9E4CA" rx="5" />
    <text x="10" y="5" text-anchor="start" font-size="14" font-family="Arial" fill="#000000">Types</text>
    <text x="10" y="25" text-anchor="start" font-size="14" font-family="Arial" fill="#666666">There are two types of Interprocess Communication: Synchronous and Asynchronous.</text>
    <animate transform="translateX(50)" begin="2s" dur="2s" fill="freeze" />
    <line x1="20" y1="15" x2="120" y2="15" stroke="#66CCCC" stroke-width="2" />
    <line x1="20" y1="35" x2="120" y2="35" stroke="#66CCCC" stroke-width="2" />
  </g>
  <g transform="translate(20, 320)">
    <rect x="0" y="0" width="80" height="20" fill="#ADD8E6" rx="5" />
    <text x="10" y="5" text-anchor="start" font-size="14" font-family="Arial" fill="#000000">Synchronization</text>
    <text x="10" y="25" text-anchor="start" font-size="14" font-family="Arial" fill="#666666">Synchronization is essential in Interprocess Communication to ensure that data exchanged between threads is consistent and accurate.</text>
    <animate transform="translateX(50)" begin="4s" dur="2s" fill="freeze" />
    <line x1="20" y1="15" x2="120" y2="15" stroke="#66CCCC" stroke-width="2" />
    <line x1="20" y1="35" x2="120" y2="35" stroke="#66CCCC" stroke-width="2" />
    <line x1="20" y1="55" x2="120" y2="55" stroke="#66CCCC" stroke-width="2" />
  </g>
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="80" height="20" fill="#C9E4CA" rx="5" />
    <text x="10" y="5" text-anchor="start" font-size="14" font-family="Arial" fill="#000000">Example</text>
    <text x="10" y="25" text-anchor="start" font-size="14" font-family="Arial" fill="#666666">Consider a simple example of two threads, `reader` and `writer`, that exchange data.</text>
    <animate transform="translateX(50)" begin="6s" dur="2s" fill="freeze" />
    <line x1="20" y1="15" x2="120" y2="15" stroke="#66CCCC" stroke-width="2" />
    <line x1="20" y1="35" x2="120" y2="35" stroke="#66CCCC" stroke-width="2" />
    <line x1="20" y1="55" x2="120" y2="55" stroke="#66CCCC" stroke-width="2" />
    <line x1="20" y1="75" x2="120" y2="75" stroke="#66CCCC" stroke-width="2" />
  </g>
  <rect x="0" y="360" width="420" height="40" fill="#66CCCC" rx="10" />
  <text x="20" y="380" text-anchor="start" font-size="18" font-family="Arial" fill="#000000">Footer</text>
</svg>