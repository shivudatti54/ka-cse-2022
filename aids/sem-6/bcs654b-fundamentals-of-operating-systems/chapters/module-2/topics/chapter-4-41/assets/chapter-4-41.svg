<svg width="420" height="400" data-topic-id="process-management-41">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#33CC66" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0099CC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Process Management</title>
  <rect x="10" y="10" width="400" height="380" style="fill:url(#grad)"/>
  <text x="160" y="20" font-size="24" font-family="Arial" font-weight="bold">Process Management</text>
  <section data-narration="Process Concept" style="margin-top: 50;">
    <rect x="10" y="50" width="380" height="30" style="fill:#FFFFFF;stroke:#000000;stroke-width:2"/>
    <text x="20" y="60" font-size="18" font-family="Arial">Program Counter (PC)</text>
    <text x="150" y="60" font-size="18" font-family="Arial">Memory Space</text>
    <text x="280" y="60" font-size="18" font-family="Arial">System Resources</text>
  </section>
  <section data-narration="Process Scheduling" style="margin-top: 50;">
    <rect x="10" y="130" width="380" height="30" style="fill:#FFFFFF;stroke:#000000;stroke-width:2"/>
    <text x="20" y="140" font-size="18" font-family="Arial">Shortest Job First (SJF) Scheduling</text>
    <text x="20" y="170" font-size="18" font-family="Arial">Round Robin (RR) Scheduling</text>
    <text x="20" y="200" font-size="18" font-family="Arial">Priority Scheduling</text>
  </section>
  <section data-narration="FCFS Scheduling" style="margin-top: 50;">
    <rect x="10" y="220" width="380" height="30" style="fill:#FFFFFF;stroke:#000000;stroke-width:2"/>
    <rect x="10" y="250" width="100" height="20" style="fill:#FF9900;stroke:#000000;stroke-width:2"/>
    <text x="20" y="260" font-size="18" font-family="Arial">First-Come-First-Served (FCFS)</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="100 250" dur="2s"/>
  </section>
  <section data-narration="Multilevel Feedback Queue Scheduling" style="margin-top: 50;">
    <rect x="140" y="220" width="100" height="20" style="fill:#66CCCC;stroke:#000000;stroke-width:2"/>
    <rect x="10" y="250" width="100" height="20" style="fill:#33CC66;stroke:#000000;stroke-width:2"/>
    <text x="120" y="260" font-size="18" font-family="Arial">Multilevel Feedback Queue (MLFQ)</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="100 250" dur="2s"/>
  </section>
  <section data-narration="Operations on Processes" style="margin-top: 50;">
    <rect x="10" y="300" width="380" height="30" style="fill:#FFFFFF;stroke:#000000;stroke-width:2"/>
    <text x="20" y="310" font-size="18" font-family="Arial">Creation</text>
    <text x="20" y="340" font-size="18" font-family="Arial">Termination</text>
    <text x="20" y="370" font-size="18" font-family="Arial">Synchronization</text>
  </section>
  <footer>Process Management</footer>
</svg>