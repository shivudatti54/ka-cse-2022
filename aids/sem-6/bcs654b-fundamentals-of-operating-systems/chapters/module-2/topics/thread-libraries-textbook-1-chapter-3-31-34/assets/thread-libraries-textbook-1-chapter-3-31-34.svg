<svg width="420" height="400" data-topic-id="thread-libraries-textbook-1-chapter-3-31-34">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#66CCCC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>

  <!-- Title -->
  <g transform="translate(10, 20)">
    <text x="0" y="20" font-size="24" font-family="Arial" font-weight="bold">
      Thread Libraries
    </text>
  </g>

  <!-- Section 1: Introduction to Threads -->
  <g transform="translate(15, 50)">
    <rect x="0" y="0" width="380" height="100" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" font-weight="bold" data-narration="Introduction to Threads">
      A thread is a lightweight process that shares the same memory space as other threads in the same process.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 95" to="360 190 95" dur="10s" begin="0s"/>
  </g>

  <!-- Section 2: Characteristics -->
  <g transform="translate(15, 150)">
    <rect x="0" y="0" width="380" height="100" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" font-weight="bold" data-narration="Characteristics">
      <tspan>Lightweight:</tspan>
      <tspan>Threads have lower overhead compared to processes.</tspan>
      <tspan><br/>Sharing:</tspan>
      <tspan>Threads share the same memory space.</tspan>
      <tspan><br/>Independent Execution:</tspan>
      <tspan>Threads can execute concurrently.</tspan>
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 95" to="360 190 95" dur="10s" begin="2s"/>
  </g>

  <!-- Section 3: Advantages -->
  <g transform="translate(15, 250)">
    <rect x="0" y="0" width="380" height="100" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" font-weight="bold" data-narration="Advantages">
      <tspan>Efficient Resource Utilization:</tspan>
      <tspan>Multiple threads can perform different tasks simultaneously.</tspan>
      <tspan><br/>Improved Responsiveness:</tspan>
      <tspan>Threads can respond to user input quickly.</tspan>
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 95" to="360 190 95" dur="10s" begin="4s"/>
  </g>

  <!-- Section 4: Disadvantages -->
  <g transform="translate(15, 350)">
    <rect x="0" y="0" width="380" height="100" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" font-weight="bold" data-narration="Disadvantages">
      <tspan>Complexity:</tspan>
      <tspan>Thread management can be complex.</tspan>
      <tspan><br/>Security Risks:</tspan>
      <tspan>Shared memory can pose security risks if not managed properly.</tspan>
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 95" to="360 190 95" dur="10s" begin="6s"/>
  </g>

  <!-- Section 5: Synchronization -->
  <g transform="translate(15, 450)">
    <rect x="0" y="0" width="380" height="100" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" font-weight="bold" data-narration="Synchronization">
      <tspan>Definition:</tspan>
      <tspan>Coordination of access to shared resources by multiple threads.</tspan>
      <tspan><br/>Importance:</tspan>
      <tspan>Ensures Data Integrity and Prevents Deadlocks.</tspan>
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 95" to="360 190 95" dur="10s" begin="8s"/>
  </g>

  <!-- Section 6: Techniques -->
  <g transform="translate(15, 550)">
    <rect x="0" y="0" width="380" height="100" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="10" font-size="18" font-family="Arial" font-weight="bold" data-narration="Techniques">
      <tspan>Mutual Exclusion:</tspan>
      <tspan>Semaphore:</tspan>
      <tspan>Monitors:</tspan>
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 95" to="360 190 95" dur="10s" begin="10s"/>
  </g>

  <!-- Footer -->
  <g transform="translate(10, 360)">
    <text x="0" y="0" font-size="18" font-family="Arial" font-weight="bold">
      Created by [Your Name]
    </text>
  </g>
</svg>