<svg data-topic-id="system-organization-memory-organization"
     width="420" height="400" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 400" style="background-color: #C7E5F6;">

  <!-- Header -->
  <rect x="10" y="10" width="400" height="40" fill="#ADD8E6"/>
  <text x="20" y="25" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Memory Organization</text>

  <!-- Section 1: CPU Registers -->
  <rect x="10" y="60" width="400" height="80" fill="#F7F7F7"/>
  <animate transform="rotate(0 200 200)" begin="0s" dur="2s" repeatCount="indefinite"/>
  <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="CPU Registers are the fastest, smallest, and most expensive memory elements within a microcontroller. They are used for temporary storage of operands and results, limited in number (typically 8-32 registers in 8/16-bit MCUs)."></text>
  <line x1="200" y1="60" x2="200" y2="130" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="130" stroke="#2F4F7F" stroke-width="2" />
  <line x1="300" y1="60" x2="300" y2="130" stroke="#2F4F7F" stroke-width="2" />

  <!-- Section 2: Cache Memory -->
  <rect x="10" y="160" width="400" height="80" fill="#F7F7F7"/>
  <animate transform="rotate(0 200 200)" begin="2s" dur="2s" repeatCount="indefinite"/>
  <text x="20" y="170" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Cache Memory is a small, high-speed memory between the CPU and main memory. It stores frequently accessed instructions and data. Not always present in smaller microcontrollers, but common in advanced microcontrollers like ARM Cortex-M series.</text>
  <line x1="200" y1="160" x2="200" y2="240" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="100" y1="160" x2="100" y2="240" stroke="#2F4F7F" stroke-width="2" />
  <line x1="300" y1="160" x2="300" y2="240" stroke="#2F4F7F" stroke-width="2" />

  <!-- Section 3: Main Memory -->
  <rect x="10" y="260" width="400" height="80" fill="#F7F7F7"/>
  <animate transform="rotate(0 200 200)" begin="4s" dur="2s" repeatCount="indefinite"/>
  <text x="20" y="270" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Main Memory is the primary storage for program and data. It is divided into program memory and data memory, and implemented using different technologies based on purpose."></text>
  <line x1="200" y1="260" x2="200" y2="340" stroke="#2F4F7F" stroke-width="2"/>
  <line x1="100" y1="260" x2="100" y2="340" stroke="#2F4F7F" stroke-width="2" />
  <line x1="300" y1="260" x2="300" y2="340" stroke="#2F4F7F" stroke-width="2" />

  <!-- Footer -->
  <rect x="10" y="360" width="400" height="40" fill="#ADD8E6"/>
  <text x="20" y="375" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">System Organization</text>

</svg>