    <text x="50" y="10" font-size="18" font-family="Arial" text-anchor="middle" fill="#66CCCC">What is an Operating System?</text>
    <text x="50" y="30" font-size="14" font-family="Arial" text-anchor="middle" fill="#66CCCC" data-narration="An OS acts as an intermediary between computer hardware and software applications. It manages hardware resources, processes requests from applications, and provides services to applications." transform="rotate(90 50 30)"/>
