    <animateTransform attributeName="transform" type="translate" from="0 0" to="200 0" dur="2s" begin="0s" delay="0s"/>
    <text x="50" y="10" font-size="18" font-family="Arial" text-anchor="middle" fill="#E0C33F">Importance of Operating Systems</text>
    <text x="50" y="30" font-size="14" font-family="Arial" text-anchor="middle" fill="#E0C33F" data-narration="Operating systems play a crucial role in managing computer resources and providing a platform for running applications. They offer security and protection, improve productivity and efficiency, and allow multiple applications to run simultaneously." transform="rotate(90 50 30)"/>
