    <text x="50" y="10" font-size="18" font-family="Arial" text-anchor="middle" fill="#33CC66">Types of Operating Systems</text>
    <text x="50" y="30" font-size="14" font-family="Arial" text-anchor="middle" fill="#33CC66" data-narration="There are single-user, single-tasking operating systems, single-user, multi-tasking operating systems, multi-user operating systems, and mobile operating systems." transform="rotate(90 50 30)"/>
