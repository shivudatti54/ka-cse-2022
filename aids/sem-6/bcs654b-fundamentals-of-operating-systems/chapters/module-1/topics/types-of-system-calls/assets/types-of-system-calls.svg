<svg width="420" height="400" data-topic-id="types-of-system-calls" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8e44ad" stop-opacity="1"/>
            <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
    <path d="M 20 220 L 20 60" stroke="#8e44ad" stroke-width="2" fill="none"/>
    <path d="M 20 60 L 370 60" stroke="#8e44ad" stroke-width="2" fill="none"/>
    <path d="M 20 220 L 370 220" stroke="#8e44ad" stroke-width="2" fill="none"/>
    <path d="M 20 60 L 20 220" stroke="#6495ed" stroke-width="2" fill="none"/>
    <path d="M 370 60 L 370 220" stroke="#6495ed" stroke-width="2" fill="none"/>
    <path d="M 20 60 L 370 60" stroke="#6495ed" stroke-width="2" fill="none"/>
    <path d="M 20 220 L 370 220" stroke="#6495ed" stroke-width="2" fill="none"/>
    <text x="20" y="30" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#9f98c7">System Calls</text>
    <text x="20" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#9f98c7">Introduction</text>
    <section data-narration="System Calls and API">
        <rect x="10" y="280" width="400" height="50" fill="#f7d2c4" rx="5"/>
        <path d="M 15 285 L 15 295" stroke="#6495ed" stroke-width="2" fill="none"/>
        <path d="M 15 285 L 15 295" stroke="#6495ed" stroke-width="2" fill="none"/>
        <animateTransform attributeName="transform" type="translate" from="0,285" to="0,295" dur="1s" begin="0s"/>
        <text x="20" y="290" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">A system call is a programmed request to the operating system kernel</text>
        <text x="20" y="310" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">to perform a privileged task on behalf of the calling process.</text>
    </section>
    <section data-narration="Key Characteristics">
        <rect x="10" y="340" width="400" height="50" fill="#f7d2c4" rx="5"/>
        <path d="M 15 345 L 15 355" stroke="#6495ed" stroke-width="2" fill="none"/>
        <path d="M 15 345 L 15 355" stroke="#6495ed" stroke-width="2" fill="none"/>
        <animateTransform attributeName="transform" type="translate" from="0,345" to="0,355" dur="1s" begin="1s"/>
        <text x="20" y="350" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">The key characteristics of system calls are:</text>
        <text x="20" y="370" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">- They are the only entry points into the kernel.</text>
        <text x="20" y="390" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">- They are typically implemented as software interrupts or special instructions.</text>
    </section>
    <section data-narration="Types of System Calls">
        <rect x="10" y="380" width="400" height="50" fill="#f7d2c4" rx="5"/>
        <path d="M 15 385 L 15 395" stroke="#6495ed" stroke-width="2" fill="none"/>
        <path d="M 15 385 L 15 395" stroke="#6495ed" stroke-width="2" fill="none"/>
        <animateTransform attributeName="transform" type="translate" from="0,385" to="0,395" dur="1s" begin="2s"/>
        <text x="20" y="390" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">There are several types of system calls:</text>
        <text x="20" y="410" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">- File System System Calls</text>
        <text x="20" y="430" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">- Process Management System Calls</text>
    </section>
    <footer>
        <path d="M 20 400 L 20 410" stroke="#6495ed" stroke-width="2" fill="none"/>
        <path d="M 20 400 L 20 410" stroke="#6495ed" stroke-width="2" fill="none"/>
        <animateTransform attributeName="transform" type="translate" from="0,400" to="0,410" dur="1s" begin="3s"/>
        <text x="20" y="405" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#6495ed">Learn more about system calls and their applications.</text>
    </footer>
</svg>