<svg width="420" height="400" data-topic-id="ethereum-architecture">
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

    <!-- Title Section -->
    <section data-narration="What is Ethereum?">
        <rect x="10" y="10" width="400" height="50" fill="#2E4053" rx="10"/>
        <text x="20" y="25" font-size="22" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Ethereum</text>
        <animate transform="translate(20, 30) rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>

    <!-- Ethereum Network Section -->
    <section data-narration="Core Components of Ethereum Architecture">
        <rect x="10" y="70" width="400" height="150" fill="#2E4053" rx="10"/>
        <rect x="10" y="220" width="200" height="50" fill="#ACC7F2" rx="10"/>
        <rect x="210" y="220" width="200" height="50" fill="#ACC7F2" rx="10"/>
        <rect x="10" y="280" width="400" height="50" fill="#2E4053" rx="10"/>
        <animate transform="translate(20, 90) rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animate transform="translate(220, 90) rotate(45)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
        <animate transform="translate(210, 280) rotate(45)" begin="1s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="110" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Full Nodes</text>
        <text x="220" y="110" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Light Nodes</text>
        <text x="210" y="270" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Validator Nodes</text>
        <text x="20" y="330" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Archive Nodes</text>
    </section>

    <!-- Ethereum State Section -->
    <section data-narration="Ethereum State">
        <rect x="10" y="230" width="400" height="150" fill="#2E4053" rx="10"/>
        <rect x="10" y="380" width="400" height="50" fill="#ACC7F2" rx="10"/>
        <animate transform="translate(20, 240) rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animate transform="translate(20, 380) rotate(45)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="260" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Account State</text>
        <text x="20" y="420" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">World State</text>
    </section>

    <!-- Block Structure Section -->
    <section data-narration="Block Structure">
        <rect x="10" y="350" width="400" height="150" fill="#2E4053" rx="10"/>
        <rect x="10" y="500" width="200" height="50" fill="#ACC7F2" rx="10"/>
        <rect x="210" y="500" width="200" height="50" fill="#ACC7F2" rx="10"/>
        <rect x="10" y="560" width="400" height="50" fill="#2E4053" rx="10"/>
        <animate transform="translate(20, 360) rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animate transform="translate(220, 360) rotate(45)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
        <animate transform="translate(210, 520) rotate(45)" begin="1s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="370" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Block Header</text>
        <text x="220" y="370" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Transactions Root</text>
    </section>

    <!-- Consensus Mechanism Section -->
    <section data-narration="Consensus Mechanism">
        <rect x="10" y="250" width="400" height="150" fill="#2E4053" rx="10"/>
        <rect x="10" y="410" width="400" height="50" fill="#ACC7F2" rx="10"/>
        <animate transform="translate(20, 260) rotate(45)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animate transform="translate(20, 410) rotate(45)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
        <text x="20" y="280" font-size="18" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Proof of Stake</text>
    </section>

    <!-- Footer Section -->
    <footer>
        <rect x="10" y="390" width="400" height="10" fill="#2E4053" rx="5"/>
        <text x="20" y="400" font-size="14" font-family="Arial" fill="#ACC7F2" text-anchor="middle">Ethereum</text>
    </footer>
</svg>