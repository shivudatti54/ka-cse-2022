<svg width="420" height="400" data-topic-id="system-calls-and-api">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64BFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2E7BEC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  
  <!-- Section 1: Introduction -->
  <g data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#FFFFFF" rx="5"/>
    <text x="20" y="25" font-size="18" fill="#2E7BEC">System Calls and API</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: What is a System Call? -->
  <g data-narration="What is a System Call?">
    <rect x="10" y="70" width="400" height="50" fill="#FFFFFF" rx="5"/>
    <text x="20" y="85" font-size="18" fill="#2E7BEC">A system call is a programmed request to the operating system kernel...</text>
    <line x1="50" y1="50" x2="300" y2="50" stroke="#64BFFF" stroke-width="2"/>
    <animate attributeName="stroke-dasharray" from="1, 10" to="10, 1" dur="2000" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Key Characteristics -->
  <g data-narration="Key Characteristics">
    <rect x="10" y="130" width="400" height="50" fill="#FFFFFF" rx="5"/>
    <text x="20" y="145" font-size="18" fill="#2E7BEC">...are the only entry points into the kernel...</text>
    <line x1="150" y1="50" x2="300" y2="50" stroke="#64BFFF" stroke-width="2"/>
    <animate attributeName="stroke-dasharray" from="1, 10" to="10, 1" dur="2000" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: System Calls Ha -->
  <g data-narration="System Calls Ha">
    <rect x="10" y="190" width="400" height="50" fill="#FFFFFF" rx="5"/>
    <text x="20" y="205" font-size="18" fill="#2E7BEC">...each have a specific purpose...</text>
    <line x1="250" y1="50" x2="300" y2="50" stroke="#64BFFF" stroke-width="2"/>
    <animate attributeName="stroke-dasharray" from="1, 10" to="10, 1" dur="2000" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 5: Conclusion -->
  <g data-narration="Conclusion">
    <rect x="10" y="250" width="400" height="50" fill="#FFFFFF" rx="5"/>
    <text x="20" y="265" font-size="18" fill="#2E7BEC">In conclusion, system calls are an essential part of the operating system...</text>
    <line x1="350" y1="50" x2="400" y2="50" stroke="#64BFFF" stroke-width="2"/>
    <animate attributeName="stroke-dasharray" from="1, 10" to="10, 1" dur="2000" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="14" fill="#2E7BEC">System Calls and API</text>
</svg>