<svg width="420" height="400" data-topic-id="application-program-interface">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="50%" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Application Program Interface
  </text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction to the Programmer's Interface">
    <rect x="10" y="50" width="400" height="50" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      The Programmer's Interface is a crucial component of a graphics system,
      providing a way for programmers to interact with the graphics hardware.
    </text>
    <animate transform="rotate(360 50% 50%)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Components -->
  <section data-narration="Components of the Programmer's Interface">
    <rect x="10" y="120" width="400" height="50" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <text x="20" y="140" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      The Programmer's Interface consists of several components,
      including Graphics Library, Device Driver, and Graphics API.
    </text>
    <animate transform="rotate(720 50% 50%)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 3: Functions -->
  <section data-narration="Functions of the Programmer's Interface">
    <rect x="10" y="190" width="400" height="50" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <text x="20" y="210" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      The Programmer's Interface provides several functions,
      including Vertex Processing, Geometry Transformation, and Pixel Rendering.
    </text>
    <animate transform="rotate(1080 50% 50%)" begin="1s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 4: Graphics Library -->
  <section data-narration="Graphics Library">
    <rect x="10" y="270" width="400" height="50" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <text x="20" y="290" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      A graphics library is a collection of pre-written code
      that provides a set of functions for performing common graphics tasks.
    </text>
    <animate transform="rotate(1440 50% 50%)" begin="1.5s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 5: Device Driver -->
  <section data-narration="Device Driver">
    <rect x="10" y="330" width="400" height="50" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <text x="20" y="350" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      A device driver is a piece of software that manages
      the interaction between the graphics hardware and the operating system.
    </text>
    <animate transform="rotate(1728 50% 50%)" begin="2s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 6: Graphics API -->
  <section data-narration="Graphics API">
    <rect x="10" y="390" width="400" height="50" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <text x="20" y="410" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
      A graphics API is a set of functions that provide a way
      for programmers to access the graphics hardware and create graphical applications.
    </text>
    <animate transform="rotate(2016 50% 50%)" begin="2.5s" dur="2s" repeatCount="indefinite"/>
  </section>

  <!-- Footer -->
  <text x="50%" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
    Created with love for educational purposes
  </text>
</svg>