<svg 
  width="420" 
  height="400" 
  data-topic-id="Resource Management Operating System Structures" 
  viewBox="0 0 420 400" 
  xmlns="http://www.w3.org/2000/svg" 
  xmlns:xlink="http://www.w3.org/1999/xlink" 
  style="background-color: #66CCCC;">

  <!-- Header Section -->
  <rect x="10" y="10" width="400" height="30" rx="5" fill="#66CCCC" />
  <text x="15" y="25" font-size="24" font-family="Arial" fill="#2E4053" text-anchor="start">Resource Management Operating System Structures</text>
  <text x="15" y="55" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="start">Data Topic ID: <tspan x="55" font-size="18" font-family="Arial" fill="#2E4053">resource-management-structures</tspan></text>

  <!-- Gradient Background -->
  <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ACC7F7" stop-opacity="1" />
    <stop offset="100%" stop-color="#E0E0E0" stop-opacity="1" />
  </linearGradient>
  <rect x="10" y="40" width="400" height="280" rx="5" fill="url(#gradient)" opacity="0.5" />

  <!-- Section 1: Process Management -->
  <rect x="20" y="60" width="350" height="60" rx="5" fill="#F7F7F7" />
  <animateTransform 
    attributeName="transform" 
    type="rotate" 
    from="0 200 160" 
    to="360 200 160" 
    dur="10s" 
    repeatCount="indefinite" 
    begin="0s" />
  <text x="200" y="140" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Process Management</text>
  <text x="20" y="110" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">Process Creation, Scheduling, Termination</text>
  <text x="20" y="150" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">Memory Allocation, CPU Time Allocation</text>

  <!-- Section 2: Memory Management -->
  <rect x="20" y="230" width="350" height="60" rx="5" fill="#F7F7F7" />
  <animateTransform 
    attributeName="transform" 
    type="rotate" 
    from="0 200 220" 
    to="360 200 220" 
    dur="10s" 
    repeatCount="indefinite" 
    begin="10s" />
  <text x="200" y="310" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Memory Management</text>
  <text x="20" y="290" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">Memory Allocation, Deallocation</text>
  <text x="20" y="310" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">Memory Protection</text>

  <!-- Section 3: File System Management -->
  <rect x="20" y="330" width="350" height="60" rx="5" fill="#F7F7F7" />
  <animateTransform 
    attributeName="transform" 
    type="rotate" 
    from="0 200 370" 
    to="360 200 370" 
    dur="10s" 
    repeatCount="indefinite" 
    begin="20s" />
  <text x="200" y="410" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">File System Management</text>
  <text x="20" y="390" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">File Creation, Retrieval, Deletion</text>
  <text x="20" y="410" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">Storage Space Allocation</text>

  <!-- Section 4: I/O Management -->
  <rect x="20" y="430" width="350" height="60" rx="5" fill="#F7F7F7" />
  <animateTransform 
    attributeName="transform" 
    type="rotate" 
    from="0 200 500" 
    to="360 200 500" 
    dur="10s" 
    repeatCount="indefinite" 
    begin="30s" />
  <text x="200" y="510" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">I/O Management</text>
  <text x="20" y="490" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">Input/Output Operations</text>
  <text x="20" y="510" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">I/O Device Allocation</text>

  <!-- Section 5: Interrupt Handling -->
  <rect x="20" y="550" width="350" height="60" rx="5" fill="#F7F7F7" />
  <animateTransform 
    attributeName="transform" 
    type="rotate" 
    from="0 200 580" 
    to="360 200 580" 
    dur="10s" 
    repeatCount="indefinite" 
    begin="40s" />
  <text x="200" y="630" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="middle">Interrupt Handling</text>
  <text x="20" y="610" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">Interrupt Handling</text>
  <text x="20" y="630" font-size="14" font-family="Arial" fill="#2E4053" text-anchor="start">Interrupt Service Routine</text>

  <!-- Footer Section -->
  <rect x="10" y="370" width="400" height="30" rx="5" fill="#66CCCC" />
  <text x="15" y="385" font-size="18" font-family="Arial" fill="#2E4053" text-anchor="start">Copyright 2023</text>
</svg>