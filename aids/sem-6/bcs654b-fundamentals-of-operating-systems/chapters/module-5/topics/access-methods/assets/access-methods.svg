<svg width="420" height="400" data-topic-id="access-methods" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title Section -->
  <section data-narration="Introduction to Access Methods">
    <rect x="50" y="50" width="260" height="100" fill="#87CEEB" rx="10" />
    <text x="70" y="70" font-size="24" font-family="Arial" fill="#6495ED">Access Methods</text>
  </section>
  
  <!-- Section 1: Quantitative Methods -->
  <section data-narration="Quantitative Methods">
    <rect x="50" y="180" width="260" height="100" fill="#87CEEB" rx="10" />
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" attributeName="opacity">
      <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="2s" repeatCount="indefinite" />
    </animate>
    <text x="70" y="220" font-size="18" font-family="Arial" fill="#6495ED">Quantitative Methods</text>
    <text x="70" y="250" font-size="16" font-family="Arial" fill="#666666">These methods use numerical data to understand user behavior.</text>
  </section>
  
  <!-- Section 2: Qualitative Methods -->
  <section data-narration="Qualitative Methods">
    <rect x="50" y="300" width="260" height="100" fill="#6495ED" rx="10" />
    <animate xmlns="http://www.w3.org/2000/svg" begin="2s" dur="2s" attributeName="opacity">
      <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="2s" repeatCount="indefinite" />
    </animate>
    <text x="70" y="330" font-size="18" font-family="Arial" fill="#87CEEB">Qualitative Methods</text>
    <text x="70" y="360" font-size="16" font-family="Arial" fill="#666666">These methods use non-numerical data to understand user behavior.</text>
  </section>
  
  <!-- Section 3: Mixed Methods -->
  <section data-narration="Mixed Methods">
    <rect x="50" y="400" width="260" height="100" fill="#FFC107" rx="10" />
    <animate xmlns="http://www.w3.org/2000/svg" begin="4s" dur="2s" attributeName="opacity">
      <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="2s" repeatCount="indefinite" />
    </animate>
    <text x="70" y="430" font-size="18" font-family="Arial" fill="#6495ED">Mixed Methods</text>
    <text x="70" y="460" font-size="16" font-family="Arial" fill="#666666">These methods combine numerical and non-numerical data to understand user behavior.</text>
  </section>
  
  <!-- Section 4: Remote Methods -->
  <section data-narration="Remote Methods">
    <rect x="50" y="500" width="260" height="100" fill="#3E8E41" rx="10" />
    <animate xmlns="http://www.w3.org/2000/svg" begin="6s" dur="2s" attributeName="opacity">
      <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="2s" repeatCount="indefinite" />
    </animate>
    <text x="70" y="530" font-size="18" font-family="Arial" fill="#87CEEB">Remote Methods</text>
    <text x="70" y="560" font-size="16" font-family="Arial" fill="#666666">These methods use digital tools and platforms to collect user data.</text>
  </section>
  
  <!-- Footer -->
  <text x="50" y="550" font-size="16" font-family="Arial" fill="#666666">Design Thinking Process</text>
</svg>