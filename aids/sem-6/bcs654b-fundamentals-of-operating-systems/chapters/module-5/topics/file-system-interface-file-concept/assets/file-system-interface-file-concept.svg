<svg width="420" height="400" data-topic-id="file-system-interface-file-concept">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="# FCC5C5"/>
            <stop offset="100%" stop-color="#C7B8EA"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    <g transform="translate(20, 20)">
        <title>File System Interface File Concept</title>
        <rect x="0" y="-10" width="400" height="30" fill="#3498DB" rx="5"/>
        <text x="20" y="5" fill="#FFFFFF" font-size="24" font-family="Arial, sans-serif" text-anchor="left">Introduction</text>
        <rect x="0" y="40" width="400" height="30" fill="#2ECC71" rx="5"/>
        <text x="20" y="55" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="left" data-narration="A file system is a fundamental component that manages the storage and retrieval of data. The file system interface is the layer that provides a common interface for applications to interact with files.">
            <animate transform="rotate(0) translate(0, 0)" begin="0s" dur="2s" repeatCount="indefinite"/>
        </text>
        <rect x="0" y="80" width="400" height="30" fill="#E74C3C" rx="5"/>
        <text x="20" y="95" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="left" data-narration="A file is a collection of data that is stored on a storage device, such as a hard drive or solid-state drive. Files can be thought of as containers that hold data, and they have several key characteristics: name, location, data, and attributes.">
            <animate transform="rotate(0) translate(0, 0)" begin="0s" dur="2s" repeatCount="indefinite"/>
        </text>
        <rect x="0" y="120" width="400" height="30" fill="#2ECC71" rx="5"/>
        <text x="20" y="135" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="left" data-narration="There are several types of files, including regular files, directories, symbolic links, and special files. Each type of file has its own unique characteristics and uses.">
            <animate transform="rotate(0) translate(0, 0)" begin="0s" dur="2s" repeatCount="indefinite"/>
        </text>
        <rect x="0" y="160" width="400" height="30" fill="#E74C3C" rx="5"/>
        <text x="20" y="175" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="left" data-narration="The file system interface provides a common interface for applications to interact with files. It allows applications to create, delete, read, write, list, and change file attributes.">
            <animate transform="rotate(0) translate(0, 0)" begin="0s" dur="2s" repeatCount="indefinite"/>
        </text>
        <rect x="0" y="200" width="400" height="30" fill="#2ECC71" rx="5"/>
        <text x="20" y="215" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="left" data-narration="File descriptors, file modes, and file status are some of the key concepts related to the file system interface. Understanding these concepts is essential for working with files effectively.">
            <animate transform="rotate(0) translate(0, 0)" begin="0s" dur="2s" repeatCount="indefinite"/>
        </text>
        <rect x="0" y="240" width="400" height="30" fill="#E74C3C" rx="5"/>
        <text x="20" y="255" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="left" data-narration="In conclusion, the file system interface is a crucial component of the operating system. It provides a common interface for applications to interact with files, allowing for efficient storage and retrieval of data.">
            <animate transform="rotate(0) translate(0, 0)" begin="0s" dur="2s" repeatCount="indefinite"/>
        </text>
        <rect x="0" y="280" width="400" height="30" fill="#3498DB" rx="5"/>
        <text x="20" y="295" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="left">Footer</text>
    </g>
    <rect x="0" y="320" width="400" height="30" fill="#3498DB" rx="5"/>
    <text x="20" y="325" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" text-anchor="left">Copyright 2024</text>
</svg>