<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id=" gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CAC9F2"/>
      <stop offset="100%" stop-color="#74BFCF"/>
    </linearGradient>
  </defs>
  
  <!-- Gradient Background Fill -->
  <rect fill="url(#gradient-background)" width="100%" height="100%" rx="10"/>
  
  <!-- Top Title -->
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="left" fill="#337ab7">
    Partition and Mounting
  </text>
  
  <!-- Section 1: Introduction to Clustering -->
  <section data-narration="Introduction to Clustering" style="margin-bottom: 20px;">
    <rect x="10" y="60" width="100%" height="80" rx="10" fill="#ffffff"/>
    <text x="10" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#444444">
      Clustering is an unsupervised learning technique used to group objects in such a way that objects in the same group are more similar to each other than to those in other groups.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Types of Clustering Approaches -->
  <section data-narration="Types of Clustering Approaches" style="margin-bottom: 20px;">
    <rect x="10" y="160" width="100%" height="80" rx="10" fill="#ffffff"/>
    <text x="10" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#444444">
      Based on the syllabus, the main clustering approaches are: Hierarchical Clustering, Partitional Clustering, Density-based Clustering, and Grid-based Clustering.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Partitional Clustering -->
  <section data-narration="Partitional Clustering" style="margin-bottom: 20px;">
    <rect x="10" y="260" width="100%" height="80" rx="10" fill="#ffffff"/>
    <text x="10" y="280" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#444444">
      Partitional clustering aims to partition the data into `k` distinct, non-overlapping clusters.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: K-Means Algorithm -->
  <section data-narration="K-Means Algorithm" style="margin-bottom: 20px;">
    <rect x="10" y="360" width="100%" height="80" rx="10" fill="#ffffff"/>
    <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#444444">
      K-Means is the most popular and simplest partitional clustering algorithm.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: Centroid and Within-Cluster Sum of Squares -->
  <section data-narration="Centroid and Within-Cluster Sum of Squares" style="margin-bottom: 20px;">
    <rect x="10" y="440" width="100%" height="80" rx="10" fill="#ffffff"/>
    <text x="10" y="460" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#444444">
      The centroid is the mean position of all the points in the cluster, and the within-cluster sum of squares is the sum of squared distances from each data point to its assigned centroid.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -20" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 6: Arrow Markers for Connections -->
  <g transform="rotate(45 200 200)">
    <line x1="200" y1="200" x2="250" y2="200" stroke="#337ab7" stroke-width="2"/>
    <line x1="200" y1="200" x2="250" y2="200" stroke="#337ab7" stroke-width="2"/>
  </g>
  
  <!-- Footer -->
  <text x="10" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#337ab7">
    Partition and Mounting
  </text>
</svg>