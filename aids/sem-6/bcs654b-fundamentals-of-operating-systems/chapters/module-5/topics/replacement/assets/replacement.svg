<svg width="420" height="400" data-topic-id="replacement-algorithms" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ACC4F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A8FF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Replacement Algorithms</title>
  <g transform="translate(20, 50)">
    <text data-narration="A page fault occurs when a process references a page not in memory." x="0" y="0" font-size="24">Page Fault</text>
    <rect x="0" y="30" width="100" height="20" fill="#56B3FA"/>
    <animate transform="rotate(0 50 50)" begin="0s" dur="2s" repeatCount="indefinite"/>
    <line x1="50" y1="40" x2="50" y2="60" stroke="#56B3FA" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
    <text data-narration="The OS checks if the page is in memory (Page Table)" x="10" y="50" font-size="18">Check if Page is in Memory</text>
    <rect x="0" y="70" width="100" height="20" fill="#4CAF50"/>
    <animate transform="translate(50, 70)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <line x1="50" y1="80" x2="50" y2="90" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
    <text data-narration="If the page is not in memory, the OS checks if there is a free frame." x="10" y="90" font-size="18">Is there a Free Frame?</text>
    <rect x="0" y="110" width="100" height="20" fill="#FF9800"/>
    <animate transform="translate(50, 110)" begin="1s" dur="2s" repeatCount="indefinite"/>
    <line x1="50" y1="120" x2="50" y2="130" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
    <text data-narration="If there is no free frame, the OS selects a page to evict using a page replacement algorithm." x="10" y="130" font-size="18">Select a Victim</text>
    <rect x="0" y="150" width="100" height="20" fill="#3E8E41"/>
    <animate transform="translate(50, 150)" begin="1.5s" dur="2s" repeatCount="indefinite"/>
    <line x1="50" y1="160" x2="50" y2="170" stroke="#3E8E41" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
    <text data-narration="The goal of page replacement algorithms is to minimize the page fault rate." x="10" y="170" font-size="18">Minimize Page Fault Rate</text>
    <rect x="0" y="190" width="100" height="20" fill="#F44336"/>
    <animate transform="translate(50, 190)" begin="2s" dur="2s" repeatCount="indefinite"/>
    <line x1="50" y1="200" x2="50" y2="210" stroke="#F44336" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
    <text data-narration="A good algorithm should avoid replacing pages that will be needed again soon." x="10" y="210" font-size="18">Avoid Replacing Pages</text>
    < footer>Replacement Algorithms</footer>
  </g>
</svg>