<svg width="420" height="400" data-topic-id="virtual-memory-management-background-and-fundamentals-10-1-101-103-104-1041-1042-1044-c" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
    <!-- Title -->
    <title>Textbook 1 Chapter 10 101 103 104 1041 1042 1044 C</title>
    <rect x="0" y="0" width="420" height="40" fill="#3498db" />
    <rect x="0" y="40" width="420" height="60" fill="#2ecc71" />
    <rect x="0" y="100" width="420" height="120" fill="#e74c3c" />
    <rect x="0" y="220" width="420" height="60" fill="#1abc9c" />
    <rect x="0" y="280" width="420" height="120" fill="#9b59b6" />

    <!-- Background Gradient -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#eeeeff" stop-opacity="1" />
            <stop offset="100%" stop-color="#e6e6fa" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect x="0" y="40" width="420" height="60" fill="url(#pastel-gradient)" />
    <rect x="0" y="100" width="420" height="120" fill="url(#pastel-gradient)" />
    <rect x="0" y="220" width="420" height="60" fill="url(#pastel-gradient)" />
    <rect x="0" y="280" width="420" height="120" fill="url(#pastel-gradient)" />

    <!-- Section 1: Introduction to Virtual Memory -->
    <g transform="translate(20, 50)">
        <rect x="0" y="0" width="350" height="40" fill="#3498db" />
        <rect x="0" y="40" width="350" height="60" fill="#2ecc71" />
        <text x="20" y="20" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Virtual memory is a memory management technique that uses the combination of physical RAM and hard disk storage to provide a larger address space for a program." />
        <animate transform="translateX(10px)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 2: Advantages of Virtual Memory -->
    <g transform="translate(20, 150)">
        <rect x="0" y="0" width="350" height="40" fill="#e74c3c" />
        <rect x="0" y="40" width="350" height="60" fill="#1abc9c" />
        <text x="20" y="20" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Provides a larger address space for programs, allowing for more efficient use of memory." />
        <text x="20" y="80" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Reduces the amount of physical RAM required, making it more accessible and cost-effective." />
        <animate transform="translateX(10px)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 3: Disadvantages of Virtual Memory -->
    <g transform="translate(20, 250)">
        <rect x="0" y="0" width="350" height="40" fill="#9b59b6" />
        <rect x="0" y="40" width="350" height="60" fill="#e74c3c" />
        <text x="20" y="20" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Slows down system performance due to disk I/O operations." />
        <text x="20" y="80" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Increases the complexity of memory management, requiring more sophisticated algorithms and data structures." />
        <animate transform="translateX(10px)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 4: Demand Paging -->
    <g transform="translate(20, 350)">
        <rect x="0" y="0" width="350" height="40" fill="#1abc9c" />
        <rect x="0" y="40" width="350" height="60" fill="#e74c3c" />
        <text x="20" y="20" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Demand paging is a memory management technique that loads pages of a program into physical memory only when they are needed." />
        <text x="20" y="80" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Reduces the amount of physical RAM required and improves system performance by reducing disk I/O operations." />
        <animate transform="translateX(10px)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 5: Page Replacement Algorithms -->
    <g transform="translate(20, 450)">
        <rect x="0" y="0" width="350" height="40" fill="#9b59b6" />
        <rect x="0" y="40" width="350" height="60" fill="#e74c3c" />
        <text x="20" y="20" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Page replacement algorithms are used to determine which page to replace in physical memory when a new page needs to be loaded." />
        <text x="20" y="80" fill="#ffffff" font-size="16" font-family="Arial" data-narration="Types of page replacement algorithms include First-In-First-Out (FIFO) and Least Recently Used (LRU)." />
        <animate transform="translateX(10px)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Section 6: Conclusion -->
    <g transform="translate(20, 550)">
        <rect x="0" y="0" width="350" height="40" fill="#3498db" />
        <rect x="0" y="40" width="350" height="60" fill="#2ecc71" />
        <text x="20" y="20" fill="#ffffff" font-size="16" font-family="Arial" data-narration="In conclusion, virtual memory management is a crucial aspect of computer systems, and understanding its concepts and techniques is essential for software development and systems administration." />
        <animate transform="translateX(10px)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Footer -->
    <rect x="0" y="390" width="420" height="10" fill="#3498db" />
    <text x="10" y="400" fill="#ffffff" font-size="12" font-family="Arial" data-narration="Virtual Memory Management" />
</svg>