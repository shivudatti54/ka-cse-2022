<svg width="420" height="400" data-topic-id="fundamentals-of-operating-systems-51">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="10%" stop-color="#A1C9F2" stop-opacity="1"/>
            <stop offset="50%" stop-color="#C7E8F4" stop-opacity="1"/>
            <stop offset="90%" stop-color="#E0F5F3" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
    <g id="section-1">
        <rect x="20" y="20" width="380" height="100" fill="#F7F7F7" rx="10" data-narration="An operating system is a software that manages computer hardware resources and provides common services to computer programs"/>
        <animate attributeName="opacity" from="1" to="0" dur="1s" begin="-0.5s"/>
        <animate attributeName="x" from="20" to="40" dur="1.5s" begin="-0.5s"/>
    </g>
    <g id="section-2">
        <rect x="20" y="140" width="380" height="100" fill="#F7F7F7" rx="10" data-narration="The key functions of an operating system include managing hardware resources, providing a platform for running applications, controlling input/output operations, and more"/>
        <animate attributeName="opacity" from="1" to="0" dur="1s" begin="-0.5s"/>
        <animate attributeName="x" from="40" to="60" dur="1.5s" begin="-0.5s"/>
        <line x1="50" y1="150" x2="50" y2="250" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-mark)"/>
    </g>
    <g id="section-3">
        <rect x="20" y="280" width="380" height="100" fill="#F7F7F7" rx="10" data-narration="There are several types of operating systems, including single-user, single-tasking, multi-user, multi-tasking, and real-time operating systems"/>
        <animate attributeName="opacity" from="1" to="0" dur="1s" begin="-0.5s"/>
        <animate attributeName="x" from="60" to="80" dur="1.5s" begin="-0.5s"/>
        <line x1="50" y1="290" x2="50" y2="390" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-mark)"/>
    </g>
    <g id="section-4">
        <rect x="20" y="120" width="380" height="100" fill="#F7F7F7" rx="10" data-narration="A process is a program in execution, with its own memory space and resources, while a thread is a lightweight process that shares the same memory space and resources"/>
        <animate attributeName="opacity" from="1" to="0" dur="1s" begin="-0.5s"/>
        <animate attributeName="x" from="80" to="100" dur="1.5s" begin="-0.5s"/>
        <line x1="90" y1="130" x2="90" y2="330" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-mark)"/>
    </g>
    <g id="section-5">
        <rect x="20" y="340" width="380" height="100" fill="#F7F7F7" rx="10" data-narration="File systems manage files and directories on storage devices and are an essential part of an operating system"/>
        <animate attributeName="opacity" from="1" to="0" dur="1s" begin="-0.5s"/>
        <animate attributeName="x" from="100" to="120" dur="1.5s" begin="-0.5s"/>
        <line x1="110" y1="360" x2="110" y2="460" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-mark)"/>
    </g>
    <g id="title">
        <text x="20" y="10" font-size="24" font-family="Arial" text-anchor="start" fill="#2c4155">Fundamentals of Operating Systems</text>
    </g>
    <g id="footer">
        <text x="20" y="380" font-size="18" font-family="Arial" text-anchor="start" fill="#2c4155">Created by [Your Name]</text>
    </g>
</svg>