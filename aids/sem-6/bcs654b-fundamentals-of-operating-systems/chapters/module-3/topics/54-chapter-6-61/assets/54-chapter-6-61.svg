<svg width="420" height="400" data-topic-id="54-Chapter-6-61">
    <desc>Process Scheduling Diagram</desc>
    <style>
        /* Style the title and footer */
        text {
            font-size: 24px;
            font-weight: bold;
            color: #2f4f7f;
        }
        footer {
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
    <!-- Gradient background with pastel colors -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
            <stop offset="100%" stop-color="#b2fffc" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
    <!-- Title at top -->
    <text x="50%" y="50" text-anchor="middle" fill="#2f4f7f">Process Scheduling</text>
    <!-- Section 1: Process Scheduling Description -->
    <rect x="10" y="120" width="400" height="80" fill="#fff" rx="10"/>
    <text x="15" y="140" text-anchor="start" fill="#2f4f7f" data-narration="Process scheduling is the discipline of selecting the next process to be executed by the CPU. It determines how the operating system allocates the CPU time to each process." style="font-size: 18px; font-weight: bold;">Process Scheduling Description</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" begin="0s"/>
    <!-- Section 2: Types of Process Scheduling -->
    <rect x="10" y="210" width="400" height="80" fill="#fff" rx="10"/>
    <text x="15" y="230" text-anchor="start" fill="#2f4f7f" data-narration="There are two types of process scheduling: preemptive and non-preemptive." style="font-size: 18px; font-weight: bold;">Types of Process Scheduling</text>
    <rect x="90" y="220" width="10" height="60" fill="#f7dc6f"/>
    <text x="100" y="240" text-anchor="middle" fill="#2f4f7f">Preemptive</text>
    <rect x="200" y="220" width="10" height="60" fill="#f7dc6f"/>
    <text x="210" y="240" text-anchor="middle" fill="#2f4f7f">Non-Preemptive</text>
    <animateTransform attributeName="transform" type="rotate" from="0 250 200" to="360 250 200" dur="5s" begin="0s"/>
    <!-- Section 3: Process Scheduling Algorithms -->
    <rect x="10" y="310" width="400" height="80" fill="#fff" rx="10"/>
    <text x="15" y="330" text-anchor="start" fill="#2f4f7f" data-narration="Some common process scheduling algorithms include FCFS, SJF, HRD, and Priority Scheduling." style="font-size: 18px; font-weight: bold;">Process Scheduling Algorithms</text>
    <rect x="90" y="320" width="10" height="60" fill="#f7dc6f"/>
    <text x="100" y="340" text-anchor="middle" fill="#2f4f7f">FCFS</text>
    <rect x="200" y="320" width="10" height="60" fill="#f7dc6f"/>
    <text x="210" y="340" text-anchor="middle" fill="#2f4f7f">SJF</text>
    <rect x="300" y="320" width="10" height="60" fill="#f7dc6f"/>
    <text x="310" y="340" text-anchor="middle" fill="#2f4f7f">HRD</text>
    <rect x="90" y="420" width="10" height="60" fill="#f7dc6f"/>
    <text x="100" y="440" text-anchor="middle" fill="#2f4f7f">Priority Scheduling</text>
    <animateTransform attributeName="transform" type="rotate" from="0 350 200" to="360 350 200" dur="5s" begin="0s"/>
    <!-- Section 4: Process Scheduling Example -->
    <rect x="10" y="510" width="400" height="80" fill="#fff" rx="10"/>
    <text x="15" y="530" text-anchor="start" fill="#2f4f7f" data-narration="Consider a system with three processes: P1, P2, and P3. The execution times are as follows: P1 = 10 ms, P2 = 5 ms, P3 = 15 ms." style="font-size: 18px; font-weight: bold;">Process Scheduling Example</text>
    <rect x="90" y="520" width="10" height="60" fill="#f7dc6f"/>
    <text x="100" y="540" text-anchor="middle" fill="#2f4f7f">P1</text>
    <rect x="200" y="520" width="10" height="60" fill="#f7dc6f"/>
    <text x="210" y="540" text-anchor="middle" fill="#2f4f7f">P2</text>
    <rect x="300" y="520" width="10" height="60" fill="#f7dc6f"/>
    <text x="310" y="540" text-anchor="middle" fill="#2f4f7f">P3</text>
    <animateTransform attributeName="transform" type="rotate" from="0 350 200" to="360 350 200" dur="5s" begin="0s"/>
    <!-- Section 5: Process Priority -->
    <rect x="10" y="610" width="400" height="80" fill="#fff" rx="10"/>
    <text x="15" y="630" text-anchor="start" fill="#2f4f7f" data-narration="A value assigned to a process to determine its relative importance is called process priority." style="font-size: 18px; font-weight: bold;">Process Priority</text>
    <rect x="90" y="620" width="10" height="60" fill="#f7dc6f"/>
    <text x="100" y="640" text-anchor="middle" fill="#2f4f7f">Priority</text>
    <rect x="200" y="620" width="10" height="60" fill="#f7dc6f"/>
    <text x="210" y="640" text-anchor="middle" fill="#2f4f7f">Importance</text>
    <animateTransform attributeName="transform" type="rotate" from="0 350 200" to="360 350 200" dur="5s" begin="0s"/>
    <!-- Section 6: Process Scheduling in Real-World Applications -->
    <rect x="10" y="710" width="400" height="80" fill="#fff" rx="10"/>
    <text x="15" y="730" text-anchor="start" fill="#2f4f7f" data-narration="Process scheduling is used in various operating systems to manage process execution." style="font-size: 18px; font-weight: bold;">Process Scheduling in Real-World Applications</text>
    <rect x="90" y="720" width="10" height="60" fill="#f7dc6f"/>
    <text x="100" y="740" text-anchor="middle" fill="#2f4f7f">Operating Systems</text>
    <animateTransform attributeName="transform" type="rotate" from="0 350 200" to="360 350 200" dur="5s" begin="0s"/>
    <!-- Title at bottom -->
    <text x="50%" y="390" text-anchor="middle" fill="#2f4f7f">Process Scheduling Diagram</text>
    <footer>Created by <a href="#">Author Name</a></footer>
</svg>