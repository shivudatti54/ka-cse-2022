<svg width="420" height="400" data-topic-id="Petersons-Solution">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="20" font-size="36" font-family="Arial" text-anchor="middle">
    Peterson's Solution
  </text>
  
  <!-- Section 1: Variables -->
  <section data-narration="Variables">
    <rect x="50%" y="100" width="300" height="50" fill="#F7F7F7" rx="10"/>
    <text x="70%" y="110" font-size="18" font-family="Arial" text-anchor="middle">
      Variables
    </text>
    <animate attributeName="opacity" begin="0s" dur="5s" from="1" to="0" repeatCount="indefinite"/>
  </section>
  <rect x="50%" y="170" width="300" height="50" fill="#F7F7F7" rx="10"/>
  <text x="70%" y="180" font-size="18" font-family="Arial" text-anchor="middle">
    p[i]: process ID
  </text>
  <text x="70%" y="200" font-size="18" font-family="Arial" text-anchor="middle">
    v[i]: resource held by process i
  </text>
  <text x="70%" y="220" font-size="18" font-family="Arial" text-anchor="middle">
    semaphores[i]: number of processes waiting to access resource
  </text>
  
  <!-- Section 2: Algorithm -->
  <section data-narration="Algorithm">
    <rect x="50%" y="300" width="300" height="150" fill="#F7F7F7" rx="10"/>
    <text x="70%" y="310" font-size="18" font-family="Arial" text-anchor="middle">
      Algorithm
    </text>
    <animate attributeName="opacity" begin="5s" dur="5s" from="0" to="1" repeatCount="indefinite"/>
  </section>
  <rect x="50%" y="470" width="300" height="150" fill="#F7F7F7" rx="10"/>
  <text x="70%" y="480" font-size="18" font-family="Arial" text-anchor="middle">
    1. Initialize variables
  </text>
  <text x="70%" y="500" font-size="18" font-family="Arial" text-anchor="middle">
    2. While current process is not holding resource, check v[i] and semaphores[i]
  </text>
  <text x="70%" y="520" font-size="18" font-family="Arial" text-anchor="middle">
    3. If current process can acquire resource, set v[i] to 1 and semaphores[i] to 0
  </text>
  <text x="70%" y="540" font-size="18" font-family="Arial" text-anchor="middle">
    4. Execute critical section of code
  </text>
  <text x="70%" y="560" font-size="18" font-family="Arial" text-anchor="middle">
    5. Release resource
  </text>
  
  <!-- Section 3: Busy-waiting approach -->
  <section data-narration="Busy-waiting approach">
    <rect x="50%" y="630" width="300" height="100" fill="#F7F7F7" rx="10"/>
    <text x="70%" y="640" font-size="18" font-family="Arial" text-anchor="middle">
      Busy-waiting approach
    </text>
    <animate attributeName="opacity" begin="10s" dur="5s" from="0" to="1" repeatCount="indefinite"/>
  </section>
  <rect x="50%" y="740" width="300" height="100" fill="#F7F7F7" rx="10"/>
  <text x="70%" y="750" font-size="18" font-family="Arial" text-anchor="middle">
    Process continuously checks v[i] and semaphores[i] to acquire resource
  </text>
  <text x="70%" y="770" font-size="18" font-family="Arial" text-anchor="middle">
    If resource is available, process acquires it and executes critical section
  </text>
  
  <!-- Section 4: Deadlocks -->
  <section data-narration="Deadlocks">
    <rect x="50%" y="910" width="300" height="100" fill="#F7F7F7" rx="10"/>
    <text x="70%" y="920" font-size="18" font-family="Arial" text-anchor="middle">
      Deadlocks
    </text>
    <animate attributeName="opacity" begin="15s" dur="5s" from="0" to="1" repeatCount="indefinite"/>
  </section>
  <rect x="50%" y="1010" width="300" height="100" fill="#F7F7F7" rx="10"/>
  <text x="70%" y="1020" font-size="18" font-family="Arial" text-anchor="middle">
    Multiple processes continuously check v[i] and semaphores[i] to acquire resource
  </text>
  <text x="70%" y="1040" font-size="18" font-family="Arial" text-anchor="middle">
    If no resource is available, process is blocked indefinitely
  </text>
  <text x="70%" y="1060" font-size="18" font-family="Arial" text-anchor="middle">
    Deadlock occurs when resources are not released
  </text>
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="18" font-family="Arial" text-anchor="middle">
    Peterson's Solution
  </text>
</svg>