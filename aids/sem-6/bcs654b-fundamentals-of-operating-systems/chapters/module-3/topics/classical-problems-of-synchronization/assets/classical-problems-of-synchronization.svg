<svg width="420" height="400" data-topic-id="classical-synchronization-problems">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A3D66" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2E4053" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <text x="50%" y="20" font-size="24" font-family="Arial" text-anchor="middle">Classical Synchronization Problems</text>
  <section data-narration="The Critical Section Problem Revisited">
    <rect x="10" y="60" width="400" height="100" fill="#F7F7F7"/>
    <rect x="10" y="70" width="380" height="30" fill="#E7E7E7"/>
    <text x="20" y="80" font-size="18" font-family="Arial">Critical Section</text>
    <text x="20" y="110" font-size="18" font-family="Arial">A code segment that accesses shared variables</text>
    <text x="20" y="140" font-size="18" font-family="Arial">Must not be executed by more than one process at a time</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="10s" repeatCount="indefinite"/>
  </section>
  <section data-narration="Semaphore Recap">
    <rect x="10" y="190" width="400" height="100" fill="#F7F7F7"/>
    <rect x="10" y="200" width="380" height="30" fill="#E7E7E7"/>
    <text x="20" y="210" font-size="18" font-family="Arial">Semaphores</text>
    <text x="20" y="230" font-size="18" font-family="Arial">Integer variables used to control access to shared resources</text>
    <text x="20" y="250" font-size="18" font-family="Arial">Support two atomic operations: wait() and signal()</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="10s" repeatCount="indefinite"/>
  </section>
  <section data-narration="The Producer-Consumer Problem">
    <rect x="10" y="330" width="400" height="100" fill="#F7F7F7"/>
    <rect x="10" y="340" width="380" height="30" fill="#E7E7E7"/>
    <text x="20" y="350" font-size="18" font-family="Arial">Producers</text>
    <text x="20" y="370" font-size="18" font-family="Arial">Create data items and add them to a buffer</text>
    <text x="20" y="390" font-size="18" font-family="Arial">Consumers</text>
    <text x="20" y="410" font-size="18" font-family="Arial">Remove data items from the buffer and process them</text>
    <text x="20" y="430" font-size="18" font-family="Arial">The buffer has limited capacity, requiring synchronization</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="10s" repeatCount="indefinite"/>
  </section>
  <footer>
    <text x="50%" y="380" font-size="18" font-family="Arial">Learn about Classical Synchronization Problems</text>
  </footer>
</svg>