<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to System Models for Cloud Computing">
    <text x="50" y="50" font-size="24" fill="#2563eb">System Models for Cloud Computing</text>
    <text x="50" y="100" font-size="18" fill="#10b981">Abstract representations of distributed computing systems</text>
  </g>
  <g id="step1" data-narration="Key Characteristics of Distributed Systems">
    <rect x="50" y="150" width="200" height="200" fill="#f59e0b" rx="10" />
    <text x="60" y="170" font-size="18" fill="#ffffff">Concurrency</text>
    <text x="60" y="200" font-size="18" fill="#ffffff">Lack of global clock</text>
    <text x="60" y="230" font-size="18" fill="#ffffff">Independent failures</text>
    <text x="60" y="260" font-size="18" fill="#ffffff">Resource sharing</text>
    <text x="60" y="290" font-size="18" fill="#ffffff">Openness</text>
    <text x="60" y="320" font-size="18" fill="#ffffff">Transparency</text>
    <text x="60" y="350" font-size="18" fill="#ffffff">Scalability</text>
  </g>
  <g id="step2" data-narration="Evolution of Distributed System Models">
    <path d="M 300 200 L 500 200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <text x="250" y="220" font-size="18" fill="#10b981">Traditional Computing</text>
    <text x="450" y="220" font-size="18" fill="#10b981">Cluster Computing</text>
    <path d="M 500 200 L 700 200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <text x="650" y="220" font-size="18" fill="#10b981">Grid Computing</text>
    <path d="M 700 200 L 700 400" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <text x="680" y="420" font-size="18" fill="#10b981">Cloud Computing</text>
  </g>
  <g id="step3" data-narration="Clusters of Cooperative Computers">
    <rect x="50" y="300" width="100" height="100" fill="#8b5cf6" rx="10" />
    <text x="60" y="320" font-size="18" fill="#ffffff">Compute Node</text>
    <rect x="200" y="300" width="100" height="100" fill="#8b5cf6" rx="10" />
    <text x="210" y="320" font-size="18" fill="#ffffff">Compute Node</text>
    <rect x="350" y="300" width="100" height="100" fill="#8b5cf6" rx="10" />
    <text x="360" y="320" font-size="18" fill="#ffffff">Compute Node</text>
    <path d="M 150 350 L 250 350" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 300 350 L 400 350" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="High-Speed Interconnect">
    <path d="M 200 400 L 400 400" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="250" y="420" font-size="18" fill="#10b981">High-Speed Interconnect</text>
    <text x="250" y="450" font-size="18" fill="#10b981">(Infiniband, Ethernet)</text>
  </g>
  <g id="step5" data-narration="System Models for Cloud Computing">
    <rect x="50" y="500" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="60" y="520" font-size="18" fill="#ffffff">IaaS</text>
    <rect x="300" y="500" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="520" font-size="18" fill="#ffffff">PaaS</text>
    <rect x="550" y="500" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="560" y="520" font-size="18" fill="#ffffff">SaaS</text>
  </g>
</svg>