<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc" />
  <g id="step0" data-narration="Introduction to Deadlock Detection and Recovery">
    <text x="50" y="50" font-size="24" fill="#2563eb">Deadlock Detection and Recovery</text>
    <text x="50" y="100" font-size="18" fill="#8b5cf6">A critical component of Operating Systems</text>
  </g>
  <g id="step1" data-narration="System Model for Deadlocks">
    <rect x="50" y="150" width="200" height="100" fill="#10b981" rx="10" />
    <text x="60" y="170" font-size="18" fill="#ffffff">Four or more processes</text>
    <text x="60" y="200" font-size="18" fill="#ffffff">Each process holding a resource</text>
    <text x="60" y="230" font-size="18" fill="#ffffff">Waiting for another resource</text>
    <line x1="250" y1="200" x2="350" y2="200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="Types of Deadlocks">
    <rect x="350" y="150" width="200" height="100" fill="#2563eb" rx="10" />
    <text x="360" y="170" font-size="18" fill="#ffffff">Resource Deadlock</text>
    <text x="360" y="200" font-size="18" fill="#ffffff">Process Deadlock</text>
    <text x="360" y="230" font-size="18" fill="#ffffff">Communication Deadlock</text>
    <line x1="550" y1="200" x2="650" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" data-narration="Deadlock Characteristics">
    <rect x="50" y="300" width="200" height="150" fill="#8b5cf6" rx="10" />
    <text x="60" y="320" font-size="18" fill="#ffffff">Mutual Exclusion</text>
    <text x="60" y="350" font-size="18" fill="#ffffff">Hold and Wait</text>
    <text x="60" y="380" font-size="18" fill="#ffffff">No Preemption</text>
    <text x="60" y="410" font-size="18" fill="#ffffff">Circular Wait</text>
    <line x1="250" y1="350" x2="350" y2="350" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="Example of a Deadlock Situation">
    <table x="350" y="300" border="1" stroke="#2563eb" stroke-width="2">
      <tr>
        <th>Process</th>
        <th>Resource 1</th>
        <th>Resource 2</th>
      </tr>
      <tr>
        <td>P1</td>
        <td>Held</td>
        <td>Waiting</td>
      </tr>
      <tr>
        <td>P2</td>
        <td>Waiting</td>
        <td>Held</td>
      </tr>
      <tr>
        <td>P3</td>
        <td>Held</td>
        <td>Waiting</td>
      </tr>
      <tr>
        <td>P4</td>
        <td>Waiting</td>
        <td>Held</td>
      </tr>
    </table>
    <line x1="550" y1="350" x2="650" y2="350" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step5" data-narration="Deadlock Detection Methods">
    <rect x="50" y="450" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="60" y="470" font-size="18" fill="#ffffff">Banker's Algorithm</text>
    <text x="60" y="500" font-size="18" fill="#ffffff">Wait-for-Graph Algorithm</text>
    <line x1="250" y1="500" x2="350" y2="500" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step6" data-narration="Deadlock Recovery Methods">
    <rect x="350" y="450" width="200" height="100" fill="#8b5cf6" rx="10" />
    <text x="360" y="470" font-size="18" fill="#ffffff">Process Termination</text>
    <text x="360" y="500" font-size="18" fill="#ffffff">Resource Preemption</text>
    <line x1="550" y1="500" x2="650" y2="500" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step7" data-narration="Conclusion">
    <text x="50" y="550" font-size="24" fill="#2563eb">Deadlock Detection and Recovery</text>
    <text x="50" y="580" font-size="18" fill="#8b5cf6">Essential for reliable and efficient Operating Systems</text>
  </g>
</svg>