<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="22" fill="#2563eb" text-anchor="middle" font-weight="bold">Memory Management Background</text>
  <g id="step0" class="step" data-narration="Introduction to Memory Management">
    <rect x="150" y="80" width="500" height="100" fill="#2563eb" rx="10"/>
    <text x="400" y="125" font-size="24" fill="#ffffff" text-anchor="middle">Memory Management</text>
    <text x="400" y="155" font-size="16" fill="#ffffff" text-anchor="middle">Essential function of an operating system</text>
  </g>
  <g id="step1" class="step" data-narration="Memory Hierarchy">
    <rect x="50" y="60" width="700" height="200" fill="#10b981" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Memory Hierarchy</text>
    <text x="60" y="120" font-size="16" fill="#ffffff">1. Registers - Fastest, smallest</text>
    <text x="60" y="145" font-size="16" fill="#ffffff">2. Cache Memory (L1, L2, L3) - Very fast</text>
    <text x="60" y="170" font-size="16" fill="#ffffff">3. Main Memory (RAM) - Fast access</text>
    <text x="60" y="195" font-size="16" fill="#ffffff">4. Secondary Storage (HDD, SSD) - Slower, larger</text>
    <text x="60" y="220" font-size="16" fill="#ffffff">5. Tertiary Storage (Tape, Optical) - Slowest, largest</text>
  </g>
  <g id="step2" class="step" data-narration="Address Spaces">
    <rect x="50" y="60" width="330" height="140" fill="#f59e0b" rx="10"/>
    <text x="215" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Logical Address Space</text>
    <text x="215" y="130" font-size="14" fill="#ffffff" text-anchor="middle">Generated by CPU</text>
    <text x="215" y="155" font-size="14" fill="#ffffff" text-anchor="middle">Virtual addresses</text>
    <line x1="380" y1="130" x2="420" y2="130" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="420" y="60" width="330" height="140" fill="#2563eb" rx="10"/>
    <text x="585" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Physical Address Space</text>
    <text x="585" y="130" font-size="14" fill="#ffffff" text-anchor="middle">Actual hardware addresses</text>
    <text x="585" y="155" font-size="14" fill="#ffffff" text-anchor="middle">Real memory locations</text>
  </g>
  <g id="step3" class="step" data-narration="Memory Allocation Methods">
    <rect x="50" y="60" width="700" height="140" fill="#8b5cf6" rx="10"/>
    <text x="400" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Memory Allocation Methods</text>
    <rect x="100" y="120" width="180" height="60" fill="#10b981" rx="5"/>
    <text x="190" y="155" font-size="14" fill="#ffffff" text-anchor="middle">Contiguous</text>
    <rect x="310" y="120" width="180" height="60" fill="#f59e0b" rx="5"/>
    <text x="400" y="155" font-size="14" fill="#ffffff" text-anchor="middle">Paging</text>
    <rect x="520" y="120" width="180" height="60" fill="#2563eb" rx="5"/>
    <text x="610" y="155" font-size="14" fill="#ffffff" text-anchor="middle">Segmentation</text>
  </g>
  <g id="step4" class="step" data-narration="Single Contiguous Allocation">
    <rect x="50" y="60" width="700" height="180" fill="#10b981" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Single Contiguous Allocation</text>
    <rect x="100" y="120" width="250" height="60" fill="#2563eb" rx="5"/>
    <text x="225" y="155" font-size="16" fill="#ffffff" text-anchor="middle">Operating System</text>
    <rect x="100" y="190" width="250" height="60" fill="#f59e0b" rx="5"/>
    <text x="225" y="225" font-size="16" fill="#ffffff" text-anchor="middle">User Process</text>
    <text x="450" y="155" font-size="14" fill="#ffffff">Simple but inefficient</text>
  </g>
  <g id="step5" class="step" data-narration="Main Goals of Memory Management">
    <rect x="50" y="60" width="700" height="180" fill="#f59e0b" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Goals of Memory Management</text>
    <text x="60" y="125" font-size="16" fill="#ffffff">1. Efficient Utilization - Minimize wasted space</text>
    <text x="60" y="155" font-size="16" fill="#ffffff">2. Protection - Prevent processes from interfering</text>
    <text x="60" y="185" font-size="16" fill="#ffffff">3. Sharing - Allow safe sharing of memory</text>
    <text x="60" y="215" font-size="16" fill="#ffffff">4. Transparency - Hide complexities from programs</text>
  </g>
  <g id="step6" class="step" data-narration="Memory Management Unit (MMU)">
    <rect x="50" y="60" width="700" height="140" fill="#8b5cf6" rx="10"/>
    <text x="400" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Memory Management Unit (MMU)</text>
    <text x="400" y="130" font-size="16" fill="#ffffff" text-anchor="middle">Hardware device that translates virtual to physical addresses</text>
    <text x="400" y="160" font-size="14" fill="#ffffff" text-anchor="middle">Maps logical addresses to physical addresses at runtime</text>
  </g>
  <g id="step7" class="step" data-narration="Address Binding">
    <rect x="50" y="60" width="700" height="180" fill="#10b981" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Address Binding</text>
    <rect x="100" y="120" width="180" height="60" fill="#2563eb" rx="5"/>
    <text x="190" y="150" font-size="14" fill="#ffffff" text-anchor="middle">Compile Time</text>
    <text x="190" y="170" font-size="10" fill="#ffffff" text-anchor="middle">Fixed addresses</text>
    <rect x="310" y="120" width="180" height="60" fill="#f59e0b" rx="5"/>
    <text x="400" y="150" font-size="14" fill="#ffffff" text-anchor="middle">Load Time</text>
    <text x="400" y="170" font-size="10" fill="#ffffff" text-anchor="middle">Relocatable code</text>
    <rect x="520" y="120" width="180" height="60" fill="#8b5cf6" rx="5"/>
    <text x="610" y="150" font-size="14" fill="#ffffff" text-anchor="middle">Execution Time</text>
    <text x="610" y="170" font-size="10" fill="#ffffff" text-anchor="middle">Dynamic binding</text>
  </g>
  <g id="step8" class="step" data-narration="Logical and Physical Addresses">
    <rect x="50" y="60" width="700" height="140" fill="#f59e0b" rx="10"/>
    <text x="400" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Logical vs Physical Addresses</text>
    <text x="60" y="130" font-size="16" fill="#ffffff">Logical: Generated by CPU, seen by program</text>
    <text x="60" y="160" font-size="16" fill="#ffffff">Physical: Actual hardware address in memory</text>
    <text x="400" y="130" font-size="14" fill="#ffffff">MMU performs translation</text>
  </g>
  <g id="step9" class="step" data-narration="Memory Allocation Example">
    <rect x="50" y="60" width="700" height="180" fill="#2563eb" rx="10"/>
    <text x="400" y="90" font-size="20" fill="#ffffff" text-anchor="middle">Dynamic Memory Allocation</text>
    <rect x="100" y="120" width="200" height="50" fill="#10b981" rx="5"/>
    <text x="200" y="150" font-size="14" fill="#ffffff" text-anchor="middle">First Fit - First hole large enough</text>
    <rect x="100" y="180" width="200" height="50" fill="#f59e0b" rx="5"/>
    <text x="200" y="210" font-size="14" fill="#ffffff" text-anchor="middle">Best Fit - Smallest sufficient hole</text>
    <rect x="320" y="120" width="200" height="50" fill="#8b5cf6" rx="5"/>
    <text x="420" y="150" font-size="14" fill="#ffffff" text-anchor="middle">Worst Fit - Largest available hole</text>
  </g>
  <g id="step10" class="step" data-narration="Conclusion">
    <rect x="50" y="60" width="700" height="140" fill="#10b981" rx="10"/>
    <text x="400" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Memory Management Conclusion</text>
    <text x="400" y="130" font-size="16" fill="#ffffff" text-anchor="middle">Critical for system performance and stability</text>
    <text x="400" y="160" font-size="14" fill="#ffffff" text-anchor="middle">Enables multiprogramming and efficient resource utilization</text>
  </g>
  <g id="step11" class="step" data-narration="Final Thoughts">
    <rect x="50" y="60" width="700" height="140" fill="#f59e0b" rx="10"/>
    <text x="400" y="95" font-size="20" fill="#ffffff" text-anchor="middle">Final Thoughts on Memory Management</text>
    <text x="400" y="130" font-size="16" fill="#ffffff" text-anchor="middle">Modern systems use combination of techniques</text>
    <text x="400" y="160" font-size="14" fill="#ffffff" text-anchor="middle">Paging and segmentation most common in contemporary OS</text>
  </g>
</svg>
