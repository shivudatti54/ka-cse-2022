<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="chapter-1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Text Book Chapter 1</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <text x="20" y="20" font-size="24" font-family="Arial" font-weight="bold">
    <tspan x="20" y="20">Escalating Need for Strategic Information</tspan>
  </text>
  <section data-narration="Introduction">
    <rect x="100" y="50" width="220" height="150" fill="#FFFFFF" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,100" dur="1s" begin="0s" />
    <text x="110" y="70" font-size="18" font-family="Arial" font-weight="normal">
      In today's fast-paced business environment, organizations are facing an escalating need for strategic information to make informed decisions.
    </text>
  </section>
  <section data-narration="Failures of Past Decision-Support Systems">
    <rect x="100" y="230" width="220" height="150" fill="#FFFFFF" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,230" to="0,280" dur="1s" begin="0.25s" />
    <text x="110" y="250" font-size="18" font-family="Arial" font-weight="normal">
      Traditional decision-support systems have several limitations that hinder their effectiveness:
    </text>
  </section>
  <section data-narration="Limitations of Traditional Decision-Support Systems">
    <rect x="100" y="410" width="220" height="150" fill="#FFFFFF" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,410" to="0,470" dur="1s" begin="0.5s" />
    <text x="110" y="430" font-size="18" font-family="Arial" font-weight="normal">
      Traditional reports are often static and do not provide real-time insights into business operations.
    </text>
  </section>
  <section data-narration="Examples of Failures">
    <rect x="100" y="590" width="220" height="150" fill="#FFFFFF" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,590" to="0,650" dur="1s" begin="0.75s" />
    <text x="110" y="610" font-size="18" font-family="Arial" font-weight="normal">
      A company uses a spreadsheet to monitor sales data, but the data is not integrated with other business systems, making it difficult to analyze sales trends.
    </text>
  </section>
  <section data-narration="The Need for a Data Warehouse">
    <rect x="100" y="760" width="220" height="150" fill="#FFFFFF" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,760" to="0,810" dur="1s" begin="1s" />
    <text x="110" y="770" font-size="18" font-family="Arial" font-weight="normal">
      A data warehouse is a centralized repository that stores data from various sources, allowing for easy access and analysis of information.
    </text>
  </section>
  <footer>
    <text x="20" y="390" font-size="18" font-family="Arial" font-weight="normal">Text Book Chapter 1</text>
  </footer>
</svg>