<svg width="420" height="400" data-topic-id="Operational-Versus-Decision-Support-Systems" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #C7D9F8;">
  <title>Operational Versus Decision Support Systems</title>
  <rect x="10" y="10" width="400" height="380" style="fill: #87CEEB;"/>
  <text x="20" y="20" font-size="24" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: bold;">Operational Systems (OS)</text>
  <text x="20" y="60" font-size="18" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;" data-narration="These systems are designed to automate and streamline routine tasks, processes, and activities within an organization. They focus on the efficient execution of daily operations, ensuring that tasks are completed on time, and that resources are utilized effectively.">Definition</text>
  <g transform="translate(20,100)">
    <rect x="0" y="0" width="40" height="20" style="fill: #00A86B;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Process-oriented</text>
    <text x="5" y="25" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Real-time</text>
    <text x="5" y="45" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Standardized</text>
    <text x="5" y="65" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Limited user interaction</text>
  </g>
  <text x="20" y="220" font-size="18" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: bold;" data-narration="Examples of operational systems include Enterprise Resource Planning (ERP) systems, Customer Relationship Management (CRM) systems, and Supply Chain Management (SCM) systems. They automate and optimize specific business processes, such as order processing, inventory management, and payroll management.">Examples</text>
  <g transform="translate(20,260)">
    <rect x="0" y="0" width="40" height="20" style="fill: #FFC107;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">ERP Systems</text>
    <text x="5" y="25" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">CRM Systems</text>
    <text x="5" y="45" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">SCM Systems</text>
  </g>
  <g transform="translate(20,310)">
    <rect x="0" y="0" width="40" height="20" style="fill: #0097A7;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Definition</text>
  </g>
  <text x="20" y="380" font-size="18" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: bold;" data-narration="Decision-support systems are designed to provide organizations with data-driven insights to support decision-making. They analyze complex data, identify patterns, and offer recommendations to help organizations make informed decisions.">Decision-Support Systems (DSS)</text>
  <g transform="translate(20,420)">
    <rect x="0" y="0" width="40" height="20" style="fill: #FFA07A;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Data analysis</text>
    <text x="5" y="25" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Pattern identification</text>
    <text x="5" y="45" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Recommendations</text>
  </g>
  <g transform="translate(20,470)">
    <rect x="0" y="0" width="40" height="20" style="fill: #8BC34A;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Examples of decision-support systems include data analytics tools, business intelligence software, and expert systems. They provide organizations with the insights and recommendations needed to inform strategic and tactical decisions."</text>
  </g>
  <g transform="translate(20,520)">
    <rect x="0" y="0" width="40" height="20" style="fill: #2196F3;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Benefits</text>
  </g>
  <g transform="translate(20,570)">
    <rect x="0" y="0" width="40" height="20" style="fill: #FF9800;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Improved decision-making</text>
    <text x="5" y="25" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Increased efficiency</text>
    <text x="5" y="45" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Enhanced customer satisfaction</text>
  </g>
  <g transform="translate(20,620)">
    <rect x="0" y="0" width="40" height="20" style="fill: #3F51B5;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Challenges</text>
  </g>
  <g transform="translate(20,670)">
    <rect x="0" y="0" width="40" height="20" style="fill: #8E24AA;"/>
    <text x="5" y="5" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Data quality issues</text>
    <text x="5" y="25" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Complexity of data analysis</text>
    <text x="5" y="45" font-size="12" font-family="Arial" fill="#212121" text-anchor="start" style="font-weight: normal;">Modeling and prediction errors</text>
  </g>
  <animateTransform attributeName="transform" type="rotate" from="0,380,190" to="360,380,190" dur="10s" repeatCount="indefinite"/>
</svg>