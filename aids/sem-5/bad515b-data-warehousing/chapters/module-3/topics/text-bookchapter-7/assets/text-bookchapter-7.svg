<svg width="420" height="400" data-topic-id="chapter-7-data-warehouse-architecture">
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="50%" stop-color="#C5C3C8"/>
      <stop offset="100%" stop-color="#B2D2E6"/>
    </linearGradient>
  </defs>
  <text x="20" y="20" font-size="24" font-weight="bold" text-anchor="start">Data Warehouse Architecture</text>
  <g transform="rotate(90 20 20)">
    <path d="M 20 20 L 60 60" stroke="#3498DB" stroke-width="4" fill="none"/>
    <path d="M 60 60 L 100 100" stroke="#2C3E50" stroke-width="4" fill="none"/>
    <path d="M 100 100 L 140 140" stroke="#FFC107" stroke-width="4" fill="none"/>
    <path d="M 140 140 L 180 180" stroke="#E74C3C" stroke-width="4" fill="none"/>
    <path d="M 180 180 L 220 220" stroke="#2F4F7F" stroke-width="4" fill="none"/>
    <path d="M 220 220 L 260 260" stroke="#3B3F54" stroke-width="4" fill="none"/>
  </g>
  <g transform="translate(20 120)">
    <rect x="0" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="10" y="10" data-narration="Data Sources are various systems, applications, and databases that provide data to the data warehouse." font-size="16" text-anchor="start">Data Sources</text>
    <rect x="190" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="200" y="10" data-narration="Data Sources vary in data formats and structures, and have different levels of data quality and accuracy." font-size="16" text-anchor="start">Data Sources</text>
  </g>
  <g transform="translate(20 220)">
    <rect x="0" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="10" y="10" data-narration="Data integration combines data from multiple sources into a single, unified view." font-size="16" text-anchor="start">Data Integration</text>
    <rect x="190" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="200" y="10" data-narration="Data integration requires data mapping and transformation, and involves data quality and data governance." font-size="16" text-anchor="start">Data Integration</text>
  </g>
  <g transform="translate(20 320)">
    <rect x="0" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="10" y="10" data-narration="A data warehouse is a centralized repository of integrated data from various sources." font-size="16" text-anchor="start">Data Warehouse</text>
    <rect x="190" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="200" y="10" data-narration="Data warehouses are designed for query performance and data analysis, and support multiple data sources and formats." font-size="16" text-anchor="start">Data Warehouse</text>
  </g>
  <g transform="translate(20 420)">
    <rect x="0" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="10" y="10" data-narration="Data marts are smaller, focused repositories of data that mirror a specific business area or function." font-size="16" text-anchor="start">Data Marts</text>
    <rect x="190" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="200" y="10" data-narration="Data marts are designed for specific business areas, and support data integration and analysis." font-size="16" text-anchor="start">Data Marts</text>
  </g>
  <g transform="translate(20 520)">
    <rect x="0" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="10" y="10" data-narration="ETL processes transform data from various sources into a unified format." font-size="16" text-anchor="start">ETL</text>
    <rect x="190" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="200" y="10" data-narration="Data virtualization combines data from multiple sources into a single view, without physical data movement." font-size="16" text-anchor="start">Data Virtualization</text>
  </g>
  <g transform="translate(20 620)">
    <rect x="0" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="10" y="10" data-narration="Data replication ensures data consistency across multiple data sources." font-size="16" text-anchor="start">Data Replication</text>
    <rect x="190" y="0" width="180" height="80" fill="#FFFFFF" rx="10"/>
    <text x="200" y="10" data-narration="Data governance ensures data quality and integrity across the organization." font-size="16" text-anchor="start">Data Governance</text>
  </g>
  <path d="M 20 20 L 380 380" stroke="#3498DB" stroke-width="4" fill="none"/>
  <path d="M 20 380 L 380 20" stroke="#3498DB" stroke-width="4" fill="none"/>
  <animate transform="rotate(90 20 20)" begin="0s" dur="10s" repeatCount="indefinite"/>
  <animate transform="translate(20 120)" begin="0s" dur="10s" repeatCount="indefinite"/>
  <animate transform="translate(20 220)" begin="0s" dur="10s" repeatCount="indefinite"/>
  <animate transform="translate(20 320)" begin="0s" dur="10s" repeatCount="indefinite"/>
  <animate transform="translate(20 420)" begin="0s" dur="10s" repeatCount="indefinite"/>
  <animate transform="translate(20 520)" begin="0s" dur="10s" repeatCount="indefinite"/>
  <animate transform="translate(20 620)" begin="0s" dur="10s" repeatCount="indefinite"/>
</svg>