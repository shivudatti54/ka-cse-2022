<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="The-Significant-Role-Of-Metadata-in-Data-Warehousing">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#CCFF99" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  
  <!-- Title and Header -->
  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">The Significant Role of Metadata in Data Warehousing</text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(20, 50)">
    <rect width="300" height="30" fill="#CCFF99" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start" data-narration="Introduction">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,70" begin="0s" dur="2s" repeatCount="1" />
  </g>
  
  <!-- Section 2: Why Metadata is Important -->
  <g transform="translate(20, 90)">
    <rect width="300" height="30" fill="#66CCCC" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start" data-narration="Why Metadata is Important">Why Metadata is Important</text>
    <animateTransform attributeName="transform" type="translate" from="0,90" to="0,110" begin="0s" dur="2s" repeatCount="1" />
  </g>
  
  <!-- Section 3: Types of Metadata -->
  <g transform="translate(20, 130)">
    <rect width="300" height="30" fill="#66CCCC" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start" data-narration="Types of Metadata">Types of Metadata</text>
    <animateTransform attributeName="transform" type="translate" from="0,130" to="0,150" begin="0s" dur="2s" repeatCount="1" />
  </g>
  
  <!-- Section 4: Business Metadata -->
  <g transform="translate(20, 170)">
    <rect width="300" height="30" fill="#66CCCC" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start" data-narration="Business Metadata">Business Metadata</text>
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,190" begin="0s" dur="2s" repeatCount="1" />
  </g>
  
  <!-- Section 5: Technical Metadata -->
  <g transform="translate(20, 210)">
    <rect width="300" height="30" fill="#66CCCC" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start" data-narration="Technical Metadata">Technical Metadata</text>
    <animateTransform attributeName="transform" type="translate" from="0,210" to="0,230" begin="0s" dur="2s" repeatCount="1" />
  </g>
  
  <!-- Section 6: Operational Metadata -->
  <g transform="translate(20, 250)">
    <rect width="300" height="30" fill="#66CCCC" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start" data-narration="Operational Metadata">Operational Metadata</text>
    <animateTransform attributeName="transform" type="translate" from="0,250" to="0,270" begin="0s" dur="2s" repeatCount="1" />
  </g>
  
  <!-- Section 7: Conclusion -->
  <g transform="translate(20, 300)">
    <rect width="300" height="30" fill="#CCFF99" rx="5"/>
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start" data-narration="Conclusion">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0,300" to="0,320" begin="0s" dur="2s" repeatCount="1" />
  </g>
  
  <!-- Footer -->
  <g transform="translate(20, 350)">
    <text x="10" y="350" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="start">Created by [Your Name]</text>
  </g>
</svg>