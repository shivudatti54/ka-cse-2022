      <animateTransform attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="5000" begin="-2000" repeatCount="indefinite"/>
    </g>
    <g id="section-3">
      <rect fill="#F7F7F7" width="100%" height="100" rx="10"/>
      <text x="50%" y="50%" font-size="24" text-anchor="middle" fill="#666666">Dimensional Modelling Techniques</text>
      <animateTransform attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="5000" begin="-2000" repeatCount="indefinite"/>
    </g>
    <g id="section-4">
