<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="quality-tools" viewBox="0 0 420 400" xml:space="preserve">
  <rect x="0" y="0" width="420" height="400" fill="rgb(105, 105, 205)" opacity="0.5"/>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="380" fill="rgb(240, 230, 190)"/>
    <text x="10" y="20" font-size="24" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Quality Tools</text>
    <text x="10" y="60" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Virtualization Structure and Tools</text>
    <rect x="20" y="100" width="100" height="20" fill="rgb(0, 255, 0)" rx="5"/>
    <rect x="150" y="100" width="100" height="20" fill="rgb(255, 165, 0)" rx="5"/>
    <rect x="280" y="100" width="100" height="20" fill="rgb(0, 0, 255)" rx="5"/>
    <rect x="20" y="130" width="200" height="100" fill="rgb(240, 230, 190)" rx="5"/>
    <rect x="20" y="230" width="200" height="100" fill="rgb(240, 230, 190)" rx="5"/>
    <rect x="20" y="330" width="200" height="100" fill="rgb(240, 230, 190)" rx="5"/>
    <g transform="translate(20, 130)">
      <text data-narration="Host Machine" x="10" y="150" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Physical Hardware</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(0, 255, 0)" rx="5"/>
    </g>
    <g transform="translate(20, 230)">
      <text data-narration="Hypervisor (VMM)" x="10" y="250" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Software Layer</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(255, 165, 0)" rx="5"/>
    </g>
    <g transform="translate(20, 330)">
      <text data-narration="Guest Operating System" x="10" y="350" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Operating System</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(0, 0, 255)" rx="5"/>
    </g>
    <g transform="translate(150, 130)">
      <text data-narration="Virtual Machine (VM)" x="10" y="150" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Software-Based Emulation</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(0, 255, 0)" rx="5"/>
    </g>
    <g transform="translate(150, 230)">
      <text data-narration="Host Hardware" x="10" y="250" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Physical Resources</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(255, 165, 0)" rx="5"/>
    </g>
    <g transform="translate(150, 330)">
      <text data-narration="Guest OS 1" x="10" y="350" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Operating System 1</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(0, 0, 255)" rx="5"/>
    </g>
    <g transform="translate(280, 130)">
      <text data-narration="Guest OS 2" x="10" y="150" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Operating System 2</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(0, 255, 0)" rx="5"/>
    </g>
    <g transform="translate(280, 230)">
      <text data-narration="Application A" x="10" y="250" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Application 1</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(255, 165, 0)" rx="5"/>
    </g>
    <g transform="translate(280, 330)">
      <text data-narration="Application B" x="10" y="350" font-size="18" fill="rgb(0, 0, 0)" font-family="Arial" text-anchor="start">Application 2</text>
      <rect x="0" y="0" width="100" height="20" fill="rgb(0, 0, 255)" rx="5"/>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -200" begin="0s" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 200" begin="2s" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -200" begin="4s" dur="10s" repeatCount="indefinite"/>
  </g>
</svg>