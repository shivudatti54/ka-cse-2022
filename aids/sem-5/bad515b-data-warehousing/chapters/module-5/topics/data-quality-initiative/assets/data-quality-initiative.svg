<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="data-quality-initiative">
  <rect fill="linear-gradient(to bottom, #C7B8EA, #87CEEB)" x="0" y="0" width="420" height="400"/>
  <title>Data Quality Initiative</title>
  <g transform="translate(10, 20)">
    <rect fill="#F7F7F7" width="400" height="50" rx="5"/>
    <text x="10" y="15" text-anchor="start" font-size="24" font-family="Arial, sans-serif" fill="#333">Data Quality Initiative</text>
  </g>
  <g transform="translate(10, 70)">
    <rect fill="#F7F7F7" width="400" height="200" rx="5"/>
    <text x="10" y="75" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#333">Why is Data Quality Important?</text>
    <section data-narration="Inaccurate Analysis">
      <rect fill="#F7F7F7" width="300" height="20" rx="5"/>
      <text x="10" y="25" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666">Inaccurate analysis can lead to incorrect insights and decisions.</text>
      <animate transform="rotate(360 15 25)" begin="0s" dur="5s" repeat="forever"/>
    </section>
    <section data-narration="Reduced Trust">
      <rect fill="#F7F7F7" width="300" height="20" rx="5"/>
      <text x="10" y="50" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666">When data is of poor quality, stakeholders lose trust in the organization.</text>
      <animate transform="rotate(360 15 50)" begin="5s" dur="5s" repeat="forever"/>
    </section>
    <section data-narration="Increased Costs">
      <rect fill="#F7F7F7" width="300" height="20" rx="5"/>
      <text x="10" y="75" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666">Poor data quality can lead to rework, delayed projects, and unnecessary expenses.</text>
      <animate transform="rotate(360 15 75)" begin="10s" dur="5s" repeat="forever"/>
    </section>
    <section data-narration="Data Quality Challenges">
      <rect fill="#F7F7F7" width="300" height="20" rx="5"/>
      <text x="10" y="100" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666">Data quality challenges include inconsistent data, data silos, outdated data, and incorrect data entry.</text>
      <animate transform="rotate(360 15 100)" begin="15s" dur="5s" repeat="forever"/>
    </section>
    <section data-narration="Data Quality Initiative Components">
      <rect fill="#F7F7F7" width="300" height="20" rx="5"/>
      <text x="10" y="125" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#666">The data quality initiative consists of data quality metrics, data quality assessment, and data quality improvement.</text>
      <animate transform="rotate(360 15 125)" begin="20s" dur="5s" repeat="forever"/>
    </section>
  </g>
  <g transform="translate(10, 350)">
    <rect fill="#F7F7F7" width="400" height="50" rx="5"/>
    <text x="10" y="355" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#333">Data Quality Initiative</text>
  </g>
</svg>