<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8A9C"/>
      <stop offset="100%" stop-color="#A2C9E4"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" x="0" y="0" width="420" height="400"/>
  <g id="master-data-management">
    <rect x="50" y="50" width="320" height="280" fill="#FFFFFF" rx="10"/>
    <g id="title">
      <text x="180" y="20" font-size="24" font-family="Arial" fill="#2F4F7F">Master Data Management (MDM)</text>
    </g>
    <g id="data-topic-id">
      <text x="50" y="20" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">Topic ID: mdm</text>
    </g>
    <g id="waste-hierarchy">
      <rect x="50" y="100" width="320" height="50" fill="#FFFFFF" rx="10"/>
      <path d="M 100 50 L 300 50" stroke="#2F4F7F" stroke-width="2" fill="none"/>
      <text x="100" y="120" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Reduce (Prevention)</text>
      <animateTransform attributeName="transform" type="translate" from="0,100" to="0,120" begin="0s"/>
      <g id="reduce">
        <path d="M 100 100 L 100 120" stroke="#2F4F7F" stroke-width="2" fill="none"/>
        <text x="110" y="110" font-size="14" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Design products and processes to minimize waste creation</text>
        <animateTransform attributeName="transform" type="translate" from="0,100" to="0,120" begin="0s"/>
      </g>
      <g id="reuse">
        <path d="M 200 100 L 200 120" stroke="#2F4F7F" stroke-width="2" fill="none"/>
        <text x="210" y="110" font-size="14" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Use products and materials efficiently to minimize waste creation</text>
        <animateTransform attributeName="transform" type="translate" from="0,100" to="0,120" begin="1s"/>
      </g>
      <g id="recycle">
        <path d="M 300 100 L 300 120" stroke="#2F4F7F" stroke-width="2" fill="none"/>
        <text x="310" y="110" font-size="14" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Recycle and recover materials to minimize waste creation</text>
        <animateTransform attributeName="transform" type="translate" from="0,100" to="0,120" begin="2s"/>
      </g>
      <g id="recovery">
        <path d="M 100 250 L 300 250" stroke="#2F4F7F" stroke-width="2" fill="none"/>
        <text x="150" y="260" font-size="14" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Recover energy from waste materials</text>
        <animateTransform attributeName="transform" type="translate" from="0,250" to="0,270" begin="3s"/>
      </g>
      <g id="disposal">
        <path d="M 100 350 L 300 350" stroke="#2F4F7F" stroke-width="2" fill="none"/>
        <text x="150" y="360" font-size="14" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Dispose of waste in an environmentally responsible manner</text>
        <animateTransform attributeName="transform" type="translate" from="0,350" to="0,370" begin="4s"/>
      </g>
    </g>
    <g id="footer">
      <text x="50" y="380" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="start">Visualized using SVG</text>
    </g>
  </g>
</svg>