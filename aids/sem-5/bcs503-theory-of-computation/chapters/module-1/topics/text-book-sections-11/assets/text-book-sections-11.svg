<svg width="420" height="400" data-topic-id="theory-of-computation-text-book-sections-1">
  <metadata>
    <title>Theory of Computation</title>
  </metadata>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5E1A5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" rx="10"/>
  <g id="title">
    <text x="50%" y="20%" font-size="24" font-family="Arial" text-anchor="middle">Theory of Computation</text>
  </g>
  <g id="header">
    <text x="50%" y="50%" font-size="18" font-family="Arial" text-anchor="middle">Text Book Sections 1.1</text>
  </g>
  <g id="intro">
    <rect x="50" y="100" width="200" height="100" rx="10" fill="#C5E1A5"/>
    <text x="60%" y="120%" font-size="16" font-family="Arial" text-anchor="middle" data-narration="Introduction to Theory of Computation">What is Theory of Computation?</text>
    <animateTransform attributeName="transform" type="rotate" from="0,100,150" to="360,100,150" dur="4000" begin="0s" repeatCount="indefinite"/>
  </g>
  <g id="computability">
    <rect x="50" y="250" width="200" height="100" rx="10" fill="#C5E1A5"/>
    <text x="60%" y="270%" font-size="16" font-family="Arial" text-anchor="middle" data-narration="Computability is the study of the set of problems that can be solved by a computer.">Computability is the study of the set of problems that can be solved by a computer.</text>
    <path d="M100,250 L150,300" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <path d="M150,300 L200,250" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="rotate" from="0,100,150" to="360,100,150" dur="4000" begin="0s" repeatCount="indefinite"/>
  </g>
  <g id="types-of-computability">
    <rect x="50" y="400" width="200" height="100" rx="10" fill="#C5E1A5"/>
    <text x="60%" y="420%" font-size="16" font-family="Arial" text-anchor="middle" data-narration="There are two types of computability: deterministic and nondeterministic.">There are two types of computability: deterministic and nondeterministic.</text>
    <path d="M100,400 L150,450" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <path d="M150,450 L200,400" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="rotate" from="0,100,150" to="360,100,150" dur="4000" begin="0s" repeatCount="indefinite"/>
  </g>
  <g id="examples-of-computable-problems">
    <rect x="50" y="550" width="200" height="100" rx="10" fill="#C5E1A5"/>
    <text x="60%" y="570%" font-size="16" font-family="Arial" text-anchor="middle" data-narration="Some examples of computable problems include sorting a list of numbers, checking if a number is prime, and solving a linear equation.">Some examples of computable problems include sorting a list of numbers, checking if a number is prime, and solving a linear equation.</text>
    <path d="M100,550 L150,600" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <path d="M150,600 L200,550" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="rotate" from="0,100,150" to="360,100,150" dur="4000" begin="0s" repeatCount="indefinite"/>
  </g>
  <g id="footer">
    <text x="50%" y="380%" font-size="18" font-family="Arial" text-anchor="middle">Theory of Computation</text>
  </g>
</svg>