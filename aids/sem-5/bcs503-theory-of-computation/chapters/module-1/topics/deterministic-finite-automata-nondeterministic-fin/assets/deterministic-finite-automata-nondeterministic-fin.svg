<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="Deterministic-Finite-Automata-Nondeterministic-Finite-Automaton">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ced4da" stop-opacity="1" />
      <stop offset="100%" stop-color="#e0e5cf" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title Section -->
  <g transform="translate(30, 20)">
    <text data-narration="Title" x="0" y="0" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Deterministic Finite Automata and Nondeterministic Finite Automaton</text>
  </g>
  
  <!-- Section: Deterministic Finite Automaton (DFA) -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="200" height="20" fill="#3498db" rx="5" />
    <text data-narration="DFA" x="5" y="5" font-size="16" font-family="Arial, sans-serif" text-anchor="start">DFA: Deterministic Finite Automaton</text>
    <g transform="translate(10, 25)">
      <circle cx="10" cy="10" r="5" fill="#3498db" />
      <text data-narration="States" x="20" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">States</text>
      <g transform="translate(60, 25)">
        <circle cx="60" cy="10" r="5" fill="#3498db" />
        <text data-narration="Alphabet" x="70" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Alphabet</text>
        <g transform="translate(120, 25)">
          <circle cx="120" cy="10" r="5" fill="#3498db" />
          <text data-narration="Transition Function" x="130" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Transition Function</text>
        </g>
      </g>
      <g transform="translate(220, 25)">
        <circle cx="220" cy="10" r="5" fill="#3498db" />
        <text data-narration="Initial State" x="230" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Initial State</text>
        <text data-narration="Final State" x="280" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Final State</text>
      </g>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0,25" to="0,50" dur="1s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- Section: Nondeterministic Finite Automaton (NFA) -->
  <g transform="translate(250, 70)">
    <rect x="0" y="0" width="200" height="20" fill="#2ecc71" rx="5" />
    <text data-narration="NFA" x="5" y="5" font-size="16" font-family="Arial, sans-serif" text-anchor="start">NFA: Nondeterministic Finite Automaton</text>
    <g transform="translate(10, 25)">
      <circle cx="10" cy="10" r="5" fill="#2ecc71" />
      <text data-narration="States" x="20" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">States</text>
      <g transform="translate(60, 25)">
        <circle cx="60" cy="10" r="5" fill="#2ecc71" />
        <text data-narration="Alphabet" x="70" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Alphabet</text>
        <g transform="translate(120, 25)">
          <circle cx="120" cy="10" r="5" fill="#2ecc71" />
          <text data-narration="Transition Function" x="130" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Transition Function</text>
        </g>
      </g>
      <g transform="translate(220, 25)">
        <circle cx="220" cy="10" r="5" fill="#2ecc71" />
        <text data-narration="Initial State" x="230" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Initial State</text>
        <text data-narration="Final State" x="280" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Final State</text>
      </g>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0,25" to="0,50" dur="1s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- Section: Text Search Application -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="200" height="20" fill="#e74c3c" rx="5" />
    <text data-narration="Text Search Application" x="5" y="5" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Text Search Application</text>
    <g transform="translate(10, 25)">
      <circle cx="10" cy="10" r="5" fill="#e74c3c" />
      <text data-narration="DFA for Text Search" x="20" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">DFA for Text Search</text>
      <g transform="translate(60, 25)">
        <circle cx="60" cy="10" r="5" fill="#e74c3c" />
        <text data-narration="NFA for Text Search" x="70" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">NFA for Text Search</text>
      </g>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0,25" to="0,50" dur="1s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- Section: Epsilon-Transitions -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="200" height="20" fill="#e67e73" rx="5" />
    <text data-narration="Epsilon-Transitions" x="5" y="5" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Epsilon-Transitions</text>
    <g transform="translate(10, 25)">
      <circle cx="10" cy="10" r="5" fill="#e67e73" />
      <text data-narration="Definition of Epsilon-Transitions" x="20" y="15" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Definition of Epsilon-Transitions</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="0,25" to="0,50" dur="1s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- Footer Section -->
  <g transform="translate(0, 370)">
    <text data-narration="Footer" x="0" y="0" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">2023</text>
  </g>
</svg>