<svg width="420" height="400" data-topic-id="finite-automata">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient)" />
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2E4053">
    Introduction to Finite Automata
  </text>

  <!-- Section 1: What is a Finite Automaton? -->
  <section data-narration="What is a Finite Automaton?">
    <rect x="20" y="80" width="380" height="60" style="fill: #F7F7F7; border: 1px solid #E5E5E5;" />
    <text x="30%" y="90%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2E4053">
      A Finite Automaton is a mathematical model that consists of a set of states, an alphabet, and a transition function.
    </text>
    <animate transform="rotate(360 30% 90%)" begin="0s" dur="10s" repeat="indefinite" />
  </section>

  <!-- Section 2: Components of a Finite Automaton -->
  <section data-narration="Components of a Finite Automaton">
    <rect x="20" y="150" width="380" height="60" style="fill: #F7F7F7; border: 1px solid #E5E5E5;" />
    <text x="30%" y="160%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2E4053">
      States, Alphabet, Transition Function, Initial State, and Final States.
    </text>
    <animate transform="rotate(720 30% 160%)" begin="10s" dur="10s" repeat="indefinite" />
  </section>

  <!-- Section 3: Types of Finite Automata -->
  <section data-narration="Types of Finite Automata">
    <rect x="20" y="220" width="380" height="60" style="fill: #F7F7F7; border: 1px solid #E5E5E5;" />
    <text x="30%" y="230%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2E4053">
      Deterministic Finite Automaton (DFA) and Nondeterministic Finite Automaton (NFA).
    </text>
    <animate transform="rotate(1080 30% 230%)" begin="20s" dur="10s" repeat="indefinite" />
  </section>

  <!-- Section 4: DFA Example -->
  <section data-narration="DFA Example">
    <rect x="20" y="290" width="380" height="60" style="fill: #F7F7F7; border: 1px solid #E5E5E5;" />
    <text x="30%" y="300%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2E4053">
      A DFA that accepts all strings of 0s and 1s that end with a 1.
    </text>
    <animate transform="rotate(1290 30% 300%)" begin="30s" dur="10s" repeat="indefinite" />
  </section>

  <!-- Section 5: NFA Example -->
  <section data-narration="NFA Example">
    <rect x="20" y="360" width="380" height="60" style="fill: #F7F7F7; border: 1px solid #E5E5E5;" />
    <text x="30%" y="370%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2E4053">
      An NFA that accepts all strings of 0s and 1s that end with a 1.
    </text>
    <animate transform="rotate(1470 30% 370%)" begin="40s" dur="10s" repeat="indefinite" />
  </section>

  <!-- Footnote -->
  <text x="20" y="390%" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" style="fill: #2E4053">
    Data: <a href="#">Source</a>
  </text>
</svg>