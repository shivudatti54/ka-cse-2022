<svg width="420" height="400" data-topic-id="theory-of-computation-section-81">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title at top -->
  <text x="50%" y="30%" font-size="24" font-weight="bold" fill="#2F4F7F" text-anchor="middle">
    Theory of Computation
  </text>
  
  <!-- Section 8.1: Introduction to Theory of Computation -->
  <rect x="20" y="60" width="380" height="200" fill="#F7F7F7" rx="10" />
  <text x="50%" y="80" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="What is Theory of Computation?">
    What is Theory of Computation?
  </text>
  <animate attributeName="opacity" from="0.5" to="1" dur="500" begin="1000" repeatCount="indefinite" />
  <animate attributeName="y" from="80" to="120" dur="500" begin="1000" repeatCount="indefinite" />
  <text x="50%" y="100" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="Theory of Computation is a branch of computer science that deals with the study of the fundamental limits of computation and the design of algorithms.">
  </text>
  <animate attributeName="y" from="100" to="120" dur="500" begin="1500" repeatCount="indefinite" />
  
  <!-- Section 8.1.2: Importance of Theory of Computation -->
  <rect x="20" y="260" width="380" height="200" fill="#F7F7F7" rx="10" />
  <text x="50%" y="280" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="The importance of Theory of Computation cannot be overstated.">
  </text>
  <animate attributeName="opacity" from="0.5" to="1" dur="500" begin="2500" repeatCount="indefinite" />
  <animate attributeName="y" from="280" to="300" dur="500" begin="2500" repeatCount="indefinite" />
  <text x="50%" y="290" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="The theory of computation has numerous applications in computer science, including designing efficient algorithms for solving computational problems, understanding the complexity of computational problems, developing new computational models and architectures, and analyzing the efficiency of existing algorithms and data structures.">
  </text>
  <animate attributeName="y" from="290" to="310" dur="500" begin="3000" repeatCount="indefinite" />
  
  <!-- Section 8.1.3: Types of Computational Models -->
  <rect x="20" y="320" width="380" height="200" fill="#F7F7F7" rx="10" />
  <text x="50%" y="340" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="There are several computational models, including Abstract Machines, Turing Machines, and Finite Automata.">
  </text>
  <animate attributeName="opacity" from="0.5" to="1" dur="500" begin="3500" repeatCount="indefinite" />
  <animate attributeName="y" from="340" to="360" dur="500" begin="3500" repeatCount="indefinite" />
  <text x="50%" y="350" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="Abstract Machines represent a computer as a simple device that can perform a finite number of operations on input.">
  </text>
  <animate attributeName="y" from="350" to="370" dur="500" begin="4000" repeatCount="indefinite" />
  <text x="50%" y="370" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="Turing Machines are a mathematical model for computation developed by Alan Turing, which consists of a tape divided into cells, each of which can hold a symbol from a finite alphabet.">
  </text>
  <animate attributeName="y" from="370" to="390" dur="500" begin="4000" repeatCount="indefinite" />
  <text x="50%" y="390" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="Finite Automata are a theoretical model for computation that consists of a finite set of states and transitions between states based on input symbols.">
  </text>
  <animate attributeName="y" from="390" to="400" dur="500" begin="4500" repeatCount="indefinite" />
  
  <!-- Section 8.1.4: Key Concepts -->
  <rect x="20" y="420" width="380" height="200" fill="#F7F7F7" rx="10" />
  <text x="50%" y="440" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="Computational complexity is a measure of the resources required to solve a computational problem, such as time and space.">
  </text>
  <animate attributeName="opacity" from="0.5" to="1" dur="500" begin="5000" repeatCount="indefinite" />
  <animate attributeName="y" from="440" to="460" dur="500" begin="5000" repeatCount="indefinite" />
  <text x="50%" y="450" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="Time complexity is a measure of the time required to solve a computational problem, usually expressed in terms of the size of the input.">
  </text>
  <animate attributeName="y" from="450" to="470" dur="500" begin="5500" repeatCount="indefinite" />
  <text x="50%" y="470" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="Space complexity is a measure of the amount of memory required to solve a computational problem.">
  </text>
  <animate attributeName="y" from="470" to="490" dur="500" begin="5500" repeatCount="indefinite" />
  <text x="50%" y="480" font-size="18" fill="#2F4F7F" text-anchor="middle" data-narration="The P versus NP problem is a fundamental problem in computational complexity theory that deals with the relationship between computational complexity and verifiability.">
  </text>
  <animate attributeName="y" from="480" to="500" dur="500" begin="6000" repeatCount="indefinite" />
  
  <!-- Footer at bottom -->
  <rect x="0" y="380" width="420" height="20" fill="#F7F7F7" rx="10" />
  <text x="50%" y="390" font-size="14" fill="#2F4F7F" text-anchor="middle">
    Theory of Computation
  </text>
</svg>