<svg width="420" height="400" data-topic-id="pumping-lemma-context-free-languages" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        background-image: url('data:image/svg+xml,%3Csvg%20width%3D%22220%22%20height%3D%22220%22%20viewBox%3D%220%200%20220%20220%22%20fill%3D%22%23C7B8EA%22%3E%3Cpath%20d%3D%22M110.5%2015.5L110.5%2010%2C20L120%2010%2C20L120%2015.5L110.5%2015.5%2Z%3C%2Fpath%3E%3C%2Fsvg%3E');
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }
      .animation {
        animation: pulse 2s infinite;
      }
    </style>
  </defs>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="380" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#333">The Pumping Lemma for Context-Free Languages</text>
    <rect x="0" y="50" width="400" height="100" rx="10" fill="#fff" stroke="#ddd" stroke-width="2" class="section" data-narration="Introduction to the Pumping Lemma">
      <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" fill="#333">A context-free language is a language that can be generated by a context-free grammar.</text>
      <text x="10" y="80" font-size="18" font-family="Arial, sans-serif" fill="#333">A context-free grammar is a set of production rules that define the structure of the language.</text>
    </rect>
    <rect x="0" y="150" width="400" height="100" rx="10" fill="#fff" stroke="#ddd" stroke-width="2" class="section" data-narration="Definition of the Pumping Lemma">
      <text x="10" y="160" font-size="18" font-family="Arial, sans-serif" fill="#333">The Pumping Lemma states that every context-free language has a pumping length.</text>
      <text x="10" y="180" font-size="18" font-family="Arial, sans-serif" fill="#333">The pumping length is the length of the shortest string in the language that can be pumped to form two strings, each of which is also in the language.</text>
    </rect>
    <rect x="0" y="230" width="400" height="100" rx="10" fill="#fff" stroke="#ddd" stroke-width="2" class="section" data-narration="The Pumping Lemma Formalization">
      <text x="10" y="240" font-size="18" font-family="Arial, sans-serif" fill="#333">Let L be a context-free language. Then, there exist integers p and d such that:</text>
      <text x="10" y="260" font-size="18" font-family="Arial, sans-serif" fill="#333">d ≥ 1</text>
      <text x="10" y="280" font-size="18" font-family="Arial, sans-serif" fill="#333">Cd + 1 = Cc d+1, where c is a string in L</text>
      <text x="10" y="300" font-size="18" font-family="Arial, sans-serif" fill="#333">For all i ≥ 0, Cc i d+1 is also in L</text>
    </rect>
    <rect x="0" y="300" width="400" height="100" rx="10" fill="#fff" stroke="#ddd" stroke-width="2" class="section" data-narration="Pumping Lemma Proof">
      <text x="10" y="310" font-size="18" font-family="Arial, sans-serif" fill="#333">The Pumping Lemma is often proved by contradiction.</text>
      <text x="10" y="330" font-size="18" font-family="Arial, sans-serif" fill="#333">Assume that L is a context-free language with no pumping length.</text>
      <text x="10" y="350" font-size="18" font-family="Arial, sans-serif" fill="#333">Then, there exists a string Cc d+1 in L such that:</text>
      <text x="10" y="370" font-size="18" font-family="Arial, sans-serif" fill="#333">Cc d+1 is not divisible by d+1</text>
      <text x="10" y="390" font-size="18" font-family="Arial, sans-serif" fill="#333">For all i, Cc i d+1 is not in L</text>
    </rect>
    <rect x="0" y="380" width="400" height="100" rx="10" fill="#fff" stroke="#ddd" stroke-width="2" class="section" data-narration="Example">
      <text x="10" y="390" font-size="18" font-family="Arial, sans-serif" fill="#333">Consider the context-free language L = {a^n b^n | n ≥ 1}.</text>
      <text x="10" y="410" font-size="18" font-family="Arial, sans-serif" fill="#333">This language can be generated by the grammar:</text>
      <text x="10" y="430" font-size="18" font-family="Arial, sans-serif" fill="#333">S → aZbZ | ε</text>
    </rect>
    <g class="animation">
      <animate transform="rotate(360 200 200)" begin="0s" duration="2s" repeatCount="indefinite"/>
      <animate transform="rotate(360 200 200)" begin="2s" duration="2s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>