<svg width="420" height="400" data-topic-id="normal-forms-for-context-free-grammars"
     xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400"
     xmlns:xlink="http://www.w3.org/1999/xlink" style="background-color: #7a8ead">
  <title>Normal Forms For Context Free Grammars</title>
  <desc>Animated Educational Diagram</desc>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7dc6f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffa07a" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Section 1: Introduction to Context-Free Grammars -->
  <section id="section1" data-narration="Introduction to Context-Free Grammars">
    <rect x="10" y="50" width="400" height="200"
          fill="url(#gradient)" rx="10" style="opacity: 0.5"/>
    <text x="20" y="60" font-size="24" font-family="Arial, sans-serif"
          fill="#3b5998">Context-Free Grammars</text>
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 200 200"
                      to="360 200 200"
                      dur="10s"
                      repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Formal Definition of a CFG -->
  <section id="section2" data-narration="Formal Definition of a CFG">
    <rect x="10" y="270" width="400" height="200"
          fill="url(#gradient2)" rx="10" style="opacity: 0.5"/>
    <text x="20" y="280" font-size="24" font-family="Arial, sans-serif"
          fill="#3b5998">Non-terminals, Terminals, and Production Rules</text>
    <foreignObject x="120" y="60" width="200" height="30"
                   xml:xmlns="http://www.w3.org/1999/xlink"
                   xlink:href="#non-terminals"/>
    <foreignObject x="120" y="90" width="200" height="30"
                   xml:xmlns="http://www.w3.org/1999/xlink"
                   xlink:href="#terminals"/>
    <foreignObject x="120" y="120" width="200" height="30"
                   xml:xmlns="http://www.w3.org/1999/xlink"
                   xlink:href="#production-rules"/>
  </section>

  <!-- Section 3: Components of a CFG -->
  <section id="section3" data-narration="Components of a CFG">
    <rect x="10" y="430" width="400" height="200"
          fill="url(#gradient)" rx="10" style="opacity: 0.5"/>
    <text x="20" y="440" font-size="24" font-family="Arial, sans-serif"
          fill="#3b5998">Terminals, Non-terminals, and Production Rules</text>
    <foreignObject x="120" y="150" width="200" height="30"
                   xml:xmlns="http://www.w3.org/1999/xlink"
                   xlink:href="#terminals"/>
    <foreignObject x="120" y="180" width="200" height="30"
                   xml:xmlns="http://www.w3.org/1999/xlink"
                   xlink:href="#non-terminals"/>
    <foreignObject x="120" y="210" width="200" height="30"
                   xml:xmlns="http://www.w3.org/1999/xlink"
                   xlink:href="#production-rules"/>
    <line x1="10" y1="260" x2="10" y2="300" stroke="#3b5998" stroke-width="2"/>
    <line x1="10" y1="300" x2="10" y2="260" stroke="#3b5998" stroke-width="2"/>
  </section>

  <!-- Section 4: Production Rules -->
  <section id="section4" data-narration="Production Rules">
    <rect x="10" y="100" width="400" height="200"
          fill="url(#gradient2)" rx="10" style="opacity: 0.5"/>
    <text x="20" y="110" font-size="24" font-family="Arial, sans-serif"
          fill="#3b5998">A -> β</text>
    <foreignObject x="120" y="150" width="200" height="30"
                   xml:xmlns="http://www.w3.org/1999/xlink"
                   xlink:href="#production-rules"/>
  </section>

  <!-- Section 5: Conclusion -->
  <section id="section5" data-narration="Conclusion">
    <rect x="10" y="370" width="400" height="200"
          fill="url(#gradient)" rx="10" style="opacity: 0.5"/>
    <text x="20" y="380" font-size="24" font-family="Arial, sans-serif"
          fill="#3b5998">Normal Forms for Context-Free Grammars</text>
  </section>

  <!-- Footer -->
  <footer>
    <text x="10" y="400" font-size="18" font-family="Arial, sans-serif"
          fill="#3b5998">Developed by <a href="#">Your Name</a></text>
  </footer>
</svg>