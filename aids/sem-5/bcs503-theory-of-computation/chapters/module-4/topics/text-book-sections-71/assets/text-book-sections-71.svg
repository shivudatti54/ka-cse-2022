<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400">
  <title>Text Book Sections 71</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <group id="title-group">
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#3498DB">
      Theory of Computation
    </text>
  </group>
  <group id="sections-group">
    <section id="introduction-section">
      <group id="introduction-group">
        <text x="50" y="100" font-size="18" font-family="Arial" fill="#3498DB" data-narration="Introduction to Computation">
          Introduction
        </text>
        <rect x="40" y="90" width="320" height="10" fill="#E0E0E0" rx="2"/>
        <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="50" y="100"/>
        <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite" x="150" y="100"/>
      </group>
    </section>
    <section id="what-is-computation-section">
      <group id="what-is-computation-group">
        <text x="50" y="100" font-size="18" font-family="Arial" fill="#3498DB" data-narration="What is Computation">
          What is Computation?
        </text>
        <rect x="40" y="90" width="320" height="10" fill="#E0E0E0" rx="2"/>
        <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="50" y="100"/>
        <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite" x="150" y="100"/>
      </group>
    </section>
    <section id="key-components-section">
      <group id="key-components-group">
        <text x="50" y="100" font-size="18" font-family="Arial" fill="#3498DB" data-narration="Key Components of Computation">
          Key Components of Computation
        </text>
        <rect x="40" y="90" width="320" height="10" fill="#E0E0E0" rx="2"/>
        <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="50" y="100"/>
        <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite" x="150" y="100"/>
      </group>
    </section>
    <section id="models-of-computation-section">
      <group id="models-of-computation-group">
        <text x="50" y="100" font-size="18" font-family="Arial" fill="#3498DB" data-narration="Models of Computation">
          Models of Computation
        </text>
        <rect x="40" y="90" width="320" height="10" fill="#E0E0E0" rx="2"/>
        <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="50" y="100"/>
        <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite" x="150" y="100"/>
      </group>
    </section>
    <section id="turing-machine-section">
      <group id="turing-machine-group">
        <text x="50" y="100" font-size="18" font-family="Arial" fill="#3498DB" data-narration="Turing Machine">
          Turing Machine
        </text>
        <rect x="40" y="90" width="320" height="10" fill="#E0E0E0" rx="2"/>
        <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="50" y="100"/>
        <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite" x="150" y="100"/>
      </group>
    </section>
    <section id="recursive-function-section">
      <group id="recursive-function-group">
        <text x="50" y="100" font-size="18" font-family="Arial" fill="#3498DB" data-narration="Recursive Function">
          Recursive Function
        </text>
        <rect x="40" y="90" width="320" height="10" fill="#E0E0E0" rx="2"/>
        <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" x="50" y="100"/>
        <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" repeatCount="indefinite" x="150" y="100"/>
      </group>
    </section>
  </group>
  <footer>
    <text x="10" y="390" font-size="18" font-family="Arial" fill="#3498DB">
      Created by [Your Name]
    </text>
  </footer>
</svg>