<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="closure-properties-of-context-free-language">
  <defs>
    <style>
      .pastel-blue { fill: #C7D2F2; }
      .pastel-orange { fill: #FFC5C5; }
      .indigo-text { fill: #3B3F54; }
      .teal-text { fill: #0097A7; }
    </style>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-blue-gradient)" rx="10"/>

  <defs>
    <linearGradient id="pastel-blue-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C7D2F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 50)">
    <text class="indigo-text" data-narration="Union of Regular Languages" x="0" y="10" font-size="24" text-anchor="middle">Union of Regular Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" begin="100ms" dur="500ms" repeatCount="indefinite" />
    <rect x="0" y="0" width="80" height="20" fill="#C7D2F2" rx="5" />
    <text class="teal-text" data-narration="The union of two regular languages is also a regular language." x="10" y="15" font-size="16" text-anchor="middle">L1 ∪ L2 = regular</text>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 20" begin="200ms" dur="500ms" repeatCount="indefinite" />
    <text class="indigo-text" data-narration="For example, let L1 = {a, b} and L2 = {c, d}. Then L1 ∪ L2 = {a, b, c, d}, which is also a regular language." x="10" y="30" font-size="16" text-anchor="middle">L1 ∪ L2 = {a, b, c, d}</text>
  </g>

  <g transform="translate(10, 150)">
    <text class="indigo-text" data-narration="Intersection of Regular Languages" x="0" y="10" font-size="24" text-anchor="middle">Intersection of Regular Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" begin="100ms" dur="500ms" repeatCount="indefinite" />
    <rect x="0" y="0" width="80" height="20" fill="#C7D2F2" rx="5" />
    <text class="teal-text" data-narration="The intersection of two regular languages is also a regular language." x="10" y="15" font-size="16" text-anchor="middle">L1 ∩ L2 = regular</text>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 20" begin="200ms" dur="500ms" repeatCount="indefinite" />
    <text class="indigo-text" data-narration="For example, let L1 = {a, b, c} and L2 = {b, c, d}. Then L1 ∩ L2 = {b, c}, which is also a regular language." x="10" y="30" font-size="16" text-anchor="middle">L1 ∩ L2 = {b, c}</text>
  </g>

  <g transform="translate(10, 300)">
    <text class="indigo-text" data-narration="Complement of Regular Languages" x="0" y="10" font-size="24" text-anchor="middle">Complement of Regular Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" begin="100ms" dur="500ms" repeatCount="indefinite" />
    <rect x="0" y="0" width="80" height="20" fill="#C7D2F2" rx="5" />
    <text class="teal-text" data-narration="The complement of a regular language is also a regular language." x="10" y="15" font-size="16" text-anchor="middle">L' = regular</text>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 20" begin="200ms" dur="500ms" repeatCount="indefinite" />
    <text class="indigo-text" data-narration="For example, let L = {a, b}. Then L' = {c, d, e, ...}, which is also a regular language." x="10" y="30" font-size="16" text-anchor="middle">L' = {c, d, e, ...}</text>
  </g>

  <g transform="translate(10, 450)">
    <text class="indigo-text" data-narration="Concatenation of Regular Languages" x="0" y="10" font-size="24" text-anchor="middle">Concatenation of Regular Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" begin="100ms" dur="500ms" repeatCount="indefinite" />
    <rect x="0" y="0" width="80" height="20" fill="#C7D2F2" rx="5" />
    <text class="teal-text" data-narration="The concatenation of two regular languages is also a regular language." x="10" y="15" font-size="16" text-anchor="middle">L1L2 = regular</text>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 20" begin="200ms" dur="500ms" repeatCount="indefinite" />
    <text class="indigo-text" data-narration="For example, let L1 = {a, b} and L2 = {c, d}. Then L1L2 = {ac, ad, bc, bd}, which is also a regular language." x="10" y="30" font-size="16" text-anchor="middle">L1L2 = {ac, ad, bc, bd}</text>
  </g>

  <g transform="translate(10, 550)">
    <text class="indigo-text" data-narration="Kleene Closure of Regular Languages" x="0" y="10" font-size="24" text-anchor="middle">Kleene Closure of Regular Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 10" begin="100ms" dur="500ms" repeatCount="indefinite" />
    <rect x="0" y="0" width="80" height="20" fill="#C7D2F2" rx="5" />
    <text class="teal-text" data-narration="The Kleene closure of a regular language is also a regular language." x="10" y="15" font-size="16" text-anchor="middle">L\* = regular</text>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 20" begin="200ms" dur="500ms" repeatCount="indefinite" />
    <text class="indigo-text" data-narration="For example, let L = {a, b}. Then L\* = {ε, a, b, aa, ab, ba, bb, ...}, which is also a regular language." x="10" y="30" font-size="16" text-anchor="middle">L\* = {ε, a, b, aa, ab, ba, bb, ...}</text>
  </g>

  <g transform="translate(0, 350)">
    <rect x="10" y="10" width="380" height="30" fill="#FFC5C5" rx="5" />
    <text class="indigo-text" data-narration="Table of Closure Properties" x="15" y="25" font-size="16" text-anchor="middle">Closure Properties of Regular Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 30" to="0 40" begin="100ms" dur="500ms" repeatCount="indefinite" />
    <rect x="10" y="30" width="360" height="20" fill="#C7D2F2" rx="5" />
    <text class="teal-text" data-narration="| Operation      | Result" x="15" y="35" font-size="14" text-anchor="middle">Closure Properties of Regular Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 40" to="0 50" begin="200ms" dur="500ms" repeatCount="indefinite" />
    <rect x="10" y="45" width="340" height="15" fill="#C7D2F2" rx="5" />
    <text class="indigo-text" data-narration="| Operation      | Result  " x="15" y="50" font-size="14" text-anchor="middle">Closure Properties of Regular Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 60" begin="300ms" dur="500ms" repeatCount="indefinite" />
    <rect x="10" y="55" width="340" height="15" fill="#C7D2F2" rx="5" />
    <text class="teal-text" data-narration="|                |         regular" x="15" y="60" font-size="14" text-anchor="middle">Closure Properties of Regular Languages</text>
  </g>

  <g transform="translate(0, 400)">
    <text class="indigo-text" data-narration="Footer" x="0" y="10" font-size="24" text-anchor="middle">Closure Properties of Context Free Languages</text>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 20" begin="100ms" dur="500ms" repeatCount="indefinite" />
  </g>

  <defs>
    <linearGradient id="pastel-orange-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFC5C5" stop-opacity="1" />
      <stop offset="100%" stop-color="#C791B3" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-orange-gradient)" rx="10"/>
</svg>