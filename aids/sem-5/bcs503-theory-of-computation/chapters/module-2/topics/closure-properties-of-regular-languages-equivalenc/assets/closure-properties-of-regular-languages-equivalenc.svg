<svg width="420" height="400" data-topic-id="Closure-Properties-Of-Regular-Languages-Equivalenc">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title Section -->
  <rect x="50" y="20" width="320" height="30" fill="#3498DB" rx="5"/>
  <text x="100" y="40" font-size="24" fill="#fff">Closure Properties of Regular Languages Equivalency</text>

  <!-- Commutativity Section -->
  <rect x="50" y="80" width="320" height="120" fill="url(#pastel-gradient)" rx="5"/>
  <g transform="translate(50, 90)">
    <line x1="10" y1="0" x2="30" y2="120" stroke="#5CB85C" stroke-width="2"/>
    <text x="10" y="20" font-size="18" fill="#5CB85C">Commutativity</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 100" to="360 50 100" dur="4s" begin="-2s"/>
  </g>
  <section data-narration="Commutativity means that the order of characters in a string does not affect its parsing by a regular language.">
    <text x="100" y="150" font-size="18" fill="#5CB85C">Example:</text>
    <text x="150" y="150" font-size="18" fill="#5CB85C">The regular language {a, b} is commutative because whether you read the string as a b or b a, it will always be accepted by a regular language that recognizes it.</text>
  </section>

  <!-- Associativity Section -->
  <rect x="50" y="220" width="320" height="120" fill="url(#pastel-gradient)" rx="5"/>
  <g transform="translate(50, 230)">
    <line x1="10" y1="0" x2="30" y2="120" stroke="#5CB85C" stroke-width="2"/>
    <text x="10" y="20" font-size="18" fill="#5CB85C">Associativity</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 100" to="360 50 100" dur="4s" begin="-2s"/>
  </g>
  <section data-narration="Associativity means that the order in which we concatenate strings does not affect its parsing by a regular language.">
    <text x="100" y="280" font-size="18" fill="#5CB85C">Example:</text>
    <text x="150" y="280" font-size="18" fill="#5CB85C">The regular language {a, ab} is associative because whether you read the string as aba or abab or ababa, it will always be accepted by a regular language that recognizes it.</text>
  </section>

  <!-- Idempotence Section -->
  <rect x="50" y="290" width="320" height="120" fill="url(#pastel-gradient)" rx="5"/>
  <g transform="translate(50, 300)">
    <line x1="10" y1="0" x2="30" y2="120" stroke="#5CB85C" stroke-width="2"/>
    <text x="10" y="20" font-size="18" fill="#5CB85C">Idempotence</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 100" to="360 50 100" dur="4s" begin="-2s"/>
  </g>
  <section data-narration="Idempotence means that repeating a string does not affect its parsing by a regular language.">
    <text x="100" y="350" font-size="18" fill="#5CB85C">Example:</text>
    <text x="150" y="350" font-size="18" fill="#5CB85C">The regular language {a, aa} is idempotent because whether you read the string as aa or aaa or aaaa, it will always be accepted by a regular language that recognizes it.</text>
  </section>

  <!-- Closure under Union Section -->
  <rect x="50" y="380" width="320" height="120" fill="url(#pastel-gradient)" rx="5"/>
  <g transform="translate(50, 390)">
    <line x1="10" y1="0" x2="30" y2="120" stroke="#5CB85C" stroke-width="2"/>
    <text x="10" y="20" font-size="18" fill="#5CB85C">Closure under Union</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 100" to="360 50 100" dur="4s" begin="-2s"/>
  </g>
  <section data-narration="The union of two regular languages is also a regular language.">
    <text x="100" y="430" font-size="18" fill="#5CB85C">Example:</text>
    <text x="150" y="430" font-size="18" fill="#5CB85C">The union of {a, b} and {b, c} is also a regular language.</text>
  </section>

  <!-- Footer Section -->
  <rect x="50" y="460" width="320" height="30" fill="#3498DB" rx="5"/>
  <text x="100" y="470" font-size="18" fill="#fff">Closure Properties of Regular Languages Equivalency</text>
</svg>