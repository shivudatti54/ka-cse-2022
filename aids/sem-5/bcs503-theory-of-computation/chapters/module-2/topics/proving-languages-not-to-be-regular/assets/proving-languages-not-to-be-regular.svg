<svg width="420" height="400" data-topic-id="Proving-Languages-Not-To-Be-Regular">
  <style>
    /* Add some basic styling to our SVG */
    body {
      font-family: Arial, sans-serif;
      background-color: #E0E0E0;
      color: #333333;
    }
  </style>
  <rect x="0" y="0" width="100%" height="100%" fill="#C9E4CA"/> <!-- Gradient background with pastel colors -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="400" height="380" fill="#ADD8E6"/> <!-- White background rectangle -->
    <text x="10" y="20" font-size="24" font-family="Arial" fill="#4B0082" data-narration="Introduction to Regular Languages" text-anchor="start">Introduction to Regular Languages</text>
    <rect x="10" y="50" width="380" height="30" fill="#FFC107"/> <!-- Orange accent rectangle -->
    <text x="10" y="60" font-size="18" font-family="Arial" fill="#FFC107" data-narration="The Pumping Lemma" text-anchor="start">The Pumping Lemma</text>
    <rect x="10" y="90" width="380" height="30" fill="#0097A7"/> <!-- Teal accent rectangle -->
    <text x="10" y="100" font-size="18" font-family="Arial" fill="#0097A7" data-narration="Example 1: The Language $L = \{a^nb^n | n \geq 0\}$" text-anchor="start">Example 1: The Language $L = \{a^nb^n | n \geq 0\}$</text>
    <rect x="10" y="140" width="380" height="30" fill="#FFC107"/> <!-- Orange accent rectangle -->
    <text x="10" y="150" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Example 2: The Language $L = \{ww | w \in \{a, b\}^*\}$" text-anchor="start">Example 2: The Language $L = \{ww | w \in \{a, b\}^*\}$</text>
    <rect x="10" y="190" width="380" height="30" fill="#0097A7"/> <!-- Teal accent rectangle -->
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#0097A7" data-narration="Comparison of Regular and Non-Regular Languages" text-anchor="start">Comparison of Regular and Non-Regular Languages</text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 300" dur="10s" begin="0s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 300" to="0 600" dur="10s" begin="-10s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 600" to="0 900" dur="10s" begin="-20s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 900" to="0 1200" dur="10s" begin="-30s" repeatCount="indefinite"/>
</svg>