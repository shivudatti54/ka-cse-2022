<svg width="420" height="400" data-topic-id="finite-automata-and-regular-expressions">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle">Finite Automata and Regular Expressions</text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="150" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20%" y="170%" font-size="18" font-weight="bold" text-anchor="middle">Finite Automata and Regular Expressions</text>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 190" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Finite Automata -->
  <section data-narration="Finite Automata">
    <rect x="10" y="220" width="400" height="50" fill="#2E865F" rx="10"/>
    <rect x="10" y="260" width="50" height="50" fill="#1ABC9C" rx="10"/>
    <rect x="70" y="260" width="50" height="50" fill="#1ABC9C" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 260" to="70 260" dur="2000" begin="0s" repeatCount="indefinite"/>
    <text x="20%" y="280%" font-size="18" font-weight="bold" text-anchor="middle">Finite Automaton</text>
  </section>

  <!-- Section 3: Deterministic Finite Automata -->
  <section data-narration="Deterministic Finite Automata">
    <rect x="10" y="320" width="400" height="50" fill="#87CEEB" rx="10"/>
    <rect x="10" y="360" width="50" height="50" fill="#1ABC9C" rx="10"/>
    <rect x="70" y="360" width="50" height="50" fill="#1ABC9C" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 360" to="70 360" dur="2000" begin="0s" repeatCount="indefinite"/>
    <text x="20%" y="380%" font-size="18" font-weight="bold" text-anchor="middle">Deterministic Finite Automaton</text>
  </section>

  <!-- Section 4: Nondeterministic Finite Automata -->
  <section data-narration="Nondeterministic Finite Automata">
    <rect x="10" y="410" width="400" height="50" fill="#2E865F" rx="10"/>
    <rect x="10" y="460" width="50" height="50" fill="#1ABC9C" rx="10"/>
    <rect x="70" y="460" width="50" height="50" fill="#1ABC9C" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 460" to="70 460" dur="2000" begin="0s" repeatCount="indefinite"/>
    <text x="20%" y="480%" font-size="18" font-weight="bold" text-anchor="middle">Nondeterministic Finite Automaton</text>
  </section>

  <!-- Section 5: Regular Expressions -->
  <section data-narration="Regular Expressions">
    <rect x="10" y="510" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20%" y="530%" font-size="18" font-weight="bold" text-anchor="middle">Regular Expressions</text>
    <animateTransform attributeName="transform" type="translate" from="0 530" to="0 550" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 6: Union -->
  <section data-narration="Union">
    <rect x="10" y="590" width="400" height="50" fill="#2E865F" rx="10"/>
    <rect x="10" y="640" width="50" height="50" fill="#1ABC9C" rx="10"/>
    <rect x="70" y="640" width="50" height="50" fill="#1ABC9C" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 640" to="70 640" dur="2000" begin="0s" repeatCount="indefinite"/>
    <text x="20%" y="660%" font-size="18" font-weight="bold" text-anchor="middle">Union</text>
  </section>

  <!-- Section 7: Concatenation -->
  <section data-narration="Concatenation">
    <rect x="10" y="710" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20%" y="730%" font-size="18" font-weight="bold" text-anchor="middle">Concatenation</text>
    <animateTransform attributeName="transform" type="translate" from="0 730" to="0 750" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 8: Kleene Closure -->
  <section data-narration="Kleene Closure">
    <rect x="10" y="790" width="400" height="50" fill="#2E865F" rx="10"/>
    <text x="20%" y="810%" font-size="18" font-weight="bold" text-anchor="middle">Kleene Closure</text>
    <animateTransform attributeName="transform" type="translate" from="0 810" to="0 830" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Footer -->
  <text x="50%" y="380" font-size="18" text-anchor="middle">Finite Automata and Regular Expressions</text>
</svg>