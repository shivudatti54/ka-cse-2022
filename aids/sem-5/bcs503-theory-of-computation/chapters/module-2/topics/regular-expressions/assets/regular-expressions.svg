<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="regular-expressions" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#432B72">
    Regular Expressions
  </text>

  <!-- Section 1: Introduction to Regular Expressions -->
  <rect x="50%" y="70%" width="300" height="100" fill="#87CEEB" rx="10" data-narration="Introduction to Regular Expressions"/>
  <text x="50%" y="90%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#432B72">
    Regular expressions are powerful pattern-matching sequences used to search, filter, and manipulate text.
  </text>
  <animateTransform
    attributeName="transform"
    type="translate"
    from="50% 90%"
    to="50% 110%"
    begin="0s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="50% 110%"
    to="50% 90%"
    begin="2s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Section 2: Basic Regular Expressions (BRE) -->
  <rect x="50%" y="170%" width="300" height="100" fill="#87CEEB" rx="10" data-narration="Basic Regular Expressions (BRE)"/>
  <text x="50%" y="190%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#432B72">
    BRE patterns match text literally or use special characters to define search patterns.
  </text>
  <animateTransform
    attributeName="transform"
    type="translate"
    from="50% 190%"
    to="50% 210%"
    begin="4s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="50% 210%"
    to="50% 190%"
    begin="6s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Section 3: Literal Characters -->
  <rect x="50%" y="260%" width="300" height="100" fill="#87CEEB" rx="10" data-narration="Literal Characters"/>
  <rect x="100%" y="260%" width="100" height="20" fill="#432B72" rx="5" data-narration="Matches any single character except newline: ."/>
  <text x="150%" y="260%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#432B72">
    Most characters match themselves literally.
  </text>
  <animateTransform
    attributeName="transform"
    type="translate"
    from="100% 260%"
    to="100% 270%"
    begin="8s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="150% 270%"
    to="150% 260%"
    begin="10s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Section 4: Character Classes -->
  <rect x="50%" y="340%" width="300" height="100" fill="#87CEEB" rx="10" data-narration="Character Classes"/>
  <rect x="100%" y="340%" width="100" height="20" fill="#432B72" rx="5" data-narration="Matches any one character from a set: [ ]"/>
  <text x="150%" y="340%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#432B72">
    Character classes match any one character from a set.
  </text>
  <animateTransform
    attributeName="transform"
    type="translate"
    from="100% 340%"
    to="100% 350%"
    begin="12s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="150% 350%"
    to="150% 340%"
    begin="14s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Section 5: Anchors -->
  <rect x="50%" y="410%" width="300" height="100" fill="#87CEEB" rx="10" data-narration="Anchors"/>
  <rect x="100%" y="410%" width="100" height="20" fill="#432B72" rx="5" data-narration="^ Matches the start of a string"/>
  <text x="150%" y="410%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#432B72">
    Anchors match the start or end of a string.
  </text>
  <animateTransform
    attributeName="transform"
    type="translate"
    from="100% 410%"
    to="100% 420%"
    begin="16s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="150% 420%"
    to="150% 410%"
    begin="18s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Section 6: grep Command -->
  <rect x="50%" y="490%" width="300" height="100" fill="#87CEEB" rx="10" data-narration="grep Command"/>
  <text x="50%" y="510%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#432B72">
    The `grep` command searches for patterns in files or input streams and prints lines containing matches.
  </text>
  <animateTransform
    attributeName="transform"
    type="translate"
    from="50% 510%"
    to="50% 520%"
    begin="20s"
    dur="2s"
    repeatCount="indefinite"
  />
  <animateTransform
    attributeName="transform"
    type="translate"
    from="50% 520%"
    to="50% 510%"
    begin="22s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Footer -->
  <text x="50%" y="450%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#432B72">
    Regular Expressions
  </text>
</svg>