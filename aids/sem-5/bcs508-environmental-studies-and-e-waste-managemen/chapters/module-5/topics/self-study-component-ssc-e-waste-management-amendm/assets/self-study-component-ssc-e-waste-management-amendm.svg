<svg width="420" height="400" data-topic-id="self-study-component-e-waste-management-amendment-rules">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="10" y="20" width="400" height="30" fill="#2F4F7F" rx="5" />
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#FFF" text-anchor="middle">E-Waste Management Amendment Rules, 2023, 2024</text>
  </section>
  
  <!-- Definition Section -->
  <section data-narration="Definition of E-Waste">
    <rect x="10" y="60" width="400" height="60" fill="#ADD8E6" rx="10" />
    <rect x="10" y="130" width="400" height="60" fill="#C5CAE9" rx="10" />
    <text x="20" y="140" font-size="18" font-family="Arial" fill="#4F6E7B" text-anchor="middle">E-Waste: Discarded electronic devices containing hazardous materials</text>
    <text x="20" y="160" font-size="18" font-family="Arial" fill="#4F6E7B" text-anchor="middle">Hazardous Materials: Lead, Mercury, Cadmium, Chromium</text>
  </section>
  
  <!-- Classification Section -->
  <section data-narration="Classification of E-Waste">
    <rect x="10" y="200" width="400" height="60" fill="#4F6E7B" rx="10" />
    <rect x="10" y="270" width="400" height="60" fill="#ADD8E6" rx="10" />
    <rect x="10" y="340" width="400" height="60" fill="#C5CAE9" rx="10" />
    <text x="20" y="250" font-size="18" font-family="Arial" fill="#FFF" text-anchor="middle">Classification of E-Waste</text>
    <text x="20" y="270" font-size="18" font-family="Arial" fill="#FFF" text-anchor="start">Category I: Hazardous e-Waste</text>
    <text x="20" y="290" font-size="18" font-family="Arial" fill="#FFF" text-anchor="start">Category II: Non-hazardous e-Waste</text>
    <text x="20" y="310" font-size="18" font-family="Arial" fill="#FFF" text-anchor="start">Category III: Special category e-Waste</text>
  </section>
  
  <!-- Producer Responsibility Section -->
  <section data-narration="Producer Responsibility">
    <rect x="10" y="360" width="400" height="60" fill="#4F6E7B" rx="10" />
    <rect x="10" y="430" width="400" height="60" fill="#ADD8E6" rx="10" />
    <text x="20" y="420" font-size="18" font-family="Arial" fill="#FFF" text-anchor="middle">Producer Responsibility</text>
    <text x="20" y="440" font-size="18" font-family="Arial" fill="#FFF" text-anchor="start">Take-back facilities for e-Waste</text>
    <text x="20" y="460" font-size="18" font-family="Arial" fill="#FFF" text-anchor="start">Recyclable products</text>
  </section>
  
  <!-- Extended Producer Responsibility Section -->
  <section data-narration="Extended Producer Responsibility">
    <rect x="10" y="490" width="400" height="60" fill="#4F6E7B" rx="10" />
    <rect x="10" y="560" width="400" height="60" fill="#ADD8E6" rx="10" />
    <text x="20" y="550" font-size="18" font-family="Arial" fill="#FFF" text-anchor="middle">Extended Producer Responsibility</text>
    <text x="20" y="570" font-size="18" font-family="Arial" fill="#FFF" text-anchor="start">E-Waste collection and disposal</text>
    <text x="20" y="590" font-size="18" font-family="Arial" fill="#FFF" text-anchor="start">E-Waste management fees</text>
  </section>
  
  <!-- Footer Section -->
  <footer>
    <rect x="10" y="630" width="400" height="30" fill="#2F4F7F" rx="5" />
    <text x="20" y="640" font-size="18" font-family="Arial" fill="#FFF" text-anchor="middle">Copyright 2023</text>
  </footer>
  
  <!-- Animate Company Logo -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s">
    <circle cx="200" cy="10" r="30" fill="#4F6E7B" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 10" to="360 200 10" dur="2s" repeatCount="indefinite" />
  </animate>
  
  <!-- Animate Arrow Markers -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s">
    <line x1="10" y1="10" x2="20" y2="30" stroke="#4F6E7B" stroke-width="2" />
    <animateTransform attributeName="transform" type="rotate" from="0 10 10" to="360 10 10" dur="2s" repeatCount="indefinite" />
    <line x1="300" y1="10" x2="310" y2="30" stroke="#4F6E7B" stroke-width="2" />
    <animateTransform attributeName="transform" type="rotate" from="0 310 10" to="360 310 10" dur="2s" repeatCount="indefinite" />
  </animate>
</svg>