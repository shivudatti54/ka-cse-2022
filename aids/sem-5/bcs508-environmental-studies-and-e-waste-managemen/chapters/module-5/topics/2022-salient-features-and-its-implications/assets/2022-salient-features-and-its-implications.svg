<svg width="420" height="400" data-topic-id="2022-salient-features-and-its-implications" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a7fd8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>2022 Salient Features and its Implications</title>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#grad)"/>
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="400" height="300" style="fill:#fff"/>
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#000">2022 Salient Features and its Implications</text>
  </g>
  <g transform="translate(10, 40)">
    <rect x="0" y="0" width="400" height="150" style="fill:#fff"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Global Electronic Waste Generation increased by 8% in 2022, with an estimated 74 million metric tons of e-waste generated"></text>
    <rect x="50" y="50" width="100" height="50" style="fill:#c6e2b5" rx="10"/>
    <text x="60" y="60" font-size="16" font-family="Arial" fill="#000">Global Electronic Waste Generation</text>
    <animate transform="translate(60, 60) rotate(360 60 60)" begin="0s" dur="2s" repeat-count="indefinite"/>
  </g>
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="400" height="150" style="fill:#fff"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Extended Producer Responsibility (EPR) regulations were implemented in 2022 to hold manufacturers responsible for the waste generated by their products"></text>
    <rect x="50" y="50" width="100" height="50" style="fill:#8e24aa" rx="10"/>
    <text x="60" y="60" font-size="16" font-family="Arial" fill="#000">Extended Producer Responsibility (EPR)</text>
    <animate transform="translate(60, 60) rotate(720 60 60)" begin="2s" dur="2s" repeat-count="indefinite"/>
  </g>
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="150" style="fill:#fff"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Increased focus on recycling and reuse was highlighted in 2022, with many organizations and governments launching initiatives to promote the value of these practices"></text>
    <rect x="50" y="50" width="100" height="50" style="fill:#8bc34a" rx="10"/>
    <text x="60" y="60" font-size="16" font-family="Arial" fill="#000">Recycling and Reuse</text>
    <animate transform="translate(60, 60) rotate(1080 60 60)" begin="4s" dur="2s" repeat-count="indefinite"/>
  </g>
  <g transform="translate(10, 500)">
    <rect x="0" y="0" width="400" height="150" style="fill:#fff"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="Advancements in e-waste management technologies, including the development of new recycling technologies and the use of artificial intelligence (AI) in waste sorting and processing, were highlighted in 2022"></text>
    <rect x="50" y="50" width="100" height="50" style="fill:#2196f3" rx="10"/>
    <text x="60" y="60" font-size="16" font-family="Arial" fill="#000">E-Waste Management Technologies</text>
    <animate transform="translate(60, 60) rotate(1296 60 60)" begin="6s" dur="2s" repeat-count="indefinite"/>
  </g>
  <g transform="translate(10, 650)">
    <rect x="0" y="0" width="400" height="150" style="fill:#fff"/>
    <text x="20" y="20" font-size="18" font-family="Arial" fill="#000" data-narration="The implementation of EPR regulations and the growing focus on recycling and reuse have significant implications for governments and manufacturers, including increased pressure to adopt sustainable practices and reduce e-waste"></text>
    <rect x="50" y="50" width="100" height="50" style="fill:#f44336" rx="10"/>
    <text x="60" y="60" font-size="16" font-family="Arial" fill="#000">Government and Manufacturer Pressure</text>
    <animate transform="translate(60, 60) rotate(1440 60 60)" begin="8s" dur="2s" repeat-count="indefinite"/>
  </g>
  <rect x="10" y="370" width="400" height="30" style="fill:#000" rx="10"/>
  <text x="20" y="380" font-size="18" font-family="Arial" fill="#fff">Footer</text>
</svg>