<svg width="420" height="400" data-topic-id="E-Waste-Management-And-Handling-Rules" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="1"/>
      <stop offset="50%" stop-color="#2ecc71" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1abc9c" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(20, 20)">
    <text text-anchor="start" x="10" y="10" font-size="24" font-family="Arial" fill="#2ecc71">E-Waste Management And Handling Rules</text>
  </g>
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="10s" repetitions="indefinite"/>
    <text text-anchor="start" x="10" y="10" font-size="18" font-family="Arial" fill="#1abc9c">Introduction</text>
    <text data-narration="The E-Waste (Management and Handling) Rules, 2011, is a set of regulations aimed at managing electronic waste (e-waste) in India." x="10" y="40" font-size="18" font-family="Arial" fill="#1abc9c"/>
  </g>
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="10s" repetitions="indefinite"/>
    <text text-anchor="start" x="10" y="10" font-size="18" font-family="Arial" fill="#1abc9c">Background</text>
    <text data-narration="The production and disposal of electronic devices have led to a significant increase in e-waste. This waste poses environmental and health risks, as it contains hazardous materials such as lead, mercury, and cadmium." x="10" y="40" font-size="18" font-family="Arial" fill="#1abc9c"/>
  </g>
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="10s" repetitions="indefinite"/>
    <text text-anchor="start" x="10" y="10" font-size="18" font-family="Arial" fill="#1abc9c">Key Provisions</text>
    <text data-narration="The E-Waste (Management and Handling) Rules, 2011, prohibit the export of e-waste from India without prior approval from the Central Government." x="10" y="40" font-size="18" font-family="Arial" fill="#1abc9c"/>
    <text data-narration="The rules also require manufacturers to collect and segregate e-waste from their premises." x="10" y="60" font-size="18" font-family="Arial" fill="#1abc9c"/>
    <text data-narration="Additionally, the rules establish a producer responsibility for the proper disposal of e-waste generated from their products." x="10" y="80" font-size="18" font-family="Arial" fill="#1abc9c"/>
  </g>
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="10s" repetitions="indefinite"/>
    <text text-anchor="start" x="10" y="10" font-size="18" font-family="Arial" fill="#1abc9c">Responsibilities</text>
    <text data-narration="All manufacturers, distributors, and retailers of electronic equipment are required to collect and segregate e-waste from their premises." x="10" y="40" font-size="18" font-family="Arial" fill="#1abc9c"/>
    <text data-narration="The e-waste collected should be handed over to the e-waste generators/collectors for proper disposal." x="10" y="60" font-size="18" font-family="Arial" fill="#1abc9c"/>
    <text data-narration="The manufacturer or importer of electronic equipment is responsible for the proper disposal of e-waste generated from their products." x="10" y="80" font-size="18" font-family="Arial" fill="#1abc9c"/>
  </g>
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="10s" repetitions="indefinite"/>
    <text text-anchor="start" x="10" y="10" font-size="18" font-family="Arial" fill="#1abc9c">Regulatory Framework</text>
    <text data-narration="The E-Waste (Management and Handling) Rules, 2011, provide a regulatory framework for e-waste management in India." x="10" y="40" font-size="18" font-family="Arial" fill="#1abc9c"/>
    <text data-narration="The rules also establish a producer responsibility for the proper disposal of e-waste generated from their products." x="10" y="60" font-size="18" font-family="Arial" fill="#1abc9c"/>
    <text data-narration="The manufacturer or importer of electronic equipment is responsible for the proper disposal of e-waste generated from their products." x="10" y="80" font-size="18" font-family="Arial" fill="#1abc9c"/>
  </g>
</svg>