<svg width="420" height="400" data-topic-id="E-Waste">
  <style>
    /* Add a gradient background with pastel colors */
    linear-gradient(45deg, #87CEEB 0%, #87CEEB 50%, #6495ED 50%, #6495ED 100%);
    background-image: linear-gradient(45deg, #87CEEB 0%, #87CEEB 50%, #6495ED 50%, #6495ED 100%);
    background-size: 100% 100%;
    background-repeat: no-repeat;
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="50%" stop-color="#6495ED" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" x="50" y="50" width="320" height="280" rx="10" />
  <g>
    <!-- Title Section -->
    <text data-narration="Introduction" x="170" y="20" font-size="24" font-family="Arial" fill="#6495ED">
      <tspan>Electronic Waste (E-Waste)</tspan>
    </text>
    <!-- Arrow marker -->
    <line x1="170" y1="30" x2="170" y2="70" stroke="#6495ED" stroke-width="2" />
    <!-- Annotation -->
    <text x="170" y="60" font-size="18" font-family="Arial" fill="#6495ED">Definition and Types of E-Waste</text>
  </g>
  <g>
    <!-- Section 1: E-Waste Definition -->
    <rect x="50" y="120" width="320" height="80" rx="10" fill="#87CEEB" />
    <text data-narration="E-Waste Definition" x="170" y="150" font-size="18" font-family="Arial" fill="#6495ED">
      Discarded electronic devices that contain hazardous materials.
    </text>
    <!-- Arrow marker -->
    <line x1="170" y1="160" x2="170" y2="220" stroke="#6495ED" stroke-width="2" />
    <!-- Annotation -->
    <text x="170" y="180" font-size="18" font-family="Arial" fill="#6495ED">
      Contain hazardous materials such as lead, mercury, and cadmium.
    </text>
    <!-- Animation -->
    <animateTransform attributeName="transform" type="rotate" from="0 170 200" to="360 170 200" dur="2s" repeatCount="indefinite" />
  </g>
  <g>
    <!-- Section 2: Environmental Impact -->
    <rect x="50" y="220" width="320" height="80" rx="10" fill="#6495ED" />
    <text data-narration="Environmental Impact" x="170" y="250" font-size="18" font-family="Arial" fill="#6495ED">
      Toxic materials can contaminate soil, water, and air.
    </text>
    <!-- Arrow marker -->
    <line x1="170" y1="260" x2="170" y2="320" stroke="#6495ED" stroke-width="2" />
    <!-- Annotation -->
    <text x="170" y="280" font-size="18" font-family="Arial" fill="#6495ED">
      Health risks include cancer, neurological damage, and reproductive issues.
    </text>
    <!-- Animation -->
    <animateTransform attributeName="transform" type="rotate" from="0 170 280" to="360 170 280" dur="2s" repeatCount="indefinite" />
  </g>
  <g>
    <!-- Section 3: E-Waste Management Strategies -->
    <rect x="50" y="280" width="320" height="80" rx="10" fill="#87CEEB" />
    <text data-narration="E-Waste Management Strategies" x="170" y="310" font-size="18" font-family="Arial" fill="#6495ED">
      Recycling, re-use, and proper disposal are essential.
    </text>
    <!-- Arrow marker -->
    <line x1="170" y1="320" x2="170" y2="380" stroke="#6495ED" stroke-width="2" />
    <!-- Annotation -->
    <text x="170" y="340" font-size="18" font-family="Arial" fill="#6495ED">
      Recover valuable materials and reduce waste.
    </text>
    <!-- Animation -->
    <animateTransform attributeName="transform" type="rotate" from="0 170 340" to="360 170 340" dur="2s" repeatCount="indefinite" />
  </g>
  <g>
    <!-- Section 4: Best Practices -->
    <rect x="50" y="380" width="320" height="80" rx="10" fill="#6495ED" />
    <text data-narration="Best Practices" x="170" y="410" font-size="18" font-family="Arial" fill="#87CEEB">
      Proper disposal, repair, and responsible use.
    </text>
    <!-- Arrow marker -->
    <line x1="170" y1="430" x2="170" y2="490" stroke="#87CEEB" stroke-width="2" />
    <!-- Annotation -->
    <text x="170" y="450" font-size="18" font-family="Arial" fill="#87CEEB">
      Extend the lifespan of e-waste devices.
    </text>
    <!-- Animation -->
    <animateTransform attributeName="transform" type="rotate" from="0 170 450" to="360 170 450" dur="2s" repeatCount="indefinite" />
  </g>
  <g>
    <!-- Footer Section -->
    <text x="170" y="400" font-size="18" font-family="Arial" fill="#6495ED">
      Learn more about e-waste management and its impact on the environment.
    </text>
  </g>
</svg>