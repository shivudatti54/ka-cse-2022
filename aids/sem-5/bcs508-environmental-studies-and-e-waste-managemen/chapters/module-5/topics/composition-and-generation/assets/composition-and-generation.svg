<svg width="420" height="400" data-topic-id="composition-and-generation" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Header and Footer -->
  <defs>
    <style>
      .header {
        font-size: 24px;
        font-weight: bold;
        color: #2f4f7f;
        text-align: center;
        margin: 10px 0;
      }
      .footer {
        font-size: 14px;
        color: #666;
        text-align: center;
        margin: 10px 0;
      }
    </style>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="#c7e5ff" rx="10"/>
  <!-- Gradient Background -->
  <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
    <stop offset="100%" stop-color="#E0F0FF" stop-opacity="1"/>
  </linearGradient>
  <!-- Title -->
  <rect x="10" y="10" width="400" height="50" fill="#fff" rx="10"/>
  <text class="header" x="200" y="25" fill="#2f4f7f">Composition and Generation</text>
  <!-- Section 1: Introduction -->
  <rect x="10" y="70" width="400" height="100" fill="#fff" rx="10"/>
  <text x="20" y="50" fill="#666" data-narration="E-waste refers to discarded electronic devices, including computers, smartphones, televisions, and other electronic equipment." font-size="16px" font-weight="bold">What is E-Waste?</text>
  <animateTransform attributeName="x" dur="2000" from="10" to="10" begin="-2000" repeatCount="indefinite"/>
  <animateTransform attributeName="y" dur="2000" from="70" to="70" begin="-2000" repeatCount="indefinite"/>
  <!-- Section 2: Composition of E-Waste -->
  <rect x="10" y="180" width="400" height="100" fill="#fff" rx="10"/>
  <rect x="30" y="60" width="50" height="30" fill="#2f4f7f" rx="5"/>
  <text x="40" y="75" fill="#666" data-narration="E-waste is composed of various materials, including metals, plastics, organic materials, and glass." font-size="16px" font-weight="bold">Composition of E-Waste</text>
  <animateTransform attributeName="x" dur="2000" from="40" to="40" begin="-2000" repeatCount="indefinite"/>
  <animateTransform attributeName="y" dur="2000" from="80" to="80" begin="-2000" repeatCount="indefinite"/>
  <line x1="50" y1="70" x2="90" y2="100" stroke="#2f4f7f" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- Section 3: Generation of E-Waste -->
  <rect x="10" y="280" width="400" height="100" fill="#fff" rx="10"/>
  <rect x="30" y="110" width="50" height="30" fill="#2f4f7f" rx="5"/>
  <text x="40" y="125" fill="#666" data-narration="E-waste is generated through various channels, including consumer discard, manufacturing waste, refurbishment and repair, and electronic devices from non-technical sources." font-size="16px" font-weight="bold">Generation of E-Waste</text>
  <animateTransform attributeName="x" dur="2000" from="40" to="40" begin="-2000" repeatCount="indefinite"/>
  <animateTransform attributeName="y" dur="2000" from="290" to="290" begin="-2000" repeatCount="indefinite"/>
  <line x1="50" y1="120" x2="90" y2="140" stroke="#2f4f7f" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- Section 4: Key Factors Contributing to E-Waste Generation -->
  <rect x="10" y="370" width="400" height="100" fill="#fff" rx="10"/>
  <rect x="30" y="150" width="50" height="30" fill="#2f4f7f" rx="5"/>
  <text x="40" y="165" fill="#666" data-narration="Rapid obsolescence, consumer behavior, and manufacturing practices contribute to e-waste generation." font-size="16px" font-weight="bold">Key Factors Contributing to E-Waste Generation</text>
  <animateTransform attributeName="x" dur="2000" from="40" to="40" begin="-2000" repeatCount="indefinite"/>
  <animateTransform attributeName="y" dur="2000" from="370" to="370" begin="-2000" repeatCount="indefinite"/>
  <line x1="50" y1="160" x2="90" y2="180" stroke="#2f4f7f" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- Footer -->
  <text class="footer" x="200" y="400" fill="#666">Learn more about e-waste management and sustainability.</text>
</svg>