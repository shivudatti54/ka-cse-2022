<svg width="420" height="400" data-topic-id="water-resources-management" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2E9F6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Water Resources Management</title>
  <foreignObject x="10" y="10" width="400" height="30">
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Water Resources Management</text>
  </foreignObject>
  <defs>
    <symbol id="arrow">
      <path d="M 0 0 L 10 0 L 5 10 Z"/>
    </symbol>
  </defs>
  <rect x="10" y="40" width="400" height="80" fill="url(#gradient)"/>
  <foreignObject x="15" y="50" width="380" height="60">
    <text x="20" y="20" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">The Hydrological Cycle</text>
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="The continuous movement of water on, above, and below the surface of the Earth."/>
  </foreignObject>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" dur="2000" begin="0s"/>
  <foreignObject x="15" y="110" width="380" height="60">
    <text x="20" y="20" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Evaporation</text>
    <path fill="none" stroke="#666666" stroke-width="2" d="M 10 10 L 10 40 Z"/>
    <animateTransform attributeName="transform" type="translate" from="10 10" to="10 40" dur="1000" begin="0s"/>
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Evaporation occurs when water is heated from the surface, turning into vapor and rising into the atmosphere."/>
  </foreignObject>
  <animateTransform attributeName="transform" type="translate" from="0 40" to="0 100" dur="1000" begin="1000s"/>
  <foreignObject x="15" y="140" width="380" height="60">
    <text x="20" y="20" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Condensation</text>
    <path fill="none" stroke="#666666" stroke-width="2" d="M 10 90 L 10 110 Z"/>
    <animateTransform attributeName="transform" type="translate" from="10 90" to="10 110" dur="1000" begin="1000s"/>
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="As water vapor rises, it cools and condenses into tiny droplets, forming clouds."/>
  </foreignObject>
  <animateTransform attributeName="transform" type="translate" from="0 100" to="0 160" dur="1000" begin="1500s"/>
  <foreignObject x="15" y="190" width="380" height="60">
    <text x="20" y="20" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Precipitation</text>
    <path fill="none" stroke="#666666" stroke-width="2" d="M 10 150 L 10 170 Z"/>
    <animateTransform attributeName="transform" type="translate" from="10 150" to="10 170" dur="1000" begin="1500s"/>
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="When the clouds become saturated, the water falls to the ground as precipitation, such as rain or snow."/>
  </foreignObject>
  <foreignObject x="15" y="230" width="380" height="60">
    <text x="20" y="20" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Infiltration and Runoff</text>
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="Some of the precipitation seeps into the ground, recharging aquifers, while the rest flows over the surface as runoff, eventually making its way to bodies of water."/>
  </foreignObject>
  <foreignObject x="15" y="280" width="380" height="60">
    <text x="20" y="20" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Groundwater</text>
    <path fill="none" stroke="#666666" stroke-width="2" d="M 10 250 L 10 270 Z"/>
    <animateTransform attributeName="transform" type="translate" from="10 250" to="10 270" dur="1000" begin="2000s"/>
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="The water that seeps into the ground becomes part of the groundwater, which can be extracted for use in various ways."/>
  </foreignObject>
  <foreignObject x="15" y="360" width="380" height="60">
    <text x="20" y="20" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Types of Water Resources</text>
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#666666" data-narration="There are several types of water resources, including surface water, groundwater, and atmospheric water."/>
  </foreignObject>
  <foreignObject x="15" y="440" width="380" height="30">
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Water Resources Management</text>
  </foreignObject>
  <foreignObject x="15" y="470" width="380" height="30">
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Conclusion</text>
  </foreignObject>
  <symbol id="arrow">
    <path d="M 0 0 L 10 0 L 5 10 Z"/>
  </symbol>
  <rect x="10" y="500" width="400" height="30" fill="#666666"/>
  <text x="20" y="25" font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">References</text>
</svg>