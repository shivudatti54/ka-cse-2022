<svg width="420" height="400" data-topic-id="template-for-aec-if-the-course-is-a-theory-annex" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f8bcf" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4682b4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8bc34a" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#background-gradient)" opacity="0.5"/>
  
  <!-- Title Section -->
  <g id="title-section" transform="translate(10, 20)">
    <text x="50%" y="50%" text-anchor="middle" font-size="24" fill="#4682b4" opacity="1">Template for AEC: Case Studies on Waste Management Options</text>
  </g>
  
  <!-- Introduction Section -->
  <g id="introduction-section" transform="translate(10, 80)">
    <rect x="-20" y="-20" width="200" height="200" fill="#fff" opacity="0.5"/>
    <rect x="-15" y="-15" width="250" height="250" fill="#e5e5e5" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -220" dur="3s" repeatCount="indefinite"/>
    <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#466a64" opacity="1" data-narration="Introduction to Waste Management">Waste Management Basics</text>
  </g>
  
  <!-- Types of Waste Section -->
  <g id="types-of-waste-section" transform="translate(10, 260)">
    <rect x="-20" y="-20" width="200" height="200" fill="#fff" opacity="0.5"/>
