    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -220" dur="3s" repeatCount="indefinite"/>
    <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#466a64" opacity="1" data-narration="Case Studies on Waste Management Options">Case Studies on Waste Management Options</text>
    <rect x="50" y="150" width="100" height="50" fill="#8bc34a" rx="5"/>
