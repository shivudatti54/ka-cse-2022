    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -220" dur="3s" repeatCount="indefinite"/>
    <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#466a64" opacity="1" data-narration="Types of Waste">Types of Waste</text>
    <circle cx="120" cy="100" r="30" fill="#4682b4" stroke="#fff" stroke-width="2"/>
    <text x="120" y="110" text-anchor="middle" font-size="16" fill="#fff">Solid Waste</text>
    <circle cx="220" cy="100" r="30" fill="#4682b4" stroke="#fff" stroke-width="2"/>
    <text x="220" y="110" text-anchor="middle" font-size="16" fill="#fff">Hazardous Waste</text>
    <circle cx="320" cy="100" r="30" fill="#4682b4" stroke="#fff" stroke-width="2"/>
    <text x="320" y="110" text-anchor="middle" font-size="16" fill="#fff">Construction and Demolition (C&D) Waste</text>
  </g>
  
  <!-- Waste Management Strategies Section -->
  <g id="waste-management-strategies-section" transform="translate(10, 460)">
    <rect x="-20" y="-20" width="200" height="200" fill="#fff" opacity="0.5"/>
    <rect x="-15" y="-15" width="250" height="250" fill="#e5e5e5" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -220" dur="3s" repeatCount="indefinite"/>
    <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#466a64" opacity="1" data-narration="Waste Management Strategies">Waste Management Strategies</text>
    <line x1="100" y1="150" x2="200" y2="220" stroke="#4682b4" stroke-width="2"/>
    <text x="120" y="160" text-anchor="middle" font-size="16" fill="#fff">Source Reduction</text>
    <line x1="220" y1="150" x2="320" y2="220" stroke="#4682b4" stroke-width="2"/>
    <text x="240" y="160" text-anchor="middle" font-size="16" fill="#fff">Recycling</text>
