<svg width="420" height="400" data-topic-id="E-resource-1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" data-narration='
  'Introduction to E-Resources: 
  E-resources refer to digital information or materials used to support learning, research, or personal development. They can be accessed through electronic devices and include a range of formats such as text documents, images, videos, and audio files.
  '>

  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E1F9" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%" rx="10" />
  
  <!-- Section 1: Online Courses and Tutorials -->
  <section id="section1" data-narration='
    'Online Courses and Tutorials:
    - Interactive and often self-paced learning materials.
    - Include multimedia content, such as videos and animations.
    - Can be accessed from anywhere with an internet connection.
    '>
    <rect x="10" y="20" width="300" height="100" fill="#F7F7F7" rx="10" />
    <circle cx="160" cy="50" r="30" fill="#3B5998" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 2: Digital Libraries and Archives -->
  <section id="section2" data-narration='
    'Digital Libraries and Archives:
    - Provide access to a vast collection of information.
    - Include full-text documents, images, and multimedia content.
    - Can be accessed from anywhere with an internet connection.
    '>
    <rect x="10" y="130" width="300" height="100" fill="#F7F7F7" rx="10" />
    <circle cx="160" cy="80" r="30" fill="#2E865F" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="2s" dur="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 3: Social Media and Online Communities -->
  <section id="section3" data-narration='
    'Social Media and Online Communities:
    - Provide opportunities for social interaction and community building.
    - Include multimedia content, such as images and videos.
    - Can be accessed from anywhere with an internet connection.
    '>
    <rect x="10" y="240" width="300" height="100" fill="#F7F7F7" rx="10" />
    <circle cx="160" cy="90" r="30" fill="#FFC107" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="4s" dur="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 4: Online Research Papers and Journals -->
  <section id="section4" data-narration='
    'Online Research Papers and Journals:
    - Scholarly articles and research papers available through online databases and platforms.
    - Include full-text documents, images, and multimedia content.
    - Can be accessed from anywhere with an internet connection.
    '>
  <rect x="10" y="350" width="300" height="100" fill="#F7F7F7" rx="10" />
  </section>
  
  <!-- Title and Footer -->
  <text x="10" y="10" font-size="24" font-family="Arial" fill="#3498DB">
    E-Resources
  </text>
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#3498DB">
    Powered by Education
  </text>
  
  <!-- Arrow markers for connections -->
  <path d="M 190,50 L 200,60" stroke="#3498DB" stroke-width="2" fill="none" />
  <path d="M 200,60 L 210,70" stroke="#3498DB" stroke-width="2" fill="none" />
  
  </svg>