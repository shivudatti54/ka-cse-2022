<svg width="420" height="400" data-topic-id="ecosystem-structure-of-forest-type-ecosystems" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Add some basic styling to our SVG */
    * {
      font-family: Arial, sans-serif;
      color: #666;
    }
    text {
      font-size: 18px;
    }
  </style>
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  <!-- Title at the top -->
  <text x="50%" y="20%" text-anchor="middle" fill="#4B0082">Ecosystem Structure of Forest Type Ecosystems</text>
  <!-- Section 1: Producers -->
  <rect x="20" y="60" width="380" height="100" fill="#C6E2B5" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0 60" to="0 120" begin="0s" dur="2s" repeatCount="indefinite" />
  <text x="50%" y="80%" text-anchor="middle" fill="#333" data-narration="Producers are plants and algae that produce their own food through photosynthesis, converting sunlight, water, and carbon dioxide into glucose and oxygen." transform="translate(0, 0) rotate(0) scale(1, 1)" opacity="1" />
  <!-- Section 2: Consumers -->
  <rect x="20" y="180" width="380" height="100" fill="#FFC107" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0 180" to="0 220" begin="2s" dur="2s" repeatCount="indefinite" />
  <text x="50%" y="200%" text-anchor="middle" fill="#333" data-narration="Consumers are animals and microorganisms that obtain energy by consuming other organisms or organic matter." transform="translate(0, 0) rotate(0) scale(1, 1)" opacity="1" />
  <!-- Section 3: Decomposers -->
  <rect x="20" y="300" width="380" height="100" fill="#8BC34A" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0 300" to="0 340" begin="4s" dur="2s" repeatCount="indefinite" />
  <text x="50%" y="320%" text-anchor="middle" fill="#333" data-narration="Decomposers are microorganisms that break down dead organisms and recycle nutrients." transform="translate(0, 0) rotate(0) scale(1, 1)" opacity="1" />
  <!-- Section 4: Nutrient Cycle -->
  <rect x="20" y="380" width="380" height="40" fill="#2196F3" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0 380" to="0 420" begin="6s" dur="2s" repeatCount="indefinite" />
  <text x="50%" y="400%" text-anchor="middle" fill="#333" data-narration="The nutrient cycle involves the movement of nutrients through the ecosystem, involving absorption, assimilation, and release." transform="translate(0, 0) rotate(0) scale(1, 1)" opacity="1" />
  <!-- Section 5: Trophic Levels -->
  <rect x="20" y="60" width="200" height="100" fill="#C6E2B5" rx="10" />
  <rect x="240" y="60" width="200" height="100" fill="#FFC107" rx="10" />
  <rect x="460" y="60" width="200" height="100" fill="#8BC34A" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0 60 200" to="0 60 240" begin="0s" dur="2s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 60 240" to="0 60 280" begin="2s" dur="2s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 60 280" to="0 60 320" begin="4s" dur="2s" repeatCount="indefinite" />
  <text x="100%" y="80%" text-anchor="middle" fill="#333" data-narration="Trophic levels represent the positions of organisms in the food chain, ranging from producers to decomposers." transform="translate(0, 0) rotate(0) scale(1, 1)" opacity="1" />
  <text x="360%" y="80%" text-anchor="middle" fill="#333" data-narration="Energy flow is the transfer of energy from one trophic level to the next." transform="translate(0, 0) rotate(0) scale(1, 1)" opacity="1" />
  <!-- Section 6: Energy Flow -->
  <rect x="20" y="180" width="200" height="100" fill="#FFC107" rx="10" />
  <rect x="240" y="180" width="200" height="100" fill="#8BC34A" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0 180 200" to="0 180 240" begin="0s" dur="2s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 180 240" to="0 180 280" begin="2s" dur="2s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate" from="0 180 280" to="0 180 320" begin="4s" dur="2s" repeatCount="indefinite" />
  <text x="100%" y="200%" text-anchor="middle" fill="#333" data-narration="Energy flow is the transfer of energy from one trophic level to the next, typically from producers to consumers." transform="translate(0, 0) rotate(0) scale(1, 1)" opacity="1" />
  <text x="360%" y="200%" text-anchor="middle" fill="#333" data-narration="The movement of nutrients through the ecosystem is essential for maintaining the balance of energy flow." transform="translate(0, 0) rotate(0) scale(1, 1)" opacity="1" />
  <!-- Footer -->
  <text x="50%" y="420%" text-anchor="middle" fill="#4B0082">Ecosystem Structure of Forest Type Ecosystems</text>
  <rect x="0" y="420" width="420" height="40" fill="#4B0082" rx="10" />
</svg>