<svg width="420" height="400" data-topic-id="sustainability-17sdg-targets-and-possible-actions">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="1" />
      <stop offset="50%" stop-color="#e95a44" stop-opacity="1" />
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="380" height="360" fill="url(#grad)" rx="10" />
  <g transform="translate(20, 20)">
    <title>Sustainability 17 SDG Targets and Possible Actions</title>
    <text x="10" y="10" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Sustainability 17 SDG Targets and Possible Actions</text>
    <rect x="10" y="50" width="300" height="20" fill="#f9f9f9" rx="5" />
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0" />
    <g data-narration="What is Sustainability?">
      <rect x="15" y="55" width="270" height="15" fill="#f9f9f9" rx="5" />
      <text x="20" y="65" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Sustainability is the ability of a system, process, or activity to endure over time without degrading the environment or resource base.</text>
    </g>
    <g data-narration="17 SDG Targets Related to Sustainability">
      <rect x="10" y="85" width="380" height="200" fill="#f9f9f9" rx="5" />
      <rect x="10" y="90" width="70" height="10" fill="#3498db" rx="5" />
      <rect x="80" y="90" width="70" height="10" fill="#e95a44" rx="5" />
      <rect x="140" y="90" width="70" height="10" fill="#2ecc71" rx="5" />
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0" />
      <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" from="0" to="1" />
      <text x="15" y="100" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Target 1.1: End poverty in all its forms everywhere</text>
      <text x="140" y="100" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Target 2.1: End hunger, achieve food security and improved nutrition, and promote sustainable agriculture</text>
      <text x="80" y="100" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Target 3.1: Ensure healthy lives and promote well-being for all at all ages</text>
      <g data-narration="Possible Actions">
        <rect x="10" y="120" width="380" height="150" fill="#f9f9f9" rx="5" />
        <rect x="10" y="125" width="70" height="10" fill="#3498db" rx="5" />
        <rect x="80" y="125" width="70" height="10" fill="#e95a44" rx="5" />
        <rect x="140" y="125" width="70" height="10" fill="#2ecc71" rx="5" />
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0" />
        <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" from="0" to="1" />
        <text x="15" y="135" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Support microfinance initiatives to promote economic growth</text>
        <text x="140" y="135" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Promote agroecology and sustainable agriculture practices</text>
        <text x="80" y="135" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Implement policies to reduce poverty and inequality</text>
      </g>
    </g>
    <g data-narration="Arrow markers for connections">
      <rect x="10" y="275" width="10" height="10" fill="#3498db" rx="5" />
      <rect x="80" y="275" width="10" height="10" fill="#e95a44" rx="5" />
      <rect x="140" y="275" width="10" height="10" fill="#2ecc71" rx="5" />
    </g>
    <g data-narration="Footer">
      <rect x="10" y="350" width="380" height="20" fill="#f9f9f9" rx="5" />
      <text x="10" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Copyright 2023</text>
    </g>
  </g>
</svg>