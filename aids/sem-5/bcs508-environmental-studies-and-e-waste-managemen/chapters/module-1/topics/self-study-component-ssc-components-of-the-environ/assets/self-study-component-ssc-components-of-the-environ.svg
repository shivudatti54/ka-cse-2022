<svg width="420" height="400" data-topic-id="self-study-component-ssc-components-of-the-environ">
  <rect fill="rgb(203, 219, 239)" width="100%" height="100%"></rect>
  <g transform="translate(10, 10)">
    <text x="10" y="20" font-size="24" fill="rgb(30, 139, 75)" font-family="Arial, sans-serif">Self-Study Component (SSC): Components of the Environment</text>
    <line x1="10" y1="50" x2="390" y2="50" stroke="rgb(30, 139, 75)" stroke-width="2" />
    <g id="atmosphere">
      <rect fill="rgb(240, 245, 245)" width="150" height="100" rx="10" transform="translate(10, 70)" data-narration="The atmosphere is the layer of gases surrounding the Earth, including nitrogen, oxygen, carbon dioxide, and other pollutants.">
        <animateTransform attributeName="transform" type="translate" from="0, 70" to="0, 80" dur="2s" begin="0s" repeatCount="indefinite" />
        <text x="20" y="50" font-size="18" fill="rgb(30, 139, 75)" font-family="Arial, sans-serif">Atmosphere</text>
        <line x1="20" y1="70" x2="130" y2="70" stroke="rgb(30, 139, 75)" stroke-width="2" />
        <circle cx="70" cy="60" r="20" stroke="rgb(30, 139, 75)" stroke-width="2" fill="none" />
        <text x="70" y="50" font-size="14" fill="rgb(30, 139, 75)" font-family="Arial, sans-serif">Examples: Greenhouse effect, Ozone layer depletion</text>
      </rect>
    </g>
    <g id="hydrosphere">
      <rect fill="rgb(240, 245, 245)" width="150" height="100" rx="10" transform="translate(170, 70)" data-narration="The hydrosphere is the Earth's water system, including oceans, lakes, rivers, and groundwater.">
        <animateTransform attributeName="transform" type="translate" from="0, 70" to="0, 80" dur="2s" begin="0s + 2s" repeatCount="indefinite" />
        <text x="20" y="50" font-size="18" fill="rgb(30, 139, 75)" font-family="Arial, sans-serif">Hydrosphere</text>
        <line x1="20" y1="70" x2="130" y2="70" stroke="rgb(30, 139, 75)" stroke-width="2" />
        <circle cx="70" cy="60" r="20" stroke="rgb(30, 139, 75)" stroke-width="2" fill="none" />
        <text x="70" y="50" font-size="14" fill="rgb(30, 139, 75)" font-family="Arial, sans-serif">Examples: Water cycles, Freshwater scarcity</text>
      </rect>
    </g>
    <g id="lithosphere">
      <rect fill="rgb(240, 245, 245)" width="150" height="100" rx="10" transform="translate(330, 70)" data-narration="The lithosphere is the solid outer layer of the Earth, comprising rocks and minerals.">
        <animateTransform attributeName="transform" type="translate" from="0, 70" to="0, 80" dur="2s" begin="0s + 4s" repeatCount="indefinite" />
        <text x="20" y="50" font-size="18" fill="rgb(30, 139, 75)" font-family="Arial, sans-serif">Lithosphere</text>
        <line x1="20" y1="70" x2="130" y2="70" stroke="rgb(30, 139, 75)" stroke-width="2" />
        <circle cx="70" cy="60" r="20" stroke="rgb(30, 139, 75)" stroke-width="2" fill="none" />
        <text x="70" y="50" font-size="14" fill="rgb(30, 139, 75)" font-family="Arial, sans-serif">Examples: Plate tectonics, Natural resources depletion</text>
      </rect>
    </g>
  </g>
  <g transform="translate(10, 180)">
    <text x="10" y="190" font-size="18" fill="rgb(30, 139, 75)" font-family="Arial, sans-serif">Conclusion</text>
  </g>
</svg>