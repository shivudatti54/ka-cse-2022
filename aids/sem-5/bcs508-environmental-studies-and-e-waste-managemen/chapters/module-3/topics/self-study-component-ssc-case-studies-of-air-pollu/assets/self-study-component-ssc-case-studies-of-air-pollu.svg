<svg width="420" height="400" data-topic-id="self-study-component-ssc-case-studies-of-air-pollution-episodes">
  <!-- Gradient background -->
  <defs>
    <linearGradient id=" gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B3DFFC" />
      <stop offset="100%" stop-color="#3B85F0" />
    </linearGradient>
  </defs>
  <rect x="50%" y="50%" width="260%" height="260%" fill="url(# gradient-background)" rx="20%" />
  
  <!-- Title -->
  <text x="50%" y="20%" text-anchor="middle" font-size="24" font-family="Arial" fill="#2F4F7F">
    Case Studies of Air Pollution Episodes
  </text>
  
  <!-- Section 1 -->
  <rect x="30%" y="70%" width="200%" height="100%" fill="#F7F7F7" rx="10%" data-narration="What is Air Pollution?" />
  <animate duration="2000" begin="0s" fill="freeze" attributeName="opacity" from="1" to="0" />
  <text x="70%" y="90%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    Air pollution is the contamination of the air we breathe with pollutants that can harm human health, wildlife, and the environment.
  </text>
  <text x="70%" y="110%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    The main sources of air pollution are fossil fuel combustion, industrial processes, vehicle emissions, and agricultural activities.
  </text>
  
  <!-- Section 2 -->
  <rect x="30%" y="180%" width="200%" height="100%" fill="#F7F7F7" rx="10%" data-narration="The Great Smog of London (1952)" />
  <animate duration="2000" begin="2s" fill="freeze" attributeName="opacity" from="1" to="0" />
  <text x="70%" y="210%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    The Great Smog of London occurred in December 1952, resulting in an estimated 12,000 deaths and widespread respiratory problems.
  </text>
  <circle cx="70%" cy="230%" r="10%" fill="#FFA07A" />
  <text x="70%" y="250%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    The smog was caused by a combination of factors, including fossil fuel combustion, industrial processes, and vehicle emissions.
  </text>
  
  <!-- Section 3 -->
  <rect x="30%" y="320%" width="200%" height="100%" fill="#F7F7F7" rx="10%" data-narration="Causes of Air Pollution" />
  <animate duration="2000" begin="4s" fill="freeze" attributeName="opacity" from="1" to="0" />
  <text x="70%" y="350%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    The main causes of air pollution are fossil fuel combustion, industrial processes, vehicle emissions, and agricultural activities.
  </text>
  <text x="70%" y="370%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    These causes release pollutants into the air, which can harm human health, wildlife, and the environment.
  </text>
  
  <!-- Section 4 -->
  <rect x="30%" y="420%" width="200%" height="100%" fill="#F7F7F7" rx="10%" data-narration="Effects of Air Pollution" />
  <animate duration="2000" begin="6s" fill="freeze" attributeName="opacity" from="1" to="0" />
  <text x="70%" y="450%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    The effects of air pollution can be severe, with high mortality rates, respiratory problems, and economic losses.
  </text>
  <text x="70%" y="470%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    It is essential to understand the causes and effects of air pollution to develop effective solutions.
  </text>
  
  <!-- Section 5 -->
  <rect x="30%" y="490%" width="200%" height="100%" fill="#F7F7F7" rx="10%" data-narration="Solutions to Air Pollution" />
  <animate duration="2000" begin="8s" fill="freeze" attributeName="opacity" from="1" to="0" />
  <text x="70%" y="520%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    Solutions to air pollution include reducing fossil fuel combustion, increasing energy efficiency, and promoting sustainable transportation.
  </text>
  <text x="70%" y="540%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    Governments, industries, and individuals must work together to develop and implement effective solutions.
  </text>
  
  <!-- Footer -->
  <text x="50%" y="380%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2F4F7F">
    Copyright 2023
  </text>
</svg>