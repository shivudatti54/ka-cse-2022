<svg width="420" height="400" data-topic-id="environmental-pollution-water-pollution-noise-poll" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stopOpacity="1"/>
      <stop offset="100%" stop-color="#E0E9F4" stopOpacity="1"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      padding: 20px;
      margin-bottom: 20px;
      background-color: #E0E9F4;
      background-image: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 100%, #E0E9F4 100%);
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .section:last-child {
      margin-bottom: 0;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .annotation {
      font-size: 18px;
      color: #666;
      margin-bottom: 10px;
    }
    .arrow {
      fill: #666;
      stroke: #666;
      stroke-width: 2;
    }
  </style>
  <title>Environmental Pollution: Water Pollution, Noise Pollution, Air Pollution</title>
  <rect x="10" y="10" width="400" height="60" fill="#87CEEB"/>
  <rect x="10" y="80" width="400" height="60" fill="#E0E9F4"/>
  <g id="section-1" transform="translate(10, 90)">
    <rect width="300" height="100" fill="#E0E9F4"/>
    <text x="20" y="40" class="title">Water Pollution</text>
    <text x="20" y="80" class="annotation">Pollution of water sources due to industrial, agricultural, and domestic activities.</text>
    <animate-transform attribute="transform" type="translate" begin="0s" dur="2s" repeat="forever"/>
    <animate-transform attribute="transform" type="scale" begin="0.5s" dur="1s" repeat="forever"/>
    <line x1="20" y1="100" x2="300" y2="100" stroke="#666" stroke-width="2"/>
    <path d="M 20 100 L 300 100" stroke="#666" stroke-width="2"/>
    <text x="20" y="120" class="annotation">Sources: Industrial effluents, Agricultural runoff, Domestic sewage, Wastewater from hospitals and clinics, Chemicals from pesticides and fertilizers.</text>
    <text x="20" y="140" class="annotation">Impacts: Harm to aquatic life, Decrease in water quality, Spread of waterborne diseases, Decrease in drinking water availability, Impact on agricultural productivity.</text>
  </g>
  <g id="section-2" transform="translate(10, 190)">
    <rect width="300" height="100" fill="#E0E9F4"/>
    <text x="20" y="40" class="title">Noise Pollution</text>
    <text x="20" y="80" class="annotation">Pollution due to excessive noise from traffic, industry, construction, and recreational activities.</text>
    <animate-transform attribute="transform" type="translate" begin="0s" dur="2s" repeat="forever"/>
    <animate-transform attribute="transform" type="scale" begin="0.5s" dur="1s" repeat="forever"/>
    <line x1="20" y1="100" x2="300" y2="100" stroke="#666" stroke-width="2"/>
    <path d="M 20 100 L 300 100" stroke="#666" stroke-width="2"/>
    <text x="20" y="120" class="annotation">Sources: Traffic noise, Industrial noise, Construction noise, Recreational noise, Noise from electronic devices.</text>
    <text x="20" y="140" class="annotation">Impacts: Hearing loss, Stress and anxiety, Decrease in quality of life, Impact on sleep patterns, Decrease in cognitive function.</text>
  </g>
  <g id="section-3" transform="translate(10, 270)">
    <rect width="300" height="100" fill="#E0E9F4"/>
    <text x="20" y="40" class="title">Air Pollution</text>
    <text x="20" y="80" class="annotation">Pollution due to emissions from industrial activities, vehicles, and fossil fuels.</text>
    <animate-transform attribute="transform" type="translate" begin="0s" dur="2s" repeat="forever"/>
    <animate-transform attribute="transform" type="scale" begin="0.5s" dur="1s" repeat="forever"/>
    <line x1="20" y1="100" x2="300" y2="100" stroke="#666" stroke-width="2"/>
    <path d="M 20 100 L 300 100" stroke="#666" stroke-width="2"/>
    <text x="20" y="120" class="annotation">Sources: Industrial activities, Vehicles, Fossil fuels.</text>
    <text x="20" y="140" class="annotation">Impacts: Harm to human health, Decrease in air quality, Impact on environment.</text>
  </g>
  <g id="section-4" transform="translate(10, 330)">
    <rect width="300" height="100" fill="#E0E9F4"/>
    <text x="20" y="40" class="title">Preventive Measures</text>
    <text x="20" y="80" class="annotation">Implementing efficient wastewater treatment systems, Reducing industrial effluents, Promoting sustainable agricultural practices.</text>
    <animate-transform attribute="transform" type="translate" begin="0s" dur="2s" repeat="forever"/>
    <animate-transform attribute="transform" type="scale" begin="0.5s" dur="1s" repeat="forever"/>
    <line x1="20" y1="100" x2="300" y2="100" stroke="#666" stroke-width="2"/>
    <path d="M 20 100 L 300 100" stroke="#666" stroke-width="2"/>
    <text x="20" y="120" class="annotation">Public Health Aspects: Drinking water contamination, Spread of waterborne diseases.</text>
  </g>
  <g id="section-5" transform="translate(10, 390)">
    <rect width="300" height="100" fill="#E0E9F4"/>
    <text x="20" y="40" class="title">Public Health Aspects</text>
    <text x="20" y="80" class="annotation">Noise pollution affects hearing loss, Stress and anxiety, Decrease in quality of life.</text>
    <animate-transform attribute="transform" type="translate" begin="0s" dur="2s" repeat="forever"/>
    <animate-transform attribute="transform" type="scale" begin="0.5s" dur="1s" repeat="forever"/>
    <line x1="20" y1="100" x2="300" y2="100" stroke="#666" stroke-width="2"/>
    <path d="M 20 100 L 300 100" stroke="#666" stroke-width="2"/>
    <text x="20" y="120" class="annotation">Air pollution affects human health and environment.</text>
  </g>
  <g id="footer">
    <text x="10" y="400" class="annotation">Developed by [Your Name]</text>
  </g>
</svg>