<svg width="420" height="400" data-topic-id="water-resources-availability-quality-aspects">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  <!-- Title -->
  <text x="50%" y="20%" text-anchor="middle" font-size="24" font-family="Arial" fill="#3498db">
    <tspan data-narration="Introduction">Natural Resources: Water Resources – Availability & Quality Aspects</tspan>
  </text>
  <!-- Section 1: What is Water Resource -->
  <rect x="50%" y="100" width="320" height="50" fill="#fff" rx="10" />
  <text x="70%" y="130%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2ecc71" data-narration="What is Water Resource?">
    Definition: A water resource is a natural or artificial source of water that is available for human consumption, agriculture, industry, or other purposes.
  </text>
  <rect x="50%" y="150" width="320" height="50" fill="#fff" rx="10" />
  <text x="70%" y="180%" text-anchor="middle" font-size="18" font-family="Arial" fill="#2ecc71" data-narration="Types of water resources:">
    Surface water: Rivers, lakes, reservoirs, and wetlands.
    Groundwater: Aquifers and underground water.
    Transboundary water: Water shared by two or more countries.
  </text>
  <!-- Section 2: Availability of Water Resources -->
  <rect x="50%" y="280" width="320" height="50" fill="#fff" rx="10" />
  <text x="70%" y="310%" text-anchor="middle" font-size="18" font-family="Arial" fill="#e74c3c" data-narration="Global Water Availability:">
    The global water availability is approximately 1.386 billion km3, which is only about 2.5% of the Earth's total water resources.
  </text>
  <rect x="50%" y="330" width="320" height="50" fill="#fff" rx="10" />
  <text x="70%" y="360%" text-anchor="middle" font-size="18" font-family="Arial" fill="#e74c3c" data-narration="Factors Affecting Water Availability:">
    Climate change
    Population growth
    Urbanization
    Agriculture
    Industrial activities
  </text>
  <!-- Section 3: Water Quality Aspects -->
  <rect x="50%" y="400" width="320" height="50" fill="#fff" rx="10" />
  <text x="70%" y="430%" text-anchor="middle" font-size="18" font-family="Arial" fill="#1abc9c" data-narration="Definition: Water quality refers to the physical, chemical, biological, and radiological characteristics of water that make it suitable for human consumption, agriculture, industry, or other purposes.">
  </text>
  <rect x="50%" y="450" width="320" height="50" fill="#fff" rx="10" />
  <text x="70%" y="480%" text-anchor="middle" font-size="18" font-family="Arial" fill="#1abc9c" data-narration="Factors Affecting Water Quality:">
    Atmospheric deposition
    Industrial effluents
    Agricultural runoff
    Municipal wastewater
    Natural disasters (e.g., floods, landslides)
  </text>
  <!-- Section 4: Water Quality Parameters -->
  <rect x="50%" y="500" width="320" height="50" fill="#fff" rx="10" />
  <text x="70%" y="530%" text-anchor="middle" font-size="18" font-family="Arial" fill="#e74c3c" data-narration="Physical Parameters:">
    pH
    Temperature
    Turbidity
  </text>
  <!-- Animation -->
  <animate transform="rotate(0deg)" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate transform="rotate(360deg)" begin="2s" dur="2s" repeatCount="indefinite" />
  <animate transform="rotate(720deg)" begin="4s" dur="2s" repeatCount="indefinite" />
  <animate transform="rotate(1080deg)" begin="6s" dur="2s" repeatCount="indefinite" />
  <!-- Footer -->
  <text x="50%" y="390%" text-anchor="middle" font-size="18" font-family="Arial" fill="#3498db">
    2023 Education Resources
  </text>
</svg>