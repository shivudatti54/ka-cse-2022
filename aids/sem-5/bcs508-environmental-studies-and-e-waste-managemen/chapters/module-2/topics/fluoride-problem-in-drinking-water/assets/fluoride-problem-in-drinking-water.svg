<svg width="420" height="400" data-topic-id="fluoride-problem-in-drinking-water">
  <!-- Header Section -->
  <defs>
    <linearGradient id="linear-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#56B3FA" stop-opacity="1" />
      <stop offset="0%" stop-color="#5F73E6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#5F73E6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#56B3FA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#linear-gradient)" rx="10" />
  <text x="10" y="10" font-size="24" font-family="Arial" fill="#333" text-anchor="start" data-narration="Introduction">
    Fluoride Problem in Drinking Water
  </text>

  <!-- Section 1: Definition and Sources of Fluoride -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="300" height="150" fill="#FFF" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#333" text-anchor="start" data-narration="Definition and Sources of Fluoride">
      <tspan x="10" y="30">Fluoride is a naturally occurring element</tspan>
      <tspan x="10" y="50">that can be beneficial for human health when present in small amounts.</tspan>
    </text>
    <rect x="10" y="170" width="280" height="90" fill="#FFF" rx="10" />
    <text x="15" y="180" font-size="16" font-family="Arial" fill="#333" text-anchor="start" data-narration="Sources of Fluoride">
      <tspan x="15" y="190">The primary sources of fluoride in drinking water are:</tspan>
      <tspan x="15" y="210">Fluorapatite, a mineral found in rocks and soil, which can dissolve into water.</tspan>
      <tspan x="15" y="230">Industrial processes, such as the manufacture of cement, aluminum, and phosphate fertilizers.</tspan>
      <tspan x="15" y="250">Fluoridated water, which is treated with fluoride compounds during water treatment processes.</tspan>
    </text>
  </g>

  <!-- Section 2: Health Effects of Excessive Fluoride Consumption -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="300" height="150" fill="#FFF" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#333" text-anchor="start" data-narration="Health Effects of Excessive Fluoride Consumption">
      <tspan x="10" y="30">Excessive fluoride consumption can lead to:</tspan>
      <tspan x="10" y="50">Dental Fluorosis, Bone Fluorosis, Neurological Effects, and Other Health Effects.</tspan>
    </text>
    <rect x="10" y="170" width="280" height="90" fill="#FFF" rx="10" />
    <text x="15" y="180" font-size="16" font-family="Arial" fill="#333" text-anchor="start" data-narration="Dental Fluorosis">
      <tspan x="15" y="190">Excessive fluoride consumption during tooth development can lead to white or brown spots on teeth.</tspan>
    </text>
    <rect x="10" y="230" width="280" height="90" fill="#FFF" rx="10" />
    <text x="15" y="240" font-size="16" font-family="Arial" fill="#333" text-anchor="start" data-narration="Bone Fluorosis">
      <tspan x="15" y="250">High levels of fluoride can cause skeletal fluorosis, leading to joint pain, bone deformities, and calcification of tendons and ligaments.</tspan>
    </text>
  </g>

  <!-- Section 3: Causes of Fluoride Contamination in Drinking Water -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="300" height="150" fill="#FFF" rx="10" />
    <text x="10" y="20" font-size="16" font-family="Arial" fill="#333" text-anchor="start" data-narration="Causes of Fluoride Contamination in Drinking Water">
      <tspan x="10" y="30">Fluoride contamination in drinking water can occur due to:</tspan>
      <tspan x="10" y="50">Natural Fluoride, Industrial Effluents, and Water Treatment Processes.</tspan>
    </text>
    <rect x="10" y="170" width="280" height="90" fill="#FFF" rx="10" />
    <text x="15" y="180" font-size="16" font-family="Arial" fill="#333" text-anchor="start" data-narration="Natural Fluoride">
      <tspan x="15" y="190">Fluoride is naturally present in rocks and soil, which can dissolve into water.</tspan>
    </text>
    <rect x="10" y="230" width="280" height="90" fill="#FFF" rx="10" />
    <text x="15" y="240" font-size="16" font-family="Arial" fill="#333" text-anchor="start" data-narration="Industrial Effluents">
      <tspan x="15" y="250">Industrial processes, such as the manufacture of cement, aluminum, and phosphate fertilizers, can release fluoride compounds into water.</tspan>
    </text>
  </g>

  <!-- Footer Section -->
  <g transform="translate(50, 500)">
    <rect x="0" y="0" width="420" height="20" fill="#FFF" rx="10" />
    <text x="10" y="10" font-size="12" font-family="Arial" fill="#333" text-anchor="start">Educational Diagram</text>
    <text x="400" y="10" font-size="12" font-family="Arial" fill="#333" text-anchor="end" data-narration="Footer Section">
      Created using SVG and animation techniques.
    </text>
  </g>
  <animate duration="5s" fill="freeze" begin="0s" repeatCount="indefinite">
    <rect x="0" y="0" width="420" height="400" fill="url(#linear-gradient)" rx="10" />
  </animate>
</svg>