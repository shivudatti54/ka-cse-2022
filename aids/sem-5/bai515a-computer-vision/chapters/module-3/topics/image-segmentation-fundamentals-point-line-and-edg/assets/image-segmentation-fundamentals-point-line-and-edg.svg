<svg width="420" height="400" data-topic-id="image-segmentation-fundamentals-point-line-and-edge">
  <!-- Header -->
  <title>Image Segmentation Fundamentals: Point, Line, and Edge Detection</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F7F2C4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Definition and Importance -->
  <section data-narration="Definition and Importance of Image Segmentation">
    <rect x="20" y="20" width="380" height="100" fill="#2E4053" rx="10"/>
    <text x="50" y="40" font-size="24" font-family="Arial, sans-serif" fill="#fff">Image Segmentation</text>
    <text x="50" y="60" font-size="18" font-family="Arial, sans-serif" fill="#fff">Is the process of dividing an image into its constituent parts or regions.</text>
  </section>
  
  <!-- Section 2: Types of Image Segmentation -->
  <section data-narration="Types of Image Segmentation">
    <rect x="20" y="130" width="380" height="100" fill="#2E4053" rx="10"/>
    <text x="50" y="150" font-size="24" font-family="Arial, sans-serif" fill="#fff">Hard Segmentation</text>
    <text x="50" y="170" font-size="18" font-family="Arial, sans-serif" fill="#fff">Soft Segmentation</text>
  </section>
  
  <!-- Section 3: Point Detection -->
  <section data-narration="Point Detection">
    <rect x="20" y="220" width="380" height="100" fill="#2E4053" rx="10"/>
    <text x="50" y="240" font-size="24" font-family="Arial, sans-serif" fill="#fff">Point Detection</text>
    <text x="50" y="260" font-size="18" font-family="Arial, sans-serif" fill="#fff">Identifies individual points in an image.</text>
    <animate transform="translateX(10) rotate(30)" begin="0s" dur="2s" repeat="forever"/>
  </section>
  
  <!-- Section 4: Line Detection -->
  <section data-narration="Line Detection">
    <rect x="20" y="310" width="380" height="100" fill="#2E4053" rx="10"/>
    <text x="50" y="330" font-size="24" font-family="Arial, sans-serif" fill="#fff">Line Detection</text>
    <text x="50" y="350" font-size="18" font-family="Arial, sans-serif" fill="#fff">Identifies lines in an image.</text>
    <animate transform="translateX(20) rotate(60)" begin="2s" dur="2s" repeat="forever"/>
  </section>
  
  <!-- Section 5: Edge Detection -->
  <section data-narration="Edge Detection">
    <rect x="20" y="370" width="380" height="100" fill="#2E4053" rx="10"/>
    <text x="50" y="390" font-size="24" font-family="Arial, sans-serif" fill="#fff">Edge Detection</text>
    <text x="50" y="410" font-size="18" font-family="Arial, sans-serif" fill="#fff">Identifies edges in an image.</text>
    <animate transform="translateX(30) rotate(90)" begin="4s" dur="2s" repeat="forever"/>
  </section>
  
  <!-- Footer -->
  <text x="50" y="400" font-size="18" font-family="Arial, sans-serif" fill="#fff">Created by [Your Name]</text>
</svg>