<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="periodic-noise-reduction-by-frequency-domain-filtering">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  </defs>
  <title>Periodic Noise Reduction by Frequency Domain Filtering</title>
  <rect x="10" y="10" width="400" height="30" fill="#1A1D23" opacity="0.7"/>
  <g transform="translate(15, 40)">
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#C5CAE9">What is Noise?</text>
    <rect x="0" y="20" width="100%" height="10" fill="#1A1D23" opacity="0.7"/>
    <g transform="translate(0, 40)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#C5CAE9">Types of Noise in Images</text>
      <rect x="0" y="20" width="100%" height="10" fill="#1A1D23" opacity="0.7"/>
      <g transform="translate(0, 60)">
        <text x="0" y="0" font-size="18" font-family="Arial" fill="#C5CAE9">Periodic Noise</text>
        <rect x="0" y="20" width="100%" height="10" fill="#1A1D23" opacity="0.7"/>
        <g transform="translate(0, 80)">
          <text x="0" y="0" font-size="18" font-family="Arial" fill="#C5CAE9">Frequency Domain Filtering</text>
          <rect x="0" y="20" width="100%" height="10" fill="#1A1D23" opacity="0.7"/>
        </g>
      </g>
    </g>
    <g transform="translate(15, 120)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#C5CAE9">Noise is a random fluctuation in the signal that can occur due to various factors, such as thermal noise, shot noise, quantization noise, and systematic noise.</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 120" dur="2s" begin="0s"/>
      <line x1="0" y1="0" x2="50" y2="120" stroke="#C9E4CA" stroke-width="2" opacity="0.5"/>
      <line x1="50" y1="120" x2="0" y2="120" stroke="#C9E4CA" stroke-width="2" opacity="0.5"/>
    </g>
    <g transform="translate(15, 160)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#C5CAE9">Gaussian noise is a type of noise with a normal distribution, while salt and pepper noise is a type of noise characterized by random, isolated pixels. Impulse noise is a type of noise characterized by random, isolated pixels with a high amplitude.</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 180" dur="2s" begin="2s"/>
      <line x1="0" y1="0" x2="50" y2="180" stroke="#C9E4CA" stroke-width="2" opacity="0.5"/>
      <line x1="50" y1="180" x2="0" y2="180" stroke="#C9E4CA" stroke-width="2" opacity="0.5"/>
    </g>
    <g transform="translate(15, 200)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#C5CAE9">Periodic noise is a type of noise that has a regular, periodic pattern. This type of noise can be difficult to remove, as it can be mistaken for the original signal.</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 220" dur="2s" begin="4s"/>
      <line x1="0" y1="0" x2="50" y2="220" stroke="#C9E4CA" stroke-width="2" opacity="0.5"/>
      <line x1="50" y1="220" x2="0" y2="220" stroke="#C9E4CA" stroke-width="2" opacity="0.5"/>
    </g>
    <g transform="translate(15, 240)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#C5CAE9">Frequency domain filtering is a technique for reducing noise in images by filtering the frequency components of the image.</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 260" dur="2s" begin="6s"/>
      <line x1="0" y1="0" x2="50" y2="260" stroke="#C9E4CA" stroke-width="2" opacity="0.5"/>
      <line x1="50" y1="260" x2="0" y2="260" stroke="#C9E4CA" stroke-width="2" opacity="0.5"/>
    </g>
    <g transform="translate(15, 280)">
      <rect x="0" y="0" width="100%" height="20" fill="#1A1D23" opacity="0.7"/>
      <text x="0" y="10" font-size="18" font-family="Arial" fill="#C5CAE9">Conclusion</text>
      <rect x="0" y="30" width="100%" height="10" fill="#1A1D23" opacity="0.7"/>
    </g>
  </g>
  <footer>
    <text x="10" y="360" font-size="18" font-family="Arial" fill="#C5CAE9">Made with love by [Your Name]</text>
  </footer>
</svg>