<svg width="420" height="400" data-topic-id="chap-10-101-to-1032"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     style="background-image: linear-gradient(to bottom, #4F8EF7, #5C7EB5); background-size: 100% 600px;">
  <!-- Footer -->
  <text x="50%" y="480%" font-family="Arial" font-size="24" text-anchor="middle" fill="#06AED7"
        transform="rotate(90 210 480)">
    Chap 10: Image Restoration and Reconstruction
  </text>
  
  <!-- Title -->
  <text x="50%" y="30%" font-family="Arial" font-size="36" text-anchor="middle" fill="#6A1D9E">
    Chap 10: Image Restoration and Reconstruction
  </text>
  
  <!-- Section 1: Introduction to Image Degradation -->
  <rect x="50%" y="100" width="300" height="150" rx="10" fill="#C5E1F5"
        style="opacity: 0.8; transition: opacity 1s;">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.8 0.8"
                         begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="120%" font-family="Arial" font-size="18" text-anchor="middle" fill="#4F8EF7"
          data-narration="Image degradation refers to the loss of image quality due to various factors such as noise, blur, distortions, and other types of degradations."
          style="opacity: 1; transition: opacity 1s;">
      Definition
    </text>
    <text x="50%" y="140%" font-family="Arial" font-size="18" text-anchor="middle" fill="#4F8EF7"
          data-narration="The causes of image degradation include noise, blur, distortions, compression, and atmospheric effects."
          style="opacity: 1; transition: opacity 1s;">
      Causes
    </text>
  </rect>
  <animate duration="2000" begin="0s" />
  
  <!-- Section 2: Image Restoration Techniques -->
  <rect x="50%" y="250" width="300" height="150" rx="10" fill="#C5E1F5"
        style="opacity: 0.8; transition: opacity 1s;">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.8 0.8"
                         begin="2s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="120%" font-family="Arial" font-size="18" text-anchor="middle" fill="#4F8EF7"
          data-narration="Filtering techniques are used to remove noise and improve image quality."
          style="opacity: 1; transition: opacity 1s;">
      Filtering Techniques
    </text>
    <rect x="50%" y="150%" width="50%" height="50%" rx="5" fill="#FFC107"
          style="opacity: 0.8; transition: opacity 1s;">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50"
                           begin="2.5s" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="50%" y="170%" font-family="Arial" font-size="18" text-anchor="middle" fill="#FFC107"
          data-narration="Gaussian Filter is a type of filtering technique that uses weighted averages to improve image quality."
          style="opacity: 1; transition: opacity 1s;">
      Gaussian Filter
    </text>
  </rect>
  <animate duration="2000" begin="4s" />
  
  <!-- Section 3: Deblurring Techniques -->
  <rect x="50%" y="350" width="300" height="150" rx="10" fill="#C5E1F5"
        style="opacity: 0.8; transition: opacity 1s;">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.8 0.8"
                         begin="4.5s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="120%" font-family="Arial" font-size="18" text-anchor="middle" fill="#4F8EF7"
          data-narration="Deblurring techniques are used to restore images that are blurred due to motion or other factors."
          style="opacity: 1; transition: opacity 1s;">
      Deblurring Techniques
    </text>
    <rect x="50%" y="150%" width="50%" height="50%" rx="5" fill="#FFC107"
          style="opacity: 0.8; transition: opacity 1s;">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50"
                           begin="5.5s" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="50%" y="170%" font-family="Arial" font-size="18" text-anchor="middle" fill="#FFC107"
          data-narration="Non-Linear Deblurring is a technique that uses non-linear methods to remove blur."
          style="opacity: 1; transition: opacity 1s;">
      Non-Linear Deblurring
    </text>
  </rect>
  <animate duration="2000" begin="6.5s" />
  
  <!-- Section 4: Super-Resolution Techniques -->
  <rect x="50%" y="450" width="300" height="150" rx="10" fill="#C5E1F5"
        style="opacity: 0.8; transition: opacity 1s;">
    <animateTransform attributeName="transform" type="scale" from="1 1" to="0.8 0.8"
                         begin="7.5s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="120%" font-family="Arial" font-size="18" text-anchor="middle" fill="#4F8EF7"
          data-narration="Super-resolution techniques are used to improve the resolution of images."
          style="opacity: 1; transition: opacity 1s;">
      Super-Resolution Techniques
    </text>
    <rect x="50%" y="150%" width="50%" height="50%" rx="5" fill="#FFC107"
          style="opacity: 0.8; transition: opacity 1s;">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50"
                           begin="8.5s" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="50%" y="170%" font-family="Arial" font-size="18" text-anchor="middle" fill="#FFC107"
          data-narration="Spatial Domain Methods use interpolation and upsampling to increase resolution."
          style="opacity: 1; transition: opacity 1s;">
      Spatial Domain Methods
    </text>
  </rect>
  <animate duration="2000" begin="9.5s" />
</svg>