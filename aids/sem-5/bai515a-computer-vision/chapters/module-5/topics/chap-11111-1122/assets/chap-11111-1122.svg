        <rect x="10" y="10" width="100" height="100" fill="#E0C5C5" rx="50" />
        <rect x="10" y="10" width="100" height="100" fill="#E0C5C5" rx="50" />
        <rect x="50" y="50" width="100" height="100" fill="#C7B8EA" rx="50" />
        <rect x="50" y="50" width="100" height="100" fill="#C7B8EA" rx="50" />
      </g>
    </section>
    <section class="section" data-narration="Erosion is a structural operation that removes pixels from an image based on a structuring element.">
      <g transform="translate(200 360)">
        <rect x="10" y="10" width="100" height="100" fill="#4F5CE0" rx="50" />
        <rect x="10" y="10" width="100" height="100" fill="#4F5CE0" rx="50" />
        <rect x="50" y="50" width="100" height="100" fill="#3B5998" rx="50" />
        <rect x="50" y="50" width="100" height="100" fill="#3B5998" rx="50" />
      </g>
    </section>
    <section class="section" data-narration="Dilation is a structural operation that adds pixels to an image based on a structuring element.">
