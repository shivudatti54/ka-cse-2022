<svg width="420" height="400" data-topic-id="feature-extraction-background">
  <title>Feature Extraction Background</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#CCCCFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="350" fill="url(#gradient)"/>
  <text x="15" y="20" font-size="24" font-family="Arial" text-anchor="start">Feature Extraction Background</text>
  <g transform="translate(15, 50)">
    <text data-narration="Introduction" x="0" y="0" font-size="18" font-family="Arial" text-anchor="start">Introduction</text>
    <rect x="-20" y="-20" width="40" height="40" fill="#66CCCC" rx="10"/>
    <animate transform="rotate(360 20 20)" dur="10s" begin="indef" repeatCount="indef"/>
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle">Feature extraction is a crucial step in computer vision and image processing.</text>
  </g>
  <g transform="translate(15, 120)">
    <text data-narration="What is Feature Extraction?" x="0" y="0" font-size="18" font-family="Arial" text-anchor="start">What is Feature Extraction?</text>
    <rect x="-20" y="-20" width="40" height="40" fill="#CCCCFF" rx="10"/>
    <animate transform="rotate(360 20 20)" dur="10s" begin="indef + 2s" repeatCount="indef"/>
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle">Feature extraction is the process of selecting and representing the most relevant information from an image.</text>
  </g>
  <g transform="translate(15, 260)">
    <text data-narration="Types of Features" x="0" y="0" font-size="18" font-family="Arial" text-anchor="start">Types of Features</text>
    <rect x="-20" y="-20" width="40" height="40" fill="#66CCCC" rx="10"/>
    <animate transform="rotate(360 20 20)" dur="10s" begin="indef + 4s" repeatCount="indef"/>
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle">Geometric features describe the shape and size of objects.</text>
    <line x1="20" y1="20" x2="60" y2="60" stroke="#66CCCC" stroke-width="2"/>
    <text x="40" y="40" font-size="18" font-family="Arial" text-anchor="middle">Textural features describe the surface properties of objects.</text>
    <line x1="40" y1="40" x2="80" y2="80" stroke="#CCCCFF" stroke-width="2"/>
    <text x="60" y="60" font-size="18" font-family="Arial" text-anchor="middle">Color features describe the color properties of objects.</text>
    <line x1="60" y1="60" x2="100" y2="100" stroke="#66CCCC" stroke-width="2"/>
    <text x="80" y="80" font-size="18" font-family="Arial" text-anchor="middle">Intensity features describe the brightness and darkness of objects.</text>
  </g>
  <g transform="translate(15, 370)">
    <text data-narration="Importance of Feature Extraction" x="0" y="0" font-size="18" font-family="Arial" text-anchor="start">Importance of Feature Extraction</text>
    <rect x="-20" y="-20" width="40" height="40" fill="#CCCCFF" rx="10"/>
    <animate transform="rotate(360 20 20)" dur="10s" begin="indef + 6s" repeatCount="indef"/>
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle">Feature extraction enables the creation of meaningful representations of images.</text>
    <line x1="20" y1="20" x2="60" y2="60" stroke="#66CCCC" stroke-width="2"/>
    <text x="40" y="40" font-size="18" font-family="Arial" text-anchor="middle">These representations can be used for various applications, including object recognition and scene understanding.</text>
    <line x1="40" y1="40" x2="80" y2="80" stroke="#66CCCC" stroke-width="2"/>
  </g>
  <g transform="translate(15, 400)">
    <text data-narration="Conclusion" x="0" y="0" font-size="18" font-family="Arial" text-anchor="start">Conclusion</text>
    <rect x="-20" y="-20" width="40" height="40" fill="#66CCCC" rx="10"/>
    <animate transform="rotate(360 20 20)" dur="10s" begin="indef + 8s" repeatCount="indef"/>
    <text x="20" y="20" font-size="18" font-family="Arial" text-anchor="middle">Feature extraction is a crucial step in computer vision and image processing.</text>
  </g>
  <footer>
    <text x="15" y="390" font-size="18" font-family="Arial" text-anchor="start">Educational Diagram by [Your Name]</text>
  </footer>
</svg>