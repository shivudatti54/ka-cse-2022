<svg width="420" height="400" data-topic-id="image-pattern-classification-background">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <title>Image Pattern Classification Background</title>
  <g transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Pattern Classification</text>
  </g>
  <g transform="translate(10, 50)">
    <section data-narration="Introduction to Pattern Classification">
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">Pattern classification is a fundamental concept in computer vision and machine learning.</text>
      <text x="0" y="30" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">It is the process of assigning a physical object or an event to one of several pre-defined categories or classes.</text>
    </section>
  </g>
  <g transform="translate(10, 100)">
    <section data-narration="Key Terminology">
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">Pattern: An n-dimensional vector of feature measurements.</text>
      <text x="0" y="30" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">Class: A category or label.</text>
      <text x="0" y="60" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">Feature: A measurable property of the phenomenon being observed.</text>
    </section>
  </g>
  <g transform="translate(10, 160)">
    <section data-narration="The Pattern Classification Pipeline">
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">The process typically involves the following stages:</text>
      <text x="0" y="30" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">Raw Input --> Pre-processing & Segmentation --> Feature Extraction --> Classification</text>
    </section>
  </g>
  <g transform="translate(10, 220)">
    <section data-narration="Classifier and Training">
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">The goal is to design a classifier that can automatically assign patterns to their correct classes based on their features.</text>
      <text x="0" y="30" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">Training: The process of teaching a classifier using labeled data.</text>
    </section>
  </g>
  <g transform="translate(10, 280)">
    <section data-narration="Testing and Evaluation">
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">Testing: The process of evaluating the classifier's performance on unseen data.</text>
      <text x="0" y="30" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">Accuracy, precision, and recall are common evaluation metrics.</text>
    </section>
  </g>
  <g transform="translate(10, 340)">
    <g>
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Pattern Classification in Action</text>
    </g>
    <g>
      <text x="0" y="30" font-size="18" font-family="Arial, sans-serif" fill="#666" text-anchor="middle">A classifier can be trained on a dataset and then used to classify new, unseen patterns.</text>
    </g>
  </g>
</svg>