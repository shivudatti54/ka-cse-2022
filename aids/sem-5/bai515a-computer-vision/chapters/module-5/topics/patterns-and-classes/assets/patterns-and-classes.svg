<svg width="420" height="400" data-topic-id="patterns-and-classes" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#33CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0CC0CC" stop-opacity="1"/>
    </linearGradient>
    <style>
      .rect {
        fill: url(#gradient);
        stroke: #FFFFFF;
        stroke-width: 2;
        transition: fill 0.5s;
      }
      .rect:hover {
        fill: #66CCCC;
      }
    </style>
  </defs>
  <g>
    <rect x="10" y="10" width="400" height="380" class="rect" data-narration="Introduction to Patterns and Classes" />
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 100" dur="2s" begin="0s" repeatCount="indefinite"/>
    <text x="20" y="50" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Patterns and Classes</text>
    <rect x="10" y="80" width="400" height="180" class="rect" data-narration="What are Patterns?">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="20 220" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="210" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Patterns are repeated arrangements of pixels or pixels with similar properties.</text>
    <rect x="10" y="250" width="400" height="150" class="rect" data-narration="Types of Patterns">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="20 350" dur="2s" begin="0s" repeatCount="indefinite"/>
      <rect x="30" y="270" width="50" height="50" fill="#FF9900" rx="10" class="rect arrow" data-narration="Linear patterns"/>
      <rect x="100" y="270" width="50" height="50" fill="#33CCCC" rx="10" class="rect arrow" data-narration="Non-linear patterns"/>
      <rect x="170" y="270" width="50" height="50" fill="#66CCCC" rx="10" class="rect arrow" data-narration="Repeating patterns"/>
    </rect>
    <text x="20" y="410" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Classes are sets of pixels or pixels with similar properties.</text>
    <rect x="10" y="450" width="400" height="150" class="rect" data-narration="What are Classes?">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="20 570" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="600" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Classes are used to group pixels together based on their characteristics.</text>
    <rect x="10" y="640" width="400" height="150" class="rect" data-narration="Types of Classes">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="20 770" dur="2s" begin="0s" repeatCount="indefinite"/>
      <rect x="30" y="690" width="50" height="50" fill="#FF9900" rx="10" class="rect arrow" data-narration="Pixel classes"/>
      <rect x="100" y="690" width="50" height="50" fill="#33CCCC" rx="10" class="rect arrow" data-narration="Region classes"/>
    </rect>
    <text x="20" y="810" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Membership refers to the degree to which a pixel belongs to a particular class.</text>
    <rect x="10" y="850" width="400" height="150" class="rect" data-narration="Key Concepts">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="20 930" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="980" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Applications of Patterns and Classes include edge detection and shape detection.</text>
    <rect x="10" y="1010" width="400" height="150" class="rect" data-narration="Applications of Patterns and Classes">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="20 1110" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="1150" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Patterns and classes have numerous applications in morphological image processing.</text>
    <rect x="10" y="1180" width="400" height="50" class="rect" data-narration="Conclusion">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="20 1200" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="1200" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">We hope this tutorial has helped you understand patterns and classes in morphological image processing.</text>
    <rect x="10" y="1220" width="400" height="50" class="rect" data-narration="Footer">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="20 1250" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="1250" font-size="14" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Copyright 2023</text>
  </g>
</svg>