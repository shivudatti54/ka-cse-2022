<svg width="420" height="400" data-topic-id="chap-12-121-1231">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89c9ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#e6f2ff" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title -->
  <text x="50%" y="20" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1d23">
    Morphological Image Processing: Preliminaries, Erosion and Dilation, Opening and Closing
  </text>
  
  <!-- Section 1: Introduction to Morphological Image Processing -->
  <section data-narration="Introduction to Morphological Image Processing">
    <rect x="10" y="50" width="400" height="50" fill="#2ecc71" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="1200" begin="0s" />
    <text x="50%" y="70" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1d23">
      Morphology
    </text>
    <text x="50%" y="90" font-size="14" font-weight="normal" text-anchor="middle" fill="#1a1d23">
      The study of shapes and their properties.
    </text>
  </section>
  
  <!-- Section 2: Erosion -->
  <section data-narration="Erosion">
    <rect x="10" y="150" width="400" height="50" fill="#2ecc71" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="1200" begin="0s" />
    <text x="50%" y="170" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1d23">
    Erosion
  </text>
    <text x="50%" y="190" font-size="14" font-weight="normal" text-anchor="middle" fill="#1a1d23">
      Removes small objects from an image, resulting in a smaller image.
    </text>
    <rect x="50" y="210" width="50" height="20" fill="#3498db" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="50 210" to="50 220" dur="200" begin="0s" />
    <text x="70" y="220" font-size="12" font-weight="normal" text-anchor="middle" fill="#1a1d23">
      Formula: B = E(A, B) = min(A, B)
    </text>
  </section>
  
  <!-- Section 3: Dilation -->
  <section data-narration="Dilation">
    <rect x="10" y="300" width="400" height="50" fill="#2ecc71" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 300" to="360 200 300" dur="1200" begin="0s" />
    <text x="50%" y="320" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1d23">
    Dilation
  </text>
    <text x="50%" y="340" font-size="14" font-weight="normal" text-anchor="middle" fill="#1a1d23">
      Adds small objects to an image, resulting in a larger image.
    </text>
    <rect x="50" y="360" width="50" height="20" fill="#3498db" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="50 360" to="50 370" dur="200" begin="0s" />
    <text x="70" y="370" font-size="12" font-weight="normal" text-anchor="middle" fill="#1a1d23">
      Formula: B = D(A, B) = max(A, B)
    </text>
  </section>
  
  <!-- Section 4: Opening -->
  <section data-narration="Opening">
    <rect x="10" y="450" width="400" height="50" fill="#2ecc71" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 200 450" to="360 200 450" dur="1200" begin="0s" />
    <text x="50%" y="470" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1d23">
    Opening
  </text>
    <text x="50%" y="490" font-size="14" font-weight="normal" text-anchor="middle" fill="#1a1d23">
      Removes small objects from an image and also removes the boundary of the objects.
    </text>
    <rect x="50" y="510" width="50" height="20" fill="#3498db" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="50 510" to="50 520" dur="200" begin="0s" />
    <text x="70" y="520" font-size="12" font-weight="normal" text-anchor="middle" fill="#1a1d23">
      Formula: B = O(A, B) = E(D(A, B))
    </text>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="14" font-weight="normal" text-anchor="middle" fill="#1a1d23">
    &copy; 2023
  </text>
</svg>