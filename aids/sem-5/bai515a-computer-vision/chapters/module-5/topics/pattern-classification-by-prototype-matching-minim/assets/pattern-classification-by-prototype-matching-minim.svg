<svg width="420" height="400" data-topic-id="Pattern Classification by Prototype Matching (Minimum Distance Classifier Only)">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A2C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" x="0" y="0" width="420" height="400"/>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="20" width="400" height="50" fill="#F7F7F7"/>
    <text x="20" y="40" font-size="20" font-family="Arial, sans-serif" fill="#343A40">Pattern Classification</text>
    <text x="20" y="60" font-size="16" font-family="Arial, sans-serif" fill="#343A40">by Prototype Matching (Minimum Distance Classifier Only)</text>
  </section>
  
  <!-- Section 2: Prototype Matching -->
  <section data-narration="Prototype Matching">
    <rect x="10" y="90" width="400" height="50" fill="#F7F7F7"/>
    <text x="20" y="110" font-size="20" font-family="Arial, sans-serif" fill="#343A40">Prototype Matching</text>
    <text x="20" y="130" font-size="16" font-family="Arial, sans-serif" fill="#343A40">A pattern classification technique that involves comparing an input image to a set of predefined prototypes.</text>
  </section>
  
  <!-- Section 3: Minimum Distance Classifier -->
  <section data-narration="Minimum Distance Classifier">
    <rect x="10" y="130" width="400" height="50" fill="#F7F7F7"/>
    <text x="20" y="150" font-size="20" font-family="Arial, sans-serif" fill="#343A40">Minimum Distance Classifier</text>
    <text x="20" y="170" font-size="16" font-family="Arial, sans-serif" fill="#343A40">A type of prototype matching algorithm that uses the minimum distance between the input image and each prototype to classify the image.</text>
  </section>
  
  <!-- Section 4: Distance Calculation -->
  <section data-narration="Distance Calculation">
    <rect x="10" y="190" width="400" height="50" fill="#F7F7F7"/>
    <text x="20" y="210" font-size="20" font-family="Arial, sans-serif" fill="#343A40">Distance Calculation</text>
    <text x="20" y="230" font-size="16" font-family="Arial, sans-serif" fill="#343A40">Calculate the distance between the input image and each prototype using a distance metric (e.g., Euclidean distance, Mahalanobis distance).</text>
  </section>
  
  <!-- Section 5: Minimum Distance -->
  <section data-narration="Minimum Distance">
    <rect x="10" y="250" width="400" height="50" fill="#F7F7F7"/>
    <text x="20" y="270" font-size="20" font-family="Arial, sans-serif" fill="#343A40">Minimum Distance</text>
    <text x="20" y="290" font-size="16" font-family="Arial, sans-serif" fill="#343A40">Find the prototype with the minimum distance to the input image.</text>
  </section>
  
  <!-- Section 6: Classification -->
  <section data-narration="Classification">
    <rect x="10" y="310" width="400" height="50" fill="#F7F7F7"/>
    <text x="20" y="330" font-size="20" font-family="Arial, sans-serif" fill="#343A40">Classification</text>
    <text x="20" y="350" font-size="16" font-family="Arial, sans-serif" fill="#343A40">Classify the input image as the class of the prototype with the minimum distance.</text>
  </section>
  
  <!-- Section 7: Key Concepts -->
  <section data-narration="Key Concepts">
    <rect x="10" y="390" width="400" height="50" fill="#F7F7F7"/>
    <text x="20" y="410" font-size="20" font-family="Arial, sans-serif" fill="#343A40">Key Concepts</text>
    <text x="20" y="430" font-size="16" font-family="Arial, sans-serif" fill="#343A40">Prototype: A representative image of a class. Distance Metric: A function that calculates the distance between two images.</text>
  </section>
  
  <!-- Title and Footer -->
  <text x="175" y="20" font-size="30" font-family="Arial, sans-serif" fill="#343A40">Pattern Classification by Prototype Matching (Minimum Distance Classifier Only)</text>
  <text x="150" y="380" font-size="20" font-family="Arial, sans-serif" fill="#343A40">Data Topic ID: Pattern Classification by Prototype Matching (Minimum Distance Classifier Only)</text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="5s" begin="0s"/>
</svg>