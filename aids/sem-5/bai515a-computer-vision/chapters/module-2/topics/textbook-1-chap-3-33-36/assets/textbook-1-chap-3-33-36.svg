<svg width="420" height="400" data-topic-id="textbook-1-chap-3-33-36" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Textbook 1 Chap 3 33 36</title>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
    <solid fill="#FFFFFF"/>
    <pattern id="pattern" x="0%" y="0%" width="5%" height="5%" patternUnits="userSpaceOnUse" patternContentUrl="url(#grad)"/>
  </defs>
  <rect fill="url(#pattern)" width="100%" height="100%" rx="10" transform="rotate(45 210 200)"/>
  <g id="section-3-3">
    <rect x="10" y="10" width="400" height="50" fill="#FFFFFF" rx="10" transform="rotate(45 210 200)" opacity="0.5"/>
    <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#000000">Neighborhood Operators</text>
    <animateTransform attributeName="transform" type="rotate" from="45 210 200" to="0 210 200" dur="2s" begin="-1s" repeatCount="indefinite"/>
    <g id="neigh-bord-ops">
      <rect x="20" y="40" width="40" height="30" rx="10" fill="#FFFFFF" transform="rotate(45 260 250)" opacity="0.8"/>
      <animateTransform attributeName="transform" type="rotate" from="45 260 250" to="0 260 250" dur="1s" begin="0s" repeatCount="indefinite"/>
      <text x="100" y="60" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Weighted Sum</text>
    </g>
    <g id="grad-laplacian">
      <rect x="20" y="80" width="40" height="30" rx="10" fill="#FFFFFF" transform="rotate(45 260 250)" opacity="0.8"/>
      <animateTransform attributeName="transform" type="rotate" from="45 260 250" to="0 260 250" dur="1s" begin="0s" repeatCount="indefinite"/>
      <text x="100" y="100" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Laplacian Operator</text>
      <animateTransform attributeName="transform" type="rotate" from="45 260 250" to="0 260 250" dur="1s" begin="1s" repeatCount="indefinite"/>
    </g>
    <g id="grad-prewitt">
      <rect x="20" y="80" width="40" height="30" rx="10" fill="#FFFFFF" transform="rotate(45 260 250)" opacity="0.8"/>
      <animateTransform attributeName="transform" type="rotate" from="45 260 250" to="0 260 250" dur="1s" begin="2s" repeatCount="indefinite"/>
      <text x="100" y="100" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">Prewitt Operator</text>
    </g>
  </g>
  <g id="section-3-4">
    <rect x="10" y="170" width="400" height="50" fill="#FFFFFF" rx="10" transform="rotate(45 210 200)" opacity="0.5"/>
    <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#000000">Fourier Transforms</text>
    <animateTransform attributeName="transform" type="rotate" from="45 210 200" to="0 210 200" dur="2s" begin="-1s" repeatCount="indefinite"/>
    <g id="four-tran-forms">
      <rect x="20" y="40" width="40" height="30" rx="10" fill="#FFFFFF" transform="rotate(45 260 250)" opacity="0.8"/>
      <animateTransform attributeName="transform" type="rotate" from="45 260 250" to="0 260 250" dur="1s" begin="0s" repeatCount="indefinite"/>
      <text x="100" y="60" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">2D Fourier Transform</text>
      <rect x="20" y="80" width="40" height="30" rx="10" fill="#FFFFFF" transform="rotate(45 260 250)" opacity="0.8"/>
      <animateTransform attributeName="transform" type="rotate" from="45 260 250" to="0 260 250" dur="1s" begin="0s" repeatCount="indefinite"/>
      <text x="100" y="100" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">2D Fourier Transform</text>
      <rect x="20" y="80" width="40" height="30" rx="10" fill="#FFFFFF" transform="rotate(45 260 250)" opacity="0.8"/>
      <animateTransform attributeName="transform" type="rotate" from="45 260 250" to="0 260 250" dur="1s" begin="1s" repeatCount="indefinite"/>
      <text x="100" y="100" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">1D Fourier Transform</text>
    </g>
  </g>
  <g id="footer">
    <rect x="10" y="370" width="400" height="30" fill="#FFFFFF" rx="10" transform="rotate(45 210 200)" opacity="0.5"/>
    <text x="20" y="380" font-size="18" font-family="Arial" text-anchor="middle" fill="#000000">2023</text>
