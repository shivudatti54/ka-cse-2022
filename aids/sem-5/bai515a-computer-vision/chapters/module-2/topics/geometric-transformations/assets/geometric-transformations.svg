<svg width="420" height="400" data-topic-id="GeometricTransformations" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
    <defs>
        <linearGradient id="top-to-bottom" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ADD8E6"/>
            <stop offset="100%" stop-color="#C7D2FF"/>
        </linearGradient>
        <linearGradient id="bottom-to-top" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#C7D2FF"/>
            <stop offset="100%" stop-color="#ADD8E6"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#top-to-bottom)"/>
    <g transform="translate(10,10)">
        <g data-narration="Coordinate Systems" transform-origin="center">
            <ellipse cx="20" cy="20" rx="10" ry="10" fill="#8BC34A" stroke="#000" stroke-width="2"/>
            <text x="20" y="40" font-size="18" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">Spatial Domain (x,y)</text>
            <ellipse cx="230" cy="20" rx="10" ry="10" fill="#8BC34A" stroke="#000" stroke-width="2"/>
            <text x="230" y="40" font-size="18" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">Transformed Domain (u,v)</text>
        </g>
        <g data-narration="Forward vs. Inverse Mapping">
            <rect x="0" y="80" width="420" height="100" fill="#FF9800" stroke="#000" stroke-width="2"/>
            <text x="20" y="100" font-size="18" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Forward Mapping</text>
            <rect x="0" y="220" width="420" height="100" fill="#FF9800" stroke="#000" stroke-width="2"/>
            <text x="20" y="240" font-size="18" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Inverse Mapping</text>
        </g>
        <g data-narration="Types of Geometric Transformations">
            <rect x="0" y="320" width="420" height="100" fill="#FF69B4" stroke="#000" stroke-width="2"/>
            <text x="20" y="340" font-size="18" font-family="Arial, sans-serif" fill="#000" text-anchor="start">Linear Transformations</text>
        </g>
    </g>
    <g transform="translate(200,300)">
        <ellipse cx="0" cy="0" rx="10" ry="10" fill="#FF9800" stroke="#000" stroke-width="2"/>
        <rect x="0" y="20" width="10" height="50" fill="#FF9800" stroke="#000" stroke-width="2"/>
        <text x="0" y="70" font-size="18" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">Affine Transformation</text>
        <rect x="0" y="130" width="10" height="50" fill="#FF9800" stroke="#000" stroke-width="2"/>
        <text x="0" y="190" font-size="18" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">Perspective Correction</text>
        <rect x="0" y="250" width="10" height="50" fill="#FF9800" stroke="#000" stroke-width="2"/>
        <text x="0" y="310" font-size="18" font-family="Arial, sans-serif" fill="#000" text-anchor="middle">Image Stitching</text>
    </g>
    <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#top-to-bottom" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animate xmlns="http://www.w3.org/1999/xlink" xlink:href="#bottom-to-top" begin="2s" dur="2s" repeatCount="indefinite"/>
</svg>