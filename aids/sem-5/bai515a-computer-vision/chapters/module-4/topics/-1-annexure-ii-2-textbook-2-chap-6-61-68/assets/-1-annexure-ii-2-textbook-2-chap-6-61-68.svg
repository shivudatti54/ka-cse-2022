<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="1-Annexure-II-2-Textbook-2-Chap-6-61-68">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)" rx="10" />
  
  <!-- Title at top -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial" fill="#333">
    Color Image Processing: Color Fundamentals
  </text>
  
  <!-- Section 1: Introduction to Color Image Processing -->
  <section data-narration="Introduction to Color Image Processing">
    <rect x="10" y="50" width="400" height="50" fill="#F7F7F7" rx="10" />
    <text x="20" y="70" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      Color image processing is a crucial aspect of computer vision that deals with the analysis and manipulation of color information in images.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 2: Color Models -->
  <section data-narration="Color Models">
    <rect x="10" y="150" width="400" height="120" fill="#F7F7F7" rx="10" />
    <rect x="10" y="150" width="100" height="40" fill="#FFC107" rx="5" />
    <text x="130" y="170" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      RGB (Red, Green, Blue) Model:
    </text>
    <text x="130" y="190" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      CMYK (Cyan, Magenta, Yellow, Black) Model:
    </text>
    <text x="130" y="210" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      HSV (Hue, Saturation, Value) Model:
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 220 200" to="360 220 200" dur="10s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 3: Color Spaces -->
  <section data-narration="Color Spaces">
    <rect x="10" y="300" width="400" height="120" fill="#F7F7F7" rx="10" />
    <rect x="10" y="300" width="100" height="40" fill="#8BC34A" rx="5" />
    <text x="130" y="320" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      sRGB (Standard RGB):
    </text>
    <text x="130" y="340" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      Adobe RGB:
    </text>
    <text x="130" y="360" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      DCI-P3:
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 200" to="360 300 200" dur="10s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 4: Pseudocolor Image Processing -->
  <section data-narration="Pseudocolor Image Processing">
    <rect x="10" y="450" width="400" height="120" fill="#F7F7F7" rx="10" />
    <text x="20" y="470" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      Pseudocolor image processing is a technique used to convert grayscale images into colored images.
    </text>
    <rect x="10" y="500" width="100" height="40" fill="#FF9800" rx="5" />
    <animateTransform attributeName="transform" type="rotate" from="0 220 200" to="360 220 200" dur="10s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 5: Intensity and Grayscale -->
  <section data-narration="Intensity and Grayscale">
    <rect x="10" y="550" width="400" height="120" fill="#F7F7F7" rx="10" />
    <rect x="10" y="550" width="100" height="40" fill="#4CAF50" rx="5" />
    <text x="130" y="570" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      Intensity:
    </text>
    <text x="130" y="590" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      Grayscale:
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 200" to="360 300 200" dur="10s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="10" y="650" width="400" height="120" fill="#F7F7F7" rx="10" />
    <text x="20" y="670" text-anchor="start" font-size="16" font-family="Arial" fill="#333">
      Color image processing is a crucial aspect of computer vision that deals with the analysis and manipulation of color information in images.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 400 200" to="360 400 200" dur="10s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Footer at bottom -->
  <rect x="0" y="730" width="420" height="30" fill="#F7F7F7" rx="10" />
  <text x="50%" y="750" text-anchor="middle" font-size="16" font-family="Arial" fill="#333">
    Created by [Your Name]
  </text>
</svg>