<svg width="420" height="400" data-topic-id="color-image-processing-color-transformations-color-image" xmlns="http://www.w3.org/2000/svg">
  <!-- Title Section -->
  <g transform="translate(10, 10)">
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Color Image Processing: Color Transformations</text>
  </g>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2ff"/>
      <stop offset="50%" stop-color="#a2d8f5"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
  </defs>
  <rect x="10" y="40" width="400" height="300" fill="url(#pastel-gradient)"/>

  <!-- Section 1: Color Models -->
  <g transform="translate(10, 40)">
    <rect x="0" y="0" width="80" height="40" fill="#f0f0f0"/>
    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Color Models</text>
    <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="y" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="This is the RGB (Red, Green, Blue) Model, which is used in digital displays and is based on adding different intensities of red, green, and blue light." style="opacity: 0;"/>
    <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="The CMYK (Cyan, Magenta, Yellow, Black) Model is used in printing and is based on combining different amounts of cyan, magenta, yellow, and black inks." style="opacity: 0;"/>
    <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="The HSV (Hue, Saturation, Value) Model separates colors into hue, saturation, and value components." style="opacity: 0;"/>
    <arrow marker-end="line" marker-width="2" marker-head-size="5" x1="50" y1="10" x2="50" y2="40" fill="#000" stroke="#000"/>
  </g>

  <!-- Section 2: Color Spaces -->
  <g transform="translate(10, 90)">
    <rect x="0" y="0" width="80" height="40" fill="#f0f0f0"/>
    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Color Spaces</text>
    <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="y" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="The sRGB (Standard RGB) color space is the most widely used for digital displays." style="opacity: 0;"/>
    <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="The Adobe RGB color space is used for professional graphic design and is wider than sRGB." style="opacity: 0;"/>
    <text x="10" y="40" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="The DCI-P3 color space is used for cinematic applications and is wider than Adobe RGB." style="opacity: 0;"/>
    <arrow marker-end="line" marker-width="2" marker-head-size="5" x1="50" y1="10" x2="50" y2="40" fill="#000" stroke="#000"/>
  </g>

  <!-- Section 3: Grayscale Conversion -->
  <g transform="translate(10, 180)">
    <rect x="0" y="0" width="80" height="40" fill="#f0f0f0"/>
    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Grayscale Conversion</text>
    <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="y" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="Grayscale conversion involves converting a color image to grayscale by reducing the color information to a single channel." style="opacity: 0;"/>
    <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="This is done by calculating the weighted average of the RGB values, where the weights are typically 0.2126 for red, 0.7152 for green, and 0.0722 for blue." style="opacity: 0;"/>
    <arrow marker-end="line" marker-width="2" marker-head-size="5" x1="50" y1="10" x2="50" y2="40" fill="#000" stroke="#000"/>
  </g>

  <!-- Section 4: Hue Saturation Value (HSV) Conversion -->
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="80" height="40" fill="#f0f0f0"/>
    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Hue Saturation Value (HSV) Conversion</text>
    <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="y" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="HSV conversion involves converting a color image to HSV space and adjusting the hue, saturation, and value components." style="opacity: 0;"/>
    <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="The hue component represents the color's hue, the saturation component represents the color's purity, and the value component represents the color's brightness." style="opacity: 0;"/>
    <arrow marker-end="line" marker-width="2" marker-head-size="5" x1="50" y1="10" x2="50" y2="40" fill="#000" stroke="#000"/>
  </g>

  <!-- Section 5: Color Image Smoothing and Sharpening -->
  <g transform="translate(10, 320)">
    <rect x="0" y="0" width="80" height="40" fill="#f0f0f0"/>
    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Color Image Smoothing and Sharpening</text>
    <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="y" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="Color image smoothing involves reducing noise in a color image." style="opacity: 0;"/>
    <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="Color image sharpening involves enhancing the details in a color image." style="opacity: 0;"/>
    <arrow marker-end="line" marker-width="2" marker-head-size="5" x1="50" y1="10" x2="50" y2="40" fill="#000" stroke="#000"/>
  </g>

  <!-- Section 6: Median Filtering -->
  <g transform="translate(10, 390)">
    <rect x="0" y="0" width="80" height="40" fill="#f0f0f0"/>
    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Median Filtering</text>
    <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="y" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="Median filtering involves replacing each pixel value with the median value of neighboring pixels." style="opacity: 0;"/>
    <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="This is a simple form of image smoothing that can reduce noise in an image, but may also blur important details." style="opacity: 0;"/>
    <arrow marker-end="line" marker-width="2" marker-head-size="5" x1="50" y1="10" x2="50" y2="40" fill="#000" stroke="#000"/>
  </g>

  <!-- Section 7: Gaussian Filtering -->
  <g transform="translate(10, 460)">
    <rect x="0" y="0" width="80" height="40" fill="#f0f0f0"/>
    <text x="10" y="10" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Gaussian Filtering</text>
    <animateTransform attributeName="x" type="translate" begin="0s" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="y" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <text x="10" y="20" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="Gaussian filtering involves replacing each pixel value with a weighted average of neighboring pixel values." style="opacity: 0;"/>
    <text x="10" y="30" font-size="16" font-family="Arial, sans-serif" text-anchor="start" data-narration="The weights are typically calculated using a Gaussian distribution, which can provide a more natural-looking blur than median filtering." style="opacity: 0;"/>
    <arrow marker-end="line" marker-width="2" marker-head-size="5" x1="50" y1="10" x2="50" y2="40" fill="#000" stroke="#000"/>
  </g>

  <!-- Footer -->
  <g transform="translate(10, 530)">
    <text x="10" y="530" font-size="16" font-family="Arial, sans-serif" text-anchor="start">Color Image Processing: Color Transformations</text>
  </g>
</svg>