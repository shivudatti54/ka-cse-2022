<svg width="420" height="400" data-topic-id="linear-filtering" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1"/>
      <stop offset="50%" stop-color="#a1c9f2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e6dee8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#b3e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ed" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Linear Filtering in Computer Vision</title>
  <text x="10" y="20" text-anchor="start" font-size="18" fill="#333" stroke="#666" stroke-width="2">
    Linear Filtering
  </text>
  <rect x="10" y="50" width="400" height="200" fill="url(#gradient)"/>
  <rect x="10" y="250" width="400" height="150" fill="url(#gradient-1)"/>
  <g id="convolution-operation">
    <rect x="20" y="100" width="60" height="30" fill="#fff" rx="5" stroke="#333" stroke-width="2"/>
    <text x="30" y="110" text-anchor="middle" font-size="12" fill="#333" stroke="#333" stroke-width="1.5">
      Place kernel
    </text>
    <rect x="20" y="130" width="60" height="30" fill="#fff" rx="5" stroke="#333" stroke-width="2"/>
    <text x="30" y="140" text-anchor="middle" font-size="12" fill="#333" stroke="#333" stroke-width="1.5">
      Multiply and sum
    </text>
    <rect x="20" y="160" width="60" height="30" fill="#fff" rx="5" stroke="#333" stroke-width="2"/>
    <text x="30" y="170" text-anchor="middle" font-size="12" fill="#333" stroke="#333" stroke-width="1.5">
      Store result
    </text>
    <rect x="20" y="190" width="60" height="30" fill="#fff" rx="5" stroke="#333" stroke-width="2"/>
    <text x="30" y="200" text-anchor="middle" font-size="12" fill="#333" stroke="#333" stroke-width="1.5">
      Slide kernel
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,100" to="60,100" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g id="common-types-of-linear-filter">
    <rect x="20" y="300" width="200" height="50" fill="#fff" rx="5" stroke="#333" stroke-width="2"/>
    <text x="30" y="310" text-anchor="middle" font-size="12" fill="#333" stroke="#333" stroke-width="1.5">
      Noise Reduction
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,310" to="200,310" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="20" y="320" width="200" height="50" fill="#fff" rx="5" stroke="#333" stroke-width="2"/>
    <text x="30" y="330" text-anchor="middle" font-size="12" fill="#333" stroke="#333" stroke-width="1.5">
      Edge Detection
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,330" to="200,330" dur="2s" begin="2s" repeatCount="indefinite"/>
    <rect x="20" y="340" width="200" height="50" fill="#fff" rx="5" stroke="#333" stroke-width="2"/>
    <text x="30" y="350" text-anchor="middle" font-size="12" fill="#333" stroke="#333" stroke-width="1.5">
      Image Enhancement
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,350" to="200,350" dur="2s" begin="4s" repeatCount="indefinite"/>
    <rect x="20" y="360" width="200" height="50" fill="#fff" rx="5" stroke="#333" stroke-width="2"/>
    <text x="30" y="370" text-anchor="middle" font-size="12" fill="#333" stroke="#333" stroke-width="1.5">
      Feature Extraction
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,370" to="200,370" dur="2s" begin="6s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="100" width="400" height="10" fill="#fff" rx="0.5" stroke="#333" stroke-width="1.5"/>
  <text x="20" y="110" text-anchor="end" font-size="12" fill="#333" stroke="#333" stroke-width="1">
    This is an animation of linear filtering in computer vision.
  </text>
  <rect x="10" y="250" width="400" height="10" fill="#fff" rx="0.5" stroke="#333" stroke-width="1.5"/>
  <text x="20" y="260" text-anchor="end" font-size="12" fill="#333" stroke="#333" stroke-width="1">
    Linear filtering is used in many computer vision applications.
  </text>
  <rect x="10" y="300" width="400" height="10" fill="#fff" rx="0.5" stroke="#333" stroke-width="1.5"/>
  <text x="20" y="310" text-anchor="end" font-size="12" fill="#333" stroke="#333" stroke-width="1">
    Practice makes perfect. 
  </text>
  <rect x="10" y="350" width="400" height="10" fill="#fff" rx="0.5" stroke="#333" stroke-width="1.5"/>
  <text x="20" y="360" text-anchor="end" font-size="12" fill="#333" stroke="#333" stroke-width="1">
    Try it with your own kernel!
  </text>
  <footer>
    <text x="10" y="370" text-anchor="start" font-size="12" fill="#333" stroke="#666" stroke-width="2">
      <a href="https://www.example.com" target="_blank">Learn more</a>
    </text>
  </footer>
</svg>