<svg width="420" height="400" data-topic-id="image-processing-point-operators">
  <defs>
    <linearGradient id="pastel-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Image Processing Point Operators</title>

  <rect fill="url(#pastel-grad)" x="0" y="0" width="420" height="56"/>
  <text fill="#2F4F7F" x="15" y="25" font-size="24">Image Processing Basics</text>

  <rect fill="#2F4F7F" x="0" y="80" width="420" height="140"/>
  <section data-narration="What is Image Processing?">
    <text fill="#C7B8EA" x="10" y="100" font-size="18">Image processing involves manipulating digital images using mathematical operations.</text>
    <text fill="#C7B8EA" x="10" y="120" font-size="18">It transforms images to enhance quality, extract information, or prepare them for further analysis.</text>
  </section>

  <rect fill="#2F4F7F" x="0" y="220" width="420" height="140"/>
  <section data-narration="Point Operations (Pixel-wise)">
    <h2>Point Operations</h2>
    <table>
      <tr>
        <th>Operation</th>
        <th>Formula</th>
        <th>Effect</th>
      </tr>
      <tr>
        <td>Brightness</td>
        <td>O = I + c</td>
        <td>Add constant to increase brightness</td>
      </tr>
      <tr>
        <td>Contrast</td>
        <td>O = a \* I</td>
        <td>Multiply to increase contrast</td>
      </tr>
      <tr>
        <td>Inversion</td>
        <td>O = 255 - I</td>
        <td>Create negative image</td>
      </tr>
      <tr>
        <td>Thresholding</td>
        <td>O = 255 if I > T else 0</td>
        <td>Convert to binary</td>
      </tr>
    </table>
  </section>

  <rect fill="#2F4F7F" x="0" y="360" width="420" height="140"/>
  <section data-narration="Convolution and Filtering">
    <h2>Convolution and Filtering</h2>
    <table>
      <tr>
        <th>Convolution</th>
        <th>Formula</th>
      </tr>
      <tr>
        <td>Output[i,j] = Sum(Image[i+m,j+n] \* Kernel[m,n])</td>
        <td>(No formula)</td>
      </tr>
    </table>

    <h2>Common Kernels</h2>
    <table>
      <tr>
        <th>Kernel</th>
        <th>Effect</th>
      </tr>
      <tr>
        <td>Identity (no change)</td>
        <td>No change</td>
      </tr>
      <tr>
        <td>Box Blur (averaging)</td>
        <td>Averaging neighboring pixels</td>
      </tr>
      <tr>
        <td>Gaussian Blur</td>
        <td>Weighted averaging neighboring pixels</td>
      </tr>
      <tr>
        <td>Sharpen</td>
        <td>Increasing detail</td>
      </tr>
    </table>
  </section>

  <rect fill="#2F4F7F" x="0" y="500" width="420" height="140"/>
  <section data-narration="Types of Filters">
    <h2>Types of Filters</h2>
    <table>
      <tr>
        <th>Filter</th>
        <th>Properties</th>
        <th>Use Case</th>
      </tr>
      <tr>
        <td>Box/Mean</td>
        <td>Simple average</td>
        <td>Fast blur, reduces noise</td>
      </tr>
      <tr>
        <td>Gaussian</td>
        <td>Weighted average</td>
        <td>Natural blur, pre-processing</td>
      </tr>
      <tr>
        <td>Median</td>
        <td>Middle value</td>
        <td>Removes salt-and-pepper noise</td>
      </tr>
      <tr>
        <td>Bilateral</td>
        <td>Edge-preserving</td>
        <td>Denoise while keeping edges</td>
      </tr>
    </table>
  </section>

  <rect fill="#2F4F7F" x="0" y="600" width="420" height="56"/>
  <text fill="#C7B8EA" x="15" y="620" font-size="24">References</text>

  <rect fill="#2F4F7F" x="0" y="650" width="420" height="40"/>
  <text fill="#C7B8EA" x="10" y="670" font-size="18">Image Processing Point Operators</text>
</svg>