<svg width="420" height="400" data-topic-id="digital-camera">
  <!-- Header -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a7fa9" stop-opacity="1" />
      <stop offset="100%" stop-color="#8e96b6" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)" opacity="0.5" />
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#f7f7f7">
    The Digital Camera
  </text>

  <!-- Section 1: Scene Radiance and the Lens -->
  <section id="scene-radiance-lens">
    <rect x="50%" y="100%" width="150" height="200" fill="#f7f7f7" opacity="0.5" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="10s" begin="0s" />
    <animate attributeName="fill opacity" from="0" to="1" dur="2s" begin="0s" />
    <text x="70%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#032B44" data-narration="Scene Radiance and the Lens">
      Scene Radiance
    </text>
    <line x1="70%" y1="150%" x2="70%" y2="150%" stroke="#032B44" stroke-width="2" />
    <line x1="70%" y1="70%" x2="70%" y2="170%" stroke="#032B44" stroke-width="2" />
  </section>

  <!-- Section 2: Camera Lens -->
  <section id="camera-lens">
    <rect x="50%" y="100%" width="150" height="200" fill="#f7f7f7" opacity="0.5" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="10s" begin="0s" />
    <animate attributeName="fill opacity" from="0" to="1" dur="2s" begin="0s" />
    <text x="70%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#032B44" data-narration="The Lens">
      The Lens
    </text>
    <line x1="70%" y1="150%" x2="70%" y2="150%" stroke="#032B44" stroke-width="2" />
    <line x1="70%" y1="70%" x2="70%" y2="170%" stroke="#032B44" stroke-width="2" />
    <line x1="80%" y1="100%" x2="80%" y2="100%" stroke="#f7f7f7" stroke-width="2" />
  </section>

  <!-- Section 3: Focal Length -->
  <section id="focal-length">
    <rect x="50%" y="100%" width="150" height="200" fill="#f7f7f7" opacity="0.5" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="10s" begin="0s" />
    <animate attributeName="fill opacity" from="0" to="1" dur="2s" begin="0s" />
    <text x="70%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#032B44" data-narration="Focal Length">
      Focal Length
    </text>
    <line x1="70%" y1="150%" x2="70%" y2="150%" stroke="#032B44" stroke-width="2" />
    <line x1="70%" y1="70%" x2="70%" y2="170%" stroke="#032B44" stroke-width="2" />
    <line x1="80%" y1="100%" x2="80%" y2="100%" stroke="#f7f7f7" stroke-width="2" />
    <line x1="60%" y1="80%" x2="60%" y2="120%" stroke="#f7f7f7" stroke-width="4" />
  </section>

  <!-- Section 4: Aperture -->
  <section id="aperture">
    <rect x="50%" y="100%" width="150" height="200" fill="#f7f7f7" opacity="0.5" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="10s" begin="0s" />
    <animate attributeName="fill opacity" from="0" to="1" dur="2s" begin="0s" />
    <text x="70%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#032B44" data-narration="Aperture">
      Aperture
    </text>
    <line x1="70%" y1="150%" x2="70%" y2="150%" stroke="#032B44" stroke-width="2" />
    <line x1="70%" y1="70%" x2="70%" y2="170%" stroke="#032B44" stroke-width="2" />
    <line x1="80%" y1="100%" x2="80%" y2="100%" stroke="#f7f7f7" stroke-width="2" />
    <line x1="60%" y1="80%" x2="60%" y2="120%" stroke="#f7f7f7" stroke-width="4" />
    <line x1="80%" y1="100%" x2="100%" y2="100%" stroke="#f7f7f7" stroke-width="4" />
  </section>

  <!-- Section 5: Image Formation Pipeline -->
  <section id="image-formation-pipeline">
    <rect x="50%" y="100%" width="150" height="200" fill="#f7f7f7" opacity="0.5" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 190 190" to="360 190 190" dur="10s" begin="0s" />
    <animate attributeName="fill opacity" from="0" to="1" dur="2s" begin="0s" />
    <text x="70%" y="70%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#032B44" data-narration="Image Formation Pipeline">
      Image Formation Pipeline
    </text>
    <line x1="70%" y1="150%" x2="70%" y2="150%" stroke="#032B44" stroke-width="2" />
    <line x1="70%" y1="70%" x2="70%" y2="170%" stroke="#032B44" stroke-width="2" />
    <line x1="80%" y1="100%" x2="80%" y2="100%" stroke="#f7f7f7" stroke-width="2" />
    <line x1="60%" y1="80%" x2="60%" y2="120%" stroke="#f7f7f7" stroke-width="4" />
    <line x1="80%" y1="100%" x2="100%" y2="100%" stroke="#f7f7f7" stroke-width="4" />
    <line x1="100%" y1="70%" x2="100%" y2="100%" stroke="#f7f7f7" stroke-width="4" />
    <line x1="50%" y1="70%" x2="50%" y2="100%" stroke="#f7f7f7" stroke-width="4" />
  </section>

  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#f7f7f7">
    Created by [Your Name]
  </text>
</svg>