<svg width="420" height="400" data-topic-id="chap-2-22" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#C7B8EA" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="50%" y="20" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
    Image Formation
  </text>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <!-- Arrow marker -->
    <path d="M 50 0 L 50 20" stroke="#3498DB" stroke-width="2" fill="none" />
    
    <!-- Gradient section -->
    <rect x="50" y="20" width="320" height="150" fill="url(#background-gradient)" rx="10" />
    
    <text x="50%" y="70" font-size="18" text-anchor="middle" fill="#2F4F7F">
      In computer vision, image formation is the process of generating an image from an object or scene.
    </text>
  </section>
  
  <!-- Section 2: Key Concepts -->
  <section data-narration="Key Concepts">
    <!-- Arrow marker -->
    <path d="M 50 200 L 50 220" stroke="#3498DB" stroke-width="2" fill="none" />
    
    <!-- Gradient section -->
    <rect x="50" y="220" width="320" height="80" fill="url(#background-gradient)" rx="10" />
    
    <text x="50%" y="250" font-size="18" text-anchor="middle" fill="#2F4F7F">
      A photometric image is a digital representation of the amount of light that falls on a given area of the image.
    </text>
  </section>
  
  <!-- Section 3: Light and Image Formation -->
  <section data-narration="Light and Image Formation">
    <!-- Arrow marker -->
    <path d="M 50 300 L 50 320" stroke="#3498DB" stroke-width="2" fill="none" />
    
    <!-- Gradient section -->
    <rect x="50" y="320" width="320" height="80" fill="url(#background-gradient)" rx="10" />
    
    <text x="50%" y="350" font-size="18" text-anchor="middle" fill="#2F4F7F">
      Light is the primary source of information for image formation.
    </text>
  </section>
  
  <!-- Section 4: Types of Light -->
  <section data-narration="Types of Light">
    <!-- Arrow marker -->
    <path d="M 50 400 L 50 420" stroke="#3498DB" stroke-width="2" fill="none" />
    
    <!-- Gradient section -->
    <rect x="50" y="420" width="320" height="80" fill="url(#background-gradient)" rx="10" />
    
    <text x="50%" y="450" font-size="18" text-anchor="middle" fill="#2F4F7F">
      Visible light, near-infrared (NIR) light, and far-infrared (FIR) light are the primary types of light.
    </text>
  </section>
  
  <!-- Section 5: Camera Types -->
  <section data-narration="Camera Types">
    <!-- Arrow marker -->
    <path d="M 50 500 L 50 520" stroke="#3498DB" stroke-width="2" fill="none" />
    
    <!-- Gradient section -->
    <rect x="50" y="520" width="320" height="80" fill="url(#background-gradient)" rx="10" />
    
    <text x="50%" y="550" font-size="18" text-anchor="middle" fill="#2F4F7F">
      CCD and CMOS cameras are the primary types of cameras used in image formation.
    </text>
  </section>
  
  <!-- Footer at bottom -->
  <text x="50%" y="380" font-size="18" text-anchor="middle" fill="#2F4F7F">
    Image Formation
  </text>
  
  <!-- Animation for sections -->
  <animate transform="scale(1.1)" begin="0s" duration="2s" repeat="forever" />
  <animate transform="scale(1)" begin="2s" duration="2s" repeat="forever" />
  <animate transform="scale(1.1)" begin="4s" duration="2s" repeat="forever" />
  <animate transform="scale(1)" begin="6s" duration="2s" repeat="forever" />
  <animate transform="scale(1.1)" begin="8s" duration="2s" repeat="forever" />
  <animate transform="scale(1)" begin="10s" duration="2s" repeat="forever" />
</svg>