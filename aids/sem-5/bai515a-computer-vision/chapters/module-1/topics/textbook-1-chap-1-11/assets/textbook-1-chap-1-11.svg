<svg width="420" height="400" data-topic-id="textbook-1-chap-1-11" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A2C2E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="10" y="10" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
    Computer Vision Study Material: Chap-1 (1.1)
  </text>
  
  <!-- Section 1: Definition -->
  <section id="section-1" data-narration="What is Computer Vision?">
    <rect x="10" y="40" width="380" height="150" fill="#FFFFFF" rx="10"/>
    <text x="15" y="50" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Definition
    </text>
    <text x="15" y="70" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Computer vision is a field of artificial intelligence (AI) that enables systems to interpret and understand visual information from the world around us.
    </text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Key Concepts -->
  <section id="section-2" data-narration="Key Concepts">
    <rect x="10" y="190" width="380" height="150" fill="#FFFFFF" rx="10"/>
    <text x="15" y="200" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Key Concepts
    </text>
    <text x="15" y="220" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Computer vision involves the interaction between computers and visual data, with the ultimate goal of extracting meaningful information from images and videos.
    </text>
    <text x="15" y="240" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      The computer vision pipeline includes image formation, feature extraction, and object recognition.
    </text>
    <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: A Brief History of Computer Vision -->
  <section id="section-3" data-narration="A Brief History of Computer Vision">
    <rect x="10" y="330" width="380" height="150" fill="#FFFFFF" rx="10"/>
    <text x="15" y="340" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      A Brief History of Computer Vision
    </text>
    <text x="15" y="360" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Computer vision dates back to the 1950s and 1960s, when the first computer vision systems were developed.
    </text>
    <text x="15" y="380" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      The introduction of the backpropagation algorithm in the 1980s enabled the training of neural networks for image recognition tasks.
    </text>
    <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 4: Modern Era -->
  <section id="section-4" data-narration="Modern Era">
    <rect x="10" y="470" width="380" height="150" fill="#FFFFFF" rx="10"/>
    <text x="15" y="480" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Modern Era
    </text>
    <text x="15" y="500" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Computer vision became a major area of research in the 1990s and 2000s, with the development of new techniques such as object recognition, tracking, and segmentation.
    </text>
    <text x="15" y="520" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      The availability of large datasets and the use of deep learning algorithms have further propelled the field forward.
    </text>
    <animate attributeName="opacity" begin="6s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 5: Key Milestones -->
  <section id="section-5" data-narration="Key Milestones">
    <rect x="10" y="610" width="380" height="150" fill="#FFFFFF" rx="10"/>
    <text x="15" y="620" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Key Milestones
    </text>
    <text x="15" y="640" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      1950s-1960s: Early computer vision systems developed.
    </text>
    <text x="15" y="660" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      1980s: The introduction of the backpropagation algorithm enabled the training of neural networks for image recognition tasks.
    </text>
    <animate attributeName="opacity" begin="8s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer -->
  <text x="10" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
    Educational Diagram | 2023
  </text>
</svg>