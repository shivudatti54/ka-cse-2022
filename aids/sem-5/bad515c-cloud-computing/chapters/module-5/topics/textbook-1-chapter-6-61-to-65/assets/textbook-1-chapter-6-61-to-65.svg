<svg width="420" height="400" data-topic-id="textbook-1-chapter-6-61">
  <title>Textbook 1 Chapter 6: 6.1 to 6.5</title>
  <desc>Cloud Programming</desc>

  <defs>
    <linearGradient id="gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a7c2e6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gradient-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff9900" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Introduction to Cloud Programming -->
  <section id="section-1" data-narration="Introduction to Cloud Programming">
    <rect x="10" y="10" width="400" height="50" style="fill: url(#gradient-1)"/>
    <text x="20" y="30" font-size="18" font-family="Arial" font-weight="bold">Cloud Programming</text>
    <animate transform="rotate(360 20 30)" begin="0s" dur="4s" repeatCount="indefinite"/>
  </section>

  <!-- Characteristics of Cloud Programming -->
  <section id="section-2" data-narration="Characteristics of Cloud Programming">
    <rect x="10" y="70" width="400" height="50" style="fill: url(#gradient-1)"/>
    <text x="20" y="90" font-size="18" font-family="Arial" font-weight="bold">Scalability</text>
    <animate transform="rotate(72 20 90)" begin="0.5s" dur="4s" repeatCount="indefinite"/>
    <text x="20" y="120" font-size="18" font-family="Arial" font-weight="bold">On-demand self-service</text>
    <animate transform="rotate(144 20 120)" begin="1.5s" dur="4s" repeatCount="indefinite"/>
    <text x="20" y="150" font-size="18" font-family="Arial" font-weight="bold">Broad network access</text>
    <animate transform="rotate(216 20 150)" begin="2.5s" dur="4s" repeatCount="indefinite"/>
    <text x="20" y="180" font-size="18" font-family="Arial" font-weight="bold">Resource pooling</text>
    <animate transform="rotate(288 20 180)" begin="3.5s" dur="4s" repeatCount="indefinite"/>
  </section>

  <!-- Cloud Platforms -->
  <section id="section-3" data-narration="Cloud Platforms">
    <rect x="10" y="220" width="400" height="50" style="fill: url(#gradient-2)"/>
    <text x="20" y="240" font-size="18" font-family="Arial" font-weight="bold">Cloud Platforms</text>
    <animate transform="rotate(36 20 240)" begin="0.5s" dur="4s" repeatCount="indefinite"/>
    <rect x="20" y="270" width="50" height="50" style="fill: #66CCCC fill-opacity: 0.5; stroke: #66CCCC; stroke-width: 2"/>
    <text x="80" y="270" font-size="18" font-family="Arial" font-weight="bold">IaaS (Infrastructure as a Service)</text>
    <animate transform="rotate(72 80 270)" begin="1.5s" dur="4s" repeatCount="indefinite"/>
    <rect x="140" y="270" width="50" height="50" style="fill: #ffcc00 fill-opacity: 0.5; stroke: #ffcc00; stroke-width: 2"/>
    <text x="200" y="270" font-size="18" font-family="Arial" font-weight="bold">PaaS (Platform as a Service)</text>
    <animate transform="rotate(144 200 270)" begin="2.5s" dur="4s" repeatCount="indefinite"/>
    <rect x="260" y="270" width="50" height="50" style="fill: #ff9900 fill-opacity: 0.5; stroke: #ff9900; stroke-width: 2"/>
    <text x="320" y="270" font-size="18" font-family="Arial" font-weight="bold">SaaS (Software as a Service)</text>
    <animate transform="rotate(216 320 270)" begin="3.5s" dur="4s" repeatCount="indefinite"/>
  </section>

  <!-- Cloud Deployment Models -->
  <section id="section-4" data-narration="Cloud Deployment Models">
    <rect x="10" y="310" width="400" height="50" style="fill: url(#gradient-2)"/>
    <text x="20" y="330" font-size="18" font-family="Arial" font-weight="bold">Cloud Deployment Models</text>
    <animate transform="rotate(36 20 330)" begin="0.5s" dur="4s" repeatCount="indefinite"/>
    <rect x="20" y="370" width="50" height="50" style="fill: #66CCCC fill-opacity: 0.5; stroke: #66CCCC; stroke-width: 2"/>
    <text x="80" y="370" font-size="18" font-family="Arial" font-weight="bold">Public Cloud</text>
    <animate transform="rotate(72 80 370)" begin="1.5s" dur="4s" repeatCount="indefinite"/>
    <rect x="140" y="370" width="50" height="50" style="fill: #ffcc00 fill-opacity: 0.5; stroke: #ffcc00; stroke-width: 2"/>
    <text x="200" y="370" font-size="18" font-family="Arial" font-weight="bold">Private Cloud</text>
    <animate transform="rotate(144 200 370)" begin="2.5s" dur="4s" repeatCount="indefinite"/>
    <rect x="260" y="370" width="50" height="50" style="fill: #ff9900 fill-opacity: 0.5; stroke: #ff9900; stroke-width: 2"/>
    <text x="320" y="370" font-size="18" font-family="Arial" font-weight="bold">Hybrid Cloud</text>
    <animate transform="rotate(216 320 370)" begin="3.5s" dur="4s" repeatCount="indefinite"/>
  </section>

  <footer>
    <text x="20" y="390" font-size="18" font-family="Arial" font-weight="bold">Textbook 1 Chapter 6: 6.1 to 6.5</text>
  </footer>
</svg>