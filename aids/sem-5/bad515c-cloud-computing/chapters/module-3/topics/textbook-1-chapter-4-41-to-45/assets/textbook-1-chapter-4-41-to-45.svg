<svg width="420" height="400" data-topic-id="cloud-computing-basics">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="cloud-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8f7ee6" stop-opacity="1" />
      <stop offset="50%" stop-color="#4c5154" stop-opacity="1" />
      <stop offset="100%" stop-color="#2f4f7f" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" fill="url(#cloud-gradient)" fill-opacity="0.8" rx="10" />
  
  <!-- Title -->
  <g transform="translate(10, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" font-weight="bold" text-anchor="left">Cloud Computing Basics</text>
  </g>
  
  <!-- Section 1: Definition -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="20" fill="#e5e5ea" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="Definition">Definition</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,70" begin="0s" dur="2s" repeatCount="1" />
  </g>
  <g transform="translate(10, 70)">
    <rect x="0" y="0" width="400" height="50" fill="#f2f2f2" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="A cloud computing is a model of delivering computing services over the internet where resources such as servers, storage, databases, software and applications are provided as a service to users on-demand.">A cloud computing is a model of delivering computing services over the internet where resources such as servers, storage, databases, software and applications are provided as a service to users on-demand.</text>
  </g>
  
  <!-- Section 2: Characteristics -->
  <g transform="translate(10, 130)">
    <rect x="0" y="0" width="400" height="20" fill="#e5e5ea" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="Characteristics">Characteristics</text>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,170" begin="0s" dur="2s" repeatCount="1" />
  </g>
  <g transform="translate(10, 170)">
    <rect x="0" y="0" width="400" height="50" fill="#f2f2f2" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="The characteristics of cloud computing include on-demand self-service, broad network access, resource pooling, rapid elasticity and a measured service.">The characteristics of cloud computing include on-demand self-service, broad network access, resource pooling, rapid elasticity and a measured service.</text>
  </g>
  <g transform="translate(10, 220)">
    <rect x="0" y="0" width="400" height="20" fill="#e5e5ea" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="Benefits">Benefits</text>
    <animateTransform attributeName="transform" type="translate" from="0,240" to="0,260" begin="0s" dur="2s" repeatCount="1" />
  </g>
  <g transform="translate(10, 260)">
    <rect x="0" y="0" width="400" height="50" fill="#f2f2f2" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="Cloud computing provides increased flexibility, reduced costs and improved scalability to users.">Cloud computing provides increased flexibility, reduced costs and improved scalability to users.</text>
  </g>
  
  <!-- Section 3: Examples -->
  <g transform="translate(10, 320)">
    <rect x="0" y="0" width="400" height="20" fill="#e5e5ea" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="Examples">Examples</text>
    <animateTransform attributeName="transform" type="translate" from="0,340" to="0,360" begin="0s" dur="2s" repeatCount="1" />
  </g>
  <g transform="translate(10, 360)">
    <rect x="0" y="0" width="400" height="50" fill="#f2f2f2" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="Cloud computing has many examples such as Software as a Service (SaaS), Infrastructure as a Service (IaaS) and Platform as a Service (PaaS).">Cloud computing has many examples such as Software as a Service (SaaS), Infrastructure as a Service (IaaS) and Platform as a Service (PaaS).</text>
  </g>
  
  <!-- Section 4: Service Models -->
  <g transform="translate(10, 410)">
    <rect x="0" y="0" width="400" height="20" fill="#e5e5ea" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="Service Models">Service Models</text>
    <animateTransform attributeName="transform" type="translate" from="0,420" to="0,440" begin="0s" dur="2s" repeatCount="1" />
  </g>
  <g transform="translate(10, 440)">
    <rect x="0" y="0" width="400" height="50" fill="#f2f2f2" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left" data-narration="The service models of cloud computing include IaaS, PaaS and SaaS. Each model provides different services to users.">The service models of cloud computing include IaaS, PaaS and SaaS. Each model provides different services to users.</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 510)">
    <rect x="0" y="0" width="400" height="20" fill="#e5e5ea" rx="5" />
    <text x="10" y="10" font-size="18" font-family="Arial" text-anchor="left">Cloud Computing Basics</text>
  </g>
</svg>