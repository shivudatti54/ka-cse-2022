                <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Spread and infect cloud-based systems</text>
                <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="2.5s"/>
