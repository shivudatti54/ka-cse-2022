              <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">When using cloud-based services</text>
              <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="4.5s"/>
            </g>
          </g>
        </g>
      </g>
      <g transform="translate(10,380)">
        <rect x="10" y="10" width="300" height="30" fill="#F7F7F7" rx="5"/>
