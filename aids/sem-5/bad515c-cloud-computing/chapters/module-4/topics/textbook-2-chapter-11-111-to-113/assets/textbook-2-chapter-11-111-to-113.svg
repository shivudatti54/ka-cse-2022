  <g transform="translate(10,420)">
    <rect x="10" y="10" width="400" height="10" fill="#F7F7F7" rx="5"/>
    <g data-narration="Footnote 1">
      <rect x="10" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
      <g transform="translate(15,2)">
        <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
        <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Data breach risks refer to unauthorized access to sensitive data</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="7.5s"/>
      </g>
      <g transform="translate(120,2)">
        <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
        <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Denial of service risks refer to overwhelming the cloud infrastructure</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="8s"/>
      </g>
      <g transform="translate(240,2)">
        <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
        <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Malware risks refer to malicious software</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="8.5s"/>
      </g>
    </g>
  </g>
