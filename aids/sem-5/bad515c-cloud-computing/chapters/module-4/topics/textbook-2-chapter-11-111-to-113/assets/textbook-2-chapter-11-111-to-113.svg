<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="cloud-security-top-concern-for-cloud-users-123" xmlns="http://www.w3.org/2000/svg">
  <title>Cloud Security: Top Concern for Cloud Users</title>
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="1" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="350" fill="url(#gradient)"/>
  <g transform="translate(10,10)">
    <rect x="10" y="10" width="300" height="50" fill="#F7F7F7" rx="5"/>
    <g opacity="0.5">
      <text x="15" y="20" font-size="16" font-family="Arial" text-anchor="middle">Cloud Security: Top Concern for Cloud Users</text>
    </g>
    <g data-narration="Cloud Security Risks">
      <rect x="10" y="70" width="200" height="80" fill="#F7F7F7" rx="5"/>
      <g transform="translate(10,75)">
        <rect x="10" y="10" width="200" height="20" fill="#F7F7F7" rx="5"/>
        <g data-narration="Data Breach Risks">
          <rect x="10" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
          <g transform="translate(15,12)">
            <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
            <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Unauthorized access to sensitive data</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="0s"/>
          </g>
          <rect x="120" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
          <g transform="translate(125,12)">
            <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
            <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Theft or exposure of sensitive data</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="0.5s"/>
          </g>
        </g>
        <rect x="10" y="80" width="200" height="80" fill="#F7F7F7" rx="5"/>
        <g transform="translate(10,85)">
          <rect x="10" y="10" width="200" height="20" fill="#F7F7F7" rx="5"/>
          <g data-narration="Denial of Service (DoS) Risks">
            <rect x="10" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
            <g transform="translate(15,12)">
              <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
              <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Overwhelming the cloud infrastructure</text>
              <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="1s"/>
            </g>
            <rect x="120" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
            <g transform="translate(125,12)">
              <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
              <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Rendering it unavailable to authorized users</text>
              <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="1.5s"/>
            </g>
          </g>
          <rect x="10" y="150" width="200" height="80" fill="#F7F7F7" rx="5"/>
          <g transform="translate(10,155)">
            <rect x="10" y="10" width="200" height="20" fill="#F7F7F7" rx="5"/>
            <g data-narration="Malware Risks">
              <rect x="10" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
              <g transform="translate(15,12)">
                <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
                <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Malicious software</text>
                <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="2s"/>
              </g>
              <rect x="120" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
              <g transform="translate(125,12)">
