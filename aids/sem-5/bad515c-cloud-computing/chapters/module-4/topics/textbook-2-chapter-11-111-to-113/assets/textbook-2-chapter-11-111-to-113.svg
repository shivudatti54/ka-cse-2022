            <rect x="10" y="210" width="200" height="80" fill="#F7F7F7" rx="5"/>
            <g transform="translate(10,215)">
              <rect x="10" y="10" width="200" height="20" fill="#F7F7F7" rx="5"/>
              <g data-narration="Insider Risks">
