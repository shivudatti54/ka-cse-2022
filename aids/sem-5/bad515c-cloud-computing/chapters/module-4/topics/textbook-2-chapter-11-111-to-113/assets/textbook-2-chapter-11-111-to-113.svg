          <g transform="translate(15,12)">
            <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
            <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Ensure transparency</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="5s"/>
          </g>
          <rect x="120" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
          <g transform="translate(125,12)">
            <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
            <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Implement data minimization</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="5.5s"/>
          </g>
          <rect x="10" y="100" width="200" height="80" fill="#F7F7F7" rx="5"/>
          <g transform="translate(10,105)">
            <rect x="10" y="10" width="200" height="20" fill="#F7F7F7" rx="5"/>
            <g data-narration="Data Minimization">
              <rect x="10" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
              <g transform="translate(15,12)">
                <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
                <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Only collect and process the minimum amount of data necessary</text>
                <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="6s"/>
              </g>
              <rect x="120" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
              <g transform="translate(125,12)">
                <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
                <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">To protect data both in transit and at rest</text>
                <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="6.5s"/>
              </g>
