                  <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Authorized personnel intentionally compromising cloud security</text>
                  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="3s"/>
                </g>
                <rect x="120" y="10" width="100" height="10" fill="#F7F7F7" rx="5"/>
                <g transform="translate(125,12)">
                  <rect x="0" y="0" width="100" height="10" fill="#F7F7F7" rx="5"/>
                  <text x="0" y="5" font-size="12" font-family="Arial" text-anchor="middle">Compromising cloud security</text>
                  <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-5" dur="2s" begin="3.5s"/>
                </g>
              </g>
