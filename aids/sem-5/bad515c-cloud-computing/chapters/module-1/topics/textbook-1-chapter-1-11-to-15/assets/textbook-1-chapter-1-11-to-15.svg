      <rect x="0" y="0" width="300" height="60" fill="#fff" rx="10"/>
      <g transform="translate(0, 0)">
        <text x="10" y="20" font-size="18" font-family="Arial" font-weight="400" text-anchor="start" fill="#333" data-narration="Cloud computing offers several benefits, including scalability, cost-effectiveness, flexibility, and reliability.">
          Cloud computing offers several benefits, including scalability, cost-effectiveness, flexibility, and reliability.
        </text>
