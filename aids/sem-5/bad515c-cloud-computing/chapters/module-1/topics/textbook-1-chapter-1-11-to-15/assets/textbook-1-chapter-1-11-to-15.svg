    <g transform="translate(0, 0)">
      <text x="10" y="20" font-size="18" font-family="Arial" font-weight="400" text-anchor="start" fill="#333" data-narration="What is Cloud Computing?">
        Cloud computing is a model for delivering computing services over the internet, where resources such as servers, storage, databases, software, and applications are provided as a service to users on-demand.
      </text>
      <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" to="0" from="1"/>
    </g>
