<svg width="420" height="400" data-topic-id="computer-networks-data-link-layer-101-104">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B0A0FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#grad)" width="100%" height="100%"/>
  <g transform="translate(10, 10)">
    <rect width="400" height="360" fill="#fff" rx="10"/>
    <text x="10" y="20" font-size="24" font-family="Arial" fill="#000">Computer Networks: Data Link Layer (10.1-10.4)</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#000">Introduction</text>
    <rect x="10" y="80" width="380" height="20" fill="#E0E0E0" rx="5"/>
    <text x="15" y="90" font-size="18" font-family="Arial" fill="#000" data-narration="The Data Link Layer is the second layer of the OSI model, responsible for ensuring reliable transfer of data frames between two devices on the same network. This layer adds error detection and correction mechanisms to ensure data integrity." style="animation: fade-in 2s;"/>
    <rect x="10" y="120" width="380" height="20" fill="#E0E0E0" rx="5"/>
    <text x="15" y="130" font-size="18" font-family="Arial" fill="#000" data-narration="Key Concepts: Frame, Error Detection, Error Correction" style="animation: fade-in 2s;"/>
    <rect x="10" y="160" width="380" height="20" fill="#E0E0E0" rx="5"/>
    <text x="15" y="170" font-size="18" font-family="Arial" fill="#000" data-narration="Block Coding: Divide data into blocks, add redundant bits, transmit, receive, and calculate CRC" style="animation: fade-in 2s;"/>
    <rect x="10" y="200" width="380" height="20" fill="#E0E0E0" rx="5"/>
    <text x="15" y="210" font-size="18" font-family="Arial" fill="#000" data-narration="Cyclic Codes: Use polynomial equations to detect and correct errors" style="animation: fade-in 2s;"/>
    <rect x="10" y="240" width="380" height="20" fill="#E0E0E0" rx="5"/>
    <text x="15" y="250" font-size="18" font-family="Arial" fill="#000" data-narration="Generator Polynomial, Parity-Check Matrix, and CRC" style="animation: fade-in 2s;"/>
    <rect x="10" y="280" width="380" height="20" fill="#E0E0E0" rx="5"/>
    <text x="15" y="290" font-size="18" font-family="Arial" fill="#000" data-narration="Conclusion" style="animation: fade-in 2s;"/>
    <g transform="translate(10, 310)">
