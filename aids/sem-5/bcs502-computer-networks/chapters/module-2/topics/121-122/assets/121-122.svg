<svg width="420" height="400" data-topic-id="12.1-12.2" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="40" fill="#4d8eff" rx="10"/>
  <text x="20" y="30" fill="#fff" font-size="24" font-family="Arial" text-anchor="middle">Error Detection and Correction</text>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a2f0f8" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="50" width="420" height="300" fill="url(#pastel-gradient)" rx="10"/>

  <!-- Section 1: Block Coding -->
  <section data-narration="Block Coding is a method of error detection and correction that involves dividing the data into fixed-length blocks and encoding each block with redundant information.">
    <rect x="10" y="60" width="400" height="80" fill="#fff" rx="10"/>
    <text x="20" y="80" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Block Coding</text>
    <rect x="20" y="100" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="120" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Fixed-length blocks</text>
    <rect x="20" y="150" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="170" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Redundant information is added to the data</text>
    <animateTransform attribute="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="0s" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Types of Block Codes -->
  <section data-narration="There are three types of block codes: Single-Error Correcting Code (SECC), Double-Error Correcting Code (DECC), and Triple-Error Correcting Code (TECC).">
    <rect x="10" y="260" width="400" height="80" fill="#fff" rx="10"/>
    <text x="20" y="280" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Types of Block Codes</text>
    <rect x="20" y="310" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="330" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">SECC: Single-Error Correcting Code</text>
    <rect x="20" y="360" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="380" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">DECC: Double-Error Correcting Code</text>
    <rect x="20" y="410" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="430" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">TECC: Triple-Error Correcting Code</text>
    <animateTransform attribute="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="1s" repeatCount="indefinite"/>
  </section>

  <!-- Section 3: Cyclic Codes -->
  <section data-narration="Cyclic codes are a type of block code that uses a cyclic shift to encode and decode the data blocks.">
    <rect x="10" y="260" width="400" height="80" fill="#fff" rx="10"/>
    <text x="20" y="280" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Cyclic Codes</text>
    <rect x="20" y="310" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="330" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Cyclic shift to encode and decode data blocks</text>
    <rect x="20" y="360" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="380" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Simple encoding and decoding process</text>
    <animateTransform attribute="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="2s" repeatCount="indefinite"/>
  </section>

  <!-- Section 4: Advantages and Disadvantages -->
  <section data-narration="Block coding and cyclic codes have their advantages and disadvantages.">
    <rect x="10" y="260" width="400" height="80" fill="#fff" rx="10"/>
    <text x="20" y="280" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Advantages and Disadvantages</text>
    <rect x="20" y="310" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="330" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Advantages: Error detection and correction, fixed-length blocks</text>
    <rect x="20" y="360" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="380" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Disadvantages: Redundant information is added to the data, more complex encoding and decoding process</text>
    <rect x="20" y="410" width="300" height="40" fill="#fff" rx="10"/>
    <text x="20" y="430" fill="#4d8eff" font-size="18" font-family="Arial" text-anchor="middle">Cyclic codes: Simple encoding and decoding process, cyclic shift to encode and decode data blocks</text>
    <animateTransform attribute="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2000" begin="3s" repeatCount="indefinite"/>
  </section>

  <!-- Footer -->
  <rect x="10" y="370" width="400" height="30" fill="#4d8eff" rx="10"/>
  <text x="20" y="390" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">Error Detection and Correction</text>
</svg>