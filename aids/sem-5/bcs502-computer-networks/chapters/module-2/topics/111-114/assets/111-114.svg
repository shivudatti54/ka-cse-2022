<svg width="420" height="400" data-topic-id="111-114">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A9C5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <text x="10" y="30" font-size="24" font-family="Arial" text-anchor="start" fill="#2F4F7F">Error Detection and Correction</text>
  <section data-narration="Introduction to Error Detection and Correction" style="margin-bottom: 20px;">
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Error detection is the process of identifying whether errors have occurred during data transmission.</text>
    <animate duration="2000" begin="0s" attributeName="opacity" from="1" to="0" fill="freeze"/>
  </section>
  <section data-narration="What is Error Correction?" style="margin-bottom: 20px;">
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Error correction is the process of correcting errors that have occurred during data transmission.</text>
    <animate duration="2000" begin="2s" attributeName="opacity" from="0" to="1" fill="freeze"/>
  </section>
  <section data-narration="Block Coding Introduction" style="margin-bottom: 20px;">
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Block coding is a method of error detection and correction that involves dividing data into fixed-length blocks and adding error-checking codes to each block.</text>
    <animate duration="2000" begin="4s" attributeName="opacity" from="0" to="1" fill="freeze"/>
  </section>
  <section data-narration="Types of Block Codes" style="margin-bottom: 20px;">
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Single-error-correcting (SEC) codes can detect and correct a single error, while double-error-correcting (DEC) codes can detect and correct two errors.</text>
    <animate duration="2000" begin="6s" attributeName="opacity" from="0" to="1" fill="freeze"/>
  </section>
  <section data-narration="Cyclic Codes Introduction" style="margin-bottom: 20px;">
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Cyclic codes are a type of block code that uses a cyclic shift to generate the error-checking code.</text>
    <animate duration="2000" begin="8s" attributeName="opacity" from="0" to="1" fill="freeze"/>
  </section>
  <section data-narration="How Cyclic Codes Work" style="margin-bottom: 20px;">
    <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Data is divided into fixed-length blocks, a polynomial is used to generate the error-checking code, and the polynomial is cyclically shifted to generate the CRC code.</text>
    <animate duration="2000" begin="10s" attributeName="opacity" from="0" to="1" fill="freeze"/>
  </section>
  <rect x="10" y="200" width="400" height="100" fill="#34A85A" rx="10"/>
  <text x="20" y="220" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Block Coding</text>
  <path d="M 20,220 C 30,220 40,230 50,230 60,220 70,210 80,210 90,220 100,230 110,230 120,220 130,210 140,210 150,220 160,230 170,230 180,220 190,210 200,210 210,220 220,230 230,230 240,220 250,210 260,210 270,220 280,230 290,230 300,220 310,210 320,210 330,220 340,230 350,230 360,220 370,210 380,210 390,220 400,230 410,230 420,220" stroke="#2F4F7F" stroke-width="2"/>
  <text x="20" y="240" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Cyclic Codes</text>
  <path d="M 20,240 C 30,240 40,250 50,250 60,240 70,230 80,230 90,240 100,250 110,250 120,240 130,230 140,230 150,240 160,250 170,250 180,240 190,230 200,230 210,240 220,250 230,250 240,240 250,230 260,230 270,240 280,250 290,250 300,240 310,230 320,230 330,240 340,250 350,250 360,240 370,230 380,230 390,240 400,250 410,250 420,240" stroke="#2F4F7F" stroke-width="2"/>
  <rect x="10" y="330" width="400" height="100" fill="#FFC107" rx="10"/>
  <text x="20" y="350" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Error Detection and Correction</text>
  <text x="10" y="380" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">Block Coding and Cyclic Codes are used to detect and correct errors in data transmission.</text>
  <animate duration="2000" begin="12s" attributeName="opacity" from="1" to="0" fill="freeze"/>
  <text x="10" y="410" font-size="18" font-family="Arial" text-anchor="start" fill="#2F4F7F">This animation demonstrates the process of error detection and correction using block coding and cyclic codes.</text>
  <animate duration="2000" begin="14s" attributeName="opacity" from="0" to="1" fill="freeze"/>
</svg>