<svg width="420" height="400" data-topic-id="controlled-access">
  <rect x="0" y="0" width="420" height="400" fill="#87CEEB" />
  <rect x="0" y="50" width="100%" height="50" fill="#3498DB" />
  <g transform="translate(10, 60)">
    <rect x="0" y="0" width="420" height="320" fill="#F7F7F7" />
    <text x="15" y="15" font-size="24" font-family="Arial" fill="#2E4053">Controlled Access</text>
    <line x1="20" y1="30" x2="380" y2="30" stroke="#3498DB" stroke-width="2" />
    <animate transform="rotate(360 190 320)" begin="0s" dur="10s" repeatCount="indefinite" />
  </g>
  <g transform="translate(10, 60)">
    <section data-narration="Introduction">
      <text x="15" y="100" font-size="18" font-family="Arial" fill="#2E4053">Introduction</text>
      <rect x="0" y="120" width="420" height="150" fill="#F7F7F7" />
      <text x="15" y="150" font-size="16" font-family="Arial" fill="#2E4053">Controlled Access (CA) is a method of managing access to a shared medium in a computer network to prevent interference and collisions.</text>
    </section>
    <section data-narration="Types of Controlled Access Methods">
      <rect x="0" y="220" width="420" height="200" fill="#F7F7F7" />
      <text x="15" y="240" font-size="18" font-family="Arial" fill="#2E4053">Types of Controlled Access Methods</text>
      <line x1="20" y1="250" x2="380" y2="250" stroke="#3498DB" stroke-width="2" />
      <animate transform="rotate(720 190 220)" begin="0s" dur="2s" repeatCount="indefinite" />
      <g>
        <rect x="15" y="280" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="290" font-size="14" font-family="Arial" fill="#2E4053">Token Ring</text>
        <rect x="15" y="300" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="310" font-size="14" font-family="Arial" fill="#2E4053">Token Passing</text>
        <rect x="15" y="320" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="330" font-size="14" font-family="Arial" fill="#2E4053">Sliding Window</text>
        <rect x="15" y="340" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="350" font-size="14" font-family="Arial" fill="#2E4053">Pom-pom protocol</text>
      </g>
    </section>
    <section data-narration="Token Ring">
      <rect x="0" y="380" width="420" height="200" fill="#F7F7F7" />
      <text x="15" y="400" font-size="18" font-family="Arial" fill="#2E4053">Token Ring</text>
      <line x1="20" y1="410" x2="380" y2="410" stroke="#3498DB" stroke-width="2" />
      <animate transform="rotate(1080 190 380)" begin="0s" dur="3s" repeatCount="indefinite" />
      <g>
        <rect x="15" y="430" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="440" font-size="14" font-family="Arial" fill="#2E4053">How it works: Each device in the network has a buffer to store incoming data. When a device wants to transmit data, it requests the token from the network manager.</text>
        <rect x="15" y="450" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="460" font-size="14" font-family="Arial" fill="#2E4053">Advantages: Reduces collisions and interference, ensures fair access to the network.</text>
        <rect x="15" y="470" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="480" font-size="14" font-family="Arial" fill="#2E4053">Disadvantages: Creates a bottleneck at the network manager, can be slow.</text>
      </g>
    </section>
    <section data-narration="Token Passing">
      <rect x="0" y="380" width="420" height="200" fill="#F7F7F7" />
      <text x="15" y="400" font-size="18" font-family="Arial" fill="#2E4053">Token Passing</text>
      <line x1="20" y1="410" x2="380" y2="410" stroke="#3498DB" stroke-width="2" />
      <animate transform="rotate(1080 190 380)" begin="2s" dur="3s" repeatCount="indefinite" />
      <g>
        <rect x="15" y="430" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="440" font-size="14" font-family="Arial" fill="#2E4053">How it works: Similar to Token Ring, but devices pass the token to adjacent devices instead of keeping it.</text>
        <rect x="15" y="450" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="460" font-size="14" font-family="Arial" fill="#2E4053">Advantages: Reduces collisions and interference, faster than Token Ring.</text>
        <rect x="15" y="470" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="480" font-size="14" font-family="Arial" fill="#2E4053">Disadvantages: More complex than Token Ring, can be prone to token loss.</text>
      </g>
    </section>
    <section data-narration="Sliding Window">
      <rect x="0" y="380" width="420" height="200" fill="#F7F7F7" />
      <text x="15" y="400" font-size="18" font-family="Arial" fill="#2E4053">Sliding Window</text>
      <line x1="20" y1="410" x2="380" y2="410" stroke="#3498DB" stroke-width="2" />
      <animate transform="rotate(1080 190 380)" begin="4s" dur="3s" repeatCount="indefinite" />
      <g>
        <rect x="15" y="430" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="440" font-size="14" font-family="Arial" fill="#2E4053">How it works: A fixed-size window of time is allocated for each device to transmit data. Devices can transmit data as long as the window is not full.</text>
        <rect x="15" y="450" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="460" font-size="14" font-family="Arial" fill="#2E4053">Advantages: Reduces collisions and interference, faster than Token Ring and Token Passing.</text>
      </g>
    </section>
    <section data-narration="Pom-pom protocol">
      <rect x="0" y="380" width="420" height="200" fill="#F7F7F7" />
      <text x="15" y="400" font-size="18" font-family="Arial" fill="#2E4053">Pom-pom protocol</text>
      <line x1="20" y1="410" x2="380" y2="410" stroke="#3498DB" stroke-width="2" />
      <animate transform="rotate(1080 190 380)" begin="6s" dur="3s" repeatCount="indefinite" />
      <g>
        <rect x="15" y="430" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="440" font-size="14" font-family="Arial" fill="#2E4053">How it works: A protocol where devices use a token to gain access to the transmit medium.</text>
        <rect x="15" y="450" width="250" height="50" fill="#F7F7F7" fill-opacity="0.5" />
        <text x="30" y="460" font-size="14" font-family="Arial" fill="#2E4053">Advantages: Reduces collisions and interference.</text>
      </g>
    </section>
    <footer>
      <rect x="0" y="380" width="420" height="50" fill="#3498DB" />
      <text x="15" y="400" font-size="18" font-family="Arial" fill="#2E4053">Controlled Access: A Method of Managing Access to a Shared Medium</text>
    </footer>
  </svg>