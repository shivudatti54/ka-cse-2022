<svg width="420" height="400" data-topic-id="Link-Control-Dlc-Services-Framing-Flow-Control-Err">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" text-anchor="middle" fill="#3498db">
    Link Control: DLC Services Framing Flow Control Err
  </text>
  
  <!-- Section 1: Framing -->
  <rect x="50%" y="70%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <text x="60%" y="80%" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
    Framing:
    <tspan font-size="14" font-family="Arial" text-anchor="end" fill="#666">The process of adding headers and trailers to frames to provide synchronization and error detection.</tspan>
  </text>
  <rect x="50%" y="110%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="2s" begin="1s"/>
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="1s"/>
  <circle cx="120" cy="130" r="10" fill="#3498db" opacity="1" animation="link-control-framing"/>
  
  <!-- Section 2: Flow Control -->
  <rect x="50%" y="220%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <text x="60%" y="230%" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
    Flow Control:
    <tspan font-size="14" font-family="Arial" text-anchor="end" fill="#666">The mechanism of regulating the amount of data transmitted between two devices to prevent network congestion.</tspan>
  </text>
  <rect x="50%" y="260%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="2s" begin="2s"/>
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="2s"/>
  <circle cx="120" cy="130" r="10" fill="#3498db" opacity="1" animation="link-control-flow-control"/>
  
  <!-- Section 3: Error Control -->
  <rect x="50%" y="350%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <text x="60%" y="360%" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
    Error Control:
    <tspan font-size="14" font-family="Arial" text-anchor="end" fill="#666">The process of detecting and correcting errors that occur during data transmission.</tspan>
  </text>
  <rect x="50%" y="390%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="2s" begin="3s"/>
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="3s"/>
  <circle cx="120" cy="130" r="10" fill="#3498db" opacity="1" animation="link-control-error-control"/>
  
  <!-- Section 4: Connectionless -->
  <rect x="50%" y="450%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <text x="60%" y="460%" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
    Connectionless:
    <tspan font-size="14" font-family="Arial" text-anchor="end" fill="#666">A mode of operation where data is transmitted without establishing a connection between devices.</tspan>
  </text>
  <rect x="50%" y="490%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="2s" begin="4s"/>
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="4s"/>
  <circle cx="120" cy="130" r="10" fill="#3498db" opacity="1" animation="link-control-connectionless"/>
  
  <!-- Section 5: Connection Oriented -->
  <rect x="50%" y="550%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <text x="60%" y="560%" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
    Connection Oriented:
    <tspan font-size="14" font-family="Arial" text-anchor="end" fill="#666">A mode of operation where a connection is established between devices before data transmission.</tspan>
  </text>
  <rect x="50%" y="590%" width="300" height="100" fill="#fff" rx="10" stroke="#ccc" stroke-width="2"/>
  <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="2s" begin="5s"/>
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="5s"/>
  <circle cx="120" cy="130" r="10" fill="#3498db" opacity="1" animation="link-control-connection-oriented"/>
</svg>