<svg width="420" height="400" data-topic-id="ipcc-practical-component-261-266-practical-component-of-ipcc-slno-experimen" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Practical Component of IPCC: Implementing a Point-to-Point Network with Duplex Links</title>
  <rect x="10" y="10" width="400" height="360" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="20" height="40" fill="#2F4F7F" rx="2"/>
    <rect x="40" y="0" width="20" height="40" fill="#2F4F7F" rx="2"/>
    <rect x="80" y="0" width="20" height="40" fill="#2F4F7F" rx="2"/>
    <rect x="0" y="50" width="400" height="10" fill="#2F4F7F" rx="2"/>
    <rect x="0" y="100" width="400" height="10" fill="#2F4F7F" rx="2"/>
    <rect x="0" y="150" width="400" height="10" fill="#2F4F7F" rx="2"/>
    <rect x="0" y="200" width="400" height="10" fill="#2F4F7F" rx="2"/>
    <g fill="#fff">
      <text x="50" y="30" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Node 1 (A)</text>
      <text x="110" y="30" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Node 2 (B)</text>
      <text x="170" y="30" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Node 3 (C)</text>
    </g>
    <g fill="#2F4F7F">
      <path d="M 50,50 L 100,70" stroke-width="2" stroke="#2F4F7F" fill="none"/>
      <path d="M 100,70 L 150,90" stroke-width="2" stroke="#2F4F7F" fill="none"/>
      <path d="M 150,90 L 200,110" stroke-width="2" stroke="#2F4F7F" fill="none"/>
      <path d="M 200,110 L 250,130" stroke-width="2" stroke="#2F4F7F" fill="none"/>
      <path d="M 250,130 L 300,150" stroke-width="2" stroke="#2F4F7F" fill="none"/>
    </g>
    <g fill="#2F4F7F">
      <rect x="0" y="250" width="20" height="40" rx="2"/>
      <rect x="40" y="250" width="20" height="40" rx="2"/>
      <rect x="80" y="250" width="20" height="40" rx="2"/>
    </g>
    <g transform="translate(10, 270)">
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Introduction</text>
      <g data-narration="What is a point-to-point network?">
        <rect x="0" y="20" width="400" height="10" fill="#2F4F7F" rx="2"/>
        <text x="50" y="30" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">A point-to-point network connects two devices directly, without any intermediate devices.</text>
      </g>
      <g data-narration="What is a duplex link?">
        <rect x="0" y="50" width="400" height="10" fill="#2F4F7F" rx="2"/>
        <text x="50" y="60" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">A duplex link is a type of link that allows data to be transmitted in both directions, i.e., both send and receive.</text>
      </g>
      <g data-narration="Designing the Network">
        <rect x="0" y="80" width="400" height="10" fill="#2F4F7F" rx="2"/>
        <text x="50" y="90" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">The network will consist of three nodes: Node 1 (A), Node 2 (B), and Node 3 (C).</text>
        <path d="M 50,110 L 100,130" stroke-width="2" stroke="#2F4F7F" fill="none"/>
        <path d="M 100,130 L 150,150" stroke-width="2" stroke="#2F4F7F" fill="none"/>
        <path d="M 150,150 L 200,170" stroke-width="2" stroke="#2F4F7F" fill="none"/>
      </g>
      <g data-narration="Installing and Configuring the NICs">
        <rect x="0" y="120" width="400" height="10" fill="#2F4F7F" rx="2"/>
        <text x="50" y="130" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Each node will have a NIC installed, and the network operating system will be configured to use the duplex links.</text>
      </g>
    </g>
    <g transform="translate(10, 300)">
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Conclusion</text>
      <g data-narration="The duplex links will be established between the nodes as follows: Node 1 (A) -> Node 2 (B): 100 Mbps duplex link, Node 2 (B) -> Node 3 (C): 100 Mbps duplex link, and Node 3 (C) -> Node 1 (A): 100 Mbps duplex link.</g>
    </g>
  </g>
  <rect x="10" y="320" width="400" height="40" fill="#2F4F7F" rx="2"/>
  <text x="50" y="330" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Sl. No. Experiment 261: Implementing a point-to-point network with duplex links 266: Practical Component of IPCC</text>
  <rect x="10" y="360" width="400" height="40" fill="#2F4F7F" rx="2"/>
  <text x="50" y="370" font-size="16" font-family="Arial" fill="#2F4F7F" text-anchor="middle">IPCC Practical Component</text>
</svg>