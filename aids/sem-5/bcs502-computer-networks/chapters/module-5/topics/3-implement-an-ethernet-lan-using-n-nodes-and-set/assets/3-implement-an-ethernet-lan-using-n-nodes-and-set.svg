<svg width="420" height="400" data-topic-id="Implementing-an-Ethernet-LAN-using-n-Nodes-and-Analyzing-Traffic-Congestion"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="max-width:100%;max-height:100%;height:auto">
    <style>
        .node {
            fill: #87CEEB;
            stroke: #454545;
            stroke-width: 2px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .switch {
            fill: #6495ED;
            stroke: #454545;
            stroke-width: 2px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .gradient {
            background: linear-gradient(135deg, #87CEEB, #6495ED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>

    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
            <stop offset="50%" stop-color="#6495ED" stop-opacity="1" />
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
        </linearGradient>
    </defs>

    <g class="gradient">
        <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" rx="10"/>
    </g>

    <title>Implementing an Ethernet LAN using n Nodes and Analyzing Traffic Congestion</title>

    <g transform="translate(20, 20)">
        <rect x="0" y="0" width="300" height="300" rx="10" fill="#FFFFFF" stroke="#454545" stroke-width="2"/>
        <text x="10" y="20" font-size="14" font-family="Arial" fill="#454545">Implementing an Ethernet LAN using n Nodes and Analyzing Traffic Congestion</text>
        <animateTransform attributeName="transform" type="rotate" from="0 320 200" to="360 320 200" dur="10s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(20, 20)">
        <text x="10" y="100" font-size="16" font-family="Arial" fill="#87CEEB" data-narration="Step 1: Connect Devices to the LAN">Connect Devices to the LAN</text>
        <animate x="10" begin="0s" dur="2s" repeatCount="indefinite"/>
        <text x="10" y="120" font-size="14" font-family="Arial" fill="#87CEEB" data-narration="Each node is connected to a switch or hub using Ethernet cables.">Each node is connected to a switch or hub using Ethernet cables. </text>
        <animate x="10" begin="2s" dur="2s" repeatCount="indefinite"/>
        <rect x="10" y="140" width="280" height="20" rx="5" fill="#87CEEB" stroke="#454545" stroke-width="2" data-narration="Connect each node with an IP address and MAC address." stroke-dasharray="5,5" stroke-dashoffset="5,5"/>
        <animate rect begin="4s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(20, 20)">
        <text x="10" y="200" font-size="16" font-family="Arial" fill="#87CEEB" data-narration="Step 2: Configure the Switch or Hub">Configure the Switch or Hub</text>
        <animate x="10" begin="6s" dur="2s" repeatCount="indefinite"/>
        <text x="10" y="220" font-size="14" font-family="Arial" fill="#87CEEB" data-narration="Configure the switch or hub to operate at a specific speed (e.g., 100 Mb/s or 1 Gb/s).">Configure the switch or hub to operate at a specific speed (e.g., 100 Mb/s or 1 Gb/s). </text>
        <animate x="10" begin="8s" dur="2s" repeatCount="indefinite"/>
        <rect x="10" y="240" width="280" height="20" rx="5" fill="#87CEEB" stroke="#454545" stroke-width="2" data-narration="Configure the switch or hub to broadcast packets to all connected devices." stroke-dasharray="5,5" stroke-dashoffset="5,5"/>
        <animate rect begin="10s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(20, 20)">
        <text x="10" y="280" font-size="16" font-family="Arial" fill="#87CEEB" data-narration="Step 3: Set Up Traffic Nodes">Set Up Traffic Nodes</text>
        <animate x="10" begin="12s" dur="2s" repeatCount="indefinite"/>
        <text x="10" y="300" font-size="14" font-family="Arial" fill="#87CEEB" data-narration="Designate a few nodes as traffic nodes to generate traffic.">Designate a few nodes as traffic nodes to generate traffic. </text>
        <animate x="10" begin="14s" dur="2s" repeatCount="indefinite"/>
        <rect x="10" y="320" width="280" height="20" rx="5" fill="#87CEEB" stroke="#454545" stroke-width="2" data-narration="Configure traffic nodes to transmit data at a specific rate and pattern." stroke-dasharray="5,5" stroke-dashoffset="5,5"/>
        <animate rect begin="16s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(20, 20)">
        <text x="10" y="360" font-size="16" font-family="Arial" fill="#87CEEB" data-narration="Step 4: Monitor Network Performance">Monitor Network Performance</text>
        <animate x="10" begin="18s" dur="2s" repeatCount="indefinite"/>
        <text x="10" y="380" font-size="14" font-family="Arial" fill="#87CEEB" data-narration="Monitor network performance using tools such as Wireshark or Tcpdump.">Monitor network performance using tools such as Wireshark or Tcpdump. </text>
        <animate x="10" begin="20s" dur="2s" repeatCount="indefinite"/>
        <rect x="10" y="400" width="280" height="20" rx="5" fill="#87CEEB" stroke="#454545" stroke-width="2" data-narration="Analyze network traffic to identify congestion points." stroke-dasharray="5,5" stroke-dashoffset="5,5"/>
        <animate rect begin="22s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(20, 20)">
        <text x="10" y="20" font-size="16" font-family="Arial" fill="#454545" data-narration="Calculating Throughput">Calculating Throughput</text>
        <animate x="10" begin="0s" dur="2s" repeatCount="indefinite"/>
        <text x="10" y="120" font-size="14" font-family="Arial" fill="#87CEEB" data-narration="Calculate the throughput by measuring the amount of data transmitted per unit time.">Calculate the throughput by measuring the amount of data transmitted per unit time. </text>
        <animate x="10" begin="2s" dur="2s" repeatCount="indefinite"/>
        <rect x="10" y="140" width="280" height="20" rx="5" fill="#87CEEB" stroke="#454545" stroke-width="2" data-narration="Use the formula: Throughput = Total Data Transmitted / Time Elapsed." stroke-dasharray="5,5" stroke-dashoffset="5,5"/>
        <animate rect begin="4s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(20, 20)">
        <text x="10" y="280" font-size="16" font-family="Arial" fill="#454545" data-narration="Calculating Congestion">Calculating Congestion</text>
        <animate x="10" begin="6s" dur="2s" repeatCount="indefinite"/>
        <text x="10" y="300" font-size="14" font-family="Arial" fill="#87CEEB" data-narration="To analyze traffic congestion, we need to measure the amount of data transmitted over the network and compare it to the available bandwidth.">To analyze traffic congestion, we need to measure the amount of data transmitted over the network and compare it to the available bandwidth. </text>
        <animate x="10" begin="8s" dur="2s" repeatCount="indefinite"/>
        <rect x="10" y="320" width="280" height="20" rx="5" fill="#87CEEB" stroke="#454545" stroke-width="2" data-narration="Use the formula: Congestion = Throughput / Available Bandwidth." stroke-dasharray="5,5" stroke-dashoffset="5,5"/>
        <animate rect begin="10s" dur="2s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(20, 20)">
        <rect x="10" y="360" width="300" height="30" rx="5" fill="#87CEEB" stroke="#454545" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="5,5"/>
        <animate rect begin="0s" dur="1s" repeatCount="indefinite"/>
        <text x="10" y="420" font-size="16" font-family="Arial" fill="#454545" data-narration="Arrow markers for connections">
        <animate x="10" begin="0s" dur="1s" repeatCount="indefinite"/>
        <text x="320" y="420" font-size="14" font-family="Arial" fill="#87CEEB" data-narration="Clear labels and annotations">Clear labels and annotations</text>
        <animate x="320" begin="1s" dur="1s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(20, 20)">
        <rect x="10" y="430" width="300" height="30" rx="5" fill="#87CEEB" stroke="#454545" stroke-width="2" stroke-dasharray="5,5" stroke-dashoffset="5,5"/>
        <animate rect begin="0s" dur="1s" repeatCount="indefinite"/>
    </g>

</svg>