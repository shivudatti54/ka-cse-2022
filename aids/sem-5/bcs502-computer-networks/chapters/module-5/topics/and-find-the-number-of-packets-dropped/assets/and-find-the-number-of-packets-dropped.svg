<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="and-find-the-number-of-packets-dropped">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>And Find the Number of Packets Dropped</title>
  <rect x="10" y="20" width="400" height="350" fill="url(#pastel-gradient)"/>
  <text x="20" y="50" font-size="24" font-family="Arial" font-weight="bold">Packet Loss</text>
  <text x="120" y="50" font-size="18" font-family="Arial">What is Packet Loss?</text>
  <rect x="10" y="70" width="400" height="100" fill="white"/>
  <g transform="translate(10,80)">
    <rect x="0" y="0" width="20" height="10" fill="#3498db"/>
    <rect x="0" y="10" width="20" height="10" fill="#2ecc71"/>
    <rect x="10" y="0" width="20" height="10" fill="#e74c3c"/>
    <rect x="10" y="10" width="20" height="10" fill="#2ecc71"/>
    <rect x="20" y="0" width="20" height="10" fill="#e74c3c"/>
    <rect x="20" y="10" width="20" height="10" fill="#3498db"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 0" dur="2s" begin="0.5s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" dur="2s" begin="1s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 0" dur="2s" begin="1.5s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="2s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 100" dur="2s" begin="2.5s"/>
  </g>
  <g transform="translate(10,190)">
    <rect x="0" y="0" width="400" height="100" fill="white"/>
    <text x="20" y="20" font-size="18" font-family="Arial">Causes of Packet Loss</text>
    <rect x="10" y="50" width="100" height="20" fill="#3498db" data-narration="Network congestion is a common cause of packet loss.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="0s"/>
    </rect>
    <rect x="120" y="50" width="100" height="20" fill="#2ecc71" data-narration="Hardware or software failures can also cause packet loss.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="0.5s"/>
    </rect>
    <rect x="220" y="50" width="100" height="20" fill="#e74c3c" data-narration="Network failures, such as router crashes or cable cuts, can also cause packet loss.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="1s"/>
    </rect>
    <rect x="10" y="80" width="100" height="20" fill="#3498db" data-narration="Interference from other devices can also cause packet loss.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 110" dur="1s" begin="0s"/>
    </rect>
    <rect x="120" y="80" width="100" height="20" fill="#2ecc71" data-narration="Router crashes or cable cuts can also cause packet loss.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 110" dur="1s" begin="0.5s"/>
    </rect>
    <rect x="220" y="80" width="100" height="20" fill="#e74c3c" data-narration="Cable cuts or other network failures can also cause packet loss.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 110" dur="1s" begin="1s"/>
    </rect>
  </g>
  <g transform="translate(10,280)">
    <rect x="0" y="0" width="400" height="100" fill="white"/>
    <text x="20" y="20" font-size="18" font-family="Arial">Types of Packet Loss</text>
    <rect x="10" y="50" width="100" height="20" fill="#3498db" data-narration="Random packet loss occurs randomly and is unpredictable.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="0s"/>
    </rect>
    <rect x="120" y="50" width="100" height="20" fill="#2ecc71" data-narration="Predictable packet loss is predictable and can be measured.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="0.5s"/>
    </rect>
    <rect x="220" y="50" width="100" height="20" fill="#e74c3c" data-narration="Predictable packet loss can occur due to network failures or software failures.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="1s"/>
    </rect>
  </g>
  <g transform="translate(10,370)">
    <rect x="0" y="0" width="400" height="100" fill="white"/>
    <text x="20" y="20" font-size="18" font-family="Arial">Detection and Measurement of Packet Loss</text>
    <rect x="10" y="50" width="100" height="20" fill="#3498db" data-narration="The ping command is used to measure the round-trip time (RTT) of a packet.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="0s"/>
    </rect>
    <rect x="120" y="50" width="100" height="20" fill="#2ecc71" data-narration="The traceroute command is used to measure the path that a packet takes when it is transmitted over a network.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="0.5s"/>
    </rect>
    <rect x="220" y="50" width="100" height="20" fill="#e74c3c" data-narration="By analyzing the tracert output, we can detect packet loss.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="1s"/>
    </rect>
  </g>
  <g transform="translate(10,460)">
    <rect x="0" y="0" width="400" height="100" fill="white"/>
    <text x="20" y="20" font-size="18" font-family="Arial" font-weight="bold">Conclusion</text>
    <rect x="10" y="50" width="100" height="20" fill="#3498db" data-narration="In conclusion, packet loss is a common issue in computer networks. Understanding the causes and methods of detection and measurement can help network administrators to troubleshoot and resolve packet loss issues.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" dur="1s" begin="0s"/>
    </rect>
  </g>
  <g transform="translate(10,550)">
    <rect x="0" y="0" width="400" height="50" fill="#3498db"/>
    <text x="20" y="20" font-size="18" font-family="Arial">References</text>
  </g>
</svg>