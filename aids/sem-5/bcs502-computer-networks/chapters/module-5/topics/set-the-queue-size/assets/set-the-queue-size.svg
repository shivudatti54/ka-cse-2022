    <text x="15" y="155" font-size="16" font-family="Arial, sans-serif" fill="#F7D2C4" data-narration="Fixed Queue Size: A fixed value that is set by the system administrator. The queue size is fixed and cannot be changed dynamically." transform="rotate(45 15 155)"/>
    <rect x="120" y="130" width="100" height="30" fill="#A1C9F2" rx="5"/>
    <text x="125" y="155" font-size="16" font-family="Arial, sans-serif" fill="#A1C9F2" data-narration="Dynamic Queue Size: A variable value that is adjusted based on the current network traffic. The queue size can be increased or decreased based on the network requirements." transform="rotate(45 125 155)"/>
    <rect x="220" y="130" width="100" height="30" fill="#E0E4CC" rx="5"/>
    <text x="225" y="155" font-size="16" font-family="Arial, sans-serif" fill="#E0E4CC" data-narration="Adaptive Queue Size: A queue size that is adjusted based on the current network traffic and network requirements." transform="rotate(45 225 155)"/>
  </g>
  <g id="queue-setting-benefits-section">
