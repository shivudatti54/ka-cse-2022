    <rect x="120" y="190" width="100" height="30" fill="#E0E4CC" rx="5"/>
    <text x="125" y="215" font-size="16" font-family="Arial, sans-serif" fill="#E0E4CC" data-narration="Increased Throughput: By adjusting the queue size, network administrators can increase the throughput of the network." transform="rotate(45 125 215)"/>
    <rect x="220" y="190" width="100" height="30" fill="#3498DB" rx="5"/>
    <text x="225" y="215" font-size="16" font-family="Arial, sans-serif" fill="#3498DB" data-narration="Reduced Packet Loss: By setting the queue size, network administrators can reduce packet loss due to congestion." transform="rotate(45 225 215)"/>
  </g>
  <g id="queue-setting-types-section">
