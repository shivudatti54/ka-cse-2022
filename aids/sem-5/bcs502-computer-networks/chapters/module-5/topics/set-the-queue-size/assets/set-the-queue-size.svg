    <rect x="120" y="250" width="100" height="30" fill="#A1C9F2" rx="5"/>
    <text x="125" y="275" font-size="16" font-family="Arial, sans-serif" fill="#A1C9F2" data-narration="Dynamic Queue Size: A variable value that is adjusted based on the current network traffic. The queue size can be increased or decreased based on the network requirements." transform="rotate(45 125 275)"/>
    <rect x="220" y="250" width="100" height="30" fill="#E0E4CC" rx="5"/>
    <text x="225" y="275" font-size="16" font-family="Arial, sans-serif" fill="#E0E4CC" data-narration="Adaptive Queue Size: A queue size that is adjusted based on the current network traffic and network requirements." transform="rotate(45 225 275)"/>
  </g>
  <g id="queue-setting-connections-section">
    <rect x="10" y="310" width="100" height="30" fill="#F2C464" rx="5"/>
    <text x="15" y="335" font-size="16" font-family="Arial, sans-serif" fill="#F2C464" data-narration="Static Queue Size: A fixed value that is set by the system administrator. The queue size is fixed and cannot be changed dynamically." transform="rotate(45 15 335)"/>
    <rect x="120" y="310" width="100" height="30" fill="#A1C9F2" rx="5"/>
    <text x="125" y="335" font-size="16" font-family="Arial, sans-serif" fill="#A1C9F2" data-narration="Dynamic Queue Size: A variable value that is adjusted based on the current network traffic. The queue size can be increased or decreased based on the network requirements." transform="rotate(45 125 335)"/>
    <rect x="220" y="310" width="100" height="30" fill="#E0E4CC" rx="5"/>
    <text x="225" y="335" font-size="16" font-family="Arial, sans-serif" fill="#E0E4CC" data-narration="Adaptive Queue Size: A queue size that is adjusted based on the current network traffic and network requirements." transform="rotate(45 225 335)"/>
  </g>
  <g id="queue-setting-annotations-section">
    <rect x="10" y="370" width="100" height="30" fill="#F7D2C4" rx="5"/>
    <text x="15" y="395" font-size="16" font-family="Arial, sans-serif" fill="#F7D2C4" data-narration="Fixed Queue Size: A fixed value that is set by the system administrator. The queue size is fixed and cannot be changed dynamically." transform="rotate(45 15 395)"/>
    <rect x="120" y="370" width="100" height="30" fill="#A1C9F2" rx="5"/>
    <text x="125" y="395" font-size="16" font-family="Arial, sans-serif" fill="#A1C9F2" data-narration="Dynamic Queue Size: A variable value that is adjusted based on the current network traffic. The queue size can be increased or decreased based on the network requirements." transform="rotate(45 125 395)"/>
    <rect x="220" y="370" width="100" height="30" fill="#E0E4CC" rx="5"/>
    <text x="225" y="395" font-size="16" font-family="Arial, sans-serif" fill="#E0E4CC" data-narration="Adaptive Queue Size: A queue size that is adjusted based on the current network traffic and network requirements." transform="rotate(45 225 395)"/>
  </g>
  <g id="footer">
    <rect x="10" y="400" width="400" height="50" fill="#3498DB" rx="5"/>
    <text x="15" y="425" font-size="16" font-family="Arial, sans-serif" fill="#3498DB" data-narration="Learn more about queue sizes and their impact on network performance." transform="rotate(45 15 425)"/>
  </g>
