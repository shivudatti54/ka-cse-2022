<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="set-the-queue-size">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Set the Queue Size</title>
  <rect x="10" y="10" width="400" height="50" fill="url(#pastel-gradient)" rx="5"/>
  <rect x="10" y="70" width="400" height="50" fill="#F7D2C4" rx="5"/>
  <rect x="10" y="130" width="400" height="50" fill="#F2C464" rx="5"/>
  <rect x="10" y="190" width="400" height="50" fill="#E0E4CC" rx="5"/>
  <rect x="10" y="250" width="400" height="50" fill="#3498DB" rx="5"/>
  <rect x="10" y="310" width="400" height="50" fill="#2C3E50" rx="5"/>
  <rect x="10" y="370" width="400" height="50" fill="#1ABC9C" rx="5"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 370" dur="3s" begin="0s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 370" to="0 50" dur="3s" begin="3s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 370" dur="3s" begin="6s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 370" to="0 50" dur="3s" begin="9s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" dur="1s" begin="0s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="1s" begin="1s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" dur="1s" begin="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" dur="1s" begin="3s" repeatCount="indefinite"/>
  <g id="queue-type-section">
    <rect x="10" y="10" width="100" height="30" fill="#F7D2C4" rx="5"/>
    <text x="15" y="35" font-size="16" font-family="Arial, sans-serif" fill="#F7D2C4" data-narration="Static Queue Size: A fixed value that is set by the system administrator. The queue size is fixed and cannot be changed dynamically." transform="rotate(45 15 35)"/>
    <rect x="120" y="10" width="100" height="30" fill="#A1C9F2" rx="5"/>
    <text x="125" y="35" font-size="16" font-family="Arial, sans-serif" fill="#A1C9F2" data-narration="Dynamic Queue Size: A variable value that is adjusted based on the current network traffic. The queue size can be increased or decreased based on the network requirements." transform="rotate(45 125 35)"/>
  </g>
  <g id="queue-benefits-section">
    <rect x="10" y="70" width="100" height="30" fill="#F2C464" rx="5"/>
    <text x="15" y="95" font-size="16" font-family="Arial, sans-serif" fill="#F2C464" data-narration="Improved Network Performance: By setting the queue size, network administrators can optimize the network performance and reduce congestion." transform="rotate(45 15 95)"/>
    <rect x="120" y="70" width="100" height="30" fill="#E0E4CC" rx="5"/>
    <text x="125" y="95" font-size="16" font-family="Arial, sans-serif" fill="#E0E4CC" data-narration="Increased Throughput: By adjusting the queue size, network administrators can increase the throughput of the network." transform="rotate(45 125 95)"/>
    <rect x="220" y="70" width="100" height="30" fill="#3498DB" rx="5"/>
    <text x="225" y="95" font-size="16" font-family="Arial, sans-serif" fill="#3498DB" data-narration="Reduced Packet Loss: By setting the queue size, network administrators can reduce packet loss due to congestion." transform="rotate(45 225 95)"/>
  </g>
  <g id="queue-setting-section">
