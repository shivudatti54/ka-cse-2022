<svg width="420" height="400" data-topic-id="tcpip-sockets" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>7 Using TCP/IP Sockets</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64BFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
    <style>
      .text {
        font-size: 14px;
        font-family: Arial, sans-serif;
        color: #2F4F7F;
        fill: #2F4F7F;
      }
      .arrow {
        stroke: #FFC107;
        stroke-width: 2;
        fill: none;
      }
      .background {
        fill: url(#gradient);
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="background: #F2EFEF;"/>
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="100" height="100" style="background: #87CEEB;"/>
    <rect x="110" y="0" width="100" height="100" style="background: #64BFFF;"/>
    <rect x="220" y="0" width="100" height="100" style="background: #F2EFEF;"/>
    <rect x="330" y="0" width="100" height="100" style="background: #64BFFF;"/>
    <rect x="0" y="110" width="100" height="100" style="background: #87CEEB;"/>
    <rect x="110" y="110" width="100" height="100" style="background: #F2EFEF;"/>
    <rect x="220" y="110" width="100" height="100" style="background: #64BFFF;"/>
  </g>
  <text x="20" y="20" text-anchor="middle" transform="translate(20,20)" class="text">TCP/IP Sockets</text>
  <text x="20" y="150" text-anchor="middle" transform="translate(20,150)" class="text">What are TCP/IP Sockets?</text>
  <g transform="translate(140,10)">
    <rect x="0" y="0" width="100" height="100" style="background: #87CEEB;"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="1000" repeatCount="indefinite"/>
    <text x="50" y="50" text-anchor="middle" class="text">Definition:</text>
    <text x="50" y="80" text-anchor="middle" class="text">A socket is a endpoint of a connection between two devices in a network.</text>
    <text x="50" y="110" text-anchor="middle" class="text">Types:</text>
    <text x="50" y="140" text-anchor="middle" class="text">- Stream Sockets: Used for sending and receiving continuous data streams.</text>
    <text x="50" y="170" text-anchor="middle" class="text">- Datagram Sockets: Used for sending and receiving messages, which can be of varying sizes.</text>
    <text x="50" y="200" text-anchor="middle" class="text">- Raw Sockets: Used for sending and receiving raw packets of data.</text>
  </g>
  <g transform="translate(140,10)">
    <rect x="0" y="0" width="100" height="100" style="background: #64BFFF;"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="1000" repeatCount="indefinite"/>
    <text x="50" y="50" text-anchor="middle" class="text">Creating a TCP/IP Socket:</text>
    <text x="50" y="80" text-anchor="middle" class="text">You need to use the socket() function in your programming language of choice.</text>
    <text x="50" y="110" text-anchor="middle" class="text">Code Example:</text>
    <text x="50" y="140" text-anchor="middle" class="text">server_socket = socket.socket(socket.AF_INET, socket.SOCK_STREAM)</text>
    <text x="50" y="170" text-anchor="middle" class="text">server_socket.bind(("localhost", 12345))</text>
    <text x="50" y="200" text-anchor="middle" class="text">server_socket.listen(5)</text>
  </g>
  <g transform="translate(140,10)">
    <rect x="0" y="0" width="100" height="100" style="background: #F2EFEF;"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="1000" repeatCount="indefinite"/>
    <text x="50" y="50" text-anchor="middle" class="text">Sending and Receiving Data:</text>
    <text x="50" y="80" text-anchor="middle" class="text">Once you have created a TCP/IP socket, you can send and receive data over it.</text>
    <text x="50" y="110" text-anchor="middle" class="text">Code Example:</text>
    <text x="50" y="140" text-anchor="middle" class="text">client_socket.send(b"Hello, server!")</text>
    <text x="50" y="170" text-anchor="middle" class="text">client_socket.recv(1024)</text>
  </g>
  <g transform="translate(140,10)">
    <rect x="0" y="0" width="100" height="100" style="background: #64BFFF;"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="1000" repeatCount="indefinite"/>
    <text x="50" y="50" text-anchor="middle" class="text">Raw Sockets:</text>
    <text x="50" y="80" text-anchor="middle" class="text">Raw Sockets are used for sending and receiving raw packets of data.</text>
    <text x="50" y="110" text-anchor="middle" class="text">They are often used for network debugging and packet sniffing.</text>
  </g>
  <g transform="translate(140,10)">
    <rect x="0" y="0" width="100" height="100" style="background: #F2EFEF;"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="1000" repeatCount="indefinite"/>
    <text x="50" y="50" text-anchor="middle" class="text">Datagram Sockets:</text>
    <text x="50" y="80" text-anchor="middle" class="text">Datagram Sockets are used for sending and receiving messages, which can be of varying sizes.</text>
    <text x="50" y="110" text-anchor="middle" class="text">They are often used for network protocols like UDP.</text>
  </g>
  <g transform="translate(140,10)">
    <rect x="0" y="0" width="100" height="100" style="background: #87CEEB;"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" dur="1000" repeatCount="indefinite"/>
    <text x="50" y="50" text-anchor="middle" class="text">Stream Sockets:</text>
    <text x="50" y="80" text-anchor="middle" class="text">Stream Sockets are used for sending and receiving continuous data streams.</text>
    <text x="50" y="110" text-anchor="middle" class="text">They are often used for network protocols like TCP.</text>
  </g>
  <g transform="translate(10,10)">
    <g transform="translate(0,0)">
      <path d="M 10,10 L 110,10 L 110,110 L 10,110 Z" class="arrow"/>
    </g>
  </g>
  <g transform="translate(10,10)">
    <g transform="translate(110,0)">
      <path d="M 110,10 L 210,10 L 210,110 L 110,110 Z" class="arrow"/>
    </g>
  </g>
  <g transform="translate(10,10)">
    <g transform="translate(220,0)">
      <path d="M 220,10 L 310,10 L 310,110 L 220,110 Z" class="arrow"/>
    </g>
  </g>
  <g transform="translate(10,10)">
    <g transform="translate(330,0)">
      <path d="M 330,10 L 430,10 L 430,110 L 330,110 Z" class="arrow"/>
    </g>
  </g>
  <g transform="translate(10,380)">
    <text x="20" y="20" text-anchor="middle" transform="translate(20,20)" class="text">7 Using TCP/IP Sockets</text>
  </g>
</svg>