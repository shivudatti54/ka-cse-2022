<svg width="420" height="400" data-topic-id="shortest-path-algorithms">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <title>Developing Shortest Path Algorithms: Bellman-Ford and Path Vector Routing</title>
  <g transform="translate(10 10)">
    <rect x="0" y="0" width="400" height="350" fill="#fff" rx="10"/>
    <path d="M 10 20 L 200 20" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 10 100 L 200 100" stroke="#2ecc71" stroke-width="2" fill="none"/>
    <path d="M 10 180 L 200 180" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M 10 260 L 200 260" stroke="#1abc9c" stroke-width="2" fill="none"/>
    <g data-narration="What is the Bellman-Ford Algorithm?">
      <text x="20" y="70" font-size="14">Bellman-Ford Algorithm</text>
      <text x="20" y="90" font-size="12">A graph search algorithm that finds the shortest path</text>
    </g>
    <g data-narration="How the Bellman-Ford Algorithm Works">
      <text x="20" y="130" font-size="14">Relax edges repeatedly</text>
      <text x="20" y="150" font-size="12">Update distances to all vertices</text>
      <text x="20" y="170" font-size="12">Repeat until distances are updated or graph is negative-weight</text>
    </g>
    <g data-narration="Example of the Bellman-Ford Algorithm">
      <rect x="10" y="220" width="380" height="60" fill="#fff" rx="10"/>
      <table>
        <tr>
          <th>Vertex</th>
          <th>A -> B</th>
          <th>A -> C</th>
          <th>B -> C</th>
          <th>C -> D</th>
        </tr>
        <tr>
          <td>A</td>
          <td>2</td>
          <td>4</td>
          <td>1</td>
          <td>3</td>
        </tr>
        <tr>
          <td>B</td>
          <td>2</td>
          <td>0</td>
          <td>1</td>
          <td>0</td>
        </tr>
        <tr>
          <td>C</td>
          <td>4</td>
          <td>0</td>
          <td>0</td>
          <td>0</td>
        </tr>
        <tr>
          <td>D</td>
          <td>3</td>
          <td>7</td>
          <td>0</td>
          <td>0</td>
        </tr>
      </table>
      <g data-narration="Relax edges repeatedly">
        <animate transform="rotate(360 200 200)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="1.5s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="3s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g data-narration="Update distances to all vertices">
        <animate transform="rotate(360 200 200)" begin="4s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="5.5s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="7s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g data-narration="Repeat until distances are updated or graph is negative-weight">
        <animate transform="rotate(360 200 200)" begin="8s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="9.5s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="11s" dur="2s" repeatCount="indefinite"/>
      </g>
    </g>
    <g data-narration="How to Implement the Bellman-Ford Algorithm">
      <text x="20" y="300" font-size="14">Choose a programming language</text>
      <text x="20" y="320" font-size="12">Create a graph data structure</text>
      <text x="20" y="340" font-size="12">Relax edges repeatedly</text>
      <text x="20" y="360" font-size="12">Update distances to all vertices</text>
      <text x="20" y="380" font-size="12">Repeat until distances are updated or graph is negative-weight</text>
    </g>
    <g data-narration="Path Vector Routing">
      <text x="20" y="410" font-size="14">A routing algorithm for networks</text>
      <text x="20" y="430" font-size="12">Finds the shortest path between vertices</text>
    </g>
  </g>
  <g transform="translate(10 10)">
    <rect x="0" y="0" width="400" height="350" fill="#fff" rx="10"/>
    <path d="M 10 20 L 200 20" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 10 100 L 200 100" stroke="#2ecc71" stroke-width="2" fill="none"/>
    <path d="M 10 180 L 200 180" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M 10 260 L 200 260" stroke="#1abc9c" stroke-width="2" fill="none"/>
    <g data-narration="Example of the Bellman-Ford Algorithm">
      <rect x="10" y="220" width="380" height="60" fill="#fff" rx="10"/>
      <table>
        <tr>
          <th>Vertex</th>
          <th>A -> B</th>
          <th>A -> C</th>
          <th>B -> C</th>
          <th>C -> D</th>
        </tr>
        <tr>
          <td>A</td>
          <td>2</td>
          <td>4</td>
          <td>1</td>
          <td>3</td>
        </tr>
        <tr>
          <td>B</td>
          <td>2</td>
          <td>0</td>
          <td>1</td>
          <td>0</td>
        </tr>
        <tr>
          <td>C</td>
          <td>4</td>
          <td>0</td>
          <td>0</td>
          <td>0</td>
        </tr>
        <tr>
          <td>D</td>
          <td>3</td>
          <td>7</td>
          <td>0</td>
          <td>0</td>
        </tr>
      </table>
      <g data-narration="Relax edges repeatedly">
        <animate transform="rotate(360 200 200)" begin="0s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="1.5s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="3s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g data-narration="Update distances to all vertices">
        <animate transform="rotate(360 200 200)" begin="4s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="5.5s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="7s" dur="2s" repeatCount="indefinite"/>
      </g>
      <g data-narration="Repeat until distances are updated or graph is negative-weight">
        <animate transform="rotate(360 200 200)" begin="8s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="9.5s" dur="2s" repeatCount="indefinite"/>
        <animate transform="rotate(360 200 200)" begin="11s" dur="2s" repeatCount="indefinite"/>
      </g>
    </g>
    <g data-narration="Path Vector Routing">
      <text x="20" y="420" font-size="14">A routing algorithm for networks</text>
      <text x="20" y="440" font-size="12">Finds the shortest path between vertices</text>
    </g>
  </g>
  <footer data-narration="Conclusion">
    <text x="20" y="460" font-size="14">The Bellman-Ford algorithm is a graph search algorithm that finds the shortest path from a source vertex to all other vertices in a weighted graph</text>
  </footer>
</svg>