<svg width="420" height="400" data-topic-id="sliding-window-protocol" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold" fill="#4682B4" text-anchor="left">Sliding Window Protocol</text>

  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)">
    <rect width="300" height="20" fill="#F0E4CC" rx="5"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#666" text-anchor="left">What is Sliding Window Protocol?</text>
    <text x="10" y="45" font-size="18" font-family="Arial" fill="#666" text-anchor="left">The Sliding Window protocol is a control protocol used in data link layer to manage data transfer between two devices, typically a sender and a receiver, over a shared medium.</text>
  </g>

  <!-- Section 2: Key Concepts -->
  <g transform="translate(10, 80)">
    <rect width="300" height="20" fill="#F0E4CC" rx="5"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#666" text-anchor="left">Window size</text>
    <text x="10" y="45" font-size="18" font-family="Arial" fill="#666" text-anchor="left">The maximum number of segments that can be transmitted by the sender in a single transmission.</text>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#666" text-anchor="left">Sliding window</text>
    <text x="10" y="85" font-size="18" font-family="Arial" fill="#666" text-anchor="left">The range of segments that are currently being transmitted by the sender.</text>
  </g>

  <!-- Section 3: How Sliding Window Protocol Works -->
  <g transform="translate(10, 120)">
    <rect width="300" height="20" fill="#F0E4CC" rx="5"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#666" text-anchor="left">How it works</text>
    <text x="10" y="45" font-size="18" font-family="Arial" fill="#666" text-anchor="left">The sender and receiver agree on a window size.</text>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#666" text-anchor="left">The sender divides the data into segments and transmits them one by one.</text>
    <text x="10" y="85" font-size="18" font-family="Arial" fill="#666" text-anchor="left">The receiver acknowledges the receipt of each segment.</text>
  </g>

  <!-- Section 4: Advantages and Disadvantages -->
  <g transform="translate(10, 160)">
    <rect width="300" height="20" fill="#F0E4CC" rx="5"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#666" text-anchor="left">Advantages</text>
    <text x="10" y="45" font-size="18" font-family="Arial" fill="#666" text-anchor="left">Efficient use of bandwidth by dividing the data into smaller chunks.</text>
    <text x="10" y="65" font-size="18" font-family="Arial" fill="#666" text-anchor="left">Reduced retransmissions by allowing the sender to retransmit lost or corrupted segments.</text>
    <text x="10" y="85" font-size="18" font-family="Arial" fill="#666" text-anchor="left">Disadvantages</text>
    <text x="10" y="105" font-size="18" font-family="Arial" fill="#666" text-anchor="left">Increased complexity by introducing additional protocol overhead.</text>
  </g>

  <!-- Animation 1: Window size animation -->
  <animateTransform
    attributeName="transform"
    type="translate"
    from="translate(10, 140) scale(1)"
    to="translate(10, 140) scale(1.2)"
    begin="0s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Animation 2: Sliding window animation -->
  <animateTransform
    attributeName="transform"
    type="translate"
    from="translate(10, 170) scale(1)"
    to="translate(10, 170) scale(1.2)"
    begin="2s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Animation 3: Acknowledgment animation -->
  <animateTransform
    attributeName="transform"
    type="translate"
    from="translate(10, 200) scale(1)"
    to="translate(10, 200) scale(1.2)"
    begin="4s"
    dur="2s"
    repeatCount="indefinite"
  />

  <!-- Footer -->
  <text x="10" y="350" font-size="18" font-family="Arial" fill="#4682B4" text-anchor="left">Sliding Window Protocol</text>
</svg>