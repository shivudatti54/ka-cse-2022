<svg width="420" height="400" data-topic-id="vary-bandwidth" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Header -->
  <rect x="0" y="0" width="420" height="50" fill="#4B68FF" rx="5" />
  <text x="15" y="15" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="start">Vary Bandwidth</text>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E8F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="55" width="420" height="345" fill="url(#grad)" rx="5" />
  
  <!-- Section 1: Introduction -->
  <rect x="0" y="60" width="420" height="50" fill="#F7F7F7" rx="5" />
  <text x="15" y="75" font-size="18" font-family="Arial" fill="#666666" text-anchor="start" data-narration="Introduction">Varying bandwidth is essential to ensure that different types of data are transmitted efficiently and effectively.</text>
  <animate xlink:href="#grad" attributeName="stop-color" from="#8BC34A" to="#C7E8F5" dur="1s" begin="0s" repeatCount="indefinite" />
  
  <!-- Section 2: Definition of Bandwidth -->
  <rect x="0" y="110" width="420" height="50" fill="#F7F7F7" rx="5" />
  <text x="15" y="125" font-size="18" font-family="Arial" fill="#666666" text-anchor="start" data-narration="Bandwidth is measured in bits per second (bps) or megabits per second (Mbps)." />
  <rect x="100" y="110" width="20" height="20" fill="#4B68FF" rx="5" />
  <text x="120" y="125" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">bps/Mbps</text>
  
  <!-- Section 3: Importance of Varying Bandwidth -->
  <rect x="0" y="160" width="420" height="50" fill="#F7F7F7" rx="5" />
  <text x="15" y="175" font-size="18" font-family="Arial" fill="#666666" text-anchor="start" data-narration="Different types of data require different bandwidths to be transmitted efficiently. Varying bandwidth helps to prevent network congestion and ensures a good quality of service." />
  <animate xlink:href="#grad" attributeName="stop-color" from="#C7E8F5" to="#8BC34A" dur="1s" begin="0s" repeatCount="indefinite" />
  
  <!-- Section 4: Techniques for Varying Bandwidth -->
  <rect x="0" y="210" width="420" height="50" fill="#F7F7F7" rx="5" />
  <text x="15" y="225" font-size="18" font-family="Arial" fill="#666666" text-anchor="start" data-narration="Traffic shaping, traffic policing, bandwidth allocation, and quality of service (QoS) are techniques used to achieve varying bandwidth." />
  <rect x="100" y="210" width="20" height="20" fill="#4B68FF" rx="5" />
  <text x="120" y="225" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Traffic Shaping, Policing, Allocation, QoS</text>
  
  <!-- Section 5: Conclusion -->
  <rect x="0" y="260" width="420" height="50" fill="#F7F7F7" rx="5" />
  <text x="15" y="275" font-size="18" font-family="Arial" fill="#666666" text-anchor="start" data-narration="Varying bandwidth is crucial in computer networks to ensure efficient and effective data transmission." />
  
  <!-- Footer -->
  <rect x="0" y="320" width="420" height="40" fill="#4B68FF" rx="5" />
  <text x="15" y="335" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Indigo Network</text>
</svg>