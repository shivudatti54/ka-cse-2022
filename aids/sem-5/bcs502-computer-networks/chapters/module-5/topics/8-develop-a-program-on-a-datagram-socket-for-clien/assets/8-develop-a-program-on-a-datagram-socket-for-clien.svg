<svg width="420" height="400" data-topic-id="datagram-socket-client-server-program">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a7c8e6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3498db" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.8"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="80%" height="60%" stroke="#3c8bf7" stroke-width="2" fill="none"}}
    <text x="10" y="15" font-size="24" font-family="Arial" fill="#2c3e50">Datagram Socket Client/Server Program</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#2c3e50">Introduction</text>
    <animate transform="rotate(360 35 35)" dur="2000" repeatCount="indefinite" begin="0s"/>
  </g>
  <section data-narration="Datagram Socket">
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="80%" height="40%" stroke="#3c8bf7" stroke-width="2" fill="none"/>
      <text x="10" y="15" font-size="18" font-family="Arial" fill="#2c3e50">Definition:</text>
      <text x="10" y="30" font-size="18" font-family="Arial" fill="#2c3e50">A datagram socket is a type of socket that allows for the transmission of data between two devices without guarantee of delivery or order of delivery.</text>
      <animate transform="rotate(360 35 35)" dur="2000" repeatCount="indefinite" begin="0s"/>
    </g>
  </section>
  <section data-narration="Client/Server Architecture">
    <g transform="translate(20, 130)">
      <rect x="0" y="0" width="80%" height="40%" stroke="#3c8bf7" stroke-width="2" fill="none"/>
      <text x="10" y="15" font-size="18" font-family="Arial" fill="#2c3e50">Definition:</text>
      <text x="10" y="30" font-size="18" font-family="Arial" fill="#2c3e50">A client-server architecture is a type of architecture where one device (the server) provides a service to multiple devices (the clients).</text>
      <text x="10" y="50" font-size="18" font-family="Arial" fill="#2c3e50">Components:</text>
      <text x="10" y="65" font-size="18" font-family="Arial" fill="#2c3e50">Server: The server is the device that provides the service.</text>
      <text x="10" y="80" font-size="18" font-family="Arial" fill="#2c3e50">Client: The client is the device that requests the service.</text>
      <animate transform="rotate(360 35 35)" dur="2000" repeatCount="indefinite" begin="0s"/>
    </g>
  </section>
  <section data-narration="Programming the Client/Server Program">
    <g transform="translate(20, 180)">
      <rect x="0" y="0" width="80%" height="40%" stroke="#3c8bf7" stroke-width="2" fill="none"/>
      <text x="10" y="15" font-size="18" font-family="Arial" fill="#2c3e50">Steps:</text>
      <text x="10" y="30" font-size="18" font-family="Arial" fill="#2c3e50">Create a server program that listens for incoming datagrams.</text>
      <text x="10" y="50" font-size="18" font-family="Arial" fill="#2c3e50">Create a client program that sends datagrams to the server.</text>
      <animate transform="rotate(360 35 35)" dur="2000" repeatCount="indefinite" begin="0s"/>
    </g>
  </section>
  <section data-narration="Example Code">
    <g transform="translate(20, 230)">
      <rect x="0" y="0" width="80%" height="40%" stroke="#3c8bf7" stroke-width="2" fill="none"/>
      <text x="10" y="15" font-size="18" font-family="Arial" fill="#2c3e50">Server Program:</text>
      <text x="10" y="30" font-size="18" font-family="Arial" fill="#2c3e50">```c
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <sys/socket.h>
```
      <text x="10" y="50" font-size="18" font-family="Arial" fill="#2c3e50">Client Program:</text>
      <text x="10" y="65" font-size="18" font-family="Arial" fill="#2c3e50">```c
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <sys/socket.h>
```
