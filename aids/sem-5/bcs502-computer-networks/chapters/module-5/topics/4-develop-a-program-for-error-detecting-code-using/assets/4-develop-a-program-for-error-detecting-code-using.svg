<svg width="420" height="400" data-topic-id="crc-ccitt-16-bits-error-detecting-code-program"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background: #64BFFF; background-image: linear-gradient(to bottom, #C7E8F4, #C7E8F4); background-size: 100% 100%;">
  <title>CRC-CCITT (16-bits) Error Detecting Code Program</title>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E8F4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#pastel-gradient); opacity: 0.5;"/>
  <rect x="10" y="10" width="400" height="380" style="fill: #E0E0E0; opacity: 0.2;"/>
  <rect x="10" y="10" width="400" height="380" style="fill: #F7DC6F; opacity: 0.1;"/>

  <!-- Section 1: What is CRC -->
  <rect x="20" y="30" width="150" height="50" style="fill: #C7E8F4; border: 1px solid #E0E0E0;"/>
  <text x="25" y="45" style="font-size: 24px; font-weight: bold; fill: #333333;">What is CRC?</text>
  <text x="25" y="65" style="font-size: 18px; fill: #666666;">CRC (Cyclic Redundancy Check) is a digital error detection algorithm that uses mathematical calculations to detect errors in data transmission.</text>
  <animateTransform attributeName="transform" type="translate" from="0,30" to="0,40" begin="0s" dur="2s"/>
  <animateTransform attributeName="transform" type="translate" from="0,30" to="0,50" begin="2s" dur="2s"/>

  <!-- Section 2: How CRC Works -->
  <rect x="20" y="80" width="150" height="50" style="fill: #C7E8F4; border: 1px solid #E0E0E0;"/>
  <text x="25" y="95" style="font-size: 24px; font-weight: bold; fill: #333333;">How CRC Works</text>
  <text x="25" y="115" style="font-size: 18px; fill: #666666;">The CRC algorithm works as follows:</text>
  <text x="25" y="135" style="font-size: 18px; fill: #666666;">1. Data Preparation: The data to be transmitted is divided into 8-bit blocks.</text>
  <text x="25" y="155" style="font-size: 18px; fill: #666666;">2. Polynomial Evaluation: Each block is evaluated using a polynomial equation, which generates a binary representation of the data.</text>
  <text x="25" y="175" style="font-size: 18px; fill: #666666;">3. Checksum Generation: The binary representation of the data is then XORed with a predefined polynomial to generate a checksum value.</text>
  <text x="25" y="195" style="font-size: 18px; fill: #666666;">4. Checksum Verification: The received checksum value is compared to the generated checksum value to detect errors.</text>
  <animateTransform attributeName="transform" type="translate" from="0,80" to="0,90" begin="0s" dur="2s"/>
  <animateTransform attributeName="transform" type="translate" from="0,80" to="0,100" begin="2s" dur="2s"/>

  <!-- Section 3: CRC-CCITT (16-bits) Implementation -->
  <rect x="20" y="230" width="150" height="50" style="fill: #C7E8F4; border: 1px solid #E0E0E0;"/>
  <text x="25" y="245" style="font-size: 24px; font-weight: bold; fill: #333333;">CRC-CCITT (16-bits) Implementation</text>
  <text x="25" y="265" style="font-size: 18px; fill: #666666;">The CRC-CCITT (16-bits) algorithm is a specific implementation of the CRC algorithm that uses a 16-bit polynomial.</text>
  <text x="25" y="285" style="font-size: 18px; fill: #666666;">The polynomial used in this implementation is:</text>
  <text x="25" y="305" style="font-size: 18px; fill: #666666;">x^16 + x^12 + x^11 + x^10 + x^8 + x^7 + x^5 + x^4 + x^2 + x + 1</text>
  <animateTransform attributeName="transform" type="translate" from="0,230" to="0,240" begin="0s" dur="2s"/>
  <animateTransform attributeName="transform" type="translate" from="0,230" to="0,250" begin="2s" dur="2s"/>

  <!-- Section 4: Program Implementation -->
  <rect x="20" y="310" width="150" height="50" style="fill: #C7E8F4; border: 1px solid #E0E0E0;"/>
  <text x="25" y="325" style="font-size: 24px; font-weight: bold; fill: #333333;">Program Implementation</text>
  <text x="25" y="345" style="font-size: 18px; fill: #666666;">Below is a Python program that implements the CRC-CCITT (16-bits) algorithm:</text>
  <pre style="font-size: 18px; fill: #666666;">def crc_ccitt(data):    polynomial = 0x1021  # 16-bit polynomial    checksum = 0xFFFF  # 16-bit checksum</pre>
  <text x="25" y="365" style="font-size: 18px; fill: #666666;">    for i in range(len(data)):        checksum ^= data[i]</text>
  <text x="25" y="385" style="font-size: 18px; fill: #666666;">    for i in range(15, -1, -1):        if (checksum & (1 << i)) != 0:            checksum ^= polynomial</text>
  <text x="25" y="405" style="font-size: 18px; fill: #666666;">    return checksum & 0xFFFF  # return 16-bit checksum</text>
  <animateTransform attributeName="transform" type="translate" from="0,310" to="0,320" begin="0s" dur="2s"/>
  <animateTransform attributeName="transform" type="translate" from="0,310" to="0,330" begin="2s" dur="2s"/>

  <!-- Section 5: Example Usage -->
  <rect x="20" y="410" width="150" height="50" style="fill: #C7E8F4; border: 1px solid #E0E0E0;"/>
  <text x="25" y="425" style="font-size: 24px; font-weight: bold; fill: #333333;">Example Usage</text>
  <text x="25" y="445" style="font-size: 18px; fill: #666666;">Data: b'\x01\x02\x03\x04\x05\x06\x07\x08'</text>
  <text x="25" y="465" style="font-size: 18px; fill: #666666;">Checks = crc_ccitt(b'\x01\x02\x03\x04\x05\x06\x07\x08')</text>
  <text x="25" y="485" style="font-size: 18px; fill: #666666;">Output: 0x0000</text>
  <animateTransform attributeName="transform" type="translate" from="0,410" to="0,420" begin="0s" dur="2s"/>
  <animateTransform attributeName="transform" type="translate" from="0,410" to="0,430" begin="2s" dur="2s"/>

  <!-- Footer -->
  <rect x="10" y="390" width="400" height="10" style="fill: #F7DC6F; border: 1px solid #E0E0E0;"/>
  <text x="15" y="395" style="font-size: 18px; fill: #333333;">CRC-CCITT (16-bits) Error Detecting Code Program</text>
</svg>