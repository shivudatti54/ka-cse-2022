<svg width="420" height="400" data-topic-id="datagram-introduction-routing-algorithms-unicast-routing-protocols">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a288a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4697c9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" fill="url(#grad)"/>
  <title>Datagram Introduction to Routing Algorithms Unicast</title>
  <g id="layer0">
    <text x="10" y="50" fill="#ffffff" font-size="24" font-family="Arial, sans-serif" text-anchor="start" data-narration="What is a Datagram?">What is a Datagram?</text>
    <rect x="15" y="70" width="350" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,70" dur="0.5"/>
    <text x="15" y="80" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">A datagram is a self-contained unit of data that contains the source and destination addresses, as well as other relevant information.</text>
    <rect x="20" y="100" width="330" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,80" to="0,100" dur="0.5"/>
    <text x="20" y="110" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">It is a single, independent packet of data that can be transmitted over a network.</text>
  </g>
  <g id="layer1">
    <rect x="10" y="190" width="400" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,190" to="0,210" dur="0.5"/>
    <text x="15" y="200" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Characteristics of a Datagram">Characteristics of a Datagram</text>
    <rect x="20" y="220" width="330" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,220" to="0,240" dur="0.5"/>
    <text x="20" y="230" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">A datagram is not guaranteed to be delivered to the destination.</text>
    <text x="20" y="250" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">However, datagram protocols aim to deliver packets to the destination in the best possible way.</text>
  </g>
  <g id="layer2">
    <rect x="10" y="330" width="400" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,330" to="0,350" dur="0.5"/>
    <text x="15" y="340" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Introduction to Routing Algorithms">Introduction to Routing Algorithms</text>
    <rect x="20" y="360" width="330" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,360" to="0,380" dur="0.5"/>
    <text x="20" y="370" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Routing algorithms are used to determine the best path for forwarding packets between nodes on a network.</text>
  </g>
  <g id="layer3">
    <rect x="10" y="460" width="400" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,460" to="0,480" dur="0.5"/>
    <text x="15" y="470" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Types of Routing Algorithms">Types of Routing Algorithms</text>
    <rect x="20" y="490" width="330" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,490" to="0,510" dur="0.5"/>
    <text x="20" y="500" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">There are three main types of routing algorithms: distance-vector, link-state, and path-vector.</text>
  </g>
  <g id="layer4">
    <rect x="10" y="590" width="400" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,590" to="0,610" dur="0.5"/>
    <text x="15" y="600" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Distance-Vector Routing Algorithms">Distance-Vector Routing Algorithms</text>
    <rect x="20" y="620" width="330" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,620" to="0,640" dur="0.5"/>
    <text x="20" y="630" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">These algorithms use the distance from the source node to calculate the shortest path.</text>
  </g>
  <g id="layer5">
    <rect x="10" y="710" width="400" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,710" to="0,730" dur="0.5"/>
    <text x="15" y="720" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Link-State Routing Algorithms">Link-State Routing Algorithms</text>
    <rect x="20" y="740" width="330" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,740" to="0,760" dur="0.5"/>
    <text x="20" y="750" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">These algorithms maintain a map of the network topology and use this information to calculate the shortest path.</text>
  </g>
  <g id="layer6">
    <rect x="10" y="810" width="400" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,810" to="0,830" dur="0.5"/>
    <text x="15" y="820" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Path-Vector Routing Algorithms">Path-Vector Routing Algorithms</text>
    <rect x="20" y="840" width="330" height="10" fill="#ffffff" rx="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,840" to="0,860" dur="0.5"/>
    <text x="20" y="850" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start">These algorithms use a combination of distance-vector and link-state algorithms to calculate the shortest path.</text>
  </g>
  <rect x="10" y="450" width="400" height="10" fill="#000000" rx="2"/>
  <animateTransform attributeName="transform" type="translate" from="0,450" to="0,470" dur="0.5"/>
  <text x="15" y="460" fill="#ffffff" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Datagram Introduction to Routing Algorithms Unicast</text>
  <rect x="10" y="390" width="400" height="10" fill="#ffffff" rx="2"/>
  <animateTransform attributeName="transform" type="translate" from="0,390" to="0,410" dur="0.5"/>
  <text x="15" y="400" fill="#000000" font-size="18" font-family="Arial, sans-serif" text-anchor="start" data-narration="Footer">Footer</text>
</svg>