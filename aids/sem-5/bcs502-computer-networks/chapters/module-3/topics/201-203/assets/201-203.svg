<svg width="420" height="400" data-topic-id="network-layer-services-203" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7aadba" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Network Layer Services</title>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 20)">
    <rect width="80" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="The network layer is the fourth layer of the OSI model and is responsible for providing various services to ensure reliable and efficient communication between devices on different networks.">
      Network Layer
    </text>
  </g>
  <g transform="translate(10, 70)">
    <rect width="80" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="The network layer is responsible for routing packets between different networks. It uses routing tables to forward packets to their final destination.">
      Routing
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 140)">
    <rect width="80" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="When a packet is larger than the maximum size of a network segment, the network layer breaks it into smaller fragments and reassembles them at the receiving end.">
      Fragmentation
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 210)">
    <rect width="80" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="The network layer uses error detection and correction mechanisms such as checksums and CRCs to ensure that packets are delivered error-free.">
      Error Detection and Correction
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 270)">
    <rect width="80" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="The network layer multiplexes multiple data streams onto a single communication channel and demultiplexes them at the receiving end.">
      Multiplexing and Demultiplexing
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,160" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(150, 20)">
    <rect width="80" height="40" fill="#0097a7" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="IP is the primary protocol used for routing packets between different networks. It assigns a unique IP address to each device on a network.">
      IP
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(150, 70)">
    <rect width="80" height="40" fill="#0097a7" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="ICMP is used for error-reporting and diagnostic functions at the network layer.">
      ICMP
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(150, 140)">
    <rect width="80" height="40" fill="#0097a7" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="IGMP is used for multicasting, which allows multiple devices to receive a single packet.">
      IGMP
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 340)">
    <rect width="100%" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="Packet switching is a technique used by the network layer to transmit data in small packets between devices on different networks.">
      Packet Switching
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,160" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 390)">
    <rect width="100%" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="Packetization is the process of breaking data into small packets, each with a header that contains control information.">
      Packetization
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 440)">
    <rect width="100%" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="Switching is the process of routing packets between devices based on their destination addresses.">
      Switching
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,240" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 490)">
    <rect width="100%" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="Store-and-forward is the process of storing packets in a buffer until they are processed by the next device in the path.">
      Store-and-Forward
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,280" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(250, 20)">
    <rect width="80" height="40" fill="#0097a7" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="The advantages of packet switching include increased efficiency, flexibility, and scalability.">
      Advantages
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(250, 70)">
    <rect width="80" height="40" fill="#0097a7" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="Packet switching allows for multiple data streams to be multiplexed onto a single communication channel, increasing network efficiency.">
      Multiplexing
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(250, 140)">
    <rect width="80" height="40" fill="#0097a7" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="Demultiplexing allows for multiple data streams to be separated and delivered to their intended recipients.">
      Demultiplexing
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(250, 210)">
    <rect width="80" height="40" fill="#0097a7" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="The disadvantages of packet switching include increased delay and increased complexity.">
      Disadvantages
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,160" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 380)">
    <rect width="100%" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="In conclusion, the network layer plays a vital role in ensuring reliable and efficient communication between devices on different networks.">
      Conclusion
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,240" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 430)">
    <rect width="100%" height="40" fill="#007bff" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#ffffff" data-narration="By understanding the key functions and protocols of the network layer, individuals can better appreciate the complexities of modern communication networks.">
      Understanding the Network Layer
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,280" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>
</svg>