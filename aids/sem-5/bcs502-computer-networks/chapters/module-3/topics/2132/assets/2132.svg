<svg width="420" height="400" data-topic-id="21.3.2" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .pastel-1 { fill: #C9E4CA; }
    .pastel-2 { fill: #87CEEB; }
    .pastel-3 { fill: #FFC107; }
  </style>
  <rect x="0" y="0" width="420" height="400" style="fill:rgba(157, 206, 235, 0.2)" />
  <rect x="0" y="20" width="420" height="40" style="fill:rgba(157, 206, 235, 0.5)" />
  <text x="10" y="60" font-size="24" font-family="Arial" fill="#2E4053">Network Layer Services</text>
  <rect x="0" y="100" width="420" height="200" style="fill:rgba(157, 206, 235, 0.2)" />
  <rect x="0" y="130" width="300" height="70" style="fill:rgba(157, 206, 235, 0.5)" />
  <rect x="0" y="220" width="420" height="80" style="fill:rgba(157, 206, 235, 0.2)" />
  <rect x="0" y="260" width="300" height="50" style="fill:rgba(157, 206, 235, 0.5)" />
  <rect x="0" y="320" width="420" height="40" style="fill:rgba(157, 206, 235, 0.2)" />
  <text x="10" y="360" font-size="18" font-family="Arial" fill="#2E4053">Error Detection and Correction</text>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" dur="2s" begin="0s" />
  <text x="10" y="100" font-size="18" font-family="Arial" fill="#2E4053" data-narration="The Network Layer is responsible for routing data between networks. It uses routing tables to determine the best path for data to take between networks.">
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0s" />
  </text>
  <g transform="translate(120 100)">
    <path d="M 20 20 L 340 20" stroke="#2E4053" stroke-width="2" fill="none" />
    <text x="20" y="20" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Routing">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0s" />
    </text>
    <text x="20" y="40" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Fragmentation">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.8s" />
    </text>
    <text x="20" y="60" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Reassembly">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.6s" />
    </text>
    <text x="20" y="80" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Error Detection and Correction">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="2.4s" />
    </text>
    <path d="M 20 20 L 340 20" stroke="#2E4053" stroke-width="2" fill="none" />
  </g>
  <g transform="translate(120 220)">
    <circle cx="40" cy="40" r="20" fill="#87CEEB" />
    <text x="40" y="40" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Packet Switching">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0s" />
    </text>
    <path d="M 40 40 L 280 40" stroke="#2E4053" stroke-width="2" fill="none" />
    <g transform="translate(200 220)">
      <rect x="0" y="0" width="100" height="20" style="fill:rgba(157, 206, 235, 0.2)" />
      <text x="10" y="10" font-size="14" font-family="Arial" fill="#2E4053" data-narration="Packet Switching">
        <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0s" />
      </text>
      <path d="M 10 10 L 110 10" stroke="#2E4053" stroke-width="2" fill="none" />
    </g>
  </g>
  <g transform="translate(220 320)">
    <rect x="0" y="0" width="100" height="20" style="fill:rgba(157, 206, 235, 0.2)" />
    <text x="10" y="10" font-size="14" font-family="Arial" fill="#2E4053" data-narration="IPv4 Address">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0s" />
    </text>
    <path d="M 10 10 L 110 10" stroke="#2E4053" stroke-width="2" fill="none" />
  </g>
  <g transform="translate(0 0)">
    <rect x="0" y="380" width="420" height="20" style="fill:rgba(157, 206, 235, 0.2)" />
    <text x="10" y="390" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Conclusion">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0s" />
    </text>
  </g>
</svg>