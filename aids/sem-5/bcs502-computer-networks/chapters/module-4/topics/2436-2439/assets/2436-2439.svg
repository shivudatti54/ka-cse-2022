<svg width="420" height="400" data-topic-id="transport-layer-protocols">
  <title>Transport Layer Protocols</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e24aa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7a288a" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="gradient-radial" cx="50%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#0a1a4a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1793d0" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <style>
    .section {
      margin-bottom: 20px;
    }
    .section:first-child {
      border-bottom: 1px solid #ccc;
    }
    .connection {
      stroke: #fff;
      stroke-width: 2;
      stroke-dasharray: 3,3;
      fill: none;
    }
  </style>
  <g fill="url(#gradient)">
    <rect x="0" y="0" width="420" height="400"/>
  </g>
  <g transform="translate(10,10)">
    <rect width="400" height="360"/>
    <text x="10" y="20" font-size="24" font-family="Arial" fill="#fff">
      Transport Layer Protocols
    </text>
    <text x="10" y="60" font-size="18" font-family="Arial" fill="#fff">
      24.3.6-24.3.9
    </text>
    <section data-narration="connection-oriented-transport">
      <rect x="10" y="80" width="350" height="150"/>
      <rect x="10" y="80" width="50" height="150" rx="5" fill="#7a288a"/>
      <text x="15" y="100" font-size="16" font-family="Arial" fill="#fff" transform="rotate(45,15,100)">
        Connection-Oriented Transport
      </text>
      <text x="15" y="110" font-size="14" font-family="Arial" fill="#fff" transform="rotate(45,15,110)">
        Establishes a connection before data transfer begins
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0,15,100" to="360,15,100" dur="10s" begin="0s" repeatCount="indefinite"/>
    </section>
    <section data-narration="connectionless-transport">
      <rect x="10" y="240" width="350" height="150"/>
      <rect x="10" y="240" width="50" height="150" rx="5" fill="#7a288a"/>
      <text x="15" y="260" font-size="16" font-family="Arial" fill="#fff" transform="rotate(45,15,260)">
        Connectionless Transport
      </text>
      <text x="15" y="270" font-size="14" font-family="Arial" fill="#fff" transform="rotate(45,15,270)">
        Does not establish a connection before data transfer begins
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0,15,260" to="360,15,260" dur="10s" begin="1s" repeatCount="indefinite"/>
    </section>
    <section data-narration="connection-establishment">
      <rect x="10" y="80" width="350" height="150"/>
      <rect x="10" y="80" width="50" height="150" rx="5" fill="#8e24aa"/>
      <text x="15" y="100" font-size="16" font-family="Arial" fill="#fff" transform="rotate(45,15,100)">
        Connection Establishment
      </text>
      <text x="15" y="110" font-size="14" font-family="Arial" fill="#fff" transform="rotate(45,15,110)">
        Request sent by Device A to Device B
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0,15,100" to="360,15,100" dur="10s" begin="0s" repeatCount="indefinite"/>
      <text x="15" y="120" font-size="14" font-family="Arial" fill="#fff" transform="rotate(45,15,120)">
        Connection established by Device B
      </text>
    </section>
    <section data-narration="connection-maintenance">
      <rect x="10" y="240" width="350" height="150"/>
      <rect x="10" y="240" width="50" height="150" rx="5" fill="#7a288a"/>
      <text x="15" y="260" font-size="16" font-family="Arial" fill="#fff" transform="rotate(45,15,260)">
        Connection Maintenance
      </text>
      <text x="15" y="270" font-size="14" font-family="Arial" fill="#fff" transform="rotate(45,15,270)">
        Connection maintained throughout data transfer process
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0,15,260" to="360,15,260" dur="10s" begin="1s" repeatCount="indefinite"/>
    </section>
    <section data-narration="error-free-transfer">
      <rect x="10" y="80" width="350" height="150"/>
      <rect x="10" y="80" width="50" height="150" rx="5" fill="#1793d0"/>
      <text x="15" y="100" font-size="16" font-family="Arial" fill="#fff" transform="rotate(45,15,100)">
        Error-Free Transfer
      </text>
      <text x="15" y="110" font-size="14" font-family="Arial" fill="#fff" transform="rotate(45,15,110)">
        Ensures data is delivered in correct order without duplication or loss
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0,15,100" to="360,15,100" dur="10s" begin="0s" repeatCount="indefinite"/>
    </section>
    <section data-narration="reliable-data-transfer">
      <rect x="10" y="240" width="350" height="150"/>
      <rect x="10" y="240" width="50" height="150" rx="5" fill="#1793d0"/>
      <text x="15" y="260" font-size="16" font-family="Arial" fill="#fff" transform="rotate(45,15,260)">
        Reliable Data Transfer
      </text>
      <text x="15" y="270" font-size="14" font-family="Arial" fill="#fff" transform="rotate(45,15,270)">
        Ensures data is delivered reliably and without errors
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0,15,260" to="360,15,260" dur="10s" begin="1s" repeatCount="indefinite"/>
    </section>
  </g>
  <g transform="translate(40,40)">
    <rect width="100" height="20" fill="#fff" rx="5"/>
    <text x="0" y="5" font-size="12" font-family="Arial" fill="#333">
      Data Topic ID
    </text>
    <text x="10" y="5" font-size="12" font-family="Arial" fill="#333">
      <tspan data-narration="data-topic-id">transport-layer-protocols</tspan>
    </text>
  </g>
  <g transform="translate(40,80)">
    <rect width="100" height="20" fill="#fff" rx="5"/>
    <text x="0" y="5" font-size="12" font-family="Arial" fill="#333">
      Footer
    </text>
  </g>
</svg>