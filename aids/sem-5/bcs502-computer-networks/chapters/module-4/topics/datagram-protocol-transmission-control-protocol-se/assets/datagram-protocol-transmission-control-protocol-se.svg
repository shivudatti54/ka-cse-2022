<svg width="420" height="400" data-topic-id="datagram-protocol-transmission-control-protocol-se">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E4D6F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Data Datagram Protocol Transmission Control Protocol</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <text x="15" y="20" font-size="24" fill="#2F4F7F">Datagram Protocol</text>
  <text x="15" y="50" font-size="18" fill="#2F4F7F">Transmission Control Protocol</text>
  <section data-narration="Introduction">
    <rect x="10" y="80" width="380" height="20" fill="#F7F7F7"/>
    <text x="15" y="90" font-size="16" fill="#333333">Introduction</text>
    <animateTransform attributeName="transform" type="rotate" from="0 360 180" to="360 360 180" dur="4s" begin="0s"/>
  </section>
  <section data-narration="Datagram Protocol">
    <rect x="10" y="110" width="380" height="30" fill="#F7F7F7"/>
    <rect x="10" y="141" width="100" height="20" fill="#87CEEB" rx="10"/>
    <text x="120" y="150" font-size="16" fill="#333333">Connectionless Protocol</text>
    <text x="120" y="170" font-size="16" fill="#333333">No Error-checking or Correction</text>
    <text x="120" y="190" font-size="16" fill="#333333">No Flow Control</text>
    <text x="120" y="210" font-size="16" fill="#333333">Fast Transmission</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 180" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="rotate" from="0 360 180" to="360 360 180" dur="2s" begin="2s"/>
  </section>
  <section data-narration="Transmission Control Protocol">
    <rect x="10" y="241" width="380" height="30" fill="#F7F7F7"/>
    <rect x="10" y="272" width="100" height="20" fill="#2F4F7F" rx="10"/>
    <text x="120" y="282" font-size="16" fill="#333333">Connection-oriented Protocol</text>
    <text x="120" y="302" font-size="16" fill="#333333">Error-checking and Correction</text>
    <text x="120" y="322" font-size="16" fill="#333333">Flow Control</text>
    <text x="120" y="342" font-size="16" fill="#333333">Reliable Data Transfer</text>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 330" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="rotate" from="0 360 180" to="360 360 180" dur="2s" begin="2s"/>
  </section>
  <section data-narration="Segments and TCP Connections">
    <rect x="10" y="363" width="380" height="30" fill="#F7F7F7"/>
    <rect x="10" y="394" width="100" height="20" fill="#E4D6F5" rx="10"/>
    <text x="120" y="404" font-size="16" fill="#333333">Source Port Number</text>
    <text x="120" y="424" font-size="16" fill="#333333">Destination Port Number</text>
    <text x="120" y="444" font-size="16" fill="#333333">Sequence Number</text>
    <text x="120" y="464" font-size="16" fill="#333333">Acknowledgment Number</text>
    <text x="120" y="484" font-size="16" fill="#333333">Data</text>
    <animateTransform attributeName="transform" type="translate" from="0 410" to="0 440" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="rotate" from="0 360 180" to="360 360 180" dur="2s" begin="2s"/>
  </section>
  <section data-narration="Flow Control, Error Control, and Congestion Control">
    <rect x="10" y="515" width="380" height="30" fill="#F7F7F7"/>
    <rect x="10" y="546" width="100" height="20" fill="#87CEEB" rx="10"/>
    <text x="120" y="556" font-size="16" fill="#333333">Flow Control</text>
    <text x="120" y="576" font-size="16" fill="#333333">Error Control</text>
    <text x="120" y="596" font-size="16" fill="#333333">Congestion Control</text>
    <animateTransform attributeName="transform" type="translate" from="0 570" to="0 600" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="rotate" from="0 360 180" to="360 360 180" dur="2s" begin="2s"/>
  </section>
  <footer>
    <rect x="10" y="620" width="400" height="30" fill="#F7F7F7"/>
    <text x="15" y="630" font-size="18" fill="#333333">Data Datagram Protocol Transmission Control Protocol</text>
  </footer>
</svg>