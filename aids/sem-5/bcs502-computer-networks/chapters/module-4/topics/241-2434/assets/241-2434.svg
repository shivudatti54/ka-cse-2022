<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="transport-layer-services-241-2434">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7386d8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ed" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2e64ff" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        background: url(#gradient) no-repeat;
        padding: 20px;
        margin-bottom: 20px;
        border: 1px solid #fff;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .section.animate {
        animation: animate 2s forwards;
      }
      @keyframes animate {
        0% {
          transform: translateY(-20px);
        }
        50% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(20px);
        }
      }
    </style>
  </defs>
  <text x="10" y="10" font-size="24" fill="#fff">Transport Layer Services</text>
  <g id="connection-establishment">
    <rect x="20" y="20" width="300" height="100" rx="10" fill="#fff" data-narration="Connection establishment is the process of setting up a connection between two devices before data transfer can occur. This involves the exchange of control packets between the devices to establish a connection." class="section">
      <animate begin="0s" duration="2s" repeat="indefinite" attributeName="opacity" from="0" to="1"/>
      <animate begin="0.5s" duration="2s" repeat="indefinite" attributeName="opacity" from="1" to="0"/>
      <path d="M 20 20 L 60 30" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
      <path d="M 300 20 L 300 30" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
    </rect>
    <text x="50" y="50" font-size="18" fill="#2e64ff">Connection Establishment</text>
  </g>
  <g id="connection-termination">
    <rect x="20" y="140" width="300" height="100" rx="10" fill="#fff" data-narration="Connection termination is the process of breaking down the connection between two devices after data transfer is complete. This involves the exchange of control packets between the devices to terminate the connection." class="section">
      <animate begin="0s" duration="2s" repeat="indefinite" attributeName="opacity" from="0" to="1"/>
      <animate begin="0.5s" duration="2s" repeat="indefinite" attributeName="opacity" from="1" to="0"/>
      <path d="M 20 140 L 60 150" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
      <path d="M 300 140 L 300 150" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
    </rect>
    <text x="50" y="170" font-size="18" fill="#2e64ff">Connection Termination</text>
  </g>
  <g id="data-segmentation">
    <rect x="20" y="240" width="300" height="100" rx="10" fill="#fff" data-narration="Data segmentation is the process of breaking down large data packets into smaller packets before transmission. This is necessary because the Transmission Control Protocol (TCP) requires that data packets be of a specific size to ensure reliable transmission." class="section">
      <animate begin="0s" duration="2s" repeat="indefinite" attributeName="opacity" from="0" to="1"/>
      <animate begin="0.5s" duration="2s" repeat="indefinite" attributeName="opacity" from="1" to="0"/>
      <path d="M 20 240 L 60 250" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
      <path d="M 300 240 L 300 250" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
    </rect>
    <text x="50" y="270" font-size="18" fill="#2e64ff">Data Segmentation</text>
  </g>
  <g id="error-detection-correction">
    <rect x="20" y="340" width="300" height="100" rx="10" fill="#fff" data-narration="Error detection and correction are essential functions of the Transport Layer. These functions involve detecting errors in data packets and correcting them before transmission." class="section">
      <animate begin="0s" duration="2s" repeat="indefinite" attributeName="opacity" from="0" to="1"/>
      <animate begin="0.5s" duration="2s" repeat="indefinite" attributeName="opacity" from="1" to="0"/>
      <path d="M 20 340 L 60 350" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
      <path d="M 300 340 L 300 350" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
    </rect>
    <text x="50" y="360" font-size="18" fill="#2e64ff">Error Detection and Correction</text>
  </g>
  <rect x="20" y="10" width="300" height="40" rx="10" fill="#fff" data-narration="Keys Concepts: segmented data, control packets, and reliable data transfer." class="section">
    <animate begin="0s" duration="2s" repeat="indefinite" attributeName="opacity" from="0" to="1"/>
    <animate begin="0.5s" duration="2s" repeat="indefinite" attributeName="opacity" from="1" to="0"/>
    <path d="M 20 10 L 60 20" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
    <path d="M 300 10 L 300 20" fill="#2e64ff" stroke="#fff" stroke-width="2"/>
  </rect>
  <text x="50" y="30" font-size="18" fill="#2e64ff">Key Concepts</text>
  <path d="M 120 10 L 120 30" fill="#6495ed" stroke="#fff" stroke-width="2"/>
  <text x="150" y="30" font-size="18" fill="#6495ed">Segmented Data</text>
  <path d="M 220 10 L 220 30" fill="#6495ed" stroke="#fff" stroke-width="2"/>
  <text x="240" y="30" font-size="18" fill="#6495ed">Control Packets</text>
  <path d="M 300 10 L 300 30" fill="#6495ed" stroke="#fff" stroke-width="2"/>
  <text x="320" y="30" font-size="18" fill="#6495ed">Reliable Data Transfer</text>
  <rect x="20" y="360" width="300" height="40" rx="10" fill="#fff" class="footer">
    <text x="10" y="10" font-size="18" fill="#fff">Disclaimer: The information provided in this diagram is for educational purposes only and may not be comprehensive or up-to-date.</text>
  </rect>
</svg>