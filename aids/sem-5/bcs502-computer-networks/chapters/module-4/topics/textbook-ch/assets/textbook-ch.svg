<svg width="420" height="400" data-topic-id="transport-layer" xmlns="http://www.w3.org/2000/svg">
  <desc>Transport Layer Diagram</desc>
  <title>Transport Layer</title>
  <footer>Transport Layer</footer>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A88D8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4BC0C5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" opacity="0.5"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="420,0" dur="5s" repeatCount="indefinite"/>
  <g id="transport-layer-diagram">
    <text x="20" y="20" font-size="24" fill="#FFC107" text-anchor="start">Transport Layer</text>
    <text x="20" y="60" font-size="18" fill="#4BC0C5" text-anchor="start">Connection Establishment</text>
    <rect x="100" y="80" width="100" height="20" fill="#4BC0C5" opacity="0.5" rx="5" data-narration="Connection establishment involves setting up a connection between a sender and receiver before data transfer." data-topic-id="transport-layer-connection-establishment"/>
    <animateTransform attributeName="transform" type="translate" from="140,100" to="240,100" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="150" font-size="18" fill="#FFC107" text-anchor="start">Connection Termination</text>
    <rect x="100" y="170" width="100" height="20" fill="#4BC0C5" opacity="0.5" rx="5" data-narration="Connection termination involves closing the connection after data transfer is complete." data-topic-id="transport-layer-connection-termination"/>
    <animateTransform attributeName="transform" type="translate" from="140,170" to="240,170" dur="2s" repeatCount="indefinite"/>
    <g id="tcp">
      <rect x="100" y="220" width="100" height="20" fill="#8BC34A" opacity="0.5" rx="5" data-narration="TCP guarantees reliable data transfer by ensuring ordered delivery, error-checking, and flow control." data-topic-id="tcp-features"/>
      <animateTransform attributeName="transform" type="translate" from="160,220" to="260,220" dur="2s" repeatCount="indefinite"/>
      <line x1="140" y1="240" x2="240" y2="240" stroke="#FFC107" stroke-width="2" stroke-dasharray="3,3" data-topic-id="tcp-features"/>
      <line x1="140" y1="240" x2="220" y2="240" stroke="#FFC107" stroke-width="2" stroke-dasharray="3,3" data-topic-id="tcp-features"/>
      <line x1="140" y1="240" x2="320" y2="240" stroke="#FFC107" stroke-width="2" stroke-dasharray="3,3" data-topic-id="tcp-features"/>
      <rect x="320" y="240" width="100" height="20" fill="#8BC34A" opacity="0.5" rx="5" data-narration="TCP also regulates the amount of data that can be sent at one time to prevent network congestion." data-topic-id="tcp-flow-control"/>
      <animateTransform attributeName="transform" type="translate" from="360,240" to="460,240" dur="2s" repeatCount="indefinite"/>
    </g>
    <g id="udp">
      <rect x="100" y="280" width="100" height="20" fill="#FF9800" opacity="0.5" rx="5" data-narration="UDP provides fast data transfer but does not guarantee reliable delivery or flow control." data-topic-id="udp-features"/>
      <animateTransform attributeName="transform" type="translate" from="140,280" to="240,280" dur="2s" repeatCount="indefinite"/>
      <line x1="140" y1="290" x2="240" y2="290" stroke="#FFC107" stroke-width="2" stroke-dasharray="3,3" data-topic-id="udp-features"/>
      <line x1="140" y1="290" x2="220" y2="290" stroke="#FFC107" stroke-width="2" stroke-dasharray="3,3" data-topic-id="udp-features"/>
      <line x1="140" y1="290" x2="320" y2="290" stroke="#FFC107" stroke-width="2" stroke-dasharray="3,3" data-topic-id="udp-features"/>
      <rect x="320" y="290" width="100" height="20" fill="#FF9800" opacity="0.5" rx="5" data-narration="UDP is commonly used for online gaming, VoIP, and streaming media." data-topic-id="udp-applications"/>
      <animateTransform attributeName="transform" type="translate" from="360,290" to="460,290" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
  <g id="legend">
    <rect x="20" y="380" width="20" height="20" fill="#4BC0C5" opacity="0.5"/>
    <text x="50" y="390" font-size="18" fill="#FFC107" text-anchor="start">TCP</text>
    <rect x="100" y="380" width="20" height="20" fill="#8BC34A" opacity="0.5"/>
    <text x="130" y="390" font-size="18" fill="#FFC107" text-anchor="start">TCP Features</text>
    <rect x="320" y="380" width="20" height="20" fill="#FF9800" opacity="0.5"/>
    <text x="350" y="390" font-size="18" fill="#FFC107" text-anchor="start">UDP</text>
    <rect x="100" y="420" width="20" height="20" fill="#7A88D8" opacity="0.5"/>
    <text x="130" y="430" font-size="18" fill="#FFC107" text-anchor="start">Connection Establishment</text>
    <rect x="320" y="420" width="20" height="20" fill="#FF9800" opacity="0.5"/>
    <text x="350" y="430" font-size="18" fill="#FFC107" text-anchor="start">UDP Features</text>
  </g>
</svg>