<svg width="420" height="400" data-topic-id="21-23">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A7A9C2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#2E4053">
    Data Representation and Network Topology
  </text>
  
  <!-- Section 1: Binary Representation -->
  <rect x="50%" y="70%" width="200%" height="50%" fill="#F7F7F7" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 200 25" to="360 200 25" dur="2000" begin="0s" delay="0.5s" />
  <text x="50%" y="100%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration="Binary representation uses only two digits: 0 and 1." />
  <text x="50%" y="120%" font-size="14" text-anchor="middle" fill="#8E44AD">Bit</text>
  <text x="50%" y="140%" font-size="14" text-anchor="middle" fill="#8E44AD">Byte</text>
  
  <!-- Section 2: Text Representation -->
  <rect x="50%" y="150%" width="200%" height="50%" fill="#F7F7F7" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 200 25" to="360 200 25" dur="2000" begin="1s" delay="1s" />
  <text x="50%" y="180%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration="Text representation uses a combination of binary digits and control characters." />
  <text x="50%" y="200%" font-size="14" text-anchor="middle" fill="#8E44AD">ASCII</text>
  <text x="50%" y="220%" font-size="14" text-anchor="middle" fill="#8E44AD">Unicode</text>
  
  <!-- Section 3: Network Topology -->
  <rect x="50%" y="250%" width="200%" height="50%" fill="#F7F7F7" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 200 25" to="360 200 25" dur="2000" begin="2s" delay="2s" />
  <text x="50%" y="280%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration="Network topology refers to the physical and logical arrangement of devices in a network." />
  <text x="50%" y="300%" font-size="14" text-anchor="middle" fill="#8E44AD">Bus</text>
  <text x="50%" y="320%" font-size="14" text-anchor="middle" fill="#8E44AD">Star</text>
  
  <!-- Section 4: Character Encoding Schemes -->
  <rect x="50%" y="350%" width="200%" height="50%" fill="#F7F7F7" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 200 25" to="360 200 25" dur="2000" begin="3s" delay="3s" />
  <text x="50%" y="380%" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4053" data-narration="Character encoding schemes convert text data into binary format." />
  <text x="50%" y="400%" font-size="14" text-anchor="middle" fill="#8E44AD">ASCII</text>
  <text x="50%" y="420%" font-size="14" text-anchor="middle" fill="#8E44AD">Unicode</text>
  
  <!-- Arrow markers for connections -->
  <line x1="120" y1="100" x2="180" y2="150" stroke="#2E4053" stroke-width="2" />
  <line x1="180" y1="150" x2="200" y2="220" stroke="#2E4053" stroke-width="2" />
  <line x1="240" y1="100" x2="300" y2="150" stroke="#2E4053" stroke-width="2" />
  <line x1="300" y1="150" x2="320" y2="220" stroke="#2E4053" stroke-width="2" />
  
  <!-- Footer -->
  <text x="50%" y="380%" font-size="14" text-anchor="middle" fill="#8E44AD">Data Representation and Network Topology</text>
</svg>