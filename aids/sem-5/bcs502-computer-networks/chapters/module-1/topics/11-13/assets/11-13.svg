<svg width="420" height="400" data-topic-id="11-13" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A68D8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>

  <!-- Title at top -->
  <text x="50%" y="20%" fill="#3498db" font-size="24" text-anchor="middle">
    Data Communications
  </text>

  <!-- Section 1: Definition -->
  <rect x="10" y="60" width="400" height="100" fill="#f9f9f9" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,60" to="0,80" begin="0s" dur="1s" repeatCount="1" />
    <text x="20%" y="50%" fill="#2c3e50" font-size="18" text-anchor="middle" data-narration="Data communication refers to the process of exchanging data between two or more devices over a communication channel. This can be done through various methods, including wired and wireless connections, and involves the transmission, reception, and processing of data.">
      Definition
    </text>
  </rect>

  <!-- Section 2: Types of Data Communications -->
  <rect x="10" y="170" width="400" height="150" fill="#f9f9f9" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,280" begin="0.5s" dur="1s" repeatCount="1" />
    <rect x="20" y="90" width="30" height="30" fill="#ff99cc" rx="10"/>
    <text x="30%" y="130%" fill="#2c3e50" font-size="18" text-anchor="middle" data-narration="Point-to-Point (PTP) Communications: A direct connection between two devices, such as a phone call or an email.">
      Point-to-Point (PTP) Communications
    </text>
    <rect x="100" y="90" width="30" height="30" fill="#ff99cc" rx="10"/>
    <text x="110%" y="130%" fill="#2c3e50" font-size="18" text-anchor="middle" data-narration="Point-to-Multi-Point (PMP) Communications: A connection between a single device and multiple devices, such as a broadcast signal or a multicasting service.">
      Point-to-Multi-Point (PMP) Communications
    </text>
  </rect>

  <!-- Section 3: Advantages and Disadvantages -->
  <rect x="10" y="330" width="400" height="150" fill="#f9f9f9" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,330" to="0,440" begin="1s" dur="1s" repeatCount="1" />
    <text x="20%" y="410%" fill="#2c3e50" font-size="18" text-anchor="middle" data-narration="Advantages: Enables data exchange between devices, facilitates communication and collaboration, supports various applications and services. Disadvantages: Requires dedicated resources and infrastructure, can be prone to errors and delays, may be vulnerable to security threats and interference.">
      Advantages and Disadvantages
    </text>
  </rect>

  <!-- Section 4: Key Concepts -->
  <rect x="10" y="170" width="400" height="150" fill="#f9f9f9" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,280" begin="2s" dur="1s" repeatCount="1" />
    <rect x="20" y="90" width="30" height="30" fill="#ff99cc" rx="10"/>
    <text x="30%" y="130%" fill="#2c3e50" font-size="18" text-anchor="middle" data-narration="Data Rate: The speed at which data is transmitted. Bit Rate: The rate at which bits are transmitted. Baud Rate: The rate at which bits are transmitted over a communication channel.">
      Key Concepts
    </text>
    <rect x="100" y="90" width="30" height="30" fill="#ff99cc" rx="10"/>
  </rect>

  <!-- Section 5: Error Detection and Correction -->
  <rect x="10" y="330" width="400" height="150" fill="#f9f9f9" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,330" to="0,440" begin="3s" dur="1s" repeatCount="1" />
    <rect x="20" y="410%" width="30" height="30" fill="#ff99cc" rx="10"/>
    <text x="30%" y="430%" fill="#2c3e50" font-size="18" text-anchor="middle" data-narration="Error Detection and Correction: Methods used to detect and correct errors in data transmission.">
      Error Detection and Correction
    </text>
  </rect>

  <!-- Footer -->
  <text x="50%" y="400%" fill="#3498db" font-size="18" text-anchor="middle">
    Created with love for learning
  </text>
</svg>