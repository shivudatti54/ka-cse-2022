<svg width="420" height="400" data-topic-id="switching-packet-switching-and-its-types">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10"/>
  <g transform="translate(20, 20)">
    <text x="0" y="20" font-size="24" font-family="Arial" fill="#3498db">Packet Switching</text>
  </g>
  <g transform="translate(20, 60)">
    <section data-narration="What is Packet Switching?" data-topic-id="switching-packet-switching-and-its-types">
      <rect x="0" y="0" width="400" height="100" fill="#fff" rx="10"/>
      <text x="20" y="30" font-size="18" font-family="Arial" fill="#333" text-anchor="start">Packet switching is a technique used in computer networking to transmit data in small packets between devices on a network.</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <g transform="translate(20, 160)">
      <section data-narration="Types of Packet Switching" data-topic-id="switching-packet-switching-and-its-types">
        <rect x="0" y="0" width="400" height="100" fill="#fff" rx="10"/>
        <text x="20" y="30" font-size="18" font-family="Arial" fill="#333" text-anchor="start">There are two main types of packet switching:</text>
        <rect x="20" y="60" width="50" height="20" fill="#f1c40f" rx="5"/>
        <text x="80" y="60" font-size="18" font-family="Arial" fill="#333" text-anchor="start">Store-and-Forward</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="0s" dur="2s" repeatCount="indefinite"/>
        <rect x="20" y="100" width="50" height="20" fill="#f1c40f" rx="5"/>
        <text x="80" y="100" font-size="18" font-family="Arial" fill="#333" text-anchor="start">Cut-Through</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" begin="2s" dur="2s" repeatCount="indefinite"/>
      </section>
      <g transform="translate(20, 260)">
        <section data-narration="Store-and-Forward" data-topic-id="switching-packet-switching-and-its-types">
          <rect x="0" y="0" width="400" height="100" fill="#fff" rx="10"/>
          <text x="20" y="30" font-size="18" font-family="Arial" fill="#333" text-anchor="start">In store-and-forward packet switching, each packet is stored in a buffer at the intermediate nodes before it is forwarded to the next node.</text>
          <rect x="20" y="60" width="100" height="20" fill="#4CAF50" rx="5"/>
          <text x="120" y="60" font-size="18" font-family="Arial" fill="#333" text-anchor="start">Key Characteristics:</text>
          <text x="120" y="80" font-size="18" font-family="Arial" fill="#333" text-anchor="start">- Each packet is stored in a buffer at the intermediate nodes</text>
          <text x="120" y="100" font-size="18" font-family="Arial" fill="#333" text-anchor="start">- Packets are forwarded one by one to the next node</text>
          <text x="120" y="120" font-size="18" font-family="Arial" fill="#333" text-anchor="start">- Packets are checked for errors before they are forwarded to the next node</text>
          <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="0s" dur="2s" repeatCount="indefinite"/>
        </section>
        <g transform="translate(20, 360)">
          <section data-narration="Cut-Through" data-topic-id="switching-packet-switching-and-its-types">
            <rect x="0" y="0" width="400" height="100" fill="#fff" rx="10"/>
            <text x="20" y="30" font-size="18" font-family="Arial" fill="#333" text-anchor="start">In cut-through packet switching, packets are transmitted without being stored in buffers at the intermediate nodes.</text>
            <rect x="20" y="60" width="100" height="20" fill="#4CAF50" rx="5"/>
            <text x="120" y="60" font-size="18" font-family="Arial" fill="#333" text-anchor="start">Key Characteristics:</text>
            <text x="120" y="80" font-size="18" font-family="Arial" fill="#333" text-anchor="start">- Packets are transmitted without being stored in buffers at the intermediate nodes</text>
            <text x="120" y="100" font-size="18" font-family="Arial" fill="#333" text-anchor="start">- Packets are forwarded to the next node without being checked for errors</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="2s" dur="2s" repeatCount="indefinite"/>
          </section>
        </g>
      </g>
      <g transform="translate(20, 440)">
        <rect x="0" y="0" width="400" height="50" fill="#3498db" rx="5"/>
        <text x="20" y="20" font-size="18" font-family="Arial" fill="#fff" text-anchor="start">Conclusion</text>
        <rect x="20" y="40" width="100" height="20" fill="#4CAF50" rx="5"/>
        <text x="120" y="40" font-size="18" font-family="Arial" fill="#fff" text-anchor="start">Packet switching is a technique used in computer networking to transmit data in small packets between devices on a network.</text>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" begin="4s" dur="2s" repeatCount="indefinite"/>
      </g>
    </g>
    <footer>
      <rect x="0" y="380" width="400" height="20" fill="#3498db" rx="5"/>
      <text x="20" y="390" font-size="18" font-family="Arial" fill="#fff" text-anchor="start">Made with love by <a href="https://www.example.com">Example</a></text>
    </footer>
  </svg>