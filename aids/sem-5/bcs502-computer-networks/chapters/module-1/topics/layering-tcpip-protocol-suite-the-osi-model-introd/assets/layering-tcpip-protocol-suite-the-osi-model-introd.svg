<svg width="420" height="400" data-topic-id="tcpip-protocol-suite-the-osi-model-introd">
    <!-- Gradient background with pastel colors -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

    <!-- Title at top -->
    <text x="50%" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#2E4053">
        Tcpip Protocol Suite and The Osi Model Introduction
    </text>

    <!-- Section 1: Transmission Media -->
    <section data-narration="Transmission Media refers to the physical medium through which data is sent between devices. Examples of transmission media include cable, wire, fiber optic cables, radio waves, and infrared waves. Transmission media can be classified into two categories: dedicated media and shared media.">
        <rect x="20" y="60" width="380" height="100" fill="#F7F7F7"/>
        <text x="50%" y="80" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Dedicated Media
        </text>
        <text x="50%" y="100" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Shared Media
        </text>
        <rect x="20" y="120" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="90" y="120" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <animateTransform attributeName="transform" type="translate" from="0,120" to="50,120" dur="2s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="90,120" to="90,120" dur="2s" begin="2s"/>
    </section>

    <!-- Section 2: Guided Media -->
    <section data-narration="Guided media is a type of transmission media where data is transmitted through a physical path or guide. Examples of guided media include coaxial cables, twisted pair cables, and fiber optic cables. Guided media has the following advantages: higher bandwidth, higher reliability, and easier installation.">
        <rect x="20" y="200" width="380" height="100" fill="#F7F7F7"/>
        <text x="50%" y="220" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Coaxial Cables
        </text>
        <text x="50%" y="240" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Twisted Pair Cables
        </text>
        <text x="50%" y="260" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Fiber Optic Cables
        </text>
        <rect x="20" y="280" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="90" y="280" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="170" y="280" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <animateTransform attributeName="transform" type="translate" from="0,280" to="50,280" dur="2s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="90,280" to="90,280" dur="2s" begin="2s"/>
        <animateTransform attributeName="transform" type="translate" from="170,280" to="170,280" dur="2s" begin="4s"/>
    </section>

    <!-- Section 3: Unguided Media (Wireless) -->
    <section data-narration="Unguided media, also known as wireless media, is a type of transmission media where data is transmitted through radio waves or infrared waves. Unguided media has the following advantages: flexibility and mobility.">
        <rect x="20" y="280" width="380" height="100" fill="#F7F7F7"/>
        <text x="50%" y="300" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Radio Waves
        </text>
        <text x="50%" y="320" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Infrared Waves
        </text>
        <rect x="20" y="350" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="90" y="350" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="170" y="350" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <animateTransform attributeName="transform" type="translate" from="0,350" to="50,350" dur="2s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="90,350" to="90,350" dur="2s" begin="2s"/>
        <animateTransform attributeName="transform" type="translate" from="170,350" to="170,350" dur="2s" begin="4s"/>
    </section>

    <!-- Section 4: The Osi Model -->
    <section data-narration="The Osi model is a conceptual model that describes the functions of a communication system. The Osi model consists of seven layers: physical, data link, network, transport, session, presentation, and application. Each layer has specific functions and protocols that enable data communication between devices.">
        <rect x="20" y="440" width="380" height="100" fill="#F7F7F7"/>
        <text x="50%" y="460" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Physical Layer
        </text>
        <text x="50%" y="480" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Data Link Layer
        </text>
        <text x="50%" y="500" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Network Layer
        </text>
        <text x="50%" y="520" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Transport Layer
        </text>
        <text x="50%" y="540" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Session Layer
        </text>
        <text x="50%" y="560" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Presentation Layer
        </text>
        <text x="50%" y="580" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
            Application Layer
        </text>
        <rect x="20" y="610" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="90" y="610" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="170" y="610" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="250" y="610" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <rect x="330" y="610" width="50" height="30" fill="#F7DC6F" rx="5"/>
        <animateTransform attributeName="transform" type="translate" from="0,610" to="50,610" dur="2s" begin="0s"/>
        <animateTransform attributeName="transform" type="translate" from="90,610" to="90,610" dur="2s" begin="2s"/>
        <animateTransform attributeName="transform" type="translate" from="170,610" to="170,610" dur="2s" begin="4s"/>
        <animateTransform attributeName="transform" type="translate" from="250,610" to="250,610" dur="2s" begin="6s"/>
        <animateTransform attributeName="transform" type="translate" from="330,610" to="330,610" dur="2s" begin="8s"/>
    </section>

    <!-- Footer -->
    <text x="50%" y="380" font-size="18" font-family="Arial" text-anchor="middle" fill="#666">
        Created by [Your Name]
    </text>
</svg>