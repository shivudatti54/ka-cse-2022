<svg width="420" height="400" data-topic-id="distributed-systems-chapter-175-176">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title and footer -->
  <g transform="translate(10 10)">
    <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold">Distributed Systems</text>
    <text x="10" y="90" font-size="18" font-family="Arial">Chapter 17-18</text>
  </g>
  <g transform="translate(10 390)">
    <text x="10" y="400" font-size="18" font-family="Arial">Copyright 2023</text>
  </g>
  
  <!-- Section 1: Introduction to Distributed Transactions -->
  <g transform="translate(20 30)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="2s" begin="0s"/>
    <text x="20" y="20" font-size="16" font-family="Arial" data-narration="A distributed transaction is a sequence of operations that are executed as a single, all-or-nothing unit of work across multiple systems or nodes in a distributed system. The characteristics of a distributed transaction include: atomicity, consistency, isolation, and durability." fill="#2F4F7F"/>
    <text x="20" y="50" font-size="16" font-family="Arial" data-narration="The characteristics of a distributed transaction include: atomicity, consistency, isolation, and durability." fill="#2F4F7F"/>
    <line x1="20" y1="20" x2="20" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
    <line x1="20" y1="50" x2="20" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
  </g>
  
  <!-- Section 2: Flat Distributed Transactions -->
  <g transform="translate(20 150)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,150" dur="2s" begin="0s"/>
    <text x="20" y="20" font-size="16" font-family="Arial" data-narration="A flat distributed transaction is a single transaction that spans multiple systems, but does not involve any inter-system communication. Each system performs the required operations as a single, indivisible unit." fill="#2F4F7F"/>
    <text x="20" y="50" font-size="16" font-family="Arial" data-narration="The characteristics of flat distributed transactions include: no inter-system communication, each system performs the required operations as a single unit, and no rollback or recovery required." fill="#2F4F7F"/>
    <line x1="20" y1="20" x2="20" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
    <line x1="20" y1="50" x2="20" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
    <line x1="320" y1="20" x2="320" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
  </g>
  
  <!-- Section 3: Nested Distributed Transactions -->
  <g transform="translate(20 270)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="2s" begin="2s"/>
    <text x="20" y="20" font-size="16" font-family="Arial" data-narration="A nested distributed transaction is a transaction that involves inter-system communication and is composed of multiple, independent transactions." fill="#2F4F7F"/>
    <text x="20" y="50" font-size="16" font-family="Arial" data-narration="The characteristics of nested distributed transactions include: inter-system communication, composed of multiple, independent transactions, and may involve rollback or recovery in case of failures." fill="#2F4F7F"/>
    <line x1="20" y1="20" x2="20" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
    <line x1="20" y1="50" x2="20" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
    <line x1="320" y1="20" x2="320" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
  </g>
  
  <!-- Section 4: Example -->
  <g transform="translate(20 360)">
    <rect x="0" y="0" width="400" height="100" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,400" dur="2s" begin="4s"/>
    <text x="20" y="20" font-size="16" font-family="Arial" data-narration="A bank customer initiates a transaction to deposit money into their account and transfer funds to another account. Both operations are performed by separate systems (bank's accounting system and transfer system), but the transaction is considered flat since it does not involve inter-system communication." fill="#2F4F7F"/>
    <text x="20" y="50" font-size="16" font-family="Arial" data-narration="The transaction is executed as a single, all-or-nothing unit of work across multiple systems or nodes in a distributed system." fill="#2F4F7F"/>
    <line x1="20" y1="20" x2="20" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
    <line x1="20" y1="50" x2="20" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
    <line x1="320" y1="20" x2="320" y2="80" stroke="#2F4F7F" stroke-width="2" stroke-dasharray="3,3" arrowhead="9"/>
  </g>
</svg>