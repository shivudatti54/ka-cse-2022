<svg width="420" height="400" data-topic-id="replication-introduction"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background-color: #c7d3f7;">
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#87ceeb" stop-opacity="1"/>
            <stop offset="100%" stop-color="#4db9f5" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Title Section -->
    <section data-narration="Introduction to Replication">
        <g transform="translate(20, 20)">
            <text x="50%" y="50%" font-size="24" font-family="Arial"
                  fill="#2f4f7f" text-anchor="middle">Replication Introduction</text>
        </g>
    </section>

    <!-- Section 1: Sorting Fundamentals -->
    <section data-narration="What is Sorting?">
        <g transform="translate(20, 80)">
            <ellipse fill="url(#grad)" rx="50" ry="70"/>
            <text x="50%" y="90%" font-size="16" font-family="Arial"
                  fill="#3b5998" text-anchor="middle">Sorting is a fundamental concept in computer science</text>
            <path d="M 200 50 L 300 50" stroke="#3b5998" stroke-width="2"/>
            <path d="M 200 200 L 300 200" stroke="#3b5998" stroke-width="2"/>
            <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s"/>
        </g>
    </section>

    <!-- Section 2: Importance of Sorting -->
    <section data-narration="Why is Sorting Important?">
        <g transform="translate(20, 150)">
            <ellipse fill="url(#grad)" rx="50" ry="70"/>
            <text x="50%" y="170%" font-size="16" font-family="Arial"
                  fill="#3b5998" text-anchor="middle">Sorting is essential in many real-world applications</text>
            <path d="M 200 50 L 300 50" stroke="#3b5998" stroke-width="2"/>
            <path d="M 200 200 L 300 200" stroke="#3b5998" stroke-width="2"/>
            <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="5s"/>
        </g>
    </section>

    <!-- Section 3: Internal vs External Sorting -->
    <section data-narration="Internal vs External Sorting">
        <g transform="translate(20, 220)">
            <ellipse fill="url(#grad)" rx="50" ry="70"/>
            <text x="50%" y="240%" font-size="16" font-family="Arial"
                  fill="#3b5998" text-anchor="middle">Sorting data that is stored in the main memory (RAM)</text>
            <path d="M 200 50 L 300 50" stroke="#3b5998" stroke-width="2"/>
            <path d="M 200 200 L 300 200" stroke="#3b5998" stroke-width="2"/>
            <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="10s"/>
            <text x="50%" y="250%" font-size="16" font-family="Arial"
                  fill="#4db9f5" text-anchor="middle">Sorting data that is stored on external devices</text>
        </g>
    </section>

    <!-- Section 4: Sorting Algorithms -->
    <section data-narration="Sorting Algorithms">
        <g transform="translate(20, 280)">
            <ellipse fill="url(#grad)" rx="50" ry="70"/>
            <text x="50%" y="300%" font-size="16" font-family="Arial"
                  fill="#3b5998" text-anchor="middle">Bubble Sort, Selection Sort, Insertion Sort</text>
            <path d="M 200 50 L 300 50" stroke="#3b5998" stroke-width="2"/>
            <path d="M 200 200 L 300 200" stroke="#3b5998" stroke-width="2"/>
            <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="15s"/>
        </g>
    </section>

    <!-- Footer Section -->
    <footer>
        <g transform="translate(20, 350)">
            <text x="50%" y="380%" font-size="16" font-family="Arial"
                  fill="#2f4f7f" text-anchor="middle">Replication Introduction</text>
        </g>
    </footer>
</svg>