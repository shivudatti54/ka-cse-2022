<svg width="420" height="400" data-topic-id="atomic-commit-protocols-concurrency-control-in-distributed-transactions"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <title>Atomic Commit Protocols Concurrency Control in Distributed Transactions</title>
  <footer>Illustration created by [Your Name]</footer>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start"
        fill="#2E4053">Atomic Commit Protocols</text>
  <rect x="10" y="50" width="400" height="300" fill="#F7F7F7"/>
  <section data-narration="Two-Phase Commit (2PC) Protocol">
    <rect x="10" y="60" width="340" height="200" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 180" dur="2s"
                      begin="0s" delay="0.5s"/>
    <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Two-Phase Commit (2PC) Protocol</text>
    <text x="20" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Prepare Phase: Check consistency and resources</text>
    <text x="20" y="180" font-size="16" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Commit Phase: Commit if all nodes prepare successfully</text>
    <rect x="10" y="220" width="340" height="80" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="0 250" dur="2s"
                      begin="1s" delay="1s"/>
    <text x="20" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Example</text>
    <rect x="10" y="270" width="340" height="80" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 270" to="0 300" dur="2s"
                      begin="1.5s" delay="1.5s"/>
    <text x="20" y="290" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Suppose we have a distributed database system with three nodes: A, B, and C</text>
    <text x="20" y="310" font-size="16" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">We want to perform a transaction that updates the data on all three nodes</text>
    <rect x="10" y="340" width="340" height="80" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 340" to="0 380" dur="2s"
                      begin="2s" delay="2s"/>
    <text x="20" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Node A sends a prepare message to all nodes</text>
    <text x="20" y="380" font-size="16" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">If all nodes respond with "ok", Node A sends a commit message</text>
  </section>
  <section data-narration="Pessimistic Locking">
    <rect x="10" y="50" width="400" height="300" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 200" dur="2s"
                      begin="0s" delay="0.5s"/>
    <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Pessimistic Locking</text>
    <text x="20" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Use locking to prevent other transactions from accessing the same data until the current transaction is committed</text>
  </section>
  <section data-narration="Optimistic Locking">
    <rect x="10" y="50" width="400" height="300" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 200" dur="2s"
                      begin="0s" delay="0.5s"/>
    <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Optimistic Locking</text>
    <text x="20" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Use checksums or timestamps to detect any changes to the data since it was last read</text>
  </section>
  <section data-narration="Distributed Deadlocks">
    <rect x="10" y="50" width="400" height="300" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 200" dur="2s"
                      begin="0s" delay="0.5s"/>
    <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Distributed Deadlocks</text>
    <text x="20" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">A situation where two or more transactions are blocked indefinitely, waiting for each other to release resources</text>
  </section>
  <section data-narration="Transaction Recovery">
    <rect x="10" y="50" width="400" height="300" fill="#F7F7F7"/>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 200" dur="2s"
                      begin="0s" delay="0.5s"/>
    <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">Transaction Recovery</text>
    <text x="20" y="150" font-size="16" font-family="Arial, sans-serif" text-anchor="start"
          fill="#2E4053">The process of recovering a transaction after it fails or is rolled back</text>
  </section>
  <rect x="10" y="380" width="400" height="20" fill="#F7F7F7"/>
  <animateTransform attributeName="transform" type="translate" from="0 380" to="0 400" dur="2s"
                    begin="0s" delay="2s"/>
  <text x="20" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
        fill="#2E4053">Consult the official documentation for more information on Atomic Commit Protocols</text>
</svg>