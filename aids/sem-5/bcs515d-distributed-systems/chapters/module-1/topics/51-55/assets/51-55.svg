<svg width="420" height="400" data-topic-id="Distributed-Systems-Characterization-of-Distributed-Systems-5-1-5-2-5-3-5-4-5-5">
  <style>
    * {
      font-family: Arial, sans-serif;
      color: #333;
    }
    text {
      font-size: 14px;
    }
    .title {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
