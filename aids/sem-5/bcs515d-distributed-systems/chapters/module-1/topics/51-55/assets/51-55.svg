      stroke: #0A0;
      stroke-width: 2;
    }
  </style>
  <title>Distributed Systems: Characterization of Distributed Systems (5.1-5.5)</title>
  <footer>2023 Educational Resource</footer>
  <rect x="10" y="10" width="400" height="20" fill="#ADD8E6"/>
  <rect x="10" y="40" width="400" height="20" fill="#C7B8EA"/>
  <rect x="10" y="70" width="400" height="20" fill="#ADD8E6"/>
  <rect x="10" y="100" width="400" height="20" fill="#C7B8EA"/>
  <rect x="10" y="130" width="400" height="20" fill="#ADD8E6"/>
  <rect x="10" y="160" width="400" height="20" fill="#C7B8EA"/>
  <rect x="10" y="190" width="400" height="20" fill="#ADD8E6"/>
  <rect x="10" y="220" width="400" height="20" fill="#C7B8EA"/>
  <rect x="10" y="250" width="400" height="20" fill="#ADD8E6"/>
  <g transform="translate(20, 10)">
    <rect x="0" y="0" width="100" height="100" fill="#ADD8E6"/>
    <text x="50" y="90" class="title">Decentralization</text>
    <text x="10" y="30" class="data-narration">A distributed system is decentralized, meaning that there is no single central point of control.</text>
    <animate transition="opacity 0.5s ease-in-out" begin="100ms" dur="2000" repeat="forever">
      <path d="M 50 0 L 50 100" stroke="#0A0" stroke-width="2" class="arrow"/>
    </animate>
  </g>
  <g transform="translate(140, 10)">
    <rect x="0" y="0" width="100" height="100" fill="#C7B8EA"/>
    <text x="50" y="90" class="title">Autonomy</text>
    <text x="10" y="30" class="data-narration">Each node in a distributed system operates independently, making decisions based on local conditions.</text>
    <animate transition="opacity 0.5s ease-in-out" begin="300ms" dur="2000" repeat="forever">
      <path d="M 50 0 L 50 100" stroke="#0A0" stroke-width="2" class="arrow"/>
    </animate>
  </g>
  <g transform="translate(260, 10)">
    <rect x="0" y="0" width="100" height="100" fill="#ADD8E6"/>
    <text x="50" y="90" class="title">Communication</text>
    <text x="10" y="30" class="data-narration">Distributed systems rely on communication networks to exchange data and coordinate actions.</text>
    <animate transition="opacity 0.5s ease-in-out" begin="500ms" dur="2000" repeat="forever">
      <path d="M 50 0 L 50 100" stroke="#0A0" stroke-width="2" class="arrow"/>
    </animate>
  </g>
  <g transform="translate(380, 10)">
    <rect x="0" y="0" width="100" height="100" fill="#C7B8EA"/>
    <text x="50" y="90" class="title">Distribution</text>
    <text x="10" y="30" class="data-narration">The nodes in a distributed system can be geographically dispersed, located on different continents or even countries.</text>
    <animate transition="opacity 0.5s ease-in-out" begin="700ms" dur="2000" repeat="forever">
      <path d="M 50 0 L 50 100" stroke="#0A0" stroke-width="2" class="arrow"/>
    </animate>
  </g>
  <g transform="translate(500, 10)">
    <rect x="0" y="0" width="100" height="100" fill="#ADD8E6"/>
    <text x="50" y="90" class="title">Homogeneous Distributed Systems</text>
    <text x="10" y="30" class="data-narration">Consist of nodes that are identical or similar in terms of their hardware and software capabilities.</text>
  </g>
  <g transform="translate(620, 10)">
    <rect x="0" y="0" width="100" height="100" fill="#C7B8EA"/>
    <text x="50" y="90" class="title">Heterogeneous Distributed Systems</text>
    <text x="10" y="30" class="data-narration">Comprise nodes with different hardware and software capabilities.</text>
  </g>
  <g transform="translate(740, 10)">
    <rect x="0" y="0" width="100" height="100" fill="#ADD8E6"/>
    <text x="50" y="90" class="title">Clustered Distributed Systems</text>
    <text x="10" y="30" class="data-narration">Groups of computers that are connected and work together to achieve a common goal.</text>
  </g>
  <g transform="translate(860, 10)">
    <rect x="0" y="0" width="100" height="100" fill="#C7B8EA"/>
    <text x="50" y="90" class="title">Client-Server Distributed Systems</text>
    <text x="10" y="30" class="data-narration">A centralized server provides services to multiple clients, which are usually located on different nodes.</text>
  </g>
  <rect x="10" y="290" width="400" height="20" fill="#ADD8E6"/>
  <rect x="10" y="320" width="400" height="20" fill="#C7B8EA"/>
  <footer>2023 Educational Resource</footer>
</svg>