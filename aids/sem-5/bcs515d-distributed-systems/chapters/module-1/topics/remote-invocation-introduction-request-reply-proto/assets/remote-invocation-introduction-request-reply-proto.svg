<svg width="420" height="400" data-topic-id="remote-invention-introduction-request-reply-proto">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Remote Invocation Introduction Request Reply Proto</title>

  <rect x="10" y="10" width="400" height="30" fill="url(#pastel-gradient)" rx="10"/>

  <text x="15" y="50" font-size="16" font-family="Arial" fill="#2F4F7F">Remote Invocation</text>

  <section data-narration="Introduction">
    <rect x="10" y="80" width="400" height="60" fill="#F7F7F7"/>
    <text x="15" y="90" font-size="14" font-family="Arial" fill="#2F4F7F">Introduction</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0.5"/>
  </section>

  <section data-narration="Request-Reply Protocols">
    <rect x="10" y="150" width="400" height="60" fill="#F7F7F7"/>
    <rect x="10" y="120" width="50" height="30" fill="#2196F3" rx="5"/>
    <rect x="70" y="120" width="50" height="30" fill="#F7DC6F" rx="5"/>
    <text x="15" y="130" font-size="14" font-family="Arial" fill="#2F4F7F">Asynchronous communication</text>
    <text x="120" y="130" font-size="14" font-family="Arial" fill="#2F4F7F">One-way communication</text>
    <text x="225" y="130" font-size="14" font-family="Arial" fill="#2F4F7F">Used in Remote Procedure Call (RPC)</text>
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" from="1" to="0.5"/>
  </section>

  <section data-narration="Remote Procedure Call (RPC)">
    <rect x="10" y="220" width="400" height="60" fill="#F7F7F7"/>
    <rect x="10" y="190" width="50" height="30" fill="#2196F3" rx="5"/>
    <rect x="70" y="190" width="50" height="30" fill="#F7DC6F" rx="5"/>
    <text x="15" y="200" font-size="14" font-family="Arial" fill="#2F4F7F">Synchronous or asynchronous communication</text>
    <text x="120" y="200" font-size="14" font-family="Arial" fill="#2F4F7F">One-way or two-way communication</text>
    <text x="225" y="200" font-size="14" font-family="Arial" fill="#2F4F7F">Used in Remote Method Invocation (RMI)</text>
    <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" from="1" to="0.5"/>
  </section>

  <section data-narration="Remote Method Invocation (RMI)">
    <rect x="10" y="310" width="400" height="60" fill="#F7F7F7"/>
    <rect x="10" y="280" width="50" height="30" fill="#2196F3" rx="5"/>
    <rect x="70" y="280" width="50" height="30" fill="#F7DC6F" rx="5"/>
    <text x="15" y="290" font-size="14" font-family="Arial" fill="#2F4F7F">Programming technique</text>
    <text x="120" y="290" font-size="14" font-family="Arial" fill="#2F4F7F">Allows an object to invoke methods</text>
    <text x="225" y="290" font-size="14" font-family="Arial" fill="#2F4F7F">on another object in a different address space</text>
    <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" from="1" to="0.5"/>
  </section>

  <footer>
    <rect x="10" y="380" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <text x="15" y="390" font-size="14" font-family="Arial" fill="#2F4F7F">Learn more about Remote Invocation</text>
  </footer>
</svg>