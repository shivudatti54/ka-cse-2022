<svg width="420" height="400" data-topic-id="directory-services" data-narration="Introduction_to_Directory_Services">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d9f4" stop-opacity="1" />
      <stop offset="100%" stop-color="#8bc6ec" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  
  <!-- Title and Header -->
  <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start">Directory Services</text>
  <rect x="10" y="50" width="400" height="20" fill="#f7f7f7" rx="5" />
  <text x="15" y="55" font-size="18" font-family="Arial" text-anchor="start">Introduction</text>
  
  <!-- Section 1: Introduction to Directory Services -->
  <section id="section-1" data-narration="Introduction_to_Directory_Services">
    <rect x="10" y="70" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="75" font-size="18" font-family="Arial" text-anchor="start">A directory service acts as a centralized repository for information about users, computers, printers, services, and other network resources.</text>
    <rect x="10" y="105" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="110" font-size="18" font-family="Arial" text-anchor="start">It provides a structured, hierarchical framework for organizing, retrieving, and managing this data, enabling efficient resource discovery and access control in distributed environments.</text>
    <animate transform="rotate(360 15 75)" begin="0s" duration="10s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 2: Key Concepts and Terminology -->
  <section id="section-2" data-narration="Key_Concepts_and_Terminology">
    <rect x="10" y="170" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="175" font-size="18" font-family="Arial" text-anchor="start">Directory Information Base (DIB)</text>
    <rect x="10" y="205" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="210" font-size="18" font-family="Arial" text-anchor="start">Directory Entry</text>
    <rect x="10" y="245" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="250" font-size="18" font-family="Arial" text-anchor="start">Attribute</text>
    <rect x="10" y="290" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="295" font-size="18" font-family="Arial" text-anchor="start">Distinguished Name (DN)</text>
  </section>
  
  <!-- Section 3: Directory Information Base (DIB) -->
  <section id="section-3" data-narration="Directory_Information_Base_DIB">
    <rect x="10" y="340" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="345" font-size="18" font-family="Arial" text-anchor="start">The DIB is the actual database that stores all the directory entries.</text>
    <rect x="10" y="385" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="390" font-size="18" font-family="Arial" text-anchor="start">Each entry represents an object in the directory and consists of a collection of attributes.</text>
  </section>
  
  <!-- Section 4: Directory Entry -->
  <section id="section-4" data-narration="Directory_Entry">
    <rect x="10" y="440" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="445" font-size="18" font-family="Arial" text-anchor="start">A single record in the DIB. It is composed of a set of attributes, each with a type and one or more values.</text>
  </section>
  
  <!-- Section 5: Attribute -->
  <section id="section-5" data-narration="Attribute">
    <rect x="10" y="490" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="495" font-size="18" font-family="Arial" text-anchor="start">A characteristic of an object. It has a type (e.g., telephoneNumber) and associated values (e.g., +1-555-0101).</text>
  </section>
  
  <!-- Section 6: Distinguished Name (DN) -->
  <section id="section-6" data-narration="Distinguished_Name_DN">
    <rect x="10" y="540" width="380" height="100" fill="#f7f7f7" rx="5" />
    <text x="15" y="545" font-size="18" font-family="Arial" text-anchor="start">A unique identifier for an entry within the directory hierarchy.</text>
    <text x="15" y="575" font-size="18" font-family="Arial" text-anchor="start">It is constructed by combining the Relative Distinguished Name (RDN) of the entry with the DNs of its parent entries.</text>
  </section>
  
  <!-- Arrows and connections -->
  <line x1="15" y1="75" x2="380" y2="75" stroke="#337ab7" stroke-width="2" />
  <line x1="15" y1="110" x2="380" y2="110" stroke="#337ab7" stroke-width="2" />
  <line x1="15" y1="145" x2="380" y2="145" stroke="#337ab7" stroke-width="2" />
  <line x1="15" y1="180" x2="380" y2="180" stroke="#337ab7" stroke-width="2" />
  <line x1="15" y1="215" x2="380" y2="215" stroke="#337ab7" stroke-width="2" />
  <line x1="15" y1="250" x2="380" y2="250" stroke="#337ab7" stroke-width="2" />
  <line x1="15" y1="285" x2="380" y2="285" stroke="#337ab7" stroke-width="2" />
  <line x1="15" y1="320" x2="380" y2="320" stroke="#337ab7" stroke-width="2" />
  
  <!-- Footer -->
  <text x="15" y="395" font-size="18" font-family="Arial" text-anchor="start">Directory Services</text>
</svg>