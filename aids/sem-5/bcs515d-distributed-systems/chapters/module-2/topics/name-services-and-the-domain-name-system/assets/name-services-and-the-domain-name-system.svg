<svg width="420" height="400" data-topic-id="name-services-and-the-domain-name-system" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-image: linear-gradient(to bottom, #66CCCC, #33CCCC);">
    <!-- Introduction -->
    <rect x="10" y="10" width="400" height="40" style="fill: #ADD8E6; border-radius: 10px; padding: 10px; font-size: 18px; font-weight: bold; color: #000;">
        <animateTransform attributeName="transform" type="rotate" from="0, 210, 195" to="0, 0, 195" dur="5s" begin="0s" repeatCount="indefinite"/>
        <text x="15" y="30" style="font-size: 24px; font-weight: bold; color: #000;" data-narration="Introduction">Name Services and the Domain Name System</text>
    </rect>
    
    <!-- What is a Name Service? -->
    <rect x="10" y="60" width="400" height="40" style="fill: #ADD8E6; border-radius: 10px; padding: 10px; font-size: 18px; font-weight: bold; color: #000;">
        <animateTransform attributeName="transform" type="rotate" from="0, 210, 195" to="0, 0, 195" dur="5s" begin="0s" repeatCount="indefinite"/>
        <text x="15" y="80" style="font-size: 24px; font-weight: bold; color: #000;" data-narration="What is a Name Service?">What is a Name Service?</text>
    </rect>
    <g transform="translate(50, 60)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="A name service is a database that maps names to addresses. It acts as an intermediary between clients and servers, translating names into addresses."/>
        </g>
    </g>
    <g transform="translate(100, 60)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="There are two types of name services: Flat Name Service and Hierarchical Name Service."/>
        </g>
    </g>
    
    <!-- Domain Name System (DNS) -->
    <rect x="10" y="120" width="400" height="40" style="fill: #ADD8E6; border-radius: 10px; padding: 10px; font-size: 18px; font-weight: bold; color: #000;">
        <animateTransform attributeName="transform" type="rotate" from="0, 210, 195" to="0, 0, 195" dur="5s" begin="0s" repeatCount="indefinite"/>
        <text x="15" y="140" style="font-size: 24px; font-weight: bold; color: #000;" data-narration="Domain Name System (DNS)"/>
    </rect>
    <g transform="translate(50, 120)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="The Domain Name System (DNS) is a hierarchical name service that maps names to IP addresses. It is the most widely used name service in the internet."/>
        </g>
    </g>
    <g transform="translate(100, 120)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="Here's how DNS works: Client Request, DNS Server Search, Root Server, Top-Level Domain (TLD) Server, Authoritative Name Server, Response."
                data-narrationanchor="middle"/>
        </g>
    </g>
    <g transform="translate(150, 120)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="Client Request: A client sends a request to a DNS server for a specific name."
                data-narrationanchor="middle"/>
        </g>
    </g>
    <g transform="translate(200, 120)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="DNS Server Search: The DNS server searches its cache and performs a recursive query to find the IP address associated with the name."
                data-narrationanchor="middle"/>
        </g>
    </g>
    <g transform="translate(250, 120)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="Root Server: The DNS server sends the query to a root server, which is the top-most level in the DNS hierarchy."
                data-narrationanchor="middle"/>
        </g>
    </g>
    <g transform="translate(300, 120)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="Top-Level Domain (TLD) Server: The root server forwards the query to a TLD server, which is responsible for a specific top-level domain (e.g., .com, .org)."
                data-narrationanchor="middle"/>
        </g>
    </g>
    <g transform="translate(350, 120)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="Authoritative Name Server: The TLD server forwards the query to an authoritative name server, which has the IP address associated with the name."
                data-narrationanchor="middle"/>
        </g>
    </g>
    <g transform="translate(400, 120)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="Response: The authoritative name server responds with the IP address associated with the name."
                data-narrationanchor="middle"/>
        </g>
    </g>
    
    <!-- Key Concepts -->
    <rect x="10" y="180" width="400" height="40" style="fill: #ADD8E6; border-radius: 10px; padding: 10px; font-size: 18px; font-weight: bold; color: #000;">
        <animateTransform attributeName="transform" type="rotate" from="0, 210, 195" to="0, 0, 195" dur="5s" begin="0s" repeatCount="indefinite"/>
        <text x="15" y="200" style="font-size: 24px; font-weight: bold; color: #000;" data-narration="Key Concepts">Key Concepts</text>
    </rect>
    <g transform="translate(50, 180)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="Name Space: The set of all possible names in a DNS."
                data-narrationanchor="middle"/>
        </g>
    </g>
    <g transform="translate(100, 180)">
        <rect x="0" y="0" width="40" height="40" style="fill: #66CCCC; border-radius: 50%;">
            <text x="10" y="10" style="font-size: 18px; color: #000;" data-narration="Records: The data stored in a DNS database, which include A records (IP addresses), NS records (name servers), and MX records (mail servers)."
                data-narrationanchor="middle"/>
        </g>
    </g>
    
    <!-- Footer -->
    <rect x="10" y="340" width="400" height="20" style="fill: #ADD8E6; border-radius: 10px; padding: 10px; font-size: 18px; font-weight: bold; color: #000;">
        <animateTransform attributeName="transform" type="rotate" from="0, 210, 195" to="0, 0, 195" dur="5s" begin="0s" repeatCount="indefinite"/>
        <text x="15" y="350" style="font-size: 24px; font-weight: bold; color: #000;" data-narration="Footer">Name Services and the Domain Name System</text>
    </rect>
</svg>