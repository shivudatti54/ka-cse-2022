<svg width="420" height="400" data-topic-id="name-services-introduction">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E5F4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2E5F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Introduction to Name Services</title>
  <rect width="100%" height="20" fill="#1B9EDE" rx="5"/>
  <rect x="10" y="10" width="400" height="350" fill="url(#pastel-gradient)"/>
  <rect x="10" y="60" width="400" height="20" fill="#1B9EDE" rx="5"/>
  <g transform="translate(15, 70)">
    <text x="0" y="0" font-size="24" font-family="Arial" fill="#3498DB">Name Services</text>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
  </g>
  <section data-narration="What are Name Services?">
    <rect x="10" y="90" width="400" height="20" fill="#1B9EDE" rx="5"/>
    <text x="20" y="110" font-size="18" font-family="Arial" fill="#2ECC71">A name service is a mapping between human-readable names and low-level addresses.</text>
    <path d="M 50 150 L 150 150" stroke="#3498DB" stroke-width="2" fill="none"/>
    <path d="M 50 180 L 150 180" stroke="#3498DB" stroke-width="2" fill="none"/>
    <g transform="translate(30, 165)">
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#3498DB">Think of it as the &quot;phone book&quot; of a distributed system.</text>
    </g>
  </section>
  <section data-narration="Key Concept: Name Services decouple the logical name of a resource from its physical location.">
    <rect x="10" y="120" width="400" height="20" fill="#1B9EDE" rx="5"/>
    <text x="20" y="140" font-size="18" font-family="Arial" fill="#2ECC71">Name services allow resources to be moved, replicated, or migrated without affecting applications.</text>
    <path d="M 50 200 L 150 200" stroke="#3498DB" stroke-width="2" fill="none"/>
    <path d="M 50 230 L 150 230" stroke="#3498DB" stroke-width="2" fill="none"/>
    <g transform="translate(40, 215)">
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#3498DB">This allows resources to be moved, replicated, or migrated without affecting applications.</text>
    </g>
  </section>
  <section data-narration="The Need for Name Services in Distributed Systems">
    <rect x="10" y="160" width="400" height="20" fill="#1B9EDE" rx="5"/>
    <text x="20" y="180" font-size="18" font-family="Arial" fill="#2ECC71">Distributed systems present several challenges that name services are designed to solve.</text>
    <path d="M 50 250 L 150 250" stroke="#3498DB" stroke-width="2" fill="none"/>
    <path d="M 50 280 L 150 280" stroke="#3498DB" stroke-width="2" fill="none"/>
    <g transform="translate(30, 285)">
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#3498DB">Scalability, transparency, replication management, and dynamic updates are key benefits.</text>
    </g>
  </section>
  <section data-narration="Requirements for Name Services">
    <rect x="10" y="200" width="400" height="20" fill="#1B9EDE" rx="5"/>
    <text x="20" y="220" font-size="18" font-family="Arial" fill="#2ECC71">Name services require scalability, transparency, replication management, and dynamic updates.</text>
    <path d="M 50 300 L 150 300" stroke="#3498DB" stroke-width="2" fill="none"/>
    <path d="M 50 330 L 150 330" stroke="#3498DB" stroke-width="2" fill="none"/>
    <g transform="translate(35, 335)">
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#3498DB">These requirements ensure name services are efficient and effective in distributed systems.</text>
    </g>
  </section>
  <section data-narration="Benefits of Name Services">
    <rect x="10" y="240" width="400" height="20" fill="#1B9EDE" rx="5"/>
    <text x="20" y="260" font-size="18" font-family="Arial" fill="#2ECC71">Name services provide scalability, transparency, replication management, and dynamic updates.</text>
    <path d="M 50 350 L 150 350" stroke="#3498DB" stroke-width="2" fill="none"/>
    <path d="M 50 380 L 150 380" stroke="#3498DB" stroke-width="2" fill="none"/>
    <g transform="translate(40, 395)">
      <text x="0" y="0" font-size="16" font-family="Arial" fill="#3498DB">These benefits ensure name services are efficient and effective in distributed systems.</text>
    </g>
  </section>
  <footer>
    <text x="10" y="370" font-size="18" font-family="Arial" fill="#3498DB">Developed by [Your Name]</text>
  </footer>
</svg>