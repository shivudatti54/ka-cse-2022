<svg width="420" height="400" data-topic-id="131-133" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="parallax-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7c2f2" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6495ed" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4b0082" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#parallax-grad)"/>
  <title>Distributed File Systems</title>
  <g transform="translate(0, 20)">
    <rect x="0" y="0" width="420" height="200" fill="#fff" rx="10"/>
    <rect x="0" y="200" width="420" height="100" fill="#fff" rx="10"/>
    <g transform="translate(10, 220)">
      <text x="50%" y="60%" font-size="24" fill="#4b0082">13.1 Introduction to Distributed File Systems</text>
      <text x="50%" y="90%" font-size="18" fill="#6495ed">Key Characteristics:</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
      <line x1="50%" y1="50%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
      <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
      <text x="50%" y="110%" font-size="18" fill="#6495ed">Distributed architecture: Files are stored on multiple physical devices or nodes</text>
    </g>
    <g transform="translate(10, 250)">
      <rect x="0" y="0" width="420" height="200" fill="#fff" rx="10"/>
      <rect x="0" y="200" width="420" height="100" fill="#fff" rx="10"/>
      <g transform="translate(10, 220)">
        <text x="50%" y="60%" font-size="24" fill="#4b0082">13.2 File Service Architecture</text>
        <text x="50%" y="90%" font-size="18" fill="#6495ed">Components:</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
        <line x1="50%" y1="50%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
        <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
        <rect x="10" y="50" width="200" height="50" fill="#fff" rx="10" stroke="#4b0082" stroke-width="2"/>
        <text x="15%" y="60%" font-size="18" fill="#6495ed">Client: The application or user that requests access to files</text>
        <rect x="15" y="100" width="200" height="50" fill="#fff" rx="10" stroke="#4b0082" stroke-width="2"/>
        <text x="15%" y="110%" font-size="18" fill="#6495ed">File Server: The node that stores and manages files</text>
        <rect x="15" y="160" width="200" height="50" fill="#fff" rx="10" stroke="#4b0082" stroke-width="2"/>
        <text x="15%" y="170%" font-size="18" fill="#6495ed">File System Manager: The component that coordinates file access and management across multiple nodes</text>
        <rect x="15" y="220" width="200" height="50" fill="#fff" rx="10" stroke="#4b0082" stroke-width="2"/>
        <text x="15%" y="230%" font-size="18" fill="#6495ed">Network: The communication pathway between nodes</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
        <line x1="50%" y1="50%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
        <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
      </g>
      <g transform="translate(10, 280)">
        <text x="50%" y="60%" font-size="24" fill="#4b0082">13.3 Types of Distributed File Systems</text>
        <text x="50%" y="90%" font-size="18" fill="#6495ed">Hierarchical Distributed File Systems</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
        <line x1="50%" y1="50%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
        <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
        <rect x="10" y="50" width="200" height="50" fill="#fff" rx="10" stroke="#4b0082" stroke-width="2"/>
        <text x="15%" y="60%" font-size="18" fill="#6495ed">Structure: Files are stored in a hierarchical structure</text>
        <rect x="15" y="100" width="200" height="50" fill="#fff" rx="10" stroke="#4b0082" stroke-width="2"/>
        <text x="15%" y="110%" font-size="18" fill="#6495ed">Access is based on a hierarchical structure</text>
        <rect x="15" y="160" width="200" height="50" fill="#fff" rx="10" stroke="#4b0082" stroke-width="2"/>
        <text x="15%" y="170%" font-size="18" fill="#6495ed">This allows for efficient storage and retrieval of files</text>
        <rect x="15" y="220" width="200" height="50" fill="#fff" rx="10" stroke="#4b0082" stroke-width="2"/>
        <text x="15%" y="230%" font-size="18" fill="#6495ed">Scalability is also improved</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite"/>
        <line x1="50%" y1="50%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
        <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#4b0082" stroke-width="4" animation="scale 2 2 1 1"/>
      </g>
    </g>
    <g transform="translate(10, 320)">
      <rect x="0" y="0" width="420" height="100" fill="#fff" rx="10"/>
      <rect x="0" y="100" width="420" height="100" fill="#fff" rx="10"/>
      <g transform="translate(10, 110)">
        <text x="50%" y="60%" font-size="24" fill="#4b0082">Footer</text>
      </g>
      <g transform="translate(10, 230)">
        <text x="50%" y="60%" font-size="24" fill="#4b0082">References</text>
      </g>
    </g>
  </g>
</svg>