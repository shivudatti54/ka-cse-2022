<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="distributed-systems-coordination-agreement">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#CCFFCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#gradient-background)"/>
  
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" fill="#3498DB">
    Distributed Systems: Coordination and Agreement
  </text>
  
  <!-- Section 1: Introduction -->
  <section id="section1" data-narration="Distributed systems are a collection of independent computers that work together as a single system to achieve a common goal.">
    <rect x="20%" y="150%" width="60%" height="20%" fill="#F7F7F7" rx="5"/>
    <text x="30%" y="170%" font-size="18" font-family="Arial" fill="#333">
      <tspan>Decentralization, Autonomy, Distribution, Concurrency, and Fault tolerance</tspan>
    </text>
  </section>
  <animateTransform attribute="transform" type="rotate" from="0" to="360" dur="5000" begin="0s"/>  
  <animateTransform attribute="transform" type="translate" from="0,150" to="20,150" dur="5000" begin="0s"/>  
  <animateTransform attribute="transform" type="scale" from="1" to="1.5" dur="5000" begin="0s"/>  
  <animateTransform attribute="transform" type="translate" from="20,150" to="30,150" dur="5000" begin="0s"/>  
  <animate attribute="opacity" from="1" to="0" dur="5000" begin="0s"/>  
  <animate attribute="y" from="150" to="170" dur="5000" begin="0s"/>  
  <animate attribute="x" from="20" to="30" dur="5000" begin="0s"/>  
  <animate attribute="fill" from="#F7F7F7" to="#E5E5E5" dur="5000" begin="0s"/>
  
  <!-- Section 2: Characteristics of Distributed Systems -->
  <section id="section2" data-narration="Distributed systems have the following characteristics:">
    <rect x="20%" y="280%" width="60%" height="20%" fill="#F7F7F7" rx="5"/>
    <text x="30%" y="300%" font-size="18" font-family="Arial" fill="#333">
      <tspan>Decentralization, Autonomy, Distribution, Concurrency, and Fault tolerance</tspan>
    </text>
  </section>
  <animateTransform attribute="transform" type="rotate" from="0" to="360" dur="5000" begin="1s"/>  
  <animateTransform attribute="transform" type="translate" from="0,280" to="20,280" dur="5000" begin="1s"/>  
  <animateTransform attribute="transform" type="scale" from="1" to="1.5" dur="5000" begin="1s"/>  
  <animateTransform attribute="transform" type="translate" from="20,280" to="30,280" dur="5000" begin="1s"/>  
  <animate attribute="opacity" from="1" to="0" dur="5000" begin="1s"/>  
  <animate attribute="y" from="280" to="300" dur="5000" begin="1s"/>  
  <animate attribute="x" from="20" to="30" dur="5000" begin="1s"/>  
  <animate attribute="fill" from="#F7F7F7" to="#E5E5E5" dur="5000" begin="1s"/>
  
  <!-- Section 3: Coordination and Agreement -->
  <section id="section3" data-narration="Coordination and Agreement are essential for achieving the common goal of a distributed system.">
    <rect x="20%" y="410%" width="60%" height="20%" fill="#F7F7F7" rx="5"/>
    <text x="30%" y="430%" font-size="18" font-family="Arial" fill="#333">
      <tspan>Coordination and Agreement are essential for achieving the common goal of a distributed system</tspan>
    </text>
  </section>
  <animateTransform attribute="transform" type="rotate" from="0" to="360" dur="5000" begin="2s"/>  
  <animateTransform attribute="transform" type="translate" from="0,410" to="20,410" dur="5000" begin="2s"/>  
  <animateTransform attribute="transform" type="scale" from="1" to="1.5" dur="5000" begin="2s"/>  
  <animateTransform attribute="transform" type="translate" from="20,410" to="30,410" dur="5000" begin="2s"/>  
  <animate attribute="opacity" from="1" to="0" dur="5000" begin="2s"/>  
  <animate attribute="y" from="410" to="430" dur="5000" begin="2s"/>  
  <animate attribute="x" from="20" to="30" dur="5000" begin="2s"/>  
  <animate attribute="fill" from="#F7F7F7" to="#E5E5E5" dur="5000" begin="2s"/>
  
  <!-- Section 4: Distributed Mutual Exclusion -->
  <section id="section4" data-narration="Distributed Mutual Exclusion is a problem in distributed systems where two or more nodes want to access a shared resource simultaneously.">
    <rect x="20%" y="550%" width="60%" height="20%" fill="#F7F7F7" rx="5"/>
    <text x="30%" y="570%" font-size="18" font-family="Arial" fill="#333">
      <tspan>Distributed Mutual Exclusion is a problem in distributed systems where two or more nodes want to access a shared resource simultaneously</tspan>
    </text>
  </section>
  <animateTransform attribute="transform" type="rotate" from="0" to="360" dur="5000" begin="3s"/>  
  <animateTransform attribute="transform" type="translate" from="0,550" to="20,550" dur="5000" begin="3s"/>  
  <animateTransform attribute="transform" type="scale" from="1" to="1.5" dur="5000" begin="3s"/>  
  <animateTransform attribute="transform" type="translate" from="20,550" to="30,550" dur="5000" begin="3s"/>  
  <animate attribute="opacity" from="1" to="0" dur="5000" begin="3s"/>  
  <animate attribute="y" from="550" to="570" dur="5000" begin="3s"/>  
  <animate attribute="x" from="20" to="30" dur="5000" begin="3s"/>  
  <animate attribute="fill" from="#F7F7F7" to="#E5E5E5" dur="5000" begin="3s"/>
  
  <!-- Section 5: Distributed Generalized Lock Algorithm -->
  <section id="section5" data-narration="The Distributed Generalized Lock Algorithm (DGLA) is a distributed mutual exclusion algorithm that allows multiple nodes to access a shared resource simultaneously.">
    <rect x="20%" y="690%" width="60%" height="20%" fill="#F7F7F7" rx="5"/>
    <text x="30%" y="710%" font-size="18" font-family="Arial" fill="#333">
      <tspan>The Distributed Generalized Lock Algorithm (DGLA) is a distributed mutual exclusion algorithm that allows multiple nodes to access a shared resource simultaneously</tspan>
    </text>
  </section>
  <animateTransform attribute="transform" type="rotate" from="0" to="360" dur="5000" begin="4s"/>  
  <animateTransform attribute="transform" type="translate" from="0,690" to="20,690" dur="5000" begin="4s"/>  
  <animateTransform attribute="transform" type="scale" from="1" to="1.5" dur="5000" begin="4s"/>  
  <animateTransform attribute="transform" type="translate" from="20,690" to="30,690" dur="5000" begin="4s"/>  
  <animate attribute="opacity" from="1" to="0" dur="5000" begin="4s"/>  
  <animate attribute="y" from="690" to="710" dur="5000" begin="4s"/>  
  <animate attribute="x" from="20" to="30" dur="5000" begin="4s"/>  
  <animate attribute="fill" from="#F7F7F7" to="#E5E5E5" dur="5000" begin="4s"/>
  
  <!-- Footer -->
  <text x="50%" y="380%" font-size="18" font-family="Arial" fill="#3498DB">
    Created by [Your Name]
  </text>
</svg>