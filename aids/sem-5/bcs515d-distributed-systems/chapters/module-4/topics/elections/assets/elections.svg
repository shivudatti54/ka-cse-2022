<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="election-algorithms">
  <style>
    text {
      font-family: Arial, sans-serif;
      font-size: 16px;
    }
    .section {
      margin-bottom: 20px;
    }
    .section .title {
      margin-bottom: 10px;
    }
    .section .description {
      color: #666;
    }
  </style>
  <rect x="0" y="0" width="100%" height="100%" fill="#C7E5F4" rx="10" />
  <rect x="0" y="0" width="100%" height="50" fill="#ADD8E6" />
  <rect x="0" y="50" width="100%" height="150" fill="#F7F2E9" />
  <rect x="0" y="200" width="100%" height="50" fill="#F7DC6F" />
  <rect x="0" y="250" width="100%" height="150" fill="#C9E4CA" />
  <title>Election Algorithms</title>
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
  <animate attributeName="opacity" from="0" to="1" dur="2s" begin="2s" repeatCount="indefinite" />
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="4s" repeatCount="indefinite" />
  <animate attributeName="opacity" from="0" to="1" dur="2s" begin="6s" repeatCount="indefinite" />
  <path d="M 50 100 L 200 100" stroke="#3498DB" stroke-width="2" />
  <path d="M 50 120 L 200 120" stroke="#2ECC71" stroke-width="2" />
  <path d="M 50 140 L 200 140" stroke="#FFC107" stroke-width="2" />
  <path d="M 50 160 L 200 160" stroke="#8E44AD" stroke-width="2" />
  <g transform="translate(50 100)">
    <text x="0" y="0" text-anchor="start" font-size="24" font-family="Arial" data-narration="Bully Algorithm Introduction">
      Bully Algorithm
    </text>
  </g>
  <g transform="translate(50 150)">
    <text x="0" y="0" text-anchor="start" font-size="20" font-family="Arial" data-narration="How Bully Algorithm Works">
      How it works:
    </text>
    <text x="0" y="30" text-anchor="start" font-size="18" font-family="Arial">1. When a process detects that the coordinator has failed, it initiates an election</text>
    <text x="0" y="60" text-anchor="start" font-size="18" font-family="Arial">2. It sends ELECTION messages to all processes with higher IDs</text>
    <text x="0" y="90" text-anchor="start" font-size="18" font-family="Arial">3. If no response is received, it declares itself as leader</text>
    <text x="0" y="120" text-anchor="start" font-size="18" font-family="Arial">4. If responses are received, it waits for the new coordinator message</text>
  </g>
  <g transform="translate(50 250)">
    <text x="0" y="0" text-anchor="start" font-size="24" font-family="Arial" data-narration="Bully Algorithm Advantages">
      Advantages:
    </text>
    <text x="0" y="30" text-anchor="start" font-size="20" font-family="Arial">Simple to implement</text>
    <text x="0" y="60" text-anchor="start" font-size="20" font-family="Arial">Guarantees election of highest priority process</text>
  </g>
  <g transform="translate(50 300)">
    <text x="0" y="0" text-anchor="start" font-size="24" font-family="Arial" data-narration="Bully Algorithm Disadvantages">
      Disadvantages:
    </text>
    <text x="0" y="30" text-anchor="start" font-size="20" font-family="Arial">Generates many messages (O(n²) in worst case)</text>
    <text x="0" y="60" text-anchor="start" font-size="20" font-family="Arial">Not efficient</text>
  </g>
</svg>