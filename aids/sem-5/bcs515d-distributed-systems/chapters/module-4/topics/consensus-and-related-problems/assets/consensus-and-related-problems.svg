<svg width="420" height="400" data-topic-id="consensus-and-related-problems">
  <desc>
    <data-narration>Introduction to Consensus</data-narration>
    <data-narration>Consensus is the fundamental problem of achieving agreement among a group of processes (or nodes) on a single value or a single course of action, despite the possibility of failures.</data-narration>
    <data-narration>It is central to many distributed algorithms and applications, including distributed databases, replicated state machines, and blockchain systems.</data-narration>
  </desc>

  <style>
    /* Add a gradient background with pastel colors */
    background-color: #ADD8E6;
    background-image: linear-gradient(to bottom, #B2FFFC, #C5E1F5, #E6F5F5);
  </style>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="20" fill="#2196F3" rx="5" data-narration="Title: Consensus and Related Problems" />
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#000" text-anchor="middle">Consensus and Related Problems</text>

  <!-- Section 1: Formal Definition of the Consensus Problem -->
  <rect x="10" y="60" width="400" height="80" fill="#FFC107" rx="5" data-narration="The consensus problem is formally defined by three properties that must be satisfied:" />
  <text x="20" y="80" font-size="18" font-family="Arial" fill="#000" text-anchor="middle">
    <animate xlink:href="#animate-terminations" begin="0s" dur="2s" repeatCount="indefinite" />
    Termination: Every correct process eventually decides on a value.
    <animate xlink:href="#animate-integrity" begin="2s" dur="2s" repeatCount="indefinite" />
    Integrity: Every process decides at most one value.
    <animate xlink:href="#animate-agreement" begin="4s" dur="2s" repeatCount="indefinite" />
    Agreement: All correct processes that decide must agree on the same value.
  </text>

  <!-- Section 2: System Models and Assumptions -->
  <rect x="10" y="160" width="400" height="80" fill="#2196F3" rx="5" data-narration="System Models and Assumptions:" />
  <text x="20" y="180" font-size="18" font-family="Arial" fill="#000" text-anchor="middle">
    <animate xlink:href="#animate-sync-asynch" begin="0s" dur="2s" repeatCount="indefinite" />
    Synchronous vs. Asynchronous Systems
    <rect x="20" y="220" width="180" height="20" fill="#2196F3" rx="5" />
    <text x="10" y="240" font-size="12" font-family="Arial" fill="#000" text-anchor="middle">Synchronous: Message delays and process execution speeds have known upper bounds</text>
    <rect x="220" y="220" width="180" height="20" fill="#2196F3" rx="5" />
    <text x="310" y="240" font-size="12" font-family="Arial" fill="#000" text-anchor="middle">Asynchronous: No timing assumptions - messages can be arbitrarily delayed</text>
  </text>

  <!-- Section 3: Failure Models -->
  <rect x="10" y="260" width="400" height="80" fill="#FFC107" rx="5" data-narration="Failure Models:" />
  <text x="20" y="280" font-size="18" font-family="Arial" fill="#000" text-anchor="middle">
    <animate xlink:href="#animate-crash-byzantine" begin="0s" dur="2s" repeatCount="indefinite" />
    Crash failures: Processes may stop executing without warning
    <rect x="20" y="320" width="180" height="20" fill="#2196F3" rx="5" />
    <text x="10" y="340" font-size="12" font-family="Arial" fill="#000" text-anchor="middle">Crash failures: Processes may stop executing without warning</text>
    <rect x="220" y="320" width="180" height="20" fill="#2196F3" rx="5" />
    <text x="310" y="340" font-size="12" font-family="Arial" fill="#000" text-anchor="middle">Byzantine failures: Processes may behave arbitrarily, including malicious behavior</text>
  </text>

  <!-- Section 4: FLP Impossibility Result -->
  <rect x="10" y="300" width="400" height="80" fill="#2196F3" rx="5" data-narration="The FLP Impossibility Result:" />
  <text x="20" y="320" font-size="18" font-family="Arial" fill="#000" text-anchor="middle">
    <animate xlink:href="#animate-flp" begin="0s" dur="2s" repeatCount="indefinite" />
    In an asynchronous distributed system with at least one process that may 
  </text>

  <!-- Section 5: Conclusion -->
  <rect x="10" y="360" width="400" height="80" fill="#FFC107" rx="5" data-narration="Conclusion:" />
  <text x="20" y="380" font-size="18" font-family="Arial" fill="#000" text-anchor="middle">
    Consensus is a fundamental problem in distributed systems, requiring careful consideration of system models, assumptions, and failure scenarios.
  </text>

  <!-- Footer at bottom -->
  <rect x="10" y="400" width="400" height="20" fill="#2196F3" rx="5" data-narration="Footer" />
  <text x="20" y="420" font-size="12" font-family="Arial" fill="#000" text-anchor="middle">Consensus and Related Problems</text>

  <!-- Arrow markers for connections -->
  <line x1="10" y1="250" x2="10" y2="150" fill="#2196F3" stroke-width="2" />
  <line x1="10" y1="250" x2="10" y2="350" fill="#2196F3" stroke-width="2" />
  <line x1="10" y1="250" x2="10" y2="450" fill="#2196F3" stroke-width="2" />
  <line x1="10" y1="350" x2="10" y2="250" fill="#2196F3" stroke-width="2" />
  <line x1="10" y1="350" x2="10" y2="350" fill="#2196F3" stroke-width="2" />
  <line x1="10" y1="450" x2="10" y2="350" fill="#2196F3" stroke-width="2" />

  <!-- Animations -->
  <animate xlink:href="#animate-terminations" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate xlink:href="#animate-integrity" begin="2s" dur="2s" repeatCount="indefinite" />
  <animate xlink:href="#animate-agreement" begin="4s" dur="2s" repeatCount="indefinite" />
  <animate xlink:href="#animate-sync-asynch" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate xlink:href="#animate-crash-byzantine" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate xlink:href="#animate-flp" begin="0s" dur="2s" repeatCount="indefinite" />
</svg>