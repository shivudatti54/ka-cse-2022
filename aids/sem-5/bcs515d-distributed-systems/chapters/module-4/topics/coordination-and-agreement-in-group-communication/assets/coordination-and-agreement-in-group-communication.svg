<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="CoordinationAndAgreementInGroupCommunication">
  <style>
    /* Add some basic styling */
    body {
      background-color: #C7E8F5;
      font-family: Arial, sans-serif;
    }
    .section {
      margin-bottom: 20px;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #3498DB;
    }
    .description {
      font-size: 18px;
      color: #2ECC71;
    }
    .arrow {
      fill: #F1C40F;
    }
  </style>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#F7F7F7" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient)" rx="10" />
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="100" height="20" style="fill: #F1C40F" rx="5" />
    <text x="5" y="5" class="title">Coordination and Agreement in Group Communication</text>
    <text x="5" y="25" class="description">Distributed Mutual Exclusion</text>
    <animate transform="translate(0, 30)" begin="0s" duration="2s" fill="freeze" />
    <rect x="0" y="40" width="100" height="20" style="fill: #F1C40F" rx="5" />
    <text x="5" y="45" class="description">Mutual Exclusion: The ability of a process to prevent other processes from accessing a shared resource while it is being used.</text>
    <animate transform="translate(0, 70)" begin="2s" duration="2s" fill="freeze" />
    <rect x="0" y="90" width="100" height="20" style="fill: #F1C40F" rx="5" />
    <text x="5" y="95" class="description">Distributed Mutual Exclusion: Prevents two or more nodes from accessing a shared resource simultaneously.</text>
    <animate transform="translate(0, 130)" begin="4s" duration="2s" fill="freeze" />
    <rect x="0" y="160" width="100" height="20" style="fill: #F1C40F" rx="5" />
    <text x="5" y="165" class="description">Coordination and Agreement in Group Communication: Enables multiple nodes to work together towards a common goal.</text>
    <animate transform="translate(0, 200)" begin="6s" duration="2s" fill="freeze" />
    <rect x="0" y="250" width="100" height="20" style="fill: #F1C40F" rx="5" />
    <text x="5" y="255" class="description">Communication Protocols: Standardized protocols used to enable communication between nodes.</text>
  </g>
  <g transform="translate(10, 300)">
    <text x="5" y="305" class="description">Example: Distributed Mutual Exclusion</text>
  </g>
  <g transform="translate(10, 350)">
    <text x="5" y="355" class="description">Arrow markers for connections</text>
    <circle cx="100" cy="100" r="5" class="arrow" />
  </g>
  <g transform="translate(10, 400)">
    <text x="5" y="405" class="description">Footer text</text>
  </g>
</svg>