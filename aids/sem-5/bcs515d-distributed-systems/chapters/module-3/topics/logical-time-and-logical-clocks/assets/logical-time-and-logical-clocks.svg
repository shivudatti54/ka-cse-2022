<svg width="420" height="400" data-topic-id="logical-time-and-logical-clocks">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>Logical Time and Logical Clocks</title>
  <g transform="translate(20, 20)">
    <section data-narration="Introduction to Logical Time">
      <rect width="300" height="50" fill="#1A64FC"/>
      <text x="10" y="15" font-size="18" fill="#fff">Logical Time</text>
      <text x="10" y="30" font-size="14" fill="#fff">The concept of time in a distributed system, where all processes agree on a common time scale.</text>
    </section>
    <g transform="translate(10, 80)">
      <section data-narration="Definitions of Logical Clocks">
        <rect width="300" height="50" fill="#1A64FC"/>
        <text x="10" y="15" font-size="18" fill="#fff">Logical Clocks</text>
        <text x="10" y="30" font-size="14" fill="#fff">A mechanism used to assign a unique timestamp to each process in a distributed system.</text>
      </section>
      <g transform="translate(0, 80)">
        <section data-narration="Types of Logical Clocks">
          <rect width="300" height="50" fill="#1A64FC"/>
          <text x="10" y="15" font-size="18" fill="#fff">Total Order Clocks</text>
          <text x="10" y="30" font-size="14" fill="#fff">These clocks assign a unique timestamp to each process, and the timestamps are totally ordered.</text>
          <rect x="10" y="60" width="300" height="50" fill="#1A64FC"/>
          <text x="10" y="65" font-size="18" fill="#fff">Partial Order Clocks</text>
          <text x="10" y="80" font-size="14" fill="#fff">These clocks only assign a unique timestamp to each process, but the timestamps are not totally ordered.</text>
        </section>
      </g>
    </g>
    <g transform="translate(10, 130)">
      <section data-narration="Process States">
        <rect width="300" height="50" fill="#1A64FC"/>
        <text x="10" y="15" font-size="18" fill="#fff">Process States</text>
        <text x="10" y="30" font-size="14" fill="#fff">A process state represents the state of a process at a particular point in time.</text>
        <ul>
          <li><text x="10" y="50" font-size="14" fill="#fff">Ready</text>
            <text x="10" y="60" font-size="14" fill="#fff">The process is waiting to be executed.</text>
          </li>
          <li><text x="10" y="80" font-size="14" fill="#fff">Running</text>
            <text x="10" y="90" font-size="14" fill="#fff">The process is currently executing.</text>
          </li>
          <li><text x="10" y="110" font-size="14" fill="#fff">Wait</text>
            <text x="10" y="120" font-size="14" fill="#fff">The process is waiting for some event to occur.</text>
          </li>
          <li><text x="10" y="140" font-size="14" fill="#fff">Zombie</text>
            <text x="10" y="150" font-size="14" fill="#fff">The process has terminated but its parent process has not waited for it to finish.</text>
          </li>
        </ul>
      </section>
    </g>
    <g transform="translate(10, 190)">
      <section data-narration="Events and Synchronization">
        <rect width="300" height="50" fill="#1A64FC"/>
        <text x="10" y="15" font-size="18" fill="#fff">Events</text>
        <text x="10" y="30" font-size="14" fill="#fff">An event represents a change in the state of a process.</text>
        <text x="10" y="50" font-size="14" fill="#fff">Synchronization is the process of coordinating the actions of multiple processes to ensure that they execute concurrently safely.</text>
      </section>
    </g>
    <g transform="translate(10, 250)">
      <section data-narration="Logical Time Synchronization">
        <rect width="300" height="50" fill="#1A64FC"/>
        <text x="10" y="15" font-size="18" fill="#fff">Logical Time Synchronization</text>
        <text x="10" y="30" font-size="14" fill="#fff">Ensures that all processes agree on a common time scale.</text>
      </section>
    </g>
    <footer>Logical Time and Logical Clocks</footer>
  </g>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 20)" to="translate(20, 500)" dur="10s" begin="0s" delay="2s"/>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 500)" to="translate(20, 20)" dur="10s" begin="3s" delay="1s"/>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 20)" to="translate(20, 500)" dur="10s" begin="6s" delay="3s"/>
  <animateTransform attributeName="transform" type="translate" from="translate(20, 500)" to="translate(20, 20)" dur="10s" begin="9s" delay="4s"/>
</svg>