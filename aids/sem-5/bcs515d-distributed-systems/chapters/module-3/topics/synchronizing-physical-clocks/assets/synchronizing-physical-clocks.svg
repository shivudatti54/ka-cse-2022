<svg width="420" height="400" data-topic-id="synchronizing-physical-clocks">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  
  <title>Synchronizing Physical Clocks</title>
  
  <section data-narration="Introduction">
    <rect x="20" y="50" width="360" height="30" fill="#1A1D23"/>
    <text x="50" y="70" font-size="24" font-family="Arial" fill="#FFC107">In distributed systems, synchronizing physical clocks is crucial for maintaining consistency across different nodes.</text>
  </section>
  
  <section data-narration="Types of Clock Synchronization">
    <rect x="20" y="100" width="360" height="30" fill="#1A1D23"/>
    <text x="50" y="130" font-size="18" font-family="Arial" fill="#B2FFFC">There are two primary types of clock synchronization:</text>
    <rect x="20" y="150" width="360" height="30" fill="#1A1D23"/>
    <text x="50" y="170" font-size="18" font-family="Arial" fill="#FFC107">Client-Server Synchronization and Peer-to-Peer Synchronization.</text>
  </section>
  
  <section data-narration="Clock Synchronization Algorithms">
    <rect x="20" y="200" width="360" height="30" fill="#1A1D23"/>
    <text x="50" y="220" font-size="18" font-family="Arial" fill="#B2FFFC">Several algorithms are used to synchronize physical clocks:</text>
    <rect x="20" y="250" width="360" height="30" fill="#1A1D23"/>
    <text x="50" y="270" font-size="18" font-family="Arial" fill="#FFC107">NTP, PDCP, and Synchronous Clock Synchronization.</text>
  </section>
  
  <section data-narration="Clock Drift and Skew">
    <rect x="20" y="300" width="360" height="30" fill="#1A1D23"/>
    <text x="50" y="320" font-size="18" font-family="Arial" fill="#B2FFFC">Clock drift and skew can be minimized using synchronization algorithms.</text>
  </section>
  
  <section data-narration="Synchronization Interval">
    <rect x="20" y="350" width="360" height="30" fill="#1A1D23"/>
    <text x="50" y="370" font-size="18" font-family="Arial" fill="#FFC107">A shorter synchronization interval ensures more accurate synchronization.</text>
  </section>
  
  <section data-narration="Example Use Case">
    <rect x="20" y="400" width="360" height="30" fill="#1A1D23"/>
    <text x="50" y="420" font-size="18" font-family="Arial" fill="#B2FFFC">Suppose we use NTP to synchronize physical clocks in a distributed system.</text>
  </section>
  
  <footer>Synchronizing Physical Clocks</footer>
  
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" duration="4000" repeatCount="indefinite">
    <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  </animate>
</svg>