<svg width="420" height="400" data-topic-id="Data-Visualization-With-Matplotlib-G">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E4E5FF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2E6CE" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="25" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Data Visualization
    </text>
    <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" fill="#666">
      A crucial step in exploratory data analysis (EDA)
    </text>
  </section>
  
  <!-- Section 2: General Matplotlib Tips -->
  <section data-narration="General Matplotlib Tips">
    <rect x="10" y="70" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="85" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Importing Matplotlib
    </text>
    <text x="20" y="110" font-size="14" font-family="Arial, sans-serif" fill="#666">
      <code>import matplotlib.pyplot as plt</code>
    </text>
    <rect x="10" y="130" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="145" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Setting Plot Style
    </text>
    <text x="20" y="170" font-size="14" font-family="Arial, sans-serif" fill="#666">
      <code>plt.style.use('ggplot')</code>
    </text>
  </section>
  
  <!-- Section 3: Simple Line Plots -->
  <section data-narration="Simple Line Plots">
    <rect x="10" y="200" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="215" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Creating a Line Plot
    </text>
    <text x="20" y="240" font-size="14" font-family="Arial, sans-serif" fill="#666">
      <code>import matplotlib.pyplot as plt
import numpy as np
x = np.linspace(0, 10, 100)
y = np.sin(x)
plt.plot(x, y)</code>
    </text>
    <rect x="10" y="270" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="285" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Customizing Line Plots
    </text>
    <text x="20" y="310" font-size="14" font-family="Arial, sans-serif" fill="#666">
      <code>import matplotlib.pyplot as plt
import numpy as np
x = np.linspace(0, 10, 100)
y1 = np.sin(x)
y2 = np.cos(x)
plt.plot(x, y1, label='sin(x)')
plt.plot(x, y2, label='cos(x)')
plt.legend()</code>
    </text>
  </section>
  
  <!-- Section 4: Simple Scatter Plots -->
  <section data-narration="Simple Scatter Plots">
    <rect x="10" y="350" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="365" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Creating a Scatter Plot
    </text>
    <text x="20" y="390" font-size="14" font-family="Arial, sans-serif" fill="#666">
      <code>import matplotlib.pyplot as plt
import numpy as np
x = np.random.rand(100)
y = np.random.rand(100)
plt.scatter(x, y)</code>
    </text>
  </section>
  
  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2005/10/svg" begin="0s" dur="10s" repeatCount="indefinite">
    <rect x="10" y="10" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="25" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Data Visualization
    </text>
    <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" fill="#666">
      A crucial step in exploratory data analysis (EDA)
    </text>
    <rect x="10" y="70" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="85" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Importing Matplotlib
    </text>
    <text x="20" y="110" font-size="14" font-family="Arial, sans-serif" fill="#666">
      <code>import matplotlib.pyplot as plt</code>
    </text>
    <rect x="10" y="130" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="145" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Setting Plot Style
    </text>
    <text x="20" y="170" font-size="14" font-family="Arial, sans-serif" fill="#666">
      <code>plt.style.use('ggplot')</code>
    </text>
  </animate>
  
  <!-- Title and Footer -->
  <text x="20" y="5" font-size="24" font-family="Arial, sans-serif" fill="#333">
    Data Visualization with Matplotlib
  </text>
