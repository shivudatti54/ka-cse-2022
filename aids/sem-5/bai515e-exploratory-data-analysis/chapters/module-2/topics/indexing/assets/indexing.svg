<svg width="420" height="400" data-topic-id="indexing" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 400" style="background-color: #C7D9F4; background-image: linear-gradient(to top, #A9E4F7, #C7D9F4);">
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#A9E4F7" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C7D9F4" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Section 1: Introduction to Hash Indexing -->
    <rect x="10" y="10" width="400" height="50" data-narration="Introduction to Hash Indexing"
          fill="#3B5998" rx="10"/>
    <text x="15" y="25" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Hash Indexing</text>
    <rect x="10" y="55" width="400" height="50" data-narration="Hash Indexing provides a fundamentally different approach optimized for point queries"
          fill="#3B5998" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-30" begin="0s" dur="1s"/>
    <text x="15" y="75" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Improved for point queries</text>

    <!-- Section 2: Core Concepts and Terminology -->
    <rect x="10" y="125" width="400" height="50" data-narration="Hash Function: Uniform Distribution, Deterministic, Fast to Compute, Avalanche Effect"
          fill="#3B5998" rx="10"/>
    <text x="15" y="140" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Hash Function</text>
    <rect x="10" y="180" width="400" height="50" data-narration="Buckets and Slots: An array of buckets, each holding one or more entries"
          fill="#3B5998" rx="10"/>
    <text x="15" y="195" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Buckets and Slots</text>
    <rect x="10" y="225" width="400" height="50" data-narration="Hash Collision: A collision occurs when two distinct keys hash to the same bucket"
          fill="#3B5998" rx="10"/>
    <text x="15" y="240" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Hash Collision</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-60" begin="0s" dur="1s"/>
    <rect x="10" y="270" width="400" height="50" data-narration="Ideal Hash Function Properties"
          fill="#3B5998" rx="10"/>
    <text x="15" y="285" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Ideal Hash Function Properties</text>

    <!-- Section 3: Handling Hash Collisions -->
    <rect x="10" y="325" width="400" height="50" data-narration="Handling Collisions: Techniques such as open addressing or chaining"
          fill="#3B5998" rx="10"/>
    <text x="15" y="340" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Handling Collisions</text>
    <rect x="10" y="380" width="400" height="50" data-narration="Advantages of Hash Indexing: Fast lookup, minimal storage"
          fill="#3B5998" rx="10"/>
    <text x="15" y="395" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Advantages of Hash Indexing</text>
    <rect x="10" y="425" width="400" height="50" data-narration="Conclusion: Hash Indexing provides an efficient solution for exact-match queries"
          fill="#3B5998" rx="10"/>
    <text x="15" y="440" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Conclusion</text>

    <!-- Title and Footer -->
    <rect x="10" y="5" width="400" height="30" data-topic-id="indexing" fill="#3B5998" rx="10"/>
    <text x="15" y="20" font-size="36" font-family="Arial, sans-serif" fill="#FFFFFF">Indexing</text>
    <rect x="10" y="345" width="400" height="30" fill="#3B5998" rx="10"/>
    <text x="15" y="360" font-size="36" font-family="Arial, sans-serif" fill="#FFFFFF">Data Topic ID: indexing</text>
</svg>