    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,120" dur="1s" begin="6s"/>
    <rect x="20" y="120" width="380" height="30" fill="#2ecc71" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,180" dur="1s" begin="7s"/>
