      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A9FF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#linear-gradient)"/>
  
  <!-- Section 1: Introduction to Pandas Objects -->
  <g data-narration="Introduction to Pandas Objects">
    <text x="20" y="150" font-size="24" font-family="Arial" text-anchor="middle">Pandas</text>
    <rect x="20" y="80" width="380" height="30" fill="#3498db" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,120" dur="1s" begin="0s"/>
  </g>
  
  <!-- Section 2: Creating Pandas Objects -->
  <g data-narration="Creating Pandas Objects">
    <text x="20" y="150" font-size="24" font-family="Arial" text-anchor="middle">Series</text>
    <rect x="20" y="80" width="380" height="30" fill="#2ecc71" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,120" dur="1s" begin="1s"/>
    <rect x="20" y="120" width="380" height="30" fill="#e74c3c" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,180" dur="1s" begin="2s"/>
  </g>
  
  <!-- Section 3: Creating Pandas Objects -->
  <g data-narration="Creating Pandas Objects">
    <text x="20" y="150" font-size="24" font-family="Arial" text-anchor="middle">DataFrame</text>
    <rect x="20" y="80" width="380" height="30" fill="#2ecc71" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,120" dur="1s" begin="2s"/>
    <rect x="20" y="120" width="380" height="30" fill="#e74c3c" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,180" dur="1s" begin="3s"/>
  </g>
  
  <!-- Section 4: Handling Missing Data -->
