<svg width="420" height="400" data-topic-id="pivot-tables">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="50%" stop-color="#33CCFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#0CC0CC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start" fill="#333333">
    Pivot Tables
  </text>
  <!-- Section 1: Truth Table -->
  <rect x="10" y="50" width="400" height="100" fill="#F7F7F7" rx="10" />
  <text x="10" y="60" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Truth Table Structure">
    Structure of a Truth Table
  </text>
  <rect x="10" y="80" width="100" height="20" fill="#E6E6E6" rx="5" />
  <text x="10" y="90" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="2^n rows, n+1 columns">
    2^n rows, n+1 columns
  </text>
  <rect x="120" y="80" width="100" height="20" fill="#E6E6E6" rx="5" />
  <text x="120" y="90" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Example: 2-Variable Truth Table">
    Example: 2-Variable Truth Table
  </text>
  <table x="10" y="120" width="400" height="150">
    <tr>
      <th>Input</th>
      <th>Output</th>
    </tr>
    <tr>
      <td>0 0</td>
      <td>? </td>
    </tr>
    <tr>
      <td>0 1</td>
      <td>? </td>
    </tr>
    <tr>
      <td>1 0</td>
      <td>? </td>
    </tr>
    <tr>
      <td>1 1</td>
      <td>? </td>
    </tr>
  </table>
  <!-- Section 2: Constructing Truth Tables -->
  <rect x="10" y="280" width="400" height="100" fill="#F7F7F7" rx="10" />
  <text x="10" y="290" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Constructing Truth Tables">
    Constructing Truth Tables
  </text>
  <rect x="10" y="310" width="100" height="20" fill="#E6E6E6" rx="5" />
  <text x="10" y="320" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Step 1: Determine Number of Inputs">
    Step 1: Determine Number of Inputs
  </text>
  <rect x="120" y="310" width="100" height="20" fill="#E6E6E6" rx="5" />
  <text x="120" y="320" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Step 2: List All Input Combinations">
    Step 2: List All Input Combinations
  </text>
  <rect x="220" y="310" width="100" height="20" fill="#E6E6E6" rx="5" />
  <text x="220" y="320" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Step 3: Evaluate Expression for Each Row">
    Step 3: Evaluate Expression for Each Row
  </text>
  <!-- Section 3: Canonical Forms from Truth Tables -->
  <rect x="10" y="400" width="400" height="100" fill="#F7F7F7" rx="10" />
  <text x="10" y="410" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Canonical Forms from Truth Tables">
    Canonical Forms from Truth Tables
  </text>
  <rect x="10" y="430" width="100" height="20" fill="#E6E6E6" rx="5" />
  <text x="10" y="440" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Sum of Products (SOP) - Minterms">
    Sum of Products (SOP) - Minterms
  </text>
  <rect x="120" y="430" width="100" height="20" fill="#E6E6E6" rx="5" />
  <text x="120" y="440" font-size="18" font-family="Arial" text-anchor="start" fill="#666666" data-narration="Example: F = A.B + C">
    Example: F = A.B + C
  </text>
  <!-- Animate sections -->
  <animate xmlns="http://www.w3.org/2000/svg"
    begin="indefinite" dur="2s"
    repeatCount="indefinite">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" repeatCount="indefinite" />
  </animate>
  <!-- Footer -->
  <text x="10" y="460" font-size="18" font-family="Arial" text-anchor="start" fill="#333333">
    Pivot Tables
  </text>
</svg>