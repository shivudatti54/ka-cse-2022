      <h1 class="title">Chapter 39: Exploratory Data Analysis</h1>
      <div class="sections">
        <div class="section" data-narration="introduction">
          <h2 class="title">Introduction</h2>
          <p>Exploratory Data Analysis (EDA) is a process of summarizing and visualizing data to understand its distribution, relationships, and patterns.</p>
        </div>
        <div class="section" data-narration="why-eda">
          <h2 class="title">Why Exploratory Data Analysis?</h2>
          <p>EDA can help to identify missing values, understand data distribution, identify outliers, and understand relationships between variables.</p>
        </div>
        <div class="section" data-narration="types-of-data-visualization">
          <h2 class="title">Types of Data Visualization</h2>
          <p>Scatter plots, bar plots, histograms, and box plots are used to visualize different types of data.</p>
