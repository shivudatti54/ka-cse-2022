<svg width="420" height="400" data-topic-id="Exploratory-Data-Analysis">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <style>
      .section {
        background-image: url(#pastel-gradient);
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="#fff"/>
  <rect x="10" y="10" width="380" height="10" fill="#3498db"/>
  <rect x="10" y="40" width="380" height="30" fill="#f1c40f"/>
  <rect x="10" y="70" width="380" height="30" fill="#2ecc71"/>
  <rect x="10" y="110" width="380" height="30" fill="#e74c3c"/>
  <rect x="10" y="150" width="380" height="30" fill="#9b59b6"/>
  <title>Exploratory Data Analysis</title>
  <animateTransform attributeName="transform" type="rotate" from="0 190 20" to="360 190 20" dur="10s" repeatCount="indefinite"/>
  <g id="title-group">
    <text x="220" y="50" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#fff" opacity="0.8">Chapter 23: Exploratory Data Analysis</text>
  </g>
  <g id="section-1-group">
    <rect x="10" y="170" width="380" height="30" fill="#3498db" data-narration="Vectorized String Operations"/>
    <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translateX" from="30" to="30" dur="2s" begin="2s"/>
    <animateTransform attributeName="transform" type="translateX" from="50" to="50" dur="2s" begin="4s"/>
    <g>
      <rect x="20" y="180" width="100" height="20" fill="#fff" stroke="#2ecc71" stroke-width="2"/>
      <text x="60" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">String Methods</text>
    </g>
    <g>
      <rect x="120" y="180" width="100" height="20" fill="#fff" stroke="#2ecc71" stroke-width="2"/>
      <text x="160" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">startswith(), endswith(), isupper(), islower(), strip(), split()}</text>
    </g>
    <rect x="220" y="180" width="100" height="20" fill="#fff" stroke="#2ecc71" stroke-width="2"/>
    <text x="260" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">Example</text>
  </g>
  <g id="section-2-group">
    <rect x="10" y="220" width="380" height="30" fill="#f1c40f" data-narration="Working with Time Series Data"/>
    <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translateX" from="30" to="30" dur="2s" begin="2s"/>
    <animateTransform attributeName="transform" type="translateX" from="50" to="50" dur="2s" begin="4s"/>
    <g>
      <rect x="20" y="230" width="100" height="20" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
      <text x="60" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#9b59b6">pd.DatetimeIndex</text>
    </g>
    <g>
      <rect x="120" y="230" width="100" height="20" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
      <text x="160" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#9b59b6">pd.PeriodIndex</text>
    </g>
    <rect x="220" y="230" width="100" height="20" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
    <text x="260" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#9b59b6">resample(), asfreq()</text>
  </g>
  <g id="section-3-group">
    <rect x="10" y="270" width="380" height="30" fill="#2ecc71" data-narration="Rolling and Expanding Operations"/>
    <animateTransform attributeName="transform" type="translateX" from="10" to="10" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translateX" from="30" to="30" dur="2s" begin="2s"/>
    <animateTransform attributeName="transform" type="translateX" from="50" to="50" dur="2s" begin="4s"/>
    <g>
      <rect x="20" y="280" width="100" height="20" fill="#fff" stroke="#2ecc71" stroke-width="2"/>
      <text x="60" y="290" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2ecc71">roll(), expanding()</text>
    </g>
  </g>
  <g id="footer-group">
    <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#fff">2023</text>
  </g>
</svg>