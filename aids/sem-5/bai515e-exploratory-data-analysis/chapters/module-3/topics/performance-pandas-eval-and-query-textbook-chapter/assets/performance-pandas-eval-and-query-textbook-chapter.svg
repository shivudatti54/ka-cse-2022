<svg width="420" height="400" data-topic-id="performance-pandas-eval-and-query">
  <desc>Animated Educational Diagram for Performance Pandas Eval and Query</desc>
  <style>
    /* Add styles here */
    body {
      background-color: #E5E5EA;
    }
    .section {
      display: flex;
