      <rect x="10" y="10" width="100%" height="100%" fill="#fff" rx="10" data-narration="query" />
      <rect x="10" y="10" width="100%" height="100%" fill="#fff" rx="10" data-narration="key-concepts" />
      <rect x="10" y="10" width="100%" height="100%" fill="#fff" rx="10" data-narration="example-use-cases" />
      <rect x="10" y="10" width="100%" height="100%" fill="#fff" rx="10" data-narration="animations" />
