<svg width="420" height="400" data-topic-id="exploratory-data-analysis">
  <desc>
    <data-narration>
      <p>Exploratory Data Analysis (EDA) is a crucial step in the data analysis process that involves summarizing, visualizing, and interpreting the data to understand its distribution, relationships, and patterns.</p>
    </data-narration>
    <data-narration>
      <p>Pandas provides various functions for performing vectorized string operations, which are operations that can be performed on entire arrays or series at once.</p>
    </data-narration>
    <data-narration>
      <p>Some common string methods include str.count(), str.find(), str.replace(), and str.split().</p>
    </data-narration>
    <data-narration>
      <p>Pandas also provides various regex operations that can be used to manipulate and analyze strings.</p>
    </data-narration>
  </desc>
  <g>
    <rect x="0" y="0" width="420" height="400" fill="#6495ED" />
    <rect x="0" y="0" width="100" height="100" fill="#C9E4CA" rx="10" />
    <rect x="120" y="0" width="100" height="100" fill="#FFC107" rx="10" />
    <rect x="240" y="0" width="100" height="100" fill="#34A85A" rx="10" />
    <rect x="360" y="0" width="100" height="100" fill="#E91E63" rx="10" />
