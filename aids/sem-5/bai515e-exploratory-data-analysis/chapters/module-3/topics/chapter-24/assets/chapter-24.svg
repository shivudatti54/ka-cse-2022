    <path d="M 140,20 L 140,120 L 220,120 Z" fill="#C9E4CA" />
    <path d="M 260,20 L 260,120 L 340,120 Z" fill="#FFC107" />
    <path d="M 380,20 L 380,120 L 460,120 Z" fill="#34A85A" />
    <path d="M 500,20 L 500,120 L 580,120 Z" fill="#E91E63" />
    <text x="10" y="150" font-size="24" fill="#fff">Vectorized String Operations</text>
    <text x="130" y="150" font-size="24" fill="#fff">String Methods</text>
    <text x="250" y="150" font-size="24" fill="#fff">Regex Operations</text>
    <text x="370" y="150" font-size="24" fill="#fff">Data Analysis</text>
    <animate transform="rotate(360 200 200)" begin="1s" dur="10s" repeatCount="indefinite" />
    <animate transform="rotate(360 300 300)" begin="2s" dur="10s" repeatCount="indefinite" />
    <animate transform="rotate(360 400 400)" begin="3s" dur="10s" repeatCount="indefinite" />
