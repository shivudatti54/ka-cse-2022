    <g>
      <path d="M 0,100 L 20,100" stroke="#fff" stroke-width="2" />
      <text x="10" y="110" font-size="18" fill="#fff">str.count()</text>
      <path d="M 0,100 L 40,100" stroke="#fff" stroke-width="2" />
      <text x="30" y="110" font-size="18" fill="#fff">str.find()</text>
      <path d="M 0,100 L 60,100" stroke="#fff" stroke-width="2" />
      <text x="40" y="110" font-size="18" fill="#fff">str.replace()</text>
      <path d="M 0,100 L 80,100" stroke="#fff" stroke-width="2" />
      <text x="50" y="110" font-size="18" fill="#fff">str.split()</text>
    </g>
    <g>
      <path d="M 0,200 L 20,200" stroke="#fff" stroke-width="2" />
      <text x="10" y="210" font-size="18" fill="#fff">str.match()</text>
      <path d="M 0,200 L 40,200" stroke="#fff" stroke-width="2" />
      <text x="30" y="210" font-size="18" fill="#fff">str.search()</text>
      <path d="M 0,200 L 60,200" stroke="#fff" stroke-width="2" />
      <text x="40" y="210" font-size="18" fill="#fff">str.find()</text>
    </g>
