<svg width="420" height="400" data-topic-id="numpy-arrays-sorted-arrays" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="overflow:visible;">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient1)" style="opacity:.5"/>

  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start"
        fill="#FFC107" data-narration="Title: NumPy Arrays Sorted Arrays">
    NumPy Arrays Sorted Arrays
  </text>

  <!-- Section 1: Features -->
  <rect x="0" y="50" width="100%" height="100" fill="#66CCCC" style="opacity:.7"/>
  <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
        fill="#000" data-narration="Features: What are features in NumPy arrays?">
    Features
  </text>
  <rect x="20" y="90" width="80%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="Features are columns in a structured array that store data of a specific type, such as integers, floats, or strings."/>
  <text x="20" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
        fill="#000" data-narration="Each feature has a specific data type, features are stored in a specific order, and features can be accessed using their column index."/>
  <rect x="150" y="90" width="30%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="Example: structured array with features for name, age, and salary."/>
  <animate attributes="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 2: The Basics of NumPy Arrays -->
  <rect x="0" y="200" width="100%" height="100" fill="#33CCCC" style="opacity:.7"/>
  <text x="20" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
        fill="#000" data-narration="The Basics of NumPy Arrays: What are NumPy arrays?">
    The Basics of NumPy Arrays
  </text>
  <rect x="20" y="240" width="80%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="NumPy arrays are multi-dimensional collections of values of the same data type stored in a contiguous block of memory."/>
  <rect x="20" y="270" width="80%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="NumPy arrays support operations like indexing, slicing, and arithmetic."/>
  <rect x="150" y="240" width="30%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="Example: NumPy array with values 1, 2, 3, 4, 5."/>
  <animate attributes="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
  <animate attributes="opacity" begin="4s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 3: Sorted Arrays -->
  <rect x="0" y="370" width="100%" height="100" fill="#66CCCC" style="opacity:.7"/>
  <text x="20" y="390" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
        fill="#000" data-narration="Sorted Arrays: What are sorted arrays?">
    Sorted Arrays
  </text>
  <rect x="20" y="410" width="80%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="Sorted arrays are NumPy arrays that have been sorted in ascending or descending order."/>
  <rect x="20" y="440" width="80%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="Sorted arrays support operations like indexing and slicing."/>
  <rect x="150" y="410" width="30%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="Example: sorted NumPy array with values 1, 2, 3, 4, 5."/>
  <animate attributes="opacity" begin="6s" dur="2s" repeatCount="indefinite"/>
  <animate attributes="opacity" begin="8s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 4: Structured Data -->
  <rect x="0" y="200" width="100%" height="100" fill="#33CCCC" style="opacity:.7"/>
  <text x="20" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
        fill="#000" data-narration="Structured Data: NumPy’s Structured Arrays">
    Structured Data
  </text>
  <rect x="20" y="240" width="80%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="NumPy’s Structured Arrays: a collection of data of different types stored in a single array."/>
  <rect x="150" y="240" width="30%" height="30" rx="10" fill="#FFFFFF" stroke="#000"
        stroke-width="2" data-narration="Example: structured array with features, columns of different types."/>
  <animate attributes="opacity" begin="10s" dur="2s" repeatCount="indefinite"/>
  <animate attributes="opacity" begin="12s" dur="2s" repeatCount="indefinite"/>

  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="start"
        fill="#FFC107">Learn more about NumPy in our tutorials: <a href="https://numpy.org/tutorials">numpy.org/tutorials</a></text>
</svg>