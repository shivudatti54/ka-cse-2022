<svg width="420" height="400" data-topic-id="decomposition-techniques" data-narration="Decomposition is the process of breaking down a relation into smaller relations to eliminate redundancy and anomalies while preserving data integrity.">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
  <g transform="translate(20, 20)">
    <text text-anchor="start" x="10" y="40" font-size="18" font-family="Arial, sans-serif">Decomposition Techniques</text>
    <text text-anchor="start" x="10" y="60" font-size="14" font-family="Arial, sans-serif">What is Decomposition?</text>
    <rect x="10" y="80" width="360" height="20" fill="#F7F7F7" rx="5"/>
    <text text-anchor="start" x="10" y="90" font-size="14" font-family="Arial, sans-serif">Decomposition is the process of breaking down a relation into smaller relations to eliminate redundancy and anomalies while preserving data integrity.</text>
    <g transform="translate(10, 120)">
      <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
      <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Goals of Decomposition</text>
      <g transform="translate(10, 40)">
        <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">1. Eliminate redundancy - Remove duplicate data</text>
      </g>
      <g transform="translate(10, 70)">
        <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">2. Prevent anomalies - Avoid insert, update, delete anomalies</text>
      </g>
      <g transform="translate(10, 100)">
        <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">3. Preserve information - No data loss (lossless join)</text>
      </g>
      <g transform="translate(10, 130)">
        <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">4. Preserve dependencies - Maintain all functional dependencies</text>
      </g>
      <g transform="translate(10, 160)">
        <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Types of Decomposition</text>
        <g transform="translate(10, 190)">
          <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">1. Lossless-Join Decomposition</text>
          <g transform="translate(10, 220)">
            <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">A decomposition of R into R1 and R2 is lossless if:</text>
            <g transform="translate(10, 250)">
              <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
              <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">R1 ⋈ R2 = R (natural join recovers original relation)</text>
            </g>
            <g transform="translate(10, 280)">
              <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
              <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Test for Lossless Join:</text>
              <g transform="translate(10, 310)">
                <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
                <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Decomposition into R1 and R2 is lossless if and only if:</text>
                <g transform="translate(10, 340)">
                  <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
                  <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">(R1 ∩ R2) → R1, OR (R1 ∩ R2) → R2</text>
                </g>
              </g>
            </g>
          </g>
        </g>
      </g>
      <g transform="translate(10, 170)">
        <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">2. Dependency-Preserving Decomposition</text>
        <g transform="translate(10, 190)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">A decomposition preserves dependencies if all original FDs can be checked within individual decomposed relations without computing joins.</text>
        </g>
        <g transform="translate(10, 220)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Test:</text>
          <g transform="translate(10, 250)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">For each FD X → Y in F:</text>
            <g transform="translate(10, 280)">
              <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
              <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Either X → Y can be verified in some Ri</text>
            </g>
            <g transform="translate(10, 310)">
              <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
              <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Or X → Y can be derived from FDs in decomposed relations</text>
            </g>
          </g>
        </g>
      </g>
      <g transform="translate(10, 210)">
        <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">BCNF Decomposition</text>
        <g transform="translate(10, 230)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Algorithm:</text>
          <g transform="translate(10, 260)">
            <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Input: Relation R with FDs F</text>
          </g>
          <g transform="translate(10, 290)">
            <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Output: Set of BCNF relations</text>
          </g>
          <g transform="translate(10, 320)">
            <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">1. If R is in BCNF, return {R}</text>
          </g>
          <g transform="translate(10, 350)">
            <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">2. Find violating FD: X → Y where X is not a superkey</text>
          </g>
          <g transform="translate(10, 380)">
            <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">3. Decompose R into:</text>
            <g transform="translate(10, 410)">
              <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
              <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">R1 = X ∪ Y</text>
            </g>
            <g transform="translate(10, 440)">
              <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
              <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">R2 = R - (Y - X)</text>
            </g>
          </g>
          <g transform="translate(10, 420)">
            <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">4. Recursively decompose R1 and R2</text>
          </g>
        </g>
      </g>
      <g transform="translate(10, 240)">
        <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Example: BCNF Decomposition</text>
        <g transform="translate(10, 260)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Original: Student(SID, Name, DeptID, DeptName, HOD)</text>
        </g>
        <g transform="translate(10, 290)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">FDs:</text>
        </g>
        <g transform="translate(10, 320)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">- SID → Name, DeptID</text>
        </g>
        <g transform="translate(10, 350)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">- DeptID → DeptName, HOD</text>
        </g>
        <g transform="translate(10, 380)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Problem: DeptID → DeptName, HOD violates BCNF (DeptID is not a superkey)</text>
        </g>
        <g transform="translate(10, 410)">
          <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Decomposition:</text>
        </g>
        <g transform="translate(10, 440)">
          <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">1. R1 = Department(DeptID, DeptName, HOD)</text>
        </g>
        <g transform="translate(10, 470)">
          <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">2. R2 = Student(SID, Name, DeptID)</text>
        </g>
        <g transform="translate(10, 510)">
          <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Verification:</text>
        </g>
        <g transform="translate(10, 540)">
          <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">- R1 ∩ R2 = {DeptID}</text>
        </g>
        <g transform="translate(10, 570)">
          <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">- DeptID → DeptName, HOD (DeptID is key of R1) ✓</text>
        </g>
        <g transform="translate(10, 610)">
          <rect x="0" y="0" width="100" height="20" fill="#C5CAE9" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">- Lossless: DeptID is superkey of R1 ✓</text>
        </g>
      </g>
      <g transform="translate(10, 180)">
        <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
        <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">3NF vs BCNF Decomposition</text>
        <g transform="translate(10, 210)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">| Aspect                | <br/></text>
        </g>
        <g transform="translate(10, 240)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">Requirements:</text>
          <g transform="translate(10, 270)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">1. SVG dimensions: width="420" height="400"</text>
          </g>
          <g transform="translate(10, 300)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">2. Include data-topic-id attribute with slugified topic name</text>
          </g>
          <g transform="translate(10, 330)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">3. Use gradient background with pastel colors</text>
          </g>
          <g transform="translate(10, 360)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">4. Include 4-6 sections with data-narration attributes explaining each part</text>
          </g>
          <g transform="translate(10, 390)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">5. Add smooth animations using <animate> elements with sequential begin times</text>
          </g>
          <g transform="translate(10, 420)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">6. Use professional color scheme (indigo, teal, orange accents)</text>
          </g>
          <g transform="translate(10, 450)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">7. Include clear labels and annotations</text>
          </g>
          <g transform="translate(10, 480)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">8. Add arrow markers for connections</text>
          </g>
          <g transform="translate(10, 510)">
            <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
            <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">9. Include a title at top and footer at bottom</text>
          </g>
        </g>
        <g transform="translate(10, 240)">
          <rect x="0" y="0" width="100" height="20" fill="#C7B8EA" rx="5" fill-opacity="0.5"/>
          <text text-anchor="start" x="10" y="10" font-size="14" font-family="Arial, sans-serif">10. Make it educational and visually clear</text>
        </g>
      </g>
    </g>
  </svg>