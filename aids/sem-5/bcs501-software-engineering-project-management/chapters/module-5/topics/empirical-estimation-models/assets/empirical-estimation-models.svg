<svg width="420" height="400" data-topic-id="Empirical-Estimation-Models">
  <rect x="0" y="0" width="420" height="400"
        fill=" gradient(to bottom, #C7B8EA, #87CEEB)" />
  <g transform="translate(10, 10)">
    <title Empirical Estimation Models</title>
  </g>

  <g fill="none" stroke="#333" stroke-width="2">
    <path d="M 10 20" stroke-width="2" />
    <path d="M 10 300" stroke-width="2" />
    <path d="M 10 20 L 380 20" stroke-width="2" />
    <path d="M 10 300 L 380 300" stroke-width="2" />
  </g>

  <g opacity="0.5" transform="translate(150, 150)">
    <section data-narration="Introduction">
      <rect fill="white" width="200" height="50" rx="10" />
      <text x="50" y="20" fill="#333" font-size="18">Introduction</text>
    </section>
    <section data-narration="Definition">
      <rect fill="white" width="200" height="50" rx="10" />
      <text x="50" y="20" fill="#333" font-size="18">Definition</text>
    </section>
    <section data-narration="Delta Model">
      <rect fill="white" width="200" height="50" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0,20" to="0,50" begin="0s" dur="2s" repeatCount="indefinite" />
      <text x="50" y="30" fill="#333" font-size="18">Delta Model</text>
      <text x="50" y="80" fill="#333" font-size="16">Δ = (New Project Effort - Baseline Effort) / Baseline Effort</text>
      <animate attributeName="opacity" from="1" to="0" begin="0s" dur="2s" repeatCount="indefinite" />
    </section>
    <section data-narration="I-Factor Model">
      <rect fill="white" width="200" height="50" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0,20" to="0,70" begin="2s" dur="2s" repeatCount="indefinite" />
      <text x="50" y="30" fill="#333" font-size="18">I-Factor Model</text>
      <text x="50" y="80" fill="#333" font-size="16">Effort = (I x F) / (Team Efficiency x Baseline Effort)</text>
      <animate attributeName="opacity" from="1" to="0" begin="2s" dur="2s" repeatCount="indefinite" />
    </section>
    <section data-narration="Three-Point Estimation">
      <rect fill="white" width="200" height="50" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0,20" to="0,110" begin="4s" dur="2s" repeatCount="indefinite" />
      <text x="50" y="30" fill="#333" font-size="18">Three-Point Estimation</text>
      <text x="50" y="80" fill="#333" font-size="16">A simple estimation technique that uses historical data to estimate the effort required for a software project</text>
      <animate attributeName="opacity" from="1" to="0" begin="4s" dur="2s" repeatCount="indefinite" />
    </section>
  </g>

  <g transform="translate(10, 350)">
    <text x="0" y="0" fill="#333" font-size="18">Arrow markers for connections</text>
    <path d="M 20 20 L 40 40" stroke-width="2" stroke="#333" fill="none" />
    <path d="M 60 20 L 80 40" stroke-width="2" stroke="#333" fill="none" />
    <path d="M 100 20 L 120 40" stroke-width="2" stroke="#333" fill="none" />
  </g>

  <g transform="translate(10, 450)">
    <text x="0" y="0" fill="#333" font-size="18">Footer</text>
  </g>
</svg>