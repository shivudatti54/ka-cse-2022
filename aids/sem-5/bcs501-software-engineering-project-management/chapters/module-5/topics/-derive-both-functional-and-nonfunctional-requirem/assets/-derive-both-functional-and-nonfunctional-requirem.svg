<svg width="420" height="400" data-topic-id="deriving-functional-and-non-functional-requirements">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64BFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(20, 50)">
    <text x="10" y="20" font-size="24" font-family="Arial" fill="#2F4F7F">Deriving Functional and Non-Functional Requirements</text>
  </g>
  <section data-narration="Functional Requirements">
    <div class="section-container">
      <div class="section-title">Functional Requirements</div>
      <div class="section-content">
        <h2>Definition</h2>
        <p>Functional requirements are the description of the system's functions and operations.</p>
        <h2>Examples</h2>
        <ul>
          <li>The online banking system should allow users to login and view their account balance.</li>
          <li>The e-commerce system should allow users to search and purchase products online.</li>
          <li>The healthcare system should allow doctors to view patient medical records and prescribe medication.</li>
        </ul>
      </div>
    </div>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="0s" duration="2s" repeatCount="indefinite"/>
  </section>
  <g transform="translate(20, 150)">
    <section data-narration="Non-Functional Requirements">
      <div class="section-container">
        <div class="section-title">Non-Functional Requirements</div>
        <div class="section-content">
          <h2>Definition</h2>
          <p>Non-functional requirements are the description of the system's properties and behavior, such as performance, security, and usability.</p>
          <h2>Examples</h2>
          <ul>
            <li>The online banking system should be accessible 24/7.</li>
            <li>The e-commerce system should be able to handle a large volume of transactions.</li>
          </ul>
        </div>
      </div>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="2s" duration="2s" repeatCount="indefinite"/>
    </section>
  </g>
  <g transform="translate(20, 250)">
    <section data-narration="Methods for Deriving Functional Requirements">
      <div class="section-container">
        <div class="section-title">Methods for Deriving Functional Requirements</div>
        <div class="section-content">
          <h2>User Interviews</h2>
          <p>Conducting interviews with potential users to understand their needs and requirements.</p>
          <h2>Surveys and Questionnaires</h2>
          <p>Using surveys and questionnaires to gather information about the users' needs and requirements.</p>
          <h2>Workshops and Focus Groups</h2>
          <p>Conducting workshops and focus groups to gather feedback from potential users and stakeholders.</p>
          <h2>Analysis of Existing Systems</h2>
          <p>Analyzing existing systems to identify their strengths and weaknesses.</p>
        </div>
      </div>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="4s" duration="2s" repeatCount="indefinite"/>
    </section>
  </g>
  <g transform="translate(20, 350)">
    <section data-narration="Importance of Non-Functional Requirements">
      <div class="section-container">
        <div class="section-title">Importance of Non-Functional Requirements</div>
        <div class="section-content">
          <h2>Performance</h2>
          <p>The system should be able to perform tasks efficiently and effectively.</p>
          <h2>Security</h2>
          <p>The system should be secure and protect sensitive information.</p>
          <h2>Usability</h2>
          <p>The system should be easy to use and navigate.</p>
        </div>
      </div>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="6s" duration="2s" repeatCount="indefinite"/>
    </section>
  </g>
  <g transform="translate(20, 450)">
    <section data-narration="Benefits of Deriving Requirements">
      <div class="section-container">
        <div class="section-title">Benefits of Deriving Requirements</div>
        <div class="section-content">
          <h2>Clear Understanding</h2>
          <p>Deriving requirements helps to create a clear understanding of the system's needs and requirements.</p>
          <h2>Reduced Risk</h2>
          <p>Deriving requirements reduces the risk of developing a system that does not meet the users' needs.</p>
          <h2>Improved Quality</h2>
          <p>Deriving requirements improves the quality of the system by ensuring that it meets the users' needs and requirements.</p>
        </div>
      </div>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="8s" duration="2s" repeatCount="indefinite"/>
    </section>
  </g>
  <footer>
    <g transform="translate(20, 380)">
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Copyright 2023</text>
    </g>
  </footer>
</svg>