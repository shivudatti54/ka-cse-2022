<svg width="420" height="400" data-topic-id="software-engineering-chapter-3-31-to-36" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-color: #6495ED;">
  <!-- Section 1: Definition of Software Engineering -->
  <rect x="10" y="10" width="400" height="40" fill="#C9E4CA" rx="10" style="z-index: 1;"></rect>
  <text x="10" y="60" fill="#212121" font-size="20" font-family="Arial" text-anchor="start" style="z-index: 2;">Definition of Software Engineering</text>
  <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" style="z-index: 3;"></animate>

  <rect x="10" y="90" width="400" height="40" fill="#C9E4CA" rx="10" style="z-index: 1;"></rect>
  <text x="10" y="140" fill="#212121" font-size="20" font-family="Arial" text-anchor="start" style="z-index: 2;">Importance of Software Engineering</text>
  <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite" style="z-index: 3;"></animate>

  <!-- Section 2: Engineering Principles -->
  <rect x="10" y="180" width="400" height="40" fill="#C9E4CA" rx="10" style="z-index: 1;"></rect>
  <text x="10" y="230" fill="#212121" font-size="20" font-family="Arial" text-anchor="start" style="z-index: 2;">Engineering Principles</text>
  <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite" style="z-index: 3;"></animate>

  <rect x="10" y="270" width="400" height="40" fill="#C9E4CA" rx="10" style="z-index: 1;"></rect>
  <text x="10" y="320" fill="#212121" font-size="20" font-family="Arial" text-anchor="start" style="z-index: 2;">Software Development Life Cycle</text>
  <animate attributeName="opacity" begin="6s" dur="2s" repeatCount="indefinite" style="z-index: 3;"></animate>

  <!-- Section 3: Example -->
  <rect x="10" y="360" width="400" height="40" fill="#C9E4CA" rx="10" style="z-index: 1;"></rect>
  <text x="10" y="410" fill="#212121" font-size="20" font-family="Arial" text-anchor="start" style="z-index: 2;">Example: E-commerce Platform</text>
  <animate attributeName="opacity" begin="8s" dur="2s" repeatCount="indefinite" style="z-index: 3;"></animate>

  <!-- Footer and Title -->
  <rect x="10" y="470" width="400" height="30" fill="#C9E4CA" rx="10" style="z-index: 4;"></rect>
  <text x="15" y="500" fill="#212121" font-size="18" font-family="Arial" text-anchor="start" style="z-index: 5;">Software Engineering Chapter 3</text>
