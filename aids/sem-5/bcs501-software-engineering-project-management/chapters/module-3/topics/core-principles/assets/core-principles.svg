<svg width="420" height="400" data-topic-id="core-principles-greedy-algorithms" xmlns="http://www.w3.org/2000/svg">
  <title>Core Principles: Greedy Algorithms</title>
  <desc>Animated Educational SVG Diagram for Greedy Algorithms</desc>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A98FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="20" width="400" height="350" rx="10" fill="url(#gradient)"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s" repeatCount="indefinite"/>
  
  <section data-narration="Introduction to Greedy Algorithms">
    <rect x="15" y="60" width="350" height="100" rx="5" fill="#F7F7F7"/>
    <text x="30" y="85" font-size="16" font-family="Arial" text-anchor="middle" fill="#333333">Introduction to Greedy Algorithms</text>
  </section>
  
  <section data-narration="Greedy Choice Property">
    <rect x="15" y="170" width="350" height="100" rx="5" fill="#F7F7F7"/>
    <text x="30" y="200" font-size="16" font-family="Arial" text-anchor="middle" fill="#333333">Greedy Choice Property</text>
    <rect x="50" y="150" width="150" height="50" rx="5" fill="#F7F7F7"/>
    <text x="65" y="175" font-size="12" font-family="Arial" text-anchor="middle" fill="#333333">A globally optimal solution can be arrived at by making a locally optimal (greedy) choice.</text>
  </section>
  
  <section data-narration="Optimal Substructure">
    <rect x="15" y="260" width="350" height="100" rx="5" fill="#F7F7F7"/>
    <text x="30" y="285" font-size="16" font-family="Arial" text-anchor="middle" fill="#333333">Optimal Substructure</text>
    <rect x="50" y="230" width="150" height="50" rx="5" fill="#F7F7F7"/>
    <text x="65" y="255" font-size="12" font-family="Arial" text-anchor="middle" fill="#333333">A problem exhibits optimal substructure if an optimal solution to the problem contains optimal solutions to its subproblems.</text>
  </section>
  
  <section data-narration="Comparison with Other Paradigms">
    <rect x="15" y="350" width="350" height="100" rx="5" fill="#F7F7F7"/>
    <text x="30" y="375" font-size="16" font-family="Arial" text-anchor="middle" fill="#333333">Comparison with Other Paradigms</text>
    <g transform="rotate(90 200 200)">
      <rect x="100" y="150" width="150" height="150" rx="5" fill="#F7F7F7"/>
      <text x="120" y="175" font-size="12" font-family="Arial" text-anchor="middle" fill="#333333">Greedy Algorithms</text>
      <line x1="200" y1="200" x2="150" y2="150" stroke="#333333" stroke-width="2"/>
    </g>
    <g transform="rotate(90 100 200)">
      <rect x="150" y="150" width="150" height="150" rx="5" fill="#F7F7F7"/>
      <text x="170" y="175" font-size="12" font-family="Arial" text-anchor="middle" fill="#333333">Dynamic Programming</text>
      <line x1="150" y1="200" x2="100" y2="150" stroke="#333333" stroke-width="2"/>
    </g>
  </section>
  
  <footer><text x="10" y="380" font-size="12" font-family="Arial" text-anchor="middle" fill="#333333">Learn more about Core Principles at <a href="#">https://www.example.com</a></text></footer>
</svg>