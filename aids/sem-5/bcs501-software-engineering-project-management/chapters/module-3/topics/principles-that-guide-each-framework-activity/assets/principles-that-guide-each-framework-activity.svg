<svg width="420" height="400" data-topic-id="principles-guiding-framework-activities" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background: linear-gradient(to bottom, #C7B8EA, #C7B8EA);">

  <!-- Header Section -->
  <rect x="10" y="10" width="400" height="50" fill="#3B5998" rx="10" />
  <text x="15" y="25" font-size="24" font-weight="bold" text-anchor="middle" fill="#fff">Principles that Guide Each Framework Activity</text>
  <rect x="15" y="65" width="370" height="20" fill="#3B5998" rx="10" />
  <text x="20" y="75" font-size="18" font-weight="normal" text-anchor="middle" fill="#fff">Agile Framework</text>

  <!-- Agile Framework Section -->
  <section data-narration="Agile Framework" class="section">
    <animate begin="0s" dur="2s" repeatCount="indefinite">
      <rect x="10" y="85" width="40" height="40" fill="#34A85A" rx="10" />
    </animate>
    <text x="60" y="110" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Individuals and Interactions</text>
    <text x="60" y="130" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Working Software</text>
    <text x="60" y="150" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Customer Collaboration</text>
    <text x="60" y="170" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Responding to Change</text>
    <rect x="10" y="200" width="40" height="40" fill="#34A85A" rx="10" />
  </section>

  <!-- Waterfall Framework Section -->
  <section data-narration="Waterfall Framework" class="section" style="padding-top: 20px;">
    <animate begin="2s" dur="2s" repeatCount="indefinite">
      <rect x="10" y="210" width="40" height="40" fill="#FFC107" rx="10" />
    </animate>
    <text x="60" y="235" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Sequential Development</text>
    <text x="60" y="255" font-size="16" font-weight="normal" text-anchor="middle" fill="#000">Predictability</text>
    <rect x="10" y="285" width="40" height="40" fill="#FFC107" rx="10" />
  </section>

  <!-- Footer Section -->
  <rect x="10" y="345" width="400" height="50" fill="#3B5998" rx="10" />
  <text x="15" y="360" font-size="18" font-weight="normal" text-anchor="middle" fill="#fff">Stay Educated</text>
</svg>