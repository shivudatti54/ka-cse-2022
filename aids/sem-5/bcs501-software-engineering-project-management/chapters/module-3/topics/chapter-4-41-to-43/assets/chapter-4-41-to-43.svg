<svg width="420" height="400" data-topic-id="project-management-fundamentals-41-43">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Project Management Fundamentals</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="300" height="70" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="15" font-size="24" font-weight="bold" fill="#333333">Introduction</text>
    <text x="10" y="40" font-size="18" fill="#666666">Project management is the application of knowledge, skills, and techniques to execute projects effectively.</text>
  </g>
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="300" height="70" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="15" font-size="24" font-weight="bold" fill="#333333">Key Concepts</text>
    <text x="10" y="40" font-size="18" fill="#666666">
      <data-narration>Project: A temporary endeavor with a specific objective, scope, timeline, and budget.</data-narration>
    </text>
    <text x="10" y="60" font-size="18" fill="#666666">
      <data-narration>Project Manager: The person responsible for planning, organizing, and controlling a project.</data-narration>
    </text>
    <text x="10" y="80" font-size="18" fill="#666666">
      <data-narration>Stakeholders: Individuals or groups who have an interest in the project's success or failure.</data-narration>
    </text>
  </g>
  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="300" height="70" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="15" font-size="24" font-weight="bold" fill="#333333">Types of Projects</text>
    <text x="10" y="40" font-size="18" fill="#666666">
      <data-narration>R&D Project: A project focused on developing new products, processes, or technologies.</data-narration>
    </text>
    <text x="10" y="60" font-size="18" fill="#666666">
      <data-narration>Construction Project: A project involving the building, renovation, or expansion of physical structures.</data-narration>
    </text>
    <text x="10" y="80" font-size="18" fill="#666666">
      <data-narration>IT Project: A project focused on developing software, hardware, or networking systems.</data-narration>
    </text>
  </g>
  <g transform="translate(20, 340)">
    <rect x="0" y="0" width="300" height="70" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="15" font-size="24" font-weight="bold" fill="#333333">Project Life Cycle</text>
    <text x="10" y="40" font-size="18" fill="#666666">
      <data-narration>Initiation: Defining the project scope, goals, and stakeholders.</data-narration>
    </text>
    <text x="10" y="60" font-size="18" fill="#666666">
      <data-narration>Planning: Creating a detailed project plan, including timelines, budgets, and resource allocation.</data-narration>
    </text>
    <text x="10" y="80" font-size="18" fill="#666666">
      <data-narration>Execution: Carrying out the project tasks and activities.</data-narration>
    </text>
    <text x="10" y="100" font-size="18" fill="#666666">
      <data-narration>Monitoring and Control: Tracking progress, identifying and addressing issues, and making adjustments as needed.</data-narration>
    </text>
    <text x="10" y="120" font-size="18" fill="#666666">
      <data-narration>Closure: Formalizing the project completion and evaluating its success.</data-narration>
    </text>
  </g>
  <g transform="translate(20, 420)">
    <rect x="0" y="0" width="300" height="70" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="10" y="15" font-size="24" font-weight="bold" fill="#333333">Project Management Process Groups</text>
    <text x="10" y="40" font-size="18" fill="#666666">
      <data-narration>Initiating: Defining the project scope and goals.</data-narration>
    </text>
    <text x="10" y="60" font-size="18" fill="#666666">
      <data-narration>Planning: Creating a detailed project plan.</data-narration>
    </text>
    <text x="10" y="80" font-size="18" fill="#666666">
      <data-narration>Executing: Carrying out the project tasks and activities.</data-narration>
    </text>
    <text x="10" y="100" font-size="18" fill="#666666">
      <data-narration>Monitoring and Control: Tracking progress and making adjustments as needed.</data-narration>
    </text>
    <text x="10" y="120" font-size="18" fill="#666666">
      <data-narration>Closure: Formalizing the project completion.</data-narration>
    </text>
  </g>
  <g transform="translate(0, 400)">
    <rect x="10" y="10" width="400" height="40" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="15" y="15" font-size="18" fill="#333333">Footer</text>
  </g>
</svg>