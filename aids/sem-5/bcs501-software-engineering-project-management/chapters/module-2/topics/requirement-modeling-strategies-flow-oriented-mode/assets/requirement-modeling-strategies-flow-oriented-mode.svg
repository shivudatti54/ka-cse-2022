<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" 
     xmlns:xlink="http://www.w3.org/1999/xlink" style="font-family: Arial, sans-serif; font-size: 14px;">
    <title>Requirement Modeling Strategies: Flow-Oriented Mode</title>
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#65A0FF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#4D8DF8" stop-opacity="1"/>
            <stop offset="100%" stop-color="#3498DB" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect fill="url(#gradient)" width="420" height="400" rx="10"/>
    <g transform="translate(10, 50)">
        <text x="50%" y="0" text-anchor="middle" font-size="24" fill="#2E4053">Flow-Oriented Modeling</text>
    </g>
    <g transform="translate(20, 100)">
        <rect width="80" height="20" rx="10" fill="#FFC107" transform="translate(-40, -10)"/>
        <text x="50%" y="5" text-anchor="middle" font-size="18" fill="#2E4053" data-topic-id="flow-oriented-modeling-introduction">
            Introduction to Flow-Oriented Modeling
        </text>
        <animateTransform attributeName="transform" type="rotate" from="0,50,50" to="360,50,50" dur="10s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(20, 150)">
        <rect width="80" height="20" rx="10" fill="#2E4053" transform="translate(-40, -10)"/>
        <text x="50%" y="5" text-anchor="middle" font-size="18" fill="#2E4053" data-narration="Focus on behavior | Graphical representation | Dynamic and context-dependent">
            Key Characteristics of Flow-Oriented Modeling
        </text>
        <animateTransform attributeName="transform" type="rotate" from="0,50,50" to="360,50,50" dur="10s" repeatCount="indefinite"/>
        <g transform="translate(50, 25)">
            <line x1="25" y1="25" x2="75" y2="75" style="stroke:#2E4053; stroke-width:2; stroke-dasharray:5,2"/>
            <line x1="25" y1="75" x2="75" y2="25" style="stroke:#2E4053; stroke-width:2; stroke-dasharray:5,2"/>
        </g>
    </g>
    <g transform="translate(20, 250)">
        <rect width="80" height="20" rx="10" fill="#FFC107" transform="translate(-40, -10)"/>
        <text x="50%" y="5" text-anchor="middle" font-size="18" fill="#2E4053" data-narration="Improved understanding of system behavior|Better identification of system dependencies|Enhanced communication">
            Benefits of Flow-Oriented Modeling
        </text>
        <animateTransform attributeName="transform" type="rotate" from="0,50,50" to="360,50,50" dur="10s" repeatCount="indefinite"/>
        <g transform="translate(50, 25)">
            <line x1="25" y1="25" x2="75" y2="75" style="stroke:#2E4053; stroke-width:2; stroke-dasharray:5,2"/>
            <line x1="25" y1="75" x2="75" y2="25" style="stroke:#2E4053; stroke-width:2; stroke-dasharray:5,2"/>
        </g>
        <g transform="translate(20, 100)">
            <line x1="25" y1="25" x2="75" y2="75" style="stroke:#2E4053; stroke-width:2; stroke-dasharray:5,2"/>
            <line x1="25" y1="75" x2="75" y2="25" style="stroke:#2E4053; stroke-width:2; stroke-dasharray:5,2"/>
        </g>
    </g>
    <g transform="translate(20, 350)">
        <rect width="80" height="20" rx="10" fill="#FFC107" transform="translate(-40, -10)"/>
        <text x="50%" y="5" text-anchor="middle" font-size="18" fill="#2E4053" data-narration="Focus on behavior | Graphical representation | Dynamic and context-dependent | Flow-oriented models capture the dynamic behavior of the system, taking into account the context in which it operates">
            Conclusion
        </text>
        <animateTransform attributeName="transform" type="rotate" from="0,50,50" to="360,50,50" dur="10s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(10, 400)">
        <text x="50%" y="50" text-anchor="middle" font-size="18" fill="#2E4053">Flow-Oriented Modeling Strategies: Flow-Oriented Mode</text>
    </g>
</svg>