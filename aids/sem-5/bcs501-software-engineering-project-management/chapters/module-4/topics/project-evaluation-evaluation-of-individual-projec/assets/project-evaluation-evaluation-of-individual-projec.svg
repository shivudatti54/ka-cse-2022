<svg width="420" height="400" data-topic-id="project-evaluation-evaluation-of-individual-projects" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%"/>
  <g id="title">
    <text x="50%" y="20%" font-size="24" font-family="Arial" fill="#3498DB" text-anchor="middle">Project Evaluation: Evaluation of Individual Projects</text>
  </g>
  <g id="footer">
    <text x="50%" y="380%" font-size="18" font-family="Arial" fill="#3498DB" text-anchor="middle">&copy; 2023</text>
  </g>
  <g id="evaluation-criteria">
    <rect x="20%" y="120%" width="60%" height="50%" fill="#F7DC6F" rx="10"/>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="0s" dur="3s" repeatCount="indefinite"/>
    <text x="60%" y="145%" font-size="18" font-family="Arial" fill="#FFC107" text-anchor="middle" data-narration="Scope: Evaluates the project's objectives and deliverables." data-topic-id="project-evaluation-evaluation-of-individual-projects" data-section="1">Scope</text>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="3s" dur="3s" repeatCount="indefinite"/>
  </g>
  <g id="cost-benefit-evaluation-techniques">
    <rect x="20%" y="220%" width="60%" height="50%" fill="#2ECC71" rx="10"/>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="0s" dur="3s" repeatCount="indefinite"/>
    <text x="60%" y="245%" font-size="18" font-family="Arial" fill="#3E8E41" text-anchor="middle" data-narration="Cost-Benefit Evaluation Techniques: Evaluates the project's costs and benefits." data-topic-id="project-evaluation-evaluation-of-individual-projects" data-section="2">Cost-Benefit Evaluation Techniques</text>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="3s" dur="3s" repeatCount="indefinite"/>
  </g>
  <g id="risk-evaluation">
    <rect x="20%" y="320%" width="60%" height="50%" fill="#FF9800" rx="10"/>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="0s" dur="3s" repeatCount="indefinite"/>
    <text x="60%" y="345%" font-size="18" font-family="Arial" fill="#FF9800" text-anchor="middle" data-narration="Risk Evaluation: Evaluates the project's risks and mitigation strategies." data-topic-id="project-evaluation-evaluation-of-individual-projects" data-section="3">Risk Evaluation</text>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="3s" dur="3s" repeatCount="indefinite"/>
  </g>
  <g id="evaluation-process">
    <rect x="20%" y="120%" width="60%" height="50%" fill="#87CEEB" rx="10"/>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="0s" dur="3s" repeatCount="indefinite"/>
    <text x="60%" y="145%" font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="middle" data-narration="Evaluation Process: Evaluates the project's performance against its objectives." data-topic-id="project-evaluation-evaluation-of-individual-projects" data-section="4">Evaluation Process</text>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="3s" dur="3s" repeatCount="indefinite"/>
  </g>
  <g id="evaluation-outcomes">
    <rect x="20%" y="220%" width="60%" height="50%" fill="#C7B8EA" rx="10"/>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="0s" dur="3s" repeatCount="indefinite"/>
    <text x="60%" y="245%" font-size="18" font-family="Arial" fill="#C7B8EA" text-anchor="middle" data-narration="Evaluation Outcomes: Evaluates the project's overall success and effectiveness." data-topic-id="project-evaluation-evaluation-of-individual-projects" data-section="5">Evaluation Outcomes</text>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="3s" dur="3s" repeatCount="indefinite"/>
  </g>
  <g id="conclusion">
    <rect x="20%" y="320%" width="60%" height="50%" fill="#FF9800" rx="10"/>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="0s" dur="3s" repeatCount="indefinite"/>
    <text x="60%" y="345%" font-size="18" font-family="Arial" fill="#FF9800" text-anchor="middle" data-narration="Conclusion: Evaluates the project's overall value and feasibility." data-topic-id="project-evaluation-evaluation-of-individual-projects" data-section="6">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" x="-50%" y="-25%" begin="3s" dur="3s" repeatCount="indefinite"/>
  </g>
  <g id="arrow-markers">
    <polygon points="50,30 70,70 90,30" fill="#FF9800" rx="10"/>
    <polygon points="150,70 170,90 190,70" fill="#FF9800" rx="10"/>
    <polygon points="250,30 270,70 290,30" fill="#FF9800" rx="10"/>
    <polygon points="350,70 370,90 390,70" fill="#FF9800" rx="10"/>
  </g>
</svg>