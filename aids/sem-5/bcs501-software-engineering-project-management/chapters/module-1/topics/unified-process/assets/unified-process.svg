<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="unified-process">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b2e6ce" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Unified Process</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10"/>
  <rect x="10" y="20" width="400" height="10" fill="#f7f7f7"/>
  <g id="section-preparation" transform="translate(10, 30)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#4dbd64" rx="5"/>
    <text x="30" y="20" font-size="18" font-family="Arial" text-anchor="middle">Preparation</text>
    <text x="30" y="60" font-size="16" font-family="Arial" text-anchor="middle" data-narration="Describe the preparation phase, including risk assessment, security awareness training, and incident response planning." fill="#666666"/>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" dur="0.5s"/>
  </g>
  <g id="section-detection-analysis" transform="translate(210, 30)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#34A85A" rx="5"/>
    <text x="30" y="20" font-size="18" font-family="Arial" text-anchor="middle">Detection and Analysis</text>
    <text x="30" y="60" font-size="16" font-family="Arial" text-anchor="middle" data-narration="Describe the detection and analysis phase, including monitoring, incident detection, and analysis of the incident." fill="#666666"/>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" dur="0.5s"/>
  </g>
  <g id="section-containment-eradication-recovery" transform="translate(210, 30)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#FFC107" rx="5"/>
    <text x="30" y="20" font-size="18" font-family="Arial" text-anchor="middle">Containment, Eradication, and Recovery</text>
    <text x="30" y="60" font-size="16" font-family="Arial" text-anchor="middle" data-narration="Describe the containment, eradication, and recovery phase, including containment, eradication, and recovery actions." fill="#666666"/>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" dur="0.5s"/>
  </g>
  <g id="section-post-incident-activity" transform="translate(210, 30)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#4dbd64" rx="5"/>
    <text x="30" y="20" font-size="18" font-family="Arial" text-anchor="middle">Post-Incident Activity</text>
    <text x="30" y="60" font-size="16" font-family="Arial" text-anchor="middle" data-narration="Describe the post-incident activity phase, including incident review, lessons learned, and remediation." fill="#666666"/>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" dur="0.5s"/>
  </g>
  <g id="section-key-models" transform="translate(210, 30)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#34A85A" rx="5"/>
    <text x="30" y="20" font-size="18" font-family="Arial" text-anchor="middle">Key Incident Response Models</text>
    <text x="30" y="60" font-size="16" font-family="Arial" text-anchor="middle" data-narration="Describe the key incident response models, including NIST and SANS." fill="#666666"/>
    <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" dur="0.5s"/>
  </g>
  <rect x="10" y="390" width="400" height="10" fill="#f7f7f7"/>
  <text x="20" y="390" font-size="18" font-family="Arial" text-anchor="middle">Unified Process</text>
</svg>