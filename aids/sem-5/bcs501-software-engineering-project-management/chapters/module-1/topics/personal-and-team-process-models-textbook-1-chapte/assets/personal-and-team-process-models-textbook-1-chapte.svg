<svg width="420" height="400" data-topic-id="personal-and-team-process-models-chapter-1">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9e4ca" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f7f2df" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#grad)"/>
  <g id="title">
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" fill="#3498db" text-anchor="left">
      Personal and Team Process Models
    </text>
  </g>
  <g id="section1">
    <rect x="0" y="50" width="420" height="100" fill="#f9f3f7" rx="10"/>
    <text x="10" y="70" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="left" data-narration="Process Models refer to the standardized frameworks that describe the sequence of activities, tasks, and processes involved in software engineering and project management.">
      Process Models
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="1s" begin="0s"/>
  </g>
  <g id="section2">
    <rect x="0" y="150" width="420" height="100" fill="#f9f3f7" rx="10"/>
    <text x="10" y="170" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="left" data-narration="Life cycle models outline the stages involved in software development, from initiation to delivery. Common life cycle models include: Waterfall Model, V-Model, and Agile Model.">
      Life Cycle Models
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,270" dur="1s" begin="0.5s"/>
  </g>
  <g id="section3">
    <rect x="0" y="250" width="420" height="100" fill="#f9f3f7" rx="10"/>
    <text x="10" y="270" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="left" data-narration="Team process models describe the activities and tasks performed by individual team members or the team as a whole. Examples of team process models include: SWMM and PMM.">
      Team Process Models
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,270" to="0,370" dur="1s" begin="1s"/>
  </g>
  <g id="section4">
    <rect x="0" y="350" width="420" height="100" fill="#f9f3f7" rx="10"/>
    <text x="10" y="370" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="left" data-narration="The characteristics of life cycle models include: linear, iterative, and incremental development. Team process models emphasize phased, iterative development.">
      Characteristics
    </text>
    <animateTransform attributeName="transform" type="translate" from="0,370" to="0,470" dur="1s" begin="1.5s"/>
  </g>
  <g id="footer">
    <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" text-anchor="left">
      Created with love for educational purposes.
    </text>
  </g>
  <g id="arrow">
    <path d="M10,320 L40,280 L70,240 L100,200 L130,160 L160,120 L190,80 L220,40 Z"/>
