<svg width="420" height="400" data-topic-id="metric-spaces" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>
  <g fill="none" fill-opacity="0.2">
    <rect x="0" y="0" width="100%" height="40" fill="#1A1D23"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="start">Metric Spaces</text>
    <text x="10" y="55" font-size="12" font-family="Arial" fill="#87CEEB" text-anchor="start">Topic: Concepts in Metric Spaces</text>
  </g>
  <g transform="translate(0, 70)">
    <rect x="0" y="0" width="100%" height="30" fill="#1A1D23"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="start">Definition</text>
    <g data-narration="A metric space is a set X together with a metric or distance function d that satisfies the following properties:" transform="translate(0, 35)">
      <text x="10" y="50" font-size="12" font-family="Arial" fill="#87CEEB" text-anchor="start">Non-negativity</text>
      <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
      <rect x="10" y="60" width="20" height="10" fill="#87CEEB" rx="5"/>
      <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
    </g>
    <g data-narration="The metrics satisfy the following properties:">
      <rect x="10" y="100" width="100%" height="30" fill="#1A1D23"/>
      <text x="10" y="115" font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="start">Non-negativity</text>
      <g data-narration="d(x, y) ≥ 0 for all x, y in X">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="130" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
      <g data-narration="Identity of Indiscernibles: d(x, y) = 0 if and only if x = y">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="150" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
      <g data-narration="Symmetry: d(x, y) = d(y, x) for all x, y in X">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="170" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
      <g data-narration="Triangle Inequality: d(x, z) ≤ d(x, y) + d(y, z) for all x, y, z in X">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="190" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
    </g>
    <g transform="translate(0, 220)">
      <rect x="0" y="0" width="100%" height="30" fill="#1A1D23"/>
      <text x="10" y="15" font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="start">Properties</text>
      <g data-narration="Completeness: A metric space is said to be complete if every Cauchy sequence in the space converges to a point in the space.">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="35" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
      <g data-narration="Compactness: A metric space is said to be compact if every open cover of the space contains a finite subcover.">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="55" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
    </g>
    <g transform="translate(0, 270)">
      <rect x="0" y="0" width="100%" height="30" fill="#1A1D23"/>
      <text x="10" y="15" font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="start">Examples</text>
      <g data-narration="Real Numbers: The set of real numbers with the standard Euclidean metric is a metric space.">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="35" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
      <g data-narration="Discrete Metric Space: A metric space with a distance function that assigns 0 to all points and 1 to any two distinct points is called a discrete metric space.">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="55" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
    </g>
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="100%" height="30" fill="#1A1D23"/>
      <text x="10" y="15" font-size="18" font-family="Arial" fill="#87CEEB" text-anchor="start">Applications</text>
      <g data-narration="Metric spaces are used to describe geometric shapes and spaces.">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="35" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
      <g data-narration="Metric spaces are used to study the properties of topological spaces.">
        <animate transform="scale(1.2) rotate(45)" begin="-0.5s" dur="1s" fill="freeze"/>
        <rect x="10" y="55" width="20" height="10" fill="#87CEEB" rx="5"/>
        <animate transform="scale(1) rotate(-45)" begin="-0.3s" dur="1s" fill="freeze"/>
      </g>
    </g>
  </g>
  <g transform="translate(0, 390)">
    <rect x="0" y="0" width="100%" height="10" fill="#1A1D23"/>
    <text x="10" y="5" font-size="12" font-family="Arial" fill="#87CEEB" text-anchor="start">References</text>
  </g>
</svg>