<svg width="420" height="400" data-topic-id="8-hours-teaching-learning-process-chalk-and-talk-m" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: lighten;">

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient-background" x1="0" y1="0" x2="0" y2="1" style="stop-color: #7a288a; stop-opacity: 1; stop-color: #8ec5f7; stop-opacity: 0.8; stop-color: #ffc107; stop-opacity: 0.5;">
      <stop offset="0" style="stop-color: #7a288a; stop-opacity: 1"/>
      <stop offset="1" style="stop-color: #8ec5f7; stop-opacity: 0.8"/>
    </linearGradient>
  </defs>

  <!-- Gradient Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient-background)" rx="10"/>

  <!-- Title Section -->
  <g transform="translate(20, 20)">
    <text x="0" y="20" font-size="24" font-family="Arial Black" fill="#2f4f7f" text-anchor="left">
      <tspan data-narration="Introduction to Chalk and Talk Method">8 Hours Teaching Learning Process Chalk And Talk M</tspan>
    </text>
  </g>

  <!-- Section 1: Introduction -->
  <g transform="translate(20, 60)">
    <rect width="380" height="40" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2f4f7f" text-anchor="left">
      <tspan data-narration="The teaching-learning process is a critical component of effective education. It involves the transmission of knowledge from the teacher to the learner, and the learner's acquisition of that knowledge.">The Teaching-Learning Process</tspan>
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 60" to="0 120" dur="2s" begin="0s"/>
  </g>

  <!-- Section 2: Chalk and Talk Method -->
  <g transform="translate(20, 110)">
    <rect width="380" height="40" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2f4f7f" text-anchor="left">
      <tspan data-narration="The Chalk and Talk method is a traditional teaching approach where the teacher writes notes on the blackboard or a whiteboard and lectures to the students.">Chalk and Talk Method</tspan>
    </text>
    <line x1="10" y1="15" x2="10" y2="25" stroke="#2f4f7f" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="translate" from="0 110" to="0 170" dur="2s" begin="0s"/>
  </g>

  <!-- Section 3: Advantages -->
  <g transform="translate(20, 170)">
    <rect width="380" height="40" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2f4f7f" text-anchor="left">
      <tspan data-narration="The Chalk and Talk method encourages active listening and engagement from students, allows teachers to gauge student understanding and adjust their teaching accordingly, and promotes critical thinking and problem-solving skills.">Advantages</tspan>
    </text>
    <line x1="10" y1="15" x2="10" y2="25" stroke="#2f4f7f" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="translate" from="0 170" to="0 230" dur="2s" begin="0s"/>
  </g>

  <!-- Section 4: Disadvantages -->
  <g transform="translate(20, 230)">
    <rect width="380" height="40" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2f4f7f" text-anchor="left">
      <tspan data-narration="The Chalk and Talk method has limitations, such as being time-consuming and labor-intensive for teachers, and not being suitable for large classes or lecture halls.">Disadvantages</tspan>
    </text>
    <line x1="10" y1="15" x2="10" y2="25" stroke="#2f4f7f" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="translate" from="0 230" to="0 280" dur="2s" begin="0s"/>
  </g>

  <!-- Section 5: PowerPoint Presentation -->
  <g transform="translate(20, 280)">
    <rect width="380" height="40" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2f4f7f" text-anchor="left">
      <tspan data-narration="PowerPoint Presentation is a modern teaching approach that uses visual aids and multimedia resources to present information to students.">PowerPoint Presentation</tspan>
    </text>
    <line x1="10" y1="15" x2="10" y2="25" stroke="#2f4f7f" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="translate" from="0 280" to="0 330" dur="2s" begin="0s"/>
  </g>

  <!-- Section 6: Advantages -->
  <g transform="translate(20, 330)">
    <rect width="380" height="40" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2f4f7f" text-anchor="left">
      <tspan data-narration="PowerPoint Presentation is engaging and interactive, making learning more enjoyable and effective, and allows for easy organization and presentation of complex information.">Advantages</tspan>
    </text>
    <line x1="10" y1="15" x2="10" y2="25" stroke="#2f4f7f" stroke-width="2" fill="none"/>
    <animateTransform attributeName="transform" type="translate" from="0 330" to="0 380" dur="2s" begin="0s"/>
  </g>

  <!-- Footer Section -->
  <g transform="translate(20, 380)">
    <rect width="380" height="40" fill="#fff" rx="10"/>
    <text x="10" y="15" font-size="18" font-family="Arial" fill="#2f4f7f" text-anchor="left">
      <tspan>Learn more about the Teaching-Learning Process at <a href="#" target="_blank" rel="noopener noreferrer">Your Education Website</a></tspan>
    </text>
  </g>

</svg>