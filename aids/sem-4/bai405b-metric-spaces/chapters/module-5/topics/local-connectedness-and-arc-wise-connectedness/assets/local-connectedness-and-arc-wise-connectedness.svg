<svg width="420" height="400" data-topic-id="local-connectedness-and-arc-wise-connectedness"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="fill:rgb(105,105,205);">
  <rect x="0" y="0" width="420" height="400" fill="linear-gradient(to bottom,rgb(75, 110, 225),rgb(50, 95, 215))"/>
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif"
        style="fill:rgb(255,255,255);text-anchor:middle;" data-narration>
    Local Connectedness and Arc Wise Connectedness
  </text>
  <rect x="20" y="60" width="380" height="60" rx="10" fill="rgba(255, 215, 0, 0.3)"
        style="fill:rgba(255, 215, 0, 0.5);opacity:0.8;transition:all 0.5s ease-in-out;" 
        data-narration>
    <animateTransform attributeName="transform" type="translate"
                      begin="0s" dur="2s" repeatCount="indefinite"/>
  </rect>
  <g transform="translate(20, 140)">
    <rect x="0" y="0" width="100" height="100" rx="10" fill="rgba(0, 128, 128, 0.3)"
          style="fill:rgba(0, 128, 128, 0.5);opacity:0.8;transition:all 0.5s ease-in-out;" 
          data-narration>
      <animateTransform attributeName="transform" type="scale"
                        begin="0.2s" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="110" y="0" width="100" height="100" rx="10" fill="rgba(0, 128, 128, 0.3)"
          style="fill:rgba(0, 128, 128, 0.5);opacity:0.8;transition:all 0.5s ease-in-out;" 
          data-narration>
      <animateTransform attributeName="transform" type="scale"
                        begin="0.4s" dur="2s" repeatCount="indefinite"/>
    </rect>
    <line x1="50" y1="50" x2="150" y2="150" style="stroke:rgb(0, 128, 128);stroke-width:2" 
          data-narration>
      <animateTransform attributeName="transform" type="translate"
                        begin="0.2s" dur="2s" repeatCount="indefinite"/>
    </line>
    <text x="50" y="50" font-size="12" font-family="Arial, sans-serif"
          style="fill:rgb(255,255,255);text-anchor：middle;" data-narration>
      Local Connectedness
    </text>
    <text x="150" y="50" font-size="12" font-family="Arial, sans-serif"
          style="fill:rgb(255,255,255);text-anchor：middle;" data-narration>
      Arc-Wise Connectedness
    </text>
  </g>
  <rect x="20" y="220" width="380" height="60" rx="10" fill="rgba(255, 215, 0, 0.3)"
        style="fill:rgba(255, 215, 0, 0.5);opacity:0.8;transition:all 0.5s ease-in-out;" 
        data-narration>
    <animateTransform attributeName="transform" type="translate"
                      begin="1.2s" dur="2s" repeatCount="indefinite"/>
  </rect>
  <g transform="translate(20, 280)">
    <text x="20" y="20" font-size="18" font-family="Arial, sans-serif"
          style="fill:rgb(255,255,255);text-anchor:middle;" data-narration>
      Local Connectedness
    </text>
    <text x="20" y="130" font-size="12" font-family="Arial, sans-serif"
          style="fill:rgb(255,255,255);text-anchor：middle;" data-narration>
      Definition: A metric space X is said to be locally connected at a point x ∈ X if for every open set U containing x, there exists an open set V containing x such that V ⊆ U.
    </text>
    <rect x="0" y="160" width="100" height="30" rx="10" fill="rgba(0, 128, 128, 0.3)"
          style="fill:rgba(0, 128, 128, 0.5);opacity:0.8;transition:all 0.5s ease-in-out;" 
          data-narration>
      <animateTransform attributeName="transform" type="scale"
                        begin="1.4s" dur="2s" repeatCount="indefinite"/>
    </rect>
    <line x1="50" y1="170" x2="150" y2="170" style="stroke:rgb(0, 128, 128);stroke-width:2" 
          data-narration>
      <animateTransform attributeName="transform" type="translate"
                        begin="1.4s" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
  <g transform="translate(20, 320)">
    <text x="20" y="20" font-size="18" font-family="Arial, sans-serif"
          style="fill:rgb(255,255,255);text-anchor:middle;" data-narration>
    Key Properties
  </text>
  <rect x="0" y="50" width="100" height="30" rx="10" fill="rgba(0, 128, 128, 0.3)"
        style="fill:rgba(0, 128, 128, 0.5);opacity:0.8;transition:all 0.5s ease-in-out;" 
        data-narration>
    <animateTransform attributeName="transform" type="scale"
                        begin="1.6s" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="50" y="70" font-size="12" font-family="Arial, sans-serif"
        style="fill:rgb(255,255,255);text-anchor：middle;" data-narration>
    Local connectedness implies connectedness
  </text>
  <rect x="0" y="100" width="100" height="30" rx="10" fill="rgba(0, 128, 128, 0.3)"
        style="fill:rgba(0, 128, 128, 0.5);opacity:0.8;transition:all 0.5s ease-in-out;" 
        data-narration>
    <animateTransform attributeName="transform" type="scale"
                        begin="1.8s" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="50" y="130" font-size="12" font-family="Arial, sans-serif"
        style="fill:rgb(255,255,255);text-anchor：middle;" data-narration>
    Local connectedness is a weaker property than connectedness
  </text>
  <rect x="0" y="160" width="100" height="30" rx="10" fill="rgba(0, 128, 128, 0.3)"
        style="fill:rgba(0, 128, 128, 0.5);opacity:0.8;transition:all 0.5s ease-in-out;" 
        data-narration>
    <animateTransform attributeName="transform" type="scale"
                        begin="2s" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="50" y="190" font-size="12" font-family="Arial, sans-serif"
        style="fill:rgb(255,255,255);text-anchor：middle;" data-narration>
    Local connectedness is preserved under homeomorphisms
  </text>
</svg>