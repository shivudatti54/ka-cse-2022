<svg width="420" height="400" data-topic-id="compactness-8-hours"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background-color: #C7D9F3; gradient: linear-gradient(to bottom, #B2E6CE, #C7D9F3);">
    <!-- Title -->
    <text x="10" y="10" font-size="24" font-family="Arial" font-weight="bold"
          text-anchor="start">8 Hours of Compactness</text>

    <!-- Header -->
    <rect x="10" y="50" width="400" height="20" style="fill: #3498DB; stroke: #2C3E50;" />
    <text x="15" y="55" font-size="18" font-family="Arial" font-weight="bold"
          text-anchor="start">What is Compactness?</text>

    <!-- Section 1: Definition -->
    <rect x="10" y="90" width="400" height="100" style="fill: #E6F5F9; stroke: #2C3E50;" />
    <animate transform="rotate(45 190 90)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="120" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="A compact metric space is one where every open cover has a finite subcover."
          style="fill: #3498DB;" />
    <animate transform="rotate(-45 190 90)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="140" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="This means that given any collection of open sets, there exists a finite subset that also covers the space."
          style="fill: #3498DB;" />
    <animate transform="rotate(45 190 90)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="160" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="In other words, compactness is a property of the space that ensures every sequence has a convergent subsequence."
          style="fill: #3498DB;" />
    <animate transform="rotate(-45 190 90)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="180" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="This has important implications for many areas of mathematics and physics."
          style="fill: #3498DB;" />
    <animate transform="rotate(45 190 90)" begin="0s" dur="2s" fill="freeze" />
    <rect x="10" y="200" width="400" height="20" style="fill: #2C3E50; stroke: #3498DB;" />
    <text x="15" y="215" font-size="14" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="Examples of compact metric spaces include the closed unit ball and the Cantor set."
          style="fill: #2C3E50;" />
    <animate transform="rotate(-45 190 90)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="235" font-size="14" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="On the other hand, spaces like the real line with the standard metric are not compact."
          style="fill: #2C3E50;" />
    <animate transform="rotate(45 190 90)" begin="0s" dur="2s" fill="freeze" />

    <!-- Section 2: Properties -->
    <rect x="10" y="270" width="400" height="100" style="fill: #E6F5F9; stroke: #2C3E50;" />
    <animate transform="rotate(45 190 270)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="300" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="If a metric space is compact, then every sequence has a convergent subsequence."
          style="fill: #3498DB;" />
    <animate transform="rotate(-45 190 270)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="320" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="In other words, the sequence will converge to a point in the space."
          style="fill: #3498DB;" />
    <animate transform="rotate(45 190 270)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="340" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="This property of compactness is crucial in many areas of mathematics and physics."
          style="fill: #3498DB;" />
    <animate transform="rotate(-45 190 270)" begin="0s" dur="2s" fill="freeze" />
    <rect x="10" y="360" width="400" height="20" style="fill: #2C3E50; stroke: #3498DB;" />
    <text x="15" y="375" font-size="14" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="Examples of compact metric spaces include the closed unit ball and the Cantor set."
          style="fill: #2C3E50;" />
    <animate transform="rotate(-45 190 270)" begin="0s" dur="2s" fill="freeze" />

    <!-- Section 3: Examples -->
    <rect x="10" y="430" width="400" height="100" style="fill: #E6F5F9; stroke: #2C3E50;" />
    <animate transform="rotate(45 190 430)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="460" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="The closed unit ball in R^n is a compact metric space for all n."
          style="fill: #3498DB;" />
    <animate transform="rotate(-45 190 430)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="480" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="The Cantor set is also a compact metric space."
          style="fill: #3498DB;" />
    <animate transform="rotate(45 190 430)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="500" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="On the other hand, spaces like the real line with the standard metric are not compact."
          style="fill: #3498DB;" />
    <animate transform="rotate(-45 190 430)" begin="0s" dur="2s" fill="freeze" />
    <rect x="10" y="520" width="400" height="20" style="fill: #2C3E50; stroke: #3498DB;" />
    <text x="15" y="535" font-size="14" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="Examples of compact metric spaces include the closed unit ball and the Cantor set."
          style="fill: #2C3E50;" />
    <animate transform="rotate(-45 190 430)" begin="0s" dur="2s" fill="freeze" />

    <!-- Section 4: Proofs -->
    <rect x="10" y="580" width="400" height="100" style="fill: #E6F5F9; stroke: #2C3E50;" />
    <animate transform="rotate(45 190 580)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="610" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="To prove that a metric space is compact, we need to show that every open cover has a finite subcover."
          style="fill: #3498DB;" />
    <animate transform="rotate(-45 190 580)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="630" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="We can do this by choosing a finite subset of the open sets that still covers the space."
          style="fill: #3498DB;" />
    <animate transform="rotate(45 190 580)" begin="0s" dur="2s" fill="freeze" />
    <text x="15" y="650" font-size="16" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="This finite subset is a finite subcover of the open cover."
          style="fill: #3498DB;" />
    <animate transform="rotate(-45 190 580)" begin="0s" dur="2s" fill="freeze" />
    <rect x="10" y="670" width="400" height="20" style="fill: #2C3E50; stroke: #3498DB;" />
    <text x="15" y="685" font-size="14" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="Examples of compact metric spaces include the closed unit ball and the Cantor set."
          style="fill: #2C3E50;" />
    <animate transform="rotate(-45 190 580)" begin="0s" dur="2s" fill="freeze" />

    <!-- Footer -->
    <rect x="10" y="740" width="400" height="20" style="fill: #3498DB; stroke: #2C3E50;" />
    <text x="15" y="755" font-size="14" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="Compactness is a fundamental property of metric spaces that has many important implications."
          style="fill: #3498DB;" />
    <rect x="10" y="770" width="400" height="20" style="fill: #2C3E50; stroke: #3498DB;" />
    <text x="15" y="785" font-size="14" font-family="Arial" font-weight="normal"
          text-anchor="start" data-narration="We hope this diagram has helped you understand the concept of compactness."
          style="fill: #2C3E50;" />
</svg>