<svg width="420" height="400" data-topic-id="pure-equilibrium-when-randomization-is-allowed">
  <style>
    /* Add some basic styling to our SVG */
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
    }
    .section {
      margin-bottom: 20px;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .arrow {
      fill: #007bff;
      stroke-width: 2;
    }
  </style>
  <defs>
    <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1" />
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#color-gradient)" rx="10" />
  <g id="title">
    <text class="title" x="20" y="50" text-anchor="middle">Pure Equilibrium when Randomization is Allowed</text>
  </g>
  <g id="footer">
    <text x="20" y="390" text-anchor="middle">Diagram created with SVG.js</text>
  </g>
  <g id="section-1">
    <rect x="10" y="70" width="380" height="50" fill="#fff" rx="10" />
    <text x="20" y="90" class="section" data-narration="Definition of Pure Equilibrium with Randomization">Definition</text>
    <text x="20" y="120" class="section-text">A pure equilibrium with randomization is a strategy profile where no player can improve their expected payoff by unilaterally changing their strategy.</text>
  </g>
  <g id="section-2">
    <rect x="10" y="170" width="380" height="50" fill="#fff" rx="10" />
    <text x="20" y="190" class="section" data-narration="Key Concepts">Key Concepts</text>
    <text x="20" y="220" class="section-text">Mixed Strategy: A probability distribution over a set of pure strategies. Randomization: Assigning probabilities to pure strategies.</text>
    <text x="20" y="250" class="section-text">Pure Equilibrium with Randomization: A strategy profile where no player can improve their expected payoff by unilaterally changing their strategy.</text>
  </g>
  <g id="section-3">
    <rect x="10" y="320" width="380" height="50" fill="#fff" rx="10" />
    <text x="20" y="340" class="section" data-narration="Example: Coin Toss Game">Example: Coin Toss Game</text>
    <rect x="50" y="370" width="20" height="20" rx="10" fill="#007bff" class="arrow" />
    <rect x="120" y="370" width="20" height="20" rx="10" fill="#007bff" class="arrow" />
    <text x="280" y="370" class="section-text">Payoff Matrix:</text>
    <rect x="10" y="300" width="380" height="20" fill="#fff" rx="10" />
    <text x="20" y="320" class="section-text">|             | Heads | Tails |</text>
    <text x="20" y="340" class="section-text">| ----------- | ----- | ----- |</text>
    <text x="20" y="360" class="section-text">| Alice Heads | 1, 1  | 0, 0  |</text>
    <text x="20" y="380" class="section-text">| Alice Tails | 0, 0  | 1, 1  |</text>
    <text x="20" y="400" class="section-text">| Bob Heads   | 0, 0  | 1, 1  |</text>
    <text x="20" y="420" class="section-text">| Bob Tails   | 1, 1  | 0, 0  |</text>
    <rect x="50" y="370" width="100" height="20" rx="10" fill="#87ceeb" />
    <rect x="120" y="370" width="100" height="20" rx="10" fill="#87ceeb" />
    <rect x="190" y="370" width="100" height="20" rx="10" fill="#87ceeb" />
    <rect x="260" y="370" width="100" height="20" rx="10" fill="#87ceeb" />
    <rect x="330" y="370" width="100" height="20" rx="10" fill="#87ceeb" />
  </g>
  <g id="section-4">
    <rect x="10" y="450" width="380" height="50" fill="#fff" rx="10" />
    <text x="20" y="470" class="section" data-narration="Finding Pure Equilibrium with Randomization">Finding Pure Equilibrium with Randomization</text>
    <text x="20" y="500" class="section-text">To find the pure equilibrium with randomization, we need to find the probability distribution over the pure strategies that maximizes the expected payoff for each player.</text>
  </g>
  <g id="section-5">
    <rect x="10" y="570" width="380" height="50" fill="#fff" rx="10" />
    <text x="20" y="590" class="section" data-narration="Example">Example</text>
    <rect x="50" y="630" width="20" height="20" rx="10" fill="#007bff" class="arrow" />
    <rect x="120" y="630" width="20" height="20" rx="10" fill="#007bff" class="arrow" />
    <text x="280" y="630" class="section-text">Expected Payoff:</text>
    <rect x="10" y="670" width="380" height="20" fill="#fff" rx="10" />
    <text x="20" y="690" class="section-text">Alice: P(Heads) + 0 \* P(Tails) = P(Heads)</text>
    <text x="20" y="710" class="section-text">Bob: 1 \* P(Heads) + 1 \* P(Tails) = P(Heads) + P(Tails)</text>
  </g>
  <g id="section-6">
    <rect x="10" y="780" width="380" height="50" fill="#fff" rx="10" />
    <text x="20" y="800" class="section" data-narration="Conclusion">Conclusion</text>
    <text x="20" y="830" class="section-text">In conclusion, pure equilibrium with randomization is a strategy profile where no player can improve their expected payoff by unilaterally changing their strategy.</text>
  </g>
  <g id=" arrows">
    <line x1="50" y1="370" x2="120" y2="370" stroke="#007bff" stroke-width="2" />
    <line x1="120" y1="370" x2="190" y2="370" stroke="#007bff" stroke-width="2" />
    <line x1="190" y1="370" x2="260" y2="370" stroke="#007bff" stroke-width="2" />
    <line x1="260" y1="370" x2="330" y2="370" stroke="#007bff" stroke-width="2" />
    <line x1="50" y1="630" x2="120" y2="630" stroke="#007bff" stroke-width="2" />
    <line x1="120" y1="630" x2="280" y2="630" stroke="#007bff" stroke-width="2" />
  </g>
  <animate id="animate-first" begin="0s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="rotate(360deg)" />
  </animate>
  <animate id="animate-second" begin="2s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="rotate(720deg)" />
  </animate>
  <animate id="animate-third" begin="4s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="rotate(1080deg)" />
  </animate>
  <animate id="animate-fourth" begin="6s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="rotate(1440deg)" />
  </animate>
</svg>