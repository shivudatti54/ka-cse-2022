<svg width="420" height="400" data-topic-id="dominated-actions" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <title>Dominated Actions</title>
  
  <style>
    /* Gradient background */
    body {
      background: #8f9bd0;
      background-image: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 50%, #ADD8E6 50%, #ADD8E6 100%);
      background-size: 100% 400px;
      background-position: 0% 100%;
      display: block;
    }
  </style>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="50%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  
  <g id="background">
    <rect x="0" y="0" width="420" height="400" fill="none" rx="10" />
  </g>
  
  <g id="actions">
    <rect x="20" y="20" width="380" height="360" fill="none" rx="10" />
    
    <g data-narration="What is a dominated action?" transform="translate(20 20)">
      <rect x="0" y="0" width="100%" height="50%" fill="none" rx="10" />
      <text x="50%" y="25%" font-size="16" font-family="Arial" text-anchor="middle">Dominated Action</text>
      <rect x="0" y="55%" width="100%" height="45%" fill="#87CEEB" rx="10" />
    </g>
    
    <g data-narration="Definition" transform="translate(20 200)">
      <rect x="0" y="0" width="100%" height="50%" fill="none" rx="10" />
      <text x="50%" y="25%" font-size="16" font-family="Arial" text-anchor="middle">Definition</text>
      <rect x="0" y="55%" width="100%" height="45%" fill="#ADD8E6" rx="10" />
    </g>
    
    <g data-narration="Types of Actions" transform="translate(20 350)">
      <rect x="0" y="0" width="100%" height="50%" fill="none" rx="10" />
      <text x="50%" y="25%" font-size="16" font-family="Arial" text-anchor="middle">Types of Actions</text>
      <rect x="0" y="55%" width="100%" height="45%" fill="#87CEEB" rx="10" />
      <rect x="0" y="100%" width="100%" height="45%" fill="#ADD8E6" rx="10" />
    </g>
    
    <g data-narration="Examples" transform="translate(20 400)">
      <rect x="0" y="0" width="100%" height="50%" fill="none" rx="10" />
      <text x="50%" y="25%" font-size="16" font-family="Arial" text-anchor="middle">Examples</text>
      <rect x="0" y="55%" width="100%" height="45%" fill="#87CEEB" rx="10" />
      <rect x="0" y="100%" width="100%" height="45%" fill="#ADD8E6" rx="10" />
    </g>
    
    <g data-narration="Conclusion" transform="translate(20 450)">
      <rect x="0" y="0" width="100%" height="50%" fill="none" rx="10" />
      <text x="50%" y="25%" font-size="16" font-family="Arial" text-anchor="middle">Conclusion</text>
      <rect x="0" y="55%" width="100%" height="45%" fill="#87CEEB" rx="10" />
      <rect x="0" y="100%" width="100%" height="45%" fill="#ADD8E6" rx="10" />
    </g>
  </g>
  
  <g id="arrow">
    <line x1="20" y1="20" x2="20" y2="360" stroke="#000" stroke-width="2" />
    <line x1="380" y1="20" x2="380" y2="360" stroke="#000" stroke-width="2" />
  </g>
  
  <g id="title">
    <text x="50%" y="10%" font-size="32" font-family="Arial" text-anchor="middle">Dominated Actions</text>
  </g>
  
  <g id="footer">
    <text x="50%" y="90%" font-size="16" font-family="Arial" text-anchor="middle">Learn more about dominated actions</text>
  </g>
</svg>