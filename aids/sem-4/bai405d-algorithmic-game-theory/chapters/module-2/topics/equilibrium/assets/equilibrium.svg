<svg width="420" height="400" data-topic-id="equilibrium">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <g transform="translate(20,20)">
      <text x="50%" y="80" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Equilibrium</text>
    </g>
  </section>
  
  <!-- Defining Equilibrium Section -->
  <section data-narration="Defining Equilibrium">
    <g transform="translate(20,100)">
      <path d="M 50 50 L 150 50" stroke="#0097A7" stroke-width="2" fill="none"/>
      <text x="50%" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">No player can improve their payoff by changing their strategy.</text>
      <text x="50%" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">All players are playing their best response to the strategies of the other players.</text>
    </g>
  </section>
  
  <!-- Types of Equilibrium Section -->
  <section data-narration="Types of Equilibrium">
    <g transform="translate(20,200)">
      <path d="M 50 50 L 150 50" stroke="#0097A7" stroke-width="2" fill="none"/>
      <circle cx="150" cy="50" r="20" stroke="#0097A7" stroke-width="2"/>
      <text x="50%" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Pareto Equilibrium</text>
      <text x="50%" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">No player can improve their payoff without making another player worse off.</text>
      <text x="50%" y="90" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Nash Equilibrium</text>
      <text x="50%" y="100" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">No player can improve their payoff by unilaterally changing their strategy.</text>
    </g>
  </section>
  
  <!-- Nash Equilibrium Section -->
  <section data-narration="Nash Equilibrium">
    <g transform="translate(20,300)">
      <path d="M 50 50 L 150 50" stroke="#0097A7" stroke-width="2" fill="none"/>
      <path d="M 100 20 L 100 70" stroke="#0097A7" stroke-width="2" fill="none"/>
      <triangle points="100,20 100,70 120,40" fill="#0097A7" stroke="black" stroke-width="2"/>
      <text x="50%" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">John Nash's strategic concept.</text>
      <text x="50%" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">No player can improve their payoff by unilaterally changing their strategy.</text>
      <text x="50%" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Assuming all other players keep their strategies unchanged.</text>
    </g>
  </section>
  
  <!-- Mixed Strategy Nash Equilibrium Section -->
  <section data-narration="Mixed Strategy Nash Equilibrium">
    <g transform="translate(20,400)">
      <path d="M 50 50 L 150 50" stroke="#0097A7" stroke-width="2" fill="none"/>
      <path d="M 100 20 L 100 70" stroke="#0097A7" stroke-width="2" fill="none"/>
      <circle cx="150" cy="50" r="20" stroke="#0097A7" stroke-width="2"/>
      <text x="50%" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">A strategic concept that allows for multiple mixed strategies.</text>
      <text x="50%" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">A Nash Equilibrium can be achieved with multiple pure strategies.</text>
    </g>
  </section>
  
  <!-- Examples and Applications Section -->
  <section data-narration="Examples and Applications">
    <g transform="translate(20,500)">
      <path d="M 50 50 L 150 50" stroke="#0097A7" stroke-width="2" fill="none"/>
      <path d="M 100 20 L 100 70" stroke="#0097A7" stroke-width="2" fill="none"/>
      <rect x="120" y="40" width="20" height="20" fill="#0097A7" stroke="black" stroke-width="2"/>
      <text x="50%" y="60" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Game theory in economics.</text>
      <text x="50%" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Politics and international relations.</text>
      <text x="50%" y="80" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Computer science and artificial intelligence.</text>
    </g>
  </section>
  
  <!-- Footer -->
  <g transform="translate(20,600)">
    <text x="50%" y="620" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Equilibrium</text>
  </g>
</svg>