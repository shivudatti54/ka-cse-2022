<svg width="420" height="400" data-topic-id="illustration-expert-diagnosis">
  <style>
    /* Add custom styles */
    body {
      background: linear-gradient(to bottom, #c7d2f2, #9ec0e8);
      font-family: Arial, sans-serif;
    }
    .section {
      margin-bottom: 20px;
    }
    .section h2 {
      color: #3498db;
    }
    .arrow {
      stroke: #1abc9c;
      stroke-width: 2;
      fill: none;
    }
  </style>

  <!-- Title -->
  <rect x="10" y="10" width="400" height="50" fill="#fff" rx="10" />
  <text x="20" y="25" font-size="24" font-weight="bold">Illustration Expert Diagnosis</text>

  <!-- Section 1: Introduction -->
  <g id="section-1">
    <rect x="10" y="80" width="400" height="50" fill="#fff" rx="10" />
    <text x="20" y="95" font-size="18" data-narration="Introduction to Expert Diagnosis">Expert diagnosis is a crucial aspect of decision-making in various fields, including medicine, engineering, and economics.</text>
    <animate transform="rotate(360 200 150)" begin="0s" dur="2s" repeat="indefinite" />
  </g>

  <!-- Section 2: Mixed Strategy Nash Equilibrium -->
  <g id="section-2">
    <rect x="10" y="140" width="400" height="50" fill="#fff" rx="10" />
    <path d="M 200 150 L 250 150 L 250 200 L 200 200 Z" stroke="#1abc9c" stroke-width="2" fill="none" class="arrow" />
    <text x="20" y="165" font-size="18" data-narration="Mixed Strategy Nash Equilibrium (MSNE)">A state where no player can improve their outcome by unilaterally changing their strategy, assuming the other player's strategy remains unchanged.</text>
    <animate transform="rotate(360 250 170)" begin="0.5s" dur="2s" repeat="indefinite" />
  </g>

  <!-- Section 3: Nash Equilibrium -->
  <g id="section-3">
    <rect x="10" y="200" width="400" height="50" fill="#fff" rx="10" />
    <path d="M 200 200 L 250 200 L 250 250 L 200 250 Z" stroke="#1abc9c" stroke-width="2" fill="none" class="arrow" />
    <text x="20" y="215" font-size="18" data-narration="Nash Equilibrium">A concept in game theory that describes a stable state where no player can improve their outcome by changing their strategy, assuming all other players' strategies remain unchanged.</text>
    <animate transform="rotate(360 250 210)" begin="1s" dur="2s" repeat="indefinite" />
  </g>

  <!-- Section 4: Game Theory -->
  <g id="section-4">
    <rect x="10" y="260" width="400" height="50" fill="#fff" rx="10" />
    <path d="M 200 250 L 250 250 L 250 300 L 200 300 Z" stroke="#1abc9c" stroke-width="2" fill="none" class="arrow" />
    <text x="20" y="275" font-size="18" data-narration="Game Theory">The study of strategic decision-making in situations where the outcome depends on the actions of multiple individuals or parties.</text>
    <animate transform="rotate(360 250 270)" begin="1.5s" dur="2s" repeat="indefinite" />
  </g>

  <!-- Section 5: Expert Diagnosis Games -->
  <g id="section-5">
    <rect x="10" y="310" width="400" height="50" fill="#fff" rx="10" />
    <path d="M 200 300 L 250 300 L 250 350 L 200 350 Z" stroke="#1abc9c" stroke-width="2" fill="none" class="arrow" />
    <text x="20" y="325" font-size="18" data-narration="Expert Diagnosis Games">Games between a decision-maker and an opponent, where the decision-maker's goal is to identify the best course of action, while the opponent's goal is to mislead or confuse the decision-maker.</text>
    <animate transform="rotate(360 250 310)" begin="2s" dur="2s" repeat="indefinite" />
  </g>

  <!-- Footer -->
  <rect x="10" y="370" width="400" height="30" fill="#fff" rx="10" />
  <text x="20" y="385" font-size="18">Illustration Expert Diagnosis</text>
</svg>