<svg width="420" height="400" data-topic-id="equilibrium-in-a-single-population">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7A9BE5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#4C8CFF" stop-opacity="1"/>
        </linearGradient>
        <style>
            .title {
                font-size: 24px;
                font-weight: bold;
                color: #4C8CFF;
                text-align: center;
                margin-bottom: 20px;
            }
            .footer {
                font-size: 14px;
                color: #666;
                text-align: center;
                margin-top: 20px;
            }
            .section {
                background-color: #7A9BE5;
                padding: 20px;
                border-radius: 10px;
                margin-bottom: 20px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .data-narration {
                font-size: 18px;
                color: #fff;
                text-align: center;
                margin-bottom: 10px;
            }
            .animation {
                fill-opacity: 0;
                stroke-opacity: 0;
            }
        </style>
    </defs>
    <title class="title">Equilibrium in a Single Population</title>
    <g transform="translate(10, 20)">
        <rect width="400" height="350" rx="10" fill="url(#gradient)"/>
        <rect x="10" y="10" width="400" height="30" rx="5" fill="#4C8CFF" class="title"/>
        <rect x="10" y="40" width="400" height="30" rx="5" fill="#666" class="footer"/>
        <g id="nash-equilibrium">
            <rect x="20" y="60" width="300" height="150" rx="10" fill="#7A9BE5" class="section">
                <rect x="20" y="60" width="290" height="140" rx="5" fill="#fff" class="data-narration">
                    <animate attributeName="opacity" from="0" to="1" dur="2s" begin="-0.5s"/>
                    <text x="20" y="150" font-size="18px" font-weight="bold">Nash Equilibrium</text>
                    <text x="20" y="170" font-size="16px">A state where no player can improve their payoff by unilaterally changing their strategy</text>
                    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="1.5s"/>
                </rect>
                <line x1="50" y1="120" x2="250" y2="120" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                <line x1="50" y1="120" x2="50" y2="180" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                <line x1="250" y1="120" x2="250" y2="180" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
            </g>
            <g id="pareto-optimality">
                <rect x="20" y="200" width="300" height="150" rx="10" fill="#7A9BE5" class="section">
                    <rect x="20" y="200" width="290" height="140" rx="5" fill="#fff" class="data-narration">
                        <animate attributeName="opacity" from="0" to="1" dur="2s" begin="-0.5s"/>
                        <text x="20" y="250" font-size="18px" font-weight="bold">Pareto Optimality</text>
                        <text x="20" y="270" font-size="16px">A state where no player can improve their payoff without making another player worse off</text>
                        <animate attributeName="opacity" from="1" to="0" dur="2s" begin="1.5s"/>
                    </rect>
                    <line x1="50" y1="220" x2="250" y2="220" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                    <line x1="50" y1="220" x2="50" y2="270" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                    <line x1="250" y1="220" x2="250" y2="270" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                </g>
            </g>
            <g id="mixed-strategy">
                <rect x="20" y="280" width="300" height="150" rx="10" fill="#7A9BE5" class="section">
                    <rect x="20" y="280" width="290" height="140" rx="5" fill="#fff" class="data-narration">
                        <animate attributeName="opacity" from="0" to="1" dur="2s" begin="-0.5s"/>
                        <text x="20" y="310" font-size="18px" font-weight="bold">Mixed Strategy</text>
                        <text x="20" y="330" font-size="16px">A strategy that involves randomizing between different actions</text>
                        <animate attributeName="opacity" from="1" to="0" dur="2s" begin="1.5s"/>
                    </rect>
                    <line x1="50" y1="300" x2="250" y2="300" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                    <line x1="50" y1="300" x2="50" y2="350" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                    <line x1="250" y1="300" x2="250" y2="350" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                </g>
            </g>
            <g id="uniform-population">
                <rect x="20" y="350" width="300" height="150" rx="10" fill="#7A9BE5" class="section">
                    <rect x="20" y="350" width="290" height="140" rx="5" fill="#fff" class="data-narration">
                        <animate attributeName="opacity" from="0" to="1" dur="2s" begin="-0.5s"/>
                        <text x="20" y="380" font-size="18px" font-weight="bold">Uniform Population</text>
                        <text x="20" y="400" font-size="16px">A population where all players have the same set of strategies and the population is uniform</text>
                        <animate attributeName="opacity" from="1" to="0" dur="2s" begin="1.5s"/>
                    </rect>
                    <line x1="50" y1="360" x2="250" y2="360" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                    <line x1="50" y1="360" x2="50" y2="410" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                    <line x1="250" y1="360" x2="250" y2="410" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                </g>
            </g>
            <g id="prisoner-dilemma">
                <rect x="20" y="460" width="300" height="150" rx="10" fill="#7A9BE5" class="section">
                    <rect x="20" y="460" width="290" height="140" rx="5" fill="#fff" class="data-narration">
                        <animate attributeName="opacity" from="0" to="1" dur="2s" begin="-0.5s"/>
                        <text x="20" y="490" font-size="18px" font-weight="bold">Prisoner's Dilemma</text>
                        <text x="20" y="510" font-size="16px">A game where two players have two possible strategies: confess or remain silent</text>
                        <animate attributeName="opacity" from="1" to="0" dur="2s" begin="1.5s"/>
                    </rect>
                    <line x1="50" y1="470" x2="250" y2="470" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                    <line x1="50" y1="470" x2="50" y2="520" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                    <line x1="250" y1="470" x2="250" y2="520" stroke="#4C8CFF" stroke-width="2" stroke-linecap="round"/>
                </g>
            </g>
            <rect x="10" y="10" width="400" height="30" rx="5" fill="#666" class="footer"/>
        </g>
    </svg>