<svg width="420" height="400" data-topic-id="prisoners-dilemma"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     xml:lang="en">
    <defs>
        <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#9C9CFF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity=".5"/>
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="380" fill="url(#backgroundGradient)"/>
    <title>Examples: The Prisoner’s Dilemma</title>
    <g transform="translate(10, 50)">
        <text x="0" y="0" font-size="24" font-family="Arial, sans-serif"
              text-anchor="middle">The Prisoner’s Dilemma</text>
    </g>
    <g transform="translate(10, 80)">
        <rect x="0" y="0" width="100%" height="30" stroke="#3498DB" stroke-width="2"/>
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Definition:</text>
        <text x="10" y="40" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">A Prisoner’s Dilemma is a situation where two individuals (Prisoners A and B) are faced with a choice that affects their own payoff, as well as the combined payoff of both Prisoners.</text>
        <text x="10" y="70" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Payoff Matrix:</text>
        <rect x="10" y="0" width="70%" height="20" fill="#F7F7F7"/>
        <rect x="10" y="30" width="30%" height="20" fill="#F7F7F7"/>
        <rect x="10" y="60" width="30%" height="20" fill="#F7F7F7"/>
        <rect x="10" y="90" width="30%" height="20" fill="#F7F7F7"/>
        <rect x="50" y="10" width="30%" height="20" fill="#F7F7F7"/>
        <rect x="50" y="30" width="20%" height="20" fill="#F7F7F7"/>
        <rect x="50" y="50" width="20%" height="20" fill="#F7F7F7"/>
        <rect x="50" y="70" width="20%" height="20" fill="#F7F7F7"/>
        <rect x="50" y="90" width="30%" height="20" fill="#F7F7F7"/>
        <animateTransform attributeName="transform" type="translate"
                           from="0 0" to="0 0" begin="0s" dur="1s"
                           repeatCount="indefinite"/>
        <text x="70" y="15" font-size="16" font-family="Arial, sans-serif"
              text-anchor="middle">Prisoner A (S): 3, Prisoner B (S): 3</text>
        <text x="70" y="45" font-size="16" font-family="Arial, sans-serif"
              text-anchor="middle">Prisoner A (C): 0, Prisoner B (S): 5</text>
        <text x="70" y="75" font-size="16" font-family="Arial, sans-serif"
              text-anchor="middle">Prisoner A (S): 5, Prisoner B (C): 0</text>
        <text x="70" y="105" font-size="16" font-family="Arial, sans-serif"
              text-anchor="middle">Prisoner A (C): 1, Prisoner B (C): 1</text>
    </g>
    <g transform="translate(10, 140)">
        <rect x="0" y="0" width="100%" height="30" stroke="#3498DB" stroke-width="2"/>
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Key Concepts:</text>
        <text x="10" y="40" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Payoff Matrix: A table that displays the payoffs for each possible combination of actions taken by the Prisoners.</text>
        <text x="10" y="70" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Nash Equilibrium: A situation where no Prisoner can improve their payoff by unilaterally changing their action, assuming the other Prisoner's action remains constant.</text>
        <text x="10" y="110" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Cooperative vs. Non-Cooperative Game: The Prisoner’s Dilemma is a non-cooperative game, where Prisoners must make decisions without consulting each other.</text>
    </g>
    <g transform="translate(10, 180)">
        <rect x="0" y="0" width="100%" height="30" stroke="#3498DB" stroke-width="2"/>
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Example:</text>
        <text x="10" y="40" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Suppose two prisoners, John and Mike, are interrogated separately by the police. Each prisoner has the option to confess (C) or remain silent (S). The payoffs are as follows:</text>
        <rect x="10" y="70" width="100%" height="20" fill="#F7F7F7"/>
        <text x="10" y="90" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Prisoner A (S): 3, Prisoner B (S): 3</text>
        <text x="10" y="120" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Prisoner A (C): 0, Prisoner B (S): 5</text>
        <text x="10" y="150" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Prisoner A (S): 5, Prisoner B (C): 0</text>
        <text x="10" y="180" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Prisoner A (C): 1, Prisoner B (C): 1</text>
    </g>
    <g transform="translate(10, 230)">
        <rect x="0" y="0" width="100%" height="30" stroke="#3498DB" stroke-width="2"/>
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">Conclusion:</text>
        <text x="10" y="40" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">The Prisoner’s Dilemma is a classic game theory paradox that highlights the tension between individual and collective rationality.</text>
        <text x="10" y="70" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">This study material has explored the world of the Prisoner’s Dilemma, including its definition, key concepts, and examples.</text>
    </g>
    <g transform="translate(10, 280)">
        <rect x="0" y="0" width="100%" height="30" stroke="#3498DB" stroke-width="2"/>
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">References:</text>
        <text x="10" y="40" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">[1]</text>
    </g>
    <g transform="translate(10, 320)">
        <rect x="0" y="0" width="100%" height="30" stroke="#3498DB" stroke-width="2"/>
        <text x="10" y="10" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">External Links:</text>
        <text x="10" y="40" font-size="18" font-family="Arial, sans-serif"
              text-anchor="middle">[2]</text>
    </g>
</svg>