<svg width="420" height="400" data-topic-id="batch-vs-streaming-processing">
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA" />
  <title>Bach vs Stravinsky: Understanding Batch and Stream Processing</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" />
  <text x="15" y="50" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
    Batch Processing
  </text>
  <text x="15" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
    A method of processing data where a large volume of data is collected over a period of time.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="10s" begin="0s" />
  <rect x="210" y="200" width="10" height="10" fill="#1A1D23" rx="2" />
  <animate attributeName="opacity" from="1" to="0" dur="10s" begin="0s" />
  <text x="220" y="220" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    High Latency
  </text>
  <text x="220" y="240" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    There is a significant delay between data being generated and the results of its processing being available.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="10s" begin="2s" />
  <rect x="210" y="200" width="10" height="10" fill="#1A1D23" rx="2" />
  <animate attributeName="opacity" from="1" to="0" dur="10s" begin="2s" />
  <text x="220" y="260" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    Throughput
  </text>
  <text x="220" y="280" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    Designed to handle very large volumes of data efficiently by leveraging distributed computing frameworks.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="10s" begin="4s" />
  <rect x="210" y="200" width="10" height="10" fill="#1A1D23" rx="2" />
  <animate attributeName="opacity" from="1" to="0" dur="10s" begin="4s" />
  <text x="220" y="320" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    Scheduled Execution
  </text>
  <text x="220" y="340" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    Jobs are typically initiated on a schedule (e.g., hourly, daily, weekly) or triggered once a certain amount of data has accumulated.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="10s" begin="6s" />
  <rect x="210" y="200" width="10" height="10" fill="#1A1D23" rx="2" />
  <animate attributeName="opacity" from="1" to="0" dur="10s" begin="6s" />
  <text x="15" y="390" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
    Stream Processing
  </text>
  <text x="15" y="410" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
    A method of processing data where data is processed in real-time as it is generated.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="10s" begin="8s" />
  <rect x="210" y="200" width="10" height="10" fill="#1A1D23" rx="2" />
  <animate attributeName="opacity" from="1" to="0" dur="10s" begin="8s" />
  <text x="220" y="230" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    Velocity
  </text>
  <text x="220" y="250" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    A key aspect of Big Data, particularly concerning the processing of large volumes of data in real-time.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="10s" begin="10s" />
  <rect x="210" y="200" width="10" height="10" fill="#1A1D23" rx="2" />
  <animate attributeName="opacity" from="1" to="0" dur="10s" begin="10s" />
  <text x="220" y="270" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    Real-time Data Processing
  </text>
  <text x="220" y="290" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
    Enables businesses to respond quickly to changing market conditions and customer needs.
  </text>
  <text x="15" y="400" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
    Conclusion
  </text>
  <text x="15" y="420" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
    Understanding the differences between batch and stream processing is crucial for making informed decisions about data processing paradigms.
  </text>
</svg>