<svg width="420" height="400" data-topic-id="Best-Response-Functions">
  <defs>
    <style>
      .container {
        background: linear-gradient(to bottom, #C7B8EA, #C7B8EA, #6495ED, #6495ED);
        padding: 20px;
      }
      .header {
        color: #2E4053;
        font-size: 24px;
      }
      .footer {
        color: #2E4053;
        font-size: 18px;
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
      }
    </style>
  </defs>
  <g id="container">
    <rect x="0" y="0" width="420" height="400" class="container" />
    <text class="header" x="50%" y="20%" font-size="24px" text-anchor="middle">Best Response Functions</text>
    <path d="M 100, 200 L 320, 200" stroke="#2E4053" stroke-width="2" fill="none" />
    <rect x="120" y="150" width="80" height="20" class="short-term" data-narration="Stop the attack's progression and prevent further damage">
      <animateTransform attributeName="transform" type="translate" from="0,150" to="0,170" begin="0s" dur="2s" repeatCount="indefinite" />
      <animate attribute="width" from="80" to="100" begin="0s" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="220" y="150" width="80" height="20" class="long-term" data-narration="Sustainable protection and long-term protection">
      <animateTransform attributeName="transform" type="translate" from="0,150" to="0,170" begin="2s" dur="2s" repeatCount="indefinite" />
      <animate attribute="width" from="80" to="100" begin="2s" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="100" y="250" width="80" height="20" class="limit-data-exfiltration" data-narration="Limit data exfiltration or unauthorized access">
      <animateTransform attributeName="transform" type="translate" from="0,250" to="0,270" begin="4s" dur="2s" repeatCount="indefinite" />
      <animate attribute="width" from="80" to="100" begin="4s" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="220" y="250" width="80" height="20" class="preserve-evidence" data-narration="Preserve evidence for subsequent investigation and legal proceedings">
      <animateTransform attributeName="transform" type="translate" from="0,250" to="0,270" begin="6s" dur="2s" repeatCount="indefinite" />
      <animate attribute="width" from="80" to="100" begin="6s" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="100" y="350" width="80" height="20" class="maintain-business-continuity" data-narration="Maintain business continuity where possible">
      <animateTransform attributeName="transform" type="translate" from="0,350" to="0,370" begin="8s" dur="2s" repeatCount="indefinite" />
      <animate attribute="width" from="80" to="100" begin="8s" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="220" y="350" width="80" height="20" class="prevent-re-infection" data-narration="Prevent re-infection or recurrence">
      <animateTransform attributeName="transform" type="translate" from="0,350" to="0,370" begin="10s" dur="2s" repeatCount="indefinite" />
      <animate attribute="width" from="80" to="100" begin="10s" dur="1s" repeatCount="indefinite" />
    </rect>
    <path d="M 100, 400 L 320, 400" stroke="#2E4053" stroke-width="2" fill="none" />
    <text class="footer" x="50%" y="70%" font-size="18px" text-anchor="middle">Best Response Functions</text>
  </g>
</svg>