  <animate attributeName="opacity" from="0" to="1" dur="500" begin="0s" />
  <text x="100" y="350" font-size="16" fill="#2F4F7F" data-narration="Static member functions are functions that can be called without creating an object of the class. They can only access static data members and other static member functions.">
    Static Member Functions
  </text>
  
