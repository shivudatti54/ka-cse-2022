  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" fill="#2F4F7F">
    Strategic Games
  </text>
  
  <!-- Section 1: Static Members in C++ -->
  <rect x="50%" y="60%" width="300" height="60" fill="#C7B8EA" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 150 30" to="360 150 30" dur="5000" begin="0s" />
  <text x="150" y="90" font-size="18" fill="#2F4F7F" data-narration="Static members are class-level members that belong to the class itself rather than to individual objects of the class.">
    Static Members in C++
  </text>
  <rect x="50%" y="120%" width="200" height="40" fill="#87CEEB" rx="5" />
  <animate attributeName="opacity" from="0" to="1" dur="500" begin="0s" />
  <text x="70" y="150" font-size="16" fill="#2F4F7F" data-narration="Unlike regular instance members, which are created separately for each object, static members are shared across all instances of the class.">
    Shared across all class instances
  </text>
  <rect x="70%" y="150%" width="150" height="40" fill="#87CEEB" rx="5" />
  <animate attributeName="opacity" from="0" to="1" dur="500" begin="0s" />
  <text x="100" y="180" font-size="16" fill="#2F4F7F" data-narration="Exist even when no objects of the class are created. Associated with the class rather than objects. Accessed using the class name scope resolution operator (::).">
    Associated with the class rather than objects
  </text>
  
  <!-- Section 2: Types of Static Members -->
  <rect x="50%" y="220%" width="300" height="60" fill="#C7B8EA" rx="10" />
  <animateTransform attributeName="transform" type="rotate" from="0 150 30" to="360 150 30" dur="5000" begin="0s" />
  <text x="150" y="260" font-size="18" fill="#2F4F7F" data-narration="Static data members are variables that are shared by all objects of a class. They are declared with the static keyword and must be defined separately outside the class declaration.">
    Static Data Members
  </text>
  <rect x="50%" y="290%" width="200" height="40" fill="#87CEEB" rx="5" />
  <animate attributeName="opacity" from="0" to="1" dur="500" begin="0s" />
  <text x="70" y="320" font-size="16" fill="#2F4F7F" data-narration="They are declared with the static keyword and must be defined separately outside the class declaration.">
