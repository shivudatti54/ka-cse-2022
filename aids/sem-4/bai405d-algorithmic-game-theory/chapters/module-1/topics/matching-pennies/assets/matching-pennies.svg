<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="420" height="400" viewBox="0 0 420 400" data-topic-id="Matching-Pennies">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Matching Pennies</title>
  <metadata>
    <title>Matching Pennies</title>
  </metadata>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <rect width="200" height="100" rx="10" fill="#ADD8E6"/>
    <g transform="scale(1.5)">
      <text x="50%" y="70%" font-size="16pt" text-anchor="middle" fill="#2E4053">Matching Pennies</text>
      <text x="50%" y="30%" font-size="14pt" text-anchor="middle" fill="#2E4053">Concept: Matching in Graph Theory</text>
    </g>
    <section data-narration="Introduction to Matching and Covering">
      <rect x="10" y="150" width="180" height="40" rx="10" fill="#ADD8E6"/>
      <g transform="translate(10, 150)">
        <text x="50%" y="170%" font-size="14pt" text-anchor="middle" fill="#2E4053">Matching and Covering are fundamental concepts in graph theory</text>
        <text x="50%" y="190%" font-size="14pt" text-anchor="middle" fill="#2E4053">with significant applications in computer science, operations research, and combinatorics.</text>
      </g>
    </section>
    <section data-narration="Basic Definitions">
      <rect x="10" y="200" width="180" height="40" rx="10" fill="#ADD8E6"/>
      <g transform="translate(10, 200)">
        <text x="50%" y="220%" font-size="14pt" text-anchor="middle" fill="#2E4053">A matching is a set of edges without common vertices</text>
        <text x="50%" y="240%" font-size="14pt" text-anchor="middle" fill="#2E4053">while a covering is a set of vertices that cover all edges in the graph.</text>
      </g>
    </section>
    <section data-narration="Types of Matchings">
      <rect x="10" y="250" width="180" height="40" rx="10" fill="#ADD8E6"/>
      <g transform="translate(10, 250)">
        <text x="50%" y="270%" font-size="14pt" text-anchor="middle" fill="#2E4053">Maximum matching: a matching with the largest possible number of edges</text>
        <text x="50%" y="290%" font-size="14pt" text-anchor="middle" fill="#2E4053">Perfect matching: a matching that covers all vertices of the graph</text>
        <text x="50%" y="310%" font-size="14pt" text-anchor="middle" fill="#2E4053">Maximal matching: a matching that cannot be extended by adding another edge</text>
      </g>
    </section>
    <section data-narration="Vertex Cover">
      <rect x="10" y="300" width="180" height="40" rx="10" fill="#ADD8E6"/>
      <g transform="translate(10, 300)">
        <text x="50%" y="320%" font-size="14pt" text-anchor="middle" fill="#2E4053">A vertex cover is a set of vertices such that every edge in E has at least one endpoint in C</text>
      </g>
    </section>
    <section data-narration="Edge Cover">
      <rect x="10" y="350" width="180" height="40" rx="10" fill="#ADD8E6"/>
      <g transform="translate(10, 350)">
        <text x="50%" y="370%" font-size="14pt" text-anchor="middle" fill="#2E4053">An edge cover is a set of edges such that every vertex in V is incident to at least one edge in L</text>
      </g>
    </section>
    <section data-narration="Matching in Bipartite Graphs">
      <rect x="10" y="400" width="180" height="40" rx="10" fill="#ADD8E6"/>
      <g transform="translate(10, 400)">
        <text x="50%" y="420%" font-size="14pt" text-anchor="middle" fill="#2E4053">Bipartite graphs are particularly important for matching problems</text>
      </g>
    </section>
    <g transform="translate(220, 10)">
      <rect width="200" height="100" rx="10" fill="#ADD8E6"/>
      <g transform="scale(1.5)">
        <text x="50%" y="70%" font-size="16pt" text-anchor="middle" fill="#2E4053">Matching Pennies</text>
      </g>
    </g>
    <a href="https://en.wikipedia.org/wiki/Matching_(graph_theory)">
      <rect x="10" y="410" width="100" height="30" rx="10" fill="#ADD8E6"/>
      <g transform="translate(10, 410)">
        <text x="50%" y="430%" font-size="14pt" text-anchor="middle" fill="#2E4053">Learn more about Matching in Graph Theory</text>
      </g>
    </a>
  </g>
  <g transform="translate(10, 420)">
    <rect width="400" height="10" rx="10" fill="#ADD8E6"/>
    <text x="50%" y="430%" font-size="14pt" text-anchor="middle" fill="#2E4053">Matching Pennies</text>
  </g>
</svg>