<svg width="420" height="400" data-topic-id="dominated-actions" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <title>Dominated Actions</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(20, 20)">
    <rect width="300" height="300" fill="#fff" rx="10" />
    <g transform="translate(150, 100)">
      <text x="50%" y="60%" font-size="24" font-weight="bold" fill="#3498db" text-anchor="middle">
        Dominated Actions
      </text>
      <rect x="50%" y="40%" width="80%" height="20%" fill="#fff" rx="5" />
      <rect x="50%" y="120%" width="80%" height="20%" fill="#fff" rx="5" />
      <rect x="50%" y="200%" width="80%" height="20%" fill="#fff" rx="5" />
      <rect x="50%" y="280%" width="80%" height="20%" fill="#fff" rx="5" />
      <animate transform="rotate(360 50% 50%)" begin="1s" dur="10s" repeat="indefinite" />
    </g>
  </svg>