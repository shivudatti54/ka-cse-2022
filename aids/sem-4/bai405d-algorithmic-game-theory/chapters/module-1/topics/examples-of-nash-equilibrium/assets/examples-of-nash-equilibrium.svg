<svg width="420" height="400" data-topic-id="nash-equilibrium">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="60" y="50" width="300" height="200" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(70, 75)">
    <title>Nash Equilibrium</title>
    <text x="50" y="10" font-size="24" fill="#3498DB">Examples of Nash Equilibrium</text>
  </g>

  <section data-narration="Introduction">
    <rect x="60" y="150" width="200" height="50" fill="#3498DB" rx="5" />
    <path d="M 100,150 L 100,160 L 110,160" stroke="#2ecc71" stroke-width="2" fill="none" />
    <text x="90" y="160" font-size="18" fill="#2ecc71">In game theory, a Nash equilibrium is a state in a game where no player can improve their payoff (or outcome) by unilaterally changing their strategy, assuming all other players keep their strategies unchanged.</text>
  </section>

  <section data-narration="Definition of Nash Equilibrium">
    <rect x="60" y="220" width="200" height="50" fill="#2ecc71" rx="5" />
    <path d="M 100,220 L 100,230 L 110,230" stroke="#e74c3c" stroke-width="2" fill="none" />
    <text x="90" y="230" font-size="18" fill="#e74c3c">A Nash equilibrium is a pair of strategies, one for each player, such that:</text>
    <text x="90" y="245" font-size="18" fill="#e74c3c">- No player can improve their payoff by unilaterally changing their strategy, assuming all other players keep their strategies unchanged.</text>
    <text x="90" y="260" font-size="18" fill="#e74c3c">- All players are making the best decision they can given the strategies of the other players.</text>
  </section>

  <section data-narration="Example 1: The Prisoner's Dilemma">
    <rect x="60" y="300" width="200" height="50" fill="#e74c3c" rx="5" />
    <path d="M 100,300 L 100,310 L 110,310" stroke="#1abc9c" stroke-width="2" fill="none" />
    <rect x="60" y="320" width="40" height="20" fill="#1abc9c" rx="5" />
    <text x="90" y="330" font-size="18" fill="#1abc9c">In the Prisoner's Dilemma, two prisoners are arrested and interrogated separately.</text>
    <text x="90" y="345" font-size="18" fill="#1abc9c">Each prisoner has two options: to confess or to remain silent.</text>
    <text x="90" y="360" font-size="18" fill="#1abc9c">The payoffs for each possible combination of actions are:</text>
    <rect x="80" y="380" width="50" height="20" fill="#1abc9c" rx="5" />
    <text x="120" y="380" font-size="18" fill="#1abc9c">|                               | Prisoner A Confesses | Prisoner A Remains Silent |</text>
    <text x="120" y="395" font-size="18" fill="#1abc9c">|                               | A: 10, B: 10         | A: 0, B: 10               |</text>
    <text x="120" y="410" font-size="18" fill="#1abc9c">|                               | Prisoner B Confesses | Prisoner B Remains Silent |</text>
    <text x="120" y="425" font-size="18" fill="#1abc9c">|                               | A: 10, B: 0          | A: 0, B: 0                |</text>
  </section>

  <section data-narration="Example 2: The Battle of the Sexes">
    <rect x="60" y="480" width="200" height="50" fill="#e74c3c" rx="5" />
    <path d="M 100,480 L 100,490 L 110,490" stroke="#1abc9c" stroke-width="2" fill="none" />
    <rect x="60" y="500" width="40" height="20" fill="#1abc9c" rx="5" />
    <text x="90" y="510" font-size="18" fill="#1abc9c">In the Battle of the Sexes, two people have to choose between attending a baseball game or a music concert.</text>
    <text x="90" y="525" font-size="18" fill="#1abc9c">The payoffs for each possible combination of actions are:</text>
    <rect x="80" y="545" width="50" height="20" fill="#1abc9c" rx="5" />
    <text x="120" y="545" font-size="18" fill="#1abc9c">|                               | Person 1 Attends Basebal |</text>
    <text x="120" y="560" font-size="18" fill="#1abc9c">|                               | A: 10, B: 0          |</text>
    <text x="120" y="575" font-size="18" fill="#1abc9c">|                               | Person 1 Attends Music |</text>
    <text x="120" y="590" font-size="18" fill="#1abc9c">|                               | A: 0, B: 10         |</text>
  </section>

  <footer>
    <text x="50" y="300" font-size="18" fill="#3498DB">Learn more about Nash Equilibrium at <a href="https://en.wikipedia.org/wiki/Nash_equilibrium">wikipedia.org</a></text>
  </footer>
</svg>