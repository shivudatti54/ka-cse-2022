<svg width="420" height="400" data-topic-id="repeated-games">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8f0a1a" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87ceeb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff9900" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5"/>
  <g transform="translate(10, 10)">
    <title>Repeated Games</title>
    <rect x="0" y="0" width="400" height="30" fill="#8f0a1a" opacity="1" rx="5">
      <animateTransform attributeName="transform" type="translate" from="0 30" to="0 10" dur="1s" begin="0s"/>
    </rect>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#87ceeb">Introduction</text>
    <rect x="0" y="40" width="400" height="30" fill="#87ceeb" opacity="1" rx="5">
      <animateTransform attributeName="transform" type="translate" from="0 60" to="0 50" dur="1s" begin="0.5s"/>
    </rect>
    <text x="10" y="70" font-size="18" font-family="Arial" fill="#ff9900">Types of Repeated Games</text>
    <rect x="0" y="90" width="400" height="30" fill="#ff9900" opacity="1" rx="5">
      <animateTransform attributeName="transform" type="translate" from="0 100" to="0 90" dur="1s" begin="1s"/>
    </rect>
    <text x="10" y="130" font-size="18" font-family="Arial" fill="#87ceeb">Equilibrium Concepts</text>
    <rect x="0" y="150" width="400" height="30" fill="#87ceeb" opacity="1" rx="5">
      <animateTransform attributeName="transform" type="translate" from="0 170" to="0 160" dur="1s" begin="1.5s"/>
    </rect>
    <text x="10" y="190" font-size="18" font-family="Arial" fill="#8f0a1a">Strategies in Repeated Games</text>
    <rect x="0" y="210" width="400" height="30" fill="#8f0a1a" opacity="1" rx="5">
      <animateTransform attributeName="transform" type="translate" from="0 230" to="0 220" dur="1s" begin="2s"/>
    </rect>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#87ceeb">Conclusion</text>
    <rect x="0" y="280" width="400" height="30" fill="#87ceeb" opacity="1" rx="5">
      <animateTransform attributeName="transform" type="translate" from="0 300" to="0 290" dur="1s" begin="2.5s"/>
    </rect>
    <footer>
      <text x="10" y="380" font-size="18" font-family="Arial" fill="#87ceeb">Educational Resource</text>
    </footer>
    <g>
      <path d="M 30 20 L 400 20" stroke="#8f0a1a" stroke-width="2" stroke-linecap="round"/>
      <path d="M 30 20 L 400 20" stroke="#87ceeb" stroke-width="2" stroke-linecap="round"/>
      <path d="M 30 20 L 400 20" stroke="#ff9900" stroke-width="2" stroke-linecap="round"/>
      <path d="M 30 20 L 400 20" stroke="#8f0a1a" stroke-width="2" stroke-linecap="round"/>
      <path d="M 30 20 L 400 20" stroke="#87ceeb" stroke-width="2" stroke-linecap="round"/>
      <path d="M 30 20 L 400 20" stroke="#ff9900" stroke-width="2" stroke-linecap="round"/>
    </g>
