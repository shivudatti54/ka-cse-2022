<svg width="420" height="400" data-topic-id="preferences" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g data-narration="What is a pointer in C++">
    <rect x="10" y="10" width="400" height="80" fill="url(#gradient)"/>
    <text x="20" y="50" font-size="24" fill="#2E4053">What is a pointer in C++?</text>
  </g>
  <g data-narration="Pointer Syntax">
    <rect x="10" y="100" width="400" height="80" fill="url(#gradient)"/>
    <text x="20" y="130" font-size="18" fill="#2E4053">Pointer Syntax:</text>
    <text x="20" y="150" font-size="18" fill="#2E4053">int *pointerName;</text>
  </g>
  <g data-narration="The Address-of Operator (&)">
    <rect x="10" y="200" width="400" height="80" fill="url(#gradient)"/>
    <text x="20" y="230" font-size="18" fill="#2E4053">The Address-of Operator (&):</text>
    <text x="20" y="250" font-size="18" fill="#2E4053">int x = 10; cout << &x;</text>
  </g>
  <g data-narration="Pointer Arithmetic">
    <rect x="10" y="270" width="400" height="80" fill="url(#gradient)"/>
    <text x="20" y="300" font-size="18" fill="#2E4053">Pointer Arithmetic:</text>
    <text x="20" y="320" font-size="18" fill="#2E4053">int arr[5] = {10, 20, 30, 40, 50}; int *ptr = arr; ptr++;</text>
  </g>
  <g data-narration="Null Pointers">
    <rect x="10" y="350" width="400" height="80" fill="url(#gradient)"/>
    <text x="20" y="380" font-size="18" fill="#2E4053">Null Pointers:</text>
    <text x="20" y="400" font-size="18" fill="#2E4053">int *ptr; cout << ptr == nullptr;</text>
  </g>
  <g data-narration="Arrow Connections">
    <line x1="10" y1="10" x2="10" y2="90" stroke="#2E4053" stroke-width="2"/>
    <line x1="10" y1="100" x2="10" y2="170" stroke="#2E4053" stroke-width="2"/>
    <line x1="10" y1="200" x2="10" y2="270" stroke="#2E4053" stroke-width="2"/>
    <line x1="10" y1="350" x2="10" y2="400" stroke="#2E4053" stroke-width="2"/>
  </g>
  <rect x="10" y="10" width="400" height="40" fill="#C5CAE9"/>
  <text x="20" y="30" font-size="24" fill="#2E4053">Preferences</text>
  <rect x="10" y="380" width="400" height="40" fill="#C5CAE9"/>
  <text x="20" y="400" font-size="24" fill="#2E4053">Preferences</text>
</svg>