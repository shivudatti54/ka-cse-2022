<svg width="420" height="400" data-topic-id="nash-equilibrium-of-an-infinitely-repeated-prisone">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="50" fill="url(#gradient)" rx="10" />
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#3498DB">Nash Equilibrium of an Infinitely Repeated Prisoner's Dilemma</text>

  <!-- Section 1: Introduction -->
  <rect x="10" y="80" width="400" height="50" fill="url(#gradient)" rx="10" />
  <text x="20" y="100" font-size="18" font-family="Arial" fill="#3498DB" data-narration="The Prisoner's dilemma is a fundamental game theory concept that illustrates the conflict between individual and group rationality." />
  <animateTransform attributeName="transform" type="translate" from="0 80" to="0 100" dur="2000" begin="0s" delay="0.5s" />
  <animateTransform attributeName="transform" type="translate" from="0 100" to="0 80" dur="2000" begin="0.5s" delay="1s" />
  <animateTransform attributeName="transform" type="translate" from="0 80" to="0 100" dur="2000" begin="1s" delay="1.5s" />

  <!-- Section 2: Background -->
  <rect x="10" y="150" width="400" height="200" fill="url(#gradient)" rx="10" />
  <rect x="10" y="160" width="400" height="10" fill="#3498DB" rx="5" />
  <text x="20" y="170" font-size="18" font-family="Arial" fill="#3498DB" data-narration="In this study material, we will delve into the Nash equilibrium of an infinitely repeated Prisoner's dilemma, a variant of the classic game." />
  <animateTransform attributeName="transform" type="translate" from="0 160" to="0 170" dur="2000" begin="0s" delay="0.5s" />
  <animateTransform attributeName="transform" type="translate" from="0 170" to="0 160" dur="2000" begin="0.5s" delay="1s" />
  <animateTransform attributeName="transform" type="translate" from="0 160" to="0 170" dur="2000" begin="1s" delay="1.5s" />

  <!-- Section 3: Strategies -->
  <rect x="10" y="320" width="400" height="200" fill="url(#gradient)" rx="10" />
  <rect x="10" y="330" width="400" height="10" fill="#3498DB" rx="5" />
  <rect x="10" y="340" width="400" height="10" fill="#FFC107" rx="5" />
  <text x="20" y="350" font-size="18" font-family="Arial" fill="#3498DB" data-narration="There are two main strategies: Stay Silent and Confess." />
  <text x="10" y="350" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Stay Silent represents cooperating and remaining silent." />
  <text x="10" y="360" font-size="18" font-family="Arial" fill="#3498DB" data-narration="Confess represents cooperating and confessing." />
  <animateTransform attributeName="transform" type="translate" from="0 330" to="0 350" dur="2000" begin="0s" delay="0.5s" />
  <animateTransform attributeName="transform" type="translate" from="0 350" to="0 330" dur="2000" begin="0.5s" delay="1s" />
  <animateTransform attributeName="transform" type="translate" from="0 330" to="0 350" dur="2000" begin="1s" delay="1.5s" />

  <!-- Section 4: Payoffs -->
  <rect x="10" y="400" width="400" height="200" fill="url(#gradient)" rx="10" />
  <rect x="10" y="410" width="400" height="10" fill="#3498DB" rx="5" />
  <rect x="10" y="420" width="400" height="10" fill="#FFC107" rx="5" />
  <text x="20" y="430" font-size="18" font-family="Arial" fill="#3498DB" data-narration="The payoffs for each strategy are as follows:" />
  <text x="10" y="430" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Stay Silent, Stay Silent: 3 (both prisoners receive 1 point)." />
  <text x="10" y="440" font-size="18" font-family="Arial" fill="#3498DB" data-narration="Stay Silent, Confess: 4 (prisoner A receives 4 points, prisoner B receives 0 points)." />
  <text x="10" y="450" font-size="18" font-family="Arial" fill="#FFC107" data-narration="Confess, Stay Silent: 4 (prisoner A receives 0 points, prisoner B receives 4 points)." />
  <animateTransform attributeName="transform" type="translate" from="0 410" to="0 430" dur="2000" begin="0s" delay="0.5s" />
  <animateTransform attributeName="transform" type="translate" from="0 430" to="0 410" dur="2000" begin="0.5s" delay="1s" />
  <animateTransform attributeName="transform" type="translate" from="0 410" to="0 430" dur="2000" begin="1s" delay="1.5s" />

  <!-- Section 5: Conclusion -->
  <rect x="10" y="470" width="400" height="50" fill="url(#gradient)" rx="10" />
  <text x="20" y="490" font-size="18" font-family="Arial" fill="#3498DB" data-narration="In conclusion, the Nash equilibrium of an infinitely repeated Prisoner's dilemma is a fundamental concept in game theory." />
  <animateTransform attributeName="transform" type="translate" from="0 470" to="0 490" dur="2000" begin="0s" delay="0.5s" />
  <animateTransform attributeName="transform" type="translate" from="0 490" to="0 470" dur="2000" begin="0.5s" delay="1s" />
  <animateTransform attributeName="transform" type="translate" from="0 470" to="0 490" dur="2000" begin="1s" delay="1.5s" />

  <!-- Section 6: References -->
  <rect x="10" y="530" width="400" height="50" fill="url(#gradient)" rx="10" />
  <text x="20" y="550" font-size="18" font-family="Arial" fill="#3498DB" data-narration="References:" />
  <animateTransform attributeName="transform" type="translate" from="0 530" to="0 550" dur="2000" begin="0s" delay="0.5s" />
  <animateTransform attributeName="transform" type="translate" from="0 550" to="0 530" dur="2000" begin="0.5s" delay="1s" />
  <animateTransform attributeName="transform" type="translate" from="0 530" to="0 550" dur="2000" begin="1s" delay="1.5s" />

  <!-- Footer at bottom -->
  <rect x="10" y="580" width="400" height="50" fill="url(#gradient)" rx="10" />
  <text x="20" y="600" font-size="18" font-family="Arial" fill="#3498DB" data-narration="Created by [Your Name]" />
</svg>