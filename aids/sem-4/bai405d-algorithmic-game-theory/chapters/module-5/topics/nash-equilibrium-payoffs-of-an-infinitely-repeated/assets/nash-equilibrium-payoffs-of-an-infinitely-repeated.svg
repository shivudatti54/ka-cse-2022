<svg width="420" height="400" data-topic-id="nash-equilibrium-payoffs-of-an-infinitely-repeated-prisoners-dilemma">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#3498db">
    Nash Equilibrium Payoffs of an Infinitely Repeated Prisoner's Dilemma
  </text>
  
  <!-- Section 1: Introduction -->
  <rect x="20" y="60" width="380" height="40" fill="#f9f9f9" rx="10" data-narration="The Prisoner's Dilemma is a game theory paradox that illustrates the conflict between individual and group rationality. In this study material, we will explore the concept of Nash equilibrium payoffs in the context of an infinitely repeated Prisoner’s dilemma.">
    <text x="30%" y="35%" font-size="18" font-weight="normal" text-anchor="middle" fill="#2ecc71">
      Introduction
    </text>
  </rect>
  <animateTransform attributeName="transform" begin="0s" dur="2s" type="translate(20px,60px)" repeatCount="indefinite"/>
  
  <!-- Section 2: Game Tree -->
  <rect x="20" y="120" width="380" height="60" fill="#f9f9f9" rx="10" data-narration="The Nash equilibrium payoffs are determined by the game tree, which shows the possible combinations of actions and their corresponding payoffs.">
    <text x="30%" y="50%" font-size="18" font-weight="normal" text-anchor="middle" fill="#2ecc71">
      Game Tree
    </text>
    <g transform="translate(20,120)">
      <rect x="0" y="0" width="100" height="50" fill="#f9f9f9" rx="10" stroke="#3498db" stroke-width="2"/>
      <rect x="110" y="0" width="100" height="50" fill="#f9f9f9" rx="10" stroke="#3498db" stroke-width="2"/>
      <path d="M 0 0 L 100 50 L 100 0 Z"/>
      <path d="M 110 0 L 220 50 L 220 0 Z"/>
      <animateTransform attributeName="transform" begin="0s" dur="2s" type="translate(0,0)" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" begin="2s" dur="2s" type="translate(0,0)" repeatCount="indefinite"/>
    </g>
  </rect>
  <animateTransform attributeName="transform" begin="0s" dur="2s" type="translate(20,120)" repeatCount="indefinite"/>
  
  <!-- Section 3: Long-term Consequences -->
  <rect x="20" y="200" width="380" height="40" fill="#f9f9f9" rx="10" data-narration="In the infinitely repeated Prisoner’s dilemma, the Nash equilibrium payoffs are determined by the long-term consequences of each player's actions.">
    <text x="30%" y="35%" font-size="18" font-weight="normal" text-anchor="middle" fill="#2ecc71">
      Long-term Consequences
    </text>
  </rect>
  <animateTransform attributeName="transform" begin="0s" dur="2s" type="translate(20,200)" repeatCount="indefinite"/>
  
  <!-- Section 4: Payoff Matrix -->
  <rect x="20" y="280" width="380" height="40" fill="#f9f9f9" rx="10" data-narration="The payoff matrix shows the possible combinations of actions and their corresponding payoffs.">
    <text x="30%" y="35%" font-size="18" font-weight="normal" text-anchor="middle" fill="#2ecc71">
      Payoff Matrix
    </text>
  </rect>
  <animateTransform attributeName="transform" begin="0s" dur="2s" type="translate(20,280)" repeatCount="indefinite"/>
  
  <!-- Section 5: Cooperation -->
  <rect x="20" y="360" width="380" height="40" fill="#f9f9f9" rx="10" data-narration="In the infinitely repeated Prisoner’s dilemma, cooperation can lead to better outcomes for both players.">
    <text x="30%" y="35%" font-size="18" font-weight="normal" text-anchor="middle" fill="#2ecc71">
      Cooperation
    </text>
  </rect>
  <animateTransform attributeName="transform" begin="0s" dur="2s" type="translate(20,360)" repeatCount="indefinite"/>
  
  <!-- Section 6: Defection -->
  <rect x="20" y="440" width="380" height="40" fill="#f9f9f9" rx="10" data-narration="On the other hand, defection can lead to negative outcomes for both players.">
    <text x="30%" y="35%" font-size="18" font-weight="normal" text-anchor="middle" fill="#2ecc71">
      Defection
    </text>
  </rect>
  <animateTransform attributeName="transform" begin="0s" dur="2s" type="translate(20,440)" repeatCount="indefinite"/>
  
  <!-- Footer -->
  <rect x="0" y="400" width="420" height="20" fill="#f9f9f9" rx="10" data-narration="This diagram illustrates the Nash equilibrium payoffs of an infinitely repeated Prisoner's Dilemma.">
    <text x="50%" y="10%" font-size="18" font-weight="normal" text-anchor="middle" fill="#2ecc71">
      Educational Resource
    </text>
  </rect>
  <animateTransform attributeName="transform" begin="0s" dur="2s" type="translate(0,400)" repeatCount="indefinite"/>
</svg>