<svg width="420" height="400" data-topic-id="finitely-and-infinitely-repeated-prisoner-dilemma">
  <style>
    /* Set the background color to a gradient with pastel colors */
    body {
      background: #C7B8EA;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5CAE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#gradient)"/>
  <g id="title">
    <text x="20" y="50" font-size="24" font-family="Arial" font-weight="bold">Finitely and Infinitely Repeated Prisoner’s Dilemma</text>
  </g>
  <g id="section1">
    <data-narration data-topic-id="finitely-and-infinitely-repeated-prisoner-dilemma" data-section="1">
      <text x="20" y="100" font-size="18" font-family="Arial">Introduction</text>
    </data-narration>
    <rect x="10" y="120" width="400" height="10" style="fill: #4CAF50"/>
    <text x="20" y="150" font-size="18" font-family="Arial">The Prisoner’s Dilemma is a fundamental problem in game theory, first introduced by Merrill Flood and Melvin Dresher in 1950.</text>
  </g>
  <g id="section2">
    <data-narration data-topic-id="finitely-and-infinitely-repeated-prisoner-dilemma" data-section="2">
      <text x="20" y="100" font-size="18" font-family="Arial">Definitions</text>
    </data-narration>
    <rect x="10" y="120" width="400" height="10" style="fill: #4CAF50"/>
    <text x="20" y="150" font-size="18" font-family="Arial">- Prisoner’s Dilemma: A game theory scenario where two prisoners must decide whether to cooperate or defect, resulting in a pay matrix that determines the outcome of the game.</text>
    <rect x="10" y="180" width="400" height="10" style="fill: #4CAF50"/>
    <text x="20" y="210" font-size="18" font-family="Arial">- Cooperate: To choose the option that results in a lower payoff, but also contributes to a higher payoff for both players in the long run.</text>
    <rect x="10" y="260" width="400" height="10" style="fill: #4CAF50"/>
    <text x="20" y="290" font-size="18" font-family="Arial">- Defect: To choose the option that results in a higher payoff, but also contributes to a lower payoff for both players in the long run.</text>
  </g>
  <g id="section3">
    <data-narration data-topic-id="finitely-and-infinitely-repeated-prisoner-dilemma" data-section="3">
      <text x="20" y="100" font-size="18" font-family="Arial">Finitely Repeated Prisoner’s Dilemma</text>
    </data-narration>
    <rect x="10" y="120" width="400" height="10" style="fill: #4CAF50"/>
    <text x="20" y="150" font-size="18" font-family="Arial">In a finitely repeated Prisoner’s Dilemma, the game is played multiple times, with each player having a fixed number of opportunities to cooperate or defect.</text>
    <rect x="10" y="200" width="400" height="10" style="fill: #4CAF50"/>
    <text x="20" y="230" font-size="18" font-family="Arial">The payoffs are determined by a pay matrix, and the player with the highest payoff at the end of the series is declared the winner.</text>
  </g>
  <g id="section4">
    <data-narration data-topic-id="finitely-and-infinitely-repeated-prisoner-dilemma" data-section="4">
      <text x="20" y="100" font-size="18" font-family="Arial">Payoff Matrix</text>
    </data-narration>
    <rect x="10" y="120" width="400" height="10" style="fill: #4CAF50"/>
    <text x="20" y="150" font-size="18" font-family="Arial">|                           | Prisoner A Defects | Prisoner A Cooperates |\n| ------------------------- | ------------------ | --------------------- |\n| **Prisoner B Defects**    | A: 3, B: 3         | A: 0, B: 5            |\n| **Prisoner B Cooperates** | A: 5, B: 0         | A: 1, B: 1            |\n</text>
  </g>
  <g id="section5">
    <data-narration data-topic-id="finitely-and-infinitely-repeated-prisoner-dilemma" data-section="5">
      <text x="20" y="100" font-size="18" font-family="Arial">Interactive Simulation</text>
    </data-narration>
    <rect x="10" y="120" width="400" height="10" style="fill: #4CAF50"/>
    <rect x="200" y="200" width="20" height="20" fill="#FF9800" rx="5" transform="rotate(45 200 200)"/>
    <text x="220" y="230" font-size="18" font-family="Arial">Prisoner A</text>
    <rect x="300" y="200" width="20" height="20" fill="#FF9800" rx="5" transform="rotate(-45 300 200)"/>
    <text x="280" y="230" font-size="18" font-family="Arial">Prisoner B</text>
  </g>
  <g id="section6">
    <data-narration data-topic-id="finitely-and-infinitely-repeated-prisoner-dilemma" data-section="6">
      <text x="20" y="100" font-size="18" font-family="Arial">Conclusion</text>
    </data-narration>
    <rect x="10" y="120" width="400" height="10" style="fill: #4CAF50"/>
    <text x="20" y="150" font-size="18" font-family="Arial">The Prisoner’s Dilemma is a fundamental problem in game theory, with implications for decision-making in various fields.</text>
  </g>
  <g id="footer">
    <text x="20" y="380" font-size="18" font-family="Arial">Copyright 2023</text>
  </g>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="10s" repeatCount="indefinite">
    <g>
      <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
      <text x="20" y="50" font-size="24" font-family="Arial" font-weight="bold">Finitely and Infinitely Repeated Prisoner’s Dilemma</text>
      <text x="20" y="100" font-size="18" font-family="Arial">Introduction</text>
      <rect x="10" y="120" width="400" height="10" style="fill: #4CAF50"/>
      <rect x="200" y="200" width="20" height="20" fill="#FF9800" rx="5" transform="rotate(45 200 200)"/>
      <text x="220" y="230" font-size="18" font-family="Arial">Prisoner A</text>
      <rect x="300" y="200" width="20" height="20" fill="#FF9800" rx="5" transform="rotate(-45 300 200)"/>
      <text x="280" y="230" font-size="18" font-family="Arial">Prisoner B</text>
    </g>
  </animate>
</svg>