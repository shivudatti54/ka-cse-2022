<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="extensive-games-with-perfect-information">
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7E5F4" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Extensive Games with Perfect Information</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastelGradient)" rx="10" />
  <g transform="translate(20, 20)">
    <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2E4053" text-anchor="start">Extensive Games with Perfect Information</text>
    <rect x="10" y="60" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="70" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="Definition">Definition</text>
  </g>
  <g transform="translate(20, 110)">
    <rect x="10" y="10" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="Multiple stages: Extensive games involve multiple stages, where players take turns making decisions.">Multiple stages</text>
    <rect x="10" y="50" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="Perfect information: Players have access to all the information about the game state at every stage.">Perfect information</text>
    <rect x="10" y="90" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="100" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="Tree or flowchart representation: Extensive games can be represented as a tree or a flowchart, where each node represents a decision point, and the edges represent the possible actions taken by the players.">Tree or flowchart representation</text>
  </g>
  <g transform="translate(20, 170)">
    <rect x="10" y="10" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="Example: Consider a simple game called &quot;Rock, Paper, Scissors&quot;. This game involves two players, Alice and Bob, who take turns playing either rock, paper, or scissors. The game can be represented as a tree:">Example</text>
    <rect x="10" y="50" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="1. Alice's first move: Rock (R), Paper (P), or Scissors (S).">Alice's first move</text>
    <rect x="10" y="90" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="100" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="2. Bob's response: Rock (R), Paper (P), or Scissors (S).">Bob's response</text>
    <rect x="10" y="130" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="140" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="3. Alice's second move: Rock (R), Paper (P), or Scissors (S).">Alice's second move</text>
  </g>
  <g transform="translate(20, 250)">
    <rect x="10" y="10" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="Key Characteristics: Extensive games involve multiple stages, where players take turns making decisions, and players have access to all the information about the game state at every stage.">Key Characteristics</text>
    <rect x="10" y="50" width="400" height="40" fill="#2E4053" rx="10" />
    <text x="10" y="60" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="The game can be represented as a tree or a flowchart, where each node represents a decision point, and the edges represent the possible actions taken by the players.">Game representation</text>
  </g>
  <rect x="10" y="310" width="400" height="40" fill="#2E4053" rx="10" />
  <text x="10" y="320" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF" data-narration="Study guide: Learn more about extensive games and perfect information at the link in the description.">Study guide</text>
  <g transform="translate(20, 360)">
    <text x="10" y="380" font-size="18" font-family="Arial, sans-serif" fill="#2E4053" text-anchor="start">Powered by Game Theory</text>
  </g>
</svg>