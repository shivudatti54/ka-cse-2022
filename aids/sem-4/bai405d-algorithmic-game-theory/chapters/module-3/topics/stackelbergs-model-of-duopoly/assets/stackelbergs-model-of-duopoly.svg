<svg
    width="420"
    height="400"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 420 400"
    data-topic-id="stackelbergs-model-of-duopoly"
    style="background-image: linear-gradient(to bottom, #7A8DBF, #A1C9F2); margin-bottom: 20px; padding: 20px; border-radius: 10px;"
    data-narration='<section><span>Stackelberg's Model of Duopoly</span><br>Describes the behavior of two firms competing in a market</section>
                <section data-narration="The Model"><span>Leader's Stage:</span><br>The Stackelberg leader sets the price and production levels for the market</section>
                <section data-narration="Follower's Stage:</span><br>The Stackelberg follower sets its own price and production levels in response to the leader's actions</section>
                <section data-narration="Key Concepts:"><span>Price Leadership:</span> The leader sets the market price, and the follower sets its price based on the leader's price.</section>
                <section data-narration="Equilibrium"><span>The equilibrium is reached when:</span><br>the quantity sold by each firm is maximized</section>
                <section data-narration="Example"><span>Firm A sets the market price, and Firm B sets its price based on Firm A's price and its own costs and market share</span></section>'
    data-narration-styles="font-size: 16px; font-family: Arial, sans-serif; color: #333;"
    style="font-size: 24px; font-family: Arial, sans-serif; color: #3498db; text-align: center;">
    <title>Stackelberg's Model of Duopoly</title>
    <animate duration="2s" begin=".5s" fill="freeze">
        <rect x="50" y="50" width="320" height="200" fill="#f1c40f" rx="10" />
    </animate>
    <g transform="translate(50, 50)">
        <rect x="0" y="0" width="100" height="20" fill="#58B5FF" rx="5" />
        <text x="10" y="5" text-anchor="start" fill="#333" font-size="16px">Leader</text>
        <rect x="120" y="0" width="100" height="20" fill="#E74C3C" rx="5" />
        <text x="130" y="5" text-anchor="start" fill="#333" font-size="16px">Follower</text>
        <rect x="0" y="55" width="100" height="20" fill="#2ecc71" rx="5" />
        <text x="10" y="60" text-anchor="start" fill="#333" font-size="16px">Price Leadership</text>
        <rect x="120" y="55" width="100" height="20" fill="#3498db" rx="5" />
        <text x="130" y="60" text-anchor="start" fill="#333" font-size="16px">Price Competition</text>
        <rect x="0" y="110" width="100" height="20" fill="#3498db" rx="5" />
        <text x="10" y="115" text-anchor="start" fill="#333" font-size="16px">Non-cooperative Game</text>
        <rect x="120" y="110" width="100" height="20" fill="#e74c3c" rx="5" />
        <text x="130" y="115" text-anchor="start" fill="#333" font-size="16px">Equilibrium</text>
        <foreignObject x="200" y="30" width="120" height="200" xmlns="http://www.w3.org/2000/svg">
            <text x="10" y="15" text-anchor="start" fill="#333" font-size="16px">Firm A</text>
            <text x="170" y="15" text-anchor="start" fill="#333" font-size="16px">Firm B</text>
            <text x="10" y="180" text-anchor="start" fill="#333" font-size="16px">Market Price</text>
            <text x="170" y="180" text-anchor="start" fill="#333" font-size="16px">Firm's Price</text>
            <text x="10" y="205" text-anchor="start" fill="#333" font-size="16px">Quantity Sold</text>
            <text x="170" y="205" text-anchor="start" fill="#333" font-size="16px">Quantity Sold</text>
        </foreignObject>
        <circle cx="200" cy="60" r="10" fill="#3498db" />
        <line x1="200" y1="60" x2="220" y2="80" stroke="#3498db" stroke-width="2" />
        <line x1="200" y1="60" x2="180" y2="80" stroke="#3498db" stroke-width="2" />
        <line x1="200" y1="60" x2="180" y2="80" stroke="#3498db" stroke-width="2" />
        <line x1="200" y1="160" x2="220" y2="180" stroke="#3498db" stroke-width="2" />
        <line x1="200" y1="160" x2="180" y2="180" stroke="#3498db" stroke-width="2" />
        <line x1="200" y1="160" x2="180" y2="180" stroke="#3498db" stroke-width="2" />
        <line x1="200" y1="240" x2="220" y2="260" stroke="#3498db" stroke-width="2" />
        <line x1="200" y1="240" x2="180" y2="260" stroke="#3498db" stroke-width="2" />
        <line x1="200" y1="240" x2="180" y2="260" stroke="#3498db" stroke-width="2" />
    </g>
    <footer>
        <text x="50%" y="400" text-anchor="middle" fill="#333" font-size="16px">Stackelberg's Model of Duopoly</text>
    </footer>
</svg>