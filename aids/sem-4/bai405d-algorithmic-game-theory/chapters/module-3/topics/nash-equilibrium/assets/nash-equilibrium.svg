<svg width="420" height="400" data-topic-id="Nash Equilibrium" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#66CCCC" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)"/>
  <text x="20" y="20" font-size="24" fill="#FFFFFF" text-anchor="start" style="font-family: Arial, sans-serif;" transform="rotate(315 20 20)">Nash Equilibrium</text>
  <section data-narration="Introduction">
    <rect x="15" y="50" width="370" height="30" rx="5" fill="#F0F0F0" style="opacity:.5"/>
    <text x="20" y="55" font-size="18" fill="#000000" text-anchor="start" style="font-family: Arial, sans-serif;" transform="rotate(315 20 55)">Introduction</text>
    <animate transform="rotate(30 20 55)" begin="0s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="Definition">
    <rect x="15" y="90" width="370" height="30" rx="5" fill="#F0F0F0" style="opacity:.5"/>
    <text x="20" y="95" font-size="18" fill="#000000" text-anchor="start" style="font-family: Arial, sans-serif;" transform="rotate(315 20 95)">Definition</text>
    <animate transform="rotate(60 20 95)" begin="2s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="Examples">
    <rect x="15" y="130" width="370" height="30" rx="5" fill="#F0F0F0" style="opacity:.5"/>
    <text x="20" y="135" font-size="18" fill="#000000" text-anchor="start" style="font-family: Arial, sans-serif;" transform="rotate(315 20 135)">Examples</text>
    <animate transform="rotate(90 20 135)" begin="4s" dur="2s" repeat="forever"/>
  </section>
  <section data-narration="Prisoner's Dilemma">
    <rect x="15" y="170" width="370" height="150" rx="5" fill="#F0F0F0" style="opacity:.5"/>
    <text x="20" y="175" font-size="18" fill="#000000" text-anchor="start" style="font-family: Arial, sans-serif;" transform="rotate(315 20 175)">Prisoner's Dilemma</text>
    <path d="M 100, 200 L 100, 50 Z" fill="#66CCCC" stroke="#000000" stroke-width="2" fill-rule="evenodd"/>
    <path d="M 250, 200 L 250, 50 Z" fill="#66CCCC" stroke="#000000" stroke-width="2" fill-rule="evenodd"/>
  </section>
  <section data-narration="Chess">
    <rect x="15" y="320" width="370" height="30" rx="5" fill="#F0F0F0" style="opacity:.5"/>
    <text x="20" y="325" font-size="18" fill="#000000" text-anchor="start" style="font-family: Arial, sans-serif;" transform="rotate(315 20 325)">Chess</text>
    <path d="M 150, 300 L 150, 350 Z" fill="#66CCCC" stroke="#000000" stroke-width="2" fill-rule="evenodd"/>
  </section>
  <section data-narration="Key Concepts">
    <rect x="15" y="360" width="370" height="30" rx="5" fill="#F0F0F0" style="opacity:.5"/>
    <text x="20" y="365" font-size="18" fill="#000000" text-anchor="start" style="font-family: Arial, sans-serif;" transform="rotate(315 20 365)">Key Concepts</text>
    <animate transform="rotate(120 20 365)" begin="6s" dur="2s" repeat="forever"/>
  </section>
  <rect x="15" y="400" width="370" height="30" fill="#F0F0F0" style="opacity:.5"/>
  <text x="20" y="405" font-size="18" fill="#000000" text-anchor="start" style="font-family: Arial, sans-serif;" transform="rotate(315 20 405)">Footer</text>
</svg>