<svg width="420" height="400" data-topic-id="illustrations-the-ultimatum-game" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65C9FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#C9E4FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" />
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="90%" height="80%" fill="#F0E4CC" rx="10" />
    <title>Illustrations: The Ultimatum Game</title>
    <g id="section-introduction">
      <rect x="0" y="0" width="90%" height="30%" fill="#F7F7F7" rx="10" />
      <g transform="translate(0, 0)">
        <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">What is the Ultimatum Game?</text>
        <text x="10" y="35" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">The Ultimatum Game is a game where two players, typically referred to as the proposer and the responder, are presented with a situation where they must divide a sum of money.</text>
      </g>
    </g>
    <g id="section-design">
      <rect x="0" y="30%" width="90%" height="30%" fill="#F7F7F7" rx="10" />
      <g transform="translate(0, 0)">
        <text x="10" y="45" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Design of the Ultimatum Game</text>
        <text x="10" y="65" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">The game is typically designed as follows:</text>
        <text x="10" y="85" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Proposer: given a amount of money to propose a split.</text>
        <text x="10" y="105" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Responder: given the remaining amount of money and can accept or reject the proposed split.</text>
      </g>
    </g>
    <g id="section-key-concepts">
      <rect x="0" y="60%" width="90%" height="30%" fill="#F7F7F7" rx="10" />
      <g transform="translate(0, 0)">
        <text x="10" y="75" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Key Concepts</text>
        <text x="10" y="95" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Proposer: The player who is given the amount of money to propose a split.</text>
        <text x="10" y="115" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Responder: The player who is given the remaining amount of money and can accept or reject the proposed split.</text>
      </g>
    </g>
    <g id="section-key-results-insights">
      <rect x="0" y="90%" width="90%" height="30%" fill="#F7F7F7" rx="10" />
      <g transform="translate(0, 0)">
        <text x="10" y="105" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Key Results and Insights</text>
        <text x="10" y="125" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Responders tend to accept splits that are close to 50% of the total amount of money.</text>
      </g>
    </g>
    <g id="section-illustrations">
      <rect x="0" y="120%" width="90%" height="30%" fill="#F7F7F7" rx="10" />
      <g transform="translate(0, 0)">
        <text x="10" y="135" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Illustrations: The Ultimatum Game</text>
        <text x="10" y="155" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">The game is a simple, yet powerful tool for understanding human decision-making and bargaining behavior.</text>
      </g>
    </g>
    <g id="section-conclusion">
      <rect x="0" y="150%" width="90%" height="30%" fill="#F7F7F7" rx="10" />
      <g transform="translate(0, 0)">
        <text x="10" y="165" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Conclusion</text>
        <text x="10" y="185" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">The Ultimatum Game is a classic game in the field of game theory and behavioral economics, providing insights into human decision-making and bargaining behavior.</text>
      </g>
    </g>
    <g id="section-connections">
      <rect x="0" y="180%" width="90%" height="10%" fill="#F7F7F7" rx="5" />
      <g transform="translate(0, 0)">
        <path d="M 10 185 L 90 185 L 90 190 L 10 190" stroke="#3498DB" stroke-width="2" fill="none" />
        <path d="M 10 165 L 90 165 L 90 160 L 10 160" stroke="#C9E4FF" stroke-width="2" fill="none" />
      </g>
    </g>
    <g id="section-footnote">
      <rect x="0" y="190%" width="90%" height="10%" fill="#F7F7F7" rx="5" />
      <g transform="translate(0, 0)">
        <text x="10" y="195" font-size="14" font-family="Arial, sans-serif" text-anchor="bottom">Footnote: This diagram is based on the study material provided.</text>
      </g>
    </g>
    <animate attribute="opacity" begin="0s" dur="2s" repeat="indefinite" />
    <animate attribute="x" begin="0.5s" dur="1s" repeat="indefinite" />
    <animate attribute="y" begin="1.5s" dur="1s" repeat="indefinite" />
  </g>
  <g id="title">
    <rect x="0" y="0" width="100%" height="10%" fill="#F0E4CC" rx="10" />
    <text x="20" y="7" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Illustrations: The Ultimatum Game</text>
  </g>
  <g id="footer">
    <rect x="0" y="390%" width="100%" height="10%" fill="#F0E4CC" rx="10" />
    <text x="10" y="397" font-size="14" font-family="Arial, sans-serif" text-anchor="bottom">2023</text>
  </g>
</svg>