<svg width="420" height="400" data-topic-id="Providing A Public Good">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B0E0E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title -->
  <text x="50%" y="50" font-size="36" font-family="Arial" fill="#2196F3" text-anchor="middle">
    Providing A Public Good
  </text>
  
  <!-- Section 1: Definition of a Public Good -->
  <section data-narration="Introduction">
    <rect x="0" y="150" width="420" height="150" fill="#F7F7F7" />
    <text x="50%" y="180" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
      A public good is a good or service that:
    </text>
    <text x="50%" y="210" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
      - Is non-excludable: It is impossible to exclude someone from using the good without excluding everyone else.
      - Is non-rivalrous: Providing the good to one person does not reduce its availability to others.
    </text>
  </section>
  
  <!-- Section 2: Characteristics of a Public Good -->
  <section data-narration="Characteristics of a Public Good">
    <rect x="0" y="350" width="420" height="150" fill="#F7F7F7" />
    <text x="50%" y="390" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
      The characteristics of a public good are:
    </text>
    <text x="50%" y="420" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
      - Non-excludability: It is difficult to exclude people from using the good without excluding everyone else.
      - Non-rivalry: Providing the good to one person does not reduce its availability to others.
      - Inclusivity: Everyone can use the good, regardless of their willingness to pay.
      - Pareto efficiency: The provision of the good leads to the best possible outcome for all parties involved.
    </text>
  </section>
  
  <!-- Section 3: Examples of Public Goods -->
  <section data-narration="Examples of Public Goods">
    <rect x="0" y="150" width="420" height="150" fill="#F7F7F7" />
    <text x="50%" y="180" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
      Examples of public goods include:
    </text>
    <text x="50%" y="210" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
      - National defense
      - Air and water pollution
      - Education
    </text>
  </section>
  
  <!-- Section 4: Game Theory Approach to Providing a Public Good -->
  <section data-narration="Game Theory Approach to Providing a Public Good">
    <rect x="0" y="350" width="420" height="150" fill="#F7F7F7" />
    <text x="50%" y="390" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
      Game theory can be used to analyze the provision of public goods.
    </text>
  </section>
  
  <!-- Section 5: Bayesian Game Theory Approach -->
  <section data-narration="Bayesian Game Theory Approach">
    <rect x="0" y="150" width="420" height="150" fill="#F7F7F7" />
    <text x="50%" y="180" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
      Bayesian game theory can be used to analyze the provision of public goods.
    </text>
  </section>
  
  <!-- Footer -->
  <text x="50%" y="400" font-size="24" font-family="Arial" fill="#666" text-anchor="middle">
    <a href="#">Back to topic index</a>
  </text>
</svg>