<svg width="420" height="400" data-topic-id="auctions-auctions-with-an-arbitrary-distribution-o">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />

  <g data-narration="Introduction">
    <rect x="10" y="20" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="50%" font-size="24" font-family="Open Sans" fill="#000" text-anchor="middle">Auctions</text>
  </g>

  <g data-narration="Definitions">
    <rect x="10" y="70" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="100%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Distribution of Valuations</text>
    <rect x="10" y="130" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="160%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Private Valuations</text>
    <rect x="10" y="210" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="240%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Public Valuations</text>
  </g>

  <g data-narration="Key Concepts">
    <rect x="10" y="280" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="310%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Vickrey-Clarke-Groves (VCG) Theorem</text>
    <rect x="10" y="370" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="400%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Nash Equilibrium</text>
  </g>

  <g data-narration="Examples">
    <rect x="10" y="430" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="460%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Example 1: First-Price Auction</text>
    <rect x="10" y="530" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="560%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Private Valuations: 10, 15, 20</text>
  </g>

  <g data-narration="Private Valuations">
    <rect x="10" y="60" width="400" height="200" fill="#C7B8EA" rx="10" display="block" />
    <rect x="10" y="260" width="400" height="200" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="110%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Alice: 10</text>
    <text x="50%" y="260%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Bob: 15</text>
    <text x="50%" y="410%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Charlie: 20</text>
  </g>

  <g data-narration="Expected Value of VCG Theorem">
    <rect x="10" y="320" width="400" height="200" fill="#87CEEB" rx="10" display="block" />
    <rect x="10" y="510" width="400" height="200" fill="#C7B8EA" rx="10" display="none" />
    <text x="50%" y="370%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Expected Value of VCG Theorem</text>
    <text x="50%" y="520%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Nash Equilibrium</text>
  </g>

  <g data-narration="Nash Equilibrium">
    <rect x="10" y="380" width="400" height="200" fill="#87CEEB" rx="10" display="block" />
    <rect x="10" y="570" width="400" height="200" fill="#C7B8EA" rx="10" display="none" />
    <text x="50%" y="430%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Nash Equilibrium</text>
    <text x="50%" y="550%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Best Response</text>
  </g>

  <g data-narration="First-Price Auction">
    <rect x="10" y="440" width="400" height="200" fill="#87CEEB" rx="10" display="block" />
    <rect x="10" y="640" width="400" height="200" fill="#C7B8EA" rx="10" display="none" />
    <text x="50%" y="490%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">First-Price Auction</text>
    <text x="50%" y="610%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Highest Bidder Wins</text>
  </g>

  <g data-narration="Second-Price Auction">
    <rect x="10" y="500" width="400" height="200" fill="#87CEEB" rx="10" display="block" />
    <rect x="10" y="690" width="400" height="200" fill="#C7B8EA" rx="10" display="none" />
    <text x="50%" y="550%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Second-Price Auction</text>
    <text x="50%" y="670%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Second-Highest Bidder Pays</text>
  </g>

  <g data-narration="Conclusion">
    <rect x="10" y="390" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="420%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Auctions with an Arbitrary Distribution of Valuations</text>
    <rect x="10" y="510" width="400" height="30" fill="#87CEEB" rx="10" display="none" />
    <text x="50%" y="540%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Summary</text>
  </g>

  <g data-narration="Arrows">
    <line x1="20" y1="10" x2="380" y2="10" stroke="#000" stroke-width="2" />
    <line x1="20" y1="30" x2="380" y2="30" stroke="#000" stroke-width="2" />
    <line x1="20" y1="50" x2="380" y2="50" stroke="#000" stroke-width="2" />
    <line x1="20" y1="70" x2="380" y2="70" stroke="#000" stroke-width="2" />
  </g>

  <g data-narration="Animations">
    <animate duration="2000" from="0%" to="100%" begin="0s" fill="freeze" />
    <animate duration="2000" from="0%" to="100%" begin="2s" fill="freeze" />
    <animate duration="2000" from="0%" to="100%" begin="4s" fill="freeze" />
    <animate duration="2000" from="0%" to="100%" begin="6s" fill="freeze" />
  </g>

  <footer>
    <text x="50%" y="380%" font-size="18" font-family="Open Sans" fill="#000" text-anchor="middle">Creative Commons Attribution-NonCommercial 4.0 International License</text>
  </footer>
</svg>