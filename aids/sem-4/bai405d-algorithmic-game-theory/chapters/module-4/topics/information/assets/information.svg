<svg width="420" height="400" data-topic-id="information-photometric-image-formation">
  <!-- Title and Footer -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63A9F4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2196F3" stop-opacity="1"/>
    </linearGradient>
    <style>.title {font-size: 24px; font-weight: bold;}</style>
    <style>.footer {position: absolute; bottom: 0; width: 100%; text-align: center;}</style>
  </defs>
  <rect x="10" y="10" width="400" height="40" fill="url(#grad)"/>
  <g class="title">
    <text x="20" y="15" font-size="24px" font-weight="bold">Photometric Image Formation</text>
  </g>
  <g class="footer">
    <text x="20" y="370" font-size="18px">2023</text>
  </g>

  <!-- Section 1: Introduction to Photometric Image Formation -->
  <g transform="translate(50, 60)">
    <rect x="-20" y="-20" width="120" height="80" fill="#F7F7F7" rx="10"/>
    <circle cx="60" cy="60" r="30" fill="#F7F7F7"/>
    <text x="50" y="40" font-size="18px" font-weight="bold">Introduction</text>
    <text x="50" y="70" data-narration="Photometric image formation is the process by which light interacts with surfaces and is captured by imaging systems to create digital images." font-size="14px"/>
    <animateTransform attributeName="cx" attributeName="cx" type="translate" from="60" to="120" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="cy" attributeName="cy" type="translate" from="60" to="120" begin=".5s" dur="1s" repeatCount="indefinite"/>
  </g>

  <!-- Section 2: Types of Light Sources -->
  <g transform="translate(50, 140)">
    <rect x="-20" y="-20" width="120" height="80" fill="#F7F7F7" rx="10"/>
    <circle cx="60" cy="60" r="30" fill="#F7F7F7"/>
    <text x="50" y="40" font-size="18px" font-weight="bold">Light Sources</text>
    <text x="50" y="70" data-narration="Light sources can be categorized based on their properties." font-size="14px"/>
    <rect x="20" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="80" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="140" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="20" to="60" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="80" to="120" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="140" to="180" begin=".5s" dur="1s" repeatCount="indefinite"/>
  </g>

  <!-- Section 3: Light Properties -->
  <g transform="translate(50, 220)">
    <rect x="-20" y="-20" width="120" height="80" fill="#F7F7F7" rx="10"/>
    <circle cx="60" cy="60" r="30" fill="#F7F7F7"/>
    <text x="50" y="40" font-size="18px" font-weight="bold">Light Properties</text>
    <text x="50" y="70" data-narration="Light properties include intensity, color temperature, and spectral distribution." font-size="14px"/>
    <rect x="20" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="80" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="140" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="20" to="60" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="80" to="120" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="140" to="180" begin=".5s" dur="1s" repeatCount="indefinite"/>
  </g>

  <!-- Section 4: Surface Reflection Models -->
  <g transform="translate(50, 300)">
    <rect x="-20" y="-20" width="120" height="80" fill="#F7F7F7" rx="10"/>
    <circle cx="60" cy="60" r="30" fill="#F7F7F7"/>
    <text x="50" y="40" font-size="18px" font-weight="bold">Surface Reflection Models</text>
    <text x="50" y="70" data-narration="When light strikes a surface, it can be reflected, absorbed, or transmitted." font-size="14px"/>
    <rect x="20" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="80" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="140" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="20" to="60" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="80" to="120" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="140" to="180" begin=".5s" dur="1s" repeatCount="indefinite"/>
  </g>

  <!-- Section 5: Diffuse Reflection (Lambertian Surfaces) -->
  <g transform="translate(50, 380)">
    <rect x="-20" y="-20" width="120" height="80" fill="#F7F7F7" rx="10"/>
    <circle cx="60" cy="60" r="30" fill="#F7F7F7"/>
    <text x="50" y="40" font-size="18px" font-weight="bold">Diffuse Reflection (Lambertian Surfaces)</text>
    <text x="50" y="70" data-narration="When light strikes a Lambertian surface, it is scattered equally in all directions." font-size="14px"/>
    <rect x="20" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="80" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="140" y="60" width="40" height="20" fill="#2196F3" rx="5"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="20" to="60" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="80" to="120" begin=".5s" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="x" attributeName="x" type="translate" from="140" to="180" begin=".5s" dur="1s" repeatCount="indefinite"/>
  </g>

  <!-- Section 6: Conclusion -->
  <g transform="translate(50, 440)">
    <rect x="-20" y="-20" width="120" height="80" fill="#F7F7F7" rx="10"/>
    <circle cx="60" cy="60" r="30" fill="#F7F7F7"/>
    <text x="50" y="40" font-size="18px" font-weight="bold">Conclusion</text>
    <text x="50" y="70" data-narration="Understanding photometric image formation is crucial for developing computer vision algorithms." font-size="14px"/>
  </g>
</svg>