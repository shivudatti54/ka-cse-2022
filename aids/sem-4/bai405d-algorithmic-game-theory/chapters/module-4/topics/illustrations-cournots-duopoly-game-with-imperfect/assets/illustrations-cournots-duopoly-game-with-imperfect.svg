<svg width="420" height="400" data-topic-id="Cournots-Duopoly-Game-With-Imperfect-Information">
  <style>
    /* Styles for the SVG */
    body {
      background-image: linear-gradient(to bottom, #3498db, #2ecc71);
      color: #fff;
      font-family: Arial, sans-serif;
    }
  </style>
  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#3498db" rx="10" />
    <text x="20" y="30" font-size="24" font-weight="bold" fill="#fff">Cournot's Duopoly Game with Imperfect Information</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-50" dur="1s" begin="0s" repeatCount="indefinite" />
  </section>
  <!-- Background Gradient Section -->
  <section data-narration="Background Gradient">
    <rect x="10" y="80" width="400" height="200" fill="url(#gradient)" rx="10" />
    <rect x="10" y="290" width="400" height="50" fill="#3498db" rx="10" />
    <animate attribute="opacity" from="1" to="0.5" dur="1s" begin="0s" repeatCount="indefinite" />
  </section>
  <!-- Cournot Game Section -->
  <section data-narration="Cournot Game">
    <rect x="10" y="100" width="400" height="50" fill="#2ecc71" rx="10" />
    <text x="20" y="120" font-size="18" font-weight="bold" fill="#fff">Cournot Game: Two firms compete in a market</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" dur="1s" begin="0s" repeatCount="indefinite" />
  </section>
  <!-- Imperfect Information Section -->
  <section data-narration="Imperfect Information">
    <rect x="10" y="160" width="400" height="50" fill="#3498db" rx="10" />
    <text x="20" y="180" font-size="18" font-weight="bold" fill="#fff">Imperfect Information: Private signals affect production costs</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-160" dur="1s" begin="0s" repeatCount="indefinite" />
  </section>
  <!-- Equilibrium Section -->
  <section data-narration="Equilibrium">
    <rect x="10" y="220" width="400" height="50" fill="#2ecc71" rx="10" />
    <text x="20" y="240" font-size="18" font-weight="bold" fill="#fff">Equilibrium: Firms adjust production quantities based on private signals</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-220" dur="1s" begin="0s" repeatCount="indefinite" />
  </section>
  <!-- Examples Section -->
  <section data-narration="Examples">
    <rect x="10" y="280" width="400" height="50" fill="#3498db" rx="10" />
    <text x="20" y="300" font-size="18" font-weight="bold" fill="#fff">Examples: Private signals can affect market share</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-280" dur="1s" begin="0s" repeatCount="indefinite" />
  </section>
  <!-- Footer Section -->
  <footer>
    <rect x="10" y="340" width="400" height="50" fill="#3498db" rx="10" />
    <text x="20" y="360" font-size="18" font-weight="bold" fill="#fff">Learn more about Cournot's Duopoly Game with Imperfect Information</text>
  </footer>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="1" />
      <stop offset="100%" stop-color="#3498db" stop-opacity="1" />
    </linearGradient>
  </defs>
</svg>