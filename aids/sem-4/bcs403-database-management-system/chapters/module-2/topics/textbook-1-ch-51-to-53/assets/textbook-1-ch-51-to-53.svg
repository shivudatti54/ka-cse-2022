<svg width="420" height="400">
  <desc>
    <title>Database Management System</title>
    <text x="10" y="10" font-size="14" font-family="Arial" fill="#333" data-narration="Overview of Database Management System">Database Management System</text>
    <rect x="10" y="30" width="400" height="20" fill="#3498db" rx="5" data-narration="A Database Management System (DBMS) is a software system that allows you to define, create, maintain, and manipulate databases. It is a crucial component of any organization that deals with large amounts of data."></rect>
  </desc>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66cccc" stop-opacity="1"/>
      <stop offset="50%" stop-color="#cc9966" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffcc66" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g transform="translate(15, 40)">
    <rect x="0" y="0" width="100" height="20" fill="url(#pastel-gradient)" rx="5" data-narration="Types of Databases: Relational, Object-Oriented, Hierarchical, and Network Databases"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.5 1.5" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="50" y="30" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Relational Database: A database that stores data in the form of tables with well-defined relationships between them."></text>
    <text x="50" y="60" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Object-Oriented Database: A database that stores data as objects and uses inheritance and polymorphism to define relationships between them."></text>
    <text x="50" y="90" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Hierarchical Database: A database that stores data in a hierarchical structure, with each record having a unique identifier."></text>
    <text x="50" y="120" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Network Database: A database that stores data in a network of records linked together."></text>
    <line x1="20" y1="40" x2="120" y2="40" stroke="#2980b9" stroke-width="2" data-narration="Relationship between different types of databases"/>
  </g>
  <g transform="translate(0, 160)">
    <rect x="0" y="0" width="100" height="20" fill="url(#pastel-gradient)" rx="5" data-narration="Database Design: Entity Relationship Diagram (ERD)")
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.5 1.5" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="50" y="30" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Entity Relationship Diagram (ERD): A visual representation of the relationships between entities in a database."></text>
    <text x="50" y="60" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Entity: A thing or concept that has attributes or properties."></text>
    <text x="50" y="90" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Attribute: A characteristic or feature of an entity."></text>
    <text x="50" y="120" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Relationship: The connection between two or more entities."></text>
    <line x1="20" y1="40" x2="120" y2="40" stroke="#2980b9" stroke-width="2" data-narration="Relationships between entities in an ERD"/>
    <line x1="20" y1="60" x2="80" y2="60" stroke="#2980b9" stroke-width="2" data-narration="Entity relationships in an ERD"/>
    <line x1="20" y1="80" x2="120" y2="80" stroke="#2980b9" stroke-width="2" data-narration="Attribute relationships in an ERD"/>
    <line x1="20" y1="100" x2="60" y2="100" stroke="#2980b9" stroke-width="2" data-narration="Relationship relationships in an ERD"/>
  </g>
  <g transform="translate(0, 320)">
    <rect x="0" y="0" width="100" height="20" fill="url(#pastel-gradient)" rx="5" data-narration="Database Design: Example of ERD for Customer Database"/>
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1.5 1.5" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="50" y="30" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Entity Relationship Diagram (ERD) for Customer Database:"></text>
    <text x="50" y="60" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Customers Entity: Customer ID, Name, Address, Phone Number, Email</text>
    <text x="50" y="90" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Orders Entity: Order ID, Customer ID, Order Date, Total Amount</text>
    <text x="50" y="120" font-size="16" font-family="Arial" fill="#2ecc71" data-narration="Order Details Entity: Order ID, Product ID, Quantity, Unit Price, Total Cost</text>
    <line x1="20" y1="40" x2="120" y2="40" stroke="#2980b9" stroke-width="2" data-narration="Relationship between Customers and Orders Entities"/>
    <line x1="20" y1="60" x2="80" y2="60" stroke="#2980b9" stroke-width="2" data-narration="Relationship between Orders and Order Details Entities"/>
  </g>
</svg>