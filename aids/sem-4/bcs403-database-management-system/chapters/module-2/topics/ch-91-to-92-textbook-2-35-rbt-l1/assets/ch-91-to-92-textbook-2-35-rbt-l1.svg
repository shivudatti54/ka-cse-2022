<svg width="420" height="400" data-topic-id="ch-91-92-textbook-2-3-5-rbt-l1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
    <rect fill="#c7d2f5" x="0" y="0" width="420" height="400" rx="10"/>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c7d2f5"/>
            <stop offset="100%" stop-color="#b5e2ff"/>
        </linearGradient>
    </defs>
    <title>Database Management System (DBMS)</title>
    <rect fill="url(#pastel-gradient)" x="0" y="0" width="420" height="40" rx="10"/>
    <g transform="translate(0, 40)">
        <rect fill="#fff" x="0" y="0" width="100%" height="320" rx="10"/>
        <g data-narration="What is a DBMS?" fill="#000">
            <rect x="10" y="10" width="300" height="30" fill="#fff" rx="5"/>
            <text x="15" y="20" font-size="16" font-family="Arial" text-anchor="start">A Database Management System (DBMS) is a software system that allows organizations to store, manage, and retrieve data in a controlled and efficient manner.</text>
        </g>
        <g data-narration="Types of DBMS" fill="#000">
            <rect x="10" y="60" width="300" height="30" fill="#fff" rx="5"/>
            <text x="15" y="70" font-size="16" font-family="Arial" text-anchor="start">There are three main types of DBMS: Relational DBMS (RDBMS), Object-Oriented DBMS (OODB), and Graph DBMS.</text>
        </g>
        <g data-narration="Features of DBMS" fill="#000">
            <rect x="10" y="110" width="300" height="30" fill="#fff" rx="5"/>
            <text x="15" y="120" font-size="16" font-family="Arial" text-anchor="start">DBMS provides control over data creation, modification, and deletion, ensures data consistency and accuracy, and provides mechanisms for data backup and recovery.</text>
        </g>
        <g data-narration="Characteristics of DBMS" fill="#000">
            <rect x="10" y="160" width="300" height="30" fill="#fff" rx="5"/>
            <text x="15" y="170" font-size="16" font-family="Arial" text-anchor="start">DBMS is scalable, flexible, available, and cost-effective.</text>
        </g>
        <g data-narration="Components of DBMS" fill="#000">
            <rect x="10" y="210" width="300" height="30" fill="#fff" rx="5"/>
            <text x="15" y="220" font-size="16" font-family="Arial" text-anchor="start">DBMS consists of database engine, database server, database client, and database administrator (DBA).</text>
        </g>
        <g data-narration="Normalization" fill="#000">
            <rect x="10" y="260" width="300" height="30" fill="#fff" rx="5"/>
            <text x="15" y="270" font-size="16" font-family="Arial" text-anchor="start">Normalization is the process of organizing data in a database to minimize data redundancy and improve data integrity.</text>
        </g>
        <path fill="#fff" d="M 20 100 L 400 100 M 200 120 L 200 180 M 300 120 L 300 180 M 400 120 L 400 180 M 200 100 L 400 100"/>
        <g transform="translate(10, 100)">
            <circle cx="10" cy="10" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
            <circle cx="150" cy="150" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
            <circle cx="290" cy="290" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
            <circle cx="10" cy="290" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
            <circle cx="290" cy="10" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
        </g>
        <g transform="translate(190, 110)">
            <line x1="10" y1="10" x2="10" y2="180" stroke="#000" stroke-width="2"/>
            <line x1="290" y1="290" x2="290" y2="10" stroke="#000" stroke-width="2"/>
            <line x1="10" y1="10" x2="290" y2="290" stroke="#000" stroke-width="2"/>
            <line x1="290" y1="10" x2="10" y2="290" stroke="#000" stroke-width="2"/>
        </g>
        <g transform="translate(0, 370)">
            <rect x="0" y="0" width="420" height="30" fill="#fff" rx="10"/>
            <text x="15" y="25" font-size="16" font-family="Arial" text-anchor="start">Database Management System (DBMS)</text>
        </g>
    </g>
</svg>