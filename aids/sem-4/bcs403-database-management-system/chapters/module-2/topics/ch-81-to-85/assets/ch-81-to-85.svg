<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" />
      <stop offset="100%" stop-color="#A7C9F8" />
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B3F54" />
      <stop offset="100%" stop-color="#4C5154" />
    </linearGradient>
  </defs>
  <title>Database Management System Study Material</title>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%" />
  <rect x="0" y="0" width="420" height="50" fill="#fff" rx="10">
    <text text-anchor="middle" x="210" y="25" font-size="24" font-family="Arial, sans-serif" fill="#333">
      Database Management System Study Material
    </text>
  </rect>
  <rect x="0" y="50" width="420" height="300" fill="#fff" rx="10">
    <g id="section-81">
      <text text-anchor="start" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Database entities are real-world concepts, objects, or things that have a distinct identity.">
        Database Entities
      </text>
      <circle cx="100" cy="100" r="40" fill="#C7B8EA" stroke="#333" stroke-width="2" />
      <line x1="80" y1="120" x2="140" y2="120" stroke="#333" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 100" to="100 100" begin="-0.5s" dur="1s" repeatCount="indefinite" />
      <text text-anchor="middle" x="100" y="150" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="An entity is represented as a table in the database. For example, customers, orders, and products are examples of database entities.">
        Database Entities
      </text>
    </g>
    <g id="section-82">
      <text text-anchor="start" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Database attributes are characteristics or features of a database entity. Attributes define the properties or features of an entity.">
        Database Attributes
      </text>
      <circle cx="100" cy="100" r="40" fill="#A7C9F8" stroke="#333" stroke-width="2" />
      <line x1="80" y1="120" x2="140" y2="120" stroke="#333" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 100" to="100 100" begin="-0.5s" dur="1s" repeatCount="indefinite" />
      <text text-anchor="middle" x="100" y="150" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Attributes define the properties or features of an entity. For example, customer name, customer address, and order date are examples of database attributes.">
        Database Attributes
      </text>
    </g>
    <g id="section-83">
      <text text-anchor="start" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="The relational model is a data model that represents data as relationships between entities. It uses tables and fields to store data.">
        Relational Model
      </text>
      <circle cx="100" cy="100" r="40" fill="#4C5154" stroke="#333" stroke-width="2" />
      <line x1="80" y1="120" x2="140" y2="120" stroke="#333" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 100" to="100 100" begin="-0.5s" dur="1s" repeatCount="indefinite" />
      <text text-anchor="middle" x="100" y="150" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="The relational model is based on the concept of normalization. It uses tables and fields to store data.">
        Relational Model
      </text>
    </g>
    <g id="section-84">
      <text text-anchor="start" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Normalization is the process of organizing data in a database to minimize data redundancy and improve data integrity. It involves dividing large tables into smaller tables and linking them through relationships.">
        Normalization
      </text>
      <circle cx="100" cy="100" r="40" fill="#C7B8EA" stroke="#333" stroke-width="2" />
      <line x1="80" y1="120" x2="140" y2="120" stroke="#333" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 100" to="100 100" begin="-0.5s" dur="1s" repeatCount="indefinite" />
      <text text-anchor="middle" x="100" y="150" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Normalization reduces data redundancy, improves data integrity, and simplifies data manipulation.">
        Normalization
      </text>
    </g>
    <g id="section-85">
      <text text-anchor="start" x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Data modeling is the process of creating a conceptual representation of a database. It involves defining the relationships between entities and attributes.">
        Data Modeling
      </text>
      <circle cx="100" cy="100" r="40" fill="#A7C9F8" stroke="#333" stroke-width="2" />
      <line x1="80" y1="120" x2="140" y2="120" stroke="#333" stroke-width="2" />
      <animateTransform attributeName="transform" type="translate" from="0 100" to="100 100" begin="-0.5s" dur="1s" repeatCount="indefinite" />
      <text text-anchor="middle" x="100" y="150" font-size="18" font-family="Arial, sans-serif" fill="#333" data-narration="Data modeling improves data understanding, enhances data integrity, and facilitates database design.">
        Data Modeling
      </text>
    </g>
  </rect>
  <rect x="0" y="350" width="420" height="50" fill="#fff" rx="10">
    <text text-anchor="middle" x="210" y="375" font-size="18" font-family="Arial, sans-serif" fill="#333">
      Database Management System Study Material
    </text>
  </rect>
</svg>