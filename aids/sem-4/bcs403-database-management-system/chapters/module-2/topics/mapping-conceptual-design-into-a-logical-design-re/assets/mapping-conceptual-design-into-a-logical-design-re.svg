<svg width="420" height="400" data-topic-id="Mapping-Conceptual-Design-into-a-Logical-Design-Re" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <style>
      .title {
        font-size: 24px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
      }
      .section {
        margin-bottom: 40px;
      }
      .data-narration {
        font-size: 16px;
        color: #666;
        margin-bottom: 20px;
      }
      .section-header {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
      }
    </style>
  </defs>

  <!-- Title -->
  <g transform="translate(10, 20)">
    <text class="title" x="50%" y="50%" text-anchor="middle">Mapping Conceptual Design into a Logical Design</text>
  </g>

  <!-- Section 1: Entity-Relationship Modeling -->
  <g transform="translate(10, 60)">
    <rect width="400" height="80" fill="#ccc" rx="10"/>
    <text class="section-header" x="50%" y="50%" text-anchor="middle">Entity-Relationship Modeling</text>
    <text class="data-narration" x="50%" y="80%" text-anchor="middle">ER modeling is used to represent the structure of a database.</text>
    <circle cx="50%" cy="70%" r="30" fill="#0b0b0b" stroke="#ccc"/>
    <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#ccc" stroke-width="2"/>
    <line x1="50%" y1="70%" x2="30%" y2="70%" stroke="#ccc" stroke-width="2"/>
  </g>

  <!-- Section 2: ER Modeling Techniques -->
  <g transform="translate(10, 140)">
    <rect width="400" height="80" fill="#ccc" rx="10"/>
    <text class="section-header" x="50%" y="50%" text-anchor="middle">ER Modeling Techniques</text>
    <text class="data-narration" x="50%" y="80%" text-anchor="middle">Identify all the entities, attributes, and relationships in the system.</text>
    <rect x="60%" y="60%" width="30%" height="30%" fill="#0b0b0b" rx="10"/>
    <rect x="60%" y="60%" width="30%" height="30%" fill="#0b0b0b" rx="10"/>
    <line x1="60%" y1="60%" x2="70%" y2="60%" stroke="#ccc" stroke-width="2"/>
    <line x1="60%" y1="60%" x2="50%" y2="60%" stroke="#ccc" stroke-width="2"/>
  </g>

  <!-- Section 3: ER-to-Relational Mapping -->
  <g transform="translate(10, 220)">
    <rect width="400" height="80" fill="#ccc" rx="10"/>
    <text class="section-header" x="50%" y="50%" text-anchor="middle">ER-to-Relational Mapping</text>
    <text class="data-narration" x="50%" y="80%" text-anchor="middle">Translate ER entities, attributes, and relationships into RDBMS tables, columns, and relationships.</text>
    <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#ccc" stroke-width="2"/>
    <line x1="50%" y1="70%" x2="30%" y2="70%" stroke="#ccc" stroke-width="2"/>
    <rect x="60%" y="60%" width="30%" height="30%" fill="#0b0b0b" rx="10"/>
    <rect x="60%" y="60%" width="30%" height="30%" fill="#0b0b0b" rx="10"/>
  </g>

  <!-- Section 4: Steps Involved in ER-to-Relational Mapping -->
  <g transform="translate(10, 300)">
    <rect width="400" height="80" fill="#ccc" rx="10"/>
    <text class="section-header" x="50%" y="50%" text-anchor="middle">Steps Involved in ER-to-Relational Mapping</text>
    <text class="data-narration" x="50%" y="80%" text-anchor="middle">1. Identify ER entities, 2. Identify ER attributes, 3. Identify ER relationships.</text>
    <line x1="50%" y1="70%" x2="70%" y2="70%" stroke="#ccc" stroke-width="2"/>
    <line x1="50%" y1="70%" x2="30%" y2="70%" stroke="#ccc" stroke-width="2"/>
    <rect x="60%" y="60%" width="30%" height="30%" fill="#0b0b0b" rx="10"/>
    <rect x="60%" y="60%" width="30%" height="30%" fill="#0b0b0b" rx="10"/>
  </g>

  <!-- Footer -->
  <g transform="translate(10, 380)">
    <text class="title" x="50%" y="50%" text-anchor="middle">Database Management System</text>
  </g>
</svg>