<svg width="420" height="400" data-topic-id="Relational-Algebra-Unary-And-Binary-Relational-Operations">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" opacity="0.5" />
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="40" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
    Relational Algebra: Unary and Binary Relational Operations
  </text>
  
  <!-- Section 1: Unary Relational Operations -->
  <rect x="50%" y="100%" width="200%" height="50%" fill="#F9F9F9" rx="10" opacity="0.8" data-narration="Unary Relational Operations are operations that are applied to a single relation.">
    <animateTransform attributeName="transform" type="translate" FROM="0 100" TO="0 0" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="70%" font-size="20" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      Selection (σ)
    </text>
    <text x="50%" y="60%" font-size="16" text-anchor="middle" fill="#2F4F7F">
      Selects a subset of tuples from a relation based on a condition.
    </text>
    <rect x="50%" y="90%" width="30%" height="10%" fill="#87CEEB" rx="5" />
    <text x="50%" y="85%" font-size="16" text-anchor="middle" fill="#87CEEB">
      x > 10 (R)
    </text>
    <rect x="80%" y="90%" width="30%" height="10%" fill="#87CEEB" rx="5" />
    <text x="80%" y="85%" font-size="16" text-anchor="middle" fill="#87CEEB">
      y > 10 (R)
    </text>
  </rect>
  
  <!-- Section 2: Projection (π) -->
  <rect x="50%" y="170%" width="200%" height="50%" fill="#F9F9F9" rx="10" opacity="0.8" data-narration="Projection (π) is an operation that selects a subset of attributes from a relation.">
    <animateTransform attributeName="transform" type="translate" FROM="0 170" TO="0 0" begin="2s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="130%" font-size="20" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      Projection (π)
    </text>
    <text x="50%" y="120%" font-size="16" text-anchor="middle" fill="#2F4F7F">
      Selects a subset of attributes from a relation.
    </text>
    <rect x="50%" y="150%" width="30%" height="10%" fill="#87CEEB" rx="5" />
    <text x="50%" y="145%" font-size="16" text-anchor="middle" fill="#87CEEB">
      {x, y} (R)
    </text>
  </rect>
  
  <!-- Section 3: Union (∪) -->
  <rect x="50%" y="250%" width="200%" height="50%" fill="#F9F9F9" rx="10" opacity="0.8" data-narration="Union (∪) is an operation that combines two relations into a single relation.">
    <animateTransform attributeName="transform" type="translate" FROM="0 250" TO="0 0" begin="4s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="210%" font-size="20" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
      Union (∪)
    </text>
    <text x="50%" y="200%" font-size="16" text-anchor="middle" fill="#2F4F7F">
      Combines two relations into a single relation.
    </text>
    <rect x="50%" y="230%" width="30%" height="10%" fill="#87CEEB" rx="5" />
    <text x="50%" y="225%" font-size="16" text-anchor="middle" fill="#87CEEB">
      R ∪ S
    </text>
  </rect>
  
  <!-- Section 4: Binary Relational Operations -->
  <rect x="50%" y="340%" width="200%" height="50%" fill="#F9F9F9" rx="10" opacity="0.8" data-narration="Binary Relational Operations are operations that are applied to two relations.">
    <animateTransform attributeName="transform" type="translate" FROM="0 340" TO="0 0" begin="6s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="300%" font-size="20" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
    Binary Relational Operations
  </text>
    <text x="50%" y="290%" font-size="16" text-anchor="middle" fill="#2F4F7F">
      Apply operations to two relations.
    </text>
    <rect x="50%" y="320%" width="30%" height="10%" fill="#87CEEB" rx="5" />
    <text x="50%" y="315%" font-size="16" text-anchor="middle" fill="#87CEEB">
      R ∧ S
    </text>
    <rect x="80%" y="320%" width="30%" height="10%" fill="#87CEEB" rx="5" />
    <text x="80%" y="315%" font-size="16" text-anchor="middle" fill="#87CEEB">
      R - S
    </text>
  </rect>
  
  <!-- Footer -->
  <text x="50%" y="400%" font-size="20" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
    Copyright 2023
  </text>
</svg>