<svg width="420" height="400" data-topic-id="ch-201-to-206-rbt-l1" data-narration="Database Management System Module L1">
  <rect x="0" y="0" width="420" height="400" fill="#C7E8F4" gradientUnits="userSpaceOnUse" gradientTransform="url(#pastelGradient)" rx="10" />
  <defs>
    <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="20" width="400" height="350" fill="#EEF0FF" rx="10" />
  <g transform="translate(20, 40)">
    <path d="M 50 70 V 130 H 300 V 170 L 50 170 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
    <text x="10" y="70" font-size="18" font-family="Arial" fill="#2E4053">Database Management System</text>
    <text x="150" y="70" font-size="18" font-family="Arial" fill="#2E4053">Module: L1</text>
    <text x="10" y="140" font-size="16" font-family="Arial" fill="#2E4053">A database management system (DBMS) is a software system that allows you to define, create, maintain, and manipulate databases.</text>
    <text x="10" y="170" font-size="16" font-family="Arial" fill="#2E4053">A database is a collection of organized data that is stored in a way that allows for efficient retrieval and manipulation.</text>
    <text x="10" y="200" font-size="16" font-family="Arial" fill="#2E4053">A DBMS provides a level of abstraction between the user and the physical storage of data, making it easier to manage and maintain large databases.</text>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
  </g>
  <g transform="translate(20, 60)">
    <rect x="10" y="10" width="200" height="30" fill="#3498DB" rx="5" />
    <text x="15" y="15" font-size="16" font-family="Arial" fill="#2E4053">Types of DBMS</text>
    <animateTransform attributeName="transform" type="translate" begin="0.5s" dur="1.5s" repeatCount="indefinite" />
    <g transform="translate(25, 40)">
      <path d="M 20 40 V 60 H 180 V 100 L 20 100 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
      <text x="10" y="45" font-size="16" font-family="Arial" fill="#2E4053">Relational DBMS (RDBMS)</text>
      <text x="10" y="75" font-size="16" font-family="Arial" fill="#2E4053">Organizes data into tables with well-defined relationships between them.</text>
      <text x="10" y="105" font-size="16" font-family="Arial" fill="#2E4053">Examples: MySQL, PostgreSQL, Microsoft SQL Server</text>
      <animateTransform attributeName="transform" type="translate" begin="1s" dur="1.5s" repeatCount="indefinite" />
    </g>
    <g transform="translate(25, 100)">
      <path d="M 20 120 V 150 H 180 V 180 L 20 180 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
      <text x="10" y="125" font-size="16" font-family="Arial" fill="#2E4053">Object-Oriented DBMS (OODB)</text>
      <text x="10" y="155" font-size="16" font-family="Arial" fill="#2E4053">Organizes data as objects with attributes and methods.</text>
      <text x="10" y="185" font-size="16" font-family="Arial" fill="#2E4053">Examples: Oracle, IBM DB2</text>
      <animateTransform attributeName="transform" type="translate" begin="2.5s" dur="1.5s" repeatCount="indefinite" />
    </g>
    <g transform="translate(25, 180)">
      <path d="M 20 200 V 230 H 180 V 260 L 20 260 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
      <text x="10" y="215" font-size="16" font-family="Arial" fill="#2E4053">Hierarchical DBMS</text>
      <text x="10" y="245" font-size="16" font-family="Arial" fill="#2E4053">Organizes data in a hierarchical structure.</text>
      <text x="10" y="275" font-size="16" font-family="Arial" fill="#2E4053">Examples: IBM Information Management System (IMS)</text>
      <animateTransform attributeName="transform" type="translate" begin="3.5s" dur="1.5s" repeatCount="indefinite" />
    </g>
    <g transform="translate(25, 250)">
      <path d="M 20 270 V 300 H 180 V 330 L 20 330 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
      <text x="10" y="285" font-size="16" font-family="Arial" fill="#2E4053">Network DBMS</text>
      <text x="10" y="315" font-size="16" font-family="Arial" fill="#2E4053">Organizes data in a network structure.</text>
      <text x="10" y="345" font-size="16" font-family="Arial" fill="#2E4053">Examples: Relational Database Management System (RDBMS)</text>
      <animateTransform attributeName="transform" type="translate" begin="4.5s" dur="1.5s" repeatCount="indefinite" />
    </g>
    <g transform="translate(25, 310)">
      <path d="M 20 330 V 360 H 180 V 390 L 20 390 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
      <text x="10" y="355" font-size="16" font-family="Arial" fill="#2E4053">Document-Oriented DBMS</text>
      <text x="10" y="385" font-size="16" font-family="Arial" fill="#2E4053">Organizes data as documents.</text>
      <text x="10" y="415" font-size="16" font-family="Arial" fill="#2E4053">Examples: MongoDB, Couchbase</text>
      <animateTransform attributeName="transform" type="translate" begin="5.5s" dur="1.5s" repeatCount="indefinite" />
    </g>
    <g transform="translate(20, 40)">
      <rect x="10" y="10" width="200" height="30" fill="#2E4053" rx="5" />
      <text x="15" y="15" font-size="16" font-family="Arial" fill="#2E4053">DBMS Components</text>
      <animateTransform attributeName="transform" type="translate" begin="0.5s" dur="1.5s" repeatCount="indefinite" />
      <g transform="translate(25, 40)">
        <path d="M 20 60 V 90 H 180 V 120 L 20 120 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
        <text x="10" y="75" font-size="16" font-family="Arial" fill="#2E4053">Database Engine</text>
        <text x="10" y="105" font-size="16" font-family="Arial" fill="#2E4053">The core component that manages the database.</text>
        <text x="10" y="135" font-size="16" font-family="Arial" fill="#2E4053">Examples: MySQL, PostgreSQL</text>
        <animateTransform attributeName="transform" type="translate" begin="1s" dur="1.5s" repeatCount="indefinite" />
      </g>
      <g transform="translate(25, 120)">
        <path d="M 20 140 V 170 H 180 V 200 L 20 200 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
        <text x="10" y="155" font-size="16" font-family="Arial" fill="#2E4053">Database Management System</text>
        <text x="10" y="185" font-size="16" font-family="Arial" fill="#2E4053">The overall software system that manages the database.</text>
        <text x="10" y="215" font-size="16" font-family="Arial" fill="#2E4053">Examples: Oracle, Microsoft SQL Server</text>
        <animateTransform attributeName="transform" type="translate" begin="2.5s" dur="1.5s" repeatCount="indefinite" />
      </g>
      <g transform="translate(25, 200)">
        <path d="M 20 220 V 250 H 180 V 280 L 20 280 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
        <text x="10" y="235" font-size="16" font-family="Arial" fill="#2E4053">Database Users</text>
        <text x="10" y="265" font-size="16" font-family="Arial" fill="#2E4053">Individuals who interact with the database to perform tasks such as creating, modifying, and querying data.</text>
        <text x="10" y="295" font-size="16" font-family="Arial" fill="#2E4053">Examples: Administrators, developers, end-users</text>
        <animateTransform attributeName="transform" type="translate" begin="3.5s" dur="1.5s" repeatCount="indefinite" />
      </g>
    </g>
    <g transform="translate(20, 60)">
      <rect x="10" y="10" width="200" height="30" fill="#2E4053" rx="5" />
      <text x="15" y="15" font-size="16" font-family="Arial" fill="#2E4053">DBMS Functions</text>
      <animateTransform attributeName="transform" type="translate" begin="0.5s" dur="1.5s" repeatCount="indefinite" />
      <g transform="translate(25, 40)">
        <path d="M 20 60 V 90 H 180 V 120 L 20 120 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
        <text x="10" y="75" font-size="16" font-family="Arial" fill="#2E4053">Data Definition Language (DDL)</text>
        <text x="10" y="105" font-size="16" font-family="Arial" fill="#2E4053">Used to define the structure of the database.</text>
        <text x="10" y="135" font-size="16" font-family="Arial" fill="#2E4053">Examples: CREATE TABLE, ALTER TABLE</text>
        <animateTransform attributeName="transform" type="translate" begin="1s" dur="1.5s" repeatCount="indefinite" />
      </g>
      <g transform="translate(25, 120)">
        <path d="M 20 140 V 170 H 180 V 200 L 20 200 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
        <text x="10" y="155" font-size="16" font-family="Arial" fill="#2E4053">Data Manipulation Language (DML)</text>
        <text x="10" y="185" font-size="16" font-family="Arial" fill="#2E4053">Used to manipulate the data in the database.</text>
        <text x="10" y="215" font-size="16" font-family="Arial" fill="#2E4053">Examples: INSERT, UPDATE, DELETE</text>
        <animateTransform attributeName="transform" type="translate" begin="2.5s" dur="1.5s" repeatCount="indefinite" />
      </g>
      <g transform="translate(25, 200)">
        <path d="M 20 220 V 250 H 180 V 280 L 20 280 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
        <text x="10" y="235" font-size="16" font-family="Arial" fill="#2E4053">Data Control Language (DCL)</text>
        <text x="10" y="265" font-size="16" font-family="Arial" fill="#2E4053">Used to control access to the database.</text>
        <text x="10" y="295" font-size="16" font-family="Arial" fill="#2E4053">Examples: GRANT, REVOKE</text>
        <animateTransform attributeName="transform" type="translate" begin="3.5s" dur="1.5s" repeatCount="indefinite" />
      </g>
    </g>
    <g transform="translate(20, 410)">
      <rect x="10" y="10" width="400" height="30" fill="#3498DB" rx="5" />
      <text x="15" y="15" font-size="18" font-family="Arial" fill="#2E4053">Advantages of DBMS</text>
      <animateTransform attributeName="transform" type="translate" begin="0.5s" dur="2s" repeatCount="indefinite" />
      <g transform="translate(25, 40)">
        <path d="M 20 60 V 90 H 180 V 120 L 20 120 z" fill="#2E4053" stroke="#3B5998" stroke-width="2" />
        <text x="10" y="75" font-size="16" font-family="Arial" fill="#2E4053">Improved Data Management</text>
        <text x="10" y="105" font-size="16" font-family="Arial" fill="#2E4053">A DBMS provides a level of abstraction between the user and the physical storage of data, making it easier to manage and maintain large databases.</text>
        <text x="10" y="135" font-size="16" font-family="Arial" fill="#2E4053">Enhanced Data Security</text>
        <text x="10" y="165" font-size="16" font-family="Arial" fill="#2E4053">A DBMS provides a secure way to store and manage data, reducing the risk of data loss or unauthorized access.</text>
        <text x="10" y="195" font-size="16" font-family="Arial" fill="#2E4053">Improved Data Integrity</text>
        <text x="10" y="225" font-size="16" font-family="Arial" fill="#2E4053">A DBMS provides features such as data validation and error checking to ensure data accuracy and consistency.</text>
        <text x="10" y="255" font-size="16" font-family="Arial" fill="#2E4053">Scalability and Flexibility</text>
        <text x="10" y="285" font-size="16" font-family="Arial" fill="#2E4053">A DBMS provides features such as data partitioning and indexing to improve query performance and scalability.</text>
        <animateTransform attributeName="transform" type="translate" begin="1.5s" dur="1.5s" repeatCount="indefinite" />
      </g>
    </g>
  </svg>