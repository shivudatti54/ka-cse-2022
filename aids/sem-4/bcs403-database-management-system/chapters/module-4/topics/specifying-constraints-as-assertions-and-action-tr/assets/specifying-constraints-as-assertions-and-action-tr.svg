<svg width="420" height="400" data-topic-id="specifying-constraints-as-assertions-and-action-triggers">

  <!-- Title -->
  <title>
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#2F4F7F">Specifying Constraints as Assertions and Action Triggers</text>
  </title>

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="40" width="420" height="320" fill="url(#gradient)"/>

  <!-- Section 1: What are Constraints? -->
  <section data-narration="What are Constraints?">
    <rect x="20" y="60" width="380" height="60" fill="#F9F9F9"/>
    <text x="50" y="90" font-size="18" font-family="Arial" fill="#333">Constraints are rules that ensure data consistency and integrity.</text>
    <text x="50" y="120" font-size="18" font-family="Arial" fill="#333">They can be used to ensure data is valid, unique, or follows a specific format.</text>
  </section>

  <!-- Section 2: Types of Constraints -->
  <section data-narration="Types of Constraints">
    <rect x="20" y="140" width="380" height="60" fill="#F9F9F9"/>
    <text x="50" y="180" font-size="18" font-family="Arial" fill="#333">Unique Constraint:</text>
    <text x="50" y="210" font-size="18" font-family="Arial" fill="#333">Primary Key Constraint:</text>
    <text x="50" y="240" font-size="18" font-family="Arial" fill="#333">Foreign Key Constraint:</text>
    <text x="50" y="270" font-size="18" font-family="Arial" fill="#333">Check Constraint:</text>
  </section>

  <!-- Section 3: Specifying Constraints as Assertions -->
  <section data-narration="Specifying Constraints as Assertions">
    <rect x="20" y="310" width="380" height="60" fill="#F9F9F9"/>
    <text x="50" y="350" font-size="18" font-family="Arial" fill="#333">ASSERT (condition)</text>
    <text x="50" y="380" font-size="18" font-family="Arial" fill="#333">Example: ASSERT (age >= 18 AND age <= 65)</text>
  </section>

  <!-- Section 4: Specifying Constraints as Action Triggers -->
  <section data-narration="Specifying Constraints as Action Triggers">
    <rect x="20" y="370" width="380" height="60" fill="#F9F9F9"/>
    <text x="50" y="410" font-size="18" font-family="Arial" fill="#333">WHEN (condition) THEN (action)</text>
    <text x="50" y="440" font-size="18" font-family="Arial" fill="#333">Example: WHEN age < 18 THEN SET age = NULL</text>
  </section>

  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,320" dur="2s" repeatCount="indefinite"/>
  </animate>

  <!-- Footer -->
  <footer>
    <text x="20" y="380" font-size="18" font-family="Arial" fill="#333">Learn more about database constraints and triggers at <a href="#">database.com</a></text>
  </footer>

</svg>