<svg width="420" height="400" data-topic-id="textbook-1-ch-71-to-73" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="50%" y="20%" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
    Data Management System Study Material: Ch 7.1 to 7.3
  </text>
  
  <!-- Section 1: Data Definition Language (DDL) -->
  <section data-narration="Definition: Data Definition Language (DDL) is a set of commands used to define the structure of a database.">
    <rect x="0" y="100" width="420" height="150" stroke="#2E4053" stroke-width="2" rx="10" />
    <animate transform="rotate(45 195 170)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Data Definition Language (DDL)
    </text>
    <path d="M 195,170 L 240,130 C 260,120 275,100 295,90" fill="#F7F4F9" stroke="#2E4053" stroke-width="2" />
  </section>
  
  <!-- Section 2: Types of DDL Commands -->
  <section data-narration="Types of DDL Commands: CREATE, ALTER, DROP, TRUNCATE">
    <rect x="0" y="260" width="420" height="150" stroke="#2E4053" stroke-width="2" rx="10" />
    <animate transform="rotate(90 195 170)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Types of DDL Commands
    </text>
    <path d="M 195,170 L 240,130 C 260,120 275,100 295,90" fill="#F7F4F9" stroke="#2E4053" stroke-width="2" />
  </section>
  
  <!-- Section 3: Data Definition Language (DDL) Commands -->
  <section data-narration="CREATE: Used to create a new database, table, or index. ALTER: Used to modify the structure of a database, table, or index. DROP: Used to drop a database, table, or index. TRUNCATE: Used to truncate a table, deleting all of its rows.">
    <rect x="0" y="320" width="420" height="150" stroke="#2E4053" stroke-width="2" rx="10" />
    <animate transform="rotate(135 195 170)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      DDL Commands
    </text>
    <path d="M 195,170 L 240,130 C 260,120 275,100 295,90" fill="#F7F4F9" stroke="#2E4053" stroke-width="2" />
  </section>
  
  <!-- Section 4: Primary Key (PK), Foreign Key (FK), and Index -->
  <section data-narration="Primary Key (PK): A unique identifier for each record in a table. Foreign Key (FK): A field in a table that references the primary key of another table. Index: A data structure that improves the speed of data retrieval.">
    <rect x="0" y="390" width="420" height="150" stroke="#2E4053" stroke-width="2" rx="10" />
    <animate transform="rotate(225 195 170)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Primary Key, Foreign Key, and Index
    </text>
    <path d="M 195,170 L 240,130 C 260,120 275,100 295,90" fill="#F7F4F9" stroke="#2E4053" stroke-width="2" />
  </section>
  
  <!-- Section 5: Data Control Language (DCL) -->
  <section data-narration="Definition: Data Control Language (DCL) is a set of commands used to control access to a database.">
    <rect x="0" y="470" width="420" height="150" stroke="#2E4053" stroke-width="2" rx="10" />
    <animate transform="rotate(270 195 170)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Data Control Language (DCL)
    </text>
    <path d="M 195,170 L 240,130 C 260,120 275,100 295,90" fill="#F7F4F9" stroke="#2E4053" stroke-width="2" />
  </section>
  
  <!-- Section 6: Types of DCL Commands -->
  <section data-narration="GRANT: Used to grant privileges to users. REVOKE: Used to revoke privileges from users. CREATE ROLE: Used to create a new role. ALTER ROLE: Used to modify the privileges of a role.">
    <rect x="0" y="540" width="420" height="150" stroke="#2E4053" stroke-width="2" rx="10" />
    <animate transform="rotate(315 195 170)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Types of DCL Commands
    </text>
    <path d="M 195,170 L 240,130 C 260,120 275,100 295,90" fill="#F7F4F9" stroke="#2E4053" stroke-width="2" />
  </section>
  
  <!-- Section 7: Data Manipulation Language (DML) -->
  <section data-narration="Definition: Data Manipulation Language (DML) is a set of commands used to manipulate data in a database.">
    <rect x="0" y="610" width="420" height="150" stroke="#2E4053" stroke-width="2" rx="10" />
    <animate transform="rotate(360 195 170)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Data Manipulation Language (DML)
    </text>
    <path d="M 195,170 L 240,130 C 260,120 275,100 295,90" fill="#F7F4F9" stroke="#2E4053" stroke-width="2" />
  </section>
  
  <!-- Section 8: Data Query Language (DQL) -->
  <section data-narration="Definition: Data Query Language (DQL) is a set of commands used to query data in a database.">
    <rect x="0" y="680" width="420" height="150" stroke="#2E4053" stroke-width="2" rx="10" />
    <animate transform="rotate(405 195 170)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
      Data Query Language (DQL)
    </text>
    <path d="M 195,170 L 240,130 C 260,120 275,100 295,90" fill="#F7F4F9" stroke="#2E4053" stroke-width="2" />
  </section>
  
  <!-- Footer -->
  <text x="50%" y="400" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">
    Created with love by [Your Name]
  </text>
  
  <!-- Arrow markers for connections -->
  <path d="M 0,200 L 20,200" stroke="#2E4053" stroke-width="2" fill="none" />
  <path d="M 380,200 L 400,200" stroke="#2E4053" stroke-width="2" fill="none" />
  <path d="M 200,0 L 200,20" stroke="#2E4053" stroke-width="2" fill="none" />
  <path d="M 200,380 L 200,400" stroke="#2E4053" stroke-width="2" fill="none" />
</svg>