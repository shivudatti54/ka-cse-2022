<svg width="420" height="400" data-topic-id="sal" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10" />
  <!-- Title -->
  <g transform="translate(20, 20)">
    <text font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F" text-anchor="left">
      SAL: Standardized Access Layer
    </text>
  </g>
  <!-- Section 1: Motivation -->
  <g transform="translate(20, 60)">
    <rect fill="#FFFFFF" width="380" height="50" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="2s" begin="0s" delay="0s" />
    <text font-size="18" font-family="Arial, sans-serif" fill="#333333" text-anchor="left">
      <tspan data-narration="What is SAL?" font-size="20" font-family="Arial, sans-serif" fill="#333333" x="10" y="30">
        SAL stands for Standardized Access Layer.
      </tspan>
      <tspan data-narration="The main motivation behind SAL is to provide a standardized interface that can be used by different applications and systems, regardless of the underlying database management system being used." font-size="18" font-family="Arial, sans-serif" fill="#333333" x="10" y="50">
        Improved Portability.
      </tspan>
    </text>
    <line x1="10" y1="0" x2="10" y2="50" stroke="#6BC2AE" stroke-width="2" />
  </g>
  <!-- Section 2: Components -->
  <g transform="translate(20, 120)">
    <rect fill="#FFFFFF" width="380" height="50" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,140" dur="2s" begin="0.5s" delay="0s" />
    <text font-size="18" font-family="Arial, sans-serif" fill="#333333" text-anchor="left">
      <tspan data-narration="Components of SAL" font-size="20" font-family="Arial, sans-serif" fill="#333333" x="10" y="130">
        SAL consists of three main components: IDL, SQL, and SAM.
      </tspan>
      <tspan data-narration="IDL is used to define the interface between the physical database and the application layer." font-size="18" font-family="Arial, sans-serif" fill="#333333" x="10" y="160">
        Interface Definition Language (IDL)
      </tspan>
      <tspan data-narration="SQL is used to define the queries that can be executed on the database." font-size="18" font-family="Arial, sans-serif" fill="#333333" x="10" y="190">
        Standardized Query Language (SQL)
      </tspan>
    </text>
    <line x1="10" y1="0" x2="10" y2="50" stroke="#6BC2AE" stroke-width="2" />
  </g>
  <!-- Section 3: Example -->
  <g transform="translate(20, 200)">
    <rect fill="#FFFFFF" width="380" height="150" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,260" dur="2s" begin="1s" delay="0s" />
    <text font-size="18" font-family="Arial, sans-serif" fill="#333333" text-anchor="left">
      <tspan data-narration="Example of SAL" font-size="20" font-family="Arial, sans-serif" fill="#333333" x="10" y="230">
        Suppose we have a database management system that supports three different access methods.
      </tspan>
      <tspan data-narration="Using SAL, we can define a standardized interface that allows applications to interact with the database using a single interface." font-size="18" font-family="Arial, sans-serif" fill="#333333" x="10" y="260">
        Improved Portability.
      </tspan>
      <tspan data-narration="For example, we can define a SQL query that can be executed on any database that supports SAL." font-size="18" font-family="Arial, sans-serif" fill="#333333" x="10" y="290">
        Standardized Query Language (SQL)
      </tspan>
    </text>
    <line x1="10" y1="0" x2="10" y2="150" stroke="#6BC2AE" stroke-width="2" />
  </g>
  <!-- Section 4: Key Benefits -->
  <g transform="translate(20, 360)">
    <rect fill="#FFFFFF" width="380" height="50" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,410" dur="2s" begin="1.5s" delay="0s" />
    <text font-size="18" font-family="Arial, sans-serif" fill="#333333" text-anchor="left">
      <tspan data-narration="Key Benefits of SAL" font-size="20" font-family="Arial, sans-serif" fill="#333333" x="10" y="390">
        SAL provides several key benefits to applications and systems.
      </tspan>
      <tspan data-narration="Improved Portability, Simplified Maintenance, and Increased Productivity are just a few of the benefits of using SAL." font-size="18" font-family="Arial, sans-serif" fill="#333333" x="10" y="420">
        Improved Portability.
      </tspan>
    </text>
    <line x1="10" y1="0" x2="10" y2="50" stroke="#6BC2AE" stroke-width="2" />
  </g>
  <!-- Footer -->
  <g transform="translate(20, 420)">
    <text font-size="18" font-family="Arial, sans-serif" fill="#333333" text-anchor="left">
      Created by [Your Name]
    </text>
  </g>
</svg>