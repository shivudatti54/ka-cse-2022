<svg width="420" height="400" data-topic-id="add-primary-key-constraint-and-not-null-constraint">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#CCC5F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="100" fill="#fff" rx="10"/>
    <text x="50" y="50" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Add Primary Key Constraint and Not Null Constraint</text>
  </g>
  <g transform="translate(150, 150)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="20" fill="#1ABC9C" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s"/>
    <text x="50" y="35" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="A primary key constraint is a unique identifier for each record in a table. It ensures that each record has a unique combination of values in its primary key fields.">Primary Key Constraint</text>
    <text x="50" y="55" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="When you create a primary key constraint, the database engine ensures that each record has a unique combination of values in its primary key fields. No two records can have the same primary key values.">Primary Key Constraint</text>
  </g>
  <g transform="translate(400, 150)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="20" fill="#1ABC9C" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s"/>
    <text x="50" y="35" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="A not null constraint specifies that a field cannot contain null values. This ensures that all records in the table have values in the specified fields.">Not Null Constraint</text>
    <text x="50" y="55" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="When you create a not null constraint, the database engine ensures that no record can have null values in the specified fields. All records must have values in the specified fields.">Not Null Constraint</text>
  </g>
  <g transform="translate(150, 350)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="20" fill="#1ABC9C" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s"/>
    <text x="50" y="35" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="To add a primary key constraint, create a new column and specify the auto-increment value.">Add Primary Key Constraint</text>
    <text x="50" y="55" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="To add a not null constraint, specify the NOT NULL keyword in the column definition.">Add Not Null Constraint</text>
  </g>
  <g transform="translate(400, 350)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="20" fill="#1ABC9C" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s"/>
    <text x="50" y="35" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="The benefits of adding primary key and not null constraints include improved data integrity and reduced data redundancy.">Benefits of Constraints</text>
    <text x="50" y="55" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="By adding primary key and not null constraints, you can ensure that your data is accurate and reliable.">Benefits of Constraints</text>
  </g>
  <g transform="translate(150, 20)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="20" fill="#1ABC9C" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s"/>
    <text x="50" y="35" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="To create a new table with primary key and not null constraints, use the following SQL statement:">Create Constraints</text>
    <text x="50" y="55" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="CREATE TABLE Employee (EmployeeID int PRIMARY KEY, FirstName varchar(50), LastName varchar(50), Salary decimal(10, 2) NOT NULL);">Create Constraints</text>
  </g>
  <g transform="translate(400, 20)">
    <rect x="0" y="0" width="200" height="100" fill="#fff" rx="10"/>
    <rect x="0" y="0" width="100" height="20" fill="#1ABC9C" rx="5"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="100 0" dur="2s" begin="0s"/>
    <text x="50" y="35" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="To modify an existing table with primary key and not null constraints, use the following SQL statement:">Modify Constraints</text>
    <text x="50" y="55" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" data-narration="ALTER TABLE Employee ADD PRIMARY KEY (EmployeeID), ALTER TABLE Employee MODIFY COLUMN Salary decimal(10, 2) NOT NULL;">Modify Constraints</text>
  </g>
  <g transform="translate(10, 380)">
    <rect x="0" y="0" width="400" height="10" fill="#fff"/>
    <text x="50" y="10" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Add Primary Key Constraint and Not Null Constraint</text>
  </g>
</svg>