<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="commission-1">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="commission-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E5F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#commission-gradient)"/>
  
  <!-- Title at top -->
  <g transform="translate(10, 10)">
    <text x="0" y="20" fill="#2F4F7F" font-size="24" font-family="Arial" text-anchor="start">Commission 1</text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="5" data-narration="Introduction to Commission"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,60" dur="1000" begin="0s" delay="0s"/>
    <text x="10" y="25" fill="#2F4F7F" font-size="16" font-family="Arial" text-anchor="start">A commission is a payment made to an individual or organization for sales or revenue generated by their efforts.</text>
  </g>
  
  <!-- Section 2: Types of Commission -->
  <g transform="translate(10, 100)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="5" data-narration="Types of Commission"/>
    <animateTransform attributeName="transform" type="translate" from="0,100" to="0,110" dur="1000" begin="0s" delay="0s"/>
    <rect x="10" y="20" width="40" height="20" fill="#F2C464" rx="5" data-narration="Percentage Commission"/>
    <text x="50" y="35" fill="#2F4F7F" font-size="16" font-family="Arial" text-anchor="start">Percentage Commission: a commission calculated as a percentage of the total sales or revenue.</text>
    <rect x="10" y="60" width="40" height="20" fill="#F2C464" rx="5" data-narration="Flat Rate Commission"/>
    <text x="50" y="75" fill="#2F4F7F" font-size="16" font-family="Arial" text-anchor="start">Flat Rate Commission: a fixed amount paid for each sale or transaction.</text>
    <rect x="10" y="100" width="40" height="20" fill="#F2C464" rx="5" data-narration="Tiered Commission"/>
    <text x="50" y="115" fill="#2F4F7F" font-size="16" font-family="Arial" text-anchor="start">Tiered Commission: a commission structure that offers different rates for different sales thresholds.</text>
  </g>
  
  <!-- Section 3: Calculation of Commission -->
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="5" data-narration="Calculation of Commission"/>
    <animateTransform attributeName="transform" type="translate" from="0,150" to="0,160" dur="1000" begin="0s" delay="0s"/>
    <rect x="10" y="20" width="40" height="20" fill="#FFC107" rx="5" data-narration="Formula: Commission = (Sales Amount * Commission Rate) / 100"/>
    <text x="50" y="35" fill="#2F4F7F" font-size="16" font-family="Arial" text-anchor="start">Example: Commission = ($1000 * 10) / 100 = $100</text>
  </g>
  
  <!-- Section 4: Benefits of Commission -->
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="5" data-narration="Benefits of Commission"/>
    <animateTransform attributeName="transform" type="translate" from="0,200" to="0,210" dur="1000" begin="0s" delay="0s"/>
    <rect x="10" y="20" width="40" height="20" fill="#34A85A" rx="5" data-narration="Motivation: Commission provides a financial incentive for salespeople to sell more, motivating them to work harder and achieve better results.</rect>
    <text x="50" y="35" fill="#2F4F7F" font-size="16" font-family="Arial" text-anchor="start">Flexibility: Commission structures can be adjusted to suit different business needs and goals.</text>
    <rect x="10" y="60" width="40" height="20" fill="#34A85A" rx="5" data-narration="Cost-Effective: Commission-based payments can reduce overhead costs associated with traditional salary structures.</rect>
  </g>
  
  <!-- Section 5: Limitations of Commission -->
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="5" data-narration="Limitations of Commission"/>
    <animateTransform attributeName="transform" type="translate" from="0,250" to="0,260" dur="1000" begin="0s" delay="0s"/>
    <rect x="10" y="20" width="40" height="20" fill="#E91E63" rx="5" data-narration="Incentive to Sell: Commission structures can create an incentive to sell more, rather than providing value to the customer.</rect>
    <text x="50" y="35" fill="#2F4F7F" font-size="16" font-family="Arial" text-anchor="start">Inequitable Distribution: Commission rates can be unevenly distributed among salespeople, leading to resentment and decreased motivation.</text>
    <rect x="10" y="60" width="40" height="20" fill="#E91E63" rx="5" data-narration="Complexity: Commission structures can be complex and difficult to manage, particularly for larger organizations.</rect>
  </g>
  
  <!-- Footer at bottom -->
  <g transform="translate(10, 300)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="5" data-narration="Conclusion"/>
    <animateTransform attributeName="transform" type="translate" from="0,300" to="0,310" dur="1000" begin="0s" delay="0s"/>
    <text x="10" y="25" fill="#2F4F7F" font-size="16" font-family="Arial" text-anchor="start">Commission 1: An educational diagram on commission, a calculation based on a percentage of the total sales or revenue of an item.</text>
  </g>
  
  <!-- Arrow markers for connections -->
  <path d="M 10,50 L 30,60" fill="none" stroke-width="2" stroke="#2F4F7F"/>
  <path d="M 10,100 L 30,110" fill="none" stroke-width="2" stroke="#2F4F7F"/>
  <path d="M 10,150 L 30,160" fill="none" stroke-width="2" stroke="#2F4F7F"/>
  <path d="M 10,200 L 30,210" fill="none" stroke-width="2" stroke="#2F4F7F"/>
  <path d="M 10,250 L 30,260" fill="none" stroke-width="2" stroke="#2F4F7F"/>
  <path d="M 10,300 L 30,310" fill="none" stroke-width="2" stroke="#2F4F7F"/>
</svg>