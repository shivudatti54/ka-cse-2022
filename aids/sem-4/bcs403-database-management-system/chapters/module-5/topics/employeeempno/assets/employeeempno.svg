<svg width="420" height="400" data-topic-id="employee-empno" data-narration="employee-empno-narration">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#C7E5F5"/>
    </linearGradient>
    <style>
      .title {
        font-size: 24px;
        font-weight: bold;
        color: #5867DB;
        margin-bottom: 20px;
      }
      .footer {
        font-size: 14px;
        color: #7F8C8D;
        text-align: center;
        margin-top: 20px;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#pastel-gradient)"/>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100" height="50" style="fill: #F7F7F7; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)"/>
    <text class="title" x="50" y="20">Employee (EMPNO)</text>
    <text data-narration="employee-empno-narration" x="50" y="60">What is EMPNO?</text>
    <rect x="0" y="70" width="100" height="50" style="fill: #F7F7F7; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)"/>
    <text class="title" x="50" y="90">Key Characteristics of EMPNO</text>
    <g transform="translate(0, 120)">
      <circle cx="50" cy="50" r="20" style="fill: #3498DB; stroke: #F7F7F7; stroke-width: 2"/>
      <text x="40" y="60">Unique identifier</text>
      <line x1="50" y1="50" x2="60" y2="50" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="60">Assigned by the organization</text>
      <line x1="50" y1="50" x2="40" y2="60" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="40" y="60">Used as a reference number</text>
      <line x1="50" y1="50" x2="60" y2="70" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="70">Must be unique for each employee</text>
    </g>
    <rect x="0" y="220" width="100" height="50" style="fill: #F7F7F7; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)"/>
    <text class="title" x="50" y="240">Designing the Employee (EMPNO) Table</text>
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="100" height="50" style="fill: #F7F7F7; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)"/>
      <text x="40" y="20">Columns:</text>
      <line x1="50" y1="40" x2="60" y2="60" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="60">EMPNO: Integer</text>
      <line x1="50" y1="40" x2="40" y2="60" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="40" y="60">EmployeeName: Varchar</text>
      <line x1="50" y1="40" x2="60" y2="80" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="80">Department: Varchar</text>
      <line x1="50" y1="40" x2="60" y2="100" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="100">JobTitle: Varchar</text>
      <line x1="50" y1="40" x2="60" y2="120" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="120">Salary: Decimal</text>
      <line x1="50" y1="40" x2="60" y2="140" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="140">HireDate: Date</text>
      <line x1="50" y1="40" x2="40" y2="160" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="40" y="160">Primary Key (EMPNO):</text>
      <line x1="50" y1="80" x2="60" y2="100" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="100">Foreign Key (Department):</text>
    </g>
    <rect x="0" y="330" width="100" height="50" style="fill: #F7F7F7; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)"/>
    <text class="title" x="50" y="350">Normalization of the Employee (EMPNO) Table</text>
    <g transform="translate(0, 400)">
      <rect x="0" y="0" width="100" height="50" style="fill: #F7F7F7; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)"/>
      <text x="40" y="20">Normalization is the process of organizing and structuring data in a database to minimize data redundancy</text>
      <line x1="50" y1="40" x2="60" y2="60" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="60">Requirements:</text>
      <line x1="50" y1="40" x2="40" y2="60" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="40" y="60">1. SVG dimensions: width="420" height="400"</text>
      <line x1="50" y1="40" x2="60" y2="80" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="80">2. Include data-topic-id attribute with slugified topic name</text>
      <line x1="50" y1="40" x2="60" y2="100" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="100">3. Use gradient background with pastel colors</text>
      <line x1="50" y1="40" x2="60" y2="120" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="120">4. Include 4-6 sections with data-narration attributes explaining each part</text>
      <line x1="50" y1="40" x2="60" y2="140" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="140">5. Add smooth animations using <animate> elements with sequential begin times</text>
      <line x1="50" y1="40" x2="60" y2="160" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="160">6. Use professional color scheme (indigo, teal, orange accents)</text>
      <line x1="50" y1="40" x2="60" y2="180" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="180">7. Include clear labels and annotations</text>
      <line x1="50" y1="40" x2="60" y2="200" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="200">8. Add arrow markers for connections</text>
      <line x1="50" y1="40" x2="60" y2="220" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="220">9. Include a title at top and footer at bottom</text>
      <line x1="50" y1="40" x2="60" y2="240" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="240">10. Make it educational and visually clear</text>
    </g>
    <g transform="translate(0, 410)">
      <rect x="0" y="0" width="100" height="50" style="fill: #F7F7F7; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1)"/>
      <text x="40" y="20">Title: Employee (EMPNO)</text>
      <line x1="50" y1="40" x2="60" y2="60" style="stroke: #3498DB; stroke-width: 2"/>
      <text x="50" y="60">Footer: <text data-narration="employee-empno-narration">Employee (EMPNO) Study Material</text></text>
    </g>
  </g>
</svg>