<svg width="420" height="400" data-topic-id="Insert-Any-Five-Records-into-The-Table" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%" rx="10"/>
  <g transform="translate(10, 50)">
    <rect fill="#3498db" width="80" height="20" rx="5" transform="rotate(45 10 10)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">Insert Records</text>
  </g>
  <g transform="translate(10, 80)">
    <rect fill="#2ecc71" width="80" height="20" rx="5" transform="rotate(45 10 10)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">A Table is a Collection of Related Data</text>
  </g>
  <g transform="translate(10, 130)">
    <rect fill="#e74c3c" width="80" height="20" rx="5" transform="rotate(45 10 10)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">A Record is a Single Row in a Table</text>
    <animate attributeName="opacity" from="1" to="0" dur="3000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 180)">
    <rect fill="#9b59b6" width="80" height="20" rx="5" transform="rotate(45 10 10)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">To Insert a Record into a Table, You Need to Provide Values for Each Column</text>
    <animate attributeName="opacity" from="1" to="0" dur="3000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 230)">
    <rect fill="#2ecc71" width="80" height="20" rx="5" transform="rotate(45 10 10)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">The Number of Values You Provide Must Match the Number of Columns in the Table</text>
    <animate attributeName="opacity" from="1" to="0" dur="3000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 280)">
    <rect fill="#e74c3c" width="80" height="20" rx="5" transform="rotate(45 10 10)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">Example: Inserting Records into a Table</text>
    <animate attributeName="opacity" from="1" to="0" dur="3000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 330)">
    <rect fill="#9b59b6" width="80" height="20" rx="5" transform="rotate(45 10 10)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">Suppose We Have a Table Called "Employees" with the Following Columns</text>
    <animate attributeName="opacity" from="1" to="0" dur="3000" repeatCount="indefinite"/>
    <rect x="10" y="50" width="200" height="10" rx="5" fill="#ffffff" transform="rotate(45 10 10)"/>
    <text x="10" y="55" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| Column Name | Data Type      |</text>
    <text x="10" y="65" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| Employee ID | int            |</text>
    <rect x="10" y="85" width="80" height="10" rx="5" fill="#ffffff" transform="rotate(45 10 10)"/>
    <text x="10" y="90" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| Name        | varchar(50)    |</text>
    <rect x="10" y="110" width="80" height="10" rx="5" fill="#ffffff" transform="rotate(45 10 10)"/>
    <text x="10" y="115" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| Department  | varchar(50)    |</text>
    <rect x="10" y="125" width="80" height="10" rx="5" fill="#ffffff" transform="rotate(45 10 10)"/>
    <text x="10" y="130" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| Salary      | decimal(10, 2) |</text>
    <rect x="10" y="150" width="80" height="10" rx="5" fill="#ffffff" transform="rotate(45 10 10)"/>
    <text x="10" y="155" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| 1           | John Doe      |</text>
    <text x="10" y="165" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| 2           | Jane Smith    |</text>
    <text x="10" y="175" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| 3           | Bob Brown     |</text>
    <text x="10" y="185" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| 4           | Alice Johnson |</text>
    <text x="10" y="195" font-size="16" font-family="Arial" fill="#000000" text-anchor="middle">| 5           | Mike Davis    |</text>
  </g>
  <g transform="translate(10, 380)">
    <rect fill="#2ecc71" width="80" height="20" rx="5" transform="rotate(45 10 10)"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">SQL Statement Used for Inserting Records</text>
    <animate attributeName="opacity" from="1" to="0" dur="3000" repeatCount="indefinite"/>
  </g>
</svg>