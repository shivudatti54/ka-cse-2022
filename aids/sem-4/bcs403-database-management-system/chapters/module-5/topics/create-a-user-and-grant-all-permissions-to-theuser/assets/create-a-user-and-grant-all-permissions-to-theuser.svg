<svg width="420" height="400" data-topic-id="create-a-user-and-grant-all-permissions-to-the-user" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A9BE5"/>
      <stop offset="100%" stop-color="#4583E5"/>
    </linearGradient>
  </defs>
  <style>
    .section {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #F7F7F7;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .section[data-narration="introduction"] {
      background-color: #7A9BE5;
    }
    .section[data-narration="defining-a-user"] {
      background-color: #F7DC6F;
    }
    .section[data-narration="granting-permissions"] {
      background-color: #FFC107;
    }
    .section[data-narration="example-scenario"] {
      background-color: #4CAF50;
    }
    .section[data-narration="best-practices"] {
      background-color: #3F51B5;
    }
  </style>
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="400" height="370" rx="10" fill="url(#gradient1)"/>
    <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start">Create a User and Grant All Permissions to the User</text>
    <g>
      <rect x="0" y="50" width="100%" height="20" rx="10" fill="#FFFFFF"/>
      <text x="10" y="55" font-size="18" font-family="Arial" text-anchor="start">Introduction</text>
      <text x="10" y="70" font-size="16" font-family="Arial" text-anchor="start" data-narration="introduction">In a database management system (DBMS), a user is an entity that interacts with the database to perform various operations such as creating, reading, updating, and deleting (CRUD) data.</text>
    </g>
    <g>
      <rect x="0" y="100" width="100%" height="20" rx="10" fill="#FFFFFF"/>
      <text x="10" y="105" font-size="18" font-family="Arial" text-anchor="start">Defining a User</text>
      <text x="10" y="120" font-size="16" font-family="Arial" text-anchor="start" data-narration="defining-a-user">A user is an entity that is identified by a unique username and password. The user is associated with a specific database and has access to a set of permissions that determine what actions they can perform on the database.</text>
    </g>
    <g>
      <rect x="0" y="150" width="100%" height="20" rx="10" fill="#FFFFFF"/>
      <text x="10" y="155" font-size="18" font-family="Arial" text-anchor="start">Granting Permissions</text>
      <text x="10" y="170" font-size="16" font-family="Arial" text-anchor="start" data-narration="granting-permissions">Permissions are the rights to perform specific actions on a database. To grant permissions to a user, administrators use the GRANT statement in SQL.</text>
    </g>
    <g>
      <rect x="0" y="200" width="100%" height="20" rx="10" fill="#FFFFFF"/>
      <text x="10" y="205" font-size="18" font-family="Arial" text-anchor="start">Example Scenario</text>
      <text x="10" y="220" font-size="16" font-family="Arial" text-anchor="start" data-narration="example-scenario">For example, if we want to grant all permissions to a user, we can use the GRANT ALL PRIVILEGES statement.</text>
    </g>
    <g>
      <rect x="0" y="250" width="100%" height="20" rx="10" fill="#FFFFFF"/>
      <text x="10" y="255" font-size="18" font-family="Arial" text-anchor="start">Best Practices</text>
      <text x="10" y="270" font-size="16" font-family="Arial" text-anchor="start" data-narration="best-practices">It is recommended to grant permissions on a need-to-know basis and to regularly review and update user permissions to ensure security and compliance.</text>
    </g>
    <circle cx="210" cy="10" r="10" fill="#4CAF50" stroke="#FFFFFF" stroke-width="2"/>
    <g>
      <path d="M 210 10 Q 220 10 220 20 210 30 200 30 200 10 210 10" fill="#FFFFFF" stroke="#000" stroke-width="1"/>
      <line x1="210" y1="10" x2="210" y2="320" stroke="#000" stroke-width="2"/>
      <line x1="210" y1="320" x2="230" y2="320" stroke="#000" stroke-width="2"/>
      <line x1="230" y1="320" x2="230" y2="10" stroke="#000" stroke-width="2"/>
    </g>
  </g>
  <g transform="translate(10, 380)">
    <text x="10" y="390" font-size="18" font-family="Arial" text-anchor="start"> Created with Love by <a href="https://www.example.com">Example</a></text>
  </g>
</svg>