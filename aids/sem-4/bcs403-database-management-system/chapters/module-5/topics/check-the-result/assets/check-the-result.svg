<svg width="420" height="400" data-topic-id="check-the-result">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7D2C4" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title -->
  <text x="180" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Check the Result
  </text>
  
  <!-- Section 1: Introduction -->
  <rect x="10" y="60" width="400" height="100" fill="#f7f7f7" rx="10" data-narration="Introduction">
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666">
      In a Database Management System (DBMS), checking the result of a query is an essential operation.
    </text>
  </rect>
  <animate transform="translateY(0) translateX(-20)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 2: What is Checking the Result? -->
  <rect x="10" y="170" width="400" height="100" fill="#f7f7f7" rx="10" data-narration="What is Checking the Result?">
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666">
      Checking the result refers to the process of verifying the accuracy of the data retrieved from a database.
    </text>
  </rect>
  <animate transform="translateY(0) translateX(20)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 3: Importance of Checking the Result -->
  <rect x="10" y="260" width="400" height="100" fill="#f7f7f7" rx="10" data-narration="Importance of Checking the Result">
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666">
      Checking the result is crucial in a DBMS because it ensures data accuracy and reliability.
    </text>
  </rect>
  <animate transform="translateY(0) translateX(40)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 4: Techniques for Checking the Result -->
  <rect x="10" y="350" width="400" height="100" fill="#f7f7f7" rx="10" data-narration="Techniques for Checking the Result">
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666">
      Techniques for checking the result include error detection and correction, and data validation.
    </text>
  </rect>
  <animate transform="translateY(0) translateX(60)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 5: Error Detection and Correction -->
  <rect x="10" y="430" width="400" height="100" fill="#f7f7f7" rx="10" data-narration="Error Detection and Correction">
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666">
      Error detection and correction techniques include checksum and cyclic redundancy check.
    </text>
  </rect>
  <animate transform="translateY(0) translateX(80)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 6: Data Validation -->
  <rect x="10" y="510" width="400" height="100" fill="#f7f7f7" rx="10" data-narration="Data Validation">
    <text x="20" y="80" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#666">
      Data validation involves checking the retrieved data against a set of predefined rules and constraints.
    </text>
  </rect>
  <animate transform="translateY(0) translateX(100)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Footer -->
  <text x="180" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Developed by [Your Name]
  </text>
</svg>