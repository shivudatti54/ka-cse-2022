<svg width="420" height="400" data-topic-id="add-column-commission-with-domain-to-employee">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id=" gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(# gradient-background)"/>
  
  <!-- Title Section -->
  <section data-narration="title" style="text-align: center;">
    <h1>Add A Column Commission With Domain To The Employee</h1>
  </section>
  
  <!-- Why is Commission Important? Section -->
  <section data-narration="why-commission-important" style="margin-bottom: 20px;">
    <h2>Why is Commission Important?</h2>
    <p>Commission is a crucial aspect of employee compensation that can vary based on performance, experience, and other factors.</p>
  </section>
  
  <!-- Creating a New Column: Commission Section -->
  <section data-narration="creating-new-column-commission" style="margin-bottom: 20px;">
    <h2>Creating a New Column: Commission</h2>
    <p>The Commission column should be a decimal data type to store commission rates and amounts.</p>
    <p>For example, we can choose a suitable data type, such as `DECIMAL(10, 2)`, to accommodate a wide range of values.</p>
  </section>
  
  <!-- Defining the Domain Section -->
  <section data-narration="defining-domain" style="margin-bottom: 20px;">
    <h2>Defining the Domain</h2>
    <p>A domain defines the set of allowed values for a column.</p>
    <p>In this case, the Commission domain should include all possible commission rates and amounts.</p>
    <pre>
      <code>
        CREATE DOMAIN commission_domain AS
          CHECK (value BETWEEN 0 AND 100);
      </code>
    </pre>
  </section>
  
  <!-- Updating Existing Data Section -->
  <section data-narration="updating-existing-data" style="margin-bottom: 20px;">
    <h2>Updating Existing Data</h2>
    <p>We need to update the existing data in the Employee table.</p>
    <pre>
      <code>
        UPDATE Employee
          SET Commission = Commission \* (rate / 100);
      </code>
    </pre>
  </section>
  
  <!-- Animation Section -->
  <section data-narration="animation">
    <rect x="0" y="0" width="420" height="400" fill="#87CEEB" style="opacity: 0"/>
    <animate transform="rotate(360 190 190)" duration="10s" begin="0s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer Section -->
  <footer style="text-align: center; padding: 20px; background-color: #C7B8EA;">
    <p>&copy; 2023</p>
  </footer>
</svg>