<svg width="420" height="400" data-topic-id="create-a-table-called-employee-that-contain-attr">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title at top -->
  <g transform="translate(20 20)">
    <text x="0" y="20" font-size="24" font-family="Arial" font-weight="bold" fill="#2E4053">
      Creating a Table in a Database
    </text>
  </g>
  
  <!-- Section 1: What is a Table? -->
  <g transform="translate(50 100)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="10" stroke="#2E4053" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,100" to="0,150" dur="1s" begin=".5s"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#2E4053" data-narration="What is a Table?">
      A table is a collection of related data that is organized into rows and columns.
    </text>
  </g>
  
  <!-- Section 2: Table Attributes -->
  <g transform="translate(50 200)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="10" stroke="#2E4053" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,200" to="0,250" dur="1s" begin=".5s"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Table Attributes">
      A table attribute, also known as a field or column, is a single column in a table that contains data.
    </text>
  </g>
  
  <!-- Section 3: Creating a Table -->
  <g transform="translate(50 300)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="10" stroke="#2E4053" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,300" to="0,350" dur="1s" begin=".5s"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Creating a Table">
      To create a table, you need to define the attributes of the table and specify the data type of each attribute.
    </text>
  </g>
  
  <!-- Section 4: Employee Table -->
  <g transform="translate(50 400)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="10" stroke="#2E4053" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,400" to="0,450" dur="1s" begin=".5s"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Employee Table">
      Let's create an example table called "Employee" that contains the attribute "EMPNO".
    </text>
  </g>
  
  <!-- Section 5: Table Definition -->
  <g transform="translate(50 500)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="10" stroke="#2E4053" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,500" to="0,550" dur="1s" begin=".5s"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Table Definition">
      The table definition includes the table name, attributes, and data type.
    </text>
  </g>
  
  <!-- Section 6: Create the Table -->
  <g transform="translate(50 600)">
    <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="10" stroke="#2E4053" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,600" to="0,650" dur="1s" begin=".5s"/>
    <text x="10" y="25" font-size="18" font-family="Arial" fill="#2E4053" data-narration="Create the Table">
      To create the table, you need to define the table name, attributes, and data type, and then create the table in the database.
    </text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(20 700)">
    <text x="0" y="20" font-size="18" font-family="Arial" fill="#2E4053">
      Created by [Your Name]
    </text>
  </g>
</svg>