<svg width="420" height="400" data-topic-id="And-Instances">
  <title>Spot Instances in Cloud Computing</title>
  <desc>And Instances Diagram</desc>

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4C76FF" stop-opacity=".4" />
      <stop offset="50%" stop-color="#87CEEB" stop-opacity=".8" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity=".4" />
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <text x="20" y="20" font-size="18" font-family="Arial, sans-serif" fill="#333333" text-anchor="middle">And Instances</text>

  <!-- Section 1: What are Spot Instances? -->
  <section id="section1" data-narration="What are Spot Instances?">
    <rect x="10" y="50" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="60" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Definition</text>
    <text x="120" y="60" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">Spot Instances are unused EC2 capacity offered at up to 90% discount compared to On-Demand prices.</text>
  </section>

  <!-- Section 2: How Spot Instances Work -->
  <section id="section2" data-narration="How Spot Instances Work">
    <rect x="10" y="90" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="100" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Process</text>
    <text x="120" y="100" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">1. You request instances at current spot price<br>2. AWS provides instances while capacity available<br>3. If capacity needed, AWS sends 2-minute warning<br>4. Instance is terminated (you only pay for used time).</text>
  </section>

  <!-- Section 3: Pricing Model -->
  <section id="section3" data-narration="Pricing Model">
    <rect x="10" y="130" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="140" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Pricing</text>
    <rect x="10" y="160" width="190" height="20" fill="#87CEEB" rx="10" />
    <text x="120" y="170" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">|</text>
    <rect x="220" y="160" width="190" height="20" fill="#87CEEB" rx="10" />
    <text x="340" y="170" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">|</text>
    <rect x="10" y="200" width="190" height="20" fill="#87CEEB" rx="10" />
    <text x="120" y="210" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">On-Demand</text>
    <text x="340" y="210" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">80% </text>
    <rect x="10" y="230" width="190" height="20" fill="#87CEEB" rx="10" />
    <text x="120" y="240" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Reserved</text>
    <text x="340" y="240" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">40-72% </text>
    <rect x="10" y="260" width="190" height="20" fill="#87CEEB" rx="10" />
    <text x="120" y="270" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Spot</text>
    <text x="340" y="270" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">60-90% </text>
  </section>

  <!-- Section 4: Price Fluctuation -->
  <section id="section4" data-narration="Price Fluctuation">
    <rect x="10" y="300" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="310" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Fluctuations</text>
    <rect x="10" y="330" width="190" height="20" fill="#87CEEB" rx="10" />
    <text x="120" y="340" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Supply/Demand</text>
    <text x="340" y="340" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end"></text>
    <rect x="10" y="360" width="190" height="20" fill="#87CEEB" rx="10" />
    <text x="120" y="370" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">No Bidding</text>
    <text x="340" y="370" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">Current Spot Price</text>
  </section>

  <!-- Section 5: Spot Instance Best Practices -->
  <section id="section5" data-narration="Spot Instance Best Practices">
    <rect x="10" y="410" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="420" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Design for Interruption</text>
    <rect x="10" y="450" width="150" height="20" fill="#87CEEB" rx="10" />
    <text x="30" y="460" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Save State</text>
    <text x="170" y="460" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">Periodically</text>
    <rect x="10" y="480" width="150" height="20" fill="#87CEEB" rx="10" />
    <text x="30" y="490" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Checkpointing</text>
    <text x="170" y="490" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">for Long Jobs</text>
  </section>

  <!-- Section 6: Diversify Instance Types -->
  <section id="section6" data-narration="Diversify Instance Types">
    <rect x="10" y="530" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="540" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Diversify</text>
    <rect x="10" y="570" width="150" height="20" fill="#87CEEB" rx="10" />
    <text x="30" y="580" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Instance Types</text>
    <text x="170" y="580" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">Use Multiple</text>
    <rect x="10" y="600" width="150" height="20" fill="#87CEEB" rx="10" />
    <text x="30" y="610" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">AZs</text>
    <text x="170" y="610" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">Use Multiple AZs</text>
  </section>

  <!-- Section 7: Mixed Instances Strategy -->
  <section id="section7" data-narration="Mixed Instances Strategy">
    <rect x="10" y="650" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="660" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Mixed Instances</text>
    <rect x="10" y="690" width="150" height="20" fill="#87CEEB" rx="10" />
    <text x="30" y="700" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Base Capacity</text>
    <text x="170" y="700" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">On-Demand</text>
    <rect x="10" y="720" width="150" height="20" fill="#87CEEB" rx="10" />
    <text x="30" y="730" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Scaling Capacity</text>
    <text x="170" y="730" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">Spot</text>
  </section>

  <!-- Section 8: Use Cases -->
  <section id="section8" data-narration="Use Cases">
    <rect x="10" y="770" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="780" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Batch Processing</text>
    <rect x="10" y="810" width="150" height="20" fill="#87CEEB" rx="10" />
    <text x="30" y="820" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Big Data Analytics</text>
    <text x="170" y="820" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">EMR, Spark</text>
  </section>

  <!-- Section 9: Handling Interruptions -->
  <section id="section9" data-narration="Handling Interruptions">
    <rect x="10" y="860" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="20" y="870" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">Termination Notice</text>
    <rect x="10" y="900" width="150" height="20" fill="#87CEEB" rx="10" />
    <text x="30" y="910" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">AWS Provides 2-Minute Warning</text>
    <text x="170" y="910" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="end">via Instance Metadata Service</text>
  </section>

  <!-- Footer -->
  <text x="10" y="1030" font-size="14" font-family="Arial, sans-serif" fill="#333333" text-anchor="start">And Instances Diagram</text>
</svg>