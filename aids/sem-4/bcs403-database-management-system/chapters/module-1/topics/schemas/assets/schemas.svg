<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg"
     data-topic-id="schemas" data-slugified-name="Schemas">
    <defs>
        <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="1" stop-color="#C5CAE9" stop-opacity="1"/>
        </linearGradient>
        <style>
            .section {
                margin-bottom: 20px;
            }
        </style>
    </defs>

    <title>Schemas</title>

    <rect x="10" y="10" width="400" height="30" fill="#2E4053" rx="5"/>
    <text x="15" y="40" font-size="24" fill="#fff" text-anchor="start">Schemas</text>

    <rect x="10" y="70" width="400" height="120" fill="url(#pastel-gradient)"/>
    <text x="15" y="90" font-size="18" fill="#fff" text-anchor="start">What is a Schema?</text>
    <section data-narration="Introduction to Schemas">
        <rect x="10" y="110" width="400" height="60" fill="#2E4053" rx="5"/>
        <text x="15" y="130" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">A schema is a conceptual representation of a database.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" begin="0s"/>
    </section>

    <rect x="10" y="180" width="400" height="120" fill="url(#pastel-gradient)"/>
    <text x="15" y="200" font-size="18" fill="#fff" text-anchor="start">Types of Schemas</text>
    <section data-narration="Types of Schemas">
        <rect x="10" y="220" width="400" height="60" fill="#2E4053" rx="5"/>
        <text x="15" y="240" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">There are two main types of schemas: physical and logical.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" begin="0s"/>
    </section>

    <rect x="10" y="280" width="400" height="120" fill="url(#pastel-gradient)"/>
    <text x="15" y="300" font-size="18" fill="#fff" text-anchor="start">Creating a Schema</text>
    <section data-narration="Creating a Schema">
        <rect x="10" y="330" width="400" height="60" fill="#2E4053" rx="5"/>
        <text x="15" y="350" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">To create a schema, you need to define entities and attributes, create tables, define relationships, specify attributes and data types, and define primary and foreign keys.</text>
        <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="2s" begin="0s"/>
    </section>

    <rect x="10" y="390" width="400" height="60" fill="#2E4053" rx="5"/>
    <text x="15" y="410" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">Example of a Schema</text>
    <section data-narration="Example of a Schema">
        <rect x="10" y="430" width="400" height="60" fill="#2E4053" rx="5"/>
        <text x="15" y="450" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">Consider a simple database for a university that stores information about students, courses, and grades.</text>
        <rect x="20" y="470" width="10" height="10" fill="#0E81A5" rx="2"/>
        <rect x="40" y="470" width="10" height="10" fill="#0E81A5" rx="2"/>
        <rect x="60" y="470" width="10" height="10" fill="#0E81A5" rx="2"/>
        <text x="70" y="490" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">
            - students (table)
            - courses (table)
            - grades (table)
        </text>
    </section>

    <rect x="10" y="530" width="400" height="60" fill="#2E4053" rx="5"/>
    <text x="15" y="550" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">Relationships</text>
    <section data-narration="Relationships">
        <rect x="10" y="580" width="400" height="60" fill="#2E4053" rx="5"/>
        <text x="15" y="600" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">
            A student can take many courses (one-to-many) and a course can have m
        </text>
        <rect x="20" y="620" width="10" height="10" fill="#0E81A5" rx="2"/>
        <rect x="40" y="620" width="10" height="10" fill="#0E81A5" rx="2"/>
        <rect x="60" y="620" width="10" height="10" fill="#0E81A5" rx="2"/>
    </section>

    <rect x="10" y="690" width="400" height="60" fill="#2E4053" rx="5"/>
    <text x="15" y="710" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">Conclusion</text>
    <section data-narration="Conclusion">
        <rect x="10" y="750" width="400" height="60" fill="#2E4053" rx="5"/>
        <text x="15" y="770" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">
            Schemas are an essential part of database management systems, allowing for a conceptual representation of a database and making it easier to understand, create, and maintain the database.
        </text>
    </section>

    <footer>
        <text x="15" y="390" font-size="16" fill="#fff" text-anchor="start" font-family="Arial, sans-serif">
            Created by <a href="https://www.example.com">Example</a>
        </text>
    </footer>
</svg>