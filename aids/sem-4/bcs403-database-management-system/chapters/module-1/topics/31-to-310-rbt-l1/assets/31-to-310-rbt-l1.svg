<svg
    width="420"
    height="400"
    viewBox="0 0 420 400"
    data-topic-id="dms-l1-310-rbt"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    style="background-image: linear-gradient(to bottom, #7b8fa7, #93a5ff); font-family: Arial; font-size: 12pt; color: #fff;">
    <title>Database Management System (DBMS)</title>
    <footer>Data Topic ID: dms-l1-310-rbt</footer>
    <defs>
        <style>
            .section {
                background-color: #f0f0f0;
                padding: 20px;
                margin-bottom: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
        </style>
    </defs>
    <g>
        <rect x="10" y="10" width="400" height="20" rx="5" style="fill: #fff;" />
        <text x="15" y="30" text-anchor="start" font-size="18pt" font-weight="bold">Database Management System (DBMS)</text>
        <rect x="10" y="60" width="400" height="100" rx="5" style="fill: #f0f0f0;" />
        <section data-narration="What is a Database Management System (DBMS)?" style="transform: translateX(0);">
            <text x="20" y="70" font-size="14pt" font-weight="normal">A Database Management System (DBMS) is a software system that allows organizations to store, manage, and retrieve data in a structured and controlled manner.</text>
            <animate transform="translateX(100px)" begin="0s" dur="2s" repeat="forever" />
        </section>
        <section data-narration="Key Features of DBMS" style="transform: translateX(200px);">
            <text x="20" y="70" font-size="14pt" font-weight="normal">Key Features of DBMS:</text>
            <rect x="10" y="100" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="120" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="140" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="160" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="180" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="200" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <text x="20" y="150" font-size="14pt" font-weight="normal">
                Data Storage: Provides a secure and efficient way to store data.
                Data Retrieval: Allows users to access and retrieve data as needed.
                Data Manipulation: Enables users to modify and update data.
                Data Integrity: Ensures that data is accurate, complete, and consistent.
                Data Security: Protects data from unauthorized access and tampering.
            </text>
            <animate transform="translateX(100px)" begin="0s" dur="2s" repeat="forever" />
        </section>
        <section data-narration="Database Management System (DBMS) Components" style="transform: translateX(400px);">
            <text x="20" y="70" font-size="14pt" font-weight="normal">Database Management System (DBMS) Components:</text>
            <rect x="10" y="100" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="120" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="140" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="160" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="180" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <rect x="10" y="200" width="380" height="50" rx="5" style="fill: #f0f0f0;" />
            <text x="20" y="150" font-size="14pt" font-weight="normal">
                Database: A collection of organized data that is stored in a structured format.
                Database Management System (DBMS): The software system that manages a database.
                Database Users: Individuals who interact with a database.
            </text>
            <animate transform="translateX(100px)" begin="0s" dur="2s" repeat="forever" />
        </section>
        <section data-narration="Conclusion" style="transform: translateX(600px);">
            <text x="20" y="70" font-size="14pt" font-weight="normal">Conclusion:</text>
            <text x="20" y="90" font-size="14pt" font-weight="normal">A Database Management System (DBMS) is a crucial tool for organizations to manage their data effectively.</text>
            <animate transform="translateX(100px)" begin="0s" dur="2s" repeat="forever" />
        </section>
    </g>
</svg>