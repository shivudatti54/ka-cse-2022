<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:svg="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="420" height="400" rx="10" />
  
  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="left" fill="#3498db">
    Conceptual Data Modelling
  </text>
  
  <!-- Section 1: Entity Types and Entity Sets -->
  <section id="entity-types-and-entity-sets" data-narration="Entities and Relationships Introduction">
    <rect x="10" y="50" width="400" height="100" rx="10" fill="#fff" />
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Entity Types and Entity Sets
    </text>
    <rect x="20" y="90" width="380" height="20" rx="5" fill="#fff" />
    <text x="10" y="110" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      An entity type is a type of entity that has its own identity, and an entity set is an instance of an entity type.
    </text>
    <text x="10" y="130" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      <a href="#" data-topic-id="entity-types-and-entity-sets">Learn More</a>
    </text>
  </section>
  
  <!-- Section 2: Characteristics -->
  <section id="characteristics" data-narration="Entities and Relationships Characteristics">
    <rect x="10" y="150" width="400" height="100" rx="10" fill="#fff" />
    <text x="20" y="170" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Characteristics
    </text>
    <rect x="20" y="190" width="380" height="20" rx="5" fill="#fff" />
    <text x="10" y="210" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Entity types have a name, an identity, and attributes. Entity sets have a unique identifier and attributes.
    </text>
    <text x="10" y="230" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      <a href="#" data-topic-id="characteristics">Learn More</a>
    </text>
  </section>
  
  <!-- Section 3: Structural Constraints -->
  <section id="structural-constraints" data-narration="Structural Constraints Introduction">
    <rect x="10" y="250" width="400" height="100" rx="10" fill="#fff" />
    <text x="20" y="270" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Structural Constraints
    </text>
    <rect x="20" y="290" width="380" height="20" rx="5" fill="#fff" />
    <text x="10" y="310" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Structural constraints define how entities and relationships interact with each other.
    </text>
    <text x="10" y="330" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      <a href="#" data-topic-id="structural-constraints">Learn More</a>
    </text>
  </section>
  
  <!-- Section 4: Weak Entity Types -->
  <section id="weak-entity-types" data-narration="Weak Entity Types Introduction">
    <rect x="10" y="350" width="400" height="100" rx="10" fill="#fff" />
    <text x="20" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Weak Entity Types
    </text>
    <rect x="20" y="390" width="380" height="20" rx="5" fill="#fff" />
    <text x="10" y="410" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Weak entity types have a dependent relationship with a strong entity type and an identifier that depends on the strong entity type's identifier.
    </text>
    <text x="10" y="430" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      <a href="#" data-topic-id="weak-entity-types">Learn More</a>
    </text>
  </section>
  
  <!-- Section 5: ER Diagrams -->
  <section id="er-diagrams" data-narration="Entity-Relationship Diagrams Introduction">
    <rect x="10" y="450" width="400" height="100" rx="10" fill="#fff" />
    <text x="20" y="470" font-size="18" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      Entity-Relationship Diagrams
    </text>
    <rect x="20" y="490" width="380" height="20" rx="5" fill="#fff" />
    <text x="10" y="510" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      ER diagrams are visual representations of the relationships between entities and their attributes.
    </text>
    <text x="10" y="530" font-size="16" font-family="Arial, sans-serif" text-anchor="left" fill="#333">
      <a href="#" data-topic-id="er-diagrams">Learn More</a>
    </text>
  </section>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="14" font-family="Arial, sans-serif" text-anchor="left" fill="#666">
    &copy; 2023
  </text>
</svg>