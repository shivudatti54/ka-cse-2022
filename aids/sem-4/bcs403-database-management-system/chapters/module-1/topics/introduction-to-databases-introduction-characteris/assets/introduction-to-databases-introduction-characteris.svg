<svg width="420" height="400" data-topic-id="introduction-to-databases-characteristics">
  <title>Introduction to Databases: Key Characteristics</title>
  <footer>Learn about the key characteristics of databases and their importance in data management.</footer>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a8fd6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2f4f7f" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#333">Data Storage</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="1s" begin="0s" repeatCount="indefinite"/>
    <animate xlink:href="#animate-1" begin="0s" dur="1s" repeatCount="indefinite"/>
    <rect x="110" y="0" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="120" y="10" font-size="18" font-family="Arial" fill="#333">Data Manipulation</text>
    <animate xlink:href="#animate-2" begin="1s" dur="1s" repeatCount="indefinite"/>
    <rect x="220" y="0" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="230" y="10" font-size="18" font-family="Arial" fill="#333">Data Retrieval</text>
    <animate xlink:href="#animate-3" begin="2s" dur="1s" repeatCount="indefinite"/>
    <rect x="320" y="0" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="330" y="10" font-size="18" font-family="Arial" fill="#333">Data Security</text>
    <animate xlink:href="#animate-4" begin="3s" dur="1s" repeatCount="indefinite"/>
    <g id="animate-1">
      <rect x="10" y="30" width="10" height="10" fill="#33cc33"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,10" dur="1s" begin="0s" repeatCount="indefinite"/>
    </g>
    <g id="animate-2">
      <rect x="130" y="30" width="10" height="10" fill="#66cc00"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="130,10" dur="1s" begin="1s" repeatCount="indefinite"/>
    </g>
    <g id="animate-3">
      <rect x="250" y="30" width="10" height="10" fill="#ffcc00"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="250,10" dur="1s" begin="2s" repeatCount="indefinite"/>
    </g>
    <g id="animate-4">
      <rect x="370" y="30" width="10" height="10" fill="#ff00cc"/>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="370,10" dur="1s" begin="3s" repeatCount="indefinite"/>
    </g>
    <rect x="10" y="60" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="15" y="70" font-size="18" font-family="Arial" fill="#333">Advantages of DBMS Approach</text>
    <animate xlink:href="#animate-5" begin="4s" dur="1s" repeatCount="indefinite"/>
    <rect x="130" y="60" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="135" y="70" font-size="18" font-family="Arial" fill="#333">Data Integrity</text>
    <animate xlink:href="#animate-6" begin="5s" dur="1s" repeatCount="indefinite"/>
    <rect x="220" y="60" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="225" y="70" font-size="18" font-family="Arial" fill="#333">Data Sharing</text>
    <animate xlink:href="#animate-7" begin="6s" dur="1s" repeatCount="indefinite"/>
    <rect x="320" y="60" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="325" y="70" font-size="18" font-family="Arial" fill="#333">Scalability</text>
    <animate xlink:href="#animate-8" begin="7s" dur="1s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#333">History of Database Applications</text>
    <animate xlink:href="#animate-9" begin="8s" dur="1s" repeatCount="indefinite"/>
    <rect x="110" y="0" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="120" y="10" font-size="18" font-family="Arial" fill="#333">First relational databases</text>
    <animate xlink:href="#animate-10" begin="9s" dur="1s" repeatCount="indefinite"/>
    <rect x="220" y="0" width="100" height="20" fill="#f7f7f7" rx="5"/>
    <text x="230" y="10" font-size="18" font-family="Arial" fill="#333">Development of relational databases</text>
    <animate xlink:href="#animate-11" begin="10s" dur="1s" repeatCount="indefinite"/>
  </g>
</svg>