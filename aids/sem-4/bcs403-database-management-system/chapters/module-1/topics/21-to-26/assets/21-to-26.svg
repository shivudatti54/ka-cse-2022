<svg width="420" height="400" data-topic-id="database-management-system-210-260">
  <rect x="0" y="0" width="420" height="400" fill="#ccc" stroke="#ccc" stroke-width="2" rx="10" />
  <rect x="0" y="20" width="420" height="100" fill="#87ceeb" stroke="#87ceeb" stroke-width="2" rx="10" />
  <rect x="0" y="130" width="420" height="100" fill="#c6efce" stroke="#c6efce" stroke-width="2" rx="10" />
  <rect x="0" y="240" width="420" height="100" fill="#ffe6cc" stroke="#ffe6cc" stroke-width="2" rx="10" />
  <rect x="0" y="350" width="420" height="50" fill="#ff99cc" stroke="#ff99cc" stroke-width="2" rx="10" />

  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c6efce" stop-opacity="1" />
      <stop offset="50%" stop-color="#ffe6cc" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff99cc" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)" stroke="#87ceeb" stroke-width="2" rx="10" />
  <text x="190" y="50" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c">Database Management System</text>
  <text x="20" y="170" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c">2.1: Introduction to DBMS</text>
  <text x="20" y="220" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c" data-narration="DBMS is a software system that allows users to define, create, maintain, and manipulate databases." stroke="#87ceeb" stroke-width="2" animation="animate-1" begin="0s" duration="2s" delay="0s" />
  <text x="20" y="270" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c" data-narration="DBMS is characterized by data independence, logical independence, physical independence, autonomy, and example: A bank's customer database management system." stroke="#87ceeb" stroke-width="2" animation="animate-2" begin="2s" duration="2s" delay="0s" />
  <text x="20" y="320" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c" data-narration="There are four types of DBMS: Relational, Object-Oriented, Hierarchical, and Network." stroke="#87ceeb" stroke-width="2" animation="animate-3" begin="4s" duration="2s" delay="0s" />
  <text x="20" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c" data-narration="The control subsystem provides interfaces for users to interact with the DBMS, while the application subsystem uses the DBMS to perform tasks and operations." stroke="#87ceeb" stroke-width="2" animation="animate-4" begin="6s" duration="2s" delay="0s" />
  <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c" data-narration="DBMS applications include data warehousing, business intelligence, decision support systems, and expert systems." stroke="#87ceeb" stroke-width="2" animation="animate-5" begin="8s" duration="2s" delay="0s" />

  <animate transform="rotate(360 220 50)" duration="10000" begin="0s" fill="freeze" />
  <animate transform="rotate(360 220 50)" duration="10000" begin="10000s" fill="freeze" />
  <animate transform="rotate(360 220 50)" duration="10000" begin="20000s" fill="freeze" />
  <animate transform="rotate(360 220 50)" duration="10000" begin="30000s" fill="freeze" />
  <animate transform="rotate(360 220 50)" duration="10000" begin="40000s" fill="freeze" />

  <path d="M 100 150 L 300 150" stroke="#87ceeb" stroke-width="2" fill="none" data-narration="Relationships between entities in a database" stroke-linecap="round" />
  <path d="M 100 100 L 100 300" stroke="#87ceeb" stroke-width="2" fill="none" data-narration="Hierarchical structure of a database" stroke-linecap="round" />
  <path d="M 100 100 L 100 300" stroke="#87ceeb" stroke-width="2" fill="none" data-narration="Network of interconnected records" stroke-linecap="round" />
  <path d="M 100 100 L 100 300" stroke="#87ceeb" stroke-width="2" fill="none" data-narration="Objects that contain data and methods" stroke-linecap="round" />

  <text x="20" y="10" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c" transform="rotate(90 220 50)">Top</text>
  <text x="20" y="390" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#2c4a9c" transform="rotate(-90 220 50)">Bottom</text>
</svg>