<svg width="420" height="400" data-topic-id="overview-of-database-languages-and-architectures-d">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2FFFC" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Section 1: Title -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#2F4F7F" rx="10" />
    <text x="20" y="25" font-size="24" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
      Overview of Database Languages and Architectures
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="90 210 50" dur="2000" begin="0s" />
  </section>
  
  <!-- Section 2: Entity-Relationship Model -->
  <section data-narration="Entity-Relationship Model">
    <rect x="10" y="70" width="400" height="150" fill="#87CEEB" rx="10" />
    <rect x="10" y="220" width="400" height="50" fill="#2F4F7F" rx="10" />
    <text x="20" y="235" font-size="18" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
      Entity-Relationship Model (ERM)
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="90 210 50" dur="2000" begin="1s" />
    <g transform="translate(10, 250)">
      <rect x="0" y="0" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="10" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Entities
      </text>
      <text x="150" y="10" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Attributes
      </text>
      <text x="250" y="10" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Relationships
      </text>
      <rect x="0" y="50" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="60" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Student
      </text>
      <text x="150" y="60" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Name, Age, Grade
      </text>
      <text x="250" y="60" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Enrolled in Course
      </text>
      <rect x="0" y="100" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="110" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Course
      </text>
      <text x="150" y="110" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Name, Credits
      </text>
      <text x="250" y="110" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Taught by Professor
      </text>
      <rect x="0" y="150" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="160" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Professor
      </text>
      <text x="150" y="160" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Name, Experience
      </text>
      <text x="250" y="160" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Teaches Course
      </text>
    </g>
  </section>
  
  <!-- Section 3: Object-Oriented Model -->
  <section data-narration="Object-Oriented Model">
    <rect x="10" y="270" width="400" height="150" fill="#87CEEB" rx="10" />
    <rect x="10" y="420" width="400" height="50" fill="#2F4F7F" rx="10" />
    <text x="20" y="435" font-size="18" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
      Object-Oriented Model (OOM)
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="90 210 50" dur="2000" begin="2s" />
    <g transform="translate(10, 460)">
      <rect x="0" y="0" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="10" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Objects
      </text>
      <text x="150" y="10" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Properties
      </text>
      <text x="250" y="10" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Behaviors
      </text>
      <rect x="0" y="50" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="60" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Customer
      </text>
      <text x="150" y="60" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Name, Address
      </text>
      <text x="250" y="60" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Hold Account
      </text>
      <rect x="0" y="100" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="110" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Account
      </text>
      <text x="150" y="110" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Number, Balance
      </text>
      <text x="250" y="110" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Perform Transaction
      </text>
    </g>
  </section>
  
  <!-- Section 4: Comparison -->
  <section data-narration="Comparison">
    <rect x="10" y="500" width="400" height="150" fill="#87CEEB" rx="10" />
    <rect x="10" y="650" width="400" height="50" fill="#2F4F7F" rx="10" />
    <text x="20" y="655" font-size="18" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
      Comparison of Data Models
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="90 210 50" dur="2000" begin="3s" />
    <g transform="translate(10, 680)">
      <rect x="0" y="0" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="10" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        ERM
      </text>
      <text x="150" y="10" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        OOM
      </text>
      <rect x="0" y="50" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="60" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Entities
      </text>
      <text x="150" y="60" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Objects
      </text>
      <rect x="0" y="100" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="110" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Attributes
      </text>
      <text x="150" y="110" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Properties
      </text>
      <rect x="0" y="150" width="100" height="20" fill="#AAAAAA" rx="5" />
      <text x="10" y="160" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Relationships
      </text>
      <text x="150" y="160" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
        Behaviors
      </text>
    </g>
  </section>
  
  <!-- Section 5: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="10" y="700" width="400" height="50" fill="#2F4F7F" rx="10" />
    <text x="20" y="715" font-size="18" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
      Conclusion
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="90 210 50" dur="2000" begin="4s" />
  </section>
  
  <!-- Footer -->
  <footer>
    <rect x="10" y="745" width="400" height="50" fill="#2F4F7F" rx="10" />
    <text x="20" y="760" font-size="14" font-family="Open Sans" fill="#FFFFFF" text-anchor="start">
      &copy; 2023
    </text>
  </footer>
</svg>