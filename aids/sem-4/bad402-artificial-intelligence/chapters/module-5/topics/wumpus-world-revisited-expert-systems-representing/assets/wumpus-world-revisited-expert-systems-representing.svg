<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <title>Wumpus World Revisited Expert Systems Representing</title>
  <footer>Learn about Expert Systems and Wumpus World</footer>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g id="expert-systems-section">
    <rect x="10" y="50" width="250" height="150" fill="#F5F5F5" rx="10"/>
    <text x="15" y="20" text-anchor="start" font-size="14" font-family="Arial" fill="#3B3F54">Expert Systems</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="1500" begin="0s" sequential="true"/>
    <text x="15" y="80" text-anchor="start" font-size="14" font-family="Arial" fill="#3B3F54">Representing Domain Knowledge</text>
  </g>
  <g id="rules-based-systems-section">
    <rect x="270" y="50" width="250" height="150" fill="#F5F5F5" rx="10"/>
    <text x="275" y="20" text-anchor="start" font-size="14" font-family="Arial" fill="#3B3F54">Rules-based Systems</text>
    <animateTransform attributeName="transform" type="translate" from="270 50" to="270 150" dur="1500" begin="0s" sequential="true"/>
    <text x="275" y="80" text-anchor="start" font-size="14" font-family="Arial" fill="#3B3F54">Using a set of rules to represent the domain knowledge</text>
  </g>
  <g id="description-logic-section">
    <rect x="10" y="250" width="250" height="150" fill="#F5F5F5" rx="10"/>
    <text x="15" y="220" text-anchor="start" font-size="14" font-family="Arial" fill="#3B3F54">Description Logic</text>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 350" dur="1500" begin="0s" sequential="true"/>
    <text x="15" y="280" text-anchor="start" font-size="14" font-family="Arial" fill="#3B3F54">A formal language for representing knowledge in a structured way</text>
  </g>
  <g id="probabilistic-models-section">
    <rect x="270" y="250" width="250" height="150" fill="#F5F5F5" rx="10"/>
    <text x="275" y="220" text-anchor="start" font-size="14" font-family="Arial" fill="#3B3F54">Probabilistic Models</text>
    <animateTransform attributeName="transform" type="translate" from="270 250" to="270 350" dur="1500" begin="0s" sequential="true"/>
    <text x="275" y="280" text-anchor="start" font-size="14" font-family="Arial" fill="#3B3F54">Using probability theory to represent the uncertainty in the domain knowledge</text>
  </g>
  <g id="wumpus-world-section">
    <rect x="10" y="350" width="400" height="50" fill="#3B3F54" rx="10"/>
    <text x="15" y="320" text-anchor="start" font-size="14" font-family="Arial" fill="#87CEEB">Wumpus World Revisited</text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 350" dur="1500" begin="0s" sequential="true"/>
  </g>
  <g id="expert-systems-representation-section">
    <rect x="10" y="400" width="400" height="50" fill="#3B3F54" rx="10"/>
    <text x="15" y="370" text-anchor="start" font-size="14" font-family="Arial" fill="#87CEEB">Representing Expert Systems</text>
    <animateTransform attributeName="transform" type="translate" from="0 400" to="0 400" dur="1500" begin="0s" sequential="true"/>
  </g>
</svg>