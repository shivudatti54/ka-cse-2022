<svg width="420" height="400" data-topic-id="probability-notation-inference-using-full-joint-di">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2A9F2" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" opacity="0.5" />

  <!-- Title -->
  <text x="50%" y="30%" font-size="36" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
    Probability Notation Inference Using Full Joint Distributions
  </text>

  <!-- Section 1: Introduction to Probability -->
  <section data-narration="Introduction to Probability">
    <rect x="20" y="100" width="380" height="50" fill="#F2F2F2" rx="10" />
    <text x="50%" y="120%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      Probability is a branch of mathematics that deals with the study of chance events and their likelihood of occurrence.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0, 50%, 50%" to="360, 50%, 50%" dur="3000" begin="0s" repeatCount="indefinite" />
  </section>

  <!-- Section 2: Probability Notation -->
  <section data-narration="Probability Notation">
    <rect x="20" y="170" width="380" height="50" fill="#F2F2F2" rx="10" />
    <text x="50%" y="190%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      Probability notation is used to express the likelihood of an event.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0, 50%, 50%" to="360, 50%, 50%" dur="3000" begin="0s" repeatCount="indefinite" />
  </section>

  <!-- Section 3: Joint Probability -->
  <section data-narration="Joint Probability">
    <rect x="20" y="230" width="380" height="50" fill="#F2F2F2" rx="10" />
    <text x="50%" y="250%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      A full joint distribution is a probability distribution that describes the joint probability of multiple events.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0, 50%, 50%" to="360, 50%, 50%" dur="3000" begin="0s" repeatCount="indefinite" />
  </section>

  <!-- Section 4: Independence -->
  <section data-narration="Independence">
    <rect x="20" y="290" width="380" height="50" fill="#F2F2F2" rx="10" />
    <text x="50%" y="310%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      Two events are considered independent if the occurrence of one event does not affect the probability of the other event.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0, 50%, 50%" to="360, 50%, 50%" dur="3000" begin="0s" repeatCount="indefinite" />
  </section>

  <!-- Section 5: Bayes' Rule -->
  <section data-narration="Bayes' Rule">
    <rect x="20" y="350" width="380" height="50" fill="#F2F2F2" rx="10" />
    <text x="50%" y="370%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      Bayes' rule is used to update the probability of an event based on new information.
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0, 50%, 50%" to="360, 50%, 50%" dur="3000" begin="0s" repeatCount="indefinite" />
  </section>

  <!-- Footer -->
  <text x="50%" y="380%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2F4F7F">
    Probability Notation Inference Using Full Joint Distributions
  </text>
</svg>