<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg">
  <title>ES Shells</title>
  <footer>ES Shells</footer>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#B2E6CE"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <text data-narration="Introduction" x="10" y="20" font-size="24" font-family="Arial" fill="#333333">Introduction</text>
    <rect x="10" y="50" width="200" height="120" fill="#FFFFFF" rx="10" data-topic-id="introduction" data-narration="ES Shells are a family of artificial intelligence techniques used to reason under uncertainty. They are inspired by human decision-making under uncertainty and are widely used in applications such as decision-making under uncertainty, risk analysis, and uncertainty quantification.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="2s" begin="0s"/>
    </rect>
    <text data-narration="What are ES Shells?" x="10" y="170" font-size="24" font-family="Arial" fill="#333333">What are ES Shells?</text>
    <rect x="10" y="200" width="200" height="120" fill="#FFFFFF" rx="10" data-topic-id="what-are-es-shells" data-narration="ES Shells are a class of probabilistic algorithms that learn to represent uncertainty in a compact and interpretable manner. They are designed to handle complex, high-dimensional uncertainties and are often used in situations where the uncertainty space is too large to be modeled explicitly.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,240" dur="2s" begin="0s"/>
    </rect>
    <text data-narration="How do ES Shells Work?" x="10" y="270" font-size="24" font-family="Arial" fill="#333333">How do ES Shells Work?</text>
    <rect x="10" y="300" width="200" height="120" fill="#FFFFFF" rx="10" data-topic-id="how-do-es-shells-work" data-narration="ES Shells work by learning to represent uncertainty as a compact, probabilistic model. This model is typically learned through a process of expectation and suppression, which allows the model to learn to represent both the expected value and the uncertainty of the system.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,360" dur="2s" begin="0s"/>
    </rect>
    <text data-narration="Key Characteristics" x="10" y="350" font-size="24" font-family="Arial" fill="#333333">Key Characteristics</text>
    <rect x="10" y="380" width="200" height="120" fill="#FFFFFF" rx="10" data-topic-id="key-characteristics" data-narration="ES Shells are probabilistic algorithms that learn to represent uncertainty in a compact and interpretable manner. They are designed to handle complex, high-dimensional uncertainties and are often used in situations where the uncertainty space is too large to be modeled explicitly.">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,400" dur="2s" begin="0s"/>
    </rect>
  </g>
  <g transform="translate(10, 40)">
    <circle cx="20" cy="20" r="10" fill="#3498DB" data-topic-id="introduction" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="20" y1="20" x2="40" y2="20" stroke="#3498DB" stroke-width="2"/>
    <circle cx="20" cy="40" r="10" fill="#E74C3C" data-topic-id="what-are-es-shells" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="20" y1="40" x2="40" y2="40" stroke="#E74C3C" stroke-width="2"/>
    <circle cx="20" cy="60" r="10" fill="#2ECC71" data-topic-id="how-do-es-shells-work" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="20" y1="60" x2="40" y2="60" stroke="#2ECC71" stroke-width="2"/>
    <circle cx="20" cy="80" r="10" fill="#F1C40F" data-topic-id="key-characteristics" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="20" y1="80" x2="40" y2="80" stroke="#F1C40F" stroke-width="2"/>
  </g>
</svg>