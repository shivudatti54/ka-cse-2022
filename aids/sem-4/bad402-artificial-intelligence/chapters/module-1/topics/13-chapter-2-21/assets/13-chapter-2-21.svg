<svg width="420" height="400" data-topic-id="artificial-intelligence-13-chapter-2-21">
  <!-- Title and background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4C65FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#4C65FF" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" style="fill: url(#gradient)" />
  
  <!-- Section 1: Intelligent Agents -->
  <g transform="translate(10, 50)">
    <rect width="100" height="20" style="fill: #34A85A; stroke: #fff; stroke-width: 2" />
    <text x="10" y="10" style="font-size: 14pt; fill: #fff;">Intelligent Agents</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,-20" dur="500" begin="0s" delay="0s" repeatCount="indefinite" />
  </g>
  <g data-narration="An intelligent agent is a computer program that perceives its environment and acts upon it to achieve a specific goal.">
    <text x="10" y="70" style="font-size: 14pt; fill: #fff;">Autonomy</text>
    <text x="10" y="90" style="font-size: 14pt; fill: #fff;">Perception</text>
    <text x="10" y="110" style="font-size: 14pt; fill: #fff;">Reasoning</text>
    <text x="10" y="130" style="font-size: 14pt; fill: #fff;">Learning</text>
  </g>
  
  <!-- Section 2: Types of Intelligent Agents -->
  <g transform="translate(150, 50)">
    <rect width="100" height="20" style="fill: #FFC107; stroke: #fff; stroke-width: 2" />
    <text x="10" y="10" style="font-size: 14pt; fill: #fff;">Simple Reflex Agents</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,-20" dur="500" begin="0s" delay="0.5s" repeatCount="indefinite" />
  </g>
  <g data-narration="Simple Reflex Agents respond to their environment based on pre-defined rules and do not have the ability to learn or reason.">
    <text x="10" y="70" style="font-size: 14pt; fill: #fff;">Model-Based Reflex Agents</text>
    <text x="10" y="90" style="font-size: 14pt; fill: #fff;">Model-Based Rational Agents</text>
    <text x="10" y="110" style="font-size: 14pt; fill: #fff;">Learning Agents</text>
  </g>
  
  <!-- Section 3: Examples of Intelligent Agents -->
  <g transform="translate(290, 50)">
    <rect width="100" height="20" style="fill: #03A9F4; stroke: #fff; stroke-width: 2" />
    <text x="10" y="10" style="font-size: 14pt; fill: #fff;">Virtual Assistants</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,-20" dur="500" begin="1s" delay="0.5s" repeatCount="indefinite" />
  </g>
  <g data-narration="Virtual assistants use natural language processing and machine learning to understand and respond to user requests.">
    <text x="10" y="70" style="font-size: 14pt; fill: #fff;">Self-Driving Cars</text>
    <text x="10" y="90" style="font-size: 14pt; fill: #fff;">Learning Agents</text>
  </g>
  
  <!-- Title and footer -->
  <text x="10" y="10" style="font-size: 24pt; fill: #fff;">Artificial Intelligence: Chapter 2, Section 21</text>
  <text x="10" y="390" style="font-size: 14pt; fill: #fff;">Learn more about Intelligent Agents and their types.</text>
</svg>