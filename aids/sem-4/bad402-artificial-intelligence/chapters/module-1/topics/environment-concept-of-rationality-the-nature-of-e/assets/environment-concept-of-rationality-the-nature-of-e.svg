<svg width="420" height="400" data-topic-id="environment-concept-of-rationality-the-nature-of-environment" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <title>Environment Concept Of Rationality The Nature Of Environment</title>
  </metadata>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="200" height="250" fill="#fff" rx="10"/>
    <text x="10" y="10" font-size="24" font-weight="bold" text-anchor="start">Environment</text>
    <section data-narration="Environment Definition">
      <rect x="0" y="30" width="200" height="50" fill="#fff" rx="10"/>
      <text x="10" y="40" font-size="18">The environment is the external world in which an intelligent agent operates.</text>
    </section>
    <section data-narration="Types of Environments">
      <rect x="0" y="80" width="200" height="50" fill="#fff" rx="10"/>
      <text x="10" y="90" font-size="18">There are two types of environments: static and dynamic environments.</text>
      <animateTransform attributeName="transform" type="translate" from="0 80" to="0 120" dur="1000" begin="-500" delay="-500"/>
    </section>
    <section data-narration="Characteristics of Environment">
      <rect x="0" y="130" width="200" height="50" fill="#fff" rx="10"/>
      <text x="10" y="140" font-size="18">The environment has three characteristics: state, actions, and transition function.</text>
      <animateTransform attributeName="transform" type="translate" from="0 130" to="0 170" dur="1000" begin="-300" delay="-300"/>
    </section>
    <section data-narration="Concept of Rationality">
      <rect x="0" y="180" width="200" height="50" fill="#fff" rx="10"/>
      <text x="10" y="190" font-size="18">Rationality is the ability of an intelligent agent to make decisions that maximize its utility or achieve its goals.</text>
      <animateTransform attributeName="transform" type="translate" from="0 180" to="0 220" dur="1000" begin="-200" delay="-200"/>
    </section>
    <section data-narration="Types of Rationality">
      <rect x="0" y="230" width="200" height="50" fill="#fff" rx="10"/>
      <text x="10" y="240" font-size="18">There are two types of rationality: maximizing rationality and minimizing rationality.</text>
      <animateTransform attributeName="transform" type="translate" from="0 230" to="0 270" dur="1000" begin="-100" delay="-100"/>
    </section>
    <section data-narration="Key Concepts of Rationality">
      <rect x="0" y="280" width="200" height="50" fill="#fff" rx="10"/>
      <text x="10" y="290" font-size="18">Utility, cost, and decision-making are key concepts of rationality.</text>
      <animateTransform attributeName="transform" type="translate" from="0 280" to="0 320" dur="1000" begin="0" delay="0"/>
    </section>
    <a href="#" class="link">Learn More</a>
  </g>
  <g transform="translate(10, 350)">
    <text x="10" y="360" font-size="24" font-weight="bold" text-anchor="start">Footer</text>
  </g>
</svg>