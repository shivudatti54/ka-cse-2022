<svg width="420" height="400" data-topic-id="text-book-1-chapter-1-1-1-1">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2FFFC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E8F4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" opacity="0.5"/>
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#032B44">
    Artificial Intelligence
  </text>
  
  <!-- Section 1: Introduction to Artificial Intelligence -->
  <rect x="50%" y="100" width="300" height="100" fill="#E5F5F5" rx="10" data-narration="What is Artificial Intelligence?">
    <animateTransform attributeName="transform" type="translate" from="0 120" to="0 0" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 120" dur="2s" begin="2s"/>
  </rect>
  <text x="50%" y="120%" font-size="18" text-anchor="middle" fill="#032B44">
    Artificial Intelligence (AI) refers to the development of computer systems that can perform tasks that typically require human intelligence.
  </text>
  
  <!-- Section 2: Foundations of Artificial Intelligence -->
  <rect x="50%" y="220" width="300" height="100" fill="#E5F5F5" rx="10" data-narration="Foundations of Artificial Intelligence">
    <animateTransform attributeName="transform" type="translate" from="0 160" to="0 0" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 160" dur="2s" begin="2s"/>
  </rect>
  <text x="50%" y="220%" font-size="18" text-anchor="middle" fill="#032B44">
    AI research has its roots in the 1950s and 1960s, when computer scientists such as Alan Turing, Marvin Minsky, and John McCarthy began exploring the possibilities of creating intelligent machines.
  </text>
  
  <!-- Section 3: Key Milestones in the History of AI -->
  <rect x="50%" y="320" width="300" height="100" fill="#E5F5F5" rx="10" data-narration="Key Milestones in the History of AI">
    <animateTransform attributeName="transform" type="translate" from="0 180" to="0 0" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 180" dur="2s" begin="2s"/>
  </rect>
  <text x="50%" y="320%" font-size="18" text-anchor="middle" fill="#032B44">
    Key milestones in the history of AI include the Turing Test, the Dartmouth Summer Research Project on Artificial Intelligence, and the development of rule-based systems, expert systems, and machine learning.
  </text>
  
  <!-- Section 4: Intelligent Agents -->
  <rect x="50%" y="420" width="300" height="100" fill="#E5F5F5" rx="10" data-narration="Intelligent Agents">
    <animateTransform attributeName="transform" type="translate" from="0 240" to="0 0" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 240" dur="2s" begin="2s"/>
  </rect>
  <text x="50%" y="440%" font-size="18" text-anchor="middle" fill="#032B44">
    An agent is a computer program that perceives its environment and takes actions to achieve a goal.
  </text>
  
  <!-- Section 5: Types of Intelligent Agents -->
  <rect x="50%" y="540" width="300" height="100" fill="#E5F5F5" rx="10" data-narration="Types of Intelligent Agents">
    <animateTransform attributeName="transform" type="translate" from="0 280" to="0 0" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 280" dur="2s" begin="2s"/>
  </rect>
  <text x="50%" y="560%" font-size="18" text-anchor="middle" fill="#032B44">
    The three main types of intelligent agents are simple reflex agents, model-based reflex agents, and utility-based agents.
  </text>
  
  <!-- Section 6: Autonomy, Perception, and Action -->
  <rect x="50%" y="660" width="300" height="100" fill="#E5F5F5" rx="10" data-narration="Autonomy, Perception, and Action">
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 0" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 300" dur="2s" begin="2s"/>
  </rect>
  <text x="50%" y="680%" font-size="18" text-anchor="middle" fill="#032B44">
    The key concepts of intelligent agents are autonomy, perception, and action.
  </text>
  
  <!-- Footer -->
  <text x="50%" y="380" font-size="18" text-anchor="middle" fill="#032B44">
    &copy; 2023 Educational Diagrams
  </text>
</svg>