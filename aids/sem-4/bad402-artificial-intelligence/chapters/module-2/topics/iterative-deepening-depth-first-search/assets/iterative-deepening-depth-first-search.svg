<svg width="420" height="400" data-topic-id="iterative-deepening-depth-first-search">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body style="background: linear-gradient(to bottom, #66CCCC, #66CCCC)">
    <!-- Title -->
    <g transform="translate(20, 20)">
      <text x="0" y="20" font-size="24" font-family="Arial" font-weight="bold">Iterative Deepening Depth-First Search</text>
    </g>
    
    <!-- Section 1: What is Iterative Deepening Depth-First Search? -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="400" height="150" style="fill: white; border: 1px solid #CCC; border-radius: 10px; padding: 10px"/>
      <text x="10" y="20" data-narration="What is Iterative Deepening Depth-First Search?" font-size="18" font-family="Arial" fill="#444">
        Iterative Deepening Depth-First Search (IDDFS) is a variant of the depth-first search algorithm that uses a two-step process to find the shortest path between two nodes in a graph.
      </text>
    </g>
    
    <!-- Gradient background for section -->
    <rect x="0" y="150" width="400" height="150" style="fill: linear-gradient(to bottom, #66CCCC, #66CCCC)"/>
    
    <!-- Section 2: How Does Iterative Deepening Depth-First Search Work? -->
    <g transform="translate(20, 300)">
      <rect x="0" y="0" width="400" height="150" style="fill: white; border: 1px solid #CCC; border-radius: 10px; padding: 10px"/>
      <text x="10" y="20" data-narration="How Does Iterative Deepening Depth-First Search Work?" font-size="18" font-family="Arial" fill="#444">
        IDDFS works by incrementally increasing the search depth until the target node is found.
      </text>
    </g>
    
    <!-- Gradient background for section -->
    <rect x="0" y="150" width="400" height="150" style="fill: linear-gradient(to bottom, #66CCCC, #66CCCC)"/>
    
    <!-- Section 3: Example Problem -->
    <g transform="translate(20, 600)">
      <rect x="0" y="0" width="400" height="150" style="fill: white; border: 1px solid #CCC; border-radius: 10px; padding: 10px"/>
      <text x="10" y="20" data-narration="Example Problem" font-size="18" font-family="Arial" fill="#444">
        IDDFS works by incrementally increasing the search depth until the target node is found.
      </text>
    </g>
    
    <!-- Gradient background for section -->
    <rect x="0" y="150" width="400" height="150" style="fill: linear-gradient(to bottom, #66CCCC, #66CCCC)"/>
    
    <!-- Section 4: Advantages and Disadvantages -->
    <g transform="translate(20, 900)">
      <rect x="0" y="0" width="400" height="150" style="fill: white; border: 1px solid #CCC; border-radius: 10px; padding: 10px"/>
      <text x="10" y="20" data-narration="Advantages and Disadvantages" font-size="18" font-family="Arial" fill="#444">
        IDDFS has several advantages, including efficient search of large graphs and a time complexity of O(b^d).
      </text>
    </g>
    
    <!-- Gradient background for section -->
    <rect x="0" y="150" width="400" height="150" style="fill: linear-gradient(to bottom, #66CCCC, #66CCCC)"/>
    
    <!-- Section 5: Implementation -->
    <g transform="translate(20, 1200)">
      <rect x="0" y="0" width="400" height="150" style="fill: white; border: 1px solid #CCC; border-radius: 10px; padding: 10px"/>
      <text x="10" y="20" data-narration="Implementation" font-size="18" font-family="Arial" fill="#444">
        Implementing IDDFS involves using a queue data structure to keep track of nodes to visit and a stack data structure to keep track of nodes to explore.
      </text>
    </g>
    
    <!-- Gradient background for section -->
    <rect x="0" y="150" width="400" height="150" style="fill: linear-gradient(to bottom, #66CCCC, #66CCCC)"/>
    
    <!-- Section 6: Benefits and Use Cases -->
    <g transform="translate(20, 1500)">
      <rect x="0" y="0" width="400" height="150" style="fill: white; border: 1px solid #CCC; border-radius: 10px; padding: 10px"/>
      <text x="10" y="20" data-narration="Benefits and Use Cases" font-size="18" font-family="Arial" fill="#444">
        IDDFS is useful for finding shortest paths in graphs with large number of nodes and edges, such as social networks or transportation systems.
      </text>
    </g>
    
    <!-- Gradient background for section -->
    <rect x="0" y="150" width="400" height="150" style="fill: linear-gradient(to bottom, #66CCCC, #66CCCC)"/>
    
    <!-- Arrow markers for connections -->
    <path d="M 10 20 L 30 40" style="stroke: #333; stroke-width: 2; fill: none"/>
    <path d="M 50 60 L 70 80" style="stroke: #333; stroke-width: 2; fill: none"/>
    <path d="M 80 90 L 100 110" style="stroke: #333; stroke-width: 2; fill: none"/>
    
    <!-- Footer -->
    <g transform="translate(20, 1800)">
      <text x="0" y="20" font-size="18" font-family="Arial" fill="#444">Author: [Your Name]</text>
    </g>
  </body>
</svg>