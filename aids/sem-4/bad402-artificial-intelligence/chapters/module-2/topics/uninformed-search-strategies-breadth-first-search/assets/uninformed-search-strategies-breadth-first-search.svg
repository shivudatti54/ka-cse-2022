<svg width="420" height="400" data-topic-id="uninformed-search-strategies-breadth-first-search">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction to Uninformed Search">
    <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">Uninformed Search Strategies</text>
    <text x="20" y="60" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F">Breadth-First Search</text>
  </section>
  
  <!-- ASCII Diagram of BFS -->
  <section data-narration="Example of BFS">
    <rect x="10" y="100" width="400" height="150" fill="#FFFFFF" stroke="#2F4F7F" stroke-width="2"/>
    <text x="20" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">A</text>
    <text x="50" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">B</text>
    <text x="80" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">C</text>
    <text x="110" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">D</text>
    <text x="140" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">E</text>
    <text x="170" y="120" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">F</text>
    <text x="20" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">/ \</text>
    <text x="40" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">/ \</text>
    <text x="60" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="80" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="100" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="120" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="140" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="160" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="180" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="200" y="150" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="20" y="180" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">D     </text>
    <text x="20" y="210" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">E     </text>
    <text x="20" y="240" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">F     </text>
    <text x="20" y="270" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="20" y="300" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
    <text x="20" y="330" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">   </text>
  </section>
  
  <!-- Animation for ASCII Diagram of BFS -->
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="100ms"/>
  <animate attributeName="x" from="20" to="140" dur="2s" begin="150ms"/>
  <animate attributeName="y" from="120" to="280" dur="2s" begin="200ms"/>
  <animate attributeName="width" from="100" to="400" dur="2s" begin="250ms"/>
  <animate attributeName="height" from="100" to="400" dur="2s" begin="300ms"/>
  
  <!-- Footnote Section -->
  <section data-narration="Example of DFS">
    <text x="20" y="350" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">
      <tspan x="20" y="350" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">Depth-First Search</tspan>
      <tspan x="150" y="350" font-size="14" font-family="Arial, sans-serif" fill="#2F4F7F">(DFS)</tspan>
    </text>
  </section>
  
  <!-- Animation for Footnote Section -->
  <animate attributeName="opacity" from="1" to="0" dur="2s" begin="500ms"/>
  
</svg>