<svg width="420" height="400" data-topic-id="Coping-with-Limitations-of-Algorithmic-Power-Backtracking">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7fcff" />
      <stop offset="100%" stop-color="#e6ecf8" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#backgroundGradient)" />
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="0" y="0" width="420" height="40" style="fill: #3498db; fill-opacity: 0.8" />
    <text x="20" y="15" font-size="24" font-family="Arial" fill="#fff">Coping with Limitations of Algorithmic Power</text>
  </section>
  
  <!-- Backtracking Section -->
  <section data-narration="Backtracking">
    <!-- n-Queens Problem -->
    <rect x="20" y="50" width="380" height="150" style="fill: #f2f2f2; border: 1px solid #ddd" />
    <ellipse cx="220" cy="80" rx="20" ry="10" fill="#f2f2f2" stroke="#333" stroke-width="2" />
    <text x="170" y="60" font-size="18" font-family="Arial" fill="#333">n-Queens Problem</text>
    <animateTransform attribute="transform" type="translate" from="0,0" to="220,80" begin="0s" duration="2s" repeatCount="indefinite" />
    <animateTransform attribute="transform" type="translate" from="220,80" to="220,120" begin="2s" duration="2s" repeatCount="indefinite" />
    <!-- Subset-sum Problem -->
    <rect x="20" y="200" width="380" height="150" style="fill: #f2f2f2; border: 1px solid #ddd" />
    <ellipse cx="220" cy="120" rx="20" ry="10" fill="#f2f2f2" stroke="#333" stroke-width="2" />
    <text x="170" y="130" font-size="18" font-family="Arial" fill="#333">Subset-sum Problem</text>
    <animateTransform attribute="transform" type="translate" from="0,0" to="220,120" begin="4s" duration="2s" repeatCount="indefinite" />
    <animateTransform attribute="transform" type="translate" from="220,120" to="220,160" begin="6s" duration="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Branch-and-Bound Section -->
  <section data-narration="Branch-and-Bound">
    <rect x="20" y="350" width="380" height="150" style="fill: #f2f2f2; border: 1px solid #ddd" />
    <ellipse cx="220" cy="170" rx="20" ry="10" fill="#f2f2f2" stroke="#333" stroke-width="2" />
    <text x="170" y="180" font-size="18" font-family="Arial" fill="#333">Branch-and-Bound</text>
    <animateTransform attribute="transform" type="translate" from="0,0" to="220,170" begin="8s" duration="2s" repeatCount="indefinite" />
    <animateTransform attribute="transform" type="translate" from="220,170" to="220,210" begin="10s" duration="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Approximation Section -->
  <section data-narration="Approximation">
    <rect x="20" y="500" width="380" height="150" style="fill: #f2f2f2; border: 1px solid #ddd" />
    <ellipse cx="220" cy="220" rx="20" ry="10" fill="#f2f2f2" stroke="#333" stroke-width="2" />
    <text x="170" y="230" font-size="18" font-family="Arial" fill="#333">Approximation</text>
    <animateTransform attribute="transform" type="translate" from="0,0" to="220,220" begin="12s" duration="2s" repeatCount="indefinite" />
    <animateTransform attribute="transform" type="translate" from="220,220" to="220,260" begin="14s" duration="2s" repeatCount="indefinite" />
  </section>
  
  <!-- Footer Section -->
  <footer>
    <rect x="0" y="550" width="420" height="50" style="fill: #f2f2f2; border: 1px solid #ddd" />
    <text x="20" y="55" font-size="18" font-family="Arial" fill="#333">Copyright 2023</text>
  </footer>
</svg>