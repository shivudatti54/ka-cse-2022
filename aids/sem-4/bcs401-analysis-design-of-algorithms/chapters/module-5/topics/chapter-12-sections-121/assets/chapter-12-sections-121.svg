<svg width="420" height="400" data-topic-id="limitations-of-algorithmic-power">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#C2E4F4" stop-opacity="1" />
      <stop offset="100%" stop-color="#E0E8C2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Limitations of Algorithmic Power</title>
  <rect x="50" y="50" width="320" height="300" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="380" height="280" fill="#FFFFFF" rx="10" />
    <text x="20" y="20" text-anchor="middle" font-size="24" fill="#2F4F7F">Chapter 12: Limitations of Algorithmic Power</text>
  </g>
  <g transform="translate(50, 150)">
    <section data-narration="12.1.1">
      <rect x="0" y="0" width="380" height="100" fill="#FFFFFF" rx="10" />
      <text x="20" y="20" text-anchor="middle" font-size="18" fill="#2F4F7F">Introduction</text>
      <text x="20" y="60" text-anchor="middle" font-size="14" fill="#666666">Decision Trees, P, NP, and NP-Complete Problems</text>
    </section>
    <section data-narration="12.1.2">
      <rect x="0" y="120" width="380" height="100" fill="#FFFFFF" rx="10" />
      <text x="20" y="20" text-anchor="middle" font-size="18" fill="#2F4F7F">Decision Trees</text>
      <text x="20" y="60" text-anchor="middle" font-size="14" fill="#666666">
        A decision tree is a flowchart representing a tree-like structure of decisions and their possible outcomes.
      </text>
      <animateTransform attributeName="transform" type="rotate" from="0 190 140" to="360 190 140" dur="10s" begin="0s 0.5s" />
    </section>
    <section data-narration="12.1.3">
      <rect x="0" y="220" width="380" height="100" fill="#FFFFFF" rx="10" />
      <text x="20" y="20" text-anchor="middle" font-size="18" fill="#2F4F7F">P (Polynomial Time)</text>
      <text x="20" y="60" text-anchor="middle" font-size="14" fill="#666666">
        A problem is in P if it can be solved in a finite amount of time, where the amount of time is proportional to the size of the input.
      </text>
      <animateTransform attributeName="transform" type="translate" from="190 140" to="190 140" dur="5s" begin="0.5s" />
    </section>
    <section data-narration="12.1.4">
      <rect x="0" y="320" width="380" height="100" fill="#FFFFFF" rx="10" />
      <text x="20" y="20" text-anchor="middle" font-size="18" fill="#2F4F7F">NP (Nondeterministic Polynomial Time)</text>
      <text x="20" y="60" text-anchor="middle" font-size="14" fill="#666666">
        A problem is in NP if it can be verified in a finite amount of time, where the amount of time is proportional to the size of the input.
      </text>
      <animateTransform attributeName="transform" type="translate" from="190 140" to="190 140" dur="5s" begin="1.5s" />
    </section>
    <section data-narration="12.1.5">
      <rect x="0" y="420" width="380" height="100" fill="#FFFFFF" rx="10" />
      <text x="20" y="20" text-anchor="middle" font-size="18" fill="#2F4F7F">NP-Complete Problems</text>
      <text x="20" y="60" text-anchor="middle" font-size="14" fill="#666666">
        NP-complete problems are a subset of NP problems that are particularly difficult to solve.
      </text>
      <animateTransform attributeName="transform" type="translate" from="190 140" to="190 140" dur="5s" begin="2.5s" />
    </section>
    <footer>
      <text x="20" y="370" text-anchor="middle" font-size="18" fill="#2F4F7F">Limitations of Algorithmic Power</text>
    </footer>
  </g>
</svg>