<svg width="420" height="400" data-topic-id="algorithmic-problem-solving">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-curve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-curve)" rx="10"/>
  
  <!-- Title Section -->
  <section data-narration="What is an Algorithm?" data-ypos="0">
    <rect x="10" y="10" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20" y="25" font-size="24" font-weight="bold" fill="#FFF">What is an Algorithm?</text>
  </section>
  
  <!-- Definition Section -->
  <section data-narration="Definition" data-ypos="60">
    <rect x="10" y="60" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20" y="75" font-size="18" fill="#FFF">Definition:</text>
    <text x="20" y="85" font-size="18" fill="#FFF">An algorithm is a well-defined procedure that takes some input and produces a corresponding output.</text>
  </section>
  
  <!-- Examples Section -->
  <section data-narration="Examples of Algorithms" data-ypos="120">
    <rect x="10" y="120" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20" y="135" font-size="18" fill="#FFF">Examples of Algorithms:</text>
    <text x="20" y="145" font-size="18" fill="#FFF">- A recipe for baking a cake</text>
    <text x="20" y="155" font-size="18" fill="#FFF">- A map that guides you from one location to another</text>
    <text x="20" y="165" font-size="18" fill="#FFF">- A recipe for determining the area of a rectangle</text>
  </section>
  
  <!-- Characteristics Section -->
  <section data-narration="Characteristics of an Algorithm" data-ypos="180">
    <rect x="10" y="180" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20" y="195" font-size="18" fill="#FFF">Characteristics of an Algorithm:</text>
    <text x="20" y="205" font-size="18" fill="#FFF">- Well-defined: The algorithm is clear and easy to understand.</text>
    <text x="20" y="215" font-size="18" fill="#FFF">- Finite: The algorithm has a finite number of steps.</text>
    <text x="20" y="225" font-size="18" fill="#FFF">- Unambiguous: The algorithm is easy to follow and does not have any ambiguity.</text>
    <text x="20" y="235" font-size="18" fill="#FFF">- Efficient: The algorithm uses the minimum amount of resources necessary to solve the problem.</text>
  </section>
  
  <!-- Types of Algorithms Section -->
  <section data-narration="Types of Algorithms" data-ypos="240">
    <rect x="10" y="240" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20" y="255" font-size="18" fill="#FFF">Types of Algorithms:</text>
    <text x="20" y="265" font-size="18" fill="#FFF">- Deterministic algorithms: These algorithms always produce the same output for a given input.</text>
    <text x="20" y="275" font-size="18" fill="#FFF">- Non-deterministic algorithms: These algorithms may produce different outputs for the same input.</text>
  </section>
  
  <!-- Output Section -->
  <section data-narration="Output" data-ypos="300">
    <rect x="10" y="300" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20" y="315" font-size="18" fill="#FFF">Output:</text>
    <text x="20" y="325" font-size="18" fill="#FFF">The result that the algorithm produces.</text>
  </section>
  
  <!-- Procedure Section -->
  <section data-narration="Procedure" data-ypos="360">
    <rect x="10" y="360" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20" y="375" font-size="18" fill="#FFF">Procedure:</text>
    <text x="20" y="385" font-size="18" fill="#FFF">A set of instructions that the algorithm follows.</text>
  </section>
  
  <!-- Termination Section -->
  <section data-narration="Termination" data-ypos="420">
    <rect x="10" y="420" width="400" height="50" fill="#2E4053" rx="10"/>
    <text x="20" y="435" font-size="18" fill="#FFF">Termination:</text>
    <text x="20" y="445" font-size="18" fill="#FFF">The point at which the algorithm stops executing.</text>
  </section>
  
  <!-- Section Spacers -->
  <rect x="10" y="450" width="400" height="10" fill="#2E4053" rx="10"/>
  <rect x="10" y="460" width="400" height="10" fill="#2E4053" rx="10"/>
  <rect x="10" y="470" width="400" height="10" fill="#2E4053" rx="10"/>
  
  <!-- Footer Section -->
  <rect x="10" y="480" width="400" height="20" fill="#2E4053" rx="10"/>
  <text x="20" y="495" font-size="14" fill="#FFF">Algorithmic Problem Solving</text>
</svg>