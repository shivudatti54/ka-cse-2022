<svg width="420" height="400" data-topic-id="chapter-2-sections-21">
  <title>Algorithm Analysis</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10"/>
  <g id="title">
    <text x="50%" y="20" font-size="24" font-family="Arial" fill="#2F4F7F">Algorithm Analysis</text>
  </g>
  <g id="sections">
    <a animation="analyze" fill="freeze">
      <section data-narration="Introduction to Algorithm Analysis">
        <rect x="10" y="50" width="380" height="30" fill="#E0E4CC" rx="5"/>
        <text x="50%" y="60" font-size="16" font-family="Arial" fill="#2F4F7F">Definition of Algorithm Analysis</text>
        <text x="50%" y="80" font-size="16" font-family="Arial" fill="#2F4F7F">Algorithm analysis is the process of determining the amount of time or space an algorithm requires to complete, usually in terms of its running time or memory usage.</text>
      </section>
      <section data-narration="Importance of Algorithm Analysis">
        <rect x="10" y="90" width="380" height="30" fill="#C9E4CA" rx="5"/>
        <text x="50%" y="100" font-size="16" font-family="Arial" fill="#2F4F7F">Importance of Algorithm Analysis</text>
        <text x="50%" y="120" font-size="16" font-family="Arial" fill="#2F4F7F">Algorithm analysis is essential in software development as it helps in: evaluating the efficiency of an algorithm, comparing different algorithms for solving the same problem, predicting the performance of an algorithm on different inputs, and identifying bottlenecks in an algorithm.</text>
      </section>
      <section data-narration="Types of Algorithm Analysis">
        <rect x="10" y="190" width="380" height="30" fill="#B2FFFC" rx="5"/>
        <text x="50%" y="200" font-size="16" font-family="Arial" fill="#2F4F7F">Types of Algorithm Analysis</text>
        <text x="50%" y="220" font-size="16" font-family="Arial" fill="#2F4F7F">There are two primary types of algorithm analysis: time complexity analysis and space complexity analysis.</text>
      </section>
      <section data-narration="Measuring Algorithm Performance">
        <rect x="10" y="290" width="380" height="30" fill="#E0E4CC" rx="5"/>
        <text x="50%" y="300" font-size="16" font-family="Arial" fill="#2F4F7F">Measuring Algorithm Performance</text>
        <text x="50%" y="320" font-size="16" font-family="Arial" fill="#2F4F7F">Algorithm performance can be measured using several metrics: running time, space complexity, and complexity.</text>
      </section>
      <section data-narration="Big O Notation">
        <rect x="10" y="390" width="380" height="30" fill="#C9E4CA" rx="5"/>
        <text x="50%" y="400" font-size="16" font-family="Arial" fill="#2F4F7F">Big O Notation</text>
        <text x="50%" y="420" font-size="16" font-family="Arial" fill="#2F4F7F">Big O notation is a mathematical notation used to describe the upper bound of an algorithm's complexity.</text>
      </section>
    </a>
  </g>
  <g id="footer">
    <text x="50%" y="380" font-size="16" font-family="Arial" fill="#2F4F7F">Algorithm Analysis</text>
  </g>
</svg>