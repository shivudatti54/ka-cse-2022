<svg width="420" height="400" data-topic-id="sequential-search-and-brute-force-string-matching"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background: linear-gradient(to bottom, #7a88ff, #4682b4);">
  <!-- Title -->
  <text x="10" y="10" text-anchor="start" font-size="24" font-family="Arial" fill="#fff">
    Sequential Search and Brute Force String Matching
  </text>

  <!-- Gradient Background -->
  <rect x="0" y="30" width="420" height="280" fill="#ADD8E6" rx="10" />

  <!-- Section 1: Introduction -->
  <rect x="0" y="40" width="420" height="80" fill="#f7f7f7" rx="10" />
  <text x="10" y="50" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>String matching is a fundamental problem in computer science that deals with finding a substring within a larger string.</data-narration>
  </text>
  <text x="10" y="70" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>This topic is crucial in algorithmic problem solving, as it has numerous applications in text processing, data compression, and cryptography.</data-narration>
  </text>

  <!-- Section 2: Definitions -->
  <rect x="0" y="130" width="420" height="80" fill="#f7f7f7" rx="10" />
  <text x="10" y="140" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>A substring is a portion of a string, such as &quot;he&quot; or &quot;worlds&quot;.</data-narration>
  </text>
  <text x="10" y="170" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>Matching is finding a substring within a larger string.</data-narration>
  </text>

  <!-- Section 3: Sequential Search -->
  <rect x="0" y="210" width="420" height="80" fill="#f7f7f7" rx="10" />
  <text x="10" y="220" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>Sequential search is a simple algorithm that checks each character of the target string against the characters of the substring.</data-narration>
  </text>
  <text x="10" y="250" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>It starts from the first character of the target string and compares it with the first character of the substring.</data-narration>
  </text>
  < animate attributeName="opacity" begin="0s" dur="1s" fill="freeze" />
  <animate attributeName="opacity" begin="1.5s" dur="1s" fill="freeze" />
  <animate attributeName="opacity" begin="3s" dur="1s" fill="freeze" />

  <!-- Section 4: Algorithm -->
  <rect x="0" y="290" width="420" height="80" fill="#f7f7f7" rx="10" />
  <text x="10" y="300" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>Initialize two pointers, target and substring, to point to the first character of the target string and the substring respectively.</data-narration>
  </text>
  <text x="10" y="330" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>Compare the characters at the current positions of target and substring.</data-narration>
  </text>
  <text x="10" y="360" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>If they match, move the substring pointer forward by one character.</data-narration>
  </text>
  <text x="10" y="390" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>If they do not match, move the target pointer forward by one character.</data-narration>
  </text>

  <!-- Section 5: Example -->
  <rect x="0" y="360" width="420" height="80" fill="#f7f7f7" rx="10" />
  <text x="10" y="370" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>Suppose we want to find the substring &quot;hello&quot; within the string &quot;hello world&quot;.</data-narration>
  </text>
  <text x="10" y="400" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>| Target String | Substring | Position |</data-narration>
  </text>
  <text x="10" y="420" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>| h             | h         | 0        |</data-narration>
  </text>
  <text x="10" y="440" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>| e             | e         | 1        |</data-narration>
  </text>
  <text x="10" y="460" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>| l             | l         | 2        |</data-narration>
  </text>
  <text x="10" y="480" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>| l             | l         | 3        |</data-narration>
  </text>
  <text x="10" y="500" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>| o             | o         | 4        |</data-narration>
  </text>
  <text x="10" y="520" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>|               |           |          |</data-narration>
  </text>
  <text x="10" y="540" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>| hello        | hello      | 0        |</data-narration>
  </text>
  <text x="10" y="560" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>| found at pos 4</data-narration>
  </text>

  <!-- Section 6: Conclusion -->
  <rect x="0" y="610" width="420" height="80" fill="#f7f7f7" rx="10" />
  <text x="10" y="620" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>Sequential search is an efficient algorithm for string matching.</data-narration>
  </text>
  <text x="10" y="650" text-anchor="start" font-size="18" font-family="Arial" fill="#333">
    <data-narration>It has numerous applications in text processing, data compression, and cryptography.</data-narration>
  </text>

  <!-- Footer -->
  <text x="10" y="380" text-anchor="start" font-size="12" font-family="Arial" fill="#333">
    &copy; 2023
  </text>
</svg>