    <text x="50%" y="190%" font-size="18" text-anchor="middle" fill="#333" fill-opacity="0.8">
      Selection sort is a simple sorting algorithm that works by repeatedly finding the minimum element from the unsorted part of the array and swapping it with the first element.
    </text>
    <animate transform="translate(10, 230)" begin="200ms" dur="1000ms" repeatCount="indefinite" />
  </section>
  
  <!-- Section 3: How it Works -->
  <section data-narration="How it Works">
