    <text x="50%" y="310%" font-size="18" text-anchor="middle" fill="#333" fill-opacity="0.8">
      Start from the first element of the array. Compare the current element with the remaining unsorted elements. Find the minimum element from the unsorted part of the array. Swap the current element with the minimum element. Move to the next element and repeat the process until the entire array is sorted.
    </text>
    <animate transform="translate(10, 370)" begin="300ms" dur="1000ms" repeatCount="indefinite" />
  </section>
  
