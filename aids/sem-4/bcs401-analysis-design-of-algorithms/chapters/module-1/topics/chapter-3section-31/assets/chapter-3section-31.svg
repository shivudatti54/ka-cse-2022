<svg width="420" height="400" data-topic-id="chapter-3-section-31" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="mix-blend-mode: multiply;">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C2C5E7" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Chapter 3.1: What is an Algorithm?</title>
    <rect x="10" y="10" width="400" height="30" fill="url(#pastel-gradient)" rx="10"/>
    <rect x="10" y="40" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="70" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="100" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="130" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="160" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="190" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <text x="15" y="40" font-size="16" font-family="Arial" fill="#2B5CE7" text-anchor="start">Definition of an Algorithm</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 30" begin="0s" dur="2s" repeatCount="1"/>
    <rect x="10" y="70" width="400" height="30" fill="#F7F7F7" rx="10">
        <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s"/>
        <animate-transform attributeName="transform" type="translate" from="0 0" to="0 70" begin="0s" dur="2s" repeatCount="1"/>
    </rect>
    <text x="15" y="100" font-size="16" font-family="Arial" fill="#2B5CE7" text-anchor="start">Characteristics of an Algorithm</text>
    <rect x="10" y="130" width="400" height="30" fill="#F7F7F7" rx="10">
        <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s"/>
        <animate-transform attributeName="transform" type="translate" from="0 0" to="0 130" begin="0s" dur="2s" repeatCount="1"/>
    </rect>
    <text x="15" y="160" font-size="16" font-family="Arial" fill="#2B5CE7" text-anchor="start">Types of Algorithms</text>
    <rect x="10" y="190" width="400" height="30" fill="#F7F7F7" rx="10">
        <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s"/>
        <animate-transform attributeName="transform" type="translate" from="0 0" to="0 190" begin="0s" dur="2s" repeatCount="1"/>
    </rect>
    <rect x="10" y="40" width="400" height="200" fill="url(#pastel-gradient)" rx="10"/>
    <g id="algorithm-illustration">
        <rect x="10" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Input</text>
        <rect x="120" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="130" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Processing</text>
        <rect x="240" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="250" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Output</text>
        <rect x="10" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Termination</text>
        <rect x="120" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="130" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Correctness</text>
        <rect x="240" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="250" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Efficiency</text>
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="0 120 100" begin="0s" dur="2s" repeatCount="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0 220 100" to="0 240 100" begin="0s" dur="2s" repeatCount="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0 340 100" to="0 360 100" begin="0s" dur="2s" repeatCount="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0 100 120" to="0 80 120" begin="0s" dur="2s" repeatCount="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0 220 120" to="0 200 120" begin="0s" dur="2s" repeatCount="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0 340 120" to="0 320 120" begin="0s" dur="2s" repeatCount="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0 100 180" to="0 80 180" begin="0s" dur="2s" repeatCount="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0 220 180" to="0 200 180" begin="0s" dur="2s" repeatCount="1"/>
        <animateTransform attributeName="transform" type="rotate" from="0 340 180" to="0 320 180" begin="0s" dur="2s" repeatCount="1"/>
        <g id="sorting-illustration">
            <rect x="10" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="20" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Sorting Algorithms</text>
            <rect x="120" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="130" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Example</text>
            <rect x="240" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="250" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Bubble Sort</text>
            <rect x="10" y="130" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="20" y="140" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Step 1</text>
            <rect x="120" y="130" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="130" y="140" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Compare adjacent elements</text>
            <rect x="240" y="130" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="250" y="140" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Swap if necessary</text>
            <rect x="10" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="20" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Step 2</text>
            <rect x="120" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="130" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Repeat from step 1</text>
            <rect x="240" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="250" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Until no swaps are needed</text>
            <rect x="10" y="230" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="20" y="240" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Result</text>
            <rect x="120" y="230" width="100" height="50" fill="#4C5154" rx="10"/>
            <text x="130" y="240" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Sorted array</text>
        </g>
    </g>
    <rect x="10" y="270" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <text x="15" y="290" font-size="16" font-family="Arial" fill="#2B5CE7" text-anchor="start">Study Tips</text>
    <rect x="10" y="320" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="350" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="380" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="410" width="400" height="30" fill="#F7F7F7" rx="10"/>
    <g id="illustrations">
        <rect x="10" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Input</text>
        <rect x="120" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="130" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Processing</text>
        <rect x="240" y="40" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="250" y="50" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Output</text>
        <rect x="10" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Termination</text>
        <rect x="120" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="130" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Correctness</text>
        <rect x="240" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="250" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Efficiency</text>
        <rect x="10" y="230" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="240" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Sorting Algorithms</text>
        <rect x="120" y="230" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="130" y="240" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Example</text>
        <rect x="240" y="230" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="250" y="240" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Bubble Sort</text>
        <rect x="10" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Step 1</text>
        <rect x="120" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="130" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Compare adjacent elements</text>
        <rect x="240" y="190" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="250" y="200" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Swap if necessary</text>
        <rect x="10" y="290" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="300" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Step 2</text>
        <rect x="120" y="290" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="130" y="300" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Repeat from step 1</text>
        <rect x="240" y="290" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="250" y="300" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Until no swaps are needed</text>
        <rect x="10" y="330" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="340" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Result</text>
        <rect x="120" y="330" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="130" y="340" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Sorted array</text>
        <rect x="10" y="370" width="100" height="50" fill="#4C5154" rx="10"/>
        <text x="20" y="380" font-size="14" font-family="Arial" fill="#2B5CE7" text-anchor="start">Study Tips</text>
        <rect x="10" y="410" width="400" height="30" fill="#F7F7F7" rx="10"/>
    </g>
    <g id="footer">
        <text x="15" y="390" font-size="16" font-family="Arial" fill="#2B5CE7" text-anchor="start">Study Tips</text>
    </g>
</svg>