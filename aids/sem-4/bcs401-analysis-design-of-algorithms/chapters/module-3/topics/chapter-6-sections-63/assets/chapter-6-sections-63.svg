<svg width="420" height="400" data-topic-id="chapter-6-sections-63">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64BFFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#2ECCFF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" opacity="0.5" />
  <title>Chapter 6: Analysis & Design of Algorithms</title>
  <section data-narration="Introduction to Algorithm Analysis">
    <rect x="0" y="50" width="420" height="100" fill="#fff" rx="10" />
    <text x="20" y="75" font-size="24" fill="#2ECCFF">Algorithm Analysis</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5000" begin="0s" repeatCount="indefinite" />
  </section>
  <section data-narration="Big O Notation">
    <rect x="0" y="170" width="420" height="100" fill="#fff" rx="10" />
    <text x="20" y="195" font-size="24" fill="#2ECCFF">Big O Notation</text>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 250" dur="5000" begin="0s" repeatCount="indefinite" />
    <text x="20" y="220" font-size="18" fill="#2ECCFF">
      O(1) - Constant Time Complexity
      <tspan x="20" y="240" font-size="18">O(log n) - Logarithmic Time Complexity</tspan>
      <tspan x="20" y="260" font-size="18">O(n) - Linear Time Complexity</tspan>
      <tspan x="20" y="280" font-size="18">O(n log n) - Linearithmic Time Complexity</tspan>
      <tspan x="20" y="300" font-size="18">O(n^2) - Quadratic Time Complexity</tspan>
    </text>
  </section>
  <section data-narration="Upper and Lower Bounds">
    <rect x="0" y="310" width="420" height="100" fill="#fff" rx="10" />
    <text x="20" y="335" font-size="24" fill="#2ECCFF">Upper and Lower Bounds</text>
    <animateTransform attributeName="transform" type="translate" from="0 350" to="0 400" dur="5000" begin="0s" repeatCount="indefinite" />
    <text x="20" y="370" font-size="18" fill="#2ECCFF">
      Upper bounds describe the maximum time an algorithm can take.
      <tspan x="20" y="390" font-size="18">Lower bounds describe the minimum time an algorithm must take.</tspan>
    </text>
  </section>
  <section data-narration="Example: Finding an Element in an Array">
    <rect x="0" y="410" width="420" height="100" fill="#fff" rx="10" />
    <text x="20" y="435" font-size="24" fill="#2ECCFF">Example: Finding an Element in an Array</text>
    <animateTransform attributeName="transform" type="translate" from="0 450" to="0 500" dur="5000" begin="0s" repeatCount="indefinite" />
    <text x="20" y="475" font-size="18" fill="#2ECCFF">
      <tspan x="20" y="495" font-size="18">- Iterate through the array.</tspan>
      <tspan x="20" y="515" font-size="18">- Compare the element to the target element.</tspan>
      <tspan x="20" y="535" font-size="18">- Repeat until the element is found or the end of the array is reached.</tspan>
    </text>
  </section>
  <footer data-narration="Chapter 6: Analysis & Design of Algorithms">
    <rect x="0" y="515" width="420" height="50" fill="#fff" rx="10" />
    <text x="20" y="530" font-size="18" fill="#2ECCFF">Chapter 6: Analysis & Design of Algorithms</text>
  </footer>
</svg>