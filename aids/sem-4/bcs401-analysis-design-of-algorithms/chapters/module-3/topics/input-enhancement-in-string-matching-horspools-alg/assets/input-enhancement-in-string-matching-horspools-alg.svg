      <path d="M 50 150 L 100 180 L 150 150 L 200 180 L 250 150 L 300 180 L 350 150 Z"/>
      <path d="M 50 200 L 100 230 L 150 200 L 200 230 L 250 200 L 300 230 L 350 200 Z"/>
      <path d="M 50 250 L 100 280 L 150 250 L 200 280 L 250 250 L 300 280 L 350 250 Z"/>
      <path d="M 50 300 L 100 320 L 150 300 L 200 320 L 250 300 L 300 320 L 350 300 Z"/>
