<svg width="420" height="400" data-topic-id="input-enhancement-in-string-matching-horspool-algorithm" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)"/>
  <title>Input Enhancement in String Matching: Horspool’s Algorithm</title>
  <g id="root" transform="translate(20, 50)">
    <g data-narration="Introduction to String Matching" transform="translate(0, -30)">
      <rect x="-10" y="0" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="0" fill="#2E4053" font-size="16">String Matching</text>
      <rect x="0" y="15" width="40" height="5" fill="#ADD8E6" rx="2"/>
      <text x="0" y="20" fill="#2E4053" font-size="14">A fundamental problem in computer science</text>
    </g>
    <g data-narration="What is Prefix Matching?" transform="translate(0, 50)">
      <rect x="-10" y="0" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="0" fill="#2E4053" font-size="16">Prefix Matching</text>
      <rect x="0" y="15" width="40" height="5" fill="#ADD8E6" rx="2"/>
      <text x="0" y="20" fill="#2E4053" font-size="14">A technique used in string matching</text>
      <animate transform="translate(10, 30)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="What is Horspool’s Algorithm?" transform="translate(0, 100)">
      <rect x="-10" y="0" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="0" fill="#2E4053" font-size="16">Horspool’s Algorithm</text>
      <rect x="0" y="15" width="40" height="5" fill="#ADD8E6" rx="2"/>
      <text x="0" y="20" fill="#2E4053" font-size="14">A string matching algorithm</text>
      <animate transform="translate(10, 40)" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="How Horspool’s Algorithm Works" transform="translate(0, 150)">
      <rect x="-10" y="0" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="0" fill="#2E4053" font-size="16">Preprocessing the target string</text>
      <rect x="0" y="15" width="40" height="5" fill="#ADD8E6" rx="2"/>
      <text x="0" y="20" fill="#2E4053" font-size="14">Creating a lookup table</text>
      <rect x="0" y="25" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="35" fill="#2E4053" font-size="14">Initializing the source and target pointers</text>
      <animate transform="translate(10, 60)" begin="1s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="The Lookup Table" transform="translate(0, 200)">
      <rect x="-10" y="0" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="0" fill="#2E4053" font-size="16">The lookup table</text>
      <rect x="0" y="15" width="40" height="5" fill="#ADD8E6" rx="2"/>
      <text x="0" y="20" fill="#2E4053" font-size="14">Maps each character to a position in the target string</text>
      <rect x="0" y="25" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="35" fill="#2E4053" font-size="14">For example, if the target string is "abcde"</text>
      <animate transform="translate(10, 70)" begin="1.5s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Animation" transform="translate(0, 250)">
      <rect x="-10" y="0" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="0" fill="#2E4053" font-size="16">Animation</text>
      <rect x="0" y="15" width="40" height="5" fill="#ADD8E6" rx="2"/>
      <text x="0" y="20" fill="#2E4053" font-size="14">Smooth animations using <animate> elements</text>
      <animate transform="translate(10, 90)" begin="2.5s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Conclusion" transform="translate(0, 300)">
      <rect x="-10" y="0" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="0" fill="#2E4053" font-size="16">Conclusion</text>
      <rect x="0" y="15" width="40" height="5" fill="#ADD8E6" rx="2"/>
      <text x="0" y="20" fill="#2E4053" font-size="14">Input enhancement in string matching using Horspool’s algorithm</text>
      <rect x="0" y="25" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="35" fill="#2E4053" font-size="14">A fundamental concept in computer science</text>
      <animate transform="translate(10, 120)" begin="3s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g data-narration="Footer" transform="translate(0, 350)">
      <rect x="-10" y="0" width="40" height="10" fill="#ADD8E6" rx="2"/>
      <text x="0" y="0" fill="#2E4053" font-size="16">Footer</text>
      <rect x="0" y="15" width="40" height="5" fill="#ADD8E6" rx="2"/>
      <text x="0" y="20" fill="#2E4053" font-size="14">Copyright 2023</text>
    </g>
    <g>
