<svg width="420" height="400" data-topic-id="chapter-7-sections-71">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Open Sans" font-weight="bold" text-anchor="middle" fill="#3498db">
    Balanced Binary Search Trees
  </text>

  <!-- Section 1: Definition -->
  <section data-narration="Definition: A balanced binary search tree is a binary tree where for each node, the number of nodes in its left and right subtrees is approximately equal.">
    <rect x="10" y="50" width="400" height="30" fill="#f5f5f5" rx="5" />
    <text x="20" y="60" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      Definition:
    </text>
    <text x="20" y="80" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      A balanced binary search tree is a binary tree where for each node, the number of nodes in its left and right subtrees is approximately equal.
    </text>
  </section>

  <!-- Section 2: AVL Tree -->
  <section data-narration="AVL Tree: An AVL tree is a self-balancing binary search tree where the difference between the heights of the left and right subtrees of any node is at most 1.">
    <rect x="10" y="120" width="400" height="30" fill="#f5f5f5" rx="5" />
    <text x="20" y="130" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      AVL Tree:
    </text>
    <text x="20" y="160" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      An AVL tree is a self-balancing binary search tree where the difference between the heights of the left and right subtrees of any node is at most 1.
    </text>
    <rect x="50" y="130" width="10" height="10" fill="#3498db" rx="2" />
    <text x="60" y="140" font-size="18" font-family="Open Sans" text-anchor="start" fill="#ffffff">
      +
    </text>
    <text x="50" y="160" font-size="18" font-family="Open Sans" text-anchor="start" fill="#3498db" dominant-baseline="hanging">
      -
    </text>
  </section>

  <!-- Section 3: Red-Black Tree -->
  <section data-narration="Red-Black Tree: A red-black tree is a self-balancing binary search tree that uses a color-coding system to keep the tree balanced.">
    <rect x="10" y="210" width="400" height="30" fill="#f5f5f5" rx="5" />
    <text x="20" y="220" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      Red-Black Tree:
    </text>
    <text x="20" y="250" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      A red-black tree is a self-balancing binary search tree that uses a color-coding system to keep the tree balanced.
    </text>
    <rect x="50" y="220" width="10" height="10" fill="#e74c3c" rx="2" />
    <text x="60" y="230" font-size="18" font-family="Open Sans" text-anchor="start" fill="#ffffff">
      R
    </text>
    <text x="50" y="250" font-size="18" font-family="Open Sans" text-anchor="start" fill="#e74c3c" dominant-baseline="hanging">
      B
    </text>
  </section>

  <!-- Section 4: Properties -->
  <section data-narration="Properties of Balanced Binary Search Trees: Height, Balance Factor, Balancing Factor, Search, Insert, Delete.">
    <rect x="10" y="290" width="400" height="30" fill="#f5f5f5" rx="5" />
    <text x="20" y="300" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      Properties of Balanced Binary Search Trees:
    </text>
    <text x="20" y="330" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      Height, Balance Factor, Balancing Factor, Search, Insert, Delete.
    </text>
  </section>

  <!-- Section 5: Example -->
  <section data-narration="Example: AVL Tree">
    <rect x="10" y="370" width="400" height="30" fill="#f5f5f5" rx="5" />
    <text x="20" y="380" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      Example:
    </text>
    <rect x="50" y="380" width="10" height="10" fill="#3498db" rx="2" />
    <text x="60" y="390" font-size="18" font-family="Open Sans" text-anchor="start" fill="#ffffff">
      AVL
    </text>
    <text x="50" y="400" font-size="18" font-family="Open Sans" text-anchor="start" fill="#3498db" dominant-baseline="hanging">
      Tree
    </text>
  </section>

  <!-- Section 6: Operations -->
  <section data-narration="Operations on Balanced Binary Search Trees: Search, Insert, Delete.">
    <rect x="10" y="460" width="400" height="30" fill="#f5f5f5" rx="5" />
    <text x="20" y="470" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      Operations on Balanced Binary Search Trees:
    </text>
    <text x="20" y="500" font-size="18" font-family="Open Sans" text-anchor="start" fill="#666" dominant-baseline="hanging">
      Search, Insert, Delete.
    </text>
  </section>

  <!-- Footer -->
  <text x="50%" y="420" font-size="18" font-family="Open Sans" text-anchor="middle" fill="#666">
