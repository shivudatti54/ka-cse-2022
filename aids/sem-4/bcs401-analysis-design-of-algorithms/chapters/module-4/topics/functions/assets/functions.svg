<svg width="420" height="400" data-topic-id="functions" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="functions-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6495ED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#functions-gradient)"/>
  
  <!-- Title at top -->
  <text x="180" y="20" fill="#4682B4" font-size="24" font-family="Arial" text-anchor="middle">Functions</text>
  
  <!-- Section 1: Domain (A) -->
  <rect x="50" y="100" width="320" height="40" fill="#F5F5F5" rx="10"/>
  <g transform="translate(70, 110)">
    <text x="0" y="0" fill="#333" font-size="18" font-family="Arial">Domain (A)</text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 100" to="0 200" dur="3s" begin="-1s"/>
  
  <!-- Section 2: Function f -->
  <rect x="50" y="180" width="320" height="40" fill="#F5F5F5" rx="10"/>
  <g transform="translate(70, 190)">
    <text x="0" y="0" fill="#333" font-size="18" font-family="Arial">Function f</text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 180" to="0 280" dur="3s" begin="-1s"/>
  
  <!-- Section 3: Codomain (B) -->
  <rect x="50" y="260" width="320" height="40" fill="#F5F5F5" rx="10"/>
  <g transform="translate(70, 270)">
    <text x="0" y="0" fill="#333" font-size="18" font-family="Arial">Codomain (B)</text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 260" to="0 360" dur="3s" begin="-1s"/>
  
  <!-- Section 4: Example - Injective Function -->
  <rect x="50" y="340" width="320" height="40" fill="#F5F5F5" rx="10"/>
  <g transform="translate(70, 340)">
    <text x="0" y="0" fill="#333" font-size="18" font-family="Arial">Injective Function</text>
    <line x1="70" y1="350" x2="300" y2="350" stroke="#4682B4" stroke-width="2"/>
    <line x1="70" y1="370" x2="300" y2="370" stroke="#4682B4" stroke-width="2"/>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 340" to="0 440" dur="3s" begin="-1s"/>
  
  <!-- Section 5: Example - Surjective Function -->
  <rect x="50" y="400" width="320" height="40" fill="#F5F5F5" rx="10"/>
  <g transform="translate(70, 400)">
    <text x="0" y="0" fill="#333" font-size="18" font-family="Arial">Surjective Function</text>
    <line x1="70" y1="410" x2="300" y2="410" stroke="#4682B4" stroke-width="2"/>
    <line x1="70" y1="430" x2="300" y2="430" stroke="#4682B4" stroke-width="2"/>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 400" to="0 500" dur="3s" begin="-1s"/>
  
  <!-- Footer at bottom -->
  <text x="180" y="420" fill="#4682B4" font-size="18" font-family="Arial" text-anchor="middle">Functions</text>
</svg>