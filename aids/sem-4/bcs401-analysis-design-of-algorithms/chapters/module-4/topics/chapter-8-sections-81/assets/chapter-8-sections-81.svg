<svg width="420" height="400" data-topic-id="dynamic-programming-three-basic-examples-and-memory" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background: linear-gradient(to bottom, #C7B8EA, #87CEEB);">
    <title>Chapter 8: Dynamic Programming - Three Basic Examples and Memory</title>
    <desc>Animated Educational SVG Diagram for Dynamic Programming - Three Basic Examples</desc>
    <defs>
        <linearGradient id="background-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <style>
        .section {
            margin-bottom: 20px;
        }
        .section:last-child {
            margin-bottom: 0;
        }
        .navigation {
            fill: #66CCCC;
            stroke: #66CCCC;
            stroke-width: 2;
        }
        .arrow {
            fill: #FF9900;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .footer {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-top: 20px;
        }
    </style>
    <g id="diagram">
        <!-- Background Gradient -->
        <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)"/>
        
        <!-- Section 1: Introduction to Dynamic Programming -->
        <g class="section">
            <rect x="0" y="0" width="400" height="100" fill="#F7F7F7" rx="10"/>
            <rect x="20" y="20" width="360" height="60" fill="#F7F7F7" rx="10"/>
            <text x="20" y="50" class="title" style="font-size: 20px; font-weight: bold;">Introduction to Dynamic Programming</text>
            <text x="20" y="150" class="data-narration">Dynamic programming is a method for solving complex problems by breaking them down into smaller subproblems, solving each subproblem only once, and storing the solutions to subproblems to avoid redundant computation.</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" begin="0s" dur="2s" repeatCount="indefinite"/>
        </g>
        
        <!-- Section 2: Key Concepts -->
        <g class="section">
            <rect x="0" y="110" width="400" height="100" fill="#F7F7F7" rx="10"/>
            <rect x="20" y="130" width="360" height="60" fill="#F7F7F7" rx="10"/>
            <text x="20" y="160" class="title" style="font-size: 20px; font-weight: bold;">Key Concepts</text>
            <text x="20" y="200" class="data-narration">Optimal substructure and overlapping subproblems are essential for dynamic programming.</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" begin="2s" dur="2s" repeatCount="indefinite"/>
        </g>
        
        <!-- Section 3: Memoization -->
        <g class="section">
            <rect x="0" y="220" width="400" height="100" fill="#F7F7F7" rx="10"/>
            <rect x="20" y="240" width="360" height="60" fill="#F7F7F7" rx="10"/>
            <text x="20" y="270" class="title" style="font-size: 20px; font-weight: bold;">Memoization</text>
            <text x="20" y="300" class="data-narration">Memoization is the process of storing the solutions to subproblems in a memory to avoid redundant computation.</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" begin="4s" dur="2s" repeatCount="indefinite"/>
        </g>
        
        <!-- Section 4: Fibonacci Series -->
        <g class="section">
            <rect x="0" y="330" width="400" height="100" fill="#F7F7F7" rx="10"/>
            <rect x="20" y="350" width="360" height="60" fill="#F7F7F7" rx="10"/>
            <text x="20" y="380" class="title" style="font-size: 20px; font-weight: bold;">Fibonacci Series</text>
            <text x="20" y="410" class="data-narration">The Fibonacci series is a classic example of a dynamic programming problem.</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" begin="6s" dur="2s" repeatCount="indefinite"/>
        </g>
        
        <!-- Section 5: Longest Common Subsequence (LCS) -->
        <g class="section">
            <rect x="0" y="440" width="400" height="100" fill="#F7F7F7" rx="10"/>
            <rect x="20" y="460" width="360" height="60" fill="#F7F7F7" rx="10"/>
            <text x="20" y="490" class="title" style="font-size: 20px; font-weight: bold;">Longest Common Subsequence (LCS)</text>
            <text x="20" y="520" class="data-narration">The LCS problem is to find the longest common subsequence between two sequences.</text>
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-100" begin="8s" dur="2s" repeatCount="indefinite"/>
        </g>
        
        <!-- Footer -->
        <text x="20" y="460" class="footer" style="font-size: 14px; color: #666;">Dynamic Programming - Three Basic Examples and Memory</text>
    </g>
</svg>