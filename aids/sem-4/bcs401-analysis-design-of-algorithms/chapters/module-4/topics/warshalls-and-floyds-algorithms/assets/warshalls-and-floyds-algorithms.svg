<svg width="420" height="400" data-topic-id="warshalls-and-floyds-algorithms">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <g transform="translate(20, 20)">
    <text x="0" y="20" font-size="30" font-family="Arial" fill="#2F4F7F" text-anchor="middle">
      Warshalls And Floyds Algorithms
    </text>
  </g>
  
  <!-- Introduction -->
  <g transform="translate(20, 70)">
    <rect x="0" y="-20" width="400" height="40" fill="#F7F7F7" rx="10"/>
    <text x="20" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Introduction
    </text>
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Warshall's and Floyd's algorithms are two fundamental algorithms in graph theory and computer science. They are used to find the shortest path between all pairs of vertices in a weighted graph.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="0s"dur="5s" from="translate(20, 70)" to="translate(20, 105)" opacity="0.5"/>
  </g>
  
  <!-- Warshall's Algorithm -->
  <g transform="translate(20, 120)">
    <rect x="0" y="-20" width="400" height="40" fill="#F7F7F7" rx="10"/>
    <text x="20" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Warshall's Algorithm
    </text>
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Warshall's algorithm is an algorithm in graph theory that finds the shortest path between all pairs of vertices in a weighted graph.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="0s" dur="5s" from="translate(20, 120)" to="translate(20, 155)" opacity="0.5"/>
    <rect x="50" y="80" width="20" height="20" fill="#8BC34A"/>
    <text x="70" y="85" font-size="12" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Definition
    </text>
    <text x="70" y="115" font-size="12" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Warshall's algorithm is an algorithm in graph theory that finds the shortest path between all pairs of vertices in a weighted graph.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="1s" dur="5s" from="translate(70, 85)" to="translate(70, 120)" opacity="0.5"/>
  </g>
  
  <!-- Explanation -->
  <g transform="translate(20, 165)">
    <rect x="0" y="-20" width="400" height="40" fill="#F7F7F7" rx="10"/>
    <text x="20" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Explanation
    </text>
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      The algorithm starts by initializing a distance matrix, where the entry d[i][j] represents the shortest distance from vertex i to vertex j.
    </text>
    <text x="20" y="90" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      The algorithm then scans the graph and updates the distance matrix. For each vertex k, it checks if the path from vertex i to vertex j through vertex k is shorter than the current shortest distance.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="2s" dur="5s" from="translate(20, 165)" to="translate(20, 200)" opacity="0.5"/>
  </g>
  
  <!-- Example -->
  <g transform="translate(20, 225)">
    <rect x="0" y="-20" width="400" height="40" fill="#F7F7F7" rx="10"/>
    <text x="20" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Example
    </text>
    <rect x="50" y="80" width="20" height="20" fill="#8BC34A"/>
    <text x="70" y="85" font-size="12" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Graph
    </text>
    <text x="70" y="115" font-size="12" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Weighted Graph
    </text>
    <rect x="50" y="145" width="20" height="20" fill="#8BC34A"/>
    <text x="70" y="150" font-size="12" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Distance Matrix
    </text>
    <text x="70" y="180" font-size="12" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Initialize a distance matrix, where the entry d[i][j] represents the shortest distance from vertex i to vertex j.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="3s" dur="5s" from="translate(70, 150)" to="translate(70, 185)" opacity="0.5"/>
  </g>
  
  <!-- Floyd's Algorithm -->
  <g transform="translate(20, 255)">
    <rect x="0" y="-20" width="400" height="40" fill="#F7F7F7" rx="10"/>
    <text x="20" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Floyd's Algorithm
    </text>
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Floyd's algorithm is an algorithm in graph theory that finds the shortest path between all pairs of vertices in a weighted graph.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="4s" dur="5s" from="translate(20, 255)" to="translate(20, 290)" opacity="0.5"/>
    <rect x="50" y="320" width="20" height="20" fill="#8BC34A"/>
    <text x="70" y="325" font-size="12" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Definition
    </text>
    <text x="70" y="355" font-size="12" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Floyd's algorithm is an algorithm in graph theory that finds the shortest path between all pairs of vertices in a weighted graph.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="5s" dur="5s" from="translate(70, 325)" to="translate(70, 360)" opacity="0.5"/>
  </g>
  
  <!-- Key Concepts -->
  <g transform="translate(20, 305)">
    <rect x="0" y="-20" width="400" height="40" fill="#F7F7F7" rx="10"/>
    <text x="20" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Key Concepts
    </text>
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Warshall's algorithm is an algorithm in graph theory that finds the shortest path between all pairs of vertices in a weighted graph.
    </text>
    <text x="20" y="90" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Floyd's algorithm is an algorithm in graph theory that finds the shortest path between all pairs of vertices in a weighted graph.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="6s" dur="5s" from="translate(20, 305)" to="translate(20, 340)" opacity="0.5"/>
  </g>
  
  <!-- Applications -->
  <g transform="translate(20, 345)">
    <rect x="0" y="-20" width="400" height="40" fill="#F7F7F7" rx="10"/>
    <text x="20" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Applications
    </text>
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">
      Warshall's and Floyd's algorithms have many applications in computer science, such as network routing, data analysis, and machine learning.
    </text>
    <animate-transform attributeName="transform" type="translate" begin="7s" dur="5s" from="translate(20, 345)" to="translate(20, 380)" opacity="0.5"/>
  </g>
  
