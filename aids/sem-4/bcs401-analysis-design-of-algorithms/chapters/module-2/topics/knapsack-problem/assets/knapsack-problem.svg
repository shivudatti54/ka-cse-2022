<svg width="420" height="400" data-topic-id="Knapsack-Problem">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="50%" stop-color="#FFC0CB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <text x="50" y="70" font-size="24" font-family="Arial" text-anchor="middle" style="fill-color: #2E4053">Branch and Bound for 0/1 Knapsack Problem</text>
  <rect x="15" y="100" width="340" height="50" fill="#F7F7F7" rx="5" />
  <animate transform="translate(15, 100) rotate(0) scale(1) rotateX(0) rotateY(0)" begin="0s" dur="2s" fill="freeze" />
  <text x="15" y="120" font-size="16" font-family="Arial" text-anchor="start" style="fill-color: #2E4053" data-narration="Branching: Divide the problem into smaller subproblems">Branching</text>
  <g transform="translate(15, 150)">
    <line x1="20" y1="50" x2="300" y2="50" stroke="#3498DB" stroke-width="2" />
    <line x1="20" y1="50" x2="20" y2="50" stroke="#3498DB" stroke-width="2" />
    <line x1="300" y1="50" x2="300" y2="50" stroke="#3498DB" stroke-width="2" />
    <line x1="20" y1="50" x2="20" y2="50" stroke="#3498DB" stroke-width="2" />
    <rect x="25" y="60" width="250" height="30" fill="#F7F7F7" rx="5" />
    <animate transform="translate(25, 60) scale(1) rotate(0) rotateX(0) rotateY(0)" begin="0.5s" dur="1s" fill="freeze" />
    <text x="25" y="80" font-size="16" font-family="Arial" text-anchor="start" style="fill-color: #2E4053" data-narration="Subproblem: Explore smaller subproblems">Subproblem</text>
  </g>
  <rect x="15" y="200" width="340" height="50" fill="#F7F7F7" rx="5" />
  <animate transform="translate(15, 200) rotate(0) scale(1) rotateX(0) rotateY(0)" begin="1.5s" dur="2s" fill="freeze" />
  <text x="15" y="220" font-size="16" font-family="Arial" text-anchor="start" style="fill-color: #2E4053" data-narration="Bounding: Calculate an upper bound for the best possible solution">Bounding</text>
  <g transform="translate(15, 250)">
    <line x1="20" y1="70" x2="300" y2="70" stroke="#2E4053" stroke-width="2" />
    <line x1="20" y1="70" x2="20" y2="70" stroke="#2E4053" stroke-width="2" />
    <line x1="300" y1="70" x2="300" y2="70" stroke="#2E4053" stroke-width="2" />
    <line x1="20" y1="70" x2="20" y2="70" stroke="#2E4053" stroke-width="2" />
    <rect x="25" y="80" width="250" height="30" fill="#F7F7F7" rx="5" />
    <animate transform="translate(25, 80) scale(1) rotate(0) rotateX(0) rotateY(0)" begin="1.5s" dur="1s" fill="freeze" />
    <text x="25" y="100" font-size="16" font-family="Arial" text-anchor="start" style="fill-color: #2E4053" data-narration="Prune branches that cannot lead to an optimal solution">Prune</text>
  </g>
  <rect x="15" y="300" width="340" height="50" fill="#F7F7F7" rx="5" />
  <animate transform="translate(15, 300) rotate(0) scale(1) rotateX(0) rotateY(0)" begin="2.5s" dur="2s" fill="freeze" />
  <text x="15" y="320" font-size="16" font-family="Arial" text-anchor="start" style="fill-color: #2E4053" data-narration="Repeat the process until an optimal solution is found">Repeat</text>
  <g transform="translate(15, 350)">
    <line x1="20" y1="80" x2="300" y2="80" stroke="#2E4053" stroke-width="2" />
    <line x1="20" y1="80" x2="20" y2="80" stroke="#2E4053" stroke-width="2" />
    <line x1="300" y1="80" x2="300" y2="80" stroke="#2E4053" stroke-width="2" />
    <line x1="20" y1="80" x2="20" y2="80" stroke="#2E4053" stroke-width="2" />
    <rect x="25" y="90" width="250" height="30" fill="#F7F7F7" rx="5" />
    <animate transform="translate(25, 90) scale(1) rotate(0) rotateX(0) rotateY(0)" begin="2.5s" dur="1s" fill="freeze" />
    <text x="25" y="110" font-size="16" font-family="Arial" text-anchor="start" style="fill-color: #2E4053" data-narration="Optimal Solution: The solution with the maximum value is the optimal solution">Optimal Solution</text>
  </g>
  <rect x="15" y="400" width="340" height="50" fill="#F7F7F7" rx="5" />
  <animate transform="translate(15, 400) rotate(0) scale(1) rotateX(0) rotateY(0)" begin="3.5s" dur="2s" fill="freeze" />
  <text x="15" y="420" font-size="16" font-family="Arial" text-anchor="middle" style="fill-color: #2E4053" data-narration="The Branch and Bound algorithm is a systematic approach to solving the 0/1 Knapsack Problem">The Branch and Bound algorithm</text>
  <text x="15" y="450" font-size="16" font-family="Arial" text-anchor="middle" style="fill-color: #2E4053" data-narration="is a state-space search algorithm that explores candidate solutions systematically">is a state-space search algorithm</text>
  <text x="15" y="480" font-size="16" font-family="Arial" text-anchor="middle" style="fill-color: #2E4053" data-narration="that offers an efficient solution for the 0/1 Knapsack Problem with pseudo-polynomial time complexity O(nW)">that offers an efficient solution for the 0/1 Knapsack Problem with pseudo-polynomial time complexity O(nW)</text>
  <text x="15" y="510" font-size="16" font-family="Arial" text-anchor="middle" style="fill-color: #2E4053" data-narration="with pseudo-polynomial time complexity O(nW), especially for large capacity values, by systematically exploring the solution space and pruning branches that cannot lead to an optimal solution.">with pseudo-polynomial time complexity O(nW), especially for large capacity values, by systematically exploring the solution space and pruning branches that cannot lead to an optimal solution.</text>
</svg>