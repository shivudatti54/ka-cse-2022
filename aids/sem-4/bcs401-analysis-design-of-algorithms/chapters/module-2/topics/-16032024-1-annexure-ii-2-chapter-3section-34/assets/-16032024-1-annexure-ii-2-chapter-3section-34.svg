<svg width="420" height="400" data-topic-id="travelling-salesman-problem-exhaustive-search">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>

  <title>Exhaustive Search: A Brute Force Approach to the Travelling Salesman Problem</title>

  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <text x="20" y="30" font-size="16" font-family="Arial, sans-serif" font-weight="bold" fill="#2F4F7F">Introduction</text>

  <section id="definition" data-narration="Definition of Exhaustive Search">
    <rect x="10" y="60" width="380" height="40" fill="#F7F7F7" rx="10" />
    <text x="15" y="70" font-size="14" font-family="Arial, sans-serif" fill="#666666">Exhaustive search is a brute force approach to solve the Travelling Salesman Problem (TSP).</text>
  </section>

  <section id="how-it-works" data-narration="How Exhaustive Search Works">
    <rect x="10" y="120" width="380" height="40" fill="#F7F7F7" rx="10" />
    <animate xlink:href="#arrow" begin="100ms" dur="500ms" fill="freeze" />
    <animate xlink:href="#circle" begin="150ms" dur="500ms" fill="freeze" />
    <text x="15" y="170" font-size="14" font-family="Arial, sans-serif" fill="#666666">Here's how it works:
      <tspan x="15" y="190">Step 1: Generate all permutations</tspan>
      <tspan x="15" y="210">Step 2: Calculate total distance</tspan>
      <tspan x="15" y="230">Step 3: Evaluate permutations</tspan>
      <tspan x="15" y="250">Step 4: Select the shortest permutation</tspan>
    </text>
  </section>

  <section id="algorithm" data-narration="Exhaustive Search Algorithm">
    <rect x="10" y="290" width="380" height="40" fill="#F7F7F7" rx="10" />
    <animate xlink:href="#arrow" begin="100ms" dur="500ms" fill="freeze" />
    <animate xlink:href="#circle" begin="150ms" dur="500ms" fill="freeze" />
    <text x="15" y="340" font-size="14" font-family="Arial, sans-serif" fill="#666666">Algorithm:
      <tspan x="15" y="360">Step 1: Generate all permutations</tspan>
      <tspan x="15" y="380">Step 2: Calculate total distance</tspan>
      <tspan x="15" y="400">Step 3: Evaluate permutations</tspan>
      <tspan x="15" y="420">Step 4: Select the shortest permutation</tspan>
    </text>
  </section>

  <section id="example" data-narration="Example of Exhaustive Search">
    <rect x="10" y="390" width="380" height="40" fill="#F7F7F7" rx="10" />
    <animate xlink:href="#arrow" begin="100ms" dur="500ms" fill="freeze" />
    <animate xlink:href="#circle" begin="150ms" dur="500ms" fill="freeze" />
    <text x="15" y="430" font-size="14" font-family="Arial, sans-serif" fill="#666666">Example:
      <tspan x="15" y="450">Generate all permutations of cities and select the one with the shortest total distance</tspan>
  </section>

  <footer>
    <text x="10" y="410" font-size="14" font-family="Arial, sans-serif" fill="#666666">Data-Topic-Id: travelling-salesman-problem-exhaustive-search</text>
  </footer>

  <symbol id="arrow" viewBox="0 0 10 10">
    <path d="M 0 0 L 10 0 L 5 5 Z" fill="#2F4F7F" />
  </symbol>

  <symbol id="circle" viewBox="0 0 10 10">
    <circle cx="5" cy="5" r="4" fill="#2F4F7F" />
  </symbol>
</svg>