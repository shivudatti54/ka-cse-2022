      Suppose we have an array of integers `[5, 2, 8, 1, 9]`.
      We'll perform insertion sort on this array.
      1. Start with the first element `5`.
      2. Compare `5` with `2`. Since `2` is smaller, shift `5` to the right.
      ...
    </text>
