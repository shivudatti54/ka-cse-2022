    <text x="50" y="40" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Insertion Sort</text>
  </section>
  
  <section data-narration="Key Concepts Insertion Sort Algorithm">
    <rect x="20" y="140" width="380" height="100" style="fill: #f0f0f0; stroke: #333; stroke-width: 2"/>
    <text x="50" y="160" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Insertion Sort Algorithm:</text>
    <text x="50" y="180" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
      Works by iterating through the input array one element at a time.
      For each element, it shifts all elements greater than the current element to the right.
      Then, it inserts the current element into its correct position within the sorted portion of the array.
    </text>
  </section>
  
  <section data-narration="Key Concepts Decrease and Conquer">
    <rect x="20" y="240" width="380" height="100" style="fill: #f0f0f0; stroke: #333; stroke-width: 2"/>
    <text x="50" y="260" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Decrease and Conquer:</text>
    <text x="50" y="280" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
      This approach involves dividing the problem into smaller sub-problems and solving each one recursively.
    </text>
  </section>
  
  <section data-narration="How Insertion Sort Works Step-by-Step Explanation">
    <rect x="20" y="340" width="380" height="100" style="fill: #f0f0f0; stroke: #333; stroke-width: 2"/>
    <text x="50" y="360" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Step-by-Step Explanation:</text>
    <rect x="20" y="380" width="380" height="20" style="fill: #f0f0f0; stroke: #333; stroke-width: 2"/>
    <text x="50" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
      1. Start at the beginning of the array.
      2. Compare the current element with the next element.
      3. Shift elements to the right until the correct position is found.
      4. Insert the current element into its correct position.
      5. Repeat the process for the remaining elements.
    </text>
  </section>
  
  <section data-narration="How Insertion Sort Works Example Walkthrough">
