  <rect x="20" y="520" width="380" height="20" style="fill: #f0f0f0; stroke: #333; stroke-width: 2"/>
  <text x="50" y="540" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Insertion Sort is efficient for small data sets and has a time complexity of O(n^2).</text>
  
  <rect x="20" y="560" width="380" height="20" style="fill: #f0f0f0; stroke: #333; stroke-width: 2"/>
  <text x="50" y="580" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
    Insertion Sort is suitable for scenarios where the data size is relatively small.
  </text>
  
  <rect x="20" y="600" width="380" height="20" style="fill: #f0f0f0; stroke: #333; stroke-width: 2"/>
  <text x="50" y="620" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
    It is a simple sorting algorithm that works by dividing the input into a sorted and an unsorted region.
  </text>
  
  <rect x="20" y="650" width="380" height="20" style="fill: #f0f0f0; stroke: #333; stroke-width: 2"/>
  <text x="50" y="670" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
    Each subsequent element from the unsorted region is inserted into the sorted region in its correct position.
  </text>
  
