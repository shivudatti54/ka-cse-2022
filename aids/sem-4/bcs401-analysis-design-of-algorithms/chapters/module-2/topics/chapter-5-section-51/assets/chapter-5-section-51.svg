    <rect x="0" y="0" width="420" height="400" fill="rgba(135, 206, 250, 0.6)" rx="10" opacity="0.3" />

    <!-- Section 1: Definition of Exhaustive Search -->
    <section data-narration="Define Exhaustive Search">
        <rect x="10" y="20" width="400" height="50" fill="#FFF" rx="10" />
        <text x="20" y="30" fill="#000" font-size="18">Exhaustive search is a brute force approach that involves checking all possible solutions to a problem.</text>
        <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" attributeName="opacity" from="0.5" to="1" repeatCount="indefinite" />
    </section>

    <!-- Section 2: How Exhaustive Search Works -->
    <section data-narration="How Exhaustive Search Works">
        <rect x="10" y="80" width="400" height="50" fill="#FFF" rx="10" />
        <text x="20" y="90" fill="#000" font-size="18">The exhaustive search algorithm works as follows:</text>
        <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" attributeName="opacity" from="0.5" to="1" repeatCount="infinite" />
        <line x1="20" y1="100" x2="20" y2="120" stroke="#000" stroke-width="2" />
        <line x1="20" y1="100" x2="380" y2="120" stroke="#000" stroke-width="2" />
        <animate xmlns="http://www.w3.org/2000/svg" begin="0.5s" dur="1s" attributeName="stroke-dasharray" from="1,1" to="5,5" repeatCount="infinite" />
    </section>

    <!-- Section 3: Example - Traveling Salesman Problem -->
    <section data-narration="Example: Traveling Salesman Problem">
        <rect x="10" y="150" width="400" height="50" fill="#FFF" rx="10" />
        <text x="20" y="160" fill="#000" font-size="18">The traveling salesman problem is an example of a problem that can be solved using exhaustive search.</text>
        <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" attributeName="opacity" from="0.5" to="1" repeatCount="infinite" />
        <circle cx="20" cy="170" r="10" fill="#000" />
        <circle cx="380" cy="170" r="10" fill="#000" />
        <animate xmlns="http://www.w3.org/2000/svg" begin="0.5s" dur="1s" attributeName="cx" from="20" to="380" />
    </section>

    <!-- Section 4: Pseudocode for Exhaustive Search -->
    <section data-narration="Pseudocode for Exhaustive Search">
        <rect x="10" y="220" width="400" height="50" fill="#FFF" rx="10" />
        <text x="20" y="230" fill="#000" font-size="18">function exhaustiveSearch(cities, distances, startCity):</text>
        <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" attributeName="opacity" from="0.5" to="1" repeatCount="infinite" />
