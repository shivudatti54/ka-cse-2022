        <line x1="20" y1="240" x2="380" y2="260" stroke="#000" stroke-width="2" />
        <animate xmlns="http://www.w3.org/2000/svg" begin="0.5s" dur="1s" attributeName="stroke-dasharray" from="1,1" to="5,5" repeatCount="infinite" />
    </section>

