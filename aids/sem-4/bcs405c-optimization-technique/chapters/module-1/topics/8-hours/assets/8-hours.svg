  <text x="50%" y="450" font-size="18" text-anchor="middle" fill="#666" data-narration="Gradient Descent Method">
    The gradient descent method is a widely used technique for optimization.
  </text>
  <text x="50%" y="470" font-size="18" text-anchor="middle" fill="#666" data-narration="It involves iteratively updating the vector that represents the solution, using the gradient of the scalar function.">
