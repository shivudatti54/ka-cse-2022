  <text x="50%" y="150" font-size="18" text-anchor="middle" fill="#666" data-narration="Definition of Optimization">
    Optimization
  </text>
  <text x="50%" y="170" font-size="18" text-anchor="middle" fill="#666" data-narration="Optimization is the process of finding the best solution among a set of possible solutions, subject to certain constraints.">
    is the process of finding the best solution among a set of possible solutions, subject to certain constraints.
  </text>
  
  <!-- Section 2: Importance of Optimization -->
  <rect x="50" y="250" width="320" height="100" fill="#f7f7f7" rx="10" />
  <animate transform="rotate(45 50 250)" attributeName="transform" dur="1000" begin="2000" repeatCount="indefinite" />
  <text x="50%" y="300" font-size="18" text-anchor="middle" fill="#666" data-narration="Importance of Optimization">
    Optimization is crucial in various fields, including physics, engineering, economics, and computer science.
  </text>
  <text x="50%" y="320" font-size="18" text-anchor="middle" fill="#666" data-narration="It has numerous applications, such as finding the shortest path between two points, maximizing profit or revenue, minimizing cost or energy consumption, and optimal control of systems.">
