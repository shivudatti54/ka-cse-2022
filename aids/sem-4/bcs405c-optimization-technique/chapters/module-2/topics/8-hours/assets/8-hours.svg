<svg width="420" height="400" data-topic-id="8-hours-optimization-technique">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFC67D" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title and footer -->
  <text x="10" y="10" text-anchor="start" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">8 Hours Optimization Technique</text>
  <text x="10" y="390" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Learn about optimization techniques</text>

  <!-- Section 1: Introduction -->
  <rect x="20" y="50" width="380" height="50" fill="url(#gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,100" dur="1000" begin="0s" delay="0s"/>
    <text x="20" y="70" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">What is 8 Hours Optimization Technique?</text>
    <text x="20" y="90" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" data-narration="The 8 Hours optimization technique is a method used to find the optimal solution by applying vector calculus concepts.">The 8 Hours optimization technique is a method used to find the optimal solution by applying vector calculus concepts.</text>
  </rect>

  <!-- Section 2: Definition of Optimization Techniques -->
  <rect x="20" y="120" width="380" height="50" fill="url(#gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,120" to="0,170" dur="1000" begin="0s" delay="0s"/>
    <text x="20" y="140" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Definition of Optimization Techniques</text>
    <text x="20" y="160" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Optimization techniques are used to find the optimal solution by minimizing or maximizing a function subject to certain constraints.">Optimization techniques are used to find the optimal solution by minimizing or maximizing a function subject to certain constraints.</text>
  </rect>

  <!-- Section 3: Types of Optimization Problems -->
  <rect x="20" y="170" width="380" height="50" fill="url(#gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,170" to="0,220" dur="1000" begin="0s" delay="0s"/>
    <text x="20" y="190" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Types of Optimization Problems</text>
    <text x="20" y="210" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" data-narration="There are two types of optimization problems: minimization problem and maximization problem.">There are two types of optimization problems: minimization problem and maximization problem.</text>
  </rect>

  <!-- Section 4: Key Concepts -->
  <rect x="20" y="250" width="380" height="50" fill="url(#gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,250" to="0,290" dur="1000" begin="0s" delay="0s"/>
    <text x="20" y="270" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Key Concepts</text>
    <text x="20" y="290" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" data-narration="Key concepts include constraint, objective function, gradient, and Hessian matrix.">Key concepts include constraint, objective function, gradient, and Hessian matrix.</text>
  </rect>

  <!-- Section 5: 8 Hours Optimization Technique Formula -->
  <rect x="20" y="310" width="380" height="50" fill="url(#gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,310" to="0,350" dur="1000" begin="0s" delay="0s"/>
    <text x="20" y="330" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">8 Hours Optimization Technique Formula</text>
    <text x="20" y="350" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" data-narration="The 8 Hours optimization technique is based on the following formula: f(x) = a1 + b1*t + c1*t^2 + ... + an*t^n.">The 8 Hours optimization technique is based on the following formula: f(x) = a1 + b1*t + c1*t^2 + ... + an*t^n.</text>
  </rect>

  <!-- Section 6: How to Apply the 8 Hours Optimization Technique -->
  <rect x="20" y="390" width="380" height="50" fill="url(#gradient)" rx="10">
    <animateTransform attributeName="transform" type="translate" from="0,390" to="0,430" dur="1000" begin="0s" delay="0s"/>
    <text x="20" y="410" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">How to Apply the 8 Hours Optimization Technique</text>
    <text x="20" y="430" text-anchor="start" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" data-narration="To apply the 8 Hours optimization technique, follow these steps: find the minimum or maximum value of a function subject to certain constraints.">To apply the 8 Hours optimization technique, follow these steps: find the minimum or maximum value of a function subject to certain constraints.</text>
  </rect>

  <!-- Arrow markers for connections -->
  <line x1="40" y1="60" x2="340" y2="60" stroke="#2E4053" stroke-width="2"/>
  <line x1="40" y1="120" x2="340" y2="120" stroke="#2E4053" stroke-width="2"/>
  <line x1="40" y1="170" x2="340" y2="170" stroke="#2E4053" stroke-width="2"/>
  <line x1="40" y1="250" x2="340" y2="250" stroke="#2E4053" stroke-width="2"/>
  <line x1="40" y1="310" x2="340" y2="310" stroke="#2E4053" stroke-width="2"/>

  <!-- Title and footer -->
  <text x="10" y="10" text-anchor="start" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">8 Hours Optimization Technique</text>
  <text x="10" y="390" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2E4053">Learn about optimization techniques</text>
