<svg width="420" height="400" data-topic-id="backpropagation-and-automatic-differentiation-grad">
    <style>
        /* Add styles for background gradient */
        background-image: linear-gradient(to bottom, #2E4053, #34495E);
        background-size: 100% 100%;
        background-repeat: no-repeat;

        /* Add styles for pastel colors */
        text-color: #87CEEB;
        fill: # FCCD7F;
        stroke: # 3E8E41;

        /* Add styles for arrows */
        arrow-markers {
            stroke: #3E8E41;
            stroke-width: 2;
            fill: # FCCD7F;
        }
    </style>

    <!-- Title -->
    <text x="10" y="20" font-size="24" font-family="Arial" text-color="#87CEEB">
        Backpropagation and Automatic Differentiation
    </text>

    <!-- Section 1 -->
    <rect x="10" y="50" width="400" height="50" fill="# FCCD7F" rx="10" />
    <text x="15" y="60" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="What is backpropagation?">
        Backpropagation
    </text>
    <animate x="10" y="60" attributeName="x" from="10" to="40" dur="1000" begin="1000" />
    <animate y="60" attributeName="y" from="60" to="80" dur="1000" begin="1000" />
    <g>
        <path d="M 50 80 C 40 100 60 120 80 140" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 60 100 L 80 80" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 80 120 L 100 100" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 100 140 L 120 120" stroke-width="2" stroke="#3E8E41" fill="none" />
    </g>
    <text x="110" y="60" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="How backpropagation works">
        Backpropagation Algorithm
    </text>

    <!-- Section 2 -->
    <rect x="10" y="120" width="400" height="50" fill="# FCCD7F" rx="10" />
    <text x="15" y="130" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="What is automatic differentiation?">
        Automatic Differentiation
    </text>
    <animate x="10" y="130" attributeName="x" from="10" to="40" dur="1000" begin="2000" />
    <animate y="130" attributeName="y" from="130" to="160" dur="1000" begin="2000" />
    <g>
        <path d="M 50 160 C 40 180 60 200 80 220" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 60 180 L 80 160" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 80 200 L 100 180" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 100 220 L 120 200" stroke-width="2" stroke="#3E8E41" fill="none" />
    </g>
    <text x="110" y="130" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="How automatic differentiation works">
        Automatic Differentiation Algorithm
    </text>

    <!-- Section 3 -->
    <rect x="10" y="170" width="400" height="50" fill="# FCCD7F" rx="10" />
    <text x="15" y="180" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="What is the gradient of a quadratic cost?">
        Gradient of Quadratic Cost
    </text>
    <animate x="10" y="180" attributeName="x" from="10" to="40" dur="1000" begin="3000" />
    <animate y="180" attributeName="y" from="180" to="210" dur="1000" begin="3000" />
    <g>
        <path d="M 50 210 C 40 230 60 250 80 270" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 60 230 L 80 210" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 80 250 L 100 230" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 100 270 L 120 250" stroke-width="2" stroke="#3E8E41" fill="none" />
    </g>
    <text x="110" y="180" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="Example of gradient of quadratic cost">
        Example
    </text>

    <!-- Section 4 -->
    <rect x="10" y="200" width="400" height="50" fill="# FCCD7F" rx="10" />
    <text x="15" y="210" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="Simple neural network example">
        Simple Neural Network Example
    </text>
    <animate x="10" y="210" attributeName="x" from="10" to="40" dur="1000" begin="4000" />
    <animate y="210" attributeName="y" from="210" to="240" dur="1000" begin="4000" />
    <g>
        <path d="M 50 240 C 40 260 60 280 80 300" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 60 260 L 80 240" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 80 280 L 100 260" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 100 300 L 120 280" stroke-width="2" stroke="#3E8E41" fill="none" />
    </g>
    <text x="110" y="210" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="Backpropagation algorithm for neural network">
        Backpropagation Algorithm for Neural Network
    </text>

    <!-- Section 5 -->
    <rect x="10" y="230" width="400" height="50" fill="# FCCD7F" rx="10" />
    <text x="15" y="240" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="Gradient descent for neural networks">
        Gradient Descent for Neural Networks
    </text>
    <animate x="10" y="240" attributeName="x" from="10" to="40" dur="1000" begin="5000" />
    <animate y="240" attributeName="y" from="240" to="270" dur="1000" begin="5000" />
    <g>
        <path d="M 50 270 C 40 290 60 310 80 330" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 60 290 L 80 270" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 80 310 L 100 290" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 100 330 L 120 310" stroke-width="2" stroke="#3E8E41" fill="none" />
    </g>
    <text x="110" y="240" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="Learning rate for gradient descent">
        Learning Rate for Gradient Descent
    </text>

    <!-- Section 6 -->
    <rect x="10" y="260" width="400" height="50" fill="# FCCD7F" rx="10" />
    <text x="15" y="270" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="Optimizing neural networks with backpropagation">
        Optimizing Neural Networks with Backpropagation
    </text>
    <animate x="10" y="270" attributeName="x" from="10" to="40" dur="1000" begin="6000" />
    <animate y="270" attributeName="y" from="270" to="300" dur="1000" begin="6000" />
    <g>
        <path d="M 50 300 C 40 320 60 340 80 360" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 60 320 L 80 300" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 80 340 L 100 320" stroke-width="2" stroke="#3E8E41" fill="none" />
        <path d="M 100 360 L 120 340" stroke-width="2" stroke="#3E8E41" fill="none" />
    </g>
    <text x="110" y="270" font-size="18" font-family="Arial" text-color="#3E8E41" data-narration="Advantages of using backpropagation">
        Advantages of Using Backpropagation
    </text>

    <!-- Footnote -->
    <text x="10" y="390" font-size="12" font-family="Arial" text-color="#87CEEB">
        Footer
    </text>
</svg>