<svg width="420" height="400" data-topic-id="saddle-point-methods">
  <desc>Animated Educational Diagram for Saddle Point Methods</desc>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65A9C9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <style>
    rect {
      fill: url(#grad);
    }
  </style>
  <title>Saddle Point Methods</title>
  <rect x="10" y="10" width="400" height="380" rx="10"/>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="50" rx="5" transform-origin="bottom center" fill="#F7DC6F"/>
    <text x="0" y="10" font-size="14" font-family="Arial" text-anchor="start">Contiguous Allocation</text>
    <text x="150" y="10" font-size="14" font-family="Arial" text-anchor="start">Linked Allocation</text>
    <text x="300" y="10" font-size="14" font-family="Arial" text-anchor="start">Indexed Allocation</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="6000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="100" height="50" rx="5" transform-origin="bottom center" fill="#F7DC6F"/>
    <text x="0" y="10" font-size="14" font-family="Arial" text-anchor="start">External Fragmentation</text>
    <text x="150" y="10" font-size="14" font-family="Arial" text-anchor="start">No External Fragmentation</text>
    <text x="300" y="10" font-size="14" font-family="Arial" text-anchor="start">No External Fragmentation</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="6000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 160)">
    <rect x="0" y="0" width="100" height="50" rx="5" transform-origin="bottom center" fill="#F7DC6F"/>
    <text x="0" y="10" font-size="14" font-family="Arial" text-anchor="start">Direct Access</text>
    <text x="150" y="10" font-size="14" font-family="Arial" text-anchor="start">No Direct Access</text>
    <text x="300" y="10" font-size="14" font-family="Arial" text-anchor="start">Direct Access</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="6000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 240)">
    <rect x="0" y="0" width="100" height="50" rx="5" transform-origin="bottom center" fill="#F7DC6F"/>
    <text x="0" y="10" font-size="14" font-family="Arial" text-anchor="start">File Growth</text>
    <text x="150" y="10" font-size="14" font-family="Arial" text-anchor="start">Easy Growth</text>
    <text x="300" y="10" font-size="14" font-family="Arial" text-anchor="start">Difficult Growth</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="6000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 320)">
    <rect x="0" y="0" width="100" height="50" rx="5" transform-origin="bottom center" fill="#F7DC6F"/>
    <text x="0" y="10" font-size="14" font-family="Arial" text-anchor="start">Unix Inode Example</text>
    <text x="150" y="10" font-size="14" font-family="Arial" text-anchor="start">12 Direct Pointers</text>
    <text x="300" y="10" font-size="14" font-family="Arial" text-anchor="start">4KB Blocks</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="6000" repeatCount="indefinite"/>
  </g>
  <g transform="translate(100, 20)">
    <line x1="20" y1="50" x2="100" y2="50" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="6000" repeatCount="indefinite"/>
    </line>
    <text x="10" y="70" font-size="14" font-family="Arial" text-anchor="start">Linked Index</text>
    <text x="200" y="70" font-size="14" font-family="Arial" text-anchor="start">Multi-level Index</text>
  </g>
  <g transform="translate(220, 20)">
    <line x1="20" y1="50" x2="100" y2="50" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="6000" repeatCount="indefinite"/>
    </line>
    <text x="10" y="70" font-size="14" font-family="Arial" text-anchor="start">Combined (Unix inode)</text>
    <text x="200" y="70" font-size="14" font-family="Arial" text-anchor="start">12 Direct Pointers</text>
  </g>
  <g transform="translate(340, 20)">
    <line x1="20" y1="50" x2="100" y2="50" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="6000" repeatCount="indefinite"/>
    </line>
    <text x="10" y="70" font-size="14" font-family="Arial" text-anchor="start">Linked Index</text>
    <text x="200" y="70" font-size="14" font-family="Arial" text-anchor="start">Multi-level Index</text>
  </g>
  <footer>End of Saddle Point Methods Diagram</footer>
</svg>