  <rect x="20" y="390" width="350" height="50" fill="#E0FFFA" rx="5" />
  <text x="20" y="400" font-size="18" font-family="Arial" fill="#000000" data-narration="Convex set: A set S is said to be convex if for any two points x1 and x2 in S, the following inequality holds:" fill-opacity="1" animation-delay="0s" />
  <animate duration="500ms" attributeName="opacity" from="0" to="1" begin="0s" animation-delay="0s" />

