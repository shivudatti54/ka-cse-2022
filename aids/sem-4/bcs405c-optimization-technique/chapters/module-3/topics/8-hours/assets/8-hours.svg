  <text x="20" y="230" font-size="18" font-family="Arial" fill="#000000" data-narration="A function f(x) is said to be convex if for any two points x1 and x2 in its domain, the following inequality holds:" fill-opacity="0.5" animation-delay="0s" />
  <rect x="20" y="250" width="350" height="50" fill="#E0FFFA" rx="5" />
  <text x="20" y="260" font-size="18" font-family="Arial" fill="#000000" data-narration="f(αx1 + (1-α)x2) ≤ αf(x1) + (1-α)f(x2)" fill-opacity="1" animation-delay="0s" />
  <animate duration="500ms" attributeName="opacity" from="0" to="1" begin="0s" animation-delay="0s" />

