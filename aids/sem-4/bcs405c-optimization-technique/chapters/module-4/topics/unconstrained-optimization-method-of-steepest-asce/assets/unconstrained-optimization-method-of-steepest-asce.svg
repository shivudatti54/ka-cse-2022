<svg width="420" height="400" data-topic-id="unconstrained-optimization-method-of-steepest-ascent">
    <!-- Title -->
    <title>Unconstrained Optimization Method of Steepest Ascent</title>
    
    <!-- Background gradient -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
        </linearGradient>
    </defs>
    
    <!-- SVG content -->
    <g transform="translate(10, 50)">
        <!-- Section 1: Introduction -->
        <rect x="0" y="0" width="400" height="100" fill="#87CEEB" rx="10"/>
        <text x="10" y="30" font-size="18" font-family="Arial" fill="#C7B8EA">Unconstrained Optimization Method of Steepest Ascent</text>
        <text x="10" y="60" font-size="14" font-family="Arial" fill="#999999">Introduction</text>
        <animateTransform attribute="x" from="0" to="400" dur="2000" begin="0s" repeatCount="indefinite"/>
        
        <!-- Section 2: How it works -->
        <rect x="0" y="150" width="400" height="100" fill="#87CEEB" rx="10"/>
        <text x="10" y="180" font-size="18" font-family="Arial" fill="#C7B8EA">How it works</text>
        <text x="10" y="210" font-size="14" font-family="Arial" fill="#999999">Choose an initial point `x_0`</text>
        <text x="10" y="240" font-size="14" font-family="Arial" fill="#999999">Compute the gradient of the function at `x_0`, denoted as `∇f(x_0)`</text>
        <text x="10" y="270" font-size="14" font-family="Arial" fill="#999999">Move in the direction of `-∇f(x_0)` by a step size `α`</text>
        <animateTransform attribute="x" from="0" to="200" dur="2000" begin="0s" repeatCount="indefinite"/>
        
        <!-- Section 3: Example -->
        <rect x="0" y="350" width="400" height="100" fill="#87CEEB" rx="10"/>
        <text x="10" y="380" font-size="18" font-family="Arial" fill="#C7B8EA">Example</text>
        <text x="10" y="410" font-size="14" font-family="Arial" fill="#999999">Suppose we want to minimize the function `f(x) = x^2`</text>
        <text x="10" y="440" font-size="14" font-family="Arial" fill="#999999">We start at `x_0 = 1` and compute the gradient at `x_0`:</text>
        <text x="10" y="470" font-size="14" font-family="Arial" fill="#999999">`∇f(x_0) = ∂f/∂x = 2x_0 = 2`</text>
        <text x="10" y="500" font-size="14" font-family="Arial" fill="#999999">We move in the direction of `-∇f(x_0)` by a step size `α = 0.1`:</text>
        <text x="10" y="530" font-size="14" font-family="Arial" fill="#999999">`x_1 = x_0 + α * -∇f(x_0) = 1 + 0.1 * (-2) = 0.8`</text>
        <animateTransform attribute="x" from="0" to="200" dur="2000" begin="0s" repeatCount="indefinite"/>
        
        <!-- Section 4: Non-linear regression method -->
        <rect x="0" y="500" width="400" height="100" fill="#87CEEB" rx="10"/>
        <text x="10" y="530" font-size="18" font-family="Arial" fill="#C7B8EA">Non-linear regression method</text>
        <text x="10" y="560" font-size="14" font-family="Arial" fill="#999999">Choose an initial point `x_0`</text>
        <text x="10" y="590" font-size="14" font-family="Arial" fill="#999999">Compute the target value `y_star`</text>
        <text x="10" y="630" font-size="14" font-family="Arial" fill="#999999">Compute the sum of the squared errors `S = (f(x) - y_star)^2`</text>
        <text x="10" y="670" font-size="14" font-family="Arial" fill="#999999">Move in the direction of `-∇S` by a step size `α`</text>
        <animateTransform attribute="x" from="0" to="200" dur="2000" begin="0s" repeatCount="indefinite"/>
        
        <!-- Section 5: Stochastic gradient descent -->
        <rect x="0" y="700" width="400" height="100" fill="#87CEEB" rx="10"/>
        <text x="10" y="730" font-size="18" font-family="Arial" fill="#C7B8EA">Stochastic gradient descent</text>
        <text x="10" y="760" font-size="14" font-family="Arial" fill="#999999">Choose an initial point `x_0`</text>
        <text x="10" y="790" font-size="14" font-family="Arial" fill="#999999">Compute the gradient of the function at `x_0`, denoted as `∇f(x_0)`</text>
        <text x="10" y="830" font-size="14" font-family="Arial" fill="#999999">Move in the direction of `-∇f(x_0)` by a step size `α`</text>
        <text x="10" y="870" font-size="14" font-family="Arial" fill="#999999">Update the point to `x_1 = x_0 + α * -∇f(x_0)`</text>
        <animateTransform attribute="x" from="0" to="200" dur="2000" begin="0s" repeatCount="indefinite"/>
        
        <!-- Section 6: Conclusion -->
        <rect x="0" y="900" width="400" height="100" fill="#87CEEB" rx="10"/>
        <text x="10" y="930" font-size="18" font-family="Arial" fill="#C7B8EA">Conclusion</text>
        <text x="10" y="960" font-size="14" font-family="Arial" fill="#999999">The method of steepest ascent/descent is a simple and intuitive technique for finding the optimal solution to a function.</text>
        <text x="10" y="990" font-size="14" font-family="Arial" fill="#999999">The optimal solution is `x_star = 0` where `f(x_star) = 0^2 = 0`</text>
        <animateTransform attribute="x" from="0" to="400" dur="2000" begin="0s" repeatCount="indefinite"/>
        
        <!-- Footer -->
        <rect x="0" y="3400" width="400" height="50" fill="#87CEEB" rx="10"/>
        <text x="10" y="3350" font-size="14" font-family="Arial" fill="#999999">Copyright 2023</text>
    </g>
    
    <!-- Gradient background -->
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
</svg>