<svg
  width="420"
  height="400"
  data-topic-id="convex-optimization-8-hours"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 420 400"
  style="background-image: linear-gradient(to bottom, #7a648b, #8e7aeb)"
>

  <!-- Title -->
  <rect
    x="20"
    y="20"
    width="380"
    height="40"
    style="fill: #2f4f7f; border-radius: 10px 10px 0 0"
  />
  <text
    x="20"
    y="40"
    style="font-size: 24px; font-weight: bold; color: #fff"
  >
    Convex Optimization-8 Hours
  </text>

  <!-- Section 1: Definition -->
  <section
    x="20"
    y="80"
    width="380"
    height="120"
    style="background-color: #f0f0f0; border: 1px solid #ddd;"
  >
    <div class="data-narration" style="padding: 20px;">
      <h4>Definition</h4>
      <p>
        The (8 hours) technique is a method used to solve linear programming
        problems. It is also known as the Simplex Method or the North-West
        Corner Rule.
      </p>
    </div>
    <animate
      attributeName="opacity"
      begin="100ms"
      dur="1000ms"
      repeatCount="indefinite"
      from="1"
      to="0"
    />
  </section>

  <!-- Section 2: Explanation -->
  <section
    x="20"
    y="200"
    width="380"
    height="120"
    style="background-color: #f0f0f0; border: 1px solid #ddd;"
  >
    <div class="data-narration" style="padding: 20px;">
      <h4>Explanation</h4>
      <p>
        The (8 hours) technique is based on the following steps:
        <ul>
          <li>
            Initialization: The basic feasible solution is initialized with all
            variables set to zero.
          </li>
          <li>
            Iteration: The variable with the largest reduced cost is selected
            and added to the basic solution.
          </li>
          <li>
            Subtraction: The variable with the smallest reduced cost is
            subtracted from the basic solution.
          </li>
          <li>Repeat: Steps 2 and 3 are repeated until the optimal solution is reached.</li>
        </ul>
      </p>
    </div>
    <animate
      attributeName="opacity"
      begin="200ms"
      dur="1000ms"
      repeatCount="indefinite"
      from="1"
      to="0"
    />
  </section>

  <!-- Section 3: Key Concepts -->
  <section
    x="20"
    y="320"
    width="380"
    height="120"
    style="background-color: #f0f0f0; border: 1px solid #ddd;"
  >
    <div class="data-narration" style="padding: 20px;">
      <h4>Key Concepts</h4>
      <p>
        Reduced Cost: The reduced cost of a variable is the difference between
        its current value and the minimum value that can be achieved by
        reducing the variable to zero.
        <br />
        Basic Feasible Solution: A basic feasible solution is a solution that
        satisfies all the constraints of the linear programming problem and has
        all variables in their basic (constant) values.
        <br />
        Optimal Solution: The optimal solution is the solution that minimizes or
        maximizes the objective function.
      </p>
    </div>
    <animate
      attributeName="opacity"
      begin="300ms"
      dur="1000ms"
      repeatCount="indefinite"
      from="1"
      to="0"
    />
  </section>

  <!-- Section 4: Example -->
  <section
    x="20"
    y="400"
    width="380"
    height="120"
    style="background-color: #f0f0f0; border: 1px solid #ddd;"
  >
    <div class="data-narration" style="padding: 20px;">
      <h4>Example</h4>
      <p>
        Suppose we have a linear programming problem of the following form:
        <pre>
Minimize Z = 2x + 3y

Subject to:
x + y ≤ 10
2x + 3y ≤ 20
x, y ≥ 0
</pre>
        </p>
    </div>
    <animate
      attributeName="opacity"
      begin="400ms"
      dur="1000ms"
      repeatCount="indefinite"
      from="1"
      to="0"
    />
  </section>

  <!-- Footer -->
  <rect
    x="20"
    y="420"
    width="380"
    height="40"
    style="fill: #2f4f7f; border-radius: 10px 10px 0 0"
  />
  <text
    x="20"
    y="440"
    style="font-size: 24px; font-weight: bold; color: #fff"
  >
    Convex Optimization-8 Hours
  </text>
</svg>