<svg width="420" height="400" data-topic-id="recurrence-relations-first-order-linear-recurrence" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title at top -->
  <g transform="translate(10, 20)">
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#333">Recurrence Relations: First Order Linear Recurrence</text>
  </g>
  
  <!-- Section 1: Overview -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="20" fill="#fff" rx="5" />
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#333" data-narration="Overview">Overview</text>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,70" dur="2s" begin="0s" repeatCount="1" />
  </g>
  <line x1="10" y1="70" x2="400" y2="70" stroke="#333" stroke-width="2" />
  <text x="10" y="75" font-size="16" font-family="Arial" fill="#333" data-narration="A recurrence relation is a mathematical equation that defines a sequence of numbers recursively." />
  
  <!-- Section 2: Key Concepts -->
  <g transform="translate(10, 110)">
    <rect x="0" y="0" width="400" height="20" fill="#fff" rx="5" />
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#333" data-narration="Key Concepts">Key Concepts</text>
    <animateTransform attributeName="transform" type="translate" from="0,120" to="0,140" dur="2s" begin="0s" repeatCount="1" />
  </g>
  <line x1="10" y1="140" x2="400" y2="140" stroke="#333" stroke-width="2" />
  <text x="10" y="145" font-size="16" font-family="Arial" fill="#333" data-narration="First-order linear recurrence relation: An equation of the form $a_n = pa_{n-1} + qa_{n-2}$." />
  <text x="10" y="165" font-size="16" font-family="Arial" fill="#333" data-narration="Linear recurrence relation: A recurrence relation in which each term is a linear combination of the previous terms." />
  
  <!-- Section 3: Definitions -->
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="400" height="20" fill="#fff" rx="5" />
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#333" data-narration="Definitions">Definitions</text>
    <animateTransform attributeName="transform" type="translate" from="0,220" to="0,240" dur="2s" begin="0s" repeatCount="1" />
  </g>
  <line x1="10" y1="240" x2="400" y2="240" stroke="#333" stroke-width="2" />
  <text x="10" y="245" font-size="16" font-family="Arial" fill="#333" data-narration="Initial condition: The value of the sequence at a specific term, usually denoted as $a_0$ or $a_1$." />
  <text x="10" y="265" font-size="16" font-family="Arial" fill="#333" data-narration="Recurrence relation: A mathematical equation that defines a sequence of numbers recursively." />
  
  <!-- Section 4: Examples -->
  <g transform="translate(10, 310)">
    <rect x="0" y="0" width="400" height="20" fill="#fff" rx="5" />
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#333" data-narration="Examples">Examples</text>
    <animateTransform attributeName="transform" type="translate" from="0,330" to="0,350" dur="2s" begin="0s" repeatCount="1" />
  </g>
  <line x1="10" y1="350" x2="400" y2="350" stroke="#333" stroke-width="2" />
  <rect x="150" y="300" width="100" height="50" fill="#C7B8EA" rx="5" />
  <text x="160" y="305" font-size="16" font-family="Arial" fill="#333" data-narration="$a_n = a_{n-1}$" />
  <rect x="350" y="300" width="100" height="50" fill="#A1C9F2" rx="5" />
  <text x="360" y="305" font-size="16" font-family="Arial" fill="#333" data-narration="$a_n = 2a_{n-1} + a_{n-2}$" />
  
  <!-- Section 5: Solution Methods -->
  <g transform="translate(10, 400)">
    <rect x="0" y="0" width="400" height="20" fill="#fff" rx="5" />
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#333" data-narration="Solution Methods">Solution Methods</text>
    <animateTransform attributeName="transform" type="translate" from="0,420" to="0,440" dur="2s" begin="0s" repeatCount="1" />
  </g>
  <line x1="10" y1="440" x2="400" y2="440" stroke="#333" stroke-width="2" />
  <text x="10" y="445" font-size="16" font-family="Arial" fill="#333" data-narration="Characteristic equation method: This method involves finding the roots of the characteristic equation $r^2 - pr - q = 0$." />
  <text x="10" y="465" font-size="16" font-family="Arial" fill="#333" data-narration="Closed-form solution: A solution that can be expressed in a closed form, without using recursion." />
  
  <!-- Footer -->
  <g transform="translate(10, 500)">
    <rect x="0" y="0" width="400" height="20" fill="#fff" rx="5" />
    <text x="10" y="5" font-size="16" font-family="Arial" fill="#333">By [Author Name]</text>
  </g>
  <line x1="400" y1="520" x2="420" y2="520" stroke="#333" stroke-width="2" />
</svg>