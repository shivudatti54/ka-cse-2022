<svg width="420" height="400" data-topic-id="second-order-linear-homogeneous-recurrence-rel">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>The Second Order Linear Homogeneous Recurrence Relation</title>
  <footer>Learn more about recurrence relations at <a href="#">wikipedia</a></footer>

  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.8"/>

  <section data-narration="Introduction">
    <div>
      <text x="50" y="50" font-size="24" font-family="Arial" fill="#2F4F7F">A recurrence relation is a mathematical relationship between the terms of a sequence</text>
    </div>
  </section>

  <section data-narration="Definition">
    <div>
      <text x="50" y="100" font-size="24" font-family="Arial" fill="#2F4F7F">A second order linear homogeneous recurrence relation with constant coefficients is defined as:</text>
      <text x="50" y="130" font-size="18" font-family="Arial" fill="#2F4F7F">an = a(n-1) + a(n-2)</text>
    </div>
  </section>

  <section data-narration="Key Concepts">
    <div>
      <text x="50" y="180" font-size="24" font-family="Arial" fill="#2F4F7F">Key Concepts:</text>
      <text x="50" y="200" font-size="18" font-family="Arial" fill="#2F4F7F">- Homogeneous: The recurrence relation does not contain any non-homogeneous terms.</text>
      <text x="50" y="220" font-size="18" font-family="Arial" fill="#2F4F7F">- Linear: The recurrence relation can be written in the form of a linear equation.</text>
      <text x="50" y="240" font-size="18" font-family="Arial" fill="#2F4F7F">- Recurrence relation with constant coefficients: The coefficients of the recurrence relation are constant.</text>
    </div>
  </section>

  <section data-narration="Solving Methods">
    <div>
      <text x="50" y="280" font-size="24" font-family="Arial" fill="#2F4F7F">Solving Methods:</text>
      <text x="50" y="300" font-size="18" font-family="Arial" fill="#2F4F7F">1. Characteristic Equation Method</text>
      <animate begin="0s" dur="2s" repeatCount="indefinite">
        <text x="200" y="300" font-size="18" font-family="Arial" fill="#2F4F7F">r^2 = r + 1</text>
      </animate>
      <animate begin="2s" dur="2s" repeatCount="indefinite">
        <text x="200" y="320" font-size="18" font-family="Arial" fill="#2F4F7F">(r - 1)(r + 1) = 0</text>
      </animate>
      <animate begin="4s" dur="2s" repeatCount="indefinite">
        <text x="200" y="340" font-size="18" font-family="Arial" fill="#2F4F7F">r = 1 or r = -1</text>
      </animate>
      <animate begin="6s" dur="2s" repeatCount="indefinite">
        <text x="200" y="360" font-size="18" font-family="Arial" fill="#2F4F7F">a(n) = c1 \* 1^n + c2 \* (-1)^n</text>
      </animate>
    </div>
  </section>

  <section data-narration="Conclusion">
    <div>
      <text x="50" y="380" font-size="24" font-family="Arial" fill="#2F4F7F">The second order linear homogeneous recurrence relation is a fundamental concept in mathematics and computer science.</text>
    </div>
  </section>

  <footer>Learn more about recurrence relations at <a href="#">wikipedia</a></footer>
</svg>