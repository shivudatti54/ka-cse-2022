<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8f99cc"/>
      <stop offset="100%" stop-color="#6baed6"/>
    </linearGradient>
  </defs>
  <title>The Principle of Inclusion and Exclusion</title>
  <footer>Animated Educational Diagram</footer>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)"/>
  <animate attributeName="opacity" from="1" to="0.5" dur="1000" repeatCount="indefinite"/>
  <g id="section1">
    <rect x="20" y="20" width="360" height="60" fill="#add8e6"/>
    <text x="20" y="30" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">Introduction</text>
    <text x="20" y="50" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">The Principle of Inclusion and Exclusion (PIE) is a fundamental concept in discrete mathematics that provides a method for counting the number of elements in the union of multiple sets.</text>
    <animate attributeName="opacity" from="1" to="0" dur="500" begin="1000" repeatCount="indefinite"/>
  </g>
  <g id="section2">
    <rect x="20" y="90" width="360" height="60" fill="#8f99cc"/>
    <text x="20" y="100" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">Definition</text>
    <text x="20" y="120" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">The Principle of Inclusion and Exclusion states that for any finite sets A and B, the number of elements in the union of A and B is given by:</text>
    <text x="20" y="140" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">|A ∪ B| = |A| + |B| - |A ∩ B|</text>
    <animate attributeName="opacity" from="1" to="0" dur="500" begin="1500" repeatCount="indefinite"/>
  </g>
  <g id="section3">
    <rect x="20" y="190" width="360" height="60" fill="#6baed6"/>
    <text x="20" y="200" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">Generalization</text>
    <text x="20" y="220" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">The Principle of Inclusion and Exclusion can be generalized to more than two sets. Let A1, A2, ..., An be finite sets.</text>
    <text x="20" y="240" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">|A1 ∪ A2 ∪ ... ∪ An| = ∑|Ai| - ∑|Ai ∩ Aj| + ∑|Ai ∩ Aj ∩ Ak| - ... + (-1)^(n-1)|A1 ∩ A2 ∩ ... ∩ An|</text>
    <animate attributeName="opacity" from="1" to="0" dur="500" begin="2000" repeatCount="indefinite"/>
  </g>
  <g id="section4">
    <rect x="20" y="280" width="360" height="60" fill="#8f99cc"/>
    <text x="20" y="290" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">Derangements</text>
    <text x="20" y="310" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">A derangement is a permutation of the elements of a set, such that no element is in its original position.</text>
    <text x="20" y="330" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">For a set of n elements, the number of derangements can be calculated using the following formula:</text>
    <text x="20" y="350" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">!n = n! \* (1/0! - 1/1! + 1/2! - 1/3! + ... + ((-1)^n)/n!)</text>
    <animate attributeName="opacity" from="1" to="0" dur="500" begin="2500" repeatCount="indefinite"/>
  </g>
  <g id="section5">
    <rect x="20" y="350" width="360" height="60" fill="#6baed6"/>
    <text x="20" y="360" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">Rook Polynomials</text>
    <text x="20" y="380" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">A rook polynomial is a polynomial that encodes information about the number of ways to place rooks on a board.</text>
    <text x="20" y="400" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">The rook polynomial for an n x n board is given by:</text>
    <text x="20" y="420" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">Rn(x) = ∑(x^i) / i!</text>
    <animate attributeName="opacity" from="1" to="0" dur="500" begin="3000" repeatCount="indefinite"/>
  </g>
  <g id="footer">
    <text x="50" y="410" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle"> animations by </text>
    <text x="120" y="410" fill="#fff" font-size="18" font-family="Arial" text-anchor="middle">W3Schools</text>
  </g>
</svg>