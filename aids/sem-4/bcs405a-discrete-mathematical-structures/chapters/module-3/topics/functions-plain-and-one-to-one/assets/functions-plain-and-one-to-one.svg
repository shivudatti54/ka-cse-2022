<svg width="420" height="400" data-topic-id="functions-plain-and-one-to-one">
    <defs>
        <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7A68D8" stop-opacity="1"/>
            <stop offset="100%" stop-color="#44A0E6" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="100" fill="url(#color-gradient)" rx="5"/>
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Functions Plain and One-to-One</text>
    <path d="M 120, 150 L 120, 180" stroke="#E91E63" stroke-width="4" fill="none"/>
    <rect x="20" y="150" width="350" height="50" fill="#FFFFFF" rx="5"/>
    <text x="20" y="170" font-size="18" font-family="Arial" fill="#000000" text-anchor="start">Plain Functions</text>
    <section data-narration="plain-functions-definition">
        <text x="20" y="200" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">Definition:</text>
        <text x="60" y="220" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">A relation R between sets A and B is a plain function if for every a in A, there exists a unique b in B such that (a, b) is in R.</text>
    </section>
    <path d="M 450, 150 L 450, 180" stroke="#E91E63" stroke-width="4" fill="none"/>
    <rect x="20" y="210" width="350" height="50" fill="#FFFFFF" rx="5"/>
    <text x="20" y="230" font-size="18" font-family="Arial" fill="#000000" text-anchor="start">One-to-One Functions</text>
    <section data-narration="one-to-one-functions-definition">
        <text x="20" y="260" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">Definition:</text>
        <text x="60" y="280" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">A relation R between sets A and B is one-to-one if for every a and b in A, if a ≠ b, then f(a) ≠ f(b).</text>
    </section>
    <path d="M 120, 320 L 120, 350" stroke="#E91E63" stroke-width="4" fill="none"/>
    <rect x="20" y="330" width="350" height="50" fill="#FFFFFF" rx="5"/>
    <text x="20" y="350" font-size="18" font-family="Arial" fill="#000000" text-anchor="start">Properties of One-to-One Functions:</text>
    <section data-narration="one-to-one-functions-properties">
        <text x="20" y="380" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">Unique output:</text>
        <text x="60" y="400" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">No repeated inputs:</text>
    </section>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="5s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="210 180" to="450 180" dur="5s" begin="1s"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="0 210 180" dur="5s" begin="2s"/>
    <animateTransform attributeName="transform" type="translate" from="210 180" to="450 180" dur="5s" begin="3s"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 180" to="360 210 180" dur="5s" begin="4s"/>
    <animateTransform attributeName="transform" type="translate" from="210 180" to="450 180" dur="5s" begin="5s"/>
    <defs>
        <circle cx="210" cy="180" r="5" fill="#FFFFFF"/>
    </defs>
    <text x="20" y="10" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Arrow markers</text>
    <text x="210" y="10" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Connections</text>
    <footer>
        <text x="20" y="380" font-size="16" font-family="Arial" fill="#000000" text-anchor="start">Copyright 2024</text>
    </footer>
</svg>