<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <title>The Pigeon Hole Principle</title>
  <footer>Learn to design with SOLID principles</footer>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8C9467" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="350" fill="url(#gradient)"/>
  <text x="180" y="20" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">The Pigeon Hole Principle</text>
  <rect x="10" y="60" width="100" height="20" fill="#FFC107" data-topic-id="single-responsibility-principle" data-narration="A class should have only one reason to change. One class = one job. Improves maintainability"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0s" dur="2s" repeatCount="indefinite"/>
  <g transform="translate(120,60)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Open for extension, closed for modification. Add new functionality without changing existing code. Use inheritance, interfaces"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#2F4F7F" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="0.5s" dur="2s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="100" width="100" height="20" fill="#FFC107" data-topic-id="open-closed-principle" data-narration="Subtypes must be substitutable for base types. Child class should not break parent behavior. Square/Rectangle problem"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="1s" dur="2s" repeatCount="indefinite"/>
  <g transform="translate(120,100)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Interface Segregation Principle. Clients should not depend on interfaces they don't use. Prefer many specific interfaces over one general. Avoid 'fat' interfaces"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#2F4F7F" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="1.5s" dur="2s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="180" width="100" height="20" fill="#FFC107" data-topic-id="dependency-inversion-principle" data-narration="Dependency Inversion Principle. High-level modules shouldn't depend on low-level. Both should depend on interfaces"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="2.5s" dur="2s" repeatCount="indefinite"/>
  <g transform="translate(120,180)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="DRY. Every piece of knowledge should have a single representation. KISS. Simplest solution is usually the best. YAGNI. Don't add functionality until needed"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#2F4F7F" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="3s" dur="2s" repeatCount="indefinite"/>
  </g>
  <rect x="10" y="260" width="100" height="20" fill="#FFC107" data-topic-id="coupling-cohesion-principle" data-narration="Coupling & Cohesion. Low Coupling. High Cohesion. Related functionality stays together"/>
  <animateTransform attributeName="transform" type="translate" from="0,0" to="100,0" begin="3.5s" dur="2s" repeatCount="indefinite"/>
  <g transform="translate(120,260)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Arrow markers for connections.">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#C7B8EA" stroke-width="2"/>
      <line x1="0" y1="0" x2="100" y2="20" stroke="#C7B8EA" stroke-width="2"/>
    </g>
  </g>
  <footer>Learn to design with SOLID principles</footer>
</svg>