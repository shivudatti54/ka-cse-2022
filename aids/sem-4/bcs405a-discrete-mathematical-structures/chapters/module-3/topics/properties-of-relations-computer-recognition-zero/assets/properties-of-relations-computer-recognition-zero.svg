<svg width="420" height="400" data-topic-id="properties-of-relations-computer-recognition-zero-one-matrices-and-directed-graphs-partial-orders-hasse-diagrams-equivalence-relations-and-part">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#gradient)" rx="10"/>
  
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" text-anchor="middle" fill="#3498DB">
    Properties of Relations, Computer Recognition – Zero-One Matrices and Directed Graphs, Partial Orders – Hasse Diagrams, Equivalence Relations and Part
  </text>
  
  <!-- Section 1: Relations -->
  <section data-narration="Relations" id="section1" style="background-color: #F7F7F7; padding: 20px; margin-bottom: 20px;">
    <h2>Relations</h2>
    <ul>
      <li><b>Definition:</b> A relation R from A to B is a subset of A x B.<br />
        <b>Types of Relations:</b>
        <ul>
          <li>Equivalence Relation: A relation that is reflexive, symmetric, and transitive.</li>
          <li>Partial Order: A relation that is reflexive, antisymmetric, and transitive.</li>
          <li>Function: A relation that is both injective and surjective.</li>
        </ul>
      </li>
    </ul>
    <animate xmlns="http://www.w3.org/1999/11/svg" begin="0s" dur="2s" repeatCount="indefinite">
      <circle cx="50%" cy="50%" r="40" fill="#3498DB" opacity="0" />
      <circle cx="50%" cy="50%" r="40" fill="#87CEEB" opacity="1" />
      <circle cx="50%" cy="50%" r="40" fill="#F7F7F7" opacity="0" />
    </animate>
  </section>
  
  <!-- Section 2: Zero-One Matrices -->
  <section data-narration="Computer Recognition – Zero-One Matrices" id="section2" style="background-color: #87CEEB; padding: 20px; margin-bottom: 20px;">
    <h2>Zero-One Matrices and Directed Graphs</h2>
    <p>A zero-one matrix is a matrix where each element is either 0 or 1.</p>
    <ul>
      <li><b>Equivalent Relations:</b> If two relations are equivalent, their corresponding zero-one matrices will be identical.</li>
      <li><b>Partial Orders:</b> The zero-one matrix of a partial order relation will have a specific structure, with 1s on the diagonal and 0s elsewhere.</li>
    </ul>
    <animate xmlns="http://www.w3.org/1999/11/svg" begin="2s" dur="2s" repeatCount="indefinite">
      <circle cx="50%" cy="50%" r="40" fill="#87CEEB" opacity="0" />
      <circle cx="50%" cy="50%" r="40" fill="#F7F7F7" opacity="1" />
      <circle cx="50%" cy="50%" r="40" fill="#3498DB" opacity="0" />
    </animate>
  </section>
  
  <!-- Section 3: Directed Graphs -->
  <section data-narration="Directed Graphs" id="section3" style="background-color: #5C6BC0; padding: 20px; margin-bottom: 20px;">
    <h2>Directed Graphs</h2>
    <p>A directed graph is a graph where edges have direction.</p>
    <ul>
      <li><b>Types of Directed Graphs:</b>
        <ul>
          <li>Digraph: A directed graph where there is a directed edge between every pair of vertices.</li>
          <li>Simple Digraph: A directed graph where there is no multiple edge between the same pair of vertices.</li>
        </ul>
      </li>
    </ul>
    <animate xmlns="http://www.w3.org/1999/11/svg" begin="4s" dur="2s" repeatCount="indefinite">
      <circle cx="50%" cy="50%" r="40" fill="#5C6BC0" opacity="0" />
      <circle cx="50%" cy="50%" r="40" fill="#3498DB" opacity="1" />
      <circle cx="50%" cy="50%" r="40" fill="#87CEEB" opacity="0" />
    </animate>
  </section>
  
  <!-- Section 4: Partial Orders – Hasse Diagrams -->
  <section data-narration="Partial Orders – Hasse Diagrams" id="section4" style="background-color: #F7F7F7; padding: 20px; margin-bottom: 20px;">
    <h2>Partial Orders – Hasse Diagrams</h2>
    <p>A Hasse diagram is a graphical representation of a partial order relation.</p>
    <ul>
      <li><b>Properties of Hasse Diagrams:</b>
        <ul>
          <li>Reflexivity: Elements are drawn on the same level as themselves.</li>
          <li>Antisymmetry: Elements are not drawn on the same level if one is less than the other.</li>
          <li>Transitivity: Elements are drawn on the same level if one is greater than another.</li>
        </ul>
      </li>
    </ul>
    <animate xmlns="http://www.w3.org/1999/11/svg" begin="6s" dur="2s" repeatCount="indefinite">
      <circle cx="50%" cy="50%" r="40" fill="#F7F7F7" opacity="0" />
      <circle cx="50%" cy="50%" r="40" fill="#87CEEB" opacity="1" />
      <circle cx="50%" cy="50%" r="40" fill="#3498DB" opacity="0" />
    </animate>
  </section>
  
  <!-- Section 5: Equivalence Relations -->
  <section data-narration="Equivalence Relations" id="section5" style="background-color: #87CEEB; padding: 20px; margin-bottom: 20px;">
    <h2>Equivalence Relations</h2>
    <p>Example: A relation R from A to A is an equivalence relation if it is reflexive, symmetric, and transitive.</p>
    <ul>
      <li><b>Reflexive:</b> For all a in A, a R a.</li>
      <li><b>Symmetric:</b> For all a and b in A, if a R b then b R a.</li>
      <li><b>Transitive:</b> For all a, b, and c in A, if a R b and b R c then a R c.</li>
    </ul>
    <animate xmlns="http://www.w3.org/1999/11/svg" begin="8s" dur="2s" repeatCount="indefinite">
      <circle cx="50%" cy="50%" r="40" fill="#87CEEB" opacity="0" />
      <circle cx="50%" cy="50%" r="40" fill="#F7F7F7" opacity="1" />
      <circle cx="50%" cy="50%" r="40" fill="#3498DB" opacity="0" />
    </animate>
  </section>
  
  <!-- Section 6: Example -->
  <section data-narration="Example" id="section6" style="background-color: #F7F7F7; padding: 20px; margin-bottom: 20px;">
    <h2>Example:</h2>
    <p>A relation R from A to A is an equivalence relation if it is reflexive, symmetric, and transitive.</p>
    <ul>
      <li><b>Reflexive:</b> For all a in A, a R a.</li>
      <li><b>Symmetric:</b> For all a and b in A, if a R b then b R a.</li>
      <li><b>Transitive:</b> For all a, b, and c in A, if a R b and b R c then a R c.</li>
    </ul>
    <animate xmlns="http://www.w3.org/1999/11/svg" begin="10s" dur="2s" repeatCount="indefinite">
      <circle cx="50%" cy="50%" r="40" fill="#F7F7F7" opacity="0" />
      <circle cx="50%" cy="50%" r="40" fill="#3498DB" opacity="1" />
      <circle cx="50%" cy="50%" r="40" fill="#87CEEB" opacity="0" />
    </animate>
  </section>
  
