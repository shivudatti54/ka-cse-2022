<svg width="420" height="400" data-topic-id="cartesian-products-and-relations">
  <desc>Cartesian Products And Relations</desc>
  <style>
    /* Gradient background */
    background-image: linear-gradient(to bottom, #7B8CA7, #C7E8F8);
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B8CA7" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7E8F8" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  <g transform="translate(10, 20)">
    <!-- Section 1: Introduction -->
    <rect x="0" y="0" width="100" height="50" rx="10" fill="#4CAF50" />
    <text x="20" y="15" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" begin="0s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1 1.5" begin="0.5s" dur="1.5s" repeatCount="indefinite" />
    <g data-narration="This relation represents a subset of the Cartesian product of the sets A and B. A relation between two sets is a subset of the Cartesian product of the sets. The Cartesian product is a fundamental concept in combinatorics and is used extensively in various areas of mathematics and computer science.">
      <path d="M 10,20 L 30,20" stroke="#000" stroke-width="2" fill="none" />
      <text x="15" y="25" fill="#000" font-size="12" font-family="Arial" text-anchor="middle">Cartesian Product</text>
    </g>
    <!-- Section 2: Definition of Cartesian Product -->
    <rect x="0" y="60" width="100" height="50" rx="10" fill="#4CAF50" />
    <text x="20" y="75" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Definition of Cartesian Product</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 80" begin="1s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1 1.5" begin="1.5s" dur="1.5s" repeatCount="indefinite" />
    <g data-narration="The Cartesian product of two sets A and B, denoted by A × B, is the set of all ordered pairs (a, b) where a ∈ A and b ∈ B.">
      <path d="M 10,80 L 30,80" stroke="#000" stroke-width="2" fill="none" />
      <text x="15" y="90" fill="#000" font-size="12" font-family="Arial" text-anchor="middle">A × B = {(a, b) | a ∈ A, b ∈ B}</text>
    </g>
    <!-- Section 3: Properties of Cartesian Product -->
    <rect x="0" y="110" width="100" height="50" rx="10" fill="#4CAF50" />
    <text x="20" y="125" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Properties of Cartesian Product</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 140" begin="2s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1 1.5" begin="2.5s" dur="1.5s" repeatCount="indefinite" />
    <g data-narration="The Cartesian product of two sets A and B has the following properties:
      <ul>
        <li>Associative Property: (A × B) × C = A × (B × C)</li>
        <li>Commutative Property: A × B = B × A</li>
        <li>Distributive Property: A × (B ∪ C) = (A × B) ∪ (A × C)</li>
      </ul>
      ">
      <path d="M 10,140 L 30,140" stroke="#000" stroke-width="2" fill="none" />
      <text x="15" y="155" fill="#000" font-size="12" font-family="Arial" text-anchor="middle">Associative Property</text>
      <path d="M 10,160 L 30,160" stroke="#000" stroke-width="2" fill="none" />
      <text x="15" y="175" fill="#000" font-size="12" font-family="Arial" text-anchor="middle">Commutative Property</text>
      <path d="M 10,190 L 30,190" stroke="#000" stroke-width="2" fill="none" />
      <text x="15" y="205" fill="#000" font-size="12" font-family="Arial" text-anchor="middle">Distributive Property</text>
    </g>
    <!-- Section 4: Types of Relations -->
    <rect x="0" y="240" width="100" height="50" rx="10" fill="#4CAF50" />
    <text x="20" y="255" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Types of Relations</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 280" begin="3s" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" from="1 1" to="1 1.5" begin="3.5s" dur="1.5s" repeatCount="indefinite" />
    <g data-narration="A relation R on a set A is said to be an equivalence relation if it satisfies the following properties:
      <ul>
        <li>Reflexive: (a, a) ∈ R for all a ∈ A</li>
        <li>Symmetric: if (a, b) ∈ R, then (b, a) ∈ R</li>
        <li>Transitive: if (a, b) ∈ R and (b, c) ∈ R, then (a, c) ∈ R</li>
      </ul>
      ">
    <g data-narration="A relation R on a set A is said to be a partial order if it satisfies the following properties:
      <ul>
        <li>Reflexive: (a, a) ∈ R for all a ∈ A</li>
        <li>Antisymmetric: if (a, b) ∈ R and (b, a) ∈ R, then a = b</li>
        <li>Transitive: if (a, b) ∈ R and (b, c) ∈ R, then (a, c) ∈ R</li>
      </ul>
      ">
    <path d="M 10,280 L 30,280" stroke="#000" stroke-width="2" fill="none" />
    <text x="15" y="295" fill="#000" font-size="12" font-family="Arial" text-anchor="middle">Equivalence Relation</text>
    <path d="M 10,310 L 30,310" stroke="#000" stroke-width="2" fill="none" />
    <text x="15" y="325" fill="#000" font-size="12" font-family="Arial" text-anchor="middle">Partial Order</text>
  </g>
  <!-- Section 5: Examples and Applications -->
  <rect x="0" y="360" width="100" height="50" rx="10" fill="#4CAF50" />
  <text x="20" y="375" fill="#000" font-size="18" font-family="Arial" text-anchor="middle">Examples and Applications</text>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 400" begin="4s" dur="2s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="scale" from="1 1" to="1 1.5" begin="4.5s" dur="1.5s" repeatCount="indefinite" />
  <g data-narration="A relation R on a set A is a subset of the Cartesian product of the sets. For example, let A = {1, 2, 3} and R = {(1, 1), (2, 2), (3, 3)}. Then, R is a partial order on A.">
    <path d="M 10,400 L 30,400" stroke="#000" stroke-width="2" fill="none" />
    <text x="15" y="415" fill="#000" font-size="12" font-family="Arial" text-anchor="middle">Partial Order on A</text>
  </g>
</svg>