<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" style="background-color: #2F4F7F;">

  <!-- Title -->
  <rect x="10" y="10" width="400" height="30" fill="#2F4F7F" rx="5" />
  <text x="15" y="25" fill="#FFFFFF" font-size="24" font-family="Arial" font-weight="bold">Onto Functions</text>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8AC8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#4682B4" stop-opacity="1" />
      <stop offset="100%" stop-color="#8FBC8F" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="40" width="400" height="300" fill="url(#gradient)" rx="5" />
  <rect x="0" y="0" width="400" height="40" fill="#2F4F7F" rx="5" />
  <rect x="0" y="340" width="400" height="40" fill="#2F4F7F" rx="5" />

  <!-- Data Topic Section -->
  <rect x="10" y="50" width="200" height="100" fill="#FFFFFF" rx="5" data-topic-id="loss-functions" data-narration="What are Loss Functions?" style="transition: fill 0.5s ease-in-out;" />
  <animateTransform attributeName="transform" dur="2s" begin="0s" type="translate" from="0 50" to="200 50" />
  <text x="15" y="75" fill="#000000" font-size="16" font-family="Arial" font-weight="normal">Loss Functions</text>
  <animate color="#000000" dur="2s" begin="0s" repeatCount="indefinite" animationDelay="0.5s" />
  <text x="15" y="105" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">Measures how well neural network predictions match true labels</text>
  <animate color="#000000" dur="2s" begin="0.5s" repeatCount="indefinite" animationDelay="1s" />
  <text x="15" y="135" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">Training minimizes loss to improve model accuracy</text>
  <animate color="#000000" dur="2s" begin="1s" repeatCount="indefinite" animationDelay="1.5s" />
  <text x="15" y="165" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">Choice of loss function depends on task type</text>
  <animate color="#000000" dur="2s" begin="1.5s" repeatCount="indefinite" animationDelay="2s" />
  <rect x="210" y="50" width="200" height="100" fill="#FFFFFF" rx="5" data-topic-id="key-concepts" data-narration="Key Concepts" style="transition: fill 0.5s ease-in-out;" />
  <animateTransform attributeName="transform" dur="2s" begin="2s" type="translate" from="200 50" to="400 50" />
  <text x="205" y="75" fill="#000000" font-size="16" font-family="Arial" font-weight="normal">Key Concepts</text>
  <animate color="#000000" dur="2s" begin="2s" repeatCount="indefinite" animationDelay="0.5s" />
  <text x="205" y="105" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">Loss vs Cost</text>
  <animate color="#000000" dur="2s" begin="2.5s" repeatCount="indefinite" animationDelay="1s" />
  <text x="205" y="135" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">Loss: Error for a single training example</text>
  <animate color="#000000" dur="2s" begin="3s" repeatCount="indefinite" animationDelay="1.5s" />
  <text x="205" y="165" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">Cost: Average loss over entire training set</text>

  <!-- Regression Loss Functions Section -->
  <rect x="10" y="200" width="200" height="100" fill="#FFFFFF" rx="5" data-topic-id="regression-loss-functions" data-narration="Regression Loss Functions" style="transition: fill 0.5s ease-in-out;" />
  <animateTransform attributeName="transform" dur="2s" begin="3.5s" type="translate" from="200 200" to="400 200" />
  <text x="15" y="225" fill="#000000" font-size="16" font-family="Arial" font-weight="normal">Regression Loss Functions</text>
  <animate color="#000000" dur="2s" begin="3.5s" repeatCount="indefinite" animationDelay="0.5s" />
  <text x="15" y="255" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">MSE (Mean Squared Error)</text>
  <animate color="#000000" dur="2s" begin="4s" repeatCount="indefinite" animationDelay="1s" />
  <text x="15" y="285" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">MAE (Mean Absolute Error)</text>
  <animate color="#000000" dur="2s" begin="4.5s" repeatCount="indefinite" animationDelay="1.5s" />
  <text x="15" y="315" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">Huber Loss</text>

  <!-- Classification Loss Functions Section -->
  <rect x="10" y="350" width="200" height="100" fill="#FFFFFF" rx="5" data-topic-id="classification-loss-functions" data-narration="Classification Loss Functions" style="transition: fill 0.5s ease-in-out;" />
  <animateTransform attributeName="transform" dur="2s" begin="5.5s" type="translate" from="200 350" to="400 350" />
  <text x="15" y="375" fill="#000000" font-size="16" font-family="Arial" font-weight="normal">Classification Loss Functions</text>
  <animate color="#000000" dur="2s" begin="5.5s" repeatCount="indefinite" animationDelay="0.5s" />
  <text x="15" y="405" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">BCE (Binary Cross-Entropy)</text>
  <animate color="#000000" dur="2s" begin="6s" repeatCount="indefinite" animationDelay="1s" />
  <text x="15" y="435" fill="#000000" font-size="14" font-family="Arial" font-weight="normal">CCE (Categorical Cross-Entropy)</text>

  <!-- Footer -->
  <rect x="0" y="380" width="400" height="40" fill="#2F4F7F" rx="5" />

  <text x="15" y="395" fill="#FFFFFF" font-size="16" font-family="Arial" font-weight="bold">Onto Functions</text>

</svg>