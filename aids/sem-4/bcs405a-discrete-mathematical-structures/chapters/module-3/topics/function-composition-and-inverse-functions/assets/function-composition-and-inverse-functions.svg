<svg width="420" height="400" data-topic-id="function-composition-and-inverse-functions">
  <style>
    /* styles for the gradient background */
    .background {
      background-image: linear-gradient(to bottom, #7A8DBE, #8C96C9);
      background-size: 100% 100%;
      height: 100%;
      width: 100%;
    }
    
    /* styles for the sections */
    .section {
      position: relative;
      margin-bottom: 20px;
    }
    
    /* styles for the text */
    .text {
      font-size: 18px;
      font-weight: bold;
      color: #3498db;
    }
    
    /* styles for the arrows */
    .arrow {
      fill: #8c96c9;
      stroke: #8c96c9;
      stroke-width: 2px;
      shape-rendering: crispEdges;
    }
  </style>
  
  <!-- title and footer -->
  <g transform="translate(20, 20)">
    <text class="title" x="50%" y="40%" text-anchor="middle">Function Composition and Inverse Functions</text>
  </g>
  <g transform="translate(20, 420)">
    <text class="footer" x="50%" y="40%" text-anchor="middle">2023</text>
  </g>
  
  <!-- background -->
  <g class="background"></g>
  
  <!-- section 1: introduction -->
  <g class="section">
    <text class="text" x="50%" y="20%" text-anchor="middle">Introduction</text>
    <animatetransform attributeName="transform" type="rotate" from="0,50%,50%" to="360,50%,50%" dur="10s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- section 2: function composition -->
  <g class="section">
    <text class="text" x="50%" y="20%" text-anchor="middle">Function Composition</text>
    <g transform="translate(50%, 150%)">
      <circle class="icon" cx="0" cy="0" r="20" />
      <text class="text" x="20%" y="50%" text-anchor="middle">f(x)</text>
      <text class="text" x="60%" y="50%" text-anchor="middle">g(x)</text>
      <text class="text" x="50%" y="80%" text-anchor="middle">(f ∘ g)(x)</text>
      <g class="arrow">
        <line x1="20%" y1="50%" x2="60%" y2="50%" />
      </g>
      <g class="arrow">
        <line x1="50%" y1="80%" x2="50%" y2="80%" />
      </g>
    </g>
    <animatetransform attributeName="transform" type="scale" from="1,1" to="1.5,1.5" dur="2s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- section 3: properties of function composition -->
  <g class="section">
    <text class="text" x="50%" y="20%" text-anchor="middle">Properties of Function Composition</text>
    <g transform="translate(50%, 250%)">
      <circle class="icon" cx="0" cy="0" r="20" />
      <text class="text" x="20%" y="50%" text-anchor="middle">Associativity</text>
      <g class="arrow">
        <line x1="20%" y1="50%" x2="40%" y2="50%" />
      </g>
      <text class="text" x="60%" y="50%" text-anchor="middle">Identity</text>
      <g class="arrow">
        <line x1="50%" y1="100%" x2="60%" y2="100%" />
      </g>
      <text class="text" x="20%" y="120%" text-anchor="middle">Composition is not commutative</text>
      <g class="arrow">
        <line x1="20%" y1="120%" x2="40%" y2="120%" />
      </g>
    </g>
    <animatetransform attributeName="transform" type="rotate" from="0,50%,50%" to="360,50%,50%" dur="10s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- section 4: examples -->
  <g class="section">
    <text class="text" x="50%" y="20%" text-anchor="middle">Examples</text>
    <g transform="translate(50%, 350%)">
      <circle class="icon" cx="0" cy="0" r="20" />
      <g>
        <path d="M20 50 L60 50" stroke-width="2" stroke="#8c96c9" />
        <path d="M60 50 L60 70" stroke-width="2" stroke="#8c96c9" />
        <path d="M60 70 L80 70" stroke-width="2" stroke="#8c96c9" />
        <text class="text" x="20%" y="60%" text-anchor="middle">f(x) = 2x</text>
        <text class="text" x="60%" y="60%" text-anchor="middle">g(x) = x + 1</text>
        <text class="text" x="50%" y="80%" text-anchor="middle">(f ∘ g)(x) = f(g(x)) = 2(x + 1) = 2x + 2</text>
      </g>
      <g>
        <path d="M20 50 L60 50" stroke-width="2" stroke="#8c96c9" />
        <path d="M60 50 L60 70" stroke-width="2" stroke="#8c96c9" />
        <path d="M60 70 L80 70" stroke-width="2" stroke="#8c96c9" />
        <text class="text" x="20%" y="60%" text-anchor="middle">f(x) = x^2</text>
        <text class="text" x="60%" y="60%" text-anchor="middle">g(x) = x + 1</text>
        <text class="text" x="50%" y="80%" text-anchor="middle">(f ∘ g)(x) = f(g(x)) = (x + 1)^2 = x^2 + 2x + 1</text>
      </g>
    </g>
    <animatetransform attributeName="transform" type="rotate" from="0,50%,50%" to="360,50%,50%" dur="10s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- section 5: inverse functions -->
  <g class="section">
    <text class="text" x="50%" y="20%" text-anchor="middle">Inverse Functions</text>
    <g transform="translate(50%, 250%)">
      <circle class="icon" cx="0" cy="0" r="20" />
      <text class="text" x="20%" y="50%" text-anchor="middle">Inverse Function</text>
      <text class="text" x="60%" y="50%" text-anchor="middle">f^{-1}(x)</text>
      <text class="text" x="50%" y="80%" text-anchor="middle">f^{-1}(f(x)) = x</text>
    </g>
    <animatetransform attributeName="transform" type="rotate" from="0,50%,50%" to="360,50%,50%" dur="10s" begin="0s" repeatCount="indefinite" />
  </g>
  
  <!-- section 6: examples -->
  <g class="section">
    <text class="text" x="50%" y="20%" text-anchor="middle">Examples</text>
    <g transform="translate(50%, 350%)">
      <circle class="icon" cx="0" cy="0" r="20" />
      <g>
        <path d="M20 50 L60 50" stroke-width="2" stroke="#8c96c9" />
        <path d="M60 50 L60 70" stroke-width="2" stroke="#8c96c9" />
        <path d="M60 70 L80 70" stroke-width="2" stroke="#8c96c9" />
        <text class="text" x="20%" y="60%" text-anchor="middle">f(x) = 2x</text>
        <text class="text" x="60%" y="60%" text-anchor="middle">f^{-1}(x) = x/2</text>
        <text class="text" x="50%" y="80%" text-anchor="middle">f^{-1}(f(x)) = f^{-1}(2x) = x/2</text>
      </g>
      <g>
        <path d="M20 50 L60 50" stroke-width="2" stroke="#8c96c9" />
        <path d="M60 50 L60 70" stroke-width="2" stroke="#8c96c9" />
        <path d="M60 70 L80 70" stroke-width="2" stroke="#8c96c9" />
        <text class="text" x="20%" y="60%" text-anchor="middle">f(x) = x^2</text>
        <text class="text" x="60%" y="60%" text-anchor="middle">f^{-1}(x) = sqrt(x)</text>
        <text class="text" x="50%" y="80%" text-anchor="middle">f^{-1}(f(x)) = f^{-1}(x^2) = sqrt(x^2) = |x|</text>
      </g>
    </g>
    <animatetransform attributeName="transform" type="rotate" from="0,50%,50%" to="360,50%,50%" dur="10s" begin="0s" repeatCount="indefinite" />
  </g>
</svg>