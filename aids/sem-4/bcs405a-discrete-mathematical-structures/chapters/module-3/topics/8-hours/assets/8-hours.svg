<svg width="420" height="400" data-topic-id="discrete-mathematical-structures-relations-and-functions-8-hours"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>8 Hours: Relations and Functions</title>
    <style>
        /* Add style for gradient background */
        rect {
            fill: linear-gradient(to bottom, #c7b8ea, #6495ed);
        }
    </style>
    <rect x="0" y="0" width="420" height="400"></rect>
    <!-- Top title section -->
    <g data-narration="Title">
        <text x="180" y="20" font-size="36" font-family="Arial, sans-serif" text-anchor="middle">
            8 Hours: Relations and Functions
        </text>
    </g>
    <!-- Section 1: Relations Overview -->
    <g data-narration="Section 1: Relations Overview">
        <rect x="20" y="80" width="380" height="200" rx="10"></rect>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="180,90" begin="-0.5s" dur="1.5s" repeatCount="indefinite" />
        <text x="100" y="120" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
            Relations: A subset of the Cartesian product A × B.
        </text>
        <path d="M 60,120 L 120,180 L 180,120" stroke="#3E8E41" stroke-width="2" fill="none" />
        <path d="M 100,190 L 100,130" stroke="#3E8E41" stroke-width="2" fill="none" />
    </g>
    <!-- Section 2: Types of Relations -->
    <g data-narration="Section 2: Types of Relations">
        <rect x="20" y="290" width="380" height="200" rx="10"></rect>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="180,190" begin="-0.5s" dur="1.5s" repeatCount="indefinite" />
        <text x="100" y="210" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
            Types of Relations:
            <br>Reflexive, Symmetric, Transitive, Equivalence, Partial Order.
        </text>
        <rect x="60" y="200" width="60" height="60" rx="10" fill="#C7B8EA"></rect>
        <rect x="120" y="200" width="60" height="60" rx="10" fill="#6495ED"></rect>
        <rect x="180" y="200" width="60" height="60" rx="10" fill="#FFC107"></rect>
        <rect x="240" y="200" width="60" height="60" rx="10" fill="#32CD32"></rect>
    </g>
    <!-- Section 3: Functions Overview -->
    <g data-narration="Section 3: Functions Overview">
        <rect x="20" y="380" width="380" height="200" rx="10"></rect>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="180,290" begin="-0.5s" dur="1.5s" repeatCount="indefinite" />
        <text x="100" y="210" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
            Functions: A relation from A to B that satisfies single-valued and well-defined properties.
        </text>
        <path d="M 60,220 L 120,270 L 180,220" stroke="#3E8E41" stroke-width="2" fill="none" />
        <path d="M 100,300 L 100,230" stroke="#3E8E41" stroke-width="2" fill="none" />
    </g>
    <!-- Section 4: Types of Functions -->
    <g data-narration="Section 4: Types of Functions">
        <rect x="20" y="470" width="380" height="200" rx="10"></rect>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="180,470" begin="-0.5s" dur="1.5s" repeatCount="indefinite" />
        <text x="100" y="390" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
            Types of Functions:
            <br>Constant, Identity, One-to-One, Onto.
        </text>
        <rect x="60" y="380" width="60" height="60" rx="10" fill="#C7B8EA"></rect>
        <rect x="120" y="380" width="60" height="60" rx="10" fill="#6495ED"></rect>
        <rect x="180" y="380" width="60" height="60" rx="10" fill="#FFC107"></rect>
        <rect x="240" y="380" width="60" height="60" rx="10" fill="#32CD32"></rect>
    </g>
    <!-- Section 5: Examples of Functions -->
    <g data-narration="Section 5: Examples of Functions">
        <rect x="20" y="550" width="380" height="200" rx="10"></rect>
        <animateTransform attributeName="transform" type="translate" from="0,0" to="180,550" begin="-0.5s" dur="1.5s" repeatCount="indefinite" />
        <text x="100" y="470" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
            Example Functions:
            <br>f: {1, 2, 3} → {a, b} defined by f(1) = a, f(2) = b, f(3) = b.
        </text>
        <path d="M 60,500 L 120,550 L 180,500" stroke="#3E8E41" stroke-width="2" fill="none" />
    </g>
    <!-- Footer section -->
    <g data-narration="Footer">
        <rect x="20" y="370" width="380" height="30" rx="10" fill="#6495ED"></rect>
        <text x="190" y="380" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">
            Last updated: <span> February 7, 2024</span>
        </text>
    </g>
    <!-- Arrow markers -->
    <line x1="180" y1="40" x2="180" y2="360" stroke="#3E8E41" stroke-width="2" />
    <line x1="180" y1="160" x2="180" y2="260" stroke="#3E8E41" stroke-width="2" />
    <line x1="180" y1="220" x2="180" y2="320" stroke="#3E8E41" stroke-width="2" />
    <line x1="180" y1="280" x2="180" y2="380" stroke="#3E8E41" stroke-width="2" />
</svg>