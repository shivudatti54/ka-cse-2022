<svg width="420" height="400" data-topic-id="basic-connectives-and-truth-tables">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" />
      <stop offset="100%" stop-color="#87CEEB" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" fill="#2F4F7F">
    Basic Connectives and Truth Tables
  </text>
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="20" y="100" width="350" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="115" text-anchor="middle" font-size="18" fill="#2F4F7F">
      In discrete mathematical structures, logic plays a crucial role in understanding and analyzing the behavior of complex systems.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 120" dur="1500" begin="0s" />
  </section>
  
  <!-- Section 2: Conjunction (AND) -->
  <section data-narration="Conjunction (AND)">
    <rect x="20" y="200" width="350" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="215" text-anchor="middle" font-size="18" fill="#2F4F7F">
      Conjunction is a connective that combines two propositions to form a new proposition that is true only if both propositions are true.
    </text>
    <text x="50%" y="230" text-anchor="middle" font-size="18" fill="#2F4F7F">
      P ∧ Q (P and Q) is true if and only if both P and Q are true.
    </text>
    <table>
      <tbody>
        <tr>
          <td>P</td>
          <td>Q</td>
          <td>P ∧ Q</td>
        </tr>
        <tr>
          <td>T</td>
          <td>T</td>
          <td>T</td>
        </tr>
        <tr>
          <td>T</td>
          <td>F</td>
          <td>F</td>
        </tr>
        <tr>
          <td>F</td>
          <td>T</td>
          <td>F</td>
        </tr>
        <tr>
          <td>F</td>
          <td>F</td>
          <td>F</td>
        </tr>
      </tbody>
    </table>
    <animateTransform attributeName="transform" type="translate" from="0 220" to="0 240" dur="1500" begin="0s" />
  </section>
  
  <!-- Section 3: Disjunction (OR) -->
  <section data-narration="Disjunction (OR)">
    <rect x="20" y="300" width="350" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="315" text-anchor="middle" font-size="18" fill="#2F4F7F">
      Disjunction is a connective that combines two propositions to form a new proposition that is true if at least one of the propositions is true.
    </text>
    <text x="50%" y="330" text-anchor="middle" font-size="18" fill="#2F4F7F">
      P ∨ Q (P or Q) is true if and only if at least one of P or Q is true.
    </text>
    <table>
      <tbody>
        <tr>
          <td>P</td>
          <td>Q</td>
          <td>P ∨ Q</td>
        </tr>
        <tr>
          <td>T</td>
          <td>T</td>
          <td>T</td>
        </tr>
        <tr>
          <td>T</td>
          <td>F</td>
          <td>T</td>
        </tr>
        <tr>
          <td>F</td>
          <td>T</td>
          <td>T</td>
        </tr>
        <tr>
          <td>F</td>
          <td>F</td>
          <td>F</td>
        </tr>
      </tbody>
    </table>
    <animateTransform attributeName="transform" type="translate" from="0 330" to="0 360" dur="1500" begin="0s" />
  </section>
  
  <!-- Section 4: Negation (NOT) -->
  <section data-narration="Negation (NOT)">
    <rect x="20" y="400" width="350" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="415" text-anchor="middle" font-size="18" fill="#2F4F7F">
      Negation is a connective that combines a proposition to form a new proposition that is true if the original proposition is false.
    </text>
    <text x="50%" y="430" text-anchor="middle" font-size="18" fill="#2F4F7F">
      ¬P (not P) is true if and only if P is false.
    </text>
    <table>
      <tbody>
        <tr>
          <td>P</td>
          <td>¬P</td>
        </tr>
        <tr>
          <td>T</td>
          <td>F</td>
        </tr>
        <tr>
          <td>F</td>
          <td>T</td>
        </tr>
      </tbody>
    </table>
    <animateTransform attributeName="transform" type="translate" from="0 430" to="0 460" dur="1500" begin="0s" />
  </section>
  
  <!-- Section 5: Implication (IF-THEN) -->
  <section data-narration="Implication (IF-THEN)">
    <rect x="20" y="500" width="350" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="515" text-anchor="middle" font-size="18" fill="#2F4F7F">
      Implication is a connective that combines two propositions to form a new proposition that is true if the antecedent (the proposition before the arrow) is false or if the consequent (the proposition after the arrow) is true.
    </text>
    <text x="50%" y="530" text-anchor="middle" font-size="18" fill="#2F4F7F">
      P → Q (P implies Q) is true if and only if either P is false or Q is true.
    </text>
    <table>
      <tbody>
        <tr>
          <td>P</td>
          <td>Q</td>
          <td>P → Q</td>
        </tr>
        <tr>
          <td>T</td>
          <td>T</td>
          <td>T</td>
        </tr>
        <tr>
          <td>T</td>
          <td>F</td>
          <td>F</td>
        </tr>
        <tr>
          <td>F</td>
          <td>T</td>
          <td>T</td>
        </tr>
        <tr>
          <td>F</td>
          <td>F</td>
          <td>T</td>
        </tr>
      </tbody>
    </table>
    <animateTransform attributeName="transform" type="translate" from="0 530" to="0 570" dur="1500" begin="0s" />
  </section>
  
  <!-- Footer -->
  <text x="50%" y="380" text-anchor="middle" font-size="18" fill="#2F4F7F">
    Thank you for learning about Basic Connectives and Truth Tables!
  </text>
</svg>