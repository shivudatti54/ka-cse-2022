<svg width="420" height="400" data-topic-id="8-hours" xmlns="http://www.w3.org/2000/svg">
  <rect fill="rgb(68, 68, 128)" width="100%" height="100%"></rect>
  <g id="group1" transform="translate(0, 50)">
    <title>What is an 8-Hour Block?</title>
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#3b3b3b">8-Hour Block</text>
    <rect x="20" y="60" width="100%" height="20" fill="#f0f0f0"></rect>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#444444" data-narration="Definition">Definition</text>
    <circles cx="50%" cy="50%" r="30" fill="#3b3b3b" stroke="#3b3b3b" stroke-width="2" stroke-dasharray="4,4,4,4" data-narration="A set of 8 vertices connected to each other in a cycle"></circles>
  </g>
  <g id="group2" transform="translate(170, 50)">
    <title>Properties of 8-Hour Blocks</title>
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#3b3b3b">Properties</text>
    <rect x="20" y="60" width="100%" height="20" fill="#f0f0f0"></rect>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#444444" data-narration="An 8-hour block is a cycle, which means it has no beginning or end"></text>
    <circles cx="50%" cy="50%" r="30" fill="#3b3b3b" stroke="#3b3b3b" stroke-width="2" stroke-dasharray="4,4,4,4" data-narration="Connected, which means every vertex is adjacent to every other vertex"></circles>
  </g>
  <g id="group3" transform="translate(320, 50)">
    <title>Applications of 8-Hour Blocks</title>
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#3b3b3b">Applications</text>
    <rect x="20" y="60" width="100%" height="20" fill="#f0f0f0"></rect>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#444444" data-narration="Scheduling, traffic flow, and data analysis"></text>
    <circles cx="50%" cy="50%" r="30" fill="#3b3b3b" stroke="#3b3b3b" stroke-width="2" stroke-dasharray="4,4,4,4"></circles>
  </g>
  <g id="group4" transform="translate(0, 250)">
    <title>Key Concepts</title>
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#3b3b3b">Key Concepts</text>
    <rect x="20" y="60" width="100%" height="20" fill="#f0f0f0"></rect>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#444444" data-narration="Cycle: A path that starts and ends at the same vertex, with no repeated edges"></text>
    <circles cx="50%" cy="50%" r="30" fill="#3b3b3b" stroke="#3b3b3b" stroke-width="2" stroke-dasharray="4,4,4,4"></circles>
    <circles cx="50%" cy="50%" r="30" fill="#3b3b3b" stroke="#3b3b3b" stroke-width="2" stroke-dasharray="4,4,4,4" data-narration="Subgraph: A graph that is obtained by selecting a subset of vertices and edges from a larger graph"></circles>
    <circles cx="50%" cy="50%" r="30" fill="#3b3b3b" stroke="#3b3b3b" stroke-width="2" stroke-dasharray="4,4,4,4"></circles>
  </g>
  <g id="group5" transform="translate(170, 250)">
    <title>Exercises</title>
    <text x="20" y="20" font-size="24" font-family="Arial" fill="#3b3b3b">Exercises</text>
    <rect x="20" y="60" width="100%" height="20" fill="#f0f0f0"></rect>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#444444" data-narration="Draw an example of an 8-hour block"></text>
  </g>
</svg>