<svg width="420" height="400" data-topic-id="definitions-and-the-proofs-of-theorems">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2E6CE" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-gradient)" />
  
  <!-- Title at top -->
  <text x="50%" y="20%" transform="rotate(90 200 20)" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">
    Definitions and the Proofs of Theorems
  </text>
  
  <!-- Section 1: Introduction -->
  <text x="10" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="This is a definition of a theorem. A theorem is a statement that has been rigorously proved to be true for all possible values of its variables.">
    Definition of a Theorem
  </text>
  <rect x="10" y="90" width="400" height="20" style="fill: #F7F7F7; stroke: #2F4F7F; stroke-width: 2" rx="5" />
  
  <!-- Section 2: Definitions -->
  <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="A definition is a statement that provides a clear and concise explanation of a mathematical concept, while a proof is a logical argument that establishes the truth of a theorem.">
    Definitions
  </text>
  <rect x="10" y="130" width="400" height="20" style="fill: #F7F7F7; stroke: #2F4F7F; stroke-width: 2" rx="5" />
  
  <!-- Section 3: Key Concepts -->
  <text x="10" y="160" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Induction, proof by contradiction, and direct proof are three methods of proof that are commonly used in mathematics.">
    Key Concepts
  </text>
  <rect x="10" y="170" width="400" height="20" style="fill: #F7F7F7; stroke: #2F4F7F; stroke-width: 2" rx="5" />
  
  <!-- Section 4: Induction -->
  <text x="10" y="200" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Induction is a method of proof that involves using mathematical induction to establish the truth of a statement.">
    Induction
  </text>
  <rect x="10" y="210" width="400" height="20" style="fill: #F7F7F7; stroke: #2F4F7F; stroke-width: 2" rx="5" />
  
  <!-- Section 5: Proof by Contradiction -->
  <text x="10" y="240" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Proof by contradiction is a method of proof that involves assuming the opposite of what is to be proven, and then showing that this assumption leads to a logical contradiction.">
    Proof by Contradiction
  </text>
  <rect x="10" y="250" width="400" height="20" style="fill: #F7F7F7; stroke: #2F4F7F; stroke-width: 2" rx="5" />
  
  <!-- Section 6: Direct Proof -->
  <text x="10" y="280" font-size="18" font-family="Arial, sans-serif" fill="#2F4F7F" data-narration="Direct proof is a method of proof that involves using a series of logical steps to establish the truth of a statement.">
    Direct Proof
  </text>
  <rect x="10" y="290" width="400" height="20" style="fill: #F7F7F7; stroke: #2F4F7F; stroke-width: 2" rx="5" />
  
  <!-- Footer -->
  <text x="50%" y="380" transform="rotate(90 200 380)" font-size="24" font-family="Arial, sans-serif" fill="#2F4F7F">
    Definitions and the Proofs of Theorems
  </text>
</svg>