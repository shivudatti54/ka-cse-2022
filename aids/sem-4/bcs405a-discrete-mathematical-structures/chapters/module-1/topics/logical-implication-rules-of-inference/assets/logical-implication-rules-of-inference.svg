<svg width="420" height="400" data-topic-id="logical-implication-rules-of-inference" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background: #6495ED;">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(10, 20)">
    <!-- Title at top -->
    <text x="180" y="50" font-size="24" font-weight="bold">Logical Implication Rules Of Inference</text>
    <!-- Section 1: Definition -->
    <rect x="20" y="80" width="360" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="90" font-size="16" font-weight="bold">Definition</text>
    <text x="20" y="110" font-size="14" data-narration="Logical implication, denoted by ⇒ (implies), is a binary relation between two statements A and B, such that: A ⇒ B is true if and only if either A is false or B is true." fill="#333333"/>
    <!-- Section 2: Modus Ponens -->
    <rect x="20" y="130" width="360" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="140" font-size="16" font-weight="bold">Modus Ponens</text>
    <text x="20" y="160" font-size="14" data-narration="If A ⇒ B and A, then B." fill="#333333"/>
    <text x="20" y="180" font-size="14" data-narration="Example: If it rains, the streets will be wet. (A ⇒ B) If it is raining. (A) ∴ The streets will be wet. (B)" fill="#333333"/>
    <!-- Section 3: Modus Tollens -->
    <rect x="20" y="200" width="360" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="210" font-size="16" font-weight="bold">Modus Tollens</text>
    <text x="20" y="230" font-size="14" data-narration="If A ⇒ B and ¬B, then ¬A." fill="#333333"/>
    <text x="20" y="250" font-size="14" data-narration="Example: If it is sunny, then the temperature will be high. (A ⇒ B) The temperature is not high. (¬B) ∴ It is not sunny. (¬A)" fill="#333333"/>
    <!-- Section 4: Hypothetical Syllogism -->
    <rect x="20" y="280" width="360" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="290" font-size="16" font-weight="bold">Hypothetical Syllogism</text>
    <text x="20" y="310" font-size="14" data-narration="If A ⇒ B and B ⇒ C, then A ⇒ C." fill="#333333"/>
    <text x="20" y="330" font-size="14" data-narration="Example: If it is cold, then I will wear a jacket. (A ⇒ B) If I wear a jacket, then the temperature will drop. (B ⇒ C) ∴ If it is cold, then the temperature will drop. (A ⇒ C)" fill="#333333"/>
    <!-- Footer at bottom -->
    <rect x="10" y="390" width="400" height="10" fill="#FFFFFF" rx="5"/>
    <text x="180" y="400" font-size="14" font-weight="bold">Logical Implication Rules Of Inference</text>
  </g>
  <!-- Arrow markers for connections -->
  <path d="M 10 10 L 120 10" stroke="#0097A7" stroke-width="2"/>
  <path d="M 10 190 L 120 190" stroke="#0097A7" stroke-width="2"/>
  <path d="M 10 250 L 120 250" stroke="#0097A7" stroke-width="2"/>
  <path d="M 10 300 L 120 300" stroke="#0097A7" stroke-width="2"/>
  <!-- Smooth animations using <animate> elements with sequential begin times -->
  <animate dur="2000" repeatCount="indefinite" begin="0s" attributeName="opacity" from="1" to="0" fill="freeze"/>
  <animate dur="2000" repeatCount="indefinite" begin="1s" attributeName="x" from="10" to="120" fill="freeze"/>
  <animate dur="2000" repeatCount="indefinite" begin="2s" attributeName="y" from="10" to="190" fill="freeze"/>
  <animate dur="2000" repeatCount="indefinite" begin="3s" attributeName="y" from="190" to="250" fill="freeze"/>
  <animate dur="2000" repeatCount="indefinite" begin="4s" attributeName="y" from="250" to="300" fill="freeze"/>
</svg>