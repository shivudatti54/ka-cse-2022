<svg width="420" height="400" data-topic-id="logic-equivalence-laws-of-logic">
  <rect x="0" y="0" width="100%" height="100%" fill="#C7B8EA"/>
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="300" height="200" fill="#87CEEB"/>
    <text x="15" y="20" font-size="18" font-family="Arial" fill="#3498DB">Logic Equivalence</text>
    <text x="15" y="60" font-size="14" font-family="Arial" fill="#3498DB">Laws of Logic</text>
    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="100%" height="100%" fill="#FFC107"/>
      <text x="15" y="15" font-size="18" font-family="Arial" fill="#FF9800">Law of Identity</text>
      <text x="15" y="50" font-size="14" font-family="Arial" fill="#FF9800">A statement is logically equivalent to itself.</text>
      <rect x="0" y="100" width="100%" height="100%" fill="#4CAF50"/>
      <text x="15" y="115" font-size="18" font-family="Arial" fill="#4CAF50">Law of Commutativity</text>
      <text x="15" y="150" font-size="14" font-family="Arial" fill="#4CAF50">The order of two statements does not affect their logical equivalence.</text>
      <rect x="0" y="250" width="100%" height="100%" fill="#2196F3"/>
      <text x="15" y="265" font-size="18" font-family="Arial" fill="#2196F3">Law of Associativity</text>
      <text x="15" y="300" font-size="14" font-family="Arial" fill="#2196F3">The order in which three statements are combined does not affect their logical equivalence.</text>
    </g>
    <g transform="translate(0, 350)">
      <rect x="0" y="0" width="100%" height="100%" fill="#FF9800"/>
      <text x="15" y="15" font-size="18" font-family="Arial" fill="#FF9800">Law of Absorption</text>
      <text x="15" y="50" font-size="14" font-family="Arial" fill="#FF9800">If two statements are logically equivalent, then the truth value of one statement is determined by the truth value of the other statement.</text>
      <rect x="0" y="150" width="100%" height="100%" fill="#4CAF50"/>
      <text x="15" y="165" font-size="18" font-family="Arial" fill="#4CAF50">Law of Excluded Middle</text>
      <text x="15" y="200" font-size="14" font-family="Arial" fill="#4CAF50">A statement is either true or false, with no middle ground.</text>
    </g>
  </g>
  <g transform="translate(0, 400)">
    <text x="15" y="20" font-size="14" font-family="Arial" fill="#3498DB">
      <animate xlink:href="#arrow" begin="0s" dur="2s" repeatCount="indefinite"/>
      <tspan x="15" y="60"> </tspan>
      <tspan x="15" y="100"> </tspan>
      <tspan x="15" y="140"> </tspan>
      <tspan x="15" y="180"> </tspan>
      <tspan x="15" y="220"> </tspan>
    </text>
  </g>
</svg>