<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg"
     data-topic-id="Fundamental-Principles-Of-Counting-The-Rules-Of-Sum-and-Product"
     viewBox="0 0 420 400" xml:space="preserve">

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2f2" />
      <stop offset="100%" stop-color="#87ceeb" />
    </linearGradient>
  </defs>

  <!-- SVG Group for Navigation -->
  <g id="nav-group">
    <rect x="10" y="10" width="400" height="30" fill="#87ceeb" rx="5" />
    <text x="15" y="15" fill="#000" font-size="14" font-family="Arial">
      Fundamental Principles of Counting
    </text>
  </g>

  <!-- Title Section -->
  <g id="title-section">
    <rect x="10" y="50" width="400" height="100" fill="#87ceeb" rx="5" />
    <text x="20" y="60" fill="#000" font-size="20" font-family="Arial">
      Rules of Sum and Product
    </text>
    <animateTransform
        attributeName="transform"
        type="translate"
        from="0 150"
        to="0 250"
        dur="2000"
        begin="0s"
        repeatCount="indefinite"
    />
  </g>

  <!-- Section 1: Definition and Explanation -->
  <g id="section-1">
    <rect x="10" y="170" width="350" height="80" fill="#f7f7f7" rx="5" />
    <text x="20" y="180" fill="#000" font-size="16" font-family="Arial">
      Definition:
    </text>
    <text x="20" y="210" fill="#000" font-size="16" font-family="Arial">
      The Rules of Sum and Product are two fundamental principles used to count the number of possible outcomes in a situation.
    </text>
    <text x="20" y="240" fill="#000" font-size="16" font-family="Arial">
      Explanation:
    </text>
    <text x="20" y="270" fill="#000" font-size="16" font-family="Arial">
      Let's consider two events, A and B, and their respective probabilities. The Rules of Sum and Product state that the probability of either A or B occurring is the sum of their individual probabilities, and the probability of both A and B occurring is the product of their individual probabilities.
    </text>
  </g>

  <!-- Section 2: Example -->
  <g id="section-2">
    <rect x="10" y="290" width="350" height="80" fill="#f7f7f7" rx="5" />
    <text x="20" y="300" fill="#000" font-size="16" font-family="Arial">
      Example:
    </text>
    <text x="20" y="330" fill="#000" font-size="16" font-family="Arial">
      Suppose we have two coins, and each coin has a probability of 0.5 of landing heads or tails. Using the Rules of Sum and Product, we can calculate the probability of either coin landing heads as follows:
    </text>
    <text x="20" y="360" fill="#000" font-size="16" font-family="Arial">
      P(Heads) = P(Heads on coin 1) + P(Heads on coin 2) = 0.5 + 0.5 = 1
    </text>
    <text x="20" y="390" fill="#000" font-size="16" font-family="Arial">
      Similarly, the probability of both coins landing heads is:
    </text>
    <text x="20" y="420" fill="#000" font-size="16" font-family="Arial">
      P(Heads on both coins) = P(Heads on coin 1) × P(Heads on coin 2) = 0.5 × 0.5 = 0.25
    </text>
  </g>

  <!-- Section 3: Permutations -->
  <g id="section-3">
    <rect x="10" y="350" width="350" height="80" fill="#f7f7f7" rx="5" />
    <text x="20" y="360" fill="#000" font-size="16" font-family="Arial">
      Permutations
    </text>
    <text x="20" y="390" fill="#000" font-size="16" font-family="Arial">
      Permutations refer to the arrangement of objects in a specific order.
    </text>
    <animateTransform
        attributeName="transform"
        type="translate"
        from="0 450"
        to="0 550"
        dur="2000"
        begin="1s"
        repeatCount="indefinite"
    />
  </g>

  <!-- Footer Section -->
  <g id="footer-section">
    <rect x="10" y="380" width="400" height="20" fill="#87ceeb" rx="5" />
    <text x="15" y="390" fill="#000" font-size="14" font-family="Arial">
      Created by [Your Name]
    </text>
  </g>

</svg>