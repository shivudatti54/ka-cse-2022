<svg width="420" height="400" data-topic-id="well-ordering-principle-mathematical-induction">
    <defs>
        <linearGradient id="pastelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
            <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1" />
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="100%" height="100%" fill="url(#pastelGradient)" />
    <text x="50%" y="20%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
        <tspan data-narration="title">The Well Ordering Principle Mathematical Induction</tspan>
    </text>
    <rect x="0" y="100" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="120%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>Definition</tspan>
    </text>
    <rect x="0" y="150" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="170%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>The Well Ordering Principle (WOP) is a statement in predicate logic that states:</tspan>
        <tspan data-narration="lineBreak">There exists a natural number x such that P(x) is true.</tspan>
        <tspan data-narration="lineBreak">For all natural numbers y, if y is less than x, then either P(y) is true or P(x) is true.</tspan>
    </text>
    <rect x="0" y="210" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="230%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>Explanation</tspan>
    </text>
    <rect x="0" y="270" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="290%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>The WOP is a powerful tool for establishing the validity of statements about natural numbers.</tspan>
        <tspan data-narration="lineBreak">It allows us to prove that a particular statement is true for all natural numbers by showing that it is true for some natural number and that it remains true for all smaller natural numbers.</tspan>
    </text>
    <rect x="0" y="330" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="350%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>Mathematical Induction</tspan>
    </text>
    <rect x="0" y="390" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="410%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>The process involves two main steps:</tspan>
        <tspan data-narration="lineBreak">1. Base Case: We show that the statement is true for the smallest natural number (usually 1).</tspan>
        <tspan data-narration="lineBreak">2. Inductive Step: We assume that the statement is true for some arbitrary natural number k and show that it is true for k+1.</tspan>
    </text>
    <rect x="0" y="450" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="470%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>Key Concepts</tspan>
    </text>
    <rect x="0" y="520" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="540%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>Well-Ordering Principle (WOP): Every non-empty set of natural numbers has a least element.</tspan>
        <tspan data-narration="lineBreak">Mathematical Induction: A method of proof that uses the WOP to establish the validity of a statement about natural numbers.</tspan>
        <tspan data-narration="lineBreak">Base Case: The smallest natural number for which we want to prove the statement is true.</tspan>
        <tspan data-narration="lineBreak">Inductive Step: The step where we assume the statement is true for some natural number k and show it is true for k+1.</tspan>
    </text>
    <rect x="0" y="590" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="610%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>Examples</tspan>
    </text>
    <rect x="0" y="660" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="680%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="section">
        <tspan>Proving the statement "n^2 ≤ 100" is true for all natural numbers.</tspan>
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="10s" repeatCount="indefinite">
        <animateTransform transform="rotate(1deg)" begin="0s" dur="2s" repeatCount="indefinite" />
        <animateTransform transform="rotate(2deg)" begin="2s" dur="2s" repeatCount="indefinite" />
        <animateTransform transform="rotate(3deg)" begin="4s" dur="2s" repeatCount="indefinite" />
        <animateTransform transform="rotate(4deg)" begin="6s" dur="2s" repeatCount="indefinite" />
        <animateTransform transform="rotate(5deg)" begin="8s" dur="2s" repeatCount="indefinite" />
    </animate>
    <rect x="0" y="720" width="420" height="50" fill="#F7F7F7" rx="5" />
    <text x="50%" y="740%" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-narration="footer">
        <tspan>Copyright 2023</tspan>
    </text>
</svg>