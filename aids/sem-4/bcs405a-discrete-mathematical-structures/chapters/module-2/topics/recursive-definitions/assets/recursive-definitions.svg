<svg width="420" height="400" data-topic-id="recursive_definitions" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2f2"/>
      <stop offset="100%" stop-color="#a7d9f8"/>
    </linearGradient>
  </defs>
  <title>Recursive Definitions</title>
  <text x="180" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#3498db">
    Recursive Definitions
  </text>
  <rect x="10" y="50" width="400" height="300" fill="url(#pastel-gradient)"/>
  <rect x="10" y="10" width="400" height="40" fill="#f1f1f1" stroke="#4d4d4d" stroke-width="1"/>
  <rect x="10" y="10" width="380" height="30" fill="#f1f1f1" stroke="#4d4d4d" stroke-width="1"/>
  <text x="20" y="60" font-size="16" font-family="Arial" text-anchor="middle" fill="#3498db" data-narration>
    <tspan>
      What is a Graph?
    </tspan>
    <tspan x="10" y="60">
      A graph G is an ordered pair G = (V, E) consisting of:
    </tspan>
    <tspan x="10" y="70">
      <br/>
      V: A non-empty set of vertices (also called nodes or points)
    </tspan>
    <tspan x="10" y="80">
      E: A set of edges (also called links or lines) connecting pairs of vertices
    </tspan>
  </text>
  <g transform="translate(10, 100)">
    <text x="20" y="70" font-size="16" font-family="Arial" text-anchor="middle" fill="#3498db">
      Vertices
    </text>
    <symbol id="vertex-symbol">
      <circle cx="20" cy="20" r="10" fill="#ccc"/>
      <circle cx="20" cy="20" r="10" fill="#ccc"/>
    </symbol>
    <g transform="translate(50,20)">
      <rect x="0" y="0" width="20" height="20" fill="#ccc" stroke="#4d4d4d" stroke-width="1"/>
      <rect x="0" y="0" width="20" height="20" fill="#ccc" stroke="#4d4d4d" stroke-width="1"/>
    </g>
    <g transform="translate(30,80)">
      <symbol id="edge-symbol">
        <line x1="20" y1="20" x2="40" y2="40" stroke="#3498db" stroke-width="2"/>
        <line x1="20" y1="20" x2="40" y2="40" stroke="#3498db" stroke-width="2"/>
      </symbol>
    </g>
  </g>
  <g transform="translate(10, 200)">
    <text x="20" y="140" font-size="16" font-family="Arial" text-anchor="middle" fill="#3498db" data-narration>
      <tspan>
        Incidence and Adjacency
      </tspan>
      <tspan x="10" y="140">
        An edge e is incident to a vertex v if v is one of the endpoints of e
      </tspan>
      <tspan x="10" y="150">
        Two edges are adjacent if they share a common vertex
      </tspan>
    </text>
    <g transform="translate(40,100)">
      <symbol id="adjacent-edge-symbol">
        <line x1="20" y1="20" x2="40" y2="40" stroke="#3498db" stroke-width="2"/>
        <line x1="20" y1="20" x2="40" y2="40" stroke="#3498db" stroke-width="2"/>
      </symbol>
    </g>
  </g>
  <g transform="translate(10, 300)">
    <text x="20" y="280" font-size="16" font-family="Arial" text-anchor="middle" fill="#3498db" data-narration>
      <tspan>
        Recursive Definitions
      </tspan>
      <tspan x="10" y="280">
        A recursive definition is a definition that refers to itself.
      </tspan>
      <tspan x="10" y="290">
        This can create a cycle in the definition, where the definition refers to itself repeatedly.
      </tspan>
    </text>
    <g transform="translate(70,150)">
      <symbol id="recursive-cycle-symbol">
        <line x1="20" y1="20" x2="40" y2="40" stroke="#3498db" stroke-width="2"/>
        <line x1="20" y1="20" x2="40" y2="40" stroke="#3498db" stroke-width="2"/>
        <line x1="20" y1="40" x2="40" y2="60" stroke="#3498db" stroke-width="2"/>
        <line x1="40" y1="40" x2="60" y2="60" stroke="#3498db" stroke-width="2"/>
      </symbol>
    </g>
  </g>
  <g transform="translate(10, 350)">
    <text x="20" y="320" font-size="16" font-family="Arial" text-anchor="middle" fill="#3498db" data-narration>
      <tspan>
        Example
      </tspan>
      <tspan x="10" y="320">
        The set of all even numbers can be defined recursively as:
      </tspan>
      <tspan x="10" y="330">
        <br/>
        An even number is an integer that can be written as 2n for some integer n.
      </tspan>
    </text>
    <g transform="translate(70,200)">
      <symbol id="even-number-symbol">
        <line x1="20" y1="20" x2="40" y2="40" stroke="#3498db" stroke-width="2"/>
        <line x1="20" y1="40" x2="40" y2="60" stroke="#3498db" stroke-width="2"/>
      </symbol>
    </g>
    <g transform="translate(30,220)">
      <text x="20" y="240" font-size="16" font-family="Arial" text-anchor="middle" fill="#3498db">
        <tspan>
          n = even number
        </tspan>
        <tspan x="10" y="240">
          2n = even number
        </tspan>
      </text>
    </g>
  </g>
  <footer>
    <text x="20" y="380" font-size="16" font-family="Arial" text-anchor="middle" fill="#3498db" data-narration>
      <tspan>
        Created by [Your Name]
      </tspan>
    </text>
  </footer>
  <animateTransform attributeName="transform" type="translate" from="10 10" to="10 400" dur="10s" begin="0s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="10 400" to="10 10" dur="10s" begin="1s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="10s" begin="2s" repeatCount="indefinite"/>
</svg>