<svg width="420" height="400" data-topic-id="text-book-1-chapter-4-42">
  <div style="background-image: linear-gradient(to bottom, #c7b8ea, # additive(#faebfc, #6495ed)); border-radius: 5px; padding: 20px;">
    <section data-narration="Introduction to Statistical Measures">
      <h2>What are Statistical Measures?</h2>
      <p>Statistical measures are used to summarize and describe the main features of a dataset. These measures provide a way to understand the central tendency, variability, and other characteristics of the data.</p>
    </section>
    <section data-narration="Types of Statistical Measures">
      <h2>Types of Statistical Measures</h2>
      <ul>
        <li>
          <h3>Mean</h3>
          <p>The average value of a dataset.</p>
        </li>
        <li>
          <h3>Median</h3>
          <p>The middle value of a dataset when it is sorted in ascending or descending order.</p>
        </li>
        <li>
          <h3>Mode</h3>
          <p>The most frequently occurring value in a dataset.</p>
        </li>
        <li>
          <h3>Standard Deviation (SD)</h3>
          <p>A measure of the amount of variation or dispersion of a set of values.</p>
        </li>
      </ul>
    </section>
    <section data-narration="Examples">
      <h2>Examples</h2>
      <ol>
        <li>
