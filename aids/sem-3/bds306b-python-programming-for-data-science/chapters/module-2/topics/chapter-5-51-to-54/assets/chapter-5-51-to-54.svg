<svg width="420" height="400" data-topic-id="chapter-5-51-54">
  <desc>Animated Educational Diagram for Chapter 5: Data Visualization with Matplotlib and Seaborn</desc>
  <style>
    /* Gradient Background */
    body {
      background: linear-gradient(to bottom, #C7B8EA, #6495ED);
      background-size: 100% 100%;
      padding: 20px;
    }
    
    /* Text Styles */
    .title {
      font-weight: bold;
      font-size: 24px;
      color: #333;
    }
    
    .section {
      margin-bottom: 40px;
    }
    
    .data-narration {
      font-size: 18px;
      color: #666;
    }
    
    .arrow-markers {
      stroke: #00BFFF;
      stroke-width: 2;
    }
  </style>
  <g transform="translate(10, 10)">
    <!-- Section 1: Introduction to Data Visualization -->
    <rect x="10" y="20" width="380" height="120" fill="#C7B8EA" rx="10"/>
    <text class="title">Introduction to Data Visualization</text>
    <text class="data-narration">Data visualization is the process of creating graphical representations of data to facilitate understanding and insights.</text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="10 20" begin="0s" dur="2s" repeatCount="indefinite"/>
    
    <!-- Section 2: Types of Data Visualizations -->
    <rect x="10" y="150" width="380" height="120" fill="#6495ED" rx="10"/>
    <text class="title">Types of Data Visualizations</text>
    <rect x="20" y="140" width="20" height="20" fill="#00BFFF" class="arrow-markers"/>
    <text class="data-narration">
      Scatter plots: visualize the relationship between two continuous variables.
      Bar charts: compare categorical data across different groups.
      Line charts: show trends over time or across categories.
      Histograms: visualize the distribution of continuous data.
      Heatmaps: visualize the relationship between two categorical variables.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 140" begin="2s" dur="2s" repeatCount="indefinite"/>
    
    <!-- Section 3: Matplotlib Library -->
    <rect x="10" y="280" width="380" height="120" fill="#C7B8EA" rx="10"/>
    <text class="title">Matplotlib Library</text>
    <rect x="20" y="270" width="20" height="20" fill="#00BFFF" class="arrow-markers"/>
    <text class="data-narration">
      Matplotlib provides a wide range of visualization tools, including plotting functions and customization options.
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 270" begin="4s" dur="2s" repeatCount="indefinite"/>
    
    <!-- Section 4: Example Code -->
    <rect x="10" y="340" width="380" height="120" fill="#6495ED" rx="10"/>
    <text class="title">Example Code</text>
    <text class="data-narration">
      Scatter plots: `plt.scatter([1, 2, 3, 4, 5], [2, 4, 6, 8, 10])`
      Line charts: `plt.plot(x, y)`
    </text>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="20 340" begin="6s" dur="2s" repeatCount="indefinite"/>
    
    <!-- Section 5: Conclusion -->
    <rect x="10" y="400" width="380" height="40" fill="#C7B8EA" rx="10"/>
    <text class="title">Conclusion</text>
