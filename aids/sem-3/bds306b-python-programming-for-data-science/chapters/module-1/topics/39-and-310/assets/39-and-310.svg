<svg width="420" height="400" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:inkscape="http://www.inkscape.org/svnserv/inkscape-3.1"]:
  <!-- Title -->
  <title>39 And 310</title>
  <!-- Footer -->
  <defs>
    <style>
      .footer {
        fill: none;
        stroke: #2C3E50;
        stroke-width: 2;
        d: M420 380 L420 400;
      }
    </style>
  </defs>
  <g id="root" inkscape:groupmode="0"inkscape:transform-origin="0 0">
    <!-- Gradient background -->
    <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    <!-- Gradient -->
    <defs>
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#C7B8EA"/>
        <stop offset="50%" stop-color="#87CEEB"/>
        <stop offset="100%" stop-color="#C7B8EA"/>
      </linearGradient>
    </defs>
    <!-- Section 1: Lists -->
    <g id="section-1-lists">
      <!-- List icon -->
      <circle cx="160" cy="50" r="30" fill="#F7DC6F"/>
      <text x="150" y="60" fill="#2C3E50" font-size="18">Lists</text>
      <animateTransform attributeName="transform" type="rotate" from="0 160 50" to="360 160 50" dur="5" begin="-0.5s"/>
      <text x="160" y="100" data-narration="A list is a collection of items that can be of any data type, including strings, integers, floats, and other lists." fill="#2C3E50" font-size="14">
        <animate x="15" dur="5" begin="-0.5s"/>
      </text>
      <!-- List example -->
      <text x="160" y="130" font-size="18">fruits = ['apple', 'banana', 'cherry']</text>
      <animate x="15" dur="5" begin="-0.5s"/>
      <text x="160" y="150" font-size="18">print(fruits[0])</text>
      <animate x="15" dur="5" begin="-0.5s"/>
      <text x="160" y="170" font-size="18">fruits.append('orange')</text>
      <animate x="15" dur="5" begin="-0.5s"/>
    </g>
    <!-- Section 2: Tuples -->
    <g id="section-2-tuples">
      <!-- Tuple icon -->
      <circle cx="320" cy="50" r="30" fill="#F7DC6F"/>
      <text x="310" y="60" fill="#2C3E50" font-size="18">Tuples</text>
      <animateTransform attributeName="transform" type="rotate" from="0 320 50" to="360 320 50" dur="5" begin="-0.5s"/>
      <text x="320" y="100" data-narration="A tuple is a collection of items that can be of any data type, including strings, integers, floats, and other tuples." fill="#2C3E50" font-size="14">
        <animate x="15" dur="5" begin="-0.5s"/>
      </text>
      <!-- Tuple example -->
      <text x="320" y="130" font-size="18">colors = ('red', 'green', 'blue')</text>
      <animate x="15" dur="5" begin="-0.5s"/>
      <text x="320" y="150" font-size="18">print(colors[0])</text>
      <animate x="15" dur="5" begin="-0.5s"/>
      <text x="320" y="170" font-size="18">try: colors[0] = &quot;yellow&quot;</text>
      <animate x="15" dur="5" begin="-0.5s"/>
      <text x="320" y="190" font-size="18">except TypeError</text>
      <animate x="15" dur="5" begin="-0.5s"/>
    </g>
    <!-- Section 3: Characteristics -->
    <g id="section-3-characteristics">
      <!-- List icon -->
      <circle cx="160" cy="250" r="30" fill="#F7DC6F"/>
      <text x="150" y="260" fill="#2C3E50" font-size="18">Lists</text>
      <animateTransform attributeName="transform" type="rotate" from="0 160 250" to="360 160 250" dur="5" begin="-0.5s"/>
      <text x="160" y="280" data-narration="Lists are ordered, meaning that the order of the items in the list matters." fill="#2C3E50" font-size="14">
        <animate x="15" dur="5" begin="-0.5s"/>
      </text>
      <!-- Tuple icon -->
      <circle cx="320" cy="250" r="30" fill="#F7DC6F"/>
      <text x="310" y="260" fill="#2C3E50" font-size="18">Tuples</text>
      <animateTransform attributeName="transform" type="rotate" from="0 320 250" to="360 320 250" dur="5" begin="-0.5s"/>
      <text x="320" y="280" data-narration="Tuples are also ordered, meaning that the order of the items in the tuple matters." fill="#2C3E50" font-size="14">
        <animate x="15" dur="5" begin="-0.5s"/>
      </text>
    </g>
    <!-- Section 4: Indexing -->
    <g id="section-4-indexing">
      <!-- Index icon -->
      <circle cx="160" cy="350" r="30" fill="#F7DC6F"/>
      <text x="150" y="360" fill="#2C3E50" font-size="18">Indexing</text>
      <animateTransform attributeName="transform" type="rotate" from="0 160 350" to="360 160 350" dur="5" begin="-0.5s"/>
      <text x="160" y="380" data-narration="Items in a list can be accessed using their index (position in the list)." fill="#2C3E50" font-size="14">
        <animate x="15" dur="5" begin="-0.5s"/>
      </text>
      <!-- Tuple example -->
      <text x="320" y="350" font-size="18">print(colors[0])</text>
      <animate x="15" dur="5" begin="-0.5s"/>
    </g>
    <!-- Section 5: Slicing -->
    <g id="section-5-slicing">
      <!-- Slice icon -->
      <circle cx="320" cy="350" r="30" fill="#F7DC6F"/>
      <text x="310" y="360" fill="#2C3E50" font-size="18">Slicing</text>
      <animateTransform attributeName="transform" type="rotate" from="0 320 350" to="360 320 350" dur="5" begin="-0.5s"/>
      <text x="320" y="380" data-narration="Items in a tuple can be accessed using their index (position in the tuple).</text>
      <animate x="15" dur="5" begin="-0.5s"/>
      <!-- Slice example -->
      <text x="320" y="400" font-size="18">print(colors[1:3])</text>
      <animate x="15" dur="5" begin="-0.5s"/>
    </g>
    <!-- Footer -->
    <path class="footer" d="M420 380 L420 400"/>
  </g>
</svg>