      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="50" width="400" height="300" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Integers -->
  <g data-narration="Section 1: Integers">
