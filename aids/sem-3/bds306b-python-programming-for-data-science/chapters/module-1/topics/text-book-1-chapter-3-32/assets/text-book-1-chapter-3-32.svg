    <line x1="20" y1="390" x2="400" y2="390" stroke="#1B1B1B" stroke-width="2"/>
    <text x="20" y="410" font-size="14" font-family="Arial" fill="#1B1B1B">Sequences of characters enclosed in quotes.</text>
  </g>
  
  <!-- Section 4: Boolean Values -->
