    <text x="20" y="170" font-size="14" font-family="Arial" fill="#1B1B1B">Whole numbers can be positive or negative.</text>
  </g>
  
  <!-- Section 2: Floating Point Numbers -->
  <g data-narration="Section 2: Floating Point Numbers">
    <rect x="10" y="220" width="400" height="50" fill="#F9F9F9" rx="5"/>
