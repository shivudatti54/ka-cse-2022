    <text x="10" y="10" font-size="14" fill="#333">Introduction to Data Visualization</text>
    <text x="10" y="30" font-size="12" fill="#666">Data visualization is a crucial aspect of data science...</text>
  </g>
  
  <!-- Section 2: Matplotlib Overview -->
  <g transform="translate(0, 100)">
    <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7"/>
    <text x="10" y="10" font-size="14" fill="#333">Matplotlib Overview</text>
    <text x="10" y="30" font-size="12" fill="#666">Matplotlib is a popular Python library for data...</text>
  </g>
  
  <!-- Section 3: Seaborn Overview -->
  <g transform="translate(0, 150)">
    <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7"/>
    <text x="10" y="10" font-size="14" fill="#333">Seaborn Overview</text>
    <text x="10" y="30" font-size="12" fill="#666">Seaborn is a visualization library built on top of...</text>
  </g>
  
