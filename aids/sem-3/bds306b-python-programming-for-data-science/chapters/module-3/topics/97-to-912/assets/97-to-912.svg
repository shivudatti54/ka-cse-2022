  <!-- Section 5: Bokeh Overview -->
  <g transform="translate(0, 250)">
    <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7"/>
    <text x="10" y="10" font-size="14" fill="#333">Bokeh Overview</text>
