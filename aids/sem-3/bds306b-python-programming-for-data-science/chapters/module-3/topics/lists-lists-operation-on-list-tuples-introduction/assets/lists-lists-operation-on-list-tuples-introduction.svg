<svg width="420" height="400" data-topic-id="lists-operations-on-list-tuples-introduction">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <title>Lists Lists Operation On List Tuples Introduction</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" fill="#3498DB">Lists Lists Operation On List Tuples Introduction</text>
  <rect x="10" y="60" width="400" height="100" fill="#FFFFFF" rx="10"/>
  <g transform="translate(10, 70)">
    <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">Lists Introduction</text>
    <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">A list in Python is a collection of items that can be of any data type, including strings, integers, floats, and other lists.</text>
    <rect x="0" y="50" width="100" height="50" fill="#FFFFFF" rx="10"/>
    <g transform="translate(120, 60)">
      <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">Creating Lists</text>
      <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">There are several ways to create a list in Python:</text>
      <text x="0" y="50" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">Using square brackets `[]` and separating the items with commas:</text>
      <text x="0" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">`my_list = [1, 2, 3, 4, 5]`</text>
      <rect x="0" y="110" width="100" height="50" fill="#FFFFFF" rx="10"/>
      <g transform="translate(220, 60)">
        <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">Indexing Lists</text>
        <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">Indexing is used to access specific items in a list. The index of an item is the position of the item in the list, starting from 0.</text>
        <text x="0" y="50" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">To access an item at a specific index, use square brackets `[]` and the index:</text>
        <text x="0" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">`my_list[0]`</text>
        <rect x="0" y="110" width="100" height="50" fill="#FFFFFF" rx="10"/>
        <g transform="translate(320, 60)">
          <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">Slicing Lists</text>
          <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">Slicing is used to extract a subset of items from a list. The syntax for slicing is `my_list[start:stop:step]`, where:</text>
          <text x="0" y="50" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">`start`: The starting index of the slice (inclusive)</text>
          <text x="0" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">`stop`: The ending index of the slice (exclusive)</text>
          <text x="0" y="110" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">`step`: The increment between indices</text>
          <rect x="0" y="140" width="100" height="50" fill="#FFFFFF" rx="10"/>
          <g transform="translate(420, 60)">
            <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">Operations on Lists</text>
            <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">### 1. Append</text>
            <text x="0" y="50" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">The `append()` method is used to add an item to the end of a list.</text>
            <text x="0" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">`my_list.append(10)`</text>
            <rect x="0" y="110" width="100" height="50" fill="#FFFFFF" rx="10"/>
            <g transform="translate(520, 60)">
              <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">### 2. Insert</text>
              <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">The `insert()` method is used to insert an item at a specific index in a list.</text>
              <text x="0" y="50" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">`my_list.insert(0, 10)`</text>
              <text x="0" y="80" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">`my_list.insert(3, [1, 2, 3])`</text>
            </g>
            <g transform="translate(10, 200)">
              <title>Arrow Markers for Connections</title>
              <line x1="100" y1="250" x2="200" y2="250" stroke="#3498DB" stroke-width="2"/>
              <line x1="100" y1="250" x2="150" y2="300" stroke="#3498DB" stroke-width="2"/>
            </g>
            <g transform="translate(10, 240)">
              <text x="0" y="0" font-size="18" font-family="Arial, sans-serif" fill="#2ECC71">Footer</text>
              <text x="0" y="20" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">Lists Lists Operation On List Tuples Introduction</text>
            </g>
          </g>
        </g>
      </g>
    </g>
  </svg>