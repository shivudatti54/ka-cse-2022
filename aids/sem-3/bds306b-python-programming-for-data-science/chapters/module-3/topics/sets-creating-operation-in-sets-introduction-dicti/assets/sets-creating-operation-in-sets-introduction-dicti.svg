    <text x="15" y="180" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      In Python, a set is defined using the set() function or the set() syntax.
    </text>
    <text x="15" y="200" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      You can create a set from a list, tuple, or other set.
