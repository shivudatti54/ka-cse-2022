<svg width="420" height="400" data-topic-id="chapter-8-81-to-84-and-chapter-9-91-to-93">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  
  <!-- Section 1: Data Cleaning -->
  <section data-narration="Data Cleaning is an essential step in data preprocessing. It involves detecting and correcting errors, inconsistencies, and inaccuracies in the data.">
    <rect x="0" y="100" width="100%" height="50" fill="#F7F7F7" rx="10"/>
    <path d="M 20 30 H 80 L 80 30 Z" fill="#E0E0E0" stroke="#333333" stroke-width="2"/>
    <text x="50" y="40" font-size="16" fill="#333333">Data Quality Issues:</text>
    <text x="50" y="60" font-size="16" fill="#333333">Missing values, Duplicate records, Incorrect or inconsistent data</text>
    <animate transform="rotate(360 50 40)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 2: Data Transformation -->
  <section data-narration="Data transformation is the process of converting data from one format to another.">
    <rect x="0" y="170" width="100%" height="50" fill="#F7F7F7" rx="10"/>
    <path d="M 20 30 H 80 L 80 30 Z" fill="#E0E0E0" stroke="#333333" stroke-width="2"/>
    <text x="50" y="40" font-size="16" fill="#333333">Data Transformation Techniques:</text>
    <text x="50" y="60" font-size="16" fill="#333333">Scaling and normalization, Encoding categorical variables, Log transformation</text>
    <animate transform="rotate(720 50 40)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section 3: Feature Engineering -->
  <section data-narration="Feature engineering is the process of creating new features from existing ones.">
    <rect x="0" y="240" width="100%" height="50" fill="#F7F7F7" rx="10"/>
    <path d="M 20 30 H 80 L 80 30 Z" fill="#E0E0E0" stroke="#333333" stroke-width="2"/>
    <text x="50" y="40" font-size="16" fill="#333333">Feature Engineering Techniques:</text>
    <text x="50" y="60" font-size="16" fill="#333333">Creating new variables, Combining existing variables, Transforming existing variables</text>
    <animate transform="rotate(1080 50 40)" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Title and Footer -->
  <text x="50" y="20" font-size="24" fill="#333333">Data Preprocessing and Feature Engineering</text>
  <text x="50" y="380" font-size="16" fill="#333333">Chapter 8: Data Preprocessing and Feature Engineering</text>
</svg>