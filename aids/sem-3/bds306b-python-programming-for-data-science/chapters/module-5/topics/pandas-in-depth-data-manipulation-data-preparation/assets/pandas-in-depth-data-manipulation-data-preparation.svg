<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pandas-in-depth-data-manipulation-data-preparation">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a88d8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3288c8" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <g data-narration="Data Preparation">
    <rect x="50" y="50" width="300" height="150" fill="#fff" rx="10"/>
    <text x="60" y="60" font-size="24" font-weight="bold">Data Preparation</text>
    <text x="60" y="80" font-size="18">Cleaning, transforming, and selecting data to prepare it for analysis.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="1000" begin="0s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Handling Missing Values">
    <rect x="50" y="250" width="300" height="150" fill="#fff" rx="10"/>
    <text x="60" y="260" font-size="24" font-weight="bold">Handling Missing Values</text>
    <text x="60" y="280" font-size="18">Replace or impute missing values.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 280" to="360 210 280" dur="1000" begin="1s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Data Cleaning">
    <rect x="50" y="350" width="300" height="150" fill="#fff" rx="10"/>
    <text x="60" y="360" font-size="24" font-weight="bold">Data Cleaning</text>
    <text x="60" y="380" font-size="18">Remove duplicates, outliers, and incorrect data.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 380" to="360 210 380" dur="1000" begin="2s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Data Normalization">
    <rect x="50" y="10" width="300" height="150" fill="#fff" rx="10"/>
    <text x="60" y="20" font-size="24" font-weight="bold">Data Normalization</text>
    <text x="60" y="40" font-size="18">Scale data to a common range.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 40" to="360 210 40" dur="1000" begin="3s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Data Transformation">
    <rect x="50" y="170" width="300" height="150" fill="#fff" rx="10"/>
    <text x="60" y="180" font-size="24" font-weight="bold">Data Transformation</text>
    <text x="60" y="200" font-size="18">Convert data types and units.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 200" to="360 210 200" dur="1000" begin="4s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Text">
    <rect x="50" y="220" width="300" height="150" fill="#fff" rx="10"/>
    <text x="60" y="230" font-size="24" font-weight="bold">Text</text>
    <text x="60" y="250" font-size="18">Text manipulations, such as concatenation and discretization.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 250" to="360 210 250" dur="1000" begin="5s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Conclusion">
    <rect x="50" y="370" width="300" height="150" fill="#fff" rx="10"/>
    <text x="60" y="380" font-size="24" font-weight="bold">Conclusion</text>
    <text x="60" y="400" font-size="18">Data preparation is a crucial step in the data analysis process.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 380" to="360 210 380" dur="1000" begin="6s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Arrow">
    <path d="M 210 200 L 240 220" stroke="#3288c8" stroke-width="2" fill="none" stroke-linecap="round" data-narration="Arrow"/>
  </g>
  <g data-narration="Title">
    <rect x="0" y="0" width="420" height="40" fill="#fff" rx="10"/>
    <text x="15" y="15" font-size="36" font-weight="bold">Pandas in Depth: Data Manipulation</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 15" to="360 210 15" dur="1000" begin="0s" repeatCount="indefinite"/>
  </g>
  <g data-narration="Footer">
    <rect x="0" y="360" width="420" height="40" fill="#fff" rx="10"/>
    <text x="15" y="35" font-size="18" font-weight="normal">2023</text>
    <animateTransform attributeName="transform" type="rotate" from="0 210 35" to="360 210 35" dur="1000" begin="7s" repeatCount="indefinite"/>
  </g>
</svg>