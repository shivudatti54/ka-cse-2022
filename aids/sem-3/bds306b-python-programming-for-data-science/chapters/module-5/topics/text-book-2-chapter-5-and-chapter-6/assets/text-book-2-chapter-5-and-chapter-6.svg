<svg width="420" height="400" data-topic-id="python-programming-for-data-science-text-book-2-chapters-5-and-6">
  <title>Text Book 2, Chapters 5 and 6</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4567b7" stop-opacity="1"/>
      <stop offset="50%" stop-color="#5c6bc0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7f8ea7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  <g transform="translate(0, 50)">
    <rect x="0" y="0" width="100%" height="200" fill="#fff"/>
    <text x="10" y="20" font-size="24" fill="#1a1d23">Chapter 5: Working with Strings</text>
    <text x="10" y="50" font-size="18" fill="#1a1d23">Introduction</text>
    <text x="10" y="70" font-size="18" fill="#1a1d23">Strings are sequences of characters used to represent text.</text>
    <animateTransform attributeName="transform" begin="0s" dur="2s" type="rotate" from="0 200 200" to="360 200 200"/>
    <animateTransform attributeName="transform" begin="2s" dur="2s" type="rotate" from="0 200 200" to="0 200 200"/>
    <text x="150" y="100" font-size="18" fill="#1a1d23">string1 = "Hello"</text>
    <text x="150" y="120" font-size="18" fill="#1a1d23">string2 = "World"</text>
    <text x="150" y="140" font-size="18" fill="#1a1d23">print(string1 + " " + string2)</text>
    <rect x="10" y="250" width="100%" height="50" fill="#fff" stroke="#1a1d23" stroke-width="2"/>
    <text x="10" y="260" font-size="18" fill="#1a1d23">Indexing</text>
    <text x="10" y="280" font-size="18" fill="#1a1d23">print(string[0])</text>
    <rect x="10" y="320" width="100%" height="50" fill="#fff" stroke="#1a1d23" stroke-width="2"/>
    <text x="10" y="330" font-size="18" fill="#1a1d23">Slicing</text>
    <text x="10" y="350" font-size="18" fill="#1a1d23">print(string[1:3])</text>
    <rect x="10" y="380" width="100%" height="50" fill="#fff" stroke="#1a1d23" stroke-width="2"/>
    <text x="10" y="390" font-size="18" fill="#1a1d23">Length</text>
    <text x="10" y="410" font-size="18" fill="#1a1d23">print(len(string))</text>
    <rect x="10" y="450" width="100%" height="50" fill="#fff" stroke="#1a1d23" stroke-width="2"/>
    <text x="10" y="460" font-size="18" fill="#1a1d23">Repetition</text>
    <text x="10" y="480" font-size="18" fill="#1a1d23">print(string * 3)</text>
    <g transform="translate(0, 500)">
      <rect x="0" y="0" width="100%" height="200" fill="#fff"/>
      <text x="10" y="20" font-size="24" fill="#1a1d23">Chapter 6: Working with Strings</text>
      <text x="10" y="50" font-size="18" fill="#1a1d23">Common String Methods</text>
      <text x="10" y="70" font-size="18" fill="#1a1d23">strip()</text>
      <text x="150" y="100" font-size="18" fill="#1a1d23">string = "   Hello   "</text>
      <text x="150" y="120" font-size="18" fill="#1a1d23">print(string.strip())</text>
      <text x="150" y="140" font-size="18" fill="#1a1d23">print(string.strip())</text>
      <rect x="10" y="250" width="100%" height="50" fill="#fff" stroke="#1a1d23" stroke-width="2"/>
      <text x="10" y="260" font-size="18" fill="#1a1d23">lower()</text>
      <text x="150" y="100" font-size="18" fill="#1a1d23">string = "HELLO"</text>
      <text x="150" y="120" font-size="18" fill="#1a1d23">print(string.lower())</text>
      <text x="150" y="140" font-size="18" fill="#1a1d23">print(string.lower())</text>
      <rect x="10" y="320" width="100%" height="50" fill="#fff" stroke="#1a1d23" stroke-width="2"/>
      <text x="10" y="330" font-size="18" fill="#1a1d23">upper()</text>
      <text x="150" y="100" font-size="18" fill="#1a1d23">string = "hello"</text>
      <text x="150" y="120" font-size="18" fill="#1a1d23">print(string.upper())</text>
      <text x="150" y="140" font-size="18" fill="#1a1d23">print(string.upper())</text>
      <rect x="10" y="380" width="100%" height="50" fill="#fff" stroke="#1a1d23" stroke-width="2"/>
      <text x="10" y="390" font-size="18" fill="#1a1d23">split()</text>
      <text x="150" y="100" font-size="18" fill="#1a1d23">string = "apple,banana,orange"</text>
      <text x="150" y="120" font-size="18" fill="#1a1d23">print(string.split(","))</text>
      <text x="150" y="140" font-size="18" fill="#1a1d23">print(string.split(","))</text>
    </g>
    <g transform="translate(0, 550)">
      <rect x="0" y="0" width="100%" height="200" fill="#fff"/>
      <text x="10" y="20" font-size="24" fill="#1a1d23">Footer</text>
    </g>
  </g>
</svg>