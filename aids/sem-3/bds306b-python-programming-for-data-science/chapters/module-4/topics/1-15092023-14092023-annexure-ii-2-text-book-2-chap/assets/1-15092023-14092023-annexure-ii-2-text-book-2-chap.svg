<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xml:space="preserve">
  

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#88B2FF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)"/>
  

  <!-- Data Topic ID -->
  <g transform="translate(10,10)">
    <text x="0" y="0" text-anchor="middle" font-size="24" font-family="Arial" fill="#2E4053">Data Topic ID: python-programming-for-data-science</text>
  </g>
  

  <!-- Section 1: Lists -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="100%" height="60" fill="#F7F7F7" rx="10" />
    <text x="10" y="15" text-anchor="start" font-size="18" font-family="Arial" fill="#2E4053">Lists</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 150" dur="2000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <g fill-rule="evenodd">
      <circle cx="35" cy="75" r="10" fill="#C7B8EA" opacity="1" stroke-width="2" stroke="#2E4053"/>
      <text x="35" y="80" text-anchor="middle" font-size="16" font-family="Arial" fill="#2E4053">Example:</text>
      <text x="10" y="90" text-anchor="start" font-size="14" font-family="Arial" fill="#2E4053">fruits = ['apple', 'banana', 'orange']</text>
      <text x="10" y="100" text-anchor="start" font-size="14" font-family="Arial" fill="#2E4053">print(fruits[0])  # Output: apple</text>
    </g>
  </g>

  <!-- Section 2: Tuples -->
  <g transform="translate(50,250)">
    <rect x="0" y="0" width="100%" height="60" fill="#F7F7F7" rx="10" />
    <text x="10" y="15" text-anchor="start" font-size="18" font-family="Arial" fill="#2E4053">Tuples</text>
    <animateTransform attributeName="transform" type="translate" from="0 150" to="0 250" dur="2000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <g fill-rule="evenodd">
      <circle cx="35" cy="175" r="10" fill="#C7B8EA" opacity="1" stroke-width="2" stroke="#2E4053"/>
      <text x="35" y="180" text-anchor="middle" font-size="16" font-family="Arial" fill="#2E4053">Example:</text>
      <text x="10" y="190" text-anchor="start" font-size="14" font-family="Arial" fill="#2E4053">colors = ('red', 'green', 'blue')</text>
      <text x="10" y="200" text-anchor="start" font-size="14" font-family="Arial" fill="#2E4053">print(colors[0])  # Output: red</text>
    </g>
  </g>

  <!-- Section 3: Dictionaries -->
  <g transform="translate(50,400)">
    <rect x="0" y="0" width="100%" height="60" fill="#F7F7F7" rx="10" />
    <text x="10" y="15" text-anchor="start" font-size="18" font-family="Arial" fill="#2E4053">Dictionaries</text>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="2000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <g fill-rule="evenodd">
      <circle cx="35" cy="325" r="10" fill="#C7B8EA" opacity="1" stroke-width="2" stroke="#2E4053"/>
      <text x="35" y="330" text-anchor="middle" font-size="16" font-family="Arial" fill="#2E4053">Example:</text>
      <text x="10" y="340" text-anchor="start" font-size="14" font-family="Arial" fill="#2E4053">person = {'name': 'John', 'age': 30}</text>
      <text x="10" y="350" text-anchor="start" font-size="14" font-family="Arial" fill="#2E4053">print(person['name'])  # Output: John</text>
    </g>
  </g>

  <!-- Section 4: Sets -->
  <g transform="translate(50,550)">
    <rect x="0" y="0" width="100%" height="60" fill="#F7F7F7" rx="10" />
    <text x="10" y="15" text-anchor="start" font-size="18" font-family="Arial" fill="#2E4053">Sets</text>
    <animateTransform attributeName="transform" type="translate" from="0 450" to="0 550" dur="2000" begin="0s" delay="0s" repeatCount="indefinite"/>
    <g fill-rule="evenodd">
      <circle cx="35" cy="475" r="10" fill="#C7B8EA" opacity="1" stroke-width="2" stroke="#2E4053"/>
      <text x="35" y="480" text-anchor="middle" font-size="16" font-family="Arial" fill="#2E4053">Example:</text>
      <text x="10" y="490" text-anchor="start" font-size="14" font-family="Arial" fill="#2E4053">numbers = set([1, 2, 3, 4, 5])</text>
      <text x="10" y="500" text-anchor="start" font-size="14" font-family="Arial" fill="#2E4053">print(numbers)  # Output: {1, 2, 3, 4, 5}</text>
    </g>
  </g>

  <!-- Title -->
  <g transform="translate(150,10)">
    <text x="0" y="0" text-anchor="start" font-size="36" font-family="Arial" fill="#2E4053">Python Programming for Data Science</text>
  </g>

  <!-- Footer -->
  <g transform="translate(150,380)">
    <text x="0" y="0" text-anchor="start" font-size="18" font-family="Arial" fill="#2E4053">Copyright 2023</text>
  </g>

</svg>