<svg width="420" height="400" data-topic-id="chapter-8">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1" />
      <stop offset="50%" stop-color="#a1c9f2" stop-opacity="1" />
      <stop offset="100%" stop-color="#56b3fa" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <text x="20" y="50" font-size="24" font-family="Arial" fill="#3b5998" text-anchor="middle">Chapter 8</text>
  <g id="risk-1">
    <rect x="20" y="80" width="300" height="150" fill="#ffffff" rx="10" />
    <rect x="20" y="80" width="20" height="150" fill="#f7dc6f" rx="10" />
    <text x="40" y="120" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="middle">Manipulation through Bias</text>
    <text x="20" y="150" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Definition: Bias in AI refers to the incorporation of discriminatory or unfair attitudes into the algorithm.</text>
    <text x="20" y="170" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Consequences: Biased AI can perpetuate and amplify existing social inequalities, leading to unfair treatment and discrimination.</text>
    <text x="20" y="190" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Example: A facial recognition system that is trained on a dataset that is predominantly white, leading to poor performance on individuals with darker skin tones.</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 200" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="scale" from="0.5 0.5" to="1 1" dur="2s" begin="2s" />
  </g>
  <g id="risk-2">
    <rect x="20" y="280" width="300" height="150" fill="#ffffff" rx="10" />
    <rect x="20" y="280" width="20" height="150" fill="#f7dc6f" rx="10" />
    <text x="40" y="320" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="middle">Lack of Transparency</text>
    <text x="20" y="350" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Definition: Lack of transparency in AI refers to the absence of clear explanations for AI decision-making processes.</text>
    <text x="20" y="370" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Consequences: Lack of transparency can lead to a lack of trust in AI systems, and can make it difficult to identify and correct errors.</text>
    <text x="20" y="390" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Example: A self-driving car that makes a sudden turn without providing any explanation for its decision.</text>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="0 400" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="scale" from="0.5 0.5" to="1 1" dur="2s" begin="2s" />
  </g>
  <g id="risk-3">
    <rect x="20" y="380" width="300" height="150" fill="#ffffff" rx="10" />
    <rect x="20" y="380" width="20" height="150" fill="#f7dc6f" rx="10" />
    <text x="40" y="420" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="middle">Inadequate Accountability</text>
    <text x="20" y="450" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Definition: Inadequate accountability refers to the lack of clear mechanisms for identifying and addressing errors or wrongdoing.</text>
    <text x="20" y="470" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Consequences: Inadequate accountability can lead to a lack of trust in AI systems, and can make it difficult to identify and correct errors.</text>
    <text x="20" y="490" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Example: A self-driving car that makes a sudden turn without providing any explanation for its decision.</text>
    <animateTransform attributeName="transform" type="translate" from="0 370" to="0 480" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="scale" from="0.5 0.5" to="1 1" dur="2s" begin="2s" />
  </g>
  <g id="risk-4">
    <rect x="20" y="50" width="300" height="150" fill="#ffffff" rx="10" />
    <rect x="20" y="50" width="20" height="150" fill="#f7dc6f" rx="10" />
    <text x="40" y="90" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="middle">Mitigation Strategies</text>
    <text x="20" y="120" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Data curation: Ensure that the data used to train AI models is diverse, representative, and free from bias.</text>
    <text x="20" y="140" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Algorithmic auditing: Regularly audit AI algorithms to detect and correct bias.</text>
    <text x="20" y="160" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Human oversight: Implement human oversight to detect and correct biased outcomes.</text>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="0 200" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="scale" from="0.5 0.5" to="1 1" dur="2s" begin="2s" />
  </g>
  <g id="risk-5">
    <rect x="20" y="210" width="300" height="150" fill="#ffffff" rx="10" />
    <rect x="20" y="210" width="20" height="150" fill="#f7dc6f" rx="10" />
    <text x="40" y="250" font-size="18" font-family="Arial" fill="#3b5998" text-anchor="middle">Mitigation Strategies</text>
    <text x="20" y="270" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Explainability techniques: Implement techniques such as feature attribution or model interpretability to provide clear explanations for AI decision-making processes.</text>
    <text x="20" y="290" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Model interpretability: Regularly audit AI models to ensure that they are transparent and interpretable.</text>
    <text x="20" y="310" font-size="14" font-family="Arial" fill="#3b5998" text-anchor="middle">Human-in-the-loop: Implement a human-in-the-loop approach, where humans review and validate AI decisions.</text>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="0 300" dur="2s" begin="0s" />
    <animateTransform attributeName="transform" type="scale" from="0.5 0.5" to="1 1" dur="2s" begin="2s" />
  </g>
  <g id="footer">
    <rect x="20" y="380" width="400" height="20" fill="#3b5998" rx="10" />
    <text x="40" y="400" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Chapter 8: Five Risks of Being Unethical in AI</text>
  </g>
</svg>