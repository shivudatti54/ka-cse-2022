<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="establishing-rules-for-building-trustworthy-ai" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="trustworthy-ai-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#trustworthy-ai-gradient)"/>
  
  <!-- Section 1: Introduction to Trustworthy AI -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" font-weight="bold">Introduction to Trustworthy AI</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" dur="1s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 2: Transparency -->
  <g transform="translate(10, 70)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" font-weight="bold">Transparency</text>
    <circle cx="200" cy="20" r="15" fill="#87CEEB"/>
    <text x="200" y="40" font-size="14" font-family="Arial">Explainable AI</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 0" dur="1s" begin="0s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 3: Explainability -->
  <g transform="translate(10, 90)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" font-weight="bold">Explainability</text>
    <circle cx="200" cy="20" r="15" fill="#87CEEB"/>
    <text x="200" y="40" font-size="14" font-family="Arial">Insights into decision-making</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 4: Accountability -->
  <g transform="translate(10, 110)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" font-weight="bold">Accountability</text>
    <circle cx="200" cy="20" r="15" fill="#87CEEB"/>
    <text x="200" y="40" font-size="14" font-family="Arial">Clear lines of responsibility</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 0" dur="1s" begin="1s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 5: Fairness and Equity -->
  <g transform="translate(10, 130)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" font-weight="bold">Fairness and Equity</text>
    <circle cx="200" cy="20" r="15" fill="#87CEEB"/>
    <text x="200" y="40" font-size="14" font-family="Arial">Avoiding bias and discrimination</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 0" dur="1s" begin="1.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Section 6: Respect for Human Values -->
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" font-weight="bold">Respect for Human Values</text>
    <circle cx="200" cy="20" r="15" fill="#87CEEB"/>
    <text x="200" y="40" font-size="14" font-family="Arial">Dignity, autonomy, and well-being</text>
    <animateTransform attributeName="transform" type="translate" from="0 20" to="0 0" dur="1s" begin="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="20" font-size="18" font-family="Arial" font-weight="bold">Establishing Rules for Building Trustworthy AI</text>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 0" dur="1s" begin="3s" repeatCount="indefinite"/>
  </g>
</svg>