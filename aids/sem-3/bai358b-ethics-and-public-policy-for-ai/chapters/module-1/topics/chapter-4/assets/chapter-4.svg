<svg width="420" height="400" data-topic-id="fairness-accountability-transparency" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4682B4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>FAT in AI</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#grad)"/>
  <g transform="translate(20, 20)">
    <text x="10" y="50" font-size="36" font-family="Arial" fill="#2E4053">Fairness, Accountability, and Transparency (FAT)</text>
  </g>
  <g transform="translate(20, 100)">
    <section data-narration="Fairness is the unbiased and equitable treatment of individuals or groups by AI systems.">
      <rect x="10" y="10" width="380" height="100" fill="#F7F7F7"/>
      <text x="15" y="25" font-size="18" font-family="Arial" fill="#2E4053">Non-discrimination</text>
      <text x="15" y="80" font-size="18" font-family="Arial" fill="#2E4053">Blindness</text>
      <text x="15" y="135" font-size="18" font-family="Arial" fill="#2E4053">Robustness</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="10,10" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Accountability involves taking responsibility for the decisions and actions made by AI systems.">
      <rect x="10" y="150" width="380" height="100" fill="#F7F7F7"/>
      <text x="15" y="170" font-size="18" font-family="Arial" fill="#2E4053">Responsibility</text>
      <text x="15" y="215" font-size="18" font-family="Arial" fill="#2E4053">Transparency</text>
      <text x="15" y="260" font-size="18" font-family="Arial" fill="#2E4053">Auditability</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="20,20" begin="2s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Transparency ensures that AI decision-making processes are understandable, explainable, and accessible to stakeholders.">
      <rect x="10" y="300" width="380" height="100" fill="#F7F7F7"/>
      <text x="15" y="320" font-size="18" font-family="Arial" fill="#2E4053">Explainability</text>
      <text x="15" y="365" font-size="18" font-family="Arial" fill="#2E4053">Interpretability</text>
      <text x="15" y="410" font-size="18" font-family="Arial" fill="#2E4053">Accessibility</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="30,30" begin="4s" dur="2s" repeatCount="indefinite"/>
    </section>
    <g transform="translate(20, 450)">
      <text x="10" y="480" font-size="36" font-family="Arial" fill="#2E4053">Conclusion</text>
    </g>
  </g>
  <footer>
    <rect x="10" y="490" width="400" height="20" fill="#F7F7F7"/>
    <text x="15" y="505" font-size="18" font-family="Arial" fill="#2E4053">Copyright 2023</text>
  </footer>
</svg>