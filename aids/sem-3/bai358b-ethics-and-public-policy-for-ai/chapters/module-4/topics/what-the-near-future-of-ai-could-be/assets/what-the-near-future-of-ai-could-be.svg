<svg width="420" height="400" data-topic-id="what-the-near-future-of-ai-could-be"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink" style="overflow: visible;">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <rect x="10" y="10" width="400" height="30" fill="none"
        stroke="#000" stroke-width="2" rx="5"/>
  <text x="15" y="25" font-size="24" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">The Near Future of AI</text>

  <!-- Section 1: Introduction -->
  <rect x="10" y="50" width="400" height="50" fill="none"
        stroke="#000" stroke-width="2" rx="5"/>
  <text x="15" y="65" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">Introduction</text>
  <rect x="10" y="80" width="350" height="10" fill="#87CEEB"
        stroke="#000" stroke-width="2" rx="5"/>
  <animateTransform attributeName="translate" type="translate"
                     from="10 60" to="10 110" begin="0s" dur="2s"
                     repeatCount="indefinite"/>
  <text x="15" y="120" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">The near future of AI holds immense potential
    for revolutionizing various aspects of our lives, from healthcare and education
    to finance and transportation. However, it also raises significant ethical and
    policy concerns that must be addressed to ensure the responsible development and
    deployment of AI systems.</text>

  <!-- Section 2: Defining AI and Its Types -->
  <rect x="10" y="150" width="400" height="50" fill="none"
        stroke="#000" stroke-width="2" rx="5"/>
  <text x="15" y="165" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">Defining AI and Its Types</text>
  <rect x="10" y="185" width="350" height="10" fill="#87CEEB"
        stroke="#000" stroke-width="2" rx="5"/>
  <animateTransform attributeName="translate" type="translate"
                     from="10 155" to="10 205" begin="0s" dur="2s"
                     repeatCount="indefinite"/>
  <text x="15" y="215" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">Artificial Intelligence (AI) is a broad field of
    computer science that focuses on the development of intelligent machines capable
    of performing tasks that typically require human intelligence, such as learning,
    problem-solving, and decision-making. Machine Learning (ML) is a subset of AI
    that involves the use of algorithms and statistical models to enable machines
    to learn from data and improve their performance over time. Deep Learning (DL)
    is a type of ML that uses neural networks with multiple layers to analyze data
    and make predictions.</text>

  <!-- Section 3: Positive Developments -->
  <rect x="10" y="250" width="400" height="50" fill="none"
        stroke="#000" stroke-width="2" rx="5"/>
  <text x="15" y="265" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">Positive Developments</text>
  <rect x="10" y="285" width="350" height="10" fill="#87CEEB"
        stroke="#000" stroke-width="2" rx="5"/>
  <animateTransform attributeName="translate" type="translate"
                     from="10 275" to="10 325" begin="0s" dur="2s"
                     repeatCount="indefinite"/>
  <text x="15" y="315" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">AI-assisted diagnosis, personalized medicine,
    and robotic surgery could lead to better patient outcomes and more efficient
    healthcare systems. AI-powered adaptive learning systems could provide personalized
    education, increasing access to quality education for millions of people
    worldwide. AI-driven urban planning and management could lead to more sustainable,
    efficient, and livable cities.</text>

  <!-- Section 4: Challenges and Concerns -->
  <rect x="10" y="350" width="400" height="50" fill="none"
        stroke="#000" stroke-width="2" rx="5"/>
  <text x="15" y="365" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">Challenges and Concerns</text>
  <rect x="10" y="385" width="350" height="10" fill="#87CEEB"
        stroke="#000" stroke-width="2" rx="5"/>
  <animateTransform attributeName="translate" type="translate"
                     from="10 395" to="10 445" begin="0s" dur="2s"
                     repeatCount="indefinite"/>
  <text x="15" y="425" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">AI systems can perpetuate biases and
    discriminate against certain groups, highlighting the need for more diverse
    and inclusive development teams. The automation of jobs could lead to job
    displacement, which could exacerbate income inequality and social unrest.
    Ensuring that the benefits of AI are shared by all and that its development and
    deployment are aligned with human values and ethics is crucial.</text>

  <!-- Section 5: Conclusion -->
  <rect x="10" y="450" width="400" height="50" fill="none"
        stroke="#000" stroke-width="2" rx="5"/>
  <text x="15" y="465" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">Conclusion</text>
  <rect x="10" y="485" width="350" height="10" fill="#87CEEB"
        stroke="#000" stroke-width="2" rx="5"/>
  <animateTransform attributeName="translate" type="translate"
                     from="10 495" to="10 545" begin="0s" dur="2s"
                     repeatCount="indefinite"/>
  <text x="15" y="525" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">The near future of AI holds immense potential
    for revolutionizing various aspects of our lives. However, it also raises
    significant ethical and policy concerns that must be addressed to ensure the
    responsible development and deployment of AI systems.</text>

  <!-- Footer at bottom -->
  <rect x="10" y="370" width="400" height="30" fill="none"
        stroke="#000" stroke-width="2" rx="5"/>
  <text x="15" y="385" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000">Educational Diagram</text>
  <rect x="10" y="405" width="400" height="10" fill="#87CEEB"
        stroke="#000" stroke-width="2" rx="5"/>
  <animateTransform attributeName="translate" type="translate"
                     from="10 415" to="10 465" begin="0s" dur="2s"
                     repeatCount="indefinite"/>
  <text x="15" y="445" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000"></text>

  <rect x="10" y="390" width="400" height="10" fill="#87CEEB"
        stroke="#000" stroke-width="2" rx="5"/>
  <animateTransform attributeName="translate" type="translate"
                     from="10 400" to="10 450" begin="0s" dur="2s"
                     repeatCount="indefinite"/>
  <text x="15" y="420" font-size="18" font-family="Arial, sans-serif"
        text-anchor="middle" fill="#000" style="visibility: hidden"></text>

  <!-- Arrow markers for connections -->
  <path d="M 20 60 L 20 90" stroke="#000" stroke-width="2"/>
  <path d="M 20 90 L 60 90" stroke="#000" stroke-width="2"/>
  <path d="M 60 90 L 80 90" stroke="#000" stroke-width="2"/>
  <path d="M 80 90 L 100 90" stroke="#000" stroke-width="2"/>
  <path d="M 100 90 L 120 90" stroke="#000" stroke-width="2"/>
  <path d="M 120 90 L 140 90" stroke="#000" stroke-width="2"/>
  <path d="M 140 90 L 160 90" stroke="#000" stroke-width="2"/>
  <path d="M 160 90 L 180 90" stroke="#000" stroke-width="2"/>
  <path d="M 180 90 L 200 90" stroke="#000" stroke-width="2"/>
  <path d="M 200 90 L 220 90" stroke="#000" stroke-width="2"/>
  <path d="M 220 90 L 240 90" stroke="#000" stroke-width="2"/>
  <path d="M 240 90 L 260 90" stroke="#000" stroke-width="2"/>
  <path d="M 260 90 L 280 90" stroke="#000" stroke-width="2"/>
  <path d="M 280 90 L 300 90" stroke="#000" stroke-width="2"/>
  <path d="M 300 90 L 320 90" stroke="#000" stroke-width="2"/>
  <path d="M 320 90 L 340 90" stroke="#000" stroke-width="2"/>
  <path d="M 340 90 L 360 90" stroke="#000" stroke-width="2"/>
  <path d="M 360 90 L 380 90" stroke="#000" stroke-width="2"/>
  <path d="M 380 90 L 400 90" stroke="#000" stroke-width="2"/>
</svg>