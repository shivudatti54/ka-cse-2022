<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="disk-structure">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#2c5aa0"/></linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#50c878"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/></linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#6a1b9a"/></linearGradient>
  </defs>
  <g data-narration="A hard disk has spinning platters with magnetic surfaces. Each surface has concentric tracks divided into sectors. A cylinder is the set of all tracks at the same position across all platters.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Physical Structure</text>
    <text x="110" y="65" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">Platters, tracks, sectors</text>
    <text x="110" y="80" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">Cylinders span all platters</text>
  </g>
  <g data-narration="Logical Block Addressing treats the entire disk as a one-dimensional array of blocks numbered from zero to N minus one. The disk controller maps these logical numbers to physical cylinder, head, and sector.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="310" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Logical Block Address</text>
    <text x="310" y="65" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">1D array: block 0 to N-1</text>
    <text x="310" y="80" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Controller maps LBA to CHS</text>
  </g>
  <g data-narration="The CHS mapping formula converts logical block number B to physical coordinates. Cylinder equals B divided by sectors times heads. Head and sector are derived using modulo arithmetic.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" stroke="#880e4f" stroke-width="1.5"/>
    <text x="110" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">CHS Mapping Formula</text>
    <text x="110" y="165" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">Cyl = B / (S x H)</text>
    <text x="110" y="180" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">Head = (B/S) mod H</text>
  </g>
  <g data-narration="Constant Angular Velocity spins the disk at fixed speed with equal sectors per track, used by HDDs. Constant Linear Velocity varies rotation speed so outer tracks hold more data, used by CDs.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" stroke="#bf360c" stroke-width="1.5"/>
    <text x="310" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">CAV vs CLV</text>
    <text x="310" y="165" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">CAV: fixed RPM for HDDs</text>
    <text x="310" y="180" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">CLV: variable RPM for CDs</text>
  </g>
  <text x="210" y="230" text-anchor="middle" fill="#333" font-family="Arial" font-size="16" font-weight="bold">Disk Structure</text>
  <g data-narration="In summary, disks have platters, tracks, sectors, and cylinders as physical geometry. LBA abstracts this as a simple array. The CHS formula maps blocks to physical locations. SSDs eliminate mechanical delays.">
    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="210" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Key Summary</text>
    <circle cx="50" cy="310" r="4" fill="#ce93d8"/><text x="60" y="314" fill="#f3e5f5" font-family="Arial" font-size="10">Physical: platters, surfaces, tracks, sectors, cylinders</text>
    <circle cx="50" cy="330" r="4" fill="#ce93d8"/><text x="60" y="334" fill="#f3e5f5" font-family="Arial" font-size="10">LBA: 1D block array, controller maps to CHS</text>
    <circle cx="50" cy="350" r="4" fill="#ce93d8"/><text x="60" y="354" fill="#f3e5f5" font-family="Arial" font-size="10">CAV for HDDs (fixed RPM), CLV for optical drives</text>
    <circle cx="50" cy="370" r="4" fill="#ce93d8"/><text x="60" y="374" fill="#f3e5f5" font-family="Arial" font-size="10">SSDs have no mechanical parts, eliminating seek time</text>
  </g>
</svg>