<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffde7"/>
      <stop offset="100%" style="stop-color:#fff9c4"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    
    <!-- Arrow Marker -->
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .draw-line {
      stroke-dasharray: 300;
      animation: drawLine 1s ease-out forwards;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="1400" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Computing Environments in Operating Systems. This topic explores how OS manages resources across diverse hardware and network setups.">
    <rect x="10" y="10" width="780" height="45" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Computing Environments in Operating Systems</text>
  </g>

  <!-- Step 1: Introduction -->
  <g class="step" id="step1" data-narration="A computing environment is the integrated setup of hardware, software, networks, and user interfaces where the OS operates and manages resources.">
    <rect x="20" y="65" width="760" height="90" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="90" font-size="14" font-weight="bold" fill="#1565c0">What is a Computing Environment?</text>
    <text x="40" y="115" font-size="11" fill="#455a64">An integrated setup of hardware, software, networks, and user interfaces where the OS operates.</text>
    <text x="40" y="135" font-size="11" fill="#455a64">It defines user interaction, app deployment, and execution across various system configurations.</text>
    <!-- Icon representation -->
    <circle cx="700" cy="110" r="30" fill="#1565c0" opacity="0.2"/>
    <path d="M685 110 L700 95 L715 110 M700 95 L700 130" stroke="#1565c0" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.5s" fill="freeze"/>
    </path>
  </g>

  <!-- Step 2: Why it matters -->
  <g class="step" id="step2" data-narration="Understanding computing environments is crucial as they impact system design, security, performance, and user interaction across all platforms.">
    <rect x="20" y="165" width="760" height="90" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="190" font-size="14" font-weight="bold" fill="#e65100">Why Does It Matter?</text>
    <text x="40" y="215" font-size="11" fill="#455a64">• Influences OS design decisions and resource management strategies</text>
    <text x="40" y="235" font-size="11" fill="#455a64">• Essential for system administration, cloud architecture, and software development</text>
    <text x="500" y="215" font-size="11" fill="#455a64">• Enables proper deployment, security,</text>
    <text x="500" y="235" font-size="11" fill="#455a64">  and scaling of applications</text>
  </g>

  <!-- Step 3: Traditional Stand-alone -->
  <g class="step" id="step3" data-narration="Traditional stand-alone environment: Single OS controls one machine. Example: Personal computers running Windows, Linux, or macOS.">
    <rect x="20" y="270" width="760" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="295" font-size="13" font-weight="bold" fill="#2e7d32">1. Traditional (Stand-alone) Environment</text>
    <text x="40" y="318" font-size="10" fill="#455a64">Single OS controls a single stand-alone machine. OS manages local CPU, memory, and disk.</text>
    <text x="40" y="338" font-size="10" fill="#455a64">Example: Desktop PC running Windows/Linux for individual productivity tasks.</text>
    <!-- Visual: Single computer icon -->
    <rect x="650" y="290" width="100" height="60" rx="5" fill="#4caf50" opacity="0.3"/>
    <rect x="660" y="300" width="80" height="40" rx="3" fill="#2e7d32"/>
    <rect x="695" y="345" width="10" height="8" fill="#2e7d32"/>
    <text x="700" y="325" font-size="8" fill="white" text-anchor="middle">OS</text>
  </g>

  <!-- Step 4: Client-Server -->
  <g class="step" id="step4" data-narration="Client-Server model: Servers provide resources, clients request them. Web browsers accessing remote websites exemplifies this architecture.">
    <rect x="20" y="380" width="760" height="100" rx="10" fill="url(#cyanGrad)" filter="url(#shadow)"/>
    <text x="40" y="405" font-size="13" font-weight="bold" fill="#00838f">2. Client-Server Environment</text>
    <text x="40" y="428" font-size="10" fill="#455a64">Tasks divided between servers (resource providers) and clients (requesters). Examples: file, database, web servers.</text>
    <text x="40" y="448" font-size="10" fill="#455a64">Example: Web browser (client) accessing websites hosted on Apache/Nginx servers.</text>
    <!-- Visual: Client-Server diagram -->
    <rect x="600" y="395" width="50" height="35" rx="3" fill="#00acc1"/>
    <text x="625" y="415" font-size="7" fill="white" text-anchor="middle">Client</text>
    <rect x="710" y="395" width="50" height="35" rx="3" fill="#00838f"/>
    <text x="735" y="415" font-size="7" fill="white" text-anchor="middle">Server</text>
    <path d="M655 412 L705 412" stroke="#00838f" stroke-width="2" marker-end="url(#arrowHead)" class="draw-line"/>
    <text x="680" y="408" font-size="7" fill="#00838f" text-anchor="middle">Request</text>
  </g>

  <!-- Step 5: Peer-to-Peer -->
  <g class="step" id="step5" data-narration="P2P is decentralized: All machines are equal peers, sharing resources directly. BitTorrent file sharing networks use this model.">
    <rect x="20" y="490" width="760" height="100" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="515" font-size="13" font-weight="bold" fill="#6a1b9a">3. Peer-to-Peer (P2P) Environment</text>
    <text x="40" y="538" font-size="10" fill="#455a64">Decentralized model where all peers are equal—they can be both clients and servers simultaneously.</text>
    <text x="40" y="558" font-size="10" fill="#455a64">Example: BitTorrent networks where users download and upload files directly between nodes.</text>
    <!-- Visual: P2P network -->
    <circle cx="620" cy="530" r="20" fill="#9c27b0" opacity="0.3"/>
    <circle cx="620" cy="530" r="10" fill="#7b1fa2"/>
    <circle cx="680" cy="560" r="20" fill="#9c27b0" opacity="0.3"/>
    <circle cx="680" cy="560" r="10" fill="#7b1fa2"/>
    <circle cx="720" cy="510" r="20" fill="#9c27b0" opacity="0.3"/>
    <circle cx="720" cy="510" r="10" fill="#7b1fa2"/>
    <path d="M630 540 L665 555" stroke="#6a1b9a" stroke-width="1.5" opacity="0.6"/>
    <path d="M635 520 L705 515" stroke="#6a1b9a" stroke-width="1.5" opacity="0.6"/>
    <path d="M675 550 L705 525" stroke="#6a1b9a" stroke-width="1.5" opacity="0.6"/>
    <text x="680" y="530" font-size="7" fill="#6a1b9a">P2P Network</text>
  </g>

  <!-- Step 6: Distributed Computing -->
  <g class="step" id="step6" data-narration="Distributed computing: Multiple CPUs appear as one unified system. Weather modeling and cloud platforms like AWS exemplify this environment.">
    <rect x="20" y="600" width="760" height="100" rx="10" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="40" y="625" font-size="13" font-weight="bold" fill="#00695c">4. Distributed Computing Environment</text>
    <text x="40" y="648" font-size="10" fill="#455a64">Multiple independent CPUs connected by network appear as single coherent system. OS handles networking and synchronization.</text>
    <text x="40" y="668" font-size="10" fill="#455a64">Example: Compute clusters for weather modeling, protein folding; AWS/Azure cloud platforms.</text>
    <!-- Visual: Distributed computing cluster -->
    <rect x="620" y="615" width="40" height="30" rx="3" fill="#00897b"/>
    <rect x="665" y="615" width="40" height="30" rx="3" fill="#00897b"/>
    <rect x="710" y="615" width="40" height="30" rx="3" fill="#00897b"/>
    <rect x="642" y="650" width="80" height="25" rx="3" fill="#004d40"/>
    <text x="675" y="640" font-size="7" fill="white" text-anchor="middle">Network</text>
    <text x="675" y="667" font-size="6" fill="white" text-anchor="middle">Unified System</text>
  </g>

  <!-- Step 7: Virtualized Environment -->
  <g class="step" id="step7" data-narration="Virtualization runs multiple isolated VMs on one physical machine via hypervisor. VMware and VirtualBox enable this resource optimization.">
    <rect x="20" y="710" width="760" height="100" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="735" font-size="13" font-weight="bold" fill="#c62828">5. Virtualized Environment</text>
    <text x="40" y="758" font-size="10" fill="#455a64">Hypervisor enables multiple isolated VMs on single host machine. Improves hardware utilization and isolation.</text>
    <text x="40" y="778" font-size="10" fill="#455a64">Example: Running Linux VM on Windows via VMware/VirtualBox; cloud providers use massive virtualization.</text>
    <!-- Visual: Virtualization -->
    <rect x="600" y="730" width="140" height="60" rx="5" fill="#d32f2f" opacity="0.2"/>
    <rect x="610" y="740" width="50" height="40" rx="3" fill="#c62828"/>
    <text x="635" y="765" font-size="7" fill="white" text-anchor="middle">Host OS</text>
    <rect x="670" y="740" width="60" height="18" rx="2" fill="#ef5350"/>
    <rect x="670" y="762" width="60" height="18" rx="2" fill="#ef5350"/>
    <text x="700" y="752" font-size="6" fill="white" text-anchor="middle">VM1</text>
    <text x="700" y="774" font-size="6" fill="white" text-anchor="middle">VM2</text>
    <text x="670" y="725" font-size="7" fill="#c62828" font-weight="bold">Hypervisor</text>
  </g>

  <!-- Step 8: Cloud Computing -->
  <g class="step" id="step8" data-narration="Cloud computing provides on-demand resources via IaaS, PaaS, SaaS models. AWS EC2, Google App Engine, and Gmail represent these services.">
    <rect x="20" y="820" width="760" height="110" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="845" font-size="13" font-weight="bold" fill="#1565c0">6. Cloud Computing Environment</text>
    <text x="40" y="868" font-size="10" fill="#455a64">On-demand network access to shared configurable resources. Built on distributed and virtualized environments.</text>
    <!-- Service models -->
    <rect x="40" y="878" width="220" height="40" rx="5" fill="#42a5f5" opacity="0.3"/>
    <text x="150" y="893" font-size="10" font-weight="bold" fill="#0d47a1" text-anchor="middle">IaaS</text>
    <text x="150" y="908" font-size="8" fill="#0d47a1" text-anchor="middle">Infrastructure (e.g., AWS EC2)</text>
    
    <rect x="270" y="878" width="220" height="40" rx="5" fill="#42a5f5" opacity="0.5"/>
    <text x="380" y="893" font-size="10" font-weight="bold" fill="#0d47a1" text-anchor="middle">PaaS</text>
    <text x="380" y="908" font-size="8" fill="#0d47a1" text-anchor="middle">Platform (e.g., Google App Engine)</text>
    
    <rect x="500" y="878" width="220" height="40" rx="5" fill="#42a5f5" opacity="0.7"/>
    <text x="610" y="893" font-size="10" font-weight="bold" fill="#0d47a1" text-anchor="middle">SaaS</text>
    <text x="610" y="908" font-size="8" fill="#0d47a1" text-anchor="middle">Software (e.g., Gmail, Salesforce)</text>
  </g>

  <!-- Step 9: Real-Time Environment -->
  <g class="step" id="step9" data-narration="Real-time systems must meet strict deadlines. Hard real-time (flight control) cannot fail; soft real-time (streaming) tolerates delays.">
    <rect x="20" y="940" width="760" height="100" rx="10" fill="url(#yellowGrad)" filter="url(#shadow)"/>
    <text x="40" y="965" font-size="13" font-weight="bold" fill="#f9a825">7. Real-Time Environment</text>
    <text x="40" y="988" font-size="10" fill="#455a64">Correct operation depends on both logical result AND timing. OS must meet strict deadlines.</text>
    <!-- Hard vs Soft comparison -->
    <rect x="40" y="1000" width="340" height="30" rx="5" fill="#f57f17" opacity="0.3"/>
    <text x="60" y="1015" font-size="9" font-weight="bold" fill="#e65100">Hard Real-Time</text>
    <text x="60" y="1025" font-size="8" fill="#455a64">Deadline failure = catastrophic (flight control, airbags)</text>
    
    <rect x="400" y="1000" width="340" height="30" rx="5" fill="#fbc02d" opacity="0.3"/>
    <text x="420" y="1015" font-size="9" font-weight="bold" fill="#f9a825">Soft Real-Time</text>
    <text x="420" y="1025" font-size="8" fill="#455a64">Deadline miss undesirable but non-fatal (video streaming)</text>
  </g>

  <!-- Step 10: Ubiquitous/Embedded -->
  <g class="step" id="step10" data-narration="Embedded systems are specialized computers in everyday devices. OS like FreeRTOS prioritizes low power and reliability over performance.">
    <rect x="20" y="1050" width="760" height="100" rx="10" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="40" y="1075" font-size="13" font-weight="bold" fill="#00695c">8. Ubiquitous / Embedded Computing</text>
    <text x="40" y="1098" font-size="10" fill="#455a64">Microprocessors embedded in everyday objects make them smart. OS is lightweight, focusing on low power and reliability.</text>
    <text x="40" y="1118" font-size="10" fill="#455a64">Example: Smart thermostats, fitness trackers, automotive systems running FreeRTOS or Embedded Linux.</text>
    <!-- Visual: IoT devices -->
    <circle cx="650" cy="1090" r="18" fill="#00897b" opacity="0.4"/>
    <text x="650" y="1093" font-size="16">🌡️</text>
    <circle cx="700" cy="1090" r="18" fill="#00897b" opacity="0.4"/>
    <text x="700" y="1093" font-size="16">📱</text>
    <circle cx="735" cy="1090" r="18" fill="#00897b" opacity="0.4"/>
    <text x="735" y="1093" font-size="16">🚗</text>
    <text x="695" y="1115" font-size="8" fill="#00695c" text-anchor="middle">IoT Devices</text>
  </g>

  <!-- Step 11: Summary -->
  <g class="step" id="step11" data-narration="In summary, computing environments have evolved from simple stand-alone systems to complex cloud and distributed networks, each with unique OS requirements.">
    <rect x="20" y="1165" width="760" height="90" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="1190" font-size="14" font-weight="bold" fill="#e65100">Summary: Key Takeaways</text>
    <text x="40" y="1213" font-size="10" fill="#455a64">• Environments evolved: Stand-alone → Client-Server → P2P → Distributed → Virtualized → Cloud</text>
    <text x="40" y="1233" font-size="10" fill="#455a64">• OS design profoundly influenced by target environment (real-time vs cloud vs embedded)</text>
    <text x="500" y="1213" font-size="10" fill="#455a64">• Modern systems blend multiple environments</text>
    <text x="500" y="1233" font-size="10" fill="#455a64">• Essential for system administration and cloud architecture roles</text>
  </g>

  <!-- Step 12: Evolution Diagram -->
  <g class="step" id="step12" data-narration="The evolution timeline shows computing environments progressing from isolated mainframes to interconnected, distributed, and ubiquitous systems today.">
    <rect x="20" y="1265" width="760" height="100" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="1290" font-size="14" font-weight="bold" fill="#6a1b9a">Evolution of Computing Environments</text>
    <!-- Timeline -->
    <line x1="60" y1="1340" x2="740" y2="1340" stroke="#6a1b9a" stroke-width="3" stroke-linecap="round" class="draw-line"/>
    
    <!-- Timeline points -->
    <circle cx="100" cy="1340" r="8" fill="#7b1fa2">
      <animate attributeName="r" values="0;8" dur="0.3s" begin="0.5s" fill="freeze"/>
    </circle>
    <text x="100" y="1325" font-size="7" fill="#6a1b9a" text-anchor="middle">Standalone</text>
    
    <circle cx="250" cy="1340" r="8" fill="#7b1fa2">
      <animate attributeName="r" values="0;8" dur="0.3s" begin="0.7s" fill="freeze"/>
    </circle>
    <text x="250" y="1325" font-size="7" fill="#6a1b9a" text-anchor="middle">Client-Server</text>
    
    <circle cx="400" cy="1340" r="8" fill="#7b1fa2">
      <animate attributeName="r" values="0;8" dur="0.3s" begin="0.9s" fill="freeze"/>
    </circle>
    <text x="400" y="1325" font-size="7" fill="#6a1b9a" text-anchor="middle">P2P</text>
    
    <circle cx="550" cy="1340" r="8" fill="#7b1fa2">
      <animate attributeName="r" values="0;8" dur="0.3s" begin="1.1s" fill="freeze"/>
    </circle>
    <text x="550" y="1325" font-size="7" fill="#6a1b9a" text-anchor="middle">Distributed</text>
    
    <circle cx="700" cy="1340" r="8" fill="#7b1fa2">
      <animate attributeName="r" values="0;8" dur="0.3s" begin="1.3s" fill="freeze"/>
    </circle>
    <text x="700" y="1325" font-size="7" fill="#6a1b9a" text-anchor="middle">Cloud/IoT</text>
    
    <!-- Arrow at end -->
    <path d="M740 1340 L755 1340" stroke="#6a1b9a" stroke-width="2" marker-end="url(#arrowHead)"/>
  </g>

</svg>