<svg width="420" height="400" data-topic-id="Contiguous Memory Allocation" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="100%" height="100%" fill="#66CCCC" />
<defs>
<linearGradient id="color-grad" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#3498db" stop-opacity="1"/>
<stop offset="100%" stop-color="#2ecc71" stop-opacity="1"/>
</linearGradient>
</defs>
<text x="10" y="20" fill="#3498db" font-size="24" text-anchor="left">Contiguous Memory Allocation</text>
<rect x="20" y="50" width="100%" height="100" fill="url(#color-grad)" opacity=".5" />
<animateBegin time=".1s"dur="1s" attributeName="opacity" from=".5" to="1" />
<animateBegin time=".2s"dur="1s" attributeName="opacity" from=".5" to="1" />
<animateBegin time=".3s"dur="1s" attributeName="opacity" from=".5" to="1" />
<animateBegin time=".4s"dur="1s" attributeName="opacity" from=".5" to="1" />
<section data-narration="Introduction">
<rect x="0" y="150" width="100%" height="100" fill="#2ecc71" opacity=".5" />
<animateBegin time=".1s"dur="1s" attributeName="opacity" from=".5" to="1" />
<text x="10" y="170" fill="#3498db" font-size="18" text-anchor="left">Introduction</text>
<p>This is the introduction to Contiguous Memory Allocation.</p>
<rect x="20" y="190" width="100%" height="100" fill="#2ecc71" opacity=".5" />
<animateBegin time=".2s"dur="1s" attributeName="opacity" from=".5" to="1" />
<p>Dynamic memory allocation is a process that allows programs to request memory from the operating system at runtime.</p>
</section>
<section data-narration="Functions">
<rect x="0" y="250" width="100%" height="100" fill="#2ecc71" opacity=".5" />
<animateBegin time=".1s"dur="1s" attributeName="opacity" from=".5" to="1" />
<rect x="20" y="270" width="100%" height="100" fill="#3498db" opacity=".5" />
<animateBegin time=".2s"dur="1s" attributeName="opacity" from=".5" to="1" />
<text x="10" y="290" fill="#3498db" font-size="18" text-anchor="left">Functions</text>
<p>C provides four library functions for dynamic memory management.</p>
<ul>
<li><text x="10" y="310" fill="#3498db" font-size="14" text-anchor="left">malloc():</text>
<p>Allocates a block of memory of specified size and returns a pointer to the first byte of the allocated space.</p>
<code><code><code>void *malloc(size_t size)</code></code></code>
</li>
<li><text x="10" y="340" fill="#3498db" font-size="14" text-anchor="left">calloc():</text>
<p>Allocates multiple blocks of memory, each of the same size, and initializes all bytes to zero.</p>
<code><code><code>void *calloc(size_t num, size_t size)</code></code></code>
</li>
<li><text x="10" y="370" fill="#3498db" font-size="14" text-anchor="left">realloc():</text>
<p>Changes the size of previously allocated memory.</p>
<code><code><code>void *realloc(void *ptr, size_t new_size)</code></code></code>
</li>
<li><text x="10" y="400" fill="#3498db" font-size="14" text-anchor="left">free():</text>
<p>Deallocates previously allocated memory.</p>
<code><code><code>void free(void *ptr)</code></code></code>
</li>
</ul>
</section>
<section data-narration="Differences">
<rect x="0" y="350" width="100%" height="100" fill="#2ecc71" opacity=".5" />
<animateBegin time=".1s"dur="1s" attributeName="opacity" from=".5" to="1" />
<rect x="20" y="370" width="100%" height="100" fill="#3498db" opacity=".5" />
<animateBegin time=".2s"dur="1s" attributeName="opacity" from=".5" to="1" />
<text x="10" y="390" fill="#3498db" font-size="18" text-anchor="left">Differences</text>
<p>This table highlights the differences between static and dynamic memory allocation.</p>
<table>
<tr>
<td><text x="10" y="410" fill="#3498db" font-size="14" text-anchor="left">Feature</text></td>
<td><text x="120" y="410" fill="#3498db" font-size="14" text-anchor="left">Static Allocation</text></td>
<td><text x="240" y="410" fill="#3498db" font-size="14" text-anchor="left">Dynamic Allocation</text></td>
</tr>
<tr>
<td><text x="10" y="430" fill="#3498db" font-size="14" text-anchor="left">Memory Size</text></td>
<td><text x="120" y="430" fill="#3498db" font-size="14" text-anchor="left">Fixed at compile time</text></td>
<td><text x="240" y="430" fill="#3498db" font-size="14" text-anchor="left">Determined at runtime</text></td>
</tr>
<tr>
<td><text x="10" y="450" fill="#3498db" font-size="14" text-anchor="left">Lifetime</text></td>
<td><text x="120" y="450" fill="#3498db" font-size="14" text-anchor="left">Entire program execution</text></td>
<td><text x="240" y="450" fill="#3498db" font-size="14" text-anchor="left">Until explicitly freed</text></td>
</tr>
<tr>
<td><text x="10" y="470" fill="#3498db" font-size="14" text-anchor="left">Flexibility</text></td>
<td><text x="120" y="470" fill="#3498db" font-size="14" text-anchor="left">Limited</text></td>
<td><text x="240" y="470" fill="#3498db" font-size="14" text-anchor="left">High</text></td>
</tr>
</table>
</section>
<rect x="0" y="200" width="100%" height="100" fill="#2ecc71" opacity=".5" />
<animateBegin time=".1s"dur="1s" attributeName="opacity" from=".5" to="1" />
<rect x="20" y="220" width="100%" height="100" fill="#3498db" opacity=".5" />
<animateBegin time=".2s"dur="1s" attributeName="opacity" from=".5" to="1" />
<text x="10" y="240" fill="#3498db" font-size="18" text-anchor="left">Conclusion</text>
<p>This concludes our explanation of contiguous memory allocation.</p>
<rect x="0" y="280" width="100%" height="100" fill="#2ecc71" opacity=".5" />
<animateBegin time=".1s"dur="1s" attributeName="opacity" from=".5" to="1" />
