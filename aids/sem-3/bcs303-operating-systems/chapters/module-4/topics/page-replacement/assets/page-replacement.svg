<svg width="420" height="400" data-topic-id="page-replacement">
  <!-- Title -->
  <defs>
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a88d8" stop-opacity="1" />
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="320" height="300" fill="url(#title-gradient)" rx="10" />
  <text x="150" y="50" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">Page Replacement</text>

  <!-- Section 1: Introduction to Page Replacement -->
  <rect x="50" y="100" width="320" height="50" fill="#f0f0f0" rx="10" />
  <text x="50" y="120" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" data-narration="In a virtual memory system using demand paging, processes execute with only some of their pages in physical memory. When a process references a page that isn't currently in memory (a **page fault**), the operating system must bring that page from secondary storage (disk) into a free frame in physical memory.">
    <animateTransform attributeName="transform" type="rotate" from="0 150 120" to="360 150 120" dur="4s" begin="0s" />
  </text>

  <!-- Section 2: Basic Page Replacement Process -->
  <rect x="50" y="170" width="320" height="50" fill="#f0f0f0" rx="10" />
  <text x="50" y="190" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" data-narration="When a page fault occurs and no free frame exists:
    <animateTransform attributeName="transform" type="rotate" from="0 150 190" to="360 150 190" dur="2s" begin="0s" />
    1. Find the location of the desired page on disk
    <animateTransform attributeName="transform" type="rotate" from="0 150 220" to="360 150 220" dur="2s" begin="2s" />
    2. Find a free frame:
      <animateTransform attributeName="transform" type="rotate" from="0 150 260" to="360 150 260" dur="2s" begin="4s" />
      - If there's a free frame, use it
      <animateTransform attributeName="transform" type="rotate" from="0 150 300" to="360 150 300" dur="2s" begin="6s" />
      - If no free frame exists, use a page replacement algorithm to select a **victim frame**
    <animateTransform attributeName="transform" type="rotate" from="0 150 340" to="360 150 340" dur="2s" begin="8s" />
    3. Write the victim page to disk if it has been modified (set the **dirty bit**)
    <animateTransform attributeName="transform" type="rotate" from="0 150 380" to="360 150 380" dur="2s" begin="10s" />
    4. Bring the desired page into the newly freed frame
    <animateTransform attributeName="transform" type="rotate" from="0 150 420" to="360 150 420" dur="2s" begin="12s" />
    5. Update the page table and frame table
    <animateTransform attributeName="transform" type="rotate" from="0 150 460" to="360 150 460" dur="2s" begin="14s" />
    6. Restart the instruction that caused the page fault">
    <animateTransform attributeName="transform" type="rotate" from="0 150 500" to="360 150 500" dur="2s" begin="16s" />
  </text>

  <!-- Section 3: Goals of Page Replacement Algorithms -->
  <rect x="50" y="250" width="320" height="50" fill="#f0f0f0" rx="10" />
  <text x="50" y="270" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" data-narration="The goal of page replacement algorithms is to minimize the **page fault rate** - the frequency at which page faults occur. A good algorithm should avoid replacing pages that will be needed again soon">
    <animateTransform attributeName="transform" type="rotate" from="0 150 270" to="360 150 270" dur="2s" begin="18s" />
  </text>

  <!-- Section 4: Types of Page Replacement Algorithms -->
  <rect x="50" y="330" width="320" height="50" fill="#f0f0f0" rx="10" />
  <text x="50" y="350" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" data-narration="There are several types of page replacement algorithms, including:
    <animateTransform attributeName="transform" type="rotate" from="0 150 350" to="360 150 350" dur="2s" begin="20s" />
    - First-In-First-Out (FIFO)
    <animateTransform attributeName="transform" type="rotate" from="0 150 390" to="360 150 390" dur="2s" begin="22s" />
    - Least Recently Used (LRU)
    <animateTransform attributeName="transform" type="rotate" from="0 150 430" to="360 150 430" dur="2s" begin="24s" />
    - Optimal
    <animateTransform attributeName="transform" type="rotate" from="0 150 470" to="360 150 470" dur="2s" begin="26s" />
    - Best Fit
    <animateTransform attributeName="transform" type="rotate" from="0 150 510" to="360 150 510" dur="2s" begin="28s" />
  </text>

  <!-- Section 5: Conclusion -->
  <rect x="50" y="390" width="320" height="50" fill="#f0f0f0" rx="10" />
  <text x="50" y="410" font-size="18" font-family="Arial" fill="#333333" text-anchor="start" data-narration="In conclusion, page replacement algorithms are an important aspect of virtual memory systems. By understanding the different types of page replacement algorithms and their goals, we can design more efficient systems that minimize page faults and maximize system performance">
    <animateTransform attributeName="transform" type="rotate" from="0 150 410" to="360 150 410" dur="2s" begin="30s" />
  </text>

  <!-- Footer -->
  <rect x="50" y="470" width="320" height="50" fill="#f0f0f0" rx="10" />
  <text x="50" y="490" font-size="18" font-family="Arial" fill="#333333" text-anchor="start">Page Replacement</text>
</svg>