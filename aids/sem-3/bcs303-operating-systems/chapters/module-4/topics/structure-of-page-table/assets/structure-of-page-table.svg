<svg width="420" height="400" data-topic-id="structure-of-page-table">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title at top -->
  <text x="10" y="10" font-size="24" font-family="Arial" fill="#2F4F7F">
    Structure of Page Table
  </text>
  
  <!-- Section 1: Introduction -->
  <section id="section-1" data-narration="Introduction to Page Tables">
    <rect x="10" y="50" width="400" height="60" fill="#FFFFFF" rx="10" />
    <text x="20" y="70" font-size="18" font-family="Arial" fill="#2F4F7F">
      A page table is a data structure that maps virtual addresses to physical addresses in a computer memory.
    </text>
  </section>
  
  <!-- Section 2: Types of Page Tables -->
  <section id="section-2" data-narration="Types of Page Tables">
    <rect x="10" y="120" width="400" height="60" fill="#FFFFFF" rx="10" />
    <text x="20" y="140" font-size="18" font-family="Arial" fill="#2F4F7F">
      There are two main types of page tables: 
      <animateTransform attributeName="x" type="translate" from="20" to="80" begin="0s" dur="1s" repeatCount="indefinite" />
      <animateTransform attributeName="y" type="translate" from="140" to="200" begin="0s" dur="1s" repeatCount="indefinite" />
      Level 2 Cache and Translation Lookup Tables (TLBs).
    </text>
  </section>
  
  <!-- Section 3: Page Table Structure -->
  <section id="section-3" data-narration="Page Table Structure">
    <rect x="10" y="220" width="400" height="60" fill="#FFFFFF" rx="10" />
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#2F4F7F">
      A page table consists of the following components:
      <animateTransform attributeName="x" type="translate" from="20" to="80" begin="0s" dur="1s" repeatCount="indefinite" />
      <animateTransform attributeName="y" type="translate" from="240" to="300" begin="0s" dur="1s" repeatCount="indefinite" />
      Page Table Entry (PTE) - Maps virtual address to physical address
      Page Directory - Maps page table base address to page table top address
    </text>
  </section>
  
  <!-- Section 4: Page Table Operations -->
  <section id="section-4" data-narration="Page Table Operations">
    <rect x="10" y="310" width="400" height="60" fill="#FFFFFF" rx="10" />
    <text x="20" y="330" font-size="18" font-family="Arial" fill="#2F4F7F">
      Page table operations include:
      <animateTransform attributeName="x" type="translate" from="20" to="80" begin="0s" dur="1s" repeatCount="indefinite" />
      <animateTransform attributeName="y" type="translate" from="330" to="390" begin="0s" dur="1s" repeatCount="indefinite" />
      Page Fault - Occurs when a page is not found in the page table
      Page Replacement - Replaces a page in memory to make room for a new page
    </text>
  </section>
  
  <!-- Footer at bottom -->
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#2F4F7F">
    Structure of Page Table
  </text>
</svg>