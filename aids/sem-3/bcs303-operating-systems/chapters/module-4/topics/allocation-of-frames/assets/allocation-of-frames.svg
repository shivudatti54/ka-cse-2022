<svg width="420" height="400" data-topic-id="allocation-of-frames">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2A1FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.8" />

  <!-- Title -->
  <text x="10" y="10" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Allocation of Frames
  </text>

  <!-- Section 1: Contiguous Allocation -->
  <section data-narration="Contiguous Allocation">
    <rect x="10" y="50" width="390" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="60" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Contiguous Allocation
    </text>
    <animate transform="rotate(0 15 60)" dur="2000" begin="200ms" fill="freeze" />
    <rect x="15" y="60" width="20" height="40" fill="#8BC34A" rx="5" />
    <text x="35" y="70" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Simple implementation
      <tspan x="35" y="90" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
        Excellent read performance (sequential access)
        <tspan x="35" y="110" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
          Supports direct access
        </tspan>
      </tspan>
    </text>
  </section>

  <!-- Section 2: Linked Allocation -->
  <section data-narration="Linked Allocation">
    <rect x="10" y="170" width="390" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="180" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Linked Allocation
    </text>
    <animate transform="rotate(180 15 180)" dur="2000" begin="400ms" fill="freeze" />
    <rect x="15" y="180" width="20" height="40" fill="#03A9F4" rx="5" />
    <text x="35" y="190" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      No external fragmentation
      <tspan x="35" y="210" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
        Files can grow dynamically
        <tspan x="35" y="230" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
          Simple allocation
        </tspan>
      </tspan>
    </text>
  </section>

  <!-- Section 3: Indexed Allocation -->
  <section data-narration="Indexed Allocation">
    <rect x="10" y="270" width="390" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="280" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Indexed Allocation
    </text>
    <animate transform="rotate(360 15 280)" dur="2000" begin="600ms" fill="freeze" />
    <rect x="15" y="280" width="20" height="40" fill="#FF9801" rx="5" />
    <text x="35" y="290" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Direct access supported
      <tspan x="35" y="310" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
        No external fragmentation
        <tspan x="35" y="330" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
          Easy file growth
        </tspan>
      </tspan>
    </text>
  </section>

  <!-- Section 4: Handling Large Files -->
  <section data-narration="Handling Large Files">
    <rect x="10" y="370" width="390" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="380" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Handling Large Files
    </text>
    <animate transform="rotate(0 15 380)" dur="2000" begin="800ms" fill="freeze" />
    <rect x="15" y="380" width="20" height="40" fill="#2196F3" rx="5" />
    <text x="35" y="390" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Linked index
      <tspan x="35" y="410" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
        Multi-level index
        <tspan x="35" y="430" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
          Combined (Unix inode)
        </tspan>
      </tspan>
    </text>
  </section>

  <!-- Section 5: Comparison -->
  <section data-narration="Comparison">
    <rect x="10" y="510" width="390" height="100" fill="#F7F7F7" rx="10" />
    <text x="15" y="520" font-size="16" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Comparison
    </text>
    <animate transform="rotate(0 15 520)" dur="2000" begin="1000ms" fill="freeze" />
    <rect x="15" y="520" width="20" height="40" fill="#FF9801" rx="5" />
    <text x="35" y="530" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      | Method     | Fragmentation | Direct Access | Growth    |
    </text>
    <rect x="10" y="550" width="390" height="50" fill="#F7F7F7" rx="10" />
    <rect x="10" y="600" width="390" height="50" fill="#F7F7F7" rx="10" />
    <text x="10" y="610" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      | Contiguous | External      | Yes           | Difficult |
      <tspan x="10" y="630" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
        | Linked     | None          | No            | Easy      |
        <tspan x="10" y="650" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
          | Indexed    | None          | Yes           | Easy      |
        </tspan>
      </tspan>
  </section>

  <!-- Footer -->
  <text x="10" y="410" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
    Created by [Your Name]
  </text>
</svg>