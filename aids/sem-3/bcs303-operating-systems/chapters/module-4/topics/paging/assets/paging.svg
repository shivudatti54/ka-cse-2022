<svg
  width="420"
  height="400"
  viewBox="0 0 420 400"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="background-color: #87CEEB; border-radius: 10px; perspective: 1000px;"
  data-topic-id="paging"
>

  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="50" fill="#ADD8E6" rx="10" />
  <text x="15" y="25" style="font-size: 24px; color: #3B5998;" text-anchor="start">Paging</text>

  <!-- Section 1: Concept -->
  <section style="background-color: #C9E4CA; padding: 20px; margin-bottom: 20px;">
    <data-narration>In computer memory, a frame is a fixed-size block of physical memory. A page is a logical block of memory that is divided into frames.</data-narration>
    <rect x="10" y="10" width="380" height="30" fill="#C6E2B5" rx="10" />
    <text x="15" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Page</text>
    <text x="220" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Frame</text>
  </section>

  <!-- Section 2: Address Translation -->
  <section style="background-color: #87CEEB; padding: 20px; margin-bottom: 20px;">
    <data-narration>Page size is typically 4KB. The logical address structure consists of a page number and a page offset.</data-narration>
    <rect x="10" y="10" width="380" height="30" fill="#87CEEB" rx="10" />
    <text x="15" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Page Number</text>
    <text x="220" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Page Offset</text>
  </section>

  <!-- Section 3: Translation Process -->
  <section style="background-color: #F7DC6F; padding: 20px; margin-bottom: 20px;">
    <data-narration>The translation process involves extracting the page number and offset from the logical address and using the page table to determine the physical address.</data-narration>
    <rect x="10" y="10" width="380" height="30" fill="#F7DC6F" rx="10" />
    <text x="15" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Physical Address</text>
  </section>

  <!-- Section 4: Page Table -->
  <section style="background-color: #2196F3; padding: 20px; margin-bottom: 20px;">
    <data-narration>A page table is used to map logical pages to physical frames. Each page table entry contains the frame number, valid/invalid bit, protection bits, dirty bit, and reference bit.</data-narration>
    <rect x="10" y="10" width="380" height="30" fill="#2196F3" rx="10" />
    <text x="15" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Page Table Entry</text>
    <text x="220" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Field</text>
  </section>

  <!-- Section 5: Multi-Level Paging -->
  <section style="background-color: #FF9800; padding: 20px; margin-bottom: 20px;">
    <data-narration>Multi-level paging involves using two or more levels of page tables to handle large address spaces.</data-narration>
    <rect x="10" y="10" width="380" height="30" fill="#FF9800" rx="10" />
    <text x="15" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Multi-Level Paging</text>
  </section>

  <!-- Section 6: Inverted Page Table -->
  <section style="background-color: #4CAF50; padding: 20px; margin-bottom: 20px;">
    <data-narration>An inverted page table maps frames to pages, rather than the traditional mapping of pages to frames.</data-narration>
    <rect x="10" y="10" width="380" height="30" fill="#4CAF50" rx="10" />
    <text x="15" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">Inverted Page Table</text>
  </section>

  <!-- TLB Section -->
  <section style="background-color: #2196F3; padding: 20px; margin-bottom: 20px;">
    <data-narration>The Translation Lookaside Buffer (TLB) is a cache that stores recent page table entries to improve performance.</data-narration>
    <rect x="10" y="10" width="380" height="30" fill="#2196F3" rx="10" />
    <text x="15" y="25" style="font-size: 18px; color: #3B5998;" text-anchor="start">TLB</text>
  </section>

  <!-- Footer -->
  <rect x="10" y="380" width="400" height="10" fill="#ADD8E6" rx="10" />
  <text x="15" y="390" style="font-size: 14px; color: #3B5998;" text-anchor="start">Paging</text>

</svg>