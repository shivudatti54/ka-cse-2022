<svg width="420" height="400" data-topic-id="segmentation">
  <title>Segmentation Memory Management</title>
  <desc>Memory Segmentation Diagram</desc>
  <defs>
    <linearGradient id="gradient">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#66CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="350" fill="url(#gradient)"/>
    <g>
      <rect x="10" y="10" width="80" height="20" fill="#008080" rx="5"/>
      <text x="15" y="25" font-size="16" font-family="Arial" font-weight="bold">Code Segment</text>
      <text x="15" y="50" font-size="12" font-family="Arial">Program instructions</text>
    </g>
    <g>
      <rect x="120" y="10" width="80" height="20" fill="#008080" rx="5"/>
      <text x="125" y="25" font-size="16" font-family="Arial" font-weight="bold">Data Segment</text>
      <text x="125" y="50" font-size="12" font-family="Arial">Global variables</text>
    </g>
    <g>
      <rect x="220" y="10" width="80" height="20" fill="#008080" rx="5"/>
      <text x="225" y="25" font-size="16" font-family="Arial" font-weight="bold">Stack Segment</text>
      <text x="225" y="50" font-size="12" font-family="Arial">Function calls, local variables</text>
    </g>
    <g>
      <rect x="320" y="10" width="80" height="20" fill="#008080" rx="5"/>
      <text x="325" y="25" font-size="16" font-family="Arial" font-weight="bold">Heap Segment</text>
      <text x="325" y="50" font-size="12" font-family="Arial">Dynamically allocated memory</text>
    </g>
    <rect x="10" y="80" width="400" height="20" fill="#FF99CC" rx="5"/>
    <text x="15" y="95" font-size="16" font-family="Arial" font-weight="bold">Segment Table</text>
    <g>
      <rect x="10" y="110" width="80" height="20" fill="#008080" rx="5"/>
      <text x="15" y="125" font-size="12" font-family="Arial">Base: Starting physical address</text>
      <text x="15" y="145" font-size="12" font-family="Arial">Limit: Length of segment</text>
    </g>
    <g>
      <rect x="120" y="110" width="80" height="20" fill="#008080" rx="5"/>
      <text x="125" y="125" font-size="12" font-family="Arial">Logical address: (segment, offset)</text>
      <text x="125" y="145" font-size="12" font-family="Arial">Physical address: base + offset</text>
    </g>
    <g>
      <rect x="220" y="110" width="80" height="20" fill="#008080" rx="5"/>
      <text x="225" y="125" font-size="12" font-family="Arial">Example: (2, 53) = Physical: 4353</text>
    </g>
    <g>
      <rect x="320" y="110" width="80" height="20" fill="#008080" rx="5"/>
      <text x="325" y="125" font-size="12" font-family="Arial">Hardware Support: Trap on segmentation fault</text>
    </g>
    <g>
      <rect x="10" y="300" width="400" height="20" fill="#FF66CC" rx="5"/>
      <text x="15" y="315" font-size="16" font-family="Arial" font-weight="bold">Address Translation</text>
      <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="10" y="340" width="400" height="30" fill="#008080" rx="5"/>
      <text x="15" y="355" font-size="12" font-family="Arial">Note: Each process has a segment table with entries</text>
      <text x="15" y="375" font-size="12" font-family="Arial">Base: Starting physical address, Limit: Length of segment</text>
    </g>
  </g>
  <g>
    <g transform="scale(0.5)">
      <rect x="10" y="10" width="400" height="350" fill="#66CCCC" rx="5"/>
    </g>
  </g>
</svg>