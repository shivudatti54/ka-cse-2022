<svg width="420" height="400" data-topic-id="demand-paging">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Gradient Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" opacity="0.5" />

  <!-- Title -->
  <text x="100" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#3498DB">
    Demand Paging
  </text>

  <!-- Section 1: Introduction to Demand Paging -->
  <section data-narration="Introduction to Demand Paging">
    <rect x="10" y="60" width="400" height="100" fill="#f0f0f0" rx="10" />
    <text x="20" y="80" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      Demand paging is a fundamental memory management scheme used by modern operating systems to implement virtual memory.
    </text>
    <text x="20" y="120" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      It is a type of lazy loading where pages are only brought into physical memory (RAM) when they are explicitly demanded by a process.
    </text>
  </section>

  <!-- Section 2: How Demand Paging Works -->
  <section data-narration="How Demand Paging Works">
    <rect x="10" y="190" width="400" height="100" fill="#f0f0f0" rx="10" />
    <text x="20" y="210" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      The operation of demand paging relies on cooperation between the hardware (MMU - Memory Management Unit) and the operating system.
    </text>
    <text x="20" y="250" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      The MMU translates virtual addresses to physical addresses, and the operating system manages the swapping of pages between memory and disk.
    </text>
  </section>

  <!-- Section 3: Page Table -->
  <section data-narration="Page Table">
    <rect x="10" y="290" width="400" height="100" fill="#f0f0f0" rx="10" />
    <text x="20" y="310" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      The page table is a data structure that maps virtual page numbers to physical frame numbers.
    </text>
    <rect x="40" y="330" width="20" height="20" fill="#666666" rx="5" />
    <text x="40" y="350" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      <tspan x="60" y="350">Page Table</tspan>
    </text>
  </section>

  <!-- Section 4: Page Replacement Algorithms -->
  <section data-narration="Page Replacement Algorithms">
    <rect x="10" y="370" width="400" height="100" fill="#f0f0f0" rx="10" />
    <text x="20" y="390" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      Page replacement algorithms are used to determine which page to replace when the page fault occurs.
    </text>
    <text x="20" y="430" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      Two common algorithms are FIFO (First-In-First-Out) and LRU (Least Recently Used).
    </text>
  </section>

  <!-- Section 5: Benefits of Demand Paging -->
  <section data-narration="Benefits of Demand Paging">
    <rect x="10" y="460" width="400" height="100" fill="#f0f0f0" rx="10" />
    <text x="20" y="480" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      Demand paging offers several benefits, including improved memory utilization and reduced memory requirements.
    </text>
    <text x="20" y="520" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      It also reduces memory fragmentation and makes it easier to manage memory.
    </text>
  </section>

  <!-- Section 6: Conclusion -->
  <section data-narration="Conclusion">
    <rect x="10" y="550" width="400" height="100" fill="#f0f0f0" rx="10" />
    <text x="20" y="570" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
      Demand paging is an essential technique used in modern operating systems to manage virtual memory.
    </text>
  </section>

  <!-- Footer -->
  <text x="100" y="380" font-size="16" font-family="Arial" text-anchor="middle" fill="#666666">
    <tspan x="160" y="380">Animated by <a href="https://animationsbyram">Animations by Ram</a>
  </text>
</svg>