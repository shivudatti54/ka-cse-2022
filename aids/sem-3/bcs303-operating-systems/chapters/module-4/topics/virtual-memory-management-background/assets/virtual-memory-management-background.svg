<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="virtual-memory-management-background">
  <metadata>
    <title>Virtual Memory Management Background</title>
    <style>
      /* Add some basic styling to our SVG */
      body {
        font-family: Arial, sans-serif;
      }
      .section {
        margin-bottom: 20px;
      }
      .data-narration {
        font-size: 14px;
        font-family: Arial, sans-serif;
        color: #333;
      }
      .arrow {
        fill: #333;
        stroke: #ddd;
        stroke-width: 2;
      }
    </style>
  </metadata>
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2A8C8" stop-opacity="1" />
      <stop offset="100%" stop-color="#8B9467" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" />
  <!-- Title -->
  <text x="20" y="20" width="380" height="20" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" fill="#3498db">
    Virtual Memory Management Background
  </text>
  <!-- Section 1: What is Virtual Memory? -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="300" height="50" fill="#fff" rx="5" />
    <text x="10" y="10" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      What is Virtual Memory?
    </text>
    <g class="section">
      <rect x="0" y="20" width="300" height="30" fill="#fff" rx="5" />
      <data-narration x="10" y="25" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        Virtual memory is a combination of physical memory and secondary storage that provides a virtual address space to a program.
      </data-narration>
      <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="1" to="0.5" />
    </g>
  </g>
  <!-- Section 2: Types of Virtual Memory -->
  <g transform="translate(20, 130)">
    <rect x="0" y="0" width="300" height="50" fill="#fff" rx="5" />
    <text x="10" y="10" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Types of Virtual Memory
    </text>
    <g class="section">
      <rect x="0" y="20" width="300" height="30" fill="#fff" rx="5" />
      <data-narration x="10" y="25" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        Page-based virtual memory divides the virtual address space into fixed-size blocks called pages.
      </data-narration>
      <data-narration x="10" y="55" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        Segment-based virtual memory uses a segment-based address space, where each process is divided into segments.
      </data-narration>
      <animate attributeName="opacity" begin="1s" dur="1s" repeatCount="1" to="0.5" />
    </g>
  </g>
  <!-- Section 3: Page Table -->
  <g transform="translate(20, 230)">
    <rect x="0" y="0" width="300" height="50" fill="#fff" rx="5" />
    <text x="10" y="10" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Page Table
    </text>
    <g class="section">
      <rect x="0" y="20" width="300" height="30" fill="#fff" rx="5" />
      <data-narration x="10" y="25" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        A page table is a data structure used to map virtual addresses to physical addresses.
      </data-narration>
      <data-narration x="10" y="55" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        It is an array of page directories, each containing a pointer to the physical frame that holds a page.
      </data-narration>
      <animate attributeName="opacity" begin="2s" dur="1s" repeatCount="1" to="0.5" />
    </g>
  </g>
  <!-- Section 4: Page Replacement Algorithms -->
  <g transform="translate(20, 330)">
    <rect x="0" y="0" width="300" height="50" fill="#fff" rx="5" />
    <text x="10" y="10" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Page Replacement Algorithms
    </text>
    <g class="section">
      <rect x="0" y="20" width="300" height="30" fill="#fff" rx="5" />
      <data-narration x="10" y="25" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        Page replacement algorithms are used to select pages to be discarded when the system runs out of physical memory.
      </data-narration>
      <data-narration x="10" y="55" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        Common algorithms include FIFO, LRU, OPT, and FIFO+LRU.
      </data-narration>
      <animate attributeName="opacity" begin="3s" dur="1s" repeatCount="1" to="0.5" />
    </g>
  </g>
  <!-- Section 5: Key Concepts -->
  <g transform="translate(20, 430)">
    <rect x="0" y="0" width="300" height="50" fill="#fff" rx="5" />
    <text x="10" y="10" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
      Key Concepts
    </text>
    <g class="section">
      <rect x="0" y="20" width="300" height="30" fill="#fff" rx="5" />
      <data-narration x="10" y="25" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        Page faults occur when a process accesses a virtual address that is not present in physical memory.
      </data-narration>
      <data-narration x="10" y="55" width="280" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#333">
        Page replacement is the process of removing a page from physical memory to make room for a new page.
      </data-narration>
      <animate attributeName="opacity" begin="4s" dur="1s" repeatCount="1" to="0.5" />
    </g>
  </g>
  <!-- Footer -->
  <text x="20" y="380" width="380" height="20" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#333">
    Created with love for educational purposes
  </text>
</svg>