<svg width="420" height="400" data-topic-id="copy-on-write" xmlns="http://www.w3.org/2000/svg">
  <title>Copy-on-Write: A Technique for Efficient Data Sharing</title>
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A8BD6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8C9BFF" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect fill="url(#background-gradient)" width="420" height="80" y="0"/>

  <g transform="translate(10, 20)">
    <text text-anchor="start" x="10" y="30" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">Copy-on-Write</text>
  </g>

  <rect fill="#7A8BD6" width="400" height="200" y="80" rx="10"/>
  <g transform="translate(10, 100)">
    <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text data-narration="What is Copy-on-Write?" text-anchor="start" x="10" y="120" font-size="16" font-family="Arial, sans-serif" fill="#8C9BFF">What is Copy-on-Write?</text>
    <rect fill="#7A8BD6" width="400" height="20" y="180" rx="10"/>
  </g>

  <g transform="translate(10, 250)">
    <animate attributeName="opacity" begin="0.5s" dur="2s" repeatCount="indefinite"/>
    <text data-narration="How Copy-on-Write Works" text-anchor="start" x="10" y="270" font-size="16" font-family="Arial, sans-serif" fill="#8C9BFF">How Copy-on-Write Works</text>
    <rect fill="#7A8BD6" width="400" height="20" y="320" rx="10"/>
  </g>

  <g transform="translate(10, 350)">
    <animate attributeName="opacity" begin="1.5s" dur="2s" repeatCount="indefinite"/>
    <text data-narration="Benefits of Copy-on-Write" text-anchor="start" x="10" y="370" font-size="16" font-family="Arial, sans-serif" fill="#8C9BFF">Benefits of Copy-on-Write</text>
    <rect fill="#7A8BD6" width="400" height="20" y="420" rx="10"/>
  </g>

  <g transform="translate(10, 180)">
    <animate attributeName="opacity" begin="2.5s" dur="2s" repeatCount="indefinite"/>
    <text data-narration="Example Use Cases" text-anchor="start" x="10" y="210" font-size="16" font-family="Arial, sans-serif" fill="#8C9BFF">Example Use Cases</text>
    <rect fill="#7A8BD6" width="400" height="20" y="260" rx="10"/>
  </g>

  <g transform="translate(10, 260)">
    <animate attributeName="opacity" begin="3.5s" dur="2s" repeatCount="indefinite"/>
    <text data-narration="Reduced Memory Overhead" text-anchor="start" x="10" y="280" font-size="16" font-family="Arial, sans-serif" fill="#8C9BFF">Reduced Memory Overhead</text>
    <rect fill="#7A8BD6" width="400" height="20" y="330" rx="10"/>
  </g>

  <rect fill="#7A8BD6" width="420" height="40" y="380" rx="10"/>
  <g transform="translate(75, 450)">
    <text text-anchor="start" x="10" y="460" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">By using Copy-on-Write, you can efficiently share data among multiple processes, reducing memory overhead and improving performance.</text>
  </g>

  <rect fill="#7A8BD6" width="420" height="40" y="500" rx="10"/>
  <g transform="translate(75, 590)">
    <text text-anchor="start" x="10" y="600" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">This diagram illustrates the process of Copy-on-Write, demonstrating how data is copied and modified, resulting in improved performance and reduced memory overhead.</text>
  </g>

  <footer>
    <text text-anchor="start" x="10" y="620" font-size="16" font-family="Arial, sans-serif" fill="#8C9BFF">Copy-on-Write: A Technique for Efficient Data Sharing</text>
  </footer>
</svg>