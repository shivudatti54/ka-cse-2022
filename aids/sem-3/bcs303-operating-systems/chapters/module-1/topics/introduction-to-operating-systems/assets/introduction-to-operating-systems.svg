<svg width="420" height="400" data-topic-id="introduction-to-operating-systems">
  <defs>
    <!-- Gradient for background -->
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2A9FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8B9467" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.7"/>

  <!-- Title -->
  <text x="50" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
    Introduction to Operating Systems
  </text>

  <!-- Section 1: What is an Array? -->
  <section data-narration="What is an Array?">
    <rect x="50" y="60" width="320" height="40" fill="#F7F7F7" rx="5"/>
    <text x="70" y="70" font-size="16" font-family="Arial" text-anchor="middle" fill="#2F4F7F" data-topic-id="array-definition">
      An array is a fundamental data structure that stores a collection of elements of the same data type in contiguous memory locations.
    </text>
    <text x="70" y="90" font-size="16" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      Each element can be accessed directly using its index (position number).
    </text>
  </section>

  <!-- Section 2: Key Characteristics -->
  <section data-narration="Key Characteristics">
    <rect x="50" y="140" width="320" height="80" fill="#F7F7F7" rx="5"/>
    <text x="70" y="150" font-size="16" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      | Property              | Description                                      |
      | --------------------- | ------------------------------------------------ |
      | **Fixed Size**        | Size is determined at creation and cannot change |
      | **Homogeneous**       | All elements must be of the same data type       |
      | **Contiguous Memory** | Elements stored in adjacent memory locations     |
      | **Random Access**     | Any element accessible in O(1) time using index  |
      | **Zero-indexed**      | First element is at index 0 (in most languages)  |
    </text>
    <rect x="50" y="230" width="320" height="80" fill="#F7F7F7" rx="5"/>
    <text x="70" y="240" font-size="16" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      **Memory Representation**: When you declare an array of size `n`, the system allocates `n × size_of_element` bytes of contiguous memory.
    </text>
    <rect x="50" y="330" width="320" height="80" fill="#F7F7F7" rx="5"/>
    <text x="70" y="340" font-size="16" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      **Address Calculation Formula**: To find the address of element at index `i`:
      <tspan x="70" y="360">Address(arr[i]) = Base_Address + (i × Size_of_Element)</tspan>
    </text>
  </section>

  <!-- Section 3: Time Complexity of Array Operations -->
  <section data-narration="Time Complexity of Array Operations">
    <rect x="50" y="400" width="320" height="80" fill="#F7F7F7" rx="5"/>
    <text x="70" y="410" font-size="16" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
      | Operation               | Time Complexity | Explanation              |
      | ----------------------- | --------------- | ------------------------ |
      | **Access**              | O(1)            | Direct index calculation |
      | **Search (unsorted)**   | O(n)            | Must check each element
    </text>
  </section>

  <!-- Connections -->
  <line x1="50" y1="60" x2="320" y2="60" stroke="#2F4F7F" stroke-width="2" data-topic-id="array-connection"/>
  <line x1="50" y1="230" x2="320" y2="230" stroke="#2F4F7F" stroke-width="2" data-topic-id="memory-representation-connection"/>
  <line x1="50" y1="330" x2="320" y2="330" stroke="#2F4F7F" stroke-width="2" data-topic-id="address-calculation-connection"/>

  <!-- Footer -->
  <text x="50" y="410" font-size="16" font-family="Arial" text-anchor="middle" fill="#2F4F7F">
    &copy; 2024
  </text>
</svg>