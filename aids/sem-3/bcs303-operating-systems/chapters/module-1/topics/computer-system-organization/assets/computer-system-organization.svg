<svg width="420" height="400" data-topic-id="computer-system-organization">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5E1F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Section: Central Processing Unit (CPU) -->
  <section data-narration="The brain that executes instructions">
    <rect x="20" y="20" width="380" height="80" fill="#F7D2C4"/>
    <text x="50" y="30" font-size="24" font-family="Arial" fill="#2F4F7F">CPU</text>
    <rect x="50" y="60" width="300" height="20" fill="#E0FFFF"/>
    <text x="75" y="70" font-size="18" font-family="Arial" fill="#2F4F7F">Control Unit</text>
    <rect x="75" y="100" width="150" height="20" fill="#E0FFFF"/>
    <text x="105" y="110" font-size="18" font-family="Arial" fill="#2F4F7F">Arithmetic Logic Unit (ALU)</text>
    <rect x="75" y="140" width="150" height="20" fill="#E0FFFF"/>
    <text x="105" y="150" font-size="18" font-family="Arial" fill="#2F4F7F">Registers</text>
    <animate attribute="opacity" begin="0s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section: Main Memory (RAM) -->
  <section data-narration="Temporary storage for programs and data">
    <rect x="20" y="140" width="380" height="80" fill="#F7D2C4"/>
    <text x="50" y="150" font-size="24" font-family="Arial" fill="#2F4F7F">Main Memory (RAM)</text>
    <rect x="50" y="180" width="300" height="20" fill="#E0FFFF"/>
    <text x="75" y="190" font-size="18" font-family="Arial" fill="#2F4F7F">Program Storage</text>
    <rect x="75" y="220" width="150" height="20" fill="#E0FFFF"/>
    <text x="105" y="230" font-size="18" font-family="Arial" fill="#2F4F7F">Data Storage</text>
    <animate attribute="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section: Input/Output (I/O) Devices -->
  <section data-narration="Components that communicate with the external world">
    <rect x="20" y="260" width="380" height="80" fill="#F7D2C4"/>
    <text x="50" y="270" font-size="24" font-family="Arial" fill="#2F4F7F">I/O Devices</text>
    <rect x="50" y="300" width="300" height="20" fill="#E0FFFF"/>
    <text x="75" y="310" font-size="18" font-family="Arial" fill="#2F4F7F">Keyboard</text>
    <rect x="75" y="340" width="150" height="20" fill="#E0FFFF"/>
    <text x="105" y="350" font-size="18" font-family="Arial" fill="#2F4F7F">Monitor</text>
    <rect x="75" y="380" width="150" height="20" fill="#E0FFFF"/>
    <text x="105" y="390" font-size="18" font-family="Arial" fill="#2F4F7F">Speakers</text>
    <animate attribute="opacity" begin="4s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Section: System Bus -->
  <section data-narration="The communication pathway connecting all components">
    <rect x="20" y="410" width="380" height="80" fill="#F7D2C4"/>
    <text x="50" y="420" font-size="24" font-family="Arial" fill="#2F4F7F">System Bus</text>
    <rect x="50" y="450" width="300" height="20" fill="#E0FFFF"/>
    <text x="75" y="460" font-size="18" font-family="Arial" fill="#2F4F7F">Controller</text>
    <rect x="50" y="490" width="300" height="20" fill="#E0FFFF"/>
    <text x="75" y="500" font-size="18" font-family="Arial" fill="#2F4F7F">Device Control</text>
    <animate attribute="opacity" begin="6s" dur="2s" repeatCount="indefinite"/>
  </section>
  
  <!-- Footer -->
  <rect x="0" y="430" width="420" height="20" fill="#E0FFFF"/>
  <text x="10" y="440" font-size="18" font-family="Arial" fill="#2F4F7F">Computer System Organization</text>
</svg>