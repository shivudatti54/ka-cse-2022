<svg width="420" height="400" data-topic-id="distributed-systems" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Section 1: Definition -->
  <g transform="translate(10, 50)">
    <rect width="300" height="50" fill="#E5E5EA" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#333">Definition</text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 50" to="360 300 50" dur="2000"/>
  </g>

  <!-- Section 2: Key Characteristics -->
  <g transform="translate(10, 120)">
    <rect width="300" height="50" fill="#E5E5EA" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#333">Key Characteristics</text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 120" to="360 300 120" dur="2000"/>
  </g>

  <g transform="translate(10, 200)">
    <rect width="300" height="50" fill="#E5E5EA" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#333">Common Goal</text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 200" to="360 300 200" dur="2000"/>
  </g>

  <g transform="translate(10, 280)">
    <rect width="300" height="50" fill="#E5E5EA" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#333">Message Passing</text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 280" to="360 300 280" dur="2000"/>
  </g>

  <!-- Section 3: Why Distributed Systems? -->
  <g transform="translate(10, 360)">
    <rect width="300" height="50" fill="#E5E5EA" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#333">Why Distributed Systems?</text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 360" to="360 300 360" dur="2000"/>
  </g>

  <!-- Section 4: Centralized vs Distributed Systems -->
  <g transform="translate(10, 430)">
    <rect width="300" height="50" fill="#E5E5EA" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#333">Centralized vs Distributed Systems</text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 430" to="360 300 430" dur="2000"/>
  </g>

  <!-- Section 5: Examples of Distributed Systems -->
  <g transform="translate(10, 500)">
    <rect width="300" height="50" fill="#E5E5EA" rx="10"/>
    <text x="10" y="20" font-size="18" font-family="Arial" fill="#333">Examples of Distributed Systems</text>
    <animateTransform attributeName="transform" type="rotate" from="0 300 500" to="360 300 500" dur="2000"/>
  </g>

  <!-- Footer -->
  <text x="10" y="390" font-size="18" font-family="Arial" fill="#333">Distributed Systems</text>
</svg>