<svg width="420" height="400" data-topic-id="Operating-System-Structure" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>Operating System Structure</title>
    <rect x="0" y="0" width="420" height="400" fill="#ADD8E6"/>
    <rect x="0" y="0" width="420" height="50" fill="#6495ED"/>
    <text x="10" y="20" font-size="24" font-family="Arial" fill="#4682B4">Operating System Structure</text>
    <rect x="0" y="60" width="420" height="50" fill="#C6E2B5"/>
    <g transform="translate(0, 150)">
        <section data-narration="Hardware is the physical part of the computer that can be seen and touched." fill="#F7DC6F" stroke="#228B22" stroke-width="2">
            <rect x="10" y="10" width="100" height="30" fill="#FFF599"/>
            <text x="10" y="20" font-size="18" font-family="Arial" fill="#228B22">Hardware</text>
            <rect x="120" y="10" width="100" height="30" fill="#FFF599"/>
            <text x="120" y="20" font-size="18" font-family="Arial" fill="#228B22">Firmware</text>
            <rect x="230" y="10" width="100" height="30" fill="#FFF599"/>
            <text x="230" y="20" font-size="18" font-family="Arial" fill="#228B22">Software</text>
        </section>
        <section data-narration="The operating system is divided into several layers, each with its own specific functions." fill="#C6E2B5" stroke="#4682B4" stroke-width="2">
            <rect x="10" y="10" width="300" height="30" fill="#FFF599"/>
            <text x="10" y="20" font-size="18" font-family="Arial" fill="#4682B4">Physical Layer</text>
            <g transform="translate(50, 40)">
                <rect x="10" y="10" width="20" height="10" fill="#FFF599"/>
                <text x="10" y="20" font-size="14" font-family="Arial" fill="#228B22">Device Driver</text>
                <rect x="40" y="10" width="20" height="10" fill="#FFF599"/>
                <text x="40" y="20" font-size="14" font-family="Arial" fill="#228B22">I/O Manager</text>
            </g>
            <g transform="translate(50, 80)">
                <rect x="10" y="10" width="20" height="10" fill="#FFF599"/>
                <text x="10" y="20" font-size="14" font-family="Arial" fill="#228B22">Process Manager</text>
                <rect x="40" y="10" width="20" height="10" fill="#FFF599"/>
                <text x="40" y="20" font-size="14" font-family="Arial" fill="#228B22">Memory Manager</text>
            </g>
        </section>
        <section data-narration="The operating system is divided into several layers, each with its own specific functions." fill="#C6E2B5" stroke="#4682B4" stroke-width="2">
            <rect x="10" y="10" width="300" height="30" fill="#FFF599"/>
            <text x="10" y="20" font-size="18" font-family="Arial" fill="#4682B4">Logical Layer</text>
            <g transform="translate(50, 40)">
                <rect x="10" y="10" width="20" height="10" fill="#FFF599"/>
                <text x="10" y="20" font-size="14" font-family="Arial" fill="#228B22">Security Manager</text>
                <rect x="40" y="10" width="20" height="10" fill="#FFF599"/>
                <text x="40" y="20" font-size="14" font-family="Arial" fill="#228B22">File System Manager</text>
            </g>
            <g transform="translate(50, 80)">
                <rect x="10" y="10" width="20" height="10" fill="#FFF599"/>
                <text x="10" y="20" font-size="14" font-family="Arial" fill="#228B22">User Interface Manager</text>
                <rect x="40" y="10" width="20" height="10" fill="#FFF599"/>
                <text x="40" y="20" font-size="14" font-family="Arial" fill="#228B22">System Manager</text>
            </g>
        </section>
        <section data-narration="The Interface Layer provides a interface for application software to interact with the operating system." fill="#F7DC6F" stroke="#4682B4" stroke-width="2">
            <rect x="10" y="10" width="300" height="30" fill="#FFF599"/>
            <text x="10" y="20" font-size="18" font-family="Arial" fill="#4682B4">Interface Layer</text>
            <rect x="120" y="10" width="100" height="30" fill="#FFF599"/>
            <text x="120" y="20" font-size="14" font-family="Arial" fill="#228B22">Application Programming Interface (API)</text>
            <rect x="230" y="10" width="100" height="30" fill="#FFF599"/>
            <text x="230" y="20" font-size="14" font-family="Arial" fill="#228B22">System Call Interface</text>
        </section>
    </g>
    <g transform="translate(0, 380)">
        <rect x="10" y="10" width="400" height="30" fill="#6495ED"/>
        <text x="10" y="20" font-size="24" font-family="Arial" fill="#4682B4">Key Concepts</text>
    </g>
    <g transform="translate(0, 400)">
        <rect x="10" y="30" width="300" height="30" fill="#FFF599"/>
        <text x="10" y="40" font-size="14" font-family="Arial" fill="#228B22">Monolithic OS</text>
        <rect x="320" y="30" width="80" height="30" fill="#FFF599"/>
        <text x="320" y="40" font-size="14" font-family="Arial" fill="#228B22">Microkernel OS</text>
    </g>
    <rect x="0" y="400" width="420" height="10" fill="#4682B4"/>
    <text x="10" y="410" font-size="18" font-family="Arial" fill="#4682B4">C exceeded maximum allowed characters</text>
</svg>