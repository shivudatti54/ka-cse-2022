<svg width="420" height="400" data-topic-id="memory-management">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CDA1" stop-opacity="1"/>
      <stop offset="100%" stop-color="#376FFA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <body>
    <!-- Title -->
    <rect x="10" y="10" width="400" height="20" fill="url(#gradient)" rx="5"/>
    <text x="20" y="35" font-size="24" font-family="Arial" fill="#2F4F7F">Key Management</text>
    <!-- Section 1: Generation -->
    <rect x="10" y="70" width="400" height="80" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="0s"/>
    <text x="20" y="95" font-size="18" font-family="Arial" fill="#666" data-narration="Generation: Use cryptographically secure random number generators, adequate key length (AES-256, RSA-2048+), and Hardware Security Modules (HSM) for high-security keys." transform="translate(50 150) rotate(0) skewX(0)"/>
    <rect x="150" y="80" width="120" height="40" fill="#66CDA1" rx="5"/>
    <text x="170" y="115" font-size="18" font-family="Arial" fill="#2F4F7F">Cryptographically secure random number generators</text>
    <!-- Section 2: Storage -->
    <rect x="10" y="240" width="400" height="80" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="1s"/>
    <text x="20" y="265" font-size="18" font-family="Arial" fill="#666" data-narration="Storage: Never store keys with encrypted data, use dedicated key management services, and HSM-backed storage for sensitive keys." transform="translate(50 220) rotate(0) skewX(0)"/>
    <rect x="150" y="70" width="120" height="40" fill="#66CDA1" rx="5"/>
    <text x="170" y="95" font-size="18" font-family="Arial" fill="#2F4F7F">Dedicated key management services</text>
    <!-- Section 3: Distribution -->
    <rect x="10" y="420" width="400" height="80" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="2s"/>
    <text x="20" y="445" font-size="18" font-family="Arial" fill="#666" data-narration="Distribution: Encrypt keys in transit, minimum exposure principle, and secure key exchange protocols." transform="translate(50 400) rotate(0) skewX(0)"/>
    <rect x="150" y="70" width="120" height="40" fill="#66CDA1" rx="5"/>
    <text x="170" y="95" font-size="18" font-family="Arial" fill="#2F4F7F">Secure key exchange protocols</text>
    <!-- Section 4: Rotation -->
    <rect x="10" y="590" width="400" height="80" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="3s"/>
    <text x="20" y="615" font-size="18" font-family="Arial" fill="#666" data-narration="Rotation: Regular automatic rotation, rotate on suspected compromise, and maintain backward compatibility during rotation." transform="translate(50 560) rotate(0) skewX(0)"/>
    <rect x="150" y="70" width="120" height="40" fill="#66CDA1" rx="5"/>
    <text x="170" y="95" font-size="18" font-family="Arial" fill="#2F4F7F">Regular automatic rotation</text>
    <!-- Section 5: Destruction -->
    <rect x="10" y="770" width="400" height="80" fill="#F7F7F7" rx="5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" begin="4s"/>
    <text x="20" y="795" font-size="18" font-family="Arial" fill="#666" data-narration="Destruction: Cryptographic erasure, secure deletion procedures, and documented destruction process." transform="translate(50 720) rotate(0) skewX(0)"/>
    <rect x="150" y="70" width="120" height="40" fill="#66CDA1" rx="5"/>
    <text x="170" y="95" font-size="18" font-family="Arial" fill="#2F4F7F">Cryptographic erasure</text>
    <!-- Arrow markers for connections -->
    <path d="M 100 150 L 220 150" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 100 220 L 220 220" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 100 290 L 220 290" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Footer -->
    <rect x="10" y="1000" width="400" height="20" fill="#2F4F7F" rx="5"/>
    <text x="20" y="1015" font-size="18" font-family="Arial" fill="#FFFFFF">Educational diagram: Memory Management</text>
  </body>
</svg>