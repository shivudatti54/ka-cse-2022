<svg width="420" height="400" data-topic-id="process-management">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title -->
  <g transform="translate(10, 20)">
    <text x="0" y="0" text-anchor="start" font-size="24" font-family="Arial, sans-serif" fill="#3498db" opacity="0.9">Process Management</text>
  </g>
  
  <!-- Section 1: User Authentication -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="100" fill="#f9f9f9" rx="10" />
    <animate transform="translateX(50)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="0" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" data-narration="User Authentication is a critical component of web application security that maintains state and user identity across multiple HTTP requests.">
      <tspan x="0" dy="1.2em">Maintains state and user identity</tspan>
      <tspan x="0" dy="1.2em">Across multiple HTTP requests</tspan>
    </text>
    <line x1="20" y1="50" x2="380" y2="50" stroke="#2ecc71" stroke-width="2" fill="none" data-narration="User Authentication Flow">
      <animateTransform begin="0s" dur="2s" transform="rotate(45)" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Section 2: Session Creation -->
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="400" height="100" fill="#f9f9f9" rx="10" />
    <animate transform="translateX(50)" begin="2s" dur="2s" repeatCount="indefinite" />
    <text x="0" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" data-narration="When a user successfully authenticates, the application creates a session - a period during which the user can access protected resources without re-authenticating.">
      <tspan x="0" dy="1.2em">Creates a session</tspan>
      <tspan x="0" dy="1.2em">Without re-authenticating</tspan>
    </text>
    <line x1="20" y1="50" x2="380" y2="50" stroke="#2ecc71" stroke-width="2" fill="none" data-narration="Session Creation Flow">
      <animateTransform begin="2s" dur="2s" transform="rotate(45)" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Section 3: Session ID Generation -->
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="400" height="100" fill="#f9f9f9" rx="10" />
    <animate transform="translateX(50)" begin="4s" dur="2s" repeatCount="indefinite" />
    <text x="0" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" data-narration="The server generates a unique session identifier (session ID) that is stored on the client side (typically in a cookie) and sent with each subsequent request to identify the user.">
      <tspan x="0" dy="1.2em">Generates a unique session ID</tspan>
      <tspan x="0" dy="1.2em">Stored on the client side</tspan>
    </text>
    <line x1="20" y1="50" x2="380" y2="50" stroke="#2ecc71" stroke-width="2" fill="none" data-narration="Session ID Generation Flow">
      <animateTransform begin="4s" dur="2s" transform="rotate(45)" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Section 4: Session Validation -->
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="100" fill="#f9f9f9" rx="10" />
    <animate transform="translateX(50)" begin="6s" dur="2s" repeatCount="indefinite" />
    <text x="0" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" data-narration="The server validates the session ID on each subsequent request to ensure the user is still valid and has not been compromised.">
      <tspan x="0" dy="1.2em">Validates the session ID</tspan>
      <tspan x="0" dy="1.2em">On each subsequent request</tspan>
    </text>
    <line x1="20" y1="50" x2="380" y2="50" stroke="#2ecc71" stroke-width="2" fill="none" data-narration="Session Validation Flow">
      <animateTransform begin="6s" dur="2s" transform="rotate(45)" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Section 5: Session Store -->
  <g transform="translate(10, 450)">
    <rect x="0" y="0" width="400" height="100" fill="#f9f9f9" rx="10" />
    <animate transform="translateX(50)" begin="8s" dur="2s" repeatCount="indefinite" />
    <text x="0" y="20" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#2ecc71" data-narration="The session store is typically a database or memory-based storage system that stores the session data.">
      <tspan x="0" dy="1.2em">Stores session data</tspan>
      <tspan x="0" dy="1.2em">Typically a database or memory-based storage system</tspan>
    </text>
    <line x1="20" y1="50" x2="380" y2="50" stroke="#2ecc71" stroke-width="2" fill="none" data-narration="Session Store Flow">
      <animateTransform begin="8s" dur="2s" transform="rotate(45)" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 550)">
    <text x="0" y="550" text-anchor="start" font-size="18" font-family="Arial, sans-serif" fill="#3498db" data-topic-id="process-management">Process Management</text>
  </g>
</svg>