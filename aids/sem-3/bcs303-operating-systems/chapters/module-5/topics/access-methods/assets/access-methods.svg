<svg width="420" height="400" data-topic-id="access-methods" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A8F5" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="380" height="360" fill="url(#pastel-gradient)"/>

  <g transform="translate(20, 20)">
    <text x="0" y="10" font-size="24" font-family="Arial" fill="#2E4053">Access Methods</text>
  </g>

  <g transform="translate(20, 60)">
    <text x="0" y="10" font-size="18" font-family="Arial" fill="#2E4053" data-narration="This diagram illustrates the different methods used to access information and resources."/>
  </g>

  <g transform="translate(20, 100)">
    <rect x="0" y="0" width="100" height="20" fill="#1A1D23" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#E0E0E0" data-narration="Remote access" />
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(130, 100)">
    <rect x="0" y="0" width="100" height="20" fill="#1A1D23" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#E0E0E0" data-narration="Voice and video calls" />
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(260, 100)">
    <rect x="0" y="0" width="100" height="20" fill="#1A1D23" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#E0E0E0" data-narration="In-person access" />
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 240)">
    <rect x="0" y="0" width="100" height="20" fill="#1A1D23" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#E0E0E0" data-narration="Mobile devices" />
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(260, 240)">
    <rect x="0" y="0" width="100" height="20" fill="#1A1D23" rx="5"/>
    <text x="10" y="10" font-size="16" font-family="Arial" fill="#E0E0E0" data-narration="Virtual private networks (VPNs)" />
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translateX" from="0" to="100" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 300)">
    <text x="0" y="10" font-size="18" font-family="Arial" fill="#2E4053" data-narration="This diagram illustrates how different access methods can be used to access information and resources."/>
  </g>

  <g transform="translate(20, 350)">
    <text x="0" y="10" font-size="18" font-family="Arial" fill="#2E4053" data-narration="By understanding the different access methods used by users, designers can create products that are accessible and usable by everyone."/>
  </g>

</svg>