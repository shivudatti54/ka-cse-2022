<svg width="420" height="400" data-topic-id="file-system-structure" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)"/>
  
  <!-- Title Section -->
  <g transform="translate(20, 20)">
    <text x="0" y="0" text-anchor="start" font-size="24" font-family="Arial" font-weight="bold">File System Structure</text>
  </g>
  
  <!-- Root Directory Section -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="300" height="100" fill="#F7F7F7" rx="10" stroke="#343A40" stroke-width="2"/>
    <text x="10" y="25" text-anchor="start" font-size="18" font-family="Arial" font-weight="bold">Root Directory</text>
    <text x="10" y="50" text-anchor="start" font-size="14" font-family="Arial" font-weight="normal">Topmost directory in the file system hierarchy</text>
  </g>
  
  <!-- Directory Section -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="300" height="100" fill="#F7F7F7" rx="10" stroke="#343A40" stroke-width="2"/>
    <text x="10" y="25" text-anchor="start" font-size="18" font-family="Arial" font-weight="bold">Directories</text>
    <text x="10" y="50" text-anchor="start" font-size="14" font-family="Arial" font-weight="normal">Containers that hold files and subdirectories</text>
    <text x="10" y="75" text-anchor="start" font-size="14" font-family="Arial" font-weight="normal">Named using a hierarchical structure</text>
  </g>
  
  <!-- File Section -->
  <g transform="translate(50, 330)">
    <rect x="0" y="0" width="300" height="100" fill="#F7F7F7" rx="10" stroke="#343A40" stroke-width="2"/>
    <text x="10" y="25" text-anchor="start" font-size="18" font-family="Arial" font-weight="bold">Files</text>
    <text x="10" y="50" text-anchor="start" font-size="14" font-family="Arial" font-weight="normal">Basic units of storage in a file system</text>
    <text x="10" y="75" text-anchor="start" font-size="14" font-family="Arial" font-weight="normal">Stored on disk and can be accessed by the operating system and applications</text>
  </g>
  
  <!-- File Inheritance Section -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="300" height="100" fill="#F7F7F7" rx="10" stroke="#343A40" stroke-width="2"/>
    <text x="10" y="25" text-anchor="start" font-size="18" font-family="Arial" font-weight="bold">File Inheritance</text>
    <text x="10" y="50" text-anchor="start" font-size="14" font-family="Arial" font-weight="normal">Feature that allows a directory to inherit the permissions of its parent directory</text>
  </g>
  
  <!-- Connections with arrow markers -->
  <path fill="none" stroke="#343A40" stroke-width="2" d="M 10 25 L 130 25"/>
  <path fill="none" stroke="#343A40" stroke-width="2" d="M 10 75 L 130 75"/>
  <path fill="none" stroke="#343A40" stroke-width="2" d="M 10 125 L 130 125"/>
  <path fill="none" stroke="#343A40" stroke-width="2" d="M 10 175 L 130 175"/>
  
  <!-- Footer Section -->
  <g transform="translate(20, 360)">
    <text x="0" y="0" text-anchor="start" font-size="18" font-family="Arial" font-weight="bold">Developed by [Your Name]</text>
  </g>
</svg>