<svg width="420" height="400" data-topic-id="file-system-mounting">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ACC2FF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title>File System Mounting</title>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="200" height="50" fill="#3498db" rx="10"/>
    <text x="10" y="15" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="start">File System Structure</text>
    <rect x="10" y="60" width="200" height="150" fill="#f1c40f" rx="10"/>
    <animate transform="translate(10, 70)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="80" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="File system is typically organized into multiple layers: Logical File System, File Organization, Basic File System, I/O Control, and Physical Devices." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="80" style="opacity:1;">Logical File System (File operations, directory management)</text>
    <rect x="10" y="230" width="200" height="50" fill="#e74c3c" rx="10"/>
    <animate transform="translate(10, 240)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="255" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="File Organization (Logical blocks, protection) manages file operations and protects data." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="255" style="opacity:1;">File Organization (Logical blocks, protection)</text>
    <rect x="10" y="305" width="200" height="50" fill="#2ecc71" rx="10"/>
    <animate transform="translate(10, 315)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="330" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="Basic File System (Block I/O, buffering) manages block I/O and buffering." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="330" style="opacity:1;">Basic File System (Block I/O, buffering)</text>
    <rect x="10" y="380" width="200" height="50" fill="#e67e73" rx="10"/>
    <animate transform="translate(10, 390)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="405" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="I/O Control (Device drivers, interrupts) manages device drivers and interrupts." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="405" style="opacity:1;">I/O Control (Device drivers, interrupts)</text>
    <rect x="10" y="465" width="200" height="50" fill="#2ecc71" rx="10"/>
    <animate transform="translate(10, 475)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="490" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="Physical Devices (Disks, SSDs, storage media) provides storage for files." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="490" style="opacity:1;">Physical Devices (Disks, SSDs, storage media)</text>
    <rect x="10" y="550" width="200" height="50" fill="#e74c3c" rx="10"/>
    <animate transform="translate(10, 560)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="575" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="File allocation methods include contiguous allocation, linked allocation, and bit allocation." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="575" style="opacity:1;">File Allocation Methods</text>
    <rect x="10" y="625" width="200" height="50" fill="#2ecc71" rx="10"/>
    <animate transform="translate(10, 625)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="640" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="Contiguous allocation allocates files contiguously on the disk." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="640" style="opacity:1;">Contiguous Allocation</text>
    <rect x="10" y="690" width="200" height="50" fill="#e67e73" rx="10"/>
    <animate transform="translate(10, 690)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="705" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="Linked allocation allocates files in linked blocks." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="705" style="opacity:1;">Linked Allocation</text>
    <rect x="10" y="755" width="200" height="50" fill="#2ecc71" rx="10"/>
    <animate transform="translate(10, 755)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="770" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="Bit allocation allocates files in bits." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="770" style="opacity:1;">Bit Allocation</text>
    <rect x="10" y="820" width="200" height="50" fill="#e74c3c" rx="10"/>
    <animate transform="translate(10, 820)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="835" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="Free space management is used to track available space on the disk." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="835" style="opacity:1;">Free Space Management</text>
    <rect x="10" y="885" width="200" height="50" fill="#2ecc71" rx="10"/>
    <animate transform="translate(10, 885)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="900" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="Directory implementation is used to organize files and subdirectories." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="900" style="opacity:1;">Directory Implementation</text>
    <rect x="10" y="950" width="200" height="50" fill="#e67e73" rx="10"/>
    <animate transform="translate(10, 950)" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="10" y="965" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="start" data-narration="Efficiency and performance techniques include caching, buffering, and optimization of file operations." style="opacity:0; animation: fade-in 2s;"/>
    <text x="10" y="965" style="opacity:1;">Efficiency and Performance</text>
  </g>
  <footer>File System Mounting</footer>
</svg>