<svg width="420" height="400" data-topic-id="file-system-analysis-ntfs-fat-ext4" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" text-anchor="middle" color="#2E4053">
    File System Analysis
  </text>

  <!-- Section 1: Volume -->
  <section id="section-1">
    <rect x="0" y="50" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="360 210 50" dur="10s" repeatCount="indefinite"/>
    <text x="10" y="25" font-size="16" font-family="Arial" text-anchor="start" color="#2E4053" data-narration="A logical storage unit, often a partition, formatted with a specific file system.">
      Volume
    </text>
    <line x1="210" y1="55" x2="210" y2="65" stroke="#2E4053" stroke-width="2"/>
    <text x="210" y="60" font-size="14" font-family="Arial" text-anchor="middle" color="#2E4053" data-narration="A contiguous block of space on a physical disk. A disk can have multiple partitions, each with a different file system.">
      Partition
    </text>
  </section>

  <!-- Section 2: Boot Sector -->
  <section id="section-2">
    <rect x="0" y="120" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 120" to="360 210 120" dur="10s" repeatCount="indefinite"/>
    <text x="10" y="25" font-size="16" font-family="Arial" text-anchor="start" color="#2E4053" data-narration="The first sector of a volume, containing essential code for booting and information about the file system layout.">
      Boot Sector
    </text>
    <line x1="210" y1="130" x2="210" y2="140" stroke="#2E4053" stroke-width="2"/>
    <text x="210" y="135" font-size="14" font-family="Arial" text-anchor="middle" color="#2E4053" data-narration="Contains essential code for booting and information about the file system layout.">
      Essential Code
    </text>
  </section>

  <!-- Section 3: Clusters/Blocks -->
  <section id="section-3">
    <rect x="0" y="190" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 190" to="360 210 190" dur="10s" repeatCount="indefinite"/>
    <text x="10" y="25" font-size="16" font-family="Arial" text-anchor="start" color="#2E4053" data-narration="The fundamental unit of disk space allocation for files and directories. A cluster (FAT/NTFS) or block (ext4) consists of one or more contiguous sectors.">
      Clusters/Blocks
    </text>
    <line x1="210" y1="200" x2="210" y2="210" stroke="#2E4053" stroke-width="2"/>
    <text x="210" y="205" font-size="14" font-family="Arial" text-anchor="middle" color="#2E4053" data-narration="A cluster (FAT/NTFS) or block (ext4) consists of one or more contiguous sectors.">
      Contiguous Sectors
    </text>
  </section>

  <!-- Section 4: Metadata -->
  <section id="section-4">
    <rect x="0" y="260" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 260" to="360 210 260" dur="10s" repeatCount="indefinite"/>
    <text x="10" y="25" font-size="16" font-family="Arial" text-anchor="start" color="#2E4053" data-narration="Data about data. This includes file names, sizes, timestamps (Created, Modified, Accessed, Entry Modified), and permissions.">
      Metadata
    </text>
    <line x1="210" y1="270" x2="210" y2="280" stroke="#2E4053" stroke-width="2"/>
    <text x="210" y="275" font-size="14" font-family="Arial" text-anchor="middle" color="#2E4053" data-narration="File names, sizes, timestamps, and permissions.">
      File Properties
    </text>
  </section>

  <!-- Section 5: Slack Space -->
  <section id="section-5">
    <rect x="0" y="320" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 320" to="360 210 320" dur="10s" repeatCount="indefinite"/>
    <text x="10" y="25" font-size="16" font-family="Arial" text-anchor="start" color="#2E4053" data-narration="The unused space between the end of a file and the end of the last cluster allocated to that file. This space can contain data from previously deleted files.">
      Slack Space
    </text>
    <line x1="210" y1="330" x2="210" y2="340" stroke="#2E4053" stroke-width="2"/>
    <text x="210" y="335" font-size="14" font-family="Arial" text-anchor="middle" color="#2E4053" data-narration="Unused space between file and last cluster.">
      Unused Space
    </text>
  </section>

  <!-- Section 6: Unallocated Space -->
  <section id="section-6">
    <rect x="0" y="370" width="420" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 370" to="360 210 370" dur="10s" repeatCount="indefinite"/>
    <text x="10" y="25" font-size="16" font-family="Arial" text-anchor="start" color="#2E4053" data-narration="Clusters/blocks on the disk that are not currently allocated to any live file. This space contains the contents of deleted files until they are overwritten.">
      Unallocated Space
    </text>
    <line x1="210" y1="380" x2="210" y2="390" stroke="#2E4053" stroke-width="2"/>
    <text x="210" y="385" font-size="14" font-family="Arial" text-anchor="middle" color="#2E4053" data-narration="Contains deleted file data until overwritten.">
      Deleted File Data
    </text>
  </section>

  <!-- Footer -->
  <text x="50%" y="380" font-size="18" font-family="Arial" text-anchor="middle" color="#2E4053">
    Powered by Digital Forensics
  </text>
</svg>