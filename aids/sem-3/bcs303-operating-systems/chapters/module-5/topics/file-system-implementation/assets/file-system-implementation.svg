<svg width="420" height="400" data-topic-id="file-system-implementation" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" x="0" y="0" width="420" height="400"/>
  
  <!-- File System Structure Section -->
  <section data-narration="File System Structure">
    <rect x="20" y="20" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="50" y="50" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">File System Structure</text>
    <g transform="rotate(-45 30 30)">
      <path d="M 5 5 L 15 15 L 25 5" fill="#3498DB"/>
      <path d="M 5 15 L 15 25 L 25 15" fill="#2EC4B0"/>
      <path d="M 5 25 L 15 35 L 25 25" fill="#E74C3C"/>
    </g>
  </section>
  
  <!-- Allocation Methods Section -->
  <section data-narration="File Allocation Methods">
    <rect x="20" y="170" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="50" y="190" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">File Allocation Methods</text>
    <g transform="rotate(-45 30 30)">
      <path d="M 5 5 L 15 15 L 25 5" fill="#3498DB"/>
      <path d="M 5 15 L 15 25 L 25 15" fill="#2EC4B0"/>
      <path d="M 5 25 L 15 35 L 25 25" fill="#E74C3C"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="180 30 30" dur="2000" begin="0s" delay="2000s"/>
  </section>
  
  <!-- Free Space Management Section -->
  <section data-narration="Free Space Management">
    <rect x="20" y="320" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="50" y="340" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Free Space Management</text>
    <g transform="rotate(-45 30 30)">
      <path d="M 5 5 L 15 15 L 25 5" fill="#3498DB"/>
      <path d="M 5 15 L 15 25 L 25 15" fill="#2EC4B0"/>
      <path d="M 5 25 L 15 35 L 25 25" fill="#E74C3C"/>
    </g>
  </section>
  
  <!-- Directory Implementation Section -->
  <section data-narration="Directory Implementation">
    <rect x="20" y="470" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="50" y="490" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Directory Implementation</text>
    <g transform="rotate(-45 30 30)">
      <path d="M 5 5 L 15 15 L 25 5" fill="#3498DB"/>
      <path d="M 5 15 L 15 25 L 25 15" fill="#2EC4B0"/>
      <path d="M 5 25 L 15 35 L 25 25" fill="#E74C3C"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="180 30 30" dur="2000" begin="2000s" delay="2000s"/>
  </section>
  
  <!-- Efficiency and Performance Section -->
  <section data-narration="Efficiency and Performance">
    <rect x="20" y="630" width="380" height="150" fill="#F7F7F7" rx="10"/>
    <text x="50" y="650" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Efficiency and Performance</text>
    <g transform="rotate(-45 30 30)">
      <path d="M 5 5 L 15 15 L 25 5" fill="#3498DB"/>
      <path d="M 5 15 L 15 25 L 25 15" fill="#2EC4B0"/>
      <path d="M 5 25 L 15 35 L 25 25" fill="#E74C3C"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="180 30 30" dur="2000" begin="3000s" delay="3000s"/>
  </section>
  
  <!-- Title and Footer -->
  <text x="50" y="20" font-size="36" font-family="Arial, sans-serif" text-anchor="middle">File System Implementation</text>
  <text x="50" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Visualizing the Basics</text>
</svg>