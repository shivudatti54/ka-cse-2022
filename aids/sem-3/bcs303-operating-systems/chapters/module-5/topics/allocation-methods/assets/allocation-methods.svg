<svg width="420" height="400" data-topic-id="allocation-methods" viewBox="0 0 420 400"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     style="background-color: #C5E1F5; background-image: linear-gradient(to bottom, #C5E1F5, #87CEEB);">
  <title>Allocation Methods</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" x="10" y="10" width="400" height="380" rx="10"/>

  <g transform="translate(20, 20)">
    <rect width="100%" height="50" rx="10" fill="#F7DC6F"/>
    <g transform="translate(10, 10)">
      <text x="50%" y="50%" text-anchor="middle" font-size="24" fill="#2E4053">Allocation Methods</text>
    </g>
  </g>

  <g transform="translate(20, 100)">
    <section data-narration="Contiguous Allocation">
      <rect width="100%" height="50" rx="10" fill="#F7DC6F"/>
      <g transform="translate(10, 10)">
        <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#2E4053">Contiguous Allocation</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="0s" dur="2s"/>
        <rect x="10" y="60" width="80" height="30" rx="10" fill="#87CEEB" opacity="0" animate="opacity 2s"/>
        <g>
          <path d="M 10 90 L 90 90" stroke="#2E4053" stroke-width="2" fill="none"/>
          <path d="M 90 90 L 90 120" stroke="#2E4053" stroke-width="2" fill="none"/>
          <text x="10%" y="100%" text-anchor="middle" font-size="16" fill="#2E4053">Each file occupies contiguous blocks on disk.</text>
        </g>
        <text x="50%" y="120%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan>Advantages:</tspan>
          <tspan> Simple implementation</tspan>
          <tspan> Excellent read performance (sequential access)</tspan>
          <tspan> Supports direct access</tspan>
        </text>
        <text x="50%" y="140%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan> Disadvantages:</tspan>
          <tspan> External fragmentation</tspan>
          <tspan> File size must be known at creation</tspan>
          <tspan> Difficult to grow files</tspan>
        </text>
      </g>
    </section>

    <section data-narration="Linked Allocation">
      <rect width="100%" height="50" rx="10" fill="#F7DC6F"/>
      <g transform="translate(10, 10)">
        <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#2E4053">Linked Allocation</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="2s" dur="2s"/>
        <rect x="10" y="60" width="80" height="30" rx="10" fill="#87CEEB" opacity="0" animate="opacity 2s"/>
        <g>
          <path d="M 10 90 L 90 90" stroke="#2E4053" stroke-width="2" fill="none"/>
          <path d="M 90 90 L 90 120" stroke="#2E4053" stroke-width="2" fill="none"/>
          <text x="10%" y="100%" text-anchor="middle" font-size="16" fill="#2E4053">Each block contains pointer to next block.</text>
        </g>
        <text x="50%" y="120%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan>Advantages:</tspan>
          <tspan> No external fragmentation</tspan>
          <tspan> Files can grow dynamically</tspan>
          <tspan> Simple allocation</tspan>
        </text>
        <text x="50%" y="140%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan> Disadvantages:</tspan>
          <tspan> No direct access (must traverse)</tspan>
          <tspan> Pointer space overhead</tspan>
          <tspan> Reliability issues (one bad pointer loses rest)</tspan>
        </text>
      </g>
    </section>

    <section data-narration="Indexed Allocation">
      <rect width="100%" height="50" rx="10" fill="#F7DC6F"/>
      <g transform="translate(10, 10)">
        <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#2E4053">Indexed Allocation</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="4s" dur="2s"/>
        <rect x="10" y="60" width="80" height="30" rx="10" fill="#87CEEB" opacity="0" animate="opacity 2s"/>
        <g>
          <path d="M 10 90 L 90 90" stroke="#2E4053" stroke-width="2" fill="none"/>
          <path d="M 90 90 L 90 120" stroke="#2E4053" stroke-width="2" fill="none"/>
          <text x="10%" y="100%" text-anchor="middle" font-size="16" fill="#2E4053">Index block contains all pointers to data blocks.</text>
        </g>
        <text x="50%" y="120%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan>Advantages:</tspan>
          <tspan> Direct access supported</tspan>
          <tspan> No external fragmentation</tspan>
          <tspan> Easy file growth</tspan>
        </text>
        <text x="50%" y="140%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan> Disadvantages:</tspan>
          <tspan> Index block overhead</tspan>
          <tspan> Index block size limits file size</tspan>
        </text>
      </g>
    </section>

    <section data-narration="Handling Large Files">
      <rect width="100%" height="50" rx="10" fill="#F7DC6F"/>
      <g transform="translate(10, 10)">
        <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#2E4053">Handling Large Files</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="6s" dur="2s"/>
        <rect x="10" y="60" width="80" height="30" rx="10" fill="#87CEEB" opacity="0" animate="opacity 2s"/>
        <g>
          <path d="M 10 90 L 90 90" stroke="#2E4053" stroke-width="2" fill="none"/>
          <path d="M 90 90 L 90 120" stroke="#2E4053" stroke-width="2" fill="none"/>
          <text x="10%" y="100%" text-anchor="middle" font-size="16" fill="#2E4053">Linked Index: Index blocks linked together</text>
        </g>
        <text x="50%" y="120%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan>Multi-level Index: Index of indexes</tspan>
          <tspan>Combined (Unix inode): 12 direct pointers, 1 single indirect, 1 double indirect, 1 triple indirect</tspan>
        </text>
        <text x="50%" y="140%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan>Maximum file size ≈ 4TB</tspan>
        </text>
      </g>
    </section>

    <section data-narration="Comparison">
      <rect width="100%" height="50" rx="10" fill="#F7DC6F"/>
      <g transform="translate(10, 10)">
        <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#2E4053">Comparison</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="8s" dur="2s"/>
        <rect x="10" y="60" width="80" height="30" rx="10" fill="#87CEEB" opacity="0" animate="opacity 2s"/>
        <g>
          <path d="M 10 90 L 90 90" stroke="#2E4053" stroke-width="2" fill="none"/>
          <path d="M 90 90 L 90 120" stroke="#2E4053" stroke-width="2" fill="none"/>
          <g>
            <title>Fragmentation</title>
            <rect x="10" y="90" width="40" height="20" rx="5" fill="#FFC080"/>
            <rect x="60" y="90" width="40" height="20" rx="5" fill="#FFC080"/>
            <rect x="110" y="90" width="40" height="20" rx="5" fill="#FFC080"/>
          </g>
          <title>Direct Access</title>
          <rect x="10" y="120" width="30" height="30" rx="10" fill="#C6E2B5"/>
          <rect x="50" y="120" width="30" height="30" rx="10" fill="#C6E2B5"/>
          <rect x="90" y="120" width="30" height="30" rx="10" fill="#C6E2B5"/>
          <title>Growth</title>
          <rect x="10" y="150" width="30" height="30" rx="10" fill="#C6E2B5"/>
          <rect x="50" y="150" width="30" height="30" rx="10" fill="#C6E2B5"/>
          <rect x="90" y="150" width="30" height="30" rx="10" fill="#C6E2B5"/>
          <text x="10%" y="160%" text-anchor="middle" font-size="16" fill="#2E4053">No</text>
          <text x="60%" y="160%" text-anchor="middle" font-size="16" fill="#2E4053">Yes</text>
          <text x="90%" y="160%" text-anchor="middle" font-size="16" fill="#2E4053">Yes</text>
        </g>
      </g>
    </section>

    <section data-narration="Unix Inode Example">
      <rect width="100%" height="50" rx="10" fill="#F7DC6F"/>
      <g transform="translate(10, 10)">
        <text x="50%" y="50%" text-anchor="middle" font-size="18" fill="#2E4053">Unix Inode Example</text>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="10s" dur="2s"/>
        <rect x="10" y="60" width="80" height="30" rx="10" fill="#87CEEB" opacity="0" animate="opacity 2s"/>
        <g>
          <path d="M 10 90 L 90 90" stroke="#2E4053" stroke-width="2" fill="none"/>
          <path d="M 90 90 L 90 120" stroke="#2E4053" stroke-width="2" fill="none"/>
          <text x="10%" y="100%" text-anchor="middle" font-size="16" fill="#2E4053">12 direct pointers, 1 single indirect, 1 double indirect, 1 triple indirect</text>
        </g>
        <text x="50%" y="120%" text-anchor="middle" font-size="16" fill="#2E4053">
          <tspan>Maximum file size ≈ 4TB</tspan>
        </text>
      </g>
    </section>

    <footer>
      <g transform="translate(10, 380)">
        <path d="M 10 390 L 90 390" stroke="#2E4053" stroke-width="2" fill="none"/>
        <path d="M 90 390 L 90 420" stroke="#2E4053" stroke-width="2" fill="none"/>
        <text x="10%" y="400%" text-anchor="middle" font-size="16" fill="#2E4053">This diagram illustrates the allocation methods used in file systems.</text>
      </g>
    </footer>
  </svg>