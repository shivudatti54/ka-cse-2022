<svg width="420" height="400" data-topic-id="directory-and-disk-structure" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xml:space="preserve">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <path class="background" d="M0,100 L420,100 L420,0 L0,0 Z" fill="url(#grad)"/>

  <!-- Title Section -->
  <section class="section" data-narration="Introduction to Directory Structures">
    <rect class="section-border" x="20" y="20" width="380" height="120" rx="10"/>
    <text class="title" x="20" y="40" width="380" height="40" text-anchor="middle" font-size="24" font-family="Arial, sans-serif">Directory and Disk Structure</text>
    <path class="section-border" d="M20,40 L380,40 L380,120 L20,120 Z"/>
  </section>

  <!-- Single-Level Directory Section -->
  <section class="section" data-narration="Single-Level Directory">
    <rect class="section-border" x="20" y="170" width="380" height="120" rx="10"/>
    <text class="data-narration" x="20" y="190" width="380" height="40" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Single-Level Directory</text>
    <rect x="100" y="100" width="220" height="100" rx="10" fill="#f7f7f7"/>
    <g transform="translate(100,100)">
      <text class="file-name" x="0" y="0" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">file1.txt</text>
      <text class="file-name" x="0" y="40" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">file2.doc</text>
      <text class="file-name" x="0" y="80" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">program1.exe</text>
    </g>
  </section>

  <!-- Two-Level Directory Section -->
  <section class="section" data-narration="Two-Level Directory">
    <rect class="section-border" x="20" y="310" width="380" height="120" rx="10"/>
    <text class="data-narration" x="20" y="330" width="380" height="40" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Two-Level Directory</text>
    <rect x="100" y="200" width="220" height="100" rx="10" fill="#f7f7f7"/>
    <g transform="translate(100,200)">
      <text class="file-name" x="0" y="0" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">file1.txt</text>
      <text class="file-name" x="0" y="40" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">file2.doc</text>
      <text class="file-name" x="0" y="80" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">document.pdf</text>
    </g>
  </section>

  <!-- Advantages and Disadvantages Section -->
  <section class="section" data-narration="Advantages and Disadvantages of Single-Level Directory">
    <rect class="section-border" x="20" y="70" width="380" height="120" rx="10"/>
    <text class="data-narration" x="20" y="90" width="380" height="40" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Advantages:</text>
    <rect x="20" y="130" width="220" height="50" rx="10" fill="#f7f7f7"/>
    <g transform="translate(20,130)">
      <text class="data-point" x="0" y="10" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Simple to implement</text>
      <text class="data-point" x="0" y="50" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Easy to understand</text>
    </g>
    <text class="data-narration" x="20" y="170" width="380" height="40" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Disadvantages:</text>
    <rect x="20" y="210" width="220" height="50" rx="10" fill="#f7f7f7"/>
    <g transform="translate(20,210)">
      <text class="data-point" x="0" y="10" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Limited scalability</text>
      <text class="data-point" x="0" y="50" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Naming conflicts</text>
    </g>
  </section>

  <!-- Two-Level Directory Advantages and Disadvantages Section -->
  <section class="section" data-narration="Advantages and Disadvantages of Two-Level Directory">
    <rect class="section-border" x="20" y="70" width="380" height="120" rx="10"/>
    <text class="data-narration" x="20" y="90" width="380" height="40" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Advantages:</text>
    <rect x="20" y="130" width="220" height="50" rx="10" fill="#f7f7f7"/>
    <g transform="translate(20,130)">
      <text class="data-point" x="0" y="10" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Provides basic isolation between users</text>
    </g>
    <text class="data-narration" x="20" y="170" width="380" height="40" text-anchor="middle" font-size="18" font-family="Arial, sans-serif">Disadvantages:</text>
    <rect x="20" y="210" width="220" height="50" rx="10" fill="#f7f7f7"/>
    <g transform="translate(20,210)">
      <text class="data-point" x="0" y="10" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Limited flexibility</text>
      <text class="data-point" x="0" y="50" width="220" height="30" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">Security is not fully implemented</text>
    </g>
  </section>

  <!-- Conclusion Section -->
  <section class="section" data-narration="Conclusion">
    <rect class="section-border" x="20" y="310" width="380" height="120" rx="10"/>
    <text class="title" x="20" y="330" width="380" height="40" text-anchor="middle" font-size="24" font-family="Arial, sans-serif">In conclusion, directory structures are a crucial part of modern operating systems. They provide a logical organization for files and enable efficient storage, retrieval, and management of data.</text>
  </section>

  <!-- Footer Section -->
  <footer>
    <rect class="footer-border" x="20" y="370" width="380" height="30" rx="10"/>
    <text class="footer-text" x="20" y="390" width="380" height="20" text-anchor="middle" font-size="14" font-family="Arial, sans-serif">&copy; 2023</text>
  </footer>
</svg>