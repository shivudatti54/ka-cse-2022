<svg width="420" height="400" data-topic-id="free-space-management">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#DCE3FF" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Free Space Management</title>

  <rect width="100%" height="20" fill="#DCE3FF" rx="5"/>
  <rect x="0" y="20" width="100%" height="350" fill="url(#pastel-gradient)"/>

  <g transform="translate(20, 30)">

    <!-- Section 1: Purpose -->
    <rect width="100%" height="60" fill="#F7F7F7" rx="5">
      <animate transform="rotate(0 50 50)" begin="0s" duration="2s" repeatCount="indefinite"/>
      <g data-narration="Free Space Management">
        <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" rx="5"/>
        <text x="20" y="30" font-size="18" font-family="Arial, sans-serif">Purpose</text>
        <text x="20" y="40" font-size="18" font-family="Arial, sans-serif">Track which disk blocks are free and available for allocation.</text>
      </g>
    </rect>

    <!-- Section 2: Methods -->
    <g transform="translate(20, 90)">

      <rect width="100%" height="60" fill="#F7F7F7" rx="5">
        <animate transform="rotate(0 50 50)" begin="0s" duration="2s" repeatCount="indefinite"/>
        <g data-narration="Methods">
          <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="30" font-size="18" font-family="Arial, sans-serif">Method 1: Bit Vector (Bitmap)</text>
          <rect x="0" y="50" width="80" height="20" fill="#C7B8EA" rx="5"/>
          <text x="20" y="70" font-size="18" font-family="Arial, sans-serif">Each block represented by 1 bit: 0=free, 1=allocated.</text>
          <rect x="100" y="50" width="20" height="20" fill="#C7B8EA" rx="5"/>
          <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
        </g>
      </rect>

      <rect width="100%" height="60" fill="#F7F7F7" rx="5">
        <animate transform="rotate(0 50 50)" begin="2s" duration="2s" repeatCount="indefinite"/>
        <g data-narration="Methods">
          <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="30" font-size="18" font-family="Arial, sans-serif">Method 2: Linked List</text>
          <rect x="0" y="50" width="80" height="20" fill="#C7B8EA" rx="5"/>
          <text x="20" y="70" font-size="18" font-family="Arial, sans-serif">Free blocks linked together.</text>
          <rect x="100" y="50" width="20" height="20" fill="#C7B8EA" rx="5"/>
          <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
        </g>
      </rect>

      <rect width="100%" height="60" fill="#F7F7F7" rx="5">
        <animate transform="rotate(0 50 50)" begin="4s" duration="2s" repeatCount="indefinite"/>
        <g data-narration="Methods">
          <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="30" font-size="18" font-family="Arial, sans-serif">Method 3: Grouping</text>
          <rect x="0" y="50" width="80" height="20" fill="#C7B8EA" rx="5"/>
          <text x="20" y="70" font-size="18" font-family="Arial, sans-serif">First free block stores addresses of n free blocks.</text>
          <rect x="100" y="50" width="20" height="20" fill="#C7B8EA" rx="5"/>
          <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
        </g>
      </rect>

      <rect width="100%" height="60" fill="#F7F7F7" rx="5">
        <animate transform="rotate(0 50 50)" begin="6s" duration="2s" repeatCount="indefinite"/>
        <g data-narration="Methods">
          <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="30" font-size="18" font-family="Arial, sans-serif">Method 4: Counting</text>
          <rect x="0" y="50" width="80" height="20" fill="#C7B8EA" rx="5"/>
          <text x="20" y="70" font-size="18" font-family="Arial, sans-serif">Store (start_block, count) pairs for runs of free blocks.</text>
          <rect x="100" y="50" width="20" height="20" fill="#C7B8EA" rx="5"/>
          <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
        </g>
      </rect>

    </g>

    <!-- Section 3: Comparison -->
    <g transform="translate(20, 410)">

      <rect width="100%" height="60" fill="#F7F7F7" rx="5">
        <animate transform="rotate(0 50 50)" begin="0s" duration="2s" repeatCount="indefinite"/>
        <g data-narration="Comparison">
          <rect x="0" y="0" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="30" font-size="18" font-family="Arial, sans-serif">Method      | Find Free | Contiguous | Space          </text>
          <rect x="0" y="60" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="80" font-size="18" font-family="Arial, sans-serif">Bitmap      | O(n) scan | Easy       | Fixed overhead </text>
          <rect x="0" y="100" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="120" font-size="18" font-family="Arial, sans-serif">Linked List | O(1)      | Difficult  | No overhead    </text>
          <rect x="0" y="140" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="160" font-size="18" font-family="Arial, sans-serif">Grouping    | O(1)      | Medium     | Minimal        </text>
          <rect x="0" y="180" width="100%" height="20" fill="#F7F7F7" rx="5"/>
          <text x="20" y="200" font-size="18" font-family="Arial, sans-serif">Counting    | O(1)      | Easy       | Minimal        </text>
        </g>
      </rect>

    </g>

    <!-- Footer -->
    <rect width="100%" height="20" fill="#F7F7F7" rx="5"/>
    <text x="20" y="370" font-size="18" font-family="Arial, sans-serif">Free Space Management</text>
  </g>
</svg>