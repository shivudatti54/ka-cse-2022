<svg width="420" height="400" data-topic-id="Secondary-Storage-Structure">
  <rect x="50" y="50" width="320" height="300" fill="linear-gradient(to bottom, #66CCCC, #B2FFFC)"/>
  <title>Secondary Storage Structure</title>
  <text x="150" y="30" font-size="24" fill="#2E4053">Control Structures in C++</text>
  <text x="150" y="380" font-size="24" fill="#2E4053">Secondary Storage Structure</text>
  <g id="selection">
    <rect x="100" y="100" width="120" height="20" fill="#F7F7F7" stroke="#2E4053"/>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="120 100" dur="1s" begin="0s"/>
    <text x="220" y="110" font-size="18" fill="#2E4053">Selection Statements</text>
    <text x="220" y="120" font-size="18" fill="#2E4053">Make decisions (if, if-else, switch)</text>
    <text x="220" y="130" font-size="18" fill="#2E4053">Allow your program to choose between different paths of execution based on whether a condition is true or false.</text>
  </g>
  <g id="iteration">
    <rect x="350" y="100" width="120" height="20" fill="#F7F7F7" stroke="#2E4053"/>
    <animateTransform attributeName="transform" type="translate" from="0 100" to="120 100" dur="1s" begin="1s"/>
    <text x="460" y="110" font-size="18" fill="#2E4053">Iteration Statements</text>
    <text x="460" y="120" font-size="18" fill="#2E4053">Create loops (for, while, do-while)</text>
    <text x="460" y="130" font-size="18" fill="#2E4053">Allow your program to repeat tasks or execute blocks of code repeatedly.</text>
  </g>
  <g id="jump">
    <rect x="100" y="200" width="120" height="20" fill="#F7F7F7" stroke="#2E4053"/>
    <animateTransform attributeName="transform" type="translate" from="0 200" to="120 200" dur="1s" begin="2s"/>
    <text x="220" y="210" font-size="18" fill="#2E4053">Jump Statements</text>
    <text x="220" y="220" font-size="18" fill="#2E4053">Alter the flow directly (break, continue, goto, return)</text>
    <text x="220" y="230" font-size="18" fill="#2E4053">Allow your program to jump to different parts of its code or exit a loop early.</text>
  </g>
  <g id="example">
    <rect x="100" y="300" width="320" height="100" fill="#F7F7F7" stroke="#2E4053"/>
    <animateTransform attributeName="transform" type="translate" from="0 300" to="320 300" dur="1s" begin="3s"/>
    <text x="150" y="310" font-size="18" fill="#2E4053">Example</text>
    <text x="150" y="320" font-size="18" fill="#2E4053">The if statement executes a block of code only if its condition evaluates to true.</text>
    <text x="150" y="330" font-size="18" fill="#2E4053">Syntax: if (condition) { // Code to execute if condition is true }</text>
    <text x="150" y="340" font-size="18" fill="#2E4053">Example:</text>
    <text x="150" y="350" font-size="18" fill="#2E4053">int number = -5; if (number < 0) { cout << number << " is a negative number." << endl; }</text>
    <text x="150" y="360" font-size="18" fill="#2E4053">Output:</text>
    <text x="150" y="370" font-size="18" fill="#2E4053">-5 is a negative number.</text>
  </g>
  <g id="footer">
    <rect x="50" y="350" width="320" height="50" fill="#F7F7F7" stroke="#2E4053"/>
    <text x="150" y="360" font-size="18" fill="#2E4053">Page 2 of 3</text>
  </g>
</svg>