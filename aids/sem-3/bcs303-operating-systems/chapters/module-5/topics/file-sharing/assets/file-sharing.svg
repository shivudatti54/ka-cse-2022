<svg width="420" height="400" data-topic-id="File-Sharing">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E6F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.5" />
  
  <!-- Title at top -->
  <title>File Sharing</title>
  <g id="title-group" transform="translate(10, 10)">
    <text x="0" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle">File Sharing</text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g id="section-1" transform="translate(10, 50)">
    <text data-narration="Introduction to File Sharing" x="0" y="20" font-size="18" font-family="Arial" text-anchor="middle">Threat Intelligence Sharing is the collaborative practice of exchanging information about cyber threats, vulnerabilities, and threat actors between organizations, communities, or information sharing and analysis centers (ISACs).</text>
  </g>
  
  <!-- Section 2: Why Share -->
  <g id="section-2" transform="translate(10, 100)">
    <text data-narration="Cost Efficiency" x="0" y="20" font-size="18" font-family="Arial" text-anchor="middle">Sharing reduces the overall cost of defense for all participants.</text>
    <text x="0" y="50" font-size="18" font-family="Arial" text-anchor="middle">It is far more cost-effective to leverage intelligence discovered by others than to discover every threat independently.</text>
  </g>
  
  <!-- Section 3: Benefits -->
  <g id="section-3" transform="translate(10, 150)">
    <text data-narration="Speed and Scale" x="0" y="20" font-size="18" font-family="Arial" text-anchor="middle">A new piece of malware can propagate globally in minutes.</text>
    <text x="0" y="50" font-size="18" font-family="Arial" text-anchor="middle">Automated sharing allows IOCs to be distributed near-instantly, enabling proactive defense across countless networks.</text>
    <text x="0" y="80" font-size="18" font-family="Arial" text-anchor="middle">Context is King.</text>
    <text x="0" y="110" font-size="18" font-family="Arial" text-anchor="middle">Seeing an IP address in your logs is one thing.</text>
    <text x="0" y="130" font-size="18" font-family="Arial" text-anchor="middle">Knowing that this IP is associated with a specific ransomware campaign, the TTPs it uses, and the industries it targets provides invaluable context for prioritization and response.</text>
  </g>
  
  <!-- Section 4: Sharing Models and Communities -->
  <g id="section-4" transform="translate(10, 200)">
    <text data-narration="Sharing Models and Communities" x="0" y="20" font-size="18" font-family="Arial" text-anchor="middle">Threat intelligence is shared through various models, each with its own trust framework and audience.</text>
    <text x="0" y="50" font-size="18" font-family="Arial" text-anchor="middle">A new piece of malware can propagate globally in minutes.</text>
    <text x="0" y="80" font-size="18" font-family="Arial" text-anchor="middle">Automated sharing allows IOCs to be distributed near-instantly, enabling proactive defense across countless networks.</text>
  </g>
  
  <!-- Arrow markers for connections -->
  <line x1="10" y1="50" x2="200" y2="200" style="stroke-width: 2; stroke-linecap: round;" />
  <line x1="10" y1="150" x2="200" y2="200" style="stroke-width: 2; stroke-linecap: round;" />
  <line x1="10" y1="250" x2="200" y2="200" style="stroke-width: 2; stroke-linecap: round;" />
  
  <!-- Footer at bottom -->
  <text x="0" y="370" font-size="18" font-family="Arial" text-anchor="middle">File Sharing</text>
</svg>