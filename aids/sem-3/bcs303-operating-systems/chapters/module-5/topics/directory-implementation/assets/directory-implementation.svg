<svg width="420" height="400" data-topic-id="Directory-Implementation"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="shape-rendering: auto;">

    <!-- 
        Gradient Background
    -->
    <defs>
        <linearGradient id="pastel-blue" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7E5F2" stop-opacity="1"/>
            <stop offset="50%" stop-color="#AED6F3" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Background Gradient -->
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-blue)"/>

    <!-- Header -->
    <g transform="translate(30, 50)">
        <rect width="240" height="50" fill="#99CCFF"/>
        <text x="10" y="15" font-size="24" font-family="Arial" fill="#F0F0F0" data-narration="Introduction to Directory Implementation">
            Directory Implementation
        </text>
    </g>

    <!-- Core Functions Section -->
    <g transform="translate(30, 100)">
        <rect width="240" height="50" fill="#F2F2F2"/>
        <text x="10" y="15" font-size="18" font-family="Arial" fill="#455A64" data-narration="Identify: Understand assets, risks, and business context">
            Identify
        </text>
        <rect x="10" y="60" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="60" font-size="18" font-family="Arial" fill="#455A64" data-narration="Protect: Implement safeguards to limit impact of events">
            Protect
        </text>
        <rect x="10" y="110" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="110" font-size="18" font-family="Arial" fill="#455A64" data-narration="Detect: Identify cybersecurity events in timely manner">
            Detect
        </text>
        <rect x="10" y="160" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="160" font-size="18" font-family="Arial" fill="#455A64" data-narration="Respond: Take action regarding detected events">
            Respond
        </text>
        <rect x="10" y="210" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="210" font-size="18" font-family="Arial" fill="#455A64" data-narration="Recover: Maintain plans for resilience and restore capabilities">
            Recover
        </text>
    </g>

    <!-- Implementation Tiers Section -->
    <g transform="translate(30, 250)">
        <rect width="240" height="50" fill="#F2F2F2"/>
        <text x="10" y="15" font-size="18" font-family="Arial" fill="#455A64" data-narration="Tier 1: Partial (ad-hoc and reactive)">
            Tier 1
        </text>
        <rect x="10" y="60" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="60" font-size="18" font-family="Arial" fill="#455A64" data-narration="Tier 2: Risk Informed (management approves but not established)">
            Tier 2
        </text>
        <rect x="10" y="110" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="110" font-size="18" font-family="Arial" fill="#455A64" data-narration="Tier 3: Repeatable (formally approved and implemented)">
            Tier 3
        </text>
        <rect x="10" y="160" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="160" font-size="18" font-family="Arial" fill="#455A64" data-narration="Tier 4: Adaptive (based on lessons learned and predictive indicators)">
            Tier 4
        </text>
    </g>

    <!-- Profiles Section -->
    <g transform="translate(30, 300)">
        <rect width="240" height="50" fill="#F2F2F2"/>
        <text x="10" y="15" font-size="18" font-family="Arial" fill="#455A64" data-narration="Organization-specific alignment of core functions with business needs, risk tolerance, and resources">
            Profiles
        </text>
        <rect x="10" y="60" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="60" font-size="18" font-family="Arial" fill="#455A64" data-narration="Alignment with business needs, risk tolerance, and resources">
            Alignment
        </text>
    </g>

    <!-- NIST Cybersecurity Framework (CSF) Section -->
    <g transform="translate(30, 350)">
        <rect width="240" height="50" fill="#F2F2F2"/>
        <text x="10" y="15" font-size="18" font-family="Arial" fill="#455A64" data-narration="Developed by the National Institute of Standards and Technology, the NIST CSF is a voluntary framework primarily">
            NIST CSF
        </text>
        <rect x="10" y="60" width="220" height="30" fill="#8BC34A"/>
        <text x="20" y="60" font-size="18" font-family="Arial" fill="#455A64" data-narration="Primarily used by organizations to manage and reduce cybersecurity risk">
            Used by Organizations
        </text>
    </g>

    <!-- Footer -->
    <g transform="translate(30, 400)">
        <rect width="240" height="50" fill="#99CCFF"/>
        <text x="10" y="15" font-size="18" font-family="Arial" fill="#F0F0F0" data-narration="Directory Implementation">
            Directory Implementation
        </text>
    </g>

    <!-- Animation -->
    <animate xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#pastel-blue" begin="0s" dur="10s" repeatCount="indefinite">
        <stop offset="0%" stop-color="#C7E5F2" stop-opacity="1"/>
        <stop offset="50%" stop-color="#AED6F3" stop-opacity="1"/>
        <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </animate>

</svg>