<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="implementation-of-file-system-file-system-file-con">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A98D7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
    <style>
      .header {
        font-size: 24px;
        color: #4B5154;
        text-align: center;
        margin-top: 20px;
      }
      .footer {
        font-size: 24px;
        color: #4B5154;
        text-align: center;
        margin-bottom: 20px;
      }
    </style>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%"/>

  <g transform="translate(20, 20)">
    <g id="introduction-to-file-system">
      <rect width="80%" height="20%" rx="5" fill="#F7F7F7"/>
      <text data-narration="Introduction to File System" x="10%" y="50%" font-size="18px" font-family="Arial" fill="#4B5154">Introduction to File System</text>
      <animate transform="translate(10, 25)" begin="0s" dur="2s" repeat="never"/>
    </g>
    <g id="file-system-concepts">
      <rect width="80%" height="20%" rx="5" fill="#F7F7F7"/>
      <text data-narration="File System Concepts" x="10%" y="50%" font-size="18px" font-family="Arial" fill="#4B5154">File System Concepts</text>
      <animate transform="translate(10, 75)" begin="0s" dur="2s" repeat="never"/>
    </g>
  </g>
  <g transform="translate(20, 120)">
    <g id="file-concept">
      <rect width="80%" height="30%" rx="5" fill="#F7F7F7"/>
      <text data-narration="File Concept" x="10%" y="50%" font-size="20px" font-family="Arial" fill="#4B5154">File Concept</text>
      <animate transform="translate(10, 75)" begin="0s" dur="2s" repeat="never"/>
    </g>
    <g id="types-of-files">
      <rect width="80%" height="20%" rx="5" fill="#F7F7F7"/>
      <text data-narration="Types of Files" x="10%" y="50%" font-size="18px" font-family="Arial" fill="#4B5154">Types of Files</text>
      <animate transform="translate(10, 75)" begin="0s" dur="2s" repeat="never"/>
    </g>
  </g>
  <g transform="translate(20, 160)">
    <g id="file-structure">
      <rect width="80%" height="30%" rx="5" fill="#F7F7F7"/>
      <text data-narration="File Structure" x="10%" y="50%" font-size="20px" font-family="Arial" fill="#4B5154">File Structure</text>
      <animate transform="translate(10, 75)" begin="0s" dur="2s" repeat="never"/>
    </g>
    <g id="file-operations">
      <rect width="80%" height="20%" rx="5" fill="#F7F7F7"/>
      <text data-narration="File Operations" x="10%" y="50%" font-size="18px" font-family="Arial" fill="#4B5154">File Operations</text>
      <animate transform="translate(10, 75)" begin="0s" dur="2s" repeat="never"/>
    </g>
  </g>
  <g transform="translate(20, 200)">
    <rect width="100%" height="20%" rx="5" fill="#F7F7F7"/>
    <text class="header" x="50%" y="50%" font-size="24px" font-family="Arial" fill="#4B5154">Implementation of File System</text>
  </g>
  <g transform="translate(20, 220)">
    <rect width="100%" height="20%" rx="5" fill="#F7F7F7"/>
    <text class="footer" x="50%" y="50%" font-size="24px" font-family="Arial" fill="#4B5154">Copyright 2023</text>
  </g>
</svg>