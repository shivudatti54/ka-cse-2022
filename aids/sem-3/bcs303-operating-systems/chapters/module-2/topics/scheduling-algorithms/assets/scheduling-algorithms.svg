<svg width="420" height="400" data-topic-id="Scheduling-Algorithms">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A7C4F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Section 1: Introduction to CPU Scheduling -->
  <section data-narration="Introduction-to-CPU-Scheduling">
    <rect x="0" y="50" width="420" height="50" fill="#DC3545" rx="10"/>
    <text x="20" y="25" fill="#FFFFFF" font-size="24" text-anchor="middle">CPU Scheduling</text>
  </section>

  <!-- Section 2: Why is Scheduling Needed? -->
  <section data-narration="Why-is-Scheduling-Needed">
    <rect x="0" y="110" width="420" height="50" fill="#28A745" rx="10"/>
    <text x="20" y="75" fill="#FFFFFF" font-size="18" text-anchor="middle">Why is Scheduling Needed?</text>
    <text x="20" y="125" fill="#FFFFFF" font-size="16" text-anchor="middle">
      Maximize CPU utilization by switching between processes
      Time-sharing: Allow multiple users to interact with the system simultaneously
      Fairness: Ensure all processes get fair share of CPU time
      Efficiency: Minimize overhead and maximize throughput
    </text>
  </section>

  <!-- Section 3: Scheduling Criteria -->
  <section data-narration="Scheduling-Criteria">
    <rect x="0" y="170" width="420" height="120" fill="#FF9800" rx="10"/>
    <text x="20" y="75" fill="#FFFFFF" font-size="18" text-anchor="middle">Scheduling Criteria</text>
    <rect x="20" y="150" width="300" height="30" fill="#4CAF50" rx="10"/>
    <text x="20" y="185" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>CPU Utilization</tspan>
      (<tspan>Percentage of time CPU is busy</tspan>)
    </text>
    <rect x="20" y="210" width="300" height="30" fill="#4CAF50" rx="10"/>
    <text x="20" y="245" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>Throughput</tspan>
      (<tspan>Number of processes completed per time unit</tspan>)
    </text>
    <rect x="20" y="280" width="300" height="30" fill="#4CAF50" rx="10"/>
    <text x="20" y="315" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>Turnaround Time</tspan>
      (<tspan>Time from submission to completion</tspan>)
    </text>
    <rect x="20" y="350" width="300" height="30" fill="#4CAF50" rx="10"/>
    <text x="20" y="385" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>Waiting Time</tspan>
      (<tspan>Time process spends waiting in ready queue</tspan>)
    </text>
    <rect x="20" y="425" width="300" height="30" fill="#4CAF50" rx="10"/>
    <text x="20" y="460" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>Response Time</tspan>
      (<tspan>Time from submission until first response</tspan>)
    </text>
  </section>

  <!-- Section 4: First-Come, First-Served (FCFS) -->
  <section data-narration="First-Come-First-Served-(FCFS)">
    <rect x="0" y="500" width="420" height="150" fill="#E83E8C" rx="10"/>
    <text x="20" y="475" fill="#FFFFFF" font-size="18" text-anchor="middle">FCFS</text>
    <rect x="20" y="525" width="400" height="30" fill="#E83E8C" rx="10"/>
    <text x="20" y="560" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>Characteristics:</tspan>
      <tspan>Non-preemptive: Once CPU allocated, process keeps it until termination</tspan>
      <tspan>Implemented using FIFO queue</tspan>
      <tspan>Can lead to convoy effect: short processes wait behind long ones</tspan>
    </text>
    <rect x="20" y="600" width="400" height="30" fill="#E83E8C" rx="10"/>
    <text x="20" y="635" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>Example:</tspan>
      <tspan>Process    Burst Time (ms)</tspan>
      <tspan>P1         24</tspan>
      <tspan>P2         3</tspan>
      <tspan>P3         3</tspan>
      <tspan>Gantt Chart:</tspan>
      <tspan>|   P1   | P2 | P3 |</tspan>
      <tspan>0       24   27   30</tspan>
      <tspan>Waiting Time: P1=0, P2=24, P3=27</tspan>
      <tspan>Average Waiting Time: (0+24+27)/3 = 17ms</tspan>
    </text>
  </section>

  <!-- Section 5: Shortest-Job-First (SJF) -->
  <section data-narration="Shortest-Job-First-(SJF)">
    <rect x="0" y="750" width="420" height="150" fill="#2196F3" rx="10"/>
    <text x="20" y="725" fill="#FFFFFF" font-size="18" text-anchor="middle">SJF</text>
    <rect x="20" y="775" width="400" height="30" fill="#2196F3" rx="10"/>
    <text x="20" y="810" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>Characteristics:</tspan>
      <tspan>Selects the process with the smallest next CPU burst</tspan>
    </text>
    <rect x="20" y="850" width="400" height="30" fill="#2196F3" rx="10"/>
    <text x="20" y="885" fill="#FFFFFF" font-size="14" text-anchor="middle">
      <tspan>Example:</tspan>
      <tspan>Process    Burst Time (ms)</tspan>
      <tspan>P1         24</tspan>
      <tspan>P2         3</tspan>
      <tspan>P3         3</tspan>
      <tspan>Gantt Chart:</tspan>
      <tspan>|   P1   | P2 | P3 |</tspan>
      <tspan>0       24   27   30</tspan>
      <tspan>Waiting Time: P1=0, P2=0, P3=21</tspan>
      <tspan>Average Waiting Time: (0+0+21)/3 = 7ms</tspan>
    </text>
  </section>

  <!-- Animation: SVG -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="10s" fill="freeze">
    <rect x="0" y="50" width="420" height="50" fill="#DC3545" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="10s"/>
  </animate>
  <animate xmlns="http://www.w3.org/2000/svg" begin="2s" dur="3s" fill="freeze">
    <rect x="0" y="110" width="420" height="50" fill="#28A745" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="3s"/>
  </animate>
  <animate xmlns="http://www.w3.org/2000/svg" begin="5s" dur="3s" fill="freeze">
    <rect x="0" y="170" width="420" height="120" fill="#FF9800" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="3s"/>
  </animate>
  <animate xmlns="http://www.w3.org/2000/svg" begin="8s" dur="3s" fill="freeze">
    <rect x="0" y="500" width="420" height="150" fill="#E83E8C" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="3s"/>
  </animate>
  <animate xmlns="http://www.w3.org/2000/svg" begin="11s" dur="3s" fill="freeze">
    <rect x="0" y="750" width="420" height="150" fill="#2196F3" rx="10"/>
    <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="3s"/>
  </animate>

  <!-- Footer -->
  <text x="20" y="470" fill="#FFFFFF" font-size="14" text-anchor="middle">Animated Educational Diagram</text>
</svg>