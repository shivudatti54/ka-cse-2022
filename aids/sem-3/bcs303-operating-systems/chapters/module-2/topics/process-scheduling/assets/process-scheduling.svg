<svg width="420" height="400" data-topic-id="process-scheduling">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="5" />
  
  <!-- Section 1: Introduction to OpenMP Scheduling -->
  <g id="section-1" data-narration="Introduction to OpenMP Scheduling">
    <path d="M 50 20 L 300 20 L 300 380 L 50 380 Z" stroke="#3498db" stroke-width="2" fill="none" />
    <text x="50%" y="50%" text-anchor="middle" font-size="24">Introduction to OpenMP Scheduling</text>
  </g>
  <animate transform="rotate(0 200 200)" begin="0s" duration="2s" repeatCount="indefinite" />
  
  <!-- Section 2: Static Scheduling -->
  <g id="section-2" data-narration="Static Scheduling">
    <rect x="50" y="100" width="200" height="200" fill="#B2FFFC" rx="5" />
    <path d="M 50 100 L 200 100 L 200 300 L 50 300 Z" stroke="#3498db" stroke-width="2" fill="none" />
    <text x="50%" y="150%" text-anchor="middle" font-size="18">Static Scheduling</text>
  </g>
  <animate transform="translate(50 100)" begin="0.5s" duration="2s" repeatCount="indefinite" />
  
  <!-- Section 3: Dynamic Scheduling -->
  <g id="section-3" data-narration="Dynamic Scheduling">
    <rect x="350" y="100" width="200" height="200" fill="#B2FFFC" rx="5" />
    <path d="M 350 100 L 550 100 L 550 300 L 350 300 Z" stroke="#3498db" stroke-width="2" fill="none" />
    <text x="350%" y="150%" text-anchor="middle" font-size="18">Dynamic Scheduling</text>
  </g>
  <animate transform="translate(350 100)" begin="1s" duration="2s" repeatCount="indefinite" />
  
  <!-- Section 4: Advantages and Disadvantages -->
  <g id="section-4" data-narration="Advantages and Disadvantages">
    <rect x="50" y="300" width="200" height="200" fill="#E74C3C" rx="5" />
    <path d="M 50 300 L 200 300 L 200 400 L 50 400 Z" stroke="#3498db" stroke-width="2" fill="none" />
    <text x="50%" y="350%" text-anchor="middle" font-size="18">Advantages</text>
    <text x="50%" y="370%" text-anchor="middle" font-size="18">Disadvantages</text>
  </g>
  <animate transform="translate(50 300)" begin="2.5s" duration="2s" repeatCount="indefinite" />
  
  <!-- Section 5: Conclusion -->
  <g id="section-5" data-narration="Conclusion">
    <rect x="50" y="400" width="420" height="20" fill="#3498db" rx="5" />
    <text x="50%" y="410%" text-anchor="middle" font-size="18">Conclusion</text>
  </g>
  <animate transform="rotate(0 200 200)" begin="3.5s" duration="2s" repeatCount="indefinite" />
</svg>