<svg width="420" height="400" data-topic-id="operations-on-processes">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" opacity="0.5" />
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="20" y="20" width="380" height="20" fill="#3498db" rx="5" />
    <g transform="rotate(-90 20 20)">
      <text font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">Operations on Processes</text>
    </g>
  </section>
  
  <!-- Process Creation Section -->
  <section data-narration="Process Creation">
    <rect x="20" y="60" width="380" height="160" fill="#ebf5ff" rx="5" />
    <g transform="translate(20, 60)">
      <g transform="scale(0.8)">
        <rect x="0" y="0" width="300" height="120" fill="#fff" rx="5" />
        <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Process Creation</text>
      </g>
    </g>
    <animateTransform attributeName="translate" type="translate" from="20 60" to="20 120" begin="0s" dur="2s" repeatCount="1" />
    <animateTransform attributeName="scale" type="scale" from="1 1" to="0.8 0.8" begin="0s" dur="2s" repeatCount="1" />
  </section>
  
  <!-- Fork System Call Section -->
  <section data-narration="Fork System Call">
    <rect x="20" y="220" width="380" height="160" fill="#f1c40f" rx="5" />
    <g transform="translate(20, 220)">
      <g transform="scale(0.8)">
        <rect x="0" y="0" width="300" height="120" fill="#fff" rx="5" />
        <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Fork System Call</text>
        <line x1="40" y1="60" x2="40" y2="100" stroke="#333" stroke-width="2" />
        <line x1="240" y1="60" x2="240" y2="100" stroke="#333" stroke-width="2" />
      </g>
    </g>
    <animateTransform attributeName="translate" type="translate" from="20 220" to="20 280" begin="0s" dur="1s" repeatCount="1" />
    <animateTransform attributeName="scale" type="scale" from="1 1" to="0.8 0.8" begin="0s" dur="1s" repeatCount="1" />
  </section>
  
  <!-- Exec System Call Section -->
  <section data-narration="Exec System Call">
    <rect x="20" y="320" width="380" height="160" fill="#2ecc71" rx="5" />
    <g transform="translate(20, 320)">
      <g transform="scale(0.8)">
        <rect x="0" y="0" width="300" height="120" fill="#fff" rx="5" />
        <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Exec System Call</text>
        <line x1="40" y1="60" x2="40" y2="100" stroke="#333" stroke-width="2" />
        <line x1="240" y1="60" x2="240" y2="100" stroke="#333" stroke-width="2" />
      </g>
    </g>
    <animateTransform attributeName="translate" type="translate" from="20 320" to="20 380" begin="0s" dur="1s" repeatCount="1" />
    <animateTransform attributeName="scale" type="scale" from="1 1" to="0.8 0.8" begin="0s" dur="1s" repeatCount="1" />
  </section>
  
  <!-- Vfork System Call Section -->
  <section data-narration="Vfork System Call">
    <rect x="20" y="380" width="380" height="160" fill="#e74c3c" rx="5" />
    <g transform="translate(20, 380)">
      <g transform="scale(0.8)">
        <rect x="0" y="0" width="300" height="120" fill="#fff" rx="5" />
        <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Vfork System Call</text>
        <line x1="40" y1="60" x2="40" y2="100" stroke="#333" stroke-width="2" />
        <line x1="240" y1="60" x2="240" y2="100" stroke="#333" stroke-width="2" />
      </g>
    </g>
    <animateTransform attributeName="translate" type="translate" from="20 380" to="20 440" begin="0s" dur="1s" repeatCount="1" />
    <animateTransform attributeName="scale" type="scale" from="1 1" to="0.8 0.8" begin="0s" dur="1s" repeatCount="1" />
  </section>
  
  <!-- Process Synchronization Section -->
  <section data-narration="Process Synchronization">
    <rect x="20" y="140" width="380" height="160" fill="#2ecc71" rx="5" />
    <g transform="translate(20, 140)">
      <g transform="scale(0.8)">
        <rect x="0" y="0" width="300" height="120" fill="#fff" rx="5" />
        <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Process Synchronization</text>
        <line x1="40" y1="60" x2="40" y2="100" stroke="#333" stroke-width="2" />
        <line x1="240" y1="60" x2="240" y2="100" stroke="#333" stroke-width="2" />
      </g>
    </g>
    <animateTransform attributeName="translate" type="translate" from="20 140" to="20 200" begin="0s" dur="2s" repeatCount="1" />
    <animateTransform attributeName="scale" type="scale" from="1 1" to="0.8 0.8" begin="0s" dur="2s" repeatCount="1" />
  </section>
  
  <!-- Mutual Exclusion Section -->
  <section data-narration="Mutual Exclusion">
    <rect x="20" y="260" width="380" height="160" fill="#e74c3c" rx="5" />
    <g transform="translate(20, 260)">
      <g transform="scale(0.8)">
        <rect x="0" y="0" width="300" height="120" fill="#fff" rx="5" />
        <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Mutual Exclusion</text>
        <line x1="40" y1="60" x2="40" y2="100" stroke="#333" stroke-width="2" />
        <line x1="240" y1="60" x2="240" y2="100" stroke="#333" stroke-width="2" />
      </g>
    </g>
    <animateTransform attributeName="translate" type="translate" from="20 260" to="20 320" begin="0s" dur="1s" repeatCount="1" />
    <animateTransform attributeName="scale" type="scale" from="1 1" to="0.8 0.8" begin="0s" dur="1s" repeatCount="1" />
  </section>
  
  <!-- Semaphores Section -->
  <section data-narration="Semaphores">
    <rect x="20" y="340" width="380" height="160" fill="#2ecc71" rx="5" />
    <g transform="translate(20, 340)">
      <g transform="scale(0.8)">
        <rect x="0" y="0" width="300" height="120" fill="#fff" rx="5" />
        <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Semaphores</text>
        <line x1="40" y1="60" x2="40" y2="100" stroke="#333" stroke-width="2" />
        <line x1="240" y1="60" x2="240" y2="100" stroke="#333" stroke-width="2" />
      </g>
    </g>
    <animateTransform attributeName="translate" type="translate" from="20 340" to="20 400" begin="0s" dur="1s" repeatCount="1" />
    <animateTransform attributeName="scale" type="scale" from="1 1" to="0.8 0.8" begin="0s" dur="1s" repeatCount="1" />
  </section>
  
  <!-- Monitors Section -->
  <section data-narration="Monitors">
    <rect x="20" y="420" width="380" height="160" fill="#3498db" rx="5" />
    <g transform="translate(20, 420)">
      <g transform="scale(0.8)">
        <rect x="0" y="0" width="300" height="120" fill="#fff" rx="5" />
        <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Monitors</text>
        <line x1="40" y1="60" x2="40" y2="100" stroke="#333" stroke-width="2" />
        <line x1="240" y1="60" x2="240" y2="100" stroke="#333" stroke-width="2" />
      </g>
    </g>
    <animateTransform attributeName="translate" type="translate" from="20 420" to="20 480" begin="0s" dur="1s" repeatCount="1" />
    <animateTransform attributeName="scale" type="scale" from="1 1" to="0.8 0.8" begin="0s" dur="1s" repeatCount="1" />
  </section>
  
  <!-- Arrow Markers -->
  <line x1="0" y1="0" x2="0" y2="420" stroke="#333" stroke-width="2" />
  <line x1="420" y1="0" x2="420" y2="0" stroke="#333" stroke-width="2" />
  <line x1="0" y1="0" x2="380" y2="0" stroke="#333" stroke-width="2" />
  <line x1="380" y1="0" x2="380" y2="420" stroke="#333" stroke-width="2" />
  
  <!-- Footer -->
  <g transform="translate(20, 480)">
    <text font-size="18" font-family="Arial" fill="#333" text-anchor="middle">Operations on Processes</text>
  </g>
</svg>