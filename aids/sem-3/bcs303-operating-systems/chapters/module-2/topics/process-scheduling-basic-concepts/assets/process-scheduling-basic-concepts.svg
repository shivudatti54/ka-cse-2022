<svg width="420" height="400" data-topic-id="process-scheduling-basic-concepts">
  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="25" font-size="24" font-family="Arial" fill="#4B0082">Process Scheduling Basic Concepts</text>
  </section>

  <!-- Section 1: Why CPU Scheduling? -->
  <section data-narration="Why CPU Scheduling?">
    <rect x="10" y="80" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="95" font-size="18" font-family="Arial" fill="#4B0082">Maximize CPU Utilization</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1"/>
    <text x="20" y="115" font-size="18" font-family="Arial" fill="#4B0082">Maximize Throughput</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="2s"/>
    <text x="20" y="135" font-size="18" font-family="Arial" fill="#4B0082">Minimize Waiting Time</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="4s"/>
  </section>

  <!-- Section 2: Scheduling Criteria -->
  <section data-narration="Scheduling Criteria">
    <rect x="10" y="180" width="400" height="150" fill="#E0FFFF" rx="10"/>
    <rect x="10" y="180" width="60" height="30" fill="#87CEEB" rx="10"/>
    <text x="70" y="190" font-size="18" font-family="Arial" fill="#4B0082">CPU Utilization</text>
    <text x="70" y="210" font-size="18" font-family="Arial" fill="#4B0082">Maximize</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="0s"/>
    <rect x="150" y="180" width="60" height="30" fill="#87CEEB" rx="10"/>
    <text x="210" y="190" font-size="18" font-family="Arial" fill="#4B0082">Throughput</text>
    <text x="210" y="210" font-size="18" font-family="Arial" fill="#4B0082">Maximize</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="2s"/>
    <rect x="310" y="180" width="60" height="30" fill="#87CEEB" rx="10"/>
    <text x="370" y="190" font-size="18" font-family="Arial" fill="#4B0082">Turnaround Time</text>
    <text x="370" y="210" font-size="18" font-family="Arial" fill="#4B0082">Minimize</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="4s"/>
  </section>

  <!-- Section 3: Key Formulas -->
  <section data-narration="Key Formulas">
    <rect x="10" y="240" width="400" height="150" fill="#87CEEB" rx="10"/>
    <rect x="10" y="240" width="120" height="30" fill="#87CEEB" rx="10"/>
    <text x="140" y="250" font-size="18" font-family="Arial" fill="#4B0082">Turnaround Time</text>
    <text x="140" y="270" font-size="18" font-family="Arial" fill="#4B0082">= Completion Time - Arrival Time</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="0s"/>
    <rect x="230" y="240" width="120" height="30" fill="#87CEEB" rx="10"/>
    <text x="260" y="250" font-size="18" font-family="Arial" fill="#4B0082">Waiting Time</text>
    <text x="260" y="270" font-size="18" font-family="Arial" fill="#4B0082">= Turnaround Time - Burst Time</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="2s"/>
  </section>

  <!-- Section 4: Types of Scheduling -->
  <section data-narration="Types of Scheduling">
    <rect x="10" y="310" width="400" height="150" fill="#E0FFFF" rx="10"/>
    <rect x="10" y="310" width="60" height="30" fill="#87CEEB" rx="10"/>
    <text x="70" y="320" font-size="18" font-family="Arial" fill="#4B0082">Non-Preemptive</text>
    <text x="70" y="340" font-size="18" font-family="Arial" fill="#4B0082">Process runs until it blocks or terminates</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="0s"/>
    <rect x="150" y="310" width="60" height="30" fill="#87CEEB" rx="10"/>
    <text x="210" y="320" font-size="18" font-family="Arial" fill="#4B0082">Preemptive</text>
    <text x="210" y="340" font-size="18" font-family="Arial" fill="#4B0082">Process can be interrupted</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="2s"/>
  </section>

  <!-- Section 5: Scheduling Queues -->
  <section data-narration="Scheduling Queues">
    <rect x="10" y="380" width="400" height="150" fill="#87CEEB" rx="10"/>
    <rect x="10" y="380" width="120" height="30" fill="#87CEEB" rx="10"/>
    <text x="140" y="390" font-size="18" font-family="Arial" fill="#4B0082">Job Queue</text>
    <text x="140" y="410" font-size="18" font-family="Arial" fill="#4B0082">All processes in system</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="0s"/>
    <rect x="230" y="380" width="120" height="30" fill="#87CEEB" rx="10"/>
    <text x="260" y="390" font-size="18" font-family="Arial" fill="#4B0082">Ready Queue</text>
    <text x="260" y="410" font-size="18" font-family="Arial" fill="#4B0082">Processes in memory, ready to run</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="2s"/>
  </section>

  <!-- Section 6: Dispatcher and Dispatch Latency -->
  <section data-narration="Dispatcher and Dispatch Latency">
    <rect x="10" y="450" width="400" height="150" fill="#E0FFFF" rx="10"/>
    <rect x="10" y="450" width="120" height="30" fill="#87CEEB" rx="10"/>
    <text x="140" y="460" font-size="18" font-family="Arial" fill="#4B0082">Dispatcher</text>
    <text x="140" y="480" font-size="18" font-family="Arial" fill="#4B0082">Gives CPU control to selected process</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="0s"/>
    <rect x="230" y="450" width="120" height="30" fill="#87CEEB" rx="10"/>
    <text x="260" y="460" font-size="18" font-family="Arial" fill="#4B0082">Dispatch Latency</text>
    <text x="260" y="480" font-size="18" font-family="Arial" fill="#4B0082">Time to stop one process and start another</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="2s" repeatCount="1" begin="2s"/>
  </section>

  <!-- Footer Section -->
  <footer>
    <rect x="10" y="520" width="400" height="50" fill="#87CEEB" rx="10"/>
    <text x="20" y="535" font-size="18" font-family="Arial" fill="#4B0082">Process Scheduling Basic Concepts</text>
  </footer>
</svg>