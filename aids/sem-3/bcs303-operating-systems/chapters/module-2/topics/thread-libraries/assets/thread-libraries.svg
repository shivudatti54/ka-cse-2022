<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="thread-libraries">
  <title>Thread Libraries</title>
  <style>
    /* Gradient background */
    body {
      background-image: linear-gradient(45deg, #66CCCC, #33CCFF);
      background-size: 100% 100%;
    }
  </style>
  <!-- Gradated Background -->
  <rect x="0" y="0" width="100%" height="100%" fill="rgb(102,204,204,0.3)"/>
  <rect x="0" y="0" width="100%" height="100%" fill="rgb(51,204,255,0.2)"/>
  <!-- Section 1: Overview -->
  <section data-narration="Overview">
    <div style="text-align: center; margin-top: 20%;">
      <h2>Overview</h2>
      <p>Web3 libraries provide JavaScript/Python interfaces to interact with Ethereum nodes.</p>
    </div>
    <animate attributeName="opacity" style="opacity: 0" dur="3s" begin="in(1)"/>
  </section>
  <!-- Section 2: ethers.js -->
  <section data-narration="ethers.js" style="margin-top: 20px;">
    <div style="text-align: center;">
      <h2>ethers.js</h2>
      <img src="ethers-js-logo.svg" alt="ethers.js logo" width="100px" height="100px"/>
      <p>The most popular library for Ethereum interaction.</p>
    </div>
    <animate attributeName="opacity" style="opacity: 1" dur="3s" begin="in(1)"/>
  </section>
  <!-- Section 3: web3.js -->
  <section data-narration="web3.js" style="margin-top: 20px;">
    <div style="text-align: center;">
      <h2>web3.js</h2>
      <img src="web3-js-logo.svg" alt="web3.js logo" width="100px" height="100px"/>
      <p>The original Ethereum JavaScript library.</p>
    </div>
    <animate attributeName="opacity" style="opacity: 1" dur="3s" begin="in(1.5)"/>
  </section>
  <!-- Section 4: web3.py -->
  <section data-narration="web3.py" style="margin-top: 20px;">
    <div style="text-align: center;">
      <h2>web3.py</h2>
      <img src="web3-py-logo.svg" alt="web3.py logo" width="100px" height="100px"/>
      <p>Python library for Ethereum.</p>
    </div>
    <animate attributeName="opacity" style="opacity: 1" dur="3s" begin="in(3)"/>
  </section>
  <!-- Section 5: Providers -->
  <section data-narration="Providers" style="margin-top: 20px;">
    <div style="text-align: center;">
      <h2>Providers</h2>
      <p>ethers.js supports multiple provider types.</p>
      <img src="providers-logo.svg" alt="Providers logo" width="100px" height="100px"/>
    </div>
    <animate attributeName="opacity" style="opacity: 1" dur="3s" begin="in(3.5)"/>
  </section>
  <!-- Section 6: Signers -->
  <section data-narration="Signers" style="margin-top: 20px;">
    <div style="text-align: center;">
      <h2>Signers</h2>
      <p>ethers.js supports multiple signers.</p>
      <img src="signers-logo.svg" alt="Signers logo" width="100px" height="100px"/>
    </div>
    <animate attributeName="opacity" style="opacity: 1" dur="3s" begin="in(4.5)"/>
  </section>
  <!-- Footer -->
  <footer>
    <text x="50%" y="90%" font-size="30" fill="#4CAF50">Thread Libraries</text>
  </footer>
</svg>