<svg width="420" height="400" data-topic-id="thread-scheduling">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.5" />
  <text x="50%" y="20%" font-size="24" text-anchor="middle" fill="#3498db" font-family="Arial, sans-serif">Thread Scheduling</text>

  <section id="disk-structure">
    <rect x="20" y="80" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="90" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">Disk Structure</text>
    <text x="20" y="120" font-size="14" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>Platter: Circular disk surface <br />
      Track: Concentric circle on platter <br />
      Sector: Division of track <br />
      Cylinder: Same track on all platters</data-narration>
    </text>
  </section>

  <section id="seek-time-minimization">
    <rect x="20" y="150" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="160" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">Seek Time Minimization</text>
    <text x="20" y="190" font-size="14" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>Disk scheduling algorithms minimize total head movement.</data-narration>
    </text>
  </section>

  <section id="algorithms">
    <rect x="20" y="230" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="240" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">Algorithms</text>
    <rect x="20" y="270" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="280" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">FCFS (First-Come First-Served)</text>
    <text x="20" y="310" font-size="14" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>Process requests in arrival order.</data-narration>
    </text>
    <rect x="20" y="320" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="330" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">SSTF (Shortest Seek Time First)</text>
    <text x="20" y="360" font-size="14" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>Select request closest to current head position.</data-narration>
    </text>
    <rect x="20" y="370" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="380" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">SCAN (Elevator)</text>
    <text x="20" y="410" font-size="14" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>Move head in one direction servicing requests, then reverse.</data-narration>
    </text>
  </section>

  <section id="Comparison">
    <rect x="20" y="450" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="460" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">Comparison</text>
    <rect x="20" y="490" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="500" font-size="14" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>| Algorithm | Movement | Starvation | Variance |</data-narration>
    </text>
    <rect x="20" y="520" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="530" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>| FCFS      | High     | No         | High     |</data-narration>
    </text>
    <rect x="20" y="550" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="560" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>| SSTF      | Low      | Yes        | Medium   |</data-narration>
    </text>
    <rect x="20" y="580" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="590" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>| SCAN      | Medium   | No         | Medium   |</data-narration>
    </text>
    <rect x="20" y="620" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="630" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>| C-SCAN    | Medium   | No         | Low      |</data-narration>
    </text>
    <rect x="20" y="650" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="660" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>| LOOK / C-LOOK | Low      | No         | Medium   |</data-narration>
    </text>
    <rect x="20" y="680" width="400" height="30" fill="#f9f9f9" opacity="0.5" />
    <text x="20" y="690" font-size="18" text-anchor="start" fill="#666" font-family="Arial, sans-serif">
      <data-narration>| Formula   | Total Seek Time = Sum of |current - next| for all requests</data-narration>
    </text>
  </section>

  <animate id="animation" attributeName="opacity" from="0.5" to="1" dur="5s" begin="0s" repeatCount="indefinite" />
  <animate id="animation2" attributeName="opacity" from="1" to="0.5" dur="5s" begin="5s" repeatCount="indefinite" />

  <text x="50%" y="340%" font-size="24" text-anchor="middle" fill="#3498db" font-family="Arial, sans-serif">By: [Your Name]</text>
  <rect x="0" y="380%" width="420" height="20" fill="#f9f9f9" opacity="0.5" />
  <text x="50%" y="390%" font-size="18" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-weight="bold">Thread Scheduling</text>
</svg>