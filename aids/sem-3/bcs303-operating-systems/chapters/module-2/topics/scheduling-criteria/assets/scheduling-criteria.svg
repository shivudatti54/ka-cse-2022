<svg width="420" height="400" data-topic-id="scheduling-criteria">
  <defs>
    <linearGradient id="scheduling-criteria-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4682B4" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="380" fill="url(#scheduling-criteria-gradient)"/>

  <text x="15" y="20" font-size="24" font-family="Arial" fill="#2F4F7F" text-anchor="middle">Scheduling Criteria</text>

  <!-- Section 1: CPU Utilization -->
  <rect x="10" y="60" width="350" height="30" fill="#F7F7F7"/>
  <text x="15" y="60" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">CPU Utilization (%)</text>
  <text x="15" y="70" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Objective: High (40-90%)</text>
  <animateTransform attributeName="x" type="translate" from="15" to="15" begin="0s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="70" to="70" begin="0.5s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="70" to="60" begin="1s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="60" to="70" begin="1.5s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 2: Throughput -->
  <rect x="10" y="100" width="350" height="30" fill="#F7F7F7"/>
  <text x="15" y="100" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Throughput</text>
  <text x="15" y="110" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Objective: High</text>
  <animateTransform attributeName="x" type="translate" from="15" to="15" begin="0.5s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="110" to="110" begin="0.5s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="110" to="100" begin="1s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="100" to="110" begin="1.5s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 3: Turnaround Time -->
  <rect x="10" y="140" width="350" height="30" fill="#F7F7F7"/>
  <text x="15" y="140" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Turnaround Time</text>
  <text x="15" y="150" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Objective: Low</text>
  <animateTransform attributeName="x" type="translate" from="15" to="15" begin="1s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="150" to="150" begin="1s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="150" to="140" begin="1.5s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="140" to="150" begin="2s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 4: Waiting Time -->
  <rect x="10" y="180" width="350" height="30" fill="#F7F7F7"/>
  <text x="15" y="180" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Waiting Time</text>
  <text x="15" y="190" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Objective: Low</text>
  <animateTransform attributeName="x" type="translate" from="15" to="15" begin="2s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="190" to="190" begin="2s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="190" to="180" begin="2.5s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="180" to="190" begin="3s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 5: Response Time -->
  <rect x="10" y="220" width="350" height="30" fill="#F7F7F7"/>
  <text x="15" y="220" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Response Time</text>
  <text x="15" y="230" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Objective: Low</text>
  <animateTransform attributeName="x" type="translate" from="15" to="15" begin="3s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="230" to="230" begin="3s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="230" to="220" begin="3.5s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="220" to="230" begin="4s" dur="2s" repeatCount="indefinite"/>

  <!-- Section 6: Convoy Effect -->
  <rect x="10" y="260" width="350" height="30" fill="#F7F7F7"/>
  <text x="15" y="260" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Convoy Effect</text>
  <text x="15" y="270" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Short processes wait behind long ones</text>
  <animateTransform attributeName="x" type="translate" from="15" to="15" begin="4s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="270" to="270" begin="4s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="270" to="260" begin="4.5s" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="y" type="translate" from="260" to="270" begin="5s" dur="2s" repeatCount="indefinite"/>

  <!-- Footer -->
  <rect x="10" y="300" width="400" height="20" fill="#F7F7F7"/>
  <text x="15" y="300" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Scheduling Criteria</text>
</svg>