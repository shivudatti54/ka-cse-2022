<svg width="420" height="400" data-topic-id="process-management-process-concept">
  <title>Process Management: Process Concept</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#pastel-gradient)" rx="10" />
  <g id="title">
    <text x="20" y="20" font-size="24" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle">
      Process Management: Process Concept
    </text>
  </g>
  <g id="sections">
    <section data-narration="What is a Process?" style="background-color: #F5F5F5; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
      <g transform="translate(10, 60)">
        <rect width="300" height="150" style="fill: #F5F5F5;" rx="10" />
        <g>
          <text x="20" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
            What is a Process?
          </text>
          <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
            A process is a program in execution, which is a separate entity from the program itself.
          </text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0,60" to="0,70" begin="0s" dur="2s" repeatCount="indefinite" />
      </g>
    </section>
    <section data-narration="Characteristics of a Process" style="background-color: #87CEEB; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
      <g transform="translate(10, 130)">
        <rect width="300" height="150" style="fill: #87CEEB;" rx="10" />
        <g>
          <text x="20" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
            Characteristics of a Process
          </text>
          <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
            Each process has its own memory space, resources, and execution environment.
          </text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0,130" to="0,140" begin="0s" dur="2s" repeatCount="indefinite" />
      </g>
    </section>
    <section data-narration="Types of Processes" style="background-color: #C7B8EA; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
      <g transform="translate(10, 190)">
        <rect width="300" height="150" style="fill: #C7B8EA;" rx="10" />
        <g>
          <text x="20" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
            Types of Processes
          </text>
          <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
            There are two types of processes: background processes and foreground processes.
          </text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0,190" to="0,200" begin="0s" dur="2s" repeatCount="indefinite" />
      </g>
    </section>
    <section data-narration="Process Scheduling" style="background-color: #F5F5F5; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
      <g transform="translate(10, 250)">
        <rect width="300" height="150" style="fill: #F5F5F5;" rx="10" />
        <g>
          <text x="20" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
            Process Scheduling
          </text>
          <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
            Process scheduling is the mechanism by which the operating system assigns the CPU to processes.
          </text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0,250" to="0,260" begin="0s" dur="2s" repeatCount="indefinite" />
      </g>
    </section>
    <section data-narration="FCFS and Priority Scheduling" style="background-color: #87CEEB; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
      <g transform="translate(10, 310)">
        <rect width="300" height="150" style="fill: #87CEEB;" rx="10" />
        <g>
          <text x="20" y="20" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">
            FCFS and Priority Scheduling
          </text>
          <text x="20" y="50" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">
            There are two types of process scheduling algorithms: first-come-first-served and priority scheduling.
          </text>
        </g>
        <animateTransform attributeName="transform" type="translate" from="0,310" to="0,320" begin="0s" dur="2s" repeatCount="indefinite" />
      </g>
    </section>
    <g id="footer">
      <text x="20" y="380" font-size="18" font-family="Arial, sans-serif" text-anchor="bottom">
        Process Management: Process Concept
      </text>
    </g>
  </g>
  <g id="connections">
    <line x1="20" y1="60" x2="20" y2="100" stroke-width="2" stroke="#000" />
    <line x1="20" y1="100" x2="20" y2="140" stroke-width="2" stroke="#000" />
    <line x1="20" y1="140" x2="20" y2="180" stroke-width="2" stroke="#000" />
    <line x1="20" y1="180" x2="20" y2="220" stroke-width="2" stroke="#000" />
  </g>
</svg>