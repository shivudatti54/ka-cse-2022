<svg width="420" height="400" data-topic-id="multiple-processor-scheduling-textbook-1-chapter-3">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)" rx="10" />
  
  <!-- Title at top -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2E4053">
    Multiple-Processor Scheduling
  </text>
  
  <!-- Section 1: Process Scheduling -->
  <section x="20%" y="100%" data-narration="Process scheduling is the allocation of a set of resources to a process and the allocation of time to the process.">
    <rect x="20%" y="100%" width="90%" height="80%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="120%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2E4053">
      Types of Process Scheduling:
    </text>
    <text x="30%" y="140%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2E4053">
      - First-Come-First-Served (FCFS)
      - Shortest Job First (SJF)
      - Priority Scheduling
    </text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="0,100" to="0,200" begin="0s" dur="2s" repeatCount="indefinite" />
  
  <!-- Section 2: Process Characteristics -->
  <section x="20%" y="240%" data-narration="Processes have several characteristics that affect their scheduling needs.">
    <rect x="20%" y="240%" width="90%" height="80%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="260%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2E4053">
      Process Characteristics:
    </text>
    <text x="30%" y="280%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2E4053">
      - Process Arrival Time
      - Process Burst Time
      - Priority
      - Resource Requirements
    </text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="0,250" to="0,350" begin="2s" dur="2s" repeatCount="indefinite" />
  
  <!-- Section 3: Scheduling Algorithms -->
  <section x="20%" y="380%" data-narration="Scheduling algorithms are used to schedule processes in a system.">
    <rect x="20%" y="380%" width="90%" height="80%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="400%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2E4053">
      Scheduling Algorithms:
    </text>
    <text x="30%" y="420%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2E4053">
      - Round Robin Scheduling
      - Multilevel Feedback Queue (MLFQ) Scheduling
      - Earliest Deadline First (EDF) Scheduling
    </text>
  </section>
  <animateTransform attributeName="transform" type="translate" from="0,390" to="0,490" begin="4s" dur="2s" repeatCount="indefinite" />
  
  <!-- Footer at bottom -->
  <text x="50%" y="400%" font-size="18" font-family="Arial" text-anchor="middle" fill="#2E4053">
    2023 Educational Diagram
  </text>
</svg>