<svg width="420" height="400" data-topic-id="inter-process-communication-multi-threaded-programming">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1" />
      <stop offset="100%" stop-color="#CCFFCC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="50" width="400" height="20" fill="#1A64FF" rx="5" />
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,60" dur="2s" begin="0s" />
    <text x="20" y="60" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Inter-Process Communication and Multi-Threaded Programming</text>
    <line x1="20" y1="60" x2="20" y2="60" stroke="#FFFFFF" stroke-width="2" />
  </section>
  
  <!-- Section 2: Types of IPC -->
  <section data-narration="Types of IPC">
    <rect x="10" y="80" width="400" height="60" fill="#66CCCC" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,80" to="0,100" dur="2s" begin="0s" />
    <text x="20" y="90" font-size="16" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Synchronous IPC</text>
    <line x1="20" y1="100" x2="20" y2="100" stroke="#FFFFFF" stroke-width="2" />
    <rect x="10" y="120" width="400" height="60" fill="#66CCCC" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,120" to="0,140" dur="2s" begin="1s" />
    <text x="20" y="130" font-size="16" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Asynchronous IPC</text>
    <line x1="20" y1="140" x2="20" y2="140" stroke="#FFFFFF" stroke-width="2" />
  </section>
  
  <!-- Section 3: Message Passing IPC -->
  <section data-narration="Message Passing IPC">
    <rect x="10" y="160" width="400" height="60" fill="#66CCCC" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,160" to="0,180" dur="2s" begin="2s" />
    <text x="20" y="170" font-size="16" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Message Passing IPC</text>
    <line x1="20" y1="180" x2="20" y2="180" stroke="#FFFFFF" stroke-width="2" />
    <rect x="10" y="200" width="400" height="60" fill="#66CCCC" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,200" to="0,220" dur="2s" begin="3s" />
    <text x="20" y="210" font-size="16" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Shared Memory IPC</text>
    <line x1="20" y1="220" x2="20" y2="220" stroke="#FFFFFF" stroke-width="2" />
  </section>
  
  <!-- Section 4: IPC Mechanisms -->
  <section data-narration="IPC Mechanisms">
    <rect x="10" y="240" width="400" height="60" fill="#66CCCC" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,240" to="0,260" dur="2s" begin="4s" />
    <text x="20" y="250" font-size="16" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Channels</text>
    <line x1="20" y1="260" x2="20" y2="260" stroke="#FFFFFF" stroke-width="2" />
    <rect x="10" y="280" width="400" height="60" fill="#66CCCC" rx="10" />
    <animateTransform attributeName="transform" type="translate" from="0,280" to="0,300" dur="2s" begin="5s" />
    <text x="20" y="290" font-size="16" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Semaphores</text>
    <line x1="20" y1="300" x2="20" y2="300" stroke="#FFFFFF" stroke-width="2" />
  </section>
  
  <!-- Title and Footer -->
  <rect x="10" y="20" width="400" height="20" fill="#1A64FF" rx="5" />
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Inter-Process Communication and Multi-Threaded Programming</text>
  <rect x="10" y="350" width="400" height="20" fill="#1A64FF" rx="5" />
  <text x="20" y="360" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">2023</text>
</svg>