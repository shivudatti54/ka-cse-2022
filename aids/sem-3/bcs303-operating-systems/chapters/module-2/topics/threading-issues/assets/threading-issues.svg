<svg width="420" height="400" data-topic-id="Threading-Issues">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="40" fill="#2E4053" rx="10"/>
  <text x="15" y="30" font-size="24" fill="#66CCCC" font-weight="bold">Threading Issues</text>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f5ce7" stop-opacity="1" />
      <stop offset="100%" stop-color="#4f66ff" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="50" width="420" height="300" fill="url(#gradient)"/>

  <!-- Section 1: Deadlocks -->
  <section id="section1" data-narration="Deadlocks occur when two or more threads are blocked indefinitely, each waiting for the other to release a resource.">
    <rect x="10" y="60" width="400" height="100" fill="#4f66ff" rx="10"/>
    <text x="15" y="80" font-size="18" fill="#f0f0f0">Causes of Deadlocks:</text>
    <ul>
      <li>
        <text x="10" y="100">Mutual Exclusion</text>
        <text x="200" y="100">Two threads require exclusive access to a shared resource.</text>
      </li>
      <li>
        <text x="10" y="120">Hold and Wait</text>
        <text x="200" y="120">A thread holds a resource and waits for another resource, which is held by another thread.</text>
      </li>
      <li>
        <text x="10" y="140">No Preemption</text>
        <text x="200" y="140">The operating system does not preempt one thread to give another thread access to a resource.</text>
      </li>
    </ul>
    <animate transform="rotate(360 200 200)" begin="100" dur="5000" repeatCount="indefinite"/>
  </section>

  <!-- Section 2: Starvation -->
  <section id="section2" data-narration="Starvation occurs when a thread is unable to access a shared resource due to other threads holding onto it for an extended period.">
    <rect x="10" y="170" width="400" height="100" fill="#33ccff" rx="10"/>
    <text x="15" y="190" font-size="18" fill="#f0f0f0">Causes of Starvation:</text>
    <ul>
      <li>
        <text x="10" y="210">Priority Ceiling Problem</text>
        <text x="200" y="210">A thread with a high priority holds a resource, preventing lower-priority threads from accessing it.</text>
      </li>
      <li>
        <text x="10" y="230">Unfair Sharing</text>
        <text x="200" y="230">A thread holds a resource for an extended period, preventing other threads from accessing it.</text>
      </li>
    </ul>
    <animate transform="rotate(360 200 200)" begin="300" dur="5000" repeatCount="indefinite"/>
  </section>

  <!-- Section 3: Deadlock Example -->
  <section id="section3" data-narration="Suppose two threads, T1 and T2, are accessing two resources, R1 and R2. T1 holds R1 and waits for R2, while T2 holds R2 and waits for R1.">
    <rect x="10" y="260" width="400" height="100" fill="#4f66ff" rx="10"/>
    <text x="15" y="280" font-size="18" fill="#f0f0f0">Example:</text>
    <text x="10" y="300">| Thread | Resource |</text>
    <text x="10" y="320">| T1     | R1       |</text>
    <text x="200" y="320">| T2     | R2       |</text>
    <animate transform="rotate(360 200 200)" begin="400" dur="5000" repeatCount="indefinite"/>
  </section>

  <!-- Section 4: Starvation Example -->
  <section id="section4" data-narration="Suppose two threads, T1 and T2, are accessing a shared resource. T1 has a high priority and holds the resource for a long time, preventing T2 from accessing it.">
    <rect x="10" y="310" width="400" height="100" fill="#33ccff" rx="10"/>
    <text x="15" y="330" font-size="18" fill="#f0f0f0">Example:</text>
    <text x="10" y="350">| Thread | Priority | Resource |</text>
    <text x="10" y="370">| T1     | High     | R1       |</text>
    <text x="200" y="370">| T2     | Low      | R1       |</text>
    <animate transform="rotate(360 200 200)" begin="500" dur="5000" repeatCount="indefinite"/>
  </section>

  <!-- Section 5: Preventing Deadlocks -->
  <section id="section5" data-narration="To prevent deadlocks, ensure that threads acquire resources in the same order and release resources in the same order.">
    <rect x="10" y="410" width="400" height="100" fill="#66cccc" rx="10"/>
    <text x="15" y="430" font-size="18" fill="#f0f0f0">Prevention:</text>
    <text x="10" y="450">1. Acquire resources in the same order.</text>
    <text x="10" y="470">2. Release resources in the same order.</text>
    <animate transform="rotate(360 200 200)" begin="600" dur="5000" repeatCount="indefinite"/>
  </section>

  <!-- Section 6: Preventing Starvation -->
  <section id="section6" data-narration="To prevent starvation, ensure that threads are given equal access to resources and avoid holding onto resources for extended periods.">
    <rect x="10" y="510" width="400" height="100" fill="#66cccc" rx="10"/>
    <text x="15" y="530" font-size="18" fill="#f0f0f0">Prevention:</text>
    <text x="10" y="550">1. Give equal access to resources.</text>
    <text x="10" y="570">2. Avoid holding onto resources for extended periods.</text>
    <animate transform="rotate(360 200 200)" begin="700" dur="5000" repeatCount="indefinite"/>
  </section>

  <!-- Footer -->
  <rect x="10" y="330" width="400" height="40" fill="#2E4053" rx="10"/>
  <text x="15" y="350" font-size="14" fill="#fff">Copyright 2023</text>
</svg>