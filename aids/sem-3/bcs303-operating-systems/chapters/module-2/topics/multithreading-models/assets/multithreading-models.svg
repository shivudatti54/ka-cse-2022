<svg width="420" height="400" data-topic-id="multithreading-models" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <!-- Gradient background with pastel colors -->
    <defs>
        <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect fill="url(#background-gradient)" width="420" height="400" rx="10"/>
    
    <!-- Title -->
    <g transform="translate(20, 20)">
        <text text-anchor="start" font-size="24" font-family="Arial" fill="#3498DB" data-narration="Introduction to Multithreading">
            Multithreading Models
        </text>
    </g>
    
    <!-- Section 1: Introduction to Multithreading -->
    <g transform="translate(20, 60)">
        <rect width="380" height="40" fill="#F7F7F7" rx="5"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Key benefits of multithreading: Responsiveness, Resource sharing, Economy, Scalability">
            Key Benefits
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 20, 20)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Responsiveness: Applications remain responsive even when part of the program is blocked">
            Responsiveness
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 40, 20)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Resource sharing: Threads share process resources efficiently">
            Resource sharing
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 60, 20)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Economy: Thread creation is faster and cheaper than process creation">
            Economy
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 80, 20)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Scalability: Better utilization of multiprocessor architectures">
            Scalability
        </text>
    </g>
    
    <!-- Section 2: Thread Concepts -->
    <g transform="translate(20, 110)">
        <rect width="380" height="40" fill="#F7F7F7" rx="5"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Introduction to Thread Concepts: User Threads vs Kernel Threads">
            Thread Concepts
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 20, 20)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="User Threads: Managed entirely by user-level libraries without kernel support">
            User Threads
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 40, 20)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Kernel Threads: Supported and managed directly by the operating system kernel">
            Kernel Threads
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 60, 20)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Comparison Table: User vs Kernel Threads">
            Comparison Table
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 80, 20)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Key differences: Management, Speed, and Requirements">
            Key differences
        </text>
    </g>
    
    <!-- Comparison Table -->
    <g transform="translate(20, 160)">
        <rect width="380" height="200" fill="#F7F7F7" rx="5"/>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 20, 200)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Management: User-level library vs Operating System">
            Management
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 40, 200)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Speed: Fast creation/context switch">
            Speed
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 60, 200)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Requirements: Fast context switch, Low overhead">
            Requirements
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 80, 200)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Operating System: Handles thread scheduling, Context switching, and synchronization">
            Operating System
        </text>
    </g>
    
    <!-- Section 3: User Threads -->
    <g transform="translate(20, 360)">
        <rect width="380" height="40" fill="#F7F7F7" rx="5"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="User Threads: Managed entirely by user-level libraries">
            User Threads
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 20, 370)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Characteristics: Fast creation, Low overhead, No kernel support">
            Characteristics
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 40, 370)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Limitations: Slow context switching, Limited synchronization support">
            Limitations
        </text>
    </g>
    
    <!-- Section 4: Kernel Threads -->
    <g transform="translate(20, 410)">
        <rect width="380" height="40" fill="#F7F7F7" rx="5"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Kernel Threads: Supported and managed directly by the operating system kernel">
            Kernel Threads
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 20, 420)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Characteristics: Fast context switching, Synchronized access to shared resources">
            Characteristics
        </text>
        <rect width="20" height="20" fill="#F7F7F7" rx="5" transform="rotate(45, 40, 420)"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666" data-narration="Advantages: Efficient thread management, Synchronized access to shared resources">
            Advantages
        </text>
    </g>
    
    <!-- Footer -->
    <g transform="translate(20, 460)">
        <rect width="380" height="40" fill="#F7F7F7" rx="5"/>
        <text text-anchor="start" font-size="18" font-family="Arial" fill="#666666">
            Developed by [Your Name]
        </text>
    </g>
</svg>