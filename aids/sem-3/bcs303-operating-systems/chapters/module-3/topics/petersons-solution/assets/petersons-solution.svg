<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="petersons-solution">
  <style>
    /* Set up the gradient background */
    body {
      background: #66CCCC; /* Pastel blue background */
      background: linear-gradient(to bottom, #66CCCC, #0097A7); /* Gradient effect */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Style the title and footer */
    .title {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 24px;
      font-weight: bold;
      color: #0097A7; /* Indigo color */
    }
    
    .footer {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 14px;
      color: #666;
    }
    
    /* Style the sections */
    .section {
      position: relative;
      margin-bottom: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    
    /* Style the arrows */
    .arrow {
      position: absolute;
      width: 20px;
      height: 20px;
      stroke: #0097A7; /* Indigo color */
      stroke-dasharray: 10 10;
      stroke-dashoffset: 10;
      transition: stroke-dashoffset 0.2s ease-in-out;
    }
    
    .arrow::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      stroke: #0097A7; /* Indigo color */
      stroke-dasharray: 10 10;
      stroke-dashoffset: 10;
      transition: stroke-dashoffset 0.2s ease-in-out;
    }
  </style>

  <!-- Title and footer -->
  <g class="title">Peterson's Solution</g>
  <g class="footer">Copyright 2023</g>

  <!-- Section 1: Introduction -->
  <g class="section" data-narration="What is the Critical Section Problem?">
    <rect x="10" y="10" width="400" height="120" fill="#FFFFFF" rx="10" />
    <text x="20" y="40" font-size="18" font-weight="bold">Critical Section Problem</text>
    <text x="20" y="60" font-size="14">Multiple threads need to access a shared resource simultaneously.</text>
    <animate begin="0s" dur="2s" attributeName="opacity" values="0; 1" repeatCount="indefinite" />
  </g>

  <!-- Section 2: Peterson's Solution Overview -->
  <g class="section" data-narration="Peterson’s Solution Overview">
    <rect x="10" y="10" width="400" height="120" fill="#FFFFFF" rx="10" />
    <text x="20" y="40" font-size="18" font-weight="bold">Peterson's Solution</text>
    <text x="20" y="60" font-size="14">A synchronization algorithm using shared variables.</text>
    <animate begin="2s" dur="2s" attributeName="opacity" values="0; 1" repeatCount="indefinite" />
  </g>

  <!-- Section 3: How Peterson’s Solution Works -->
  <g class="section" data-narration="How Peterson’s Solution Works">
    <rect x="10" y="10" width="400" height="200" fill="#FFFFFF" rx="10" />
    <g>
      <rect x="20" y="20" width="50" height="50" fill="#0097A7" rx="10" />
      <text x="30" y="40" font-size="18" font-weight="bold">var</text>
      <animate begin="4s" dur="2s" attributeName="transform" values="translate(20, 20); rotate(45deg); translate(-20, -20)" repeatCount="indefinite" />
    </g>
    <g>
      <rect x="90" y="20" width="50" height="50" fill="#0097A7" rx="10" />
      <text x="100" y="40" font-size="18" font-weight="bold">flag</text>
      <animate begin="6s" dur="2s" attributeName="transform" values="translate(90, 20); rotate(45deg); translate(-90, -20)" repeatCount="indefinite" />
    </g>
    <g>
      <rect x="20" y="100" width="400" height="100" fill="#FF9900" rx="10" />
      <text x="30" y="120" font-size="18" font-weight="bold">Thread 1</text>
      <animate begin="8s" dur="2s" attributeName="transform" values="translate(20, 100); rotate(45deg); translate(-20, -100)" repeatCount="indefinite" />
    </g>
    <g>
      <rect x="90" y="100" width="400" height="100" fill="#FF9900" rx="10" />
      <text x="100" y="120" font-size="18" font-weight="bold">Thread 2</text>
      <animate begin="10s" dur="2s" attributeName="transform" values="translate(90, 100); rotate(45deg); translate(-90, -100)" repeatCount="indefinite" />
    </g>
  </g>

  <!-- Section 4: Key Concepts -->
  <g class="section" data-narration="Key Concepts">
    <rect x="10" y="10" width="400" height="120" fill="#FFFFFF" rx="10" />
    <g>
      <circle cx="20" cy="20" r="10" fill="#0097A7" />
      <text x="30" y="40" font-size="18" font-weight="bold">Shared Variables</text>
    </g>
    <g>
      <circle cx="90" cy="20" r="10" fill="#0097A7" />
      <text x="100" y="40" font-size="18" font-weight="bold">Flag</text>
    </g>
    <g>
      <circle cx="20" cy="100" r="10" fill="#0097A7" />
      <text x="30" y="120" font-size="18" font-weight="bold">Local Variable</text>
    </g>
    <g>
      <line x1="20" y1="20" x2="90" y2="20" stroke="#0097A7" />
      <text x="30" y="40" font-size="14">Indicates thread access</text>
    </g>
  </g>

  <!-- Section 5: Conclusion -->
  <g class="section" data-narration="Conclusion">
    <rect x="10" y="10" width="400" height="120" fill="#FFFFFF" rx="10" />
    <text x="20" y="40" font-size="18" font-weight="bold">Peterson's Solution</text>
    <text x="20" y="60" font-size="14">A cooperative solution for the critical section problem.</text>
    <animate begin="12s" dur="2s" attributeName="opacity" values="0; 1" repeatCount="indefinite" />
  </g>

  <!-- Footer -->
  <g class="footer">Copyright 2023</g>
</svg>