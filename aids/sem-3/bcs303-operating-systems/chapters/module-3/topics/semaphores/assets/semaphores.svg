<svg width="420" height="400" data-topic-id="semaphore" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Add some basic styling to the SVG */
    * {
      font-family: Arial, sans-serif;
      text-size-adjust: 100%;
    }
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
    }
  </style>

  <defs>
    <linearGradient id="pastel-linear-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA"/>
      <stop offset="100%" stop-color="#F7F2C4"/>
    </linearGradient>
    <linearGradient id="pastel-linear-gradient-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5D8B6"/>
      <stop offset="100%" stop-color="#F7DC6F"/>
    </linearGradient>
  </defs>

  <!-- Gradient background with pastel colors -->
  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-linear-gradient)"/>
  <rect x="0" y="0" width="420" height="400" style="fill: url(#pastel-linear-gradient-2)"/>
  <rect x="0" y="0" width="420" height="400" style="fill: #F7F2C4"/>
  <rect x="0" y="0" width="420" height="400" style="fill: #2c3e50" opacity="0.1"/>

  <!-- Title at the top -->
  <g transform="translate(10, 10)">
    <text class="center" data-narration="Introduction to Semaphores" x="150" y="50">Semaphores</text>
  </g>

  <!-- Section 1: Introduction -->
  <g transform="translate(10, 100)">
    <rect width="400" height="50" style="fill: #F7F2C4"/>
    <rect x="0" y="0" width="400" height="50" style="fill: #2c3e50" opacity="0.1"/>
    <text class="center" data-narration="Semaphores are synchronization tools that provide a simple yet powerful mechanism for controlling access to a common resource by multiple processes or threads in a concurrent system." x="150" y="30">Mutual Exclusion</text>
    <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" from="0 0" to="0 100" repeatCount="indefinite"/>
  </g>

  <!-- Section 2: What is a Semaphore -->
  <g transform="translate(10, 200)">
    <rect width="400" height="50" style="fill: #F7F2C4"/>
    <rect x="0" y="0" width="400" height="50" style="fill: #2c3e50" opacity="0.1"/>
    <text class="center" data-narration="A semaphore is an integer variable that, apart from initialization, is accessed only through two standard atomic operations: wait() and signal(). &quot;Atomic&quot; means that these operations are executed as a single, uninterruptible unit." x="150" y="30">Semaphores</text>
    <animateTransform attributeName="transform" type="translate" begin="2s" dur="2s" from="0 0" to="0 200" repeatCount="indefinite"/>
  </g>

  <!-- Section 3: Requirements -->
  <g transform="translate(10, 300)">
    <rect width="400" height="50" style="fill: #F7F2C4"/>
    <rect x="0" y="0" width="400" height="50" style="fill: #2c3e50" opacity="0.1"/>
    <text class="center" data-narration="The requirements for a semaphore are: 1. Mutual Exclusion: Only one process can be in its critical section at a time. 2. Progress: If no process is in its critical section, a process that wishes to enter must be allowed to do so without delay. 3. Bounded Waiting: A process must only wait a finite amount of time before it is granted entry to its critical section." x="150" y="30">Requirements</text>
    <animateTransform attributeName="transform" type="translate" begin="4s" dur="2s" from="0 0" to="0 300" repeatCount="indefinite"/>
  </g>

  <!-- Section 4: Types of Semaphores -->
  <g transform="translate(10, 400)">
    <rect width="400" height="50" style="fill: #F7F2C4"/>
    <rect x="0" y="0" width="400" height="50" style="fill: #2c3e50" opacity="0.1"/>
    <text class="center" data-narration="Semaphores can be classified into two types: 1. Binary Semaphores: These have a value of either 0 or 1. 2. Counting Semaphores: These have a value greater than 0." x="150" y="30">Types of Semaphores</text>
    <animateTransform attributeName="transform" type="translate" begin="6s" dur="2s" from="0 0" to="0 400" repeatCount="indefinite"/>
  </g>

  <!-- Section 5: Operations -->
  <g transform="translate(10, 500)">
    <rect width="400" height="50" style="fill: #F7F2C4"/>
    <rect x="0" y="0" width="400" height="50" style="fill: #2c3e50" opacity="0.1"/>
    <text class="center" data-narration="The two atomic operations that can be performed on a semaphore are: 1. Wait(): This operation decreases the semaphore value by 1 and blocks until the semaphore value becomes greater than 0. 2. Signal(): This operation increases the semaphore value by 1 and allows a blocked process to proceed." x="150" y="30">Operations</text>
    <animateTransform attributeName="transform" type="translate" begin="8s" dur="2s" from="0 0" to="0 500" repeatCount="indefinite"/>
  </g>

  <!-- Section 6: Conclusion -->
  <g transform="translate(10, 600)">
    <rect width="400" height="50" style="fill: #F7F2C4"/>
    <rect x="0" y="0" width="400" height="50" style="fill: #2c3e50" opacity="0.1"/>
    <text class="center" data-narration="In conclusion, semaphores are essential synchronization tools that provide a simple yet powerful mechanism for controlling access to a common resource by multiple processes or threads in a concurrent system." x="150" y="30">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" begin="10s" dur="2s" from="0 0" to="0 600" repeatCount="indefinite"/>
  </g>

  <!-- Footer -->
  <text x="10" y="370" class="center" data-narration="Animated Educational Diagram: Semaphores">Footer</text>
</svg>