<svg width="420" height="400" data-topic-id="classical-synchronization-problems">
  <!-- Title -->
  <rect x="10" y="10" width="400" height="20" fill="#3B5998" rx="5"/>
  <text x="15" y="25" fill="#fff" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Classical Synchronization Problems</text>

  <!-- Gradient background -->
  <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
    <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
  </linearGradient>
  <rect x="10" y="35" width="400" height="300" fill="url(#pastel-gradient)" rx="5"/>

  <!-- Section 1: Introduction -->
  <section id="section-1" data-narration="introduction">
    <rect x="10" y="40" width="400" height="50" fill="#3B5998" rx="5"/>
    <text x="15" y="55" fill="#fff" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Introduction</text>
    <animateTransform attributeName="transform" type="translate" from="0,40" to="0,50" dur="0.5s" begin="0s"/>
  </section>

  <!-- Section 2: Critical Section Problem Revisited -->
  <section id="section-2" data-narration="critical-section-problem-revisited">
    <rect x="10" y="40" width="400" height="50" fill="#3B5998" rx="5"/>
    <text x="15" y="55" fill="#fff" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Critical Section Problem Revisited</text>
    <animateTransform attributeName="transform" type="translate" from="0,40" to="0,50" dur="0.5s" begin="0.5s"/>
  </section>

  <!-- Section 3: Semaphore Recap -->
  <section id="section-3" data-narration="semaphore-recap">
    <rect x="10" y="40" width="400" height="50" fill="#3B5998" rx="5"/>
    <text x="15" y="55" fill="#fff" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Semaphore Recap</text>
    <animateTransform attributeName="transform" type="translate" from="0,40" to="0,50" dur="0.5s" begin="1s"/>
  </section>

  <!-- Section 4: The Producer-Consumer Problem -->
  <section id="section-4" data-narration="producer-consumer-problem">
    <rect x="10" y="40" width="400" height="50" fill="#3B5998" rx="5"/>
    <text x="15" y="55" fill="#fff" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">The Producer-Consumer Problem</text>
    <animateTransform attributeName="transform" type="translate" from="0,40" to="0,50" dur="0.5s" begin="1.5s"/>
  </section>

  <!-- Section 5: Mutual Exclusion -->
  <section id="section-5" data-narration="mutual-exclusion">
    <rect x="10" y="40" width="400" height="50" fill="#3B5998" rx="5"/>
    <text x="15" y="55" fill="#fff" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Mutual Exclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0,40" to="0,50" dur="0.5s" begin="2s"/>
  </section>

  <!-- Section 6: Bounded Waiting -->
  <section id="section-6" data-narration="bounded-waiting">
    <rect x="10" y="40" width="400" height="50" fill="#3B5998" rx="5"/>
    <text x="15" y="55" fill="#fff" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Bounded Waiting</text>
    <animateTransform attributeName="transform" type="translate" from="0,40" to="0,50" dur="0.5s" begin="2.5s"/>
  </section>

  <!-- Footer -->
  <rect x="10" y="370" width="400" height="30" fill="#3B5998" rx="5"/>
  <text x="15" y="385" fill="#fff" font-size="14" font-family="Arial, sans-serif" text-anchor="middle">Educational Diagram</text>
</svg>