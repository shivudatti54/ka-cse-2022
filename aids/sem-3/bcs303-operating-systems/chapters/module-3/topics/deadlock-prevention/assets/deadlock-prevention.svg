<svg width="420" height="400" data-topic-id="deadlock-prevention">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
            <stop offset="100%" stop-color="#E8D8E8" stop-opacity="1" />
        </linearGradient>
        <style>
            .section {
                border: 1px solid black;
                margin-bottom: 20px;
            }
            .section-title {
                font-size: 18px;
                color: #2F4F7F;
            }
            .section-text {
                font-size: 14px;
                color: #455A64;
            }
            .arrow {
                fill: #2F4F7F;
            }
        </style>
    </defs>

    <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
    <title>Deadlock Prevention</title>

    <g>
        <rect x="10" y="50" width="100%" height="20" fill="#E8D8E8" class="section" data-narration="Strategies for deadlock prevention" />
        <g transform="translate(10, 60)">
            <rect width="100%" height="20" fill="#E8D8E8" class="section-title">Strategies</rect>
            <rect width="100%" height="20" fill="#E8D8E8" class="section-text" data-narration="Ensure at least ONE of the four necessary conditions cannot hold." />
        </g>

        <g>
            <rect x="10" y="120" width="100%" height="20" fill="#E8D8E8" class="section" data-narration="Breakdown of the four necessary conditions" />
            <g transform="translate(10, 140)">
                <rect width="100%" height="20" fill="#E8D8E8" class="section-title">Breakdown</rect>
                <rect width="100%" height="20" fill="#E8D8E8" class="section-text" data-narration="Mutual Exclusion: Ensure non-shareable resources are not requested simultaneously." />
                <rect x="20" y="160" width="100%" height="20" fill="#E8D8E8" class="section-text" data-narration="Hold and Wait: Request all resources at once or release all before requesting more." />
                <rect x="20" y="180" width="100%" height="20" fill="#E8D8E8" class="section-text" data-narration="No Preemption: If a request fails, release all held resources." />
                <rect x="20" y="200" width="100%" height="20" fill="#E8D8E8" class="section-text" data-narration="Circular Wait: Impose ordering on resources to prevent waiting in circles." />
            </g>
        </g>

        <g>
            <rect x="10" y="260" width="100%" height="20" fill="#E8D8E8" class="section" data-narration="Comparison of deadlock prevention strategies" />
            <g transform="translate(10, 280)">
                <rect width="100%" height="20" fill="#E8D8E8" class="section-title">Comparison</rect>
                <rect x="20" y="300" width="50%" height="20" fill="#E8D8E8" class="section-text" data-narration="| Condition        | Prevention Method   | Drawback              |" />
                <rect x="80" y="300" width="30%" height="20" fill="#E8D8E8" class="section-text" data-narration("| Mutual Exclusion | Spooling            | Limited applicability |" />
                <rect x="120" y="300" width="30%" height="20" fill="#E8D8E8" class="section-text" data-narration("| Hold and Wait    | Request all at once | Low utilization       |" />
                <rect x="180" y="300" width="30%" height="20" fill="#E8D8E8" class="section-text" data-narration("| No Preemption    | Release if denied   | Not always possible   |" />
                <rect x="240" y="300" width="30%" height="20" fill="#E8D8E8" class="section-text" data-narration("| Circular Wait    | Resource ordering   | Inconvenient          |" />
                <rect x="300" y="300" width="30%" height="20" fill="#E8D8E8" class="section-text" data-narration("|  Most Common: Circular Wait Prevention |" />
            </g>
        </g>

        <g>
            <rect x="10" y="350" width="100%" height="20" fill="#E8D8E8" class="section" data-narration="Conclusion" />
            <g transform="translate(10, 370)">
                <rect width="100%" height="20" fill="#E8D8E8" class="section-title">Conclusion</rect>
                <rect width="100%" height="20" fill="#E8D8E8" class="section-text" data-narration="Deadlock prevention involves finding a way to ensure at least one of the four necessary conditions cannot hold." />
            </g>
        </g>

        <g>
            <rect x="10" y="410" width="100%" height="20" fill="#E8D8E8" class="section" data-narration="References" />
            <g transform="translate(10, 430)">
                <rect width="100%" height="20" fill="#E8D8E8" class="section-title">References</rect>
                <rect x="20" y="460" width="80%" height="20" fill="#E8D8E8" class="section-text" data-narration="See study material for more information." />
            </g>
        </g>
    </g>

    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,400" dur="10s" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,380" dur="10s" begin="2s" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,360" dur="10s" begin="4s" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,340" dur="10s" begin="6s" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,320" dur="10s" begin="8s" />
</svg>