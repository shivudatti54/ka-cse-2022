<svg width="420" height="400" data-topic-id="methods-for-handling-deadlocks">
  <desc>Methods for Handling Deadlocks</desc>
  
  <defocus>
    <rect x="10" y="10" width="400" height="380" fill="#87CEEB" rx="10"/>
    <rect x="10" y="10" width="400" height="380" fill="#87CEEB" opacity="0.8"/>
  </defocus>
  
  <title>
    <text x="20" y="50" font-size="24" font-family="Arial" fill="#3498DB">Methods for Handling Deadlocks</text>
  </title>
  
  <section data-narration="Introduction">
    <rect x="10" y="100" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#666666">Deadlocks are a type of failure in a computer system where two or more processes are blocked indefinitely, each waiting for the other to release a resource.</text>
  </section>
  
  <section data-narration="Definition of Deadlock">
    <rect x="10" y="170" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="190" font-size="18" font-family="Arial" fill="#666666">A deadlock is a situation where two or more processes are blocked indefinitely, each waiting for the other to release a resource.</text>
  </section>
  
  <section data-narration="Types of Deadlocks">
    <rect x="10" y="220" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#666666">
      <animateBegin time="0" attributeName="opacity" from="1" to="0.5" dur="500"/>
      <animateBegin time="0" attributeName="opacity" from="0.5" to="1" dur="500"/>
      Resource Deadlock: Two or more processes are blocked because each is waiting for a resource held by the other.
      <animateBegin time="500" attributeName="opacity" from="1" to="0.5" dur="500"/>
      <animateBegin time="500" attributeName="opacity" from="0.5" to="1" dur="500"/>
      Synchronous Deadlock: Two or more processes are blocked because one process is waiting for another process to release a resource, which is held by a third process.
      <animateBegin time="1000" attributeName="opacity" from="1" to="0.5" dur="500"/>
      <animateBegin time="1000" attributeName="opacity" from="0.5" to="1" dur="500"/>
      Asynchronous Deadlock: Two or more processes are blocked because one process is waiting for a resource, but the other process is not.
    </text>
  </section>
  
  <section data-narration="Methods for Handling Deadlocks">
    <rect x="10" y="270" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="290" font-size="18" font-family="Arial" fill="#666666">
      <animateBegin time="0" attributeName="opacity" from="1" to="0.5" dur="500"/>
      <animateBegin time="0" attributeName="opacity" from="0.5" to="1" dur="500"/>
      Avoiding Deadlocks
      <animateBegin time="500" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="500" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Use Lock Ordering: Always lock resources in the same order to prevent deadlocks.
      <animateBegin time="1000" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="1000" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Use Timeout: Impose time limits on locks to prevent deadlocks.
      <animateBegin time="1500" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="1500" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Avoid Nested Locks: Avoid acquiring multiple locks in a nested manner to prevent deadlocks.
    </text>
  </section>
  
  <section data-narration="Detecting Deadlocks">
    <rect x="10" y="320" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="340" font-size="18" font-family="Arial" fill="#666666">
      <animateBegin time="0" attributeName="opacity" from="1" to="0.5" dur="500"/>
      <animateBegin time="0" attributeName="opacity" from="0.5" to="1" dur="500"/>
      Algorithms for Detecting Deadlocks
      <animateBegin time="500" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="500" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Banker's Algorithm: A dynamic algorithm that detects deadlocks by checking for safety and deadlock situations.
      <animateBegin time="1000" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="1000" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Morrison's Algorithm: An algorithm that detects deadlocks by checking for safety and deadlock situations.
    </text>
  </section>
  
  <section data-narration="Terminating Deadlocks">
    <rect x="10" y="370" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="390" font-size="18" font-family="Arial" fill="#666666">
      <animateBegin time="0" attributeName="opacity" from="1" to="0.5" dur="500"/>
      <animateBegin time="0" attributeName="opacity" from="0.5" to="1" dur="500"/>
      Terminating Deadlocks
      <animateBegin time="500" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="500" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Abortion: Terminate and discard both processes involved in the deadlock.
      <animateBegin time="1000" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="1000" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Rollback: Roll back the actions of both processes involved in the deadlock.
      <animateBegin time="1500" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="1500" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Restart: Restart the system after terminating both processes involved in the deadlock.
    </text>
  </section>
  
  <section data-narration="Preventing Deadlocks">
    <rect x="10" y="410" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="430" font-size="18" font-family="Arial" fill="#666666">
      <animateBegin time="0" attributeName="opacity" from="1" to="0.5" dur="500"/>
      <animateBegin time="0" attributeName="opacity" from="0.5" to="1" dur="500"/>
      Preventing Deadlocks
      <animateBegin time="500" attributeName="opacity" from="1" to="0.8" dur="500"/>
      <animateBegin time="500" attributeName="opacity" from="0.8" to="1" dur="500"/>
      Resource Pooling: Divide resources into pools to prevent deadlocks.
    </text>
  </section>
  
  <footer>
    <rect x="10" y="460" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="480" font-size="18" font-family="Arial" fill="#666666">
      <animateBegin time="0" attributeName="opacity" from="1" to="0.5" dur="500"/>
      <animateBegin time="0" attributeName="opacity" from="0.5" to="1" dur="500"/>
      This diagram illustrates the methods for handling deadlocks.
    </text>
  </footer>
</svg>