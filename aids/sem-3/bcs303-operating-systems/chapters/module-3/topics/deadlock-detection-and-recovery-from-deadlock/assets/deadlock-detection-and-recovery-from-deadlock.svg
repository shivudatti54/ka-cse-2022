<svg
  width="420"
  height="400"
  viewBox="0 0 420 400"
  data-topic-id="deadlock-detection-and-recovery-from-deadlock"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="background-color: #C7E9F4; font-family: Arial, sans-serif; font-size: 14px; color: #1A1D23;">

  <!-- Header Section -->
  <rect
    x="10"
    y="10"
    width="400"
    height="20"
    fill="#FFC5C5"
    rx="5"
    stroke="#1A1D23"
    stroke-width="2"
    stroke-dasharray="5,5"
    transform="rotate(45 20 10)"/>

  <text
    x="20"
    y="35"
    font-size="18px"
    font-weight="bold"
    text-anchor="middle"
    fill="#1A1D23"
    transform="rotate(45 20 10)">Deadlock Detection and Recovery</text>

  <!-- Section 1: Introduction -->
  <section
    id="section-1"
    data-narration="This is the introduction section."
    style="background-color: #E0F5F5; padding: 20px; border: 1px solid #1A1D23; margin: 20px 0;">

    <rect
      x="10"
      y="10"
      width="380"
      height="100"
      fill="#E0F5F5"
      rx="5"
      stroke="#1A1D23"
      stroke-width="2"
      stroke-dasharray="5,5"
      transform="rotate(45 20 10)"/>

    <text
      x="20"
      y="50"
      font-size="16px"
      font-weight="normal"
      text-anchor="middle"
      fill="#1A1D23"
      transform="rotate(45 20 10)">A deadlock is a situation in a computer system where two or more processes are unable to proceed because each is waiting for the other to release a resource.</text>

  </section>

  <!-- Section 2: Types of Deadlocks -->
  <section
    id="section-2"
    data-narration="This section explains the two types of deadlocks."
    style="background-color: #C7E9F4; padding: 20px; border: 1px solid #1A1D23; margin: 20px 0;">

    <rect
      x="10"
      y="10"
      width="380"
      height="100"
      fill="#C7E9F4"
      rx="5"
      stroke="#1A1D23"
      stroke-width="2"
      stroke-dasharray="5,5"
      transform="rotate(45 20 10)"/>

    <text
      x="20"
      y="50"
      font-size="16px"
      font-weight="normal"
      text-anchor="middle"
      fill="#1A1D23"
      transform="rotate(45 20 10)">There are two types of deadlocks:</text>

    <animate
      x="20"
      y="60"
      attributeName="cx"
      attributeNameValue="410"
      begin="0s"
      dur="2s"
      fill="freeze"/>

    <text
      x="20"
      y="60"
      font-size="16px"
      font-weight="normal"
      text-anchor="middle"
      fill="#1A1D23"
      transform="rotate(45 20 60)">

      <tspan>1. Natural Deadlock</tspan>
      <tspan>2. Cyclic Deadlock</tspan>

    </text>

  </section>

  <!-- Section 3: Deadlock Detection Methods -->
  <section
    id="section-3"
    data-narration="This section explains the deadlock detection methods."
    style="background-color: #1A1D23; padding: 20px; border: 1px solid #1A1D23; margin: 20px 0;">

    <rect
      x="10"
      y="10"
      width="380"
      height="100"
      fill="#1A1D23"
      rx="5"
      stroke="#C7E9F4"
      stroke-width="2"
      stroke-dasharray="5,5"
      transform="rotate(45 20 10)"/>

    <text
      x="20"
      y="50"
      font-size="16px"
      font-weight="normal"
      text-anchor="middle"
      fill="#C7E9F4"
      transform="rotate(45 20 50)">

      Deadlock detection methods include:
      <tspan>Banker's Algorithm</tspan>
      <tspan>Wait-for Graph</tspan>
      <tspan>Resource Allocation Graph</tspan>

    </text>

  </section>

  <!-- Section 4: Deadlock Detection Techniques -->
  <section
    id="section-4"
    data-narration="This section explains the deadlock detection techniques."
    style="background-color: #FFC5C5; padding: 20px; border: 1px solid #1A1D23; margin: 20px 0;">

    <rect
      x="10"
      y="10"
      width="380"
      height="100"
      fill="#FFC5C5"
      rx="5"
      stroke="#1A1D23"
      stroke-width="2"
      stroke-dasharray="5,5"
      transform="rotate(45 20 10)"/>

    <text
      x="20"
      y="50"
      font-size="16px"
      font-weight="normal"
      text-anchor="middle"
      fill="#1A1D23"
      transform="rotate(45 20 50)">

      Deadlock detection techniques include:
      <tspan>Static Analysis</tspan>
      <tspan>Dynamic Analysis</tspan>

    </text>

  </section>

  <!-- Section 5: Deadlock Recovery Methods -->
  <section
    id="section-5"
    data-narration="This section explains the deadlock recovery methods."
    style="background-color: #E0F5F5; padding: 20px; border: 1px solid #1A1D23; margin: 20px 0;">

    <rect
      x="10"
      y="10"
      width="380"
      height="100"
      fill="#E0F5F5"
      rx="5"
      stroke="#1A1D23"
      stroke-width="2"
      stroke-dasharray="5,5"
      transform="rotate(45 20 10)"/>

    <text
      x="20"
      y="50"
      font-size="16px"
      font-weight="normal"
      text-anchor="middle"
      fill="#1A1D23"
      transform="rotate(45 20 50)">

      Deadlock recovery methods include:
      <tspan>Process Termination</tspan>
      <tspan>Resource Preemption</tspan>

    </text>

  </section>

  <!-- Footer Section -->
  <rect
    x="10"
    y="370"
    width="400"
    height="30"
    fill="#FFC5C5"
    rx="5"
    stroke="#1A1D23"
    stroke-width="2"
    stroke-dasharray="5,5"
    transform="rotate(45 20 370)"/>

  <text
    x="20"
    y="390"
    font-size="14px"
    font-weight="normal"
    text-anchor="middle"
    fill="#1A1D23"
    transform="rotate(45 20 390)">

    Created by [Your Name]

  </text>

</svg>