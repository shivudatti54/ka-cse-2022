<svg width="420" height="400" data-topic-id="deadlocks-system-model">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <rect x="10" y="10" width="400" height="30" fill="url(#gradient)" rx="5"/>
  <text x="15" y="35" font-size="24" font-family="Arial" fill="#3498db" text-anchor="middle">Deadlocks System Model</text>

  <!-- Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="55" width="400" height="30" fill="url(#gradient)" rx="5"/>
    <text x="15" y="70" font-size="18" font-family="Arial" fill="#3498db" text-anchor="start">Introduction</text>
    <text x="15" y="90" font-size="16" font-family="Arial" fill="#666" text-anchor="start">In an operating system, a deadlock is a situation where two or more processes are blocked indefinitely, each waiting for a resource held by another process.</text>
  </section>

  <!-- Definition -->
  <section data-narration="Definition">
    <rect x="10" y="125" width="400" height="30" fill="url(#gradient)" rx="5"/>
    <text x="15" y="140" font-size="18" font-family="Arial" fill="#3498db" text-anchor="start">Definition</text>
    <text x="15" y="160" font-size="16" font-family="Arial" fill="#666" text-anchor="start">A deadlock is a situation where: each process is waiting for a resource held by another process, each process is holding a resource that is required by another process, and no process can proceed because each process is waiting for a resource held by another process.</text>
  </section>

  <!-- Deadlock Detection -->
  <section data-narration="Deadlock Detection">
    <rect x="10" y="195" width="400" height="30" fill="url(#gradient)" rx="5"/>
    <text x="15" y="210" font-size="18" font-family="Arial" fill="#3498db" text-anchor="start">Deadlock Detection</text>
    <text x="15" y="230" font-size="16" font-family="Arial" fill="#666" text-anchor="start">To detect a deadlock, we need to identify the resources being held by each process and the order in which they are waiting for each resource.</text>
  </section>

  <!-- Banker's Algorithm -->
  <section data-narration="Banker's Algorithm">
    <rect x="10" y="265" width="400" height="30" fill="url(#gradient)" rx="5"/>
    <text x="15" y="280" font-size="18" font-family="Arial" fill="#3498db" text-anchor="start">Banker's Algorithm</text>
    <text x="15" y="300" font-size="16" font-family="Arial" fill="#666" text-anchor="start">Create a resource allocation matrix that shows which processes are holding which resources, an available resources matrix that shows which resources are available, a finish time matrix that shows when each process will finish using all its resources, and a need matrix that shows how much each process needs each resource.</text>
  </section>

  <!-- Types of Deadlocks -->
  <section data-narration="Types of Deadlocks">
    <rect x="10" y="345" width="400" height="30" fill="url(#gradient)" rx="5"/>
    <text x="15" y="360" font-size="18" font-family="Arial" fill="#3498db" text-anchor="start">Types of Deadlocks</text>
    <text x="15" y="380" font-size="16" font-family="Arial" fill="#666" text-anchor="start">There are two types of deadlocks: multiprocess deadlock and uniprocess deadlock.</text>
  </section>

  <!-- Deadlock Prevention -->
  <section data-narration="Deadlock Prevention">
    <rect x="10" y="410" width="400" height="30" fill="url(#gradient)" rx="5"/>
    <text x="15" y="425" font-size="18" font-family="Arial" fill="#3498db" text-anchor="start">Deadlock Prevention</text>
    <text x="15" y="445" font-size="16" font-family="Arial" fill="#666" text-anchor="start">To prevent deadlocks, we can use the following strategies: avoid nested locks, avoid circular wait, and use deadlock detection algorithms.</text>
  </section>

  <!-- Footers -->
  <rect x="10" y="495" width="400" height="30" fill="url(#gradient)" rx="5"/>
  <text x="15" y="510" font-size="18" font-family="Arial" fill="#3498db" text-anchor="start">Footer</text>
</svg>