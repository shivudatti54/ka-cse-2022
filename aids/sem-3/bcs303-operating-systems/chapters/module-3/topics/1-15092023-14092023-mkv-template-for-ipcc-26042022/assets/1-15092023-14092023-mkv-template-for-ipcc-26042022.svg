<svg
  xmlns="http://www.w3.org/2000/svg"
  width="420"
  height="400"
  data-topic-id="critical-section-problem"
  viewBox="0 0 420 400"
  style="background-image: url('gradient.svg'); background-size: cover;">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="50" fill="#2E4053" rx="10"/>
  <text x="20" y="25" font-size="24" fill="#66CCCC" text-anchor="start">Critical Section Problem</text>
  
  <!-- Introduction Section -->
  <rect x="10" y="80" width="400" height="150" fill="#C7E5F5" rx="10"/>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" fill="freeze" attributeName="opacity" from="1" to="0">
    <path d="M 20,100 L 380,100" stroke="#66CCCC" stroke-width="2" stroke-linecap="round"/>
  </animate>
  <text x="20" y="100" font-size="18" fill="#2E4053" text-anchor="start">Introduction</text>
  <text x="20" y="120" font-size="16" fill="#666666" text-anchor="start">The Critical Section Problem is a classic problem in computer science that deals with the synchronization of multiple processes accessing a shared resource.</text>
  
  <!-- Problem Statement Section -->
  <rect x="10" y="270" width="400" height="150" fill="#C7E5F5" rx="10"/>
  <animate xmlns="http://www.w3.org/2000/svg" begin="2s" dur="2s" fill="freeze" attributeName="opacity" from="1" to="0">
    <path d="M 20,100 L 380,100" stroke="#66CCCC" stroke-width="2" stroke-linecap="round"/>
  </animate>
  <text x="20" y="100" font-size="18" fill="#2E4053" text-anchor="start">Problem Statement</text>
  <text x="20" y="120" font-size="16" fill="#666666" text-anchor="start">Suppose we have a shared resource, such as a printer or a file, that multiple processes want to access simultaneously.</text>
  <text x="20" y="140" font-size="16" fill="#666666" text-anchor="start">Each process needs to perform some operation on the shared resource, but they cannot access it at the same time.</text>
  
  <!-- Definition Section -->
  <rect x="10" y="430" width="400" height="150" fill="#C7E5F5" rx="10"/>
  <animate xmlns="http://www.w3.org/2000/svg" begin="4s" dur="2s" fill="freeze" attributeName="opacity" from="1" to="0">
    <path d="M 20,100 L 380,100" stroke="#66CCCC" stroke-width="2" stroke-linecap="round"/>
  </animate>
  <text x="20" y="100" font-size="18" fill="#2E4053" text-anchor="start">Definition</text>
  <text x="20" y="120" font-size="16" fill="#666666" text-anchor="start">A critical section is a portion of code that accesses and modifies a shared resource.</text>
  <text x="20" y="140" font-size="16" fill="#666666" text-anchor="start">It is called "critical" because it is the most important part of the process execution, and any other process that tries to access the critical section will be blocked until the current process completes its operation.</text>
  
  <!-- Key Concepts Section -->
  <rect x="10" y="590" width="400" height="150" fill="#C7E5F5" rx="10"/>
  <animate xmlns="http://www.w3.org/2000/svg" begin="6s" dur="2s" fill="freeze" attributeName="opacity" from="1" to="0">
    <path d="M 20,100 L 380,100" stroke="#66CCCC" stroke-width="2" stroke-linecap="round"/>
  </animate>
  <text x="20" y="100" font-size="18" fill="#2E4053" text-anchor="start">Key Concepts</text>
  <text x="20" y="120" font-size="16" fill="#666666" text-anchor="start">Mutual Exclusion (ME): The requirement that only one process can access the critical section at a time.</text>
  <text x="20" y="140" font-size="16" fill="#666666" text-anchor="start">Bounded Waiting (BW): The requirement that any process that waits for the critical section will not wait for more than a certain time.</text>
  <text x="20" y="160" font-size="16" fill="#666666" text-anchor="start">Ready Waiting (RW): The requirement that any process that waits for the critical section will not wait indefinitely.</text>
  
  <!-- Solutions Section -->
  <rect x="10" y="750" width="400" height="150" fill="#C7E5F5" rx="10"/>
  <animate xmlns="http://www.w3.org/2000/svg" begin="8s" dur="2s" fill="freeze" attributeName="opacity" from="1" to="0">
    <path d="M 20,100 L 380,100" stroke="#66CCCC" stroke-width="2" stroke-linecap="round"/>
  </animate>
  <text x="20" y="100" font-size="18" fill="#2E4053" text-anchor="start">Solutions</text>
  <text x="20" y="120" font-size="16" fill="#666666" text-anchor="start">The Banker's Algorithm is a deadlock detection and prevention algorithm that uses a circular buffer to store the availability of resources.</text>
  <text x="20" y="140" font-size="16" fill="#666666" text-anchor="start">It is a popular solution to the Critical Section Problem.</text>
  
  <!-- Footer Section -->
  <rect x="10" y="900" width="400" height="50" fill="#2E4053" rx="10"/>
  <text x="20" y="910" font-size="18" fill="#66CCCC" text-anchor="start">Critical Section Problem</text>
</svg>