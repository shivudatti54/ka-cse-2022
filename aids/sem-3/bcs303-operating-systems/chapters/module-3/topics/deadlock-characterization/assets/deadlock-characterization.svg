<svg width="420" height="400" data-topic-id="deadlock-characterization">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#B2A7F4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- SVG Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />

  <!-- Title Section -->
  <section data-narration="Title">
    <g transform="translate(10, 20)">
      <text font-size="30" font-family="Arial, sans-serif" text-anchor="middle" fill="#3B5998">
        Deadlock Characterization
      </text>
    </g>
  </section>

  <!-- Detection Algorithm Section -->
  <section data-narration="Detection Algorithm">
    <g transform="translate(10, 60)">
      <rect width="400" height="100" fill="#F7F7F7" rx="10" />
      <text font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Detection Algorithm:
      </text>
      <rect x="10" y="30" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="35" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Work = Available
      </text>
      <rect x="150" y="30" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="35" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Finish[i] = (Allocation[i] == 0)
      </text>
      <rect x="10" y="70" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="75" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Find i such that:
      </text>
      <rect x="150" y="70" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="75" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Finish[i] = false
        - Request[i] <= Work
      </text>
      <rect x="10" y="110" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="115" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Work = Work + Allocation[i]
        Finish[i] = true
      </text>
    </g>
  </section>

  <!-- When to Run Detection Section -->
  <section data-narration="When to Run Detection">
    <g transform="translate(10, 160)">
      <rect width="400" height="100" fill="#F7F7F7" rx="10" />
      <text font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        When to Run Detection:
      </text>
      <rect x="10" y="30" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="35" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - On every resource request (high overhead)
      </text>
      <rect x="150" y="30" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="35" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Periodically (e.g., every 5 minutes)
      </text>
      <rect x="10" y="70" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="75" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - When CPU utilization drops below threshold
      </text>
    </g>
  </section>

  <!-- Recovery Methods Section -->
  <section data-narration="Recovery Methods">
    <g transform="translate(10, 220)">
      <rect width="400" height="150" fill="#F7F7F7" rx="10" />
      <text font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Recovery Methods:
      </text>
      <rect x="10" y="30" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="35" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Process Termination
      </text>
      <rect x="150" y="30" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="35" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Abort ALL deadlocked processes
      </text>
      <rect x="10" y="80" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="85" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Abort one at a time until deadlock breaks
      </text>
      <rect x="150" y="80" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="85" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Re-run detection after each termination
      </text>
      <rect x="10" y="120" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="125" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Resource Preemption
      </text>
      <rect x="150" y="120" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="125" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Take resources from some processes, give to others
      </text>
      <rect x="10" y="160" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="165" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Rollback
      </text>
      <rect x="150" y="160" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="165" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Roll back process to safe checkpoint and restart
      </text>
      <rect x="10" y="200" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="205" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Comparing Methods
      </text>
      <rect x="150" y="200" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="205" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Prevention
      </text>
      <rect x="10" y="240" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="245" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Avoidance
      </text>
      <rect x="150" y="240" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="245" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Detection
      </text>
      <rect x="10" y="280" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="285" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Ignore
      </text>
    </g>
  </section>

  <!-- Example Section -->
  <section data-narration="Example">
    <g transform="translate(10, 320)">
      <rect width="400" height="100" fill="#F7F7F7" rx="10" />
      <text font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Example
      </text>
      <rect x="10" y="30" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="35" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        5 processes, 3 resource types
      </text>
      <rect x="150" y="30" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="35" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Allocation
      </text>
      <rect x="10" y="70" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="75" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Requirements:
      </text>
      <rect x="150" y="70" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="155" y="75" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        1. Work = Available
      </text>
      <rect x="300" y="70" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="305" y="75" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        2. Finish[i] = (Allocation[i] == 0)
      </text>
      <rect x="10" y="110" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="115" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Find i such that:
      </text>
      <rect x="300" y="110" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="305" y="115" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Finish[i] = false
        - Request[i] <= Work
      </text>
      <rect x="10" y="140" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="145" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        - Work = Work + Allocation[i]
        - Finish[i] = true
      </text>
    </g>
  </section>

  <!-- Labels and Annotations -->
  <g transform="translate(10, 370)">
    <text font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
      Labels and Annotations
    </text>
    <rect x="10" y="40" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="15" y="45" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
      Arrows
    </text>
    <rect x="150" y="40" width="100" height="20" fill="#F7F7F7" rx="5" />
    <text x="155" y="45" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
      Connections
    </text>
  </g>

  <!-- Arrow Markers -->
  <g transform="translate(10, 400)">
    <rect x="10" y="40" width="10" height="10" fill="#F7F7F7" rx="5" />
    <rect x="20" y="40" width="10" height="10" fill="#F7F7F7" rx="5" />
    <rect x="30" y="40" width="10" height="10" fill="#F7F7F7" rx="5" />
  </g>

  <!-- Footer Section -->
  <section data-narration="Footer">
    <g transform="translate(10, 420)">
      <rect width="400" height="50" fill="#F7F7F7" rx="10" />
      <text font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        Footer
      </text>
      <rect x="10" y="40" width="100" height="20" fill="#F7F7F7" rx="5" />
      <text x="15" y="45" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" fill="#333333">
        &copy; 2023
      </text>
    </g>
  </section>
</svg>