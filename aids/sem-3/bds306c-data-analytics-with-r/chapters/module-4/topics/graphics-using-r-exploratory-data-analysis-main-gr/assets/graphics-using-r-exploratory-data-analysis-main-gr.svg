    <text x="430" y="130" fill="#2F4F7F" font-size="12" text-anchor="middle">R has several graphical packages that provide a wide range of...</text>
    <data-narration>R has several graphical packages that provide a wide range of visualization tools...</data-narration>

    <!-- Section 4: ggplot2 -->
    <rect x="0" y="150" width="180" height="100" fill="#F7D2C4" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 180 150" to="360 180 150" dur="10s" begin="3s" repeatCount="indefinite" />
    <text x="180" y="170" fill="#2F4F7F" font-size="16" text-anchor="middle">ggplot2</text>
    <text x="180" y="190" fill="#2F4F7F" font-size="14" text-anchor="middle">A powerful and flexible package for creating complex graphics...</text>
