  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(20, 20)">
    <!-- Section 1: Introduction to Graphics in R -->
    <rect x="0" y="0" width="180" height="100" fill="#F7D2C4" rx="10" />
    <animateTransform attributeName="transform" type="rotate" from="0 180 100" to="360 180 100" dur="10s" begin="0s" repeatCount="indefinite" />
    <text x="50" y="40" fill="#2F4F7F" font-size="16" text-anchor="middle">Introduction to Graphics in R</text>
    <text x="50" y="60" fill="#2F4F7F" font-size="14" text-anchor="middle">Graphics is an essential part of data analysis and visualization in R...</text>
    <data-narration>Graphics is an essential part of data analysis and visualization in R. It allows us to communicate complex data insights effectively...</data-narration>
    <g>
      <path d="M 90 20 L 90 100" stroke="#333" stroke-width="2" fill="none" />
      <line x1="90" y1="20" x2="90" y2="100" stroke="#333" stroke-width="2" />
    </g>
    <g>
      <path d="M 90 20 L 90 100" stroke="#2F4F7F" stroke-width="4" fill="none" />
      <line x1="90" y1="20" x2="90" y2="100" stroke="#2F4F7F" stroke-width="4" />
    </g>
    <text x="50" y="110" fill="#2F4F7F" font-size="14" text-anchor="middle">What is Graphics in R?</text>
