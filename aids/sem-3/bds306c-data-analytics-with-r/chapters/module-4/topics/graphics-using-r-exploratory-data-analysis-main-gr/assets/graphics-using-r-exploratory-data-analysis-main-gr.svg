    <g>
      <path d="M 210 20 L 210 100" stroke="#333" stroke-width="2" fill="none" />
      <line x1="210" y1="20" x2="210" y2="100" stroke="#333" stroke-width="2" />
    </g>
    <g>
      <path d="M 210 20 L 210 100" stroke="#2F4F7F" stroke-width="4" fill="none" />
