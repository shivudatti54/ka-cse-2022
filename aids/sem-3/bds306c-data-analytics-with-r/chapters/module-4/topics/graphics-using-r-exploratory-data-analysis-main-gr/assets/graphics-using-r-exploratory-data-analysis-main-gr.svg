    <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" begin="1s" repeatCount="indefinite" />
    <text x="230" y="40" fill="#2F4F7F" font-size="16" text-anchor="middle">Exploratory Data Analysis (EDA)</text>
    <text x="230" y="60" fill="#2F4F7F" font-size="14" text-anchor="middle">EDA is a process of summarizing and visualizing data...</text>
    <data-narration>EDA is a process of summarizing and visualizing data to understand its distribution...</data-narration>
