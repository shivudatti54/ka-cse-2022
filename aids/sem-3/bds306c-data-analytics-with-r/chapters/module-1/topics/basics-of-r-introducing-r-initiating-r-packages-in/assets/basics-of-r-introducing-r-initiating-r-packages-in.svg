<svg width="420" height="400" data-topic-id="basics-of-r-introducing-r-packages-in" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8ee4e8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#add8e6" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gradient)" width="100%" height="100%"/>
  
  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#2f4f7f">Basics of R: Initiating R Packages</text>
  
  <!-- Section 1: Introduction to R -->
  <rect x="10" y="50" width="400" height="50" fill="#f9f9f9" data-narration="Introduction to R"/>
  <text x="15" y="60" font-size="18" font-family="Arial" fill="#4f4f4f">R is a popular, free, and open-source programming language for statistical computing and graphics.</text>
  <animate xlink:href="#gradient" begin="0s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Section 2: Installing R -->
  <rect x="10" y="120" width="400" height="50" fill="#f9f9f9" data-narration="Installing R"/>
  <text x="15" y="130" font-size="18" font-family="Arial" fill="#4f4f4f">To install R, follow these steps:</text>
  <text x="15" y="150" font-size="18" font-family="Arial" fill="#4f4f4f">Download the R installer from the official R website.</text>
  <text x="15" y="170" font-size="18" font-family="Arial" fill="#4f4f4f">Follow the installation instructions for your operating system.</text>
  <animate xlink:href="#gradient" begin="0s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Section 3: Initializing R -->
  <rect x="10" y="190" width="400" height="50" fill="#f9f9f9" data-narration="Initializing R"/>
  <text x="15" y="200" font-size="18" font-family="Arial" fill="#4f4f4f">When you first launch R, you will see a prompt that looks like this:</text>
  <text x="15" y="220" font-size="18" font-family="Arial" fill="#4f4f4f">This is the R console, where you can write and execute R code.</text>
  <animate xlink:href="#gradient" begin="0s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Section 4: Packages in R -->
  <rect x="10" y="240" width="400" height="50" fill="#f9f9f9" data-narration="Packages in R"/>
  <text x="15" y="250" font-size="18" font-family="Arial" fill="#4f4f4f">R has a vast collection of packages that provide additional functionality for data analysis and other tasks.</text>
  <text x="15" y="270" font-size="18" font-family="Arial" fill="#4f4f4f">To install a package, use the following command:</text>
  <text x="15" y="290" font-size="18" font-family="Arial" fill="#4f4f4f">install.packages("package_name")</text>
  <animate xlink:href="#gradient" begin="0s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Section 5: Environments in R -->
  <rect x="10" y="320" width="400" height="50" fill="#f9f9f9" data-narration="Environments in R"/>
  <text x="15" y="330" font-size="18" font-family="Arial" fill="#4f4f4f">In R, an environment is a collection of variables and functions that can be used to organize and manage your code.</text>
  <text x="15" y="350" font-size="18" font-family="Arial" fill="#4f4f4f">There are three types of environments in R:</text>
  <text x="15" y="370" font-size="18" font-family="Arial" fill="#4f4f4f">Global Environment, Working Environment, and Loaded Packages.</text>
  <animate xlink:href="#gradient" begin="0s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Section 6: Functions in R -->
  <rect x="10" y="390" width="400" height="50" fill="#f9f9f9" data-narration="Functions in R"/>
  <text x="15" y="400" font-size="18" font-family="Arial" fill="#4f4f4f">In R, a function is a block of code that performs a specific task.</text>
  <text x="15" y="420" font-size="18" font-family="Arial" fill="#4f4f4f">Functions can be defined using the function() keyword.</text>
  <text x="15" y="440" font-size="18" font-family="Arial" fill="#4f4f4f">To call a function, use the following syntax:</text>
  <text x="15" y="460" font-size="18" font-family="Arial" fill="#4f4f4f">function_name <- function(input) { # code here }</text>
  <animate xlink:href="#gradient" begin="0s" dur="2s" repeatCount="indefinite"/>
  
  <!-- Footer -->
  <text x="10" y="410" font-size="18" font-family="Arial" fill="#2f4f7f">Educational Resources</text>
</svg>