<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" data-topic-id="data-preparation-datasets-importing-and-exporting">
    <title>Data Preparation: Datasets, Importing and Exporting</title>
    <style>
        * {
            font-family: Arial, sans-serif;
            font-size: 16px;
            fill: #333;
        }
        text {
            stroke: #999;
            stroke-width: 2;
            fill: none;
        }
        .section {
            margin-bottom: 20px;
        }
        .data-narration {
            font-style: italic;
            font-size: 18px;
            font-weight: bold;
        }
        .arrow {
            stroke: #3498db;
            stroke-width: 2;
            fill: none;
        }
        .gradient {
            gradient: linear-gradient(to bottom, #8e44ad, #2196f3);
        }
    </style>

    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8e44ad"/>
            <stop offset="100%" stop-color="#2196f3"/>
        </linearGradient>
    </defs>

    <rect class="gradient" x="0" y="0" width="100%" height="100%" rx="10"/>

    <g class="top-section">
        <rect x="10" y="10" width="400" height="40" rx="10" fill="#fff"/>
        <text class="title" x="20" y="20" fill="#333">Data Preparation: Datasets, Importing and Exporting</text>
        <animateTransform attributeName="transform" type="rotate" from="0 200 20" to="360 200 20" dur="10s" repeatCount="indefinite"/>
    </g>

    <g class="section data-section-1">
        <rect x="10" y="60" width="400" height="120" rx="10" fill="#fff"/>
        <text class="section-title" x="20" y="50" fill="#333">Understanding Datasets</text>
        <text class="data-narration" x="20" y="80" fill="#666">A dataset is a collection of data points, variables, and observations that are used to train, test, and validate machine learning models.</text>
        <text class="data-narration" x="20" y="110" fill="#666">Types of datasets include tabular data, temporal data, and spatial data.</text>
        <animateTransform attributeName="transform" type="translate" from="0 140" to="0 160" dur="2s"begin="0s" repeatCount="indefinite"/>
    </g>

    <g class="section data-section-2">
        <rect x="10" y="180" width="400" height="120" rx="10" fill="#fff"/>
        <text class="section-title" x="20" y="170" fill="#333">Importing and Exporting Files</text>
        <text class="data-narration" x="20" y="200" fill="#666">Importing files in R can be done using the `read_csv()` function for CSV files, `read_excel()` for Excel files, and `read_json()` for JSON files.</text>
        <text class="data-narration" x="20" y="230" fill="#666">Exporting files in R can be done using the `saveRDS()` function for saving datasets to a file.</text>
        <animateTransform attributeName="transform" type="translate" from="0 240" to="0 260" dur="2s"begin="2s" repeatCount="indefinite"/>
    </g>

    <g class="section data-section-3">
        <rect x="10" y="280" width="400" height="120" rx="10" fill="#fff"/>
        <text class="section-title" x="20" y="270" fill="#333">Accessing Databases</text>
        <text class="data-narration" x="20" y="300" fill="#666">Databases can be accessed in R using the DBI (DatabasI) package.</text>
        <text class="data-narration" x="20" y="330" fill="#666">Relational databases and NoSQL databases are two types of databases.</text>
        <animateTransform attributeName="transform" type="translate" from="0 320" to="0 340" dur="2s"begin="4s" repeatCount="indefinite"/>
    </g>

    <g class="bottom-section">
        <rect x="10" y="380" width="400" height="40" rx="10" fill="#fff"/>
        <text class="footer" x="20" y="390" fill="#333">Data Preparation: Datasets, Importing and Exporting</text>
        <animateTransform attributeName="transform" type="rotate" from="0 200 20" to="360 200 20" dur="10s" repeatCount="indefinite"/>
    </g>

    <g class="arrow-1">
        <path class="arrow" d="M 20 140 L 200 160"/>
    </g>

    <g class="arrow-2">
        <path class="arrow" d="M 20 200 L 200 220"/>
    </g>

    <g class="arrow-3">
        <path class="arrow" d="M 20 260 L 200 280"/>
    </g>

    <g class="arrow-4">
        <path class="arrow" d="M 20 300 L 200 320"/>
    </g>

    <g class="arrow-5">
        <path class="arrow" d="M 20 140 L 150 160"/>
    </g>

    <g class="arrow-6">
        <path class="arrow" d="M 20 200 L 150 220"/>
    </g>

</svg>