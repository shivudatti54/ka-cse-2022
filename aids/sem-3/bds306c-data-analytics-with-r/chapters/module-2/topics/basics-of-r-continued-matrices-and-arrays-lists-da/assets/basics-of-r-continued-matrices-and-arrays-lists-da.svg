<svg width="420" height="400" data-topic-id="basics-of-r-continued-matrices-and-arrays-lists-da" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <style>
    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .section {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .section.data-narration {
      background-color: #66CCCC;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .section.title {
      font-size: 24px;
      font-weight: bold;
      color: #3498db;
    }

    .section.title span {
      color: #2ecc71;
    }

    .section.description {
      font-size: 18px;
      color: #f1c40f;
    }

    .section.description ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .section.description li {
      margin-bottom: 10px;
    }

    .section.description li::before {
      content: "\25B8";
      font-size: 10px;
      margin-right: 5px;
    }

    .section.item {
      display: inline-block;
      margin: 10px;
    }

    .section.item::after {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      background-color: #e74c3c;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .section.item span {
      font-size: 18px;
      font-weight: bold;
      color: #2ecc71;
    }
  </style>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E6F7FF" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10"/>

  <!-- Title -->
  <g class="title">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="#66CCCC" opacity="0.5"/>
      <text x="50" y="70" font-size="48" font-weight="bold" text-anchor="middle" fill="#3498db">Basics of R</text>
      <text x="50" y="80" font-size="24" text-anchor="middle" fill="#2ecc71">Continued</text>
      <text x="50" y="90" font-size="18" text-anchor="middle" fill="#f1c40f">Matrices and Arrays</text>
    </svg>