<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1f5fe"/>
      <stop offset="100%" style="stop-color:#b3e5fc"/>
    </linearGradient>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f57c00"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7b1fa2"/>
    </marker>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <rect width="800" height="1200" fill="#f8f9fa"/>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes clockWave {
      from { stroke-dashoffset: 600; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .draw-line {
      stroke-dasharray: 300;
      animation: drawLine 1.5s ease-out forwards;
    }
    .clock-line {
      stroke-dasharray: 600;
      animation: clockWave 2s ease-out forwards;
    }
  </style>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Sequential Logic. Today we explore how digital circuits remember past events and make decisions based on history.">
    <rect x="0" y="0" width="800" height="50" fill="url(#titleGrad)"/>
    <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="white">Introduction to Sequential Logic</text>
    <circle cx="50" cy="25" r="15" fill="white" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Step 1: What is Sequential Logic -->
  <g class="step" id="step1" data-narration="Sequential circuits have memory. Unlike combinational circuits, their output depends on current inputs AND past state.">
    <rect x="20" y="60" width="760" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="85" font-size="14" font-weight="bold" fill="#1976d2">What is Sequential Logic?</text>
    <text x="40" y="105" font-size="11" fill="#424242">• Output depends on current inputs + stored history (past states)</text>
    <text x="40" y="120" font-size="11" fill="#424242">• Has memory elements to store previous states</text>
    <text x="40" y="135" font-size="11" fill="#424242">• Used in counters, registers, FSMs, CPUs, and memory units</text>
    <rect x="680" y="75" width="50" height="40" rx="4" fill="#1976d2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <path d="M690 80 h30 M690 85 h30 M690 90 h30 M690 95 h30" stroke="white" stroke-width="2"/>
  </g>

  <!-- Step 2: Combinational vs Sequential -->
  <g class="step" id="step2" data-narration="Compare combinational and sequential circuits: combinational has no memory, sequential has memory with feedback paths.">
    <rect x="20" y="155" width="370" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="180" font-size="13" font-weight="bold" fill="#388e3c">Combinational Circuit</text>
    <text x="40" y="198" font-size="10" fill="#424242">✗ No Memory</text>
    <text x="40" y="212" font-size="10" fill="#424242">✗ Output = f(present inputs)</text>
    <text x="40" y="226" font-size="10" fill="#424242">✗ No feedback paths</text>
    <text x="40" y="240" font-size="10" fill="#424242">Examples: Adders, MUX, Decoders</text>
    
    <rect x="410" y="155" width="370" height="95" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="430" y="180" font-size="13" font-weight="bold" fill="#f57c00">Sequential Circuit</text>
    <text x="430" y="198" font-size="10" fill="#424242">✓ Has Memory Elements</text>
    <text x="430" y="212" font-size="10" fill="#424242">✓ Output = f(inputs, past state)</text>
    <text x="430" y="226" font-size="10" fill="#424242">✓ Has feedback from output to input</text>
    <text x="430" y="240" font-size="10" fill="#424242">Examples: Counters, Registers, FSMs</text>
    
    <path d="M395 202 L405 202" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Step 3: Structure of Sequential Circuit -->
  <g class="step" id="step3" data-narration="A sequential circuit has combinational logic for computing outputs and next state, plus storage elements for memory.">
    <rect x="20" y="260" width="760" height="105" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="285" font-size="14" font-weight="bold" fill="#7b1fa2">Structure of Sequential Circuit</text>
    
    <rect x="60" y="305" width="140" height="50" rx="6" fill="#9c27b0" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="325" text-anchor="middle" font-size="10" fill="white" font-weight="bold">COMBINATIONAL</text>
    <text x="130" y="340" text-anchor="middle" font-size="10" fill="white">LOGIC</text>
    
    <rect x="300" y="305" width="140" height="50" rx="6" fill="#7b1fa2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <text x="370" y="325" text-anchor="middle" font-size="10" fill="white" font-weight="bold">STORAGE</text>
    <text x="370" y="340" text-anchor="middle" font-size="10" fill="white">ELEMENTS</text>
    
    <rect x="540" y="305" width="140" height="50" rx="6" fill="#9c27b0" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <text x="610" y="325" text-anchor="middle" font-size="10" fill="white" font-weight="bold">COMBINATIONAL</text>
    <text x="610" y="340" text-anchor="middle" font-size="10" fill="white">LOGIC</text>
    
    <path d="M200 330 L290 330" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
    <path d="M440 330 L530 330" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
    <path d="M440 355 L440 380 L200 380 L200 355" stroke="#e91e63" stroke-width="2" fill="none" stroke-dasharray="5,3" class="draw-line"/>
    <text x="320" y="395" font-size="9" fill="#e91e63">Feedback (Next State → Present State)</text>
    <text x="130" y="295" font-size="8" fill="#7b1fa2">Next State Logic</text>
    <text x="610" y="295" font-size="8" fill="#7b1fa2">Output Logic</text>
  </g>

  <!-- Step 4: Synchronous vs Asynchronous -->
  <g class="step" id="step4" data-narration="Synchronous circuits use clock signals for state changes; asynchronous circuits change immediately with input changes.">
    <rect x="20" y="375" width="370" height="90" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="400" font-size="13" font-weight="bold" fill="#1976d2">Synchronous Sequential Circuits</text>
    <text x="40" y="418" font-size="10" fill="#424242">✓ State changes at discrete clock edges</text>
    <text x="40" y="432" font-size="10" fill="#424242">✓ All flip-flops triggered by same clock</text>
    <text x="40" y="446" font-size="10" fill="#424242">✓ Easier to design and debug</text>
    <text x="40" y="460" font-size="10" fill="#424242">Used in: CPUs, counters, registers</text>
    
    <rect x="410" y="375" width="370" height="90" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="430" y="400" font-size="13" font-weight="bold" fill="#d32f2f">Asynchronous Sequential Circuits</text>
    <text x="430" y="418" font-size="10" fill="#424242">✗ State changes when inputs change</text>
    <text x="430" y="432" font-size="10" fill="#424242">✗ No clock signal required</text>
    <text x="430" y="446" font-size="10" fill="#424242">✗ Faster but prone to race conditions</text>
    <text x="430" y="460" font-size="10" fill="#424242">Used in: Handshaking protocols</text>
  </g>

  <!-- Step 5: Clock Signal -->
  <g class="step" id="step5" data-narration="The clock is a periodic square wave that synchronizes state transitions. Rising edges trigger flip-flop state changes.">
    <rect x="20" y="475" width="760" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="500" font-size="14" font-weight="bold" fill="#388e3c">The Clock Signal</text>
    
    <!-- Clock waveform visualization -->
    <polyline points="60,530 100,530 100,510 140,510 140,530 180,530 180,510 220,510 220,530 260,530 260,510 300,510 300,530 340,530 340,510 380,510 380,530 420,530 420,510 460,510 460,530 500,530 500,510 540,510 540,530 580,530 580,510 620,510 620,530 660,530 660,510 700,510 700,530 740,530" 
              fill="none" stroke="#388e3c" stroke-width="2" class="clock-line"/>
    <circle cx="100" cy="530" r="4" fill="#d32f2f">
      <animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="530" r="4" fill="#d32f2f">
      <animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="260" cy="530" r="4" fill="#d32f2f">
      <animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="340" cy="530" r="4" fill="#d32f2f">
      <animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <text x="80" y="550" font-size="8" fill="#d32f2f">Rising Edge</text>
    <text x="160" y="550" font-size="8" fill="#d32f2f">Rising Edge</text>
  </g>

  <!-- Step 6: Types of Memory Elements -->
  <g class="step" id="step6" data-narration="Latches and flip-flops are the two main memory elements. Latches are level-triggered, flip-flops are edge-triggered.">
    <rect x="20" y="580" width="760" height="100" rx="8" fill="url(#cyanGrad)" filter="url(#shadow)"/>
    <text x="40" y="605" font-size="14" font-weight="bold" fill="#0277bd">Types of Memory Elements</text>
    
    <rect x="60" y="625" width="200" height="45" rx="6" fill="#0288d1" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="160" y="642" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LATCHES</text>
    <text x="160" y="658" text-anchor="middle" font-size="9" fill="white">Level-Sensitive</text>
    
    <rect x="280" y="625" width="200" height="45" rx="6" fill="#0277bd" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <text x="380" y="642" text-anchor="middle" font-size="11" fill="white" font-weight="bold">FLIP-FLOPS</text>
    <text x="380" y="658" text-anchor="middle" font-size="9" fill="white">Edge-Triggered</text>
    
    <rect x="500" y="625" width="260" height="45" rx="6" fill="#01579b" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <text x="630" y="642" text-anchor="middle" font-size="11" fill="white" font-weight="bold">REGISTERS</text>
    <text x="630" y="658" text-anchor="middle" font-size="9" fill="white">Group of Flip-Flops</text>
    
    <text x="60" y="690" font-size="10" fill="#424242">• SR Latch, D Latch, JK Latch, T Latch</text>
    <text x="280" y="690" font-size="10" fill="#424242">• D FF, JK FF, T FF, SR FF</text>
    <text x="500" y="690" font-size="10" fill="#424242">• N-bit storage for data and addresses</text>
  </g>

  <!-- Step 7: Flip-Flop Types -->
  <g class="step" id="step7" data-narration="Four main flip-flop types exist: D, JK, T, and SR. Each has unique truth table and application use cases.">
    <rect x="20" y="690" width="760" height="105" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="715" font-size="14" font-weight="bold" fill="#ef6c00">Flip-Flop Types</text>
    
    <rect x="40" y="735" width="165" height="50" rx="5" fill="#fff8e1" stroke="#ffb300" stroke-width="1"/>
    <text x="122" y="755" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">D Flip-Flop</text>
    <text x="122" y="770" text-anchor="middle" font-size="9" fill="#424242">Data / Delay</text>
    
    <rect x="215" y="735" width="165" height="50" rx="5" fill="#fff8e1" stroke="#ffb300" stroke-width="1"/>
    <text x="297" y="755" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">JK Flip-Flop</text>
    <text x="297" y="770" text-anchor="middle" font-size="9" fill="#424242">Jump &amp; Kill</text>
    
    <rect x="390" y="735" width="165" height="50" rx="5" fill="#fff8e1" stroke="#ffb300" stroke-width="1"/>
    <text x="472" y="755" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">T Flip-Flop</text>
    <text x="472" y="770" text-anchor="middle" font-size="9" fill="#424242">Toggle</text>
    
    <rect x="565" y="735" width="195" height="50" rx="5" fill="#fff8e1" stroke="#ffb300" stroke-width="1"/>
    <text x="662" y="755" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">SR Flip-Flop</text>
    <text x="662" y="770" text-anchor="middle" font-size="9" fill="#424242">Set &amp; Reset</text>
    
    <text x="40" y="800" font-size="10" fill="#424242">Q = D (output follows input on clock)</text>
    <text x="215" y="800" font-size="10" fill="#424242">Toggle with J=K=1, hold with J=K=0</text>
    <text x="390" y="800" font-size="10" fill="#424242">Toggles output when T=1 each clock</text>
    <text x="565" y="800" font-size="10" fill="#424242">Set Q=1 or Reset Q=0 (avoid S=R=1)</text>
  </g>

  <!-- Step 8: State Tables -->
  <g class="step" id="step8" data-narration="State tables describe sequential circuit behavior: present state, next state based on inputs, and output values.">
    <rect x="20" y="805" width="760" height="90" rx="8" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="40" y="830" font-size="14" font-weight="bold" fill="#00695c">State Tables and Equations</text>
    
    <rect x="50" y="850" width="340" height="35" rx="4" fill="#e0f2f1" stroke="#00796b" stroke-width="1"/>
    <text x="220" y="868" text-anchor="middle" font-size="11" fill="#004d40">Present State (Q) → Next State (Q+)</text>
    <text x="300" y="875" font-size="9" fill="#00796b" font-weight="bold">Excitation Table</text>
    
    <rect x="410" y="850" width="340" height="35" rx="4" fill="#e0f2f1" stroke="#00796b" stroke-width="1"/>
    <text x="580" y="868" text-anchor="middle" font-size="11" fill="#004d40">Q+ = f(Q, Inputs) → Output</text>
    <text x="660" y="875" font-size="9" fill="#00796b" font-weight="bold">State Table</text>
    
    <text x="50" y="900" font-size="10" fill="#424242">Shows what Q+ should be for each Q and input</text>
    <text x="410" y="900" font-size="10" fill="#424242">Complete behavior: current state + inputs = next state + output</text>
  </g>

  <!-- Step 9: Timing Diagrams -->
  <g class="step" id="step9" data-narration="Timing diagrams show signal changes over time, crucial for understanding setup time, hold time, and clock relationships.">
    <rect x="20" y="905" width="760" height="90" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="930" font-size="14" font-weight="bold" fill="#6a1b9a">Timing Diagrams</text>
    
    <text x="50" y="955" font-size="10" fill="#424242">Clock:</text>
    <polyline points="120,950 140,950 140,940 160,940 160,950 180,950 180,940 200,940 200,950 220,950 220,940 240,940 240,950 260,950 260,940 280,940 280,950 300,950" 
              fill="none" stroke="#7b1fa2" stroke-width="1.5"/>
    
    <text x="50" y="975" font-size="10" fill="#424242">Input D:</text>
    <polyline points="120,970 140,970 140,980 220,980 220,970 240,970 240,980 300,980" 
              fill="none" stroke="#1565c0" stroke-width="1.5"/>
    
    <text x="50" y="995" font-size="10" fill="#424242">Output Q:</text>
  </g>
</svg>