<svg
    width="420"
    height="400"
    viewBox="0 0 420 400"
    data-topic-id="digital-logic-41"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    style="background-image: linear-gradient(to bottom, #c7d6f7, #9fdbfe);">
    <!-- Title Section -->
    <rect fill="#9fdbfe" x="10" y="10" width="400" height="50" rx="10" />
    <g transform="translate(10, 20)">
        <text font-size="24" x="0" y="25" text-anchor="middle" color="#2b4155">
            4.1 Introduction to Digital Logic
        </text>
    </g>

    <!-- Section 1: What is Digital Logic? -->
    <section data-narration="What is Digital Logic?">
        <rect fill="#f7f5f7" x="10" y="70" width="400" height="40" rx="10" />
        <g transform="translate(10, 80)">
            <text font-size="18" x="0" y="15" text-anchor="middle" color="#2b4155">
                Definition:
            </text>
            <text font-size="18" x="0" y="35" text-anchor="middle" color="#2b4155">
                Digital logic is the study of binary systems and the use of logical operations to process and represent information.
            </text>
        </g>
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    </section>

    <!-- Section 2: Binary System -->
    <section data-narration="Binary System">
        <rect fill="#f7f5f7" x="10" y="120" width="400" height="40" rx="10" />
        <g transform="translate(10, 130)">
            <text font-size="18" x="0" y="15" text-anchor="middle" color="#2b4155">
                Binary system:
            </text>
            <rect x="15" y="25" width="5" height="5" rx="2.5" fill="#007bff" />
            <text font-size="18" x="25" y="35" text-anchor="middle" color="#2b4155">
                a system that uses only two digits, 0 and 1, to represent information
            </text>
        </g>
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    </section>

    <!-- Section 3: Boolean Algebra -->
    <section data-narration="Boolean Algebra">
        <rect fill="#f7f5f7" x="10" y="170" width="400" height="40" rx="10" />
        <g transform="translate(10, 180)">
            <text font-size="18" x="0" y="15" text-anchor="middle" color="#2b4155">
                Boolean algebra:
            </text>
            <rect x="15" y="25" width="5" height="5" rx="2.5" fill="#007bff" />
            <text font-size="18" x="25" y="35" text-anchor="middle" color="#2b4155">
                a mathematical system that deals with logical operations and their combinations
            </text>
        </g>
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    </section>

    <!-- Section 4: Digital Gates -->
    <section data-narration="Digital Gates">
        <rect fill="#f7f5f7" x="10" y="220" width="400" height="40" rx="10" />
        <g transform="translate(10, 230)">
            <text font-size="18" x="0" y="15" text-anchor="middle" color="#2b4155">
                Digital gates:
            </text>
            <rect x="15" y="25" width="5" height="5" rx="2.5" fill="#007bff" />
            <text font-size="18" x="25" y="35" text-anchor="middle" color="#2b4155">
                basic electronic components that perform logical operations
            </text>
        </g>
        <animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" />
    </section>

    <!-- Section 5: AND Gate -->
    <section data-narration="AND Gate">
        <rect fill="#f7f5f7" x="10" y="280" width="400" height="40" rx="10" />
        <g transform="translate(10, 290)">
            <text font-size="18" x="0" y="15" text-anchor="middle" color="#2b4155">
                AND Gate:
            </text>
            <rect x="15" y="25" width="5" height="5" rx="2.5" fill="#007bff" />
            <text font-size="18" x="25" y="35" text-anchor="middle" color="#2b4155">
                produces an output of 1 only if all inputs are 1
            </text>
            <rect x="150" y="25" width="5" height="5" rx="2.5" fill="#007bff" />
            <text font-size="18" x="160" y="35" text-anchor="middle" color="#2b4155">
                produces an output of 1 only if input 1 is 1
            </text>
        </g>
        <animate attributeName="opacity" begin="0.5s" dur="2s" repeatCount="indefinite" />
    </section>

    <!-- Section 6: OR Gate -->
    <section data-narration="OR Gate">
        <rect fill="#f7f5f7" x="10" y="340" width="400" height="40" rx="10" />
        <g transform="translate(10, 350)">
            <text font-size="18" x="0" y="15" text-anchor="middle" color="#2b4155">
                OR Gate:
            </text>
            <rect x="15" y="25" width="5" height="5" rx="2.5" fill="#007bff" />
            <text font-size="18" x="25" y="35" text-anchor="middle" color="#2b4155">
                produces an output of 1 if any input is 1
            </text>
            <rect x="150" y="25" width="5" height="5" rx="2.5" fill="#007bff" />
            <text font-size="18" x="160" y="35" text-anchor="middle" color="#2b4155">
                produces an output of 1 if input 1 is 1
            </text>
        </g>
        <animate attributeName="opacity" begin="1s" dur="2s" repeatCount="indefinite" />
    </section>

    <!-- Footer -->
    <rect fill="#9fdbfe" x="10" y="390" width="400" height="10" rx="5" />
    <g transform="translate(10, 400)">
        <text font-size="18" x="0" y="5" text-anchor="middle" color="#2b4155">
            4.1 Introduction to Digital Logic
        </text>
    </g>
</svg>