<svg width="420" height="400" data-topic-id="Cache Memories Mapping Functions">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65A0E9" stop-opacity="1" />
      <stop offset="100%" stop-color="#34A8FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)" rx="10" />
  
  <!-- Section 1: Introduction -->
  <section data-narration="Introduction to Cache Memories Mapping Functions">
    <rect x="10" y="50" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="20" y="60" font-size="24" font-family="Arial" fill="#333333">Cache Memories Mapping Functions</text>
    <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0" repeatCount="indefinite" />
    <animate attributeName="x" begin="0s" dur="2s" from="10" to="50" repeatCount="indefinite" />
    <animate attributeName="y" begin="0s" dur="2s" from="60" to="120" repeatCount="indefinite" />
  </section>
  
  <!-- Section 2: What is a Mapping Function? -->
  <section data-narration="What is a Mapping Function?">
    <rect x="10" y="160" width="400" height="100" fill="#FFFFFF" rx="10" />
    <rect x="10" y="200" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="20" y="210" font-size="18" font-family="Arial" fill="#333333">A mapping function is a mathematical relationship...</text>
    <animate attributeName="opacity" begin="2s" dur="2s" from="0" to="1" repeatCount="indefinite" />
    <animate attributeName="x" begin="2s" dur="2s" from="50" to="100" repeatCount="indefinite" />
    <animate attributeName="y" begin="2s" dur="2s" from="120" to="180" repeatCount="indefinite" />
  </section>
  
  <!-- Section 3: Types of Mapping Functions -->
  <section data-narration="Types of Mapping Functions">
    <rect x="10" y="320" width="400" height="100" fill="#FFFFFF" rx="10" />
    <rect x="10" y="370" width="400" height="100" fill="#FFFFFF" rx="10" />
    <rect x="10" y="420" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="20" y="430" font-size="18" font-family="Arial" fill="#333333">Direct Mapping vs Indirect Mapping...</text>
    <animate attributeName="opacity" begin="4s" dur="2s" from="0" to="1" repeatCount="indefinite" />
    <animate attributeName="x" begin="4s" dur="2s" from="100" to="150" repeatCount="indefinite" />
    <animate attributeName="y" begin="4s" dur="2s" from="180" to="240" repeatCount="indefinite" />
  </section>
  
  <!-- Section 4: Advantages and Disadvantages of Direct Mapping -->
  <section data-narration="Advantages and Disadvantages of Direct Mapping">
    <rect x="10" y="520" width="400" height="100" fill="#FFFFFF" rx="10" />
    <rect x="10" y="570" width="400" height="100" fill="#FFFFFF" rx="10" />
    <rect x="10" y="620" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="20" y="630" font-size="18" font-family="Arial" fill="#333333">Advantages: Simple to implement...</text>
    <animate attributeName="opacity" begin="6s" dur="2s" from="0" to="1" repeatCount="indefinite" />
    <animate attributeName="x" begin="6s" dur="2s" from="150" to="200" repeatCount="indefinite" />
    <animate attributeName="y" begin="6s" dur="2s" from="240" to="300" repeatCount="indefinite" />
  </section>
  
  <!-- Section 5: Advantages and Disadvantages of Indirect Mapping -->
  <section data-narration="Advantages and Disadvantages of Indirect Mapping">
    <rect x="10" y="720" width="400" height="100" fill="#FFFFFF" rx="10" />
    <rect x="10" y="770" width="400" height="100" fill="#FFFFFF" rx="10" />
    <rect x="10" y="820" width="400" height="100" fill="#FFFFFF" rx="10" />
    <text x="20" y="830" font-size="18" font-family="Arial" fill="#333333">Disadvantages: Poor cache performance...</text>
    <animate attributeName="opacity" begin="8s" dur="2s" from="0" to="1" repeatCount="indefinite" />
    <animate attributeName="x" begin="8s" dur="2s" from="200" to="250" repeatCount="indefinite" />
    <animate attributeName="y" begin="8s" dur="2s" from="300" to="350" repeatCount="indefinite" />
  </section>
  
  <!-- Annotations and Connections -->
  <rect x="10" y="920" width="400" height="20" fill="#FFFFFF" rx="10" />
  <text x="20" y="930" font-size="18" font-family="Arial" fill="#333333">This concludes the lesson on Cache Memories Mapping Functions.</text>
  <circle cx="200" cy="930" r="5" fill="#333333" />
  <line x1="10" y1="930" x2="390" y2="930" stroke="#333333" stroke-width="2" />
  
  <!-- Footer -->
  <rect x="10" y="960" width="400" height="50" fill="#FFFFFF" rx="10" />
  <text x="20" y="970" font-size="18" font-family="Arial" fill="#333333">Cache Memories Mapping Functions</text>
</svg>