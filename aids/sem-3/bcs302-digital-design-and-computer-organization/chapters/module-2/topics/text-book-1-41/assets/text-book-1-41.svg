<svg
  width="420"
  height="400"
  data-topic-id="text-book-1-41"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 420 400"
  style="color:rgb(60, 60, 80);font-family:'Arial', sans-serif;">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ACC7F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title at top -->
  <text x="10" y="10" font-size="24" font-weight="bold" fill="#2F4F7F" data-narration="Title">
    Digital Logic
  </text>

  <!-- Section 1: Definition of Digital Logic -->
  <rect x="10" y="40" width="400" height="100" fill="url(#pastel-gradient)" rx="10"/>
  <text x="15" y="60" font-size="18" fill="#2F4F7F" data-narration="A branch of mathematics that deals with the representation and manipulation of information using discrete values, typically 0s and 1s.">
    Definition of Digital Logic
  </text>
  <animate xlink:href="#pastel-gradient" begin="0s" attributeName="stop-color" from="#C9E4CA" to="#ACC7F2" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#pastel-gradient" begin="2s" attributeName="stop-color" from="#ACC7F2" to="#C9E4CA" dur="2s" repeatCount="indefinite"/>

  <!-- Section 2: Key Characteristics of Digital Logic -->
  <g transform="translate(10, 160)">
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="25" font-size="14" fill="#2F4F7F" data-narration="A binary system, where information is represented using only two values: 0 and 1.">
      Binary System
    </text>
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="45" font-size="14" fill="#2F4F7F" data-narration="Discrete values, which are distinct and separate from one another.">
      Discrete Values
    </text>
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="65" font-size="14" fill="#2F4F7F" data-narration="Boolean algebra, a mathematical system that deals with logical operations.">
      Boolean Algebra
    </text>
  </g>
  <animate xlink:href="#pastel-gradient" begin="0s" attributeName="stop-color" from="#C9E4CA" to="#ACC7F2" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#pastel-gradient" begin="2s" attributeName="stop-color" from="#ACC7F2" to="#C9E4CA" dur="2s" repeatCount="indefinite"/>

  <!-- Section 3: Boolean Algebra -->
  <g transform="translate(10, 240)">
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="25" font-size="14" fill="#2F4F7F" data-narration="Variables can take on two values: 0 and 1.">
      Boolean Variables
    </text>
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="45" font-size="14" fill="#2F4F7F" data-narration="Operators include AND, OR, and NOT, which are used to combine variables.">
      Boolean Operators
    </text>
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="65" font-size="14" fill="#2F4F7F" data-narration="Laws include the complement law, idempotent law, and distributive law.">
      Boolean Laws
    </text>
  </g>
  <animate xlink:href="#pastel-gradient" begin="0s" attributeName="stop-color" from="#C9E4CA" to="#ACC7F2" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#pastel-gradient" begin="2s" attributeName="stop-color" from="#ACC7F2" to="#C9E4CA" dur="2s" repeatCount="indefinite"/>

  <!-- Section 4: Digital Logic Gates -->
  <g transform="translate(10, 320)">
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="25" font-size="14" fill="#2F4F7F" data-narration="An AND gate produces an output of 1 only if both inputs are 1.">
      AND Gate
    </text>
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="45" font-size="14" fill="#2F4F7F" data-narration="An OR gate produces an output of 1 if either input is 1.">
      OR Gate
    </text>
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="65" font-size="14" fill="#2F4F7F" data-narration="A NOT gate produces an output that is the complement of the input.">
      NOT Gate
    </text>
  </g>
  <animate xlink:href="#pastel-gradient" begin="0s" attributeName="stop-color" from="#C9E4CA" to="#ACC7F2" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#pastel-gradient" begin="2s" attributeName="stop-color" from="#ACC7F2" to="#C9E4CA" dur="2s" repeatCount="indefinite"/>

  <!-- Section 5: Digital Logic Circuits -->
  <g transform="translate(10, 400)">
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="25" font-size="14" fill="#2F4F7F" data-narration="Sequential logic circuits have memory and can store information.">
      Sequential Logic
    </text>
    <rect width="100" height="20" fill="#F7D2C4" rx="5"/>
    <text x="10" y="45" font-size="14" fill="#2F4F7F" data-narration="Combinational logic circuits do not have memory and only perform logical operations.">
      Combinational Logic
    </text>
  </g>
  <animate xlink:href="#pastel-gradient" begin="0s" attributeName="stop-color" from="#C9E4CA" to="#ACC7F2" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#pastel-gradient" begin="2s" attributeName="stop-color" from="#ACC7F2" to="#C9E4CA" dur="2s" repeatCount="indefinite"/>

  <!-- Section 6: Key Concepts -->
  <g transform="translate(10, 480)">
    <rect width="400" height="20" fill="#F7D2C4" rx="5"/>
    <text x="15" y="25" font-size="14" fill="#2F4F7F" data-narration="A binary system, where information is represented using only two values: 0 and 1.">
      Binary System
    </text>
    <text x="15" y="45" font-size="14" fill="#2F4F7F" data-narration="Discrete values, which are distinct and separate from one another.">
      Discrete Values
    </text>
    <text x="15" y="65" font-size="14" fill="#2F4F7F" data-narration="Boolean algebra, a mathematical system that deals with logical operations.">
      Boolean Algebra
    </text>
    <text x="15" y="85" font-size="14" fill="#2F4F7F" data-narration="Variables can take on two values: 0 and 1.">
      Boolean Variables
    </text>
    <text x="15" y="105" font-size="14" fill="#2F4F7F" data-narration="Operators include AND, OR, and NOT, which are used to combine variables.">
      Boolean Operators
    </text>
    <text x="15" y="125" font-size="14" fill="#2F4F7F" data-narration="Laws include the complement law, idempotent law, and distributive law.">
      Boolean Laws
    </text>
  </g>
  <animate xlink:href="#pastel-gradient" begin="0s" attributeName="stop-color" from="#C9E4CA" to="#ACC7F2" dur="2s" repeatCount="indefinite"/>
  <animate xlink:href="#pastel-gradient" begin="2s" attributeName="stop-color" from="#ACC7F2" to="#C9E4CA" dur="2s" repeatCount="indefinite"/>

  <!-- Footer at bottom -->
  <text x="10" y="420" font-size="14" fill="#2F4F7F" data-narration="Digital Logic">
    <tspan x="10" y="440">Learn Digital Logic</tspan>
  </text>
</svg>