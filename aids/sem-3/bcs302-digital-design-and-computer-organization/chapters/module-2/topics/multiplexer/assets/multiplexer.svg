<svg width="420" height="400" data-topic-id="Multiplexer">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6D8C3" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A7C9B5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3575A7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#grad)"/>
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#223333">Multiplexer</text>
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="300" height="200" fill="#FFFFFF" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#3575A7" rx="10"/>
    <text x="10" y="140" font-size="18" font-family="Arial" fill="#FFFFFF">Multiplexers (MUX)</text>
    <text x="10" y="170" font-size="18" font-family="Arial" fill="#FFFFFF">A combinational circuit</text>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">that selects one</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">of several input signals</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">and forwards it to a</text>
    <text x="10" y="290" font-size="18" font-family="Arial" fill="#FFFFFF">single output line</text>
  </g>
  <g transform="translate(350, 100)">
    <rect x="0" y="0" width="100" height="200" fill="#FFFFFF" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#3575A7" rx="10"/>
    <text x="10" y="140" font-size="18" font-family="Arial" fill="#FFFFFF">2:1 Multiplexer</text>
    <text x="10" y="170" font-size="18" font-family="Arial" fill="#FFFFFF">I0, I1, S</text>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">Y = S'I0 + SI1</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">Truth Table</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">| S   | Y   |</text>
    <text x="10" y="290" font-size="18" font-family="Arial" fill="#FFFFFF">| 0   | I0  |</text>
    <text x="10" y="320" font-size="18" font-family="Arial" fill="#FFFFFF">| 1   | I1  |</text>
    <text x="10" y="350" font-size="18" font-family="Arial" fill="#FFFFFF">| 0   | I0  |</text>
    <text x="10" y="380" font-size="18" font-family="Arial" fill="#FFFFFF">| 1   | I1  |</text>
    <text x="10" y="410" font-size="18" font-family="Arial" fill="#FFFFFF">| 0   | I0  |</text>
    <text x="10" y="440" font-size="18" font-family="Arial" fill="#FFFFFF">| 1   | I1  |</text>
  </g>
  <g transform="translate(350, 200)">
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="180" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="180" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">4:1 Multiplexer</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">I0, I1, I2, I3, S1, S0, Y</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">Y = S1'S0'I0 + S1'S0I1 + S1S0'I2 + S1S0I3</text>
    <text x="10" y="290" font-size="18" font-family="Arial" fill="#FFFFFF">Truth Table</text>
    <text x="10" y="320" font-size="18" font-family="Arial" fill="#FFFFFF">| S1  | S0  | Y   |</text>
    <text x="10" y="350" font-size="18" font-family="Arial" fill="#FFFFFF">| 0   | 0   | I0  |</text>
    <text x="10" y="380" font-size="18" font-family="Arial" fill="#FFFFFF">| 0   | 1   | I1  |</text>
    <text x="10" y="410" font-size="18" font-family="Arial" fill="#FFFFFF">| 1   | 0   | I2  |</text>
    <text x="10" y="440" font-size="18" font-family="Arial" fill="#FFFFFF">| 1   | 1   | I3  |</text>
  </g>
  <g transform="translate(600, 100)">
    <rect x="0" y="0" width="100" height="200" fill="#FFFFFF" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#3575A7" rx="10"/>
    <text x="10" y="140" font-size="18" font-family="Arial" fill="#FFFFFF">General n:1 Multiplexer</text>
    <text x="10" y="170" font-size="18" font-family="Arial" fill="#FFFFFF">n = 2^k data inputs, k select lines, Y</text>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">Y = S1'S0*I0 + S1'S0I1 + ... + S1S0I2^k + S1S0I2^k+1</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">Truth Table</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">| S1 ...</text>
    <text x="10" y="290" font-size="18" font-family="Arial" fill="#FFFFFF">| ... S0 | Y   |</text>
  </g>
  <g transform="translate(600, 200)">
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="180" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="180" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">Building Larger MUX from Smaller</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">4:1 MUX from 2:1 MUX</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">3 two-input multiplexers</text>
    <text x="10" y="290" font-size="18" font-family="Arial" fill="#FFFFFF">2 two-input MUX in first level</text>
  </g>
  <g transform="translate(600, 300)">
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="180" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="180" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">8:1 MUX from 4:1 MUX</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">2 four-input MUX + 1 two-input MUX</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">Or use tree structure</text>
    <text x="10" y="290" font-size="18" font-family="Arial" fill="#FFFFFF">Truth Table</text>
    <text x="10" y="320" font-size="18" font-family="Arial" fill="#FFFFFF">| S1 ...</text>
    <text x="10" y="350" font-size="18" font-family="Arial" fill="#FFFFFF">| ... S0 | Y   |</text>
  </g>
  <g transform="translate(700, 100)">
    <rect x="0" y="0" width="100" height="200" fill="#FFFFFF" rx="10"/>
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#3575A7" rx="10"/>
    <text x="10" y="140" font-size="18" font-family="Arial" fill="#FFFFFF">Multiplexer as Universal Function Generator</text>
    <text x="10" y="170" font-size="18" font-family="Arial" fill="#FFFFFF">2^n:1 MUX can implement</text>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">any n-variable Boolean function</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">by connecting function variables</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">to select lines and function values</text>
    <text x="10" y="290" font-size="18" font-family="Arial" fill="#FFFFFF">or remaining variables to data inputs</text>
  </g>
  <g transform="translate(700, 250)">
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="180" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="180" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">Example: F(A,B) = A XOR B</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">using 4:1 MUX</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">S1 = A, S0 = B</text>
    <text x="10" y="290" font-size="18" font-family="Arial" fill="#FFFFFF">Truth Table</text>
    <text x="10" y="320" font-size="18" font-family="Arial" fill="#FFFFFF">| S1  | S0  | Y   |</text>
    <text x="10" y="350" font-size="18" font-family="Arial" fill="#FFFFFF">| 0   | 0   | I0  |</text>
    <text x="10" y="380" font-size="18" font-family="Arial" fill="#FFFFFF">| 0   | 1   | I1  |</text>
    <text x="10" y="410" font-size="18" font-family="Arial" fill="#FFFFFF">| 1   | 0   | I2  |</text>
    <text x="10" y="440" font-size="18" font-family="Arial" fill="#FFFFFF">| 1   | 1   | I3  |</text>
  </g>
  <g transform="translate(700, 300)">
    <rect x="0" y="0" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="0" y="60" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="150" y="60" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="0" y="120" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <rect x="150" y="120" width="100" height="50" fill="#A7C9B5" rx="10"/>
    <rect x="0" y="180" width="100" height="50" fill="#3575A7" rx="10"/>
    <rect x="150" y="180" width="100" height="50" fill="#E6D8C3" rx="10"/>
    <text x="10" y="200" font-size="18" font-family="Arial" fill="#FFFFFF">4:1 MUX from 2:1 MUX</text>
    <text x="10" y="230" font-size="18" font-family="Arial" fill="#FFFFFF">3 two-input multiplexers</text>
    <text x="10" y="260" font-size="18" font-family="Arial" fill="#FFFFFF">2 two-input MUX in first level</text>
  </g>
  <text x="10" y="350" font-size="24" font-family="Arial" fill="#FFFFFF">Multiplexers (MUX)</text>
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#FFFFFF">Applications</text>
  <text x="10" y="410" font-size="18" font-family="Arial" fill="#FFFFFF">1. Data Routing: Select data source in communication</text>
  <text x="10" y="440" font-size="18" font-family="Arial" fill="#FFFFFF">2. Function Implementation: Replace complex gate networks</text>
  <text x="10" y="470" font-size="18" font-family="Arial" fill="#FFFFFF">3. Bus Systems: Select data from multiple sources</text>
  <text x="10" y="500" font-size="18" font-family="Arial" fill="#FFFFFF">4. ALU Design: Operation selection</text>
  <text x="10" y="530" font-size="18" font-family="Arial" fill="#FFFFFF">5. Memory Address</text>
  <rect x="10" y="570" width="400" height="30" fill="#FFFFFF" rx="10"/>
  <text x="10" y="590" font-size="18" font-family="Arial" fill="#FFFFFF">Footer</text>
</svg>