<svg width="420" height="400" data-topic-id="sequential-logic-introduction-sequential-circuits">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <title>Sequential Logic Introduction</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <g transform="translate(15, 20)">
    <text x="10" y="20" font-size="18" fill="#2E4053">Sequential Logic Introduction</text>
  </g>
  <g transform="translate(10, 50)">
    <section data-narration="Introduction to Sequential Logic">
      <rect x="0" y="0" width="100%" height="50" fill="#E0E0E0" rx="10" />
      <text x="10" y="20" font-size="14" fill="#2E4053">Sequential logic is a branch of digital electronics that deals with the flow of data through a system over time.</text>
      <text x="10" y="40" font-size="14" fill="#666666">It is concerned with the behavior of digital circuits that can remember and store information for a period of time.</text>
    </section>
    <section data-narration="Key Characteristics of Sequential Logic">
      <rect x="0" y="50" width="100%" height="50" fill="#E0E0E0" rx="10" />
      <rect x="0" y="0" width="100%" height="50" fill="#F7DC6F" rx="10" />
      <text x="10" y="20" font-size="14" fill="#2E4053">The behavior of a sequential circuit changes over time.</text>
      <text x="10" y="40" font-size="14" fill="#666666">The circuit can store and retrieve data.</text>
      <text x="10" y="60" font-size="14" fill="#2E4053">The circuit can perform operations on stored data.</text>
    </section>
    <section data-narration="Why is Sequential Logic Important?">
      <rect x="0" y="100" width="100%" height="50" fill="#E0E0E0" rx="10" />
      <rect x="0" y="0" width="100%" height="50" fill="#F7DC6F" rx="10" />
      <text x="10" y="20" font-size="14" fill="#2E4053">Sequential logic is used in digital computers to implement memory and control functions.</text>
      <text x="10" y="40" font-size="14" fill="#666666">It is used in communication systems to implement error detection and correction.</text>
      <text x="10" y="60" font-size="14" fill="#2E4053">It is used in control systems to implement control algorithms.</text>
    </section>
    <section data-narration="Sequential Circuits">
      <rect x="0" y="150" width="100%" height="50" fill="#E0E0E0" rx="10" />
      <rect x="0" y="0" width="100%" height="50" fill="#F7DC6F" rx="10" />
      <text x="10" y="20" font-size="14" fill="#2E4053">A sequential circuit is a digital circuit that changes its behavior over time.</text>
      <text x="10" y="40" font-size="14" fill="#666666">It can store and retrieve data, and perform operations on stored data.</text>
    </section>
    <section data-narration="Types of Sequential Circuits">
      <rect x="0" y="200" width="100%" height="50" fill="#E0E0E0" rx="10" />
      <rect x="0" y="0" width="100%" height="50" fill="#F7DC6F" rx="10" />
      <text x="10" y="20" font-size="14" fill="#2E4053">Sequential Logic Gates implement sequential logic functions.</text>
      <text x="10" y="40" font-size="14" fill="#666666">Sequential Arithmetic Circuits implement arithmetic operations on stored data.</text>
    </section>
    <section data-narration="Sequential Circuit Behavior">
      <rect x="0" y="250" width="100%" height="50" fill="#E0E0E0" rx="10" />
      <rect x="0" y="0" width="100%" height="50" fill="#F7DC6F" rx="10" />
      <text x="10" y="20" font-size="14" fill="#2E4053">Memory Elements store data.</text>
      <text x="10" y="40" font-size="14" fill="#666666">Computational Elements perform operations on stored data.</text>
      <text x="10" y="60" font-size="14" fill="#2E4053">Input/Output Elements interact with the outside world.</text>
    </section>
    <section data-narration="Storage Elements: Latches">
      <rect x="0" y="300" width="100%" height="50" fill="#E0E0E0" rx="10" />
      <rect x="0" y="0" width="100%" height="50" fill="#F7DC6F" rx="10" />
      <text x="10" y="20" font-size="14" fill="#2E4053">A latch is a type of memory element that stores data.</text>
      <text x="10" y="40" font-size="14" fill="#666666">Latches are used in digital circuits to store and retrieve data.</text>
    </section>
  </g>
  <g transform="translate(10, 380)">
    <rect x="0" y="0" width="100%" height="20" fill="#2E4053" rx="10" />
    <text x="10" y="10" font-size="14" fill="#FFFFFF">Questions?</text>
  </g>
</svg>