<svg width="420" height="400" data-topic-id="HDL-Models-Of-Combinational-Circuits-Adder">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" rx="10" />
  
  <!-- Title Section -->
  <g transform="translate(10, 10)">
    <text fill="#2F4F7F" font-size="24" font-weight="bold">HDL Models of Combinational Circuits - Adder</text>
  </g>
  
  <!-- Overview Section -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="380" height="20" fill="#2F4F7F" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal">Overview</text>
    <rect x="0" y="25" width="380" height="20" fill="#87CEEB" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal" data-narration="This is a combinational circuit that adds two or more binary numbers.">Adder Overview</text>
  </g>
  
  <!-- What is an Adder? Section -->
  <g transform="translate(10, 100)">
    <rect x="0" y="0" width="380" height="20" fill="#2F4F7F" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal">What is an Adder?</text>
    <rect x="0" y="25" width="380" height="20" fill="#87CEEB" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal" data-narration="An adder is a digital circuit that performs binary addition. It takes two or more binary numbers as inputs and produces their sum as output.">Adder Description</text>
  </g>
  
  <!-- Types of Adders Section -->
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="380" height="20" fill="#2F4F7F" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal">Types of Adders</text>
    <rect x="0" y="25" width="380" height="20" fill="#87CEEB" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal" data-narration="There are two main types of adders: binary adder and Gray code adder. A binary adder adds two binary numbers directly, while a Gray code adder adds two binary numbers using Gray codes.">Adder Types</text>
  </g>
  
  <!-- HDL Models of Adders Section -->
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="380" height="20" fill="#2F4F7F" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal">HDL Models of Adders</text>
    <rect x="0" y="25" width="380" height="20" fill="#87CEEB" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal" data-narration="A binary adder can be implemented using a combinational circuit. The HDL model of a binary adder consists of a full adder and a half adder. A Gray code adder can be implemented using a combinational circuit. The HDL model of a Gray code adder consists of a Gray code encoder and a decoder.">Adder HDL</text>
  </g>
  
  <!-- Binary Adder Section -->
  <g transform="translate(10, 250)">
    <rect x="0" y="0" width="380" height="100" fill="#2F4F7F" rx="10" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal">Binary Adder</text>
    <rect x="0" y="25" width="380" height="50" fill="#87CEEB" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal" data-narration="A binary adder can be implemented using a combinational circuit. It consists of a full adder and a half adder.">Binary Adder Circuit</text>
    <animate transform="translate(0, 50)" begin="0s" dur="5s" repeatCount="indefinite" />
  </g>
  
  <!-- Gray Code Adder Section -->
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="380" height="100" fill="#2F4F7F" rx="10" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal">Gray Code Adder</text>
    <rect x="0" y="25" width="380" height="50" fill="#87CEEB" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal" data-narration="A Gray code adder can be implemented using a combinational circuit. It consists of a Gray code encoder and a decoder.">Gray Code Adder Circuit</text>
    <animate transform="translate(0, 50)" begin="5s" dur="5s" repeatCount="indefinite" />
  </g>
  
  <!-- Footer Section -->
  <g transform="translate(10, 380)">
    <rect x="0" y="0" width="380" height="20" fill="#2F4F7F" rx="5" />
    <text fill="#2F4F7F" font-size="16" font-weight="normal">Footer</text>
  </g>
</svg>