<svg width="420" height="400" data-topic-id="encoder" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#B2A8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7B68EE" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  
  <!-- Title -->
  <text x="20" y="30" font-size="24" font-family="Arial" fill="#455A64" text-anchor="start">Encoder</text>
  
  <!-- 4:2 Simple Encoder Section -->
  <section data-narration="4:2 Simple Encoder" id="4-2-encoder">
    <rect x="10" y="60" width="350" height="150" fill="#fff" rx="10"/>
    <polygon points="20,110 30,120 40,110" fill="#455A64" stroke="#000" stroke-width="2" fill-opacity="0.5"/>
    <g transform="translate(20,120)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#000">Y1 = I3 + I2</text>
      <text x="0" y="3" font-size="18" font-family="Arial" fill="#000">Y0 = I3 + I1</text>
    </g>
  </section>
  
  <!-- Truth Table for 4:2 Simple Encoder -->
  <g transform="translate(10,200)">
    <rect width="200" height="100" fill="#fff" rx="10"/>
    <rect x="5" y="5" width="190" height="90" fill="#fff" rx="5"/>
    <rect x="5" y="120" width="190" height="70" fill="#fff" rx="5"/>
    <rect x="5" y="230" width="190" height="70" fill="#fff" rx="5"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#000">I3  | I2  | I1  | I0  | Y1  | Y0  |</text>
    <text x="10" y="30" font-size="18" font-family="Arial" fill="#000">0   | 0   | 0   | 1   | 0   | 0   |</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#000">0   | 0   | 1   | 0   | 0   | 1   |</text>
    <text x="10" y="70" font-size="18" font-family="Arial" fill="#000">0   | 1   | 0   | 0   | 1   | 0   |</text>
    <text x="10" y="90" font-size="18" font-family="Arial" fill="#000">1   | 0   | 0   | 0   | 1   | 1   |</text>
  </g>
  
  <!-- Animation for Truth Table -->
  <animateTransform attributeName="transform" type="translate" from="0 200" to="0 220" dur="2s" begin="0s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 250" to="0 270" dur="2s" begin="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 300" to="0 320" dur="2s" begin="4s" repeatCount="indefinite"/>
  
  <!-- Priority Encoder Section -->
  <section data-narration="Priority Encoder" id="priority-encoder">
    <rect x="10" y="60" width="350" height="150" fill="#fff" rx="10"/>
    <polygon points="20,110 30,120 40,110" fill="#455A64" stroke="#000" stroke-width="2" fill-opacity="0.5"/>
    <g transform="translate(20,120)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#000">Y0 = I1 + I3 + I5 + I7</text>
      <text x="0" y="3" font-size="18" font-family="Arial" fill="#000">Y1 = I2 + I3 + I6 + I7</text>
      <text x="0" y="6" font-size="18" font-family="Arial" fill="#000">Y2 = I4 + I5 + I6 + I7</text>
      <text x="0" y="9" font-size="18" font-family="Arial" fill="#000">V = I0 + I1 + I2 + I3 + I4 + I5 + I6 + I7</text>
    </g>
  </section>
  
  <!-- Truth Table for Priority Encoder -->
  <g transform="translate(10,200)">
    <rect width="200" height="100" fill="#fff" rx="10"/>
    <rect x="5" y="5" width="190" height="90" fill="#fff" rx="5"/>
    <rect x="5" y="120" width="190" height="70" fill="#fff" rx="5"/>
    <rect x="5" y="230" width="190" height="70" fill="#fff" rx="5"/>
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#000">Active Inputs       | Y2  | Y1  | Y0  | V   |</text>
    <text x="10" y="30" font-size="18" font-family="Arial" fill="#000">None                | X   | X   | X   | 0   |</text>
    <text x="10" y="50" font-size="18" font-family="Arial" fill="#000">I0 only             | 0   | 0   | 0   | 1   |</text>
    <text x="10" y="70" font-size="18" font-family="Arial" fill="#000">I1 (I0 don't care)  | 0   | 0   | 1   | 1   |</text>
    <text x="10" y="90" font-size="18" font-family="Arial" fill="#000">I7 (all don't care) | 1   | 1   | 1   | 1   |</text>
  </g>
  
  <!-- Animation for Truth Table -->
  <animateTransform attributeName="transform" type="translate" from="0 220" to="0 240" dur="2s" begin="0s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 270" to="0 290" dur="2s" begin="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" from="0 320" to="0 340" dur="2s" begin="4s" repeatCount="indefinite"/>
  
  <!-- Decimal-to-BCD Encoder Section -->
  <section data-narration="Decimal-to-BCD Encoder" id="decimal-to-bcd-encoder">
    <rect x="10" y="60" width="350" height="150" fill="#fff" rx="10"/>
    <polygon points="20,110 30,120 40,110" fill="#455A64" stroke="#000" stroke-width="2" fill-opacity="0.5"/>
    <g transform="translate(20,120)">
      <text x="0" y="0" font-size="18" font-family="Arial" fill="#000">Y2 = I4 + I5 + I6 + I7</text>
      <text x="0" y="3" font-size="18" font-family="Arial" fill="#000">Y1 = I3 + I5 + I6 + I7</text>
      <text x="0" y="6" font-size="18" font-family="Arial" fill="#000">Y0 = I2 + I3 + I6 + I7</text>
      <text x="0" y="9" font-size="18" font-family="Arial" fill="#000">V = I0 + I1 + I2 + I3 + I4 + I5 + I6 + I7</text>
    </g>
  </section>
  
  <!-- Footer -->
  <text x="20" y="380" font-size="24" font-family="Arial" fill="#455A64" text-anchor="start">Encoder</text>
</svg>