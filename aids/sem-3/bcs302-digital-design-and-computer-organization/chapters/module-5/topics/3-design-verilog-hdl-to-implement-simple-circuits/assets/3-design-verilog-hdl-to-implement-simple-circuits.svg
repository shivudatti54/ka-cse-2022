<svg width="420" height="400" data-topic-id="design-verilog-hdl-simple-circuits"
     style="background: linear-gradient(to bottom, #87CEEB, #87CEEB 30px, #ADD8E6);">

    <rect x="0" y="0" width="100%" height="100%" rx="10" fill="#ADD8E6" opacity="0.5" />
    <title style="font-size: 24px; font-weight: bold; color: #2196F3;">Designing Verilog HDL for Simple Circuits</title>

    <section data-narration="What is Structural Style in Verilog?" style="padding: 20px;">
        <h2 style="font-size: 18px; color: #333;">Introduction to Structural Style</h2>
        <p style="font-size: 16px; color: #666;">The structural style in Verilog is a descriptive approach to design digital circuits.</p>
        <p style="font-size: 16px; color: #666;">Each component is described separately, and then connected to form the desired circuit.</p>
    </section>

    <section data-narration="Structural Style in Verilog Syntax" style="padding: 20px;">
        <h2 style="font-size: 18px; color: #333;">Verilog Structural Style Syntax</h2>
        <div style="display: flex; flex-direction: column;">
            <h3 style="font-size: 16px; color: #666;">assign statement</h3>
            <p style="font-size: 14px; color: #999;">Assigns outputs to inputs.</p>
            <h3 style="font-size: 16px; color: #666;">wire statement</h3>
            <p style="font-size: 14px; color: #999;">Describes wires.</p>
            <h3 style="font-size: 16px; color: #666;">reg statement</h3>
            <p style="font-size: 14px; color: #999;">Describes registers.</p>
            <h3 style="font-size: 16px; color: #666;">always block</h3>
            <p style="font-size: 14px; color: #999;">Describes combinational logic.</p>
            <h3 style="font-size: 16px; color: #666;">initial block</h3>
            <p style="font-size: 14px; color: #999;">Initializes registers.</p>
        </div>
    </section>

    <section data-narration="Key Components of the Structural Style" style="padding: 20px;">
        <h2 style="font-size: 18px; color: #333;">Key Components of Structural Style</h2>
        <div style="display: flex; flex-direction: column;">
            <h3 style="font-size: 16px; color: #666;">Wires</h3>
            <p style="font-size: 14px; color: #999;">Used to describe connections between components.</p>
            <h3 style="font-size: 16px; color: #666;">Registers</h3>
            <p style="font-size: 14px; color: #999;">Used to store data.</p>
            <h3 style="font-size: 16px; color: #666;">Combinational Logic</h3>
            <p style="font-size: 14px; color: #999;">Describes logic applied to inputs.</p>
            <h3 style="font-size: 16px; color: #666;">Sequential Logic</h3>
            <p style="font-size: 14px; color: #999;">Describes behavior over time.</p>
        </div>
    </section>

    <section data-narration="Example 1: AND Gate" style="padding: 20px;">
        <h2 style="font-size: 18px; color: #333;">AND Gate Example</h2>
        <div style="display: flex; flex-direction: column;">
            <h3 style="font-size: 16px; color: #666;">AND Gate Circuit</h3>
            <p style="font-size: 14px; color: #999;">In this example, we will design an AND gate using Verilog.</p>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <rect x="50" y="50" width="100" height="100" rx="10" fill="#F7DC6F" />
                <rect x="150" y="50" width="100" height="100" rx="10" fill="#F7DC6F" />
                <rect x="250" y="50" width="100" height="100" rx="10" fill="#F7DC6F" />
                <g transform="rotate(45 250 50)">
                    <line x1="250" y1="50" x2="250" y2="150" stroke="#2196F3" />
                    <line x1="250" y1="100" x2="250" y2="150" stroke="#2196F3" />
                </g>
            </div>
        </div>
    </section>

    <footer style="background: #2196F3; color: #fff; padding: 10px; text-align: center; margin-top: 20px;">
        <p style="font-size: 14px;">Learn Verilog HDL for simple circuits and design your own digital circuits.</p>
    </footer>

    <animate attributeName="opacity" begin="0s" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" begin="5s" dur="5s" repeatCount="indefinite" />
</svg>