<svg width="420" height="400" data-topic-id="data-flow-and-behavioural-model">
  <title>Data Flow and Behavioural Model</title>
  <footer>Learn Digital Design</footer>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- SVG Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Data Flow Model Introduction -->
  <section data-narration="Data Flow Model Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="80" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="25" font-size="18" font-family="Arial" fill="#333">Data Flow Model</text>
    <text x="20" y="65" font-size="18" font-family="Arial" fill="#333">A mathematical representation of digital circuits that focuses on the flow of data.</text>
  </section>
  
  <!-- Section 2: Data Flow Model Characteristics -->
  <section data-narration="Data Flow Model Characteristics">
    <rect x="10" y="150" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="220" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="175" font-size="18" font-family="Arial" fill="#333">Data-centric</text>
    <text x="20" y="225" font-size="18" font-family="Arial" fill="#333">Hierarchical</text>
    <text x="20" y="275" font-size="18" font-family="Arial" fill="#333">Declarative</text>
  </section>
  
  <!-- Section 3: Data Flow Model Notation -->
  <section data-narration="Data Flow Model Notation">
    <rect x="10" y="310" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="380" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="345" font-size="18" font-family="Arial" fill="#333">A</text>
    <text x="20" y="395" font-size="18" font-family="Arial" fill="#333">B</text>
    <text x="20" y="445" font-size="18" font-family="Arial" fill="#333">X</text>
    <text x="20" y="495" font-size="18" font-family="Arial" fill="#333">G</text>
    <text x="20" y="545" font-size="18" font-family="Arial" fill="#333">Y</text>
  </section>
  
  <!-- Section 4: Behavioural Model Introduction -->
  <section data-narration="Behavioural Model Introduction">
    <rect x="10" y="500" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="570" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="555" font-size="18" font-family="Arial" fill="#333">Behavioural Model</text>
    <text x="20" y="605" font-size="18" font-family="Arial" fill="#333">A mathematical representation of digital circuits that focuses on the control signals and their effects on the circuit's behavior.</text>
  </section>
  
  <!-- Section 5: Behavioural Model Characteristics -->
  <section data-narration="Behavioural Model Characteristics">
    <rect x="10" y="670" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="740" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="715" font-size="18" font-family="Arial" fill="#333">Control-centric</text>
    <text x="20" y="765" font-size="18" font-family="Arial" fill="#333">Focuses on control signals and their effects.</text>
  </section>
  
  <!-- Section 6: Comparison and Conclusion -->
  <section data-narration="Comparison and Conclusion">
    <rect x="10" y="810" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="880" width="400" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="855" font-size="18" font-family="Arial" fill="#333">Conclusion</text>
    <text x="20" y="905" font-size="18" font-family="Arial" fill="#333">Both models have their own strengths and weaknesses.</text>
  </section>
  
  <!-- Connections and Animations -->
  <path d="M 50,100 L 100,150" stroke="#666" stroke-width="2" fill="none"/>
  <path d="M 150,100 L 200,150" stroke="#666" stroke-width="2" fill="none"/>
  <animateTransform attributeName="transform" type="translate" from="0 100" to="100 150" dur="2s" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="150 100" to="200 150" dur="2s" begin="0.5s"/>
  
  <!-- Arrow Markers -->
  <style>.arrow-markers {fill:#666; stroke:#666; stroke-width:2;}</style>
  <svg class="arrow-markers" viewBox="0 0 10 10"><path d="M 5 0 L 0 5 L 5 10 Z"/></svg>