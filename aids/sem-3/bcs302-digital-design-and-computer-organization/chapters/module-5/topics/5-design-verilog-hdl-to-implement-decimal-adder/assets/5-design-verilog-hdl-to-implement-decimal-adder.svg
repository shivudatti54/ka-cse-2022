<svg width="420" height="400" data-topic-id="design-verilog-hdl-implement-decimal-adder" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-image: url('gradient.png'); background-size: 100% 100%; background-position: center;">
