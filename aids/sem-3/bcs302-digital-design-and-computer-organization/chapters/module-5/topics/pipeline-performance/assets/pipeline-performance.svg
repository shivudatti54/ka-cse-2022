<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="pipeline-performance">
  <defs>
    <style>
      .section {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        transform: translateY(-50%);
        text-align: center;
        background-color: #ADD8E6;
      }
      .section:hover {
        background-color: #C9E4CA;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="#ADD8E6" rx="10" />
  <rect x="0" y="0" width="420" height="40" fill="#87CEEB" />
  <rect x="0" y="360" width="420" height="40" fill="#87CEEB" />

  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100" height="40" fill="#FFC107" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="0s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="What is Pipeline Performance?">
      Pipeline Performance
    </text>
    <text x="50" y="60" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="A series of stages that process instructions in a specific order, optimizing performance and efficiency.">
      Pipeline Stages
    </text>
  </g>

  <g transform="translate(100, 10)">
    <rect x="0" y="0" width="100" height="40" fill="#87CEEB" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="0.5s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="The Fetch Stage retrieves the instruction from memory and stores it in the instruction register.">
      Fetch Stage
    </text>
    <text x="50" y="60" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="The Decode Stage decodes the instruction and generates the necessary control signals.">
      Decode Stage
    </text>
  </g>

  <g transform="translate(200, 10)">
    <rect x="0" y="0" width="100" height="40" fill="#87CEEB" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="1s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="The Execute Stage performs the desired operation on the instruction.">
      Execute Stage
    </text>
    <text x="50" y="60" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="The Memory Access Stage retrieves or stores data from memory.">
      Memory Access Stage
    </text>
  </g>

  <g transform="translate(300, 10)">
    <rect x="0" y="0" width="100" height="40" fill="#87CEEB" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="1.5s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="The Write-Back Stage stores the results of the instruction in the register or memory.">
      Write-Back Stage
    </text>
    <text x="50" y="60" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="The pipeline is waiting for an instruction to complete its execution before proceeding.">
      Pipeline Hazards
    </text>
  </g>

  <g transform="translate(100, 360)">
    <rect x="0" y="0" width="100" height="40" fill="#87CEEB" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="2s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="Data Dependence Hazard: The pipeline is waiting for the result of a previous instruction before proceeding.">
      Data Dependence Hazard
    </text>
    <text x="50" y="60" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="Control Dependence Hazard: The pipeline is waiting for the completion of a previous instruction before proceeding.">
      Control Dependence Hazard
    </text>
  </g>

  <g transform="translate(200, 360)">
    <rect x="0" y="0" width="100" height="40" fill="#87CEEB" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="2.5s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="Weakened Stall: The pipeline is waiting for an instruction to complete its execution before proceeding.">
      Weakened Stall
    </text>
    <text x="50" y="60" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="The pipeline is waiting for an instruction to complete its execution before proceeding.">
      Pipeline Stall
    </text>
  </g>

  <g transform="translate(300, 360)">
    <rect x="0" y="0" width="100" height="40" fill="#87CEEB" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="3s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="The pipeline is waiting for an instruction to complete its execution before proceeding.">
      Pipeline Performance
    </text>
  </g>

  <g transform="translate(100, 0)">
    <rect x="0" y="0" width="100" height="40" fill="#FFC107" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="0s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="To improve pipeline performance, consider optimizing pipeline stages, reducing stalls, and increasing throughput.">
      Improve Pipeline Performance
    </text>
  </g>

  <g transform="translate(200, 0)">
    <rect x="0" y="0" width="100" height="40" fill="#FFC107" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="0.5s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="Optimize pipeline stages to reduce stalls and increase throughput.">
      Optimize Pipeline Stages
    </text>
  </g>

  <g transform="translate(300, 0)">
    <rect x="0" y="0" width="100" height="40" fill="#FFC107" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="1s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="Reduce stalls by optimizing pipeline stages and increasing throughput.">
      Reduce Stalls
    </text>
  </g>

  <g transform="translate(400, 0)">
    <rect x="0" y="0" width="100" height="40" fill="#FFC107" rx="5" />
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="1.5s" />
    <text x="50" y="20" text-anchor="middle" fill="#333" font-size="18" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="Increase throughput by optimizing pipeline stages and reducing stalls.">
      Increase Throughput
    </text>
  </g>

  <path d="M 10 50 L 10 200" stroke="#333" stroke-width="2" fill="none" />
  <path d="M 120 50 L 120 200" stroke="#333" stroke-width="2" fill="none" />
  <path d="M 230 50 L 230 200" stroke="#333" stroke-width="2" fill="none" />
  <path d="M 340 50 L 340 200" stroke="#333" stroke-width="2" fill="none" />

  <text x="10" y="210" text-anchor="middle" fill="#333" font-size="24" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="Start optimizing pipeline performance today!">
    Start Optimizing
  </text>

  <text x="410" y="210" text-anchor="middle" fill="#333" font-size="24" font-family="Arial, sans-serif" stroke="#333" stroke-width="2" data-narration="For more information, visit our website.">
    Learn More
  </text>

</svg>