<svg width="420" height="400" data-topic-id="design-a-4-bit-full-adder-and-subtractor-and-simulate-the-same-using-basic-gates" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pastel-purple { fill: #C7B8EA; }
      .pastel-teal { fill: #0097A7; }
      .pastel-orange { fill: #FFC107; }
      .text-white { fill: #FFFFFF; }
      .text-gray { fill: #666666; }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: #C7B8EA;"/>
  <text x="15" y="20" style="font-size:24px;text-transform:uppercase;" class="text-white">Digital Circuit Design</text>
  <rect x="10" y="50" width="400" height="50" style="fill: #C7B8EA;"/>
  <text x="15" y="60" style="font-size:18px;" class="text-gray">4-bit Full Adder</text>
  <rect x="10" y="100" width="400" height="50" style="fill: #C7B8EA;"/>
  <text x="15" y="110" style="font-size:18px;" class="text-gray">4-bit Subtractor</text>
  <rect x="10" y="160" width="400" height="50" style="fill: #C7B8EA;"/>
  <text x="15" y="170" style="font-size:18px;" class="text-gray">Truth Table Animation</text>
  <g id="full-adder">
    <rect x="15" y="220" width="50" height="50" style="fill: #0097A7;"/>
    <text x="25" y="30" style="font-size:14px;" class="text-white">A0</text>
    <text x="25" y="60" style="font-size:14px;" class="text-white">A1</text>
    <text x="25" y="90" style="font-size:14px;" class="text-white">A2</text>
    <text x="25" y="120" style="font-size:14px;" class="text-white">A3</text>
    <text x="25" y="150" style="font-size:14px;" class="text-white">C</text>
  </g>
  <g id="subtractor">
    <rect x="15" y="220" width="50" height="50" style="fill: #0097A7;"/>
    <text x="25" y="30" style="font-size:14px;" class="text-white">B0</text>
    <text x="25" y="60" style="font-size:14px;" class="text-white">B1</text>
    <text x="25" y="90" style="font-size:14px;" class="text-white">B2</text>
    <text x="25" y="120" style="font-size:14px;" class="text-white">B3</text>
    <text x="25" y="150" style="font-size:14px;" class="text-white">C</text>
  </g>
  <g id="truth-table">
    <rect x="15" y="220" width="400" height="50" style="fill: #FFC107;"/>
    <text x="15" y="230" style="font-size:14px;" class="text-white">A0 A1 A2 A3 C</text>
    <text x="15" y="260" style="font-size:14px;" class="text-gray">S0 S1 S2 S3</text>
    <animate transform="rotate(360 200 250)" begin="0s" dur="10s" repeatCount="indefinite"/>
    <animate transform="rotate(360 200 250)" begin="2s" dur="10s" repeatCount="indefinite"/>
    <animate transform="rotate(360 200 250)" begin="4s" dur="10s" repeatCount="indefinite"/>
    <animate transform="rotate(360 200 250)" begin="6s" dur="10s" repeatCount="indefinite"/>
  </g>
  <g id="animation">
    <text x="15" y="330" style="font-size:18px;" class="text-white">Truth Table Animation</text>
    <animate transform="translate(200 250)" begin="0s" dur="10s" repeatCount="indefinite"/>
    <animate transform="translate(200 250)" begin="2s" dur="10s" repeatCount="indefinite"/>
    <animate transform="translate(200 250)" begin="4s" dur="10s" repeatCount="indefinite"/>
    <animate transform="translate(200 250)" begin="6s" dur="10s" repeatCount="indefinite"/>
  </g>
  <g id="footer">
    <text x="15" y="380" style="font-size:18px;" class="text-white">Digital Circuit Design</text>
  </g>
</svg>