<svg width="420" height="400" data-topic-id="41-81" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4682B4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  
  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial" fill="#6495ED">4:1 and 8:1 Memories</text>
  <animate xlink:href="#title" dur="2000" begin="0s" fill="freeze"/>
  
  <!-- Section 1 -->
  <rect x="10" y="50" width="120" height="50" fill="#C9E4CA" data-narration="4:1 Memories: Definition"/>
  <animate xlink:href="#section1" dur="1000" begin="0s" fill="freeze"/>
  <text x="140" y="60" font-size="18" font-family="Arial" fill="#4682B4">Definition</text>
  <animate xlink:href="#section1text" dur="1000" begin="0s" fill="freeze"/>
  <text x="140" y="80" font-size="18" font-family="Arial" fill="#4682B4">A 4:1 memory is a type of non-volatile memory that stores four bits of data in one memory cell.</text>
  <animate xlink:href="#section1text" dur="1000" begin="400ms" fill="freeze"/>
  
  <!-- Section 2 -->
  <rect x="140" y="50" width="120" height="50" fill="#C9E4CA" data-narration="4:1 Memories: Explanation"/>
  <animate xlink:href="#section2" dur="1000" begin="800ms" fill="freeze"/>
  <text x="260" y="60" font-size="18" font-family="Arial" fill="#4682B4">Explanation</text>
  <animate xlink:href="#section2text" dur="1000" begin="800ms" fill="freeze"/>
  <text x="260" y="80" font-size="18" font-family="Arial" fill="#4682B4">A 4:1 memory consists of a single memory cell that stores four bits of data.</text>
  <animate xlink:href="#section2text" dur="1000" begin="1200ms" fill="freeze"/>
  
  <!-- Section 3 -->
  <rect x="260" y="50" width="120" height="50" fill="#C9E4CA" data-narration="4:1 Memories: Advantages"/>
  <animate xlink:href="#section3" dur="1000" begin="1600ms" fill="freeze"/>
  <text x="380" y="60" font-size="18" font-family="Arial" fill="#4682B4">Advantages</text>
  <animate xlink:href="#section3text" dur="1000" begin="1600ms" fill="freeze"/>
  <text x="380" y="80" font-size="18" font-family="Arial" fill="#4682B4">Higher density and faster access time.</text>
  <animate xlink:href="#section3text" dur="1000" begin="2000ms" fill="freeze"/>
  
  <!-- Section 4 -->
  <rect x="380" y="50" width="120" height="50" fill="#C9E4CA" data-narration="4:1 Memories: Disadvantages"/>
  <animate xlink:href="#section4" dur="1000" begin="2400ms" fill="freeze"/>
  <text x="500" y="60" font-size="18" font-family="Arial" fill="#4682B4">Disadvantages</text>
  <animate xlink:href="#section4text" dur="1000" begin="2400ms" fill="freeze"/>
  <text x="500" y="80" font-size="18" font-family="Arial" fill="#4682B4">Less reliable and more complex.</text>
  <animate xlink:href="#section4text" dur="1000" begin="2800ms" fill="freeze"/>
  
  <!-- Section 5 -->
  <rect x="500" y="50" width="120" height="50" fill="#C9E4CA" data-narration="8:1 Memories: Definition"/>
  <animate xlink:href="#section5" dur="1000" begin="3200ms" fill="freeze"/>
  <text x="620" y="60" font-size="18" font-family="Arial" fill="#4682B4">Definition</text>
  <animate xlink:href="#section5text" dur="1000" begin="3200ms" fill="freeze"/>
  <text x="620" y="80" font-size="18" font-family="Arial" fill="#4682B4">An 8:1 memory is a type of non-volatile memory that stores eight bits of data in one memory cell.</text>
  <animate xlink:href="#section5text" dur="1000" begin="3600ms" fill="freeze"/>
  
  <!-- Section 6 -->
  <rect x="620" y="50" width="120" height="50" fill="#C9E4CA" data-narration="8:1 Memories: Advantages"/>
  <animate xlink:href="#section6" dur="1000" begin="4000ms" fill="freeze"/>
  <text x="740" y="60" font-size="18" font-family="Arial" fill="#4682B4">Advantages</text>
  <animate xlink:href="#section6text" dur="1000" begin="4000ms" fill="freeze"/>
  <text x="740" y="80" font-size="18" font-family="Arial" fill="#4682B4">Higher density and faster access time.</text>
  <animate xlink:href="#section6text" dur="1000" begin="4400ms" fill="freeze"/>
  
  <!-- Footer -->
  <text x="10" y="380" font-size="18" font-family="Arial" fill="#6495ED">Learn more about 4:1 and 8:1 memories</text>
  <animate xlink:href="#footer" dur="2000" begin="5000ms" fill="freeze"/>
  
  <!-- Arrow markers -->
  <line x1="10" y1="50" x2="140" y2="50" stroke="#4682B4" stroke-width="2"/>
  <line x1="140" y1="50" x2="260" y2="50" stroke="#4682B4" stroke-width="2"/>
  <line x1="260" y1="50" x2="380" y2="50" stroke="#4682B4" stroke-width="2"/>
  <line x1="380" y1="50" x2="500" y2="50" stroke="#4682B4" stroke-width="2"/>
  <line x1="500" y1="50" x2="620" y2="50" stroke="#4682B4" stroke-width="2"/>
  
  <!-- Title animation -->
  <animate xlink:href="#title" dur="2000" begin="0s" fill="freeze"/>
  <animate xlink:href="#footer" dur="2000" begin="5000ms" fill="freeze"/>
</svg>