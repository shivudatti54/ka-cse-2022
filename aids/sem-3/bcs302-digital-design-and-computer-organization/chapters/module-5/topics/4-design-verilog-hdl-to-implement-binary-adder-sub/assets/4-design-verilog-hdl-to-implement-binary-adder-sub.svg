<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" data-topic-id="Designing-Binary-Adder-Subtractor-in-Verilog-HDL">
  <style>
    /* Styles for the diagram */
    rect {
      stroke: #333;
      fill: #f0f0f0;
    }
    .title {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .section {
      margin-bottom: 40px;
    }
    .narration {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .code {
      font-size: 14px;
      color: #666;
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCCC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="360" fill="url(#gradient)"/>
  <text class="title" x="50%" y="20" text-anchor="middle">Binary Adder-Subtractor in Verilog HDL</text>
  <section class="section" data-narration="Half Adder Design">
    <rect x="20" y="60" width="200" height="100" fill="#fff" stroke="#333" rx="10"/>
    <rect x="250" y="60" width="200" height="100" fill="#fff" stroke="#333" rx="10"/>
    <circle cx="120" cy="50" r="30" fill="#fff" stroke="#333"/>
    <rect x="100" y="110" width="60" height="20" fill="#fff" stroke="#333"/>
    <rect x="180" y="110" width="60" height="20" fill="#fff" stroke="#333"/>
    <text class="narration" x="100" y="90">Half Adder Circuit Diagram</text>
    <text class="code" x="120" y="50">module half_adder(a, b, sum, carry);</text>
    <text class="code" x="240" y="50">input [1:0] a, b;</text>
    <text class="code" x="120" y="110">assign sum = a ^ b;</text>
    <text class="code" x="120" y="150">assign carry = (a & b);</text>
  </section>
  <section class="section" data-narration="Full Adder Design">
    <rect x="20" y="260" width="200" height="100" fill="#fff" stroke="#333" rx="10"/>
    <rect x="350" y="260" width="200" height="100" fill="#fff" stroke="#333" rx="10"/>
    <circle cx="320" cy="50" r="30" fill="#fff" stroke="#333"/>
    <rect x="300" y="310" width="60" height="20" fill="#fff" stroke="#333"/>
    <rect x="380" y="310" width="60" height="20" fill="#fff" stroke="#333"/>
    <rect x="320" y="370" width="20" height="20" fill="#fff" stroke="#333"/>
    <text class="narration" x="300" y="290">Full Adder Circuit Diagram</text>
    <text class="code" x="320" y="260">module full_adder(a, b, carry_in, sum, carry_out, borrow);</text>
    <text class="code" x="300" y="310">input [1:0] a, b;</text>
    <text class="code" x="320" y="370">output [1:0] carry_out, borrow;</text>
    <text class="code" x="320" y="260">assign sum = {a, b};</text>
    <text class="code" x="320" y="300">assign carry_out = (a ^ b ^ carry_in);</text>
    <text class="code" x="320" y="340">assign borrow = ((a & b) ^ (a & carry_in) ^ (b & carry_in));</text>
  </section>
  <section class="section" data-narration="Verilog HDL Code">
    <rect x="20" y="500" width="400" height="100" fill="#fff" stroke="#333" rx="10"/>
    <text class="narration" x="50%" y="510" text-anchor="middle">Verilog HDL Code</text>
    <animateTransform attributeName="transform" type="translate" from="0 500" to="0 600" begin="0s" dur="2s"/>
    <rect x="20" y="520" width="200" height="20" fill="#fff" stroke="#333" rx="5"/>
    <text class="code" x="120" y="520">module half_adder(a, b, sum, carry);</text>
    <text class="code" x="260" y="520">input [1:0] a, b;</text>
    <text class="code" x="120" y="540">output sum, carry;</text>
    <text class="code" x="260" y="540">assigned sum = a ^ b;</text>
    <text class="code" x="260" y="560">assigned carry = (a & b);</text>
  </section>
  <section class="section" data-narration="Conclusion">
    <rect x="20" y="620" width="400" height="100" fill="#fff" stroke="#333" rx="10"/>
    <text class="narration" x="50%" y="630" text-anchor="middle">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" from="0 620" to="0 720" begin="2s" dur="2s"/>
    <rect x="20" y="640" width="200" height="20" fill="#fff" stroke="#333" rx="5"/>
    <text class="code" x="120" y="640">module full_adder(a, b, carry_in, sum, carry_out, borrow);</text>
    <text class="code" x="260" y="640">input [1:0] a, b;</text>
    <text class="code" x="120" y="660">output [1:0] carry_out, borrow;</text>
    <text class="code" x="260" y="660">output sum;</text>
    <text class="code" x="260" y="680">assigned sum = {a, b};</text>
  </section>
  <footer>
    <text>Binary Adder-Subtractor in Verilog HDL</text>
  </footer>
</svg>