<svg width="420" height="400" data-topic-id="execution-of-a-complete-instruction">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.8" />
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2E4053">
    Execution of a Complete Instruction
  </text>
  
  <!-- Section 1: Instruction Fetch (IF) -->
  <rect x="50%" y="100" width="200" height="50" fill="#F7F7F7" rx="5" />
  <text x="60%" y="130%" font-size="16" font-family="Arial" text-anchor="middle" fill="#2E4053" data-narration="The Instruction Fetch stage fetches the next instruction from memory and prepares it for decoding.">
    Instruction Fetch (IF)
  </text>
  <line x1="50%" y1="120%" x2="250%" y2="120%" stroke="#2E4053" stroke-width="2" />
  <animate transform="translate(200,120%) rotate(45)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 2: Instruction Decode (ID) -->
  <rect x="50%" y="170" width="200" height="50" fill="#F7F7F7" rx="5" />
  <text x="60%" y="200%" font-size="16" font-family="Arial" text-anchor="middle" fill="#2E4053" data-narration="The Instruction Decode stage decodes the instruction and determines its operation.">
    Instruction Decode (ID)
  </text>
  <line x1="50%" y1="180%" x2="250%" y2="180%" stroke="#2E4053" stroke-width="2" />
  <animate transform="translate(200,180%) rotate(-45)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 3: Operand Fetch (OF) -->
  <rect x="50%" y="240" width="200" height="50" fill="#F7F7F7" rx="5" />
  <text x="60%" y="270%" font-size="16" font-family="Arial" text-anchor="middle" fill="#2E4053" data-narration="The Operand Fetch stage fetches the operands from registers or memory.">
    Operand Fetch (OF)
  </text>
  <line x1="50%" y1="260%" x2="250%" y2="260%" stroke="#2E4053" stroke-width="2" />
  <animate transform="translate(200,260%) rotate(90)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 4: Execution (EX) -->
  <rect x="50%" y="300" width="200" height="50" fill="#F7F7F7" rx="5" />
  <text x="60%" y="330%" font-size="16" font-family="Arial" text-anchor="middle" fill="#2E4053" data-narration="The Execution stage performs the operation specified by the instruction.">
    Execution (EX)
  </text>
  <line x1="50%" y1="320%" x2="250%" y2="320%" stroke="#2E4053" stroke-width="2" />
  <animate transform="translate(200,320%) rotate(180)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 5: Memory Access (MA) -->
  <rect x="50%" y="360" width="200" height="50" fill="#F7F7F7" rx="5" />
  <text x="60%" y="390%" font-size="16" font-family="Arial" text-anchor="middle" fill="#2E4053" data-narration="The Memory Access stage accesses memory for data transfer.">
    Memory Access (MA)
  </text>
  <line x1="50%" y1="390%" x2="250%" y2="390%" stroke="#2E4053" stroke-width="2" />
  <animate transform="translate(200,390%) rotate(270)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Section 6: Write Back (WB) -->
  <rect x="50%" y="410" width="200" height="50" fill="#F7F7F7" rx="5" />
  <text x="60%" y="440%" font-size="16" font-family="Arial" text-anchor="middle" fill="#2E4053" data-narration="The Write Back stage stores the results in memory.">
    Write Back (WB)
  </text>
  <line x1="50%" y1="440%" x2="250%" y2="440%" stroke="#2E4053" stroke-width="2" />
  <animate transform="translate(200,440%) rotate(360)" begin="0s" dur="1s" repeat-count="indefinite" />
  
  <!-- Footer -->
  <text x="50%" y="380%" font-size="14" font-family="Arial" text-anchor="middle" fill="#2E4053">
    Designed to educate
  </text>
</svg>