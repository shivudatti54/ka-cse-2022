<svg width="420" height="400" data-topic-id="half-and-full-subtractor">
  <defs>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Half and Full Subtractor</title>

  <rect x="10" y="10" width="400" height="380" fill="url(#gradient-background)"/>
  <text x="20" y="50" font-size="24" font-family="Arial" fill="#2F4F7F">Half and Full Subtractor</text>

  <g data-narration="half-subtractor-truth-table">
    <rect x="50" y="50" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="150" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="250" width="200" height="50" fill="#FFF" rx="5"/>
    <g>
      <circle cx="100" cy="80" r="25" fill="#F7DC6F"/>
      <circle cx="100" cy="150" r="25" fill="#F7DC6F"/>
      <circle cx="100" cy="220" r="25" fill="#F7DC6F"/>
      <text x="90" y="90" font-size="18" font-family="Arial" fill="#FFF">Input 1</text>
      <text x="90" y="160" font-size="18" font-family="Arial" fill="#FFF">Input 2</text>
      <text x="90" y="230" font-size="18" font-family="Arial" fill="#FFF">Output</text>
    </g>
    <rect x="50" y="50" width="200" height="30" fill="#FFF" rx="5"/>
    <text x="20" y="60" font-size="14" font-family="Arial" fill="#000">0  0  0</text>
    <text x="20" y="140" font-size="14" font-family="Arial" fill="#000">0  0  1</text>
    <text x="20" y="220" font-size="14" font-family="Arial" fill="#000">0  1  1</text>
    <text x="20" y="300" font-size="14" font-family="Arial" fill="#000">1  0  0</text>
    <text x="20" y="380" font-size="14" font-family="Arial" fill="#000">1  0  1</text>
  </g>

  <g data-narration="half-subtractor-circuit">
    <rect x="50" y="50" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="100" width="200" height="50" fill="#FFF" rx="5"/>
    <path d="M 90,40 L 110,40" stroke="#000" stroke-width="2"/>
    <path d="M 90,100 L 110,100" stroke="#000" stroke-width="2"/>
    <text x="80" y="60" font-size="14" font-family="Arial" fill="#000">Inverter 1</text>
    <text x="80" y="130" font-size="14" font-family="Arial" fill="#000">XOR Gate</text>
    <text x="80" y="200" font-size="14" font-family="Arial" fill="#000">Inverter 2</text>
    <text x="80" y="270" font-size="14" font-family="Arial" fill="#000">XOR Gate</text>
  </g>

  <g data-narration="full-subtractor-truth-table">
    <rect x="50" y="50" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="150" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="250" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="350" width="200" height="50" fill="#FFF" rx="5"/>
    <g>
      <circle cx="100" cy="110" r="25" fill="#F7DC6F"/>
      <circle cx="100" cy="180" r="25" fill="#F7DC6F"/>
      <circle cx="100" cy="250" r="25" fill="#F7DC6F"/>
      <circle cx="100" cy="320" r="25" fill="#F7DC6F"/>
      <text x="90" y="120" font-size="18" font-family="Arial" fill="#FFF">Input 1</text>
      <text x="90" y="190" font-size="18" font-family="Arial" fill="#FFF">Input 2</text>
      <text x="90" y="260" font-size="18" font-family="Arial" fill="#FFF">Input 3</text>
      <text x="90" y="330" font-size="18" font-family="Arial" fill="#FFF">Output</text>
    </g>
    <rect x="50" y="50" width="200" height="30" fill="#FFF" rx="5"/>
    <text x="20" y="60" font-size="14" font-family="Arial" fill="#000">0  0  0</text>
    <text x="20" y="140" font-size="14" font-family="Arial" fill="#000">0  0  0</text>
    <text x="20" y="220" font-size="14" font-family="Arial" fill="#000">0  1  0</text>
    <text x="20" y="300" font-size="14" font-family="Arial" fill="#000">1  0  0</text>
    <text x="20" y="380" font-size="14" font-family="Arial" fill="#000">1  1  1</text>
  </g>

  <g data-narration="full-subtractor-circuit">
    <rect x="50" y="50" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="100" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="150" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="200" width="200" height="50" fill="#FFF" rx="5"/>
    <rect x="50" y="250" width="200" height="50" fill="#FFF" rx="5"/>
    <path d="M 90,40 L 110,40" stroke="#000" stroke-width="2"/>
    <path d="M 90,100 L 110,100" stroke="#000" stroke-width="2"/>
    <path d="M 90,150 L 110,150" stroke="#000" stroke-width="2"/>
    <path d="M 90,200 L 110,200" stroke="#000" stroke-width="2"/>
    <text x="80" y="60" font-size="14" font-family="Arial" fill="#000">Inverter 1</text>
    <text x="80" y="130" font-size="14" font-family="Arial" fill="#000">XOR Gate</text>
    <text x="80" y="190" font-size="14" font-family="Arial" fill="#000">Inverter 2</text>
    <text x="80" y="250" font-size="14" font-family="Arial" fill="#000">XOR Gate</text>
    <text x="80" y="310" font-size="14" font-family="Arial" fill="#000">Inverter 3</text>
    <text x="80" y="370" font-size="14" font-family="Arial" fill="#000">XOR Gate</text>
  </g>

  <text x="20" y="400" font-size="18" font-family="Arial" fill="#2F4F7F">Animations</text>
  <g data-narration="half-subtractor">
    <animate xmlns="http://www.w3.org/2000/10/02/ads/ads.xml" attributeName="opacity" begin="0s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
    <animate xmlns="http://www.w3.org/2000/10/02/ads/ads.xml" attributeName="x" begin="0.5s" dur="1s" from="90" to="100" repeatCount="indefinite"/>
  </g>
  <g data-narration="full-subtractor">
    <animate xmlns="http://www.w3.org/2000/10/02/ads/ads.xml" attributeName="opacity" begin="0s" dur="2s" from="1" to="0" repeatCount="indefinite"/>
    <animate xmlns="http://www.w3.org/2000/10/02/ads/ads.xml" attributeName="x" begin="0.5s" dur="1s" from="90" to="100" repeatCount="indefinite"/>
    <animate xmlns="http://www.w3.org/2000/10/02/ads/ads.xml" attributeName="y" begin="1s" dur="0.5s" from="60" to="100" repeatCount="indefinite"/>
  </g>

  <rect x="10" y="10" width="400" height="400" fill="#FFF"/>
  <text x="20" y="10" font-size="24" font-family="Arial" fill="#2F4F7F">Footer</text>
  <text x="20" y="380" font-size="18" font-family="Arial" fill="#2F4F7F">Copyright 2023</text>
</svg>