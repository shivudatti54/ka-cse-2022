<svg width="420" height="400" data-topic-id="multiplexers">
    <!-- Gradient background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="10" y="10" width="400" height="360" fill="url(#pastel-gradient)"/>
    
    <!-- Title section -->
    <section data-narration="Introduction">
        <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold">Multiplexers</text>
        <text x="10" y="40" font-size="18">Introduction</text>
    </section>
    
    <!-- 2:1 Multiplexer section -->
    <section data-narration="2:1 Multiplexer">
        <text x="10" y="80" font-size="18">2:1 Multiplexer</text>
        <rect x="20" y="80" width="200" height="50" fill="#C7B8EA" rx="5"/>
        <text x="25" y="90" font-size="16" font-family="Arial">Truth Table:</text>
        <rect x="20" y="100" width="200" height="50" fill="#C7B8EA" rx="5"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="200 0" begin="0s" dur="2s"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 200" begin="2s" dur="2s"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="4s" dur="2s"/>
        <rect x="20" y="120" width="200" height="50" fill="#A1C9F2" rx="5"/>
        <text x="25" y="130" font-size="16" font-family="Arial">Verilog Program:</text>
        <code y="140">module mux2_1(A, B, Select, Output);\ninput A, B, Select;\noutput Output;\nassign Output = (Select == 1) ? B : A;\nendmodule</code>
    </section>
    
    <!-- 4:1 Multiplexer section -->
    <section data-narration="4:1 Multiplexer">
        <text x="10" y="220" font-size="18">4:1 Multiplexer</text>
        <rect x="20" y="220" width="300" height="40" fill="#C7B8EA" rx="5"/>
        <text x="25" y="230" font-size="16" font-family="Arial">Truth Table:</text>
        <rect x="20" y="240" width="300" height="40" fill="#C7B8EA" rx="5"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="300 0" begin="0s" dur="2s"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 300" begin="2s" dur="2s"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 0" begin="4s" dur="2s"/>
        <rect x="20" y="260" width="300" height="40" fill="#A1C9F2" rx="5"/>
        <text x="25" y="270" font-size="16" font-family="Arial">Verilog Program:</text>
        <code y="280">module mux4_1(A, B, C, D, Select, Output);\ninput A, B, C, D, Select;\noutput Output;\nassign Output = (Select == 1) ? D : (Select == 2) ? C : (Select == 3) ? B : A;\nendmodule</code>
    </section>
    
    <!-- Arrow markers -->
    <line x1="10" y1="10" x2="10" y2="390" stroke="#000" stroke-width="2"/>
    <line x1="410" y1="10" x2="410" y2="390" stroke="#000" stroke-width="2"/>
    
    <!-- Footer section -->
    <section data-narration="Conclusion">
        <text x="10" y="390" font-size="18" font-family="Arial" font-weight="bold">Multiplexers</text>
        <text x="10" y="410" font-size="18">Conclusion</text>
    </section>
</svg>