<svg width="420" height="400" data-topic-id="role-of-cache-memory">
  <rect fill="rgb(73, 109, 140)" x="0" y="0" width="420" height="400" rx="10" />
  <title>Role of Cache Memory</title>
  <footer>Educational Resource</footer>

  <!-- Section 1: Introduction to Cache -->
  <section data-narration="Introduction to Cache">
    <rect x="10" y="20" width="400" height="60" fill="rgb(73, 109, 140)" rx="10" />
    <text x="20" y="30" font-size="24" font-family="Arial" fill="white">Cache Memory</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="10,20" begin="0s" dur="2s" repeatCount="indefinite" />
    <text x="150" y="50" font-size="18" font-family="Arial" fill="white">is a small, fast memory that stores frequently accessed data to reduce average memory access time.</text>
  </section>

  <!-- Section 2: Cache Line Structure -->
  <section data-narration="Cache Line Structure">
    <rect x="10" y="100" width="400" height="60" fill="rgb(73, 109, 140)" rx="10" />
    <text x="20" y="110" font-size="18" font-family="Arial" fill="white">Cache Line Structure:</text>
    <rect x="50" y="120" width="320" height="30" fill="rgb(73, 109, 140)" rx="10" />
    <text x="60" y="130" font-size="18" font-family="Arial" fill="white">+-------+-------+------------------+</text>
    <text x="60" y="140" font-size="18" font-family="Arial" fill="white">| Valid | Tag   |   Data Block     |</text>
    <text x="60" y="150" font-size="18" font-family="Arial" fill="white">| Bit   |       | (32-128 bytes)   |</text>
    <text x="120" y="160" font-size="18" font-family="Arial" fill="white">+-------+-------+------------------+</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="10,170" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>

  <!-- Section 3: Address Partitioning -->
  <section data-narration="Address Partitioning">
    <rect x="10" y="220" width="400" height="60" fill="rgb(73, 109, 140)" rx="10" />
    <text x="20" y="230" font-size="18" font-family="Arial" fill="white">Address Partitioning:</text>
    <rect x="50" y="240" width="320" height="30" fill="rgb(73, 109, 140)" rx="10" />
    <text x="60" y="250" font-size="18" font-family="Arial" fill="white">|<------- Tag ------->|<-- Index -->|<- Offset ->|</text>
    <text x="60" y="260" font-size="18" font-family="Arial" fill="white">|       t bits        |   s bits    |   b bits   |</text>
    <text x="120" y="270" font-size="18" font-family="Arial" fill="white">|<------- Tag ------->|<-- Index -->|<- Offset ->|</text>
    <text x="120" y="280" font-size="18" font-family="Arial" fill="white">|       t bits        |   s bits    |   b bits   |</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="10,290" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>

  <!-- Section 4: Direct Mapped Cache -->
  <section data-narration="Direct Mapped Cache">
    <rect x="10" y="340" width="400" height="60" fill="rgb(73, 109, 140)" rx="10" />
    <text x="20" y="350" font-size="18" font-family="Arial" fill="white">Direct Mapped Cache:</text>
    <rect x="50" y="360" width="320" height="30" fill="rgb(73, 109, 140)" rx="10" />
    <text x="60" y="370" font-size="18" font-family="Arial" fill="white">Cache Line = (Memory Block Address) mod (Number of Cache Lines)</text>
    <rect x="60" y="380" width="300" height="30" fill="rgb(73, 109, 140)" rx="10" />
    <text x="60" y="390" font-size="18" font-family="Arial" fill="white">Example: 8-line cache</text>
    <text x="150" y="400" font-size="18" font-family="Arial" fill="white">Block 0, 8, 16, 24... -> Line 0</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="10,400" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>

  <!-- Section 5: Fully Associative Cache -->
  <section data-narration="Fully Associative Cache">
    <rect x="10" y="470" width="400" height="60" fill="rgb(73, 109, 140)" rx="10" />
    <text x="20" y="480" font-size="18" font-family="Arial" fill="white">Fully Associative Cache:</text>
    <rect x="50" y="490" width="320" height="30" fill="rgb(73, 109, 140)" rx="10" />
    <text x="60" y="500" font-size="18" font-family="Arial" fill="white">Search all lines in parallel using CAM (Content Addressable Memory)</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="10,530" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>

  <!-- Section 6: Set-Associative Cache -->
  <section data-narration="Set-Associative Cache">
    <rect x="10" y="610" width="400" height="60" fill="rgb(73, 109, 140)" rx="10" />
    <text x="20" y="620" font-size="18" font-family="Arial" fill="white">Set-Associative Cache:</text>
    <rect x="50" y="630" width="320" height="30" fill="rgb(73, 109, 140)" rx="10" />
    <text x="60" y="640" font-size="18" font-family="Arial" fill="white">n-way set associative:</text>
    <rect x="60" y="650" width="280" height="30" fill="rgb(73, 109, 140)" rx="10" />
    <text x="60" y="660" font-size="18" font-family="Arial" fill="white">Cache divided into sets</text>
    <rect x="60" y="670" width="240" height="30" fill="rgb(73, 109, 140)" rx="10" />
    <text x="60" y="680" font-size="18" font-family="Arial" fill="white">Each set has n lines</text>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="10,710" begin="0s" dur="2s" repeatCount="indefinite" />
  </section>

</svg>