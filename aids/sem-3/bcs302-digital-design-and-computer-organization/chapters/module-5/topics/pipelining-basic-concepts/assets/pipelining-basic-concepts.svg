<svg
  width="420"
  height="400"
  data-topic-id="pipelining-basic-concepts"
  viewBox="0 0 420 400"
  xmlns="http://www.w3.org/2000/svg"
  style="background-image: radial-gradient(to right, #66CCCC 10%, #66CCCC 30%, #66CCCC 50%, #66CCCC 70%, #66CCCC 90%, #66CCCC);"
>

  <!-- Header -->
  <rect x="10" y="10" width="400" height="40" style="fill: #3498db; border-radius: 10px 10px 0 0;" />
  <text x="20" y="25" font-size="24" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Pipelining Basic Concepts</text>

  <!-- Stage 1: Instruction Fetch (IF) -->
  <section data-narration="What is Pipelining?">
    <rect x="10" y="50" width="400" height="40" style="fill: #e74c3c; border-radius: 10px 10px 0 0;" />
    <path d="M 20 60 L 20 20" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
    <text x="90" y="75" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Instruction Fetch (IF)</text>
    <animate attributeName="opacity" begin="0s" duration="2s" fill="freeze" />
  </section>

  <!-- Stage 2: Instruction Decode (ID) -->
  <section data-narration="Instruction Decode">
    <rect x="10" y="90" width="400" height="40" style="fill: #e74c3c; border-radius: 10px 10px 0 0;" />
    <path d="M 20 120 L 20 80" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
    <text x="90" y="135" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Instruction Decode (ID)</text>
    <animate begin="2s" duration="2s" fill="freeze" />
  </section>

  <!-- Stage 3: Execute (EX) -->
  <section data-narration="Execute Operation">
    <rect x="10" y="130" width="400" height="40" style="fill: #e74c3c; border-radius: 10px 10px 0 0;" />
    <path d="M 20 150 L 20 110" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
    <text x="90" y="165" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Execute (EX)</text>
    <animate begin="4s" duration="2s" fill="freeze" />
  </section>

  <!-- Stage 4: Memory Access (MEM) -->
  <section data-narration="Memory Access">
    <rect x="10" y="170" width="400" height="40" style="fill: #e74c3c; border-radius: 10px 10px 0 0;" />
    <path d="M 20 190 L 20 140" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
    <text x="90" y="205" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Memory Access (MEM)</text>
    <animate begin="6s" duration="2s" fill="freeze" />
  </section>

  <!-- Stage 5: Write Back (WB) -->
  <section data-narration="Write Back">
    <rect x="10" y="210" width="400" height="40" style="fill: #e74c3c; border-radius: 10px 10px 0 0;" />
    <path d="M 20 230 L 20 170" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
    <text x="90" y="245" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Write Back (WB)</text>
    <animate begin="8s" duration="2s" fill="freeze" />
  </section>

  <!-- Performance Metrics Section -->
  <section data-narration="Performance Metrics">
    <rect x="10" y="270" width="400" height="70" style="fill: #2ecc71; border-radius: 10px 10px 0 0;" />
    <rect x="10" y="270" width="400" height="30" style="fill: #e74c3c; border-radius: 10px 10px 0 0;" />
    <text x="90" y="300" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Time = (k + n - 1) × τ</text>
    <text x="90" y="310" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Speedup = n × k / (k + n - 1)</text>
    <animate begin="10s" duration="2s" fill="freeze" />
  </section>

  <!-- CPI Section -->
  <section data-narration="CPI (Cycles Per Instruction)">
    <rect x="10" y="350" width="400" height="70" style="fill: #2ecc71; border-radius: 10px 10px 0 0;" />
    <rect x="10" y="350" width="400" height="30" style="fill: #e74c3c; border-radius: 10px 10px 0 0;" />
    <text x="90" y="380" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Ideal pipelined CPI = 1</text>
    <text x="90" y="390" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Actual CPI = 1 + stall cycles</text>
    <animate begin="12s" duration="2s" fill="freeze" />
  </section>

  <!-- Footer -->
  <rect x="10" y="410" width="400" height="40" style="fill: #e74c3c; border-radius: 10px 10px 0 0;" />
  <text x="20" y="425" font-size="18" font-family="Arial" text-anchor="middle" style="fill: white; color: #2ecc71;">Pipelining Basic Concepts</text>

  <!-- Arrow markers -->
  <path d="M 20 60 L 40 20" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
  <path d="M 20 120 L 40 80" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
  <path d="M 20 150 L 40 110" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
  <path d="M 20 190 L 40 140" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />
  <path d="M 20 230 L 40 170" style="stroke: #2ecc71; stroke-width: 2; stroke-dasharray: 10 10;" />

</svg>