<svg width="420" height="400" data-topic-id="digital-design-computer-organization-1-9"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink"
     style="overflow:visible;">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif"
        text-anchor="start" fill="#2E4053">Text Book 1: 1.9</text>
  <g transform="translate(60, 70)">
    <rect x="10" y="10" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="20" y="25" font-size="18" font-family="Arial, sans-serif"
          text-anchor="start" fill="#2E4053">Digital Design</text>
    <text x="20" y="40" font-size="14" font-family="Arial, sans-serif"
          text-anchor="start" fill="#666666" data-narration="A digital system uses only two binary digits (0s and 1s) to represent information."
          transform="rotate(45 30 25)"/>
    <rect x="120" y="10" width="80" height="50" fill="#F7F7F7" rx="5"/>
    <circle cx="130" cy="20" r="10" fill="#F7F7F7"/>
    <text x="140" y="30" font-size="18" font-family="Arial, sans-serif"
          text-anchor="start" fill="#2E4053">Binary System</text>
    <text x="140" y="45" font-size="14" font-family="Arial, sans-serif"
          text-anchor="start" fill="#666666" data-narration="A digital circuit can be designed using a combination of logic gates and arithmetic circuits."
          transform="rotate(45 140 35)"/>
    <rect x="10" y="80" width="200" height="50" fill="#F7F7F7" rx="5"/>
    <text x="20" y="95" font-size="18" font-family="Arial, sans-serif"
          text-anchor="start" fill="#2E4053">Logic Gates</text>
    <rect x="120" y="70" width="80" height="50" fill="#F7F7F7" rx="5"/>
    <circle cx="130" cy="80" r="10" fill="#F7F7F7"/>
    <text x="140" y="90" font-size="18" font-family="Arial, sans-serif"
          text-anchor="start" fill="#2E4053">AND Gate</text>
    <text x="140" y="110" font-size="14" font-family="Arial, sans-serif"
          text-anchor="start" fill="#666666" data-narration="A NOT Gate is used to produce an output that is the opposite of the input."
          transform="rotate(45 140 90)"/>
    <g transform="translate(60, 170)">
      <rect x="10" y="10" width="200" height="50" fill="#F7F7F7" rx="5"/>
      <text x="20" y="25" font-size="18" font-family="Arial, sans-serif"
            text-anchor="start" fill="#2E4053">Arithmetic Circuits</text>
      <text x="20" y="40" font-size="14" font-family="Arial, sans-serif"
            text-anchor="start" fill="#666666" data-narration="A digital circuit can be designed to perform a specific function, such as a logical operation or a mathematical operation."
            transform="rotate(45 30 30)"/>
      <rect x="120" y="10" width="80" height="50" fill="#F7F7F7" rx="5"/>
      <circle cx="130" cy="20" r="10" fill="#F7F7F7"/>
      <text x="140" y="30" font-size="18" font-family="Arial, sans-serif"
            text-anchor="start" fill="#2E4053">Arithmetic Circuits</text>
      <text x="140" y="45" font-size="14" font-family="Arial, sans-serif"
            text-anchor="start" fill="#666666" data-narration="A digital circuit can be designed to perform a specific function, such as a logical operation or a mathematical operation."
            transform="rotate(45 140 40)"/>
      <g transform="translate(60, 260)">
        <rect x="10" y="10" width="200" height="50" fill="#F7F7F7" rx="5"/>
        <text x="20" y="25" font-size="18" font-family="Arial, sans-serif"
              text-anchor="start" fill="#2E4053">Computer Organization</text>
        <text x="20" y="40" font-size="14" font-family="Arial, sans-serif"
              text-anchor="start" fill="#666666" data-narration="The CPU is the brain of the computer and performs most of the processing tasks."
              transform="rotate(45 30 35)"/>
        <rect x="120" y="10" width="80" height="50" fill="#F7F7F7" rx="5"/>
        <circle cx="130" cy="20" r="10" fill="#F7F7F7"/>
        <text x="140" y="30" font-size="18" font-family="Arial, sans-serif"
              text-anchor="start" fill="#2E4053">Central Processing Unit (CPU)</text>
        <text x="140" y="45" font-size="14" font-family="Arial, sans-serif"
              text-anchor="start" fill="#666666" data-narration="The CPU performs most of the processing tasks and is the most complex component of the computer."
              transform="rotate(45 140 35)"/>
        <g transform="translate(60, 360)">
          <rect x="10" y="10" width="200" height="50" fill="#F7F7F7" rx="5"/>
          <text x="20" y="25" font-size="18" font-family="Arial, sans-serif"
                text-anchor="start" fill="#2E4053">Footer</text>
        </g>
      </g>
    </g>
  </svg>