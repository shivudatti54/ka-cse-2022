<svg viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .code-text { font-family: 'Courier New', monospace; font-size: 9px; }
  </style>

  <!-- Background -->
  <rect width="800" height="1100" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to learning about Verilog, an industry-standard Hardware Description Language for digital circuit design.">
    <rect x="100" y="10" width="600" height="40" rx="8" fill="#1976d2" filter="url(#shadow)"/>
    <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Hardware Description Language – Verilog Model</text>
  </g>

  <!-- step1: What is HDL? Why Verilog? -->
  <g class="step" id="step1" data-narration="An HDL is a specialized language for describing digital circuit structure and behavior, operating in parallel unlike sequential software.">
    <rect x="50" y="60" width="700" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="80" font-size="12" font-weight="bold" fill="#1976d2">What is a Hardware Description Language (HDL)?</text>
    <text x="70" y="98" font-size="10" fill="#424242">Specialized programming language for describing digital electronic circuits</text>
    <text x="70" y="113" font-size="10" fill="#424242">Unlike software (sequential), HDLs describe hardware that operates in</text>
    <text x="70" y="128" font-size="10" font-weight="bold" fill="#1976d2">PARALLEL</text>
    <text x="350" y="98" font-size="10" fill="#424242">Verilog is one of the two major HDLs (along with VHDL),</text>
    <text x="350" y="113" font-size="10" fill="#424242">widely used in</text>
    <text x="350" y="128" font-size="10" font-weight="bold" fill="#388e3c">industry for digital system design</text>
  </g>

  <!-- step2: Why Use HDLs? -->
  <g class="step" id="step2" data-narration="HDL benefits include simulation before fabrication, automatic synthesis to gate-level netlists, and handling millions of gates efficiently.">
    <rect x="50" y="160" width="700" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="180" font-size="12" font-weight="bold" fill="#388e3c">Why Use HDLs?</text>
    <rect x="70" y="195" width="130" height="40" rx="4" fill="#fff"/>
    <text x="80" y="208" font-size="9" font-weight="bold" fill="#388e3c">1. Simulation</text>
    <text x="80" y="222" font-size="8" fill="#424242">Test before</text>
    <text x="80" y="232" font-size="8" fill="#424242">fabrication</text>
    <rect x="210" y="195" width="130" height="40" rx="4" fill="#fff"/>
    <text x="220" y="208" font-size="9" font-weight="bold" fill="#388e3c">2. Synthesis</text>
    <text x="220" y="222" font-size="8" fill="#424242">Gate-level</text>
    <text x="220" y="232" font-size="8" fill="#424242">netlists</text>
    <rect x="350" y="195" width="130" height="40" rx="4" fill="#fff"/>
    <text x="360" y="208" font-size="9" font-weight="bold" fill="#388e3c">3. Documentation</text>
    <text x="360" y="222" font-size="8" fill="#424242">Machine-</text>
    <text x="360" y="232" font-size="8" fill="#424242">readable spec</text>
    <rect x="490" y="195" width="130" height="40" rx="4" fill="#fff"/>
    <text x="500" y="208" font-size="9" font-weight="bold" fill="#388e3c">4. Reusability</text>
    <text x="500" y="222" font-size="8" fill="#424242">Module-based</text>
    <text x="500" y="232" font-size="8" fill="#424242">design</text>
    <rect x="630" y="195" width="110" height="40" rx="4" fill="#fff"/>
    <text x="640" y="208" font-size="9" font-weight="bold" fill="#388e3c">5. Complexity</text>
    <text x="640" y="222" font-size="8" fill="#424242">Millions of</text>
    <text x="640" y="232" font-size="8" fill="#424242">gates</text>
  </g>

  <!-- step3: Verilog Basics - Module Declaration -->
  <g class="step" id="step3" data-narration="The module is the fundamental building block in Verilog, encapsulating ports and circuit description for every design.">
    <rect x="50" y="260" width="700" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="280" font-size="12" font-weight="bold" fill="#f57c00">Verilog Basics: Module Declaration</text>
    <text x="70" y="298" font-size="10" fill="#424242">The module is the fundamental building block - every design is encapsulated in a module.</text>
    <rect x="70" y="308" width="400" height="30" rx="4" fill="#263238"/>
    <text x="80" y="327" font-family="'Courier New', monospace" font-size="10" fill="#a5d6a7">module circuit_name (input a, input b, output y);</text>
    <rect x="480" y="308" width="260" height="30" rx="4" fill="#263238"/>
    <text x="490" y="327" font-family="'Courier New', monospace" font-size="10" fill="#a5d6a7">  // circuit description goes here</text>
    <rect x="70" y="345" width="120" height="15" rx="4" fill="#1976d2"/>
    <text x="80" y="356" font-size="8" fill="white">module circuit_name</text>
    <rect x="200" y="345" width="150" height="15" rx="4" fill="#388e3c"/>
    <text x="210" y="356" font-size="8" fill="white">input/output ports</text>
    <rect x="360" y="345" width="150" height="15" rx="4" fill="#f57c00"/>
    <text x="370" y="356" font-size="8" fill="white">endmodule keyword</text>
  </g>

  <!-- step4: Port Types and Data Types -->
  <g class="step" id="step4" data-narration="Verilog uses input, output, inout ports and two main data types: wire for connections and reg for storage elements.">
    <rect x="50" y="360" width="700" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="380" font-size="12" font-weight="bold" fill="#7b1fa2">Port Types and Data Types</text>
    <rect x="70" y="395" width="200" height="40" rx="4" fill="#fff"/>
    <text x="80" y="410" font-size="9" font-weight="bold" fill="#7b1fa2">Port Types:</text>
    <text x="80" y="425" font-size="8" fill="#424242">input output inout</text>
    <rect x="280" y="395" width="220" height="40" rx="4" fill="#fff"/>
    <text x="290" y="410" font-size="9" font-weight="bold" fill="#7b1fa2">Data Types:</text>
    <text x="290" y="425" font-size="8" fill="#424242">wire - connection</text>
    <text x="380" y="425" font-size="8" fill="#424242">reg - storage</text>
    <rect x="520" y="395" width="220" height="40" rx="4" fill="#fff" stroke="#7b1fa2" stroke-width="1"/>
    <circle cx="550" cy="415" r="8" fill="#1976d2"/>
    <line x1="558" y1="415" x2="600" y2="415" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="620" y="407" width="30" height="16" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="665" y="420" font-size="8" fill="#424242">wire</text>
    <circle cx="550" cy="440" r="8" fill="#388e3c"/>
    <line x1="558" y1="440" x2="600" y2="440" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="620" y="432" width="30" height="16" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="665" y="445" font-size="8" fill="#424242">reg</text>
  </g>

  <!-- step5: Modeling Style 1 - Gate-Level -->
  <g class="step" id="step5" data-narration="Gate-level modeling instantiates predefined gate primitives like and, or, not directly mirroring the gate-level schematic.">
    <rect x="50" y="460" width="700" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="70" y="480" font-size="12" font-weight="bold" fill="#c62828">Modeling Style 1: Gate-Level (Structural)</text>
    <text x="70" y="498" font-size="10" fill="#424242">Describes circuit by instantiating predefined gate primitives - directly mirrors the gate-level schematic.</text>
    <rect x="70" y="508" width="280" height="30" rx="4" fill="#263238"/>
    <text x="80" y="527" font-family="'Courier New', monospace" font-size="10" fill="#90caf9">and g1 (F, A, B);</text>
    <rect x="360" y="508" width="280" height="30" rx="4" fill="#263238"/>
    <text x="370" y="527" font-family="'Courier New', monospace" font-size="10" fill="#90caf9">or g2 (Y, w1, w2);</text>
    <text x="70" y="548" font-size="8" fill="#424242">Built-in primitives:</text>
    <text x="70" y="562" font-size="8" font-weight="bold" fill="#c62828">and or not nand nor xor xnor</text>
  </g>

  <!-- step6: Modeling Style 2 - Dataflow -->
  <g class="step" id="step6" data-narration="Dataflow modeling uses continuous assignments with assign keyword to describe data flow through combinational logic expressions.">
    <rect x="50" y="560" width="700" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="580" font-size="12" font-weight="bold" fill="#1976d2">Modeling Style 2: Dataflow</text>
    <text x="70" y="598" font-size="10" fill="#424242">Uses continuous assignments (assign) to describe how data flows through combinational logic.</text>
    <rect x="70" y="608" width="350" height="30" rx="4" fill="#263238"/>
    <text x="80" y="627" font-family="'Courier New', monospace" font-size="10" fill="#ffcc80">assign F = (A and B) or (not C);</text>
    <rect x="430" y="608" width="310" height="40" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="440" y="622" font-size="9" font-weight="bold" fill="#1976d2">Verilog Operators:</text>
    <text x="440" y="638" font-size="8" fill="#424242">and = AND or = OR not = NOT</text>
    <text x="530" y="638" font-size="8" fill="#424242">xor = XOR xnor = XNOR</text>
  </g>

  <!-- step7: Modeling Style 3 - Behavioral -->
  <g class="step" id="step7" data-narration="Behavioral modeling uses procedural blocks with always keyword to describe circuit behavior algorithmically using if-else statements.">
    <rect x="50" y="660" width="700" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="680" font-size="12" font-weight="bold" fill="#388e3c">Modeling Style 3: Behavioral</text>
    <text x="70" y="698" font-size="10" fill="#424242">Uses procedural blocks (always, initial) to describe circuit behavior algorithmically.</text>
    <rect x="70" y="708" width="320" height="30" rx="4" fill="#263238"/>
    <text x="80" y="727" font-family="'Courier New', monospace" font-size="10" fill="#ce93d8">always @(A or B or S) begin</text>
    <rect x="400" y="708" width="340" height="30" rx="4" fill="#263238"/>
    <text x="410" y="727" font-family="'Courier New', monospace" font-size="10" fill="#ce93d8">  if (S == 0) Y = A; else Y = B;</text>
    <text x="70" y="750" font-size="8" font-weight="bold" fill="#388e3c">Key difference: output must be declared as reg</text>
  </g>

  <!-- step8: Example Circuit -->
  <g class="step" id="step8" data-narration="This example shows three Verilog models of the same circuit F = xy + xz, demonstrating all modeling styles.">
    <rect x="50" y="760" width="700" height="110" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="780" font-size="12" font-weight="bold" fill="#f57c00">Example: F = xy + xz (All Three Models)</text>
    <rect x="70" y="792" width="180" height="70" rx="4" fill="#fff" stroke="#f57c00" stroke-width="1"/>
    <text x="80" y="806" font-size="9" font-weight="bold" fill="#f57c00">Circuit Diagram:</text>
    <text x="80" y="822" font-size="8" fill="#424242">F = xy + xz</text>
    <line x1="100" y1="830" x2="140" y2="830" stroke="#424242" stroke-width="1"/>
    <rect x="145" y="822" width="20" height="16" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="155" y="834" font-size="8" fill="#424242">AND</text>
    <line x1="170" y1="830" x2="200" y2="830" stroke="#424242" stroke-width="1"/>
    <rect x="205" y="822" width="20" height="16" fill="#ffebee" stroke="#f44336"/>
    <text x="215" y="834" font-size="8" fill="#424242">NOT</text>
    <text x="80" y="852" font-size="8" fill="#424242">x to NOT to AND from y</text>
    <text x="130" y="860" font-size="8" fill="#424242">z</text>
    <line x1="138" y1="860" x2="145" y2="852" stroke="#424242" stroke-width="1"/>
    <rect x="235" y="822" width="20" height="16" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="245" y="834" font-size="8" fill="#424242">AND</text>
    <line x1="260" y1="830" x2="290" y2="830" stroke="#424242" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <rect x="270" y="792" width="200" height="70" rx="4" fill="#263238"/>
    <text x="280" y="806" font-size="9" font-weight="bold" fill="#81c784">Gate-Level:</text>
    <text x="280" y="820" font-family="'Courier New', monospace" font-size="7" fill="#a5d6a7">not g1(w1,x);</text>
    <text x="280" y="832" font-family="'Courier New', monospace" font-size="7" fill="#a5d6a7">and g2(w2,x,y);</text>
    <text x="280" y="844" font-family="'Courier New', monospace" font-size="7" fill="#a5d6a7">and g3(w3,w1,z);</text>
    <text x="280" y="856" font-family="'Courier New', monospace" font-size="7" fill="#a5d6a7">or g4(F,w2,w3);</text>
    <rect x="480" y="792" width="200" height="70" rx="4" fill="#263238"/>
    <text x="490" y="806" font-size="9" font-weight="bold" fill="#ffcc80">Dataflow:</text>
    <text x="490" y="822" font-family="'Courier New', monospace" font-size="8" fill="#ffcc80">assign F = (x and y) or</text>
    <text x="490" y="836" font-family="'Courier New', monospace" font-size="8" fill="#ffcc80">(not x and z);</text>
    <rect x="480" y="865" width="200" height="35" rx="4" fill="#263238"/>
    <text x="490" y="878" font-size="9" font-weight="bold" fill="#ce93d8">Behavioral:</text>
    <text x="490" y="892" font-family="'Courier New', monospace" font-size="7" fill="#ce93d8">always @(x or y or z)</text>
    <text x="560" y="892" font-family="'Courier New', monospace" font-size="7" fill="#ce93d8">F = ...</text>
    <rect x="270" y="865" width="200" height="35" rx="4" fill="#e1bee7"/>
    <text x="280" y="878" font-size="9" font-weight="bold" fill="#7b1fa2">Testbench:</text>
    <text x="280" y="892" font-size="8" fill="#424242">Applies stimulus to verify</text>
    <text x="280" y="903" font-size="8" fill="#424242">F = xy + xz functionality</text>
  </g>

  <!-- step9: Testbench Details -->
  <g class="step" id="step9" data-narration="A testbench applies input stimulus and observes outputs to verify circuit functionality through simulation before physical implementation.">
    <rect x="50" y="885" width="700" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="905" font-size="12" font-weight="bold" fill="#7b1fa2">Testbench - Simulation</text>
    <text x="70" y="923" font-size="10" fill="#424242">A testbench is a Verilog module that applies input stimulus and observes outputs to verify circuit functionality.</text>
    <rect x="70" y="933" width="380" height="30" rx="4" fill="#263238"/>
    <text x="80" y="952" font-family="'Courier New', monospace" font-size="9" fill="#ce93d8">module testbench; reg x,y,z; wire F;</text>
    <rect x="460" y="933" width="280" height="30" rx="4" fill="#263238"/>
    <text x="470" y="952" font-family="'Courier New', monospace" font-size="9" fill="#ce93d8">initial begin x=0; y=0; z=0; end</text>
    <text x="70" y="972" font-size="8" fill="#424242">Testbenches verify functionality through simulation before physical implementation.</text>
  </g>

  <!-- step10: Key Points Summary -->
  <g class="step" id="step10" data-narration="Verilog is an industry-standard HDL with three modeling styles: gate-level, dataflow, and behavioral. Practice writing all three to master digital design.">
    <rect x="50" y="985" width="700" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="1005" font-size="12" font-weight="bold" fill="#388e3c">Key Points Summary</text>
    <rect x="70" y="1015" width="150" height="50" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="80" y="1028" font-size="9" font-weight="bold" fill="#388e3c">Module</text>
    <text x="80" y="1042" font-size="8" fill="#424242">Fundamental</text>
    <text x="80" y="1054" font-size="8" fill="#424242">building block</text>
    <rect x="230" y="1015" width="150" height="50" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="240" y="1028" font-size="9" font-weight="bold" fill="#388e3c">wire reg</text>
    <text x="240" y="1042" font-size="8" fill="#424242">Combinational</text>
    <text x="240" y="1054" font-size="8" fill="#424242">vs storage</text>
    <rect x="390" y="1015" width="150" height="50" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="1028" font-size="9" font-weight="bold" fill="#388e3c">3 Styles</text>
    <text x="400" y="1042" font-size="8" fill="#424242">Gate-level</text>
    <text x="400" y="1054" font-size="8" fill="#424242">Dataflow Behavioral</text>
    <rect x="550" y="1015" width="190" height="50" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="560" y="1028" font-size="9" font-weight="bold" fill="#388e3c">Testbench</text>
    <text x="560" y="1042" font-size="8" fill="#424242">Verify through</text>
    <text x="560" y="1054" font-size="8" fill="#424242">simulation</text>
    <text x="70" y="1072" font-size="9" font-style="italic" fill="#1976d2">Practice writing Verilog code for various circuits to master digital design!</text>
  </g>
</svg>