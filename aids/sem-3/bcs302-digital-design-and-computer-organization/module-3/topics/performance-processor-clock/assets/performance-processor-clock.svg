<svg viewBox="0 0 800 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    
    <!-- Arrow Markers -->
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .wave-line {
      stroke-dasharray: 1000;
      animation: drawLine 2s ease-out forwards;
    }
    .pulse-anim {
      animation: pulse 2s ease-in-out infinite;
    }
    .blink-anim {
      animation: blink 1s ease-in-out infinite;
    }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1500" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to our exploration of the Processor Clock - the heartbeat that drives all computer operations.">
    <rect x="20" y="10" width="760" height="50" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="white">Performance: The Processor Clock</text>
    <text x="400" y="58" text-anchor="middle" font-size="11" fill="#90caf9">university 2022 Scheme - Computer Organization and Architecture</text>
  </g>
  
  <!-- Step 1: Why Does This Matter? -->
  <g class="step" id="step1" data-narration="The clock determines how fast your computer runs. It is the primary metric for comparing processor performance.">
    <rect x="20" y="70" width="760" height="95" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="45" y="95" font-size="14" font-weight="bold" fill="#1565c0">Why Does the Clock Matter?</text>
    <rect x="40" y="110" width="720" height="45" rx="6" fill="white" opacity="0.7"/>
    <text x="55" y="127" font-size="12" fill="#424242">• The clock is the fundamental "heartbeat" that synchronizes all CPU operations</text>
    <text x="55" y="145" font-size="12" fill="#424242">• Clock frequency (GHz) is the primary metric used to compare processors</text>
    <circle cx="740" cy="117" r="15" fill="#1976d2" class="pulse-anim"/>
    <text x="740" y="122" text-anchor="middle" font-size="14" font-weight="bold" fill="white">?</text>
  </g>
  
  <!-- Step 2: What is the Clock Signal? -->
  <g class="step" id="step2" data-narration="The clock is a periodic square wave signal that alternates between high and low voltage levels.">
    <rect x="20" y="175" width="760" height="95" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="45" y="200" font-size="14" font-weight="bold" fill="#2e7d32">What is the Clock Signal?</text>
    <rect x="40" y="215" width="350" height="45" rx="6" fill="white" opacity="0.8"/>
    <text x="55" y="233" font-size="11" fill="#424242">A continuous, periodic</text>
    <text x="55" y="248" font-size="11" fill="#424242"><tspan font-weight="bold">square wave</tspan> signal</text>
    <path d="M420,242 L440,222 L460,242 L480,222 L500,242 L520,222 L540,242" stroke="#388e3c" stroke-width="2" fill="none">
      <animate attributeName="d" values="M420,242 L440,222 L460,242 L480,222 L500,242 L520,222 L540,242;M420,242 L440,262 L460,242 L480,262 L500,242 L520,262 L540,242;M420,242 L440,222 L460,242 L480,222 L500,242 L520,222 L540,242" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <text x="550" y="242" font-size="10" fill="#388e3c" font-weight="bold">High/Low</text>
  </g>
  
  <!-- Step 3: Clock Cycle Explained -->
  <g class="step" id="step3" data-narration="A clock cycle is the time between two consecutive rising edges. This defines the basic unit of processor time.">
    <rect x="20" y="280" width="760" height="110" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="45" y="305" font-size="14" font-weight="bold" fill="#e65100">The Clock Cycle Explained</text>
    <rect x="40" y="320" width="700" height="60" rx="6" fill="white" stroke="#ffcc80"/>
    <!-- Square wave visualization -->
    <polyline points="60,350 120,350 120,325 180,325 180,350 240,350 240,325 300,325 300,350 360,350 360,325 420,325 420,350 480,350 480,325 540,325 540,350 600,350 600,325 660,325 660,350 720,350" stroke="#ff9800" stroke-width="2" fill="none" class="wave-line"/>
    <!-- Labels -->
    <text x="90" y="378" text-anchor="middle" font-size="9" fill="#e65100">Cycle 1</text>
    <text x="210" y="378" text-anchor="middle" font-size="9" fill="#e65100">Cycle 2</text>
    <text x="330" y="378" text-anchor="middle" font-size="9" fill="#e65100">Cycle 3</text>
    <text x="450" y="378" text-anchor="middle" font-size="9" fill="#e65100">Cycle 4</text>
    <text x="570" y="378" text-anchor="middle" font-size="9" fill="#e65100">Cycle 5</text>
    <text x="690" y="378" text-anchor="middle" font-size="9" fill="#e65100">Cycle 6</text>
  </g>
  
  <!-- Step 4: Clock Period and Frequency -->
  <g class="step" id="step4" data-narration="Clock period is the duration of one cycle, while frequency is cycles per second measured in Hertz.">
    <rect x="20" y="400" width="760" height="95" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="45" y="425" font-size="14" font-weight="bold" fill="#6a1b9a">Clock Period vs Frequency</text>
    <rect x="40" y="440" width="345" height="45" rx="6" fill="white" opacity="0.8"/>
    <text x="55" y="458" font-size="11" fill="#424242"><tspan font-weight="bold">Period (T)</tspan>: Time for one cycle</text>
    <text x="55" y="474" font-size="11" fill="#424242">Measured in nanoseconds (ns)</text>
    <rect x="400" y="440" width="345" height="45" rx="6" fill="white" opacity="0.8"/>
    <text x="415" y="458" font-size="11" fill="#424242"><tspan font-weight="bold">Frequency (f)</tspan>: Cycles per second</text>
    <text x="415" y="474" font-size="11" fill="#424242">Measured in Hertz (Hz), MHz, GHz</text>
  </g>
  
  <!-- Step 5: The Critical Formula -->
  <g class="step" id="step5" data-narration="The fundamental relationship: frequency equals one divided by period. Higher frequency means faster processing.">
    <rect x="20" y="505" width="760" height="90" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="45" y="530" font-size="14" font-weight="bold" fill="#c62828">The Critical Formula</text>
    <rect x="40" y="545" width="700" height="40" rx="6" fill="white" opacity="0.9"/>
    <text x="390" y="570" text-anchor="middle" font-size="18" font-weight="bold" fill="#c62828">f = 1 / T</text>
    <text x="390" y="588" text-anchor="middle" font-size="10" fill="#616161">Frequency (f) = 1 / Period (T)</text>
  </g>
  
  <!-- Step 6: Example Calculation -->
  <g class="step" id="step6" data-narration="For a 3.0 GHz processor, the clock period is only 0.33 nanoseconds, enabling billions of operations per second.">
    <rect x="20" y="605" width="760" height="95" rx="10" fill="url(#cyanGrad)" filter="url(#shadow)"/>
    <text x="45" y="630" font-size="14" font-weight="bold" fill="#006064">Example: 3.0 GHz Processor</text>
    <rect x="40" y="645" width="700" height="45" rx="6" fill="white" opacity="0.8"/>
    <text x="55" y="665" font-size="12" fill="#424242">Given: Frequency = 3.0 GHz = 3.0 × 10⁹ Hz</text>
    <text x="55" y="682" font-size="12" fill="#424242">T = 1 / f = 1 / (3.0 × 10⁹) = <tspan font-weight="bold">0.33 ns</tspan></text>
  </g>
  
  <!-- Step 7: Clock Generator -->
  <g class="step" id="step7" data-narration="The clock generator uses a quartz crystal oscillator to produce precise, stable timing signals for the processor.">
    <rect x="20" y="710" width="760" height="95" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="45" y="735" font-size="14" font-weight="bold" fill="#2e7d32">How is the Clock Generated?</text>
    <rect x="40" y="750" width="700" height="45" rx="6" fill="white" opacity="0.8"/>
    <text x="55" y="770" font-size="11" fill="#424242">• <tspan font-weight="bold">Quartz Crystal Oscillator</tspan> provides stable frequency reference</text>
    <text x="55" y="787" font-size="11" fill="#424242">• <tspan font-weight="bold">Phase-Locked Loop (PLL)</tspan> multiplies base frequency to target speed</text>
  </g>
  
  <!-- Step 8: Synchronous Operation -->
  <g class="step" id="step8" data-narration="Synchronous CPUs use the clock to coordinate all operations, ensuring every circuit performs its action in lockstep.">
    <rect x="20" y="815" width="760" height="90" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="45" y="840" font-size="14" font-weight="bold" fill="#1565c0">Synchronous CPU Operation</text>
    <rect x="40" y="855" width="700" height="40" rx="6" fill="white" opacity="0.7"/>
    <text x="55" y="873" font-size="11" fill="#424242">All circuits perform actions <tspan font-weight="bold">synchronized</tspan> with the clock edge</text>
    <text x="55" y="890" font-size="11" fill="#424242">Ensures data is valid before next operation begins</text>
  </g>
  
  <!-- Step 9: Rising and Falling Edges -->
  <g class="step" id="step9" data-narration="Operations can trigger on rising edge, falling edge, or both edges of the clock signal for different data rates.">
    <rect x="20" y="915" width="760" height="95" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="45" y="940" font-size="14" font-weight="bold" fill="#e65100">Rising Edge vs Falling Edge</text>
    <rect x="40" y="955" width="340" height="45" rx="6" fill="white" opacity="0.8"/>
    <circle cx="60" cy="975" r="6" fill="#4caf50" class="blink-anim"/>
    <text x="75" y="979" font-size="11" fill="#424242"><tspan font-weight="bold">Rising Edge</tspan>: Low → High</text>
    <rect x="400" y="955" width="340" height="45" rx="6" fill="white" opacity="0.8"/>
    <circle cx="420" cy="975" r="6" fill="#f44336" class="blink-anim"/>
    <text x="435" y="979" font-size="11" fill="#424242"><tspan font-weight="bold">Falling Edge</tspan>: High → Low</text>
  </g>
  
  <!-- Step 10: Limitations -->
  <g class="step" id="step10" data-narration="Higher frequencies generate more heat and consume more power. Modern CPUs dynamically adjust clock speed to balance performance and efficiency.">
    <rect x="20" y="1020" width="760" height="95" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="45" y="1045" font-size="14" font-weight="bold" fill="#c62828">Limitations of Higher Clock Speed</text>
    <rect x="40" y="1060" width="230" height="45" rx="6" fill="white" opacity="0.8"/>
    <text x="55" y="1078" font-size="10" fill="#424242">⚡ <tspan font-weight="bold">Power Consumption</tspan></text>
    <text x="55" y="1095" font-size="10" fill="#424242">Increases with frequency</text>
    <rect x="280" y="1060" width="230" height="45" rx="6" fill="white" opacity="0.8"/>
    <text x="295" y="1078" font-size="10" fill="#424242">🌡️ <tspan font-weight="bold">Heat Generation</tspan></text>
    <text x="295" y="1095" font-size="10" fill="#424242">More power = more heat</text>
    <rect x="520" y="1060" width="230" height="45" rx="6" fill="white" opacity="0.8"/>
    <text x="535" y="1078" font-size="10" fill="#424242">⚠️ <tspan font-weight="bold">Signal Integrity</tspan></text>
    <text x="535" y="1095" font-size="10" fill="#424242">Timing delays at high speeds</text>
  </g>
  
  <!-- Step 11: Dynamic Frequency Scaling -->
  <g class="step" id="step11" data-narration="Modern processors use techniques like Intel SpeedStep and AMD Cool'n'Quiet to dynamically adjust clock speed based on workload demands.">
    <rect x="20" y="1125" width="760" height="90" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="45" y="1150" font-size="14" font-weight="bold" fill="#6a1b9a">Dynamic Frequency Scaling</text>
    <rect x="40" y="1165" width="700" height="40" rx="6" fill="white" opacity="0.8"/>
    <text x="55" y="1183" font-size="11" fill="#424242">• <tspan font-weight="bold">Intel SpeedStep</tspan> / <tspan font-weight="bold">AMD Cool'n'Quiet</tspan>: Adjust clock based on workload</text>
    <text x="55" y="1200" font-size="11" fill="#424242">• Saves power during idle; boosts performance under load</text>
  </g>
  
  <!-- Step 12: Summary -->
  <g class="step" id="step12" data-narration="The processor clock is the heartbeat of the CPU, determining how many operations can be performed per second.">
    <rect x="20" y="1225" width="760" height="90" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="45" y="1250" font-size="14" font-weight="bold" fill="white">Summary: Key Takeaways</text>
    <rect x="40" y="1265" width="700" height="40" rx="6" fill="white" opacity="0.9"/>
    <text x="55" y="1283" font-size="11" fill="#424242">✓ Clock = CPU heartbeat | f = 1/T | Higher GHz = Faster but more heat</text>
    <text x="55" y="1300" font-size="11" fill="#424242">✓ Modern CPUs dynamically adjust frequency for efficiency</text>
  </g>
</svg>